    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:'A Manager’s Delegation',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Mumukko finds you and immediately reminds you of the special guest she mentioned before. Now that the first outpost on another star has been completed, the Forum has sent a representative to inspect the project. Because of your established connection to that august body, Mumukko decides that you will accompany the visitor as an intermediary whether you expected to or not. At the cosmoport, you meet Councilor Y’adebh, who makes it plain from the outset that she has not come merely to admire what has been built.</p>
      <p>Y’adebh explains that the Forum’s interest is only natural. Without the Ragnarok and the knowledge behind it, this initiative would not exist. Sharlayan has already invested technology, funds, and personnel into the undertaking, and in the aftermath of the Final Days, every such decision is now subject to harsher scrutiny. If this project were to appear less like exploration and more like the beginning of extrastellar colonization, conflict would surely follow. For that reason, she intends to weigh the initiative’s achievements honestly against the risks it carries, and your role is to help her understand what stands before her.</p>
      <p>As you guide her through Glassblowers’ Beacon, Y’adebh’s sharp eye misses little. She notes how the key facilities occupy the center, ringed by residences and less vital structures, and how the overall layout resembles the original plans for a post-exodus settlement, even if it has been adapted to Phaenna’s terrain. To her, that resemblance is not cause for alarm in itself, but proof that the designers understood how badly even capable people can need familiarity and psychological stability in an alien environment. The camp’s organization, its practical layout, and the placement of its essential stations all persuade her that the initiative’s resources have not been squandered thoughtlessly.</p>
      <p>Later, away from the camp proper, she asks not for another explanation of the terrain, but for your own judgment of the project. You tell her that the Sharlayans and the Loporrits strengthen one another, that the collaborators drawn from across Etheirys bring different skills toward a common purpose, that the adapted machinery is sufficient while still leaving room for improvement, and that the initiative’s purpose is not merely technical survival, but to learn of the stars and seek hope. Your answers help shape the conclusion she reaches. What she has seen here is not reckless ambition dressed in noble words, but a serious effort whose knowledge may one day benefit all of Etheirys.</p>
      <p>By the time the inspection ends, Y’adebh’s reserve has softened into genuine respect. She admits that standing here, and seeing the promise sleeping within distant worlds, has made the project’s value harder to dismiss than words alone ever could. Then, with surprising frankness, she reveals another reason for having taken such interest in you personally: she is Y’shtola’s elder half-sister, one of twelve daughters of their late father. They were never especially close, she says, yet she worries for her all the same, and wanted to judge for herself the person who has stood beside her. Satisfied at last, she returns with you to Mumukko and gives the initiative her approval. With the Forum’s support secured, the path into the great unknown opens a little wider.</p>
    </div>

      <div class="row"><a class="link" href="a-managers-discernment.html">A Manager’s Discernment</a></div>

    followq:`<div class="stack"></div>`

  JP:{
    langLabel:'JP',
    pageTitle:'プロジェクトマネージャーの意義あるお仕事',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ムムッコはあなたを見つけると、以前話していた特別な来客のことを切り出す。異星に築かれた最初の前哨拠点が完成したことで、フォーラムから視察のための使者が派遣されたのだという。そして、かの機関と縁のあるあなたを案内役兼仲介役に選んだのだと、半ば当然のように告げる。そうしてコスモポートで迎えたのは、参事ヤ・アデブだった。彼女は到着したその時から、この訪問がただの表敬ではないことをはっきり示していた。</p>
      <p>ヤ・アデブは、フォーラムがこの計画に目を向けるのは当然だと語る。ラグナロクとシャーレアンの技術がなければ、この取り組みそのものが存在しなかったからだ。しかもシャーレアンは、技術だけでなく、資金や人員に至るまで多くを投じてきた。終末を経た今、その関与はこれまで以上に厳しい目で見られている。もしこの計画が、探索ではなく星外植民の野心と受け取られれば、争いは避けられない。だからこそ彼女は、この事業の成果がその危うさを上回るに足るものか、自らの目で見定めようとしていた。そして、その判断の助けとして、あなたの見解を求めてくる。</p>
      <p>あなたがグラスブロワーズ・ビーコンを案内すると、ヤ・アデブは細部まで注意深く見ていく。中枢機能を担う施設が中央に集められ、その周囲を住居や補助施設が取り囲む構造は、地形への適応を除けば、かつて脱出計画のために構想された居住拠点によく似ていた。だが彼女は、それを危うい兆候としてではなく、異郷に置かれた者がどれほど馴染みある環境と心理的な安定を必要とするかを、この計画が正しく理解している証と受け取る。拠点の配置も、主要設備の位置も、必要に応じた資源配分も、軽率ではなく、よく考えられたものであると認めていく。</p>
      <p>やがて彼女は、星の地形そのものについてではなく、この計画を知るあなた自身の評価を聞きたいと言う。あなたは、シャーレアンの人々とレポリットたちが互いの長所を補い合っていること、エーテリス各地から集まった協力者たちが異なる技能を持ち寄りながら同じ目的に向かっていること、既存の機材は十分に機能しつつも改良の余地を残していること、そしてこの計画全体の目的は、ただ技術を使い切ることではなく、星々を知り、希望を探すことにあるのだと伝える。その言葉は、ヤ・アデブの結論を形作っていく。彼女の目に映ったのは、空疎な理想を掲げた無謀な試みではなく、やがてエーテリス全体に還元されうる知見を積み重ねる、真摯な営みだった。</p>
      <p>視察を終えるころには、ヤ・アデブの硬さは明らかに和らいでいた。遠い星々に眠る可能性をこの場で目の当たりにした今、この計画の価値は言葉だけでは語りきれないと彼女は認める。そして意外なことに、彼女は自分がヤ・シュトラの異母姉であり、亡き父の十二人の娘のうちの長女であることを明かす。特別に親しかったわけではないが、それでも姉として案じており、ヤ・シュトラのそばに立つあなたを自分の目で確かめたかったのだという。十分に見届けた彼女は、あなたとともにムムッコのもとへ戻り、計画に満足したと告げる。こうしてフォーラムの了承が得られ、未知なる星々へ向かう道は、さらに確かなものとなっていくのだった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ムムッコ　惑星パエンナ <small class="muted">(X:28.4, Y:12.7)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="a-managers-discernment.html">プロジェクトマネージャーの明察なお仕事</a></div>
      <div class="row"><a class="link" href="perspective-reflected.html">ガラスに映る未来</a></div>
    </div>`,
    followq:`<div class="stack"></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'經理的委派之道',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Mumukko 找到你後，立刻提起先前說過的那位特別訪客。隨著在另一顆星球上的第一座前哨基地終於完成，Forum （Old Sharlayan 的統治機構，負責國政與重大決策）也派出代表前來視察。而因為你過去與那個機構之間早已有所往來，Mumukko 便半強硬地決定，要由你陪同這位訪客，充當中間協調的人。到了 cosmoport 之後，你見到的是 Councilor Y’adebh。她才剛抵達，就已經讓你明白，這次來訪絕不是單純來看個熱鬧而已。</p>
      <p>Y’adebh 毫不掩飾自己對這項計畫原本抱持的保留。她指出，若沒有 Ragnarok 與 Sharlayan 的技術，這項計畫根本不可能存在，因此 Forum 介入監督本就是理所當然的事。更何況，Sharlayan 至今投入的不只是技術，還有資金與人力。在 Final Days 之後，這類行動如今都比以往更容易受到外界審視；只要讓人懷疑 Sharlayan 的意圖其實是朝向星外殖民，那麼衝突便幾乎無可避免。正因如此，她此行的目的，就是要親自確認這個計畫所帶來的成果，是否真的足以超過它所伴隨的風險，而你則被賦予了協助她理解這一切的角色。</p>
      <p>當你帶著她走過 Glassblowers’ Beacon 時，Y’adebh 觀察得極為仔細。她很快便看出，整個據點的配置方式，是以核心設施為中心，外圍再圍繞住居與其他相對次要的建物。雖然 hangar 的位置明顯是為了配合 Phaenna 的地形而調整過，但整體格局依然與當初為大撤離所設想的殖居地非常相似。對她而言，這並不代表危險，反而顯示出計畫方很清楚：即使是有能力的人，一旦身處異星，若缺乏熟悉的生活設施與足夠的心理安全感，也很容易失去穩定。她從這些安排裡看見的，不是浪費，而是審慎、實際，且真正理解參與者需求的規劃。</p>
      <p>之後，Y’adebh 不再要求你繼續逐項介紹地形或設備，而是要你直接說出自己對整個計畫的看法。你告訴她，Sharlayan 與 Loporrit 之間的合作能夠彼此補足長處；來自 Etheirys 各地的參與者，也都正以各自不同的技能朝同一個目標努力；那些從 Sinus Ardorum 沿用並調整過來的機械，如今雖然已經足夠應付需求，但未來仍持續尋求改良；而這項計畫真正的意義，並不只是避免 Ragnarok 所累積的資料白費，而是為了理解群星，並在其中尋找希望。你這些回答，不只是替這趟視察做了總結，也逐漸改變了她心中的衡量。</p>
      <p>等到整趟行程結束時，Y’adebh 原本那份冷峻而審慎的態度，已經明顯多了幾分真正的認可。她承認，親自站在這裡，看見那些遙遠星球所沉睡的可能性之後，這項計畫的價值已不是單靠言語就能輕易傳達。接著，她又意外地向你坦白，自己其實是 Y’shtola 的異母姊姊，是她們已故父親 Rhul 的十二名女兒之中最年長的一位。雖然她們從來算不上特別親近，但作為姊姊，她依舊會掛念對方，而這也正是她想親自看看你的原因之一。最終，她與你一同回到 Mumukko 面前，正式表示自己對這次視察結果感到滿意。隨著 Forum 的支持被確實保留下來，這項探索未知群星的計畫，也終於能更穩健地繼續往前推進。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 穆穆可　Phaenna <small class="muted">(X:28.4, Y:12.7)</small></div>

    </div>`,
    followq:`<div class="stack"></div>`

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
