<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`A Bad Bladder`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Scarlet stops you with urgent news. Scouts stationed at E–Tatt’s Spire have come under attack from the Ixal, and the damage was severe. A war balloon swept in from above and unleashed explosives upon the garrison, leaving many of the defenders wounded or worse. Those vessels are difficult enough to bring down even when they drift within range, and with the forest watchtowers already stretched thin, the loss of one more strongpoint could leave Gridania dangerously exposed. Scarlet sends you north at once to reinforce Captain Guithrit and the battered soldiers at the spire.</p><p>When you arrive, Guithrit tells you that the immediate danger has passed, but only just. A single well-placed arrow pierced the balloon’s air bladders and sent the vessel crashing into the trees before it could drift over the city’s walls. Relief lingers in his voice when he speaks of that narrow escape, yet it does nothing to hide how exhausted and wounded his remaining soldiers have become. If the Ixal are capable of pressing the attack again, the garrison is in no condition to stop them. He asks you to head into Peacegarden and inspect the wreck before the enemy can recover what remains.</p><p>At the crash site, the danger has not entirely faded. Ixal voices rise from the wreckage, furious that you have taken a part they sought for themselves. Before the confrontation can turn violent, another Ixal steps in and silences the outburst. He introduces himself as Sezul Totoloc and quickly makes clear that his people are not the same as those who attacked the tower. What interests him is the part you recovered, and rather than trying to seize it by force, he proposes a bargain: if you will bring it to him, he will show you the work of his people in return.</p><p>You follow Sezul into a hidden Ixal camp and hand over the component. He is openly delighted to have it back, for it contains a rare stone used to build instruments that measure the speed of the wind. Such stone, he explains, can only be found in Xelphatol, and even a clever artisan cannot fashion the necessary devices without it. Seeing your confusion, he tells you why he did not simply fetch it himself. His people are not like the Ixal of Natalan and other places. They do not seek war with the forest folk. They are outcasts.</p><p>That exile has given birth to a different purpose. Sezul explains that his group now calls itself the Ehcatl Nine, a name grander than their true number perhaps, but one chosen with pride all the same. They have no interest in waging war or in currying favor with a greedy goddess. Their eyes are fixed instead on the heavens. More than anything, they long to fly freely like the wind itself.</p><p>What began as a mission to investigate a fallen war balloon leaves you standing before something wholly unexpected. Beyond the smoke of attack and the fear of another Ixal assault, you find not raiders preparing another strike, but exiles clinging to a dream. Their craft, their secrecy, and their hunger for the skies are real enough—but so too is the distance between them and the violence of their kin. And as Sezul speaks, it becomes clear that this encounter is not the end of the matter, but the beginning of a strange new connection.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Scarlet <small class="muted">(New Gridania, X:9.9, Y:11.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="in-pursuit-of-the-past.html">In Pursuit of the Past</a></div><div class="row">Any Class or Job Lv. 1</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="reaching-for-cloud-nine.html">Reaching for Cloud Nine</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'雷雨来たりなば',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>スカーレット少牙士は、あなたに切迫した報せを伝える。エ・タット監視哨に駐留する斥候たちがイクサル族の襲撃を受け、多くの被害が出たのだという。敵は装甲気球で上空から急襲し、爆発物を投下して守備兵を大きく傷つけた。あの気球は射程に入っても容易には落とせず、しかも森に築かれた監視哨は、度重なる戦いでどこも人手不足に陥っている。これ以上防衛線を崩すわけにはいかず、あなたはただちに北部森林へ向かい、グイスリットのもとで防衛に加わるよう命じられる。</p><p>現地に着くと、グイスリットは最悪の事態こそ過ぎ去ったと告げる。ひとりの兵士が放った矢が偶然にも気球の浮揚装置を貫き、敵機は森の中へ墜落したのだという。もしあのまま街の上空へ流れていたらと思うと、彼の胸にはいまなお冷たい恐れが残っていた。だが助かったとはいえ、兵たちは傷つき、疲れ果てている。敵がなお攻勢を続ける力を残していたなら、いまの守備隊だけでは到底支えきれない。そこで彼はあなたに、平静の園へ向かい、墜落した気球の様子を確かめてきてほしいと頼む。</p><p>墜落現場では、まだ騒ぎは終わっていなかった。残骸のそばではイクサル族たちが怒声を上げ、あなたが拾い上げた部材を返せと騒ぎ立てる。だがその場に現れた別のイクサル族が、騒ぎを一喝して収める。彼はセズル・トトロックと名乗り、自分たちは監視哨を襲った連中とは違うのだと告げる。そして、あなたが手にした部材を力ずくで奪おうとはせず、代わりに取引を持ちかけてくる。それを持って自分たちの拠点まで来てくれるなら、その見返りに自分たちの仕事を見せようというのだ。</p><p>あなたが導かれた先は、森の奥に隠されたイクサル族の集落だった。部材を受け取ったセズルは、それをようやく取り戻せたことを隠しきれないほど喜ぶ。そこには風の速さを測る装置を作るために必要な、特別な石が使われており、その石はゼルファトルでしか採れない希少なものだという。どれほど工夫に長けていても、それがなければ必要な器具は作れない。あなたの戸惑いを見て取ったのか、なぜ自分たちで取りに行かなかったのかも、彼は語り始める。</p><p>セズルによれば、自分たちはナタランのイクサル族たちとは違う。森の民と争うつもりはなく、そのために同族の中でもはぐれ者として追いやられたのだという。いまの彼らには、別の目的がある。自分たちなりの名を掲げ、ささやかな誇りを胸に抱きながら、ただ空を目指しているのだ。森の民との戦いにも、欲深き神を喜ばせることにも興味はない。彼らの視線が向かう先にあるのは、ただ風のように自由に飛ぶという夢だけだった。</p><p>気球の残骸を調べるために始まったはずの探索は、思いもよらぬ出会いへと変わっていく。監視哨を襲った敵への警戒の先で、あなたが見つけたのは、さらなる破壊を望む者たちではなく、空への憧れにしがみつく追放者たちだった。彼らの技術も、秘密主義も、空を求める執念も本物だ。だが同時に、彼らが襲撃者たちとは異なる道を歩もうとしていることもまた確かだった。セズルの言葉を聞くうちに、あなたはこの出来事が単なる後始末ではなく、新たな縁の始まりであることを悟る。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> スカーレット少牙士 <small class="muted">（グリダニア：新市街, X:9.9, Y:11.4）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="in-pursuit-of-the-past.html">ストーンヴィジルに眠る翼</a></div><div class="row">いずれかのクラス・ジョブ Lv 1～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="reaching-for-cloud-nine.html">疾風の空力団</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'雷雨將至',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Scarlet 匆匆叫住你，帶來了一個情勢緊迫的消息。駐守在 E-Tatt’s Spire 的斥候據點遭到 Ixal 襲擊，而且損傷極為慘重。敵方的戰用氣球自空中掠過，朝駐軍投下爆裂兵器，讓防線在一瞬間付出巨大代價。那種飛行船一旦升到空中，本就難以擊落；如今森林中的守望塔又因連番戰事而人手短缺，任何一處失守，都可能讓 Gridania 的空防出現致命缺口。Scarlet 立刻命你前往 North Shroud，協助鎮守當地的 Captain Guithrit。</p><p>等你趕到時，Guithrit 告訴你，最危急的時刻雖然已經過去，卻只是險之又險地撐了過來。是某名士兵射出的那一箭，正好貫穿了氣球的浮升囊，才逼得那艘船一頭栽進樹林裡，沒能越過城牆飄向都市上空。提起那場驚險的轉折時，他語氣裡仍壓不住餘悸；可即便如此，剩下的守軍也早已傷疲交加。若 Ixal 還有餘力繼續進攻，現在的據點根本撐不住下一輪衝擊。於是他請你往北前往 Peacegarden，去查看那艘墜落的氣球究竟變成了什麼樣子。</p><p>來到墜毀現場後，你發現事情並沒有真正平息。殘骸旁傳來一陣尖銳喧鬧，幾名 Ixal 正為了你拿走的零件高聲叫嚷，堅稱那是他們該回收的東西。眼看衝突一觸即發，另一名 Ixal 出面壓下了騷動。他自稱 Sezul Totoloc，並清楚表示，自己並不是攻擊塔樓的那一邊。他真正關心的是你手中的那枚零件，但他沒有選擇動武奪回，而是主動向你提出交換：只要你願意跟他走一趟，把東西交還給他，他就會讓你看看他們真正正在做的事。</p><p>你跟著 Sezul 走進一處藏在森林深處的 Ixal 聚落，將零件交回他手中。Sezul 毫不掩飾自己找回它的喜悅，因為那零件裡用到了一種特殊石材，能拿來製作測量風速的裝置。那種石頭只產自 Xelphatol，十分稀有，就算再有本事的工匠，少了它也造不出需要的器具。見你仍有疑惑，他便接著解釋，為何他們沒有自己返回原地尋回。因為他們和 Natalan 及其他地方的 Ixal 不一樣。他們不想和森林中的人們交戰，因此成了被族群排斥在外的流放者。</p><p>正因如此，他們如今只剩下一個想要抓住的目標。Sezul 告訴你，他們為自己取了 Ehcatl Nine 這個名字；也許聽起來比實際人數還要響亮，但那依然是他們抱持著自尊喊出的名字。他們不在乎與森林之民的戰爭，也不想為了取悅那位貪婪的 goddess 而活。他們所望向的，始終只有同一個方向，天空。比起一切爭鬥與信仰，他們更在乎的，是像風一樣自由飛行的夢想。</p><p>原本只是為了追查墜落氣球而展開的任務，最後卻把你帶到了截然不同的真相面前。在塔樓遭襲、戰火未散的陰影底下，你遇見的不是另一群準備再次發動攻擊的敵人，而是一群仍死死抓著夢想不放的流亡者。他們的技術是真的，他們的隱密行動是真的，他們對天空的渴望也是真的。而當 Sezul 站在你面前，把那些話一句句說出口時，你也明白了，這場相遇並不是這段事件的尾聲，而是另一段關係真正開始的地方。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 斯卡利特 <small class="muted"> 格里達尼亞新街（X:9.9, Y:11.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="in-pursuit-of-the-past.html">石衛塔霸主</a></div><div class="row">只要任一職業達到等級 1 以上即可</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="reaching-for-cloud-nine.html">迎風而上的空力團</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
