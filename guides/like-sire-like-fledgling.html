<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />

  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>
<body>

              title="Like Sire Like Fledgling" allowfullscreen></iframe>

      <section class="card">
        <div class="hd" id="pageTitle">Like Sire Like Fledgling</div>
        <div class="tabs" role="tablist">
          <button class="tab-btn" role="tab" aria-selected="true"  data-tab="story">Story</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="acq">Acquisition</button>

        </div>

          <div id="panel-story"    class="tab-panel active"></div>
          <div id="panel-acq"      class="tab-panel"></div>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`Like Sire Like Fledgling`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>The Chocobokeep recognizes you at once and speaks to you not only as a jockey, but as someone who has already proven capable of raising a fine racing chocobo. With that in mind, he asks whether you have ever considered arranging a covering. He means the union of two racing chocobos in the hope of producing a fledgling of higher pedigree—one that, if fortune favors it, may one day surpass its parents on the track.</p><p>Yet the promise of that future comes with a cost. Only retired chocobos are permitted to take part in such unions, which means that every decision to breed asks you to give up a veteran bird in exchange for uncertain possibility. The Chocobokeep does not hide that risk from you. He makes it plain that you must weigh the potential of a stronger next generation against the certain loss of a chocobo that has already served you well.</p><p>Because the Gold Saucer knows how difficult that choice can be, provisions exist to ease the burden. When a racing chocobo of rank forty or higher is retired, you receive a registration form, and two such forms are needed to arrange a covering. Should you lack two suitable retired chocobos, you may instead secure the aid of breeding stock through a covering permission form, though one parent must still be your own retired bird.</p><p>After explaining all this, the Chocobokeep urges you not to let your chocobo’s talent come to nothing. If you wish for its strengths to live on, he tells you to seek out Katering at Moogle’s Gift Mounts, for she is the one who handles the arrangements. With that thought in mind, you leave the Gold Saucer behind and make your way to Bentbranch Meadows.</p><p>When you speak with Katering, she answers readily. If you truly wish to proceed, she can prepare the covering, though she reminds you that any fledgling born from it will still need basic training before it can race. Whenever you decide to make use of her services, she tells you, all you need do is say the word—and if you have questions, she will answer them gladly.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Chocobokeep <small class="muted">(Chocobo Square, X:6.2, Y:4.7)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="so-you-think-you-can-ride-this-chocobo.html">So You Think You Can Ride This Chocobo</a></div><div class="row">Any Class or Job Lv. 15</div></div>`,
    followq:`<div class="stack"><div class="row">None</div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'カップリングで新たな出会いを',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>チョコボ係は、あなたの姿を見るなり、すぐにそれが誰であるかを悟る。ただの騎手としてではなく、見事な競走チョコボを育て上げてきた調教師として、あなたを見ているのだ。そうして彼は、競走チョコボ同士の「交配」を考えたことはないかと問いかける。より高い血統を持つ雛鳥を生み出すために二羽を結び合わせること――運が味方すれば、その子はいつか両親をもしのぐ競走チョコボになれるかもしれないという。</p><p>だが、その未来への期待には、はっきりとした代償が伴う。交配に使えるのは、現役を退いたチョコボだけだ。つまり、新たな可能性を求めるたびに、すでに実績を重ねた一羽を失う覚悟が求められる。チョコボ係は、その危うさを隠そうとはしない。次代に託す伸びしろと、これまで力を尽くしてきた一羽を確実に失うこと。その両方を、あなた自身で秤にかけねばならないのだと語る。</p><p>ゴールドソーサーも、その決断がどれほど重いかを理解している。だからこそ、その負担を少しでも和らげる仕組みが用意されている。ランク四十以上の競走チョコボを引退させると、引退チョコボ登録証が渡され、交配にはそれが二通必要となる。もし条件に合う引退チョコボが二羽そろわない場合は、交配許可証を使って種鳥の力を借りることもできるが、父方と母方の両方を種鳥にすることは許されない。</p><p>ひととおり事情を説明したあと、チョコボ係は、せっかくの才能をそこで絶やしてしまうのは惜しいだろうとあなたに告げる。その力を次の世代へ受け継がせたいのなら、モーグリギフトマウンツのケータリングを訪ねるよう勧める。交配の手配を取り仕切っているのは彼女だという。その言葉を胸に、あなたはゴールドソーサーを後にし、ベントブランチ牧場へ向かう。</p><p>ケータリングは、交配の件を持ち出したあなたにすぐ応じる。望むのであれば手配はできるが、生まれた雛鳥はそのままでは競走に出られず、まず基礎訓練を受けさせる必要があると念を押す。いずれ利用する気になったなら、声をかければよい。疑問があれば、そのときは喜んで答えると、彼女は気さくに言ってくれる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> チョコボ厩務員 <small class="muted">（チョコボスクウェア, X:6.2, Y:4.7）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="so-you-think-you-can-ride-this-chocobo.html">「チョコボレース」の手引き</a></div><div class="row">いずれかのクラス・ジョブ Lv 15～</div></div>`,
    followq:`<div class="stack"><div class="row">なし</div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'配對迎來新邂逅',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Chocobokeep (陸行鳥管理員) 一看到你，立刻就認出了你的身分。他看待你，不只是賽場上的騎手，也是一位已經證明自己有能力培養優秀賽鳥的訓練者。正因如此，他主動問你，是否曾經考慮過替賽鳥安排交配。所謂的交配，就是讓兩隻賽鳥結合，嘗試培育出血統更優秀的雛鳥；若一切順利，牠將來甚至可能在賽場上超越自己的雙親。</p><p>然而，這份對未來的期待並不是毫無代價。依照規定，只有已經退役的 chocobo 才能參與交配。也就是說，每一次想賭上下一代的可能性，都意味著你必須先失去一隻早已累積經驗與實績的老將賽鳥。Chocobokeep 並沒有刻意淡化這份風險，而是坦白提醒你：你必須自己衡量，究竟是更強後代的潛力重要，還是那隻一路陪你走來、早已證明自己的賽鳥更值得珍惜。</p><p>Gold Saucer 也明白，這樣的抉擇對任何人來說都不輕鬆。因此，為了稍微減輕負擔，他們也準備了相應的制度。當一隻 rank 40 以上的賽鳥退役後，你會獲得一張退役登錄表，而安排交配需要兩張這樣的證明。若你手上沒有兩隻符合條件的退役賽鳥，也可以使用交配許可證，申請由專門用來繁殖的賽鳥協助配對；不過，雙方都不能同時使用這類繁殖用賽鳥，其中一方仍必須是你自己的退役賽鳥。</p><p>把整套制度說明完後，Chocobokeep 又語重心長地勸你，別讓自己賽鳥的才能就這樣白白斷在這一代。若你希望牠的優點能繼續傳承下去，就去找位於負責交配手續的 Katering 正在 Moogle’s Gift Mounts，因為實際負責安排交配事宜的人正是她。於是，你離開 Gold Saucer，動身前往 Bentbranch Meadows。</p><p>當你向 Katering 提起交配的事時，她很乾脆地表示，只要你願意，她隨時可以替你安排。不過她也提醒你，就算順利誕生了雛鳥，牠也還不能立刻投入比賽，而是必須先接受最基本的訓練。等到你真的決定要使用這項服務時，只要開口告訴她就行；若你還有其他疑問，她也很樂意一一為你解答。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 陸行鳥管理員 <small class="muted">(陸行鳥廣場, X:6.2, Y:4.7)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="so-you-think-you-can-ride-this-chocobo.html">陸行鳥競速指南</a></div><div class="row">只要任一職業達到等級 15 以上即可</div></div>`,
    followq:`<div class="stack"><div class="row">無</div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
