<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`Heretical Harassment`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Back at the Rising Stones, Minfilia greets you with relief that Alphinaud’s “trial company” is finally ready to begin. The inaugural ceremony will be held here, and while Tataru and Alphinaud handle the preparations, the new recruits have largely been left to their own devices in the meantime. Minfilia’s concern shifts to something more immediate: Revenant’s Toll has seen a surge of new arrivals, and she worries Slafborn may be overwhelmed. She asks you to speak with him and see what he needs.</p><p>When you find Slafborn, he meets your offer with a rough laugh. The recruits, he says, were hardly more than a trickle compared to the daily flood of treasure hunters that pours through town. Still, even as he declines your help, he turns the concern back on you—he has heard the trial company will answer directly to the Antecedent, and he hopes that means less being piled onto your shoulders in the long run.</p><p>The moment doesn’t last. A voice calls out in alarm, and an Adventurers’ Guild assistant staggers in, coughing through her report: she was escorting a shipment of provisions bound for Revenant’s Toll—supplies intended for the frontier effort—when brigands set upon them as they tried to cross into Mor Dhona. She believes the attackers may have been heretics. There were too many to fight through. They escaped only by abandoning the supplies, and she begs forgiveness for failing the task.</p><p>Slafborn refuses to let her carry the blame. Provisions can be replaced, he says, but capable people are harder to come by, and he orders someone to see to her wounds. Yet his thoughts are already racing ahead: if heretics are involved, this is no mere robbery. Ishgard will need to be informed. When he learns the supplies came from House Fortemps—collected from Camp Dragonhead—his expression hardens with the weight of what’s at stake.</p><p>He tells you he will send a missive at once, but then he asks more of you as well. You have been on good terms with the knights of House Fortemps, and he wants you to travel to Camp Dragonhead and lend your talents in person. He admits the contradiction—he had hoped to lighten your load—yet he cannot risk half measures when favorable relations with Ishgard matter this much. He is certain Lord Haurchefant will welcome your help, and he sends you off with word that he will warn Dragonhead of the attack and of your impending arrival.</p><p>The road leads you into Coerthas, where the cold bites like a living thing. At Camp Dragonhead, Haurchefant greets you in his usual warmth, offering roast karakul and mulled wine as if hospitality alone could ward off winter. When you refuse, he reads the truth at once: you did not come only to escape the cold. An urgent letter from Revenant’s Toll waits in his hand, and he can already tell your arrival is no coincidence.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Minfilia <small class="muted">(The Rising Stones, X:6.1, Y:5.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="recruiting-the-realm.html">Recruiting the Realm</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="when-the-cold-sets-in.html">When the Cold Sets In</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'ざわめく街角',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ライズングストーンズに戻ると、ミンフィリアはアルフィノの「試験部隊」の準備が整ったと告げる。創設式はこのライズングストーンズで執り行われ、タタルとアルフィノが段取りを進めているため、新たな志願者たちは当面のあいだ各々で過ごしているという。だが、ミンフィリアの懸念は別にあった。近頃レヴナンツトールには新しい顔ぶれが増え、スラフボーンが手に余しているのではないか――あなたに彼の様子を確かめ、必要があれば力を貸してほしいと頼む。</p><p>スラフボーンはあなたの申し出を聞くと、豪快に笑って受け流す。志願者が増えたといっても、日々ここを通り抜ける財宝狙いの連中の「洪水」に比べれば、せいぜい小さな流れだという。それでも彼は、あなたの負担のほうを案じていた。試験部隊は盟主に直接従うと聞いている、それなら長い目で見ればあなたの仕事が減るはずだ――そうであってほしい、と。</p><p>だが直後、状況は一変する。誰かの叫び声が響き、冒険者ギルドの助手が咳き込みながら駆け込んでくる。彼女はレヴナンツトールへ向けた物資輸送――前線のために用意された糧秣――を運んでいたが、モードゥナへ入ろうとしたところで盗賊に襲われたという。しかも相手は異端者だったかもしれない。数が多すぎて抗しきれず、命からがら逃げるために物資を捨てざるを得なかった。任務を果たせなかったことを詫びる彼女の声は、咳と痛みに途切れ途切れだった。</p><p>スラフボーンは責めない。物資は補えるが、賢い兵は得難い――そう言って彼女を休ませ、手当てを手配する。だが彼の思考はすでに次へ進んでいた。異端者が絡むなら、ただの盗難では済まない。イシュガルドへ知らせねばならない。物資の出所を問うと、彼女はハウス・フォルタンから、キャンプ・ドラゴンヘッドで受け取ったものだと答える。</p><p>事情を把握したスラフボーンは、すぐに先方へ書状を送ると告げる。そのうえであなたに問いかける――あなたはフォルタン家の騎士たちと良好な関係にあったはずではないか、と。矛盾しているのは承知している、先ほどは負担を減らしたいと言ったばかりだ。それでも、イシュガルドとの友好は半端な対応で危険にさらすわけにはいかない。だからこそ、あなたにキャンプ・ドラゴンヘッドへ赴き、持てる力で事態を収めてほしいのだ。彼は感謝を述べ、オルシュファンがあなたの助力を喜ぶだろうと確信して、あなたを送り出す。</p><p>コエルザスの寒気が肌を刺すなか、あなたはキャンプ・ドラゴンヘッドへ辿り着く。オルシュファンはいつもの調子で迎え、ローストしたカラクールやホットワインを勧めるが、あなたが首を横に振ると、彼はすぐに察する――あなたは寒さをしのぎに来ただけではないのだ、と。彼の手元にはレヴナンツトールからの急報があり、あなたの来訪が偶然でないことを、すでに感じ取っていた。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ミンフィリア <small class="muted">（石の家, X:6.1, Y:5.2）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="recruiting-the-realm.html">先行統一組織</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="when-the-cold-sets-in.html">風霜にわかに</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'喧囂的街角',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>回到 Rising Stones，Minfilia 告訴你一切都已就緒，Alphinaud 的試驗部隊（trial company）終於可以開始運作。創設典禮將在這裡舉行，Tataru 正與 Alphinaud 合作，把所有準備工作一一安排妥當；也因為兩人忙著收尾，新招募的成員暫時只能先各自安頓、各自適應。Minfilia 隨即想到另一個更迫切的問題：最近 Revenant’s Toll 突然湧入不少新面孔，她擔心 Slafborn 會不會忙到喘不過氣，想請你去問問他是否需要協助。</p><p>你去見 Slafborn，提出願意幫忙，他先是爽朗地笑了笑，說他幾乎沒注意到你們的招募成員到來——跟每天湧進這裡的尋寶客相比，那點人數根本只是「小水流」。雖然他感謝你的好意，但他更在意的反而是你的負擔；他聽說這支試驗部隊將直接聽命於 Antecedent（Minfilia 的頭銜也就是「Scions of the Seventh Dawn」的領袖），於是希望這代表你往後能少扛一些雜務，長遠來看也能輕鬆點。</p><p>話音未落，就有人慌張地呼喊。冒險者公會的助手踉蹌著衝來，邊咳邊勉強把話說完：她們正要把一批補給運往 Revenant’s Toll——那是為前線行動準備的物資——卻在試圖跨入 Mor Dhona 時遭到盜匪襲擊。她懷疑那些人可能是異端者。對方人數太多，她們根本抵擋不住，只能丟下補給、拚命逃回來，並為自己沒能完成任務而道歉。</p><p>Slafborn 立刻打斷她的自責，表示沒有什麼需要原諒：補給可以再補，人手——尤其是腦袋清楚、能做事的人——才難得。他要她先去休息，並安排人替她處理傷勢。可他同時也意識到，若真牽涉到異端者，這就不只是單純搶劫；Ishgard 必須得知此事。當他追問補給的來源，助手回答：來自 House Fortemps，她們是在 Camp Dragonhead 正式領取物資後才出發。</p><p>Slafborn 表示他會立刻送出書信通知 Camp Dragonhead，但他也轉向你，問你是否與 House Fortemps 的騎士們交情不錯。他承認自己前一刻才說希望能減輕你的負擔，現在卻又要你出面，確實矛盾；然而你們與 Ishgard 的友好關係太重要，他不能冒險用「半套」方式處理這件事。他希望你直接前往 Camp Dragonhead，善用你的能力把這次事件導向一個令人信服的結果，並說他相信 Lord Haurchefant 一定會很高興得到你的協助。他也會在信中告知襲擊一事，以及你即將抵達的消息，祝你一路順利。</p><p>你踏上前往 Coerthas 的路。抵達 Camp Dragonhead 時，Haurchefant 一如往常熱情地迎上來，開口就問你要不要來一盤烤 karakul、再配點熱香料酒。你拒絕後，他立刻看出你不是單純為了躲避刺骨寒冷而來。正巧，他手邊也準備拆閱一封來自 Revenant’s Toll 的急件——而他幾乎可以確定，你在此刻出現，絕不可能只是巧合。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 敏菲利亞 <small class="muted"> 石之家（X:6.1, Y:5.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="recruiting-the-realm.html">先鋒組織</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="when-the-cold-sets-in.html">風霜驟臨</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
