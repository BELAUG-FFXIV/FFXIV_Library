    story:`<div class="clamp" data-collapsed="true">
<p>Briardien pulls you aside and makes it clear there’s no time to waste. The merchant lead went nowhere, so he lays out a new plan: he will find a place to watch Avila fight, and until he understands the trick behind her strength, you must keep well away from her blade.</p>
<p>Back at the Coliseum, Dour Meadow is on the verge of starting without you and announces a last-minute change—Ultros has entered the melee. The crowd swells, the hype grows, and the Mythril Cup begins with a roar of introductions: Avila of Ala Mhigo, you, and Hildibrand—plus the “eleventh-hour” octopus himself. Off to the side, you catch the quiet exchange that makes it plain Ultros and Avila intend to team up, split the winnings, and leave everyone else broken.</p>
<p>When the fighting starts, Avila’s blade whirls like a storm, and Ultros sets his plan in motion—he’s relying on truffles to make his oversized partner sneeze at the perfect moment. But Hildibrand, in full gentlemanly earnestness, happily offers roasted truffles on the spot, and the timing begins to unravel. Briardien reads Avila’s gaze and barks for the gate to be opened, forcing the hidden “Tempest Blade” to reveal itself—Typhon’s explosive sneeze. In an instant, the arena realizes the “blade” was never the blade at all, and the crowd turns vicious as Avila and Ultros scramble to blame one another.</p>
<p>With the melee in ruins, Ultros tries to seize the moment by proposing a final showdown, and the crowd chants for it. Dour Meadow pivots immediately, declaring a special bout: Ultros and Typhon versus you, to be held at Halatali. Briardien, disgusted but precise, sums up the scheme—truffles to trigger the sneeze, the sneeze to fake a weapon’s power—and warns that the octopus will attempt something equally inane next.</p>
<p>The final confrontation moves to Dragon’s Neck, where the fight becomes a test of footing as much as strength—falling means forfeiting. You hold your ground, thwart Ultros and Typhon, and claim the Mythril Cup. Ellie and Briardien praise you for pulling it off, and even Hildibrand insists your victory proves you’ve been learning from his “travels” with you all along.</p>
<p>At the award ceremony, Dour Meadow presents the grand prize—Warden’s Grace—boasting it comes from Master Fyrgeiss’s vaults. Briardien senses danger and calls out above you just as the many-faced phantom thief makes his entrance, turning the theft into a “performance.” Hildibrand swears on the Manderville name, Gilgamesh barges in to challenge you again, and the chaos spikes when Typhon sneezes and the ring sails straight into the thief’s hands. Godbert refuses to accept defeat, flings Hildibrand skyward “as only a Manderville can,” and the thief escapes anyway—after declaring the ring a fake and leaving behind a worse discovery: the key is gone, and so is the second prize, the Ring of Inquiry.</p>
<p>In the aftermath, Avila is left staring at what she threw away for a false treasure, then admits she lost herself chasing fortune for her sister. Briardien focuses on what still doesn’t add up—the thief already had the key before revealing the fake, meaning the Ring of Inquiry was the true target from the beginning. Godbert connects the stolen relics—Treaty-Blade, Azeyma’s Virtue, Ring of Inquiry—to the era of Belah’dia, while Ellie produces the thief’s note about four sacred treasures becoming one. As rumors spread that the phantom’s targets are always the powerful, Ellie points out why ordinary Ul’dahns are starting to cheer for him, and Briardien warns his next mark could be even higher. Hildibrand, undeterred, declares it a race for the four lost relics—while Nashu excitedly insists the next key is “a mask,” and that some mysteries only get stranger from here.</p>

    story:`<div class="clamp" data-collapsed="true">
<p>ブリアルディアンはあなたを呼び止め、時間がないと告げる。商人から得られた成果は皆無で、今はコロセウムへ戻るしかない。彼は作戦を示し、アヴィラの戦いぶりを見極めるまで、あなたは彼女の刃に近づかないよう厳命する。</p>
<p>コロセウムへ戻ると、ドア・メドウが開幕寸前で待ち構えていた。直前の負傷者が出たため、急きょオルトロスが出場すると宣言され、観客はさらに押し寄せる。ミスリルカップの号砲が鳴り、アラミゴの闘士アヴィラ、あなた、そしてヒルディブランドが名指しされ、最後に「土壇場の参戦」オルトロスが高らかに名乗りを上げる。</p>
<p>戦いが始まると、アヴィラの剣技は暴風のように苛烈で、オルトロスは密かに仕掛けた策が成就するのを待つ。だがヒルディブランドが無邪気にトリュフ料理を振る舞い、状況は狂い始める。ブリアルディアンはアヴィラの視線から異変を察し、門を開けろと叫ぶ。現れたのは刃の力ではなくテュポーンのくしゃみであり、観客は自分たちが欺かれていたと気づく。場内は一転して罵声に満ち、アヴィラとオルトロスは互いに責任を押し付け合う。</p>
<p>前代未聞の混乱の中、オルトロスは勝手に場をまとめようとし、あなたと自分とテュポーンによる決着戦を提案する。観客は熱狂し、ドア・メドウもそれを受け入れて、舞台をハラタリ修練所へ移すと宣言する。ブリアルディアンは策の正体を整理し、トリュフでくしゃみを誘発し、それを剣の力に見せかけるという愚劣な仕掛けだったと断じる。それでも次の手が読めない以上、あなたに託すしかないと警戒を促す。</p>
<p>決戦の場はドラゴンズネックとなり、足場から落ちれば敗北という条件の下で戦いが始まる。あなたはオルトロスとテュポーンの攻勢を退け、最後まで踏みとどまってミスリルカップの勝者となる。エリーは安堵し、ブリアルディアンはあなたの働きを称えつつ、授与式こそが本命の舞台だと告げる。</p>
<p>授与式でドア・メドウは最終賞としてウォーデンズ・グレイスを掲げ、主催者の威光を誇示する。だがブリアルディアンが頭上を警告した瞬間、多面相の怪盗が姿を現し、盗みを芝居として見せつける。ヒルディブランドはマンダヴィルの名にかけて叫び、ギルガメッシュも割り込んであなたに復讐を宣言する。混乱のさなか、テュポーンのくしゃみで指輪が飛び、怪盗の手に渡ってしまう。ゴッドベルトは諦めず、マンダヴィル流の勢いでヒルディブランドを放り投げるが、怪盗は「指輪は偽物だ」と言い残して去り、代わりに保管庫の鍵と調査の指輪が奪われたことが判明する。</p>
<p>その後、アヴィラは偽物の宝のために誇りを売った自分を責め、妹ヘゲリナのためだったと認める。ブリアルディアンは怪盗が最初から狙っていたのは調査の指輪だと見抜き、奪われた品に共通する意図を追う。ゴッドベルトは契約の剣、アーゼマの美徳、調査の指輪がいずれもベラフディアの時代に連なる遺物だと語り、エリーは怪盗の予告状にある「四つの秘宝」について読み上げる。富と権力を憎むかのような標的選びが噂となり、市井の支持まで集め始めたとエリーが指摘すると、ブリアルディアンは次の標的がシンジケート、さらにはスルタンナに及ぶ可能性を示唆する。ヒルディブランドは怯まず、ベラフディアの失われた四つの遺物を巡る競争の始まりを宣言し、ナシュ・マカラッカは次の鍵は「仮面」だと、胸を躍らせて締めくくる。</p>

    story:`<div class="clamp" data-collapsed="true">
<p>Briardien 把你拉到一旁，直截了當地說時間不夠了。那個商人的線索完全浪費了你們的腳步，所以他改口定下新方案：他要找個制高點觀察 Avila 的戰鬥，而在他還沒看穿她力量背後的把戲之前，你必須離她的刀遠一點，別讓自己被捲進去。</p>
<p>你們趕回 Coliseum 時，Dour Meadow 已經快要開打。他大聲宣布計畫有變：有參賽者臨時受傷，Ultros 竟在最後一刻頂替上場。觀眾瞬間更多，賭盤更熱，Mythril Cup 也在一連串誇張的介紹聲中開幕——Ala Mhigo 的 Avila、你、還有 Hildibrand——最後再由那隻八條腿的「壓軸插隊者」登場，擺出一副要把全場當舞台的架勢。</p>
<p>戰鬥一開始，Avila 的劍勢像風暴般掃過；而 Ultros 正等著他的計畫發揮作用——他想用 truffles 讓那個巨大同伴打噴嚏，製造「Tempest Blade」的假象。偏偏 Hildibrand 當場端出烤 truffles，還一本正經地請人多吃幾口，讓局面徹底變了調。Briardien 從 Avila 的視線察覺異狀，立刻喝令打開閘門；下一秒，真相被迫現身——那所謂的「刀」其實是 Typhon 的噴嚏。觀眾這才發現自己被耍得團團轉，罵聲與惡意像浪一樣湧上來，Avila 和 Ultros 也在混亂裡互相指責。</p>
<p>Ultros 見勢不妙，乾脆順水推舟提議改成最後對決，想把局面重新拉回自己能操控的節奏。群眾卻反而更興奮，Dour Meadow 也立刻改口宣布：舞台改到 Halatali，讓 Ultros 和 Typhon 對上你。Briardien 冷冷地把把戲拆得一清二楚——truffles 引出噴嚏，噴嚏再被安排成「刀刃之力」——荒謬到讓人無語，但你們別無選擇，只能提防 Ultros 接下來又想出什麼更蠢也更危險的招。</p>
<p>決戰移到 Dragon’s Neck，規則更殘酷：整隊從平台跌落就算輸。你撐住攻勢，不讓自己被逼下去，最後擊退 Ultros 與 Typhon，拿下 Mythril Cup。Ellie 明顯鬆了一口氣，Briardien 也稱讚你的表現，並提醒你：真正的麻煩可能還在頒獎典禮上——那才是對方最容易下手的時刻。</p>
<p>頒獎開始，Dour Meadow 高舉 Warden’s Grace，誇耀那是 Master Fyrgeiss 私庫裡的珍藏。就在此時，Briardien 抬頭示警，多面相的怪盜現身，把偷竊說成一場「表演」，還要所有人坐好看戲。Hildibrand 以 Manderville 之名怒斥，Gilgamesh 也突然闖進來挑戰你，場面瞬間失控；而 Typhon 的噴嚏再次成了關鍵——指環被噴得飛出去，正好落入怪盜手中。Godbert 不肯認輸，硬是把 Hildibrand 甩向半空想要奪回，但怪盜只丟下一句「這是假的」就抽身離去；更糟的是，保管庫的 key 與第二獎 Ring of Inquiry 已經被他帶走。</p>
<p>風波過後，Avila 終於承認自己為了財富與名聲迷失了方向——她想替 Hegelina 交換一個新的生活，卻換來一場空。Briardien 盯著另一個更不對勁的細節：怪盜在揭穿之前就已經拿到 key，表示 Ring of Inquiry 才是他從一開始真正鎖定的目標。Godbert 進一步指出，Treaty-Blade、Azeyma’s Virtue、Ring of Inquiry——這些被盯上的遺物都與 Belah’dia 的年代有關；Ellie 則讀出怪盜留下的訊息，提到「四個神聖寶物」與古老傳說。她也提醒你，因為怪盜專挑富豪與權勢者下手，Ul’dah 的平民正被故事拉攏、甚至開始為他喝采；Briardien 因此推測下一個目標可能更高，甚至會指向 Syndicate 或 sultana 本人。Hildibrand 卻仍自信滿滿，宣告這場追逐四件失落遺物的競賽才正要開始，而 Nashu 也興奮地丟出下一個關鍵字：mask。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),

};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
