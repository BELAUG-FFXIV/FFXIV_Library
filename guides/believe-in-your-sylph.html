    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>You return to Little Solace with Papalymo and Yda at your side, and Komuxio is already waiting—expecting you, and hurrying off to fetch their elder. A moment later, Frixio receives you in the quiet safety of the sylphs’ home, pleased to see you again, and grateful—especially because you once aided Noraxia. Papalymo offers polite praise for what you have already done, then gently turns the conversation to the question that still hangs over everything: how did all of this begin?</p>
      <p>At Frixio’s invitation, the elder recounts the chain of “misadventures” that forced these sylphs into hiding. Imperial forces entered the wood, and fearing trouble, the sylphs watched them—only to realize too late that they had watched too closely. When the imperials noticed, they tried to catch the sylphs, and with nowhere left to flee, Frixio ran into Toto–Rak… and immediately wished they had not. In that suffocating place, a sinister figure in black tried to offer Frixio to a many-legged horror, and even Yda can’t decide whether to laugh at the absurdity or worry about what that robed stranger might truly mean.</p>
      <p>With the tale told, Papalymo steps forward in earnest: you have come as emissaries of Gridania, bearing a missive with the words of the Elder Seedseer. Frixio understands at once—Gridania fears Lord Ramuh. Papalymo doesn’t deny it, and Yda is quick to add what must not be lost beneath the fear: the Gridanians do not hate the sylphs; they think of them as friends, and that friendship is exactly why the Elder Seedseer reached out. Frixio speaks of respect for Kan-E-Senna and insists that these sylphs desire no conflict… yet admits the truth that divided their people: to protect the wood from the imperials, some resorted to summoning Ramuh, and those who took part became “touched.”</p>
      <p>Frixio’s voice carries both regret and helpless resolve—these sylphs yearn to return the touched ones to normal, but do not know how, and still do not know. The touched ones, however, did know one thing: how to make others like them. When those sylphs began trying to draw their fellows into Ramuh’s binding, Frixio fled to Little Solace with any who refused to be claimed. And still, the elder insists, Gridania need not fear thunderous judgment—Ramuh is not like other primals, not callous and cruel without end. So long as Gridanians do not trespass upon the ancestral homeland where the touched ones dwell, there will be no punishment—only a tense, watchful boundary.</p>
      <p>Papalymo adds the explanation that makes the elder’s words sharper: tempered mortals take on the qualities embodied by the primal, and Ramuh’s influence has made the touched sylphs fiercely protective of their home. That, he suggests, is why they lash out at trespassers—and even the abductions, crude as they are, can be understood as their twisted urge toward “reconciliation,” dragging their kin back into the fold in the only way they believe remains. You, Papalymo says, have given Gridania reason to breathe more easily: the sylphs of Little Solace want peace, and want a chance to set things right. Frixio entrusts you with a written declaration of those feelings for Kan-E-Senna, and Papalymo declares the matter of Ramuh settled—at least for now—while Yda needles him, and he snaps back with offended wit.</p>
      <p>Before you part, Frixio calls you back—there is still a token of appreciation to give. From the time of Ramuh’s summoning, the elder has kept a crystal, and now places it into your hands as a symbol of trust between these sylphs and you. Then Frixio stills, suddenly certain of something unseen: a brilliant light from within you flares, washing over the crystal, and the elder insists you must remember this moment. One day, that crystal will be useful. Until then, you must keep it safe—always.</p>
      <p>As you prepare to return to Gridania, Komuxio asks one more thing: watch the touched ones from a safe distance, and see whether they truly make no trouble when left untroubled. If you can witness their stillness, you can testify to the Gridanians that these sylphs mean no harm—and the fear might finally loosen its grip. Guided toward safer vantage points near Larkscall, you spot tempered sylphs in the distance, and even as their presence prickles at your senses, you can tell they pose no danger so long as you do not provoke them. When you finally report to the Adders’ Nest, Vorsaile reads the elder’s missive and is plainly relieved: the sylphs seek peace, they do not intend to summon Ramuh again, and if the touched ones are left alone, there is no reason to expect aggression. In that knowledge, he says, the Elder Seedseer will rejoice—and Gridania can turn its strength toward the threats that cannot be ignored.</p>
    </div>

  JP:{
    langLabel:'日本語',
    pageTitle:'シルフ族と蛮神ラムウ',

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>あなたがパパリモとイダとともに「シルフの仮宿」へ赴くと、コムシオは最初からあなたを待ち受けていた。あなたが来るのを見てすぐに長老を呼びに走り、ほどなくしてフリクシオがあなたを迎え入れる。あなたがかつてノラクシアを助けたことを覚えている彼は、再会を喜び、感謝の言葉を惜しまない。パパリモはあなたの働きをねぎらいつつ、ここに至る“騒動”の始まりをフリクシオに尋ねる。</p>
      <p>フリクシオは、帝国軍が森へ入り込んだ日からの出来事を語り出す。厄介事を恐れたシルフたちは帝国軍を見張ったが、あまりに近づきすぎて気づかれ、捕らえられそうになった。逃げ場を失ったフリクシオは「トトラクの千獄」へ逃げ込んだが、それは誤りだったと悔やむことになる。黒衣の怪しい者が現れ、フリクシオを多脚の魔物の餌にしようとしたのだと聞き、イダは思わず口を挟みながらも、胸の奥に残る不穏さを拭えない。</p>
      <p>話が一段落すると、パパリモは本題を告げる。あなたたちはグリダニアの使者として来ており、カヌ・エ・センナの言葉を記した書状を携えている――その目的は、蛮神ラムウへの恐れに揺れる人々の不安を確かめ、道を探ることだ。フリクシオは、グリダニアが警戒する理由を理解したうえで、争いを望まないと明言する。イダもまた、グリダニアがシルフ族を敵視しているのではなく、友として大切に思っているからこそ、友好が壊れることを恐れて書状が送られたのだと伝える。</p>
      <p>しかし、フリクシオは真実から目を背けない。帝国軍から森を守るため、一部のシルフは蛮神ラムウを呼び降ろし、その儀式に関わった者たちはテンパードとなった。フリクシオは反対したが聞き入れられず、テンパードとなった者たちは元に戻す方法もわからないまま、同胞までもテンパードにしようとした。そこでフリクシオは、ラムウに縛られることを拒んだ者たちを連れて「シルフの仮宿」へ逃れたのだという。</p>
      <p>それでもフリクシオは断言する。蛮神ラムウは、他の蛮神のように無慈悲で残酷というわけではない。テンパードが住む祖地へ踏み込まない限り、グリダニアの人々が雷の裁きを受けることはないはずだ。パパリモは補足として、テンパードとなった者は蛮神の性質を帯びること、シルフの場合は祖地を守ろうとする性質が過剰になったことを説明し、拉致のような行いさえも“和解”を求める歪んだ衝動として現れているのだろうと語る。フリクシオは、争いではなく和平を望む意思を文にまとめ、あなたに託してカヌ・エ・センナへ届けてほしいと願う。</p>
      <p>別れ際、フリクシオはあなたを呼び止め、感謝の証としてクリスタルを差し出す。蛮神ラムウを呼び降ろした際に授けられたものだが、今はあなたへの信頼の象徴として渡したいのだという。あなたが受け取った瞬間、あなたの内から溢れる眩い光がクリスタルを包むのを見て、フリクシオは確信めいて告げる――そのクリスタルはいつか必ず役に立つ、だから決して手放さず、常に安全に保て、と。</p>
      <p>あなたがグリダニアへ戻る前に、コムシオはもう一つ頼みごとをする。テンパードを遠くから見守り、何も刺激しなければ害をなさないことを確かめ、グリダニアの人々へ証言してほしいのだ。危険な土地の中で比較的安全に見張れる場所として、あなたは「ラークスコール」へ導かれ、遠方のテンパードを目にする――放置すれば危険はない、とあなたの感覚は告げていた。やがてあなたが「双蛇党：統合司令部」へ書状を届けると、ヴォルセールは内容を読み取り、シルフ族が争いを望まず、ラムウを再び呼ぶ意志もないこと、そしてテンパードを騒がせなければこちらも害を受けないことを確認して安堵する。長老の誠意を知った今、グリダニアは他の脅威へ力を向けられる――そう言って、彼はあなたに深い感謝を示した。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'蠻神拉姆',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>你和 Papalymo、Yda 一同回到 Little Solace，還沒走近，Komuxio 就已經在等你了。它一見到你便急忙去請長老，接著 Frixio 現身迎接，語氣裡帶著明顯的欣慰——它還記得你曾經幫過 Noraxia，也把那份恩情牢牢放在心上。Papalymo 先肯定你一路以來的行動，隨後把話題帶回最關鍵的地方：這一連串的「意外」，究竟是怎麼開始的？</p>
      <p>Frixio 願意開口，故事便一路倒回帝國勢力踏入森林的那段日子。為了避免麻煩，這些 sylphs 決定緊盯著對方的一舉一動，卻因為盯得太近而被察覺，轉眼就成了被捕捉的目標。無處可逃之下，Frixio 只好逃進 Toto–Rak，卻立刻後悔——在那裡，一個披著黑袍的神祕人試圖把它獻給一隻多足的怪物。Yda 聽到「黑袍人」時忍不住吐槽，但你也感覺得到，那不是能輕易笑過去的細節。</p>
      <p>說完過往，Papalymo 正式表明來意：你們是代表 Gridania 而來的使者，手中帶著 Elder Seedseer 的書信。Frixio 一聽就明白——Gridania 對 Lord Ramuh 的恐懼已經擴散開來。Papalymo 乾脆承認這點，而 Yda 立刻補上最不該被誤解的部分：Gridania 並不是討厭 sylphs，恰恰相反，正因為把 sylphs 當作朋友，才害怕任何事情破壞彼此的情誼，所以 Elder Seedseer 才會寫下這封信。Frixio 提到它尊敬 Kan-E-Senna，也再三強調 Little Solace 的這些 sylphs 並不想衝突——但它同時也必須坦白，分裂就是從召喚 Lord Ramuh 那一刻開始的。</p>
      <p>Frixio 說，那些為了對抗帝國威脅而召喚 Lord Ramuh 的 sylphs，成了「touched ones」。它曾勸阻卻無人聽從，而事情也如它所憂：想把 touched ones 變回原樣的方法，直到現在仍舊不知道；反倒是 touched ones 知道如何把別人也「變成同樣的存在」。當 touched ones 開始試圖把其他 sylphs 拉進那種束縛時，Frixio 帶著不願受 Lord Ramuh 綁定的同伴逃到 Little Solace，只求留住一條和平的路。</p>
      <p>即便如此，Frixio 仍堅持告訴你：Gridania 不必把 touched ones 或 Lord Ramuh 當作必然的屠戮者。它說 Lord Ramuh 和其他 primals 不同，並非冷酷無情；只要 Gridania 的人不踏入 touched ones 所在的祖地，就不會遭受雷霆的審判。Papalymo 也補充，tempered 的人會逐漸帶上 primal 所象徵的特質——對 sylphs 而言，Lord Ramuh 的影響使 touched ones 對家園的守護變得極端而尖銳；至於那些綁走同族的行為，他推測是一種「想要和解」的扭曲表現：用最粗暴的方式把同伴拖回「同一邊」。在你面前，Frixio 把 Little Solace 的心意整理成書面，請你轉交給 Kan-E-Senna，讓 Gridania 知道：這裡的 sylphs 依然選擇和平。</p>
      <p>臨別前，Frixio 又叫住你，要把一枚 crystal 交到你手中——那是召喚 Lord Ramuh 時獲得的贈物，如今它要用它來表明對你的信任。就在你接過的瞬間，一道耀眼的光芒自你體內湧出，將 crystal 包裹其中；Frixio 看見了那一幕，語氣忽然變得篤定，提醒你務必把它牢牢保管，因為總有一天它會派上用場，而且你必須一直讓它保持安全。</p>
      <p>在你返回 Gridania 之前，Komuxio 也提出請託：去遠遠觀察 touched ones——只要不去打擾，它們就不會惹事；若你親眼確認這點，就能替 Little Solace 作證，讓 Gridania 的人明白這裡沒有惡意。你依照它標出的相對安全地點前往 Larkscall，遠處的 tempered sylphs 清晰可見，而你的直覺也告訴你：只要放著不管，它們並不構成威脅。最後你回到 Adders’ Nest 交付 Frixio 的書信，Vorsaile 讀完後明顯鬆了口氣——這些 sylphs 無意衝突，也不打算再次召喚 Lord Ramuh；只要不去招惹 touched ones，Gridania 就無須再把恐懼當作唯一的答案。於是他代表所有 Gridanians 向你道謝，也相信 Elder Seedseer 會因這份回應而欣慰。</p>
    </div>

  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
