const i18n = {

    pageTitle:`Recruiting the Realm`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>With the primal threat held at bay for now, Minfilia urges you to turn your attention to what comes next. Alphinaud has been laying foundations for a new organization, and he needs your help to bring his proposal into the realm of the real.</p><p>Alphinaud begins by taking you back to the larger vision: since the dawn of the Seventh Astral Era, the leaders of the three nations have debated an accord to unify Eorzea’s disparate forces into a single entity—a realm-wide Grand Company capable of drawing strength from every corner of the land and turning it against threats no single nation could defeat alone. The purpose is clear, he says, but the logistics have mired them in endless argument, and with every day of delay he feels the will to unite draining away.</p><p>To break that stalemate, he proposes a smaller “trial company”—limited in scale, but granted the same freedom of action the Scions enjoy. If it proves its worth, it can restore momentum to the negotiations. And to calm fears that a primarily military force could be misused, he intends to place it under the authority of the Antecedent. The Scions protect Eorzea tirelessly, but as you saw in the refugee revolt, there are limits even you cannot push past without draining scarce resources. With this new company under the Scions’ command, you would be able to answer a wider range of crises without overtaxing anyone—least of all you.</p><p>Before anything can begin, Alphinaud must secure the official approval of the three leaders. While he is buried in signatures and formalities, he asks you to travel with him and handle the practical work: recruiting the inaugural members. Your first destination is Limsa Lominsa, where you meet him at Bulwark Hall, and he sends you to take a personal approach among the candidates on the upper decks—anyone willing to lend strength when needed, regardless of their existing allegiances.</p><p>As you speak to Limsa’s rough-and-ready folk, the answers come fast and varied. Riol greets you with loud familiarity, laughing at the memory of Titan’s peril and the old days with the Company of Heroes, and he signs on with the eagerness of someone who still refuses to crawl into the grave. Others refuse you without hesitation: Reyner cannot abandon his duty as commander of the Yellowjackets; Carvallain finds the idea intriguing but chooses to watch rather than act; Rhoswen snaps at you as if the very notion is an insult; and H’naanza admires the ambition, yet cannot leave the forge—offering instead to support you through commissions when you need metalwork.</p><p>When you regroup, Alphinaud is impressed that you drew interest from a Hero of legend, and he reports success of his own: Admiral Bloefhiswyn has signed what she must, and he asks you to proceed to Gridania while he travels ahead, waiting for you at Nophica’s Altar. There, he again entrusts recruitment to you as he meets the Elder Seedseer.</p><p>In Gridania, you find that the past still has teeth. Laurentius—newly released and desperate to be seen as reformed—stumbles into you with panicked disbelief, then clings to the chance you offer. With the Wood Wailers refusing him, this “trial company” becomes the second chance he says he has been searching for, and he swears he is a changed man as he sets off for Revenant’s Toll. You also meet Alianne again, who remembers how far you have come since Copperbell Mines and decides to join after escorting Isildaure home—her resolve framed as something she has been working toward her entire adventuring life. Yet others turn you away: Ceinguled finds your organization’s purpose too unfocused, and Ursandel cannot free himself from the guilt he has sworn to carry, refusing even as he admits your proposal speaks of new beginnings.</p><p>Alphinaud meets you again with good news: the Elder Seedseer has been amenable, and he notes the variety you have gathered so far. With time pressing, he urges you on to Ul’dah, cautioning you to recruit from the lower levels so as not to provoke the sultana by “poaching” from her personal guard. In the gilded city, the responses are sharper, and the rumors darker. Wilred, remembering what happened in Little Ala Mhigo, says the disaster forced him to see how easily he had been manipulated; he wants to become someone who can fight the evil he now believes is out there, and he accepts your invitation eagerly. Ourcen declines, bound to his church and the children, promising only prayers. Syntgoht refuses outright, unwilling to tie his fortunes to an enterprise with no profit margin. Landebert warns you the streets are whispering that your company is funded by corrupt Syndicate coin and will become their puppet, urging you to cut ties and run. Yellow Moon dismisses your approach as if it were an indecent proposition, rejecting you with theatrical offense.</p><p>When you return, Alphinaud takes stock with a steady, thankful calm. One Ala Mhigan youth is not many, he admits, but it is a start—and in these troubled years after the Calamity, any talk of saving Eorzea can feel like grasping at clouds. Still, people rise to the challenge, and he credits that hope in no small part to the victories you have won. He tells you plainly that he will not squander what you have placed in his hands: these recruits will become the foundation of a new beginning.</p><p>He also answers the doubts you have heard. Yes, the Syndicate’s involvement concerns him as well—so he had the origin of every coin scrutinized and recorded. This organization will not be built on corruption, he insists, even if he would prefer not to rely on outside sources at all. Not even his family’s wealth could sustain a venture of this scale. Rumors and suspicion will linger until the company proves itself, and trust will have to be earned one success at a time. Then he calls you back to the Rising Stones, ready to lay the first stone for a united Eorzea.</p><p>In the shadows of power, the sultana speaks with Raubahn about Alphinaud’s bold endeavor. Raubahn calls it more than bold—he believes it could pave the way for a united Eorzea, because since the Ultima Weapon’s threat, the nations have seemed to drift farther apart, not closer. Nanamo admits cooperation has been pledged, yet grumbling continues behind closed doors, and she cannot shake the fear of what such a fearsome military body might become—even under the Scions’ watch. She worries about Syndicate money and the possibility of an extraordinary gathering of warriors being forged into a private army. Raubahn answers with trust in the Scions, and faith in you—he cannot imagine you would betray their cause. But Nanamo’s voice turns inward: she has known people to change, and the age itself flings them about like a dust devil across the sands. She asks what can be done about Teledji, and when Raubahn admits they lack evidence to convict him under Ul’dahn law, her frustration breaks through—treason in all but name, and still their hands are tied. Raubahn urges her to have faith. It is not over.</p><p>Back at the Rising Stones, Alphinaud exhales the exhaustion of the road, admitting he never wishes to repeat that journey soon. Yet he cannot rest—the culmination of all the effort is at hand, and he must prepare for the inaugural ceremony. He thanks you for letting him monopolize your time, certain that the Antecedent will be relieved to have you free again for other duties.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Alphinaud <small class="muted">(The Rising Stones, X:6.1, Y:5.2)</small></div></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'先行統一組織',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>蛮神の脅威がひとまず鎮まった今こそ、新たな取り組みに目を向ける時だとミンフィリアは告げる。アルフィノは以前から自身の構想のために下地を整えてきた。あなたの力を借りて、その提案を現実へと踏み出させたいのだという。</p><p>アルフィノはまず、大きな計画を語り直す。第七星暦の到来以降、三国の首脳たちは、Eorzea の分散した戦力をひとつに束ねる協定について議論を重ねてきた。領域を越えて機能する全土規模のグランドカンパニー――各地から軍事力を集め、単独の国家では対処しきれない脅威へ向けて運用する組織だ。目的そのものに異論はないが、設立の手続きや運用の取り決めが議論を無限に引き延ばし、話し合いが長引くほど統合への機運が目に見えて薄れていく、と彼は危機感を口にする。</p><p>そこで彼は、いわば「試験的な中隊」の創設を提案する。最終的に目指す規模には及ばないが、暁の血盟と同様に領域の制約を受けない自由な行動権を持ち、成功例として示すことで停滞した協議に勢いを与える狙いだ。加えて、主として軍事組織である以上、悪用への懸念を和らげるため、誕生したばかりの組織は盟主の権威のもとに置くという。暁の血盟は Eorzea と民を守るために尽力しているが、難民の蜂起であなた自身が目の当たりにしたように、暁の力にも限界がある。ならば暁の指揮下にこの新たな部隊を置けば、資源を枯渇させることなく、そしてあなたの類まれなる力に過度の負担をかけることなく、より幅広い難題に対応できる――それがアルフィノの見立てだった。</p><p>彼の提案の目的は暁の血盟と同じであり、その点は関係者全員が認めている。だが、真に国境を越えたグランドカンパニーへ至る前段階としてこの組織を立ち上げるには、三国の指導者から正式な承認を得ねばならない。煩雑で時間のかかる手続きゆえ、旅にはあなたにも同行してほしい、とアルフィノは頼む。彼が官僚的な折衝に追われるあいだ、あなたには創設メンバーの勧誘を任せたいのだ。</p><p>最初の目的地はリムサ・ロミンサ。ブルワークホールで落ち合うと、アルフィノは提督と境界条件や許可の文言を詰め、書類に署名するあいだに、あなたに勧誘を進めるよう求める。すでに別の組織に属していても構わない。ただ必要なときに力を貸す意思があることが条件だという。候補探しのために郊外へ出る必要もなく、上甲板だけで十分だと告げられる。</p><p>あなたが声をかけていくと、反応はさまざまだった。リオルは懐かしげにあなたを迎え、かつて「英雄一行」として過ごした日々と、タイタンの間への近道を選んだ無謀さを笑い飛ばす。そして新しい仲間集めだと聞くや、墓に入るにはまだ早いと言わんばかりに参加を決める。一方で、レイナーはイエロージャケット隊長としての責務を理由に断り、カルヴァランは興味を示しながらも「今は動く時ではない」と静観を選ぶ。ロスウェンはあなたの申し出を侮辱と受け取り、荒々しい言葉で追い払う。鍛冶工房のフナンザは志の大きさを認めつつも仕事を離れられず、同行はできないが必要なら金属加工で協力できる、と条件付きの支援を提示する。</p><p>合流したアルフィノは、あなたが「英雄一行」の一員を引きつけたことに驚き、あなたの人脈こそ最良の切り札だと確信を深める。同時に、提督からの承認も得られたと報告し、次はグリダニアへ向かうようあなたに促す。彼は先に向かい、ノフィカの祭壇であなたを待つと言う。</p><p>グリダニアでも、あなたは勧誘を任される。そこで現れたのは、釈放されたばかりのローレンティウスだった。あなたの顔を見た瞬間、運命を呪うように取り乱しながらも、自分が過去にあなたに罪を暴かれた者だと名乗り、贖罪の機会を必死に求める。もはや木漏れ日の兵団は彼と関わろうとしない。だからこそ、この「試験中隊」こそが第二の機会だと彼は言い、変わった自分を信じてほしいと誓ってレヴナンツトールへ向かう。さらに、アリアンヌはコッパーベル鉱山で出会った頃のあなたを思い出し、今のあなたの歩みに感嘆しながら参加を決める。ただし、イシルデュールを無事に帰すまでは離れられないと約束する。だが、全員が首を縦に振るわけではない。セインギュルドは組織の役割が曖昧だと感じて辞退し、ウルサンデルは過去の罪と誓いに縛られ、自らを罪悪感の鎖に繋がれた囚人だと語って丁重に断る。</p><p>再び合流したアルフィノは、長老樹師からの承認が得られたと告げ、あなたが集めた人材の多様さに手応えを示す。そして最後の目的地としてウルダハへ向かう。勧誘を始める際は王宮警護を刺激しないよう、下層から当たるのがよい、と助言される。</p><p>ウルダハでは、反応はさらに辛辣で、噂も重い。ウィルレッドはリトルアラミゴでの一件を振り返り、操られていた自分を恥じた末に、世界を知り、悪に立ち向かう力を得たいと語る。そして、各地へ赴く機会だと聞くと迷いなく参加を申し出る。オーセンは教会と子どもたちを理由に断り、祈りだけを約束する。シントゴートは利益にならない組織に投資する気はないと拒絶し、ランデベルトは街の噂として「その組織はシンジケートの金で動く操り人形になる」と警告し、縁を切って逃げろとまで言う。イエロームーンは勧誘を求愛と取り違えたように取り繕い、憤ったふりであなたを追い返す。</p><p>王政庁で落ち合うと、アルフィノはあなたの成果を確かめ、少数でも礎にはなると受け止める。大災害後の混迷のなかで、Eorzea を救うという言葉は雲を掴むように聞こえるかもしれない。それでも、挑戦に立ち上がる者はいる――そしてその希望は、あなたが積み上げてきた勝利が生んだものでもある、と彼は語る。あなたが託した新たな仲間を無駄にはしない。彼らこそ新しい始まりの土台だと。</p><p>あなたが気にしているシンジケートの関与についても、アルフィノは正面から答える。自分も懸念した。だからこそ、提供された資金は一枚残らず出所を精査し、記録した。この組織は腐敗の上には築かれない、と。できれば外部の資金に頼りたくはないが、家の財力だけでは規模が支えきれないとも認める。噂と疑念は、成果で価値を示すまで消えない。だからこそ、一つひとつの成功で信頼を勝ち取るしかない。そう言って彼は、ライズングストーンズへ戻り、統一された Eorzea のための「最初の石」を据えようとあなたを促す。</p><p>その裏で、ナナモ・ウル・ナモはラウバーンに問いかける。アルフィノの大胆な試みに対し、ラウバーンは「大胆以上だ」と評し、統一された Eorzea への道を開くと見る。アルテマウェポンという共通の脅威と向き合ったのに、各国は近づくどころか遠ざかったように感じる――だからこそ、誰かが主導権を取ることを歓迎すべきだという。だがナナモは、協力を誓いながらも水面下の不満が消えない現実を語り、この強大な軍事組織が「誰に仕えるのか」を危惧する。暁の監視下でも、大きな悪が生まれうるのではないか。資金の相当部分がシンジケートの金庫から出ているのではないか。無節操な者たちが、集められた戦士を私兵へ変えてしまうのではないか――と。ラウバーンは暁への信頼を示し、あなたの存在にも触れて、あなたが裏切るとは考えられないと言う。ナナモはそれでも、人は変わることがある、と呟く。時代の出来事が砂嵐のように人を翻弄するのだ、と。そしてテレジ・アデレジについて問うが、ラウバーンはウルダハの法のもとでは有罪にできる証拠がないと告げる。根拠薄弱な逮捕は相手の思う壺だ。ナナモは怒りを抑えきれず、ほとんど反逆に等しいのに何もできないのかと嘆く。ラウバーンはただ、信じてほしいと言う――まだ終わってはいない。</p><p>ライズングストーンズに戻ったアルフィノは深く息をつき、この旅をすぐに繰り返したくはないと漏らす。それでも休むことはできない。努力の結実が目前にあり、創設式典の準備を整えねばならないからだ。あなたの時間を独占してしまったことを詫び、協力に感謝し、盟主もあなたが他の任務に戻れることを安堵するだろうと語る。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> アルフィノ <small class="muted">（石の家, X:6.1, Y:5.2）</small></div></div>`,

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'先鋒組織',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>在 primal 的威脅暫時被壓制之後，Minfilia 認為現在正是把注意力轉向「下一步」的時候。Alphinaud 早已為他構想中的組織鋪路許久，如今他需要你出手，讓這個提案從紙面走進現實。</p><p>Alphinaud 談起他的「大計畫」：自從第七星曆開始，三國領袖一直在商議一份協定，希望把 Eorzea 分散的力量整合成一個共同體——一支遍及全境的 Grand Company（Eorzea 各城邦的國家級軍事組織）。這個組織將從各地集結軍力，專門應對任何單一國家都無法獨自克服的威脅。目的本身沒有爭議，但設立的細節與運作方式卻陷入無止盡的拉扯；討論拖得越久，他越能感覺到「統一」的推力正在一點一點流失。</p><p>為了打破僵局，他主張先成立一個規模較小的「試驗部隊」——雖然比不上未來真正的 Grand Company，但同樣能像 Scions 那樣不受領土限制地行動。只要這支部隊能被成功運用，就能為停滯不前的協議注入新的動能。另一方面，因為這本質上是一支軍事力量，他也打算把新組織置於 Antecedent （Minfilia 的頭銜也就是「Scions of the Seventh Dawn」的領袖）的權威之下，以降低外界對「被濫用」的疑慮。Scions 為了守護 Eorzea 與人民不斷奔走，可你也親眼見過，像難民暴動那樣的事件會把人的力量推到極限；若有一支新部隊由 Scions 指揮，就能在不耗盡資源、也不過度壓榨你那份強大力量的情況下，回應更多樣的危機。</p><p>他強調，他的目標與 Scions 並無二致，這點相關人士都已承認。但要正式踏出第一步，他必須拜會三國領袖，取得他們的批准。這些手續既繁瑣又耗時，所以他希望你陪他同行；當他被迫周旋於各種文書與條款之間時，你要替他處理最實際的工作——招募第一批成員。第一站是 Limsa Lominsa，他要你們在 Bulwark Hall 會合。</p><p>抵達後，Alphinaud 準備上橋與 Admiral Bloefhiswyn 談定許可範圍並簽署文件，而你則被要求立刻開始招募。他相信比起只是放出消息，親自拜訪更能打動那些原本不會注意到這個機會的人。候選人是否已效忠其他機構並不重要，只要願意在需要時伸出援手即可；甚至不用跑到郊外，光是上層甲板就足以找到適合的人選。</p><p>你在 Limsa Lominsa 的人群之中逐一試探，回應卻各不相同。Riol 一見到你就大聲招呼，笑談你當初竟敢去找 Titan 的近路，還扯起 Company of Heroes （Eorzea 在第七靈災前就活躍的一支冒險者團體，以曾經討伐 Titan 與 Leviathan 而聞名）的往事，豪爽地表示他還沒打算把自己送進墳墓，立刻算他一份。可也有人毫不猶豫地拒絕：Reyner 以身為 Yellowjackets (Limsa Lominsa 的領土治安維持／沿岸防衛部隊（可理解為城邦的警備隊與地面部隊之一），負責在 Lominsan territory 維持秩序、巡邏並防衛沿岸與周邊聚落。他們原本是 Knights of the Barracuda（Lominsan navy）的一個分支；在 Calamity 之後轉為獨立編制，並被納入 The Maelstrom 的體系下，承擔新的職責) 的指揮官為由，說保護 Limsa Lominsa 必須是他唯一的優先；Carvallain 對「能在各地自由行動」的想法感到有趣，卻選擇先觀望；Rhoswen 直接把你的提議當成羞辱，粗聲怒罵；而 H’naanza 雖然佩服你的抱負，卻被 Naldiq & Vymelli’s 的職責綁在鍛造爐旁，只願意在你需要時以金工委託的方式提供支援。</p><p>當你回到 Alphinaud 身邊，他對你竟能引出 Company of Heroes 的成員表現出驚訝，並認定找你同行是正確的決定。另一方面，他也完成了自己的工作：Admiral Bloefhiswyn 同意簽署需要她批准的一切文件。他要你按照自己的步調前往 Gridania，並說他會在 Nophica’s Altar 等你。</p><p>在 Gridania，Alphinaud 又一次把招募交給你，因為他即將與 Elder Seedseer 會面。你開始尋找願意加入的人，卻先被一張熟悉又令人不快的面孔攔住——Laurentius。對方像是被命運捉弄一般驚慌失措，隨即自報姓名，承認你曾揭穿過他的罪行；他急切地詢問你是否還記得他，並在得到回應後立刻轉入求生般的坦白：Wood Wailers 已經不會再跟他有任何瓜葛，而這支新部隊或許正是他一直在找的「第二次機會」。他說自己已經改變，並宣稱會立刻前往 Revenant’s Toll。</p><p>你也再次遇見 Alianne。她勸 Isildaure 別再逞強，轉頭看見你時，語氣裡帶著久別重逢的驚喜，還提起你從 Copperbell Mines 那時的菜鳥走到如今的距離。當你說明來意，她認為你的目標毫無疑問是正當的，也下定決心加入——只要她先把 Isildaure 安全送回家。然而並非所有人都願意點頭：Ceinguled 覺得你的組織職責不夠聚焦，必須等更「有條理」才肯答應；Ursandel 則坦言你提出的是新的開始，但他被過去的罪與誓言鎖住，只能以愧疚與怯懦打造的枷鎖困住自己，因而婉拒。</p><p>你回去向 Alphinaud 報告，他說 Elder Seedseer 對你們的需求十分配合，並對你招到的人選感到興味：有前 Wood Wailer (Gridania 的治安／巡邏部隊，以槍術士為主，負責在 Twelveswood 內維持秩序、處理內部衝突與違法行為，可把他們理解成 Gridania 的「警備隊／森林巡邏」)，也有老練的冒險者，你們的隊伍至少不會缺少多樣性。接著他催促你們趁熱打鐵前往 Ul’dah，並提醒你最好先從下層開始招募，別讓 sultana 以為你們在挖她親衛隊的角。</p><p>在 Ul’dah，街頭的態度更尖銳，流言也更陰沉。Wilred 一眼就認出你，回想起 Little Ala Mhigo 那場災難——若不是你，他和更多朋友恐怕早已死去。他承認自己曾經愚蠢、也太容易被操弄，所以他想成為更「懂世事」的人；當你說這支新部隊會帶他走遍各地時，他認為那正是自己需要的機會，並表示他已經準備好去對抗他如今確信存在的邪惡。Ourcen 感謝你過去的援手，但他無法離開教會與孩子，只能為你們祈禱。Syntgoht 乾脆拒絕，說他連隔壁攤位的抱怨都受不了，更別說跨國的難題，投資一個沒有利潤空間的組織只會讓他更倒楣。Landebert 則用更直接的語氣警告你：街上的傳聞說你們的資金來自 Syndicate 的腐敗金錢，你們光鮮的新部隊將成為聽命於他們的傀儡；他勸你切斷關係、快逃。Yellow Moon 把你的招募當成唐突的搭訕，誇張地拒絕你，聲稱她早已有所歸屬，並要你把「粗俗的愛意」帶去別處。</p><p>回到 Promenade，Alphinaud 問你在 Ul’dah 招募得如何，並在聽見成果後平靜地評估：只有一名 Ala Mhigan 青年固然不多，但仍是一個值得肯定的開端。他說在大災變之後的動盪歲月裡，「拯救 Eorzea」聽起來像伸手抓雲一樣不真實；可即便如此，仍有人願意站出來，而這份希望也很大一部分源自於你一路取得的勝利。他向你道謝，並承諾不會浪費你交到他手裡的這份珍貴託付——這些新招募的人將成為「新的開始」的根基。</p><p>你對 Syndicate 的介入感到不安，Alphinaud 也不迴避。他說他同樣在意，所以每一枚資助的 coin 都被仔細追查來源並記錄在案，這個組織不會建立在腐敗之上。雖然他寧願不靠外部資金，但就算加上他家族的財力，也無法單獨支撐如此規模的計畫。至於謠言與懷疑，他說在部隊證明價值之前都不會消失；你們只能一次又一次用成功去換取信任。說到這裡，他要你不再浪費時間，和他回到 the Rising Stones，準備為「統一的 Eorzea」鋪下第一塊石頭。</p><p>在權力的陰影處，Nanamo Ul Namo 問 Raubahn 對 Alphinaud 的大膽計畫有何看法。Raubahn 認為這不只是大膽，而是能為統一的 Eorzea 鋪路；自從共同面對 Ultima Weapon 之後，三國似乎不是更團結，而是更疏離，所以有人願意主動踏出這一步，反而該感到慶幸。Nanamo 卻坦言，表面上都承諾合作，私下仍充滿抱怨；Ul’dah 也不是唯一口是心非的地方。她擔心這支匯集三大 Grand Companies 精銳的軍事力量會變得可怕——它究竟會服務誰？即使在 Scions 的監督之下，也並非不可能做出巨大的惡行。更令她不安的是財務來源：若大量資金來自 Syndicate （Ul’dah 掌握權勢與資源的財閥高層）的金庫，那些無恥之徒是否會把這群戰士鍛造成自己的私兵？Raubahn 則表示他信任 Scions，也認為在這種情勢下拒絕增援並不明智；他補充捐助者眾多，而且貴族的金錢並非出自 Lolorito 與其黨羽之手。最後，他提到你也參與其中，並相信你不會背叛他們的共同目標。Nanamo 雖然承認你的存在是一份保障，卻仍低聲說自己見過人改變；這個時代的事件會把人拋來甩去，就像沙漠裡跳躍的塵旋。她問能不能對 Teledji 做點什麼，Raubahn 回答他已嘗試所有途徑，但依 Ul’dah 現行法律，他們缺乏能定罪的證據；若用站不住腳的理由逮捕，只會正中對方下懷。Nanamo 因此憤怒到近乎失控：對方幾乎已經犯下叛國，卻仍然束手無策，這樣的政府與王室究竟有何用？Raubahn 要她保有信心，因為一切還沒有結束。</p><p>回到 the Rising Stones，Alphinaud 長嘆一口氣，說這趟奔波他短時間內不想再重來一次。但他不能停下來休息，因為你們努力的成果已經近在眼前，他必須著手準備創設典禮。他感謝你讓他長時間占用你的協助，並說 Antecedent 一定也會放心，因為你終於可以回去處理其他任務了。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 阿爾菲諾 <small class="muted"> 石之家（X:6.1, Y:5.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="guardian-of-eorzea.html">絕不倒下</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="heretical-harassment.html">喧囂的街角</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
