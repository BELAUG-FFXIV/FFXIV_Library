    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Alphinaud admits to you that he knows, in some small measure, the pressure leadership can bring—and the way it can make a person crumble. If there is anything redeeming in his failures, he says, he hopes it is this: that he can help others avoid the same mistakes. Alisaie cuts through it all with a blunt certainty—whether Wuk Lamat fears alpacas or gets sick on boats changes nothing about who she is, or what she means to her people. Krile is simply glad you all took the time to talk, because Wuk Lamat looks lighter for it—and Wuk Lamat herself declares she’s ready to move on.</p><p>Erenville tells you Earthenshire, the Moblin settlement, lies not far ahead—but the road is a favored hunting ground for bandits. With the stairs impassable, fewer travelers will pass through, he warns, which means desperate brigands will be hungrier for victims. Still, he adds—glancing at your company—his concern may be unwarranted. Wuk Lamat immediately bristles at the thought, demanding what Zoraal Ja and the Landsguard have been doing, and proclaiming it her duty to restore order. Erenville can only sigh as she charges ahead in spirit, and leads you west toward the bank of the second river.</p><p>Near the river, Erenville notes the bandits’ lair is said to be somewhere close, but he would rather not go looking for trouble. Krile recognizes the waterway as the river that feeds the waterfalls above Ok’hanu. Alphinaud, once again, is struck by the falls’ majesty, struggling to comprehend the sheer volume of water they produce. Alisaie tells you she felt eyes on the group more than once along the way—only for that attention to fade as quickly as it came. When Wuk Lamat demands to know where the bandits are, Erenville answers plainly: they aren’t foolish enough to attack a party this large—though he still urges vigilance as Earthenshire waits across the bank of Miyakabek’zoma.</p><p>At last you reach Earthenshire, and Wuk Lamat announces the village with open curiosity. Krile stares at the surroundings in wonder—it feels as though the entire settlement is made of pottery. Alphinaud observes that just as Hanuhanu culture differs from the Vanu, Moblin society has developed in a way wholly unlike their goblin cousins. Alisaie scans the area and notes no other claimant is in sight, leaving you to wonder whether that means you’re ahead…or behind. Erenville points out that this is the village where the “Lay of Pots” from the Tuliyollal Saga took place, and the name’s resemblance to Idyllshire makes Alphinaud briefly muse about shared inclinations—until Alisaie remarks that the two settlements couldn’t be more different.</p><p>An elderly Moblin woman wheezes out a cheerful welcome to the Third Promise and her retinue, and Wuk Lamat gets straight to the point: you’re here for the Dawnservant’s elector. The Moblin introduces herself as Rediroq—and reveals, without ceremony, that you’re speaking to the elector you seek. Wuk Lamat is almost relieved at how direct that is, eager to move on to the feat, but Rediroq insists a more pressing crisis comes first: the storm shattered cliffs, rocks fell, and many helphands for the potsworn were injured. This is no time for feats or tests of mettle. When Wuk Lamat asks what “potsworn” means, Erenville explains: they are goldsmiths contracted to work for the Moblins, named for the pot-like workshops where they practice their craft, and Earthenshire supplies them with tools, materials, and quarters so they can devote themselves to creating Tural’s finest metalwork.</p><p>A disappointed artisan snaps that this is unacceptable—he was promised no distractions—and threatens he should never have left Wachumeqimeqi. Rediroq shows you the consequence in real time: the potsworn are ready to desert, and without enough healthy helphands, the Moblins cannot uphold their side of the potpact. If the artisans leave, Earthenshire will grind to a halt. Wuk Lamat proposes you stand in for the injured helpers so the potsworn can have the “goodliving” they were promised—and you choose to help. Erenville agrees at once that all of you will lend a hand, and Rediroq gratefully assigns you and the Third Promise to assist helphand Rakorok while the others follow her to aid elsewhere. As you set off, Wuk Lamat thanks you, repeats that she will stop feigning strength, and tells you she intends to learn from how practiced you are at helping those in need—calling you an incredible mentor at her side.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>アルフィノは、指導者としての重圧を多少なりとも知っているとあなたに語り、そしてその重さに押し潰されるように崩れてしまった経験もあると言う。もし自分の失敗に意味があるのだとしたら、それは同じ過ちを他者が繰り返さぬよう助けられることだろう、と。アリゼーはきっぱりと言い切る――ウクラマトがアルパカを怖がろうが、船で酔おうが、それで彼女が何者か、民にとって何を意味するかは変わらない。クルルは、腹を割って話す時間を持ててよかったと安堵し、ウクラマトがそのおかげでずっと晴れやかに見えると言う。ウクラマト自身も「次へ進む準備はできた！」と勢いよく宣言する。</p><p>エレンヴィルは、モブリンの集落「アーセンシャイア」はすぐ近くだが、これから通る道は盗賊の狩場になっていると警告する。階段が通れない今、旅人が減るぶん、連中は待ち伏せの獲物に飢えているはずだという。だが、今の顔ぶれを考えれば心配は杞憂かもしれない、とも付け加える。ウクラマトは「街道に盗賊！？」と憤り、ゾラージャとランドガードは何をしているのかと噛みつき、秩序を取り戻すのは自分の役目だと息巻く。エレンヴィルは「また始まったか」とでも言いたげに受け流し、とりあえず西へ向かい、二本目の川の岸を目指そうとあなたを促す。</p><p>川辺に近づくと、エレンヴィルは盗賊の巣がこのあたりにあるらしいが、わざわざ厄介事を探しに行くつもりはないと言う。クルルは、ここがオク・ハヌの上にある滝へ注ぐ川だと気づく。アルフィノは何度見ても滝の壮大さに圧倒され、この自然の驚異が生み出す水量を思うと気が遠くなると漏らす。アリゼーは道中で何度も視線を感じたが、すぐに興味を失ったようだったとあなたに伝える。盗賊はどこだと詰めるウクラマトに、エレンヴィルは冷静に答える――この人数に手を出すほど愚かではないのだ、と。それでも警戒は解くなと言い、川「ミヤカベクゾマ」の対岸にアーセンシャイアがあると告げる。</p><p>やがてアーセンシャイアに到着し、ウクラマトは目を輝かせて集落を見渡す。クルルは驚嘆し、村全体が焼き物でできているみたいだと言う。アルフィノは、ハヌハヌの文化がヴァヌと異なるのと同じく、モブリンの社会もゴブリンの従兄弟とはまったく違う方向に発展したのだろうと評する。アリゼーは周囲を探るが、他の誓約者の姿は見えず、先行しているのか遅れているのかと首をかしげる。エレンヴィルは、こここそがトライヨラルの叙事詩にある「壺の詩」の舞台だと示し、アルフィノは名前がイディルシャイアに似ているのは文化的な気質だろうかと考える。だがアリゼーは、片や壺を模した造り、片や転用された町で、集落そのものはまるで別物だと指摘する。</p><p>年老いたモブリンの女性が、第三誓約とその一行へ息を切らしながら歓迎の挨拶をする。ウクラマトは即座に、暁王の選定者を探していると告げ、相手はレディロクと名乗って「今まさにその選定者と話している」と言い放つ。ウクラマトは、これで試練へ一直線だと喜びかけるが、レディロクは切実な問題が先だと訴える――嵐で崖が崩れ、落石で多くのヘルプハンドが負傷し、今は試練や度胸試しどころではないのだ。ウクラマトが「ポッツスウォーン」とは何かと尋ねると、エレンヴィルは説明する。モブリンが雇う金細工師たちで、壺のような工房で作業することからそう呼ばれ、アーセンシャイアは道具も素材も住まいも用意して、彼らにトラル随一の金属加工を生み出させているのだ、と。</p><p>失望した職人が「約束が違う、邪魔ばかりだ」と不満をぶちまけ、ワチュメキメキを離れなければよかったと吐き捨てる。レディロクはあなたに現状を見せる――ポッツスウォーンが去れば、ポットパクトは破れ、アーセンシャイアは止まってしまう。負傷者の代わりになるヘルプハンドが足りず、急いで手を打たねばならないのだ。ウクラマトは、負傷した手伝いの代わりに自分たちが働こうと提案し、あなたは迷わず手を貸すと決める。エレンヴィルも全員で助けると言い、レディロクは喜んで受け入れて、あなたと第三誓約にはヘルプハンドのラコロクを手伝うよう割り振り、他の仲間は別の支援へ向かわせる。動き出す前にウクラマトはあなたへ感謝し、もう見栄で強がる誓約者の真似はしないと繰り返したうえで、困っている者を支えることに長けたあなたを「頼れる師」としてそばに置けることを最大限に活かしたいと言う。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> エレンヴィル <small class="muted">コザマル・カ (X:33.0, Y:24.4)</small></div></div>`,
unlockq:`<div class="stack">

<div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 92</div>
</div>`,

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'收集之民—莫布林族',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Alphinaud 對你坦白，他多少也體會過領導的壓力——而且你很清楚，他也曾在負擔那種沈重下崩潰過。若說那些失敗還留下了什麼「好」，他希望那會是：讓他能幫助別人避開同樣的錯誤。Alisaie 直接把話說穿：就算 Wuk Lamat 怕羊駝、就算她一坐船就暈，也不會改變她是誰，更不會改變她對人民的意義。Krile 很高興你們能把話說開，因為 Wuk Lamat 看起來明顯輕鬆許多；而 Wuk Lamat 也抬起頭，乾脆俐落地說——她準備好繼續往前了。</p><p>Erenville 告訴你，Moblin 的聚落 Earthenshire 離這裡不遠，但要先提醒：你們要走的那條路，是盜賊最愛埋伏的狩獵場。現在階梯走不通，來往旅人會更少，意味著那些匪徒更急著找目標下手——不過，他看了看你們這群人，又補上一句：以「目前的同行者」來說，他的擔心大概是多餘的。Wuk Lamat 一聽到「路上有盜賊」就火了，質問 Zoraal Ja 和 Landsguard 到底在幹嘛，還說看來只能由她來整頓這一帶。Erenville 只能嘆口氣，先帶著你往西走，目標是第二條河的河岸。</p><p>走到河邊，Erenville 說盜賊的巢穴據說就在附近，但他寧可別去主動找麻煩。Krile 這才看出來：這條河正是供給 Ok’hanu 上方瀑布的水源。Alphinaud 又一次被瀑布的壯麗震住，說那種水量讓人很難想像這片自然奇景到底能吐出多少洪流。Alisaie 則提醒你，她一路上不只一次感覺到有人在盯著你們，但那些視線很快又像是失去興趣般退去了。Wuk Lamat 忍不住追問盜賊在哪裡；Erenville 回得很直接：他們還沒蠢到去襲擊這種規模的隊伍。不過他仍要你們保持警戒，因為 Earthenshire 就在 Miyakabek’zoma 的對岸，再往前不遠就是了。</p><p>你們抵達 Earthenshire，Wuk Lamat 望著聚落，語氣裡滿是新鮮感。Krile 驚呼，這地方簡直像整個村子都是陶器做成的。Alphinaud 也說，就像 Hanuhanu 的文化與 Vanu 截然不同，Moblin 的社會也發展出與 goblin 親族完全不同的樣貌。Alisaie 四下張望，沒看到其他誓約者的身影，不禁懷疑：這代表你們走在前面……還是其實落在後頭？Erenville 指出，這裡正是 Tuliyollal Saga 裡〈Lay of Pots〉發生的村落；Alphinaud 因為 Earthenshire 的名字想起 Idyllshire，一度猜測是不是某種文化偏好。但 Alisaie 立刻反駁：兩者根本不像——一個是刻意把聚落打造得像「壺」，另一個只是把舊城鎮再利用而已。</p><p>一位年邁的 Moblin 婦人喘著氣，卻仍用滿滿精神向第三誓約與隨行一行人打招呼。Wuk Lamat 乾脆地說你們是來找 Dawnservant 的 elector；對方則自報名號 Rediroq，還直接告訴你——你此刻就在跟 elector 說話。Wuk Lamat 本想就此立刻開始試煉，Rediroq 卻說眼下有更急的麻煩：暴風襲擊後，崖壁碎裂、落石砸下，許多幫手 helphands 受了傷，這根本不是做 feats 或 mettletests 的時候。當 Wuk Lamat 問「potsworn」是什麼，Erenville 便解釋：那是受 Moblin 聘用的金匠，因為他們在像壺一樣的工坊裡工作，才有這個稱呼。Moblin 會提供 potsworn 工具、材料、住處——一切所需，讓工匠能專心打造被譽為 Tural 最頂尖的金屬與金工作品。</p><p>偏偏此刻就有職人不滿抱怨：這太離譜了，他明明被保證不會有干擾，甚至後悔離開 Wachumeqimeqi。Rediroq 讓你看清現實——potsworn 正打算離開，而你們現在缺少能動的 helphands，導致 Moblin 無法履行與工匠之間的 potpact。若 potsworn 真的全走了，Earthenshire 會直接停擺，所以必須立刻想辦法。Wuk Lamat 提議由你們頂替受傷的幫手，讓 potsworn 能重新擁有他們承諾中的「好生活」；你選擇立刻幫忙。Erenville 也表示大家都會出手，Rediroq 便把你與第三誓約分派去協助 helphand Rakorok，其餘同伴則跟著她去支援其他受困的人。動身前，Wuk Lamat 感謝你願意一起扛起這件事，並再度強調：她不會再假裝自己是無敵的誓約者。她也直白地對你說——一路走來，她最清楚你有多擅長幫助需要幫助的人，而她要把「你在身邊」這件事好好用到極致，因為你就是她最可靠的指引。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
