    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Aymeric notes, with restrained gravity, that yet another caravan has been waylaid by Iceheart’s followers—an incident made all the more troubling by how often that name has reached his ears of late. Alphinaud can only sigh at the timing: just as progress was beginning, the blow lands, and worse still the caravan was bound for Revenant’s Toll. He refuses to indulge in fatalism, but insists on learning more at once, proposing that you speak with Lord Haurchefant and hear what he has discovered.</p><p>At Camp Dragonhead, impatience and unease ripple through the gathered knights. Yaelle is aghast that heretics would dare raid a caravan escorted by House Fortemps, while a taciturn Temple Knight dismisses Alphinaud outright—he has come to hear Haurchefant, not him. Haurchefant apologizes for the interruption, but says the situation demands swift action. Iceheart’s heretics ambushed the caravan as it passed through Boulder Downs—swift and ruthless. In an instant, every knight was slain, every crate seized, and then the attackers vanished as quickly as they appeared. The taciturn knight points out what that implies: such a feat would be impossible without knowledge of the route, known only to a select few. Alphinaud agrees the lead is worth pursuing, but not yet—the trail is still warm, and the first priority must be the scene itself before evidence is lost. He turns to you, trusting your knack for hidden truths, and asks you to inspect the ambush site in person. Haurchefant tells you to inform his men when you arrive; they will share their findings.</p><p>At Boulder Downs, a House Fortemps knight recognizes you and shows you what remains: not a single crate left behind, the wagon even tipped for good measure. He admits the whole thing feels strange—stealing would have been easier, but concealing such a haul would be harder, suggesting the attackers likely came prepared with wagons hidden nearby. Yet he concedes he has no proof, and offers you no answers. If you want something factual, he says, speak to the squire being treated at the Observatorium—if he is awake. Unlike the knight, the squire was there.</p><p>At the Observatorium, the surviving squire confirms you have come about the attack and forces himself through the memory. Before the entrance to the Hall of the Seven Echoes, they encountered what seemed to be pilgrims—lost, ill-equipped to go farther north. Their leader called out, and one stepped forward to answer: a young girl with silver hair flowing in the wind like melting snow. The squire thought she was a lost lamb seeking salvation, and he believes their leader must have thought so too, else he would never have let her approach so close. They exchanged words the squire could not hear. She leaned in as if to kiss his cheek—and then the leader sighed and crumpled to the ground. Only when the snow turned red did the squire understand.</p><p>After that, the world became red. He tried to fight, but took a blow to the head; when he came to, everyone else was dead and the heretics were unloading the wagon. He stayed still—if he had moved, they would have killed him—and listened as they spoke of deliverance and resurrection. And they spoke of Shiva. They truly believe they can resurrect Shiva, the squire says, desperate for reassurance that such a thing cannot be possible.</p><p>You return to Camp Dragonhead, where the survival of the squire is met with relief. Alphinaud asks for your report, and Haurchefant remarks that Lady Iceheart does not scruple to bloody her hands. Alphinaud seizes on what matters most: who is this “Shiva” the heretics spoke of? The taciturn Temple Knight answers with sharp disdain—Shiva was a traitor and apostate who lay with dragons—while Haurchefant reminds him not to expect foreigners to know Ishgardian scripture, especially the patron saints of heretics. That single phrase snaps Alphinaud’s thoughts into place. He demands to know what the caravan carried, and Haurchefant recalls that the Diamond Forge had requested a large quantity of crystals.</p><p>Alphinaud lays out the conclusion: Iceheart and her followers mean to summon Shiva, as a beast tribe would a primal—why else go to such lengths to secure crystals? The taciturn knight says he will inform the lord commander at once, urging discretion, and Haurchefant agrees. Alphinaud affirms that the Scions of the Seventh Dawn are sworn to combat the primal threat, so their support is assured. He must send word to his brethren in Revenant’s Toll: the entire order must turn its efforts toward preventing this summoning—and naturally, he says, that includes you.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>アイメリク卿は言う。アイスハートの信徒によって、またしてもキャラバンが襲撃された――その名は近頃しばしば耳に入ってくる、と。アルフィノはため息をつく。ようやく前進し始めた矢先に、しかも襲われたのはレヴナンツトール行きの荷だ。神々が結託して妨げているとでも言いたくなるが、そんな考えに縋るつもりはない。まずは襲撃の詳細を知るべきだとして、オルシュファン卿に話を聞こうと提案する。</p><p>ドラゴンヘッドでは、空気がざわつく。ヤエルは、フォルタン家の騎士が護送するキャラバンを襲うなど、異端者がどれほど大胆になったのかと憤り、寡黙な聖堂騎士は「私はオルシュファン卿の話を聞きに来たのであって、お前の話ではない」とアルフィノを突き放す。オルシュファンは割り込みを詫びつつも、事態が事態ゆえ迅速に動かねばならないと言う。アイスハートの異端者が、ボルダー・ダウンズを通過中のレヴナンツトール行きキャラバンを待ち伏せしたのだ。瞬く間に護衛の騎士は全滅し、木箱はすべて奪われ、襲撃者は現れたときと同じ速さで姿を消した。寡黙な騎士は、これは経路を知る限られた者の情報なしには不可能だろうと指摘する。アルフィノも同意し、追及は後で必ず行うと言うが、まずは現場だ、と判断する。痕跡はまだ新しい。証拠が失われる前に動くべきだ。</p><p>そこでアルフィノは、真実を見抜く勘があるあなたに、現場を直接調べてほしいと頼む。オルシュファンも賛成し、到着したら部下に目的を伝えれば、彼らが調査結果を共有すると言う。アルフィノはドラゴンヘッドに残るので、何か掴んだらすぐ戻るようにと告げる。</p><p>ボルダー・ダウンズでは、フォルタン家の騎士があなたを見て態度を改め、襲撃の痕跡を示す。木箱はひとつも残されず、荷車は念入りに横倒しにされていた。盗むだけならもっと容易だったはずだが、あれだけの荷を隠すのは難しい――だから襲撃者は、どこか近くに自前の荷車を潜ませていたのではないか、と彼は推測する。だが証拠がない以上、憶測にすぎないとも言う。確かな話が欲しいなら、襲撃を目撃した生存者――観測所で治療を受けている従騎士を訪ねるべきだ、と。</p><p>観測所の従騎士は、あなたが襲撃の件で来たのだと悟り、震える声で語り始める。彼らは「七つのこだまの間」手前で、巡礼者らしき一団に出会った。北へ進むには不慣れで、迷い、心細そうだった。隊長が呼びかけると、一人が返答のために前へ出た。銀の髪を風に揺らし、溶ける雪のように流れる若い娘だった。迷える子羊が救いを求めているのだと彼は思った。隊長もそう思ったのだろう、だからこそ彼女を近づけたのだ、と。聞こえない言葉を交わしたあと、彼女は頬に口づけするかのように身を寄せ――次の瞬間、隊長はため息をついて崩れ落ちた。雪が赤く染まったのを見て、ようやく何が起きたかを悟った。</p><p>あとは赤い光景ばかりだった。彼は抵抗しようとしたが頭を殴られ、目を覚ましたときには皆が死に、異端者が荷車を運び出していた。動けば殺される。だから彼は息を潜め、彼らの会話を聞いた。彼らは「救済」と「復活」を語り、そして「シヴァ」の名を口にした。彼らは本気でシヴァを復活させられると信じている――そんなことがあり得るのか、と従騎士は怯えながら繰り返す。</p><p>ドラゴンヘッドへ戻ると、従騎士が生きていたことに安堵の声が上がる。アルフィノは報告を求め、オルシュファンはアイスハートが血で手を汚すことをためらわないと呟く。アルフィノが「シヴァとは何者か」と問うと、寡黙な聖堂騎士が冷たく言い放つ。シヴァは同胞を裏切った背教者であり、竜と交わった者だ、と。オルシュファンは、異端者の守護聖人に関する聖典まで外国人に求めるのは酷だとたしなめる。だが「守護聖人」という言葉で、アルフィノはすべてを理解する。彼はキャラバンの積荷を問い、オルシュファンはダイヤモンド・フォージが大量のクリスタルを求めていたと答える。</p><p>アルフィノは結論を告げる。アイスハートと信徒は、獣人部族が蛮神を呼ぶのと同じように、シヴァを召喚しようとしている。だからこそ、これほどの犠牲を払ってクリスタルを奪ったのだ。寡黙な聖堂騎士は直ちに総長へ報告すると言い、最優先すべきは慎重さだと念を押す。オルシュファンも同意する。アルフィノは、Scions of the Seventh Dawn は蛮神の脅威と戦うことを誓っているのだから支援は当然だと言い、レヴナンツトールへ急ぎ連絡して、組織全体で召喚阻止に動くと決める――そして当然、あなたもその一員だ、と。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>Aymeric 聽完通報後冷靜地說：又有一支車隊被 Iceheart 的追隨者襲擊了——而這個名字，他最近已經聽過太多次。Alphinaud 只能嘆氣，說你們才剛覺得事情有了進展，偏偏又被打斷；更糟的是，那支車隊偏偏還是要送去 Revenant’s Toll。若他有那個興致，甚至會懷疑十二神是不是聯手跟你們作對——但他沒有。他要知道這次襲擊的更多細節，並提議先去找 Lord Haurchefant，聽聽他掌握了什麼。</p><p>回到 Camp Dragonhead，Alphinaud 一度急著說你們必須追上異端者，但他又立刻壓住衝動，承認現在貿然行動沒有意義，先聽 Lord Haurchefant 怎麼說。周圍的情緒同樣繃緊：Yaelle 震驚異端者竟敢襲擊由 House Fortemps 騎士護送的車隊；而一名寡言的 Temple Knight 則冷冷丟下一句，他是來聽 Lord Haurchefant 發言的，不是來聽 Alphinaud。</p><p>Haurchefant 向眾人致歉，表示情勢緊迫，必須迅速行動。他說，Iceheart 的異端者在 Boulder Downs 對那支前往 Revenant’s Toll 的車隊下手——這是一場伏擊，乾脆、迅猛、毫不留情。轉眼間，護送的騎士全數被殺，所有貨箱被搶走；下一瞬間，襲擊者又像出現時那樣迅速消失。那名 Temple Knight 指出：若沒有掌握路線，根本不可能做到這種程度——而這種資訊，想必只掌握在少數人手裡。Alphinaud 表示確實如此，並說那條線索之後一定要追查；但眼下更要緊的是趁痕跡還新，先去看伏擊現場，免得關鍵證據流失。他也點名你，說你向來擅長從細節看出真相，乾脆由你親自去查。Haurchefant 也贊同，要你抵達後先告知他的部下，他們會把現場的調查結果交給你。</p><p>你到了 Boulder Downs，一名 House Fortemps 的騎士先是要你別靠近，聽到是 Haurchefant 交代後立刻改口致歉，並告訴你現場狀況：貨箱一個都沒留下，連車都被翻倒，像是刻意補上一腳。那名騎士也覺得整件事怪——如果只是要偷走貨物，其實不必把場面弄成這樣；但要把這麼大批貨「藏起來」又不容易，所以他猜襲擊者很可能事先準備了自己的車隊，藏在不遠處直接接應。不過他也承認這些都只是推測，沒有證據就只能算他多話。若你想要更確定的說法，他建議你去找在 Observatorium 接受治療的倖存從騎——前提是對方醒著。畢竟那名從騎真的在場，而他不在場。</p><p>你在 Observatorium 見到倖存從騎，他看見你就知道你是為襲擊而來，便把自己記得的一切硬撐著說完。他說他們在 Hall of the Seven Echoes 的入口前遇到一群人，乍看像朝聖者，迷路、準備不足，看起來根本不該再往更北走。他們的領頭上前詢問，其中一個人走出來回話。那是一名銀髮的年輕女子，髮絲在風中飄動，像融雪般流瀉。他當時以為那只是個迷失的孩子，像走失的羊羔一樣在尋求庇護；而他也相信領隊同樣這麼想，否則不會讓她靠得那麼近。兩人交談了幾句，他聽不清內容，只看見那女子微微前傾，像是要吻上領隊的臉頰，下一瞬間，領隊嘆了口氣，整個人就倒了下去。他直到看到雪地被染紅，才意識到發生了什麼。</p><p>接下來，他說自己眼前只剩血色。他試著反抗，卻被敲了頭；等他醒來，其他人都已經死了，異端者正把貨物從車上卸下。他不敢動——他知道一動就會被殺，所以只能躺著，聽他們談話。那些人反覆提到「救贖」與「復活」，然後他聽見了「Shiva」這個名字。他說那些人聽起來真的相信自己能讓 Shiva 復活，而他自己卻只剩下恐懼：那怎麼可能？怎麼可能……</p><p>你回到 Camp Dragonhead 時，眾人為那名從騎還活著而鬆了口氣。Alphinaud 要你回報所知，Haurchefant 低聲說 Lady Iceheart 下手時毫不猶豫。Alphinaud 緊接著追問：異端者口中的「Shiva」到底是誰？那名 Temple Knight 冷冷反擊，質問 Alphinaud 難道連 Enchiridion （Ishgard 的教義）都沒讀過——Shiva 是背叛同族的叛徒，是與龍為伍的背教者。Haurchefant 則勸他別這麼苛刻，畢竟不該要求外人熟知 Ishgard 的經文，尤其還是異端者所奉的「守護聖人」。</p><p>「守護聖人」這幾個字讓 Alphinaud 立刻想通了。他轉向 Haurchefant 問車隊載了什麼貨；Haurchefant 回想，似乎是 Diamond Forge 訂了一大批 crystals。Alphinaud 於是說得更直接：Iceheart 與她的追隨者打算召喚 Shiva——就像獸人部族召喚 primal 一樣；不然他們何必冒著如此大的風險也要搶到 crystals？那名 Temple Knight 表示會立刻把消息通報給 lord commander，並強調此事最重要的是「謹慎」。Haurchefant 也同意。Alphinaud 則表明：Scions of the Seventh Dawn 本就誓言對抗 primal 的威脅，你們的支援理所當然。他必須立刻把消息送去 Revenant’s Toll，讓整個組織都把重心轉向阻止這場召喚——當然，也包括你。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 阿爾菲諾 <small class="muted"> 庫爾札斯中央高地（X:26.7, Y:17.0)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="coming-to-terms.html">來自皇都的特使</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="strength-in-unity.html">嚴寒中的合作</a></div></div>`

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
