    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>The talk in the Backroom remains heavy. You hear that the mood outside is still grim, and that even those who remember life before the soul system are unsettled—speaking aloud of whether they will ever be reunited with old friends and family before they pass on. With good reason, too: for those who have grown old, the journey home will not be easy, and so it has mostly been the young who have been leaving for Tural—those with no elders depending on them.</p><p>You learn that the problem has reached Tuliyollal as well. Koana is doing what he can to restore operation of the Xak Tural railroad so people can travel more freely, but the tracks only run as far as Vanguard, meaning some travel on foot will still be necessary. Even so, a functioning railroad would ease the burden—and while Shale works on the data, you decide to go and see the state of the line for yourselves, and to report back through your network if there is any good news.</p><p>When you arrive, Koana asks that you continue supporting the Alexandrians as best you can, and those overseeing the work admit operations are still suspended, though they try to remain optimistic. You are greeted in Sheshenewezi Springs, where you ask for news of the railroad—and are told that the Vow of Reason is also coming to assess the situation. Before long, Erenville appears in new attire, explaining that his transition from gleaner to independent contractor has been approved, and he needed clothing more fitting for the role.</p><p>Koana presses for a report, and you hear that a new locomotive is close to completion—but they are struggling to bring her properly into service. When the original Dawnblazer was used to enter the dome, urgency outweighed all else; now the old problem returns: how to run the railroad without upsetting the inhabitants of Mehwahhetsoan. The rroneek are easily spooked by the noise, and the Hhetsarro who follow them are none too pleased to see their hhetso distressed. Koana has devised a way to quieten the railroad, yet a silent train brings another danger—the rroneek must be deterred from wandering onto the tracks, and they cannot simply sound a whistle without causing panic.</p><p>Though the routes were plotted to avoid the rroneek’s preferred grazing areas, you learn their grazing patterns have shifted since the tracks were laid, for reasons unknown. Erenville intends to ask Mehwahhetsoan for insight, and Koana agrees that, as someone championing the railroad, he has a duty to listen to those most affected. You go to the Hhetsarro encampment and meet their leader, Hhwato, who has already noted the rroneek’s unseasonal movement westward—toward the railroad—despite no apparent problem with the grazing in the usual grounds.</p><p>Koana then speaks of his own ties: he is of Hhetsarro descent, yet has no memory of traveling with the rroneek. He was left behind as a babe during a migration and survived only because a kind Pelu merchant found him, took pity, and taught him a trade. He later became a stallkeeper in Tuliyollal, where the Dawnservant found and adopted him, and he swore to be there for his sister when she too arrived, having been cast aside. Hhwato cannot believe any Hhetsarro would willingly leave their own child behind without exceptional cause, and when you challenge Koana—asking whether he would want to know if there had been good reason—he concedes. He asks to be taught of the rroneek and what they mean, promising to listen with an open mind.</p><p>While Koana begins learning, you are welcomed to look around and do as the Hhetsarro do. Tools are placed in your hands, and you offer help where you can—mending coverings, learning how durable rroneek hide is, and hearing how the herd sometimes splits, forcing the people to part with half their number as well. You are taught the wish they exchange when they separate—hoping to meet again wherever they are guided—and you are tested with a question about what the hhetso provide for medicines, soap, fires, and even flavoring. You also learn hands-on care, brushing a rroneek’s tangled coat until it lies tidier, even as your own clothes end up coated in the work.</p><p>When you regroup, Koana admits he was sent to graze the rroneek and found himself wandering as his companion chose—forcing the path felt wrong. As you share what you learned, he says he felt the truth of it: even without man-made routes, he still arrived where he was meant to be. He acknowledges that not being able to imagine why a decision is right does not make it wrong, and wonders if his parents’ duty to the rroneek may have stood alongside their duty to him. Whatever the past, he thanks you for helping him find meaning in what you did today, and vows to remain curious—especially where the hhetso are concerned—before you turn your thoughts back to serving the people of Tural.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>バックルームでは、なお重苦しい空気が漂っている。外の空気もまだ沈んだままで、魂の仕組みに頼る前の時代を知る者でさえ、不安を隠せずにいるという。年老いた者が故郷へ戻る道のりは容易ではなく、だからこそ、主に旅立っているのは若い者たち──世話をする年長者を抱えていない者たちなのだと、あなたは聞かされる。</p><p>その問題はトライヨラにも届いていた。コアナは、シャークトラル鉄道の運行を再開し、人々がより自由に行き来できるよう力を尽くしているという。もっとも線路はヴァンガードまでしか伸びておらず、どうしても徒歩の区間は残る。それでも鉄道が戻れば負担は大きく減る──シェールがデータを解析している間、あなたは現地の状況を自分の目で確かめに行くことにする。</p><p>現地では、支援の継続を頼まれつつも、作業がなお停止中であることを告げられる。それでも彼らは希望を捨てまいとしていた。シェシェネウェジ湧水で状況を尋ねると、理性の王も視察に向かっているところだと言われる。ほどなくしてエレンヴィルが現れ、新しい装いについて、蒐集員から独立した請負人への移行が正式に認められ、それに見合う衣服が必要だったのだと語る。</p><p>コアナが報告を求めると、新しい機関車は完成間近だが、運用にこぎつける段階で難航しているという。かつて「ドーンブレイザー」で「ドーム」へ突入したときは、緊急性がすべてに優先された。だがいま、元の問題が戻ってくる──メワヘッツォアンの住民の暮らしを乱さずに、どう鉄道を走らせるか。機関車の騒音はルーニークを怯えさせ、彼らを導くヘッソを驚かせることに、ヘッツァロは強い不満を抱いている。コアナは鉄道を静かにする策を用意していたが、静かな列車には別の危険がある。線路へ迷い込むルーニークを避けさせねばならず、笛を鳴らして追い払うのも、再び怯えさせるだけだ。</p><p>線路は本来、ルーニークの好む放牧地を避けるよう引かれていた。それなのに彼らの行動が変わり、線路へ近づくようになっているという。なぜ放牧の傾向が変わったのかは不明で、エレンヴィルはメワヘッツォアンの人々に事情を尋ねるつもりだと述べる。鉄道を推し進める立場として、コアナもまた、影響を受ける者たちの声を聞く責務があると認め、あなたはヘッツァロの野営地へ向かい、族長フワトに会う。フワトは、ルーニークが季節外れに西へ移動し、鉄道へ向かっていることをすでに把握していた。しかも従来の放牧地に異常は見当たらないという。</p><p>そこでコアナは、自身がヘッツァロの血を引くこと、しかしルーニークと旅した記憶はないことを語り始める。彼は幼子の頃、移動の最中に置き去りにされ、善良なペルの商人に拾われて命をつないだ。商いを教わり、自立の術を得て、やがてトライヨラの市場で店を構えるようになり、そこでドーンサーヴァントに見出され養子となったのだという。後に妹も迎えられたとき、同じく捨てられた身である彼女の孤独を知っていたからこそ、兄として「いつでも傍にいる」と誓ったのだと。フワトは、ヘッツァロが自らの子を置き去りにするなど聞いたことがないと驚き、何か特別な事情があったはずだと言う。あなたが「理由があったなら知りたいのではないか」と促すと、コアナは頷き、ルーニークとヘッソが何を意味するのか教えてほしい、偏見なく耳を傾けると約束する。</p><p>コアナが学びを始めるあいだ、あなたは「彼らのように働く」ことで暮らしを知るよう勧められる。道具を手渡され、頼まれごとを引き受け、幕の補修をし、ルーニークの皮が衣類や靴にも適した丈夫な素材であることを教わる。群れが二つに分かれるとき、人もまた半数ずつ別れてゆくという移動の習わしも聞く。そして別れ際に交わす再会の願いの言葉を知り、さらに、薬や軟膏や石鹸に使い、害を遠ざけ、火を保ち、食を調えるためにヘッソが与えるものは何かと問われ、あなたは彼らの習俗に向き合うよう求められる。加えて、絡まった毛並みをブラシで整える世話も学び、腕が疲れるほど磨き上げた末に、ルーニークの毛は見違えるほど整う──その代わり、あなたの服も別の「毛皮」をまとうことになる。</p><p>合流すると、コアナは遅れたことを詫び、ルーニークの放牧を任されて遠くまで行ってしまったのだと話す。連れの導くままに歩き回り、無理に道へ戻すのは相応しくないと感じたとも言う。あなたが学んだことを共有すると、彼はそれを実感として受け取り、「人の作った道に頼らずとも、辿り着くべき場所には辿り着ける」と語る。そして、自分に理解できないからといって誤りだとは限らないと認め、両親がルーニークに負う務めが、自分への務めと並び立っていた可能性を思う。過去がどうであれ、いまはトラルの人々のために動くべきだと気持ちを引き締めつつ、今日の経験に意味を見いだせたことへの感謝を口にし、特にヘッソに関しては好奇心を失わないよう努めると誓う。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>在 Backroom 裡，你聽見 Geode 說得很直接：外頭的氣氛依然沉重。即使有些 Turali 還記得在依賴靈魂系統之前的日子，如今也同樣心神不寧，甚至會不安地問出口──在自己離世前，是否還有機會回到故鄉，與舊日的朋友與家人重逢。更何況，那些已經上了年紀的人，要踏上返鄉的路本就不容易，因此真正離開去 Tural 的，多半是年輕人──沒有需要照顧的長輩牽掛在身的人。</p><p>你也從 Wuk Lamat 那裡得知，這個困境已經傳到 Tuliyollal。Koana 正盡力讓 Xak Tural 鐵路恢復運作，好讓人們能更自由地往返；可惜軌道目前只到 Vanguard，仍會有一段路必須徒步。即便如此，鐵路若能重新開通，至少能大幅減輕負擔。於是你們決定趁 Shale 忙著處理資料的這段時間，親自去看一眼鐵路的現況，也好把任何好消息透過你們的管道傳出去，讓更多人安心。</p><p>到了 Shaaloani，你先把情況回報給 Koana，而他則請你們繼續盡可能支援 Alexandrians。當地負責的人坦言，作業仍然停擺，但他們努力保持樂觀。你們在 Sheshenewezi Springs 詢問進度時，也聽說 Koana 會來視察；不久後，Erenville 以一身新裝現身，解釋自己已獲正式批准，從 gleaner（蒐集員，Old Sharlayan 派出的外勤人員，負責蒐集各地樣本與知識）轉為獨立承包者，因此需要更相襯的衣著。</p><p>Koana 要求現場回報後，你聽見關鍵問題：新的火車頭原本進度順利，但眼下卻卡在「要怎麼把它真正投入運作」上。當初為了用 Dawnblazer 撞進 the dome（罩住 Yyasulani 的巨型屏障），一切以緊急為先；如今緊迫感退去，原本的難題又回來了──要怎麼讓鐵路運行，卻不驚擾 Mehwahhetsoan 的居民。rroneek 很容易被噪音嚇到，而跟隨 rroneek 的 Hhetsarro 也不可能接受自己的 hhetso（引路者／嚮導）受到驚擾。Koana 已想出讓鐵路「安靜」的方案，但安靜的列車又會帶來另一種危險：rroneek 可能會走上鐵軌，而你們又不能靠汽笛驅趕，否則牠們會驚慌，連原本的放牧都可能被影響。</p><p>你聽見疑惑：當初規劃路線時，不是刻意避開 rroneek 喜歡的放牧地嗎？為何牠們現在會靠得這麼近。Erenville 說，自從鐵軌鋪設後，rroneek 的放牧模式就改變了，他也不確定原因，打算向 Mehwahhetsoan 的人請教。Koana 也表明自己支持鐵路，理當協助處理這件事，並且想聽聽最直接受影響的 Hhetsarro 的看法。於是你們前往 Hhetsarro 的營地，見到領袖 Hhwato；對方表示，rroneek 這種「非季節」的遷移確實反常──牠們正往西移動，朝鐵路而去，但在原本的放牧地並看不出問題。</p><p>在營地裡，Koana 說起自己的身世：他其實出身於 Hhetsarro，卻沒有與 rroneek 同行的記憶。據他所知，自己還在襁褓時，就在一次遷移中被留下；若不是一名好心的 Pelu 旅行商人偶然發現他、憐憫他、教他做生意，他恐怕早已活不下來。後來他在 Tuliyollal 市集成了攤販，才被 Dawnservant 發現並收養；而在妹妹也被接回後，他因為理解「被拋下」的孤獨而立誓會一直陪在她身邊。Hhwato 聽後驚訝：他從未聽過有 Hhetsarro 會自願拋下親生骨肉，必定另有非常的緣由。當你提醒 Koana──若真有理由，難道你不想知道嗎──他終於承認你說得對，並請求 Hhwato 教他 rroneek 與 hhetso 對 Hhetsarro 的意義，他願意敞開心胸聆聽。</p><p>接著你們被允許在營地四處看看，也被鼓勵「照他們的方式去做」。你和 Koana 收到工具，主動詢問能否幫忙：你幫人補好帳篷的破口，聽人談起 rroneek 的皮如何耐用；也學到遷移的習俗──有時 rroneek 會分成兩群走不同路，Hhetsarro 也必須分成兩半與族人分別，並在分離時互道再會的祝願。你也被用問題考驗：hhetso 會提供什麼材料，可做藥、藥膏與肥皂，能驅趕害蟲與邪祟，也能維持火勢、甚至替食物增添風味。最後你學著照料 rroneek 的毛皮，用刷子慢慢梳理，直到手臂疲憊，那身毛總算變得整齊；只是你的衣服也因此沾滿了新的「毛皮」。</p><p>最後你們再度會合。Koana 向你道歉，說自己被指派去放牧 rroneek，結果一路走得很遠；他跟著同伴的意願四處徘徊，甚至覺得硬把牠帶回既定路線反而不妥。當你把今天所學告訴他，他說自己也切實感受到：即使不依循人造的道路，也依然能走到「該到的地方」。他承認「我無法想像某個決定為何是對的」並不等同於「那個決定就是錯的」，也因此開始懷疑──他的父母對 rroneek 的責任，或許曾與對他的責任並存。即便如此，他也強調眼下最重要的是服務 Tural 的人民；而在今天的經歷之後，他謝謝你幫他看見更深的意義，並表示自己會努力保持好奇，尤其是在面對 hhetso 的事上。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 吉歐德 <small class="muted">(後室, X:6.1, Y:6.3)</small></div></div>`,

  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
