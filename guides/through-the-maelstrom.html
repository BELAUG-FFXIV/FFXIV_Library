<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`Through the Maelstrom`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You return to the pier, and the inconspicuous Hyuran man can’t help slipping into nostalgia. It has been ages since Thancred up and left the Sisters, he says, and he misses the chance to run with that old scoundrel again like in the old days. Nearby, the shadowy woman hears talk of Far Eastern combat art and admits her curiosity is genuinely piqued.</p><p>Yugiri turns to you with a calmer voice. So much has happened since she first beheld Eorzea from the deck of a galleon, and she never envisioned being invited to play a part in your noble struggle. Yet she realizes she has kept you overlong; you surely have pressing business of your own. She assures you that she no longer requires an escort in this land.</p><p>Before you part, she asks one kindness: when next you meet Lady Minfilia, relay her humblest thanks. She would have done so in person, but she must fulfill her promise to the Admiral. With that, she bids you farewell—until you meet again, Warrior of Light.</p><p>Back at the Rising Stones, Minfilia asks for a moment and shares what she has concluded from Vylbrand. When the Sahagin elder summoned Leviathan, he employed the power you know as the Echo—and somehow became immortal in the doing. When the Admiral slew him, his spirit emerged from his lifeless flesh: consciousness shorn of physical form.</p><p>Thus transfigured, that spirit took up residence in the body of a minion as easily as a man donning a favorite glove. Minfilia has long known the Echo can pass through the walls of a man’s soul, but never imagined it could free a soul from its own flesh—nor that it could then occupy the next corporeal vessel it desired. Elidibus spoke of an existence that knows neither cessation nor oblivion; and yet the Sahagin elder, for all his mastery, was still absorbed into Leviathan. If the Ascians’ mode of existence is the same, Minfilia says, then they too are not invulnerable—they can be destroyed. She recalls a legend of souls reborn upon the cusp of each Umbral Calamity to stay the encroaching Darkness, and wonders if it may in truth refer to the Echo. Much remains unknown, but she believes the key to defeating the Ascians may finally be within sight, and hopes with Urianger’s aid to fathom it ere long.</p><p>Urianger then brings grave tidings from Sharlayan: it concerns your distant allies, the Students of Baldesion. The Isle of Val—home to the order for many years—is no more. Agents report an aetheric wave of the highest magnitude, and soon thereafter the isle simply ceased to be; they suspect a magick evoked, like in power to Ultima. Minfilia can only pray that the Twelve preserve. Far away in Ul’dah, Lolorito moves to adjourn the day’s meeting, and when a servant falters over the purpose of these orders, Teledji answers with a single word: revolution.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Yugiri <small class="muted">(Limsa Lominsa Lower Decks, X:8.9, Y:14.3)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="when-yugiri-met-the-fraternity.html">When Yugiri Met the Fraternity</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-great-divide.html">The Great Divide</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'混沌の渦動',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたが桟橋へ戻ると、目立たぬヒューランの男は珍しく懐かしさを滲ませる。サンクレッドがシスターズを突然去ってから、もうずいぶん経つ――昔みたいに、あの古い悪党とまた一緒に走り回れたらどれほどいいか、と。そばの影の女も、東方の武術と聞いて好奇心が大いに刺激されたと言う。</p><p>ユウギリはあなたに向き直り、静かに語る。大帆船の甲板から初めてエオルゼアを見た日以来、あまりに多くのことが起きた。自分があなたたちの「高潔な戦い」に招かれ、関わることになるなど想像もしなかった、と。それでもあなたを長く引き留めすぎたと詫び、あなたには急ぎの用があるはずだと言う。そしてこの地で、もはや護衛は不要だと告げる。</p><p>別れ際、ユウギリはひとつ頼む。次にミンフィリアに会うとき、心からの感謝を伝えてほしい。本当なら自分で言いたいが、提督との約束を果たさねばならない。そう言って、再会までの別れを告げる――光の戦士よ。</p><p>石の家に戻ると、ミンフィリアはヴィルブランドでの出来事を振り返り、あなたに結論を聞いてほしいと言う。サハギンの長老がリヴァイアサンを召喚したとき、用いたのは「超える力」だった。そして理屈は説明できないが、その結果として長老は不死になったように見えた。提督が討ったのち、命を失った肉体から魂が抜け出し、形を持たぬ意識として現れた。</p><p>変容したその魂は、愛用の手袋でもはめるように配下の身体へ容易く移り住んだ。ミンフィリアは「超える力」が人の魂の壁を越えることは知っていたが、魂を肉体から解き放ち、次の器へ宿らせることまで可能だとは想像もしなかった。エリディブスが語った「終わりも忘却も知らぬ在り方」――しかし長老は、ついにリヴァイアサンに取り込まれた。もしアシエンの在り方も同じなら、彼らも不死身ではなく、滅ぼすことができる。ミンフィリアはさらに、霊災の瀬戸際ごとに魂が生まれ変わり、迫り来る闇を退けるという伝承に触れ、それが「超える力」を指すのではないかと考える。まだ分からぬことは多いが、アシエンを打ち倒す鍵がようやく見えはじめた。ウリエンジェの助けを借り、ほどなく解き明かしたい、と。</p><p>そこへウリエンジェが、シャーレアン本国からの凶報をもたらす。遠き同盟者であるバルデシオン委員会に関わる話だという。長年の拠点だったヴァル島が、もはや存在しない。最大級のエーテル波が観測され、その直後に島が消失したと報告された。アルテマに匹敵する魔法が発動した可能性がある、と。ミンフィリアはただ祈りの言葉を漏らす。はるかウルダハでは、ロロリトが会議の閉会を宣言し、従者が命令の意図を問うと、テレジは一語で言い切る――革命だ、と。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ユウギリ <small class="muted">（リムサ・ロミンサ：下甲板層, X:8.9, Y:14.3）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="when-yugiri-met-the-fraternity.html">海都の地下組織</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-great-divide.html">災厄の報せ</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'混沌的漩渦',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你回到碼頭附近，那名 Hyuran 男子（Eorzea 的主要人型種族之一；外貌與一般人類相近，為常見的居民族群稱呼）語氣依舊粗魯，卻難得露出一點懷舊：Thancred 突然離開 the Sisters（Limsa Lominsa 境內一個與地下勢力／秘密結社相關的團體或據點稱呼；此處指 Thancred 過去曾在其中活動，後來離開）已經太久了，他真想再和那個老無賴一起行動，回到從前那種並肩胡鬧的日子。旁邊那名神情陰沉的女人也不遮掩——聽到「遠東的武藝」，她直說自己的好奇心被勾起了。</p><p>Yugiri 轉向你，語氣比先前更沉靜。自從她第一次站在大帆船的甲板上望見 Eorzea 以來，發生的事多得超出想像；她從沒想過自己會被邀請參與你們口中的「崇高抗爭」。可她也明白自己留你太久了——你一定還有更緊迫的事要辦，而她在這片土地上也已不再需要護送。</p><p>臨別前，她只託你一件事：下次見到 Lady Minfilia 時，請代她轉達最誠摯的謝意。她本想親口致謝，卻必須履行對提督許下的承諾。於是她向你告別：直到再相見，Warrior of Light。</p><p>回到 The Rising Stones，Minfilia 說她一直在反覆思索你們在 Vylbrand 經歷的一切，想把自己的推論親口告訴你。她認為 Sahagin 的長老在召喚 Leviathan 時動用了 Echo；其中原理她無法解釋，但看起來，在動用 Echo 的同時，他似乎也因此成了不死之身。當提督將他斬殺後，你們看見他的靈魂從失去生命的肉身中脫離——那是一種不再依附形體的意識。</p><p>更令人不寒而慄的是：那道意識竟能像戴上一只熟悉的手套般，毫不費力地住進自己爪牙的身體裡。Minfilia 一直知道 Echo 能穿透人的靈魂之壁，卻從未想過它甚至能讓靈魂脫離自身肉體，並在下一個合適的肉體容器裡安然落腳。她說，這正呼應了 Elidibus 談過的那種存在——既不終止，也不沉入遺忘；可即使如此，那名長老終究被 Leviathan 吸收、徹底吞沒。Minfilia 因此抓住一個關鍵：若 Ascians 的存在方式與此相同，那麼他們也並非不可摧毀——他們也能被消滅。她又提到一則古老傳說：每逢靈災迫近的邊緣，會有靈魂重生，以阻止黑暗侵蝕；過去多數人只把它當童話，但最近的事讓她不得不懷疑，那傳說或許指的就是 Echo。仍有太多未知，可她相信，擊敗 Ascians 的鑰匙或許終於近在眼前；她希望借助 Urianger 的協助，盡快釐清這一切。</p><p>話才說到一半，Urianger 帶來來自 Sharlayan 的噩耗：這消息牽涉到你們遠方的盟友 Students of Baldesion（以研究以太與古代遺跡聞名的學術組織；長年以 Isle of Val 作為據點，與 Sharlayan 有關聯並被視為遠方盟友）。探子回報曾觀測到規模驚人的以太波動，隨後 Isle of Val 便「消失了」；推測是有人引發了極其可怕的大規模魔法，其威力堪比 Ultima。Minfilia 只能低聲祈求 Twelve 的庇佑。另一邊，在 Ul’dah，Lolorito 宣布今日會議結束；當侍從壓不住疑惑，問這些命令究竟為了什麼，Teledji 只用一個字回答——革命。只用一個字回答，革命。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 夕霧 <small class="muted"> 利姆薩·羅敏薩下層甲板（X:8.9, Y:14.3)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="when-yugiri-met-the-fraternity.html">海都的地下組織</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-great-divide.html">暴雨將至</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
