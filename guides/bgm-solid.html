<script>
  const LANG_KEY='ffxiv-guide-lang';

  const i18n={
    EN:{
      langLabel:'English',
      pageTitle:'Solid',
      tabs:{theme:'Theme',appears:'Appears in',acq:'Acquisition',notes:'Additional Notes',lyrics:'Lyrics',comments:'Comments'},
      theme:`<div class="stack"><div class="row">Foundation Theme</div></div>`,
      appears:`
        <div class="stack">
          <div class="row">
            <div>Foundation Theme</div>
          </div>
        </div>
      `,
      acq:`<div class="stack"><div class="row">Available for purchase in Ishgard.</div></div>`,
      notes:`<div class="stack"><div class="row">Purchased from Frine in the Pillars for 5,000 gil.</div></div>`,
      lyrics:`<div class="stack"><div class="row">None</div></div>`
    },
    JP:{
      langLabel:'日本語',
      pageTitle:'堅牢',
      tabs:{theme:'テーマ',appears:'登場先',acq:'入手方法',notes:'補足',lyrics:'歌詞',comments:'コメント'},
      theme:`<div class="stack"><div class="row">イシュガルド下層のテーマ</div></div>`,
      appears:`
        <div class="stack">
          <div class="row">
            <div>イシュガルド下層のテーマ</div>
          </div>
        </div>
      `,
      acq:`<div class="stack"><div class="row">イシュガルドで購入可能。</div></div>`,
      notes:`<div class="stack"><div class="row">イシュガルド：上層のよろず屋 フリヌから、5,000ギルで購入できます。</div></div>`,
      lyrics:`<div class="stack"><div class="row">なし</div></div>`
    },
    ZH:{
      langLabel:'繁體中文',
      pageTitle:'監牢',
      tabs:{theme:'主題',appears:'登場於',acq:'取得方式',notes:'補充說明',lyrics:'歌詞',comments:'留言'},
      theme:`<div class="stack"><div class="row">Foundation 主題曲</div></div>`,
      appears:`
        <div class="stack">
          <div class="row">
            <div>Foundation 主題曲</div>
          </div>
        </div>
      `,
      acq:`<div class="stack"><div class="row">可於 Ishgard 購買。</div></div>`,
      notes:`<div class="stack"><div class="row">可向 The Pillars 的雜貨商 Frine 以 5,000 Gil 購得。</div></div>`,
      lyrics:`<div class="stack"><div class="row">無</div></div>`
    }
  };

  const langToggle=document.getElementById('langToggle');
  const pageTitle=document.getElementById('pageTitle');
  const tabBtns=[...document.querySelectorAll('.tab-btn')];
  const panels={
    theme:document.getElementById('panel-theme'),
    appears:document.getElementById('panel-appears'),
    acq:document.getElementById('panel-acq'),
    notes:document.getElementById('panel-notes'),
    lyrics:document.getElementById('panel-lyrics'),
    comments:document.getElementById('panel-comments')
  };

  function getLang(){ return localStorage.getItem(LANG_KEY)||'EN'; }

  function applyLang(lang){
    const t=i18n[lang]||i18n.EN;
    pageTitle.textContent=t.pageTitle;
    langToggle.innerHTML = `
      <svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/>
        <path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      </svg>
      <span>${t.langLabel}</span>
    `;
    tabBtns.forEach(b=>{ b.textContent=t.tabs[b.dataset.tab]; });
    const active=tabBtns.find(b=>b.getAttribute('aria-selected')==='true')||tabBtns[0];
    renderPanel(active.dataset.tab,lang);
    if (active && active.dataset.tab==='comments') loadGiscusForCurrentLang();
  }

  function renderPanel(key,lang){
    const t=i18n[lang]||i18n.EN;
    Object.keys(panels).forEach(k=>panels[k].classList.remove('active'));
    panels[key].classList.add('active');
    if(key!=='comments'){
      panels[key].innerHTML=t[key] || `<div class="stack"><div class="row muted">No content.</div></div>`;
    }else{
      loadGiscusForCurrentLang();
    }
  }

  tabBtns.forEach(btn=>{
    btn.addEventListener('click',()=>{
      tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
      btn.setAttribute('aria-selected','true');
      renderPanel(btn.dataset.tab,getLang());
    });
  });

  langToggle.addEventListener('click',()=>{
    const cur=getLang();
    const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
    localStorage.setItem(LANG_KEY,next);
    applyLang(next);
  });

  applyLang(getLang());

  const GISCUS_CFG = {
    repo: 'BELAUG-FFXIV/FFXIV_Library',
    repoId: 'R_kgDOPyh4Kw',
    category: 'General',
    categoryId: 'DIC_kwDOPyh4K84CwPjL',
    theme: 'preferred_color_scheme'
  };
  function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
  function loadGiscusForCurrentLang(){
    const mount = document.getElementById('giscus_container');
    if (!mount) return;
    mount.innerHTML = '';
    const langCode = getLang();
    const s = document.createElement('script');
    s.src = 'https://giscus.app/client.js';
    s.setAttribute('data-repo', GISCUS_CFG.repo);
    s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
    s.setAttribute('data-category', GISCUS_CFG.category);
    s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
    s.setAttribute('data-mapping', 'specific');
    s.setAttribute('data-term', location.pathname + '｜' + langCode);
    s.setAttribute('data-reactions-enabled', '1');
    s.setAttribute('data-emit-metadata', '0');
    s.setAttribute('data-input-position', 'bottom');
    s.setAttribute('data-lang', uiLang(langCode));
    s.setAttribute('data-theme', GISCUS_CFG.theme);
    s.setAttribute('crossorigin', 'anonymous');
    s.async = true;
    mount.appendChild(s);
  }
</script>
