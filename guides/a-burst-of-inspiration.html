const i18n = {

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
<p>Briardien admits—almost grudgingly—that Hildibrand has somehow managed not to destroy anything so far, which is nearly enough to impress him. Ellie tries to steer the conversation toward Briardien’s theories, hoping to talk somewhere quiet, but he chooses the least comforting “private” spot imaginable: the crates on a junk-littered beach, where he insists no one will overhear. Ellie forces agreement while panicking inside, already thinking about how to keep him away from the explosives hidden among the crates.</p>
<p>As you all hover in uneasy “privacy,” Ellie scrambles to suggest moving—higher ground, warmer air, anything—while Hildibrand promises that he and Nashu stand ready if danger threatens you or Ellie. Briardien ignores the discomfort and lays out his conclusion: after questioning a Brass Blade attacked by the culprit, he has narrowed the thief-in-disguise to three candidates—Morgant, Yalto Nolto, and Lewenhart—and proposes splitting up to keep watch. He breaks off when he realizes Ellie is barely listening.</p>
<p>Noting Ellie looks unwell, Briardien decides the chill wind is real after all—then calmly announces he’ll build a fire right there. Hildibrand mocks the idea of finding kindling on barren shores, but Briardien produces driftwood and flint as if it’s the simplest thing in the world. Hildibrand spins it into melodrama anyway, declaring there’s “ice” in Briardien’s veins and no chain of events could make him lose control of a torch. Nashu, delighted, tries to “record” the moment—until a page goes flying.</p>
<p>Briardien snatches the paper and reads a message—“Everything is proceeding according to my master plan”—and Ellie hurriedly tries to dismiss it as nonsense. But Briardien finds more pages, and the tone turns unmistakably threatening: the duelist’s words speak of many faces, of danger beyond the “lapis maiden,” and finally of Briardien meeting a fiery demise. Before the last line can settle, an explosion tears through the beach—and Briardien screams as the trap springs.</p>
<p>When the smoke clears, you find Briardien shaken but standing—ears ringing, otherwise intact. Ellie claims “reporter’s intuition” for how she saw through the ruse in time, and Briardien thanks her, then turns to Hildibrand to ask what he learned. Hildibrand proudly reports nothing at all, and Briardien—dry as ever—says he might have died of shock if Hildibrand had. But the conclusion is grim: this enemy is no mere thief; he is willing to attempt murder, and you must redouble vigilance so the others aren’t harmed.</p>
<p>The blast has consequences immediately. Guguremu rages that the banquet vegetables were costly and now ruined, and threatens gaol unless you replace the supplies at once. Hildibrand celebrates that the bombs are gone and Briardien never noticed, while Briardien coolly interprets the attack as proof the culprit views his intellect as the greatest threat. Ellie can’t help wondering how anyone survives a point-blank explosion—then decides it’s better left unsolved.</p>
<p>Lewenhart arrives in alarm, and Briardien reassures him the assassination attempt failed—though the food supply did not survive. Lewenhart explains the crates held rare imported vegetables, already in short supply because a violent band of mandragoras—the Mandragoras—has been stealing shipments. Briardien latches onto the lead and asks what was taken; Lewenhart describes the rarest import from the Far East, like a dragon pepper but deep purple.</p>
<p>Hildibrand immediately declares the solution: storm the Mandragoras’ lair and steal the “purple dragon peppers” back. Lewenhart warns these aren’t ordinary mandragoras but killers who crave flesh, feared even by the Brass Blades of the Gerbera. Hildibrand turns to you, practically appointing you the brave soul who will defeat rogue vegetables without concern for your own safety—while Lewenhart, desperate, clings to it as his only hope. He sends you to Sundhimal of the Yellowjackets, tasked with road defense, and Hildibrand insists a gentleman won’t let you go alone as you head toward Limsa.</p>
<p>Sundhimal tells you you’re “half a bell too late.” A merchant opened his hold to check a vegetable shipment and an onion attacked him, screeching murder; he fled in terror, and by the time he recovered, his vessel had sailed without him. The merchant has gone to Aleport to try to recoup his losses—so if you mean to pursue the culprits, you should hear his tale. Hildibrand, thrilled by the chase, urges you toward the ferry at Fisherman’s Bottom.</p>
<p>In Aleport, you find the tiny trader jumpy and half-mad with fear, snapping at you not to sneak up on him—he thought you were a feral turnip or murderous eggplant. He swears it’s no joke: tomato juice nearly took out his eye, and when he regained his senses, the vegetable bandits had already sailed off with his ship and his livelihood. He calls himself ruined, and vows he never wants to see another onion again.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>ブリアルディアンは、ヒルディブランドがこれまで「何も壊していない」ことに触れ、ほとんど感心したと言ってみせる。エリー・ライズはあなたとともに推理を聞きたがり、静かな場所へ移ろうとするが、ブリアルディアンが選んだのは木箱のそばの、がらくただらけの浜辺だった。盗み聞きされないためだと言い切る彼に、エリー・ライズは青ざめながらも従うしかない。木箱の周囲には爆薬がある――彼女は内心で必死に、どうにか彼を近づけない策を考える。</p>
<p>エリー・ライズは潮や寒気を理由に場所を変えようとするが、ブリアルディアンは短時間で済むと取り合わない。ヒルディブランドは、あなたとエリー・ライズに危険が及ぶなら自分とナシュ・マカラッカが備えていると大げさに構え、ブリアルディアンは真顔で捜査結果を告げる。襲撃を受けたブラスブレードへの聞き取りから、変装した犯人候補を三人に絞った――モーガント、ヤルト・ノルト、ルーウェンハート。三人で手分けし、それぞれが監視に当たるつもりだという。</p>
<p>ところが話の途中、ブリアルディアンはエリー・ライズの様子に気づき、顔色が悪いと言う。風が冷たいのならここで火を起こす、と平然と宣言し、流木と火打石を取り出してしまう。ヒルディブランドは浜辺に薪などないと笑い、さらにブリアルディアンの冷静さを大仰に持ち上げるが、ナシュ・マカラッカがはしゃいだ拍子に紙が舞い上がる。</p>
<p>ブリアルディアンが拾い上げた紙には「すべては我が計画通りに進んでいる」と書かれていた。エリー・ライズは平静を装って戯言だと言い張るが、さらに二枚の紙が見つかり、そこには「多くの顔を持つ者」や「ラピスの乙女」だけでは済まない危険が示され、最後にはブリアルディアンが炎の死を迎えると断言される。次の瞬間、浜辺で爆発が起こり、罠が牙をむく。</p>
<p>爆煙の中、ブリアルディアンは耳鳴りを訴えながらも立っていた。エリー・ライズは「記者の勘」で見抜いたと言い、ブリアルディアンは礼を述べたうえで、ヒルディブランドに犯人の手がかりを得たか尋ねる。ヒルディブランドは成果なしと胸を張り、ブリアルディアンはその返答に乾いた安堵を示す。しかし敵は単なる盗人ではなく、冷酷な殺意をもつ狂人だ――他の者を守るため、警戒を強めねばならない。</p>
<p>爆発は別の災厄も招いていた。ググレムが宴席用の高価な野菜が台無しだと激怒し、開宴までに補充しろと脅す。ヒルディブランドは爆薬がなくなりブリアルディアンも気づかなかったと得意げだが、ブリアルディアンは敵が自分の知性を脅威と見たのだろうと淡々と分析する。エリー・ライズは至近距離の爆発から生還した理由を問いたくなるが、深入りしないほうがよいと悟る。</p>
<p>そこへルーウェンハートが駆けつけ、爆発の無事を問う。ブリアルディアンは暗殺未遂は阻止したと告げつつ、食材は助からなかったと伝える。ルーウェンハートは、木箱には希少な輸入野菜が入っていたが、最近は「マンドラゴラ」という危険な一団が横行しており、品薄なのだと説明する。最も珍しいのは東方からの輸入品で、エオルゼアのドラゴンペッパーに似ているが濃い紫色だという。</p>
<p>ヒルディブランドは、ならばその雑草どもの巣へ乗り込み紫のドラゴンペッパーを奪い返せばよいと勢いづく。だがルーウェンハートは、彼らは肉に飢えた殺し屋同然で、ゲルベラのブラスブレードでも歯が立たなかったと警告する。ヒルディブランドはあなたを見て、命知らずの勇者がここにいると勝手に決め、ルーウェンハートも追い詰められてあなたに望みを託す。彼はイエロージャケットのスンドヒマルが動向を知るはずだと言い、あなたはヒルディブランドとともにリムサへ向かうことになる。</p>
<p>スンドヒマルは、もう半刻遅かったと告げる。野菜の積荷を確認した商人は、貨物室で玉ねぎに襲われ、悲鳴を上げられて恐怖のあまり船から逃げ出した。気づいた時には船は商人を置き去りに出航していたという。商人は損を取り戻すためアレポートへ向かった――追うなら、その嘆き話を聞け、と。ヒルディブランドは追跡の興奮を語り、フィッシャーマンズ・ボトムの渡しでアレポートへ急ごうと促す。</p>
<p>アレポートで出会った小柄な商人は怯えきっており、近づくなと叫ぶ。凶暴なカブか殺人ナスだと思った、と。冗談ではない、トマトジュースが目を潰しかけたのだと訴え、正気に戻った頃には船も生業も奪われていたと嘆く。二度と玉ねぎなど見たくない、とまで言い切り、絶望をあらわにする。</p>
</div>

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'努力的調查員',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
<p>Briardien 罕見地承認：Hildibrand 走到現在居然沒把任何東西弄壞，讓他「幾乎」有點刮目相看。Ellie 立刻想把話題拉回正事，說你和她一直在等他的推論，想找個安靜地方談——結果 Briardien 指的「安靜」竟然是那堆 crates 旁邊的垃圾海灘，理由是這樣才不會被偷聽。Ellie 臉色發白，因為她心裡很清楚：那些 crates 附近埋著 bombs，她得想辦法把人引開。</p>
<p>Ellie 連忙找藉口要換地方，說潮水在漲、空氣很冷、最好去高處或暖一點的地方；Hildibrand 還在旁邊信誓旦旦保證，只要有任何危險，他和 Nashu Mhakaracca 會立刻保護你和 Ellie。Briardien 卻不為所動，直接說出他的新結論：他從一名遭到目標襲擊的 Brass Blade 口中整理出線索，鎖定三個最可能的「變裝者」——Morgant、Yalto Nolto、Lewenhart，並打算你們三人分頭監視。說到一半他發現 Ellie 心不在焉，當場問她有沒有在聽。</p>
<p>Briardien 看出 Ellie 不太對勁，說她臉色很差；Ellie 立刻順勢附和「真的很冷」，想把人帶走。Briardien 卻平靜地表示沒必要換地方——他可以生火。Hildibrand 立刻嘲笑這片荒涼海灘哪來柴火，Briardien 卻像早就準備好一樣，撿起漂流木，還掏出 flint stone。Hildibrand 又把這件事講成誇張戲碼，說 Briardien 血管裡流的不是血而是冰；Nashu Mhakaracca 興奮到想把這些話記下來，卻在一陣鬧騰中讓紙張飛了出去。</p>
<p>Briardien 撿起紙，看到上頭寫著「Everything is proceeding according to my master plan」。Ellie 急忙說那不像對方慣用的卡片，應該只是瘋子的胡言亂語，但 Briardien 又找到兩張，內容變得更直接——提到「he of many faces」會笑到最後，也說受害者不只「lapis maiden」，最後一張更明確寫著：Briardien 將迎來火焰般的死。話音未落，爆炸就在海灘上炸開，陷阱瞬間啟動。</p>
<p>混亂之後，Briardien 雖然耳鳴，卻沒有大礙。Ellie 說她只是靠「記者直覺」看穿了對方的把戲，並急忙確認 Briardien 是否受傷；Briardien 向她道謝，轉頭又問 Hildibrand 有沒有查到什麼。Hildibrand 報告自己「竭盡所能」卻一無所獲，Briardien 竟像是鬆了口氣，說如果 Hildibrand 真的查到線索，他可能會嚇死。然後他下結論：這次的對手不只是 thief，而是願意冷血殺人的瘋子，你們得加倍警戒，避免另外兩名目標也遭殃。</p>
<p>爆炸也把別的麻煩炸了出來。Guguremu 暴跳如雷，怒罵那些昂貴的蔬菜全毀了，限你們在宴會開始前把補給補回來，否則就等著進牢裡爛。Hildibrand 反倒得意，說靠你們的機靈 bombs 已經被處理掉、Briardien 也完全沒察覺；Briardien 則冷靜分析，敵人或許認定他的頭腦才是最大的威脅。Ellie 看著 Briardien 近距離扛過爆炸，忍不住覺得這又是一個最好別深究的謎。</p>
<p>Lewenhart 聽見爆炸趕來，緊張詢問大家是否平安。Briardien 說刺客的粗劣暗殺已被阻止，但食材沒能倖免；Lewenhart 解釋，那些 crates 裝的是極為稀有的進口蔬菜，而最近又因為一群名叫 Mandragoras 的兇殘團伙四處作亂，供應本就短缺。Briardien 立刻追問被偷的到底是什麼，Lewenhart 說最珍貴的是來自 Far East 的品項，外型像 Eorzea 的 dragon pepper，但顏色是深紫。</p>
<p>Hildibrand 立刻拍板：那就衝進那些雜草的巢穴，把「紫色 dragon peppers」搶回來就行。Lewenhart 卻嚴肅警告，那些不是普通的 mandragora，而是嗜血的殺手，連 Gerbera 的 Brass Blades 都扛不住。Hildibrand 轉而盯著你，彷彿你眼神已經替你答應：你會去討伐這群失控蔬菜、把贓物送回來。Lewenhart 只能抓住這條救命繩，說 Yellowjackets 的 Sundhimal 負責守路，應該知道 Mandragoras 的動向；Hildibrand 又說紳士不會讓同伴單獨涉險，拉著你一起往 Limsa 去。</p>
<p>Sundhimal 告訴你們：你們晚了半個鐘。那名商人打開貨艙檢查蔬菜時，一顆 onion 竟然對他尖叫襲擊，他嚇到直接逃離自己的船；等他回過神來，船早已自己開走。那商人去了 Aleport 想挽回損失——如果你們真要追，就去聽聽他的悲慘遭遇。Hildibrand 聽完反而覺得追逐的刺激令人振奮，催你去 Fisherman’s Bottom 搭船，火速前往 Aleport。</p>
<p>到了 Aleport，你找到那位小商人，他整個人被嚇壞，對你尖叫別靠近，說他差點把你當成野生 turnip、殺人 eggplant 之類的怪物。他說自己不是在開玩笑——有一發 tomato juice 差點打瞎他的眼；等他恢復清醒，船與生計都已被那群蔬菜搶走。他一再說自己完了，發誓到死都不想再看見任何 onion。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
