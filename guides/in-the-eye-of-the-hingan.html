    story:`<div class="clamp" data-collapsed="true">
<p>You hear Shigure’s urgent report: the Wolf Burglar has struck again, and word has only just reached him. The inspector and his assistant are already moving, and if you hurry with Shigure, you might arrive before any witness is questioned.</p>
<p>In the Rakuza District, Nashu blurts out the same news, and you find Master Akebono rattled but eager to talk. Hildibrand declares himself “inspector extraordinaire,” demands to know what injustice occurred, and Akebono answers that the Wolf Burglar tried—bold as ever—to steal the finest sword in his collection, the Soboro Sukehiro, in broad daylight.</p>
<p>Akebono savors the punchline: the thief “attempted,” and failed. He boasts that he recently hired a new bodyguard, the peerless samurai Yojimbo, and insists Yojimbo alone is worth a hundred men. Shigure presses that the Wolf Burglar will not abandon such a prize and begs to help protect the sword, but Akebono cuts him off, refuses any extra guards, and storms away to a long-anticipated engagement in Sanjo Hanamachi.</p>
<p>You follow after him, only to be blocked at the entrance by Akebono’s doorman. When Shigure tries to explain that you mean to help, the doorman twists it into an accusation—calling you would-be thieves—and then sneers that Akebono will only welcome additional entertainers if they are geiko of surpassing beauty. With the door firmly shut, Hildibrand turns to Shigure and declares he has a plan—one of “surpassing beauty.”</p>
<p>Shigure leads you to a nearby okiya, where the proprietress laughs at the title “inspector extraordinaire” and refuses to loan a kimono for nothing. She names her price—seventy thousand gil—and you scramble for a pathetic excuse, protesting that even your subligar is worth more or confessing you lost your last coin to gambling. Hildibrand insists he can pay…until Nashu points out his coinpurse is empty.</p>
<p>Refusing to take money from a jobless youth, Hildibrand seizes on a different “solution” and speaks of a local custom: proving conviction by shaving one’s head. Before Shigure can recover, Nashu happily “does the honors,” and the proprietress collapses in laughter—so delighted that she hands over a kimono and calls the entertainment payment enough.</p>
<p>Nashu slips into the disguise, and when you return, even Shigure admits she looks every bit the geiko. The doorman relents—allowing her inside, and no one else—while Hildibrand celebrates the plan’s success and you can only watch Nashu disappear beyond the threshold.</p>
<p>Inside, Akebono praises the Soboro Sukehiro and the incomparable geiko Chiyoume, while a dead-eyed companion speaks of claiming what he desires “when the project is complete” and grows increasingly possessive of her. Chiyoume rebuffs him sharply, Nashu arrives to join the gathering, and then Hildibrand barges in with grand greetings—earning Akebono’s outrage and his order for Yojimbo to throw the “taikomochi” out.</p>
<p>Yojimbo refuses to lay hands on a “fair maiden,” condemns Akebono’s company, and in the chaos Shigure spots the Wolf Burglar at last. You give chase, but the thief slips away yet again—leaving Shigure to celebrate too soon that the sword is safe, only for Akebono to snarl that what you’re holding is no Soboro Sukehiro at all, and to banish you until you recover the real blade.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>シグレが切迫した声で知らせてくる。昼も夜も追ってきた「こそドロ一匹オオカミ」が、またしても犯行に及んだという。事件屋とその助手はすでに先回りしているが、急げば聞き込みが始まる前に間に合うかもしれない――あなたはシグレとともに、楽座街へ駆ける。</p>
<p>楽座街ではナシュが同じ報せを叫び、アケボノが「危ないところだった」と興奮気味にまくし立てる。ヒルディブランドは自らを名乗り、「探偵の勘が導いた」と胸を張って事情を問う。アケボノは、こそドロ一匹オオカミが白昼堂々、秘蔵の名刀「ソボロ助広」を盗もうとしたのだと語る。</p>
<p>しかしアケボノは笑い飛ばす。盗みは「未遂」に終わったのだと。なぜなら彼は新たに用心棒を雇った――比類なき侍、ヨウジンボウである。シグレは、こそドロ一匹オオカミが獲物を諦めるはずがないと訴え、刀を守るために力を貸してほしいと願い出るが、アケボノは聞く耳を持たない。追加の護衛など不要だと言い捨て、三条花街での待ちに待った用事があるのだと、さっさと去っていく。</p>
<p>あなたたちは三条花街まで追うが、入口の用心棒に行く手を阻まれる。助けに来たのだと説いても、用心棒は「盗みに入るつもりだろう」と決めつけ、さらに嘲るように言う――アケボノが迎えるのは「格別に美しい芸妓」だけで、あなたたちはその条件に当てはまらない、と。手詰まりの空気の中、ヒルディブランドは「美しさに勝る計画」があると言い放つ。</p>
<p>シグレの案内で置屋を訪ねると、女将は「探偵など聞いたことがない」と鼻で笑い、着物は安く貸せるものではないと突っぱねる。力を貸してほしいなら代金を払え――七万ギルだと言われ、あなたは思わず口走る。サブリガのほうが高いだの、遊戯場でスッてしまっただの、言い訳にもならない言葉が漏れる。ヒルディブランドは払えると胸を叩くが、ナシュに財布が空だと指摘され、言葉を失う。</p>
<p>それでもヒルディブランドは、職もない若者から金は取れないと言い切り、別の道を選ぶ。信念を示すために髪を剃り落とす風習があるのだろう、と。次の瞬間、ナシュが嬉々として剃刀を構え、シグレの美しい長髪は容赦なく刈られていく。女将は腹を抱えて笑い、「その見世物が代金だ」とばかりに着物を貸し与える。</p>
<p>着物をまとったナシュは見違えるようで、シグレですら「これなら通される」と息をのむ。門番は目を細め、芸妓だと認めてナシュだけを通し、ほかは入れないと言い渡す。あなたは外で待つしかなく、計画の成否はナシュひとりに託される。</p>
<p>中ではアケボノがソボロ助広と芸妓チヨウメを褒めそやし、死んだ目の男は「完成したら望むものを手に入れる」と含みを持たせてチヨウメに迫る。チヨウメはきっぱりと退け、そこへナシュが加わるが、やがてヒルディブランドが派手に乗り込み、太鼓持ち扱いされて追い出されそうになる。アケボノの命令にヨウジンボウは従わず、汚らわしい連れ合いを非難し、場は混乱へとなだれ込む。</p>
<p>その隙に、シグレがこそドロ一匹オオカミを見つけ、あなたたちは追う――だが盗賊はまたも逃げおおせる。シグレが「刀は無事だ」と喜ぶ間もなく、アケボノはそれが偽物だと怒鳴り、真のソボロ助広を取り戻すまで戻るなとあなたたちを追い払う。</p>
</div>
<div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'傳聞中的劍豪',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
<p>Shigure 急匆匆地把消息丟到你面前：你們日夜追查的 Wolf Burglar 又出手了，而且情報才剛傳來沒多久。Inspector 和他的助手已經先一步趕去，你若立刻跟上，也許能在他們開始詢問目擊者之前抵達現場。</p>
<p>你跟著 Shigure 趕到 Rakuza District，Nashu 也同時嚷著「Wolf Burglar 又犯案了！」Master Akebono 一副驚魂未定卻又迫不及待要訴苦的模樣。Hildibrand 以「inspector extraordinaire」自居，拍胸口說自己嗅到了案件的氣味，催促 Akebono 說出究竟遭遇了什麼不公。</p>
<p>Akebono 指著自己的得意收藏，說那賊竟然在大白天就敢來偷他最上等的名刀——Soboro Sukehiro。可他很快又得意大笑：對方只是「企圖」，沒有得逞，因為他最近雇了新的保鑣——無與倫比的武士 Yojimbo，光他一人就勝過百名護衛。</p>
<p>Shigure 仍不放心，認定 Wolf Burglar 不可能放棄這種獵物，懇求 Akebono 允許他協助加強守備，好把犯人一舉拿下。可 Akebono 不耐煩地打斷他，斷言不需要任何額外護衛，還說自己整週期待的行程在 Sanjo Hanamachi，絕不讓這種小事耽誤，轉身就走。</p>
<p>你們追到 Sanjo Hanamachi，卻被 Akebono 的保鑣擋在門外。Shigure 想解釋你們是來幫忙的，對方卻反咬說你們想騙過門口混進去偷刀，還嘲諷你們一個比一個寒酸。更糟的是，他說 Akebono 今天只會接待「美得出眾的藝伎」，除此之外誰都別想進去——你們就這樣被硬生生轟走。</p>
<p>走投無路之際，Hildibrand 卻說自己有個「美得出眾」的計畫。Shigure 帶你們去附近一間置屋，老闆娘聽到「inspector extraordinaire」只覺得荒唐，直言和服不是能隨便外借的。她開口就要七萬 gil，你一下子找不到錢，只能硬擠出可笑的藉口——不是嚷著自己的 subligar 都比這更值錢，就是老實承認自己把最後的錢都輸在 Gold Saucer 的賭局裡。</p>
<p>Hildibrand 原本還自信說他付得起，可 Nashu 一句話就戳破：他的錢包早就空了。Hildibrand 不願向「落魄又沒工作」的年輕人伸手要錢，反倒提出另一條路：既然 Hingashi 有用「剃光頭髮」來表達決心的習俗，那就用這份決心換取協助。你還來不及反應，Nashu 已經興致勃勃地動手，把 Shigure 引以為傲的長髮剃了個精光；置屋老闆娘笑到停不下來，說你們帶來的娛樂已經抵過報酬，乾脆把和服借出。</p>
<p>換上和服的 Nashu 幾乎像是換了個人，連 Shigure 都看得發愣，認定門口那個人不可能再把她趕走。你們回到入口，保鑣果然放行——但只准 Nashu 一個人進去，其他人一律不得跟隨。你只能站在外頭，眼睜睜看著她把成敗一肩扛起。</p>
<p>屋內，Akebono 一邊稱頌 Soboro Sukehiro 的無雙，一邊讚美藝伎 Chiyoume 的無雙；一名眼神死寂的男子附和著，還放話等「計畫完成」就能把想要的都拿到手，對 Chiyoume 的糾纏也愈發露骨。Chiyoume 冷冷回絕他，Nashu 也趕忙加入席間周旋，可下一瞬間 Hildibrand 卻大剌剌闖入，把場面攪得一團亂，惹得 Akebono 暴怒，命令 Yojimbo 把這個「幇閒」丟出去。</p>
<p>Yojimbo 卻拒絕對「淑女」動手，反過來痛斥 Akebono 與下流之徒為伍；就在混亂爆開的同時，Shigure 驚呼你們終於看見 Wolf Burglar。你追了上去，卻仍被他溜走；Shigure 還來不及慶幸「刀還在」，Akebono 就怒吼你手上那把根本不是 Soboro Sukehiro，當場把你們轟走——找回真正的名刀之前，別再出現在他眼前。</p>
</div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});
