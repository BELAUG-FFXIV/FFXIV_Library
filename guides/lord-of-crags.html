const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Lord of Crags',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Years ago, when you and the Company of Heroes were weighing how to reach Titan, Riol recalls that one of their scouts stumbled upon a beastman aetheryte. Seeing your uncertainty, Y’shtola steps in to explain that it is simply an unamplified aetheryte claimed by a beast tribe—no different in kind from those you have used countless times.</p>
      <p>Riol welcomes the “Sharlayan lass” back, and Y’shtola admits she interrupted because curiosity got the better of her. She speaks of the bewildering labyrinth of tunnels beneath O’Ghomoro—an underground maze no outsider has ever fully explored—and confesses that how the Company of Heroes navigated it has long been a question in her mind.</p>
      <p>Riol laughs and says they were not foolish enough to go in the front. The kobolds are always digging new passages and filling old ones with traps, and one wrong step can bring tons of rock crashing down—suicide for any outsider who tries to force their way through.</p>
      <p>What struck them, he says, was how easily the kobolds moved through their own “city” of U’Ghamaro Mines. Thinking of how hard it would be to get around a city without an Aethernet, the Company reasoned the kobolds must have their own network, and that idea became their way forward.</p>
      <p>Y’shtola points out that even if aetheryte shards existed deep within O’Ghomoro, you would have needed to attune to them first before she could identify their signatures within the Lifestream. Riol counters that this is where she is mistaken—because a Sharlayan man helped them, delivering them straight into Titan’s bedchamber, and boasting it was nothing any Sharlayan scholar “worth her salt” could not manage.</p>
      <p>That claim draws a sharp reaction from Y’shtola, who begins turning the problem over aloud: finding a beacon without a known signature might be possible under the right conditions, but guiding someone to it safely would require a second party to do more than simply locate it. In the end, she concedes it may be possible in theory—yet whether it will work depends on whether she truly is “worth her salt.”</p>
      <p>With Riol urging you all on, you make for Zelma’s Run to see the aetheryte with your own eyes, cutting through the kobolds who bar the way. There, Y’shtola studies the device and confirms Papalymo’s speculation: in its present state, its signal is too weak, but she may be able to amplify it with her own energies—a task that will consume her full attention.</p>
      <p>She tells you to proceed without her while she remains behind to sustain the beacon so you are not denied your only path of escape, and she will call nearby Maelstrom forces to protect the area. As she focuses herself and locates another beacon far below the mountain, she warns that she can only guess what awaits you there—so you must not stint in your preparation—then sets to the work, determined to prove she is, indeed, worth her salt; and when you return to her afterward, she is relieved to see you well, and calls you close to discuss the next step.</p>
    </div>

  JP:{
    langLabel:'日本語',
    pageTitle:'憤怒の岩神タイタン',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>かつて英雄団がタイタンへ辿り着く方法を検討していた頃、リオルは、斥候が蛮族に奪われた増幅されていないエーテライトを見つけたのだと思い出す。あなたの戸惑いを見て、ヤ・シュトラは、それはただ蛮族が占有している未増幅のエーテライトにすぎず、本質的にはあなたが幾度となく利用してきたものと何ら変わらないと説明する。</p>
      <p>リオルはシャーレアンの娘の帰還を歓迎し、ヤ・シュトラは報告を待つつもりだったが、好奇心に抗えず口を挟んだと詫びる。オ・ゴモロの地下に広がる坑道は、外部の者が誰も全容を把握できない迷宮であり、英雄団がどうやってそこを進んだのかは、彼女が長らく抱えてきた疑問だった。</p>
      <p>リオルは笑って、正面突破などするほど愚かではないと言い切る。コボルド族は常に新たな坑道を掘り進め、古い道には罠を仕掛けるため、一歩間違えれば頭上に岩が崩れ落ちる――よそ者が無理に踏み込むのは自殺行為だという。</p>
      <p>だが不思議なことに、コボルド族は自分たちの坑道を難なく行き来していた。ウ・ガマロ鉱山は都市のような規模であり、その中を移動するならエーテルネットのような仕組みがなければ不便なはずだと英雄団は考え、彼らにも同様の網があるに違いないと推測したのだと語る。</p>
      <p>ヤ・シュトラは、たとえオ・ゴモロの深部にエーテライト・クリスタルが存在していたとしても、生命の奔流の中でその痕跡を見分けるには、まずあなたたちが同調しておく必要があると指摘する。だがリオルは、それは違うと言って、シャーレアンの男が手を貸し、タイタンの寝所へ送り届けてくれたのだと明かし、彼はシャーレアンの学者なら誰でもできる程度のことだと豪語していたと付け加える。</p>
      <p>その言葉にヤ・シュトラは不快げに反応しつつ、思考を巡らせる。既知の同調がない状態で標を見つけることは条件次第では可能かもしれないが、そこへ安全に導くには、単に位置を割り出すだけでは足りず、もう一者の働きが必要になる――そう結論づけ、理屈の上では可能だとしても、成功するかどうかは自分の力量次第だと認める。</p>
      <p>リオルに促され、あなたはゼルマの走道へ向かい、行く手を阻むコボルド族を退けてエーテライトを確認する。ヤ・シュトラはそれを調べ、パパリモの推測どおり、現状の信号では目的に足りないが、自身の力で増幅できるかもしれないと告げる――ただし、その作業は彼女の意識を独占するほど集中を要するという。</p>
      <p>彼女は、あなたが唯一の退路を失わぬよう標を支えるため、ここに残って力を注がねばならないとして、あなたには先へ進むよう命じ、周辺に駐屯する黒渦団を呼んで守りを固めると約束する。やがて山の奥深くに別の標を捉えた彼女は、そこで何が待つかは推測するほかないゆえ準備を怠るなと告げ、己が力量を示すべく作業に取りかかり、後にあなたが戻ると無事を見て安堵し、次の手立てを話し合おうとあなたを招く。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> リオル　<small class="muted">高地ラノシア (X:31.0, Y:24.0)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="as-you-wish.html">口笛は風に乗り</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 34～</div>
      <div class="row">
        <b>討伐戦開放</b>
        <a class="link" href="the-navel.html">タイタン討伐戦</a>
      </div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="all-good-things.html">灯りの消えた日</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'憤怒土神泰坦',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Riol 回想，多年前你和 Company of Heroes 還在思考該如何抵達 Titan 時，一名斥候偶然發現了一座被 beast tribe 佔據的 aetheryte。你露出不太熟悉的神情，Y’shtola 便出聲解釋：那只是尚未被增幅的 aetheryte，被 beast tribe 佔用而已，本質上與你過去無數次使用的並沒有不同。</p>
      <p>Riol 也認出這位 “Sharlayan” 的姑娘回來了，而 Y’shtola 坦言自己原本打算等你們的回報，卻終究敗給好奇心。她提到 O’Ghomoro 地底的通道宛如迷宮，外人從未真正走遍全貌；Company of Heroes 當年究竟是怎麼穿行其中，這一直是她放在心上的疑問。</p>
      <p>Riol 大笑說，他們可沒傻到從正門硬闖。kobold 族不斷挖掘新通道，又在舊路上佈滿陷阱；只要踩錯一步，頭頂就可能崩落成百上千的巨石，外人想強行深入，無異於自尋死路。</p>
      <p>但真正引起他們注意的，是 kobold 族在自己的 “城市” 裡行走自如。U’Ghamaro Mines 規模龐大得像座城，若要在那樣的地方來去穿梭，沒有類似 Aethernet 的系統一定非常麻煩；因此 Company of Heroes 推斷，kobold 族必然也有屬於自己的網路，而那個推論成了他們行動的關鍵。</p>
      <p>Y’shtola 指出，就算 O’Ghomoro 深處真的存在 aetheryte shards，你也必須先與它們 attune，她才能在 Lifestream 中辨認出那些訊號。Riol 卻說事情並非如此，因為當年有位 Sharlayan 的男子協助他們，甚至把他們直接送進 Titan 的居所；而那人還自誇，這不過是任何 “worth her salt” 的 Sharlayan 學者都做得到的事。</p>
      <p>那句話讓 Y’shtola 明顯不悅，她一邊冷冷哼聲，一邊把線索拆解重組：在缺乏已知訊號的情況下，要找出某個 beacon 或許並非全然不可能，但若要讓旅人能安全抵達，就需要另一方做的不只是「找到」而已。她最後承認，理論上或許行得通——可成敗，終究取決於她是否真的 “worth her salt”。</p>
      <p>在 Riol 的提議下，你們前往 Zelma’s Run，途中擊退阻攔的 kobold 族，終於得以近距離查看那座 aetheryte。Y’shtola 觀察後確認正如 Papalymo 所推測：以它目前的狀態，訊號強度不足以達成目的，但她或許能以自身的力量加以增幅——只是這個過程會長時間佔據她全部的注意力。</p>
      <p>她要求你先行前進，因為她必須留在原地為這個 beacon 補足力量，確保你不會失去唯一的退路，同時也會召來附近駐守的 Maelstrom 部隊保護此處。當她集中精神，捕捉到山體深處另一個 beacon 的位置時，她提醒你無法確定那裡究竟有什麼在等著你，所以務必充分準備；她隨即投入工作，決心證明自己確實配得上那句評語——而在你之後回到她身邊時，她看見你平安無事，明顯鬆了口氣，並招呼你一起商議下一步。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 里奧爾　<small class="muted"> 拉諾西亞高地 (X:31.0, Y:24.0)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="as-you-wish.html">口哨隨風</a></div>
      <div class="row">所有職業（不含限定職） 等級 34 以上</div>

    followq:`<div class="stack">

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
