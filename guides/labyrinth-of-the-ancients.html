    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>G’raha Tia calls to the men that the secrets of ancient Allag are within reach, and urges that you waste no more time. He says you and he will join the engineers at the Crystal Tower’s main gateway to neutralize the outer defenses, while Rammbroes remains behind to oversee the operation. With his long study of Allagan history, G’raha Tia argues it is only logical that he lead the expedition itself—even if he admits the role fits awkwardly with his status as an observer—and proposes that, if all agree, you proceed at once to the large, lopsided gate to the southeast. As you set out, he speaks with unmistakable fervor: he has studied the Allagan legacy for years, and now the very heart of his obsession is finally within reach. It falls to you—to NOAH—to crack open the tomb of a fallen civilization and bring its history out of the shadows and into the light.</p><p>At the Crystal Gate, Cid tells you the Crystal Tower lies beyond the portal and that the interesting part begins now. G’raha Tia points out that Cid alone has crossed this threshold before and asks him to take the lead. Beyond, the energy radiating from the statues is so strong it feels tangible, and Cid explains that is precisely the danger: these are the elemental defenses that demanded all your preparation. The sentinels stop any intruder from advancing within twenty yalms of the tower’s inner reaches—no matter how swift they might be. Cid says the crystal fangs you crafted should spare you from instantaneous annihilation and, despite Biggs’s alarm, insists on testing one himself: he made the damn things, so it is his job to see they work. The test succeeds. Convinced, G’raha Tia tells everyone to ready their fangs, and Cid offers the last one to you, saying it is only right. When the final defense falls, Wedge laughs in triumph, and G’raha Tia declares the entrance is close, his anticipation almost impossible to contain.</p><p>Then Cid shifts the mood with a proposal for the next stage. He suggests that you and a handpicked party of adventuring companions enter the tower while the others wait outside. G’raha Tia protests—wasn’t the point to survey the entire structure? Cid says you will, but the work must proceed at a more measured pace. If the outside is defended this fiercely, he argues, the inside will be worse, and only a true hero can reasonably hope to brave what lies ahead and live to tell the tale—and you fit that description better than anyone he knows. Meanwhile, the rest of them will not be idle: while you risk life and limb to beat a path forward, they can analyze the rubble for evidence of how the tower’s technologies function, and G’raha Tia’s ancient lore will be invaluable for that work. G’raha Tia grumbles that Cid is infuriatingly right, but accepts the situation, and—since he will not accompany you—gives you instruction instead. The maze at the tower’s base is called the Labyrinth of the Ancients, and for this first foray he advises you to focus on driving out hostile elements. Once you are reasonably sure the maze is secure, you are to contact him, and he swears he will come running—no matter what Cid says. He would prefer any relics remain intact, but grants you leave to do whatever is necessary to secure access to the tower’s upper levels, and he sends you off with fortune.</p><p>You carve your way through the Labyrinth of the Ancients, and when you meet again within the vast interior zone, Cid hails you, and G’raha Tia calls your performance impressive—saying your name will surely be written large in the accounts that will be penned of this expedition. Cid stares at the scale of the structure and says someone clearly believed bigger was better. G’raha Tia, citing the findings of his Baldesion colleagues, explains that the Crystal Tower was built to collect and store the endless energies of the sun—an undertaking as ambitious as it is characteristic. When Cid asks about the tower’s inner defenses, G’raha Tia reads your exhausted look and understands the labyrinth was no small feat, and when you describe a giant wielding a shimmering scimitar, he corrects you without hesitation: that would have been Phlegethon—not Acheron—Phlegethon, a hero of the Allagan revolution. Cid challenges how he could possibly know that, and G’raha Tia answers simply that he is a historian with an affinity for Allagan lore, knowledge drawn from musty scrolls and tomes. Those texts claim the Crystal Tower is defended by champions of old, resurrected and augmented through extraordinary Allagan technology.</p><p>Biggs calls out for Cid to look, and as the foot of the tower comes into view, Cid wonders what surprises still wait. He tells you how glad he is to have you along—without you beating a path through the maze, he doubts any of them would be standing here. G’raha Tia agrees there is much to discuss and digest, and proposes you return to Saint Coinach’s Find to plan the next step, emphasizing that the expedition still has a long way to go. Back there, he welcomes you eagerly and says the meeting would be dull without a full account of what you endured in the labyrinth. He tells you to take a moment to collect yourself—and when you are ready, you will debate how best to proceed.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>グ・ラハ・ティアは声高に呼びかけ、古代アラグの秘密が手招いているのだと言う。もう待たせるべきではない――あなたと自分は技術者たちと共にクリスタルタワーの正門へ向かい、外郭防衛の無力化に挑むのだと告げる。一方でラムブルースはここに残り、作戦全体を統括する。長年アラグ史を学んできた自分こそが遠征を率いるのが理にかなっている、とグ・ラハ・ティアは言い、観察者という立場には少々そぐわない役割だと認めつつも、手持ちの戦力で進むほかないと結論づける。皆が同意するなら、南東にある大きく傾いた門へ直ちに向かおう――そう促しながら、彼は胸の昂りを隠さない。長年追い続けたアラグ帝国の遺産、その核心がいま手の届くところにあるのだ。滅びた文明の墓をこじ開け、歴史の富を闇から光へ引き出す――それはノアの責務だと。</p><p>クリスタルゲートに立つと、シドはこの門の向こうにクリスタルタワーがあると言い、いよいよ面白い局面だと告げる。グ・ラハ・ティアは、ここを越えた経験があるのはシドだけだとして、当面は先導してほしいと頼む。進む先で、像から放たれる力は肌で感じるほど濃密で、シドはそれこそが危険の証だと説明する。これが長い準備を要した属性防衛であり、侵入者をタワー内部の近くへ二十ヤルム以内に近づけない――どれほど俊敏であろうとも、だ。だが丹念に作り上げたクリスタルの牙があれば即死の不便は避けられる、とシドは言い、ビッグスが止めようとしても、自分が作ったのだから動作確認は自分の責任だと強行する。結果は成功。グ・ラハ・ティアは納得し、皆に牙の準備を命じ、シドは最後の一本をあなたに渡す。そうするのが当然だ、と。</p><p>外郭防衛を突破した直後、ウェッジは勝利を喜び、グ・ラハ・ティアは入口が目前だと告げ、期待に血が騒ぐとまで言う。だがシドは次の段階について提案を出す。あなたと選抜した冒険者の仲間だけでタワー内部へ入り、残りはここで待機すべきだという。グ・ラハ・ティアは反発し、全域を調査するために来たのではないのかと問いただすが、シドは調査はする、ただし慎重な歩みが必要だと答える。外側がこれほど厳重なら内側はさらに苛烈で、危険を越えて生還し語れるのは真の英雄だけだ――そしてそれに最もふさわしいのがあなたなのだ、と。</p><p>待機組にも仕事はある。あなたが命を賭して道を切り開いている間、彼らは瓦礫を解析し、技術の仕組みを探ることができる。古代の知識を持つグ・ラハ・ティアの助力が不可欠だ、とシドは言う。グ・ラハ・ティアは不満をにじませつつも、結局はシドが正しいことを認め、せめてもの助言として、塔の基部を囲む迷宮は古代の迷宮と呼ばれるのだと教える。最初の踏査では敵対する存在を排除することに注力し、安全が確保できたら連絡せよ。そのときはシドが何と言おうと駆けつける、と。遺物は可能なら損なわぬことが望ましいが、上層へ至るために必要なら手段は任せる――そう言い、幸運を祈ってあなたを送り出す。</p><p>あなたが古代の迷宮を切り抜けたのち、巨大な構造物の内部で再会すると、シドはあなたに声をかけ、グ・ラハ・ティアは見事だと称える。この遠征の記録が編まれるなら、あなたの名は大きく刻まれるだろう、と。シドは規模が理解を超えていると呟き、誰かが大きければ良いと考えたに違いないと言う。グ・ラハ・ティアは、バルデシオン委員会の仲間の調査によれば、クリスタルタワーは太陽の尽きぬ力を集め蓄えるために建てられたのだと説明し、それは実に野心的な計画だと評する。さらに塔の内部防衛について問われると、あなたの疲れた様子から迷宮の制圧が容易でなかったことを察し、あなたが光る曲刀を携えた巨人の話をすると、即座に訂正する。それはアケロンではなく、フレゲトンであり、アラグ革命の英雄だという。シドが根拠を問うと、グ・ラハ・ティアは自分は歴史家であり、古い巻物や書物から得た知識だと返す。古代文献には、クリスタルタワーが旧き勇士たちによって守られ、彼らは驚異的な技術で蘇生され強化されたのだと記されているのだ、と。</p><p>ビッグスが呼びかけ、塔の基部が姿を現すと、シドは次にどんな驚きが待つのかと口にし、あなたが迷宮を突破してくれたからこそ今ここに立てているのだと感謝を示す。グ・ラハ・ティアは、議論し消化すべきことが山ほどあると言い、ひとまず聖コイナク財団の調査地へ戻って次の手を考えようと提案する。遠征はまだ道半ばなのだ、と念を押しながら。戻ったのち、彼はあなたを歓迎し、迷宮での体験を余すところなく聞けなければ会議は退屈になると言う。まずは息を整え、準備ができたら最善の進め方を議論しよう――そう告げる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>G’raha Tia 高聲招呼眾人，說古代 Allag（古代亞拉戈帝國）的秘密正在向你們招手，別再讓它們等下去了。他提議你和他一起與工程師們會合，前往 Crystal Tower 的主入口，嘗試讓外部防禦失效；而 Rammbroes 則留在原地統籌全局。G’raha Tia 也坦白，憑他對 Allag（古代亞拉戈帝國）歷史的理解，讓他來領導遠征似乎再合理不過——雖然這個角色與他「觀察者」的身分並不完全相稱。可眼下只能善用手邊的資源；若大家都同意，就立刻出發前往東南方那座巨大、傾斜的門。他又壓不住興奮地說，自己研究 Allag（古代亞拉戈帝國）的遺產已經很多年，如今遠征終於啟動，他長久以來沉迷的核心就在眼前。這份責任落在你們——落在 NOAH 身上：要撬開一個覆滅文明的墳墓，把它沉在陰影裡的歷史財富帶回光明之中。</p><p>在 Crystal Gate 前，Cid 指著入口說 Crystal Tower 就在這道傳送門後面，真正有趣的部分現在才開始。G’raha Tia 提醒眾人，只有 Cid 曾經跨過這道門檻，因此希望他暫時帶頭。當你們進一步靠近，守衛雕像散發出的能量強烈得幾乎能被「觸碰」到；Cid 說這正是關鍵——這些就是逼得你們做了漫長準備的屬性防禦。它們會阻止任何入侵者接近塔內核心二十亞爾姆之內，無論對方有多快。Cid 說你們辛苦打造出的水晶獠牙，理應能讓你們不必再承受「瞬間被抹殺」的麻煩，並表示要親自示範。Biggs 急得想阻止，但 Cid 直接回應：若要有人冒著生命危險測試，那就該由他來——因為這些東西是他做的，他有責任確保它們能用。結果證明成功。G’raha Tia 表示自己已完全信服，命令大家把獠牙準備好；Cid 把最後一枚交給你，說這樣才合理。最後一道防禦被破解時，Wedge 大笑著宣告成功，而 G’raha Tia 則說入口已近在咫尺，他的血幾乎因期待而歌唱。</p><p>然而 Cid 隨即提出下一步的提案：他建議你帶著精挑細選的一隊冒險者同伴進入塔內，其餘的人先留在這裡等待。G’raha Tia 立刻抗議，說你們不是來勘查整個建築的嗎？Cid 回答你們當然會，但必須以更穩健的速度推進。若外部就如此嚴密，內部只會更加兇險；能闖過去並活著回來講述的人，只可能是真正的英雄，而你比他認識的任何人都更符合那個稱呼。Cid 也強調，大家不會在你缺席時閒著。當你和同伴冒著性命去替眾人打通道路時，他們可以在外圍分析瓦礫，找出這些技術運作的證據；而 G’raha Tia 作為「歷史學者」，他的古代知識對這件事至關重要。G’raha Tia 嘴上不爽地說 Cid 總是對得讓人火大，卻也只能接受。既然他無法陪你進去，他便改以指引的方式幫你：塔基周圍的迷宮名為 Labyrinth of the Ancients，這次的首次深入，他建議你先把其中的敵對存在清除掉。</p><p>他說當你確認迷宮已大致安全，就用通訊貝聯絡他，到時他會立刻趕來——不管 Cid 怎麼說都一樣。他也表示他們希望你遇到的遺物能保持完整，但若要確保能通往上層，你可以採取任何必要手段。最後，他祝你一路順利。你完成了對 Labyrinth of the Ancients 的清理後，在那片龐大的區域內與眾人會合。Cid 先招呼你，而 G’raha Tia 直言你的表現令人印象深刻，說這次歷史性的遠征勢必會被寫成卷冊，而你的名字將被大書特書。Cid 看著建築規模感嘆它大得讓人難以理解，像是有人堅信越大越好。G’raha Tia 則引用 Baldesion 同僚的研究成果，說 Crystal Tower 是為了收集並儲存太陽無窮無盡的能量而建造——這是典型的野心之作。</p><p>Cid 接著問塔內的防禦如何，從你疲憊的神情便知道迷宮之戰並不輕鬆。你提到一名揮舞著閃耀彎刀的巨人時，G’raha Tia 立刻糾正：那是 Phlegethon，不是 Acheron；Phlegethon 是 Allag（古代亞拉戈帝國）革命的英雄。Cid 追問他到底從哪裡看出來，G’raha Tia 只回一句：他是歷史學者，對 Allag（古代亞拉戈帝國）的傳說有種難以言說的「親和」。他補充，這些知識全都來自陳舊的卷軸與典籍；古老文獻宣稱，Crystal Tower 由遠古的勇士守護，而他們是透過 Allag（古代亞拉戈帝國）驚人的技術被復活並強化。</p><p>Biggs 這時呼喚 Cid 去看某樣東西；當 Crystal Tower 的塔基映入眼簾，Cid 低聲猜測接下來還會有什麼驚喜等待著你們。他也對你說，很慶幸有你同行——若不是你替大家在迷宮中開出道路，他很懷疑你們能不能站到這裡。G’raha Tia 表示現在有太多事情需要討論與消化，提議先回 Saint Coinach’s Find，再規劃下一步，並再三強調：遠征仍然還有很長一段路要走。回到 Saint Coinach’s Find 後，G’raha Tia 說你願意加入真是太好了；若少了你對迷宮經歷的完整敘述，這場會議肯定會無聊透頂。他要你先整理一下自己，等你準備好之後，你們就來辯論接下來該怎麼走。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>任務發布</b> 古·拉哈·提亞 <small class="muted"> 摩杜納 (X:30.4, Y:12.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-performance-for-the-ages.html">靈砂與過去的記錄者</a></div><div class="row"><b>解鎖團隊副本</b> <a class="link" href="the-labyrinth-of-the-ancients.html">水晶塔 古代人迷宮</a></div><div class="row">戰鬥／魔法職業 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="for-prosperity.html">諾亞的調查記錄</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
