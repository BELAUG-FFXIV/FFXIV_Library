  <style>
    :root{ --bg:#fff8e6; --card:#ffffff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{ margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif; background:var(--bg); color:var(--fg); }
    .container{max-width:1080px; margin:0 auto; padding:0 16px}
    .site-header{border-bottom:1px solid var(--border); background:#fff9edb3; backdrop-filter:saturate(120%) blur(6px); position:sticky; top:0; z-index:10}
    .nav{display:flex; align-items:center; justify-content:space-between; height:60px}
    .left{display:flex; align-items:center; gap:12px}
    .home{border:1px solid var(--border); background:#fff; padding:4px 8px; border-radius:8px; text-decoration:none; color:var(--fg); font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex; align-items:center; gap:8px}
    .icon-btn{background:none; border:none; cursor:pointer; font-size:14px; padding:6px 10px; border-radius:8px}
    .icon-btn:hover{background:#fff; border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{ display:grid; grid-template-columns:1.1fr 1fr; gap:20px; align-items:start; }
    @media (max-width: 900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative; padding-top:56.25%}
      .video-wrap iframe{position:absolute; inset:0; width:100%; height:100%}
    }
    .card{background:var(--card); border:1px solid var(--border); border-radius:16px; box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px; border-bottom:1px solid var(--border); font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%; height:420px; border:0; display:block; border-radius:16px}
    .tabs{display:flex; gap:8px; padding:12px 12px 0; flex-wrap:wrap}
    .tab-btn{background:#fff; border:1px solid var(--border); color:var(--fg); border-radius:999px; padding:8px 14px; cursor:pointer; font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent); color:#fff; background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex; flex-direction:column; gap:10px}
    .stack .row{padding:12px 14px; border:1px dashed var(--border); border-radius:12px; background:#fffdf6}
    .row b{display:inline-block; min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8; text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>

    const LANG_KEY = 'ffxiv-guide-lang';

    const i18n = {
      EN: {
        langLabel: 'EN',
        pageTitle: 'Go Forth, Brave Explorers',
        tabs: { story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
        readMore:'Show more', readLess:'Show less',
        story: `
          <div class="clamp" data-collapsed="true">
            <p>Namingway stops you for a moment and explains that Searchingway wishes to speak with both of you. When you arrive, Searchingway reveals that the initiative has reached a new stage. Thanks to everyone’s efforts, the Moongate Hub now has everything it needs, and the focus can finally shift from building the base to venturing beyond it. More than that, the Galactic Way has already passed not only its unmanned test flights, but its maiden voyage as well. A scouting party has set foot on an unexplored star.</p>
            <p>The moment Searchingway refers to that world by its cold designation, Namingway recoils in dismay. A star, he insists, deserves more than a clinical string of symbols. It deserves beauty, imagination, and a name worthy of wonder. Searchingway answers that this is exactly why he called for him. If Namingway sees the world with his own eyes from the starship window, inspiration will surely follow. Faced with the chance to name an entire star, Namingway cannot possibly refuse, and throws himself into the task with all the zeal he can muster.</p>
            <p>Searchingway then turns to you. A new camp has already been established on the world below, and he believes it would benefit greatly from your skills. In truth, he expects that many hands will be needed there, and so all willing contributors are being encouraged to make the journey. Once you are ready, you are told to gather at the cosmoport, where Captain Cruisingway waits to take you to the stars. There, while Searchingway jokes about the aftermath of the scouting party’s unpleasant voyage and Namingway frets over the gravity of the name he must choose, Cruisingway welcomes you aboard with effortless charm.</p>
            <p>Soon the launch begins. Systems engage one after another, the ship aligns with the stellar current, and the Galactic Way carries you out across the void. When the journey ends and the world comes into view, Namingway is left speechless for only a heartbeat. The star’s landscape scatters light like a prism, gleaming with strange brilliance, and the sight gives him everything he needs. Drawing on that radiance, he gives the world its new name: Phaenna.</p>
            <p>Once you arrive, Searchingway welcomes you to Phaenna and explains why this world was chosen. Its surface is rich in silicon, giving rise to its glasslike nature and promising both unusual flora and abundant mineral resources. Yet its beauty is dangerous. The rainbow crystal can keep the atmosphere from killing you outright, but storms of glass shards and the planet’s many hazards remain a constant threat. Even so, this is only the beginning. Because the Galactic Way can travel only so far and only along certain stellar currents, Phaenna is not the end goal, but a stepping stone. With its resources and its position, it will help open the path to worlds farther still. Searchingway entrusts you with aiding the effort in every way you can, while Namingway eagerly vows to continue giving thoughtful names to all that this new frontier has yet to reveal.</p>
          </div>
          <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>
        `,

        readMore:'全文を表示', readLess:'折りたたむ',
        story: `
          <div class="clamp" data-collapsed="true">
            <p>ネミングウェイはあなたを呼び止め、サーチングウェイがふたりに話したいことがあるのだと告げる。そこで待っていたサーチングウェイは、計画がいよいよ次の段階へ進んだのだと目を輝かせる。多くの協力者たちのおかげでムーゲート・ハブは必要な設備をほとんど備え、これからは拠点整備だけでなく、星間航行そのものへ力を注げるようになったのだという。しかも、ギャラクティックウェイ号は無人試験飛行だけでなく、初航海にも成功し、未踏の星へ先遣隊を送り届けることまで果たしていた。</p>
            <p>ところが、その新しい世界が味気ない管理番号で呼ばれていると知った瞬間、ネミングウェイはたちまち顔をしかめる。星そのものに、そんな無機質な呼び名ではあまりにも情緒がない。詩情も工夫も足りないと嘆く彼に、サーチングウェイはまさにそのために呼んだのだと告げる。実際に宇宙船の窓からその星を見れば、きっと心を揺さぶる名が浮かぶはずだと勧められ、星そのものの名づけを任されたネミングウェイは、断る理由などないと胸を高鳴らせる。</p>
            <p>続いてサーチングウェイは、あなたにも新たな役目を託す。すでに現地には新しいキャンプが築かれており、そこではあなたの技術が大いに求められているのだという。もちろん必要なのはあなただけではなく、多くの協力者たちの力も欠かせない。そのため、支度が整い次第、コスモポートへ来てほしいと告げられる。そこではクルージングウェイが待っており、あなたたちを星々へ送り届ける手はずになっていた。ネミングウェイはこれから授ける名の重みに身を引き締め、サーチングウェイは先遣隊の残した不快な匂いの話を交えながら、出発の時を迎える。</p>
            <p>やがて発進の時が来る。推進機関が動き出し、船は星流へと乗り、ギャラクティックウェイ号は虚空の彼方へ進んでいく。そして新たな世界が視界いっぱいに広がったその瞬間、ネミングウェイは目の前の光景に心を奪われる。地形はまるで硝子のプリズムのように光を散らし、その輝きは見たこともないほど鮮烈だった。その印象から、彼は迷うことなくこの星に新たな名を与える。こうしてその世界は、「パエンナ」と呼ばれることになる。</p>
            <p>到着後、サーチングウェイはあなたたちをパエンナへ迎え入れ、この星が最初の目的地に選ばれた理由を語る。地表には珪素が豊富に含まれ、その性質が硝子的な景観や独特の植生、そして豊かな鉱物資源を生み出しているという。だが、美しさの裏には危険も潜んでいた。虹結晶のおかげで大気そのものに命を奪われることは避けられても、ガラス片の嵐をはじめ、この星には無数の鋭い脅威が残されている。それでも、ここは終着点ではない。ギャラクティックウェイ号が進める距離には限りがあり、たどれる星流にも制約があるからこそ、パエンナはさらに遠くの星々へ至るための足がかりなのだという。そうしてサーチングウェイは、あなたにこの地で力を尽くしてほしいと頼み、ネミングウェイもまた、この新たな辺境で出会うあらゆるものにふさわしい名を与えていくのだと意気込むのだった。</p>
          </div>
          <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>
        `,
        acq: `
          <div class="stack">
            <div class="row"><b>クエスト発行</b> サーチングウェイ <small class="muted">（焦がれの入江, X:20.4, Y:20.0）</small></div>
          </div>
        `,
        unlockq: `
          <div class="stack">
            <div class="row"><a class="link" href="passion-thy-name-is-ardorum.html">未知待つ宙へ焦がれて</a></div>
            <div class="row"><a class="link" href="all-11-stellar-tools-showcase-doh-dol-ilv750.html">ステラスペース主道具 全11種紹介（クラフター／ギャザラー IL750）</a></div>

      ZH: {
        langLabel: 'ZH',
        pageTitle: '啟程吧，勇敢的探索者們！',
        tabs: { story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
        readMore:'展開全文', readLess:'收合內容',
        story: `
          <div class="clamp" data-collapsed="true">
            <p>Namingway 忽然叫住你，說 Searchingway 想和你們談談。當你過去之後，Searchingway 便帶著明顯按捺不住的興奮，告訴你們這項計畫已經來到下一個階段。隨著許多協力者的努力，Moongate Hub 如今已具備了所需的一切，接下來終於能把重心從基地建設轉向真正的星際航行。更令人振奮的是，Galactic Way 不只完成了無人測試飛行，連首次正式航行也已順利成功，先遣隊甚至已經踏上了一顆從未探索過的新星球。</p>
            <p>可當 Searchingway 提起那顆新世界仍只是以一串冰冷編號稱呼時，Namingway 立刻露出難以接受的神情。對他來說，一顆星球怎麼能只用這麼毫無情感的代號來稱呼。它應該擁有更有詩意、更有想像力，也更配得上它本身風采的名字。Searchingway 則笑著告訴他，自己正是為了這件事才特地把他叫來。只要親眼透過星艦的窗戶看看那顆星，靈感自然就會湧現。於是，面對為整顆星球命名這樣的機會，Namingway 幾乎毫不猶豫地接受了，甚至立刻投入其中，像是要把自己全部的熱情都灌注進那個名字裡。</p>
            <p>接著，Searchingway 也把視線轉向你。他說，新的前線營地已經在那顆星球上建立起來，而那裡顯然會非常需要你的技術。當然，不只是你一個人而已，因為現場勢必需要大量擅長製作與採集的人手，所以他也打算盡可能邀請更多願意同行的協力者一同前往。只要你準備好所需物品，就到 cosmoport 會合，Captain Cruisingway 會負責帶你們前往群星彼方。當你抵達那裡時，Searchingway 還半開玩笑地提起先遣隊飛行後留下的難聞氣味，而 Namingway 則仍因即將為一顆星命名而顯得異常慎重，至於 Cruisingway，則以一派輕鬆又自信的態度迎接你登船。</p>
            <p>不久之後，發射程序正式開始。各項系統接連啟動，星艦對準星流，Galactic Way 就這樣帶著你們穿越宇宙。等到航行結束、新世界真正映入眼簾的那一刻，Namingway 也只來得及為眼前的景象驚嘆片刻。那顆星球的地形會像玻璃稜鏡一般折散光線，整片地表都閃耀著陌生而明亮的光彩。正是這份印象，讓他當場找到了答案。他從那片折射而出的光輝中取意，為這顆星賦予了新的名字——Phaenna。</p>
            <p>抵達之後，Searchingway 歡迎你們來到 Phaenna，也向你們說明了為何第一個目的地會選在這裡。這顆星球的地表富含矽，因此形成了大量如玻璃般的地質特徵，也孕育出獨特的植物與豐富的礦物資源。然而，它的美麗並不代表安全。rainbow crystal 雖然能避免這顆星的大氣在瞬間奪走你們的性命，但只要稍有不慎，玻璃碎片形成的風暴與環境中隨處可見的危險，依舊足以致命。即便如此，這裡仍不是最終目的地。Searchingway 解釋，Galactic Way 能航行的距離有限，而且只能沿著特定的星流前進，因此 Phaenna 更像是一塊踏腳石。只要善用它的位置與資源，未來就能一步一步，前往更遙遠的星球。於是，他把在這裡協助探索與建設的工作交託給你，而 Namingway 也滿懷幹勁地表示，自己會繼續替這片新天地中遇見的一切賦予合適的名字。</p>
          </div>
          <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>
        `,
        acq: `
          <div class="stack">
            <div class="row"><b>任務發布</b> Searchingway <small class="muted">（Sinus Ardorum, X:20.3, Y:20.0）</small></div>
          </div>
        `,
        unlockq: `
          <div class="stack">
            <div class="row"><a class="link" href="passion-thy-name-is-ardorum.html">熱情，其名為亞多倫</a></div>
            <div class="row"><a class="link" href="all-11-stellar-tools-showcase-doh-dol-ilv750.html">Stellar Tools 全 11 把主工具展示（DoH／DoL iLv750）</a></div>
          </div>
        `,
        followq: `
          <div class="stack">
            <div class="row"><a class="link" href="the-brightest-star.html">最耀眼的星辰</a></div>

        `
      }
    };

    const langToggle = document.getElementById('langToggle');
    const pageTitle  = document.getElementById('pageTitle');
    const tabBtns = [...document.querySelectorAll('.tab-btn')];
    const panels = {
      story:  document.getElementById('panel-story'),
      acq:    document.getElementById('panel-acq'),
      unlockq:document.getElementById('panel-unlockq'),
      followq:document.getElementById('panel-followq'),
      comments: document.getElementById('panel-comments')
    };

    function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
    function applyLang(lang){
      const t = i18n[lang] || i18n.EN;
      pageTitle.textContent = t.pageTitle;
      langToggle.textContent = `🌐 ${t.langLabel}`;
      tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
      const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected') === 'true') || tabBtns[0];
      renderPanel(activeBtn.dataset.tab, lang);
    }

    function wireClamp(panelEl, t){
      const clamp = panelEl.querySelector('.clamp');
      const btn = panelEl.querySelector('[data-role="expand"]');
      if(!clamp || !btn) return;
      function setLabel(){
        const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
        btn.textContent = collapsed ? t.readMore : t.readLess;
      }
      setLabel();
      btn.addEventListener('click', ()=>{
        const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
        clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
        setLabel();
      });
    }

    function renderPanel(key, lang){
      const t = i18n[lang] || i18n.EN;
      Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
      panels[key].classList.add('active');
      if (key !== 'comments') panels[key].innerHTML = t[key];
      if (key === 'story') wireClamp(panels[key], t);
      if (key === 'comments') loadGiscusForCurrentLang();
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        tabBtns.forEach(b => b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab, getLang());
      });
    });

    langToggle.addEventListener('click', ()=>{
      const cur = getLang();
      const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
      localStorage.setItem(LANG_KEY, next);
      applyLang(next);
    });

    applyLang(getLang());

    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };
    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');

  </script>
