        story: `
          <div class="clamp" data-collapsed="true">
            <p>Namingway catches you just as you’re about to move on, his ears twitching with nervous energy as he asks you to spare a moment—Searchingway has called for both of you. At Moongate Hub, Searchingway greets you with visible excitement and explains that the initiative has reached a new phase: thanks to the many contributors, the hub now has all the supplies it needs, freeing the team to focus entirely on interstellar travel. Tests of the starship Galactic Way have gone better than anyone dared hope—unmanned flights succeeded, and now even her maiden crewed voyage has returned safely. Their reward is a first step onto an unexplored star, provisionally labeled “UL 9-6,” a cold, clinical designation that makes Namingway practically yelp in protest. Where is the wonder in such a name, he demands—where is the poetry? That, Searchingway replies, is precisely why he summoned Namingway: once he sees this star from the ship’s window, surely inspiration will come. Entrusted with naming the world itself, Namingway straightens with determination and vows to pour his heart, soul, and several dictionaries into a name worthy of his greatest work.</p>
            <p>With the matter of naming decided, Searchingway turns back to you. The new camp being established on UL 9-6 will need every ounce of practical help it can get, and he is certain your skills will be invaluable. He stresses that you won’t be alone—any artisan or gatherer who can be convinced to join will be welcomed—but he clearly counts on you as one of the initiative’s pillars. Once you’ve gathered your essentials, he asks you to rendezvous at the cosmoport, where Captain Cruisingway will be preparing the Galactic Way for departure. At the Moongate Hub embarkation point, Searchingway teasingly asks if you’re prone to motion sickness, recalling the unfortunate “rancid carrot” incident on a previous flight. Namingway, meanwhile, mutters anxiously to himself about etymologies and the weight of naming an entire star. Then Cruisingway greets you with an easy grin and a wink, introducing himself as the pilot of the Galactic Way and inviting you aboard with a promise to “take you to the stars” the moment you give the word.</p>
            <p>Once everyone is strapped in, the interior hum of the engines swells into a full-throated roar as Galactic Way rises from Sinus Ardorum and slips into the stellar current. Searchingway calls out each stage of the launch: power routed to anti-gravity thrusters, course aligned along the shimmering flow between stars, coordinates set for UL 9-6. The vessel hops through the void, aether broken down and reconstituted as the journey carries you farther from familiar skies. At last, the engines wind down, the cosmohopper disengages, and Cruisingway cheerfully announces your arrival. Through the viewport, Namingway beholds a world that scatters light like a living prism—surfaces gleaming, colors refracted in every direction. Words tumble through his mind: prismatic, luminous, brilliant. In that moment of inspiration, he raises his voice and declares that this star shall henceforth be known as “Phaenna,” a name that captures the radiance spreading out before you.</p>
            <p>Not long after, you stand within a cavernous shelter of glass and crystal that will serve as the first camp on Phaenna. Namingway whispers in awe that his chosen name now represents an entire star, barely able to believe the responsibility placed upon him. Searchingway formally welcomes you both to Phaenna and gives a clear briefing: the world’s surface is rich in silicon, giving rise to countless vitreous formations. Unique flora and a wealth of mineral resources await discovery, but the environment is far from gentle. A rainbow-hued crystal veil helps mediate the atmosphere so it doesn’t kill visitors outright, yet sharp hazards remain everywhere. Reports speak of aether condensing into storms of glass shards, and there is no telling what other threats lurk just beyond arm’s reach. This is, he cautions, a land where a thousand small cuts can be just as fatal as a single blow, and any exploration must be undertaken with care.</p>
            <p>Startled by the mention of glass storms, Namingway recalls how even a simple rain shower on Etheirys could leave his fur in disarray, and wonders aloud why such a harsh star was chosen as their first destination. Searchingway answers without hesitation: the Galactic Way has strict limits on how far it can travel and must follow the paths of stellar currents. Within those constraints, Phaenna occupies a crucial position, close enough to reach and rich enough in resources to serve as a stepping stone deeper into the sea of stars. By making use of its strategic location and materials, they can gradually extend the reach of the Cosmic Exploration initiative, one leap at a time. Turning back to you, he notes that your talents will be in high demand—your exotablet already lists tasks where you can lend aid in many different fields. Namingway, rallying his resolve, declares that he will do his part by bestowing thoughtful names on every vista and discovery they encounter. For artisans, explorers, and wordsmiths alike, the true work on Phaenna is only just beginning.</p>
          </div>

        story: `
          <div class="clamp" data-collapsed="true">
            <p>ネミングウェイは歩き出そうとしたあなたを呼び止め、小さな前足を胸の前でぎゅっと握りしめながら、サーチングウェイが話があると言っていたと告げる。ムーンゲート・ハブに向かうと、サーチングウェイは満面の笑みで迎え入れ、計画が次の段階へ進んだと説明する。多くの協力者たちのおかげで拠点には必要な物資が行き渡り、今や宇宙航行に専念できるようになったのだという。宇宙船「ギャラクティックウェイ号」の無人試験飛行は相次いで成功し、ついには有人の処女航海まで無事に完了した。その成果として、誰も足を踏み入れたことのない星「UL 9-6」の地表に降り立つことができたが、その無機質な仮称を耳にしたネミングウェイは、思わず大きな声を上げる。どこに詩情があるのか、と嘆く彼に、サーチングウェイは微笑みながら、まさにそれこそ君を呼んだ理由だと告げる。宇宙船の窓から新たな星を見れば、きっと相応しい名が浮かぶはずだ──星そのものに名を与えてほしいと託され、ネミングウェイは背筋を伸ばし、辞書の山と自分の全てを注ぎ込んで、これまでで最高の名前を生み出すと力強く誓う。</p>
            <p>命名の役目が定まると、サーチングウェイは今度はあなたへ視線を向ける。UL 9-6 に築かれる新たなキャンプには、多方面の助力が必要であり、とりわけあなたの技量が大きな力になると語る。もちろんあなたひとりに頼るつもりはなく、腕利きの職人やギャザラーであれば誰であれ歓迎するつもりだと付け加えつつも、その言葉の端々からは、あなたを計画の要のひとりと見なしていることが伝わってくる。必要な荷物を整えたらコスモポートに集合してほしい──そこでは船長クルージングウェイが出発の準備を整えて待っているという。ムーンゲート・ハブの搭乗地点に向かうと、サーチングウェイは以前の飛行で起きた「ニンジン事件」を引き合いに出しながら、乗り物酔いはしないかと冗談めかして問いかける。一方ネミングウェイは、星ひとつの運命を左右しかねない命名の重さを思い、語源の確認を何度もしなければと小声で繰り返している。そこへ、宇宙船の舵を預かるクルージングウェイが軽やかな笑みとともに現れ、自らを「ギャラクティックウェイ号」のパイロットと名乗り、あなたが合図をすればすぐにでも星々へ連れて行こうと、ウィンクを添えて搭乗を促す。</p>
            <p>乗員が腰を下ろし、ハーネスを締め終えると同時に、船内に満ちていた低い唸りは次第に高まり、やがてシヌス・アルドルムの地を離れたギャラクティックウェイ号は、星々のあいだを走る星間流へと滑り込んでいく。サーチングウェイは、反重力スラスターへの出力切り替え、星間流への進路調整、そして行き先「UL 9-6」への座標設定と、発進の各段階を落ち着いた声で告げていく。船体は幾度となく空間を「ホップ」しながら虚空を進み、そのあいだに分解されたエーテルは再構成され、乗員を見知らぬ空へと運んでいく。やがてエンジンの唸りが静まり、コスモホッパーが停止すると、クルージングウェイが楽しげな口調で到着を宣言する。窓の外に広がるのは、まるで巨大なプリズムのように光を散乱させる世界──光を受けてきらめく面が幾重にも重なり合い、色とりどりの輝きが視界いっぱいに広がっている。その光景を見つめるネミングウェイの頭には、プリズムのよう、輝きに満ちた星、といった言葉が次々と浮かび、ついに彼は声を張り上げる。この星は今より「パエンナ」と呼ばれるべきだと──そうして、新たな名が、その星の輝きとともに生まれ落ちる。</p>
            <p>ほどなくして、あなたはガラスと結晶に包まれた広大な空洞の内側に立っている。ここが、パエンナにおける最初のキャンプとして整備されつつある拠点だ。ネミングウェイは、小さな声で、自分のつけた名前が星そのものを代表することになったのだと呟き、その責任の重さに目を丸くする。サーチングウェイは改めてあなたとネミングウェイを歓迎し、パエンナという星の概要を説明する。その地表はシリコンに富み、無数のガラス質の地形を生み出していること、そしてこの地ならではの独特な植生や豊富な鉱物資源が発見されつつあること。しかし環境は決して穏やかではない。虹色に輝く結晶の層が大気を調整し、一息で命を奪われる事態を防いではいるものの、鋭利な危険は至るところに潜んでいるという。エーテルが凝縮し、ガラス片の嵐となって吹き荒れる現象が報告されており、ひと振りの刃ではなく、無数の小さな傷の積み重ねが命取りになる世界なのだと、サーチングウェイは慎重な探索を強く呼びかける。</p>
            <p>ガラスの嵐という言葉を聞いたネミングウェイは、エオルゼアでさえ雨に打たれれば毛並みが台無しになったことを思い出し、なぜこんな過酷な星が最初の行き先に選ばれたのかと不安げに問いかける。サーチングウェイはすぐさま答えを返す。ギャラクティックウェイ号には飛行距離と進路に厳しい制約があり、星間流に沿って移動しなければならない。その中でパエンナは、到達可能な範囲にありながら、今後の探索を押し広げるための資源と位置を兼ね備えた、極めて重要な一歩目なのだという。ここを足場とし、その戦略的な位置と豊かな資源を活かすことで、「コスモエクスプローラー計画」は少しずつ星々の奥へと進んでいける──サーチングウェイはそう語り、最後に再びあなたへ視線を向ける。あなたの腕は、この星で多くの場面で求められるだろう。エクソタブレットには、すでに様々な支援要請が記されているはずだ。ネミングウェイもまた覚悟を決め、目に映る風景ひとつひとつに心を込めた名前を授けていくと宣言する。こうして、職人たちの挑戦も、探検者たちの歩みも、言葉を紡ぐ者の仕事も──すべてが、パエンナという新たな星の上で、今まさに始まろうとしている。</p>
          </div>

        `,

        story: `
          <div class="clamp" data-collapsed="true">
            <p>Namingway 在你準備離開時忽然把你叫住，小小的前爪緊張地攥在一起，說 Searchingway 想請你們一起過去一趟。來到 Moongate Hub，Searchingway 帶著止不住的興奮迎接你們，說明計畫已經邁入新的階段：多虧眾多貢獻者的協力，這座基地所需物資一應俱全，接下來終於可以把重心完全放在宇宙航行上。宇宙船 Galactic Way 的無人試飛屢屢成功，就連首次載人的處女航也安全返航，他們得以首次踏上前人未至的未知星體──暫時被標記為「UL 9-6」。這個冰冷又呆板的代號一出口，Namingway 便忍不住大叫，質疑這種命名哪裡還有想像與詩意。Searchingway 只是微笑著回答，這正是找他來的理由：只要親眼從船窗望見那顆星，他一定能想出更合適的稱呼。被託付為整顆星命名後，Namingway 挺直了背，發誓要把自己的全部心力與字典都端上桌，為這顆星獻上迄今為止最出色的一個名字。</p>
            <p>命名的問題暫告一段落後，Searchingway 又把話題轉回你身上。UL 9-6 上新設立的營地需要各種專長的支援，而他深信你的能力在那裡將會派上大用場。他補充說，當然不會只靠你一個人，所有願意前來的工匠與採集者都將受到歡迎，但從他的語氣裡，你仍聽得出自己已被視為這項計畫的重要支柱之一。等你把行李準備妥當，他請你前往 cosmoport 集合，Galactic Way 的船長 Cruisingway 會在那裡等候出發。在 Moongate Hub 的登船區，Searchingway 半開玩笑地提起之前偵查隊在飛行途中引發的「胡蘿蔔慘案」，問你會不會暈船；Namingway 則一邊抓著耳朵一邊自言自語，緊張地說這會是他一生中最重要的命名，所有語源都得再三確認。就在此時，Cruisingway 帶著輕鬆的笑容與俏皮的眨眼現身，自我介紹是 Galactic Way 的駕駛，只要你一句話，他隨時可以載你飛向群星。</p>
            <p>待乘客們坐好、束緊安全帶後，原本低沉的引擎嗡鳴逐漸高昂起來，Galactic Way 自 Sinus Ardorum 緩緩離地，滑入星與星之間流動的 stellar current。Searchingway 按部就班地播報每一階段：將輸出切換到反重力推進器，對準星間洋流調整航向，鎖定「UL 9-6」的座標。宇宙船以一段又一段的「跳躍」切開虛空，在這段旅程中，充斥艙體的以太被分解再重組，把所有人帶往從未見過的天空。最終，引擎的聲音逐漸平息，cosmohopper 停止運轉，Cruisingway 用愉快的語氣宣告抵達。透過艙窗望去，一整顆世界像巨大的玻璃棱鏡般散射光芒──層層相疊的表面閃耀著，將色彩折射成滿天虹光。Namingway 一時之間被這景象奪去言語，腦中只剩「棱光」「光輝」之類的字眼不停盤旋，終於在靈感湧現的那刻抬起聲音宣布：這顆星，從今以後將被稱為「Phaenna」，以此為她耀眼的光芒命名。</p>
            <p>不久之後，你已站在一處巨大的洞窟之中，頭頂與四周皆由玻璃與結晶構成，這裡將成為 Phaenna 上的第一座營地。Namingway 小聲感嘆，自己選出的那個名字如今竟代表了一整顆星，他幾乎難以想像那份責任的重量。Searchingway 則正式向你們致意，說明 Phaenna 的大致樣貌：地表富含 silicon，於是形成無數玻璃質的地形結構；據說星上還有極為特殊的原生植物與豐富的礦物資源有待調查。不過，他同時也鄭重提醒，這裡絕不是溫柔的天地。覆蓋在上方的虹色結晶層固然能調節大氣，避免你們被環境瞬間奪命，但鋒利的危險仍遍佈每一寸土地。有報告指出，以太會凝結成玻璃碎片風暴肆虐，還不知在伸手可及的地方還潛藏著多少其他威脅。這是一個「一刀斃命」比較少見，卻可能被「一千道小傷口」逐步逼向死亡的世界，任何探索都必須格外謹慎。</p>
            <p>聽到玻璃風暴的說法，Namingway 不禁回想起在 Etheirys 遭遇午後陣雨時，自己那一身毛就已經很難恢復原本的蓬鬆，於是帶著幾分顫抖問道：為什麼這麼嚴苛的星會被選為第一個目的地呢？Searchingway 沒有迴避，而是直接給出答案。Galactic Way 的飛行距離與航線都受到嚴格限制，只能沿著 stellar current 前進；在這些條件之下，Phaenna 既位於可達範圍內，又擁有豐富資源與關鍵位置，因此成為展開宇宙探索的理想踏腳石。只要善用這顆星的戰略位置和物資，他們就能一步一步把 Cosmic Exploration 計畫推得更遠。說到這裡，他再次看向你，說你的專業在這裡會被多方需要，你的 exotablet 上應該已經列出不少可以協助的任務。Namingway 也重新鼓起幹勁，表示自己會為眼前遇到的每一處風景、每一項發現取上一個合適的名字。就這樣，工匠們的挑戰、探索者的腳步，以及文字職人的工作，通通在這顆名為 Phaenna 的新星上，同時邁出第一步。</p>

          <div class="stack">

        `,
        unlockq: `
          <div class="stack">
            <div class="row"><a class="link" href="#">熱情，其名為亞多倫</a></div>
            <div class="row"><a class="link" href="all-11-stellar-tools-showcase-doh-dol-ilv750.html">Stellar Tools 全 11 把主工具展示（DoH／DoL iLv750）</a></div>
          </div>
        `,
        followq: `
          <div class="stack">
            <div class="row"><a class="link" href="the-brightest-star.html">最耀眼的星辰</a></div>
          </div>
        `
      }
    };

    const langToggle = document.getElementById('langToggle');
    const pageTitle  = document.getElementById('pageTitle');
    const tabBtns = [...document.querySelectorAll('.tab-btn')];
    const panels = {
      story:  document.getElementById('panel-story'),
      acq:    document.getElementById('panel-acq'),
      unlockq:document.getElementById('panel-unlockq'),
      followq:document.getElementById('panel-followq'),
      comments: document.getElementById('panel-comments')
    };

    function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
    function applyLang(lang){
      const t = i18n[lang] || i18n.EN;
      pageTitle.textContent = t.pageTitle;
      langToggle.textContent = `🌐 ${t.langLabel}`;
      tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
      const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected') === 'true') || tabBtns[0];
      renderPanel(activeBtn.dataset.tab, lang);
    }

    function wireClamp(panelEl, t){
      const clamp = panelEl.querySelector('.clamp');
      const btn = panelEl.querySelector('[data-role="expand"]');
      if(!clamp || !btn) return;
      function setLabel(){
        const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
        btn.textContent = collapsed ? t.readMore : t.readLess;
      }
      setLabel();
      btn.addEventListener('click', ()=>{
        const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
        clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
        setLabel();
      });
    }

    function renderPanel(key, lang){
      const t = i18n[lang] || i18n.EN;
      Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
      panels[key].classList.add('active');
      if (key !== 'comments') panels[key].innerHTML = t[key];
      if (key === 'story') wireClamp(panels[key], t);
      if (key === 'comments') loadGiscusForCurrentLang();
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        tabBtns.forEach(b => b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab, getLang());
      });
    });

    langToggle.addEventListener('click', ()=>{
      const cur = getLang();
      const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
      localStorage.setItem(LANG_KEY, next);
      applyLang(next);
    });

    applyLang(getLang());

    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };
    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }
  </script>
</body>
