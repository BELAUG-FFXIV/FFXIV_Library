    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>At Camp Dragonhead, Haurchefant meets you without surprise. He already knows about the incident with the new frontier hands, and he speaks of their work with genuine respect—brave men and women whose fortified outpost in Mor Dhona helps deter the Empire from encroaching upon Coerthan soil. It was out of gratitude that House Fortemps arranged supplies for Revenant’s Toll, he says, and it is bitter luck that the shipment was waylaid by heretics.</p><p>Yet Haurchefant calls it “luck” only out of habit, for he has seen signs of a troubling pattern. The heretics are growing more organized by the day, and he attributes that unity of purpose to their leader, the Lady Iceheart. He has spent resources trying to uncover who she is, but they do not even know her birth name—only that her followers speak of her with reverence and would rather die than betray her. With patrols sighting furtive bands to the west ever more often, he urges you to seek answers at Whitebrim Front, and promises you a warm hearth and warmer welcome when you return with anything of value.</p><p>At Whitebrim Front, Drillemont greets you with brisk confidence, proud that repairs to Stone Vigil are proceeding apace so the Dravanians may break themselves against Coerthas’s western shield. But your purpose is not masonry, and he recognizes it at once. When you tell him you are hunting thieving heretics, he admits the wilds have grown thick with them—swift, canny raiders who evade even skilled trackers. Worse still, it is not only their organization that troubles him: the heretics themselves seem changed, as though caught in the grip of an unsettling, unnatural fervor tied to Iceheart’s influence. Then he offers you a lead: a trader was attacked on the road moments before you arrived, and if the man can speak, his account may give you what you need.</p><p>In the infirmary, the battered merchant insists he is well enough to talk—anything to help catch the cowards. He describes a sudden blow, the ground rushing up, and then heretics rifling through his cargo—arms, armor, crystals—taking everything. When one noticed his gaze, the heretic stalked over to introduce his mace to the merchant’s head. Before darkness took him, he distinctly heard a command: “Return to Snowcloak.” The merchant is certain that is where they hauled the stolen goods, but he refuses to risk his life to chase them, calling Snowcloak inhospitable even on its best days.</p><p>You move out into the snow, and the hush of Coerthas is broken by the crunch of heavy boots and voices that carry no warmth. A loyal heretic promises your end, says the cold soothes their pain, demands you surrender the crystals, and declares their life belongs to the Lady. The trail draws you onward, through fear and drifting white, toward the place the merchant named.</p><p>Near Snowcloak, you meet knights of House Durendaire who recognize you at once and admit they share your purpose. They had pursued a raiding party into the ravine and should have cornered them—yet the heretics vanished like icy wraiths. Your report of a woman glimpsed atop a cliff sharpens their dread: could it have been Iceheart herself, come to mock their folly? They suspect a hidden passage through the frozen wall, but they lack the men to probe further and refuse to blunder into an ambush. You return to Whitebrim Front with what you have learned, and Drillemont’s expression hardens as he hears how easily his finest were bested.</p><p>Drillemont thanks you and admits he has underestimated the threat these heretics pose. However reluctant you may be, he asks you to set aside your mission for the stolen provisions—at least for now. Charging unprepared into what may be the enemy’s lair would be folly. Instead, he orders you to return to Dragonhead and inform Haurchefant of Snowcloak’s secrets, so contingencies can be planned. As for Iceheart and her fanatics, he vows the freezing heights will not shelter them from justice for long.</p><p>Back at Camp Dragonhead, Haurchefant receives your report with grim focus, confessing that his own imaginings had strayed toward bloodier outcomes while you were gone. Snowcloak, he says, has borne the worst of the highlands’ brutal shift in climate—so inhospitable that the area has never been fully surveyed. It may indeed conceal the heretics’ hideaway, and he agrees that stronger reconnaissance is warranted. Yet the matter has grown beyond his personal purview; he will inform the Temple Knights and request they bring it to a conclusion. Even if Iceheart’s true identity remains unknown, you have given them a point from which to begin—sometimes a single stone is enough to start an avalanche. And as for the stolen provisions, he has already arranged for a second shipment to be sent to Revenant’s Toll; he will not allow an honorable venture to be undermined by one miserable setback.</p><p>When you return to Revenant’s Toll, Slafborn is relieved to see you again and asks how you fared in Coerthas’s frozen wastes. Hearing that House Fortemps will send a second shipment, he speaks of sending thanks to Haurchefant for his continued generosity. But even as the town grows in prosperity, he warns that it will draw ever more of those who would do harm in the name of greed or power. All of you—including Alphinaud’s new recruits—must remain vigilant against what such growth invites.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>キャンプ・ドラゴンヘッドでオルシュファンは、あなたが運び込んだ件を詳しく語らせようとはしなかった。彼は新たな開拓要員の進捗を強い関心をもって追っており、モードゥナに堅固な拠点が築かれることが、帝国のクルザス侵入を思いとどまらせると確信していた。レヴナンツトールへ物資を届ける手配をしたのも、同盟者への感謝ゆえだという。だが、その輸送が異端者に襲われたのは痛ましい不運だった。</p><p>しかし彼は「不運」と言いながらも、そこに前例があることを隠さない。異端者たちは日ごとに組織化を強め、その統一された目的意識は指導者である「アイスハート」によるものだと語る。多くの資源を投じて彼女の正体を追っているが、生まれの名すら掴めていない。それでも、異端者たちがアイスハートを敬虔に語り、裏切るくらいなら死を選ぶほど忠誠を捧げていることだけは分かっている。ドラゴンヘッドでは正面衝突に踏み切るほど大胆ではないが、西方では不審な集団が目撃される頻度が増しているという。オルシュファンはホワイトブリム前哨地へ赴いて手掛かりを探すよう促し、得るものがあればすぐ戻るようにと、温かな炉辺と歓迎を約束した。</p><p>ホワイトブリム前哨地でドリルモントは、ストーンヴィジルの修復が順調に進んでいると胸を張り、クルザス西方の盾をより堅固にすると語る。だがあなたがここへ来た理由が石工仕事ではないことも、彼はすぐに見抜く。盗みを働く異端者を追っていると告げると、周辺の荒野が彼らで満ちつつある現実を認めた。襲撃は迅速で不意打ち、しかも追跡を巧みにかわす。さらに厄介なのは組織化だけではなく、異端者そのものがどこか変わってしまったことだという。アイスハートの影響がどのようなものかは分からないが、彼らは不自然なほどの熱狂に囚われている。そうして彼は、たった今襲われた商人がいると告げ、その証言が手掛かりになるかもしれないとあなたを医務室へ向かわせる。</p><p>医務室の商人は、話すくらいなら十分回復したと強がり、卑怯な悪党を捕まえる助けになるなら何でもすると息巻く。いつもの道でホワイトブリム前哨地へ向かっていたところ、不意の一撃でよろめき、気づけば地面に倒れていた。異端者たちは荷を漁り、武器や防具、クリスタルまで何もかも奪っていったという。かすむ視線に気づいた一人が近づき、メイスで頭を叩きつけようとした。その暗闇に沈む直前、彼ははっきりと「スノークロークへ戻れ」という言葉を聞いた。奪われた荷はそこへ運ばれたはずだが、商人自身は二度目の奇跡に賭ける気はなく、スノークロークは平時でも過酷だとして追跡を拒んだ。</p><p>あなたが雪原へ踏み出すと、重い靴が雪を踏み砕く音と、冷え切った声が耳を刺す。異端者はあなたの終わりを告げ、冷気が痛みを癒すと呟き、クリスタルを差し出せと迫り、命は「お方」に捧げたものだと言い切る。その執着と狂信が、あなたをさらに奥へと押し流し、商人が口にした場所へ導いていく。</p><p>スノークローク近くで、デュランデル伯爵家の騎士たちはあなたを認め、異端者を追っているのだと告げて共通の目的を示す。襲撃団を峡谷へ追い詰め、包囲したはずだった――それでも彼らは氷の亡霊のように消え失せたという。崖上に女の姿を見たというあなたの報告に、騎士たちは凍りつく。あれがアイスハート本人で、嘲笑いに来たのではないか。異端者は氷壁のどこかに隠された通路を見つけたのだろうが、深入りする兵力はなく、待ち伏せに突っ込むわけにはいかない。あなたはホワイトブリム前哨地へ戻り、ドリルモントは部下の精鋭が容易く退けられた事実に表情を硬くした。</p><p>ドリルモントはあなたに礼を述べ、自分が異端者の脅威を見誤っていたと認める。そして不本意でも、奪われた物資の件はいったん脇へ置くよう求めた。敵の巣窟かもしれない場所へ、準備もなく踏み込むのは危険すぎる。まずはキャンプ・ドラゴンヘッドへ戻り、スノークロークで得た情報をオルシュファンに伝え、備えを整えるべきだという。アイスハートと狂信者たちについては、凍てつく高みも長くは裁きを免れないと断言した。</p><p>キャンプ・ドラゴンヘッドでオルシュファンは、あなたの帰還を時宜を得たものだと言い、あなたが戻るまでのあいだ自分の想像が血生臭い結末へ傾いていたことを告白する。スノークロークは高地のなかでも気候変動の影響を最も受け、過酷すぎて未だ全域を調査しきれていない。だからこそ異端者の隠れ家が潜んでいても不思議ではなく、より強固な偵察が必要だと頷く。だが事態は彼の手を離れつつあり、聖堂騎士団へ報告して決着を委ねねばならないとも言う。アイスハートの正体は分からずとも、あなたが起点をもたらした――時に一つの石が雪崩を呼ぶのだ。さらに彼は、奪われた物資については第二便をレヴナンツトールへ送る手配を済ませたと告げ、たった一度の挫折で名誉ある事業を損なわせはしないと断言した。</p><p>レヴナンツトールへ戻ると、スラフボーンはあなたの無事を喜び、クルザスの凍れる荒野でどうだったかと問う。フォルタン伯爵家が第二便を送ると知ると、彼はオルシュファンの変わらぬ厚意へ礼を伝えねばならないと言う。だが町が栄えるほど、欲や権力の名のもとに害をなそうとする者も引き寄せられる。アルフィノの新たな志願者たちを含め、皆がそうした脅威に警戒し続けねばならない――スラフボーンはその現実をあなたに言い聞かせた。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> オルシュファン <small class="muted">（クルザス中央高地, X:26.7, Y:17.4）</small></div></div>`,

  },

    story:`<div class="clamp" data-collapsed="true"><p>在 Camp Dragonhead，Haurchefant 聽你提起新派駐的前線人員遇襲的事，卻沒有要你多作說明。他一直帶著高度關注追蹤他們的進展，並直言：Mor Dhona 有了堅固的據點，對帝國而言就是一種警告，能有效嚇阻他們踏上 Coerthan 的土地。你願意支援這項行動，他非常高興，也強調 House Fortemps 不會忘記盟友的付出與欠下的情分；正因如此，他才安排各式補給送往 Revenant’s Toll。只是這批物資竟被異端者截走，確實令人惋惜。</p><p>但他口中的「不幸」並非毫無前例。Haurchefant 說，那些頑固的異端者正一天比一天更有組織，而這種新的凝聚力被認為源自他們的領袖——Lady Iceheart。他投入了不少資源想查出這名女子的身分，卻連她的本名都無從得知。唯一確定的是：異端者談起 Iceheart 時充滿敬畏，甚至寧願赴死也不願背叛她；這種忠誠十分罕見，也讓他難以想像這群人若更進一步會做出什麼事。雖然異端者還不至於膽大到在 Dragonhead 正面挑戰，但在西方一帶，他們被目擊的頻率正不斷上升。Haurchefant 因此要你前往 Whitebrim Front 探查，並承諾你一旦帶回有價值的線索，他會用溫暖的爐火與更溫暖的歡迎迎接你歸來。</p><p>抵達 Whitebrim Front，Drillemont 先向你表示：Stone Vigil 的修復正穩步推進，他們會把防線重建得堅實可靠，讓 Dravanians 在西方的盾牆前徒勞無功。但他也立刻看出，你來此並不是為了石材或工事。當你說自己正在追查一群偷竊的異端者時，他承認這附近的荒野確實越來越充斥他們的蹤影；這些人出手迅速、毫無預警，又狡猾到能躲過最擅追跡的斥候。更棘手的是，令他困惑的不只是他們的組織化——連異端者本身都像「變了個人」。他不知道 Iceheart 到底施加了什麼影響，但那些人彷彿被一種自以為正義的狂熱牢牢攫住，那股不自然的熱度令人不寒而慄。恰巧在你抵達前不久，有位商人剛在路上遭襲；Drillemont 要你去問問受害者，看看能不能從對方的經歷裡抓到線索。</p><p>你在醫務室見到那名受創的商人，他堅稱自己已經恢復得足以把話說清楚，並表示只要能抓到那些卑鄙的惡徒，他願意提供一切協助。他說自己照往常路線前往 Whitebrim Front，卻被突如其來的一擊打得踉蹌；回過神時，人已倒在地上，而幾名異端者正在翻他的貨物——武器、護甲、水晶——幾乎把能拿走的全都拿走。就在其中一人注意到他迷濛的視線、走近準備用釘鎚讓他徹底閉嘴之前，他清楚聽見一句話：「回 Snowcloak。」他推斷異端者是把貨物運往 Snowcloak，但他絕不打算追去；他們說他能活下來已是奇蹟，他不會再把自己的命押在第二次奇蹟上，更何況 Snowcloak 向來就不是什麼好待的地方。</p><p>你走出醫務室，踏入積雪深處，沉重靴底碾碎雪粒的聲音在耳邊逼近，冷得像刀的低語也隨之滲入。忠誠的異端者宣告你的末日已至，說寒冷能撫平他們的痛楚，逼你交出水晶，並冷酷地表明：他們的生命屬於那位 Lady。你沿著這股不祥的氣息前行，朝著商人口中的 Snowcloak 追去。</p><p>在 Snowcloak 附近，你遇到 House Durendaire 的騎士。他們先是警戒，隨即認出你，並確認你們目標一致：他們巡邏時撞見異端者的劫掠隊，便一路追趕至此。本該在這道峽谷把人困死，結果異端者卻像冰霧幻影般消失無蹤。當你提到自己曾瞥見崖上的一名女子，他們的神色立刻繃緊——那會不會就是 Iceheart 本人，特地來嘲弄他們的徒勞？他們推測異端者發現了冰封岩壁中的隱密通道，但他們沒有足夠人手再深入搜查，也不能冒著被伏擊的風險盲目追進去。你帶著所見所聞返回 Whitebrim Front，Drillemont 聽完報告後臉色沉了下來——你在 Snowcloak 遇到的那些人，可是他手下最精銳的一批。</p><p>Drillemont 向你道謝，並坦承自己嚴重低估了異端者的威脅。即便你可能不願接受，他仍要求你暫時放下「奪回物資」的任務，先把那批被偷走的補給視為短期內無法追回。因為在毫無準備的情況下闖入 Snowcloak，那很可能正是敵人的巢穴，只會把人送進陷阱。他要你立刻回到 Camp Dragonhead，把你在 Snowcloak 發現的一切告訴 Haurchefant，讓對方能先行規劃應對方案。至於 Iceheart 與她那些狂熱的追隨者，他咬定：再高再冷的 Snowcloak，也不可能讓他們永遠逃過制裁。</p><p>回到 Camp Dragonhead，Haurchefant 說你回來得正是時候；老實說，在你外出追查期間，他的想像常不由自主地往更陰沉、更血腥的方向飄去。你報告 Snowcloak 的情況後，他指出：在整個高地之中，那道高聳的冰壁承受了最劇烈的氣候變化，環境已惡劣到至今仍無法完整勘查。也因此，Snowcloak 的冰封高度完全可能藏著異端者的藏身處；他同意需要更強而有力的偵察行動。但同時他也承認，事情已超出他個人能獨自處理的範圍，他必須通報 Temple Knights，請他們正式接手並把此事推向結局。即使 Iceheart 的真實身分仍未明朗，你已經替他們提供了一個可以起步的落點——有時只需要一顆石子，就足以引發雪崩。至於被劫走的補給，他早已安排第二批物資送往 Revenant’s Toll；他不會讓一項光榮的行動因一次不幸而被摧毀。</p><p>你回到 Revenant’s Toll，Slafborn 見到你平安歸來明顯鬆了口氣，立刻問你在 Coerthas 的冰雪荒地過得如何。聽到 House Fortemps 願意再送第二批補給，他說自己必須向 Haurchefant 的持續慷慨表達謝意。可他隨即也提醒你：城鎮越是繁榮，就越容易吸引那些以貪婪或權勢為名行惡的人。包括 Alphinaud 的新招募成員在內，你們所有人都必須保持警戒，因為這份成長帶來的，不只是一時的興旺。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 奧爾什方 <small class="muted"> 庫爾札斯中央高地（X:26.7, Y:17.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="heretical-harassment.html">喧囂的街角</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="brave-new-companions.html">艾奧傑亞的守護者</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
