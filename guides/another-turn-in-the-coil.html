    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Urianger tells you that beneath the Carteneau Flats lies a crystal-choked abyss—the unholy cradle of an elder primal—and that by your hand, great and terrible truths were wrested from those once-celestial depths. Yet every answer only breeds more questions, and the red moon’s mysteries now feel closer than ever. Word has come that Alisaie is on her way, and Urianger bids you brace yourself to brave the precipice again—leaping, unflinching, into the jagged wound gaping beneath the land.</p><p>Alisaie arrives and apologizes if she kept you waiting. She says she is both delighted and reassured to have you at her side once more, and insists you waste no time on trivialities. She reminds you what first drew you into the cavern beneath Castrum Occidens: signs of a new primal, and the subterranean scars left by Dalamud’s fall. There you found a vast, largely intact fragment of the fallen satellite—and deep within it, not the new primal you expected, but the broken form of Bahamut himself…a revelation soon overshadowed by the appearance of her grandfather.</p><p>Urianger says he has shared your findings with Rammbroes of the Sons of Saint Coinach, who offered a theory about the elder primal’s Allagan prison. Dalamud, he explains, was built to gather the rays of the sun and channel that radiance into the Crystal Tower. The ancients recognized Bahamut’s capacity to manipulate otherwise unmanageable energies, and for that reason they bound him within the red moon to serve as its living core.</p><p>Alisaie asks you to recall what awaited you at the journey’s culmination: colossal devices that surrounded and seemed to cradle the elder primal’s incomplete form. The Sons of Saint Coinach have told you these contraptions were “internment hulks,” each designated “Ragnarok-class.” Their purpose, she says, is believed to be twofold—first, to act as binding coils that render Bahamut incapable of escape, and second…to feed him. In a cruel perversity, the very energy that prevents him from moving sustains his corporeal manifestation; he is permitted neither to die nor to truly live—he is merely allowed to be.</p><p>Urianger says that for century upon century the elder primal was held thus—bound in fetters subtle in their working, yet unyielding—so that even with his cell destroyed, Bahamut remains at the mercy of captors long departed. Alisaie turns to the other contradiction: primals are said to require the prayers of faithful followers, yet none alive worship Bahamut. The only logical explanation, she argues, is that the Allagans found a way to simulate prayer itself, and that the regenerative mechanisms also supply something akin to the power of prayer. Therefore, if all the internment hulks can be rendered inactive, Bahamut should dissolve into the aether.</p><p>Urianger tells you that, from the evidence of your previous foray, they determined Bahamut is sustained by three such binding coils. They began to scour the realm, and in the Twelveswood they found an as-yet-unexplored fragment of the lesser moon bearing a familiar aetheric signature. After a preliminary investigation, Alisaie believes she has found a point of entry into that North Shroud fragment—and into the second of the internment hulks. She asks you, as Eorzea’s sword in the darkness, to lead the charge once again, promising she will be at your side.</p><p>When you are prepared, you are to go to Fallgourd Float and present yourself to her assistant, Serpent Lieutenant Anaelle, whose post makes a convenient rendezvous near the fallen fragment. Anaelle tells you she has been expecting you, and that she has been granted the rank of lieutenant within the Order of the Twin Adder so she may assist Alisaie without interference while investigating the Alder Springs fragment. From the exterior, it resembles the structure you explored in La Noscea and likely hosts similar guardians; she urges you to speak with her comrade to the south and west. There, a sharp-eyed Serpent private—after snapping at you out of habit—apologizes and shows you one of Dalamud’s fallen shards, warns that wandering golems can turn the broken land into a slaughter, and explains they carved a rough approach to the entrance but could progress no farther.</p><p>If the architecture matches the first hulk, the master controls you seek will lie on the bottommost layer beyond Allagan defenses; there is nothing for it but for you to brave the depths yourself. As you return to Anaelle, Alphinaud appears—asking a quiet word before you vanish into the second coil—and admits that Alisaie’s devotion to her grandfather runs deep enough to become a dangerous fixation: this must not turn from ridding the world of Bahamut into “saving” a man long dead. He is glad it is you who walks at her side, and asks Anaelle to say nothing of his presence as she awaits your triumphant return.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>ウリエンジェは、カルテノー平原の地下に水晶に塞がれた深淵が横たわり、そこが古き蛮神の不浄なる揺籃であると告げる。そして、かつて天に属したかのような深層から、あなたの手によって巨大で恐ろしい真実が引きずり出されたのだと言う。だが答えはさらなる疑問を生み、赤き月の謎は抗いがたくあなたを誘う。アリゼーがこちらへ向かっていると知らせが届いた今、再び断崖へ臨み、地に口を開ける裂傷へためらいなく飛び込む時だと促す。</p><p>アリゼーは到着すると、待たせてしまったなら謝ると言い、あなたが再び傍らにいてくれることに安堵と喜びを示す。そして些末な話は省き、学んだことと、これから知ろうとしていることにすぐ踏み込もうと告げる。新たな蛮神の兆しが、カストルム・オクシデンスの地下洞窟へとあなたたちを導き、ダラガブ落着の傷痕を追わせたのだと。そこで見つかったのは、落ちた衛星の巨大でほぼ無傷の破片であり、その奥で待っていたのは想定した新たな蛮神ではなく、砕けた姿のバハムートだった――しかも、その驚愕さえ祖父の出現によって塗り替えられたのだと言う。</p><p>ウリエンジェは、あなたたちの発見を聖コイナク財団の第一人者ラムブルースへ共有し、古き蛮神を収めたアラグの檻に関する考察を得たと語る。ダラガブは太陽の光を集め、その輝きをクリスタルタワーへ注ぐために造られたのだという。古代人は、制御困難な規模のエネルギーを操りうるバハムートの資質に目をつけ、赤き月の中へ縛り付け、生ける核として用いたのだと。</p><p>アリゼーは、旅の果てで目にした光景を覚えているかとあなたに問う。未完成の古き蛮神を取り囲み、抱きかかえるように並ぶ巨大装置――聖コイナク財団の情報によれば、それらは「ラグナロク級拘束艦」と呼ばれていたという。目的はふたつ、第一に拘束具としてバハムートを逃がさぬこと。第二に……彼を養うこと。動きを封じるはずの力が、その肉体の顕現を支える力にもなっており、バハムートは死ぬことも生きることも許されず、ただ在り続けるだけなのだと。</p><p>ウリエンジェは、古き蛮神が幾世紀にもわたりそうして囚われ、精妙でありながら絶対の枷に縛られてきたと述べる。たとえ牢が壊れても、バハムートはすでに去った捕縛者の支配から逃れられないのだと。アリゼーはさらに、蛮神は信徒の祈りを糧として存在するとされるのに、今や誰もバハムートを信仰していないという矛盾を突く。ならばアラグは祈りそのものを模したのではないか、と彼女は推論し、再生機構が祈りに似た力を供給しているのだろうと言う。ゆえに、すべての拘束艦を停止できれば、バハムートはエーテルへ還るはずだと。</p><p>ウリエンジェは、前回の調査から、古き蛮神を支える拘束具が三基あると突き止めたと言う。そこで各地を捜索した結果、黒衣森で、未踏の小月片が見慣れたエーテルの痕跡を帯びているのを発見したのだと。アリゼーは予備調査ののち、北部森林のその破片――そして第二の拘束艦――へ入るための地点を見つけたと告げる。そしてエオルゼアの闇を裂く剣として、再び先陣を切ってほしいと言い、自分も必ずあなたの隣に立つと約束する。</p><p>準備が整ったら、フォールゴウド・フロートへ向かい、補佐役の少牙士官アナエルに名乗るよう指示される。アナエルはあなたの到着を待っていたと言い、黒衣森での活動を助けるため双蛇党の士官に任じられ、アルダースプリングスの破片を先行調査してきたと説明する。外観はラノシアで探索した構造物と共通点が多く、同様の守護者がいるだろうと警告し、南西にいる仲間のもとへ行くよう促す。そこで双蛇党の兵士は、思わず荒っぽく追い払おうとしてから謝罪し、ダラガブの落片を示して、徘徊するゴーレムの脅威に注意するよう告げる。帝国の痕跡は見当たらなかったが、入口へ至る道は未整備で、ようやく近づくための道筋を切り開いたものの内部には踏み込めなかったという。</p><p>もし第一の拘束艦と同じ造りなら、制御装置は最下層にあり、古代アラグの巧妙で致命的な防衛機構の先だ――知るにはあなたが自ら深層へ挑むほかない。アナエルのもとへ戻るとアルフィノが現れ、あなたが第二のコイルへ消える前に言葉を交わしに来たと言い、アリゼーの祖父への思いが使命を越えた執着になり得ることを案じる。世界からバハムートを取り除くことが、亡き者を「救う」ことへすり替わってはならないのだと。あなたが彼女と同行していることを喜びつつ、妹には自分が来たことを伏せてほしいと頼み、アナエルはあなたの凱旋を確信して待つと告げる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>Urianger 告訴你，在 Carteneau Flats 的地底，有一道被水晶堵塞的深淵——那是古老 primal 的不潔搖籃，而你曾親手從那片彷彿曾屬天穹的深處，奪回巨大而可怖的真相。可正如往常，答案只會引出更多疑問；紅色月球的秘密，如今竟近得像伸手就能碰到。Alisaie 已傳話她即將抵達，於是 Urianger 要你再一次站上懸崖邊，毫不退縮地縱身跳入那道撕裂大地的鋸齒傷口。</p><p>Alisaie 趕到後先向你致歉，說希望沒有讓你久等。她坦白自己既欣喜又安心，因為你再次站在她身旁。她不願拿瑣事浪費你的時間，直接把話拉回你們已知與仍想探明的事：當初正是「新 primal 的跡象」引導你們深入 Castrum Occidens 下方的洞窟，追查 Dalamud 墜落後留下的地底傷痕。你們找到的，是那枚墜落衛星巨大且多數仍完好的碎片；而在那座結構的深處，你們沒有遇到預期中的新 primal，反而看見 Bahamut 破碎的身軀……然而這份震撼很快又被另一幕覆蓋——她的祖父竟現身於你們眼前。</p><p>Urianger 說他已把你們的發現告知 Sons of Saint Coinach 的學者 Rammbroes，而對方提出了關於 Bahamut 的 Allagan（古代亞拉戈帝國）牢籠的推論：Dalamud 的建造目的，是把太陽的光芒收束起來，再將那份耀眼的能量導入 Crystal Tower。古人看中了 Bahamut 操縱巨大能量的能力，正因如此，才把他封入紅色月球之中，讓他成為那座衛星的「活體核心」。</p><p>Alisaie 要你回想旅途終點的景象：巨大的裝置群環繞著那具尚未完整的古老 primal，像托住、像包覆一般把他鎮在中央。依 Sons of Saint Coinach 的情報，那些裝置被稱為「拘束艦」，並且每一具都屬於「Ragnarok 級」。她說，這些拘束艦的目的被認為有兩個：第一，它們是拘束具，讓 Bahamut 無法逃離；第二……它們在餵養他。諷刺的是，阻止他行動的同一股能量，也支撐著他的肉體顯現——Bahamut 既不被允許死去，也不被允許真正活著……他只被允許「存在」。</p><p>Urianger 說，這樣的囚禁持續了無數世紀；那枷鎖運作得極其精巧，卻又堅不可摧，以至於即使牢籠本身被摧毀，Bahamut 仍舊受制於早已消失的捕縛者。Alisaie 進一步指出另一個矛盾：眾人一直認為 primal 需要信徒的祈禱才能存在，可如今根本沒有人崇拜 Bahamut——那麼，Allagans（古代亞拉戈帝國）是否找到了「模擬祈禱本身」的方法？她認為這是唯一合理的解釋，並推測那些再生機構同時提供了某種近似「祈禱之力」的供給；因此，只要能讓所有拘束艦停止運作，Bahamut 就應該會消散回以太之中。</p><p>Urianger 說，根據你們上次深入的證據，古老 primal 之所以仍被維繫，是因為有三具拘束具在支撐著他；於是你們開始搜遍各地，並在 Twelveswood 發現了一塊尚未探索的小月球碎片，帶著極其熟悉的以太痕跡。Alisaie 表示，在初步調查後，你們已找到了進入那塊 North Shroud 碎片——也就是第二具拘束艦——的入口位置。她要你以「Eorzea 黑暗中的劍」之姿再度領軍，而她也會站在你身旁同行。</p><p>等你準備妥當，就前往 Fallgourd Float，向她的助手 Serpent Lieutenant Anaelle 報到。Anaelle 說她一直在等你，並解釋自己為了協助 Alisaie 在 Twelveswood 的行動而被授予軍階，得以不受地方兵力掣肘地先行調查 Alder Springs 的碎片；從外觀來看，那座結構與你在 La Noscea 探索過的相似，內部很可能也有同等數量的守衛。她要你去找南西方的同袍——那人負責監看碎片周遭的一切。你見到那名目光銳利的士兵時，他先因習慣而粗聲驅趕，隨即想起你的身分而立刻道歉，並指給你看其中一塊「紅色月球 Dalamud」的落片，也提醒你提防徘徊的魔像與碎地的凶險。</p><p>他說他們沒發現帝國軍的跡象，但入口的通路原本也未清理，只是費盡力氣才勉強鑿出一條能接近入口的路；至於內部——若結構與第一具拘束艦相同，你要找的控制裝置會在最底層，必須穿越 Allagan（古代亞拉戈帝國）機關那套精巧而致命的防衛。你只能親自下到深處去確認。你回到 Anaelle 那裡時，Alphinaud 前來與你短談，說他得知遠征將啟，便趕來在你消失進第二個拘束具之前說幾句；他坦言 Alisaie 對祖父的敬慕與依戀深得驚人，甚至可能讓她把「消除 Bahamut 的威脅」變成「拯救一位早已死去之人」。他很慶幸陪她走這段路的是你，並請 Anaelle 不要把他的出現告訴妹妹——而 Anaelle 則表示 Alisaie 隨時會到，並會滿懷信心等待你凱旋歸來。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
