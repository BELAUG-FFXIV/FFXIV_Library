        story:`<div class="story-wrap"><div class="story-content">
<p>Come Hatching–tide, you are greeted by a Stylish Dreamer who proclaims the season’s return with theatrical delight. They speak of a dream: marvelous golden eggs rising from curious flora, and of Dreamers now hiding eggs throughout the Black Shroud so seekers can recreate that vision and earn a pair of stylish spectacles.</p>
<p>Yet the Dreamer’s cheer falters. They have not heard from Nonotta, the one overseeing the work, and worry something has gone awry. Unable to leave their post, they ask you to find her, noting she should be wearing festival glasses shaped like a chicken, and suggesting you begin your search at Gridania’s aetheryte plaza.</p>
<p>You do find Nonotta, but not in the middle of a smooth operation. She admits she has been struggling to hide the eggs, because tall, thick grasses suddenly sprang up in the arena—so tough that even her best garden scythe barely managed to snip a few leaves. She fears the ground is not covered in ordinary brambles, but in leafkin, and she cannot send egg hunters into a nest of monsters. Grateful for your help, she heads to the Botanists’ Guild while asking you to show the salvaged leaf around the Carline Canopy and gather whatever information you can, then meet her again once you’ve both learned more.</p>
<p>At the Carline Canopy, you hear a consistent problem: the specimen resembles a kind of flytrap, and those who tried to cut it back found the leaves and flowers simply grew back again and again. A server also mentions a recent guest—an Elezen wearing shaded spectacles, an alchemist who claimed to specialize in the study of wild beasts—who went toward Old Gridania. When you report this to Nonotta, she confirms the Botanists’ Guild believes the leaf comes from an unusually durable leafkin, so durable that the pieces you carry may still be alive. With no simple solution in sight, you both decide the bespectacled alchemist is your best lead.</p>
<p>You track him down at Apkallu Falls. He introduces himself as Herberin, and reacts with ecstatic recognition: this is the very leaf he has pursued for ages. He offers to help, but explains why he wears tinted lenses—his eyes were once subjected to a nasty trick while studying leafkin like these, and now sunlight, wind, and almost anything can leave him in blinding pain and nausea. Still, he insists he can brew a tincture to spare you the same fate, and rushes off to procure ingredients. When you catch up, he lays out his plan plainly: this strain’s vitality lets it sprout from the very spot it was shorn, so the answer is to thwart its regeneration. By combining your living leaf samples with his ingredients, he can create a temporary distillation—Herberin’s Bane—that will forestall recovery long enough for a skilled hand to cut the menace down.</p>
<p>With the mixture prepared, you receive a special garden scythe and set out to reclaim the arena, cutting down the troublesome traps and retrieving the eggs lost to the foliage. Nonotta is relieved that participants can now search in safety, and Herberin is thrilled to witness his “miracle” succeed. You return to report everything to Jihli Aliapoh, who is grateful that no one was harmed and that the festivities can proceed as planned. Then, in a sudden twist worthy of the season, Herberin announces an even brighter outcome: using the same leafkin samples, he has concocted a regenerative ointment that cures his blistered eyes. Jihli takes it as the meaning of her dream—golden eggs as bright hopes for the future—and offers you festival glasses in thanks, asking that you continue to lend your aid should the arena need further trimming.</p>
</div><button class="expand-btn" data-more="Read more" data-less="Show less">Read more</button></div>`,

        story:`<div class="story-wrap"><div class="story-content">
<p>エッグハントの季節が訪れると、あなたは「サングラスをかけた実行委員」の朗らかな呼びかけに迎えられる。今年は不思議な草花から黄金のタマゴがせり上がる夢を見たのだと言い、その夢を再現するために、ドリーマーたちが黒衣森でタマゴを隠しているという。見つけた者には、とびきり洒落た眼鏡が贈られるらしい。</p>
<p>だが実行委員は、運営を取りまとめているノノッタから連絡が途絶えていることを気にかけていた。持ち場を離れられない以上、代わりに探してほしいと頼まれ、ノノッタはニワトリ型の眼鏡を身につけているはずだと教えられる。まずはグリダニアのエーテライトプラザを確かめてみてほしい、と。</p>
<p>あなたが見つけたノノッタは無事だったが、状況は順調とは言い難かった。会場でタマゴを隠そうとしたところ、背の高い草が突然生い茂り、どれほど刈ろうとしても園芸用の大鎌がほとんど歯を立てないのだという。せいぜい葉を数枚切り取るのが精一杯で、しかもただの茂みではなく、リーフキンの類が会場を覆っているかもしれない。そんな場所へ参加者を送り出すわけにはいかないと、ノノッタは途方に暮れていた。あなたが協力を申し出ると、ノノッタは園芸師ギルドへ向かい、あなたにはカーラインカフェでこの妙な葉について聞き込みをしてほしいと頼み、切り取れた葉をひとつ手渡して合流を約束する。</p>
<p>カーラインカフェで得られた話は厄介なものだった。葉はハエトリグサのような性質を思わせ、刈っても刈っても葉や花がすぐ生え戻るという証言が続く。さらに店の者は、つい先ほど「サングラスをかけたエレゼン族」が珍しいリーフキンを探していたと教える。野生生物の研究を専門とする錬金術師だと名乗り、旧市街へ向かったらしい。その情報をノノッタに伝えると、園芸師ギルドでも同じく、これは異常なほど丈夫なリーフキンで、あなたたちが持つ欠片さえ生きている可能性があると聞かされたという。ならばその錬金術師を追うしかない、とあなたたちは旧市街へ向かう。</p>
<p>アプカル滝で、あなたはその男と出会う。彼はエルブリンと名乗り、あなたが見せた葉を見て歓喜の声を上げる。長いあいだ追い求めてきた葉だと言い、協力を申し出るが、濃色の眼鏡を外せない理由も語った。かつて同じ系統のリーフキンを研究していた際、目にひどい悪戯を受けて以来、日光や風どころか少しの刺激でも激痛と吐き気に襲われるのだという。それでも薬液を調合してあなたたちを守れると断言し、材料を揃えるためにシェイデッド・バウアーへ向かう。追いついたあなたたちに、エルブリンは結論を示す。このリーフキンは切り取られた場所から旺盛に再生する性質を持つ。ならば再生を妨げればよい。生きた葉の欠片と材料を合わせ、回復を一時的に封じる蒸留液――「エルブリンの毒」を作り、大鎌を浸して一気に刈り払うのだ。</p>
<p>準備が整うと、あなたは特別な園芸用の大鎌を託され、会場へ向かう。厄介な罠草を刈り取り、茂みに紛れていたタマゴも回収し、会場を安全に取り戻していく。ノノッタは参加者が安心して探せるようになったと胸を撫で下ろし、エルブリンは自らの錬金術が期待以上の成果を上げたと興奮する。あなたたちはジリ・アリアポーのもとへ報告に戻り、準備が滞っていた理由が解決したこと、そして祭りを予定どおり始められることを伝える。さらにエルブリンは、渡されたリーフキンの欠片から、焼けただれた目を癒す再生の軟膏まで作れたと叫び、完全に治ったのだと告げる。ジリ・アリアポーはそれを夢が示した希望だと受け止め、あなたへ感謝の印として眼鏡を贈り、必要があれば会場の手入れにも力を貸してほしいと頼む。</p>
</div><button class="expand-btn" data-more="続きを読む" data-less="折りたたむ">続きを読む</button></div>`,
        acq:`<div class="stack">

        tabs:{ story:'故事概要', acq:'取得方式', event:'活動期間', unlockq:'解鎖任務', followq:'後續任務', bgm:'BGM', comments:'留言' },
        story:`<div class="story-wrap"><div class="story-content">
<p>Hatching–tide 再度到來時，你被一位「Stylish Dreamer」熱情迎接。對方興高采烈地宣告節慶正式開幕，並說自己做了一個夢──有著奇妙植物的草叢間，竟升起了耀眼的金色彩蛋。此刻 Dreamers 正在 Black Shroud 裡藏蛋，讓參與者從灌木間找出來，重現那場夢的情景；而成功的尋蛋者，將獲得一副極其時髦的眼鏡作為獎勵。</p>
<p>然而，在華麗的宣告之後，對方也流露出不安。負責現場運作的 Nonotta 已經有一段時間沒有消息，讓人擔心是不是出了差錯。Dreamer 自己又必須留在原地履行職責，於是拜託你代為尋找 Nonotta，並提醒她也戴著節慶眼鏡──造型是雞。你被建議先去 Gridania 的 aetheryte plaza 看看，再視情況往外搜尋。</p>
<p>你很快找到 Nonotta，但她並非在順利指揮工作。她坦言自己確實離開太久，原因出在「藏蛋場地」：她原本正在安排藏蛋，卻突然冒出又高又密的厚草，怎麼修剪都剪不動，連她最得力的園藝大鐮刀也只能勉強剪下幾片葉子。她開始懷疑，場地鋪滿的不是普通荊棘，而是某種 leafkin。若真如此，就不能把找蛋的人趕進一窩怪物裡。你表示願意幫忙後，Nonotta 決定自己先去 Botanists’ Guild 查資料，同時請你到 Carline Canopy 四處打聽這種怪葉子的來歷；她把那片好不容易留下的葉子交給你，約好之後再回到 aetheryte plaza 會合。</p>
<p>在 Carline Canopy，你得到的資訊越聽越棘手。有人判斷這片葉子可能來自某種捕蠅草類的變種 leafkin；也有人提到，自己曾試著用武器去戳，結果葉子和花朵總是輕易地長回來，彷彿怎麼都剪不乾淨。最後，一位服務生雖然說不出這標本的茶飲用途，卻想起剛才確實有位戴著墨色眼鏡的 Elezen 來尋找怪異 leafkin，還自稱是研究野生魔物的鍊金術師，並表示要往 Old Gridania 去。你把這線索帶回給 Nonotta，而她也回報 Botanists’ Guild 的說法：這種 leafkin 的耐性極高，甚至你們手上的葉片可能仍然「活著」。既然普通修剪無效，你們便決定循著那位戴眼鏡的 Elezen 追下去。</p>
<p>你們在 Old Gridania 的 Apkallu Falls 找到那名男子。他自稱 Herberin，一看到你交出的葉片便激動到語無倫次，說這正是他追尋已久的目標，並願意協助你們對付這場麻煩。只是他也解釋了自己為何必須一直戴著深色鏡片：他曾在研究同類 leafkin 時遭遇「惡作劇」，導致眼睛只要接觸陽光、風，甚至多數刺激，都會灼痛到噁心欲吐。即便如此，他仍堅稱自己能調出藥劑，避免你和 Nonotta 也落得同樣下場，並趕去 Shaded Bower 採買材料。等你們追上時，他把思路說得很清楚：這種捕蠅草型 leafkin 的再生力強到可怕，從被剪斷的原處就能立刻繁殖；因此真正的解方，是先「阻斷再生」。用你們手上的活體葉片樣本配合材料，便能蒸餾出暫時抑制恢復力的藥液——讓大鐮刀浸泡其中，再用最俐落的手法把它們一次割倒。</p>
<p>藥液完成後，你得到一把特製的園藝大鐮刀，並被安排前往場地清理那些麻煩的陷阱草。你揮動刀刃，刈除一叢叢頑強的枝芽，同時把被草叢吞沒的「賢者彩蛋」也找了回來。Nonotta 終於能放心地讓參與者安全尋蛋，而 Herberin 則沉醉於自己鍊金成果的成功。你們回去向 Jihli Aliapoh 報告：原來準備延宕的原因是 leafkin 入侵，如今問題已解決，節慶可以照原定計畫開始。更出人意料的是，Herberin 竟又高聲宣布，他從同一批 leafkin 樣本裡調出了一種再生軟膏，治好了自己灼傷的雙眼。Jihli Aliapoh 將此視為夢中金色彩蛋的真正寓意——象徵未來的明亮希望——並將節慶眼鏡作為謝禮送給你，也拜託你若之後還需要修剪場地，願你再度伸出援手，並以特別的 Hatching–tide 獎勵回報你的協助。</p>
</div><button class="expand-btn" data-more="展開全文" data-less="收合內文">展開全文</button></div>`,

    function wireStoryToggler(root){

      const t = i18n[lang] || i18n.EN;
      pageTitle.textContent = t.pageTitle;
      langToggle.textContent = `🌐 ${t.langLabel}`;
      tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
      const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
      renderPanel(activeBtn.dataset.tab, lang);
    }

    function renderPanel(key, lang){
      const t = i18n[lang] || i18n.EN;
      Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
      panels[key].classList.add('active');

      if(key !== 'comments'){
        panels[key].innerHTML = t[key];
        if(key==='story') wireStoryToggler(panels[key]);
      }else{
        loadGiscusForCurrentLang();
      }
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab, getLang());
      });
    });

    langToggle.addEventListener('click', ()=>{
      const cur = getLang();
      const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
      localStorage.setItem(LANG_KEY, next);
      applyLang(next);
    });

    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };
    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }

    applyLang(getLang());
  </script>
</body>
</html>
