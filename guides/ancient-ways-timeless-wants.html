<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;
  overflow-y:auto;
  padding-right:8px;
  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>
<body>

<script>
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`Ancient Ways, Timeless Wants`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Thubyrgeim speaks of Tataru with a fond honesty—bright and spirited, if only she could rein in her nervous energy. Nearby, Tataru lets out a sigh and looks back at the garments she tried on, admitting she fears she will never wear them again. Still, she refuses to return to the Rising Stones empty-handed. She asks if you will stay with her a little longer, then decides on a bold plan: a trip to Costa del Sol, a gamble she is sure will pay off.</p><p>At Bloodshore, Tataru leads you to the place she was told to search—there is a seasonal variety of clam here that yields exquisite pearls. She explains that the clams are coveted not only by those who would harvest them, but by wild creatures as well, and she pointedly remembers how poorly she fared the last time she tried to fight. With that, she urges you onward.</p><p>Before long, she spots a clam and immediately sets to work, asking you to keep watch while she pries it open. The task proves harder than she expected, and her determination turns into flustered frustration as the shell refuses to yield—just as danger closes in.</p><p>When hostile creatures appear, you step in and drive them off, keeping Tataru safe while she finishes her work. Once the threat is gone, she praises your fighting and admits she was right to bring you. At last she has what she came for: a bounty of blood pearls.</p><p>Tataru tells you the pearls are named for their reddish hue, and that they were once treasured as wards against dark magicks. She dreams aloud of turning them into charms for everyone—tokens meant to help them come home no matter where they go—and she frames it as her own way of gaining the power to protect herself and others. Then she remembers F’lhaminn is waiting; there are provisions to secure for the Scions in the Lominsan markets, and she insists she has a talent for finding bargains. Before parting, she asks you to carry her apologies back to the Antecedent and to say she needn’t worry.</p><p>Back at the solar in the Rising Stones, Minfilia welcomes you home and confirms you found Tataru in Limsa Lominsa. Hearing what happened, she judges that Tataru’s venture—however it ended—will still be a valuable experience. She adds that Tataru might well have managed without help, but thanks you all the same for indulging her request.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Tataru <small class="muted">(Limsa Lominsa Lower Decks, X:4.6, Y:11.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="an-unexpected-ambition.html">An Unexpected Ambition</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="a-time-to-every-purpose.html">A Time to Every Purpose</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'吹っ切れタタルさん',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>トゥビルゲイムは、タタルは賢く快活な娘だと評しつつ、あの落ち着きのない緊張さえうまく向けられれば、とこぼす。タタルはため息をつき、どれほど素敵な衣装でも、もう二度と身にまとうことはない気がすると口にする。それでも「石の家」へ手ぶらで戻るわけにはいかないと、あなたにもう少し付き添ってほしいと頼み、賭けに出るようにコスタ・デル・ソルへ向かうことを決める。</p><p>ブラッドショアに着くと、タタルは「溺れた海豚亭」で聞いた場所がここだと確信し、この時期に採れる特別な貝が見事な真珠を生むのだと説明する。だがその貝は野生の魔物にも狙われており、前に戦いで散々だったことを思い出した彼女は、言い淀みながらも先へ進もうと促す。</p><p>ほどなく貝を見つけたタタルは、作業の間だけ見張りを頼むと言い、殻をこじ開けようと奮闘する。だが思うようにいかず、苛立ちと焦りが滲むその最中、周囲に不穏な気配が迫ってくる。</p><p>襲いかかる魔物をあなたが退けると、タタルは戦いぶりを称え、あなたに同行を頼んだ自分は正しかったと胸をなで下ろす。そして手にした戦利品として、赤みを帯びた「ブラッドパール」を見せる。古くは闇の魔法を退ける護符として珍重されたのだと言い、皆のためにお守りを作りたいと語る――どこへ行っても、必ず帰ってこられるように。自分や誰かを守る力を得ることにも、少しはつながるのだと。</p><p>だが彼女はすぐに次の仕事を思い出す。フ・ラムインを待たせてはならないと、リムサ・ロミンサの市場で暁の血盟の物資を調達するのだと言い、品質を見る目はフ・ラムインに任せつつ、自分は安く買う嗅覚で勝負すると張り切る。別れ際、あなたが「石の家」へ戻るなら盟主に詫びを伝え、心配はいらないと言ってほしいと頼む。</p><p>やがてあなたがソーラへ戻ると、ミンフィリアは帰還を喜び、あなたがリムサ・ロミンサでタタルを見つけたのだろうと確かめる。話を聞いた彼女は、望んだ結末ではなかったとしても、その経験はきっと糧になると評し、あなたが頼みを受けてくれたことに感謝を告げる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> タタル <small class="muted">（リムサ・ロミンサ：下甲板層, X:4.6, Y:11.4）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="an-unexpected-ambition.html">タタルの本気</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="a-time-to-every-purpose.html">祝賀は誰のため</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'大家都愛塔塔露',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Thubyrgeim 說起 Tataru 時語氣溫和——她聰明又有精神，只是那股緊張的衝勁若能更集中就好了。Tataru 先嘆了口氣，望著那些衣服承認：再怎麼好看，她恐怕也不會再穿上了。可她又立刻打起精神，說自己不能空手回 Rising Stones。她請你再陪她一會兒，隨即做出決定：前往 Costa del Sol——雖然有點像賭一把，但她相信一定值得。</p><p>到了 Bloodshore，Tataru 指著眼前的海灘說，Drowning Wench 的那個人就是要她來這裡找。她解釋：這個季節有一種蛤蜊可以採收，會產出極美的珍珠。但那些蛤蜊同樣也被野外生物覬覦，而她也不忘補上一句——上次她在戰鬥上表現得很糟。話說到一半，她清了清喉嚨，催你趕快出發。</p><p>沒多久她就找到第一個目標，立刻蹲下動手，請你在旁戒備，說這應該只要一下子。可殼比想像中難撬，她一邊用力一邊氣惱，硬是擠出幾句抱怨——就在那時，危險的氣息逼近。</p><p>野外生物撲上來時，你擋在前頭把它們擊退，讓 Tataru 能把手上的事做完。等威脅消失，她立刻稱讚你打得漂亮，說自己果然沒有看錯人。接著她興奮地展示成果：一大把 blood pearls。</p><p>Tataru 說這些珍珠因帶著紅色光澤而得名，古時候曾被視為能抵禦黑暗魔法的護身物。她想把它們做成每個人的護符——不管大家走到哪裡，都能平安回家。她又像是在說服自己那樣補了一句：這也算是一種守護他人、也守護自己的力量。可話音未落，她就想起還有人在等：F’lhaminn 那邊還有工作要做，得去 Lominsan 的市場替 Scions of the Seventh Dawn 採買補給；F’lhaminn 眼光好，她則自信自己最會找便宜。臨別前，她請你回 Rising Stones 時向 Antecedent 轉達歉意，也請對方別為她擔心。</p><p>回到 Rising Stones 的 solar，Minfilia 迎你回來，確認你確實在 Limsa Lominsa 找到了 Tataru。聽完經過，她說那趟經歷或許沒有照 Tataru 原本期待的方式結束，但仍會成為一段很有價值的學習。她也補上一句：就算沒有你出手，Tataru 也未必撐不過去——即便如此，她仍感謝你願意成全她的請託。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 塔塔露 <small class="muted"> 利姆薩·羅敏薩下層甲板（X:4.6, Y:11.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="an-unexpected-ambition.html">進擊的塔塔露</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="a-time-to-every-purpose.html">慶功會為誰而開</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
