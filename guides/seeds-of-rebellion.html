    story:`<div class="clamp" data-collapsed="true">
<p>The tiny trader insists the Mandragoras aren’t merely a nuisance to farmers and provisioners—freeing vegetables from larders is only the beginning. He swears they’re plotting revolution, and tells you to take a ferry to the Isles of Umbra to see a “vegetable kingdom” with eggplants and turnips ruling like tyrants. Then he squints at the muscle-bound man beside you, startled to recognize him as the “undead overlord” who fancies himself a gentleman inspector, and he recognizes you as the adventurer who bested the duelist in single combat.</p>
<p>Still rattled, the trader asks if it’s true the duelist traveled with a demon bird whose crow could split the heavens, then praises you for being brave and humble. He repeats his fear of a future where people would have to call a tomato “Your Grace,” and begs you to hurry to the Isles of Umbra and uproot the Mandragoras’ growing army before the “harvest” comes. Hildibrand, thrilled by the thought of matching wits with sentient plants, declares you’re going.</p>
<p>On the Isles of Umbra, strange, distant voices echo while the fighting rages. Hildibrand calls up from below the surface, insisting he is still in pursuit of the Mandragoras somewhere beneath you, and urges you onward once your battle is done. When you return to Costa del Sol with the reclaimed foodstuffs, Lewenhart is relieved you didn’t become “a tasty snack,” and immediately worries about whether the rare peppers are intact for Guguremu’s exacting palate—Nashu is eager to see them too.</p>
<p>But the moment the crate is opened, Nashu blurts out that the peppers have changed color. Hildibrand leaps to a grand conclusion—peppers that disguise themselves like your many-faced foe—while Briardien studies the hue: a striking blue, far from the deep purple Lewenhart described. Lewenhart stammers and tries to blur the difference as “purplish blue” or “bluish purple,” but Briardien refuses the excuse. He declares no one could mistake that color for purple—unless they were wearing a very particular sort of eyewear.</p>
<p>The pretense collapses. Briardien calls for pursuit, and Hildibrand charges after the fleeing suspect, exulting that the goggles were the key all along. Together they corner the man, and Hildibrand formally places him under arrest for stealing a priceless blade and countless crimes. Briardien remarks the thief was brought down by a “snipper,” then moves to reveal what lies behind the mask—only to find there is no mask at all.</p>
<p>The man collapses, dazed, and insists he is the real Lewenhart. He remembers he was headed to meet Miss Arabella when a Brass Blade approached him on patrol—then suddenly attacked. He fought desperately and even drove a kitchen knife into the man’s right hand, but was overpowered. Nashu realizes the impostor wore gloves, and Briardien pieces the new advantage together: the many-faced thief must already have assumed another identity, but he couldn’t have researched the new target thoroughly in such a short time. Most importantly, the thief’s right hand is wounded—so you can return to Costa del Sol and examine the hands of everyone present before the banquet begins.</p>
<p>With the plan set, Hildibrand insists on escorting Lewenhart back to the estate to ensure Arabella’s safety. Elsewhere, the many-faced thief gathers “little ones,” promising revenge and ordering them to wait at Costa del Sol—then muses over which mask to wear to the ball. At the estate, Hildibrand is instantly smitten when Arabella appears among the flowers, and Lewenhart urges her back inside. Arabella speaks politely, asks whether rumors of the many-faced thief are true, and Hildibrand swears she will not be harmed while he is on the case.</p>
<p>Arabella’s poise falters into quiet unhappiness. She admits the marriage has been arranged against her wishes; she does not love Vannes and has never even met him. She shows the betrothal clasp he sent—“a treasure for my treasure”—and says its beauty feels like a golden shackle. Lewenhart panics at her candor, but Arabella explains her father insists the marriage is necessary for the future of the family trade. Ellie presses further and confirms Arabella is not related to her father by blood—he found her as a baby among beggars in Pearl Lane, took her in, and later took in Lewen as well as a servant. However cold he seems to others, he gave her warmth and hope, and she will learn to love Vannes if it will make him happy.</p>
<p>Hildibrand is appalled that she would sacrifice her future for duty, but Ellie cuts the moment short—she cannot endure more of Hildibrand’s theatrics, and you must return to Costa del Sol to see how Briardien’s investigation proceeds. Arabella agrees she must prepare for the banquet, and she bids you farewell.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>ちび商人は、マンドラゴラは農家や食料商を悩ませる厄介者どころではないと言い募る。食卓から仲間を解放するのは序章に過ぎず、やつらは革命を目論んでいるのだという。渡し船で「アンブラ島」へ行けば、ナスやカブが鉄拳で支配する野菜王国を自分の目で見られる、とまで言う。</p>
<p>そして彼は、そばにいる筋骨隆々の男を見てぎょっとし、「紳士な調査官」を気取る不死の支配者だと気づく。さらにあなたのことも、武器怪盗を一騎打ちで打ち倒した冒険者だと見抜き、武器怪盗が天を裂くような鳴き声の魔鳥を連れていたという噂は本当かと問いかける。ちび商人は、あなたが勇敢でありながら謙虚だと褒め、トマトに「閣下」と呼ぶ羽目になる未来は御免だと嘆きつつ、アンブラ島で増殖を続ける連中を収穫前に引き抜いてくれと懇願する。ヒルディブランドは、知性ある植物と知恵比べなど初めてだと昂ぶり、アンブラ島へ向かうことを宣言する。</p>
<p>アンブラ島では、遠くで意味不明な声が響く中、あなたは戦いに臨む。ヒルディブランドは地中へ潜ったまま、マンドラゴラを追っていると叫び、あなたが戦いを終えたら先にコスタ・デル・ソルへ向かえと言う。やがて奪われた食材を取り戻して戻ると、ルーウェンハートはあなたがキャベツの餌にならずに済んだと安堵し、ググレムの味付けに欠かせない珍しい唐辛子が無事かどうかを確認しようとする。ナシュ・マカラッカも見たことのない色だと興味津々だ。</p>
<p>ところが木箱を開けた瞬間、ナシュ・マカラッカは唐辛子の色が変わったと言い、ヒルディブランドは変装の力まで備えた唐辛子ではないかと大騒ぎする。ブリアルディアンは冷静に色を見て、濃い紫ではなく鮮烈な青だと断じる。ルーウェンハートは紫がかった青だとか青みがかった紫だとか言い繕うが、ブリアルディアンは一蹴し、その色を紫と誤るのは特殊な眼鏡をかけていた場合だけだと見抜く。</p>
<p>芝居は終わりだ。ブリアルディアンは追えと号令し、ヒルディブランドはゴーグルこそが鍵だったと叫びながら走り出す。逃げた男は取り押さえられ、ヒルディブランドは高価な剣の窃盗を含む数々の罪で逮捕すると宣言する。ブリアルディアンは盗人が「鋏」によって倒されたと呟き、仮面の下を確かめようとするが、そこに仮面はない――倒れているのは本物のルーウェンハートだった。</p>
<p>ルーウェンハートは朦朧としながら、自分がアラベラ嬢に会いに向かう途中、巡回中のブラスブレードに声をかけられた直後に襲われたと語る。必死に抵抗し、相手の右手に包丁を突き立てたが力及ばず、気を失ったのだという。ナシュ・マカラッカは偽物が手袋をしていたことを思い出し、ブリアルディアンは敵がすでに新たな身分に化けている可能性を示しつつも、最重要の手がかりは右手の負傷だと断定する。宴が始まる前にコスタ・デル・ソルへ戻り、居合わせた者の手を確かめればよい、と。</p>
<p>計画が定まると、ヒルディブランドはルーウェンハートを屋敷へ送り届け、アラベラ嬢の安全を確保すると言う。そのころ別の場所で、万面相の怪盗は「小さき者たち」に復讐を囁き、コスタ・デル・ソルで命令を待てと指示し、舞踏会ではどの仮面を被るべきかと独りごちる。</p>
<p>屋敷の庭先でアラベラが花を眺めていると、ヒルディブランドは息を呑むほどの美しさだと舞い上がり、彼女は万面相の怪盗の噂が真実かと尋ねる。ヒルディブランドは事実だと認めながらも、自分がいる限り指一本触れさせないとマンデヴィルの名に誓う。だがアラベラは溜息をつき、望まぬ政略結婚だと打ち明ける。ヴァンヌを愛しておらず、会ったことすらないのに、婚約の印として贈られた留め具は黄金の枷のようだ、と。</p>
<p>ルーウェンハートは慌てるが、アラベラは父が家業の未来のために必要だと言っていると語る。エリー・ライズが踏み込んで尋ねると、アラベラは父とは血縁がなく、幼いころパールレーンの物乞いの中で拾われ育てられたのだと明かす。父はルーウェンも召使いとして迎え入れた。世間には冷酷に見えても、自分には温もりと希望を与えてくれた存在だから、父を喜ばせるためならヴァンヌを愛する努力をする、とアラベラは言う。</p>
<p>ヒルディブランドは到底納得できないと声を上げるが、エリー・ライズはこれ以上付き合えば気が狂うと言わんばかりに話を切り上げ、ブリアルディアンの捜査の行方を確かめるためコスタ・デル・ソルへ戻ろうと促す。アラベラも宴の支度があると言い、あなたたちに別れを告げる。</p>
</div>

  ZH:{

    pageTitle:'事出有因',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
<p>Tiny Trader 說，Mandragoras 不只是讓農夫與糧商頭痛的麻煩貨色而已；把同伴從餐桌與儲藏室「解救」出去只是開端，他們還有更大的野心——革命。他叫你搭船去 Isles of Umbra 親眼看看，那裡簡直像是蔬菜王國，eggplants 與 turnips 用鐵腕統治。說到一半，他又盯著你身旁那個肌肉發達、表情發愣的男人，驚呼自己想起來了——那不就是自稱紳士調查官的「不死支配者」嗎。</p>
<p>他接著也認出你，說你就是那個曾在單挑中擊敗武器怪盜的冒險者，還追問傳聞是否屬實：武器怪盜是不是帶著一隻魔鳥，鳴叫聲能把天空劈開。Tiny Trader 誇你不但勇敢還很謙虛，然後又忍不住回到他的恐懼——他可不想哪天得對一顆番茄喊「殿下」。他求你趕緊去 Isles of Umbra，把正在那裡培育「整支軍隊」的 Mandragoras 連根拔起，別讓所謂的「收成」真的到來。Hildibrand 聽得興致高昂，說自己從沒跟有智慧的植物鬥智，正好令人熱血，立刻宣布出發。</p>
<p>在 Isles of Umbra 的混戰中，你聽見遠處傳來難以辨識的聲音；Hildibrand 甚至喊著自己追人追到地底下，還在下面緊咬 Mandragoras 不放，催你打完就先往 Costa del Sol 走，他會在脫困後跟上。等你把被奪走的食材帶回 Costa del Sol，Lewenhart 如釋重負，說他原本還怕你會被發狂的 cabbage 當點心吃掉；但他馬上又急著確認那批稀有辣椒是否完好，因為 Master Guguremu 對調味極其挑剔。Nashu Mhakaracca 也興奮地湊上來，說她從沒見過那種「紫色 dragon pepper」。箱子一開，Nashu Mhakaracca 卻驚叫：辣椒變色了。Hildibrand 立刻把這當成重大線索，說這些辣椒是不是也有像「多面之敵」那樣的偽裝能力；Briardien 則冷冷指出，那顏色明明是醒目的藍，離 Lewenhart 先前形容的深紫差得太遠。Lewenhart 慌忙改口，說可能是「偏紫的藍」或「偏藍的紫」，兩種顏色很像；Briardien 卻斷言這種色澤不可能被合理地誤認成紫色——除非當時戴著某種非常特定的護目鏡。</p>
<p>偽裝當場被拆穿。Briardien 一聲令下追人，Hildibrand 也高聲說護目鏡正是破案關鍵，帶著 Nashu 追上去。逃跑的人終於被制伏，Hildibrand 以竊取珍貴刀劍、威脅少女清白與無數罪行為由宣布逮捕；Briardien 則說小偷被一記「剪刀」擊倒也算應得，並準備揭開面具——卻發現對方根本沒有面具。</p>
<p>倒在地上的人迷迷糊糊醒來，說自己才是真正的 Lewenhart。他回想起來，自己原本要去見 Miss Arabella，卻在前往 Wineport 的路上被巡邏的 Brass Blade 上前攀談；下一瞬間對方突然翻臉襲擊，他拼命反抗，甚至把一把廚刀刺進對方的右手，但最後仍被壓制。Nashu Mhakaracca 這才想起來：那個冒牌貨當時戴著手套。Briardien 立刻把線索串起來——真正的敵人很可能已經換了新身分，可他不太可能在短時間內徹底研究新目標；最重要的是，你們已經確定小偷的右手受傷了。趁宴會開始前回到 Costa del Sol，檢查在場所有人的手，就能把他揪出來。</p>
<p>Hildibrand 認同計畫，並表示他們會護送 Lewenhart 回到莊園，確保 Miss Arabella 的安全；同一時間，那名多面怪盜對著「小傢伙們」低語，說他理解他們對被奪走之物的憤怒，命令他們前往 Costa del Sol 等候指示，並自問舞會上該戴哪一張面具。</p>
<p>在莊園外的花叢旁，Hildibrand 一見 Arabella 就誇張地驚嘆她美得不像人間之物，還自我介紹要她叫他 Hildy；Lewenhart 則焦急要她立刻回莊園。Arabella 禮貌地回應，詢問「多面怪盜」是否真有其人；Hildibrand 承認傳聞屬實，並以 Manderville 之名發誓，只要他在，對方就別想碰她一根手指。</p>
<p>Arabella 卻在嘆息中吐露心事：這場婚姻是被安排的，她不愛 Vannes，甚至連面都沒見過。她拿出對方送的訂婚扣飾與那句「獻給我的珍寶」，說不管它多漂亮，對她而言都像是金色枷鎖。Lewenhart 緊張地要她別再說，Arabella 卻說父親認定婚事必須成就，為的是家族貿易的未來。Ellie 進一步追問後得知，Arabella 與父親並無血緣——她還是嬰兒時就被人在 Pearl Lane 的乞兒之中撿到養大；父親也收留了 Lewen，但身分是僕人而不是兒子。世人覺得父親冷酷吝嗇，可對 Arabella 而言，他是把溫暖與希望交到她手中的人，所以她願意學著去愛 Vannes，只要那能讓父親開心。</p>
<p>Hildibrand 對她竟願意犧牲自己感到不可理喻；Ellie 卻忍無可忍地要你們趕緊回 Costa del Sol，看 Briardien 的調查進展如何。Arabella 也說自己得準備宴會，於是向你們道別。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
