  <style>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Secret of the White Lily',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Aethelmaer tells you to keep hold of the lily button—you’ll need it to continue your investigation. Even if it isn’t standard procedure to entrust key evidence to an individual, he says you’ve proven reliable and resourceful, and there’s no reason you shouldn’t carry on. If you want a lead, he suggests taking the button to Gridania and asking Miounne to have it examined—someone in her wide network of contacts might recognize the sigil.</p>
      <p>At the Carline Canopy, Mother Miounne greets you and immediately reads your mood—you’re clearly not here for scones and herb tea. She turns the button over in her fingers, admiring the delicate engraving and judging it to be artisan-level work. When you tell her where you found it—on a dead body—she reacts with dry disbelief, but her answer is firm: she doesn’t recognize the lily sigil. If you want the truth, you’ll have to do it the old-fashioned way—ask around. She points you toward Bernadette near the aetheryte plaza, praising her sharp eyes.</p>
      <p>Bernadette blinks at the request—tracking down a button’s owner isn’t something she hears every day—but she studies it carefully. She can’t name the sigil, yet she notes it resembles the sort of decorative button worn by old families. And while she can’t identify who would adopt it as a personal mark, she does say the white lily is a recurring motif in Gridanian culture. If anyone in Gridania would know more, she says, it would be Ceinguled at the Lancers’ Guild—someone who makes a point of knowing citizens by name.</p>
      <p>When you bring the button to Ceinguled, she admits it’s an unusual piece. Work of this quality, she says, is rarely seen in the hands of ordinary Gridanians—the owner is almost certainly well-to-do, and your search should extend to the Gentry’s Ward northwest of here. Then a detail returns to her: lately, a man has been sitting constantly on the bench by the ward’s entrance—Ursandel—and she distinctly recalls seeing a remarkably similar button on his jacket. If you want answers, she says, he’s the one to ask.</p>
      <p>You find Ursandel and he tries to dismiss you at first, insisting you leave him to his thoughts—but the moment he sees the button, he goes pale. He recognizes it as the sigil of the Dartancours family and demands to know how you came to possess it. When you tell him it was taken from the body of a murdered woman, his voice catches as he asks one question—was her face marred in any way? With a heavy sigh, he admits he can no longer feign ignorance. He will tell you the truth behind the deaths, but only if you promise to put an end to his lady’s madness and free her from her torment.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Aethelmaer <small class="muted">North Shroud (X:19.6, Y:25.3)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="power-of-deduction.html">Power of Deduction</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 28 or above)</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="skeletons-in-her-closet.html">Skeletons in Her Closet</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'白百合は謡う',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>エーセルメールは、白百合紋のボタンをあなたが預かっておくよう告げる。捜査を続けるうえで必要になるという。本来、重要な証拠品を個人に託すのは常例ではないが、あなたの働きぶりは十分に信頼できる――だからこそ、引き続き任せたいのだと。手がかりを求めるなら、グリダニアへ赴き、ミューヌに意匠を見てもらうといい。彼女の幅広い人脈の中に、紋章に心当たりのある者がいるかもしれない。</p>
      <p>カーラインカフェでミューヌはあなたを迎え、表情ひとつで用件を察する。菓子とハーブティー目当てではないのだろう、と。彼女はボタンの彫り込みの精緻さを褒め、職人仕事の品だと評する。あなたがそれを死体から見つけたと告げると、ミューヌは呆れたように受け止めつつも、白百合の紋章には見覚えがないと言い切る。答えを得たいなら、地道に聞き込みを重ねるしかない――まずは、エーテライト・プラザ付近のベルナデットを頼れ、と。</p>
      <p>ベルナデットは「ボタンの持ち主探し」と聞いて目を瞬かせつつも、品を確かめる。意匠の由来までは断言できないが、古い家々が身に着けた装飾品を思わせるという。そして白百合は、グリダニアの文化の中で繰り返し現れる題材でもある。個人の紋章として用いる者までは知らないが、もし心当たりがあるとすれば、鬼哭隊屯所にいるセイングレドだろう――市民の名を一人ひとり把握することに長けた人物だ、と案内する。</p>
      <p>セイングレドは半ば呆れながらも協力を約束し、ボタンを見てその質の高さに目を細める。これほどの出来の品を持つのは、ありふれた市民ではない――持ち主は裕福な者に違いない。ならば捜索先は、北西にある名士区へ広げるべきだという。さらに彼女は思い当たる。近ごろ名士区の入口のベンチに、いつも腰を下ろしている男がいる――名はウルサンデル。その胸元に、よく似たボタンを見た覚えがあるのだ。</p>
      <p>あなたがウルサンデルを訪ねると、彼はまず取り合おうとしない。だがボタンを見せた途端、息を呑む。これはダルタンクール家の紋章だ――なぜあなたがこれを持っているのか、と。殺された女性の遺体から見つけたと告げると、彼は顔色を失い、彼女の顔は傷つけられていなかったかと問いただす。やはり、と小さく息を吐き、もはや知らぬふりはできないと言う。真相を語る条件はひとつ――「我が主」の狂気に終止符を打ち、その苦しみから解き放つと、あなたが約束すること。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> エーセルメール牙曹長　<small class="muted">黒衣森：北部森林 (X:19.6, Y:25.3)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="power-of-deduction.html">推理は踊る</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 28～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="skeletons-in-her-closet.html">ダルタンクール家の悲劇</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'白百合的秘密',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Aethelmaer 要你把那顆「白百合紋鈕扣」先收好——接下來繼續追查時，你一定用得上。把關鍵證物交給個人保管並不符合常規，但他說你在這件事上已經證明自己可靠又機靈，因此沒有理由阻止你繼續深入。他也給你一個方向：把鈕扣帶去 Gridania，請 Miounne 幫忙看看，也許她龐大的人脈裡，有人能認出那個紋章。</p>
      <p>你來到 Carline Canopy，Mother Miounne 一眼就看出你神色凝重，顯然不是來吃點心、喝茶聊天的。她把鈕扣拿起細看，稱讚上頭的雕刻精緻到像是工匠等級的作品。當你說明這東西是在一具屍體上找到的，她語氣裡帶著難以置信的無奈，但仍很乾脆地告訴你：她不認得這個白百合紋章。若想找出答案，只能用最老派的方法——去問人。她建議你先從 aetheryte plaza 附近的 Bernadette 開始，那個人眼力很利。</p>
      <p>Bernadette 聽到你要找「鈕扣的主人」時也愣了一下——這確實不是常見的委託——但她仍仔細端詳後說，這像是某些舊家族會配戴的裝飾鈕扣，紋章本身她雖認不出，卻能肯定白百合在 Gridania 的文化裡反覆出現。至於會把它當成個人紋章的人，她沒有把握，但如果 Gridania 真的有人知道，那大概是 Ceinguled ——據說那個人很在意掌握城裡每個人的名字與來歷。</p>
      <p>你找到 Ceinguled，她一邊嘴上說 Bernadette 把希望押在她身上未免太大膽，一邊仍願意幫你看看。鈕扣的工藝讓她格外在意：這種品質很少出現在普通人手上，持有者八成相當富裕。她建議你把搜尋範圍轉向西北方的 Gentry’s Ward。接著她又想起一個細節——最近有個男人總是坐在入口的長椅上，名字叫 Ursandel，而她清楚記得，他外套胸前的鈕扣和你手上的非常相似；想要更直接的答案，你應該去問他。</p>
      <p>你見到 Ursandel 時，他先冷淡地表示你們並不相識，要你別打擾他。但當他看見那顆鈕扣，整個人瞬間僵住，幾乎是倒抽一口氣：那是 Dartancours 家的紋章——你怎麼會擁有它？你告訴他，這是從一名被謀殺的女性遺體上取得的，他的語氣立刻變得發顫，追問那名女性的臉是否被毀損。沉默之後，他像是終於無法再假裝毫不知情，只說他願意把死亡的真相告訴你——但有一個條件：你必須答應他，終結他「夫人」的瘋狂，將她從折磨之中解放出來。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 埃塞爾梅爾　<small class="muted">　黑衣森林北部林區 (X:19.6, Y:25.3)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="power-of-deduction.html">推理的熱情</a></div>
      <div class="row">所有職業（不含限定職） 等級 28 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="skeletons-in-her-closet.html">達爾坦庫爾家的悲劇</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
