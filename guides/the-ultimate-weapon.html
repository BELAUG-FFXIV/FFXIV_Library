const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`The Ultimate Weapon`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', reward:'Completion Reward', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Raubahn lays out the final phase: his Flames will storm Castrum Meridianum and suppress what remains of the imperial garrison, buying you the chance to reach the Praetorium unopposed—fit and ready for your encounter with the Ultima Weapon. He does not hide the truth: yours is the most dangerous mission of all, and he calls you the best they have, saying Merlwyb and Kan–E share his conviction that no one else could see this deed done. Even so, he warns you not to let the Alliance’s plight drive you to desperation—victory belongs to the bold, not the reckless—and urges you to risk no more than you must. With both of you having work to do, he tells you to see your preparations are in order, then report to Cid at the Ceruleum Processing Plant, where the Enterprise awaits.</p><p>At the Ceruleum Processing Plant, Cid places the Enterprise at your disposal: when you are ready to head for the Praetorium, you need only say the word. He speaks plainly—if the Ultima Weapon is destroyed, the Empire’s hopes of conquest will suffer a crippling blow, and the XIVth Legion would not dare move against you again… unless further Allagan doomsday devices are discovered. With that grim caveat, you set out for the Praetorium, knowing Gaius and the one at his side are waiting.</p><p>Deep within the complex, Cid steels himself—this is where the Ultima Weapon is all but certain to be housed. But before you can press on, Gaius van Baelsar appears and addresses Cid, saying he has long meant to speak of Cid’s father. He tells Cid that in the winter of his years, Midas came to abhor his part in Meteor, yet had no true luxury of choice—by the time he understood his error, Meteor held him completely in thrall. Gaius claims that shortly before his transformation, Midas confessed his regrets, most of them about Cid: that he knew early on Cid’s talent for weapons would never fulfill him, and that Cid would be happier using his knowledge for peaceful purposes. Cid snaps back, furious that Gaius would tear open walls for this, demanding to know what he truly wants. Gaius answers without hesitation: he wants Cid at his side, to take up his father’s mantle as the Empire’s lead engineer. Cid refuses, insisting his destiny does not lie with the Empire—then Gaius turns to you and offers you the same: to join him, to bring order to Eorzea, and usher in lasting peace. When you refuse, he says it was your strength that made him offer friendship, and it is your strength that now makes him offer his blade—too dangerous to be left alive unless you stand as an ally. With a final warning that no one escapes the past, he departs.</p><p>To continue, you face a bulkhead made of special alloy—ordinary fire will not leave a mark. You divert all power to the magitek cannon as you did before, pushing the armor’s core toward failure because there is no other way. The controls sputter through interference, but you follow the instructions, ignore the warning lights, and blast the path open. Then a voice cuts in—Nero tol Scaeva. He tells you that you have been leaving a fine mess in your wake, and he greets Cid with cold familiarity, bitterness spilling out as he speaks of years condemned to living in Cid’s shadow. He claims that by every objective measure he was the more talented, yet his achievements counted for nothing beside Cid’s birth as Midas nan Garlond’s son. Even after Cid defected, Nero says, Cid became a legend and remained the young prodigy of magitek, while Nero was treated as second-rate no matter what he accomplished. He reveals that Gaius is activating the fully powered Ultima Weapon—and that it is Nero’s magnum opus, the creation that will win him the recognition he is due. He will not let anyone interfere. He admits he has watched you since he first set foot in this land, and he points to what you have done: you have felled eikons, made possible by the Echo—power that shields you from their corrupting influence. He declares his intent to harness that power for the Ultima Weapon and demands you yield him its secrets.</p><p>When the Ultima Weapon’s activation surges through the facility, contact grows unstable, yet Cid keeps you moving. He warns that the target chamber is saturated with aetheric energies and that interference will be heavy—if you lose contact, you must go on. He directs you to the lift’s control panel, tells you to take it down to the Ultima Weapon’s chamber, and warns that Gaius could be waiting. The interference worsens—and then Gaius’s voice cuts through, demanding to know for whom you fight and whether you believe in Eorzea. He calls Eorzea’s unity a cobweb of lies, its city–states built on deceit, its faith an instrument of deception, and he mocks the idea of divine protectors—saying such gods answer only when fed crystals and aether. He argues that only men of power can steer civilization, and he challenges you to face him, claiming your defeat will prove his readiness to rule. Even when pressed hard, he calls your strength impressive—power fit for a ruler—yet says you lack the resolve to use it properly. And when you will not do what he demands, he declares he will do it himself.</p><p>He bids you bear witness to the true power of the Ultima Weapon, but even as devastation unfolds, his certainty cracks. He rages that the Weapon is all-powerful—so why do you still stand? Lahabrea answers from the shadows: it is the blessing of Light that confounds Gaius, and the Crystal you bear shields you beyond mortal limits. Lahabrea speaks of the Heart of Sabik, the Weapon’s core—an enigma even the scholars of ancient Allag failed to truly fathom—and he names the spell without parallel: Ultima. He admits he sought the life force of the primals only to quicken the core, and he unleashes Ultima amid mad laughter, leaving Gaius shaken by the destruction. Lahabrea declares your shield broken and leaves the rest to Gaius, who insists the question of who is mightier remains and challenges you again. When Gaius falls, Lahabrea turns his scorn on him and then on you, declaring Hydaelyn the root of corruption and insisting she must be burned out so the one true god may return. He says you and your Scion accomplices will not be suffered to interfere—and vows you will not leave alive. In the battle that follows, Hydaelyn’s voice urges you not to surrender, to look to the Light and take up power to banish Darkness. Even as Lahabrea rages that you cannot hope to defeat him, Light binds his shadows, and the Warrior(s) of Light press in until he is overwhelmed.</p><p>In the wake of it all, Gaius admits his conquest ends in smoke and ashes. Hydaelyn speaks to you—Darkness has fled before the brilliance of your spirit, yet it still lingers in forgotten corners of the world, and a Dark One watches in the abyss. For now, a gentle light shines over Eorzea with you at its heart, and you are told to go forth as a beacon of hope. Elsewhere, the leaders and the Scions gather, units withdrawing and accounted for, anxious for word—until Hydaelyn calls to them through the Crystal and bids them reach out. They feel your presence, the shroud lifts, and memory returns: you are one of the Warriors of Light. When you emerge, they call out in relief—Thancred is with you—and you are welcomed home.</p><p>In the celebration that follows, the leaders speak of an end to imperial tyranny and Ascian machination, and of a new day beginning in Eorzea. They call for unity and shared resolve, acknowledging sorrow that cannot be washed away, yet urging all to face the future together. By the light of the Crystal, a new era is proclaimed—the Seventh Astral Era—and the realm is said to be reborn. Yet even as the moment settles, an Echo shows a great dark Crystal, and then a roar shakes the ground: dread tidings spread that an abomination—a primal—has awakened. In shadows beyond, Ascians speak in their own tongue: Bahamut stirs, the others will follow, and they draw closer to the Reckoning, calling to Zodiark and reminding that where there is light, there is always shadow. Back at the Waking Sands, word of what you have done inspires awe and new hope, but Minfilia later tells you that the Archons have investigated the roar and their findings strongly suggest a new primal has appeared, bearing an aetherial pattern seen only once before—five years ago. Peace has been secured at great sacrifice, she says, but the struggle continues, and she asks you to stand with them still, to safeguard the future of the realm—of this very star.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Raubahn <small class="muted">(Northern Thanalan, X:15.5, Y:16.9)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="rock-the-castrum.html">Rock the Castrum</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div><div class="row"><b>Unlock Dungeon</b> <a class="link" href="the-praetorium.html">The Praetorium</a></div><div class="row"><b>Unlock Trial</b> <a class="link" href="the-porta-decumana.html">The Porta Decumana</a></div></div>`,
    followq:`<div class="stack">
    <div class="row"><a class="link" href="the-price-of-principles.html">The Price of Principles</a></div>
    <div class="row"><a class="link" href="legacy-of-allag.html">Legacy of Allag</a></div>
    <div class="row"><a class="link" href="king-of-the-hull.html">King of the Hull</a></div>
</div>`,    
    reward:`<div class="stack"><div class="row"><b>Mount</b> <a class="link" href="magitek-armor.html">Magitek Armor</a></div><div class="row"><b>Medicine</b> Fantasia</div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'究極幻想アルテマウェポン',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', reward:'クリア報酬', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ラウバーンは最終局面の方針を告げる。不滅隊はカストルム・メリディアヌムへ突入し、残る帝国軍守備隊を制圧する――それがうまくいけば、あなたは妨害なくプラエトリウムへ到達し、万全の状態でアルテマウェポンとの対峙に臨めるという。あなたの任務は最も危険だが、最良の者が最も重い荷を担うのだと彼は言い、メルウィブやカヌ・エも同じ考えだと明言する。だが、成否があなたに懸かっているからこそ、追い詰められて無謀になってはならない。勝利は大胆な者にこそ与えられ、向こう見ずな者には与えられない――命を顧みぬ英雄譚を引き合いに出しつつも、危険は必要最小限に抑えろと釘を刺す。そして準備を整えたら、セリウム精製所でエンタープライズとともに待つシドのもとへ向かえ、と告げて送り出す。</p><p>セリウム精製所でシドは、エンタープライズはいつでも使えると言い、プラエトリウムへ向かう準備ができたら一言でいいと告げる。アルテマウェポンを破壊できれば、帝国の征服の望みに致命的な打撃を与えられるはずで、その後は第十四軍団も軽々しく動けない――ただし、さらにアラグの終末兵器が見つからない限りは、という冷たい但し書きも添える。そうしてあなたはプラエトリウムへ向かい、ガイウスと、彼のそばにいる者の存在を意識しながら進む。</p><p>複合施設の深部でシドは、アルテマウェポンがここにある可能性が極めて高いと告げ、いよいよだとあなたを促す。だがその前にガイウス・ヴァン・バエサルが現れ、シドへ語りかける。ずっと伝えたかったことがある、それは父ミダースのことだという。ガイウスは、晩年のミダースは「メテオ」計画への関与を嫌悪し、手を引きたがった――しかし選択の余地はなく、過ちに気づいた時には遅すぎて、メテオに完全に囚われていたのだと語る。変貌の直前、ミダースは悔恨を吐露し、その多くはシドに関するものだった。兵器の才はあっても満たされないこと、知識を平和のために使うほうが幸福だと、ミダースは早くから見抜いていたのだと。シドは激昂し、こんな話のために壁を破ったのかと詰め寄る。ガイウスは望みを明かす――帝国の首席技師として父の役目を継ぎ、自分の傍らに立て、と。シドは拒絶し、自分の運命は帝国にはないと言い切る。ガイウスは次にあなたへも手を差し伸べ、力を合わせればこの地に秩序と永き平和をもたらせると誘う。だが拒むあなたに、味方でないなら危険すぎる、過去から逃れられる者はいない――そう告げて彼は去る。</p><p>進む先を塞ぐ隔壁は特殊合金で、通常の火では傷ひとつつかない。あなたは魔導キャノンへ全出力を回し、機体の中核が耐えきれなくなると知りつつも前進のために引き金を引く。通信は乱れ、手順の指示も途切れ途切れになるが、警告灯を気にせず操作し、道をこじ開ける。そこへ割り込む声――ネロ・トル・スカエウァだ。彼はあなたが後に残してきた混乱を嘲り、シドを旧友と呼びながら怨嗟を吐き出す。学院時代からずっとシドの影に追いやられ、才能で勝っていても、ミダース・ナン・ガーロンドの息子という出自の前では無価値にされたのだと。シドが離反しても伝説となって栄光を独占し、自分は二流扱いだ――そう言ってネロは宣言する。ガイウスは完全出力のアルテマウェポンを起動しようとしている、それは自分の最高傑作であり、正当な評価を勝ち取るための創造だ、と。彼はあなたを監視してきたとも告げ、あなたが「エコー」によって蛮神の影響を受けずに討ち倒してきたことを挙げ、その力をアルテマウェポンに取り込むと断言し、秘密を差し出せと迫る。</p><p>起動が進み干渉が増す中でも、シドはあなたを導き続ける。目標の部屋はエーテルが飽和し、連絡が途絶えても進め、と。昇降機の制御盤を探し、下層のアルテマウェポンの間へ向かえ、ガイウスが待ち受けているかもしれないと警告する。そこでガイウスは問いかける――誰のために戦うのか、エオルゼアを信じるのか。結束は虚偽、信仰は欺瞞、守護神も結晶とエーテルを与えれば応える蛮神に過ぎない、と。力ある者こそ文明を導くべきだと語り、あなたの敗北で支配の正しさを証明すると宣言する。あなたの力は支配者に相応しいが、正しく使う決意が足りない――だから自分がやる、と言い放つ。</p><p>ガイウスはアルテマウェポンの真なる力を見せつけると叫ぶが、破壊の只中で自信は揺らぐ。全能のはずなのに、なぜあなたは倒れないのか。ラハブレアは光の加護とあなたのクリスタルの盾を語り、「サビクの心臓」と比類なき魔法「アルテマ」を明かす。蛮神の生命力を求めたのは核を目覚めさせるために過ぎない、と笑い、アルテマを解き放つ。ガイウスは狼狽しつつも決着を求め、やがて倒れる。ラハブレアは世界の歪みの根はハイデリンにある、真の神の復活のために焼き払わねばならないと断じ、あなたと暁の血盟はここから生きて出られないと宣告する。ハイデリンの声が届き、光を見よ、闇を退ける力を受け取れとあなたを励ます。光は影を縛り、ついに彼は押し潰される。</p><p>すべてが終わったあと、ガイウスは征服の終わりを認める。ハイデリンはあなたに語りかける――闇は退いたがまだ潜み、深淵には「闇なる者」が見張っている。それでも今はエオルゼアに柔らかな光が差し、あなたがその中心にいる。希望の灯として歩め、と。別の場所では撤収が進み、指揮官たちと暁の血盟があなたの帰還を待つ。クリスタルを通じて呼びかけが届き、皆が手を伸ばすと、記憶が戻る。あなたは光の戦士であり、仲間は安堵し、あなたを迎え入れる。</p><p>祝祭で指導者たちは帝国の圧政とアシエンの策謀の終焉を告げ、新たな日が始まると語る。悲しみは消えないが、未来へ向けて団結せよと。第七星暦の到来が宣言され、世界は再生したと謳われる。だがエコーの幻が黒いクリスタルを映し、地を揺らす咆哮が響く。新たな蛮神が目覚めたのだ。影でアシエンたちはバハムートの覚醒と清算の時を囁き、ゾディアークを呼ぶ。ミンフィリアは後に、賢人たちの調査で新たな蛮神の出現が強く疑われ、そのエーテルの波形は五年前にただ一度観測されたものと同じだと告げる。平和は得たが闘いは終わらない――星の未来を守るため、これからも共に立ってほしい、と。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ラウバーン <small class="muted">（北ザナラーン, X:15.5, Y:16.9）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="rock-the-castrum.html">カストルム・メリディアヌムの死闘</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div><div class="row"><b>ダンジョン開放</b> <a class="link" href="the-praetorium.html">最終決戦 魔導城プラエトリウム</a></div><div class="row"><b>討伐戦開放</b> <a class="link" href="the-porta-decumana.html">アルテマウェポン破壊作戦</a></div></div>`,

  ZH:{
    langLabel:'ZH',
    pageTitle:'究極幻想：終極武器',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', reward:'完成獎勵', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Raubahn 交代最終階段的作戰：不滅隊將強攻 Castrum Meridianum，壓制帝國軍殘存的守備隊；如果一切順利，你就能在幾乎不受阻礙的情況下抵達 Praetorium，以最佳狀態迎向 Ultima Weapon。他直言你的任務是所有人之中最危險的一個——但「最強的人就該扛起最重的責任」，而你正是他們能倚靠的最佳人選；Merlwyb 與 Kan-E-Senna 也與他同樣認定，這件事除了你，沒有任何人能完成。即使一切都繫於你的成功，他仍提醒你別因為大家的處境就變得焦躁絕望；勝利屬於勇敢的人，而不是莽撞的人。吟遊詩人總愛歌頌把性命看得一文不值的英雄，但他要你記住：人若把生命看得太輕，就會把它賣得太便宜——能避免的風險就別多冒。最後他要你把準備整理好，去向 Cid 報到；Cid 會駕駛著 Enterprise 在 Ceruleum Processing Plant 等你，並祝你獲得力量。</p><p>回到 Ceruleum Processing Plant，Cid 表示 Enterprise 已任你調度；你準備好前往 Praetorium 時，只要開口就行。他說得很明白：只要成功摧毀 Ultima Weapon，就能重挫帝國的征服野心；在那之後，第十四軍團也不敢再輕易對你們出手——除非又被發現新的 Allag（古代亞拉戈帝國）末日兵器。帶著這句冷冽的但書，你動身前往 Praetorium，心裡也明白：Gaius，以及他身邊那個人，正在等著你。</p><p>深入設施內部，Cid 低聲說，你們如今站的地方，很可能就是 Ultima Weapon 被安置在最深處的所在——而這一刻終於到了。就在你準備繼續前進時，Gaius van Baelsar 出現，先把話拋向 Cid：他一直想說的，是關於 Cid 的爸爸。Gaius 說 Midas 在晚年開始厭惡自己在 Meteor 計畫中的角色，想把那樁骯髒事徹底甩開；但他沒有選擇的餘地，等他意識到錯誤時早已太遲，Meteor 已把他牢牢控制。Gaius 又說，在「變化」之前不久，Midas 把一生的悔恨都託付給他——其中多半都與 Cid 有關：Midas 很早就明白，Cid 雖擅長打造武器，但那不會讓他真正滿足；他更適合把知識用在和平的用途上，而這份想法也改變了他。Cid 忍無可忍，質問 Gaius 竟為了說這些話就把牆硬生生破開，追問他到底想要什麼。Gaius 乾脆地回答：他要 Cid 回到帝國身邊，承接爸爸的職責，成為帝國的首席工程師。Cid 直接拒絕，表示自己的道路不在帝國。接著 Gaius 把同樣的提議轉向你：若你願意與他結盟，兩股力量合一，便能為 Eorzea 帶來秩序與長久的和平。你拒絕後，Gaius 冷冷表示：正是你的力量讓他曾伸手示好，如今也正是你的力量，讓他必須拔劍相向——除非你成為同伴，否則太危險，不能放任你繼續存在。他丟下一句「你逃不了過去」，轉身離去。</p><p>前方的隔門由特殊合金構成，普通火焰根本無法留下痕跡。你只能像在 Castrum Meridianum 時那樣，把所有能源導向魔導加農砲；即使裝甲核心會因負荷而瀕臨極限，也別無選擇。通訊與指示在干擾中斷斷續續，但你照著步驟操作、無視警示燈，硬是把道路轟開。就在這時，Nero tol Scaeva 的聲音闖入。他嘲諷你一路走來留下的混亂，並以令人不快的親暱呼喚 Cid，接著把壓抑多年的怨恨一口氣傾倒：自從學院時代起，他就被迫活在 Cid 的影子下；他自認客觀而言更有天分，卻因為 Cid 的出身——Midas nan Garlond 的兒子——而永遠得不到應有的認可。即使 Cid 叛離帝國、消失不見，反而更被奉為傳說；而他無論做什麼，都只被當成次等貨。Nero 宣告 Gaius 正在啟動完全功率的 Ultima Weapon，而那是他的「最高傑作」，是他贏回肯定的作品，他不允許任何人干涉。他又說自己一直在觀察你，因為你曾擊倒過被稱作 eikon 的 primal——而那之所以可能，是因為你擁有 Echo，能讓你不受 primal 的影響。他直言自己也想把你的力量拿來用在 Ultima Weapon 上，並要你交出那股力量的秘密。</p><p>隨著 Ultima Weapon 的運作推向完全啟動，干擾變得更嚴重，Cid 仍努力把你往前推進。他警告目標所在的房間充滿濃烈的以太能量，通訊必然會被干擾；就算失去聯繫，你也必須繼續前進。他要你尋找升降梯的控制面板，搭乘升降梯下到 Ultima Weapon 的房間，並提醒你 Gaius 可能就在下面等著你。連線搖搖欲墜之際，Gaius 的聲音切了進來，逼問你「為誰而戰」，也逼問你是否相信 Eorzea；他把 Eorzea 的團結斥為由謊言編織而成，把城邦的根基說成欺瞞，把信仰說成騙人的工具。他嘲弄守護神之說，說只要用水晶餵養、用以太灌飽，它們就會回應；那些神明與蛮族的神沒有不同，全都是 primal，正在把這片土地榨乾。他宣稱唯有掌握力量的人才能正確引導文明，並向你發起挑戰，說你的敗北將證明他有資格統治。即使他被逼到吃力，他仍稱你的力量驚人、配得上統治者，卻又說你缺乏把力量用在「正途」上的決心；而既然你不願意做他認為該做的事，他就要代你去做。</p><p>Gaius 高喊要你見證 Ultima Weapon 的真正力量，但在災厄般的破壞之中，他的自信開始崩裂：明明說是全能，為什麼你還站得住？此時 Lahabrea 出現，冷冷指出讓 Gaius 困惑的是光之加護——你所持的水晶在保護你，甚至超越凡人的極限。Lahabrea 接著談到 Sabik 的核心，也就是 Ultima Weapon 的心臟；他說那是連 Allag（古代亞拉戈帝國）最受推崇的學者都無法真正觸及的謎。那其中沉睡著無與倫比的魔法——Ultima；他承認自己收集 primal 的生命力只是為了讓核心蘇醒，然後在狂笑中釋放 Ultima，讓世界震顫。Gaius 被那樣的毀滅震住，卻仍不肯就此罷手，說要與你決出誰更強，逼你再戰；直到他敗下陣來，Lahabrea 才轉而嘲弄他所誇口的力量，並宣稱世界失衡的根源是 Hydaelyn——就像寄生般的存在，必須被燒盡，才能迎回「真正的神」。他說你與你的 Scions 同夥都不容干涉，並宣告你不可能活著離開。戰鬥中，Hydaelyn 的聲音透過連線傳來，要你別屈服，望向光，接受驅逐黑暗的力量；在 Lahabrea 的怒吼與詛咒之下，光束縛住他的影子，直到他被壓制、崩潰。</p><p>一切落幕後，Gaius 低聲承認，自己的征服就此結束，只剩煙與灰。Hydaelyn 對你說：黑暗已在你未曾閉合的靈魂光輝之前退去，但它仍潛伏在世人目光之外的角落；深淵之中仍有躲在黑暗的人在凝視。即便如此，現在的 Eorzea 仍被溫柔的光籠罩，而你就在其中心；她祝福你，並要你往前走，成為 Eorzea 與更遠土地的希望之光。另一處，眾人撤離集結，各軍回報人員無恙，指揮官與 Scions 焦急等待你的消息；直到 Hydaelyn 的呼喚透過水晶傳來，指引眾人伸手觸及你。有人感到你的存在，覆蓋的迷霧被掀開，記憶回來了——你是光之戰士。當你終於出現，眾人呼喊、鬆一口氣，看到 Thancred 也與你一同歸來，並對你說：歡迎回家。</p><p>在隨後的慶典裡，領袖們宣告帝國的暴政與 Ascian 的陰謀已告一段落，新的一天在 Eorzea 展開；他們談共同的歷史、共同的家園，提醒眾人悲傷無法被勝利洗去，但也不要把自己困在過去，而要面向未來、團結如一。最終，在水晶之光下，他們宣告「第七星曆」到來，並說這片大地迎來新生。然而就在此時，Echo 映出一枚巨大而陰暗的水晶，隨即一聲足以撼動地面的咆哮傳遍四方——斥候帶來凶訊：一個可憎之物，一個新的 primal，覺醒了。更深的陰影裡，Ascians 用他們的語言低語：Bahamut 蠢動，其他也將相繼醒轉；Eorzea 的鬥士終究會屈服，只是時間問題；他們呼喊 Zodiark，並冷冷提醒：有光之地方，必有影子。回到 Waking Sands，人們驚嘆你們竟能擊垮第十四軍團、也有人因此被點燃了冒險之心；但 Minfilia 隨後告訴你，Archons（賢者）已對那聲咆哮的來源做了初步調查，結果強烈暗示新的 primal 已經出現。那道咆哮在以太中留下的波形，只在歷史上出現過一次——正好是五年前。她說你們以巨大的犧牲換得和平，但戰鬥尚未結束；請你繼續與他們並肩，一同守護這個世界、守護這顆星的未來。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  reward: document.getElementById('panel-reward'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
