<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Sibling Rescue',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Koana paces, waiting for news, and the moment a linkpearl call comes through, his composure snaps into urgency—Thancred found her. Thancred tailed the Hoobigo’s boat to its destination and confirmed that Wuk Lamat is being held captive, and Koana’s anger lands hard when he names the culprits: Bakool Ja Ja and his followers. He swears they will regret this, then tells you exactly where she is—Richleaf tunnels—and orders that the instant the harness is repaired, you strap in the punutiy and head back down Ihuykatumu.</p><p>You reach Ihuykatumu outside Richleaf tunnels and meet Thancred, who wastes no time: the Third Promise is just ahead, unharmed, and you must move quickly. Inside the tunnels, you hear Bakool Ja Ja sneer that these “pathetic feats” are nothing compared to taking the prizes by force. Wuk Lamat shouts back that the keystone was earned by Fonjeantaine’s total devotion, and Bakool Ja Ja’s mockery only sharpens as he taunts her for letting something “so precious” be stolen and calls her a foolish kitty caught in his trap.</p><p>Koana strikes back from the shadows, and Bakool Ja Ja reels at the ambush, furious at being outplayed. Koana coolly answers that this is the blessed siblings’ favored tactic, and Bakool Ja Ja spits out blame at the accomplice who was meant to keep you running in circles. The standoff turns volatile when Bakool Ja Ja threatens that you can do nothing while they have a hostage—until Thancred arrives at the perfect moment, and Koana calls to Lamaty’i to make sure she’s truly all right. Wuk Lamat answers that she is, thanks to you.</p><p>Bakool Ja Ja’s rage erupts into promises of slaughter, but his other head forces restraint—Zoraal Ja already left them hurting, the keystone is theirs, and there’s no need to fight today. The two sides of him argue in the open until the calmer head wins: if they fall here, they fail their siblings for nothing. Reluctantly, Bakool Ja Ja orders a retreat, and even as Wuk Lamat curses him and wants to give chase, Koana refuses—Wuk Lamat is safe, and that is what matters.</p><p>Back at Many Fires, Koana is visibly relieved to see Lamaty’i unharmed, and Wuk Lamat thanks him—and all of you—for coming to her rescue. Yet the relief turns into bitter frustration: Wuk Lamat admits she underestimated Bakool Ja Ja, and it cost her a keystone. Fonjeantaine upended his life so she could complete the Moblins’ feat, believed in her cause, and she feels she has let him down—until you remind her that the contest isn’t over. She gathers herself, swears it’s not over till it’s over, and vows to knock that brute onto his scaly behind and take back what was stolen.</p><p>Thancred points out another detail: Bakool Ja Ja cursed a “useless Boonewa sycophant” when he saw you, and Koana assumes that means Sareel Ja—the devoted follower of their brother and the only Boonewa he knows in the rite. If Zoraal Ja was involved, Koana’s fury hardens into something colder: he will never forgive anyone who put his sister in danger, and any such person forfeits the right to be called brother. He adds that Bakool Ja Ja should be punished, and so should the bandits bold enough to abduct Lamaty’i; he will ask Father to send Landsguard to enforce the law here.</p><p>Wuk Lamat agrees travelers must be kept safe, but she also wonders what drove people into banditry in the first place—and whether digging deeper could improve things for everyone. Koana accepts it as something to consider, but for now the rite continues. As you prepare to move on, Krile remarks that Koana is the picture of composure and reason—except where Wuk Lamat’s safety is concerned—and Erenville notes that the Wuk Lamat he once knew would have been inconsolable at losing a keystone, but this journey, and your companionship, have helped her grow. Wuk Lamat apologizes again, promises she won’t lower her guard around suspicious strangers, and thanks you all once more for saving her.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Koana <small class="muted">Kozama’uka (X:31.8, Y:25.5)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="feeding-the-river.html">Feeding the River</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 92</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="historys-keepers.html">History’s Keepers</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'ウクラマトを救え',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>コアナは落ち着かない様子で状況をうかがい、通話珠が鳴った瞬間、声色が一気に切り替わる。サンクレッドが彼女を見つけた――フービゴの舟を追って行き先を突き止め、第三誓約者が囚われていることを確認したという。コアナは犯人を口にして怒りを抑えきれない。バクージャジャとその手下だ。必ず後悔させると誓い、ラマチがいる場所はリッチリーフ坑道だと告げる。そして馬具を直し次第、プヌティーを繋いでイフイカ・トゥムを下り、急行すると決める。</p><p>あなたはイフイカ・トゥムのリッチリーフ坑道付近でサンクレッドと合流し、彼は先を急げと言う。第三誓約者は前方にいて無事だが、ぐずぐずしてはいけない。坑道に入ると、バクージャジャは試練を侮り、力ずくで飾り物を奪うほうがよほど痛快だと吐き捨てる。ウクラマトは怒鳴り、フォンジャンタンが全てを注いで作り上げた要石に触れる資格はないと抗議するが、相手は嘲笑し、罠に落ちた哀れな猫だと挑発してくる。</p><p>そこへコアナが奇襲をかけ、バクージャジャは卑怯者と罵って暴れる。コアナはそれが「受祝福の兄弟」の得意なやり方だと冷ややかに返し、相手はあなたたちを翻弄するはずだった手先の失態を呪う。人質がいる限り何もできないと言いかけたところで、絶妙のタイミングでサンクレッドが割って入り、コアナはラマチに無事かと確かめる。ウクラマトは、あなたたちのおかげで大丈夫だと答える。</p><p>バクージャジャは皆殺しにすると吠えるが、もう一つの頭が制止する。要石は手に入れた、今日は戦う必要がない、しかもゾラージャジャのせいで傷を負っている――そう言われ、二つの頭は口論しながらも撤退を選ぶ。追うべきだと叫ぶウクラマトに対し、コアナは首を振る。ラマチが無事であることこそが最優先だ、と。</p><p>あなたたちはメニー・ファイアズへ戻り、コアナはラマチの無事を確かめて安堵する。ウクラマトは救出への礼を述べつつ、油断してバクージャジャを侮ったせいで要石を奪われたと悔やむ。フォンジャンタンは生活を投げ打ってまで試練に力を貸してくれたのに、自分はその信頼を裏切ってしまった――そう嘆くが、あなたの言葉で踏ん張り、まだ終わっていないと気持ちを立て直す。そして次に会ったら鱗だらけの尻を叩きのめし、要石を取り返すと誓う。</p><p>サンクレッドは、バクージャジャが「役立たずのブーネワの腰巾着」を罵ったことに触れ、コアナはそれがサレール・ジャだろうと推測する。兄に忠実で、継承の儀に参加しているブーネワは彼しか知らないからだ。もしゾラージャジャが関わっていたのなら――コアナは妹を危険に晒した者を決して許さず、兄と呼ぶ資格すら失うと言い切る。さらに、バクージャジャだけでなく誘拐に加担した盗賊も罰せられるべきであり、父に頼んでランズガードを派遣し、この地の治安を正すつもりだと述べる。</p><p>ウクラマトは旅人の安全のための措置に同意しつつ、なぜ彼らが盗賊になったのかも考えるべきだと言う。掘り下げれば皆にとって良い道が見えるかもしれない。コアナは今後の課題として受け止めながらも、儀式は続くと告げ、あなたたちは再び前へ進む。クリルは、コアナが理性的で沈着なのに妹のこととなると様子が変わると評し、エレンヴィルは、以前のウクラマトなら要石を失えば立ち直れなかっただろうが、この旅とあなたの存在が彼女を強くしていると言う。ウクラマトは改めて謝り、今後は怪しい相手に油断しないと誓い、あなたたちの救出に心から礼を述べる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> コーナ <small class="muted">コザマル・カ (X:31.8, Y:25.5)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="feeding-the-river.html">エレンヴィルとプヌティー</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 92</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="historys-keepers.html">記憶の民、ヨカフイ族</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'拯救烏克·拉瑪特',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Koana 等得焦躁不安，直到 linkpearl 終於響起，他第一句就是驚呼你們找到她了嗎。聽完回報後，他低聲說自己只是提到 Thancred 的名字，事情就立刻有了轉機——Thancred 已經一路追著 Hoobigo 的船找到目的地，並確認他們確實把他妹妹囚禁起來。「他們」指的當然是 Bakool Ja Ja 和他的手下；Koana 咬牙發誓，一定要讓那些人後悔。Wuk Lamat 被關在 Richleaf tunnels，而一旦挽具修好，你們就要立刻把 punutiy 繫上，沿著 Ihuykatumu 往下趕回去。</p><p>你們趕到 Ihuykatumu 的 Richleaf tunnels 外，Koana 立刻和 Thancred 會合。Thancred 說第三誓約就在前方，人沒有受傷，但你們最好別再拖延。你們衝進隧道時，正好聽見 Bakool Ja Ja 破口大罵這些試煉有多可笑，還說用武力把那些「小飾品」直接搶走才更痛快。Wuk Lamat 怒吼要他把東西還來，因為那顆 keystone 是 Fonjeantaine 傾盡一切打造的成果；Bakool Ja Ja 卻反過來譏諷，笑她竟然讓那麼珍貴的東西被偷走，還把她當成掉進陷阱的可憐小貓嘲弄。</p><p>就在對方得意忘形時，Koana 從暗處出手，冷冷評一句那傢伙「鱗片厚得跟腦袋一樣」。被奇襲的 Bakool Ja Ja 立刻大罵卑鄙，Koana 卻回得更刺：這正是「受祝福的兄弟」最愛用的手段。Bakool Ja Ja 還惱怒地咒罵那個本該把你們耍得團團轉的 Boonewa 跟班失職；Koana 則若無其事地要他多說一點。對方又用「你可別打到人質」來威脅，眼看僵持要失控，Thancred 及時插入戰局，Koana 立刻喊 Lamaty’i 的名字確認她是否平安，而 Wuk Lamat 回答說她沒事，多虧你們趕到。</p><p>Bakool Ja Ja 的怒火瞬間爆開，嚷著要把你們全宰了；但另一個頭卻壓住他，說 keystone 已經到手，今天沒必要硬拚，而且 Zoraal Ja 先前也讓他們吃了苦頭。兩個頭當場爭執，一邊喊著要把你們剖開餵你們吃內臟，一邊逼他冷靜；最後理智那邊贏了——若在這裡倒下，就等於白白讓兄弟們的盤算落空。Bakool Ja Ja 咬牙下令撤退，Wuk Lamat 氣得追著罵，但 Koana 只說不追了：她平安才是最重要的。</p><p>你們回到 Many Fires，Koana 看見 Lamaty’i 沒受傷，終於鬆了一口氣。Wuk Lamat 一邊再次道謝，一邊也忍不住自責——她太大意、低估了 Bakool Ja Ja，結果丟了一顆 keystone。她說 Fonjeantaine 為了讓她完成 Moblins 的「壺之試煉」幾乎把人生都翻過來，還相信她、相信她的理念，可她卻辜負了那份信任。直到你提醒她競賽還沒結束，她才深吸一口氣說對，還沒完；下次再見到那傢伙，她要把他鱗片屁股打到趴下，親手把 keystone 搶回來。</p><p>Thancred 也提起一個細節：Bakool Ja Ja 看到你們時，咒罵過某個「沒用的 Boonewa 跟班」。Koana 推測那指的多半是 Sareel Ja——他效忠你們的哥哥，而且在參與繼承儀式的人裡，Koana 只知道他這一個 Boonewa。若 Zoraal Ja 真的也牽扯其中，Koana 立刻表態他絕不原諒任何把妹妹置於危險之中的人；那人也將失去被稱為「兄弟」的資格。他並補上一句，Bakool Ja Ja 當然該受懲罰，但那些膽敢綁走 Lamaty’i 的盜賊也一樣；他會請爸爸派 Landsguard（陸衛隊）來整肅這一帶的治安。</p><p>Wuk Lamat 同意需要措施保障旅人安全，但她也忍不住問：究竟是什麼把這些人推向盜賊之路？若能更深入追查，也許能找到讓所有人都過得更好的方法。Koana 說這確實值得思考，但眼下儀式還得繼續，他感謝你們所有人的幫忙。之後 Krile 低聲感嘆 Koana 平時冷靜理性，唯獨牽涉到 Wuk Lamat 的安危就完全不同；Erenville 也說，以前的 Wuk Lamat 失去 keystone 肯定會崩潰，但這趟旅程與你們的同行正在讓她變得更堅強。Wuk Lamat 再次道歉，說自己以後不會再對可疑的陌生人鬆懈，也真心感謝你們來救她。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>任務發布</b> 柯納哥 <small class="muted"> 克扎瑪烏卡濕地 (X:31.8, Y:25.5)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="feeding-the-river.html">艾倫維爾與海牛</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.92</div></div>`,

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
