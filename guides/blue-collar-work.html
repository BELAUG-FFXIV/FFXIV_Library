  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}

    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`Blue Collar Work`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>When you return to Martyn after learning Blood Drain, he immediately reads the reason for your visit. Before he can continue your training, however, a cluster of admirers rushes in and calls out not for Martyn, but for the Great Azuro. Caught up in the attention, he slips effortlessly into the role, delivering his grandiose speech with all the flourish his audience clearly craves. Only after the women leave delighted does he turn back to you, dropping the performance just long enough to admit that keeping the coin flowing now requires a little showmanship. Then he sends you to meet him at Spineless Basin, promising proper instruction there.</p><p>At Spineless Basin, Martyn explains why he chose the place. The area is plagued by especially vicious hornets, and he decides they will serve as suitable targets for your next lesson. They are dangerous enough to make the exercise worthwhile, but not so dangerous that you should be overwhelmed. What he wants now is simple: you are to use Blood Drain in actual battle and learn how drawing out an enemy’s aether can sustain further spellcasting. Even as he talks, Latool Ja cannot help remarking that whenever Martyn dons the mask and becomes the Great Azuro, the cheering crowds seem to love him far more than Latool Ja ever could. Still, for all his confusion over the strange voice and stranger persona, the training continues.</p><p>You put Martyn’s lesson into practice and deal with the hornet menace as instructed. When the fighting is done, a merchant steps forward in relief and gratitude, thanking the Great Azuro for removing the pest and handing over the promised payment. In that instant, the true shape of Martyn’s “training” becomes painfully clear. What was presented as instruction has also been turned into paid work, and Martyn, when confronted, defends himself without shame. You had a chance to sharpen your skills, the merchant got rid of a dangerous threat, and a few gil changed hands besides. As far as he is concerned, everyone benefits, and that is reason enough.</p><p>When you return to Ul’dah, Martyn meets you outside the Celestium and judges your progress with the eye of someone who is half mentor, half opportunist. He admits that you are improving, but insists you still need more variety in your magic before you can survive the arena. The pit fiends of the Masked Carnivale will not hold back, and one spell alone will not carry you through. With that in mind, he sets your next objective: you are to learn Mind Blast. Only then, he says, will your training be ready to continue.</p><p>Even so, he does not send you away empty-handed. After all his complaints and excuses, he still passes on your share of the money earned from the hornet hunt, though not without insisting that he has already deducted the appropriate training fees. It is a gesture that says much about him. Whatever else Martyn may be becoming beneath the mask of the Great Azuro, he remains thoroughly himself—always teaching, always scheming, and always making certain that no opportunity to profit slips through his fingers.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Martyn <small class="muted">(Ul’dah - Steps of Thal, X:12.5, Y:13.0)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="blue-leading-the-blue.html">Blue Leading the Blue</a></div><div class="row">BLU Lv. 10</div><div class="row"><b>Required Action</b> Blood Drain</div></div>`    followq:`<div class="stack"><div class="row"><a class="link" href="why-they-call-it-the-blues.html">Why They Call It the Blues</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'青は藍より出でて',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ブラッドドレインを修得したあなたがマーティンのもとを訪れると、彼はあなたが何をしに来たのかをすぐに見抜く。次の教えを授けようとした、その矢先だった。駆け寄ってきた女性たちは、マーティンではなく「グレート・アズーロ」を呼び求め、その決めぜりふをもう一度聞かせてほしいとはしゃぎ立てる。求められるまま、彼はたちまちその役になりきり、大げさな口上を堂々と披露する。歓声に包まれて彼女たちが去ったあと、彼はようやく素の調子に戻り、稼ぎを続けるにはこうした愛想も必要だとこぼしつつ、スピンレスベイスンで続きを教えるとあなたに告げる。</p><p>スピンレスベイスンで待っていたマーティンは、なぜここを訓練場所に選んだのかを説明する。このあたりには気性の荒いスズメバチが出没し、青魔法の練習相手にはうってつけなのだという。危険ではあるが、手に負えないほどではない。そこで彼は、実戦のなかでブラッドドレインを使い、相手のエーテルを引き出して次の魔法につなげる感覚を覚えろと指示する。そのかたわらでラトージャは、仮面をつけたマーティンがグレート・アズーロになると、観客は大喜びするのに、その声だけはどうにも奇妙だと首をかしげる。それでも、そんな違和感をよそに訓練は進んでいく。</p><p>あなたは言われたとおりにスズメバチを討ち、青魔法の使い方を実地で試してみせる。すると戦いが終わったあと、ひとりの商人が安堵した様子で現れ、厄介な害虫を追い払ってくれた礼として、約束どおりの報酬をグレート・アズーロへ差し出す。そこであなたはようやく気づく。今回の「訓練」は、腕を磨く場であると同時に、マーティンが金を稼ぐ仕事にもなっていたのだ。問いただされても、彼は悪びれもしない。あなたは技を磨けて、商人は危険を取り除けて、そこに報酬まで発生したのだから、何も問題はないという顔で話を片づけてしまう。</p><p>ウルダハへ戻ると、マーティンはセレスティウムの外であなたを待ち受け、これまでの成長を見定める。手応えは感じているようだが、闘技場に立つにはまだ手札が足りないと彼は言う。マスクカーニバルで相手を務める魔物たちは甘くはなく、ひとつの技だけで渡り合えるほどやさしくはない。だから次に必要なのは、より幅のある力だ。そうして彼は、新たな課題として「マインドブラスト」を修得してくるようあなたに命じる。それを覚えてこそ、次の段階へ進めるのだと。</p><p>もっとも、彼は何ひとつ与えずにあなたを帰すわけではない。散々理屈を並べたあとではあるが、スズメバチ退治で得た報酬の取り分をきちんとあなたに渡してくる。ただしもちろん、訓練費は差し引いたうえでだと彼は強調する。そのやり口には、いかにも彼らしさがにじんでいた。グレート・アズーロとして派手に振る舞おうと、師としてもっともらしく教えようと、その奥にいるマーティンは変わらない。人を導きながらも機を逃さず、どんな場面でもきっちり利益を拾っていく男のままだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> マーティン <small class="muted">（ウルダハ：ザル回廊, X:12.5, Y:13.0）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="blue-leading-the-blue.html">マスク・ザ・ブルー誕生</a></div><div class="row">青魔道士 Lv 10～</div><div class="row"><b>受注に必要なアクション</b> 吸血</div></div>`    followq:`<div class="stack"><div class="row"><a class="link" href="why-they-call-it-the-blues.html">青息吐息</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'青出於藍的差事',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>當你在學會 Blood Drain 之後回去找 Martyn，他幾乎一眼就看穿了你的來意。可他還來不及正式接著往下教，一群仰慕者便先一步湧了上來。她們呼喊的不是 Martyn，而是「Great Azuro」，還滿心期待地要他再說一次那句招牌台詞。Martyn 幾乎沒有遲疑，立刻切換成那副誇張又高調的模樣，當眾把整段登場宣言重新演了一遍。等那些人滿足地離開後，他才把語氣放回原樣，半是無奈半是熟練地表示，想讓錢繼續進帳，多少總得維持一下這種場面，接著便要你到 Spineless Basin 去，說到了那裡再繼續教你。</p><p>到了 Spineless Basin，Martyn 才說明他為何選中這個地方。這一帶有特別兇暴的 hornet，拿來當你練習 blue magic 的目標再適合不過。牠們確實危險，但又還不到你無法應付的地步。於是他要你在實戰裡施放 Blood Drain，親自體會從敵人體內抽取乙太，藉此支撐後續施法的感覺。旁邊的 Latool Ja 看著戴上面具後立刻變成 Great Azuro 的 Martyn，仍忍不住困惑地嘀咕：觀眾明明很吃這一套，可那個聲音怎麼聽都很奇怪，他還是比較喜歡沒戴面具時的 Martyn。儘管如此，該進行的訓練還是沒有停下。</p><p>你照著 Martyn 的安排擊退了那隻 hornet，也把剛學會的 blue magic 確實用在了戰鬥裡。事情結束後，一名商人鬆了一口氣，快步上前向 Great Azuro 道謝，還把事先說好的報酬交了出來。直到這一刻，你才真正看清 Martyn 所謂的「訓練」到底是怎麼回事。這不只是教學，同時也是他拿來賺錢的工作。面對你的反應，Martyn 卻一點也不心虛。在他看來，你得到了磨練，商人解決了麻煩，而他順手拿到一筆錢，整件事根本稱得上皆大歡喜。</p><p>回到 Ul’dah 之後，Martyn 在 Celestium 外頭等著你，像個半真半假的師父一樣檢視你的進展。他承認你確實有在進步，但也直言只靠現在這點本事，還不足以踏進競技場。Masked Carnivale 裡的 pit fiend 可不會手下留情，若只會少數幾招，到了裡面根本撐不住。因此，他替你訂下下一個明確的目標，去學會 Mind Blast。等你把那個也掌握之後，再回來找他，訓練才能真正往下一步推進。</p><p>不過，Martyn 倒也沒有讓你空手離開。雖然嘴上仍是那副精打細算的樣子，他最後還是把這次 hornet 討伐所得的一部分報酬分給了你，只是特別強調其中早已扣掉了訓練費。這樣的收尾，反而把他的性子表露得更清楚了。無論他如今披上 Great Azuro 的外衣變得多麼浮誇，在那張面具後面的 Martyn 依舊沒變，一邊教你前進，一邊盤算得失，無論什麼情況都不肯讓任何能變成收入的機會白白溜走。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Martyn <small class="muted">(烏爾達哈：薩爾回廊, X:12.5, Y:13.0)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="blue-leading-the-blue.html">戴著青魔面具現身</a></div><div class="row">青魔道士等級 10 以上</div><div class="row"><b>必須習得任務所需的招式</b> 吸血</div></div>`    followq:`<div class="stack"><div class="row"><a class="link" href="why-they-call-it-the-blues.html">青魔的難言之苦</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
