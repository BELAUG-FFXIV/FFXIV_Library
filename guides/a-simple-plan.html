  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;
  overflow-y:auto;
  padding-right:8px;
  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`A Simple Plan`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You listen as Minfilia lays out what you know: Iceheart used the aetheryte deep within Snowcloak to teleport a short distance west, likely to a sanctuary, where she means to summon Shiva with the crystals stolen from the House Fortemps caravan. The heretics call it their saint’s second coming, but if this is a summoning ritual like those used by the beast tribes, what answers may be closer to a primal than to any saint.</p><p>Minfilia makes it plain: they must be stopped—but before you can pursue, you must overcome the obstacle Iceheart left behind. Though you would ordinarily tap into the Aethernet and follow, you have been unable to determine the location of the aetheryte she teleported to, and the prevailing theory is that it was destroyed upon her arrival.</p><p>Because you lack the expertise to solve this, Minfilia tells you the Scions have called on a colleague from Sharlayan—an authority on aetheryte technologies—who is even now traveling to Revenant’s Toll and should arrive within the hour. Since you are here, Minfilia asks you to go with her to the northern gates and welcome her together.</p><p>As you wait, you hear the others react in their own ways—excitement, teasing, and talk of the “mark” that only proven expertise earns—while Minfilia admits she wonders what the newcomer is like, having only spoken via linkpearl.</p><p>When the Sharlayan scholar arrives, you stand with Minfilia as she welcomes Moenbryda to Revenant’s Toll and thanks her for coming on such short notice; Moenbryda answers that she could never say no to Urianger. Minfilia introduces her as an accomplished Sharlayan scholar, an authority on aetheryte technologies, and a crucial hand in your efforts to find a way to capture Ascian souls—before Moenbryda offers a brisk greeting of her own.</p><p>Back at the Rising Stones, Minfilia formally asks for everyone’s attention and invites Moenbryda to share her extensive knowledge—adding that she has overseen your research into white auracite, and has brought a sample with her. As the discussion turns to Iceheart’s missing aetheryte, Minfilia confirms: Iceheart did use the first aetheryte, but the second beacon cannot be found, and you suspect it was destroyed to impede pursuit. Moenbryda then proposes a single path forward—if the aetherial current still flows, you may recreate the beacon by forcing a surge of concentrated aether into the void it left—and she warns that the method is dangerous, yet says white auracite can channel what you give her, if infused immediately beforehand. With time short and Shiva’s summoning near, Minfilia accepts the risk and commits to Moenbryda’s plan.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Minfilia <small class="muted">(The Rising Stones, X:6.1, Y:5.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="in-flagrante-delicto.html">In Flagrante Delicto</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-instruments-of-our-deliverance.html">The Instruments of Our Deliverance</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'賢人ムーンブリダ',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたはミンフィリアから状況を改めて聞く。アイスハートは「氷結潜窟 スノークローク大氷壁」の最深部にあるエーテライトを用い、西方へ短距離転移した――おそらく何らかの「聖域」へ。そしてフォルタン伯爵家の隊商から強奪したクリスタルで、聖シヴァを降ろすつもりだという。異端者たちは守護聖人の再臨と信じているが、もし蛮族の召喚儀式と同種のものなら、その結果は「蛮神」に近いものとなる可能性が高い。</p><p>ミンフィリアは断言する。止めねばならない――だが、その前にアイスハートが残した障害を越えねばならない。通常であれば既存のエーテルネットワークに接続し追跡できるはずが、転移先のエーテライトの位置を特定できない。到着と同時に第二のエーテライトを破壊したのではないか、というのが有力な推測だ。</p><p>この問題についてウリエンジェと議論を重ねた末、暁は解決策を生み出す専門知識が不足していると結論づけた――だからこそ、その知識を持つ協力者をシャーレアンから招いたのだ、とミンフィリアは言う。彼女はレヴナンツトールへ向かっており、到着は一時間以内。あなたがここにいるなら、北門まで迎えに行こう、と。</p><p>待つあいだ、仲間たちの声が交わる。再会を待ちきれない期待、からかい半分の言葉、そして「確かな専門性を示した者だけが授かる印」に触れる忠告――ミンフィリアは、リンクパール越しに話しただけでは分からない、とその人物像を思う。</p><p>やがて、あなたはミンフィリアとともに新たな協力者を迎える。ミンフィリアはレヴナンツトールへようこそと告げ、急な要請にもかかわらず来てくれたことに礼を述べる。ムーンブリダはウリエンジェの頼みを断れるはずがないと笑い、ミンフィリアは彼女を「シャーレアンの学者で、エーテライト技術の権威」と紹介し、アシエンの魂を捉える手段を探るうえでも不可欠だったと伝える。</p><p>石の家へ戻ったあなたは、ミンフィリアの呼びかけでムーンブリダを正式に迎え、彼女がエーテライトの知見を共有すること、そしてホワイトオーラサイト――白聖石の研究を監督し、試料を持参したことを聞く。話題が「失われたエーテライト」に移ると、ミンフィリアは断言する。アイスハートは確かに最初のエーテライトを使った――しかし第二の標は見つからず、追跡を阻むため破壊された疑いが濃い。ムーンブリダは、もしエーテル流がまだ残っているなら、その流れを利用して標を再現できると言う。エーテライトは灯台のように方向を与え、標同士を結ぶエーテル流が導く――その残滓へ濃縮エーテルを叩き込み、空白を満たす。危険で、同様の転移は死者を出してきたが、白聖石でエーテルを導ける、と。時間がない以上、ミンフィリアはその策を採ると決める。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ミンフィリア <small class="muted">（石の家, X:6.1, Y:5.2）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="in-flagrante-delicto.html">写本師捕縛作戦</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-instruments-of-our-deliverance.html">氷神シヴァの輝き</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'賢人穆恩布瑞達',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你聽 Minfilia 重新把重點說清楚：Iceheart 在 Snowcloak 最深處使用以太水晶，往西方短距離傳送——很可能是某個「聖域」。她打算用從 House Fortemps 隊商奪走的水晶，召喚 Shiva。異端者以為那是守護聖人的再臨，但若他們要舉行的是蛮族那種召喚儀式，結果恐怕更接近 primal。</p><p>Minfilia 說得很直接：他們必須被阻止——而在追上去之前，你得先跨過 Iceheart 擺在路上的障礙。照理說，你們只要接入既有的以太網，就能循線追蹤；然而即使竭盡所能，你們仍無法查明她傳送去的那個以太水晶的位置。你們目前的主流推測是：她抵達後就把第二個以太水晶破壞了——魯莽又絕望，但確實有效。</p><p>Minfilia 告訴你，她與 Urianger 長談後得出的結論是：你們缺乏提出解法所需的專業，所以才向真正擁有這份專長的人求援——一位同伴，正從 Sharlayan 趕來 Revenant’s Toll，甚至應該一小時內就會到。既然你人在這裡，Minfilia 希望你能和她一起到北門迎接對方。</p><p>你跟著去等待時，周圍的反應各不相同：有人迫不及待想見面，有人半開玩笑，有人提醒別被外表牽著走——也有人提起那道「只有被證明具備專業的人才會得到的印記」。Minfilia 則坦白，她雖然透過 linkpearl 交流過，但仍忍不住想：對方究竟是什麼樣的人。</p><p>當那位 Sharlayan 學者抵達，你站在 Minfilia 身旁，看她向 Moenbryda 致意並道謝，謝她在如此短的時間內仍趕來。Moenbryda 直接笑說，她怎可能對 Urianger 說不。Minfilia 便向你說明：Moenbryda 是 Sharlayan 的學者，也是以太水晶技術的權威；而且她在你們尋找封存 Ascian 靈魂的方法時，一直扮演關鍵角色。</p><p>回到 Rising Stones，Minfilia 集中大家的注意力，正式請 Moenbryda 加入討論，讓她分享以太水晶相關的專業；她也明說，Moenbryda 一直在主持你們對「白聖石」的研究，並把樣本帶來了。當話題回到「失蹤的第二個以太水晶」，Minfilia 明確表示：Iceheart 確實使用了第一個以太水晶，但你們再怎麼分析都找不到第二個信標，因此懷疑異端者為了阻礙追擊而將其摧毀。Moenbryda 則告訴你：如果以太流仍在流動，就還有辦法——利用那股流動，把高度濃縮的以太導向信標留下的空缺，將它「填」回來。她解釋，以太水晶就像燈塔，能在穿越以太之海時讓你們重新凝聚形體；而信標之間本就存在引導方向的以太流。以太水晶被破壞後，這些以太流會逐漸消散，但只要還殘留哪怕遲滯的一絲流動，就可能被用來完成這件事。計畫危險，以往嘗試這種方式的人都死了；但她說，白聖石能用來引導你們提供的所有以太，只是它無法長時間留存，所以必須在行動前立刻灌注。時間緊迫、Shiva 的召喚迫在眉睫，Minfilia 最終決定：只要以太流仍在，就照 Moenbryda 的方案執行。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 敏菲利亞 <small class="muted"> 石之家 (X:6.1, Y:5.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="in-flagrante-delicto.html">捉拿現場</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-instruments-of-our-deliverance.html">冷若霜雪的冰神濕婆</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
