const i18n = {

    langLabel:'English',
    pageTitle:`The Mother of Exiles`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Thancred finds you again with a message from the Antecedent: you are to make for Vesper Bay at once, where young Alphinaud is waiting—impatiently, of course. Alphinaud was the one who asked for your help, though Thancred admits he knows only that some commotion or incident is involved. While you go to handle whatever Alphinaud has in mind, Thancred tells you he will hunt down the traitorous Brass Blade, promising that when he finds the fugitive, the answers will follow.</p><p>At Vesper Bay, Alphinaud wastes no time on pleasantries. You are late, he says, but it does not matter—he already knows where the visitors are headed. From what he has gathered, the ship in the bay belongs to Domans seeking an audience with the sultana. He confirms you know Doma in Othard, and reminds you that, like the rest of the eastern nations, it lies under the Garlean Empire’s rule. Their unannounced arrival and the condition of their vessel suggest they did not leave under favorable circumstances, and Alphinaud is keen to hear their story—especially anything they can tell him of the Empire’s current situation.</p><p>He insists this is an opportunity no one should waste, and he tells you to come with him to Ul’dah. Unless he is mistaken—and he is rarely mistaken—the Domans will be arguing with a Sultansworn on the Royal Promenade. When you hesitate, uncertain what role you are meant to play, Alphinaud answers briskly: insurance. If the visitors are not imperial agents, it is only fair to assume someone may be pursuing them—and if a diplomatic incident turns ugly, there is no one better than you to have close at hand. He adds, with practiced ease, that he enjoys your sparkling repartee, and then sends you ahead to meet him in Ul’dah.</p><p>On the Royal Promenade, you arrive to raised voices and hard refusal. Kasasagi and Kikyo demand entry, while Bartholomew stands firm: without the necessary permissions, no audience will be granted. The refugees plead urgency and beg him to summon a superior, but he drives them back all the same. Alphinaud appears at their side as the last warnings are exchanged, observing that their pleas have fallen on deaf ears. The refugee leader calls Bartholomew loyal but cold, and Alphinaud introduces himself as Alphinaud Leveilleur—at their service, a friend—and notes how few allies they have in Ul’dah. He urges them to join you and him at the Quicksand, where they can explain their situation in full and you can see what help is possible.</p><p>At the Quicksand, they are ready when you arrive. Their attendants speak of gratitude, exhaustion, and the hope that landfall will finally end their journey, and then Yugiri addresses you directly. She tells you she has crossed the sea from Doma seeking sanctuary. Doma, she explains, lay under the Garlean Empire’s dominion. When a war of succession broke out in Garlemald, they seized what they thought was a chance to throw off imperial oppression and rose in rebellion—only to be crushed. Doma is gone, razed to the ground as an example, and those who escaped are anchored in Vesper Bay on a ship flying borrowed colors. Many are complicit in the uprising or kin to those who were, so they will not come ashore until Yugiri sends word that it is safe. She sought an audience and was refused, yet their supplies are running low and the young are in urgent need of care. Alphinaud acknowledges that Ul’dah’s rulers rarely entertain foreign refugees without suitable encouragement, but he tells Yugiri he will see that she is given a chance to plead her case. When he remarks that her attire may evoke mistrust, Yugiri answers that people fear what is unfamiliar, and that they dress so only to spare Ul’dah unnecessary disquiet. Alphinaud accepts her judgment, then leaves, saying he has urgent business with the Flame General and placing the guests in your hands.</p><p>Once Alphinaud is gone, the Domans’ need becomes immediate and plain. Kasasagi and Kikyo thank you again, speaking of Yugiri’s tireless labor and their worry for her health, and Yugiri asks—quietly, without embellishment—for provisions. They have been at sea for moons, their supplies are nearly spent, and while adults can go without, the children cannot. When you speak to Momodi, she curses your delay only because it kept her from helping sooner. By sheer luck, she says, a wealthy merchant’s banquet has been canceled, leaving her with a vast amount of food already paid for in advance. She orders you to go to Fridurih and Katherine at the Sapphire Avenue Exchange and have the “little prince’s” order shipped to the Waking Sands, giving you letters to silence any objections. Fridurih and Katherine grumble about feeding refugees and warn against encouraging expectations, but the shipment is arranged, and Momodi tells you to inform Yugiri that it is all in hand. Yugiri answers with disbelief and gratitude, promising to thank Momodi with due humility.</p><p>Alphinaud returns with news that shifts the refugees from pleading to preparation: he has briefed the Flame General, and the reply should please them. An audience has been granted—before both the sultana and the Syndicate—and they must return to the Royal Promenade at once. Yugiri offers to repay Alphinaud’s kindness, but he insists nothing is owed; she won this small favor with her words, and it is with words she must win the Syndicate’s favor. He asks you to accompany them, saying your presence may remind the Syndicate of the true meaning of philanthropy, and also that nothing so “unpalatable” will be required—provided the Domans are willing to earn their keep. On the way, he emphasizes that they must frame acceptance as a benefit to Ul’dah if they want to sway the Syndicate. Teledji Adeledji arrives to greet the visitors and declares his support, boasting that birthplace does not equate to birthright and pointing to his establishments as proof. Raubahn then joins you, saying the others are already inside, and leads the group onward.</p><p>Within the Fragrant Chamber, Yugiri finally stands before Nanamo Ul Namo and the assembled power of Ul’dah, presenting herself not with treasures but as a pauper in dire need, asking asylum for her people. Nanamo welcomes her and asks her to recount her misfortune again for all present. Yugiri repeats the history: years under imperial rule, a yearning for freedom, the war of succession in Garlemald, a rebellion crushed in brutal fashion, and Doma razed as an example. Raubahn asks how many survived, and Yugiri answers that more than two hundred souls are crammed into their galleon’s hold—only one ship among several that escaped the purge. She asks that all be allowed within the city walls if possible, or as many as Ul’dah’s resources allow if not, and she offers terms rather than a mere boon: the Domans will serve as soldiers or tradesmen until their debt is repaid. Teledji calls it a marvelous idea, eager to put industrious refugees to work restoring the city, and Alphinaud notes bluntly that the head of the Mirage Trust sees profit in it. Lolorito answers with “the law is the law,” and then tears into the proposal: Ul’dah’s streets are already choked with victims of the Calamity and Ala Mhigan refugees, the cost of aid grows ever higher, wealth is not limitless, and the displaced are prone to violence and crime. Nanamo argues that the sultanate can support a few hundred and moves that an exception be made, but Lolorito turns her own words against her, recalling the earlier debate over Ala Mhigan refugees and the decision to leave them in Little Ala Mhigo. The vote is called, and when it ends, Nanamo admits regretfully that without the Syndicate’s consent, she cannot act. Yugiri accepts the decision with composure and gratitude for what was tried. Teledji rages at Lolorito and apologizes to the Domans, while Raubahn observes that now the Empire poses no immediate threat, the pretense of unity is slipping—especially among the Monetarists—and says this is neither the time nor place to pursue that broader conflict.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'異邦からの来訪者',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>サンクレッドは先触れからの伝言を告げる。あなたはベスパーベイへ向かえ、そこでアルフィノが首を長くして待っているという。助力を求めたのはアルフィノ本人だが、騒動か事件があったらしいこと以外、サンクレッドは詳しい事情を知らない。あなたがアルフィノの用件を片づけるあいだ、サンクレッドは逃亡したブラスブレードの裏切り者を追うと断言し、捕まえさえすれば答えは出る、と言い残す。</p><p>ベスパーベイでアルフィノは開口一番に遅いと告げる。だが問題はない、来訪者の行き先は把握しているという。湾に停泊する船はドマから来た一団のものらしく、スルタンへの謁見を求めている。あなたにオサードのドマを知っているかと確かめ、東方の諸国と同じくガレマール帝国の支配下にあると説明する。予告なき来航と船の有様から、彼らが良い事情で故郷を離れたとは思えない。ゆえに彼らの話、とりわけ帝国の現状に関する情報に、アルフィノは強い関心を示す。</p><p>この機会を逃すのは愚かだ、とアルフィノはあなたをウルダハへ誘う。自分の見立てが誤りでなければ、ドマの者たちはロイヤルプロムナードでスルタン親衛隊と言い争っているはずだという。あなたが自分の役割に迷うと、アルフィノは「保険」だと言い切る。彼らが帝国の密偵でないなら、誰かに追われている可能性は高い。不測の外交的騒乱が起きたとき、あなたほど頼りになる者はいないのだから、と。さらに彼は、あなたの切れ味ある応酬を楽しんでいると付け加え、ウルダハで合流しようと告げる。</p><p>ロイヤルプロムナードでは、カササギとキキョウが門前で激しく抗議し、親衛隊のバルトロメウは必要な許可がない限り通さないと突っぱねていた。難民の代表は上官を呼べと懇願し、時間がないと訴えるが、拒絶は変わらない。そこへアルフィノが現れ、嘆願が届かなかったようだと見て取り、代表は冷酷だが忠実な男だと言い捨てる。アルフィノは自らをアルフィノ・ルヴェユールと名乗り、友として手を差し伸べる。ウルダハで味方は少ないだろう、だからこそ必要だと言い、あなたとともにクイックサンドへ来て事情を話してほしい、できることがあるか確かめよう、と促す。</p><p>クイックサンドで一行はあなたを待っていた。付き添いは助力への感謝と疲労、長い航海が終わることへの願いを口にし、やがてユウギリが語り始める。彼女はドマから海を越え、この地に庇護を求めて来た。ドマはガレマール帝国の支配下にあり、ガレマルドで継承戦争が起きたとき、圧政から解放される機会と見て蜂起したが、あえなく鎮圧された。ドマは他の属州への見せしめとして焼き払われ、彼女は生き残った者たちを率いてここへ辿り着いた。仲間たちはベスパーベイに停泊する船で偽装した旗を掲げている。反乱に関わった者やその縁者が多く、安全が確認できるまで上陸させない。謁見は拒まれ、物資は尽きかけ、幼い者には急を要する手当てが必要だという。アルフィノは、ウルダハの権力者は見返りなしに外国の難民を受け入れないと認めつつも、弁明の機会は用意すると約束する。彼女の装いが不信を招きかねないと述べると、ユウギリは異質なものを恐れるのが人だと答え、不要な動揺を避けるためだと言う。アルフィノは理解を示し、炎軍大元帥へ急ぎの用があるとして、客人をあなたに託す。</p><p>アルフィノが去ると、必要はさらに切実になる。カササギとキキョウは重ねて礼を述べ、昼夜を分かたず民のために尽くすユウギリの健康を案じる。ユウギリは数か月に及ぶ航海で物資が底を突いたと告げ、子どもたちのために食料を分けてほしいと頼む。あなたがモモディに相談すると、彼女はなぜ早く言わなかったと笑い飛ばし、ちょうど金持ち商人の宴席が取りやめになって大量の食料が余っている、しかも代金は前払い済みだと言う。サファイアアベニュー国際市場のフリドゥリヒとキャサリンに会い、「若様」の注文を砂の家へ送るよう伝えろ、文句が出たら手紙を見せろ、と指示する。二人は難民に施すことへ不満を漏らすが、手配は整い、モモディはユウギリへ「すべて手配した」と伝えるよう促す。ユウギリは驚きと感謝を隠せず、モモディの厚意に深く礼を述べると誓う。</p><p>アルフィノが戻り、炎軍大元帥へ事情を伝えた結果を告げる。スルタンと十二評議会の双方の前での謁見が許された。すぐにロイヤルプロムナードへ戻るべきだという。ユウギリは恩を返すと誓うが、アルフィノは与えたのではなく、言葉で勝ち取ったのだと言い、十二評議会の支持も言葉で得ねばならないと諭す。あなたにも同行を求め、真の慈善とは何かを思い出させる役目になるだろう、そしてドマの者たちが働く意志を示すなら、誰にも不快な負担は強いないのだと強調する。道中、受け入れがウルダハの利益になると示してこそ十二評議会は動く、と釘を刺す。テレジ・アデレジが先に現れ、出自は権利を決めないと支持を表明し、自らの店が異邦人の才を示す場だと誇示する。ラウバーンが合流し、すでに他の者は中にいる、待たせるなと一行を導く。</p><p>芳香の間で、ユウギリはナナモ・ウル・ナモの前に立ち、宝ではなく、窮乏する者として庇護を願い出る。ナナモは彼女を迎え、他の者のためにも不幸を語り直してほしいと求める。ユウギリは長年の帝国支配、自由への渇望、継承戦争の混乱に乗じた蜂起、そして残酷な鎮圧を語り、ドマが見せしめとして焼かれたと告げる。生存者の数を問われ、二百余名がガレオン船の船倉に身を寄せていると答える。可能なら城壁の内に住まわせ、難しいなら資源の許す限り受け入れてほしい。そして施しではなく取り決めとして、兵や職人として働き、借りを返すと申し出る。テレジは勤勉さを評価し、復興の労働力になると賛同するが、アルフィノはミラージュ財団総帥が利益を見ているだけだと指摘する。ロロリトは「法は法」と述べ、災厄の被災者やアラミゴ難民で街は溢れ、援助の費用は増し続け、ウルダハの富にも限りがあると断じる。難民は暴力や犯罪に傾きやすい、とも。ナナモは数百人なら支えられるとして例外を提案するが、ロロリトは過去にアラミゴ難民をリトルアラミゴに留め置いた際の言葉を引き合いに出し、どの法を曲げるのかと迫る。採決が行われ、ナナモは十二評議会の同意がなければ動けないと悔しさを滲ませる。ユウギリは理解を示し、尽力への感謝を述べる。テレジは憤りと謝罪を口にし、ラウバーンは帝国の脅威が遠のいた今、団結の仮面は剝がれ、特にマネタリストが反抗的だと語りつつ、今はその議論の場ではないと締めくくる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> サンクレッド <small class="muted">（西ザナラーン, X:22.6, Y:17.0）</small></div></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>Thancred 找上你，帶來 Antecedent （Minfilia 的頭銜也就是「Scions of the Seventh Dawn」的領袖）的指示：立刻前往 Vesper Bay，年輕的 Alphinaud 正在那裡等你，而且等得很不耐煩。這次請你出面的是 Alphinaud，但 Thancred 也只知道那邊似乎出了某種騷動或事件，細節他並不清楚。你去處理 Alphinaud 要你協助的事，而他則會繼續追查那名逃走的 Brass Blades（Ul’dah 的治安部隊／傭兵警備組織，負責城邦周邊的巡邏、維安、盤查、逮捕、調查等工作） 內鬼；他篤定地說，只要把人抓到，你們就能得到想要的答案。</p><p>你抵達 Vesper Bay 時，Alphinaud 先冷冷指出你來遲了，隨即又說無妨——他已經掌握訪客的去向。從他蒐集到的情報看來，停泊在灣內的船屬於一群來自 Doma 的人，他們要向求見 Sultana（Ul’dah 的女性君主頭銜；此處指 Nanamo Ul Namo，男性君主稱之為Sulta）。你當然知道 Doma 位於 Othard，而那片東方大陸的諸國，如今皆在 Garlean Empire 的統治之下。這些人不告而來、船況又狼狽，讓 Alphinaud 懷疑他們並非在「好時機」離開故土；他更在意的是，他們的經歷，以及他們是否知道 Garlean Empire 目前的局勢——那可能非常有用。</p><p>Alphinaud 認為這是不能放過的機會，催你和他一起前往 Ul’dah。除非他判斷錯誤——而他很少判斷錯——你們會在 Royal Promenade 看見 Doma 的人正和一名 Sultansworn 爭執。你若對自己的角色感到不確定，他直接回答：保險。若這些訪客不是帝國的密探，那就合理推測他們可能正被某些人追捕；而一旦出現突發的外交衝突，把你留在現場最合適。最後他還補上一句，你的回應總是很有趣，然後就要你去 Ul’dah 與他會合。</p><p>Royal Promenade 上，吵鬧聲早已堆成一團緊繃。Kasasagi 與 Kikyo 斥責對方無禮，硬是要求進入；Bartholomew 則反覆強調，沒有必要的許可，誰也別想求見。難民的領袖一再懇求他召來上級，說情勢迫切、沒有時間走完正式流程，但 Bartholomew 仍然把他們驅離。就在「再也不聽」的拒絕落下時，Alphinaud 走近，淡淡一句「看來你們的請求沒有被聽見」。領袖冷冷評語那人忠誠卻冷酷，而 Alphinaud 自報姓名，說自己是 Alphinaud Leveilleur——朋友，並直言在 Ul’dah 你們的盟友少得可憐，可若想在這裡立足，盟友卻又不可或缺。他請他們與你一同前往 The Quicksand，在那裡把情況說清楚，看看是否有你們能做的事。</p><p>在 The Quicksand，對方早已等著你。隨行的人說你們能伸出援手，他們將感激不盡；也說他們太久沒踏上陸地，只希望這代表旅程終於要結束。接著，Yugiri 開口，表明他們跨越數千里海路自 Doma 而來，只為在這片土地尋求庇護。Doma 位於 Othard，長年受 Garlean Empire 支配。當 Garlemald 爆發繼承戰爭時，他們以為抓住了解放的機會，起而反抗——卻被徹底鎮壓。Yugiri 說 Doma 已不復存在，被夷為平地，用來警告其他屬地；她帶著少數倖存者逃到此地。她的人仍在 Vesper Bay 停泊的船上，掛著借來的旗色；許多人參與過叛亂，或與叛亂者有親屬關係，因此她不會讓人上岸，直到她確認安全。她曾試圖求見這裡的統治者，卻被直接拒絕；而眼下物資已近枯竭，孩子更急需照顧。Alphinaud 直言 Ul’dah 的權勢者不會無條件接納外來難民，但他承諾會替她爭取陳情的機會。當他提到她的裝束可能引發不信任，Yugiri 回答，人們總會害怕陌生；他們只是想避免讓 Ul’dah 的人感到不安。Alphinaud 表示理解，並說自己得立刻去找 Flame General，於是把客人交由你照看。</p><p>Alphinaud 離開後，需求立刻變得更具體、更尖銳。Kasasagi 與 Kikyo 再次道謝，提到 Yugiri 日夜為族人操勞，是眾人的支柱，卻也讓人擔心她的身體。Yugiri 沒有多說苦難，只請你聽見眼前的急迫：他們在海上漂泊多月，補給幾乎耗盡；大人可以撐，但孩子不行。你去找 Momodi 求助時，她先罵你怎麼不早說，卻也立刻拍板會幫忙——更巧的是，原本預定要在這裡設宴的富商突然取消，留下大量食材，而且款項早已付清。她要你去 Sapphire Avenue Exchange 找 Fridurih 與 Katherine，請他們把「little prince」那批貨改送到 The Waking Sands；若對方推託，就拿她的信件壓下去。Fridurih 與 Katherine 對「餵難民」滿腹牢騷，甚至說不該鼓勵這種事，但貨終究安排妥當。回到 Momodi 那裡，她要你轉告 Yugiri 一切已處理好；Yugiri 聽見後幾乎不敢相信，低聲說自己從未奢望能得到這樣的慷慨，並表示一定會親自向 Momodi 致謝。</p><p>不久後 Alphinaud 回來了，帶著更關鍵的進展：他已向 Flame General 說明情況，而回覆會讓你們滿意。Yugiri 問是否終於獲准求見，他回答是——而且是同時在 sultana 與 Syndicate 面前。他要你們立刻回到 Royal Promenade。Yugiri 表示欠下大恩，Alphinaud 卻說自己並未「給」什麼，這是她用言語爭取到的，而接下來也必須用言語爭取 Syndicate（Ul’dah 掌握權勢與資源的財閥高層）的支持。你必須同行，他說，你的存在能提醒 Syndicate 何謂真正的慈善，也能讓他們明白——只要 Doma 的人願意自食其力，Ul’dah 不需要承擔任何「令人反感」的負擔。路上他再次強調：必須讓 Syndicate 看見「接納能帶來的好處」，才可能被說服。這時 Teledji Adeledji 出面迎接，宣稱自己支持他們，說出生地不等於天賦權利，並以自己的產業為例，誇口其中某處更是匯聚異邦才華的展示場。Raubahn 接著到來，說其他人已在內室等候，別再耽擱，便領你們進去。</p><p>在 The Fragrant Chamber，Yugiri 終於面對 Nanamo Ul Namo 與 Ul’dah 的權力核心。她不再以禮物開場，只以貧者之身請求援助，懇求讓族人獲得庇護。Nanamo 表示歡迎她的到來，並要她再把不幸重述一次，讓在場所有人都能聽見。Yugiri 重新說起 Doma 的歲月：長年帝國枷鎖下的痛苦、對自由的渴望、Garlemald 的繼承戰爭所帶來的混亂與希望、以及隨後的殘酷鎮壓；她直言 Doma 已被夷平，成為對其他屬地的警告。Raubahn 追問倖存者有多少，她回答僅一艘加里恩船的船艙內就擠著兩百多人，而那還只是逃過清洗的多艘船之一。她希望能讓所有人住進城中；若做不到，也請在資源允許範圍內盡量收容。她強調這不是單方面乞求施捨，而是一份安排：他們願意作為士兵或工匠服務，直到償還所欠。</p><p>Teledji Adeledji 立刻稱讚這主意，說若他們肯工作，城中尚未修復之處正需要人手；Alphinaud 則冷冷指出，Mirage Trust 的掌權者從不以慷慨聞名，他看見的是利潤。Lolorito 只說一句「法律就是法律」，隨即提出反對：街頭早已塞滿 Calamity 的流離者與 Ala Mhigan 難民，他們靠 Immortal Flames 的援助勉強維生，成本愈來愈高；Ul’dah 的財富並非無窮，難民又容易走向暴力與犯罪，沒有家與工作的人遲早會絕望而奪取他們認為被剝奪的東西——在明知如此的情況下，你們還要讓問題更嚴重嗎？Nanamo 認為數百名 Doma 難民並不至於壓垮國力，提出應該特例處理；Lolorito 卻翻出過往關於 Ala Mhigan 難民的辯論，用她當年那句「法律就是法律」反問她打算破哪一條法。</p><p>投票很快被要求進行，結果卻讓 Nanamo 只能遺憾承認：沒有 Syndicate 的同意，她無法行動。Yugiri 表示理解，也感謝他們曾為此努力。Teledji Adeledji 氣急敗壞地咒罵並向難民致歉；Raubahn 則直言，如今帝國不再構成立刻威脅，有些人便不再維持團結的假象，尤其是 Monetarists (指 Ul’dah 的兩大政治派系之一，與支持 sultana 的 Royalists 對立；其核心成員多為 Syndicate 內掌握財富與實權的商業巨頭，主張以利益與資本為優先、強化 Syndicate 的主導權，因此在難民、救濟與治安等議題上往往更傾向「成本／風險」的計算。 )近來更為跋扈，但他也同時表明，這不是現在該談的事。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 桑克瑞德 <small class="muted"> 西薩納蘭（X:22.6, Y:17.0)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-final-temptation.html">水晶失竊事件</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="promises-to-keep.html">安身之處</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
