<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unsolved Mystery | BELAUG · FFXIV Library</title>
  <meta name="description" content="MSQ – Unsolved Mystery (ARR Patch 2.0)">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:1px solid transparent;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border-color:var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Unsolved Mystery',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>At Camp Drybone, you meet with Isembard, who wastes no time getting to the heart of the matter. Minfilia has named the Amalj’aa as the likely culprits behind the disappearances, and he urges you to begin your investigation with them. So much suffering has already been dealt to these lands by Amalj’aa hands, he says—the Immortal Flames do what they can, but their watchful fires cannot banish the darkness everywhere at once. Recently, there have even been brutal murders of callers at the Church of Saint Adama Landama, innocents who wished only to pay their respects to the dead. The victims deserve a proper burial, yet Isembard does not know if the Amalj’aa still lurk nearby, and he cannot in good conscience send anyone less capable. He asks you to go in his stead, to secure the remains lying along the eastern road before beasts or worse get to them, and adds that, with the Twelve’s blessing, you might learn something of what the Amalj’aa seek in this area.</p>
      <p>You set out from Camp Drybone and follow the eastern road through the dusty stretches of Drybone, the Church of Saint Adama Landama looming somewhere ahead. Before long, you come upon the scattered bodies of those who were slain on their way to the church, their final journey cut short on the roadside. As you move to recover the remains, a chill crawls up your spine—you sense a hostile presence drawing near. Amalj’aa warriors emerge to strike at you, but you stand your ground, cut them down, and drive away any threat that might disturb the fallen. With the danger quelled, you gather the remains with care, determined to see them safely returned.</p>
      <p>Back at Camp Drybone, Isembard greets you with visible relief and asks if you were able to secure the bodies. When you confirm the task is done, he bows his head in gratitude. With the remains returned, he says, the poor souls can at last be committed properly to the earth and guided across to the other side. He thanks you earnestly, calling your work that day a noble deed and clearly moved that someone has seen dignity restored to the dead.</p>
      <p>Only then does he press you for details about what you found on the road. Surely, he reasons, such massive monstrosities as the Amalj’aa cannot easily conceal themselves, much less take their prey unawares. When you tell him that Amalj’aa were indeed still lingering in the area, the confirmation darkens his expression; it is just as he feared. Their involvement in the disappearances of the lowborn is now all but certain—but the numbers still do not add up. A few raiding parties could not account for so many missing people. The total is too great, the circumstances too strange. That can only mean another hand is at work. With countless travelers passing through Drybone each day, Isembard wonders aloud how you might possibly uncover who among them is complicit in these vanishings, his suspicions growing even as answers remain out of reach.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Isembard <small class="muted">Eastern Thanalan – Camp Drybone (X:13.9, Y:23.6)</small></div>

  JP:{
    langLabel:'日本語',
    pageTitle:'干からびた骨',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>キャンプ・ドライボーンで、あなたはイセムバードと向かい合い、すぐさま本題へと入ることになる。ミンフィリアは、行方不明事件の首謀者としてアマルジャ族の名を挙げており、まずは奴らの動向を探るべきだとイセムバードは告げる。これまでも幾度となく、この地はアマルジャ族の手によって大きな被害を受けてきた。不滅隊が火の手を上げて警戒にあたってはいるものの、その光も、すべての闇を常に払い続けられるわけではないのだという。最近では、聖アダマ・ランダマ教会へ向かう信徒が、道中で惨たらしく殺害される事件まで起きている。死者は本来、静かに眠るべき存在だと語るイセムバードは、せめて遺体だけでもきちんと埋葬してやりたいと願いながらも、周囲にまだアマルジャ族が潜んでいるかもしれない以上、誰かを軽々しく送り出すことはできないと肩を落とす。そこで彼は、信頼のおけるあなたに、東の街道沿いに横たわる遺体の回収を託すことにする。うまくいけば、この一帯でアマルジャ族が何を狙っているのか、その手がかりも得られるかもしれないと。</p>
      <p>あなたはキャンプ・ドライボーンを後にし、乾いた風が吹き抜けるドライボーンの東の街道を進んでいく。その先には、聖アダマ・ランダマ教会へと続く道が伸びているはずだ。やがて、道端に横たわる遺体の姿が目に入る。教会へ向かう途上で命を奪われ、そのまま打ち捨てられた者たちなのだろう。静かに遺体へ歩み寄ったそのとき、背筋に冷たい気配が走る。敵意を帯びた存在が近づいているのを、はっきりと感じ取るのだ。現れたのは、やはりアマルジャ族の戦士たちだった。彼らは、なおもこの道を脅かし、死者さえ穢そうとしていたのである。あなたは武器を構え、襲いかかる敵を退けていく。やがて周囲の危険を一掃し終えると、静寂の戻った街道で、ひとりひとりの遺体を丁寧に収容し、彼らをしかるべき場所へ送り届ける決意を新たにするのだった。</p>
      <p>キャンプ・ドライボーンへ戻ると、イセムバードは安堵の表情を浮かべてあなたを出迎え、無事に遺体を回収できたかどうかを問いかけてくる。あなたが任務の完了を伝えると、彼は深くうなずき、感謝の言葉を口にする。遺体を土へと還すことさえ叶えば、さまよえる魂も、ようやく彼岸へと歩み出すことができるだろう……そう語る彼の声には、死者への敬意と、あなたの働きへの称賛がにじんでいた。この日あなたが成し遂げた行いは、まさしく高潔な善行だと、イセムバードは心からの礼を告げる。</p>
      <p>そして彼は改めて、道中で何を見たのかを問い質す。あれほど巨大で異形のアマルジャ族が、気づかれずに近づき、獲物を不意打ちできるとは考えにくいはずだ、と。あなたが、東の街道にアマルジャ族が残っており、実際に襲撃を受けたことを伝えると、イセムバードの表情はいっそう険しさを増す。やはり、アマルジャ族が行方不明事件に関わっている可能性は高い──その確信は強まったものの、それだけでは説明のつかない点が残るのだという。たまに現れる襲撃隊だけで、これほど多くの人々が姿を消すとは考えにくい。被害の規模も、状況の不自然さも、あまりに大きすぎるのだ。つまり、この背後には、別の「手」があるのではないか。ドライボーンには日々、数え切れないほど多くの旅人が行き交っている。その中から、誰が事件に関わっているのかを見抜くなど、どうやって成し遂げればいいのか──イセムバードはそう自問しながら、疑念ばかりが積み重なっていく現状に、重い溜息を落とすのだった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> イセムバード <small class="muted">東ザナラーン：キャンプ・ドライボーン (X:13.9, Y:23.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="a-wild-rose-by-any-other-name.html">キャンプ・ドライボーンへ</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 17～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="what-poor-people-think.html">貧しき者の考え</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'背後的同謀',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Camp Drybone，你與 Isembard 見面，他開門見山地把狀況說得一清二楚。Minfilia 已經指出 Amalj’aa 很可能就是這一連串失蹤事件的元兇，因此他希望你首先從他們下手調查。Isembard 提到，這片土地早已多次遭受 Amalj’aa 的蹂躪，Immortal Flames 雖然在各處巡守、點起象徵警戒的火光，卻無法時刻照亮所有角落。最近，甚至連前往 Church of Saint Adama Landama 祭拜亡者的信徒，也在半路慘遭殺害。那些只是想向死者致意的普通人，如今卻連安眠之所都沒有。Isembard 認為，至少應該讓遺體能被好好埋葬，但他並不確定 Amalj’aa 是否仍在附近徘徊，實在無法安心派出一般人，只好請你代為出面。東側的道路上散落著被害者的遺體，他希望你能在野獸或其他東西先找到之前，將那些遺體帶回來。若能如此，說不定也能從中看出 Amalj’aa 在這一帶究竟在追尋什麼。</p>
      <p>你從 Camp Drybone 出發，沿著東邊的道路行進，穿過乾燥荒涼的 Drybone，一路朝著 Church of Saint Adama Landama 的方向前進。不久後，你便在路旁看見橫陳的屍體——那些原本只是想前往教會致敬的人們，卻在途中遭到襲擊，只能孤零零地倒臥在道路邊緣。當你走近準備收回遺體時，一股令人不寒而慄的壓迫感突然襲來，你清楚察覺到敵意正在逼近。果不其然，一隊 Amalj’aa 戰士從陰影中現身，意圖在此肆虐，甚至連死者都不願放過。你立刻拔出武器迎戰，將撲上前的敵人一一擊退，徹底驅散盤踞在道路周圍的威脅。待四周重新恢復寂靜後，你才重新回到那些遺體身旁，小心翼翼地將他們收好，下定決心要親手把他們送回該去的地方，讓這趟被打斷的旅程能有個終點。</p>
      <p>當你再次踏入 Camp Drybone 時，Isembard 立刻上前迎接，臉上的表情明顯鬆了一口氣。他詢問你是否順利帶回那些遺體，而在聽見你完成任務的回報後，他由衷點頭致謝。只要能讓遺體重新回歸大地，徬徨的靈魂就有機會踏上前往彼岸的道路——Isembard 如此說著，語氣裡充滿對亡者的尊重，也對你的行動抱以高度肯定。他坦言，今天你所做的一切，是一件相當高尚而重要的善行，並再次向你表達深深的感激。</p>
      <p>隨後，他把話題拉回你在路上的所見所聞。照理說，Amalj’aa 這樣龐大又異樣的種族，本來就不可能悄無聲息地逼近獵物，更不應該能在不被察覺的情況下出手。當你說起自己在東邊道路上遭到 Amalj’aa 伏擊的經過時，Isembard 的神情明顯沉了下來──這樣一來，Amalj’aa 參與低階民眾失蹤事件的可能性幾乎可以確定，但仍有許多地方說不通。偶爾出現的襲擊隊，根本不足以解釋如今這種失蹤人數；整體規模實在太大，細節也太過詭異。換句話說，在這一切的背後，很可能還有另一隻「看不見的手」存在。每天都有無數旅人來往 Drybone，要在這樣的人群之中找出真正涉案的人，究竟該從何下手？Isembard 只能一邊思索，一邊看著眼前熙來攘往的營地，感覺疑點愈來愈多，答案卻一點也沒有浮現。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 伊桑巴德 <small class="muted"> 東薩納蘭 (X:13.9, Y:23.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="a-wild-rose-by-any-other-name.html">前往枯骨營地</a></div>
      <div class="row">所有職業（不含限定職） 等級 17 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="what-poor-people-think.html">窮人的想法</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
