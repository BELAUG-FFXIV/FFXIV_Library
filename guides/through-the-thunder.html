const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`Through the Thunder`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>After so many meetings and partings, Y’shtola admits it’s rare to have the time to say good-bye properly—and she’s glad you took it. G’raha Tia adds that while he loves traveling with others, solitary journeys have their own charm, and sea travel is a kind of peace. Sphene turns practical: with Alphinaud and Alisaie carrying word of Alexandria to other nations, diplomacy will come soon, and she must prepare to treat with their leaders. Shale is simply relieved she got to see him off—Cahciua would have been glad, too.</p><p>Krile then suggests you move your discussion away from the docks before you start getting in the workers’ way. The group slips to the shore at Gornitruq Gleamsands, where Sphene can’t help but pause at the beauty of Tural. Shale looks out over the ocean and sky and confesses she still struggles to imagine what lies beyond the horizon—more lands, more people—yet Krile gently reminds her that, in truth, you’re proof that “beyond the horizon” is real.</p><p>That thought lands harder for Krile than she expects. She says it has taken time to truly accept that she wasn’t born in the land where she spent most of her life, and it wasn’t until she met her parents in Living Memory that her origin began to feel real. Sphene understands too well—when she first awoke, the realm everyone described sounded nothing like the Alexandria she knew, and only by walking its streets and breathing its air could she accept the world she’d woken into.</p><p>Krile admits what she needs next: to learn more about the Milalla. Studying the key may reveal more, but Shale’s work in Containment Complex 10-29 is still ongoing, so Krile asks whether you might pursue a different path into the Ninth’s history. G’raha Tia and Y’shtola agree at once—anything you learn will deepen the broader picture, and Y’shtola’s curiosity reaches beyond merely measuring Ascian influence.</p><p>Sphene offers a place to begin. She explains that Alexandria once belonged to the Mist Continent, and that after the Storm Surge left the continent in ruins, Alexandria was the sole nation to survive. G’raha Tia recalls what you learned from the Underkeep: wars between nations were destructive, but levin delivered the final blow. Sphene’s voice turns heavy as she remembers the chaos in the castle town—how she, Otis, and the royal knights tried to evacuate people by airship, and how they still couldn’t save everyone. Survivors gathered within the barrier, and Alexandria took in as many refugees as it could.</p><p>Then she reveals the detail that changes everything: the systems recorded a handful of souls venturing outside the barrier. Krile and Shale both recoil—everything you know says the world beyond was scoured of life, that survival outside should have been impossible. And yet, Sphene insists, those people must have been going somewhere. What if there was a refuge that weathered the Storm Surge and rebuilt over four centuries? Y’shtola notes that once Alexandria was displaced to the Source, you had neither cause nor opportunity to survey the rest of the continent—but Living Memory remains physically in the Ninth. If you can find another route out besides the portal to Alexandria, it might lead to the Mist Continent.</p><p>Sphene points out another crucial clue: Living Memory was not transported here despite being “atop” Everkeep, which suggests it may have always been a physically independent space—meaning another point of egress could exist. Shale adds that if such a route exists, someone must be maintaining it—perhaps even the mechanical soldiers. You decide to question them, and at Leynode Mnemo a clerk terminal explains that Living Memory is detached and operating independently, with lifts and leynode transit unavailable. Y’shtola presses for emergency options, and the answer arrives: an evacuation airship is prepared to deploy. With Sphene’s authorization, bypass protocols execute, and the vessel is readied without delay.</p><p>The airship that arrives is a replica—built for Living Memory, modeled after the one Sphene used during the Storm Surge era—and the sight visibly steadies her. You board, punch through storm clouds, and descend into the Ninth. In the Alexandria Crater, Sphene’s ward reacts; Y’shtola confirms the aetheric imbalance is severe even if it isn’t like the Thirteenth, and G’raha Tia reflects on the marvel of the barrier that kept anyone alive at all. Sphene stares at the crater and says it plainly: that was once Alexandria. Krile calls it sobering—but refuses to turn back now that you’ve come this far.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Krile <small class="muted">(Tuliyollal, X:16.0, Y:14.4)</small></div></div>`,

      <div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 100</div>
    </div>`,

  JP:{
    langLabel:'JP',
    pageTitle:'黒雲を突き抜けて',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>幾度となく出会い、そして別れてきたからこそ、ヤ・シュトラは「きちんと別れを告げる時間」がどれほど貴重かを口にする。グ・ラハ・ティアも、仲間と旅する喜びを愛しながら、ひとり旅にもまた違う魅力があり、船旅には独特の安らぎがあると言う。スフェーンは現実的だ。アルフィノとアリゼーがアレクサンドリアのことを各国へ伝えれば、やがて諸国との関係構築が始まる。ならば自分は、その交渉に備えねばならない。シェールは、見送りの機会を得られたことを素直に喜び、カチュアもきっと満足しただろうと呟く。</p><p>クルルは話し合いの場所を移そうと提案する。ここで長居すれば港の作業の邪魔になりかねないからだ。こうして一行は海辺のゴルニトルク・グリームサンズへ向かい、スフェーンはトラルの美しさを改めて噛みしめる。シェールは果てない海と移ろう空を見上げ、古い記録の挿絵の中を歩いているみたいだった、と初めて見たときの衝撃を語る。水平線の向こうに、さらに多くの土地と人々がいる――それだけは、いまだ想像しきれないとも。</p><p>けれどクルルは静かに返す。自分たちはまさに「その向こう側」から来たのだ、と。……もっと正確に言えば、ほとんどの者が。自分だけは、そうだと思い込んでいただけだった。スフェーンはその言葉を受け止め、クルルが「この世界の生まれ」だと知ったときの気持ちを案じる。クルルは、生まれ育った場所ではない土地で人生の大半を過ごしてきた事実が、ようやく現実として沈んできたのだと言い、リビング・メモリーで両親に会って初めて、自身の出自が本当のものとして感じられ始めたと明かす。</p><p>スフェーンも似た経験を語る。目覚めた当初、人々が語る国は自分の知るものとあまりに違い、通りを歩き、その空気を吸い、日々を重ねてようやく新しい現実を受け入れられた、と。クルルは次に必要なのはミララのことをもっと知ることだと言い、鍵の研究で手がかりは増えるだろうが、コンテインメント・コンプレックスの調査はまだ続いているため、第九世界の歴史を探る別の道を試したいと申し出る。グ・ラハ・ティアもヤ・シュトラも賛成し、得られる知識は全体像を照らし、好奇心は義務の範囲をはるかに超えていると一致する。</p><p>スフェーンは手掛かりを示す。アレクサンドリアはかつてミスト大陸に属し、ストームサージの後、荒廃した大陸で唯一生き残った国だったという。クルルは世界を蹂躙した雷の災厄を思い、グ・ラハ・ティアはアンダーキープで得た記録を引き合いに出す。国家間の争いも凄惨だったが、最後にすべてを叩き潰したのは雷だった、と。スフェーンは、城下が混乱に沈み、オーティスや騎士たちと共に飛空艇で避難させようとしても救えなかった命があったこと、そして生き残った者たちがバリアの内に集まり、外からの難民も可能な限り受け入れたことを語る。</p><p>ところが――システム記録には、バリアの外へ出た者がわずかながら存在した。クルルは愕然とし、シェールも、世界は隅々まで雷に焼かれ、生存などあり得ないと記録が語っていると補足する。それでもスフェーンは言う。彼らはどこかへ向かっていたはずだ。もしストームサージを耐え抜き、四百年の間に立て直した避難地があったのなら――。ヤ・シュトラは、アレクサンドリアがこちらへ移されたことで大陸を調べる機会を失ったと指摘する一方、リビング・メモリーは第九世界に残っていると整理する。門とは別の脱出口を探せば、ミスト大陸へ繋がる可能性がある。</p><p>さらにスフェーンは、リビング・メモリーがエヴァーキープの「上」にありながら移送されなかった点に触れ、もともと独立した空間だったのではないかと言う。ならば別の出入口が存在してもおかしくない。シェールは、もしあるなら誰かが維持しているはずだと続け、機械兵の存在を例に挙げる。こうして一行はレイノード・ムネモで端末に問いかけ、通常の移動手段が使えない現状と引き換えに、緊急時の避難用飛空艇が待機していることを知る。スフェーンの承認で準備は即座に進み、ほどなく彼女がかつて用いた船を模した「複製」の飛空艇が姿を現す。</p><p>嵐雲を抜けて地表へ降り立つと、目の前に広がるのはアレクサンドリア・クレーターだった。護符の反応にスフェーンが息を呑み、ヤ・シュトラは乙太の偏りが深刻だと告げる。グ・ラハ・ティアは、ここで生き延び得たのはバリアの奇跡だと実感する。スフェーンはクレーターを見つめ、「あれが……かつてのアレクサンドリア……」と呟く。クルルは胸を締めつけられながらも、ここまで来た以上、引き返すつもりはないと言い切る。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> クルル <small class="muted">(トライヨラ, X:16.0, Y:14.4)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="with-the-winds.html">羅針盤が示す先へ</a></div>
      <div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="beyond-the-mountains.html">霧の大陸</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'衝破黑雲與雷鳴',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>在一連串不斷的相遇與別離之後，Y’shtola 難得承認：真正能好好道別的時機其實少之又少，而今天能停下腳步、把話說完，是件令人寬慰的事。G’raha Tia 也說，雖然他喜歡有人作伴，獨行同樣有它的魅力；海上航行更有一種讓人放鬆下來的節奏。Sphene 把思緒拉回現實：等 Alisaie 與 Alphinaud 把 Alexandria 的消息傳出去，你們很快就得與其他國家建立往來，她也必須準備好面對各國領袖。Shale 則只是慶幸自己總算能送別他——Cahciua 也一定會為此感到欣慰。</p><p>Krile 提醒大家別在港口逗留太久，否則只會妨礙碼頭工人作業；於是你們改往海灘。到了 Gornitruq Gleamsands，Sphene 望著眼前景色，低聲說 Tural 真是美得令人屏息。Shale 看著無邊的海與不停變換的天空，說自己第一次看到時幾乎不敢相信——像是走進最古老紀錄裡的影像。可她又忍不住自嘲：水平線之外還有更多土地、更多人群，那件事她至今仍難以真正想像。</p><p>Krile 卻輕輕把這句話接住：其實你們本來就來自「水平線之外」。……更準確地說，大多數人都是；只有她一直以為自己也是，直到在 Living Memory 見到父母，那個「自己並非出生於長久生活的土地」的事實才真正變得有重量。Sphene 聽了很能理解——她甦醒之初，眾人口中的世界與她記憶中的 Alexandria 幾乎毫不相干；她必須親自走過街道、在那裡生活、呼吸，才能慢慢接受並擁抱那個全新的現實。</p><p>Krile 說，若要真正擁抱自己的出身，她還需要更了解 Milalla。研究 key 或許會帶來線索，但 Shale 對 Containment Complex 10-29 的調查仍在進行；因此她想請大家同意，先走另一條路，去追查第九世界更早的歷史。G’raha Tia 表示毫無異議，任何收穫都能讓你們看見更完整的全貌；Y’shtola 也附和，自己在意的不只是不只是 Ascians 的影響範圍——她同樣想知道更深、更遠的真相。</p><p>Sphene 於是提出她認為最該從哪裡開始。她說 Alexandria 原本屬於 Mist Continent；在 Storm Surge 之後，那片大陸化作廢墟，而 Alexandria 成了唯一倖存的國家。Krile 想起那場席捲世界的雷屬性災厄；G’raha Tia 也補上你們在 Underkeep 找到的紀錄：各國的戰爭固然殘酷，但最後把一切徹底擊碎的，是雷。Sphene 的語氣沉了下來——城堡城鎮陷入混亂時，她與 Otis、royal knights 一起嘗試用飛空艇撤離人群，卻仍救不了所有人；倖存者躲進屏障內，你們也盡可能收留外來的難民。</p><p>接著她說出那個讓所有人都停住的細節：系統記錄顯示，有少數人曾走出屏障，踏進外面的土地。Krile 當場驚呼不可能；Shale 也說，從紀錄看來 Storm Surge 伸向世界每一個角落，若真有人在外頭活著，那必定是難以想像的煎熬。可 Sphene 仍堅持：那些人一定不是「漫無目的地走出去」——他們必然在前往某個地方。要是存在一處避難地，挺過 Storm Surge、並在四百年間重建了呢？Y’shtola 指出，Alexandria 被轉移到 Source 之後，你們既沒有理由也沒有機會去勘查大陸其餘部分；但 Living Memory 仍然留在第九世界。若能找到除了通往 Alexandria 的 portal 之外的出口，也許就能抵達 Mist Continent。</p><p>Sphene 再補上一個關鍵推論：Living Memory 雖然「位於」Everkeep 之上，卻沒有跟著一起被轉移，這表示它很可能從一開始就是獨立的實體空間——既然如此，另一個出口完全可能存在。Shale 接話：如果真有出口，就一定有人在維持它的運作，像那些機械兵就是例子。你們因此前往 Leynode Mnemo 詢問接待端末，得知目前 lift 與 leynode 的交通都無法使用；但在緊急狀況下，這裡仍保有一艘可用於撤離的飛空艇。Sphene 立刻授權啟動繞行程序，飛空艇隨即準備就緒——那是為 Living Memory 特製、卻依照她在 Storm Surge 時代使用的船艦打造的「複製品」，光是看見它就讓她的心神穩了一分。</p><p>你們登船穿過風暴雲層，降落在第九世界的地表。抵達 Alexandria Crater 時，Sphene 手上的護符立刻出現反應；Y’shtola 說這裡的乙太失衡極其嚴重，就算不像第十三世界那般極端，也足以令人心驚。G’raha Tia 感嘆屏障的奇蹟——沒有它，根本不可能撐到今天。Sphene 望著那片巨大凹陷，低聲說：那裡……曾經就是 Alexandria。Krile 只說這景象令人窒息，但既然都走到這一步，她不會回頭。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 克莉露 <small class="muted">(Tuliyollal, X:16.0, Y:14.4)</small></div></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
