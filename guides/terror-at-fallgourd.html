  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}

    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}

    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}

    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}

    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;
  overflow-y:auto;
  padding-right:8px;
  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}
    .stack{display:flex;flex-direction:column;gap:10px}

      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;

      display:inline-block; padding:8px 14px; border-radius:10px;

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Terror at Fallgourd',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Back at The Waking Sands, Minfilia tells you that while you were handling matters in Thanalan, new information arrived from the sylphs. Someone matching Lahabrea’s description has been seen in North Shroud, and the sighting comes alongside a string of mysterious deaths in the same area. Minfilia says her instincts tell her he is involved, and she wants you to resume the investigation where you left off—Twelve willing, you will pick up Lahabrea’s trail again. She directs you to speak with Noraxia for the details, and urges you to be careful. Even after that, she cannot hide her unease, remarking on how brazen the Ascians have become, working in plain view, and telling you she is relying on you to uncover their dark designs.</p>
      <p>You find Noraxia, and she warns you to heed her words if you mean to investigate the sinister one. She says she has a friend among the Ashcrown Consortium, and that this friend spoke of a “digging one” named Medrod who encountered a scary masked one—most certainly the sinister one. Noraxia sends you to speak with Medrod, who can be found at Fallgourd Float in North Shroud.</p>
      <p>At Fallgourd Float, you find Medrod shaken to the core, begging you to leave him be—he’s convinced he is not long for this world. He insists he has looked death in the face, and it is only a matter of time before the masked man comes for him, just as he came for a poor woman. Medrod is clearly traumatized, and when you try to calm him, his fear spills into frantic confession—crying out for his mother and babbling apologies for being a bad son. But your steady presence helps him pull himself back from the edge. Gradually, he admits you’re right: seeing something terrible does not mean he will suffer the same fate, and thanks to you he can think straight again—enough to recount what he saw.</p>
      <p>He tells you it began as an ordinary day. He was headed back to the Float when he noticed a suspicious figure in the distance: a masked man dressed head to toe in black. Worse, the man was not alone—he had a hideous fiend in tow, a winged creature that was all eyeball and jagged teeth. Curious despite himself, Medrod crept as close as he dared… and saw the corpse of a woman. One look was enough to know she had died a gruesome death. In that instant, Medrod became certain the masked man was a minion of Thal, come to claim her soul.</p>
      <p>When Medrod realizes you are investigating that same masked man, the people around him immediately step in. Aideen offers help in whatever way they can, and Ivaurault agrees—anything, he says, to ensure they never have to endure Medrod’s hysteria again. Medrod tries to rally himself, then falters with embarrassed doubt about how bad he’s been—but in the end, he insists he wants to help you. It’s the least he can do, he says, to repay you for comforting him.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Minfilia <small class="muted">The Waking Sands (X:6.9, Y:6.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="back-to-square-one.html">Back to Square One</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 27 or above)</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="ziz-is-so-ridiculous.html">Ziz Is So Ridiculous</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'浮き村の怪事件',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>砂の家に戻ると、ミンフィリアはあなたに新たな情報を告げる。あなたがザナラーンで動いている間、シルフの友から知らせが届いたのだという。ラハブレアの特徴に合う人物が黒衣森：北部森林で目撃され、しかも同じ地域では不可解な死が相次いでいる。直感が告げている、とミンフィリアは言う――その男が関わっているに違いない。あなたには中断した調査を再開してほしい。十二神の御心があれば、再びラハブレアの足跡を追えるはずだ。詳しいことはノラクシアから聞き、そこから動いてほしいと指示し、いつものように気をつけるよう念を押す。さらに彼女は、アシエンがこれほど大胆に、人目につくところで暗躍するようになったことに驚きを隠せず、闇の企みを暴いて対抗策を講じねばならない、とあなたを頼りにしていると告げる。</p>
      <p>あなたがノラクシアに会うと、彼女は「邪なる者」を調べるなら自分の言葉をよく聞けと注意する。彼女にはアッシュクラウン・コンソーシアムにいる友がおり、その友によれば、メドロッドという採掘者が恐ろしい仮面の者に遭遇したという。ノラクシアは、その仮面の者こそ間違いなく邪なる者だと言い、黒衣森：北部森林のフォールゴウド・フロートにいるメドロッドに話を聞くよう勧める。</p>
      <p>フォールゴウド・フロートであなたが見つけたメドロッドは、ひどく怯えきっていた。自分は長く生きられない、放っておいてくれ――そう懇願し、死を直視したのだと言い張る。仮面の男は、あの哀れな女にしたのと同じように、いずれ自分を迎えに来るのだと。彼は明らかに心に傷を負っており、あなたが落ち着かせようとすると、恐怖が暴走して母を呼び、良い息子でいられなかったことや野菜を食べなかったことまで泣きながら謝り始める。だがあなたがなだめ続けると、彼は少しずつ正気を取り戻す。見たものが恐ろしかったからといって同じ運命になるとは限らない――そう自分に言い聞かせ、あなたのおかげで落ち着いて思い出せるようになったと礼を言う。</p>
      <p>彼の話では、その日はただの平凡な一日だった。フロートへ戻る途中、遠くに怪しい人物を見つけた。全身黒ずくめの仮面の男だったという。しかも傍らには、おぞましい魔物がいた。翼を持ち、目玉ばかりの体に、ぎざぎざの牙が並ぶような化け物だ。好奇心に負けたメドロッドは、恐る恐る近づいた――そこで目にしたのは、ひとりの女の死体だった。ひと目で、凄惨な死に方をしたとわかったという。その瞬間、メドロッドは確信する。あの仮面の男はサリャクの眷属ではなく、タルの眷属として魂を刈り取るために来たのだ、と。</p>
      <p>あなたが同じ仮面の男を調べていると知ると、周囲の者たちが口を開く。アイディーンは、力になれることなら何でもすると申し出る。イヴォローは、メドロッドの大騒ぎを二度と味わわずに済むなら何でもいい、と同調する。メドロッドは勢いよく協力を叫びかけてから、自分はそこまでひどくなかっただろうかと気まずそうにしつつも、あなたを助けたいと言い切る。落ち着かせてくれた礼として、それがせめてもの恩返しだと。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ミンフィリア　<small class="muted">砂の家 (X:6.9, Y:6.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="back-to-square-one.html">束の間の帰還</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 27～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="ziz-is-so-ridiculous.html">採掘場の切り裂き魔</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'浮村怪事',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>回到 The Waking Sands，Minfilia 告訴你：你在 Thanalan 奔走的期間，sylphs 的朋友送來了新消息。有人在 North Shroud 目擊到一個特徵符合 Lahabrea 描述的人，而那次目擊的前後，當地也接連發生一連串離奇死亡事件。Minfilia 說，她的直覺告訴她，那個人一定牽涉其中。她要你把調查接回原本中斷的地方——若十二神允許，你們將再次拾起 Lahabrea 的足跡。細節 Noraxia 會提供，請你去找她，並照她的指引行動；同時她也再次叮囑你務必小心。之後她仍難掩不安，說 Ascians 如今竟敢如此明目張膽地行動，你們必須查出他們的黑暗計畫，才能採取對策，而她正把希望寄託在你身上。</p>
      <p>你找到 Noraxia，她先要你若真要調查那個邪惡之人，就得把她的話聽清楚。她說自己有個朋友在 Ashcrown Consortium，而那位朋友提到：一名叫 Medrod 的採掘者曾遇見一個可怕的戴面具之人——那人必定就是你要找的邪惡之人。Noraxia 要你去問 Medrod，他人在 North Shroud 的 Fallgourd Float。</p>
      <p>到了 Fallgourd Float，你看見的 Medrod 幾乎被恐懼吞沒。他哀求你別靠近，說自己活不了多久了；他曾直面死亡，而那個戴面具的人遲早會像對那位可憐的女人一樣，回來找上他。你看得出他受了極大驚嚇，若想讓他說得下去，只能先讓他冷靜。你試著安撫他時，他卻崩潰大哭，喊著「媽媽」，一邊胡亂道歉，說自己不是個好兒子、沒乖乖吃菜、也沒做家事。但在你的安撫下，他終於慢慢穩住呼吸，承認你說得對：看到可怕的事並不代表他必定會遭遇同樣下場。多虧了你，他才能重新理清思緒，甚至覺得自己能把所見的事說清楚而不再失控。</p>
      <p>他說，那天原本只是再普通不過的一天。他正要回 the Float，遠遠看見一個形跡可疑的人影——全身黑衣、戴著面具的男人。更令人毛骨悚然的是，那人身邊還跟著一隻醜惡的怪物：有翅膀，身體彷彿只剩一顆眼球與滿口尖牙。Medrod 因為好奇，壓著恐懼悄悄靠近……然後，他看見了一具女人的屍體，只一眼就能判斷她死得非常淒慘。就在那一瞬間，Medrod 立刻認定：那個戴面具的人是 Thal 的爪牙，前來奪走她的靈魂。</p>
      <p>當 Medrod 發現你正在調查同一個戴面具的人，周圍的人也立刻表態。Aideen 說，只要能幫上忙，他們願意盡一切力量；Ivaurault 也附和，表示只要能讓他們不必再經歷 Medrod 的歇斯底里，什麼都好。Medrod 一開始想熱血地喊「團隊合作」，卻又尷尬地停住，懷疑自己是不是剛才真的太誇張了。但最後他仍認真表示：他願意協助你——至少要用這種方式，回報你剛才安撫他的那份恩情。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 敏菲利亞　<small class="muted"> 砂之家 (X:6.9, Y:6.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="back-to-square-one.html">瞬間的返回</a></div>
      <div class="row">所有職業（不含限定職） 等級 27 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="ziz-is-so-ridiculous.html">席茲之亂</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
