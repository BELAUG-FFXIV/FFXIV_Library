<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Final Verse (Quantum) Q35 | BELAUG · FFXIV Library</title>
  <meta name="description" content="FFXIV DT 7.35 Deep Dungeon — The Final Verse (Quantum) Q35（詩想エミネントグリーフ討滅戦 Q35 / 卓異的悲寂深想戰 Q35）：故事概要、需求條件、解鎖任務、後續任務，附影片。" />
  <link rel="icon" href="../../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#ffffff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif; background:var(--bg); color:var(--fg);}
    .container{max-width:1080px; margin:0 auto; padding:0 16px}
    .site-header{border-bottom:1px solid var(--border); background:#fff9edb3; backdrop-filter:saturate(120%) blur(6px); position:sticky; top:0; z-index:10}
    .nav{display:flex; align-items:center; justify-content:space-between; height:60px}
    .left{display:flex; align-items:center; gap:12px}
    .home{border:1px solid var(--border); background:#fff; padding:4px 8px; border-radius:8px; text-decoration:none; color:var(--fg); font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex; align-items:center; gap:8px}
    .icon-btn{background:none; border:none; cursor:pointer; font-size:14px; padding:6px 10px; border-radius:8px; color:var(--fg)}
    .icon-btn:hover{background:#fff; border:1px solid var(--border)}
    #langToggle{display:inline-flex; align-items:center; gap:6px; white-space:nowrap; font-weight:600}
    .lang-icon{width:17px; height:17px; display:block; flex:0 0 auto; opacity:.9}
    .main{padding:20px 0 40px}
    .grid{display:grid; grid-template-columns:1.1fr 1fr; gap:20px; align-items:start;}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative; padding-top:56.25%}
      .video-wrap iframe{position:absolute; inset:0; width:100%; height:100%}
    }
    .card{background:var(--card); border:1px solid var(--border); border-radius:16px; box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px; border-bottom:1px solid var(--border); font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%; height:420px; border:0; display:block; border-radius:16px}

    .tabs{display:flex; gap:8px; padding:12px 12px 0; flex-wrap:wrap}
    .tab-btn{background:#fff; border:1px solid var(--border); color:var(--fg); border-radius:999px; padding:8px 14px; cursor:pointer; font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent); color:#fff; background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}

    .stack{display:flex; flex-direction:column; gap:10px}
    .stack .row{padding:12px 14px; border:1px dashed var(--border); border-radius:12px; background:#fffdf6}

    .link{color:#0b60d8; text-decoration:none}
    .link:hover{text-decoration:underline}

    .row-flex{
      display:flex;
      align-items:baseline;
      gap:18px;
      justify-content:flex-start;
      flex-wrap:wrap;
    }
    .row-flex .label{font-weight:800}
    .row-flex .righttxt{margin-left:0; white-space:nowrap}
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left">
        <a class="home" href="../../index.html">🏠 Home</a>
      </div>
      <div class="right">
        <button id="langToggle" class="icon-btn" aria-label="切換語言">English</button>
      </div>
    </nav>
  </header>

  <main class="container main">
    <div class="grid">
      <section class="card video-card">
        <div class="bd">
          <div class="video-wrap">
            <iframe id="ytFrame" src="https://www.youtube.com/embed/Ezpanr7D330" title="The Final Verse (Quantum) Q35" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="hd" id="pageTitle">The Final Verse (Quantum) Q35</div>
        <div class="tabs" role="tablist">
          <button class="tab-btn" role="tab" aria-selected="true" data-tab="story">Story</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="req">Requirements</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="acq">Unlock Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="unlock">Follow-Up Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="comments">Comments</button>
        </div>
        <div class="bd">
          <div id="panel-story" class="tab-panel active scroll-panel"></div>
          <div id="panel-req" class="tab-panel"></div>
          <div id="panel-acq" class="tab-panel"></div>
          <div id="panel-unlock" class="tab-panel"></div>
          <div id="panel-comments" class="tab-panel">
            <div id="giscus_container" style="min-height:320px;"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const LANG_KEY = 'ffxiv-guide-lang';

    const i18n = {
      EN:{
        langLabel:'English',
        pageTitle:'The Final Verse (Quantum) Q35',
        tabs:{story:'Story', req:'Requirements', acq:'Unlock Quest', unlock:'Follow-Up Quest', comments:'Comments'},
        story:`<p>Shaped by your offerings, a deep anguish burgeons from the sleepless abyss. Only those with the fortitude to face an aberration of both Light and Darkness may navigate this waking dream and overcome the damnation trapped upon a holy road.</p>

<p>Sacramental Offerings Q35 (38888)</p>

<p>The quantum encounter is an experimental battle that lets players tune the difficulty through offerings. There are five types of offerings, and up to eight of each type can be selected. At least 15 offerings in total are required to enter, while the maximum is 40 offerings in total.</p>

<p>Offerings can be obtained from a quest after reaching floor 100, which rewards 40 offerings; as random drops from the Accursed Hoard in the deep dungeon; or by purchasing them from the Market Board.</p>

<p>Each type of offering increases the boss’s difficulty in a specific way. In addition to higher HP and damage, the boss gains more demanding mechanics based on the total number of offerings, with new thresholds every five offerings.</p>

<p>Only the party leader selects the offerings. Other party members do not need to possess them.</p>

<p>Offerings are not consumed until the fight is cleared and the coffer is opened afterward. Wipes carry no real cost, so players are free to experiment with different combinations.</p>

<p>At 40 offerings, the fight’s mechanical difficulty is comparable to fourth-floor Savage raids or Ultimate raids, though the encounter itself is shorter, at roughly 10 minutes. Clearing with 40 offerings awards a unique achievement and title.</p>`,
        req:`<div class="stack">
          <div class="row">4 players</div>
          <div class="row">Unrestricted Parties Not Allowed</div>
          <div class="row">Class: Disciples of War or Magic (excluding limited jobs)</div>
          <div class="row">Level: 100 (Sync from 100)</div>
          <div class="row">※ While synced, all item stats are adjusted.</div>
        </div>`,
        acq:`<div class="stack">
          <div class="row"><a class="link" href="../dtside/a-branch-and-their-sapling.html">A Branch and Their Sapling</a></div>
        </div>`,
        unlock:`<div class="stack">
          <div class="row">None</div>
        </div>`
      },

      JP:{
        langLabel:'日本語',
        pageTitle:'詩想エミネントグリーフ討滅戦 Q35',
        tabs:{story:'ストーリー', req:'必要条件', acq:'開放クエスト', unlock:'後続クエスト', comments:'コメント'},
        story:`<p>あなたの捧げものによって形を成し、眠らぬ深淵より深い苦悶が膨れ上がります。光と闇、その双方の異形に立ち向かう強き心を持つ者だけが、この目覚めた夢を進み、聖なる道に囚われた呪いを乗り越えることができるでしょう。</p>

<p>サクラメント・オファリング Q35（38888）</p>

<p>量子遭遇戦は、供物によって難易度を調整できる実験的なバトルです。供物には5種類あり、それぞれ最大8個まで選択できます。突入には合計15個以上の供物が必要で、最大では5種類×8個、合計40個まで設定できます。</p>

<p>供物は、100階到達後のクエスト報酬として40個入手できるほか、ディープダンジョン内の埋もれた財宝からランダムで入手したり、マーケットボードで購入したりできます。</p>

<p>供物の種類ごとに、ボスの難易度が異なる形で上昇します。HPや与ダメージが増えるだけでなく、供物の合計数に応じてギミックも強化され、5個ごとに新たな段階が追加されます。</p>

<p>供物を選択するのはパーティリーダーのみです。他のパーティメンバーが供物を所持している必要はありません。</p>

<p>供物は、バトルをクリアしてその後の宝箱を開けるまで消費されません。全滅しても実質的な損失はないため、さまざまな組み合わせを自由に試すことができます。</p>

<p>供物40個で挑戦した場合、ギミック面の難易度は零式4層や絶コンテンツに匹敵します。ただし、戦闘時間は比較的短く、およそ10分ほどです。供物40個でクリアすると、専用のアチーブメントと称号を獲得できます。</p>`,
        req:`<div class="stack">
          <div class="row">4 players</div>
          <div class="row">人数制限解除不可</div>
          <div class="row">クラス・ジョブ：ファイター／ソーサラー（リミテッドジョブを除く）</div>
          <div class="row">レベル：100（レベル100にシンク）</div>
          <div class="row">※ レベルシンク中は、アイテムの性能が調整されます。</div>
        </div>`,
        acq:`<div class="stack">
          <div class="row"><a class="link" href="../dtside/a-branch-and-their-sapling.html">若木と枝に</a></div>
        </div>`,
        unlock:`<div class="stack">
          <div class="row">なし</div>
        </div>`
      },

      ZH:{
        langLabel:'繁體中文',
        pageTitle:'卓異的悲寂深想戰 Q35',
        tabs:{story:'故事概要', req:'需求條件', acq:'解鎖任務', unlock:'後續任務', comments:'留言'},
        story:`<p>在你的供物形塑之下，深沉的痛苦自不眠的深淵中逐漸膨脹。唯有具備勇氣，能面對兼具光與暗之異質存在的人，才能穿越這場清醒的夢，並戰勝被囚於聖路之上的詛咒。</p>

<p>供物 Q35（38888）</p>

<p>Quantum encounter 是一種實驗性戰鬥，玩家可以透過供物 調整難度。供物 共有 5 種，每一種最多可選 8 個。進入戰鬥至少需要合計 15 個 供物，最多則可設定到 40 個，也就是 5 種各 8 個。</p>

<p>供物 可以在抵達第 100 層後，透過任務獎勵取得 40 個；也可能從 deep dungeon 內的 Accursed Hoard 隨機取得，或直接從 Market Board 購買。</p>

<p>每一種 供物 都會以不同方式提高頭目的難度。除了增加 HP 與傷害之外，頭目還會依照 供物 的總數加入更困難的機制，並且每 5 個 供物 形成一個新的難度分段。</p>

<p>只有隊長需要選擇 供物，其他隊員不需要持有 供物。</p>

<p>供物 不會在進入戰鬥時消耗，而是在成功通關並開啟之後的寶箱時才會消耗。因此滅團幾乎沒有實際成本，可以放心嘗試不同組合。</p>

<p>當 供物 達到 40 個時，這場戰鬥在機制難度上可與零式 4 層或絕本相比，不過戰鬥時間較短，約 10 分鐘左右。以 40 個 供物 通關後，可以獲得專屬成就與稱號。</p>`,
        req:`<div class="stack">
          <div class="row">4 players</div>
          <div class="row">不可解除限制</div>
          <div class="row">職業：戰鬥精英／魔法導師（不包含限制職業）</div>
          <div class="row">等級：100（同步至 100）</div>
          <div class="row">※ 同步時，所有裝備品屬性將會調整。</div>
        </div>`,
        acq:`<div class="stack">
          <div class="row"><a class="link" href="../dtside/a-branch-and-their-sapling.html">小樹苗與小樹枝</a></div>
        </div>`,
        unlock:`<div class="stack">
          <div class="row">無</div>
        </div>`
      }
    };

    const langToggle = document.getElementById('langToggle');
    const pageTitle  = document.getElementById('pageTitle');
    const tabBtns    = [...document.querySelectorAll('.tab-btn')];

    const panels = {
      story   : document.getElementById('panel-story'),
      req     : document.getElementById('panel-req'),
      acq     : document.getElementById('panel-acq'),
      unlock  : document.getElementById('panel-unlock'),
      comments: document.getElementById('panel-comments')
    };

    function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }

    function applyLang(lang){
      const t = i18n[lang] || i18n.EN;
      pageTitle.textContent = t.pageTitle;
      langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
      tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
      const activeBtn = tabBtns.find(b=>b.getAttribute('aria-selected')==='true') || tabBtns[0];
      renderPanel(activeBtn.dataset.tab, lang);
      if (activeBtn && activeBtn.dataset.tab === 'comments') loadGiscusForCurrentLang();
    }

    function renderPanel(key, lang){
      const t = i18n[lang] || i18n.EN;
      Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
      panels[key].classList.add('active');
      if (key !== 'comments') {
        panels[key].innerHTML = t[key] || '';
      } else {
        loadGiscusForCurrentLang();
      }
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click',()=>{
        tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab, getLang());
      });
    });

    langToggle.addEventListener('click',()=>{
      const cur=getLang();
      const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
      localStorage.setItem(LANG_KEY,next);
      applyLang(next);
    });

    applyLang(getLang());

    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };

    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }

    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }
  </script>
</body>
</html>
