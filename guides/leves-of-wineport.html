<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leves of Wineport | BELAUG · FFXIV Library</title>
  <meta name="description" content="Feature Quest – Leves of Wineport (ARR Patch 2.0)">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px;color:var(--fg)}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    #langToggle{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;font-weight:600}
    .lang-icon{width:17px;height:17px;display:block;flex:0 0 auto;opacity:.9}

    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }

    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}

    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}

    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
      max-height:420px;
      overflow-y:auto;
      padding-right:8px;
      scrollbar-gutter:stable;
    }
    .tab-panel.scroll-panel p:first-child{margin-top:0}
    .tab-panel.scroll-panel p:last-child{margin-bottom:0}

    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}

    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left">
        <a class="home" href="../index.html">🏠 Home</a>
      </div>
      <div class="right">
        <button id="langToggle" class="icon-btn" aria-label="切換語言">English</button>
      </div>
    </nav>
  </header>

  <main class="container main">
    <div class="grid">
      <section class="card video-card">
        <div class="bd">
          <div class="video-wrap">
            <iframe id="ytFrame" src="https://www.youtube.com/embed/dIa2p8NnaGA"
              title="Leves of Wineport" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="hd" id="pageTitle">Leves of Wineport</div>
        <div class="tabs" role="tablist">
          <button class="tab-btn" role="tab" aria-selected="true"  data-tab="story">Story</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="acq">Acquisition</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="unlockq">Unlock Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="followq">Follow-Up Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="comments">Comments</button>
        </div>
        <div class="bd">
          <div id="panel-story"   class="tab-panel active scroll-panel"></div>
          <div id="panel-acq"     class="tab-panel"></div>
          <div id="panel-unlockq" class="tab-panel"></div>
          <div id="panel-followq" class="tab-panel"></div>
          <div id="panel-comments" class="tab-panel">
            <div id="giscus_container" style="min-height:320px;"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Leves of Wineport',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more',
    readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>※ Unlocks guildleves at Wineport.</p>
      <p>At Wineport, Aileen greets you with a wry remark about seeking work to fund a taste for wine, then explains her role: the Adventurers’ Guild has assigned her there to distribute guildleves to those willing and able to take on contract work.</p>
      <p>She tells you that the work available depends on your skills. Some contracts call for culling beasts, while others involve crafting, gathering, or similar tasks. Before she can offer you regular guildleves, however, she must first confirm that you are capable of completing a contract.</p>
      <p>The La Noscean wilderness is dangerous, and Aileen believes it is only sensible to test whether you can survive such conditions. For your trial, she gives you a task involving the local goobbues, creatures known to devour almost anything but especially fond of pelican meat.</p>
      <p>You are to slay a pelican and use its remains as bait to draw out the hungry goobbues. Aileen warns that the area where they were last seen is wide, so the task may take time, and that other starving creatures may also be attracted to the meat.</p>
      <p>After explaining the details, she leaves you to carry out the trial and tells you to refer to the guildleve in your possession if you need to review the instructions. When you return having completed the task, Aileen is somewhat surprised, but acknowledges your success and grants you access to guildleve work at Wineport.</p>
      <p>With your competence proven, Aileen says she will not deny you additional guildleves. Whether you choose to drink while working is no concern of hers—as long as the client is satisfied, so is she.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Aileen <small class="muted">(Eastern La Noscea, X:21.6, Y:21.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="leves-of-bentbranch.html">Leves of Bentbranch</a></div>
      <div class="row"><a class="link" href="leves-of-horizon.html">Leves of Horizon</a></div>
      <div class="row"><a class="link" href="leves-of-swiftperch.html">Leves of Swiftperch</a></div>
      <div class="row">Any Disciple of War or Magic (excluding limited jobs) <small class="muted">Lv. 35</small></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row">None</div>
    </div>`
  },

  JP:{
    langLabel:'日本語',
    pageTitle:'ギルドリーヴ開放「ワインポート」',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示',
    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>※ ワインポートのギルドリーヴが開放されます。</p>
      <p>ワインポートで、アイリーンは酒代を稼ぐ仕事でも探しているのかと皮肉交じりにあなたへ声をかけます。そして、自分は冒険者ギルドからこの地に派遣され、腕に覚えのある者たちへギルドリーヴを配布しているのだと説明します。</p>
      <p>彼女によれば、受けられる仕事はあなたの技量次第です。魔物の討伐、製作、採集など、依頼の内容はさまざまですが、継続してリーヴを任せる前に、まずは契約を達成できるだけの力があるかを見極めなければなりません。</p>
      <p>ラノシアの荒野には危険が多く、アイリーンはそこで生き延びられるかを試す必要があると考えています。試験として彼女が示したのは、何でも食らうグゥーブーたちに関わる依頼でした。彼らはとりわけペリカンの肉を好むのだといいます。</p>
      <p>あなたはペリカンを倒し、その亡骸を餌にして、飢えたグゥーブーをおびき出すことになります。最後にグゥーブーが目撃された範囲は広く、時間がかかるかもしれません。さらに、肉の匂いに引き寄せられるのはグゥーブーだけとは限らないと、彼女は注意を促します。</p>
      <p>十分に説明を終えたアイリーンは、内容を確認したければ手元のギルドリーヴを見ればよいと言い、あなたを試験へ送り出します。やがて任務を終えて戻ると、彼女は少し意外そうにしながらも、あなたの達成を認め、ワインポートでのギルドリーヴ受注を許可します。</p>
      <p>力を示したあなたに対し、アイリーンは今後のギルドリーヴも拒まないと告げます。仕事中に酒を飲もうが彼女は気にしません。依頼主が満足しているなら、それで彼女も満足なのです。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> アイリーン　東ラノシア <small class="muted">(X:21.6, Y:21.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="leves-of-bentbranch.html">挑戦、ギルドリーヴ</a></div>
      <div class="row"><a class="link" href="leves-of-horizon.html">挑戦、ギルドリーヴ</a></div>
      <div class="row"><a class="link" href="leves-of-swiftperch.html">挑戦、ギルドリーヴ</a></div>
      <div class="row">ファイター ソーサラー（リミテッドジョブを除く） <small class="muted">Lv 35～</small></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row">なし</div>
    </div>`
  },

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'葡萄酒港理符開放',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>※ 解鎖 Wineport 的 Guildleve。</p>
      <p>在 Wineport，Aileen 先以帶著玩笑的語氣問你，是不是想找工作來補貼酒錢。接著她說明，Adventurers’ Guild 將她派到這裡，負責把 Guildleve 分配給有意願、也有能力承接委託的人。</p>
      <p>她告訴你，能接到什麼工作取決於你的技能。有些委託需要討伐野獸，有些則與製作、採集或其他任務有關。不過，在正式讓你承接更多 Guildleve 之前，她必須先確認你有完成契約的能力。</p>
      <p>La Noscea 的野外充滿危險，Aileen 認為有必要測試你是否能在那樣的環境中生存。她給你的試煉與當地的 goobbue 有關；這些生物幾乎什麼都吃，但尤其喜歡 pelican 的肉。</p>
      <p>你的任務是擊倒一隻 pelican，並利用牠的殘骸作為誘餌，引出飢餓的 goobbue。Aileen 提醒你，goobbue 最後出沒的區域相當大，可能需要花上一些時間；而且肉味吸引來的，也不一定只有 goobbue。</p>
      <p>說明完任務後，Aileen 讓你前去執行試煉，並告訴你如果還有疑問，可以查看手上的 Guildleve。當你完成任務回來時，她雖然有些意外，仍承認你通過了測試，並允許你在 Wineport 承接 Guildleve。</p>
      <p>既然你已經證明自己有能力，Aileen 表示之後若你還想接更多 Guildleve，她不會拒絕。至於你是不是邊工作邊喝酒，她並不在意；只要委託人滿意，她也就滿意了。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 艾琳，東拉諾西亞 <small class="muted">(X:21.6, Y:21.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="leves-of-bentbranch.html">挑戰理符任務</a></div>
      <div class="row"><a class="link" href="leves-of-horizon.html">挑戰理符任務</a></div>
      <div class="row"><a class="link" href="leves-of-swiftperch.html">挑戰理符任務</a></div>
      <div class="row">戰鬥精英和魔法導師（除設限特職） <small class="muted">等級 35</small></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row">無</div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
