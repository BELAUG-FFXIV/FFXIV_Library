    story:`<div class="clamp" data-collapsed="true">
<p>You hear Cyr’s disbelief before anything else—after a thousand years of war finally ending in peace, the Grand Sers still mean to kill Hraesvelgr, and it makes no sense to him. Around you, everyone tries to steady themselves: Nashu clings to the small relief of having found the inspector, Godbert watches Hildibrand with the quiet pride of a father recognizing another father’s struggle, and Julyan studies her son as if weighing what she sees against what she fears.</p>
<p>Hildibrand straightens and formally asks for your aid in rescuing his son and ending the Grand Sers’ schemes, only for Cyr to cut through the theatrics—none of you came for ceremony; you came because you wanted to help. Nashu, delighted to match his flair, produces a fresh change of clothes, and Hildibrand declares he will change as you travel. Together you press on into the Churning Mists, toward Zenith.</p>
<p>Standing deep in Dravanian territory, you feel Cyr’s thoughts turn inward—he notes the strange weight of simply being here, remembering how recently his life was spent scouring streets for heretics. The altitude draws complaints from Julyan, awe from Godbert, and a renewed urgency from Hildibrand, who insists the final confrontation is close at hand. Then he falters, admitting his wounds are worse than he thought—and declares that only one thing can restore him.</p>
<p>Julyan promptly offers salamander oil and a mother’s massage, while Hildibrand insists you should be the one to do it. Godbert, with perfect seriousness, supports the decision and even vouches for your “strong-yet-tender fingers.” With everyone looking on—Nashu openly envious and Cyr resigned—you coat Hildibrand in oil and work it into his aching muscles. When Godbert produces an even rarer Manderville legacy—Salamanderville—Hildibrand throws himself into the ritual with dramatic fervor until he erupts in renewed vigor, proclaiming himself reborn and ready to face anything.</p>
<p>At Zenith, the Grand Sers meet you with impatience—Dorys would rather get on with slaying a dragon. Cyr protests that the war is over, but Dorys promises it will begin anew: with the wyrm’s death will come an era of fire and blood, and by consuming the eyes they will claim new power and win glory that echoes forever. Cyr refuses to allow it, even if it costs his life, and the Grand Sers turn that refusal into their answer.</p>
<p>In the middle of it all, Vivi—Gigi—faces you with sharpened, “pointy” eyes and rejects the name Hildibrand gives him. He claims he remembers everything: his power, his purpose, and Archmagus Quan. He boasts that he already made the Grand Sers young again, but it is not enough—he needs the wyrm’s eyes to bring Quan back. Hildibrand and Cyr both try to stop him: Quan is gone, and even if a body could be restored, the soul that made Quan who he was cannot be reached.</p>
<p>Vivi insists he can restore anything to its ideal form, and when he looks at Hildibrand’s battered state and your worn gear, he cannot understand why it should remain that way. Cyr answers with Quan’s research notes: what Quan gave Vivi was not merely the power to return things to how they were, but the power to change them into what Vivi believes they should be. That is why the magic does not take hold of Hildibrand—because Vivi knows, in his heart, that this bruised, stubborn, unbroken inspector is already “right.” And when Vivi demands to know why he could make the Grand Sers young, Cyr points to the only truth Vivi ever had of them—the stories they told of blazing youth and heroism—easy to envision, and easy to impose.</p>
<p>Cyr lays out what Quan finally understood: Vivi’s fond memories made it impossible for him to imagine Quan as anything but an elderly creator, and the only way to force youth would have been to take those memories away. Yet Vivi was all Quan had left—not a mere mammet, but family—so Quan renounced immortality. Even so, fearing the world would exploit Vivi, Quan eventually took Vivi’s memories to protect him. But something stronger remained, Cyr insists—Vivi was never broken, never abandoned; Quan only wanted to set him free. Hildibrand calls it Quan’s final gift: a new life, and a story of Vivi’s own.</p>
<p>Dorys loses patience and turns the trap upon you, but Vivi declares himself at last—grandson of Quan and son of Hildibrand—and claims his story. In a final act of power, time turns back around you, and when it is over, the catastrophe is as though it never happened. The Grand Sers rage and then falter; Orland admits it was all rather silly, Gonspart finds the courage to confess his love to Dorys, and even Dorys can only curse him as a fool. When Hildibrand stirs, Cyr tells him everyone lives thanks to Gigi, and the Grand Sers are in custody—yet Gigi is gone.</p>
<p>Hildibrand swallows the loss and chooses to honor what his son wanted, vowing to continue onward until the world brings them together again. Godbert then reveals what Hildibrand did not know: so long as Gigi’s core remains intact, he is not truly dead—only dormant after exhausting his aether, and he will awaken in time as the ambient aether restores him. Godbert offers to tend to the child and take custody of the Grand Sers, and Cyr falters—he cannot return to Ishgard after what he said and did; the inquisition would imprison him or worse. Julyan bluntly suggests he live in Hildibrand’s gazebo in Idyllshire, and Cyr finds the idea unexpectedly bearable.</p>
<p>Later in Idyllshire, Cyr thanks you and looks back on the man he was with shame—the “facts” he clung to, the life he never questioned. Meeting you, the inspector, and Gigi forced him to admit how much he hated his work, and how much more it matters to seek the whole truth. Being labeled a heretic and fleeing Ishgard, he says, may have been the best thing that ever happened to him—because now he can begin again as a consulting inspector. Then he introduces someone new: Lord Godbert has modified Gigi’s body, smaller so he can absorb aether more effectively. If you will take him with you and let him share in your adventures, they hope it might hasten his reawakening—until the day your paths cross again.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>あなたはシルの困惑を聞く。千年戦争の末にようやく平和を得たというのに、グランドサーはフレースヴェルグを殺すつもりだという――そんな話が通るはずがない。周囲では、ナシュが「検事を見つけられた」と前向きに言い聞かせ、ゴドベルトは父として成長していくヒルディブランドの姿に自分の苦労を重ね、ジュリアンは無事そうに見える息子を見つめながらも、胸の内の不安を拭い切れない。</p>
<p>ヒルディブランドは改まって、あなたたちに「息子を救い、グランドサーの企みを止めるため力を貸してほしい」と宣言する。だがシルは、そんな大仰な口上は要らないと言う――助けたいから来た、それだけだ。ナシュは得意げに新しい着替えを差し出し、ヒルディブランドは道中で着替えると告げる。あなたは仲間と共に、ドラヴァニア雲海のゼニスへ向かう。</p>
<p>ドラヴァニアの領域のど真ん中に立ったことで、シルはふと自分の過去を思い出す。つい最近まで、彼は街を歩き回り、影という影に異端を探していた。ジュリアンは高地の空気が肌に悪いとこぼし、ゴドベルトは周囲の造形に感嘆し、ヒルディブランドは「決戦が近い」と気勢を上げる。だが直後、彼は傷が想像以上に深いと認め、「かつての不屈の自分を取り戻すには、ある一つのものが必要だ」と言い出す。</p>
<p>ジュリアンはサラマンダーオイルを取り出し、母として揉みほぐしてやると言うが、ヒルディブランドはあなたに任せたいと主張する。ゴドベルトもまた真顔でそれを後押しし、あなたの手つきが癒やしに長けていると証言する。ナシュが羨ましがり、シルが諦めたように促す中、あなたはオイルを塗り広げ、凝った筋肉へ丁寧に揉み込んでいく。さらにゴドベルトがマンドヴィル家の秘伝だという「サラマンダーヴィル」を取り出すと、ヒルディブランドは大げさな熱量でそれを受け入れ、ついには新たな力が満ちたと叫び、再び進む準備が整ったと宣言する。</p>
<p>ゼニスで待ち受けていたグランドサーに、ドリスはうんざりした様子で言う――今は竜を殺すのが先だ。シルは戦争は終わったと訴えるが、ドリスは「竜の死が新たな炎と血の時代を生む」と言い切り、竜眼を喰らって得た力で戦場に栄光を刻み、伝説を永遠に響かせるのだと豪語する。シルはそれを許さない、たとえ命を賭しても止めると言い、グランドサーはその言葉を合図に牙を剥く。</p>
<p>そのさなか、ヴィヴィ――ジジは鋭い目つきであなたの前に立ち、ヒルディブランドが呼ぶ名を拒む。自分はすべてを思い出した、力も目的も、大魔道士クワンも、と。彼はグランドサーを若返らせたが、それでも足りないと言い、クワンを取り戻すために竜眼が必要だと告げる。ヒルディブランドとシルは止めようとする――肉体を整えたとしても、クワンをクワンたらしめる魂は戻らないのだと。</p>
<p>ヴィヴィは「理想の姿」に戻せるのだと言い張り、汚れ傷ついた装いを不思議がる。シルはクワンの研究記録を示し、彼が与えたのは「元に戻す力」ではなく、「あるべき姿だと信じる形へ変える力」だと語る。だからこそヒルディブランドには効かない――ヴィヴィ自身が、傷だらけでも折れないこの検事こそが「正しい」と心の底で理解しているからだ。さらにヴィヴィが「ではなぜグランドサーは若返った」と問うと、シルは答える――あなたが知っていた彼らは、若さと武勇を誇る物語の中の姿だけだった、と。</p>
<p>やがてクワンは真実に辿り着いたのだと、シルは続ける。ヴィヴィの記憶がある限り、クワンは老いた創造主としてしか思い描けず、若返りを成すにはその記憶を奪うしかない。だがヴィヴィはただのマメットではなく、友であり家族だった。だからクワンは不老の追求を捨てた。それでも、あなたを利用しようとする者が現れることを恐れ、クワンは最期にあなたの記憶を奪った――守るために。だが何かは残った。あなたは壊れていなかった、捨てられてもいなかった。クワンが望んだのは、あなたを自由にすることだったのだ。ヒルディブランドはそれを「最後の贈り物」だと言う――あなた自身の新しい人生と、あなた自身の物語だと。</p>
<p>ドリスは感傷に飽き、罠をこちらに向けるが、ヴィヴィはついに名乗る――大魔道士クワンの孫であり、ヒルディブランドの子でもある、と。そして「これは自分の物語だ」と宣言し、最後の力で時を巻き戻す。破局は起こらなかったかのように消え、グランドサーは怒り、やがて言葉を失う。オーランドは年老いることも悪くないのかもしれないと漏らし、ゴンスパールトはドリスへ愛を告げ、ドリスはそれを罵りながらも受け止めきれない。ヒルディブランドが目を覚ますと、シルは全員が生きていること、そしてグランドサーを拘束したことを告げる――ただし、ジジはもうここにはいない。</p>
<p>ヒルディブランドは息子の望みを尊重し、いつか再会できる日まで歩み続けると決める。するとゴドベルトが語る――ジジは死んだのではない。核が無事ならば、エーテルを使い果たして休眠しているだけで、周囲のエーテルを吸ってやがて目覚めるのだ。ゴドベルトは子を預かり、グランドサーも引き受けると申し出る。だがシルは立ち止まる――自分はイシュガルドへ戻れない。異端の疑いを招く言動を重ねた以上、審問所に投げ込まれるか、もっと酷い結末さえあり得る。ジュリアンはイディルシャイアのガゼボに住めばいいと言い、シルはそれを「悪くない」と受け入れる。</p>
<p>その後、イディルシャイアでシルはあなたに礼を述べ、かつての自分を恥じる。信じ込んでいた「事実」や、疑わなかった生き方を思うほどに、愚かだったと痛感する。あなたと検事とジジに出会わなければ、自分が仕事をどれほど憎んでいたかも、真実を求めることがどれほど満たされるかも知らなかった。異端とされて逃げる羽目になったことさえ、今では新しい人生の始まりだと言う。そして彼はあなたに紹介したい者がいると告げる。ゴドベルトが改造したジジだ――身体を小さくし、より効率よくエーテルを吸えるようにした。あなたが旅に連れて行き、冒険を共にすれば、目覚めが早まるかもしれない、と。</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>你先聽見 Cyr 的困惑——千年戰爭好不容易才迎來和平，Grand Sers 卻還想殺 Hraesvelgr，這怎麼可能說得通。Nashu 試著把話往好處想：至少你們找到 Hildibrand 了；Godbert 看著他像父親一樣學著承擔，眼神裡有種沉靜的驕傲；Julyan 盯著自己的兒子，像是在把眼前的平安與心底的恐懼一一對照。</p>
<p>Hildibrand 挺起胸膛，用一貫的正式口吻請你們協助——救回他的孩子，阻止 Grand Sers 的盤算。Cyr 直接打斷那套宣言：你們來不是為了聽口號，你們來是因為想幫忙。Nashu 立刻接上同樣誇張的語氣，遞出一套乾淨的換洗衣物；Hildibrand 說他會在路上換好。你們一起踏進 The Churning Mists，往 Zenith 追去。</p>
<p>當你們深入 Dravanian 領域時，Cyr 的語氣忽然放輕了些——他像是在提醒自己，也像是在承認：自己竟然真的站在這裡。明明不久前，他還在街頭巷尾追著「異端」的影子不放。高海拔讓 Julyan 抱怨不止，Godbert 對周遭的景色感到驚嘆，而 Hildibrand 則宣告決戰近在眼前。可下一瞬，他又皺著眉承認傷勢比想像更重，說自己現在沒法硬碰硬——除非能用某種方式把狀態「恢復」回去。</p>
<p>Julyan 立刻拿出 salamander oil，說要用母親的手替他按一按；Hildibrand 卻硬是把這件事推到你身上。Godbert 也一本正經地附和，還替你的手藝背書。你在 Nashu 的羨慕、Cyr 的無奈、Julyan 的哼聲裡，把油抹上 Hildibrand 的身體，按著他的指示把油揉進緊繃的肌肉。接著 Godbert 又拿出更誇張的 Manderville 家秘傳「Salamanderville」，Hildibrand 便用一連串過度熱血的喊聲把整套儀式做得像重生一樣，最後挺直身子宣告自己已經恢復，無論面前是什麼都能迎上去。</p>
<p>在 Zenith，Grand Sers 不耐煩地現身，Dorys 甚至嫌你們來得不是時候——他們還有龍要殺。Cyr 立刻喝止，說戰爭已經結束；Dorys 卻宣稱只要那條古龍倒下，就會迎來新的火與血的時代，而他們吞下那對眼睛，就能用新力量換來無盡榮耀，讓傳說永遠回響。Cyr 說他絕不允許，哪怕要用命去擋；Grand Sers 也乾脆把他的決心當作最後的答覆。</p>
<p>你們終於看見 Gigi——可他抬起頭時，那雙眼睛讓人不寒而慄。Hildibrand 叫他回來，他卻用更尖銳的語氣否定那個名字，說自己的名字是 Vivi；他說自己全都想起來了：力量、目的，還有 Archmagus Quan。他承認自己已經讓 Grand Sers 變年輕，但那還不夠——他需要古龍的眼睛，這樣他才能把 Quan 帶回來。Hildibrand 和 Cyr 都要他停下：Quan 已經不在了；就算能把肉體復原，讓 Quan 成為 Quan 的靈魂也回不來。</p>
<p>Vivi 堅持自己能把任何東西「恢復成理想的樣子」，甚至指著你身上的破損裝備與 Hildibrand 的傷痕，困惑為什麼它們還要保持那副模樣。Cyr 拿出研究筆記，說 Quan 給他的並不是單純「把事物變回原狀」的力量，而是「把世界改成你認為它應該成為的樣子」的力量；因此 Vivi 的魔法對 Hildibrand 沒有效果，因為 Vivi 在心底知道——這個滿身瘀傷、卻仍固執地站著的 Hildibrand，本來就是「對的」。當 Vivi 追問為什麼他能讓 Grand Sers 變年輕，Cyr 只點出一件事：Vivi 真正了解的 Grand Sers，只有他們口中那些「年輕、自由、充滿火焰」的故事，所以他很容易把他們想像成那個模樣，也很容易把那個模樣強加回去。</p>
<p>Cyr 接著說出 Quan 最後的理解：因為 Vivi 對 Quan 的記憶太深，以至於 Vivi 只能把他想成一位年邁的創造者；若真要強行讓他變年輕，只能奪走那些記憶。但 Vivi 早已不只是魔法人偶，而是朋友、家人，是 Quan 在世上僅剩的一切，所以 Quan 放棄了不朽。即便如此，Quan 仍害怕世界利用 Vivi，最終才奪走他的記憶——是為了保護。可仍有更強的東西留下：Vivi 從來沒有壞掉，也從來沒有被拋棄；Quan 只是想讓他自由。Hildibrand 接住這句話，說那是 Quan 留給他的最後禮物——一段新的生命，一個只屬於 Vivi 自己的故事。</p>
<p>Dorys 不耐煩地把陷阱轉向你們，可 Vivi 卻站到最前方，宣告自己既是 Archmagus Quan 的孫子，也是 Hildibrand 的孩子——而這就是他的故事。你感覺到時間被硬生生往回拉扯，等一切停下來時，彷彿什麼都沒發生過：災厄像被抹去，連你們也像回到原本的狀態。Grand Sers 怒吼後又失去氣焰；Orland 嘀咕著也許變老也不壞，Gonspart 鼓起勇氣向 Dorys 告白，Dorys 只能罵他是個瞎了眼的蠢貨。Hildibrand 醒來後，Cyr 告訴他大家都還活著，Grand Sers 也已被拘押——但 Gigi 不在了。</p>
<p>Hildibrand 沉默片刻，最後仍說如果那是孩子想要的，他就會尊重，並決定繼續走下去，直到某一天再次相遇。這時 Godbert 才說出關鍵：只要核心還在，Gigi 其實沒有真正死去——他只是耗盡以太而進入休眠，之後會靠吸收周遭的以太慢慢恢復，終究會醒。Godbert 說他會先照看孩子，也會把 Grand Sers 帶走；Cyr 卻在一瞬間明白自己回不去 Ishgard——審問體系不會放過他。Julyan 乾脆叫他去 Idyllshire 住進 Hildibrand 的涼亭，替那裡看著點；Cyr 聽著聽著，竟覺得那主意也不壞。</p>
<p>後來在 Idyllshire，Cyr 向你道謝，也帶著羞愧回望過去的自己——他曾死死抱住的「事實」、從不質疑的人生。遇見你、Hildibrand、以及 Gigi，逼他承認自己有多厭惡原本的工作，也逼他明白：追尋真相——完整的真相——才真正重要。他甚至說，被貼上異端、被迫逃離 Ishgard 可能是他最好的轉折，因為現在他能以「顧問檢察官」的身分重新開始。接著他要你見一個人：Lord Godbert 已改造 Gigi 的身體，讓他變得更小，好更有效率地吸收以太；如果你願意帶著他一起旅行，讓他陪你走進冒險裡，也許能讓他更快醒來——直到你們再次相逢。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
