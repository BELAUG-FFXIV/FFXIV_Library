    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>At Crescent Cove, the sound of the surf has barely faded before Merilda rushes up to you, wringing her hands and asking if you are an adventurer. With no one else to turn to, she blurts out what she overheard the previous night: a gang of bandits from the Quiveron Manse, deep in their cups at the village, bragged about their next move. They spoke of gemstones stolen from Copperbell Mines—Nashachite, she thinks—and of meeting a co-conspirator soon at the Footfalls to hand over the illicit spoils. Before she can finish, a familiar stammer cuts in: Fufulupa, who had come all the way from Horizon to thank you in person, has been listening. Horrified by talk of illicit exchanges and shadowy dealings, he declares that the Brass Blades cannot ignore such wrongdoing and vows to report the matter to Captain Baldewyn at once. Merilda turns pale and cries out for him to stop, insisting that the captain himself is working with the bandits, but Fufulupa is already hurrying off, and she begs you to reach the Footfalls and intervene before it is too late.</p>
      <p>You race back toward the Footfalls and arrive just as Fufulupa confronts his commander. Breathless but determined, he begins to report that gemstones are being stolen from Copperbell Mines, only to freeze when he notices the distinctive gauntlets and boots worn by one of the men at Baldewyn’s side—one of Quiveron’s bandits, standing openly among the Brass Blades. Fufulupa points and accuses the man of being a thief and a scoundrel, but Baldewyn merely shrugs and says that his coin is good, and that is all that matters. When Fufulupa demands to know if his own captain is truly working with such men, Baldewyn admits that he told the younger Blade to remain in Horizon for a reason: the bandits would get their Nashachite, he would get his gil, and no one would be the wiser. Fufulupa, aghast, stammers that if these crimes are uncovered—if Lord Lolorito learns the truth—then everything will be ruined, only for Baldewyn to sneer that he is acting under Lord Lolorito’s authority. He mocks the notion that the Brass Blades exist to serve and protect, scoffing that they are not the Immortal Flames and that most men join for coin, not honor. At that moment, another figure appears and fixes you with a furious glare: Ser Baron Von Quiveron IV Esquire, who remembers all too well that you slew his brother, now vows to repay the favor with your death. Seeing his chance to silence every witness, Baldewyn declares that it is in everyone’s best interests if both you and Fufulupa die here, and steel is drawn as the ambush becomes a battle for survival. Together with Fufulupa, you face the captain and his allies, enduring Baldewyn’s taunts and the baron’s spear until, at last, the traitorous officer is struck down and his accomplice falls at your side.</p>
      <p>As the dust settles, a familiar voice cuts through the silence—Leofric, shouting that enough is enough. He steps forward and tells Baldewyn that his partner is dead and his plans are in ruins, and that there is no reason left to fight. Baldewyn snarls at him to stay out of it, warning that he spared Leofric’s life once and will not do so again, but Leofric only counters by asking what mercy Baldewyn expects from the man in whose name he has done so much. Every fisherman in Crescent Cove knew about the planned meeting, he explains; Quiveron’s men could not keep their mouths shut, and word of the smuggling reached Lord Lolorito himself. For a moment Baldewyn can only choke out that “he knows,” clinging to the idea that his rank will shield him, until Leofric reminds him that he too was once a captain, and they both know what happens to those who overstep. Turning to you, Leofric praises your efforts and says you have made the Brass Blades of the Rose proud. Fufulupa, still shaken, stammers that Baldewyn claimed to be acting on Lord Lolorito’s orders, but Leofric dismisses the notion—Lolorito would never waste his time on such a small smuggling scheme, and this treachery is Baldewyn’s alone. Yes, there are plenty of greedy Blades who care for nothing but coin, Leofric admits, yet there are also men like Fufulupa: good and true, respected by the smallfolk. That is why he entrusted him with the dagger—because the Brass Blades of the Rose need a leader with honor, and Fufulupa is the most honorable man he knows. Overwhelmed, Fufulupa breaks down in tears and cries out for his captain, then turns to you and thanks you earnestly for all your help, promising that he and Leofric will escort Baldewyn back to Horizon and asking you to visit him there the next time you return. When you do, he greets you with bright formality and explains that Baldewyn has been arrested and stripped of rank, leaving the Rose without a captain. Until a new one is appointed, Fufulupa has been ordered to serve as acting captain of the Horizon garrison. Though he believes the arrangement will be temporary, he vows to do his utmost to represent his comrades and protect the people of Horizon, and he thanks you once more for your service to the sultanate, calling you a true hero.</p>
    </div>

  JP:{
    langLabel:'日本語',
    pageTitle:'正義を銅の刃に宿し',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>クレセントコーヴの入り江に波の音が響く中、あなたのもとへ駆け寄ってきたメリルダは、息を整える間もなく「あなた、冒険者さんでしょう？」と縋るように声をかける。頼れる相手が他にいないのだと言って、彼女は昨夜耳にした話を打ち明けた。キヴロン別宅跡に巣くう盗賊団の一味が、酒に酔って村の酒場で騒いでいた折、「コッパーベル銅山から盗み出した宝石」を回収する計画を、ろくに隠そうともせず話していたというのだ。ナシャチ石と呼ばれていた気がすると彼女は言い、間もなく足跡の谷で共犯者と落ち合い、品物の受け渡しを行うつもりらしいと続ける。そのとき、震える声が会話に割り込んだ。ホライズンからわざわざ礼を言いに来ていたフフルパが、すべてを聞いてしまったのだ。違法な取引と影でのやり取り──そんな不正を銅刃団が見過ごすわけにはいかないと彼は憤り、すぐさまバルドウィン隊長に報告すると言い出す。メリルダは真っ青になり、「待って、いけないわ」と叫ぶが、フフルパはすでに駆け出しており、彼女は必死の形相で、バルドウィン隊長こそが盗賊たちの協力者なのだと訴え、手遅れになる前に足跡の谷へ向かって彼を止めてほしいと、あなたに懇願するのだった。</p>
      <p>あなたは足跡の谷へと急ぎ、荒れ果てた遺跡の中で、まさにフフルパが隊長に直訴している場面に行き当たる。彼は息を弾ませながら、コッパーベル銅山から宝石が盗まれていることを報告し始めるが、その途中で、バルドウィンの傍らに立つ男の篭手とブーツに目を留め、言葉を失う。それは、キヴロン別宅跡を根城とする盗賊団の者たちが身に着けていたものと同じ装備だった。フフルパは震える指でその男を指し示し、「この者は盗賊であり、ろくでなしだ」と非難するが、隊長は肩をすくめ、「だからどうした、金さえ払えばそれでいい」と、悪びれもせず答える。自分が本当にそんな男たちと手を組んでいるのかと問い詰められると、バルドウィンは、フフルパをホライズンに留めておけと命じた理由をあっさりと口にした。賊どもがナシャチ石を受け取り、自分はギルを受け取る──それだけの話であり、誰にも知られずに済むはずだったのだ、と。罪が露見したらどうするのか、ロロリト様に知られたらどうなるのかと、フフルパが青ざめて問いただすと、隊長は逆上したように「ロロリト様の権限で動いているのだ」と言い放つ。彼は、銅刃団に義や奉仕の心を求めること自体が間違いだと嘲笑い、「ここは不滅隊じゃない、俺たちはギルのためにやっている」と、組織そのものを貶める言葉さえ吐き捨てた。そのとき、新たな影が現れ、怒りに満ちた視線をあなたに向ける。自らを「サー・バロン・フォン・キヴロン四世」と名乗る男は、かつてあなたが自分の兄を討ち取ったことを忘れてはおらず、今度は自分が復讐を果たす番だと高らかに宣言する。バルドウィンは、それで話は決まったとばかりに笑い、この場であなたとフフルパの両方を消してしまうことが、すべての者のためになるのだと言い放つ。こうして卑劣な待ち伏せは、隊長とその一味、そしてフフルパとあなたとの命を懸けた戦いへと姿を変え、嘲りや怒号が飛び交う中、やがて裏切り者の隊長と、その共犯者である男爵は、荒れた谷間に倒れ伏すことになる。</p>
      <p>戦いの緊張がようやく解けたとき、沈黙を破ったのは聞き覚えのある声だった。「もう十分だ、バルドウィン！」と叫びながら現れたレオフリックが、倒れた男たちの間に歩み出てくる。彼は、バルドウィンの相棒はすでに死に、企みも台無しになったのだから、これ以上戦う理由はないと告げるが、バルドウィンは「黙っていろ、レオフリック。お前の命を助けてやったこともあったが、今度は容赦しない」と、かつての因縁を持ち出して彼を威嚇する。だがレオフリックは一歩も引かず、「お前が他人の名を使ってどれほどのことをしてきたか、そのご本人がどんな慈悲をかけてくださるかな」と皮肉を返す。そして、クレセントコーヴの漁師たちは皆、この取引の噂を耳にしていたこと、口の軽いキヴロン一味のせいで、密輸の話がロロリト様のもとにまで届いてしまったことを明かすのだった。バルドウィンは「ご存じだと……？　だが、俺は隊長だぞ、そんな……」と取り乱すが、レオフリックは自分もかつては隊長だったことを思い出させ、その末路がどうなったか、お互いよく知っているはずだと静かに告げる。そして、あなたに向き直ると、よく戦ったと労いの言葉をかけ、ローズ連隊の名誉を守ってくれたことに感謝の意を示す。動揺するフフルパは、バルドウィンが本当にロロリト様の命で動いていると言っていたのかと問いかけるが、レオフリックは鼻で笑い、あの程度の小規模な密輸に、ロロリト様がわざわざ関わるはずがないと断言する。これはすべてバルドウィン個人の企みであり、「銅刃団の連中は皆ギルに目がくらんでいる」といった言葉も、自らの悪事を正当化するための言い訳に過ぎないのだと。確かに、金のためなら母親すら奴隷に売りかねない強欲な輩も少なくはないが、それでもフフルパのように、民からの信頼を集める真面目で誠実な男もいる──だからこそ、自分はあの短剣を託したのだとレオフリックは語る。ローズ連隊には「誇りある隊長」が必要であり、自分の知る限り最もふさわしいのがフフルパだと告げられた彼は、鼻をすすり、ついには堰を切ったように「隊長……！」と泣き声を上げる。それでも彼は気を取り直し、あなたに深々と頭を下げて礼を述べ、レオフリックとともにバルドウィンをホライズンまで護送するので、街に戻った折にはぜひ自分のところを訪ねてほしいと頼むのだった。後日、ホライズンを再び訪れたあなたを迎えたフフルパは、バルドウィンが逮捕され、隊長の地位も剥奪されたため、ローズ連隊には隊長が不在となったことを報告する。そのうえで、新たな隊長が任命されるまでの間、自分がホライズン駐屯隊の「代理隊長」を務めるよう命じられたと打ち明け、これは一時的な措置に過ぎないだろうとしながらも、仲間たちを代表し、ホライズンの民を守るために全力を尽くすと誓う。そして最後に、サルタナ朝に尽くしたあなたの功績に改めて感謝を捧げ、あなたこそ真の英雄だと称えるのだった。</p>

    story:`<div class="clamp" data-collapsed="true">
      <p>在 Crescent Cove 的海邊，Merilda 匆忙跑向你，一開口就確認你是不是冒險者。她說自己實在沒有其他求助的對象，只好突然打擾你，接著把昨晚聽到的事情一股腦倒了出來：昨夜來自 Quiveron Manse 的一群 bandits 在村子裡喝得爛醉，她路過時，無意間聽見他們大聲談論下一步的計畫。那些人說，他們是來回收從 Copperbell Mines 偷出來的 gemstones，好像還提到 Nashachite 這個名字，並約好要在不久後於 The Footfalls 和共犯會合，完成地下交易。話說到一半，一道熟悉的結巴聲突然插了進來——從 Horizon 特地過來、想當面向你道謝的 Fufulupa，恰好把這段對話全都聽了去。他一聽到「不法交易」與「偷偷摸摸的勾當」，立刻激動起來，聲稱 Brass Blades 絕不能坐視這種惡行，一定要立刻通報 Captain Baldewyn 處理。Merilda 聞言臉色大變，急忙阻止他，說你們絕對不能那樣做，因為這位隊長本人就是和 bandits 合作的主謀之一。然而 Fufulupa 已經顧不得多聽，匆匆往內陸方向奔去，於是她只能轉向你，懇求你趕緊前往 The Footfalls，務必在一切釀成大禍之前攔下他。</p>
      <p>你沿著道路急行，回到 The Footfalls 時，正好撞見 Fufulupa 在對 Captain Baldewyn 報告。他上氣不接下氣，說有人從 Copperbell Mines 偷走 gemstones，話還沒說完，目光就被隊長身邊那個男子身上的護手與長靴吸引——那正是 Quiveron 手下常穿的裝備。Fufulupa 立刻指認那人是賊與惡棍，卻只換來 Baldewyn 不以為意的一聲冷哼，說對方的錢來得乾脆，他要的也只有這個。當 Fufulupa 難以置信地問他，難道真的和這些人同流合污時，Baldewyn 乾脆坦承自己正是如此安排的：他原本要 Fufulupa 乖乖待在 Horizon，不就是想悄悄完成這筆買賣嗎？那些 bandits 拿到 Nashachite，他自己收下 gil，從頭到尾沒人會知道這件事。Fufulupa 聽了又急又怕，追問如果罪行曝光、被 Lord Lolorito 知曉會如何，卻被隊長怒斥一聲，說自己正是「受 Lord Lolorito 授權行事」。他嘲笑說，誰會真的相信 Brass Blades 是為了守護與奉獻而存在？這裡又不是 Flames，他們之所以穿上這身制服，就是為了 coin。這時，又有一個人影現身，帶著咬牙切齒的憤怒盯著你——自稱 Ser Baron Von Quiveron IV Esquire 的男人，清楚記得你殺死了他的 brother，如今終於逮到機會，要親自討回這條命。Baldewyn 見狀索性撕破臉，說既然如此，讓你和 Fufulupa 一起在這裡「解決」才是對所有人都最有利的選擇。刀劍拔出，埋伏瞬間變成正面衝突，你與 Fufulupa 並肩應戰，在隊長的嘲諷與男爵的長槍夾擊之下堅守不退，最終仍舊擊倒了這名背叛職責的軍官與他的同夥，終結了這場骯髒的交易。</p>
      <p>戰鬥的餘音剛剛消散，一道熟悉的嗓音便打破了寂靜——Leofric 高聲喊著「夠了，Baldewyn！」，走上前來，站在你們與倒地之人之間。他直言，Baldewyn 的共犯已經死了，計畫也被徹底粉碎，早已沒有繼續戰鬥的理由。Baldewyn 卻咆哮要他少插手，還提起當年曾經饒過 Leofric 一命，揚言這次絕不再手下留情；然而 Leofric 完全不為所動，反倒反問他：既然做了那麼多事，都打著別人的名字，那真正的本人會給他什麼樣的「寬恕」呢？他當場揭露，Crescent Cove 的漁夫們早就知道這場會面，Quiveron 的手下根本守不住嘴，密輸的風聲一路傳進了 Lord Lolorito 耳中。Baldewyn 只能驚叫一聲「他知道了？」，還想抓著自己是 captain 的身分當救命稻草，卻被 Leofric 冷冷打斷——他提醒對方，自己曾經也是 Captain，很清楚一旦犯下這種錯誤，結局會是什麼。說罷，他轉向你，稱讚你戰得漂亮，守住了 Brass Blades of the Rose 的名聲。這時 Fufulupa 還在發抖，結結巴巴說起 Baldewyn 先前提到的「Lord Lolorito 授權」，Leofric 則乾脆否認，表示以 Lolorito 的地位，根本不可能為了這種小規模的 smuggling 親自出手，這一切全是 Baldewyn 自己的私利。至於他說什麼「大家都只在乎錢」、整個組織「沒人比 coin 更重要」之類的話，也不過是拿來合理化自己行徑的藉口。Leofric 承認，Brass Blades 中確實不乏貪得無厭的人，價錢對了甚至會把自己母親賣去當奴隸；但同時，也有像 Fufulupa 這樣、認真守護他人、受到小人物尊敬的成員存在。正因如此，他才會把那把 dagger 交到 Fufulupa 手中——Brass Blades of the Rose 需要一位真正有榮譽感的領袖，而在他認識的人當中，Fufulupa 正是最合適的人選。聽到這裡，Fufulupa 終於忍不住嗚咽出聲，哭喊著「Captain！」，隨後努力收拾情緒，轉向你深深鞠躬道謝，表示接下來會和 Leofric 一同押送 Baldewyn 返回 Horizon，並希望你回城後能再來找他。之後你在 Horizon 再次見到他時，他迎上前來，語氣中還帶著激動，向你報告 Baldewyn 已經被逮捕並剝奪軍階，Brass Blades of the Rose 因此失去了 captain。直到新的指揮官被任命之前，他奉命暫時擔任 Horizon 駐軍的 acting captain。雖然他心裡明白這只是暫時安排，仍然鄭重保證會盡全力代表同袍，守護 Horizon 的居民。最後，他再一次感謝你為 sultanate 所做的一切，稱你是真正的英雄。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
