const i18n = {

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>When your guide turns to the question of where to go next, Alphinaud stops to consider it with care. If you are to understand Ishgard, then the choice should not be made lightly. The manservant explains that to the west stands the Skysteel Manufactory, where engineers devise and forge weapons to use against the dragons, and nearby are the Holy Stables, where chocobos are trained for war. To the north and east lies the seat of the Temple Knights. But when he speaks of the south and east, his voice falters, and he quietly advises that you avoid that quarter altogether.</p><p>Alphinaud presses him for the reason, and the answer comes hesitantly. In the city’s lowest levels, the knights may not be able to guarantee your safety. Before the warning can settle, a rough voice cuts in from nearby, mocking Alphinaud’s refinement and calling out to him as though he were some pampered noble come to gawp at Ishgard’s sights. The drunken man laughs and invites you to visit the Forgotten Knight if you truly wish to see how the other half lives. The manservant apologizes at once and urges Alphinaud to ignore the insult, but Alphinaud does the opposite. He declares that he cannot possibly refuse such a heartfelt invitation. A bustling tavern, he reasons, is one of the richest sources of rumor and recent news, and even if no word of your missing comrades is likely to surface yet, there may still be much to learn. Tataru immediately decides that she will go as well.</p><p>At the Forgotten Knight, your guide once again urges caution. Several of the men inside seem displeased by your presence, but Tataru, far from discouraged, finds herself oddly encouraged by the atmosphere. Alphinaud struggles briefly with the temptation to order a drink, then masters himself. The proprietor, Gibrillont, receives you with curiosity, noting how unusual it is to see not just one new face, but an entire party of them in his establishment. Alphinaud explains that you have only just arrived in Ishgard and wished to acquaint yourselves with the city’s notable places. Gibrillont, amused but welcoming, tells you that while he cannot promise greatness, those seeking decent food and drink could do far worse.</p><p>Alphinaud soon turns the conversation to the tavern’s patrons, having noticed a clear divide between those upstairs and those below. Gibrillont confirms it readily. The upper floor serves peddlers, porters, knights off duty, and others simply passing through—regulars, perhaps, but not true locals. Those from the Brume, on the other hand, gather downstairs, where the meals are cheaper and the drink stronger. When Alphinaud asks what the Brume is called for, Gibrillont explains that when foul weather rolls in, it is the poor souls living in the lowest levels who must endure the worst of it. And it is not only the weather that has scarred them. When wyverns broke through the wards and tore into the city, the Brume suffered most, while the Pillars remained under the protection of the High Houses and the Temple Knights. Many still resent that bitter difference, he says, and if you mean to go below, you would do well to keep your wits sharp.</p><p>That warning is enough for the manservant, who urges Alphinaud to return at once to Fortemps Manor. Yet Tataru has already made up her mind. Rather than leave, she intends to stay. Looking around the tavern, she points out that it is filled with people whose work often takes them beyond the Gates of Judgement. In a place like this, gossip from abroad will come to her on its own. Alphinaud sees the sense in her plan, but he hesitates, asking whether she will truly be safe here alone. Tataru brushes aside the concern with confidence, reminding you both how often she managed the Waking Sands and the Rising Stones by herself, turning away unwelcome visitors often enough that she jokes she would be rich if each one had paid her a gil. Gibrillont adds his own assurance: whatever her talents, he will not allow anyone to lay an unwelcome hand upon a patron in his tavern. At that, the matter is settled. Tataru will remain, while Alphinaud and you return to the manor, leaving her to listen for any whisper that might lead you closer to your missing friends.</p><p>Back at Fortemps Manor, the scent of drink upon you does not escape notice. Emmanellain immediately catches it and seems delighted that you have already begun sampling Ishgard’s taverns. Honoroit remains quiet, while Artoirel asks with measured courtesy how you find the city. When Count Edmont speaks, however, the tone becomes more serious. He asks Alphinaud whether Ishgard has lived up to his expectations. Alphinaud answers honestly that the reality exceeds the dream. With every step he felt the weight of a thousand years of history, and when he walked past the scars left in Foundation by the wyverns’ assault, he understood how easily that history might have ended in catastrophe.</p><p>Count Edmont does not soften the truth. The attack, he says, was devastating. The wyverns spared no one—armed or unarmed, men, women, even children. Ser Aymeric has ordered the defenses strengthened, and each High House has been called upon to contribute what support it can, but there are never enough able bodies for all that must be done. Hearing this, Alphinaud offers your aid at once, eager to repay even in part the kindness House Fortemps has shown you. Though Edmont initially protests that he took you in with no expectation of recompense, he soon admits that Ishgard’s need is too great to reject willing help. He therefore gives Alphinaud work suited to his talents, helping secure provisions from foreign sources through judgment and negotiation. As for you, he says there could be no better help for Artoirel and Emmanellain than a seasoned hero able to act swiftly when required. Artoirel bristles at once, while Emmanellain mocks his brother’s protest, and Edmont silences them both with stern anger, insisting that they show you the respect you deserve. When calm is restored, he asks that you lend his sons your aid, and you agree.</p><p>Afterward, Alphinaud reflects upon what has truly happened. Count Edmont’s hesitation, he says, was never born of lack of need, only appearances. By taking you in, House Fortemps has accepted considerable political risk, and until your worth is made plain to Ishgard, the count will face resistance from his peers. This arrangement, then, serves several purposes at once: you publicly aid Ishgard, the count justifies his patronage, and his sons are kept from straying too far beyond his control. Yet Alphinaud sees more than obligation in it. His own duties may bring him into contact with those who know something of your missing comrades, while your work beside the two young lords will inevitably introduce you to new faces, and perhaps to new allies. The more he considers it, the more certain he becomes that by helping House Fortemps pursue its aims, you may also bring yourselves closer to your own.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> House Fortemps Manservant <small class="muted">(Foundation, X:10.2, Y:11.5)</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="onwards-and-upwards.html">Onwards and Upwards</a></div><div class="row"><a class="link" href="over-the-wall.html">Over the Wall</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'わだかまる雲霧',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>次にどこへ向かうべきかと使用人が口にしたとき、アルフィノはそれをただの見物で終わらせるつもりはなかった。この都を知るためには、行き先ひとつも無意味に選ぶべきではないと考えたのだ。使用人は、西には対竜兵器の設計と製造を担うスカイスチール機工房があり、その近くには軍用のチョコボを鍛える厩舎もあると説明する。北東には神殿騎士団の施設がある。だが南東について触れたとたん、彼の声は目に見えて鈍り、その辺りには近づかないほうがよいと遠回しに告げる。</p><p>なぜなのかとアルフィノが問うと、使用人はためらいながら答える。都の最下層では、神殿騎士でもあなたたちの安全を十分に守れないかもしれないのだという。その言葉が終わるより早く、近くから荒っぽい声が飛んでくる。酔った男は、アルフィノをどこかの坊ちゃんのようにからかいながら、都見物に来たのなら「忘れられた騎士亭」に来てみろと笑う。そこでこそ本当の暮らしが見えるのだと言わんばかりの誘いだった。使用人は慌てて無礼を詫び、気にしないよう願うが、アルフィノはその逆を選ぶ。これほど心のこもった招きを無下にはできない、とあえて受けて立つのだ。賑わう酒場ほど噂と情報の集まる場所はない。行方知れずの仲間たちに関する話がすぐ得られるとは思えなくとも、近ごろの情勢については何かしら耳に入るはずだと彼は言う。タタルもまた、ならば自分も行くと即座に決める。</p><p>忘れられた騎士亭へ着くと、使用人は改めて考え直すよう訴える。店の中には、あなたたちの姿を面白く思っていない者たちが何人もいるように見えたからだ。だがタタルはむしろ、この場にこそ何かありそうだと感じ取っている。アルフィノは一瞬だけ酒に心を引かれながらも、すぐに思い直す。店主のジブリオンは、新顔ひとりならまだしも、こんなふうにまとまって現れるのは珍しいと興味深そうにあなたたちを迎える。アルフィノは、つい先ほど Ishgard に来たばかりで、この都の名だたる場所を知っておきたかったのだと説明する。ジブリオンは気さくに応じ、立派さまでは保証できないが、食事と酒を求めるならここよりひどい店はいくらでもあると笑う。</p><p>やがてアルフィノは、店に集う客の顔ぶれに目を向ける。上の階と下の階では、そこにいる者たちの様子が明らかに違って見えたのだ。ジブリオンはその違いを隠さず語る。上には行商人や荷運び人、非番の騎士など、どこかへ向かう途中や帰り道に立ち寄る者が多い。常連ではあっても、この辺りに根を下ろしているわけではない。一方、下に集まるのはブルームの者たちだ。彼らにはより安い食事と、より強い酒が合っているのだという。アルフィノが、その「ブルーム」という呼び名の由来を尋ねると、荒れた天候の日には濃い霧が最下層に流れ込み、その苦しみをまともに受けるのはそこに住む貧しい者たちだからだとジブリオンは答える。そして苦しめるのは霧だけではない。飛竜が結界を破って都へ侵入したとき、もっとも甚大な被害を受けたのもまたブルームであり、そのあいだ上層は名家と神殿騎士に守られていた。いまなおその差に苦い思いを抱く者は少なくないのだと、彼は静かに警告する。</p><p>その話を聞いた使用人は、もう十分だとばかりに、アルフィノへ屋敷へ戻るよう勧める。だがタタルはここに残るときっぱり言う。見渡せば、この店には「審問門」の外まで仕事で出る者たちが大勢いる。そういう相手と顔をつなげば、新しい噂のほうから自分のところへやって来るはずだと彼女は考えたのだ。アルフィノもその理屈には納得しつつ、彼女ひとりを置いていくことに不安を覚える。するとタタルは、砂の家や石の家をひとりで切り盛りしていたころを思い出してほしいと胸を張る。追い返してきた迷惑な来客の数だけギルをもらっていたなら、今ごろ大金持ちだったはずだと冗談めかしてみせる。ジブリオンも、自分の店の客に無体を働かせるつもりはないと請け合う。それで話は決まった。タタルは酒場に残り、アルフィノとあなたは屋敷へ戻る。彼女はそこで、仲間たちに繋がるかもしれない話を待つことになる。</p><p>フォルタン伯爵邸へ戻ると、酒場に立ち寄った気配はすぐに見抜かれる。エマネランは、早くも都の酒場を楽しんできたのかと面白がり、あなたたちにいっそう親しげな調子を見せる。オノロワは控えめに身を引き、アルトアレールは礼を失わぬまま、都の印象を尋ねる。やがてエドモン・ド・フォルタン伯爵が、アルフィノに Ishgard は期待どおりだったかと問う。アルフィノは、想像していた姿など現実の前では色褪せると率直に答える。一歩ごとに千年の歴史の重みを感じたこと、そして Foundation に残る飛竜襲撃の傷跡を目にして、その歴史がどれほど容易く悲劇に呑まれ得るのかを知ったことを、静かに語る。</p><p>伯爵はその問いに、飾らぬ現実を返す。あの襲撃は壊滅的だった。飛竜たちは武器を持たぬ者にも容赦せず、男も女も、子どもでさえ見逃さなかったという。アイメリク卿は防備の強化を命じ、各名家にも支援が求められているが、なすべきことに対して人手がまるで足りていない。その話を聞いたアルフィノは、これまで受けた厚意に報いるためにも、ぜひ力になりたいと申し出る。伯爵は本来、見返りを求めてあなたたちを招いたのではないと前置きしながらも、Ishgard の窮状を思えば、その申し出を退けるわけにはいかなかった。そこで彼は、アルフィノには判断力と交渉力を生かして、国外から物資を調達するための相手探しや契約の仲立ちを任せる。そしてあなたには、迅速かつ果断に動ける歴戦の英雄として、アルトアレールとエマネランの務めを助けてほしいと頼む。アルトアレールは反射的に反発し、エマネランはそんな兄をからかうが、伯爵はふたりを厳しく叱責し、あなたに払うべき敬意を忘れるなと強く言い渡す。ようやく場が収まると、伯爵は改めて息子たちに手を貸してほしいと頼み、あなたはそれを受け入れる。</p><p>その後、アルフィノは今回の成り行きに込められた意味を静かに読み解く。伯爵が最初に遠慮を見せたのは、本心からためらっていたからではなく、あくまで体面のためにすぎないというのだ。あなたたちを庇護下に置いたことで、フォルタン家は大きな政治的危険を引き受けている。だからこそ、あなたたちが公の場で Ishgard に尽くし、その価値を示す必要がある。そして同時に、それは伯爵が息子たちを見張る手立てにもなる。だがアルフィノは、その仕組みの中に別の可能性も見ていた。自分の務めを通じて行方知れずの仲間に関する情報を得られるかもしれないし、あなたもまた若きふたりを助ける過程で、新たな知己や味方を得るだろう。フォルタン家の目的を進めることは、やがてあなたたち自身の目的を進めることにも繋がる。そう考えるほどに、彼の確信は強まっていくのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> フォルタン家の執事 <small class="muted">（イシュガルド：下層, X:10.2, Y:11.5）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="taking-in-the-sights.html">壮麗なる皇都</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 50～</div></div>`,

  },

    story:`<div class="clamp" data-collapsed="true"><p>當僕從提起下一個該去的地方時，Alphinaud 並沒有把這件事當成單純的觀光。他認為，若要真正了解 Ishgard，那麼接下來該看什麼、該走向哪裡，都值得仔細斟酌。僕從告訴你們，西邊有 Skysteel Manufactory，那裡的工匠與技師負責設計、製造用來對抗龍族的武器，而同方向也有訓練軍用陸行鳥的 Holy Stables。北邊與東邊則是 Congregation of Our Knights Most Heavenly（Ishgard 神殿騎士團的主要據點之一，負責守衛通往 Pillars 與 Holy Vault 的重要通道，也是 Temple Knights 執行警備與維持秩序的重要場所）所在之處。可一說到南邊與東邊，他的語氣便明顯遲疑下來，只低聲勸你們最好不要靠近那一帶。</p><p>Alphinaud 追問原因，僕從這才不安地說出答案。因為在城市最低層的地帶，就連騎士們恐怕也無法確保你們的安全。那句話才剛落下，旁邊便有一道粗魯的聲音插了進來。對方拿 Alphinaud 的模樣與氣質開玩笑，嘲諷他像是哪家嬌貴的小少爺，只是來看風景、看看雕像的。接著，那醉醺醺的男人又放聲大笑，說若你們真想知道「另一半的人」是怎麼活的，就去 Forgotten Knight 喝一杯看看。僕從立刻為這份無禮向 Alphinaud 道歉，還勸他不要把酒鬼的話放在心上。可 Alphinaud 卻反而認真了起來。他表示，這樣一份真誠的邀請，實在沒有拒絕的道理。熱鬧的酒館向來是情報最密集的地方，即便現在未必能立刻聽見失散同伴的消息，也說不定能從各種閒談裡拼湊出近期發生過什麼。Tataru 一聽，便立刻說自己也要一起去。</p><p>等你們來到 Forgotten Knight，僕從又一次壓低聲音勸你們改變主意。店裡有幾個人明顯對你們的到來毫不歡迎，但 Tataru 卻偏偏覺得這地方很對勁。Alphinaud 也一度差點動了想點一杯酒的念頭，但終究還是壓了下來。酒館老闆 Gibrillont 看見你們時，先是露出幾分意外，說自己的店裡偶爾來一張陌生面孔不算什麼，可像這樣一下子來了一整群新臉孔，倒是少見。Alphinaud 便順勢說明，你們才剛抵達 Ishgard，希望趁早認識這座城市裡值得知道的地方。Gibrillont 聽後顯得頗為受用，坦率地說，自己不敢保證這裡有多麼了不起，但若只是想找口像樣的食物與酒，那麼你們總能找到比這裡更差的地方。</p><p>接著，Alphinaud 很快便把注意力放到了店裡的人群上。他看得出來，上層與下層的客人顯然不是同一種人。Gibrillont 也毫不隱瞞地承認了這一點。他說，上面這一層多半是商販、搬運工、休息中的騎士，或者只是經過這裡的人，他們也許常來，卻不算真正住在這附近的人。至於來自 Brume（Ishgard 下層貧民聚居地，位於城市最低處，長年承受嚴寒、濃霧與戰亂帶來的苦難）的人，則通常會聚在樓下，那裡提供的菜色更便宜，酒也更烈，更符合他們的日常。當 Alphinaud 問起這名字的由來時，Gibrillont 便告訴你們，一旦天候惡劣、濃霧席捲進城，真正得承受那些冰冷與濕重空氣的，總是住在最底下的窮人。可折磨他們的從來不只天氣而已。先前 wyvern（龍族中的飛龍種，體型較小，擅長飛行與空中襲擊，在 Ishgard 與 Dravanian Horde（以 Nidhogg 為中心、盤踞 Dravania 一帶的龍族與龍類眷屬勢力，長年與 Ishgard 對立，是 Dragonsong War 中的主要龍族陣營）的戰爭中經常成為直接襲擊城市與居民的前線戰力）衝破防線、闖入城市時，遭受最嚴重破壞的同樣也是 Brume；相較之下，Pillars 卻有 High Houses 與 Temple Knights 的保護。那樣鮮明的差別，至今仍讓不少人心裡懷著不平與怨氣。若你們真打算往更下面走，最好還是把警覺提到最高。</p><p>這番話讓僕從越發不安，立刻勸 Alphinaud 現在就返回 Fortemps Manor。可 Tataru 卻已經看準了這地方的價值，怎麼也不肯離開。她環顧四周後指出，這間酒館裡坐滿了那些經常需要出入 Gates of Judgement 之外的人。若能待在這裡，她幾乎不用自己四處奔走，最新的流言與消息就會主動傳到她耳邊。Alphinaud 不得不承認這個想法很有道理，但他仍擔心她獨自留在這裡是否安全。Tataru 卻滿不在乎地反問，你們難道忘了她以前是怎麼一個人守著 Waking Sands 與 Rising Stones 的嗎？如果每一次把不受歡迎的來訪者趕走都能拿到一 gil，她早就富得不可思議了。Gibrillont 也當場表示，無論她本事如何，自己都不可能容許任何人在他的店裡對客人動手動腳。於是事情就這麼定了下來。Tataru 留在 Forgotten Knight 繼續聽消息，而 Alphinaud 則和你一同返回宅邸，把這座酒館暫時交給她去經營情報的耳朵。</p><p>回到 Fortemps Manor 後，Emmanellain 一聞便察覺到你們身上帶回來的酒氣，立刻笑著打趣，說你們才剛到 Ishgard，居然就已經開始品嚐這座城市酒館的樂趣了。Honoroit 仍舊安靜得近乎不起眼，而 Artoirel 則以一如往常的克制語氣詢問你對這座城市的印象。接著，Count Edmont 也向 Alphinaud 問起同樣的事，問他 Ishgard 是否符合原本的期待。Alphinaud 很坦率地承認，現實遠遠超過自己昔日的想像。每走一步，他都感受到千年歷史壓在這座城市上的重量；而當那些腳步帶他經過 Foundation 中被飛龍襲擊後留下的傷痕時，他也第一次真正明白，這份歷史其實隨時可能墜入悲劇之中。</p><p>Count Edmont 並沒有粉飾那場災難。他直言，那次攻擊帶來的破壞極其慘重，wyvern 根本不分對象，無論是手無寸鐵的男人、女人，甚至孩子，都沒有得到絲毫寬待。如今 Ser Aymeric 已下令騎士們強化防衛，而各個 High Houses 也都被要求提供一切力所能及的支援，但眼前最大的問題仍是人手短缺。聽完這些，Alphinaud 立刻提出，若你們能幫上忙，那麼這正好也是回報 House Fortemps 善意的機會。Count Edmont 起初仍以主人的身分表示，自己收留你們並非為了索取回報，可在 Ishgard 如今如此缺人、缺力的情況下，他終究無法拒絕這份主動伸出的援手。於是他把適合 Alphinaud 的任務交給了他——憑藉他的判斷力與說服力，去協助尋找可信的外地供應來源、斡旋契約與物資問題。至於你，Count Edmont 則直言，再沒有比你更適合協助 Artoirel 與 Emmanellain 的人了。你是經歷無數戰鬥的老練戰士，在必要時能迅速而果斷地行動。Artoirel 幾乎立刻表示反對，說自己完全不需要你來插手，而 Emmanellain 則不客氣地嘲笑哥哥，說有名英雄願意幫忙做事，哪個傻子才會拒絕。Count Edmont 隨即厲聲喝止兩人，要他們收起失態，拿出符合身分的舉止，並以你應得的敬意對待你。他強調，你不是來搶走誰的光彩，也不是誰的跑腿。等場面終於安靜下來後，他再次鄭重請求你協助他的兩個兒子，而你也接受了這項安排。</p><p>等眾人散去後，Alphinaud 才把整件事真正看透。他說，Count Edmont 方才表面上的遲疑，其實並不是因為不想讓你們幫忙，而只是出於場面上的分寸。House Fortemps 願意庇護你們，本身就已經冒了極大的風險；在你們真正向 Ishgard 證明自身價值之前，Count Edmont 勢必會在大小事務上遭到其他貴族與同僚的壓力。正因如此，他才需要讓你們公開地為 Ishgard 出力，一方面證明自己的選擇並沒有錯，一方面也順便把兩個兒子放在可控制的範圍內。可對 Alphinaud 而言，這份安排並不只是義務而已。他所接下的工作，或許會讓他接觸到知道你們同伴下落的人；而你在陪同那兩位年輕貴族處理各種責任的同時，也必然會在 Ishgard 結識更多人，甚至找到新的盟友。越是把這件事想清楚，他就越相信——只要你們幫助 House Fortemps 達成他們的目的，你們自己的目的，也會跟著一步一步向前推進。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 福爾唐家的執事 <small class="muted">(伊修加德下層, X:10.2, Y:11.5)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="taking-in-the-sights.html">皇都巡禮</a></div><div class="row">任一戰鬥／魔法職業（不含受限職業）Lv. 50</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="onwards-and-upwards.html">雲上的騎兵團</a></div><div class="row"><a class="link" href="over-the-wall.html">越過高牆</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
