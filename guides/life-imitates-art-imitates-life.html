const i18n = {
  EN:{

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
<p>Nashu greets you like she’s been waiting to explode with news. She’s been digging into the Kugane Wolf Burglar—the thief who can’t resist leaving a cheeky calling card—and she insists he’s nowhere near as invisible as he imagines. He’s robbed the rich repeatedly, yes, but witnesses have seen him often enough that Nashu even tried to sketch his face from their descriptions. When your reaction offers little encouragement, she drops the idea with a huff and pivots to a plan: the wolf targets the wealthy, so you’ll question the rich and famous from different angles and see what new thread turns up.</p>
<p>Your rounds paint a picture of a criminal who’s both infamous and increasingly brazen. One victim fumes that the thief ruined his peace and should be paraded and boiled alive; another insists he only looks wealthy and can’t imagine the wolf bothering with someone of modest means; a third, more interested in his pipe than your questions, repeats the rumor that the burglar works alone and has even been seen stealing in broad daylight. When you regroup, Nashu seizes on that last detail—overconfidence always ends with someone getting smacked, she says—and admits you’d have better odds if you knew what the wolf planned to strike next.</p>
<p>Right then, Shigure nearly barrels into someone in his hurry and apologizes with polished urgency. He recognizes Nashu, insists he isn’t habitually trampling pedestrians, and confesses he’s been consumed by his own investigation. He actually has a lead: a private auction featuring foreign wares, with whispers of “particularly extraordinary” items. The timing feels too neat—if the wolf has been quiet, an auction like this could be the bait. Nashu begs to come along, and when Shigure doubts you can afford entry, she confidently claims you can buy him a thousand times over. Flustered, he agrees and leads you to Kogane Dori.</p>
<p>At the reserved venue, Shigure explains the guests will arrive any moment. Master Akebono appears as well and confirms he’s here, warning that if you and he want the same item, he won’t yield easily—though money changers are available for foreign currency. The broker welcomes the “prosperous and esteemed elite” and begins the bidding with a grotesque curiosity: a misshapen fiend said to grant eternal life if eaten. Koban fly, and Akebono wins it without hesitation. Nashu watches, unsettled, and before she can decide how worried she should be, the auction moves on.</p>
<p>The next item is announced with theatrical pride: something brought from the West, from “Eorzea”—The Eorzean Gentleman. The broker gushes that “statue” is too small a word, insisting the piece is so lifelike it resembles a man frozen in time. Nashu stares, stunned: it looks exactly like Inspector Hildibrand. Shigure notices something else—he thinks it twitched. Nashu leaps to the wildest conclusion: what if it really is Hildibrand, somehow frozen by temporal magicks? She reaches for the solution she always reaches for, and Shigure begs her to stop before she turns the auction into a massacre. Nashu relents, but as she watches, the “statue’s” expression shifts, as if terror is creeping in.</p>
<p>The broker panics and improvises, claiming this isn’t a mere statue at all, but some unheard-of hybrid of sculpture and automaton—look how its features change so fluidly. The bidding restarts, higher than before. Nashu realizes what’s happening: if you do nothing, they’re going to buy the inspector. You raise the stakes, and Akebono laughs—there’s nothing in this world he cannot buy—then pushes the price even further.</p>
<p>Before the sale can settle, everything breaks at once. The broker coughs and shouts in alarm: by the kami, The Eorzean Gentleman has vanished. In its place lies the familiar calling card—“You have just been robbed by the Kugane Wolf Burglar!” Shigure curses the thief for striking again, and Akebono wheezes that he saw him: a fiend with wolfish features, fleeing toward the Short Pier with the stolen “statue.” Nashu doesn’t hesitate—Hildibrand has been stolen, kidnapped—and you have to chase the wolf down before he does something unthinkable.</p>
<p>At the Short Pier, you meet Shigure again with a ship captain who claims he saw the culprit board a boat with the statue on his back and head toward the Ruby Price. Shigure takes it as proof of the burglar’s arrogance: stealing something so conspicuous in broad daylight leaves a trail you can follow. Nashu is still reeling at the idea that someone managed to steal Inspector Hildibrand at all, but she keeps moving—because wherever that boat went, you have to be close behind.</p>
<p>You reach the Ruby Price and press the local watch for answers. A guard admits he hasn’t seen any wolfman with a stolen statue. With Garlean forces withdrawn from Doma and the Ruby Sea, traffic has surged, and they’ve been ordered to wave through smaller vessels unless there’s clear cause. If your thief passed through, he likely received no more than a cursory glance. Shigure thanks him anyway, then turns back to you with the real problem hanging between you: if the watch didn’t stop the boat, then the next step is to find who else has reason to keep a close eye on these waters.</p>
</div>

    langLabel:'日本語',
    pageTitle:'金で買われる事件屋',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
<p>ナシュはあなたを見るなり、目を輝かせて駆け寄ってきた。あの「クガネの狼賊」について聞き込みを重ねた結果、相手は自分で思っているほど忍びやかではないらしいと言う。富豪たちから散々奪ってきたのは確かだが、例のふてぶてしい書き置きを必ず残すほど自尊心が強く、目撃情報も意外と多い。証言を集めたら、顔の特徴まで絞れたので、ナシュは自分なりに似顔絵まで描いてみせる。あなたの反応が芳しくないと見るや、彼女は苦笑して話を切り替え、次は狙われた「金持ち側」を直接当たろうと提案する。彼女はコガネ通りへ行き、あなたは茶屋と宿へ――そうして新しい糸口を探すことになった。</p>
<p>聞き込みの先で浮かび上がるのは、狼賊の悪名と大胆さだった。被害者の一人は、盗まれた壺を思い出して怒りに震え、見せしめに煮殺してほしいとまで言う。別の男は、茶屋に通うから裕福に見えるだけで、実際はささやかな身の上なのだと弁解し、狼賊に狙われる理由はないと語る。宿で煙管をくゆらす男は、狼賊は仲間を持たぬ「一匹狼」で、赤誠組も手掛かりが掴めず、最近は白昼堂々と盗みを働く姿すら見られるほど図太くなっている、と言い放つ。あなたがナシュのもとへ戻ると、彼女はその「白昼堂々」という言葉に食いつき、調子に乗った相手ほど痛い目を見るのだと息巻く。だが同時に、次の標的が分かればもっと捕まえやすいのに、と歯がゆさも滲ませた。</p>
<p>そこへ、慌ただしく駆けてきたシギューが誰かにぶつかりかけ、丁重に詫びる。ナシュと再会した彼は、歩行者を踏みつける癖などないのだと弁明しつつ、捜査のことで頭がいっぱいだったと告げる。そして、つい先ほど得たという手掛かりを明かした。異国の品を集めた私設の競りが近く開かれ、「特に特別な品」が出るという噂まである。狼賊がしばらく動いていない今、この競りは危うい匂いがする――そう感じさせる話だった。ナシュは同行を願い出るが、シギューは品を買えるのかと疑う。するとナシュは、あなたには彼を千回でも売り買いできるほどの金があるのだと豪語し、シギューは戸惑いながらも案内を承諾してコガネ通りへ向かわせた。</p>
<p>会場はすでに競りのために貸し切られており、客が到着するのを待つばかりだった。そこへアケボノも姿を見せ、あなたたちが狼賊を警戒して来たのだろうと見抜く。外貨を使う者のために両替商も用意していると言い、もし同じ品を望むなら譲らぬと宣言する。口達者な仲買人が「富める選ばれし者たち」を歓迎し、最初の品として、延夏の山中で捕らえられた奇怪な魔物を披露する。食せば不老不死だと煽り、巨額の入札が飛び交い、アケボノが競り落とした。</p>
<p>続いて仲買人は、西方――エオルゼアから運ばれたという「像」を誇らしげに紹介する。だが彼は「像」という言葉では足りないと言い、時間の中に閉じ込められた生身の男のようだと語り、「エオルゼア紳士」と名付けて見せた。ナシュは凍りつく――それはヒルディブランドに瓜二つだった。シギューは光のせいかと思いながらも、その像が僅かに動いたのではないかと呟く。ナシュは、もしや時の魔法で固められた本物のヒルディブランドでは、と疑い、爆弾に手を伸ばすが、シギューが必死に止め、無辜の人々を巻き込むなと懇願する。ナシュも渋々引き下がる。</p>
<p>その間にも像の表情が変わり、恐怖が滲むように見える。仲買人は狼狽しつつも機転を利かせ、これは彫像ではなく彫刻と自動機械が融合した未曾有の逸品だ、と言い張って競りを再開する。価格は跳ね上がり、ナシュは焦る――このままでは人々がヒルディブランドを買ってしまう。あなたがさらに入札すると、アケボノは豪快に笑い、世に買えぬものなどないと言って上乗せした。</p>
<p>だが決着の前に、場が崩れる。仲買人が咳き込み、神々の名を叫ぶ――「エオルゼア紳士」が消えたのだ。残されたのは、あの書き置き――「クガネの狼賊に盗まれた」。シギューは盗人を罵り、アケボノは狼のような顔つきの賊が像を担いでショートピアへ走ったのを見たと証言する。ナシュは即座に断じる。ヒルディブランドが盗まれた、さらわれたのだ、と。あなたは狼賊を追わねばならない。</p>
<p>ショートピアでは、船頭が賊が像を背負って船に乗り、ルビーの店へ向かったと語る。シギューは、白昼にあれほど目立つ獲物を奪えば足跡が残ると判断し、急いで追うべきだと言う。あなたたちはルビーの店へ辿り着くが、見張り役は狼男と像を見ていないと答える。ドマと紅玉海から帝国軍が退いた後、航行が増えたため、小舟は理由がなければ通すよう命じられているのだ、と。シギューは礼を述べ、そしてあなたに視線を向ける。見張りが止められなかったのなら、次は――この海域を注視する「別の誰か」を探すしかない。</p>
</div>

  ZH:{

    pageTitle:'被拍賣的調查員',

    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
<p>Nashu 一看到你就興沖沖地跑來，說她有大消息。她這陣子一直在打聽那個 Kugane Wolf Burglar——就是那個每次都要留下一張囂張「名片」的竊賊——結果發現他其實沒自己想得那麼神出鬼沒。確實偷了不少富商，而且毫無疑問就是他做的，因為他從不忘留下那張自鳴得意的字條；但更關鍵的是，目擊者居然不只一次看過他的身影。Nashu 把證詞全部拼起來，甚至覺得資訊多到足夠「畫出那傢伙的臉」，於是自信地拿出一張草圖，還問你覺得她這個自學的畫工如何。你沒給她期待的回應，她立刻乾笑著收回去，說那就回到「比喻上的畫板」重來。</p>
<p>她很快改成更務實的做法：既然竊賊專挑富商下手，那就直接去問「被盯上的那群人」。她要去 Kogane Dori，你則去 Umineko Teahouse 和 Shiokaze Hostelry，各自打聽，再回來交換情報。一路問下來，你聽到的不是線索多精準，而是怒氣多誇張：有人被提到那個名字就暴跳如雷，說如果世上有公理，就該把他押上街遊行再丟進 Tenkonto 煮；也有人急著撇清自己其實沒那麼有錢，說自己只是愛去茶屋，那是唯一的奢侈，財產其實很普通，所以 Wolf Burglar 應該不會找上門；還有人一邊抽著煙管，一邊不耐煩地說他沒親眼見過，但大家都知道那人是個「lone wolf」，Sekiseigumi 也抓不到任何線索，最近甚至膽大到白天就敢下手。</p>
<p>你回到 Kogane Dori 跟 Nashu 碰頭，她立刻抓住「白天也敢偷」這件事興奮起來，說她跟著 Hildibrand 走跳學到一件事：太自信的人很容易被媽媽用魔法平底鍋敲醒。可她也承認，如果你們能知道下一個目標是誰，抓人就會容易得多。就在她話音未落時，旁邊有人驚呼，Shigure 匆匆忙忙撞上路人，立刻禮貌道歉，說自己剛才一心只想著調查。Nashu 認出他就是前幾天那個 samurai，還笑著喊他「Shiggy-something」。Shigure 也想起你們，急忙澄清自己不是習慣踩人，只是被案情纏住了。</p>
<p>而他確實帶來了新情報：他剛得知有一場私人的拍賣會，會展出不少外來的異國物品。Kugane 有拍賣不稀奇，但 Wolf Burglar 已經有一陣子沒出手了，如今卻傳出這場拍賣會上會出現「特別不得了」的物件——他覺得太可疑了。Nashu 立刻要求跟去，Shigure 卻懷疑你們買不起。Nashu 直接把你推上前，誇口說你有錢到能把 Shigure 買賣一千次。Shigure 明顯被噎到，只能尷尬同意，帶你們前往 Kogane Dori 的會場。</p>
<p>場地已被包下，客人很快就會到。Master Akebono 也在場，他認出你們是「inspectors」，說如果你們想盯著 Wolf Burglar 就盡管盯；而若你們看上什麼物品，現場也有換匯的人能協助使用外幣。不過他同時提醒：若你們和他看上同一件東西，他不會輕易讓步。接著，口才極好的主持人迎接「富有而尊貴的菁英」，第一件拍賣品竟是一隻從 Yanxia 山野抓來的畸形怪物，還被誇張地稱為「ratman」，說吃了牠的肉就能獲得永生。競價瞬間飆高，最後 Akebono 以驚人的金額拿下。Nashu 看得發毛，忍不住嘀咕他不會真的要吃吧。</p>
<p>第二件拍賣品更離譜。主持人說那是從西方、也就是 “Eorzea” 運來的「雕像」，卻又立刻否定「雕像」這個詞，說那是傑作中的傑作——The Eoruzean Gentleman，細節精緻到像是一個活人被凍在時間裡。Nashu 一眼就愣住：那張臉跟 Inspector Hildibrand 一模一樣。Shigure 也皺眉，說他剛剛是不是看到那「雕像」動了一下。Nashu 立刻把事情往最可怕的方向想：會不會那根本就是 Hildibrand，被 temporal magicks 凍住了？她下意識想掏出炸彈把人「炸回會動的世界」，Shigure 急得求她住手，說那樣會把在場的人全拖下水，市場也會被毀掉。Nashu 勉強同意，但你們眼睜睜看著那「雕像」的表情變了——原本的神情不見了，取而代之的是濃到幾乎要溢出的驚恐。</p>
<p>主持人明顯慌了，卻硬是把話圓回來，說這不是普通雕像，而是雕塑與 automaton 的前所未見混合體，才能像這樣「自然變臉」。他順勢把起標價再拉起來，競價聲又一次沸騰。Nashu 壓低聲音對你說：你得做點什麼，否則這些人真的會把 Hildibrand 買走。你一出價，Akebono 立刻大笑，說世上沒有他買不起的東西，並把價格推到更誇張的高度。</p>
<p>就在主持人要落槌時，他忽然咳嗽著尖叫，說出大事了：The Eoruzean Gentleman 不見了。現場只留下那張熟悉的字條——「你已被 Kugane Wolf Burglar 洗劫」。Shigure 怒罵那個可惡的竊賊又出手了；Akebono 更是喘著氣說他親眼看見對方，那是一個帶著狼一般面貌的怪人，扛著「雕像」往 The Short Pier 方向逃走。Nashu 當場下結論：Inspector Hildibrand 被偷了——更準確說，是被綁走了。你們必須立刻追上去，因為誰也不知道那個竊賊會對他做出什麼事。</p>
<p>你們趕到 The Short Pier，又遇上 Shigure 和一名船長。船長說他確實看到那個 Lupin 背著一個扭曲得像人的東西上了船，往 The Ruby Price 的方向去了。Shigure 判斷這正是破綻：在大白天搶走這麼顯眼的「戰利品」，必然會留下能追的路徑。你們一路追到 The Ruby Price，卻從守衛口中得到冷冰冰的回應：他沒見過什麼狼男和被偷的雕像。自從 Garlean forces 撤出 Doma 與 Ruby Sea 後，往來船隻變多，上頭要求只要沒有明確理由，就讓小船直接通過——那個 Lupin 大概只被草草看了一眼就過了。Shigure 禮貌致謝，然後把問題留給你：既然守衛沒攔到，那下一步只能去找——還有誰，會有理由緊盯著這片水域。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
