        story:`<div class="story"><p class="meta-line">20:53 Cutscene</p><p>Louisoix tells you that he did not perish. When the cage forged from the essences of the Twelve was destroyed, the sky filled with a colossal cloud of aether, and that drifting power answered the prayers of those fighting below—and his own desperate wish to save the dying realm—by infusing him with the power of a primal. He became the immortal Phoenix, ancient symbol of rebirth.</p><p>Rising into the heavens, he struck Bahamut with all his newfound strength. The blow shattered Bahamut’s earthly form, and a shower of aether rained down upon the land—thus beginning the rejuvenation of Eorzea. Believing the deed done, Louisoix relinquished his hold on that staggering energy so it could return to the realm without delay.</p><p>But Bahamut’s will endured. Even on the cusp of oblivion, the dragon reached out to claim him, and within Louisoix’s fast-fading form enough of the Phoenix’s energy remained to give Bahamut purchase—so Louisoix was dragged along in his wake. Alphinaud says that was the beginning of Louisoix’s existence as the elder primal’s thrall, and Alisaie marvels that though nearly obliterated, Bahamut still seized the power Louisoix surrendered.</p><p>Alisaie says that would explain why part of Bahamut’s physical form survived to be entombed underground, and Alphinaud adds that it would also explain why Eorzea was warped so terribly—while the land sought to restore itself, the returning flow of aether was cut off. Louisoix agrees, saying Bahamut devoured every last mote of aether that still floated in the air, yet was still not fully restored, for much of the freed aether had already returned to the land.</p><p>Louisoix says that it did not need to be—not for a being sustained by the marvels of Allagan technology. As long as some piece of Bahamut persists, the coils will seek it out and continue their regenerative task. From the surface, Dalamud’s fragments appear motionless, but deep beneath the ground they have been searching—tunneling through rock and soil toward their escaped prisoner—and as you have seen, they found his heart.</p><p>He bids you heed him: you must stop Bahamut’s regeneration. Whether for man or dragonkind, the question of justice is irrelevant—the elder primal will leave nothing but a smoldering wasteland for both his children and yours. He begs you to defend Eorzea and guide its people to the future they still struggle to find, and says this portal will take you to the final internment hulk—it is time for the tale to end.</p><p>Louisoix then draws Alphinaud and Alisaie close, telling them their hopes and dreams must no longer be an extension of his, and that they must find their own reason to fight in this sea of chaos. Alphinaud vows he will see this newborn Eorzea survive and flourish, and Louisoix tells Alisaie that even while he was in thrall her words reached him—imprisoned though his soul was—urging her to see this fight to its culmination, for he has faith in her strength as well. Alisaie thanks him and bids him rest, and Louisoix gives what he has left to you and blesses his grandchildren—before Alisaie turns you onward, reminding you your task remains undone.</p></div>`,

        story:`<div class="story"><p class="meta-line">20:53 カットシーン</p><p>ルイゾワは告げる。自分は死んではいない。十二神の本質から組み上げた檻が砕けたとき、空は巨大なエーテルの雲で満たされた。その漂う力は、下で戦う者たちの祈りと、滅びゆく世界を救いたいという自分の切なる願いに応え、蛮神の力を自分へと注いだのだと言う。こうして自分は、不死鳥フェニックス――再生の古き象徴となったのだ、と。</p><p>天へ舞い上がり、新たに得た力のすべてでバハムートを打った。その一撃は地上の肉体を砕き、エーテルの雨が大地へ降り注いだ。これがエオルゼア再生の始まりだった。成し遂げたと思ったルイゾワは、その莫大な力を手放し、遅滞なく世界へ還ることを望んだのだと言う。</p><p>だが、バハムートの執念を見誤っていた。滅びの淵にあってなお、竜は手を伸ばしてルイゾワを掴んだ。急速に薄れゆく姿の内に、なおフェニックスの力が残っていたがゆえに、バハムートはそこへ取りつくことができたのだ。そして引きずられ、エルダー・プライマルの従属者としての存在が始まった――とアルフィノが言葉を継ぐ。アリゼーは、ほとんど消滅しかけていたのに手放された力を奪い取った、その生への執念に驚きを隠せない。</p><p>それなら、バハムートの肉体の一部が地下に埋もれて残った理由も説明できる――アリゼーはそう言い、アルフィノはさらに、エオルゼアがひどく歪んだ理由にもなると続ける。大地が自らを修復しようとする一方で、戻るべきエーテルの流れが断たれていたのだ、と。ルイゾワは頷き、存在を繋ぎ止めたバハムートは空中に漂う最後の一粒まで貪り尽くしたが、それでも完全ではなかったと言う。すでに多くのエーテルは大地へ還っており、残りだけではあの巨体を完全に再構築するには足りなかったのだ、と。</p><p>しかし、すべてを揃える必要はなかった――アラグの技術の驚異に支えられる存在にとっては。バハムートの欠片がひとつでも残る限り、コイルはそれを探し当て、再生の作業を続ける。地上からは動かぬように見えるダラガブの破片も、地の底では岩と土を掘り進み、逃れた囚人へ向けて捜索していた。そしてあなたたちが見たとおり、心臓に辿り着いたのだ、と。</p><p>ルイゾワはあなたに言い聞かせる。バハムートの再生を止めねばならない。人のためか竜のためか、正義がどうかは関係ない。エルダー・プライマルは、自分の子らにも人にも、燻る荒野しか残さない。どうかエオルゼアを守り、まだ見つけきれない未来へ人々を導いてほしい――そう懇願する。そしてこの転移門が最後の拘束具へ通じている、今こそ霊災における物語を終わらせる時だと言う。</p><p>続いてルイゾワはアルフィノとアリゼーを近くへ呼び寄せる。おまえたちの希望と夢は、もはや自分の延長であってはならない。この混沌の海で、この国のために戦う自分自身の理由を見つけねばならない――そうできるか、と。アルフィノは、生まれたばかりのエオルゼアが生き延び、繁栄することを使命にすると答え、ルイゾワはアリゼーへ、従属者であった間も言葉は届いていたのだと告げる。そしてこの戦いを最後まで見届けよ、自分はおまえの強さも信じていると言う。アリゼーが礼を述べて休息を願うと、ルイゾワは残るすべてをあなたへ託し、愛しい孫たちへ光の祝福を祈る――そしてアリゼーはあなたへ向き直り、務めはまだ終わっていないと促す。</p></div>`,

        tabs:{story:'故事概要', req:'需求條件', acq:'解鎖任務', unlock:'後續任務', comments:'留言'},
        story:`<div class="story"><p class="meta-line">20:53 過場動畫</p><p>Louisoix 說，你們的確猜到了——他沒有死去。當那座由 Twelve 的本質構築的牢籠被摧毀時，天空被龐大的以太雲填滿；那股漂流的力量回應了下方戰士的祈禱，也回應了他拚命想拯救瀕死世界的願望，將 primal 的力量灌注到他身上。於是他成了不死鳥 Phoenix——象徵重生的古老存在。</p><p>Louisoix 說，他升上高空，以新獲得的力量全力擊向 Bahamut；那一擊粉碎了 Bahamut 的地上形體，化作以太之雨灑落大地——Eorzea 的復甦就此開始。他以為事情已了，便放開對那股驚人能量的掌握，只盼它能立刻回歸世界，不再被任何人攫住。</p><p>可 Bahamut 的意志沒有崩潰。即使站在消亡的邊緣，那條龍仍伸手抓住了 Louisoix；而 Louisoix 那迅速消散的形體裡，還殘留著足以讓 Phoenix 之力被抓住的部分，於是 Bahamut 把他也一起拖走。Alphinaud 接著說，從那一刻起，Louisoix 便成了遠古 primal 的奴僕；Alisaie 則不得不承認，Bahamut 幾乎被抹滅殆盡，卻仍能奪走他所放開的力量，那份求生執念令人震驚。</p><p>Alisaie 說，這也解釋了為何 Bahamut 的部分形體仍能存留，並被封埋在地下；Alphinaud 也補上一點：Eorzea 之所以被扭曲得如此嚴重，是因為大地在試圖自我修復的同時，回流的以太卻被截斷了。Louisoix 肯定你們的推論，說 Bahamut 一旦重新抓住「存在」的支點，便不停吞噬空氣中最後一絲以太；可他仍未完全恢復，因為那時大部分被釋放的以太早已回到大地，剩下的根本不足以把那樣龐大的形體完整重建。</p><p>然而 Louisoix 說，對一個由 Allagan（古代亞拉戈帝國）技術奇蹟支撐的存在而言，並不需要「完整」。只要 Bahamut 還殘存任何一小部分，coils 就會循著它，持續進行再生。從地表看來，Dalamud 的碎片彷彿一動不動；但在地底深處，它們一直在搜尋——鑽穿岩層與土壤，朝著逃脫的囚徒逼近。而你們已親眼看見，它們找到了他的「心」。</p><p>Louisoix 要你記住：你必須阻止 Bahamut 的重生。不論是為了人，還是為了龍族，「正義」都已經無關緊要——elder primal 最終只會把你們的孩子與他的孩子一併留在一片焦灼的荒原之中。他懇求你守護 Eorzea，帶領人們走向那個仍在掙扎尋找的未來，並告訴你這道傳送門會把你送往最後的 internment hulk；是時候讓 Bahamut 在 Calamity 中的故事走到終點了。</p><p>接著 Louisoix 叫 Alphinaud 與 Alisaie 靠近，說你們的希望與夢想不該再只是他的延伸；在這片混亂之中，你們必須找到自己為這個世界而戰的理由。Alphinaud 立刻回答，他早已立志要讓新生的 Eorzea 活下去並繁盛起來；Louisoix 則對 Alisaie 說，即使他仍被 Bahamut 支配，那些關於「相信人的力量」的話也傳到了他的靈魂深處，並要她把這場戰鬥帶到最後——因為他同樣相信她的力量。Alisaie 向他道謝，請他安息；Louisoix 把自己所剩的一切託付給你，並祝福他的孫子孫女永遠受 Light 庇護——而 Alisaie 轉向你，催你出發：你們的任務還沒有完成。</p></div>`,

    });

    langToggle.addEventListener('click',()=>{
      const cur=getLang();
      const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
      localStorage.setItem(LANG_KEY,next);
      applyLang(next);
    });

    applyLang(getLang());

    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };

    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }

    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }
  </script>
</body>
</html>
