    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You’ve been trading up step by step, and Wuk Lamat insists you be the one to hold the next bargaining piece. With Mablu’s help, you climb onto the alpacas she’s provided—while Wuk Lamat keeps muttering prayers that none of them will spit. Mablu urges everyone onward toward the mate fields, reminding you how alpacas made it possible for the Pelupelu to become traveling merchants across Tural, and as the road stretches out, even Wuk Lamat can’t help staring up at the sheer, unreal height of the mountains ahead.</p><p>At the mate garden, Wuk Lamat and Mablu both end up speaking from somewhere personal. Mablu asks about Wuk Lamat’s past with the Dawnservant, then admits Tobli took her in when she had nowhere else to go—along with the ranch hands who work under him. Everyone is grateful, she says, and yet she’s the only one who wants to leave and become a peddler. She tries to laugh it off and refocus on the task: you still need to keep trading your way toward a taming saddle for the Feat of Gold.</p><p>Miplu, the owner of the fields, receives you with measured interest. Wuk Lamat offers a hatchet; Miplu agrees the quality is acceptable, but proposes only an even exchange. Mablu tries to press the value—harvesting season should raise demand—but Miplu calmly explains she prepared long ago. When Mablu pivots to favors and goodwill, Miplu answers just as plainly: she stands with the Second Promise and believes his innovations will make hatchets unnecessary.</p><p>So Wuk Lamat shifts the bargain to what Miplu actually needs right now—hands in the fields. You join her, and Mablu refuses to be left behind. When you return with healthy bundles of leaves, Miplu counts the labor as added value and rewards you with a full sack of the highest-grade mate leaves. Mablu lights up at the success…and then falters, confessing she still hasn’t told Tobli she plans to leave. Wuk Lamat answers without scolding: she’s pursuing her own path not because her father demands it, but because she believes it will protect Tural’s peace—and Mablu should choose her own life, too, then speak honestly and find out where Tobli truly stands.</p><p>The trading continues until it finally becomes almost frighteningly real: Gobli’s praise leaves Mablu steadier than before, and you’re carrying a ten-thousand-pel jug of premium mezcal across the plaza because Wuk Lamat’s hands won’t stop shaking. Havli doesn’t soften his terms—bring premium mezcal, or go elsewhere—and Wuk Lamat sets the jug down like it’s the finish line. Havli admits he’d rather support no claimant but Zoraal Ja, but he won’t violate Pelupelu principles: a fair trade is a fair trade. He crafts the saddle, already dreaming aloud of tasting that smooth mezcal.</p><p>Back at the ranch, you find the others have been learning alpaca care in your absence, and Mablu eagerly teaches Wuk Lamat how to saddle one before she attempts to catch a wild alpaca. To Wuk Lamat’s shock, the practice animal barely reacts—no spitting, no panic—and Mablu explains the saddle is coated in a singular scent alpacas find soothing. Wuk Lamat finally looks at the animal properly, and the words slip out before she can stop them: it’s…kind of cute.</p><p>Then Zoraal Ja returns—exactly as he intended—with a strange, glowing alpaca and proof of his own progress. Sareel Ja takes the moment to needle Wuk Lamat, praising overwhelming strength and presenting it as the natural order. Wuk Lamat refuses to yield the meaning of the rite to brute force; she insists she’ll be the one to find the golden city so Tural can remain at peace. Zoraal Ja answers with something colder: peace, to him, is forged through war and suffering—people must be taught conquest by living it. Alphinaud pushes back with what he’s seen of Garlemald’s violence and ruin, but Zoraal Ja dismisses the empire as foolish in a different way, while Sareel Ja declares his ambitions even larger than Tuliyollal itself.</p><p>When it’s time for Wuk Lamat to attempt the valley hunt, you and the others can’t enter with her, so you stay—watching, waiting, doing what you can. As the hours stretch, Erenville explains how he once left Tural to join Sharlayan’s gleaners at his mentor’s urging, chasing a hunt he could never complete while clinging to the familiar. Krile recognizes the shape of his unfinished trail, and the truth lands: yes—he was tasked with finding the city of gold, and now the rite has tangled his purpose back into the open. When anxiety finally rises to breaking, you hear movement…then Wuk Lamat’s exhausted voice. She made it. She’s spent to the edge of collapse, but alive, and when she accepts the tent and the rest you offer, her thanks is simple—because it’s meant for all of you.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>これまで順調に交易を重ねてきたあなたに、ウクラマトは「次の品はあなたが持って」と言い残す。マーブルが用意したアルパカに乗り込むと、ウクラマトは露骨に身をこわばらせ、唾を飛ばされないよう祈るように呟き続ける。マーブルはマテの畑へ向かう道中、アルパカがいたからこそペルペル族は広いトラルを旅する商いを成り立たせられたのだと語り、ウクラマトは山のあまりの高さに思わず名を確かめるように口にする。</p><p>目的地に着くと、マーブルはふと真剣な声で切り出す。ウクラマトが黎明王に引き取られたことを知っているからこそ、同じ境遇として分かるのだと。自分も孤児で、トーブリに拾われたのだと言い、しかも彼は牧場の手伝いをする者たちをまとめて受け入れてきたのだと明かす。皆が恩に報いようと働く中で、ただ自分だけが外へ出て商人になりたいのが怖い――そう漏らしながらも、今は「金の試練」に備えて手なずけ鞍を手に入れねばならない、と話を戻す。</p><p>畑の持ち主ミプルは、ウクラマトの来訪に興味を示しつつも慎重だ。ウクラマトが差し出した手斧に対し、ミプルは「品質は悪くない」と認めるが、提示するのは同額の交換だけ。マーブルは収穫期なら手斧の需要が高いはずだと価値を上げようとするが、ミプルは事前に十分確保していたと淡々と返す。さらにマーブルが好意や繋がりに望みを託すと、ミプルは第二王子コーナの改革に期待しており、いずれ農作業に手斧は要らなくなる、と立場を明確にする。</p><p>そこでウクラマトは、今この畑に必要なものへ話を切り替える。収穫を手伝えば条件を上乗せできるか――ミプルは即座に頷き、あなたとウクラマトは畑へ向かう。マーブルも「自分もやる」と加わり、三人で健やかな葉を束ねて届ける。労働分を価値として加えたミプルは、最高級のマテの葉を一袋渡し、交易は成立する。マーブルは成功に笑いながらも、トーブリに進路を告げられず不安だと打ち明けるが、ウクラマトは「自分の人生を選ぶべきだ」と言い切り、まず話して確かめるよう背中を押す。</p><p>交易はさらに進み、ゴーベリからの言葉がマーブルの自信を少しだけ強くする。そしてあなたは、落としたらすべてが水の泡になりかねない「一万ペル」の高級メスカルの壺を抱え、ウクラマトに託されてハヴリの工房へ向かう。ハヴリは条件を曲げないが、交易が成立したと知ると、個人的な好みよりもペルペル族の理念を優先し、鞍を作ると約束する。完成した鞍を受け取った瞬間、長い交換の道筋が確かな形になる。</p><p>牧場へ戻ると、留守を守っていた仲間たちもアルパカの世話を覚えていた。マーブルはウクラマトに鞍の付け方を教え、実際に一頭で練習させる。意外にもアルパカは落ち着いており、マーブルは鞍に塗られた特別な香りがアルパカを鎮めるのだと説明する。ウクラマトはようやく相手をまじまじと見つめ、「意外と……かわいい」とこぼしてしまう。</p><p>しかし空気はすぐに変わる。ゾラージャが戻り、奇妙に光を帯びたアルパカを連れて現れたのだ。サリールジャはその光景を、圧倒的な力の証として語り、ウクラマトを嘲るように言葉を重ねる。ウクラマトは力だけでは王座も平和も得られないと反発し、黄金の都市を見つけてトラルの平穏を守るのだと宣言するが、ゾラージャは平和は戦の炎で鍛えられるものだと冷たく言い放つ。アルフィノは自ら見てきた帝国の惨禍をもって反論するものの、ゾラージャとサリールジャはなお譲らず、野望の射程をさらに遠くへと伸ばしていく。</p><p>やがて、野生のアルパカを捕らえるため、ウクラマトは危険な谷へ一人で向かう。あなたたちは入れずとも、その場に残って見守り、待ち続ける。長い時間の中でエレンヴィルは、かつて故郷を離れ、シャーレアンのグリーナーとして世界を巡る道を選んだ理由を語り、クルルはその言葉から黄金の都市の影を見抜く。心配が募り始めた頃、足音がして――ウクラマトの掠れた声が届く。成し遂げたのだ。限界まで疲れ切りながらも戻った彼女は、あなたたちの支えを受け取り、信じて待ってくれたことへ、素直に礼を告げる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>你們一路把交易做得越來越漂亮，Wuk Lamat 卻在出發前把下一個籌碼塞到你手上，說這次該由你來保管。Mablu 準備了溫馴的 alpaca 讓你們代步，你才剛跨上去，Wuk Lamat 就一臉僵硬地碎念著「別吐口水、拜託別吐口水」，彷彿只要講得夠多次就能避開災難。Mablu 一邊帶路一邊說，若沒有 alpaca，Pelupelu 根本不可能成為走遍 Tural 的旅行商人；而當遠方山勢壓得人喘不過氣時，Wuk Lamat 也忍不住盯著那高度發怵。</p><p>抵達瑪黛茶園後，話題突然變得很私密。Mablu 問起你們口中的「Dawnservant」——也就是把 Wuk Lamat 收養的人——因為她自己也是孤兒。她說 Tobli 把她帶回來，也把牧場的工人們一起收留；大家都努力做事，想回報「總帳主管」的恩情，可偏偏只有她想離開牧場，去當一名旅行商人。她說到一半又趕緊收住，提醒自己先把眼前要緊事辦完：你們得繼續把交易往上推，才能在「金之試煉」之前換到馴服用的鞍具。</p><p>你們找到田主 Miplu，Wuk Lamat 拿出手斧開口談交換。Miplu 認可品質，卻只肯用同價的一袋瑪黛葉換回去。Mablu 試著強調收成季的需求、再拉近關係求一點「人情」，但 Miplu 很平靜地表示她早就備齊工具，而且她支持的是 Koana——她相信他的改革會讓農作方式徹底改變，連手斧都不再需要。</p><p>交易眼看卡死，Wuk Lamat 乾脆把籌碼改成「現在田裡最缺的東西」：人手。只要你們願意幫忙收成，Miplu 立刻點頭。你、Wuk Lamat、Mablu 一起下田，照她要求挑健康的葉子把束成捆的收穫帶回來。等你們交出份量，Miplu 把勞動也算進價值裡，改用最高級的瑪黛葉一整袋回報你們。Mablu 開心得發亮，卻又立刻低下頭——她承認自己還沒敢跟 Tobli 開口，怕他不接受她要離開去當旅行商人的決定。Wuk Lamat 沒有責備，只說你該選自己想過的人生，然後去跟 Tobli 好好談，別讓猜測一直折磨你。</p><p>交易再往上衝，Gobli 的一句稱讚讓 Mablu 的底氣多了一點點，而你們終於換到了那只「一萬 pel」的 premium mezcal。Wuk Lamat 緊張到手發抖，把壺直接塞給你，拜託你一路抱著帶去找鞍匠 Havli——她光想像摔碎就要崩潰。Havli 一開始態度很硬，說價碼就是 premium mezcal；但當你們真的把壺放到他面前，他也不得不承認這是一筆公平交易。就算他口頭上更想幫 Zoraal Ja，他仍遵循 Pelupelu 的原則，把鞍具做了出來，甚至一邊收起 mezcal 一邊忍不住想像那股滑順的滋味。</p><p>回到牧場時，其他人也沒閒著：有人被吐口水噴到懷疑人生，有人已經能把飼料放到手心讓 alpaca 直接吃。Mablu 興奮地說在去抓野生 alpaca 前，得先教 Wuk Lamat 怎麼上鞍；Wuk Lamat 仍不情願，但還是硬著頭皮練習。更意外的是，那頭 alpaca 幾乎沒有抗拒，像是完全接受她的觸碰。Mablu 立刻解釋，鞍具塗了特殊氣味，對 alpaca 來說很安撫。Wuk Lamat 盯著牠看了又看，最後像是被自己說出口的話嚇到似的低聲承認：其實……還挺可愛的。</p><p>可下一刻，緊繃感就被硬生生拉回來。Zoraal Ja 回來了，牽著一頭看起來甚至在發光的 alpaca；Sareel Ja 以此嘲諷你們，說野獸面對壓倒性的力量就會屈服，這正好證明 Zoraal Ja 的優勢。Wuk Lamat 立刻反擊：光靠力量贏不了爸爸的王位，她會找到 golden city，讓 Tural 繼續和平。Zoraal Ja 卻冷冷回她一句——和平只能在戰火裡鍛出來，人必須親身受過恐懼與絕望才會懂。Alphinaud 以 Garlemald 的崩壞與廢墟回應，仍無法動搖對方；而 Sareel Ja 甚至把野心講得更遠，彷彿連整個星球都要被「統一」。</p><p>接著輪到 Wuk Lamat 去完成最兇險的一步：她必須獨自前往 Oruncanca 的谷地，嘗試捕捉野生 alpaca。你們無法同行，只能留下來守著、等著。等待變得漫長時，Erenville 把自己的過去說了出來——他年輕時被導師要求離開故鄉、加入 Sharlayan 的採集者，去看遍世界、浸在各種風土裡，才能找到自己真正追尋的東西。Krile 聽著聽著，突然抓到關鍵：他追的，正是 golden city。當焦慮快要壓垮每個人，你們終於聽見聲音——Wuk Lamat 回來了，筋疲力盡，卻沒有倒下。她接受你們搭起的帳篷與扶持，聲音很輕，卻清清楚楚把那句話送到每個人面前：謝謝你們相信她、也願意等她回來。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 烏克·拉瑪特 <small class="muted"> 奧闊帕恰山（X:28.3, Y:12.5)</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="knowing-the-pelupelu.html">了解佩魯佩魯族</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
