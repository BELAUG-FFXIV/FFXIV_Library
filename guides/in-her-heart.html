    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>In Treno, even strangers greet you like family. An affable local welcomes you warmly, and not long after, Eyaney grows concerned—Krile has been gone a while. As a newcomer, Krile wouldn’t know where to turn if trouble found her, so Eyaney asks you to check on her near town hall. She manages to steady her worry with evidence: the detector is running again, and it hasn’t registered any new threats.</p><p>You search the streets, but among the small folk moving about, none is Krile. Asking around leads you back to the same affable local, who immediately understands who you mean. He tells you he spoke with Krile earlier—and that she even saved him, spotting a lightning sprite he’d completely missed until it was almost upon him. He admits it felt a little awkward to chat after she’d just protected him, yet he couldn’t help opening up; Krile has a way of putting people at ease, much like Miayli. Still, when she left, she carried a quiet melancholy. Not knowing whether words would help, he let her go, but he suspects she’d welcome a good friend’s company. He saw her head toward the canal.</p><p>You find Krile there, exactly as he said—seated for what she meant to be only a moment, time slipping by unnoticed. She asks you to listen. Beneath her calm, a question has been gathering like storm clouds: the Source and the Ninth—someday, she must choose which one to call home. She tried to ignore it, telling herself there were more urgent matters, but she cannot drift between worlds forever.</p><p>When she first learned the truth of her past, she believed it would change nothing. The Source was her home, and the Students of Baldesion her purpose. But meeting her parents changed the weight of that certainty. To choose the Source outright would feel like abandoning them—and abandoning the home she might have loved, had her life unfolded differently. That is why she needed to learn this place, and the person she could have been here. And now, after seeing Treno’s people welcome you as their own, after learning what they endure, she feels less certain than ever. What would it say about her if she simply left them and returned to the Source? Is this who she is—or who she was meant to be? Or is this where she belongs?</p><p>When she finishes, she thanks you. Speaking it aloud makes her less afraid of the answer—whatever it turns out to be. And she hopes that when she finds it, you’ll still be there. Then she remembers Eyaney, waiting, and she stands—ready to return.</p><p>Back with Eyaney, relief comes first: you’re both safe, and with you escorting Lumull, he’s less likely to get himself in trouble—unless he manages to tumble down the stairs into town again. With the immediate worry eased, Krile’s mind goes right back to history and meaning. She’s noticed the structures near the barrier are sized for Milalla, but the city center is built on a larger scale. Eyaney explains: the center is the oldest part of Treno, built by the Hyune and the Eldite before the Milalla arrived.</p><p>Krile presses the implication—Treno predates the Milalla, so what happened to the other peoples? Eyaney answers plainly: Alexandria. In the final days of the Storm Surge, with destruction everywhere, they believed Alexandria would be safer. Treno had no barrier at first. But a Milalla who had served as a tutor in the royal household returned with knowledge of the barrier’s design, and that knowledge is why the city still stands.</p><p>Then Krile asks the question she can’t keep from asking—personal, but rooted in what you’ve uncovered. Records say the Milalla left their “paradise of eternal summer” when “a great calamity froze their isles.” Some tried to return using the same power that brought them here, but the way was closed. “Never again has the golden path opened…” Krile asks Eyaney: if that golden path opened again—and the Milalla homeland was restored—would she go back?</p><p>Eyaney smiles at the idea of seeing it, but she draws the line clearly: it wouldn’t be “going back.” Her only home is here—Treno: run-down, beat-up, and beautiful. She recites the words the Speaker gave when the Milalla first arrived, a vow of life and togetherness on a faraway shore. Her family never forgot them, and neither did the city. Treno’s identity is that boundless optimism and communal spirit—choosing joy over fear, standing together no matter how hard it gets. There’s nowhere else she’d rather be.</p><p>Krile hears it, and something in her steadies. Maybe it really is that simple—listening to your heart.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    pageTitle:'大地に根づく花のように',

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>トレノでは、見知らぬ相手にも自然と声がかかる。気さくな住人はあなたを歓迎し、楽しめているかと笑ってみせる。だがその頃、エヤネーは落ち着かない。クルルが戻らないのだ。街に不慣れなクルルに何かあったら、助けを求める場所さえ分からないかもしれない――そう案じたエヤネーは、役所の方角へ向かった彼女の様子を見てきてほしいと頼む。とはいえ、ひとまずの安心材料もある。検知器を動かし直したが、新しい反応は出ていないのだ。</p><p>あなたが探し回っても、小柄な人々の姿はあってもクルルは見当たらない。手がかりを求めて声をかけると、先ほどの住人が事情を察し、「黄色いフードの女性」――クルルのことだろうと言う。彼は少し前に彼女と話していたうえ、雷のスプライトに気づかず危ないところを助けられたのだと感謝する。助けられた直後に世間話を始めるのは少し気まずかったが、クルルは人を安心させるのが上手で、ミアイリのように自然と心の距離を縮めてくれた。だからこそ、彼女に街のことを語る時間は心地よかったのだという。</p><p>ただ、別れ際のクルルにはどこか物憂い気配があった。自分の言葉のせいかとも思ったが、そうだとしても追いかけて話しかけるのは逆効果だと感じ、彼は見送った。彼女は運河の方へ向かったらしい。今のクルルには、きっと「良い友」の同伴が必要だ――そう彼は言う。</p><p>運河で見つけたクルルは、まさにその通りだった。少し腰を下ろすつもりが、いつの間にか時間を忘れていたと言い、あなたに耳を貸してほしいと願う。彼女の胸に長く居座っているのは、ソースと第九世界――いつか、どちらを「帰る場所」と呼ぶかを決めねばならないという問いだ。重要な課題があるのだと自分に言い聞かせ、考えないようにしてきた。だが、いつまでも世界の間を漂うわけにはいかない。</p><p>過去の真実を知った当初、クルルはそれが未来を左右するとは思わなかった。ソースが故郷であり、バルデシオン委員会が使命だと信じていたからだ。だが両親と出会ったことで、決断の重さが変わった。ソースを選ぶことは、彼らを置き去りにすることに思えてしまう。そして、本来なら愛せたかもしれない「もうひとつの故郷」まで捨てることになる――だからこそ、彼女はこの地と、「ここでの自分」を知る必要があったのだ。</p><p>ところが、知れば知るほど確信は揺らぐ。見知らぬはずの彼らが、まるで昔馴染みのように受け入れてくれる。苦難を知った今、彼らを置いてソースへ帰るなら、それは自分に何を語るのか。自分は何者で、どこに属するのか――クルルは迷いを言葉にする。話し終えると、彼女は礼を言う。答えが何であれ、向き合う怖さが少し薄れた。そして、答えに辿り着く時、あなたがそばにいてほしいと願う。だが同時に、エヤネーを待たせたことも思い出し、急いで戻ろうと立ち上がる。</p><p>エヤネーは二人の無事に胸をなで下ろし、弟のルムルもあなたが付き添っていれば大事故にはならないだろうと冗談を交える。落ち着いたところで、クルルは街の造りへ疑問を向ける。バリア付近の建造物はミララ向けの規格に見えるのに、中心部はなぜあれほど大きいのか。エヤネーは答える。中心部はトレノ最古の区域で、ミララが来る以前にヒューネとエルダイトが築いたのだと。</p><p>ならば、今ミララしか見かけないのはなぜか。エヤネーは「アレクサンドリアへ行った」と言う。ストームサージ末期、死と破壊が満ちる中で、そこがより安全だと信じたのだ。そもそもトレノには最初、バリアがなかった。だが王家で家庭教師を務めていた働き者の同胞が、バリア設計の知識を持ち帰り、それがあったからこそ街は今日まで生き延びた。</p><p>そしてクルルは、個人的な問いを投げかける。記録には、ミララが「常夏の楽園」を去ったこと、「大いなる災厄が島々を凍らせた」こと、帰還を試みても「黄金の道」は二度と開かなかったことが記されていた。もしその黄金の道が再び開き、故郷がかつての輝きを取り戻していたなら――あなたは戻るか、と。エヤネーはその景色を見てみたいと目を輝かせつつも、「戻る」ことにはならないと言い切る。自分の唯一の故郷はここ、トレノだ。ボロボロで、くたびれていて、それでも美しい街。</p><p>彼女は、ミララがこの地へ来た時にスピーカーが告げた詩句を語る。遠い岸辺で命が花開くように、脆い花びらを恐れず広げるように、暗い嵐から守る空の下で手を取り合い咲き続けるように――その言葉を祖先も祖母も、弟も自分も忘れなかった。限りない楽観、共同体の精神、それがトレノなのだ。どれほど苦しくても、恐れより喜びを選び、共に立つ。ここ以上の場所はない。クルルはそれを受け止め、心に耳を澄ませることの大切さを思うのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    </div>`,

    story:`<div class="clamp" data-collapsed="true"><p>在 Treno，連陌生人都會自然地對你露出笑容。一位熱情的居民說，客人永遠受歡迎，希望你在這裡玩得愉快。可另一頭，Eyaney 卻有點坐立難安——Krile 遲遲沒回來。她提醒你：Krile 才剛到這座城市，如果真的出了什麼事，她甚至可能不知道該往哪裡求助。她請你去看看，因為 Krile 是往 town hall 的方向走的。</p><p>Eyaney 也努力讓自己冷靜下來：她剛把偵測器重新啟動，確認目前沒有新的訊號反應，至少代表 Krile 沒有陷入「立刻的危險」。你在指定地點搜尋，街上確實有不少身形嬌小的居民走動，但怎麼看都不是 Krile。也許有人看見她經過——你只好向路人打聽。</p><p>那位熱情的居民看出你有點迷路，主動問要不要幫忙。你一開口，他就明白你指的是誰：「你是說 Krile 吧？剛才我還跟她聊得很開心。」他補上一句更沉重的感謝——Krile 還救了他一命：他完全沒注意到那隻雷精靈，等它幾乎貼到身上才驚覺，幸好 Krile 及時出手，才讓他毫髮無傷。救完人再聊家常其實有點尷尬，畢竟他也很久沒有跟「不是一輩子都認識的人」聊天了，但 Krile 很會讓人放鬆，就像 Miayli 一樣，能把緊張與距離慢慢化開。他很享受跟她聊 Treno 的事。</p><p>然而他也察覺到：Krile 聊完離開時，神情有一點淡淡的憂鬱。他說自己不確定原因是什麼，也不覺得是自己講錯話；但他直覺若真是如此，追上去再講更多反而只會更糟，所以就讓她走了。他最後告訴你，Krile 往運河方向去了——而且他覺得，她現在應該會想要有「真正的朋友」陪在身邊。</p><p>你在運河邊找到 Krile。她抬頭時先道歉：本來只想坐一下，結果不小心忘了時間。接著她請你聽她說——不是工作，不是推理，而是她心裡那片一直壓著的陰影。Source 與第九世界……她終究得做出選擇：到底哪一邊才是她要稱作「家」的地方。那個念頭像暴風雲一樣在腦中盤旋，她一直試著忽略，提醒自己還有更重要的事要處理；可她也明白，自己不可能永遠在兩個世界之間漂浮。</p><p>她說，最初得知身世真相時，她以為那不會影響未來。Source 是她的家，Students of Baldesion 是她的目的——她一直這樣相信。可是見到自己的父母之後，她忽然意識到：如果她只選擇回到 Source，那就像是在拋下他們；不只拋下他們，也拋下那個「本可以被她愛上的家」——如果她的人生按原本的軌跡走下去，她也許會在這裡長大、在這裡扎根。正因如此，她才必須更了解這片土地，也必須去看清那個「她本可以成為的自己」。</p><p>你問她「那現在呢？」她卻說自己反而更不確定了。因為這裡的人明明與你們素不相識，卻像把你們當成自己人一樣接納，甚至像在跟老朋友說話。更何況，知道他們正在面對的困境後，她開始懷疑：若她就這樣離開、回到 Source，那她到底算是什麼樣的人？她的歸屬究竟在哪裡？她低聲問自己：這就是她——她「本來就該成為的樣子」嗎？還是她其實就屬於這裡？</p><p>說完後，她向你道謝。把這些話說出口，讓她沒那麼害怕去面對未來的答案——不論答案是什麼。她也希望當她真正找到答案時，你會在她身旁。可她很快想起 Eyaney 還在等，便催促自己起身：該回去了。</p><p>回到 Eyaney 身邊，Eyaney 先是鬆了一口氣，說你們平安回來太好了。她半開玩笑地說，有你這位朋友盯著 Lumull，他應該不至於惹出太大的麻煩……除非他又像上次一樣，自己從樓梯滾下去跑回城裡。危機解除後，談話轉向更深的線索。Krile 注意到：靠近屏障的建築似乎都以 Milalla 的身形尺度來設計，但城市中心的建物卻明顯更大。Eyaney 解釋：中心區是 Treno 最古老的部分，是 Milalla 到來之前，由 Hyune 與 Eldite 建造的。</p><p>Krile 追問：既然如此，為什麼你們進城後幾乎只看見 Milalla？Eyaney 的回答指向一個熟悉又刺痛的名字：Alexandria。她說在 Storm Surge 的末期，到處都是死亡與破壞，其他族群認為去 Alexandria 會更安全。畢竟 Treno 起初並沒有屏障。之後，是一位勤勉的 Milalla 同胞曾在王室擔任導師，帶著「屏障設計」的知識回到這裡——也正因為那份知識，Treno 才能活到今天。</p><p>Krile 接著提出她真正想問的「個人問題」。她說你們之前找到一些記錄：Milalla 曾離開「永恆盛夏的樂園」，因為「巨大的災厄凍結了他們的群島」。並非所有人都甘願離鄉；有人嘗試用同樣的力量回去，卻發現道路對他們封閉了——「通往祖先得以逃往安全之地的黃金之路，再也沒有開啟過。」Krile 問：如果那條黃金之路再度開啟，而 Milalla 的故土也恢復昔日榮景……Eyaney 會回去嗎？</p><p>Eyaney 的眼睛亮了一下，她說自己當然想親眼看看那個「永恆盛夏的樂園」，誰不想？但她立刻補上一句：那不叫「回去」。因為她唯一的家就在這裡。Treno，這座破舊、挨打、卻美得讓人放不下的城市。她便說起一段她們從未忘記的話：當 Milalla 初到此地時，祝禱者曾為他們祝禱——生命要在遙遠的岸邊繁盛，要無畏地綻放脆弱的花瓣，要在這片天空的庇護下躲過最黑暗的風暴，並在此手牽著手，一同開花直到永遠。她說，她的祖先沒有忘、祖母沒有忘、她和哥哥也沒有忘。那份無邊的樂觀、那份彼此扶持的精神，就是 Treno。無論再苦再難，他們都會選擇喜悅而非恐懼，並肩站在一起，她沒有任何地方比這裡更想待。Krile 聽完低聲說：或許，真的只要聽聽自己的心就好。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 艾雅妮 <small class="muted">(特雷諾, X:10.6, Y:11.0)</small></div></div>`,

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
