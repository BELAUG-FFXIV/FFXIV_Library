<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`You Have Selected Regicide`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>E-Sumi-Yan explains that the wards sealing the king’s sanctuary can only be undone with enchanted keystones—the same method used five years ago when the king was first summoned to Eorzea. Back then, with no keystones in hand, the Seedseer Council had no choice but to sanction the slaying of the guardians who carried them, a decision made with deep regret. This time, however, the elementals have spared you that burden.</p><p>He tells you that Kuplo Kopp has been entrusted with a set of keystones by the Mogglesguard themselves, yet Kuplo Kopp refuses to hand them over, unwilling to betray their trust. E-Sumi-Yan admits he has tried and failed to find another way into the king’s sanctum—and he cannot delay any longer, fearing the moogles may succumb to their liege lord’s corrupting influence. You must go to Kuplo Kopp at Westshore Pier, impress upon him the urgency of the situation, and secure his aid.</p><p>When you find Kuplo Kopp, he presses you to explain your plan—then realizes E-Sumi-Yan has already told you about the keystones. If there truly is no other way, he agrees to help. He tells you to take the ferry to Sweetbloom Pier, and says he will go on ahead.</p><p>At Sweetbloom Pier, the air turns tense as moogles confront one another in raised voices. Kupta Kapa accuses Kuplo Kopp of lying and insists they will not allow what he intends. Kuplo Kopp fires back that the king will never be satisfied, no matter how many crystals he is given. Others denounce him for consorting with a Hyur and brand him a traitor plotting treason against the crown, while Kupdi Koop declares that Kuplo Kopp—and all who defy the will of Good King Moggle Mog XII—will soon answer for their crimes. Kuplo Kopp warns you that the king is planning to purge the Twelveswood of his enemies, and that you must stop him before it is too late.</p><p>Kuplo Kopp then leads you toward the Bramble Patch, telling you the entrance to Thornmarch lies deep within. If you escort him safely, he can nullify the ward—but the Mogglesguard has set traps that lure enchanted beasts, and he cannot hide from them. As hostile presences close in, you fight to keep him safe and within reach until you reach the warded entrance at last. There, Kuplo Kopp steadies himself and tells you to raise your hand and focus like you would when attuning to an aetheryte, so he can open the way.</p><p>With the path unsealed, Kuplo Kopp leaves the rest to you—urging you to teach the foolish moogles a lesson and send the king back whence he came. You face Good King Moggle Mog XII in Thornmarch (Hard), and when it is done, Kuplo Kopp can scarcely contain his relief: the king is no more. He thanks you, convinced that you stopped the Mogglesguard just in time, and hopes they will finally come to their senses instead of clinging to faerie tales. He sends you to Pukni Pakk, who is with Raya–O at Camp Tranquil, so the news can be relayed to the chieftain.</p><p>At Camp Tranquil, Pukni Pakk can hardly believe what she is hearing—Good King Moggle Mog XII has fallen. She tells you that all mooglekind owes you a debt, and quietly steps aside when she senses Raya–O wishes to offer congratulations as well.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row">Quest Giver <span class="muted">E-Sumi-Yan (Old Gridania, X:6.0, Y:10.6)</span></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="hail-to-the-king-kupo.html">Hail to the King, Kupo</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div>
      <div class="row kv"><span class="k">Unlock Trial</span><span class="v"><a class="link" href="thornmarch-hard.html">Thornmarch (Hard)</a></span></div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="on-the-properties-of-primals.html">On the Properties of Primals</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'善王モグル・モグXII世による粛清',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>E-スミ・ヤンは、王の聖域への立ち入りを阻む結界は「魔法の要石」によってのみ無力化できるのだと告げる。五年前、王がはじめてエオルゼアに召喚された際にも用いられた方法であり、当時は要石を所持していなかったため、要石を守っていた護衛を討つことを認めねばならなかった――その判断を彼は深い悔恨とともに語る。だが今回は、精霊の加護により、同じ重荷を背負わずに済みそうだという。</p><p>彼は、クプロ・コップがモーグリ親衛隊から要石一式を託されていると打ち明ける。しかしクプロ・コップは信頼を裏切りたくないがために、要石を渡すのをためらい、別の手段を探してほしいと懇願してきたらしい。E-スミ・ヤンは他の方法を探したものの見つけられず、これ以上の猶予は危険だと告げる。王の「腐敗の影響」によりモーグリたちが堕ちてしまう前に、あなたは西桟橋で待つクプロ・コップのもとへ向かい、事情を伝えて協力を乞うことになる。</p><p>西桟橋でクプロ・コップに会うと、彼は方法を問いただしつつも、要石の話をすでに聞いたのだと察する。ほかに道がないのなら手を貸す、と彼は決意し、あなたにスウィートブルーム桟橋へ渡し船で向かうよう告げ、自分は先に行くと言う。</p><p>やがてスウィートブルーム桟橋では、モーグリ同士の激しい口論が起こっていた。クプタ・カパは嘘をつくなと怒鳴り、あなたの企みを許さないと迫る。クプロ・コップは、いくらクリスタルを捧げても王は決して満足しないのだと訴えるが、周囲は「ヒューランと通じた」と非難し、王への反逆を企てる裏切り者だと糾弾する。さらにクプディ・クープは、グッドキング・モグル・モグXII世の意思に逆らう者はいずれ罪を問われるのだと宣告する。クプロ・コップは、王が黒衣森の敵を粛清しようとしているのだとあなたに告げ、手遅れになる前に止めねばならないと訴える。</p><p>クプロ・コップは、ソーンマーチへの入口がブランブル・パッチの奥にあると案内し、結界を無力化するには自分をそこまで護衛してほしいと言う。親衛隊の罠が「魔獣を誘い寄せる」ため、彼は身を隠せず、あなたが守り抜かなければならない。敵意の気配が次々と迫るなか、あなたは彼を守り、離れすぎないよう注意しながら結界の入口へたどり着く。そこで彼は、エーテライトに触れるときのように手をかざして集中するよう促し、道を開く準備を整える。</p><p>結界が解かれると、あとはあなた次第だとクプロ・コップは背中を押し、愚かなモーグリたちに思い知らせ、王を元の場所へ送り返してほしいと告げる。あなたは「ソーンマーチ（ハード）」でグッドキング・モグル・モグXII世と対峙し、戦いを終える。戻ったクプロ・コップは、王が倒れたことに安堵し、親衛隊を止めてくれたことへの感謝を口にする。そして、彼らが童話じみた遊びから目を覚ますことを願い、族長にも厳しい言葉があるだろうと言う。最後に、キャンプ・トランキルでラヤ＝オと共にいるプクニ・パックへ報告し、族長へ知らせてもらうようあなたに頼む。</p><p>キャンプ・トランキルでプクニ・パックは、王が倒れたという報せに驚きつつも、モーグリたちは皆あなたに恩義があると告げる。さらに、ラヤ＝オもあなたを祝福したがっている気配を感じ取り、二人きりで言葉を交わせるよう静かに場を外す。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row">クエスト発行 <span class="muted">エ・スミ・ヤン（グリダニア：旧市街, X:6.0, Y:10.6）</span></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="hail-to-the-king-kupo.html">無垢なる爆走</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 50～</div>
      <div class="row kv"><span class="k">討伐戦開放</span><span class="v"><a class="link" href="thornmarch-hard.html">善王モグル・モグXII世討滅戦</a></span></div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="on-the-properties-of-primals.html">邪なる手引き</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'大逆不道',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>E-Sumi-Yan 告訴你，封鎖國王聖域的結界只能靠「附魔的鑰石」才能解除——這正是五年前國王第一次被召喚到 Eorzea 時所用的方法。當時他們手上沒有任何鑰石，只能含著遺憾批准討伐握有鑰石的守護者；但這一次，在 elementals （元素精靈）的保佑下，你們似乎不用再背負同樣的代價。</p><p>他接著說，Kuplo Kopp 曾向他坦白：Mogglesguard 把一整套鑰石託付給了他。可 Kuplo Kopp 不願背叛對方的信任，央求 E-Sumi-Yan 另尋他法進入國王的聖域。E-Sumi-Yan 表示他已經嘗試過，卻找不到其他途徑；更不敢再拖延，因為他擔心 moogles 會在他們的君主影響下逐漸受到腐化。你必須前往 Westshore Pier 找到 Kuplo Kopp，讓他明白情勢緊迫，並請他伸出援手。</p><p>在 Westshore Pier，Kuplo Kopp 先是追問你打算怎麼做，隨即察覺你已經知道鑰石的事。若真的別無他法，他願意幫忙，並要你搭船前往 Sweetbloom Pier，而他會先一步趕過去。</p><p>到了 Sweetbloom Pier，moogles 的爭執已經失控。Kupta Kapa 震怒地指責 Kuplo Kopp 撒謊，聲稱早就看穿他的打算，絕不允許他這麼做；Kuplo Kopp 也反駁得同樣激烈，說就算獻上再多 crystals，國王也永遠不會滿足。接著，Kupli Kipp 指控他竟與一名 Hyur 勾結，認為這是對他們的背叛；Kupta Kapa 更把 imperials、Gridanians、sylphs 全都拖進怒火裡，說他們沒有兩樣，甚至更糟。群情激憤之中，有人痛罵 Kuplo Kopp 是背叛同族的叛徒，還說他企圖對王權造反；Kupdi Koop 則冷冷宣告，Kuplo Kopp 很快就會為自己的罪行付出代價，凡是違逆 Good King Moggle Mog XII 意志的人也都一樣。Kuplo Kopp 轉向你，急切地警告：國王正打算清剿 Twelveswood 的敵人，你們必須在一切太遲之前阻止他。</p><p>Kuplo Kopp 隨後帶著你前往 Bramble Patch 深處，說 Thornmarch 的入口就在那裡，他能以鑰石解除結界，但 Mogglesguard 設下了陷阱，會引來受到附魔的野獸；他無法躲藏，只能依靠你一路保護。你在一路逼近的敵意中護送他前進，確保沒有離他太遠，直到抵達結界入口。站定後，他先確認四周是否還有野獸，接著問你是否已準備面對國王，並要你靠近結界
      界。他叫你抬起手、集中精神——就像與 aetheryte 共鳴那樣，他會替你打開通往深處的道路。</p><p>結界解除後，Kuplo Kopp 把接下來的一切交給你，催促你去教訓那些愚蠢的 moogles，並把國王送回他來的地方。你進入 Thornmarch（Hard）迎戰 Good King Moggle Mog XII，戰鬥結束後回到他面前，他激動地說你辦到了：國王已經不在了。他感謝你及時阻止 Mogglesguard，否則後果不堪設想，也希望他們能終於清醒，不再沉迷於童話般的遊戲。他要你去 Camp Tranquil 把消息帶給 Pukni Pakk，她正和 Raya–O 在一起，好讓她轉告族長。</p><p>當你抵達 Camp Tranquil，Pukni Pakk 幾乎不敢相信自己的耳朵：Good King Moggle Mog XII 竟然真的倒下了。她說整個 mooglekind 都欠你一份恩情，並感覺到 Raya–O 也想親自向你道賀，於是讓你們能放心交談、不受打擾。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row">Quest Giver <span class="muted"> 艾·斯密·雅恩（格里達尼亞舊街, X:6.0, Y:10.6）</span></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="hail-to-the-king-kupo.html">善王駕到</a></div>
      <div class="row">所有職業（不含限定職） 等級 50 以上</div>
      <div class="row kv"><span class="k">解鎖試煉</span><span class="v"><a class="link" href="thornmarch-hard.html">善王莫古爾·莫古XII世殲滅戰</a></span></div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="on-the-properties-of-primals.html">邪惡的引路人</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
