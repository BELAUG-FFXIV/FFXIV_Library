const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:'A Manager’s Persistence',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Mumukko finds you once again and, with brisk certainty, asks whether you still have time to spare. Before you can do much more than answer, she reveals that she needs your help with yet another unruly member of the initiative. This time, the troublemaker is Packingway, the Loporrit responsible for designing the supply chain for interstellar voyages. She presses a box into your hands and orders you to find them, make them accept it, and ensure that it is loaded into the ship’s cargo hold. She warns you not to be discouraged if they refuse, and makes it abundantly clear that, should they run, you are expected to chase them as far as necessary.</p>
      <p>When you find Packingway, your task proves exactly as difficult as promised. The moment you present Mumukko’s box, they reject it outright. A starship’s cargo allowance, they insist, is calculated with absolute precision, and nothing not recorded in the design documents can simply be added at the last moment. You try again, only to be met with the same resistance. The ship is already carrying heavy machinery and only the bare necessities besides; to add anything else would force a complete revision of all their calculations. Each time, Packingway flees the conversation rather than yield.</p>
      <p>At last, on the third attempt, the standoff breaks open. Mumukko appears in person, exasperated beyond restraint, and demands that Packingway stop complaining and store the box at once. When they protest that they do not even know what they are being asked to load, she has the contents revealed. Inside is an autonomous magitek probe developed by Justa, intended to locate sources of water in hostile environments. Packingway remains unconvinced, arguing that the vessel’s water allotment has already been calculated to the smallest possible measure. But Mumukko sharply reminds them that such neat calculations mean nothing in an emergency. A ruptured tank, a fire, a failed reserve—any one of these could leave the crew facing death by dehydration. In such a moment, the probe could mean survival.</p>
      <p>The argument only grows fiercer when Mumukko reveals that she has seen Packingway’s cargo list and found not one, but two carrot cultivation stations included among the essentials. Packingway reacts as though struck to the heart, insisting that carrots are the very lifeline of Loporrit existence. Mumukko, wholly unmoved, counters that one station is more than enough. When Packingway still refuses to yield, the quarrel spills away from you entirely as Mumukko charges after them, determined to force the matter through by sheer will if nothing else.</p>
      <p>With the chaos momentarily behind you, Justa remains and speaks more openly. She admits to feeling uneasy in your presence, for she once served in the Ist Legion, and without you and your allies, she might have died in Tertium. After the Final Days were averted, she heard of the initiative through a Sharlayan contact and chose to come here, hoping that broadening her horizons would someday better equip her to serve Garlemald. Standing in this place and seeing your world from beyond its familiar divisions changed her. What once seemed so consuming—the Empire, its borders, its conflicts—now appears painfully small beside the vastness of the star itself. In that realization, she found gratitude for the chance to be here at all.</p>
      <p>Later, when Mumukko returns, she reports that after considerable effort, Packingway has finally agreed to store the cargo. She thanks you for helping track them down, but also reflects on the larger issue laid bare by the whole episode. The Loporrits are passionate and capable, yet they do not always fully grasp the realities of those from Etheirys—your biology, your limits, even your sense of time. To them, tasks may unfold over centuries; to those of your world, delay can be dangerous. For that reason, she says, the project desperately needs the practical oversight and perspective of people from Etheirys. Then, almost casually, she reveals that she intends to join the voyage to the next star herself—and that she hopes you will still have time to spare when she calls on you again.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'JP',
    pageTitle:'プロジェクトマネージャーの周到なお仕事',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ムムッコはまたしてもあなたを見つけると、相変わらず迷いのない口調で、まだ時間の余裕があるかと尋ねてくる。あなたが答えるや否や、彼女は今回も助力が必要なのだと本題に入る。今度の問題児は、星間航行における補給体制の設計を担当するレポリット、パッキングウェイだった。ムムッコは箱をひとつあなたに託し、それを必ず本人に渡して貨物室へ積み込ませるよう命じる。最初は断られるだろうが怯んではならず、もし逃げたなら、月の果てだろうと宇宙の果てだろうと追いかけろという勢いだった。</p>
      <p>実際にパッキングウェイを見つけてみると、その仕事が骨の折れるものだとすぐにわかる。箱を差し出した途端、彼らは真っ向から受け取りを拒否した。宇宙船の積載量は厳密きわまりなく管理されており、設計書に載っていない荷物を後からねじ込むなど論外だという。もう一度頼んでも答えは変わらない。船にはすでに重量のある機材が数多く載せられており、それでも積み込んでいるのは必要最小限だけだ。今さら追加が入れば、計算をすべてやり直さねばならない。そう言い残しては、パッキングウェイはあなたの前から逃げてしまう。</p>
      <p>だが三度目の追跡の末、ついにその押し問答へムムッコ本人が割って入る。彼女は怒りをあらわにしながら、ぐずぐず言わずにその箱を保管しろと言い放つ。何を積まされるのかも知らないのに、とパッキングウェイが抗議すると、ムムッコはあなたに箱を開けるよう促す。中に入っていたのは、ジャスタが開発した自律型の魔導探査機で、過酷な環境において水源を探し出すためのものだった。だがパッキングウェイはなおも納得しない。必要な水の量は最後の一オンスに至るまで計算済みだと言い張る。するとムムッコは、そんな机上の計算だけでは乗員を干からびさせるだけだと一喝する。貯水槽が破損したらどうするのか、火災が起きて消火に水を使ったらどうするのか。非常時に着陸後すぐ水を探せるこの探査機は、命を守るために不可欠なのだと。</p>
      <p>さらにムムッコは、パッキングウェイの貨物一覧にも目を通したのだと明かす。そこで見つけたのは、必要物資として堂々と載せられていた二基のニンジン栽培設備だった。パッキングウェイはそれを指摘された瞬間、激しく反発する。ニンジンはレポリットにとって命綱なのだと訴えるが、ムムッコはまったく取り合わない。一基あれば十分だと言い切り、なおも食い下がるパッキングウェイを追いかけて、そのまま言い争いはあなたの手を離れていく。</p>
      <p>その場に残ったジャスタは、やがて静かに本音を語り始める。彼女はかつて第一軍団に属しており、あなたたちがいなければテルティウムで凍え死んでいたかもしれないのだという。終末が退けられたのち、シャーレアンの知人を通じてこの計画のことを知り、星間航行という途方もない話に戸惑いながらも、自分の技術が役立つならと参加を決めた。ガレマルド復興への思いもあったが、ここで視野を広げることが、いずれ故郷のためにもなると信じたのだ。ここへ来て、自分たちの星の全体を見たとき、かつてあれほど大きく思えた帝国も、国境も、あまりに小さく、つまらないものに思えた。宇宙へ出る旅ほど大きな恵みはないと、彼女はしみじみ語る。</p>
      <p>その後ムムッコが戻ってくると、相当な押し問答の末に、パッキングウェイはついに荷物の保管を認めたと報告する。そしてあなたに礼を述べながら、今回の一件が示した問題を口にする。レポリットたちは情熱的で有能だが、エーテリスの人々の身体や限界、さらには時間感覚まで、十分に理解しているとは言いがたい。彼らにとっては何百年、何千年とかけて進める作業でも、エーテリスの民にとっては、その遅れが命取りになりうる。だからこそ、この計画にはエーテリス出身者による現実的な視点と総合的な監督がどうしても必要なのだと彼女は語る。そして最後に、自分も次の星への航海に同行するつもりだと明かし、そのときもまた力を貸してほしいと、当然のように言うのだった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ムムッコ　焦がれの入江 <small class="muted">(X:21.6, Y:21.1)</small></div>
    </div>`,

    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="a-managers-discernment.html">プロジェクトマネージャーの明察なお仕事</a></div>
    </div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'經理鍥而不捨的堅持',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Mumukko 又一次把你叫住，開口便問你是不是還有時間可以幫忙。你一聽她的語氣，就知道這又不是什麼能輕易拒絕的請託。果不其然，她立刻說自己還需要你的協助，而這次要處理的對象，是負責設計星際補給流程的 Loporrit──Packingway。她把一個箱子交到你手上，要你找到對方，無論如何都得讓他把箱子收下，並放進星艦的貨艙裡。她還事先警告你，Packingway 一開始多半會拒絕，但絕不能因此退縮；如果對方敢逃，你就得一路追上去，哪怕是跨過整個 crater、整個月球，甚至追到宇宙邊緣都一樣。</p>
      <p>等你真的找到 Packingway，才發現 Mumukko 完全沒有誇張。你一把箱子遞過去，他立刻斷然拒收，說星艦的載重限制是極其嚴格的，任何不在設計文件裡的東西，都不可能臨時硬塞上船。你再追上去一次，他依然毫不動搖，強調船上已經載滿大量沉重機械，而除此之外放進去的也全都只是最基本的必需品；若要臨時多加這麼一個箱子，他就得把整套計算重新推翻重來。於是他再一次丟下你轉身就跑，讓這場追逐不得不繼續下去。</p>
      <p>直到第三次，你終於又追上了他，而這一次，Mumukko 也親自現身了。她顯然早已被氣到不想再聽任何藉口，當場就要 Packingway 別再廢話，立刻把箱子收進貨艙。Packingway 驚慌之下只知道反問，自己連箱子裡裝的是什麼都不知道，憑什麼就要照辦。於是 Mumukko 要你把箱子打開，讓真相攤在眼前——裡面裝著的是一台由 Justa 所開發的自律魔導探測裝置，專門用來在惡劣環境中尋找水源。可即使如此，Packingway 依舊不肯讓步。他辯稱自己早已把水的最低需求量精確算到了最後一盎司，根本沒有額外空間可以浪費在這種東西上。這下 Mumukko 終於徹底爆發，直接斥責他根本只算到了讓人脫水而死。Loporrit 或許不需要水也能活，但來自 Etheirys 的人不同；若水箱破裂、若發生火災、若儲水被迫挪作他用，那些精準到可笑的數字根本保不了任何人的命。到了緊急時刻，這台探測器能在著陸後立刻尋找水源，是絕對不能省去的保命裝備。</p>
      <p>然而事情並沒有就此結束。Mumukko 接著又直截了當地說，她已經看過 Packingway 的貨物清單，而裡頭居然堂而皇之地放進了兩座 carrot cultivation station。這句話簡直像踩中了對方最敏感的地方，Packingway 當場大受打擊，激動地反駁說 carrots 對 Loporrit 來說就是命脈。可 Mumukko 根本不吃這一套，只冷冷回他，自己知道 carrots 能提升工作效率，但那並不代表少一座栽培設施就會死人，一座就夠了。Packingway 聽到這裡徹底拒絕妥協，轉頭又跑，而 Mumukko 也毫不猶豫地追了上去，顯然打定主意非要把這件事壓下來不可。</p>
      <p>在這場鬧劇暫時脫離你的手之後，留下來的 Justa 才終於有機會平靜地和你說話。她坦白承認，自己其實有些不敢正面面對你，因為她曾是 Ist Legion 的一員；若不是你和你的同伴，她或許早就在 Tertium 凍死了。Final Days 被阻止之後，她透過一位來自 Sharlayan 的聯絡人得知了這個計畫。雖然星際旅行聽來令人不安又遙遠，但她仍希望自己的技術能派上用場。她當然也曾猶豫過，畢竟 Garlemald 的重建同樣重要，可最後還是認為，在這裡拓展自己的眼界，未來反而能更好地回饋故鄉。她說，若是在不久之前，她肯定會嗤笑與 Sharlayan 合作這種事；但自從來到這裡，第一次真正看見整顆星球之後，她才明白 Empire 其實有多麼渺小，過去那種執著於國界與立場的想法又顯得多麼可悲。對她來說，沒有什麼比這場走向宇宙的旅程更大的收穫了，而她也真心感謝你，哪怕只是間接地，仍讓她得到了站在這裡的機會。</p>
      <p>等 Mumukko 終於回來時，她帶來的消息是：經過一番相當強硬的交涉，Packingway 終究還是答應把箱子放進貨艙。她感謝你一路幫忙追人，同時也順勢感嘆，這件事其實再次暴露出一個更大的問題。Loporrit 雖然充滿熱情，也確實有能力，但他們對 Etheirys 生命的生理需求似乎並沒有真正牢牢掌握；甚至連時間感都和你們截然不同。在他們眼裡，一項工作花上幾百年、幾千年都不算什麼，但對來自 Etheirys 的人而言，許多事情根本拖不起。正因如此，這項計畫才會如此迫切地需要來自 Etheirys 的人提供更全面、更務實的監督與視角。最後，她還順便告訴你，自己也打算登上前往下一顆星球的航程，所以往後恐怕還是會繼續來找你幫忙。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="a-managers-patience.html">經理的耐心考驗</a></div>
      <div class="row">採集或生產職業　Lv 10 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="a-managers-discernment.html">經理的洞察力</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
