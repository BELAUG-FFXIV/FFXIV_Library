<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Killing Him Softly | BELAUG · FFXIV Library</title>
  <meta name="description" content="MSQ – Killing Him Softly (ARR Patch 2.0)">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;
  overflow-y:auto;
  padding-right:8px;
  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left">
        <a class="home" href="../index.html">🏠 Home</a>
      </div>
      <div class="right">
        <button id="langToggle" class="icon-btn" aria-label="切換語言">English</button>
      </div>
    </nav>
  </header>

  <main class="container main">
    <div class="grid">
      <!-- 左：影片 -->
      <section class="card video-card">
        <div class="bd">
          <div class="video-wrap">
            <iframe id="ytFrame" src="https://www.youtube.com/embed/7VEHzVPhuOM"
              title="Killing Him Softly" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <!-- 右：標題 + Tabs -->
      <section class="card">
        <div class="hd" id="pageTitle">Killing Him Softly</div>

          <button class="tab-btn" role="tab" aria-selected="true"  data-tab="story">Story</button>

          <button class="tab-btn" role="tab" aria-selected="false" data-tab="unlockq">Unlock Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="followq">Follow-Up Quest</button>

          <div id="panel-story" class="tab-panel active scroll-panel"></div>
          <div id="panel-acq"     class="tab-panel"></div>
          <div id="panel-unlockq" class="tab-panel"></div>
          <div id="panel-followq" class="tab-panel"></div>

            <div id="giscus_container" style="min-height:320px;"></div>
          </div>

    </div>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Killing Him Softly',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>You find Meffrid at Quarrymill, and he answers without pretense—yes, he is Meffrid, a proud man of the Ala Mhigan Resistance. He fixes his gaze on you and demands to know what business an adventurer has with him.</p>
      <p>Before you can say more than a few words, a Resistance soldier comes rushing in, voice shaking as he blurts out the news: Gallien’s wound has festered, and he’s burning with fever. The man can barely finish the warning before it’s clear what he means—Gallien doesn’t have much time.</p>
      <p>Meffrid’s restraint snaps into a shout. He says he went to the villagers, begged them on his knees, and still they refused to lift a finger. If Gallien dies, he spits, his blood will be on their hands. The people of Quarrymill may turn their eyes away from the Resistance, but Albreda might make them listen—and Meffrid knows his fury won’t win anyone over right now.</p>
      <p>He asks you to go in his stead. You barely know each other, he admits, but this is life and death. Find Albreda, speak to her, and try to get help before it’s too late.</p>
      <p>Albreda’s answer is immediate and strained: she’s sorry, but there’s nothing she can do. She insists she truly wants to help—those are her countrymen—but helping would mean going against the elementals’ will. She’s lived in Quarrymill long enough to know how fearsome they can be, and she can’t bear the thought of everyone being banished because of her. If anyone might listen, she tells you, it would be Charline—the hamlet’s resident Hearer—though she warns you not to expect much.</p>
      <p>Charline receives the plea with a calm that offers no comfort. She tells you your heart is kind, but she does not have the authority to grant what you ask. Only the elementals—the eternal guardians of the Twelveswood—may decide such matters, judging outsiders in the night as to whether they may live beneath the boughs. The Ala Mhigans’ petition has been denied, she says, and harsh as it sounds, they do not have leave to receive the wood’s bounty. Meffrid’s anger boils over at the verdict—he curses the Hearer, spits on the elementals and their will, and swears he cannot wait until the Resistance is free of this place.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Meffrid <small class="muted">South Shroud (X:25.6, Y:20.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="meeting-with-the-resistance.html">Meeting with the Resistance</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 26 or above)</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="helping-horn.html">Helping Horn</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'無慈悲な精霊',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>あなたがクォーリーミルで声をかけると、男は迷いなく名乗る。俺がメッフリッドだ――アラミゴ解放軍の誇り高き男だ、と。そして冒険者であるあなたに、いったい何の用件だと鋭く問う。</p>
      <p>答えようとした矢先、解放軍の兵が駆け込んでくる。声は上ずり、報告は切迫していた。ガリエンの傷が膿んで熱がひどい、もう時間がないかもしれない――その言葉が場の空気を一気に凍らせる。</p>
      <p>メッフリッドは怒号を上げる。村人に助けを求め、ひざまずいて頼み込んだのに、誰ひとり手を貸さなかったという。ガリエンが死ねば、その血は奴らの手にかかるのも同然だ、と。クォーリーミルの連中は解放軍の窮状に目を背けるが、アルブレダなら耳を貸すかもしれない――しかし今の自分は怒りでまともに説得できない、とメッフリッドは吐き捨てるように言う。</p>
      <p>だから、あなたに頼む。まだ互いをよく知らないのは承知だが、これは生死に関わる――アルブレダのところへ行き、話をして、なんとか助けを引き出してほしい、と。</p>
      <p>だがアルブレダは、申し訳なさそうに首を振る。助けたい気持ちはある、同郷の民なのだから本当は助けたい――それでも、精霊様の御意志に逆らうことになる、と言う。クォーリーミルで長く暮らすうちに、精霊様がどれほど恐ろしい存在かを思い知らされたのだ、と。自分のせいで皆が追放されることになったら、決して許せない。もし話を聞いてくれる者がいるとすれば、集落の道士シャルリヌだろう――ただし期待はするな、と彼女は釘を刺す。</p>
      <p>シャルリヌは、あなたの親切心を認めながらも、願いをかなえる権限は自分にはないと告げる。裁定を下すのは黒衣森の永遠の守護者たる精霊様のみであり、外つ国の者は一夜のうちに、森の下で暮らすことを許されるか否かを審判される。アラミゴの嘆願は退けられた――木々の恵みを受ける許しは与えられない、と。メッフリッドはその言葉に激昂し、道士を罵り、精霊様とその御意志を呪う。そして解放軍がこの地を去れる日を、今すぐにでも迎えたいと吐き捨てる。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> メッフリッド　<small class="muted">黒衣森：南部森林 (X:25.6, Y:20.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="meeting-with-the-resistance.html">アラミゴ解放軍を知る者</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 26～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="helping-horn.html">角薬が繋ぐ縁</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'冷酷的森林聖靈',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>你在 Quarrymill 找到 Meffrid，他毫不掩飾地表明身分：他就是 Meffrid——Ala Mhigan Resistance 的一員，而且以此為傲。他直視著你，問你這個 adventurer 找他到底有什麼事。</p>
      <p>你才剛準備開口，一名 Resistance soldier 就慌張衝來，話幾乎是用喊的：Gallien 的傷口已經化膿，整個人燒得厲害，恐怕撐不了多久。那句「沒多少時間了」落下的瞬間，周圍的緊繃感立刻變得具體而沉重。</p>
      <p>Meffrid 的怒火立刻爆開。他說他向村民求援，甚至跪下來懇求，卻還是沒有任何人願意伸手；如果 Gallien 死了，那鮮血就等於沾在他們手上。Quarrymill 的人可以對他們的苦境視而不見，但也許 Albreda 會讓他們聽進去——只是 Meffrid 也清楚，自己此刻的憤怒只會把事情推向更糟，他根本無法冷靜地說服任何人。</p>
      <p>於是他把這件事交到你手上。他承認你們幾乎算不上認識，但這是攸關生死的事：請你去找 Albreda，替他開口，試著把人命從冷漠裡搶回來。</p>
      <p>然而 Albreda 的拒絕同樣沉重。她說她很抱歉，但她做不到；她確實想幫——那些人畢竟是她的 countrymen——可那等於違背 elementals 的意志。她在 Quarrymill 待得夠久，知道那些存在有多可怕，她無法承受「因為自己」而讓所有人被 banished 的結果。她告訴你，如果還有誰能聽進這件事，那就是 hamlet 的 Hearer——Charline——但她也提醒你不要抱太大希望。</p>
      <p>Charline 用近乎冷靜的語氣接下你的請求，卻沒有給出任何轉圜。她說你很善良，但她沒有權力允許你想做的事；唯有 elementals——Twelveswood 永恆的守護者——才能裁定外來者是否能在林下立足，甚至會在一夜之間做出判決。她直言 Ala Mhigans 的請求已經被拒絕：他們不被允許取得這片森林的恩惠，這是自古以來的規矩。Meffrid 聽完徹底失控，咒罵 Hearer，把怒意全數丟向 elementals 與他們的意志，並發誓他等不及 Ala Mhigan Resistance 能夠擺脫這個地方的那一天。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 梅夫里德　<small class="muted"> 黑衣森林南部林區 (X:25.6, Y:20.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="meeting-with-the-resistance.html">阿拉米格解放軍</a></div>
      <div class="row">所有職業（不含限定職） 等級 26 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="helping-horn.html">獸角製藥帶來的緣份</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
