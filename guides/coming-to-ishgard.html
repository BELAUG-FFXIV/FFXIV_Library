<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coming to Ishgard | BELAUG · FFXIV Library</title>
  <meta name="description" content="MSQ – Coming to Ishgard (HW Patch 3.0)">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root{--bg:#fff8e6;--card:#fff;--fg:#222;--muted:#666;--border:#e5e1d8;--accent:#e11d48}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative;max-height:360px;overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{content:"";position:absolute;left:0;right:0;bottom:0;height:72px;background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card));pointer-events:none}
    .expand-wrap{margin-top:12px}
    .expand-btn{display:inline-block;padding:8px 14px;border-radius:10px;background:var(--card);border:1px solid var(--border);cursor:pointer;font-weight:600}
    .expand-btn:hover{background:#fffef8}
    .row-2col{display:grid;grid-template-columns:160px 1fr;gap:12px;align-items:start}
    .row-2col .lbl{font-weight:800}
    .row-2col .val{text-align:left}
  </style>
</head>
<body>

<script>
const LANG_KEY='ffxiv-guide-lang';
const i18n={
  EN:{
    langLabel:'EN',
    pageTitle:'Coming to Ishgard',
    tabs:{story:'Story',acq:'Acquisition',unlockq:'Unlock Quest',followq:'Follow-Up Quest',comments:'Comments'},
    readMore:'Show more',readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>The dawn’s light will shine again—but with false accusations hanging over you and your companions, every step forward feels weighed down. Alphinaud urges you to go to Ishgard as Tataru proposed, while he speaks of returning to Ul’dah to set matters right, desperate to clear your names and restore what was lost.</p><p>Before any rash choice can be made, Haurchefant appears and counsels restraint. He understands the urge to act at once, yet reminds Alphinaud that you still have allies to rely upon—and that you need not face this alone. Chastened, Alphinaud reins in his impatience and listens.</p><p>Haurchefant brings decisive news: Count Edmont de Fortemps has decreed that the three of you will be taken in as wards of House Fortemps. Under their patronage, you will be granted access to Ishgard proper, and Fortemps Manor is offered as your new headquarters—a place to gather information and plan your next move. Should any of your missing comrades be found, they will be welcomed there as well.</p><p>Grateful beyond words, Alphinaud accepts the offer on behalf of the Scions, and Haurchefant promises that the count will treat you with the kindness and respect a hero—and dear friend—deserves. With that, you set your course for Ishgard together, determined to carry on the Scions’ legacy and begin anew. Even as Tataru fusses over the fierce winds on the Steps of Faith, the resolve among you holds firm.</p><p>Haurchefant goes ahead to speak with the count, assuring you that all has been arranged. At the Gates of Judgement, the sentries recognize you as wards of House Fortemps and allow you to pass. You cross into Ishgard—an austere nation devoted to Halone the Fury, ruled by Thordan VII, its walls bristling with the sworn blades and spears of the four High Houses—an isolationist land hardened by a thousand years of war, where peace has been all but forgotten.</p><p>Inside the city, even Tataru is struck speechless by the scale and grandeur, and Alphinaud cannot help but note how the splendor above belies the ruin below. A manservant of House Fortemps escorts you onward, and at Fortemps Manor, Haurchefant welcomes you with unmistakable joy before presenting you to Count Edmont de Fortemps. The count receives you warmly, declaring his home to be yours and dismissing concern over your reputation—arguing that troubled times are precisely when allies must be sought. With raised eyebrows expected in the Vault and among the other High Houses, he asks only that you continue your altruistic endeavors—and then suggests you take a tour, to learn the city that may be your home for some time.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Alphinaud <small class="muted">(Intercessory, X:6.0, Y:6.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="before-the-dawn.html">Before the Dawn</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 50</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="taking-in-the-sights.html">Taking in the Sights</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'イシュガルドへ',
    tabs:{story:'ストーリー',acq:'入手方法',unlockq:'開放クエスト',followq:'後続クエスト',comments:'コメント'},
    readMore:'全文を表示',readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>「夜明けの光は、またきっと差し込む」――だが、身に覚えのない嫌疑があなたたちにまとわりつく限り、何かを成そうとしても足を取られる。アルフィノは、タタルの提案どおり、あなたたちはイシュガルドへ向かうべきだと言い、自分はウルダハへ戻って事態を正すのだと口にする。名をそそぎ、失ったものを取り戻したい、その焦りが滲んでいた。</p><p>そこへ現れたオルシュファンは、性急な決断を戒める。汚名を晴らしたい気持ちは痛いほどわかるが、今は無理に動くべき時ではない――あなたたちには、まだ頼れる味方がいるのだから、ひとりで背負う必要はないのだと。アルフィノは自らの短慮を恥じ、詫びて耳を傾ける。</p><p>オルシュファンがもたらした知らせは明確だった。フォルタン伯エドモンの裁定により、あなたたち三人はフォルタン家の「後見」として迎え入れられる。庇護のもと、イシュガルドの市街へ正式に入ることができ、フォルタン邸を新たな拠点として情報を集め、最善の策を練るように――そして、行方の知れない仲間が見つかったなら、必ずそこへ迎える、と。</p><p>アルフィノは友の厚意に深く感謝し、暁の血盟を代表してその申し出を受け入れる。オルシュファンは、伯は善良で公正な人物であり、英雄であり親しい友であるあなたたちを、慈しみと敬意をもって遇するだろうと断言した。こうしてあなたたちはイシュガルドへ――共に向かい、暁の血盟の志を継ぎ、そこで新たに歩み始めるのだと心を定める。タタルは道中の風の強さを案じつつも、その決意に声を合わせた。</p><p>オルシュファンは先に伯へ面会すると言い、すべて手配済みだとあなたたちを安心させる。ジャッジメント門では、フォルタン家の後見として名を告げれば通される――そのとおり、衛兵はあなたたちを確認し、門を開いた。あなたはついにイシュガルドへ足を踏み入れる。戦神ハルオーネを篤く奉じ、イシュガルド正教の教皇であるトールダン七世に統べられ、四大貴族の剣と槍が壁を固める、誇り高き山上の都。千年に及ぶ戦が、この地から平和の感覚を奪い去っていた。</p><p>城塞のような街並みに、タタルは圧倒され、アルフィノも遠目に見た尖塔の高さが実際には想像以上だと息をのむ。フォルタン家の従者に導かれてフォルタン邸へ赴くと、オルシュファンは歓喜を隠さずにあなたたちを迎え、伯エドモン・ド・フォルタンへ引き合わせた。伯は丁重にあなたたちを「後見」として遇し、「我が家はあなたたちの家」と告げる。評判を案じるアルフィノに対しても、国境を閉ざしてきたイシュガルドだからこそ、苦しい時代には同盟者を求めるべきだと諭し、他の貴族や聖府での反応はあっても、あなたたちが利他的な働きを続ける限り大事にはならないだろうと語った。そして、新たな環境を知るためにも、まずは都を見て回るよう勧めるのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> アルフィノ <small class="muted">(応接室, X:6.0, Y:6.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="before-the-dawn.html">希望の灯火</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="taking-in-the-sights.html">壮麗なる皇都</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'啟程前往伊修加德',
    tabs:{story:'故事概要',acq:'取得方式',unlockq:'解鎖任務',followq:'後續任務',comments:'留言'},
    readMore:'展開全文',readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>「黎明的光終將再度照耀。」然而，只要你們頭上仍懸著那些虛假的指控，你與同伴就很難真正做成任何事。Alphinaud 認為你必須照 Tataru 的提議前往 Ishgard，而他自己則想回到 Ul’dah 去扭轉局面、洗清你們的名聲──那份急切，幾乎掩不住。</p><p>就在情勢看似要被衝動推著走時，Haurchefant 出面阻止了 Alphinaud 的草率。他明白你們渴望證明清白，但此刻並不是孤注一擲的時候。你們仍有可以依靠的盟友，沒有必要獨自承擔一切。Alphinaud 這才收斂急躁，向他致歉，重新冷靜下來。</p><p>Haurchefant 帶來的消息，給了你們一條真正能走的路。Count Edmont de Fortemps 已下令，讓你們三人以 House Fortemps 的「受監護者」身分被接納。你們將在他們的庇護下獲准進入 Ishgard 的城內，而 Fortemps Manor 也會成為你們的新據點──你們可以在那裡蒐集情報，思考下一步該如何行動。至於失散的同伴，一旦被尋回，他們也同樣會被歡迎前來會合。</p><p>面對這份慷慨，Alphinaud 代表 Scions of the Seventh Dawn 鄭重接受了招待。Haurchefant 也向你保證，那位伯爵既正直又仁厚，會以你這樣的英雄──也是他珍視的朋友──應得的敬意與善意對待你們。於是，你們決定一同前往 Ishgard：在那裡延續 Scions 的使命，在那裡重新開始。Tataru 雖提醒你 Steps of Faith 的風勢兇猛，要你務必把自己裹緊，卻也毫不猶豫地附和你們的決心。</p><p>Haurchefant 先行趕去與伯爵會面，並告訴你一切都已安排妥當。Gates of Judgement 的守衛早已接獲通知──你只要報上名字，就能被放行。果然，當你們被確認為 House Fortemps 的受監護者後，大門為你們敞開。你踏入了 Ishgard：那座矗立山巔的城市，俯瞰 Coerthas 的領地；一個奉 Halone the Fury 為信仰核心、由 Thordan VII 統治的驕傲國度。四個 High Houses 的刀劍與長槍守在城牆之上，而千年 Dragonsong War 的陰影，讓這片土地幾乎忘記了何謂和平。</p><p>進到城內，連 Tataru 都忍不住感嘆自己像走進巨人的城堡；Alphinaud 也只能低聲承認，從遠處看見的尖塔，並不足以形容它們真正的高度。House Fortemps 的僕從在城門迎接你們，引領你前往 Fortemps Manor。到了宅邸，Haurchefant 以難掩的喜悅迎接你與同伴，隨即帶你們與 Count Edmont de Fortemps 相見。伯爵親自致意，宣告你們在 House Fortemps 的庇護下將獲得一切禮遇，並直言「我的家就是你們的家」。即便 Alphinaud 仍擔憂外界對你們名聲的觀感，伯爵也只是提醒：越是在動盪之際，人就越該尋求盟友──縱然此舉會在 Vault 與其他 High Houses 引來側目，只要你們持續做你們一向在做的事，他相信那些疑慮終究不會化為阻礙。最後，他建議你們先去熟悉這座城市，因為你們或許得在這裡停留很長一段時間。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 阿爾菲諾 <small class="muted">(應接室, X:6.0, Y:6.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="before-the-dawn.html">希望之燈</a></div><div class="row">任一戰鬥／魔法職業（不含受限職業）Lv. 50</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="taking-in-the-sights.html">皇都巡禮</a></div></div>`
  }
};

const langToggle=document.getElementById('langToggle');
const pageTitle=document.getElementById('pageTitle');
const tabBtns=[...document.querySelectorAll('.tab-btn')];
const panels={
  story:document.getElementById('panel-story'),
  acq:document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments:document.getElementById('panel-comments')
};

function getLang(){return localStorage.getItem(LANG_KEY)||'EN';}
function applyLang(lang){
  const t=i18n[lang]||i18n.EN;
  pageTitle.textContent=t.pageTitle;
  langToggle.textContent=`🌐 ${t.langLabel}`;
  tabBtns.forEach(btn=>btn.textContent=t.tabs[btn.dataset.tab]);
  const active=tabBtns.find(b=>b.getAttribute('aria-selected')==='true')||tabBtns[0];
  renderPanel(active.dataset.tab,lang);
}
function wireClamp(panelEl,t){
  const clamp=panelEl.querySelector('.clamp');
  const btn=panelEl.querySelector('[data-role="expand"]');
  if(!clamp||!btn)return;
  function setLabel(){
    const collapsed=clamp.getAttribute('data-collapsed')!=='false';
    btn.textContent=collapsed?t.readMore:t.readLess;
  }
  setLabel();
  btn.addEventListener('click',()=>{
    const collapsed=clamp.getAttribute('data-collapsed')!=='false';
    clamp.setAttribute('data-collapsed',collapsed?'false':'true');
    setLabel();
  });
}
function renderPanel(key,lang){
  const t=i18n[lang]||i18n.EN;
  Object.keys(panels).forEach(k=>panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if(key!=='comments') panels[key].innerHTML=t[key];
  if(key==='story') wireClamp(panels[key],t);
  if(key==='comments') loadGiscusForCurrentLang();
}
tabBtns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab,getLang());
  });
});
langToggle.addEventListener('click',()=>{
  const cur=getLang();
  const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
  localStorage.setItem(LANG_KEY,next);
  applyLang(next);
});
applyLang(getLang());

const GISCUS_CFG={
  repo:'BELAUG-FFXIV/FFXIV_Library',
  repoId:'R_kgDOPyh4Kw',
  category:'General',
  categoryId:'DIC_kwDOPyh4K84CwPjL',
  theme:'preferred_color_scheme'
};
function uiLang(code){return code==='JP'?'ja':(code==='ZH'?'zh-TW':'en');}
function loadGiscusForCurrentLang(){
  const mount=document.getElementById('giscus_container');
  if(!mount)return;
  mount.innerHTML='';
  const langCode=getLang();
  const s=document.createElement('script');
  s.src='https://giscus.app/client.js';
  s.setAttribute('data-repo',GISCUS_CFG.repo);
  s.setAttribute('data-repo-id',GISCUS_CFG.repoId);
  s.setAttribute('data-category',GISCUS_CFG.category);
  s.setAttribute('data-category-id',GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping','specific');
  s.setAttribute('data-term',location.pathname+'｜'+langCode);
  s.setAttribute('data-reactions-enabled','1');
  s.setAttribute('data-emit-metadata','0');
  s.setAttribute('data-input-position','bottom');
  s.setAttribute('data-lang',uiLang(langCode));
  s.setAttribute('data-theme',GISCUS_CFG.theme);
  s.setAttribute('crossorigin','anonymous');
  s.async=true;
  mount.appendChild(s);
}
</script>
</body>
