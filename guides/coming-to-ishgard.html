  readMore:'Show more',readLess:'Show less',
  story:`<div class="clamp" data-collapsed="true"><p>Alphinaud cannot hide his frustration. So long as false accusations hang over you all, he says, nothing can truly be accomplished. He insists that you should go to Ishgard as Tataru proposed while he returns to Ul’dah to set matters right himself. Before that resolve can harden into action, Haurchefant stops him, reminding him that this is no time for reckless measures. You are not without allies, he says, and there is no need for any one of you to bear this burden alone. Faced with that calm certainty, Alphinaud yields and admits his impatience.</p><p>Then Haurchefant brings the answer you needed. At Count Edmont’s decree, the three of you are to be taken in as wards of House Fortemps. Under the house’s protection, you will be granted entry into Ishgard proper, and Fortemps Manor is to serve as your new refuge, a place from which you may gather information and decide how best to move forward. He adds that if your missing allies are found—and he firmly believes they will be—they too will be welcomed there. Deeply moved, Alphinaud accepts the offer on behalf of you all, and with that, your course is set. You will go to Ishgard together, and there begin again while carrying on the legacy of the Scions.</p><p>Even so, the road ahead is not entered lightly. Tataru warns you to guard against the bitter wind before you depart, while Alphinaud reflects that this is hardly the way he had imagined seeing Ishgard for the first time. Haurchefant must ride ahead to speak with the count, but he assures you that every arrangement has been made. The sentries have already been informed. All you need do is give your names, and you will be allowed to pass. His manservant will be waiting beyond the gates to escort you to the manor.</p><p>So you come at a friend’s urging, carrying grief, disgrace, and what hope remains. Once hailed as saviors of Eorzea, you now travel beneath the weight of betrayal, your names darkened by royal blood. Yet you do not come empty-hearted. You come with memories of those who were lost, with the wish to redeem what has been broken, and with a determination not yet extinguished. Through gates long closed, you enter Ishgard at last—a proud city raised high above Coerthas, a land shaped by faith, by blood, and by a war so long that peace has nearly become a forgotten thing. In the midst of the Dragonsong War, you arrive as three weary travelers, unaware how greatly your coming will alter all that lies ahead.</p><p>Inside the city, the scale of Ishgard leaves its mark at once. Tataru looks around in wonder, overwhelmed by the enormity of it all, while Alphinaud quietly admits that the distant spires had not seemed nearly so high from afar. A servant of House Fortemps receives you with courtesy and leads you onward to the family residence. There, as you cross into the heights where the great houses dwell, Tataru is struck by the very air of the place, as though wealth and power themselves cling to it. Alphinaud, gazing upon such splendor, cannot help but note the cruel contrast between the grandeur above and the ruin wrought below by wyverns.</p><p>Haurchefant meets you with unrestrained joy. To see you walking the streets of Ishgard at last is, to him, a sight he has long awaited. With unmistakable pride, he presents Fortemps Manor as his family home, though he scarcely has time to show it to you before urging you onward. Everyone is gathered to receive you, and there are introductions yet to be made.</p><p>Count Edmont de Fortemps welcomes you with grave warmth. As wards of House Fortemps, he says, you will be shown every courtesy, and his home is to be yours as well. Alphinaud accepts the kindness with sincere gratitude, but he cannot keep from asking whether the count truly means to risk so much by taking in foreign guests at such a moment—guests burdened by a reputation such as yours. Edmont dismisses the concern with steady composure. Ishgard has long kept its borders closed for the sake of war, he admits, and his decision will no doubt raise brows among the clergy and the other High Houses. Yet troubled times are when allies are needed most. So long as you continue to devote yourselves to selfless deeds, he believes no one will dare object in earnest.</p><p>That answer is enough. Alphinaud declares that though your numbers have been greatly reduced, your resolve has not diminished. Pleased to hear it, Count Edmont urges you not to rush back into labor at once, but to acquaint yourselves with the city that may be your refuge for some time to come. Afterward, the welcome continues within the manor. Artoirel greets you with formal courtesy, Emmanellain remarks that Ishgard will soon be whispering about the mysterious guests of House Fortemps, and Tataru, still marveling at her surroundings, can scarcely believe that this is the home in which Haurchefant was raised. For the first time since everything was torn away, you are not merely fleeing. You have reached a place from which a new beginning may finally be made.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  story:`<div class="clamp" data-collapsed="true"><p>アルフィノは、偽りの嫌疑をかけられたままでは、何ひとつ成し遂げられないと悔しさをにじませる。あなたたちは Tataru の勧めどおり Ishgard へ向かい、自分は Ul’dah に戻って事態を正すべきだと、彼は焦るように言う。けれどその決意が独りよがりな行動へ変わる前に、オルシュファンが静かに制した。今は軽挙に出るべきときではなく、あなたたちにはまだ頼れる味方がいる。誰かひとりで背負う必要はないのだと告げられ、アルフィノはようやく我に返り、自らの性急さを詫びる。</p><p>そしてオルシュファンは、あなたたちを受け入れる道を持ってくる。エドモン・ド・フォルタン伯爵の命により、あなたたち三人はフォルタン家の客分として迎えられ、イシュガルドの市内へ立ち入る資格を与えられるというのだ。フォルタン伯爵邸は新たな拠点となり、そこで情報を集め、これからの手立てを考えてほしいと彼は言う。行方の知れない仲間たちが見つかれば、もちろんその者たちも迎え入れるつもりだと、揺るぎない口調で付け加える。その厚意に深く胸を打たれたアルフィノは、あなたたちを代表して申し出を受け入れる。こうして行き先は定まった。あなたたちはともに Ishgard へ向かい、暁の遺志を背負ったまま、そこから再び歩き始めることになる。</p><p>それでも、その旅立ちは軽いものではない。出立の前、タタルは吹きすさぶ風の厳しさを案じ、しっかり防寒するようあなたに言う。アルフィノもまた、初めて訪れる Ishgard がこのような事情の下であることに、複雑な思いを隠せない。オルシュファンは先に伯爵のもとへ赴くが、必要な手配はすべて済ませてあると安心させてくれる。門の衛兵にはすでに話が通っており、名を告げれば通される。さらに、屋敷への案内役も待たせてあるから心配はいらないと告げ、彼はひと足先に駆けていく。</p><p>そうしてあなたたちは、ひとりの友の導きによってその地へたどり着く。かつて Eorzea の救い手として称えられたあなたたちは、いまや裏切りによって地に落とされ、王家の血にまみれた汚名を背負っている。けれど、失った者たちの記憶も、償いを願う思いも、まだ胸の内から失われてはいない。かすかな希望を抱いたまま、あなたたちは長く閉ざされていた門をくぐり、ようやく Ishgard の都へ足を踏み入れる。Coerthas を見下ろす高みの都、信仰と血によって築かれ、千年にわたる戦いのなかで安らぎというものを忘れてしまった国。その竜詩戦争のただ中へ、疲れ果てた三人の旅人としてあなたたちはやって来る。だがこのときはまだ、あなたたちの到来がどれほど大きな変化を呼ぶのか、誰も知るよしもなかった。</p><p>都の内へ入った瞬間、Ishgard の威容は容赦なくあなたたちを圧倒する。タタルはあまりの大きさに目を見張り、自分がまるで巨人の城へ迷い込んだ子どものようだと息をのむ。アルフィノも、遠目に見たときにはここまで高い尖塔だとは思わなかったと漏らす。フォルタン家の使用人がうやうやしくあなたたちを出迎え、そのまま伯爵邸へと導いていく。上層へ進むにつれ、タタルはこの場所の空気そのものが富と権勢を帯びているかのようだと目を丸くする。アルフィノはその壮麗さを見上げながら、眼下で飛竜たちがもたらした荒廃とのあまりに大きな落差を思わずにはいられない。</p><p>そこで待っていたオルシュファンは、イシュガルドの街を歩くあなたたちの姿を見て、心からの喜びをあらわにする。あなたたちがついにこの都へ来た、その光景をどれほど待ち望んでいたかわからないと語り、誇らしげにフォルタン伯爵邸を自らの家として紹介する。だが、あなたたちを案内して回るより先に、まずは迎えの場へ向かわねばならない。家の者たちは皆、あなたたちに会うために集まっているのだと彼は言い、親しい友を迎えるようにあなたたちを中へと促す。</p><p>やがてエドモン・ド・フォルタン伯爵が、落ち着いた温かさをもってあなたたちを迎える。フォルタン家の客分として、あらゆる礼遇を受けてほしい、この家はあなたたちの家でもあるのだと伯爵は告げる。アルフィノはその厚意に深く感謝しながらも、いまこの時勢に、しかも自分たちのような評判を背負った異邦人を受け入れることに不安はないのかと問いかける。伯爵は少しも動じない。たしかに Ishgard がこれまで戦を第一にして国境を閉ざしてきたのは事実であり、自分の判断は教皇庁や四大名家の間で物議を呼ぶだろう。それでも、世が乱れているときにこそ、人は味方を求めるべきではないかと彼は言う。あなたたちが利他の志を失わずにいる限り、名誉ある同輩たちも公然と異を唱えることはあるまいと、伯爵は確信をもって告げる。</p><p>その言葉を受け、アルフィノは、たとえ仲間の数が大きく減ろうとも、自分たちの決意は少しも衰えていないと応える。伯爵はそれを頼もしく聞き届け、すぐに働きに戻るのではなく、まずはこれからしばらく身を置くことになるかもしれない都を見て回るとよいと勧める。その後も邸内では歓迎が続く。アルトアレールは丁重にあなたたちを迎え、エマネランは、フォルタン家に現れた謎めいた客人として、じき都中の噂になるだろうと気安く口にする。タタルはなおも館の内装に目を奪われ、オルシュファンがこのような家で育ったのかと驚きを隠せない。すべてを失ったように思えたあとで、あなたたちはただ逃げ延びるだけの身ではなくなる。ここは、もう一度歩き出すための始まりとなる場所だった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
  acq:`<div class="stack"><div class="row"><b>Quest Giver</b> アルフィノ <small class="muted">(応接室, X:6.0, Y:6.1)</small></div></div>`,

  followq:`<div class="stack"><div class="row"><a class="link" href="taking-in-the-sights.html">壮麗なる皇都</a></div></div>`
},

  story:`<div class="clamp" data-collapsed="true"><p>Alphinaud 壓不住心裡的焦躁。他明白，只要那些虛假的罪名還壓在你們身上，你們就很難真正做成任何事。於是他立刻下定主意，要你依照 Tataru 的提議前往 Ishgard，而他自己則返回 Ul’dah，把一切導回正軌。可就在他準備獨自扛下一切的時候，Haurchefant 出聲攔住了他。現在不是魯莽行動的時候，你們並不是沒有可以依靠的同伴，也沒有任何一個人必須獨自背負這份重擔。那份穩定而不容動搖的勸說，終於讓 Alphinaud 冷靜下來，也讓他承認自己方才確實過於心急。</p><p>接著，Haurchefant 帶來了真正能讓你們前進的消息。依照 Count Edmont 的決定，你們三人將以 House Fortemps 受庇護者的身分被接納，並獲准進入 Ishgard 城內。Fortemps Manor 也將成為你們新的落腳處，讓你們能在那裡蒐集情報，重新思考接下來該怎麼走下去。他還補上一句，若那些失散的同伴有了消息——而他相信一定會有——他們也同樣會被接進那座宅邸。面對這份毫不保留的善意，Alphinaud 代表你們鄭重接受了邀請。於是，去向終於明確下來。你們將一同前往 Ishgard，帶著 Scions 尚未斷絕的意志，在那裡重新開始。</p><p>即使如此，這段旅程也沒有絲毫輕鬆。臨行前，Tataru 還記得提醒你，前往那裡的途中風勢猛烈，千萬別被寒意侵透。Alphinaud 則低聲感嘆，自己從未想過第一次踏入 Ishgard，竟會是在這樣的處境之下。Haurchefant 必須先一步趕去見 Count Edmont，但他也向你們保證，所有安排都已經妥當。城門的衛兵早已得到通知，你們只需報上名字，便能獲准通行。而到了門後，也會有 House Fortemps 的僕從等著你們，親自把你們帶往宅邸。</p><p>於是，你們在一位朋友的安排下踏上那條路。曾經被稱頌為 Eorzea 救世主的你們，如今卻因背叛而跌落谷底，名字被王家的鮮血染得污濁不堪。但你們並不是帶著空洞的心走到這裡。那些失去的同伴仍留在記憶裡，那份想要挽回一切的心情也還沒有熄滅。即使只剩下微弱的希望，你們依然帶著它前行。穿過長久緊閉的城門後，你們終於踏入 Ishgard——那座高踞在 Coerthas 之上的城市。那裡由信仰與鮮血塑成，在長達千年的戰火之中，幾乎已經忘了何謂真正的平靜。就在 Dragonsong War 的正中央，你們三個疲憊不堪的旅人來到了這裡，而那時還沒有人知道，這場相遇將會改變多少事情。</p><p>真正進入城中之後，Ishgard 的巨大與威嚴立刻壓了下來。Tataru 仰頭看著周圍的一切，震驚得像是誤闖了巨人的城堡。連 Alphinaud 都不得不承認，從遠處望去時，那些高塔看起來根本沒有這麼驚人。House Fortemps 的僕從恭敬地迎上前，代主人向你們致意，並領著你們前往 Fortemps Manor。一路往上層走去時，Tataru 幾乎能從空氣裡聞到財富與權勢的氣味，彷彿這片高處連呼吸都和別的地方不同。Alphinaud 則在那片華麗景象前停下目光，無法不去想到下方土地被 wyvern 蹂躪後留下的破敗，與眼前這份繁盛形成多麼刺眼的對比。</p><p>在宅邸前等著你們的 Haurchefant，則是毫不掩飾自己的歡喜。對他而言，能親眼看見你們終於走在 Ishgard 的街道上，本身就是一幕值得高興的景象。他帶著驕傲向你們介紹 Fortemps Manor，說那正是自己的家。只是，他雖然很想親自帶你們四處看看，現在卻還不是時候。因為屋內的人都已經聚集起來，只等著迎接你們的到來。於是他催促你們一起進去，讓這場正式的相見趕快開始。</p><p>不久後，Count Edmont de Fortemps 親自現身，以沉穩而莊重的態度迎接你們。他告訴你們，既然已是 House Fortemps 的受庇護者，那麼一切應有的禮遇都不會少，這裡的家門也會為你們而開。Alphinaud 真心為這份款待感到感激，卻仍忍不住問出心中的顧慮——在這樣的局勢下，尤其是在你們背負著如今這種名聲的情況下，真的沒關係嗎？Count Edmont 並沒有動搖。他承認 Ishgard 向來把戰爭擺在第一位，因此才會長久封閉國門；他也清楚，自己如今的決定，多半已經讓教會與其他 High Houses 私下議論紛紛。但也正因為時局混亂，人們才更應該尋找可以並肩而立的盟友。只要你們繼續做那些無私的事，他相信那些身居高位的人也不至於真的公開提出異議。</p><p>聽見這番話後，Alphinaud 也重新站穩了心。他告訴 Count Edmont，就算你們的人數已經大不如前，你們想繼續走下去的決心也沒有改變。Count Edmont 對此十分欣慰，並勸你們別急著立刻投入下一步，而是先去熟悉這座也許會成為你們新容身之處的城市。之後，在宅邸中迎接你們的人還有 Artoirel 與 Emmanellain。前者以端正的禮節向你們致意，後者則半帶玩笑地說，Ishgard 很快就會開始流傳關於 House Fortemps 神祕客人的耳語。至於 Tataru，仍舊對眼前的一切感到目眩神迷，怎麼也無法把這座顯赫宅邸和 Haurchefant 平日的模樣完全連在一起。直到這一刻，你才第一次真正感覺到，自己不是單純地逃到了某個地方，而是終於抵達了一個可以重新開始的地方。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
  acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 阿爾菲諾 <small class="muted">(應接室, X:6.0, Y:6.1)</small></div></div>`,

};

const langToggle=document.getElementById('langToggle');
const pageTitle=document.getElementById('pageTitle');
const tabBtns=[...document.querySelectorAll('.tab-btn')];
const panels={
  story:document.getElementById('panel-story'),
  acq:document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments:document.getElementById('panel-comments')
};

function getLang(){return localStorage.getItem(LANG_KEY)||'EN';}
function applyLang(lang){
  const t=i18n[lang]||i18n.EN;
  pageTitle.textContent=t.pageTitle;
  langToggle.textContent=`🌐 ${t.langLabel}`;
  tabBtns.forEach(btn=>btn.textContent=t.tabs[btn.dataset.tab]);
  const active=tabBtns.find(b=>b.getAttribute('aria-selected')==='true')||tabBtns[0];
  renderPanel(active.dataset.tab,lang);
}
function wireClamp(panelEl,t){
  const clamp=panelEl.querySelector('.clamp');
  const btn=panelEl.querySelector('[data-role="expand"]');
  if(!clamp||!btn)return;
  function setLabel(){
    const collapsed=clamp.getAttribute('data-collapsed')!=='false';
    btn.textContent=collapsed?t.readMore:t.readLess;
  }
  setLabel();
  btn.addEventListener('click',()=>{
    const collapsed=clamp.getAttribute('data-collapsed')!=='false';
    clamp.setAttribute('data-collapsed',collapsed?'false':'true');
    setLabel();
  });
}
function renderPanel(key,lang){
  const t=i18n[lang]||i18n.EN;
  Object.keys(panels).forEach(k=>panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if(key!=='comments') panels[key].innerHTML=t[key];
  if(key==='story') wireClamp(panels[key],t);
  if(key==='comments') loadGiscusForCurrentLang();
}
tabBtns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab,getLang());
  });
});
langToggle.addEventListener('click',()=>{
  const cur=getLang();
  const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
  localStorage.setItem(LANG_KEY,next);
  applyLang(next);
});
applyLang(getLang());

const GISCUS_CFG={
  repo:'BELAUG-FFXIV/FFXIV_Library',
  repoId:'R_kgDOPyh4Kw',
  category:'General',
  categoryId:'DIC_kwDOPyh4K84CwPjL',
  theme:'preferred_color_scheme'
};
function uiLang(code){return code==='JP'?'ja':(code==='ZH'?'zh-TW':'en');}
function loadGiscusForCurrentLang(){
  const mount=document.getElementById('giscus_container');
  if(!mount)return;
  mount.innerHTML='';
  const langCode=getLang();
  const s=document.createElement('script');
  s.src='https://giscus.app/client.js';
  s.setAttribute('data-repo',GISCUS_CFG.repo);
  s.setAttribute('data-repo-id',GISCUS_CFG.repoId);
  s.setAttribute('data-category',GISCUS_CFG.category);
  s.setAttribute('data-category-id',GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping','specific');
  s.setAttribute('data-term',location.pathname+'｜'+langCode);
  s.setAttribute('data-reactions-enabled','1');
  s.setAttribute('data-emit-metadata','0');
  s.setAttribute('data-input-position','bottom');
  s.setAttribute('data-lang',uiLang(langCode));
  s.setAttribute('data-theme',GISCUS_CFG.theme);
  s.setAttribute('crossorigin','anonymous');
  s.async=true;
  mount.appendChild(s);
}
</script>
</body>
</html>
