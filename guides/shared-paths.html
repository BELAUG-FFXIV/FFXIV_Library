    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You reach the throne room at last, and Sphene lingers on Zelenia’s name, pained to accept that she is gone as well. Wuk Lamat bursts in with relief, and G’raha Tia demands to know what happened when you vanished so suddenly. Krile turns the confrontation over in her mind—if Preservation’s objective truly is what Calyx claimed, then the fact they know of the Source and the shards, and call their own world the Ninth, raises troubling questions—but for the moment Wuk Lamat is simply grateful that you and Sphene are safe.</p><p>As you retrace your steps through the castle, Wuk Lamat mentions that in the search they found a room that looked like a library. Krile asks whether you might take books with you, reasoning that learning about Alexandria of old could yield insights into Preservation, and Sphene welcomes you to any volumes that may prove useful. Shale asks to look around the throne area first, and Wuk Lamat notices a tiara—one that belonged to the Endless Sphene—lying there.</p><p>Shale identifies the tiara as a kind of regulator containing data of the Endless Sphene’s memories, which Calyx likely used to create the simulant. If the tiara remains in your keeping, she believes you should not have to contend with more simulants—though it is strange that it was abandoned. Perhaps the simulant had already served her role, as she said, or perhaps Calyx made a copy of the memories. Shale adds that the terminal holds little else of import, but she will make it accessible remotely from the Backroom. Facing the weight of what it contains, Sphene asks to keep the tiara with her—promising you may examine it whenever you wish—and Wuk Lamat agrees it is for the best, with Shale voicing no objections. Before you leave, Sphene offers Zelenia a quiet farewell.</p><p>Back at the Backroom, Wuk Lamat admits it was unsettling to find a real item connected to the Endless Sphene, and says Shale suspects the tiara was used to record Sphene’s actions—though whether Sphene knew is impossible to tell now. Krile explains that interference prevented locating you and even blocked linkpearl transmissions, and apologizes they were not present for the critical moment, while acknowledging you still found a way through. G’raha Tia condemns Calyx’s view of the reflections as mere fields to be harvested for his Endless, unable to abide such callous disregard for life. Shale shares what her geographic data suggests: the inner section containing the castle was residential early in Everkeep’s construction, and the outer section was added later as the structure expanded; she expects the system to dry the earth was installed to create a stable foundation on submerged land. Sphene admits the simulant implied she would not return, yet only time will tell, and for now there are no further leads on Calyx.</p><p>G’raha Tia suggests you contact your friends to share developments, and you reach out through linkpearl—Y’shtola confirms she is not surprised Preservation is behind the intrigue, says she has spoken with Gossan about a cure for levin sickness and formed a tentative plan to treat all who are stricken, and adds that she will inspect the government sector and begin studying the key in earnest. When you report back, Sphene asks what the others said, and the news that Milos has been treated immediately sends Wuk Lamat rushing to visit him. Sphene asks to accompany you, worried because he suffered the same condition, and Wuk Lamat welcomes her. With everyone scattering to their tasks—Krile and G’raha Tia to observe Solution Nine, Shale and Gulool Ja to chase Calyx’s trail and learn more about the key—you move carefully toward Milos’s apartment in residential radius 9-14.</p><p>There, you find Milos sitting up, and Wuk Lamat marvels even knowing the treatment works. Sphene resolves to keep quiet so as not to draw suspicion, remembering that the Endless Sphene visited him often. Isadora confesses she once hoped Milos might be made an Endless so he would not suffer, but now she wants him to recover, grow up, and live a normal life—so she can be with him as his mother, and nothing else. Alisaie administers a healing spell and warns that while he should improve, relapse is possible, and as a precaution Milos should be kept away from lightning-infused objects, including regulators. Isadora decides she will part with the regulator for Milos’s sake, and even consider moving outside the dome if the environment is not good for him, while Wuk Lamat invites them to Tuliyollal.</p><p>As Isadora listens to the explanation, Milos speaks with wonder at being able to talk again, finally able to thank his mother—and to tell her he is happy and likes it when she strokes his hair. Alisaie reassures him it will grow easier to speak with time, and Milos remembers how Queen Sphene always cheered him up and promised she would cure him. He says he will practice walking with his mother, and next time he will come visit you. Seeing him doing so well, Wuk Lamat reflects that the Endless Sphene truly wanted her people to be happy, and that her love reached Milos even amid conflict. Sphene answers that the Endless version of herself gave Milos strength without any special power, and she wishes to watch him grow too—to walk beside the people of Alexandria. She rejects Calyx’s path, which has brought unease and misery in the name of “evolution,” and vows instead to forge her own path—one that honors the memory of her other self.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたが玉座の間へ辿り着くと、スフェーンはゼレニアの名を口にし、彼女まで失ったことを思うと胸が痛むとこぼす。ようやく見つけたとウクラマトが駆け寄り、突然姿を消したあなたたちに何が起きたのかとグ・ラハ・ティアが問いただす。クルルは、保全機構の目的がカリュクスの語った通りなら、原初世界と鏡像世界の存在を知り、自分たちの世界を第九世界と呼ぶこと自体が新たな疑問を生むと指摘するが、ひとまずウクラマトはあなたとスフェーンの無事を喜ぶ。</p><p>城内を引き返しながら、ウクラマトは捜索中に図書館のような部屋を見つけたと話す。クルルは古い時代のアレクサンドリアを知れば保全機構への手掛かりになるかもしれないとして、本を持ち帰れないかと尋ね、スフェーンは役に立つなら自由に使ってほしいと許す。シャーレはまず玉座の周辺を調べたいと言い、そこでウクラマトは、エンドレスのスフェーンが身に着けていたはずのティアラを見つける。</p><p>シャーレはそれがレギュレーターの一種であり、エンドレスのスフェーンの記憶データを収めていると見立てる。カリュクスはそれを用いてシミュラントを作ったのだろうし、ティアラをこちらが確保している限り、これ以上シミュラントに悩まされずに済むはずだという。とはいえ放置されていたのは不可解で、シミュラントが言った通り役目を終えたからなのか、あるいはカリュクスが記憶の複製を作っていたのかもしれない。端末には重要な情報はあまり残っていないが、シャーレはバックルームから遠隔で閲覧できるようにすると告げる。スフェーンは、別の自分の記憶が宿るティアラを自分が預かりたいと願い出て、いつでも調べられるようにすると約束する。ウクラマトはそれが最善だと頷き、シャーレも異論はないと言う。去り際、スフェーンはゼレニアに別れを告げる。</p><p>バックルームに戻ると、ウクラマトは、エンドレスのスフェーンはリビングメモリーの外では投影された姿に過ぎなかったから、実物の遺品が出てきたのは驚きだったと語る。帰路にシャーレへ尋ねたところ、ティアラはスフェーンの行動を記録するために使われていたのではないかというが、本人の承知だったかは今となっては確かめようがない。それでも悪用はできなくなったのだから、そこだけは救いだとウクラマトは言う。クルルは妨害で所在が掴めず、リンクパールでの通信さえ遮られていたと詫び、肝心の局面に立ち会えなかったが、いつも通りあなたが切り抜けたのだと認める。グ・ラハ・ティアは、カリュクスが鏡像世界をエンドレスのための収穫地と見なしていることに怒り、生命を軽んじる冷酷さは到底受け入れられないと吐き捨てる。シャーレは地形データの分析結果として、城を含む内側区画はエヴァーキープ建設初期には居住区だったらしく、後に外側区画が追加されて現在の形へ拡張されたのだろうと述べ、さらに水没地に安定した基礎を築くため土を乾かす仕組みが導入されたはずだと推測する。スフェーンは、シミュラントは戻らないような口ぶりだったが結局は時間次第であり、今はカリュクスに関する新たな手掛かりもないと認める。</p><p>グ・ラハ・ティアは、状況を共有するため友人たちに連絡してはどうかと提案し、あなたはリンクパールで連絡を取る。ヤ・シュトラは保全機構が暗躍していたことに驚きはなく、あなたが無事だと聞いて安堵したと言い、ゴッサンとの会合を終えて雷電病の治療法を伝え、罹患者全員を治療するための仮の方針を立てたと報告する。彼女は政府区の様子も調べ、鍵に執着するカリュクスに備えて鍵そのものも本格的に研究すると言う。連絡を終えると、ミロスの治療が済んだと聞いたウクラマトは会いに行こうと急ぎ、スフェーンも自分と同じ症状だったなら心配だとして同行を願い、ウクラマトは快く受け入れる。クルルはソリューションナインの様子見に出て、グ・ラハ・ティアも同行する。シャーレはカリュクスの足跡を追い、ヤ・シュトラのために鍵の情報も探るつもりだと言い、グルージャも手伝うと申し出る。こうしてあなたたちは居住区の居住区画九の十四にあるミロスの部屋へ向かう。</p><p>部屋ではミロスが起き上がっており、治療が効くと分かっていてもウクラマトは驚嘆する。スフェーンは疑いを招かぬよう静かにすると決め、エンドレスの自分がしばしばミロスを見舞っていたことを思い出す。イサドラは、かつてはミロスだけでもエンドレスになれれば苦しまずに済むのにと思ったが、今はアリゼーのおかげで回復へ向かい、普通の人生を歩めるのだから、母としてそばで見守り共に年を重ねたいと語る。アリゼーは回復を確かめつつ治癒の魔法を施し、しばらく息苦しさは残るが次第に話しやすくなると励ます。一方で再発の可能性もあるため、雷の乙太を帯びた物から遠ざけるべきで、レギュレーターも対象だと注意する。イサドラはミロスのためにそれを外すと決め、環境が合わないならドームの外へ移ることも考えると言う。ウクラマトはトライヨラルへ来るよう勧め、イサドラは安心した様子で手順の説明を求める。</p><p>ミロスは、以前は母に礼すら言えなかったのに、今は話せるようになったと喜び、たくさん話せること、髪を撫でられるのが好きだという気持ちを伝えられることを口にする。アリゼーは母も同じく嬉しいはずだと笑みを向ける。ミロスは、女王スフェーンがいつも元気づけてくれ、必ず治すと言ってくれたことを思い出し、今日は母と歩く練習をして、次はあなたに会いに行くと言う。ウクラマトはミロスの回復を喜び、エンドレスのスフェーンは人々の幸せを願っており、戦わねばならなかったとしてもその愛は本物で、ミロスにも届いたのだと語る。スフェーンは、エンドレスの自分は特別な力に頼らずミロスを支えたのだと受け止め、自分も彼の成長を見守り、アレクサンドリアの人々とともに歩みたいと願う。そして進化の名のもとに不安と苦しみをもたらしたカリュクスの道は容認できないとして、別の自分の記憶を尊びながら、自分自身の道を切り拓くと誓う。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> シェール <small class="muted">(バックルーム, X:6.1, Y:6.5)</small></div></div>`,

    </div>`,

  },

    story:`<div class="clamp" data-collapsed="true"><p>你們終於在 throne room 會合。Sphene 低聲喚著 Zelenia 的名字，想到她也已不在，心裡一陣刺痛。Wuk Lamat 帶著如釋重負的笑意衝了進來，說總算找到你們；G’raha Tia 則皺眉追問你們突然消失到底發生了什麼事。Krile 判斷 Preservation （Alexandria 背後運作的組織，與近期的陰謀和 Calyx 的行動有關）的目標看來確實如 Calyx 所言，但他們不只知道 Source (原初世界) 與 Shards (鏡像世界)，甚至把自己的世界稱作「Ninth （第九世界）」，這讓人不得不多想；然而此刻 Wuk Lamat 更在意的是，你與 Sphene 都平安無事。</p><p>回想搜查過程，Wuk Lamat 說你們失聯時，他們在城內找到一間像圖書館的房間。Krile 希望能帶走一些書，因為若能理解古老的 Alexandria，也許就能對 Preservation 有更深入的洞察。Sphene 說仍有書籍留存，並允許你們取用任何可能派得上用場的書。Shale 想先在 throne 附近看看，而就在那裡，Wuk Lamat 發現一頂 tiara——那是 Endless Sphene 的。</p><p>Shale 判斷那頂皇冠是一種調節器，裡面保存著 Endless Sphene 的記憶資料；Calyx 很可能用它來製造擬造體。這也意味著，只要皇冠在你們手上，今後應該就不必再面對更多 Simulant (仿造體)。至於他為何會放棄它，確實古怪：也許Simulant (仿造體) 正如她所說已完成角色，也許 Calyx 早已複製了那份記憶。Shale 補充說，這個終端機上似乎沒有留下太多關鍵資訊，但她會把它處理成能從 Backroom 遠端存取。Sphene 望著那頂皇冠，明白裡頭裝著「另一個自己」的記憶與她作為 Alexandria 女王的旅程，於是請求把皇冠先由她保管，你們想研究時隨時都可以。Wuk Lamat 認為這樣最好，Shale 也表示沒有異議。離開前，Sphene 向 Zelenia 道別。</p><p>回到 Backroom，Wuk Lamat 說 Endless Sphene 在 Living Memory 之外只是投影，因此在 throne room 看到她的實物遺留讓人很意外；他也轉述自己路上問過 Shale，Shale 認為那頂皇冠可能被用來記錄 Sphene 的行動，但如今已無從確認是否得到她的同意。不過至少它不可能再被拿去做可疑用途，多少能安心些。Krile 也說，當時的干擾讓他們無法定位你的位置，連 linkpearl 傳訊都被阻斷；她為自己沒能趕上關鍵時刻道歉，但也承認你一如往常找到辦法處理了局面。G’raha Tia 對 Calyx 的態度極為反感，認為他把 reflections 當成替 Endless 收割乙太的「田地」，這種對生命的冷酷漠視他無法接受。Shale 則分享她蒐集到的地理資料：城堡所在的內側區域，似乎在 Everkeep 建造初期曾作為居住區；之後才追加外側區域，擴建成如今的規模。她推測為了在沉沒的土地上建立穩固地基，他們安裝了能把土地乾燥化的系統。Sphene 說 Simulant (仿造體) 給人的感覺像是不會再回來，但終究只能交給時間驗證；而目前你們也沒有更多關於 Calyx 的線索。</p><p>G’raha Tia 提議你先聯絡同伴，把最新進展互通一下。你透過 linkpearl 聯絡到 Y’shtola，她聽完後說 Preservation 會在背後操弄並不令人意外，也慶幸你們安然無恙；她剛結束與 Gossan 的會議，已告知「le​​vin sickness (被雷電乙太侵蝕的病)」的治療方式，並初步擬定要如何治療所有患者。她接著表示自己會去 Government Sector 巡視是否還有異狀；而既然 Calyx 執著於鑰匙，她也該開始認真研究那把鑰匙本身。當你把消息帶回，Sphene 關心大家怎麼說，而 Wuk Lamat 一聽到 Milos 已治療完成，立刻說必須去看他。Sphene 希望能同行，因為他與她曾有同樣的病症，她忍不住擔心；Wuk Lamat 當然同意。Krile 則打算在 Solution Nine 四處看看，並說她同樣擔心女王的缺席，而且只要「成為 Endless」仍是一個選項，局勢就不可能自行平息。G’raha Tia 說自己本就想逛些店，會與 Krile 一起行動；Shale 想趁大家分頭時追查 Calyx 的足跡，也會替 Y’shtola 挖掘鑰匙的情報；Gulool Ja 說他也要幫忙。Sphene 叮囑所有人務必小心，因為誰也不知道 Calyx 還會安排什麼。於是你們前往 Milos 的住處——Residential Radius 9-14。</p><p>你到達後，看見 Milos 竟能坐起來，Wuk Lamat 說自己明知治療有效，還是忍不住讚嘆；Sphene 也說她知道 Endless 的自己常常去看望 Milos，因此她會保持低調，以免引人起疑。Isadora 坦白自己曾希望 Milos 至少能成為 Endless，這樣就不必再受苦；但現在因為 Alisaie，Milos 正走向康復，能夠長大並過正常生活，她也想以「母親」的身分陪他走過每一步，而不是成為別的什麼。Alisaie 表示她會再施放治癒魔法以策萬全，並提醒 Milos 仍會暫時喘不過氣，但往後說話會逐漸變得容易；同時也不能排除復發，因此最好讓他遠離帶有雷屬乙太的物品。Isadora 追問是否包含調節器，Alisaie 說包含，並理解要放下長期佩戴的東西並不容易，但決定權在她。Isadora 立刻表態：為了 Milos，她會做到；如果 dome 內的環境不利於他，她也必須考慮搬到 the dome（罩住 Yyasulani 的巨型屏障）外。Wuk Lamat 馬上說 Tuliyollal 會非常歡迎他們，Isadora 聽後明顯安心，並請你們說明整個流程。</p><p>Milos 則以顫抖卻清晰的聲音說，他很開心自己能再度說話；以前他甚至沒辦法感謝母親照顧他，但現在他能跟她聊很多，能告訴她自己很幸福，也能說他喜歡她撫摸自己的頭髮。Alisaie 說他的母親一定也很開心能與他交談。Milos 想起 Queen Sphene 曾經常常鼓勵他、總說一定會治好他；他說今天會和媽媽練習走路，下次他要去拜訪你們。離開前，Wuk Lamat 說看到 Milos 這麼好真的太好了；Sphene 則說，Endless 的自己帶給他撐下去的力量，卻沒有依靠任何特殊力量。Wuk Lamat 回應說，她真心希望她的人民幸福——即使你們必須戰鬥，她對他們的愛仍非常真實，也傳到了 Milos 身上。Sphene 望向 Milos，說她也想看著他長大，想一步步走在 Alexandria 的人群之中；而以「進化」為名，Calyx 造成了太多不安與痛苦，她無法認同他的道路。她最後堅定表示，她要走出屬於自己的路——一條能尊重並承接「另一個自己」記憶的道路。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Shale <small class="muted">(The Backroom, X:6.1, Y:6.5)</small></div></div>`,

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
