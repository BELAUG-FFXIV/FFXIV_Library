  EN:{
    langLabel:'English',
    pageTitle:'Life, Materia and Everything',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Back in the Solar at the Waking Sands, Minfilia turns the conversation from Ungust and the Amalj’aa back to the greater threat that looms over the realm. The Scions may seek a peaceful solution to the problem of the primals, she says, but they must also be ready to fight for their cause when talk fails. To that end, she wants you properly prepared before you next take to the field. She tells you of a goblin acquaintance of hers—Mutamix Bubblypots—who enjoys no small repute as a scholar. It was Mutamix who introduced a revolutionary method of enhancing equipment to Eorzea, a process involving a substance known as materia. Once, this knowledge was a closely guarded secret, but thanks to Mutamix and his students, it has been spread for the benefit of the entire realm. Minfilia believes it would serve you well to understand this craft yourself. To that end, she presses a blade into your hands and asks you to bring it to Mutamix, that he might use it to demonstrate his art. You are to seek him at his camp in central Thanalan, a place called the Bonfire—if you look to the horizon for a steady pillar of smoke, the way will reveal itself.</p>
      <p>You follow her instructions to central Thanalan and soon find the Bonfire, a ring of goblin tents and contraptions clustered around a blazing fire. There, you are greeted by the strange, clipped speech of Mutamix Bubblypots and his students. He peers at you with wide eyes, remarking that an “uplander” has come to his tent-ring. When he hears Minfilia’s name, recognition lights his features; word of her request has reached him swiftly. Around you, his apprentices begin a demonstration in their own peculiar manner of speech. One explains that a “fighty-tool drinks in airyself,” while another adds that, when full of that airy essence, the fighty-tool changes into a stony shine called materia. A third chimes in that, if materia is joined to another piece of equipment, the host weapon takes that airy power into itself. At Mutamix’s signal, they take the blade you brought and a piece of materia and set about their work, inviting you to watch closely. With practiced movements and a few odd mutters, they complete the process, and Mutamix declares that the fighty-tool has been reborn with new strength.</p>
      <p>Once the demonstration is done, Mutamix hands the enhanced blade back to you, reminding you to return it to Minfilia. His students, however, are not yet finished with their lesson. One of them explains more plainly that materia is, strictly speaking, a kind of crystal created by drawing out the aetheric constituents from a piece of equipment and crystallizing them. Not just any gear will do: the item must possess sufficient spiritbond—a measure of how fully it has been imbued with its owner’s spirit through use. Another student elaborates that attaching a piece of materia to gear imbues the host item with the materia’s power, which is how Mutamix turned your rather unimpressive dagger into something actually worth wielding. Mutamix himself then tilts his head and asks if you wish to become a “joiner of materia.” If so, he says, you would do well to fill your “braincase” with knowings of crafty-making. With proper knowledge of crafting, you too can become one who joins materia to gear. If you want your head to rattle with such knowings, he suggests, you should trade words with his “learny-ones” and study further.</p>
      <p>When you return to Minfilia at the Waking Sands and place the transformed blade before her, she can see at a glance what a remarkable difference a single piece of materia can make. She is glad to hear that your visit to the Bonfire proved fruitful. Though the skills needed to manipulate materia are not easily acquired, she notes that the results speak for themselves, and the effort is plainly worthwhile. As you well know, the quality of one’s equipment can be the difference between victory and defeat, and materia may well give you the edge you need in the battles to come. She urges you to make this power your ally as you continue to face primals and other threats. Then, with that settled, she tells you that it is time to discuss your next mission. When you feel ready, you are to speak with her again so that the Scions may take the next step in their struggle for Eorzea’s future.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'生命、マテリア、すべての答え',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>「砂の家」の執務室に戻ったあなたに対し、ミンフィリアはウングストやアマルジャ族の件から話題を転じ、改めて蛮神問題という大きな脅威について語り始める。暁の血盟としては、あくまで平和的な解決策を模索しているが、いざというときには自らの大義のために剣を取る覚悟も必要だと彼女は静かに告げる。そのためにも、あなたが次に戦場へ赴く前に、しかるべき備えを整えておきたいのだという。そこで名前の挙がったのが、彼女の知り合いであるゴブリン学者、ミュタミクス・バブリポッツである。彼は、装備品を強化する革新的な手法──「マテリア」の力を利用する技術──をエオルゼアにもたらした人物として知られている。本来はごく限られた者だけが知る秘術だったが、ミュタミクスとその弟子たちが知識を広めたことで、今やその恩恵は多くの人々に行き渡っているのだとミンフィリアは説明する。あなた自身も、この技術への理解を深めておくべきだろうと考えた彼女は、一本の刃物を手渡し、それを携えてミュタミクスのもとを訪れ、実演を見せてもらってほしいと頼む。彼は中央ザナラーンの「ブラックブラッシュ」近く、「ボーンファイア」と呼ばれる野営地に常駐しているという。空を目印に立ちのぼる煙を探せば、自ずと道が見えてくるだろう。</p>
      <p>あなたは中央ザナラーンへ向かい、やがて焚き火を中心にゴブリンたちの天幕が輪をなしている「ボーンファイア」に辿り着く。そこでは、独特の言い回しを使うミュタミクス・バブリポッツとその弟子たちが出迎えてくれる。「アップランダー」がミュタミクスのテントリングに来たかと彼は大きな目を見開き、ミンフィリアの名を聞くやいなや、すでに話が耳に届いていると鼻息荒く頷く。その周りでは、弟子たちが実演の準備を進めながら、ゴブリン流の言葉で説明を始める。「ファイティツールは、使う者のエーテル──“エアリーセルフ”を飲み込む」「たっぷりエアリーセルフを吸い込んだファイティツールは、“マテリア”と呼ばれる石のきらめきに変わる」とひとりが言い、別の弟子が「そのマテリアを別の装備品に組み合わせれば、そのファイティツールはエアリーセルフの力を宿す」と続ける。ミュタミクスはあなたから預かった刃物とマテリアを手に取り、よく見るようにと促す。弟子たちが手際よく作業を進め、奇妙な呟きとともに儀式めいた工程を終えると、ミュタミクスは「ファイティツールは生まれ変わった」と満足げに宣言するのだった。</p>
      <p>実演を終えたミュタミクスは、強化された刃物をあなたに返し、ミンフィリアへの土産として持ち帰るよう告げる。その一方で、弟子たちはさらに細かな解説をしてくれる。ひとりは、マテリアとは厳密には一種のクリスタルであり、装備品に蓄えられたエーテル的な成分を引き出し、結晶化させることで生成されるのだと説明する。ただし、どんな装備でもよいわけではなく、使い込まれて持ち主の「スピリットボンド」が十分に高まっていることが条件だという。別の弟子は、マテリアを装備品に装着することで、その装備がマテリアの力を宿し、それがミュタミクスの手によって凡庸な短剣が「使う価値のある武器」へと変わった仕組みなのだと補足する。最後にミュタミクス自身が首を傾げ、「アップランダーもマテリアの“ジョイナー”になりたいか」と問いかける。もしそうなら、「クラフティメイキング」の知識で頭の中を満たすのが一番だと続ける。ものづくりの技を身につければ、あなた自身もマテリアを装備品に組み合わせる者になれるのだと語り、もっと知りたければ、自分のまわりにいる「ラー二ーな者たち」と言葉を交わし、学びを深めるとよいと勧めてくる。</p>
      <p>こうしてボーンファイアでの学びを終えたあなたは、「砂の家」のミンフィリアのもとへと戻り、変貌を遂げた刃物を差し出す。彼女はひと目見ただけで、たったひとつのマテリアがこれほどまで装備品を変えるのかと感心し、ボーンファイアへの訪問が有意義なものだったと感じていることだろうと微笑む。マテリアを扱う技術を身につけるのは決して容易ではないが、その労力に見合うだけの成果があることは明らかだと彼女は語る。装備の質は、勝敗を分ける決定的な要素になりうる──それをよく知るあなたにとって、マテリアはこれからの戦いで必要な一歩先の力を授けてくれるかもしれない。ミンフィリアは、その力を味方につけるよう改めて勧めたうえで、次なる任務について話し合う時が来たと告げる。準備が整ったとき、改めて自分に声をかけてほしい──そう言って、彼女は新たな戦いの幕開けを静かに予感させるのだった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ミンフィリア　<small class="muted">西ザナラーン (X:6.9, Y:6.1)</small></div>

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'生命、魔晶石，萬物的答案',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 The Waking Sands 的 The Solar 裡，Minfilia 把話題從 Ungust 和 Amalj’aa 的陰謀拉回到更宏觀的威脅──primals。她說，Scions 雖然始終在尋找和平化解蛮神問題的方式，但必須隨時做好為「這份信念」而戰的準備。為了讓你在未來的戰場上能有更充分的武裝，她希望你先去掌握一項與裝備強化相關的重要知識。她提到一位 goblin 學者 Mutamix Bubblypots，是她相識已久的「老朋友」，在 Eorzea 享有不小的名聲。正是這個 goblin，把一種革命性的裝備強化技術──也就是運用 materia 的方式──引進了這片大地。這套技術原本是少數人嚴密保守的秘密，但在 Mutamix 和他的學生們主動傳授之下，如今已散播開來，讓整個 realm 都得到了實質的好處。Minfilia 認為，你也應該理解這套系統的基本運作方式。她把一把武器交到你手中，請你帶去給 Mutamix，讓他以這把「fighty-tool」為例，直接在你面前示範他的技藝。Mutamix 長期待在 Central Thanalan 的一座營地，名為 The Bonfire，只要留意地平線上那道不斷升起的煙柱，就能順利找到他的所在。</p>
      <p>你依照指示前往 Central Thanalan，很快就看到一處以熊熊營火為中心、周圍環繞著 goblin 帳篷與奇妙裝置的聚落──The Bonfire。當你靠近時，Mutamix Bubblypots 用特有的 goblin 腔調迎接你，疑惑著是哪位「uplander」來到他的 tent-ring，一聽見 Minfilia 的名字，卻立刻露出恍然的表情，說她的「舌頭拍打聲」早就快快傳進他的耳朵。隨即，他的學生們開始準備示範，一邊用半懂不懂的詞彙向你解釋：有一人說「fighty-tool 會喝下使用者的 airyself」，另一人補充，當這件裝備累積了足夠的 airyself，就會化成一塊閃著石光的結晶，那就是 materia。第三個學生接著說，如果讓 materia 與其他 fighty-tool 結合，新的武器就會獲得那股 airyself 的力量。Mutamix 接過你帶來的那把武器和一塊 materia，要你把視線牢牢盯在上面，親眼看清整個過程。他與學生們配合熟練，伴隨著幾句古怪的嘟囔聲完成了最後步驟，然後宣告這把 fighty-tool 已經「重生」，獲得了 materia 的力量。</p>
      <p>示範完成後，Mutamix 把強化過的武器交回你手中，叮囑你把這件成果帶回給 Minfilia 看看。而在一旁的學生們則進一步用較為「正常」的話解釋細節：materia 嚴格來說是一種 crystal，是從裝備之中抽取出 aetheric 成分後，再加以結晶化所形成的。並不是任何一件裝備都能這樣處理，必須等那件物品與主人之間的 spiritbond 足夠深，也就是累積了足夠使用經驗與「心血」之後，才能抽出這樣的結晶。另一位學生說明，當你把 materia 裝到裝備上，就等於把這顆結晶的力量注入宿主，因此 Mutamix 才能把原本那把連切牛排都吃力的匕首，變成真正值得拿在手上的武器。最後，Mutamix 歪著頭，問你是否也想成為一名「joiner of materia」。若有這個打算，他建議你先用「crafty-making」的知識把自己的腦袋填滿。只要學會足夠的製作技巧，你也能親手將 materia 與裝備結合。要是你想讓腦袋裡充滿這些關於 materia 的 knowings，就去多和他身邊這些「learny-ones」交換意見、好好學習一番。</p>
      <p>結束在 The Bonfire 的見習之旅後，你帶著已經煥然一新的武器回到 The Waking Sands，將它恭敬地呈上給 Minfilia。她只看一眼，就察覺到這把武器與先前相比有了明顯的變化，感嘆一枚 materia 就能帶來如此顯著的提升。聽說你在 Bonfire 的體驗頗有收穫，她也感到十分欣慰。她提醒你，掌握 materia 並非易事，相關技術需要時間與練習才能熟練，不過從眼前這項成果來看，投入的努力確實非常值得。你早已知道，裝備品質往往就是勝負之間的關鍵，而 materia 很可能正是你在未來戰鬥中所需要的那一份「額外優勢」。Minfilia 鼓勵你把這股力量視為夥伴，好好運用在接下來與 primals 以及各種威脅對抗的每一場戰鬥之中。話題告一段落後，她告訴你，接下來該談談你的下一項任務了。等你準備妥當，再來找她，就能一同邁向下一階段的行動，繼續為 Eorzea 的未來而奮戰。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
