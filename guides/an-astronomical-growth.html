<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>An Astronomical Growth | BELAUG · FFXIV Library</title>
  <meta name="description" content="DoHDoL – An Astronomical Growth (EW Patch 6.0)">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left">
        <a class="home" href="../index.html">🏠 Home</a>
      </div>
      <div class="right">
        <button id="langToggle" class="icon-btn" aria-label="切換語言">🌐 EN</button>
      </div>
    </nav>
  </header>

  <main class="container main">
    <div class="grid">
      <section class="card video-card">
        <div class="bd">
          <div class="video-wrap">
            <iframe id="ytFrame" src="https://www.youtube.com/embed/pyur-REbhSg"
              title="An Astronomical Growth" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="hd" id="pageTitle">An Astronomical Growth</div>
        <div class="tabs" role="tablist">
          <button class="tab-btn" role="tab" aria-selected="true"  data-tab="story">Story</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="acq">Acquisition</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="unlockq">Unlock Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="followq">Follow-Up Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="comments">Comments</button>
        </div>
        <div class="bd">
          <div id="panel-story"    class="tab-panel active"></div>
          <div id="panel-acq"      class="tab-panel"></div>
          <div id="panel-unlockq"  class="tab-panel"></div>
          <div id="panel-followq"  class="tab-panel"></div>
          <div id="panel-comments" class="tab-panel">
            <div id="giscus_container" style="min-height:320px;"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`An Astronomical Growth`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Jude eagerly asks you to resume the work where it left off. He explains that while ordinary telescopes gather light and form an image, the starlens (an experimental star-observing device) is meant to catch faint aetheric glimmers and cast them onto the surface of water, allowing the stars to be observed in a different way. Yet as he continued building it, he discovered that one crucial piece was still missing.</p><p>That missing piece, he says, is what will let the starlens guide the aether it captures onto the water. For that, he once again turns to your experienced hands and asks you to craft aetherial conductors for him. Once those are complete, he says, there will be only one final step left before the device is whole.</p><p>When you deliver the conductors, Jude is overflowing with gratitude. He says he is truly fortunate to have crossed paths with a craftsperson like you, and speaks with renewed conviction, believing that this fated partnership will lead the two of you to the rediscovery of the Azure Star. Even with the future still uncertain, he insists that he will find it.</p><p>With the new component in hand, Jude says he now has almost everything he needs. Only one last piece remains, and then the starlens will stand just one step away from completion. For a brief moment, he admits that even if he never finds the Azure Star, meeting you has already taught him something he will never forget—the value of perseverance.</p><p>But almost as soon as he says it, he corrects himself. Of course he will find it, he says. He must. This is the dream he has spent ten years pursuing, and he refuses to let doubt take hold before the end. When you encourage him to keep going, he steadies himself at once and says there will be time enough to worry later. For now, he will give everything he has. He asks you to return when you are ready to craft the final missing piece, and says he will wait eagerly for you, his heart burning so fiercely that it feels as though Ifrit himself has taken up residence within him.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Jude <small class="muted">(Old Sharlayan, X:5.3 Y:7.9)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-ten-year-promise.html">A Ten-year Promise</a></div><div class="row">CRP, LTW, WVR Lv. 88</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-promised-star.html">The Promised Star</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'ジュードの成長',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ジュードは、前回の続きに取りかかろうと、意気込んであなたへ声をかける。彼によれば、従来の望遠鏡が光を集めて像を映し出すのに対し、星見鏡はかすかなエーテルのきらめきを捉え、それを水面へ投じることで星を観測できる仕組みになっているという。だが製作を進めるうちに、そのために欠かせない肝心の部材が、まだ足りていないことに気づいたのだと明かす。</p><p>その不足している部材こそ、星見鏡が捉えたエーテルを水面へ導くために必要なものだった。そこでジュードは、再びあなたの熟練した手を借りたいと願い、エーテル伝導部材の製作を頼む。それさえ完成すれば、あとは最後のひと仕事を残すだけなのだと、彼は期待を隠さずに語る。</p><p>あなたがその品を届けると、ジュードは心からの感謝を口にする。あなたのような職人と巡り会えたことを幸運だと言い、この出会いこそが「蒼の星」の再発見へつながるのだと、強い確信をにじませる。たとえ先行きがどれほど厳しく見えようとも、自分は必ずあの星を見つけるのだと、あらためて決意を固める。</p><p>新たな部材を手にしたジュードは、必要なものはほとんど揃ったと告げる。残るのはあとひとつだけで、それさえ整えば、星見鏡は完成まであと一歩のところまでたどり着く。ふと彼は、たとえ「蒼の星」を見つけられなかったとしても、あなたと出会ったことで「諦めずに進み続けることの大切さ」を学んだのだと打ち明け、その教えは決して忘れないと静かに語る。</p><p>しかし次の瞬間、彼は自分の弱気を振り払うように言い直す。いや、見つけるのだ、と。見つけなければならないのだ、と。十年ものあいだ追い続けてきた夢なのだから、ここで揺らいでいる場合ではない。あなたが励ましの言葉をかけると、ジュードはすぐに気を取り直し、不安なら後でいくらでも抱けばよい、今はただ全力を尽くすだけだと力強く応じる。そして最後に必要な部材を作る時間ができたら、またここへ来てほしいと頼み、あなたを待ちながら、自分の胸の炎はますます激しさを増し、まるでイフリートが心に棲みついたかのようだと熱っぽく語る。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ジュード <small class="muted">（オールド・シャーレアン, X:4.1 Y:9.1）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-ten-year-promise.html">10年前の約束</a></div><div class="row">木工師、革細工師、裁縫師 Lv 88～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-promised-star.html">約束の星</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'Jude 的過往與成長',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Jude 一見到你，就迫不及待地想把先前中斷的工作重新接起來。他向你說明，傳統的望遠鏡是收集光線來投映影像，而 starlens（一種正在研製中的觀星裝置）則是捕捉微弱的乙太光芒，再把那些光芒投映到水面上，藉此完成觀星。不過就在他持續組裝的過程中，他發現還缺少了一個真正能做到這件事的關鍵零件。</p><p>而那個缺少的零件，正是能讓 starlens 所捕捉到的乙太順利投映到水面上的部材。於是，他再次向你請求幫助，希望借助你熟練的雙手，替他製作乙太傳導部材。他說，只要這一部分完成，整個裝置距離真正完成，就只剩下最後一步了。</p><p>當你把部材交到他手上時，Jude 幾乎是滿懷激動地向你道謝。他說，自己能遇見像你這樣的工匠，實在是莫大的幸運，甚至相信這段命運般的相遇，正是能帶領你們再次找到 Azure Star 的關鍵。哪怕眼前的局勢依舊黯淡，他也仍然斬釘截鐵地說，自己一定會找到那顆星。</p><p>有了這份新完成的部材之後，Jude 說自己幾乎已經把所需的一切都準備好了。如今只剩最後一個零件，等那部分也完成，starlens 就真的只差一步便能組裝完成。就在那一刻，他也短暫地流露出一絲坦白，說即使最後還是無法找到 Azure Star，至少與你相遇這件事，已經讓他學會了何謂堅持到底，而這份領悟，他永遠都不會忘記。</p><p>但話才說出口，他又立刻像是在斥責自己的動搖一樣改口。當然會找到，他說，自己非找到不可。畢竟這是他耗費整整十年去追逐的夢想，怎麼能在最後關頭被不安壓垮。當你鼓勵他繼續努力時，他也立刻重新振作起來，表示擔心與遲疑都可以留到之後再說，現在最重要的是先把全部力量都投入進去。他請你等有空製作最後那個缺少的零件時再來找他，說自己會一直滿心期待地等著你。而在你一次次的支持之下，他也感覺胸中的火焰正不斷高漲，幾乎像是 Ifrit 已經住進了自己的心裡。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Jude <small class="muted">(舊薩雷安, X:4.1 Y:9.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-ten-year-promise.html">十年前許下的約定</a></div><div class="row">CRP, LTW, WVR Lv. 88</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-promised-star.html">那顆約定的星星</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
