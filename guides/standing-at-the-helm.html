  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px;color:var(--fg)}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    #langToggle{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;font-weight:600}
    .lang-icon{width:17px;height:17px;display:block;flex:0 0 auto;opacity:.9}

    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}

      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }

    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}

    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}

    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
      max-height:420px;

      padding-right:8px;

    .stack{display:flex;flex-direction:column;gap:10px}

    .link{color:#0b60d8;text-decoration:none}

    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;

  </style>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Standing at the Helm',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more',
    readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Tataramu greets you with visible excitement, for the ceruleum engine has at last been integrated into the Dezul Qualan, bringing the airship into its final stage of construction. Once the vessel proves itself skyworthy, he believes the entire field of aeronautics will be changed forever. Yet one crucial task remains: the steering mechanism, the helm of the Dezul Qualan, must be completed with a level of precision only Gerolt, the master weaponsmith of Hyrstmill, can provide.</p>
      <p>You take Tataramu’s materials to Gerolt, but the legendary smith is in no mood for commissions. Nursing the aftermath of a night of heavy drinking, he mistakes your visit for yet another matter involving mystic weaponry and tries to send you away. His apprentice, Drake, apologizes for his master’s temper and offers to hear your request instead.</p>
      <p>After learning that the task concerns a custom helm for a new kind of airship, Drake understands why Tataramu sought Gerolt’s skill. Though Gerolt is known above all as a weaponsmith, his finest work demands both innovation and exacting attention to detail. Since Gerolt will not easily be persuaded in his current state, Drake suggests another approach: use part of the materials to craft the finest helm components you can, and let the quality of your workmanship stir the master’s professional pride.</p>
      <p>You make use of the workshop and craft the needed components with care. When Gerolt finally notices them, he is forced to admit that they are fine work. He had not expected you to be an artisan, yet he understands that even with such skill, you still came to him because the task demands something more. Seeing the determination behind the request, he agrees to take the components and create the steering mechanism for the airship, though he warns that he will need time and refuses to make delicate adjustments until the last fog of drink has cleared from his head.</p>
      <p>Gerolt promises that once he is satisfied with the work, the finished parts will be delivered to the shipyard. Drake is pleased that his master accepted the commission, hoping that Gerolt’s revived enthusiasm might even lead to another lesson in the craft. For the Dezul Qualan, this means one of the last great obstacles has been overcome, and the vessel’s helm is now in the hands of a smith who will see the job done properly.</p>
      <p>When you return to Ehcatl, however, the mood has changed sharply. Sezul Totoloc cries out that Tataramu is gone, taken away before the final components could be integrated. In his anger and grief, Sezul rails against the featherless ones, bitter that after the Ixal shared the secrets of balloons, others came to believe they owned the skies. The Dezul Qualan remains grounded, unable to move forward without Tataramu.</p>
      <p>Though Sezul’s rage burns fiercely enough for him to threaten violence should the chairman return to the Ehcatl Nine’s camp, he forces himself to wait and hope for Tataramu’s return. Until then, there is only one path left to them: continue crafting the needed parts, keep the dream alive, and prepare for the day the Dezul Qualan can finally take to the sky.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Tataramu <small class="muted">(North Shroud, X:24.5, Y:23.5)</small></div>

  JP:{
    langLabel:'日本語',
    pageTitle:'父、来る',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示',
    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>タタラムは、青燐機関が組み込まれたことで、デズル・クワラン号の建造がいよいよ最終段階に入ったと、興奮を隠せない様子であなたを迎えます。この飛空艇が空を飛べることを証明すれば、航空技術の世界は大きく変わるはずだと彼は信じていました。しかし、まだ大切な作業が残っています。デズル・クワラン号の舵取りを担う操舵機構を完成させるには、ハーストミルに住む名匠ゲロルトの伝説的な鍛冶の腕が必要なのです。</p>
      <p>あなたはタタラムから預かった材料を持ってゲロルトのもとを訪ねますが、当の名匠は依頼を受ける気分ではありませんでした。深酒の翌朝で頭痛に苦しむ彼は、あなたの用件をまた神秘めいた武器絡みの話だと思い込み、すぐに追い払おうとします。そこで弟子のドレイクが師の不機嫌を詫び、もし自分のような見習いでよければ事情を聞かせてほしいと申し出ます。</p>
      <p>新しい種類の飛空艇に合わせた特注の操舵輪を作りたいのだと知ると、ドレイクはタタラムがゲロルトの力を求めた理由を理解します。ゲロルトは何よりも武器鍛冶として知られていますが、彼が生み出す傑作には、革新への感覚と細部を見抜く厳しい目が欠かせません。とはいえ、今の機嫌では簡単に槌を取ってはくれません。そこでドレイクは、材料の一部を使って、あなた自身の腕でできる限り精巧な操舵機構の部品を作るよう提案します。その仕上がりが見事であれば、ゲロルトの職人としての好奇心を動かせるかもしれないのです。</p>
      <p>あなたは工房の設備を借り、必要な部品を丁寧に作り上げます。やがてそれを目にしたゲロルトは、酔いの気配を残しながらも、出来栄えのよさを認めざるを得ません。あなたが職人の技を持っているとは思っていなかった彼は、それほどの腕がありながらなお自分を頼ってきたことに、依頼の重みを感じ取ります。そして、その目に宿る熱意を見て、あなたの作った部品を使い、飛空艇の操舵機構を仕上げることを引き受けます。ただし、細かな調整は酒の霧が完全に晴れてからでなければできないため、完成までは少し時間が必要だと告げます。</p>
      <p>ゲロルトは、納得のいく仕上がりになったなら、完成した部品を造船所へ届けると約束します。ドレイクも、師が依頼を受けたことを喜び、その熱意が戻った勢いで、また鍛冶の技を少しでも教えてもらえるかもしれないと期待します。デズル・クワラン号にとって、これは最後の大きな障害のひとつを越えたことを意味していました。操舵機構は、引き受けた仕事を必ず仕上げる名匠の手に委ねられたのです。</p>
      <p>しかし、エカトル実験場に戻ると、空気は一変していました。セズル・トトロックは、タタラムがいなくなった、連れ去られたのだと叫びます。最後の部品を組み込むことができず、デズル・クワラン号は地上に留められたままでした。怒りと悲しみに駆られたセズルは、イクサル族が風船の秘密を分かち合ったというのに、羽根なき者たちは今や空を自分たちのものだと思っているのだと激しく憤ります。</p>
      <p>会長が再びエカトル空力団の野営地に足を踏み入れたなら、袋に詰めて枝で打ち据えてやるとまで怒りをあらわにしながらも、セズルは今は耐えて待つしかないと自分に言い聞かせます。タタラムが戻ることを信じ、その間に必要な部品を作り続けること。それだけが、デズル・クワラン号の夢をつなぎ止める道でした。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> タタラム　黒衣森：北部森林 <small class="muted">(X:24.5, Y:23.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="lathe-to-the-party.html">巡れ、夢の歯車</a></div>
      <div class="row">クラフター <small class="muted">Lv 1～</small></div>
      <div class="row">イクサル族 友好度ランク4「信頼」</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="never-be-royal.html">銀嶺高き、夢遠く</a></div>
    </div>`
  },

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'父親來臨',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Tataramu 帶著明顯的興奮迎接你，因為 ceruleum engine 已經整合完成，Dezul Qualan 的建造也正式進入最後階段。他相信，只要這艘飛空艇證明自己能夠翱翔天際，航空技術的領域就再也不會和過去一樣。不過，還有一件關鍵工作必須完成：Dezul Qualan 的操舵機構，也就是它的舵輪，需要 Hyrstmill 的名匠 Gerolt 以傳奇般的鍛造技術，將必要零件精準結合與校準。</p>
      <p>你帶著 Tataramu 準備的材料前往 Gerolt 那裡，然而這位傳奇鐵匠完全沒有接委託的心情。宿醉讓他的頭痛得像被人拿鐵鎚敲打一樣，他一看到你，便以為又是什麼神祕武器相關的麻煩找上門，立刻想把你趕走。這時，他的徒弟 Drake 替師父的壞脾氣致歉，並表示如果你不介意由學徒接洽，他願意先聽聽你的請求。</p>
      <p>得知你要委託的是為一種全新飛空艇打造特製舵輪後，Drake 立刻明白為什麼 Tataramu 會想尋求 Gerolt 的技術。Gerolt 雖然最以武器鍛造聞名，但他創造出的傑作都需要創新的眼光，以及對細節近乎苛刻的掌握。不過，以 Gerolt 眼下的狀態，除了債主上門之外，幾乎沒有什麼能讓他願意拿起鐵鎚。於是 Drake 建議你先拿一部分材料，親手製作出盡可能精良的舵輪零件；只要成品足夠用心，也許就能喚起 Gerolt 身為職人的好奇心與競爭意識。</p>
      <p>你借用了工房的設備，細心完成所需的零件。當 Gerolt 終於注意到那些成品時，即使還帶著宿醉的不耐，他也不得不承認那是相當出色的手藝。他原本沒想到你也是有技術的工匠，但正因如此，他更明白，即使你有這樣的能力，仍特地來找他，就代表這份工作確實需要更高層次的技術。看見你眼中的熱意後，Gerolt 同意接下委託，將你製作的零件進一步完成為飛空艇的操舵機構。不過，他也說明，精細調整不能在酒氣未散時進行，因此需要一點時間。</p>
      <p>Gerolt 承諾，只要他確認成品達到滿意的水準，就會把完成的部件送到造船地點。Drake 對師父願意接受委託感到欣喜，也期待 Gerolt 因重新燃起熱情，能再教他一些真正的鍛造技術，而不只是修理鍋具。對 Dezul Qualan 而言，這代表最後幾道重大難關之一已經越過；操舵機構如今交到了那位一旦接下工作，就會把它徹底做好的名匠手中。</p>
      <p>然而，當你回到 Ehcatl 時，氣氛已經徹底變了。Sezul Totoloc 驚慌又憤怒地喊著，Tataramu 不見了，被人帶走了，他的夢也像是被掐住、踩碎了一樣。最後的部件無法整合，Dezul Qualan 仍然只能停留在地面。Sezul 在悲憤中責怪那些「無羽者」，明明 Ixal 曾經分享氣球的祕密，如今他們卻像是自以為擁有天空一般。</p>
      <p>Sezul 的怒火強烈到甚至說，若那位會長再踏進 Ehcatl Nine 的營地，他就要把對方塞進袋子裡，用樹枝狠狠打到見血。可是即使如此，他也只能強迫自己忍耐，等待並祈望 Tataramu 歸來。在那之前，他們唯一能做的，就是繼續製作必要的部件，守住 Dezul Qualan 的夢，直到它終於能迎來飛上天空的那一天。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 塔塔拉姆，黑衣森林北部林區 <small class="muted">(X:24.5, Y:23.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="lathe-to-the-party.html">不可思議的命運</a></div>
      <div class="row">能工巧匠 <small class="muted">等級 1 以上</small></div>
      <div class="row">鳥人族友好友好關係等級4「信賴」</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="never-be-royal.html">高原雪嶺、少年逐夢</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
