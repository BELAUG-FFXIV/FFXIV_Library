    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Thancred explains that summoning a primal is no small feat. It demands a tremendous concentration of aether, which is why the beast tribes go to such lengths to amass crystals. Once a primal manifests in physical form, its thirst for aether only grows more voracious, and it will gladly drink the land dry without a thought for the consequences. Considering their fearsome strength, he says, it may well be within their power to do exactly that—and it is for this reason that you and the Scions must do your utmost to oppose them.</p>
      <p>Y’shtola then tells you how the Scions of the Seventh Dawn came to be. One group was formed by Sharlayan natives such as herself, known as the Circle of Knowing; the other, made up of individuals who share your rare gift, was called the Path of the Twelve. The terrible events that heralded the Seventh Umbral Era taught them that only by standing together could they hope to oppose the evil that seeks to consume the realm. Yda cheerfully adds that this place, the Waking Sands, is now the Scions’ headquarters, though it used to be elsewhere until circumstances forced them to move. Papalymo notes that while there are others who possess the Echo, none wield the power as strongly as you do, and that this is why their expectations of you are so high. Urianger, in his turn, recites lines from the Divine Chronicles—of seven waning moons and seven rising suns, of roiling divine order and writhing corpses—and explains that these words now clearly describe the dire circumstances of the present age, in which the realm shudders and twists and the dawn cowers beneath a smothering night, while they all await the unborn era’s seed: the Light that will pierce the Darkness.</p>
      <p>Gathering their words together, Minfilia once more sets forth the Scions’ single objective: to safeguard the future of Eorzea. Among their gravest concerns, she reminds you, are the godlike beings known as the primals, and they have long struggled to find a lasting solution to the threat these entities pose. She admits that she does not know what you desire for yourself, nor what first brought you to Eorzea, but she firmly believes that the power you possess was given for a purpose, and she asks you to keep that in mind when you decide how to answer her. Faced with the choice, you pledge your aid in spite of the dangers. Minfilia takes your response as she had hoped to, and accepts your help without hesitation.</p>
      <p>Pleased, she turns to introduce you properly to the order. She speaks of Sharlayan, once counted among the six city-states of Aldenard, whose people were keepers of wisdom both old and new. Their mastery over magic and aether was unsurpassed, and even the Garleans knew to fear them. When the realm began to fall into chaos and most of their countrymen fled back to the motherland, a few chose to remain and devote their lives to safeguarding Eorzea’s future. These noble men and women were called Archons—and those same brave souls now stand before you. The masked woman is Yda, and beside her is Papalymo; they are charged with surveying the Twelveswood, and they greet you in turn, remarking that they always believed you would agree to help. Yda then eagerly introduces Thancred as the Scions’ man in Ul’dah, jewel of the desert, and he welcomes you to the team as though he had never doubted your decision. At his side stands Y’shtola, who watches over Limsa Lominsa; she offers a calm greeting and says she has been expecting you. Last is Urianger, who presides over all affairs within these halls and shares a few solemn words about dawn banishing even the darkest night, glad that your paths have finally crossed. Y’shtola recalls how, after their leader was lost at the Battle of Carteneau, they sought out Minfilia and others who shared her talent, and together they established the Scions of the Seventh Dawn. Minfilia adds that, along with the Archons, those blessed with the Echo play a pivotal role in their effort to forge a brighter tomorrow for the realm, and she introduces Tataru, the clerk who ensures that everything runs smoothly. Tataru is pleased to make your acquaintance, and Minfilia expresses the hope that, in time, you will come to think of them all as family.</p>
      <p>Only then does Minfilia turn to the task she has in mind for you. She says it is time to assign your first duty, and asks Urianger whether the documents from the Students of Baldesion have arrived; he confirms that they have. With that settled, she explains that they have received a request for aid from the Immortal Flames and invites Thancred to do the honors of presenting the details. He reports that a crystal caravan registered to Amajina & Sons Mineral Concern was attacked and robbed of its cargo, and that within a bell of the robbery, several people were reported missing from the shantytown outside Ul’dah. At a glance, Minfilia observes, one might assume the involvement of ordinary bandits and kidnappers, the sort of crimes the Immortal Flames contend with on a near-daily basis—but this time they have reason to believe a primal is involved. Thancred agrees, explaining that the evidence left behind implicates the Amalj’aa, known worshipers of Ifrit, and that if one also considers what was taken, there can be no doubt that the crimes were committed in a primal’s name.</p>
      <p>To help you better understand the nature of their struggle with the primals, Minfilia declares that she would have you play the leading role in this investigation, and she thanks you for the aid you have already pledged. If there is anything you wish to know, she recommends that you speak with Thancred, who is well versed in the affairs of Ul’dah. She tells you that through this first mission you will come to see the truth for yourself: that although the realm may appear to be well on its way to recovery, the reality beneath the surface is far bleaker. When the audience is concluded and you consult Thancred, he restates your mission with an easy confidence. You are to investigate both the crystal robbery and the spate of abductions—crimes the Scions believe to be connected—so that progress in one will shed light on the other. Since Amajina & Sons have doubled security on their caravans in the wake of the attack, he judges that the abductions should be your priority. According to the Scions’ preliminary findings, most of the missing folk were last seen in the vicinity of Camp Drybone in Eastern Thanalan, and so he directs you there and asks you to seek out Isembard, the camp’s de facto leader, and secure his full cooperation.</p>
      <p>Following Thancred’s instructions, you make your way to Camp Drybone. There you find Isembard, who confirms his name and immediately guesses your purpose. Minfilia sent word ahead, he tells you, describing an adventurer who matches your appearance and warning them to be wary of the Amalj’aa, so at the very least they know who the culprits are likely to be. Though he bears no official title, the people of the camp have come to look to him for leadership. He gives you his word that he will do all he can to help you and the Scions, and to see that the missing folk are safely returned.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    </div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'キャンプ・ドライボーンへ',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>サンクレッドは、蛮神召喚がいかに大掛かりな所業であるかを説明する。莫大なエーテルの集中を必要とするため、蛮族たちはクリスタルを手に入れるべく、あらゆる手段を講じているのだという。ひとたび蛮神が実体を得れば、そのエーテルへの渇きはいっそう激しくなり、大地がどうなろうともお構いなしに、その力を吸い尽くそうとする。その恐るべき力を思えば、土地を枯れさせることも決して誇張ではないだろう──だからこそ、自分たちは全力でこれに立ち向かわねばならないのだと、彼はあなたに告げる。</p>
      <p>続いてヤ・シュトラが、暁の血盟の成り立ちについて語る。彼女やウリエンジェのようなシャーレアン出身者からなる組織「救世詩盟」と、あなたと同じ「超える力」を持つ者たちが集った「十二跡調査会」という二つの団体がひとつとなり、この組織が生まれたのだという。第七霊災を招いた数々の出来事が、エオルゼアを呑み込もうとする災厄に対しては、力を合わせてこそ立ち向かえるのだと教えてくれたのだ、と。イダは、ここが暁の本拠地である「砂の家」であり、かつては別の場所に拠点があったものの、さまざまな事情から今はここに落ち着いているのだと、明るい口調で補足する。パパリモは、超える力を持つ者は他にもいるものの、あなたほど強い力を示す者はおらず、だからこそ誰よりも大きな期待を寄せているのだと真剣な眼差しで語る。ウリエンジェは、やがて「七つの月が欠け、七つの太陽が昇り、神々の秩序が乱れ、屍が蠢く」といった神歴書の一節を朗々と詠み上げ、これこそが今まさに危機に瀕したこの時代──震え、歪む世界と、夜の帳に押し伏せられた暁──の有り様を示しているのだと説き、やがて闇を貫き、新たな時代の種となる「光」の到来を、彼らがじっと待ち続けているのだと静かに語る。</p>
      <p>ミンフィリアは皆の言葉を受けて、改めて暁の血盟の目的を示す。自分たちの唯一の使命は、エオルゼアの未来を守ること。なかでも最大の懸念は、蛮神と呼ばれる神の如き存在であり、彼女たちは長きにわたり、その脅威に終止符を打つ術を探し続けてきたのだと説明する。彼女は、あなたが何を望み、何を求めてエオルゼアにやってきたのかは知らないと認めつつも、あなたが持つ力には必ずや意味があり、そのことを心に留めたうえで答えを出してほしいと穏やかに告げる。問いかけに向き合ったあなたは、危険を承知のうえで力を貸すと覚悟を示す。その決意を聞き届けたミンフィリアは、その答えを期待していたかのように受け入れ、あなたの協力を迷いなく歓迎する。</p>
      <p>満足げにうなずいた彼女は、改めて暁の仲間たちをあなたに紹介していく。彼女は、アジス大陸北西部に存在した都市国家シャーレアンについて語る。そこに暮らす民は、あらゆる古今の叡智を受け継ぐ者たちであり、魔法とエーテルの扱いにかけては他の追随を許さなかった。その力をガレマール帝国ですら畏れたほどだという。やがて世が混乱へと傾き、同胞たちが母国への撤退を選ぶなかで、あえてエオルゼアに残り、この地の未来を守ることに身を捧げた者たちがいた。彼らは「賢人」と呼ばれ、その志を今も受け継いでいるのだと。今ここに立つ仲間たちこそ、その賢人たちであると告げられ、あなたは一人ひとりに目を向ける。仮面をかぶったイダと、その隣に立つパパリモは黒衣森を巡回する任を負っており、あなたに挨拶をしながら、あなたが手を貸してくれると信じていたのだと口を揃える。イダはさらに、そこにいるサンクレッドを、砂漠の宝石たるウルダハで活動する暁の担当者として紹介し、彼はあなたが仲間になってくれたことを当然のように歓迎する。彼の傍らに立つヤ・シュトラはリムサ・ロミンサを預かる魔道士で、落ち着いた調子で挨拶し、あなたが訪れるのを待っていたと告げる。最後に紹介されたウリエンジェは、この砂の家全体の取りまとめ役であり、「暁はやがて暗闇を払い、最も深い夜すら追い払う」と友の言葉を引きながら、あなたと巡り会えたことを喜ぶ。ヤ・シュトラは、カルテノー平原での戦いで指導者を失ったあとも志は揺らがず、ミンフィリアと同じ力を持つ者たちを探し出し、ともに暁の血盟を設立した経緯を語る。ミンフィリアは、賢人たちと超える力を持つ者たちが、ともにこの世界の明日を切り開く要となるのだと説明し、最後に書記役のタタルを紹介する。タタルは、何ごとも滞りなく進むよう取り仕切っていると胸を張り、あなたと知り合えたことを嬉しそうに伝え、ミンフィリアもいずれここが家族のような場所になるだろうと微笑む。</p>
      <p>ひととおりの紹介を終えると、ミンフィリアはいよいよ本題へと話を進める。彼女は、そろそろあなたに最初の任務を任せたいと言い、ウリエンジェにバルデシオン委員会からの書簡が届いているかを確認する。書類の到着を聞き届けると、彼女は不滅隊から救援要請が届いていることを明かし、その詳しい内容をサンクレッドに説明させる。サンクレッドによれば、アマジナ鉱山社が所有するクリスタルを運んでいた輸送隊が襲撃され、積荷をすべて奪われたという。しかも、その襲撃からひと刻も経たぬうちに、ウルダハ郊外のバラックで複数の住民が行方不明になっていることが判明した。これだけを見れば、山賊と人攫いによる、よくある事件のようにも思える──ミンフィリアはそう前置きしつつも、今回は蛮神の関与を疑う理由があると口にする。サンクレッドもそれに同意し、現場に残された痕跡からアマルジャ族の関与が濃厚であること、彼らが焔神イフリートを信仰する一派であることを挙げ、奪われたものを踏まえれば、これらの犯罪が蛮神の名のもとに行われたと見て間違いないと断じる。</p>
      <p>ミンフィリアは、あなたに蛮神との戦いの実相を知ってもらうためにも、この一連の事件の主役を任せたいのだと告げ、あらためて協力に感謝する。もし知りたいことがあれば、ウルダハ情勢に通じたサンクレッドに尋ねるとよいとも勧める。そして、この最初の任務を通して、表面上は復興へと向かっているように見えるこの世界の、より暗く厳しい現実を、自らの目で確かめてほしいのだと語る。面会が終わったのち、あなたがサンクレッドに声をかけると、彼は改めて任務の内容を整理してみせる。あなたが調査すべきは、クリスタル輸送隊の襲撃と、一連の誘拐事件──どちらも互いに関連していると暁は考えており、一方の進展が他方を照らし出すはずだという。アマジナ鉱山社は襲撃以降、輸送隊の警備を大幅に強化しているため、当面は行方不明者の捜索を優先すべきだと彼は判断する。予備調査の結果、失踪した人々の多くは、東ザナラーンの「キャンプ・ドライボーン」付近で最後に目撃されており、彼はあなたに現地へ向かい、実質的なまとめ役を務めているイセンバードという男を訪ね、協力を取りつけるよう依頼する。</p>
      <p>サンクレッドの指示どおり、あなたはキャンプ・ドライボーンへと向かう。そこでイセンバードと名乗る男を見つけると、彼は自分がその人物であると名乗り、同時に、あなたがここへ来た目的をすぐに察する。ミンフィリアから、あなたの風貌に合致する冒険者が訪れること、そしてアマルジャ族に警戒するようにとの警告が届いていたのだという。少なくとも、誰を相手取るべきかの見当はついているわけだ。彼自身には正式な肩書こそないものの、このキャンプの人々は自然と彼を頼るようになっており、イセンバードは行方不明者たちが無事に戻れるよう、できるかぎりの協力を約束する。</p>
    </div>

  ZH:{

    pageTitle:'前往枯骨營地',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Thancred 開口便向你說明，召喚 primal 絕非易事。那需要龐大而集中的以太，所以各個 beast tribe 才會不惜代價去搶奪 crystals。當這些神一般的存在一旦具現於世，它們對以太的渴望只會變得更加貪婪，完全不在乎會把大地吸乾、留下什麼樣的後果。以它們可怕的力量來看，要做到這一步並非不可能──也正因如此，你與 Scions 必須竭盡所能與之對抗。</p>
      <p>接著，Y’shtola 向你說明 Scions of the Seventh Dawn 如何誕生。最初由她與 Urianger 等 Sharlayan 出身者組成的 Circle of Knowing，和聚集了與你一樣擁有 Echo 的人們所組成的 Path of the Twelve，這兩個組織在第七靈災前後種種災禍之中意識到：唯有團結，才能對抗想吞噬整個 Eorzea 的邪惡力量，於是合而為一。Yda 用一貫開朗的語氣補充，現在這裡的 The Waking Sands 就是 Scions 的據點，本來其實在別的地方，只是經歷一連串事件後才搬到沙漠邊的這棟屋子。Papalymo 則看著你說，雖然世上也有其他人擁有 Echo，但像你這樣力量強大的人幾乎沒有，因此他們對你寄予極高的期望。Urianger 隨之朗誦出《Divine Chronicles》中的詩句──七輪殘月、七輪旭日、顛倒的神聖秩序與翻騰不已的屍骸──並解釋這些話如今正清楚描述著這個時代所面臨的險境：整個世界在震顫扭曲，黎明蜷縮在沉重的黑夜之下，而他們就這樣等待著尚未出生的新時代種子──將刺穿黑暗的那一道光。</p>
      <p>Minfilia 在眾人的話語之上，再一次為你整理出暁之血盟唯一的目標：守護 Eorzea 的未來。她提醒你，他們最大的憂患之一就是被稱為 primal 的神級存在，這些年來他們一直在尋找終結其威脅的長久之策。她坦言自己並不知道你真正渴望的是什麼，也不知道你一開始是為何踏上 Eorzea 的土地，但她堅信你所擁有的這股力量絕非偶然，而是必然帶著某種目的。因此，她請你在做出回應時，務必把這件事放在心上。面對這樣的請求，你選擇在明知危險的情況下，仍然願意伸出援手。Minfilia 把你的回答視為她期盼已久的決心，毫不遲疑地接受了你的協助。</p>
      <p>滿意之餘，她開始正式向你介紹這個組織。她提起曾經位於 Aldenard 西北方的都市國家 Sharlayan，那裡的人民承繼了古今無數知識，對魔法與以太的掌握遠超他國，甚至連 Garlemald 也對之心生忌憚。當世界逐漸走向混亂，多數同胞選擇撤回母國時，仍有一群人選擇留在這片大地，把自己的一生奉獻給 Eorzea 的未來，人們稱他們為 Archons。如今站在你面前的，正是延續那份意志的賢者們。戴著面具的是 Yda，她身旁的是 Papalymo，兩人負責巡察 Twelveswood，輪流向你打招呼，說自己早就相信你會願意幫忙。Yda 接著興奮地把 Thancred 指給你看，說他是駐守在沙漠寶石 Ul’dah 的成員，而 Thancred 則像是早就篤定你會加入一樣，爽朗地歡迎你成為夥伴。站在他身邊的 Y’shtola 負責 Limsa Lominsa，她平靜地向你致意，表示自己一直在等你來到這裡。最後出場的是 Urianger，他掌管這棟屋子裡的一切事務，用友人所說「黎明總會驅散最深的黑夜」這句話來祝福你們的相遇。Y’shtola 接著回顧，在 Carteneau 之戰失去領袖之後，他們沒有放棄，而是去尋找擁有與 Minfilia 相同力量的人們，並在一起建立了 Scions of the Seventh Dawn。Minfilia 補充說，Archons 與擁有 Echo 的人們，正是開創光明未來的關鍵，然後把負責文書與庶務的 Tataru 介紹給你。Tataru 高興地表示很榮幸認識你，而 Minfilia 則希望，總有一天你也會把這裡當作像家人一樣的所在。</p>
      <p>等到介紹完畢，Minfilia 才把話題帶回正事。她表示，是時候替你安排第一項任務，於是先向 Urianger 確認 Students of Baldesion 寄來的文件是否已經送達。得到肯定的回答之後，她說明他們收到了 Immortal Flames 的求援，並請 Thancred 詳細說明。Thancred 報告，一支隸屬 Amajina & Sons Mineral Concern 的 crystal 運輸車隊遭到襲擊，所有貨物被洗劫一空，而在那次襲擊發生後不到一個鐘頭，Ul’dah 郊外的貧民區就傳出多人失蹤的消息。光從表面看起來，Minfilia 說，這很容易被當成一般的山賊搶劫與誘拐案——類似的案件幾乎每天都在發生，由 Immortal Flames 處理也並不奇怪。但這一次，他們有理由懷疑有 primal 介入。Thancred 同意這個看法，指出現場留下的線索清楚指向 Amalj’aa──那群信奉 Ifrit 的族人──再加上被奪走的是 crystals 和人們的性命，幾乎可以斷定這些罪行都是打著 primal 名號而行。</p>
      <p>為了讓你更真切地理解他們與 primals 之間的戰鬥，Minfilia 宣布，這次的調查就由你擔任主角，她也當場向你致謝。如果你想進一步了解 Ul’dah 的情況，她建議你去找 Thancred，他在那一帶的情報最為詳盡。她說，透過這第一項任務，你將會親眼看見所謂「現實」的樣貌──雖然表面上看來，整個世界似乎正慢慢從災禍中復原，但真正的處境其實要暗淡得多，而她希望那份真相能由你自己來發現。結束會談之後，你去找 Thancred，他用一貫輕鬆的語氣重新整理了任務內容：你必須調查 crystal 運輸隊被襲擊一事，還有最近一連串的綁架案件。Scions 認為這兩件事彼此牽連，因此查明其中一方，必然能照亮另一方。由於 Amajina & Sons 在事件發生後大幅強化了運輸隊的護衛，他判斷目前首要目標應該是查清失蹤事件。根據暫時掌握的情報，多數失蹤者最後一次被看見的位置都在 Eastern Thanalan 的 Camp Drybone 附近，因此他要你前往那裡，去找在當地被視為領袖的 Isembard，並取得對方的全力配合。</p>
      <p>依照 Thancred 的指示，你來到 Camp Drybone。你在營地裡找到自稱 Isembard 的男子，他先確認自己就是那個人，隨即便猜出了你來此的目的。Minfilia 先前已經來信，說會有一位與你描述相符的冒險者前來，並提醒他們務必要提高對 Amalj’aa 的警覺——至少，他們現在很清楚可能的敵人是誰。Isembard 雖然沒有什麼正式頭銜，卻是這裡居民自然依賴的中心人物，他鄭重向你保證，自己會盡可能提供一切協助，和你一起努力，讓那些失蹤的人都能平安回到營地。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
