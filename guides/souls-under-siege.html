<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`Souls under Siege`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Yaana greets you with unusual urgency, saying you are exactly the person she wanted to see. The cruiserweight matches have not yet begun, but she and Neyuni have made progress in their research into psychonekrosis, and she asks you to come inside so they can explain everything. Once you are seated, Yaana first retraces the path that brought all of you here. You had only just been crowned champion of the light-heavyweight division when Eutrope challenged you, determined to claim your soul in the hope of curing psychonekrosis. From what they have learned, the illness strikes those who use feral souls too heavily, especially Arcadion fighters. Worse still, the “immortalized,” whom everyone believed were living in luxury in the upper levels, are in fact already dead—claimed by the disease.</p><p>Neyuni then tells you that since learning this truth, the two of them have searched for another cure. Their breakthrough came through data connected to Origenics. She explains that she once tried to gain access to Everkeep’s core systems to search for information about souls, failed, and was caught by a member of Oblivion who had been watching for unauthorized access. Though she was sharply scolded for the recklessness of it, the woman listened once Neyuni explained the situation, and in kindness shared research data Oblivion had obtained from Origenics. It was difficult material, but within it Neyuni found something important: the military already knew about psychonekrosis because it too had sought to make use of feral souls, and in the course of that work, they had developed a way to detect the disease.</p><p>With that method now in hand, Yaana says they want to begin diagnosing other fighters. They deserve to know the truth if they are already ill. Yet she also knows how dangerous that decision is. The president would not react kindly if his secret were revealed to fighters you still have yet to face, especially if it caused them to withdraw and disrupted the championship. Even so, she cannot ignore what she now knows. Since the fighters you have already defeated are barred from fighting for a time, she proposes that you begin with them. Every use of a feral soul only pushes a fighter closer to psychonekrosis—even the matches they fought against you—and she can no longer bear to leave them ignorant. The first person she chooses is Honey B. Lovely. Despite their rivalry, the two of them are close, and Yaana quickly calls her over.</p><p>When Honey arrives, she is skeptical at first, but the gravity of the situation quickly reaches her. Neyuni explains that a regulator can be connected to a terminal to examine the state of the wearer’s soul and determine whether there are signs of the disease. Honey braces herself for the answer, only to learn with enormous relief that her soul shows no degradation. But that relief lasts only a moment. Neyuni has already examined Yaana as well, and reveals that, because Yaana pushed herself with repeated feral-soul training, she stands on the threshold of developing psychonekrosis. Honey reacts in shock and anger, not only because such training is forbidden, but because it now seems clear that the prohibition exists not for the fighters’ sake, but because the president does not want them dying before they have fulfilled their entertainment value. Faced with the truth, Honey makes her choice without hesitation. If continuing means dying, then she will retire from the Arcadion and find another path for her talents. She leaves as brightly as ever, but the cost of that brightness hangs in the air after she is gone.</p><p>The next person Yaana insists on warning is Brute Bomber. He is not her friend, but she refuses to leave him to his fate. Since he is unlikely to answer a summons, the three of you go to his home instead. There you find him not alone, but in the company of the cruiserweight champion, the Howling Blade. That discovery complicates matters at once, because the truth cannot be revealed freely in front of an outsider. Yet before Yaana can steer the conversation away, the Howling Blade steps forward with polished ease and introduces himself. He says that, unlike most fighters, he does not normally wear a regulator outside the ring because his parents did not believe in using one. He also recalls that Yaana and her sisters were raised with similar values before Eutrope persuaded them otherwise. Then, with a candor that disarms the moment, he explains that he and Brute Bomber have known each other since childhood. Both were misfits before the president of Ascension Arcadia took them in. The Arcadion gave them purpose, and for Brute Bomber in particular, becoming a fighter was like being reborn. Only after the Howling Blade takes his leave does Brute Bomber finally turn on you all and demand to know why you came.</p><p>Yaana tells him the truth, but he rejects it immediately, shouting that the president would never do such a thing. Neyuni answers not with argument, but with evidence: she has already examined him, and his soul is showing signs of psychonekrosis. Even as he denies it, a dizzy spell overtakes him. Neyuni explains that as the soul is consumed, it loses its connection to the body, and intense dizziness is one of the earliest signs. If nothing changes, the body will continue to weaken. Yaana, knowing how much the Arcadion means to him, pleads with him to retire before the disease worsens. Until a cure is found, stopping his fights is the only way to halt its advance. But Brute Bomber will hear none of it. Furious and frightened in equal measure, he drives you all away. Returning home, Yaana is left shaken by the weight of what you have seen. Neyuni speaks again of the theory Eutrope discovered—that an infusion of an extremely dense soul might serve as a remedy—and says the Origenics data seems to support that possibility. Yet neither of them can accept such a cure as the answer they seek. Neyuni vows to keep searching, while Yaana admits that something about Eutrope’s actions still does not feel right. She cannot believe her sister would truly choose to save herself at the price of another life. Before the thought can settle further, a call comes from Metem: the cruiserweight matches are ready to begin.</p><p>When you reach the greenroom, your next rivals are already waiting. Their presence is loud, colorful, and impossible to miss. One greets you as though your arrival is the signal for a party to begin, while the other declares that a match with you is bound to inspire her. Metem confirms that these are the fighters of the cruiserweight division, including the reigning champion whom you have already met. He knows the state of the realm may leave doubts in your mind about fighting for entertainment at a time like this, but he insists that this is precisely when the people need a spectacle—something fierce and exhilarating enough to let them forget their burdens, if only for a while. Yaana, more sober than the others, reminds you afterward that beneath their showmanship, these fighters are dangerous. Cruiserweight combatants wield even more potent feral souls, and their blows will land far harder than anything you have faced before. With the truth about psychonekrosis now pressing at your back, you step toward the next stage knowing the battles ahead will test far more than your strength.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Yaana <small class="muted">(Solution Nine, X:22.2, Y:16.6)</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="the-dancing-king.html">The Dancing King</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'魂を蝕む病',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ヤーナは、ちょうどあなたに会いたかったのだと少し急いだ様子で声をかける。クルーザー級の試合はまだ始まっていないが、ネユニとともに魂蝕症について調べていたところ、ついにいくつかの手がかりを得たのだという。中に入ると、ヤーナはまず、ここへ至るまでの経緯をあらためて整理してくれる。あなたがライトヘビー級王者として戴冠した直後、姉のユートロープがあなたに挑み、魂蝕症を治すためにあなたの魂を奪おうとしていたこと。この病は獣魂を過度に用いる者、すなわちアルカディアの闘士たちのような者を蝕むらしいこと。そして上層で贅沢に暮らしていると思われていた「不朽の闘士」たちは、実際にはすでに死者であり、魂蝕症に倒れていたこと――その事実を、ユートロープから知らされたのだと語る。</p><p>そのうえでネユニは、その真実を知ってから別の治療法を探し続けてきたのだと話す。転機となったのは、オリジェニクスに由来する研究資料だった。彼女は魂に関する情報を求めてエバーキープの中枢システムに侵入しようとしたが、当然うまくはいかず、不正アクセスを監視していたオブリビオンの一員に見つかってしまったという。無茶な真似は二度とするなと厳しく叱られたものの、事情を説明すると相手は耳を傾けてくれ、オブリビオンがオリジェニクスから入手していた研究データを分けてくれた。解析は容易ではなかったが、その中からネユニは重要な情報を見つけ出す。軍もまた獣魂の利用を試みていたため、魂蝕症の存在を把握しており、さらにその発症を見分ける方法まで確立していたのだ。</p><p>その方法を知った今、ヤーナはほかの闘士たちも診断すべきだと考えている。病に侵されているのなら、本人たちには知る権利がある。しかしその行動が危険を伴うことも、彼女はわかっていた。あなたがまだ戦っていない相手に秘密を明かし、棄権でもされれば、社長の怒りは確実に向けられる。それでも、何も知らないまま戦わせ続けることはできない。だからこそ、まずはあなたがすでに打ち破った闘士たちにだけ真実を伝えようと彼女は提案する。彼らはしばらく出場停止になっているため、すぐに選手権へ影響は及ばないからだ。だが、それでも悠長にはしていられない。闘士は獣魂を使うたびに魂蝕症へ近づいてゆく。あなたとの試合でさえ、その危険を高めていたのだ。そう思うと、ヤーナにとってこれはもう他人事ではなかった。最初に真実を伝えるべき相手として、彼女はハニー・ビー・ラブリーの名を挙げる。ライバルではあっても親しい仲だと言い、すぐに呼び出す。</p><p>やってきたハニー・ビー・ラブリーは当初こそ半信半疑だったが、話の深刻さを知ると表情を変える。ネユニは、レギュレーターが装着者の魂の状態を監視する仕組みになっているため、端末に接続すれば魂蝕症の兆候を確認できると説明する。結果は、彼女の魂に劣化の兆候は見られないというものだった。安堵したハニー・ビー・ラブリーだったが、その直後に別の衝撃が待っていた。ネユニはすでにヤーナも調べており、訓練で何度も獣魂を使いすぎたせいで、ヤーナは発症寸前の状態にあると明かすのだ。ハニー・ビー・ラブリーは、訓練で獣魂を使うこと自体が禁じられているのにと驚き、しかも今となっては、その禁止は闘士を守るためではなく、社長が彼らを早く死なせたくなかっただけなのだろうと吐き捨てる。そして真実を知った彼女は、ためらいなく決断する。死んでしまっては人々の称賛を浴びることもできないのだから、自分はアルカディアを引退し、別の舞台で才能を生かすのだと。そう言って去っていく彼女はいつもどおり眩しかったが、その明るさの裏にある現実はあまりにも重かった。</p><p>次にヤーナが知らせたいと考えたのは、ブルートボンバーだった。親しい仲ではない。それでも見捨てる気にはなれない。呼び出しには応じないだろうと見て、あなたたちは直接彼の家を訪ねる。そこで思いがけず出くわしたのが、クルーザー級王者ハウリングブレードだった。その場に彼がいることで話は一気にやりにくくなる。だが、場の主導権を握ったのは彼のほうだった。磨き上げられた物腰であなたに挨拶し、自分は普段レギュレーターを身につける習慣がないのだと語る。両親がそれを信じていなかったからだという。そして、ヤーナたち姉妹もかつては似た価値観で育ち、ユートロープの勧めで変わったのだったと静かに振り返る。さらに彼は、ブルートボンバーとは幼なじみなのだと明かす。どんな仕事にも馴染めず、悪戯ばかりしていたふたりを拾い上げ、居場所を与えたのがアセンション・アーカディアの社長だった。アルカディアは彼らに生き方を与えたのだ。とりわけブルートボンバーにとって、闘士になることは生まれ変わることに等しかったのだと。その話を終え、ハウリングブレードが去ってから、ようやくブルートボンバーはおまえたちは何をしに来たのかと苛立ちをあらわにする。</p><p>ヤーナが真実を伝えても、ブルートボンバーはすぐにはねつける。社長がそんなことをするはずがないと怒鳴る彼に対し、ネユニは言葉ではなく診断結果を差し出す。彼の魂にはすでに魂蝕症の兆候が現れているのだという。否定しようとしたその最中、彼は激しいめまいに襲われる。ネユニは、魂が蝕まれることで肉体とのつながりが薄れ、その結果として激しいめまいが初期症状として現れるのだと説明する。このまま放置すれば、やがて身体は衰弱していく。ヤーナは、アルカディアが彼にとってどれほど大切かを理解したうえで、それでも引退してほしいと訴える。治療法が見つかるまで、これ以上悪化を防ぐ唯一の方法は戦うのをやめることだからだ。だが、ブルートボンバーは怯えと怒りをむき出しにし、そんな話は聞きたくないとあなたたちを追い返す。訓練場に戻ったあとも、残された重苦しさは消えない。ネユニはあらためて、ユートロープが語っていた治療法――極めて濃密な魂を注ぎ込むという仮説――はオリジェニクスの資料にも裏づけられているようだと話す。だが、それは自分たちの求める答えではない。ネユニは必ず別の道を見つけると誓い、ヤーナもまた、ユートロープが本当に他人の命を犠牲にしてまで自分を救おうとしたとはどうしても思えないと打ち明ける。そこへメテムから連絡が入り、クルーザー級の試合が始まる準備が整ったと告げられる。</p><p>こうしてあなたがグリーンルームへ向かうと、そこにはすでに次の階級の闘士たちが待っていた。ひとりはあなたの到着を宴の始まりのように喜び、もうひとりはあなたとの試合こそ新たな着想の源になると華やかに語る。メテムは、彼らこそクルーザー級のライバルたちであり、その中にはすでに顔を合わせた王者もいるのだと説明する。世の中の状況を思えば、娯楽のために戦うことに迷いがあるかもしれない。それでも今だからこそ、市民には憂いを忘れさせる熱狂が必要なのだと彼は言う。再び観衆を奮い立たせ、アルカディアそのものを揺らすほどの激闘を見せてほしいと。だがメテムの言葉のあと、ヤーナはもっと現実的な調子であなたに告げる。クルーザー級の闘士たちは派手な見せ方だけの相手ではない。彼らはより強力な獣魂を扱い、その一撃一撃はこれまで以上に重い。魂蝕症の真実を知った今、その先に待つ戦いは、ただ力だけで乗り越えられるものではなくなっていた。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> ヤーナ <small class="muted">(ソリューション・ナイン, X:22.2, Y:16.6)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-neoteric-witch.html">次世代魔女</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-dancing-king.html">パーティー野郎</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',

    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Yaana 一看見你，就說你正是她現在最想見的人。雖然 cruiserweight（Arcadion 更高一級的重量分級，闘士使用更強力的 feral soul）分級的比賽還沒開始，但她和 Neyuni 在研究 psychonekrosis（過度使用 feral soul 的人可能罹患的致命疾病，會逐步侵蝕靈魂與身體）這件事上，終於有了一些突破，希望你先進來聽她們說清楚。進屋之後，Yaana 先替你把整件事重新整理了一遍。你才剛成為 light-heavyweight 冠軍，Eutrope 就立刻向你發起挑戰，因為她想奪走你的靈魂，拿去治療 psychonekrosis。從她們目前掌握到的線索來看，這種病似乎會找上那些過度使用 feral soul（用於戰鬥變身的獸魂）的人，也就是像 Arcadion 闘士這樣的人。更殘酷的是，原本大家一直以為住在上層、過著奢華生活的那些「名留不朽殿堂的人」，其實早就已經死了，全都是被這種病奪走的。</p><p>Neyuni 接著說，自從知道這件事以後，她們就一直在找不必犧牲別人的治療方法，而這次的突破，來自 Origenics（研究靈魂與生命運作的設施／研究機構）的研究資料。她坦白說，自己曾試圖侵入 Everkeep 的核心系統，想找和靈魂有關的資訊，結果不但失敗，還被負責監視未授權存取的 Oblivion（協助追查真相、掌握相關研究資料的組織）成員當場逮個正著。對方先是狠狠責備了她一頓，警告她別再做這麼魯莽的事，但在聽完她們面臨的困境後，還是願意伸出援手，把 Oblivion 從 Origenics 取得的研究資料分享給她。那些資料非常難懂，可 Neyuni 還是從裡頭翻出了重要的內容：軍方其實早就知道 psychonekrosis 的存在，因為他們自己也曾試圖利用 feral soul；更進一步地說，他們甚至已經發展出了檢測這種病的方法。</p><p>有了這個方法之後，Yaana 便認為，她們應該開始替其他闘士做檢查。若那些人其實已經生病了，就不該繼續在毫不知情的情況下上場。可她也很清楚，這麼做不是沒有風險。要是把真相告訴那些你之後還要面對的對手，甚至因此讓他們退出比賽，總裁絕不可能坐視不管。但就算如此，Yaana 還是無法假裝什麼都不知道。於是她提出折衷的做法：先從那些已經被你打敗、暫時不能上場的闘士開始。這樣一來，至少不會立刻影響整個冠軍賽的進行。只是再怎麼拖延都不是辦法，因為每一次使用 feral soul，都只會把闘士推得更靠近 psychonekrosis 一步，甚至包括他們和你交手的那些比賽也是如此。想到這裡，這件事對 Yaana 而言，早就不只是旁人的不幸而已。她第一個想告知真相的人，就是 Honey B. Lovely。雖然兩人是對手，但其實私底下相當親近，所以她很快就把 Honey 叫了過來。</p><p>Honey B. Lovely 一開始還帶著幾分不耐與懷疑，但在聽完整件事後，臉色立刻變了。Neyuni 解釋說，regulator（可保存與調用靈魂、用於重傷或死亡時復生的裝置）本來就具備監測配戴者靈魂狀態的機能，只要接上終端裝置，就能確認有沒有出現發病跡象。檢查的結果顯示，Honey 的靈魂並沒有任何劣化徵兆，這讓她大大鬆了一口氣。可那份安心很快就被另一個事實打斷了——Neyuni 早已檢查過 Yaana，而因為她在訓練時太急著證明自己，多次動用了 feral soul，她其實已經站在發病的邊緣。Honey 又驚又怒，因為訓練時本來就禁止使用 feral soul；而如今看來，這條規定與其說是保護闘士，不如說只是總裁不想讓表演太早失去價值。知道真相之後，Honey 幾乎沒有猶豫。她承認自己最耀眼的時刻確實是在擂台上，但如果繼續打下去只會送命，那她就乾脆從 Arcadion 引退，去找另一條能讓自己發光的路。她離開時仍舊像平常那樣自信又閃耀，可她留下的那份決絕，卻讓房間裡的空氣久久都沉不下來。</p><p>接下來，Yaana 想告知的對象是 Brute Bomber。她和對方談不上交情，但也不願就這樣放著不管。她知道叫他來是不可能的，於是你們乾脆直接去了他家。沒想到在那裡，你們撞見的竟然不只 Brute Bomber，還有 cruiserweight 冠軍 Howling Blade。這讓原本就棘手的情況變得更難處理，因為在他面前，很多話根本無法直接說出口。可話題卻被他自己輕巧地接了過去。他先從容地和你打招呼，接著主動提起，自己平常其實沒有佩戴 regulator 的習慣，因為他的父母本來就不認同使用那種東西。他也記得，Yaana 和她的姊妹當年其實也是在類似的價值觀下長大的，只是後來在 Eutrope 的堅持下，才逐漸改變。接著，他又出乎意料地坦白，自己和 Brute Bomber 其實從小就認識。兩人都曾是不適合任何工作的問題人物，直到 Ascension Arcadia 的總裁把他們帶進 Arcadion，他們才第一次有了能夠容身、也能繼續活下去的地方。對 Brute Bomber 來說，成為闘士幾乎就像重新活過一次。等到 Howling Blade 離開後，Brute Bomber 才終於轉過頭來，惡聲惡氣地質問你們到底來做什麼。</p><p>即使 Yaana 把真相說出口，Brute Bomber 仍然立刻怒斥那全是胡說，堅持總裁絕不可能做出那種事。可 Neyuni 沒有和他爭辯，只是把檢查結果攤在他面前：他的靈魂已經出現了 psychonekrosis 的徵兆。話音剛落，他自己就突然被一陣強烈的暈眩擊中，連站都站不穩。Neyuni 這才告訴他，當靈魂被病症侵蝕時，和身體之間的連結會逐漸變弱，而劇烈暈眩正是最早出現的症狀之一；如果再放著不管，身體只會持續衰弱下去。Yaana 明知道 Arcadion 對他來說有多重要，也知道那是他生命裡少數真正抓住過的東西，但她還是勸他立刻引退。只要病還沒有治好，唯一能阻止惡化的方法，就是停止戰鬥。然而 Brute Bomber 根本不願意接受這一切，在恐懼與憤怒交纏之下，把你們全都趕了出去。回到 Tritails Training 之後，氣氛依舊沉重。Neyuni 再次提起 Eutrope 所說的那個方法——把極度濃密的靈魂注入體內，或許能成為治療手段——而 Origenics 的資料看起來也支持這種推論。可無論如何，那都不是她們真正想要的答案。Neyuni 發誓還要繼續找下去，就算必須翻遍無數資料也一樣；Yaana 則低聲承認，自己始終無法相信 Eutrope 真的會為了救自己，而選擇奪走別人的命。她總覺得，Eutrope 一定還隱瞞了什麼。就在這時，Metem 的聯絡打了進來，說 cruiserweight 分級的比賽已經準備開始了。</p><p>等你來到 Greenroom，新的對手們早已等在那裡。有人像是終於等到宴會主角登場般興奮，也有人用帶著戲劇感的口吻說，你這樣的對手一定能替自己帶來全新的靈感。Metem 則正式告訴你，這些人就是你在 cruiserweight 分級的競爭對手，而其中也包括你已經見過的現任冠軍。他知道，在如今這樣的局勢下，你心裡或許會對「為了娛樂而戰」這件事產生動搖；可也正因為如此，市民才更需要一場能讓他們短暫忘卻煩憂的激烈演出。他希望你再次用震撼人心的戰鬥征服觀眾，讓整座 Arcadion 都為之顫動。只是等到那些話說完之後，Yaana 還是更冷靜地提醒你，這個分級的闘士可不只是表面上那麼誇張耀眼而已。你早就知道，cruiserweight 闘士使用的是更強力的 feral soul，因此他們的每一擊都會比你先前遇過的對手更沉、更狠。如今，在 psychonekrosis 的真相已經壓在你心上的情況下，接下來這一戰要面對的，早就不只是單純的勝負而已。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Yaana <small class="muted">(九號解決方案, X:22.2, Y:16.6)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-neoteric-witch.html">新世代魔女</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-dancing-king.html">舞王</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
