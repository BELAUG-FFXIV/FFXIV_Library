<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shadow of Darkness | BELAUG · FFXIV Library</title>
  <meta name="description" content="MSQ – Shadow of Darkness (ARR Patch 2.0)">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>
<body>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Shadow of Darkness',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Minfilia does not let the moment of relief last. There is no rest for the weary, she tells you—now, while your hands are not bound by another primal, you must press deeper into the motives of the masked man: the Ascian called Lahabrea. Of the Ascians you know little and less, only that destruction follows wherever they pass, and she cannot shake the fear that they may be the hidden hand behind the chaos tearing at the realm. If that fear proves true, you must do all you can to stop them, because the unknown is always the most dangerous enemy.</p>
      <p>She has already reached out to each Grand Company for aid, and the Immortal Flames have answered with something you cannot afford to ignore—information pointing to a possible sighting. Minfilia sends you to Ul’dah, to the Hall of Flames, to hear the details from Flame Commander Swift. How you conduct the investigation after that is left to your discretion, but her warning is firm: you are dealing with shadows. You cannot take too many precautions. Be safe.</p>
      <p>In Ul’dah, Swift is ready for you the moment you speak of the masked man. He confirms what was relayed to Minfilia: there was a sighting near eastern Thanalan, described by a Brass Blade stationed at Highbridge who reported suspicious activity. For an instant it sounds like a clear lead—until Swift adds the cruel turn of it. The witness died not two days ago, cut down by a marauding horde of Qiqirn. Fate can be a cruel mistress, and the straight path vanishes as quickly as it appeared.</p>
      <p>Yet Swift refuses to let the trail die with the scout. Highbridge sits on a trade route, he reminds you; travelers pass through every day, coming and going, and any one of them might have glimpsed the figure you seek. If you want a place to start, he suggests you speak to a merchant named Hihibaru—a man perpetually hungry for customers, and unlikely to turn away attention whether you have coin to spend or not. Before you leave, Swift pauses to thank you again for avenging fallen scouts and for what you did against Ifrit; Ul’dah, he says, remains in your debt.</p>
      <p>By the time you reach Highbridge, the place feels exactly as Swift described—restless with foot traffic, always shifting, never holding still long enough to be certain of anything. Hihibaru greets you with bright eagerness, promising he can provide whatever you seek… probably. When you mention a masked man, he first plays it like a joke, as though you’re asking for a rare item he might keep “in stock.” But when he realizes what you truly mean, his tone turns conspiratorial and delighted. Rumors, he says—he hears many, and someone like that could easily have surfaced among them. If you linger a while and listen, perhaps you’ll learn a thing or two.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Minfilia <small class="muted">The Waking Sands (X:6.9, Y:6.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="back-from-the-wood.html">Back from the Wood</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 24 or above)</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="highbridge-times.html">Highbridge Times</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'不吉な気配',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ミンフィリアは、束の間の安堵にあなたを留めはしない。疲れた者にも休みはないと言い、今こそ――次の蛮神に手を取られていない今こそ――仮面の男、アシエンの「ラハブレア」の動機をさらに探らねばならないと告げる。アシエンについて分かっていることはほとんどなく、ただ彼らの行く先には破壊が残るという事実だけだ。ミンフィリアは、この国を揺るがす混乱の背後に彼らがいる可能性を恐れており、もしそれが現実なら、全力で阻止しなければならないと言う。未知を相手にする以上、用心に過ぎることはない――必ず無事でいてほしい、と。</p>
      <p>彼女はすでに各グランドカンパニーへ協力を要請しており、不滅隊から「目撃情報の可能性」が寄せられたという。見過ごせない情報だとして、あなたはウルダハの不滅隊本部「銀冑団総長室」へ赴き、炎軍司令スウィフトから詳しい話を聞くよう命じられる。その後の調査の進め方はあなたの裁量に任せるが、相手は正体も目的も掴めぬ存在だ――だからこそ、最大限の警戒を忘れるな、とミンフィリアは念を押す。</p>
      <p>ウルダハでスウィフトに面会し、仮面の男の名を出すと、彼はすぐに察して応じる。暁の血盟の依頼だろう、と。すでにミンフィリアへ伝えたとおり、東ザナラーン付近でその不審者が目撃されたらしい。ハイブリッジに配置されていた銀冑団員が、怪しい動きを報告する際に特徴を詳しく述べたのだという。だが、その証言者に会わせようにも叶わない――彼は二日前、キキルンの群れに襲われて命を落としたのだと、スウィフトは淡々と告げる。運命は残酷だ、と。</p>
      <p>それでもスウィフトは希望を捨てない。ハイブリッジは交易路に面しており、旅人の出入りが絶えない場所だ。目撃者は他にもいるかもしれない――だから商人のヒヒバルに話を聞け、と勧める。客に飢えている男で、金があろうとなかろうと相手をしてくれるだろう、と。別れ際、スウィフトはあなたが斥候の仇を討ったこと、そしてイフリートの脅威を退けたことに改めて礼を述べ、ウルダハはあなたに借りがあると言って送り出した。</p>
      <p>やがてハイブリッジへ辿り着くと、そこはまさに人の流れが絶えない、落ち着かない場所だった。ヒヒバルは明るい調子であなたを迎え、何でも用意できる――たぶん、と軽口を叩く。仮面の男を探していると告げると、最初は在庫でも探すようにとぼけてみせるが、あなたの真意に気づくと顔を輝かせる。そんな人物なら、耳にしてきた数々の噂話の中に出てきてもおかしくない――しばらくこの場に留まり、噂に耳を傾ければ、何か掴めるかもしれないぞ、と。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ミンフィリア　<small class="muted">西ザナラーン：砂の家 (X:6.9, Y:6.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="back-from-the-wood.html">森からの帰還</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 24～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="highbridge-times.html">橋上の証言</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'不祥的感覺',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Minfilia 不讓你在短暫的喘息裡停留太久。她說你沒有時間休息——現在正是追查的最好時機，因為你們暫時還沒有被下一個 primal 牽制住手腳。你必須更深入去弄清楚那個戴面具的男人：Ascian，Lahabrea。他們對 Ascians 幾乎一無所知，只知道破壞總是伴隨著他們；Minfilia 無法排除一個可怕的可能——眼下席捲整個國度的混亂，或許正是他們在背後推動。若她的恐懼成真，你們就必須傾盡全力阻止，因為未知的敵人最容易讓人付出代價。</p>
      <p>她早已向每個 Grand Company 發出請求，而 Immortal Flames 回覆說他們掌握到一條不能忽視的線索：可能有人目擊了那名「rogue」。Minfilia 要你立刻前往 Ul’dah 的 Hall of Flames，向 Flame Commander Swift 詢問細節。接下來要怎麼查，她把選擇權交給你，但她的提醒也同樣清楚——你正在面對的是完全陌生的存在，你永遠不可能「太過小心」。務必平安。</p>
      <p>你抵達 Hall of Flames，Swift 一聽你提起「masked man」，便立刻明白你是代表 Scions 而來。他確認先前已把情報轉告 Minfilia：在 eastern Thanalan 一帶出現過疑似目擊。當時駐守 Highbridge 的 Brass Blade 因察覺可疑行動而回報，並且描述得相當仔細。那聽起來像是能直接指向目擊者的線——但 Swift 隨即說出更殘酷的轉折：那名士兵在兩天前被一群到處劫掠的 Qiqirn 殺死了。線索就這樣斷在半路，正如他所說，命運有時確實殘酷。</p>
      <p>然而 Swift 要你別太快絕望。他提醒你，Highbridge 位在商路上，人潮來來往往，能看見奇怪身影的人不會只有一個。就算那名 Brass Blade 已經不在了，仍可能有其他旅人曾經瞥見你的目標。若你需要起點，他建議你去找一名叫 Hihibaru 的商人——那傢伙總是渴望客人，無論你有沒有打算花錢，都肯定樂於和你說話。臨走前，Swift 又一次向你道謝，感謝你替他失去的斥候報仇，也感謝你在 Ifrit 的威脅下守住了 Ul’dah；他說 Ul’dah 依然欠你一份人情。</p>
      <p>等你到了 Highbridge，這裡的氛圍果然像 Swift 說的那樣——位在要道上，旅人與貨物的流動從不停歇，人人匆匆，消息也因此混雜得難以分辨。Hihibaru 一看見你就熱情招呼，誇口說不管你要找什麼，他都能提供……大概吧。你一提到 masked man，他先裝作聽不懂，像是在拿「庫存」開玩笑；但當他終於明白你要找的是什麼樣的人，他的語氣立刻變得興致勃勃，說自己聽過太多流言蜚語，那樣的人很可能早就出現在其中。只要你願意在這裡多待一會兒、多聽一會兒，也許就能從來往的人口中，撿起下一段能追下去的線索。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 敏菲利亞　<small class="muted"> 砂之家 (X:6.9, Y:6.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="back-from-the-wood.html">從森林歸來</a></div>
      <div class="row">所有職業（不含限定職） 等級 24 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="highbridge-times.html">橋上的證言</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
