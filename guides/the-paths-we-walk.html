    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>The manservant of House Fortemps greets you with a quiet gravity that reaches beyond simple courtesy. He remembers the bitter cold of the day you first arrived in Ishgard, when he stood waiting for you before the Arc of the Worthy, never knowing how much would begin from that single meeting. His recent reading has turned his thoughts toward the past, and he speaks of the worth in looking back—of tracing the choices that shaped not only one life, but many others besides. He says this to you because your steps have never been yours alone. Wherever you moved, the world moved with you. And so, at his urging, you begin a journey not toward some new destination, but back along the road your life once took through Ishgard.</p><p>That path first leads you into the markets, where Elaisse receives you with warm surprise. When she learns that you are retracing the days of your first time in Ishgard, her thoughts turn at once to change. Not long ago, foreign merchants were watched with suspicion and burdened by endless scrutiny. Now the city’s stalls welcome goods from across Eorzea, and trade moves with a freedom that would once have seemed impossible. To her, this is not an abstract reform, but change made tangible in daily life. Coin has its own language, and in that language prejudice is poor business. She remembers well how readily she welcomed the wards of House Fortemps once the old barriers began to fall, and in her words you see one face of the new Ishgard—practical, imperfect, but opening at last.</p><p>From there you return to the Forgotten Knight, where Gibrillont meets memory with the same rough humor he brings to everything else. He talks first of Tataru, laughing at how the quiet girl who once waited tables became the center of admiration night after night. It was not only her songs or dances that won people over, he says, but the stories she told—stories of a hero’s journey across Eorzea, delivered with more charm than many a minstrel. Yet his thoughts do not stop there. He speaks too of the tavern itself, and of the old tale that one of Ishgard’s earliest surviving knights cast aside glory to become its keeper. The truth of that story may be uncertain, but the sword passed down through generations remains, along with its inscription to brave brothers who lived and were forgotten in peace. In Gibrillont’s telling, memory is never only about fame. Sometimes it endures in worn wood, old steel, and the stories people choose to keep alive.</p><p>In the Sea of Clouds, memory takes on a different warmth. Laniaitte offers you the thanks she was unable to speak at Aymeric’s investiture, thanking you in the name of House Haillenarte and all Ishgard for standing against the enemy that tormented the nation for a thousand years. Her words are solemn, but the moment does not remain solemn for long. Emmanellain appears with his usual untimely enthusiasm, and Honoroit follows with an impeccably detailed report on the Vundu’s crystal gathering and the measures that might prevent another summoning. Laniaitte is visibly impressed and even offers Honoroit a place among the Rose Knights, only for him to decline because his service is pledged elsewhere. Emmanellain, of course, turns that phrase into teasing nonsense, chasing after scandal where none exists. Yet beneath the banter lies something older and gentler. Whatever her exasperation, Laniaitte still responds to him as though to a familiar boy from home, and in that exchange the bleak frontier briefly feels less distant.</p><p>At Falcon’s Nest, the memory that greets you is colder, sterner, and yet no less human. Redwald apologizes that your visit was not met with the ceremony he feels you deserve, then points to the pilgrims who still come to pray before the relief, their tears no longer born of grief, but of joy that Nidhogg’s torment is finally ended. Artoirel arrives soon after, and when he understands that you are walking this road to remember, his thoughts return to the days when he once left you behind to pursue the heretics’ trail alone. Redwald answers not with rebuke, but with the news that the wounded survivor you once carried back has since become a father. From that small piece of life, the conversation turns quietly toward the burden of title and birth. Artoirel speaks with rare frankness, saying that so much of what they have achieved came through blood rather than merit, and that pride in rank has done lasting harm between noble houses. If others must call him count, so be it—but he cannot yet take pride in a title he does not believe he has earned. In that honesty, you see how far he has traveled from the man he once was.</p><p>The road through Ishgard then leads you into places where memory cuts more sharply. At the Tribunal, the past rises not as comfort, but as the echo of a deadly wager—truth once staked upon battle beneath the gaze of the Fury. Later, before the Holy Vault, a priest approaches and recognizes you. He has not forgotten the day you answered the archbishop’s summons, nor the upheaval that followed. He knows what many now say: that change was necessary, that the archbishop sought godhood, that perhaps your victory was the Fury’s will. Yet knowledge does not dissolve grief. To him, the man he served was pious, humble, and devoted to his people. Whatever sins history may uncover, he cannot cast aside the memory of the good man he knew. In his quiet pain, you are reminded that truth does not erase love, nor does justice spare anyone from mourning what had to be broken.</p><p>When your remembrance carries you beyond Ishgard, its meaning widens. Zanthael lets you pass to see Merlwyb, and the admiral greets you with the relief of one long wearied by counsel and politics. She listens as you speak of Ishgard’s uncertain future, and her response is that of a ruler who knows reforms are voyages as perilous as any crossing. With Aymeric at the helm, she says, Ishgard may yet chart a course worthy of future generations. But her thoughts do not stay fixed on another nation’s troubles. She remembers the lessons of the melee and the banquet alike—lessons in complacency, treachery, and the need to correct the course of her own people before danger strikes from within again. In her words, reflection is not passive remembrance. It is vigilance sharpened by experience.</p><p>At last, in Mor Dhona, Higiri receives you with quiet surprise and deep sincerity. She says she is touched that you would remember her small role in all that came before, especially after the far greater deeds that followed. She admits, too, that there was a selfish joy in donning the garb of a shinobi once more, yet what remains strongest in her is gratitude: gratitude for having aided in Raubahn’s rescue, and for having witnessed the Scions rise again from ruin. Much has changed, she says, and much may never return to what it once was. But in watching you and your companions rebuild after so much loss, she has learned that despair must never be allowed the final word, because there is always something left worth saving. And so your journey of remembrance comes to rest not in sorrow, but in a quieter understanding—that the past endures not merely in wounds, but in all that was remade because people chose to keep walking.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>フォルタン家の執事は、あなたを見るなり、静かな感慨をにじませる。初めてイシュガルドを訪れたあの日、烈しい寒さのなかで、ふさわしき者の門の前に立ち、あなたたち三人を待っていたことを、彼は今もはっきり覚えていた。あそこから、すべてが始まったのだと。近ごろ彼は、過ぎ去ったものに思いをめぐらせる詩句に触れ、選び取ってきた道と、それが自分や他者の生にどのような形を残したのかを考えるようになったという。歴史に名を残すような人物ではない自分ですら、そうした振り返りに意味を見いだせるのだと語ったうえで、彼はあなたにもまた、この歩みを見つめ直してほしいと願う。あなたが動けば、世界もまた動いたのだからと。そうしてあなたは、新たな地を目指すのではなく、かつて自分が通ってきたイシュガルドの道を、あらためて辿り始めることになる。</p><p>最初に迎えるのは、市場の賑わいの中に立つ商人だった。彼女は、あなたがイシュガルドでの日々を振り返るために来たのだと知ると、ここに生まれた変化を思わずにはいられない。少し前まで、異邦の商人たちは理不尽なほど厳しく見張られ、幾重もの疑いの目にさらされていた。だが今では、エオルゼア各地からの品々が当たり前のように流れ込み、市場はかつてとは違う空気をまとっている。彼女にとって、それは理念としての改革ではなく、日々の商いの中で手に触れる現実だった。商人たちに通じる言葉は貨幣であり、偏見は利益を生まない。フォルタン家に連なる者たちが市場を訪れた折、彼女が自然に彼らを受け入れたのもまた、そうした変化の表れだった。そこには、まだ不完全ながらも、確かに門を開き始めた新しいイシュガルドの姿があった。</p><p>やがてあなたは、忘れられた騎士亭へ足を運ぶ。ジブリオンはいつもの調子であなたを迎え、まずはタタルのことを語り出す。かつては給仕として客のあいだを忙しく立ち回っていた小柄な娘が、いつの間にか毎晩のように人々に名を呼ばれる存在になっていた。歌や踊りもあったが、本当に人の心をつかんだのは、エオルゼアを巡る英雄譚を語るその才覚だったのだろうと、彼は笑う。だが話はそれだけでは終わらない。この酒場そのものにもまた、長く語り継がれてきた物語があるという。ハルドラスとともに戦いをくぐり抜けた騎士のひとりが、栄誉や名声を捨て、酒場の主として生きる道を選んだ――そんな伝承だ。真実かどうかは誰にも断言できない。けれど、代々受け継がれてきた古びた剣と、そこに刻まれた言葉だけは残っている。忘れられ、満ち足りて生きよと願うその言葉の中に、名声とは別の仕方で受け継がれる記憶の形があった。</p><p>雲海へ向かえば、そこで待っていたのは、厳粛さの奥にぬくもりをたたえた再会だった。ラニエットは、アイメリクの叙任式で伝えそびれた感謝を、今こそ伝えたいのだと語る。千年にわたりイシュガルドを苛み続けた敵に立ち向かい、終わりなき苦しみから人々を解き放ったことへの、深く真摯な謝意だった。だが、その空気はまもなく、どこか見慣れた騒がしさによってやわらぐ。エマネランが勢いよく現れ、オノロワは淡々と、バヌバヌ族の動きと水晶の採取量、その対策案までも整然と報告する。ラニエットはその才を高く買い、薔薇騎兵団への誘いまで口にするが、オノロワはすでに別の主へ仕えている身であるとして、それを丁重に辞退する。するとエマネランは、その言葉尻をとらえて軽口をたたき始める。けれど、そのやり取りには単なる騒々しさだけではない、昔から変わらぬ間柄の気安さがあった。ラニエットにとって、彼はいつまでも、褒め言葉ひとつうまく口にできないまま空回りしていた、あの頃の少年なのだ。雲海の果てでさえ、その距離感はどこか故郷の気配を思わせた。</p><p>ファルコンネストであなたを待っていたのは、より冷たい空気の中にある、しかし確かな人の変化だった。レドワルドは、あなたの来訪を前もって知っていれば、饗応なり正式な出迎えなり、ふさわしい形を整えたかったと詫びる。そして、今も多くの巡礼者たちが慰霊の浮彫の前にひざまずき、ニーズヘッグの苦しみから解き放たれた喜びに涙しているのだと語る。そこへアルトアレールが現れ、あなたが思い出を辿る旅をしていると知ると、かつて自分があなたを残して異端者の痕跡を追った日のことへ思いを向ける。だがレドワルドはその記憶に別の報せを重ねる。あの日あなたが運び帰った負傷兵は、今では父となったのだと。そのささやかな知らせから、話はやがて血筋や地位の重みへと移っていく。アルトアレールは、これまで自分たちが成し遂げてきたことの多くが、人柄よりも血によって支えられていた現実を苦く見つめる。爵位で呼ばれることを拒みはしない。だが、それを誇りに思えるほど自分はまだ至っていないのだと、率直に言う。その言葉に、かつての彼にはなかった静かな誠実さがにじんでいた。</p><p>やがて道は、慰めだけでは済まされぬ場所へもあなたを導く。神意裁定所では、かつての戦いの気配がよみがえる。真実の所在を、フューリーの御前での決闘によって定めようとしたあの瞬間。さらに聖大聖堂を見上げていたあなたに、ひとりの神官が声をかける。大司教の召喚に応じて、あなたがこの地へ足を踏み入れた日を、彼は忘れていなかった。今では、多くの者が言う。変革は必要だったのだと。大司教は神になろうとしていたのだと。だからこそ、あなたが勝ったのは必然であり、フューリーの御心でもあったのだろうと。だが、頭で理解することと、心で受け入れることは別だった。彼にとって、その人物は敬虔で、謙虚で、民と教会のために尽くした善き人でもあったのだ。たとえどんな罪が明らかになろうとも、自分の知るその人までを失うことはできない。真実が示されたあとにも、なお癒えぬ悲しみが残るのだと、その神官の言葉は静かに物語っていた。</p><p>さらにあなたの追憶は、イシュガルドの外へも広がっていく。リムサ・ロミンサでは、提督への取次を任された士官が、無断の来訪であってもあなたを拒むつもりはないと通す。メルウィブは、助言ばかりを並べる周囲からひととき解放されたようにあなたを迎え、イシュガルドの改革について耳を傾ける。大きな航路に暗礁が潜むように、改革にもまた思わぬ障害が待ち受けているかもしれない。だが、アイメリクが舵を取るのならば、その先に次代へ残る航路を描けるかもしれないと彼女は語る。もっとも、見つめるべきは他国の行く末ばかりではなかった。武技大会で見せつけられた自軍の慢心、そして宴の席で味わった裏切りの教訓を、彼女は忘れていない。内側に潜む綻びを正さぬ限り、同じ刃はまた背後から迫るだろう。メルウィブにとって過去を振り返るとは、ただ懐かしむことではなく、次に誤らぬための備えでもあった。</p><p>そして最後に、モードゥナでヒギリがあなたを迎える。後に続いた数々の大きな出来事を思えば、自分の果たした役割など取るに足らぬものだろうに、それでも覚えていてくれたのかと、彼女は驚きとともに礼を述べる。もう一度忍びの装束を身につけることに、少しばかり私情もあったのだと素直に認めながら、それでも彼女の胸に強く残っているのは、ラウバーン救出の一助となれたこと、そして暁の血盟が灰の中から再び立ち上がる姿を見届けられたことへの感謝だった。多くのものが変わり、元には戻らぬものもある。けれど、失われたあとにもなお、救えるものは残されている。あなたと仲間たちがそれを証明してきたのだと、ヒギリは語る。そうしてこの追憶の旅は、過去の痛みだけではなく、その先になお築き直されたものの重みを抱きしめるように、静かに結ばれていく。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> フォルタン家の執事 <small class="muted">（フォルタン伯爵邸, X:6.0, Y:6.0）</small></div></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>House Fortemps Manservant 一開口，就不是單純的寒暄。他想起你第一次踏進 Ishgard 的那一天，想起自己曾在 Arc of the Worthy 前迎接你們，當時風雪那麼重，誰也不會知道那會成為一切的起點。最近他讀到一位 Belah’dian 詩王的作品，於是越發常去思索那些已經走過的路，思索人做出的選擇究竟如何改變了自己，也改變了別人。他說，連像自己這樣不會在歷史上留下名字的管家，都能感受到回望過去的價值；而對你來說，這種價值只會更深。因為你每跨出一步，世界也會跟著移動。於是，在他的提醒之下，你開始沿著舊日的軌跡回頭走去，不是為了追回什麼，而是為了真正看清，自己究竟走過了怎樣的一段路。</p><p>你首先回到 Ishgard 的市集，在那裡見到了 Elaisse。當她知道你是在重走當年初到 Ishgard 的足跡時，立刻想到的就是這座城市如今的變化。就在不久之前，外來商人仍然得承受格外嚴苛的審查與猜忌，彷彿只因為來自外地，就註定該被提防。可現在不同了，來自 Eorzea 各地的貨物流進市場，往來變得自然得多。對她而言，這不是什麼遙遠的大道理，而是每日都能摸得到的現實。商人之間真正共通的語言是金錢，而偏見從來都賺不到利潤。她也記得，當 House Fortemps 的人出現在市場時，自己如何順勢與他們結識。從她的話裡，你看見了戰後 Ishgard 的另一種改變，不是轟轟烈烈的，而是慢慢滲進人們生活裡，讓這座封閉多年的城市開始真正鬆動。</p><p>接著你來到 The Forgotten Knight。Gibrillont 仍是那副粗聲粗氣、卻總能把故事說得格外有味道的模樣。他先提起 Tataru，說起那個原本只是在店裡端盤子、擦桌子的少女，怎麼忽然之間就成了每晚都有人惦記著的招牌人物。照他看來，真正讓人著迷的，還不是那些歌舞，而是她說故事的本事，那些關於某位英雄走遍 Eorzea 的冒險，在她嘴裡竟比吟遊詩人講得還動人。可說著說著，他的話題又落回酒館本身，落回那個流傳已久的傳說：據說建立這間酒館的人，本是 Ishgard 最初那一代倖存下來的騎士之一，後來卻主動捨棄了名望與榮耀，選擇當一個不起眼的酒館主人。這故事究竟是真是假，誰也說不準；可那把代代相傳下來的舊劍還在，劍柄上的刻字也還在，像替某些不曾被寫進史書的人保留了最後一點痕跡。你在那裡感受到的，不只是傳奇，而是一種更安靜的記憶，那些沒有被高聲傳頌，卻仍然沒有真正消失的過去。</p><p>之後你的腳步把你帶去了 Sea of Clouds。Laniaitte 一見到你，便提起自己原本想在 Aymeric 的就任典禮上親口說出的話，如今終於有機會補上。她代表 House Haillenarte，也代表整個 Ishgard，向你獻上真誠的謝意，因為你曾冒著生命危險與他們共同對抗長達千年的敵人，替這片土地掙脫了無止盡的折磨。只是那份莊重的氣氛沒能維持太久，Emmanellain 很快就帶著一如往常的節奏闖了進來，而 Honoroit 則跟在後面，沉著地報告自己潛入 Vundu 領地後觀察到的一切：他們如何採集水晶、還需要多久才足以再次召喚，以及 Rose Knights 若要先下手為強，可以採取什麼方式，又會承擔哪些風險。Laniaitte 聽得很是驚訝，甚至主動表示，像他這樣勤勉又有潛力的年輕人，在 Rose Knights 裡應該有一席之地。可 Honoroit 依舊婉拒了，因為他已經效忠於別人。Emmanellain 當然不肯放過這句話，立刻拿它胡鬧起來，硬要把事情扯到曖昧的方向去。可你看著他們這樣你一句我一句，反而覺得那份熟悉比什麼都真實。對 Laniaitte 而言，Emmanellain 終究還是那個總想討人喜歡、卻總在最後一步出糗的舊識；而在這片寒冷的前線上，這種不曾真正改變的互動，反倒像是來自故鄉的一點溫度。</p><p>當你走到 Falcon’s Nest，迎接你的是另一種沉靜的重量。Redwald 滿懷歉意地說，要是早知道你要來，他一定會替你準備更像樣的迎接，不管是宴席還是正式的禮儀，你都完全受得起。接著他提起那些依然陸續前來祈禱的朝聖者。他們望著那座浮雕，有人默默無聲，有人落下眼淚，但那些淚水已不再只是哀傷，而是終於從 Nidhogg 的折磨裡解脫之後的喜悅。不久後 Artoirel 也來了。得知你是在回頭走這段過去時，他自然想起了從前那一次，那次他把你留在後頭，自己獨自追著異端者的痕跡而去。Redwald 卻把話題拉向另一個方向，告訴他，那天被你背回 Falcon’s Nest 的傷兵，如今已經有了第一個孩子。從那件小事開始，他們談起的便不只是過去的戰鬥，而是人怎麼在時間裡改變。Artoirel 坦白說，許多成就之所以能夠到手，靠的其實不是品格，而是血統；而對地位與門第的執著，更讓各家之間生出太多本可避免的隔閡。如果旁人非要叫他 count，他不會阻止，但他也無法為此感到自豪。因為直到此刻，他仍不認為自己真正配得上那個身份。這樣的話若放在從前，恐怕很難從他口中說出，而如今你聽見的，是一個終於學會向內看的人。</p><p>這趟回望並不只帶你走向溫柔的記憶，也把你重新帶回那些至今仍令人心口發緊的地方。在 Supreme Sacred Tribunal，那段以戰鬥來驗證真相的過往像陰影般重新浮起，在 Fury 注視之下，兩名外來的異端者與 Heavens’ Ward 正面交鋒，彷彿勝者便能替真相作證。之後，當你站在 Holy Vault 前，一名神官主動上前，認出了你。他說自己其實常來這裡，為了回想這一切究竟是如何走到今天。他知道現在很多人都說，那場翻覆是必要的，說 archbishop 追求的是神格，因此你的勝利也許正是 Fury 的意志。可就算理智能理解，他的心也無法那麼簡單地跟上。因為在他眼裡，那個人始終也是虔誠、謙和、真心為教會與人民奉獻的好人。歷史可以揭露更多真相，但那並不代表，人就能立刻拋下曾經相信過、敬重過的一切。你在他的聲音裡聽見的，不只是遲來的認知，也是某種直到今天都還沒有平復的失去。</p><p>接下來，你的追憶離開了 Ishgard，卻沒有離開那段歲月真正留下的影響。經過守衛的通報後，你在 Limsa Lominsa 見到了 Merlwyb。她像是終於能從那些沒完沒了的軍政議論裡喘一口氣，難得露出一點真心的鬆動，讓你說說這一路上的見聞。當話題轉到 Ishgard 的新改革時，她的看法並不浪漫。她說，這就像航行進入未曾測過深淺的海域，看似朝著嶄新方向前進，卻也隨時可能在真正啟程之前就撞上暗礁。不過，只要 Aymeric 仍然掌著舵，這條路就還有可能成為未來數代人都能依循的航道。只是她也沒有因此忘記自己的問題。無論是當初的比武，還是後來宴席上的背叛，都讓她清楚看見 Alliance 已經變得多麼鬆懈，又有多少危險其實就藏在自己人之中。對她而言，回顧從來不是感傷，而是為了不讓相同的錯誤再次從身後刺進來。</p><p>最後，你在 Mor Dhona 見到了 Higiri。她看見你時既驚訝又感激，像是沒想到，在你後來經歷了那麼多更重大的事情之後，還會記得她當年在這段故事裡扮演過的小小角色。她承認，自己重新穿上 shinobi 服裝時，心裡確實也有一點私人的情感，可即便如此，她仍真心以能協助救出 Raubahn、也能為重建 Scions 盡上一份力為榮。她說，很多事情確實已經改變了，也有很多事再也回不到從前；但每當她看見你和同伴們怎麼從幾乎一無所有的灰燼裡重新站起來、重新把一切拼回去，就會再次想起一件事，人不能向絕望低頭，因為只要還有一點東西值得守住，就代表還有繼續前行的理由。於是這趟旅程到了最後，留在你心裡的便不只是那些曾經失去的，也包括所有在失去之後，仍被人一點一點重新守回來的東西。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 福爾唐伯爵家的執事 <small class="muted">(福爾唐伯爵邸, X:6.0, Y:6.0)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="litany-of-peace.html">終末的怒吼</a></div><div class="row">戰鬥或魔法職等級 60 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-oaths-we-swear.html">在雪地立下的誓言</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
