    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Alphinaud speaks with quiet urgency: if Lady Iceheart is bold enough to strike directly at the city, then you should do as you were told and return to Camp Dragonhead. Lord Haurchefant, he says, will know where Ser Aymeric intends to receive you.</p><p>Back at Camp Dragonhead, Haurchefant greets you with relief that borders on fervor. With Ishgard poised on the brink of disaster, seeing a friend steadies him; he admits a single misstep could send them into the abyss, yet your presence kindles courage in his heart. Then he cuts himself short—Ser Aymeric has arrived and will meet you in the intercessory. A guard shows you inside.</p><p>Before the audience, Alphinaud lays bare his intent. Ishgard’s future hangs in the balance, and if salvation truly depends on your aid, he cannot simply withhold it. Even so, he means to make Ser Aymeric sweat for reinforcements—feigned disinterest, he believes, may serve the cause of Eorzean unity better than open-handed charity. With that, he urges you onward to learn what concessions the Holy See is willing to make.</p><p>Ser Aymeric receives you with haste, thanking you for coming so quickly and apologizing for his absence. Lady Iceheart and her heretics, he says, have much to answer for. Alphinaud replies that you have only just returned from the Gates of Judgement yourselves, and offers to postpone if needed. Aymeric refuses—now more than ever, the meeting must happen, and he will return to his post upon Ishgard’s walls the moment your business is concluded.</p><p>Before speaking of reinforcements, Aymeric introduces a close friend and ally: Estinien, Ishgard’s Azure Dragoon. Alphinaud admits he knows little of the order, and Aymeric explains that dragoons are formidable warriors—yet Estinien is without equal, chosen to wield the power of dragons and contend with any Dravanian. Estinien dismisses the praise, then regards you directly, saying he understands now why his blood sang in anticipation of your meeting.</p><p>Aymeric turns to what was learned from heretics captured after the assault on the gates. Lady Iceheart and the Dravanians, it seems, share a common goal: reclaiming Nidhogg’s stolen eye. Alphinaud recognizes the name—one of the seven great wyrms, woven into Ishgard’s history, once defeated by Haldrath yet said to have plagued Coerthas since the city’s founding. Aymeric confirms it: Nidhogg’s efforts have scarred their walls for generations, and the trophy taken from the wyrm’s skull—“the Eye”—is a treasured relic of untold power. If it were returned, Nidhogg would be restored to full strength, and no wall or ward could deny him. Through the Echo, Midgardsormr’s voice reaches you, speaking of a son who has waged war for a thousand years, with rancor beyond mortal comprehension.</p><p>Aymeric explains that the Eye is hidden deep within the Vault under heavy guard—surrounded by those proven loyal to the Holy See. Such walls and blades may deter heretics, but dragons are another matter; there are foes within the Horde that whole companies of knights would struggle to repel, let alone Nidhogg himself. Estinien adds that age does not diminish dragons: they endure through endless years—patient, calculating, inexorable—and their sense of time differs from yours, most of all among the great wyrms who sleep for centuries and wake to resume their campaign as if hours had passed. Aymeric notes it has been twenty years since Nidhogg last darkened their skies—twenty years for him to gather strength and for Ishgard to bolster defenses—and now, as he seems poised to return, the heretics strike the gates.</p><p>Alphinaud asks whether Lady Iceheart is in league with the wyrm. Aymeric says they cannot be certain; they know the heretics covet the Eye, but not what they intend to do with it. Whatever their plans, the assault has torn a ragged weakness in Ishgard’s protections, and the Dravanians will not leave it untested. Alphinaud acknowledges the danger, then questions Aymeric’s candor—why share such sensitive information? Aymeric answers plainly: Ishgard needs allies, and he wants you to bolster the front lines for the coming battle against the dragons.</p><p>Alphinaud presses the injustice. Unlike your arrangement over the Keeper of the Lake, only Ishgard benefits here; why should you intervene in a conflict between Ishgard and Dravania, when Ishgard refused the Alliance’s request for aid during Operation Archon? Is it not grossly unjust to demand you risk your lives now in their private war? Aymeric does not defend his country’s conduct; he asks only that you consider what follows if Ishgard falls. The Horde would raze the city, then most would return to Dravania, leaving Coerthas to be buried in snow—until the Empire arrives, that is. Garleans would claim Coerthas without even drawing steel. Alphinaud recoils at the thought of an imperial province bordering Mor Dhona, then relents: you will help repel the dragons, and Eorzea will not abandon Ishgard to face the coming Horde alone.</p><p>Aymeric begins to speak of the “roar,” but Estinien asks to explain. Through the power of the Eye, he says, he has become the vessel of Nidhogg’s strength—its essence has seeped into his blood. He insists he remains in full control, and that the Eye itself is not needed at his side; yet its lingering influence lets him hear Nidhogg’s voice. Alphinaud understands: the wyrm who roared was Nidhogg. Estinien confirms it—Nidhogg means to hurl his Horde against Daniffen’s Collar and shatter the remaining wards that protect the city. There is no doubt: the wyrm has summoned his minions to war.</p><p>Afterward, Aymeric admits the hypocrisy and the self-inflicted nature of Ishgard’s predicament. Yet if begging for aid will spare his people an unkind fate, he will bow his head and accept—indeed welcome—the storm of scorn that follows. Estinien says Nidhogg is the source of their suffering, and unless the wyrm is felled, these endless clashes mean nothing. Alphinaud reflects that, even under grim circumstances, this desperate endeavor may unite Eorzea’s sister states in common cause. He adds that Ser Aymeric negotiated more ruthlessly than he expected—one gives no quarter when home is at stake—and notes the bitter edge of victory in having to request foreign help, even for a man who has long campaigned to open Ishgard’s gates. The days ahead, he says, promise to be interesting indeed.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'邪竜の咆哮',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>アルフィノは静かな緊張を帯びた声で言う。氷の巫女が都市に直接手を出すほど大胆になった以上、命じられたとおりドラゴンヘッドへ戻ろう。総司令がどこで面会するつもりかは、オルシュファン卿が把握しているはずだ、と。</p><p>ドラゴンヘッドへ戻ると、オルシュファンは安堵と熱を隠さずあなたを迎える。祖国が破滅の瀬戸際にある今、友の顔を見るだけで心が支えられるのだと言い、ひとつの過ちが奈落へ落としかねない状況でも、あなたの存在が勇気の火を燃え上がらせると語る。だが長話はできない。アイメリク卿が到着し、面会の場は聖堂であると告げる。衛兵に案内され、あなたは中へ入る。</p><p>面会に臨む前、アルフィノは腹の内を明かす。イシュガルドの未来が懸かっている以上、助力が救いとなるなら拒むわけにはいかない。だが同時に、増援を得るためには相手に容易く与えぬ姿勢も必要だ――露骨な慈善より、関心の薄さを装うほうが、エオルゼアの結束を得るうえで有利に働くかもしれない。だからこそ、教皇庁がどのような譲歩を示すのかを見極めるのだ、と。</p><p>アイメリク卿は急ぎの来訪に礼を述べ、壁上の持ち場を離れていたことを詫びる。氷の巫女と異端者には償わせねばならない、と。アルフィノは、あなたたちも「裁きの門」から戻ったばかりだと告げ、状況次第では面会を延期してもよいと申し出る。だが卿は否と言う。むしろ今こそ必要な会合であり、用が済み次第すぐ壁へ戻ると誓う。</p><p>増援の話に入る前に、と卿は盟友を紹介する。エスティニアン――イシュガルドが誇る蒼の竜騎士。アルフィノが竜騎士団をよく知らぬと認めると、卿は竜騎士がいかに恐るべき戦士であるかを語り、その中でもエスティニアンは比類なき存在で、竜の力を扱う者として選ばれ、いかなるドラヴァニアにも対抗できるのだと言う。エスティニアンは褒めすぎだと制しつつ、あなたを見て、会う前から血が高鳴っていた理由が分かったと口にする。</p><p>卿は本題に移る。門への襲撃後に捕らえた異端者の供述から、氷の巫女とドラヴァニアの竜たちは共通の目的を抱いているらしい――ニーズヘッグに奪われた眼の奪還だ。アルフィノはその名を知っている。七大竜の一角で、かつてハルドラースに討たれたものの、建国以来クルザスを脅かし続けたと伝わる竜。卿はうなずき、城壁に刻まれた傷の多さを語る。そして、討ち倒された竜の頭蓋から奪い取られた戦利品――ただ「眼」と呼ばれる秘宝は、計り知れぬ力を宿す。もしそれがニーズヘッグに戻れば、彼は全盛の力を取り戻し、いかなる壁も結界も防ぎきれない。エコーを通じ、ミドガルズオルムの声が響く――復讐に燃える息子は千年ものあいだ戦を続け、その怨嗟の深さは人の心では測れない、と。</p><p>卿は言う。眼は聖堂の奥深くに隠され、教皇庁への忠誠を証明した者たちが厳重に守っている。異端者相手なら堅牢な壁と刃で抑えられるかもしれないが、竜は別だ。竜の群れには、騎士の一個中隊でも退けるのに難儀する者がいる――ましてニーズヘッグは言うまでもない。エスティニアンは付け加える。竜は歳月で弱らない。果てしない時を生き、忍耐強く、計算高く、止めようもなく進む。彼らは時の感覚そのものが違い、とりわけ大いなる竜は何世紀も眠り、目覚めれば数刻前の続きのように戦を再開する。卿は、ニーズヘッグが空を覆ってから二十年が過ぎたと語る。その二十年のあいだに彼は力を蓄え、こちらも備えを固めた――そして今、戻らんとする矢先に異端者が門を突いた。</p><p>アルフィノは問う。氷の巫女は竜と手を組んでいるのか。卿は確証はないと言う。異端者が眼を欲しているのは確かだが、それをどうするつもりかは掴めていない。だが計画が何であれ、門への一撃で結界に裂け目が生じた。その弱点を竜たちが試さぬはずがない。アルフィノは状況を受け止めつつ、なぜそこまで機微を明かすのかと問い質す。卿は率直に答える。イシュガルドには同盟者が必要であり、竜との決戦に備えて前線を強化してほしいのだ。</p><p>アルフィノは不公平を突く。黙約の塔の件とは違い、今回の利益はイシュガルドにしかない。なぜイシュガルドとドラヴァニアの争いに介入せねばならないのか。オペレーション・アーチョンでエオルゼア同盟が助力を求めたとき、イシュガルドは拒んだではないか。今になって命を賭して戦えと求めるのは、あまりに理不尽だ。卿は自国の振る舞いを弁護しない。ただ、イシュガルドが落ちた後を想像してほしいと言う。都市は焼かれ、竜は多くがドラヴァニアへ戻り、クルザスの廃墟は雪に埋もれて獣と獣人の地となる――だがその次に来るのはガレマール帝国だ。帝国は剣を抜くまでもなくクルザスを併呑する。アルフィノは、モードゥナと国境を接する帝国領という光景に言葉を詰まらせ、そして決断する。竜を退けるため、協力しよう。大いなる竜の咆哮が天を揺らしたとしても、エオルゼアはイシュガルドを見捨てない。</p><p>卿が咆哮の話に入ろうとすると、エスティニアンが引き取る。眼の力により、自分はニーズヘッグの力を宿す器となった。彼の本質は血の奥にまで染み込み、だが自我は完全に保っている。眼そのものを携える必要はないが、残滓の影響でニーズヘッグの声が聞こえるのだという。アルフィノが理解すると、エスティニアンはうなずく。咆哮したのはニーズヘッグだ。彼はダニフェンの首へ群れをぶつけ、都市を守る残る結界を砕こうとしている。疑いようもない――竜は戦のために眷属を招集したのだ。</p><p>面会の後、アイメリク卿は言う。求めることの矛盾も、窮地が自業自得であることも痛いほど分かっている。だが民を救えるなら、頭を下げて助けを請う。嘲りと軽蔑の嵐を覚悟し、むしろ受け入れると。エスティニアンは、苦しみの根源はニーズヘッグであり、竜を討たねば果てしない衝突は無意味だと言い切る。アルフィノは、理想的とは程遠いが、この必死の試みはエオルゼアの姉妹国を共通の大義で結びつける機会にもなると語る。そして、アイメリク卿の交渉は思った以上に苛烈だったと振り返り、故郷が危ういときは容赦ができぬのだと悟る。門戸開放を唱えてきた卿にとって、外部の助力を正式に求めることは甘美でありながらも苦い勝利なのだろう――そう感じながら、これからの日々は実に興味深いものになる、と結ぶ。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> アルフィノ <small class="muted">（クルザス中央高地, X:18.5, Y:15.4）</small></div></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>Alphinaud 說，Lady Iceheart 竟然大膽到敢直接對城市出手；既然如此，你們就照吩咐行事，先回 Camp Dragonhead。Ser Aymeric 打算在哪裡接見你們，Lord Haurchefant 一定知道。</p><p>回到 Camp Dragonhead，Haurchefant 看到你，語氣裡滿是安心與激昂。他說當祖國正站在災厄邊緣時，能看見朋友的面容令人踏實；哪怕只要一步走錯就可能墜入深淵，你這樣的英雄到來，仍能在他心裡點燃勇氣。但他也立刻收住話頭——你不是來聽他閒聊的。Ser Aymeric 已經抵達，將在 The Intercessory 與你會面。衛兵隨即引你們入內。</p><p>踏進會面之處前，Alphinaud 先對你表明他的盤算：Ishgard 的未來懸於一線，若城市得救真要靠你們出手，他不能袖手旁觀；然而要換取增援，就得讓 Ser Aymeric「出點汗」。他認為與其赤裸裸地以慈善之心相助，不如先裝作興致缺缺，反而更能推動 Eorzea 的團結。於是他催你一起去看看 Holy See （ Ishgard 的神權政府／教會中樞（聖座），也就是以宗教權威統治國家的最高體制與權力核心，包含教皇體系與其所代表的國家意志）願意做出什麼讓步。</p><p>Ser Aymeric 感謝你們如此匆忙趕來，也為自己的缺席致歉，說 Lady Iceheart 與她的 heretics 必須為所作所為付出代價。Alphinaud 回答你們也才剛從 Gates of Judgement 回來，若他想推遲會面也能理解；但 Ser Aymeric 反而堅持此刻更該談，並保證事情一結束就立刻回到 Ishgard 城牆上的崗位。</p><p>在談增援之前，Ser Aymeric 先介紹一位親密盟友：Estinien——Ishgard 的 Azure Dragoon。Alphinaud 承認自己對 dragoons 所知不多；Ser Aymeric 便說他們都是可畏的戰士，而 Estinien 更是其中無人能及。他是被選中去操使龍之力的人，因此能與任何 Dravanian 對抗。Estinien 口頭上說 Ser Aymeric 讚過頭了，接著把目光落在你身上，說他終於明白為何在見面之前，他的血就已因期待而歌唱。</p><p>接著 Ser Aymeric 說明：從襲擊後俘虜的 heretics 口中，你們得知 Lady Iceheart 與 Dravanians 似乎有共同目標——奪回 Nidhogg 被偷走的眼。Alphinaud 立刻接上：Nidhogg 是七大古龍之一，名字在 Ishgard 的歷史裡極其顯眼；雖曾被英雄 Haldrath 擊敗，但自 Ishgard 建國以來，他仍被傳聞持續恐嚇 Coerthas。Ser Aymeric 證實城牆上的累累傷痕正是明證，而 Haldrath 從那頭古龍頭顱上取下的戰利品——僅被稱作「the Eye （Nidhogg 被奪走的「眼」，Ishgard 視為聖物的戰利品，也是蘊含巨大力量的核心媒介。Aymeric 的說法是：它被藏在 The Vault、由忠於 Holy See 的人嚴密看守；一旦 the Eye 回到 Nidhogg 手中，Nidhogg 會恢復到巔峰力量，Ishgard 的城牆與結界都可能無法阻擋他）」——是一件擁有難以估量力量的聖物。若它回到 Nidhogg 手中，那可怖的存在將重返巔峰；到那時，不論你們築起多厚的牆、設下多堅固的防護，都擋不住他。你也透過 Echo 聽見 Midgardsormr 的聲音：他復仇的兒子已對 Ishgard 發動千年戰爭，那份怨恨之深，非凡人心智能理解。</p><p>Ser Aymeric 說，the Eye 被深藏在 The Vault，重兵把守，日夜由已證明忠誠於 Holy See 的守衛圍護。若只是對付 heretics，堅牆利刃或許足以嚇阻，但龍族完全是另一回事。Dravanian Horde (以 Nidhogg 為核心的龍族軍隊) 之中，有些存在強大到足以讓整整一個騎士中隊都苦戰不退，更別提 Nidhogg 本人。Estinien 補充，歲月不會奪走龍的力量；牠們在漫長年歲中存續，耐心、精算、不可阻擋。你必須理解：牠們對「時間」的感受與你們不同，尤其是那些古龍——能沉睡數百年，醒來後就像只過了幾個小時般，立刻延續牠們的戰役。Ser Aymeric 也說，距離 Nidhogg 上次遮蔽天空已過二十年；二十年足以讓他積蓄力量，也讓 Ishgard 強化防務——而如今，在他似乎準備回歸之際，heretics 卻先一步對大門出手。</p><p>Alphinaud 問：所以 Lady Iceheart 是與那頭古龍結盟了嗎？Ser Aymeric 說無法確定；他們知道 heretics 渴求 the Eye，卻查不出他們打算如何使用。不管計畫為何，Lady Iceheart 已在 Ishgard 的防護上撕開一道破口——而 Dravanians 絕不可能放過這樣的弱點不去試探。Alphinaud 承認局勢危急，卻也反問 Ser Aymeric 為何如此坦白，把敏感情報都告訴你們。Ser Aymeric 直言不諱：Ishgard 需要盟友，他希望你們加入前線，為即將到來的對龍之戰做好準備。</p><p>Alphinaud 隨即把話鋒轉得更尖：這次不同於 Keeper of the Lake 的安排，這件事只有 Ishgard 受益；他看不出你們為何要介入 Ishgard 與 Dravania 的衝突。當 Eorzean Alliance 在 Operation Archon （Eorzean Alliance 對 Garlean Empire 第十四軍團 發動的「決戰作戰／聯軍總攻勢」代號；目標是對帝國在 Eorzea 的據點展開全面攻擊、奪回主導權並終結其威脅）需要 Ishgard 支援時，你們拒絕了，如今卻要求你們為你們的「私人戰爭」賭上性命，這不是太不公了嗎？Ser Aymeric 不為國家的行為辯解，只請你們想想 Ishgard 若倒下會發生什麼：Horde 會把城市夷為平地，之後多數龍會回到 Dravania 的巢穴；Coerthas 的殘骸將很快被大雪掩埋，化為野獸與 beastmen 的領地——直到 Garleans 抵達。Ser Aymeric 說你們可以肯定：Empire 不會猶豫，它將毫不費力就把 Coerthas 納為帝國領土，甚至不必拔劍。Alphinaud 一想到 Mor Dhona 旁邊緊貼著一個帝國行省，臉色驟變，隨即改口：好，你們會協助擊退龍族；哪怕古龍的咆哮撼動天穹，Eorzea 也不會丟下 Ishgard 的同胞，讓他們獨自面對即將到來的 Horde。</p><p>Ser Aymeric 正要接著談那聲「怒吼」，Estinien 主動開口代為解釋。他說，透過 the Eye 的力量，他已成為 Nidhogg 之力的容器；那股本質滲入他的血液之中。但他要你放心——他仍完全掌握自己的心智，而且這件事並不要求他隨身攜帶 the Eye；然而殘留的影響，確實讓他能聽見 Nidhogg 的聲音。Alphinaud 立刻明白：那個發出咆哮的古龍——？Estinien 直接證實：是 Nidhogg。他準備把 Horde 投向 Daniffen’s Collar，擊碎保護城市的剩餘防護。毫無疑問——那頭古龍已召集眷屬，準備開戰。</p><p>會後，Ser Aymeric 說自己非常清楚這份請求的偽善，也清楚這一切困境在某種意義上是自招的。但若低頭懇求能讓人民逃離悲慘命運，他願意彎下脊梁；他預期、也願意承受即將迎來的嘲諷與鄙夷。Estinien 說，Nidhogg 才是一切痛苦的源頭；若不斬落那頭古龍，這些無盡的衝突全都沒有意義。Alphinaud 則說，雖然情勢遠不理想，這次絕境中的合作，至少給了你們一個機會：把 Eorzea 的姊妹國拉到同一個目標之下。他坦言 Ser Aymeric 的談判比他預期更冷酷——但家園在危急之際，誰都不會手下留情。最後他提到，當 Ser Aymeric 正式開口請求外援時，他臉上的神情很複雜；那位長年主張 Ishgard 對外開放的 lord commander，或許終於等到 Holy See 態度軟化，卻也只能以「不得不求助」的方式迎來這一步。接下來的日子，恐怕會很不平靜。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 阿爾菲諾 <small class="muted"> 庫爾札斯中央高地（X:18.5, Y:15.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="defenders-for-ishgard.html">來自伊修加爾德的請求</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
