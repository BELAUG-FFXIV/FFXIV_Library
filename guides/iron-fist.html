    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Pomb lets out a small, sorrowful cry at the door, and Yaana quietly admits that the heavyweight title match has finally come. Even she cannot hide her nerves now. Seeing Pomb like this only makes the ache sharper—just as Retsarra said, the little one is searching for her master. For a moment, grief threatens to pull at both of you, but Yaana forces herself back to the present. There is still one last opponent to face, and before you step forward, she wants to make sure you understand exactly what stands before you.</p><p>That opponent is the reigning grand champion of the Arcadion: the Tyrant. Yaana tells you that before he ever became a fighter, he was a hunter without equal, famed for his command of every kind of weapon. Even now, that mastery defines him. In the ring, he carries an entire arsenal and shifts from one weapon to another whenever the battle demands it. Thanks to the information Neyuni recovered, you also know the soul he intends to wield: that of a behemoth, a monstrous beast of immense strength and terrible magic. That means you must be prepared not only for crushing physical force, but also for devastating whirlwinds and meteors.</p><p>Even so, Yaana sends you out with everything she has left. As your second, all she can do now is believe in you and urge you to win one final time—to claim the title and open the way to a new Arcadion, one where lives are no longer fed into the machinery of entertainment. You step into the match, and when the battle is done, you emerge victorious once more. Yaana, waiting in the greenroom, says there is nothing left for her to do but cheer you on toward the celebration she is certain must come next.</p><p>But what follows is not celebration. In the Crown, Metem begins to proclaim that you have deposed the Tyrant and risen as grand champion, only for a new voice to cut across the moment. It is the president. He says he is pleased that he did not misjudge you, though the figure before you is not his true body—his real self waits in quarters on the uppermost floor. Yaana immediately demands that he honor the bargain and reveal where the Drop of Life is. The president answers that it is there with him, and invites you to come claim it in person, saying you have earned a private audience. Metem, bewildered but unwilling to miss what is unfolding, rushes after the moment with a camera in hand.</p><p>What you find is something far worse than any of you imagined. Before you stands a monstrous being, and when Yaana recoils in shock, the president calmly explains that this is the Lindwurm, the ancient serpent for which his homeland was named, and that by infusing himself with its soul, he has taken on this form. Behind him stand the immortalized—the dead fighters whose bodies have been arranged like decorations in a faithfully recreated Lindblum theater. Among them is Eutrope. Yaana can only stare in horror and turn to Metem, asking why this has happened when he promised to save her. Metem, crushed, can only admit that the president was ahead of them all along. The president then reveals that he has always known of Metem’s betrayal. With each feral transformation, he says, the souls of those fighters were ravaged until they died, and now they will serve as the audience for the final act. To use the dead as stage dressing horrifies Metem, but the president sees only spectacle. He declares to the people of Alexandria that he gave his own body and soul in pursuit of ever greater entertainment, that he sought to create worthy opponents through power and soulcraft, and that though all others died too soon, the one he has awaited has finally appeared.</p><p>Then the last truth falls into place: you have not yet become the true grand champion. The president says you have only become heavyweight champion, and if you wish to claim the real title, you must defeat him as well. You answer without hesitation that you will do exactly that. Pleased, he tells you to prepare without holding anything back, because nothing short of perfection will suffice for the performance he has in mind. Metem, half in outrage and half in disbelief, cries out that the truth has been laid bare and the final match is now set. Beyond the arena, the people of Solution Nine finally understand the cost of the thrills they consumed. Some recoil in guilt, others in grief, and others still place all their hope in you. Retsarra, seeing Eutrope among the immortalized, can say only her name. And when everything falls quiet again, Yaana breaks. Through tears, she can only sob that Eutrope too has been taken from her.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>扉の前で、ポムが心細げに鳴く。ヤーナは、ついにヘビー級のタイトルマッチが始まるのだと告げながらも、さすがに少し緊張してきたと本音を漏らす。そんな中、ポムの鳴き声が胸を締めつける。レトサラの言ったとおり、この子は主人を探しているのだ。痛ましい思いが胸をよぎるが、ヤーナは気持ちを切り替えるように、最後の相手について確認しようとあなたに向き直る。</p><p>相手は、現アーカディアのグランドチャンピオン、タイラント。ヤーナによれば、闘士になる前の彼は、あらゆる武器を自在に扱う比類なき狩人として名を馳せていた。その技量は今もなお健在で、リングの上では数々の武器を使い分け、状況に応じて自在に切り替えてくる。そしてネユニが得た情報により、今回彼が使うのはベヒーモスの魂だとわかっていた。途方もない怪力と恐るべき魔法を併せ持つ魔獣であり、凄まじい一撃だけでなく、暴風や隕石までも叩きつけてくるはずだ。これまで以上に油断は許されない。</p><p>それでもヤーナは、最後にもう一度勝ってきてほしいとあなたを送り出す。称号をつかみ、命が娯楽のために差し出されることのない新しいアーカディアの時代を切り開いてほしいのだと。その願いを背に、あなたは戦いへ向かい、そしてまた勝者として帰ってくる。グリーンルームで待つヤーナは、もう自分にできることは勝利を信じて応援することだけだと微笑み、間もなく祝福の時が来ると疑いもしない。</p><p>だが、訪れたのは祝賀ではなかった。クラウンにて、メテムがあなたこそタイラントを打ち倒し、グランドチャンピオンに上り詰めたのだと告げようとしたその瞬間、場に別の声が響く。社長だった。見誤らなかったことをうれしく思うと語るその声に、ヤーナはすぐさま取引の履行を求め、「Drop of Life（可用來治療 psychonekrosis 的刺激劑）」の在り処を明かせと迫る。社長は、それは自分のもとにあるのだと答え、上層最上階の私室に来いと言う。直接会う資格を得たのだから、と。事態が読めないまま、メテムもまた、この異常な展開を記録しようと後を追う。</p><p>しかし、その先で待っていたのは、想像をはるかに超える光景だった。ヤーナが息を呑むほどの異形を前に、社長は平然と、それはリンドブルムの名の由来でもある伝説の古蛇リンドヴルムであり、その魂を自らに注いだことでこの姿を得たのだと語る。その背後には、「不朽の闘士」たちが並べ立てられていた。獣魂への変成を重ねるたびに魂を蝕まれ、やがて死に至った者たち。その亡骸が、忠実に再現されたリンドブルムの劇場の中で、最後の舞台を見守る観客として飾られているのだという。その中にはユートロープの姿もあった。ヤーナは言葉を失い、助けると約束したはずだとメテムに詰め寄るが、彼は社長に一歩先を行かれていたのだと苦い顔で認めるしかない。社長は、メテムの裏切りなどとっくに承知していたと告げ、さらにアレクサンドリアの民へ向けて、自分はより刺激的な娯楽を生み出すために己の身も魂も捧げたのだと高らかに語る。強大なリンドヴルムの力を手にし、ついに待ち望んだ役者が揃った今、アーカディア史上最大の舞台が始まるのだと。</p><p>そして最後に、残酷な真実が突きつけられる。あなたはまだ真のグランドチャンピオンではない。ただヘビー級王者になったにすぎず、本当の頂に立ちたければ、次はこの自分を倒さねばならない――そう社長は宣告する。あなたが迷いなく応じると、彼はその意気だと愉しげに笑い、次の舞台にふさわしい完璧な準備をしてこいと言い渡す。メテムは、真実が暴かれ、ついに最後の試合が定まったのだと半ば叫ぶように告げる。ソリューションナインの人々もまた、獣魂の華やかさの裏で闘士たちが命を落としていたことを知り、言葉を失う。逃避のために見ていた舞台の代償の重さに気づき、それでもなお、最後の希望としてあなたへ声援を寄せる者たちがいる。レトサラは、並べられた「不朽の闘士」の中にユートロープを見つけ、その名を絞り出すことしかできない。そしてすべてがひと息に押し寄せたあと、ヤーナはついに堪えきれず、ユートロープまでもがこうなってしまったのだと泣き崩れるのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>Pomb 在門前低低地叫了一聲，那聲音裡帶著說不出的失落。Yaana 看著牠，又看向你，說終於來到這場 heavyweight 冠軍戰之前了，而連她自己都不得不承認，現在心裡也開始有些緊張。可 Pomb 這副模樣，反而讓人更難把心思只放在比賽上。正如 Retsarra 之前所說的那樣，牠大概也只是想找到自己的主人而已。那份難受在胸口停了一瞬，Yaana 很快還是逼自己把注意力拉回來，說這大概會是最後一次了，先把你將要面對的對手再看清楚。</p><p>那個人，就是 Arcadion 現任的 grand champion（Arcadion 全分級之上的最終冠軍頭銜），The Tyrant。Yaana 告訴你，在成為闘士之前，他原本就是一名沒有對手的獵人，以精通各種武器而聞名。到了擂台上，他同樣會帶著整套武器上場，並依照戰況隨時切換使用。而按照 Neyuni 先前取得的情報，他在這場冠軍戰中準備使用的，將會是 behemoth 的靈魂，那是一頭擁有可怕力量與魔法的兇獸。也就是說，你不只得提防他猛烈的近身攻擊，還得撐過他將會施放的狂風與隕石。和之前相比，這一戰更不能有絲毫鬆懈。</p><p>即便如此，Yaana 仍然把最後的希望全都壓進這句話裡，要你再贏最後一次。只要你拿下那個頭銜，就能替 Arcadion 開啟新的時代，一個不再把生命當成娛樂祭品的時代。你便帶著這份話語走進戰鬥，並再一次帶著勝利回來。留在 Greenroom 的 Yaana 看見你平安歸來，只說身為你的 second（協助格鬥士蒐集對手情報、提供訓練建議與場邊支援的人），現在她唯一能做的，就只剩下為你的勝利喝采。而她甚至已經相信，那場慶祝很快就會到來。</p><p>可真正到來的，卻不是慶祝。在 The Crown，Metem 才剛開口說你已擊敗 The Tyrant、登上 grand champion（Arcadion 全分級之上的最終冠軍頭銜）的位置，另一道熟悉的聲音就突然從高處傳來。那是總裁。他說，自己果然沒有看錯你。Yaana 立刻抬頭要他履行約定，交出 Drop of Life（可用來治療 psychonekrosis 的刺激劑）的所在地。總裁卻只淡淡地回答，那東西現在就在自己手上，要你們親自過來，他會交給你們，畢竟，你已經贏得了和他單獨會面的資格。連 Metem 都一頭霧水，完全不知道這究竟是怎麼回事，只能匆匆拿起攝影機，準備把眼前發生的一切記錄下來。</p><p>可當你們真的來到那裡時，眼前的景象卻讓所有人都僵住了。Yaana 幾乎是脫口而出地問，那究竟是什麼怪物。總裁則平靜地說，那是 Lindwurm——遠古傳說中的巨蛇，也是他故鄉之名的來源，而他把那頭生物的靈魂注入自己體內之後，便得到了如今這副模樣。更令人窒息的是，在他身後整齊排開的，竟然全都是那些所謂「名留不朽殿堂的人」。Metem 一眼就認了出來，那些人正是早已死去的闘士。Yaana 的目光則瞬間落在 Eutrope 身上，整個人都顫了一下，隨即轉向 Metem，幾乎是哽咽著質問他，為什麼事情會變成這樣，明明他答應過會把人救回來。Metem 只能痛苦地承認，總裁終究還是比他們快了一步。下一刻，總裁便親口說出，他早就知道 Metem 一直在背著自己做什麼。他還將那些使用 feral soul 進行變身反覆折磨、直到靈魂徹底殘破而死去的闘士，一一擺在自己身後，說他們將會成為這齣最終演目的觀眾，陪他們一起待在這座忠實重現的 Lindblum 劇場裡。Metem 看著那些死者的身體被當成舞台裝飾，終於壓不住地說，這簡直是徹底的墮落。可總裁根本不在乎。他甚至還向 Alexandria 的人們廣播，說自己為了帶來更刺激的娛樂，連自己的身體與靈魂都奉獻了出去；他獲得了強大的 Lindwurm 之力，又不斷尋找能與自己匹敵的闘士，雖然其他人都太早死去，但他終於等到了自己一直在等的人。如今，演員都已齊聚，Arcadion 歷史上最偉大的表演終於能夠開幕，所有悲傷與無聊都將在最狂熱的高潮裡被徹底吞沒。</p><p>而最後的真相，也就在此刻被他親口揭開。總裁對你說，你其實還不算真正的 grand champion（Arcadion 全分級之上的最終冠軍頭銜）；你不過才剛成為 heavyweight 冠軍而已。若你真的想得到那個最終頭銜，現在還必須再打倒他。你毫不猶豫地回應，表示自己一定會擊敗他。總裁聽了反而滿意地笑起來，說就是要有這種氣勢，並要你為這場最終演出做好萬全準備，因為只差一點都稱不上完美。Metem 幾乎是帶著震驚與顫抖喊出來，真相已經揭露，而最後一場比賽，也終於被決定了。另一邊，Solution Nine 的人們也在這一刻真正理解，原來那些闘士真的會因 feral soul 而死去，而他們自己曾經追逐的刺激，竟是建立在這樣的代價之上。有人因此痛苦，有人因此悔恨，也有人在絕望中把最後的希望全都押在你身上。Retsarra 望著 Eutrope，只能低低地喊出她的名字。而當所有事情終於一起壓下來時，Yaana 也終於再也撐不住，只能一邊哭著，一邊崩潰地說，連你也是，Eutrope……連你也變成這樣了……</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
