    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Time is short. Drillemont warns that while his knights ready to depart, the heretics could strike your allies in Snowcloak before a sword is even drawn. Training and equipment will mean nothing if the attack comes first, so he urges you to leave at once—fly to Snowcloak and tell Ser Aymeric everything you have learned.</p><p>At Snowcloak, the cold and tension make every word feel heavy. Alphinaud points you toward Ser Aymeric and says you can speak if you must, but that you will talk later. Temple Knights mutter that you are at a disadvantage and should not linger, while Yuyuhase praises the uniform’s greatcoat for keeping him from freezing. Others look at the ice and wonder how anyone could tunnel through something so thick.</p><p>When you deliver Drillemont’s warning, Aymeric calls your arrival a welcome surprise—perhaps the only one so far. He admits they already suspected the heretics might attempt such an attack, and now that you have confirmation, he will place his knights on high alert. He asks whether Commander Leveilleur has been informed, insisting the Braves must be made aware, and he hopes that if Halone is kind, you may catch sight of the enemy emerging from their tunnels and learn where those passages lead.</p><p>Alphinaud grows certain that something important lies here—otherwise, why would the heretics defend Snowcloak so fiercely? Yet even forewarned, you are at a disadvantage: the heretics know the terrain far better, and you cannot know how many eyes are watching at this very moment. Alphinaud fumes that Iceheart has you scrambling merely to survive when you should be hunting her and stopping her summoning. Then the alarm breaks—heretics shout, and a figure is nearly seized. Yda pulls clear and asks if you are hurt; Alphinaud answers, grimly, that only his pride is.</p><p>Yuyuhase rushes in with news: alongside the Temple Knights, you have secured the entrances to several tunnels after spotting enemies breaking the surface—and one entrance seems especially important, defended with desperate ferocity. Alphinaud seizes on it at once, convinced that somewhere in this warren lies the way to Iceheart’s lair, and he calls to gather everyone and go in. But Papalymo stops him cold: the tunnel is barely wide enough for two, no one knows where it leads, and you cannot know how many heretics still lurk above. If you all enter, you may be funneling your forces into a trap.</p><p>Alphinaud relents and changes the plan. While he rendezvous with Ser Aymeric and holds the heretics at bay on the surface, you will take a party down the tunnel—small enough not to choke the passage, prepared for anything, and determined that if Iceheart is waiting at the end, you will not let her escape. Aymeric confirms the perimeter is secure and bids you good fortune, ordering his knights to stand guard outside even if you meet heavy resistance within. With the way opened and the rear protected, you descend into Snowcloak.</p><p>In the depths, Iceheart steps forward and speaks as if the stories about you were insufficient. She says she was given the name Ysayle, but earned the name Iceheart, and asks whether you would let the endless cycle of hatred, bloodshed, and sorrow continue. She refuses—she will end the war between dragon and man, no matter the cost. In time, she says, you will understand that all of this is for the greater good: for Eorzea, for Hydaelyn.</p><p>You return to the surface, and Aymeric, though he never doubted you would come back, admits relief at seeing his judgment proven right. The others are equally shaken and grateful, and Alphinaud presses you for news. Iceheart, you report, is only a name—but what matters is that she escaped, even if you came dangerously close. Still, your path has given the Temple Knights the chance to survey the tunnels in earnest, and perhaps even find a route past the ice wall—something that would greatly aid their fight against the heretics, and for which the Crystal Braves would share the credit. Alphinaud allows himself a moment of hope—so long as you stop Iceheart before she summons Shiva. He adds that Minfilia and Urianger have been searching the archives of House Fortemps for what they can learn about Shiva, and tells you not to trudge back to Camp Dragonhead to report—because the Antecedent should arrive any minute.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>時間がない。ドリルモンは、騎士たちが出発準備を整えているあいだにも、異端者がスノークロークで味方を不意打ちする恐れがあると言う。剣を抜く前に斬り倒されては、鍛錬も装備も無意味だ。まだ手遅れではない、今すぐ向かえば警告が間に合うかもしれない――そう懇願され、あなたはスノークロークへ急行し、サー・アイメリクに判明したことのすべてを伝えるよう託される。</p><p>スノークロークでは、冷気と緊張が場を支配している。アルフィノはサー・アイメリクの居場所を示し、用件があるなら話してこいと言い、あとで改めて話すと告げる。神殿騎士は不利を嘆き、長居は避けるべきだと警戒し、ユユハセはこの外套がなければ凍え死んでいたと制服の出来を称える。分厚い氷を見上げた騎士は、こんな氷を掘り抜くなど年単位の仕事だろうと首を振る。</p><p>あなたが警告を伝えると、アイメリクは思いがけない来訪に感謝し、異端者がそのような襲撃を企てている可能性は疑っていたと認める。確証を得たいま、彼は騎士たちに厳戒態勢を敷くと言い、アルフィノ――クリスタルブレイブ司令官には知らせたのかと問う。クリスタルブレイブにも周知が必要だ、と。そしてハルオーネの加護があるなら、異端者が坑道から地表へ現れる瞬間を捉え、坑道がどこへ通じているのか掴めるかもしれない、と言う。</p><p>アルフィノは、この場所にこそ鍵があると確信する。異端者がスノークロークをあれほど守ろうとするのは、それだけの理由があるはずだ。だが、たとえ事前に察していても不利は変わらない。地の利は異端者にあり、いまこの瞬間もどれほどの目がこちらを見ているか分からない。アルフィノは、アイスハートに振り回されて身を守ることに追われ、本来なら彼女を追い、召喚を止めるべきなのにと苛立つ。そこへ叫び声が走り、異端者が標的を見つけたと騒ぐ。イダが間一髪で逃れ、無事かとあなたに問うと、アルフィノは自嘲気味に、傷ついたのは誇りだけだと言う。</p><p>ユユハセが駆けつけ、進展を報告する。神殿騎士とともに、地表へ出てくる敵を確認し、いくつもの坑道入口を確保した――だがそれだけではない。とりわけ重要と思われる入口があり、周囲の異端者はそれを守るために必死に斬りかかってきたという。アルフィノはそれを聞くや、坑道群のどこかにアイスハートの根城への入口があるはずだと断じ、突入を主張する。だがパパリモが制止する。坑道は二人が並ぶのがやっとの狭さで、どこへ通じるかも、その先に何が待つかも分からない。さらに地表に潜む異端者の数も不明で、突入後にここへ集結されれば、こちらが罠へ押し込まれる危険がある。</p><p>アルフィノは指摘を認め、計画を変更する。自分たちはサー・アイメリクと合流し、地表で異端者を抑える。そのあいだあなたは、あの坑道の先へ向かう――少人数で、未知に備え、もし行き着く先にアイスハートがいるなら逃がすな、と。アイメリクも、あなたが坑道へ入ると聞いたと言い、これ以上ふさわしい者はいないと告げて武運を祈る。騎士たちは入口で警戒線を維持し、たとえ内部で激しい抵抗があっても持ち場を離れられないと念を押す。背後の憂いが断たれたのを確かめ、あなたはスノークロークへ踏み込む。</p><p>その奥で、アイスハートが姿を現す。彼女は、光の戦士についての噂では足りないと言い、あなたの正体を知っている、そしてあなたも自分を知っていると言う。名はイゼル――だが「アイスハート」という名は自ら勝ち取ったのだと。憎しみと流血と悲嘆が繰り返されるこの循環を、あなたは続けさせるつもりなのかと問い、彼女は否と断じる。竜と人との戦を終わらせる、たとえ代償が何であろうと。いつかあなたも理解すると言い、これは大義のためだと告げる――エオルゼアのため、そしてハイデリンのために。</p><p>地上へ戻ったあなたを見て、アイメリクは安堵を隠さない。ユユハセは凍えながらも口を慎み、神殿騎士はあなたが無事でいること自体が救いだと言う。アルフィノは想定より時間がかかったとこぼし、報告を求める。アイスハートが偽名にすぎないことなど問題ではない、と言い切り、逃したのは痛いが、あなたが見たものの異様さを思えば、そこまで迫れたのは十分だと評価する。とはいえ道は開けた。神殿騎士団は坑道の調査を本格化でき、氷壁の向こうへ抜ける経路さえ見つかるかもしれない――それは異端者との戦いに大きな助けとなり、クリスタルブレイブも功績を分かち合えるだろう。だが前提はひとつ、アイスハートがシヴァを召喚する前に止めることだ。さらに彼は、ミンフィリアとウリエンジェがフォルタン家の古文書を調べ、シヴァに関する情報を集めていると告げる。そして今日の報告のためにキャンプ・ドラゴンヘッドへ戻る必要はない、まもなく先代当主がこちらへ来るはずだ、と続ける。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>時間迫在眉睫。Drillemont 說，就算他的騎士正在整備準備出發，異端者也可能先一步在 Snowcloak 對盟友下手。再好的訓練與裝備，若在拔劍前就被砍倒，也毫無用處；但事情還沒到絕望的地步，只要你現在立刻動身，也許還來得及發出警告。他懇求你立刻趕往 Snowcloak，把你們發現的一切親口告訴 Ser Aymeric。</p><p>你抵達 Snowcloak 後，寒意與壓迫感幾乎讓人不敢多停留一秒。Alphinaud 指了指 Ser Aymeric 的方向，要你若有必要就去說明，其他事稍後再談。神殿騎士低聲提醒你們在這裡處於劣勢，最好不要逗留太久；Yuyuhase 則一邊發抖一邊稱讚制服外套的設計，說沒有這件大衣他早就凍死了。有人望著厚得驚人的冰層，反問怎麼可能挖出地道——那應該得花上好幾年的時間。</p><p>你把 Drillemont 的警告交給 Aymeric 後，他說你的到來是難得的驚喜，甚至可能是目前唯一的好消息。他坦言其實他們也懷疑異端者可能在策劃類似的襲擊，如今既然得到確證，他會立刻讓騎士進入高度戒備。接著他追問：Commander Leveilleur 是否已被告知？Crystal Braves 也必須立刻知情。Aymeric 又補了一句，若 Halone（Ishgard 信奉的戰神與守護神之一，亦被稱為 The Fury）願意眷顧，也許你們能逮到敵人從地道破冰而出的瞬間——最有價值的，是弄清楚那些地道究竟通往哪裡。</p><p>Alphinaud 越看越確信：關鍵一定就在這裡，否則異端者不可能花這麼大力氣死守 Snowcloak。可就算事先得知風聲，你們仍然處在不利的位置——地形他們更熟，而此刻究竟有多少雙眼睛在暗處盯著你們，你們根本無從判斷。Alphinaud 懊惱地說，Iceheart 逼得你們只能忙著保命，可你們本該把全部力氣用來追捕她、阻止那場該死的召喚。就在這時，異端者的叫喊突然爆開，有人被鎖定、被追趕。Yda 驚險脫身後立刻問你有沒有受傷，Alphinaud 則冷冷回了一句：受傷的只有他的自尊。</p><p>很快，Yuyuhase 帶著新進展衝來回報：他們與神殿騎士合力，在目擊敵人破冰而出後，已經封住了好幾處地道入口；而其中有一個入口顯然特別重要，因為那附近的異端者幾乎是不顧性命地撲上來死守。Alphinaud 立刻斷言，在這片地道迷宮之中一定藏著通往 Iceheart 藏身處的入口，並打算召集人手直接突入。</p><p>Papalymo 當場制止。他指出，那條地道窄到幾乎只能兩人並行，你們既無法確定它通往哪裡，更無法確定盡頭有什麼在等著；而且你們也不知道地面上還潛伏著多少異端者。若你們全員鑽進去，對方只要在你們進入後集中包抄，你們就等於把自己的兵力硬生生塞進一個陷阱。Alphinaud 只能承認他說得對：地道若真那麼窄，人數越多反而越礙事，遇到狀況時，自己的盟友甚至會成為撤退的阻礙。</p><p>計畫因此改變。Alphinaud 會去與 Ser Aymeric 會合，留在地面上守住防線、牽制異端者；而你要帶著一支小隊，沿著那條地道前進，去看它究竟通往何處。若盡頭真的就是 Iceheart——絕對不能讓她逃走。Aymeric 也表示他已得知你將率隊下去，這確實很大膽，但他想不到比你更合適的人選，並祝你順利。神殿騎士奉命在入口外戒備，就算你在裡面遇到激烈抵抗，他們也不能離開崗位；Aymeric 則向你保證防線已經建立，你不必擔心後方遭到襲擊。於是，你踏入 Snowcloak。</p><p>在地底深處，Iceheart 出現了。她說傳聞不足以形容你，並且直言她知道你是誰，而你也知道她是誰。她說自己被賦予的名字是 Ysayle，但「Iceheart」這個名字是她用自己的方式贏來的。她質問你是否打算讓仇恨、流血與悲傷的循環永無止境地延續下去，隨即否定那條路：她不會允許，她要終結龍與人之間的戰爭，不計任何代價。她說終有一天你會理解，你們所做的一切都是為了更大的善——為了 Eorzea，也為了 Hydaelyn。</p><p>你回到地面後，Aymeric 看到你平安歸來，雖然他本就不懷疑你能回來，仍明顯鬆了一口氣。Yuyuhase 忍著寒冷抱怨到一半又趕緊收聲，神殿騎士也說你仍在此本身就是一種幸運；而 Alphinaud 則急著要你說明情況。他說 Iceheart 只是個化名，重點不在那裡；她能逃走固然可惜，但照你描述的那頭「東西」，你能逼近到那種程度已經做得很好。更重要的是，你已經清出一條路，神殿騎士終於能開始認真勘查地道，甚至可能找到繞過冰壁的路線——那對對抗異端者會有極大助益，而 Crystal Braves 也能分到這份功勞。只是前提仍然只有一個：你們得在 Iceheart 召喚 Shiva 之前攔下她。Alphinaud 也補充，Minfilia 與 Urianger 並沒有閒著，他們正在翻查 House Fortemps 的檔案，盡可能蒐集關於 Shiva 的情報；至於你若打算走回 Camp Dragonhead 回報今天的事，他要你別去，因為 Antecedent 應該很快就會到場。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 德里耶蒙 <small class="muted"> 庫爾札斯中央高地（X:12.8, Y:17.4)</small></div></div>`,

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
