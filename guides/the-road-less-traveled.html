  EN:{
    langLabel:'English',
    pageTitle:`The Road Less Traveled`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Moenbryda tells you there is little to be gained from weighing the implications of what you saw while standing in the freezing cold. She says you can save it for the Rising Stones, and that she will have everyone meet you there—but first, she insists you go to Whitebrim Front and speak with Alphinaud, who is likely worried sick about you…or else busy playing politics with the Ishgardians. Either way, she expects him to be glad to see you hale and healthy, and she pointedly asks—again—about headaches or blurred vision before sending you on your way.</p><p>At Whitebrim Front, you are reminded that it is customary to report to your commanding officer after completing a mission. Aymeric looks upon you and says that your presence is proof of success, offering praise to Halone. Drillemont welcomes you back as a friend, admitting he never imagined he would one day be so glad to see you return.</p><p>Alphinaud meets you with relief, declaring you none the worse for wear and treating your success as something that should surprise no one. He says he would gladly hear the tale—until the truth lands that you were too late to prevent the summoning. Aymeric answers that you were not too late to prevent further loss of life, and calls it an outcome worth celebrating—one for which you deserve thanks. He adds that Shiva is no longer a threat and the heretics have been routed, even if Iceheart escaped; his knights will find her, whether it takes days, weeks, moons, or years. He confirms the recovered supplies—minus the crystals—will be conveyed safely to Revenant’s Toll, and then asks you to accompany him to Camp Dragonhead, explaining that a certain lord was deeply distressed when he learned you meant to risk life and limb, and that people vent their anxieties in myriad ways.</p><p>When you reach Camp Dragonhead, Haurchefant bursts out at you for wagering your very being on a dubious theory just to enter Iceheart’s lair—knowing she might still complete the ritual—and then for engaging the abomination in mortal combat. He calls it the stuff of ballads and confesses he was forced to wait and wonder at your fate, a torment he would not wish on his most hated enemy. He reins himself in, says what matters is that you are here now, and tells you that Aymeric wishes to speak with you and Alphinaud in private, waiting within.</p><p>In the private meeting, Aymeric thanks you on behalf of the Holy See, saying Ishgard has never before been required to contend with a primal and that there were fears the Temple Knights might not have been equal to the task. He states plainly that Ishgard would have lost many had the Scions not intervened. Alphinaud presses that the case for preemptive action should be self-evident and asks Aymeric to reconsider moving against Natalan; Aymeric explains that the Holy See previously chose to observe and act only in self-defense, a decision not unreasonable at the time—but that this unprecedented crisis and its resolution may prompt a change in policy, because there is nothing like a brush with death to change a man’s outlook.</p><p>The talk turns to arrangements and trust. Aymeric says, as far as possible, the Scions will be compensated; Alphinaud accepts any aid, and Aymeric offers to withdraw a prior request, only for Alphinaud to refuse, citing your shared interest in watching Dravania. When Alphinaud suggests Ishgard is not wont to aid its neighbors but will manipulate them to serve its interests, a knight warns him to choose his words carefully—yet Aymeric acknowledges the point and calls your relationship mutually beneficial, born of necessity as dragons grow more restless and heretics harry Ishgard without cease. Aymeric introduces Lucia as his second-in-command and trusted voice, instructs you to inform her if any shipment comes to harm, and then has Haurchefant present the results of investigations and an interrogation record; Aymeric closes by saying Ishgard may be many things, but it is no friend to Garlemald.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Moenbryda <small class="muted">(Coerthas Central Highlands, X:3.3, Y:21.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-instruments-of-our-deliverance.html">The Instruments of Our Deliverance</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="eyes-unclouded.html">Eyes Unclouded</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'白き女神殿騎士',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>モーンブリダは、凍てつく寒さの中であなたの話の意味をあれこれ考えても、得るものはないと言う。話は石の家で改めて聞くから、皆もそこに集めておく――ただその前に、ホワイトブリム前哨地へ行ってアルフィノに会っておけ、と。あなたのことを心配して気が気ではないはずだし、あるいはイシュガルドの連中相手に政治ごっこをしているかもしれないが、どちらにせよ無事な顔を見れば喜ぶだろう、と彼女は言い、最後に頭痛や視界の異常がないかを念押しして去っていく。</p><p>ホワイトブリム前哨地では、任務を終えたなら上官に報告するのが慣例だと告げられる。エメリックは、あなたがここに立っていることが成功の証だと言い、ハルオーネの加護を讃える。ドリユモンもまた、あなたが戻ってきたことを友として歓迎し、これほど安堵する日が来るとは思わなかったと率直に述べる。</p><p>アルフィノは、あなたが無事であることに安堵し、光の戦士が成し遂げたことに疑いの余地はないと言う。だが、召喚そのものは阻止できなかったと知ると、言葉を失う。エメリックはそれでも、さらなる犠牲を防げたのだと告げ、祝うに値する結果であり、あなたに感謝すべきだと言う。シヴァはもはや脅威ではなく、異端者は退けられた――たとえアイスハートが逃げたとしても、日、週、月、年を要しようと騎士たちが必ず見つけ出す、と。回収した物資は、クリスタルを除いてレヴナンツトールへ護送される手はずだとも確認され、続けてあなたに、近いうちにキャンプ・ドラゴンヘッドへ同行してほしいと頼む。ある領主が、あなたが命を懸けてアイスハートを止めようとしたと知って取り乱したらしく、人は不安をさまざまな形で吐き出すものだ、だから軽んじないでほしい――そう言って。</p><p>キャンプ・ドラゴンヘッドに着くと、オルシュファンはあなたに詰め寄り、確証のない推論に存在そのものを賭けてアイスハートの巣へ踏み込もうとしたこと、そして彼女が儀式を急げば結局はシヴァを呼び出されかねないと分かっていながら、なお「忌まわしき存在」と死闘を演じたことを責め立てる。だが次の瞬間、彼はそれを歌物語にするしかない戦いだと称え、あなたの生死を待つしかなかった時間がどれほどの責め苦だったかを吐露する。深く息をつき、今はあなたがここにいる、それが何より大事だと言い直し、エメリックがあなたとアルフィノに内密の話をしたがっているとして、奥の部屋へ案内すると告げる。</p><p>非公開の会談で、エメリックはイシュガルド聖座を代表して深甚なる謝意を示し、イシュガルドはこれまで蛮神と対峙したことがなく、神殿騎士団が務まるのか危ぶむ声もあったと言う。だが今や、暁が介入しなければ多くの犠牲が出ていたと断言できる、と。アルフィノは先制的に動くべき理由は自明だと述べ、ナタランへの対応について提案を改めて促す。エメリックは、かつては自衛以外の軍事行動を控える方針だったこと、それは当時として不合理ではなかったことを認めつつも、この前例なき危機とその解決が、方針転換を促すかもしれないと言う。死と隣り合わせの経験ほど、人の見方を変えるものはない――そう結ぶ。</p><p>話は取り決めと信頼へ移る。エメリックは可能な限り暁へ補償すると言い、アルフィノは受けられる支援には感謝すると応じる。エメリックが以前の要請を取り下げると言うと、アルフィノは不要だとして、あなた方もドラヴァニアの動きを注視する利害があると述べる。アルフィノが、イシュガルドは隣国を助ける気質ではないが利のために運用はする、と踏み込むと、騎士が言葉を選べと牽制する――しかしエメリックは、レヴナンツトールの繁栄が南方の敵への障害となる以上、それは相互利益であり必要から生まれた関係だと認める。続けて彼は副官ルキアを紹介し、物資輸送に何かあれば直ちに伝えるようにと告げ、オルシュファンには調査報告と商人の取り調べ記録を渡すよう促す。最後に、イシュガルドは多くの顔を持つが、ガレマール帝国の友ではない――そう言い添える。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ムーンブリダ <small class="muted">（クルザス中央高地, X:3.3, Y:21.2）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-instruments-of-our-deliverance.html">氷神シヴァの輝き</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="eyes-unclouded.html">蛮族と呼ばれる者</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'銀白的女神殿騎士',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Moenbryda 說，你的經歷要怎麼理解、代表什麼意義，站在這種刺骨的寒風裡反覆想也不會有答案；先回 Rising Stones 再說，她會去通知大家到那裡集合。不過在那之前，你最好先去 Whitebrim Front 找 Alphinaud——他大概擔心得要命；又或者，正忙著跟 Ishgardians 周旋。無論是哪一種，她都確定他看到你安然無恙一定會很高興。她臨走前又問你一次身體狀況：有沒有頭痛、視線有沒有模糊；你否認後，她只說很快再見，便先一步離開。</p><p>你回到 Whitebrim Front，被提醒任務完成後按慣例要向上級報到。Aymeric 見到你，說你能站在這裡就是任務成功的證明，並讚頌 Halone 的庇佑。Drillemont 也迎接你回來，坦白說他還記得你第一次走進這裡的樣子，卻從未想過自己有一天會如此慶幸你能平安歸來；他把你當成朋友般地說出「歡迎回來」。</p><p>Alphinaud 看到你毫髮無傷，先是鬆了一口氣，說光之戰士會成功本就不該有任何懷疑，甚至表示他很想聽你說說這場勝利——直到他得知，你們終究還是來不及阻止召喚。Aymeric 接過話，說雖然沒能阻止召喚，但至少阻止了更多人喪命，這樣的結果值得慶賀，也應該感謝你；他補充，Shiva 已不再是威脅，異端者也被擊潰。至於 Iceheart 逃走一事，他說她不可能永遠躲下去，無論要花幾天、幾週、幾個月，甚至幾年，他的騎士都會把她找出來。他也確認，你們追回的物資——除了那批水晶之外——已按他的指示整理妥當，將由騎士護送到 Revenant’s Toll。接著他請你盡早陪他到 Camp Dragonhead 一趟，並強調不是為了他自己：有位「某位領主」在得知你打算冒著性命危險阻止 Iceheart 後極度不安，據說得出動半打騎士才攔得住；他說人會用各種方式宣洩焦慮，要你別因此看輕對方。</p><p>到了 Camp Dragonhead，Haurchefant 一見到你就忍不住質問你在想什麼：竟把自己的存在押在一個尚未證實的推論上，只為闖進 Iceheart 的巢穴——明明她可能早有預警，照樣完成召喚儀式；而你竟還和那個「怪物」正面交戰。他用激動的語氣說那是足以寫進歌謠的戰鬥，甚至惋惜自己沒能在你身旁並肩作戰；但緊接著，他也坦白自己只能等待、只能揣測你的生死，那種折磨他連對最痛恨的敵人都不願加諸。深呼吸之後，他說你人還在，這才是真正重要的事；然後他告訴你，Aymeric 想私下和你與 Alphinaud 談談，正在裡面等你們。</p><p>在那場私下的會面裡，Aymeric 代表 Ishgard 聖座向你表達最深的感謝。他說 Ishgard 從未被迫面對 primal，甚至有人擔心神殿騎士團未必能勝任；但依你們對這些存在的了解，他能肯定：若 Scions 沒有介入，Ishgard 會付出慘重傷亡。Alphinaud 趁勢表示，「先發制人」的必要應該已經不言自明，並試探 Aymeric 是否願意重新考慮他先前提出、要 Ishgard 對 Natalan 採取行動的提案。Aymeric 回答，過去聖座的方針是先觀望，只在自衛時動武——以當時情勢來說並非不合理；但這場前所未有的危機與你們成功解決它，或許會促使政策出現轉向。他也說，曾與 primals 交手的人很清楚它們的威脅，Ishgard 直到如今才真正理解；而一次與死亡擦肩，往往足以改變人的看法。</p><p>談話接著轉向「安排」與「信任」。Aymeric 表示會在可能範圍內補償 Scions 的付出，Alphinaud 則說任何援助都值得感激。Aymeric 提出撤回他先前的請求，認為你們的人應該被用在更需要的地方；但 Alphinaud 拒絕，說你們同樣有理由關注 Dravania 的動向。當 Alphinaud 直言 Ishgard 向來不會主動援助鄰邦、卻不妨礙它透過運作讓鄰邦服務於自身利益時，旁邊的騎士立刻警告他說話要慎重；Aymeric 卻承認他的判斷沒有錯，並說這是一種互利、出於必要的安排——因為龍族日益躁動，異端者也幾乎不間斷地襲擾 Ishgard。Aymeric 隨後介紹 Lucia 作為他的副官與代言人，交代若物資輸送有任何狀況就立刻通知她，並請 Haurchefant 交出調查結果與你們扣下商人的審訊紀錄。最後他說，Ishgard 也許有許多立場，但絕不是 Garlemald 的朋友。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="eyes-unclouded.html">雲開霧散</a></div></div>`
  }
};

  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
