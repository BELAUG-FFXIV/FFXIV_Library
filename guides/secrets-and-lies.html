  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;
  overflow-y:auto;
  padding-right:8px;
  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    /* 展開/收合 */
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>

<script>

const i18n = {
  EN:{
    langLabel:'English',

    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>In bustling Horizon, Fufulupa greets you with a formal salute, his expression as earnest as ever but tinged with a new gravity. Now serving as acting captain of the Brass Blades of the Rose, he admits he has a personal favor to ask. In order to learn just how deep the former captain Baldewyn’s corruption ran, the unit has been combing through the man’s private correspondence, and in the course of that investigation they uncovered a sealed letter addressed to someone named Owyne. The name alone leaves Fufulupa deeply unsettled—Owyne is no mere soldier, but one of the elite sworn to guard the sultana, and Fufulupa can think of no reason such a man should ever have dealings with Baldewyn. If the former captain was truly consorting with a coalition of criminals, could this mean that Owyne was involved as well? The possibility is too dire to ignore, yet the letter itself may be crucial evidence of collusion, and Fufulupa dares not break the seal. In these troubled days he has not known whom he can trust with this discovery…until now. With both anxiety and trust in his eyes, he places the letter in your hands, asking you to bear it to Momodi at the Quicksand and explain the circumstances under which it was found. Not only is she a staunch supporter of the sultana, he says, but she knows the royal guard well and will know how best to proceed.</p>
      <p>You travel back to Ul’dah, slipping once more into the familiar clamor of the Steps of Nald and the warm, noisy confines of the Quicksand. Momodi greets you with her usual rough-edged affection, saying it has been too long and that Dadanen tells her you have been keeping yourself busy in Horizon. She wants you to know how grateful she is for everything you have done for the people of Ul’dah—that even after seeing the city’s uglier side, you have kept helping those around you, and the folk here love you for it. Noting the troubled look on your face, she falls quiet and bids you speak your mind, and you place the sealed letter on the counter and recount Fufulupa’s suspicions. Once she hears that he fears Owyne might somehow have been in league with Baldewyn, she frowns and says he needn’t worry—Owyne is as loyal a member of the sultana’s guard as she has ever known. She admits she cannot read what is written within, but as she turns the letter over in her hands, some half-forgotten memory stirs. Wasn’t Owyne the one who…? The thought trails off, and a chill runs through her. A growing sense of dread settles in as she realizes what this could mean. Lowering her voice, she tells you she thinks she understands what is going on, but before she says more, she needs you to swear to keep it quiet. If you would rather walk away, she will not hold it against you—but if you are set on seeing this business through to the bitter end, all you need do is say the word, and she will tell you everything she knows.</p>
    </div>

    pageTitle:'落日の銀冑団',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ホライズンの雑踏の中で、銅刃団ローズ連隊のフフルパは、かつてと変わらぬ真面目さで敬礼しながらも、どこか重たい面持ちであなたに声をかける。今は自らが「代理隊長」として部隊を預かっており、その立場からどうしても頼みたい「個人的な願い」があるのだと切り出す。彼らは、前任隊長バルドウィンがどこまで悪事に手を染めていたのかを明らかにするため、私的な書簡まで洗いざらい調べていたのだが、その中から一通の封書が見つかったのだという。宛名に記されていたのは、「オワイン」という男の名──ウルダハ王家に仕える精鋭近衛のひとりであり、とてもではないが、バルドウィンと関わりがあるとは思えぬ人物だった。前任隊長が犯罪者たちの一派と通じていたことは、今や疑いようもない事実だ。だとすれば、この近衛騎士もまた、闇に繋がっていたというのか──フフルパは、その可能性に怯えつつも目を背けることができないでいた。この封書は、両者の癒着を示す決定的な証拠となるやもしれず、自分の判断で開封するわけにはいかない。だが、誰にこの情報を託すべきかと思い悩むばかりで、信じて打ち明けられる相手などいなかった……つい先ほどまでは。数々の出来事を共に乗り越えてきた結果、彼はついに決心し、あなたこそがふさわしいと告げる。フフルパは固く封じられた手紙をあなたに託し、その発見の経緯を添えて、ウルダハの酒場兼冒険者ギルド「クイックサンド」のモモディに届けてほしいと願い出る。彼女はスルタン女王に心から忠誠を誓う人物であり、王家の近衛たちとも旧知の仲だ。必ずや、この先どう動くべきかを見定めてくれるはずだと。</p>
      <p>あなたはホライズンを後にし、再びウルダハのナル大門通りへと戻る。人々が行き交う喧騒を縫うようにして「クイックサンド」へ足を踏み入れると、モモディがいつもの調子で「久しぶりじゃないかい」と笑顔を向ける。ダダネンの話では、ホライズンでずいぶん忙しくしていたそうじゃないか、そう言って、これまでウルダハの人々のために尽くしてきたことへの感謝を、改めてきっぱりと言葉にしてくれる。街の汚れた一面を見てなお、人のために動き続けるあんたの姿を、皆がどれほど誇りに思っているか──その気持ちを伝えようとしたところで、彼女はふと、あなたの浮かない表情に気づいて口をつぐみ、「何か言いたいことがあるんだろう？」と促す。あなたが封書をカウンターに置き、フフルパの疑念と発見の経緯を語ると、モモディは眉をひそめる。オワインがバルドウィンと手を組んでいたかもしれない──そんな話を聞いても、彼女は「あの男がそんな真似をするはずがない」と即座に否定し、これまで知るかぎり最も忠実な近衛のひとりだと断言する。中身を読み取ることはできないが、それでも手紙を手に取り、裏表をなぞるうちに、彼女の顔色がわずかに変わる。「そういえば、オワインって……」と呟いたまま言葉が途切れ、胸の奥に嫌な予感がじわりと広がっていくのが、自分でもはっきりわかる。やがてモモディは声を落として、だいたいの事情に心当たりがあるかもしれないと打ち明けるが、その前に一つだけ条件を突きつける。この話は決して外に漏らさないと約束してほしい、と。もしここで手を引きたいなら、彼女は責めるつもりはない。だが、それでも最後までこの件に関わる覚悟があるのなら──そのときは、あなたにすべてを話そう、と真剣な眼差しで告げるのだった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> フフルパ　<small class="muted">西ザナラーン (X:22.6, Y:17.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="oh-captain-my-captain.html">正義を銅の刃に宿し</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 14～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="duty-honor-country.html">至宝の影で蠢く闇</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'落日下的銀冑團',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Horizon 的喧鬧中，Brass Blades of the Rose 的成員 Fufulupa 挺直身子向你敬禮，神情一如往常認真，卻多了幾分沉重。他如今暫時擔任代理隊長，正因為如此，有一件「私人請求」必須拜託你。他說，為了查清前任隊長 Baldewyn 貪腐的全貌，這段時間他們把對方留下的私人信件全都翻了個遍，結果在其中發現了一封仍未拆封的信，收信人是名叫 Owyne 的男人。這個名字讓他極度不安——那不是普通士兵，而是隸屬王室護衛精銳的一員，照理說不應該和 Baldewyn 有任何往來。既然如今已經證實，前任隊長確實與某些犯罪集團勾結，那麼這封寫給 Owyne 的信，會不會也是那個黑幕的一部分？這個可能性他不敢忽視，但同時也不敢隨手拆開，因為這封信很可能成為日後釐清真相的重要證據。更棘手的是，這段期間他完全不知道可以把這件事交給誰處理——直到現在。經過這一連串風波之後，他終於下定決心，把信交到你手上，請你帶著這封封緘完好的信，前往 Ul’dah 的酒館兼冒險者公會 The Quicksand，向 Momodi 說明完整的發現經過。她不但是堅定支持 sultana 的一方，也是與 Sultansworn 相當熟悉的人物，一定比他更清楚該怎麼處理這件事。</p>
      <p>你告別 Horizon，穿過熙攘的街道，回到 Ul’dah 的 Steps of Nald，推開 The Quicksand 的大門，再次踏入這間總是熱鬧得有些吵鬧的酒館。Momodi 一看見你便笑著招呼，說好久不見，還提起 Dadanen 告訴她，你最近在 Horizon 一直忙得腳不沾地。她認真地表示，自己非常感謝你替 Ul’dah 的人們做的一切——即使已經看見這座城市比較骯髒的一面，你仍然選擇幫助身邊的人，這一點在這一帶的居民眼中極為難得。說到一半，她察覺你臉上的凝重神色，於是收起玩笑，示意你把心中的話說出來。你將那封由 Fufulupa 託付的信放在吧檯上，將他的懷疑與信件被發現的過程一一說明。聽說他甚至懷疑 Owyne 可能與 Baldewyn 同流合污時，Momodi 先是蹙眉，直說那孩子多心了——在她的印象裡，Owyne 是她所見過最忠實可靠的 Sultansworn 之一。她承認自己看不懂信上的內容，但當她反覆端詳那封信時，腦海深處忽然浮現某個不太好的聯想。「等等，Owyne 該不會就是那時候……」話說到一半便斷掉，一股不祥的預感慢慢沿著背脊爬上來。她沉默片刻，最後壓低聲音告訴你，自己大概知道這封信在暗示什麼，不過在她說出來之前，必須要你先答應替這個祕密守口如瓶。如果你現在就想抽身，她絕不會怪你；但若你已經做好覺悟，想把這件事徹底追查到底，只要點頭，她就會把自己所知道的一切，全都告訴你。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 弗弗魯帕　<small class="muted"> 西薩納蘭 (X:22.6, Y:17.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="oh-captain-my-captain.html">銅刃之中的正義</a></div>
      <div class="row">所有職業（不含限定職） 等級 14 以上</div>

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
