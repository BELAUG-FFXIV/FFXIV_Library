    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Haurchefant brings you news from the capital: Ishgard has endured another assault, and several wyverns even broke into the city itself before the Temple Knights slew them. The incident has forced stricter guard orders and a constant state of alert, and he cannot help but feel the loss of those who once stood watch at the Gates of Judgement. Still, he urges you not to dwell on misfortune—Ser Aymeric has returned safely from Ul’dah and has resumed leading Ishgard’s defense.</p><p>He admits that nothing more can be done about your asylum until the threat to the nation lessens, but he refuses to let you despair. He offers you shelter for as long as you wish, half-jesting that this manor might as well be a new headquarters—“Falling Snows,” or something of the sort. Then his tone turns firm: House Fortemps will give no aid to anyone who comes searching for you. Ishgard’s reputation for inhospitality will serve you well; agents from Ul’dah will have every inquiry dismissed and every request for entry refused until their masters acknowledge your innocence. You once fought to preserve the honor of someone dear to him, and he is grateful to repay that debt in kind.</p><p>With that, he bids you join your companions. The day is bitterly cold, and he suspects there are those inside who would welcome the warmth your presence brings. He reminds you that the intercessory awaits, and urges you not to keep them in suspense.</p><p>Within the intercessory, Tataru can scarcely believe her eyes when you arrive with Alphinaud. Relief breaks into tears as she confesses she tried to contact Minfilia and the others, but no one would answer—and then the Crystal Braves turned on you in the marketplace. F’lhaminn ordered her to run, and she fled until her lungs burned and her feet ached, only to lose her way. Yugiri explains that she had already noticed suspicious behavior among the Braves; in the struggle she lost her mask, and it was she who found Tataru and brought her to safety.</p><p>Tataru tells you what followed: the two of them traveled to Vesper Bay and met Urianger, and when they explained what had happened, he used his magicks to weave a glamour over the Waking Sands so that, from outside, your old headquarters now appears to be an abandoned storehouse. She adds that he made the preparations quickly—and that he had begun planning after the imperial attack, in case the Empire ever came again. They waited there, hoping others would return, but none did. Yugiri says her people are searching even now, though without success; she warns that the Rising Stones did not share the Waking Sands’ good fortune—only Crystal Braves await you there. Even so, she insists there is still cause to hope: if you and Alphinaud escaped, it is not impossible the others did as well, and the people of Doma will continue searching until the Scions are restored to honor.</p><p>Alphinaud’s composure finally gives way. He says it is all his doing—his arrogance in believing he alone understood Eorzea’s woes, the certainty with which he gave commands and influenced governments, and the way he treated the Crystal Braves, even the Scions themselves, as pawns in a grand design to save the realm. Only now, with so much lost, does he see how he fed his own vanity. Haurchefant challenges him not to remain a broken blade, asking if there is no flame hot enough to reforge him, and reminds him of the companions still standing at his side. Tataru adds her own resolve: if this place cannot serve, then you will go to Ishgard, and as long as you stand fast against despair, the beacon of hope will not be lost. Alphinaud accepts their words, says Eorzea still has guardians, and vows that you will resume your journey together—one step at a time.</p><p>Elsewhere, in Ul’dah, unseen voices speak in the tongue of the Ascians. One declares that Nabriales is no more; another answers that the Ardor was never his to invoke, and that his end was of his own making—yet it is troubling that something meant to be eternal has been extinguished. They agree that greater haste may be warranted, and turn their attention northward, speaking of fertile earth and well-sown seeds, and of a salvation unlike any the world has known. Urianger answers a summons, demanding to know the Emissary’s intent, and Elidibus says he would speak of fate—yours, his, and the fate of the very star.</p><p>In the north, at the Gates of Judgement, Midgardsormr’s voice reaches you through the Echo, cold with derision. He asks if you think sanctuary lies beyond, then dismisses it as delusion—promising only despair and death, and nothing else. Yet even with that warning hanging in the air, you press onward, journeying north to preserve the dawn’s light, with hope in your hearts and your eyes fixed heavensward. And when the moment allows, Tataru steadies herself and insists that no matter how long it takes, she believes you will find the others—supported by Yugiri’s shinobi, Urianger’s insight, and her own versatility.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>オルシュファンは王都からの知らせを告げる。イシュガルドは再び襲撃を耐え抜いたが、複数のワイバーンが市街へ侵入したという。神殿騎士団は討ち果たしたものの、これを受けて警備はさらに強化され、常時警戒が命じられた。審問の門で守りに就いていた者たちの不在が、いまさらながら胸に迫る――それでも嘆いてばかりはいられない。アインメリクはウルダハから無事に戻り、ふたたび防衛の指揮を執っているのだから、と。</p><p>あなたの亡命の件は、国難がいくぶん収まるまでは進展が望めないと彼は詫びる。だが絶望するな、と続け、望むだけここに身を寄せてよいと告げる。冗談めかして、この屋敷を新たな拠点と呼んでもいい――「降り積もる雪」などと、とも。すぐに彼は声を改め、あなたを探しに来る者にはフォルタン家が一切の助力をしないと断言する。イシュガルドの不愛想な評判が、今は味方になる。ウルダハの手の者の問いは退けられ、立ち入りの願いはすべて拒まれる――彼らの主が、あなたの潔白を認めるその時まで。あなたが彼の大切な友の名誉を守ったのだから、いまこそその恩を返せるのは幸いだ、と。</p><p>そして彼は、仲間たちのもとへ行くよう促す。今日はひどく冷えるが、あなたが来れば温もりを感じる者がいるだろう、と。執務室で待っているから、これ以上胸を騒がせるな、とあなたの背を押す。</p><p>執務室に入ると、タタルはあなたとアルフィノの姿を見て言葉を失い、安堵とともに涙をこぼす。ミンフィリアたちに連絡を取ろうとしても返事がなく、しかも市場ではクリスタルブレイブが自分たちに牙をむいたのだという。フ・ラムインに逃げろと言われ、息が焼けるほど走り、足が痛むほど走ったが、道に迷い――その先で助けたのがユウギリだった。ユウギリは、事前に不審な振る舞いを見ていたこと、争いの最中に仮面を失ったことを淡々と告げる。</p><p>タタルは続けて語る。ユウギリとともにベスパーベイへ向かい、ウリエンジェと合流した。事情を伝えると、ウリエンジェは砂の家に幻影を施し、外からは打ち捨てられた倉庫に見えるようにしたのだという。準備は手早く、帝国の襲撃以後、万一に備えて手を打っていたのだと聞かされる。そこで待ち続けたが、ほかの仲間は現れなかった。ユウギリは、いまも捜索を続けているが成果はないと告げ、石の家には砂の家のような幸運はなく、待っているのはクリスタルブレイブだけだと警告する。それでも希望は捨てない。あなたたちが逃れたのなら、ほかの者たちも逃れた可能性はある。ドマの民は恩を返すため、暁の血盟が再び名誉ある場所に戻るまで探し続ける、と。</p><p>アルフィノはついに自責の言葉を吐き出す。すべては自分のせいだ、と。エオルゼアの苦難を理解しているのは自分だけだと驕り、断言で人を動かし、政府に影響を与え、クリスタルブレイブも暁の血盟さえも、救国の大計の駒として扱った。栄光を急ぐあまり足元を見ず、虚栄を満たしていただけだった――失って初めて真実に気づいたのだ、と。オルシュファンは問いかける。折れた刃のままでよいのか、鍛え直す炎はないのか、と。傍らに立つ仲間の決意が、やがてお前をいつもの切れ味へ戻すだろう、と。タタルも言う。ここが駄目ならイシュガルドへ行けばいい。絶望に屈しなければ希望の灯は見失われない、と。アルフィノはその言葉を受け、エオルゼアにはまだ守護者がいると確かめ、あなたたちは共に旅を再開する――一歩ずつ、と。</p><p>そのころウルダハでは、アシエンの言葉で密談が交わされる。ナプリアレスは滅びた、と告げる声があり、アーダーを振るう資格は彼になく、自滅だったと応じる声が続く。だが本来永遠であるべきものが消された事実は看過できず、より急ぐべきだと結論づける。彼らは北へ目を向け、肥えた大地と蒔かれた種に触れ、世界が知らぬ救済を実らせると語る。呼び出しに応じたウリエンジェが意図を問うと、エリディブスは運命について話したいと言う――あなたと自分、そしてこの星の運命について。</p><p>北方、審問の門で、ミドガルズオルムの声がエコーを介してあなたに届く。向こうに聖域があると思うのか、と嘲り、そこにあるのは迷妄と絶望と死だけで、ほかには何もないと突き放す。それでもあなたたちは歩みを止めない。夜明けの光を守るために北へ進み、希望を胸に、天へ視線を向けて。タタルは言い聞かせるように告げる――どれほど時間がかかっても、必ずほかの仲間を見つけられる。ユウギリの忍び、ウリエンジェの知恵、そして自分の機転があれば、できないことはないのだと。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>Haurchefant 帶來來自首都的消息：Ishgard 又撐過了一波襲擊，甚至有幾隻 wyvern（有翼小型龍種，常作為龍族的飛行戰力）突破防線闖入城內。Temple Knights 雖然成功討伐了那些怪物，但這次侵入仍迫使守備進一步強化，整座城市也被下令進入永久警戒的狀態。他說，你們對 Gates of Judgement 失去守衛一事感受尤深——可再怎麼痛，也不能只顧哀嘆；Ser Aymeric 已從 Ul’dah 平安歸來，並再次領導 Ishgard 的防衛。</p><p>至於你的庇護問題，他坦言在國難尚未減輕前恐怕不會有進展。但他要你別絕望：你並非孤立無援。只要你願意，就能在這裡避風頭多久都行；他甚至半開玩笑地說，這裡也可以算是新據點——「Falling Snows」之類的名字也無妨。接著他收起玩笑，語氣變得堅定：任何前來打聽你下落的人，都不會從 House Fortemps 得到一絲幫助。Ishgard 一向「不太好客」的名聲，這回反而能成為你們的護身符——來自 Ul’dah 的探子會被一概打發，任何入內要求也都會被拒絕，直到他們的主子承認你的清白為止。你曾為了守住他摯友的名譽而戰，如今能以同樣的方式回報這份恩情，他說這是自己的福分。</p><p>他不再多談，請你去見其他同伴。今日寒意刺骨，他卻說屋內一定有人會歡迎你帶來的溫度；而且 intercessory 就在等你，別讓大家再提心吊膽。你隨即被引入室內，接連的場面把你推回那場風暴之後的現實。</p><p>Tataru 看到你和 Alphinaud 的瞬間幾乎不敢相信，情緒一湧上來就哭了出來。她說自己拼命聯絡 Minfilia 等人，卻沒有人回應；更可怕的是——在市集中，Crystal Braves （由 Alphinaud 主導成立的跨城邦「志願兵／準軍事組織」，名義上協助各國維和、對抗帝國與 primal 威脅；實際上也涉及 Ul’dah 的政治與金流滲透，後續引發內部背叛與衝突）竟然對你們翻臉。F’lhaminn 叫她快逃，她就一路狂奔到肺都發燙、腳都痛到發麻，最後迷了路。Yugiri 接過話，說她早先就注意到部分 Braves 行跡可疑；混亂中她的面具也遺失了，而正是她在那之後找到 Tataru，把她帶離險境。</p><p>Tataru 迫不及待把後續說完：她和 Yugiri 一起前往 Vesper Bay，與 Urianger 會合。把事情經過告訴他後，Urianger 立刻施法為 Waking Sands 編織幻影，讓外人看起來，那裡如今只是一座被遺棄的倉庫。她還說這一切做得很快——原來 Urianger 在帝國襲擊之後就開始準備，以防帝國再度來犯。可即使如此，他們在 Waking Sands 等了又等，也沒有其他人現身。Yugiri 說她的人仍在搜尋其他 Scions of the Seventh Dawn，至今仍未有成果；她也提醒你，Rising Stones 並沒有像 Waking Sands 那樣走運——那裡等著你的只有 Crystal Braves。儘管如此，她仍要你抓住希望：既然你與 Alphinaud 都逃了出來，就不能斷言其他人也無路可逃；Doma 的人會把這視為償還恩義的機會，繼續搜尋，直到讓 Scions of the Seventh Dawn 回到應有的榮譽位置。</p><p>Alphinaud 終於把壓著的話說出口。他說這一切都是自己的錯——他以為只有自己真正理解 Eorzea 的苦難，於是用那份自信下命令、左右政局，把 Crystal Braves、甚至連 Scions of the Seventh Dawn 都當作自己「拯救世界」計畫裡的棋子。他承認自己只顧往想像中的榮光衝去，卻沒看清腳下踩的是什麼；到如今失去太多，他才明白那不過是在餵養自己的虛榮。Haurchefant 直接問他：難道就甘願當一把折斷的刀？世上難道沒有能把你重新鍛成利刃的火焰？他提醒 Alphinaud——你們這些仍站在身旁的同伴，就是那股火。Tataru 也鼓起勇氣說：若這裡無法成為依靠，那你們就去 Ishgard；只要你們不向絕望低頭，希望的燈塔就不會消失。Alphinaud 接下這些話，說 Eorzea 仍有守護者，而你們不能把過去的一切成果都丟進自怨自艾裡；於是他請你們一起重新上路——一步一步地走下去。</p><p>同一時刻，在 Ul’dah 的陰影之中，有人以 Ascians 的語言低聲交談。有人說 Nabriales 已不復存在；另一人冷冷回應，Ardor 本就不是他有資格召喚之物，他的覆滅是自取其禍——可即便如此，仍令人不安，因為你們竟「熄滅」了本該永恆不滅的存在。兩人很快達成共識：或許必須加快腳步。他們把目光投向北方，談到肥沃的土地與早已播下的種子，並宣稱將在自己的意志下收割一種世界從未見過的「救贖」。Urianger 回應了那份召喚，要求對方表明意圖；Elidibus 則說，他想談的是命運——你的命運、他的命運，以及這顆星球本身的命運。</p><p>而在更北的 Gates of Judgement，Midgardsormr 的聲音透過 Echo 抵達你耳中，帶著冷笑與蔑視。他問你是否以為前方就是避難所，隨即否定那份期待：那只是迷妄；前方只有絕望與死亡，再無其他。即便如此，你仍向北前行——為了守住黎明之光，帶著希望，把目光投向天際。當一切稍微能喘息時，Tataru 也再次振作起來，說不管要花多久，她都相信你們一定找得到其他人；有 Yugiri 的忍者、Urianger 的智慧，再加上她自己的多才多用，就沒有做不到的事。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 奧爾什方 <small class="muted"> 庫爾札斯中央高地（X:26.7, Y:17.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-parting-glass.html">漫長的慶功會</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="coming-to-ishgard.html">前往伊修加爾德</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
