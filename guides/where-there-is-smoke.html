    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }

const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Where There Is Smoke',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>When you return to Highbridge, Hihibaru can barely contain himself. This time, he swears, it isn’t rumor or whisper—he has “honest-to-gods” information, and he’s confident because he saw the masked man with his own eyes. He tells you how he went out for an evening stroll, minding his own business, and noticed a column of smoke rising from the cliffs at Thal’s Respite. Curiosity drew him closer, and there—by a fire—stood a masked figure that matched the one you’ve been hunting.</p>
      <p>As if the night itself were answering the sighting, Qiqirn appeared soon after and gathered with the man. They spoke at length, but Hihibaru was too far away to catch more than the fact that there was a conversation—deliberate, unhurried, and apparently expected. When the group finally dispersed, Hihibaru lingered long enough for an idea to take root: if you were to use a smoldering coal from that fire to start your own, you might be able to draw out the same kind of meeting again. He doesn’t pretend it’s safe—he calls it dangerous outright—yet he also can’t resist slipping into practical encouragement. You’ve already proven yourself more than a match for a pack of rats, he says, and he thrusts the coal toward you like a merchant offering the first real product that might matter. After all the time you’ve spent listening and waiting, he insists, this is finally something solid—worth it, wouldn’t you agree?</p>
      <p>You take the coal and head out into Wellwick Wood, following the lead into the uneasy quiet. The moment you step into the area, your senses tighten—you can feel it: a hostile presence is near. Whatever meeting Hihibaru witnessed, whatever arrangement brought a masked man and Qiqirn together by firelight, it has left the air primed for trouble.</p>
      <p>When you return to Highbridge not long after, Hihibaru’s bravado falters into anxious anticipation. He asks whether you found any clue leading to your masked man—then freezes when he sees what you carry back. A scroll. And on it, a prayer to Rhalgr, the Destroyer. Hihibaru doesn’t need long to explain what that means: Rhalgr is the guardian deity of Ala Mhigo, and Ala Mhigo is currently under Garlean rule. Outside that land, reverence for Rhalgr is uncommon enough that Hihibaru would wager his last gil on what it implies—your assailant was Ala Mhigan.</p>
      <p>The conclusion lands with uncomfortable weight. If the masked man can pull Qiqirn into secret meetings and bring Ala Mhigan agents into the same shadowed web, then he is far more connected than a single robed stranger has any right to be. Hihibaru even admits, with a merchant’s envy, that such a diverse network is impressive—then immediately undercuts his own admiration with a nervous confession. The same merchant instinct that loves opportunity now “senses danger ahead… and darkness besides.” He tries, half-joking and half-pleading, to convince you to take things slow and safe here at Highbridge. But the trail has already started to move, and the unknown you’re pursuing has begun to show its shape.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Hihibaru <small class="muted">Eastern Thanalan (X:20.2, Y:21.3)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="highbridge-times.html">Highbridge Times</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 25 or above)</div>

    followq:`<div class="stack">
      <div class="row"><a class="link" href="on-to-little-ala-mhigo.html">On to Little Ala Mhigo</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'陽動の狼煙',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ハイブリッジへ戻ると、ヒヒバルは興奮を抑えきれない様子で駆け寄ってくる。今度こそ本当だ、噂ではない、と彼は言い張る。なぜ確信できるのか――自分の目で見たからだ。彼は夕暮れの散歩中、タールの安息所の崖のほうから煙が立ちのぼるのに気づき、好奇心に負けて近づいたという。すると焚き火のそばに、あなたが探す仮面の男が立っていた。間違いない、と。</p>
      <p>そして、まるでその場に呼応するようにして、ほどなくキキルンが現れた。仮面の男とキキルンたちは集まり、長々と話し込んだが、ヒヒバルは距離がありすぎて内容までは聞き取れなかった。それでも、彼の頭には商人らしい発想が芽生える。もしあの火のくすぶる熾火を使ってあなたが火を起こせば、同じような集まりをもう一度引き寄せられるかもしれない――危険なのは間違いないが、あなたならネズミの群れ程度には負けないだろう、と彼は言い、あなたに熾火を託す。散々ここで粘った甲斐があっただろう、と得意げに言い添えながら。</p>
      <p>あなたは熾火を手に、ウェルウィックウッドへ向かう。足を踏み入れた途端、肌が粟立つような気配に気づく――敵意が近い。ヒヒバルが目撃した集まりは、ただの偶然ではない。火の痕跡が、別の何かを呼び寄せる準備になっているかのようだった。</p>
      <p>ほどなくしてハイブリッジへ戻ると、ヒヒバルは早速、仮面の男に繋がる手がかりが得られたかと尋ねる。だが、あなたが持ち帰った巻物を目にした瞬間、彼は息を呑む。そこには破壊神ラールガーへの祈りが記されていた。ヒヒバルは、ラールガーがアラミゴの守護神であり、アラミゴはいま帝国の支配下にあることを説明する。しかも他国の者がラールガーを信仰するのは極めて稀だ――だからこそ、彼は断言に近い推測を口にする。襲ってきた者はアラミゴの者に違いない、と。</p>
      <p>仮面の男がキキルンと接触し、さらにアラミゴの関係者まで動かしているのだとしたら、その繋がりは想像以上に広い。ヒヒバルは商人として、そんな多様な人脈に思わず羨望すら覚えると漏らすが、すぐに表情を曇らせる。商人の勘が、前方に危険と闇を感じ取っているのだという。彼は冗談めかしつつも本気で、ここハイブリッジでゆっくり慎重に進めたほうがいいのではないか、とあなたを引き留めようとする。しかし、あなたが追っているのは未知の影であり、足を止めれば闇はさらに深くなるだけだった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ヒヒバル　<small class="muted">東ザナラーン (X:20.2, Y:21.3)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="highbridge-times.html">橋上の証言</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 25～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="on-to-little-ala-mhigo.html">リトルアラミゴへの旅路</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'佯動的狼煙',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>你回到 Highbridge 時，Hihibaru 幾乎是衝上來的——他說他終於掌握到真正的情報，不是謠言、不是耳語，而是「貨真價實」的目擊。他之所以這麼有把握，是因為他親眼看見了 masked man。那天傍晚，他只是出去散步、管自己的事，卻看到 Thal’s Respite 的峭壁方向升起一道煙柱；好奇心把他引了過去，結果他在火堆旁看見一個戴著面具的人影——他毫不懷疑，那就是你一直在追的那個人。</p>
      <p>更讓他在意的是，沒過多久，Qiqirn 也出現了，像是早就約好似的聚到那名男子身邊。兩邊談了很久，但 Hihibaru 離得太遠，聽不清內容，只能確定那不是偶然的擦肩，而是一場有目的的會面。等人散去後，他腦中冒出一個念頭：如果你用那堆火裡的 smoldering coal 重新生火，也許就能把同樣的會面「再引一次」出來。Hihibaru 不否認這很危險，但他也用帶著討好與自信的語氣推你往前——你已經證明自己能對付一群「老鼠」，他說，於是把那顆煤炭交到你手裡，像是終於交出一件真正能派上用場的貨。你在 Highbridge 忍耐著打聽與等待，現在總算值得了——他甚至用這種語氣替自己先前的態度找回底氣。</p>
      <p>你帶著那顆 smoldering coal 走進 Wellwick Wood，沿著線索往前。才剛踏入不久，你的感覺就緊繃起來——你清楚察覺到一股敵意正在附近徘徊。這條路不是單純的「去看看」，而像是有人正等著你踏進去，等著火光把下一步引燃。</p>
      <p>你很快又回到 Highbridge，Hihibaru 一見你就急忙問你是否找到通往 masked man 的線索，卻在看到你帶回來的 scroll 時瞬間倒抽一口氣。那卷軸上寫著對 Rhalgr, the Destroyer 的祈禱文。Hihibaru 立刻解釋：Rhalgr 是 Ala Mhigo 的守護神，而 Ala Mhigo 目前正處於 Garlean 的統治之下；更重要的是，其他國家的人很少會去信奉祂。也因此，他幾乎不假思索就下了賭注——那個襲擊你的人，八成是 Ala Mhigan。</p>
      <p>這個推論讓整件事變得更沉重：masked man 不只是和 Qiqirn 會面，甚至還能牽動 Ala Mhigan 的人手，像是在暗處編織一張更大的網。Hihibaru 以商人的本能忍不住羨慕那樣廣泛的「人脈」，但同一個本能也讓他感到不安——他說自己嗅到了前方的危險，甚至是黑暗。於是他半開玩笑、半認真地勸你別衝得太快，乾脆留在 Highbridge 放慢腳步、走得保守一點；然而你心裡明白，未知已經開始露出輪廓，而你不可能再當作什麼都沒看見。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 希希巴魯　<small class="muted"> 東薩納蘭 (X:20.2, Y:21.3)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="highbridge-times.html">橋上的證言</a></div>
      <div class="row">所有職業（不含限定職） 等級 25 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="on-to-little-ala-mhigo.html">向小阿拉米格出發</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
