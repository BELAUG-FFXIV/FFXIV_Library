const i18n = {

    pageTitle:`Into the Heart of the Whorl`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Merlwyb reins in the urge to rush headlong into battle. However dire your plight, she insists that action without thought will only end in ruin. So long as Leviathan remains on the open sea, he is effectively beyond your reach—your fleet may be second to none, yet even Llymlaen would struggle to best him in his own element. In a straight fight, he would turn your ships into little more than meat and matchwood. You are to return to Limsa Lominsa and meet her in the command room to find another way.</p><p>At Bulwark Hall, Zanthael wastes no time: you are expected—do not keep the Admiral waiting. When you arrive in the command room, the mood is heavy with calculation and dread. Y’shtola warns that facing the Lord of the Whorl in his watery domain is far from ideal, yet he will not come to you; Yugiri admits she cannot put words to what she felt when she saw Leviathan rise from the depths. Thancred, ever casual, points out that you surely noticed his dagger work back at Sapsa. Eynzahr Slafyrsyn lays out the stakes with grim clarity: if Leviathan is allowed to unleash a tidal wave, nothing within ten malms of the coast will be safe—least of all Limsa. Minfilia turns over one chilling detail: the Sahagin elder claimed to be “eternal,” and yet Leviathan consumed him without pause.</p><p>Merlwyb then anchors the fear in memory. There once was a hamlet beyond South Tidegate in western La Noscea—Halfstone. Years before the Maelstrom was founded, Leviathan rose and set about unleashing watery hell, only to be put down by the Company of Heroes before the damage could spread. But when he returned after the Calamity, fortune failed you: weary of ravaging the shoreline, he summoned a tidal wave that leveled Halfstone and washed the soil away for good measure. Y’shtola adds that the area was subsequently occupied by the Sahagin—who transformed it into a spawning ground for their brood. With the vast quantity of crystals stolen to feed Leviathan and his legion of thralls, Merlwyb concludes that the primal is stronger now than in his previous incarnations, and what befell Halfstone could just as easily befall a larger settlement—even Limsa. That cannot happen. Leviathan must be stopped.</p><p>Thancred answers what all of you are thinking: stopping him has always been the objective, but how? The sea is Leviathan’s uncontested domain—your warships could not close within a hundred yalms, and their cannons could not pierce his defenses. Merlwyb, having read the reports, snarls that her warships were as good as pleasure barges, and curses the helplessness of it. Y’shtola notes that while the Company of Heroes once lured Leviathan into an inlet, you must contend with him on the open sea; past experience offers little comfort.</p><p>Eynzahr asks leave to speak, and Merlwyb grants it. Leviathan’s most formidable weapon, he argues, is the sea itself—waves and whirlpools, tides and currents. Victory, he believes, lies in disarming him: if you cannot lure him from the sea, then weaken his hold upon water. He has heard of devices that draw upon corrupted crystals and can achieve such wonders; mounted upon a ship, such a device could prevent Leviathan from bringing the full force of the sea to bear, leaving him no more dangerous than any other sea serpent. Minfilia recalls that Cid built a similar device to grant the Enterprise safe passage through Garuda’s tempest; Eynzahr credits an old arcanist friend, but Merlwyb cares only that it works. She orders him to obtain the specifications so she can pass them to Naldiq & Vymelli’s—then voices the concern she cannot ignore: suppressing Leviathan’s attacks will likely require a veritable mountain of corrupted crystals. Do you have a ship that can bear such a burden?</p><p>Eynzahr answers with a pirate’s lesson: perhaps not one ship—but two. Mistbeard once lashed vessels together, side by side, to bear the weight of his plunder; you could repeat the trick faster than building anew. Yet the plan demands more than construction: the device must remain in close and constant proximity, which means lashing your twin vessel to Leviathan—ramming speed, and a towing vessel to overcome the cargo’s weight. Eynzahr volunteers to pilot the towing vessel himself, refusing to ask such danger of another. Merlwyb accepts the risk because there is no better recourse: she orders the Commodore to assemble the soundest remnants of the fleet at Moraby Bay, puts Storm Marshal Slafyrsyn in command, and demands the twin vessel be ready to sail posthaste—while reminding you that, once all is set, the final burden still rests on your shoulders: slay the beast, and safeguard Limsa Lominsa once again.</p><p>Even with crews working triple shifts, the waiting gnaws at everyone. Yugiri confides that beings held as gods exist in the Far East as well; to behold a primal with her own eyes is humbling and horrifying in equal measure, and she begins to understand why the Garleans fear them. Then a Storm Herald arrives with urgent news: according to the Yellowjackets, a man has appeared who claims to have defeated Leviathan. Merlwyb doubts the claim—and even if it were true, she reminds herself that none save the Company of Heroes have bested Leviathan, and you already know how they did it. Still, with Limsa’s survival wagered on two ships, rope, and a pile of crystals, can you afford to ignore even the faintest chance of advantage? With no time to wait for reports, she sends you to the Grey Fleet in lower La Noscea to learn what the supposed primal-slayer knows—adding, in a flash of grim humor, that you have her permission to break his bloody legs if he is lying.</p><p>At the Grey Fleet, you find the “hero” at last: Trachtoum, who works a Storm Private to the bone with errands and chores before launching into a boastful, absurd tale of his “epic victory” over “Leviabeetus.” He embellishes with crude bravado—until he sees you. The performance collapses instantly. Trachtoum babbles apologies, admits he was never part of the Company of Heroes, and confesses he is no marauder at all—only a coward who lied for attention. Yet he insists on one thing: he has seen Leviathan with his own eyes. Years ago, while loafing at the harbor as a baker’s hand, he watched a massive sea serpent offshore as a fleet of galleons charged in, cannons firing; terror took him so completely that he soiled himself then—and, remembering it now, he does so again. The Storm Private’s patience finally snaps, and his anger is loud and justified. Through a linkpearl, Minfilia checks in: no, “Leviabeetus” yields nothing of use—but there is real news. The twin vessel is complete, and everyone awaits you at the Moraby Drydocks.</p><p>At Moraby Drydocks, Merlwyb is blunt about the cost: to build the Whorleater, she had to decommission two perfectly serviceable galleons, and their captains were not pleased—until she offered them the chance to keep their ships and face Leviathan in your stead. Minfilia wishes you had more knowledge before committing to such a gamble, yet takes comfort in the fact that you have faced worse odds and prevailed. Thancred praises the craftsmen of Naldiq & Vymelli’s for achieving the impossible with limited materials; Y’shtola warns that towing the Whorleater will demand exceptional helmsmanship and may be a battle in itself. Yugiri, once doubtful, now sees the elegance of the solution. And Eynzahr—done with all nonsense—presents the finished work: the twin vessel, fitted with a platform for you to maneuver freely, built to bear its prodigious tonnage, and as close to unsinkable as anyone dares to claim. The Whorleater and her crew stand ready. Give the word, and they will bear you to Leviathan.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="lord-of-the-whorl.html">Lord of the Whorl</a></div></div>`

  JP:{
    langLabel:'日本語',
    pageTitle:'リヴァイアサン掃討作戦',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>メルウィブは、焦りのままに動くことを戒める。状況が行動を求めていようとも、考えずに突っ込めば破滅するだけだ。リヴァイアサンが外洋にいるかぎり、こちらの手は届かない。黒渦団の艦隊が比類なき力を誇ろうとも、海の中では勝ち目が薄い――真正面からの戦いでは、艦隊はただ蹂躙されるだけだ。あなたはリムサ・ロミンサへ戻り、提督室で合流して策を練るよう命じられる。</p><p>ブルワーク・ホールではザンテールが告げる。提督室で待っている、提督を待たせるな――。提督室に入ると、空気は重い。ヤ・シュトラは、水の領域でリヴァイアサンと相対するのは最悪に近いが、向こうから来ることはないと嘆く。ユウギリは、深淵から現れた姿を見たときの感情を言葉にできないと言う。サンクレッドは、あなたならサプサでの短剣の扱いにも気づいているだろうと、いつもの調子で話す。エインザル大甲将は、リヴァイアサンが大津波を放てば沿岸から十マルム以内は何も残らず、リムサ・ロミンサすら危ういと断言する。ミンフィリアは、サハギンの長老が「永遠」を名乗ったのに、あっさり呑み込まれた事実の意味を測りかねている。</p><p>メルウィブは過去を語り、恐怖を現実へ引き戻す。かつて西ラノシアのサウス・タイドゲートの先にハーフストーンという集落があった。黒渦団創設以前、リヴァイアサンが海から現れ、災厄を撒き散らそうとしたが、そのときは英雄団が討ち果たし、大事には至らなかった。だが、カラミティの後に再び現れたときは違った。沿岸を荒らすことに飽いたのか、大津波を呼び起こし、ハーフストーンを跡形もなく平らげ、土までも洗い流した。ヤ・シュトラは、その地が後にサハギンに占拠されたと補足する。メルウィブは、連中がそこを孵化場へ変えたと吐き捨て、奪われた膨大なクリスタルの量を思えば、リヴァイアサンは以前より強大になっていると断じる。ハーフストーンの悲劇は、もっと大きな集落――リムサ・ロミンサにすら起こりうる。だからこそ止めねばならない。</p><p>サンクレッドは結論だけを突きつける。止めるのが目的であることは最初から同じだ、だがどうやって――。海はリヴァイアサンの支配領域であり、第三艦隊の軍船は百ヤルム以内に近づけず、砲撃も防御を貫けなかった。報告書を読み終えたメルウィブは、軍船など役に立たぬと苛立ちを露わにし、七つの地獄と悪態をつく。ヤ・シュトラは、英雄団は入り江へ誘い出して勝ったが、今回は外洋で相手をせねばならず、過去の経験はほとんど助けにならないと言う。</p><p>エインザル大甲将が進言を願い、メルウィブは許す。リヴァイアサンの最大の武器は海そのものだ――波、渦潮、潮汐、海流。勝機はそれを封じることにある。二度と海から引き離せないなら、水の力への干渉を弱めるしかない。彼は、汚染されたクリスタルの力を用いる装置の話を知っていると言い、艦に搭載できれば、海の全力をぶつけさせないよう抑え込み、ただの海蛇と同程度にまで危険を落とせるかもしれないと述べる。ミンフィリアは、ガルーダの嵐を越えるためにシドが似た仕組みを作ったことを思い出す。エインザル大甲将は古い算術士の友人から聞いたと断りつつも、メルウィブは誰の発案かはどうでもいい、効くかどうかだと言い切り、仕様を取り寄せてナルディク＆ヴィメリー社へ回すよう命じる。だが同時に、懸念も口にする。リヴァイアサンの攻撃を抑えるには、山のような汚染クリスタルが必要ではないか――それだけの荷を載せられる艦があるのか。</p><p>エインザル大甲将は、一隻で無理なら二隻だと言う。海賊王「霧髭」は、最大の戦利品を運ぶために船を二隻、並べて縛り合わせたという。新造より早い。同時に、条件は苛烈だ。装置は標的に近接し続けねばならず、つまり対リヴァイアサン双胴船でリヴァイアサンに取りつく必要がある。突撃が要るが、荷が重すぎる以上、牽引船の助けが不可欠となる。危険な操船は他人に頼めないと、エインザル大甲将は自ら志願する。メルウィブは最善の手がないことを認め、コモドールにモラビー湾へ艦隊残存戦力の集結を命じ、健全な艦を優先し修理は後回しにせよと指示する。そして作戦指揮をエインザル大甲将に託し、対リヴァイアサン双胴船を至急出航可能に整えろと命じたうえで、最後に残る「討伐」の責務をあなたへ戻す。リムサ・ロミンサの命運は、再びあなたの肩にかかっている。</p><p>人員が三交代で働いても、待つ時間は残酷だ。ユウギリは、東方にも神として崇められる存在の伝承があるが、実際に蛮神を目の当たりにすると、畏怖と恐怖が同時に押し寄せ、帝国が恐れる理由がわかると言う。そこへ黒渦団の伝令が駆け込み、イエロージャケットの報告として「リヴァイアサンを倒した」と名乗る男が現れたと伝える。メルウィブは信用しない。しかし、二隻の艦と縄とクリスタルの山にリムサ・ロミンサの生存を賭けた以上、わずかな可能性すら捨てられないとも思い直す。報告を待つ時間はない。あなたは低地ラノシアのグレイフリートへ赴き、その男が何を知るか確かめるよう命じられる――嘘なら脚を折ってもよい、とまで言い添えて。</p><p>グレイフリートであなたが目にしたのは、英雄どころか滑稽な虚勢だった。トラクトゥームは黒渦団二等甲兵をこき使い、ようやく口を開けば「リヴァイアベータス」を倒した武勇伝を大げさに語り始める。だがあなたを見た瞬間、その芝居は崩れ落ちる。英雄団の一員でも戦士でもない、注目が欲しくて嘘をついただけの臆病者だと泣き言を並べる一方で、ただ一つ「見たことだけは本当だ」と言い張る。昔、港で怠けていたとき、沖合に巨大な海蛇のような影が現れ、ガレオン船団が砲撃しながら突っ込んでいった――恐怖で失禁したほどだ、と。黒渦団二等甲兵の怒りは爆発する。直後、リンクパール越しにミンフィリアが連絡してくる。「リヴァイアベータス」は役に立たないが、対リヴァイアサン双胴船は完成した。モラビー造船廠で合流せよ、と。</p><p>モラビー造船廠で、メルウィブは代償を隠さない。艦を二隻つなぐために、まだ使えるガレオンを二隻も廃艦にした。艦長たちは憤ったが、「艦を守りたいなら代わりにリヴァイアサンと戦え」と言うと、口をつぐみ「大義のための犠牲だ」と言い換えた。ミンフィリアは、もっと前に知識を得ていればと悔やみつつも、あなたがこれまで不利を覆してきた事実に信を置く。サンクレッドは限られた資材で短期間に仕上げたナルディク＆ヴィメリー社の技量を称え、ヤ・シュトラは牽引そのものが戦いになると警告する。ユウギリもまた、この解決策の美しさを認める。エインザル大甲将は、もう戯言は終わりだと言い、完成した対リヴァイアサン双胴船を示す。戦闘で動ける甲板を備え、膨大な積載に耐え、沈みにくい――運命を試す言い方は避けつつも、準備は整った。合図ひとつで、あなたをリヴァイアサンのもとへ運ぶ。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> メルウィブ <small class="muted">（西ラノシア, X:13.1, Y:13.4）</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="lord-of-the-whorl.html">決戦、リムサ・ロミンサ沖</a></div></div>`

    story:`<div class="clamp" data-collapsed="true"><p>Merlwyb 壓下那股「立刻出手」的衝動，提醒你越是走投無路越要冷靜思考。只要 Leviathan 仍在外海，你們幾乎碰不到他；就算 Maelstrom 的艦隊再強，在海上也難以與他抗衡——硬碰硬只會讓你們被撕成碎木與血肉。她要你先回 Limsa Lominsa，到指揮室會合再想辦法。</p><p>在 Bulwark Hall，Zanthael 直接把話說死：指揮室在等你，別讓提督久候。你踏進指揮室時，空氣像被壓住一樣沉重。Y’shtola 低聲感嘆，在水的領域迎戰 Leviathan 太糟了，可他也不可能主動靠岸；Yugiri 說自己至今仍無法用言語形容那天看見 Leviathan 自深海升起時的感受。Thancred 一如既往地吊兒郎當，說你這麼「眼尖」，肯定早在 Sapsa 就注意到他的短刀手法。Eynzahr Slafyrsyn 把利害攤開：若 Leviathan 放出一場大海嘯，海岸線十 malm 內都不會安全，更別說 Limsa Lominsa。Minfilia 則反覆咀嚼一個不祥細節——Sahagin 的長老自稱「永恆」，卻仍被 Leviathan 乾脆地吞噬殆盡。</p><p>Merlwyb 接著用記憶把恐懼釘在現實上。Western La Noscea 曾有個聚落叫 Halfstone。早在 Maelstrom 成立之前，Leviathan 曾從海中現身、掀起水禍，那一次 Company of Heroes（曾擊退 Titan 與 Leviathan 的知名冒險者團體）在破壞擴大前就把他壓制下去。可在 Calamity 之後，他再度回來時，你們就沒有那麼幸運了——他不再只沿岸肆虐，而是喚出一場大海嘯，把 Halfstone 夷為平地，連土壤都被沖刷得一乾二淨。Y’shtola 補充，那片區域後來被 Sahagin 佔據；Merlwyb 咬牙說那些該死的傢伙把那裡改造成孵育後代的孵育地。再想到大量被偷走、用來餵養 Leviathan 與其爪牙的水晶，Merlwyb 斷言 Leviathan 如今比過去更強——Halfstone 的結局，很可能會落到更大的聚落，甚至 Limsa Lominsa 身上。這絕對不能發生，primal 必須被阻止。</p><p>Thancred 把所有人的疑問說出口：目標一直都是阻止他，但要怎麼做到？大海是 Leviathan 的領域，你們的戰艦連一百 yalm 都靠不近，砲擊也穿不透他的防禦。Merlwyb 讀過報告後怒得發狠，說那些戰艦簡直像是來海上遊樂的；她咒罵著無力感，卻又不得不面對現實。Y’shtola 指出，當年 Company of Heroes 是把 Leviathan 引進海灣才得手，但現在你們只能在外海迎戰，過往經驗幾乎派不上用場。</p><p>Eynzahr Slafyrsyn 請求發言，Merlwyb 准了。他說 Leviathan 最可怕的武器不是利牙，而是整片海——海浪、渦潮、潮汐、海流，全都聽他號令；勝機在於「卸掉他的海」。既然無法再把他誘離海面，那就想辦法削弱他對水元素的掌控。他聽聞有種裝置能借助受污染的水晶的力量做到這件事；若能裝在船上，就可能抑制 Leviathan 讓大海傾壓而來的威力，把他降到只像一條普通海蛇那般可控。Minfilia 立刻想起 Cid 曾打造過類似裝置，讓 Enterprise（Cid 的飛空艇）得以穿越 Garuda 的風暴；Eynzahr Slafyrsyn 說這點子是從一位年長的 arcanist 友人口中得來，但 Merlwyb 不在乎誰先想到——只要能用。她要他把規格弄到手，好交給 Naldiq & Vymelli’s；同時也提出她最擔心的事：要壓制 Leviathan 的攻勢，恐怕得堆起一座受污染的水晶之山。你們有足夠大的船能扛得住嗎？</p><p>Eynzahr Slafyrsyn 說，一艘不行就兩艘。傳說海賊王 Mistbeard（傳說中的 pirate king；相傳曾把兩艘船並排綁在一起以承載巨量戰利品，其事蹟被用作雙艦方案的典故）曾把兩艘船並排綁在一起，才能扛住那次「最大戰利品」的重量——你們可以照做，比造新船快得多。但他也說得很清楚：裝置必須貼著目標、持續運作，等於你們得讓「雙艦合體」的船硬生生貼上 Leviathan；需要以突擊速度衝撞、再纏住他，而那堆貨載的重量又迫使你們必須有拖船協助才拉得動。這種操船危險到他不想交給任何人，於是他自願擔任牽引船的指揮。Merlwyb 沒有更好的選項，只能下令：Commodore，立刻把艦隊殘存戰力在 Moraby Bay 集結，優先調用最健全的船，修理先放一邊；整個作戰由 Storm Marshal Slafyrsyn 統籌，務必讓「對 Leviathan 的雙胴船」盡快出航。而等你們真正貼上 Leviathan 後，最後那一步仍得由你完成——Limsa Lominsa 的命運，再一次落在你肩上。</p><p>即使工匠日夜三班趕工，「等待」仍像鈍刀一樣折磨人。Yugiri 說，在她口中的 Far East 也有被奉為神的存在；過去她不曾真正相信，但如今親眼看見 primal，她同時感到敬畏與恐懼，也開始理解 Garleans 為何如此忌憚。就在此時，Storm Herald 送來急報：Yellowjackets 回報，有個男人自稱擊敗過 Leviathan。Merlwyb 直覺不信；就算是真的，她也知道你們早已明白 Company of Heroes 當年怎麼贏的——那男人能帶來什麼新東西？可她又不得不承認，當你們把 Limsa Lominsa 的存亡押在兩艘船、幾條繩索與一堆水晶上時，任何可能的優勢都不該被丟掉。你不能乾等 Maelstrom 的回報——她要你立刻去 Grey Fleet，去把那個「自稱討伐 primal 的人」的底細挖出來；若他在撒謊，她甚至准你把他的腿打斷。</p><p>在 Grey Fleet，你看到的不是英雄，而是一場鬧劇。Trachtoum 先把一名 Maelstrom 士兵差遣得團團轉，才終於開始吹噓自己如何「擊敗」所謂的 “Leviabeetus（它是那個吹牛仔 Trachtoum 故意亂叫/胡扯出來的稱呼，用來把 Leviathan 搞成一個聽起來更蠢、更粗俗的外號，跟他在 Titan 段落把 Titan 亂叫成 Tidus 是同一種搞笑（也帶點低俗）套路）”，語氣粗鄙又自我陶醉。可當他看見你，整段戲瞬間崩潰——他連聲道歉，承認自己根本不是 Company of Heroes 的一員，也不是什麼勇士，只是貪戀被注目的感覺才胡說八道。他把自己貶得一無是處，但仍死咬著一件事：他確實親眼見過 Leviathan。幾年前他在港口偷懶時，看見海上遠處有巨大海蛇般的身影，船隊迎上去、砲火齊發；那一刻他嚇到失禁，而現在光是回想就又嚇到失控。被他耍得團團轉的 Maelstrom 士兵終於爆發怒火。隨後，Minfilia 透過 linkpearl（聯絡用的魔導通訊器）聯絡你：這場 “Leviabeetus” 的鬧劇沒有任何價值，但真正的進展已經到了——雙胴船完成了，所有人正在 Moraby Drydocks 等你。</p><p>抵達 Moraby Drydocks 後，Merlwyb 毫不掩飾代價：為了打造 Whorleater，她不得不讓兩艘仍堪用的大帆船退役，艦長們當然不滿——直到她反問他們要不要自己留船、換他們去面對 Leviathan，他們才「大義凜然」地閉嘴，說這是為了更大的利益而必須付出的犧牲。Minfilia 嘆息若能早些掌握更多資訊就好了，但也堅定地告訴你：你曾在更糟的逆境中勝出，這一次也會。Thancred 佩服 Naldiq & Vymelli’s 在短時間、有限材料下完成這種工程；Y’shtola 警告，光是把 Whorleater 拖到 Leviathan 面前就需要極高的操船技術，甚至本身就是一場戰鬥。Yugiri 也坦承，直到此刻她才看見這個方案的精妙。Eynzahr Slafyrsyn 則收起玩笑，指著成品說：時候到了——這艘雙胴船已加裝可供你們在戰鬥中自由行動的平台，能承載驚人的重量，他不敢挑釁命運說「絕不會沉」，但也直言它已近乎不沉。Whorleater 與船員都已就位，只要你一句話，他們就會載你去面對 Leviathan。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 梅爾維布 <small class="muted"> 西拉諾西亞（X:13.1, Y:13.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-gift-of-eternity.html">超越之力與不滅之人</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="lord-of-the-whorl.html">決戰利姆薩·羅敏薩</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
