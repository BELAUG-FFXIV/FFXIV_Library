    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Clive agrees to follow the wandering minstrel’s plan, though the man’s metaphors still leave him more uneasy than reassured. Even so, if this path can bring him closer to the truth, he is willing to endure it. At Apkallu Falls, the minstrel finally explains his reasoning. This is the place where Louisoix once gathered adventurers in the days of the Seventh Umbral Calamity and opened the way to face Ifrit. If the names of Garuda and Ifrit stir such violent pain in Clive’s heart, then perhaps the truth buried within him can only be brought forth by confronting that fear head-on.</p><p>With his lyric magicks, the wandering minstrel weaves tale and memory into form, and you and Clive are drawn into a vision of the Bowl of Embers. There, before the phantom of Ifrit, the fragments inside Clive finally begin to lock into place. Joshua. Fire. Revenge. The hatred that had driven him all this time surges back with terrible clarity, and he remembers what he had wanted to believe above all else: that Ifrit was the monster who killed his brother. So you fight beside him, pressing through flame and fury, until the illusion forces him to face the answer he had buried deeper than grief itself. You are not Ifrit, he tells the phantom at last. I am.</p><p>That revelation wounds him, but it also frees him. When the illusion breaks, Torgal appears at his side, as if called forth from the world Clive had lost. The minstrel understands the meaning immediately. By accepting the truth of his past, Clive has reclaimed the memories he sealed away, and in doing so has shown that some part of him is ready to return home. At last he speaks plainly: Joshua, his younger brother, had inherited the flames of Phoenix and was meant for a radiant future, yet Clive, young and broken by grief, awakened Ifrit without understanding what lived inside him. The transformation was instinctive and uncontrolled, and it was by his own hand that Joshua died.</p><p>Yet even this recovered truth is not the end. Clive explains that he had been seeking answers in ruins bound to Phoenix, and that after finally facing his past there, everything dissolved into darkness. From that, the wandering minstrel forms a new understanding. Eorzea’s own history remembers the Seventh Umbral Calamity as an age of devastation followed by miraculous renewal, and some hold that Phoenix’s deliverance touched the land itself. The Burning Wall, scarred by those events, may have become the point where Clive’s bond to Joshua and Phoenix drew him across worlds.</p><p>So you return together to the Burning Wall. This time, Clive does not arrive as a man lost in fog, but as one who finally knows the shape of his pain. And when Torgal lifts his head and catches the trail, the end comes swiftly. The place where Clive was first found is also the place where his road home opens. He thanks you both, then turns toward Valisthea, where the answers he still seeks are waiting. The wandering minstrel is left with only the echo of the tale, knowing that what he has witnessed is but one fragment of a greater story.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>クライヴは、異邦の詩人の考えを完全には飲み込めぬまま、それでも前へ進むためなら従おうと決める。そうして向かったアプカル滝で、異邦の詩人はようやく真意を明かす。かつてルイゾワが第七霊災の時代に冒険者を集め、イフリートへ挑むための道を開いた場所――それがここなのだという。ガルーダやイフリートという名がクライヴの胸にこれほど強い痛みを呼び起こすのなら、彼の中に埋もれた真実もまた、その炎と向き合うことでしか引きずり出せぬのかもしれない。</p><p>異邦の詩人は、詩と記憶をより合わせた魔法で、あなたとクライヴを灼熱の炎獄の幻へ導く。そこでイフリートの幻影を前にした瞬間、クライヴの中でばらばらだった断片が一気に結びついていく。ヨシュア。炎。復讐。彼を支えてきた憎しみは、弟を殺した怪物を討つという思いとともに蘇る。あなたは彼と並んで炎の中を戦い抜くが、その戦いはやがて敵を討つためだけのものではなくなる。彼自身が最も深く封じ込めていた答えを暴くための戦いへと変わっていく。そしてついに、クライヴは逃れようのない真実に辿り着く。イフリートは別の何かではない。自分自身だったのだと。</p><p>その事実は彼を深く傷つける。だが同時に、彼を縛っていたものを解き放ちもする。幻が解けたあと、彼の傍らに現れたのはトルガルだった。異邦の詩人は、その意味をただちに悟る。クライヴは過去を受け入れたことで、自ら封じていた記憶を取り戻し、無意識のうちに帰還への覚悟を形にしたのだ。やがて彼は、自らの口で語り始める。弟ヨシュアはフェニックスの炎を継ぐ存在であり、将来を約束された尊い命だった。だが若く、悲嘆に沈んでいたクライヴは、自分の内に潜む力を知らぬままイフリートを顕現させてしまう。制御不能の変貌の果てに、ヨシュアを死に追いやったのは、ほかならぬ自分だった。</p><p>しかし、記憶を取り戻しただけでは終わらない。クライヴは、フェニックスに結びつく遺跡で答えを探っていたこと、その地下で過去を受け入れた直後に意識を失ったことを明かす。その話から、異邦の詩人は新たな推測へ辿り着く。第七霊災の後、エオルゼアは破滅の只中から再生したと語り継がれており、その奇跡を不死鳥フェニックスの加護と結びつける説もある。バーニングウォールはその傷跡として残された地であり、クライヴとヨシュア、そしてフェニックスを結ぶ縁が、この地を異界との接点にしたのではないかというのだ。</p><p>そうしてあなたたちは、再びバーニングウォールへ戻る。だが今のクライヴは、最初にここへ現れた時のような、何もわからぬ漂流者ではない。自らの苦しみの正体を知り、それでも前へ進もうとする者として、彼はそこに立っている。そしてトルガルが気配を捉え、帰るべき道を示すとき、物語は静かに終わりへ向かう。クライヴが最初に見つかったその場所こそ、彼がヴァリスゼアへ帰るための始まりの場所でもあったのだ。彼はあなたたちへ感謝を告げ、なお求めるべき答えが待つ故郷へと歩み去っていく。異邦の詩人の手元に残ったのは、その壮大な物語の、ほんのひとひらの余韻だけだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    tabs:{
      story:'故事概要', event:'活動期間', acq:'取得方式', unlockq:'解鎖任務',

    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>雖然異邦的詩人這回依舊說得雲裡霧裡，Clive 還是決定跟著走下去。只要真能讓事情有所進展，他願意忍受這份困惑。等你們來到 Apkallu Falls 後，異邦的詩人才終於說明自己為何選擇這裡。很久以前，Louisoix（Eorzea 歷史上著名的賢者，也是第七靈災時期的重要人物）曾在此召集冒險者，開啟通往 Ifrit 面前的道路。既然 Garuda 與 Ifrit 這些名字都會在 Clive 心中掀起劇烈反應，那麼，藏在他記憶最深處的真相，或許也只能靠再次直面那份恐懼才能被逼出來。</p><p>接著，異邦的詩人以詩與記憶交織出的魔法，把你與 Clive 一同帶入 The Bowl of Embers 的幻境。當 Ifrit 的幻影出現在眼前時，Clive 體內那些原本破碎凌亂的片段，終於一口氣連在了一起。Joshua、烈焰、復仇。那股他一直死死抓著不放的執念，在這一刻重新燃起——他想起自己始終相信，是 Ifrit 奪走了弟弟的性命。於是你與他並肩而戰，在火焰與怒意之中一路撐到底。可這場戰鬥到後來，早已不再只是為了擊倒眼前的敵人，而是逼著 Clive 去面對自己最不願承認的真相。等到最後，他終於再也無法逃避，只能親口承認：那個 Ifrit，不是別人，正是他自己。</p><p>這個答案幾乎把他整個人撕裂，卻也同時打碎了封住記憶的鎖。當幻境消散後，出現在他身邊的，是 Torgal——那隻來自他原本世界、始終忠誠追隨他的狼犬。異邦的詩人立刻看懂了這代表什麼：Clive 在接受過去的同時，也重新找回了自己封閉起來的記憶，而 Torgal 的出現，正顯示他已經準備好回家。到了這時，Clive 終於能親口說出那段最殘酷的往事。Joshua 是他的弟弟，也是在他那個世界裡繼承 Phoenix 力量的人，原本有著極其光明的未來。可年少的 Clive 在痛苦與混亂中，第一次喚出了 Ifrit 的力量，卻完全不知道那股力量竟潛伏在自己體內。那不是出於冷靜意志的選擇，而是失控、本能、災變。而 Joshua，正是死在那樣的自己手中。</p><p>然而，記憶恢復並不代表一切就此結束。Clive 接著告訴你，他原本正是在一處與 Phoenix 有關的遺跡裡追尋答案；而就在他終於正視那段過去之後，一切突然陷入黑暗。異邦的詩人因此產生了新的推測。Eorzea 曾經歷第七靈災，而在那場毀滅之後，這片土地也迎來了某種近乎重生般的轉變。有人認為，那份奇蹟與 Phoenix 的力量有關。Burning Wall 正是那段歷史留下的傷痕，而你們眼前這片宛如凝固火焰般的結晶山脊，也因此被某些人視作 Phoenix 救贖的痕跡。若是如此，那麼 Clive 與 Joshua、以及 Phoenix 之間的連結，或許正是把他牽引到 Eorzea 這處地方的原因。</p><p>於是，你們再一次回到 Burning Wall。但這一次，Clive 不再是初來時那個被迷霧籠罩、連自己身在何處都說不清的人。現在的他，已經知道自己的痛苦從何而來，也知道自己必須回去面對什麼。當 Torgal 豎起耳朵、捕捉到前方的氣息時，故事的終點也終於近了。原來，Clive 當初被你們發現的地方，同時也是他回到 Valisthea 的起點。最後，他向你與異邦的詩人道謝，然後轉身走向仍在遠方等待他的答案。至於異邦的詩人，留在手中的只剩下一段尚未真正寫完的傳奇片段——因為 Clive 的故事，終究還得由真正陪他走到最後的人去見證。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  }

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story: document.getElementById('panel-story'),
  event: document.getElementById('panel-event'),
  acq: document.getElementById('panel-acq'),
  unlockq: document.getElementById('panel-unlockq'),
  followq: document.getElementById('panel-followq'),
  bgm: document.getElementById('panel-bgm'),
  reward: document.getElementById('panel-reward'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
