<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pilot Wanted | BELAUG · FFXIV Library</title>
  <meta name="description" content="SideFeature – Pilot Wanted (DT Patch 7.31)">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    /* 展開/收合 */
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left">
        <a class="home" href="../index.html">🏠 Home</a>
      </div>
      <div class="right">
        <button id="langToggle" class="icon-btn" aria-label="切換語言">🌐 EN</button>
      </div>
    </nav>
  </header>

  <main class="container main">
    <div class="grid">
      <!-- 左：影片 -->
      <section class="card video-card">
        <div class="bd">
          <div class="video-wrap">
            <iframe id="ytFrame" src="https://www.youtube.com/embed/p-9NLrIbUYI"
              title="Pilot Wanted" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <!-- 右：標題 + Tabs -->
      <section class="card">
        <div class="hd" id="pageTitle">Pilot Wanted</div>
        <div class="tabs" role="tablist">
          <button class="tab-btn" role="tab" aria-selected="true"  data-tab="story">Story</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="acq">Acquisition</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="unlockq">Unlock Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="followq">Follow-Up Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="comments">Comments</button>

          <div id="panel-story"   class="tab-panel active"></div>
          <div id="panel-acq"     class="tab-panel"></div>
          <div id="panel-unlockq" class="tab-panel"></div>
          <div id="panel-followq" class="tab-panel"></div>
          <div id="panel-comments" class="tab-panel">
            <div id="giscus_container" style="min-height:320px;"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:'Pilot Wanted',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>A specialist approaches you and asks for your help with a new test. Though vacuum suits are rarely needed in ordinary operations, they are capable of high-altitude flight, and now that traffic around Phaenna has lessened, the team believes it may finally be possible to establish a safe route through regions of weaker magnetic interference. Even so, caution still governs every step. Flights must be conducted in pairs in case of emergency, and so you are asked to join the test in the air.</p>
      <p>Once you agree, the two of you set out together. Near the entrance to the grotto, you are warned to be especially careful, for people and supplies are concentrated there, and any malfunction would be disastrous. Soon you move farther out, beyond the usual paths of the drones, and the tension eases just enough for the specialist to confirm that the suits are performing as intended. From there, the route carries you onward across the strange terrain of Phaenna, over a glasslike river and toward the volcanic reaches beyond.</p>
      <p>As you continue, the specialist explains the dangers that still surround even a successful flight. At higher altitudes, rising volcanic heat can produce turbulence, and in harsher conditions the glass storms would be far more troubling still. Yet the suits endure the test, and once the route has been inspected, the final step is to try the automatic recall system. In the next instant, you are brought back safely to where you began, the flight complete and the test concluded without disaster.</p>
      <p>When the specialist asks for your thoughts, the answer matters less than the result you have helped secure. These routes may remain limited for now, but they offer something precious: the chance to observe large stretches of Phaenna directly from the air. For certain kinds of research, no recording taken by drones can truly replace what living eyes can see in the moment. Even repeating the same route again and again may prove valuable, if it allows the land to be studied more closely and understood more fully.</p>
      <p>Later, once the suits begin exporting the data gathered during the flight, the specialist explains what comes next. Your feedback will be combined with the recorded results to refine future operations. The route appears safe, but more testing will be needed before it can be opened to the wider initiative. Even so, this first success carries its own quiet promise. Little by little, Phaenna is becoming a place that can be crossed, observed, and known—not only from the ground below, but from the air above as well.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Vacuum Suit Specialist, Phaenna <small class="muted">(X:26.1, Y:12.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-brightest-star.html">The Brightest Star</a></div>
    </div>`,
    followq:`<div class="stack"><div class="row">None</div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'パワーローダー飛行実証実験',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>あなたは、ある担当者から新たな試験飛行への協力を頼まれる。真空服は通常の運用で使われる機会こそ多くないものの、高高度での飛行にも対応しているのだという。最近になってパエンナ周辺を飛び交う作業用の機体が減ったことで、磁気干渉の少ない空域を通る安全な飛行経路を探れる見込みが立ったらしい。それでも不測の事態に備え、飛行は必ず二人一組で行わなければならず、その相棒としてあなたに白羽の矢が立ったのだった。</p>
      <p>準備を整え、ふたりで空へ上がると、まず洞窟の入口付近ではとりわけ慎重に進むよう念を押される。人員も物資も集中している場所だけに、もし不具合でも起これば被害は大きい。やがて通常の機体の経路から十分に離れたところまで進むと、担当者は視界と距離を確認し、機体の挙動が問題ないことを確かめる。そこから先、あなたたちはパエンナの奇怪な地形の上を飛び越え、ガラスめいた流れを横切り、火山地帯のほうへと進んでいく。</p>
      <p>進路の先では、空を行くことの危うさも改めて語られる。高所では火山の熱気が激しく上昇し、強い乱気流を生むことがあるという。真空服はそうした環境もある程度まで想定して作られているが、激しい玻璃片の嵐に巻き込まれれば、なお厄介なことになる。それでも今回の試験は順調に進み、経路の安全確認を終えたあとは、自動帰還機能の試験へと移る。次の瞬間、あなたたちは無事に出発地点へ戻り、この飛行が成功のうちに終わったことを知る。</p>
      <p>飛行後に感想を求められるが、何より重要なのは、あなたがこの試験の成果に立ち会ったという事実だった。たとえ当面のあいだ飛べる場所が限られていたとしても、こうした経路は、パエンナの広大な地表を空から直接観察する貴重な機会になる。研究によっては、記録用の機体が残す映像だけでは足りず、その場で見て確かめること自体に意味がある。たとえ同じ航路を何度なぞることになろうとも、その積み重ねが、この星への理解を少しずつ深めていくのだ。</p>
      <p>やがて真空服が飛行中の記録を出力し始めると、担当者は今後について語る。収集されたデータにあなたの感想を重ね合わせ、次の運用改善へつなげていくのだという。今回の経路はかなり安全に思われるものの、計画全体へ正式に広げるには、まだ追加の検証が必要になる。それでも、この小さな成功が持つ意味は確かだった。少しずつ、パエンナは地上からだけでなく、空の上からも行き来し、見つめ、知っていける場所へと変わりつつあった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> パワーローダーの専任整備士　惑星パエンナ <small class="muted">(X:26.1, Y:12.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-brightest-star.html">希望の輝き</a></div>
    </div>`,
    followq:`<div class="stack"><div class="row">なし</div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'徵求動力裝甲飛行測試駕駛',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>一名負責真空服測試的技術人員主動找上你，希望你幫忙參加一場新的高空試飛。真空服雖然平時在一般運作中很少真正派上這種用場，但本身其實具備高空飛行能力。直到最近，隨著 Phaenna 與 Sinus Ardorum 之間因磁場差異而產生的限制逐漸有了調整空間，再加上四周來回穿梭的作業機體也比先前少了許多，他們才終於有機會嘗試規劃一條足夠安全的飛行路線。即便如此，所有試飛仍必須兩人同行，以防萬一出了狀況時能互相照應，而他希望與自己搭檔的人正是你。</p>
      <p>等你準備妥當後，你們便一同升空。才剛離開營地附近，對方就提醒你在洞窟入口一帶必須格外小心，因為那裡聚集著大量人員與物資，任何故障都有可能釀成大禍。之後，你們逐漸飛離平常作業機體常經過的範圍，對方一邊確認視野與距離，一邊注意真空服的狀況是否穩定無誤。確認安全後，你們便沿著既定路線繼續前進，跨越 Phaenna 那片玻璃般的河流，朝更遠處的火山地帶飛去。</p>
      <p>越往前，這場試飛的危險也越明顯。技術人員告訴你，在高空中，火山熱氣往往會猛烈上升，造成不容小覷的亂流。真空服雖然原本就是為了應付這類情況而設計，但那也只是有限度的保護；若是碰上更劇烈的玻璃碎片風暴，情況就會棘手得多。即便如此，這次飛行仍順利完成了既定檢查。等到安全航道通過驗證後，你們又進一步測試了自動召回系統，隨即平安回到原本的地點，讓整場試飛在沒有意外的情況下劃下句點。</p>
      <p>結束之後，對方問起你的感想，但比起一句簡短的回應，更重要的是這次測試本身所帶來的成果。即使現在能使用的航線還十分有限，這種高空飛行仍然提供了一種極為珍貴的觀察方式，讓人能直接從空中俯瞰 Phaenna 廣闊的地貌。對某些研究而言，單靠 drone 留下的紀錄根本無法取代親眼所見；甚至就連反覆飛同一條路線，有時也會因為能持續比較、持續觀察，而產生真正的價值。</p>
      <p>稍後，當真空服開始匯出整段飛行所記錄下來的資料時，那名技術人員也向你說明了下一步。這些數據會和你的回饋一同用來修正未來的操作方式。眼下看來，這條航線的確相當安全，但若要正式開放給整個計畫使用，仍然還需要更多次驗證。儘管如此，這場試飛依然有著不可忽視的意義。Phaenna 正一點一點變成一顆不只可以在地表上探索，也能從天空中被穿越、被觀察、被逐步理解的星球。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 真空裝甲專員　法恩納 <small class="muted">(X:26.1, Y:12.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-brightest-star.html">最耀眼的星辰</a></div>
    </div>`,
    followq:`<div class="stack"><div class="row">無</div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
