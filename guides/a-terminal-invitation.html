    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You reunite with everyone for the assault on Living Memory’s Gate of Remembrance, and Y’shtola confirms the party is complete—no sense keeping your “insistent host” waiting. As you approach the Meso Terminal, Alphinaud admits he can understand Calyx’s stated aim—Endless existence as “evolution”—but not the ruthlessness driving it. Alisaie reflects on the former queen’s memory storehouse and the terrifying clarity of the Endless Sphene’s resolve: she was willing to kill her own heart to become the machine she believed Alexandria required. G’raha Tia insists the earlier shutdown was real—Endless fading wasn’t staged—but concedes the Meso Terminal itself may have concealed its true state while you were away, forcing you to end this by your own hand. Krile notes it makes sense the terminal could be entered physically—something meant to create Endless would demand maintenance by corporeal hands. Y’shtola adds a crucial fact: Living Memory is saturated with the Ninth’s dense lightning aether, likely the terminal’s power source.</p><p>At the threshold, Sphene speaks from lived grief: four centuries asleep, waking to a world she couldn’t recognize, yet finding continuity beneath the changed surface. She thanks Otis, Zelenia, the royal knights, every Alexandrian who carried their legacy, her “other self” who loved the kingdom, and you all for rekindling her courage. When Endless Sphene manifests—coldly declaring the gentle queen too weak and vowing to become a devourer of worlds—you answer with resolve, and Sphene says Otis and Zelenia will stand with you “in spirit.” The Meso Terminal opens; Alphinaud and Alisaie promise to guard the flanks so you can lead without doubt.</p><p>Inside the dungeon, Sphene recognizes Calyx’s first wave of Endless as people from the era of the Storm Surge, before she was placed in stasis. Y’shtola reasons that if only Calyx’s sector escaped shutdown, then any other memories stored there would likely be from the same historical period as Calyx. You push on through the lull, and Calyx appears at the memory device itself. He confirms the entirety of his memories are stored there and states an early tenet of Endless creation: no memory duplication—he claims to accept the risk because memories are the essence of the self and must not be diluted. He cuts to the chase: you want to destroy the target; he wants the key.</p><p>Sphene presses him anyway—why pursue “evolution” with such fervor? Calyx dismisses the question as meaningless: he has found a superior path to mankind’s preservation; what must be done is what he can do. He argues traditional survival strategies break under complex society, producing endless pointless conflict and tragedy; physical traits aren’t the limit of potential, so why surrender that potential when hearts stop beating? Sphene rejects him: her future has no place for his plan, and she won’t let him harm another Alexandrian. Calyx responds by summoning something meant to end you quickly.</p><p>A chill floods you—weakness, cold—while across Alexandria, fear of death surges. You hear the city’s voices: a manic citizen clinging to the last registrations, the public announcement declaring the five thousand registered users reached, robbed citizens fighting, the broadcast urging them to “remember your fear” and cross the threshold into Endless. Through the Echo, Calyx explains his method: securing requisite aether is easy—reroute lightning energy from Living Memory—then shape its form through the populace’s hope, thought, and prayer. But abstraction is unpredictable, so he designed strict parameters for a concept of his own to guarantee your defeat. Y’shtola recognizes it for what it is: a primal summoning defined by a concept. Alphinaud and Alisaie thrust talismans into your hands—warding scales to protect your mind from enthrallment—and you declare you will win and the key will never be his. The path to the Ageless Necropolis opens, and you enter the trial.</p><p>After the fight begins, you go for the memory bank—only to find it shielded. Calyx sneers: he invited you to destroy it, not promised he’d allow it. He admits your strength can’t be gauged by ordinary means, but he anticipated that. Then he explains the trap: what happens when a being manifested by fear experiences that terror firsthand? It grows stronger. The weakness returns, and he boasts it will rise again and again until the lightning aether infusing this world is drained dry. He proclaims his promise: so long as memories endure, you may live on.</p><p>Sphene seizes on his words and turns them against him. “So long as our memories endure” is not a doctrine meant to teach the living that physical death is nothing to fear—it is solace for those left behind. She knows that litany from the war, repeated until it became a wound. She asks Shale for help and broadcasts to Alexandria: death is frightening, and she understands the urge to forget, to chase eternal life. But you live here and now, carrying rich, varied memories. Nights may feel too dark to bear, yet if you endure them, dawn will come—and in that new morning’s chill, the memories of loved ones can warm you and carry you forward. Do not forget their passing; let it become courage; fear not a life well lived. One day, the memories you leave will be the warmth another needs.</p><p>Calyx reels at the “irregular factor” and orders her eliminated. Wuk Lamat throws herself in—she won’t let him—and Y’shtola shouts to leave the primal to the rest while you finish the memory bank. Wuk Lamat, grievously injured, holds to her promise to protect Sphene’s people. You destroy Calyx’s stored memories along with the memory bank—stopping his transfer at the last moment, Krile believes—and the terminal’s threat collapses.</p><p>Afterward, Alphinaud reports Wuk Lamat hasn’t regained consciousness yet but will be fine; Vow Koana is coming personally to fetch her, and she’ll likely be bedridden for days. Sphene thanks you again: no longer will Calyx dictate their course, no longer will grief be locked away or forgotten. The freedom to feel—joy and sadness, all that life entails—is in Alexandrians’ hands once more. Y’shtola insists you must investigate how Calyx learned that summoning ritual; G’raha Tia warns where primals appear, Ascians are often near. Alphinaud adds another concern: those who prayed during the summoning may have fallen under the entity’s sway. He stays behind with Wuk Lamat until Koana arrives while the rest of you move to assess Alexandria.</p><p>In the outskirts, Alisaie shares Shale and Erenville’s update: those who adopted neo regulators were enthralled, but have shown no hostility so far—likely because of Sphene’s calming broadcast. Administrators are working with the citizens to bring the afflicted into official care, and it is proceeding largely peacefully. Officials want an explanation; G’raha Tia and Krile volunteer to handle it. Krile urges Sphene to go see the people you fought to save—it may steady her heart to witness the results firsthand.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'JP',
    pageTitle:'約束のとき',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたたちはリビング・メモリーの「追憶の門」にて全員と合流し、ヤ・シュトラが点呼を終える。「せっかちな主」を待たせるわけにはいかない――そうしてメソ・ターミナルへ向かう。アルフィノは、カリュクスが掲げる「人類の進化としてのエンドレス」を理解できなくはないが、その無慈悲さを突き動かすものが理解できないと言う。アリゼーは、ここがかつての女王の記憶が保管されていた場所であり、彼女自身がそれを消そうとしたことに触れ、エンドレスでありながら“心を殺して冷たい機械になる”ほどの決意に震える。グ・ラハ・ティアは、以前の停止処理でエンドレスが消えていったのは欺瞞ではないと断じつつ、メソ・ターミナルだけは不在の間に真の姿を隠された可能性を認め、ゆえに結末は自分たちの手でつけねばならないと語る。クルルは、端末の内部に物理的に入れること自体は理にかなうと気づく――エンドレスを生み出す構造なら、肉体の手による保守が必要だからだ。ヤ・シュトラは、ここが第九世界の濃密な雷属性の乙太に満ちており、それが端末の動力源になっているはずだと推測する。</p><p>入口でスフェーンは、自身の時間を語る。四百年眠り、目覚めたときには何もかも見知らぬものに変わっていた。それでも、表層の変化の下には変わらぬものが残っていた。オーティスとゼレニア、王騎士たち、未来を信じ継承をつないだアレクサンドリアの人々、国を愛した“もうひとりの自分”、そして希望と勇気を灯してくれたあなたたちへ――彼女は感謝を重ね、共に立ち上がろうと誓う。そこへエンドレスのスフェーンが現れ、「優しく穏やかな女王は弱すぎた。良心から解放され、世界を喰らう支配者となる」と冷たく宣言する。あなたが共に戦うと応えると、スフェーンはオーティスとゼレニアもきっと“想いとともに”並ぶと言い、ウクラマトが中へ進もうと促す。</p><p>ダンジョン内でスフェーンは、差し向けられたエンドレスが「ストームサージの時代」――自身が眠りにつく以前の人々だと気づく。ヤ・シュトラは、停止処理を免れたのがカリュクスの記憶区画だけだとすれば、そこにある他の記憶も同時代の人物だろうと推論する。防衛が一息ついた隙に先へ進むと、カリュクスが記憶装置の前で待ち受けていた。彼は、自身の記憶の全てがこの装置にあると告げ、エンドレス創成初期に定めた原則――「記憶の複製は禁止」――を持ち出す。危険はあれど記憶は自己の本質であり、薄めるべきではないからだ、と。あなたは装置を破壊し、彼は鍵を取り戻す。無駄な駆け引きはやめて始めよう――そう言って戦いを促す。</p><p>同時代の者としてスフェーンが問いかける。「なぜそこまで執着するのか」「永遠の存在で何を成すのか」。だがカリュクスは一蹴する。自分は人類保存の“上位の道”を見出した。なすべきことを、できる自分が行う。それ以上の理由が必要か、と。複雑化する社会は秩序を崩し、無意味な争いと悲劇を繰り返すだけだ。身体的な形質が可能性の限界ではないのに、なぜ心臓が止まったところで潜在力を手放すのか――彼はそう断じる。スフェーンは拒絶する。自分の未来にあなたの計画はない。もう誰ひとりアレクサンドリアの民を傷つけさせない。</p><p>カリュクスは「ならば戦うしかない」と告げ、召喚を発動する。あなたは急激な冷えと脱力に襲われ、同時に街では「死への恐怖」が膨れ上がっていく。ネオレギュレーターを奪い合う人々、五千人登録達成を告げる放送、恐怖を思い出せと煽り、祈りが奇跡を生むと語る声。エコーを通じて、カリュクスは仕組みを説明する。必要な乙太はリビング・メモリーから雷のエネルギーを迂回させればよい。あとは民衆の希望・思考・祈りで形を定義させる。だが抽象的な手法は不確定要素が多い。ゆえに確実にあなたを倒すため、自ら設計した「概念」に厳格な条件を課し、ようやく完成させたのだ、と。ヤ・シュトラは「概念で定義された蛮神召喚」だと喝破し、アルフィノとアリゼーは護符を渡す。絶望と希望の祈りで生まれた偽りの神であり、護符が魅了から心を守る、と。あなたが立ち向かう意志を示すと、死なき墓所への道が開かれる。</p><p>試練の中、記憶バンクへ向かうと結界で守られていた。カリュクスは言う――破壊してよいとは言ったが、許すとは言っていない。恐怖で顕現した存在が、その恐怖を実際に味わえばどうなる？　より強くなる。雷属性の乙太が尽きるまで何度でも蘇り、あなたは負け戦を強いられる。彼は「記憶がある限り生きられる、それが私の誓約だ」と宣言する。</p><p>だがスフェーンは、その言葉の意味を正す。「記憶がある限り」という言葉は、生きる者に“死は恐れるに足らない”と説くためのものではない。残される者に慰めを与えるための言葉だ。戦争の中で幾度も耳にし、痛みとして刻まれたその祈りを、彼女は今、アレクサンドリアへ向けて放送する。死は恐ろしく、忘れたいと思うのもわかる。だがあなたたちは今この世界に生き、豊かな記憶を抱いている。闇が耐え難い夜もある。それでも耐え抜けば夜明けは訪れ、愛する者の記憶があなたを温め、前へ運ぶ。彼らの死を忘れるな。勇気に変え、よく生きた人生を恐れるな。いつかあなたの記憶が、誰かの朝を温めるのだから。</p><p>カリュクスは「不規則因子だ」と動揺し、彼女を排除せよと命じる。ウクラマトが身を挺して阻み、ヤ・シュトラは蛮神は自分たちが引き受けるから、急いで記憶バンクを処理しろと叫ぶ。ウクラマトは重傷を負いながらも「守ると誓った」と言い張り、あなたは記憶バンクとともにカリュクスの蓄積された記憶を破壊する。クルルは、爆発の瞬間に転送を試みた形跡があったが、消滅と同時に姿を消した――ぎりぎりで止められたのだろう、と推測する。</p><p>戦いの後、アルフィノはウクラマトがまだ意識を取り戻していないが大丈夫だと告げ、ヴァウ・コアナが自ら迎えに来る手配をしたと言う。しばらくは寝込むだろう。スフェーンは、もはやカリュクスが民の行く末を決めることはなく、悲しみが封じられ忘れ去られることもない、と涙ながらに感謝する。ヤ・シュトラは、カリュクスが召喚儀式をどう知ったのか徹底調査が必要だと言い、グ・ラハ・ティアは蛮神が絡むならアシエンの影を警戒すべきだと釘を刺す。アルフィノは、祈りを捧げた者たちが魅了されている可能性にも触れ、自分は患者と共にここで待つと言う。</p><p>郊外ではアリゼーがシェールとエレンヴィルの状況報告を共有する。恐れていた通り、ネオ・レギュレーター使用者は魅了されているようだが、今のところ他者への敵意は見られない。スフェーンの放送が落ち着かせたのだろう。行政は市民と協力し、影響を受けた者を当局の保護下へ移しており、概ね平和裏に進行している。説明を求める当局に対しては、グ・ラハ・ティアとクルルが対応を申し出る。クルルはスフェーンに、救った人々の様子をその目で確かめれば心が少し軽くなるはずだ、と優しく背中を押す。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>你們在前往 Living Memory 的 Gate of Remembrance 之前再度集結。Y’shtola 確認所有決意同行的人都到齊了，語氣帶著一絲冷靜的嘲諷——可別讓那位「急著等人」的主人久候。走向 Meso Terminal 的路上，Alphinaud 說他能理解 Calyx 口中「為了人類進化而成為 Endless（以死者記憶資料生成的永續存在））」的表面目標，卻無法理解他為何能以如此殘酷的方式去推動。Alisaie 望著這裡——曾經存放前任女王記憶的地方——想起 Endless Sphene 甚至試圖抹去自身記憶；即使成了 Endless，她仍以近乎自毀的決心，殺死自己的心，讓自己成為她以為 Alexandria 需要的冰冷機械。G’raha Tia 則堅持：你們當初關閉那些小型終端時，目睹 Endless 消散絕非作戲；只是 Meso Terminal 在你們離開虛擬領域後已經暗了下來，他不得不承認——它的真實面貌或許在你們不在時被藏了起來，所以你們必須親手把這段故事推向真正的結局。Krile 也才意識到：原來終端是可以「實體進入」的；但細想也合理，因為用來製造 Endless 的結構必然需要有人用肉身去維護。Y’shtola 補上關鍵背景：Living Memory 充滿第九世界濃密的雷屬性乙太（aether，世界能量／生命循環的基礎要素），這股遍佈的能量很可能就是終端的動力來源。</p><p>在入口處，Sphene 把自己的時間與情感攤在你們面前：她在這裡沉睡了四個世紀，醒來時世界已面目全非。她起初害怕到幾乎無法呼吸——看不懂、認不出，以為自己所愛的一切都化為塵土；但她也看見，在陌生表面之下仍有許多延續未斷。為此，她感謝 Otis、Zelenia 與 royal knights（王家騎士團，負責守護王族與國度的武裝力量）以生命守護生活方式；感謝每一位 Alexandrian 相信未來、把傳承交到下一代手中；感謝那位深愛國家的「另一個自己」；也感謝你們讓她心底重新燃起希望與勇氣，讓她能再一次拿起武器站上戰場。當 Endless Sphene 冷冷現身，宣告「溫柔善良的 Queen Sphene 太弱，已不配再為人民服務；我將拋棄良知，成為能守護 Alexandria 的支配者——吞噬世界者」時，你以堅定的話語回應，Sphene 則說 Otis 與 Zelenia 也一定會以精神與你們並肩。</p><p>Meso Terminal 對你們開放。Alphinaud 在旁白般的低聲裡壓下不安，說你必須不被疑慮束縛地帶領突擊，而他與 Alisaie 會守住側翼。你們踏入終端深處後不久，Sphene 察覺 Calyx 派來的 Endless 來自 Storm Surge 時代——也就是她被置入 stasis（強制停滯／封存狀態）之前的年代。Y’shtola 推論：既然已知唯一逃過關閉的區域是存放 Calyx 記憶的那一區，若系統以年代整理記憶，那麼同一區域裡的其他記憶多半也屬於與 Calyx 同時代的人。你們趁防禦稍歇向上推進，Calyx 終於在記憶裝置前現身。他稱自己的全部記憶都儲存在這個裝置裡，並提到 Endless 創成初期訂下的核心原則之一：禁止記憶複製。他承認風險存在，卻仍選擇遵守，因為記憶是自我之本，不該被稀釋。你們要摧毀目標，他要奪回鑰；他要你們別再擺姿態，直接開始。</p><p>Sphene 仍以同時代之人的身份逼問：為什麼你要如此狂熱地追逐所謂的進化？你期待的永恆存在究竟要達成什麼？Calyx 卻把問題斥為「毫無意義」。他說自己已確認一條更優越的人類保存之路；必須做的事，就是他能做的事——還需要什麼理由？他主張：傳統的生存策略與日益複雜的社會互相衝突，秩序終將崩壞，留下的只是不必要的衝突與愚蠢的悲劇。人的潛力不該被肉體限制——既然如此，為何要在心臟停止跳動時就放棄那份潛能？Sphene 直接拒絕：她也有自己的未來願景，而他的計畫不在其中；她不會讓他再傷害任何一位 Alexandrian。</p><p>Calyx 於是發動召喚。你瞬間感到一股異常的寒意與虛弱襲來——像是生命力被抽走。與此同時，Alexandria 各處正被同一種情緒吞沒：對死亡的恐懼。你聽見有人狂喜地搶到最後的 neo regulator（新型調節器／用來登記並轉化為 Endless 的裝置），說登記人數已到 4,999；又聽見公共廣播宣佈五千名註冊者已達標，救贖之日即將到來；有人被奪走裝置而崩潰，有人只剩一句「我不想死」。公共廣播反覆催促：記住你對死亡的恐懼——那份恐懼會把你推過門檻，使你成為 Endless；你們的祈禱會誕生能命令死亡的奇蹟。透過 Echo（能理解異語、感知記憶殘響的力量），你聽懂 Calyx 的解說：要取得足夠的乙太很簡單——把 Living Memory 的雷能量重新導流即可；接著讓民眾用希望、思念與祈禱去「定義其形」。但這種抽象的方法充滿不可預測，所以他為了確保能擊敗你，才替自己設計的「概念」設定了嚴格參數，幾乎用盡僅剩的時間才完成。Y’shtola 驚覺那是 primal（以祈禱與乙太顯現的超常存在）召喚，而且還是由「概念」所定義的召喚。Alisaie 把護符塞到你手上，Alphinaud 說這是由絕望與希望的祈禱塑成的假神，護符能保護你的心智不被 primal 影響。你表明立場：你會贏，鑰絕不會落到 Calyx 手裡。通往 The Ageless Necropolis 的道路就此開啟。</p><p>在試煉中，你們試圖立刻破壞 memory bank（儲存記憶的核心裝置），卻發現它被護盾保護。Calyx 嘲諷道：他邀請你摧毀，但從沒說會讓你如願。他承認你們的力量無法用常規衡量，但他早已預料到。然後他揭露更惡毒的設計：由「害怕死亡」顯現出的存在，一旦親身體驗到那份恐懼，會變得更強。你又一次感到那種寒冷與虛弱，Calyx 斷言它會一次又一次復活，直到灌注整個世界的雷屬性乙太被抽乾最後一絲火花；你們打的是必敗之戰，而他會繼續對抗死亡的遠征。他把承諾包裝得像慈悲——只要記憶仍在，人就能活下去。</p><p>Sphene 在那句話上停住，然後反過來奪回它的意義。「只要記憶仍在」不是要教活著的人「肉體死亡不必害怕」；那是要安慰被留下的人。她太熟悉那段禱詞了——在戰爭中，她一遍又一遍聽見它、看著它被用來包紮失去的傷口。她請 Shale 協助，讓她對 Alexandria 放送：死亡確實可怕，她理解人想忘記、想追求永生、想擺脫恐懼；但你們活在此時此地，背負著豐富多樣的記憶。憂慮會沉重到壓垮夜晚，黑暗也會深到像撐不下去；可只要熬過那些時刻，黎明總會到來。清冷的晨光裡，摯愛之人的記憶會溫暖你，推著你繼續向前。不要忘記他們的離去——讓那份記憶成為勇氣；不要畏懼一段好好活過的人生。因為終有一天，你留下的記憶，也會成為另一個人清晨所需要的溫度。</p><p>Calyx 因此動搖，稱之為「方程式中的不規則因素」，下令消滅她。Wuk Lamat 立刻擋上去，怒吼「你休想！」；Y’shtola 則大喊讓大家拖住 primal、你快去處理 memory bank。Wuk Lamat 為了守住承諾付出重傷，但你們終於在混戰中摧毀 memory bank，也把 Calyx 儲存的記憶一起毀掉。Krile 認為 Calyx 在最後一刻試圖轉移記憶，但裝置爆炸的瞬間他也同時消失——你們應該是剛好在最危險的一線前把他截斷。</p><p>回到 Meso Terminal 外，Sphene 低聲說「終於結束了」。Alphinaud 報告 Wuk Lamat 尚未醒來，但會沒事；他已與 Vow Koana 聯繫，Koana 甚至打算親自來把 Lamaty’i 接回去，她的傷勢與消耗會讓她臥床好些日子。Sphene 滿懷感激：Calyx 不再能左右人民的道路，悲傷也不會再被鎖起來、被迫遺忘；能夠感受喜悅與哀傷、感受生命本該承受的一切——這份自由終於回到 Alexandrians 手中。Y’shtola 強調必須徹查 Calyx 如何學會那套召喚儀式；G’raha Tia 警告：凡是 primal 牽涉之處，Ascians 往往不遠。Alphinaud 也提醒：那些在召喚時奉上祈禱的人，很可能已受到 primal 的影響；他會留下照看病患，等 Koana 抵達，其餘人則先去處理 Alexandria 的後續。</p><p>你們前往 Outskirts 時，Alisaie 帶回 Shale 與 Erenville 的進度：果然，使用 neo regulators 的人似乎都受到 primal 的影響；但目前沒有對他人展現敵意，推測是因為 Sphene 的放送具有安撫效果。政府人員正與其他市民合作，把受影響者帶去交由當局照護，而且大致和平進行。只是官員們當然要求一個交代；G’raha Tia 與 Krile 主動表示可以去說明。Krile 則溫柔地建議 Sphene：不妨親眼去看看那些你們拼命守住的人——看見成果，也許能讓她的不安稍稍沉澱。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 雅・修特拉 <small class="muted">(生命回憶, X:21.4, Y:36.8)</small></div></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}
function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}
function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}
tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});
langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});
applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
