        story:`<p><strong>00:55 Cutscene</strong></p><p>Alisaie admits that everything is going far more smoothly than she expected, and remarks that it is convenient to have a hero at hand. She looks around in disbelief as the cavern opens up again, even at such depth.</p><p>Then she lets out a short laugh and says the formation resembles a finger—only to catch her breath as she recognizes what it truly is. It should resemble a finger, she says, because it is Bahamut’s hand. As with the wings, the hand appears frozen, and Alisaie counts her blessings for that. Yet the same question returns: how can it retain a physical form if Bahamut is truly a primal?</p><p>She tells you she had assumed Bahamut’s reversion to aether was what caused the sweeping changes that spread across the realm. But if he is still here, then that explanation can no longer be true. So what, then, caused the realm’s sudden regeneration? Alisaie says there is still so much you do not know about Carteneau.</p><p>She has no idea how deep these caverns run, but insists you must continue.</p><p><strong>the later part of this episode’s story</strong></p><p>You watch Alisaie study the strange contraption before you, and she wonders aloud if it is meant to regulate the saturation of aether. With no other way to be sure, she says there is only one way to find out.</p><p>She reminds you of the dragon you defeated earlier, and points out the peculiar device fastened around its neck. It was likely some kind of receptor used to enslave the creature—proof, she says, that Ancient Allag had the means to control dragons.</p><p>Alisaie notes that the Ishgardians would kill for such knowledge, though the same power could just as easily be turned against them. An army of dragons could shift the outcome of any battle, as the Garleans once learned to their sorrow—and she would not be surprised if they now sought to exploit it. Whatever their plans, she says, it is yet another reminder of the Allagans’ might, and she cannot help but wonder how a civilization so advanced could have fallen.</p><p>Then Alisaie’s voice catches. She can only whisper a prayer as realization hits—this is Bahamut’s head. And the enormous crystal nearby pulses as if it were a heart. The primal that had awakened…it was Bahamut all along.</p><p>She recoils in disbelief, insisting it cannot be true—because that would mean her grandfather died for nothing. She grits her teeth and says you do not know enough to strike at it now; you must withdraw.</p><p>But before you can, Alisaie freezes at the sight of someone ahead. She can barely form the words, asking who it is—then she whispers that it cannot be. She calls out to her grandfather, begging him not to leave her again, and when he slips away once more, her cry echoes through the cavern. Afterward, she forces herself to admit you can do no more for now.</p><p>Back aboveground, Alisaie looks around, momentarily confused that you have emerged in northern Thanalan of all places—but she brushes it aside. Her grandfather is alive, she tells you; Bahamut did not defeat him. Yet she cannot understand why he will not return. This expedition has brought more questions than answers, and she says you would both be better for a rest—return with her to the Waking Sands and reflect on what you have seen. Before you go, she thanks you, telling you none of this would have been possible without you.</p>`,

        story:`<p><strong>00:55 カットシーン</strong></p><p>アリゼーは、思っていた以上に事が順調に運んでいると告げ、英雄がそばにいるのはやはり都合がいいとあなたに言う。そして彼女は、この深さにありながら洞窟が再び大きく開けていることに驚きを隠せない。</p><p>やがて彼女は、目の前の形が指のようだと笑いかけるが、すぐに息をのむ。そう見えて当然だと言い、これはバハムートの手なのだとあなたに告げる。翼と同じく、その手は凍りついたかのように止まっており、アリゼーはそれを幸いだと受け止める。だが同時に、また疑問が胸をよぎる――蛮神であるはずのバハムートが、なぜ肉体を保っているのか。</p><p>彼女は、バハムートがエーテルへ還ったことが、世界に広がった変化の原因だと思っていたという。だが、もしバハムートが今もここにあるのなら、その考えは成り立たない。では、何が世界の急激な再生を引き起こしたのか。カルテノーについて、あなたたちはまだ知らないことばかりだとアリゼーは言う。</p><p>この洞窟がどこまで続くのか見当もつかないが、それでも先へ進まねばならないと彼女は告げる。</p><p><strong>このエピソード後半の物語</strong></p><p>あなたの前で、アリゼーはその装置を見つめ、「これはエーテルの飽和を制御するための仕掛けなのか」と呟く。確かめる方法はひとつしかない、と彼女は言う。</p><p>彼女は、先ほどあなたが討ち倒した竜のことを持ち出し、首元に取り付けられていた奇妙な装置に気づいていたかと問いかける。それは竜を隷属させるための受信装置のようなものだったはずで、古代アラグには竜を支配する術があったのだろう、と。</p><p>その知識を手に入れるためならイシュガルドの者は命を懸けるだろうが、同じ力は彼らに向けられる危険もある――アリゼーはそう言う。竜の軍勢は戦況を一変させうるし、かつてガレマールはその恐ろしさを身をもって知った。だからこそ、今度は彼らがこの力を利用しようとしていても不思議ではない、と彼女は続ける。いずれにせよ、これはアラグの力を改めて思い知らされる出来事であり、これほどの文明がなぜ滅びたのか考えずにはいられない、と。</p><p>やがてアリゼーは息をのみ、祈るように呟く。そこにあるのは……バハムートの頭部だ。そして巨大なクリスタルが、まるで心臓のように脈打っている。目覚めた蛮神とは、ずっとバハムートのことだったのか、と。</p><p>彼女は激しく首を振り、そんなはずはないと叫ぶ。それが真実なら、祖父が命を賭して果たしたことが無意味になる――アリゼーはそう言い、今は打つ手がない、あなたは撤退すべきだと告げる。</p><p>だがその直後、アリゼーは誰かの姿を捉えて凍りつく。誰なのか、と声を絞り出し、やがて信じられないように否定する。祖父なのか、本当にあなたなのか――彼女は呼びかけ、もう二度と自分の前から消えないでほしいと懇願する。しかし再びその姿が遠のくと、彼女の叫びが洞窟に響く。やがてアリゼーは、今はもうどうすることもできない、と自分に言い聞かせる。</p><p>地上に戻ったあなたに、アリゼーは一瞬、なぜ北ザナラーンにいるのかと戸惑うが、そんなことはどうでもいいと言い切る。祖父は生きている、バハムートに倒されたのではないのだと、彼女はあなたに告げる。けれど、なぜ戻ってきてくれないのかがわからない――今回の探索は答えよりも疑問ばかりを増やした。だからこそ、今は休息が必要だとして、砂の家へ戻り、見たものを振り返ろうと提案する。最後にアリゼーは、あなたがいなければ何も成し得なかったのだと、感謝を伝える。</p>`,

        story:`<p><strong>00:55 過場動畫</strong></p><p>Alisaie 說事情比她原先預想的還要順利，並坦率地表示：身邊剛好有個英雄在，確實方便。她望向四周，忍不住驚嘆——在這麼深的地方，洞穴竟然又一次豁然開闊。</p><p>她先是笑了一聲，說那形狀看起來像一根手指，隨即卻倒抽一口氣，立刻明白為什麼會像：因為那就是 Bahamut 的手。和翅膀一樣，那隻手似乎也被凍結住了。她為此感到慶幸，但同樣的疑問又一次浮上心頭——如果 Bahamut 真的是 primal，他怎麼還能保有肉體？</p><p>她告訴你，她原本以為 Bahamut 轉化回以太，才導致整個世界出現那些廣泛的變化；可如果 Bahamut 仍然在這裡，那個推論就站不住腳了。那麼，到底是什麼讓世界突然開始再生？關於 Carteneau，你們仍有太多未知。</p><p>她完全不知道這些洞穴到底有多深，但她要你繼續前進。</p><p><strong>本集後半的故事</strong></p><p>你看著 Alisaie 端詳那個奇妙的裝置，她低聲猜測：這會不會是用來控制以太飽和程度的機關？她說，想知道答案，恐怕只能親自試一試。</p><p>她提起你先前擊敗的那條龍，問你是否注意到牠脖子上那個怪異的裝置。那很可能是一種接收器，用來奴役那頭生物——看來 Ancient Allag（古代亞拉戈帝國）確實掌握了操控龍的手段。</p><p>Alisaie 說，Ishgardians 可能會為了這種知識不惜一切，但這份力量同樣也可能反過來用在他們身上。由龍組成的軍勢足以扭轉任何戰局，而 Garleans 也曾因此付出慘痛代價；她並不意外他們如今會想利用這股力量。無論 Garleans 的盤算是什麼，眼前的一切都再次提醒你：Allagans（古代亞拉戈帝國）的力量究竟有多可怕，也讓人忍不住去想，這樣先進的文明到底為何會走向覆滅。</p><p>接著，Alisaie 的聲音忽然哽住，她像是下意識祈禱了一句，才艱難地說出你們眼前的真相：那是 Bahamut 的頭。而那顆巨大的水晶脈動著，彷彿……彷彿是一顆心臟。那個被喚醒的 primal，從頭到尾都是 Bahamut？</p><p>她猛地否定，連聲說不可能——如果這是真的，就等於她的祖父白白犧牲。她咬牙提醒你：你們現在掌握的資訊還不夠，根本無法出手，必須立刻撤退。</p><p>可就在要退開時，Alisaie 忽然盯著前方的身影僵住。那是誰……？她像是立刻否認，卻又不受控制地喊出疑問。她顫聲呼喚祖父，求他別再一次離開她；當那道身影再度遠去，她的哭喊在洞窟裡迴盪。最後，她只能逼自己承認：現在你們已經無能為力了。</p><p>回到地面後，Alisaie 先是困惑：你們怎麼會出現在 Northern Thanalan？可她立刻把這種疑問拋到一旁——她說，她的祖父還活著，Bahamut 並沒有打倒他。可是，為什麼他不回來？她想不明白。這趟探索帶回來的問題遠比答案更多，而她說你們都需要休息；和她一起回到 Waking Sands，好好整理你們所見的一切。臨走前，她向你道謝，說若沒有你，這一切都不可能發生。</p>`,

    function renderPanel(key, lang){
      const t = i18n[lang] || i18n.EN;
      Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
      panels[key].classList.add('active');
      if (key !== 'comments') {
        panels[key].innerHTML = t[key];
      } else {
        loadGiscusForCurrentLang();
      }
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click',()=>{
        tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab, getLang());
      });
    });

    langToggle.addEventListener('click',()=>{
      const cur=getLang();
      const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
      localStorage.setItem(LANG_KEY,next);
      applyLang(next);
    });

    applyLang(getLang());

    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };
    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }
  </script>
</body>
</html>
