<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'For Prosperity',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You return to Saint Coinach’s Find in Mor Dhona, where G’raha Tia gathers the fellowship of NOAH and calls the assembly to order. He tells you Rammbroes will preside, and asks that you inform him when you are ready to proceed.</p><p>Rammbroes welcomes you back, having already read the account of your encounter within the Labyrinth of the Ancients. He is relieved to see you seem none the worse for it, and tells you he has added his own notes to G’raha Tia’s preliminary report. He has also begun compiling a Crystal Tower survey log so that the record of your findings will remain available whenever you need it.</p><p>With no objections raised, Rammbroes summarizes what you accomplished on the first foray: the outer defenses of the Crystal Tower grounds were neutralized, and the maze surrounding the base of the spire was secured. Yet your account makes clear the labyrinth’s defenses were emphatically active, and included a violent clash with a sentry heavily augmented by Allagan technology.</p><p>From that, Rammbroes draws the conclusion your misgivings were well founded. The Crystal Tower was not merely thrust above ground by shifting earth—it has somehow been reawoken. If its secrets prove too dangerous to share with the world, he says, you will have no choice but to contain them, likely by returning its mechanisms to dormancy; but to do that, you must first learn how they work, and the answer can only be waiting inside the tower itself.</p><p>G’raha Tia answers that such a task is easier said than done if the perils of the labyrinth are any indication. Rammbroes therefore moves that all further exploration be delayed until the structure’s defenses have been exhaustively analyzed, and he entrusts that work to Cid. Cid accepts gladly, while Biggs and Wedge insist they will see it through as well—Ironworks exists to ensure technology is used for the right reasons, and that means preventing it from being used for the wrong ones.</p><p>With the work divided, G’raha Tia attempts to take his leave, saying he would hone his martial skills so he might witness what follows with his own eyes. Rammbroes refuses, insisting G’raha’s knowledge will be useful to Cid’s investigation. G’raha protests that, as an observer, he is not strictly under Rammbroes’s authority—yet he turns to you all the same, urging you not to let your talents rust during the pause, for you will be needed in fighting form when the next expedition begins. He promises you have only seen the briefest glimpse of what time has obscured, and that soon the veil will fall from the glory of the Allagan Empire.</p><p>After the meeting, at the Eight Sentinels, Nero tol Scaeva watches the aftermath with thinly veiled satisfaction. He calls it a terrible mess, yet notes it leaves the door wide open, and admits he is beginning to understand why Cid relies on adventurers. If his readings are correct, he says, the energy source atop the tower rivals even the Ultima Weapon—more than a match—and he savors the thought of a new toy to claim, declaring that so long as his ambition burns, he will strive to seize what destiny has placed before him. Not long after, G’raha Tia speaks again of his conviction that NOAH will uncover the long-buried secrets of ancient Allag piece by piece, and says it will demand all of your skill; he even hopes he can persuade Cid to let him accompany you, insisting he is quite proficient with the bow.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> G’raha Tia <small class="muted">Mor Dhona (X:30.4, Y:12.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="labyrinth-of-the-ancients.html">Labyrinth of the Ancients</a></div><div class="row">Disciples of War or Magic Lv. 50</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="syrcus-tower-quest.html">Syrcus Tower</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'ノアの調査記録',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたがモードゥナの聖コイナク財団の調査地へ戻ると、グ・ラハ・ティアは調査団「ノア」の面々が揃ったことを確かめ、会議の開会を宣言する。議長はラムブルースが務めるため、進行の準備が整ったら彼に伝えてほしいと促される。</p><p>ラムブルースはあなたを迎え、古代の民の迷宮での遭遇について既に報告を読んだと告げる。無事を喜びつつ、グ・ラハ・ティアの予備報告に自らの注記を加え、さらにクリスタルタワー調査記録の編纂を始めたという。必要な時はいつでも参照できるようにし、疑問があれば遠慮なく尋ねてほしいと述べる。</p><p>異議がなければと前置きしたうえで、ラムブルースは初回の調査成果をまとめる。クリスタルタワー外周の防衛機構を無力化し、塔の基部を取り囲む迷路地帯を確保することに成功した。しかしあなたの報告では、迷宮の防衛は明確に稼働しており、加えてアラグ技術で強化された番兵との激しい交戦があったという。</p><p>その事実から、ラムブルースは懸念が正しかったと断じる。クリスタルタワーは地殻変動で露出しただけではなく、何らかの理由で再起動しているのだ。もし内部の秘奥が世に出すには危険すぎるなら、破壊に頼らず封じ込めるしかなく、そのためには機構を休眠状態へ戻す必要がある。だが機構の仕組みを知らねばならず、その答えは塔の内部にこそある、と結論づける。</p><p>グ・ラハ・ティアは、迷宮の危険を思えばそれは言うほど容易ではないと応じる。そこでラムブルースは、防衛機構の徹底解析が終わるまで追加の探索を延期する動議を示し、その任をシドに託す。シドは喜んで引き受け、ビッグスとウェッジも黙ってはいない。アイアンワークスは技術が正しく用いられるように立ち上げたのだと語り、誤った使われ方を防ぐためにも最後までやり遂げると誓う。</p><p>段取りが整うと、グ・ラハ・ティアは一度席を外し、武技を磨いて次の展開を自分の目で見届けたいと言い出す。だがラムブルースはそれを許さず、グ・ラハ・ティアの知識は解析に必要だと諭す。グ・ラハ・ティアは自分がオブザーバーである以上、厳密には指揮下にないと抗しつつも、あなたに向けて、待機の間に腕を鈍らせないでほしいと頼む。次の遠征では万全の戦力が要るのだと強調し、いずれ時のヴェールが剥がれ、アラグ帝国の栄光を直視することになると語って会議は閉じられる。</p><p>その後、八剣士の前庭でネロ・トル・スカエウァは残骸を眺め、ひどい有様だと言いながらも、これで門が開いたも同然だとほくそ笑む。冒険者に頼る理由が分かってきたとシドへ告げ、塔の頂にあるエネルギー源はアルテマウェポンに匹敵するどころか、それ以上だと読み取ったと語る。新たな玩具を手に入れるかのように歓喜し、報いを奪われ続けた運命が今度は自分により大きな目的地を与えたのだと言い、燃え続ける野心のままにそれを掴むと宣言する。ほどなくしてグ・ラハ・ティアは、調査団「ノア」が古代アラグの秘密を少しずつ暴くと確信していると述べ、そのためにはあなたの力が不可欠だと言い切る。さらに、自分も同行できるようシドを説得したいのだと口にし、弓の扱いには自信があるのだと付け加える。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> グ・ラハ・ティア <small class="muted">モードゥナ (X:30.4, Y:12.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="labyrinth-of-the-ancients.html">古代の民の迷宮</a></div><div class="row">ファイター／ソーサラー レベル５０～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="syrcus-tower-quest.html">シルクスの塔</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'諾亞的調查記錄',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你回到 Mor Dhona 的 Saint Coinach’s Find，G’raha Tia 確認 NOAH 的成員都已到齊，便宣布會議正式開始。他說 Rammbroes 會主持整場會議，並請你去告訴 Rammbroes：你已經準備好繼續進行。</p><p>Rammbroes 迎上你，表示他剛讀完你在 Labyrinth of the Ancients 的經歷，看到你平安無事，讓他十分欣慰。他也說，自己已在 G’raha Tia 的初步報告上補上筆記，並開始整理一份 Crystal Tower 的調查紀錄，讓你之後隨時都能查閱；若你有任何疑問，只要開口詢問即可。</p><p>在沒有異議的情況下，Rammbroes 開始總結這次遠征的成果：你們在第一次踏入 Crystal Tower 的外圍時，成功讓外層防衛機構失效，並進一步確保了主塔基部周圍的迷宮區域。然而，你的回報也明確指出，迷宮的防衛仍然高度活躍，而且你還遭遇了以 Allagan（古代亞拉戈帝國）技術大幅強化的哨兵，戰況十分激烈。</p><p>Rammbroes 因此判定，你們的擔憂完全合理。Crystal Tower 並非單純因地殼翻動而露出地表——它不知為何已重新甦醒。若塔的秘密危險到無法與世人分享，你們就只能設法將它封存起來；除非把整座建築夷為平地，否則更可能的做法是讓它的機構回到休眠狀態。可要做到這一步，就必須先弄清楚那些機構如何運作，而答案必然就在塔的內部。</p><p>G’raha Tia 接話說，若 Labyrinth of the Ancients 的危險足以作為指標，那麼要進入塔內絕不是一句話就能辦到的事。Rammbroes 於是提議暫緩後續探索，直到對整體防衛完成徹底分析為止，並把這項任務交給 Cid。Cid 欣然接受，Wedge 與 Biggs 也立刻表態要一起參與——他們說 Ironworks 的成立，就是為了確保技術被用在正確的地方，而要做到這點，也必須阻止它被用在錯誤的地方；因此他們一定會把事情做到最後。</p><p>事情分派完後，G’raha Tia 想先告退，說他希望能磨練自己的武藝，好在之後能親眼見證接下來的一切。Rammbroes 卻不允許，堅持 G’raha Tia 的知識對 Cid 的研究很有幫助。G’raha Tia 一度抗辯自己只是 observer，嚴格來說不受指揮——但他隨即轉向你，請你別在這段空檔讓本事生鏽；等下一次遠征開始，你必須保持隨時能出手的狀態。他斷言你們至今只瞥見了被時間掩埋之物的片段，而很快，你們就會揭開那層帷幕，直視 Allagan Empire（古代亞拉戈帝國）的榮光，會議也在此宣告結束。</p><p>會後你前往 The Eight Sentinels，Nero tol Scaeva 看著眼前的混亂殘跡，嘴上說情況糟透了，卻又像在暗自得意：這樣一來，門幾乎等同被敞開。他說自己開始理解 Cid 為何如此倚重冒險者，並宣稱若他的推算正確，塔頂等待著的能量來源足以與 Ultima Weapon 匹敵，甚至更勝一籌；那將會是他的新玩具。他把這一切視作命運的安排，說只要自己的野心仍在燃燒，就會不惜一切去奪取它，並要 Cid 別讓他失望。不久後，G’raha Tia 又談起他的信念：NOAH 終將一點一點揭開 ancient Allag（古代亞拉戈帝國）的長眠秘密，但這需要你拿出全部的本領；他甚至打算說服 Cid 讓他同行，好讓他親眼見到那些可怕的守護者，並強調自己其實很擅長使用弓。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>任務發布</b> 古·拉哈·提亞 <small class="muted"> 摩杜納 (X:30.4, Y:12.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="labyrinth-of-the-ancients.html">古代人迷宮</a></div><div class="row">戰鬥／魔法職業 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="syrcus-tower-quest.html">希爾科斯塔</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
