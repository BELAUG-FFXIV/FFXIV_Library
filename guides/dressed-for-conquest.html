  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}

    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`Dressed for Conquest`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Sark Malark calls you by name and says he has heard of your plight from his friend Glaumunt. As a fellow adventurer and a son of Eorzea, he offers you his help. To infiltrate Castrum Centri, you and your comrades must disguise yourselves as imperial soldiers—but that leaves one problem: how to obtain uniforms and helms.</p><p>He admits there are places a person might buy such things, but anyone who deals in that sort of ware is not someone you would trust with secrets. Instead, he says it would be wiser to acquire what you need by traditional means—from the bodies of their recently deceased owners.</p><p>The fortified area before Castrum Centri is never short of imperial patrols, and he expects it won’t take long to secure three sets of gear—one each for Biggs, Wedge, and you. When you have what you need, he asks you to return and let him inspect the spoils.</p><p>When you do, Sark Malark confirms what he suspected: the equipment is damaged. In its current condition, the uniforms and helms are likely to draw suspicion, so they must be repaired—if only superficially. He sends you to the blacksmith Eginolf at the Diamond Forge in Rowena’s House of Splendors, and says he has already sent word ahead. Eginolf is expecting you, and has been impressed upon to keep the nature of your mission absolutely secret.</p><p>Eginolf looks over what you brought and says he can hammer it back into shape. He explains he owes Sark Malark a favor or two—Sark once took good care of him before he fell in with Rowena. Eginolf adds, almost offhand, that Sark Malark is the son of one of the wealthiest families in the sultanate, though he always felt the call of an adventurer’s life. Then he tells you to hold your horsebirds for a moment while he gets to work, and soon enough hands the gear back looking good as new—though he warns it won’t do you much good in battle. Before you leave, he asks you to give Sark Malark his regards.</p><p>Back in Revenant’s Toll, Sark Malark is pleased with the repairs. He says the great Eginolf never fails to impress, and the quality would fool even a legatus. With the repaired uniforms and helms, you should have no trouble blending in among imperial forces. And if you worry the Garleans might detect your “foreignness,” he reminds you that foreigners in fact make up the greater part of the Garlean invasion force in Eorzea—when the Empire subjugates new territory, it assimilates the people into its armed forces and sends those conscripts to subjugate faraway lands, nipping rebellion in the bud while expanding territory in one fell stroke. With that, he says his part is done, and he is glad to have helped. When the question arises of why a “wealthy merchant” would do this, he insists you must have heard wrong—he is only a humble adventurer, acting in the realm’s best interests.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Sark Malark <small class="muted">(Mor Dhona, X:22.5, Y:7.5)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="acting-the-part.html">Acting the Part</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 45 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="fool-me-twice.html">Fool Me Twice</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'帝国兵なりきり装備',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>サーク・マラークは、グラウモントからあなたの窮状を聞いたと言い、同じ冒険者として、そしてエオルゼアの子として力を貸したいと申し出る。あなたたちが「カストルム・セントリ」へ潜入するには、帝国兵に成りすます必要がある――問題は、その制服と兜をどう手に入れるかだ。</p><p>彼は、金で買える場所がないわけではないと認めつつも、そうした品を扱う者に秘密を預けるべきではないと言う。だからこそ、必要なものは「正攻法」で手に入れるべきだ――帝国兵の亡骸から回収するのが最も賢明だと。</p><p>「カストルム・セントリ」前の要塞地帯には帝国軍の巡回が絶えない。ビッグス、ウェッジ、そしてあなたの分として、三組そろえるのに時間はかからないはずだと見立て、入手できたらここへ戻って戦利品を見せてほしいと頼む。</p><p>あなたが三組をそろえて戻ると、サーク・マラークはやはりな、と言わんばかりに損傷を指摘する。このままでは制服も兜も不審を招く――見た目だけでも修理が必要だ。そこで彼は、モードゥナの「ロウェナ記念会館」内にある「ダイヤモンドフォージ」の鍛冶師エギノルフを紹介し、すでに話は通してある、彼はあなたを待っていると告げる。任務の内容については最大限の秘匿が必要だと、こちらから重ねて伝えてあるから心配するな、と。</p><p>エギノルフは、サーク・マラークから来た冒険者だなとあなたを迎え、持ち込まれた装備を見て、叩き直せると請け負う。彼は、ロウェナと関わる前の昔に世話になった恩があるのだと言い、さらにサーク・マラークがウルダハでも有数の富豪の家の出だと明かす。それでも彼は冒険者の生き方に惹かれていたのだろう、と。そうして無駄話はここまでだと作業に戻り、少し待てば装備は見違えるほど整えられる。戦闘には向かないが、目的には十分だと念を押し、サーク・マラークによろしく伝えてくれと言って送り出す。</p><p>レヴナンツトールへ戻ると、サーク・マラークは修理の出来栄えに満足し、これほどならレガトゥスでさえ欺けると言う。これで帝国軍の中に紛れても問題はないはずだ。ガレアンに「異邦人らしさ」を見抜かれるのではと案じるあなたに、彼はむしろ侵攻軍の大半は異邦人だと説明する。帝国は征服した土地の民を軍に編入し、その徴集兵を遠方の征服に回す――そうして反乱の芽を摘みつつ領土を広げるのだ、と。ここまでで自分の役目は終わりだ、力になれてうれしいと告げる一方、「裕福な商人がなぜ助けるのか」という問いには、そんな話はどこで聞いたのかと首を振り、自分はただの冒険者で、ただ国のために動いているだけだと言い切る。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> サルク・マウルク <small class="muted">（モードゥナ, X:22.5, Y:7.5）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="acting-the-part.html">偽りの敬礼</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 45～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="fool-me-twice.html">魔導アーマーを奪取せよ！</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'另一類軍裝',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Sark Malark 問了你的名字，說他從朋友 Glaumunt 那裡聽說了你的困境。身為同樣的冒險者、也同樣是 Eorzea 的孩子，他願意出手相助。你們要潛入 Castrum Centri，就必須把自己偽裝成帝國軍士兵——而問題在於：制服與頭盔要怎麼弄到手。</p><p>他說，確實有地方可能買得到，但會做這種生意的人，絕不是你能放心交付秘密的對象。與其把任務暴露在風險裡，不如用「傳統方式」取得：從那些剛死去的帝國軍身上，把需要的裝備取下來。</p><p>在 Castrum Centri 前方的要塞地帶，帝國軍巡邏從來不缺。Sark Malark 判斷，你應該很快就能湊齊三套裝備——Biggs 一套、Wedge 一套、你一套。等你把需要的東西都拿到手，就回來讓他檢查戰利品。</p><p>你帶著三套帝國軍裝備回到他面前，Sark Malark 一看就皺起眉頭：果然如他所料，這些裝備都有損傷。以現在的狀態，制服與頭盔很可能引人起疑，所以必須修補——哪怕只是把外觀先修得像樣一點也好。幸好，Rowena’s House of Splendors 裡的 The Diamond Forge 有位鐵匠 Eginolf，應該能很快把它們敲回原形；而且他已經先送信過去，Eginolf 會等著你，你們也已經再三提醒對方，這件事必須徹底保密。</p><p>Eginolf 見到你，立刻說他一直在等 Sark Malark 派來的人。他看過你帶來的裝備後表示沒問題，能替你把它們修整回去。說著說著，他提到自己欠 Sark Malark 幾個人情——在他還沒跟著 Rowena 以前，Sark Malark 就曾照顧過他。Eginolf 還順口說起，Sark Malark 出身富裕家庭，但偏偏走上冒險者的路；隨後他收起話頭，叫你先等等，很快就把裝備修好交回。雖然這些修補不適合拿來打仗，但他也說，聽起來那本來就不是你的目的；臨走前，他請你替他向 Sark Malark 問好。</p><p>你回到 Revenant’s Toll，Sark Malark 檢查後露出滿意的神色：這樣的修補效果極佳，甚至足以騙過 legatus。你們穿上這些制服與頭盔，混在帝國軍之中應該不會有問題。若你擔心 Garleans 會察覺你的「外來身分」，他則解釋：其實 Garlean 在 Eorzea 的侵略軍裡，外地出身的人反而占了大多數——帝國一旦征服新領地，就會把當地民眾編入軍隊，再把這些被徵召的部隊派往更遠的地方去鎮壓與征服；如此一來，既能壓下反抗，又能擴張版圖。說到這裡，他表示自己能做的都做完了，也很高興幫得上忙。至於「為什麼你這個富商要幫忙」的疑問，他則否認那種說法，堅稱自己只是個普通的冒險者，只想為這片土地的利益而行動。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 薩爾克·貿爾克 <small class="muted"> 摩杜納（X:22.5, Y:7.5)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="acting-the-part.html">另一類軍禮</a></div><div class="row">所有職業（不含限定職） 等級 45 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="fool-me-twice.html">奪取魔導裝甲</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
