  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Druthers House Rules',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>At Buscarron’s Druthers, Buscarron listens to your report with a thoughtful frown before giving you a crooked grin. There is still no word of the sylph elder’s whereabouts, but he is certain it is only a matter of time before someone turns up a lead. In the meantime, however, he has a favor to ask in return for the hospitality and information he has already given you. Rather than set you to some grand errand, he simply presses a tub of cold water into your hands. There is a customer outside who is spoiling for a fight, and he needs you to cool the man off before the trouble boils over. There is no need to crack any skulls, Buscarron says; a sudden dousing usually does the job. His patrons are welcome to drink and shout until they wake the dead if they like, but the moment things turn violent, he has to put his boot down. With that, he jerks his chin toward the door, leaving you to carry the tub outside.</p>
      <p>Stepping out into the night air, you find two men squared off in front of the tavern: a Drunken Duskwight muttering darkly about what he would do anywhere but under Buscarron’s roof, and a Mead-soaked Midlander who snaps at your gaze, demanding to know what you are staring at and whether you wish to keep your eyes in your skull. Before the first punch can fly, you hurl the cold water over the belligerent Midlander. He chokes on a curse, shrieking at the shock of the icy deluge, and sputters about “no fightin’” and “Duskwight scum” before cutting himself off. He knows the rules here, and as much as he might like to press the matter, he will abide by them—for now. As he backs down, the Drunken Duskwight turns to you with a weary sort of gratitude. He insists that he could have handled a “bleatin’ milksop” like that on his own, but admits he has no wish to cause trouble for Buscarron by forcing the man to mop up blood and teeth. With the worst of the tension drained away, the two men part, and you return inside with the empty tub.</p>
      <p>Buscarron greets you with an approving nod when you report that the dispute is settled. He refuses to let his patrons tear into one another over petty prejudice, and in case you missed it, he explains that the man on the receiving end of that outburst was a Duskwight Elezen. To many, those who shun the cities and live out in the wilds are little better than brigands, and the reputation of the clan as unruly folk has taken deep root. Yet once you get to know them, they are not so bad, and it does not sit right with Buscarron to bar an entire people from his doorstep because of a few troublemakers. There should be at least one place in the Twelveswood where anyone who is willing to pay and drink in peace is welcome, no matter their race or clan. As the murmur of the tavern swells back to its usual, raucous warmth around you, you sense that this rough-and-ready watering hole is as much a refuge as it is a place of business—and that as long as Buscarron keeps watch, it will remain a haven for all who seek a quiet mug instead of a fight.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'バスカロンドラザーズの掟',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>酒房「バスカロンドラザーズ」で報告を終えると、バスカロンは腕を組んで考え込むような顔をしたあと、いつもの片頬を上げた笑みを浮かべます。シルフ族の長老の行方については、まだ決定的な知らせはないものの、いずれ誰かが手がかりを見つけてくれるだろうと彼は言います。そのあいだ、これまで世話になってきた礼というわけではないが、ひとつ頼まれごとを聞いてほしいと切り出します。大げさな仕事ではなく、彼があなたに押しつけたのは、冷たい水の入った桶ひとつ。店の外で喧嘩腰になっている客がいて、このままではひと悶着起こりかねないから、頭を冷やしてきてほしいというのです。とはいえ、本当に頭を割る必要はない──ただ水をぶっかけるだけで大抵は静かになると、バスカロンは笑います。ここでは夜通し酒をあおり、大声で騒ぎたてるのは構わないが、殴り合いになった途端、店主としては止めに入らざるを得ない。そう言って顎で入り口の方を示され、あなたは桶を抱えて店の外へと向かいます。</p>
      <p>外に出ると、酒場の前ではひとりのダスクワイアの男が唸り声を上げ、その向かいには酒臭いミッドランダーの男が、今にも掴みかからんばかりの勢いで睨み合っていました。ここがバスカロンの店でなければ、すでに相手の歯を折っているところだと毒づくダスクワイアに対し、ミッドランダーは、じろじろ見るなとあなたに怒鳴りつけ、目を潰されたくなければ引っ込んでいろと吐き捨てます。最初の拳が振り上げられるより早く、あなたは冷水の入った桶をひっくり返し、喧嘩腰のミッドランダーに浴びせかけました。男は悲鳴混じりに呪いの言葉を吐き、突如全身を襲った冷たさに顔をしかめます。「喧嘩はご法度」だと言われれば、まだ不満げにシェーダー族の悪口を言いかけながらも、結局は口をつぐみ、この店の掟を守るほかありません。しぶしぶ引き下がるミッドランダーを横目に、ダスクワイアの男はあなたに礼を述べます。あんな若造など自分ひとりでも対処できたと強がりを言いつつも、バスカロンに余計な迷惑をかけたくはなかったのだと付け足し、血や歯を拭き取らせるような騒ぎにならずに済んでよかったと肩の力を抜くのでした。ふたりの間に漂っていた刺々しさが薄れたところで、あなたは空になった桶を抱え、酒場の中へ戻っていきます。</p>
      <p>戻ってきたあなたに、バスカロンは満足げにうなずきます。彼は、ささいな偏見から客同士が殴り合うようなことを、何としても許したくないのです。先ほど罵声を浴びせられていたのは、シェーダー族のエレゼンであり、街を避け、森の奥で暮らす彼らは、多くの者から無法者まがいの目で見られているのだとバスカロンは説明します。確かに、シェーダー族の中には手のつけられない荒くれ者もいるが、よく知れば悪い連中ばかりではない。それなのに、わずかな不始末だけを理由に、一族まるごと店から締め出してしまうのは筋が違うと彼は言います。種族や氏族に関わらず、硬貨を払い、静かに酒を楽しむ意思がある者なら誰でも迎え入れられる場所が、この森にひとつくらいあってもいいだろう──そう考えているのです。店内には再びにぎやかな笑い声と杯の触れ合う音が満ち、荒くれ者たちが行き交うこの酒場が、同時に弱き者や少数者の避難所でもあることを、あなたは改めて感じます。そして、バスカロンが店主としてここに立ち続けるかぎり、この場所は喧嘩ではなく、安らぎを求める者たちのための酒場であり続けるのだろうと静かに思うのでした。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> バスカロン　<small class="muted">黒衣森：南部森林 (X:18.1, Y:19.8)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="spirited-away.html">ただよえる長老</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 22～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="never-forget.html">懐かしき忘れ物</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'巴斯卡隆的規矩',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Buscarron’s Druthers 裡，Buscarron 聽完你的近況後，先是皺眉思索了一下，接著露出一貫有些壞笑的表情。關於 sylph elder 的下落，目前還沒有新的消息，不過他相信只要時間一久，總會有人帶回線索。趁著這段空檔，他希望你能回報一點人情。不是什麼驚天動地的任務，而是直接塞給你一盆冰冷的水。酒館外有個客人正吵得不可開交，他想請你去替他「降降火」。Buscarron 說，不需要真把誰的頭打破，只要這一盆冷水澆下去，大多數人就會清醒。他的客人可以通宵灌酒、大吼大叫吵得死人都會醒過來沒關係，但只要一變成動手打架，他這個店主就非得出面踩煞車不可。說完，他用下巴示意門口，你便端起那盆水，往店外走去。</p>
      <p>走出夜色中的 Buscarron’s Druthers，你看見兩個男人正劍拔弩張地對峙著。一位 Drunken Duskwight 咬牙咒罵，說要不是這裡是 Druthers，早就讓對方滿嘴牙齒噴飛；另一頭的 Mead-soaked Midlander 則對你的目光很不爽，揚言再看下去就把你的眼珠打出來。就在拳頭即將揮出的前一刻，你將整盆冷水迎頭澆在那個氣焰最盛的 Midlander 身上。他一聲怪叫，邊罵邊因那股冰冷猛然縮起肩膀，還想抱怨什麼「no fightin’」跟「Duskwight scum」，到最後卻只能悶悶地閉嘴。這裡的規矩他不是第一次聽說，想再怎麼不甘心，也只能暫時收手。隨著他退到一旁，那位 Drunken Duskwight 轉而向你道謝，嘴上還是逞強說像那種「bleatin’ milksop」他自己就能應付，但也坦白表示不想讓 Buscarron 為自己收拾血跡與斷牙。隨著緊繃的氣氛逐漸散去，兩人各自離開，你端著已經空了的水盆回到店裡。</p>
      <p>Buscarron 聽完你的簡單報告後，滿意地點點頭。他說自己可不打算讓客人為了那點狹隘的偏見就互相動手。剛才被罵得最兇的那位，其實是一名 Duskwight Elezen，在許多人口中，那些不住城裡、偏愛躲在荒野過活的人，頂多就是一群山賊。的確，Duskwight 之中不乏難以管束的傢伙，但只要真的相處過，就會發現他們也不是全都那麼糟。為了少數惹事的人，就把整個族群統統拒於門外，讓他覺得很不對勁。對 Buscarron 來說，Twelveswood 至少應該有一個地方，只要願意付錢、願意安分喝酒，不論是什麼種族、什麼出身，都應該能在這裡坐下。當酒杯碰撞的清脆聲與粗獷的笑聲再度填滿整個大廳時，你也感覺得到，這間酒館不只是做生意的場所，更是許多人得以暫時放下偏見與恐懼、單純做個「客人」的避風港。而只要 Buscarron 仍守在吧台後方，這裡就會繼續是那個人人都能走進來、而不需要先拔刀的地方。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 巴斯卡隆　<small class="muted"> 黑衣森林南部林區 (X:18.1, Y:19.8)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="spirited-away.html">飄蕩的族長</a></div>
      <div class="row">所有職業（不含限定職） 等級 22 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="never-forget.html">永不忘懷</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
