    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You are stopped in Limsa Lominsa by S’dhodjbi, who warns you that the city is trembling with rumors of the Slasher of Fisherman’s Bottom. No blood has been found, yet the tale alone has been enough to send fear through every tavern in town. Seeing that you do not frighten easily, he asks if you might lend a hand to the investigation, beginning with the scream that has just rung out nearby.</p><p>When you arrive, you find not a murderer in the act, but a furious woman and a man on the verge of collapse. The woman points at him in outrage and demands that something be done, calling him the very menace the city fears. Yet her anger soon spills into a different grievance: for six moons she has denied herself comfort and spared every coin she could, all for the chance to be transformed by a world-renowned aesthetician newly arrived in Limsa. Instead of the glamorous day she had dreamed of, she finds herself caught in this absurd public scene, and her frustration only grows sharper.</p><p>The flustered man, however, is drowning in misery rather than menace. No matter what he says, he is met with suspicion and horror. When you press him, he laments that everyone has turned against him and declares that the tools taken from him were no mere possessions, but the very extensions of his soul. Weakening by the moment, he gives you three names—H’naanza of Naldiq & Vymelli’s, Beatin of the Carpenters’ Guild, and Severian of the Alchemists’ Guild—and begs you to seek them out and say that Jandelaine sent you. Only then does he finally reveal who he is: not a butcher haunting the streets, but the aesthetician himself.</p><p>You go first to H’naanza, who is far from surprised. She tells you that Jandelaine has once again lost his tools and brought the chaos upon himself with his endless theatrics. Though she has no patience left for his dramatics, she does have pity for you, forced to bear the brunt of them in his stead. In the end, she hands over what he needs, with a warning that if he loses this pair as well, she may as well graft the next one directly to his hands.</p><p>In Gridania, Beatin responds with much the same weary resignation. Jandelaine’s skill, he says, has never been in doubt, but if the man truly regarded his tools as part of himself, he ought to have found some way to keep hold of them longer than a few short weeks. Even so, Beatin does not refuse your request. With a sigh and a measured hope that Jandelaine may yet mend his ways, he entrusts you with another parcel.</p><p>In Ul’dah, Severian proves the most sympathetic of the three. He is astonished that the fresh batch he only recently prepared could already be gone, but when you explain that they were stolen, he accepts it as unfortunate, if hardly unimaginable. In his view, genius is forever misread by lesser minds, and he includes Jandelaine—and himself—among those suffering such a fate. Declaring that great minds must support one another in troubled times, he commands you to hurry back with his contribution.</p><p>When you return to Limsa and place the recovered supplies in Jandelaine’s hands, life seems to rush back into him at once. Strength returns to his fingers, light to his eyes, and with it the full force of his dramatic spirit. In an instant, the frightened woman becomes his first subject, and under his hands she emerges transformed, overcome with awe at the beauty she now sees in herself. Jandelaine proudly proclaims his name and his gift, then turns to you with gratitude. Because you stood by good taste when all others recoiled, he vows that you will never need to wait for his services. Whenever dissatisfaction with your appearance threatens to overtake you, you need only ring the crystal bell from any inn room, and he will come. With that promise, he places in your care a token of trust—the key to aesthetic wonders most people will never know.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>その夜のリムサ・ロミンサで、あなたはス・ホジュビに呼び止められる。街では「漁師町の切り裂き魔」の噂が広がり、まだ血の跡ひとつ見つかっていないにもかかわらず、酒場という酒場に不穏な震えが走っていた。だが、そんな話にも怯えぬあなたを見て、彼は捜査に力を貸してほしいと頼む。ちょうど今しがた聞こえた悲鳴のもとへ向かえば、何かわかるかもしれないというのだ。</p><p>駆けつけた先にあったのは、凄惨な現場ではなく、取り乱した婦人と、追いつめられた男の姿だった。婦人は彼こそ噂の凶漢だと決めつけ、今すぐ捕らえるなり始末するなりしろと激しくまくしたてる。だが、その怒りの底にあるのは別の失望だった。六か月ものあいだ家計を切り詰め、新しい靴も鞄も、時には子どもたちの食事さえ我慢してまで、この日に備えてきたのだという。世界的に名の知れた美容師がリムサ・ロミンサに来る、その一日のために。</p><p>ところが、彼女を待っていたのは華やかな変身ではなく、この騒ぎだった。一方、男のほうは脅威どころか、疑いと恐怖の目にさらされて打ちひしがれていた。あなたが問いただすと、彼は、自分の言葉は何ひとつ信じてもらえず、商売道具まで無残に奪われたのだと嘆く。それは単なる道具ではなく、己の魂の一部も同然だという。息も絶え絶えになりながら、彼はナルディク＆ヴィメリー社のハ・ナンザ、グリダニア木工師ギルドのベアティヌ、ウルダハ錬金術師ギルドのセヴェリアン、この三人を訪ね、自分の名を伝えてほしいと懇願する。そうしてようやく、自らがジャンドゥレーヌであることを明かす。街を騒がせる凶漢ではなく、美を司るあの美容師その人だった。</p><p>まず訪ねたハ・ナンザは、事情を聞いても驚きもしなかった。ジャンドゥレーヌがまた道具をなくしたのだろうと、半ば呆れたように言い放つ。あれほど大仰に騒ぎ立てず、職人らしく実直に仕事をしていれば、余計な誤解を招かずに済むのに、と彼女は手厳しい。ジャンドゥレーヌへの同情はないが、その騒ぎに巻きこまれたあなたには哀れみを覚えると言い、必要な品を持たせてくれる。そして、今度また失くすようなら次はその手に直接くっつけてやる、と物騒な言葉まで添えた。</p><p>グリダニアのベアティヌもまた、深いため息とともに似たような反応を返す。ジャンドゥレーヌの腕前は疑いようもないが、道具が本当に己の一部だというのなら、せめてもう少し長く手元に留めておく工夫をすべきではないか、と静かにたしなめる。それでも依頼を無下にはせず、いくらかの諦めと、わずかな期待を込めて、品をあなたに託す。願わくは彼が少しでも己を改めてくれればよいのだが、と。</p><p>最後にウルダハで会ったセヴェリアンは、つい先日新しい品を渡したばかりだと驚きを見せる。だが盗まれたと聞くと、不運ではあるが、まったくありえない話でもないと受け止めた。天才とは往々にして凡庸な者たちに理解されぬものだと、彼は自らの経験を引き合いに出しながら語る。そして、ジャンドゥレーヌもまたそうした類いの才人だと認め、非常時には偉大な頭脳どうしが支え合わねばならないと、あなたに品物を託して急ぎ戻るよう命じるのだった。</p><p>再びリムサ・ロミンサへ戻り、集めた品をジャンドゥレーヌに渡した瞬間、彼の身にはたしかな活力がよみがえる。瞳には光が戻り、指先には力が満ち、失われていた自信と熱が一気によみがえった。そうして彼は、目の前の婦人にその技を振るう。ひとたび施術が終わると、先ほどまで怒りと困惑に満ちていた彼女は、見違えるほどの歓喜に包まれていた。ジャンドゥレーヌは誇らかに名乗りを上げ、自らの才を示したうえで、今度はあなたに感謝を向ける。誰もが見て見ぬふりをするなか、美への信義を捨てずにいてくれた礼として、あなたには待ち時間も予約も無縁だと言う。今後、宿屋の部屋でクリスタルベルを鳴らしさえすれば、彼はいつでも駆けつける。そして最後に、ふたりの信頼の証として、常人には知りえぬ美の世界への鍵をあなたへ託すのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">

  ZH:{
    langLabel:'ZH',
    pageTitle:'名美容師的激進美學',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>那一夜在 Limsa Lominsa，S’dhodjbi 攔下了你，語氣裡滿是壓不住的不安。整座城正被「Fisherman’s Bottom 的開膛手」這個傳聞攪得人心惶惶，明明還沒有人見到半點血跡，光是流言本身，就已足夠讓各間酒館裡的人都背脊發涼。見你不像旁人那樣輕易被嚇退，他便請你幫忙查一查，至少先去看看方才外頭傳來的那聲尖叫究竟是怎麼回事。</p><p>你趕到現場時，眼前並不是什麼血腥的犯案場面，而是一名怒不可遏的婦人，以及一個快要崩潰的男人。那名婦人一口咬定對方就是眾人議論的兇徒，氣急敗壞地要人立刻把他關起來，甚至恨不得當場處理掉他。可她真正的怒火，卻不只來自驚嚇。她說自己整整六個月都在省吃儉用，捨不得買新鞋、捨不得買新包，甚至有時連孩子們的口糧都要擠出來，只為了等這一天到來——因為一位聞名世界的美容師終於來到了 Limsa Lominsa。</p><p>她原本以為，自己長久的忍耐終於能換來一次足以驚豔全城的改頭換面，沒想到等來的卻是這場荒唐的騷動。至於那名男人，與其說像個兇徒，倒更像是被逼到走投無路的人。你開口追問後，他悲嘆自己無論說什麼，都只換來懷疑與驚恐的眼神，連自己的工作工具都被人硬生生奪走。對他而言，那些並不只是工具，而是靈魂的延伸。眼看他一副隨時都要倒下去的模樣，他勉強報出三個名字，Naldiq & Vymelli’s 的 H’naanza、Gridania 木工師公會的 Beatin，以及 Ul’dah 鍊金術師公會的 Severian，懇求你去找他們，並告訴他們是 Jandelaine 要你來的。直到這時，他才終於吐露自己的身分：他不是什麼在街頭遊蕩的狂人，而正是那位美容師本人。</p><p>你先去見了 H’naanza。她一聽就明白了個大概，甚至沒有露出多少意外。對她而言，Jandelaine 不過又一次把自己的工具弄丟，然後用那套誇張到近乎災難降臨的做派，把事情鬧得不可收拾。她對他的戲碼早已沒剩多少同情，反倒更可憐你，還得替他承受這一切。不過話雖刻薄，她還是把該給的東西交到你手上，並冷冷撂下一句：要是他連這次也弄丟，下一套乾脆直接縫到他手上算了。</p><p>到了 Gridania，Beatin 的反應也差不了多少。他承認 Jandelaine 的本事從來無須懷疑，可若那些工具真如他所說，是自己生命的一部分，那他至少也該想辦法把它們留在身邊久一點，而不是隔沒多久就再丟一次。即便如此，Beatin 仍沒有拒絕你的請求，只是帶著一聲無奈的嘆息，把另一份物品交給你，也盼著 Jandelaine 有朝一日能稍微收斂些，別再把事情鬧成這副模樣。</p><p>最後在 Ul’dah，Severian 顯得最能理解他的處境。他訝異地表示，自己明明上週才剛替 Jandelaine 準備好一批新的物品，照理說根本不可能這麼快就用盡。可當你說明那些東西是被偷走後，他很快便接受了這個說法，甚至覺得這雖然不幸，卻也並不算完全出人意料。在他看來，真正的天才總是容易被庸人誤解，而這種事，他自己也深有體會。因此他毫不猶豫地把東西交給你，要你立刻帶回去，畢竟在這種時候，偉大的頭腦本就該彼此扶持。</p><p>當你回到 Limsa Lominsa，將三人交付的物品一一交還給 Jandelaine 時，他整個人像是瞬間被重新點亮了一般。光芒回到了他的眼裡，力量回到了他的指尖，連原本奄奄一息的姿態也一下子被那股誇張而強烈的自信取代。接著，他立刻把眼前那位婦人當成了第一位施展技藝的對象。等一切結束後，那名方才還滿腹怨氣的婦人，已經像是親自經歷了一場新生般，驚嘆得幾乎說不出話來。Jandelaine 於是高傲而燦爛地報上自己的名字，宣示自己正是那位能讓美麗重獲新生的人。隨後，他把目光轉向你，真心感謝你在所有人都選擇退開時，仍願意站在美感這一邊。作為回報，他答應你，從今以後，你不必像旁人那樣苦苦排隊等待。只要你住進任何旅館房間，搖響那只水晶鈴，他就會立刻現身。最後，他把一枚象徵信賴的信物交到你手中，那是通往美容奇蹟之門的鑰匙，也是只有你才能輕易喚來的承諾。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    </div>`,

      <div class="row">只要任一職業達到等級 15 以上即可</div>
    </div>`,
    followq:`<div class="stack"><div class="row">髮型師的俐落妙手</div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

// giscus
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
