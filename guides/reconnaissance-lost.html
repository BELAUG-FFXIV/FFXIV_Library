  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}

    .link{color:#0b60d8;text-decoration:none}

    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`Reconnaissance Lost`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Redwald studies you with a steady gaze and seems almost satisfied that you remain calm despite the weight of what he is about to say. A veteran, he calls you—just as Lord Drillemont described—and he wastes no time on pleasantries. A reconnaissance party sent north to Riversmeet to search for the heretics’ hideaway has gone silent. Whether they were attacked or struck by some other misfortune, no one can yet say, but in Coerthas delay is its own danger. This land is brutal, and it has already claimed too many lives.</p><p>To find the missing knights quickly, Redwald has divided the search among multiple groups. Your assignment is clear: you will work with Lord Artoirel. When you are ready to depart, you are to seek him out—and bring their people home. With that order hanging in the air, there is nothing left but to move.</p><p>Artoirel meets you with the map and informs you that your area lies near Camp Riversmeet. He explains that the camp was one of many positions Ishgard’s knights were forced to abandon when they withdrew from Coerthas Western Highlands—one sacrifice among countless others made in the wake of the Calamity. If the reconnaissance party is still alive, he says, it would not surprise him if they had taken shelter there. There is only one way to know. You set out at once.</p><p>From the cliffs above, you spot the remnants of Camp Riversmeet below. There is no safe way down from where you stand, and Artoirel warns that a fall would leave you helpless for the beasts waiting beneath. He leads you instead toward a path to the riverbed, east of Black Iron Bridge, and you press on. Along the way, you find no sign of the party, but Artoirel refuses to assume the worst. Recent storms may have erased their tracks, or they may have taken another route. Until you confirm the camp itself, nothing is certain.</p><p>At last you reach Camp Riversmeet—and find it seemingly deserted. Yet Artoirel cannot shake the sense that something is wrong. He tells you to search the camp while he keeps watch, for you cannot afford to be taken unawares. The warning proves justified. In the midst of the ruins, hostile shapes close in, and a knight’s voice breaks through the chaos—surrounded, desperate, and fading. You cut down the attackers and reach him in time. Artoirel arrives to find three heretics dead and one knight saved, and he acknowledges that you have lived up to your reputation.</p><p>The surviving knight, battered and struggling for breath, forces out what happened. They were caught north of here in a furious blizzard—nothing but white, until figures came running at them with naked steel. He killed a few who drew close, but the rest of his comrades were overwhelmed, and the voices around him became unfamiliar. He fled to the camp to hide until the storm passed, only for the heretics to track him down. Even now, he insists, their hideaway lies somewhere to the north, and you must move quickly before the snow buries every trace. His strength fails as he tries to finish the thought. Artoirel tells him to have faith—justice will be done—but first you must get him to safety.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Redwald <small class="muted">(Coerthas Western Highlands, X:32.6, Y:38.3)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="from-on-high.html">From on High</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 50</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="at-the-end-of-our-hope.html">At the End of Our Hope</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'哨戒部隊を捜索せよ！',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>レドヴァルトは、状況の重さを前にしてもなお落ち着いているあなたを見て、まるで確かめるように言う。歴戦の者らしい振る舞いだ――ドリルモン卿が語っていたとおりだと。だが彼はすぐに本題へ入る。異端者の隠れ家を探すため、リバーズミート方面へ向かった哨戒の偵察部隊と連絡が途絶えたのだ。襲撃を受けたのか、あるいは別の不運に見舞われたのかは分からない。しかし原因が何であれ、クルザスでは一刻の遅れが命取りになる。苛烈なこの地は、多くの命を奪ってきたのだから。</p><p>一刻も早く行方不明の騎士たちを見つけるため、レドヴァルトは捜索範囲を複数の隊に割り振ったという。あなたはアルトアレールと組んで動くことになった。出発の用意ができたら彼を探し出し、必ず騎士たちを連れ戻せ――そう告げられ、あなたは次の行動へ踏み出す。</p><p>アルトアレールは地図を手に、今回の担当がキャンプ・リバーズミート周辺だと告げる。そこはかつてクルザス西部高地から撤退した際、騎士たちが放棄せざるを得なかった拠点のひとつであり、第七霊災の後に積み重なった数多の犠牲のひとつでもある。偵察部隊が生きているのなら、あそこに身を寄せている可能性は十分にある。確かめる方法はひとつだけだ――そう言って、彼は出立を促す。</p><p>やがて崖上から、眼下にキャンプ・リバーズミートの残骸が見える。だがここから安全に降りる術はなく、落ちれば下の獣に食い尽くされるだけだとアルトアレールは警告する。そこで彼は、ブラックアイアン・ブリッジの東にある川床へ下りる道を知っていると言い、遠回りでも確実なルートを選んで進む。途中、偵察部隊の痕跡は見当たらない。だが嵐が足跡を消したのかもしれないし、別の道を取ったのかもしれない。現地を確かめるまで断定はできない――彼はそう言って歩みを止めない。</p><p>キャンプに到着すると、そこは一見無人だった。にもかかわらず、アルトアレールは拭いきれない違和感を覚え、あなたに内部を捜索するよう頼み、自分は周囲を警戒すると言う。敵に不意を突かれるわけにはいかない。直後、悪意ある気配が現実となり、異端者が襲いかかる。囲まれた騎士の呻き声が聞こえ、あなたは即座に応戦してこれを退ける。駆けつけたアルトアレールは、異端者三名を討ち、騎士ひとりを救い出したあなたの働きを認め、まさに噂どおりだと告げる。</p><p>救われた騎士は、荒い息の合間に状況を語る。北で猛吹雪に遭い、あたりは白一色になった。そこへ裸の刃を手にした影が走り寄り、彼は近づいた数人を斬り伏せたが、仲間たちは次々と倒れ、やがて聞こえるのは見知らぬ声ばかりになったという。彼は嵐が過ぎるまで隠れようとキャンプへ逃げ込んだが、異端者に追跡されてしまった。さらに彼は、異端者の隠れ家はこの先北にあるはずだ、雪に痕跡が埋もれる前に急がねばならないと訴える。しかし言葉の途中で体力が尽きかける。アルトアレールは、裁きは必ず下ると諭しつつ、まずは彼を安全な場所へ運ぶことが先決だと告げるのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> レッドワルド <small class="muted">（クルザス西部高地, X:32.6, Y:38.3）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="from-on-high.html">届かぬ届け物</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="at-the-end-of-our-hope.html">足跡が導く再会</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'失聯的偵察隊',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Redwald 望著你，語氣裡帶著一種近乎確認的評價，在這種情況下仍舊這麼冷靜，果然是貨真價實的老兵，正如 Lord Drillemont 所說。接著他立刻切入重點：一支被派往北方、前往 Riversmeet 搜尋異端者藏身處的偵察隊失去了聯絡。究竟是遭到襲擊，還是遇上別的意外，暫時無從得知；但無論原因是什麼，都必須立刻行動。Coerthas 是一片嚴酷又不留情的土地，奪走人命這件事，它早已做過太多次。</p><p>為了儘快找回失蹤的騎士們，Redwald 把搜索範圍分配給不同隊伍，而你將與 Lord Artoirel 一起行動。等你準備好出發，就去找他會合，務必把他們的人帶回來。命令下得乾脆，留給你們的只剩時間與風雪。</p><p>Artoirel 拿著地圖告訴你，你們被分派到 Camp Riversmeet 附近。他也提醒你，那座營地曾是 Ishgard 騎士在 Coerthas Western Highlands 設立的據點之一，但在 Calamity 之後，撤退的代價逼得他們不得不放棄許多地方，Camp Riversmeet 只是其中之一。若偵察隊還活著，躲進那裡避風雪也不奇怪。要確認只有一個方法，直接去看。於是你們立刻動身。</p><p>抵達附近後，你們從高處看見下方的 Camp Riversmeet 殘跡，可這裡沒有安全下去的路。Artoirel 警告你，若從峭壁失足跌落，下面的野獸很快就會把你們撕碎。於是他帶你改走一條更穩妥的路線，準備從 Black Iron Bridge 東側下到河床再繞過去。途中你們沒有找到偵察隊留下的痕跡，但 Artoirel 不願就此下結論，可能是最近的風暴掩蓋了足跡，也可能他們改走了別的路。只要還沒親眼確認營地狀況，一切都不能算數。</p><p>你們終於來到 Camp Riversmeet，乍看之下空無一人，可 Artoirel 卻怎麼也甩不掉那股不對勁的感覺。他要你進去搜查，自己則留在外圍警戒，因為你們絕不能讓敵人趁隙突襲。下一刻，敵意果然撲了上來。你在營地裡遭遇異端者的襲擊，迅速反擊並擊倒對方，同時救下了一名被困的騎士。聽見打鬥聲趕來的 Artoirel 看著倒下的三名異端者與被救回的騎士，承認你確實名不虛傳。</p><p>那名偵察隊騎士幾乎是用剩下的力氣把話說完。他們在北方遭遇猛烈暴風雪，四周只剩白茫一片，直到看見影子在雪裡逼近，那些人握著裸露的刀刃奔向他們。他砍倒了幾個靠近的敵人，可其他同伴很快就被衝散；喊叫聲漸漸遠去後，他耳邊只剩陌生的聲音。他一路摸到 Camp Riversmeet，想先躲起來等風雪過去，卻還是被異端者追蹤到這裡。他喘著氣說，異端者的藏身處應該就在更北邊，必須趁積雪埋掉痕跡前立刻追查，否則兄弟們就……話還沒說完，他又咳又喘，幾乎撐不住。Artoirel 讓他先別急，正義一定會到來，但在那之前，最重要的是先把他送到安全的地方。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Redwald <small class="muted">(庫爾札斯西部高地, X:32.6, Y:38.3)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="from-on-high.html">無法送達的物品</a></div><div class="row">任一戰鬥／魔法職業（不含受限職業）Lv. 50</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="at-the-end-of-our-hope.html">循著足跡再相會</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
