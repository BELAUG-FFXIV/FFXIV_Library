    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You wait at Little Solace while the Serpent Lieutenant watches for word from your fellow Scions. He assures you a messenger will be sent the moment their investigation concludes, and he doubts you will be kept waiting much longer. Before long, Maxio comes rushing back with bubbling excitement, proclaiming that the wise ones have finished searching and have identified the precise place where the touched ones summoned Lord Ramuh. The Serpent Lieutenant greets Maxio with relief and asks for an escort—will Maxio lead you to the other Scions? Maxio is delighted to do so, and you set off at once, the lieutenant calling after you to stay safe and go with godsspeed.</p><p>Maxio leads you deep into the Sylphlands, warning that the wise ones have ventured far within and that you must proceed carefully, keeping watch for touched ones. Yet when you draw close to the place where Ramuh’s presence weighs upon the air, Maxio stops short. Maxio apologizes, saying Maxio can go no further—if Maxio approaches Ramuh, Maxio might turn mean and nasty like the touched ones. Maxio points you south, promising the wise ones are not far from there, and sends you onward in safety.</p><p>You find your companions amid the trees, and Y’shtola greets you with a weary warning not to ask what happened—only that there was “something of a situation.” Yda immediately turns it into a joke, rapidly reciting who is who to prove everyone is themselves, then cheerfully introduces “this one” as Yda before revealing it is only a joke. Thancred, still cautious, asks if it really is you. Papalymo admits he is relieved; for a moment he feared yet another sylph trickster, with their skin-changing magicks. He grumbles that with the sylphs wreaking havoc, it is a wonder he managed to finish taking his measurements at all—and then almost cannot resist describing the look on Y’shtola’s face when someone impersonating you appeared. Y’shtola cuts him off.</p><p>Papalymo regains his composure and explains the point: he has finished measuring aetheric activity in the area, and he has reached an indisputable conclusion—Ramuh was called forth in the vicinity of the sylphs’ aetheryte. He tells you the Lord of Levin awaits, and you move forward to the place of judgment.</p><p>Ramuh’s voice reaches you in words unlike any you have heard, yet the Echo makes them clear. Ramuh names you at once: a servant of Hydaelyn, the Bringer of Light, bane of Ifrit, Titan, Garuda, and Leviathan. Ramuh declares Ramuhself guardian of the children of the forest and demands to know by what right man intrudes upon the sylphs’ sanctuary. When you come in the name of peace, Ramuh rejects it as delusion and insult—harmony spoken by those who do not heed the sylphs’ wishes. The sylphs asked only to live in solitude beneath these boughs, and even that, Ramuh says, mankind would not allow.</p><p>Ramuh condemns the conflicts men bring to the Twelveswood. Gridanian or Garlean, it matters not; the good intent of one does not excuse the misdeeds of another. Anguish and misery have followed men into the forest, and Ramuh lays blame upon the darkness that resides in the breast of man. Ramuh even questions the very nature of mankind—whether light and dark were given form when man was born, for strife and sorrow always follow in your wake, as if you cannot deny the urgings of your nature. Knowing that your presence here portends tragedy, Ramuh asks whether you will persist in this pretense of peacemaking.</p><p>Then Ramuh’s judgment shifts. Ramuh sees the crystal you carry—the one Ramuh bestowed upon Ramuh’s wayward charges—and notes that they entrusted such a precious gift to you. Ramuh senses that you stand apart from your kin: you are the Bringer of Light, yes, but there is something more in you. Ramuh will consider your proposal—if you survive a trial. If you would champion harmony, Ramuh demands proof you are fit for the role. You must weather Ramuh’s ire, and show you have strength enough to stay the Darkness that threatens to consume you. Fail, and all men will perish in the storm of Ramuh’s judgment. Ramuh calls you to the field of battle.</p><p>As the air still trembles with what you have heard, Y’shtola notices Urianger nearby—rare to see him so far from his tomes. Urianger confesses awe: never until this day had he seen the Lord of Levin except in faded paintings, and the sight will remain etched in his mind. Then he turns to purpose, asking your leave to observe the coming confrontation for his research.</p><p>You face Ramuh’s trial at the Striking Tree, and when it ends, Ramuh speaks again through the Echo. Ramuh says Ramuh has taken your measure and judges you a worthy champion. The task of excising the sin that has taken root in man’s heart is yours; you must not shrink from using your strength in service to the forest and the wider realm, for enemies of harmony gather like hungering shadows, and meekness will only feed them. If man is to be delivered from the Dark, it will be by your guiding Light alone—do not stray, or your people will be truly lost.</p><p>Urianger names what has happened with grim clarity: you have slain the Lord of Levin—a regrettable act, but a necessary one. Yet in watching your struggle, he says, a truth has been revealed to him; if he is not mistaken, it may become a chink in the eternal armor of the Ascians. He asks that you conclude what remains for now, and promises to explain his findings at the Rising Stones later.</p><p>When you return to Little Solace, the Serpent Lieutenant hails you with relief and asks how Ramuh received your visit. Hearing that Ramuh challenged you to a test of arms, he says it is well you have experience in such matters. Both Gridania and Little Solace, he believes, will be relieved to know the Lord of Levin has accepted you as the forest’s champion of peace. You have performed a monumental duty this day, and the Elder Seedseer must be informed at once.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="what-little-gods-are-made-of.html">What Little Gods Are Made Of</a></div></div>`

  JP:{
    langLabel:'日本語',
    pageTitle:'裁きの雷',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたはリトルソレースで待機し、双蛇党の中尉から、暁の仲間たちの調査が終わり次第使者を出すと聞かされる。そう長くはかからないはずだ――その言葉どおり、ほどなくしてマキシオが駆け戻り、弾む声で告げる。賢き者たちは探索を終え、「触れられし者」たちが裁きの雷神ラムウを呼び出した正確な場所を、賢くも突き止めたのだと。中尉は絶妙のタイミングだと喜び、あなたを仲間のもとへ案内してほしいと頼む。マキシオは喜んで引き受け、あなたを誘う。中尉は背中に声を投げる――頼んだぞ、安全に、武運を。</p><p>マキシオはあなたをシルフ領の奥へ導き、賢き者たちが深く深く踏み込んでいるから注意深く進むのだと繰り返す。「触れられし者」には気をつけるのだ、と。だが、ラムウの気配が濃くなる地点に近づくと、マキシオは足を止める。これ以上は行けない、と。ラムウに近づきすぎれば、自分も「触れられし者」のように意地悪で乱暴になってしまうかもしれない――だからここで別れる、と。賢き者たちは南にいる、そう遠くない、と告げ、あなたの無事を祈って見送る。</p><p>あなたが辿り着くと、ヤ・シュトラは疲れた声で言う。「聞かないで。いろいろあった」とだけ。イダは場を軽くしようと、みんなが本当に本人かどうかを冗談めかして確認し始める。サンクレッドは念のために「本当にお前か」と確かめ、パパリモは心底ほっとしたと認める。シルフの変身魔法に振り回され、またしてもあの厄介なトリックスターを相手にしているのかと思ったのだ、と。彼は、混乱の中でも測定を終えられたのが不思議だと愚痴り、さらに「あなたの偽物」が現れたときのヤ・シュトラの顔を語りかけるが、ヤ・シュトラが制止する。</p><p>パパリモは咳払いして謝り、本題に戻る。周辺のエーテル活動の測定を終え、動かぬ結論に至った――ラムウは、シルフたちのエーテライト付近で呼び出されたのだ、と。彼はあなたを促す。裁きの雷神が待っている。あなたは一歩、また一歩と踏み込み、対面の場へ進む。</p><p>ラムウの言葉は奇妙な響きを持ちながらも、あなたにはエコーによって理解できる。ラムウはあなたの気配で看破する。あなたはハイデリンの使徒、「光の戦士」――イフリート、タイタン、ガルーダ、リヴァイアサンを討った者だ、と。ラムウは森の子らの守護者だと名乗り、聖域を踏み荒らすあなたに問いただす。なぜ人はシルフの聖地へ侵入するのか。グリダニアが和平を差し出すというのなら、その言葉は妄想に基づく――あなたの提案は侮辱だ、と。調和を語りながら、森の子らの望みを顧みない。彼らはただ、この枝の下で静かに暮らしたかっただけなのに、それさえ人は許さなかった――だから彼らはラムウに救いを求めたのだ、と。</p><p>ラムウは断じる。グリダニアであろうとガレマールであろうと関係ない。ひとりの善意が、もうひとりの悪行を免罪しはしない。人の争いは森に苦痛と悲惨だけを持ち込み、責はすべて「人の胸に宿る闇」にある。さらにラムウは、人の本質そのものに踏み込む。はじめ、光と闇の二元など存在しなかったのではないか――人が生まれたとき、光と闇が形を得たのか。あなたの後には常に争いと悲しみがつきまとい、あなたは自らの性に抗えない。ここにいるだけで悲劇を招くと知りながら、それでも和平の芝居を続けるのか、と。</p><p>だがラムウは、あなたが携えるクリスタルに目を留める。迷える子らへ授けたその貴き結晶を、彼らがあなたに託したというのか――そして、あなたは同胞とは異なる場所に立っている。あなたは光の戦士である、しかしそれ以上の何かがある――と。よかろう、提案を考慮しよう。だが、それは試練を生き延びたなら、だ。調和を掲げるなら、その役目に足ることを証明せよ。闇があなたを蝕むのを食い止めるだけの力があると示せ――ラムウの怒りに耐えよ。もし力及ばぬなら、人はみな、裁きの嵐で滅びる。ラムウはあなたを戦場へ呼び、待つと宣言する。</p><p>その場でヤ・シュトラはウリエンジェを見つける。書物から離れた彼を見るのは珍しい。ウリエンジェは興奮を抑えきれず、裁きの雷神の姿を、時を経て色褪せた絵でしか知らなかったのに、今日この目で見たと語る。彼は我に返って詫び、研究の一点について助力を乞う。あなたがラムウと相対するなら、その一部始終を観察させてほしい、と。</p><p>あなたは「ストライキングツリー」で試練を受け、戦いの後、ラムウはエコー越しに告げる。お前を量り、相応しき闘士と認めた、と。人の心に根づいた罪を断ち切る務めはお前にある。森と、さらに広き世界のために力を振るうことを恐れるな。調和の敵は飢えた影のように群れ集い、弱さはそれを肥えさせるだけだ。人が闇から救われるのなら、それはお前の導く光によってのみ――道を外れるな、さもなくばお前の民は真に迷い失われる、と。</p><p>ウリエンジェは厳しい言葉で現実を告げる。あなたは裁きの雷神を討った。悔やむべき行いだが、必要だった――と。だが、あなたの戦いを見届けたことで、ある真実が自分に明らかになった。もし見誤りでなければ、それはアシエンの永き鎧に生じる「綻び」になり得る。いまは目の前の用事を終え、真相は後日ライジングストーンズで語る、と彼は言う。</p><p>リトルソレースへ戻ると、双蛇党の中尉があなたを迎え、ラムウがどう応じたのかと尋ねる。試練のための戦いを挑まれたと聞き、中尉はあなたに経験があって何よりだと言う。そして、裁きの雷神があなたを「森の平和の擁護者」として受け入れたと知れば、グリダニアもリトルソレースも安堵するだろう、と。あなたが成し遂げた務めは計り知れず大きい。先代当主へ、ただちに報告せねばならない、と。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> 双蛇党中牙士 <small class="muted">（黒衣森：東部森林, X:21.9, Y:25.7）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="lord-of-levin.html">雷神ラムウ</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div><div class="row row-split"><b>討伐戦開放</b><a class="link" href="the-striking-tree-hard.html">真ラムウ討滅戦</a></div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="what-little-gods-are-made-of.html">還りし神、巡りし魂</a></div></div>`
  },

    story:`<div class="clamp" data-collapsed="true"><p>你在 Little Solace 等候時，Serpent Lieutenant 告訴你：等其他 Scions 的調查一結束，就會立刻派人來通報；他認為不會等太久。很快，Maxio 便帶著興奮的好消息回來，說賢者們已經完成搜尋，也「明確找出了」touched ones（指被 primal 的影響所「碰觸／沾染」的人（常見情況是被 tempering 影響，心智與意志被扭轉），因此會對該 primal 表現出近乎強迫性的服從與狂熱，並可能對外來者產生敵意或做出異常行為。在這段劇情語境裡，指的是受到 Ramuh 的影響的 sylphs 或相關個體，所以才會被監視其動向、也被擔心會「變得兇狠」或引發危險）召喚 Lord Ramuh 的精確位置。Serpent Lieutenant 立刻稱讚 Maxio 來得正好，並請 Maxio 帶你去會合其他 Scions。Maxio 愉快答應，催你跟上；而 Serpent Lieutenant 也在你出發前叮囑你一定要平安，並為你送上祝福。</p><p>Maxio 引你深入 Sylphlands，反覆提醒賢者們已經走得很深很深，你必須小心前進，並隨時警戒 touched ones。可是當你越走越接近 Lord Ramuh 的氣息時，Maxio 卻突然停下，歉然表示自己不能再往前了——若太靠近 Lord Ramuh，Maxio 可能會像 touched ones 一樣變得兇狠、變得惡意。Maxio 只能在此道別，並指向南方說賢者們就在不遠處，要你一路小心、平安前行。</p><p>你抵達會合點時，Y’shtola 先用一句低沉的話把所有追問擋回去——別問，只要知道這裡剛剛「出了點狀況」就好。Yda 立刻想把氣氛拉回來，故意用一連串「誰是誰」的說法確認大家都還是本人，還打趣說「這個」叫 Yda，怕你忘了——然後又立刻說只是開玩笑。Thancred 仍舊保持警覺，直接盯著你確認你真的是你。Papalymo 則毫不掩飾自己的鬆一口氣：他剛才還以為又要對付那種討厭的 sylph 惡作劇者——那些會用變換外貌的魔法搗亂的傢伙。他抱怨說在那種混亂裡還能把測量做完真是奇蹟，甚至差點又要提起「有人冒充你」時 Y’shtola 的表情，但 Y’shtola 立刻打斷他。</p><p>Papalymo 這才咳了一聲收斂起來，向你說明結論：他已經完成對附近 aether 活動的測量，並得到無可置疑的結果——Ramuh 就是在 sylph 的 aetheryte 附近被召喚出來的。Papalymo 催你立刻上前：Lord of Levin 正在等你。你於是踏入那片更為沉重的靜默，走向即將降下裁決的存在。</p><p>Ramuh 的話語帶著陌生而古老的語感，但你透過 Echo 能清楚理解。Ramuh 一開口便直指你的本質：你的氣息出賣了你，你是 Hydaelyn 的僕從；你是 Bringer of Light，是 Ifrit、Titan、Garuda、Leviathan 的剋星。Ramuh 自稱是森林之子的守護者，質問你為何要踏入 sylph 的聖域——人憑什麼闖入這片神聖之地。當你以和平為由而來，Ramuh 卻把那視為妄想與羞辱：你口口聲聲談和諧，卻根本不在意他的孩子真正想要什麼。sylphs 只想在枝葉之下安靜地獨居，可是連這點要求，人也不肯給；因此他們才轉向 Ramuh 求援，而 Ramuh 對你們「人類」的判決自認公正。</p><p>Ramuh 說，不論 Gridania 或 Garlean 都一樣；一方的善意不能替另一方的惡行開脫。你們的衝突只把痛苦與悲慘帶進森林，責任全在「人心裡的黑暗」。他甚至追問這黑暗從何而來：最初或許根本不存在光與暗的二元對立，是否在人誕生時才讓光與暗有了形體？這也解釋了為何爭鬥與悲傷總跟在你身後——你無法否認自身本性帶來的驅使。既然你光是站在這裡就預示悲劇，你還要繼續裝作是在追求和平嗎？</p><p>然而 Ramuh 的語氣在此刻轉了一折。他注意到你身上帶著那顆結晶——那是他賜予自己那些迷途孩子的禮物，而他們竟把如此珍貴之物託付給你。Ramuh 也察覺你與你的同類不同：你確實是 Bringer of Light，但你身上還有「更多」。因此 Ramuh 願意考慮你的提案——前提是你得在他的試煉中活下來。若你真要成為和諧的捍衛者，就必須證明自己配得上這個角色：承受他的怒火，證明你有足夠的力量阻止那企圖吞噬你的黑暗。若你不夠格，Ramuh 警告，所有人都將在他的裁決風暴中滅亡；然後他命令你前來戰場，他會在那裡等你。</p><p>就在你準備迎向試煉時，Y’shtola 注意到 Urianger 也到了——這種離開書卷的場合對他而言很少見。Urianger 難掩震撼，說自己直到今天以前，只在年代久遠、色彩褪去的畫作裡見過 Lord of Levin 的樣貌；而此刻的景象將永遠刻在他的眼中。他很快回神向你致歉，並請求你允許他為研究而旁觀：若你決意面對 Ramuh，他希望能觀察整個過程。</p><p>你在 The Striking Tree 接受 Ramuh 的試煉。戰後，Ramuh 再度透過 Echo 對你宣告他已衡量過你，並判定你是值得的鬥士；「拔除」人心中扎根的罪，將成為你的責任。他要你別退縮，將力量用在守護森林與更廣闊的世界——因為和諧的敵人正像飢餓的影子一樣聚集，而怯弱只會餵養他們。若人類要從 Dark 中被拯救，只能靠你引導的 Light；不要偏離道路，否則你的族群將真正迷失。</p><p>Urianger 以沉重的語氣說出結果：你擊倒了 Lord of Levin——令人遺憾，卻是必要之舉。但他也說，見證你的奮戰後，他被揭示了一項真相；若他沒有誤判，這或許會成為 Ascians 那副永恆甲胄上的一道裂縫。他要你先把眼前的事收束，並表示等回到 The Rising Stones 後再詳述他的發現。</p><p>你回到 Little Solace 時，Serpent Lieutenant 立刻迎上來，問 Ramuh 對你的造訪作何反應。當他聽見 Ramuh 以武力試煉你，他反而鬆了一口氣，說幸好你對這種事有經驗。接著他相信，不論是 Gridania 或 Little Solace 的人，都會因為 Lord of Levin 接受你成為森林和平的擁護者而感到安心。他說你今日完成了極其重大的使命，必須立刻把你的事蹟回報給 Elder Seedseer。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 雙蛇黨中牙士 <small class="muted"> 黑衣森林東部林區（X:21.9, Y:25.7)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="lord-of-levin.html">雷神拉姆</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div><div class="row row-flex"><b>解鎖試煉</b><a class="link" href="the-striking-tree-hard.html">真 拉姆殲滅戰</a></div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="what-little-gods-are-made-of.html">神靈歸位、靈魂輪迴</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
