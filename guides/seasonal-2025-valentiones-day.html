  <style>
    :root{ --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;
  overflow-y:auto;
  padding-right:8px;
  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}

    /* expandable story */
    .story-wrap{position:relative}
    .story-content{max-height:360px;overflow:hidden;position:relative}
    .story-content::after{content:"";position:absolute;left:0;right:0;bottom:0;height:64px;background:linear-gradient(to top,var(--card),transparent)}
    .story-expanded{max-height:none!important}
    .story-expanded::after{display:none}
    .expand-btn{margin-top:8px;background:#fff;border:1px solid var(--border);padding:8px 12px;border-radius:10px;cursor:pointer;font-weight:600}
    @media (max-width:600px){.story-content{max-height:260px}}
  </style>

        tabs:{ story:'Story', acq:'Acquisition', event:'Event Period', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
        story:`<div class="story-wrap"><div class="story-content">
<p>In Old Gridania, hearts and roses fill the streets as Valentione’s Day begins. A butler of House Valentione points you toward Mih Khetto’s Amphitheatre, where Astrid and Emilie greet you amid blooming bouquets. This year’s festivities hinge on roses grown by Laurovic, a botanist whose thoughts are far from celebratory: he tells you of Sylginie, an Ishgardian botanist he once worked beside, whose shared love of roses blossomed into romance—until she vanished, leaving him only a pouch of rare Driancoin seeds. The roses now given to lovers across the city are grown from those seeds, and when Laurovic spotted Sylginie in the crowd, wearing the rose earring he gifted her, she disappeared again before he could reach her. He begs you to find her.</p>
<p>You search around Mih Khetto’s Amphitheatre, mistaking other women with floral ornaments before finally meeting the one with the rose earring. She listens to your words with a hand over her heart, admits she still loves Laurovic, yet asks you to tell him to forget her; the shame she carries is too heavy. Back at Fen-Yll Fineries, Laurovic refuses to accept that answer. At that moment Ser Titouan, a knight of House Haillenarte, arrives and recognizes the roses as the Driancoin—once a symbol permitted only to his house. From him you learn that Sylginie tended their rose gardens until the Calamity’s cold froze Coerthas and every Driancoin withered, and that she vanished soon after. To draw her out without chasing her all over Eorzea, you suggest a rumor: that Laurovic has been apprehended by an Ishgardian knight over the stolen seeds. With the help of eager gossips, the story spreads quickly through the Shaded Bower.</p>
<p>At Greatloam Growery, Laurovic waits anxiously until Sylginie finally arrives, rushing in to take the blame upon herself. She confesses that she brought the seeds to the Black Shroud to save the Driancoin from extinction, breaking House Haillenarte’s rules and abandoning her post. Believing she had no right to be happy, she left the seeds—and Laurovic—behind. He answers that her devotion saved the rose, and that someone who loves so deeply deserves happiness most of all. Kneeling with a bouquet in hand, he asks her to grow roses beside him as a fellow member of the Botanists’ Guild and as his beloved. Titouan, moved, vows to speak in her defense and recommend that the care of the Driancoin be entrusted officially to the guild. Sylginie accepts through tears and smiles. Later, under the rose-covered trellis of Mih Khetto’s Amphitheatre, Astrid and Emilie thank you for reuniting the pair and encourage you to offer a bouquet to someone dear as well. Surrounded by petals and warm lantern light, you practice your new Bouquet emote, wondering whose hands you might one day fill with roses.</p>
</div><button class="expand-btn" data-more="Read more" data-less="Show less">Read more</button></div>`,

        story:`<div class="story-wrap"><div class="story-content">
<p>グリダニア旧市街に、ヴァレンティオンデーの飾りつけと薔薇の香りが満ちる頃、あなたはヴァレンティオン家の従者に導かれ、ミィ・ケット野外音楽堂へ向かう。そこで出迎えたのは、愛の伝令たるアストリドとエミリエ。ふたりは、恋人たちに贈られる薔薇の花束が、園芸師ローロヴィックの手によるものだと語り、しかしその本人が恋に悩んでいると打ち明ける。黒衣森にやってきたイシュガルドの園芸師シルジニーと、薔薇を通じて結ばれた日々。やがて彼女は、希少な薔薇「ドリアンコワン」の種だけを残して姿を消した──そして今、ローロヴィックは、人混みの中で薔薇の耳飾りを揺らす彼女の姿を見つけたものの、追いつく前に見失ってしまったのだという。彼の願いを受け、あなたはシルジニーを探すことになる。</p>
<p>ミィ・ケット野外音楽堂の周りで、胡蝶蘭の耳飾りや薔薇の髪飾りの女性に声をかけ、ようやく薔薇の耳飾りをつけた彼女を見つけたあなたは、ローロヴィックの想いを伝える。シルジニーは胸に手を当て、今も彼を愛していると認めながらも、罪悪感から「自分を探さないでほしい」と言い残し、足早に去ってしまう。グレートローム農場近くの工房前で報告を受けたローロヴィックは、「忘れろ」という言葉を受け入れられないまま、動揺を隠せない。そこへ、アインハルト家の騎士ティトゥアンが現れ、配られている薔薇が、自家にのみ栽培が許された象徴の薔薇ドリアンコワンであると見抜く。彼の口から、シルジニーがかつてクルザスの薔薇園を任されていたこと、しかし第七霊災による寒冷化で全てが枯れ、責任を負いきれず姿を消したと信じられていることが語られる。真実を確かめるため、そしてシルジニーを引き寄せるため、あなたは「ローロヴィックが騎士に拘束された」という噂を流す策を提案し、噂好きの市民たちの力を借りて街へと広めていく。</p>
<p>やがてグレートローム農場で待つローロヴィックとティトゥアンのもとへ、シルジニーが駆け込んでくる。「種を持ち出したのは自分だ」と訴える彼女は、クルザスの極寒では薔薇が生きられないと悟り、黒衣森なら命を繋げると信じて種を持ち出したものの、家の掟を破った罪悪感から幸福を求める資格はないと思い込んでいたのだと語る。彼に種を託して姿を消したのも、そのためだった。ローロヴィックは、その苦しみを知ってなお、「幸せになってはいけないなどと言わないでくれ」と強く願い、ひざまずいて花束を差し出す。ドリアンコワンを守り抜いたのは他でもない彼女であり、その薔薇が今や祝祭の街を彩っているのだと伝え、園芸師ギルドの仲間として、そして愛する人として、自分と共に薔薇を育ててほしいと告げる。ティトゥアンもまた、その功績に免じてアインハルト家に口添えし、正式にドリアンコワンの栽培を園芸師ギルドに委ねるよう進言すると約束する。</p>
<p>迷いながらも、シルジニーはローロヴィックの手を取り、彼の隣で薔薇を育てる決意を口にする。こうして二人の想いは再び結び直されるのだった。後日、ミィ・ケット野外音楽堂に戻ったあなたは、アストリドとエミリエから感謝の言葉を受ける。ドリアンコワンは、ふたりを再び結びつけた愛の証として咲き誇り、やがては多くの人々の想いを届ける花となるだろう──もしあなたの心にも特別な相手がいるのなら、この花束のエモートで、その想いを託してみてはどうかと、微笑みながら背中を押してくれる。</p>
</div><button class="expand-btn" data-more="続きを読む" data-less="折りたたむ">続きを読む</button></div>`,
        acq:`<div class="stack">
          <div class="row"><b>クエスト発行</b> グリダニア：旧市街 ミィ・ケット野外音楽堂 <small class="muted">(X:10.2, Y:9.4)</small></div>
        </div>`,
        event:`<div class="stack"><div class="row">2025年2月3日〜2月17日</div></div>`,
        unlockq:`<div class="stack"><div class="row">いずれかのクラス (Lv15)</div></div>`,

      ZH:{
        langLabel:'繁體中文',
        pageTitle:'2025 情人節慶典',
        tabs:{ story:'故事概要', acq:'取得方式', event:'活動期間', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
        story:`<div class="story-wrap"><div class="story-content">
<p>在 Old Gridania，街道被心形裝飾與玫瑰花海染成溫暖的粉紅色。House Valentione 的管家向你行禮，祝福你在 Valentione’s Day 心有所屬，並把你引向 Mih Khetto’s Amphitheatre。那裡，Astrid 和 Emilie 以「愛的傳令」身分迎接你，說明今年活動會把玫瑰花束送到想告白的人手中，而這些花全都出自 Botanists’ Guild 的 Laurovic 之手。只是，提供花束的人自己卻陷在愛情的難題裡──他向你坦承，幾年前與 Ishgard 園藝師 Sylginie 因玫瑰相識、相戀，度過一段最美好的時光，直到某天她突然消失，只留下少量珍稀玫瑰 Driancoin 的種子。為了跟她重逢，他用這些種子培育出今日在 Valentione’s Day 派發的玫瑰，希望消息能傳回她的耳中。剛剛他真的在人群裡看見了對方──那個戴著自己送的 rose earring 的身影──卻在擁擠的人潮間追丟了，只好拜託你幫忙尋人。</p>
<p>你在 Mih Khetto’s Amphitheatre 一帶尋找，先後向戴 orchid earring 和 rose hairpin 的女士打聽，最後才遇見那位戴 rose earring 的 Elezen 少女。她聽完你的轉述，手掩著胸口，承認自己依然愛著 Laurovic，卻因愧疚而無顏相見，只請你轉告他「不要再找了，忘了我吧」，說完便匆匆離去。你回到 Fen-Yll Fineries 前，把結果告訴 Laurovic，他卻無法接受要自己遺忘心愛之人的請求。這時，來自 House Haillenarte 的騎士 Titouan 上前質問這些玫瑰的來歷，從 Driancoin 的姿態立刻認出那是家族象徵，只准在本家栽培的名花。從他的說明中，你得知 Sylginie 原本負責看顧 Coerthas 的玫瑰園，卻在 Calamity 後冰天雪地中眼睜睜看著所有 Driancoin 枯死，自此不知所蹤。為了查明真相，也為了讓 Sylginie 主動現身，你提出散播「Laurovic 被 Ishgard 騎士拘捕」的傳聞，並拜託喜歡打聽八卦的市民幫忙把消息傳遍 Shaded Bower。</p>
<p>不久後，在 Greatloam Growery 前焦急等待的 Laurovic 與 Titouan 終於迎來了那個熟悉的身影。Sylginie 一見到騎士就急忙承認偷拿 Driancoin 種子的是自己，求他放過 Laurovic，並向你們坦白：Driancoin 無法在 Coerthas 的嚴寒中存活，她才會帶著種子來到 Black Shroud，希望在這片土地延續玫瑰的生命，卻同時違背了 House Haillenarte 的規矩。自認既失職又犯戒，她說服自己沒有資格得到幸福，只能把種子交給 Laurovic 後消失。聽完這些，你看見 Laurovic 緊握雙拳，先是心疼她背負的一切，接著卻堅定地說：「無論妳犯了什麼錯，都不代表妳必須放棄幸福。」他在眾人面前單膝跪下，把象徵重逢的玫瑰花束奉上，邀請她以 Botanists’ Guild 園藝師的身分，也以自己的戀人身分，一起在這片森林裡培育 Driancoin。Titouan 也放下嚴肅的表情，表示會向 House Haillenarte 代為求情，承認她救回家族玫瑰的功勞，並提議將 Driancoin 的栽培正式委託給 Botanists’ Guild。</p>
<p>在你的見證下，Sylginie 終於流著淚接受花束，答應與 Laurovic 並肩種下未來的每一朵玫瑰。稍後，你們三人回到 Mih Khetto’s Amphitheatre，Astrid 和 Emilie 得知這段因 Driancoin 而重結的良緣，真心替兩人感到高興，也衷心感謝你的相助。她們笑著說，這些玫瑰是為所有懷抱思念之人準備的，如果你心中也有想守護的「那個人」，就用新學會的 Bouquet 動作，把你的心意一併交給對方吧。玫瑰花海與節慶燈光之下，你悄悄舉起花束，試著想像，下一次這份祝福會送到誰的手中。</p>
</div><button class="expand-btn" data-more="展開全文" data-less="收合內文">展開全文</button></div>`,
        acq:`<div class="stack">
          <div class="row"><b>任務發布</b> 格里達尼亞舊街：米·凱特露天劇場 <small class="muted">(X:10.2, Y:9.4)</small></div>

        unlockq:`<div class="stack"><div class="row">任意職業（等級15）</div></div>`,
        followq:`<div class="stack"><div class="row">已收錄於故事</div></div>`
      }
    };

    const langToggle  = document.getElementById('langToggle');
    const pageTitle   = document.getElementById('pageTitle');
    const tabBtns     = [...document.querySelectorAll('.tab-btn')];
    const panels = {
      story:  document.getElementById('panel-story'),
      acq:    document.getElementById('panel-acq'),
      event:  document.getElementById('panel-event'),
      unlockq:document.getElementById('panel-unlockq'),
      followq:document.getElementById('panel-followq'),
      comments: document.getElementById('panel-comments')
    };

    function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }

    function wireStoryToggler(root){
      const btn = root.querySelector('.expand-btn');
      const content = root.querySelector('.story-content');
      if(!btn || !content) return;
      const more = btn.getAttribute('data-more');
      const less = btn.getAttribute('data-less');
      btn.onclick = ()=>{
        const expanded = content.classList.toggle('story-expanded');
        btn.textContent = expanded ? less : more;
      };
    }

    function applyLang(lang){
      const t = i18n[lang] || i18n.EN;
      pageTitle.textContent = t.pageTitle;
      langToggle.textContent = `🌐 ${t.langLabel}`;
      tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
      const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
      renderPanel(activeBtn.dataset.tab, lang);
    }

    function renderPanel(key, lang){
      const t = i18n[lang] || i18n.EN;
      Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
      panels[key].classList.add('active');

      if(key !== 'comments'){
        panels[key].innerHTML = t[key];
        if(key==='story') wireStoryToggler(panels[key]);
      }else{
        loadGiscusForCurrentLang();
      }
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab, getLang());
      });
    });

    langToggle.addEventListener('click', ()=>{
      const cur = getLang();
      const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
      localStorage.setItem(LANG_KEY, next);
      applyLang(next);
    });

    /* Giscus：Comments 分頁 */
    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };
    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }

    applyLang(getLang());
  </script>
</body>
</html>
