<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lost Promise | BELAUG · FFXIV Library</title>
  <meta name="description" content="FFXIV MSQ – Lost Promise（消えた王女 / 消失的王女）｜Dawntrail Patch 7.0">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;
  overflow-y:auto;
  padding-right:8px;
  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left">
        <a class="home" href="../index.html">🏠 Home</a>
      </div>
      <div class="right">
        <button id="langToggle" class="icon-btn" aria-label="切換語言">🌐 EN</button>
      </div>
    </nav>
  </header>

  <main class="container main">
    <div class="grid">
      <section class="card video-card">
        <div class="bd">
          <div class="video-wrap">
            <iframe src="https://www.youtube.com/embed/dSZKxXP35iY"
              title="Lost Promise" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="hd" id="pageTitle">Lost Promise</div>
        <div class="tabs" role="tablist">
          <button class="tab-btn" role="tab" aria-selected="true"  data-tab="story">Story</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="acq">Acquisition</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="unlockq">Unlock Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="followq">Follow-Up Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="comments">Comments</button>
        </div>
        <div class="bd">
          <div id="panel-story" class="tab-panel active scroll-panel"></div>
          <div id="panel-acq"     class="tab-panel"></div>
          <div id="panel-unlockq" class="tab-panel"></div>
          <div id="panel-followq" class="tab-panel"></div>
          <div id="panel-comments" class="tab-panel">
            <div id="giscus_container" style="min-height:320px;"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Lost Promise',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Rediroq is beside herself with worry, but Koana stays focused: if Lamaty’i truly returned toward Earthenshire from the west, she should have passed by. Since Rediroq insists she never saw her, he reasons there’s a real chance she never made it back at all—and the only way to confirm it is to question the sentry posted at the opposite entrance.</p><p>At the far gate, the sentry swears he has kept diligent watch and has seen no claimant pass, Lamaty’i least of all. Yet when Koana asks about a Tonawawta with brightly colored hair, the sentry recalls local chatter: a Pelu peddler in Many Fires was attacked on the road by a “crazyhair” bandit. The report is enough for Koana to connect the dots—and to fear the messenger and the brigand may be the same person.</p><p>You hurry with Koana to Many Fires, where he points out the waylaid peddler and asks for every detail. The peddler recognizes Koana at once and names the attacker without hesitation: Wawkesa. With the great stairs broken and fewer travelers coming through, Wawkesa’s gang has grown bolder—preying on anyone they can for a handful of pel.</p><p>Koana doesn’t waste time pretending this is a random robbery. If Wawkesa targeted Lamaty’i, he likely intends to ransom her for a royal sum—and Koana refuses to wait for demands that may come too late. He proposes a simple deception: he will disguise himself as a wealthy merchant to draw Wawkesa out, and when the bandit comes sniffing around, you seize him. The peddler—mercantile spirit intact—provides the perfect outfit for the role.</p><p>With the bait prepared, Koana goes ahead into town to make himself seen. You follow behind and “spread the good word” to whoever will listen—putting on a convincing show about how you paid a hefty purse for a rare gemstone, loud enough that the rumor can’t help but travel. People blink at your performance, then start talking: if someone is flashing that kind of wealth, bandits will come.</p><p>Koana plays his part to the hilt, boasting like a man newly enriched and careless enough to travel without hired blades. Then he quietly signals what matters most: the rat has taken the nibble. He praises you for selling the lie convincingly—and with Wawkesa’s attention caught at last, you move in to lure him out and spring the trap.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Koana <small class="muted">Kozama’uka (X:10.8, Y:28.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-shape-of-peace.html">The Shape of Peace</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 92</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="a-brothers-duty.html">A Brother’s Duty</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'消えた王女',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>レディロクはひどく不安がっているが、コーナは状況を冷静に整理する。ラマチが西からアースンシャイアへ戻ったのなら、この道を通ったはずだ。にもかかわらずレディロクは見ていないと言う――となれば、そもそも村へ戻れていない可能性が高い。確かめるには、反対側の入口に立つ見張りに訊くしかない。</p><p>見張りは、持ち場で目を光らせていたが誓約者は誰も通っていないと断言する。さらにコーナが「派手な髪色のトナワウタ族」について問うと、思い当たる噂が出てくる――朋友の灯火で、ペル族の行商人が“奇抜な髪の”盗賊に襲われたという話だ。コーナはその言葉から、使者と盗賊が同一人物である危険を見て取り、ラマチの身に差し迫った危険があると判断する。</p><p>あなたはコーナとともに朋友の灯火へ急行し、襲われた行商人から事情を聞く。行商人は襲撃者の名を即座に挙げる――ワーケサだ。階段が崩れて獲物が減ったせいで、連中は少しの金のためなら手段を選ばず、街道で獲物を狙うようになったのだという。</p><p>コーナは、相手がラマチを狙ったのは身代金目的に違いないと見て、要求を待つ気はないと告げる。そこで彼は策を示す――裕福な商人に変装してワーケサを誘い出し、近づいたところを捕らえる。行商人は値引きまでして変装用の衣装を用意し、あなたたちはその場で“餌”を整える。</p><p>コーナは先に進んで存在を誇示し、あなたは後ろから噂を広める役だ。希少な宝石を手に入れるために大金を払った、と周囲に聞こえるよう大げさに喜び、いかにも儲け話が転がり込んだように振る舞う。人々は戸惑いながらも話に乗り、そんな金の匂いは盗賊を呼ぶのだと口々に注意を促す。</p><p>最後にコーナが、無用心にも大金を持ちながら護衛も連れずに旅を続ける、とわざとらしく語り、狙われやすい獲物を演じ切る。すると彼は合図する――獲物に寄ってくる影がある、と。あなたの演技を認めたコーナは、今こそワーケサを表へ引きずり出し、罠を仕掛ける時だと歩き出す。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> コーナ <small class="muted">コザマル・カ (X:10.8, Y:28.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-shape-of-peace.html">望んだ平和の形</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 92</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="a-brothers-duty.html">兄として</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'失蹤的公主',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Rediroq 焦急得坐立難安，但 Koana 逼自己冷靜推理：如果 Lamaty’i 是從西邊回到 Earthenshire，她理應會經過這裡。既然 Rediroq 堅稱沒見到她，那就很可能她根本沒有回到村子。要確認這件事，只能去問守在另一個入口的哨兵。</p><p>哨兵說自己一直在崗位上認真盯守，從頭到尾都沒看見任何誓約者經過，更別說 Lamaty’i。可當 Koana 追問「那個頭髮顏色很醒目的 Tonawawta」時，哨兵立刻想起近期的傳聞：在 Many Fires，有位 Pelu 的行商人遭到「狂髮強盜」襲擊。Koana 聽完就明白，帶走 Lamaty’i 的人很可能就是那個匪徒本人。</p><p>你跟著 Koana 趕往 Many Fires，找到那名遭襲的行商人。行商人一眼就認出 Koana，並把事情說得清清楚楚──襲擊者是 Wawkesa。自從通往瀑布上的階梯被破壞，路上少了新的獵物，Wawkesa 一夥就變得更貪更狠，為了幾個 pel 也能不擇手段。</p><p>Koana 不再把這當成普通搶劫：如果 Wawkesa 盯上 Lamaty’i，目的多半是勒贖，索要「王族等級」的巨額贖金。可他不打算等對方開口才行動，而是提出一個誘敵計：他要假扮成富商，把 Wawkesa 引出來；等匪徒一靠近，你們就把他當場逮住。行商人甚至拿出一套合適的衣裝，讓 Koana 的偽裝更像那麼一回事。</p><p>餌準備好後，Koana 先走進 Many Fires 讓人注意到自己；你則跟在後方，開始把「好消息」講得越響越好──你誇張地炫耀自己花了一大筆錢，從 Koana 那裡買到一顆稀有寶石，讓旁人都聽見、都跟著議論。有人一開始聽不懂你在演什麼，但很快就抓到重點：這種財氣外露的傳聞，最容易把強盜招來。</p><p>Koana 隨即把戲演到底：他得意地像個剛大賺一筆的商人，甚至故意提到自己帶著厚厚的錢袋、卻沒有雇傭兵護衛——簡直是在對匪徒招手。然後他低聲提醒你：魚上鉤了。你們不再多說，轉而專注下一步——把 Wawkesa 逼到檯面上，立刻收網。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>任務發布</b> 柯納哥 <small class="muted"> 克扎瑪烏卡濕地 (X:10.8, Y:28.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-shape-of-peace.html">和平的形式</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.92</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="a-brothers-duty.html">兄長之責</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
