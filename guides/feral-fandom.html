    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Yaana is relieved when you appear, saying she had hoped you would stop by before the heavyweight matches begin. There is something she wants to share, and once you are inside, Retsarra mentions that the kittens have settled into their new home, though it is plain they still miss Hector. Before Honey and the others arrive, Yaana says it would be best to review everything that has happened so far. During your cruiserweight campaign, several fighters were persuaded to retire from the ring, including Retsarra, who had already begun to suffer from psychonekrosis. Brute Bomber, however, could not be convinced.</p><p>She then turns the story back upon herself. After Eutrope ambushed you all, Yaana developed symptoms of psychonekrosis as well, having gotten carried away and used a feral soul in an attempt to stop her. There had been a moment of hope when Neyuni uncovered evidence that a cure might exist, but that hope was shattered when the president took Neyuni and Eutrope hostage and made it clear that none of you would be allowed to stray from the role he had written for you. Retsarra adds that, in a cruel twist, the president already knew of the cure itself—the Drop of Life—and promised to reveal where it could be found only if you became grand champion.</p><p>What troubles Yaana most is how little any of you truly know about the man controlling all this. She has never even met the president face-to-face, and that is why she asked the others to gather: to piece together some clearer image of the one you are up against. When Honey, Dancing Green, and Sugar Riot arrive through the back entrance, each brings only fragments. Honey says she was never recruited by the president in person, but by Metem, and that even later contact came only through calls and instructions. Retsarra says that although he and Hector were recruited directly, every conversation afterward was conducted through a communicator and never strayed beyond business. Sugar Riot can offer little more. Only Dancing Green knows anything beyond that.</p><p>He explains that the president loves theater and performance, and that because of this they often found themselves talking about what truly moves an audience. Dancing Green believed people should be made to feel good, while the president insisted that they also needed discomfort—that a heel must exist so the audience can feel the highest exhilaration when someone loathsome is finally cast down. That vision, he admits, had a certain theatrical force, and the wild crowds that gathered for Brute Bomber’s matches proved the president understood spectacle all too well. As for the man’s background, Dancing Green knows only one meaningful detail: the president traces his ancestry to Lindblum. That revelation catches Yaana’s attention at once, because Lindblum is also where research into the stimulant tied to the regeneration factor was apparently conducted. Yet even with all of you pooling what little you know, the president remains mostly a shadow.</p><p>Even so, the path before you has not changed. You must become grand champion if you are to force the president’s hand. If he breaks his promise, one possible weapon remains: the truth about the immortalized could be exposed to the public. But Retsarra says that if such a step is ever taken, Eutrope and Neyuni must first be rescued. Any plan to save them must be careful enough not to put them in greater danger. Honey answers at once that no one needs to ask for her help twice. Dancing Green, though once friendly enough with the old man, says art and entertainment should never come at the cost of the people who create them. Together, they all agree to do what they can to free Yaana’s sisters while you continue your climb. Yaana promises that she will remain at your side as your second, and that together you will carve a way through the heavyweight division.</p><p>Then there is one final thing she wants you to see before the matches begin: an Arcadion broadcast meant for the fans. On the program, Metem introduces your future opponent in the heavyweight division, Vamp Fatale, and raises before the audience the possibility that if you become grand champion, you will release all the souls in the repository and transform the Arcadion into a championship of unenhanced fighters. Vamp Fatale laughs at the thought and insists that no one wants such a future. What follows is a string of hostile interviews, all cut to support the president’s narrative—voices calling your battles pointless, saying your appeal has worn thin, accusing you of trampling tradition. Yaana is furious, immediately recognizing that only the opinions useful to the president were shown. But almost at once, others arrive in person to counter that poison. Fans tell you that they believe in you, that your battles inspire them in ways fights with feral souls never do, and that the Arcadion once existed without souls at all. Their support steadies the room. Yaana says that even if feral souls disappear, the Arcadion will not die with them, and that she herself hopes one day to return from retirement and fight without enhancement. Then the call comes: the heavyweight matches are beginning.</p><p>When you reach the greenroom, Yaana confronts Metem over the broadcast, and he admits it was done by the president’s order. The mass retirement in the cruiserweight division has made the president feel threatened, and now he wants you gone. Worse still, Metem reveals that trying to persuade the heavyweight fighters to retire will lead nowhere. They have already been told of their psychonekrosis, and they have chosen to continue fighting because they were promised that if they defeated you, they would be allowed to use your soul to cure themselves. Yaana can scarcely contain her anger at such cruelty, but Metem tells you there is only one way forward now. The fury you carry must be taken into the ring. Only by winning can you break through what the president has arranged, and he says he believes you will leave your mark on the heavyweight division just as you did on every tier before it.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Yaana <small class="muted">(Solution Nine, X:22.2, Y:16.6)</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="the-breathtaker.html">The Breathtaker</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'アルカディアのファンたち',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ヤーナは、ヘビー級の試合が始まる前に、ちょうどあなたに来てほしかったのだと安堵したように迎える。そして中へ入ると、レトサラが、子猫たちは新しい住まいにすっかり慣れたが、それでもまだヘクトルを恋しがっているのがわかると静かに語る。やがてハニーたちも来る予定だが、その前に、いま自分たちが置かれている状況をもう一度整理しておきたいとヤーナは言う。あなたがクルーザー級を勝ち上がるあいだに、何人もの闘士をリングから退かせることができた。その中には、すでに魂蝕症を患っていたレトサラも含まれている。だが、ブルートボンバーだけは最後まで説得できなかった。</p><p>続いてヤーナは、自分自身のことも隠さず打ち明ける。ユートロープに不意を突かれたあのとき、彼女を止めようとして獣魂を使ったせいで、自分にも魂蝕症の症状が現れてしまったのだという。ネユニが治療法の存在を見つけたときには、ようやく光が見えたかと思えた。だが、その希望は社長によってネユニとユートロープが人質に取られたことで、あまりにもあっけなく打ち砕かれた。自分たちは、彼の書いた筋書きから外れることを許されなかったのだ。さらにレトサラは、皮肉にもその社長自身が治療薬「ドロップ・オブ・ライフ」の存在を知っており、あなたがグランドチャンピオンになれば、その在り処を教えると告げたのだと補う。</p><p>それでもなお、いちばん不気味なのは、肝心の社長についてほとんど何も知らないことだった。ヤーナは、顔を合わせたことすら一度もない。だからこそ皆を集めたのだと彼女は言う。少しでも相手の輪郭を掴みたかったのだ。裏口からやって来たハニー、ダンシンググリーン、シュガーライオットも、それぞれ知っていることを持ち寄る。ハニーは、最初に自分を勧誘したのは社長ではなくメテムであり、その後の連絡もごく事務的な指示が数回あっただけで、直接会ったことはないと話す。レトサラも、ヘクトルとともに最初は社長本人に会って迎え入れられたが、その後のやり取りはすべて通信越しで、私的なことを語られたことは一度もなかったという。シュガーライオットも事情はほとんど同じだった。</p><p>その中で、多少なりとも社長の素顔に触れていたのはダンシンググリーンだった。彼によれば、社長は芝居がかった演出をこよなく愛する男であり、観客をどう惹きつけるべきかについて、よく議論を交わしたという。ダンシンググリーンは、人々には気分よくなってもらうのがいちばんだと考えていたが、社長は違った。観客にはある種の不快さも必要であり、だからこそヒールがいるのだと語っていたのだという。忌むべき者が倒される瞬間にこそ観客は最大の高揚を知り、闘士もまた最も鮮烈に燃え上がる――それが彼の持論だった。その理屈には劇的な説得力もあり、ブルートボンバーの試合で熱狂する観客を見れば、社長が見世物を作る才に長けていたことだけは否定できない。だが個人的なこととなると、わかるのは彼がリンドブルムに祖を持つらしいという一点だけだった。その名を聞いたヤーナは、再生因子の刺激薬に関する研究が行われていた場所もリンドブルムだったはずだと気づく。とはいえ、皆の記憶を寄せ集めても、社長の姿は依然として霧の向こうにあった。</p><p>だからといって、進むべき道が変わるわけではない。あなたがグランドチャンピオンになること、それがすべての鍵になる。もし社長が約束を反故にするならば、最後の切り札として、「不朽の闘士」の真実を公に暴くこともできるかもしれない。だがレトサラは、その手を使うにしても、まず先にユートロープとネユニを救い出さなければならないと言う。彼女たちを危険に晒さないためには、救出の手立ては慎重で、しかも確実でなくてはならない。ハニーは、そんなの頼まれるまでもないと即座に応じる。ダンシンググリーンもまた、社長とはそれなりにうまくやっていたが、作り手を犠牲にする芸術や娯楽など認められないと言い切る。こうして皆は、あなたがグランドチャンピオンを目指して戦うあいだに、ヤーナの姉妹を救い出すため力を尽くすと誓う。ヤーナも、これまでどおりあなたのセコンドとして支え続けると告げ、ふたりでヘビー級を切り開こうと力を込める。</p><p>その後ヤーナは、ヘビー級の試合が始まる前に、ファン向けの定期番組をひとつ見ておこうと言う。画面の向こうではメテムが、あなたの次の相手としてヘビー級闘士ヴァンプファタールを紹介し、もしあなたがグランドチャンピオンになれば、魂の保管庫にあるすべての魂を解き放とうとしているらしいと話題を向ける。そうなれば、アーカディアは強化なき闘士たちの選手権へと変わってしまうが、それをどう思うか、と。ヴァンプファタールはあざ笑うように、そのような未来など退屈なだけだと言い放つ。続いて流された街頭インタビューでは、獣魂なしの戦いに価値はない、あなたの存在は話題作りの珍しさにすぎない、伝統を踏みにじる部外者はいらない――そんな敵意ある声ばかりが並べられていた。ヤーナは激しく憤り、社長に都合のいい意見だけを集めたのだと見抜く。だがその直後、その放送を見ていられなくなった人々が実際に姿を見せる。あなたの戦いに勇気づけられた、自分はあなたを信じている、獣魂を使わなくても心を揺さぶる試合はできる――そう語る彼らの言葉が、その場にまっすぐな熱をもたらす。ヤーナも、たとえ獣魂がなくなってもアーカディアそのものが終わるわけではないし、自分も治れば、強化なしで再び戦ってみたいと思っていると打ち明ける。そうしているうちに、ついに連絡が入り、ヘビー級の試合が始まる時が来たのだと知らされる。</p><p>グリーンルームへ向かったあなたたちを前に、ヤーナは放送の件についてメテムを問い詰める。彼は申し訳なさそうに、それは社長の命令だったと認める。クルーザー級で闘士の大量引退が起きたことで、社長は明らかに脅威を感じており、いまでは何としてもあなたを排除したがっているのだという。そしてさらに厳しい現実も告げられる。ヘビー級の闘士たちは、すでに自分たちの魂蝕症について知らされている。それでもなお、自らの意思で戦い続ける道を選んだのだ。なぜなら、もしあなたを倒せば、あなたの魂を使って自分たちの病を治すことができると吹き込まれているからだった。ヤーナはそのあまりの卑劣さに怒りを露わにする。だがメテムは、いまのあなたに残された道は勝ち進むことだけだと告げる。抱える怒りがあるのなら、それをそのままリングへ持ち込めばいい。これまでそうしてきたように、ヘビー級でもきっとあなたは自分の軌跡を刻むはずだと、彼は信じている。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> ヤーナ <small class="muted">(ソリューション・ナイン, X:22.2, Y:16.6)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-lone-wolf.html">孤高の狼</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-breathtaker.html">魔性の処刑人</a></div></div>`
  },

    story:`<div class="clamp" data-collapsed="true"><p>Yaana 一見到你，就說她原本正希望你能在 heavyweight 比賽開始前過來一趟。她有些事想先告訴你，於是便帶你進了 Tritails Training。進門後，Retsarra 提起那些小貓已經慢慢習慣了新的家，只是看得出來，牠們還是在想念 Hector。Yaana 則說，她也把 Honey 和其他人叫了過來，而在大家到齊之前，她想先和你把目前的局勢重新整理一遍。你在 cruiserweight（Arcadion 更高一級的重量分級，闘士使用更強力的 feral soul）分級一路戰鬥的過程中，已經成功說服好幾名闘士退出擂台，其中也包括早已受到 psychonekrosis（過度使用 feral soul 的人可能罹患的致命疾病，會逐步侵蝕靈魂與身體）影響的 Retsarra。可唯獨有一個人始終無法被說動，那就是 Brute Bomber。</p><p>說到這裡，Yaana 也不再隱瞞自己的情況。自從 Eutrope 那次突然襲擊你們之後，她其實也出現了 psychonekrosis 的症狀。那時她一時衝動，為了阻止 Eutrope，動用了 feral soul（用於戰鬥變身的獸魂），結果也把自己推進了危險之中。後來 Neyuni 發現可能存在治療方法時，你們一度以為終於看見了希望，可那份希望很快就被總裁親手掐滅——他擄走了 Neyuni 和 Eutrope，明明白白地告訴你們，他不允許任何人偏離自己寫好的劇本。Retsarra 接著補充，最諷刺的是，總裁本人其實早就知道那種治療手段，也就是「Drop of Life」；而他開出的條件，就是只有在你成為 grand champion（Arcadion 全分級之上的最終冠軍頭銜）之後，才會把它的所在地告訴你。</p><p>可即便掌握了這些資訊，你們對那個總裁本身依然幾乎一無所知。Yaana 說，她甚至從來沒有真正見過他，所以才想把大家都召集過來，試著拼出一個更清楚的輪廓。Honey、Dancing Green 和 Sugar Riot 從後門進來後，也各自說出自己知道的事。Honey 表示，她從來沒有真正見過總裁本人，最初在演出現場來招攬她的人其實是 Metem，而後來幾次接到的指示，也全都只是通訊聯絡。Retsarra 也說，雖然當年他和 Hector 確實是被總裁親自帶進 Ascension Arcadia，但在那之後，所有聯繫都只透過通訊器進行，而且內容永遠只有公事，從不涉及私人面向。Sugar Riot 能補充的也差不多。真正和總裁有過稍微多一點接觸的人，只有 Dancing Green。</p><p>Dancing Green 說，那個老傢伙非常迷戀戲劇性與舞台效果，也因為自己同樣是表演者，兩人很快就能聊得來，甚至常常爭論到底該怎麼抓住觀眾的心。在 Dancing Green 看來，最重要的是讓人們覺得愉快；可總裁卻堅持，觀眾必須同時感受到某種程度的不適，而那正是「反派」存在的價值。也只有在令人厭惡的人被狠狠打倒時，觀眾才會真正嚐到最強烈的高潮，闘士也才會燃燒得最耀眼，那就是總裁一直掛在嘴邊的說法。Dancing Green 承認，這種近乎「詩意正義」的安排，確實有其吸引力；只要看看 Brute Bomber 的比賽時那些陷入瘋狂的觀眾，就知道總裁無論如何都是個極懂得操控表演的人。至於他的私人來歷，Dancing Green 只知道一件事，總裁的祖源來自 Lindblum。這句話立刻讓 Yaana 緊張起來，因為和再生因子刺激劑有關的研究，似乎也正是在 Lindblum 進行的。可即使把所有人的片段湊在一起，總裁仍舊像一個藏在霧裡的人，幾乎摸不清真正的樣子。</p><p>即使如此，你們眼前能走的路其實沒有改變。你必須成為總冠軍，只有這樣，總裁才可能交出治療方式的線索。若他之後反悔，你們也不是完全沒有籌碼，至少還可以威脅把「名留不朽殿堂的人」真正的下場公諸於世。可 Retsarra 也提醒，如果真的要走到那一步，最先要做的仍是把 Eutrope 和 Neyuni 安全救出來。為了不讓她們受到進一步的傷害，之後的計畫必須足夠隱密，也必須萬無一失。Honey 立刻表示，這種事根本不需要多問，她當然會幫忙。Dancing Green 也說，雖然自己以前和那老傢伙處得還不算差，但無論是藝術還是娛樂，都不該建立在創作者的犧牲之上。就這樣，眾人都同意，在你繼續朝總冠軍邁進的同時，他們會盡全力設法救出 Yaana 的姊妹。Yaana 也再次對你承諾，自己會繼續以 second（協助格鬥士蒐集對手情報、提供訓練建議與場邊支援的人）的身分站在你身旁，陪你一起劈開 heavyweight 分級前方的道路。</p><p>之後，Yaana 又要你先一起看看 Arcadion 即將播出的節目。那是一個面向粉絲的固定節目，她說或許對備戰幫助不大，但看看總沒有壞處。畫面中，Metem 隆重介紹了你在 heavyweight 分級即將面對的對手，Vamp Fatale，接著又刻意拋出一個話題：如果你真的成為總冠軍，你就能動用 Arcadion 的靈魂儲藏庫，而且你似乎打算釋放裡面的所有靈魂。若真是如此，Arcadion 將徹底改變，成為一個由未經強化的闘士組成的冠軍賽。對此，Vamp Fatale 只是不屑地嗤笑，說那種「新秀」只會把大家無聊死，因為沒有 feral soul，就不可能有真正震撼人心的戰鬥。接下來，節目又播出了一連串街頭訪談，畫面裡的人紛紛說，你這種不靠 feral soul 的戰鬥根本沒有意義，你只是個拿來炒熱話題的新奇角色，甚至還有人怨恨你逼得 Howling Blade 依約引退，說你這個外來者根本不該干涉 Arcadion 的傳統。Yaana 當場氣炸了，因為那明顯只剪出了對總裁有利的聲音。</p><p>可幾乎就在同一時間，另一群人竟直接找上門來。他們說，看完那段節目後實在坐不住了，所以無論如何都想親口告訴你，其實有很多人是真心支持你的。有人說你是他的英雄，有人說你雖然讓人看得緊張，卻也給了人真正的勇氣，而那是其他依靠 feral soul 的闘士無法帶來的感受。還有人提醒你，Arcadion 一開始本來就不是建立在靈魂之上的。這些坦率的支持，總算沖淡了方才那場惡意操弄帶來的壓迫感。Yaana 也看著你說，就算 feral soul 有一天真的消失了，也不代表 Arcadion 會因此終結；有許多人欣賞你、支持你，而你也是為了這些人而戰。她甚至坦白，等到自己治好之後，也想結束引退狀態，以未經強化的方式重新站上擂台。話音未落，新的聯絡便傳了過來，heavyweight 的比賽，終於要開始了。</p><p>當你們來到 Greenroom 時，Yaana 第一件事就是去質問 Metem，剛才那段節目到底是怎麼回事。Metem 帶著歉意承認，那一切全都是總裁的命令，而自己能做的，也只有在節目裡稍微暗示其實還存在其他不同的聲音。因為 cruiserweight 分級接連出現大量引退，總裁已經開始感到威脅，無論他之前說過什麼，現在他只想盡快把你除掉。而更糟的是，Metem 還告訴你，想勸 heavyweight 的闘士退出戰鬥，已經沒有意義了。那些人早就知道自己也患有 psychonekrosis，卻仍選擇繼續戰鬥，因為他們已被告知，只要能打倒你，就能利用你的靈魂來治好自己的病。Yaana 聽見這種卑劣至極的手段，氣得咬牙切齒。可 Metem 仍舊直白地告訴你，如今唯一的出路就只有勝利。既然怒火已經無法壓下，那就把它直接帶進擂台裡吧。就像你此前一路做到的那樣，他相信你也一定會在 heavyweight 分級留下屬於自己的痕跡。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Yaana <small class="muted">(Solution Nine, X:22.2, Y:16.6)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-lone-wolf.html">離群之狼</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-breathtaker.html">令人窒息的劊子手</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
