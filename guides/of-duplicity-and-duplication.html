const i18n = {

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
<p>Delion calls you “just in time” for his next fact-finding expedition. Since Sharlayan confirmed PuPu’s missing friend had been traveling with a Hannish alchemist, Delion tried digging for alien sightings in Thavnair—but found nothing. So he pivots: instead of chasing “phenomena,” he’ll track down the alchemist, reasoning that surely someone has heard of an apothecary reckless enough to sell medicine on a Garlean battlefield. Hildibrand’s group has also hit a dead end in Radz–at–Han and the Great Work, so everyone converges on Yedlihmad to ask around.</p>
<p>In Yedlihmad, you arrive to find the “lunar crew” gathered again. Brandihild awkwardly tries to frame his efforts as merely following Hildibrand, then slips into self-deprecation—he’s only a flawed copy. Hildibrand refuses to accept that: clone or not, he says a Manderville man shouldn’t belittle himself. Nashu backs him up enthusiastically, and Hildibrand reminds Brandihild he once saved you from certain doom—his rapid reasoning may differ from Hildibrand’s flair, but it’s effective. Even Delion—usually stingy with praise—claims Brandihild’s mind may surpass the original and openly muses about hiring him for The Thavnairian Truth.</p>
<p>Your questioning finally turns up something solid. A fisherman says he’s heard of an apothecary who went to war-torn Garlemald to sell medicines, and he directs you to Ussaqeyiq—an island just outside town—where a red-haired lad gathering shellfish can tell the story himself.</p>
<p>The red-haired fisherman confirms the apothecary’s name was Baharasaf, and paints him as a man shaped by poverty and obsessed with wealth. After dabbling in trade after trade, Baharasaf chose alchemy for gil, but business never matched his ambitions. When he heard about Garlemald’s internal strife, he took it as a “golden opportunity”—war would mean demand for medicine. The venture turned into near-death experiences, and he abandoned it quickly…yet when he returned, he was euphoric. In the snowfields he’d found a “gods-given blessing,” and he claimed he’d learned how to create gold. The fisherman laughed—until Baharasaf showed him a gleaming mountain of gold, enough to proclaim himself a merchant prince. Baharasaf even changed his name to Vanhudi, a word associated with divine bounty.</p>
<p>Hildibrand recognizes the name immediately: the rising market star snapping up ventures, who even tried to purchase the entire port of Yedlihmad. The dockmasters refused, but with limitless money he’s been buying historic landmarks anyway—turning the Gilded Araya into a private residence and filling it with rare treasures. The fisherman adds that Vanhudi pays especially large sums for artworks depicting the war goddess Asura, a deity not beloved by commonfolk, but one Baharasaf revered even as a child—because he saw life as constant battle to amass wealth, and he prayed to Asura for victory.</p>
<p>Putting it together, Hildibrand declares the obvious twist: the apothecary you’re seeking and the “merchant prince” are the same person. Brandihild quietly advances the next inference—Vanhudi’s “blessing” in Garlemald was likely the crashed alien craft and its blue pilot.</p>
<p>Before you can move, an Arkasodara rushes in: a nasty-looking creature has appeared outside town, and a guard confronting it may not stand a chance. Hildibrand charges in—this is a case for him.</p>
<p>Outside, Delion panics—he thought that monster was destroyed. A Radiant Host guard claims the situation is under control: the intruder resembles a known fugitive, so she confronted him, but he won’t give answers. Then the creature speaks: it’s Suprae-Lugae, and he blurts out the core problem—Lord Vanhudi ordered him to cause trouble at the port and he’s behind schedule. The guard reacts instantly: Vanhudi, the merchant who tried to buy Yedlihmad, is behind this. Suprae-Lugae, realizing he’s exposed himself, declares that anyone who learns of their scheme must die and attacks—soon joined by more sinister “skull-men.”</p>
<p>The battle turns on a sudden, very Manderville interruption: Hildibrand gasps “M-Mother!?”—Julyan arrives, and with overwhelming force helps put an end to Suprae-Lugae’s assault. Afterward, Julyan explains she and Godbert were headed to Vanhudi’s mansion in the first place: she’s accompanying Godbert as manager for Manderville & Manderville, and Vanhudi had approached them with a proposal. Godbert adds context: he already refused Vanhudi once when the man tried to buy out their commercial empire, but this new offer was to off-load a large quantity of gold at wholesale prices—tempting for jewelers, so they planned to hear him out. But ordering thugs to disrupt a public port? That makes him a brute they won’t do business with.</p>
<p>Delion, still stuck in theory mode, wonders where all those lackeys came from—does Vanhudi have a factory for hulking weaponized brutes? PuPu answers with a crucial technical clue: his ship’s vaporization beam is tuned to expunge only replicated matter. Brandihild elaborates how it works: once the matter duplication facility analyzes an object’s molecular structure, it can generate copies—but it can’t create matter from nothing; it needs a supply of aether.</p>
<p>That snaps Delion’s mind into place. If Vanhudi has access to PuPu’s friend’s repaired craft—and if that craft can replicate inorganic materials—then Vanhudi’s mountain of gold could be exactly that: replicated gold, churned out by alien technology. Brandihild agrees: no other method reliably produces precious metals like that. Hildibrand declares the next step obvious: Vanhudi is likely threatening or deceiving PuPu’s comrade to exploit the ship’s superior technology. Therefore, you march to the source—Vanhudi’s front door—and demand he release his extraterrestrial “guest.”</p>
<p>Back at the port, Nashu cheers your hit, Delion is rattled that Julyan is as monstrously strong as the Manderville men, PuPu worries about threats and deceit, and Godbert admits the unprovoked attack is proof of Vanhudi’s villainy. Julyan eyes Brandihild and jokes that if you smoothed off his edges, he’d be the spitting image of their Hildy. Godbert then offers the fastest route to confrontation: Vanhudi’s invitation includes a private airship flight to his new estate, and since they must formally reject his deal anyway, you may as well ride with them.</p>
</div>

    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
<p>デリオンはあなたに「ちょうどいいところだ」と言い、次の取材行脚に巻き込む。シャーレアンで判明したのは、ププの友がハヌの錬金術師と行動していたという事実。そこでデリオンはタヴナイアで異星現象の目撃情報を探ったが成果なし。方針転換し、その錬金術師――帝国の戦場で薬を売るほど無謀な薬師の噂を追うことにした。ヒルディブランドたちもラザハンや大仕事場で手掛かりを掴めず、調査先をイェドリマドへ移したため、一行は港町で合流する。</p>
<p>イェドリマドでは、ブランディヒルドが気後れしながらも捜査続行を申し出るが、自分は欠陥品の複製に過ぎないと卑下してしまう。ヒルディブランドは一蹴し、複製だろうと自虐はマンデヴィル男に相応しくないと言う。ナシュも同調し、あなたを救ったのはブランディヒルドの迅速な推理だったと称える。デリオンすら彼の頭脳を高く評価し、「真実」に雇いたいとまで言い出す。</p>
<p>聞き込みの末、漁師が「ガレマルドへ薬を売りに行った薬師」の噂を知っていると言い、町外れの小島ウサキークへ向かうよう促す。そこで貝を採っている赤毛の若者が詳しい話を知っているという。</p>
<p>赤毛の漁師は、薬師の名がバハラサフだったと語る。貧しい家に生まれ、金への執着を募らせ、いくつもの仕事に手を出した末に錬金術を選んだが、思うように稼げなかった。内乱のガレマルドを「戦場こそ薬が売れる」と好機と見て突っ込んだものの、死にかける目に遭ってすぐ撤退。ところが戻ってきた彼は不運を嘆くどころか陶酔していた。雪原で「神の祝福」を見つけ、金を作れるようになったと言い、笑う友に黄金の山を見せて黙らせたという。そして彼は自らを「ヴァンフーディ」と改名した。</p>
<p>ヒルディブランドはその名を聞いて合点がいく。市場で台頭し、投資を買い漁り、イェドリマドの港丸ごと買おうとした男だ。船頭たちは拒んだが、底なしの財布で史跡を買い、ギルデッド・アラヤを私邸に改造し、珍品で満たしているらしい。さらに彼は戦神アスラを描いた美術品に大金を払う――幼い頃から熱心に崇めていたからだ、と漁師は言う。庶民に好かれぬ戦の女神だが、富を戦として捉えるバハラサフには相応しかったのだろう、と。</p>
<p>こうしてヒルディブランドは結論を口にする。探していた薬師と成り上がりの商人王は同一人物。ブランディヒルドは、ガレマルドで見つけた「祝福」が異星船とその操縦者だった可能性を示唆する。</p>
<p>そこへアルカソーダラが駆け込み、町の外に不気味な怪物が現れ、衛兵が危険だと知らせる。現場ではデリオンが「倒したはずだ」と震え、ラディアントホストの衛兵は容疑者が逃亡者に似ているため確認したが口を割らないと説明する。怪物はスプラエ＝ルガエで、ヴァンフーディの命令で港に騒ぎを起こせと喋ってしまう。計画が露呈したと悟ると、口封じに襲いかかり、同類の「骸骨男」まで現れて乱戦となる。</p>
<p>決着をつけたのはジュリアンの圧倒的な力だった。彼女はゴッドベルトの付き添いとして、ヴァンフーディの屋敷へ向かう途中だったと明かす。ゴッドベルトは以前にも買収話を持ちかけられて断ったが、今回は大量の金を卸値で売るという提案で、宝飾を扱う身として話だけは聞くつもりだった。しかし公共の港を手下に荒らさせるような男とは取引できない――と断言する。</p>
<p>デリオンが手下の出所を訝しむと、ププは蒸発光線が「複製された物質だけ」を消す設定だと述べる。ブランディヒルドは複製機構を説明し、分子構造を解析すれば無機物でも複製可能だが、無からは生み出せず、エーテル供給が必要だと言う。デリオンはそこから推理する――ヴァンフーディが異星船を利用して金を複製し、財を築いたのではないか。ブランディヒルドも同意し、ヒルディブランドは「ならば、彼はププの友を脅すか欺いて技術を奪っているはず」と断じる。</p>
<p>行動方針は一つ。ヴァンフーディの屋敷へ乗り込み、異星の客人を解放しろと突きつける。ゴッドベルトはちょうどよく、招待状には私用飛空艇で新邸へ送る手配が含まれていると言う。取引を正式に断る必要もある――ならば一緒に行け、と。</p>
</div>

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'媽媽才是最強的',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
<p>Delion 說你來得正好，能立刻幫他展開最新的「查證遠征」。既然你們在 Sharlayan 已確認：PuPu 的朋友當時是跟一位 Hannish 的煉金術師同行，Delion 就先在 Thavnair 做了前置打探——照舊去問那些專門提供「外星現象」消息的管道，卻什麼也沒得到。於是他改變策略：不追「現象」了，改追那位煉金術師本人。畢竟敢跑到 Garlemald 戰場上擺攤賣藥的藥師，總不可能完全沒人聽過。</p>
<p>他說 Hildibrand 等人也在 Radz–at–Han 與 Great Work 查得一無所獲，現在把調查移到 Yedlihmad；你們便趕去會合。到了港鎮，Brandihild 先用很拘謹的方式表示自己也要繼續追查那位煉金術師，結果又忍不住貶低自己——他只是複製體，而且還是有缺陷的那種。Hildibrand 立刻打斷：胡說八道，複製體也好，本體也好，Manderville 的男人不該自我否定。Nashu 也跟著肯定他，還提醒他曾救過你一命。連 Delion 都不得不承認：Brandihild 太謙虛了，他的腦袋甚至可能比原本那位還強，若願意替 The Thavnairian Truth 工作，他會立刻雇用。</p>
<p>你們分頭問人後，終於有人給出實質線索：一名漁夫說他聽過那個「跑去 Garlemald 賣藥」的藥師傳聞，並指引你們去城外的小島 Ussaqeyiq，找一位正在撿貝類的紅髮少年——那人知道完整故事。紅髮漁夫接著把藥師的身世講得清清楚楚：他叫 Baharasaf，出身極窮，因此對「致富」有近乎偏執的渴望；他試過很多行當，最後覺得做煉金術最能賺 gil，但生意一直不如預期。</p>
<p>當他聽聞 Garlemald 內戰與動盪時，竟把那當成「黃金機會」：戰火之中最需要藥，當然最好賣。結果他很快就嚐到「差點送命」的滋味，只得放棄。奇怪的是，按理他回來應該怨天尤人，卻反而興奮得像中了頭彩，說他在雪原裡遇到「諸神賜下的祝福」。他聲稱自己學會了「造金」，紅髮漁夫一開始還笑他，直到 Baharasaf 真的拿出一座閃亮的金山，多到足以讓他自稱「商人王」。他甚至把名字改成 Vanhudi——那個名字讓人聯想到神的豐饒與恩賜。</p>
<p>Hildibrand 一聽就認得：Vanhudi 正是 Thavnair 市場上近來竄起的「新貴」，到處收購事業，甚至想把整個 Yedlihmad 港口買下來。雖然碼頭管事拒絕出售，但「錢深不見底」的人買古蹟也能買出新花樣；聽說 Vanhudi 已把 Gilded Araya 改成私宅，並用各種稀世珍寶塞滿屋子。更關鍵的是，他願意用高價收購描繪戰神 Asura 的藝術品——因為他從小就是 Asura 的虔誠信徒。Brandihild 聽到 Asura 這個名字，反倒覺得陌生；紅髮漁夫則說不意外，Asura 作為戰神並不受平民喜愛，但 Baharasaf 把人生看成「為致富而不斷打仗」，所以他祈求 Asura 賜他勝利，而諷刺的是——好像真的靈驗了。</p>
<p>真相因此變得很直接：你們要找的「藥師」與那位「商人王」根本是同一個人。Brandihild 也把那句「雪原裡的祝福」推回到你們最在意的核心——那很可能就是某艘外星船與它的駕駛。就在你們要追下去時，一名 Arkasodara 來插話：鎮外出現一個看起來很不妙的怪物，守衛上去應對，他不看好她的勝算。Hildibrand 立刻把它當成新的案件，帶著你們衝去查看。</p>
<p>現場 Delion 驚到結巴，說他以為那怪物早就被你們毀掉了。Radiant Host 的守衛則大聲安撫民眾，說她只是看到對方很像一名通緝犯才上前查問，但對方拒絕回答。下一秒，怪物自己開口——是 Suprae-Lugae。他還嫌你們礙事，直接脫口而出：Lord Vanhudi 命令他來港口鬧事，而且他還趕時間。守衛當場抓到關鍵，說原來是 Vanhudi 指使的；Suprae-Lugae 發現自己說漏嘴，立刻改口要殺人滅口，還招來更多「陰森的骷髏人」圍攻。</p>
<p>戰鬥最戲劇性的轉折，是 Hildibrand 突然喊出「母親！？」——Julyan 出現，並用壓倒性的力量替你們收尾。事後 Julyan 解釋：她正以 Manderville & Manderville 的經理身分陪 Godbert 行動，他們本來就要去 Vanhudi 的宅邸，因為 Vanhudi 提出了新的交易。Godbert 補充：他以前就拒絕過 Vanhudi 想收購他們商業帝國的提案；這次對方改成「用批發價出清大量黃金」，對做珠寶生意的他們確實很有吸引力，所以才打算至少聽聽看。但既然 Vanhudi 會刻意派手下來公共港口滋事，他們就不可能跟這種惡棍做生意，Julyan 也乾脆地說「絕對不行」。</p>
<p>Delion 立刻回到他最愛的推理：那些「打手」到底哪來的？難道附近有什麼「巨大武裝怪物工廠」？PuPu 給了關鍵線索：他的船上 vaporization beam 被設定成只會清除「複製出來的物質」。Brandihild 接著把原理講得更清楚：matter duplication facility 只要分析過物體的分子結構，就能複製出任意數量——連無機物也行；但它不能無中生有，複製需要足夠的 aether 作為供給。</p>
<p>這句話讓 Delion 把所有線索串起來：Vanhudi 那座「金山」，很可能不是靠煉金術，而是靠外星船的複製機能——用修好的船大量複製黃金。Brandihild 表示他也有同樣懷疑，因為就他所知，沒有其他方法能穩定產出貴金屬到那種程度。Hildibrand 於是做出行動結論：既然如此，Vanhudi 很可能正以威脅或欺騙的方式，逼 PuPu 的朋友替他使用更先進的外星技術。你們下一步很清楚——直接敲開那位「產金者」的門，要求他立刻放人。</p>
<p>回到港口，Nashu 先誇你那一擊打得漂亮；Delion 仍困惑 Julyan 的怪力怎麼能跟 Manderville 男人一樣離譜；PuPu 則因為「威脅與欺瞞」的可能性而焦躁不安。Godbert 承認自己原本還不太願意相信那些不堪的傳聞，但這次無端襲擊已是鐵證。Julyan 看著 Brandihild 打趣：把邊角磨圓一點，他就跟你們家 Hildy 一模一樣。最後 Godbert 提供最快的路：Vanhudi 的邀請裡包含「私人飛空艇」直送新宅；反正他們也得正式拒絕交易，那就一起上船，直奔對方面前。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
