  <style>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'A Pup No Longer (Maelstrom)',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more',
    readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>※ Unlocks Wolves’ Den Pier and PvP.</p>
      <p>R’ashaht Rhiki calls you over just as your recent exploits have become the talk of Limsa Lominsa. She warns you not to let the praise swell your sails too much, but admits that some among the Maelstrom’s higher ranks have begun saying the company would be lost at sea without you. Even so, she can tell that you are not the sort to rest on past victories. The look in your eyes tells her that you are already searching for new waters to cross.</p>
      <p>For someone with that restless drive, R’ashaht has just the place in mind: the Wolves’ Den. Established by the Eorzean Alliance, it serves as a proving ground where promising Grand Company recruits are sent to sharpen their skills. If you wish to test yourself further, you are to take the ferry from Moraby Drydocks in lower La Noscea and travel to the training grounds just off the coast.</p>
      <p>Upon arriving at the Wolves’ Den, you are told to seek out Storm Captain Berkoeya Loetahlsyn. R’ashaht has already informed him of your coming, and she suggests you can expect a warm welcome. What awaits you, however, is anything but warm.</p>
      <p>Berkoeya Loetahlsyn greets you with open contempt. When he learns that R’ashaht sent you, he scoffs that he was promised a new wolf for the Den, not the weakest pup in the litter. In his eyes, you barely have fangs worth honing, and he makes no effort to soften the insult.</p>
      <p>Still, beneath the abuse lies permission. Since he is feeling “generous,” Berkoeya tells you to begin with Crystalline Conflict, training bouts designed for adventurers who still need to learn the difference between sound strategy and blind flailing. If you insist on trying, you are to speak with Lieutenant Gungi Zelungi outside.</p>
      <p>Before dismissing you, Berkoeya reminds you that the Wolves’ Den is no place for a weak spine. He expects you to run home before long, but for now, you have been given your first path into PvP training. The next step is yours to take.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> R’ashaht Rhiki <small class="muted">(Limsa Lominsa Upper Decks, X:13.2, Y:12.9)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row">Private Third Class with the Maelstrom</div>
      <div class="row">Any Disciple of War or Magic (excluding limited jobs) <small class="muted">Lv. 30</small></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="like-civilized-men-and-women-maelstrom.html">Like Civilized Men and Women (Maelstrom)</a></div>
    </div>`
  },

  JP:{
    langLabel:'日本語',
    pageTitle:'激闘のウルヴズジェイル（黒渦団）',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示',
    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>※ ウルヴズジェイル係船場とＰｖＰが開放されます。</p>
      <p>ル・アシャ大甲佐は、近ごろのあなたの活躍がリムサ・ロミンサで評判になっていると告げます。あまり調子に乗るなと釘を刺しつつも、黒渦団の上層部の中には、あなたがいなければ黒渦団は海で迷うようなものだと口にする者さえいるのだと認めます。それでも彼女は、あなたが過去の功績に安住するような者ではないと見抜いていました。その瞳に宿る嵐は、すでに新たな海を求めているように見えたのです。</p>
      <p>そんなあなたにふさわしい場所として、ル・アシャ大甲佐はウルヴズジェイルの名を挙げます。そこはエオルゼア同盟によって設けられた鍛錬の場であり、見込みあるグランドカンパニーの新兵たちが、己の技を磨くために送られる場所です。さらに力を試したいなら、低地ラノシアのモラビー造船廠から船に乗り、ラノシア沖にあるその訓練場へ向かうよう告げられます。</p>
      <p>ウルヴズジェイルに到着したら、嵐大甲士ベルクーヤ・ルータルシンを訪ねるよう、ル・アシャ大甲佐はあなたに伝えます。すでにあなたが向かうことは知らせてあるため、温かく迎えてもらえるはずだと彼女は言います。けれど、そこで待っていたものは、温かい歓迎とはほど遠いものでした。</p>
      <p>ベルクーヤ・ルータルシンは、あなたを見るなり容赦ない侮蔑を浴びせます。ル・アシャ大甲佐から送られてきたと知ると、彼は新しい狼が来ると聞いていたのに、群れの中で一番弱い仔ではないかと吐き捨てます。彼の目には、今のあなたは研ぐほどの牙すらろくに持っていない存在でした。</p>
      <p>それでも、その罵声の裏には許可がありました。気まぐれな親切だと言いながら、ベルクーヤ・ルータルシンは、まずクリスタルコンフリクトから始めるよう命じます。それは、戦略と無謀の違いも分からない冒険者向けに用意された訓練試合だと、彼は乱暴に説明します。挑む気があるなら、外にいるグンギ・ゼルンギ甲曹長に話しかけるよう告げられます。</p>
      <p>最後にベルクーヤ・ルータルシンは、背筋を伸ばせと怒鳴ります。ウルヴズジェイルは、腰の据わらない者が来る場所ではありません。彼はあなたがすぐに尻尾を巻いて逃げ帰ると見ていますが、それでもあなたには、対人戦の鍛錬へ踏み出す最初の道が示されました。次に進むかどうかは、あなた自身に委ねられています。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ル・アシャ大甲佐　リムサ・ロミンサ：上甲板層 <small class="muted">(X:13.2, Y:12.9)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row">黒渦団二等甲兵</div>
      <div class="row">ファイター ソーサラー（リミテッドジョブを除く） <small class="muted">Lv 30～</small></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="like-civilized-men-and-women-maelstrom.html">激戦のアウトロー戦区（黒渦団）</a></div>
    </div>`
  },

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'獄中鬥狼（黑渦團）',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>※ 解鎖狼獄停船場與 PvP。</p>
      <p>R’ashaht Rhiki 在 Limsa Lominsa 關於你近來活躍表現的傳聞正盛時叫住你。她提醒你別因此得意忘形，但也坦承，Maelstrom 的高層之中，已經有人說若少了你，他們恐怕會像在海上迷失方向一樣。即便如此，她也看得出你不是會安於過去功績的人。你眼中翻湧的風暴，像是在尋找下一片可以航行的新海域。</p>
      <p>對於這樣的你，R’ashaht Rhiki 想到了一個適合的地方：Wolves’ Den。那是由 Eorzean Alliance 設立的試煉場，用來讓有潛力的 Grand Company 新兵磨練自身能力。若你想進一步考驗自己，就必須前往 lower La Noscea 的 Moraby Drydocks，搭乘渡船前往位於 La Noscea 近海的訓練場。</p>
      <p>抵達 Wolves’ Den 後，你要找的人是 Storm Captain Berkoeya Loetahlsyn。R’ashaht Rhiki 已經事先通知他你會前來，還說你可以期待一場熱情的歡迎。然而，真正等待你的，與「熱情」完全不同。</p>
      <p>Berkoeya Loetahlsyn 一看到你，就毫不客氣地展開嘲諷。當他得知你是 R’ashaht Rhiki 派來的，立刻冷笑說自己聽說會有新的狼來到這座巢穴，結果眼前卻更像一窩幼崽裡最弱小的那隻。在他眼中，現在的你連值得磨利的獠牙都還不太像有。</p>
      <p>不過，在這些粗暴羞辱之下，他仍給了你進入訓練的許可。他自稱今天格外「慷慨」，要你先從 Crystalline Conflict 開始，並把那稱作專門為不懂戰術、只會亂衝的冒險者準備的訓練戰。若你堅持想試，就去外面找 Lieutenant Gungi Zelungi。</p>
      <p>最後，Berkoeya Loetahlsyn 命令你站直，提醒你 Wolves’ Den 不是意志薄弱者該來的地方。他依然認定你很快就會夾著尾巴逃回去，但至少現在，你已經得到了踏入 PvP 訓練的第一條路。接下來是否要往前走，就輪到你自己決定了。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 黑渦團大甲佐，利姆薩・羅敏薩上層甲板 <small class="muted">(X:13.2, Y:12.9)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row">黑渦團二等甲兵</div>
      <div class="row">戰鬥精英和魔法導師（除設限特職） <small class="muted">等級 30</small></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="like-civilized-men-and-women-maelstrom.html">法外紛爭（黑渦團）</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
