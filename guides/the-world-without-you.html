<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The World without You | BELAUG · FFXIV Library</title>
  <meta name="description" content="DoHDoL – The World without You (EW Patch 6.0)">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>
<body>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`The World without You`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You set to work the moment Jude asks it of you. Of all the parts needed for the starlens, he tells you, the braces may be the most important, and he entrusts them to your hands without hesitation. When you return with the finished pieces, he is overwhelmed by the quality of your craftsmanship. His praise is earnest and unguarded, and beneath it lies something even more fragile: relief. With your help, the burden he has been carrying alone grows lighter, and the trust between you begins to take shape.</p><p>Once the delivery is complete, Jude confesses just how much your assistance means to him. Without you, he says, he would have no hope of finishing the starlens. It is in that quiet moment that another presence bursts in without warning. Jeromere arrives full of breezy confidence, determined as ever to drag Jude out into the world and show him how youth ought to be lived.</p><p>Jeromere launches into an enthusiastic invitation, painting a picture of long afternoons spent around a fire, meat slowly cooking, voices rising in talk and poetry instead of sinking into lonely silence. To him, companionship is something natural, something joyful, and he insists that if Jude would only step into that warmth, he might finally gather the courage to act on the feelings he keeps hidden in his heart. Jude, however, can hardly comprehend why such a proposal would ever be brought to him. Where Jeromere is open and dazzling, Jude sees himself as a creature made for solitude, so uneasy with other people that even the thought of sharing a meal face-to-face unsettles him.</p><p>The exchange turns softer when Jeromere presses him on whether he truly spends all his time alone. Jude answers with painful honesty: Jeromere is his only friend. He says he never learned how to make friends, because no one ever taught him how. For once, Jeromere is left speechless. Yet after that silence, his resolve only hardens. He refuses to let Jude remain shut away in isolation and declares that he will keep coming back until Jude finally understands that.</p><p>After Jeromere leaves, Jude is left in thoughtful wonder. He cannot help admiring someone so lively, so effortlessly surrounded by cheerful companions, and he admits how strongly he wishes he could be more like him. When you answer him, your words push him to stop wallowing in what he lacks and to lift his eyes again. Embarrassed though he is, he takes the thought to heart. He reminds himself that if he keeps staring down at the ground, he will forget to look at the stars. By the end, he is still timid, still fragile, but no longer quite as helpless as before. Thanks to Jeromere’s encouragement—and yours—the heart that once seemed as weak as a marmot has grown a little sturdier, enough, at least, to rival pudding.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Jude <small class="muted">(Old Sharlayan, X:5.3, Y:7.9)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="in-search-of-the-azure-star.html">In Search of the Azure Star</a></div><div class="row">CRP, LTW, WVR Lv. 80</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="poetry-recital.html">Poetry Recital</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'ともだち、いない',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたが手を貸すと決めると、ジュードはすぐに作業へ取りかかろうとします。星見鏡に必要な部材の中でも、その留め具はとりわけ重要なのだと彼は語り、ためらいなくそれをあなたに託します。やがて完成した品を受け取った彼は、その出来栄えに目を見張り、思わず心からの賛辞を口にします。その言葉の奥には、ただ感心しているだけではない、張りつめていた気持ちがようやくほどけたような安堵もにじんでいました。ひとりで抱え込んでいた重荷は、あなたの助けによって少しずつ軽くなり、彼の中では確かな信頼が芽生え始めます。</p><p>納品を終えたあと、ジュードはあなたの助力がどれほど大きな支えになっているかを静かに打ち明けます。あなたがいなければ、星見鏡を完成させる望みなどなかった――そう語る彼の口調には、切実な本音がにじんでいました。そんな穏やかな空気を破るように、そこへジェロメールが勢いよく現れます。今日こそはジュードに、若さのまばゆい季節をどう生きるべきか教えてやるのだと、いつもの調子で胸を張っていました。</p><p>ジェロメールは、海の向こうの島々に由来する料理の話を持ち出し、火を囲み、肉をじっくり焼きながら語らい、詩を吟じる時間の楽しさを熱っぽく語ります。彼にとって、人と集うことはごく自然で、心を弾ませるものなのでした。そしてその炎が、いつかジュードの胸にも火を灯し、秘めた想いを告げる勇気へと変わるのではないかと、本気で信じています。けれどジュードには、そんな誘いがそもそも自分に向けられること自体が不思議でなりません。誰とでも軽やかにつながっていけるジェロメールとは違い、自分は孤独を生きるしかない性質なのだと、向かい合って食事をすることさえ身震いするほど苦手なのだと、彼は身を縮めるようにして答えます。</p><p>それでもジェロメールが食い下がり、せめて学友たちと食事くらいはするのだろうと問い返すと、ジュードはあまりにも率直に、そして痛ましいほどまっすぐに告げます。自分には友達の作り方がわからなかった、学校ではそんなことを教えてくれなかった、そして今いるたったひとりの友達は、目の前のジェロメールだけなのだと。その言葉に、ジェロメールも一瞬は声を失います。ですが、その沈黙のあとに彼が示したのは戸惑いではなく決意でした。こんなふうに閉ざされたままでいてはいけない、ひとりきりで取り残されたままにしてはおけない――そう言って、これからも何度でも会いに来ると宣言します。</p><p>ジェロメールが去ったあと、ジュードはため息まじりに、けれどどこかまぶしいものを見るような思いで彼のことを語ります。自分にはない明るさを持ち、多くの友に囲まれて楽しそうに生きている彼を、どうしても羨まずにはいられないのです。もし自分も少しでもああなれたなら――そんな弱々しい願いを漏らした彼に、あなたは顔を上げるよう促します。恥ずかしさにおびえながらも、ジュードはその言葉を受け止めます。うつむいてばかりいたら、星を見ることまで忘れてしまう――そう自分に言い聞かせるように、彼は小さく息を整えます。まだ臆病さは消えていません。それでも、前より少しだけ折れにくくなった心が、確かにそこにありました。ジェロメールの励ましと、あなたのひと言によって、マーモットのように弱かったその心は、せめてプリンに張り合えるくらいには強くなったのです。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ジュード <small class="muted">（オールド・シャーレアン, X:5.3, Y:7.9）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="in-search-of-the-azure-star.html">蒼の星を探して</a></div><div class="row">木工師、革細工師、裁縫師 Lv 80～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="poetry-recital.html">吟じます</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'沒有你陪伴的世界',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你一答應幫忙，Jude 便立刻想把事情做下去。他告訴你，在製作 starlens 所需的各種部件中，固定用的支架可說是最重要的一環，因此毫不猶豫地把這份工作託付給你。當你把完成的成品交到他手上時，他幾乎掩不住驚嘆，真心為你的手藝折服。而在那份毫不保留的稱讚背後，也藏著一種更深的情緒，像是長久壓在心上的重擔終於稍微鬆開了。原本只能獨自承受的壓力，因為有了你的幫助，終於不再那麼沉重，你與他之間的信任，也就在這樣的往來中慢慢建立起來。</p><p>在收下部件之後，Jude 低聲承認，你的幫助對他而言有多麼重要。若沒有你，他根本不敢想像自己還能不能完成那座 starlens（一種正在研製中的觀星裝置）。就在這段安靜而真誠的片刻裡，另一道截然不同的氣氛忽然闖了進來。Jeromere 帶著一如既往的張揚與從容現身，像是下定決心一樣，非得把 Jude 從他封閉的世界裡拉出來不可。</p><p>Jeromere 興致高昂地向 Jude 描繪另一種青春的模樣：火焰、烤肉、漫長的午後，以及人們圍坐一起談論文學、吟誦詩句的熱鬧時光。對他來說，與人相聚是一件再自然不過、也再快樂不過的事。他甚至相信，那炙烤食物的火焰，也許終有一天能點燃 Jude 的內心，讓他鼓起勇氣，向那位樸素卻仍令人心動的女孩傾訴自己從未說出口的情感。可是 Jude 完全無法理解，為什麼這樣的邀請會落到自己頭上。和活得張揚又自在的 Jeromere 不同，他覺得自己天生就是適合孤身一人的人，甚至只要想到要和別人面對面吃飯，就已經緊張得渾身發冷。</p><p>然而當 Jeromere 不肯放棄，追問他總不可能連和同學一起吃飯都做不到時，Jude 終於說出了最難堪、也最真實的那句話：你眼前的 Jeromere，就是他唯一的朋友。他坦白自己從來不知道該怎麼交朋友，因為在學校裡，從來沒有人教過他這種事。那句話讓 Jeromere 一時沉默了下來。但沉默過後，他的態度反而變得更加堅定。他不願意看著 Jude 就這樣一直把自己困在孤獨裡，也不打算放任他繼續和所有人隔著距離。因此他乾脆地說，自己今後還會繼續來找他，直到 Jude 終於明白這一點為止。</p><p>等 Jeromere 離開後，Jude 帶著一聲嘆息說起他。對他而言，Jeromere 總是那樣耀眼，彷彿天生就能和別人輕鬆來往，身邊永遠圍繞著 cheerful 的朋友，活得那麼自在又快樂。面對那樣的人，Jude 忍不住羨慕，也忍不住希望自己有一天能稍微變得像他一點。當你開口回應時，你的話把他從自憐裡往外推了一步。雖然他被你嚇得縮了一下，甚至慌忙要你小聲一點，但那句鼓勵終究還是落進了他心裡。他告訴自己，若一直低著頭，就連星星都會忘記去看。到了最後，他依然膽怯，依然脆弱，可那顆心已經不再像先前那樣不堪一擊。因為 Jeromere 的鼓勵，也因為你的陪伴，那顆原本像土撥鼠一樣脆弱的心，如今總算變得稍微堅韌了一些，至少，已經堅強到足以和布丁相比了。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Jude <small class="muted">(舊薩雷安, X:5.3, Y:7.9)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="in-search-of-the-azure-star.html">尋找藍色星辰</a></div><div class="row">CRP, LTW, WVR Lv. 80</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="poetry-recital.html">詩歌朗誦</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
