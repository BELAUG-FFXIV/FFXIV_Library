        story:`<div class="story-wrap"><div class="story-content">
<p>You meet Emilie and Astrid at Mih Khetto’s Amphitheatre while the Valentione’s Day celebrations are underway, but they tell you they are still preparing the main event. The plan was to serve generously sized cakes for everyone to share, yet operations halted at the last minute—leaving their plans, and their cakes, half-baked. Astrid asks you to meet the returning emissaries at the amphitheatre entrance to learn what happened.</p>
<p>At the entrance, Kupka Kupp reports bakery bedlam: the mammets meant to create confectionaries brimming with ardor and affection are instead being a nuisance and an obstruction, and it was too much for them to handle alone. Astrid concludes this is best left to someone more skilled in physical altercations.</p>
<p>They explain that the “deliveries of love” are the cakes themselves. To bake confectionery of colossal proportions, House Valentione acquired an old manor on the outskirts of the Twelveswood and turned it into a grand pâtisserie—until the bespoke mammet pâtissiers commissioned from the Goldsmiths’ Guild went on a rampage. Kupka Kupp says they treated them like common cake thieves and all but barred off the kitchen, and though there is an emergency whistle, he could not use it in time.</p>
<p>Because they cannot recklessly destroy such custom clockwork pieces, Astrid asks you to dodge the malfunctioning mammets, decorate the cakes, and save Valentione’s Day. Kupka Kupp insists on accompanying you and offering support, and says he will handle the recipe and decoration plan with the fruit they prepared.</p>
<p>When you return, they call it a resounding success, and Astrid asks you to share the secret so others can replicate the results. Yet she cannot help wondering what drove the mammets to madness. Kupka Kupp says he saw traces of moogle magicks, and the only other moogle who could have cast magic nearby is Kupna Kuko—so they ask you to help search for him in Gridania.</p>
<p>You find Kupna Kuko boasting that the mammets would make cakes by themselves so neither man nor mog would need to lift a paw. Under pressure, he admits he cast a little moogle magick so the mammets could work independently, but the spell caused malfunctions and is not easily undone without risking exploded mammets. Astrid decides there was no intentional sabotage, tells him to bring ideas to her first, and Kupka Kupp reminds him that any task must be carried through for its intended recipient—with love. With cake finally served to one and all, Astrid invites you to sit with them for tea and partake before you return to the kitchen again.</p>
</div><button class="expand-btn" data-more="Read more" data-less="Show less">Read more</button></div>`,

        story:`<div class="story-wrap"><div class="story-content">
<p>あなたはミィ・ケット野外音楽堂で、エミリエとアストリドに声をかけられる。ヴァレンティオンデーの祝祭は始まっているが、ふたりは「本番」の準備がまだ整っていないと告げる。皆で分け合うための特大ケーキを振る舞うはずが、直前で作業が止まり、計画もケーキも半端な状態になってしまったという。アストリドは、状況を見に行った使者が戻るはずだから、入口で合流して話を聞いてほしいと頼む。</p>
<p>入口で待つと、クプカ・クップが工房内の混乱を報告する。本来は愛と情熱に満ちた菓子を作るはずの魔法人形たちが、邪魔をして妨害ばかりし、とても手に負えなかったという。アストリドは、これは腕っぷしの立つ者に任せるのが最善だと判断する。</p>
<p>「愛の配達」とは、まさにその特大ケーキのことだと説明される。巨大な菓子を焼くため、ハウス・ヴァレンティオンは黒衣森の外れにあった古い屋敷を買い取り、立派な菓子工房へと改装した。ところが、彫金師ギルドに特注した菓子職人の魔法人形が暴れ出し、彼らをケーキ泥棒扱いして厨房をふさぐほどの騒ぎになったという。緊急停止用の笛はあるが、吹く間もなかったとクプカ・クップは言う。</p>
<p>特注のからくりをむやみに壊すわけにはいかないため、アストリドはあなたに、暴走する魔法人形をかいくぐり、ケーキを飾り付けて、祝祭を救ってほしいと頼む。クプカ・クップは同行を申し出て、用意した果物などの装飾は自分に任せてほしいと言う。</p>
<p>戻ってくると、エミリエは成功を喜び、アストリドは手際の要点を共有してほしいと求める。しかし、彼女は魔法人形がなぜ暴走したのか気にかかっている。クプカ・クップは、観察の結果、モーグリの魔法の痕跡を見たと話し、近くで魔法を使える立場にあったのは果物の準備を手伝ったクポナ・クコだけだとして、グリダニアで探すことになる。</p>
<p>やがて見つかったクポナ・クコは、魔法人形が全部のケーキを勝手に作り、誰も手を上げずに済むはずだと得意げに語る。問い詰められると、皆が忙しいなら魔法人形だけで作れたほうがいいと思い、少しだけモーグリの魔法をかけたのだと認めるが、解除しようとすると爆発の危険があると言う。アストリドは故意の妨害ではないと判断し、今後は思いつきをまず相談するよう促す。クプカ・クップは、受け取る相手のために、どんな手助けも「愛をもって」やり遂げるべきだと諭す。こうして祝祭は進み、ケーキが振る舞われ、アストリドはあなたにお茶を勧めて席に着くよう招く。</p>

      ZH:{

        tabs:{ story:'故事概要', acq:'取得方式', event:'活動期間', unlockq:'解鎖任務', followq:'後續任務', bgm:'BGM', comments:'留言' },
        story:`<div class="story-wrap"><div class="story-content">
<p>你在 Mih Khetto’s Amphitheatre 遇到 Emilie 與 Astrid。雖然情人節的慶典已經開始，但她們坦白主活動的準備還沒完成：原本要端出能讓大家一起分享的特大蛋糕，卻在最後關頭整個流程停擺，計畫與蛋糕都成了「半成品」。Astrid 請你到 amphitheatre 入口會合，等外出查明狀況的人回來帶回細節。</p>
<p>在入口，Kupka Kupp 回報裡頭已經亂成一團：本該做出充滿「愛與熱情」甜點的自動人偶，現在卻只會妨礙、擋路，事情大到他們根本無法靠自己處理。Astrid 因此判斷，接下來恐怕得交給更擅長動手解決的人。</p>
<p>她們也說明，「傳遞愛意」指的其實就是這批蛋糕本身。為了烤出巨大尺寸的甜點，House Valentione 買下 Twelveswood 郊外的一棟舊 manor，改造成一間大型 pâtisserie；然而從 Goldsmiths’ Guild 訂製的甜點職人自動人偶卻突然失控暴走。Kupka Kupp 說它們把大家當成偷蛋糕的人，幾乎把廚房整個封住；雖然有緊急停止用的哨子，但事發太快，他根本來不及吹。</p>
<p>因為這些都是特製的機關作品，Astrid 表示不能隨便破壞，所以她直接拜託你：躲開失控的自動人偶、完成蛋糕裝飾，把情人節救回來。Kupka Kupp 表示會陪你一起進去支援，並說裝飾所需的水果等材料已備妥，配方與設計可以交給他處理。</p>
<p>你完成任務回來後，Emilie 說這次成果非常成功；Astrid 也請你分享做得順利的關鍵，讓之後能由其他人接手大量製作。但她仍放不下疑問：到底是什麼讓自動人偶突然失控。Kupka Kupp 說他觀察到 moogle 魔法的痕跡，而當時有機會在附近施法、又參與準備水果的，只剩 Kupna Kuko，於是他們請你陪同到 Gridania 尋找對方。</p>
<p>你們找到 Kupna Kuko 時，他正得意地說自動人偶會把蛋糕全做完，讓「不論人還是 moogle」都不用動手。被追問後，他承認自己只是想讓自動人偶能自行工作，才施放了一點 moogle 魔法，卻導致失控，而且要解除法術可能會引發爆炸。Astrid 判斷這不是蓄意破壞，要求他以後有想法先來商量；Kupka Kupp 也提醒他，無論是送信還是幫忙，都要為了收件者把事情「帶著愛」做到底。最終，蛋糕順利端上、主活動得以展開，Astrid 邀你坐下來喝茶、吃一塊蛋糕，再回到廚房繼續忙碌。</p>
</div><button class="expand-btn" data-more="展開全文" data-less="收合內文">展開全文</button></div>`,

    const langToggle  = document.getElementById('langToggle');
    const pageTitle   = document.getElementById('pageTitle');
    const tabBtns     = [...document.querySelectorAll('.tab-btn')];
    const panels = {
      story:  document.getElementById('panel-story'),
      acq:    document.getElementById('panel-acq'),
      event:  document.getElementById('panel-event'),
      unlockq:document.getElementById('panel-unlockq'),
      followq:document.getElementById('panel-followq'),
      bgm:    document.getElementById('panel-bgm'),
      comments: document.getElementById('panel-comments')
    };

    function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }

    function wireStoryToggler(root){
      const btn = root.querySelector('.expand-btn');
      const content = root.querySelector('.story-content');
      if(!btn || !content) return;
      const more = btn.getAttribute('data-more');
      const less = btn.getAttribute('data-less');
      btn.onclick = ()=>{
        const expanded = content.classList.toggle('story-expanded');
        btn.textContent = expanded ? less : more;
      };
    }

    function applyLang(lang){
      const t = i18n[lang] || i18n.EN;
      pageTitle.textContent = t.pageTitle;
      langToggle.textContent = `🌐 ${t.langLabel}`;
      tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
      const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
      renderPanel(activeBtn.dataset.tab, lang);
    }

    function renderPanel(key, lang){
      const t = i18n[lang] || i18n.EN;
      Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
      panels[key].classList.add('active');

      if(key !== 'comments'){
        panels[key].innerHTML = t[key];
        if(key==='story') wireStoryToggler(panels[key]);
      }else{
        loadGiscusForCurrentLang();
      }
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab, getLang());
      });
    });

    langToggle.addEventListener('click', ()=>{
      const cur = getLang();
      const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
      localStorage.setItem(LANG_KEY, next);
      applyLang(next);
    });

    /* Giscus：Comments 分頁 */
    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };
    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }

    applyLang(getLang());
  </script>
