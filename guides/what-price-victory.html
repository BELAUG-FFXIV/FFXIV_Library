    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
<p>Hildibrand laments poor, misunderstood Ulty, insisting they suspected criminality when he was only a gentle soul unlucky in love, and he begs Ulty to forgive them. Ellie cuts through the sentiment and urges you back to the investigation: if Avila truly is as suspicious as people claim, you should tail her for a time, and Dour Meadow at the Coliseum can tell you where to find her. Hildibrand agrees—then grandly restates the plan as though it were his own, calling for Nashu as the investigation beckons.</p>
<p>Orthrus snaps that “Uncle Ulty” saw you following him, then plays the fool and the schemer in the same breath—an octopus who wants a cute girl, untold riches, and the admiration of millions. With a laugh, he inks his farewell and slips away. Nashu remarks that Mister Ultros had no luck with the ladies, and—speaking only for herself—adds she’d love to have him for dinner with lemon butter sauce.</p>
<p>At the Coliseum, Dour Meadow brusquely says he’s busy, but tells you Avila mentioned sharing a drink with her countrymen at the Coffer & Coffin, and you might still find her there. He warns you to keep your distance if you’re smart: Ganelon tried to interview her for an article, and it sounded like she was about to tear his head off. In his words, she does not take kindly to personal questions—and he laughs that if you want a sparring match to warm up for the tourney, she might be just the ticket.</p>
<p>Hildibrand insists there will be no need for gratuitous fisticuffs—his remarkable espionage will secure every scrap of information without the fiery lass ever noticing. At the Coffer & Coffin, he points out Avila “just as predicted” and has you keep watch from afar so as not to provoke her famed temper. You hear Avila declare the spoils will be hers as surely as stone, and that her victory will mark a new era: as Raubahn Aldynn won a new life in the Coliseum, so will she win a new life for her people.</p>
<p>Avila boasts that the prize will multiply her people’s wealth a thousand—no, ten-thousandfold; in a land where wealth is power, the Ul’dahns will kick them into the gutter no longer. She says she must go to the Nanawa Mines to meet her sister. Hildibrand openly admires her self-assurance and admits his own chances of felling her in battle are infinitesimal, while Ellie reminds you that you have a suspect to pursue.</p>
<p>Orthrus suddenly reappears, jeering that you won’t steal Avila from “Uncle Ulty’s” tentacles, and claiming his homemade explosive will end your road. Hildibrand catches the distinctive smell of firesand and asks if this is Nashu’s work, but Nashu swears it’s far too elaborate to be one of hers—and even asks whether the maker might teach her. Orthrus panics that they’re onto him, while Hildibrand shudders at what might happen if an unsuspecting passerby found such a hazard, and heaves it away as Orthrus howls in disbelief.</p>
<p>Hildibrand then has you listen closer to the woman in mining garb—the sister Avila mentioned. You hear Avila scold her for working before her leg is healed, and Hegelina retort that the little sister can care for herself—before asking for news of the tourney. Avila assures her she has taken every precaution and that the Warden’s Grace is as good as theirs, worth some thirty million gil; she rattles off luxuries she’ll buy, vows those days of shabby clothes and Ul’dahn scorn will end, and promises she will do this for them—then cuts herself off and leaves, fearing prying reporters.</p>
<p>Hegelina confesses she is proud to see Avila stand tall in the Coliseum, with hundreds and thousands cheering her name, and that standing strong and together is all the wealth she asks for. Avila chides her for settling for less than she’s worth, repeats that she will watch over her, and departs; Hegelina calls her “Avi,” wishing the gods smile on her and that she be safe. Hildibrand is moved to tears by the sisterly love yet worries it offered few clues, while Ellie admits Avila’s obsession runs deeper than expected and says she feels a bond, having been alone in the world with her own sister.</p>
<p>Orthrus snaps that he’s had it up to here and urges you—“Mister Warrior of Light”—to fall into a pit and die like a good little boy, luring you closer with a sound meant to draw you in. At the last instant he shrieks at the wrong target, and Hildibrand clears his throat to announce he merely investigated the hole and found nothing out of the ordinary. Ellie dryly calls you “our hero” and urges you back to Ul’dah before the Mythril Cup begins, because the last thing you want is to lose by forfeit, while Orthrus realizes he dug two pits and curses his own mistake.</p>
<p>As you press on, Hildibrand warns Ellie to stand back—his well-honed senses are tingling, and a fearsome adversary lurks nearby. Orthrus tries to unveil a hungry beast from the Coliseum, only to fumble and panic about where it went, then yelps at the sight of a half-naked fool. The murderous rage Hildibrand felt proves to be Godbert—his father—who says he was only strolling for inspiration and materials; Hildibrand explains you must return to Ul’dah because he is set to compete for the Mythril Cup, and Godbert laughs that moonlighting as a gladiator suits a Manderville man.</p>
<p>Orthrus reels that this muscle-bound old man is the inspector’s father and swears never to attend a family reunion, still wondering who the inspector truly is. Gilgamesh then steps from the shadows, calling Hildy a worthy rival and addressing you as well; he names himself Gilgamesh, a wandering duelist, and says he is not so much Hildibrand’s friend as his enemy. He tells Orthrus you will end up seafood soup if he faces you alone, admits he is considered a fugitive for reasons he doesn’t fully understand, and warns you he will not fall so easily this time.</p>
<p>Left with too much attention and too little control, Orthrus decides he needs a friend if he cannot handle you alone. Godbert, struck by inspiration, declares a masterpiece is calling and tells the fiend to look forward to its next life as art, sending Orthrus into helpless fury. Hildibrand gulps that stumbling upon Father like that has taken a year off his life, notes that a crowd has assembled and the festivities are about to commence, and concludes that even if Avila’s secrets remain elusive, what better place to continue the investigation than on the field of battle.</p>
</div>

  JP:{

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
<p>ヒルディブランドは、誤解された哀れなオルティを憐れみ、犯罪者扱いしたのは間違いだった、恋に不運なだけの優しい心を許してほしいと嘆く。エリーは呆れたように話を切り替え、捜査に戻るべきだとあなたに促す。アヴィラが噂どおり怪しいのなら、しばらく尾行して確かめるのがいい、居場所はコロセウムのドア・メドウが教えてくれるはずだという。ヒルディブランドは賛同しつつ、改めてその筋書きを得意げに言い直し、捜査の呼び声だとナシュ・マカラッカを呼ぶ。</p>
<p>オルトロスは、オルティおじさんがあなたに尾行されているのを見たと不敵に笑い、自分はただのタコだと言いながらも意味深な言葉をちらつかせる。かわいい娘と莫大な富と大勢の称賛がほしいのだ、と夢を語り、最後はタコらしく墨を吐いて去っていく。ナシュ・マカラッカは、ウルトロス先生は女性運がなかったとこぼしつつ、自分だけの話だが夕食にできたら最高だ、レモンバターソースがいいと物騒なことまで口にする。</p>
<p>コロシアムでドア・メドウに当たると、彼は忙しいと不機嫌に言いながらも、アヴィラならコファー＆コフィンで同郷の仲間と酒を飲むと言っていた、まだそこにいるかもしれないと教える。だが、賢いなら距離を置けと忠告し、ガヌロンが記事の取材で話を聞こうとしたら首を引きちぎられそうになった、とまで言う。個人的な質問をされるのがよほど嫌いらしい、と含みを持たせ、さらに腕慣らしの相手がほしいならうってつけだと豪快に笑う。</p>
<p>ヒルディブランドは、無用な殴り合いは不要だと言い切り、自慢の諜報術で相手に気づかれず情報を得てみせると胸を張る。コファー＆コフィンでは、予想どおりアヴィラがいたと告げ、名高い気性を刺激しないよう離れた場所から見張るようあなたに促す。アヴィラは戦利品は自分のものだと断言し、この勝利で新しい時代が始まるのだと言い、ラウバーン・アルディンがコロセウムで新しい人生を得たように、自分も民のために新しい人生を勝ち取るのだと語る。</p>
<p>賞金は民の富を千倍、いや万倍にすると豪語し、富が力となるこの国で、ウルダハの者たちに二度と路地へ蹴落とされはしないと言い放つ。そしてナナワ鉱山で妹に会うから行く、と締めくくる。ヒルディブランドは彼女の自信を称賛しつつ、戦場で自分が勝てる見込みは限りなく低いと推測し、エリーはだからこそ容疑者を追うのだとあなたを急かす。</p>
<p>そこへオルトロスが現れ、オルティおじさんの触手からアヴィラを奪うつもりかと嘲り、自作の爆弾で終わりにしてやると言い出す。ヒルディブランドは火薬砂の匂いに気づき、ナシュ・マカラッカの作かと問うが、ナシュ・マカラッカはこれは自分のものより手が込みすぎていると否定し、作った者に教わりたいとさえ言う。オルトロスは動揺し、ヒルディブランドは通りすがりの者が触れれば危険だと身震いして持ち上げ、投げ捨てると、オルトロスは悲鳴を上げる。</p>
<p>ヒルディブランドは、採掘服の娘こそアヴィラが言っていた妹だと見て、もっと近くで聞くようあなたに促す。アヴィラは脚が治るまで重労働はするなと叱り、ヘゲリナは姉が片腕で帝国兵を退けた過去を引き合いに出し、妹だって同じように自分のことはできると言い返す。アヴィラは闘技会の準備は万全で、ウォーデンズ・グレイスは自分たちのものも同然、価値は三千万ギルほどだと誇り、宝飾や衣装など望む贅沢を並べ立て、上流階級の嘲りを受ける日々は終わるのだと言い切る。</p>
<p>ヘゲリナは富も悪くないが、とためらいつつ、コロセウムでアヴィラが胸を張り、大勢が名を叫ぶ姿が誇らしいと言い、強く、共に立つことこそ自分の望む富だと告げる。アヴィラはそれが問題だ、価値以下で満足しすぎるのだと諭し、姉が見守るから心配はいらない、これは二人のためだと言って去り、詮索好きな記者に聞かれるのを恐れる。ヘゲリナは、死闘は恐れないのに優しさを見られるのは怖がる姉らしいと見送り、安全を祈る。ヒルディブランドは涙をぬぐい、姉妹愛に心を打たれたが手がかりは乏しいと嘆き、エリーは執念の深さを認めつつ、自分も妹と二人きりだったから共感すると語る。</p>
<p>オルトロスは、もう我慢ならないと言い、あなた――光の戦士――に穴へ落ちて死ねと悪態をつき、音で一歩ずつ誘い込もうとする。だが最後に狙いを誤って怒鳴り、ヒルディブランドは咳払いして、穴を調べたが異常は何もないと平然と報告する。エリーは皮肉まじりに英雄ぶりを認めつつ、ミスリルカップが始まる前にウルダハへ戻ろう、棄権負けだけは避けたいと言い、オルトロスは穴を二つ掘ったことを思い出して地団太を踏む。</p>
<p>やがてヒルディブランドは、エリーに下がるよう告げ、鍛え抜かれた感覚がうずく、恐るべき敵が潜んでいると言う。オルトロスはコロセウムの獣を呼び出したつもりが見失い、半裸の男を見て狼狽する。ヒルディブランドが感じた殺意は、獲物ではなく父ゴドベルトのものだった。ゴドベルトは新作の着想と素材を求めて散歩していただけだと言い、ヒルディブランドは少しの捜査だと答えつつ、ミスリルカップに出場するからウルダハへ戻らねばならないと説明する。ゴドベルトは、闘士の副業とはさすがマンダヴィルの男だと笑う。</p>
<p>オルトロスは、その筋骨隆々の男が警部の父だと知って戦慄し、家族の集まりだけは絶対に避けたいと震える。そこへギルガメッシュが現れ、ヒルディを好敵手と呼び、あなたにも声をかける。自分は放浪の決闘士ギルガメッシュで、警部の友ではなく敵だと言い、オルトロスに、二人を相手に一人で挑めば海鮮スープになると警告する。そして自分はこの地でなぜか逃亡者扱いだと言い残し、あなたに、今度はそう簡単には倒れないと告げて去る。</p>
<p>追い詰められたオルトロスは、あなたに一人では敵わないなら仲間を連れてくるしかないと決める。ゴドベルトは海の生き物のうねりを思わせる造形に着想を得たと言い、次の生は傑作として迎えろと宣告し、オルトロスは筋肉男たちが大嫌いだと叫ぶ。ヒルディブランドは父に偶然出くわしたせいで寿命が縮んだと嘆き、群衆が集まり祭りが始まろうとしているのを見て取る。アヴィラの秘密をさらに掴みたかったが、それでもいい、戦場ほど捜査を続けるにふさわしい場所はない、とあなたに告げる。</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>Hildibrand 為可憐、被誤解的 Ulty 感嘆，說你們先前竟然把他當成罪犯，事實上他只是個心地溫柔、卻在戀愛上總是走霉運的可憐人，還誇張地請他用那黏呼呼、軟趴趴的心原諒你們。Ellie 聽不下去，直接把你拉回正題：如果 Avila 真的像大家說的那麼可疑，你就該跟著她一段時間；至於她在哪裡，Coliseum 的 Dour Meadow 應該能告訴你。Hildibrand 先稱讚這主意好，接著又像是在宣讀自己的推理一樣把計畫再說一次，催著 Nashu 出發。</p>
<p>Orthrus 不悅地說「Ulty 叔叔」早就看見你在跟蹤，還一邊裝傻一邊吊人胃口，說自己不過是一隻笨章魚——又或者不是。接著他坦白自己想要的其實很簡單：可愛的女孩、數不清的財富，以及千萬人的崇拜；章魚也能做夢吧。話一說完，他又嘻笑著說要「噴墨就跑」然後溜走。Nashu Mhakaracca 望著他的背影嘆氣，說 Ultros 先生似乎完全不受女生歡迎；她還補上一句只代表自己——她倒很想把他當晚餐，最好配上檸檬奶油醬。</p>
<p>回到 Coliseum，你們找上 Dour Meadow，他嫌你們煩，卻還是告訴你：Avila 說要去 Coffer & Coffin 跟同鄉喝一杯，你們也許還能在那裡找到她。但他也警告你最好離她遠點——Ganelon 以前想為文章採訪她，結果看起來差點被她把腦袋直接扯下來。他說得更直白些：她對那種帶著私人意味的提問，非常不友善；不過如果你想在比賽前找個陪練熱身，她倒可能正合你意。</p>
<p>Hildibrand 信誓旦旦地說根本不需要動手打架，他的「偵察手段」足以在 Avila 毫無察覺的情況下弄到一切情報。到了 Coffer & Coffin，他指著那位「果然在這裡」的 Avila，要你從遠處盯著，免得引爆她出了名的火爆脾氣。你聽見 Avila 說戰利品注定屬於她，就像刻在石頭上一樣；她宣稱自己的勝利會開啟新時代——就像 Raubahn Aldynn 在 Coliseum 贏得新人生一樣，她也要為族人贏得新人生。</p>
<p>Avila 說這份獎賞會讓族人的財富增加千倍、不，是萬倍；在這個「財富就是力量」的地方，他們不會再被 Ul’dah 的人踢回陰溝。她接著表示自己得去 Nanawa Mines 見妹妹，於是準備離開。Hildibrand 讚嘆她的自信永遠令人驚嘆，甚至推論自己在戰場上擊倒她的可能性小到幾乎不存在；Ellie 則提醒你別忘了你們是在追嫌疑人。</p>
<p>就在這時 Orthrus 又冒出來，嘲笑你想從「Ulty 叔叔」的觸手裡把 Avila 搶走是不可能的，還說他的自製爆裂物會讓你們走到盡頭，甚至反問這樣會不會讓他成為壞章魚。Hildibrand 聞到火藥砂的味道，還以為是 Nashu 的作品；Nashu Mhakaracca 卻急忙否認，說這東西太精巧，絕不可能是她做的，甚至好奇製作者能不能教她。Orthrus 驚慌失措，覺得你們看穿了他；Hildibrand 則想到若是無辜路人碰上這種危險物會怎樣而不寒而慄，乾脆親手把它搬起來扔走，Orthrus 只能尖叫著崩潰。</p>
<p>Hildibrand 指著穿著礦工裝束的女子，說那應該就是 Avila 提到的妹妹，要你再靠近些聽清楚。你聽見 Avila 斥責妹妹：腿還沒好就不准做重活，還說有時候真懷疑她天生就是來讓姊姊頭痛的。Hegelina 回嘴說別把她當小孩，還提起 Avila 曾用一隻能用的手打退十個帝國兵，表示自己也能照顧自己，然後問起比賽的進展。Avila 說她做足了準備，Warden’s Grace 幾乎已是囊中物，價值大約三千萬 gil；她一口氣列出想買的奢華——Eshtaime’s 的項鍊、Sunsilk 洋裝——並說那些因為衣衫襤褸而被 Ul’dah 上流階級憐憫與嘲笑的日子都會結束。</p>
<p>Hegelina 猶豫地說財富固然很好，但當她看見 Avila 在 Coliseum 昂首站立、成千上萬的人呼喊她的名字時，她感到驕傲；不論出身多卑微，只要她們堅定、一起站著，這就已經是她想要的全部。Avila 沉默片刻，說那正是 Hegelina 的問題——太容易接受低於自身價值的東西；她要妹妹別擔心，因為姊姊會看著她，這一切都是為了她們。她隨即要回去，還說可別讓那些愛打探的記者聽見。Hegelina 望著她離去，說 Avila 面對生死決鬥都不動搖，卻害怕被人撞見溫柔的一面，並祈願眾神保佑姊姊平安。Hildibrand 擦著眼淚，說從未見過更動人的姊妹之情，卻也擔心這對你們幾乎沒提供新線索；Ellie 則說 Avila 對勝利的執著比你們想像得更深，而她也忍不住共鳴，因為她和自己的妹妹也曾在世上相依為命。</p>
<p>Orthrus 忍無可忍地叫你們受夠了，還對著你——「光之戰士」——說能不能乖乖掉進坑裡去死，並用聲音一步步引你靠近；最後他卻對著錯的目標暴怒大喊。Hildibrand 清了清喉嚨，若無其事地宣告他只是「順便」調查了那個洞，結果一切正常、毫無異狀。Ellie 無奈地叫你們回 Ul’dah，說 Mythril Cup 很快就要開始了，你們可不想最後因為棄權而輸掉比賽；Orthrus 這才想起自己挖了兩個坑，越想越崩潰。</p>
<p>接著 Hildibrand 要 Ellie 退後，說他磨練至今的偵探直覺正在刺痛，附近潛伏著可怕的敵人。Orthrus 得意地說要放出從 Coliseum 帶來的飢餓怪物，結果又急又慌地找不到對方，還被「那個半裸的蠢貨」嚇到。Hildibrand 以為自己感受到的滔天殺意來自獵物，沒想到來的卻是他的父親 Godbert。Godbert 說自己只是散步、尋找新作品的靈感與材料；Hildibrand 則表示你們只是做點偵探工作，並說你們得趕回 Ul’dah，因為他要去參加 Mythril Cup。Godbert 大笑，說身為 Manderville 的男人，兼職當鬥士再適合不過。</p>
<p>Orthrus 震驚得不行，說那個肌肉爆棚的老男人竟然是偵探的父親，還嚷著要你提醒他千萬別去參加那家人的家族聚會，並怒吼自己到底惹上了什麼人。這時 Gilgamesh 現身，稱 Hildy 是值得一戰的對手，也點名你，說他一直在等這一天。他自報姓名是 Gilgamesh——流浪的決鬥士——並表示他與其說是偵探的朋友，不如說是敵人。Gilgamesh 警告 Orthrus，若是單挑你們兩個，最後只會變成海鮮湯；他還說自己在這一帶不知為何被當成逃犯，所以得先走一步，但他也對你撂下話：這次他不會那麼容易倒下。</p>
<p>Orthrus 眼看單靠自己根本不夠，便盤算著既然你太強，就要帶個「朋友」一起來。Godbert 靈感乍現，說自己想到一件能讓人聯想到海中生物起伏扭動的傑作，並要那個邪物期待成為作品的「下一條命」；Orthrus 只能怒吼自己最討厭肌肉男。Hildibrand 倒抽一口氣，說像那樣遇到父親簡直讓他少活一年；他看著周遭聚集的人群，說慶典似乎就要開始。就算沒能挖出更多 Avila 的秘密也無妨——他宣告沒有比戰場更適合延續調查的地方，並催你準備迎向即將到來的對決。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
