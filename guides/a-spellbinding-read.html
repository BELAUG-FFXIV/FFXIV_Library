const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`A Spellbinding Read`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You run into a familiar guild contact, who greets you with an unusual commission: someone specifically asked for you by name—an acquaintance of yours, a Miqo’te gleaner named Y'nazqha. Before you can even ask more, you spot her nearby, distracted by a new ingredient she has just bought and simply had to taste.</p><p>She finally turns to you with a bright apology and introduces herself properly, thanking you for looking after her older sister, Y’shtola. She adds that even Mhitra has spoken highly of you—praise she doesn’t give lightly—so when Y'nazqha needed a capable adventurer for a small odd job, your name was the only one that made sense. Then she asks the true favor: will you accompany her into the pages of an ancient manuscript?</p><p>Sensing your confusion, she explains. As a gleaner, she specializes in recovering documents and manuscripts, and she studied under her father and mentor, Y’rhul Nunh. He died of illness while on a mission far from home—a loss that still stings. Though she was able to say goodbye, being left alone in an unfamiliar land was harsh, and her sisters helped her endure. Before he passed, her father left her a keepsake: an illuminated manuscript with a dangerous enchantment that can draw a reader’s mind into its pages.</p><p>Collectors covet the tome precisely because it is rare—and perilous. Yet Y'nazqha believes her father gave it to her for a reason, and she is determined to read every page to learn why, even if it means risking the enchantment. That is why she asked for you: she needs someone to keep her safe while she ventures into the world within the book. When you agree, she tells you the manuscript is secured at the gleaners’ lodgings in Journey’s End, and she will wait for you there.</p><p>At the lodgings, she introduces you to the caretaker, Fyrgeim, who admits she didn’t expect to meet the hero from Erenville’s stories—until now. Fyrgeim teases that Y'nazqha’s boundless curiosity has gotten her into trouble more than once, including her habit of tasting anything that catches her eye, but it is also what made her a capable gleaner. Y'nazqha brings the focus back to the manuscript: it is titled The Merchant’s Tale, a well-known fable from Corvos in southern Ilsabard, about a shrewd young merchant seeking the perfect gift to win a maiden’s heart.</p><p>Countless versions of the story have been told over generations, so she cannot be sure how this particular manuscript ends. Worse, the enchantment makes reading the whole thing daunting. Still, she remembers her father’s final instruction: after reading the last passage, she will understand what is needed to walk the path ahead. To her, it is a trial—mentor to pupil, father to daughter—and with you beside her, she is not afraid to begin.</p><p>The moment you surrender to the book’s magic, the world shifts, and you find yourselves inside the tale at the maiden’s home. The maiden speaks as if following written lines, insisting she cannot return the peddler’s affection and is destined to remain alone with sorrow. Y'nazqha realizes you have become characters in the narrative—and that acting as they should may move the plot forward. The role she receives is the merchant, and yours is the merchant’s trusted bodyguard.</p><p>In the script, the merchant declares the maiden deserves happiness, and she sets the condition: bring her an object of immeasurable worth—something that can fill the void in her heart. The merchant vows to search the ends of the world and return. With that, the journey begins, but the “worth immeasurable” remains unclear. Y'nazqha decides you must read on, yet first she urges you to examine the room for clues. You notice a sigil carved into the wall matching the book’s cover, and you sense it could return you to the real world. You also take in the sea-maid pattern on the carpet, the Corvosi porcelain tea set, and what the story claims of the maiden: she has no family, arrived years ago, and has turned away every suitor, deepening the mystery around her.</p><p>When you are ready, you choose to continue. Y'nazqha remarks that the tale seems set in Corvos before Garlean rule, promising sights lost to history—and perhaps deadly beasts—but she trusts your strength. As the story branches, you witness endings where the maiden remains unmoved by splendid treasures: an enchanted flying carpet, a jewel shimmering like the sea, a famed swordmaster’s beloved blade—each time she tells the merchant to sell it, gain fortune, and seek happiness elsewhere. The book makes clear that unread passages remain, and that other roads may lead to a different conclusion.</p><p>At last, following a different thread, the merchant returns with an ashen plate whose sea-maid design matches the carpet in her room. This time the maiden falters: the plate stirs memories of a life she nearly forgot, of joy extinguished by a terrible beast, and of the family she lost—parents and brothers—who would have wanted her to live in happiness. She admits it was wrong to put the merchant through such an ordeal, thanks him for the gift, and asks forgiveness, offering to spend her life by his side.</p><p>You return from the manuscript to the lodgings. Y'nazqha thanks you for standing with her through dangers she had only imagined, and says that even if parts were embellished for the sake of story, seeing Corvos as it once was felt like a treasure. She speaks excitedly of the paths you took—of cities and seas, valleys and foes, sea-folk and monsters—and each time she notes how the wrong treasure failed to ease the maiden’s sadness. Yet she is certain the ending you witnessed is only one of many, and she is resolved to explore the pages again and again until she understands the meaning of her father’s parting words. She asks for your help when you can spare the time, and the guild contact later confirms the job is complete—though the book’s allure makes it hard not to think about leaping back into its pages.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="starting-a-new-chapter.html">Starting a New Chapter</a></div></div>`

  JP:{
    langLabel:'JP',
    pageTitle:'瑠璃紺の本に語らるる冒険譚',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたはギルドの顔なじみに声をかけられ、少し変わった依頼を持ちかけられる。手を動かす仕事を探しているのかと笑われたあと、今度の依頼は「あなたを名指しで」求めた客がいると言われる。しかも、あなたを知っているというミコッテの娘だ。名を聞けば、蒐集員のヤ・ナズカだという。思い当たるかと問われる間もなく、当の本人が近くにいるのが目に入る。</p><p>彼女は新しい食材を見つけては味見せずにいられなかったと謝りつつ、ようやくあなたに向き直る。そして、姉であるヤ・シュトラの世話になったことへの礼を述べ、さらにミトラさえもあなたを頼りにしていたのだと語る。軽々しく尊敬を口にしない相手があなたを褒めていたことに、彼女は驚いたのだという。だからこそ、腕の立つ冒険者を探す必要が生じたとき、あなた以外は考えられなかった。そう言って彼女は、古い民話の書物の「頁の中」へ一緒に旅をしてほしいと頼む。</p><p>奇妙に聞こえる依頼の理由を、彼女は落ち着いて説明する。彼女は蒐集員として文書や写本の回収を専門にし、父であり師でもあったヤ・ルル・ヌンのもとで学んできた。だが父は遠い土地での任務中に病に倒れ、帰らぬ人となった。別れを告げられたことは救いだったものの、見知らぬ土地に取り残された日々は苦しかったという。そのとき支えになってくれたのは姉妹たちだった。</p><p>そして父もまた、父なりの形で彼女を導いた。父が遺した形見こそ、依頼の中心にある品だ。精緻な装飾を施した写本で、読む者の意識を頁の内側へ引きずり込む危険な魔法が宿っている。珍しく、そして危うい書物として、特異な文書を求める収集家の間では悪名高い。だが父がこれを託したのには理由があるはずで、危険を承知で彼女は全頁を読み、その理由を確かめたいのだという。だからこそ、物語の世界を探索する間、あなたに身の安全を守ってほしいと願い出た。</p><p>あなたが引き受けると、彼女は書物を人目につかぬよう厳重に保管していること、そしてそれを「ジャーニーズ・エンド」にある蒐集員の宿舎へ預けていることを告げる。準備ができたらそこで合流しよう、と彼女はあなたを待つ約束をする。</p><p>宿舎に着くと、彼女は管理者の女性を紹介する。彼女は、あなたが噂どおりの英雄だとは半信半疑だったが、今は信じざるを得ないと言い、エレンヴィルが語っていたあなたの話が誇張ではなかったのだと認める。さらに彼女は、ヤ・ナズカの尽きない好奇心についてぼやきつつも、それが彼女を腕の立つ蒐集員にしたのだと語る。目にしたものをまず口に入れて確かめようとする無鉄砲さは、何度も彼女を危険に近づけたが、学びへの執念でもあるのだという。</p><p>ヤ・ナズカは本題に戻り、写本の題名が『商人の物語』であると告げる。舞台は南方イルサバードのコルヴォスに伝わる寓話で、若く抜け目のない商人が、ある娘の心を射止めるため「最高の贈り物」を求めて旅をする話だ。だがこの物語は長い年月の中で幾度も語り直され、写本ごとに結末が異なる可能性がある。だからこの写本がどんな終わり方をするのか、彼女にも断言できない。</p><p>それでも彼女は父の言葉を忘れない。最終の一節を読み終えたとき、進むべき道に必要なものが理解できる――父はそう言って写本を託した。彼女にとってそれは試練であり、師から弟子へ、父から娘へ渡された問いかけだ。頁の魔法に身を委ねた先で何が起こるかはわからないが、あなたが隣にいるなら恐れはない。そうして彼女は、写本の扉を開く決意を固める。</p><p>魔法が働いた瞬間、あなたは彼女と共に物語の中へ引き込まれ、「娘の家」に立っていた。娘は台本をなぞるように、あなたに向かって、想いには応えられないのだと告げ、ひとりで悲しみと共に生きる運命だと言い張る。ヤ・ナズカはすぐに状況を理解し、あなたたちが物語の登場人物になったのだと悟る。そして、登場人物が取るべき振る舞いをなぞれば、筋書きを先へ進められるかもしれないと言う。</p><p>彼女に与えられた役は若き商人で、あなたは商人に付き従う腕利きの用心棒だった。商人は娘の荒んだ思いを退け、あなたの台詞として記された言葉を口にし、幸福を与えると誓う。娘は条件を示す。「計り知れぬ価値の品」を持ってこい――胸の空洞を満たすほどの宝を示せば、想いが真実だと信じられる。商人は天地の果てまで探し、必ず戻ると誓い、物語は旅立ちへ進む。</p><p>だが「計り知れぬ価値」が何なのか、商人もあなたたちもわからない。ヤ・ナズカは、答えは物語の中にあるはずだから読み進めるしかないと言い、その前にこの部屋を調べようと提案する。壁には写本の表紙と同じ意匠の紋が刻まれており、そこから外へ向かう力の流れを感じる――現実へ戻るための手がかりになるのかもしれない。部屋には人魚の意匠が織り込まれた敷物や、青い絵付けの陶器の茶器があり、娘の素性については「家族がなく、数年前に街へ流れ着いた」「誰の求婚も退けてきた」と物語が語るだけで、謎は深まるばかりだ。</p><p>あなたが先へ進む準備を整えると、ヤ・ナズカは胸を躍らせる。物語の舞台は帝国の支配以前のコルヴォスらしく、歴史の陰に消えた光景に出会えるかもしれないという。危険な獣が待っている可能性もあるが、あなたがいれば牙も爪も恐れない。そうして物語は枝分かれし、あなたたちはいくつもの結末を目にする。空を行く魔法の敷物、海の光を宿す宝石、誇り高き剣士の愛刀――どれほど立派な宝であっても、娘の心は動かず、商人にそれを売って幸福を探せと言い、彼女を忘れるよう告げる。頁はまだ残り、別の道があることだけが示される。</p><p>そして別の筋をたどった末、商人は灰色の皿を持ち帰る。皿に描かれた人魚の意匠が、部屋の敷物と同じだった。娘はそこで初めて足を止め、その皿が忘れかけていた過去の記憶を呼び覚ますと言う。喜びの灯を奪い去った恐ろしい獣、そして失った家族――両親と兄弟――を思い出し、彼らならきっと自分に幸せに生きてほしいと願うだろうと語る。商人に苦労をかけたことを詫び、贈り物に感謝し、許しを乞う。そして望むなら、あなた――商人と共に生きたいと告げ、物語は終幕へたどり着く。</p><p>写本の外へ戻ったあなたに、ヤ・ナズカは深く礼を述べる。想像の中でしか知らなかったような獣と向き合い、それでも無事に最終の頁まで辿り着けたのは、あなたが隣にいてくれたからだという。物語のために誇張された部分はあっても、かつてのコルヴォスを目の当たりにできた体験自体が宝だったと彼女は語る。だが結末はひとつではない。蒐集員としての好奇心だけでなく、父の言葉の意味を知りたいという思いが、彼女を再び頁へ向かわせる。ひとりでは踏み込めないから、忙しい身だと承知の上で、また力を貸してほしい――そう頼み、あなたは次の旅の予感を抱きながら、報酬の受け取りへ向かう。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> シャロー・ムアー <small class="muted">(オールド・シャーレアン, X:12.0, Y:13.3)</small></div></div>`,

  ZH:{
    langLabel:'ZH',
    pageTitle:'令人著迷的冒險故事',

    story:`<div class="clamp" data-collapsed="true"><p>你被熟識的公會聯絡人攔下，對方笑著問你是不是又在找工作打發時間，接著丟出一個更奇怪的委託：客戶指名要你出面，還說那是一位「似乎認識你」的 Miqo’te 女孩。你才正要追問，對方就報出名字，Y’nazqha，是一名 gleaner（蒐集員，Old Sharlayan 派出的外勤人員，負責蒐集各地樣本與知識）。你還來不及細想，她本人就出現在不遠處。</p><p>她先為自己「看到新食材就忍不住試味道」而道歉，隨後才正式向你致意。她說終於見到你很高興，也鄭重感謝你一直照看她的姊姊 Y’shtola，因為 Y’shtola 有時真的很難搞。她還提到連 Mhitra 都曾依賴你的幫助；那樣的人不輕易稱讚誰，所以當 Mhitra 開口誇你時，Y’nazqha 自己也很意外。於是當她需要一位技藝純熟的冒險者來處理一件「非常規委託」時，她第一個想到的就是你。</p><p>接著，她把真正的請求說出口：希望你陪她一起「走進一本古老民話的書頁」。聽起來離奇，她便解釋自己的身分與理由。她是專門回收各式文件與手稿的 gleaner，過去一直在父親兼師父 Y’rhul Nunh 的指導下學習。然而不久前，Y’rhul Nunh 在遙遠的土地執行任務時因病過世，對她們而言是難以承受的損失。她雖然能親口道別，卻也因此在陌生的地方突然變得孤身一人，所幸姊妹們在最艱難的時候陪著她，撐過那段日子。</p><p>而 Y’rhul Nunh 也用他的方式留下了一份支撐：他把一件遺物交給她，那正是這次委託的核心。那是一部裝幀華美的彩飾手稿，卻帶著危險的附魔——能把讀者的心智整個拉進書頁之中。正因稀有又危險，這本書在收藏獨特、危險文書的人之間惡名昭彰。即便如此，Y’nazqha 相信父親把它留給她必有原因；哪怕冒著風險，她也一定要讀完每一頁，弄清楚他真正想讓她明白什麼。</p><p>因此她才會指名找你同行：她需要你在她探索「書中世界」時保護她的安全。你答應後，她說這類書必須遠離窺探，所以她已把它安置在 Journey’s End 的蒐集員宿舍，等你準備好就去那裡會合。公會聯絡人也在一旁打趣，這要求雖怪，但你肯定見過更怪的事，便催你上路。</p><p>到了宿舍，Y’nazqha 把你介紹給管理者 Fyrgeim。Fyrgeim 坦言她原本不信會在今天見到貨真價實的英雄；她聽過 Erenville 談起你的事，覺得像天方夜譚，如今卻不得不承認那些故事也許都是真的。她也半抱怨半佩服地說，Y’nazqha 那種「什麼都想知道、什麼都想嚐一口」的好奇心讓她惹過不少麻煩，但也正是這股衝動把她磨成了稱職的 gleaner。</p><p>Y’nazqha 把話題拉回那本書：它名為《The Merchant’s Tale》，是流傳於 Corvos（位於 Ilsabard 南部的地區／城邦；《The Merchant’s Tale》的傳說舞台之一，文中也暗示其在 Garlean 統治前曾是溫暖翠綠、海景清澈的土地，並曾以強烈的在地陶瓷與茶文化聞名）的知名寓言。故事主角是一位精明的年輕商人，為了贏得一名少女的心而踏上旅程，尋找能作為「完美贈禮」的東西。但這則故事代代流傳、版本眾多，她無法確定這份手稿會走向哪一種結局。再加上書頁中的附魔使得「讀完整本」變得更像一場賭注。即便如此，她仍記得父親臨終前的話：讀完最後一段，你就會理解；你會明白走在前方道路上最需要的是什麼。對她而言，那像是一場考驗——從師父到徒弟、從父親到女兒，而她決定迎面接受。</p><p>當她與你一同把心神交給書頁中的魔法時，你們立刻被拉進故事，站在「The Maiden’s Home」。那名少女像照著既定台詞說話：她要你別再來，她無法回應你的愛意；喜悅不屬於她，她注定只能獨自待在這裡，與悲傷為伴。Y’nazqha 迅速意識到你們已成了敘事中的角色，並推斷只要照角色該有的行動推進，劇情就能往前走。她得到的身分是那位精明的商人，而你則被安排成商人身旁「技藝高超、值得信任的護衛」。</p><p>按照書寫的台詞，商人向少女宣告她值得幸福，並承諾會把幸福帶給她。少女提出條件：要商人帶回「價值無可估量」的物件——能填補她心中空洞的珍寶——如此她才相信那份情意真切。商人發誓就算翻遍天涯海角也會把它帶回來。於是故事轉入旅程，可是那件「價值無可估量」的東西到底是什麼，仍是一片黑暗。Y’nazqha 說既然答案應該藏在故事本身，你們只能繼續讀下去；但在那之前，她提議先把房間仔細看一遍。你們注意到牆上刻著一枚紋章，圖案與書封一致，且能感覺到力量向外流動——也許能帶你們回到現實。房內還有海姬圖樣的地毯、Corvos 風格的青花瓷茶具，而故事對少女的描述只有幾句：她沒有家人、幾年前漂到城裡、拒絕了所有追求者；她的來歷與孤獨依舊成謎。</p><p>你們選擇讓故事繼續。Y’nazqha 興奮地說，這似乎是 Garlean 統治之前的 Corvos，或許能看到已被歷史抹去的景象；也可能遇到致命的野獸，但有你在，她不必畏懼利牙與尖爪。接下來你們走過多條分歧的道路，見到不同的收場：不論是能飛天的魔法地毯、如海光閃爍的珍貴寶石，還是名匠的愛劍，少女都依舊不為所動，只要商人把寶物賣掉、換取財富，然後忘了她、去別處尋找幸福。每一次結束後，書頁都暗示仍有未讀段落，還存在更艱難的道路與不同的結局。</p><p>直到某一次，你們帶回一只灰白的盤子。盤面上的海姬圖樣與她房中的地毯相呼應。這一次，少女終於動搖：她說盤子喚起了幾乎被她遺忘的過去——當可怕的野獸熄滅她喜悅的光，只留下孤獨與悲傷。她也想起逝去的家人：父母與兄弟，而他們一定希望她能活得幸福。她承認讓商人經歷這一切是她的錯，卻也由衷感謝這份贈禮；若商人願意原諒，她希望能把一生交付在商人身邊。</p><p>你們從書中回到宿舍後，Y’nazqha 向你深深致謝，說你是她能平安走到最後一頁的關鍵。她坦言有些段落為了故事效果被誇飾，但能親眼見到「曾經的 Corvos」本身就已是無價的體驗。她也提到你們走過的那些路徑與錯過的收場：每條路都帶來驚險與奇景，卻未必能真正填補少女的悲傷。她相信結局絕不只一種，出於 gleaner 的好奇心，也出於想解開父親臨別話語的決心，她打算一次又一次重讀、走遍所有分岔，直到把每個轉折都弄清楚為止。只是她不願獨自踏入書頁，因此即使知道你很忙，她仍懇求你日後有空時再陪她同行；而公會也在最後向你確認這次委託圓滿結束，只是那本書的誘惑，似乎會讓你很難不去想下一次再度跳回它的世界。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 沙洛・穆爾 <small class="muted">(舊薩雷安, X:12.0, Y:13.3)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="an-odd-job.html">新差事：非常規委託</a></div>

    </div>`,

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
