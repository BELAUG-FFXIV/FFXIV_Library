<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'For the Children',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Back at Camp Drybone, Isembard wrestles with the doubts that Thancred planted. The idea that Sister Ourcen could be involved in the disappearances seems unthinkable to him, yet he cannot wholly ignore the circumstances. She often travels alone to the Golden Bazaar, he admits, and it is not unusual to see her speaking kindly with the children there. There is one boy in particular to whom she has grown especially close. Even so, the thought that she might be responsible for any wrongdoing is almost too much for him to accept. With a weary sigh, he confesses that he is tired of suspecting those who have shown only kindness. Still, the truth must be found. He asks you to seek out that boy at the Golden Bazaar and see if he can tell you anything of Sister Ourcen’s recent activities.</p>
      <p>You set out for the Golden Bazaar and soon find the child Isembard spoke of—a ragged-haired boy known as the Uncombed Urchin. The moment he sees you, he begs for your help. Sister Ourcen went out alone and has not yet returned, he says, his worry plain on his face. She always sits with him in this very spot, reading stories about Thal, the Order, and the realm beyond to ease his fears. Recently, he told her he had lost his “shiny thing,” a treasured trinket, and she went to look for it outside the safety of the settlement. Now the boy is terrified that the monsters roaming the wilds might have hurt her. He repeats his plea, voice trembling—please find Sister Ourcen before anything happens to her.</p>
      <p>Leaving the Golden Bazaar behind, you follow the paths through Eastern Thanalan, senses alert. Before long, a chill prickle along your spine warns you of danger—you feel a hostile presence nearby. Creatures emerge from the desolate landscape, and you are forced to stand your ground, cutting them down before they can claim another victim. When the threat is finally dealt with, you find Sister Ourcen, shaken but alive. Recognizing you from the church, she thanks the gods for your timely arrival and admits that you have earned her gratitude yet again. She explains that she had indeed gone out to search for the boy’s lost trinket and was able to find it—a simple ring, given to him by his mother before she passed away. She cradles it carefully, promising to see it safely returned to its owner.</p>
      <p>You escort her back toward safety and then return to Camp Drybone to report. On hearing that Sister Ourcen was attacked outside the Golden Bazaar, Isembard is horrified and immediately resolves to secure a room at the inn for her, should she need rest and care. When you explain that she had risked herself to search for an orphan’s keepsake—and that the trinket turned out to be a ring left by the boy’s late mother—he grows quiet for a moment. Such selfless acts hardly match the image of a scheming villain that Thancred’s suspicions would suggest. Isembard clings to this evidence of her kindness, the notion that someone who would endanger herself for a child’s memento could scarcely be the monster they seek.</p>
    </div>

  JP:{
    langLabel:'日本語',
    pageTitle:'共謀者の影',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>キャンプ・ドライボーンに戻ると、イセムバードはサンクレッドの疑いに揺れていた。司祭オルセンが失踪事件に関わっているなど、とても信じたくはない。だが彼女はひとりで「ゴールデンバザー」まで出向くことも多く、現地の子どもたちと親しく言葉を交わす姿もよく見かけるという。その中でも、特に目をかけている少年がひとりいるらしい。それでも、あの司祭が悪事に手を染めているとは到底思えず、疑念と信頼のあいだで彼は深くため息をつく。誰かを疑い続けることには、もううんざりしているのだと漏らしつつも、真実から目を背けることもできない。イセムバードは、あなたにその少年を探してほしいと頼み、ゴールデンバザーまで赴いてオルセンの様子について聞き出してくれないかと頭を下げる。</p>
      <p>あなたはゴールデンバザーへ向かい、ほどなくして噂の少年──ぼさぼさ頭の「Uncombed Urchin」と呼ばれる子ども──を見つける。声をかけるやいなや、彼は必死の形相で助けを求めてきた。シスター・オルセンがひとりで外へ出て行ったきり、まだ戻ってこないのだという。彼女はいつもこの場所で、自分にタルや教団、そしてあの世のことを読み聞かせてくれていたと、少年は語る。最近になって、彼は大切にしていた「光る宝物」をなくしてしまったと打ち明けた。するとオルセンは、それを探してくるとひとりで外の荒野へ向かってしまったのだ。外にはモンスターがうろついているかもしれない──もし彼女が襲われたらどうしよう、と少年は震える声で訴え、どうかシスター・オルセンを見つけて助けてほしいと繰り返し懇願する。</p>
      <p>あなたはゴールデンバザーを後にし、東ザナラーンの道を進みながら周囲に細心の注意を払う。やがて、嫌な気配が肌を刺すように走り、近くに敵意ある存在が潜んでいることを悟る。荒れ果てた大地からモンスターが姿を現し、あなたは迎え撃つしかない。激しい応酬の末にそれらを退け、再び辺りを見渡すと、そこには怯えながらも無事なシスター・オルセンの姿があった。教会で見かけたあなたを認めると、彼女は心から安堵した様子で、間一髪のところで助けに来てくれたことに深い感謝を伝える。少年のことを話すと、オルセンは頷き、自分は彼がなくした宝物を探しに来ていたのだと説明する。それは亡くなる前に母親から託された指輪で、何としても見つけて返してやりたかったのだと、彼女は大切そうにその指輪を握りしめながら語る。</p>
      <p>あなたは彼女を安全な場所まで送り届け、その後キャンプ・ドライボーンへ戻って報告を行う。シスター・オルセンがゴールデンバザーの外でモンスターに襲われていたと聞かされたイセムバードは、顔をこわばらせ、すぐにでも宿屋の部屋を確保して休ませなければと言い出す。さらに、彼女が孤児の形見を探すためにみずから危険を冒していたことを知ると、しばし言葉を失う。少年の亡き母から託された指輪を見つけるために身を挺するような人物が、サンクレッドの言うような悪党であるはずがない──イセムバードはそう信じたいのだ。彼は、その行いこそが司祭オルセンの本性を物語っていると考え、少なくとも今は、彼女を守る証拠として胸に刻むのだった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> イセムバード <small class="muted">東ザナラーン：キャンプ・ドライボーン (X:13.9, Y:23.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="a-proper-burial.html">すがりし光は</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 19～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="amaljaa-wrong-places.html">虚ろな富の行方</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'同謀之影',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>回到 Camp Drybone 之後，Isembard 依然為先前的懷疑感到痛苦。要他相信 Sister Ourcen 涉入失蹤事件，幾乎就像要否定自己對她的信任一樣困難。然而，事實也讓他無法完全放心──她時常獨自前往 the Golden Bazaar，與那裡的孩子們說話、陪他們聊天，其中有一個男孩是她特別照顧的對象。即便如此，Isembard 實在難以想像，那樣溫柔的修女會是幕後黑手。他長長嘆了一口氣，說自己已經厭倦這種處處猜疑的心情，但真相仍必須查清。於是他拜託你前往 the Golden Bazaar，去找那個男孩，看看能否從孩子口中得知 Sister Ourcen 最近的行蹤與舉動。</p>
      <p>你一路來到 the Golden Bazaar，很快就找到了 Isembard 口中的那個孩子──大家稱呼他為 Uncombed Urchin，那頭亂七八糟的頭髮與破舊衣物讓他看起來更加瘦小。一聽到你的來意，他立刻急得快要哭出來，懇求你幫幫忙。Sister Ourcen 一個人出門到外面去，卻到現在還沒有回來。他說，修女總是會在這個地方坐下來，讀給他聽關於 Thal、關於 Order、關於另一個世界的故事，讓他不那麼害怕。前些日子，他告訴她自己弄丟了心愛的「發亮小寶物」，於是她便獨自跑到聚落外面去幫他尋找。想到外頭還有怪物遊蕩，男孩越說越慌張，一遍又一遍地問：「要是那些怪物傷害了 Sister Ourcen 怎麼辦？」他聲音發抖地拜託你，一定要把她找回來。</p>
      <p>你離開 the Golden Bazaar，踏上 Eastern Thanalan 的道路，保持著高度警戒。不久後，一股陰冷的不祥預感沿著脊背竄上來，你清楚察覺到附近有敵意正在逼近。荒野之中突然竄出兇暴的魔物，你當機立斷拔出武器迎戰，將牠們一一擊倒，阻止它們再奪走任何無辜性命。戰鬥結束後，你在附近發現了 Sister Ourcen──她看起來受到驚嚇，但仍然平安無事。一認出你是教會裡那位冒險者，她立刻鬆了一口氣，說能在這種時候遇見你，真是太好了，再一次把自己的性命托付在你的援手之中。你提起那個男孩，她便點頭解釋，自己正是為了替孩子尋回失物才會來到這裡。那是他母親在過世前留給他的戒指，是唯一的形見，因此她不惜親自冒險，也想把這枚戒指重新交回他的小手裡。她把那枚簡樸的戒指小心翼翼握在掌心，保證會親自帶回去。</p>
      <p>之後，你將 Sister Ourcen 安全送回人煙較近的地方，自己則回到 Camp Drybone 向 Isembard 報告。聽說她在 the Golden Bazaar 外遭到魔物襲擊，Isembard 驚呼不已，當場表示會立刻在旅館替她準備好房間，好讓她好好休息療傷。當你再補充說，她之所以會陷入危險，是因為在替孤兒尋找母親遺留下來的紀念戒指，而且一路上絲毫不顧自己的安危時，他沉默了片刻。這樣的人，會去做如同 Thancred 想像中的那種卑劣勾當嗎？Isembard 幾乎可以肯定，那樣的推測實在說不通。他選擇相信眼前的事實：願意為孤兒的珍貴回憶挺身而出、哪怕被怪物襲擊也在所不惜的 Sister Ourcen，更像是一位默默守護他人的牧者，而不是潛伏在暗處的罪人。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 伊桑巴德 <small class="muted"> 東薩納蘭 (X:13.9, Y:23.6)</small></div>
    </div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
