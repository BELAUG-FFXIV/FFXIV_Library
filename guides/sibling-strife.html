    story:`<div class="clamp" data-collapsed="true">
<p>The old woman’s frantic tale snaps into place in Hildibrand’s mind, and he declares the truth “obvious”: the phantom thief is a phantom in the purest sense—an unquiet spirit trapped between life and death since perishing on a battlefield long ago. If that is so, then brute force alone won’t end the killings. You must learn what grievance binds the specter to this world, and find a way to soothe it.</p>
<p>Briardien dismisses the speech as nonsense, yet grudgingly concedes that learning more about Sil’dih may still help the investigation. Hildibrand, certain that wickedness is close at hand, vows that whatever knowledge the Thaumaturges’ Guild holds will not escape his eye—and you move to research the blood-soaked history that keeps resurfacing.</p>
<p>In the guild halls, scholars recount how Belah’dia split into Ul’dah and Sil’dih when rival heirs tore a kingdom in two, and how generations of rivalry finally boiled into war. You hear of Sil’dihn alchemists and the Traders’ Spurn—an abominable formula used to raise fallen warriors as undead, and whispered to have been forced upon the living who were too weak to fight.</p>
<p>Others widen the lens further: Belah’dia’s beginnings in Thanalan after calamity and persecution, and the unsettling reminder that histories are written by those who survive to publish them. Even truths as startling as Ul’dahn and Amalj’aa warriors fighting side by side can be buried if someone decides it is “inconvenient”—and you leave with the sense that the past is not merely old, but curated.</p>
<p>You return to your companions, and Hildibrand eagerly gathers your findings into a grand summary. He leaps to a verdict: the thief must be tied to doomed Sil’dih, out for vengeance against those who turned their own people into mindless horrors. Briardien refuses the ghost story, but notes the Sil’dih connection could explain the thief’s knowledge and the deliberate use of silver symbolism—then presses the real question: what links the murder victims?</p>
<p>Ellie brings up a lead from the streets: witnesses saw a frightened man visiting the victims in the days before their deaths. You track him to Horizon—Guguriya, a traveling merchant who bristles at questions and tries to flee—until Durilda appears, recognizes the situation, and coldly orders him to cooperate. Cornered, Guguriya admits the thief has Traders’ Spurn and speaks of five victims, then blurts out the name of a secret society—the Arbiters of Truth—powerful figures who hoard “false knowledge” about the Ul’dah–Sil’dih war.</p>
<p>Guguriya reveals one more name: Hob, hired to investigate and now panicked—sailing from Vesper Bay, guarding himself with sellswords, trusting friends in the Brass Blades. You rush, but arrive too late: Hob is already a ravenous zombie, and Briardien forces you to act. Another message confirms the count is nearly complete, and as unease prickles at the edge of Hildibrand’s awareness—someone watching, somewhere close—you turn back to report to Phillice…only for Ellie’s scream to ring out from the direction of the vault, sending all of you running.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>老婆の証言を受けたヒルディブランドは、最初からすべて見抜いていたと言わんばかりに断言する。怪盗白仮面はただの盗賊ではない──生者と死者の狭間に縛られ、長い年月を彷徨う怨霊そのものだ、と。だからこそ必要なのは力押しではなく、この魂の恨みを知り、鎮めて次の世界へ送り出す道筋だ。</p>
<p>ブリアルディアンはその理屈を散々に切り捨てながらも、シラディハの知識が役に立つ可能性だけは認める。ヒルディブランドは胸を張り、呪術士ギルドに眠る知見を逃すはずがないと豪語し、あなたは因縁の核心を求めて調査へ向かう。</p>
<p>ギルドの学徒たちは、ベラフディアが王位継承を巡って分裂し、ウルダハとシラディハという姉妹国家が生まれたこと、そして長年の確執がついに戦争へ至ったことを語る。さらにシラディハの錬金術師が編み出したトレーダーズスパーン──死者を不死の兵へ変え、時には生者すらも屍兵へ落としたという、背筋の凍る策の存在を教えられる。</p>
<p>別の声は、さらに古い時代へあなたを引き戻す。災厄の後、迫害された術者たちがタナランへ流れ着き、ベラフディアを築いたこと。そして歴史とは、書く者の都合で削られ、歪められうるということ。ウルダハとアマルジャが共闘した事実すら、誰かが「不都合」と判断すれば表の記録から消える──あなたはその重みを抱えて戻る。</p>
<p>あなたの報告を受け、ヒルディブランドは得意げに要点を並べ立てる。ベラフディアの分裂、ウルダハとシラディハの戦争、トレーダーズスパーンによる屍兵──そして彼は結論へ飛躍する。怪盗白仮面は滅びたシラディハの末裔であり、同胞を屍へ堕とした者たちへ復讐しているのだ、と。ブリアルディアンは呆れながらも、衣装がシラディハの銀の天秤を想起させる点や、遺物への異様な知識がつながる可能性を指摘し、次は被害者たちの共通点を問う。</p>
<p>エリー・ライズは、被害者のもとへ怯えた様子の男が出入りしていたという噂を持ち出す。あなたたちはホライズンで旅商人グルージャを見つけるが、彼は口を閉ざして逃げようとする。そこへドリルダが現れ、あなたたちに協力するよう命じる。追い詰められたグルージャは、怪盗白仮面がトレーダーズスパーンを手に入れたこと、そして「五人」を狙っていることを認め、さらに真理の裁定者という秘密結社の名を漏らす──ウルダハとシラディハの戦争に関する「偽りの知識」を影から隠し持つ者たちだ、と。</p>
<p>最後にグルージャは、雇い主のハブが命の危険を感じ、ベスパーベイの私船からリムサ・ロミンサへ逃れようとしていると告げる。あなたたちは急行するが、現地で待っていたのは脳髄を求めてうめく屍となったハブだった。ブリアルディアンは助けられないと判断し、あなたに決断を促す。残された予告状が結末の近さを示し、ヒルディブランドの背に「見られている」気配がまとわりつく中、あなたたちはフィリスへ報告に戻る──だがその直後、宝物庫の方角からエリー・ライズの叫び声が響き、全員が駆け出す。</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>聽完那位老婦人的證詞，Hildibrand 立刻把一切說得斬釘截鐵：你們追逐的 phantom thief，確實是一個「phantom」──是在戰場上悲慘死去、在生死之間徘徊了近百年的怨魂。既然如此，接下來要做的就不只是逮捕，而是弄清楚它到底懷著什麼怨恨，才能設法安撫，讓它放下復仇、安然離去。</p>
<p>Briardien 把那套說法罵得一無是處，但仍承認：了解 Sil’dih 的歷史也許真的有用。於是你跟著 Hildibrand 一起把目標轉向 Thaumaturges’ Guild──先把過去弄清楚，才有可能在現在找出線索。</p>
<p>在學者們的敘述中，Belah’dia 因王位繼承而分裂，Ul’dah 與 Sil’dih 兩個姊妹國由此誕生；幾代累積的怨恨最終引爆戰爭。你也聽到那個令人發毛的名字：Traders’ Spurn──Sil’dih 的鍊金術師用它把死者變成不死士兵，甚至有說法指出，他們也把藥劑用在受傷或虛弱的活人身上，硬生生把人變成殭屍。</p>
<p>還有人把故事往更早的年代推回去：魔法文明的興盛、災厄帶來的洪水與毀滅、被迫逃亡的人們如何在 Thanalan 建立起 Belah’dia。你同時被提醒一件更刺痛的事──歷史是人寫的，而被寫下來的「真相」不一定完整。就連 Ul’dah 與 Amalj’aa 曾並肩作戰這種事，也可能因為某些人覺得「不方便」而被抹去。</p>
<p>當你把聽來的內容整理回報，Hildibrand 立刻把它們串成一個自信滿滿的結論：Belah’dia 的分裂、Ul’dah 與 Sil’dih 的戰爭、Traders’ Spurn 造成的屍兵──這一切都指向同一件事。phantom thief 很可能與 Sil’dih 有所牽連，並以此為名向那些把同胞變成殭屍的人復仇。Briardien 不吃「怨魂」那套，但也指出：對方那身浮誇裝束刻意喚起 Sil’dih 的象徵，確實像是在宣告立場；問題在於，為什麼被害者會成為目標，他們之間的共通點又是什麼？</p>
<p>Ellie 提供了街頭消息：有人看見一個神情極度驚惶的男人在案發前幾天拜訪過被害者。你們追到 Horizon，找到那名 traveling merchant──Guguriya。Guguriya 一開始只想撇清、甚至急著逃走，直到 Durilda 現身，直接命令他配合你們。被逼到退無可退，Guguriya 承認 phantom thief 弄到了 Traders’ Spurn，還提到對方的訊息裡反覆暗示「五名被害者」。接著他吐出更危險的一個名字：Arbiters of Truth──一個暗地裡運作的秘密組織，靠影響力把關於 Ul’dah 與 Sil’dih 的「假知識」牢牢鎖在一般人碰不到的地方。</p>
<p>最後，Guguriya 說出雇主的名字：Hob。Hob 似乎已經嚇壞，打算從 Vesper Bay 搭私船離開，往 Limsa 逃走，還找了幾名傭兵護身，並指望自己在 Brass Blades 的人脈能救命。你們趕去時卻慢了一步──Hob 已經變成殭屍，Briardien 當場判斷無法挽回，只能要你做出決斷。新的預告字條宣告還剩最後一人，而 Hildibrand 也察覺到一股揮之不去的視線正在暗處盯著你們。你們急忙折返要向 Phillice 回報，卻在抵達時聽見 Ellie 從 vault 的方向發出求救聲──你立刻跟著眾人衝了過去。</p>
</div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
