  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;
  overflow-y:auto;
  padding-right:8px;
  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    /* 展開/收合 */
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Sylphic Studies',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>You travel to The Hawthorne Hut in Nine Ivies, deep in the East Shroud, and speak with Rolfe Hawthorne. As soon as you approach, he assumes you have come to learn a thing or two about the sylphs, and calls them a peculiar folk. He tries to explain just how peculiar they are, but the words refuse to come; after a moment he lets out a sigh and apologizes, admitting that his memory is not what it used to be. He has seen much and more in his adventuring days, and it has all become a clutter in his head. Still, he remembers sharing those stories with the people around the hut many times before, and suggests that you ask them instead.</p>
      <p>You then speak with Ysabel Hawthorne. When you mention the sylphs, she says that her father has told her his tales plenty of times. What she finds most captivating, she explains, is how their sense of etiquette is almost completely alien to that of other peoples. She warns you not to underestimate them on account of their childlike looks, or you may find your face turned into a mess of glyphs, squiggles, and chocobo scratches. The thought clearly amuses her, and she lets out a light, playful laugh.</p>
      <p>Next you seek out Blaisette. She remarks that the quickest way to a Quiverwoman’s heart might be through her stomach, but tells you not to think of using the same approach on the sylphs. According to a story Rolfe once told her, they sustain themselves simply by bathing in the sun, and have no need of the foodstuffs you might try to foist upon them. After that you speak with Monne, who calls the sylphs inveterate tricksters and troublemakers. One day they are drawing morbol faces on the masks of the sentries, and the next they are sending young guards tumbling to the bottom of a ravine. When told to stop, they only laugh. Rolfe may claim that they harbor no ill will, Monne says, but she does not consider such pranks any laughing matter.</p>
      <p>With these accounts fresh in your mind, you return to Rolfe Hawthorne at The Hawthorne Hut and repeat what you have heard—stories that are, in truth, his own. Hearing “your stories—well, my stories,” he says, brings the memories flooding back, and he suddenly feels like dancing. He recalls that long ago a sylph told him that dancing is a time-honored greeting among their kind, and that nothing brings people together quite like a little toe-tapping. He advises you to remember this custom, for it may help you win the favor of your forest-dwelling friends.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Rolfe Hawthorne <small class="muted">East Shroud (X:16.7, Y:27.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="we-come-in-peace.html">We Come in Peace</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 20 or above)</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="first-impressions.html">First Impressions</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'変わり者の挨拶',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>東部森林の九つの森にあるホウソーン家の山塞を訪れたあなたは、ロルフ・ホウソーンに声をかける。彼は、あなたがシルフ族のことを学びに来たのだろうとすぐに察し、あの者たちは実に風変わりな民だと口火を切る。しかし、その「どれほど風変わりなのか」を説明しようとしたところで言葉に詰まり、やがてため息をついて詫びる。冒険者としてあまりにも多くの出来事を見てきたせいで、記憶が頭の中でごちゃごちゃになってしまったのだという。それでも、かつて自分の武勇伝やシルフの話を、この山塞の周りにいる人々にしばしば語ってきたことは覚えており、詳しいことは彼らに尋ねてみるとよいと、あなたに勧める。</p>
      <p>あなたはイザベル・ホウソーンに話しかける。シルフ族について尋ねると、彼女は父からその手の話を何度も聞かされてきたと微笑みながら答える。中でも彼女がいちばん心を惹かれるのは、シルフたちの礼儀作法が、ほかの民のそれとはほとんどまったくかけ離れているという点だ。あどけない子どものような外見だからといって油断してはならない、と彼女は忠告する。うっかりしていると、顔じゅうを不思議な紋様やくねくねした落書き、さらにはチョコボのひっかき傷のような跡でいっぱいにされてしまうかもしれないのだと話し、くすりと楽しそうに笑う。</p>
      <p>次に、あなたはブレゼットのもとを訪れる。彼女は、森を守る弓兵の女性の心を射止める一番の近道は、おいしい食事でもてなすことかもしれないと冗談めかして語る。しかし、そのやり方をそのままシルフ族に試してはならないと、真顔で釘を刺す。ロルフから聞いた話によれば、シルフたちは陽の光を浴びることで糧を得ており、人のような食べ物を必要としていないのだという。そのあとで、あなたはモンヌにも話を聞く。彼女はシルフ族のことを、根っからの悪戯好きで、いつも騒ぎを起こしてばかりの厄介者だと言い切る。ある日は番兵の仮面にモルボル顔の落書きをし、またある日は若い見張りを悪戯で崖の下まで転げ落とすのだと、怒りを抑えきれない様子で語る。やめるように言っても、シルフたちは笑っているばかりだという。ロルフは彼らに悪意はないと主張しているが、モンヌにとって、そのような悪戯はとても笑って済ませられるものではないのだ。</p>
      <p>こうして集めた話を胸に、あなたは再びホウソーン家の山塞に戻り、ロルフ・ホウソーンに報告する。それはつまり、かつて彼自身が語っていた物語そのものであり、あなたの口から聞くうちに、彼の中で記憶が一気によみがえっていく。彼は、忘れていた思い出が洪水のように押し寄せてきたと嬉しそうに言い、今にも踊り出したくなってきたと笑う。むかしシルフ族のひとりから、踊りは彼らの間で古くから伝わる挨拶の作法であり、人と人とを結びつけるものだと教えられたことも思い出したのだと語る。そして、森に暮らす彼らの歓心を得たいのなら、この「踊りの挨拶」をどうか忘れずにいてほしいと、あなたに改めて言い聞かせるのだった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ロルフ・ホウソーン　<small class="muted">黒衣森：東部森林 (X:16.7, Y:27.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="we-come-in-peace.html">蜜の道を辿って</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 20～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="first-impressions.html">魅惑の手土産</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'另類的招呼',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>你前往 East Shroud 的 Nine Ivies，來到小屋 The Hawthorne Hut，與 Rolfe Hawthorne 攀談。他一看到你，就猜到你是為了「sylphs」而來，說起那群森林居民是相當「古怪」的一族。本想接著說明「到底有多古怪」，話卻卡在嘴邊，怎麼也想不起合適的說法。最後他嘆了一口氣，向你道歉，坦承自己冒險多年，看見過的事情實在太多，如今記憶全堆成一團，已經不像從前那麼好使了。不過，他記得自己以前常把這些見聞講給小屋周圍的人聽，於是建議你不妨也去問問他們，或許能比找他這個「老冒險者」問得更清楚。</p>
      <p>你接著找上 Ysabel Hawthorne。提起 sylphs，她立刻表示，父親的那些故事她早就聽過許多次了。她覺得最有趣、也最特別的地方，是 sylphs 對「禮節」的看法，幾乎和其他種族完全不在同一套規則裡。她叮嚀你，千萬不要因為對方長得像小孩子就掉以輕心，否則有一天醒來，可能會發現自己的臉被畫得一塌糊塗，到處都是符號、彎彎曲曲的線條，還有像 chocobo 爪痕一樣的刮痕。說到這裡，她自己也忍不住輕笑，彷彿那些畫面又在眼前浮現。</p>
      <p>之後，你去向 Blaisette 打聽。她半開玩笑地說，打動 Quiverwoman 的心，也許可以從美食下手，但立刻補上一句，叫你別想把同樣的作法用在 sylphs 身上。依照 Rolfe 曾經對她說過的故事，sylphs 只需要沐浴在日光之中就能獲得養分，根本不需要人類平常吃的食物。接著你又與 Monne 交談，一提到 sylphs，她立刻把他們形容成根深蒂固的惡作劇高手與惹事精。她說，有時他們會在守衛的面具上畫上 morbol 的醜臉，另一天又把年輕哨兵整得跌到山谷底下去。就算被要求「不要再這樣了」，sylphs 也只是哈哈大笑，一點停手的意思都沒有。Rolfe 認為他們並無惡意，但在 Monne 看來，這種會讓人受傷、甚至摔進山谷的玩笑，實在不是能輕鬆帶過的事情。</p>
      <p>把這些最新聽來的內容記在心裡後，你回到 The Hawthorne Hut，把整件事轉述給 Rolfe Hawthorne。說到底，這些也都是他過去親口講過的故事。當他一邊聽你重述、一邊回想時，原本模糊的回憶開始清晰起來，他說那些記憶像潮水一樣湧回腦中，讓他甚至有種想立刻跳起舞來的衝動。他回想起很久以前，有一位 sylph 曾對他說過，跳舞是 sylph 之間沿襲已久的問候方式，而輕快的步伐最能把人們連結在一起。Rolfe 最後提醒你，要好好記住這件事──說不定在與這些森林朋友打交道時，正是這樣一段舞步，能幫助你贏得他們的好感。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 羅爾佛·霍桑　<small class="muted"> 黑衣森林東部林區 (X:16.7, Y:27.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="we-come-in-peace.html">花蜜之路</a></div>
      <div class="row">所有職業（不含限定職） 等級 20 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="first-impressions.html">誘人的特產</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
