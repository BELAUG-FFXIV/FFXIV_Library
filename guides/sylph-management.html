    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>With the formal greetings out of the way, Minfilia turns the conversation to business and tells you there is a favor she would ask of you. She calls upon Urianger to confirm that the documents from the Students of Baldesion have arrived, and he replies that they were delivered only recently. Those papers, she explains, concern a study the Scions conducted at the behest of the Order of the Twin Adder. To give you the gist, she asks Papalymo and Yda to provide a synopsis.</p>
      <p>Papalymo begins by explaining that their task was to observe the behavior of the sylphs, a beast tribe native to the Twelveswood. Yda jumps in, struggling to find the right words and finally describing them as looking like floating gysahl greens that worship the primal Ramuh. With a pointed little cough, Papalymo refines the description, noting that while the sylphs are classed as a “beast tribe,” they are blessed with a comparatively personable demeanor that allows for peaceful communication. Minfilia points out that this makes them an invaluable source of knowledge about what the beast tribes understand of the primals. Papalymo continues: Ramuh’s existence is well documented, but as far as they can determine, the sylphs either do not—or perhaps cannot—summon him anymore. Until they know for certain, however, it would be unwise to assume the threat he poses has simply vanished. Yda remarks that this leaves Gridania in the uneasy position of not even knowing what they ought to be worrying about. Papalymo adds that the forest nation is hardly alone in its troubles; Gridania’s hands are already full fending off Garuda, who is among the most savage and terrible primals known.</p>
      <p>Minfilia summarizes the situation for you. In short, she says, it is essential that the Scions approach the sylphs as diplomatically as possible. Words and actions are easily misconstrued, and the only truly reliable way to communicate their intentions is through the Echo. If the Scions can win the sylphs’ favor, it may bring them one step closer to lessening the threat posed by the primals as a whole. She asks if you will help them in this effort. When you agree, she thanks you with quiet sincerity. Thancred praises the outcome, but admits that he himself would be of little use in Gridania, describing himself as a babe in the woods there. Yda and Papalymo, on the other hand, should have no trouble seeing the forest for the trees, he suggests, and Minfilia turns to ask if they are willing. Yda answers eagerly that you can leave it to her, only for Papalymo to correct her with a resigned “us, Yda—us,” reminding her that they will be going as a pair.</p>
      <p>When the council is concluded and the formal quest is set before you, Minfilia states your mission plainly. You are to make contact with the sylphs with the ultimate goal of finding a peaceful way to address the threat associated with Ramuh. She warns you that the sylphs are a unique people, to say the least, and that their customs may bewilder you at first. Even so, Yda and Papalymo will be at your side to support you in all your endeavors. With your objective clear, you travel to Gridania and present yourself at the Adders’ Nest. Inside, you find Vorsaile Heuloix speaking aloud to himself about how little they know of the sylphs and how impossible it is to make sound plans without further information. He concludes that they must call upon the Scions once more—then catches himself and apologizes for the habit of thinking out loud. Turning to you, he asks what business has brought you to the heart of the Order of the Twin Adder.</p>
    </div>

    story:`<div class="clamp" data-collapsed="true">
      <p>形式的な挨拶を終えたミンフィリアは、本題へと話を切り替え、あなたに頼みごとがあると切り出す。彼女はウリエンジェに声をかけ、バルデシオン委員会からの資料が届いているかを確認する。ウリエンジェは、つい先ほど届いたばかりだと静かに報告した。ミンフィリアは、その資料が双蛇党の依頼を受けて暁が行った調査に関するものだと説明し、その要点を伝えるために、パパリモとイダに概要を話すよう頼む。</p>
      <p>パパリモは、彼らの任務が「黒衣森」原産の蛮族であるシルフ族の行動を観察することだったと語り出す。そこでイダが割り込み、どう説明したものかと悩んだ末に、シルフ族はまるでギザールの野菜がふわふわと空中を漂っているような姿であり、雷の蛮神ラムウを信仰しているのだと、身振り手振りを交えて述べる。パパリモは軽く咳払いをして話を引き取り、シルフ族は形式上は「蛮族」に分類されているものの、その性格は比較的温和で、平和的な対話が可能な存在であると補足する。ミンフィリアは、そのことが蛮族側の蛮神観を学ぶうえで、彼らが極めて貴重な相手となる理由だと続けた。パパリモはさらに、ラムウの存在そのものは記録により裏づけられているものの、少なくとも現時点で確認できる範囲では、シルフ族はもはやラムウを召喚していないか、あるいは召喚できない状態にあるようだと説明する。しかし、その真相が判明しないかぎり、蛮神による脅威が去ったと決めつけるのは早計だとも付け加える。イダは、何を警戒すべきかさえはっきりしない状況は、黒衣森にとって大きな不安の種だとこぼし、パパリモは、それに加えてグリダニアは、既に蛮神ガルーダへの対処に手一杯であると指摘する。ガルーダは知られた蛮神の中でも、ひときわ凶暴かつ恐るべき存在なのだと念を押した。</p>
      <p>ミンフィリアは、ここまでの話をまとめてあなたに伝える。要するに、シルフ族には可能なかぎり外交的な姿勢で接することが肝要だというのだ。言葉や行動はいくらでも誤解を生むものであり、自分たちの真意を確実に伝えられる手段は「エコー」をおいてほかにない。シルフ族の信頼を得ることができれば、蛮神全体がもたらす脅威を和らげるための大きな一歩となるかもしれない──ミンフィリアはそう語り、あなたに協力を求める。あなたが了承すると、彼女は深く感謝の意を示した。サンクレッドはこの展開を喜びながらも、自分はグリダニアでは森の中の赤子同然で、役には立ちそうにないと冗談めかして肩をすくめる。一方で、イダとパパリモであれば「木を見て森を見失う」ようなことはあるまい、と彼はミンフィリアに視線を送る。ミンフィリアが二人に同行の意思を確認すると、イダは勢いよく「任せて！」と応じるが、すぐさまパパリモに「『私たち』だ、イダ。『私たち』だぞ」と訂正されるのだった。</p>
      <p>やがて話し合いが一段落し、正式な任務として内容が示されると、ミンフィリアはあらためて目的を明言する。あなたの使命は、シルフ族と接触し、最終的に雷の蛮神ラムウにまつわる脅威を平和的な形で解消する手段を模索することだという。シルフ族はひとことで言えば非常に「独特」な種族であり、その風習や言動に最初は戸惑うこともあるだろうと、彼女は前置きする。それでも、イダとパパリモが常にあなたの傍らで支えとなってくれるはずだ。こうして目標が定まり、あなたはグリダニアへと向かい、双蛇党本部「蛇の巣」を訪れる。中では、ヴォルサイル・エローがシルフ族について知らねばならないことが多すぎると独り言のように呟き、これでは有効な対策も立てられないと頭を悩ませているところだった。彼は、再び暁の力を借りるしかないだろうと結論づけるが、そこでようやくあなたの存在に気づき、自分の考えを口にする悪癖を詫びる。そして、あらためてあなたに向き直ると、何用で「蛇の巣」を訪れたのかと問いかけてきた。</p>
    </div>

  ZH:{

    pageTitle:'青葉的思考',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在簡單處理完前面的形式話題之後，Minfilia 把重心拉回正事，開口說希望你能幫上一個忙。她先請 Urianger 確認來自 Students of Baldesion 的文件是否已經送達，對方回答，這些資料剛在不久前抵達。Minfilia 說明，那是一項應 Order of the Twin Adder 委託而進行的調查報告，為了讓你快速掌握重點，她請 Papalymo 和 Yda 做個概要說明。</p>
      <p>Papalymo 開口說明，他們的任務是觀察棲息於 Twelveswood 的蛮族──sylphs 的行動與狀況。Yda 搶著接話，苦惱地比手畫腳找形容詞，最後只好說這些 sylphs 長得有點像會飄在半空中的 gysahl greens，而且是信奉雷之 primal Ramuh 的一族。Papalymo 輕咳一聲把話題拉回正軌，補充說雖然分類上屬於「beast tribe」，但 sylphs 的性格相對和善，願意與人對話，是相對容易以和平方式溝通的對象。Minfilia 指出，正因如此，他們才提供了難得的機會，讓 Scions 有機會從蛮族一方了解關於 primals 的認知。Papalymo 接著說，Ramuh 的存在已經在記錄與報告中反覆被證實，不過就目前所能掌握到的情報來看，sylphs 似乎已經不再──或者說無法再──召喚這位 primal。既然真相未明，在那之前就擅自認定威脅已經解除，仍然是一種不智的樂觀。Yda 聽了忍不住感嘆，對 Gridania 來說，連「到底該擔心什麼」都搞不清楚，本身就是一件令人頭大的事。Papalymo 補充，Gridania 並不是唯一陷入困境的一方，眼下他們還必須全力應付 Garuda，而 Garuda 又是眾多已知 primals 當中最兇殘、最可怕的存在之一。</p>
      <p>Minfilia 把眼前的局勢整理成一句話給你：總之，Scions 必須盡可能以外交、和平的方式接觸 sylphs。言語與行動都很容易被誤解，而真正可靠的溝通手段只有 Echo 可以依靠。只要能獲得 sylphs 的好感與信任，也許就能在削弱 primals 所帶來的整體威脅上，往前跨出一大步。她直接問你，願不願意為這個目標伸出援手。當你給出答覆時，她真誠地向你道謝。Thancred 先是稱讚這樣的安排，但也坦白說自己在 Gridania 根本是「森林裡的迷途嬰兒」，去了也幫不上什麼忙。相較之下，Yda 和 Papalymo 才是能看清整片森林的那一組人選，他把視線投向 Minfilia，提出這個建議。Minfilia 於是轉頭詢問兩人是否願意同行，Yda 立刻高舉雙手說「交給我吧！」，卻被 Papalymo 無奈地糾正成「是『交給我們』才對」，提醒她這是一項兩人同行的任務。</p>
      <p>等到會議告一段落，任務正式交付時，Minfilia 再次清楚說明你的目標：你必須與 sylphs 建立聯繫，最終目的則是尋找一條以和平方式處理 Ramuh 相關威脅的道路。她先給你打了一劑預防針，說 sylphs 的民族性格十分獨特，他們的風俗習慣一開始可能會讓你相當困惑。不過不用擔心，Yda 和 Papalymo 會一路在旁支援你所做的一切。任務方向確立後，你動身前往 Gridania，進入 Order of the Twin Adder 的本部 Adders’ Nest。裡頭，Vorsaile Heuloix 正自言自語，說目前對 sylphs 的了解實在太少，根本無法制定有建設性的方針，認為必須再度請 Scions 出手協助。這時他才意識到自己把心裡話全說出口，連忙向你道歉，說這是多年改不掉的壞習慣，然後抬頭正視你，詢問這回是因為什麼事而前來 Adders’ Nest 報到。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
