<head>

  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;

  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}
    .stack{display:flex;flex-direction:column;gap:10px}

      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }

<body>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'What Do You Mean You Forgot the Wine',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Wheiskaet gives you a curt, satisfied bravo, satisfied that the guests will at last be honored with a marvelous banquet; but before the praise can settle, he turns the conversation to what he insists is the missing half of any exotic feast—an aperitif refined enough to match the food, because without it, even the rarest fare feels unfinished.</p>
      <p>He says he knows exactly who to ask, and sends you straight to Wineport to seek out Shamani Lohmani, another former member of the Company of Heroes; the errand is simple on paper, because all you need to do is place the order slip in Shamani’s hands, and he will take care of the rest without further instruction.</p>
      <p>As if he can already hear the complaint you might swallow back, Wheiskaet adds that this is not a ploy to test your patience and wear you down with errands—he truly does need that wine—and while you are there, you are to give Shamani Lohmani his regards, as one former comrade to another.</p>
      <p>In Wineport, Shamani Lohmani answers you in a calm voice that carries an odd certainty; he speaks first of what clings to you—sweat, grime, and blood—then tells you, almost casually, that you reek of blood, and that you must be an adventurer, before finally asking what business brings you to Wineport.</p>
      <p>When you offer the slip, he barely pauses, already guessing it must be a request for the finest vintage he can muster, and he brings the paper close, not to read it with his eyes, but to take in what it carries; with two slow sniffs he names loam and perfume, places you at Costa del Sol, and then breaks into a brief cough at the unmistakable odor of goblin cheese. From those traces he draws his conclusion without flourish: Master Gegeruju would accept nothing less than the best, and Dyrstweitz and his crew must be busy preparing an exotic feast—busy enough to rely on an adventurer for the delivery; and when you react, he notes that this show of deduction was never meant to impress you, because when a man loses his vision he is forced to compensate in other ways, though he suspects you have no interest in his affairs and came only to speak of wine.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Wheiskaet <small class="muted">Eastern La Noscea (X:32.6, Y:30.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-things-we-do-for-cheese.html">The Things We Do for Cheese</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 32 or above)</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="an-offer-you-can-refuse.html">An Offer You Can Refuse</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'ごちそうには美酒を',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ヴェイスケートはあなたに短く喝采を送り、これで客人をもてなす晩餐は見事なものになると言うが、その余韻に浸る間もなく、異国の饗宴にはそれに釣り合う食前酒が欠かせないのだと、次に必要なものへ話を移す。</p>
      <p>頼む相手は決まっているとして、ワインポートへ向かい、海雄旅団の元団員であるシャマニ・ローマニを訪ねるよう命じられる。用件は単純で、渡された注文票を手渡せば、あとは彼がすべて引き受けるという。</p>
      <p>さらにヴェイスケートは、これが忍耐を試すための企てではないと念を押し、本当にその酒が必要なのだと断言する。そして現地では、シャマニ・ローマニに自分の伝言も伝えてほしいと付け加え、確かな目的だけを残してあなたを送り出した。</p>
      <p>ワインポートに着くと、シャマニ・ローマニは落ち着いた声で語りかけ、あなたの身にまとわりつく汗と汚れ、そして血の匂いを言い当てたうえで、血の臭いが濃いと指摘し、あなたを冒険者だろうと断じてから、ここへ何をしに来たのかと問いかける。</p>
      <p>注文票を差し出すと、彼はすぐに最上の銘柄を求める依頼だと見抜き、紙に鼻を寄せて匂いを辿り、土の匂いと香の気配からコスタ・デル・ソルを言い当て、さらにゴブリンチーズの紛れもない臭気に短く咳き込む。そこから彼は、ゲゲルジュ様が最上を求めるのは当然であり、饗宴の準備に追われるディルストヴェイツたちが冒険者に用事を託したのだろうと淡々と結論し、この推理は感心させるためではない、視力を失えば別の感覚で補うほかないのだと言い、あなたが望むのは事情ではなく酒の話だけだろうと締めくくった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ヴェイスケート　<small class="muted">東ラノシア (X:32.6, Y:30.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-things-we-do-for-cheese.html">ブレイフロクスの珍チーズ</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 32～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="an-offer-you-can-refuse.html">シャマニ・ローマニの求める香り</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'美酒配佳餚',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Wheiskaet 簡短地稱讚你做得漂亮，說多虧了你，賓客終於能被一場盛大的宴席好好款待；但他沒有讓你在那份肯定裡停留太久，而是立刻追問：若只有異國珍饈卻沒有同樣講究的開胃酒，那樣的盛宴又怎麼算完整。</p>
      <p>他說幸好自己知道該找誰，於是要你前往 Wineport，去見 Shamani Lohmani——同樣曾是 Company of Heroes 的前成員；你的差事聽起來很簡單，只要把訂單交到 Shamani Lohmani 手上，後續他會自行處理，無須你再多費口舌。</p>
      <p>像是預先堵住你心裡可能冒出的不耐，Wheiskaet 又補上一句：這並不是在故意考驗你的耐性，他確實需要那瓶酒；而且你到了之後，也要替他向 Shamani Lohmani 問候一聲，把他的話原封不動帶到。</p>
      <p>你抵達 Wineport 時，Shamani Lohmani 的聲音沉穩而冷靜，甚至讓人有種被看穿的錯覺；他先說出你身上沾著的味道——汗、塵垢、以及血——然後直指你帶著濃重的血腥氣，應該是個冒險者，最後才問你來 Wineport 所為何事。</p>
      <p>當你遞出訂單，他幾乎不需要你解釋，就推斷這必然是要他拿出自己能拿出的最上等年份，接著把紙張拉近，用嗅覺去讀那上頭殘留的線索；他聞出泥土與香水的氣味，說出 Costa del Sol 的名字，下一瞬又因為那股混在其中、怎麼也掩不住的 goblin cheese 氣味而咳了一聲。僅憑這些痕跡，他就平靜地拼出全貌：Gegeruju 不可能接受次一等的選擇，而 Dyrstweitz 和他的手下想必正忙著籌備異國盛宴，才會把這份跑腿交給冒險者來做；你若以為他是在炫耀，他立刻淡淡否定，說這種推理不是為了讓你佩服，而是失去視力的人只能用其他方式彌補罷了，並且直言你大概不在意他的私事，你想談的只有酒。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 維斯凱特　<small class="muted"> 東拉諾西亞 (X:32.6, Y:30.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-things-we-do-for-cheese.html">布雷福洛克斯的乳酪</a></div>
      <div class="row">所有職業（不含限定職） 等級 32 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="an-offer-you-can-refuse.html">夏馬尼·洛馬尼所追求的酒香</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
