    story:`<div class="clamp" data-collapsed="true">
<p>Delion catches you at just the right moment, claiming he was thinking of you when you appeared. He insists PuPu’s “missing comrade” story is only a cover for invasion, and says the inspector has made progress tracking the alien’s “friend.” He presses you to come along—because this is his chance, and he can’t face a cosmic conspiracy alone.</p>
<p>At Palaka’s Stand, you find the familiar faces gathered again—Nashu excitedly calls it the “lunar crew” reunited. PuPu greets you and, to everyone’s shock, speaks clearly without any “PuPu”ing; he says mastering your language was no great chore. Delion is horrified by that intellect, while Hildibrand proudly declares this is a perfect time to admire the spectacle of inspection.</p>
<p>Hildibrand claims his tried-and-true inspector’s sense led him here, though it lacks a precise location. So he orders an equally tried-and-true method: interrogation. You spread out and question the locals about any PuPu-shaped sightings. Reports come back—something furtively scampering in the west, and an odd little creature in the jungle accompanied by a sickly pale gentleman with a foul smell.</p>
<p>When the group regathers, Hildibrand tries to map the sightings, only to conclude—completely seriously—that it must mean PuPu has more friends here than he realized. PuPu flatly disagrees: he has exactly one friend on this world. Delion argues the only way forward is to split up and search, and Godbert appears, offering an extra pair of eyes while he seeks inspiration for Mandervillian weapon forging. Teams are set, and Nashu produces special linkpearls so everyone can keep in contact—despite Delion’s paranoia about being listened in on.</p>
<p>You head west with PuPu. Along the way, he marvels at Etheirys’s abundance of water and speaks warmly of your home as a rare treasure. You scan the area and find only unfamiliar, furred creatures; PuPu asks if they are your people, and you dismiss the idea with dry jokes while he muses about how difficult it is to tell semi-intelligent life-forms apart.</p>
<p>At Agama Temple, PuPu finally admits how much his missing friend means to him: the two grew up together, shared the dream of roaming the cosmos, and worked side by side until they each had their own starship—only for that triumph to prove fleeting. Then Nashu’s voice comes through the linkpearl: they think they may have found PuPu’s friend at Purusa, and PuPu urges you to go at once.</p>
<p>In Purusa, Hildibrand attempts a grand greeting—only to realize the “friend” is tied up with Mandragoras and the walking dead. A Gentle Dead Man introduces himself as a disciple of Master Zombibrand and explains why he traveled so far, how he recruited a rotten mandragora, and how The Thavnairian Truth pointed him toward an alien craft spotted on the isle. Delion is delighted to meet a “faithful reader.” PuPu, however, quietly confesses the abduction may have been his—he mistook the mandragora for an edible plant while collecting samples. The Gentle Dead Man accepts the apology as long as the friend is returned uneaten, and departs.</p>
<p>Delion groans that gut feelings won’t be enough to search the entire world, and says what you’d really need is an army of inspectors. PuPu immediately latches onto the idea—he can clone countless Hildibrands as before. His matter duplicator, however, finally collapses, producing only one last, failed clone. The newborn copy struggles to speak and names himself Brandihild, while Nashu stares at how strangely blocky he is. PuPu offers to euthanize the abnormality, but Hildibrand refuses and instead presses Brandihild into service—welcoming him to the team as your newest inspector.</p>
</div>

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
<p>デリオンはあなたを見つけるなり、「考えていたら現れた」と不気味に喜び、ププの「行方不明の仲間探し」は侵略のための偽装だと言い張る。ヒルディブランドたちが、その“友”の手掛かりを追っていると聞いた彼は、これは千載一遇の好機だとして、あなたに同行を迫る。宇宙規模の陰謀にひとりでは立ち向かえないのだ、と。</p>
<p>パラカの里に着くと、ナシュはあなたを見つけて大はしゃぎし、「月の仲間がまた揃った」と声を弾ませる。ププは礼を言い、驚くほどはっきりと言葉を話す――もはや「ププ……」と繰り返さない。彼は文法も構文も比較的単純だと平然と言い、デリオンはその知性に戦慄する。ヒルディブランドは得意げに、捜査の見世物を見に来たのかと胸を張る。</p>
<p>ヒルディブランドは、いつもの「偵探の勘」でここまで辿り着いたが、場所までは示してくれなかったと言う。ならば頼るのはもうひとつの定石――聞き込みだ。あなたたちは散って、青い小さな存在の目撃情報を村人に尋ねて回る。西で不審に走り回るものを見た者、密林で奇妙な小動物と、青白く悪臭を放つ紳士を見かけた者――証言はばらばらに集まっていく。</p>
<p>再び合流したヒルディブランドは、北・南・西の目撃を聞き、「つまり……ププには本人が思う以上に友がいる！」と結論づける。ププは即座に否定し、この世界に友はひとりだけだと言い切る。デリオンは同一個体が各地で目撃されているだけだろうと考え、捜索のため分担を提案する。そこへゴッドベルトが現れ、武器鍛造の着想を得るためにも同行したいと言い、追加の目を申し出る。</p>
<p>班分けが決まると、ナシュは連絡用に特製のリンクパールを取り出し、どれだけでも話せると言ってはしゃぐ。デリオンはシャーレアンに盗み聞きされると騒ぐが、結局リンクパールでの連携が始まる。あなたはププとともに西へ向かい、密林を探ることになる。</p>
<p>道中、ププはエオルゼアの水の豊かさに感嘆し、この星は資源に恵まれた稀有な故郷だと言う。あなたが周囲を見回すと、黒い毛の獣や白い毛の群れが現れ、ププはそれらが民なのかと問いかける。あなたが否定すると、彼は「半ば知性ある生命の区別は難しい」と淡々と述べ、捜索を続ける。</p>
<p>アガマ寺院で足を止めたププは、探している友がどれほど大切かを語る。幼いころから常に共にあり、宇宙を巡る夢を分かち合い、互いに支え合って星船を手にした――だが、その勝利の感覚は長く続かなかったのだと。そこへリンクパール越しにナシュの声が届き、ププの友を見つけたかもしれないからプルサへ急げと言う。ププは最速だとして、すぐに向かうよう促す。</p>
<p>プルサでは、ヒルディブランドが友へ呼びかけた直後、相手がマンドラゴラと、歩く死者の一団に関わっていることが判明する。「ジェントル・デッド・マン」を名乗る者は、腐れ種族の噂を聞いて旅し、腐ったマンドラゴラを勧誘し、さらに奇妙な飛行船にさらわれた仲間を探すことになったと説明する。彼は「トゥルース」の記事で、この島に同じ特徴の宇宙船が目撃されたと知り、ここへ来たのだという。デリオンは読者だと喜ぶが、ププは静かに告白する――それは自分かもしれない、採集に夢中で食べられる植物と誤認したのだと。相手は無事で食べられていないなら良いとして去っていく。</p>
<p>世界中を捜すには「偵探の勘」では足りず、軍勢が必要だとデリオンが嘆くと、ププはひらめき、以前のようにヒルディブランドを大量に複製すればよいと言い出す。だが複製装置はついに完全に壊れ、最後に生まれたのは不完全な個体ひとつだけだった。彼は名を「ブランディヒルド」と名乗り、ナシュはその角ばった姿に目を丸くする。ププは処置しようとするが、ヒルディブランドは止め、むしろ助手として迎え入れる――こうして「偵探ブランディヒルド」が、あなたたちの一員となる。</p>
</div>
<div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'獨創的搜查',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
<p>Delion 用一種「太剛好」的語氣攔住你，說他才剛想到你，你就突然出現。他堅稱 PuPu 所謂來這個世界找失聯同伴，只是掩飾真正目的——為全面入侵鋪路；而如今偵探那邊似乎追到了「外星朋友的朋友」的線索，這正是他伸手抓證據的機會。他說自己一個人對付不了這場宇宙級陰謀，所以你一定要跟上。</p>
<p>你們趕到 Palaka’s Stand，Nashu 立刻迎上來，興奮地說「月球小隊」終於又湊齊。PuPu 也向你道謝，還突然以清楚的語句回應你——不再「PuPu、PuPu」地重複。PuPu 淡淡表示，學會你們的語言並不費事，語法結構相對簡單；Delion 聽得發毛，覺得這種智力根本可怕。Hildibrand 則一臉得意，說你們正好可以來欣賞偵探辦案的風采。</p>
<p>Hildibrand 說自己靠一貫可靠的「偵探直覺」走到這裡，但那些「可感與不可感的徵兆」沒給他精確位置。於是他立刻改用另一種同樣可靠的手法：盤問。你們分頭去問附近的人，有沒有看過「長得像 PuPu」的身影。線索很快拼起來——有人在西邊看過一個東躲西竄、動作詭異的小東西；也有人在叢林裡看見那小東西身旁跟著一名「蒼白、散發怪味」的紳士，讓人不敢靠近。</p>
<p>回到集合處後，Hildibrand 聽完北、南、西各處的目擊，竟一本正經推論：既然到處都有蹤影，那一定是 PuPu 在這裡有比自己想像更多的朋友。PuPu 立刻否認，說他在這個世界只有一個朋友。Delion 則判斷多半是同一個外星人被不同人目擊在不同地點，唯一辦法就是分隊把整片區域搜過一遍。這時 Godbert 出現，說自己正為 Manderville 武器鍛造尋找靈感，既然這裡有熱鬧可看，不如也加入、順便提供「多一雙眼」。</p>
<p>隊伍重新分配後，Nashu 拿出特製的通訊珠，說就是為了這種時候準備的，大家想聊多久都行。Delion 又開始疑神疑鬼，說 Sharlayan 會偷聽；Nashu 不以為然，還提議讓 Godbert 代拿通訊珠，免得 Delion 心裡不舒服。你最後和 PuPu 一起往叢林西邊搜索，PuPu 表示會跟著你的步調行動。</p>
<p>一路上 PuPu 對 Etheirys 的水量讚嘆不已，說他造訪過許多星球，但像這裡如此富饒的水資源極少，你的家是難得的珍寶。你們在林間高處觀察時，PuPu 先後指著一些黑毛、白毛的生物詢問是否是你們的同族；你用帶點玩笑的方式否定，提醒它們既不算人、也不太友善。PuPu 則冷靜評語，說他很難分辨差異，「半智能生命」看起來都差不多，但眼下先以找人為要。</p>
<p>在 Agama Temple 附近，PuPu 終於放緩腳步，坦白那位失聯同伴對他有多重要——你聽見他說，他們從小一起長大，總是形影不離，也共享同一個夢：航行宇宙；他們努力工作、彼此扶持，直到各自擁有自己的星際船，彷彿整個宇宙都能任他們探索。然而那種勝利感轉瞬即逝，他只想讓你明白，自己為什麼如此在意這個人。話音未落，通訊珠裡傳來 Nashu 的聲音：他們可能找到了 PuPu 的朋友，叫你立刻去 Purusa。PuPu 立刻催你動身，說要用星際船趕路才最快。</p>
<p>Purusa 那邊，Hildibrand 正試著用誇張的方式請對方現身，轉眼卻發現事情完全偏題——牽扯進來的竟是 Mandragoras 與「走動的亡者」。一名自稱 Gentle Dead Man 的成員上前解釋：他聽聞 Bozja 一帶有腐敗的 seedkin 作亂，便遠行去招募一名「腐爛的 mandragora」；等他來到 La Noscea，卻得知其中一個同伴被奇怪的飛行器帶走，只好加入搜尋。他轉而依靠 The Thavnairian Truth 的怪談報導，得知有符合描述的外星船在此島出沒，便一路趕來。Delion 看到「忠實讀者」興高采烈，PuPu 卻在此時低聲認了：那個「帶走朋友」的外星人，可能就是他——他採集樣本時太投入，把 mandragora 誤當成可食用的植物。對方聽完反倒很能理解，只要求朋友必須完整歸還、而且沒有被吃掉，便決定離開這裡。</p>
<p>Delion 隨即抱怨，光靠偵探的直覺不可能把整個世界翻遍；真要找人，恐怕得有一支「偵探大軍」。PuPu 聽見這句就像抓到答案，立刻提議：那就像之前一樣，複製出大量 Hildibrand。可惜他的物質複製裝置這次徹底崩潰，只吐出最後一個失敗的複製體。那個新生個體斷斷續續報出名字：「Brandi…Hild。」Nashu 盯著他過分方正的模樣發愣，PuPu 則準備把這個異常個體「安樂處置」。Hildibrand 立刻阻止，說別衝動——這一位不太可能被誤認成自己，既然大家正缺人手，不如乾脆把他拉進隊伍。於是，偵探 Brandihild 就這樣被正式「收編」，成了你們搜尋案件的新助手。</p>
</div>

</div>`,
    unlockq:`<div class="stack">
<div class="row"><a class="link" href="the-imperfect-gentleman.html">逃跑的複製體</a></div>
</div>`,
    followq:`<div class="stack">
<div class="row"><a class="link" href="generational-bonding.html">充滿活力的父子</a></div>
</div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
