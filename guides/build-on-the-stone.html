    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Minfilia tells you to set aside the matter of the Ascian until the Scions have completed their move to the Rising Stones, but asks one last favor before she departs. She reminds you that she once said her father belonged to the Ala Mhigan Resistance—yet the truth is more complicated. To the Empire, he was a spy in their service, and for nearly five years he maintained that deception, slipping vital imperial secrets to the Resistance while feeding his handlers carefully crafted misinformation.</p><p>When he died some fifteen years ago, he left behind a journal—one Minfilia has guarded ever since. Within it is every scrap of information he and his agents could steal about what they believed to be Eorzea’s single greatest threat: the primals. Its insights have guided Minfilia for years, even though much of it remains beyond her understanding. Now she hopes Urianger may fare better, and she asks you to tell him to treat it with care—because it is all she has left of her father. Before she can reconsider, she urges you to place the journal in Urianger’s hands.</p><p>You deliver the journal, and Urianger is surprised you have not yet departed. He recognizes what it means: a father’s final bequest, and a daughter’s lifelong burden. He says it is no small thing to surrender something so cherished, and he can well imagine Minfilia’s pain. On his honor, he swears he will spare no effort in studying the materials, so that her sacrifice is not in vain.</p><p>Soon after, Minfilia contacts you by linkpearl—she apologizes, but says she could wait no longer and has already left for the Rising Stones. She asks that once you have given the journal to Urianger, you should come to the Seventh Heaven in Revenant’s Toll, where Tataru will guide you into your new headquarters. If you have already attuned, she suggests using the new aetheryte in Revenant’s Toll—after all, it stands right at your doorstep. Urianger urges you not to keep your comrades waiting.</p><p>In Revenant’s Toll, Slafborn greets you and says your friends are inside. He informs Tataru that all documents have been prepared and all signatures signed—the Rising Stones is officially yours. Tataru vows to make it as welcoming and comfortable as the Waking Sands ever was, even if the unfamiliar faces and places feel intimidating. Slafborn notes that most people here are adventurers who come and go freely, which should make things easier—and adds that you have already made something of a name for yourself in these parts. Tataru, reassured, tells you it is time to announce your presence within, certain Minfilia and the others will be overjoyed to see you.</p><p>At the entrance to your new home, Tataru welcomes you to the Rising Stones, marveling at it, then immediately hurries you along—everyone is waiting inside. In the solar, Minfilia observes the space and declares that today marks a new beginning: the Scions of the Seventh Dawn will now declare their independence. Alphinaud adds that you will be beholden to no nation, but serve all the people of Eorzea proudly and openly, while still strengthening ties with the Eorzean Alliance and refusing to let politics sway your judgments. Minfilia affirms that your identity and purpose remain unchanged: to safeguard Eorzea’s future. The Scions answer in unison: “For Eorzea!”</p><p>After the rallying cry, Minfilia calls you aside, intending to speak of Elidibus—but Urianger interrupts with urgent news. Every attempt to contact the Students of Baldesion has met with silence. Minfilia tries herself, but receives no reply, and cannot believe they would ignore you. Urianger says they never have before, and fears you must assume the worst. Minfilia refuses to accept it outright—perhaps an outpost has fallen, but not their headquarters. Their wards are beyond circumvention; if attacked, they would surely have raised the alarm. No one could penetrate their sanctum unnoticed—unless the intruder were one who lacks both the gift and the knowledge. Realizing that possibility, she orders immediate contact with the Students’ field agents. Yet until evidence proves otherwise, she admits you must assume the worst—and seek another source of information on Elidibus. Urianger warns that others in the homeland may know more, but they are unlikely to share it unconditionally. Minfilia tells him to do what must be done, then steadies herself against yet another unwelcome turn of events.</p><p>She speaks of how, for a time, she believed you had gained the upper hand—when you shattered the Crystal of Darkness and cast out Lahabrea, she dared to hope there was a way to rid the world of the Ascian menace. But she was wrong. Lahabrea endures and may return; on that point, she has no doubt Elidibus spoke true. Still, she insists there must be a way to destroy the Ascians utterly, and spare the world their unholy machinations—she dares not consider the alternative. She tells you there are forces at work you do not understand, disturbances too great and too numerous to be coincidence. The Paragons are surely involved, but how and why remains unclear. Whatever comes, she believes you will rise to meet it together, and she reads resolve in your face. She tells you to return to your private affairs with her blessing for now, promising you will be informed if anything arises—then calls for Krile, asking where she is.</p><p>Elsewhere, unseen to you, Ascians speak in their own tongue. Nabriales says that your intercession was not foretold, questioning Elidibus’s intentions as their plans move forward. Elidibus answers that you survived the Seventh Ardor and are now stronger in the gift, and asks whether that does not intrigue him. Nabriales replies that it does not. Elidibus insists they do not labor at cross purposes, and says the wisdom of His plan will become apparent in time—when the veil is lifted from your eyes, and at long last, you see.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row">Quest Giver <span class="muted">Minfilia, The Waking Sands (X:6.9, Y:6.1)</span></div></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'石の家へ',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ミンフィリアは、アシエンの件はいったん脇に置き、「ライジングストーンズ」への移転を終えてから考えるべきだと言う。だが出発の前に、あなたへ最後の頼みごとがあるとも告げる。彼女は、かつて父がアラミゴ解放軍の一員だったと話したが、真相はもっと複雑なのだと明かす。帝国から見れば父は帝国の密偵であり、その欺瞞をおよそ五年にわたって貫き、解放軍へは重要な帝国の機密を流しつつ、雇い主には巧妙に仕組まれた偽情報を与えていたのだ。</p><p>父が亡くなったのは十五年ほど前で、そのとき遺された日誌をミンフィリアはずっと守り続けてきた。そこには、父とその協力者たちが「エオルゼア最大の脅威」と信じた蛮神について、盗み得たあらゆる情報が記されている。その知見は長年にわたり彼女を導いてきたが、理解できない箇所も多い――だからこそ、ウリエンジェならより深く読み解けるはずだと期待する。彼女は、日誌を大切に扱ってほしいと伝えてほしいと言い、それが父の形見として自分に残されたすべてなのだと静かに託す。そして思い直す前に、日誌をウリエンジェに渡してほしいとあなたに頼む。</p><p>あなたが日誌を届けると、ウリエンジェはあなたがまだ出立していなかったことに気づき、なぜ留まるのかと問う。だが彼はすぐに、その意味を受け取る――父の最期の遺産であり、娘が抱え続けてきた歳月の重み。これほど大切な形見を手放すのは容易ではなく、盟主の痛みも想像に難くない、と彼は言う。そして名誉にかけて、彼女の犠牲が無駄にならぬよう、資料の研究に一切の労を惜しまないと誓う。</p><p>ほどなくして、ミンフィリアは真珠の通信であなたに呼びかける。待ちきれずに、すでにライジングストーンズへ向けて出発したという。もしまだ日誌を渡していないなら――とためらいながらも、渡し終えたらレヴナンツトールの「セブンスヘブン」へ来てほしいと伝える。タタルが新たな本部へ案内してくれるという。すでに交感しているなら、レヴナンツトールの新しいエーテライトを使うとよい――玄関先なのだから、と。ウリエンジェもまた、仲間を待たせるなと背中を押す。</p><p>レヴナンツトールでスラフボーンはあなたを見つけ、仲間が中で待っていると告げる。彼はタタルに、書類は整い署名もすべて完了した、ライジングストーンズは正式にあなたたちのものになったと報告する。タタルは、砂の家に劣らぬ居心地のよい拠点にすると誓う一方、見慣れない場所と顔ぶれに気後れもしていた。スラフボーンは、この地にいる多くは自由に行き来する冒険者であり、用事はこなしやすいはずだと言い、さらにあなたがここで名を知られていることも助けになるだろうと付け加える。タタルは元気づけられ、あなたに中へ入って皆へ顔を見せるよう促す。盟主たちもきっと喜ぶ、と。</p><p>タタルはあなたを「新しい家、ライジングストーンズへようこそ」と迎え、感想を言い合う暇もなく皆が待っているから中へと急かす。応接室でミンフィリアは広さを確かめ、「今日より暁の血盟は独立を宣言する」と告げる。アルフィノは、もはやいかなる国家にも従属せず、誇りと公正をもってエオルゼアの民すべてに仕えると続ける。ただしエオルゼア同盟との絆を断つわけではなく、むしろ強めていくが、政治的事情に判断を左右させないとも念を押す。ミンフィリアは、名も大義も変わらない――暁の血盟の目的はただひとつ、エオルゼアの未来を守ることだと言い、皆は「エオルゼアのために！」と声を合わせる。</p><p>その後ミンフィリアがあなたにエリディブスの話をしようとしたところで、ウリエンジェが緊急の報せを持ち込む。バルデシオン委員会へ連絡を試みたが、ことごとく沈黙に阻まれたという。ミンフィリア自身も試すが返答はない。彼らが無視するはずがない、と彼女が言うと、ウリエンジェはこれまで一度もなかったと答え、最悪を想定せねばならぬと告げる。ミンフィリアは否定したい――前哨地ならまだしも、本拠地まで、とは。彼らの結界は突破不可能で、襲撃されれば必ず警報が上がる。誰にも気づかれずに聖域へ侵入などできない――だが「資質」と「知識」の両方を欠く者であれば別だ、と彼女は思い至る。すぐに現地の協力者へ連絡せよ、と命じつつ、証拠が出るまでは最悪を想定するしかないと認め、エリディブスについて別の情報源を探す必要があると結論づける。ウリエンジェは、故郷の他の者が知識を持つ可能性はあるが、無条件では差し出さないだろうと警告する。ミンフィリアは「やれることをやれ」と言い、望まぬ事態がまた一つ増えたことに歯噛みする。</p><p>彼女は、しばらくの間こちらが優勢だと信じていたと打ち明ける。あなたが闇のクリスタルを砕き、ラハブレアを退けたとき、アシエンの脅威を断つ道が見えたと希望した――だが誤りだった。ラハブレアは滅びておらず、いずれ戻り得る。その点でエリディブスの言葉は真実だ、と彼女は言う。それでも、奴らを完全に滅ぼし、この世界を冒涜的な策謀から救う術はあるはずだと信じ、他の可能性など考えたくないと語る。理解できぬ力が動いており、偶然では片づけられないほどの異変が多すぎる――パラゴンが関わっているのは確かだが、目的も手段も見えない。それでも何が来ようと、あなたたちは一つとなって立ち向かう、と彼女は言い、あなたの顔に決意を見て取る。今は私用に戻ってよい、何かあれば知らせる――そう告げたあと、彼女はクルルの名を呼び、どこにいるのかと問いかける。</p><p>一方そのころ、別の場所でアシエンたちが異界の言葉で語り合う。ナブリアレスは、あなたの介入は予見されていなかったと告げ、計画が進むなかでエリディブスの意図が不明だと疑義を呈する。エリディブスは、あなたが「第七のアルダー」を生き延び、賜物においてさらに強くなったのだと言い、それでも興味を抱かぬのかと問う。ナブリアレスは興味はないと答えるが、エリディブスは互いに相反する目的で動いているわけではないと告げる。そして「彼の計画の叡智」は時が来れば明らかになる――あなたの目から覆いが取り払われ、ついに見えるようになるそのときに、と言い残す。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="still-waters.html">「暁」の役目</a></div></div>`
  },

    story:`<div class="clamp" data-collapsed="true"><p>Minfilia 要你先把那名 Ascian 的事暫時擱置，等你們完成搬遷到 the Rising Stones 之後再處理。可在她出發之前，她還有最後一個請求。她說自己以前提過，爸爸曾是 Ala Mhigan Resistance 的一員，但真相其實更複雜。就帝國所知，爸爸是他們的間諜；他把這個身分維持了將近五年，一面把攸關重大的帝國機密送進 Resistance 手中，一面又以極其細膩的方式，回頭向自己的「雇主」餵送精心設計的錯誤情報。</p><p>爸爸在大約十五年前去世時，留下了一本日誌，而 Minfilia 從那時起就一直把它緊緊守著。日誌裡記錄了爸爸與他的同伴、線人們所能偷來的所有資訊——他們相信那是 Eorzea 最大的威脅：primals。多年來，Minfilia 一直靠著那份「知識」指引自己前進，但其中仍有太多內容她無法理解。她希望 Urianger 能比她看得更透徹，因此要你把日誌交給他，並叮囑他務必小心對待——因為那是她僅存的、與爸爸有關的一切。她甚至催你快點動身，把日誌交出去，免得她臨時又捨不得。</p><p>你把日誌交到 Urianger 手上時，他有些意外你還沒離開，問你為何仍逗留於此。可當他明白你帶來的是什麼，語氣也沉了下來——那是爸爸最後的遺贈，也是女兒背負一生的心血與牽念。把如此珍貴的形見交出來，絕不是一件小事；他說自己完全能想像 Antecedent 會有多痛。Urianger 以名譽起誓，會竭盡所能研究這些資料，絕不讓 Minfilia 的付出化為徒然。</p><p>不久後，你透過 linkpearl 聽見 Minfilia 的聲音。她向你道歉，說自己再也等不下去，已先一步出發前往 the Rising Stones。她有些遲疑地確認：如果你還沒把日誌交出去——但她很快改口，要你在交給 Urianger 之後就到 Revenant’s Toll 的 the Seventh Heaven 去找她，Tataru 會在那裡帶你進入你們新的總部。若你已經與那裡完成共鳴，她也建議你直接使用 Revenant’s Toll 新設置的 aetheryte，因為它就設在你們門口。Urianger 也提醒你，既然被召喚過去，就別讓同伴久等。</p><p>到了 Revenant’s Toll，Slafborn 迎上來，說你的朋友們都在裡頭等你。他告訴 Tataru：文件全都備妥、簽名也已完成——the Rising Stones 正式歸你們所有。Tataru 興奮地說，從今天起她會不遺餘力，把這裡打理成像 The Waking Sands 一樣溫暖舒適的家；只是面對陌生的地方與陌生的面孔，她也難免覺得有些不安。Slafborn 便安慰她：你們在這裡見到的多半是來去自由的冒險者，事情反而更好辦；況且你早已在此闖出名聲，也會讓你們行動起來更順。聽到這些，Tataru 更有精神，催你進去向大家正式報到——Antecedent 與其他人一定會很高興見到你。</p><p>站在新據點外，Tataru 開心地歡迎你來到你們的新家——the Rising Stones，還沒讓你多說幾句，就急著把你往裡帶，因為所有人都在等你。進到 the solar，Minfilia 環顧四周，說這裡確實寬敞；她宣告，今天是 Scions of the Seventh Dawn 的新起點，因為今天你們要正式宣布獨立。Alphinaud 接著表示，你們今後不再受任何國家支配，而是要以驕傲且公開的姿態，服務 Eorzea 的所有人民；但這不代表你們會切斷與 Eorzean Alliance 的聯繫，相反地，他與 Antecedent 會努力強化彼此的關係，只是絕不允許政治考量影響你們的決策。Minfilia 也重申，你們的身分與志向並未改變——你們是 Scions of the Seventh Dawn，而唯一的目的就是守護 Eorzea 的未來。眾人齊聲高喊：「For Eorzea！」</p><p>儀式結束後，Minfilia 叫住你，正要談 Elidibus 的事，Urianger 卻帶著緊急消息插話：他嘗試聯絡 Students of Baldesion，卻只得到沉默。Minfilia 不信邪，親自再試一次，依舊毫無回應。她無法理解——他們怎可能刻意不理？Urianger 也說，過去從未發生過這種事，他擔心你們必須先把最壞的可能性放進心裡。Minfilia 立刻否定，說她不相信是他們的總部出事；就算有狀況，也許只是某個前哨而已。因為他們的防護結界幾乎不可能被繞過，若遭受攻擊，理應會立即發出警報；沒有人能在不驚動任何人的情況下闖入他們的聖域——除非對方「既沒有天賦、也沒有知識」。想到這裡，她的臉色一沉，立刻下令去聯絡在外行動的相關人員，看看是否有人知道 Students of Baldesion 發生了什麼。即使她再不願意承認，在缺乏反證之前，你們也只能先假定最糟的情況，因此也必須另尋關於 Elidibus 的情報來源。Urianger 提醒：也許 homeland 的其他人掌握相關知識，但對方未必會無條件提供。Minfilia 只回一句：不管用什麼方法，都去做。她咬牙承受又一次突如其來、令人不快的變數。</p><p>Minfilia 說，有一段時間她以為你們已經取得上風。當你擊碎 Crystal of Darkness (就是你把那個「闇的結晶」打碎，讓對方失去依附的支點，進而把 Lahabrea 驅逐出去)、把 Lahabrea 驅逐出去時，她曾經真心希望你們找到了徹底擺脫 Ascian 威脅的方法。但她錯了——Lahabrea 仍然存在，而且很可能會再回來；在這一點上，她毫不懷疑 Elidibus 說的是真話。可即便如此，她仍相信一定存在能把他們「徹底消滅」的方法，能讓這個世界不再受他們那種亵瀆般的陰謀操弄；她不敢去想另一種可能。她告訴你，有些力量正在暗處運作，而你們根本還不理解；那些動盪太巨大、太頻繁，已不可能只是巧合。她確信 Paragons 涉入其中，但方式與目的仍完全不明朗。即便未來如何，她也相信你們會團結一致迎上去；她看著你的表情，說你的臉寫滿了決意。如今她希望時機還沒那麼快到來，於是要你先回去處理自己的私務；若有任何狀況，你一定會被通知。話一說完，她又喚著 Krile 的名字，問她究竟在哪裡。</p><p>在你看不見的地方，Ascian 以自己的語言交談。Nabriales 表示，你的介入並未在預言之中，他們質疑——計畫已在推進，而 Elidibus 的意圖卻不明。Elidibus 反問他是否反對，並提到你們從「第七次災厄」中倖存，如今在那份「天賦」上更強大了，難道不值得在意？Nabriales 冷冷回應：不值得。Elidibus 則說，各自照自己的方式服務即可，他們並非互相掣肘；等到遮蔽從你們眼前被揭開，等到你們終於真正「看見」之時，祂的計畫所蘊含的智慧就會變得清晰可見。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row">Quest Giver <span class="muted"> 敏菲利亞, 砂之家 (X:6.9, Y:6.1)</span></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="still-waters.html">拂曉的使命</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
