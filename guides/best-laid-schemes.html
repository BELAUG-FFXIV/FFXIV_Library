<head>
  <meta charset="utf-8" />

  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;
  overflow-y:auto;
  padding-right:8px;
  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>
<body>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`Best Laid Schemes`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Ilberd tells you he will join the 1st in their hunt for the Duskwight sellswords, hoping to catch them before they vanish into the Black Shroud. While he pursues them, he asks you to take the black marketeer’s weapons—sealed in a crate—and deliver them to Ul’dah, entrusting them to Yuyuhase of the 3rd on the Steps of Thal.</p><p>At the Steps of Thal, you find familiar faces in the Crystal Braves. Alianne greets you warmly, Wilred proudly shares that he has received his first official assignment, and Yuyuhase thanks you for your past assistance before hearing why you have come. When you explain the crate’s origin, he accepts it at once, promising to catalog the contents and have them delivered to the Hall of Flames.</p><p>Alianne looks at the shipment and doubts this can be everything, remembering Riol’s certainty that there would be far more. Yuyuhase dismisses that expectation as merchant bluster and urges gratitude that the intelligence was not wholly wrong. Wilred tries to keep the mood upbeat, but Alianne reminds him that their orders are to stand watch, not to chase glory, and she leaves with her unit. Before you go, Yuyuhase assures you that the Immortal Flames will hear of your contribution—and Riol quietly asks you to meet him elsewhere.</p><p>You find Riol at the Sapphire Avenue Exchange, where the noise of commerce swallows private words. He asks you to tell him everything that happened at the Burning Wall, detail by detail—then admits it does not match how the 1st reported it. The trail of the Duskwights has gone cold, and you never saw them yourself, neither before the fighting nor after. Riol says something feels wrong, insists the information was reliable, and speaks of the work he once did tracing transactions and balancing ledgers when the Braves were first founded—when the commander demanded proof the gil came from the right sort of patrons. He catches himself, apologizes, and sends you on your way.</p><p>A moment later, Tataru’s voice bursts through your linkpearl, urgently summoning you back to Rising Stones at once.</p><p>When you arrive, you see Minfilia occupied with a guest from Ishgard, while others trade remarks nearby. Before you can speak, Minfilia asks you to wait outside with Tataru. Out in the open air, Tataru thanks you for coming so quickly and tells you the Ishgardian visitor wishes to speak with you—by all indications, a most determined lady.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Ilberd <small class="muted">(Eastern Thanalan, X:25.3, Y:25.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="bait-and-switch.html">Bait and Switch</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-rising-chorus.html">The Rising Chorus</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'押収された武器',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>イルベルドは、ダスクウィスの傭兵たちを追う第１部隊に合流し、黒衣森へ逃げ込まれる前に捕らえたいと言う。その間、あなたには闇商人の武器が入った木箱をウルダハへ届け、第３部隊のユユハセに託してほしいと頼む。場所は「ウルダハ：ザル回廊」だ。</p><p>あなたが「ウルダハ：ザル回廊」でユユハセたちと合流すると、アリアヌは再会を喜び、ウィルレッドは正式な任務を授かったと興奮気味に語る。ユユハセはあなたの働きに礼を述べ、木箱の由来を聞くと受け取り、内容を確認してから不滅隊の「フレイム・コマンド」へ届けると引き受ける。</p><p>だがアリアヌは、これがすべてとは思えないと言い、リオルはもっと大量だと断言していたはずだと疑う。ユユハセはそれを商人の誇張だと切り捨て、誤情報ではなかっただけでも良しとすべきだと言う。ウィルレッドが場を和らげようとする一方で、アリアヌは命令は監視であって武勲ではないと釘を刺し、部隊を率いて現場へ戻る。去り際、ユユハセはあなたの貢献は不滅隊にも伝わると告げ、リオルは人目のない場所で話したいとだけ言い残す。</p><p>あなたは「サファイアアベニュー国際市場」でリオルと落ち合う。市場は人の出入りが激しく、会話が埋もれるのに都合がいい――そう言って、彼はバーニングウォールで何が起きたのか、最初から最後まで細部を残さず話せと求める。ところが、第１部隊からの報告と食い違っていると言い、追っていたダスクウィスの行方は途絶え、あなた自身も戦闘の前後で彼らを見ていないと確認する。何かがおかしい、とリオルは言う。情報は確かだった、武器を買い付けた事実は揺るがない――そう主張し、かつては取引記録を読み解いて資金の出所を辿り、司令が「不適切な後援者」からギルを受け取っていないと保証するために奔走したのだと口にする。だが彼は言葉を切り、詫びて、あなたを解放する。</p><p>直後、リンクパール越しにタタルの声が飛び込む。石の家へ至急戻ってほしい、と。</p><p>あなたが石の家へ駆け戻ると、ミンフィリアはイシュガルドからの客人と話をしており、周囲では仲間たちの声も交わされている。だがミンフィリアは、すぐに対応するからタタルと一緒に外で待ってほしいとあなたに頼む。外へ出たあなたに、タタルは礼を言い、イシュガルドの客人があなたに会いたがっている――どうやら相当に強い意志を持つ女性らしい、と告げる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> イルベルド <small class="muted">（東ザナラーン, X:25.3, Y:25.4）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="bait-and-switch.html">闇取引の捜査協力</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-rising-chorus.html">黙約の塔へ</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'收繳來的武器',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Ilberd 說他要跟第1部隊一起追捕那群 Duskwight 傭兵，希望能在他們逃進 Black Shroud 之前把人攔下來。與此同時，他要你代他把黑市商人的武器——裝在木箱裡——送去 Ul’dah，交給第3部隊的 Yuyuhase，地點在 Steps of Thal。</p><p>你到了 Steps of Thal，正好遇到 Crystal Braves 的人。Alianne 驚喜跟你打招呼，Wilred 興奮地說自己終於拿到第一個正式任務；Yuyuhase 則先向你道謝，聽完你的來意後收下木箱，表示會先清點登記，再把武器送到 Hall of Flames。</p><p>但 Alianne 看著木箱，直覺這不可能是全部——Riol 明明很有把握地說，應該會有更大量的武器。Yuyuhase 卻冷冷回應，那多半是商人誇口的謊話，並暗示 Riol 不熟 Ul’dah 商人的做派；他要大家知足，至少情報沒有完全錯，至少你們還是做成了「有價值」的事。Wilred 想把氣氛往好處帶，但 Alianne 直接提醒：你們的命令是站哨監視，不是去追求戰功，說完就帶隊去 Ceruleum Processing Plant。Yuyuhase 再次向你致意，保證 Immortal Flames 會知道你的貢獻；而 Riol 則叫住你，要你改去 Sapphire Avenue Exchange 找他。</p><p>你在 Sapphire Avenue Exchange 跟 Riol 會合。他說市場最適合談私事——人潮與買賣的喧鬧，能讓多數對話被忽略。接著他開門見山，要你把 Burning Wall 發生的事「一個細節都別漏」全部說清楚；聽完後，他皺起眉，說這跟第1部隊講的版本不太一樣。那群被追的 Duskwight 最新消息是已經丟了線索，而你自己也從頭到尾都沒親眼看到他們——不管是戰鬥開始前，還是結束後。Riol 說他直覺不對勁；他也強調自己不是會被醉鬼商人的吹噓牽著走的人，情報明明可靠，他確信那筆武器購買確實發生過。他提到以前 Crystal Braves 剛成立時，他常常得把放款帳冊看透、把交易一路追回源頭，只因指揮官需要確保你們沒收錯人的錢；說到一半，他又停下來，向你道歉，說自己最近心事太多，謝謝你願意聽他說，然後要你回去忙正事。</p><p>就在這時，你的 linkpearl（通訊珍珠）傳來 Tataru 急促的呼叫——她要你立刻回 Rising Stones，越快越好。</p><p>你趕回 Rising Stones，看到 Minfilia 正跟來自 Ishgard 的客人談話，旁邊也有人插話打趣。Minfilia 先要你稍等，請你到外面跟 Tataru 一起等她談完；你一出來，Tataru 立刻向你道謝，說 Ishgard 來的客人想見你——而且看起來，是位「非常堅決」的女士。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 伊爾伯德 <small class="muted"> 東薩納蘭（X:25.3, Y:25.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="bait-and-switch.html">黑市交易</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-rising-chorus.html">前往密約之塔</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
