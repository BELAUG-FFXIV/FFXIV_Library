  EN:{

    pageTitle:'Big Trouble in Little Ala Mhigo',

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Gundobald is still turning Wilred’s words over in his mind—“the power to bring down the Empire”… what power could he mean? Before he can say more, a groan cuts in, and Bertliana staggers forward, barely able to speak. She sobs out what happened: she was out foraging when the Corpse Brigade came. They dragged her to their hideout, and through it all they laughed—saying she suffers because she still clings to hope. Shaking, she asks if it is wrong to dream of home… wrong to call themselves Ala Mhigans. Gundobald tells her not to heed such poisonous thoughts—that their dreams are what sustain them—and swears those villains will answer for their crimes in due time. When he asks who else knows, Bertliana whispers that Wilred saw her outside, and that he was furious. Gundobald stays to tend to her, and asks you to find out what the young ones make of this—he fears they will do something rash.</p>
      <p>You find Wilred calling upon Rhalgr, begging for strength to end the suffering of his people. When he notices you, he sneers that you have come to interfere again—but you are too late, because their plan is already in motion. Once they have the crystals, he insists, their enemies will pay, and no one will dare oppress them again. Nearby, the young ones echo him: one swears what was done to Bertliana is unforgivable and vows to follow Wilred to the bitter end; another talks of laying the Empire low and changing the world, cursing Gundobald for being content to scrape by here while fumbling for a map.</p>
      <p>When you return, Bertliana tries to steady you with a quiet word—just being near everyone again eases her heart. But Gundobald is grim: the young ones are gone, every last one. As he feared, they mean to take matters into their own hands—yet what, exactly? Then you show him what you found: a hunting knife… and a map of Zanr’ak. He snaps to Wilred’s talk of crystals, and the thought hits him hard—by the gods, it is madness. Those youths are untrained and unblooded; they have no notion how dangerous the Amalj’aa are. They will be butchered long before they get within a hundred yalms of the crystals. They have headed east, and if you hurry, you may yet reach them before it is too late.</p>
      <p>You catch up to the aftermath, and Gundobald calls out Wilred’s name—asking if no others survived. Wilred, shaken and broken, can barely form the words. He chokes out that it was meant to begin with getting the crystals—that they were going to reclaim their homeland—before Gundobald barks at him to pull himself together. Trembling, Wilred finally confesses: they meant to offer crystals to Rhalgr to summon Him, just as the masked stranger taught them. They tried to sneak into Zanr’ak and steal the lizardmen’s cache, but were caught… and so many died.</p>
      <p>Then the Amalj’aa surge in, roaring that you will pay for your crimes with your souls. Gundobald answers that he regrets the youths’ transgressions, but a soul is too high a price for youthful folly—and that, for all their failings, they are the hope of the Ala Mhigan people. He will guard that hope with his life. You stand with him, protect Wilred, and drive the attackers back.</p>
      <p>When the fighting ends, Gundobald praises your skill and urges you to leave before more danger comes. Wilred protests—you have come this far, the crystals are right there—but Gundobald demands to know if he has learned nothing. Did he not see those tempered wretches? Such is the fate of those touched by a god—does Wilred desire that for himself and his friends? Wilred stammers that the masked man swore they could defeat the Empire if they summoned Rhalgr, but Gundobald cuts him off. Enough—he will hear the rest back in Little Ala Mhigo, and you will hear it too.</p>
      <p>Back in Little Ala Mhigo, Gundobald leaves Wilred no room to hide: no more lies—tell everything. Wilred admits that the masked stranger appeared while he was outside with the others, spoke of summoning Rhalgr with crystals, and then simply vanished. Desperate to believe they could rise from this squalor, Wilred says he never stopped to question the stranger’s motives—yet now he can only see what he calls a hopeless truth, that there is no solution and their people are doomed to live and die like beasts.</p>
      <p>Gundobald answers him firmly: their home may be lost, but it takes more than stones and mortar to define who they are. No matter where they may be, Ala Mhigo lives on within them. What to make of that legacy is for Wilred to decide—but whatever he chooses, he must never forget he owes his life to you, an outsider. Wilred promises he will not forget, thanks you for saving him, and apologizes for trying to kill you. Gundobald thanks you as well, saying it gives them hope to know there are kind souls out there—and that while Little Ala Mhigo offers little comfort, you will always be welcome.</p>
    </div>

    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>グンドバルドは、ウィルレッドの言った「帝国を倒す力」という言葉を反芻していた。いったいどんな力を指しているのか――そう考えた矢先、うめき声が響き、ベルトリアナがよろめきながら助けを求める。彼女は泣きながら訴える。採集に出ていたところを屍旅団に襲われ、隠れ家へ連れ去られたのだと。連中は終始笑い、希望にすがるから苦しむのだと言い放ったという。帰りたいと夢見るのは間違いなのか、アラミゴ人と名乗るのは間違いなのか――ベルトリアナの問いに、グンドバルドは毒のような考えに耳を貸すなと諭し、夢こそが自分たちを支えるのだと告げる。そして悪党どもは必ず報いを受けると誓い、他に誰が知っているのかを問う。ベルトリアナは、外でウィルレッドが自分を見かけ、とても怒っていたと答える。グンドバルドはベルトリアナの手当てに戻り、その間に若者たちがこの一件をどう受け止めているか探ってほしい、衝動に走るのが怖いとあなたに頼む。</p>
      <p>あなたが向かうと、ウィルレッドはラールガーに祈りを捧げ、民の苦しみを終わらせる力を授けてほしいと嘆願している。そこへあなたが現れると、また邪魔をしに来たのかと吐き捨て、だがもう遅い、計画は動き出していると言い切る。クリスタルさえ手に入れれば、敵は罪を償い、二度と誰も自分たちを虐げられなくなるのだと。周囲の若者たちも熱に浮かされ、ベルトリアナにした仕打ちは許せないと叫んでウィルレッドに最後までついていくと誓う者、帝国を打ち倒して世界を変えるのだと息巻き、グンドバルドのように湿った洞穴で生き延びる気はないと地図を探して毒づく者までいる。</p>
      <p>あなたが戻ると、ベルトリアナは自分のことは気にするな、皆のそばにいられるだけで心が楽になると静かに言う。だがグンドバルドの表情は硬い。若者たちは全員いなくなった――やはり自分たちで決着をつけるつもりだ。しかし何をする気なのか。そこであなたが見つけたものを示す。狩猟用の小刀、そしてザンラクの地図。さらにウィルレッドが口にしたクリスタルという言葉がつながり、グンドバルドは顔色を変える。神々よ、これは狂気だ。あの若者たちは未熟で血も見ていない、アマルジャがどれほど危険かを知らない。クリスタルに百ヤルムも近づく前に皆殺しにされる。東へ向かったはずだ、急げば手遅れになる前に追いつけるかもしれない――そう言ってあなたを促す。</p>
      <p>あなたは現場へ駆けつけ、グンドバルドがウィルレッドの名を呼ぶ。ほかに生き残りはいないのか、と。ウィルレッドは打ちひしがれ、クリスタルを得ることが始まりのはずだった、故郷を取り戻すはずだったと、言葉にならない声を漏らす。グンドバルドが叱咤して正気に戻させると、ウィルレッドは震えながら白状する。仮面の男に教えられたとおり、クリスタルを供物にしてラールガーを召喚するつもりだった。ザンラクへ忍び込み、トカゲどもの貯蔵を奪う計画だったが、見つかってしまい、多くが死んだ――そう懺悔する。</p>
      <p>そこへアマルジャが押し寄せ、魂で罪を償えと怒号を上げる。グンドバルドは若者の過ちを詫びつつも、若気の至りに魂を差し出すのは高すぎると言い、彼らは欠点だらけでもアラミゴの希望だ、その希望は命に代えても守ると宣言する。あなたはウィルレッドを守り、襲撃者を退ける。</p>
      <p>戦いの後、グンドバルドはあなたの武勇を称え、ここに留まるのは危険だとしてリトルアラミゴへ戻ろうと言う。だがウィルレッドは、ここまで来たのだからクリスタルを手に入れねばならない、目の前にあると食い下がる。グンドバルドは問い返す。何も学ばなかったのか、テンパードとなった哀れな者たちを見ただろう――神に触れられた者の末路だ、それを望むのか。ウィルレッドは、仮面の男がラールガーを呼べば帝国に勝てると誓ったのだと叫ぶが、グンドバルドは遮って「もういい」と言い、続きはリトルアラミゴで聞く、あなたも聞くだろうと告げる。</p>
      <p>リトルアラミゴに戻ると、グンドバルドはウィルレッドに迫る。嘘はもう終わりだ、すべて話せ。ウィルレッドは、仲間たちと外にいたとき仮面の男が現れ、ラールガーの召喚とクリスタルの使い方を語り、そして姿を消したのだと言う。自分はこの惨めさから抜け出せると信じたくて、動機を疑うこともしなかった――だが今は、何も変えられない、自分たちは獣のように生きて死ぬしかないのだと絶望を口にする。</p>
      <p>グンドバルドは言い聞かせる。家を失っても、人を定義するのは石や壁ではない。どこにいても、アラミゴは自分たちの中に生きている。その遺産をどうするかはお前次第だ――だがどんな生き方を選ぶにせよ、この命は外の者であるあなたに救われたのだと決して忘れるな。ウィルレッドは約束し、助けてくれてありがとう、そして殺そうとしたことを詫びる。グンドバルドもあなたに礼を述べ、親切な魂がいることが希望になる、リトルアラミゴに安楽は少ないが、あなたはいつでも歓迎だと告げる。</p>
    </div>

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'小阿拉米格的大麻煩',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Gundobald 仍在反覆咀嚼 Wilred 那句「能擊垮 Empire 的力量」——那究竟會是什麼？話音未落，一陣痛苦的呻吟傳來，Bertliana 幾乎站不穩地喊出你的名字。她哭著說，自己外出採集時遇上了 Corpse Brigade，被抓去他們的藏身處；整個過程裡，那些人一邊笑、一邊說她會受苦，是因為她仍緊抓著希望不放。她顫抖著問：想著回家，是不是錯？叫自己 Ala Mhigans，是不是錯？Gundobald 要她別理會這種毒一般的念頭——夢想正是支撐你們的東西；他發誓，那些惡徒終究會為罪行付出代價。當他追問還有誰知道這件事時，Bertliana 小聲說：Wilred 在外頭看見她了，而且非常憤怒。Gundobald 得先照顧 Bertliana，同時要你去探探那些年輕人對此事的想法——他擔心他們會做出衝動的事。</p>
      <p>你找到 Wilred 時，他正向 Rhalgr 祈求力量，盼望能終結族人的痛苦。見你出現，他冷哼說你又來干涉，但已經太遲——計畫早已啟動。只要拿到 crystals，他們的敵人就會為罪行付出代價，再也沒有人敢壓迫他們。旁邊的年輕人也被情緒點燃：有人說對 Bertliana 做的事不可原諒，發誓會跟著 Wilred 直到最後；也有人喊著只要成功，就能擁有扳倒 Empire、改變世界的力量，還咒罵 Gundobald 甘願在這陰濕的洞裡苟活，自己絕不想把一生耗在這裡，轉頭急著找那張地圖。</p>
      <p>你回去後，Bertliana 先輕聲要你別擔心她——只要能回到大家身邊，她的心就安定了些。但 Gundobald 的臉色更沉：年輕人全都不見了，果然要自己動手。可他們到底想做什麼？你拿出找到的東西：一把狩獵用的小刀，還有 Zanr’ak 的地圖。再加上你聽到 Wilred 提起 crystals，Gundobald 立刻意識到其中含意，低聲咒罵這是徹頭徹尾的瘋狂。那些年輕人毫無實戰經驗，更不知道 Amalj’aa 有多危險——在接近 crystals 一百 yalms 之前就會被屠殺。他們往東去了；只要你們夠快，也許還來得及在太遲之前找到他們。</p>
      <p>你們趕到時，現場已是一片慘狀。Gundobald 喊著 Wilred，追問是否還有其他人活下來。Wilred 失魂落魄，斷斷續續地說一切都不對了——拿到 crystals 本該只是開始，他們本該能奪回故土。Gundobald 厲聲要他振作，Wilred 才顫抖著坦白：他們打算照「戴面具的神秘人」教的方式，把 crystals 當作供品獻給 Rhalgr，藉此召喚祂。他們計畫潛入 Zanr’ak，偷走那些蜥蜴人的儲藏，但被逮個正著，死了很多人。</p>
      <p>就在這時，Amalj’aa 追來怒吼，要你們用靈魂償罪。Gundobald 說他為年輕人的過犯感到痛心，但再怎樣也不該用靈魂來換取代價；即使他們犯了錯，他們仍是 Ala Mhigan 的希望，而這份希望，他會用命守住。你與他並肩作戰，護住 Wilred，擊退來襲者。</p>
      <p>戰鬥結束後，Gundobald 稱讚你的身手，並催促立刻撤離，回 Little Ala Mhigo 才是上策。可 Wilred 卻不肯放手——都走到這裡了，crystals 就在眼前，不能空手而回。Gundobald 反問他到底學到了沒有：剛才那些 tempered 的悲慘模樣沒看見嗎？被神觸及的人，就是那種下場——你想讓自己和朋友變成那樣嗎？Wilred 急著說「戴面具的神秘人」保證過，只要召喚 Rhalgr 就能打敗 Empire，但 Gundobald 直接打斷：夠了，剩下的話回 Little Ala Mhigo 再說，你也要聽清楚。</p>
      <p>回到 Little Ala Mhigo，Gundobald 逼 Wilred 面對事實：不准再說謊，把一切都交代清楚。Wilred 承認，那天他和其他人待在外頭時，「戴面具的神秘人」突然現身，告訴他們如何用 crystals 召喚 Rhalgr，說完就消失，再也沒出現過。Wilred 說自己太渴望相信你們能擺脫這份困苦，所以從未停下來質疑對方的動機；直到現在，他才覺得一切都無法改變，你們的族人注定像野獸一樣活著、死去。</p>
      <p>Gundobald 要他聽清楚：家園也許失去了，但定義你們的是意志與身分，而不是石頭和牆壁；無論身在何處，Ala Mhigo 都活在你們心中。這份遺產要怎麼承擔，由 Wilred 自己決定——但不管選擇什麼路，都不能忘記：你這條命，是被你眼前這位外來的冒險者救回來的。Wilred 低聲答應，向你道謝，也為自己曾試圖殺你而道歉。最後 Gundobald 也向你致謝，說知道世上仍有你這樣善良的人，對他們而言就是希望；Little Ala Mhigo 或許稱不上舒適，但你永遠都會在這裡受到歡迎。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
