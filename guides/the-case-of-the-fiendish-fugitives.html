    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
<p>Hildibrand springs up as if he’d merely taken a short nap, proudly declaring that the legendary agent of enquiry and inspector extraordinaire is awake and brimming with energy. Nashu, of course, is ready for anything—she produces a spare set of his clothes as naturally as breathing, and the trio regroups with Hardiboiled as the next thread of trouble tightens around you.</p>
<p>Hardiboiled lays out what he’s pieced together: you searched the facility and learned the researchers were trying to stuff people’s souls into monstrous hosts, but the operation was shut down before they achieved any true success—then something happened that left the staff as walking corpses. The more unsettling detail, however, is in the notes he found: one researcher survived, kept working in secret after the project was mothballed, and shifted his focus away from the impossible-to-control tural vidraal to “less ornery” beasts. Hildibrand jumps straight to the most dramatic possibility—did the mad scientist put his own soul into a fiend?—but Hardiboiled says no. The man saved that indignity for convicted criminals.</p>
<p>According to Hardiboiled, the researcher set up a fake rehabilitation program, had prisoners transferred to his custody, and tore out their souls to use as experimental fuel. Nashu is horrified and demands to know what became of the criminals trapped in monster bodies. That’s the million-credit question: the containment cell named in the notes was empty—cages gaping like they’d never held anything at all. Worse, the operations log shows the locks were opened only recently. Hildibrand seizes the title instantly, declaring you’ve stumbled into the Case of the Fiendish Fugitives, and vows you’ll apprehend the escapees at once.</p>
<p>Hardiboiled agrees the fugitives may already be out there causing trouble, and he can’t ignore wrongdoing. He also recovered a battered storage device he believes belonged to the note’s author; the data might still be salvageable. You return to Solution Nine, to Hardiboiled’s place in the Recreation Zone, where he warns you to wait outside—he’s not the sort who makes his bed, and he clearly prefers working alone. The device is in terrible shape, but a quick pass yields scraps: enough to assemble a partial file on one experimental subject. The researcher shoved the soul of a career thief into the body of an eyeclops. This thief didn’t steal for need or greed—he stole for the pleasure of upsetting his victims—and Hardiboiled doubts a body swap would suddenly reform him.</p>
<p>Hildibrand declares he sees the thief’s obvious plan: he will burglarize the city’s most prestigious jewelry store. Hardiboiled dismisses it as a soft-boiled guess. An eyeclops is too conspicuous—if one lumbered through the streets, you’d only have to follow the screams—so any heist would target something outside Everkeep, something truly disruptive. The answer is electrope. Alexandria can’t function without the miraculous ore, so you hurry to the quarry beyond the dome.</p>
<p>At Electrope Strike, a miner confirms the worst: several shipments of raw electrope have vanished in recent days, and the guards saw nothing. Those blocks are heavy enough to require a hover cargo—someone should have noticed—unless the culprit could carry them himself. Hardiboiled points out exactly what that implies: a sneaky eyeclops could haul the blocks away without breaking a sweat. He asks the miner to bait a trap—stack electrope conveniently out of sight of patrols—then you wait.</p>
<p>The thief appears, muttering that it’s perfect…perhaps too perfect. Hardiboiled calls the chase, but the enormous creature bolts fast enough to vanish into a field crawling with eyeclops. Now you have a problem: your quarry has hidden among look-alikes. The file says he’s no fighter—so you split up to find the one that doesn’t try to crush you on sight, and you regroup the moment someone strikes pay dirt.</p>
<p>One eyeclops tries to protest—stammering that he isn’t bad—before panicking and fleeing in a scream, confirming you’ve found the right one. Hildibrand cuts him off with theatrical certainty; Hardiboiled demands answers: where’s the stolen ore, who set you free? The eyeclops refuses—until Hardiboiled’s pressure sharpens and the criminal panics, trying to flip the situation into a hostage threat. Hardiboiled doesn’t blink: he fires, expecting a shot strong enough to drop a gomphotherium, but instead Hildibrand—dancing directly in the line—erupts in blinding light. The eyeclops recoils from the brightness, overwhelmed, and yields. Even Hardiboiled is forced to admit, through gritted teeth, that the crook has gone soft-boiled and cracked.</p>
<p>The thief confesses: he never wanted electrope. The researcher who freed them ordered the thefts, and the eyeclops handed over every block he took. The criminal insists he never learned the researcher’s name—only that he is “the man who made us into monsters.” The researcher already had a frightening bruiser working for him, so refusal wasn’t an option. As for where to find him, the thief has nothing: he was meant to meet the researcher out there with the latest haul, but the man surely slipped away once he realized the thief wasn’t alone.</p>
<p>Hardiboiled believes the confession—but even an unwilling subject still has crimes to answer for, so he turns the eyeclops over to the “tin men” authorities, promising to explain that this is a crook in a monster’s body so they don’t simply send him to the Arcadion to be slaughtered. Back at Hardiboiled’s place, Nashu gushes about how incredible Hildibrand was, and Hildibrand expects Hardiboiled to finally acknowledge his dazzling investigative skill. Hardiboiled refuses—yet he admits the stakes have widened. If that researcher used one monster, he likely has more doing his dirty work. The fugitives will operate as far from mechanical sentries as possible, perhaps beyond the dome, and that world is unfamiliar to Hardiboiled—so if you want to stay on the case, he needs your help out there.</p>
<p>Hardiboiled then explains why seeing Hildibrand dance into his shot twisted his trench coat in a knot. It ties back to a notorious figure in Alexandria: the Crime King, a man with fingers in every illegal pie. Hardiboiled was the one who caught “His Royal Rogueness” and put him in a cell—until the man was transferred elsewhere under the banner of a “rehabilitation program,” and then vanished from view. You connect the dots: that “elsewhere” could have been Yuweyawata. If the Crime King is now loose out there in a new monster skin, Hardiboiled wants to be the one to bring him in.</p>
<p>Hildibrand praises Hardiboiled’s unwavering resolve and swears to remain steadfastly at his side until the case is resolved. Hardiboiled grumbles that no one asked that soft-boiled dope for anything, but he returns to scraping data from the damaged device and tells you to stop by again—maybe next time he’ll have a new lead. Far away in Heritage Found, the scheming researcher watches the pieces move: he’d hoped the hulking eyeclops would crush you, but the coward surrendered. No matter—he now has enough electrope to proceed, and he praises the outlaws for their usefulness, especially with their new monstrous talents. And as Hardiboiled’s thoughts turn to the exact timing that makes a hard-boiled egg perfect—twelve minutes, no more, no less—Nashu warns you not to copy her egg-shaped “medicine” at home, and the episode ends with a promise that the next chapter of Inconceivably Further Hildibrand Adventures is still to come.</p>
</div>

  JP:{
    langLabel:'日本語',
    pageTitle:'はなたれた魔物',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
<p>ヒルディブランドは、まるで短い昼寝から起きただけのように跳ね起き、「事件屋ヒルディブランド、名探偵にして捜査の達人！　元気いっぱいで復活だ！」と胸を張る。ナシュも当然のように予備の服一式を取り出し、あなたたちはハルディボイルドと合流して、次なる事件の輪郭を聞くことになる。</p>
<p>ハルディボイルドが語るのは、あなたが施設を調べて把握した事実の整理だ。かつて研究者たちは、人の魂を魔物の器に押し込む実験をしていたが、まともな成果を得る前に施設は閉鎖された。そしてその後まもなく、職員が歩く死体と化すような“事故”が起きたらしい。さらに厄介なのは、彼が見つけた記録によれば研究者の一人が生き残り、計画が凍結された後も独自に研究を続けていたことだ。彼はトラル・ヴィドラールは制御不能として見切りをつけ、もっと扱いやすい獣で実験を進めたという。</p>
<p>ヒルディブランドは「その狂科学者、自分の魂を魔物に移したのでは！？」と大げさに身を乗り出すが、ハルディボイルドは否定する。そこまで狂ってはいない――その“栄誉”は、罪人たちに与えられた。研究者は偽の更生プログラムを用意し、囚人を移送させ、魂を抜き取って実験に使ったのだ。ナシュが震える声で「そんな……その罪人たちはどうなったんです！？」と問うと、ハルディボイルドは“百万クレジットの質問”だと言う。記録にあった収容区画へ行ったが、檻は空っぽで、運用ログを掘ると錠が開いたのはごく最近――つまり、逃亡者が出た可能性が高い。</p>
<p>ヒルディブランドは即座に事件名をつける。「魔物の逃亡者事件！」　二人は手分けして追うべきだと息巻く。ハルディボイルドも、悪事の気配があるなら見過ごせないと同意する。そして、研究ノートの持ち主と思しき人物の記憶媒体を確保したとも告げる。かなり損傷しているが、データが残っているかもしれない。あなたたちはソリューション・ナインへ戻り、レクリエーション区画にあるハルディボイルドの住まいで復旧作業を進めることになる。彼は「部屋の中で待ってるより外で待ったほうがいい」と言い、生活感をごまかす気もない。</p>
<p>復旧は難航するが、手早い解析で断片が出た。実験体の一人は、常習の盗人の魂をアイクリュプスの肉体に移されたらしい。しかもその盗人は欲や事情で盗むのではなく、被害者を苛立たせる快感のために盗むタイプ――身体が変わっても性根は変わらないと、ハルディボイルドは冷ややかに言う。ヒルディブランドは「それなら名門宝飾店を狙うに違いない！」と閃くが、ハルディボイルドは一蹴する。アイクリュプスが街を歩けば悲鳴で居場所が割れる。狙うのは街の外、エバーキープの外側で、本当に厄介な“ブツ”だ。</p>
<p>それがエレクトロープだ。アレクサンドリアはその奇跡の鉱石なしでは回らない。あなたたちはドームの外、採掘場へ急行する。エレクトロープ採掘場の作業員は、最近になって原石の輸送が何度も消えていると証言する。重い塊を運ぶならホバー・カーゴが必要で、普通なら誰かが気づくはず――だが、もし犯人がアイクリュプスなら話は別だ。ハルディボイルドは作業員に協力を求め、巡回の死角にエレクトロープを積んで“餌”にし、待ち伏せをする。</p>
<p>罠にかかった盗人は警戒しつつも現れ、追跡が始まる。ところが巨体のくせに驚くほど速く、あなたたちの視界から消え、アイクリュプスだらけの場所へ紛れ込む。見分けるために手分けして探すしかない。資料によればこの盗人は戦いが得意ではない――だから、近づいてきて潰そうとしない個体が怪しい。あなたが声をかけると、一体が動揺して言い訳をし、悲鳴を上げて逃げ出す。間違いない、そいつが盗人だ。</p>
<p>追い詰められた盗人は抵抗し、居直り、しまいには人質のような脅しまで口にする。ハルディボイルドは容赦なく制圧に移り、強烈な一撃を放つ――はずだった。だがその瞬間、ヒルディブランドが弾道の前で妙な動きをし、まばゆい光を放つ。盗人は耐えきれず屈し、すべてを話すと降参する。ハルディボイルドは舌打ちしつつも、結果として口を割らせた事実は認めざるをえない。</p>
<p>盗人は告白する。自分はエレクトロープが欲しかったわけではない。自分たちを解放した研究者に命じられ、盗んだ分はすべて引き渡していた。研究者の名は知らない――「俺たちを魔物にした男」としてしか覚えていない。彼には恐ろしい用心棒もいて、逆らう気になれなかった。待ち合わせ場所も、あなたたちが来たと気づいた時点で研究者は逃げたはずだ。ハルディボイルドはその供述を信じつつも、盗人である以上罪は罪だとして、当局に引き渡す。ただし、魔物の姿のままアーカディオンへ送られて処分されないよう、事情は説明すると約束する。</p>
<p>ソリューション・ナインへ戻ると、ナシュはヒルディブランドの活躍を称え、本人も「これで俺の捜査力を認めたまえ！」と胸を張るが、ハルディボイルドは相変わらず認めない。とはいえ、研究者が他にも魔物を使っている可能性は高く、逃亡者たちは機械の監視から遠い場所、場合によってはドームの外で動くだろう。ハルディボイルドが知らない“外の世界”の捜査には、あなたの力が必要だと言う。</p>
<p>そして彼は、なぜ先ほどの銃撃の前でヒルディブランドが踊るように動いたのが気に障ったのかを語る。アレクサンドリアの裏社会を牛耳った「犯罪王」――違法な取引に指を突っ込みまくった男がいた。ハルディボイルドはそいつを捕まえ、牢へ叩き込んだが、「更生プログラム」を名目に移送された後、消息が途絶えた。あなたは繋がりを理解する。移送先がユウェヤワータだった可能性がある。もし犯罪王が今、別の魔物の皮を被って野放しになっているなら、捕まえるのは自分でありたい――ハルディボイルドはそう言い切る。ヒルディブランドはその覚悟を称え、事件が解決するまで共にいると誓うが、ハルディボイルドは「頼んでない」とぼやきつつ、壊れた媒体の解析を続ける。次に会うときは、新たな手掛かりが出ているかもしれない。</p>
<p>一方その頃、ヘリテージ・ファウンドのどこかで、企む研究者が状況を見ていた。アイクリュプスがあなたたちを踏み潰すことを期待していたが、臆病者はあっさり降参した――それでも十分なエレクトロープは手に入った。新たな魔物の力を得た無法者たちは、計画のためにまだまだ利用価値がある。そうして物語は、ハルディボイルドの“ゆで卵は十二分”という妙に厳密な独り言と、ナシュの「卵形の薬は真似しないで！」という警告を残し、次回へ続いていく。</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>Hildibrand 甦醒得像只是打了個盹，精神抖擻地宣告：身為調查官、也是巡視員的他，已經活蹦亂跳、元氣滿滿。Nashu 更是理所當然地掏出一套備用衣服——她說自己永遠都會多準備一份。你們三人很快整裝完畢，而 Hardiboiled 也把你們拉回正題：他嗅到了一樁新案子正在發酵。</p>
<p>Hardiboiled 先確認你們查到的舊案脈絡：你們翻遍設施，知道他們曾嘗試把人的靈魂塞進魔物的宿主之中，但在真正成功之前就被迫關閉；而把職員變成行屍走肉的事故，大概也在那之後不久發生。真正讓他在意的是他找到的筆記：其中提到有一名研究者活了下來，就算計畫被封存也仍暗地獨立研究。他甚至判定 tural vidraal 根本不可能控制，於是轉而選用脾氣沒那麼難搞的野獸當實驗材料。</p>
<p>Hildibrand 立刻把事情想得更戲劇化，問是不是那個瘋狂科學家把自己的靈魂轉進嗜血怪物裡。Hardiboiled 否認：沒那麼誇張——他把這份「榮耀」留給了被定罪的罪犯。筆記顯示，那名研究者設立了假的「更生計畫」，把囚犯調來之後直接抽走靈魂，拿去做實驗。Nashu 聽得發毛，追問那些被塞進魔物身體、仍保有犯罪心性的傢伙最後怎麼了。Hardiboiled 說這就是「百萬信用點的問題」：他循著筆記找到收容室，結果牢籠比酒鬼的杯子還空；他又翻了運作紀錄，發現牢門的鎖是「最近」才被打開。也就是說——那些實驗體很可能已經逃出去作亂了。</p>
<p>Hildibrand 立刻替案件命名，喊你們已經踏進「惡鬼逃犯案」，必須立刻把這些卑劣的壞蛋抓回來。Hardiboiled 雖然嫌他浮誇，但也承認：只要懷疑有人在外頭惹事，他就不能裝沒看見。更重要的是，他還找到一個疑似屬於那份研究筆記作者的儲存裝置，雖然撞得很慘，但資料也許還救得回來。於是你們回到 Solution Nine，跟著他進到 Recreation Zone 的住處，Hardiboiled 說你們最好在外頭等——他不是那種每天整理床鋪的人，別指望房間體面。</p>
<p>復原進度不順，裝置比預想更糟，還得花時間才能完整救回內容。不過他先撈到一些碎片：足以拼出某個實驗體的部分檔案——那名倖存研究者把一個職業竊賊的靈魂塞進 eyeclops 的身體。Hardiboiled 補上一句：那傢伙不是為了貪婪才偷，而是為了享受把受害者惹毛的快感；這種扭曲的人不會因為換了身體就改變本性。</p>
<p>Hildibrand 卻自信滿滿地推斷：意圖已經很明顯了，那個狡猾的逃犯一定會去搶這座城市最頂級的珠寶店。Hardiboiled 直接潑冷水：那只是軟趴趴的猜測。他提醒你，eyeclops 太顯眼了——如果真在街上晃，你們只要跟著尖叫聲就能找到；所以如果要做案，目標就會在 Everkeep 之外，而且不會只是隨便偷一箱物資，而是要偷那種「偷了就足以造成大麻煩」的東西。答案是 electrope。Alexandria 對那種奇蹟礦石有著戒不掉的依賴，你們必須立刻趕往圓頂外的採石場。</p>
<p>在 Electrope Strike，你們找到礦工詢問，對方也正為此頭痛：近幾天已經有好幾批原始 electrope 的貨消失了。最詭異的是，守衛什麼都沒看到——那種沉重的礦塊要靠懸浮貨運車才能搬走，正常來說一定會有人注意到車輛進出。Hardiboiled 指出：如果犯人是 eyeclops，那些沉重礦塊根本不算什麼。礦工願意配合，Hardiboiled 便要他把 electrope 堆在巡邏死角當誘餌，你們負責收網。</p>
<p>陷阱布好後，你們等待。竊賊現身時先得意又起疑，覺得「完美得太不對勁」，隨即察覺不妙想逃。Hardiboiled 立刻追擊，但那巨大的 eyeclops 居然跑得飛快，一轉眼就鑽進滿地都是 eyeclops 的區域，讓你們分不清哪一隻才是目標。Hardiboiled 說檔案上寫那傢伙不擅長戰鬥，所以你們只要分頭找出「不會一見面就想把你踩扁」的那一隻就行；就算膽小，現在也長成大塊頭了，仍可能狗急跳牆，所以一旦找到就立刻呼叫同伴，一起拿下。</p>
<p>你逼近其中一隻時，那家伙竟結結巴巴地辯解「我、我不是壞 eyeclops」，下一秒就尖叫著逃竄——你們確定抓到正主。很快你們在前方攔住他，Hardiboiled 逼問：贓物藏哪了？誰放你出來的？竊賊嘴硬不肯說，Hardiboiled 便用更狠的手段壓迫，甚至冷冷提醒那種痛感比辣醬進眼睛還難受。Hildibrand 勸他別用威嚇，說那不符合紳士風範；Hardiboiled 卻反嗆：給罪犯一點機會，他只會讓你後悔。</p>
<p>竊賊忽然反撲，甚至試圖用 Nashu 當人質，要你們把武器放下。Hardiboiled 不再留情，直接開槍——他本以為那一發的威力足以撂倒 gomphotherium，結果卻出現更離譜的畫面：Hildibrand 在槍線前跳動，整個人瞬間亮到刺眼，像一顆燃起的寶石。那名 eyeclops 被光芒逼得痛苦退縮，終於崩潰投降，說他會把一切都講出來。Hardiboiled 一邊碎念「軟掉又裂開了」，一邊把訊問接回正軌。</p>
<p>竊賊坦白：他根本不想要 electrope，是那名研究者命令他去偷，他每次都把偷來的礦塊全數交出去。Hardiboiled 追問研究者的名字，竊賊發誓不知道——他只認得那人是「把你們變成怪物的男人」。那人身邊還有一個看起來很可怕的打手，他不敢違抗。至於下落，竊賊也說不出：他原本應該在這裡把最新一批貨交給對方，但對方看到他不是單獨行動後一定早就溜了。Hardiboiled 說他相信這些供詞，但即便你是被迫當實驗體，也仍得為曾經的犯罪付出代價——他會把你交給「鐵皮」當局，同時解釋你是「披著怪物外皮的竊賊」，免得他們直接把你送去 Arcadion 被宰。</p>
<p>回到 Solution Nine，Nashu 還沉浸在剛才的混亂中，讚嘆 Hildibrand 的表現有多驚人；Hildibrand 也等著 Hardiboiled 終於承認他的耀眼辦案能力。Hardiboiled 依舊不買帳，但他把案情往更大處推：那個研究者一定還有其他怪物在替他做骯髒事；而不管那些罪犯現在成了什麼，他們都是逃犯，必然會盡量遠離機械哨兵活動——甚至走到圓頂之外。那是 Hardiboiled 不熟的世界，如果你想繼續追這案子，他需要你的協助。</p>
<p>他接著坦白，為什麼你朋友剛才在槍線前的「舞步」讓他火大——這牽扯到 Alexandria 的一個大人物：Crime King，一個把手伸進所有非法勾當的傢伙。Hardiboiled 曾親手逮到這位「皇家無賴」，把他送進牢房；可那人之後以「更生計畫」為名被轉移，他便再也沒聽到任何消息。你很快把線連起來：那個「被轉移的地方」很可能就是 Yuweyawata。Hardiboiled 說，如果 Crime King 真的在外頭以新的怪物身軀重獲自由——那他一定要親手把人抓回來。</p>
<p>Hildibrand 讚許 Hardiboiled 的堅定決心，並宣誓自己會一路站在他身邊，直到案件徹底結案。Hardiboiled 卻嘟囔自己根本沒叫那個「軟趴趴的笨蛋」做任何事，只說他會繼續從那個破儲存裝置裡擠出更多資料；你下次路過就來找他，也許就能拿到新的線索。與此同時，在 Heritage Found 的某處，那名陰謀研究者冷眼旁觀：他本來想看那隻壯碩的 eyeclops 把你們碾碎，結果懦夫竟輕易投降——不過沒關係，他已經拿到足夠的 electrope，計畫可以繼續。只要給對的方向，這些亡命之徒仍相當好用，尤其是在獲得「新的怪物才能」之後。最後，Hardiboiled 在心裡冷冷盤算水煮蛋的時間：十二分鐘剛剛好；Nashu 也一本正經地警告你別在家亂做她那種「蛋形藥」，並要你期待下一集的 Inconceivably Further Hildibrand Adventures。</p>
</div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
