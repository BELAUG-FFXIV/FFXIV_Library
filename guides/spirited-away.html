    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Spirited Away',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>In Little Solace, Komuxio flutters before you with his leaves drooping, and quietly asks for your forgiveness. He had promised to take you to meet the elder one, but now he can no longer keep that promise. The elder is nowhere to be found. Yesterday, the elder went out into the forest as always, yet this time has not returned, and even for one so used to wandering the woods, such a long absence is unheard of. Unease tightens Komuxio’s voice as he begs you to help search. Near the place where the elder vanished stands the home of a walking one named Buscarron, and Komuxio believes that man may know what happened. Yet walking ones do not always trust “these ones,” and Komuxio fears he would not be heard. You, however, are a “kind one” from Gridania, a place where many kind ones live. He implores you to go to Gridania, ask your fellow kind ones for aid, and to hurry—until the elder returns, none of these ones can truly feel safe. You give your word and set out from the forest toward New Gridania and the Adders’ Nest.</p>
      <p>At the Adders’ Nest, Vorsaile Heuloix greets you with a familiar smile, hailing you as their intrepid ambassador to the sylphs. When you report the elder’s disappearance, that smile fades. If the elder were to fall into the hands of the tempered sylphs who serve Ramuh, it could plunge the Twelveswood into crisis. Vorsaile wastes no time, assuring you that his sharpest-eyed Serpents will be watching day and night, leaving no stone unturned in the search. Yet the Order of the Twin Adder cannot safeguard the forest alone. He asks you to ride out to Bentbranch Meadows in the Central Shroud, find Giah Molkoh, and deliver word that the Wood Wailers are needed to join the hunt for the missing elder. With new allies to call upon, you depart the city once more for the forest roads.</p>
      <p>At Bentbranch Meadows, you find Giah Molkoh amidst the bustle of chocobos and travelers. When you deliver the commander’s message, she listens intently, ears twitching as you speak the words “sylph elder” and “vanished.” The news clearly troubles her, but she quickly sets her jaw and reassures you that the Wood Wailers will not stand idle. Their eyes are hidden under every leaf and behind every branch, watching all who move beneath the canopy. If the elder is anywhere within the Black Shroud, she vows, the Wood Wailers will find him. With the Adders and the Wailers both committed to the search, you turn your steps southward, toward the tavern called Buscarron’s Druthers in the shadowed reaches of the South Shroud.</p>
      <p>At Buscarron’s Druthers, the warm smells of food and ale spill out into the open air as Buscarron himself calls out a hearty welcome, ready to offer you the finest grog and grub this side of the forest. When you explain you have no time to fill your belly and have instead come in search of news, his eyes narrow with interest. He has indeed heard talk of a sylph lurking in the area, though he cannot say whether it is the elder you seek. To most folk, the “woodland scamps” all look alike—short of painting one red and another blue, he jokes, few could tell one from another. Still, if you have the time, he suggests you stay a while and see what the gods have in store. Perhaps, simply by keeping your ears open and your feet planted here, you might stumble across the sylph elder yourself. With the forest’s hunters roused and Buscarron’s tavern as your new vantage point, you settle in to await whatever sign of the wandering elder the Twelveswood chooses to reveal.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    pageTitle:'ただよえる長老',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>シルフの仮宿で、コムシオはしょんぼりと葉っぱを垂らしながら、そっとあなたに許しを請います。長老さまのところへ案内する、と約束したはずなのに、今はその約束を果たすことができないのだ、と。長老さまはどこにも見当たらず、昨日いつものように森へ様子を見に出かけたきり、いまだ戻ってこないのだといいます。森歩きに慣れた長老さまでも、こんなに長く姿を消すことはなかった──その異変に、コムシオの声は不安で震えます。長老さまが消えたあたりには、バスカロンという歩くヒトの住処があり、彼なら何か知っているかもしれない。けれど、「この子たち」を信じない歩くヒトも多く、コムシオは自分ひとりでは話を聞いてもらえないかもしれないと怯えています。あなたはグリダニアから来た「優しいヒト」であり、グリダニアにはあなたのような優しいヒトたちがたくさんいるはずだ──コムシオはそう信じて、双蛇党に助けを求めてほしいと懇願します。長老さまが戻るまで「この子たち」は安全ではない、と必死に訴えるコムシオにうなずき、あなたは森を後にして、新市街の双蛇党：統合司令部へ向かいます。</p>
      <p>双蛇党本部でボルセル・ウロア大牙佐は、シルフ族との橋渡し役であるあなたを見つけると、頼もしい外交官の帰還だとばかりに笑顔で迎えます。ところが、あなたが長老さまの失踪を報告すると、その表情は途端に険しさを帯びます。もし長老さまがラムウに心を奪われた「触れられた子」たちの手に落ちれば、黒衣森全体を揺るがす危機となりかねない。ボルセルはすぐさま隊を動かすことを決め、目ざとい蛇頭の兵たちに昼夜を問わず捜索を行わせると約束します。森の隅々にまで目を光らせ、一石も見逃さぬつもりでいるのです。しかし、それでも双蛇党だけでこの森を守り切ることはできません。彼はあなたに、中央森林のベントブランチ牧場へ赴き、ギア・モルコーに木工騎士団の協力を求める旨を伝えてほしいと頼みます。新たな仲間の力を借りるべく、あなたは再び森への道をたどります。</p>
      <p>ベントブランチ牧場に着くと、ギア・モルコーはチョコボと人々で賑わう中に立っており、あなたの呼びかけに耳を傾けます。ボルセル大牙佐からの伝言だと聞くと、その表情は引き締まり、「シルフ族の長老が姿を消した」との言葉に真剣なまなざしを向けます。森を揺るがしかねない知らせではあるものの、ギア・モルコーはすぐに気持ちを切り替え、あなたに安心するよう告げます。木工騎士団は、森のあらゆる葉の下、枝の影にまで目を光らせており、黒衣森に足を踏み入れる者たちを常に見守っているのだと。もし長老さまが黒衣森のどこかにいるのなら、必ず見つけ出してみせる──そう力強く約束した彼女に礼を述べたあなたは、今度は南部森林へと進路を取り、酒房「バスカロンドラザーズ」を目指します。</p>
      <p>南部森林にある酒房「バスカロンドラザーズ」に足を踏み入れると、バスカロンの陽気な声と、食事や酒の香りがあなたを迎えます。この森で一番の飲み物と料理を出してやる、と胸を張る彼ですが、あなたが腹を満たしに来たわけではなく、知らせを求めて来たのだと告げると、興味深そうに眉を上げます。森のこのあたりでシルフ族の姿が噂になっていることは耳にしているものの、それがあなたの探す長老さまかどうかまでは断言できない。彼に言わせれば、あの「森のいたずら者」たちは、見慣れない者には皆同じに見えるもので、赤と青に塗り分けでもしない限り、見分けるのは難しいのだと苦笑します。それでも、時間に余裕があるのなら、ここで腰を落ち着けて「神々の思し召し」を待ってみるのも悪くない──そうバスカロンは提案します。酒場に集う者たちの噂話に耳を澄ませていれば、ふとした拍子に、長老さまの足跡が見つかるかもしれない、と。双蛇党と木工騎士団が森全体を見張り、あなたがこの酒場で耳と目を働かせることで、漂う長老の行方が、やがて森そのものから語られる日が来るかもしれない──あなたはそう信じて、この場所で次の兆しを待つことにするのでした。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> コムシオ　<small class="muted">黒衣森：東部森林 (X:21.9, Y:25.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="brotherly-love.html">クラクシオの決意</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 22～</div>

    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'巴斯卡隆的規矩',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Little Solace，Komuxio 葉片低垂，帶著愧疚飛到你面前，輕聲向你道歉。牠曾經向你保證，要帶你去見 elder one，卻在此刻無法履行承諾。現在 elder one 不在這裡，也不在任何地方。昨天 elder one 照往常一樣走進森林巡視，卻遲遲沒有回來──即便是再習慣穿梭樹海的人，也從未這麼久不見蹤影。這異樣讓 Komuxio 的聲音明顯發顫，他滿懷不安地請求你幫忙尋找。elder one 消失的附近，有一位名叫 Buscarron 的 walking one 開設的酒館，Komuxio 覺得那個人或許知道發生了什麼事。然而 walking ones 並不總是信任「these ones」，Komuxio 擔心自己上門也未必有人願意聽。你則是來自 Gridania 的「kind one」，而 Gridania 裡也住著許多像你一樣的 kind ones──他便懇求你回到 Gridania，向那裡的同伴求援。只要 elder one 還沒回來，「these ones」就無法真正安心。他這般央求之下，你點頭應允，離開樹海，前往 New Gridania 的 Adders’ Nest。</p>
      <p>在 Adders’ Nest，Vorsaile Heuloix 一眼認出你，笑著稱呼你為與 sylph 交涉的勇敢使者。只是當你說明 elder one 失蹤的消息時，他臉上的笑容瞬間收斂。若是 elder one 落入被 Ramuh 影響的 tempered sylph 手中，整座 Twelveswood 都可能因此陷入危機。Vorsaile 當場做出決定，保證會調動目光最銳利的 Serpents，日夜搜尋，不放過樹海中的任何一處角落。不過，就算如此，光靠 Order of the Twin Adder 也無法獨力守護整片森林。他請你再跑一趟 Central Shroud，到 Bentbranch Meadows 找 Giah Molkoh，把需要 Wood Wailers 一同投入搜救的消息轉達給她。有了新的援手可以依靠，你再一次踏出城門，沿著樹海小路前行。</p>
      <p>來到 Bentbranch Meadows，你在旅人與陸行鳥往來的喧囂中找到 Giah Molkoh。聽你說這是來自 Vorsaile 的口訊，她立刻收起閒談的神情，而在你提到「sylph elder」和「失蹤」時，她的耳朵明顯一震。雖然這消息讓她感到沉重，她卻很快恢復冷靜，反過來要你放心。Wood Wailers 的目光藏在每一片樹葉之下、每一根枝條之後，時時刻刻監視著在樹海中穿行的身影。只要 elder one 還在 Black Shroud 的範圍之內，她保證 Wood Wailers 一定會把人找出來。你向她致謝，接著把步伐轉往 South Shroud，朝著那間名為 Buscarron’s Druthers 的酒館走去。</p>
      <p>在 South Shroud 的 Buscarron’s Druthers，濃郁的酒香與食物氣味從門口撲面而來，Buscarron 本人也熱情地招呼你，說這裡有森林裡最棒的酒與料理。不過當你表示自己並非為了飽餐一頓而來，而是為了打聽消息，他便饒有興味地收起玩笑。最近確實有傳聞說，附近出沒著一名 sylph，但那是否就是你在找的 elder one，他也說不上來。在多數人眼裡，那些「woodland scamps」看起來都差不多──若不是把一個塗成紅色、另一個塗成藍色，恐怕誰也分不出誰是誰，他打趣地說。即便如此，他仍建議，如果你有時間，不妨在這裡多待一會兒，看看 gods 有什麼安排。只要在這裡坐下來，留心四周的對話與動向，說不定就能親自遇上那位 sylph elder。如今，Order of the Twin Adder 與 Wood Wailers 已在整片樹海中展開行動，而你則在 Buscarron’s Druthers 選了一處座位，讓自己的耳與眼都保持警覺，等待 Twelveswood 親自透露 elder one 下落的那一刻。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 科姆希奧　<small class="muted"> 黑衣森林東部林區 (X:21.9, Y:25.6)</small></div>
    </div>`,

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
