    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Wedge’s voice is tight with panic as he begs you not to give up. Biggs is still out there in the freezing cold—one step from succumbing, or being dragged back by the imperials—and Wedge can’t bear the thought of losing him after everything that’s already happened. He urges you to ask anyone in the tower for help, even if it’s only a hint of where else to search, because Biggs’s chances are slipping away by the moment.</p><p>At Monument Tower, you question those willing to listen, and Ignace considers your situation with sober practicality. If Biggs isn’t anywhere nearby—or around the Darkhold—then there’s a chance he tried to make for Whitebrim. The route would take you through Daniffen Pass, and even if there’s no guarantee your search will succeed, it’s better than standing still and worrying. Before you leave, he adds a small warning: the tower’s stairs are treacherous, and not long ago he nearly broke his neck taking a fall.</p><p>Before you can press the search much further, Yda rushes to you with urgent news—Biggs has been found, but he’s in trouble. Imperial soldiers are already on him, shouting that they will take him back dead or alive, and Biggs spits back defiance through the pain, daring them to come closer. Y’shtola greets your arrival without relief, only urgency: the situation is grave, and if you delay, Biggs will perish.</p><p>Battle erupts immediately. As the soldiers call for reinforcements, Yda throws herself into the fray with reckless gusto—only for Y’shtola to snap at her to stop provoking and start striking. Through the crush of enemies, Y’shtola orders you to stay close to Biggs while waves of attackers press in, until at last the last of them falls. Victory comes with exhaustion: even with the danger past, your companions can barely stand, and Biggs forces himself upright only through sheer will.</p><p>When the fighting finally ends, Biggs drags in ragged breaths and manages his thanks—another moment, and he would not have made it. Y’shtola’s judgment is immediate: he has been too long in the cold, and you must get him to shelter. With haste, she and Yda take him back to Monument Tower, promising that Cid will be overjoyed to see both Biggs and Wedge again.</p><p>Back at the tower, Wedge’s gratitude spills over as he thanks you—and everyone—again and again, emotion breaking through his words as he admits he truly thought he’d never see Biggs alive. Y’shtola quietly reminds you all that you are family, and Biggs, still shaken, says he owes you his life—just as you saved Wedge’s—debts he can barely count anymore. Then Cid arrives, stunned and elated, and the two assistants finally recount what happened: the raid on the Waking Sands, the sudden capture at gunpoint, and how the Garleans seemed to appear without leaving a trace through Horizon—proof, Y’shtola concludes, of powerful teleportation magicks like those used by the Ascians. Bound, blindfolded, and shipped to Castrum Centri, Biggs and Wedge were imprisoned while Minfilia and the others were taken elsewhere; later, when they learned they were being sent onward toward Garlemald, they sabotaged the ship’s altitude controls to force an emergency landing and escaped in the chaos. Cid laughs in disbelief, praises their resourcefulness, and thanks you for bringing them back—but insists the questions can wait. Minfilia and the others still need rescuing, and with Garlond Ironworks “back in business,” you all set out to give the imperials what for.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    langLabel:'日本語',
    pageTitle:'炉には炎を、回せ歯車',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ウェッジは切羽詰まった声で、どうか諦めないでほしいとあなたに訴える。ビッグスは凍える寒さの中に取り残され、このままでは命を落とすか、帝国兵に再び捕らえられてしまうかもしれない。誰でもいい、塔にいる者に聞いてほしい――手がかりだけでもいいから、急いでほしいのだと、彼は必死に頼み込む。</p><p>あなたが秘石の塔で聞き込みをすると、イグナスは状況を整理し、もしこの周辺やゼーメル要塞の近くで見つからないのなら、ホワイトブリム前哨地を目指した可能性があると言う。その道は聖ダナフェンの旅程を抜けることになる。成果を保証はできないが、手をこまねいて案じるよりはましだと、彼はあなたの幸運を祈る。そして最後に、塔の階段は危険だから気をつけるようにと付け加える――少し前に足を滑らせて転げ落ち、危うく首を折りかけたのだという。</p><p>その矢先、イダがあなたを呼び止める。ビッグスを見つけたが、ただごとではない――帝国兵が「生か死か、どちらでも連行する」と怒鳴り、ビッグスも痛みに耐えながら挑発して応じている。そこへヤ・シュトラがあなたの到着を確かめ、事態は深刻だと告げる。イダの言うとおり、手遅れになればビッグスは助からない。すぐに動け、と。</p><p>戦いは一気に激しくなる。帝国兵が増援を叫ぶ中、イダは勢いに任せて闘志を煽るが、ヤ・シュトラに「挑発より殴打を」とたしなめられる。敵の数に圧されかけるあなたたちに、ヤ・シュトラはビッグスのそばを離れないよう命じ、波のように押し寄せる兵を退けていく。</p><p>やがて最後の敵を倒しても、勝利の余韻はない。ヤ・シュトラもイダも力尽きかけ、ビッグスもまた、今ここで倒れるわけにはいかないと歯を食いしばる。寒さと消耗が身体を蝕み、立っているだけで限界が近いことがわかる。</p><p>戦闘が終わると、ビッグスは荒い息の合間に礼を述べる。あと少し遅れていたら、助からなかった――そう言い切る前に言葉が途切れる。ヤ・シュトラは彼が長時間冷気に晒されすぎたと判断し、すぐに身を寄せられる場所を確保すべきだと言う。秘石の塔へ戻ると決め、イダとともにビッグスを担いで急ぐ。シドも、ビッグスとウェッジの無事をきっと喜ぶだろうと、イダは屈託なく言う。</p><p>秘石の塔に戻ると、ウェッジはあなたと仲間たちに何度も礼を繰り返し、ついには涙を抑えきれなくなる。もう二度と会えないと思っていたのだと。ヤ・シュトラは、あなたたちは家族ではないかと静かに言い、ビッグスもまた命を救われたと告げる。そこへシドが駆けつけ、再会を喜びながら砂の家襲撃の顛末を問う。ビッグスとウェッジは、工房で突然銃を突きつけられ、拘束されたこと、そしてホライズンにも帝国軍の痕跡がなかったことから、ヤ・シュトラはアシエンの類の強力な転移魔法による奇襲だと結論づける。さらにふたりは目隠しされたまま飛空艇でカストルム・セントリへ運ばれ、同じ拘禁房に投げ込まれた一方で、ミンフィリアたちは別へ連れて行かれたと語る。その後、ガレマールへ向かう船に移されると知った彼らは、高度制御を破壊して不時着させ、混乱に乗じて脱出したのだという。シドは半信半疑で笑いながらもあなたに深く礼を述べ、問いの答えは後回しだと言う――ミンフィリアたちの救出が先だ。こうしてガーロンド・アイアンワークスの再始動を宣言し、あなたたちは帝国軍に一矢報いるため動き出す。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ウェッジ <small class="muted">（クルザス中央高地, Ｘ:7.4, Ｙ:28.9）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="monumental-hopes.html">ビッグスの捜索</a></div><div class="row">すべて（リミテッドジョブを除く）Ｌｖ４４～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="come-into-my-castrum.html">モードゥナに集う猛者たち</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'重振旗鼓',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Wedge 的聲音急得發顫，他求你別放棄。Biggs 還在冰冷荒野裡——再拖下去，不是被凍死，就是又被 Garlean 帝國軍抓回去。Wedge 說塔裡一定有人能幫上忙，哪怕只是告訴你接下來該往哪裡找也好；他要你替他開口、替他去問任何願意聽的人，因為 Biggs 活下去的機會正在一分一秒變小。</p><p>你在 Monument Tower 四處打聽，Ignace 聽完後冷靜分析：如果 Biggs 不在這附近、也不在 Dzemael Darkhold 一帶，那就有可能是往 Whitebrim 去了。要抵達那裡，你得穿過 Daniffen Pass。就算不能保證一定找得到，總比站著不動、徒增焦慮來得好；他祝你順利，還提醒你上塔的樓梯很滑——不久前他才差點失足摔下去，幾乎把脖子摔斷。</p><p>你還沒走遠，Yda 就衝來叫住你：Biggs 找到了，但情況很糟。Garlean 士兵吼著要把他「死的也好、活的也好」帶回去；Biggs 則硬撐著回嗆，叫那些「鐵皮腦袋」有種就過來。Y’shtola 也在場，她看到你出現，語氣直接而沉重——事態危急，再拖下去 Biggs 會死；現在就得動手。</p><p>戰鬥立刻爆發。Garlean 士兵呼叫增援，Yda 反而越打越亢奮，喊著人越多越好；Y’shtola 立刻喝止她少說廢話、專心把敵人打倒。敵人一波接一波湧上來時，Y’shtola 要你緊貼著 Biggs，不要讓他再被逼到無路可退。你們終於清掉最後一批敵人，卻也幾乎被消耗到站不穩。</p><p>勝利沒有喜悅，只有疲憊。Y’shtola 連話都快說不完整，Yda 也撐不住想坐下休息；Biggs 更是咬著牙低吼——偏偏就是現在不能倒下。寒意與傷勢把他拖向極限，你們再清楚不過，他只是靠意志硬撐著。</p><p>戰鬥結束後，Biggs 喘得說不成句，仍努力向你道謝——再晚一點點，他就撐不過去了。Y’shtola 立刻判斷他在寒風裡待得太久，必須先找地方避寒。她與 Yda 迅速把 Biggs 帶回 Monument Tower，Yda 一邊走一邊說 Cid 一定會為 Biggs 和 Wedge 的平安開心，還笑著說她最喜歡這種重逢。</p><p>回到 Monument Tower，Wedge 幾乎是哽咽著向你與所有人道謝，坦白說他以為自己再也見不到 Biggs 了。Y’shtola 則平靜地說：你們不就是一家人嗎。Biggs 也承認他欠你們一條命，甚至連你救過 Wedge 的次數都快數不清。這時 Cid 趕到，激動地抱住兩人，追問 Waking Sands 襲擊那天究竟發生了什麼。Biggs 與 Wedge 說，敵人毫無預警闖入工房，用槍口逼著他們就範；Yda 不解 Garlean 行動為何那麼快，Y’shtola 則補上關鍵：她回到 Waking Sands 的屍骸遍地時，也在 Horizon 看不出任何帝國軍行軍痕跡，因此 Garleans 不可能是走陸路或空路，而是用了強力的傳送魔法——那種 Ascians（暗中操控局勢的神秘勢力）慣用的手段。之後兩人被綁著、蒙著眼丟進飛空艇貨艙，醒來已在 Castrum Centri；他們被押進主建築，與 Biggs 同囚一室，而 Minfilia 和其他人被帶往別處，自此再無消息。後來帝國軍又要把他們送往 Garlemald，兩人明白一旦被帶回去就別想再出來，於是冒險破壞飛空艇的高度控制，逼它緊急降落，趁混亂逃脫。Cid 聽得又驚又笑，說這多半是 Biggs 的手筆，並再次向你道謝——但他也提醒你，疑問可以先放著，Minfilia 和其他人還等著被救。於是他宣告 Garlond Ironworks 重新開張，你們也準備再次迎向 Garlean 帝國軍。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
