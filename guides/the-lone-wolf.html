    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Yaana tells you with full confidence that the Howling Blade is a worthy champion, but that you have already cut through every rival set before you, and she believes you will do the same again. She then turns to the matter at hand and introduces your opponent properly. The Howling Blade, she says, is the lone wolf of the Arcadion. Before he ever became a fighter, he was a hunter renowned for unmatched skill with the blade, and in time word of that talent reached the president, who brought him into Ascension Arcadia.</p><p>Because of his striking looks and polished presence, he was embraced at once as a beloved babyface fighter. In the ring, he dazzles the crowd with a fantastical arena and a blade of pulsating light. Yet beneath that spectacle lies deadly force. By drawing on the soul of Fenrir, the legendary wolf, he unleashes slashes of terrifying speed and power. Yaana warns you that you will have to stay sharp at every moment, then urges you to step into the wolf’s den and prove that you are no helpless prey. She adds that if Eutrope were able to watch, she is certain Eutrope would be cheering for you as well.</p><p>You do exactly that, and when you return victorious, Yaana can barely contain her joy. She tells you that you truly did it, and the Howling Blade himself admits that you were simply too strong for him. True to his word, he says he will retire from fighting. Yet in the same breath, he confesses that though he has escaped immediate death, he feels he has also lost his reason for living. Without the ring, he no longer knows what he is meant to do with himself.</p><p>When you tell him there are still battles worth fighting, and that he should stand with you against the president, he does not deny the truth of your words. He says the president has sacrificed countless fighters for entertainment and all but killed his friend, and he knows he should be stopped. And yet he cannot let go of what he owes. As he sees it, everything he has is because of the president, and that is why he and the others went on fighting even when it meant dying from their illness. Yaana explodes at that, refusing to accept that Brute Bomber went willingly to his death and telling him that people still care for him, even if he has stopped caring for himself. Then she reveals the truth he never understood: Eutrope fought alone because she was trying to save him. She went after your soul because she believed it was the only way she could remain with him, when he could imagine no life beyond the Arcadion.</p><p>The revelation leaves him shaken. He realizes that after he and Eutrope began showing symptoms of psychonekrosis, she vanished without a word, and though he searched desperately, he found no trace of her. When she later reappeared and challenged you, he had assumed her symptoms had simply faded and that she had chosen to fight again. Yaana cuts through that illusion with brutal clarity. She tells him he has been using his debt to the president as an excuse to avoid facing the bitter truth, and in doing so he lost sight of those who mattered most. At last he admits it. His choices were driven by fear—fear that without the ring he would no longer be the Howling Blade. That same fear kept him from trying to save his friend, even though he knew where that path would lead. Broken by the weight of it, he thanks you for bringing him back to his senses and vows to help stop the president. Then he casts aside the name of the Howling Blade and says that from now on, he will simply be Retsarra.</p><p>Together, you return to Tritails Training, where Retsarra arrives carrying several small cats and asks if they can be looked after, since pets are forbidden where he lives. Yaana gladly agrees, saying Neyuni has wanted to adopt a cat for some time, and suggests that Neyuni must be upstairs with Eutrope. Retsarra quietly asks if he may come as well, and Yaana tells him of course he can. But the moment she goes to check on them, everything changes. Neyuni and Eutrope are gone. Neyuni would never have taken Eutrope outside in her condition, and her terminal has been left behind. Before panic can settle, the president’s voice rings out. He praises you for the excitement you have brought to Ascension Arcadia, but says he cannot allow anyone to rewrite his script. As a safeguard, he has taken Eutrope and Neyuni into his care. Metem, after some pressure, told him that you seek a cure for psychonekrosis, and the president claims he knows where to find the stimulant called the Drop of Life. In return, he demands two things: you must continue fighting in the Arcadion, and the others must never interfere with his script again. If you become grand champion, he says, the soul repository will be opened to you, and he will reveal the location of the Drop of Life as well. With that, he turns your path toward the heavyweight division.</p><p>After the message ends, the truth settles heavily over all of you. Retsarra says the president was one step ahead all along, and that a single misstep could bring harm to Eutrope and Neyuni. Yaana, struggling to steady herself, says there is no choice now but to place her hopes in you. When you promise you will not let them down, she thanks you and swears to continue supporting you as your second. Retsarra says he will stand with you too, and that he will never again turn away from the president’s depravity or allow someone precious to be taken from him. Later, Yaana admits that she is sick with worry for her sisters, but she also knows that reckless action would only make matters worse. Until the heavyweight matches begin, she asks you to prepare in whatever way you can—by training, by resting, by readying yourself for enemies fiercer than any before. Much now rests on your shoulders, but for the moment, you are the only hope any of them have.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'JP',
    pageTitle:'孤高の狼',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ヤーナは、ハウリングブレードはたしかに立派な王者だが、あなたはこれまで何度も強敵を切り伏せてきたのだから、今回もきっと勝てるとまっすぐに言い切る。そしてあらためて、次の相手について語り始める。ハウリングブレード――それが、アーカディアの孤狼と呼ばれる男だ。闘士になる以前の彼は、比類なき剣技を誇る狩人として知られており、その噂はやがて社長の耳にまで届き、アセンション・アーカディアへと招かれたのだという。</p><p>端正な容姿にも恵まれた彼は、たちまち人気者のベビーフェイスとして迎えられた。幻想的なリングと脈打つ光の剣で観客を魅了するその戦いぶりは、まさに華やかだ。だが、その美しさの裏には凶暴な力が潜んでいる。伝説の狼フェンリルの獣魂を借りることで、彼は凄まじい速さと威力を備えた斬撃を放つのだ。ヤーナは、一瞬たりとも気を抜いてはならないと念を押し、狼の巣へ踏み込み、自分がただの獲物ではないと見せつけてこいとあなたを送り出す。そして、もしユートロープがここで見ていられたなら、きっと彼女もあなたに声援を送っていたはずだと静かに付け加える。</p><p>あなたはその期待に応え、見事に勝利して戻ってくる。ヤーナは歓喜に満ちた声であなたを迎え、本当にやり遂げたのだと何度も喜ぶ。一方、ハウリングブレードもまた、あなたがあまりにも強かったと敗北を認める。そして自らの言葉どおり、闘士を引退すると告げる。だがその一方で、差し迫った死からは逃れたものの、生きる目的まで失ってしまったようだと打ち明ける。リングを離れた自分が、これから何を支えにして生きていけばいいのか、それがまるでわからないのだという。</p><p>そこであなたが、まだ戦うべき戦いは残っている、社長に立ち向かうために力を貸してほしいと告げると、彼はその言葉自体は否定しない。社長が娯楽のために多くの闘士を犠牲にし、友をほとんど殺したも同然であることも理解しているし、止めるべきだともわかっている。それでもなお、彼には捨てきれない思いがあった。自分たちはすべてを社長から与えられたのだという思いだ。だからこそ、病で命を落とすとわかっていても、それでも自ら望んで戦い続けたのだと彼は言う。だがヤーナは激しくそれを否定する。ブルートボンバーが本当に望んで死へ向かったなどとは思えないし、彼自身が自分を大切にできなくなっていても、それでも彼を大事に思う者たちはいるのだと。そしてついに、これまで彼が見ようとしなかった事実を突きつける。ユートロープは、彼を救うためにたったひとりで戦っていたのだ。彼がアーカディアの外に生きる道を見いだせないからこそ、そばにいるための唯一の手段だと信じて、あなたの魂を狙ったのだと。</p><p>その言葉に、彼は大きく揺らぐ。自分とユートロープに魂蝕症の症状が現れた直後、彼女は何も告げずに姿を消したこと。その後、必死に探しても行方はわからず、のちに突然現れてあなたへ挑んだときには、症状が治まり、戦いに戻る決意をしたのだと思い込んでいたこと――そのすべてが、ヤーナの言葉によって崩れていく。ヤーナは、彼が社長への恩義を言い訳にして、苦い現実から目を背け続けてきたのだと断じる。そのせいで、本当に大切な相手の思いさえ見失ってしまったのだと。彼はついに認める。自分は、リングを失えばハウリングブレードでいられなくなることが怖かったのだ。その恐れゆえに、友が死へ向かうと知っていながら止めることもできなかった。深い悔恨のなかで、彼は我に返らせてくれたことに感謝し、これ以上社長の害を許さないために力を貸すと誓う。そして、もはやハウリングブレードではない、これからはただのレトサラだと名乗る。</p><p>一行はそのままトライテールズ・トレーニングへ戻るが、レトサラは自分の住まいではペットが禁じられているため、この子たちを預かってほしいと、小さな猫たちを連れてくる。ヤーナは快く引き受け、ネユニもちょうど猫を飼いたがっていたのだと言う。そして、ネユニはきっと上でユートロープと一緒にいるだろうと話し、自分が様子を見てくると階上へ向かう。レトサラも一緒に行ってよいかと静かに願い、ヤーナはもちろんだと応じる。だが次の瞬間、事態は一変する。ネユニもユートロープもいなくなっていた。今のユートロープを外へ連れ出すはずがないネユニの端末だけが、ベッドの上に取り残されている。その異変に息を呑む間もなく、社長の声が響き渡る。あなたがアセンション・アーカディアにもたらした熱狂は見事だったが、自分の筋書きを書き換える者は許さない。さらなる逸脱を防ぐため、ユートロープとネユニは預かったのだという。メテムから、あなたたちが魂蝕症の治療法を求めていることも聞き出したらしい。そして社長は、「ドロップ・オブ・ライフ」と呼ばれる刺激薬の在り処を自分は知っていると告げる。条件はふたつ。あなたがこれからもアーカディアで戦い続けること、そして周囲の者たちが二度と筋書きに干渉しないことだ。もしあなたがグランドチャンピオンになれば、魂の保管庫を自由に使わせ、「ドロップ・オブ・ライフ」の場所も教えると約束し、社長は次の舞台をヘビー級だと示す。</p><p>通信が途切れると、その意味が重くのしかかる。社長は最初から一歩先を読んでいたのだとレトサラは言い、下手に動けばユートロープとネユニが危険に晒されると警告する。ヤーナは気丈に振る舞おうとしながらも、今はあなたに望みを託すしかないと絞り出す。あなたが決して期待を裏切らないと答えると、彼女は礼を述べ、これからもセコンドとして全力で支えると誓う。レトサラもまた、自分も同じだと言い、社長の歪んだ行いから二度と目を逸らさない、そして二度と大切な者を奪わせはしないと断言する。その後、ヤーナは妹たちのことが気がかりでたまらないと本音を漏らしながらも、今は軽率に動くべきときではないことを理解している。だからこそ、ヘビー級の試合が始まるまでのあいだ、あなたにはあなたのやり方で備えてほしいと頼む。鍛錬でも休息でもいい。これまで以上に苛烈な相手と戦うため、万全の状態で次の戦いに臨んでほしい。多くを背負わせてしまうことを詫びながらも、今の彼女たちにとって頼れるのはあなたしかいないのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> ヤーナ <small class="muted">(控室, X:6.1, Y:5.9)</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="feral-fandom.html">アルカディアのファンたち</a></div></div>`
  },

    story:`<div class="clamp" data-collapsed="true"><p>Yaana 告訴你，Howling Blade 的確是一位值得敬重的冠軍，但你一路走來，已經一次又一次斬開擋在面前的對手，所以她深信這一次也不會有例外。接著，她把話題拉回眼前，開始仔細向你說明這位即將面對的對手。Howling Blade，是 Arcadion 之中有名的孤狼。在成為闘士之前，他原本是一名獵人，並以出類拔萃的劍術聞名。到了最後，連總裁都聽見了他的名聲，才將他招入 Ascension Arcadia。</p><p>憑藉俊秀端正的外表，他一進 Arcadion 就被包裝成極受歡迎的正派闘士，而他那座宛如幻境般的擂台，以及手中脈動著光芒的長劍，也的確總能讓觀眾看得目不轉睛。可那份美麗之下，藏著的是不容小看的危險。藉由 Fenrir 這頭傳說之狼的 feral soul（用於戰鬥變身的獸魂），他能施展出又快又狠的斬擊。Yaana 提醒你，這一戰你必須從頭到尾都保持警覺，不能有片刻鬆懈。最後，她要你親自踏進這頭狼的巢穴，讓他知道，你絕不是只能任人撕裂的獵物。她還低聲補上一句，若 Eutrope 此刻也能在這裡看著，她一定也會替你加油。</p><p>而你也的確贏了。當你回到 Greenroom 時，Yaana 幾乎壓不住那股喜悅，連聲說你真的做到了，還說你自己都不知道自己究竟有多厲害。至於 Howling Blade，也乾脆承認是你太強了。既然他曾答應過，若敗北便會退出戰鬥，那他就會遵守承諾，從闘士的身份引退。可說出這句話之後，他的神情卻立刻黯了下來。他承認，自己雖然逃過了近在眼前的死亡，卻也像是同時失去了活著的目的。離開擂台之後，他竟完全不知道，自己究竟還能成為什麼樣的人。</p><p>當你告訴他，仍然還有值得去打的戰鬥，並要他和你們一起對抗總裁時，他並沒有真正反駁你的話。他明白，總裁為了娛樂犧牲了無數闘士，幾乎等同親手害死了自己的朋友，這種人理當被阻止。可即便如此，他仍無法拋下自己心中的那份執念。因為在他看來，他所擁有的一切都是總裁給的；也正因如此，即使明知繼續戰鬥下去終究會死於 psychonekrosis（過度使用 feral soul 的人可能罹患的致命疾病，會逐步侵蝕靈魂與身體），他和其他人也依舊甘願留在那條路上。可 Yaana 聽到這裡，立刻忍不住怒斥他愚蠢。她不肯接受 Brute Bomber 是心甘情願走向死亡，也不容許他把自己說得像是沒有任何人在乎。她更直接把他一直沒有看懂的事說了出來——Eutrope 一直以來都是為了救他，才會孤身一人走到那一步。她之所以去奪取你的靈魂，是因為她認定，那是唯一能讓她繼續陪在他身邊的方法，因為他始終看不見 Arcadion 之外的世界。</p><p>這番話讓他徹底動搖了。他終於回想起，當自己和 Eutrope 都開始出現 psychonekrosis 的徵兆後，她便一聲不響地消失了。那之後，他怎麼找都找不到她的下落；等到後來她突然現身，並向你發起挑戰時，他還以為她的症狀已經減輕，所以才決定重新回到擂台。Yaana 卻毫不留情地把真相剖開給他看。她說，他一直把對總裁的虧欠當成藉口，只是為了逃避那個難以下嚥的現實；而在這樣的逃避裡，他也一步一步失去了對最重要之人的理解。到最後，他終於承認，自己的每一個選擇，其實都源於恐懼——他害怕一旦失去擂台，自己就不再是 Howling Blade。也正因為這份恐懼，他明明知道朋友正在走向死亡，卻還是什麼都沒做。懊悔終於壓垮了他，他低聲向 Hector 道歉，承認自己本該像你們一樣試著去救他。隨後，他真心向你們道謝，說是你們讓他終於清醒過來，而總裁已經造成太多傷害，從今以後，他會幫你們一起阻止他。當 Yaana 為此感到振奮時，他也親手放下了 Howling Blade 這個名字，說從現在開始，世上不再有 Howling Blade，只有 Retsarra。</p><p>你們一行人回到 Tritails Training 時，Retsarra 帶來了幾隻小貓，拜託你們代為照顧，因為他住的地方不准養寵物。Yaana 很快答應了下來，還說 Neyuni 其實早就很想養一隻貓。她接著猜想，Neyuni 應該正和 Eutrope 一起待在樓上，便打算親自上去看看。Retsarra 遲疑著問，自己能不能也一起去；Yaana 當然沒有拒絕，畢竟他和 Eutrope 之間，想必還有太多話要補上。可就在下一刻，情況驟然翻轉——Neyuni 和 Eutrope 都不見了。以 Eutrope 現在的身體狀況來看，Neyuni 不可能帶她離開，甚至連 Neyuni 的終端裝置都還被留在床上。還沒等這份不祥真正落下，總裁的聲音就透過通訊傳了過來。他先是用一種冷淡又從容的口吻，稱讚你為 Ascension Arcadia 帶來了足夠令人興奮的演出，但也隨即表示，他不可能容許任何人改寫自己的劇本。於是，為了防止未來再出現偏差，他已經把 Eutrope 和 Neyuni 接到自己手中。Metem 在他的逼問之下，已經把你們想治好 psychonekrosis 的事說了出去，而他也正好知道你們在尋找的那種刺激劑在何處——它名為「Drop of Life」。他對你們提出的條件只有兩個：你必須繼續在 Arcadion 裡戰鬥，而其他人則不得再插手他的劇本。若你能成為 grand champion，他就會開放靈魂儲藏庫給你使用，甚至連 Drop of Life 的所在都會一併告訴你。說完這些之後，他便把一切都推向了下一個舞台——heavyweight 分級。</p><p>當那道聲音終於消失後，現實也徹底壓了下來。Retsarra 低聲說，總裁顯然始終比他們快了一步，只要一個錯誤舉動，就可能讓 Eutrope 和 Neyuni 遭到傷害。Yaana 雖然強撐著自己，卻也只能承認，如今她們除了把希望寄託在你身上之外，已經沒有別的辦法。當你告訴她你不會讓她失望時，她真心向你道謝，並說自己會繼續以 second（協助格鬥士蒐集對手情報、提供訓練建議與場邊支援的人）的身分全力支援你。Retsarra 也接著表明，他同樣會和你站在一起，絕不再對總裁那扭曲而卑劣的所作所為視而不見，也絕不再讓任何重要的人從自己面前被奪走。之後，Yaana 雖然坦白自己其實擔心得快要發瘋，滿腦子都是 Neyuni 和 Eutrope 的安危，但她也明白，現在根本不是魯莽行動的時候。正因如此，在 heavyweight 分級的比賽開始之前，她希望你能用自己的方式做好萬全準備——不管是鍛鍊技術，還是好好休息恢復體力都可以。因為你接下來要面對的敵人，將比之前任何一個都更加兇狠；而如今，所有人的希望，也都只能先壓在你的肩上。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Yaana <small class="muted">(控室, X:6.1, Y:5.9)</small></div></div>`,

  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
