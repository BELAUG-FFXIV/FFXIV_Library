  EN:{

    pageTitle:'What Poor People Think',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Back at Camp Drybone, Isembard folds his arms in thought before suggesting a new angle. If the Amalj’aa alone cannot explain the disappearances, then perhaps the answer lies among the commonfolk themselves. He prays it is not so, but proposes that you turn an eye to the people of Drybone and the surrounding area. To that end, he tells you of a merchant named Ungust, born in Drybone and raised in the Golden Bazaar—a rough sort by reputation, yet someone who knows the locals better than anyone. Isembard wagers you will find him at the inn, drinking away whatever coin he earned that day. Knowing Ungust is unlikely to speak with you unprompted, he hastily pens a note of introduction and presses it into your hand, asking you to show it to the man on his behalf.</p>
      <p>You follow his lead and seek out Ungust at the inn in Camp Drybone. When you approach, the merchant belches loudly and squints at you, then suddenly recognizes your face. With a mixture of irritation and surprise, he calls you that “bloody adventurer” who once threatened him back in Ul’dah, and demands to know what you want now. When you present Isembard’s note, he reads it aloud between belches and hiccups, mocking the polite tone—“Dear friend… Missing people… Please help… Yours, Isembard.” Only then does he bother to answer. Folk around here, he says, are wary to the extreme; they will bolt at the slightest provocation, even if you merely walk too close. He boasts that he once played them all for fools and coaxed hard labor out of them, but claims that now they are more timid than ever with all the recent disappearances. If you do not believe him, he sneers, you can go speak with them yourself.</p>
      <p>Taking him at his word, you step back out among the commonfolk of Camp Drybone. When you approach a ragged pauper, the man recoils in terror, stammering that he does not know anything and begging you not to kill him. Another vagrant, his eyes hardened by resentment, refuses to speak of anything except to curse whoever—or whatever—has been feeding on lowborn folk, wishing that Thal take them. A hungry beggar, too cowed even to look you in the eye, only pleads for you to leave him alone. One after another, those you try to question shrink back, more afraid of drawing attention to themselves than of remaining ignorant, and you find yourself with little more than proof of the fear that has taken hold of the camp.</p>
      <p>When you return to Ungust and recount what you have seen, he lets out another hiccup and smirks as if he has been vindicated. Just as he told you, the whole lot of them are terrified, too spooked by the disappearances to trust anyone. He admits there has been talk of people being abducted, but he dismisses the rumors with a shrug, insisting that they have probably just packed up and moved on to someplace better. After all, he remarks, this dusty corner of Thanalan is hardly Costa del Sol. With that, he waves you off, clearly uninterested in doing anything more to help.</p>
      <p>You take your findings back to Isembard, who greets you with a weary welcome and asks if you have learned anything of note. When you explain how Ungust treated the matter and describe the commoners’ overwhelming fear, Isembard sighs, saying he should have expected as much from that particular merchant. Still, your report sets his thoughts turning in another direction. The commonfolk, he notes, are nothing if not fervent in their faith. If they are too afraid to speak openly to outsiders, they might at least confide in the gods they so earnestly worship. And if so, perhaps the clergy who serve at the local church have heard something of use. With this new lead in mind, he suggests that your next step may be to seek answers from the religious order that tends to the people’s prayers.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">

  JP:{
    langLabel:'日本語',
    pageTitle:'貧しき者の考え',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>キャンプ・ドライボーンに戻ると、イセムバードは腕を組み、しばし思案したのち、新たな切り口を口にする。アマルジャ族だけでは、この行方不明事件のすべてを説明しきれないのだとすれば、答えはむしろ「この地に暮らす人々」そのものの中に潜んでいるのかもしれない──そうでないことを祈りつつも、彼は庶民に目を向けるべきだと提案する。その手がかりとして、イセムバードはアングストという名の行商人を紹介する。ドライボーンで生まれ、ゴールドバザーで育った男で、素行はあまり誉められたものではないが、この辺りの住人のことを誰よりもよく知る人物だというのだ。今ごろは宿屋で、稼いだギルを酒に変えているに違いないと苦笑しつつ、イセムバードは急いで紹介状を書きしたためる。そのままでは、アングストがあなたの話に耳を貸そうとしないだろうと、手紙を託して彼に会いに行ってほしいと頼むのだった。</p>
      <p>あなたはキャンプ・ドライボーンの宿屋へ向かい、イセムバードの言葉どおりアングストの姿を見つける。声をかけると、彼は盛大にげっぷをしながらあなたを見上げ、やがて顔をしかめた。彼の記憶にも、あなたの姿ははっきりと刻まれているらしい。「ウルダハで自分を脅したあの冒険者」──そう呼び捨てにしながら、今度は何の用だと吐き捨てるように言葉を投げつけてくる。そこであなたがイセムバードの手紙を差し出すと、アングストはげっぷやしゃっくりを交えながら、わざとらしく読み上げる。「親愛なる友へ……行方不明者……助力を乞う……敬具、イセムバード」と。その調子そのままに、ようやく彼はこの地の状況について語り始める。この辺りの連中は、とにかく用心深く、近くを通りかかっただけで尻尾を巻いて逃げ出すような臆病者ばかりだと豪語するのだ。かつて自分は、そんな連中をうまく言いくるめて、きつい労働をさせてやったこともある──しかし、今では行方不明事件が続いたせいで、前にも増して怯えきっているのだと続ける。信じられないなら、自分で話を聞いて回ってみるがいい、とアングストは鼻で笑うのだった。</p>
      <p>そこであなたは宿屋を離れ、キャンプ・ドライボーンに暮らす人々へ直接声をかけていく。みすぼらしい身なりの男に近づけば、彼は青ざめた顔で飛びのき、「自分は何も知らない、本当に何も知らないから、どうか命だけは助けてくれ」と必死に訴える。別の浮浪者は、目に憎しみを宿したまま、「俺が言えるのはひとつだけだ。俺たちのような低き民を食い物にしているやつらに、サルもタルも一緒に連れていかれちまえ」と、姿なき何者かを呪う言葉しか口にしない。腹を空かせた乞食もまた、あなたを直視することなく、「お願いだから、自分のことは放っておいてくれ」と震える声で繰り返すばかりだ。誰に話しかけても、返ってくるのは恐怖と警戒に塗りつぶされた反応ばかりで、事件の核心に近づくどころか、キャンプ全体を覆う怯えの深さだけが、いっそうはっきりと浮かび上がってくる。</p>
      <p>その報告を携えて再びアングストのもとへ戻ると、彼はひとつしゃっくりを漏らし、得意げな笑みを浮かべる。「ほらな、言ったとおりだろう？」──彼曰く、皆が行方不明事件におびえきっているのは確かだが、それだけの話だという。誘拐されているという噂も耳にはしているものの、彼は肩をすくめ、「どうせどこかマシな場所に引っ越しただけさ」と言い放つ。この辺りがコスタ・デル・ソルのような楽園とは程遠いことくらい、誰だってわかっているだろう、と皮肉めいた冗談まで添えながら、さらに協力する気など毛頭ない様子であなたを追い払うのだった。</p>
      <p>そしてあなたは、得られたわずかな情報を携えてイセムバードのもとへ戻る。「おかえりなさい。何か有力な手がかりは得られましたか？」と出迎えた彼に、あなたはアングストの素行と、住民たちの極度の怯えぶりをありのまま伝える。イセムバードは、小さくため息をつきながら、「アングストなら、その程度だろうと思っていました」と苦笑を浮かべる。しかし、あなたの報告は、彼に別の可能性を考えさせるきっかけにもなったようだ。この辺りの庶民は、信心深さだけは誰にも引けを取らない。もし外部の者であるあなたに心を開けないのだとすれば、彼らはせめて、自分たちの神々には本音を打ち明けているのではないだろうか。そうであれば、人々の祈りを日々聞き届けている聖職者たちこそが、何か有益な情報を握っているかもしれない──イセムバードはそう結論づけ、この先は教会の聖職者にあたってみるべきだと、次なる一手を示すのだった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> イセムバード <small class="muted">東ザナラーン：キャンプ・ドライボーン (X:13.9, Y:23.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="unsolved-mystery.html">干からびた骨</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 18～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="a-proper-burial.html">すがりし光は</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'窮人的想法',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>回到 Camp Drybone 之後，Isembard 再次沉吟片刻，提出了新的方向。如果 Amalj’aa 一族無法單獨解釋所有的失蹤案件，那麼答案也許就藏在「這裡生活的人們」之中。他一邊祈禱真相不是如此，一邊建議你將視線轉向在地的平民百姓。為此，他提到一個名叫 Ungust 的商人──出生於 Drybone，在 Golden Bazaar 長大，名聲並不多麼體面，卻非常熟悉這一帶的人情世事。Isembard 推測，這個人現在八成又在旅館裡，把一天賺來的錢都灌進酒杯裡。由於 Ungust 不太可能願意乖乖配合，他當場寫了一封簡短的字條交給你，請你轉交給那個男人，免得對方連話都不肯聽你說。</p>
      <p>你依言前往 Camp Drybone 的旅館，很快就找到了 Ungust。當你上前搭話時，他先是大大地打了個嗝，抬頭打量了你一眼，接著立刻變了臉色，認出你正是之前在 Ul’dah 把他嚇得不輕的那名冒險者。他滿嘴不耐地咒罵著七重地獄，質問你這次又想做什麼。當你拿出 Isembard 的字條時，他一邊打嗝一邊半念半嘲諷地讀了出來：「親愛的朋友……失蹤的人……請幫幫忙……此致 Isembard。」讀完之後，他才懶洋洋地開始解釋這裡的情況。他說，這附近的人全都戒心極重，只要你稍微靠近一點，就會嚇得掉頭就跑。他還自豪地提起，自己過去曾把這些人當傻子哄騙，硬是從他們身上榨出不少勞力。如今連續發生失蹤事件，大家比以前更膽小，誰也不願多說一句話。如果你不信，就自己去問問看──Ungust 嗤之以鼻地這麼丟下一句，把你往外一推。</p>
      <p>於是，你離開旅館，開始直接向 Camp Drybone 的平民搭話。當你走近一名衣衫襤褸的男子時，他嚇得整個人往後縮，結結巴巴地說自己什麼都不知道，求你千萬不要殺他。另一個落魄的流浪漢則眼神陰鬱，拒絕回答任何問題，只悶聲說出一句詛咒：「願 Thal 把那個把低階民當成食物的傢伙一起帶走。」至於那名飢腸轆轆的乞丐，連抬頭看你一眼都不敢，只是一再哀求你放過他，別再來打擾。你一路問下來，得到的不是線索，而是層層堆疊的恐懼──所有人都被嚇得縮回自己的殼裡，寧可一字不提，也不願讓自己成為下一個被盯上的目標。</p>
      <p>帶著這些零散的回應，你再次回到 Ungust 身邊說明情況。他打了個酒嗝，露出一副「早就這樣」的得意表情，說這不就跟他先前講的一樣嗎，整個營地的人都被嚇破了膽。他承認最近確實有「被綁走」的傳聞，不過在他看來，那些人多半只是自己搬去別的地方，想找個好過一點的環境而已。這裡可不是什麼 Costa del Sol，他冷冷丟下這句話，顯然打從心底不打算再為這件事多費力氣。</p>
      <p>最後，你回到 Isembard 面前，向他回報這一連串的經過。他向你道了聲歡迎，隨即詢問你是否打聽到什麼重要線索。聽完你描述 Ungust 的態度，以及在地居民那幾乎到了崩潰邊緣的恐懼反應之後，Isembard 輕輕嘆氣，表示以 Ungust 的為人，會是這種反應也不意外。不過，你帶回來的話語，讓他想到另一個可能性。這裡的庶民雖然膽小，但信仰卻是格外虔誠。如果他們不敢對外人吐露實情，那麼至少可能會在向神祈禱時說出心底話。既然如此，長期聆聽他們祈禱、與信徒打交道的神職人員，很可能掌握著某些關鍵情報。Isembard 因此判斷，接下來或許該把矛頭轉向當地的教會與神職者，從他們口中尋找新的線索。</p>
    </div>

};

const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
