    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Yaana tells you that there will be a brief pause before your next bout, because the fighter who should have stood across from you was originally meant to be Wicked Thunder—Eutrope herself. For reasons you know too well, that is no longer possible, and a replacement has yet to be decided. With nothing more to do for the moment, she leads you back toward the gym, hoping that perhaps Retsarra has made progress in finding a way to rescue her sisters.</p><p>On the way, you come across a tearful youth who can barely force the words out: the gym has been wrecked. When you arrive, the sight waiting inside stops Yaana cold. The place has been trashed, and unfamiliar voices greet you from within as though they have every right to be there. The culprits reveal themselves as the Xtremes, the tag team that has been making waves in the Arcadion. Metem appears as well, turning even this intrusion into a spectacle as he wonders aloud whether these two might be your next opponents. Deep Blue smugly insists that it should be both of them, because they never work apart, and claims they will tag in and out so that it remains fair. Yaana immediately calls out the lie, saying everyone knows they would break the rules and come at you together. Red Hot nearly blurts out that they always do exactly that before Deep Blue hastily tries to cover for him. In the end, the brothers leave behind only mockery and a promise that things will not go smoothly once you step onto their surf. Metem confirms that they are indeed the next opponents you must face, and though he apologizes for the destruction, he says there was nothing he could do to stop it.</p><p>The damage to the gym is bad enough, but then Yaana realizes something worse: the kittens are nowhere to be seen. Retsarra appears and quickly reassures her that they are safe, having fled upstairs when they sensed danger. He admits that he arrived earlier and witnessed the vandals in the act, and that he wanted to intervene, but feared doing so would draw the president’s attention. Then he reveals that he has more important news. Through one of Honey’s devoted fans—an employee of Ascension Arcadia—he has learned new details about security at the company complex. Right after Eutrope and Neyuni were taken, the watch was suspiciously doubled around a plush reception hall used to entertain important guests. According to Dancing Green, that is most likely where the girls are being held.</p><p>Retsarra explains that while the security is tight, a rescue plan is already taking shape. Sugar Riot will use her art to create a commotion, and in the confusion he will slip inside. Yaana admits that it is a daring strategy, but says she believes he can pull it off. The rescue will take place during your next match, when the attention focused on the ring will help create the opening they need. That means your battle against the Xtremes will matter for more than your own climb. Thinking of the coming fight draws Retsarra into memory, and he speaks of the days when he and Hector fought together as an unknown tag team. Their signature move, the “Ultimate Megaboom Kick,” sent him hurtling at opponents wrapped in Hector’s flames. It looked spectacular and hit just as hard, though hardly anyone came to watch, and management eventually broke up the pair. He leaves the memory there and returns to the matter at hand: like all tag teams, the Xtremes specialize in coordinated attacks, and you must be ready for them.</p><p>When you reach the greenroom, Yaana gives you a closer look at the opponents waiting ahead. Red Hot and Deep Blue are the Xtremes, a popular tag team made up of professional surfers who first rose to fame at Solution Nine’s artificial wave pool. Each brother wields the soul of a storm diver, one commanding water and the other flame. Yaana notes that their “brotherhood” is only part of the act—they are clearly not related by blood—but whatever the truth behind the gimmick, they fight as a dangerous unit. She also warns you that they have a history of reckless excess: at one point they burned through so many souls reviving themselves for a stunt that they were sharply criticized for wasting resources. That only makes them more dangerous. Still, if you can defeat them, you will be only one bout away from becoming grand champion. With that in mind, she urges you to go out there, settle the score with the men who wrecked her gym, and show them who really wipes out.</p><p>You do exactly that. When you return victorious, Yaana’s anger gives way to delight. She tells you that even together the brothers were no match for you, and laughs at the sight of those smug troublemakers being humbled at last. For her, there is a special satisfaction in seeing the men who trashed her home beaten cleanly in the ring. And for you, the path forward narrows again: one more victory now stands between you and the summit.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>ヤーナは、次の試合まで少し時間があるのだと告げる。本来なら次の相手はウィケッドサンダー――ユートロープであるはずだったが、事情が事情だけにそれは叶わず、代役もまだ決まっていないのだという。ひとまずジムへ戻ろうと彼女は言う。運がよければ、そのあいだにレトサラが救出について何か進展を掴んでいるかもしれないからだ。</p><p>だが道中で、涙を流す若者に呼び止められる。彼は震える声で、ジムがめちゃくちゃにされたのだと訴える。駆け戻った先で待っていたのは、荒らされたトライテールズ・トレーニングと、そこに勝手に居座る闖入者たちだった。現れたのは、タッグマッチで名を上げている人気コンビ、エクストリームズ。そこへメテムまで現れ、この騒ぎさえも見世物のように取り上げながら、彼らこそ次の相手ではないかと口にする。ディープブルーは、自分たちは常にふたりでひとつだから、相手をするのも当然ふたりだと言い放ち、きちんと交代しながら戦うのだから公平だろうと気取ってみせる。ヤーナは即座に、その手のことばかり言って結局ふたり同時に襲いかかるつもりなのだろうと切り返す。レッドホットは思わず、いつもそうしているではないかと言いかけ、慌てたディープブルーに口を塞がれる。最後に彼らは、ここまでは運がよかっただけで、自分たちの波ではそうはいかないと嘲るように言い残す。メテムは彼らが次の対戦相手であることを認め、こんな有様にしたことを詫びるが、自分には止める術がなかったと言う。</p><p>荒らされたジムを前にしてなお、ヤーナが気にしたのは別のことだった。子猫たちの姿が見えないのだ。そこへ現れたレトサラは、危険を察して上へ逃げたので無事だとすぐに告げる。そして、自分は実はもっと早くここへ来ており、犯行の最中も目にしていたのだと打ち明ける。止めたい気持ちはあったが、社長の目を引くことを恐れて動けなかったのだという。そのうえで、彼はもっと重要な知らせを持ち帰っていた。ハニーの熱心なファンで、アセンション・アーカディアに勤めている人物から、社屋の警備体制に関する情報を得たのだ。ユートロープとネユニが連れ去られた直後、妙に警備が増強された区画がひとつだけあった。それは重要な客をもてなすための豪華な応接間らしく、グリーンの見立てでは、ふたりはそこに拘束されている可能性が高いという。</p><p>警備は厳重だが、救出の目はある。レトサラはそう言って、すでに考えている作戦を語る。シュガーライオットが魔法めいた技で騒ぎを起こし、その混乱に乗じて自分が忍び込むというのだ。ヤーナは大胆な策だと息をのむが、それでも彼ならやり遂げられると信じると言う。決行はあなたの次の試合の最中だ。リングに注目が集まれば集まるほど、救出の助けになる。そう話すうち、レトサラはかつてヘクトルと名もない新人タッグだった頃を思い出す。ふたりの切り札は「アルティメット・メガブームキック」。ヘクトルが炎をまとわせた自分を敵へ撃ち出す豪快な技で、見映えも威力も申し分なかった。だが観客は集まらず、やがて運営に組まされていたチームも解散させられたのだという。懐かしさを振り払うように、彼は今へ戻る。タッグチームである以上、エクストリームズは強力な連携攻撃を繰り出してくるはずだと、あらためてあなたに注意を促す。</p><p>グリーンルームに着くと、ヤーナは対戦相手についてさらに詳しく説明する。レッドホットとディープブルー――このふたりが、人気タッグチーム「エクストリームズ」だ。もともとはソリューションナインの人工波プールで名を上げたプロサーファーで、それぞれが嵐潜りという大蜥蜴の獣魂を使い、片や水を、片や炎を操る。兄弟を名乗ってはいるが、どう見ても血縁ではなく、それもまた演出の一部にすぎない。それでもなお、彼らが恐るべき連携を見せることに変わりはない。さらにヤーナは、彼らが派手な危険行為を好み、かつては自らを蘇生させるために大量の魂を使い潰して、資源の無駄遣いだと激しく非難されたことまで明かす。無茶を恐れないぶん、なおさら危険なのだ。とはいえ、彼らを倒せば、あなたはグランドチャンピオンまであと一戦に迫る。ジムを荒らした連中にきっちり報いを与え、いったいどちらが本当に波に飲まれるのか見せてやれと、ヤーナは強く背を押す。</p><p>そしてあなたは、その期待どおりに勝って戻ってくる。ヤーナは晴れやかな声で、ふたりがかりでも相手にならなかったのだと喜ぶ。自分のジムを好き放題に荒らしたあの尊大な連中が、きちんと打ち負かされる様子を見ることができて胸がすいたのだと笑う。そうしてまたひとつ勝利を重ねたあなたの前には、ついに最後の一戦だけが残されることになる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>Yaana 說，在你的下一場比賽開始之前，還有一點空檔。那是因為原本應該站在你面前的對手，其實正是 Wicked Thunder，也就是 Eutrope 本人。可基於你們再清楚不過的理由，這件事如今已經不可能了，而替補人選到現在都還沒有決定。她於是提議先回訓練館一趟，說不定趁著這段時間，Retsarra 那邊已經對救出她姊妹的事有了新的進展。</p><p>可你們才走到一半，就被先前見過的那名少年哭著攔了下來。他哽咽著告訴你們，訓練館被人砸了。等你們趕回 Tritails Training，眼前的景象讓 Yaana 當場愣住，原本熟悉的地方已被弄得一片狼藉，而裡頭還站著幾個像是故意等著你們回來的人。那兩人正是近來在雙人搭檔賽裡大出風頭的組合「Xtremes」。Metem 也在此時現身，甚至把這場惡劣的闖入包裝成表演般的介紹，說不定這兩人就是你接下來的對手。Deep Blue 一臉理所當然地表示，既然他們本來就是一組人，當然該由兩個人一起上場，還假惺惺地說他們會輪流交替，這樣就算公平。Yaana 立刻嗆了回去，說大家都知道他們一定會壞規矩、一起對你出手。Red Hot 幾乎順口承認平常本來就都是這樣做，卻被 Deep Blue 慌張打斷。到頭來，這對搭檔只留下滿嘴挑釁，說你之前一路順利只是運氣好，等到了他們的浪上，你只會摔得很慘。Metem 最後也只能承認，這確實就是你接下來要面對的對手，並為眼前這場破壞道歉，只是他也無能為力，根本阻止不了。</p><p>訓練館被砸得亂七八糟已經夠糟了，可 Yaana 很快又發現了更讓她慌張的事，那些小貓不見了。幸好 Retsarra 隨後趕到，立刻告訴你們牠們沒事，早在感覺到危險時就逃到樓上去了。他也坦白說，其實自己更早之前就已經到了，甚至親眼看見了那些人動手破壞的樣子。他當時氣得想立刻出手阻止，卻又怕這麼做會把總裁的注意力引來，因此只能強忍著沒有現身。接著，他說自己還帶來了更重要的消息：他們終於找到了 Neyuni 和 Eutrope 可能被關押的線索。那是 Honey 一名忠實粉絲提供的情報，對方正好在 Ascension Arcadia 任職，因而知道公司大樓內部的警備安排。據說，就在 Yaana 的姊妹被帶走之後，有一處地方突然被大幅加強戒備。根據 Green 的說法，那是一間專門用來招待重要客人的豪華接待廳，而她們多半就被關在那裡。</p><p>雖然那裡的守備十分森嚴，但 Retsarra 說，他們已經想出一個能夠打開缺口的辦法。到時候 Sugar 會利用自己的能力製造騷動，而他則會趁亂潛入裡面，把人救出來。Yaana 聽了之後也承認，這確實是一個相當大膽的計畫，但她仍然相信 Retsarra 有辦法辦到。行動會安排在你下一場比賽進行的時候，因為只要你的戰鬥足夠精彩，把所有人的注意力都吸到擂台上，反而正好能替救援製造最好的掩護。話說到這裡，Retsarra 也順勢提起，他以前和 Hector 也曾以雙人搭檔的形式一起戰鬥過，那還是在他們都默默無聞、尚未打出名聲的時候。那時他們的招牌絕招叫作「Ultimate Megaboom Kick」，由 Hector 把火焰纏繞在他身上，再把他整個人轟向對手。那一招不但看起來夠誇張，威力也同樣驚人，只可惜當時幾乎沒什麼觀眾願意看，最後管理方乾脆把他們拆夥。說完這段往事後，他又把心思拉回眼前，提醒你，像 Xtremes 這種雙人組合最大的威脅就在於他們的聯手進攻，所以等你真正面對他們時，絕對不能掉以輕心。</p><p>等你們來到 Greenroom，Yaana 便開始更仔細地替你分析這對即將面對的對手。Red Hot 和 Deep Blue 組成了相當有人氣的雙人組合 Xtremes，而他們原本其實是專業衝浪手，靠著在 Solution Nine 的人工浪池裡展現的技巧而闖出名聲。這對「兄弟」各自使用 feral soul（用於戰鬥變身的獸魂）中屬於 storm diver 的力量，那是一種能操縱元素的大型蜥蜴，而 Deep Blue 所掌控的是水，Red Hot 則驅使火焰。Yaana 還特地補了一句，說他們嘴上雖然一直以兄弟自稱，但明顯根本沒有血緣關係，那也只是整套人設的一部分而已。可就算如此，這對搭檔依然是非常棘手的組合。她又提到，這兩人平時就特別愛玩那些誇張又危險的表演，甚至有一次為了讓自己反覆復活上演大場面，竟耗掉了大量靈魂，因此被嚴厲批評是在浪費資源。也正因為如此，他們的魯莽只會讓他們變得更危險。不過，若你能跨過他們，你距離 grand champion（Arcadion 全分級之上的最終冠軍頭銜）就只剩最後一場比賽。於是 Yaana 也帶著明顯壓不住的火氣催你上場，要你好好教訓那兩個把她訓練館砸成這副模樣的混帳，看看到底是誰才會真正摔得一敗塗地。</p><p>而你也真的做到了。當你再次帶著勝利回來時，Yaana 幾乎是笑著迎上你，毫不掩飾自己的痛快。她說，就算兩兄弟一起上，也根本不是你的對手。光是看見那兩個自大又討人厭的傢伙被你徹底壓下去，就已經讓她一整天都心情大好；更別說，他們還活該，誰叫他們把她的訓練館搞成那副德性。這場勝利之後，你離最終的終點，也就只剩下一步之遙了。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Yaana <small class="muted">(控室, X:6.1, Y:5.9)</small></div></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
