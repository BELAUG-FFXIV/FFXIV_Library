  <style>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`Shock and Awe`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You find Terrified Refugee still waiting for news, but she can offer only grim warnings: the others are hiding in caves south of Lost Hope, and they would sooner brand you an agent of the sultanate and try to kill you than listen. She curses the bloody sellswords who were meant to train them—those sent alongside them disappeared in the struggle—and she spits out the memory of that merchant’s ridiculous claims that their cause was righteous and the gods would never let them be defeated.</p><p>Then she forces herself to confront the truth. If her brethren could be made to see reality, perhaps they might yield. She begs you to challenge the twins to combat and prove their strongest warriors are no match for one man—mayhap then the rest will lay down their arms and renounce the plot. Hurt the twins if you must, she says, but pray do your utmost not to harm the others.</p><p>Zazawaka understands the appeal—he truly does—but he warns you that a man can do more good living humbly for a cause than dying nobly for one.</p><p>When you approach the caves, Desperate Refugee erupts in panic, shouting for everyone to grab their gear and run for the rendezvous point—then turns on you with bitter laughter. If you came to stop them, they will kill you themselves. Armed Refugees surge forward, swearing you should never have come, daring you to do your worst, insisting you cannot stop them even as they fight and gasp for breath.</p><p>In the chaos, the twins answer the challenge. One snaps that it has been too long and calls you a meddlesome wretch; the other answers with a shout—ho, a challenge—only to recoil with a furious “No, NO!” even as the clash becomes unavoidable.</p><p>You beat them like it was nothing. The survivors stare at what you have done, shaken to the core, and Desperate Refugee finally breaks. Thal almighty—what are they going to do now? They yield, all right, they yield; that was what you wanted, wasn’t it? So go away and leave them be.</p><p>Back at Lost Hope, Terrified Refugee demands answers the moment you return. You tell her what happened, and she falls into a bitter acceptance: you had no choice. Better that a handful of them take a beating from you than the lot get butchered by the Flames. She asks what the merchant had to say when it was over—then falters, realizing he is nowhere to be found. Unless… unless he went to Stonesthrow to recruit others.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Terrified Refugee <small class="muted">(Central Thanalan, X:25.2, Y:15.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="desperate-times.html">Desperate Times</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="reap-the-whirlwind.html">Reap the Whirlwind</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'武器を取った人々',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたが戻ると、怯えた難民は息をのんで問いただすが、返ってくるのは厳しい現実だった。仲間たちはロストホープ南の洞窟に隠れており、近づけば無駄だという。あなたをスルタン国の手先と決めつけ、理を聞く前に殺しにかかるだろう、と。彼女は呪う――戦い方を教えるはずだった傭兵どもは、いざ争いが始まると姿を消した。さらに、あの商人の荒唐無稽な言葉まで思い出す。「自分たちの大義は正しく、神々が敗北を許すはずがない」と。</p><p>だが彼女は、現実に向き合おうとする。仲間に現実を突きつけられれば、降伏してこの企てを捨てるかもしれない。だから、あなたに頼む――双剣の使い手である「双子」に決闘を挑み、最強の戦士ですら一人の男に及ばないと示してほしい。必要なら双子を傷つけてもいい、ただし他の者たちだけは、どうか極力傷つけないでくれ。</p><p>ザザワカは、その気持ちはわかると言う。だが、志のために高潔に死ぬよりも、つつましく生きて成せる善のほうが大きいこともあるのだ、と。</p><p>あなたが洞窟へ近づくと、必死の難民が叫び声を上げ、皆に装備をつかんで合流地点へ向かえと怒鳴る。だがすぐに、あなたへ向けて乾いた笑いを漏らした。そういう手口か――残念だったな、こっちは喜んでお前を殺してやる、と。武装した難民たちが押し寄せ、「来るべきじゃなかった」「かかってこい」「止められるものか」と叫び、息を切らしながらも襲いかかってくる。</p><p>混乱の中で、双子が挑戦に応じる。一人は「久しぶりだな」と吐き捨て、「厄介者め」と罵る。もう一人は「ほう、勝負か！」と叫ぶが、次の瞬間には「いやだ、いやだ！」と怒りと焦りをむき出しにし、衝突は避けられなくなる。</p><p>あなたは双子を、まるで何でもないことのように打ち倒す。残った者たちは呆然とし、必死の難民はついに折れた。タールの神よ、もうどうすればいい――降参だ、降参だ、それで満足だろう、だから行ってくれ、放っておいてくれ、と。</p><p>ロストホープへ戻ると、怯えた難民は矢継ぎ早に問いかける。あなたが起きたことを告げると、彼女は沈黙ののちに言う――仕方がなかったのだ。あなたに殴られる者が少数で済むほうが、フレイムズに皆殺しにされるよりはましだ、と。彼女は、すべてが終わったあと商人が何と言ったのかを尋ねるが、やがて顔色を変える。いるはずの場所にいない。まさか……ストーンスロウへ行って、別の者を勧誘しているのではないか。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> 震え上がった男 <small class="muted">（中央ザナラーン, X:25.2, Y:15.4）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="desperate-times.html">難民暴動を追って</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="reap-the-whirlwind.html">暗躍の果て</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'手握武器的人們',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你回到 Terrified Refugee 身邊，她幾乎是立刻把所有焦急都砸向你，但她能給你的只有更殘酷的警告：其他難民躲在 Lost Hope 南方的洞窟裡，你若靠近只會白費力氣——他們寧可把你當成 sultanate 的走狗，直接動手，也不會聽你講理。她咒罵那些該負責訓練他們的傭兵：明明說好要教他們戰鬥，結果在衝突裡卻跟著派來的人一起消失無蹤。更讓她懊悔的，是那個商人的荒唐說法——他聲稱他們的事業正義無比，神明絕不會容許他們落敗。</p><p>可當她被迫直視現實時，新的念頭反而浮現。只要讓同伴們親眼看見「最強也不過如此」，也許就會願意放下武器、放棄這場陰謀。她要你去挑戰那對雙胞胎，以決鬥證明他們最強的戰士也敵不過一個人——或許到那時，他們就會同意投降。她說你若必須出手，傷到那對雙胞胎也沒關係，但求你無論如何都要盡力別傷到其他人。</p><p>Zazawaka 表示他能理解這種做法的誘惑，但他也提醒你：一個人為了信念，謙卑地活著所能帶來的善，往往比壯烈地死去更多。</p><p>你走近洞窟時，Desperate Refugee 先是驚恐地吼著要所有人抓起裝備、趕去會合點，緊接著又把矛頭轉向你，像是早就看穿你的用意般狂笑。你這一套把戲是嗎——抱歉讓你失望了，他們甚至願意親手宰了你。武裝的難民們衝上來，叫你不該踏進這裡，要你放馬過來，聲稱你根本阻止不了他們；他們一邊喘著氣，一邊仍死咬著不肯退。</p><p>混戰裡，那對雙胞胎也回應了你的挑戰。有人冷冷地說「太久不見了」，還罵你是多管閒事的討厭鬼；另一人則大喊「好啊，來戰！」可下一瞬間又失控似地怒吼「不，不要！」——即使如此，衝突仍然無可避免。</p><p>你把他們打得像是毫不費力。目睹這一切的難民們整個愣住，Desperate Refugee 終於崩潰：Thal 在上，他們現在到底該怎麼辦？他們投降，真的投降——這就是你想要的吧？所以你走吧，放過他們。</p><p>你回到 Lost Hope，Terrified Refugee 迫不及待追問結果。當你把發生的一切說出口，她沉默片刻，像是只能接受：你別無選擇。與其讓所有人被 Flames 屠戮，至少只是少數人被你揍一頓。她接著追問那名商人在事情結束後說了什麼——可話才出口，她便像突然意識到什麼般僵住：他怎麼可能不在？除非……除非他去了 Stonesthrow，想再去拉別的人入夥。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 顫抖的男人 <small class="muted"> 中薩納蘭（X:25.2, Y:15.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="desperate-times.html">追查難民暴動的原因</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="reap-the-whirlwind.html">黑手的下場</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
