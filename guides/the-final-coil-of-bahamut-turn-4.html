        tabs:{story:'Story', req:'Requirements', acq:'Unlock Quest', unlock:'Follow-Up Quest', comments:'Comments'},
        story:`<div class="story"><p><strong>00:00 Cutscene 1</strong></p><p>The road has been long and arduous, but Alisaie says you have reached its end. She bids Bahamut farewell and declares that she will banish him back to the aether—yet in the same breath she realizes he is not yet whole, and she did not think him capable of what comes next.</p><p>The blast leaves Alphinaud reeling as he cries out for his sister. Alisaie, shaken, admits she thought it was finally over, and says you will not survive another strike. For a heartbeat, doubt bites deep—she wonders if this is how she can honor the promise she made to Grandfather.</p><p>Then Louisoix’s words return to her: you must find your own reason to fight for this realm—your own meaning in this sea of chaos. Alisaie answers him aloud. She says she will, and that she believes she already has.</p><p>She says that reason has been with her all along, guiding her—Eorzea’s blade of Light, cutting through endless shrouds of darkness. She has seen the miraculous feats of which all are capable, and of which she herself is capable, and she turns that certainty toward the foe before you.</p><p>Alisaie calls Bahamut’s destruction enough. She will not allow his wrathful fires to consume all that you know and love, even as the pain tears another sound from her. Alphinaud, hearing her speak with that conviction, says he has waited so long to hear it—she has found her resolve at last.</p><p>He tells her to let him join his strength to hers. Here, now, their purpose has become one, and together they cry out for the future of Eorzea. Alisaie then turns to you and places the final burden in your hands: this last task is yours, Warrior of Light—you must destroy Bahamut’s crystal core.</p><p><strong>11:22 Cutscene 2</strong></p><p>You hear Alisaie’s voice break through the aftermath—you did it, she says, but one task still remains. With the last coil disabled, there will be nothing left to bind Bahamut to this world, and his beloved children will finally know peace.</p><p>When it is finished, Alisaie stands in the silence and says it out loud: it is done—he is truly gone.</p><p>Then she turns on Alphinaud, pressing him with what has been sitting between you since the truth came into view: he knew, didn’t he—he knew what Grandfather had become. Alphinaud admits he was not certain, but everything he had learned pointed to the possibility: the devastation at the Battle of Cartenau was beyond imagining, and primals are born from desperate prayer joined to an abundant source of aether. He says he simply put the pieces together.</p><p>Alisaie challenges him, but she understands what his caution meant. She asks if his theory was the reason he grew wary of her attachment to Grandfather—if he feared that, in her obsession, she might come under primal influence. Is that why he came with you, to pull her back if she began to waver?</p><p>Alphinaud asks her forgiveness and tells her he only wanted to protect her—and that he sees now he did not need to doubt the strength of her conviction. Then he asks what she intends to do with the truth you have uncovered.</p><p>Alisaie names it without flinching: desperate prayer gave rise to the primal Phoenix, and that newborn god set Eorzea upon the path to rebirth. If such a tale became common knowledge, people would pray in earnest and beg Phoenix to complete the healing that was begun.</p><p>Alphinaud answers with what you both know too well: calling forth that “savior” would do more harm to the land than good. You cannot encourage such worship—if Grandfather were forced to return as an aether-draining primal, it would undo all he sought to protect. He tells Alisaie her love was the key that unlocked the truth of the Calamity, but keys can also seal doors that were best left unopened—so let that love guide her now, and lock away the fate of both Grandfather and Bahamut.</p><p>Alisaie agrees. The realm need not know the whole truth for it to be saved; that the elder primal is banished, and will not return, is enough. With that decision made, she urges you back toward the surface—Urianger must be beside himself with worry.</p></div>`,

        story:`<div class="story"><p><strong>00:00 カットシーン 1</strong></p><p>長く険しい道のりだったが、ついに終わりへ辿り着いた――アリゼーはそう告げる。バハムートに別れを告げ、エーテルへ還せと宣言するが、直後に彼がまだ完全ではないことに気づき、その力を侮っていたと悟る。</p><p>激しい衝撃にアルフィノは呻き、妹の名を叫ぶ。アリゼーは動揺し、これで終わったと思っていたと言い、次の一撃には耐えられないと口にする。ふと胸をよぎるのは、祖父との約束だ――自分はこれで、祖父への誓いを果たせるのか、と。</p><p>そのとき、ルイゾワの言葉がよみがえる。混沌の海の中で、この国のために戦う自分自身の理由を見つけよ――そうできるか、と。アリゼーは答える。できる、祖父。むしろもう見つけていたのだと。</p><p>その理由はずっと傍にあった。闇の帳を切り裂く、エオルゼアの光の刃として自分を導いてきたのだと。自分たちが成し得る奇跡を見てきた――そして自分自身にも、その力があるのだとアリゼーは言う。</p><p>アリゼーは叫ぶ。バハムートよ、破壊はもう十分だ。怒りの炎で、愛するものすべてを焼き尽くさせはしない。苦痛に息を詰まらせながらも、その決意は揺るがない。アルフィノはその言葉を聞き、ずっと待っていたと言う。ついに覚悟を見つけたのだ、と。</p><p>アルフィノは力を重ねようと申し出る。この場所で、この瞬間に、ふたりの目的はひとつになった。ふたりは叫ぶ――エオルゼアの未来のために。アリゼーはあなたへ向き直り、最後の役目を託す。光の戦士よ、この最後の務めはあなたのものだ――バハムートのクリスタルの核を破壊してほしい。</p><p><strong>11:22 カットシーン 2</strong></p><p>あなたは、アリゼーの声を聞く。やり遂げたのだと告げられるが、彼女はすぐに続ける――まだ最後の務めが残っている。最後のコイルを停止させれば、この世界にバハムートを縛りつけるものは何もなくなり、「愛し子」たちはようやく安らぎを得るのだ、と。</p><p>やり終えたあと、アリゼーは静けさの中で言い切る。終わった――バハムートは本当に消えたのだ、と。</p><p>そして彼女はアルフィノへ向き直る。あなたは知っていたのだろう、と。祖父が何になっていたのかを。アルフィノは、確信はなかったと答える。だが集めた情報からすれば、十分にあり得る話だった。カルトノーの戦いは想像を絶する破壊として語られ、蛮神は、追い詰められた者たちの祈りと潤沢なエーテルが揃うことで生まれる――だから理屈を組み合わせただけだ、と。</p><p>アリゼーは納得しきれない様子を見せながらも、その推測が意味していたことを突きつける。その「可能性」に気づいたからこそ、彼は自分の祖父への執着を警戒していたのではないか。執念のあまり、蛮神の影響に囚われることを恐れたのか。だから同行し、もし自分が揺らぐなら引き戻すつもりだったのか、と。</p><p>アルフィノは許しを乞う。守りたかっただけだと言い、今は、自分があなたの確信の強さを疑う必要などなかったとわかった、と。そして問う。いま得た真実を、これからどう扱うつもりなのか、と。</p><p>アリゼーは言う。追い詰められた祈りが蛮神フェニックスを生み、その新たなる神がエオルゼアを再生の道へ押し出したという真実のことだろう、と。その物語が広まれば、人々は真剣に祈りを捧げ、フェニックスに癒しを完成させてほしいと願うはずだ、と。</p><p>アルフィノは断じる。救い主を呼び出す行為そのものが、大地には益より害をもたらす。だから崇拝を促してはならない。祖父がエーテルを吸い上げる蛮神として戻されれば、守ろうとしたすべてが台無しになるのだ、と。彼は言う――祖父への変わらぬ愛が霊災の真相を解く鍵になった。だが鍵は、開けるだけでなく、閉ざすためにも使える。いまはその愛に行動を導かせ、祖父とバハムートの運命を胸の奥へ封じてほしい、と。</p><p>アリゼーは頷く。世界が救われるために、真実を広める必要はない。エルダー・プライマルが退けられ、二度と戻らない――それで十分だ。そう言って彼女はあなたを促し、地上へ戻ろう、ウリエンジェが心配でたまらないはずだ、と告げる。</p></div>`,

      ZH:{
        langLabel:'繁體中文',
        pageTitle:'巴哈姆特大迷宫 真源之章4',
        tabs:{story:'故事概要', req:'需求條件', acq:'解鎖任務', unlock:'後續任務', comments:'留言'},
        story:`<div class="story"><p><strong>00:00 過場動畫 1</strong></p><p>漫長而艱辛的路走到盡頭，Alisaie 說你們終於抵達終點。她向 Bahamut 道別，宣告要把他放逐回以太——可就在話音落下的瞬間，她驚覺他仍未完全成形，而自己竟以為他不可能再做到這一步。</p><p>突如其來的衝擊讓 Alphinaud 痛得發出低吼，急切喊著 Alisaie 的名字。Alisaie 也被震得發懵，喃喃說她原以為一切終於結束；她咬著牙承認，你們不可能再撐過下一發。恐懼與懊悔一齊湧上來，她問自己：難道這就是她用來兌現對祖父的承諾的方式嗎？</p><p>就在這時，Louisoix 的話在她腦中響起——要在這片混亂之海裡，找到你自己為這個世界而戰的理由。Alisaie 低聲回應：她會的，祖父，而且她相信自己早就找到了。</p><p>她說，那個理由一直都在她身邊，引領著她——那道名為「光」的利刃，是 Eorzea 的劍，斬開無盡黑暗的帷幕。她親眼見過你們所有人能做到的奇蹟，也看見自己能做到的事；她把那份確信握緊，重新站穩面向眼前的敵人。</p><p>Alisaie 直指 Bahamut 已經造成夠多毀滅，她絕不允許他憤怒的火焰吞噬你們所知、所愛的一切；痛楚逼得她發出一聲悶哼，卻沒能折斷她的決意。Alphinaud 聽見她終於說出口，激動地說他等這一句等了太久——她終於找到了自己的覺悟。</p><p>他要她讓自己把力量與她合在一起。在此時此地，你們的目標已成為同一個，兄妹一同喊出：為了 Eorzea 的未來。最後，Alisaie 轉向你，把最終的責任交到你手上：光之戰士，最後這一步只能由你完成——你必須摧毀 Bahamut 的水晶核心。</p><p><strong>11:22 過場動畫 2</strong></p><p>你聽見 Alisaie 在餘波裡喊出你的成果——你做到了，可她立刻提醒：還有最後一件事。只要把最後這個 coil 也停下來，就再也沒有任何東西能把 Bahamut 綁在這個世界；他的「愛子」終於能得到安寧。</p><p>當一切都結束，Alisaie 在沉默裡下定論：完成了——他真的消失了。</p><p>她隨即轉向 Alphinaud，逼近那個她一直放在心底的問題：你早就知道，對吧？你知道祖父已經變成了什麼。Alphinaud 承認他不敢說自己確定，但從他掌握的線索來看，那確實很可能：人們形容 Carteneau 之戰，是難以想像的毀滅；而 primal 的誕生，來自絕望之人的祈禱匯聚，再加上充沛的以太來源——他只是把這兩點拼在一起。</p><p>Alisaie 立刻質疑這樣是否就算「足夠的解釋」，可她也把話推向更尖銳的真意：不管他是怎麼得出那個推論，正是那個推論讓他開始警惕她對祖父的依戀。她問他是不是害怕她會在那份執著裡動搖，最後落入 primal 的影響之下——所以他才決定同行，一旦她開始搖擺，就把她拉回來。</p><p>Alphinaud 向她道歉，說自己只是想保護她；而現在他明白了，他不該懷疑她信念的強度。接著他問你們真正必須面對的事：既然真相已被揭開，你們打算怎麼處理它？</p><p>Alisaie 把那個真相說得清清楚楚：絕望的祈禱催生了 primal Phoenix，而那位新生的「神」讓 Eorzea 走上復甦之路。她說，一旦這個故事變成常識，人們很快就會認真祈禱，懇求 Phoenix 把已經開始的治癒徹底完成。</p><p>Alphinaud 立刻指出你們都懂的代價：呼喚這位「救主」本身，就會對大地造成更多傷害，而不是帶來好處。你們不能鼓勵任何崇拜；如果祖父被迫以吸取以太的 primal 之姿再次回來，那將會毀掉他所守護的一切。他告訴 Alisaie：她對祖父長久不變的愛，是解開 Calamity 真相的鑰匙；但鑰匙也能用來把某些不該再打開的門封上——接下來就讓那份愛引導你們，把祖父與 Bahamut 的命運深深鎖進心裡。</p><p>Alisaie 回答他不必擔心——她明白該怎麼做。這個世界不需要知道全部真相，也同樣能被拯救；只要「elder primal 已被放逐，不會再回來」這件事留下來，就已經足夠。她說完便催你走：回到地表吧，Urianger 肯定已經擔心得快失去理智了。</p></div>`,

          <div class="row"><strong>人數：</strong>1–8 人（2 坦克／2 治療／4 輸出）</div>
          <div class="row"><strong>職業：</strong>戰鬥職業／魔法職業</div>
          <div class="row">※ 限定職業僅能在事先組成符合人數條件的隊伍，或以無限制規則參加，且需符合任務規則允許的情況。</div>
          <div class="row"><strong>等級：</strong>50</div>
          <div class="row">※ 進入時將進行等級同步。</div>
          <div class="row"><strong>平均裝備品級：</strong>123</div>
          <div class="row">※ 同步時，所有裝備數值將自動調整。</div>
          <div class="row">※ 當隊伍僅達最低人數時，角色定位與裝備品級限制將解除。</div>
        </div>`,
        acq:`<div class="stack">
          <div class="row"><a class="link" href="the-final-coil-of-bahamut-turn-3.html">巴哈姆特大迷宫 真源之章3</a></div>
        </div>`,
        unlock:`<div class="stack">
          <div class="row"><a class="link" href="alisaies-path.html">真源永存於心</a></div>
        </div>`
      }
    };

    const langToggle = document.getElementById('langToggle');
    const pageTitle  = document.getElementById('pageTitle');
    const tabBtns    = [...document.querySelectorAll('.tab-btn')];
    const panels = {
      story : document.getElementById('panel-story'),
      acq   : document.getElementById('panel-acq'),
      req   : document.getElementById('panel-req'),
      unlock: document.getElementById('panel-unlock'),
      comments: document.getElementById('panel-comments')
    };

    function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
    function applyLang(lang){
      const t = i18n[lang] || i18n.EN;
      pageTitle.textContent = t.pageTitle;
      langToggle.textContent = `🌐 ${t.langLabel}`;
      tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
      const activeBtn = tabBtns.find(b=>b.getAttribute('aria-selected')==='true') || tabBtns[0];
      renderPanel(activeBtn.dataset.tab, lang);
      if (activeBtn && activeBtn.dataset.tab === 'comments') loadGiscusForCurrentLang();
    }

    function renderPanel(key, lang){
      const t = i18n[lang] || i18n.EN;
      Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
      panels[key].classList.add('active');
      if (key !== 'comments') {
        panels[key].innerHTML = t[key];
      } else {
        loadGiscusForCurrentLang();
      }
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click',()=>{
        tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab, getLang());
      });
    });

    langToggle.addEventListener('click',()=>{
      const cur=getLang();
      const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
      localStorage.setItem(LANG_KEY,next);
      applyLang(next);
    });

    applyLang(getLang());

    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };
    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }
  </script>
</body>
