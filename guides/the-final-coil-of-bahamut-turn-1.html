        story:`<p><strong>00:00 Cutscene 1</strong></p><p>You take your first look inside, and Alphinaud voices the same thought aloud—so this is what it looks like within.</p><p>Alisaie confirms that the internment hulk is still functioning, and that the teleportation succeeded; you have arrived where you meant to.</p><p>She warns there is no telling how much further Bahamut has regenerated since the last time you beheld him.</p><p>With that in mind, she urges you to make haste to the main bridge and deactivate the coil.</p><p>As you move deeper, she points out receptacles like the ones you saw in the previous hulk—those held chimerical beasts, but only the Allagans know what other abominations might be sleeping within. They could be part of Dalamud’s internal defenses, so she tells you to stay on your guard at all times.</p><p><strong>05:25 Cutscene 2</strong></p><p>By the Twelve—dragons, and so many of them. You take in the rows of captives, and Alisaie cannot hide her shock. She says the Allagans had the means to control them, but to imprison them like this is barbaric—she would not wish such a fate upon her worst enemy.</p><p>It is plain there was no love lost between the Allagans and the dragons, she says, but was it truly necessary to keep so many here? Dalamud did not lack defenses—you have witnessed that firsthand—and the Allagans’ guardians, living and unliving alike, should have been capable of repelling intruders without condemning these creatures to such suffering.</p><p>Alphinaud asks if she has determined by whose will Bahamut exists. Alisaie admits she has not. At first, she assumed Bahamut had no people of his own, and that the Allagans might have found a way to simulate prayer itself.</p><p>Yet Nael’s words made her reconsider—especially the mention of Bahamut’s “beloved children.” She begins to say the primal must be given form by worshippers you have yet to identify—</p><p>—and then she stops. The answer is right there. Alisaie curses herself for her blindness: Bahamut’s beloved children are before your eyes, the dragons of eld. Who else would summon Bahamut? Who else could sustain him? And all this time, she wondered why the Allagans kept them imprisoned here.</p><p>Alphinaud says that even if the flame of Bahamut’s life were to go out, his faithful children would summon him back. For that reason, the Allagan Empire kept an army of dragons here in perpetual duress, that they might sustain the primal’s existence—proof that the Allagans’ ingenuity had no bounds, and neither did their cruelty.</p><p>Alisaie says it is no wonder Bahamut was so enraged, and that none should deny it was man who sowed the seeds of the Calamity. Alphinaud asks if she will now turn her hatred toward your own kind, and she snaps back that she merely acknowledges your guilt. She says she will not allow Bahamut to lay the world to waste, whatever atrocities the Allagans committed against his kind—and that you have no choice but to eliminate all who worship him, whether his children or his thralls. If the system that regenerates the primal also sustains the captive dragons, then disabling it should mean all perish—so you must press on.</p>`,

        story:`<p><strong>00:00 カットシーン 1</strong></p><p>あなたが内部を見渡すと、アルフィノは呟く──これが内側の光景なのか、と。</p><p>アリゼーは、この拘束艦はいまも機能していると言い、転送も成功した、狙いどおりの場所に来られたのだと告げる。</p><p>そして、前にバハムートを目にしたときから、どれほど再生が進んだのかは誰にもわからないと警戒する。</p><p>だからこそ、主艦橋へ急ぎ、コイルを停止させようとあなたを促す。</p><p>さらに彼女は、前の拘束艦にも同じような収容槽があったと言い、あちらには合成獣が収められていたが、ほかにどんな忌まわしき異形が眠っているかはアラグにしかわからないと続ける。それらはダラガブの内部防衛機構の一部かもしれない──だから常に警戒を怠るな、と。</p><p><strong>05:25 カットシーン 2</strong></p><p>十二神よ……竜が、しかもこれほどの数が。目の前の光景に、アリゼーは衝撃を隠せない。アラグが竜を操る術を持っていたことは知っていたが、こんなふうに幽閉するなど野蛮だ、最悪の敵にすら望まない運命だと彼女は言う。</p><p>アラグと竜の間に友好がなかったのは明らかだが、それにしても、これほどの数をここに留める必要があったのかとアリゼーは問う。ダラガブの防衛は十分すぎるほどで、あなたはそれを身をもって経験している。アラグが造り出した生体や無機の守護者たちは、侵入者を退けるには十分で、これらの竜にこんな苦しみを与える必要はなかったはずだ、と。</p><p>アルフィノはアリゼーに問う。バハムートがいったい誰の意志によって存在しているのか、まだ突き止められていないのか、と。アリゼーは首を振り、当初はバハムートに「民」がいないのではないか、あるいはアラグが祈りそのものを模す方法を見つけたのではないかと思っていたと言う。</p><p>だがナエルの言葉が、その考えを揺さぶった。とりわけ「バハムートの愛し子」という言い回しだ。蛮神は、まだあなたたちが見定めていない信徒の意志によって形を与えられているのではないか――そう推し量りかけた、そのとき。</p><p>アリゼーは息を呑み、言葉を失う。答えはあなたの目の前にあったのだ。自分はなんという愚か者だ、と彼女は吐き捨てるように言う。バハムートの愛し子はここにいる――古の竜たちだ。誰がほかにバハムートを呼び、誰がほかにそれを支えられるのか。そして自分は、なぜアラグが竜をここに幽閉したのか不思議に思っていたのだ、と。</p><p>アルフィノは告げる。たとえバハムートの命の火が消えても、忠実な子らが再び呼び戻すだろう、と。だからこそアラグ帝国は、蛮神の存在を支えさせるために、竜の軍勢をここで恒久の苦役に置いたのだ。まさにアラグの才は際限なく、そして残虐さもまた際限がない、と。</p><p>アリゼーは、バハムートが激怒していたのも無理はないと言い、人が霊災の種を蒔いたのだと否定させない。アルフィノが、今度は自分たちの同胞へ憎しみを向けるのかと問うと、アリゼーは見下すな、ただ罪を認めているだけだと言い返す。どれほどアラグが竜に暴虐を働いたとしても、バハムートに世界を蹂躙させるつもりはない、だから崇拝する者は子であれ眷属であれ排さねばならない、と。蛮神の再生を司る仕組みが捕らわれた竜をも支えているのなら、それを止めればすべてが滅びるはずだ――だから先へ進もう、とあなたを促す。</p>`,

      ZH:{
        langLabel:'繁體中文',
        pageTitle:'巴哈姆特大迷宫 真源之章1',
        tabs:{story:'故事概要', req:'需求條件', acq:'解鎖任務', unlock:'後續任務', comments:'留言'},
        story:`<p><strong>00:00 過場動畫 1</strong></p><p>你踏入內部，忍不住環顧四周；Alphinaud 也低聲說，原來裡面是這副模樣。</p><p>Alisaie 立刻確認這艘拘束艦仍在運作，並說傳送成功，你們確實來到了正確的地方。</p><p>她提醒你：自從上一次親眼見到 Bahamut 之後，他的再生究竟又推進了多少，誰也說不準。</p><p>因此她催你加快腳步，直奔主艦橋，讓線圈停止運作。</p><p>前行途中，她指向周遭的收容槽，說它們和你們在上一艘拘束艦裡見過的很像；那時裡面關著合成獸，但除了 Allag（古代亞拉戈帝國）之外，沒有人知道這裡還沉睡著什麼樣的異形。它們很可能就是 Dalamud 的內部防禦之一——所以她要你隨時保持警戒。</p><p><strong>05:25 過場動畫 2</strong></p><p>十二神在上……你眼前是一整片被囚禁的龍，而且數量多得令人發寒。Alisaie 震驚得幾乎說不下去，只說你們早知道 Allagan（古代亞拉戈帝國）擁有控制牠們的手段，可把龍這樣囚起來實在太過野蠻；她甚至說，這種下場她連最痛恨的敵人都不願見到。</p><p>她說 Allagan（古代亞拉戈帝國）和龍之間顯然毫無情分，但也不至於必須把這麼多龍留在這裡。Dalamud 的防禦你們早已親身體會過，而 Allagan（古代亞拉戈帝國）打造的守衛——不論是活的還是非活的——理當也足以擊退入侵者，不必讓這些可憐的龍承受這種折磨。</p><p>Alphinaud 轉而問 Alisaie：她是否已經找出 Bahamut 究竟是由誰的意志而存在。Alisaie 坦言還沒有。她說起初她以為 Bahamut 沒有所謂「自己的人民」，甚至猜想 Allagan（古代亞拉戈帝国）也許找到了能夠「模擬祈禱」的方法。</p><p>但 Nael 的話讓她不得不重新思考——尤其是那個影子提到的「Bahamut 的 beloved children」。她因此推斷，primal 的形體是由某些 worshippers 的意志所賦予，而你們尚未找出那些——</p><p>她突然停住，像是被什麼狠狠擊中。她低聲咒罵自己太過愚蠢：Bahamut 的 beloved children 就在你眼前──是古老的龍。除了牠們，還有誰會召喚 Bahamut？又還有誰能夠維持他的存在？而她竟然一直困惑 Allagan（古代亞拉戈帝國）為何要把龍囚在這裡。</p><p>Alphinaud 說，就算 Bahamut 的生命之火熄滅，他忠誠的孩子們也會再次把他召回。正因如此，Allagan（古代亞拉戈帝國）才把一支龍的軍勢長久囚困在此，讓牠們在持續的苦難中維持 primal 的存在。這既是 Allagan（古代亞拉戈帝國）才智無邊的證明，也是其殘酷無邊的證明。</p><p>Alisaie 說，Bahamut 如此憤怒也就不難理解，並要人無法否認：是「人」親手種下了那場 Calamity 的種子。Alphinaud 問她是否要把憎恨轉向你們自己的同類，Alisaie 立刻回嗆別用那種口氣，她只是承認罪責。她說無論 Allagan（古代亞拉戈帝國）曾對龍做過多殘忍的事，她都不會允許 Bahamut 再次把世界化為焦土；你們別無選擇，必須消滅所有崇拜他的人——不管是他的孩子，或是受他支配的奴僕。她接著推測：負責 primal 再生的系統，或許也同時維持著這些被囚的龍；若你們把它停下來，一切都將一併死去——所以必須繼續前進。</p>`,

      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };
    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }
  </script>
