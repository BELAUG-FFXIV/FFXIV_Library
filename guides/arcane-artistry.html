    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}

    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}

    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}

      display:inline-block; padding:8px 14px; border-radius:10px;

    }

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`Arcane Artistry`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You ask about the smithy, only to learn that it is not yet running. The man in charge explains, with no small amount of frustration, that the expedition’s hired weaponsmith vanished before the workshop could even be properly set up. By all accounts he is a master of his craft, but from the moment he boarded the ship he caused trouble, trying to escape often enough that they locked him in the hold. Even then, he managed to drink through most of the expedition’s liquor before disappearing altogether.</p><p>When you hear the description, the man pauses at your reaction and wonders whether you already know the culprit—or whether Eorzea simply has more ill-tempered master smiths than he realized. He goes on to explain how hard it was to find anyone willing to sail to Shades’ Triangle, and how an enterprising woman finally connected them with this particular artisan. The man is said to be the finest weaponsmith alive, but also a hopeless drunk drowning in debt, and he agreed to join the expedition only to settle what he owed. Still, there is nowhere for him to flee on this island, and you are asked to keep watch for a shirtless, rum-soaked wastrel named Gerolt and send him back.</p><p>You soon find him in the abandoned village, grumbling that there is not a drop of rum to be found in the whole cursed place. He fumes over the contract that never mentioned Shades’ Triangle, curses the woman who tricked him into this, and then notices you. The irritation in his voice quickly gives way to a rough familiarity. As much as he complains at the sight of you, he cannot deny that things are never dull when the two of you cross paths. With that, he suggests the two of you finish the job quickly and get off the desolate island.</p><p>Once you bring him back, the man in charge apologizes for the trouble and urges Gerolt to begin earning his keep now that the smithy can finally be opened. Gerolt bristles at the idea of wasting his hammer and tongs on ordinary work that any village smith could manage. Only feats bordering on the impossible still stir his blood. When the burden of his debts is thrown back in his face, however, even he cannot deny that there is some sense in making use of Eorzea’s finest weaponsmith for something worthy of his skill.</p><p>Pressed for an answer, Gerolt declares that he will devise a wholly new method of refining weapons and armor, but he will need raw materials from the island to do it—ore twisted by strange magic. Even that will not be enough. Such properties are unstable, and without a way to properly bind and direct the aether, the ore could degrade before it can be used. To solve that problem, he speaks of a rare crystal sometimes left behind by dying beasts: a crystallized fragment of life essence he has worked with before. It is uncommon, but he is certain it can be found here, and elsewhere besides. Its name, he says, is demiatma.</p><p>His explanation is enough to make clear what must happen next. While Gerolt is pushed into helping around the smithy and preparing his process, you are entrusted with the dangerous part of the work—bringing down fiends and gathering the demiatma he requires. The island’s strange aether and Gerolt’s stubborn genius are finally beginning to point toward something tangible. When you later return with potent samples, Gerolt’s mood lifts at once. He praises the quality of what you found, begins imbuing his tools, and crows that the demiatma will not lose its potency no matter how many weapons he crafts. With that, his next impossible feat is already underway, and you are told to prepare yourself for what comes next.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Lydirceil <small class="muted">(Phantom Village, X:6.6, Y:7.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="unfamiliar-territory.html">Unfamiliar Territory</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="forging-the-phantasmal.html">Forging the Phantasmal</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'蜃気楼に包まれし武具',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたが鍛冶場について尋ねると、まだ稼働できる状態ではないと知らされる。責任者の男は苛立ちを隠さず、遠征のために雇った武器鍛冶が、工房の準備が整う前に姿をくらましたのだと語る。腕前は誰もが認める一流だが、船に乗ったときから問題ばかり起こし、逃げ出そうとしては何度も騒ぎを起こしたため、ついには船倉に閉じ込めたという。それでもなお、遠征用に積んでいた酒の大半を飲み干した末に消えてしまったらしい。</p><p>その話ぶりに、あなたが思い当たる節を見せると、男はあなたがその人物を知っているのか、それとも Eorzea には気難しい名工がまだ大勢いるのかと半ば呆れたようにこぼす。そもそも Shades’ Triangle へ向かう者を探すだけでも難儀したうえ、ようやくあるやり手の女に仲介してもらって、この職人へたどり着いたのだという。現代随一の武器鍛冶とまで言われる一方で、酒癖は最悪、借金まみれで、返済のためにこの遠征へ加わった男――それがその職人だった。もっとも、この島から逃げ出す術などないはずだと言い、上半身裸で酒臭い、ゲロルトというどうしようもない男を見かけたら連れ戻してほしいと頼まれる。</p><p>やがてあなたは、打ち捨てられた村でそのゲロルトを見つける。こんな呪われた場所には一滴の酒もありはしないと悪態をつき、契約のときには Shades’ Triangle の話など聞いていなかったと毒づき、まんまと乗せられた自分自身にも苛立っている。そしてあなたに気づくと、うんざりしたような声を漏らしながらも、どこか見慣れた相手に再会したような調子を見せる。文句は言いながらも、あなたと関わると退屈だけはしない。そう言って、こんな荒れ果てた島でぐずぐずせず、さっさと仕事を終えて出ていこうと持ちかける。</p><p>あなたが彼を連れ戻すと、責任者の男はひとまず騒ぎを詫び、ようやく鍛冶場を動かせるのだから、今こそ役目を果たしてもらわねばならないとゲロルトに言う。だがゲロルトは、どこの村鍛冶でも作れるような凡庸な品に自分の槌と火箸を使うつもりはないと突っぱねる。いまの自分を燃え立たせるのは、不可能に近いほどの難題だけだと豪語する。もっとも、酒と借金の件を突きつけられては、さすがの彼も言い返しきれない。それでも、Eorzea 屈指の名工を雇っておきながら、ありふれた剣や盾を打たせるだけでは惜しいという思いは、その場の誰にも共通していた。</p><p>そこでゲロルトは、新たな武具精錬の手法を自ら編み出すと宣言する。そのためには、まず島で採れる、魔力によって歪められた鉱石が必要だという。しかし原料だけでは足りない。そうした性質は移ろいやすく、乙太を正しく捉えて制御する手立てがなければ、鉱石は加工の途中で力を失ってしまうおそれがある。そこで彼は、死に瀕した魔物がときに残す、命の本質が結晶化したような希少な物質について語る。かつて扱ったことがあり、決してありふれたものではないが、この島なら見つかるはずだし、ほかの土地でも手に入るかもしれない。その名を、彼はデミアートマだと告げる。</p><p>その言葉で、次に何をすべきかははっきりする。ゲロルトには鍛冶場の手伝いと準備を進めさせ、そのあいだあなたは危険な役目を担い、魔物を討って必要なデミアートマを集めることになる。島に満ちる異質な乙太と、ゲロルトの頑なな才覚は、ようやく形ある成果へつながり始めていた。やがてあなたが力の強い標本を持ち帰ると、ゲロルトの表情はたちまち変わる。見事な品だと認めた彼は、すぐさま道具へ力を宿し始め、デミアートマの効力はどれだけ武器を作っても失われないと高らかに笑う。こうして彼の次なる離れ業は、すでに動き始めていた。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> リディルセイル <small class="muted">(蜃気楼の町, X:6.6, Y:7.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="unfamiliar-territory.html">使えない使い魔</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="forging-the-phantasmal.html">ファントムウェポンの創造</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'被蜃景包圍的奧術武具',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你向對方詢問鍛冶場的事，卻得知那裡還無法正式運作。負責人語氣裡滿是惱火，說他們為這次遠征找來的武器鍛造師，竟在工房尚未準備妥當前就不見了蹤影。照眾人的說法，那人手藝確實高明得無可挑剔，可自從踏上船後就麻煩不斷，老是想著逃跑，逼得他們只好把人關進船艙。即便如此，他還是把遠征帶來的大半酒水喝了個精光，最後乾脆整個人消失不見。</p><p>當你聽著這番描述，似乎隱約聯想到某個熟人時，那名負責人也不由得愣了一下，懷疑你是不是早就認識這個麻煩人物，還是 Eorzea 其實到處都是這種脾氣惡劣的名匠。他接著解釋，要找一個願意航向 Shades’ Triangle 的人本就不容易，最後還是透過一位很有門路的女人牽線，才找到這名工匠。世人都說他是當今最頂尖的武器鍛造師，可同時也是個酒鬼，又背了一身債，這才為了還債答應參加遠征。不過，這座島根本沒有脫身的路，他再怎麼跑也跑不遠。於是對方便要你留意一下，只要見到那個上半身赤裸、渾身酒氣、名叫 Gerolt 的混帳，就把他帶回來。</p><p>沒過多久，你果然在那座荒廢的村落裡找到 Gerolt。他一邊咒罵這個鬼地方連一滴酒都找不到，一邊惱怒地抱怨，自己簽下那份該死的契約時，可沒人提過 Shades’ Triangle，分明是被那個狡猾的女人擺了一道。可當他發現站在面前的人是你時，那股不耐煩裡又摻進了一絲熟悉的味道。嘴上雖然照例沒一句好話，他卻也不得不承認，只要和你攪在一起，事情總不會無聊。於是他乾脆提議，既然碰上了，不如快點把事情做完，早些離開這座荒涼的島。</p><p>等你把他帶回去後，負責人先為這場騷動向你致歉，接著便催促 Gerolt，既然鍛冶場總算能開張了，也該開始好好做事。Gerolt 卻立刻沉下臉，表示自己才不會拿起鐵鎚和火鉗，去做那些隨便哪個村裡鐵匠都能處理的普通活。他說，如今唯有接近不可能的難題，才足以點燃他的鬥志。可當對方把他那筆爛帳和喝光酒水的事一併搬出來時，他終究沒法理直氣壯地反駁。即使如此，大家心裡也都明白，既然花了大價錢請來 Eorzea 最頂尖的武器鍛造師，自然不該只讓他去打些平凡無奇的刀劍盾牌。</p><p>於是 Gerolt 宣稱，他要親自設計一種全新的武器與防具精煉方式。要完成這件事，首先得用上島上那種受到奇異魔力扭曲的礦石。可光有原料還不夠。這類性質往往稍縱即逝，若沒有辦法妥善引導並束縛其中的乙太，礦石很可能在加工過程中就失去價值。為了解決這個問題，他提起一種稀少的結晶──有些魔物在臨死之際，會留下凝結成塊的生命精華。他過去曾用過這種東西，雖然並不常見，但他判斷在這座島上應該找得到，在其他地區也未必沒有。那種結晶的名字，就叫 demiatma。</p><p>聽完這番說明，接下來該做什麼也就清楚了。Gerolt 會被留下來協助整備鍛冶場，並著手準備他的精煉方法；而你則負責更危險的那一部分──討伐魔物，替他蒐集所需的 demiatma。這座島異樣的乙太，與 Gerolt 那份頑固卻驚人的才能，終於開始朝某個具體成果匯聚。等你之後帶回力量充足的樣本時，Gerolt 的神情立刻變了。他痛快地認可那些樣本的品質，隨即開始將力量灌注進自己的工具裡，甚至得意地大笑，說這些 demiatma 不管拿來打造多少武器，都不會失去效力。至此，他口中的下一場驚人創舉，已經正式開始。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Lydirceil <small class="muted">(幻影村, X:6.6, Y:7.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="unfamiliar-territory.html">派不上用場的使魔</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="forging-the-phantasmal.html">鍛造幻影武器</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
