    story:`<div class="clamp" data-collapsed="true">
<p>Nashu marvels at the fact that Hildibrand wasn’t dead at all—only badly injured—and insists he must have needed to hibernate to recover. Hildibrand immediately agrees with theatrical certainty, declaring that it can only mean dastardly deeds are afoot nearby, and that only he can thwart them.</p>
<p>He rattles off what he senses around him—copious sand and unbearable heat—and boldly concludes it must be the Sagolii Desert. From there, he reasons, Ul’dah can’t be far, and he proclaims that only that den of iniquity could so violently stir his keen investigator’s sense. With a grand vow to protect law-abiding citizens, he dashes off at once.</p>
<p>Nashu spins back to you in a panic, demanding which way he went and whether you saw him. She blurts that she has to find him—and that she needs to change her outfit, too—while you head into Ul’dah to chase his trail.</p>
<p>In Ul’dah, you ask after a suspicious figure, but people either recoil or complain. Agnys bristles at the idea of being questioned about a deviant in rags and snaps that she’s no reporter for the Mythril Eye and wants nothing to do with perverts. Silver Nettle says she’d remember a half-naked Highlander chasing criminals, then rants about a weapon thief who calls himself a “duelist” and forces fights on others.</p>
<p>Botulf advises that if it’s information you want, you’d be better off speaking to Wymond. He says the only rumors he’s heard also concern that weapon thief—styled a duelist, though not allowing opponents to refuse hardly sounds like a proper contest.</p>
<p>When you return to Wymond, he assumes you dealt with the zombie business and asks why they were dressed like dandies. Before the question can settle, Hildibrand bursts in shouting Wymond’s name, and Wymond jolts in terror at the sight. Hildibrand breezily insists there’s no need for melodrama—reports of his death were greatly exaggerated—and Nashu adds that she checked and he isn’t a zombie.</p>
<p>Pressed on how he survived the fall, Hildibrand dismisses doubt with talk of providence and announces his true purpose: he will bring the thieving duelist to justice. Wymond admits even he doesn’t know where the culprit is, but Hildibrand refuses to accept that Wymond has not a single scrap of information. As Wymond starts to mention a young woman, Hildibrand cuts him off in outrage—then notices you, calls you the gentleman from the Sagolii, and declares it “capital” if you also seek the duelist. Fired by competition, he calls for Nashu and rushes off again, while Wymond fumes that he hadn’t even said the woman’s name yet.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>ナシュ・マカラッカは目を輝かせ、ヒルディブランドは死んでなどおらず、大怪我を負っていただけで回復のために休眠が必要だったのだと言う。そんなことが人にできるとは知らなかった、と続けると、ヒルディブランドはそれ以外ありえないとばかりに、近くで悪辣な企みが進んでおり、それを阻めるのは自分だけだと断言する。</p>
<p>彼は周囲に満ちる砂と耐えがたい熱気を挙げ、ここはサゴリー砂漠だと言い切る。ならばウルダハはすぐそこだ、すべて辻褄が合うのだと豪語し、あの悪徳の巣窟こそが自分の鋭い捜査の勘を激しく刺激したのだと宣言する。法を守る市民たちよ恐れるな、と言い放つと、彼はそのまま駆け去った。</p>
<p>ナシュ・マカラッカはあなたに向き直り、どちらへ行ったのか見たかと慌てて問いかける。見失ってはいけないと焦り、すぐに探しに行かなければならない、それに服も着替えねばならないと口にし、あなたはウルダハへ向かって手がかりを追う。</p>
<p>ウルダハで聞き込みをしても、返ってくるのは嫌悪や苛立ちばかりだ。アグニスは、ぼろ布をまとって走り回る変質者の居場所を聞きたいのかと不快感をあらわにし、自分はミスリルアイの記者ではないし、変態とは関わらないと言い放つ。シルバー・ネトルは、半裸のハイランダーで犯人を追うような男なら忘れるはずがないと言いながら、武器を奪う決闘士を名乗る賊への怒りをぶちまける。</p>
<p>ボタルフは、情報が欲しいならワイモンドを訪ねるのが一番だと勧める。噂といえば武器泥棒のことくらいで、決闘士を名乗りながら相手に拒む余地も与えないのでは、まともな勝負とは言えないのだと付け加えた。</p>
<p>あなたがワイモンドのもとへ戻ると、彼はゾンビー騒ぎは片付いたのかと問い、なぜ伊達者の格好をしていたのかと聞いてくる。そこへヒルディブランドが現れてワイモンドの名を大声で呼び、ワイモンドは仰天して死者が街を歩いているのかと叫ぶ。だがヒルディブランドは芝居がかった反応は不要だと言い、死亡報道は大いに誇張されていたのだと涼しい顔で返し、ナシュ・マカラッカもゾンビーではないと断言する。</p>
<p>生還の理由を問われると、ヒルディブランドは神の摂理を持ち出して受け流し、盗賊決闘士を裁くのだと宣言する。ワイモンドは居場所の見当がつかないと言うが、ヒルディブランドは情報の一片もないはずがないと迫る。ワイモンドが若い女性の話を口にしかけたところで、ヒルディブランドは途中で遮って憤り、さらにあなたに気づくとサゴリーで会った紳士だと言い、あなたも決闘士を追っているのかと問う。知恵比べの勝負をしようと昂ぶり、ナシュ・マカラッカを呼んで出立を急ぎ、ワイモンドはまだ名も言っていないのにと悪態をつく。</p>

    story:`<div class="clamp" data-collapsed="true">
<p>Nashu Mhakaracca 驚嘆這一切太不可思議：Hildibrand 根本沒有死，只是傷得很重，所以才需要休眠來恢復。她坦白自己從來不知道人竟然也能做到這種事；而 Hildibrand 立刻以誇張的自信斷言，這只能代表附近一定有陰險勾當正在發生，能阻止一切的人只有他。</p>
<p>他把眼前的跡象講得煞有其事：大量沙塵、難以忍受的酷熱——他當場認定這裡必定是 Sagolii Desert。既然如此，Ul’dah 也不過是短短一段路程；一切都吻合。只有那座惡名昭彰的城市，才會如此猛烈地觸發他敏銳的偵探直覺。他高聲要守法的市民不必恐懼，並宣告 Inspector Hildibrand 很快就會掃蕩邪惡，隨即拔腿就走。</p>
<p>Nashu Mhakaracca 轉頭急問你：他往哪個方向去了，你有沒有看到？她慌得不行，說自己得立刻把他找回來——而且還得先去換一套衣服。你則趕往 Ul’dah，沿路追查他的去向。</p>
<p>你在城裡打聽時，得到的多半是嫌惡與抱怨。Agnys 反問你是不是想找那個穿著破布、在城裡亂跑的怪人，並冷冷表示自己又不是 Mythril Eye 的記者，更不會跟變態扯上關係。Silver Nettle 說如果真有半裸的 Highlander 在城裡抓犯人，她不可能不記得；接著她把怒氣轉到另一個人身上——有個武器小偷自稱「決鬥士」，還逼得別人不能拒絕，害她聽說有人被奪走了劍。</p>
<p>Botulf 則勸你，想要消息的話最好去找 Wymond。他說自己聽到的傳聞也幾乎都跟那個武器小偷有關；對方雖自稱決鬥士，但連拒絕的餘地都不給，怎麼看都不像堂堂正正的對決。</p>
<p>你回到 Wymond 那裡時，他先問你是不是已經處理了殭屍問題，還追問那些殭屍為什麼要打扮得像花花公子。就在這時，Hildibrand 突然現身，大喊 Wymond 的名字；Wymond 被嚇得失聲叫道，死者復生、在 Ul’dah 的街頭行走。Hildibrand 卻要他別那麼戲劇化，說關於他死亡的傳聞被誇大了；Nashu Mhakaracca 也補上一句，她已經確認過，他不是殭屍。</p>
<p>當 Wymond 追問他到底怎麼從那種墜落中活下來，Hildibrand 只以「神意」帶過，轉而宣告自己要把那個偷竊的決鬥士繩之以法。Wymond 承認就連他也不知道那傢伙的下落，但 Hildibrand 不肯相信 Wymond 會連一絲線索都沒有。Wymond 正要提起一位年輕女子時，Hildibrand 便憤怒插話；隨後他注意到你，稱你是 Sagolii Desert 那位「紳士」，問你是否也在追那名好鬥的決鬥士。他興致高昂地說這正好，適合來一場友好的智力較量，立刻催促 Nashu Mhakaracca 動身離開——只留下 Wymond 惱火地罵著：他連那女孩的名字都還沒說完。</p>
</div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
