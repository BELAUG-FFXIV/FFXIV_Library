    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
<p>You meet Wymond at Camp Drybone, and he tells you the whispers he hears are full of your comings and goings. He asks if you’ve ever heard of a man named Hildibrand—an “inspector extraordinaire,” famous in his own telling—and recounts how, five years ago, Hildibrand declared himself the hero of prophecy, launched himself into the sky toward Dalamud, and only recently was found at the bottom of a deep crater. Hearing that Nashu—Hildibrand’s former assistant—has become an inspector in her own right and is now desperate over strange zombie rumors, Wymond asks you to help her and suggests you look for her at Hildibrand’s grave.</p>
<p>In the lichyard, Nashu speaks to the gravestone as if the inspector might still answer, then breaks down—refusing to believe the fall was real, swearing she will carry on the legacy of “Gentleman Hero Hildibrand.” When you step in, she clings to the one theory she has: there must be a “head zombie” giving the others orders, and if you find the dapper zombies in southern Thanalan, you might even befriend them and learn where their leader is. Following the trail and the odd clues it leaves behind, you and Nashu go to the Sagolii Desert and call out—until the “Gentle Dead Men” answer, and a self-proclaimed “Zombibrand” appears.</p>
<p>Nashu refuses to accept the act, insisting the “undead overlord” is really the gentleman inspector—and she attempts to jolt his memory back by force, even at the risk of killing him. The confusion breaks, and Hildibrand finally remembers her, though not how he ended up here; a hazy echo of his awakening flashes through his mind, and he triumphantly declares himself revived and ready for dastardly doings. Certain that Ul’dah must be nearby and trouble must be brewing there, he dashes off, leaving you and Nashu scrambling to follow.</p>
<p>In Ul’dah, rumors point back to Wymond and the ongoing weapon-theft incidents. Hildibrand bursts in alive and unashamed, vows to bring the thieving duelist to justice, and then seizes on a lead to a woman named Yellow Moon at the Weavers’ Guild. Yellow Moon pleads for the return of her beloved wand, Pure Heart, and Hildibrand insists the only logical course is to reenact her day—first to Sunsilk Tapestries, then to the Coliseum—so her memories can yield clues.</p>
<p>At each stop, Yellow Moon recalls a different man confessing “undying love,” and in shock she drops or swings her heavy purse, sending the suitor fleeing or unconscious. Hildibrand fixates on his deductions, but the strange wooden crates around town draw Nashu’s attention; when you pry into the mystery, men hidden inside protest that they are “devotees,” hoarding Yellow Moon’s belongings for “safekeeping,” and Pure Heart is found among them. Before Hildibrand can declare the case solved, a sharp-tongued reporter, Ellie of the Mythril Eye, cuts in—those thefts are the work of a single duelist who takes weapons only after defeating victims in single combat—and she offers the next lead: an adventurer named Humphrey at the Golden Bazaar.</p>
<p>At the Golden Bazaar, Humphrey boasts as if he were a Warrior of Light, until Ellie has Eleazar expose the truth: Humphrey lost a borrowed blade in a duel and spent the repair money on himself. Hildibrand refuses to abandon either the wronged man or the guilty one, deciding the only way forward is to recover the sword; questioning the locals leads you to the traveling merchant Jojonpa, who says he discards dubious wares in a spring east of Camp Drybone and may have thrown away a facsimile resembling Eleazar’s blade. Hildibrand, claiming he must rehabilitate his battered body, has you coat him in salamander oil, then sends you searching the spring—until, through persistence and sheer chaos, the ancient blade is recovered and returned, and Hildibrand declares that a gentleman recognizes the good in every soul.</p>
<p>With the sword restored, Hildibrand receives a new provocation: an unsigned note declaring, “I shall come to claim the collector’s blade.” Ellie recognizes it for what it is—an intimidation from the duelist—and explains the likely target: the Treaty-Blade, now owned by a wealthy collector’s wife in Vesper Bay. To secure an audience, she suggests a rare flower from Tutusi at Camp Drybone; you purchase the Althyk lavender and approach the collector, Lady Durilda, only to be dismissed as an unworthy common adventurer even as Ellie warns that the duelist may strike.</p>
<p>Durilda reveals she has already retained a “gentleman” to oversee security—Consulting Inspector Briardien—who arrives late from solving a murder and openly scorns Hildibrand and Nashu as amateurs. When Durilda’s servant Maria loses a priceless vase after being frightened by a strange flying creature, Durilda orders her back out to retrieve it; Hildibrand volunteers to go instead, and Maria leads you to Nophica’s Wells, where you hear downstream testimony, cross paths with the blustering Gilgamesh and his “Enkidu,” and learn he stepped on the fallen vase while chasing the demon bird that stole his weapon. You gather the fragments, and Hildibrand insists there is only one goldsmith in all Eorzea capable of restoring it—so you set off toward Bluefog, following the trail of hammer-struck beasts, while Hildibrand resorts to the Manderville dance as bait and even demands you dance in his stead.</p>
<p>Meanwhile, Ellie uncovers the next stage of the duelist’s game: the “lapis maiden” Arabella, daughter of Master Guguremu of the East Aldenard Trading Company, is rumored to appear at a wedding announcement in Costa del Sol, betrothed to Vannes, heir to the Brugaire Consortium. At Costa del Sol, Guguremu scoffs at the warning, but Briardien lays out a cold, methodical theory: the thief is an attention seeker with a pattern, already among the key players, and could be any of the figures close to Arabella—Vannes, Morgant, Yalto Nolto, Sainana, Guguremu, or the steward Lewenhart. Outside the venue, Briardien presses you for what mattered about the earlier disguise, reveals a tiny prism sewn into the mask that enables appearance changes, and argues the real danger is perfect imitation; he then deduces the thief’s first identity would be a Brass Blade of the Gerbera, and sends you searching for a missing soldier.</p>
<p>You find the missing Brass Blade bound and stripped, learn he was assigned to Morgant, Yalto Nolto, and Lewenhart, and Briardien departs to continue the investigation—ordering you to keep Hildibrand from doing anything stupid. Hildibrand immediately ignores the spirit of that request, decides to seize the glory first, and storms through awkward “parley” with Guguremu and then Yalto Nolto and Lewenhart, finding nothing overtly unnatural. When he pivots to the crates of foodstuffs as his next angle, Ellie spots “coconuts” that aren’t coconuts at all—until Nashu admits the explosives are hers, left there for convenience; with Briardien returning at the worst possible moment, Ellie pulls you into a frantic cover-up, keeping him away from the beach while Hildibrand and Nashu rush to remove the danger before it detonates the entire case.</p>
</div>

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
<p>キャンプ・ドライボーンでワイモンドに会うと、あなたの行動は噂話の半分を占めるほどだと言われる。奇妙な噂を調べる気はないかと問われたのち、彼は「事件屋ヒルディブランド」という男の話を始める。本人は自分を「エオルゼア一の検察官」だと吹聴していたが、五年前「メザヤの第七詩」を解いたと思い込み、英雄は自分だと言い切ってダラガブへ向けて空へ飛び立ったという。そして最近、深いクレーターの底で遺体が見つかった。ワイモンドは、かつての助手ナシュ・マカラッカが今は自称「検察官」としてゾンビ騒ぎを追っているが手詰まりだとして、あなたに助力を頼み、墓地で会えるはずだと告げる。</p>
<p>墓地でナシュは墓標に語りかけ、ヒルディブランドならゾンビを止められるはずだと嘆く。冗談だと思いたい、すぐに地面から飛び出して「驚いたか」と言ってくれればいいのに――そう言いながら泣き崩れ、それでも「事件屋ヒルディブランド」の遺志を継ぐと誓う。あなたが声をかけると、ナシュは「頭ゾンビ」が群れを操っているはずだと力説し、南ザナラーンで目撃された洒落たゾンビを探せば手掛かりが得られるかもしれないと言う。やがて地図の印と合言葉を頼りにサゴリー砂漠へ向かい、呼びかけると「紳士の死者たち」が姿を現し、「ゾンビブランド」を名乗る者が応じる。</p>
<p>ナシュはその名乗りを信じず、相手は紳士の検察官であるはずだと言い張る。記憶を取り戻させるためだと称して強引な手段に出ようとし、相手が止めても勢いは衰えない。混乱の末、相手はついにナシュを思い出し、自分がここにいる理由だけが曖昧だと漏らす。断片的な回想がよぎり、目覚めたばかりだと宣言したヒルディブランドは、近くに悪事の気配があると確信し、ここがサゴリー砂漠であること、そしてウルダハが近いことを言い当てると、治安のために動くと高らかに叫んで駆け出していく。</p>
<p>あなたとナシュはウルダハで聞き込みを重ね、武器を奪う「デュエリスト」の噂を追ってワイモンドに行き着く。そこへヒルディブランドが現れ、自分の死は誇張だと平然と言い放ち、盗賊デュエリストを裁くと宣言する。手掛かりとして「イエロー・ムーン」という女性の名を聞くと、あなたたちは裁縫師ギルドへ向かい、彼女の「ピュアハート」を取り戻してほしいという嘆願を受ける。ヒルディブランドは、記憶の中の手掛かりを引き出すために当日の行動を再現すべきだとして、サンシルク製織工房、そしてコロセウムへ同行させる。</p>
<p>イエロー・ムーンは、それぞれの場所で見知らぬ男から突然「永遠の愛」を告げられ、驚いて財布を落としたり振り回したりして男を退散させたと語る。ヒルディブランドは推理を進めようとするが、ナシュは各所に置かれた木箱の異様さに気づき、あなたが中を確かめると「信徒」だと名乗る男たちが潜んでいた。彼らは彼女を守るために持ち物を回収していただけだと言い訳し、その中から「ピュアハート」も見つかる。だがミスリルアイの記者エリーが割って入り、武器強奪は一人のデュエリストが一騎打ちで勝った相手から奪うのだと断じ、次の手掛かりとしてゴールデンバザーの冒険者ハンフリーを示す。</p>
<p>ゴールデンバザーでハンフリーは自分を光の戦士だと誇張するが、エリーはエレアザルを呼び、父の剣を預けたのに決闘で失ったと泣きつかれた経緯を暴かせる。ハンフリーは借り物の剣を失い、渡されたギルを別の用途に使ったことを認め、助けを乞う。エリーが拒絶を促しても、ヒルディブランドは被害者も加害者も見捨てないと言い切り、聞き込みを開始する。行商人ジョジョンパの証言で、怪しい品はキャンプ・ドライボーン東の泉に捨てると知り、あなたはヒルディブランドに頼まれてサラマンダーオイルを塗り込み、泉を探って剣を回収し、エレアザルに返す。</p>
<p>その後、ヒルディブランドの額に「コレクターズブレードを奪いに来る」という予告が突き刺さる。エリーはそれがデュエリストの挑発だと告げ、狙いは「契約の剣」であり、今はベスパーベイの富裕な収集家の妻が所有していると説明する。面会のため、キャンプ・ドライボーンのツツシが扱う希少な花を用意すべきだとして、あなたはアルジクラペンダーを選んで購入し、ベスパーベイのドリルダのもとへ向かう。しかしドリルダはあなたを一蹴し、護衛も雇ったと豪語する。</p>
<p>ほどなく現れたのが顧問調査官ブリアルディアンで、彼はヒルディブランドとナシュを素人呼ばわりして切り捨てる。さらにドリルダの使用人マリアが高価な花瓶を落としたとして叱責され、恐ろしい飛行生物を見たから外が怖いと訴える。ヒルディブランドは名誉のために代わりに探すと言い出し、あなた、ナシュ、マリアとともにノフィカの井戸へ向かう。下流で証言を集めるうち、ギルガメッシュと名乗る男が「魔鳥」に奪われた武器を追ってここへ来たと言い、慌てて花瓶を踏み砕いたことが判明する。あなたたちは破片を集め、ヒルディブランドは修復できる職人を求めてブルーフォグへ向かい、ハンマーで獲物を倒す痕跡を追う。そして標的を誘い出すため「マンダヴィル家の舞」を踊り、ついにはあなたに代役を迫る。</p>
<p>その頃、エリーは次の標的が「瑠璃の姫君」アラベラだと突き止める。東アルデナード商会のググレムの娘で、ブルゲール商会の後継者ヴァンネスとの婚約が、コスタ・デル・ソルの祝宴で発表されるという。会場でググレムは記者の警告を一笑に付すが、ブリアルディアンは怪盗の手口を整理し、容疑者としてヴァンネス、モルガント、ヤルト・ノルト、サイナナ、ググレム、そして執事レウェンハートを挙げる。あなたはブリアルディアンに呼び出され、仮面に縫い込まれた小さなプリズムが変装を可能にしていること、しかし真に恐ろしいのは立ち居振る舞いまで完璧に模倣する点だと聞かされる。</p>
<p>ブリアルディアンは、最初の変装は「ガーベラ連隊の銅刃団」が最も合理的だと断じ、あなたに行方不明の銅刃団を探させる。あなたは鎖につながれた男を見つけ、彼が担当していたのはモルガント、ヤルト・ノルト、そしてレウェンハートだと聞き出す。ブリアルディアンは調査を続けるため離れ、あなたにはヒルディブランドを止めろと釘を刺すが、ヒルディブランドは先回りして犯人を捕らえると息巻き、交渉術で容疑者に切り込もうとして空回りする。やがて食料の木箱を疑い始めたところで、エリーが妙な「ココナッツ」に気づき、爆発物が紛れていると青ざめる――しかしそれはナシュの持ち物だった。最悪のタイミングでブリアルディアンが戻りかけ、エリーとあなたが彼を遠ざけるあいだに、ヒルディブランドとナシュは危険物を急いで撤去し、調査の火種が文字どおり爆発しないよう走り回る。</p>

    story:`<div class="clamp" data-collapsed="true">
<p>你在 Camp Drybone 遇見 Wymond，他說最近聽到的風聲，有一半都跟你的來來去去有關。他問你是否聽過一個叫 Hildibrand 的人——自稱「最偉大的偵探」的男人——並說起五年前那場荒唐又悲壯的插曲：Hildibrand 認定自己解開了預言，覺得只要找到「預言中的英雄」就能阻止 Dalamud，最後甚至把自己當成英雄，直接飛向天空。理所當然地，他墜回地面，直到最近才在深坑裡找到遺體。Wymond 說，Hildibrand 的前助手 Nashu 現在也成了偵探，正在追查你聽到的「怪異殭屍傳聞」，卻已經走投無路；他請你去幫她，並建議你先去墓地找人。</p>
<p>在墓園裡，Nashu 對著墓碑說話，像是只要再等一下，Hildibrand 就會從地底跳出來大喊「驚喜」。她哭著說自己不會被忘記——她記得那位「Gentleman Hero Hildibrand」，也發誓要背負他的名聲走下去。你出現後，她緊抓住唯一的推論：殭屍一定有「頭目」在指揮，只要去 southern Thanalan 找到那些打扮得體面的殭屍，就可能打聽到首領的下落，甚至……和殭屍交朋友。你順著線索一路追到 Sagolii Desert，照著暗號呼喊，直到「紳士殭屍」現身，而一個自稱「Zombibrand」的傢伙回應了你們。</p>
<p>Nashu 不肯接受那套說法，她堅持眼前的人就是那位紳士偵探，只是因為重創而迷糊。她打算用更強硬的方式把記憶「敲回去」，就算對方警告那樣可能會要命也不退縮。混亂終於裂開一道縫——對方想起了 Nashu，也承認自己記不得怎麼會在這裡；短暫的回響閃過，他像從長夢裡醒來一樣宣布自己復活，還立刻斷言附近一定有邪惡正在蠢動。認出這裡是 Sagolii Desert、Ul’dah 就在不遠處後，Hildibrand 轉身就衝走，留下你和 Nashu 一邊追、一邊慌忙收拾局面。</p>
<p>你們在 Ul’dah 四處打聽，很快又繞回 Wymond 口中的「武器竊案」——犯人被叫作 duelist，總在單挑後奪走對手的武器。Hildibrand 大搖大擺現身，宣稱自己「死而復生」並要親手把 duelist 送上正義。接著他抓到線索，帶你們去 Weavers’ Guild 找 Yellow Moon；她哭著請求你們把她的 Pure Heart 找回來。Hildibrand 說要從記憶裡逼出真相，唯一方法就是重演那天的行程：先去 Sunsilk，再去 Coliseum，一步一步把細節挖出來。</p>
<p>在 Sunsilk 與 Coliseum，Yellow Moon 分別回想起陌生男人突然向她告白「永恆的愛」，她驚得把錢袋掉在對方腳上、或是反身用沉重的錢袋把人打昏。Hildibrand 一度認定這些「不尋常」卻又急著把它們撇清，反倒是 Nashu 盯上了城裡到處可見的巨大木箱。你們查探後發現裡面躲著一群自稱「信徒」的男人，聲稱只是替 Yellow Moon「保管」她遺落的物品，而 Pure Heart 也真的在其中被找到。就在 Hildibrand 準備宣布破案時，Mythril Eye 的記者 Ellie 介入——她指出竊案是 duelist 一人所為：必須先在單挑中擊敗受害者，才會奪走武器；她也把下一個線索丟到你面前：去 Golden Bazaar 找一個叫 Humphrey 的冒險者。</p>
<p>在 Golden Bazaar，Humphrey 把自己吹成 Warrior of Light，直到 Ellie 叫來 Eleazar 當場拆穿：Humphrey 借走他父親的劍去修復，卻在決鬥中輸掉那把不是自己的劍，還把用來修復的錢拿去別處花了。Humphrey 求你們幫忙把劍找回來，Ellie 要你拒絕，但 Hildibrand 反問：如果現在丟下 Humphrey，Eleazar 又能得到什麼？你們開始在市集問話，追到 traveling merchant Jojonpa——他說自己會把來路可疑的貨丟進 Camp Drybone 東邊的泉水裡，或許丟過一把外型相近的仿品。依著這條路，你替 Hildibrand 抹上 salamander oil，然後在泉裡搜尋，最終把那把古老的劍帶回，讓 Eleazar 重新握回父親的遺物，而 Hildibrand 也用「紳士不會放棄任何人」作為結語。</p>
<p>事情還沒平息，Hildibrand 額頭上又出現新的挑釁：有人寫下「我將來奪取收藏家的刀刃」。Ellie 立刻判斷那是 duelist 的戰書，並說她已查出目標——Treaty-Blade，如今屬於住在 Vesper Bay 的富商之妻。她認為要接近對方，得先準備稀有花卉作為贈禮；你在 Camp Drybone 向 Tutusi 買下 Althyk lavender，前往 Vesper Bay 拜訪 Lady Durilda，卻被她用最冷酷的語氣趕走，還宣稱自己已雇用最好的「紳士」坐鎮護衛。</p>
<p>那位「紳士」很快現身——Consulting Inspector Briardien。他嘲諷 Hildibrand 與 Nashu 是業餘玩家，並宣稱自己才會在宴會前鎖住 duelist。緊接著，Durilda 的侍女 Maria 因為被奇怪的飛行生物嚇到，弄丟了名貴花瓶而遭責罵；Durilda 命令她立刻出去找回來。Hildibrand 為了「贏得尊敬」自告奮勇代她前往，你、Nashu 與 Maria 來到 Nophica’s Wells，沿著下游打聽，途中遇見自稱 Gilgamesh 的男人——他追著偷走自己武器的「惡魔鳥」而來，卻在慌亂中踩碎了 Maria 掉落的花瓶。你們收集碎片，Hildibrand 宣稱只有一位傳說中的金匠能把花瓶重塑如初，於是你們一路追到 Bluefog，循著「鐵鎚」留下的獵殺痕跡前進；為了引出目標，他跳起 Manderville 的舞步，甚至要你代他跳下去。</p>
<p>就在另一頭，Ellie 帶回更大的線索：她鎖定所謂的「lapis maiden」Arabella——East Aldenard Trading Company 的 Master Guguremu 之女——她即將在 Costa del Sol 的紀念宴上公開露面，宣布與 Brugaire Consortium 的繼承人 Vannes 訂婚。你們在 Costa del Sol 目睹 Guguremu 對危險嗤之以鼻，而 Briardien 冷靜地列出嫌疑人：Vannes、Morgant、Yalto Nolto、Sainana、Guguremu，以及管家 Lewenhart，並表示 duelist 必定已混入其中。你被 Briardien 單獨叫到外頭，他提到那次變裝現場留下的面具上縫著細小的稜鏡，能讓犯人改變外貌；但更可怕的是，犯人連舉止與性格都模仿得滴水不漏。</p>
<p>Briardien 斷言犯人最先假扮的身分，最合理的是 Gerbera 的 Brass Blades，並要你去找一名失蹤的衛士。你找到被綁住、被剝得只剩內衣的 Brass Blade，從他斷斷續續的回憶裡得知：他原本被指派要接觸的人是 Morgant、Yalto Nolto，還有 Lewenhart。Briardien 把人送走後暫時離開，並再三警告你別讓 Hildibrand 闖禍——但 Hildibrand 立刻決定搶在 Briardien 回來前破案，對嫌疑人展開一連串尷尬的「交涉」。當他把目光轉向 Lewenhart 提到的食料木箱時，Ellie 注意到那些「椰子」看起來不對勁，Hildibrand 甚至以為發現爆炸物——直到 Nashu 承認那是她的。眼看 Briardien 返程逼近，你與 Ellie 只能先把他引開，爭取時間讓 Hildibrand 和 Nashu 把危險物撤走，避免整起事件真的在海灘上「爆炸」收場。</p>
</div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
