<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Much Ado About Pudding | BELAUG · FFXIV Library</title>
  <meta name="description" content="Blue Mage – Much Ado About Pudding (SB Patch 4.5)" />
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .muted{color:var(--muted)}
    .clamp{position:relative;max-height:360px;overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{margin-top:12px}
    .expand-btn{
      display:inline-block;padding:8px 14px;border-radius:10px;
      background:var(--card);border:1px solid var(--border);cursor:pointer;font-weight:600;
    }
    .expand-btn:hover{background:#fffef8}

    .spell-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:10px;
      margin-top:10px;
    }
    .spell-card{
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      min-height:56px;
      overflow:hidden;
    }
    .spell-icon{
      width:28px;
      height:28px;
      object-fit:contain;
      flex-shrink:0;
      display:block;
    }
    .spell-name{
      font-weight:600;
      line-height:1.3;
    }

    .skill-inline{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-weight:700;
      white-space:nowrap;
      vertical-align:middle;
    }

    .skill-inline-icon{
      width:22px;
      height:22px;
      object-fit:contain;
      flex-shrink:0;
      display:inline-block;
      vertical-align:middle;
      border-radius:4px;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left">
        <a class="home" href="../index.html">🏠 Home</a>
      </div>
      <div class="right">
        <button id="langToggle" class="icon-btn" aria-label="切換語言">🌐 EN</button>

  <main class="container main">
    <div class="grid">
      <section class="card video-card">
        <div class="bd">
          <div class="video-wrap">
            <iframe id="ytFrame" src="https://www.youtube.com/embed/CiOTDBmH4MQ"
              title="Much Ado About Pudding" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="hd" id="pageTitle">Much Ado About Pudding</div>
        <div class="tabs" role="tablist">
          <button class="tab-btn" role="tab" aria-selected="true"  data-tab="overview">Overview</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="spells">Recommended Spells</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="strategy">Strategy</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="tips">Achievement Tips</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="notes">Notes</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="comments">Comments</button>

        <div class="bd">
          <div id="panel-overview" class="tab-panel active"></div>

            <div id="giscus_container" style="min-height:320px;"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{

    pageTitle:'Much Ado About Pudding',
    tabs:{
      overview:'Overview',
      spells:'Recommended Spells',
      strategy:'Strategy',
      tips:'Achievement Tips',

    },
    readMore:'Show more',
    readLess:'Show less',

    overview:`<div class="stack"><div class="row"><p>A Blue Mage-exclusive stage in the Masked Carnivale. This is Stage 2, and the fight focuses on matching the enemies’ elemental weaknesses across both acts. Act 1 tests wind, ice, and earth coverage, while Act 2 shifts to fire, lightning, and water, so a balanced magical setup is more important than relying on physical damage.</p></div></div>`,

    spells:`<div class="spell-grid">
      <div class="spell-card"><img src="../img/icons/bluemage/024_Flying_Sardine.png" alt="Flying Sardine icon" class="spell-icon"><div class="spell-name">Flying Sardine</div></div>

      <div class="spell-card"><img src="../img/icons/bluemage/006_High_Voltage.png" alt="High Voltage icon" class="spell-icon"><div class="spell-name">High Voltage</div></div>
      <div class="spell-card"><img src="../img/icons/bluemage/001_Water_Cannon.png" alt="Water Cannon icon" class="spell-icon"><div class="spell-name">Water Cannon</div></div>
      <div class="spell-card"><img src="../img/icons/bluemage/009_Song_of_Torment.png" alt="Song of Torment icon" class="spell-icon"><div class="spell-name">Song of Torment</div></div>
    </div>`,

    strategy:`<div class="stack"><div class="row"><div class="clamp" data-collapsed="true">
      <p><b>Act 1</b></p>
      <p>Simply use spells that match the enemies’ weaknesses. However, physical spells such as <span class="skill-inline"><img src="../img/icons/bluemage/046_Mountain_Buster.png" alt="" class="skill-inline-icon">Mountain Buster</span> (which is Blunt + Earth) will not deal much damage.</p>
      <p><b>Act 2</b></p>
      <p>Again, use spells that match the enemies’ weaknesses. However, <span class="skill-inline"><img src="../img/icons/bluemage/038_Fire_Angon.png" alt="" class="skill-inline-icon">Fire Angon</span> (which is Piercing + Fire) counts as physical damage and therefore will not deal much damage.</p>

notes:`<div class="stack"><div class="row"><p class="muted">None</p></div></div>`

      strategy:'攻略',
      tips:'実績攻略',
      notes:'補足',
      comments:'コメント'
    },
    readMore:'全文を表示',
    readLess:'折りたたむ',

    overview:`<div class="stack"><div class="row"><p>青魔道士専用コンテンツ「マスクカーニバル」のステージです。ステージ2では、各Actで異なる敵の属性弱点に合わせて攻撃することが重要になります。Act 1では wind・ice・earth、Act 2では fire・lightning・water への対応が求められるため、物理攻撃よりも属性付きの魔法攻撃を揃えて挑むのが基本になります。</p></div></div>`,

    spells:`<div class="spell-grid">
      <div class="spell-card"><img src="../img/icons/bluemage/024_Flying_Sardine.png" alt="Flying Sardine icon" class="spell-icon"><div class="spell-name">フライングサーディン</div></div>
      <div class="spell-card"><img src="../img/icons/bluemage/033_The_Ram's_Voice.png" alt="The Ram's Voice icon" class="spell-icon"><div class="spell-name">氷結の咆哮</div></div>
      <div class="spell-card"><img src="../img/icons/bluemage/011_Plaincracker.png" alt="Plaincracker icon" class="spell-icon"><div class="spell-name">ブレーンクラッカー</div></div>
      <div class="spell-card"><img src="../img/icons/bluemage/002_Flame_Thrower.png" alt="Flame Thrower icon" class="spell-icon"><div class="spell-name">火炎放射</div></div>
      <div class="spell-card"><img src="../img/icons/bluemage/006_High_Voltage.png" alt="High Voltage icon" class="spell-icon"><div class="spell-name">高圧電流</div></div>
      <div class="spell-card"><img src="../img/icons/bluemage/001_Water_Cannon.png" alt="Water Cannon icon" class="spell-icon"><div class="spell-name">水鉄砲</div></div>
      <div class="spell-card"><img src="../img/icons/bluemage/009_Song_of_Torment.png" alt="Song of Torment icon" class="spell-icon"><div class="spell-name">苦悶の歌</div></div>
    </div>`,

    strategy:`<div class="stack"><div class="row"><div class="clamp" data-collapsed="true">
      <p><b>Act 1</b></p>
      <p>敵の弱点に合った青魔法を使えば問題ありません。ただし、<span class="skill-inline"><img src="../img/icons/bluemage/046_Mountain_Buster.png" alt="" class="skill-inline-icon">マウンテンバスター</span> のような物理青魔法（打属性＋土属性）は、あまりダメージを与えられません。</p>
      <p><b>Act 2</b></p>
      <p>こちらも敵の弱点に合った青魔法を使えば問題ありません。ただし、<span class="skill-inline"><img src="../img/icons/bluemage/038_Fire_Angon.png" alt="" class="skill-inline-icon">ファイアアンゴン</span> は 突属性＋火属性 の物理青魔法扱いのため、あまりダメージは伸びません。</p>
    </div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div></div></div>`,

    tips:`<div class="stack"><div class="row"><p class="muted">なし</p></div></div>`,

notes:`<div class="stack"><div class="row"><p class="muted">なし</p></div></div>`
  },

  ZH:{
    langLabel:'ZH',
    pageTitle:'Much Ado About Pudding',
    tabs:{
      overview:'概要',
      spells:'推薦招式',
      strategy:'攻略流程',
      tips:'成就提示',
      notes:'補充說明',
      comments:'留言'
    },
    readMore:'展開全文',
    readLess:'收合內容',

    overview:`<div class="stack"><div class="row"><p>這是 Blue Mage 專用的 Masked Carnivale 關卡。此關為第 2 關，重點在於依照兩個 Act 中不同敵人的屬性弱點來切換輸出。Act 1 主要考驗 wind、ice、earth，Act 2 則改成 fire、lightning、water，因此比起依賴物理傷害，更重要的是準備好對應屬性的魔法招式。</p></div></div>`,

    spells:`<div class="spell-grid">
      <div class="spell-card"><img src="../img/icons/bluemage/024_Flying_Sardine.png" alt="Flying Sardine icon" class="spell-icon"><div class="spell-name">投擲沙丁魚</div></div>
      <div class="spell-card"><img src="../img/icons/bluemage/033_The_Ram's_Voice.png" alt="The Ram's Voice icon" class="spell-icon"><div class="spell-name">冰凍咆哮</div></div>
      <div class="spell-card"><img src="../img/icons/bluemage/011_Plaincracker.png" alt="Plaincracker icon" class="spell-icon"><div class="spell-name">平原震裂</div></div>
      <div class="spell-card"><img src="../img/icons/bluemage/002_Flame_Thrower.png" alt="Flame Thrower icon" class="spell-icon"><div class="spell-name">火炎放射</div></div>
      <div class="spell-card"><img src="../img/icons/bluemage/006_High_Voltage.png" alt="High Voltage icon" class="spell-icon"><div class="spell-name">高壓電流</div></div>
      <div class="spell-card"><img src="../img/icons/bluemage/001_Water_Cannon.png" alt="Water Cannon icon" class="spell-icon"><div class="spell-name">水槍</div></div>
      <div class="spell-card"><img src="../img/icons/bluemage/009_Song_of_Torment.png" alt="Song of Torment icon" class="spell-icon"><div class="spell-name">苦悶之歌</div></div>
    </div>`,

    strategy:`<div class="stack"><div class="row"><div class="clamp" data-collapsed="true">
      <p><b>Act 1</b></p>
      <p>直接使用符合敵人弱點的招式即可。不過，像 <span class="skill-inline"><img src="../img/icons/bluemage/046_Mountain_Buster.png" alt="" class="skill-inline-icon">山崩</span> 這類物理招式（打擊＋土屬性），傷害不會太高。</p>
      <p><b>Act 2</b></p>
      <p>這一段同樣是使用符合敵人弱點的招式即可。不過，<span class="skill-inline"><img src="../img/icons/bluemage/038_Fire_Angon.png" alt="" class="skill-inline-icon">火投槍</span> 屬於 突刺＋火屬性 的物理招式，因此傷害也不會太高。</p>
    </div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div></div></div>`,

    tips:`<div class="stack"><div class="row"><p class="muted">無</p></div></div>`,

notes:`<div class="stack"><div class="row"><p class="muted">無</p></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  overview: document.getElementById('panel-overview'),
  spells: document.getElementById('panel-spells'),
  strategy: document.getElementById('panel-strategy'),
  tips: document.getElementById('panel-tips'),
  notes: document.getElementById('panel-notes'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') {
    panels[key].innerHTML = t[key];
    if (['strategy','tips','notes'].includes(key)) wireClamp(panels[key], t);
  }
  if (key === 'comments') loadGiscusForCurrentLang();
}

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};

function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }

function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
