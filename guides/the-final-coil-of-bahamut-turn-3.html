        tabs:{story:'Story', req:'Requirements', acq:'Unlock Quest', unlock:'Follow-Up Quest', bgm:'BGM', comments:'Comments'},
        story:`<p><strong>00:00 Cutscene 1</strong></p><p>Bahamut is almost whole again, and Alisaie’s alarm cuts through the air. Alphinaud can barely comprehend the sheer scale of him, and you are pushed to the same question—how did Louisoix ever stand against such a monstrosity? Alisaie refuses to let the restoration proceed any further and urges you to disable the coil and move on—until that familiar figure blocks the way. She calls out, then stops herself cold: that man is dead, and she will not dishonor her beloved grandsire by naming you “Grandfather.” You are only his twisted shade—the thrall of a mad primal.</p><p>Louisoix answers that you were foolish to ignore his warning, and asks if you are so convinced of your own righteousness. Alphinaud holds his ground and says the rightness of your path is exactly why you returned: Eorzea will never be safe while Bahamut remains to threaten everything you hold dear. He invokes the hero who gave his life for the realm and asks if Louisoix truly disputes the justice of your cause.</p><p>Louisoix calls you ignorant grandchildren and says your world is shaped by nothing but recent conflict—then promises to teach you what “justice” truly means. In the twilight of the Third Astral Era, he says, the southern land of Meracydia was invaded by the Allagan Empire, an advance so unstoppable that no atrocity was too depraved to serve its purpose.</p><p>Desperate for salvation, the dragons prayed to one of the first brood—to their ancestor Bahamut. Fed by the power of their fervent supplications, Bahamut rose from the abyss of death and took wing as the Meracydians’ newborn god. Yet Louisoix says that miracle only furthered the maniacal designs of their conquerors, and the cruel fetters that bind his lord stand as proof of the Allagans’ boundless greed and hubris.</p><p>He says he once invoked the Twelve to forestall the advent of the Seventh Umbral Era—and then demands an answer: what did the dragons of Meracydia do that he did not, and why are they accursed while he is exalted? He condemns man’s overweening belief in his own primacy, calls it the root of tyranny, and declares that as long as man is suffered to remain, the dragons will never know peace. Only when the plague of people has been expunged, he says, will the children of Lord Bahamut be free—and only then will the world know true justice.</p><p>Alisaie snaps that Louisoix would never say such things, and insists his belief that people were worth saving never faltered. He had faith in their strength, she says—faith that they could stand together and push back the darkness that sought to shape them. Louisoix dismisses it as false hope and scoffs at “standing together,” saying they would first need to agree on which direction to face, and that history proves man cannot find common ground between his own two feet. Even you—twins who share the same blood—cannot fathom each other’s reasoning, he says, hiding differing agendas behind the convenient banner of Eorzea’s salvation; and he taunts that the twin grimoires he bestowed were wasted.</p><p>Alphinaud concedes there may be truth in Louisoix’s judgment of you both, but says this one-sided tirade against man rings false from the lips of Archon Louisoix. He demands to know whether Louisoix champions dragons because Bahamut compels him as a thrall—or because he has transcended the limits of man’s existence. Louisoix answers that what he prayed for and what he has become are the keys to the truth behind Eorzea’s rebirth, and if you would have them, you must take them by force—so he bids you rend this divine form asunder and claim your answers. Alisaie reels, realizing he has become a primal, and Alphinaud forces the truth into the open: this is no phantom or impostor—it is your beloved grandsire. For his sake and for yours, Alisaie begs you to defeat your grandfather.</p><p><strong>09:14 Cutscene 2</strong></p><p>Alisaie steels herself and says that her grandfather is truly gone this time—yet better it end this way than the alternative. But then Louisoix answers her, quietly insisting that he is still here, calling her his dear, sweet granddaughter. Alisaie falters, scarcely daring to believe it, and whispers his name as a question.</p><p>Louisoix turns to you and thanks you, Warrior of Light. Without your valor, he says, he might never have broken free of Bahamut’s control. These last few moments are his to live as the man he once was. Alisaie says this is all she ever wanted, yet now that it is happening, she can hardly believe it—she asks if it is truly him.</p><p>Alphinaud asks Louisoix to forgive his insolence, saying he never meant to demean him. Louisoix tells him there is nothing to forgive—he is proud of him, proud that Alphinaud was wise enough to deduce what manner of creature he had become. Then he addresses both twins and says that if anyone here should beg forgiveness, it is he.</p><p>Alisaie presses the question she has carried for so long: will he tell you what befell during the Calamity? Louisoix agrees. You have come far to hear the truth, he says, and so you will begin at the Battle of Carteneau, where the forces of the Garlean Empire and the Eorzean Alliance clashed.</p><p>He says it was there, in the sky above the surging armies, that the elder primal Bahamut broke free of the red moon, Dalamud. To contain that avatar of destruction, Louisoix called upon the Twelve to aid him in creating a prison of aether—but Bahamut would not be caged by such feeble bars. His might was too vast; his rage too fierce.</p><p>With little choice remaining, Louisoix says he used the last of his strength to entrust your hope to the future—and prepared to meet his end.</p>`,

      JP:{
        langLabel:'JP',
        pageTitle:'大迷宮バハムート：真成編3',
        tabs:{story:'ストーリー', req:'必要条件', acq:'開放クエスト', unlock:'後続クエスト', bgm:'BGM', comments:'コメント'},
        story:`<p><strong>00:00 カットシーン 1</strong></p><p>バハムートはほとんど完全な姿に戻りつつあり、アリゼーの焦りが走る。アルフィノはその巨体に言葉を失い、あなたもまた、ルイゾワがどうやってこんな怪物に立ち向かったのか想像すらできない。これ以上進ませるわけにはいかない――アリゼーはコイルを停止して先へ進もうと促すが、立ちはだかる影を見た瞬間、呼びかけかけて言い淀む。あの人は死んだ、自分は敬愛する祖父の記憶を汚すような呼び方はしない。あなたの前にいるのは、歪んだ残滓――狂える蛮神の従属者にすぎない、と。</p><p>ルイゾワは、警告を無視したのは愚かだったと言い、己の正しさをそこまで信じているのかと問う。アルフィノは退かず、正しさゆえに戻ったのだと告げる。バハムートが脅威である限り、エオルゼアは決して安らがない。さらに、世界を守るため命を捧げた英雄の正義を持ち出し、あなたたちの大義の正当性を本当に否定するのかと迫る。</p><p>ルイゾワは、無知な孫たちだと言い放ち、近年の争いだけで世界を測るなと告げる。そして「正義」について語り始める。第三星暦の薄明、南方の地メラシディアはアラグ帝国に侵攻され、目的のためならいかなる暴虐も厭わぬアラグの軍勢は、止めようのない勢いで進軍したのだ、と。</p><p>救いを求めた竜たちは、ファーストブロッドのひとり――祖たるバハムートへ祈りを捧げた。熱烈な祈りの力を受け、バハムートは死の深淵から甦り、メラシディアの新たな神として翼を広げた。だがその奇跡すら、侵略者たちの狂気じみた企図をさらに推し進めただけだとルイゾワは言う。主を縛る残酷な枷は、アラグの底知れぬ強欲と驕慢の証だ、と。</p><p>自分は第七霊災の到来を阻むため、かつて十二神を招来した――そう語ったうえで、ルイゾワは問い詰める。メラシディアの竜が自分と違う何をしたというのか、なぜ彼らは呪われ、自分は称えられるのか。人は自らの優位を信じすぎ、その傲慢が真の暴政を生む。人が存続を許される限り、竜に安寧はない。人という疫病が根絶されてこそ、主バハムートの子らは解き放たれ、世界は真の正義を知るのだ、と。</p><p>アリゼーは叫ぶ。祖父がそんなことを言うはずがない。人は救うに値するという信念は揺らがず、力を信じ、共に立ち上がって闇を退けられると信じていた、と。だがルイゾワは、それは偽りの希望だと切り捨て、「共に立つ」など笑止だと言う。まず向くべき方向すら一致しないのが人であり、歴史が示すとおり、人は自分の両足の間にすら共通の足場を見出せない。血を分けた双子でさえ互いの理を測れず、エオルゼア救済という都合のよい旗の下に別々の思惑を隠している――そして自分が授けた双子の魔導書も、無駄な施しだったらしい、と嘲る。</p><p>アルフィノは、あなたたちへの評価に真実が混じるかもしれないと認めつつも、これほど人を断罪する独善的な演説が、アーコン・ルイゾワの口から出るのは不自然だと言う。そして問う。竜のために語るのは、バハムートの従属者として強いられているからなのか、それとも人の枠を超えた存在になったからなのか。ルイゾワは答える。自分が祈り、そして成ったもの――それこそがエオルゼア再生の真実を開く鍵だ。その鍵が欲しいなら力ずくで奪え、と。そして神なるこの姿を引き裂き、答えを掴み取れと挑発する。アリゼーは、祖父が蛮神になったのかと震え、アルフィノは突きつける――これは幻でも偽物でもない、あなたたちの敬愛する祖父そのものだ。だからこそ、アリゼーは懇願する。祖父のため、そしてあなたたち自身のために、祖父を倒してほしい、と。</p><p><strong>09:14 カットシーン 2</strong></p><p>アリゼーは身を固め、祖父は今度こそ本当にいなくなってしまったのだと言う。だが、別の結末を迎えるよりは、これでよかったのかもしれない――そう言いかけた、そのとき。</p><p>ルイゾワが静かに応える。自分はまだここにいる、愛しい孫娘よ、と。アリゼーは息を呑み、信じきれないまま祖父の名を確かめるように口にする。</p><p>ルイゾワはあなたへ向き直り、光の戦士に礼を述べる。あなたの勇気がなければ、バハムートの支配から逃れることは叶わなかっただろうと言う。そして今このわずかな時間だけは、かつての自分として生きられるのだと。アリゼーは、望んでいたのはただそれだけなのに、いざ現実になると信じられないと言い、本当に祖父なのかと問いかける。</p><p>アルフィノは、無礼を許してほしいと謝る。侮辱するつもりはなかったのだ、と。ルイゾワは赦しなど要らぬと言い、むしろ誇りに思うと告げる。自分がどのような存在になっていたかを見抜けたのだから、と。そして双子に呼びかけ、詫びるべき者がいるとすれば、それは自分だと言う。</p><p>アリゼーは、長く胸に抱えてきた問いを口にする。霊災のとき何が起きたのか、話してくれないのか、と。ルイゾワは頷き、もちろんだと言う。真実を聞くためにあなたたちは遠くまで来たのだから、と。</p><p>そして語り始める。カルテノー平原の戦い――ガレマール帝国軍とエオルゼア同盟軍が激突した場所から始めよう、と。そこでは、押し寄せる軍勢の上空で、エルダー・プライマルであるバハムートが、赤き月ダラガブから解き放たれたのだと言う。</p><p>その破壊の化身を抑え込むため、ルイゾワは十二神に力を借り、エーテルの牢獄を創り出そうとした。だが、あまりに巨大な力とあまりに激しい怒りの前に、そんな脆い檻ではバハムートを閉じ込められなかった。</p><p>選択肢はほとんど残されていなかった。ルイゾワは最後の力を振り絞り、希望を未来へ託し――そして自らの終わりに備えたのだと。</p>`,

        story:`<p><strong>00:00 過場動畫 1</strong></p><p>Bahamut 幾乎又要恢復完整，Alisaie 的驚惶立刻湧上來。Alphinaud 望著那駭人的巨軀，說他幾乎無法想像 Louisoix 當年是怎麼對抗這種怪物。Alisaie 說這不能再繼續下去，催你立刻關閉 coil 然後前進——可那道身影出現時，她還是失聲喊了出來，隨即硬生生收住。她說那個人已經死了，她不會用那個稱呼去褻瀆自己敬愛的祖父；站在你面前的，只是扭曲的殘影，是被瘋狂 primal 支配的奴僕。</p><p>Louisoix 冷冷回應，說你們無視他的警告是愚蠢，還反問你們是否如此堅信自己的「正義」。Alphinaud 不退，說正因為你們的道路是正確的才會回來：只要 Bahamut 還在威脅你們珍視的一切，Eorzea 就永遠不可能安全。他追問 Louisoix，難道要否認你們的事業是正當的，否認那位為了守護世界而付出生命的英雄的正義嗎。</p><p>Louisoix 說你們只是可憐又無知的孫輩，世界不該只用近代的衝突去理解，並要你們聽他談「正義」。他說在第三星曆的暮色中，南方的 Meracydia 遭到 Allagan（古代亞拉戈帝国）入侵；Allag（古代亞拉戈帝国）的軍勢為達目的無所不為，殘虐到毫無底線，進軍之勢更是勢不可擋。</p><p>走投無路的龍們向第一世代的一位祈禱，向牠們的祖先 Bahamut 祈禱。被那份熾烈的祈願灌注後，Bahamut 從死亡的深淵中再度起身振翼，成為 Meracydia 的新生之神。可 Louisoix 說，這場奇蹟只讓征服者的瘋狂算計更容易得逞；如今束縛著他主人的殘酷枷鎖，正是 Allagan（古代亞拉戈帝国）無邊貪婪與傲慢的明證。</p><p>他說自己曾召喚 Twelve，試圖阻止「第七靈災」的到來，接著反問：Meracydia 的龍們做了什麼是他沒有做的，為何牠們被詛咒，而他卻被推崇？他斥責人類過度迷信自身的優越，才會看不見自己同樣身處暴政之中；只要人類還被允許存在，龍就永遠得不到安寧。唯有當「人」這場瘟疫被徹底剷除，Lord Bahamut 的孩子們才會獲得自由，世界才會知道真正的正義。</p><p>Alisaie 怒吼要他住口，說 Louisoix 絕不可能講出這種話；祖父始終相信人值得被拯救，從未動搖。他相信人擁有力量，相信人能夠並肩站在一起，把試圖塑造他們的黑暗推回去。Louisoix 卻說那只是虛假的希望，說把信念寄託在如此有缺陷的種族上是愚行；他嘲笑所謂「站在一起」，說人連該朝哪個方向面對都先談不攏，歷史早已證明人甚至無法在自己兩隻腳之間找到共同立場。就連血脈相同的雙胞胎也難以理解彼此的理由，還把各自的盤算藏在「拯救 Eorzea」這面方便的旗幟之下——甚至連他交給你們的那對雙子魔導書，看來也只是徒勞。</p><p>Alphinaud 承認 Louisoix 對你們的評斷或許不無道理，但也說這種片面咒罵人類的說教，從 Archon Louisoix 的口中說出來反而顯得虛假。他逼問：Louisoix 會為龍辯護，是因為身為 Bahamut 的奴僕而被迫如此，還是因為他自己已經超越了人類存在的界限？Louisoix 回答，自己曾祈求的事、以及自己如今成為的存在，正是解開 Eorzea 重生真相的鑰匙；若你們想要，就只能用武力奪走——來吧，把這具神聖形體撕裂，拿走你們要的答案。Alisaie 震驚得幾乎站不穩，說她原本以為——他竟然成了 primal？Alphinaud 逼你接受現實：那不是幻影，也不是冒名者，而是你們敬愛的祖父本人。Alisaie 只能央求你，為了他，也為了你們自己——請你打倒你們的祖父。</p><p><strong>09:14 過場動畫 2</strong></p><p>Alisaie 強迫自己冷靜下來，說這一次 Louisoix 真的已經不在了；但比起另一種結果，或許這樣反而更好——她才剛說出口，Louisoix 的聲音就回應了她，說他還在這裡，喚她為自己親愛、甜美的孫女。Alisaie 立刻愣住，像是連呼吸都不敢太用力，只能顫聲叫出：「祖父……？」</p><p>Louisoix 轉向你，向光之戰士致謝。他說若不是你的英勇，他或許永遠無法掙脫 Bahamut 的控制；而這最後的片刻，終於能讓他以「曾經的那個人」活下去。Alisaie 說這正是她一直以來唯一的願望，可當它真的發生，她卻反而不敢相信——她問，這真的是你嗎？</p><p>Alphinaud 立刻向 Louisoix 請求寬恕，說自己先前的頂撞並非出於侮辱。Louisoix 卻說不必道歉，他反而為 Alphinaud 感到驕傲：你足夠聰明，能推斷出他究竟變成了什麼。接著他叫出 Alphinaud 與 Alisaie 的名字，說若真要有人請求原諒，那個人其實是他自己。</p><p>Alisaie 終於問出她壓在心底很久的事：關於那場 Calamity，當時到底發生了什麼——他願不願意告訴你們？Louisoix 答應了，說你們一路走到這裡，就是為了聽見真相。</p><p>於是他要你們從 Carteneau 的那場戰役開始說起——Garlean Empire 與 Eorzean Alliance 的軍勢在那裡正面衝突；就在那片戰場上空，elder primal Bahamut 從紅色的月球 Dalamud 中掙脫而出。為了遏止那個破壞的化身，Louisoix 召喚 Twelve，嘗試以以太打造一座牢獄把他困住。</p><p>可 Bahamut 不可能被那樣脆弱的枷鎖囚禁：他的力量太過龐大，怒火也太過兇猛。Louisoix 說自己幾乎已別無選擇，只能用最後的力量把希望託付給未來，並準備迎接自己的終局。</p>`,

    const langToggle = document.getElementById('langToggle');
    const pageTitle  = document.getElementById('pageTitle');
    const tabBtns    = [...document.querySelectorAll('.tab-btn')];
    const panels = {
      story : document.getElementById('panel-story'),
      acq   : document.getElementById('panel-acq'),
      req   : document.getElementById('panel-req'),
      unlock: document.getElementById('panel-unlock'),
      bgm   : document.getElementById('panel-bgm'),
      comments: document.getElementById('panel-comments')
    };

    function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
    function applyLang(lang){
      const t = i18n[lang] || i18n.EN;
      pageTitle.textContent = t.pageTitle;
      langToggle.textContent = `🌐 ${t.langLabel}`;
      tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
      const activeBtn = tabBtns.find(b=>b.getAttribute('aria-selected')==='true') || tabBtns[0];
      renderPanel(activeBtn.dataset.tab, lang);
      if (activeBtn && activeBtn.dataset.tab === 'comments') loadGiscusForCurrentLang();
    }

    function renderPanel(key, lang){
      const t = i18n[lang] || i18n.EN;
      Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
      panels[key].classList.add('active');
      if (key !== 'comments') {
        panels[key].innerHTML = t[key];
      } else {
        loadGiscusForCurrentLang();
      }
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click',()=>{
        tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab, getLang());
      });
    });

    langToggle.addEventListener('click',()=>{
      const cur=getLang();
      const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
      localStorage.setItem(LANG_KEY,next);
      applyLang(next);
    });

    applyLang(getLang());

    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };
    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }
  </script>
