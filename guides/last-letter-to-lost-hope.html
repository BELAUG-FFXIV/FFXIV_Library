}

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Last Letter to Lost Hope',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>In Horizon, Fufulupa calls you over and, with a mix of formality and worry, asks for your help. He explains that he recently sent a missive to Lost Hope, addressed to Captain Leofric, who was transferred there some time ago. Since then, the two have been exchanging letters, but never before has a reply taken this long. Fufulupa fears that something may have happened to the courier on the way. If she had run into trouble between Horizon and Scorpion Crossing, the Brass Blades patrolling those roads would surely have noticed. And if she had made it all the way to Black Brush Station, the letter should already have reached Lost Hope, which lies practically on its doorstep. Convinced that the delay can only mean misfortune along the route, he asks you to search the road to Black Brush Station in central Thanalan and, with a little luck, find the missing courier.</p>
      <p>Following Fufulupa’s directions, you travel into central Thanalan and make your way along the road toward Black Brush Station. There, you come upon a courier named Seseli, tending anxiously to her chocobo by the roadside. When you ask about the letter, she produces Fufulupa’s missive without hesitation, admitting that she has it with her. However, she explains that her bird has injured its leg, and even a small cut can fester badly if left untreated. Until she finishes caring for the wound, she cannot in good conscience push her mount any farther. Since Fufulupa has sent you in person, Seseli suggests that, if the matter is truly pressing, you take the letter yourself. She tells you that Lost Hope lies just past Black Brush Station to the northeast: look for the cluster of tents by the river, and if you cross the water, you have gone too far.</p>
      <p>With the missive in hand, you continue on to Lost Hope and find a grim refugee settlement huddled beside the river. There, Leofric greets you with a guarded question, asking whether you are merely passing through or intend to stay awhile. When you present Fufulupa’s letter and explain why you have come, he sighs that the boy is still far too earnest, sending someone all this way over a late reply and continuing to address him as “Captain” despite his demotion and transfer to this place. Leofric goes on to say that the Brass Blades care nothing for the settlement—nor does anyone in Ul’dah. The refugees and the men assigned to watch over them have all been forsaken, and you, too, will be cast aside if you are seen associating with them. Even so, he thanks you for delivering the letter, then advises you, for your own sake, to leave Lost Hope before you become entangled in its fate.</p>
    </div>

    followq:`<div class="stack">

  JP:{
    langLabel:'日本語',
    pageTitle:'貧民街の連隊長',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ホライズンで詰所に立つフフルパは、どこか落ち着かない様子であなたを呼び止め、頼みごとがあるのだと切り出す。彼は、最近ロストホープ流民街に向けて一通の手紙を送ったものの、あまりにも返事が遅いことを気にかけていた。その手紙の相手は、かつて共に働いていたレオフリック元連隊長。異動後も文通を続けてきたが、これほど返信が滞ったことは一度もなかったという。そのためフフルパは、手紙を託した配達人の身に、道中で何か不測の事態が起きたのではないかと案じていた。もしホライズンとスコーピオン・クロッシングの間で問題が起きていれば、街道を巡回するブラスブレードたちが気付いているはずだし、ブラックブラッシュ停留所まで辿り着いていれば、ロストホープ流民街はすぐ近くだから、とうに手紙は届いているはずだ。そう考えた彼は、原因は中央ザナラーンの道中にあるに違いないと判断し、ブラックブラッシュ停留所へ向かう街道沿いを探して、行方知れずの配達人を見つけてほしいと、慎ましくも切実な依頼をする。</p>
      <p>フフルパの指示に従い、あなたは中央ザナラーンへ向かい、ブラックブラッシュ停留所へと続く道を進む。やがて街道脇で、チョコボの脚を気遣いながら世話をしている配達人セセリの姿を見つける。話を聞けば、彼女は確かにフフルパの手紙を預かっており、その書簡も荷物の中からすぐに取り出してみせる。しかし、肝心のチョコボは脚に傷を負っており、たとえ小さな切り傷でも、手当てを怠ればたちまち悪化してしまうのだと、セセリは真剣な面持ちで語る。このままでは当分先へ進めないため、自分が手紙を届けるのは難しいが、フフルパがあなたを寄越したということは急ぎの用件なのだろうと察し、代わりに投函してくれないかと提案する。ロストホープ流民街はブラックブラッシュ停留所を抜けて北東へ進んだ先、河岸に並ぶ天幕が目印であり、もし川を渡ってしまったなら行き過ぎなので引き返すようにと、彼女は道順を丁寧に教えてくれる。</p>
      <p>こうして手紙を預かったあなたは、指示どおりに進んでロストホープ流民街へ向かい、川沿いに肩を寄せ合うように建つ天幕の集落に辿り着く。そこで出会ったレオフリックは、あなたを一瞥し、ここを通りかかっただけなのか、それとも留まるつもりなのかと、探るように問いかけてくる。フフルパの手紙を差し出し、経緯を説明すると、彼は小さくため息をつき、遠くホライズンから使いを寄越すとは、あの少年は相変わらず生真面目すぎると苦笑する。自分が左遷されてなお「連隊長」と呼び続けることからして、ここロストホープ流民街へ送られる意味を、彼はまだ理解していないのだろうと呟きつつ、レオフリックはこの地の現実を語る。ブラスブレードも、ウルダハの誰ひとりとして、この流民街を気にかけはしない。ここにいる流民たちも、その護衛を任された者たちも、皆が見捨てられているのだと。そして、そんな自分たちと親しく言葉を交わしていれば、あなたもまた同じように切り捨てられるだろうと警告する。最後に彼は、手紙を届けてくれたことにはきちんと礼を述べながらも、あなた自身のためだと言って、この場を早々に立ち去るよう静かに促すのだった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> フフルパ　西ザナラーン <small class="muted">(X:22.6, Y:17.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-perfect-swarm.html">五月蝿いヤツら</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 10～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="heir-today-gone-tomorrow.html">その男、サー・キヴロン</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'貧民區的聯隊長',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Horizon 的據點裡，Fufulupa 神情緊張地把你喚了過來，開口便說自己有一件事情想拜託你。他說，前陣子才剛寫了一封信，託人送往難民聚落 Lost Hope，收信人是被調職到那邊的 Captain Leofric。自從對方被調離之後，他們就一直透過書信往來，可是這一次，回信拖得異常地久，完全不像以往那樣準時。也因此，Fufulupa 擔心起來，懷疑也許是在途中替他送信的信差出了什麼意外。如果是在 Horizon 和 Scorpion Crossing 之間遇到麻煩，巡邏那段道路的 Brass Blades 早該有所發現；而要是已經一路抵達 Black Brush Station，照理說 Lost Hope 幾乎就在旁邊，信不可能還沒送到。這麼一來，他只好認定問題肯定出在前往 Black Brush Station 的那段路上，於是拜託你沿著 Central Thanalan 那條道路搜尋，一旦找到失蹤的信差，就能弄清楚信件的去向。</p>
      <p>你按照 Fufulupa 指示的方向往 Central Thanalan 前進，順著通往 Black Brush Station 的道路走去。沒過多久，就在路邊看見一位名叫 Seseli 的信差，正蹲在一隻 chocobo 身旁細心處理牠受傷的腿。當你問起信件時，她很乾脆地從隨身行囊裡拿出 Fufulupa 的來信，承認信的確還在自己身上。只是，她無奈地解釋，自己的鳥兒在路上受了傷，哪怕只是一點小小的傷口，只要放著不管就很可能惡化感染，在那之前她實在不能勉強牠繼續趕路。既然 Fufulupa 特地請你親自跑一趟，想必這封信對他來說十分重要，於是她提議，不如就由你代替她把信送到目的地。Seseli 告訴你，Lost Hope 就在 Black Brush Station 之後往東北方的方向走不遠處，沿著路走到靠河一帶的帳篷群就是，如果不小心穿過河面，就代表走得太遠，需要折返。</p>
      <p>接下這封信後，你依言前往 Lost Hope，在河邊一片灰塵與砂礫之中，看見一整片簡陋的帳篷聚集成形，難民們在那裡勉強維持生活。駐守於此的 Leofric 迎上前來，先問你只是路過，還是打算在這裡多待一陣子。當你說明自己是替 Fufulupa 送信而來，並把信件交到他手上時，他不禁嘆了一口氣，說那個孩子還是太認真了，居然會為了一封遲到的回信，特地把冒險者從遠方叫到這種地方。他提起，儘管自己已經遭到降職、被調來 Lost Hope，Fufulupa 卻仍然習慣稱呼他為「Captain」，大概還沒有真正明白被丟到這裡意味著什麼。Leofric 接著坦言，Brass Blades 根本不把這個聚落放在眼裡，Ul’dah 的上層更是如此——這裡的難民和負責守備的士兵早就一起被整個城市遺棄了。如果你被人看見和這些人走得太近，遲早也會跟著被劃入同一個圈子，成為被放棄的一群。他一方面感謝你專程送來這封信，另一方面卻仍為你的安危著想，勸你趁現在還能全身而退時，儘快離開 Lost Hope。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 弗弗魯帕　西薩納蘭 <small class="muted">(X:22.6, Y:17.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-perfect-swarm.html">嗡嗡嗡的傢伙們</a></div>
      <div class="row">所有職業（不含限定職） 等級 10 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="heir-today-gone-tomorrow.html">其名為屈伊伯龍男爵</a></div>

  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
