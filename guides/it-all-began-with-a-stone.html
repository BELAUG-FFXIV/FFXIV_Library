<script>
const LANG_KEY='ffxiv-guide-lang';
const i18n={
  EN:{
    langLabel:'EN',
    pageTitle:'It All Began with a Stone',
    tabs:{story:'Story',acq:'Acquisition',unlockq:'Unlock Quest',followq:'Follow-Up Quest',comments:'Comments'},
    readMore:'Show more',readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Prishe comes to, and Bakool Ja Ja presses her for answers—why she attacked, and what she was doing calling them “taurus.” She stares at you and struggles to place you, repeating your name alongside Bakool Ja Ja’s, then decides you look like a Hume and the adventuring type. When Bakool Ja Ja demands an explanation, she insists she has no idea what he means, yet admits she remembers fighting taurus not long ago—supposedly to protect Ulmia.</p><p>Bakool Ja Ja seizes on the name. He points out she was addressing Gulool Ja Ja’s shade as “Ulmia,” and starts piecing together a possibility: the incantations used to summon the shade are rooted in older magicks said to cloud minds. If their enemy can summon Gulool Ja Ja, then twisting someone’s perception would not be beyond them. Bakool Ja Ja concludes Prishe was likely tricked into believing the shade was Ulmia, and Prishe—caught between disbelief and dawning clarity—accepts that what she saw may have been an illusion.</p><p>As her memory returns in fragments, Prishe recalls someone warning her that a dear friend needed her protection. She remembers that person was blue—like Bakool Ja Ja’s left head—and that he handed her bizarre weapons. She says she normally fights with her fists, but accepted them without hesitation, blaming magick for how easily she went along. She can’t tell you where the “Ulmia” she pursued might be, only that when she arrived, she was alone—and that this place is Jeuno, or something close to it, with nothing here matching what she remembers.</p><p>Bakool Ja Ja orders you to go with Prishe and learn what you can, while he stays behind to keep watch on the rift. In the emptied streets, Prishe proposes checking the Tenshodo in the back of Neptune’s Spire. Along the way, you hear the same confusion from those still lingering: one fears Mamool Ja siege and invasion; another recognizes the names San d’Oria, Bastok, and Windurst but not your homeland; a third explains Jeuno’s layout—built upon Heavens Bridge between Quon and Mindartia, with ports and Ru’Lude Gardens—then admits all routes out of Lower Jeuno seem blocked, and even teleport and recall do nothing.</p><p>At the Tenshodo entrance, the wall refuses to budge. Prishe exhales, resigned that you won’t be meeting Aldo—the head of the Tenshodo who always helps when the world is in danger. With no clearer lead, you return to Bakool Ja Ja and confirm what you learned: Jeuno is real to the people here, but unknown to anything they know of Tural. Then the wounded armor-clad wanderer appears—alive, grateful, and reaching for Prishe with visible relief—only for her to look at him blankly and say she has never seen him before.</p><p>Bakool Ja Ja decides they need a name for the wanderer and gives him one: Alxaal—“vagabond” in the Mamool Ja tongue, close to “adventurer” in yours. Alxaal accepts it, and admits Jeuno feels familiar even if he can’t explain why. Before anyone can untangle more, a familiar voice intrudes: Sareel Ja steps out, and Prishe instantly accuses him as the one who put her under a spell. Sareel Ja confirms it—this is the Grand Duchy of Jeuno, but not the real one: it is an imitation he created from visions of another world.</p><p>Sareel Ja explains how it happened. While others were occupied with the Dawnservants’ coronation, he and Zoraal Ja went to the gate of the golden city, believing they held the key and the power to reshape the world. But to the “Resilient Son,” Sareel Ja was a disposable tool—struck down and left for dead. He survived, crawled through the still-open gate, and found only emptiness—a space beyond time—where he beheld another world called Vana’diel. From those visions, he shaped Jeuno and even conjured phantoms as they once did with Gulool Ja Ja, only now strengthened by a stone of immense power—electrope—which lets his creations persist as long as he wishes.</p><p>The truth hits hard. If everything here is his making—everything they thought was from Vana’diel—then Prishe and Alxaal begin to question what they are. Sareel Ja dismisses them as trivial threads, then boasts of the “endless possibilities” he gleaned in the Walk of Echoes: the buried memories there, remnants of echoes, will let him turn dreams into reality. He declares Zoraal Ja dead to him, vows to raise the greatest ruler the world has ever known, and promises he will soon draw upon echoes again to summon the greatest beings of Vana’diel—binding their strength to a magnificent shade that unites reason and resolve with uncompromising tyranny. When you challenge him, Sareel Ja only revels in your defiance, saying his preparations will take time—and that he will call upon you when he is ready—then vanishes, leaving Bakool Ja Ja raging and Prishe and Alxaal staring into the sudden doubt of their own existence.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Prishe <small class="muted">(Lower Jeuno, X:6.0, Y:7.2)</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="that-world-was-called.html">That World Was Called</a></div></div>`

  JP:{
    langLabel:'JP',
    pageTitle:'すべての起こりは「石」',
    tabs:{story:'ストーリー',acq:'入手方法',unlockq:'開放クエスト',followq:'後続クエスト',comments:'コメント'},
    readMore:'全文を表示',readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>プリッシュが目を覚ますと、バクージャジャは彼女に問いただす。なぜ襲いかかったのか、なぜ自分たちを「タウルス」と呼んだのか。プリッシュはあなたの名とバクージャジャの名を言い直し、あなたを見上げながら「ヒュームみたいだ」と言って、冒険者らしいと決めつける。だが詰め寄られると、何のことだかわからないと首を振りつつ、少し前に「タウルス」と戦った覚えがある、とだけ認める――ウルミアを守るために。</p><p>バクージャジャはその名に反応する。プリッシュは「ウルミア」と呼びかけながらグルージャジャの影に向かっていたのだ、と指摘し、状況を整理し始める。影を呼び出すための呪文は、より古い魔法体系に基づくもので、人の心を曇らせる力があるという。敵がグルージャジャの影を召喚できるほどの手練れなら、認識をねじ曲げる術も使えたはずだ。つまりプリッシュは、影をウルミアだと信じ込まされていた可能性が高い――そう結論づけると、プリッシュもまた、あれは幻だったのかもしれないと受け入れ始める。</p><p>断片的に戻りつつある記憶の中で、プリッシュは語る。大切な友を守れと告げた者がいたこと、その者はバクージャジャの左の頭のように青く、奇妙な武器を渡してきたこと。普段は拳で戦う自分が、迷いなくそれを受け取ったのは魔法のせいだろう、と彼女は言う。だが「ウルミア」がどこにいるのかはわからない。自分がここへ来たときは独りで、ここはジュノだと思うが、以前のジュノにはなかったものばかりだ――そんな違和感だけが残っている。</p><p>バクージャジャは、あなたにプリッシュと行動するよう命じ、自分は裂け目を監視すると言う。プリッシュはネプチューンの塔の奥にある天晶堂へ寄ろうと提案する。街を巡るうち、残された者たちも同じ混乱を口にする。マムージャの侵攻を恐れて取り乱す者、サンドリアやバストゥークやウィンダスの名は知っていてもあなたの故郷は知らないと言う者、そしてジュノはクォンとミンダルシアを結ぶ天晶橋の上に築かれ、港やル・ルデの庭があるはずだと説明しながらも、いまは下層ジュノからの出口が塞がれ、転移や帰還の術すら効かないと嘆く者がいる。</p><p>天晶堂の入口は押しても動かず、プリッシュは溜息をつく。これではアルドに会えない――世界が危機に瀕したとき、いつも助けてくれる天晶堂の頭領だという。手掛かりが得られないまま戻ると、あなたはバクージャジャに報告し、ここが確かに「ジュノ」と呼ばれていること、だがトラルの知識とは噛み合わないことを伝える。そこへ、傷を負っていた鎧の旅人が現れ、プリッシュの無事に安堵して駆け寄るが、プリッシュは彼を見ても心当たりがないと言い切り、場の空気が凍りつく。</p><p>名も思い出せぬ旅人に、バクージャジャは名を与える。「アルクサール」――マムージャの言葉で「放浪者」、あなたの言葉なら「冒険者」に近い響きだという。旅人はその名を受け入れ、ここがどこなのかを改めて問う。プリッシュはジュノだと告げ、旅人もどこか懐かしさを覚えると言う。だが答えに辿り着く前に、聞き覚えのある声が割って入る。サリール・ジャが姿を現し、プリッシュは自分に術をかけた張本人だと断じる。サリール・ジャは、ここがジュノ公国だと認めながらも、これは本物ではなく、別世界の幻視をもとに創り上げた模造だと告げる。</p><p>サリール・ジャは経緯を語る。暁王たちの戴冠が行われていた頃、彼はゾラージャとともに黄金の都の門へ向かい、鍵と世界を作り変える力を握ったと思っていた。だが「不屈の息子」にとって自分は捨て駒で、打ち倒されたはずだった。それでも門が開いたままだったことで、彼は這うようにして境界を越え、時の外にある空虚――暗い広がりで別世界を見た。その世界の名はヴァナ・ディール。彼はその幻視からジュノを織り上げ、かつて兄弟の武勲でグルージャジャの影を作り出したときのように、儀式具で幻に命を吹き込めたのだと言う。さらに、強大な力を持つ石――エレクトロープ――があれば、創造物は望む限り存続するのだと。</p><p>真実は重い。見えているものがすべてサリール・ジャの創造なら、プリッシュもアルクサールも、自分たちが何者なのかを疑い始める。サリール・ジャはそれを些末だと切り捨て、「ウォークオブエコーズ」で得た無限の可能性を誇示する。そこに埋もれた記憶、残響の残滓が夢を現実へ変えるのだ、と。彼はゾラージャを見限り、自らの手で世界最高の支配者を生み出すと宣言し、やがてエコーズから再び力を引き出してヴァナ・ディールの偉大なる存在を召喚し、その力を「壮麗なる影」と一つにすると言い放つ。あなたが立ち向かうと言えば、サリール・ジャはそれを愉しむように受け止め、準備が整えば必ず呼び出すと告げて姿を消す。残されたのは、怒りに震えるバクージャジャと、存在そのものを揺さぶられ沈黙するプリッシュとアルクサールだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> プリッシュ <small class="muted">(ジュノ下層, X:6.0, Y:7.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="an-otherworldly-encounter.html">交わる世界</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="that-world-was-called.html">その世界の名はヴァナ・ディール</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'一切始於一顆石頭',
    tabs:{story:'故事概要',acq:'取得方式',unlockq:'解鎖任務',followq:'後續任務',comments:'留言'},
    readMore:'展開全文',readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Bakool Ja Ja 盯著 Prishe，直截了當要她交代：為什麼要襲擊你們、又為什麼一邊胡言亂語說你們是「taurus」。Prishe 先是把你們的名字又問了一遍，喊著你的名字和 Bakool Ja Ja 的名字，接著盯著你看，說你看起來像 Hume (這是 Vana’diel（FFXI 世界觀）裡的「種族名」，等同於「人類」。在這段對話裡，Prishe 的意思是「你看起來像人類」)，更像是那種會到處冒險的人。可當 Bakool Ja Ja 要她別再寒暄、直接解釋時，她卻一臉困惑，反問他到底在說什麼。</p><p>Bakool Ja Ja the Mystic 指控她裝傻，說她一路喊著「taurus （在這段劇情裡是 Prishe 用來把 Bakool Ja Ja 兄弟（雙頭、帶角的外型）當成怪物在喊的詞）」還差點在發狂時殺了人。Prishe 沒否認自己「不久前」確實打過 taurus，但她說那是為了保護 Ulmia。這個名字讓 Bakool Ja Ja 立刻抓住破口：她口中的 Ulmia，不只是一個朋友的名字──她甚至把 Gulool Ja Ja 的幽影當成 Ulmia 在喊。Bakool Ja Ja 說，召喚 shade 的咒式據說源自更古老的魔法，能蒙蔽人的心智；若對方有本事召出 Gulool Ja Ja，那麼用這種手段誘導人的認知也不意外。他推斷 Prishe 很可能是被騙得把那個幽影當成 Ulmia，而 Prishe 也只能咬牙承認：所以那一切……可能真的是幻象。</p><p>Prishe 的記憶開始一點一點回來。她說有人曾警告她，有個「親近的朋友」需要她保護；那個人全身是藍色的，像 Bakool Ja Ja 左邊那個頭一樣，還把一些古怪的武器塞給她。她平常明明用拳頭戰鬥，卻幾乎沒多想就收下了，只能把這種不對勁歸咎於古老的魔法。她擔心真正的 Ulmia 可能被捲進來，但她說不出「她以為的 Ulmia」在哪裡，只能坦白：她來到這裡時是孤身一人，而這裡是 Jeuno──至少她認為是；只是這裡出現了以前從未有過的東西。</p><p>Bakool Ja Ja 讓你跟著 Prishe 去探查這地方、並追查那個 幽影 的去向，而他們會留在原地看守那道 裂隙。走在幾乎空蕩的 Lower Jeuno，Prishe 提議順道去 Tenshodo——在 Neptune’s Spire 後方、噴泉對面。你一路聽見倖存者的驚惶與困惑：有人看到 Mamool Ja 就聯想到圍城與入侵，甚至害怕 Gulool Ja Ja 會不會攻向 Aht Urhgan；也有人只認得 San d’Oria、Bastok、Windurst，卻從沒聽過你提到的故鄉；還有人試著解釋 Jeuno 的結構，說它建在 Heavens Bridge 上，連接 Quon 與 Mindartia，本該有上下層、港口與 Ru’Lude Gardens——但現在 Lower Jeuno 的出入口全被封死或切斷，連傳送與召回魔法都失效了。</p><p>到了 Tenshodo 的入口，你貼著牆推也推不開。Prishe 無奈嘆氣，說看來見不到 Aldo 了——那位 Tenshodo 的首領，總在世界陷入危機時出手幫她。你們只得回去找 Bakool Ja Ja，把「這裡確實被稱作 Jeuno」以及「外界道路被封、魔法也無效」的情報說清楚。就在這時，那名鎧甲旅行者追了上來，看到 Prishe 平安便急切上前，說她能無事一定要感謝你；可 Prishe 卻皺起眉，反問他是誰，甚至直說自己從沒見過他。</p><p>Bakool Ja Ja 乾脆替那名旅行者取了個名字：Alxaal——用 Mamool Ja 的語言來說是「流浪者」，而在你熟悉的語境裡更接近「冒險者」。旅行者接受了這個名字，也承認 Jeuno 給他一種說不上來的熟悉感。可你們還來不及釐清更多，一道熟悉的聲音插了進來。Prishe 立刻指認那人就是把她「下咒」的元兇，而 Bakool Ja Ja 也怒斥對方竟然還活著。Sareel Ja 現身後說得很直接：這裡確實是 Jeuno 的 Grand Duchy——但不是「真正的」Jeuno，而是他根據另一個世界的幻視所造出的仿造品。</p><p>Sareel Ja 說，他在你們忙於 Dawnservants 的 coronation 時，曾與 Zoraal Ja 一起前往 golden city 的大門，自以為鑰匙與重塑世界的力量都已到手；可在 Resilient Son 眼中，他不過是可丟棄的工具，最後被擊倒、理應死去。偏偏在那個空無一人的時刻，大門仍開著，他拖著身體跨過門檻，迎接他的卻是超越時間的空白──一片黑暗的廣闊之中，他看見了另一個世界，名為 Vana’diel。於是他把那份幻視「造」成現實：像過去用儀式造出 Gulool Ja Ja 的 幻影 一樣，他用那些儀式用具讓幻象成形；而有了名為 electrope （一種具有龐大力量的特殊礦石）的石頭，他的魔法便能讓造物長久存在。</p><p>這番話讓 Prishe 和 Alxaal 同時動搖。若你們所見的一切都只是 Sareel Ja 的造物，那麼「來自 Vana’diel 的人與事」也可能只是被捏造出來的外殼——甚至連他們自己也不例外。Sareel Ja 只把他們當成微不足道的線頭，轉而誇耀他在 Walk of Echoes 裡看見的「無窮可能」：那裡埋著的記憶、殘留的回音，將會把他的夢變成現實。他宣稱自己已不再寄望於 Resilient Son （稱號堅韌之子，Sareel Ja 用這個稱號在講「那個人把我當工具丟棄」的對象），並發誓要親手讓 Tural 擁有「世界最偉大的統治者」。他說自己的工作才剛開始，很快就會再次借助回音，召來 Vana’diel 最強大的存在，並把那份力量與一個「宏偉的幽影」合而為一，把理性與決意的力量，與另一個世界的 Mamool Ja 所受的鐵血統治揉成一體。當你出聲反擊，Sareel Ja 只是興味盎然地說準備尚需時間，等他就緒必會再喚你見證他的偉業，隨即消失不見。留下的，是怒不可遏的 Bakool Ja Ja，以及陷入沉默、開始懷疑「自己究竟是什麼」的 Prishe 與 Alxaal。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Prishe <small class="muted">(朱諾下層, X:6.0, Y:7.2)</small></div></div>`,

  }
};

const langToggle=document.getElementById('langToggle');
const pageTitle=document.getElementById('pageTitle');
const tabBtns=[...document.querySelectorAll('.tab-btn')];
const panels={
  story:document.getElementById('panel-story'),
  acq:document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments:document.getElementById('panel-comments')
};

function getLang(){return localStorage.getItem(LANG_KEY)||'EN';}
function applyLang(lang){
  const t=i18n[lang]||i18n.EN;
  pageTitle.textContent=t.pageTitle;
  langToggle.textContent=`🌐 ${t.langLabel}`;
  tabBtns.forEach(btn=>btn.textContent=t.tabs[btn.dataset.tab]);
  const active=tabBtns.find(b=>b.getAttribute('aria-selected')==='true')||tabBtns[0];
  renderPanel(active.dataset.tab,lang);
}
function wireClamp(panelEl,t){
  const clamp=panelEl.querySelector('.clamp');
  const btn=panelEl.querySelector('[data-role="expand"]');
  if(!clamp||!btn)return;
  function setLabel(){
    const collapsed=clamp.getAttribute('data-collapsed')!=='false';
    btn.textContent=collapsed?t.readMore:t.readLess;
  }
  setLabel();
  btn.addEventListener('click',()=>{
    const collapsed=clamp.getAttribute('data-collapsed')!=='false';
    clamp.setAttribute('data-collapsed',collapsed?'false':'true');
    setLabel();
  });
}
function renderPanel(key,lang){
  const t=i18n[lang]||i18n.EN;
  Object.keys(panels).forEach(k=>panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if(key!=='comments') panels[key].innerHTML=t[key];
  if(key==='story') wireClamp(panels[key],t);
  if(key==='comments') loadGiscusForCurrentLang();
}
tabBtns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab,getLang());
  });
});
langToggle.addEventListener('click',()=>{
  const cur=getLang();
  const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
  localStorage.setItem(LANG_KEY,next);
  applyLang(next);
});
applyLang(getLang());

const GISCUS_CFG={
  repo:'BELAUG-FFXIV/FFXIV_Library',
  repoId:'R_kgDOPyh4Kw',
  category:'General',
  categoryId:'DIC_kwDOPyh4K84CwPjL',
  theme:'preferred_color_scheme'
};
function uiLang(code){return code==='JP'?'ja':(code==='ZH'?'zh-TW':'en');}
function loadGiscusForCurrentLang(){
  const mount=document.getElementById('giscus_container');
  if(!mount)return;
  mount.innerHTML='';
  const langCode=getLang();
  const s=document.createElement('script');
  s.src='https://giscus.app/client.js';
  s.setAttribute('data-repo',GISCUS_CFG.repo);
  s.setAttribute('data-repo-id',GISCUS_CFG.repoId);
  s.setAttribute('data-category',GISCUS_CFG.category);
  s.setAttribute('data-category-id',GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping','specific');
  s.setAttribute('data-term',location.pathname+'｜'+langCode);
  s.setAttribute('data-reactions-enabled','1');
  s.setAttribute('data-emit-metadata','0');
  s.setAttribute('data-input-position','bottom');
  s.setAttribute('data-lang',uiLang(langCode));
  s.setAttribute('data-theme',GISCUS_CFG.theme);
  s.setAttribute('crossorigin','anonymous');
  s.async=true;
  mount.appendChild(s);
}
</script>
</body>
</html>
