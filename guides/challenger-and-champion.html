const i18n = {
  EN:{
    langLabel:'EN',

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Yaana tells you that with your latest victory, you have finally earned the right to challenge the grand champion. The fight ahead will demand more of you than any before it, but for the moment she insists that what you need most is rest. On the way back to the gym, however, there is no peace to be found. In the street, your supporters are still full of excitement, praising you for defeating Vamp Fatale and even the Xtremes together. Yet that warmth is suddenly cut through by hostile voices. Vamp Fatale appears again, joined by others who clearly have no intention of letting your rise pass unchallenged.</p><p>Then another figure steps forward and silences the chaos by force of presence alone. It is the Tyrant, the reigning grand champion. He rebukes those who drew weapons outside the ring and declares that a true warrior does not engage an opponent beyond the sacred arena. But once he turns his attention to you, his words are no less severe. He says that he knows what you intend—that you see yourself as a righteous force of change, while to him you are merely a heel who would destroy the traditions of the Arcadion. If you truly seek to tear it down, then, he says, you must first understand how it came to be.</p><p>He begins with the past. According to him, everything started with the president’s ancestor, a nobleman of Lindblum known for his love of the theatrical arts. When the Storm Surge drove him from his homeland, he wandered the wastes until he finally sought shelter in Alexandria, once an enemy nation. Instead of rejecting him, the people welcomed him, and in their shared labor to rebuild their lives, he saw a reflection of the paradise of old myth—Arcadia. Wanting to repay that kindness, he found his answer in the fighting contests people secretly enjoyed as diversion. Using the wealth he had carried with him, he shaped those bouts into a new form of entertainment, blending thrilling combat with dramatic spectacle. Thus, the Arcadion was born.</p><p>But that first Arcadion did not last. As survival grew harsher, hosting matches became ever more difficult, until the contests ceased entirely and the Arcadion was nearly forgotten. Only much later, when advances in electrope brought stability and soul technology gave people a sense of security, did life become settled enough for boredom to creep in. Sensing that hunger, the president revived the Arcadion. At first he staged matches between recreated simulacra, and when the people demanded fiercer spectacles, he introduced feral souls. In that way, the Tyrant says, the Arcadion rose into Alexandria’s greatest entertainment and became one of the pillars of its culture. That legacy lives on in the sacred halls of the ring, and in his eyes, you now stand before it as a threat.</p><p>When he declares that feral souls are the very soul of the fighters and that no outsider has the right to strip them away, some of the crowd immediately take up his cry. You answer that people can still be moved, thrilled, and inspired even without enhancement, and others speak up in your defense, insisting that your battles have already proven that truth. The Tyrant does not waver. He says that your unenhanced style may have drawn attention, but only because you are playing the role of a heel meant to stir excitement before your inevitable fall. Once he departs, Yaana warns you that even without a feral soul he is a fearsome force, and that as grand champion he has free access to the soul repository, meaning he can choose the best soul to suit any opponent. Worse still, without knowing what soul he will use, she has little advice she can offer. Even so, you return to the gym, because your thoughts are already turning toward the rescue.</p><p>There, the wait ends with a cry from upstairs—Neyuni has returned. Yaana rushes to her in relief, only to learn from Retsarra that the rescue failed to recover Eutrope. Honey explains that they found Neyuni inside the reception hall, but there was no sign of Eutrope, and no time to search further. Neyuni then reveals something even more terrible: when they were abducted, Eutrope’s regulator was removed, and she was taken somewhere else. Yaana goes pale, because she knows what that means—this is what they do to the immortalized. For a moment despair threatens to swallow the room, but Dancing Green refuses to let it settle, and even Yaana forces herself to admit that now is not the time to surrender to fear. Neyuni is safe, and that alone is already something precious.</p><p>Retsarra then gives the room a reason to stand upright again. There is someone helping from inside: Metem. They approached him with no real hope, only to find that he had agreed to assist them. More than that, he has already taken steps to delay the president from learning about their intrusion, and he believes he knows where Eutrope may have been taken. He has promised to see her returned safely. Yaana, who had distrusted him, can only admit that perhaps she judged him too harshly. Then Neyuni adds another piece of good news. While confined in the reception hall, she managed to access a terminal and retrieve the Tyrant’s data. In the title match to come, he intends to use the soul of a behemoth. The discovery gives Yaana fresh hope, because now, at last, you can prepare for something concrete.</p><p>From there, everything gathers toward the final approach. Retsarra says that once Eutrope is freed and you become grand champion, no one will need to fight with feral souls again, and those afflicted with psychonekrosis can be cured. Around you, each of your allies lends their voice in support: Honey speaks of making a dazzling comeback once this is over; Dancing Green tells you to relax and trust yourself; Sugar Riot can already picture the celebration waiting for you at the end. Pomb mews insistently and joins you and Yaana on the road to the Arcadion, where fans stop you one by one to offer their faith, their gratitude, and their dreams for the future. They speak not only of victory, but of change—of an Arcadion that can become something more honest and more alive than what it has been. By the time you finally stand before the attendant and are led toward the greenroom, the weight of the coming match is undeniable. Yet so too is the force that now carries you forward.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Yaana <small class="muted">(Greenroom, X:6.1, Y:5.9)</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="iron-fist.html">Iron Fist</a></div></div>`

  JP:{
    langLabel:'JP',
    pageTitle:'挑戦者と統一王者',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ヤーナは、これでついにグランドチャンピオンへの挑戦権を手にしたのだとあなたに告げる。その一戦に向けては、これまで以上の備えが必要になるだろう。だが今はまず、しっかり休むべきだと彼女は言う。そうしてジムへ戻ろうとした道すがら、街ではすでにあなたの勝利を讃える声があふれていた。ヴァンプファタールを退け、エクストリームズすら打ち破ったあなたへ、熱のこもった歓声が向けられる。ところが、その流れを裂くように、不穏な空気が割り込んでくる。ヴァンプファタールが再び姿を現し、敵意を隠そうともしない者たちがあなたを取り囲む。</p><p>そこへ、場のざわめきを一息に押さえつけるような存在感をまとって現れたのが、現グランドチャンピオン、タイラントだった。彼はまず、リングの外で挑戦者に刃を向けることを戒め、真の戦士は神聖なるリングの外で相手と争わないのだと告げる。だが、あなたへ向ける視線は冷たく鋭い。彼は、あなたが自分では変革をもたらす正義の側に立っていると思っているのかもしれないが、自分に言わせれば、あなたはアーカディアの伝統を壊そうとするヒールにすぎないのだと言い放つ。そして、もし本気でアーカディアを壊そうとしているのなら、その成り立ちを知るべきだと語り始める。</p><p>彼によれば、すべては社長の祖先から始まった。その男はリンドブルム王国の貴族であり、演劇芸術を深く愛し、保護していた人物だった。ストームサージが激化したとき、彼は祖国を追われ、果てしない荒野をさまよった末、かつて敵国であったアレクサンドリアへ逃れ着いた。だが、アレクサンドリアの人々は彼を拒まず、両手を広げて受け入れた。そして彼らが力を合わせて新たな人生を築こうとする姿の中に、彼は神話に語られる古き楽園――アルカディアの幻を見たのだという。受けた恩に報いるため、彼が見いだした答えは、人々が密かに楽しんでいた格闘競技だった。持参した財産を使い、彼はその競技を、激しい戦いと濃密な演出が溶け合う新たな娯楽へと作り替えた。こうしてアーカディアが生まれたのだと、タイラントは語る。</p><p>しかし、その最初のアーカディアは長くは続かなかった。生き延びることそのものが厳しくなるにつれ、試合を開く余裕は失われ、やがて開催そのものが途絶え、アーカディアはほとんど忘れ去られてしまった。時は流れ、エレクトロープの進歩が社会に安定をもたらし、魂技術が人々に安心を与えるようになる。そうして初めて、アレクサンドリアの人々は退屈という感覚を知るようになった。その渇きを満たすため、社長はアーカディアを復活させた。はじめは再現された模像同士を戦わせ、さらに人々がもっと激しい戦いを求めると、獣魂の使用を導入した。そうしてアーカディアは、アレクサンドリア最高の娯楽へと成長し、その文化を支える柱のひとつになったのだという。だからこそ、その歴史と遺産が息づく神聖な舞台を壊そうとするあなたを、タイラントは受け入れられないのだ。</p><p>彼は、獣魂こそ自分たち闘士の魂そのものであり、外から来た者に文化を奪われる筋合いはないと断言する。その言葉に呼応するように、周囲の一部の観衆も彼を称え、あなたを非難する。だがあなたが、強化がなくとも人々を熱狂させる戦いはできると応じると、今度はあなたを支持する声が立ち上がる。あなたの試合が、その可能性をもう示しているのだと。だがタイラントは揺るがない。強化なしで戦う姿が注目を集めたとしても、それは結局、舞台を盛り上げるためのヒールとして利用されているだけであり、最後には倒れる運命にあるのだと切り捨てる。彼が去ったあと、ヤーナはあらためて警告する。タイラントは獣魂を使わずとも十分すぎるほどの強敵であり、しかもグランドチャンピオンである彼には魂の保管庫への自由なアクセスがある。つまり、相手に合わせて最適な魂を選ぶことができるのだ。どの魂を使うのかさえわからない以上、対策を立てるのは難しい。それでも、いまはジムへ戻るしかない。皆の救出がどうなったのか、その結果を確かめなければならないからだ。</p><p>ジムへ戻ると、待ち焦がれた声が響く。ネユニが帰ってきたのだ。ヤーナは安堵のまま駆け寄るが、レトサラの表情は晴れない。ユートロープは救い出せなかったのだという。ハニーは、応接間でネユニは見つけたものの、ユートロープの姿はなく、さらに探す時間もなかったと説明する。ネユニは続けて、連れ去られたときにユートロープのレギュレーターが外され、そのあと別の場所へ連れて行かれたのだと告げる。ヤーナはその意味を知っていた。それは「不朽の闘士」たちに対して行われていることと同じだった。絶望がその場を覆いかけるが、ダンシンググリーンはここで心を折るなと声を張り上げる。ヤーナも、自分に言い聞かせるように、いま最悪を想像して立ち止まるべきではないと答える。少なくともネユニが無事に戻ったこと、それだけでも確かな救いなのだ。</p><p>そこへ、レトサラがさらに重要な話をもたらす。内部に協力者ができたのだ。メテムである。大した期待もなく接触したところ、思いがけず彼は力を貸すと約束してくれた。しかも、今回の潜入について社長がすぐには察知できないよう、すでに手も回しているらしい。さらに彼は、ユートロープがどこへ移されたかについても心当たりがあり、必ず無事に戻すと約束したという。ヤーナは驚きながらも、メテムを誤解していたのかもしれないと口にする。そこへネユニも、よい知らせがあると続ける。拘束されていた応接間で端末にアクセスできた彼女は、タイラントのデータを抜き出していたのだ。来たるタイトルマッチで、タイラントが使う予定の魂はベヒーモス。その情報を得られたことで、ヤーナはようやく戦いに向けた備えの足場ができたと喜ぶ。</p><p>こうして、すべては最後の舞台へと収束していく。レトサラは、ユートロープが解放され、あなたがグランドチャンピオンとなれば、もう誰も獣魂で戦う必要はなくなり、魂蝕症に苦しむ者たちも救われるのだと語る。ハニーは、その先で華々しく復帰するつもりだから負けないでほしいと笑い、ダンシンググリーンは気負わず楽しめばいいと励ます。シュガーライオットは、あなたがグランドチャンピオンとして戴冠し、救われた皆がそこに集って祝福する光景が見えると語る。ポムもまた、まるで何かを感じ取ったかのように鳴きながら、ヤーナとともにあなたについてくる。道中では、ファンたちが次々に声をかけてくれる。あなたに励まされたこと、変わりゆくアーカディアへの希望、自分たちもまた新しい未来を望んでいること――その言葉のひとつひとつが、これから迎える戦いの重みと意味をあらためて浮かび上がらせる。やがて案内係の前に立ち、グリーンルームへと導かれていくとき、決戦はもはや目の前に迫っていた。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ヤーナ <small class="muted">(控室, X:6.1, Y:5.9)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="daring-devils.html">温度差兄弟</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="iron-fist.html">アルカディアの圧政者</a></div></div>`
  },

    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Yaana 告訴你，走到這一步，你終於正式取得了向 grand champion（Arcadion 全分級之上的最終冠軍頭銜）發起挑戰的資格。接下來那場戰鬥，勢必比你過去經歷的任何一戰都更需要準備；可眼下，她反而認為你最需要的是先好好休息一下。只是，就連回訓練館的這段路也沒能真正平靜下來。街上的支持者仍沉浸在你剛才那場勝利帶來的興奮之中，讚嘆你先擊敗了 Vamp Fatale，接著又把 Xtremes 兩人一起壓了下去。可就在這份熱烈之中，另一股惡意忽然插了進來。Vamp Fatale 再次現身，還帶著一群明顯不肯就此罷休的人，硬生生把氣氛扯向緊繃。</p><p>就在場面快要失控時，又有一個人現身，以壓倒性的存在感讓一切安靜下來。那就是現任 grand champion（Arcadion 全分級之上的最終冠軍頭銜）——The Tyrant。他先是斥責那些在擂台之外就試圖動手的人，冷冷地說，真正的戰士不會在神聖的擂台之外和對手交鋒。可當他的目光轉向你時，話裡的敵意卻絲毫沒有減少。他說，關於你的事自己早就知道了。你也許以為自己是能夠帶來改變的「正派」人物，可在他眼裡，你不過是一個會摧毀 Arcadion 傳統的「反派」。既然你一心想改變 Arcadion，那你至少該先知道，它究竟是怎麼誕生的。</p><p>於是，他開始講述那段歷史。照他的說法，一切都始於總裁的祖先——那是一名來自 Lindblum 王國的貴族，以熱愛並資助戲劇藝術而聞名。當 Storm Surge（第九世界那場席捲各國、把世界逼到毀滅邊緣的歷史性大戰）逼近頂點時，他被迫逃離自己的故鄉，在無盡荒野中漂泊多年，最後才在敵國 Alexandria 尋求庇護。出乎他意料的是，Alexandria 的人不僅沒有排斥他，反而張開雙臂接納了他。而當他看見那些人並肩辛勤勞作、努力重建新生活的模樣時，他彷彿在其中看見了古老神話中那片理想樂土——Arcadia。為了報答自己所受到的善意，他最終從人們私下享受的格鬥競技中找到了答案。他用自己帶來的財富，把那些比賽改造成一種全新的娛樂形式，將激烈的戰鬥和扣人心弦的戲劇性結合在一起。Arcadion，於是就這樣誕生了。</p><p>然而，最初的 Arcadion 並沒有長久延續下去。隨著生存環境變得愈發嚴酷，要舉辦比賽也愈來愈困難，最終比賽完全停辦，Arcadion 幾乎被徹底遺忘。直到多年以後，electrope（Alexandria 的特殊變質素材，可依意念改變形態與性質）的進步為整個社會帶來穩定，靈魂技術又讓人們獲得了安全感，Alexandria 的居民才第一次重新感受到「無聊」這件事。總裁為了給予他們渴望的刺激，便重新復興了 Arcadion。一開始，他讓重現出來的 simulacra 彼此對戰；而當人們開始渴望更激烈、更殘酷的戰鬥時，他又引入了 feral soul（用於戰鬥變身的獸魂）。就這樣，Arcadion 一步一步成為 Alexandria 最受歡迎的娛樂形式，也成了這座城市文化的重要支柱。The Tyrant 說，這就是 Arcadion 的歷史，也是流傳在神聖殿堂中的傳承，而你現在想摧毀的，正是這一切。</p><p>當他宣稱 feral souls 才是所有闘士真正的靈魂，而你這個外來者沒有資格指手畫腳、奪走屬於他們文化的一部分時，周圍立刻有人附和起鬨，替他喝采，也順勢把你推向「反派」的位置。可你回應說，就算不依賴強化，也一樣可以帶給人們真正的震撼與滿足，而現場很快也有支持你的聲音跟著站了出來，說你的戰鬥早就已經證明了這一點。可 The Tyrant 並不動搖。他說，你之所以能吸引關注，不過是因為你扮演了讓觀眾興奮起來的角色而已，最終仍只會迎來注定的敗北。等到這場對峙結束後，Yaana 立刻提醒你，The Tyrant 就算不靠 feral soul，也依然強得驚人；更麻煩的是，身為 grand champion（Arcadion 全分級之上的最終冠軍頭銜），他能自由動用靈魂儲藏庫，替不同對手挑選最合適的靈魂。換句話說，如果你們連他準備用哪一種靈魂都不知道，就幾乎無從擬定更具體的對策。即便如此，你們現在也只能先回訓練館，因為所有人的心思，其實都還懸在那場救援行動的結果上。</p><p>回到 Tritails Training 後，最先打破沉默的，是 Neyuni 的聲音。她平安回來了。Yaana 幾乎是衝上去抱住她，鬆了一大口氣；可下一刻，Retsarra 卻低聲說，他們沒能把 Eutrope 一起救出來。Honey 接著解釋，他們確實在接待廳裡找到了 Neyuni，可裡面根本沒有 Eutrope 的蹤影，而當時也根本沒有多餘的時間再繼續找下去。Neyuni 則補上更糟的一點：綁走她們的人，在抓走她們時就先拆掉了 Eutrope 的 regulator（可保存與調用靈魂、用於重傷或死亡時復生的裝置），接著又把她帶到了別的地方。Yaana 一聽見這件事，臉色立刻發白，因為她知道這代表什麼——這正是他們對待那些「名留不朽殿堂的人」的方式。那一瞬間，最壞的想像幾乎要把整個房間吞沒。可 Dancing Green 立刻出聲，要大家別現在就喪了氣；而 Yaana 在深吸一口氣後，也勉強讓自己重新站穩。至少，Neyuni 現在平安回來了，這本身就已經是一種值得抓緊的幸運。</p><p>接著，Retsarra 又帶來了另一個讓人重新燃起希望的消息——他們在內部有了協助者。那個人竟然是 Metem。原本他們抱著沒什麼指望的心情去找他，卻沒想到對方竟同意幫忙，不僅設法拖住了總裁，讓他不會那麼快察覺你們這次的潛入，甚至還對 Eutrope 可能被帶往的地方有了線索，並親口保證會想辦法讓她平安回來。Yaana 聽了這些話，也只能承認，也許自己過去真的錯看了他。就在這時，Neyuni 也說自己還有一個好消息——當她被關在接待廳時，曾設法連上終端裝置，並取出了 The Tyrant 的資料。她查到，在接下來那場冠軍戰裡，The Tyrant 打算使用的是 behemoth 的靈魂。這讓 Yaana 立刻振作起來，因為有了這份情報，你就終於不必毫無方向地面對那場決戰。</p><p>從這一刻起，所有事情都開始向最後的舞台收束。Retsarra 說，只要 Eutrope 能被救回來，而你也成為 grand champion（Arcadion 全分級之上的最終冠軍頭銜），那麼就再也不會有人需要靠 feral soul 戰鬥，而那些受到 psychonekrosis 侵蝕的人，也終於能迎來治療的機會。Honey 笑著說，她可還等著在一切結束後華麗復出，所以你絕不能輸；Dancing Green 仍舊用他那一套輕快的方式要你放輕鬆，說只要享受那場比賽，你很快就會在慶功派對上跳到天亮；Sugar Riot 則像是已經看見了一幅畫面——你戴上冠軍榮耀，而所有被你拯救的人都在身旁一同慶祝。就連 Pomb 也一路跟著你和 Yaana，彷彿知道有什麼重要的事即將發生。走向 Arcadion 的途中，支持你的 fans 一個接一個地向你送上鼓勵，有人說你一定能打倒 The Tyrant，有人說你帶給他們的勇氣讓他們重新站起來，也有人說 Arcadion 本來就該隨著這個時代一起改變。那些話語不只是在替你加油，也像是在把所有人的期待一點一點交到你手裡。等到最後，你終於和 Yaana、Pomb 一起站到接待人員面前，被引領著走向 Greenroom 時，你也清楚知道——真正的決戰，已經近在眼前。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Yaana <small class="muted">(控室, X:6.1, Y:5.9)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="daring-devils.html">大膽雙煞</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="iron-fist.html">以鐵拳統治 Arcadion 之人</a></div></div>`

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
