        story:`<p><strong>00:30 Cutscene</strong></p><p>Alisaie stares ahead and insists it cannot be Dalamud, demanding to know how this is possible—and where you are.</p><p>Nael deus Darnus answers that you stand in the final resting place of Nael van Darnus.</p><p>He calls it a grave meant for the undeserving, and declares that because you have trespassed upon his god’s sanctuary, this place will become your grave as well. Alisaie can only refuse with a sharp, desperate cry.</p><p>Nael deus Darnus says that in the hour of his failure, Nael van Darnus felt the currents of aether begin to carry his essence away. Before oblivion could claim what remained, a divine will reached out—and Nael deus Darnus was born. Then, he says, his god’s words rang in his ears: to bring crushing defeat upon the god’s enemies, to show them despair without end, and to seize the victory once denied.</p><p>Alisaie judges that when Bahamut plucked Nael back from the brink of oblivion, little of his essence must have remained—and what stands before you is a strange simulacrum. Even so, she warns that the aura is unmistakably powerful, as if it were channeling the rage of the elder primal itself.</p><p>Nael deus Darnus calls upon Lord Bahamut and swears to carry out that will, vowing that none will escape the unquenchable fury. Then he summons “dull, unthinking beasts” to snarl and show their fangs—only to sneer that such posturing will do nothing to save them from the calamity yet to come.</p><p><strong>the later part of this episode’s story</strong></p><p>Alisaie looks at what remains of Nael and calls him a pitiable creature, wishing he had never been born. She says he had already surrendered his flesh and collapsed into aether, yet Bahamut denied him death—locking what little remained inside an aetherial shell shaped like something drawn from his own memories. Now that shell is broken, and even the primal that made him seems unwilling to sustain him.</p><p>At the word primal, Nael bristles and insists he kneels to no eikon. He names himself—Nael van Darnus, legatus of the VIIth Legion—then falters as his thoughts clear and he realizes this body is not truly his. He admits the possibility that Alisaie spoke the truth, that he was ensorcelled by the ancient prisoner of the lesser moon, and swears it will not happen again.</p><p>Alisaie cannot accept the idea of a mind slipping free once a primal has ensnared it—unless Bahamut simply let go of a spirit already bound for the aetherial realm. Nael spits at the irony of falling to the very influence he meant to purge, yet insists the Meteor project’s resurrection was his will alone. Even so, he says his grand designs were fated to fail, and even death’s release was denied him.</p><p>When Alisaie begs for the truth of the Calamity and what became of Archon Louisoix, Nael calls fate cruel. If you want answers, he tells you to press on—your answers await at the end of your path—yet he warns that the road leads only to despair, and that the light of truth is harsh and unforgiving.</p><p>Alisaie demands to know why he says this and insists her grandfather will be freed once you stop Bahamut’s restoration. Nael tells her to steel herself: only unbending resolve and merciless strength can conquer what lies ahead, while the weak can do nothing but weep beneath the pall of their own misery.</p><p>Before he can say more, another voice cuts in and orders the “chattering raven” to be silent, saying his broken wings will carry him no more. Nael reels at the “crimson moon,” and Alisaie tells you she recognizes that voice—yet the one she knows would never speak like that—so she urges you onward to finish what you came to do, certain that when the final hulk lies dormant, all will be set right and her grandfather will be himself again.</p>`,

        story:`<p><strong>00:30 カットシーン</strong></p><p>アリゼーは目の前の光景に目を見張り、あれがダラガブであるはずがないと告げ、どうしてこんなことが起きたのか、そしてここはどこなのかとあなたに問い詰める。</p><p>ナエル・デウス・ダーナスは答える。ここはナエル・ヴァン・ダーナスの最期の眠りの地だ、と。</p><p>彼女は、ここは報われるべきでない者のための墓だと言い放ち、神の聖域に踏み入った罪により、ここがおまえたちの墓にもなるのだと宣告する。アリゼーは、必死に否定の叫びを返す。</p><p>ナエル・デウス・ダーナスは語る。失敗の瞬間、ナエル・ヴァン・ダーナスは、エーテルの流れが自らの精髄を運び去ろうとするのを感じた。忘却が最後の欠片を奪い尽くす前に、神の意志が手を伸ばし――そしてナエル・デウス・ダーナスが生まれたのだ、と。さらに、神の言葉が耳に響いたと言う。敵に粉砕的な敗北を与え、尽きぬ絶望を思い知らせよ。そしてかつて拒まれた勝利を、今度こそ己のものとせよ、と。</p><p>アリゼーは、バハムートが忘却の淵から引き上げたとき、ナエルの精髄はほとんど残っていなかったのだろうと言い、目の前にいるのは奇妙な模造体だと見なす。それでも、その気配は強大で、古き蛮神そのものの怒りを媒介しているかのようだと警戒する。</p><p>ナエル・デウス・ダーナスは主バハムートに呼びかけ、御身の望みは我が命令だと誓い、尽きぬ怒りから逃れられる者などいないと言い放つ。続けて、鈍く思考なき獣どもに唸り声を上げよと呼びかけ、だが来たるべき災厄の前では、それらは何の役にも立たぬと嘲る。</p><p><strong>このエピソード後半の物語</strong></p><p>アリゼーは、ナエルの有様を見て哀れな存在だと言い、できることなら生まれてこなければよかったのにと呟く。あなたは肉体を捨ててエーテルへ崩れ落ちたのに、バハムートは死を許さず、わずかに残ったものを記憶の像を模したかのようなエーテルの殻に閉じ込めたのだという。だが今やその殻は砕け、蛮神もまた、あなたの存在を支える気がないようだと告げる。</p><p>「蛮神」と呼ばれ、ナエルは激昂し、自分はどのエイコンにも跪かない、そんな汚物の寵愛など乞う必要はないと言い放つ。自分はナエル・ヴァン・ダーナス、第七軍団のレガトゥスだと名乗るが、言葉は途切れ、思考が霞む。これは自分の身体ではないのだと気づき、アリゼーの言葉は真実だったのか、小さき月の古き囚われ人に惑わされていたのかもしれないと認め、二度と同じことは起こさせないと告げる。</p><p>アリゼーは、蛮神が心を絡め取ったなら解き放たれることはないはずだと反論する。だがもしバハムートが支配を手放したのだとしたらどうか――エーテルの世界へ堕ちていく壊れた魂など抱え込む価値はないのではないか、と。ナエルは皮肉を噛みしめ、地から祓うはずだった影響に自分が囚われたことを嘆きつつ、メテオ計画を復活させたのは自分の意志であり他の誰でもないと言い切る。それでも壮大な企図は失敗する運命で、乱暴な死の解放さえ与えられなかったのだと語る。</p><p>アリゼーは霊災について、そして祖父ルイゾワがどうなったのか、真実を教えてほしいと懇願する。ナエルは彼女がルイゾワの孫だと知り、運命は残酷さにおいても気前がいいと言う。答えが欲しいなら進め、道の果てに待っている――だがその道は絶望に通じ、真実の光は苛烈で容赦がないのだと警告する。</p><p>アリゼーはなぜそんなことを言うのかと迫り、バハムートの再生を止めれば祖父は解放されるはずだ、何を隠しているのかと問い詰める。ナエルは身を固めろと言い、前にあるものを征するには揺るがぬ決意と容赦なき強さだけが必要だと告げる。弱き者は自らの惨めさの帳の下で泣くことしかできない――かつて自分がそうだったように、と。</p><p>そのとき別の声が割り込み、「喋り立てる鴉」を黙らせる。汚れた翼は折れ、もはや飛ぶことは叶わぬ、と。ナエルは「紅き月」の眩しさに目を灼かれると呻き、アリゼーはあなたに、その声には聞き覚えがあると言う。だが彼がそんな言葉を口にするはずがない、と。それでも彼女は先へ進もうと促し、最後の拘束具が休眠すればすべては正され、祖父は元の祖父に戻るはずだと信じていると告げる。</p>`,

        story:`<p><strong>00:30 過場動畫</strong></p><p>Alisaie 望著前方，驚愕得幾乎說不出話：「那……那不可能是 Dalamud 吧！？怎麼會——我們到底在哪裡！？」</p><p>Nael deus Darnus 回應：「這裡是 Nael van Darnus 最終安息之處。」</p><p>Nael deus Darnus 說這裡是為不配之人準備的墓穴，並宣告你擅闖他的神之聖域，因此這裡也將成為你的墓地。Alisaie 只能失聲喊出拒絕。</p><p>Nael deus Darnus 接著說，在他失敗的那一刻，Nael van Darnus 感覺到以太的流向正要帶走他的本質；在虛無抹去最後殘存之前，有一道神聖的意志伸出手——於是 Nael deus Darnus 誕生。隨後，他說自己聽見神的話語：要讓神的敵人遭受粉碎性的敗北，使其知曉無盡的絕望，並奪回那個曾經被剝奪的勝利。</p><p>Alisaie 判斷，當 Bahamut 把 Nael 從虛無邊緣拉回時，他的本質恐怕已所剩無幾，才會變成如今這種異樣的仿造之身；但即便如此，那股氣息仍強大得令人無法忽視，像是在引出那位古老 primal 的怒火。</p><p>Nael deus Darnus 呼喚 Lord Bahamut，宣告神的意志即是他的命令，並說沒有人能逃過那不熄的狂怒。接著他召喚那些遲鈍、毫無思考的野獸，要它們亮出兇相，並冷笑說：面對即將到來的災厄，這些都毫無用處。</p><p><strong>本集後半的故事</strong></p><p>Alisaie 看著 Nael 的模樣，說他很可憐，甚至希望他從未被生下來。她說他早已放棄肉體、崩解為以太，可 Bahamut 卻不讓他死去，把僅存的部分囚進一層以太外殼裡；那外殼像是什麼，她也說不準，也許是從他的記憶裡映出的形象。如今外殼已經破碎，而那位 primal 似乎也不打算再維持他的存在。</p><p>Nael 聽見「primal」一詞便暴怒，說他不會向任何 eikon 下跪，更不需要去乞求那種污穢的垂憐。他自報姓名：Nael van Darnus，VIIth Legion 的軍團長——可話一出口又忽然停住，說他的思緒變得混濁，而這副身體也不是他自己的。他承認 Alisaie 的話或許是真的：他曾被那顆較小的月球裡、那名古老囚徒所迷惑；但他說，這種事不會再發生一次。</p><p>Alisaie 無法接受他像是已不再受 Bahamut 控制，說一旦 primal 套住了心智，就不可能被解開。除非——除非 Bahamut 自己放手了；對一個即將回歸以太界的破碎靈魂而言，又何必繼續緊抓不放。Nael 低聲嘆息，說自己竟落入原本想從大地上清除的影響之中，這份諷刺令人難以忍受；但他也強調，別以為他的一切都由他人決定，讓 Meteor 計畫死灰復燃的是他自己的意志，並非他人強加。只是他的宏圖註定要失敗，甚至連死亡那種粗暴的解脫都被剝奪了。</p><p>Alisaie 懇求 Nael 告訴你們更多：關於那場 Calamity 的真相，關於世界究竟遭遇了什麼，也關於她的祖父——Archon Louisoix——後來怎麼了。Nael 聽見她的身分，說她是 Louisoix 的孫女，並說命運在殘酷一事上向來慷慨。他要你們繼續往前走，答案在道路的盡頭等著；但他也警告，那條路只通往絕望，真相之光一向嚴酷而無情。</p><p>Alisaie 立刻追問他為何這麼說，並堅持只要你們阻止 Bahamut 的復原，祖父就會被解放；他到底還瞞著什麼。Nael 要她做好覺悟：唯有不屈的決心與毫不留情的力量，才能征服前方的一切；軟弱的人只能在自身痛苦的陰影下哭泣——就像他曾經那個孱弱的孩子一樣。</p><p>就在他還要說下去時，另一道聲音打斷他，叫那隻喋喋不休的烏鴉閉嘴，說他的破翼已斷，再也飛不起來。Nael 低聲說起「紅色的月球」的光芒灼痛他的眼，而 Alisaie 告訴你，她認得那個聲音，卻又說她所認識的那個人絕不會說出那種話。她催促你繼續前進，把你們該做的事做完；只要最後的拘束艦停止運作，一切就會回到正軌，祖父也會恢復原本的樣子——她深信如此。</p>`,

    const langToggle = document.getElementById('langToggle');
    const pageTitle  = document.getElementById('pageTitle');
    const tabBtns    = [...document.querySelectorAll('.tab-btn')];
    const panels = {
      story : document.getElementById('panel-story'),
      acq   : document.getElementById('panel-acq'),
      req   : document.getElementById('panel-req'),
      unlock: document.getElementById('panel-unlock'),
      bgm   : document.getElementById('panel-bgm'),
      comments: document.getElementById('panel-comments')
    };

    function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
    function applyLang(lang){
      const t = i18n[lang] || i18n.EN;
      pageTitle.textContent = t.pageTitle;
      langToggle.textContent = `🌐 ${t.langLabel}`;
      tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
      const activeBtn = tabBtns.find(b=>b.getAttribute('aria-selected')==='true') || tabBtns[0];
      renderPanel(activeBtn.dataset.tab, lang);
      if (activeBtn && activeBtn.dataset.tab === 'comments') loadGiscusForCurrentLang();
    }

    function renderPanel(key, lang){
      const t = i18n[lang] || i18n.EN;
      Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
      panels[key].classList.add('active');
      if (key !== 'comments') {
        panels[key].innerHTML = t[key];
      } else {
        loadGiscusForCurrentLang();
      }
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click',()=>{
        tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab, getLang());
      });
    });

    langToggle.addEventListener('click',()=>{
      const cur=getLang();
      const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
      localStorage.setItem(LANG_KEY,next);
      applyLang(next);
    });

    applyLang(getLang());

    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };
    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }
  </script>
