    story:`<div class="clamp" data-collapsed="true">
      <p>Searchingway thanks you for all the running about you have done for the initiative, and though he jokes about the dangers of Phaenna’s razor-sharp terrain, his tone soon turns light again when Namingway returns. Namingway admits that naming an entire star from top to bottom, while preserving a unifying theme, was no small challenge. Even so, he has finished the task, and before his dictionaries can so much as rest, he asks you to join him on another tour. Searchingway encourages you to go, certain that Namingway has plenty more wonders to share.</p>
      <p>Namingway begins at the camp itself, where survival and beauty already seem inseparable. The great shelter that protects the expedition from Phaenna’s brutal climate reminds him of a carefully shaped work of glass, delicate in appearance yet strong enough to endure. That is why he calls it the Glassblown Grotto, and the flame-like heart of the camp, where all gather and labor, becomes the Glassblowers’ Beacon. From there, he leads you westward to a slow blue stream that looks inviting at a glance, yet proves to be anything but water. Here, even what seems familiar has taken another form, and the things drifting within it are no true fish at all, but strange silicate beings animated by aether beneath the surface.</p>
      <p>As the tour continues, Phaenna reveals itself as a world where every step unsettles the old boundaries of understanding. At the heated reaches of Fusingway Vent, Namingway warns you to watch your footing, for the land can melt glass and hide danger beneath a surface that seems still. Then he takes you to the Iridized Rise, his favorite place on the star, where color pours downward in radiant bands. There, he points out one marvel after another: trees armed with explosive crystalline growths, delicate flowers that somehow flourish without the help of animals, strange glasslike trunks and canopies that blur the line between plant and fungus, and fields whose shapes and colors seem arranged by a logic that no one yet fully grasps.</p>
      <p>When the sightseeing is done, Namingway speaks more quietly, and with more feeling than before. The longer he remains on Phaenna, the more he is struck by how something as ordinary as glass can become endlessly surprising in an unfamiliar world. Each discovery only leads to more questions—about shape, color, sound, and the hidden order behind them all. He knows he will never live long enough to see the whole design, yet that does not diminish the journey. Rather, it deepens its meaning. Those who come later will continue from where you leave off, carrying forward the fragile traces of what you first began to understand. In that thought, he feels again that this path of discovery may itself be what Hydaelyn wished for Her children.</p>
      <p>When you return to Searchingway, he has one final wonder to show you: the Phaenna Stellascope. Before its vast sight, both of them are overcome by the immensity of what lies ahead. Searchingway explains that several more stars rich in aether have already been sighted, and that each distant light may hold unknown life, unknown civilizations, or at the very least new meaning waiting to be found. He does not deny the sorrow bound up with the stars, nor the ruin others have seen at the edge of existence. Even so, he wants to keep searching—not only to mourn what was lost, but to seek hope wherever it may still endure. And so the initiative presses onward, determined to scan every reach of the horizon until the next foothold among the stars is found.</p>
    </div>

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>サーチングウェイは、あなたが計画のために各地を走り回ってくれていることへ感謝を伝えつつ、パエンナの鋭い地形に傷ついてはいないかと冗談めかして気づかう。やがて戻ってきたネミングウェイは、この星を隅々まで名づける仕事がいかに大仕事であったかを語りながらも、ひとまず一区切りついたことに満足していた。とはいえ、辞書を休ませるつもりはないらしく、あなたにもう一度見学へ付き合ってほしいと頼む。サーチングウェイもまた、彼が用意した新たな案内をぜひ聞いてほしいと背中を押す。</p>
      <p>ネミングウェイはまず、拠点そのものに込めた名から語り始める。過酷な気候から一行を守る広大な空洞は、繊細に見えながら強さを宿したガラス細工のようであり、だからこそ彼はそこを「グラスブロウン・グロット」と呼ぶのだという。そしてその内側で、皆が集い、自らの手で新たなものを形づくっていく中心には、「グラスブロワーズ・ビーコン」という名が与えられていた。さらに西へ進むと、淡い青色の流れが静かに南へ続いている。だがそれは水ではなく、飲めば害になるほどにガラスめいた性質を持ち、その中を泳ぐものたちもまた魚ではなく、地中を流れる濃密なエーテルによって動く奇妙な存在だった。</p>
      <p>見て回るほどに、パエンナという星は、これまでの常識では測れない世界であることを突きつけてくる。フュージングウェイ・ヴェントでは、ガラスさえ溶かす熱と、冷えたように見える地面の下に潜む危険に気をつけるようネミングウェイは念を押す。続いて彼があなたを連れていくのは、この星でもっとも気に入っているという「イリダイズド・ライズ」だった。そこでは色彩が幾重にも折り重なり、地形そのものが輝きの階段のように広がっている。爆ぜる結晶をまとった樹木、動物に頼らず花を残す可憐な低木、樹木とも菌類とも言い切れぬ奇妙な姿、そして規則正しすぎるほど整った結晶の草原――そのどれもが、まだ理解しきれぬ理の中で息づいていた。</p>
      <p>見学を終えたネミングウェイは、これまでよりずっと静かな声で胸の内を語る。パエンナにいるほどに、ありふれたはずのガラスさえ、この星では尽きることなく驚きをもたらすのだという。形も、色も、音も、なぜこうであって別のあり方ではないのか――新たな発見は、ただ次の問いを呼び起こしていく。自分の長い寿命をもってしても、その大いなる全貌を見る日は来ないだろう。それでも、だからこそ意味がある。いつの日か後に続く誰かが、あなたたちの残したものを受け取り、その先へ進んでいく。そう思うとき、彼は、これこそがハイデリンが子らに歩んでほしかった道なのかもしれないと感じるのだった。</p>
      <p>拠点へ戻ると、サーチングウェイは最後に「パエンナ・ステラスコープ」を見せてくれる。その壮大さの前で、ふたりはこれから先に待つ無数の可能性へ思いを馳せる。すでにエーテルに満ちた星々がいくつも観測されており、そのひとつひとつに未知の生命や文明、あるいはまだ見ぬ意味が眠っているかもしれないのだという。星々には悲しみや滅びの記憶もつきまとう。それでもサーチングウェイは、失われたものを悼むためにも、そしてなお残る希望を探すためにも、進み続けたいと願う。こうして計画は、次なる足がかりを見つけるその時まで、空の果てをひとところ残らず見つめ続けようとしていた。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> サーチングウェイ　惑星パエンナ <small class="muted">(X:27.2, Y:13.8)</small></div>
    </div>`,
    unlockq:`<div class="stack">

  ZH:{
    langLabel:'ZH',
    pageTitle:'最耀眼的星辰',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Searchingway 感謝你這段時間一直為計畫四處奔走，也半開玩笑地問你，在 Phaenna 這片滿是銳利碎片的土地上活動時，應該還不至於真的遍體鱗傷吧。接著回到據點的 Namingway 也加入了談話。他坦言，替整顆 Phaenna 自上而下建立一套完整又統一的命名體系，實在不是件輕鬆的事，但到了現在，這份工作總算告一段落。只是，他顯然還不打算讓自己的字典就此休息，而是立刻又邀你同行，想帶你去看看他在這顆星球上最得意的命名成果。Searchingway 也笑著催你快去，像是很清楚 Namingway 早已準備好要大談一番。</p>
      <p>Namingway 先從營地本身開始介紹。在他眼中，這片能替眾人遮擋 Phaenna 惡劣環境的巨大洞窟，看上去就像一件經過巧手吹製而成的玻璃器皿，既纖細又堅韌，因此他替這裡取名為 Glassblown Grotto。而在洞窟之中，那團如同原初火焰般聚集眾人的核心，也被他稱作 Glassblowers’ Beacon。之後，他帶你往西前進，去看一條泛著透明藍色光澤的緩慢水流。乍看之下，它像是可以入口的清流，可實際上，那所謂的「水」本身幾乎就是玻璃，而其中游動的東西也並非真正的魚，只是受到地底濃密乙太驅動的矽酸鹽物質所形成的奇異存在。</p>
      <p>隨著你們繼續前行，Phaenna 的陌生與異質也愈發清晰。來到 Fusingway Vent 時，Namingway 特地提醒你腳下務必要小心，因為這裡的高溫足以熔化玻璃，而看似冷卻的地表之下，也隨時可能湧出危險。之後，他又帶你前往自己最喜歡的地方——Iridized Rise。在那裡，層層色彩自高處向下鋪展，彷彿整片地勢本身就是一道被凝固下來的虹光。你眼前所見的一切，都像是在挑戰過往對生命的理解：長著爆裂尖刺的樹木、彷彿蕾絲般纖巧卻能自行繁衍的花叢、介於樹木與菌類之間的奇異形體，以及那些形狀整齊得近乎不可思議的晶體草叢。每一樣景象，都像是在告訴你，這顆星球遵循的是另一套仍未被完全理解的法則。</p>
      <p>等到整趟見學告一段落後，Namingway 的語氣也慢慢沉了下來，比先前更多了幾分真切的感慨。他說，在 Phaenna 停留得愈久，就愈會感覺到，連玻璃這樣看似尋常的事物，在這裡都能一再帶來新的驚奇。那些形狀、那些色彩、那些聲音，為何會以這樣的方式存在，而不是別的模樣？每一項發現，都只會引出更多問題。他知道，即使自己已經活得比常人漫長得多，也不可能親眼看見整個巨大設計的全貌。可正因如此，這段旅程才更顯得有意義。總有一天，會有其他人沿著你們留下的足跡走下去，接住那些脆弱卻珍貴的發現，繼續把未完成的理解推向更遠的地方。在那一刻，他甚至感覺，這也許正是 Hydaelyn 希望她的孩子們走上的道路。</p>
      <p>回到據點後，Searchingway 又帶你們去看最後一個地方——Phaenna Stellascope。面對那座壯觀的觀測設施，兩人都忍不住為前方等待著你們的可能性而震撼。Searchingway 說，他們已經透過它觀測到好幾顆充滿乙太的星球，而每一道遠方的微光，都可能藏著未知的生命、未知的文明，或至少是某種尚未被發現的意義。星海之中確實也有絕望與毀滅的故事，他並不否認這一點。可即便如此，他仍想繼續前行——既是為了悼念那些已經失落的事物，也是為了在黑暗裡繼續尋找仍未熄滅的希望。於是，這項計畫也將繼續朝前推進，在找到下一個立足點之前，持續把視線投向群星的盡頭。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

  const mount = document.getElementById('giscus_container');
  if (!mount) return;
