const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`Every Little Thing She Does Is Magitek`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Slafborn motions you closer and asks if you want to go in—then immediately warns you to keep out of sight.</p><p>Back at Revenant’s Toll, Cid tells you the repairs are moving quickly and that Biggs and Wedge should finish soon, but one problem remains: the armor’s servomechanism was found to be faulty, and Wedge has confirmed the magitek core that drives it is worn beyond use. Magitek cores are fragile and meant to be replaced regularly, yet the imperials let this one go far past its limit. With no replacement available in Mor Dhona, Cid sends you to Wedge, who believes he has another way.</p><p>Wedge explains that taking more imperial armor would risk drawing suspicion, so he proposes a substitute: replacing the magitek core with a mammet heart. A mammet heart can grant sentience to an automaton, and he believes it should be able to regulate the servomechanism with only minor adjustments to the housing. He has already ordered a first-rate mammet heart from the Goldsmiths’ Guild—what remains is for someone to go to Ul’dah to collect it, and to pay for it.</p><p>When you arrive at the guild, Serendipity recognizes you as acting on behalf of Garlond Ironworks and proudly presents an exceptional heart—then waves away payment, explaining it was requested for Master Alphinaud’s personal use and the guild would never charge a long-time benefactor. You leave with the heart and a request to pass along their compliments.</p><p>Back in Mor Dhona, Wedge can barely contain his excitement. He is stunned by the quality—and even more stunned to learn it was free, marveling at the advantages of Alphinaud’s influence. He slots the mammet heart into the modified housing and calls for the armor to engage. At first nothing happens, until a hopeful tap finally brings a response, and Wedge declares that “Maggie” is alive.</p><p>You take her outside for a full trial run: you climb the crystal outcroppings as high as you can, then jump down and sprint north while Wedge monitors every joint and impact, calling you back whenever you stray too far or need to restart.</p><p>When the tests conclude, Wedge reports the drivetrain is sound and should improve with fine-tuning, but the servomechanism still isn’t as responsive as it should be. He can’t explain it—the mammet heart is pristine and properly installed—until he fixates on a key difference: magitek cores only conduct impulses, whereas mammet hearts let automata process sensor information as feelings. He blurts out that maybe Maggie doesn’t feel like part of the team, and urges everyone to make her feel welcome—truly welcomed.</p><p>Cid admits the idea gives him pause, but reminds you that orthodoxy never created language, tools, clothes, or machina, and says that without a better plan, it cannot hurt to try. Biggs protests that welcoming an inanimate object is ridiculous, yet even as he grumbles, Maggie clicks in response.</p><p>Cid explains why the servomechanism matters: without it, the pilot would have to manually control every movement—exhausting at best, impossible in battle. The mammet heart was a promising answer, but it seems incompatible with Garlean technology.</p><p>Before they can try anything else, imperials arrive, spot the stolen armor, and attempt to call reinforcements—only to be thwarted by interference. Cornered, they decide to destroy it instead, and Cid orders you to protect the armor at all costs.</p><p>In the desperate fight, the Ironworks crew shouts warnings and encouragement as Maggie takes damage—until, at last, she moves. Cid recognizes it immediately: the servomechanism is finally responding, as if the battle itself forced her to act.</p><p>With the armor now functioning, Cid declares that the time has come to infiltrate Castrum Centri and rescue their comrades, and adds wryly that he will never install a mammet heart aboard the Enterprise if it means having to profess affection just to board. Thanks to Biggs and Wedge, the armor is as good as new—and you are as prepared as you can be.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Cid <small class="muted">(Mor Dhona, X:6.0, Y:6.0)</small></div></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'魔導兵器のみる夢',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>スラフボーンは、入る気があるなら――だが見つからないように、目立たぬように行け、とあなたに釘を刺す。</p><p>レヴナンツトールへ戻ると、シドは修理が順調に進んでおり、ビッグスとウェッジの作業もほどなく終わるだろうと言う。だが問題がひとつ残っていた。機体のサーボ機構に不具合が見つかり、駆動源である魔導コアが摩耗しきって使用不能だと、ウェッジが突き止めたのだ。魔導コアは定期的な交換が必要な繊細な装置だが、帝国の杜撰な整備のせいで、この機体のものは交換時期を大幅に過ぎていた。モードゥナには予備がないため、シドは代案があるというウェッジに会って話を聞くよう、あなたに頼む。</p><p>ウェッジは、さらなる機体の強奪も考えたが、それでは帝国の疑念を招きかねないと言う。そこで彼が示したのは、魔導コアの代わりに「マメットハート」を組み込むという案だった。マメットハートはオートマトンに自我を与える装置であり、サーボ機構の制御にも十分耐えうるはずだと彼は見込む。必要なのは収容部の小改造だけで、すでに彫金師ギルドへ一級品を発注済みだという。残る仕事は、ウルダハへ受け取りに行くこと――そして代金を支払うことだ。</p><p>ところが彫金師ギルドのセレンディピティは、あなたがガーロンド・アイアンワークスの使いだと察し、最上の品を用意していたと胸を張る。しかも支払いは不要だと言う。アルフィノの私用として手配されたものであり、長年の後援者に請求などできないのだと説明し、あなたにマメットハートを託し、主人へよろしく伝えてほしいと頼む。</p><p>モードゥナへ戻ると、ウェッジは受け取ったマメットハートに歓声を上げ、その見事さに息をのむ。しかもアルフィノの口利きで無償だったと知り、家柄の力に感嘆しながらも、さっそく作業に取りかかる。改造済みの収容部へマメットハートを装着し、「魔導アーマー、起動！」と呼びかけるが、最初はうんともすんとも言わない。だが軽く叩いてみると反応が戻り、ウェッジは「生きてる！」と叫んで機体に「マギー」という名までつける。</p><p>あなたは屋外へ出て試験に臨み、水晶の群れをできるだけ登り、飛び降りてから北へ全力疾走するよう指示される。ウェッジは動作を逐一観測し、やり直しが必要ならあなたを呼び戻しながら試験を進めていく。</p><p>試験の結果、ウェッジは駆動系が健全で、調整次第で性能向上が見込めると報告する。だが肝心のサーボ機構は、期待するほど反応が良くない。マメットハートは新品同然で装着も正しいのに、なぜか噛み合わないのだ。魔導コアが衝動を伝えるだけの装置であるのに対し、マメットハートはセンサー情報を処理して「感情」に至る――そう思い当たったウェッジは、マギーが仲間として迎えられていないのではないかと言い出し、みんなで温かく歓迎して居場所を作ろう、とあなたたちを煽る。</p><p>シドはその提案に戸惑いを見せつつも、定石だけでは言葉も道具も衣服も機械も生まれなかったのだと語り、他に手がない以上、試して損はないと言う。ビッグスは無機物を歓迎しろというのかと不満を漏らすが、その最中にマギーが小さく音を立てて応じる。</p><p>シドは改めて、サーボ機構の重要性を説明する。これが機能しなければ、操縦者は機体のあらゆる動きを手動で制御しなければならず、それは負担が大きすぎて戦闘では現実的ではない。摩耗した魔導コアの代替としてマメットハートは有望だったが、ガレマールの技術とは相性が悪いのかもしれない――そう言いかけた矢先、帝国兵が襲来し、奪われた機体を発見して増援を呼ぼうとする。しかし通信は妨害され、追い詰められた彼らは奪還を諦め、破壊へ舵を切る。シドは、何としても機体を守れとあなたに命じる。</p><p>激しい戦いの中で、ビッグスとウェッジは悲鳴まじりに叫び、マギーが損傷していく様子に動揺する。それでも土壇場で、マギーはついに動いた。シドはそれを見て、ようやくサーボ機構が機能したのだと悟る。</p><p>戦いが終わると、彼は冗談めかして、完全稼働に必要だったのは「命がけの一戦」だけだったと言い、エンタープライズにマメットハートを積むのはやめておこう、とあなたに笑いかける。ビッグスとウェッジの手で機体は万全となり、いよいよカストルム・セントリへ潜入し、仲間を救出する準備が整ったのだと、シドは告げる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> シド <small class="muted">（モードゥナ, X:6.0, Y:6.0）</small></div></div>`,

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'魔導兵器所見之夢',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Slafborn 問你要不要進去，但話才出口就立刻提醒：幾乎不用多說——一定要避開視線，別被人看見。</p><p>回到 Revenant’s Toll 後，Cid 告訴你修理進度很順利，Biggs 和 Wedge 也快完成了，不過還卡著一個小問題：那台魔導裝甲的伺服機構被查出有瑕疵，而驅動它的魔導核心已經磨損到無法再用。魔導核心本來就是必須定期更換的精密裝置，但帝國的疏忽讓它拖到早就超過壽命。Mor Dhona 這裡沒有現成的替換品，不過 Cid 說 Wedge 想到了一個替代方案，要你去聽他親自解釋。</p><p>Wedge 先確認魔導核心確實報廢了，也坦白再去弄一台同型裝甲回來風險太高——就算 Castrum Centri 的整備人員沒有忘記換核心，也很可能引起帝國警覺。接著他提出一個大膽的想法：用「傀儡之心」來取代魔導核心。傀儡之心能讓自動人偶擁有自我意識，他推算用來調節伺服機構綽綽有餘，只需要對收容單元做些小改造。他已向 Goldsmiths’ Guild 訂了最上等的傀儡之心，現在只差有人去 Ul’dah 取貨……以及付錢。</p><p>你抵達 Goldsmiths’ Guild 後，Serendipity 熱情地招呼你，說她已替你挑好最好的成品，但費用不必支付——因為這是給 Alphinaud 私人使用的，而他長年關照公會，公會不可能向他收費；她還請你把讚美一併帶回去。</p><p>你把傀儡之心帶回 Mor Dhona，Wedge 高興得幾乎要跳起來，看到品質更是倒抽一口氣；得知竟是 Alphinaud 的關係而免費，他又忍不住感嘆出身顯赫確實有差。隨後他把改造好的收容單元裝上傀儡之心，喊著要魔導裝甲啟動，卻一開始毫無反應。直到他半開玩笑地輕敲一下，裝甲才終於回應，Wedge 立刻喊她「活了」，甚至替她取名為 Maggie。</p><p>你依照指示把她開到外頭測試：先去攀爬附近的水晶堆、能爬多高就爬多高；接著跳下來、再往北方全力衝刺。途中若你離得太遠或需要重來，Wedge 會把你叫回去重新開始。</p><p>測試結束後，Wedge 彙整結果：傳動系統狀況良好，只要再微調，就能期待性能提升；但伺服機構的反應仍然不夠靈敏，讓他怎麼想都想不通。傀儡之心明明完好、也裝得正確，卻像是和其他機構無法協調。就在他比較兩者差異時，他突然抓到關鍵——魔導核心只是傳導脈衝，而傀儡之心會讓自動人偶把感測到的資訊「處理成感受」。他脫口而出：也許 Maggie 只是覺得自己不是團隊的一份子，所以才不肯配合；既然如此，就該好好歡迎她，讓她真正有歸屬感。</p><p>Cid 聽了也沉默了一下，但他說自己並不怪你們猶豫——Wedge 的點子確實很不按牌理出牌，可是世上的語言、工具、衣物、機械都不是靠「循規蹈矩」誕生的；在沒有更好辦法前，試試看也無妨。Biggs 仍然不情願，抱怨要大家去歡迎一個沒有生命的東西是不是太荒唐；然而 Maggie 卻發出一聲輕響。</p><p>Cid 便趁機解釋伺服機構的重要：如果沒有它，駕駛者就得手動控制魔導裝甲的每個動作，平時已經夠累，更別說戰鬥時根本不可能實用。用傀儡之心取代磨損的魔導核心原本看似可行，但很可能和 Garlean 技術不相容。</p><p>話還沒說完，帝國兵就突然現身，發現被奪走的裝甲，想呼叫增援卻被干擾阻斷；既然奪不回，他們乾脆下令就地摧毀。Cid 立刻要你不惜一切代價保護那台裝甲。</p><p>混戰之中，Wedge 驚慌地喊著要你把敵人擋開，眼看 Maggie 受損更是幾乎崩潰；Biggs 和 Cid 也在交戰中怒吼撐住局面。就在最危急的時刻，Maggie 終於動了。Cid 望著那一瞬間，像是終於等到她「願意」回應——伺服機構也因此恢復正常運作。</p><p>戰鬥結束後，Cid 苦笑著說，讓她完全正常居然只需要一場拚命的死鬥，還打趣要你記得別把傀儡之心裝到 Enterprise 上，免得每次登船還得先表白一番。如今在 Biggs 和 Wedge 的努力下，魔導裝甲已經修好到近乎全新，最後的準備也完成——你們終於能準備潛入 Castrum Centri，去救回同伴。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="escape-from-castrum-centri.html">逃離中央堡</a></div></div>`

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
