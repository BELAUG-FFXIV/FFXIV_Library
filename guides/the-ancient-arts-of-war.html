<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Ancient Arts of War | BELAUG · FFXIV Library</title>
  <meta name="description" content="SideFeature – The Ancient Arts of War (DT Patch 7.25)">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left">
        <a class="home" href="../index.html">🏠 Home</a>
      </div>
      <div class="right">
        <button id="langToggle" class="icon-btn" aria-label="切換語言">🌐 EN</button>
      </div>
    </nav>
  </header>

  <main class="container main">
    <div class="grid">
      <section class="card video-card">
        <div class="bd">
          <div class="video-wrap">
            <iframe id="ytFrame" src="https://www.youtube.com/embed/ox2Q43ExUHc"
              title="The Ancient Arts of War" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="hd" id="pageTitle">The Ancient Arts of War</div>
        <div class="tabs" role="tablist">
          <button class="tab-btn" role="tab" aria-selected="true"  data-tab="story">Story</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="acq">Acquisition</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="unlockq">Unlock Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="followq">Follow-Up Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="comments">Comments</button>
        </div>
        <div class="bd">
          <div id="panel-story"    class="tab-panel active"></div>
          <div id="panel-acq"      class="tab-panel"></div>
          <div id="panel-unlockq"  class="tab-panel"></div>
          <div id="panel-followq"  class="tab-panel"></div>
          <div id="panel-comments" class="tab-panel">
            <div id="giscus_container" style="min-height:320px;"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`The Ancient Arts of War`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Archive is pleased to see that you have successfully interfaced with the soul shard. Even so, he quickly cautions you that its power is likely limited to the area enclosed by the island’s ward. That restriction does little to diminish its importance. He explains that as you gather more knowledge, the shard should allow you to call upon increasingly powerful techniques, and he is certain that this will not be the only one hidden somewhere on the island.</p><p>The more soul shards you uncover, the more varied the ancient disciplines available to you will become. To Archive, that possibility seems almost self-evident. This island still holds too many secrets, and the shard in your possession feels less like an isolated discovery than the first sign of a wider system waiting to be unearthed. For now, though, he admits there is little more he can teach you about it.</p><p>Rather than hold you back, Archive urges you to continue your excursions. Before you do, however, he tells you to speak with the imposing woman nearby. Ketenramm then explains that she has been inspecting the fortifications around the camp. He can only hope she has found nothing too alarming, or else the expedition may be forced to spend its time repairing defenses instead of pressing deeper into the island.</p><p>When you meet her, she reports that although the walls have clearly weathered many years of hardship, they remain sound enough to serve their purpose. So long as the entrances are properly secured, the camp should remain safe while you are away exploring. It is a practical reassurance, but an important one. On an island where so little can be trusted, even a defensible refuge carries real weight.</p><p>Ketenramm accepts the report, yet he is not content to let the expedition drift forward without direction. Wandering the island may reveal much, but aimless movement alone will not bring you closer to the truth. Before you set out again, he makes it clear that the time has come to decide on a firm course of action. The mystery before you is growing wider with every step, and from this point onward, each excursion must carry purpose.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Archive <small class="muted">(South Horn, X:38.8, Y:7.9)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="new-job-old-tricks.html">New Job, Old Tricks</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="creatures-of-the-crescent.html">Creatures of the Crescent</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'古の戦闘技術',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>アーカイブは、あなたが無事にソウルシャードと干渉できたことに満足げな様子を見せる。だが彼はすぐに、その力はおそらく島を覆う結界の内側でしか働かないだろうと告げる。それでも、その価値が損なわれるわけではない。知識を積み重ねていけば、あなたはより強力な技を引き出せるようになるはずであり、しかも島にはまだほかにもソウルシャードが眠っているに違いないと、彼は確信していた。</p><p>手にするソウルシャードが増えるほど、あなたが扱える古の技の幅も広がっていく。アーカイブにとって、それはごく自然な見通しのようだった。この島にはまだ解き明かされていないものが多すぎる。今あなたが得たシャードも、単なるひとつの遺物ではなく、これから先に連なる仕組みの入口に過ぎないのだろう。もっとも、現時点で彼自身が語れることは、もはやそう多くはないらしかった。</p><p>だからこそアーカイブは、あなたをこれ以上引き留めず、探索を続けるよう促す。ただその前に、近くにいる堂々とした女性に話を聞いておくべきだと勧める。ケテンラムによれば、彼女は拠点の防備がどの程度もつのかを確かめているところだった。もし深刻な問題が見つかれば、遠征隊は島の探索どころではなく、防衛設備の補強に追われることになりかねない。</p><p>やがて彼女は、壁こそ長い年月を経て傷んでいるものの、拠点を守るには十分な強度を残していると報告する。出入口さえしっかり固めておけば、あなたが島を巡っているあいだも、この場所は安全な足場であり続けるだろうという。その言葉はきわめて現実的なものだったが、この島ではそうした確かな拠点があるというだけで大きな意味を持っていた。</p><p>ケテンラムはその報告を受けても、ただ漫然と先へ進むつもりはなかった。島を歩き回れば何かしら見つかるだろうが、それだけでは真相には届かない。これから本当に前進するためには、明確な方針が必要だと彼は考える。再び外へ出る前に、どう動くべきかをきちんと定めようとするその言葉には、この遠征がいよいよ本格的な局面へ入ろうとしている気配がにじんでいた。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> アーカイブ <small class="muted">(三日月島南部, X:38.8, Y:7.9)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="new-job-old-tricks.html">「サポートジョブ」の継承</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="creatures-of-the-crescent.html">三日月島に棲む魔物</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'古代戰技',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Archive 看見你成功與那枚靈魂碎片產生連結後，明顯感到相當滿意。不過他很快也提醒你，這股力量恐怕只能在籠罩整座島的結界範圍內發揮作用。即便如此，這並不影響它的重要性。依他的說法，隨著你累積更多知識，你應該很快就能從中引出更強大的技巧，而他也幾乎可以肯定，這座島上絕對不只藏著這一枚靈魂碎片。</p><p>你持有的靈魂碎片越多，能運用的古代技藝種類也就會越豐富。對 Archive 來說，這幾乎是理所當然的事。這座島本身就還埋著太多未解之謎，而你現在拿到的這一枚，更像只是某種更大體系的起點，而不是孤立的發現。只是現階段，他自己能告訴你的關於靈魂碎片的事，似乎也只到這裡為止了。</p><p>於是 Archive 不再繼續耽誤你外出探索，只是在你離開前，特地提醒你先去和附近那位氣勢十足的女性談談。Ketenramm 接著補充說，她正在檢查營地周圍防禦設施的狀況。若是她發現了什麼嚴重問題，那麼遠征隊接下來恐怕就得先忙著加固防線，而不是立刻深入島內調查。</p><p>等你前去確認後，她表示，雖然這些牆體早已不復當年模樣，但整體結構仍然足夠穩固。只要把幾處出入口妥善守住，這座營地在你外出探索期間依舊能維持安全。那是一番非常務實的判斷，卻也讓人稍微安下心來。畢竟在這座處處透著異樣的島上，哪怕只是能夠安心返回的據點，都已經十分珍貴。</p><p>Ketenramm 聽完之後，顯然也不打算再讓遠征隊毫無方向地四處摸索。單靠漫無目的地在島上遊走，或許能看見更多東西，卻未必能真正逼近真相。你再次出發之前，他認為必須先把接下來的行動方針想清楚。隨著眼前的謎團一步步擴大，往後的每一次探索，都不能只是碰運氣，而必須帶著明確目的前進。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Archive <small class="muted">(南角, X:38.8, Y:7.9)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="new-job-old-tricks.html">新職業，老把戲</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="creatures-of-the-crescent.html">棲息在新月島的魔物</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
