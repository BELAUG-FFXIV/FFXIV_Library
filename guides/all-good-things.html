    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}

      .grid{grid-template-columns:1fr}

    .video-card .bd{padding:0}

    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}

    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;
  overflow-y:auto;
  padding-right:8px;
  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}

    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'All Good Things',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Y’shtola tells you that even though word of the victory will already have reached Maelstrom Command, protocol demands that someone from the Scions report the success in person. She places that honor in your hands, commends you once more for work well done, and promises you will speak again soon.</p>
      <p>At Maelstrom Command, R’ashaht Rhiki welcomes you and says they heard of your triumph some time ago, yet are glad to have it confirmed by you directly. They reflect on how you have faced both Ifrit and Titan, and admit that thinking on your achievements makes the loss of the Warriors of Light feel less keenly—offering it as the highest compliment.</p>
      <p>R’ashaht Rhiki calls you and the Scions heroes, saying they are grateful to have a Scion counted among their ranks. They promise to relay the details of your report to the Admiral at once, ask that you send their regards to the Scions of the Seventh Dawn, and bid you farewell until next time.</p>
      <p>Before you can go far, Minfilia’s voice reaches you through a linkpear—Y’shtola has already informed her of your success. She tells you that you have won a great victory for the people of Eorzea, one that will not be forgotten, and her relief is clear as she adds that both you and Y’shtola came out of O’Ghomoro unscathed.</p>
      <p>Minfilia says that Tataru and the others were as glad for your safe return as they were for Titan’s fall, and she urges you to look forward to a hero’s welcome. She tells you they will be awaiting you at the Waking Sands with much to discuss, and sends you off with “Godsspeed.”</p>
      <p>When you pass through Vesper Bay, the uneasy talk of nearby villagers stops you in your tracks. One asks if you heard the commotion and wonders what in the seven hells could have been happening inside, urging you—clearly the adventurous type—to take a quick look, while another admits they heard screaming and aren’t sure they want to know.</p>
      <p>At the Waking Sands, Noraxia is there—glad, they say, that you are safe—and then the Echo takes hold. In the vision, Minfilia repeats that they will be awaiting your return and speaks with palpable relief that Y’shtola is safe, as though someone—Louisoix—might be watching, and as though your light might yet illuminate the realm once more. The moment shatters when a Scion cries for you to advance no further, and Livia sas Junius forces her way in with imperial soldiers, demanding the one who slew Ifrit and Titan. Tataru’s fear breaks through in a whimper, and Minfilia orders you to stay out of sight, saying she would leave a message with you. She offers her surrender if the innocents are spared, but Livia rejects any conditions, mocks the bargain, and confirms that the quarry is not there—yet makes it clear they knew to look here. When Minfilia gasps at how they could have known, Livia cuts her off, denies the surrender’s terms, and orders the withdrawal with prisoners: even without their quarry, the “High Priestess of the Scions” will suffice, and Livia savors the thought of her screaming—then commands, again, “Enough,” and they leave with captives in tow.</p>
      <p>When the Echo fades, Noraxia is left struggling to speak, telling you that Minfilia asked them to pass on a message in case you returned: you must claim sanctuary at the church in eastern Thanalan. Noraxia says they tried to protect Minfilia from the imperials, begs your forgiveness, and with their last breath pleads for you to save—before their voice falls silent. Reaching the Church of Saint Adama Landama near Drybone, Father Iliud sees the suffering in your face and offers help; when you confess, “Forgive me, Father, for I have sinned,” he tells you to close your eyes and look within—acknowledge misdeeds and regrets, strive to atone with an earnest heart, and you will surely find salvation.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">

  JP:{
    langLabel:'日本語',
    pageTitle:'灯りの消えた日',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ヤ・シュトラは、すでに黒渦団軍令部にも勝利の報は届いているはずだが、規定により暁の血盟から高位の指揮官へ作戦成功を直接報告せねばならない、と告げる。その栄誉は本来あなたのものだと言い、改めて労をねぎらって、いずれまた話そうと静かに結ぶ。</p>
      <p>黒渦団軍令部で、ル・アシャ・リキはあなたの来訪を喜び、しばらく前から勝利の報告は耳にしていたが、こうして直接確かめられるのが嬉しいと言う。イフリートに続きタイタンまで討った功績を思えば、光の戦士たちを失った痛みもいくらか和らぐ――それ以上の賛辞はない、と率直に称える。</p>
      <p>ル・アシャ・リキは、あなたと暁の血盟を英雄と呼び、黒渦団に暁の血盟員がいることを誇らしく思うと告げる。そして報告の詳細はただちに提督へ伝えると約し、暁の血盟の仲間たちへよろしく伝えてほしいと言って、次の機会までと別れを告げる。</p>
      <p>ほどなくして、リンクパール越しにミンフィリアの声が届く。ヤ・シュトラから成功を聞いたと告げ、あなたがエオルゼアの人々のために大きな勝利をもたらしたこと、その勝利は決して忘れられないことを、はっきりと言い切る。</p>
      <p>さらにミンフィリアは、あなたとヤ・シュトラがオ・ゴモロから無事に戻ったことを心から安堵したと語り、タタルやほかの仲間たちも、タイタン討伐と同じくらいあなたたちの無事を喜んでいたのだと伝える。英雄として迎える準備をしているから、砂の家へ戻ってほしい、話すべきことがたくさんある――神々の加護を、と言って声を切る。</p>
      <p>ベスパーベイを通りかかると、周囲は騒然としている。さきほどの物音を聞いたか、と不安げな住人が問いただし、いったい中で何をしていたのかと憤りながら、あなたが冒険者に見えるなら少し見てきてくれ、と頼む。別の住人は、悲鳴のような声が聞こえたと震え、知りたくない気持ちを隠せない。</p>
      <p>砂の家に着くと、ノラクシアはあなたの無事を喜ぶが、すぐに超える力が発現する。幻視の中でミンフィリアは、砂の家で帰りを待っている、話し合うことがある、と繰り返し、ヤ・シュトラの無事を知って胸をなで下ろす。そしてルイゾワに呼びかけるように、あなたの光がこの者の中で強く輝き、いつか再び世界を照らすだろうと語りかけた刹那、暁の血盟員がこれ以上進むなと叫ぶ。そこへリウィア・サス・ユニウスが帝国兵を率いて踏み込み、イフリートとタイタンを討った者を差し出せと迫る。タタルは怯え、ミンフィリアはあなたに姿を隠すよう命じ、伝言を託すと言う。無辜の者を助けることを条件に自ら投降すると申し出るが、リウィアは条件を拒み、探しても求める者はいないと見て取る。それでも、ここへ来るべきだと知っていたことをにおわせ、ミンフィリアがどうしてと息をのむと、思考を切り上げて投降条件を否定する。さらにリウィアは、獲物こそ得られずとも暁の血盟の盟主を連れていけば十分だと言い放ち、超える力を持つ彼女の悲鳴を楽しみにしていると冷たく言う。制止の声を乱暴に断ち切って退却を命じ、囚人を連れて立ち去る。</p>
      <p>幻視が消えると、ノラクシアは苦しげに言葉を絞り出し、あなたが戻ったときのためにミンフィリアから伝言を託されていたと告げる。東ザナラーンの教会で庇護を求めよ――それが伝えるべきことだと言い、帝国兵からミンフィリアを守ろうとしたが叶わなかったと悔い、許してほしいと懇願し、そして救って、と言いかけたまま息絶える。ドライボーン近くの聖アダマ・ランダマ教会に辿り着くと、イリュドはあなたの顔に深い苦しみを見て取り、助けになれることがあれば何でも言ってほしいと静かに促す。あなたが罪の告白を口にすると、目を閉じて内を見つめ、過ちと悔いを認め、真摯な心で償いに努めれば、きっと救いは得られると諭す。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ヤ・シュトラ　<small class="muted">高地ラノシア (X:30.0, Y:23.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="lord-of-crags.html">灯りの消えた日</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 34～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="you-cant-take-it-with-you.html">止まったままの時間</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'陰雲籠罩',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Y’shtola 說，雖然勝利的消息應該早就傳到 Maelstrom Command，但依照規定，仍必須由 Scions 的代表親自向最高指揮官報告任務成功，而這份榮耀理當由你來完成。她再次稱讚你做得很好，並說很快還會再與你談話。</p>
      <p>你抵達 Maelstrom Command 時，R’ashaht Rhiki 見到你很是欣慰，表示你勝利的消息早已傳來，但能親口從你這裡得到確認更令人安心。他回想你先討伐 Ifrit、又擊倒 Titan，坦言光是想到你的功績，就讓他對失去 Warriors of Light 的遺憾不再那麼尖銳——而這已是他所能給出的最高稱讚。</p>
      <p>R’ashaht Rhiki 直言你與 Scions 都是英雄，也說能在他們的行列中有 Scion 這樣的夥伴令人安心。他會立刻把你報告的細節轉達給 Admiral，並請你代為向 Scions of the Seventh Dawn 問候，最後向你道別，說下次再見。</p>
      <p>你還沒走遠，Minfilia 的聲音就透過 linkpearl 傳來——她說 Y’shtola 已經通知她你成功了。Minfilia 告訴你，你為 Eorzea 的人民贏得了一場偉大的勝利，而且這份功績將不會被遺忘。</p>
      <p>她接著說，更重要的是你與 Y’shtola 都從 O’Ghomoro 平安無事地走了出來；她的語氣裡滿是如釋重負，並提到 Tataru 和其他人同樣慶幸你們安然歸來，甚至不亞於為 Titan 的倒下而歡呼。她要你期待屬於英雄的迎接，並說 The Waking Sands 正等著你回去，有許多事必須商量，最後送上祝福。</p>
      <p>當你經過 Vesper Bay，附近村民的騷動聲讓你停下腳步。一名滿懷不安的居民說剛才那陣喧鬧實在離奇，氣急敗壞地猜測裡頭到底在做什麼，並看你像是冒險者，請你去快速查看一下；另一名被嚇壞的居民則低聲說他似乎聽見尖叫，光是想到就不寒而慄。</p>
      <p>你回到 The Waking Sands，Noraxia 先是鬆了一口氣，說他很高興你平安，隨後 Echo 便驟然襲來。在你所見的景象中，Minfilia 再次說他們正等著你回來，語氣裡滿是對 Y’shtola 安然無恙的慶幸，彷彿在對 Louisoix 訴說：你的光正在他之中閃耀，終有一天會再度照亮這片土地。緊接著，一名 Scion 厲聲喝止你不要再前進，而 Livia sas Junius 率領帝國兵闖入，要求交出那個斬殺 Ifrit 與 Titan 的人。Tataru 驚恐地發出嗚咽，Minfilia 壓低聲音要你躲起來，說她會把訊息留給你，並提出以自己投降為代價、換取無辜者平安。Livia sas Junius 卻拒絕任何條件，譏諷她的勇氣只適合穿上盔甲，並表示看來他們要找的人不在此處；然而她也明言自己知道該來這裡。Minfilia 倒抽一口氣，尚未問出原因，就被對方打斷，投降條件被當場否決。Livia sas Junius 冷冷地說，即便沒抓到目標，只要帶走 Scions 的「High Priestess」也足夠，她迫不及待想聽見對方的尖叫，隨即喝令撤退，命人帶走囚犯。</p>
      <p>當 Echo 退去，Noraxia 已經幾乎說不出話來，仍勉強告訴你：Minfilia 要他在你回來時轉告你，必須前往 Eastern Thanalan 的教會尋求庇護。Noraxia 說他試著保護 Minfilia 不被帝國的人帶走，卻失敗了，他請你原諒，最後只來得及哽咽著求你去救——聲音便徹底沉寂。你趕到 Drybone 附近的 Church of Saint Adama Landama，Father Iliud 看出你承受過極深的痛苦，溫和地問你是否需要幫助；當你開口懺悔，他要你閉上眼、向內凝視，承認自己的過失與悔恨，以真誠的心去償補，如此便能找到救贖。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 雅·修朵拉　<small class="muted"> 拉諾西亞高地 (X:30.0, Y:23.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="lord-of-crags.html">陰雲籠罩</a></div>
      <div class="row">所有職業（不含限定職） 等級 34 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="you-cant-take-it-with-you.html">靜止的時間</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
