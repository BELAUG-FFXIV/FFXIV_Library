<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`It’s Possibly a Primal`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Slafborn greets you with a laugh, teasing that you’re back to doing the work of a dozen people again. Even so, he quickly shows respect—someone “important” like you can’t be spared for menial errands. Since you’re here, he offers to give you a look around the Scions’ new home and points out an impressive structure nearby. It was originally built as a guild branch, complete with a tavern where adventurers can rest from the road, eat and drink well, and trade stories of fortunes waiting across the realm. It may grow rowdy at times, Slafborn admits, but he figures it will be the perfect place to find capable allies for your cause, and he invites you to come along for a tour.</p><p>Before you can take more than a step, Tataru’s voice suddenly reaches you through a linkpearl, cutting in with urgent news. Grim tidings have arrived from Gridania, and the Scions’ aid is needed immediately—she begs you to return to the Waking Sands at once. Slafborn’s expression shifts as he asks if everything is all right; he can’t know the details, but it’s clear this is no time for a leisurely visit. Still, he promises he’ll handle whatever arrangements are needed and urges you to come back after you’ve dealt with the pressing matter. Even afterward, he warns you not to linger—Tataru’s call sounded far too urgent to ignore.</p><p>Back at the Waking Sands, Tataru explains what she knows: while you were in Mor Dhona, a messenger from the Twin Adder arrived and spoke with the Antecedent. Tataru didn’t hear the conversation, but she saw the Antecedent’s face after the messenger left—and something is definitely wrong. Her mind races through possibilities: could the Ixal have summoned Garuda again, or have imperial forces been sighted within the Shroud? Whatever the truth, she insists you can handle it, and urges you to speak to the Antecedent without delay—she needs you.</p><p>Minfilia meets you with the weary certainty of someone who feared this moment. They have reason to believe another primal—or something resembling one—has been summoned in Gridania. Urianger adds that the aetheric waves leave little room for doubt; your talents will soon be required. If his suspicions are correct, the foe is familiar, though not quite like the Lady of the Vortex. Minfilia cautions that they cannot conclude without evidence, but the readings strongly resemble those observed more than five years ago. With a sigh, she admits she had hoped they had moved beyond such follies—yet the disturbance demands a full investigation.</p><p>Urianger tells you Commander Vorsaile Heuloix has requested your presence at the Adders’ Nest. Minfilia orders you to hasten to Gridania, where Yda and Papalymo will rendezvous with you, and she sends you off with a blessing to walk in the light of the Crystal. When you arrive in New Gridania, Vorsaile Heuloix welcomes you warmly and thanks you for coming so swiftly—saying there is no one more qualified—before stopping himself and asking to explain from the beginning.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Slafborn <small class="muted">(Mor Dhona, X:21.9, Y:7.8)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="laying-the-foundation.html">Laying the Foundation</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="hail-to-the-king-kupo.html">Hail to the King, Kupo</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'黒衣森で覚醒するもの',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>スラフボーンはあなたを見て、相変わらず十人分の働きをしているようだと冗談めかして笑う。とはいえ、あなたのような重要人物が雑事に時間を割けないことは彼も理解しているらしく、せっかくだからと「暁の血盟」の新たな拠点を見て回らないかと誘ってくる。あちらに見える立派な建物がそうだと示し、もとは冒険者たちのための施設として建てられたため、旅の疲れを癒やし、食事や酒を楽しみ、各地の儲け話に耳を傾けられる酒場まで備わっているのだと説明する。時に騒がしくはなるだろうが、腕の立つ仲間を集めるにはうってつけの場所になるはずだと言い、案内しようとあなたを促す。</p><p>しかしその矢先、リンクパール越しにタタルの声が割り込んでくる。グリダニアから深刻な知らせが届き、今すぐ助力が必要だというのだ。彼女は一刻も早く「砂の家」へ戻ってほしいと懇願し、あなたは案内を中断せざるを得なくなる。事情を知らないスラフボーンもただならぬ気配を察し、今は見物どころではないだろうと告げる。それでも必要な手配は自分が進めておくから、急ぎの用件を片づけたらいつでも戻ってこいと約束し、あなたがここで足を止めないよう改めて注意する。</p><p>「砂の家」に戻ったあなたに、タタルは状況を伝える。あなたがモードゥナにいた間、「双蛇党」からの使者が来て「先導者」と会談したのだという。内容までは聞けなかったが、使者が去ったあとに見た彼女の表情が忘れられず、何かがおかしいと確信している。イクサルが再びガルーダを呼び出したのか、あるいは黒衣森で帝国軍が目撃されたのか――タタルは不安を口にしながらも、あなたなら対処できるはずだと背中を押し、すぐに「先導者」に会って力になれることがないか尋ねてほしいと急かす。</p><p>ミンフィリアは、いつかこの日が来ると覚悟していたが、こんなにも早いとは思わなかったと語り、グリダニアで新たな蛮神――あるいはそれに似た存在――が召喚された可能性があると告げる。ウリエンジェは、エーテルの波動から見て疑いようがなく、ほどなくあなたの力が必要になるだろうと言い添える。もし彼の疑念が正しければ、相手は見覚えのある脅威だが、「嵐の女王」とはまた異なる存在らしい。ミンフィリアも結論は急げないとしつつ、観測値は五年以上前に確認されたものと酷似していると認め、ため息交じりに、もはやそのような愚行とは無縁であってほしかったと漏らす。それでもこの異変は見過ごせず、徹底した調査が必要だと決断する。</p><p>ウリエンジェは、双蛇党のヴォルセール・ルロワ中佐があなたを求めており、「アダー・ネスト」で待っていると伝える。ミンフィリアはあなたにグリダニアへ急行するよう命じ、ヤ・シュトラたちではなく、ヤ・ダとパパリモが現地で合流すると知らせ、クリスタルの光の加護を祈って送り出す。新グリダニアに着くと、ヴォルセール・ルロワ中佐はあなたに会えたことを喜び、迅速な来訪に礼を述べる。あなたほど適任はいないと言いかけたところで話を区切り、まずは順を追って説明させてほしいと切り出す。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> スラフボーン <small class="muted">（モードゥナ, X:21.9, Y:7.8）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="laying-the-foundation.html">レヴナンツトールへ</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="hail-to-the-king-kupo.html">無垢なる爆走</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'黑衣森林的覺醒者',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Slafborn 見到你時先笑著打趣，說你又像要扛起十幾個人的工作一樣回來了。不過他也懂得分寸，口頭上調侃歸調侃，仍承認像你這樣「重要的人」不該把時間耗在瑣事上。既然你人在這裡，他乾脆提議帶你看看 Scions 的新據點，指著不遠處那棟氣勢十足的建物說「就是那裡」。他解釋那原本是為了設立公會分部而建，因此設施很齊全，甚至有酒館能讓冒險者歇腳、吃喝補充體力，也能在熱鬧的談笑間聽見各地等待被發掘的致富傳聞。就算有時候會吵鬧些，他仍覺得那會是替你們招募可靠夥伴的好地方，於是邀你跟著他一起參觀。</p><p>但你還來不及細看，Tataru 的聲音就突然透過 linkpearl 插進來，語氣急得像是下一秒就要出事。她說 Gridania 傳來了不祥的消息，看來 Scions 的協助刻不容緩，請你立刻趕回 Waking Sands。Slafborn 聽得出事情不對勁，關切地問你是不是出了什麼狀況，也坦言現在顯然不是悠閒導覽的時候。不過他同時保證，必要的安排他會替你處理好，叫你先去解決更緊急的事，之後再回來也不遲。等你停留片刻，他甚至再次提醒你別在這裡耽擱——那通 linkpearl 聽起來真的非常急。</p><p>回到 Waking Sands，Tataru 把她知道的情況一口氣說給你聽：你在 Mor Dhona 的時候，Twin Adder 的使者曾來到這裡，與 the Antecedent 交談。她雖然沒聽見內容，但親眼看見使者離開後 the Antecedent 的神色，那種凝重讓她確信一定出了問題。她忍不住猜測是不是 Ixal 又把 Garuda 召喚回來了，或是帝國軍隊在Shroud 被目擊了。不管究竟是哪一種，她都相信你一定能應付，並催促你立刻去找 the Antecedent （Minfilia 的頭銜也就是「Scions of the Seventh Dawn」的領袖）問問是否有你能做的事——她需要你，千萬別拖延。</p><p>Minfilia 見到你後沉聲坦白，她早知道這一天終究會來，只是沒想到來得這麼快。她說他們有理由相信，Gridania 出現了另一個 primal——或是某種與 primal 相似的存在。Urianger 也補充，從以太波動的反應來看幾乎沒有疑點，你的能力很快就會派上用場；若他的推測屬實，眼前將面對的是一個熟悉的敵人，但又與 Lady of the Vortex （Garuda 的稱號）不盡相同。Minfilia 強調在沒有證據前不能妄下定論，但觀測數據確實與五年多前曾出現過的反應高度相似。她嘆了口氣，說自己原以為早該遠離那類愚行，然而這次異常仍必須徹底調查。</p><p>接著 Urianger 告訴你，Commander Vorsaile Heuloix 已提出請求，要你前往 Adders’ Nest 與他會面。Minfilia 要你立刻趕往 Gridania，並表示 Yda 和 Papalymo 會在那裡與你會合，最後以祝福送你踏上路途。抵達 New Gridania 後，Vorsaile Heuloix 一如往常地客氣迎接你，感謝你迅速趕來，說他想不到還有誰比你更合適——但話到一半又先按下，表示要先把事情從頭說明清楚。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 斯拉佛伯恩 <small class="muted"> 摩杜納（X:21.9, Y:7.8)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="laying-the-foundation.html">前往喪靈鐘</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="hail-to-the-king-kupo.html">善王駕到</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
