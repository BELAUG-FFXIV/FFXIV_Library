<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`One Last Hurrah`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>A messenger stops you before you can leave Tuliyollal and says Ketenramm has been looking for you. When he arrives, the old explorer wastes no time explaining himself. He asks you to join his final expedition, then begins with a tale from long ago, when the sea beyond Vylbrand was still a blank unknown and explorers could do little more than chase the horizon. While others sailed west and vanished into deadly waters, he and his crew survived only by steering north and avoiding the stretch of sea that would later be feared as Shades’ Triangle.</p><p>He tells you that he once swore to uncover the truth of those waters for the sake of the comrades he lost, yet life in Tural led him down other paths before he could fulfill that vow. Even after settling there and disbanding his expedition, the mystery never truly released its hold on him. Then he met you, and with that meeting came the feeling that perhaps the answer he had sought for so long was finally within reach. When he asks whether you will join him on one last voyage, you agree without hesitation.</p><p>Ketenramm admits that he had nearly given up hope of ever sailing again, but Koana and Wuk Lamat saw through the worry he had kept hidden. Rather than hold him back, they encouraged him to follow his heart. With their blessing, he arranged a ship from Limsa and asks you to meet the navigator, Ofangeim, at the pier. There you learn that Shades’ Triangle is not forever consumed by storms after all. For a brief season, the skies clear and the sea grows calm, and that narrow window is why the expedition is departing now.</p><p>Once you board the vessel beyond the shallows, Ketenramm and Ofangeim finally speak plainly about what awaits ahead. Though most blame the region’s disappearances on violent weather, the last ship known to chart those waters sent back a far stranger report: fair conditions, a crescent-shaped isle nearby, and the promise of safe harbor during storms. That ship never returned. Since then, sailors have whispered of the “Occult Crescent,” a shifting mirage that lures all who see it to their deaths. Even knowing that, the crew has chosen to come, drawn by the danger, the mystery, and the chance of discovery.</p><p>As you speak with the others on board, the expedition takes on a fuller shape before your eyes. Some have sailed near the Triangle before and seen the island only on the clearest days, always from a distance. Some have family ties to Ketenramm’s first journey to Tural and speak of how traveling with him changed lives. Others look beyond legend and danger to the future, convinced that if the island can be reached safely, it may open new trade routes or reveal untapped resources. Even their confidence is tempered by unease, especially when you hear of the drunken madman they had to bind and stuff into an empty barrel after he tried to launch a lifeboat.</p><p>When the ship finally enters Shades’ Triangle, excitement hardens into tension. Land is sighted ahead, then suddenly vanishes, only to appear elsewhere as though the island itself refuses to stay in one place. Ketenramm realizes that this is no natural phenomenon. Something is distorting what all of you see. In the middle of that confusion, a strange voice reaches only you, calling for you to heed it. Before there is time to understand what it means, the ship lurches. The steersman loses control, and it feels as though some unseen force is dragging the vessel inward.</p><p>The next moment, the expedition finds itself brought flawlessly to shore, the hull untouched and the ship fixed in place as though held by invisible power. Ketenramm concludes that some manner of sorcery has delivered you straight to your destination and likely trapped you there as well, yet he meets that impossible turn of events with stubborn wonder instead of fear. As you stand before the phantom village that should not exist on an uninhabited island, he begins to suspect that the voice you heard may have been a summons. Even so, there is no turning back now. He urges you to help secure the area, suggests that aetherial currents may offer a way past whatever ward surrounds the isle, and places a journal in your hands so that you may record everything you find in this place of mystery.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Expedition Messenger <small class="muted">(Tuliyollal, X:17.1, Y:11.8)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="dawntrail.html">Dawntrail</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-phantom-village.html">The Phantom Village</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'ケテンラム、最後の冒険',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたがトライヨラを発とうとしていたところへ、使者が駆け寄ってくる。ケテンラムがぜひ会いたがっているというのだ。ほどなく姿を現した老いた探検家は、回りくどい前置きもなく、自らの最後の遠征に加わってほしいと切り出す。そして彼は、かつてヴィルブランドより先の海がまだ白紙の地図の彼方に過ぎなかった頃の話を語り始める。多くの探検家たちが西へと進み、危険な海に呑まれていったなか、彼と仲間たちだけは北へ針路を取ったことで生き延び、後に「シェード・トライアングル」と恐れられる海域を避けてトラルへたどり着いたのだという。</p><p>彼は、波間に消えた仲間たちのためにも、いつかその海の謎を解き明かしたいと願っていた。だがトラルに根を下ろし、遠征隊を解散したのちも、その機会はついに訪れなかった。それでも心の奥では、あの呪われた海のことが片時も離れなかったのだろう。そんな折にあなたと出会い、あなたとなら長年追い求めてきた答えにようやく手が届くのではないかと感じたのだと、ケテンラムは率直に打ち明ける。最後の旅に同行してほしいという願いに、あなたは迷うことなく応じる。</p><p>ケテンラムは、自分がもう二度と海へ出ることはないかもしれないと、以前から半ば諦めていたと語る。だがコーナとウクラマトは、彼の胸に残り続けていた未練に気づいていた。ふたりはその思いを否定せず、むしろ心に従うべきだと背中を押したのだ。そうして王宮での務めに区切りをつけた彼は、リムサから船を取り寄せ、桟橋で航海士のオファンゲイムと合流するようあなたに告げる。そこであなたは、「シェード・トライアングル」が常に嵐に閉ざされているわけではなく、わずかな季節だけ空が晴れ、海が静まることを知る。その短い好機こそ、彼らが今まさに出航しようとしている理由だった。</p><p>浅瀬の向こうに待つ船へ乗り込むと、ケテンラムとオファンゲイムは今回の航海の目的をさらに詳しく語る。人々はあの海域で船が消えるたび、荒れ狂う天候のせいだと決めつけてきた。だが最後にその海を調査した船は、まったく異なる報せを残していたという。海は穏やかで、近くには三日月形の島が見え、嵐を避ける避難先になり得る──そう伝えたまま、その船は港へ戻らなかった。それ以来、船乗りたちはその島を「オカルトクレセント」と呼び、目にした者すべてを死へ誘う、さまよう幻だと囁くようになった。それでも乗組員たちは危険を承知で船に乗っている。未知のものが放つ抗いがたい魅力が、恐れを上回っているからだ。</p><p>甲板で仲間たちと言葉を交わすうちに、この遠征に懸けられた思いが少しずつ見えてくる。過去に「シェード・トライアングル」の近くまで航行し、雲ひとつない日にだけ遠くから島影を見たことがある者もいれば、ケテンラムとともに最初にトラルへ渡った一団に家族を持つ者もいる。危険な伝承より、その先にある可能性へ目を向ける者たちもいた。もし安全な航路を開けるなら、貿易は大きく変わり、島に眠る資源も明らかになるかもしれないというのだ。だが期待だけでは済まされない不安も確かにあり、救命艇を勝手に降ろそうとした酔漢を縛り上げ、空の樽に押し込めたという話には、この旅の不穏さがにじんでいた。</p><p>やがて船が「シェード・トライアングル」へ踏み込むと、高揚は緊張へと変わる。見張りが陸地を見つけたと叫んだかと思えば、その島影はたちまち消え、今度は別の方角に現れる。まるで島そのものが定まらぬ幻であるかのようだった。ケテンラムは、これは自然の現象ではないと悟る。何者かが、そこにいる全員の知覚を狂わせているのだ。その混乱のさなか、不思議な声があなたにだけ届く。呼びかけの意味をつかむより早く、船体が大きく揺れ、舵は利かなくなる。まるで見えない力に船ごと引き寄せられているかのようだった。</p><p>次の瞬間、船は信じがたいほど見事に接岸していた。船体に傷ひとつなく、それでいてどれだけ動かそうとしても、その場に固く縫い留められている。ケテンラムは、何らかの秘術によって目的地へ直接運ばれ、しかもこの島に閉じ込められたのだろうと見当をつける。だが彼は恐怖に呑まれるより先に、その常識外れの出来事さえも探検家らしい興奮として受け止める。無人島であるはずの場所に広がる幻の村を前にしながら、あなたが船上で聞いた声は、もしかするとこの島からの呼び声だったのではないかと語る。そして立ち止まることなく、まずは周囲の安全を確かめるよう促し、島を包む結界を迂回できるかもしれないエーテルの流れにも言及する。さらに、ここで得たすべてを記すための記録帳をあなたに託し、この不可思議な地での歩みを後の誰かへ残してほしいと願うのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 探査隊の連絡員 <small class="muted">(トライヨラ, X:17.1, Y:11.8)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="dawntrail.html">黄金のレガシー</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-phantom-village.html">無人の町</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'最後一場的壯遊',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>當你正準備離開 Tuliyollal 時，一名使者匆匆趕來攔住你，說 Ketenramm 正在找你。沒過多久，這位年邁的探險家便親自現身，毫不拐彎抹角地邀請你參與他人生最後一次遠征。隨後，他談起了很久以前的往事──在 Vylbrand 以西仍是一片未知、地圖盡頭只有空白的年代，無數探險者只是循著地平線出航。許多人一路向西，最終葬身於危險的海域；唯有他與同伴選擇偏北航行，才避開了後來被稱為「Shades’ Triangle」的致命海域，活著抵達了 Tural。</p><p>Ketenramm 坦言，自己一直想替那些葬身海上的同伴查明那片海域的真相，可是在 Tural 落腳、解散遠征隊之後，這個心願始終沒有實現。即使歲月流逝，那片詛咒般的海域也從未真正從他心中消失。直到他遇見你，他才再次產生一個念頭──若有你同行，也許自己終於能親手揭開那道長年未解的謎團。面對他最後一次航行的邀請，你沒有遲疑，直接答應了下來。</p><p>Ketenramm 接著說，自己其實早就擔心這輩子可能再也沒有機會出海了。不過 Koana 和 Wuk Lamat 早已看穿了他壓在心底的不甘，兩人不僅沒有阻止，反而勸他順從自己的心意。得到他們的支持後，Ketenramm 立刻安排好船隻，甚至特地從 Limsa 調來了遠航用的船，要你到碼頭與航海士 Ofangeim 會合。在那裡，你得知傳說中的 Shades’ Triangle 並非終年風暴肆虐。每隔一段短暫時節，天空會放晴，海面也會平靜下來，而這正是他們急於啟航的原因。</p><p>登上停在淺灘之外的船後，Ketenramm 與 Ofangeim 才把這趟航行真正的目標完整說給你聽。人們總把那片海域的失蹤事件歸咎於惡劣天候，但最後一艘曾試圖測繪那片海域的船，留下的訊息卻異常古怪。那艘船回報說，當時海況平穩，附近還出現了一座三日月形的島嶼，甚至可能成為暴風雨中的避風港。然而那艘船從此再也沒有返航。自那之後，航海者便將那座島稱作「Occult Crescent」，視它為會引人走向死亡的漂移幻影。即使如此，船上的人依舊選擇前來，因為未知本身散發出的誘惑，往往比恐懼更難抗拒。</p><p>你與船上的成員交談時，也逐漸看見這支遠征隊各自懷抱的理由。有人曾多次在最晴朗的日子遠遠望見那座島，卻始終沒有勇氣靠近；有人提起自己的祖父當年曾與 Ketenramm 一同踏上 Tural，說那趟旅程徹底改變了家族後來的人生。也有人把目光放得更遠，認為若能找到安全登島的方法，不只可能開闢新的對外貿易航線，還可能發現尚未開發的天然資源。只是這份期待並不代表他們毫無不安，尤其當你聽說船上還綁了一個酒瘋發作、試圖私放救生艇的瘋子，甚至最後只能把他塞進空桶裡時，整趟旅程的不穩與危險便更加鮮明地浮現出來。</p><p>當船真正駛入 Shades’ Triangle 時，原本的興奮很快被緊張取代。瞭望手才剛喊出看見陸地，下一瞬那座島便從視野中消失，緊接著又出現在另一個方向，彷彿它本身就是無法固定形體的幻影。Ketenramm 很快察覺，這絕不是自然現象，而是有某種力量正在扭曲所有人的感知。就在眾人混亂之際，一道陌生的聲音只傳入你的意識之中，像是在呼喚你回應它。你還來不及理解那句話的真正意思，整艘船便猛然一震，掌舵也徹底失去控制，彷彿有看不見的力量正把你們強行拖向某個地方。</p><p>下一刻，船竟以近乎不可能的方式完美靠岸，船身毫髮無傷，卻又像被無形之力牢牢固定住，再也無法移動。Ketenramm 判斷，你們多半是被某種魔法直接送到了目的地，而且很可能也因此被困在這座島上。可即使面對這樣超乎常理的局面，他依舊沒有退縮，反而以探險家特有的興奮接受了這一切。站在本該無人居住的島上，望著眼前那座不該存在的 phantom village，他開始懷疑你在船上聽見的聲音，也許正是來自這座島本身的召喚。之後他要你先協助確認周邊安全，並提到若能借助乙太流動，也許有機會繞過包圍整座島的結界。最後，他把一本記錄冊交到你手中，希望你將在這片神祕土地上的所見所聞一一寫下，讓這場遠征留下足以讓後人細讀的紀錄。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 探險隊聯絡員 <small class="muted">(圖里約拉, X:17.1, Y:11.8)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="dawntrail.html">黃金的遺產</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-phantom-village.html">空無一人的城鎮</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
