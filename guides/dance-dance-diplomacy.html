  <meta charset="utf-8" />

  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Dance Dance Diplomacy',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>At Little Solace, Yda turns to you with a bright grin and asks if you are in the mood for dancing. She reminds you that you went to no small trouble to learn the sylphs’ traditional greeting, yet have greeted hardly any of them with it. If she were a sylph, she says, she would be beside herself with delight to see an adventurer taking such an interest in her people’s culture. She cheerfully declares that she would be happy to join you herself—right up until a stab of pain from her ever-problematic leg cramps cuts her off. Rubbing at her leg with a rueful “ow, ow,” she leaves the actual dancing to you.</p>
      <p>You set about greeting the sylphs of Little Solace in the way you have been taught. Near one of the huts, you approach a sylph who is weaving cloth. She speaks of her work, then grows guarded, saying that she does not trust walking ones who do not show respect. To her, you are a strange walking one, and she claims to have nothing to teach such a stranger. When you respond not with words alone but with the proper dance of greeting, her attitude changes. She wonders if you truly wish to be a friend to “these ones,” and when she believes it, she is overjoyed. Even so, she says that the ways of weaving must remain a secret, and that even if a walking one learned that secret, they could never weave in quite the same way.</p>
      <p>You move on to another sylph tending a pot set over a small fire. At first you might mistake it for a meal, but she explains that she is boiling bark and flower seeds to dye thread. The color must be jolly, she says, and so must the greeting that accompanies it. Your first, uncertain motions strike her as strange, and the sight of a walking one moving so oddly makes her feel ill at ease; she flutters in agitation and tells you to go away, shooing you off. When you steady yourself and perform the jolly dance as the sylphs do, her mood brightens at once. She calls it a jolly dance that fills her with good cheer, and happily declares that the two of you should be friends.</p>
      <p>A little farther on, you approach another sylph lingering at the edge of the settlement. She asks what a walking one wants with her and admits that the elder warned her not to become too friendly with walking ones. When she sees your greeting, she asks if that is how walking ones greet each other and suggests, half in exasperation, that if you wish to find other walking ones, you might be better off going home. Yet when you persist in dancing the sylphs’ own steps and show that you wish to be a friend to “these ones,” her tone softens. She says that you are friendly like the gracious elder of the forest city, and that you know how to dance your way into their hearts. In time, you return to Yda, who greets you with a laugh and asks if you would like the good news or the better news. The good news, she says, is that your lovely dancing has brought smiles and high spirits to all of Little Solace. The better news is that she has thoroughly recovered from those accursed leg cramps. With that, she declares that it is time to move on to your next adventure.</p>
    </div>

  JP:{
    langLabel:'日本語',
    pageTitle:'挨拶は軽快に',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>シルフ族の集落で、イダがあなたの方を向き、踊る気分じゃないかと笑顔で問いかける。あなたは、シルフ族の挨拶を学ぶためにずいぶん苦労してきたのに、実際にはほとんど誰にも披露していないではないかと、彼女は楽しそうに指摘する。もし自分がシルフ族だったなら、自分たちの文化に興味を示してくれる冒険者がいたら、きっと大喜びするはずだと続ける。もちろん一緒に踊りたいところだが──と言いかけたところで、いつもの脚のけいれんがぶり返し、「痛い、痛い」と顔をしかめてしまう。こうしてイダは、自分は見物に回るから、実際に踊る役目はあなたに任せると苦笑いする。</p>
      <p>あなたは教わったとおりの挨拶の踊りを披露しながら、集落のシルフたちに近づいていく。ひとりは、小さな作業場で布を織っている最中だ。彼女は、自分はいま布を織っているのだと説明したうえで、敬意を示さない歩く者は信用できないと言って身構える。見慣れない歩く者であるあなたを奇妙な存在だとみなし、そのような者に教えることは何ひとつないと突き放す。そこであなたが言葉だけでなく、シルフ族の挨拶として教わった踊りで応えると、彼女の態度は次第に和らいでいく。あなたが「この者たち」と友になりたいのかと問い直し、本当にそうであると感じ取ると、大きな喜びをあらわにする。ただし、布の織り方はこの者たちだけの秘伝であり、たとえ歩く者がその秘密を知ったとしても、まったく同じようには織れないのだと静かに告げる。</p>
      <p>次にあなたは、鍋の前に立っている別のシルフのもとを訪れる。最初は食事を作っているのかと思いきや、彼女は樹皮や花の種を煮出して糸を染めているのだと教えてくれる。糸の色は陽気でなければならず、それに添える挨拶も同じくらい陽気であるべきだと語る。あなたがまだおぼつかない動きで踊り始めると、その奇妙な動きが彼女の不安をあおってしまい、落ち着かない気持ちにさせるのだと訴え、 shoo とでも言うように手を振って追い払おうとする。そこであなたが動きを整え、シルフ族が「陽気な踊り」と呼ぶ踊り方をしっかりと披露すると、彼女の表情は一気に明るくなる。楽しい踊りだと喜び、その踊りが自分の心まで陽気にしてくれたと笑い、この二人は友だと宣言してくれる。</p>
      <p>さらに少し進んだ先で、あなたは集落の外れに佇む別のシルフに声をかける。彼女は、歩く者が自分に何の用かと問い、長老から歩く者とあまり親しくなりすぎないようにと注意されているのだと打ち明ける。あなたの挨拶を見て、歩く者同士はそうやって挨拶を交わすのかと首をかしげ、もしほかの歩く者を探したいのであれば、自分の住む場所へ帰る方がいいのではないかと口にする。それでもあなたが、シルフ族のやり方に合わせた踊りを繰り返し、友でありたいという気持ちを示し続けると、彼女の声音は次第に柔らかくなる。あなたは森の都の寛大な長のように親しみやすく、「この者たち」の心に踊り込む術を知っているのだと評し、友として受け入れてくれるのだ。やがてあなたがイダのもとへ戻ると、彼女は嬉しそうに駆け寄り、良い知らせともっと良い知らせ、どちらから聞きたいかと笑いながら問いかける。良い知らせは、あなたの見事な踊りが集落じゅうに笑顔と元気をもたらしたこと。もっと良い知らせは、自分の脚のけいれんもすっかり良くなったということだと続け、次の冒険へ向かおうと陽気に宣言する。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> イダ　<small class="muted">黒衣森：東部森林 (X:21.9, Y:25.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="first-contact.html">シルフ族との架け橋</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 21～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="forest-friend.html">仮宿暮らしの困りごと</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'輕快的問候',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Little Solace 裡，Yda 轉向你，笑嘻嘻地問你今天有沒有跳舞的心情。她提醒你，你可是費了一番功夫才學會 sylphs 的傳統問候方式，結果到現在真正用在他們身上的次數少得可憐。如果她是 sylph，看見有冒險者願意對自己的文化這麼上心，一定會樂得飛來飛去。說到這裡，她還說自己當然也很樂意一起跳──話才說到一半，熟悉的腿部抽筋又突然發作，痛得她連忙抱著大腿喊痛，只好把跳舞的重責大任通通交給你。</p>
      <p>你開始在 Little Solace 裡四處走動，用剛學會的 sylph 式舞步向這些「these ones」打招呼。首先，你來到一位正在編織布料的 sylph 身邊。她一面忙著手上的工作，一面說自己正專心在織布，接著語氣一轉，表示她不信任那些不懂得表達敬意的 walking ones。在她眼裡，你是個奇怪的 walking one，對這樣的對象，她沒有什麼好教的。於是你收起多餘的解釋，用正統的 sylph 問候舞來回應她。看著你依照他們的方式舞動，她的態度逐漸柔和下來，確認你是否真心想成為「these ones」的朋友；當她确信之後，整個人顯得十分開心。不過，她仍然說明織布的手法是她們的秘密，就算 walking one 學會了其中的訣竅，也不可能像她們一樣織出同樣的布。</p>
      <p>接著你來到另一位 sylph 身邊，她正站在一口鍋子旁忙碌。乍看之下像是在準備餐點，但她說自己是在熬煮樹皮和花種，用來染線。染出來的顏色必須看起來很 jolly，連帶著打招呼的方式也要一樣愉快。你一開始試著跳給她看時，動作有些生疏，在她眼裡顯得十分奇怪，讓她覺得很不自在，連連揮手要你走開，急急忙忙地把你趕走。你調整腳步和節奏，改用真正的「jolly dance」再度在她面前起舞，這一次，她的表情立刻亮了起來。她說這支 jolly dance 讓她的心情變得輕快愉悅，最後開心地表示，你們兩個就做朋友吧。</p>
      <p>再往前走一段路，你接近一位站在聚落邊緣的 sylph。她先問 walking one 找她有什麼事，又提到 elder 曾警告她不要和 walking ones 太過親近。當她看見你的動作時，先是疑惑那是不是 walking ones 之間的打招呼方式，甚至反過來建議你，想找其他 walking ones 的話，也許還是回自己住的地方比較好。然而，你持續以 sylph 的步伐與姿態問候她，表明自己希望成為「these ones」的朋友，她的語氣漸漸軟化下來。最後，她說你就像森林都市裡那位和藹的 elder 一樣友善，懂得用舞步走進她們的心。等你回到 Yda 身邊，她興沖沖地迎上來，問你想先聽好消息還是更好的消息。好消息是，你可愛的舞步讓整個 Little Solace 都充滿笑容與好心情；更好的消息則是，她那討人厭的腿部抽筋已經完全康復。說完，她便高舉雙手，宣告該邁向下一場冒險了。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 伊達　<small class="muted"> 黑衣森林東部林區 (X:21.9, Y:25.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="first-contact.html">初次接觸</a></div>
      <div class="row">所有職業（不含限定職） 等級 21 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="forest-friend.html">林中摯友</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
