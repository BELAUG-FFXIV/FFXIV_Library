    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You notice Krile lingering by a cluster of stone pillars, and Wuk Lamat laughs that the sight has clearly caught her attention. When Krile asks what makes them special, Wuk Lamat says they may look like ordinary decorations at first glance—but if you study them closely, you’ll find they’re far more interesting than they appear.</p><p>You follow her advice and look again. What seemed like simple carvings resolves into pictures—no, glyphs—arranged as a series of stories, many of them centered on a two-headed Mamool Ja. Wuk Lamat confirms it: they chronicle her father, Gulool Ja Ja, and his journey to unite the land—what Tuliyollal calls the Tuliyollal Saga, his deeds and the bonds he forged set into stone for anyone willing to read.</p><p>On the first set, Wuk Lamat points out a scene where Gulool Ja Ja granted an audience to a foreign explorer—“Ket…something,” she says, until Krile supplies the name: Ketenramm. Wuk Lamat explains that Ketenramm’s arrival was what spurred her father to set out, and that the two are said to have become close—brothers in spirit, if not in blood—though no one knows what became of the explorer later. Krile admits the mystery endures in Eorzea as well: the records speak of travel between your lands for a time, and then only the assumption that he was lost at sea.</p><p>The next stories carry you onward through Tuliyollal’s past. One shows Gulool Ja Ja visiting the Hanuhanu in their village in Kozama’uka, and Wuk Lamat describes them as a bright, cheerful people with a famous annual festival. Another recounts the long conflict between the Xbr’aal and the Mamool Ja for control of the forest of Yak T’el—and how Gulool Ja Ja’s actions to end it are now celebrated as the first steps toward founding Tuliyollal. Yet another depicts the Moblins of Kozama’uka: odd masks and muffled voices, Wuk Lamat says, but unmatched gold- and silverwork that has become the standard for gift giving.</p><p>When you move to the remaining pillars, Wuk Lamat explains the tale of the Pelupelu of Urqopacha—the merchant clan who created your currency, oversee Tuliyollal’s markets, and send traveling peddlers across Tural; she warns you not to mistake them for children just because they’re small. Another pillar speaks of the Yok Huy, giants who once built a dominion across Yok Tural, subdued the south, then turned north toward Xak Tural—only to abandon their conquests and withdraw into the mountains of Urqopacha. And Wuk Lamat’s favorite shows the battle with Valigarmanda, a legendary tural vidraal—an aged creature awakened to unnatural power—called the Skyruin for the devastation it brought whenever it stirred, until Gulool Ja Ja and his comrades overcame it some eighty years ago and sealed it away in the mountains; despite its terror, its likeness now stands as a symbol of power on Tuliyollal’s emblem and banners.</p><p>One pillar is left blank. Wuk Lamat says her father chose it that way—saving space for the next chapter of Tuliyollal’s history, whatever it may be. When you finally pull yourself away, Wuk Lamat brightens, admits she’s suddenly ravenous now that she can keep food down again, and insists you all go try a local delicacy at the best restaurant in the city.</p><p>At Xbalyav Ty’e, she enthusiastically describes tacos—crunchy shells baked from corn flour and filled with meat and salad—and urges you downstairs to order from the proprietor, Br’uk Evu, whom she praises as Tural’s greatest taco artisan. As the food is prepared, you overhear talk of the Silverscales returning from an overseas foray in disaster, with more than half their warband missing; the survivors, eager to rebuild their reputation, have turned their hopes toward the golden city, a fable that has swallowed countless dreamers. Krile asks whether the legend is widely known here, and Wuk Lamat admits it is—though many doubt it exists—before another voice cuts in: Bakool Ja Ja, a two-headed Mamool Ja, mocking Wuk Lamat as the “Third Promise” who went crying abroad for special help. Krile tries to keep the peace, but Bakool Ja Ja boasts that he and his “blessed siblings” alone are fit to succeed Gulool Ja Ja as Dawnservant; Wuk Lamat snaps back that all peoples are equal in Tuliyollal, and later, with the bad taste still in her mouth, explains what you’re seeing—rare two-headed offspring born from unions between Hoobigo and Boonewa clans, possessed of immense physical and magical strength. Before she can even drown the moment in more tacos, Alphinaud’s voice reaches you through a linkpearl: the others are ready to present themselves at the palace for the rite of succession. You turn toward the climb to Vollok Shoonsa, meeting the group there—talk of another two-headed claimant, of astonishing city food and sweet cherimoya—while Wuk Lamat arrives still hungry enough, she claims, to eat a whole roasted colibri, but determined not to keep the contest waiting.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>クルルが石柱の前で足を止めているのを見て、ウクラマトは笑いながら「この場所がクルルの興味を引いたみたいだな」と言う。クルルが「この柱は何が特別なの？」と尋ねると、ウクラマトは「ぱっと見はただの石の飾りに見えるけど、よく見ればもっと面白いものだ」と促す。</p><p>あなたが目を凝らすと、彫刻はただの模様ではなく、絵――いや、物語を刻んだグリフだとわかる。そこには二つの頭を持つマムージャが何度も描かれており、クルルは「これは……」と言いかける。ウクラマトは頷き、父グルージャジャが諸勢力をまとめ上げた旅路と偉業を刻んだものだと告げる――それが「トライヨラル・サーガ」。成したこと、結んだ絆、そのすべてが石に残されているのだと言う。</p><p>最初の石柱で描かれているのは、グルージャジャが異邦の探検家に謁見を許した場面だ。ウクラマトは名前を思い出せずに言い淀むが、クルルが「ケテンラム」と補う。ウクラマトは、ケテンラムの来訪が父の旅立ちのきっかけになったこと、そして二人が血縁ではないが魂の兄弟のように親しくなったと伝えられていることを語る。ただ、その探検家が後年どうなったのかは誰にもわからない。クルルも、エオルゼアでも同じく行方は謎で、しばらく両国を行き来した記録ののち、海で消息を絶ったのだろうとされていると答える。</p><p>次々に石柱を追ううち、トライヨラルが形になるまでの断片が繋がっていく。コザマル・カでハヌハヌの村を訪れた話では、ウクラマトは彼らを朗らかで陽気な民だと言い、年に一度の有名な祭りがあると誇らしげに語る。別の石柱では、ヤクテル樹海を巡ってシュバラールとマムージャが長年争ったこと、そしてその争いを終わらせた父の行いが、トライヨラル建国の第一歩として称えられていることが示される。さらに別の石柱にはコザマル・カのモブリンが描かれ、奇妙な仮面とくぐもった声でも、金銀細工の品は随一で、贈り物の定番になっているのだとウクラマトは説明する。</p><p>後半の石柱に移ると、ウクラマトはウルコ・パチャのペルペルを示し、通貨を作った商人の氏族として市場を取り仕切り、各地に行商人を送り出していると語る。「小さいからって子ども扱いするなよ」と、仮面の下は抜け目ない商人だと付け加える。別の石柱では、ヨカフイの巨人たちがヨカ・トゥラル一帯に覇権を築き、南を従えたのちサカ・トゥラルへ北進しようとし、巨大な橋まで築いたことが語られる――それでも、ある時期を境に突然すべてを捨て、ウルコ・パチャの山へ退いたのだという。そしてウクラマトが特に気に入っている石柱では、伝説のトゥラル・ヴィドラーであるヴァリガルマンダとの戦いが描かれる。寿命を超えて生き、超常の力に目覚めた存在で、「スカイルイン」と呼ばれるほどの破壊と恐怖をもたらしたが、およそ八十年前にグルージャジャと仲間たちが激闘の末に討ち伏せ、ウルコ・パチャの山々に封じた――その姿は今や国章や宮殿の旗にも掲げられる力の象徴だという。</p><p>最後に残る石柱には印がない。ウクラマトは、父が「次の章」のために空白を残したのだと言い、これからトライヨラルが歩む歴史を刻む場所になるのだろうと語る。ひと通り見終えると、ウクラマトは急に空腹を訴え、今ならもう食べられる気がすると笑って、街いちばんの店で名物を食べようとあなたを誘う。</p><p>シャバーブチェに着くと、ウクラマトはタコスの作り方まで勢いよく説明し、トウモロコシ粉の殻に肉やサラダを詰めるのが定番だと言う。そして主人のブルケブを紹介し、タコス作りにかけてはトゥラル一の職人だと太鼓判を押す。注文の合間、あなたはシルバースケイルズが海外遠征で大損害を受け、戦団の半数以上と頭目を失ったという話を耳にする。生き残りは名誉挽回のため黄金郷を追うが、同じ伝説を追って消えた者は数知れない――そんな噂に、クルルは黄金郷の伝説が広く知られているのかと問い、ウクラマトは誰も見たことがないから疑う者も多いと答える。そこへ、二つ頭のマムージャであるバクージャジャが現れ、「第三の『プロミス』」を嘲るように言葉を投げつける。クルルは無益な争いを止めようとするが、バクージャジャは自分たちこそがグルージャジャの後を継いで「暁のしもべ」になるにふさわしいと豪語し、ウクラマトは「トライヨラルでは皆が平等だ」と強く言い返す。場が収まったあと、ウクラマトは二つ頭がいかに稀かを語り、フビゴ族とブネワ族のあいだに生まれることがあり、肉体と魔力の両面で途方もない力を持つのだと説明する。だが落ち着いて追加のタコスを求める間もなく、リンクパール越しにアルフィノから呼びかけが届く――王位継承の儀に臨むため、宮殿で合流しようというのだ。あなたはヴォロク連王宮へ向かい、道中で仲間たちと合流する。二つ頭の申立人の話、街の食の話、チェリモヤの美味しさ――そしてウクラマトは、腹は空いているが、いつまでも儀式を待たせるわけにはいかないと気を引き締める。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>你注意到 Krile 在一排石柱前停下腳步，Wuk Lamat 低笑著說，這個地方果然抓住了 Krile 的注意。Krile 問這些石柱有什麼特別之處，Wuk Lamat 說它們乍看只是普通的石雕裝飾，但只要你真的仔細看，就會發現它們遠比外表更有意思。</p><p>你依她所說湊近端詳，那些「圖案」立刻變了樣：看起來像畫，又更像是一段段被刻進石裡的符文故事。Krile 先是愣住，隨即反應過來那不是隨手的裝飾，而是可以讀的記錄；而其中反覆出現的，是一名「雙頭 Mamool Ja」。Wuk Lamat 點頭承認——這些石柱記下的是她的爸爸 Gulool Ja Ja 走遍各地、把眾人團結起來的旅程與事蹟，人們稱它為「Tuliyollal Saga」，把他做過的事、結下的羈絆，都刻成了不會褪色的歷史。</p><p>你從第一批石柱開始讀起。Wuk Lamat 指著其中一幕說，那是 Gulool Ja Ja 接見一名遠道而來的外國探險家，她一時想不起名字；Krile 立刻替她補上——Ketenramm。Wuk Lamat 說，正是 Ketenramm 的到來，才促使她的爸爸踏上自己的旅程；傳說兩人後來成了精神上的兄弟，雖非血親，卻彼此信任相扶，只是探險家晚年究竟去了哪裡，沒人說得清。Krile 也坦言，在 Eorzea 的紀錄裡同樣只有謎團：曾有一段時間往返兩地的記載，之後便只能推測他失落於海上。</p><p>你繼續往下讀，Tuliyollal 成形之前的片段一段段接上。某一根石柱講的是 Gulool Ja Ja 造訪 Kozama’uka 的 Hanuhanu 村落；Wuk Lamat 說他們性情開朗、總是帶著笑意，還有一年一度遠近馳名的節慶。另一根石柱則提到 Xbr’aal 與 Mamool Ja 為了 Yak T’el 的森林爭戰多年，而她的爸爸為終結那場衝突所做的事，後來被視為建立 Tuliyollal 的第一步。還有一根石柱描繪 Kozama’uka 的 Moblin：他們戴著奇特的面具、說話像被悶住，但金銀工藝無人能及，連送禮的標準都因此被他們定下。</p><p>當你讀到後半段，Wuk Lamat 先指給你看 Urqopacha 的 Pelupelu：他們創造貨幣、管理市場，行商走遍 Tural 的每個角落；Wuk Lamat 還提醒你別被他們嬌小的身形騙了——那副鳥喙面具底下，是精明到讓人不敢小看的商人。另一根石柱講的是 Yok Huy：巨人曾憑著龐大的力量與資源建立橫跨 Yok Tural 的霸權，南方收服後又把目光投向 Xak Tural，甚至在天門之外築起那座巨大的橋；然而某個時刻，他們卻忽然放棄一切，退回 Urqopacha 的山中。Wuk Lamat 最喜歡的那根石柱，刻的是與 Valigarmanda 的戰鬥——那是一頭傳說中的 tural vidraal，活得遠超常理、因此覺醒出異常的力量；它被稱作「Skyruin」，因為每次從沉睡中甦醒，都會把毀滅與恐懼帶到 Tural。Wuk Lamat 說，大約八十年前，她的爸爸與同伴歷經苦戰，終於壓制了狂暴的 vidraal，並將它封印在 Urqopacha 的群山之中；即使名聲駭人，它的形象如今仍被當作力量的象徵，出現在 Tuliyollal 的國徽與宮殿旗幟上。</p><p>你看到最後，還有一根石柱是空白的。Wuk Lamat 說那是她的爸爸刻意留下來的——為了 Tuliyollal 歷史的「下一章」，至於那會是什麼，連他也沒有替未來下定論。你們讀到這裡告一段落時，Wuk Lamat 忽然說自己餓得不得了；她笑著承認，之前一段時間什麼都吃不下，但現在似乎終於準備好好吃一頓，於是堅持要帶你們去城裡最棒的餐館，嚐嚐當地名物。</p><p>你們來到 Xbalyav Ty’e，Wuk Lamat 迫不及待介紹 Tuliyollal 的經典——tacos：用玉米粉烤出酥脆外殼，再塞進肉與沙拉；她說這裡做得最好，立刻要你們下樓向老闆 Br’uk Evu 下單，還誇他是全 Tural 最了不起的 tacos 匠人。等餐的時候，你聽見旁人談到 Silverscales 的海外遠征以災難收場，戰團過半失蹤，連首領都不見了；倖存者想重建名聲，便轉而追逐那座「黃金之城」，可追著傳說消失的人多到數不清，能活著回來已算走運。Krile 因此問起黃金之城的傳說是否家喻戶曉，Wuk Lamat 說確實很有名，但因為從沒有人親眼見過，也有人懷疑是真是假。話音未落，一名雙頭 Mamool Ja——Bakool Ja Ja——帶著嘲弄插話，稱 Wuk Lamat 是「第三位『Promise』」，還譏諷她因害怕即將到來的競爭，才跑去外地尋求特別的幫手。Krile 想把衝突壓下去，Bakool Ja Ja 卻自稱「受祝福的兄弟」，宣稱只有他才配繼承 Gulool Ja Ja、成為 Dawnservant；Wuk Lamat 立刻回敬：Tuliyollal 的所有人民都平等，血統不會讓任何人更有資格。等那股惡意終於被甩在身後，Wuk Lamat 才壓著火氣告訴你：雙頭的 Mamool Ja 極其罕見，通常是 Hoobigo 與 Boonewa 之間偶爾誕生的後代，天生同時擁有驚人的肉體力量與魔法天賦。她還沒來得及用更多 tacos 把情緒壓下去，Alphinaud 的聲音便透過 連絡珍珠傳來——大家已經準備好前往宮殿，參與繼承儀式，要你們在那裡會合。你們轉向 Vollok Shoonsa 的方向與眾人碰頭：有人提到路上看見另一名雙頭 Mamool Ja，有人還在回味城裡的美食與那顆名為「cherimoya」的水果。Wuk Lamat 仍舊餓得發慌，卻也只能咬牙說——就算肚子空到能吞下一整隻烤 colibri，這場競爭也不會等人。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 可露兒 <small class="muted"> 圖萊尤拉（X:9.4, Y:13.5)</small></div></div>`,

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
