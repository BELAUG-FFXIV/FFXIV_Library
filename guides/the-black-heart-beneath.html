    story:`<div class="clamp" data-collapsed="true">
<p>You find Shigure in Kugane, and he greets you with relief—saying you look well, and hoping your travels have not been too taxing. He admits that the search for the Soboro Sukehiro—and for Yojimbo—has dragged on without even a measure of progress. Before he can say more, Hildibrand and Nashu sweep in, with Hildibrand loudly calling him “my bald man” and Shigure bristling at the insult he never asked for.</p>
<p>Hildibrand confesses that the investigation has yielded nothing of value and demands to know whether Shigure has any word of “Jim,” only for Shigure to realize he means Yojimbo and to repeat that he has learned nothing. Nashu, however, arrives beaming with a gift: a hair tonic of “preternatural effectiveness,” urging Shigure to try it at once. As Shigure hesitates—then relents—a gentle dead man appears, delighted to encounter “Master Zombibrand” and his companions again, and explains why he remains in the Far East: he stayed to pursue rumors of a funa yurei, hoping to recruit an undead spirit after failing to find fellow zombies.</p>
<p>Hildibrand pivots immediately and asks whether the gentle dead man has heard mention of Yojimbo. He hasn’t—only admitting that many avoid him because he is undead—prompting Hildibrand to lament prejudice against the “living impaired.” Shigure points out a different problem: the man’s resemblance to the recently captured Wolf Burglar may be frightening people off, and suggests changing clothes. The gentle dead man agrees at once, and Hildibrand declares the plan settled—split up and make inquiries again, all across Kugane.</p>
<p>When you canvas the city, you don’t find Yojimbo—but you do find a mood. People speak of the Kugane Wolf Burglar with startling warmth, insisting his “victims” were greedy scoundrels and claiming he gave what he stole to the poor. Some fear the Sekiseigumi will punish him cruelly, and others argue that Akebono has long been surrounded by dark rumors. More than one person implies that anyone seen as helping the Sekiseigumi may be turned away, and you come away with little to show for the hunt except the sense that the city’s sympathy has shifted.</p>
<p>When you report back, Shigure is visibly shaken by how many voices weigh on the Wolf Burglar’s fate. He insists the law is the law and that even disreputable merchants deserve fair treatment, yet he can’t ignore that protest may be choking off information—and as a man of the Sekiseigumi, he admits he feels conflicted. Hildibrand suggests Shigure dress less conspicuously, and Shigure considers using his old kimono, but worries his face is already known. Nashu then offers a sharper idea: ask the Wolf Burglar directly—if the people trust him, perhaps they have told him secrets. Shigure seizes on the possibility that the burglar and Yojimbo might know each other, and you head to question the prisoner.</p>
<p>Inside the gaol, Shigure lays out the facts: Yojimbo absconded with the Soboro Sukehiro after the burglar stole it from Akebono, and Shigure believes the sword may have been Yojimbo’s aim all along. The Wolf Burglar replies that everyone knows the blade is worth a fortune—but selling a masterpiece so famous, especially after its theft is public, would be nearly impossible without disreputable contacts he happens to know. He offers introductions—on one condition: set him free. Shigure refuses at first, but Hildibrand urges him not to judge too quickly, and Shigure—mindful of how many have vouched for the burglar—offers a bargain instead: a temporary release into their custody for the investigation, with the promise of leniency if he abides by the terms. The Wolf Burglar accepts with a smirk and calls him “baldy.”</p>
<p>Doubt creeps in—whether Shigure’s superiors will ever approve it, and whether time will be wasted in deliberation—but Hildibrand turns to Nashu for the hair tonic and insists Shigure use the entire bottle right there. Shigure complies, feels something strange on his scalp, and then a blinding light erupts as the turnkey rushes in shouting. In the confusion, Hildibrand declares the Wolf Burglar “liberated,” and Shigure scrambles to cover the disaster by claiming one of his associates carried small explosives that detonated unexpectedly. The turnkey, bewildered by the flash and by the fact that Shigure suddenly has hair again, lets the moment pass—and you slip away, following the Wolf Burglar into the waterways below.</p>
<p>Down in the tunnels, the Wolf Burglar introduces you to Kugane’s castoffs, greeting Koju and warning you to treat them with basic civility. Koju has never heard of Yojimbo, but he understands the problem at once: finding a buyer for the Soboro Sukehiro—even through the black market—would be brutally difficult, and if a sale were being arranged, word would likely have reached them. That leaves another possibility: Yojimbo took it to keep it, and if he’s a collector, the next target could be another legendary blade—the Ame-no-Murakumo. Shigure reels at the claim it might exist, and when you confirm you have seen it in the Kojin of the Red’s treasure vault, the direction sharpens: the Ruby Sea. The Wolf Burglar agrees it’s the best place to look, Hildibrand refuses any delay, and Shigure insists he must first change into less conspicuous clothing—promising to meet you at the Ruby Sea after he does.</p>
</div>

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
<p>あなたはクガネでシグレと合流し、彼はあなたが元気そうだと安堵しつつ、旅が過酷すぎなかったかと気遣う。だが肝心のソボロ助広とヨウジンボウの行方は、いまだ手掛かりすら乏しいままだという。そこへヒルディブランドとナシュが現れ、ヒルディブランドはシグレを「ハゲ」と呼んで調子よく絡み、シグレは反射的に言い返す。</p>
<p>ヒルディブランドは、価値ある情報も取るに足らぬ情報も得られず、方針を練り直していたのだと嘆き、「ジム」の話を知っているかと詰め寄る。シグレはそれがヨウジンボウのことだと理解し、進展はないと繰り返す。するとナシュが「効き目抜群」の育毛剤を持ってきたと言い、今すぐ試せと勧める。シグレが戸惑いながらも応じようとしたそのとき、温厚な死人が現れ、「マスター・ゾンビブランド」と仲間たちに再会できたと喜ぶ。彼はエオルゼアへ戻るつもりだったが、舟幽霊の噂を追うために東方に残ったのだと語り、仲間のゾンビ集めがうまくいかなかったからこそ、幽霊にも友誼を求めたのだと言う。</p>
<p>ヒルディブランドはすかさずヨウジンボウの名を出して聞き込みの成果を尋ねるが、温厚な死人は聞いたことがないと答え、死人であるせいで人々に避けられることもあると漏らす。ヒルディブランドは「生者として不便を抱える者」への偏見を嘆くが、シグレは別の原因を指摘する。彼の風体が、つい最近まで街を騒がせた狼じみた逃亡者に似ているせいで、話を聞けないのではないか――だから服を変えるべきだ、と。温厚な死人はすぐに同意し、ヒルディブランドは改めて宣言する。手分けして、クガネの人々にもう一度聞き込みだ。</p>
<p>あなたが街を回って得たのは、ヨウジンボウの手掛かりではなく、空気そのものだった。人々はクガネの狼盗賊を意外なほど慕い、被害者は強欲な悪党ばかりで、盗んだ品も貧しい者へ分け与えていたのだと語る。赤誠組が苛烈な処罰を加えるという噂に憤る声もあれば、アケボノにまつわる黒い噂を持ち出す者もいる。さらに、赤誠組に協力する者を快く思わない者が増えていると示唆され、あなたは聞き込みの難しさを痛感する。</p>
<p>報告を受けたシグレは、狼盗賊の境遇が多くの人の心を占めていることに驚く。貧者の味方だという評判がどれほど広まっていようと、法は法であり、たとえ不徳な商人であっても公正に扱われるべきだ――群衆の感情に委ねれば、それは別の不正になると彼は言う。だが抗議のために情報が閉ざされるのは問題で、赤誠組の一員として葛藤もあると打ち明ける。ヒルディブランドは目立たぬ服装を勧め、シグレは古い着物を使うことを考えるが、顔が知られている以上、欺こうとすれば反感を買いかねないと悩む。そこへナシュが、狼盗賊に直接聞くべきだと提案し、シグレは彼とヨウジンボウが互いを知っている可能性に賭け、牢へ向かう。</p>
<p>牢の中でシグレは状況を突きつける。狼盗賊がアケボノから奪ったソボロ助広を、ヨウジンボウが持ち去って逃亡した。あの刀が最初から狙いだったのではないか――だから動機と人となりを知りたいのだと。狼盗賊は、あの名刀が莫大な価値を持つことは誰でも知っているが、盗難の噂が広まった今、買い手を見つけるのは難しいと言い、裏の連中の力が必要になるとほのめかす。そして紹介してやる代わりに自分を自由にしろ、と取引を持ちかける。シグレは即座に拒むが、ヒルディブランドが早計を戒め、シグレもまた多くの市民が彼の人柄を擁護していたことを思い出し、妥協案を出す。捜査のため一時的に身柄を預かり、条件を守れば情状酌量も提案する――狼盗賊は「ハゲ」と呼んで、その取引を受ける。</p>
<p>それでも上官が認めるか、手続きに時間がかかりすぎないかという不安が残る。するとヒルディブランドはナシュの育毛剤を思い出し、牢の中で使えと迫り、一本まるごと頭に注げと命じる。シグレが従った瞬間、頭皮に奇妙な感覚が走り、まばゆい光が炸裂して戸番が駆け込んでくる。混乱の中でヒルディブランドは囚人を「解放」したと高らかに宣言し、シグレは咄嗟に、仲間が携えていた小型爆薬が誤って爆発したのだと弁明する。戸番は閃光に困惑し、しかもシグレの髪が生えていることに目を丸くするが、あなたたちは言い逃れて牢を離れ、狼盗賊に導かれて下水路へ潜る。</p>
<p>水路の奥で狼盗賊はクガネの落伍者たちを紹介し、コウジュに声をかけ、彼らに最低限の礼節を求める。コウジュはヨウジンボウの名に心当たりはないが、ソボロ助広の買い手探しは闇市でも至難で、売りに出るなら噂が立つはずだと言う。ならば理由は二つ――売るか、持つか。金のためでないなら、収集家の可能性が高く、次の標的は伝説の刀、アメノムラクモかもしれない。シグレはそれが実在するのかと動揺するが、あなたが紅甲羅の甲人の宝物庫で見たと告げると、行き先は定まる――紅玉海だ。狼盗賊もそこが最善だと同意し、ヒルディブランドは一刻も早く向かうと叫ぶ。シグレは目立たぬ服に着替えてから合流すると言い、あなたに先に紅玉海へ向かうよう強く促す。</p>
</div>

    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
<p>你在 Kugane 見到 Shigure，他先是看著你說你氣色不錯，還關心你的冒險是否太過勞累。可一談到正事，他的語氣就沉了下去：Soboro Sukehiro 和 Yojimbo 依舊下落不明，他甚至無法說自己取得了多少進展。話還沒說完，Hildibrand 和 Nashu 就闖了過來，Hildibrand 一開口就拿 Shigure 的光頭開玩笑，Shigure 當場忍不住回嗆。</p>
<p>Hildibrand 抱怨你們什麼有價值、甚至連勉強算得上線索的東西都沒找到，正準備重新思考調查方針，轉頭又追問 Shigure 有沒有「Jim」的消息。Shigure 一開始還疑惑，隨即才反應過來他指的是 Yojimbo，並再次承認自己沒有任何進度。這時 Nashu 興沖沖拿出一瓶號稱效果驚人的生髮藥水，說要送給 Shigure。Shigure 又驚又喜，正打算試試看，一名態度溫和的不死者卻忽然出現，開心地說又見到「Master Zombibrand」和你們，並解釋他原本要回 Eorzea，卻因為聽聞一種名為 funa yurei 的不死幽靈出沒海島岸邊而留下，想換個方向去結交「同類」。</p>
<p>Hildibrand 立刻改口問他有沒有聽過 Yojimbo，可對方表示完全沒有，只是無奈提到很多人因為他是不死者而不願接近。Hildibrand 便感嘆世人對「活得不方便的人」仍有偏見；Shigure 卻指出另一個更實際的原因：他現在的外表，可能會讓人聯想到先前在城裡橫行的 Wolf Burglar，所以大家才不肯跟他說話。那名不死者立刻同意換一身不顯眼的衣服，而 Hildibrand 也拍板：既然第一次問不到，那就再問一次——你們分頭去向 Kugane 的人們打聽。</p>
<p>你在城裡兜了一圈，沒問到 Yojimbo，卻聽到許多人對 Wolf Burglar 的看法出乎意料地一致。有人說赤誠組打算對他施以殘酷的懲罰，氣得直呼荒唐；有人堅稱他下手的對象都是貪婪又無良的商人，而他偷來的東西反而會分給貧苦的人；也有人提到 Akebono 周圍長年流傳著不少黑暗的傳聞。更糟的是，許多人因為 Wolf Burglar 被捕而不願再協助赤誠組——如果他們懷疑你站在赤誠組那邊，你的詢問也可能直接被拒絕。</p>
<p>你回到 Matsuba Square 匯報時，Shigure 聽完那些話明顯愣住：他沒想到這麼多人會替 Wolf Burglar 的處境掛心。面對「他是窮人的英雄」之類的說法，Shigure 仍堅持法律就是法律，即便是聲名狼藉的商人也該得到公平的對待；若因為群眾情緒就忽視他們的處境，那等同把審判交給暴民。可同時，他也不得不承認：若有人因抗議而刻意隱瞞情報，對調查確實是個大問題——身為赤誠組的一員，他也感到兩難。Hildibrand 建議他暫時穿得不那麼顯眼，Shigure 想起自己還留著舊和服，卻又擔心就算換衣服，他的臉也早被認出來，甚至會被視為欺騙。這時 Nashu 提出新的方向：去問 Wolf Burglar 本人。Shigure 想到若他和 Yojimbo 都盯上 Soboro Sukehiro，兩人或許彼此認識，於是你們決定立刻去牢裡問話。</p>
<p>在牢中，Shigure 直截了當說明狀況：Wolf Burglar 被捕後，Yojimbo 帶著他從 Akebono 那裡偷來的 Soboro Sukehiro 逃走，至今仍在逃。Shigure 認為那把刀可能從一開始就是 Yojimbo 的目標，因此希望 Wolf Burglar 能提供他和動機的線索。Wolf Burglar 回答，人人都知道 Soboro Sukehiro 價值連城，但名聲這麼響的名刀一旦被偷、消息又傳開，要找到買家幾乎是不可能的事，除非去找他熟識的一些「不太正派的人」。他願意牽線——前提是你們先放他自由。Shigure 當場拒絕，可 Hildibrand 卻提醒他別太快下結論；Shigure 想起市民們對 Wolf Burglar 的擁護，終究提出折衷：他會向上級提議，把 Wolf Burglar 暫時交由你們看管以利調查，只要遵守約定，就可能得到寬待。Wolf Burglar 立刻答應，還反過來用「光頭」取笑 Shigure。</p>
<p>Shigure 仍不安，擔心上級是否會同意、光是討論就會拖太久；Hildibrand 卻忽然想起那瓶生髮藥水，讓 Nashu 拿出來，還要求 Shigure 就在牢裡用，而且要整瓶全倒光。Shigure 照做後，只覺得頭皮一陣怪異，下一秒刺目的光爆開，獄卒被驚動衝了進來大喊。混亂之中，Hildibrand 直接宣布自己「解放」了 Wolf Burglar；Shigure 只能硬著頭皮胡扯，說同伴身上帶著小型爆炸物，其中一個不慎引爆，自己已立刻命她把其他的帶出去以策安全。獄卒被那道強光弄得發懵，還在困惑 Shigure 怎麼突然長出頭髮，你們就趁機脫身。Wolf Burglar 帶著眾人鑽進下方的水道，你也跟著往黑暗深處前行。</p>
<p>在水道裡，Wolf Burglar 說這裡聚著一群被 Kugane 放逐的人——城裡的邊角料——若要打聽消息，問他們最有可能。你見到 Koju，Wolf Burglar 先提醒你們保持基本禮貌，並解釋他們多半也曾努力走正道，甚至有人跟你一樣想加入赤誠組，卻因各種理由被拒之門外，最後只剩下危險、骯髒、見不得光的活能做。Koju 聽到 Yojimbo 的名字並沒有印象，但他立刻指出：Soboro Sukehiro 這種名刀就算走黑市也很難賣，若有人在找買家，你們早該聽到風聲。既然不是為了錢，那就可能是為了「收藏」——而收集名刀的人，下一個目標或許會是傳說中的 Ame-no-Murakumo。Shigure 震驚得追問那把劍是否真實存在，而你說你親眼見過它，還是在 Kojin of the Red 的寶物庫裡。於是方向終於落定：Ruby Sea。Wolf Burglar 也認為那裡最值得找，Hildibrand 則高喊不要再耽擱。Shigure 最後說自己得先去換一身不那麼顯眼的衣服，會在 Ruby Sea 與你們會合，並堅持要你先行一步。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
