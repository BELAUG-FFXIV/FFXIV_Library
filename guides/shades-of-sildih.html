    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
<p>Ellie catches you the moment you appear, breathless with urgency. She tells you the phantom thief has escalated from burglary to murder, and the rumors already count three victims—prominent figures in Ul’dahn society. At each scene, the killer leaves the same calling card: “The weight of five corpses will bring the scales of justice to balance.” The Mythril Eye is selling faster than ponzecakes, and Ellie is eager to chase the thief’s last message at last—the hidden treasure of Ul’dah. She insists there’s only one person who might illuminate that clue, and she ushers you toward Sunsilk Tapestries.</p>
<p>Outside Sunsilk Tapestries, Wymond greets you like an old acquaintance—and Ellie right alongside you. When you explain what you’re after, he admits he’s got nothing solid: Ul’dah has no shortage of treasures, hidden and otherwise, and the thief could be aiming at any of them. Still, he does have one concrete detail—the Sultansworn are in an uproar, and word is they’ve formed a regiment of their best and brightest to safeguard the royal vaults against this very threat. Ellie doesn’t hesitate; if the Sultansworn are moving, that’s the only lead you have, and she urges you onward to their headquarters.</p>
<p>Wymond’s tone turns wary as he tries to stop Ellie short. He says his line of work has taught him the smell of danger, and this time the stench is fierce—too fierce for a reporter to be risking her neck. Ellie answers without flinching: she won’t pretend the work is only about selling papers; she has a duty to seek the truth and deliver it to the people, and time is already running out. When you arrive, Humphrey bars the way—then startles himself recognizing you, and recognizing Ellie as well. He all but blurts his admiration: seeing the Gentleman of Light stand tall moved him to abandon his sketchy past, and he swore to serve as his hero did—Master Hildibrand.</p>
<p>Humphrey points you to Phillice, one of the Sultansworn’s best and an avid student of history. He explains she volunteered to lead the investigation the moment she learned the thief was targeting the four relics of Belah’dia, and he goes to fetch her at once. Phillice receives Ellie politely, and then acknowledges you with surprising familiarity—she knows you as any devoted Mythril Eye reader would, and she admits she’d secretly hoped you’d show up to help. Before the conversation can settle, Inspector Briardien appears and immediately tests you both with a burst of demasking dust—his own invention meant to pierce the thief’s disguises. He confirms you are who you appear to be, but Phillice’s expression stays troubled: the ingredients are exceedingly rare, and even with the Sultansworn’s resources they have only a limited supply.</p>
<p>When Ellie presses for the thief’s next target—the last of the four lost relics—Phillice can offer only a prophecy buried in old histories: when darkness falls and hope fades, four warriors born of Light will descend in righteous glare. It speaks of four sacred artifacts, one held by each hero, yet it describes neither their forms nor their nature. Briardien cuts through the discussion sharply: three times you’ve tried to predict the target, and three times the thief has confounded you by stealing something else; speculation only plays to the villain’s strengths. Phillice adds that all Belah’dian artifacts have been sealed within the royal vault, the guards supplied with demasking dust, and every eye instructed to watch for suspicious figures—but the murders remain even more alarming. The Sultansworn have been so consumed defending the vaults that their investigation has barely advanced, and they ask for your help.</p>
<p>A voice rings out before any plan can fully form: a lady asks, and a gentleman answers—Hildibrand has arrived. He declares he has no need of demasking dust, and Phillice quickly briefs him on the murders: a consortium head, a high-ranking official, and an influential scholar, with no clear thread connecting them. Hildibrand responds with theatrical enthusiasm—half flourish, half absurdity—then swears he will deliver the burglar-turned-butcher to justice before two more can fall. Phillice hands over what she can spare: a single sachet of demasking dust, entrusted to your care. Wymond’s warning lingers in the air, but Hildibrand strides ahead regardless, naming you his ever-loyal associate and leading you toward the most recent scene—near the Eighty Sins of Sasamo—ordering you to stay alert for anyone suspicious and to use the dust wisely.</p>
<p>At the scene, Hildibrand’s gaze lands on flowers and his deduction leaps instantly—too instantly—toward a florist fleeing in haste. An old woman explodes in fury: she placed those flowers, to honor her dead boy, and he dares disturb them. Her anger curdles into fear as she urges you to run while you still can—run far, far away—because the killer will turn you into zombies like her son. Briardien scoffs at the notion of the living made undead, but the woman insists it is history: the horrors of Sil’dih, an alchemist’s unholy draught, Traders’ Spurn, brewed to raise a mindless army. She rants that the Sultansworn whisked the body away before she could even pay her last respects, and then spirals into prophecy and panic—Belah’dia’s relics, justice, vengeance, and the possibility that the “phantom thief” is no thief at all, but a true specter returned. Nearby, Eleazar storms through his own rage, cursing the so-called miracle hair tonic and vowing to hunt down the so-called inspector and his sorry band.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>エリーはあなたを見つけるなり、今夜の予定は空けておけと勢いよく言い切る。怪盗白仮面は盗みだけでは飽き足らず、冷酷な殺人に手を染めたという。噂ではすでに三人――ウルダハ社交界に影響を持つ者たちが犠牲になり、現場には毎回、決まり文句の書かれた予告状が残されている。「五つの屍の重みが、正義の天秤を釣り合わせる」。エリーは事件の熱でミスリルアイが飛ぶように売れていると笑い、しかし同時に、怪盗白仮面の最後の暗号を追う時間がようやくできたのだと言う。狙いは「ウルダハの隠された財宝」。手がかりを照らせる相手はひとりしかいないと、あなたをサンシルク工房へ急かす。</p>
<p>サンシルク工房の前で待っていたワイモンドは、あなたとエリーを迎え入れ、事情を聞くと渋い顔で首を振る。ウルダハの宝は表に出たものも隠されたものも多すぎて、怪盗白仮面がどれを狙うか見当がつかないのだ。ただし、確かな噂もある。銀冑団が王宮宝物庫を守るため、選りすぐりを集めた部隊を編成したという話だ。エリーはそれが唯一の手掛かりだと断じ、銀冑団の詰所へ向かおうとあなたを促す。</p>
<p>ワイモンドはエリーを呼び止める。危険の臭いが強すぎる、記者のお前が首を突っ込む類いではないと、珍しく本気で心配する。だがエリーは、記者の務めは紙を売ることだけではない、真実を追い、人々へ届けることだと言い、時間がないとあなたを連れて歩き出す。詰所ではハンフリーが通行を止めかけるが、あなたとエリーの顔を見るなり態度を一変させる。あの日、光の紳士が堂々と立つ姿に胸を打たれ、胡散臭い過去を捨てて銀冑団に入ったのだと、熱っぽく語る。そして、捜査を率いるフィリスを呼んでくると約束する。</p>
<p>現れたフィリスは丁寧に名乗り、あなたを見て頷く。ミスリルアイの読者なら誰でも知っている、と言い、内心ではあなたが助力に来ることを望んでいたと告げる。そこへブリアルディアンが割って入り、いきなりあなたとエリーに粉を浴びせる。怪盗白仮面の変装を解くために用意した「粉末ミラージュディスペラー」だと説明し、あなたたちが本物であることを確認する。だがフィリスは、材料が希少すぎて用意できた量は限られている、と不安を隠さない。</p>
<p>エリーが次の標的を問う。ベラフディアの四つの遺物、その最後のひとつ――「ウルダハの隠された財宝」はどれなのか。フィリスは史料を繰り返し当たったが、手掛かりは古い予言の曖昧な一節だけだと言う。「闇が降り、希望が絶望に沈むとき、光より生まれし四人の戦士が降り立つ」。四人の英雄がそれぞれ聖なる秘宝を持つというが、姿も性質も記されていない。ブリアルディアンは推測を戒め、怪盗白仮面は予想を裏切って別の品を奪い続けてきたと言い切る。フィリスは、ベラフディア由来の品はすべて王宮宝物庫に封じ、銀冑団の警備に粉を配り、不審者を警戒させていると報告する。しかし同時に、殺人事件の捜査は手薄で、助力が必要だと頭を下げる。</p>
<p>そこへ朗々とした声が響く。淑女が望むなら、紳士は応える――ヒルディブランドが現れ、正義を正すために来たと名乗る。粉を使う必要はない、私は私だと言い張り、フィリスから三人の犠牲者の話を聞くと、満足げにこの事件を解き明かしてみせると宣言する。手掛かりは乏しくとも、名高き推理力で怪盗白仮面を裁きにかける、と。フィリスは最後の余裕として「粉末ミラージュディスペラー」をひと袋だけ託し、あなたたちに有効に使ってほしいと言う。ヒルディブランドはあなたを「忠実なる盟友」と呼び、最新の現場――ササモの八十階段の近くだと聞いた場所へ向かうぞと号令をかける。</p>
<p>現場に着くと、ヒルディブランドは花を見つけて早合点する。怪盗白仮面は花屋で、逃げる途中に商品を落としたのだ、と。だが老女が怒鳴りつけ、花は亡き息子のために自分が手向けたのだと泣き叫ぶ。さらに老女は怯えながら、ここから逃げろ、逃げなければゾンビーにされると言い出す。ブリアルディアンが否定しても、老女はシラディハの恐怖を語る。生者を亡者に変える禁断の霊薬、トレーダーズ・スパーン――それで息子は腐り落ちる肉の塊にされ、しかも銀冑団が遺体を持ち去った、と。老女はベラフディアの遺物の力だの、正義の報いだの、怪盗白仮面は本当の亡霊かもしれないだのと錯乱していく。そこへエレザルが怒りを爆発させ、最高の育毛剤だと騙した山師を呪い、あの事件屋とその仲間を見つけてやると毒づく。</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>Ellie 一看到你就急得像要把話一口氣說完——今晚別安排任何事，因為出大事了。她說那個怪盜不再只是偷竊，現在甚至開始冷血殺人；傳聞已經有三名受害者，全都是 Ul’dah 社交圈裡舉足輕重的人物。每個現場都留下同一張挑釁的預告卡：「五具屍體的重量，將讓正義的天秤回到平衡。」 Ellie 說這案子讓 Mythril Eye 的報紙賣到像 ponzecakes 一樣搶手，而她終於騰出手來追查怪盜最後的訊息——「Ul’dah 的隱藏寶藏」。她拉著你，直奔 Sunsilk Tapestries。</p>
<p>在 Sunsilk Tapestries 外，你和 Ellie 找到 Wymond。聽完你們的來意，他坦白自己也沒什麼把握：Ul’dah 的寶物不計其數，藏在暗處的更是多到說不完，怪盜想要哪一件，誰都難猜。但他也帶來一條更具體的消息——Sultansworn 已經被逼得焦頭爛額，據說組成了一支精銳部隊，專門守住王家金庫，防的就是這次威脅。Ellie 立刻把它當成唯一線索，催你去 Sultansworn 的據點一探究竟。</p>
<p>Wymond 卻把 Ellie 叫住，少見地認真勸阻：他做這行久了，聞得出危險的味道，而這次的味道太濃，濃到不該讓一個記者把脖子伸進去。Ellie 沒退——她說記者不只是賣報紙，她有責任追出真相，把真相交到人們手上；再拖下去只會更糟。你們抵達後，一名守衛 Humphrey 先是要攔人，下一秒卻認出你與 Ellie，激動得語無倫次：他說自己曾被「光之紳士」的身影震撼，才下定決心洗掉過去那些不光彩的事，加入 Sultansworn。接著他說會去請 Phillice 出來——她是 Sultansworn 裡最可靠的人之一，也主動扛起調查 Belah’dia 四件遺物的任務。</p>
<p>Phillice 出面與 Ellie 互相致意，然後看著你，像是早就知道你會出現——她說自己也是 Mythril Eye 的讀者，甚至暗地裡期盼你能來幫忙。話音未落，Briardien 便插入談話，直接把一把粉末朝你和 Ellie 撒來，說是他自製的「解除變裝的粉末」，能破除怪盜用來遮掩真面目的偽裝；他也證實你們確實是本人。然而 Phillice 立刻提醒：這種粉末需要的材料稀有到近乎奢侈，就算動用整個 Sultansworn 的資源，也只能做出少量。</p>
<p>Ellie 追問：那怪盜下一個目標是什麼？「Ul’dah 的隱藏寶藏」會不會就是 Belah’dia 四件遺物中最後那一件？ Phillice 說她翻遍史料，唯一線索只剩一段模糊的古老預言：「當黑暗降臨、希望沉入絕望之時，四名自光而生的戰士將在正義的光輝中降下。」 傳說提到四件神聖秘寶，分別屬於那四名英雄，卻沒有描述它們的外貌或性質。Briardien 立刻打斷——你們已經三次嘗試猜測目標，三次都被怪盜用「偷別的東西」來狠狠嘲弄；繼續猜只會正中下懷。Phillice 補充：凡是 Belah’dia 起源的物件都已封存在王家金庫，Sultansworn 也把粉末分配給守衛，要求他們盯緊所有可疑人士。可更棘手的是——連續的謀殺案讓人不安，而 Sultansworn 因忙著防守金庫，幾乎無法推進調查；他們懇求你協助。</p>
<p>就在你們要討論下一步時，一個熟悉又誇張的聲音闖進來——「淑女有請，紳士必到！」Hildibrand 現身，自稱已來矯正邪惡、讓罪人伏法。他還不忘宣告不必把粉末浪費在他身上，因為他就是他自己。Phillice 將三名被害者的身分說出來——出版界的首腦、高階官員、以及影響力極大的學者；除此之外，找不到能把三人串在一起的共同線索。Hildibrand 卻像終於等到夠大的舞台，誇口就算線索稀少，他的推理也足以把「竊賊變屠夫」送上正義的審判。Phillice 只能再擠出一份餘量，把那唯一一小包解除變裝的粉末交給你們，並請務必用在刀口上。Hildibrand 轉頭就把你封為「永遠忠誠的同盟」，說要先去最新案發地——靠近 Eighty Sins of Sasamo 的那一帶——並要你隨時留意可疑之人，好讓粉末派上用場。</p>
<p>到了現場，Hildibrand 一眼看到花束，立刻做出結論：兇手一定是花商，逃跑時匆忙掉了貨。可一名老婦人衝上來怒罵——花是她放的，是為了悼念她可憐的孩子；誰敢碰，就是在褻瀆他的記憶。她的怒火很快變成顫抖的恐懼：她要你們趕快逃，跑得越遠越好，不然「他」會把活人變成殭屍，就像她的孩子一樣。Briardien 斥為荒唐，她卻說那不是胡說，是歷史——Sil’dih 的恐怖傳聞。她提到一種由 Sil’dih 煉金術師調配的邪惡藥劑 Traders’ Spurn，能把活人變成不死的亡者，讓國家擁有沒有意志的軍隊；她哭喊自己的孩子就是這樣被弄成腐爛的血肉，甚至連遺體都被 Sultansworn 匆匆帶走，讓她連最後一面都沒能好好送別。老婦人接著又把一切扯向更可怕的方向：Belah’dia 的四件遺物、所謂能「伸張正義」的力量、以及「怪盜」可能根本是真正的幽靈，回來向 Ul’dah 報復。就在她歇斯底里地碎念時，Eleazar 也怒氣沖天地闖入，咒罵那個騙人育髮藥的騙子，還發誓一定要找出那個自稱「偵探」的傢伙和他的同夥，連本帶利討回來。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
