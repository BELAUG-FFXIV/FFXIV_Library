    story:`<div class="clamp" data-collapsed="true">
      <p>Back at the Carline Canopy, Mother Miounne greets you with her usual warmth and asks if you are ready for a new briefing—only for Bowlord Lewin to stride in, his expression drawn tight with urgency. She quickly explains that a volunteer has finally stepped forward for the task she mentioned: you, recommended from Limsa Lominsa as an adventurer who can be trusted. Lewin wastes no time. Beneath the Central Shroud lies the Tam-Tara Deepcroft, once a Gelmorran settlement, now a crypt where the people of Gridania lay their dead to rest. Of late, hooded figures have been seen slipping in and out of the underground halls with disturbing regularity. From witness accounts, Lewin and his people suspect the Lambs of Dalamud, a doomsday cult born before the Calamity, whose fanatics once worshiped the lesser moon as their god. They have proved dangerous before, and leaving them to work in secret within the Deepcroft would be courting disaster. In better times, the Bowlord would send his own best men, but the Calamity has thinned their ranks, and what few forces remain must constantly hold the line against the Ixal. With their hands full guarding the Twelveswood, they have no choice but to entrust this investigation to others. Looking you straight in the eye, Lewin asks if Gridania may rely on you to deal with the Lambs. When you accept, he bids you make your preparations and report to the guard posted at the entrance to the Deepcroft; Miounne, seeing you off, quietly prays that the Crystal will guide your steps.</p>
      <p>Your journey takes you to the gloomy fringes of the Tam-Tara Deepcroft, where the air is thick with damp earth and the smell of old stone. Near the entrance, you find Alianne fretting over Isildaure, who sits catching his breath, the remnants of some strange fruit in his hand. She explains that, in his zeal to explore, he rushed ahead and blundered into danger—saved only because she happened upon the fruit on her way and was able to tend to him in time. Isildaure, chastened, admits that childish curiosity led him to ignore the most basic rule of adventuring: always look before you leap. He resolves to rest a while before pressing on. A short distance away, Dolorous Bear and his companions are also gathered before the Deepcroft. Recognizing you, he greets you with a mix of respect and rivalry, recalling how you claimed the glory in Limsa Lominsa. This time, he vows, his company will give you better sport and carve out a legend worthy of song, while E’manafa mutters uneasily about disturbing the dead and Kikina urges her to remember their lofty goal. At the threshold stands a Gods’ Quiver bowman, the guard you were told to find. He confirms your name and thanks you for coming, then lays out the situation in sober tones. The Lambs of Dalamud took the lesser moon for their savior, expecting deliverance from the Calamity—only to watch it shatter and fall in burning fragments. Rather than abandon their faith, they convinced themselves that “heretics” thwarted their god’s descent, and now burn with the desire to avenge him. Whatever they are attempting within the Deepcroft, no good can come of it. For the sake of Gridania, and of Eorzea at large, he asks you to venture into the dark and put an end to their madness, while he remains outside to guard the entrance and pray you do not cross paths with any more of their fanatics. With that, the Duty Finder opens the way to Tam-Tara, and you steel yourself to descend.</p>
      <p>When at last you return from the depths, the oppressive chill of the crypt still clinging to you, Mother Miounne welcomes you back to the Carline Canopy with visible relief. News has already reached her that your mission in the Deepcroft was a success, and she passes on Bowlord Lewin’s formal thanks. Yet as she speaks of your accomplishments, her smile fades, the weight of recent days pressing down upon her. Death, she admits, has become all too common among adventurers. The guild is inundated with petitions, and while that means no shortage of work for capable souls like you, it also tempts the inexperienced to take on more than they can handle—with inevitable, tragic results. As if summoned by her words, raised voices ring out nearby, drawing both your and Miounne’s attention.</p>
      <p>You turn to see a young party in disarray: Liavinne, shaking with anger and grief, hurls accusations at the healer Edda, insisting that Avere would still be alive if she had not taken so long to mend his wounds. Edda, clutching a sack that clearly holds her fallen companion’s severed head, stammers that she did her best—that Avere bolted out of range before she could finish her spell, and that she never imagined the potions they could afford would be so few or so costly. Paiyo Reiyo, disgusted, declares he has had enough of this “pathetic excuse for a party” and storms off, vowing never to see their faces again. Liavinne, too, announces she is leaving, admitting she never liked Edda and endured her presence only for her healing. With cold finality, she tells the young healer to rid herself of Avere’s head—bury it, burn it, anything—so long as she stops carrying it around, and then marches away without looking back. Left alone, Edda’s composure shatters. She reaches out in vain to her departing companions, her pleas ignored, and finally sinks into sobs, whispering apologies to Avere and begging for a forgiveness that will never come.</p>
      <p>Miounne lets out a quiet breath as the scene dissolves into silence, saying that sights like this have become all too frequent of late—this latest tragedy making a dozen such losses in barely half as many days. It is precisely because of this that she values seasoned adventurers like you: people she can send into danger without constantly fearing they will not return. After a moment to collect herself, she changes the subject to the matter that first prompted Lewin’s visit. About a bell ago, she explains, a message arrived from her counterpart in Ul’dah. The guild there seeks the aid of a reliable adventurer, and in her eyes you fit that description better than anyone. If you are interested in taking on this new task, she invites you to say the word; when you are ready, she will share the details and set you on the road to your next duty.</p>
    </div>

    langLabel:'日本語',
    pageTitle:'タムタラの仄暗い底で',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>カーラインカフェに戻ったあなたを、ミューヌはいつものように温かく迎え入れ、新たな任務の説明を聞く用意はあるかと問いかける。そこへ、弓頭が足早に姿を現し、緊迫した面持ちで会釈を交わした。リムサ・ロミンサから送られてきた推薦どおり、信頼に足る冒険者がひとり名乗りを上げたのだと、ミューヌは簡潔に紹介する。弓頭は時間が惜しいとばかりに本題へと入る。黒衣森：中央森林の地下には、かつてゲルモラの民が暮らした地下集落があり、今はグリダニアの民が死者を葬る霊廟「地下霊殿タムタラの墓所」となっている。ところが近ごろ、その地下霊殿の出入り口付近で、黒ずくめの人影が頻繁に目撃されているという。目撃情報を総合すると、どうやら「最後の群民」と呼ばれる終末思想のカルト集団、すなわちダラガブ教の信徒たちである可能性が高い。第七霊災以前にも危険な行動を繰り返した彼らを、聖地たる墓所で好き勝手にさせておくわけにはいかない。本来であれば、弓頭自ら精鋭を差し向けて掃討にあたるべき事態だが、霊災で兵力は大きく損なわれ、今もなおイクサル族の動向を見張るために防衛線を手薄にできない状況が続いている。森を守るための戦力を割けぬ以上、この一件を託せるのは外部の力しかない。弓頭は真っ直ぐにあなたを見据え、「最後の群民」の対処を任せてもよいかと問いかける。あなたが力を貸すと応じると、彼は準備を整え次第、タムタラの墓所入り口に駐在する神勇隊の弓兵に名乗り出るよう指示する。見送りに立つミューヌは、小さく祈りの言葉を捧げ、クリスタルの導きがあらんことを願った。</p>
      <p>道中を進み、やがて湿った土の匂いと冷たい石の気配が漂うタムタラの墓所の入口へとたどり着く。そこでは、アリアーヌが息を切らすイシルドールの傍らで心配そうに世話を焼いていた。道中で偶然見つけた果実を与えなければ、彼の冒険はここで終わっていたかもしれない──そう説明しながら、彼女は年齢に似合わぬ無鉄砲さをたしなめる。イシルドールは、自分の軽率さを認め、「見知らぬ場所では、まず足元と周囲を確かめる」という冒険者としての初歩を忘れていたと苦笑し、しばしここで休むことにする。少し離れた場所では、リムサで顔を合わせたドルロース・ベアの一行もまた、墓所の前に集まっていた。彼はあなたを見つけると、再び相まみえたことに納得したように微笑み、前回は栄誉をさらわれたが、今度こそ自分たちも相応の武勲を立ててみせると意気込みを語る。エマナファは不気味な地下霊廟に身を置くことそのものに身震いし、死者の眠りを妨げる行為への後ろめたさを隠せないが、キキナは「いつか酒場で歌われるような冒険譚を残す」という目標を思い出すよう諭し、仲間の士気を鼓舞する。入口に立つ神勇隊の弓兵は、あなたの名を確認すると礼を述べ、状況を淡々と説明しはじめた。ダラガブを神と崇めた「最後の群民」は、月が救済をもたらすと信じていたにもかかわらず、その月は空の上で砕け散り、燃えさかる欠片となって落ちていった。それでも彼らは信仰を捨てず、むしろ「異端者」が神の降臨を妨げたのだと妄信を深め、今や復讐の念に駆られている。そんな狂信者たちがタムタラの墓所で何かを企んでいる以上、放置してよいはずがない。グリダニア、ひいてはエオルゼア全体のためにも、彼らの狂気に終止符を打ってほしい──自らは入口を守りつつ、あなたの無事を祈ると、弓兵はコンテンツファインダーを通じて地下霊殿への道を開いた。あなたは覚悟を決め、闇の奥へと歩みを進める。</p>
      <p>やがて、重苦しい地下の空気をまとったままタムタラの墓所から戻ったあなたを、カーラインカフェで待っていたミューヌは安堵の息を漏らして迎え入れる。墓所での任務が無事に完了したこと、そして弓頭からの正式な謝意の言伝が、すでに彼女のもとへ届いていたのだ。あなたの働きを称えながらも、ミューヌの表情にはどこか影が差す。近ごろは、冒険者の死があまりにも身近なものになりすぎた──そう打ち明ける彼女の声には、疲れと憂いがにじんでいた。ギルドには次から次へと依頼が舞い込み、腕の立つ者にとっては仕事に事欠かない一方で、経験の浅い者たちが身の丈に合わぬ任務に手を伸ばし、無惨な結末を迎える例が後を絶たないのだという。その言葉を裏付けるかのように、店の一角から怒号と泣き声が響き、あなたとミューヌの視線がそちらへ向けられる。</p>
      <p>そこでは、若い冒険者たちの一団が崩壊の只中にあった。リヤヴィヌは怒りと悲しみに肩を震わせながら、ヒーラーであるエッダを激しく責め立てる。もっと早く回復させていれば、アヴェールは死なずに済んだはずだ──彼女はそう吐き捨てる。エッダは、腕の中に抱えた袋の中身がアヴェールの首であることを隠しきれないまま、震える声で言い訳を口にする。アヴェールが回復魔法の射程から飛び出してしまったこと、限られた金で買えるポーションの数があまりに少なかったこと……どれも今さら届かぬ言葉だ。パイヨ・レイヨはうんざりした様子で、この「惨めなパーティ」にはもう我慢ならないと宣言し、二度と顔も見たくないと言い残して去っていく。リヤヴィヌもまた、もともとエッダを好んでいたわけではなく、回復役として必要だったからこそ我慢していただけだと言い放ち、最後に「アヴェールの頭など、さっさと処分すべきだ」と突き放すような忠告を残して背を向けた。仲間たちが次々と去っていく中、エッダは必死に引き留めようと手を伸ばすが、その声は届かない。やがて力なくその場に膝をつき、彼女は袋を抱きしめてすすり泣きながら、アヴェールに許しを乞うほかなくなる。</p>
      <p>静まり返った空気の中で、ミューヌは小さく嘆息し、このような光景が最近はあまりにも増えたと呟く。ここ半月のあいだに、同じような悲劇が十件にも達しているというのだ。だからこそ、彼女はあなたのような熟練の冒険者の存在を心強く感じている。無事の帰還を期待できる相手に、安心して任務を託せることがどれほど貴重か──そう言って感謝の意をあらためて伝えたあと、ミューヌは気持ちを切り替えるように話題を変える。先ほど、ウルダハのギルドを預かる女将から、信頼できる冒険者を紹介してほしいとの依頼が届いたのだという。あなたほど条件に適う者はいないだろうと判断しているが、この先の道を選ぶのはあくまであなた自身だ。もし興味があるのなら、改めて声をかけてほしい──そのときは、詳しい依頼の内容を説明し、次なる旅路へと送り出そう、とミューヌは穏やかに告げるのだった。</p>
    </div>

    story:`<div class="clamp" data-collapsed="true">
      <p>回到 Gridania 的 Carline Canopy 時，Mother Miounne 照例用溫柔的笑容迎接你，問你是否已經準備好聽下一則委託的說明。話才說到一半，Bowlord Lewin 便神色凝重地走進店內，顯然有要事在身。Miounne 簡單介紹，你正是她與 Limsa Lominsa 那頭口碑相當好的冒險者，而眼下總算有了願意接下任務的人選。Lewin 不浪費時間，直接切入主題：在 Central Shroud 的地底，有一座曾經屬於 Gelmorra 人的聚落，如今已成為 Gridania 之民長眠之所——Tam-Tara Deepcroft。最近，入口一帶頻頻有人目擊到可疑的黑影進出地下墓所。根據各種證言，他們極可能是「Lambs of Dalamud」這個末日狂信教團的成員。這個教派誕生於 Calamity 之前，曾多次引發騷動，如今竟選在聖地般的墓地裡活動，無論如何都不能坐視不管。在兵力充足的年代，Lewin 早就會親自派出精銳部隊徹底掃蕩，但第七靈災重創了軍備，人手至今仍然吃緊，還得時刻提防 Ixal 的動向，全力守住整片 Twelveswood。在這種情況下，他只能把希望寄託在外部的冒險者身上。Lewin 直視著你，詢問 Gridania 是否能把這件事託付給你處理。你應下請託後，他要你整頓裝備，前往 Tam-Tara Deepcroft 入口，向駐守的弓兵表明身份；Miounne 則在一旁替你送行，輕聲祈求 Crystal 能守護你的旅程。</p>
      <p>一路行經樹影交錯的小徑，直到帶著潮濕泥土氣味的地穴入口出現在眼前，Tam-Tara Deepcroft 的陰冷氣息逐漸壟罩周遭。在入口附近，你先看見 Alianne 正焦急地照料氣喘吁吁的 Isildaure，他手中還留著果皮殘渣。她解釋說，Isildaure 一路上衝得太快，差點因一時大意斷送性命，幸好她在途中偶然撿到那顆果實，才讓他得以及時恢復體力。Isildaure 苦笑著承認，是自己一時像孩子一樣好奇，忘記了「先看清腳下與周圍，再邁開步伐」這樣基本的冒險常識，打算先在這裡歇上一會兒。離入口不遠處，Dolorous Bear 一行人也聚在那裡。看見你之後，他露出心服口服又帶著競爭心的笑容，提起在 Limsa Lominsa 那回，功勞被你搶走，這次一定要拿出更精彩的表現，替自己的隊伍留下足以被酒館吟唱的冒險故事。E’manafa 對於踏進陰森的地下墓所感到不安，一直念叨著打擾亡者長眠很不對勁；Kikina 則提醒她要記得自己的目標——有朝一日能讓後人歌頌他們的冒險事蹟，努力才有意義。在入口正前方，守備中的 Gods’ Quiver 弓兵確認你的身份後，向你致謝，並以平穩的語氣說明當前局勢。Lambs of Dalamud 曾把 Dalamud 當作神明與救贖的象徵，相信那顆小月會在 Calamity 之時拯救他們，孰料月亮在半空中崩裂成無數燃燒的碎片，墜落大地。照理說，目睹神明化為灰燼，教徒應該有所懷疑，但他們反而深信是「異端者」干擾了神的降臨，如今一心想替所謂的主宰復仇。這群狂信者在深邃墓穴裡做什麼都不會有好結果。為了 Gridania，也為了整個 Eorzea，他懇請你深入墓所，終結他們的瘋狂行徑，而他本人會留在外頭守望，祈禱你不會遇上更多帶著扭曲信仰的同夥。說完，他透過 Duty Finder 為你開啟通往 Tam-Tara 的入口，而你也在心中下定決心，踏入那片被黑暗與亡靈包圍的地底世界。</p>
      <p>從地底重返地面時，Tam-Tara Deepcroft 的寒意仍在你身上縈繞。回到 Carline Canopy，Mother Miounne 在門口迎接你，明顯鬆了一口氣。她早已從軍方的聯絡中得知，你在墓所的任務圓滿完成，Bowlord Lewin 也特地託她轉達謝意。即便如此，當她談起你的功績時，臉上的笑容仍不免黯淡下來。她坦言，最近「死亡」對冒險者而言變得太過常見。公會被絡繹不絕的委託壓得喘不過氣，雖然這對實力足夠的人來說意味著源源不絕的工作機會，對經驗尚淺的新人而言，卻是隨時可能跨出自己能力範圍的陷阱，而後果通常相當悲慘。Miounne 正說著，店裡便響起了爭吵與啜泣聲，彷彿在印證她的話，你和她一同轉頭望向聲音的方向。</p>
      <p>那裡，一支年輕的隊伍正迅速走向瓦解。Liavinne 激動得全身發抖，把所有怒火都宣洩在治療職的 Edda 身上，指責如果她沒有那麼慢才補血，Avere 根本不會喪命。懷裡抱著布袋的 Edda，眼眶通紅、聲音顫抖，只能勉強解釋自己已經全力以赴——是 Avere 自己衝出了治療的範圍，而且以他們僅有的錢能買到的藥水實在有限，她也沒想到情況會演變成這樣。Paiyo Reiyo 厭煩地插口說，這種「悲慘的隊伍」他一刻也待不下去，揚言再也不想見到其他人，隨即頭也不回地離開。Liavinne 也宣布自己就此退出，她冷冷地表示，其實從來就不喜歡 Edda，只是因為需要她的治療才勉強忍耐，如今連這一點信任都蕩然無存。臨走前，她還丟下一句帶刺的忠告：不管用埋葬還是火化的方式都好，總之別再帶著 Avere 的頭到處走，這樣實在太令人無法忍受。兩人先後離去，只留下 Edda 把手伸向他們的背影，拼命乞求別把自己一個人丟下，然而她的哭喊未能換來任何回應。最後，她只能抱緊懷中的布袋，在眾人面前再次崩潰，含著淚不斷向已經逝去的 Avere 道歉，祈求一聲永遠得不到的原諒。</p>
      <p>喧囂平息後，Miounne 輕輕嘆息，說這樣的場面最近實在太常見了，這已經是不到半個月內第十二起類似的悲劇。也正因如此，她才格外感激像你這樣穩健可靠的冒險者──能在分派任務時不必時刻擔心送人去送死，對現在的公會而言是極為寶貴的事。她再次向你表達謝意，隨後才把話題拉回到最初讓 Lewin 上門的那件事。大約一個鐘頭前，Ul’dah 那邊負責公會的女將傳來訊息，希望介紹一名可信賴的冒險者協助處理委託，而在她心目中，你無疑是最合適的人選。不過，是否要踏上那條路，依然取決於你自己的意願。如果你對這個新任務感興趣，只要開口表示，她便會詳細向你說明內容，並替你安排前往沙漠之都的後續步驟，讓你的旅程從森林的陰影，走向下一個舞台。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
