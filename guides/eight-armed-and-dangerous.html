    story:`<div class="clamp" data-collapsed="true">
<p>You arrive to find a reporter waiting with urgent news: the “victor’s spoils” your many-faced foe has set his sights on. She tells you the Coliseum is preparing a major tournament—the Mythril Cup—sponsored by the sultanate’s largest mining concern, and backed by a chairman so wealthy that rumors can’t keep up with him. With prizes drawn from his private collection, it’s no wonder the phantom thief has taken interest, and she urges you to head for Ul’dah and track down her colleague who’s covering the event.</p>
<p>In Ul’dah, her colleague doesn’t hide his annoyance at being interrupted, but he relents when the reporter presses him—strange things are happening at the Coliseum. Before he can explain, you’re drawn into a heated scene: a group of fighters complain of sabotage, and one of their own is visibly injured. They insist the blow wasn’t an accident, yet the wounded man forces himself upright, declaring he won’t be kept from the Cup. The colleague adds that contestants have been withdrawing in droves with odd ailments and injuries, and with so few left, the organizers have scrapped eliminations for a mass melee. He tells you who is handling operations inside the Coliseum, and you make for the gates.</p>
<p>Inside, the organizer welcomes the attention and admits the tourney is already the talk of the city—thanks to the phantom thief’s challenge and the rash of attacks. When pressed about the prizes, he proudly describes the top reward, but your questioning is cut short as two inspectors intrude: one sharp and impatient, the other battered yet grandly composed. The stern inspector demands the treasures be brought under his control; the organizer refuses, insisting the only way to claim the spoils is to win them in battle—and with the ranks thinned, he’s recruiting anyone he can. A purple, many-appendaged receptionist appears, and the organizer briskly explains the creature’s unusual origin before sending you toward the sign-up.</p>
<p>A gladiatrix steps forward with open contempt, promising she alone will take the victor’s spoils. The purple receptionist fawns over her, and your companions react in alarm, while the gentleman inspector tries to frame the moment as a rescue. The stern inspector cuts through all of it: you will enter the tournament on his behalf. The organizer practically salivates at the thought of a Warrior of Light in the ring, while the reporter warns you to stay cautious—too many have fallen to “curious injuries,” and she refuses to let that happen to you.</p>
<p>Back with the colleague, he reacts as if you’ve lost your mind, then lowers his voice and shares what he’s heard: several of the fighters who withdrew were scheduled to face the same warrioress. He can’t prove anything, but his instincts insist she’s bad news, and he points you toward a man at the Pugilists’ Guild who crossed blades with her in the preliminaries and paid for it in bruises. If you want the truth, he says, hear it from someone who survived her.</p>
<p>At the Guild, the injured fighter greets you with bitter sarcasm and little patience for tact. He claims the woman doesn’t fight fair, and he spits out the name of her signature technique as if it were foul sorcery. His frustration curdles into prejudice as he blames her origins and sneers at refugees—only for the reporter to cut him down immediately, calling out his attempt to salvage pride by insulting an entire people. You leave him behind, but the warning lingers: either the technique is not what it seems, or someone is helping her. The reporter favors the idea of an accomplice, and the gentleman inspector, thrilled by the chase, latches onto a familiar lead.</p>
<p>You return to the Coliseum and spot the purple receptionist hovering near gladiatrices, each time saying something that sends them fleeing. Your companions narrate the pattern with growing disbelief: the creature approaches, speaks, and the fighter bolts—again and again—until even its posture sags with disappointment. You pursue it from one encounter to the next, certain you’re watching the shape of the mystery in motion. By the end, the reporter exhales and admits the simplest explanation may be the truest: perhaps the creature realizes the fighters aren’t prey at all—perhaps it simply likes them.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>あなたが姿を見せると、ミスリルアイの記者が待ち構えていて、例の「戦利品」に関する新しい情報を告げる。コロシアムでは大規模な闘技大会「ミスリルカップ」が準備されており、王宮最大級の採掘事業を抱える組織が後援しているという。景品は議長が私蔵品から用意するほど豪華で、顔を変えるあの怪盗が狙いを定めても不思議はない。まずはウルダハへ向かい、現地取材中の同僚から話を引き出そう、と彼女はあなたを促す。</p>
<p>ウルダハで同僚を見つけると、彼は忙しさを隠さず、軽口に付き合う気はないと言う。だが記者が強く迫ると、彼は折れて「コロシアムで妙なことが起きている」と打ち明ける。そこへ、出場者たちの騒ぎが割り込み、負傷した闘士を囲んで罵声と怒号が飛ぶ。仲間たちは事故ではなく妨害だと断じ、当人は痛みをこらえながらも出場を譲らない。さらに同僚は、不可解な体調不良や負傷で棄権者が続出し、主催側が勝ち抜き方式をやめて大乱戦に切り替えた、と説明する。運営担当者の名を聞いたあなたは、コロシアムへ急ぐ。</p>
<p>コロシアム内部で運営担当者に会うと、彼は宣伝を歓迎しつつ、怪盗からの挑戦状と闘士への襲撃で大会が町の噂の的だと認める。景品について問うと、彼は最優勝の報酬を誇らしげに語るが、そこへ二人の捜査官が割って入る。一人は切れ味鋭く、もう一人は打ち身だらけでも大仰に振る舞う。厳格な捜査官は景品を引き渡せと命じるが、運営担当者は拒み、戦利品は闘技で勝ち取るものだと言い切る。さらに人員不足を理由に新規出場者を募っていると告げ、紫色の多腕の受付係が姿を現すと、その出自を手短に説明してあなたを登録へ追い立てる。</p>
<p>そこへ剣闘士の女が進み出て、戦利品は自分が奪うと冷たく言い放つ。紫色の受付係は彼女に執着するように言葉を重ね、あなたの仲間たちは不穏さに目を見張る。紳士を気取る捜査官は助け出すべき淑女のように扱おうとするが、厳格な捜査官が遮り、「あなたが代理で出場する」と断言する。運営担当者は光の戦士がリングに立つと知って興奮し、記者は「奇妙な負傷」が続く以上、油断するなとあなたに念を押す。</p>
<p>同僚のもとへ戻ると、彼はあなたの決断を無謀だと呆れながらも、疑わしい情報を共有する。棄権した闘士の中に、例の剣闘士と対戦予定だった者が複数いたというのだ。断言はできないが、彼女は危険だと直感しているらしい。そして、予選で彼女と刃を交え、痛手を負った男が格闘士ギルドで療養していると聞いた、と告げる。真相を知りたいなら、彼の口から聞けという。</p>
<p>格闘士ギルドでその男に会うと、彼はあなたの来訪を嘲るように迎え、遠慮の欠片もない物言いで不満を吐き出す。彼は彼女が正々堂々と戦わないと言い張り、必殺の技名を口にしながら、それは術の類ではないかと疑う。だが苛立ちはやがて偏見に変わり、出自を理由に侮辱を投げつける。記者は即座にそれを叱責し、みじめな自尊心を守るために人々を貶めるなと言い放つ。あなたはその場を後にするが、残ったのは警戒だけだ。技が怪しいのか、それとも誰かが手を貸しているのか。記者は後者の可能性を強く見る。</p>
<p>あなたは再びコロシアムへ戻り、紫色の受付係が剣闘士たちに近づいては言葉をかけ、相手が怯えて逃げ出す光景を目撃する。仲間は唖然としながら、そのたびに同じことが起きているとあなたに伝える。受付係は落胆した様子を隠せず、それでも次の相手へと向かっていく。あなたは逃げる相手ではなく、動き回る受付係を追い、事件の手触りを確かめようとする。最後に記者は息をつき、ふと気づいたように言う――あの生き物は、ただ剣闘士たちが好きなだけなのかもしれない。</p>
</div>

    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },

    story:`<div class="clamp" data-collapsed="true">
<p>你趕到時，Mythril Eye 的記者已經在等你，她帶來關於那名千面怪盜所盯上的「勝者戰利品」的新消息。Coliseum 正在籌備一場規模驚人的比武——Mythril Cup——由王國境內最大的礦業勢力贊助。傳聞主辦方的議長富可敵國，甚至會親自從私藏中拿出獎品，難怪那名怪盜會把目標放在這裡。她要你立刻前往 Ul’dah，去找正在現場採訪的同僚，從他那裡把線索挖出來。</p>
<p>在 Ul’dah，你的確找到了那位同僚。他一開口就毫不客氣，表示自己忙得沒空閒聊；但記者三兩句就把他逼得改口，承認 Coliseum 裡正發生「不太對勁」的事。你們話音未落，一群參賽者的爭吵就闖進視線：有人受了傷，夥伴們卻堅持那不是意外，而是刻意的破壞。受傷的人咬牙站穩，表示再痛也不會退出比賽。同僚補上一句更糟的現況——距離開賽只剩幾天，卻已有大量參賽者以各種古怪的病痛與傷勢退賽，名單一天比一天縮短，主辦方只能放棄淘汰制，改成少數人硬碰硬的大亂鬥。你們問清楚負責運營的人在哪裡，便直奔 Coliseum。</p>
<p>進入 Coliseum，你們見到了那位負責運營的人。他讓你們隨意調查，卻也直言不諱：怪盜的挑戰與接連發生的襲擊，已讓這場比武成了全城話題。當你們追問獎品，他得意地描述最優勝的珍寶，卻在下一刻被兩名突然現身的 inspector 打斷：一個冷硬、迅速，另一個雖滿身狼狽卻仍以誇張的姿態自持。嚴厲的 inspector 命令把獎品交出來集中保管，運營者卻拒絕，堅持「戰利品只能靠在擂台上贏得」。他甚至趁著人手不足大肆招募新參賽者。接著，一個紫色、觸手繁多的接待員登場，運營者簡短交代它來歷離奇，便催你們去辦理參賽登記。</p>
<p>就在此時，一名女 gladiatrix 走上前，冷冷宣告勝者戰利品必定由她奪走。紫色接待員對她黏得異常明顯，你的同伴也因此更加不安。那位自詡紳士的 inspector 嘗試把局面講成「救援淑女」的戲碼，但嚴厲的 inspector 直接截斷一切：你將代表他參賽。運營者一聽見「Warrior of Light」要踏進擂台，興奮得幾乎忘了收斂；記者則立刻提醒你——既然已有太多人因「奇怪的傷勢」退出，你絕不能掉以輕心。</p>
<p>你們回去找同僚時，他聽到你要參賽，像是差點沒把話噴出來，罵你簡直不要命。但他仍壓低聲音，把自己的懷疑說清楚：不少退賽者原本都排定要與那名女 gladiatrix 對戰。他不敢保證，卻直覺她「很不對勁」。而要證實這點，他建議你去 Pugilists’ Guild 找一個在預選賽與她交手、被打得滿身瘀青的男人——若想知道她怎麼贏的，就去聽那個被她擊倒的人怎麼說。</p>
<p>在 Pugilists’ Guild，那名受傷的男人用尖酸的語氣迎接你，毫不在意什麼禮貌。他聲稱那名女 gladiatrix 根本不公平，還把她的招式名說得像在咒罵，認定那是某種邪門伎倆。接著，他的怨氣迅速變質，開始拿出身說事、把偏見甩向整群人。記者立刻回擊，毫不留情地指出他只是想用羞辱他人來撐住可悲的自尊。你們轉身離開，把他留在原地，但警戒感仍沉甸甸地黏在你心頭：那招式究竟有什麼問題？是手段本身不尋常，還是她背後有人協助？記者更傾向後者，而那位紳士 inspector 也因此抓住了某個他自認最「顯眼」的線索。</p>
<p>你們再次回到 Coliseum，正好目睹紫色接待員靠近一名又一名的女 gladiatrix，低聲說了什麼，對方就驚慌逃開；它換下一個目標，結果依舊。你的同伴一邊錯愕，一邊把這反覆上演的模式說給你聽——它每次開口，都換來同樣的潰逃。紫色接待員明顯沮喪，卻仍不死心地追著下一位。你緊追它的動向，想抓住事件真正的輪廓。最後，記者吐出一口氣，像是終於把最簡單的答案說出口——她覺得，那個紫色的章魚接待員，或許不是在圖謀什麼陰謀；它可能只是……喜歡那些女 gladiatrix。</p>
</div>

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
