  EN:{

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Drillemont’s fury is immediate and unrestrained. He calls the heretic thrice-damned—a murderer of countless innocents who has made a mockery of Ishgard’s laws—and he curses the man and his Dravanian allies. Word has reached him that the inquisitor is headed for Snowcloak even now, intending to pass judgment on yet another soul he has branded heretic. If you move quickly, Drillemont says, there may still be time to prevent another tragedy. He asks you to lend him your strength, and vows that together you will end this impostor’s heresy once and for all.</p>
      <p>You travel into Snowcloak, where a House Durendaire knight is waiting. He says it is good to have you with them. When Drillemont arrives, they are to confront the inquisitor, and if the man refuses to come quietly, they will need to use force. The knight asks if you are prepared for that eventuality.</p>
      <p>When you reach the scene, the inquisitor is already at work. In a calm, almost gentle tone, he tells someone trembling before him that there is no need to fear—that the righteous will enjoy everlasting peace in Halone’s halls, and only the wicked must—before he is cut off by desperate cries. The cornered expeditioner shouts through panic, demanding to know why she must die, swearing by all that is holy that she has never questioned Halone’s teachings.</p>
      <p>Drillemont storms in and orders the inquisitor to release the maid and come with you. The man turns, addressing Drillemont by name, and asks what this interruption means—surely Drillemont is aware he is conducting an interrogation. Drillemont answers with a shout, commanding silence. He names him heretic, murderer of Inquisitor Guillaime and countless innocents, and calls him a traitor to Ishgard and to his own blood, his sins beyond measure and beyond redemption.</p>
      <p>The inquisitor replies with cold amusement. They are grave allegations, he says, but Drillemont’s logic is flawed. How can he betray a nation to which he owes no allegiance? His conscience is clear. Then he turns the accusation back on Drillemont, asking whether Drillemont can say the same—Drillemont, whose hands are black with the blood of those whose only “sin” was to question Ishgard’s crazed crusade.</p>
      <p>He scoffs at talk of Ishgardian innocents, declaring that all are complicit because all live by the archbishop’s lies. And he claims Drillemont will never listen, deafened by dogma. If Drillemont wants retribution, then come—let them see how Ishgardian steel fares against Dravanian fang and claw.</p>
      <p>The confrontation becomes a battle. Drillemont roars that the heretic must be shown no mercy, that he must pay for innocent blood. The inquisitor spits contempt, calling you ignorant swine and promising you will learn the futility of your faith. As the fight rages, Drillemont insists the heretic and his allies are no match for Ishgard’s might. The inquisitor boasts of power beyond Ishgard’s understanding and calls for his “brothers” to grant him strength. He declares himself reborn, while Drillemont urges you to stand your ground and calls it an illusion. The inquisitor demands to know how you can face a dragon and still not flee, only for Drillemont to answer that the heretic’s magicks have no power over him. At last the inquisitor breaks, crying that it cannot be, as Drillemont and the knights collapse in pain even as the struggle ends.</p>
      <p>When the dust settles, the inquisitor coughs and wheezes, admitting his glamours have been dispelled. Drillemont tells him his plans are in ruins and warns him to choose his words wisely, for they will be his last. The man laughs weakly and says you may not remember the many Ishgardians he sentenced, but the families of the dead will never forget. Blood has been repaid with blood, and he is content. His only regret, he says, is that Drillemont still lives.</p>
      <p>He turns his malice on you, warning that your end is near: the dragons within the Stone Vigil will tear you apart, and when you are dead, Whitebrim Front will fall. Drillemont calls him defiant to the last and orders the body left for the crows—he deserves nothing better. Then he turns to you and apologizes for involving you in this sordid business, saying you should never have been asked to intervene in Ishgardian affairs of state. He assures you he has not forgotten the matter that first brought you here, and says it is past time you were reunited with your airship. But not here—he tells you to visit him at Whitebrim Front, and bring your associates.</p>
      <p>Back at Whitebrim Front, Alphinaud demands to know where you have been. When he learns the false inquisitor has been slain, he notes that the man’s story was always likely to end in bloodshed. Still, he cautions you not to revel in victory yet. You can celebrate once the Enterprise is secured.</p>
    </div>

  JP:{
    langLabel:'日本語',
    pageTitle:'竜の力、戦いの歴史',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ドリルモン卿は憤怒をあらわにし、あの異端者は数えきれぬ無辜の民を殺し、法を愚弄したと罵る。地獄に落ちろ、そしてドラヴァニアの手先どももろとも滅べ、と。聞けばその審問官は今まさにスノークロークへ向かい、また一人、異端の烙印を押した哀れな者に裁きを下そうとしているという。急げば、さらなる悲劇を止められるかもしれない。力を貸してくれ、と卿はあなたに請い、偽りの審問官の異端を今度こそ終わらせようと誓う。</p>
      <p>あなたがスノークロークへ赴くと、デュランデル家の騎士が待ち受けている。同行を歓迎し、ドリルモン卿が到着したら審問官を追及する手はずだと言う。相手が大人しく従わないなら武力も辞さないが、その覚悟はあるか、と騎士は問いかける。</p>
      <p>現場ではすでに審問が始まっていた。審問官は子を諭すように、震える者に告げる。怯える必要はない、正しき者は戦神の御許で永遠の安息を得る、邪なる者だけが――。だが切迫した叫びがそれを遮る。追い詰められた遠征者は、なぜ死なねばならないのかと泣き叫び、聖なるものすべてに誓って戦神の教えを疑ったことなどないと訴える。</p>
      <p>そこへドリルモン卿が怒号とともに踏み込み、侍女を放してこちらへ来いと命じる。審問官は卿の名を呼び、取調べの最中だと知っていて妨害するのかと問う。卿は黙れと一喝し、貴様を異端者と断じる。真のギヨーム審問官と数多の無辜を殺した殺人者だ、と。イシュガルドへの、そして自らの血族への裏切り者であり、罪は測りがたく、贖いなど不可能だと糾弾する。</p>
      <p>審問官は含み笑いを浮かべ、重大な告発だと返しつつ、卿の理屈は破綻していると言う。自分が忠誠を誓っていないものを、どうして裏切れるのか。自分の良心は清いのだ、と。さらに彼は卿へ問い返す。狂気じみた聖戦に疑問を呈しただけの者たちを血に沈めたその手で、同じことが言えるのか、と。</p>
      <p>彼はイシュガルドの無辜を語る卿を嘲り、誰もが大司教の嘘のもとに生きる以上、誰もが共犯だと断じる。そして卿は教義に耳を塞がれているから聞くまい、と言い捨てる。報復を望むなら来い、ドラヴァニアの牙と爪に対し、イシュガルドの鋼がどこまで通じるか見せてやれ、と。</p>
      <p>やがて戦いが始まる。ドリルモン卿は容赦するな、流された無辜の血の代償を払わせろと叫ぶ。審問官は愚かな豚どもと罵り、信仰の無力さを思い知るがいいと吐き捨てる。卿はイシュガルドの力の前では敵わぬと言い、審問官はおまえたちの理解を超えた力を授かったと豪語し、同胞よ力を貸せと呼びかける。彼は自分は生まれ変わったと言い、卿は幻影に惑わされるな、踏みとどまれと命じる。審問官は竜を前にしても逃げぬのかと叫ぶが、卿はその魔法は通じぬと突き返す。最後に審問官はありえないと叫び、卿と騎士たちは倒れ込みながらも決着がつく。</p>
      <p>戦いの後、審問官は息も絶え絶えに、自分の幻影が解けたと漏らす。ドリルモン卿は計画は潰えた、今から言う言葉が最後になると思えと告げる。審問官は咳込みながら笑い、処刑した多くのイシュガルド人の名をおまえたちは覚えていないだろうが、遺された家族は決して忘れないと言う。血は血で返された、それで満足だ、と。そして悔いがあるとすれば、卿がまだ生きていることだと吐き捨てる。</p>
      <p>彼はあなたへも呪いを向け、ストーンヴィジルの竜たちがあなたを引き裂き、おまえが死ねばホワイトブリム前哨地も落ちると告げる。卿は最後まで強情だと言い、死体は烏にくれてやれ、ああいう輩にはそれで十分だと命じる。そしてあなたに詫びる。こんな汚れた件に巻き込んだこと、国家の内政に介入させるべきではなかった、と。だが最初にここへ来た理由を忘れてはいない、そろそろ飛空艇を取り戻す時だと言う。ただしここで話すことではない。ホワイトブリム前哨地に来て、仲間も連れてこい、と。</p>
      <p>ホワイトブリム前哨地に戻ると、アルフィノはどこへ行っていたのかとあなたを問い詰める。偽りの審問官が討たれたと聞くと、あれは血で終わる運命だったと言い、だが勝利に浸るのはまだ早いと釘を刺す。祝うのはエンタープライズを確保してからだ、と。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ドリユモン　<small class="muted">クルザス中央高地 (X:12.8, Y:17.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">

      <div class="row">すべて（リミテッドジョブを除く）Lv 40～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="in-pursuit-of-the-past.html">ストーンヴィジルに眠る翼</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'對抗巨龍的歷史',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Drillemont 的怒火毫不掩飾。他痛罵那個該死的異端者屠殺了無數無辜者，還把 Ishgard 的律法當成笑話踐踏；他咒罵那人與他的 Dravanian 同夥一同下地獄。有人回報，那名審問官此刻正趕往 Snowcloak，準備再對一個被他貼上「異端」標籤的可憐人下判決。Drillemont 說若你們立刻動身，也許還來得及阻止下一場悲劇。他請你把力量借給他，並誓言要與你一同徹底終結這個冒牌者的異端行徑。</p>
      <p>你們抵達 Snowcloak 後，一名 House Durendaire 的騎士迎上前，說很高興你能同行。等 Lord Drillemont 到來，他們就要當面質問審問官；若對方不願乖乖就範，便不得不動用武力。那名騎士問你是否已做好心理準備，面對可能發生的一切。</p>
      <p>你們趕到時，審問已經開始。那名審問官以近乎安撫的語氣對眼前的人說：不必顫抖，正直之人將在 Halone 的殿堂得到永恆的安息，只有邪惡之人——話還沒說完，便被對方絕望的喊聲打斷。那名被逼到絕境的遠征者哭喊著問為什麼必須死，並以一切神聖起誓，自己從未質疑過 Halone 的教誨。</p>
      <p>Drillemont 怒吼著闖入，命令審問官立刻放開那名侍女，跟他們走。審問官轉向他，語氣不急不徐，問他為何要打斷——難道 Drillemont 不知道他正在進行訊問嗎？Drillemont 立刻喝令他住口，痛斥他是惡徒，並宣告他是異端者：他殺害了真正的 Guillaime 審問官，也殺害了無數無辜者。他指控對方背叛 Ishgard、背叛自己的親族，罪孽深重到無可估量，更不可能被救贖。</p>
      <p>審問官冷笑，說這些指控確實嚴重，可 Drillemont 的邏輯根本站不住腳：他又如何能背叛一個自己從未宣誓效忠的地方？他說自己的良心清白無瑕，反倒要問 Drillemont 是否也能這樣說——Drillemont 的雙手早已沾滿鮮血，而那些被殺的人唯一的「罪」，只是質疑 Ishgard 那場近乎瘋狂的聖戰。</p>
      <p>他嘲諷 Drillemont 口中的「Ishgard 的無辜者」，說人人都是共犯，因為人人都在大主教的謊言之下過活。他認定 Drillemont 已被教條蒙蔽，聽不進任何話。若 Drillemont 渴望報復，那就來吧——讓他看看 Ishgard 的鋼鐵，究竟能不能對抗 Dravanian 的利牙與尖爪。</p>
      <p>衝突隨即演變成戰鬥。Drillemont 大喊絕不饒恕，要讓異端者為他所流的無辜之血付出代價；審問官則咆哮辱罵，聲稱你們很快就會明白信仰的徒勞。Drillemont 斷言異端者和同夥不可能敵過 Ishgard 的力量；審問官卻狂妄宣稱自己獲得了超越你們理解的力量，並呼喚「兄弟」賜予他力量，好讓他摧毀敵人。他宣稱自己重獲新生，Drillemont 則命令你們穩住陣線，說那不過是幻象。審問官震懾般質問：一條龍就站在你們面前，你們竟還不逃？Drillemont 回應說他的魔法對自己毫無作用。最終，審問官驚叫不可能，而 Drillemont 與騎士們也在苦撐中倒下，戰局卻仍然迎來終結。</p>
      <p>戰後，審問官喘息著承認自己的幻術已被驅散。Drillemont 逼近，說他的計畫已徹底崩潰，並警告他慎選遺言。審問官咳著笑，說你們或許不記得自己曾判死多少 Ishgard 人，但死者的家屬永遠不會忘；血以血償，他已心滿意足。他唯一的遺憾，是 Drillemont 竟還活著。</p>
      <p>他把惡意轉向你，斷言你的死期將至：Stone Vigil 裡的龍會把你撕碎；等你死了，Whitebrim Front 也會淪陷。Drillemont 說他到最後仍冥頑不靈，下令把屍體丟給烏鴉——那種人不配更好的下場。隨後他轉向你道歉，說不該把你捲入這種骯髒的事，更不該要求你介入 Ishgard 的國家事務。不過他也向你保證，他沒有忘記你最初來到這裡的目的；是時候讓你與 Enterprise 重逢了。但這裡不適合談，他要你回 Whitebrim Front 找他，並帶上你的同伴。</p>
      <p>你回到 Whitebrim Front 後，Alphinaud 立刻追問你去了哪裡。得知那名冒牌審問官已被擊倒，他淡淡說這樣的故事本就注定以流血收場。但他也提醒你別急著沉浸在勝利裡——真正的慶祝要等到你們順利取得 Enterprise 之後。</p>
    </div>

const tabBtns = [...document.querySelectorAll('.tab-btn')];
const pageTitle = document.getElementById('pageTitle');
const langToggle = document.getElementById('langToggle');
const panels = {
  story: document.getElementById('panel-story'),
  acq: document.getElementById('panel-acq'),
  unlockq: document.getElementById('panel-unlockq'),
  followq: document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
