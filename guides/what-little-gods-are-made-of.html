    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You are told the Elder Seedseer wishes to hear your account firsthand. With your mission concluded, you return to Gridania and head straight for Nophica’s Altar, where a Silent Conjurer greets you with visible relief and ushers you inside to the Lotus Stand.</p><p>Within, the Scions meet you with familiar voices and tired humor. Papalymo urges you not to keep the Elder Seedseer waiting, while Yda recounts how relieved Maxio was back at Little Solace. Y’shtola concedes that Yda’s read of the situation had merit after all, and Thancred admits—half in jest, half in truth—that even he has off days.</p><p>Kan-E-Senna welcomes you back as a dear friend, thankful you have returned safely despite the burden she placed upon you. She asks what became of your attempt to negotiate peace with Ramuh—and when you explain that Ramuh tested you, she does not dismiss his accusation. She fears there is truth in it: darkness within draws darkness without.</p><p>She speaks of misfortune that follows mankind—conflict brewing in Carteneau, the swelling tide of refugees, and an Alliance straining under self-interest even after a shared struggle against the Empire. As the scars of the Calamity fade, so too does the sense of common purpose. Yet she insists this is no time to forget responsibility; if this new-sprung realm is to survive, it must be nurtured by all. Eorzea must be as one, even if that dream remains distant. She thanks you and the Scions on behalf of Gridania and the elementals, vowing to be a worthier ally—and though Ramuh has departed, she confesses the ill wind’s keening has not abated.</p><p>Afterward, Papalymo reflects that he had hoped words alone might have swayed the primal, yet he cannot help but admire how you met the sudden challenge. He suggests returning to the Rising Stones to set the day’s lessons in order—Minfilia will want to hear everything.</p><p>At the Rising Stones, Minfilia welcomes you back and says word of your momentous encounter has preceded you, but Urianger’s discoveries take precedence. He speaks of the Ascian in white, Elidibus, who visited the Waking Sands in its final hours and confirmed what was long suspected: Ascians are “eternal,” and physical destruction is only a temporary inconvenience.</p><p>Together, they lay out what they have learned about aether—the cycle of life, death, and rebirth—and how primals differ, their bodies being aether given shape that disperses upon defeat. Then they turn to the “immortals”: Y’shtola describes how, when the Sahagin elder fell, an aetherial cloud immediately seized a nearby minion. Urianger reasons that such a soul does not return to the aetherial realm at death, but withdraws to the boundary—the shore of the aetherial sea—abiding in the space between worlds.</p><p>They recall how Ascians took control of Thancred through a Crystal of Darkness, and they form a path forward: if a bodiless Ascian soul could be trapped in an aetherial prison and denied a host, even an eternal Paragon might be consigned to oblivion. The method is not yet in hand, but the pieces lie before you. Urianger departs to consult the sages of Sharlayan, and before he goes, he raises one more matter—the Sharlayan survey party seeking the fate of the Students of Baldesion—and bids Minfilia to hold to hope rather than surrender to dread.</p><p>In the shadows beyond your hearing, the Ascians gather and speak among themselves: Leviathan and the Lord of Levin returned to the aether, Ramuh’s acquiescence is “intriguing,” and the Bringer of Light has humbled inferno, vortex, crag, whorl, and levin alike. They remark upon your growing strength—and the cost to Hydaelyn, whose power is finite—speaking of Rejoinings, weakened souls, and forging a final key. Their conclusion is cold and certain: divine seeds quicken easily in Eorzea’s fertile soil; lead men to the field, and by eager hands a new deity will arise.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたは「森の都の長たるカヌ・エ・センナが、あなたの経験を直接聞きたがっている」と告げられ、グリダニアへ戻る。ノフィカの祭壇で待つ沈黙の幻術士は、任務を知る者としてあなたの帰還を安堵とともに迎え、ロータススタンドへと案内する。</p><p>そこで暁の血盟があなたを迎える。パパリモは「長老の待ち人を焦らせるわけにはいかない」と促し、ヤ・シュトラはヤ・ダの直感が無視できぬものだったと認める。ヤ・ダはリトルソレイスに戻ったときのマキシオの喜びを語り、サンクレッドは今回ばかりは自分にも調子の悪い日があると、苦笑まじりに肩をすくめる。</p><p>カヌ・エ・センナは、重い役目を負わせたにもかかわらず無事に帰ったあなたを「友」と呼び、心から喜ぶ。そして、ラムウとの和平交渉が衝突に終わったと聞き、何が起きたのかを問う。あなたが「ラムウに試された」ことを語ると、彼女はその言葉の奥にある真実を恐れる――内なる闇が、外なる闇を招くのだと。</p><p>彼女は人に付きまとう不幸の証として、カルテノーで高まる対立と増え続ける難民を挙げる。帝国への共同の抵抗が同盟の絆を固めるはずだったのに、露骨な利己心の重みで盟約は軋み、災厄の傷が薄れるほどに共通の目的意識も薄れていく。それでも今こそ責任を忘れてはならない――生まれたばかりのこの国が生き残るには、皆で育てねばならない。エオルゼアはひとつであるべきだが、その夢はまだ遠い。彼女はグリダニアと精霊の名においてあなたと暁に感謝し、今後はより相応しい盟友となると誓う。だがラムウは去ったのに、悪しき風のうめきは収まらず、胸のざわめきが消えないとも漏らす。</p><p>儀礼を終えた後、パパリモは「言葉だけで通じ合えると願っていたが、それでもあなたの機転には感服する」と述べ、ライジングストーンズへ戻って今日の出来事を整理しようと持ちかける。ミンフィリアもきっと詳しい話を聞きたがる、と。</p><p>ライジングストーンズでミンフィリアはあなたを迎え、しかしまずはウリエンジェの発見を優先すると告げる。ウリエンジェは、砂の家が本部だった最後の時に白衣のアシエン、エリディブスが現れたことを語り、アシエンが永き存在であり、肉体の破壊は一時の不都合に過ぎぬという疑念を確信へ変えたと述べる。</p><p>議論はエーテルの循環へ及び、死せる者の魂が流れへ溶けてエーテル界へ還り、そこから新たな命が生まれること、そして蛮神は結晶を喰らいエーテルで形作られた肉体を保つため、敗れても骸は残らず地へ滲み還ることが確認される。さらに「不死なるもの」について、ヤ・シュトラはサハギンの長が倒れた瞬間、放たれたエーテルの雲が即座に近くのミニオンへ宿ったのを見たと語る。ウリエンジェは、その魂はエーテル界へ還らず、エーテルの海の岸辺へ退いて「この世とあの世の狭間」に留まるのだと推論し、かつてサンクレッドが闇のクリスタルを介してアシエンに乗っ取られたことを手掛かりにする。</p><p>もし肉体を失った魂をエーテルの牢へ閉じ込め、依り代を奪うことができれば、不自然な恒常性を断ち切り、永き存在さえも滅びへ追いやれる――その道筋が示される。方法は未だ確立されていないが、欠片は揃いつつある。ウリエンジェはシャーレアンの賢人に会するため出立し、最後にバルデシオン委員会の学生たちの行方を調べる調査団の件に触れ、恐れに沈まず希望を抱けとミンフィリアを励ます。</p><p>そしてあなたの知らぬところで、アシエンたちは異なる言葉で囁き合う。リヴァイアサンも裁きの雷もエーテルへ還り、ラムウの黙認は興味深いという。光の担い手は炎獄、渦動、岩牢、海渦、雷鳴を退けてきた――その力の伸長と引き換えに、ハイデリンの力が削られていくことを見据えながら。彼らは結合と鍵、そして「砕けたものを新たに成す」計画を語り、エオルゼアの沃土に神の種を芽吹かせるのだと結論づける。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你接到 Serpent Lieutenant 的交代：Elder Seedseer 希望親口聽你回報這趟經歷。你返回 Gridania，前往 Nophica’s Altar，並在那位沈默的幻術師帶領下走進 Lotus Stand；對方明顯鬆了一口氣，因為知情的人一直擔心你的安危，而 Elder Seedseer 正在裡頭等你。</p><p>你踏進 Lotus Stand，暁の血盟（Scions）也在場。Papalymo 先提醒你別讓 Elder Seedseer 久等；Yda 提起你們回到 Little Solace 時，Maxio 那份幾乎要溢出來的安心與感激。Y’shtola 也罕見地承認，Yda 對局勢的直覺其實抓到要點；Thancred 則半是自嘲地說，就算是他，也會有「狀態不佳」的時候。</p><p>Kan-E-Senna 以沉穩而溫和的態度迎接你回來，感謝你背負她交付的重任仍能平安歸返。她已得知你試圖與 Ramuh 談和卻以衝突告終，於是請你親口說明經過。當你提到 Ramuh 對你施加試煉時，她並沒有立刻否定，反而低聲道出她所憂懼的真相：吸引黑暗的，往往正是人心深處的黑暗。</p><p>她把你的遭遇放回更大的現實裡：Carteneau 的衝突正在醞釀，難民的潮水也持續上升。你們共同對抗帝國軍隊，本應加固 Alliance 的連結，然而繫住各城邦的紐帶卻被赤裸的私利拉扯得緊繃；Calamity 的傷痕漸淡，人們的共同目的也跟著淡去。即便如此，她強調此刻絕不是遺忘責任的時候——若這個新生的國度要熬過脆弱的幼年期，就必須由所有人一同扶持與滋養。Eorzea 必須成為「一體」，只是那個夢想仍遙遠。她代表 Gridania 與精靈向你與 Scions 致謝，也承諾往後會成為更值得信賴的盟友；然而 Ramuh 雖已離去，她仍感到那股不祥之風的哀鳴沒有停歇，心中的不安也沒有散去。</p><p>離開後，Papalymo 說他原本希望只靠言語就能說服 primal，但事已至此，他仍佩服你面對突如其來的挑戰時的應對與機敏。他提議你回到 Rising Stones，把今天的經歷整理清楚——Minfilia 一定也急著想聽你親口回報。</p><p>回到 Rising Stones，Minfilia 先迎接你，說你與 Ramuh 的遭遇已經傳開了，但隨即表示 Urianger 的發現必須優先。Urianger 談起 Waking Sands 作為總部的最後時刻，那位身著白衣的 Ascian──Elidibus──突然現身；儘管不受歡迎，他的話卻確認了你們長久以來的懷疑：Ascians 是「永恆」的存在，肉體被毀對他們而言不過是短暫的不便。</p><p>接著，眾人回顧 aether 的規律：生命死去後，靈魂會溶入 aether 的流動，回到以太界；而那股充盈其中的能量又會回流到這個世界，催生新的生命，於是誕生、死亡、再生的循環不曾停歇。與此不同，primal 為了顯現並維持形體，必須吞噬龐大的 aether，多半透過 crystals；因此 primal 被擊敗時不會留下屍體，而是形體滲回大地，破碎的精神能量也被召回以太界，等待下一次信徒的祈願把它自以太之海牽引而出。</p><p>然後話題來到「不死之身」。Y’shtola 回憶，Sahagin 長老倒下的瞬間，她親眼看見一團以太雲霧逸散而出，並立刻奪取了附近的一隻隨從附身。Urianger 因此推論：這樣的靈魂並不會在肉身死亡後回到以太界，而是退到以太之海的岸邊，停留在此世與彼世之間的縫隙。Minfilia 也提到，Ascians 曾透過 Crystal of Darkness 奪取 Thancred 的身體；若推論正確，那種晶體正是一道門，通往那個「兩界之間」的所在。</p><p>於是，一條可能的勝路被勾勒出來：若能將被擊敗的 Ascian 之魂困進一座以太的牢籠，並剝奪其再度奪取宿主的可能，就有機會斬斷他們的復活——甚至讓永恆的 Paragon 也走向徹底的消亡。方法仍未確立，但 Minfilia 相信拼圖碎片已散落在你們面前，只差把它們拼合起來。Urianger 隨即啟程前往 Sharlayan，準備與賢者共議可行之道；臨行前，他也提到 Sharlayan 的調查隊正在追查 Students of Baldesion 的下落，並勸 Minfilia 即使心中有不祥的預感，也要守住希望。</p><p>而在你聽不見的陰影裡，Ascians 低聲交換結論：Leviathan 與 Lord of Levin 都已回到 aether，Ramuh 的退讓「耐人尋味」。他們承認你正迅速成長，但也談到 Hydaelyn 的力量並非無窮無盡；他們說起 Rejoining、被削弱的靈魂，以及打造最後的「鑰匙」。他們冷冷斷言：在 Eorzea 肥沃的土壤裡，神之種子極易萌芽——只要把人引到那片田地，貪婪的雙手很快就會捧出新的神祇。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
