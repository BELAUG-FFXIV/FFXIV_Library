  EN:{
    langLabel:'English',
    pageTitle:'Spread Your Wings and Soar',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more',
    readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>※ You have achieved Sworn reputation with the Ehcatl Nine.</p>
      <p>※ You now have access to a wider selection of wares from the Ehcatl Nine vendor.</p>
      <p>Sezul Totoloc greets you in a state of wild excitement, declaring that this will be a day to remember. At long last, the Dezul Qualan is almost complete. Only the final components remain to be attached and calibrated before the airship can rise into the sky, hopefully before the Natalan fanatics arrive. For the last stage of construction, Sezul entrusts you with one more crafting task and sends you to Fallgourd Float with the necessary materials, expecting your finest work.</p>
      <p>At Fallgourd Float, Hildeyerd recognizes the materials and understands that they are meant for the final airship component. She admits she would not dare attempt such a synthesis herself, but readily places the crafting facility at your disposal. You craft the component and return it to Ehcatl, where Sezul recognizes it as the final piece needed for the Dezul Qualan. Yet the celebration is immediately interrupted by terrible news: Tuzal Toltan, their spy in Natalan, has reported that the war balloon pilots are preparing airstones for an assault on the camp.</p>
      <p>Sezul explains that the Natalan Ixal are using airstones to harness Garuda’s blessings and power their balloons. If those balloons take off, they will reach Ehcatl and destroy the Dezul Qualan before its first flight. The Ehcatl Nine are crafters, not warriors, and the camp has no defense against an aerial attack. Refusing to wait for destruction, Sezul sends you to snowy Coerthas to meet Tuzal Toltan in Natalan and stop the war balloons before they can ever leave the ground.</p>
      <p>Tuzal instructs you to sabotage the vortex array that charges the airstones. Using corrupted crystal shards, you disable the secondary vortex turrets first, then the primary turret, disrupting the flow of elemental wind and robbing the war balloons of their propulsion. With the Natalan assault grounded for the moment, Tuzal sends word back to Sezul and directs you toward the Observatorium, where you can watch both Coerthas and the Black Shroud while Tataramu joins you for the coming trial flight.</p>
      <p>Back at Ehcatl, Tataramu is overcome with gratitude, though he quickly reminds himself that the ship has not yet left the ground. There is one truly final request: he has prepared a figurehead for the Dezul Qualan and asks you to craft the last finishing component that will secure it in place. Sezul recognizes the figurehead’s design as a traditional flying charm, its feathers meant to remind the Ixal of their ancestors and ward the vessel against the sky’s capricious nature. Impressed by Tataramu’s thoughtfulness, he gives his blessing for the figurehead to be completed.</p>
      <p>With the final piece attached and the last inspections finished, Tataramu prepares to entrust his life to the Dezul Qualan. The test flight begins uncertainly, but the airship returns safely, and the result is a triumph. The Dezul Qualan reaches an altitude of five thousand yalms, higher than any Eorzean airship has ever flown. It still cannot yet reach Sezul’s dream of passing beyond the clouds to the legendary shores of Ayatlan, but Tataramu is undaunted. This prototype will be improved, refined, and pushed further, because no record is beyond breaking.</p>
      <p>Only then does Tataramu ask what first brought you to the Ehcatl Nine’s camp. When he learns that your original mission was to investigate an Ixali threat, he realizes you have gone far beyond the call of duty and urges you to report back to Gridania. Scarlet, surprised to see you after so long, confirms that the Ixal appear to have abandoned their planned assault on E–Tatt’s Spire. She thanks you for your work, though she warns that Gridania must remain vigilant against the nightmare of war balloons drifting over the city walls.</p>
      <p>With your report complete, the strange path that began as an investigation into a threat ends as something far greater. The Dezul Qualan has flown, the Ehcatl Nine’s dream has taken form, and Tataramu chooses to remain with Sezul and his crew to help expand the future of aeronautics. Sezul leaves you with a simple truth: having a dream is not enough. You must chase it, because it will never stand still and wait.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'翼を広げ、何よりも高く',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示',
    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>※ イクサル族「エカトル空力団」との友好関係が「誓約」になりました。</p>
      <p>※ エカトル空力団のよろず屋で、より多くの商品を購入できるようになりました。</p>
      <p>セズル・トトロックは、忘れられぬ日になると声を弾ませながらあなたを迎えます。長い時間をかけてきたデズル・クワラン号は、ついに完成目前でした。あとは最後の部品を取り付け、調整を終えれば、ナタランの狂信者たちが押し寄せる前に空へ飛び立てるかもしれません。セズルは、最後の仕上げとなる部品の製作をあなたに託し、必要な材料を持ってフォールゴウドへ向かうよう頼みます。</p>
      <p>フォールゴウドでヒルデヤードに材料を見せると、彼女はそれが飛空艇の最後の部品を作るためのものだとすぐに理解します。自分でその製作に挑む気にはなれないと言いながらも、彼女はあなたなら問題なく仕上げられるはずだと信じ、製作設備を使えるようにしてくれます。あなたが部品を完成させてエカトル実験場へ戻ると、セズルはそれこそがデズル・クワラン号に必要な最後の一片だと認めます。しかし、その喜びはすぐに悪い知らせで断ち切られます。ナタランに潜むタザル・トルタンから、戦闘用気球の乗り手たちが風石の準備を始めたという報告が届いたのです。</p>
      <p>セズルは、ナタランのイクサル族がガルーダの加護を利用し、風石によって気球を推進させようとしているのだと説明します。その気球が飛び立てば、エカトル実験場を襲い、デズル・クワラン号を初飛行の前に破壊してしまうでしょう。エカトル空力団は職人の集まりであり、空からの攻撃に対抗する備えはありません。滅びを待つつもりのないセズルは、あなたに雪深いクルザスのナタランへ向かい、タザル・トルタンと接触して、戦闘用気球が飛び立つ前に止めるよう頼みます。</p>
      <p>タザルは、風石へ力を送る風脈装置を妨害する方法を教えます。汚染されたクリスタル片を使い、まず補助装置を無効化し、最後に主装置を止めることで、風の属性の流れを乱し、戦闘用気球から推進力を奪うのです。あなたは指示どおりに風脈装置を停止させ、ナタランの攻撃をひとまず封じます。タザルはセズルへ報告を送るとともに、あなたにはアドネール占星台へ向かうよう促します。そこならクルザスと黒衣森の両方を見渡すことができ、タタラムも試験飛行を見届けるために合流できるからです。</p>
      <p>エカトル実験場へ戻ったタタラムは、感謝の言葉も尽きぬほど喜びますが、すぐにまだ船は地上を離れていないのだと自分を戒めます。そして、本当に最後の頼みとして、彼が用意していた船首飾りを完成させるための仕上げ部品を作ってほしいと頼みます。セズルはその意匠を見て、それがイクサル族に伝わる飛行の護符であることに気づきます。羽根は祖先を思い起こさせ、気まぐれな空から船を守る意味を持つのです。タタラムの配慮に感心したセズルは、船首飾りを完成させることを認め、あなたに最後の部品作りを託します。</p>
      <p>最後の部品が取り付けられ、点検が終わると、タタラムはデズル・クワラン号に命を預ける覚悟を固めます。試験飛行の出だしは不安定でしたが、船は無事に戻り、その結果は大成功でした。デズル・クワラン号は五千ヤルムの高度に達し、エオルゼアのどの飛空艇よりも高く飛んだのです。まだセズルが夢見るように雲を越え、伝説の地アヤトランの岸辺へ至ることはできません。それでもタタラムは諦めません。この試作機を改良し続ければ、いつか必ず浮遊する楽園を目にできるはずだと信じています。破れない記録など存在しないのです。</p>
      <p>その後、タタラムは、そもそもあなたがなぜエカトル空力団の野営地に来たのかを尋ねます。あなたの本来の任務がイクサル族の脅威を調査することだったと知ると、彼はあなたが本来の務めをはるかに越えた働きをしてくれたのだと驚きます。そして、グリダニアへ戻り、あなたに任務を依頼した双蛇党の士官を安心させるべきだと勧めます。スカーレットは久々に戻ったあなたを見て驚きながらも、イクサル族が塔への襲撃計画を放棄したようだと確認し、あなたの働きに感謝します。ただし、戦闘用気球が都市の城壁を越えてくる悪夢を現実にしてはならないと、今後も警戒を怠らないよう告げます。</p>
      <p>こうして、イクサル族の脅威を調べるために始まった道のりは、はるかに大きな物語へとつながりました。デズル・クワラン号は空を飛び、エカトル空力団の夢は形を得ました。タタラムはこれからもエカトル実験場に残り、セズルたちと共に航空技術の未来を広げていくつもりです。セズルは最後に、夢を持つだけでは足りないとあなたに語ります。夢は追いかけなければならない。立ち止まって待っていてはくれないのです。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> セズル・トトロック　黒衣森：北部森林 <small class="muted">(X:24.5, Y:23.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="never-be-royal.html">銀嶺高き、夢遠く</a></div>
      <div class="row">クラフター <small class="muted">Lv 1～</small></div>
      <div class="row">イクサル族 友好度ランク6「名誉」</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row">新たな蛮族事件（不滅隊）</div>
      <div class="row">新たな蛮族事件（黒渦団）</div>
      <div class="row">新たな蛮族事件（双蛇党）</div>
    </div>`
  },

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'展開雙翼、振翅高飛',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>※ 與 Ehcatl Nine（鳥人族）的關係達到誓約。</p>
      <p>※ Ehcatl Nine vendor（鳥人族雜貨店）的可購買品項增加。</p>
      <p>Sezul Totoloc 以幾乎壓抑不住的興奮迎接你，宣告這將是值得銘記的一天。經過漫長努力，Dezul Qualan 終於即將完成。只要把最後的部件安裝並校準完成，它就能在 Natalan 狂信者抵達前飛向天空。Sezul 把最後一項製作任務交給你，要你帶著材料前往 Fallgourd Float，完成能讓飛空艇收尾的關鍵部件。</p>
      <p>在 Fallgourd Float，Hildeyerd 一看到材料便明白這是用來製作最後飛空艇部件的東西。她承認自己不敢親手嘗試這樣的合成，但也相信你一定能完成，於是把製作設施交給你使用。你完成部件後回到 Ehcatl，Sezul 立刻認出那正是 Dezul Qualan 所需的最後一片。然而，喜悅很快被噩耗打斷：潛伏在 Natalan 的 Tuzal Toltan 傳來消息，戰鬥氣球的駕駛已經開始準備 airstone。</p>
      <p>Sezul 說明，Natalan Ixal 會藉由 airstone 承載 Garuda 的加護，讓氣球獲得推進力。若那些戰鬥氣球升空，就會直接飛向 Ehcatl，摧毀尚未完成試飛的 Dezul Qualan。Ehcatl Nine 是工匠的集團，不是戰士，營地也沒有抵禦空襲的能力。Sezul 不願坐在巢中等死，於是請你前往雪中的 Coerthas，到 Natalan 與 Tuzal Toltan 接觸，在那些戰鬥氣球起飛之前阻止它們。</p>
      <p>Tuzal 告訴你，必須破壞為 airstone 充能的 vortex array。你需要使用 corrupted crystal shard，先停用幾座次要 vortex turret，再破壞主要裝置，藉此擾亂風屬性的流動，使戰鬥氣球失去推進力。你依照指示完成破壞，讓 Natalan 的空襲暫時無法發動。Tuzal 會把情況回報給 Sezul，並要你前往 Observatorium，因為從那裡可以同時觀察 Coerthas 與 Black Shroud，而 Tataramu 也將前來與你會合，見證即將到來的試飛。</p>
      <p>回到 Ehcatl 後，Tataramu 滿懷感激，幾乎說不出足以表達心情的話，但他也提醒自己，飛空艇還沒有真正離地。接著，他提出真正最後的一個請求：他已經為 Dezul Qualan 設計了船首像，希望你用剩下的材料製作固定它的收尾部件。Sezul 看出那是 Ixal 傳統飛行護符的設計，船首像上的羽毛象徵祖先，也有保護氣球不受天空無常力量侵擾的意義。對於 Tataramu 的用心，Sezul 深感佩服，並給予祝福，讓你完成這最後的部件。</p>
      <p>當最後部件裝上，所有檢查完成後，Tataramu 準備把自己的性命託付給 Dezul Qualan。試飛一開始並不穩定，但飛空艇最終平安返回，而且成果堪稱成功。Dezul Qualan 達到了五千 yalm 的高度，比任何 Eorzea 飛空艇都飛得更高。雖然它還無法實現 Sezul 的終極夢想，飛越雲層、抵達傳說中的 Ayatlan 彼岸，但 Tataramu 並不灰心。他們會繼續改良這架原型機，總有一天會看見那座漂浮的樂園。沒有任何紀錄是不能被打破的。</p>
      <p>直到這時，Tataramu 才問起你最初為什麼會來到 Ehcatl Nine 的營地。當他得知你原本只是奉命調查 Ixal 威脅時，不禁意識到你早已遠遠超出原本的職責範圍，甚至偏離到意想不到的方向。他建議你回到 Gridania，向當初委託你的 Twin Adder 士官報告，讓對方安心。Scarlet 見到久未歸來的你時有些驚訝，但也確認 Ixal 似乎已經放棄攻擊 E–Tatt’s Spire 的計畫，並感謝你的努力。不過她仍提醒你，戰鬥氣球越過城牆、威脅城市的噩夢絕不能成真，Gridania 仍必須保持警戒。</p>
      <p>就這樣，原本只是調查 Ixal 威脅的任務，最終通往了一段遠比想像更廣闊的旅程。Dezul Qualan 飛上天空，Ehcatl Nine 的夢終於有了形體，而 Tataramu 也決定繼續留在 Ehcatl，協助 Sezul 與他的夥伴拓展航空技術的未來。Sezul 最後告訴你，擁有夢想還不夠，必須親自去追；夢想不會停在原地等人。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
