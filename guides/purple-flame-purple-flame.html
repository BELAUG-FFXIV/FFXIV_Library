    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Once Pierriquet reveals how the heretics answer those who would join them, your next step becomes unexpectedly simple. Alphinaud admits that he knows little of the making of signal fires, yet cannot imagine it to be especially difficult. Around you, the camp continues in its usual careless rhythm. One man delays his patrol until his supper has settled, while another complains that he has not seen so much as a scale or talon all day and wonders whether Ashpool might offer a better view. In the midst of such aimless chatter, Estinien draws out the one useful detail that matters: if you are to lure your enemies to you, then you must produce purple smoke. He recalls an old tale of a trapper who cast the hide of a woolly yak onto a campfire and filled the air with a deep violet haze. From that moment, the plan is fixed.</p><p>Estinien sends you to gather hides, trusting that a hunter of your skill can procure enough without much trouble. He warns that one fire may not suffice. If the heretics fail to notice the first signal, you may need to burn several before they answer. As for the fire itself, he and Alphinaud will gather wood, for even such a simple task becomes difficult in a land buried under frost. So you divide your labor and agree to meet again at the Dreaming Dragon, each carrying the materials needed to summon your foes.</p><p>When you find Alphinaud again, the grandeur of his mission has given way to a far humbler struggle. He complains bitterly that he left Ishgard in pursuit of a noble purpose, only to end up scrabbling for sticks in the snow. His hands, he says, are at once numb from the cold and aching from the effort. Even Estinien cannot resist observing that such work is plainly unfamiliar to him, and that his must have been a privileged upbringing indeed. Yet before the quiet mockery can go any further, the trap succeeds. Someone has answered the signal fire.</p><p>Iceheart appears before you as if she had expected no one else could be responsible. Word has already reached her of a skirmish involving a small but well-armed band of trespassers, and she asks that her comrades’ hostility be forgiven. Few come to such a place uninvited, she says, and fewer still with good intent. When she demands to know why you are here, you answer plainly: you seek to stop Nidhogg’s attack on Ishgard. To her, the idea of halting the Dravanian tide with words sounds romantic to the point of folly. If only you knew the truth, she says, the first spark that lit this hatred, you would understand how futile your hope truly is. And so she begins to speak of the past her gift has shown her, and of the history the Holy See has done all it can to bury.</p><p>She tells of a time more than a thousand years ago, when an Elezen tribe first sought to make Coerthas its home, only to find that dragonkind already dwelled there and would not yield their land. War followed, and might have gone on until one side was destroyed, had a single woman not chosen another path. That woman was Shiva. While others fought and died, she sought parley with the dragons and discovered in them great intelligence and reason. Among them, Hraesvelgr came to enchant her most deeply, until she loved the very being her people called a monster. Yet a dragon’s life stretches so far beyond that of an Elezen that Hraesvelgr could only grieve how swiftly she would fade. In the end, unable to bear the thought of separation, Shiva begged him to consume her so that their spirits might remain entwined forever. Though unwilling, he granted her plea, and when word of their love spread, blade and claw alike were stayed. For a time, man and dragon lived in harmony and built together a nation unlike any the world had known.</p><p>But that age did not last. Iceheart says envy took root in the hearts of the Elezen. Believing the dragons’ long lives to reside in their eyes, a band of treacherous knights deceived their allies and stole by force what they desired. Nidhogg, who now prepares to unleash his brood upon Ishgard, was the dragon robbed by Elezen betrayal. Until he tears back what was taken from him from the descendants of those traitors, she says, no gentle words will quiet his wrath. Estinien answers her at once. He does not deny her vision of the past, nor Nidhogg’s long desire to reclaim the Eye. Indeed, that was why he himself carried it across the land, trying to draw the wyrm away from the city. But that is no longer enough. Through the Eye, he has felt what Nidhogg feels, and what remains in the dragon now is not purpose, but vengeance so vast it will not be satisfied by anything less than a sea of blood.</p><p>That revelation shakes Alphinaud, but it does not break his resolve. If Nidhogg is truly beyond reason, he asks, then might Hraesvelgr yet be approached instead? The great wyrm has taken no part in the assault upon Ishgard so far. Perhaps he may still listen, and perhaps through him some peace might yet be brokered. Iceheart studies that hope and, to Alphinaud’s surprise, does not reject it. If you still believe a peaceful answer can be found, she says, then she will take you to him. The road leads to Dravania, homeland of dragonkind, and from there upward into the clouds where Hraesvelgr resides. Yet even as that path opens, the strain of all that has come before begins to weigh upon you. Alphinaud notices your weariness and tells you to rest if you must, reminding you that Dravania lies beyond the western mountains. Then Midgardsormr’s voice stirs, observing that the vestiges of your mistress’s blessing are no longer as faint as once they were. Your will has given you unusual strength. Whether it will be enough, however, remains a question still unanswered.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    pageTitle:'千年の裏切り',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ピエリケの話によって、異端者を誘い出す手段は意外なほどはっきりする。アルフィノは、狼煙を上げるなど自分には不慣れだと認めつつも、そこまで難しいものだろうかと口にする。だが周囲の兵たちは相変わらず締まりがない。ひとりは夕食が腹に落ち着いてから哨戒に出るつもりだと言い、もうひとりは一日じゅう鱗も鉤爪も見ていない、アッシュプールのほうが見晴らしがいいのではないかとぼやいている。そんな取り留めのない声をよそに、エスティニアンだけは必要な一点を見失わない。敵をおびき寄せるなら、紫の煙を上げねばならないのだ。彼は、ウーリー・ヤクの毛皮を焚き火にくべた罠師の話を思い出す。耐えがたい悪臭とともに、くすぶる炎から深い紫色の煙が立ち上ったという。その話を手がかりに、あなたたちの次の行動は定まる。</p><p>エスティニアンは、獣狩りに慣れたあなたなら毛皮を集めるくらい造作もないだろうと言い、必要な枚数を確保するよう任せる。異端者がすぐに気づくとは限らず、一度で足りねば何枚も焼かねばならないかもしれない。一方で焚き火に必要な薪は、彼とアルフィノが集めることになる。凍てついた荒野では、乾いた燃料を見つけるだけでもひと苦労だからだ。こうして役目を分け合い、集めた成果を携えて「眠れる竜」で落ち合うことになる。</p><p>やがて再び顔を合わせたアルフィノは、志高くイシュガルドを発ったはずの自分が、いまや雪の中で枝をかき集めていることに半ば本気で嘆いていた。手は寒さで感覚を失いかけているのに、同時に痛みまで覚えるのだという。そんな様子を見て、エスティニアンは、薪集めなど彼にとって初めての経験なのだろう、さぞ恵まれた育ちだったに違いないと皮肉を漏らす。だが、そのやり取りも長くは続かない。狼煙に応じた者が、ついに姿を現したからだ。</p><p>現れたイゼルは、最初から相手があなたたちであることを見抜いていたようだった。武装した少人数の侵入者と争いがあったという報せはすでに彼女のもとへ届いており、仲間たちの敵意を許してほしいと言う。ここへ招かれざるまま足を踏み入れる者は少なく、善意を携えて来る者はなお少ない。なぜここへ来たのかと問われ、あなたたちはニーズヘッグのイシュガルド侵攻を止めたいのだと告げる。だがイゼルにとって、言葉でドラヴァニア勢を押しとどめようとする考えは、あまりにも甘く空想的に映る。もし憎しみの火種となった真実を知っていれば、その願いがいかに空しいものか理解できるはずだと、彼女は静かに語り始める。聖教庁が長きにわたり隠し続けてきた過去を、その力が見せたままに。</p><p>彼女が語るのは、千年以上も昔の出来事だった。エレゼンの一族がクルザスの地を故郷と定めようとしたとき、そこにはすでに竜たちが住んでおり、侵入者に道を譲る気などなかった。こうして流血の戦いが始まり、どちらかが滅びるまで続いていても不思議ではなかったという。だが、ただひとり別の道を選んだ女がいた。その名はシヴァ。周囲が戦いに身を投じるなか、彼女は竜と語り合おうとし、彼らが深い知性と理性を備えた存在であると知る。その中でもフレースヴェルグは、とりわけシヴァの心を強く惹きつけた。けれども、ほとんど不死にも等しい竜の時の流れから見れば、エレゼンの命はあまりにも短い。愛する者がほどなく失われることを思い、フレースヴェルグは悲しみに囚われる。やがてシヴァは別れに耐えきれず、自らを喰らってほしいと願い、魂を永遠に結び合わせようとした。彼は望まぬままにその願いを受け入れ、ふたりの愛の物語が広まると、人も竜も互いに刃と爪を向けられなくなった。そうして両者は共に生き、かつてない国を築き上げたのだ。</p><p>しかし、その平和も永遠ではなかった。イゼルは、やがてエレゼンの心に卑しい嫉妬が芽生えたのだと言う。竜の長命はその眼に宿る無尽の生命力によるものだと信じた騎士たちが、長く築いた信頼を裏切り、欲したものを力ずくで奪ったのだと。いまイシュガルドに竜の眷属を解き放とうとしているニーズヘッグこそ、その奸計によって眼を奪われた大いなる竜だった。裏切り者の子孫たちからそれを取り返すまで、どれほど穏やかな言葉を尽くしても、その怒りが鎮まることはない。だがエスティニアンは、そこで彼女を否定する。彼は彼女の見た過去を疑わないし、ニーズヘッグが眼を取り戻すことを強く望んでいたのも事実だと認める。だからこそ自分は長らくその眼を携え、都から竜を遠ざけようと各地をさまよっていた。だが、もはやそれでは足りない。眼を通して感じるニーズヘッグの内には、理性などほとんど残っていない。ただ復讐だけが膨れ上がり、血の海でなければ満たされぬほどになっているのだと。</p><p>その言葉にアルフィノは大きく動揺する。けれども、そこで彼の希望が潰えることはなかった。もしニーズヘッグが本当に理を失っているのなら、今度はフレースヴェルグに謁見を願うことはできないかと問う。彼はこれまでイシュガルド侵攻に加わっておらず、ならばなお平和への取り持ちに耳を傾ける余地があるかもしれない。イゼルは、そのなおも平和を求めようとする意志を見つめ、やがて否定せずに受け入れる。そこまで言うのなら、自分が彼のもとへ案内しようと。行き先は竜族の故郷ドラヴァニア、そしてさらに雲の上、フレースヴェルグが住まう高みだという。こうして新たな道が開かれる一方で、あなたの身には戦いの積み重ねが静かに重くのしかかり始めていた。アルフィノはその疲れを気づかい、休めるときに休むよう勧める。そしてミドガルズオルムの声が、ハイデリンの加護の名残はかつてよりもはっきりしていると告げる。ここまでたどり着こうとするあなたの意志が、尋常ならざる強さを与えているのだろう。だが、それでなお足りるのかどうかは、まだ誰にもわからない。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  },

    story:`<div class="clamp" data-collapsed="true"><p>當 Pierriquet 說出異端者會如何回應「想加入的人」之後，你們接下來該怎麼做，反而一下子變得很明確。Alphinaud 坦白說，自己對怎麼升起信號火並不熟，但想來應該也不至於困難到哪裡去。可營地裡其他人的態度依舊鬆散得令人無言。有人說自己得等晚餐消化完才要去巡邏，也有人抱怨一整天都沒看到半片鱗片或半根爪子，還懷疑是不是站到 Ashpool 去視野會更好。就在這些雜亂又沒重點的聲音裡，Estinien 抓住了唯一真正有用的關鍵：若要把敵人引到你們所在的位置，就得設法製造出紫色的煙霧。他接著提起自己曾聽過的一個故事，說某名獵人把 wooly yak 的獸皮丟進營火裡，除了臭得難以忍受之外，那團被悶燒出的煙還帶著濃重的紫色。於是，下一步很快就定了下來。</p><p>Estinien 把收集獸皮的任務交給你，認為以你獵殺魔物的本事，這點事應該不算什麼。他也提醒你，也許不只要燒一次；若異端者沒有立刻注意到那道煙，你們可能得連續燒上好幾張獸皮，才能讓對方發現你們的信號。至於升火需要的木材，則由他和 Alphinaud 去找。畢竟在這片被冰雪覆蓋的荒野裡，要湊出足夠乾燥的燃料，本身就不是件輕鬆的事。你們於是分頭行動，約好最後帶著各自的成果，到 Dreaming Dragon 會合。</p><p>等你再見到 Alphinaud 時，他那原本懷抱著崇高使命離開 Ishgard 的氣勢，已經被現實磨得狼狽不堪。他一邊在雪地裡翻找樹枝，一邊忍不住抱怨，說自己明明是為了重要的目的踏上旅程，如今卻落到在雪地裡扒木柴的地步。他的雙手既冷到幾乎失去知覺，卻又同時痠痛得厲害。Estinien 見狀，自然不忘諷刺兩句，說看來撿柴這種事對 Alphinaud 來說還真是新鮮體驗，想必他從小過得相當優渥。不過，這點冷嘲並沒有延續太久，因為那道信號終於有了回應。</p><p>Iceheart 很快就現身了，彷彿她早已猜到，引發這件事的人多半就是你們。她說，自己已經聽說有一小群裝備精良的闖入者與這裡的人起了衝突，也請你們原諒同伴們先前的敵意。畢竟，會在沒有邀請的情況下踏進這種地方的人本來就不多，而懷著善意來的人更少。接著她直接問你們，究竟為什麼會來到這裡。你們也沒有再繞圈子，而是坦白表示，希望阻止 Nidhogg 對 Ishgard 發動攻擊。可在 Iceheart 聽來，想靠談話去阻止 Dravanian 的怒潮，只不過是過於浪漫的妄想罷了。她說，如果你們真正知道那份仇恨最初是怎麼被點燃的，就會明白這場努力究竟有多徒勞。於是，她開始向你們講述自己透過那份 gift（能看見過去真相的特殊力量）所見到的歷史，也就是 Holy See 長久以來一直極力掩蓋的過去。</p><p>她說，那已是超過千年前的事了。當最初的 Elezen 部族試圖把 Coerthas 納為自己的家園時，這片土地其實早已屬於龍族，而龍族根本無意為這些外來者讓路。於是，血戰就此展開，而且若不是因為一名女子的決心，這場戰爭很可能會一直延續到其中一方被徹底滅絕。那名女子便是 Shiva。當周遭所有人都在戰鬥與死去時，她卻選擇與龍族對話，也因此發現，這些存在其實擁有深刻的智慧與理性。而其中最讓她傾心的，正是偉大的龍 Hraesvelgr（與 Shiva 相愛的偉大聖龍，也是 Nidhogg 的兄長；長年棲息於雲海高處，見證了人龍盟約的建立與背叛）。她愛上了這個在自己族人眼中被視為怪物的存在。可對近乎不朽的龍而言，Elezen（Eorzea 的長耳人族之一，也是 Ishgard 建國與千年歷史中的主要人類族群）短暫的生命就像剛被摘下的花，才剛綻放便迅速凋零。Hraesvelgr 因而深受痛苦折磨，因為他知道，死亡很快就會把 Shiva 從自己身邊奪走。最終，無法承受分離的 Shiva 主動請求他吞噬自己，讓彼此的靈魂能永遠交纏在一起。雖然 Hraesvelgr 不願做出這件事，最後卻還是答應了她。之後，這段注定悲劇的愛情故事在交戰雙方之間傳開，於是再也沒有人能若無其事地向彼此揮下刀刃或伸出利爪。接下來的兩百年間，人與龍族一同學會和平共存，甚至共同建立起一個前所未有的國度。</p><p>但那樣的和平終究沒有持續下去。Iceheart 說，卑劣的嫉妒最後還是在人類心中生了根。人們相信，龍族長久壽命的來源就在牠們雙眼中蘊藏的龐大生命力，因此，一群背叛盟約的騎士欺騙了與自己共存兩百年的夥伴，並以武力奪走了自己所渴望的東西。而如今準備讓無數幼龍撲向 Ishgard 的 Nidhogg（與 Hraesvelgr 同為 Midgardsormr 的子嗣之一，因遭 Elezen 背叛、被奪去雙眼之一，而對 Ishgard 懷抱延續千年的復仇），正是那個因 Elezen 的背叛而失去眼睛的偉大巨龍。她認為，在他從那些叛徒後裔手中奪回 Eye 之前，再多和緩的言語都不可能平息他的怒火。可 Estinien 卻立刻否定了她的結論。他說，自己並不懷疑她所看見的過去，也承認 Nidhogg 的確一直強烈渴望奪回 Eye。也正因如此，他才會一直把 Eye 帶在自己身邊，四處行動，試圖把 Nidhogg 從 Ishgard 引開。只是到了現在，這件事已經不再足夠。透過 Eye（Nidhogg 被奪走的龍眼之一；長年作為 Azure Dragoon 力量的來源，也讓持有者能感受到 Nidhogg 的意志與情緒），他能感受到 Nidhogg 的情緒，而那條龍如今幾乎已失去理性，心中剩下的只有無法被任何東西平息的復仇，除非有一整片血海作為代價，否則那股渴求根本不會止息。</p><p>這番話讓 Alphinaud 明顯受到衝擊，但他沒有因此放棄尋找其他可能。如果 Nidhogg 真的已經無法講理，那麼也許你們該試著去見 Hraesvelgr。Alphinaud 指出，至少到目前為止，Hraesvelgr 並沒有參與攻擊 Ishgard，也許他仍願意接受你們想促成和平的努力。Iceheart 看著他，似乎對這份仍不肯放棄的信念感到意外，但最後並沒有拒絕。她說，既然你們依舊相信能找到和平的解法，那她就帶你們去見他。接下來的路，將通往龍族的故鄉 Dravania，再一路延伸到雲端之上，Hraesvelgr 所棲息的地方。然而就在這條新道路開啟的同時，連番戰鬥與奔波也開始真正壓上你的身體。Alphinaud 察覺到你的疲憊，勸你先稍作休息，並提醒你若一時跟不上，也只要記住 Dravania 就在西方群山之外。就在這時，Midgardsormr（龍族之父，帶領七條偉大聖龍降臨此世的始祖龍，也是 Hraesvelgr 與 Nidhogg 的父親）的聲音又再次響起。他注意到，你身上那份來自你所侍奉之主的 blessing（Hydaelyn 所留下的加護）痕跡，似乎已不再像先前那樣微弱。是你想走到最後的意志，賦予了你異於常人的韌性。可即便如此，那份力量是否真的足夠，仍然還沒有答案。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Estinien <small class="muted">(Coerthas Western Highlands, X:16.4, Y:22.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="camp-of-the-convictors.html">定罪營地</a></div><div class="row">任一戰鬥／魔法職業（不含受限職業）Lv. 51</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="where-the-chocobos-roam.html">走向對話的旅途</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
