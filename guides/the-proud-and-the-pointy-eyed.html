    story:`<div class="clamp" data-collapsed="true">
<p>Cyr pulls you aside and says you need to talk. Since you last spoke, he has been combing the archives for anything on temporal magicks—and what he found is, in his words, troubling. In the Enchiridion, ancient Allag is held up as a warning: a mighty empire brought low by vanity and hubris. Yet in certain apocryphal texts, the Allagans are treated with unexpected sympathy—almost reverence.</p>
<p>It is in those same texts that Cyr finds references to temporal magicks once wielded by Allagan mages—arts said to “halt,” or even “reverse,” the temporal state of an object. If those accounts are true, and if Gigi’s abilities are the very same, then it may be possible for him to turn back the hands of time for the Grand Sers—just as he restored the duke’s priceless vase.</p>
<p>But Cyr cannot ignore what that might mean for living beings. He asks you to consider the vase: it was full of water when it shattered. Even if the vessel is restored, what becomes of what was inside? Is it filled again—every drop returned as it was? Is it different water? Or is what was spilled simply gone? He says he is speaking of the soul: even if such magicks could restore the dead to life, would they return with the same thoughts, memories, and feelings?</p>
<p>The Grand Sers are convinced they can regain their youth, and Cyr admits they may be right—but the dead who have entered Halone’s halls cannot return. And yet Gigi is resolved to try to resurrect Archmagus Quan. Cyr adds that Sharlayan texts describe Quan as a scholar known for studying ancient Allagan magicks, which only strengthens the suspicion that Gigi’s power comes from those old traditions. More importantly, Cyr has learned the location of Quan’s former residence—and hopes something there might help persuade Gigi to change course. He intends to summon Inspector Hildibrand and asks you to join.</p>
<p>Before you can move, a faint-hearted inquisitor confronts Cyr, accusing him of sneaking into the archives to read forbidden tomes, claiming he saw a “mad light” in Cyr’s eyes. Cyr protests it was for the investigation, only for the inquisitor to seize on that as confession and threaten to report him to his superiors. Cyr finally erupts—furious at the inquisition’s obsession with hunting heresy in every shadow—and admits, bitterly, that he can no longer pretend he has no personal stake. With guards surely coming, he tells you to depart for Idyllshire at once. You need to find the inspector.</p>
<p>In Idyllshire, Nashu tells you Hildibrand went off on his own, and Julyan curses that she raised him to have better sense. Nashu explains the Grand Sers returned briefly to trade jinglyshine and bragged about killing dragons in the forelands; when Hildibrand heard, he rushed after them to take back Gigi—driven not by duty as an inspector, but as a father. Julyan snarls that he has no obligations to a mammet that chose to leave, while Nashu worries he’ll do something reckless. Cyr, more alarmed by what could happen if the Grand Sers attack Hraesvelgr’s brood, asks you to help Nashu and Julyan search for Hildibrand while he visits Quan’s abandoned abode—insisting you need not fear for his safety after everything you’ve endured together.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>シルはあなたを呼び止め、話があると言う。前に別れてから、彼は「時を操る魔法」に関する情報を求めて文書庫を漁り続けており、その結果は控えめに言っても不穏だという。『エンキリディオン』では、古代アラグは虚栄と傲慢の末に滅びた大帝国として、戒めの例に挙げられている。だが外典的な文書の中には、アラグ人をより同情的に、時に賛美するように描くものすらあった。</p>
<p>そして、その文書の中でシルは、かつてアラグの魔道士が用いたという「時を止める」「時を巻き戻す」類の魔法の記述を見つける。もしそれが真実で、ジジの力が同じ系譜のものだとすれば、あの公爵の花瓶を元に戻したのと同じように、グランドサーたちの失われた若さも取り戻せるかもしれない。</p>
<p>しかし、生きた者にそれがどう作用するかは分からない。シルは花瓶の例をあなたに示す。割れた時、花瓶の中には水が満ちていた。器が元に戻っても、中身はどうなるのか。以前と同じ水が一滴残らず戻るのか、別の水になるのか、それとも零れた水は二度と戻らないのか。彼が言いたいのは魂のことだ。仮に死者を蘇らせられたとしても、同じ記憶や感情や思考を備えたまま、以前のままに戻ると言えるのか。</p>
<p>グランドサーは若返りを信じ、叶う可能性もある。だが、ハルオーネの御座へと赴いた死者は戻らない――戻れない。それでもジジは、大魔道士クワンの蘇生を試みようとしている。さらに文書庫のシャーレアン系資料によれば、クワンは古代アラグ魔法の研究で知られた学者だったという。ジジの力が古い伝統に由来する可能性は高い。しかもシルは、クワンがかつて住んでいた場所も突き止めた。そこに、ジジの進む道を変えさせる手掛かりがあるかもしれない。彼はヒルディブランドを呼び、共に向かうつもりだと言い、あなたにも同行を求める。</p>
<p>だがその矢先、気弱そうな審問官が現れ、シルを異端者だと糾弾する。文書庫へ忍び込み禁書を漁り、目に狂気の光を宿して禁断の知識を貪った――そう見たのだと言う。シルは調査のためだと反論するが、審問官はそれを「罪の自白」と決めつけ、上へ報告すると息巻く。ついにシルは爆発し、影のすべてに異端を探し続ける組織の在り方を罵倒する。そして、もはや私情がないふりはできないと吐露し、武装した衛兵が来る前にイディルシャイアへ発つぞと言う。まずはヒルディブランドを見つけねばならない。</p>
<p>イディルシャイアに着くと、ナシュはヒルディブランドが一人で行ったと告げ、ジュリアンは「まともな判断力を持て」と悪態をつく。ナシュによれば、グランドサーはジングリーシャインを物資と交換し、低地ではなく高地ドラヴァニアで竜を狩ると吹聴していたらしい。後でそれを知ったヒルディブランドは、検事としてではなく父としての義務だと言い、ジジを取り戻すために追いかけた。ジュリアンは、自由意思で去ったマメットに義理はないと切り捨て、ナシュは無茶をしないかと心配する。シルは、グランドサーがフレースヴェルグの眷属に手を出す事態をより恐れており、あなたに捜索の助力を頼む。彼はその間、大魔道士クワンの廃屋を訪ねると言い、これまでの経験で自分は現実の厳しさに慣れたのだと付け加える。</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>Cyr 把你叫到一旁，直說你們得談談。自從上次分開後，他一直在檔案庫裡翻找「時間魔法」的線索，而結果讓他越查越不安。《Enchiridion》把 ancient Allag（古代亞拉戈帝國）寫成一則警世故事——一個龐大帝國因虛榮與傲慢而崩塌；但在某些外典文本裡，Allagans（古代亞拉戈帝國）卻被描繪得更值得同情，甚至近乎被讚頌。</p>
<p>Cyr 說，那些文本裡提到 Allagan（古代亞拉戈帝國）魔法師曾使用過一種時間魔法，能讓物體的時間狀態「停住」，甚至「倒轉」。如果這些記述可信，而 Gigi 的能力與之相同——那麼他或許真的能替 Grand Sers 把時間往回拉，就像他曾把那只公爵的珍貴花瓶復原一樣。</p>
<p>可 Cyr 更在意的是：這套邏輯放到「活著的人」身上會變成什麼。他要你想想花瓶的例子——花瓶碎裂時裡面裝著水；就算容器被復原了，原本的內容物會怎樣？它會像之前一樣重新裝滿水嗎？那會是同一批水、每一滴都回來了，還是變成別的水？又或者，水一旦灑出去就永遠失去？他說他真正想談的是「靈魂」：就算時間魔法能讓死者回到世上，那個人還會是原本的那個人嗎——同樣的思想、記憶與感受，真的能一併回來嗎？</p>
<p>Grand Sers 深信自己能重獲青春，Cyr 也承認或許辦得到；但走進 Halone 殿堂的死者不可能回來——不可能。可 Gigi 仍決意去嘗試復活 Archmagus Quan。Cyr 又補充：檔案庫裡的 Sharlayan 文本提到，Archmagus Quan 是研究 ancient Allagan（古代亞拉戈帝國）魔法的傑出學者，這更像是在佐證 Gigi 的力量確實源自 ancient Allag（古代亞拉戈帝国）的古老傳承。更重要的是，Cyr 已經查到 Archmagus Quan 生前居所的位置；他希望那裡能找到某些線索，好說服 Gigi 改變方向。他原本想召來 Inspector Hildibrand 一起前往，也問你是否願意同行。</p>
<p>然而你們正要動身，一名膽怯的審問官卻衝出來指著 Cyr，結結巴巴地喊他是異端，說自己親眼看見 Cyr 潛進檔案庫翻閱禁書，還說他眼裡帶著「瘋狂的光」。Cyr 氣得反駁那全是為了調查，對方卻抓著這句話不放，宣稱他已經承認私下閱讀禁書、違反規範，要去向上級通報。Cyr 終於爆發，怒罵整個審問體系把異端看得無所不在，逼得所有人都在陰影裡猜疑彼此；他也承認自己早已無法再說服自己「沒有私心」。他判斷那審問官很快就會帶著武裝守衛回來，於是催你立刻離開，先趕去 Idyllshire——你們得找到那位 inspector。</p>
<p>抵達 Idyllshire 後，Nashu 告訴你 Hildibrand 已經獨自出發；Julyan 直接破口大罵，說自己把他養大不是要他這樣亂來。Nashu 解釋：Grand Sers 曾短暫回來用 jinglyshine 換補給，還吹噓要去 forelands 屠龍；Hildibrand 後來得知，就說他必須立刻追上去把 Gigi 帶回來——那不是 inspector 的職責，而是父親的責任。Julyan 卻冷嘲：Hildibrand 對一個自願離開的魔法人偶根本沒有義務。Nashu 擔心他會做出魯莽之舉，而 Cyr 更擔心的是 Grand Sers 若攻擊、甚至殺死 Hraesvelgr 的眷屬會釀成大禍。他請你協助 Nashu 和 Julyan 搜尋 Hildibrand 的去向，自己則要先去 Archmagus Quan 的廢棄住處探查；他還補一句，別擔心他的安危——你們一路的經歷，早讓他對現實的殘酷不再陌生。</p>
</div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());
