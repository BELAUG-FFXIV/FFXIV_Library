  EN:{

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>In Little Solace in the East Shroud, you are stopped by the sylph Komuxio, who first bows his head and asks the “dancing one” for forgiveness. Since the walking ones last came to their abode, these ones have known nothing but trouble, and so he must always be careful, always wary. Even so, Komuxio feels that you are different from the other walking ones and that you can be trusted, and at last he decides to ask for your help. He tells you that strange walking ones with bodies of steel have come to the home of these ones, and he believes these steel ones come from the Empire. Wherever the Empire goes, many living ones become dead ones, trees fall, and bushes burn, and so his home is in grave danger. With a heavy sense of foreboding, he begs you—friend to both these ones and the walking ones—to speak with the sylphs here and the walking ones in the hut-house, and learn what you can about the steel-clad intruders.</p>
      <p>You begin your inquiries within Little Solace itself. Speaking first with Pelixia, you learn that she has indeed seen the steel walking ones, marching past while carrying great wooden boxes. With a bright, naive enthusiasm, she wonders if they might be hunting for shiny treasure, and admits that she, too, is fond of such things. When you turn to Nathaxio, however, he hurriedly bids you be quiet, confessing in a trembling voice that the steel walking ones are frightening, like the touched ones, and that they have frightening friends at their side as well. Taking to heart the fear in the sylphs’ words, you resolve to seek out the walking ones at the Hawthorne Hut and hear what they have seen.</p>
      <p>At The Hawthorne Hut in Nine Ivies, you ask the residents about men clad in strange armor. Monne thinks back and recalls having seen suspicious figures of late—men in unusual mail gathering somewhere deep in the forest. At the time she simply assumed they were adventurers and paid them little mind. When you pose the same question to Victor, his expression hardens. Men encased head to toe in steel can only be imperial soldiers, he declares, and though he cannot say what they are plotting, he is certain it is nothing good. His grim assessment makes the unease hanging over the forest feel all the heavier.</p>
      <p>Armed with what you have learned from both sylphs and settlers, you return to Little Solace and report back to Komuxio. You explain that the steel walking ones are indeed soldiers of the Empire, carrying boxes as they march deep, deep among the trees. As you relay the words of Pelixia, Nathaxio, Monne, and Victor, Komuxio’s face darkens, convinced that the steel ones are up to nasty, no-good things. Knowing the forest as well as he does, he is certain that no matter how they try to hide, he can still find them. Borrowing your map, he carefully makes a mark in one spot—the place where he is sure the steel ones are hiding—and asks you once more to go there, find them, and uncover their purpose.</p>
      <p>Following the mark on your map, you make your way into the deeper reaches of Nine Ivies. As you push through the trees, the quiet air of the forest begins to feel heavy around you, until all at once you sense a sharp, hostile presence closing in. Ahead, in a small clearing, the steel walking ones stand guard over stacked boxes, their intentions hidden but clearly ill. You draw your weapon and confront them, clashing with the armored intruders in a brief but fierce struggle. When the fighting is done and the steel-clad soldiers lie defeated, you search the remaining boxes, and inside one of them you find a single folded piece of paper.</p>
      <p>Carrying the paper, you return to Little Solace and recount to Komuxio all that happened in the depths of the forest. Relieved to see you safely back, he lets out a long breath before accepting the paper from your hand. Slowly tracing the symbols of the walking ones, he explains that the message is a list of food and rocks—the very things that were stored inside the boxes. What troubles him most is that every item mentioned comes from the home of these ones, from this forest itself. Komuxio cannot understand how the steel walking ones knew to seek such things here, and begins to wonder if some sneaky one is hiding behind his wings, selling the secrets of the woods to the Empire. Even as his fear for his home deepens, his gratitude toward you does not waver, and he asks you to promise that you will always remain a friend to these ones.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ナインアイビーの森の一角、シルフの仮宿を訪ねると、コムシオが不安そうにあなたを見上げます。最近、森にやって来た「ヒト」のせいで、わたぴたちの里には、ずっと前からたくさんの困りごとが続いているのだと、彼はおずおずと打ち明けます。けれど、あなたはロルフに教わった通り、シルフ族の「挨拶」をきちんと踊ってみせた「特別なヒト」です。だからこそ、コムシオは他の「ヒト」とは違うと信じ、思い切って頼みごとを切り出します。森の奥に、全身を金属で覆った「ヘンなヒト」たちが現れ、わたぴたちの住処の近くをうろついているというのです。コムシオは、その姿かたちや動きを思い返しながら、彼らが「テイコク」の兵に違いないと感じていることを告げます。テイコクが通れば、木々は倒れ、草花は焼かれ、生き物は命を落とす──このままでは、森そのものが危ないかもしれない。そう言って身を震わせたコムシオは、あなたがシルフ族にも「ヒト」にも顔が利く存在だと信じ、里の仲間たち、そしてホウソーン家の山塞に暮らす「ヒト」たちから話を聞いてきてほしいと、必死の様子で頼みます。</p>
      <p>あなたはまず、シルフの仮宿でペリクシアとナトハシオに話を聞きます。ペリクシアは、森を行き来する金属の「ヒト」たちが、大きな箱を運んでいたことを思い出し、もしかすると森のどこかに隠された宝物を探しているのかもしれないと、眠そうな目をこすりながら語ります。一方、ナトハシオは、あなたの姿を見るなり小さな体を震わせ、あの金属の連中は、心を奪われたシルフたちと同じくらい恐ろしい存在なのだと訴えます。自分たちの里に近づいてきていることを思うだけで怖くてたまらず、怖い者同士は必ず集まってくるものだと、か細い声で警告するのでした。シルフたちの話を胸に刻んだあなたは、ナインアイビーを抜けてホウソーン家の山塞へ向かい、モヌとヴィクターからも情報を集めます。モヌは、最近見かけた奇妙なよそ者たちが、森の奥に集まって何かをしていたと振り返り、最初は冒険者かと思っていたものの、今になって思えば様子がおかしかったと首を傾げます。ヴィクターは、頭の先から足の先まで金属で覆われた連中の話を聞くなり顔をしかめ、それは帝国兵に決まっていると断言します。何を企んでいるかはわからないが、森とそこに住む者たちにとって、決して良いことではないだろうと、真剣な表情であなたに告げるのでした。</p>
      <p>集めた情報を抱えてシルフの仮宿へ戻ると、コムシオはあなたの無事な姿を見て胸をなで下ろします。あなたが聞き出した内容を一つずつ確かめていくうちに、金属の「ヒト」たちがやはりテイコクの兵であり、大きな箱を運びながら、森の奥深くへと姿を消していったことがはっきりしてきます。コムシオは長くこの森に暮らしてきた者として、彼らがどこへ向かおうとしているのか、嫌というほど心当たりがありました。森の地形や獣道を思い描きながら、彼はあなたに地図を貸してほしいと頼みます。あなたが差し出した地図の上で、小さな指が慎重に動き、とある地点に印をつけました。そこは、シルフ族でもめったに近づかない森の奥まった場所──外から来た者が周囲の目を避けて何かを隠すには、うってつけの場所です。「きっと、あそこに潜んでいるでふっち」とコムシオは言い、あなたに調査を託します。彼の不安げなまなざしを背に、あなたは印のつけられた地点へ向かい、森の中にぽつんと置かれた怪しげな木箱を発見します。箱を調べた瞬間、あたりの空気が張りつめ、帝国兵たちが姿を現して襲いかかってきます。あなたは迫りくる敵を退け、静けさを取り戻した森の中で、改めて木箱を調べるのでした。</p>
      <p>再びシルフの仮宿に戻ると、コムシオはほっとしたように大きく息を吐き、あなたの無事を喜びます。あなたが木箱の中から見つけた紙片を差し出すと、コムシオはそれを大事そうに受け取り、「ヒト」の文字を慎重に追いはじめます。それは、テイコクの補給物資について書かれた目録であり、その中に並んでいる食べ物や鉱石の名は、どれもこの森と、わたぴたちの故郷でしか手に入らないものばかりでした。どうしてテイコクの兵が、そんな細かい場所や品目を知っているのか──コムシオの表情から血の気が引きます。森のどこかに、テイコクへ情報を売る「ヒミツのヒト」がいるのではないか。仲間の背中のすぐそばに、裏切り者が潜んでいるのではないか。疑念と恐怖が胸の中で渦巻き、コムシオは小さな手をぎゅっと握りしめます。それでも、あなたが危険を承知で森の奥まで足を運び、ここまでの手がかりを持ち帰ってくれたことに変わりはありません。コムシオは、あなたに深く頭を下げ、今日の助力に感謝を伝えます。そして、これからもわたぴたちシルフ族の友達でいてほしいと、震える声で懇願します。あなたがその願いを受け入れると、彼はかすかに笑顔を見せ、まだ見ぬ脅威に怯えながらも、あなたという味方がそばにいることに、ほんの少しだけ救いを見出すのでした。</p>
    </div>

    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="forest-friend.html">仮宿暮らしの困りごと</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 21～</div>

    followq:`<div class="stack">

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'陌生人',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 The Black Shroud 的 East Shroud，Little Solace 裡，你被 sylph Komuxio 叫住。牠先用自己的口癖向你這個「dancing one」道歉，請求你的原諒。自從 walking ones 上次來到牠們的棲身之處之後，these ones 便煩惱不斷，因此牠必須時時保持警惕、永遠小心。即便如此，Komuxio 還是相信你和其他 walking ones 不一樣，覺得可以信賴你，於是鼓起勇氣向你求助。牠告訴你，最近有奇怪的 steel walking ones 出現在 these ones 的家園附近，那些全身像鋼鐵般的 walking ones 很可能來自 Empire；而在 Empire 行過之處，lot of living ones 會變成 dead ones，樹木倒塌、灌木燃燒，整片森林都會陷入危機。Komuxio 懷著不祥的預感，拜託身為 these ones 與 walking ones 朋友的你，去和這裡的 sylph 以及 hut-house 裡的 walking ones 打聽消息，弄清楚 steel walking ones 的真面目與目的。</p>
      <p>按照 Komuxio 的請託，你先在 Little Solace 內四處詢問。Pelixia 想了想，說起自己曾看見那些 steel walking ones 扛著大大的箱子經過，還笑說或許那些 walking ones 正在狩獵某種 shiny treasure──畢竟牠自己也很喜歡寶物。接著你詢問 Nathaxio，牠卻立刻要你小聲一點，一邊發抖一邊說那些 steel walking ones 可怕得像 touched ones 一樣，而且還帶著同樣可怕的同伴同行。聽完兩位 sylph 支離但一致的證詞，你將這份不安記在心裡，轉而踏上前往 The Hawthorne Hut 的道路，準備向居住在那裡的 walking ones 求證。</p>
      <p>來到位於 Nine Ivies 的 The Hawthorne Hut，你先向 Monne 提起這些異樣的身影。她歪著頭回想，確實在不久前看見過幾名穿著奇怪盔甲的男人，在森林深處聚集，但當時只以為是外地來的冒險者，並沒有多想。當你把同樣的問題丟給 Victor 時，他的表情瞬間沉了下來，直言那種從頭到腳都被鋼鐵包住的傢伙，多半就是 Imperial soldiers。至於他們在森林裡打什麼主意，他雖然說不上來，卻十分肯定那絕對不會是什麼好事。Victor 這句篤定的判斷，讓籠罩在森林上的不安陰影又加深了一層。</p>
      <p>在從 sylph 與 walking ones 那裡收集到足夠的線索後，你回到 Little Solace，向 Komuxio 報告一路上聽來的消息。你說明 steel walking ones 果然是來自 Empire 的人馬，他們抬著箱子，沿著樹林深處前進；Pelixia、Nathaxio、Monne、Victor 的話如同拼圖般拼湊出同一個結論。Komuxio 聽完後，臉色沉了下來，認定那些 steel walking ones 肯定在策劃什麼 nasty、no-good 的事情。作為熟悉森林每一寸土地的 sylph，牠相信就算那些 intruders 再怎麼藏身，也逃不過牠的眼睛。牠向你借來 map，認真地在其中一處做上記號，斷言 steel ones 一定就躲在那裡，然後再次懇求你前往那個地方，親自確認他們的去向與陰謀。</p>
      <p>你依照地圖上的記號，走入 Nine Ivies 更深處的林間小道。越往前走，周圍的氣息就越發沉重寂靜，直到某一刻，一股明確的敵意突然撲面而來——正如系統所示，你清楚地「感受到敵對的氣息」。在空地上，steel walking ones 正守在一堆箱子旁，彷彿在暗中準備著什麼。你拔出武器迎上前去，與這些鋼鐵入侵者短暫交鋒。戰鬥結束後，你仔細搜查那幾口箱子，在其中一個箱子裡找到了一張折好的 paper。</p>
      <p>你把 paper 帶回 Little Solace，向 Komuxio 說明剛才在森林深處發生的一切。見到你平安回來，他先長長鬆了一口氣，接著接過那張紙，開始解讀上頭的 walking ones 符號。很快地，牠發現那其實是一份列表，上面寫著幾種 food 與 rocks，而那些東西正是裝在箱子裡的內容物。更讓牠不安的是，紙上提到的食物與岩石，全都出自 these ones 的家園──這片森林本身。Komuxio 不明白 steel walking ones 為什麼會知道該到這裡來尋找這些東西，只能懷疑是不是有某個 sneaky one 躲在牠的翅膀後面，悄悄把森林的秘密賣給了 Empire。即使如此，牠對你的感謝絲毫不減，只是在深感憂慮之餘，再次懇請你答應，今後也要一直做 these ones 的朋友。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 科姆希奧　<small class="muted"> 黑衣森林東部林區 (X:21.9, Y:25.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="forest-friend.html">林中摯友</a></div>
      <div class="row">所有職業（不含限定職） 等級 21 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="brotherly-love.html">克拉克希奧的決心</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
