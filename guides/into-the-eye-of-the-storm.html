<script>
const i18n = {
  EN:{
    langLabel:'English',

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Alphinaud will not let you linger. The fight is not finished, he insists—you must press on until the harpy queen is brought low at your feet. Even with that urgency hanging in the air, the moment stretches as your attention is drawn to the Enterprise and the man who cannot look away from her.</p>
      <p>Cid’s voice softens when he speaks of the ship. Simply seeing her steadies him, as if something long missing has quietly returned. Alphinaud understands at once—Cid is looking upon his own handiwork—and he brings news: the Seedseers have agreed to let the Enterprise be kept and repaired for as long as necessary.</p>
      <p>“Necessary,” however, is the word Alphinaud clamps down on. Garuda grows stronger with every passing hour, and if you are to pry this blighted realm from her talons, it must be soon. The Enterprise, after all, has suffered in the wilderness, and Alphinaud asks Cid to confirm what is plain to the eye.</p>
      <p>Cid does not sugarcoat it: it is a miracle she carried you even this far. Worse still, the Howling Eye is ringed by a savage tempest—one that would splinter even proud trees into kindling—and if the Enterprise cannot endure that storm, your battle will end before it begins. Cid believes he can repair her, but if the winds are as terrifying as Alphinaud says, repairs alone may not be enough.</p>
      <p>Then a single word turns the problem in Cid’s mind: the elements. Instead of trying to outlast the tempest, he proposes shaping it—using the power of a corrupted crystal to carve a path through the storm and spare the Enterprise the brunt of the barrier. Alphinaud follows the logic immediately, speaking of over-aspected aether made manifest across Eorzea since the Calamity disrupted the land’s currents—crystals now common, yet infamous for twisting aetheric energies, even within living beings. Cid adds the crucial point: if you can convert the wind-aspected aether of Garuda’s barrier into another aspect she cannot command, the Enterprise—properly modified—could carry you to the Howling Eye no matter how hard she blows.</p>
      <p>But all of it depends on one thing: obtaining a crystal with the necessary properties. Cid does not know where to find one, yet he knows someone who might—Lamberteint, a scholar living in Camp Drybone. He recalls meeting the man in his days at the church—back when he was “Marques,” as he puts it—and how the scholar would speak for hours about aetheric study, corrupted crystals his favorite subject, until even poor Marques was thought to have an uncommon talent for theory. With that, Alphinaud gives you your next task: return to Thanalan and seek out the scholar, while he and Cid begin the Enterprise’s repairs in your absence.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Cid <small class="muted">New Gridania (X:11.3, Y:13.6)</small></div>
    </div>`,

      <div class="row">All classes and jobs (excluding limited jobs) (Level 41 or above)</div>

    followq:`<div class="stack">

    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'嵐を越える突破口',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>アルフィノは、あなたの足を止めることを許さない。仕事はまだ終わっていない――ハーピークイーンがあなたの足元に崩れ落ちるその時まで、前へ進めと促す。だが、その切迫した言葉の合間に、エンタープライズへ向けられる視線と、そこに立つ男の静かな気配が残る。</p>
      <p>シドは、あの船を見ていると心が落ち着くと言う。失っていたとさえ気づかなかった欠片が、今になって戻ってきたかのようだ、と。アルフィノはそれを当然のこととして受け止める――彼が設計し、造り上げた船なのだから。そして、良い知らせを告げる。シードシアーが、エンタープライズを預けて修理する許可を出した。必要なだけ時間をかけられる、と。</p>
      <p>だがアルフィノは、その「必要」という言葉に釘を刺す。ガルーダは刻一刻と力を増している。あの爪からこの忌まわしい地を取り戻す望みがあるのなら、悠長にはしていられない。荒野に放置されていたエンタープライズが大きな損傷を受けたのは明らかであり、アルフィノはシドに確かめる。</p>
      <p>シドは率直に認める――ここまで飛べたこと自体が奇跡だ。しかも、ハウリングアイは荒れ狂う大嵐に包まれている。誇り高き大樹すら木っ端みじんにする暴風の中、エンタープライズが耐えられなければ、戦いは始まる前に終わってしまう。シドは時間さえあれば修理できると言うが、嵐が語られるほど凄まじいなら、それだけでは足りないかもしれない、と続ける。</p>
      <p>そこでシドの思考が一点に結びつく――「元素」だ。嵐に耐えるのではなく、嵐そのものに手を入れる。性質の歪んだクリスタルの力を借りれば、暴風の中に道を作り、エンタープライズが受ける衝撃を避けられるという。アルフィノもすぐに理解し、エオルゼア各地に存在する偏ったエーテルの具現――第七霊災以降、地脈の乱れで比較的ありふれたものとなった一方で、生き物を含むエーテルの流れすら歪める厄介な存在だと語る。シドは要点を締める。ガルーダの結界を形作る風属性のエーテルを、彼女が支配できない別の属性へと変換できれば、改修したエンタープライズで、どれほど吹き荒れようともハウリングアイへ辿り着けるはずだ、と。</p>
      <p>だが結局は、その性質を満たすクリスタルを手に入れられるかにかかっている。シドは入手先を知らないが、心当たりはあると言う――キャンプ・ドライボーンに住む学者、ランベルタンだ。教会で過ごしていた頃、彼――いや「マルケス」としての自分に、哀れみからか、あるいは話を聞く者が欲しかったのか、彼は何時間もエーテル研究について語り続けた。性質の歪んだクリスタルは、特にお気に入りの題材だったという。その記憶を頼りに、アルフィノはあなたに告げる。ザナラーンへ戻り、学者を訪ねてほしい――その間、彼とシドはエンタープライズの修理に取りかかる。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> シド　<small class="muted">グリダニア：新市街 (X:11.3, Y:13.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="in-pursuit-of-the-past.html">ストーンヴィジルに眠る翼</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 41～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="sealed-with-science.html">ハイブリッジの一番弟子</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'暴風突破口',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Alphinaud 不讓你在原地遲疑半步。他語氣急切地催你繼續前進——這份工作還沒結束，必須一路逼迫下去，直到那位「harpy queen」倒在你腳下再也起不來。然而，在這股緊迫感之間，你也看見 Enterprise 靜靜停著，而有人正望著她出神。</p>
      <p>Cid 說，只要看著她，心就會平靜下來。像是某個自己從未察覺遺失的部分，在此刻被悄悄找回。Alphinaud 並不意外——畢竟是 Cid 親手設計並打造了她。隨後他帶來好消息：Seedseers 已批准你們的請求，允許 Enterprise 安置下來，你們可以花「需要的時間」把她修好。</p>
      <p>但 Alphinaud 馬上把那個「需要」收得很緊。他提醒你，Garuda 正以每個時辰都更強的速度成長；若還想把這片被陰影籠罩的土地從她的利爪下奪回，就不能浪費任何多餘的時間。Enterprise 在荒野裡受過太多折磨，而他要 Cid 直言——是否真的如此嚴重。</p>
      <p>Cid 沒有粉飾：她能載著你們撐到現在，本身就是奇蹟。更棘手的是，Howling Eye 外圍被狂暴的風暴包圍——那種風勢足以把挺拔的大樹撕成碎木。若 Enterprise 無法撐過那道風牆，你們的戰鬥甚至會在開始前就宣告結束。Cid 認為只要有時間，他能把 Enterprise 修到完整狀態，但若那場風暴真如 Alphinaud 所言可怕，單靠修理仍未必足夠。</p>
      <p>就在這裡，Cid 抓住了關鍵：元素。與其硬扛風暴，不如直接「對元素動手」——他提出用一枚變質的 crystal 來開路，讓 Enterprise 不必承受結界的正面打擊。Alphinaud 立刻接上這個想法，解釋那是遍布 Eorzea 的「過度偏向某種屬性的以太」所形成的具現；自 Calamity 擾亂大地的以太流向後，這類 crystal 變得更常見，卻也因此帶來許多禍患——它們會扭曲以太能量，甚至連生物體內的以太都可能受其影響。Cid 進一步說明重點：若能用這種 crystal 的性質，把 Garuda 結界中「風屬性」的以太轉換成另一種她無法掌控的屬性，再配合對 Enterprise 的改造，你們就有機會在她再怎麼狂吹之下，依然順利抵達 Howling Eye。</p>
      <p>然而，你們也知道自己說得太快了——一切都取決於能否找到符合條件的 crystal。Cid 目前沒有確切來源，但他想到一個人：住在 Camp Drybone 的學者 Lamberteint。Cid 回憶起自己在 church 的那段日子——更準確地說，是以 Marques 的身分——對方不知是出於憐憫，或只是想找個願意聽的人，常常一聊就是好幾個鐘頭，談的全是以太研究，而變質的 crystal 更是他最鍾愛的題目。正因那一場場對談，才讓「Marques」被人認為對理論科學有罕見的天分。 Alphinaud 於是把任務交到你手上：你立刻返回 Thanalan 去找那位學者；而他與 Cid，則會在你不在的時候著手修復 Enterprise。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 希德　<small class="muted"> 格里達尼亞新街 (X:11.3, Y:13.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="in-pursuit-of-the-past.html">石衛塔霸主</a></div>
      <div class="row">所有職業（不含限定職） 等級 41 以上</div>
    </div>`,

const tabBtns = [...document.querySelectorAll('.tab-btn')];
const pageTitle = document.getElementById('pageTitle');
const langToggle = document.getElementById('langToggle');
const panels = {
  story: document.getElementById('panel-story'),
  acq: document.getElementById('panel-acq'),
  unlockq: document.getElementById('panel-unlockq'),
  followq: document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
