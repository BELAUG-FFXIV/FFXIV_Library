  EN:{

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>In Little Solace, Komuxio flutters up to you in a panic, leafy wings trembling. The “helpful one” has arrived at just the right time, he insists. One of his kin, Claxio, has left the safety of Little Solace alone, and wandering the forest without companions is far too dangerous. Komuxio explains that Claxio went west after leaving the settlement, and begs you to find them before some beast of the forest makes a meal of them. With his worried eyes fixed on you, you set off into the trees of East Shroud.</p>
      <p>Following Komuxio’s directions, you search the woods of Nine Ivies until you come upon Claxio. When you deliver Komuxio’s plea, Claxio only laughs bitterly. They are tired of living alongside those who are not “these ones,” tired of seeing their people rely on walking ones for everything. To Claxio, there is little difference between such dependence and those who summoned a primal. No wonder they chose to leave. This spot in the forest seemed like a good place to build a new home, but now a “meddling one” has arrived to drag them back. Declaring that they will go deeper into the forest and forbidding you to follow, Claxio turns away and vanishes between the trees, leaving you with no choice but to return to Little Solace.</p>
      <p>Back in Little Solace, Komuxio is horrified to hear that Claxio has refused to return and gone deeper into the forest. He has seen touched ones lurking out there—sylphs who have fallen under a primal’s influence—and his voice trembles as he urges you to hurry. To help you track Claxio, he tells you to look for spools of thread scattered on the forest floor, a trail that will surely lead you to the runaway sylph. With his panic pressing at your back, you follow the thread through East Shroud and into the tangle of the Bramble Patch, pushing onward before the touched ones can claim Claxio.</p>
      <p>You find Claxio again amidst the twisted undergrowth, and they bristle the moment you appear. They shout at the “meddling one” to begone and vow never to return to Little Solace. But before the quarrel can go further, other sylphs emerge—these ones marked by Ramuh’s influence, their words urging Claxio to come with them and serve the primal together. Claxio desperately insists they are a good one and will never go with bad ones. Papalymo steps forward, warning you to be on your guard: these sylphs have been tempered by the primal Ramuh, much like the Amalj’aa under Ifrit’s thrall. They exist now only to serve their deity. Yda grimly adds that words will not reach them—steel will. Though she takes no pleasure in it, there is no other way. As the tempered sylphs call in “friends” from the forest, a morbol lumbers into view, its stench making Claxio cry out in terror. While Yda and Papalymo move to hold the beast at bay and urge you to strike down the sylphs, you steel yourself and join battle in the choking reek of the Bramble Patch.</p>
      <p>When the fighting is done and the enemies lie defeated, Claxio trembles, barely believing they are still alive. Komuxio rushes to their side, relief written in every flutter of his leaves as he asks if Claxio is unharmed and still in possession of their wits. Seeing Komuxio and you together, Claxio falters, wondering why the two of you came all this way. Komuxio explains simply that you both came to rescue them, and the knowledge that someone cared enough to brave touched ones and morbols breaks through Claxio’s stubbornness. They apologize, saying they never truly meant to run away from Little Solace—only that they were afraid. The sylphs of Little Solace had begun to change, becoming friendly with other ones, and Claxio feared they were forgetting who they were, just as the touched ones did. But after seeing how far Komuxio and you were willing to go, they realize they were wrong. Turning to you, they thank the “helpful one” and promise to return to Little Solace to be with Komuxio and the friendly ones.</p>
      <p>Back at Little Solace once more, Komuxio tells you he had feared Claxio lost forever. Thanks to you, Claxio has been saved, and their family can be together again. Komuxio has known many walking ones—even many kind ones—but in his eyes you are the kindest and strongest of all, a true hero to these sylphs. He believes you will help bring these ones and walking ones closer together, and with quiet determination he declares that he would now take you to see the elder one. Yet as he begins to speak the elder’s name, his voice falters, the weight of new worries settling over him. The moment of reunion and relief passes, and you sense that another task already awaits you in the shadow of the forest.</p>
    </div>

  JP:{
    langLabel:'日本語',
    pageTitle:'クラクシオの決意',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>シルフの仮宿でコムシオは、今にも泣き出しそうな様子であなたのもとへ飛び寄ってきます。「助けてくれるヒト」が来てくれたのは、本当に良いタイミングだと彼は訴えます。仲間のひとりであるクラクシオが、ひとりきりで仮宿を出て行ってしまったというのです。ひとりで森を歩くのは、あまりにも危険すぎる──コムシオは、クラクシオが森の西へ向かったことを伝え、獣たちの腹の中に収まってしまう前に、どうか捜し出してほしいと必死に頼み込みます。震えるまなざしを受けとめたあなたは、黒衣森：東部森林の木々のあいだへと足を踏み出していきます。</p>
      <p>コムシオの言葉を頼りにナインアイビーの森を進んでいくと、やがてあなたはクラクシオの姿を見つけます。コムシオが心配していると伝えると、クラクシオは鼻で笑うようにして顔を背けます。自分たちではない者たちと共に暮らすことに、もう疲れ果ててしまったのだと。森に住む「この子たち」が、歩くヒトたちに何から何まで頼るようになってしまった姿は、蛮神を呼び出した一派と変わらない──そう感じたクラクシオは、仮宿を離れることを選んだのでした。ここなら新しい住処を築けると思っていた矢先に、「おせっかいなヒト」であるあなたが現れたことで、さらに森の奥へ行かねばならなくなったと、クラクシオは怒りをあらわにします。そして、この先へついて来ることは決して許さないと強く言い放つと、木々の陰へと姿を消してしまいます。これ以上追うことはできず、あなたはシルフの仮宿へと引き返すのでした。</p>
      <p>再び仮宿へ戻ると、コムシオはクラクシオが戻るのを拒み、さらに森の奥へ向かったと聞いて愕然とします。彼は、森の中に「触れられた子」たちが潜んでいるのを見たばかりだと言い、ひときわ不安げな声で急いで追いかけるよう懇願します。クラクシオの足取りを追う手がかりとして、森の地面に落ちている糸巻きを探すように教えてくれるコムシオ。その糸筋をたどれば、きっとクラクシオにたどり着けるはずだと信じているのです。あなたは、彼の切羽詰まった想いを背に受けながら、糸巻きの落ちている跡を追って黒衣森：東部森林を北西へ進み、やがて茨に覆われた茨の森へと足を踏み入れていきます。触れられた子たちの手がクラクシオに及ぶ前に、追いつかなければなりません。</p>
      <p>やがて茨の森の奥で、あなたは再びクラクシオと相まみえます。あなたの姿を認めた途端、クラクシオはたちまち身を逆立て、「おせっかいなヒト」に二度とついてくるなと言い放ちます。しかし、そこで言い争いが続くより早く、別のシルフたちが姿を現します。彼らはラムウに心を縛られた「触れられた子」たちであり、クラクシオに歩み寄りながら、一緒に蛮神さまに仕えようと甘い言葉をささやきかけます。クラクシオは必死に、自分は「いい子」であり、決して「悪い子」たちになどついていかないと叫び返します。その様子を見ていたパパリモは、あなたに向き直り、警戒を怠らないようにと告げます。彼によれば、目の前のシルフたちは蛮神ラムウのテンパードとなった存在であり、イフリートに囚われたアマルジャ族と同じく、今や神に仕えることだけを望んでいるのだと。言葉を尽くしても届かず、最後に残された手段は剣を交えることだけ──イダもまた、それが望ましい結末ではないと認めながらも、やむを得ないと顔を曇らせます。やがて触れられた子たちが森の仲間を呼び寄せると、悪臭を放つモルボルが姿を現し、その匂いにクラクシオは悲鳴を上げます。イダとパパリモがモルボルの相手を引き受けるから、あなたはシルフたちに集中してほしいと声を張り上げる中、あなたは鼻をつく臭気の中で武器を構え、戦いへと身を投じていきます。</p>
      <p>激しい戦いの末、敵が倒れ伏すと、クラクシオは自分が助かったことが信じられないとばかりに小さく震えます。そこへコムシオが駆け寄り、クラクシオの無事を確かめようと、葉っぱの身体を震わせながら声をかけます。正気を保っているか、本当に傷はないかと案じるコムシオと、それを見つめるあなたの姿を見て、クラクシオは戸惑いながら問いかけます。なぜ、ふたりもここまで来たのかと。コムシオは、あなたと一緒にクラクシオを助けに来たのだと、当たり前のように告げます。触れられた子たちとモルボルの脅威を承知のうえで、自分のためにここまで踏み込んできてくれた──その事実が、クラクシオのかたくなだった心を揺さぶります。クラクシオは、シルフの仮宿から逃げ出すつもりなど本当はなかったと謝り、自分はただ怖かったのだと打ち明けます。仮宿に住む子たちが、歩くヒトたちにどんどん心を開き、仲良くなっていく姿を見ているうちに、「この子たち」が自分たちであることを忘れてしまうのではないか、触れられた子たちのようになってしまうのではないかと怯えていたのです。しかし今は、その恐れが思い込みに過ぎなかったことを理解しはじめていました。クラクシオはあなたの方へ向き直り、「助けてくれるヒト」に心からの感謝を述べると、コムシオや仲間たちのもとへ戻ると約束します。</p>
      <p>そして再びシルフの仮宿へ戻ると、コムシオはクラクシオがもう二度と戻らないのではないかと恐れていたことを打ち明け、あなたが救い出してくれたおかげで家族のような絆を取り戻せたのだと喜びを噛みしめます。これまでにも多くの歩くヒトを見てきたコムシオですが、その中でも、あなたは誰よりも優しく、誰よりも強い存在だと感じています。あなたは、シルフたちと歩くヒトたちの距離を縮めてくれる「英雄」なのだと。コムシオは、あなたを長老さまのもとへ案内したいと語り、シルフ族と歩くヒトたちの未来に希望を見いだそうとします。ところが、「長老さまは……」と続けかけたところで言葉に詰まり、新たな懸念が心をよぎったように沈黙してしまいます。再会と安堵の余韻が残る中、森の奥にはまだ、次なる問題が潜んでいることを、あなたは静かに悟るのでした。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    </div>`,

    </div>`,

    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Little Solace，Komuxio 急急忙忙地飛到你面前，葉片般的翅膀止不住地發顫。他說，「helpful one」來得正是時候。族人當中有一位名叫 Claxio 的同伴，獨自離開了 Little Solace，獨自在森林裡遊蕩實在太危險。Komuxio 說明 Claxio 是往聚落西邊走去，懇求你在牠被森林裡的野獸吞進肚子之前，把牠找回來。你在他焦急的目光催促下，踏上 East Shroud 的林間小路，朝 Nine Ivies 的方向前進。</p>
      <p>依照 Komuxio 指示，你在 Nine Ivies 的樹林間搜尋，終於找到了 Claxio。當你轉述 Komuxio 的擔心，Claxio 卻只是冷冷地笑，並不想理會。牠說自己已經厭倦了和「不是這些孩子」的族群一起生活，也厭倦看見同胞凡事都依賴 walking ones。對 Claxio 來說，那樣的依賴和去召喚 primal 的那一派並沒有什麼不同，因此才會選擇離開 Little Solace。牠原本覺得這片森林很適合蓋一個新家，卻被「meddling one」找上門，只得往更深處逃去。Claxio 明確宣告不允許你繼續跟來，說完便轉身鑽入樹影之中。你無法再追，只能先回到 Little Solace。</p>
      <p>回到 Little Solace 之後，Komuxio 聽說 Claxio 不肯回來，還更深入森林時，整個人都僵住了。他剛在林中看到有 touched ones 出沒，語氣因而更加慌亂，拜託你趕快追上去。為了讓你能順利追蹤，他要你留意散落在森林地面上的紗線線軸，那些線索一定會把你帶到 Claxio 身邊。在他急切不安的心情推著你前進之下，你順著線軸留下的痕跡一路向北西方前進，來到荊棘叢生的 The Bramble Patch。若不在 touched ones 下手之前趕到，Claxio 就有可能再也回不了家。</p>
      <p>在 The Bramble Patch 的深處，你再度和 Claxio 正面相遇。牠一看到你這個「meddling one」，立刻全身繃緊，大聲要你滾開，說自己絕對不會回到 Little Solace。然而話還沒說完，其他 sylph 已經從暗處現身──那些都是被 Ramuh 影響、已經被帶走意志的 touched ones。他們一邊靠近，一邊勸 Claxio 跟他們一起去侍奉 primal。Claxio 驚慌地喊著自己是「good one」，絕不會跟「bad ones」走。這時 Papalymo 出面提醒你要提高警覺，說眼前這些 sylph 已經被 primal Ramuh 所支配，就像被 Ifrit 迷惑的 Amalj’aa 一樣，現在只為侍奉自己信奉的神而活。Yda 神情嚴肅地補充，這種狀態下，言語已經無法傳達，只能用武力阻止──她對此毫無快感，卻也知道別無選擇。隨著 touched ones 呼喚更多「朋友」，一隻散發駭人惡臭的 morbol 從森林中爬出來，讓 Claxio 嚇得大叫，說那股「臭味」會把牠薰得頭昏眼花。Yda 和 Papalymo 決定去牽制這頭怪物，要你專心對付那些 sylph。你在刺鼻的臭氣中拔出武器，踏入這場纏繞著荊棘與瘴氣的戰鬥。</p>
      <p>戰鬥結束後，敵人全數倒下，Claxio 渾身發抖，難以相信自己還活著。Komuxio 連忙飛到牠身邊，用發顫的聲音確認 Claxio 是否平安，意識是否清醒。看到 Komuxio 和你同時站在眼前，Claxio 愣住了，不解為什麼你們兩個會來到這裡。Komuxio 很自然地回答，是你和他一起來救 Claxio 的。明知道有 touched ones 和 morbol 這樣的威脅，卻仍然願意深入森林，只為了帶自己回去──這個事實動搖了 Claxio 一直以來的固執。牠向 Komuxio 道歉，承認自己其實並不是真的想逃離 Little Solace，只是因為害怕。看著住在 Little Solace 的同伴們漸漸和其他 ones 變得親近，Claxio 一度擔心大家會忘記自己是「這些孩子」，最後變得像 touched ones 那樣。如今親眼見到你們冒險相救，牠明白那只是一場被恐懼放大的誤解。Claxio 轉向你這位「helpful one」，真心表達感謝，並表示會跟 Komuxio 一起回到 Little Solace，和那些 friendly ones 再次生活在一起。</p>
      <p>當你們一行人再度回到 Little Solace，Komuxio 坦言，自己曾以為 Claxio 可能再也回不來了。如今多虧你出手相救，Claxio 安然無恙，他們終於可以像家人一樣重新團聚。Komuxio 說，他過去也見過許多 walking ones，當中不乏溫柔的人，但你是其中最溫柔、也最強大的一位，對這些 sylph 來說是真正的英雄。他深信，有你在，這些 ones 和 walking ones 一定能越走越近。於是 Komuxio 表示想帶你去見 elder one，讓你與長老直接相會。然而話說到「elder one 是……」時，他的聲音忽然停住，似乎又想起新的憂慮。重逢與安心的餘韻還在 Little Solace 的空氣裡迴盪，而你也隱約感覺到，在這片森林的深處，還有下一個等待你解決的課題。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
