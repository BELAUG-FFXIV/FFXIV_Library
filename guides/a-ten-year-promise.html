<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`A Ten-year Promise`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Jude tells you that before moving any further, there is something he must settle with Jeromere. Ever since joining the Studium, he says, he has never had the chance to truly speak with him about what happened. Too many questions have remained unanswered for too long—why Jeromere refuses to speak of the vow they made ten years ago, and why he has tried so insistently to make Jude abandon his studies. For a long time, Jude admits, fear kept him from confronting any of it. He was afraid that if Jeromere had truly lost interest in astronomy, then perhaps nothing remained between them. But now, after everything the two of you have gone through while working toward the starlens, he says he is finally ready to face that fear.</p><p>He asks you to find Jeromere and speak to him in his place, because he is certain Jeromere would evade him if he were asked directly. Jude says he will go ahead to the place in Tranquility where the two of them once encountered the Azure Star, and wait there. When you track Jeromere down, however, you first end up caught by one of his companions, a self-satisfied student who agrees to point you in Jeromere’s direction only if you do him a favor. Nursing his bruised pride after being rejected by a girl, he declares that what he needs to restore his image is a refined set of writing utensils and insists that you craft them for him.</p><p>With another student unhappily supplying the materials to settle an old debt, you complete the task and deliver the utensils. Their owner is delighted, convinced that with such an elegant set in hand, his poetry will at last rise above that of the average club member and force the girl to rethink her decision. Only then does he tell you that Jeromere should be at Scholar’s Harbor around this time. As the others grumble and speculate that Jeromere may be hiding something about the faculty he transferred from, you leave at once and find him there.</p><p>When you tell Jeromere that you need to speak with him about Jude, he immediately understands the matter is serious enough to hear out. He agrees to come to Tranquility, and there, before the place where they once shared their vow, Jude finally asks what he has been unable to ask for years: why did Jeromere leave the Faculty of Astronomy? Jude reminds him that ten years ago, at this very spot, they swore they would search for the Azure Star together. If that promise mattered so much, why did Jeromere turn away from it now? Has he come to hate astronomy?</p><p>Jeromere denies it at once. He says that finding that star once meant everything to him. He explains that he entered the Faculty of Astronomy before Jude did and kept quiet about it because he wanted to make progress toward their dream first, then surprise him. After learning that members were free to use the telescope, he devoted himself completely to the search, spending month after month sweeping every corner of the sky. Yet he never found even the faintest sign of the Azure Star. Refusing to surrender, he pushed further, secured permission to use the finest equipment in the Studium, and tried again with all the effort and planning he could muster. Even then, he found nothing. At last, he says, he was forced to accept a brutal conclusion: the Azure Star does not exist. It never did. Just as the scholars had told them long ago, they must have imagined it.</p><p>The words strike Jude hard. Shaken, he asks why Jeromere never told him sooner. Jeromere answers that the star meant as much to Jude as it did to him, and he could not bring himself to say it. Jude is left staring into the emptiness that follows, unable to understand what his life has been moving toward if the Azure Star was never real. Jeromere tells him that forgetting will take time, but it can be done, and asks him never to forget one thing: no matter what happens, he will always remain Jude’s friend and ally. When Jude says that without the Azure Star his life feels meaningless, you tell him that only he can decide what gives his life purpose. That answer reaches him. He realizes that leaving the course of his life to someone or something else would be the easy path, and that he alone must decide what is right for him. With that, he says there is something he wishes to investigate, returns with you, and resolves to continue. Even if the road ahead is dark and uncertain, he refuses to give up on a dream he has pursued for ten years. And with you beside him, he dares to believe he may yet carry the search farther than Jeromere ever could.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Jude <small class="muted">(Old Sharlayan, X:5.3 Y:7.9)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="one-step-forward.html">One Step Forward</a></div><div class="row">CRP, LTW, WVR Lv. 85</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="an-astronomical-growth.html">An Astronomical Growth</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'10年前の約束',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ジュードは、先へ進む前にどうしても確かめなければならないことがあるのだと、あなたに打ち明ける。それはジェロメールのことだった。魔法大学に入ってから今日に至るまで、彼ときちんと向き合って話す機会がなかったという。十年前に交わした誓いのことをなぜ彼は語ろうとしないのか。なぜあれほどまでに、自分へ学業を諦めるよう強く迫ってきたのか。聞きたいことは山ほどあった。それでも長いあいだ、向き合うのが怖かったのだと彼は言う。もしジェロメールが本当に天文学への興味を失っていたのなら、ふたりのあいだには何も残っていないのではないか――そう思っていたのだ。だが、あなたとともに星見鏡を追い続けてきた今なら、その恐れにも正面から向き合えると、ジュードは静かに決意を口にする。</p><p>彼は、かつてふたりで「蒼の星」と出会ったトランキリティのあの場所で、ジェロメールに約束のことを問いただすつもりだと話す。けれど自分から呼び出せば、きっとまたうまく言い逃れて避けられてしまう。そう考えたジュードは、代わりにあなたからジェロメールへ声をかけてほしいと頼み、自分は先にトランキリティへ向かって待つことにする。あなたがジェロメールを探しに向かうと、まずは彼の友人たちのもとへ行き着く。そこで、いかにも自信満々な学生が、ジェロメールの居場所を教える代わりにひとつ頼みごとをしてくる。数日前に想いを寄せた相手に振られてしまったらしく、その失地を挽回するには上品な筆記具が必要なのだと言い張り、あなたへ製作を求める。</p><p>隣の学生が借金の精算代わりに渋々材料を差し出すなか、あなたは頼まれた筆記具を作り上げて渡す。その出来に彼はすっかり満足し、これほど見事な品があれば、自分の詩は並の会員をはるかに超えるものとなり、相手も自分を振った判断をきっと考え直すはずだと意気込む。そうしてようやく、ジェロメールならこの時間、学士港にいるはずだと教えてくれる。まわりでは、彼が以前いた学部について何かを隠しているのではないかという声も上がるが、あなたは急いでその場を後にし、学士港でジェロメールを見つける。</p><p>あなたがジュードのことで話があると切り出すと、ジェロメールはその重みを察したように、話を聞くと答える。そしてトランキリティへ赴いた彼の前で、ジュードは長いあいだ胸に抱えてきた問いをついに口にする。なぜ天文学部を辞めたのか。十年前、この場所でふたりは「蒼の星」を一緒に探し出そうと誓い合った。それほど大切な約束だったはずなのに、なぜ今になって背を向けたのか。天文学が嫌いになってしまったのか。ジュードの問いは、ずっと閉じ込められていた思いそのものだった。</p><p>だがジェロメールは、天文学を嫌ったことなど一度もないと即座に否定する。あの星を見つけることは、自分にとってもすべてだったのだと語る。彼はジュードよりひと夏早く魔法大学へ入り、先に自分が目標へ近づいてから驚かせようと、そのことをあえて伏せていた。部員が自由に望遠鏡を使えると知ると、彼は余暇のすべてをその調査へ注ぎ込んだ。何か月ものあいだ、来る日も来る日も空の隅々まで観測し続けたが、「蒼の星」はついに見つからなかった。それでも諦めきれず、もっと強力な望遠鏡が必要なのだと考え、教授たちと交渉を重ねて、魔法大学でもっとも優れた観測機材の使用許可まで得た。だが、どれだけ力を尽くしても、夜空のどこにもその星の輝きはなかった。そうして彼はついに、あまりにも残酷な結論を受け入れざるを得なくなったのだという。「蒼の星」は存在しない。最初からなかった。あのころ学者たちに言われた通り、自分たちの見間違いだったのだと。</p><p>その言葉は、ジュードの心を深く揺さぶる。信じて追い続けてきたものが存在しなかったのだと知り、彼は、なぜもっと早く教えてくれなかったのかと問う。ジェロメールは、あの星が自分と同じくらいジュードにとっても大切だったからこそ、どうしても言えなかったのだと答える。もし「蒼の星」が存在しないのなら、自分はこれまで何を目指して生きてきたのか。ジュードはその空白に立ち尽くしてしまう。ジェロメールは、忘れるには時間がかかるだろうが、きっとできると告げ、そして何があっても自分はこれからもジュードの友であり味方であり続けるのだと約束する。生きる意味まで失ってしまったように戸惑うジュードへ、あなたは、その意味を決められるのはほかの誰でもなく彼自身だけだと伝える。その言葉を受けて、ジュードはようやく、自分の人生の行き先を何かや誰かに委ねるのは、ただ楽な道を選ぶことなのだと悟る。何が正しいかを決めるのは自分しかいない。その気づきを胸に、彼は確かめたいことがあると告げてあなたとともに戻り、たとえ前途が星なき夜空のように暗く不確かでも、この十年追い続けてきた夢を簡単に手放すつもりはないと、あらためて歩み出す。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ジュード <small class="muted">（オールド・シャーレアン, X:4.1 Y:9.1）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="one-step-forward.html">小さな一歩</a></div><div class="row">木工師、革細工師、裁縫師 Lv 85～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="an-astronomical-growth.html">ジュードの成長</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'十年前許下的約定',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Jude 告訴你，在繼續往前之前，還有一件事是他無論如何都想先弄清楚的，而那件事和 Jeromere 有關。自從進入 Studium 之後，他始終沒有機會真正和 Jeromere 好好談一談。有太多話卡在心裡太久了，為什麼 Jeromere 不肯提起兩人十年前立下的誓言，又為什麼那樣執著地想讓他放棄自己的研究。Jude 坦白，過去很長一段時間裡，他根本不敢去問。他害怕如果 Jeromere 真的已經對天文失去了興趣，那麼兩人之間也許早就沒有任何共同之處了。但如今，經過你一路陪著他走過這段 starlens（一種正在研製中的觀星裝置）之旅，他終於覺得自己有勇氣正面面對這份恐懼。</p><p>他說，自己打算在 Tranquility 那個與 Jeromere 一起遇見 Azure Star 的地方，親口問清楚當年的約定究竟變成了什麼模樣。只是他也很確定，如果由自己開口邀約，Jeromere 一定又會找藉口避開。因此，他請你代替他去找 Jeromere，自己則先前往 Tranquility 等你們。可當你循線去找人時，最先遇上的卻是 Jeromere 那群朋友。其中一名看起來自信過頭的學生答應替你指出 Jeromere 的去向，但條件是你得先幫他一個忙。原來他前幾天向一名女孩示好卻遭到拒絕，現在便一口咬定，只要擁有一套體面的書寫用具，就能重新挽回自己的風采，因此硬是請你替他製作。</p><p>在旁邊那名學生滿腹不情願地拿出材料、想趕快清償欠債的情況下，你還是把那套書寫用具做好並交給了對方。那名學生立刻喜形於色，深信只要有了這樣一套講究的用具，自己寫出的詩一定能遠遠凌駕其他詩會成員，也一定能讓那名女孩重新後悔當初的決定。直到這時，他才終於告訴你，Jeromere 這個時間多半會在 Scholar’s Harbor。旁邊的人仍在小聲猜測，覺得 Jeromere 對自己從前待過的學部似乎隱瞞了什麼，但你沒有多停留，而是立刻趕往那裡。</p><p>當你見到 Jeromere，並告訴他你是為了 Jude 的事情而來時，他很快便意識到這不是一句輕描淡寫就能帶過去的事，於是答應和你談談。等他來到 Tranquility，Jude 也終於當著他的面，把埋在心裡多年的疑問說出口：為什麼要離開 Faculty of Astronomy？十年前，就在這個地方，他們曾一起發誓，要共同尋找 Azure Star。既然那個約定曾經那麼重要，Jeromere 為什麼如今卻親手背離了它？難道他已經厭惡天文了嗎？</p><p>Jeromere 立刻否認，說自己從來沒有厭惡過天文。對他而言，找到那顆星同樣曾是最重要的事。他告訴 Jude，自己比他早一個夏天進入 Studium，之所以一直沒有說出口，只是因為想先在共同的夢想上取得一些進展，等 Jude 入學後再給他一個驚喜。當他得知成員可以自由使用望遠鏡時，便把所有空餘時間都投入調查之中，整整幾個月來，每一天都不曾間斷地用望遠鏡掃視夜空的每一個角落。可是無論怎麼找，他都沒有看見 Azure Star 的半點痕跡。即使如此，他仍不肯放棄，轉而認為也許只是需要更強大的觀測設備，於是花了很大力氣和教授們交涉，最終獲准使用 Studium 最優秀的器材。可是，無論他怎麼努力、怎麼規劃，夜空之中始終沒有那顆星的絲毫光芒。到了最後，他不得不接受一個殘酷得幾乎無法承受的結論：Azure Star 並不存在，從來就不曾存在。就像當年那些學者說的一樣，那只不過是他們自己看見的幻象。</p><p>這番話讓 Jude 受到極大打擊。他怔住了，難以接受自己追尋多年的東西竟然可能從頭到尾都不存在，於是顫聲問 Jeromere，既然如此，為什麼不更早告訴他。Jeromere 的回答很簡單，卻也最沉重：因為那顆星對 Jude 而言，和對他自己一樣重要，他無法親口把這件事說出來。如果 Azure Star 根本不存在，那麼自己這一路以來到底是在朝什麼前進？Jude 一時之間幾乎失去了立足之地。Jeromere 告訴他，要把這件事放下或許需要時間，但總有一天做得到；而無論如何，他都永遠會是 Jude 的朋友，也是站在他身邊的人。當 Jude 茫然地說，若沒有 Azure Star 為自己指引方向與意義，他的人生便像失去了價值時，你告訴他，能賦予自己人生意義的人，終究只有他自己。這句話終於讓 Jude 清醒過來。他明白，把自己的人生道路交給某個人或某個目標來決定，其實只是選擇了比較容易的做法；真正能決定什麼才是適合自己的，始終只有自己。於是他和你一起回去，說自己還有一件事想查明。即使前方的路像沒有星光的夜空那樣黑暗又難以看清，他也不打算就這樣放棄追了十年的夢想。而現在，有你在身邊，他終於敢相信，也許自己仍能把 Jeromere 未竟的追尋繼續走下去。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Jude <small class="muted">(舊薩雷安, X:4.1 Y:9.1)</small></div></div>`,

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
