    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Standing at the foot of Worqor Zormor, you finally feel the mountain’s true scale pressing down on you. Krile admits that nothing makes a peak feel larger than facing it from below, while Erenville warns that he can’t guide you much farther—there’s scarcely any reliable writing about this sacred mountain even in Tuliyollal, aside from whimsical poetry. Alphinaud refreshes Wuk Lamat with a restorative spell, yet even the indomitable Third Promise is visibly feeling the strain, and Alisaie mutters that if Bakool Ja Ja shows his face on the way up, you still owe him for what he pulled in Kozama’uka.</p><p>Before you can take another step, a towering Yok Huy named Vorporlor confronts you at the base, speaking in the old tongue so thick even Erenville struggles to catch every word. Vorporlor switches to your language only “for your benefit,” confirms you are a claimant in the rite of succession, and coldly points out that if you die, Tuliyollal loses a potential ruler. Wuk Lamat bristles at the darkness of it—and immediately senses this giant does not share the gentler outlook of those you met in the village.</p><p>Vorporlor makes his contempt plain: he and his brethren, he says, will not grovel before Gulool Ja Ja like “lapdogs.” They are conquerors, and they intend to restore the Yok Huy as Tural’s overlords—starting with the death of the Third Promise. Alphinaud notes, grimly, that even the giants have factions. Wuk Lamat answers without flinching: it isn’t her father they follow, but the peace he proved could be found right here, in this land and life they abandoned when they chased conquest. Vorporlor rejects it as cowardly justification, declares his people’s glory must be reclaimed, and demands Wuk Lamat die on her knees.</p><p>The mountain answers his threat with chaos of its own—predators swarm in, and Vorporlor shouts them down as opportunistic vermin trying to feast on his people. In the scramble, you watch Wuk Lamat move before she even thinks, throwing herself into the fight beside those who moments ago meant to kill her. When Vorporlor demands to know why she helps, she can only give the truth: she feared he would die before you ever had the chance to know one another—before she could learn more about his people. And if you are to share the land, she says, the best way is to become friends.</p><p>When the danger passes, Alphinaud confirms Vorporlor’s comrade will live, though not yet walk on his own. Wuk Lamat asks Alphinaud to stay behind and tend to the wounded while the rest of you press on toward the summit where Gurfurlur waits. Vorporlor refuses to abandon conquest, but Wuk Lamat answers coolly that he can try to kill her later—right now he should worry about his comrade. Erenville, knowing how deadly an unknown mountain can be, tells you he will follow at a distance and trust you to lead the way.</p><p>At last, your climb delivers you to the summit grounds where High Luminary Gurfurlur appears—immense even among the Yok Huy—and names himself both leader of his people and chosen elector of the Dawnservant. He speaks of the old tragedy recorded in the murals: after disease decimated the expedition to Xak Tural, children rarely reach the giants’ former stature. Then he reveals how that same history tangled with the legend of the golden city—visions that came to many ancestors before the northern campaign, dreams of a paradise without war or famine and of lives of eternal happiness. Because dozens, even hundreds, described the same splendor, the luminaries took it as revelation, and the expedition marched to find the city of gold, scouring lands across their dominion.</p><p>Gurfurlur tests the claimants “here and now,” and once the trial is done, he declares the feat complete and grants the reward—praise for the Second Promise, and success for you and Wuk Lamat as well. Koana remarks that Bakool Ja Ja withdrew strangely quickly once you fought back in earnest, and asks why the summit of Worqor Zormor is the place chosen to conclude this feat. Gurfurlur answers by drawing your eyes to the monuments around you: this is sacred ground, where every High Luminary is enshrined, alongside the heroes who stood fast when Valigarmanda brought ruin to Urqopacha eight decades ago.</p><p>Zoraal Ja arrives, and Sareel Ja follows with polite venom, forcing Wuk Lamat to bite back her rage until Gurfurlur warns her to mind her conduct or leave. You read the inscriptions—Gulool Ja Ja, “Master of Resolve and Reason. Champion of Peace,” and names that widen the story beyond Tural: Ketenramm, navigator of uncharted oceans; Cahciua, seeker of the unknown, honored though not Yok Huy because their deed demanded recognition. Wuk Lamat falters, measuring herself against Zoraal Ja’s strength and Koana’s knowledge, until you point her back to what she carries from her father: his love for peace, and for his people. She clings to it—then a terrible roar tears through the air, and Alphinaud’s urgent voice reaches you: Valigarmanda has broken free.</p><p>You race back to Worlar’s Echo to a village thick with fire-aspected aether and wounded giants. Krile steadies trembling hands with healing, Erenville presses a Sharlayan restorative potion into someone’s grip, and even as Urianger warns that the escape is dire, you are forced to triage those caught in the conflagration. Alphinaud meets you amid the chaos and admits he arrived to investigate a sudden surge of aether only to find fallen giants everywhere. There will be explanations later—right now, you catch your breath, then do what you can to help treat the injured.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    langLabel:'日本語',

    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },

    story:`<div class="clamp" data-collapsed="true"><p>あなたはウォルコル・ゾルモルの麓に立った瞬間、山の本当の大きさを思い知らされる。クライルは足元に立つほど山の巨躯は際立つと言い、エレンヴィルはこの先の案内は心許ないと告げる――トゥリヨラルにも聖峰ウォルコル・ゾルモルについてまともな記述はほとんどなく、気まぐれな詩が残る程度だという。アルフィノはウクラマトに回復の術を施すが、それでも第三の誓約の足取りには疲れが滲み、アリゼーは道中でバクール・ジャジャに出くわしたら、コザマル・カでの落とし前を付けてやると吐き捨てる。</p><p>そこへヴォルポルロルが立ちはだかり、古いヨクフイの言葉であなたたちを試すように語りかける。エレンヴィルでさえ聞き取りづらい響きののち、彼は「お前たちのために」わざわざ共通語を使うと言い、王位継承の儀の候補者かと確認する。そして、もしあなたたちが死ねばトゥリヨラルは未来の統治者を失うのだと、冷ややかに突きつける。ウクラマトはその物言いに反発し、彼が村で会った穏やかなヨクフイとは違うと直感する。</p><p>ヴォルポルロルは臆面もなく宣言する。自分たちはグルージャジャに媚びる恥知らずの犬どもではなく、征服者であり、トゥラルの覇者として本来の地位を取り戻すのだと。その第一歩が第三の誓約の死だと言い放つ。アルフィノは、巨人にも派閥があるらしいと眉をひそめる。ウクラマトは怯まずに返す――彼らが敬うのは父その人ではなく、父が示した「ここで手に入る平和」なのだと。だがヴォルポルロルはそれを臆病者の言い訳だと斬り捨て、千年を超えて守り続けた祖先の夢と栄光を取り戻すため、跪いて死ねと迫る。</p><p>その刹那、山の獣が雪崩れ込み、ヴォルポルロルはそれを卑しい害獣だと怒号して切り払おうとする。混乱の中であなたは、ウクラマトが考えるより先に身体を動かし、彼らを助けるように戦うのを見る。なぜ助けるのかと問われ、ウクラマトはうまく言葉にできないまま、知り合う前に死なせたくなかった、もっと相手を知りたかったのだと告げる。そして同じ土地を分かち合うなら、友になるのが一番だと、まっすぐに言い切る。</p><p>戦いが収まると、アルフィノは負傷者は助かるが、まだ自力では歩けないと伝える。ウクラマトはアルフィノに手当てを任せ、自分たちはグルフルルが待つ山頂へ進むと決める。ヴォルポルロルは征服の意思を捨てないと言い張るが、ウクラマトは今は仲間を案じろと言い置き、エレンヴィルは未知の山には未知の脅威がいるだろうと警戒しつつ、あなたに先導を託して距離を取りながら付いていくと告げる。</p><p>やがてあなたは山頂の地へ辿り着き、ハイルミナリーのグルフルルが姿を現す。彼は自らをヨクフイの長であり、暁王に選ばれた選定者だと名乗る。そして壁画に刻まれた悲劇――北方遠征を病が壊滅させ、かつての巨躯に届く子が稀になったこと――が、黄金郷の伝承とも絡み合っていると語る。遠征に先立ち、多くの祖先が同じ夢を見たのだという。戦も飢えもない楽園、永遠の幸福を謳うまばゆい都――一人なら幻想で片づけられても、幾十、幾百が同じ夢を語ったため、彼らは神託だと信じ、黄金郷を求めて広大な領域を捜索したのだと。</p><p>そしてグルフルルは「ここで」試すと言い、試練の果てに墓之試煉の成功を認め、あなたとウクラマト、そして第二の誓約に報酬を与える。コーナは、バクール・ジャジャが本気で反撃された途端に退いた不可解さを語り、なぜこの頂が締めくくりの地なのかと問う。グルフルルは周囲の碑へ目を向けさせ、ここは代々のハイルミナリーと、八十年前にヴァリガルマンダの災厄へ立ち向かった英雄たちが祀られる聖地だと明かす。</p><p>ゾラージャが現れ、サレールジャが慇懃に割り込むことで緊張が走り、ウクラマトは怒りを抑えきれないが、グルフルルに戒められて言葉を呑む。あなたは碑文を読み取る――グルージャジャは「決意と理性を極めし者、平和の覇者」と刻まれ、ケテンラムやカチュアの名も並ぶ。ウクラマトは自分に残されたものを探して揺らぐが、あなたは父から受け継いだ平和への想いを指し示し、彼女はそれを掴み直す。だが直後、耳を裂く咆哮が響き渡り、アルフィノの声が届く――ヴァリガルマンダが解き放たれたのだと。</p><p>あなたはウォルラーズ・エコーへ駆け戻り、火の属性に染まったエーテルと負傷者に満ちた惨状に直面する。クライルは治癒で痛みを和らげ、エレンヴィルはシャーレアンの回復薬をゆっくり飲めと促し、ウリエンジェは脱出の重大さを口にしながらも、まずは炎禍に巻き込まれた者たちを救わねばならないと告げる。アルフィノは、急激なエーテルのうねりを調べに来た時にはすでに倒れた巨人がそこかしこにあったと言い、説明は後だとあなたに息を整えさせる。あなたは今できることとして、手当てに加わっていく。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>你站在 Worqor Zormor 的山腳下，才真正明白「山很大」是什麼意思。Krile 感嘆，只有站在它正前方時，山的規模才會把人壓得說不出話；Erenville 也坦白，過了這裡他恐怕幫不上多少忙，因為就連 Tuliyollal 也幾乎沒有記錄這座聖峰的可靠資料，除了些帶點玩笑意味的詩句。Alphinaud 對 Wuk Lamat 施了回復法術，可就連一向硬撐的第三誓約也明顯被坡度折磨得吃力；Alisaie 則咬著牙說，如果路上撞見 Bakool Ja Ja，你們還欠他一筆 Kozama’uka 的帳。</p><p>就在你們準備踏上山路時，Vorporlor 以更巨大的身影擋在前方，先用古老的 Yok Huy 語言拋出質問，連 Erenville 都只能勉強抓到片段。他隨即改用你們聽得懂的話，說這是「為了你們著想」，並確認你們是否是繼承之儀的競爭者。接著他毫不掩飾地補上一句：如果你死在這裡，Tuliyollal 就少了一個可能的統治者。Wuk Lamat 立刻覺得不對——這個 Yok Huy，和村子裡那些溫和內斂的人完全不是同一種態度。</p><p>Vorporlor 乾脆把立場攤開：他們不會像「走狗」一樣向 Gulool Ja Ja 卑躬屈膝；他和同伴才是征服者，他們要把 Yok Huy 拉回「Tural 的統治者」的位置。Alphinaud 低聲提醒你，連巨人之中也有派系。Wuk Lamat 迎著他的挑釁回應：那些 Yok Huy 敬重的不是她的爸爸本人，而是他所建立、也讓他們重新想起「其實就在這裡就能擁有」的和平。Vorporlor 卻把這些斥為懦弱的藉口，說他們背離了祖先、背離了千年不滅的夢；他要奪回榮光，而「復興」就從第三誓約的死亡開始，甚至要 Wuk Lamat 跪著去死。</p><p>混亂在下一秒爆發——山中的掠食者撲上來，Vorporlor 怒吼著斥罵那些「趁火打劫的害獸」，叫它們下來，揚言今天第一個要折斷的就是牠們的脖子。你看見 Wuk Lamat 幾乎沒有思考就衝了出去，反而在戰鬥中幫了本來要殺她的人。當 Vorporlor 質問她為什麼要幫忙時，她只能老實說：她沒想太多，腿就先動了；她只是害怕你們還來不及認識彼此、她還來不及多了解你們，對方就先死了。既然要共享這片土地，她說，最好的方式就是成為朋友。</p><p>戰局落定後，Alphinaud 確認受傷的同伴能活下來，但暫時還沒辦法靠自己行走。Wuk Lamat 立刻做出取捨：請 Alphinaud 留下照料傷者，其餘人繼續往上，去 Worqor Zormor 找等待中的 Gurfurlur。Vorporlor 仍嘴硬說這不代表他們會放棄征服，但 Wuk Lamat 只丟下一句：要殺她以後再說，現在先擔心你的同伴吧。Erenville 也提醒你，這麼大的山裡肯定還藏著連他都沒聽過的生物，他會拉開距離跟上，把帶路交給你。</p><p>你一路攀上山頂，終於見到 High Luminary Gurfurlur——他大得甚至比村裡其他 Yok Huy 還驚人，並再次自報身分：他是族人的 High Luminary，也是 Dawnservant 所選的選定者。Gurfurlur 提到牆畫記錄的那段災難：自從 Xak Tural 的遠征被疫病重創後，孩子很少能長回從前那種高度；而那段歷史也和「黃金城」的傳說糾纏在一起。因為在遠征之前，許多祖先都做了同一個夢——夢見一座閃耀奪目的樂土，沒有戰爭、沒有飢荒，人們過著永恆幸福的生活；若只是個別夢境還能被忽視，但當幾十、甚至幾百人都說出相同的景象，領導者便相信那是神啟，於是動員廣大領地的人力物力，踏上尋找黃金城的征程。</p><p>隨後 Gurfurlur 要你們「就在此刻」接受試煉，並在戰鬥後宣布墓之試煉完成，給予第二誓約與你們相應的成果。Koana 注意到 Bakool Ja Ja 明明一直挑釁，卻在你們認真反擊時又迅速撤退，覺得他的用意難以捉摸；他也問，為什麼偏偏要以 Worqor Zormor 的山頂作為這場試煉的終點。Gurfurlur 讓你們看向遍布四周的紀念碑，說這裡安奉著歷代 High Luminary，也安奉著八十年前在 Urqopacha 抵禦 Valigarmanda 帶來的災厄、死守不退的英雄。</p><p>Zoraal Ja 抵達，Sareel Ja 也跟著出現，Wuk Lamat 幾乎要失控，但被 Gurfurlur 當場喝止，只能硬把怒氣吞回去。你們讀著碑文：Gulool Ja Ja 被刻為「Head of Resolve（決意之首）與 Head of Reason（理性之首）的宗師，和平的勇者」，旁邊還有 Ketenramm 與 Cahciua 的名字——即使不是 Yok Huy，也因為功績而被破例刻進「活著的編年史」。Wuk Lamat 一度迷惘，覺得自己比不上 Zoraal Ja 的武藝，也追不上 Koana 的學識；你把她拉回她真正承接到的東西——她爸爸對和平、對人民的愛。她剛握住那份信念，下一秒，Valigarmanda 的咆哮就撕裂空氣，Alphinaud 的聲音透過聯絡急促傳來：你必須立刻回 Worlar’s Echo—Valigarmanda 已經破牢而出。</p><p>你趕回 Worlar’s Echo，只見村子裡滿是火屬性的以太與受傷的 Yok Huy。Krile 先穩住重傷者的狀況，Erenville 拿出 Sharlayan 的回復藥要人慢慢喝，Alisaie 也叮囑別亂動免得再裂開傷口；Thancred 說許多人被燒傷，幸好火勢沒能吞噬石造建築，而 Urianger 則提醒你們：就算 Valigarmanda 的逃脫再危急，此刻也必須先救被大火波及的人。Alphinaud 看到你回來，只說他趕到調查突如其來的以太暴增時，地上早已倒滿巨人；解釋可以稍後，現在先喘口氣，然後立刻加入治療與救援。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 烏克·拉瑪特 <small class="muted"> 奧闊帕恰山（X:13.2, Y:32.4)</small></div></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
