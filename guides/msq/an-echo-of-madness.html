    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You arrive to find the village choked with heat and pain. Wuk Lamat clings to the wounded and tells them to hold on—healers are coming. Krile steadies trembling breaths with quick magic, Erenville presses a Sharlayan restorative potion into burned hands and urges slow sips, and Alisaie warns you to keep people still so torn flesh doesn’t split again. Koana repeats Urianger’s grim read of the air: fire-aspected aether has soaked into the entire settlement. Thancred reports that many suffered burns, yet the flames never truly caught in the stone buildings—one small mercy. Even with Valigarmanda now loose, Urianger insists the first duty is to the victims of the conflagration, and Alphinaud sends you out to help—alert him if you find anyone unconscious, while he prioritizes the worst injuries.</p><p>Moving through the aftermath, you hear the giants’ voices through groans and ash-dry throats. One remembers only blinding red and a heat so fierce it stole all motion. Another begs you not to waste time on him—others need you more. Another can barely swallow, stunned that strangers from beyond the salt are the ones bringing relief. You keep going until Alphinaud gathers you back, confirms those you found were awake and aware, and admits the truth is still unclear. He explains that after he treated a giant attacked by a mountain bird, their leader—Vorporlor—ordered him away. Then a crushing wave of aether hit, and when he returned, Worlar’s Echo was already like this. The first delirious warning he heard was the same from every mouth: Valigarmanda had broken free.</p><p>With that, you push toward the temple. Wuk Lamat demands answers and wants eyes on the Skyruin’s prison at once. Krile can’t hide her shock—she had believed the weakening ice would still hold for years. Erenville hopes the High Luminary has returned with clearer news, while Alphinaud admits the hope that this is all a misunderstanding already feels futile. The guards let you in at the High Luminary’s command, and inside, Koana voices what the sight confirms: the ice has failed. Gurfurlur orders Zurmurwur to tell you what he told him—because the catastrophe was not an accident.</p><p>Through the Echo, you witness it: Bakool Ja Ja enters the sanctum and speaks to Valigarmanda like a tool waiting to be used. One head lays out the method with chilling precision—two spells at the same instant, a fire great enough to melt the ice and a waking flame to rekindle the sleeping vidraal’s soul—something only the Heads of Reason and Resolve could execute in perfect harmony…or the “blessed siblings,” Bakool Ja Ja. Zurmurwur tries to stop him, but it’s already done. Valigarmanda roars awake, Bakool Ja Ja even admits he may have overdone the fire, and when challenged, he answers without shame: it’s for the throne. He unleashes calamity and commands the beast to live up to its legend.</p><p>When the Echo fades, Zurmurwur tells you a messenger has been sent to Tuliyollal and the Landsguard will dispatch a contingent—but no one knows when it will arrive. Wuk Lamat snaps that this is too far even for Bakool Ja Ja, and then she makes her choice. Leaving the vidraal to others would mean massacre; some might call it “wiser” if she wants to keep pace in the rite of succession, but she refuses to rule at that cost. She will stay and fight Valigarmanda, even knowing her father could not slay it—and she turns to you, admitting you have no obligation beyond the contest, yet begging you to stand with her for Urqopacha and its people. You give her the answer she needs, and your companions refuse to abandon her. Gurfurlur orders the Pelupelu warned to flee to lower ground if they must, and the group shifts from outrage to action.</p><p>Back in the village, Krile lingers on what the Echo proved: two casters releasing fire spells at the exact same moment—something only a two-headed Mamool Ja could pull off. Alphinaud fears what Tuliyollal becomes if someone reckless enough to free the Skyruin could ever become Dawnservant, and Alisaie spits out the lie in Bakool Ja Ja’s title—there was nothing “blessed” about what he did. But fury won’t find Valigarmanda. If you’re going to stop it, you must learn where it went.</p><p>Erenville lays out the options. The reliable method is slow: compare eyewitness reports and signs of passage until the trail becomes a direction. The faster method is risky: an aether seeker, a gleaner’s tool, tuned to track a chosen aetherial aspect. Valigarmanda can shift freely between fire, ice, and lightning—but Bakool Ja Ja awakened it by quickening its fire-aspected aether, and the village’s burns suggest it burst free in a blazing discharge. So Erenville calibrates the seeker to fire, warning that without Valigarmanda’s unique signature, it will react to any living source of fire-aspected aether. Krile proposes you pursue both approaches at once, and the plan forms: you go with Erenville in case the seeker leads you into another fiery fiend, while the others stay to gather sightings and tend the Yok Huy—because if wounds from a creature like Valigarmanda suddenly worsen, someone must already be there.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>あなたが辿り着いた村は、熱と痛みに満ちていた。第三誓約の彼女は傷ついた者に必死で呼びかけ、すぐに癒やし手を呼ぶと言って離れない。仲間は魔法で痛みを和らげ、シャーレアンの回復薬を手渡してゆっくり飲むよう促し、急な動きで傷が開かぬよう注意を重ねる。案内役は、村全体に炎属性のエーテルが満ちているという報告を伝え、別の仲間は多くが火傷を負ったが石造りの建物に火が広がらなかったのは不幸中の幸いだと言う。ヴァリガルマンダの脱走が重大であっても、今は火災に巻き込まれた者を救うのが先だと、あなたは念を押される。治療役は、気絶している者を見つけたら知らせてほしいと言い、自分は重傷者を優先して癒やすから、手当てが済んだら合流しようと告げる。</p><p>あなたは焼けただれた痛みと乾いた息の間を縫って動き、呻き声から状況を拾い集める。真っ赤な光に包まれ、灼ける熱で身体が動かなくなったという者がいる。布が触れるだけで激痛だが自分は生きる、もっと危険な者へ行けと押し返す者もいる。喉の渇きが異常で、水分が奪われたようだと訴え、海の向こうから来た見知らぬ者が助けることに驚く者もいる。あなたはできる限りの応急を重ね、治療役のもとへ戻る。</p><p>治療役は、あなたが見つけた負傷者が意識を保っていたと知って安堵しつつも、何が起きたのかはまだはっきりしないと認める。山鳥に襲われた巨人を癒やした後、集落の長と名乗る者に立ち去るよう命じられ、その直後に強烈なエーテルのうねりを感じて引き返したら、村はすでにこの有様だったという。最初に駆け寄った者は痛みに朦朧としながらも、ただ同じ警告を繰り返した――ヴァリガルマンダが解き放たれた、と。あなたは、これだけでは足りないと焦る仲間の声を聞き、神殿へ向かう決意を固める。</p><p>第三誓約の彼女は、すぐにでも牢獄の様子を確かめねばならないと息巻き、クライルは「あと数年は保つ」と見込んでいた氷が崩れたことに動揺する。案内役は、ハイルミナリーが戻って情報を掴んでいることを願い、治療役は「誤解であってほしい」という希望がすでに空しいと口にする。衛兵は、ハイルミナリーの許可を得たとしてあなたを通し、あなたは中で、氷が破られた現実を目の当たりにする。ハイルミナリーは同席者に、さきほど聞いた話をあなたに伝えるよう命じる。</p><p>あなたに見えるのは、偶然ではなく意図された惨禍だった。双頭のマムージャが神聖な広間へ踏み入り、眠れる獣を「必要な日まで眠っていた」と嘲る。片方は、氷を解くには同時に二つの術が要ると言い切る――氷を溶かすほどの大火と、眠る魂を目覚めさせる起炎の炎。それを寸分違わず重ねられるのは「理性の首」と「決意の首」だけ……あるいは「受祝福の兄弟」である双頭の自分たちだと。止めようとする声を遮って術は放たれ、ヴァリガルマンダは咆哮して目覚める。炎が強すぎたかもしれないと笑い、すべては玉座のためだと言い放ち、伝説どおりに災厄を振りまけと命じる。</p><p>話が終わると、援軍要請はすでに送られたが到着は読めないと告げられる。第三誓約の彼女は、この暴挙はもはや許されないと怒りを露わにし、それでも目の前の選択から逃げない。獣を他人任せにすれば虐殺になる。継承の儀で遅れを取らぬために先を急ぐ者もいるだろうが、自分はそんな代償で王になれないと言い切り、ヴァリガルマンダと戦うと宣言する。父でさえ討てなかった相手に一人では勝てないと認めつつ、あなたに、ウルコパチャと人々のために共に戦ってほしいと願い出る。あなたが応えると、仲間もまた見捨てないと口を揃え、危険を伝えるべき者へ伝えよという指示が飛ぶ。</p><p>村へ戻ったあなたは、同時に炎の術を放つなど双頭のマムージャにしか不可能だという推論を聞き、スカイルインを解き放つほど無謀な者が頂に就けばどうなるのかという懸念を共有する。怒りは確かでも、まず獣の行方を掴まねばならない。案内役は、目撃情報と痕跡を突き合わせる確実だが遅い方法と、早いが誤認しやすい手段を示す。後者はグリーナーの道具、エーテルを探知する装置で、炎属性へ合わせれば速く追えるかもしれない。ただし固有の波長を事前に入れられない以上、炎属性の生き物すべてに反応する。あなたは、確実さと速度の両方を同時に追う策に頷き、案内役と行動を共にして誤認の危険に備え、他の仲間は村に残って目撃情報を集め、負傷者の容体悪化にも即応できるよう備える。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>你們趕回村落時，迎面而來的是灼人的熱浪與滿地傷患。Wuk Lamat 一邊扶著人、一邊要對方撐住，說很快就會有治療者過來。Krile 立刻用魔法穩住傷勢，讓對方先休息一會兒就能站起來；Erenville 拿出 Sharlayan 的回復藥水，叫人慢慢喝；Alisaie 則提醒別亂動，免得牽動傷口又裂開。Koana 轉述 Urianger 的判斷：整個村子都被火屬性以太浸透，必定發生了極不尋常的事。Thancred 說許多村民都燒傷了，但火勢沒能在石造建物上延燒——至少還留下一點點不幸中的大幸。就算 Valigarmanda 脫逃再怎麼危急，Urianger 也要求你們先照顧被大火波及的人。Alphinaud 要你一起分頭救治：若看到有人因傷昏迷，立刻通知他；其他情況下，他會先處理最需要緊急治療的人，之後再回到剛剛談話的地方集合。</p><p>你穿梭在痛苦的呻吟與焦灼的氣息之間，從每一句斷續的話拼湊出災厄的輪廓。有人說自己只記得一片刺眼的赤紅與撕裂全身的高熱，熱到連動都動不了；有人痛得發顫，卻仍要你別浪費時間在他身上，因為還有更危急的人等著；也有人明明傷勢不算重，卻乾渴得像是全身水分都被抽空，甚至低聲感嘆——竟然是跨越海鹽而來的陌生人，在替他們止住這場苦難。</p><p>等你們盡可能讓傷患安穩下來，Alphinaud 才回到集合點，確認你找到的傷者都還清醒，隨即也承認細節仍不明朗。他說自己先前治好了那個被山鳥襲擊的巨人，卻被一位似乎是首領的巨人（他記得名叫 Vorporlor）要求離開；就在那之後，他感到一股強烈的以太浪潮，立刻折返，卻看到 Worlar’s Echo 已成這副模樣。他衝向第一個看見的巨人，對方痛得神智不清，卻反覆警告同一句話：Valigarmanda 已經掙脫了。你們明白光靠這些還不夠，但至少知道下一步只能更快。</p><p>Wuk Lamat 說一定要弄清楚到底發生了什麼，並主張立刻去找神殿守衛，確認 Skyruin（天墜，Valigarmanda 的稱號）的牢獄出了什麼事。Krile 仍難以相信——她明明感覺牢獄正在衰弱，卻認定至少還能撐上幾年。Erenville 希望 High Luminary 已經回來，能帶回更多消息；Alphinaud 則低聲說，他也想相信這只是誤會，但眼前的狀況讓那點希望顯得太過蒼白。守衛傳話：High Luminary 允許你們進入，並在神殿內等候。</p><p>你踏進 Karryorzar the Gracious 的那一刻，答案就不再需要猜測。Koana 看著眼前的景象，只能說出一句：冰封確實崩壞了。High Luminary Gurfurlur 命令 Zurmurwur 把他剛才聽到的一切原封不動告訴你，而你也在 Echo 裡親眼看見那段引爆災厄的來訪：Bakool Ja Ja 走進聖所，像在欣賞一件等著派上用場的武器，稱 Valigarmanda 是令人恐懼的怪物，每次甦醒都會把毀滅的名字刻進新一代的記憶。接著他毫不掩飾自己的目的——他要這場「恐怖」正好醒在他需要的那一天。</p><p>你聽見 Bakool Ja Ja 的另一個聲音把方法說得清清楚楚：要解開那個由 Gulool Ja Ja 引發失控魔法而形成的冰之牢獄，必須在同一瞬間施放兩個法術——足以融冰的大火，以及喚醒火焰、重新點燃沉睡靈魂的「覺醒之炎」。能做到如此同步的，只有 Head of Reason（理性之首）與 Head of Resolve（決意之首）……以及他口中的「受祝福的兄弟」——也就是雙頭的 Bakool Ja Ja。Zurmu rwur 想阻止，但一切已經來不及；Valigarmanda 在怒吼中甦醒，Bakool Ja Ja 還若無其事地說火可能放得太猛了。當被質問為何要做這種事，他只回一句：為了王座，然後命令 Valigarmanda 盡情肆虐，讓傳說成真。</p><p>Echo 結束後，Zurmurwur 說他們已派人回 Tuliyollal 求援，Landsguard 一定會派隊伍來，但沒人能保證何時抵達。Wuk Lamat 氣到發抖，說這已經超出 Bakool Ja Ja 再怎麼胡來都不該跨過的底線。她也立刻做出選擇：如果把這頭 tural vidraal（Yok Tural 對長命異獸的稱呼）交給別人處理，那只會是一場屠殺。也許有人會說，為了不在繼承競爭裡落後，繼續往前跑才是「比較聰明」的做法，但她不可能用那種代價去爭王位——支持她的人，也值得更好的統治者。她說自己會留下來與 Valigarmanda 開戰，哪怕那是連她爸爸都沒能殺死的敵人；她知道自己單打獨鬥不可能贏，但仍請求你為了 Urqopacha 與那裡的人們加入這場戰鬥。你答應的那一刻，其他人也表態不會拋下她；Gurfurlur 進一步命令立刻通知 Pelupelu，必要時撤往低地避難。</p><p>回到村中，你們把剛才看到的「同步施法」重新拆解：兩名施法者必須在同一瞬間釋放火焰，這幾乎只有雙頭的 Mamool Ja 才做得到。Erenville 一邊抱怨自己答應當向導時可沒包含追蹤古老可怕的 tural vidraal（Yok Tural 對長命異獸的稱呼），一邊也承認無論如何都不能放任 Valigarmanda 在外肆虐。Alphinaud 更擔心：如果連 Skyruin（天墜，Valigarmanda 的稱號）都敢放出來的人最後成了 Dawnservant，Tuliyollal 會變成什麼樣子？Alisaie 則直接撕碎「受祝福」這個說法——Bakool Ja Ja 那種人渣，哪裡配得上這個稱呼。</p><p>但要阻止災厄，憤怒不夠，你們得先找到 Valigarmanda 去哪了。Erenville 提出兩條路：最可靠的是慢慢比對目擊與路徑痕跡；更快的則是用 gleaner 的工具——以太探測器，能追蹤活物的以太特徵。他可以把探測器校準到特定屬性，可 Valigarmanda 能在火、冰、雷之間自由轉換，最難的是要挑對「現在的它」。Alphinaud 指出你們已知的關鍵：Bakool Ja Ja 是用加速「火屬性以太」的法術把它從冰封中喚醒，而村民幾乎一致受了燒傷，合理推斷它脫困時釋放了猛烈的火焰衝擊。於是 Erenville 把探測器改追火屬性以太，但也警告缺陷：因為事前無法輸入 Valigarmanda 的獨特以太特徵，探測器會對任何活著的火屬性以太來源產生反應。Krile 提議兩條路同時進行：你跟著 Erenville 行動，避免探測器把你們帶去別的「火焰怪物」；其餘人留在村裡訪問目擊者、比對 Skyruin（天墜，Valigarmanda 的稱號）的行蹤，同時由 Alphinaud 就近照看 Yok Huy——因為被 Valigarmanda 這種怪物所傷的傷口，隨時可能惡化，你們必須做好萬全準備。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 阿爾菲諾 <small class="muted"> 奧闊帕恰山（X:29.5, Y:33.7)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-high-luminary.html">祭司長固伏魯</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.93</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="pointing-the-way.html">追蹤！乙太指向器</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4Kw4CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
