const i18n={
  EN:{

    pageTitle:'Drowned Vestiges',
    tabs:{story:'Story',acq:'Acquisition',unlockq:'Unlock Quest',followq:'Follow-Up Quest',comments:'Comments'},
    readMore:'Show more',readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Wuk Lamat tells you she only caught sight of Gulool Ja for a heartbeat before he vanished behind a building, but she’s certain he was heading farther south. She uses her linkpearl to call Alisaie and asks her to join you, then leads you into the area where the broken canals and scattered debris make it difficult to see ahead.</p><p>To cover more ground, you split up. You head down into the canals while Wuk Lamat searches the streets, and you agree that when you find Gulool Ja, you’ll keep your distance and watch him until he reaches his destination—better not to startle him and risk an accident in the ruins.</p><p>Moving quietly, you follow Gulool Ja from afar, careful not to let him notice you or to fall behind. He keeps going longer than you’d expect on such short legs, and when he finally slows, it becomes clear he’s been checking on little ones—still trying to look after them even while he’s alone.</p><p>Before you can step closer, an ancient-looking sentry blocks the way and warns you not to come any nearer. Alisaie urges Gulool Ja to run, and the rusty mechanical soldier demands to know who you are and what you want. Wuk Lamat introduces herself and says she only wants to talk, but Gulool Ja hesitates—he overheard her earlier and believes she intends to kill his father. The soldier immediately brands you villains and declares he’ll deal with you, until Gulool Ja pushes through his fear and admits he wants to get to know her too. At his request, the sentry steps aside.</p><p>Wuk Lamat, relieved, tries to lighten the moment and asks who this articulate, ancient machine is. Gulool Ja explains that Otis is his friend—the one who came to him when he was hungry and sad, who cooks for him and teaches him all kinds of things, even how to read and write and how not to be noticed by dangerous creatures. Otis then properly introduces himself: Ser Otis Velona, lord captain of the royal knights of Alexandria. The claim shocks Wuk Lamat, and when you press him about how long he has been functioning and why he seems unlike other machines, he chuckles and says he’ll indulge the questions—after you share a meal.</p><p>Wuk Lamat would rather talk somewhere safer, but Gulool Ja’s hunger makes her relent, and Alisaie can already see Wuk Lamat is ready to spoil her nephew. She sends word to Erenville so the others stop worrying, while Otis asks for your help gathering ingredients, insisting the best meals are the ones friends make together.</p><p>Otis assigns tasks with brisk cheer. Wuk Lamat and Gulool Ja will speak to the folk on the outskirts for yam and pumpkin—Gulool Ja even promises to ask for the castoffs, as usual. You and Alisaie will procure meat from the woolback grazing on the slopes outside town, since beef is scarce and the younger ones make a tender, less gamey substitute. Alisaie turns it into a contest on the spot—whoever delivers the meat first wins—and you head out, sense danger nearby, and return sooner than she expects with a fine cut in hand. Otis stares, delighted and impressed, praising your skill and joking that four hundred years ago, he would have recruited you into the royal knights.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    tabs:{story:'ストーリー',acq:'入手方法',unlockq:'開放クエスト',followq:'後続クエスト',comments:'コメント'},
    readMore:'全文を表示',readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>彼女は、少年の姿をほんの一瞬だけ見たものの建物の陰へ消えてしまったとあなたに告げる。それでも南へ向かったのは間違いないと言い、連絡用の道具で赤髪の少女に合流を頼んだあと、運河と瓦礫が視界を遮る一帯へあなたを導く。</p><p>捜索を急ぐため、あなたは手分けする。あなたは運河側へ入り、彼女は通りを進む。そして見つけたら、すぐに声をかけず遠くから様子を見守り、少年が目的地へ着くまで追うことにする――驚かせて転んだりすれば取り返しがつかないからだ。</p><p>あなたは気配を消し、距離を保ったまま少年を追う。短い足で随分と先まで歩いていく姿に胸がざわつき、やがて彼が立ち止まった先で、彼が小さな子たちの様子を見に来ていたのだと気づく。ひとりでいても、誰かを気にかけずにはいられないのだ。</p><p>だが近づこうとした瞬間、錆びついた機械の兵が立ちはだかり、「これ以上は一歩も進むな」とあなたたちを制する。赤髪の少女は少年に逃げるよう叫び、機械の兵は「少年を知っているのか、何者だ」と詰問する。彼女は名乗り、ただ話がしたいだけだと謝るが、少年は怯えながらも言う――自分は聞いてしまった、彼女は父を殺すと言っていた、と。機械の兵はあなたたちを悪党と断じて排除しようとするが、少年は踏みとどまり、震える声で「それでも知りたい」と告げる。少年の望みを受け、機械の兵は道を譲る。</p><p>安堵した彼女は、今度はその「古びていて妙に雄弁な機械」について問いかける。少年は、その機械が自分の友であり、空腹で悲しかった時に世話をしてくれたこと、料理を作り、読み書きから危険な存在に見つからない振る舞いまで教えてくれたことを語る。機械は改めて自己紹介し、自分は王家騎士団長を務めた者だと言う。その肩書に彼女は目を見張り、あなたが年月や事情を問うと、機械は懐かしい話をする前にまず食事をしようと笑う。</p><p>彼女は場所を変えたいと言いかけるが、少年が空腹を訴えると折れてうなずく。赤髪の少女は「甘やかしすぎだ」と半ば呆れつつも、仲間が心配しないよう別の人物へ連絡を入れる。機械は、いちばん楽しい食事は皆で作るものだと言い、あなたたちに材料集めを頼む。</p><p>機械は段取りよく役割を割り振る。彼女と少年は町外れの人々に頼んで芋と南瓜を分けてもらい、あなたと赤髪の少女は斜面にいる羊毛をまとった獣を狩って肉を確保する――牛肉が手に入りにくいので、若い個体の肉は柔らかく臭みも少ない代用品になるという。赤髪の少女はそれを勝負に変え、先に肉を届けた方が勝ちだと笑う。あなたは不穏な気配を感じながらも動きを止めず、予想以上の速さで上質な肉を持ち帰る。機械は驚きと喜びを隠さず、あなたの戦いぶりを称え、「四百年前なら騎士団に迎えた」と朗らかに言って笑う。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ウクラマト <small class="muted">（ヘリテージファウンド, X:7.4, Y:17.2）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="little-footfalls.html">小さな君を探して</a></div><div class="row">ファイター ソーサラー （リミテッドジョブを除く） Lv 98</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="memories-of-a-knight.html">古を知る騎士</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'水下的街巷',
    tabs:{story:'故事概要',acq:'取得方式',unlockq:'解鎖任務',followq:'後續任務',comments:'留言'},
    readMore:'展開全文',readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Wuk Lamat 告訴你，她只在一瞬間看到 Gulool Ja，下一秒他就消失在建物後方，但她幾乎能肯定他是往更南邊去了。她立刻用 linkpearl 聯絡 Alisaie，請她趕來會合，然後帶著你踏進那片視線難以穿透的區域——運河縱橫、瓦礫四散，想看清遠處幾乎不可能。</p><p>為了加快搜尋，你們決定分頭行動。你下到運河裡沿著水道前進，Wuk Lamat 則穿梭在街巷之間。你們先說好：就算找到 Gulool Ja，也先不要立刻現身，而是從遠處看著他一路走到目的地——要是嚇到他，在這種地方跌倒或出事就太危險了。</p><p>你壓低氣息，保持距離，悄悄跟著 Gulool Ja 前進。那雙短腿卻走了很長一段路，讓你忍不住繃緊神經，直到他終於放慢腳步，你才看出端倪——他是來照看那些小小的孩子們的。明明自己也還是個孩子，卻仍想守著別人不出事。</p><p>就在你們要靠近時，一名守衛突然擋在前方，冷硬地喝止你們再向前一步。Alisaie 立刻要 Gulool Ja 快跑，鏽蝕的機械士兵則反問：你們認識這孩子？你們到底是誰、想做什麼？Wuk Lamat 報上名字，誠懇地說她只是想和 Gulool Ja 說話，並為驚嚇到他道歉。然而 Gulool Ja 仍遲疑不定——他聽見過她的話，認為她說過要殺了他的父親。機械士兵立刻把你們視為惡徒，準備動手驅逐，但 Gulool Ja 掙扎著開口：即使如此，他也想更了解她。聽到他的心意，那名守衛才選擇退開，讓你們靠近。</p><p>Wuk Lamat 鬆了口氣，卻又忍不住盯著那台「古老又會說話」的機械發愣。Gulool Ja 說 Otis 是他的朋友——在他又餓又難過的時候，是 Otis 來照顧他；Otis 會替他做飯，也教他各種事情，從讀寫到如何不被危險生物發現。你們還在震驚「機械會做飯」這件事時，Otis 便正式自我介紹：他是 Ser Otis Velona，曾任 Alexandria 王家騎士團長。Wuk Lamat 聽到頭銜整個愣住，而當你追問他究竟運作了多久、又為何與其他機械不同時，Otis 卻笑著表示，回憶可以慢慢談——但在那之前，先吃一頓飯。</p><p>Wuk Lamat 原本想把談話移到 The Backroom，卻被 Gulool Ja 的飢餓打斷；他用幾乎是拜託的語氣說自己真的很餓，Wuk Lamat 只好答應。Alisaie 一邊感嘆 Wuk Lamat 會把姪子寵壞，一邊用 linkpearl 通知 Erenville，讓其他人別再擔心。Otis 則精神奕奕地表示，若能請你們幫忙，他就要做出自己最拿手的料理——而最美味、也最令人愉快的餐點，往往是大家一起動手換來的。</p><p>Otis 很快把準備工作分配下去：Wuk Lamat 和 Gulool Ja 去向郊外的人們商量，拿些山藥與南瓜；Gulool Ja 還說他會像往常一樣順便問問「不要的邊角料」。你和 Alisaie 則去城外斜坡尋找 woolback，取得牠們的肉——因為牛肉不容易取得，woolback 的肉便成了很好的替代品，尤其是年幼個體，肉質更嫩、腥味也更淡。Alisaie 乾脆把任務變成比賽，說誰先把肉送回來誰就贏；你在不安的氣息中加快腳步，最後以連 Alisaie 都沒料到的速度帶回 Woolback Loin。Otis 看著那上等的部位驚嘆不已，當場稱讚你能在戰鬥中俐落應對，甚至笑說若是四百年前，他一定會把你招入王家騎士團。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 烏克·拉瑪特 <small class="muted"> 遺產之地（X:7.4, Y:17.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="little-footfalls.html">尋找年幼的你</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.98</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="memories-of-a-knight.html">知曉舊事的騎士</a></div></div>`

};

const langToggle=document.getElementById('langToggle');
const pageTitle=document.getElementById('pageTitle');
const tabBtns=[...document.querySelectorAll('.tab-btn')];
const panels={story:document.getElementById('panel-story'),acq:document.getElementById('panel-acq'),unlockq:document.getElementById('panel-unlockq'),followq:document.getElementById('panel-followq'),comments:document.getElementById('panel-comments')};

function getLang(){return localStorage.getItem(LANG_KEY)||'EN';}
function wireClamp(panelEl,t){
  const clamp=panelEl.querySelector('.clamp');
  const btn=panelEl.querySelector('[data-role="expand"]');
  if(!clamp||!btn) return;
  function setLabel(){
    const collapsed=clamp.getAttribute('data-collapsed')!=='false';
    btn.textContent=collapsed?t.readMore:t.readLess;
  }
  setLabel();
  btn.addEventListener('click',()=>{
    const collapsed=clamp.getAttribute('data-collapsed')!=='false';
    clamp.setAttribute('data-collapsed',collapsed?'false':'true');
    setLabel();
  });
}
function renderPanel(key,lang){
  const t=i18n[lang]||i18n.EN;
  Object.keys(panels).forEach(k=>panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if(key!=='comments') panels[key].innerHTML=t[key];
  if(key==='story') wireClamp(panels[key],t);
  if(key==='comments') loadGiscusForCurrentLang();
}
function applyLang(lang){
  const t=i18n[lang]||i18n.EN;
  pageTitle.textContent=t.pageTitle;
  langToggle.textContent=`🌐 ${t.langLabel}`;
  tabBtns.forEach(btn=>{btn.textContent=t.tabs[btn.dataset.tab];});
  const activeBtn=tabBtns.find(b=>b.getAttribute('aria-selected')==='true')||tabBtns[0];
  renderPanel(activeBtn.dataset.tab,lang);
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab,getLang());
  });
});
langToggle.addEventListener('click',()=>{
  const cur=getLang();
  const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
  localStorage.setItem(LANG_KEY,next);
  applyLang(next);
});
applyLang(getLang());

const GISCUS_CFG={repo:'BELAUG-FFXIV/FFXIV_Library',repoId:'R_kgDOPyh4Kw',category:'General',categoryId:'DIC_kwDOPyh4K84CwPjL',theme:'preferred_color_scheme'};
function uiLang(code){return code==='JP'?'ja':(code==='ZH'?'zh-TW':'en');}
function loadGiscusForCurrentLang(){
  const mount=document.getElementById('giscus_container');
  if(!mount) return;
  mount.innerHTML='';
  const langCode=getLang();
  const s=document.createElement('script');
  s.src='https://giscus.app/client.js';
  s.setAttribute('data-repo',GISCUS_CFG.repo);
  s.setAttribute('data-repo-id',GISCUS_CFG.repoId);
  s.setAttribute('data-category',GISCUS_CFG.category);
  s.setAttribute('data-category-id',GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping','specific');
  s.setAttribute('data-term',location.pathname+'｜'+langCode);
  s.setAttribute('data-reactions-enabled','1');
  s.setAttribute('data-emit-metadata','0');
  s.setAttribute('data-input-position','bottom');
  s.setAttribute('data-lang',uiLang(langCode));
  s.setAttribute('data-theme',GISCUS_CFG.theme);
  s.setAttribute('crossorigin','anonymous');
  s.async=true;
  mount.appendChild(s);
}
</script>
