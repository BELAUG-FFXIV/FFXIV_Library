<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'The Feat of Proof',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You brace yourself for what comes next when Wuk Lamat points out the obvious—if you mean to clear this feat, there is still more climbing ahead. The mood turns heavy as Krile admits she felt a great expulsion of aether from Valigarmanda’s prison and fears the ice may hold for only a few more years. Erenville, who has seen wonders across Eorzea and beyond, confesses it has been a long time since he felt a presence so oppressive—like countless dagger points against the skin—while Alisaie wonders aloud if the tural vidraal are simply the Far East’s auspices by another name.</p><p>Alphinaud pulls you back to the task at hand: the Feat of Proof requires you to seek High Luminary Gurfurlur somewhere in these mountains, and prior feats suggest the Yok Huy will not answer your questions plainly. He asks you to listen carefully as you speak with them—if they refuse to give a location, their words may still hide clues, and you’ll need to read between the lines.</p><p>In Worlar’s Echo, you take in a people larger than Wuk Lamat ever imagined, gentle and reserved despite their scale. You hear small details that make the place feel lived-in—corn grown here as it is even in distant lands—and you notice how their stonework and writing dominate the village, as if meant to outlast any single lifetime. When you ask after the High Luminary, one villager dismisses the question and instead tests your resolve by comparing Wuk Lamat to her brothers, praising Zoraal Ja’s imposing strength and doubting whether the Third Promise can truly follow Gulool Ja Ja.</p><p>Others offer what they can, though never the straight answer you want. One Yok Huy speaks with reverence of the glyphs they carve, calling them records of lives lived, promising to etch your arrival into stone so the meeting endures for countless turnings of the sun. Another explains that the High Luminary’s duties draw him beyond the village—he is warder of the Skyruin and keeper of the sepulchres—and hints that you should look not for a person in a room, but for a duty in motion. The name “Proof” returns more than once, tied to gravesites to the northwest, and the implication settles in: you are being guided, just not in the way you expected.</p><p>Following the trail west at your own pace along sheer drops, you catch up amid steep, exhausting slopes and abandoned-looking stone dwellings. Erenville stops you before a crater where nothing grows and the ground still burns, recognizing it as one of the scars from Valigarmanda’s rampage—the saga’s “eternal flames” made real. Soon you reach Proof and meet a gravekeeper who calmly tells you the lesson was the point: their dead are not “buried” as you imagine, but consigned to flame and scattered on the peaks, and death comes only when someone is no longer carried in the hearts of those who knew them. Their sepulchres are built in life so that the glyphs can bind memory to stone, letting a person endure through those who read.</p><p>You are sent onward to the Indelible Passage, where murals lay bare the Yok Huy’s history under a chronicler’s watch. You learn of an age of prosperity more than eleven hundred years ago, when giants expanded their dominion across Yok Tural, turned north toward Xak Tural, and spent nearly a century building a bridge to reach it—only to be broken not by an army, but by sickness that was mild to locals and devastating to them. You hear how grief and withdrawal reshaped their idea of peace, until they realized what they had chased through conquest had always been waiting in their homeland and in the stones that recorded their days. With the lesson given, the chronicler finally grants you what you sought from the beginning: the High Luminary bids you meet him upon the summit of Worqor Zormor—so you set your feet toward the ascent, carrying both the warning of ferocious beasts and Wuk Lamat’s hope that even Zoraal Ja, hearing the same history, might rethink “educating” others through war.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Alphinaud <small class="muted">Urqopacha (X:28.8, Y:33.6)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="historys-keepers.html">History’s Keepers</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 93</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-high-luminary.html">The High Luminary</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'墓の試練',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたは、試練を越えるにはまだ登りが続くのだとウクラマトが言い、思わず気を引き締める。クライルはヴァリガルマンダの牢獄から大量のエーテルが放たれたのを感じ取り、氷が保つのはあと数年かもしれないと不安を口にする。エレンヴィルは、エオルゼアや各地で数多の異形を見てきたが、これほど圧倒的な気配に晒されたのは久しいと告白し、肌を刺すような感覚に息を呑む。アリゼーは、トゥラルのヴィドラールという存在が東方の瑞獣とよく似ているのではないかと、あなたに問いかける。</p><p>アルフィノは、あなたがいま成すべきことをはっきりさせる。求められているのは山々のどこかにいるハイルミナリー、グルフルルを探し当てることであり、これまでの試練と同様、ヨクフイが率直に答えてくれるとは限らない。だからこそ、あなたが彼らの言葉を注意深く聞き取り、断片の中に隠された手掛かりを拾い上げねばならないのだと。</p><p>ウォルラーズ・エコーで、あなたは想像以上に巨体なヨクフイの姿に圧倒される一方、その気質が穏やかで寡黙であることにも気づく。村の石造りと刻字は、ただの装飾ではなく、長い時を越えて残すための営みのように感じられる。ハイルミナリーの行方を尋ねても、返ってくるのは場所ではなく試すような言葉で、ウクラマトが父の後を継ぐに足るのかと疑い、ゾラージャの威容を称える声さえ聞こえてくる。</p><p>それでも、あなたが耳を澄ませば道筋は浮かび上がる。あるヨクフイは刻まれた紋様を宝と同じほど重んじ、そこに生きた者たちの記録があるのだと語り、あなたの来訪さえ石に刻んで物語を永らえさせようとする。別の者は、ハイルミナリーが「天墜」を守る者であると同時に、霊廟を司る者でもあり、その務めゆえ村の外へ出ることが多いのだと示唆する。そして「プローフ」という名が、北西にある墓所として繰り返し語られ、あなたはそこで何かを学ぶよう導かれているのだと悟る。</p><p>西へ伸びる小道を進むあなたは、切り立った崖と急斜面に足を取られながらも、やがて一行に追いつく。エレンヴィルは、何も生えず地面がなお燃えるような大穴を指し、これはヴァリガルマンダの蹂躙が残した傷跡であり、嵐にも時にも消えぬ炎という語りが誇張ではなかったのだと言う。やがてあなたはプローフに辿り着き、墓守に迎えられるが、そこで教えられるのは探し物の場所ではなく、彼らの死生観そのものだ。遺体は炎に委ね灰を峰々に撒き、死とは鼓動が止まることではなく、知る者の心から失われた時に訪れるのだと。</p><p>あなたはさらに「インデリブル・パッセージ」へ進み、待っていた記録者から壁画の教えを受ける。千年以上前の繁栄、ヨク・トゥラルを広げ北の大地へ伸ばした野心、海峡を越えるために一世紀近く費やした大橋、そして敵ではなく病によって倒れた遠征の悲劇が語られる。彼らは戦い続けるほど平和から遠ざかり、山へ退いたのちようやく、求めていた平穏は故郷と石に刻んだ日々の中に最初からあったのだと知ったのだと。教えを終えた記録者は、ついにあなたへ目的地を告げる――ハイルミナリーはウォルコル・ゾルモルの頂で待つ。あなたは獣の脅威に備えつつ登攀へ向かい、ウクラマトが同じ教えを聞いたはずのゾラージャに思いが届くことを願う。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> アルフィノ <small class="muted">オルコ・パチャ (X:28.8, Y:33.6)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="historys-keepers.html">記憶の民、ヨカフイ族</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 93</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-high-luminary.html">祭司長グーフールー</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'墓之試煉',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你聽見 Wuk Lamat 直白地說，如果想通過這場試煉，看來還得繼續往更高處爬。Krile 的語氣卻沉了下來——她感覺到 Valigarmanda 的牢獄最近排出大量以太，冰封恐怕只剩幾年能撐。Erenville 則坦言，就算他在 Eorzea 和各地見過無數異常生物，也已經很久沒感受過這種壓迫感，像有無數尖刃同時刺在皮膚上。Alisaie 聽著「tural vidraal（Yok Tural 對長命異獸的稱呼）」的描述，忍不住問你：這聽起來和遠東的 auspices 是不是其實同一種概念，只是叫法不同。</p><p>Alphinaud 把你拉回正事：墓之試煉的要求很明確——你們得在這片群山之中找到 High Luminary Gurfurlur。可他也提醒你，依照先前那些試煉的脈絡，Yok Huy 不會用最直接的方式回答你們，所以你必須在打聽時格外留心，從他們的話裡抓住藏起來的線索——即使拿不到精準位置，也可能從用詞與暗示推得出方向。</p><p>回到 Worlar’s Echo，你一邊聽著 Wuk Lamat 感嘆 Yok Huy 比想像中還巨大，一邊也跟著 Krile 的觀察去看：他們看起來溫和而內斂。Erenville 隨口提到這裡也種玉米，連北方的 Xak Tural 都一樣常見，讓你意識到即使在高山深處，這座村落仍有自己的日常。Alisaie 注意到牆面佈滿 Yok Huy 的文字，而你四處詢問 High Luminary 的去向時，也聽見有人把問題拋回來，用幾近挑釁的口氣質疑 Wuk Lamat 是否真能繼承 Gulool Ja Ja，並拿 Zoraal Ja 的氣勢作對比。</p><p>真正的答案並不以「地點」的形式出現，而是散在你聽到的每一句話裡。有人談起他們雕刻的符文，說那是活過的人留下的記錄，甚至表示會把你們的到來也刻進石頭，好讓相遇的故事在無數日輪更迭後仍被記得。也有人說 High Luminary 的職責不只看守 Skyruin（Valigarmanda 的稱號），還負責照看墓室與靈廟，所以他經常離開村子；換句話說，你要找的不是「某個房間裡的人」，而是「正在履行職責的人」。當「Proof」一再被提起，還被明確指向西北方的墓地，你開始明白：你們被引導前往的，是一條必須靠自己悟出的路。</p><p>你沿著往西的路追上眾人，眼前的急坡與斷崖讓每個人只能按自己的步調前進。Erenville 停在一處巨大坑洞前要你仔細看：沒有木頭、沒有樹、連枯草都不見，地面卻仍像在燃燒。他說這必定是傳說裡 Valigarmanda 肆虐留下的傷痕，而 Skyruin（Valigarmanda 的稱號）的火焰被形容為「永恆之火」——連暴風與時間都無法熄滅——他原本以為那只是誇飾，如今卻親眼見到了證據。你們終於抵達 Proof，迎來的是一位耐心的墓守；他告訴你，High Luminary 早已安排這堂課：Yok Huy 並不把遺體「埋葬」，而是將身軀交付火焰，再把骨灰撒向群峰；而死亡也不等同於心臟停止跳動，只有當一個人不再被任何熟識的人記掛在心裡，才算真正消逝。</p><p>墓守帶你理解他們為何要在生前就建造自己的墓所——為的是把自己刻進「活著的編年史」，讓名字與記憶透過碑文留存，像朋友仍活在他心中那樣。接著你被指引前往 Indelible Passage，在那裡，一名沉著的記錄者等著你，奉 High Luminary 之命把壁畫的教誨一代代傳下去。你聽見 Yok Huy 的歷史：千年以上的繁盛、憑藉力量擴張到 Yok Tural 各地、又把目光投向北方的 Xak Tural，甚至為了跨越海峽築橋，耗去將近一個世紀；然而遠征的崩潰並非因為看得見的敵人，而是因為對當地人只是季節性小病的感染，卻讓缺乏抵抗力的他們大量死去。記錄者說，他們在長久征伐後反而離「和平」越來越遠，直到撤回山中才終於明白：他們追逐的平穩，其實一直都在故土、在石頭、在那些被記錄下來的日子裡。</p><p>最後，記錄者終於把你要的答案交到你手上——High Luminary 會在 Worqor Zormor 的山頂等你；你踏上南方的登山路，記住前方有兇猛野獸，也把 Wuk Lamat 的心願放在心裡：同樣聽過這段歷史的 Zoraal Ja，是否也會重新思考用戰爭去「教育」他人的道路。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>任務發布</b> 阿爾菲諾 <small class="muted"> 奧闊帕恰山 (X:28.8, Y:33.6)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="historys-keepers.html">記憶之民—尤卡巨人族</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.93</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-high-luminary.html">祭司長固伏魯</a></div></div>`

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
