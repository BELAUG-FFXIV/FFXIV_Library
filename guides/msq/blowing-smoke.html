const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`Blowing Smoke`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Erenville watches the bandits’ movements and notes that plenty of them are gathered inside—this is the opening you’ve been waiting for. He stays back to keep watch and places the foul-smelling attractant in your hands, instructing you to toss it into the bonfire near the middle of Tonatenyawi. Once the smoke rises, yeheheceyaa will come soon after, and the bandits will have bigger problems than guarding a stolen bracelet.</p><p>When you throw the attractant into the flames, the reaction is immediate. Daybreakers reel at the stench, shouting over one another as the smoke turns the whole town sour. Then panic erupts—someone spots the incoming yeheheceyaa, screams break out, and people bolt in every direction. Even Wihuwte, trying to keep control, realizes it’s the smoke that drew them in and swears he’ll find the one responsible. From the edge of the chaos, Erenville judges the distraction sufficient and urges you to move—now is the time to retrieve the bracelet.</p><p>But the plan snags on a voice you recognize from your earlier eavesdropping. Zekowa yells from inside, furious and terrified that he’s still locked up and begging you not to leave him to die. Erenville tries to hush him before the bandits hear, yet Wihuwte catches the sound. With the risk of discovery rising by the second, Erenville makes the call: the bracelet will have to wait. You break Zekowa out, then withdraw while the town remains in uproar.</p><p>Outside, Zekowa thanks you, admitting he thought you might actually abandon him. Erenville is openly frustrated—so much effort, and nothing to show for it—while Zekowa, half amazed, says he never expected anyone to have the nerve to take on the Vulture. He jokes with you, then turns serious as Erenville reveals he’s seen the Vulture’s face before and asks the obvious question: was it the officer Zekowa confronted in town? Zekowa confirms it—the same man who serves as deputy chief of the Dustwatch when he isn’t masquerading as a gang leader.</p><p>Zekowa offers to help you recover what the Vulture stole and says he knows where the Vulture hides his cache—he expects the man is headed there even now. Before agreeing, Erenville demands the full story. Zekowa explains that the Daybreakers started three years ago as his group: not cutthroats, but a band meant to protect the powerless—kids bullied, workers exploited—bringing wrongdoers to account under the old laws through formal duels. Over time, they became a force people feared to cross.</p><p>Then, about a year ago, the Vulture arrived with thugs, crushed them, and seized control of the Daybreakers. Fear kept people obedient, and easy money kept them loyal. The group that was founded to defend others became a pack of bandits preying on the very people it was meant to protect. Zekowa and his friends, Kwikana and Liwine, decided the only way to stop it was to challenge the Vulture to a duel—he accepted, even gloating about his victory—but on the day, he arrived with the Dustwatch and had Zekowa’s friends arrested for robbery. He set bail at an impossible price, leaving Zekowa isolated, with no allies left in the Daybreakers and no help from the Dustwatch.</p><p>Erenville connects the dots: that’s why Zekowa tried to confront the deputy chief in town—until a spearman stopped him. Zekowa adds that after he left town, the Vulture’s men ambushed him and took him prisoner, leading to what you found. When asked whether the entire Dustwatch is compromised, Zekowa says no—the sheriff, Kemakka, is genuinely honest and devoted to peace, but he’s too trusting to suspect anything. If it were Zekowa’s word against the deputy chief’s, Kemakka would never believe him.</p><p>Still, Erenville sees a way forward: if Zekowa can lead you to where the Vulture keeps his spoils, Kemakka might be able to help you recover Namikka’s bracelet—if you can do it without being seen. Zekowa says he has a plan, but he can’t do it alone, and he asks you to hear him out at Sheshenewezi Springs. When you meet there, Erenville admits he’s grateful Zekowa can bring you to the deputy chief, yet it will mean nothing if you’re spotted. Zekowa greets you with urgency, telling you this is where the Vulture hides his loot—and that he expects the man will arrive soon.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Erenville <small class="muted">(Shaaloani, X:9.7, Y:20.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="braced-for-trouble.html">Braced for Trouble</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 95</div></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'エヘヘケヤー作戦',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>エレンヴィルは建物の中に相当数が集まっているのを確認し、「今が好機だ」と告げる。彼はここで見張りを続けるから、とあなたに強烈な悪臭を放つ誘引剤を託し、町の中央付近にある焚き火へ投げ入れるよう指示する。煙が上がれば、ほどなくしてイェヘヘセヤーが寄ってくる――その混乱に乗じて腕輪を回収する、という算段だ。</p><p>あなたが誘引剤を焚き火へ放り込むと、即座に騒ぎが広がる。デイブレイカーズは鼻を押さえて悪臭に喚き、何を火に入れたのだと怒鳴り合う。次の瞬間、何かを見た者が絶叫し、逃げろという声が重なって町中が一気に混乱へ傾く。ウィフウテは煙に引き寄せられたのだと察し、誰の仕業か突き止めると吐き捨てる。エレンヴィルは「十分に引きつけた」と判断し、いまこそ腕輪を取り戻す時だとあなたを促す。</p><p>だが、あなたが動こうとした矢先、閉じ込められたままのゼコワの叫び声が響く。外の騒ぎに焦り、まだ自分が中にいるのかと怒鳴り、助けろと懇願し、置き去りにすれば殺されると訴える。エレンヴィルは声を潜めろと制するが、ウィフウテがその気配に反応する。露見の危険が高まる中、エレンヴィルは決断する――腕輪は後回しだ。まずゼコワを助け出し、いったん退く。</p><p>逃げ延びたゼコワは礼を言い、見捨てられると思ったと正直に口にする。エレンヴィルは「骨折り損だ」と悔しさを滲ませ、ゼコワは「ハゲタカに挑む度胸があるとは思わなかった」と驚きつつも、助けへの感謝を伝える。エレンヴィルは「ハゲタカ」と呼ばれる男の顔を見たことがあると言い、町で役人に食ってかかった相手ではないかと問う。ゼコワは同一人物だと断言し、その男は盗賊団の首領を装う一方で、ダストウォッチの副長を務めているのだと明かす。</p><p>ゼコワは、奪われた物を取り戻す手助けをさせてほしいと言い、首領が戦利品を隠す場所に心当たりがある、今もそこへ向かっているはずだと告げる。だがエレンヴィルは軽々に受け入れず、まず事情を説明するよう求める。ゼコワは語り始める――トナテニャウィの連中は「デイブレイカーズ」と呼ばれ、もともとは自分と仲間たちが作った集まりだった。最初から人殺しの一団ではなく、いじめられる子どもや搾取される労働者など、弱い立場の者を守るために動いていたのだ。三年前、陰で悪事を働く者を見つけるたび、彼らは古い法に則って決闘で白黒をつけ、敗者には権力者であっても罪の責任を負わせてきた。</p><p>しかし一年前、ハゲタカが手下を連れて現れ、デイブレイカーズを力で乗っ取り、恐怖で従わせ、さらに「簡単に稼げる」と示して完全に手なずけた。守るために生まれた集まりは、守るべき人々を食い物にする盗賊へと堕ちた。ゼコワはクウィカナとリウィネと話し合い、止めるには決闘で挑むしかないと結論づける。ハゲタカは勝てると豪語して受けたが、当日になってダストウォッチを引き連れ、二人を強盗の罪で逮捕させ、誰にも払えない額の保釈金を設定した。そうしてゼコワは孤立し、助けてくれる者はどこにもいなくなった。</p><p>エレンヴィルは、それで町の真ん中で副長に挑もうとしていたのだろうと理解する。ゼコワは、槍を持つ男に止められたこと、そして町を出た直後にハゲタカの手下に不意打ちされ捕らえられたことを語る。ダストウォッチが全員ハゲタカの手先なのかと問われると、ゼコワは否定する――保安官ケマッカは誠実で、治安を守ろうとする人物だが、少し人が良すぎて何も疑っていない。自分の言葉と副長の言葉、どちらを信じるかは明白だ。</p><p>それでもエレンヴィルは道を探す。ハゲタカが戦利品を隠す場所が分かるなら、姿を見られないよう慎重に動きつつ、ナミッカの腕輪を取り戻す助けになるかもしれない。ゼコワは計画があると言い、ここではなくシェシェネウェジの泉で話を聞いてほしいと頼む。あなたが泉へ向かうと、エレンヴィルは副長に近づけること自体はありがたいが、見つかればすべてが水の泡だと釘を刺す。ゼコワは現れ、この場所こそがハゲタカの隠し場所で、まもなく本人が来るはずだと告げる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> エレンヴィル <small class="muted">（シャーローニ荒野, X:9.7, Y:20.2）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="braced-for-trouble.html">腕輪を取り戻せ！</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 95</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="law-of-the-land.html">荒野の掟</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'舞翼飛龍大作戰',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Erenville 盯著盜匪的動向，確認有不少人都聚在建築裡——這正是你們一直在等的破口。他留在外頭警戒，把那包臭到令人作嘔的誘引劑交到你手上，要你丟進 Tonatenyawi 町中央附近的營火裡。只要煙一冒起來，yeheheceyaa 很快就會被引來，到時盜匪就會忙著自保，沒空看守一只偷來的手環。</p><p>你把誘引劑扔進火裡後，反應立刻炸開。Daybreakers 被那股惡臭嗆得直不起身，邊咳邊罵，吵著到底是誰把什麼鬼東西丟進火裡；下一秒，恐慌接力般擴散——有人看見 yeheheceyaa 逼近，尖叫聲四起，人群開始四散奔逃。連試圖維持秩序的 Wihuwte 都不得不承認是煙味把牠們引來，他咬牙發誓一定要揪出幕後黑手。Erenville 站在混亂邊緣迅速判斷：分心已經足夠，催你立刻行動——現在正是去拿回手環的時候。</p><p>然而計畫就在你們要動的瞬間卡住了——那是你早先偷聽過的聲音。Zekowa 從屋裡大吼，既憤怒又恐懼，罵你們居然還把他鎖在裡頭，甚至急到求你們別丟下他，因為那些人會殺了他。Erenville 立刻要他閉嘴，免得引來注意，但 Wihuwte 已經聽見了動靜。暴露的風險一秒比一秒高，Erenville 當機立斷：手環先別管了——先把 Zekowa 救出來，立刻撤退。</p><p>你們退到外頭後，Zekowa 終於能喘口氣，他向你道謝，坦白說剛才真的以為你會把他丟著不管。Erenville 的不悅寫在臉上——忙了半天卻什麼都沒拿到；Zekowa 卻半驚半佩服，說他從沒想過有人竟敢去惹「秃鷲」。他先用玩笑緩和氣氛，接著才在 Erenville 的追問下轉為認真：Erenville 說自己以前見過「秃鷲」的臉，問他那是不是城裡被他頂撞過的官員。Zekowa 直接點頭——同一個人，那傢伙不只是幫派首領，更是 Dustwatch 的副隊長。</p><p>Zekowa 主動提出要幫你們把被「秃鷲」奪走的東西拿回來，因為他知道對方把戰利品藏在哪裡，甚至猜他現在就正往那裡去。但 Erenville 沒有立刻答應，而是要求他把整件事說清楚。Zekowa 這才交代：Daybreakers 三年前原本是由他一手建立的團體，最初根本不是盜匪，而是為了保護弱者——被霸凌的孩子、被剝削的工人——並用正式決鬥依照舊法把壞人拉下來，讓他們為罪行負責。時間一久，他們反而變成了讓人不敢輕視的勢力。</p><p>直到大約一年前，「秃鷲」帶著打手闖入，直接用暴力碾碎他們並奪權。恐懼讓人服從，錢則讓人上癮；原本為了守護他人而誕生的團體，反過來成了掠奪者，專挑他們本該保護的人下手。Zekowa 和朋友 Kwikana、Liwine 決定用決鬥挑戰「秃鷲」來終結一切；對方也答應了，還得意地誇口自己必勝。但到了那天，「秃鷲」卻帶著 Dustwatch 出現，反把兩名朋友以搶劫罪逮捕，並把保釋金訂成不可能支付的天價，讓 Zekowa 從此孤立無援——既沒有 Daybreakers 的同伴，也得不到 Dustwatch 的援手。</p><p>Erenville 這才把線索串起來：所以你才會在城裡去找副隊長對質，直到被那個拿槍的士兵攔下。Zekowa 也說，自己離開城鎮後很快就遭到「秃鷲」手下伏擊並被抓，才會落到你們剛剛救人的局面。至於 Dustwatch 是否全都被收買，Zekowa 否認——保安官 Kemakka 其實很正直，是真心守護治安的人，只是太容易相信別人，根本想不到副隊長會是內鬼；若只剩他一個人的指控，Kemakka 不可能相信他勝過副隊長。</p><p>即便如此，Erenville 還是看見了機會：如果 Zekowa 能帶你們去「秃鷲」藏戰利品的地方，也許 Kemakka 就能在你們不被看見的前提下，協助把 Namikka 的手環拿回來。Zekowa 說他有計畫，但他做不到一個人完成；他請你們到 Sheshenewezi Springs 聽他說完。你們在泉邊會合時，Erenville 低聲提醒：能接近副隊長固然難得，但只要被看見，一切就會前功盡棄。Zekowa 則急切地表示，這裡就是「秃鷲」藏贓的地方，他預料對方很快就會現身。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 艾倫維爾 <small class="muted"> 夏勞尼荒野（X:9.7, Y:20.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="braced-for-trouble.html">奪回手鐲！</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.95</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="law-of-the-land.html">荒野上的老規矩</a></div></div>`
  }
};

const langToggle = document.getElementById('langToggle');
const pageTitle  = document.getElementById('pageTitle');
const tabBtns    = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story: document.getElementById('panel-story'),
  acq: document.getElementById('panel-acq'),
  unlockq: document.getElementById('panel-unlockq'),
  followq: document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => btn.textContent = t.tabs[btn.dataset.tab]);
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.async = true;
  s.setAttribute('crossorigin', 'anonymous');
  mount.appendChild(s);
}
</script>
</body>
</html>
