    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Wuk Lamat brightens at the thought of spiced ibruq wrapped in banana leaves, calling it a winning combination. Koana agrees and suggests you first see whether banana leaves can be obtained in town—perhaps the cook Urianger mentioned might be persuaded to spare a few—so you head back into Iq Br’aax together.</p><p>Near an underground oven, you find the cheerful cook at once. When you ask about banana leaves—carefully insisting it’s for something other than xibruq pibil—he apologizes and says he’s already used his last. The finest leaves come from Golmajiik Grove, far down in the Ja Tiika Heartland, and the wild variants sometimes sold in city markets don’t compare.</p><p>Koana admits he’d hoped to avoid such a lengthy venture, but prepares to go to the Ja Tiika Heartland if that’s the only way. Then Hunmu Rruk steps in and says he can spare you the trip: travel requires passing through the Ty’iinbek Traverse, but it has caved in, likely due to the recent storm. Wuk Lamat panics—if you can’t travel, you can’t get the leaves—but Koana points out that if there were truly no alternative, the feat would have been suspended or its goal changed.</p><p>Hunmu Rruk offers only one piece of advice: undertake the Feat of Repast on an empty stomach, because xibruq pibil may be delicious but daunting to finish. As he leaves you with that, Koana turns the problem over and suggests the feats are meant to deepen understanding of Tuliyollal’s peoples and cultures—so perhaps the key lies in learning something significant about xibruq pibil beyond recipe and ingredients.</p><p>Wuk Lamat immediately takes the hint and wonders aloud about its origin and history. The cheerful cook clears his throat and says that if it’s Yak T’el’s history you want, you should start with the old war—between the Xbr’aal and the Mamool Ja. These forests, he says, bear the scars of centuries of bloodshed, and to know how that bloodshed ended is to know xibruq pibil. Confused by what steamed ibruq has to do with war, you follow Koana’s lead and accept the detour; the cook directs you to the ruins of a settlement destroyed by the conflict—the village of Ilyon Asoh, a short distance to the east.</p><p>You reach what remains of Ilyon Asoh and meet Wuk Evu, a shipwright who aided you during the Feat of Reeds. He explains he heard the Third Promise was coming to this place of deep historical significance and followed to be of service. When he realizes Koana is the Second Promise—Dawnservant’s own son—he erupts in alarm at having addressed him like a common retainer, but Koana assures him there is no offense to take.</p><p>Forbidden by the Xbr’aax Rax to share anything about how to prepare xibruq pibil, Wuk Evu instead recounts Yak T’el’s history. The conflict, he says, was fundamentally over land: the Mamool Ja lived in the lower forest where thick canopy hid the sun and the soil was harsh to crops, driving them to covet the upper forest that was home to the Xbr’aal. The Xbr’aal held the advantage of higher ground and repelled invasion after invasion—until the tide turned with something you know all too well: blessed siblings.</p><p>Wuk Evu explains that the Mamool Ja were once divided among clans that fought one another even as they battled the Xbr’aal. Leaders sought to strengthen bonds by arranging a marriage between the children of Hoobigo and Boonewa, believing mixed-clan partners could not have children—yet a child was born who carried the blood of both: a two-headed Mamool Ja. Gifted with tremendous physical strength and magical prowess, he rose as a mighty warrior and became the first Autarch, uniting all three clans into a force to be feared. With war reaching its peak, Wuk Evu brings you to another battlefield—the Xobr’it Cinderfield—and continues the tale: after the Yok Huy departed some five hundred years ago, the enemies answered violence with violence for four centuries, until the Dawnservant ended their endless conflict eighty years ago, opposing both armies with only six companions and forcing an armistice.</p><p>At the negotiations that followed, sworn enemies could not suddenly drink to one another’s health—until the Dawnservant called for an exchange of traditional cuisine. The Mamool Ja shared spiced meat, and the Xbr’aal shared their steamed banana leaves. Delight spread as each side tasted the other’s dish, and the Dawnservant laughed, saying the flavors would be even better combined—then helped them prepare a new creation. Wuk Lamat immediately recognizes it as xibruq pibil: a marriage of Xbr’aal and Mamool Ja cultures and proof of newfound cooperation, a feast said to have lasted three days and three nights before a peace accord was reached. Hearing the Dawnservant’s words—ignorance begets strife, understanding begets fellowship—Wuk Lamat can’t help but laugh at how absurdly perfect it sounds for her father, while Koana repeats the lesson in quiet thought. And as you take in the weight of what you’ve learned, you sense someone nearby—enough to make Koana suspect your competition is plotting again as you turn back toward your next step in the feat.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>香辛料をきかせたイブルクをバナナの葉で包む――ウクラマトはそれだけで勝てそうだと目を輝かせる。コーナも同意し、まずは町でバナナの葉を手に入れられないか確かめようと言い、あなたは彼とともにイク・ブラアクスで手掛かりを探しに向かう。</p><p>地下のかまどらしき場所を見つけると、例の陽気な料理人が声をかけてくる。あなたたちはバナナの葉を求めるが、彼は申し訳なさそうに「もう最後の分まで使い切った」と告げ、最上の葉はジャ・ティーカ・ハートランドのゴルマジーク・グローブで採れるのだと言う。市で見かける野生の品とは比べものにならない、と。</p><p>コーナは遠出を避けたかったと正直にこぼしつつも、他に手がないならジャ・ティーカ・ハートランドへ向かう覚悟を固める。そこへフンム・ルルクが割って入り、旅をするにはティインベク・トラバースを通る必要があるが、最近の嵐のせいで崩落していると告げる。ウクラマトは葉が手に入らないと焦るが、コーナは、もし本当に入手手段がないのなら偉業自体が中止されるか目的が変更されるはずだ、と食い下がる。</p><p>フンム・ルルクは助言として、空腹で「饗宴の偉業」に臨めと言い残す。美味だが食べ切るのが骨だ、と。彼が去ったあと、コーナはこの偉業の意図を改めて見つめ、これらの偉業はトライヨラの民と文化への理解を深めるためにあるのだから、料理の作り方や材料以外にも重要な意味が隠されているのではないか、とあなたに示す。</p><p>ウクラマトはすぐに、最初に作った者や由来といった歴史のことだろう、と気づく。料理人は咳払いし、ヤクテルの歴史を知りたいなら「古い戦争」から始めろと言う――シブラーアルとマムージャの戦争だ。この森には幾世紀もの流血の痕が傷として残り、その流血の終わりを知ることがシブルク・ピビルを知ることなのだ、と。蒸したイブルクと戦争がどう結びつくのか腑に落ちないままでも、あなたはコーナとともにその遠回りを受け入れ、料理人に示された戦禍で滅んだ集落、イリヨン・アソウの跡へ向かう。</p><p>時に忘れ去られたようなイリヨン・アソウの残骸で、あなたたちはウク・エヴと再会する。彼は「葦の偉業」で助けてくれた船大工であり、第三誓約が重大な史跡へ向かうと聞いて材木の受け取りついでに追ってきたのだと言う。やがて彼はコーナが第二誓約、すなわち暁王の息子だと知って取り乱し、無礼を詫びて武器まで差し出そうとするが、コーナは気にするなと穏やかに止める。</p><p>ウク・エヴは、シブラーアルの指示によりシブルク・ピビルの調理法は語れないと断ったうえで、ヤクテルの歴史を語り始める。争いの根は土地にあり、下層の森で日光も乏しく作物が育ちにくい環境にいたマムージャは、上層の森――シブラーアルの故郷――を渇望して侵攻した。高地の利を得たシブラーアルは侵略者を退け続けたが、やがて潮目が変わる。その要因は、あなたもよく知る「受祝福の兄弟」だった。</p><p>ウク・エヴは、当時のマムージャが外敵との戦い以上に内輪の争いを抱えていたこと、そしてフービゴとブーンワの指導者が内紛を抑えるために子らの婚姻を取り決めたことを語る。異なる氏族の間に子は生まれないと信じられていたが、両方の血を引く双頭のマムージャが誕生し、圧倒的な身体能力と魔力を備えた彼はやがて最初のアウトアークとなって三氏族を統一した。戦争が頂点へ向かうと、ウク・エヴはあなたをシォブリト・シンダーフィールドへ導き、さらに続ける。ヨークフイが去ってからおよそ五百年、四百年にわたり暴力が暴力を呼び続けたが、八十年前、暁王がわずか六名の供を連れて両軍の前に立ち、戦いを止めたのだという。</p><p>その停戦のもとで交渉が始まったとき、宿敵同士がすぐに笑い合えるはずもなかった。だが暁王は伝統料理の交換を命じ、マムージャは香辛料をきかせた肉を、シブラーアルは蒸したバナナの葉の料理を差し出した。互いの皿に驚きと喜びが広がると、暁王は笑い、味は合わせればもっと良くなると言って新たな料理を手ずから作り上げた――それがシブルク・ピビルであり、両文化の結びつきと協力の証だ。宴は三日三晩続いたとも語られ、やがて講和が結ばれる。暁王の言葉――無知は争いを生み、理解は友愛を生む――を聞いて、ウクラマトはそれがあまりに父らしくて思わず笑い、コーナはその一句を静かに反芻する。あなたは学んだ重みを抱えながらも、近くに誰かの気配を感じ、コーナが競争相手の策を疑うのを見て、次の手へと戻っていく。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>Wuk Lamat 聽到「用香料調味的 ibruq，再用香蕉葉包起來」，立刻覺得這是絕配，怎麼想都會贏。Koana 便提議先在鎮上看看能不能弄到香蕉葉，或許 Urianger 提過的那位料理人願意分你們一些，你便跟著他一起去 Iq Br’aax 尋找線索。</p><p>你們很快在一處地下烤爐旁找到那位笑嘻嘻的料理人。你們提起想要香蕉葉，還刻意強調不是為了 xibruq pibil——但他表達歉意自己剛好把最後的香蕉葉用完了。最上等的香蕉葉要到 Golmajiik Grove 才找得到，而那裡位在更下方的 Ja Tiika Heartland；城市市集偶爾見到的野生品根本不能比。</p><p>Koana 原本想避免跑那麼遠，卻也只能表示若別無他法，就得前往 Ja Tiika Heartland。就在這時，Hunmu Rruk 出面說可以替你們省下這趟：要去那裡必須穿越 Ty’iinbek Traverse，但它因為最近的風暴而崩塌了。Wuk Lamat 當場急了，覺得這樣就拿不到香蕉葉；Koana 卻反過來推論，若真的沒有任何取得方式，這項「食之試煉」理應會被暫停，或至少改變目標。</p><p>Hunmu Rruk 沒把答案說破，只留下一句提醒：進行「食之試煉」最好空著肚子，因為 xibruq pibil 很好吃，但要吃完可能會很吃力。等他離開後，Koana 重新抓回這些試煉的用意——它們是為了讓你們更理解 Tuliyollal 的人民與文化——因此他判斷，關鍵也許不在食譜與材料本身，而在你們還沒明白的、更重要的意義。</p><p>Wuk Lamat 立刻會意，說那可能就是 xibruq pibil 的來歷與歷史。料理人也順勢改口，表示如果你們想知道 Yak T’el 的歷史，就得從那場舊戰爭開始——Xbr’aal 與 Mamool Ja 的戰爭。這片森林見證了數百年的殺戮，傷痕仍刻在土地上；要理解那場流血如何終結，才算真正理解 xibruq pibil。你明明還搞不懂「蒸 ibruq」怎麼會和戰爭扯上關係，卻也只能跟著 Koana 接下這條路。料理人指向東方，說那裡有一座在戰火中毀滅的聚落遺址——Ilyon Asoh——你便與兩人動身前往。</p><p>來到 Ilyon Asoh 的殘骸前，你們遇見了 Wuk Evu。他說這裡曾經充滿光與生機，甚至他的曾祖父就住在此處；他原本在 Iq Br’aax 取木材，聽到第三誓約要來這個具有深遠歷史意義的地方，便立刻跟上來想幫忙。Wuk Lamat 向你介紹他是曾在 Feat of Reeds 協助過你們的造船匠。Wuk Evu 先把你視作第三誓約的隨行者之一，直到 Koana 自報姓名後，他才猛然驚覺 Koana 正是第二誓約、也是 Dawnservant 的兒子，當場慌張到要補救失禮；Koana 則平靜表示不介意，請他別放在心上。</p><p>Wuk Evu 強調自己受 Xbr’aax Rax 的規定所限，不能透露 xibruq pibil 的製作細節，但他願意把 Yak T’el 的歷史告訴你。那場衝突本質上是為了土地：Mamool Ja 居於下層森林，濃密樹冠遮住陽光、土壤也不利於作物，這迫使他們覬覦上層森林——Xbr’aal 的家園——並展開持續的侵略。高地優勢原本一直站在 Xbr’aal 這邊，他們一次又一次擊退入侵者；然而這座村落如今的模樣證明戰局終究翻轉，而翻轉的關鍵正是「受祝福的兄弟」。</p><p>Wuk Evu 解釋，Mamool Ja 過去不只與外敵作戰，也長期內鬥：Hoobigo、Boonewa、Doppro 各自爭權，難以團結。為了鞏固關係、減少內耗，Hoobigo 與 Boonewa 的領袖安排了子女的婚姻，原以為不同氏族之間不可能誕生後代，卻真的出現了一名同時流著 Hoobigo 與 Boonewa 血脈的雙頭 Mamool Ja。那名孩子天生擁有驚人的體魄與魔力，最終成為第一位 Autarch，統一三個氏族，讓原本分裂的 Mamool Ja 變成令人畏懼的力量。Wuk Evu 說接下來最好讓你親眼看看戰爭的結果，便帶你前往另一處古戰場——Xobr’it Cinderfield——並在那裡繼續講述：自 Yok Huy 離去約五百年後，兩方在這片土地上以暴制暴長達四個世紀，直到八十年前 Dawnservant 只帶著六名同伴介入，逼迫兩軍停戰並促成談判。</p><p>他說在那次停戰談判中，仇敵不可能立刻對彼此舉杯致意，現場一度緊繃沉默；然而 Dawnservant 要求雙方交換各自的傳統料理，於是 Mamool Ja 端出用香料調味的肉食，而 Xbr’aal 則以蒸製的香蕉葉料理回應。當眾人終於在對方的食物裡嚐到驚喜與喜悅，Dawnservant 便笑著說，這些味道若結合起來會更好，並親自協助他們做出新的料理——你們立刻明白那正是 xibruq pibil：它把 Xbr’aal 與 Mamool Ja 的文化揉合在同一道菜裡，也把「合作」寫成了看得見、嚐得到的證明。據說那場宴席甚至延續了三天三夜，最後才真正締結和平。當你聽見那句「無知導致紛爭，理解帶來友愛」，Wuk Lamat 忍不住笑出聲，因為用食物終結千年仇怨既荒謬又太像爸爸；Koana 則低聲反覆咀嚼那句話。你正消化這段歷史的重量時，卻隱約察覺有人在附近——足以讓 Koana 懷疑對手又在盤算什麼，而你們也只能帶著新的理解，回到「食之試煉」的下一步。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 柯納哥 <small class="muted"> 亞克特爾樹海（X:11.0, Y:13.0)</small></div></div>`,

  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
