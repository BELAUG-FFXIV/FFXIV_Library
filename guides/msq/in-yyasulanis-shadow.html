    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You arrive to find far more people gathered than you dared hope. Alisaie keeps her grin, admitting she wasn’t sure how many she’d truly won over, so she simply didn’t stop trying. Y’shtola’s calm approval steadies the moment—so many different peoples, standing together—and Krile’s voice lands like a promise you can’t afford to break: Tural has come together for this fight, and you must not fail them. Even Erenville, usually guarded, lets out a quiet acknowledgement that she did well, while G’raha Tia looks past the crowd toward the day peace finally returns, and all the things he still wants to see.</p><p>With departure at hand, Alphinaud calls the group to readiness and says those remaining behind will accompany you part of the way. Y’shtola makes it plain she intends to see the dome firsthand. Alphinaud starts to say he’ll inform Wuk Lamat—only for her shout to cut through the air as she strides in. Alisaie greets “Lamaty’i” with ease, and Wuk Lamat answers that seeing everyone rally, seeing hope still alive, is all the encouragement she could ask for. You set off from the Xak Tural skygate.</p><p>As you travel, the dome feels both distant and impossibly present—lying well beyond Shaaloani, close enough to haunt every thought. G’raha Tia notes how fortunate it is to have Erenville guiding the way, and Alphinaud outlines what comes next: Koana and Ketenramm will continue managing affairs at the palace, and once he inspects the dome, he will return to help prepare against further incursions. Alisaie urges vigilance, while Y’shtola admits that even from afar she can sense something is wrong. Krile runs through supplies—food, medicine, gear—and marvels at how much can be crammed into Erenville’s rucksack. Erenville, practical as ever, reminds you Yyasulani is no short distance from Shaaloani, and if the train isn’t running, you’ll need other means of travel.</p><p>When everyone is assembled, Wuk Lamat speaks without pretense: this is it—your strike to bring down Zoraal Ja and secure peace for Tuliyollal. She warns that you’ll pass through Shaaloani where enemy movement has been reported, and tells you to stay sharp. Before you can press on, she shares what the Landsguard reported—ships emerging from the dome in quick succession, looming overhead like a threat made visible. She wants to assess the situation along the route to Shaaloani Station, using nearby settlements as a chance to look and listen before moving on.</p><p>At Hhusatahwi, you meet Sheriff Kemakka of the Dustwatch. He confirms the ships startled everyone when they first appeared, but they’ve held position without attacking. Still, he has unsettling reports from elsewhere, and admits they’re spread thin—Sheshenewezi Springs hasn’t been checked yet, and word says mechanical soldiers were seen nearby. Wuk Lamat reacts at once—if that’s true, people are in danger. Erenville worries for other townships too, and the plan forms quickly: you push on to the Springs while Erenville goes to Mehwahhetsoan, with Alisaie at his side.</p><p>At Sheshenewezi Springs, you find no patrol of machines—only the aftermath. A mechanical soldier lies silent, run through with a polearm, and locals tell you how white-clad soldiers surrounded the town until a traveler arrived and cut them down in a flash, spear in hand, soaring through the air. Relief turns to dread as they admit they’ve heard nothing from Yyasulani, and they can only hope Namikka is safe. Before the story can settle, the spearman himself appears—Estinien, with his companion looking entirely too pleased with the attention. Wuk Lamat thanks him for keeping people safe; Estinien brushes it off, says the automata aren’t particularly strong, and asks if the rumors are true that Gulool Ja Ja is slain. Wuk Lamat confirms it and swears Zoraal Ja will pay. Estinien chooses to remain in Shaaloani to keep watch, and when Zekowa realizes Wuk Lamat is the Vow of Resolve, he throws himself into the role—patrolling, protecting, sending any “hollow men” packing. With that left in capable hands, you head back to Shaaloani Station to reunite with the others.</p><p>At the station, you trade reports: thanks to Estinien, Shaaloani has suffered no casualties, and the settlements the others visited were spared as well. The dome, however, refuses to be understood—Y’shtola explains it is saturated with lightning energy so dense that touching the barrier would be fatal, and you must approach with utmost caution. Then the engineers of Xak Tural Railing speak up: through a telescope, they saw a fortress-like structure straddling the dome’s edge—part within, part without—and soldiers coming and going, as if it were a passage between worlds. Worse, the fortress sits directly on the tracks, and only the passengers who turned back are accounted for; those who disembarked in Yyasulani—including Namikka—remain unknown. Wuk Lamat refuses to hesitate and declares she’ll smash her way in, explaining Zoraal Ja wants her to “prove” herself as Father’s worthy successor—and if she fails, he’ll destroy Tuliyollal—so drawing his eyes to her is the surest way to protect the city. Wawlika offers the decisive answer: armor the train, load it with all the fuel it can carry, and send it hurtling straight into the fortress to explode on impact—one attempt, one blow. The engineers protest, then steel themselves; Nitowikwe insists no one is dying, promises they’ll jump off at the last moment, and you give your word to keep her safe. As Alphinaud returns to Tuliyollal to inform Koana and Y’shtola departs to pursue new investigations into the dome’s nature, you stay behind with the others to do what you can—finishing preparations, holding fast to the plan, and refusing to let the engineers’ sacrifice be for nothing.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'荒野に落ちる影',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたが現地に着くと、想像以上の人々が集まっていた。アリゼーは、どれだけ心を動かせたのか確信が持てなかったからこそ、最後まで声をかけ続けたのだと笑う。ヤ・シュトラは、多様な人々がひとつに結束している光景に静かな感銘を示し、クルルは、トラルの人々がこの戦いのために力を合わせた以上、決して期待を裏切ってはならないとあなたを引き締める。エレンヴィルは短く「……よくやった」と漏らし、グ・ラハ・ティアは、トラルに平和が戻った日に見たい景色が山ほどあるのだと、遠い未来を見据える。</p><p>いよいよ出発の刻が迫り、アルフィノは、残る者たちが途中まで同行すると告げる。ヤ・シュトラは、自分の目でドームを見たいと言い、アルフィノがウクラマトへ連絡しようとした瞬間、当の本人の呼び声が響く。アリゼーが親しげに「ラマチ」と呼びかけると、ウクラマトは、人々がひとつになり、希望を捨てていない姿こそが何よりの励ましだと受け止める。そしてあなたは、サカ・トラル・スカイゲートから出発する。</p><p>道中、ドームはシャーローニ荒野の向こうにあるはずなのに、ずっと背中に重くのしかかる。グ・ラハ・ティアは、エレンヴィルが案内役にいるのは心強いと言い、アルフィノは、宮殿ではコーナとケテンラムが引き続き政務を担うこと、自分はドームを調査したのち、さらなる侵攻に備える準備のために戻ることをあなたに伝える。アリゼーは油断を戒め、ヤ・シュトラは遠目でも違和感を感じ取る。クルルは食料や薬、装備が揃っていることを確認し、エレンヴィルの背嚢に詰め込まれた物資の量に感心する。そしてエレンヴィルは、ヤースラニはシャーローニから近い距離ではなく、列車が動かなければ別の移動手段も考える必要があるとあなたに言う。</p><p>全員が揃うと、ウクラマトは、ゾラージャを討ち、トライヨラに平和をもたらすために進むのだと宣言する。シャーローニ荒野では敵の動きも報告されているため、気を抜くなとあなたに告げる。さらに、ドームから連続して出現し、頭上に居座る飛行艦の存在をランドガードから聞いたと説明し、攻撃はしてこないものの、先へ進む前に周辺の様子を確かめたいと言う。そこであなたは、道中の集落を回り、シャーローニ駅へ向かうまでに状況を見て回ることになる。</p><p>フーサタイ宿場町では、ダストウォッチの保安官ケマッカが、飛行艦は現れた直後こそ驚かせたが、いまはただ浮かんで位置を保っているだけだと話す。しかし別の場所から不穏な報告も届いており、人手不足でシェシェネ青燐泉までは確認できていないという。近辺で機械仕掛けの兵士が目撃されたらしいと聞き、ウクラマトは人々の危険を案じて声を荒らげる。エレンヴィルも他の集落を心配し、あなたは、シェシェネ青燐泉へ向かう一方で、エレンヴィルがメワヘイゾーンへ立ち寄り、アリゼーが同行する形で手分けする。</p><p>シェシェネ青燐泉では機械仕掛けの兵士の姿は見当たらないが、槍で貫かれて動かない個体が残されていた。住民は、白装束の兵士に包囲されたところへ旅人が現れ、槍を手に一瞬で片づけたのだと、息を呑むような勢いで語る。だが安堵はすぐ不安に変わり、ヤースラニからは誰の消息も届かず、ナミーカの無事を祈るしかないとあなたに打ち明ける。そこへ当の槍使いが姿を見せ、エスティニアンは状況を把握していたことをあなたに示す。ウクラマトが礼を述べると、エスティニアンは機械仕掛けの兵士は大した相手ではないと言い、連王グルージャジャが討たれたという噂の真偽を問う。ウクラマトは事実だと認め、ゾラージャに報いを受けさせると誓う。エスティニアンはシャーローニ荒野に残って警戒を続けることを選び、デコワはウクラマトが決意の誓約者だと知って驚きつつも、ここを守り抜くとあなたに豪語する。あなたは、皆と合流するためシャーローニ駅へ向かう。</p><p>シャーローニ駅であなたは報告をまとめる。エスティニアンのおかげで人的被害はなく、他の集落も無事だった。だがドームは危険そのもので、ヤ・シュトラは雷属性の力が極めて高密度に集中しており、結界に触れることは致命的だとあなたへ警告する。そこでサカ・トラル鉄道の技師たちが、望遠鏡でドームの縁にまたがる要塞のような構造物を見たと語り、兵士が出入りしている以上、外と内をつなぐ通路になっているはずだと言う。しかも要塞は線路上にあり、ヤースラニへ向かった乗客のうち、戻ってきた者しか確認できず、ナミーカの行方も不明だ。ウクラマトは正面突破を選び、ゾラージャの視線を自分に釘付けにすることでトライヨラを守るのだとあなたに言う。ワウリカは決定打を示し、列車を装甲で補強し、燃料を限界まで積み、要塞へ突入させて衝突と同時に爆破させる一撃に賭けると宣言する。技師たちは反発しながらも覚悟を決め、ニトウィケは最後の瞬間に飛び降りればいい、誰も死なせないと断言する。あなたは彼女を必ず守ると約束し、アルフィノがコーナへ報せるためトライヨラへ戻り、ヤ・シュトラが新たな調査へ向かうあいだ、あなたは残った仲間とともに準備に取りかかり、この犠牲を決して無駄にしないと心に刻む。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> アルフィノ <small class="muted">（トライヨラ, X:12.0, Y:7.7）</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="putting-plans-into-locomotion.html">路を拓くために</a></div></div>`
  },

   story:`<div class="clamp" data-collapsed="true"><p>你抵達現場時，眼前聚集的人比你想像的還多。Alisaie 帶著一點不服輸的笑意，坦白說她其實也不確定自己到底說服了多少人，所以才決定一直做到最後。Y’shtola 望著不同族群此刻卻能同心站在一起，那份凝聚力本身就令人動容；Krile 的語氣更像提醒也像託付——Tural 的人們為了這一戰走到一起，你們絕不能辜負。Erenville 只低聲說了句「……她做得很好」，而 G’raha Tia 則把目光放得更遠，盼著和平重回 Tural 的那一天，還有太多他想親眼看見的事物。</p><p>出發的時間終於到了。Alphinaud 表示，留在後方的人會陪你走一段路；Y’shtola 也明說，她想親眼看看那座屏障的真面目。Alphinaud 正要去通知 Wuk Lamat，遠處卻先傳來她的喊聲——她大步走近，Alisaie 立刻親暱地叫了聲「Lamaty’i」。Wuk Lamat 看著這些願意站出來的人們，像是終於把心裡那口氣穩穩吞下：他們沒有放棄希望，光是這點就已經給了她足夠的力量。你們隨即從 Xak Tural Skygate 啟程。</p><p>路上，你不斷感覺到那座屏障的存在——它似乎在 Shaaloani 的更深處，卻像陰影一樣跟著你們前進。G’raha Tia 提到，多虧有 Erenville 帶路，才讓這段路更踏實；Alphinaud 也交代了安排：Koana 和 Ketenramm 會繼續在宮殿處理政務，他在親自確認那座屏障後，會回去協助準備，防範後續的入侵。Alisaie 要你們保持警戒；Y’shtola 則說，就算隔著距離，她也能感覺到那東西不對勁。Krile 逐一清點遠征所需——食物、藥品、裝備——甚至忍不住讚嘆 Erenville 的背包到底是怎麼塞得下這麼多。Erenville 也提醒你，Yyasulani 距離 Shaaloani 並不近，若火車無法運行，你們就得另想辦法趕路。</p><p>Wuk Lamat 確認所有人都到齊後，語氣直接而堅定：你們要去擊倒 Zoraal Ja，為 Tuliyollal 奪回和平。途經 Shaaloani 時已有敵方動向的回報，她要你們全程保持警覺。接著她提起 Landsguard 的情報——那些飛船從 the dome（罩住 Yyasulani 的巨型屏障）裡連續出現，接著就那樣高高懸在空中，像在用沉默展示力量。雖然它們暫時沒有採取攻擊行動，但她仍決定先確認沿途狀況；你們將會經過幾個聚落，正好可以一邊前往 Shaaloani Station，一邊打聽並觀察。</p><p>在 Hhusatahwi，你見到了 Dustwatch 的治安官 Kemakka。對方表示，那些飛船剛出現時確實嚇了大家一跳，但之後就只是停在空中、維持原位，沒有主動挑釁。不過他也收到其他地區令人不安的回報，因為人手分散，還沒能去 Sheshenewezi Springs 確認——據說那附近出現了機械士兵。Wuk Lamat 聽到立刻緊繃起來，擔心那裡的居民遭遇危險；Erenville 也同樣憂心其他聚落。你們很快分成兩路：你跟著 Wuk Lamat 前往 Sheshenewezi Springs，Erenville 則去 Mehwahhetsoan，Alisaie 決定陪他一起行動。</p><p>抵達 Sheshenewezi Springs 後，你沒有看到機械士兵成群出沒，卻看見一具被長柄武器貫穿、早已失去動靜的機械士兵殘骸。當地人告訴你，先前有一批穿著白色裝束的士兵包圍了城鎮，卻被一名路過的槍兵在瞬間解決——他手持長槍、身形躍起的模樣令人難忘。只是，說到最後，話題仍沉了下去：Yyasulani 那邊一直沒有消息，他們只能祈禱 Namikka 平安。就在這時，槍兵本人現身——Estinien；而他的同伴也大笑著把「傳聞」當成戰功。Wuk Lamat 向他致謝，Estinien 則淡淡表示那些自動兵器並不算強，反而問起一個更刺耳的傳言：Gulool Ja Ja 是否已死。Wuk Lamat 承認事實，說 Zoraal Ja 用了卑劣手段，她一定要讓他付出代價。Estinien 選擇留在 Shaaloani 監視情勢；那名快槍手得知 Wuk Lamat 的身份後震驚不已，卻也立刻拍胸脯保證會守住這裡、加緊巡邏。你們於是趕往 Shaaloani Station，準備和其他人會合。</p><p>回到 Shaaloani Station，你把各路回報拼起來：多虧 Estinien 的介入，Shaaloani 幾乎沒有傷亡；你們也確認其他聚落同樣平安。然而 the dome（罩住 Yyasulani 的巨型屏障）本身極其致命——Y’shtola 表示，那道屏障充斥著高度集中的雷屬性能量，光是接觸就可能送命，你們接近時必須萬分謹慎。此時，負責 Shaaloani 與 Yyasulani 間列車的工程師們提出關鍵線索：他們用望遠鏡看到一座要塞般的構造跨在屏障邊緣，一部分在外、一部分在內，士兵還從那裡出入——很可能就是通往內部的通道，但周遭防守森嚴，不易靠近。更糟的是，那座要塞居然就壓在線路上；而前往 Yyasulani 的乘客只有返程者能確認，包含 Namikka 在內、下車留在那邊的人都不知去向。Wuk Lamat 不打算隱匿行動，她要正面闖入，因為 Zoraal Ja 想看她「證明」自己配得上父親的繼承；她只要把意圖攤在陽光下，就能把他的目光鎖在自己身上，減少他對 Tuliyollal 的報復念頭。接著，Wawlika 提出唯一能一擊破局的辦法：把火車加裝護甲、塞滿燃料，沿著筆直的鐵軌衝向要塞，撞上去就引爆——只有一次機會，必須一擊見效。工程師們先是反對，最後仍咬牙接受；Nitowikwe 則堅持不會有人死，她會確保在最後一刻跳車。你向他們保證，你一定會護住她的安全。當 Alphinaud 回 Tuliyollal 通知 Koana、Y’shtola 也為了追查更多線索而離開時，你留在原地，和同伴一起把接下來的準備做到最好——你不會讓這份犧牲白白落空。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

const langToggle = document.getElementById('langToggle');
const pageTitle  = document.getElementById('pageTitle');
const tabBtns    = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story: document.getElementById('panel-story'),
  acq: document.getElementById('panel-acq'),
  unlockq: document.getElementById('panel-unlockq'),
  followq: document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => btn.textContent = t.tabs[btn.dataset.tab]);
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.async = true;
  s.setAttribute('crossorigin', 'anonymous');
  mount.appendChild(s);
}
</script>
</body>
