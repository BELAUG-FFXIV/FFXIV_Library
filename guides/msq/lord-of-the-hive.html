const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Lord of the Hive',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more',
    readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>When Ysayle asks if you are ready, there is no more room for hesitation. The plan has carried you deep into Gnath territory, and now it must be allowed to play out. She tells you to hold your ground and wait. When the Gnath next come, you are to offer no resistance. Sure enough, the drones descend upon you, demanding your surrender and declaring that there is no escape. Ysayle answers before the trap can fail: enough, she says. You surrender yourselves and throw your lives upon the mercy of their god.</p>
      <p>The Gnath bring you to the sacrificial chamber, and Ysayle quickly sees that the plan is working better than expected. They are eager to proceed, and more importantly, they have neither harmed nor disarmed you. Plainly, they believe their god to be invulnerable. Still, she marks the sound of the river roaring through the ravine behind you. Its noise is loud enough that, should you need to withdraw for a time, it may mask your escape. Even then, she cannot resist a dry warning: she hopes you are truly prepared, for she would not be amused if she were dragged away for sacrifice while you were still bargaining over the price of potions.</p>
      <p>At last, all that remains is to wait. The Gnath priest raises his voice in prayer to Lord Ravana, Master of the Sacred Blades, Wrath of the Colony, and Conqueror of the World. The god answers, taking form before his children and bidding them speak. They present you and Ysayle as intruders to be offered in blood, but Ysayle seizes the moment before the rite can continue. She addresses Ravana directly, declaring that you did not come to contest the Gnath’s territory. You came to learn why he leads them to war against the dragons.</p>
      <p>Ravana finds the question bold, and wonders why an Elezen would risk death for mere curiosity. Perhaps, he suggests, her own people’s struggle against the wyrms goes poorly, and she seeks a pact. Ysayle denies it. She wants no alliance with him, only peace. She wishes to end the war between man and dragon, but while the Gnath and Dravanians remain locked in conflict, that goal will stay beyond reach. Ravana’s answer is simple and terrible: to live is to fight. The Gnath waited in the shadow of the ceaseless war between Ishgard and dragonkind, gathering strength until their prayers gave him form and purpose. They desire the Dravanians dead and their territory secured, and he exists to fulfill that will.</p>
      <p>Ysayle understands then that Ravana’s very existence stands in the way of peace. Since he delights in battle, she challenges him, demanding that if you emerge victorious, he swear to withdraw his soldiers from Dravanian soil. Ravana accepts, but claims his own price: if he wins, you must serve in his army until your final breath. Ysayle accepts the terms and takes the first bout herself. Drawing upon the power of Saint Shiva, she appears before Ravana as a goddess clad in flesh, but the transformation is not enough. Ravana honors the duel and defeats her, laughing that whether god or maid, she is nothing before him. As Ysayle falls back, breathless and ashamed of her overconfidence, the battle passes to you.</p>
      <p>Against Ravana’s ringing steel and furious joy in combat, you prevail. The sacred rite declares you the victor, and the Lord of the Gnath lays his blades at your feet. Ysayle, humbled by what she has witnessed, tells you that you do not disappoint. She wishes she possessed your strength in battle, and she begins to understand why so many place their faith in you. For all Ravana’s savagery, she believes he will keep his word. If the dragons do not trespass upon Gnath lands, they should no longer need to fear his blades. You have done what was required, and the way back to Vidofnir may finally open.</p>
      <p>Yet victory does not pass unnoticed. Igeyorhm appears, naming you Bringer of Light and observing that you have once again achieved the impossible. But she warns that every mortal heart overcome by fear and fury adds another voice to the chorus begging for divine salvation. At their call, warring gods will shake the heavens, and the world will be consumed by a swelling storm of chaos. When you return to Alphinaud and Estinien, relief mingles with tension. Alphinaud is nearly overcome to see you and Ysayle alive, while Estinien cannot resist teasing him for his worry. Still, the truth remains: Ravana is banished, the promise to Vidofnir has been fulfilled, and this victory was only a means to reach Hraesvelgr before Nidhogg’s war consumes more lives.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Ysayle <small class="muted">(The Dravanian Forelands, X:29, Y:36.1)</small></div>

    </div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'武神降臨',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示',
    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>イゼルが覚悟はできているかと問うとき、もはや迷う余地はなかった。計画はあなたたちをグナース族の領域の奥深くまで導き、あとはその筋書きどおりに進めるだけだった。彼女は、その場で待つように言う。次にグナース族が来たとき、抵抗してはならない。やがて兵たちが現れ、逃げ場はないと叫びながら降伏を迫る。イゼルはすかさず声を上げる。もう十分だ、自分たちは降伏し、神の慈悲に身を委ねるのだと。</p>
      <p>グナース族はあなたたちを生贄の間へ連れていく。イゼルはすぐに、計画が予想以上にうまく運んでいることを見て取る。彼らは儀式を急ぎたがっており、何よりあなたたちを傷つけることも、武器を奪うことすらしていない。明らかに、彼らは自分たちの神が傷つけられるはずもないと信じきっているのだ。それでも彼女は、背後の峡谷を流れる川の轟音に気づく。その音は非常に大きく、もし一時的に退かねばならなくなったとしても、逃げる気配を隠す助けになるかもしれない。そんな状況でも、彼女は少し皮肉めいた調子で、あなたが本当に準備を終えていることを願うと言う。彼女が生贄として連れ去られる一方で、あなたが薬の値段を値切っていたなどということになれば、笑って済ませる気にはなれないからだ。</p>
      <p>ついに、待つだけの時が来る。グナース族の司祭は、聖なる刃の主、群れの怒り、世界の征服者たるラーヴァナへ祈りを捧げる。神はその子らの前に姿を現し、語るがよいと命じる。彼らは侵入者を捕らえたと告げ、その命の血を供物にしたいと願う。だがイゼルは、儀式が進む前に機を逃さずラーヴァナへ直接語りかける。自分たちはグナース族の領土を奪いに来たのではない。ただ、なぜ竜たちへ戦を仕掛けるのか、その理由を知りたかったのだと。</p>
      <p>ラーヴァナは、その問いを大胆だと受け取る。単なる好奇心のために死へ近づくのかと問う彼は、エレゼンである彼女の民もまた、竜との戦いに苦しんでおり、同盟を望んでいるのではないかと推測する。イゼルはそれを否定する。彼女が求めているのは同盟ではなく、平和だった。人と竜の戦を終わらせたい。だがグナース族とドラヴァニアの竜たちが争い続けるかぎり、その願いは果たせない。ラーヴァナの答えは単純で、そして恐ろしいものだった。生きるとは戦うこと。グナース族は、イシュガルドと竜たちの終わりなき争いの影で力を蓄えてきた。ドラヴァニアの竜を討ち、その地を自分たちのものにしたいという祈りが、彼に姿と目的を与えたのだ。</p>
      <p>イゼルは、その存在そのものが自分たちの目的を妨げていると悟る。戦を好むというなら、戦いで応じるしかない。彼女はラーヴァナへ挑戦し、自分たちが勝てば、兵をドラヴァニアの地から退かせると誓えと求める。ラーヴァナはそれを受け入れるが、勝者となった場合の代償も示す。もし彼が勝てば、あなたたちは最後の息が尽きるまで彼の軍に仕えねばならない。イゼルはその条件を受け入れ、自ら最初の一戦へ進む。聖シヴァの力を呼び、肉体をまとった神としてラーヴァナの前に立つが、その変身はなお足りなかった。ラーヴァナは誓いを守って決闘に応じ、彼女を打ち破る。神であろうと乙女であろうと、自分の前では何者でもないと笑う彼の前で、イゼルは息を切らし、自らの過信を詫びる。そして戦いはあなたへ託される。</p>
      <p>鳴り響く鋼と、戦の歓喜に満ちたラーヴァナを相手に、あなたは勝利を収める。聖なる決闘の儀はあなたを勝者と認め、グナース族の王はその刃をあなたの足元へ置く。イゼルは、その戦いを見届けて深く打たれる。あなたは期待を裏切らなかった。自分にもそのような戦いの技量があればと願い、なぜ多くの者があなたに信頼を寄せるのか、少しわかり始めたと告げる。ラーヴァナは野蛮であっても、誓いを破る存在ではないと彼女は見る。竜たちがグナース族の土地へ踏み込まぬ限り、その刃を恐れる必要は少なくなるはずだった。あなたたちは成すべきことを成し遂げ、ヴィゾーヴニルへ報告する道がようやく開ける。</p>
      <p>だが、その勝利は誰にも見られず終わるものではなかった。イゲオルムが姿を現し、光をもたらす者よ、とあなたを呼ぶ。あなたは再び不可能を成し遂げた。けれども、恐怖と怒りに呑まれる人の心が増えるたび、神の救いを求める声もまた増えていく。やがて、その声に応じた争いの神々が天を揺るがし、膨れ上がる混沌の嵐がこの世界を呑み込むだろうと彼女は告げる。アルフィノとエスティニアンのもとへ戻ると、安堵と緊張が入り混じっていた。アルフィノは、あなたとイゼルが無事に戻ったことに心から胸をなで下ろし、エスティニアンはその心配ぶりをからかわずにはいられない。それでも、事実は変わらない。ラーヴァナは退けられ、ヴィゾーヴニルとの約束は果たされた。そしてこの勝利は、ニーズヘッグの戦がさらに多くの命を呑み込む前に、フレースヴェルグへ謁見するための一歩にすぎなかった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> イゼル　高地ドラヴァニア <small class="muted">(X:29, Y:36.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="breaking-into-hives.html">危険な賭け</a></div>
      <div class="row"><b>討伐戦開放</b><a class="link" href="../trial/thok-ast-thok-hard.html">真ラーヴァナ討滅戦</a></div>
      <div class="row">ファイター ソーサラー（リミテッドジョブを除く） <small class="muted">Lv 53～</small></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="mourn-in-passing.html">霊峰を越えて</a></div>
    </div>`
  },

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'武神降臨',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>當 Ysayle 問你是否準備好了，你們已經沒有回頭或猶豫的餘地。計畫把你們帶進 Gnath 的領地深處，而現在，只剩下讓這場安排照預定走下去。她要你留在原地等待；下一次 Gnath 過來時，你們不能反抗。果然，Gnath 守衛很快現身，命令入侵者投降，宣告你們已無路可逃。Ysayle 立刻抓住時機，喊出你們願意投降，願意把性命交給牠們的神明裁決。</p>
      <p>Gnath 將你們帶到獻祭用的房間，Ysayle 很快看出計畫進展得比預期更順利。牠們似乎急著進行儀式，更重要的是，牠們既沒有傷害你們，也沒有解除你們的武裝。很顯然，牠們深信自己的神明不可戰勝。不過，Ysayle 也注意到身後峽谷中傳來的湍急水聲。那聲音相當響亮，若你們暫時需要撤退，或許能掩蓋逃離時的動靜。即使在這種情況下，她仍不忘帶著一點冷淡的幽默提醒你：她希望你真的已經準備好，否則若她都要被拖去獻祭了，你還在討價還價買藥，她可不會覺得好笑。</p>
      <p>接下來，你們只能等待。Gnath 祭司向 Lord Ravana（Gnath 召喚出的 primal，被尊為 Sacred Blades 的主人、Colony 的憤怒與世界征服者）高聲祈禱，請求祂賜予虔誠子民神聖的降臨。Ravana 回應了召喚，在信徒面前現身，命令牠們開口。祭司將你與 Ysayle 作為入侵者獻上，準備用你們的生命之血作為供物。Ysayle 卻在儀式繼續之前直接向 Ravana 發話，說你們並不是為了爭奪 Gnath 的領土而來，只是想知道，祂為何要帶領牠們向龍族開戰。</p>
      <p>Ravana 覺得這個問題相當大膽，反問一名 Elezen 為何願意為了好奇心而走近死亡。他猜測，也許是她自己的族人與巨龍之間的戰事並不順利，因此想與 Gnath 締結盟約。Ysayle 否認了這點。她渴望的不是同盟，而是和平。她想終結「人」與「龍」之間的戰爭，但只要 Gnath 與 Dravanians 仍被捲入衝突，這個目標就不可能實現。Ravana 的回答簡單而可怕：活著就是戰鬥。Gnath 長久在 Ishgard 與龍族無止境衝突的陰影下等待，累積自己的力量。牠們希望殺死 Dravanians，確保自己的領土，而正是這樣熾烈的祈願，賦予 Ravana 形體與目的。</p>
      <p>Ysayle 因此明白，Ravana 的存在本身就是和平路上的阻礙。既然祂如此喜愛戰鬥，她便向這位 Gnath 之神提出挑戰，要求若你們獲勝，祂就必須發誓撤回自己在 Dravanian 土地上的士兵。Ravana 接受挑戰，但也提出自己的條件：若祂獲勝，你們就必須在祂的軍隊中服役，直到最後一口氣耗盡。Ysayle 接受了這份賭約，並由自己先出戰。她借用 Saint Shiva 的力量，以「披著肉身的神」之姿站到 Ravana 面前；然而這份力量仍然不夠。Ravana 遵守約定迎戰，卻將她擊敗，並嘲笑無論她是神還是少女，在自己面前都毫無意義。Ysayle 氣息紊亂地退下，承認自己太過自信，而接下來的戰鬥便交到你手中。</p>
      <p>面對 Ravana 鏗鏘作響的鋼刃，以及祂對戰鬥的狂熱喜悅，你最終取得勝利。神聖的決鬥儀式承認了勝者，這位 Gnath 之神也將自己的刀刃放在你腳下。Ysayle 親眼見證這一切後，受到深深震撼。她說你沒有讓人失望，也希望自己能擁有你那樣的戰鬥本領。她開始明白，為什麼有那麼多人會把信任寄託在你身上。儘管 Ravana 野蠻好戰，她認為祂並不是會違背誓言的存在；只要龍族不踏入 Gnath 的土地，應該就不必再害怕祂那銳利的刀刃。你們已經完成必要之事，也終於能回到 Vidofnir 面前，帶去這個消息。</p>
      <p>然而，這場勝利並不是無人注視。Igeyorhm（Ascian 之一，暗中推動 primal 召喚與世界混亂的黑暗使徒）現身，稱你為 Bringer of Light，並指出你又一次完成了不可能之事。但她也警告，每當凡人的心被恐懼與憤怒吞沒，就會有另一道聲音加入祈求神明救助的合唱。當這些呼聲響起，彼此交戰的眾神將撼動天穹，而你的世界終將被不斷膨脹的混沌風暴吞噬。等你與 Ysayle 回到 Alphinaud 和 Estinien 身邊時，安心與緊張交織在一起。Alphinaud 看見你們平安歸來，幾乎終於能放下心來；Estinien 則不忘取笑他一路擔心得像等待情人的少女。不過，重點已經明確：Ravana 已被擊退，你們對 Vidofnir 的承諾已經完成。而這場勝利，也只是為了在 Nidhogg 的戰爭吞噬更多生命之前，取得謁見 Hraesvelgr 的機會。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
