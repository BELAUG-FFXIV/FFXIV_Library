const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'A New Family',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more',
    readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Gulool Ja tries to sound brave in front of you—saying he’ll be fine and you don’t need to worry—but Wuk Lamat’s voice is heavier as she admits they still don’t know what became of Cahciua. Shale’s grief spills out at the name, and then the truth follows: they all knew Cahciua was already gone, and Cahciua made them swear to keep silent until she could tell you herself—especially with Erenville in mind.</p>
      <p>When Wuk Lamat asks after the people, Shale explains that Zoraal Ja hasn’t been forgotten. With the summit gate closed and information scarce, most are still in the dark; they’ll be relieved to learn the king was defeated, yet panic could spread if word breaks that the queen has vanished. For now, Geode is reaching out to the authorities, and they agree it’s best to keep everything under wraps a while longer.</p>
      <p>Then Shale shares what happened to the mechanical army: at the moment they believe Zoraal Ja died, the system transferred the king’s authority to Gulool Ja. Wuk Lamat reels at what that implies, but Gulool Ja shrinks from it—he doesn’t want to be king. Wuk Lamat tells him he doesn’t have to decide today, yet that authority also means command, and it can’t be cast aside lightly—so for now, she asks him to hold on to what his father left him.</p>
      <p>Gulool Ja checks on Wuk Lamat—calling her “Lamaty’i”—and she suddenly falters, shaken by emotions she can’t sort out: after everything her brother did, she still can’t decide what she feels, and that confusion disgusts her. You steady her with the simple truth that this is normal, and that time will be part of the answer, and she lets herself believe you. With Shale saying the situation is under control, Wuk Lamat chooses to return to Tuliyollal to rest and to speak with Koana—and she invites Gulool Ja along. When he whispers that everyone will hate him, she promises she’ll set them straight, and she smiles as she calls it what she wants it to be: new family.</p>
      <p>Back in Tuliyollal, Koana rushes down to meet you, demanding to know where Wuk Lamat is and what happened inside the dome. Wuk Lamat arrives and introduces the boy at her side: Zoraal Ja’s son, Gulool Ja. Koana takes in how time moved differently within the dome, then greets Gulool Ja properly—brother to “Lamaty’i,” and, as Gulool Ja shyly tries it out, “Uncle Koana.” Wuk Lamat doesn’t let the moment drift into suspicion; she draws a hard line—Gulool Ja is his own person, innocent of his father’s crimes, and any anger meant for Zoraal Ja should be brought to her and Koana, not to a child. The people around them agree, and Koana asks for the full account as you all walk.</p>
      <p>As the city comes into view, Wuk Lamat tells Koana what the dome truly held: Zoraal Ja’s realm, ruled with Sphene—he as the King of Resolve, she as the Queen of Reason, mirroring the roles Wuk Lamat and Koana bear at home. Their people lived differently, yet fully, and Sphene stood at the heart of it—warm, approachable, treating everyone as family. Wuk Lamat admits she and Sphene did get along… and that makes it hurt more to say what came next: Sphene chose the wrong path for love of her people, and the Alexandrians who welcomed you with respect were slaughtered by Zoraal Ja—those he was meant to protect.</p>
      <p>Wuk Lamat explains how, after his failed attack on Tuliyollal, Zoraal Ja chased greater power—executing his own people and harvesting their souls. Gulool Ja’s voice breaks as he tries to understand his father, wondering if he only wanted to prove he was his own person, not just the great man’s son. Koana agrees that the weight of expectation on the Resilient Son was far heavier than any of them imagined, and Gulool Ja’s fear slips out: maybe that’s why his father became what he was… and why he didn’t want him. Wuk Lamat curses herself for not reaching out harder, and Koana admits even his childhood envy may have added to his brother’s burdens.</p>
      <p>At last Wuk Lamat tells them the end of it: Zoraal Ja became unimaginably powerful, and only with your help could he be defeated. Now she carries responsibility—toward Alexandria, and above all toward Gulool Ja. She reminds him of her promise: she wants you to be family, not out of obligation, but because she truly cares for him now. Then, with the same fearless warmth, she pulls you into it too—after everything you’ve endured together, you’re family as well, whether Koana is ready for that or not. And when she speaks of making her family bigger, she does it the way her Papa once did—by opening the door, not closing it.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'新たな家族を迎えて',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示',
    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>グルール・ジャはあなたの前で気丈に振る舞い、「大丈夫だよ、心配しなくていい」と言う。だが、ウクラマトは重い面持ちで、カフキワの行方がまだ掴めていないことを告げる。シェールはその名に胸を痛め、そして隠されていた真実を明かす――彼女がすでに“いない”ことを、皆わかっていたのだと。けれどカフキワは、いつか自分の口で伝えるために沈黙を命じた。とりわけエレンヴィルに真実をどう告げるか、その葛藤を抱えながら。</p>
      <p>ウクラマトが民の様子を問うと、シェールは「ゾラージャのことは忘れられていない」と答える。山頂の門が閉ざされ、情勢を知らぬ者が多い今、王が討たれたと聞けば安堵するだろうが、理王が姿を消したと知れば混乱は避けられない。ジオードが各機関に連絡を取っているが、しばらくは情報を伏せるのが得策だと、あなたたちは同意する。</p>
      <p>さらに、機械兵団の件が語られる。ゾラージャが倒れたと推測される時点で、王権はグルール・ジャへ移譲されたらしい。ウクラマトは愕然とするが、グルール・ジャは首を横に振る――王になどなりたくない。ウクラマトは「今すぐ決めなくていい」と言いながらも、王権は軍の指揮権でもあり、軽々しく手放せないと伝え、ひとまず父が遺したものを保持してほしいと頼む。</p>
      <p>グルール・ジャは「ラマティ」とあなたの前でウクラマトを気遣うが、ウクラマトはふいに崩れ、心が追いつかない自分に苛立つ。兄が為した数々の罪を思えば憎むべきなのに、それでも感情が定まらない――その揺らぎが、彼女には耐え難い。あなたが「それでいい」「時間が必要だ」と受け止めると、ウクラマトはようやく息をつく。シェールは「こちらで対処する」と告げ、あなたたちはトライヨラへ戻って休むことにし、ウクラマトはグルール・ジャも誘う。皆に嫌われるのではと怯える彼に、ウクラマトは「私が正してみせる」と断言し、コーナに“新しい家族”として紹介したいと微笑む。</p>
      <p>トライヨラに戻ると、コーナがあなたたちの帰還に安堵しつつ、ドームの中で何があったのかを問い詰める。ウクラマトは少年を示し、「ゾラージャの息子、グルール・ジャだ」と紹介する。コーナは時の流れの違いを悟り、丁寧に名乗ったうえで、少年の呼びかけに少し照れながら「コーナでいい」と応じる。だがウクラマトは、場の空気が疑念に傾く前に釘を刺す――グルール・ジャは父とは別の人間であり、罪に加担していない。怒りを向けるなら自分とコーナが受け止める、だからこの子には他の子どもと同じように優しく接してほしい。周囲もそれに頷き、コーナは歩きながら詳しい話を聞かせてくれと頼む。</p>
      <p>ウクラマトは語る。ドームの中はゾラージャの領域であり、そこでは彼が武王、スフェーンが理王として並び立っていた――あなたたちが抱える誓約と重なるように。民の暮らしは違っても、皆は精一杯生きていて、スフェーンは家族のように人々へ寄り添う統治者だった。だからこそ痛いのだと、ウクラマトは言う。スフェーンは民を思うがゆえに誤った道を選び、あなたたちを歓待したアレクサンドリアの人々は、守るべき存在だったはずのゾラージャに虐殺されたのだと。</p>
      <p>そして、トライヨラ襲撃が失敗したのち、ゾラージャは力を求めて自国民を処刑し、魂を刈り取ったという。グルール・ジャは祖父の偉大さと父の影を思い、父が「自分自身」であろうと足掻いたのではないかと口にする。コーナは、武王の嫡子として背負わされた期待の重さを認め、ウクラマトは届かなかった手を悔やむ。やがてウクラマトは、ゾラージャを討つうえであなたの助けが不可欠だったこと、そしてこれからはアレクサンドリアとグルール・ジャに責任を負うことを宣言する。家族になろうと言った約束は義務ではなく、心からそう思うからだと。さらに彼女はあなたにも手を伸ばし、「あなたも家族だ」と言い切る。パパが自分たちを迎え入れたように、家族を増やしたいのだと。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ウクラマト　バックルーム <small class="muted">(X:6.0, Y:6.3)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-resilient-son.html">奇跡の子</a></div>
      <div class="row">ファイター ソーサラー（リミテッドジョブを除く） <small class="muted">Lv 99</small></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="in-pursuit-of-sphene.html">彼女を追うために</a></div>
    </div>`
  },

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'新的家人',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Gulool Ja 在你面前努力裝得堅強，說自己沒事、要你別擔心；但 Wuk Lamat 的語氣沉得多——Cahciua 的下落依然不明。Shale 聽見名字就忍不住哽咽，接著把真相說出口：她們其實早就知道 Cahciua 已經不在了，只是 Cahciua 不准任何人先說，她想等到「時機到了」再親口告訴你——尤其是，面對 Erenville，她也一直在痛苦地掙扎該怎麼揭開這一切。</p>
      <p>你們談到民眾的狀況時，Shale 說大家並沒有忘記 Zoraal Ja。由於山頂的門被關閉、消息也被壓著，多數人仍不清楚發生了什麼；聽見「王已被擊敗」或許會鬆一口氣，但若知道「女王失蹤」，恐怕又會引發恐慌。眼下 Geode 正在聯絡各個機關，你們也同意暫時先把真相壓住，等局勢真正穩住再說。</p>
      <p>接著，話題轉向 Zoraal Ja 的機械軍隊。Shale 表示，在推測 Zoraal Ja 死去的那一刻，系統似乎把王權轉移到了 Gulool Ja 身上。Wuk Lamat 震驚到幾乎說不出話，而 Gulool Ja 立刻退縮——他不想當王。Wuk Lamat 告訴他不必立刻做決定，但那份權限也代表著指揮軍隊的力量，不能輕易丟開；至少現在，她希望他先握住那份遺留，先撐住。</p>
      <p>Gulool Ja 小心翼翼地問 Wuk Lamat 你還好嗎，喊她「Lamaty’i」；Wuk Lamat 卻突然像被什麼扯住一樣，情緒失控——明明哥哥做了那麼多可怕的事，她卻仍說不清自己對他到底是什麼感覺，這份動搖讓她無法原諒自己。你把話說得很簡單：這很正常，而且你需要時間。她終於稍微鬆開緊繃，Shale 也說目前局面已能掌控，建議你們先回 Tuliyollal 休息、其餘人繼續調查。Wuk Lamat 乾脆邀 Gulool Ja 一起回去；當他擔心大家會恨他時，她保證會替他說清楚，還想把他介紹給 Koana——作為新的家人。</p>
      <p>回到 Tuliyollal，Koana 看到你平安歸來立刻迎上來，急著追問 Wuk Lamat 在哪裡、以及 the dome（罩住 Yyasulani 的巨型屏障）裡到底發生了什麼。Wuk Lamat 走到你身邊，正式介紹身旁的孩子：Zoraal Ja 的兒子，Gulool Ja。Koana 立刻意識到 the dome（罩住 Yyasulani 的巨型屏障）內外時間流速不同，仍鄭重向 Gulool Ja 自我介紹；Gulool Ja 生澀地喊他「Uncle Koana」，Koana 也只能苦笑承認自己確實算是舅舅，但叫他 Koana 就好。Wuk Lamat 隨即把界線劃得清清楚楚：Gulool Ja 是他自己，和父親的罪無關；若有人對 Zoraal Ja 有怒火，她和 Koana 都願意承受，但你們必須像對待任何孩子一樣，善待 Gulool Ja。</p>
      <p>走在城裡，Wuk Lamat 開始說明 the dome（罩住 Yyasulani 的巨型屏障）之中究竟是什麼——那是 Zoraal Ja 的領域，他與 Sphene 共同統治：他是決意之王，Sphene 則是理智之王，彷彿映照著你們在 Tuliyollal 承擔的角色。那裡的人們過著和你們截然不同的生活，卻同樣把日子活到盡頭；而 Sphene 是其中最溫柔、最能貼近民心的存在，像家人般對待每一個人。也正因為如此，Wuk Lamat 才更難接受——為了她的人民，Sphene 選錯了路；而那些曾把你們迎進家門、以尊重與善意相待的 Alexandria 人民，卻被 Zoraal Ja 親手屠殺——被他殺死的，正是他原本該守護的人。</p>
      <p>Wuk Lamat 接著說，當襲擊 Tuliyollal 失敗後，Zoraal Ja 為了獲得更強的力量，下令處決自己的人民、收割他們的靈魂。Gulool Ja 壓著顫抖去理解父親，問起祖父是不是很偉大，猜測父親或許只是想證明自己是「他自己」，而不是偉大之人的兒子。Koana 認同那份壓力遠超想像，Wuk Lamat 也痛恨自己沒有更努力伸手去拉住哥哥。當她說起「只有在你的幫助下，才能擊敗強到不可思議的 Zoraal Ja」時，她也把未來的責任說得毫不含糊：她要對 Alexandria 的人民負責，更要對 Gulool Ja 負責。她再次確認那句「成為家人」的承諾並非出於義務，而是因為她真的喜歡上了這個孩子；接著她又把你也拉進來，說你們一路走到這裡，早就是家人了。她說她想像爸爸曾經把你們收進家門那樣，讓自己的家變得更大——而 Gulool Ja 也小聲卻用力地附和：他也想和你成為家人。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 烏克·拉瑪特，後室 <small class="muted">(X:6.0, Y:6.3)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-resilient-son.html">奇蹟之子</a></div>
      <div class="row">任一戰鬥／魔法職（不含限制職業） <small class="muted">Lv.99</small></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="in-pursuit-of-sphene.html">追上她</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
