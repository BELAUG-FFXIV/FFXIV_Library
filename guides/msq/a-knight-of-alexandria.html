    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Wuk Lamat urges you to track down Otis, certain he knows the truth of the past—of Alexandria as it once was, and of Sphene when she still lived. Yet Otis doesn’t seem inclined to speak, so you decide to approach him through the Founding Celebration instead, offering help in hopes that it will thaw his guarded mood. You find him near the air cab station, rehearsing aloud—caught between “Are you harmed?” and “Are you unharmed?”—before he startles at your presence. You apologize for interrupting, and though he insists the script is his own and the lines will be fine, he admits there is one scene he cannot get right.</p><p>Wuk Lamat, unable to resist the promise of fun, asks to join in. Otis bristles, claiming he is busy, but then concedes the truth: the celebration’s special program is a children’s play about the realm’s history, and with fewer of them being given form, the production is short-handed. He has been tasked with writing the script and performing as himself besides. Wuk Lamat steadies the moment with reassurance, and Otis finally names what he needs—help drawing an audience. If you can spread word to the children of Yesterland, he will owe you. To make the task more appealing, he produces adorable animal costumes—glamours—and offers to activate one for you when you are ready.</p><p>Once you don the costume, you set out in the vicinity of the air cab station, making the invitation into a game. Children turn toward you in delight and disbelief—a “rabbit monster,” a silly-costumed visitor, someone who must be here for Queen Sphene. Some claim they’ve seen the play countless times, yet even they brighten at the twist: Otis will be performing as himself. Others are eager the moment they hear Princess Sphene will be part of it. One child speaks with unsettling certainty—of the great golden statue, of a terminal that is a tomb, of Her Majesty watching over everyone. You promise them this performance will be worth seeing, and one by one they decide to go.</p><p>When you return, Otis takes back the costume and thanks you—your rounds gave him the time he needed to memorize his lines to satisfaction. Wuk Lamat calls it fun meeting “Endless children,” and Otis pauses at the phrasing, reminding you that they themselves are Endless. The play is about to begin, and as Otis prepares to leave, he stops and makes a new offer: what if the two of you appear on stage as well? Not a speaking role—just a bit of swordplay, a duel between Alexandrian and Lindblum soldiers, certain to thrill the children. You answer with brazen enthusiasm—this Alexandrian knight is going to take you down!—and Otis laughs, satisfied. With no time to rehearse, mistakes will only make it more entertaining. He sends you to Proto Alexandria to await instructions.</p><p>Night falls on the performance, and the narrator declares the tale one from long, long ago: a great conflict over precious electrope, Alexandria thrown into chaos, its royal capital besieged. Knights lay down their lives for Princess Sphene, and the audience gasps as the “royal knight” appears. What follows turns strangely personal—Wuk Lamat overplays a dramatic death, the Sphene actress cries for everyone to flee, and Otis steps into the scene with the line he practiced: “Are you unharmed?”—to which she answers, smiling, “I am thanks to you, my dearest Otis!” The children squeal; even your companions in the crowd react in disbelief. Then the story darkens: the invaders are repelled, only to unleash a forbidden weapon, bringing calamity and countless deaths—Queen Sphene among them. In the confusion, Wuk Lamat clumsily improvises, grasping for the ending: the people grieve, yet guided by her compassion, they endure hardship together and build a peaceful, prosperous Alexandria—a new Alexandria.</p><p>Afterward, Otis admits the memories seized him mid-performance. He asks if you come from a time after his—and when you confirm you are living people, not Endless, he speaks the question he has feared: does Alexandria still exist? You tell him it does—changed, yet enduring—and that the descendants of his people still walk its streets as proud Alexandrians. Relief breaks through him, fragile and real. He recalls volunteering as a test subject when they researched ways to resurrect Her Majesty through memory preservation, but the details remain a fog. Still, he asks about the “incarnation” of himself you met. You tell him the truth: that other self was a proud and valiant knight—and more than that, a father in all but name to the new king, Gulool Ja. Whatever he believes he failed to do, his deeds and sacrifice gave you hope when you desperately needed it. Otis laughs through the weight of it, calling it a miracle, and entrusts you with a final request: watch over the new king. The war changed his queen, grief shadowing her gentle face to the end, and he prays Gulool Ja will have reason to smile throughout his days.</p><p>At the Geo Terminal, the joy of the night cannot fully smother what waits ahead. Erenville looks at Yesterland’s amusements and realizes why so much here is made for children—and how cruel that truth is, if the form of an Endless reflects their happiest self. Krile praises your unexpected turn on stage; G’raha Tia calls the play unforgettable, even if it was the last performance. Yet shutting down the terminal will erase Yesterland as it is, and Wuk Lamat admits that the more dearly you come to hold someone, the harder it is to say farewell. Cahciua notes that the knight who once looked after Gulool Ja has found someone to follow in his footsteps, and you vow to carry what you learned here—how deeply Sphene’s people loved her, how fiercely they yearned for peace. When the moment passes and the terminal is shut down, it feels like waking from a sweet dream into bitter reality—but Cahciua reminds you that they are more than memories in machines. So long as someone remembers and carries on their legacy, they will not truly fade, and you press forward.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="the-sanctuary-of-the-strong.html">The Sanctuary of the Strong</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'アレクサンドリアの王国騎士',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ウクラマトは、オーティスを追おうと言う。彼なら、過去のこと――古きアレクサンドリアのことも、生きていた頃のスフェーンのことも知っているはずだ。だが当のオーティスは話す気にならなさそうで、ならば建国記念祭の準備を手伝って懐に入ろう、という算段になる。エアキャブ乗り場の近くで見つけた彼は台本を手に、独り言のように台詞を反芻していた。「傷はないか」か、「無事か」か――言い回しに迷いながら、王女の返答まで口にする。そこへ近づいたあなたに気づき、彼は苛立ち混じりに顔を上げる。あなたが稽古の邪魔を詫びると、オーティスは台本は自作で本番も問題ないと言い切りつつも、どうしても上手くいかない場面があるのだと漏らす。</p><p>面白そうだと身を乗り出すウクラマトに、オーティスは忙しいのだと突っぱねる。だが結局、彼自身が人手不足に追い詰められていることを認める。今回の建国記念祭では、子どもたちのために「この国の歴史」を題材にした芝居を上演する予定だという。けれど姿を与えられる者が減り、手が足りない。だからオーティスは脚本を書くだけでなく、自分自身として舞台にも立たねばならなくなった。ウクラマトが落ち着かせるように「喜んで手伝う」と告げると、オーティスは頼みを口にする。観客集めが難しいので、イェスタランドの子どもたちに芝居の宣伝をしてきてほしい。さらに気を引くため、可愛らしい動物の衣装も用意してある――グラマーだ。準備ができたら、あなたにもそれを起動してやると言う。</p><p>衣装をまとったあなたは、エアキャブ乗り場の周辺で子どもたちに声をかけて回る。うさぎの化け物だと騒ぐ子もいれば、ふざけた格好の来訪者を面白がる子もいる。スフェーン女王のことや、城での芝居のことを知っている子もいたが、今回は特別だと伝えると目の色が変わる。何より「オーティスが本人役で出る」という一言が決定打になり、何度も見たはずの芝居でも、もう一度見に行くと言い出す子まで現れる。あなたが宣伝を終えて戻ると、オーティスは衣装を受け取り、礼を述べる。</p><p>おかげで台詞を十分に覚えられたと、オーティスは深々と感謝する。ウクラマトが「永久人の子どもたちに会えて楽しかった」と言いかけると、オーティスは妙な言い方だと首を傾げる――自分たちも永久人なのだから、と。だが芝居の開演が迫り、彼は会場へ向かう支度を始める。そこでふと足を止め、あなたとウクラマトに提案する。舞台に出てみないか。台詞は要らない、アレクサンドリア兵とリンドブルム兵の決闘を見せるだけでいい。子どもたちはきっと喜ぶ。あなたが「このアレクサンドリアの騎士が叩きのめしてやる」と勢いよく応じると、オーティスは満足げに笑い、衣装を用意しておくと言う。稽古はできなくとも、小さな失敗はむしろ見世物として良い――そうしてあなたはプロト・アレクサンドリアへ向かうことになる。</p><p>やがて舞台が始まり、語り手は「遠い昔の物語」だと告げる。貴重なエレクトロープをめぐって大きな争いが起こり、アレクサンドリア王国は混乱に巻き込まれ、王都は包囲される。王女スフェーンのために王国騎士たちが命を賭して戦う――観客の子どもたちが騎士の登場に沸き、場内は一気に熱を帯びる。ウクラマトは大袈裟に倒れ、スフェーン役は「逃げて！」と叫ぶ。そこへオーティスが駆け寄り、稽古していた台詞を口にする。「無事か？」――スフェーン役は微笑み、「あなたのおかげよ、愛しのオーティス」と返す。だが勝利の喜びは短く、敵は禁じられた兵器を放ち、恐るべき災厄が訪れる。多くの命が失われ、スフェーンもそのひとりとなる。混乱の中、ウクラマトは必死に物語をつなぎ、「人々は悲しみながらも、彼女の慈しみの遺志に導かれて困難を乗り越え、やがて平和で繁栄した新たなアレクサンドリアを築いた」と締めくくる。</p><p>終演後、オーティスは記憶に絡め取られたと告白する。即興の中で「新たなアレクサンドリア」と語ったことから、あなたが自分の時代より後から来たのではないかと問い、あなたが「生きた人間で、永久人ではない」と答えると、彼はさらに踏み込む。アレクサンドリアは、今も存在するのか――恐ろしくて聞けなかった問いだという。あなたは「存在する」と告げる。かつての姿のままではないが、受け継がれ、今も人々が誇り高きアレクサンドリア人として日々を生きている。オーティスは安堵し、そして自分にも「別の自分」がいたと聞いて戸惑う。かつてスフェーン復活のため、記憶保存の研究で被験者を志願したことを思い出すが、肝心な部分は霧の中だ。それでも彼は問いかける――その自分は、どんな騎士だったのか。あなたは答える。誇り高く勇敢な騎士であり、最後まで王女を守ろうとした魂だった。そして何より、新たな王グルージャにとって名こそ違えど父のような存在だった、と。オーティスはそれを奇跡だと笑い、あなたに願う。新たな王を見守ってほしい。戦争はスフェーンを変え、最期まで悲しみがその優しい面差しを曇らせた――だからこそ、グルージャには笑っていてほしい、と。</p><p>そしてアースターミナルへ向かう道すがら、胸の内は軽くならない。エレンヴィルは、イェスタランドが子ども向けの遊びで満ちている理由を悟り、永久人の「最も幸せな姿」が示すものに思いを巡らせる。クルルは舞台に立ったあなたたちを褒め、グ・ラハ・ティアはこの夜の芝居を忘れがたいものだと言う。だがアースターミナルを停止すれば、イェスタランドとそこで暮らす永久人は今の形ではいられない。ウクラマトは、別れが難しくなるのは大切に思うほどだと告げ、最後にここで出会った者たちのことを口にする。カフキワは、グルージャを見守った騎士の歩みをあなたが継いでいると言い、あなたは誓う。スフェーンの民がどれほど彼女を愛し、どれほど平和を願っていたか――そのすべてを抱えて進む、と。甘い夢から苦い現実に目覚めるような痛みが残っても、カフキワは言う。誰かが覚え、遺志を運び続ける限り、彼らは本当の意味で消えはしない。あなたは前へ進む。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ウクラマト <small class="muted">（リビング・メモリー, X:29.1, Y:32.5）</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="the-sanctuary-of-the-strong.html">ヴォルケーノアサイラム</a></div></div>`
  },

    story:`<div class="clamp" data-collapsed="true"><p>Wuk Lamat 說要去追 Otis——他一定知道過去的真相：包括古老的 Alexandria，也包括 Sphene 還是「活著的人」時的模樣。問題是 Otis 目前看起來完全不想開口，所以你們決定換個方式接近他：先主動幫忙 Founding Celebration（Alexandria王國誕生紀念性質的慶典活動），也許能讓他對你們放下戒心。你們在 air cab station 附近找到他，他正拿著劇本反覆排練，糾結著該說「你受傷了嗎」還是「你平安無事嗎」，甚至把 Sphene 的回應也一併念了出來。你出聲後他猛地一驚，語氣不太客氣；你立刻道歉說不是故意打斷排練，而他雖然強調劇本是自己寫的、台詞本該沒問題，卻也坦承有一幕怎麼都抓不住。</p><p>Wuk Lamat 覺得這聽起來很有趣，想加入排練，Otis 卻冷冷回絕，說自己很忙。但他終究還是鬆口：這次 Founding Celebration 要演一齣給孩子看的戲，內容是「王國的歷史」。可如今能被賦予形體的人變少了，整個製作人手不足，他不只得寫劇本，還得親自上台演自己。Wuk Lamat 放緩語氣安撫他，表示你們是真的願意幫忙；Otis 這才說出需求——因為同樣的人手問題，連聚集觀眾都變得困難，他希望你們去 Yesterland 對孩子們宣傳這齣戲。為了更吸引他們，他還準備了可愛的動物裝：是變裝。只要你準備好，他也會替你啟動一套。</p><p>你穿上 Otis 給的裝扮，在 air cab station 周邊向孩子們推廣這場演出。有人興奮地把你當成「兔子怪物」，有人對這身滑稽的造型笑個不停；也有人本來覺得那齣戲早就看膩了，直到你提到「Otis 會以本人身分上台」，立刻改口說這次一定要再看。還有孩子指著那座巨大的金色雕像，說那就是 Queen Sphene 的樣子——媽媽是科學家，媽媽也說終端機就像一座墳墓，Sphene 一直從那裡守望著所有人。你把「這次會不一樣」說得像一場邀請，於是他們一個接一個決定要到城裡去看戲。</p><p>你們回到 Otis 身邊，他收回裝扮，真誠地向你們道謝——因為你們代他宣傳，他才能把台詞背到滿意。Wuk Lamat 說能遇見Endless（以死者的記憶為本體、在 Living Memory 中被系統維持的存在）的孩子們很有意思，Otis 卻對這說法露出疑惑：你們自己也是Endless，為什麼要把他們講得像另一種存在？Wuk Lamat 含糊帶過，說現在解釋太複雜、而且演出就要開始了。Otis 準備趕去會場做最後確認，卻又突然停下來，問你們要不要也上台演一段——不用台詞，只要做一場「Alexandria 士兵對 Lindblum 士兵」的決鬥，孩子們一定會喜歡。你回得乾脆又挑釁：這名 Alexandria 的騎士要把對手打趴。Otis 當場拍板，說就這麼定了；雖然來不及排練，但小失誤反而更有娛樂效果，然後要你們前往 Proto Alexandria 等候指示。</p><p>演出開始後，Narrator 宣告這是一段「很久很久以前」的故事：珍貴的 electrope（黑色礦石，可儲存雷屬性能量並轉換為其他能量）引發了巨大的衝突，Kingdom of Alexandria 被捲入戰火，王都遭到圍攻，王國的騎士們為了 Princess Sphene 赴死也在所不惜。觀眾席的孩子們看見「王國騎士」登場就驚呼連連，而你們的臨時上場更讓一切變得失控又熱鬧——Wuk Lamat 誇張地倒下喊著自己被「殺了」，Sphene 的演員急喊所有人快逃，Otis 衝上前說出他反覆練過的那句：「你平安無事嗎？」而她微笑回應：「我多虧了你，我親愛的 Otis。」孩子們尖叫，旁觀的同伴也忍不住錯愕。接著劇情轉暗：敵人被擊退後仍不甘心，竟放出禁忌武器引發可怕災厄，無數人喪生，Sphene 也在其中。舞台一片混亂時，Wuk Lamat 只能硬著頭皮即興收尾，說人們雖為女王的死悲痛，卻在她溫柔遺志的指引下彼此扶持、跨越苦難，最終建立起和平繁榮的「新的 Alexandria」。</p><p>散場後，Otis 承認自己在台上被回憶牢牢攫住。他提到你們即興時說了「新的 Alexandria」，因此小心翼翼地問：你們是否來自他那個年代之後？當你坦白你們是「活著的人」，不是永久人，他終於說出自己一直不敢問的問題：Alexandria……如今還存在嗎？你告訴他：存在。它已不是他熟悉的模樣，但仍然延續著；他的人民後裔走在那座城裡，作為驕傲的 Alexandrians 活著。Otis 反覆念著「他們活著……我們活著……」，像是終於得到一點安寧。他又困惑地聽見「你遇過另一個他」，隱約想起自己曾在研究「記憶保存、用以復活陛下」時自願成為試驗者，卻仍想不起細節。於是他請你描述那個「他」：你說那是個驕傲而英勇的騎士，直到最後都守在女王身旁；而且不只如此——他幾乎就像爸爸一樣照看著新王 Gulool Ja。你也告訴他，你們之所以能撐到現在，是因為他的行動與犧牲曾帶來你們最需要的希望。Otis 失笑，說這只能稱作奇蹟，並拜託你們看顧新王；戰爭改變了 Sphene，悲傷讓她連到最後都難以再露出原本的溫柔神情——所以他只願 Gulool Ja 的一生，都能有值得微笑的理由。</p><p>到了 Geo Terminal 前，歡笑的餘韻不再能掩住沉重。Erenville 看著 Yesterland 幾乎全是給孩子的遊樂與表演，才明白這意味著什麼：若永久人的形體反映的是「最幸福的自己」，那麼他們不是來不及長大，就是長大後再也找不到更幸福的時刻。Krile 說沒想到你們會登台，卻做得很好；G’raha Tia 說那是一場精彩的演出，即使是最後一場，也會永遠刻在記憶裡。可一旦關閉 Geo Terminal，就無法再把 Yesterland 恢復成現在的樣子，Wuk Lamat 也承認：越是珍惜誰，就越難說再見。她想在動手前先為在這裡遇見的人說幾句，而 Cahciua 也點出那份連結——曾照看 Gulool Ja 的那位騎士，如今你也正走在相似的道路上。你回應：你們已經明白 Sphene 的人民有多愛她、又多渴望和平，這一切你們都會帶走。當 Geo Terminal 關閉後，Wuk Lamat 說那像是從甜美的夢裡醒來、回到苦澀的現實；但 Cahciua 也提醒你們：只要有人記得、有人把遺志繼續往前推，他們就不會真正消失。你們仍得繼續前進。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 烏克·拉瑪特 <small class="muted"> 憶想之地（X:29.1, Y:32.5)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-land-of-dreams.html">希望的主題樂園</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.99</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-sanctuary-of-the-strong.html">火山庇護所</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
