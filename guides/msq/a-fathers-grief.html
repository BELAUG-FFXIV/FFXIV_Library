const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`A Father’s Grief`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>With the Feat of the Brotherhood now in sight, Wuk Lamat urges everyone onward, but Erenville admits there is a problem: one final feat remains after that, and the path you need is still blocked. Alphinaud argues that since you’re facing the penultimate objective of the rite, you should travel to Mamook and undertake the Feat of the Brotherhood without delay. Erenville agrees it would be wise, but says it’s impossible for now—the Ty’iinbek Traverse that connects the upper forest to the Ja Tiika Heartland is still impassable. There is no alternate route, though clearing work is underway, so you can only wait and make use of the time.</p><p>While the way is closed, everyone chooses a diversion. Alphinaud asks Erenville for a tour of the village’s surroundings, and Alisaie insists on coming along to prove she can keep her footing. Krile focuses on what brought her grandfather to Yak T’el, recalling that the merchant met him at a market there roughly twenty years ago—meaning anyone who remembers him must be at least middle-aged. Wuk Lamat eagerly joins Krile’s search and asks you to come with them, and the group agrees to reconvene afterward.</p><p>In Iq Br’aax, you approach an older villager who does remember a foreign mage from twenty years ago. He says visitors from across the salt are rare, and this one stood out because he was traveling with an infant—a baby girl. He only saw the mage in passing, but suggests Hunmu Rruk would know more, since he was already Xbr’aax Rax back then. The detail of the baby girl hits Krile hard, and she thanks the villager, convinced this may be the lead she was hoping for.</p><p>Back at the Garden of the Stars, Krile asks Hunmu Rruk directly whether he remembers a foreign mage who passed through Iq Br’aax about twenty years ago, possibly carrying a young child. Hunmu Rruk presses her for why she asks, and Krile explains the man may have been her grandfather—not by blood, but family all the same—and she wants to know what brought him there. Hunmu Rruk confirms that such a mage did visit: Master Galuf. But he refuses to say anything more, asking forgiveness and understanding. Krile accepts the limit, determined to uncover the rest herself, and then asks out of general curiosity where the Yok Huy once dwelled in these forests. Hunmu Rruk answers that before withdrawing to Urqopacha some five centuries ago, the Yok Huy claimed Yak T’el as their own, and that many architectural remains can be found in the lower forests—the Ja Tiika Heartland. Krile concludes that must be where they had their visions, and thanks him.</p><p>Hunmu Rruk then turns to you and asks for a moment of your company. He leads you to the cenote behind the village, admitting that he intended to see you off without saying anything, but Krile’s plea has softened his resolve. As the leader of his community, he says he is glad the Third Promise has surrounded herself with compassionate, trustworthy companions, and he asks you to tell him about her journey so far. Hearing how the rite has been a source of learning and growth for Wuk Lamat clearly eases him—until he quietly adds that his daughter would be about her age.</p><p>He then tells you what he has carried in silence. Among the Xbr’aal, girls are rarely born, and when his daughter arrived the village rejoiced—yet that joy became agony when she was found at the bottom of a cenote. She was three years old. It was called an accident, but he says he knew better: she had been pushed. Though the culprit was never caught, a suspicious figure was seen fleeing toward the Ja Tiika Heartland—toward Mamook. Even after Mamool Ja and Xbr’aal learned to live in peace, an act like that could only be meant to undermine the Xbr’aal’s future by targeting the child who would one day lead them.</p><p>Refusing to let that plot succeed, Hunmu Rruk made a desperate choice. He let the memory of his daughter “die” in that cenote, and entrusted her to the one person he knew could protect her: Dawnservant Gulool Ja Ja. Only the Dawnservant and Hunmu Rruk know the truth—but now he brings you into his confidence for one reason. If the one who tried to murder his daughter truly came from Mamook, then resentment toward the Xbr’aal still burns. He won’t be caught off guard again, and so he asks you—not as the Dawnservant’s elector, but as a father—to watch over the Third Promise and defend her from enemies who may be lurking in shadow. When you agree, he thanks you from the bottom of his heart, and he insists that this conversation must remain between you, asking you not to breathe a word of it to anyone.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Alphinaud <small class="muted">(Yak T’el, X:11.0, Y:13.0)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-feat-of-repast.html">The Feat of Repast</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 94</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="taking-a-stand.html">Taking a Stand</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'ふたりの父',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ウクラマトは「同胞の偉業」へ向かおうとするが、エレンヴィルはなお道が塞がれていることを告げる。アルフィノは、儀式の目的がいよいよ佳境に入った以上、マムークへ赴いて「同胞の偉業」に遅滞なく挑むべきだと言う。しかしエレンヴィルは、それが賢明なのは確かでも不可能だと返す。上層の森とジャ・ティーカ・ハートランドを繋ぐティ・インベク・トラヴァースが、いまだ通行不能なのだ。迂回路もなく、道の復旧作業が進んでいる以上、今は各自が思うように時間を使うしかない。</p><p>待ち時間のあいだ、アルフィノは村の周辺を見て回りたいとエレンヴィルに案内を頼み、アリゼーも足取りの確かさを示すために同行する。クリルは祖父の足取りを探る機会だと考え、ヤクテルの市で二十年ほど前に出会ったという話を手がかりに、覚えていそうな中年以降の者へ聞き込みを始める。ウクラマトはその話を思い出し、あなたにも一緒に来てほしいと誘い、各自の用事が済んだら再集合することになる。</p><p>イク・ブラアクスで年配の村人に尋ねると、二十年前の異国の魔法使いを覚えているという。塩の海を越えて来る客は稀で、その男は乳児を連れていたため印象に残っていた――赤子の女の子だった、と。自分はすれ違いに見ただけだが、もっと知る者がいるなら当時すでにシブラーアルの長であったフンム・ルルクだろう、と村人は言う。その言葉に、クリルは強く動揺しつつも礼を述べ、手がかりを掴んだと確信を深める。</p><p>星々の庭園へ戻ると、クリルはフンム・ルルクに、二十年ほど前に幼い子を抱えた異国の魔法使いが通ったかを問う。フンム・ルルクは理由を問い返し、クリルはその男が血縁ではないが家族同然の祖父かもしれず、何のためにここへ来たのか知りたいのだと告げる。フンム・ルルクは、確かに異国の魔法使いが訪れたと認め、その名はガラフだと言う。だが、それ以上は語れないと頭を下げ、理解を求める。クリルは無理に迫らず、自分で確かめると応じたうえで、別の問いとして、かつて森に住んでいたヨクフイはどこにいたのかを尋ねる。フンム・ルルクは、約五百年前にウルコパチャへ退いた以前、ヨクフイはヤクテルを領し、遺構は下層の森――ジャ・ティーカ・ハートランドに多く残っていると答える。クリルはそこが「幻視」の地なのだろうと得心し、礼を言う。</p><p>その後フンム・ルルクは、あなたに少し時間をくれと頼み、村の裏手にある天坑水洞へ案内する。本当は何も言わずに見送るつもりだったが、クリルの願いに心が揺らいだのだと打ち明ける。共同体の長として、第三誓約が思いやりと信頼に足る仲間に囲まれていることを喜び、ウクラマトがここまでどのような旅をしてきたのか、あなたに語ってほしいと求める。儀式が彼女に学びと成長をもたらしたと聞き、フンム・ルルクは安堵するが、やがてぽつりと、彼の娘なら彼女と同じ年頃だろうと言う。</p><p>そして、胸に秘めてきた真実をあなたに語る。シブラーアルの間では女児が稀で、娘が生まれたとき村は大いに喜んだ。だがその娘は三歳のとき、天坑水洞の底で見つかった。事故だと言われたが、フンム・ルルクは違うと知っていた――押されたのだ。犯人は捕まらなかったものの、ジャ・ティーカ・ハートランド、すなわちマムークの方角へ逃げる不審な影が目撃されていた。かつて敵同士だったマムージャとシブラーアルが平和に暮らすようになっても、未来の指導者となる子を狙うその行いが、シブラーアルの未来を挫く意図であることは明らかだった。</p><p>フンム・ルルクは、その企みを成就させまいと決意し、娘の記憶を天坑水洞で「死なせ」、守り得るただ一人に託した――暁王グルージャジャである。真実を知るのは暁王と自分だけだが、今あなたをも信任するのには理由がある。もし娘を殺そうとした者がマムークの者であったなら、シブラーアルへの怨嗟は今も燻っている。二度と同じ悲劇を繰り返さぬため、彼は選定者としてではなく一人の父として、第三誓約を見守り、影に潜む敵から守ってほしいとあなたに願う。あなたが応じると、彼は心から礼を述べ、この話は決して他言しないでくれと固く求める。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> アルフィノ <small class="muted">（ヤクテル樹海, X:11.0, Y:13.0）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-feat-of-repast.html">食の試練</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 94</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="taking-a-stand.html">笑顔を護るための戦い</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'慈父之慮',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Wuk Lamat 一聽到「同胞的試煉」就在前方，立刻喊著要出發，但 Erenville 卻提醒你們：其實在那之前，還有一道現實的阻礙，而完成這個之後也只剩最後一項試煉，他自己也很難想像接下來會遇到什麼。Alphinaud 說，既然儀式已來到倒數第二個目標，你們理應立刻前往 Mamook，毫不拖延地挑戰「同胞的試煉」。然而 Erenville 直言現在辦不到，因為連結上層森林與 Ja Tiika Heartland 的 Ty’iinbek Traverse 仍然無法通行。Krile 追問是否有其他路，Erenville 表示沒有，但清理道路的工程正在進行，他希望你們很快就能恢復行程。</p><p>既然暫時走不了，Alphinaud 提議各自利用這段空檔。 他想探索村落周邊，請 Erenville 帶路；Alisaie 也跟上去，明擺著是要證明自己能站得穩。Krile 則把延誤視為機會，打算繼續追查「祖父曾來過 Yak T’el」這條線索——她記得商人說，大約二十年前在 Yak T’el 的市集遇見那位外國魔法師。若真是如此，能可靠記得此人的多半至少是中年。Wuk Lamat 想起 Mablu 提過「外國魔法師數十年前曾經經過這裡」，便熱心表示要陪 Krile 一起問，並轉向你問要不要加入；眾人約好各自辦完事後再回來集合。</p><p>你們在 Iq Br’aax 找上一位年長村民，Wuk Lamat 覺得「這位看起來很有希望」。村民聽見「二十年前的外國魔法師」便點頭說自己記得：跨海而來的訪客本就少見，更何況那人還帶著嬰兒同行——他記得是個女嬰。村民說自己只是匆匆瞥見，若有人知道更多，應該是 Hunmu Rruk，因為他當時就已經是 Xbr’aax Rax。Krile 聽到「女嬰」明顯一震，卻仍立刻道謝，說這消息非常有幫助。</p><p>回到 Garden of the Stars，Wuk Lamat 驚訝 Hunmu Rruk 擔任 Xbr’aax Rax 已超過二十年，甚至比她出生還早；Krile 則覺得這正是她一直在等的線索。她向 Hunmu Rruk 詢問：二十年前是否有外國魔法師路過 Iq Br’aax，可能還抱著年幼的孩子。Hunmu Rruk 反問她為何要問，Krile 說那人或許是自己的祖父，她想知道他為何而來，並補充那不是血親，但仍是家人。Hunmu Rruk 於是承認確有其人到訪，並直接說出名字：Master Galuf；但他也表明自己不能再多說，只能請她諒解。Krile 便不再追問，說剩下的她會自己查清楚。</p><p>接著 Krile 又以「只是出於好奇」為由詢問：傳聞 Yok Huy 曾住在這片森林裡，究竟是在何處。Hunmu Rruk 回答，在大約五百年前撤往 Urqopacha 之前，Yok Huy 曾把 Yak T’el 視為自己的領地，而他們留下的大量建築遺構，位於更下層的森林——Ja Tiika Heartland。Krile 因此推斷，Yok Huy 的那些「幻視」應該也發生在那裡，並向 Hunmu Rruk 致謝。Hunmu Rruk 表示自己能理解想念家人的心情，雖然身分不允許他再多幫忙，但他真心希望 Krile 能成功；而只要你們協助第三誓約找到黃金城，Krile 也必定能找到自己想要的答案。</p><p>說到這裡，Hunmu Rruk 轉而請你單獨陪他一會兒。他先帶你去村後方的天坑水洞，坦言自己原本打算默默送你們離開，但 Krile 的請求讓他的心軟了。身為社群領袖，他很高興看到第三誓約身邊有一群體貼且值得信賴的同伴，便請你告訴他 Wuk Lamat 這一路的旅程與經歷。當他聽見你描述這場儀式帶來的學習與成長，明顯感到欣慰，卻忽然低聲說：他的女兒若還在，年紀大概也會和 Wuk Lamat 相仿。</p><p>接下來，他把埋在心底的真相告訴你：在 Xbr’aal 之中，女孩很少出生，所以當女兒來到世上時，全村都欣喜若狂；然而那份喜悅在某一天碎裂——她三歲時，被發現倒在天坑水洞的底部。眾人說那是意外，但 Hunmu Rruk 說自己很清楚：她是被推下去的。雖然兇手始終沒有抓到，但有人看見可疑身影往 Ja Tiika Heartland 的方向逃去，也就是朝 Mamook 而去。即使 Mamool Ja 與 Xbr’aal 曾學會和平共處，對方仍可能懷著惡意，藉由傷害「未來將帶領族人的孩子」來動搖 Xbr’aal 的未來。</p><p>Hunmu Rruk 下定決心不讓這場陰謀得逞。他選擇讓女兒的身分在那座天坑水洞裡「死去」，並把她交給自己唯一信得過、能保護她的人——Dawnservant Gulool Ja Ja。真正的事實只有 Dawnservant 與 Hunmu Rruk 知道，而他如今將你也納入秘密，只因他不能再讓同樣的悲劇發生：如果那個企圖殺害女兒的人真出自 Mamook，那麼對 Xbr’aal 的怨恨至今仍在暗處燃燒。於是他不以選定者的身分，而以一位父親的身分請求你：守護第三誓約，防備那些可能潛伏在陰影中的敵人。你答應後，他由衷向你道謝，並嚴肅要求這段對話必須只留在你們之間，絕不可對任何人吐露。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 阿爾菲諾 <small class="muted"> 亞克特爾樹海（X:11.0, Y:13.0)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-feat-of-repast.html">食之試煉</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.94</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="taking-a-stand.html">為守護笑容而戰</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
