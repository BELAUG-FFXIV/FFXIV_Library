    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You approach the skygate with your travel pass in hand, and the Landsguard gate sentry tells you someone is waiting. Erenville is already prepared to depart—he has you present the pass, promising you won’t have to wait long to enjoy the sights, because the bridge to Xak Tural is a wonder all on its own.</p><p>The sentry checks the document and pauses at the signature. It bears Wuk Lamat’s own authorization, and the guard immediately apologizes for the delay, asking you to wait only a moment. With permission confirmed, Erenville gives you a simple prompt—shall we—and the two of you finally set off.</p><p>On the far side of the great bridge, Shaaloani spreads out before you, a land whose name in the Shetona tongue means “where the sun guides.” Erenville calls it a harsh guide: the heat bakes the ground and hardens those who live upon it. Yet the place has been thrown into sweeping change since vast ceruleum deposits were found beneath its red crust, and Koana’s supporters now surge forward on steel roads, chasing a future lit by blue flame.</p><p>Erenville tells you his home, Yyasulani, lies beyond Shaaloani, and though the journey will be long, the railroad should ease the way. To reach the station, he suggests riding rroneek—only for the stablekeep to admit there’s a shortage, and that the animals have been acting strangely: spooked, disagreeable, and difficult to select for rental.</p><p>Erenville notes the rroneek are usually docile, and that what he saw earlier didn’t look unhealthy, but he also admits much has changed since he was last here. With the station not far and no need to rush, he proposes walking instead—until the stablekeep warns that it isn’t only the rroneek: other wildlife have grown aggressive too. The stablekeep offers a safer plan—wait for a merchant to return with another beast, and he’ll send two rroneek to a nearby town. When you admit you may be a little concerned after all, Erenville recognizes the teasing for what it is and changes plans: you’ll pass the time in the town while the rroneek are brought over.</p><p>In the town, you see how much it has grown since Erenville last passed through—and you arrive in time to witness trouble. A hot-headed youth named Zekowa rages at a frustrated deputy chief of the Dustwatch, demanding his friends be released and claiming they were framed. The deputy chief answers that the investigation is closed, that Zekowa’s friends pointed firearms at him, and that proof of larceny was found after they were taken into custody; until they pay for their crimes, they will not be released. Drunkards jeer from the side, Zekowa threatens to fight anyway—and then a calm voice cuts in. Estinien tells him there is a time to fight and a time to withdraw, and for him, it is now. Zekowa storms off, the deputy chief dismisses the matter, and Estinien turns to you with mild surprise, having heard talk of a new Dawnservant and the golden city. After a brief exchange, he says he’s simply seeing what there is to see, mentions Gulool Ja Ja compensated him well for their duel, recommends you try the sabotender, and moves on. When he’s gone, Erenville reflects that the Dustwatch has its work cut out: where duels once settled disputes in Shaaloani, Koana’s supporters now push for peace enforced by law—and he warns you plainly to be careful with your arms in town unless a lengthy stay in a jailhouse appeals to you.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    langLabel:'日本語',
    pageTitle:'サカ・トラルへ',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたが通行許可証を手にスカイゲートへ向かうと、ランドガードの門番は「待っている者がいる」と告げる。エレンヴィルは出発の支度を整えており、許可証を見せて門を通ろうと言い、サカ・トラルへ渡る大橋そのものが見物になるはずだと促す。</p><p>門番は書類に目を通し、署名を見て表情を改める。ウクラマト本人の承認が記されているとわかると、門番は非礼を詫び、少し待ってほしいと言う。許可が確認され、エレンヴィルが「行こうか」と合図すると、あなたは彼とともに門をくぐる。</p><p>大橋を渡った先に広がるのは、シェトナの言葉で「太陽が導く地」を意味するシャーローニの荒野だ。エレンヴィルは、灼けつく日差しが大地を焦がし、人々の気質さえ硬くする苛烈な導きだと言う。だが赤い地の下から膨大なセリウム鉱脈が見つかったことで乾いた大地は変化に飲み込まれ、コーナの支持者たちは青い炎に照らされた未来を夢見て、鉄の道を突き進んでいる。</p><p>エレンヴィルは、故郷のイヤスラニはこの先だと告げ、道のりは長いが鉄道が助けになるだろうと言う。駅へ向かうにはルーニークに乗ろうとするが、厩務員は数が足りず、最近のルーニークは怯えやすく不機嫌で、貸し出しに適した個体を選ぶのが難しいと打ち明ける。</p><p>エレンヴィルは、本来は大人しいはずで先ほど見た個体も不調には見えなかったと言い、久々に戻ってきたこの地で変化を実感する。駅は遠くないし急ぐ必要もないから歩こうとするが、厩務員は問題はルーニークだけではなく野生動物も攻撃的になっていると警告する。まもなく商人が獣を連れて戻るので、それまで待てば二頭を用意して安全に町まで送ると言われ、あなたが不安がないわけではないと認めると、厩務員は「その通りだ」と笑い、エレンヴィルも方針を変えて近くの町で時間を潰すことにする。</p><p>町に着いたあなたは、エレンヴィルが以前見た簡素な野営地同然の場所が、立派な町へ変わっていることに気づく。そこでは揉め事が起きており、ゼコワという若者がダストウォッチ副隊長に食ってかかり、仲間は無実で嵌められたのだと叫ぶ。副隊長は捜査は終わっており、仲間は火器を向けたうえ窃盗の確かな証拠も出た、罪を償うまで釈放しないと言い放つ。酔っぱらいが囃し立て、ゼコワが突っかかろうとした瞬間、エスティニアンが割って入り「戦う時と退く時がある。お前は今だ」と諭す。ゼコワは捨て台詞を残して去り、副隊長は秩序を説いて巡回へ戻る。エスティニアンは新たな連王の噂と黄金郷の話に触れつつ、ただ見聞を広げに来ただけだと言い、グルージャジャとの決闘の報酬でしばらくは気楽に旅ができると語り、サボテンダーは見た目に反して美味いと勧めて立ち去る。騒ぎが収まった後、エレンヴィルは、かつては決闘で争いを収めていたシャーローニで、今は法による統治を望むコーナの支持者がダストウォッチを整えたのだろうと推し量り、町では武器の扱いに気をつけろ――牢屋暮らしが好きでないなら、と釘を刺す。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> エレンヴィル <small class="muted">（トライヨラ, X:14.3, Y:2.4）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="ever-greater-ever-brighter.html">すべての路は希望とともに</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 95</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="saddled-up.html">ロネークの背に揺られて</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'一路向北',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你走到 Xak Tural Skygate 前，把通行證握在手裡。守在門口的 Landsguard 守衛說，有人正在等你。Erenville 早就準備好出發，他要你把通行證交給守衛查驗，並說你很快就能開始看風景——因為通往 Xak Tural 的那座大橋，本身就是一個奇觀。</p><p>守衛低頭看過文件，看到簽名時明顯一愣。那是 Wuk Lamat 親自授權的許可，他立刻為剛才的盤問道歉，請你稍等片刻。確認無誤後，Erenville 看向你，像是在問「走吧？」你便跟著他通過大門，正式踏上北行。</p><p>穿過大橋，Shaaloani 的荒野在你眼前展開。Erenville 說，Shetona 的語言把這裡稱作「太陽指引之地」——只是這個指引很殘酷，炙熱的日光灼燒土地，也把住在這裡的人磨得更硬。可在那層紅色地表之下，發現了大量的 ceruleum 礦藏，整片乾燥大地因此迎來劇變（Shaaloani 因為挖到能驅動文明與軍事的能源而被徹底改變）；Koana 的支持者抓住機會，沿著鋼鐵的道路往前衝，追逐著被藍色火焰照亮的未來。</p><p>Erenville 告訴你，他的家鄉 Yyasulani 在 Shaaloani 的更深處。路很長，但鐵路會讓行程輕鬆不少。要去車站，他原本打算帶你騎 rroneek，卻被 Sunbaked Stablekeep 潑了冷水——rroneek 不夠用，最近還變得容易受驚、脾氣更差，挑得出能出租的反而成了麻煩事。</p><p>Erenville 說 rroneek 平常很溫馴，而且他剛才看到的也不像生病，可他也承認，自從上次回來後，這裡確實變了很多。車站不遠、你們也不趕時間，他乾脆提議用走的；但 Sunbaked Stablekeep 提醒你們，麻煩的不只 rroneek，連其他野外生物也變得更具攻擊性。對方表示有個商人很快會帶著可用的坐騎回來，若你們願意等，他會把兩頭 rroneek 送到附近的小鎮，讓你們安全抵達。你承認自己其實有點擔心後，Sunbaked Stablekeep 一副「這才像話」的樣子；Erenville 也看出他在故意逗你，便改口說到鎮上打發時間，等 rroneek 送來再走。</p><p>你跟著 Erenville 來到 Hhusatahwi，才發現這裡已經不再是他記憶中那種簡陋的營地，而是一座像樣的小鎮。你們才剛到，就撞上一場爭執：一個名叫 Zekowa 的年輕人對著 Dustwatch（Shaaloani 的地方維安組織）的副隊長怒吼，要他放人，堅持自己的朋友是被陷害的。副隊長不耐煩地說調查已結束，朋友們曾把 firearms 指向他，被拘捕後又查出確鑿的竊盜證據；在他們賠償罪行之前，絕不會被釋放。旁邊的醉漢起鬨嘲笑，Zekowa 仍想逞強時，一道冷靜的聲音插了進來——Estinien 要他明白「有該打的時候，也有該退的時候」，而現在就是該退。Zekowa 罵罵咧咧地離開，副隊長也把事當作小插曲帶過。Estinien 看見你們，提到外頭正在傳新 Dawnservant 的消息，也順口問起你們是否找到了黃金城；聊過幾句後，他說自己只是到處走走，還提到 Gulool Ja Ja 對決鬥的報酬相當大方，並推薦你試試 sabotender （仙人掌怪）——看起來不起眼，味道卻意外不錯。等他離開，Erenville 低聲總結：Dustwatch 的壓力只會更大。過去 Shaaloani 大小糾紛多靠決鬥解決，如今 Koana 的人選擇用法律維持秩序；如果事情失控，Landsguard 就會介入，而一旦落到 Zoraal Ja 手裡，現在擁有的自由也會被奪走。最後他提醒你，在鎮上動用武器要格外小心——除非你真的想在牢房裡住上一段時間。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 艾倫維爾 <small class="muted"> 圖萊尤拉（X:14.3, Y:2.4)</small></div></div>`,

};

const LANG_KEY = 'ffxiv-guide-lang';
const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());
