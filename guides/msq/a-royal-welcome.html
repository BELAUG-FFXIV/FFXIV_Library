<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`A Royal Welcome`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Alisaie reminds you that caution alone won’t be enough—you need answers. So you follow Sphene toward the outskirts, hoping the people there can tell you more about Alexandria, and perhaps about the queen herself. Along the way, Wuk Lamat can’t help staring at the strange contraptions scattered around the farmlands, while Krile notes that—unusual as everything looks—the produce itself seems perfectly ordinary.</p><p>Sphene asks whether Tural has similar facilities. Wuk Lamat admits they’re nothing alike, and she can’t even guess what most of the machines are for. Sphene explains they arrived at this method through trial and error, because the Turali wished to keep their own farming traditions—but the environment makes it difficult: too much rain, and not enough light. She adds that electrope has allowed them to reinforce the buildings and provide what nature cannot, though she saves the details for another time and urges you onward.</p><p>When you reach the outskirts, Wuk Lamat is relieved to see people living and moving about, and she hopes the rest of Yyasulani can be said to be the same. Erenville identifies the settlement as a Tonawawtan village—or what used to be one, before the dome and the strange devices appeared. Krile remarks on how lively it feels despite the unending gloom, and G’raha Tia is struck by the blend of traditional brickwork with electrope-based engineering, as though two cultures have been forced to intertwine.</p><p>Sphene greets familiar faces—Pakwene and Ketonye—and the townspeople greet her in return with open warmth. Watching this, Alisaie admits she expected someone colder when Sphene claimed to be a queen, yet what she sees instead reminds her of Wuk Lamat. Sphene answers simply that it is only natural for a ruler to love her people, and Wuk Lamat agrees: the more you come to know them, the more you come to love who they are and what they’ve built—words Sphene accepts with clear delight.</p><p>A townsman named Pepoane introduces himself as a leader of those living in the outskirts, thrilled that rumors of renewed contact with the outside are true. Erenville hears the Tonawawtan sound of the name and asks after his home region, then immediately searches for someone dear—Cahciua. Pepoane can’t say he knows her, and Erenville is forced to accept that his mother isn’t here, even as he clings to the relief that at least some of Yyasulani’s people are alive. When Sphene remarks on the resemblance and confirms she knows Erenville’s mother, he presses her for answers—but she refuses to say more here, promising only that she will tell him in time.</p><p>Wuk Lamat then asks Pepoane what he remembers from the day the dome first appeared. His memories fracture into a shelf broken by an earthquake, trembling ground, a brilliant flash—and then nothing he can grasp. Sphene gently tells him not to strain himself, and then states what shocks you all: the joining of your lands happened thirty years ago. The revelation makes sense of Zoraal Ja’s assumptions, and G’raha Tia points to the same kind of temporal disruption you’ve seen between the Source and the First, suggesting time may have flowed faster within the dome. With more questions than ever, Alisaie asks permission to look around and speak with the townspeople, and Sphene welcomes it—insisting that electrope has improved farming efficiency without erasing tradition, that coexistence required respect and patience, and that if you have questions, you should not hesitate to ask.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Alisaie <small class="muted">(Heritage Found, X:27.1, Y:18.0)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-land-of-levin.html">The Land of Levin</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 97</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="a-day-in-the-life.html">A Day in the Life</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'理王スフェーン',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>アリゼーは、警戒するだけでは足りないとあなたに告げる。情報が必要だ――だからあなたたちはスフェーンの案内で「外縁」へ向かい、アレクサンドリアのこと、そして女王である彼女のことを少しでも掴もうとする。道すがらウクラマトは奇妙な装置を見て首をひねり、クルルは不思議な農場だが収穫物そのものは普通に見えると言う。</p><p>スフェーンは、トラルにも同じような農業施設があるのかと尋ねる。ウクラマトはまったく別物だと答え、あの機械が何に使われているのかも分からないと正直に認める。スフェーンは、試行錯誤の末にこのやり方に辿り着いたのだと説明し、トラルの民が古くからの農法を続けたいと望んだこと、しかし環境が厳しく雨が多すぎて光が足りないことを語る。そこでエレクトロープを用い、建物を強化し自然に足りないものを補ってきたのだというが、詳しい話はまた後にして先を急ごうと促す。</p><p>外縁に到着すると、ウクラマトは人々が無事に暮らしていることに安堵し、ユヤスラニの皆も同じであってほしいと願う。エレンヴィルはここがトナワウタンの集落だったはずだと言い、ドームと奇妙な装置が現れる前の姿を思い出す。クルルは絶え間ない薄暗さに逆らうかのように活気があると驚き、グ・ラハ・ティアは伝統的な煉瓦造りとエレクトロープを用いた工学が融合している点に強い興味を示す。</p><p>スフェーンは住民たち――パクウェネやケトニェ――に声をかけ、彼らもまた女王を温かく迎える。その様子を見てアリゼーは、女王を名乗るのならもっと冷たい人物を想像していたが、実際の彼女はウクラマトに似ていると言う。スフェーンは、統治者が民を愛するのは当然だと答え、細かなことまで知りたいのだと続ける。ウクラマトも、知れば知るほど人を、そして人々が築いたものを愛するようになるのだと語り、スフェーンはその言葉を美しいと受け止める。</p><p>やがてペポアネと名乗る男が現れ、外の世界と再び繋がったという噂が本当だと知って喜び、外縁に暮らす者たちのまとめ役だと自己紹介する。エレンヴィルはその名にトナワウタンの響きを感じ取り、故郷の地域の者かと確かめた上で、カチュアという女性を知っているか尋ねる。ペポアネは心当たりがないと言い、エレンヴィルは母がここにいないことを突きつけられながらも、少なくともユヤスラニの民が生きている事実に安堵する。スフェーンは母の話に反応し、面影があると言って母を知っていると認めるが、居場所はここでは言えない、いずれ話すとだけ約束する。</p><p>ウクラマトはペポアネに、ドームが最初に現れた日のことを覚えているか尋ねる。彼は大地震で棚が崩れたこと、地面が揺れ、眩い光が走ったことまでは語れるが、その先が曖昧で言葉が途切れる。スフェーンは無理をさせるなと諭し、そして衝撃の事実を告げる――両国の土地が結びついた出来事は三十年前に起きたのだと。あなたたちはその年月に言葉を失い、グ・ラハ・ティアは第一世界と原初世界で時間の進みが異なる現象を引き合いに出し、ドームの内側では時間が速く流れた可能性を示す。さらに情報を求めてアリゼーが住民への聞き取りと見学を願い出ると、スフェーンは快く認め、エレクトロープは効率を上げても暮らしを塗り替えないよう配慮してきたこと、互いの尊重と忍耐で共存してきたことを語り、知りたいことがあれば遠慮なく尋ねてほしいと告げる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> アリゼー <small class="muted">（ヘリテージファウンド, X:27.1, Y:18.0）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-land-of-levin.html">雷雲に覆われた地</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 97</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="a-day-in-the-life.html">人を知り、国を知る</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'理王斯菲茵',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Alisaie 先把話說得很清楚：光是保持警戒還不夠，你們需要更多資訊。於是你跟著 Sphene 往外圍前進，想從那裡的人口中弄明白 Alexandria 的狀況，也順便看清這位女王到底是什麼樣的人。一路上，Wuk Lamat 忍不住對農地裡那些奇怪裝置指指點點，而 Krile 則注意到，雖然整座農場看起來很不尋常，但收成本身倒是正常得出奇。</p><p>Sphene 問你們在 Tural 是否也有類似的農業設施。Wuk Lamat 直說完全不一樣，她根本猜不出那些機器到底在做什麼。Sphene 解釋，這套做法是反覆嘗試才摸索出來的，因為 Turali 希望保留原本的耕作方式；只是這裡的環境太刁鑽——雨量過多、光照不足，讓農事變得困難。幸好有 electrope（一種能吸收雷屬性以太的材料），他們才能加固建築，也能補上自然給不了的條件；不過她說細節改天再談，先跟著她走，你們很快就會抵達外圍。</p><p>到了外圍，你第一眼就看見人們依然在生活，Wuk Lamat 也明顯鬆了口氣，說至少這裡的人都平安，希望 Yyasulani 的其他地方也能如此。Erenville 認出這原本是一座 Tonawawtan 的村落——至少在 the dome（罩住 Yyasulani 的巨型屏障）與那些古怪裝置出現之前是這樣。Krile 說這裡在無止盡的陰沉之下仍顯得活絡，幾乎像是在硬撐著一口氣；G’raha Tia 則對這裡把傳統的磚造工法與 electrope 為基礎的工程結合在一起感到著迷，像是兩種文化被迫交織成同一種日常。</p><p>Sphene 一進村就跟人打招呼，像是熟門熟路地關心 Pakwene 與 Ketonye 的近況，居民也立刻回以熱情的迎接。Alisaie 看在眼裡，坦白說她本來以為自稱女王的人會更冷淡，結果 Sphene 反而讓她想到 Wuk Lamat。Sphene 說，統治者愛自己的人民本來就是再自然不過的事，她也想盡可能了解他們——連最瑣碎的事都不想放過。Wuk Lamat 接著說得更直白：越是去認識，就越會去在乎，去在乎他們是誰、也去在乎他們一起建立起來的生活。Sphene 聽完立刻點頭，說得太好了。</p><p>接著，一名叫 Pepoane 的居民上前自我介紹，說自己算是外圍這群人的領頭者，也興奮地確認「跟外界重新連上」的傳聞是真的。他的名字帶著 Tonawawtan 的語感，Erenville 立刻抓住機會，先確認彼此都出身這片地區，然後急著問他是否認識一位叫 Cahciua 的女性。Pepoane 想了又想，仍說不確定是否見過。Erenville 只能接受母親不在這裡的事實，卻也同時感到些許安慰：至少還有一部分 Yyasulani 的人活著、而且看起來過得還好。Sphene 聽到「母親」兩字微微一頓，說難怪她覺得你們有幾分相像——她確實認識 Erenville 的母親；Erenville 立刻追問她人在哪裡，Sphene 卻只說現在不能講，但她會在適當的時候告訴你。</p><p>Wuk Lamat 轉而問 Pepoane：還記不記得 the dome（罩住 Yyasulani 的巨型屏障）第一次出現那天發生了什麼。Pepoane 的記憶像被撕裂一樣，只能說他那天在修理地震後倒塌的架子，接著地面劇烈震動、一道強光閃過——然後就什麼都接不上了。Sphene 立刻阻止他再勉強自己，並說出讓你們全都愣住的判斷：兩片土地「相接」的事件，發生在三十年前。這個時間差也讓你們瞬間理解，為什麼 Zoraal Ja 會以為你們的爸爸早就不在人世；G’raha Tia 則把這現象與 The Source (原初世界)與 Reflection (鏡像世界)之間的時間落差作比較，推測在 the dome（罩住 Yyasulani 的巨型屏障）之內，時間可能流得更快。你們越聽越覺得需要更多線索，Alisaie 便請求能否在外圍四處看看、與居民聊聊；Sphene 爽快同意，還補充說 electrope 的確帶來效率，但她們一直盡力保留 Tonawawtan 的舊生活方式，不把 Alexandria 的做法硬塞給任何人。她說兩邊能共存，是靠彼此尊重、理解與耐心慢慢磨出來的，而你若有想問的事，儘管開口就好。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 阿莉塞 <small class="muted"> 遺產之地（X:27.1, Y:18.0)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-land-of-levin.html">雷雲之下的大地</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.97</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="a-day-in-the-life.html">穹頂裡的一天</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
