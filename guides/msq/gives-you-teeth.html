    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You follow Wuk Lamat’s lead to speak with Tassos, who tells you the area is normally off-limits—but Cahciua has already informed them you’re coming. With a quick set of directions, you head down the corridor toward the room at the end, Wuk Lamat striding ahead and insisting that no matter what you find, she won’t be caught off guard.</p><p>Inside, Cahciua welcomes you to the Backroom—Oblivion’s modest headquarters. The place is a hideout tucked behind a drinking hole, the kind that makes Alisaie recall old memories at once. Cahciua explains that most members here are “creators and adapters,” scientists and engineers who specialize in electrope, supporting the operatives working in the field.</p><p>At Cahciua’s request, Genolt and Shale outline their work. Genolt focuses on provisioning—crafting and securing the supplies needed to keep the fight going. Shale describes intelligence-gathering through Everkeep’s core system, along with surveillance and communications—tracking enemy movement and coordinating your own. Cahciua adds that a major part of their efforts is investigating Preservation, the organization behind the foundations of electrope technology and much of what shapes this realm, including Everkeep’s design.</p><p>Cahciua names Preservation’s greatest achievement as the power used to join Alexandria to Tural: interdimensional fusion. G’raha Tia compares it to his summoning technique and the magicks within Azem’s crystal, yet admits he can scarcely imagine how realities could be fused even on a localized scale. Cahciua then reveals that Oblivion’s founders—a husband and wife—were once members of Preservation, but defected to oppose the fusing of worlds. When Shale mentions that entrants are scanned to prevent machine infiltration, the scan detects a small quantity of electrope on you—specifically in Krile’s earring, which Shale identifies as a disguised data storage device. Krile insists it wasn’t purchased but inherited, and Cahciua shares what they believe: the founders may have been Milalla, and could have been Krile’s parents or close relations, pursued as traitors after spearheading interdimensional fusion research. Krile presses for every detail, but Cahciua can only say their names are unknown, likely erased to evade agents—though you’re all invited to review Oblivion’s accumulated data.</p><p>With Zoraal Ja yet to make a move, there’s little else to do in the moment. Wuk Lamat asks Alisaie to accompany her, while the Backroom’s clamor continues—Genolt loud and frustrated as ever. Shale points out the place is wall-to-wall with contraptions, originally designed by a Preservation engineer, and remarks on how hard it is to endure Genolt’s volume. Noticing your attention on him, Shale asks if you recognized him. Nearby, Krile stays behind to pore over the extracted data from her earring, and G’raha Tia remains to support her as both comrade and fellow researcher, while Wuk Lamat checks herself and asks Alisaie whether she pushes ahead too fast—and is urged to stay closer so you aren’t surrounded.</p><p>Genolt then pulls you into a task of immediate necessity: he’s gone two nights without sleep and can’t afford to collapse with people depending on him. He thrusts a voucher into your hand for his favorite energy tonic—two cans, one for him and one for you—and sends you to find Philomon tending a bar out on the main strip. At True Vue, Philomon first plays scandalized at the idea of selling anything “dangerous,” then quietly accepts the voucher and hands over the tonic—yours formulated for beginners. He insists you drink it on the spot to watch for side effects, and you down it in one pull. He promises a quickened pulse, sharper sight, and a roaring surge of energy, then waves you off to hurry back before Genolt keels over.</p><p>When you return, the tonic’s effect is obvious enough that Alisaie remarks on the rainbows in your eyes. You hand Genolt his full-strength can, and he drinks greedily—rejoicing in the sudden clarity and feral drive it sparks in him. With apologies for the errand and no time to waste, he throws himself back into enhancing weapons and tools, now fueled and relentless.</p><p>Later, Wuk Lamat turns the conversation to the Mamool Ja child you saw earlier, asking if he could be connected to Zoraal Ja. Cahciua confirms that in all likelihood he’s Zoraal Ja’s son: a blue-scaled Hoobigo, abandoned and found in the driftdowns years ago. The boy—Gulool Ja—has pieced it together himself, though he remembers nothing of his parents from when he was small. Cahciua admits he’s unusual: fiends don’t seem to attack him, and he repeatedly vanished into the wilds near Everkeep, surviving alone with food from people on the outskirts. After a pattern of retrieving him only for him to disappear again, Cahciua finally let him be, offering help only when he explicitly asks. Wuk Lamat, realizing this would make Gulool Ja her nephew, says she would take him in as her own—like her father did for her—if he’s willing, but hesitates because she’s here to kill his father. Before she can decide what’s right, Shale realizes Gulool Ja has overheard, and Wuk Lamat bolts to explain—only to be stopped and redirected into a coordinated search, splitting up to scour Solution Nine and beyond.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    pageTitle:'エナジードリンクでガウガウ元気に',

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたはウクラマトに促され、タッソスに会いに行く。立ち入りが制限されている区画だが、カフキワからあなたのことは聞いていると言われ、廊下を進んで突き当たりの部屋へ向かうよう案内される。ウクラマトは勢いよく先に立ち、「何が起きても驚かない」と言い切ってあなたを連れていく。</p><p>部屋の奥でカフキワがあなたたちを迎え、「バックルーム」――オブリビオンのささやかな本部へようこそと告げる。酒場の裏に隠れたアジトという形に、アリゼーは懐かしい気配を覚える。カフキワは、ここにいるのは主に「創り手」と「適応者」――エレクトロープを扱う科学者や技術者であり、前線で動く仲間を支えるために力を尽くしているのだと説明する。</p><p>ゲノルトとシェイルが役割を語る。ゲノルトは補給と製作を担い、戦いに必要な道具や物資を整えるのが務めだと言う。シェイルは、エバーキープの中枢システムから情報を引き出すことで諜報を集め、さらに監視と通信で敵の動きを見張り味方の行動を連携させていると話す。カフキワは、活動の中でも「プリザベーション」の調査に多くの力を注いでいるのだと付け加える。</p><p>プリザベーションはエレクトロープ技術の礎を築き、魂の管理システムからエバーキープの設計に至るまで、この世界のほとんどを形作った組織だという。そして最大の成果は、アレクサンドリアをトラルへ結びつけた力――次元融合だった。グ・ラハ・ティアは、それが自らの召喚術やアゼムのクリスタルに宿る魔力に似ていると感じつつも、局地的であれ現実そのものを融け合わせる仕組みは想像しがたいと率直に語る。さらにカフキワは、オブリビオンの創設者である夫婦がかつてプリザベーションの一員だったが、世界を繋ぐ計画に反対して離反し、阻止のために動いたのだと明かす。</p><p>シェイルは機械の侵入を警戒して入室時に全員を走査すると説明し、あなたたちを走査した際に微量のエレクトロープを検知したと言う。検知源はクルルの耳飾りで、飾りに見せかけた記録装置だと指摘される。クルルは購入品ではなく遺品だと答え、カフキワは創設者の夫婦がミララだった可能性、そして彼らがクルルの親、あるいは近しい縁者である可能性を否定できないと告げる。次元融合研究を主導し、離反者として執拗に追われたなら、子どもを守るため別世界へ託したとしても不思議ではない――その推測に、クルルはすべてを知りたいと強く求める。しかし二人の名は不明で、追跡を逃れるため痕跡を消したのだろうとしか言えない。それでも、蓄積された資料を自由に閲覧してよいと申し出られ、あなたたちは調べる手がかりを得る。</p><p>ゾラージャの次の動き待ちで、今はできることが限られている。ウクラマトはアリゼーに同行を頼み、バックルームには相変わらずゲノルトの怒号が響く。プリザベーションの技術者が設計しただけあって装置だらけだと語られ、シェイルはゲノルトの騒がしさに耐える苦労を漏らしつつ、あなたが彼を見た瞬間の反応を不思議がる。クルルは耳飾りのデータを読み解くため残り、グ・ラハ・ティアも支えになろうとそばに留まる。ウクラマトは自分が突っ込みすぎていないかとアリゼーに問われ、仲間から離れすぎないよう釘を刺される。</p><p>ゲノルトは眠れぬまま限界だと言い、作業を続けるためにお気に入りのエナジートニックを取ってきてほしいとあなたに頼む。引換券は二本分で、歓迎の印としてあなたの分もあるのだと押しつけ、繁華街の酒場を切り盛りするフィロモンのもとへ向かわせる。トゥルーヴューでフィロモンは大げさに怒ったふりをしながら引換券を受け取り、初心者向けに調整した一本をあなたに渡す。副作用に備えるため目の前で飲めと言われ、あなたは一気に飲み干す。脈が速くなり、視界が冴え、力がみなぎる――そう言われた通り、戻ったあなたの様子にアリゼーは目の虹を指摘する。あなたがゲノルトへ強いほうを渡すと、彼は歓喜し、頭が冴え渡る感覚に酔いながら作業へ戻っていく。</p><p>やがてウクラマトは、先に見かけたマムージャの子どものことを切り出す。カフキワは、青い鱗を持つフビゴであり、周囲に同じ特徴を持つ者はゾラージャしかいないため、息子である可能性が高いと答える。子どもの名はグルージャで、幼すぎて親の記憶はなく、それでも自分なりに事実を受け止めているという。さらに彼は奇妙で、魔物に襲われず、エバーキープ近くの荒野へ消えては外縁の人々から食べ物を得て生き延び、数日で戻されてもまた消えることを繰り返した。カフキワは彼の望む孤独を尊重し、求められた時だけ手を差し伸べるようになったと語る。ウクラマトは彼が甥にあたると気づき、受け入れたいと願いながらも、自分が父を討つために来た立場を思って迷う。するとシェイルが、グルージャが話を聞いてしまったらしいと気づき、ウクラマトは追いかけて説明しようとするが、まずは捜索を連携して行うため、あなたたちは手分けして探しに出る。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>你跟著 Wuk Lamat 去找 Tassos。這裡原本是禁止進入的區域，但 Cahciua 早就交代過你的身分，Tassos 只要你沿著走廊直走，進到盡頭的房間就行。Wuk Lamat 一邊催你快走，一邊嘴硬說不管等等看到什麼，她都不會被嚇到。</p><p>你踏進房間後，Cahciua 迎上來，帶你走進名為 The Backroom 的據點——Oblivion 低調卻完整的總部。藏身在酒館後方的秘密基地讓 Alisaie 想起熟悉的回憶。Cahciua 解釋，這裡多半是「創造者」與「適配者」——專精 electrope 的科學家與工程師，他們用技術支援在外行動的成員。</p><p>在 Cahciua 的示意下，Genolt 與 Shale 各自說明職責。Genolt 負責補給與製作，要把能用的工具、能做的材料全都備齊，才能「打好這場仗」。Shale 則負責情蒐，說 Everkeep 的核心系統本身就是資訊寶庫，只要懂得怎麼進去、怎麼翻找；同時他也處理監視與通訊，盯著敵方動向、協調你們的行動。Cahciua 補上一句：在所有工作裡，他們也投入大量心力調查 Preservation（奠定 electrope 技術基礎，並主導靈魂管理系統與 Everkeep 設計的組織）。</p><p>Cahciua 說，Preservation 被認為奠定了 electrope 技術的基礎，從靈魂管理系統到 Everkeep 的設計，幾乎眼前所見的一切都和它有關。而它最驚人的成果，正是把 Alexandria 與 Tural 連結起來的力量——次元融合。G’raha Tia 聽到後，提到這種力量讓他想到自己的召喚術與 Azem 的水晶所蘊含的魔力，但就算影響範圍是局部的，要把不同的現實融合在一起，他也難以想像怎麼可能。更讓人震撼的是，Cahciua 接著透露：Oblivion 的創立者是一對夫妻，他們曾是 Preservation 的成員，但反對融合世界的計畫，為了阻止它才選擇叛離。</p><p>Shale 說為了防止機械滲透，所有進入據點的人都會被掃描；而掃描你們時，偵測到一點點 electrope。線索指向 Krile 的耳環——那不是單純飾品，而是被偽裝過的資料儲存裝置。Krile 連忙說那不是買來的，而是繼承而來。Cahciua 於是提出一個可能性：Oblivion 的那對創立者被認為可能是 Milalla，雖然沒有直接證據，但不能排除他們是 Krile 的父母或近親。因為他們正是次元融合研究的推動者，又以背叛 Preservation 的身分遭到追捕；若他們有個無法確保安全的孩子，把孩子託付給另一個世界的人，或許才是最好的選擇。Krile 情緒明顯激動，要求知道一切細節，但 Cahciua 只能坦承：他們甚至不知道那對夫妻的名字，推測是為了躲避追捕而抹去了所有痕跡。不過，你們可以自由查閱他們累積的資料，Shale 也願意替 Krile 進一步檢查耳環。</p><p>在等待 Zoraal Ja 下一步行動的空檔，據點裡一片忙亂。Wuk Lamat 拉著 Alisaie 去做別的事，而 Genolt 又在一旁大吼大叫，Shale 無奈地要你別在意。Cahciua 提到這裡原本是由 Preservation 的工程師設計，所以滿牆都是裝置與機關；Erenville 只覺得那比自己能承受的還麻煩。Krile 留在原地翻看耳環裡的資料，G’raha Tia 也表示會盡力協助她；Wuk Lamat 則順口問 Alisaie 自己是不是衝得太快，得到的回答是：是有一點，最好靠近大家，別讓自己被包圍。</p><p>很快，Genolt 把你叫住，說他兩晚沒闔眼，卻不能倒下，因為還有人靠他支撐。他塞給你一張兌換券，要求你去找 Philomon 拿他最愛的能量飲料——而且一共兩罐，一罐給他，一罐當作歡迎禮給你。你照著指示前往 True Vue 的酒吧。Philomon 先裝作震怒，說哪有什麼「不能用販賣機買到的危險東西」，接著又壓低聲音要你把兌換券「低調」地遞過去。他認出你是替 Genolt 跑腿，交給你兩罐，還特別說你的那罐是初學者配方。為了確認不會出事，他要求你當場喝下，你一口氣喝光；Philomon 說你很快會心跳加速、視野變清晰、最後湧上像野獸般的能量，還催你別磨蹭，快把 Genolt 的那罐送回去。回到 The Backroom 時，Alisaie 一眼就看出你的異狀，甚至說你眼裡像有彩虹。你把強效那罐交給 Genolt，他立刻灌下去，興奮到像被徹底喚醒一樣，嚷著自己腦子清明、手更準，轉身就要把武器與工具的工作做到停不下來。</p><p>之後，Wuk Lamat 終於問起那個 Mamool Ja 孩子。Cahciua 直說：多半就是 Zoraal Ja 的兒子——那孩子是藍鱗的 Hoobigo，而附近只有 Zoraal Ja 也有同樣特徵，所以大家才會這麼認定，連孩子自己也大概明白了。那孩子名叫 Gulool Ja，因為太小就被遺棄，對父母毫無記憶，Cahciua 光是想到就心疼。她也說 Gulool Ja 很不尋常：魔物似乎不會攻擊他，他能像散步一樣穿行在野外；你們一度把他帶回來，他卻又消失，最後總會出現在靠近 Everkeep 的荒地，靠著外圍居民給的食物獨自活下來，幾天後又重演一次。Cahciua 最後選擇尊重他想要的孤獨，只在他明確開口時才伸手幫忙。Wuk Lamat 聽到這裡，意識到 Gulool Ja 可能是自己的外甥，說如果他願意，她也想像 爸爸 當初對她那樣收留他；可她同時也明白自己此行是為了殺 Zoraal Ja，心裡不確定這樣是否正確。就在這時，Shale 驚覺 Gulool Ja 似乎把話都聽見了；Wuk Lamat 立刻要追上去解釋，卻被提醒應該先協調搜尋行動。你們於是分頭行動，在 Solution Nine 與周邊展開搜索。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 塔索斯 <small class="muted"> 九號解決方案（X:18.4, Y:18.2)</small></div></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
