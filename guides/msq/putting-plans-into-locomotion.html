    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>At Shaaloani Station, the plan is set—and the mood is urgent. Wuk Lamat throws her weight behind it with a grin, Alisaie is already pushing everyone to finish the train and blast straight into the dome, and Krile warns that turning a train into an explosive is as bold as it is unforgiving: you’ll only get one shot, so it has to count. Erenville’s thoughts snag on a quieter fear—he can only hope Namikka is safe.</p><p>Before anyone can move, G’raha Tia raises the one concern that won’t let him stay silent: if you strike first, what stops Zoraal Ja from retaliating against Tuliyollal? Wuk Lamat answers without flinching—she has considered it. When her brother demanded she come and “prove herself,” he meant it. He wants the satisfaction of victory in front of her, proof that what he claims is superior to Tuliyollal. Attacking while she’s away would give him no such satisfaction.</p><p>No—he’ll wait inside the dome for you to come. He’ll be waiting for the challenge so he can crush you and proclaim his strength. Alisaie agrees that avoiding the fight may be the greater danger; Krile frames it plainly: you’ll indulge Zoraal Ja’s vanity, at least until Tuliyollal has strengthened its defenses. Wuk Lamat confirms the roles—charge in from the front, keep his eyes fixed on you, and give Koana time to fortify the city.</p><p>With the course chosen, G’raha Tia accepts it: if Wuk Lamat believes this is best, then you all will trust her judgment. Resistance is inevitable, but everyone will do all they can to help. Wuk Lamat thanks you, then cuts straight to what matters—time. You head back to see what still needs doing for the train.</p><p>At the station, the work begins in earnest. G’raha Tia looks the machine over, weighing where to start, and Alisaie can’t help but lament that Cid and his engineers aren’t here—if they were, she’s sure they’d turn it into a flying train. Krile has Shenza’s list of materials and promises you’ll make sure the workers have everything they need, while Erenville stays alert for any movement from Zoraal Ja’s forces. Wuk Lamat watches the bustle with barely contained excitement, and Wawlika is confident: with everyone moving, it’ll be done in no time.</p><p>When Wawlika asks how you can help, the requests come fast. First: protection—one clean hit to the ceruleum tanks and it’s over, especially if the enemy is using lightning-based weapons. Grounding rods would help, so you suggest asking Wuk Evu, and Wuk Lamat adds one condition with a knowing look: don’t forget the traditional greeting. Next: muscle—heavy equipment needs moving, and while you mention Fonjeantaine, Wuk Lamat insists you should ask someone truly strong—Zurmurwur of the Yok Huy.</p><p>Then comes firepower. If the soldiers ride flying vessels, the train needs countermeasures; Wuk Lamat admits she can’t use magic and isn’t handy with a firearm like her brother. Guns sound plausible, but Wawlika points out the problem—hitting flying targets takes rare skill. That’s when G’raha Tia steps in: the Crystarium defended itself with aetheric cannons, and there’s no reason the design can’t be adapted. He can draft the schematics if you secure the materials and smiths—conductive metal for the barrel, and fire-aspected crystals of the highest purity to power it. Wawlika will find the smiths; you’ll handle the materials with Shenza, and Shenza sends you to speak with the miner Iyaate—because if anyone can get those crystals, she can. At Sheshenewezi Springs, Iyaate spots you and asks what brings you here; when you ask about the purest fire crystals, she pauses, searching her memory for what she’s heard…</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたはシャーローニの駅で作戦を固め、列車を仕立て上げて「ドーム」へ正面から突入する段取りに加わる。ウクラマトは「必ず成功させよう！」と気勢を上げ、アリゼーは列車の完成を急かす。クルルは、列車を爆薬代わりにする無謀さと引き換えに“一度きり”の勝負になると釘を刺し、エレンヴィルはナミーカの無事を気にかける。</p><p>そこでグ・ラハ・ティアが、作戦そのものには異論はないとしつつも懸念を示す――ゾラージャが報復としてトライヨラを襲わない保証はあるのか。ウクラマトは、兄が「証明しろ」と求めた意味を語る。彼が欲しいのは、あなたが不在の隙を突く満足ではない。トライヨラよりも己の王国が優れていると誇示し、面前で叩き潰して力を示すことだ。だからこそ彼はドームの内側で待ち、挑戦してくるあなたたちを粉砕しようとする。</p><p>アリゼーは、むしろこちらから戦いを挑みに行かない方がトライヨラを危険にさらしかねないと同意し、クルルは「防備が整うまで」ゾラージャに付き合う形になると整理する。ウクラマトは役割を明確にする――あなたたちは正面から突撃し、敵の視線を引きつける。その間にコーナがトライヨラの防備を固める道を探す。</p><p>方針が固まると、グ・ラハ・ティアはウクラマトの判断を信じると告げ、抵抗は必至だが全力で援護すると約束する。ウクラマトは礼を言い、時間がないと皆を促して、列車の残作業を確認しに向かう。</p><p>駅では改造作業が始まり、あなたは手分けの段取りに入る。グ・ラハ・ティアは「第一世界」で得た知見を活かす気でおり、アリゼーはシドたちがいれば空飛ぶ列車にしていただろうと悔しがる。クルルはシェンダから受け取った資材リストを頼りに手配を進め、エレンヴィルはゾラージャ軍の動きを監視して異変があればすぐ知らせるという。ウクラマトは忙しく動く仲間たちを見て、完成を心待ちにしている。</p><p>やがてワーリカが相談を持ちかける。敵の雷撃に備え、青燐水のタンクを守るため避雷針（接地用の棒）を取り付けたい――あなたは船大工のウケブに声をかける案を出し、ウクラマトは「伝統の挨拶を忘れないで」と念を押す。さらに重機の運搬には力自慢が必要で、あなたがフォンジャンテーンの名を挙げると、ウクラマトはそれよりヨク・フイのズルムルゥルに頼むべきだと判断する。対空の備えについては、グ・ラハ・ティアがクリスタリウムの防衛に用いられたエーテル砲を応用できると提案し、導電性の高い金属と最高純度の火属性クリスタルが必要だと告げる。ワーリカが鍛冶職人を確保し、あなたはまずシェンダに相談して資材集めへ――シェンダは金属の当てがあるが火属性クリスタルは採掘師が必要だとして、最良の採掘師イヤーテを紹介する。あなたが泉地帯でイヤーテに会い、最高純度の火属性クリスタルを求めると、彼女は心当たりを探るように言葉を探し始める。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> グ・ラハ・ティア <small class="muted">（シャーローニ荒野, X:18.1, Y:14.2）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="in-yyasulanis-shadow.html">荒野に落ちる影</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 96</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="a-hot-commodity.html">トライヨラが好きだから</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'開拓前路',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你們在 Shaaloani Station 把計畫拍板定案，氣氛緊到幾乎能聽見時間在倒數。Wuk Lamat 豪氣地說一定會讓這個計畫成功；Alisaie 則乾脆俐落地下指令：既然計畫有了，就把列車完成，然後用它炸開通往 the dome（罩住 Yyasulani 的巨型屏障）的路。Krile 也提醒你們，拿列車當爆破物是很大膽的作法，而你們只有一次機會，必須一擊命中。Erenville 的目光卻沉了沉——他只希望 Namikka 目前平安無事。</p><p>就在你們準備行動前，G’raha Tia 把心裡那個最刺的疑問說出口：他並不反對計畫本身，但要怎麼確定 Zoraal Ja 不會報復性地攻擊 Tuliyollal？Wuk Lamat 早已想過這種可能。她說，當她的哥哥要她「過來證明自己」時，他想要的是正面碾壓的滿足——要在她眼前證明他宣稱的一切都比 Tuliyollal 更優越，而不是趁她不在時偷襲。</p><p>所以，Zoraal Ja 不會在外頭分心，他會在 the dome（罩住 Yyasulani 的巨型屏障）裡等著你們。等你們上門挑戰，等著把你們擊潰，讓他的力量成為鐵證。Alisaie 低聲承認：如果不把戰火帶向他，反而更可能讓 Tuliyollal 置於危險。Krile 也把話說得更明白——你們就先順著 Zoraal Ja 的心意走，至少要撐到 Tuliyollal 的防禦加固完成為止。</p><p>Wuk Lamat 隨即把分工講清楚：你們會從正面衝進去，把 Zoraal Ja 的注意力牢牢釘在你們身上；同一時間，Koana 會設法強化 Tuliyollal 的防線。G’raha Tia 聽完後點頭——既然你們判斷這是最好的路，就照這條路走；就算前方阻力不小，大家也會盡全力支援。Wuk Lamat 道謝後立刻催促行動：時間不等人，先回去看看列車還缺哪些工作。</p><p>回到站內，你看見改造工程已經開始。G’raha Tia 一邊打量列車一邊思考從哪裡下手；Alisaie 忍不住抱怨如果 Cid 和他的工程師在，搞不好會把它直接改成能飛的列車。Krile 拿著 Shenza 給的材料清單，承諾會把補給補齊；Erenville 則負責盯著 Zoraal Ja 的動靜，一有風吹草動就立刻通報。Wuk Lamat 看著眾人忙進忙出，滿心期待列車最後會變成什麼樣子。</p><p>接著，Wawlika 把更實際的難題丟到你面前：他最擔心的是敵方攻擊，只要青磷水儲槽挨到一次重擊就完了；聽說士兵使用雷電武器，所以想加裝接地用的裝置來導雷。你提出可以去請木匠 Wuk Evu 幫忙，Wuk Lamat 立刻補上一句：別忘了他們傳統的問候方式。可要把工程加快，還得有人能搬動沉重設備——你提到 Fonjeantaine，但 Wuk Lamat 判斷那不夠，應該去找 Yok Huy 的 Zurmurwur 才能真正頂住力氣活。</p><p>最後是武裝。Wawlika 擔心敵人會乘坐飛行載具，列車必須有對空手段；Wuk Lamat 也坦白自己既不會魔法，也不像她哥哥那樣熟悉槍械。你們討論過借槍，但 Wawlika 指出打中空中的目標需要高超槍法，未必可行。這時 G’raha Tia 主動接下這塊：他說 The Crystarium 曾用以太加農砲防禦，設計可以改到列車上，只要材料與鐵匠到位——砲管需要「對以太高度導通」的金屬，驅動則需要「最高純度」的火屬性水晶。Wawlika 去張羅鐵匠，G’raha Tia 著手畫設計圖，而你先去找 Shenza 協調材料；Shenza 表示金屬他有頭緒，但火屬性水晶最好直接找採礦師，並把你引薦給 Iyaate。你趕到 Sheshenewezi Springs，Iyaate 一看見你就問你怎麼會來；當你提出「最高純度的火屬性水晶」時，她停住片刻，像是在回想自己曾聽過的線索。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 古·拉哈·提亞 <small class="muted"> 夏勞尼荒野（X:18.1, Y:14.2)</small></div></div>`,

const langToggle = document.getElementById('langToggle');
const pageTitle  = document.getElementById('pageTitle');
const tabBtns    = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story: document.getElementById('panel-story'),
  acq: document.getElementById('panel-acq'),
  unlockq: document.getElementById('panel-unlockq'),
  followq: document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => btn.textContent = t.tabs[btn.dataset.tab]);
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.async = true;
  s.setAttribute('crossorigin', 'anonymous');
  mount.appendChild(s);
}
</script>
