const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`Law of the Land`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Erenville says it’s time to recover Namikka’s bracelet—but warns you to keep your anger in check. Because the stolen item was a gift from Wuk Lamat, any bloodshed would reflect on her, and Namikka would take no joy in its return if lives were lost. If violence becomes unavoidable, he asks you to stop short of killing and leave the rest to the Dustwatch. Iyaate, furious that the Dustwatch has let things fester, points you toward trouble brewing around Tonatenyawi and urges you to make the bandits pay.</p><p>At Tonatenyawi, you move quietly from building to building, listening through thin walls. You hear Zekowa shouting from captivity, and you catch bandits boasting that their “boss” can keep the Dustwatch off their backs. Then you finally hear a craven underling present the bracelet as a prize—only for the ruthless ringleader to panic about how conspicuous it is, and to pay him off while keeping the bracelet close. When you regroup, Erenville pieces it together: the leader is tied to the Dustwatch, and that explains why the Daybreakers have operated so brazenly.</p><p>To take the bracelet without a massacre, Erenville proposes a foul plan: lure yeheheceyaa into the hideout with a burned attractant made from gathered droppings and wild ingredients. You carry the stench to the bonfire, the town erupts into chaos as the creatures descend, and you slip inside—only for Zekowa’s frantic shouting to nearly blow everything. With the hideout on edge, Erenville calls it off: the bracelet must wait, and you break Zekowa out instead, withdrawing before the Daybreakers can corner you.</p><p>Once safe, Zekowa admits the truth of what the Daybreakers are: a group he and his friends founded to protect people who couldn’t protect themselves—settling wrongs by duels under old laws that force even authorities to answer for their crimes. About a year ago, the man called the Vulture seized control, turned the Daybreakers into predators, and had Zekowa’s friends arrested under false charges. With no one left to back his word, Zekowa was hunted down and taken prisoner—until you pulled him free.</p><p>At Sheshenewezi Springs, Zekowa shows you where the Vulture hides stolen goods inside ceruleum barrels mixed into fuel shipments bound for Tuliyollal. His plan is simple: split up—one of you lures Wihuwte away toward Hhusatahwi while the other searches the barrels for proof. You approach Wihuwte as an “unfamiliar face,” claim Zekowa tried to rob you, and lead him from place to place, letting his patience fray until he’s ready to explode.</p><p>In Hhusatahwi, Zekowa finally springs the trap and the evidence surfaces: stolen jewelry, bags, and the barrel trail back to the shipments—until Erenville names the bracelet as Wuk Lamat’s gift to Namikka. Wihuwte stammers and tries to play innocent, but Zekowa forces the old law into the open by challenging him to a public duel. The town watches. Pistols speak. Wihuwte is exposed as the Vulture, and Kemakka takes him in while allowing Zekowa freedom on the grounds of self-defense. With the Daybreakers given a chance to return to their original purpose—protecting the weak—you finally reclaim the bracelet and leave with the sense that justice, however messy, has been served.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    unlockq:`<div class="stack"><div class="row"><a class="link" href="blowing-smoke.html">Blowing Smoke</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 95</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="on-track.html">On Track</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'荒野の掟',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>エレンヴィルは、ナミッカの腕輪を取り戻しに行こうと言う。ただし相手は盗賊とはいえ、ウクラマトからの贈り物が絡む以上、こちらの行動が彼女の評判に影響しかねない――だから命を奪うところまでは踏み込まないでほしい、とあなたに釘を刺す。もし暴力沙汰になっても、最後はダストウォッチに引き渡せばいい。怒りを爆発させるイアーテは、盗賊の気配があるトナテニャイに目星をつけ、必ず落とし前をつけろと背中を押す。</p><p>トナテニャイでは、あなたは建物の外から耳を澄まし、壁越しの会話を拾っていく。閉じ込められたデコワの叫びが聞こえ、別の部屋では「ボスがダストウォッチを黙らせている」と豪語する声が飛び交う。さらに、手下が戦利品として腕輪を持ち帰ると、首領は「目立ちすぎる」と怒鳴りつつも、結局はその場で処分せず手元に置く気配を見せる。戻って報告すると、エレンヴィルはすぐに結論へたどり着く――首領がダストウォッチの人間なら、盗賊が野放しなのも当然だ、と。</p><p>血を流さず腕輪を奪うため、エレンヴィルは舞翼飛竜の習性を利用する策を立てる。発情した雌の匂いに似せた誘引剤を作るには、あなたが糞を集める必要があると言われ、あなたは袋を満たして持ち帰る。準備が整うと、あなたは誘引剤をトナテニャイの焚き火へ投げ込み、悪臭の煙に釣られて舞翼飛竜が雪崩れ込む。混乱の中で潜入するが、デコワの大声が状況を危うくし、エレンヴィルは腕輪を諦めて彼を救い出し、いったん退く判断を下す。</p><p>安全な場所で、デコワは「デイブレイカーズ」が何者かを語る。もとは弱い者を守るための仲間内の集まりで、古い掟に従い決闘で悪事を暴き、権力者であっても罪を認めさせてきた――それが彼らの誇りだった。だが一年前、「ハゲタカ」を名乗る男が配下とともに現れ、力で組織を乗っ取り、金儲けのやり方で人心まで掌握してしまった。デコワが公然と挑もうとした矢先に仲間は逮捕され、彼自身も不意打ちで囚われた末、あなたに助け出されたのだという。</p><p>シェシェネ青燐泉で、デコワは「ハゲタカ」が戦利品を青燐の樽に紛れ込ませ、トライヨラ行きの輸送に混ぜてさばいていると教える。証拠さえ押さえれば逃げ道はない――そこで彼は、あなたのうち一人がウィフウテをフーサタイ宿場町へ誘い出し、もう一人が樽を調べて盗品を見つける作戦を提案する。あなたは「デコワに襲われた」と訴えてウィフウテを同行させ、わざと遠回りしながら焦りと苛立ちを募らせていく。</p><p>そしてフーサタイ宿場町で、ついに証拠が白日の下にさらされる。盗品が樽から見つかり、エレンヴィルはその流れを突きつけ、さらに腕輪がウクラマトからナミッカへ贈られた品だと告げる。ウィフウテはしどろもどろに否定するが、デコワは町の面前で決闘を突きつけ、逃げられない形で掟を執行させる。観衆の目の前で勝敗は決し、ケマッカはウィフウテを拘束し、デコワには正当防衛として自由を与える。デイブレイカーズは本来の目的――弱きを助ける道へ戻る機会を得て、あなたはようやく腕輪を取り戻す。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> エレンヴィル <small class="muted">（シャーローニ荒野, X:12.6, Y:19.1）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="blowing-smoke.html">エヘヘケヤー作戦</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 95</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="on-track.html">サカ・トラル・レールロード</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'荒野上的老規矩',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Erenville 說要去把 Namikka 的腕輪拿回來，但他也提醒你要把怒火收住。這件事牽涉到 Wuk Lamat 的贈禮，你們若在追回腕輪的過程中殺了人，外界很可能把血腥結果算到她頭上；而 Namikka 也不會因為腕輪回到手上就感到快樂，如果代價是有人死去。Erenville 要你動手可以，但別下殺手，剩下的交給 Dustwatch （Shaaloani 的地方維安組織）。Iyaate 則氣得直罵 Dustwatch 不做事，並指向 Tonatenyawi 一帶最近的風聲，催你們去把那些人渣揪出來。</p><p>你們潛到 Tonatenyawi，逐間破屋靠近，貼著牆偷聽。你先聽見 Zekowa 被關在裡頭大吼大叫，接著又聽到另一群人吹噓「老大」能讓 Dustwatch 視而不見。最後，你聽見一名手下把那只腕輪當作戰利品獻上去，卻被首領怒斥「這種東西怎麼出手才不會惹人注意」，但他仍把腕輪留在自己身邊。你回去把情報告訴 Erenville，他立刻明白：首領若是 Dustwatch 的人，這群盜匪敢如此張狂就說得通了。</p><p>為了不流血地把腕輪偷回來，Erenville 想出一個噁心卻有效的辦法：利用 yeheheceyaa 的習性，用牠們的排泄物加上野外材料做成引誘用的惡臭薰香。你照他交代把袋子裝滿，回來後看著他把材料混在一起，接著把引誘物丟進鎮中央的火堆。惡臭的煙一升起，yeheheceyaa 就撲進 Tonatenyawi，盜匪們驚慌失措，你們趁亂潛入——卻被 Zekowa 的呼救差點害得前功盡棄。Erenville 當機立斷：腕輪先放一邊，先把人救出來，撤退再說。</p><p>逃出來後，Zekowa 交代 Daybreakers 到底是什麼：那原本是他和朋友創立的自警組織，專門保護那些無力自保的人，並依照荒野的舊法用決鬥把躲在權勢背後的惡行逼出來。可是一年前，「秃鷲」帶著手下出現，硬是奪走 Daybreakers，把他們變成專門掠奪的盜匪；更卑劣的是，他還用 Dustwatch 的名義把 Zekowa 的朋友抓走，開出根本付不起的保釋金，讓 Zekowa 變成孤身一人。Zekowa 正要在城鎮裡當眾挑戰時又被暗算抓走，直到你們把他救出來。</p><p>在 Sheshenewezi Springs，Zekowa 帶你們去看「秃鷲」藏匿贓物的方式：他把偷來的東西塞進 ceruleum（青磷）的桶裡，混進送往 Tuliyollal 的燃料貨運，再在目的地把贓物取出變賣。Zekowa 的計畫是把他逼到有證據、也有目擊者的角落——一人把 Wihuwte 誘走去 Hhusatahwi，另一人趁機翻桶找出贓物。你以「Zekowa 想搶我、但我制服了他」為由把 Wihuwte 帶在身邊，一路故意繞來繞去，讓他越走越不耐煩，直到火氣快壓不住。</p><p>到了 Hhusatahwi，陷阱終於收網：桶裡的失物被翻出來，Erenville 也當眾點破運送路線，並直指那只腕輪正是 Wuk Lamat 送給 Namikka 的告別禮。Wihuwte 口頭狡辯想裝無辜，Zekowa 便在眾人面前按舊法挑起決鬥——你們要的就是讓他無法拒絕、無法脫身。決鬥一結束，Kemakka 也不得不面對真相，將 Wihuwte 以「秃鷲」之名帶走。Zekowa 雖然承認自己在城鎮開槍，但 Kemakka 判定是自衛，放他一馬，也允許那些沒犯法的人回到正路。你們終於把腕輪拿回來——而 Daybreakers 也獲得一次回到「保護弱者」初衷的機會。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 艾倫維爾 <small class="muted"> 夏勞尼荒野（X:12.6, Y:19.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="blowing-smoke.html">舞翼飛龍大作戰</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.95</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="on-track.html">薩卡圖拉爾鐵路公司</a></div></div>`
  }
};

const langToggle = document.getElementById('langToggle');
const pageTitle  = document.getElementById('pageTitle');
const tabBtns    = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story: document.getElementById('panel-story'),
  acq: document.getElementById('panel-acq'),
  unlockq: document.getElementById('panel-unlockq'),
  followq: document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => btn.textContent = t.tabs[btn.dataset.tab]);
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {

  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.async = true;
  s.setAttribute('crossorigin', 'anonymous');
  mount.appendChild(s);
}
</script>
