  EN:{
    langLabel:'English',
    pageTitle:`Gone and Forgotten`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You regroup in the wake of mounting confusion—at least Cahciua is safe. Even so, nothing about the situation feels comprehensible: Erenville’s mother is a floating machine, and your companions can only meet the absurdity with weary disbelief. G’raha Tia reaches for a thread of precedent, recalling that the Allagans once had machines that could be controlled remotely, and wondering if Cahciua is doing something similar to speak with you.</p><p>When you settle in, Cahciua greets you warmly and remarks that it has been a long time since she heard the name “Students of Baldesion.” Asked why she appears as she does, she explains that the figure before you is simply a body she controls from afar for operations—and that, as the leader, she must remain somewhere she cannot be easily found. She introduces her group as a resistance organization called Oblivion, devoted to thwarting Zoraal Ja’s ambitions for conquest.</p><p>Cahciua then points out what you have already begun to notice: everything within the dome—the buildings, the people, even the ground beneath your feet—is a fusion of two worlds. Oblivion’s original mission was to stop such a fusion, but that purpose has faded into legend over time. By the time the current members took up the mantle, their sole objective was stopping Zoraal Ja—and they failed. Now his army has gone outside the dome, and the danger has only grown.</p><p>Your attention turns to the strange headpieces worn by others. Cahciua confirms they are regulators, the pinnacle of electrope technology, and that Oblivion’s decision not to wear them is tied to their operations. At your request, Geode explains the regulators’ first function: they regulate a wearer’s reserve of souls, and upon death, a soul is expended to restore them to life. People carry spare souls packaged in cells, used to replenish life force lost to sudden death—though not to old age—and these “soul cells” are distributed according to work evaluation to encourage “exemplary performance.” The idea of souls treated as a common resource leaves you uneasy, and G’raha Tia warns that it recalls the voidsent practice of consuming others for their aether—and the risks that must entail.</p><p>When you press the deeper concern—how identity survives such a system—Geode tells you it is prevented through memory management. Regulators constantly record the wearer’s memories so that if they die suddenly, those memories can be refreshed as part of the restoration process, preserving their sense of self. But the explanation turns darker: regulators are also triggered when someone else dies, forcibly extracting from all wearers any memories related to the deceased. Cahciua calls it a “kindness” from Everkeep’s core system, so that no one must suffer the pain of loss—memories of the dead wiped from living minds and archived in the system, “in the cloud.” Worse still, this process is integral to producing soul cells: when someone dies of natural causes, their soul is temporarily housed within the regulator, delivered to a facility where memories are separated from the soul, leaving a fresh soul cell ready for distribution and consumption while the memories are stored in the core system to be “remembered” forever.</p><p>To understand what regulators can truly do, Cahciua brings you to the Thunderyards to meet Strika, a hunter tasked with felling fiends in the area. Strika is alarmed that you wear no regulator at all, insisting it is far too dangerous in a place where lightning and beasts can kill in an instant. She explains why mechanical soldiers cannot guard the facilities—they are weak to lightning and ordered to keep away—and why hunters are compensated accordingly, even receiving special selections of souls. When she agrees to show you the danger, she urges you to draw out a worthy foe, then refuses help when the fight turns against her—only to rise again as the regulator restores her. As it turns red, she moves as though possessed, feral and beast-like.</p><p>Afterward, Strika explains that such a form can only be achieved by gorging on souls, and that while it is possible in theory, it is dangerously beyond what hunters are permitted to carry. Cahciua then clarifies what you witnessed: regulators can be loaded with two kinds of souls—those of people and those of beasts. Human souls can grant preternatural strength and prevent untimely death; beast souls can imbue you with the chosen animal’s power, and too many at once can twist the body until you are more beast than person. The more you learn, the more the practice recalls voidsent—different means to achieve similar ends. However you feel about souls, one fact stands firm: Zoraal Ja possesses this power now, and with it he has become a threat not just to one city, but to the world. You steel yourself to stop him, no matter the cost.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたは状況の異常さを飲み込めないまま、それでも「カチュアが無事だ」という一点で踏みとどまる。エレンヴィルの母が空中に浮かぶ機械だと知り、仲間たちは呆れと困惑を隠せない。グ・ラハ・ティアは、アラグが遠隔操作できる機械を持っていたことを思い出し、カチュアも同様の仕組みで意思疎通しているのではないかと推測する。</p><p>腰を落ち着けたあなたたちに、カチュアは出会えた喜びを告げ、さらに「バルデシオン委員会」という名を聞くのは久しぶりだと言う。なぜこの姿で現れたのかと問われると、それは遠隔で操っている“身体”にすぎず、作戦行動のために使っているのだと説明する。指導者である以上、簡単に見つからない場所に身を置く必要があるのだ。彼女たちは「オブリビオン」と名乗るレジスタンスであり、ゾラージャの征服の野望を阻むために動いていると明かす。</p><p>カチュアはさらに、ドームの内側にある建物や人々、足元の大地に至るまで、すべてが二つの世界の融合によって成り立っていると語る。もともとオブリビオンの任務は、その融合を止めることだったが、いまでは伝承のように語り継がれる理念になってしまったという。現役の構成員が加わった頃には目的はただ一つ、ゾラージャを止めることへと変わっていた。しかしそれは叶わず、いまや敵軍はドームの外へ出てしまった。</p><p>あなたは人々が頭部に装着する奇妙な装置に目を向ける。カチュアはそれがエレクトロープ技術の極致たる「レギュレーター」だと認め、彼女たちが装着しないのも作戦に関わると言う。説明役を引き取ったジオードは、レギュレーターの第一の機能として、装着者の「魂の備蓄」を管理し、死んだ際に魂を消費して蘇生させるのだと語る。人々は魂をセルとして携行し、事故などの急死で失われた生命力を補うために用いるが、老衰には効かない。そして「ソウルセル」の配給は勤務評価に基づき、「模範的な働き」を促す仕組みになっている。魂が日常の資源として扱われる事実に、あなたの胸は重くなり、グ・ラハ・ティアはヴォイドの魔物が他者のエーテルを喰らう在り方を連想して、危うさを指摘する。</p><p>あなたが自我や同一性への影響を問うと、ジオードは「記憶管理」によって防がれていると答える。レギュレーターは装着者の記憶を常に記録し、突然死した場合には蘇生の過程で記憶を再同期して、本人としての感覚を保つのだという。だが同時に、他者が死んだときにも作動し、装着者たちから故人に関する記憶を強制的に抜き取る。カチュアはそれを、誰も喪失の痛みに苦しまないための「慈悲」だと語り、故人の記憶は人々の心から消され、システムへ保存されると明かす。さらにそれはソウルセル生成の工程でもあり、自然死した魂は一時的にレギュレーターへ収容され、施設で記憶と分離されることで不純物のない魂のセルとなり、記憶は中枢へ蓄えられて「永遠に記憶される」のだ。</p><p>真に理解するには実際に見ろ――そう言うカチュアに導かれ、あなたはサンダーヤードで狩人ストリカと会う。ストリカはレギュレーターなしで来たあなたたちを危険だと咎め、落雷や獣の襲撃を挙げて警告する。施設の守りを機械兵に任せられないのは、雷に弱く近づけないからだと説明し、危険ゆえに報酬も厚く、狩人には魂の配給も特別だと言う。やがて実演のために強敵を引き寄せ、ストリカは助けを拒んだまま傷を負うが、レギュレーターの力で立ち上がる。赤く変じた合図とともに、その動きは獣のように荒々しくなる。後に彼女は、あの形は魂を貪ることで得られるが極めて危険だと語り去り、カチュアは結論として、人の魂と獣の魂を装填できること、人の魂は超常の力と蘇生を、獣の魂は動物の力をもたらし、多用すれば身体まで変じて人ならざるものに近づくと説明する。いまこの力を持つのはゾラージャだ――あなたは、その脅威を止める覚悟を固める。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  },

    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你還弄不清楚到底發生了什麼，但至少你確認了一件事：Cahciua 平安無事。可是在你喘過氣之前，荒唐的資訊又接二連三砸下來——Erenville 的母親竟然是一具會漂浮的機械。你和同伴只能用疲憊的吐槽掩飾震驚，彷彿再多離奇都已經不足以讓人真正意外。G’raha Tia 則試著從過去的知識找線索，提到 Allag（古代亞拉戈帝國）曾有能遠端操控的機械，懷疑 Cahciua 也是用類似方式和你們對話。</p><p>你們坐定後，Cahciua 先表達見到你們的喜悅，接著提到「Students of Baldesion」這個名號——她已經很久沒聽到這個名字了。當你追問她為何以這副模樣現身，她直說你眼前看到的只是她遠端操控的「身體」，方便執行行動；身為領導者，她必須待在不容易被找到的地方。她也表明自己所屬的是抵抗組織 Oblivion（抵抗組織，目標是阻止 Zoraal Ja 的征服野心）。</p><p>Cahciua 隨即點破你們在 dome 內看到的違和感：這裡的建築、人群、甚至腳下的大地，全都是「兩個世界融合」的結果。她說 Oblivion 最初的任務其實是阻止這種融合，但那已是很久以前的事，如今只剩像傳說般被成員口耳相傳。等到她們這一代加入時，目標早已變成阻止 Zoraal Ja——只是她們失敗了，而他現在甚至已經率軍走出 dome 外。</p><p>你注意到許多人頭上戴著奇怪裝置，Cahciua 便說那是 regulator（調節器），也是 electrope 技術的巔峰；而 Oblivion 不配戴調節器，確實和她們的行動有關。你要求更清楚的說明，Geode 解釋調節器的第一項功能：它會「調節」配戴者的靈魂儲備——一旦死亡，就消耗一個靈魂把人拉回來。人們把靈魂封裝成 靈魂細胞（把靈魂封成可分配的單位，用於事故等突發死亡後補回流失的生命力；對老死無效） 隨身攜帶；而靈魂細胞的分配則依工作評價決定，用來鼓勵人們「表現優秀」。聽到靈魂被當成日常資源、甚至像報酬一樣流通，你很難不感到不安；G’raha Tia 也提到這讓他想到 voidsent（虛無生物）藉由吞噬他者以太維生的做法，並警告其中的風險。</p><p>你把問題推得更深：這樣的機制不會稀釋自我、甚至讓別人的意識污染你嗎？Geode 回答，這是靠「記憶管理」避免的——調節器會持續記錄配戴者的記憶，若突然死亡，復活時就能把記憶刷新回來，以維持身分與自我感。但他也坦承調節器還會在「別人死亡」時被觸發，強制從所有配戴者身上抽走與死者相關的記憶。Cahciua 稱那是 Everkeep 的核心系統給人民的「仁慈」，讓任何人都不必承受失去的痛：死者的記憶會從眾人腦海中被抹除，並被保存進系統，也就是所謂「記憶在雲端」。更令人發寒的是，這同時也是靈魂細胞生產的關鍵流程——當人自然死亡，靈魂會先暫時被收進調節器，再被送到設施中把記憶與靈魂分離；分離後得到乾淨的靈魂細胞供分配與消耗，而記憶則被存入核心系統，作為「永遠被記得」的檔案。</p><p>為了讓你真正理解調節器能做到什麼，Cahciua 帶你前往 The Thunderyards，去見她的熟人、負責獵殺魔物的獵人──Strika。Strika 一看到你們沒戴調節器就大吃一驚，直說在這種地方太危險：落雷或野獸攻擊都可能一擊致命。你問為何不讓機械士兵守衛，她解釋那些機械士兵怕雷，被命令遠離這片區域，因此重要設施只能靠 獵人維持；也因為危險，報酬很高，連靈魂的配給都特別好。為了示範，她要你們先清掉附近的獵物製造動靜，引出更「值得展示」的對手；戰鬥翻轉時，她拒絕你們支援，卻在重傷後被調節器拉回來。當裝置轉為紅色，她的動作瞬間變得像野獸般兇狠，讓你清楚看見調節器不只是在「救命」。事後 Strika 說那種形態必須靠大量吞噬靈魂才可能達成，極度危險，也不是獵人被允許攜帶得起的數量；而 Cahciua 最後替你把重點釐清：調節器能裝填兩種靈魂——人的靈魂與野獸的靈魂。人的靈魂能帶來超常力量，也能避免不該發生的死亡；野獸的靈魂則會賦予你那種動物的力量與本能，若同類靈魂堆疊太多，牙齒會變獠牙、指甲會成利爪，甚至一步步變得「更像野獸而不像人」。你或許無法接受這套把靈魂與記憶當資源的制度，但有件事你已經無法忽視：Zoraal Ja 已經掌握了這股力量——這不只是 Tuliyollal 的危機，而是整個世界的威脅。你收起遲疑，準備不計代價也要阻止他。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 艾倫維爾 <small class="muted"> 地中天道秘密基地（X:6.0, Y:6.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="on-the-cloud.html">雲端</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.97</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="embracing-oblivion.html">攜手之路</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
