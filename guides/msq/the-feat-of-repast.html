    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Wuk Lamat says it’s thanks to Wuk Evu that you learned the forest’s history, marveling that you might never have met him at all if you hadn’t decided to fix the float. Wuk Evu only hopes he has been of sufficient service to the Third Promise, but Koana focuses on what still hasn’t been solved: you’ve gained insight into xibruq pibil’s origins, yet you still have no way to procure the banana leaves. Unless, he wonders—was that historic feast commemorated somehow, perhaps with a monument?</p><p>Wuk Evu confirms that it was, and leads you to it. There, weapons offered by the two factions stand as a symbol of their vow never to raise arms against one another again. Koana explains that since this feat demands a journey through history, a monument set at the heart of such a battlefield might point you in the right direction. He asks you and Wuk Lamat to search the area for anything that stands out. Koana notices recently overturned soil, and Wuk Lamat excitedly points out a buried box—inside are fresh banana leaves. Koana guesses this was Hunmu Rruk’s doing, and notes the poetry of hiding them on the very battlefield where they helped end the war. Wuk Lamat laughs that it means he planned it all from the start, and both of you thank Wuk Evu again for making the discovery possible.</p><p>Wuk Evu says it was an honor, then offers his encouragement to the Third Promise: ever since watching her in the Feat of Reeds, he has believed she is the claimant most worthy to lead the nation. All of you devised solutions to the Hanuhanu’s failing crops, he says, but Wuk Lamat alone sought to understand their culture and revive Ihih’hana even when it seemed unrelated to the task—proof, in his view, that no one cares more for the people of Tuliyollal and what they hold dear. If you ever need an old shipwright’s historical musings again, he will be at your service; for now, he takes his leave. Koana can’t argue, and with what you need in hand, he says it’s time to return to Iq Br’aax.</p><p>Back at the Garden of the Stars, Wuk Lamat jokes that Wuk Evu might be a historian rather than a shipwright. Koana is pleased you succeeded and expects the others back soon, while Wuk Lamat admits she’s famished. When everyone regroups, Koana asks how the others fared. Wuk Lamat announces you got the banana leaves—thanks to Wuk Evu and an important history lesson. Krile says she would have liked to greet him, and Alphinaud reflects that Gulool Ja Ja ending centuries of war is no surprise, but doing so through cuisine is something else. Wuk Lamat calls it exactly the kind of strange solution her father would find, then asks if the kitchen is ready. Krile reports that she and Urianger borrowed the needed utensils without saying what they were for; Alphinaud gathered fine firewood; Alisaie and Erenville secured ibruq—though Erenville adds that the hunt was spirited enough that the hunter fell into a cenote, prompting Alisaie to scold him for mentioning it. Thancred gathered local herbs, focusing on achiote seeds, and Urianger determined the ideal spice balance. Koana concludes that all that remains is cooking, and asks if anyone is versed in culinary arts. Krile says she isn’t profoundly skilled but has cooked for herself and will handle it—along with you, since you’re known to be an accomplished culinarian. Wuk Lamat can hardly contain her excitement.</p><p>In the judging, Wuk Lamat revels in the aroma while Sareel Ja and Bakool Ja Ja hurry to prepare theirs. Krile presents your xibruq pibil and explains it uses Mamool Ja culinary techniques to cook the spiced meats favored by the Xbr’aal, symbolizing peace after centuries of war. Hunmu Rruk says your ingredients and methods are correct and praises your recreation in taste, texture, and aroma—but adds that anyone can follow a recipe. What set you apart, he says, is that you went further and learned the dish’s cultural significance, Yak T’el’s violent history, and your father’s role in ending it. That willingness to learn from the past, he says, suits aspiring Dawnservants. He then insists true understanding requires experience, and tells you to eat.</p><p>Sareel Ja demands their assessment as well and claims their dish is faithful. Hunmu Rruk observes that while it looks the part, it lacks the defining aroma—because they have no Ja Tiika banana leaf. Sareel Ja falters, Bakool Ja Ja explodes that it’s Sareel Ja’s fault they couldn’t get any leaves, and Hunmu Rruk counters that the Second and Third Promises had no such difficulty because you showed interest in Xbr’aal history and heritage. Bakool Ja Ja scoffs that it’s just an old leaf, but Hunmu Rruk rules their performance unsatisfactory and denies them keystones for lacking an essential ingredient and adequate understanding. Bakool Ja Ja dismisses the feat as a sham and threatens to take what he needs later.</p><p>You eat. Wuk Lamat declares it delicious: the ibruq is tender, the banana leaf rounds out the spices, and the dish tastes like harmony—something brute force and deception could never appreciate. Hunmu Rruk reminds you to finish your meal as part of the feat, and Wuk Lamat happily complies, even praising your talent and joking she could hire you as her personal chef someday. Koana remarks it was palatable enough. Hunmu Rruk then presents keystones to the team that successfully performed the Feat of Repast. With only one feat left, Koana says he should get going and is glad he wasn’t paired with the others, while Thancred teases him to do better than that. Wuk Lamat celebrates the sixth keystone, thanks everyone, and then sheepishly asks whether any xibruq pibil is left for another helping.</p><p>Afterward, your party reflects: one final feat remains, Krile is relieved your dish was well received, Alphinaud calls denying the First Promise a keystone a crucial victory, and Alisaie says you must consider how to reclaim the stolen keystone from Bakool Ja Ja. Meanwhile, Wuk Lamat is already dreaming of eating xibruq pibil again, and offers you more that Krile made from leftover ingredients. She wonders if, now that the Feat of Repast is over, the villagers can finally sell it to you for the road.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Koana <small class="muted">(Yak T’el, X:30.9, Y:14.3)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-history-of-violence.html">A History of Violence</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 94</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="a-fathers-grief.html">A Father’s Grief</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'食の試練',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ウクラマトは、森の歴史を知れたのはウク・エヴのおかげだと感謝し、いかだの修理を思い立たなければ出会えなかったかもしれないのだと噛みしめる。ウク・エヴは第三誓約の役に立てたなら本望だと言うが、コーナはなお課題が残っていることを指摘する。シブルク・ピビルの起源は理解できたが、バナナの葉を手に入れる術がない――そこで彼は、あの歴史的な饗宴が何かの形で記念されていないか、たとえば記念碑のようなものはないか、と尋ねる。</p><p>ウク・エヴは記念があると答え、あなたたちを案内する。そこには両陣営が捧げた武器が並び、二度と互いに武器を向けないという誓いを象徴していた。コーナは、この偉業が歴史を辿るものなら、重大な戦場の中心にあるこうした記念碑が道を示してくれるはずだと考えたのだと言い、あなたとウクラマトに周囲の手掛かりを探してほしいと頼む。するとコーナが最近掘り返された土に気づき、ウクラマトが箱が埋まっていると見つける。中には新鮮なバナナの葉が入っていた。コーナはフンム・ルルクの仕掛けだろうと推測し、戦争の終結に関わった戦場に隠すあたりが粋だと言う。ウクラマトは最初から全部計画済みだったのだと笑い、あなたたちはウク・エヴにも改めて礼を述べる。</p><p>ウク・エヴは助力できたことを光栄だと言い、さらに第三誓約へ激励を贈る。葦の偉業での働きを見て以来、彼女こそ国を導くに最もふさわしい誓約者だと確信しているのだという。ハヌハヌの作物の問題に対して解決策を考えたのは皆同じだが、彼女だけは課題と直接関係が薄く見えても文化を理解し、イヒヒハナを復興しようとした――それこそが、トライヨラの民と彼らが大切にするものを誰より想っている証だ、と。もしまた老いた船大工の歴史談義が必要ならいつでも力になると言い残し、彼はその場を去る。コーナは反論できないと呟き、必要なものは揃ったとしてイク・ブラアクスへ戻ろうと告げる。</p><p>星々の庭へ戻ると、ウクラマトはウク・エヴが本当は歴史家なのではと冗談を言う。コーナは成功を喜び、仲間たちもすぐ戻るだろうと言い、ウクラマトは空腹を隠さない。合流後、コーナが成果を問うと、ウクラマトはウク・エヴの助けでバナナの葉を手に入れたと報告し、重要な歴史の教えも得たのだと言う。クルルは挨拶したかったと残念がり、アルフィノはグルージャジャが長き戦を終わらせたこと自体は驚かないが、料理で平和を成したという点は別格だと語る。ウクラマトはそれが父らしい奇策だと笑い、台所の準備を確認する。クルルはウリエンジェと必要な調理器具を借り受け、用途は伏せたと報告し、アルフィノは薪を集め、アリゼーとエレンヴィルはイブルクを確保したと告げる。エレンヴィルが狩りの最中に天坑へ落ちた話を漏らすと、アリゼーが口止めしたはずだと叱りつける。サンクレッドはアチオーテの種を中心に薬草を集め、ウリエンジェは香辛料の最適な配合を見極めた。コーナは調理に移るだけだとして、料理に通じた者がいるか尋ねる。クルルは腕前は大したものではないが自炊はしてきたと言い、自分が担当すると申し出る。さらにあなたにも助力を求め、あなたは腕の立つ料理人だと彼女は覚えている。ウクラマトは今にもよだれが出そうだと喜ぶ。</p><p>審査の場では、ウクラマトが香りに目を輝かせる一方、サリールジャとバクージャジャも急いで試作品を整える。クルルはシブルク・ピビルを提出し、マムージャの調理技法でシブラーアルが好む香辛料肉を仕上げた料理であり、長い戦の末に結ばれた平和の象徴だと説明する。フンム・ルルクは材料と手順は正しく、味・食感・香りも見事だと認めるが、レシピ通りなら誰でも再現できるとも言う。だがあなたたちは一歩踏み込み、料理の文化的意義――ヤクテルの暴力の歴史と、父がそれを終わらせた役割――まで学んだ。その姿勢こそ暁王を目指す者にふさわしい、と称賛し、理解は体験で得るものだとして実食を促す。</p><p>サリールジャは自分たちの評価を求め、同じく忠実だと主張する。しかしフンム・ルルクは、見た目は似ていても決定的な香りが欠けていると言い、ジャ・ティーカのバナナの葉がないことを突く。サリールジャは言葉に詰まり、バクージャジャは葉が手に入らなかったのは相手のせいだと怒鳴るが、フンム・ルルクは第二・第三誓約は歴史と遺産への関心を示して必要なものを得たと切り返す。バクージャジャがただの古い葉だと嘲っても、必須の材料を欠き、料理への理解を示せなかったとして不合格を告げ、鍵石は与えられない。バクージャジャは偉業を罵り、いずれ奪えばいいと言い放つ。</p><p>あなたたちは食べる。ウクラマトは、イブルクは柔らかく、バナナの葉が香辛料を丸くまとめ、これは調和の味だと断言する。力と欺きしか知らない者には味わえない、と。フンム・ルルクは完食も偉業の一部だと促し、ウクラマトは喜んで応じる。彼女はあなたの料理の才を褒め、冒険に飽きたら自分専属の料理人になれと冗談まで言う。コーナはまずまずだと短く評し、フンム・ルルクは「食之試煉」を成し遂げた者として鍵石を授ける。残る偉業はひとつとなり、コーナは出発しようと言い、他の者と組まされずに済んでよかったと口ごもるが、サンクレッドにもっと気の利いた言い方があるだろうと茶化される。ウクラマトは第六の鍵石を喜び、皆に礼を言った直後、シブルク・ピビルのおかわりが残っていないかと真剣に尋ねる。</p><p>その後、仲間たちは最後の偉業が残ることを噛みしめ、クルルは評価に安堵し、アルフィノは第一誓約に鍵石を渡さなかったのは大きいと言い、アリゼーはバクージャジャに奪われた鍵石をどう取り戻すか考え始める。一方のウクラマトは、もう一度シブルク・ピビルを食べたいとあなたに残り物で作った分を渡し、偉業が終わった今なら村の者も売ってくれるはずだと、道中用に買い込む気満々でいる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> コーナ <small class="muted">（ヤクテル樹海, X:30.9, Y:14.3）</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="a-fathers-grief.html">ふたりの父</a></div></div>`
  },

    story:`<div class="clamp" data-collapsed="true"><p>Wuk Lamat 說，能學到這片森林的歷史，全都多虧了 Wuk Evu。這已經是他第二次幫上忙了；她忍不住感嘆，若不是你們當初想到要去修理那艘浮具，或許根本不會遇見他。Wuk Evu 只是謙遜地表示，希望自己對第三誓約有所助益。Koana 則把話題拉回眼前的難題：Wuk Evu 的確讓你們更明白 xibruq pibil 的起源，但你們仍然沒有辦法取得香蕉葉。除非——他提出一個可能：那場歷史性的饗宴，是否曾以某種形式被紀念？例如立起一座紀念碑。</p><p>Wuk Evu 回答確實有，並帶你們前往。那裡陳列著由兩方獻上的武器，象徵他們立誓再也不對彼此舉兵。Koana 說，既然這場「食之試煉」要求你們走進歷史，他便推想像這樣的紀念物，尤其是位在重要戰場核心的紀念物，或許能把你們引向正確方向。他請你和 Wuk Lamat 一起在周圍搜尋，若有任何異狀就立刻告訴他。很快地，Koana 發現泥土有被翻動的痕跡；Wuk Lamat 興奮地喊出有人埋了箱子。你們打開一看，裡頭竟是新鮮的香蕉葉。Koana 推測這八成是 Hunmu Rruk 的安排，還說把香蕉葉藏在這座戰場上別有意趣——畢竟正是在這裡，它們也曾成為終結戰爭的一部分。Wuk Lamat 笑說他果然一開始就把一切都算好了。她再次向 Wuk Evu 道謝，因為沒有他的帶路，你們不可能找到香蕉葉；Wuk Evu 也回以「能幫上忙是我的榮幸」。</p><p>接著，Wuk Evu 略帶歉意地說，除了幫忙，他也想趁此給第三誓約一句鼓勵。自從他在 Feat of Reeds (蘆葦試煉)見識過 Wuk Lamat 的表現，他就深信她是最值得帶領國家的誓約者。他說，面對 Hanuhanu 作物衰敗，你們都能提出解決方案，但只有她願意去理解他們的文化，甚至想復興 Ihih’hana——即使那看起來與任務並不直接相關。依他看來，沒有人比她更在乎 Tuliyollal 的人民與他們珍視的一切。若將來你們還需要一位老造船匠聊聊歷史，他隨時願意效勞；說完，他便告辭離去。Koana 低聲表示自己無從反駁，然後說你們已經拿到所需的東西，該回 Iq Br’aax 了。</p><p>回到 Garden of the Stars，Wuk Lamat 忍不住笑說，Wuk Evu 搞不好其實是歷史學者而不是造船匠。Koana 對你們的成功感到欣慰，也推測其他人很快就會回來；Wuk Lamat 則坦白自己餓到不行。等大家重新集合，Koana 詢問各自的進展。Wuk Lamat 立刻宣布你們拿到香蕉葉了，而且是 Wuk Evu 跟著一起、幫忙找出來的。Krile 聽見 Wuk Evu 也來過，遺憾自己沒能跟他打聲招呼；Wuk Lamat 則說他還給了你們一堂很重要的歷史課。Alphinaud 表示，Gulool Ja Ja 能終結數百年的戰爭並不意外，但用料理換來和平就完全是另一回事；Wuk Lamat 笑說那正是爸爸會想到的奇招，接著追問廚房準備得如何。Krile 回報她與 Urianger 又在村子裡走了一圈，借到了需要的烹飪器具——當然沒有提用途；Alphinaud 則說自己收集了這片森林能提供的上等柴火。Alisaie 表示她和 Erenville 已經找到 ibruq，肉也準備充足；Erenville 卻補了一句那隻獵物很難纏，害得獵人追捕時跌進天坑水洞，當場被 Alisaie 斥責「不是說好絕對別講出去嗎」。Thancred 說自己採了不少本地藥草，特別留意能取得 achiote (胭脂樹) 的種子；Urianger 也補充，他透過進一步探詢，已經推算出香料最理想的比例。</p><p>Koana 於是總結，現在只剩把料理做出來這一步了，並問你們之中是否有人擅長烹飪。Krile 說自己不敢自稱高手，但至少一直是自己下廚，交給她就好；同時她也希望你能一起協助，因為她記得你是很出色的料理人。Wuk Lamat 光是聽著就口水直流。</p><p>評鑑開始後，Wuk Lamat 一邊被香味勾得心癢，一邊看著 Sareel Ja 與 Bakool Ja Ja 也趕緊準備樣品。Krile 提交你們的 xibruq pibil，並解釋這道菜運用 Mamool Ja 的烹調手法去料理 Xbr’aal 偏好的香料肉食，是兩族在長年戰爭後締結和平的象徵。Hunmu Rruk 先肯定你們的材料與手法都正確，味道、口感與香氣也都成功重現；但他也說，只要照著食譜做，誰都可能做到相同成果。真正讓你們更進一步的是，你們不只做菜，還去理解它的文化意義——包括 Yak T’el 的暴力歷史，以及你們的爸爸在終結那段歷史時扮演的角色。他因此稱讚你們願意向過去學習，這份態度正適合成為 Dawnservant 的人。接著他說「真正的理解只能透過親身體驗」，要求你們把料理吃下去。</p><p>Sareel Ja 不滿地表示你們還沒評他的菜，也主張他們做得同樣忠實。Hunmu Rruk 看了一眼，說他們的料理外觀像，但少了關鍵的香氣——因為缺少 Ja Tiika 的香蕉葉。Sareel Ja 一時語塞，Bakool Ja Ja 立刻暴怒，說就是因為他們才拿不到葉子，不該怪他們；Hunmu Rruk 反問第二誓約與第三誓約可沒有這種困難，你們需要的東西，是靠對歷史與傳統的關心自然得到的。Bakool Ja Ja 不屑地罵那只是「一片老爛葉子」，能差到哪裡去；Hunmu Rruk 卻明確裁定：他們缺少必要材料，也沒有展現對 xibruq pibil 的充分理解，因此表現不合格，不會得到 keystone。Bakool Ja Ja 轉而嘲諷這項試煉本來就很蠢，還放話之後照樣可以用搶的拿到他想要的東西。</p><p>你們開始用餐。Wuk Lamat 一口下去就激動地說太好吃了：ibruq 軟嫩到入口即化，而香蕉葉把香料的味道收得圓潤、層次絕妙。她說這就是「和諧」的滋味——只懂蠻力與欺騙的人絕不可能懂得欣賞。Hunmu Rruk 提醒你們把餐點吃完也是試煉的一部分；Wuk Lamat 開心得不得了，還誇你廚藝真有天分，甚至笑說你要是哪天不想冒險了，可以來當她的私人主廚。Koana 則只淡淡表示「還算可口」。最後，Hunmu Rruk 將 keystone 授予成功完成「食之試煉」的你們。Wuk Lamat 看著只剩最後一項試煉，Koana 也說自己該動身了，並有些不自在地表示幸好沒有跟其他人分到一組，還被 Thancred 打趣「你應該能說得更好吧」。Wuk Lamat 興奮宣布第六枚 keystone 到手，感謝大家之後又忽然想起一件更重要的事：還有沒有剩下的 xibruq pibil？她真的很想再來一份。</p><p>之後你們稍作整理：Erenville 說只剩最後一項試煉，讓人幾乎猜不到接下來會發生什麼；Krile 為料理被肯定而鬆了口氣；Alphinaud 表示讓第一誓約拿不到 keystone 是關鍵勝利；Alisaie 則提醒你們得開始思考如何把那枚被 Bakool Ja Ja 奪走的 keystone 搶回來。與此同時，Wuk Lamat 已經在想下次再吃 xibruq pibil 了，她把 Krile 用剩餘材料多做出的份遞給你，並說既然「食之試煉」結束了，村民應該也能正大光明賣給你們，讓她可以買些帶在路上。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 柯納哥 <small class="muted"> 亞克特爾樹海（X:30.9, Y:14.3)</small></div></div>`,

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
