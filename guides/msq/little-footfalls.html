  EN:{
    langLabel:'English',
    pageTitle:'Little Footfalls',
    tabs:{story:'Story',acq:'Acquisition',unlockq:'Unlock Quest',followq:'Follow-Up Quest',comments:'Comments'},
    readMore:'Show more',readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Alisaie steadies the urgency with a hard truth: regardless of circumstances, Zoraal Ja is Gulool Ja’s father, and the boy is bound to be confused. Krile voices the same worry, promising that if Gulool Ja returns to the Backroom, she will tell you at once. G’raha Tia urges you not to lose time—while they keep the preparations moving and continue reviewing the data, you must focus on finding the child. Shale’s apology comes too late, and Wuk Lamat’s fear sharpens into resolve: if Gulool Ja is outside the tower, you have to reach him quickly—the wilds are no place for a child.</p><p>You move to the base of the tower and step out into Heritage Found, where the sheer scale makes it clear you can’t search as one group. Alisaie suggests splitting up to cover more ground, and Wuk Lamat admits she doesn’t even know where to begin. So you start with the simplest possibility: someone nearby might have seen him. Alisaie takes the outskirts, while you go with Wuk Lamat beyond the great wall.</p><p>Wuk Lamat calls for the “little one” as you press on, but there’s no sign of Gulool Ja. Instead, you notice people gathered to the southwest, and Wuk Lamat pulls you toward them, hoping they’ve seen something. The path leads into the Driftdowns, a place that looks like a salvage yard—exactly the kind of corner where a child might slip away unnoticed.</p><p>There, Taapu reacts to your approach before you speak, saying he doesn’t recognize your footfalls. When Wuk Lamat asks about Gulool Ja, Taapu answers immediately: the boy isn’t here. He explains that though his eyes are useless, his ears are sharp enough to recognize people by their steps—including Gulool Ja. Then he turns the question back on you: who are you to the boy, and why do you search for him?</p><p>Wuk Lamat forces herself to say it plainly. She is family—not by blood, but because the boy’s father is her brother, and she has only just met Gulool Ja without ever getting the chance to speak properly. She is about to do something that may make him hate her, and she wanted to explain before that happens. She names herself as Wuk Lamat, Vow of Resolve of Tuliyollal, and says she came to bring Zoraal Ja to account for murdering their people and their father. Even if Gulool Ja turns away from her when it’s done, she will still consider him family, and she wants him to know she will always be there.</p><p>Taapu hears the tremor in her voice and understands what it costs her to do what she must. He tells you Gulool Ja headed south—to a place that is as close to a home as he knows—and urges Wuk Lamat to bare her heart, then accept and respect the boy’s wishes if he does the same. He speaks of Queen Sphene doing exactly that for his people: she urged them to live inside Everkeep for their safety, and when they refused, she accepted their decision, provided supplies, and visited regularly to see how they fared. With that guidance, you continue south, alert for any sign—because somewhere ahead, Wuk Lamat has glimpsed a half-submerged town with architecture unlike anything you’ve seen so far, more like Sharlayan, and within the ruins she catches the unmistakable silhouette of a small child. You hurry after him, praying the crumbling buildings don’t collapse while he’s inside.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Wuk Lamat <small class="muted">(The Backroom, X:6.2, Y:6.3)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="gives-you-teeth.html">Gives You Teeth</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 98</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="drowned-vestiges.html">Drowned Vestiges</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'小さな君を探して',
    tabs:{story:'ストーリー',acq:'入手方法',unlockq:'開放クエスト',followq:'後続クエスト',comments:'コメント'},
    readMore:'全文を表示',readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>アリゼーは、どんな事情があろうとゾラージャはグルージャの父親であり、子どもが混乱するのは当然だと告げる。クルルも無事を祈り、もしグルージャがバックルームに戻ってきたら必ず知らせると約束する。グ・ラハ・ティアは心配無用だと言い、準備は自分たちが進めるから、あなたはグルージャの捜索に集中すべきだと背中を押す。シェイルは気づくのが遅れたと悔やみ、ウクラマトは、もしグルージャが塔の外にいるなら一刻も早く見つけなければならない、荒野は子どもがいる場所ではないと言い切る。</p><p>あなたはウクラマトとともに塔の麓へ向かい、ヘリテージファウンドへ出る。広大な土地を前に、アリゼーは手分けすればより広く探せると提案し、ウクラマトは外に出たはいいがどこから探すべきかと迷う。まずは近くで聞き込みをしようという結論になり、アリゼーが外縁部を担当し、あなたはウクラマトと大きな壁の向こうへ向かう。</p><p>ウクラマトは「どこへ行ったの、小さき者よ」と呼びかけながら進むが、周囲にグルージャの姿はない。けれど南西に人だかりが見え、あなたたちは手がかりを求めてそちらへ向かう。辿り着いた先はドリフトダウンズで、まるで解体場のような景色が広がっていた。</p><p>そこでタープが、あなたの足音に反応し、聞き慣れない足取りだと言う。ウクラマトがグルージャのことを尋ねると、タープは即座に「ここにはいない」と答える。彼は目が利かない代わりに耳が鋭く、足音で人を判別できるのだと説明し、グルージャの足音も覚えていると告げる。そして今度は、あなたたちが何者で、なぜグルージャを探しているのかを問い返す。</p><p>ウクラマトは言葉を選びながらも、家族だと名乗る。血のつながりはないが、グルージャの父は自分の兄であり、会ったばかりでまだきちんと話す時間もなかったと打ち明ける。けれど自分はこれから、彼に憎まれるかもしれないことをしようとしている、その前に説明したかったのだと。さらに彼女は、トライヨラの決意の誓約者ウクラマトだと名乗り、民と父を殺した兄ゾラージャに責任を取らせるためにここへ来たのだと言う。すべてが終わればグルージャに拒まれるかもしれない、それでも家族だと思い、そばにいると伝えたいのだと。</p><p>タープは声の震えから、彼女がどれほど引き裂かれているかを悟る。そしてグルージャは南へ向かった、彼にとって家に最も近い場所があるのだと教え、心のうちをさらけ出せと促す。もしグルージャも心を開いたなら、その願いを受け止め尊重するべきだ――かつてスフェーン女王が、自分たちに居場所を与えた時のように、と。女王は安全のためエバーキープ内で暮らすよう勧めたが、断られても受け入れ、ここで暮らすための物資を与え、以来、定期的に様子を見に来てくれたのだという。あなたはその言葉を胸に南へ進む。やがてウクラマトは、半分が水没した町と、これまでと異なる建築――どこかシャーレアンを思わせる景色を目にし、廃墟の中に小さな影を見つける。崩れかけた建物の中で事故が起きぬよう、あなたは急いで追いかける。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ウクラマト <small class="muted">（バックルーム, X:6.2, Y:6.3）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="gives-you-teeth.html">エナジードリンクでガウガウ元気に</a></div><div class="row">ファイター ソーサラー （リミテッドジョブを除く） Lv 98</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="drowned-vestiges.html">水没した街</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'尋找年幼的你',
    tabs:{story:'故事概要',acq:'取得方式',unlockq:'解鎖任務',followq:'後續任務',comments:'留言'},
    readMore:'展開全文',readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Alisaie 先把最刺痛的事實說出來：不管情況怎麼樣，Zoraal Ja 終究是 Gulool Ja 的爸爸，孩子一定會很困惑。Krile 也擔心他會不會出事，表示如果 Gulool Ja 回到 The Backroom，她一定第一時間通知你。G’raha Tia 則要你別分心，說他們會繼續推進準備、也會把資料查閱下去，你只要專心把 Gulool Ja 找回來就好。Shale 低聲道歉自己太晚才察覺，而 Wuk Lamat 的焦急立刻變成決心：如果 Gulool Ja 在塔外，你們得盡快找到他——就算他很習慣獨自行動，荒野也不是孩子該待的地方。</p><p>你跟著 Wuk Lamat 去到塔的底部，走出來進入 Heritage Found。這片區域大得驚人，Alisaie 說分頭行動才能更快覆蓋範圍；Wuk Lamat 站在外頭卻一時不知道該從哪裡開始。你們決定先就近打聽，看看有沒有人見過 Gulool Ja。Alisaie 負責外圍一帶，你則和 Wuk Lamat 越過那道高牆，往更外側找去。</p><p>Wuk Lamat 一路喊著「小傢伙，你跑去哪了……？」可附近完全沒有 Gulool Ja 的影子。這時你注意到西南方不遠處聚著一群人，Wuk Lamat 也看見了，立刻拉著你過去，覺得也許他們知道些什麼。你們走著走著，來到 The Driftdowns——看起來像某種回收場一樣的地方。</p><p>這裡的 Taapu 聽見你們靠近，先開口說你的腳步聲很陌生。Wuk Lamat 直接問起 Gulool Ja，Taapu 立即回答：他不在這裡。Taapu 說自己眼睛不好使，但耳朵反而更敏銳，能靠腳步聲認人，也包括 Gulool Ja。接著他反過來問：你們的聲音他不熟，你們跟 Gulool Ja 是什麼關係，又為什麼要找他？</p><p>Wuk Lamat 像是硬把話從胸口扯出來一樣說：她是家人——雖然沒有血緣，但 Gulool Ja 的爸爸是她的兄弟。她才剛見到 Gulool Ja，連好好談一次都還來不及；可她馬上就要做一件可能會讓孩子恨她的事，所以她想先解釋。她也坦白身分：她是 Tuliyollal 的 決意之誓約者 Wuk Lamat，這趟來到這裡，是要讓 Zoraal Ja 為了殺害他們的人民與爸爸付出代價。就算事情結束後 Gulool Ja 可能再也不想理她，她仍然會把他當家人，仍然會站在他那邊，她只是想讓他知道這件事。</p><p>Taapu 聽得出她聲音在顫，明白她做出選擇的痛。Taapu 告訴你們 Gulool Ja 往南走了，那裡有一個對他來說最接近「家」的地方，並要 Wuk Lamat 把心裡的話說清楚；如果 Gulool Ja 也願意對她敞開心扉，那就要接受並尊重孩子的選擇——就像 Queen Sphene 當初尊重他們一樣。Taapu 說，出於關心，Queen Sphene 曾勸他們住進 Everkeep，但他們拒絕後，她不只體面地接受，還提供物資讓他們能在這裡落腳，之後也會定期來探望他們過得如何。你們於是繼續往南，邊走邊警戒任何動靜——因為前方，Wuk Lamat 已經看見一座城鎮的輪廓，甚至有一半淹在水裡，建築風格也和先前所見不同，更像 Sharlayan。就在那片廢墟間，她瞥見那個小小的身影，你只能立刻追上去——要是孩子躲進殘破的建物裡，任何一次崩塌都可能釀成無可挽回的災難。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 烏克·拉瑪特 <small class="muted"> 後室（X:6.2, Y:6.3)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="gives-you-teeth.html">嗷嗷有勁能量特飲</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.98</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="drowned-vestiges.html">水下的街巷</a></div></div>`
  }
};

const langToggle=document.getElementById('langToggle');
const pageTitle=document.getElementById('pageTitle');
const tabBtns=[...document.querySelectorAll('.tab-btn')];
const panels={story:document.getElementById('panel-story'),acq:document.getElementById('panel-acq'),unlockq:document.getElementById('panel-unlockq'),followq:document.getElementById('panel-followq'),comments:document.getElementById('panel-comments')};

function getLang(){return localStorage.getItem(LANG_KEY)||'EN';}
function wireClamp(panelEl,t){
  const clamp=panelEl.querySelector('.clamp');
  const btn=panelEl.querySelector('[data-role="expand"]');
  if(!clamp||!btn) return;
  function setLabel(){
    const collapsed=clamp.getAttribute('data-collapsed')!=='false';
    btn.textContent=collapsed?t.readMore:t.readLess;
  }
  setLabel();
  btn.addEventListener('click',()=>{
    const collapsed=clamp.getAttribute('data-collapsed')!=='false';
    clamp.setAttribute('data-collapsed',collapsed?'false':'true');
    setLabel();
  });
}
function renderPanel(key,lang){
  const t=i18n[lang]||i18n.EN;
  Object.keys(panels).forEach(k=>panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if(key!=='comments') panels[key].innerHTML=t[key];
  if(key==='story') wireClamp(panels[key],t);
  if(key==='comments') loadGiscusForCurrentLang();
}
function applyLang(lang){
  const t=i18n[lang]||i18n.EN;
  pageTitle.textContent=t.pageTitle;
  langToggle.textContent=`🌐 ${t.langLabel}`;
  tabBtns.forEach(btn=>{btn.textContent=t.tabs[btn.dataset.tab];});
  const activeBtn=tabBtns.find(b=>b.getAttribute('aria-selected')==='true')||tabBtns[0];
  renderPanel(activeBtn.dataset.tab,lang);
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab,getLang());
  });
});
langToggle.addEventListener('click',()=>{
  const cur=getLang();
  const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
  localStorage.setItem(LANG_KEY,next);
  applyLang(next);
});
applyLang(getLang());

const GISCUS_CFG={repo:'BELAUG-FFXIV/FFXIV_Library',repoId:'R_kgDOPyh4Kw',category:'General',categoryId:'DIC_kwDOPyh4K84CwPjL',theme:'preferred_color_scheme'};
function uiLang(code){return code==='JP'?'ja':(code==='ZH'?'zh-TW':'en');}
function loadGiscusForCurrentLang(){
  const mount=document.getElementById('giscus_container');
  if(!mount) return;
  mount.innerHTML='';
  const langCode=getLang();
  const s=document.createElement('script');
  s.src='https://giscus.app/client.js';
  s.setAttribute('data-repo',GISCUS_CFG.repo);
  s.setAttribute('data-repo-id',GISCUS_CFG.repoId);
  s.setAttribute('data-category',GISCUS_CFG.category);
  s.setAttribute('data-category-id',GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping','specific');
  s.setAttribute('data-term',location.pathname+'｜'+langCode);
  s.setAttribute('data-reactions-enabled','1');
  s.setAttribute('data-emit-metadata','0');
  s.setAttribute('data-input-position','bottom');
  s.setAttribute('data-lang',uiLang(langCode));
  s.setAttribute('data-theme',GISCUS_CFG.theme);
  s.setAttribute('crossorigin','anonymous');
  s.async=true;
  mount.appendChild(s);
}
</script>
