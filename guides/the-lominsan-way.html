const i18n = {
  EN:{
    langLabel:'English',

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Trachtoum is still trying to talk his way through it—half boasting, half stalling—when the Grey Fleet Miller catches him in the act. The boss’s patience is gone, and so is his trust. Trachtoum swears the goobbue is dead, swears he split its skull with his axe, but the Miller turns to you and demands the truth: did Trachtoum really slay it…or did you?</p>
      <p>Cornered, Trachtoum tries to drown the question in grand history, calling himself the finest axeman ever to serve in the Company of Heroes—the legendary mercenaries who felled “Tidus.” The Miller’s disbelief hits like a slap. Tidus? What in the seven hells is Tidus? The Company of Heroes slew Titan, and Trachtoum’s excuse—some nickname he and the lads used—only makes it worse. The Miller orders both of you outside, promising you’ll learn the truth the Lominsan way, and warning Trachtoum that if he didn’t do the job, his contract is as good as gone.</p>
      <p>Outside, Trachtoum lays out the contest with forced bravado: first man to smash his boulder earns the title of goobbue slayer. He even throws in a rule with a crooked grin—don’t try to kill him, because that would be “cheating.” The Miller looks at the two boulders, curses the unfairness of it, and decides to start anyway.</p>
      <p>The moment it begins, Trachtoum roars with laughter and swings like he’s already won. He shouts between blows, trying to drown out your steady progress with noise and swagger—until the rhythm breaks. His confidence slips into frustration, then into panic. When the cracks don’t come fast enough, he snaps his head around and barks a desperate lie—“Look behind you! A three-headed goobbue!”—hoping you’ll falter.</p>
      <p>When you don’t, he scrambles for another angle. He produces something with sudden relief and calls out to you like a mate, asking if you’re feeling a bit stiff. He chuckles as if it’s all harmless fun—only killing is against the rules, after all—then barks that he’s had enough of this. The contest drags on under his strain and foul mood, and the sound of his axe grows uneven, heavy.</p>
      <p>At last, Trachtoum’s arms give out. He hunches over, cursing his own limbs, spitting venom at the boulder and at you—anything to avoid the shame tightening around his throat. When it ends, he’s left with nothing but anger and the truth he’s been dodging.</p>
      <p>Afterward, Trachtoum finally breaks. He blurts out the confession in a rush—he lied about being in the Company of Heroes—and he begs the Miller not to dismiss him. He insists he never meant to deceive anyone, that he only panicked after being turned away again and again when he asked for work. He tells you about his last job at Costa del Sol, about a grizzled marauder everyone treated like royalty, and how hearing the man was a captain in the Company of Heroes made Trachtoum understand why. He swears he wasn’t serious when he claimed to be one of them—but once the Miller believed him, he couldn’t find a way back. Then he gives you a name: Wheiskaet. Wheiskaet will tell you how to defeat Titan—or “Titus,” or whatever the hells that thing’s name is—and Trachtoum demands you speak up for him, because that’s what you wanted, wasn’t it?</p>
      <p>You go to Costa del Sol and find Wheiskaet, and the air changes the moment you speak your intent. He repeats it back, flat and incredulous: you wish to slay the Lord of Crags. Y’shtola steps in at once, steady and unwavering—Limsa Lominsa is depending on this, and you must do it. Wheiskaet scoffs at the idea of would-be heroes, but Y’shtola doesn’t flinch. She reminds him how long she has worked for the well-being of the people here, and she points to what you’ve already endured: you survived Ifrit’s hellfire. More than that, you are protected from primal influence—you cannot be tempered—so you were able to bring down the Lord of the Inferno. You know the risks, you’ve taken precautions, and all you lack is the knowledge of how to enter Titan’s lair.</p>
      <p>Wheiskaet’s answer is hard as stone. Useful, he admits—but not enough. The Company of Heroes did fight and fell primals, but every victory was bought in blood, and Titan was the worst of them. They defeated him in the end, yet he took some of their very best, and Wheiskaet has no reason to believe you will succeed. Y’shtola meets that with the simplest truth: you will try. Even if your lives are forfeit, you will not abandon Limsa to Titan’s wrath. Wheiskaet softens—only slightly—granting that your passion is real, and that you deserved better than the greeting he gave. But he will not send you into O’Ghomoro on a whim, and he will not watch you die for nothing. If you want his knowledge, he demands proof that you are more than common adventurers. He offers you work under his authority as the overseer of security for Master Gegeruju’s estates. Y’shtola bristles at the waste of time, but Wheiskaet will not be swayed by words. With a weary sigh, Y’shtola concedes you have no choice. She asks you to take the task alone while she attends to the remaining preparations—and leaves you with the weight of it: the fate of Limsa Lominsa hangs in the balance.</p>
    </div>

  JP:{
    langLabel:'日本語',
    pageTitle:'怒りの風車番',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>トラッハトゥームが口ごもりながらも言い訳を重ねているところへ、グレイフリートの風車番が踏み込んでくる。飲んでいたのかと咎められ、肝心のグーブーはどうしたと詰められると、トラッハトゥームは斧で頭蓋を真っ二つに割って倒したのだと胸を張った。だが風車番は、今度はあなたへ視線を向け、真実を答えろと迫る。グーブーを斬ったのはトラッハトゥームか、それともあなたか。</p>
      <p>追い詰められたトラッハトゥームは、話を大げさにふくらませて名乗り出る。自分は海雄旅団に仕えた伝説の斧使いで、奴らが討ったのは土神ではなく別名の存在なのだと言い張る。けれど風車番は鼻で笑い、海雄旅団が討ったのは土神タイタンだと叩きつける。トラッハトゥームが「仲間内の呼び名だった」と取り繕っても、言い逃れにしかならない。風車番は二人を外へ追い立て、リムサ流で真相をはっきりさせると言い渡す。そして、もしグーブーを倒していないのなら契約は破棄だと、トラッハトゥームへ冷たく告げた。</p>
      <p>外に出ると、トラッハトゥームは無理に陽気さを作り、勝負のルールを叫ぶ。岩を叩き割ったほうがグーブー討伐者だ。だが妙に念を押す──自分を殺そうとするな、それは反則だ。風車番は二つの岩を見比べ、不公平だと悪態をつきながらも、始めるしかないと合図した。</p>
      <p>勝負が始まると、トラッハトゥームは高笑いして斧を振るい、勝利を確信したように騒ぎ立てる。勢いだけで周囲を押し切ろうとするが、次第に息が荒くなり、焦りが表に出る。思うように砕けないと見るや、今度は苦し紛れに声を張り上げた。背後に三つ首のグーブーがいるぞと、でたらめであなたの手を止めさせようとする。</p>
      <p>それでもあなたが止まらないと、トラッハトゥームは別の手に出る。何かを取り出して得意げに近づき、身体がこわばっていないかと、仲間口調で問いかけた。くすくす笑いながら、殺しだけが反則なのだと言い添え、ついにはもう我慢ならないと吐き捨てる。勝負は続き、トラッハトゥームの斧は次第に重く、乱れていった。</p>
      <p>やがてトラッハトゥームは腕を抱え込み、血の気の引いた顔でうめく。腕が痛い、動かないと呻き、岩へ向けて汚い言葉を浴びせ、悔しさをぶつけるしかない。勝負が終わるころには、彼の虚勢だけが剥がれ落ちていた。</p>
      <p>そしてついに、トラッハトゥームは叫ぶように白状する。海雄旅団にいたという話は嘘だった、それでも見捨てないでくれと風車番に懇願する。仕事を求めて回っても断られ続け、追い込まれて取り繕ったのだと訴えた。以前コスタ・デル・ソルで働いたとき、皆に崇められていた年季の入った戦士がいた。その男が海雄旅団の隊長だと知り、なぜ特別扱いされるのか分かったのだという。冗談のつもりで自分も海雄旅団だと口にしたが、信じられてしまい、引くに引けなくなった。だから名前を出す──ヴェイスケートだ。土神タイタンを倒す方法を知っているのは彼だと叫び、欲しかったのはそれだろうと、あなたに自分を赦すよう口添えしろと迫った。</p>
      <p>あなたはコスタ・デル・ソルへ向かい、ヴェイスケートの前に立つ。用件を告げると、彼は眉をひそめ、土神を討つつもりかと問い返した。ヤ・シュトラが一歩前へ出て、リムサ・ロミンサの民が頼っているのだと静かに言い切る。ヴェイスケートは英雄譚の真似事かと嘲るが、ヤ・シュトラは怯まない。自分がこの地のために尽くしてきたこと、そしてあなたが炎神イフリートの業火を浴びて生き延びたことを示し、さらにあなたは蛮神の影響を受けない力に守られているのだと告げる。炎神を討ち果たしたのもその力ゆえだ。危険は承知し、万全を期した。残るのは土神のねぐらへ至る術だけ、どうか知恵を貸してほしい、と。</p>
      <p>だがヴェイスケートの返答は冷たい。蛮神に屈さぬ力は有用だが、それだけでは足りない。海雄旅団が蛮神を倒してきたのは事実だが、勝利は勇敢な者たちの血で購われた。中でも土神タイタンは最悪で、倒したあとにも、最良の仲間たちを奪っていった。あなたが名乗る力を持つとしても、成功すると信じる理由はない。ヤ・シュトラは、それでも挑むと答える。命が失われようとも、リムサ・ロミンサを土神の怒りに委ねはしない。ヴェイスケートは情熱だけは認め、先ほどの無礼を詫びるように言葉を和らげるが、気まぐれでオ・ゴモロへ送り込むことはできない、無駄死には見たくない、と釘を刺す。せめて並の冒険者ではない証を立てろと言い、ゲゲルジュの別荘地の警備を預かる自分の仕事として、力を示してみせろと条件を出した。ヤ・シュトラは苛立ちを隠せないが、言葉では動かせないと悟り、ため息まじりに受け入れるしかないと告げる。残る準備を進めるため、あなたにこの用件を一人で引き受けてほしい──そして最後に、リムサ・ロミンサの命運が懸かっているのだと念を押した。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

      <div class="row"><b>クエスト発行</b> トラッハトゥーム <small class="muted">低地ラノシア (X:35.6, Y:15.9)</small></div>
    </div>`,

    </div>`,

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'憤怒的風車看守人',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Trachtoum 還在含糊其詞、想把話題繞回自己那套說法時，Grey Fleet Miller 已經衝進來逮個正著。他質問 Trachtoum 又在裡頭喝酒，並直接追問：那隻 goobbue 到底死了沒有。Trachtoum 立刻拍胸脯保證，說自己用可靠的斧頭把野獸的頭骨劈成兩半。可 Grey Fleet Miller 沒被說服，他轉而盯著你，要求你說出真相──那隻 goobbue 真的是 Trachtoum 砍的，還是其實是你做的？</p>
      <p>被逼到牆角的 Trachtoum 只好把謊言說得更大聲。他自稱是 Company of Heroes 裡最了不起的斧兵，還說那些傳說中的傭兵曾經討伐的不是什麼 Titan，而是他口中的「Tidus」。Grey Fleet Miller 的反應像一記冷水，直接把這套胡扯打回去：哪來的 Tidus？Company of Heroes 討伐的是 Titan，你這個半吊子。Trachtoum 只能尷尬地改口，說那只是他和同伴私下的叫法，可這只讓 Grey Fleet Miller 更加不耐。他罵那是他聽過最離譜的鬼話，命令你們兩個立刻出去，說要用 Limsa Lominsa 的方式弄清楚真相，並警告 Trachtoum：如果你根本沒殺掉 goobbue，你的合約就到此為止。</p>
      <p>到了外頭，Trachtoum 裝出一副規矩森嚴的樣子，宣布比試規則：誰先把自己的巨石砸碎，誰就會被判定為 goobbue 的討伐者。他還故作輕鬆地補上一句──別想殺他，那樣算作弊。Grey Fleet Miller 看到兩塊石頭根本大小不一，忍不住咒罵，但最後還是揮手開始，讓比試照樣進行。</p>
      <p>比試一開始，Trachtoum 就放聲大笑，自信滿滿地猛砍猛敲，嘴上不停叫囂，彷彿勝利已經握在手裡。可隨著時間拉長，他的動作開始急躁，呼吸也亂了。眼看進度不如預期，他忽然大喊要你回頭，胡亂編出「三個頭的 goobbue」想分散你的注意力，好讓你停手。</p>
      <p>你沒有停下，他立刻又換另一種方式干擾。他像是突然想起什麼似的，急忙掏出一樣東西，帶著得意的笑問你：是不是覺得身體有點僵硬？他還嘻嘻笑著補一句──規則只禁止「殺人」，可沒說不能用別的方法。接著他乾脆惱羞成怒，罵了一句受夠了。比試在他的焦躁與干擾中繼續，他的斧擊聲越來越沉、越來越亂。</p>
      <p>最後，Trachtoum 的手臂撐不住了。他抱著手臂呻吟，咒罵自己的胳膊，咒罵眼前那塊石頭，連髒話都帶著無力的顫抖。當比試結束時，他只剩下狼狽與憤恨，再也撐不起先前那副「英雄」的模樣。</p>
      <p>事後，Trachtoum 終於崩潰般承認：他根本沒待過 Company of Heroes，那些話全是騙人的。他哭著求 Grey Fleet Miller 別把他趕走，說自己真的學到教訓了。他解釋自己到處找工作卻一次次被拒絕，慌到只能亂說。之前他在 Costa del Sol 做事時，見過一個滿臉滄桑的 marauder，被所有人像對待貴客一樣奉承；當他聽說那人是 Company of Heroes 的 captain，他才明白為什麼那人會被如此敬重。他強調自己當初說自己也是 Company of Heroes 只是隨口胡扯，可你們居然相信了，他就更不知該怎麼收回來。接著他拋出名字──Wheiskaet。只要去找 Wheiskaet，就能知道怎麼對付 Titan（或他嘴裡亂喊的那個名字）。他反過來逼你替他說話：你要的不就是這個嗎？那就去跟 Grey Fleet Miller 求情，這才公平。</p>
      <p>你前往 Costa del Sol，見到了 Wheiskaet。你一開口表明來意，他立刻反問得直接而冷：你想討伐 Lord of Crags？Y’shtola 隨即站到你身旁，語氣堅定地說你們必須這麼做，因為 Limsa Lominsa 的人民正仰賴你們。Wheiskaet 嘲諷你們自以為是英雄，就像故事裡那樣，可 Y’shtola 沒有退讓。她提醒對方，自己長久以來一直為這片土地與這些人付出；更指出你已經在 Ifrit 的烈焰中活了下來。她說你被某種力量保護，能抵抗 primal 的影響，所以你才能擊倒 Lord of the Inferno。你們明白風險，也已做足準備，現在只欠一件事──如何進入 Titan 的巢穴；她請 Wheiskaet 給你們那份關鍵的知識，讓你們立刻上路。</p>
      <p>Wheiskaet 的態度依舊強硬。他承認你不受 primal 影響確實有用，但仍認為這還不夠。Company of Heroes 的確曾經與 primal 交戰並取得勝利，可每一次勝利都是用勇敢之人的鮮血換來的，而 Titan 是他們面對過最糟的那一個。就算你擁有那份力量，他也沒有理由相信你能成功。Y’shtola 回答得乾脆：信不信由你，但你們會去嘗試；就算付出生命，也不會把 Limsa Lominsa 丟給 Titan 的怒火。Wheiskaet 這才稍微放緩語氣，承認你們的熱情，並說你們確實不該受到他剛才那樣的迎接；然而他不會憑一時衝動就把你們送進 O’Ghomoro，更不想看你們白白送死。他要求至少要有證明，證明你不是尋常的冒險者。作為負責 Master Gegeruju 地產警備的人，他要你先替他處理一件差事，用行動展示你的本事。Y’shtola 明顯不耐，斥責這是無謂的小事、現在根本沒有時間，可 Wheiskaet 也毫不退讓：如果不接受條件，你們就自己去找進入 O’Ghomoro 的方法。Y’shtola 只能沉沉嘆息，承認別無選擇；她請你獨自接下這件事，因為她必須去完成其餘準備。臨走前，她提醒你──Limsa Lominsa 的命運，就懸在這一步上。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
