<script>

const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`On the Counteroffensive`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Lieutenant Alianne’s impatience has been simmering; she has been waiting for a chance to even the score with the imperial invaders. Lieutenant Edelstein confirms what the watch has revealed—Castrum Meridianum has begun to stir, and the imperials are finally mobilizing. The latest reconnaissance report suggests the squads leaving the castrum are too few to seize and hold the Ceruleum Processing Plant; instead, they are likely to strike quickly and prioritize resource acquisition.</p><p>The report has already been shared with the Crystal Braves, who have chosen to meet the assault head-on in the field. Your fellow Scions have been apprised as well, and Edelstein takes heart knowing they will join the effort. With the counteroffensive imminent, the order is simple: report to Lieutenant Alianne and lend your strength where it is most needed.</p><p>Steel nerves replace idle talk as preparations tighten around you. Wilred forces himself forward, praying for his blade and for the training to prove its worth. Thancred declares he will allow no soldier—and no magitek monstrosity—to harm Moenbryda, only to be met by Papalymo’s dry reminder that she is hardly helpless with that weapon in hand. Yda laughs it off with breathless admiration, and Moenbryda answers by admiring her axe in turn—Revenant’s Toll, she says, where a merchant simply pressed it into her hands as an “investment in the future.”</p><p>When the briefing begins, the shape of the enemy’s intent becomes clearer. A main column is assembling to the north near Dalamud’s Talons, yet several squads have also been sighted trying to conceal themselves along the western approach. Captain Ilberd names it for what it is: if your forces rush to commit against the main column, the detached squads will slip through to raid the plant and pillage supplies—no elegant strategy, but one desperate enough to be dangerous.</p><p>Ilberd has brought the 3rd out from Ul’dah to fill gaps in the plant’s defenses and add weight to the counterattack, because even heroes cannot be everywhere at once. With enough soldiers to divide forces safely, the decision is made to draw the battle away from the ceruleum stores; a fight amid those tanks is a risk no one wishes to take. The Scions will join the 4th against the main column, while you are assigned to the 3rd—intercept the western squads and stop them before they reach the processing plant. When ready, you are directed to report to Yuyuhase, whose scouts have a rough idea of where the imperials are hiding.</p><p>At Raubahn’s Push, Yuyuhase greets you with smooth confidence and an eye for outcomes—victory, he notes, has a way of paving the road to greater coin. The detached force has broken into smaller squads to hide in the terrain, so your side must split as well to root them out. You are given your own areas to scour clean in a straightforward search and destroy, and out in the field a hostile presence prickles at the edge of your senses more than once.</p><p>Returning to the staging point, the hard set of your expression tells Yuyuhase enough; between you, more than a few imperials will not make it back to the castrum. He admits they made you earn your pay, and he would be content never to face another of their magitek horrors. With the west now clear, he contacts the 4th and asks that you do the same—report back to Edelstein. The lieutenant receives the news with relief: the raiding parties are no more, the plant is no longer in immediate danger, and the Amajina engineers will be grateful. Your assistance earns his thanks once again.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Edelstein <small class="muted">(Northern Thanalan, X:20.8, Y:22.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="aether-on-demand.html">Aether on Demand</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="an-uninvited-ascian.html">An Uninvited Ascian</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'帝国軍迎撃作戦',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>中尉アリアヌは、帝国の侵略者に一矢報いる機会を待ちわびていた。中尉エデルシュタインは監視の結果を告げる。カストルム・メリディアヌムの駐屯部隊がついに動き出し、偵察で確認された出撃分隊の数では、青燐精製所を制圧して保持するのは難しい。ゆえに狙いは迅速な襲撃であり、資源の確保に重点を置く可能性が高いという。</p><p>その報告はすでにクリスタルブレイブにも共有され、彼らは野外で正面から迎え撃つ方針を選んだ。暁の血盟にも状況は伝えられており、仲間たちが加勢することを知ってエデルシュタインは安堵する。反攻の時は迫っている。アリアヌのもとへ向かい、戦力として加わるよう求められた。</p><p>青燐精製所では、空気が一気に戦場の色へ傾く。ウィルレッドは訓練の成果を信じようとしつつ、武神ラールガーに刃を導けと祈る。サンクレッドはムーンブリダに指一本触れさせぬと息巻くが、パパリモは彼女の武器を見れば護衛など不要だろうと皮肉を返す。イダは斧さばきを誇らしげに語り、ムーンブリダはその斧を見せびらかす。レヴナンツトールで商人の女性に渡され、「未来への投資」だと言われたのだと笑った。</p><p>作戦説明が始まると、敵の狙いが見えてくる。北ではダラガブの爪付近に主力縦隊が集結しつつある一方、西方の進路には身を隠す分隊も確認された。イルベルドは断じる。主力へ突撃すれば、分遣隊は自由に回り込み、施設を襲って物資を略奪するだろう。巧妙ではないが、追い詰められた者たちはそれでも賭けに出る。</p><p>イルベルドは、ウルダハで待機していた第三分隊をここへ進出させ、守りの穴を埋めつつ反撃の数を増やすと告げる。十分な兵がそろい、部隊を分けて敵を壁の外で迎え撃てる段階に入った。青燐の貯蔵が並ぶ近辺で戦う危険は避けるべきだという判断も一致し、戦場は敵側へ押し出す方針となる。暁の血盟は第四分隊とともに主力を迎え撃ち、あなたは第三分隊につく。任務は西に潜む分隊を捕捉し、青燐精製所へ到達させないこと。準備が整い次第、偵察が潜伏地点を把握しているユユハセへ報告するよう命じられた。</p><p>ラウバーン緩衝地でユユハセは、再び肩を並べて戦えることを歓迎し、勝利は大きな稼ぎへつながるものだと言う。分遣隊は地形に紛れるためさらに小分けになっており、こちらも手分けして捜索し、襲撃者を残らず炙り出さねばならない。あなたには担当区域が割り振られ、単純明快な掃討として敵兵を狩り尽くすことになる。行動の最中、敵意の気配が幾度も肌を刺す。</p><p>合流地点へ戻ると、あなたの険しい表情だけで結果は伝わったとユユハセは笑う。帝国兵は容易く帰還できまい、と。魔導兵器の相手で報酬分はしっかり稼がされたともこぼし、二度とあの手の代物とは揉めたくないと吐き捨てる。西方は制圧済みだと第四分隊へ連絡し、あなたにもエデルシュタインへの報告を頼んだ。中尉は朗報を受け取り、襲撃部隊が壊滅したこと、施設が当面の危険を免れたことに安堵する。アマジナ社の技師たちも胸を撫で下ろすだろうと述べ、助力に改めて礼を言った。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> エデルスティーン少闘士 <small class="muted">（北ザナラーン, X:20.8, Y:22.1）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="aether-on-demand.html">ムーンブリダの秘策</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="an-uninvited-ascian.html">その者、ナプリアレス</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'帝國軍迎擊作戰',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Alianne 早就等著這一刻——終於能對那些帝國入侵者討回一筆。Edelstein 說明他們一直緊盯 Castrum Meridianum 的駐軍，而最新的偵察回報顯示：帝國軍確實開始動員了。從要塞出動的小隊數量不足以正面奪取並守住 Ceruleum Processing Plant，因此更可能採取迅速突擊，把重點放在搶奪資源。</p><p>這份回報也已送交 Crystal Braves，他們決定主動出擊，在野外正面迎戰。Scions 這邊也已接獲通知，Edelstein 得知同伴會投入戰鬥，語氣裡明顯鬆了一口氣。反攻就在眼前——接下來要做的很明確：去找 Alianne 報到，把你的戰力投入這場行動。</p><p>現場的氣氛迅速收束成備戰的緊繃。Wilred 逼自己鎮定下來，像是在確認所有訓練是否真的能派上用場，並低聲祈求 Rhalgr 指引他的刀。Thancred 誓言不會讓任何敵人——不管是士兵還是魔導兵器——傷到 Moenbryda，卻被 Papalymo 冷冷提醒：看她手上的武器，根本不需要額外保護。Yda 立刻接話，誇張比劃著 Moenbryda 揮斧的氣勢。Moenbryda 也不客氣地欣賞起那把斧頭，說是在 Revenant’s Toll，有位女商人直接送給她的，還說什麼「投資未來」。</p><p>隨著簡報展開，帝國軍的盤算逐漸清晰。主力縱隊正在北方、靠近 Dalamud’s Talons 集結；同時也有數個小隊試圖沿西側路線隱蔽接近。Ilberd 直接點破：他們就是想引誘你們急著衝出去和主力交戰，讓分遣的小隊趁空檔突入、襲擊工廠並掠奪補給。這算不上多高明的策略，但對走投無路的人而言，足夠危險。</p><p>Ilberd 接著說明，他把原本悶在 Ul’dah 的第三分隊帶了出來，用來補上防線缺口，也讓反擊的人數更充足——再強的戰力也不可能同時顧到每個方向。兵力到位後，眾人同意把戰鬥拉到牆外、遠離大量 ceruleum 的儲存區；若在那些儲槽附近交火，後果誰也不想承受。Scions 會和第四分隊迎擊北方主力，而你被編入第三分隊：攔截西側潛伏的小隊，阻止他們抵達 Ceruleum Processing Plant。準備就緒後，要去向 Yuyuhase 報到——他的斥候已大致掌握帝國軍的藏身處。</p><p>到了 Raubahn’s Push，Yuyuhase 用一貫的口吻迎接你，說能再次並肩作戰令人愉快；你出現時，行動總是容易成功，而勝利往往也會替道路鋪上更多金幣。他解釋，分遣部隊已拆成更小的單位，藉地形掩護隱蔽行動，所以你們也必須分散搜索，確保把這些準備襲擊的隊伍全部挖出來。你被分配到自己的區域，任務很單純——搜尋並殲滅。行動途中，敵意的氣息數度逼近，逼得神經緊繃到極限。</p><p>返回集結點後，你臉上的沉色已足以說明結果。Yuyuhase 低聲笑著表示：照這情勢看來，帝國軍有不少人回不了要塞了。他承認那些人確實讓你們付出了代價，尤其是魔導兵器，更是讓人不想再碰第二次。西側已清空，他會聯絡第四分隊通知 Alianne；同時也請你回去向 Edelstein 回報。Edelstein 聽完立刻鬆一口氣——襲擊小隊已被殲滅，工廠暫時不再面臨直接威脅；Amajina 的工程師們也會因此放心。他再一次向你道謝。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 艾德爾斯坦 <small class="muted"> 北薩納蘭（X:20.8, Y:22.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="aether-on-demand.html">穆恩布瑞達的秘策</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="an-uninvited-ascian.html">迎戰尊嚴王</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {

  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);

  s.setAttribute('data-mapping', 'specific');

}
