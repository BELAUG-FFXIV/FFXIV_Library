        story:`<div class="story-wrap"><div class="story-content">
<p><b>A Princely Persona</b><br>
In Ul’dah, the Royal Seneschal greets you with Little Ladies’ Day upon the city: this year’s surprise is a new star to stand beside the Songbirds—a butler-themed singer he dubs the “Seneschal Prince.” Yet their chosen lead, Picot, has not returned from Eshtaime’s Aesthetics. You go to check on him and find designer Marabel trying to pin down his vision as he babbles of “frozen brilliance” and “searing flame.” The costume is ready; the finishing touch is not.</p>
<p>Picot admits he chased the idea of looking “dashing” without grasping what a seneschal is. Prodded to define it—unobtrusive service, impeccable manners—you set a new course: learn the ways of a seneschal. You split up to gather expectations from the city. A well-dressed noblewoman insists true seneschals act without being told. A bargain hunter recalls Sultan Baldric’s old custom—“a seneschal for a day”—and the dream of attention lavished on one princess. A resting server explains that satisfaction comes from preparation: menus memorized, every detail in place, joy beyond duty.</p>
<p>Reuniting at the Gold Court, Picot sheepishly mentions an “amazing bargain” on a rare urn—proof he’s still a touch too trusting. But the lesson has taken: a seneschal serves others, anticipates needs, and prepares in advance. For him, that means serving his fans. He asks you to stay—help him become the best Seneschal Prince he can be.</p>
<p><b>A Princely Debut</b><br>
Picot steels himself to don the mantle of the Seneschal Prince—he understands the theme, but must decide how to embody its manner. He confides a past that shaped him: a bedridden childhood friend, his “princess,” for whom he became a one-boy troupe—hero, jester, anything to make her smile—until one day he saw a songstress captivate a town and rushed home to recreate the wonder for an audience of one. Though she was soon called to Thal’s halls, the dream remained: stand on a grand stage and let his voice reach her again.</p>
<p>At the Little Ladies’ Day stage, clues fall into place: the Royal Seneschal’s faultless courtesy and preparation; a Songbirds superfan who has waited too long; a Quicksand employee with news of a festival-only menu. Picot finds his answer: as Seneschal Prince he will serve and entertain—have the Quicksand deliver light refreshments so the audience can relax while he sings and dances. He hurries to coordinate with the seneschal and Momodi, while you brief Marabel on the finishing touches.</p>
<p>The debut begins. Picot bows—“I am the Seneschal Prince, your guide to an ephemeral world”—and unveils peach-infused tea and spring sweets as Quicksand staff set umbrellas, stools, and a laden table. Cheers swell; blushes ripple through the front rows; the Songbirds—Ulala, Narumi, Masha Mhakaracca—smile and vow to push the crescendo higher. After the show, the seneschal praises a stunning debut and plans an encore. Picot wonders if his dear friend watched from afar, thanks you, and offers a matching costume: “You stood beside me—you are every bit a Seneschal Princess.” As long as he has a stage, he vows to spend every moment delighting those who attend.</p>
</div><button class="expand-btn" data-more="Read more" data-less="Show less">Read more</button></div>`,

        story:`<div class="story-wrap"><div class="story-content">
<p><b>プリンセスデーと執事王子の誕生</b><br>
ウルダハにプリンセスデーの華やぎが満ち、王室の侍従長が新たな趣向を語る。歌姫たちに並ぶ今年の目玉は、執事を題材にした歌い手――「執事王子」。だが主役のピコが衣装受け取りから戻らない。エシュタイムの店でデザイナーマラベルは、「凍てつく輝き」と「燃えさかる炎」という矛盾だらけの注文に頭を抱える。衣装は整ったが、“らしさ”が決まらない。</p>
<p>ピコは「格好よさ」に固執し、本来の“侍従”とは何かを見失っていたと告白。控えめな奉仕、行き届いた作法――その本質を確かめるため、ふたりは街で聞き込みを行う。気品ある貴婦人は「言われる前に動く者こそ真の侍従」と語り、買い物好きの市民はバルドリク王の「一日侍従」の風習を懐かしむ。給仕の青年は、満足を生むのは入念な準備だと説いた。</p>
<p>ゴールドコートで再会したピコは、珍しい壺の「お買い得」に釣られかけたと苦笑する。だが学びは確かだ。侍従とは誰かに仕え、先回りして備える者。ならば自分は観客に仕える侍従であるべきだ――あなたに付き添いを願い、最高の執事王子を目指す。</p>
<p><b>プリンセスデーと執事王子のおもてなし</b><br>
執事王子の衣をまとう覚悟はできた――あとは、その振る舞いをどう体現するか。ピコは胸の内を語る。病に伏す幼馴染み――彼にとっての「お姫さま」のため、彼はひとり芝居の一座となった。街で見た歌姫の輝きを彼女ひとりへ捧げた日、道は定まる。やがて彼女はサル神の館へ召されたが、大舞台で歌い、声を彼方へ届けたいという夢は残った。</p>
<p>プリンセスデーの特設ステージで手がかりを拾う。王室の侍従長は礼節正しく準備万端、ソングバード熱心なファンは長い待機で疲れ切り、クイックサンドの従業員は特別メニューを告げる。――答えは見えた。「仕える」と「魅せる」を両立させる。観客がくつろいで楽しめるよう、クイックサンドに軽食と飲み物を届けてもらい、ピコは歌と踊りで心を掴む。侍従長とモモディに段取りをとり、あなたはマラベルへ衣装の最終コンセプトを伝える。</p>
<p>幕が上がる。ピコは一礼し、「執事王子が儚き夢の世界へご案内いたします」と告げる。桃香るティーと春の菓子、クイックサンドの設えに歓声が広がる。彼は胸に手を当て「視線はどうか私へ」と可憐に求め、前列の頬が紅に染まる。ウララ、ナルミ、マシャ・マカラッカも笑みを交わし、熱狂をさらに高めようと誓う。終演後、侍従長は大成功を称えアンコールを示唆。ピコは遠い空を仰ぎ、あなたにお揃いの衣装を贈る。「ずっと隣にいてくれたあなたは、まさしく“執事プリンセス”だ」。彼は誓う――舞台に立つ限り、その一瞬一瞬を観客の歓びに捧げると。</p>
</div><button class="expand-btn" data-more="続きを読む" data-less="折りたたむ">続きを読む</button></div>`,
        acq:`<div class="stack">

      ZH:{

        story:`<div class="story-wrap"><div class="story-content">
<p><b>公主節與執事王子的誕生</b><br>
在 Ul’dah，Royal Seneschal 迎來 Little Ladies’ Day 的熱鬧：今年要在 Songbirds 之外，推出全新的舞台主角——「Seneschal Prince」。只是被選上的 Picot 遲遲未從 Eshtaime’s Aesthetics 回來。你前去探視，只見設計師 Marabel 眉頭深鎖；Picot 一會兒要「如暴雪般冷冽的光」，一會兒又想「灼指的火焰」，衣裝已就，靈魂的一筆仍未定。</p>
<p>Picot 坦承自己只抓著「帥氣」不放，卻沒弄清 seneschal 的本質。你們決定改從「侍從的作為」著手，在城裡蒐集期待：衣著考究的貴婦認為真侍從必須不待吩咐先行一步；討價還價的市民憶起 Sultan Baldric 的「一日侍從」傳統；正在歇息的服務生說滿意來自預先準備，把職責之外的歡喜也一併備妥。</p>
<p>回到 Gold Court，Picot 提到差點被「稀有骨灰罈」的好價誘惑——他確實還有點單純。但重點已明：侍從的本分是服務、預判、提前備妥；對他而言，就是為粉絲服務。他請你留下來，幫他成為最好的 Seneschal Prince。</p>
<p><b>公主節與執事王子的款待</b><br>
Picot 決意披上 Seneschal Prince 的外衣——主題已明，接下來要決定如何把氣度演活。他傾訴自己的來處：臥病的童年摯友，是他心中的「公主」。為了她的笑靨，他成了一人劇團；某天看見城中歌姬迷倒眾人，便把那份光彩帶回家，只獻給她的一場演出。雖然她很快被召往 Thal’s halls，他的願望沒有離開——有朝一日立於大舞台上，讓歌聲再度傳到那裡。</p>
<p>來到 Little Ladies’ Day 的舞台前，你們從熱鬧裡找答案：Royal Seneschal 的舉止周到、準備無懈；Songbirds 的鐵粉久候至腳麻；Quicksand 的員工提到節慶限定菜單。Picot 的發想成形——作為 Seneschal Prince，既要服務，也要演出：請 Quicksand 送上點心與茶，讓觀眾坐下放鬆，邊品味邊欣賞他的歌舞。他快步去和侍従長、Momodi 協調；你則代他向 Marabel 說明衣裝的最後定調。</p>
<p>演出揭幕。Picot 俯身致意：「我是 Seneschal Prince——將帶各位走入一段短暫而華麗的夢。」桃香紅茶與春日點心隨之端出，Quicksand 架起陽傘、凳子與滿桌餐點；歡呼聲逐步堆高。他按著胸口，溫柔而佔有地請大家「將目光交給我」；前排頰色飛紅，螢光棒如星海起伏。Ulala、Narumi、Masha Mhakaracca 到場，笑言要把熱度再推上高潮。謝幕後，Royal Seneschal 讚嘆完美首秀並考慮加開 encore。Picot 想著遠方是否也有人在看，向你致謝，並把對襯的服裝交到你手裡——「你一路與我並肩，你也同樣是 Seneschal Princess。」只要還能站在這片舞台上，他發誓要把每一刻，都獻給所有前來的人們。</p>
</div><button class="expand-btn" data-more="展開全文" data-less="收合內文">展開全文</button></div>`,
        acq:`<div class="stack">

      }

    const langToggle  = document.getElementById('langToggle');
    const pageTitle   = document.getElementById('pageTitle');
    const tabBtns     = [...document.querySelectorAll('.tab-btn')];
    const panels = {
      story:  document.getElementById('panel-story'),
      acq:    document.getElementById('panel-acq'),
      event:  document.getElementById('panel-event'),
      unlockq:document.getElementById('panel-unlockq'),
      followq:document.getElementById('panel-followq'),
      comments: document.getElementById('panel-comments')
    };

    function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }

    // 綁定收合按鈕
    function wireStoryToggler(root){
      const btn = root.querySelector('.expand-btn');
      const content = root.querySelector('.story-content');
      if(!btn || !content) return;
      const more = btn.getAttribute('data-more');
      const less = btn.getAttribute('data-less');
      btn.onclick = ()=>{
        const expanded = content.classList.toggle('story-expanded');
        btn.textContent = expanded ? less : more;
      };
    }

    function applyLang(lang){
      const t = i18n[lang] || i18n.EN;
      pageTitle.textContent = t.pageTitle;
      langToggle.textContent = `🌐 ${t.langLabel}`;
      tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
      const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
      renderPanel(activeBtn.dataset.tab, lang);
    }

    function renderPanel(key, lang){
      const t = i18n[lang] || i18n.EN;
      Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
      panels[key].classList.add('active');

      if(key !== 'comments'){
        panels[key].innerHTML = t[key];
        if(key==='story') wireStoryToggler(panels[key]); // 每次渲染都重新綁定
      }else{
        loadGiscusForCurrentLang();
      }
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab, getLang());
      });
    });

    langToggle.addEventListener('click', ()=>{
      const cur = getLang();
      const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
      localStorage.setItem(LANG_KEY, next);
      applyLang(next);
    });

    /* === Giscus：Comments 分頁 === */
    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };
    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }

    applyLang(getLang());
  </script>
