  EN:{
    langLabel:'English',
    pageTitle:'Amalj’aa Wrong Places',

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>At Camp Drybone, you learn from Isembard that it was fortunate indeed he had set aside an inn room for Sister Ourcen. Though she tried to downplay her condition at first, the injuries she suffered in the attack outside the Golden Bazaar proved more serious than she let on. Even so, the healers expect her to make a full recovery, and the news brings him no small measure of relief. With that reassurance given, he turns the conversation back to the matter at hand. Thancred has been looking for you again, he says, and left word that he would be waiting near an Amalj’aa encampment to the southeast. Isembard can only pray that, together, the two of you will finally uncover some concrete evidence about the disappearances that have plagued the region.</p>
      <p>You travel southeast, toward Sandgate and the nearby Amalj’aa camp, where Thancred greets you with his usual easy charm, clearly pleased that you answered his summons. He has already heard about what happened to Sister Ourcen, and admits that her actions—and the wounds she suffered in the course of helping an orphan—have shown his suspicions of the “poor rose” to be misplaced. Yet he is not ready to discard his unease entirely. While he had been following Ourcen near the Golden Bazaar, a band of Amalj’aa had caught his eye, and he tracked them as far as this very encampment. From here, however, he would much rather keep his distance and observe from afar. That, he explains with a disarming smile, is precisely why he requested your presence. He asks you to venture into the camp itself and take a look around, while he remains outside to keep watch.</p>
      <p>You step into the Amalj’aa encampment and quietly search among crude tents and scattered supplies, looking for anything that might connect the beast tribe to the missing commonfolk. Eventually, you come across a leaflet bearing a bold promise: “See the wealth of Nald to the hands of your children.” It appears to advertise some kind of gathering or “assembly” meant to provide the poor with work and prosperity. You bring the leaflet back to Thancred, who listens to your report with keen interest before taking the paper from your hands. The message itself might appeal to the desperate, but the lettering is crude, and the lines about Nald’thal betray a poor understanding of the Order’s teachings. He finds it difficult to believe that any true priest of the church could have written such a thing. Intrigued, he asks you to carry the leaflet back to Camp Drybone so that Sister Ourcen can examine it herself.</p>
      <p>Back at the inn in Camp Drybone, Thancred waits beside you as you present the mysterious leaflet to Sister Ourcen. She welcomes you as her savior once again and asks what brings you on this visit, only for her expression to harden in shock when she reads the text. The words are blasphemous, she declares; they do not reflect the doctrines of the Order at all. No true brother or sister of the faith would ever circulate such teachings, of that she is certain. As she thinks back, another troubling memory surfaces: some weeks ago, the church was troubled by the disappearance of vestments and garments. Putting these pieces together, she wonders aloud if someone might be posing as a priest of the Order in order to deceive the people, using stolen robes and false sermons to win their trust. The question hangs heavy in the air—who would stoop to such deceit?</p>
      <p>Thancred, standing nearby, can almost taste the shape of the scheme. The plot has thickened, he tells you, addressing you by name as he lays out his conclusion: their culprit masquerades as a priest to lend weight to his lies, exploiting the faith of the poor in order to lure them away. There is a kind of bitter irony in it, but also a clear sign that they face a cunning adversary. For the moment, he resolves to consider how best to proceed and asks you to return to Isembard with what you have learned. When you relay the news at Camp Drybone, Isembard is shaken by the idea that someone would dare impersonate a priest, but also quietly relieved that the investigation is at last moving forward. Troubling as these revelations are, they offer a tangible lead, and he thanks you yet again for your efforts. From now on, he vows, he will keep his ears and eyes open more than ever, watching for any hint of the false priest who walks among his people.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'虚ろな富の行方',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>キャンプ・ドライボーンで、あなたはイセムバードからシスター・オルセンの容体を聞かされる。彼があらかじめ宿屋の一室を確保しておいたのは、実に幸運だったと言うべきだろう。彼女は当初こそ大した怪我ではないと装っていたが、ゴールデンバザー近くで受けた傷は見た目以上に深刻だったらしい。それでも、治療の甲斐あって全快が見込まれていると聞き、イセムバードは胸を撫で下ろす。ひとまず安心を得たところで、彼は改めて本題に戻った。サンクレッドが再びあなたを捜していたらしく、南東のアマルジャ族の野営地付近で待つと伝言を残していったのだという。この失踪事件について、あなたと彼が何らかの証拠を掴めることを祈っている──そう言って、イセムバードはあなたを見送る。</p>
      <p>あなたはサンドゲート方面へと向かい、近くに構えられたアマルジャ族の野営地のそばでサンクレッドと合流する。彼は、わざわざ来てくれたあなたに笑みを向けつつ、すでにシスター・オルセンの件について聞き及んでいると話し出す。孤児の形見を探すために危険を冒し、怪我を負いながらも人々のために奔走していたと知り、「哀れな薔薇」に向けていた自らの疑念は行き過ぎだったと認めざるを得ないようだ。もっとも、彼の胸騒ぎそのものが完全な見当違いだったとも言い切れない。ゴールデンバザー近くでオルセンの後を追っていた際、アマルジャ族の一団が目につき、そのままここまで辿ってきたのだと打ち明ける。しかし、これ以上近づくのはあまり得策ではないと判断し、彼は野営地の外側から様子を窺うにとどめていた。そこで頼りにしたいのが、あなたの力である──サンクレッドはそう言って、アマルジャ族の野営地の中を調べてきてほしいと穏やかに依頼するのだった。</p>
      <p>あなたはアマルジャ族の野営地の中へ踏み入り、粗末な天幕や積まれた荷物のあいだを静かに見て回る。失踪した人々とこの野営地を結びつける手がかりがないか、注意深く探していると、一枚の紙片が目に留まった。「ナールドの富を、子らの手へ」と大きく謳われたビラであり、困窮した者たちに仕事と富を与える集会を宣伝しているように見える。あなたはこのビラを手に取り、外で待つサンクレッドのもとへ戻る。彼は興味深そうに耳を傾けながら報告を聞き終えると、その紙を受け取り、内容に目を走らせた。貧しい者たちには魅力的に映りそうな誘い文句だが、文字の書き方は稚拙で、ナルザルに関する記述も教団の教えからかけ離れている。これを書いたのが教会の正統な司祭であるとは、とても信じがたい──そう評しながら、サンクレッドはこのビラをシスター・オルセンにも見せてみるべきだと提案し、キャンプ・ドライボーンまで運んでほしいと頼む。</p>
      <p>やがて宿屋に戻り、あなたはサンクレッドとともにシスター・オルセンの前にビラを差し出す。彼女は再び命を救ってくれたあなたに微笑みかけ、今度はどのような用件で訪ねてきたのかと穏やかに問いかけるが、紙面に目を落とした途端、その表情は驚きと憤りに塗り替えられる。「なんという冒涜でしょう……これは私たちの教えではありません」と、オルセンは即座に言い切る。教団の教義とかけ離れた内容であり、真の同胞がこのような教えを広めるはずがないと断言するのだった。そして、ふと何かを思い出したように、数週前から教会で司祭服や礼服の紛失が相次いでいたと話し出す。もしかすると誰かが教団の司祭を装い、盗んだ衣をまとって民を欺いているのではないか──そう考えざるを得ない状況に、彼女は言葉を失い、「いったい誰がこんなまねを……」と小さく呟いた。</p>
      <p>その傍らで話を聞いていたサンクレッドは、徐々に形を成しつつある陰謀の輪郭を感じ取っていた。犯人は司祭になりすますことで偽りに信憑性を持たせ、貧しい人々の信仰心を利用して彼らを誘い出しているのだろう、と彼はあなたに向き直って推理を語る。そこには皮肉めいた悪趣味さえ漂っているが、同時に、手強い相手であることの証でもあった。彼は今後の立ち回り方を慎重に考える必要があると言い、ひとまずイセムバードに今回判明したことを伝えてほしいと頼んでくる。あなたが再びキャンプ・ドライボーンに戻り、一連の経緯を報告すると、イセムバードは「司祭のふりをしている者がいるとは……」と愕然としつつも、調査がようやく前進し始めたことに安堵の息を漏らす。不穏な事態であることに変わりはないが、ついに掴んだ具体的な手がかりでもある。彼は改めてあなたに感謝を述べ、これまで以上に耳と目を光らせて、偽りの司祭の影を追うことを誓うのだった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> イセムバード　<small class="muted">東ザナラーン：キャンプ・ドライボーン (X:13.9, Y:23.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">

      <div class="row">すべて（リミテッドジョブを除く）Lv 19～</div>

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'空虛的財富',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Camp Drybone，Isembard 告訴你，還好他事先替 Sister Ourcen 在旅館預留了一間房。雖然她一開始盡量裝作沒事，但實際上在 Golden Bazaar 外遭受的傷比表面看起來更嚴重，需要好一段時間療養。幸運的是，治療結果相當樂觀，大家都預期她終究能完全康復，這讓 Isembard 終於鬆了一口氣。確認這件事之後，他把話題拉回正在進行的調查。Thancred 又來找過你，特地留下話說會在東南方 Amalj’aa 野營地附近等你。他祈禱你與 Thancred 兩人能藉此找到與失蹤事件有關的確切證據，讓這場懸而未決的調查終於往前推進。</p>
      <p>你依照指示往東南方前進，來到 Sandgate 一帶，在靠近 Amalj’aa 野營地的地方與 Thancred 會合。他一如既往地用輕快的語氣迎接你，顯然很高興你回應了他的召喚。他已經聽說 Sister Ourcen 的事，坦承在得知她為了替孤兒尋找母親的遺物而冒險、並因此受傷後，先前對那朵「可憐的玫瑰」抱持的懷疑確實有失公允。不過，他也不認為自己的不安完全是空穴來風。當時在 Golden Bazaar 附近尾隨 Ourcen 的時候，一支 Amalj’aa 小隊引起了他的注意，他一路追蹤對方，結果就這麼一路跟到了這座野營地。不過，要他再靠近一步，他可一點也不樂意──在這種地方，他寧願保持距離，站在外圍觀察局勢。這也正是他要你來的理由：請你代為走進營地內部，仔細搜查一番，而他則會留在外面看守周遭動靜。</p>
      <p>你踏入 Amalj’aa 的野營地，在粗糙的帳篷與隨意堆放的補給之間來回察看，希望找出任何能將這裡與失蹤居民串起來的線索。搜尋一陣子後，一張印著醒目標語的傳單吸引了你的目光──「See the wealth of Nald to the hands of your children.」上頭看似在宣傳某種集會，號稱要為貧民提供工作與財富。你拿著這張 leaflet 回到營地外，把發現的情況一一向 Thancred 報告。他饒有興趣地聽完，接過紙張詳讀內容。那番話對陷入困境的人而言的確頗具誘惑力，但字體潦草不堪，句子裡提到 Nald’thal 的方式也顯得十分外行，完全不像出自真正熟悉教義之人的筆下。他很難相信這會是 Order 的神職人員寫出來的東西。思索片刻後，他建議把這張 leaflet 帶回 Camp Drybone，交給 Sister Ourcen 親自鑑定。</p>
      <p>你回到 Camp Drybone 的旅館，Thancred 在一旁等候，陪你一起將那張奇怪的傳單呈上給 Sister Ourcen。她先是微笑著稱你為「救命恩人」，詢問這回是為了什麼而來，然而視線落在紙面文字的瞬間，神情立即變了。她脫口而出這是褻瀆，完全不是教團的教導，並且斬釘截鐵地表示，真正的兄弟姊妹絕不可能寫出這種東西。說著說著，她忽然想起幾週前教會連續發生的衣物失竊事件──有好幾件神職人員的法衣與服飾不翼而飛。把這些線索串在一起，她忍不住懷疑，是否有人偷走教團的衣物，偽裝成 Order 的 priest，假借神職身分欺騙信眾、散播這些偽經教義。至於會是誰做出這種事，她也只能困惑地低聲自問：「到底是誰，竟然幹得出這種卑劣勾當……」</p>
      <p>一直在旁觀察的 Thancred 也感受到陰謀的輪廓逐漸清晰。他向你分析，這名犯人之所以扮成 priest，就是為了替謊言披上權威的外衣，利用貧者對神與教會的信任，將他們一步步引入陷阱。這其中帶著令人作嘔的諷刺意味，也說明對手絕非泛泛之輩。他表示接下來必須好好思考下一步的行動，暫時請你先回去把目前得知的情報轉告 Isembard。你再次回到 Camp Drybone，如實描述在 Amalj’aa 野營地與教會裡發生的一切之後，Isembard 得知有人假扮 priest 的消息，難掩震驚，卻也感到總算抓到一條明確的線索。儘管真相愈發令人不安，他仍由衷感謝你的協助，並表示自己從今以後會比以往更加留心觀察周遭的一切，好在這片乾燥荒土上揪出那名假扮神職、欺騙信徒的幕後黑手。</p>
    </div>

    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="for-the-children.html">同謀之影</a></div>
      <div class="row">所有職業（不含限定職） 等級 19 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="dressed-to-deceive.html">消失之人的下落</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
