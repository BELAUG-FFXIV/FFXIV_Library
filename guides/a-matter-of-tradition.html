  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    /* 展開/收合 */
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>

<script>

const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'A Matter of Tradition',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>In the heart of Ul’dah, Owyne greets you with uncharacteristic excitement, invoking the Twelve as he tells you that for an adventurer to receive a personal invitation from Her Grace is unheard of. Seats at such banquets, he explains, are reserved for only the most distinguished individuals in the city; before long, you will be dining alongside some of the most influential figures in Ul’dah. With that honor, however, comes a tangle of courtly protocols and customs that must be observed. Owyne admits that he is no authority on such matters—his place is on guard, not in the ballroom—but reassures you that Mistress Momodi has long been responsible for instructing foreign guests in Ul’dahn etiquette. He urges you to return to the Quicksand and speak with her, promising that she will tell you everything you need to know, while he and his fellow Sultansworn see to their own preparations for the feast.</p>
      <p>Back in the familiar bustle of the Quicksand, Momodi welcomes you with a broad grin and offers her congratulations on your invitation to the “big soirée.” She confesses that she never imagined she’d be the one explaining royal procedures to you—usually only visiting dignitaries have to endure her rambling lectures on tradition—so she decides to keep things short. According to ancient custom, all guests attending the banquet must wear a pair of ceremonial earrings crafted specially for the occasion. They are meant to symbolize some lofty ideal, though Momodi cuts herself off before launching into the full explanation, reminding herself that this is supposed to be the simple version. More practically, the unique design of the earrings serves as a security measure: without them, the Sultansworn will not permit anyone to approach the banquet hall. Your own set, she says, should already be waiting for you at the Goldsmiths’ Guild, where Mistress Serendipity has been expecting you. Following her directions, you make your way to the guild in the Steps of Thal, where the young guildmaster greets you politely, recognizes you by name, and proudly presents a finely worked box containing your earrings, which she crafted herself. Before you can open it, however, she explains that the box is locked and that she is not permitted to hand over the key. As a final safeguard, only designated individuals may actually distribute the earrings to guests—and in this instance, that person is none other than Momodi. With an apologetic smile, Serendipity asks you to return to the Quicksand and have her open the box on your behalf, remarking that the Sultansworn take the sultana’s safety very seriously.</p>
      <p>When you return once more to the Quicksand, Momodi immediately asks whether you’ve picked up your earrings. Taking the box from you, she sets to work on the lock, then lets out a small gasp as she lifts the lid, marveling that the guildmaster has truly outdone herself with this pair. She warns you to take good care of them—if such distinctive earrings were to fall into the wrong hands, there is no telling what trouble might follow—and then turns the conversation back to the evening ahead. Soon, she tells you, you’ll be rubbing shoulders with Ul’dah’s elite, and she hopes you’re in a sociable mood. When you feel prepared to face the banquet and all the nobles who will be in attendance, she adds, you need only let her know, and she will see that you are sent on your way to Her Grace’s table.</p>
    </div>

  JP:{
    langLabel:'日本語',

    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ウルダハの王宮近くで、サルタンズウォーンの一員であるオワインは、珍しく高ぶった様子であなたを迎え、「十二神に誓って、冒険者が女王陛下から直々に晩餐会への招待を受けるなど前代未聞だ」と感嘆する。あの席に並ぶのは、ウルダハでも屈指の名士たちばかりであり、あなたもやがて、その中の一人として食卓を囲むことになるのだと彼は説明する。その栄誉には、もちろんそれ相応の礼儀作法が伴うが、自分はそういった作法に通じているわけではないと、オワインは正直に打ち明ける。とはいえ心配は無用だ、と彼は続ける。異国からの賓客にウルダハの慣習を教えてきた実績を持つモモディなら、晩餐会に臨むうえで必要なことをすべて教えてくれるはずだ。自分たちサルタンズウォーンは晩餐会の護衛に向けて準備を整えねばならないので、あなたはひと足先に酒場「クイックサンド」へ戻り、モモディの話を聞いてほしい──それがオワインの願いだった。</p>
      <p>クイックサンドに戻ると、モモディは満面の笑みであなたを迎え、盛大な晩餐会への招待状を手にしたことを祝福する。王室のしきたりについて説明する相手といえば、いつもは各地から訪れる要人ばかりで、まさかあなたに同じ話をする日が来るとは思わなかったと彼女は笑い、忙しい身であるあなたのために要点だけを手短に伝えることにする。古くからの慣習により、晩餐会に招かれた客人は、その場のためだけに誂えられた儀礼用のイヤリングを身につける決まりになっており、本来はそこに込められた象徴的な意味が長々とあるのだが、「短くまとめるんだったね」と自分に言い聞かせるように説明を切り上げる。実務的な面では、この特別な意匠のイヤリングこそが身分証となるため、身につけていない者はサルタンズウォーンに宴の間へ近づくことすら許されないのだという。あなた用の一対はすでに彫金師ギルドで用意されており、ギルドマスターのセレンディピティーが待っているから、すぐに受け取りに行くようにとモモディは促す。ウルダハ・ザル回廊の彫金師ギルドを訪ねると、若きギルドマスターであるセレンディピティーが笑顔で挨拶し、名指しであなたを出迎える。彼女は自らの手で仕上げたという小箱を差し出し、晩餐会用のイヤリングがここに収められていることを誇らしげに告げるが、同時に、その箱には厳重に鍵がかけられており、自分には鍵を渡す権限がないことも説明する。最後の安全策として、実際にゲストにイヤリングを手渡すことが許されているのは、あらかじめ指定された人物だけであり、この件ではモモディがその役目を担っているのだという。セレンディピティーは、サルタンズウォーンが女王陛下の身の安全をいかに重く見ているかを語りつつ、手を煩わせてすまないと詫び、クイックサンドに戻って箱を開けてもらうよう頼むのだった。</p>
      <p>ふたたびクイックサンドに戻ると、モモディはすぐさまあなたがイヤリングを受け取ってきたかどうかを確かめる。あなたから小箱を受け取った彼女は、手際よく鍵を外して蓋を開き、中身を覗き込んだ途端、小さく息を呑む。「こりゃあ、ギルドマスターが腕によりをかけた一品だね」と感心しつつ、このイヤリングを決して粗末に扱わないよう念を押す。もしこんな代物がよからぬ連中の手に渡れば、どんな騒ぎになるかわかったものではないからだ。そうしてひとしきり注意を与えると、モモディは話題を再び晩餐会に戻し、これからあなたがウルダハの顔役たちと肩を並べることになるのだと、少し楽しげに告げる。心の準備ができて、いつでも晩餐の席に向かえるというのなら、自分にひと言かけておくれ──そう言って、彼女はあなたが女王陛下の食卓へと向かうその時を待つのだった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> オワイン　<small class="muted">銀冑団総長室 (X:6.1, Y:6.0)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="duty-honor-country.html">至宝の影で蠢く闇</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 14～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="a-royal-reception.html">王宮の晩餐会</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'籌備晚餐會',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Ul’dah 王宮附近，Owyne 一見到你就難掩激動，先是喊了聲「By the Twelve」，接著說，像你這樣的冒險者能收到 Her Grace 親自發出的邀請，幾乎是前所未有的事。這類宴會的座位，一向只保留給城內最傑出、最具聲望的人物，而你很快就會與 Ul’dah 數一數二的權勢人物同席而坐。不過，能踏入那樣的場域，自然得遵守一整套繁瑣的禮節與規矩。Owyne 坦承自己並不擅長這方面，身為 Sultansworn，他熟悉的是護衛與劍盾，並非宮廷禮儀，但他要你放心——一直以來負責接待外國來賓、替他們解說當地習俗的人，正是 The Quicksand 的女將 Momodi。於是他請你先回酒館找 Momodi，向她了解宴會上必須遵守的規矩，而他和其他 Sultansworn 則得抓緊時間，為即將到來的宴會做好自己的準備。</p>
      <p>你回到熱鬧的 The Quicksand 時，Momodi 立刻笑著迎上前來，恭喜你拿到了這場「大宴會」的邀請。她半開玩笑地說，原本從沒想過有一天會對你解說這些流程，平常能聽她講王室傳統的，多半是遠道而來的外國貴賓；既然你一向很忙，她決定挑重點講。按照古老的習俗，所有受邀參加這場宴會的人，都必須佩戴一對為這個場合特別打造的 ceremonial earrings，本來這些耳環還蘊含著一長串象徵意義，不過 Momodi 說到一半就把自己打斷，提醒自己這應該是「簡短版本」。從實務面來說，這對樣式獨特的 earrings 也是重要的安全措施：沒有戴上它的人，根本不可能被 Sultansworn 允許接近宴會大廳。她告訴你，你的那一對已經在 Goldsmiths’ Guild 裡準備好了，Guildmaster Serendipity 一直在等你上門，於是你依言前往位於 Steps of Thal 的公會。到了彫金師們忙碌工作的 Guild 裡，Serendipity 親切地向你問好，很快就認出你就是受邀的 Forename，並自豪地拿出一只精緻的小盒子，裡面裝的正是她親手打造的耳環。只是，在你打算當場打開時，她連忙解釋，盒子上了鎖，而她沒有權限把鑰匙交給任何人——這是最後一道安全防線，真正被授權將耳環「發放」給賓客的人，只有事先指定的少數幾位；在這次的宴會裡，那個人正是 Momodi。所以她抱歉地請你再跑一趟 The Quicksand，請 Momodi 替你打開盒子，並笑著說，Sultansworn 對於 Her Grace 的安危可是一點都不馬虎。</p>
      <p>你帶著盒子回到 The Quicksand，Momodi 一看到你就問耳環拿到了沒。你把盒子交到她手裡，她利落地打開鎖扣，抬起盒蓋，一看見裡頭的飾品便忍不住倒抽一口氣，感嘆 Serendipity 這回簡直卯足全力，把這對耳環做得美得不得了。她叮嚀你一定要好好保管，千萬別弄丟，這種特製的東西要是落到不該拿到手的人手上，天知道會惹出什麼麻煩。說完正事，她帶著點打趣的口氣說，你可得準備好展現社交的一面了，因為很快你就要和 Ul’dah 的上流人士打交道、同桌共飲。等到你覺得準備好了，隨時都可以再跟她說一聲，她就會安排你踏上前往宴會會場的路，走進屬於 Her Grace 的那個華麗世界。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 歐文　<small class="muted"> 銀冑團總長室 (X:6.1, Y:6.0)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="duty-honor-country.html">至寶的暗影</a></div>
      <div class="row">所有職業（不含限定職） 等級 14 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="a-royal-reception.html">王宮的晚餐會</a></div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
