const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`Hail to the King, Kupo`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Not long ago, Commander Vorsaile Heuloix tells you, the moogle Kuplo Kopp came to the Adders’ Nest seeking an audience with the Elder Seedseer. Kuplo Kopp spoke of an imminent threat to all mooglekind—one that could endanger the whole Twelveswood if left unchecked. Because you once served as an able ambassador to the sylphs, Vorsaile asks you to reprise that role for dealings with the moogles. The rest, he says, you should hear from Kuplo Kopp himself, who is waiting with the Elder Seedseer at the Lotus Stand.</p><p>When you arrive, Raya-O-Senna confirms that their guest has brought ill tidings that must be heeded. Kuplo Kopp is visibly shaken, sighing that they have been left no choice. Papalymo mutters that a threat to mooglekind fits too neatly with what the Antecedent suspected, and Yda remarks that whatever it is, it must be serious to have Kuplo Kopp so worried. Kuplo Kopp blurts out a desperate plea for you to stop “them,” insisting you must not kill them because they are not bad moogles—only misguided. Raya-O-Senna snaps him back to sense, pointing out that you have no idea what he means, and asks Kan-E-Senna to forgive the outburst.</p><p>Kan-E-Senna thanks you for coming on such short notice, calling you a stalwart ally, and explains why you were summoned. Kuplo Kopp has brought news of a deeply unsettling development: it seems Good King Moggle Mog XII has returned to Eorzea. Raya-O-Senna admits it sounds strange—she cannot say for certain whether the king is a true figure from history or a manifestation of moogle mythology, though Kuplo Kopp insists it is the former. Kuplo Kopp then recounts moogle legend: long ago moogles served gods in the heavens, until the gods grew discontented and began to quarrel. Good King Moggle Mog XII decreed they should leave for the realm of man, but the distance was too great to fly down safely. The king produced an impossibly long rope and held it as his subjects climbed down to the world below, remaining behind so mooglekind could know peace.</p><p>Papalymo cuts in—if that were true, then the king should still be in the heavens, which is why Kuplo Kopp contacted them. Yda wonders if he tied the rope to something and asks what the problem is with his return. Kan-E-Senna answers plainly: the problem is that he was summoned. They believe Good King Moggle Mog XII is a myth made manifest by means akin to how the beast tribes summon their gods. Yda tries to make sense of it—moogles with a vast store of crystals wishing hard enough for him to appear. Papalymo cannot fathom why they would attempt it at all; with Garuda humbled and the Ultima Weapon destroyed, what threat would drive them to such extremes? Raya-O-Senna suggests the answer lies in that very peace: those without the power to defend themselves see this calm as the calm before another storm. Fear of what tomorrow may bring has driven the Mogglesguard to call upon a greater power to protect their loved ones and homes.</p><p>Kuplo Kopp insists the Mogglesguard only wanted to protect the forest from outsiders, but since the king’s return they have grown carried away—far more than a little. Yda compares it to how the sylphs summoned Ramuh, and Papalymo warns they cannot discount the possibility that this “entity” is influencing the moogles in a way similar to a primal. Kan-E-Senna agrees: whoever or whatever the king truly is, they believe he threatens not only mooglekind but all of Gridania. They ask you to confront Good King Moggle Mog XII and drive him from their midst. She adds that the Mogglesguard’s sanctuary and their liege are hidden behind magical wards, and that Brother E-Sumi-Yan of the Conjurers’ Guild may know how to dispel them—so you should seek his counsel before proceeding.</p><p>Afterward, E-Sumi-Yan welcomes you and says it is a comfort—to him and to the elementals—that you will face Good King Moggle Mog XII. The moogles are not warlike by nature, he explains, but if the king is allowed to remain, his influence may change them. That is why it is vital to defeat him quickly before lasting harm is done. He tells you to make whatever preparations you deem necessary and to inform him when you are ready to seek the king.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'無垢なる爆走',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ヴォルセール・ルロワ中佐は、少し前にモーグリのクポル・コップが「アダー・ネスト」を訪れ、「老樹の巫女」への拝謁を求めたと告げる。彼はモーグリ族全体に迫る差し迫った脅威について語り、このまま放置すれば「黒衣森」全域を危険に晒しかねないという。あなたはかつてシルフ族との交渉で大使役を務めた実績があるため、今度はモーグリ族との折衝でも同じ役目を担ってほしいと頼まれる。詳細はクポル・コップ本人から聞くべきだとして、「老樹の巫女」と共に「ロータス・スタンド」で待っていると案内される。</p><p>現地では、ライア・オ・センナが来客のもたらした凶報は看過できないと告げ、クポル・コップもため息混じりに、もはや選択肢はないのだとこぼす。パパリモは「先導者」の疑念が的中したのではないかと険しい表情を見せ、ヤ・ダもクポル・コップの様子から事態の深刻さを察する。するとクポル・コップは取り乱し、どうか連中を止めてほしい、だが殺してはいけない、悪いモーグリではなく道を誤っているだけなのだと訴える。ライア・オ・センナはあなたが話を理解できていないと指摘して彼を黙らせ、カヌ・エ・センナに無礼を詫びる。</p><p>カヌ・エ・センナは、急な呼び出しにも応じてくれたことに感謝し、グリダニアにとってこれ以上ない頼もしい味方だと述べたうえで、呼び出した理由を語る。クポル・コップがもたらしたのは、きわめて不穏な知らせ――「善王モグル・モグⅫ世」がエオルゼアに戻ってきたというのだ。ライア・オ・センナは、それが史実の人物なのか、モーグリ神話が形を得たものなのか確信が持てないとしつつ、クポル・コップは前者だと主張していると説明する。クポル・コップは伝承を語り始め、かつてモーグリは天上で神々に仕え、美しく広大で酒も尽きない世界にいたが、やがて神々が不満を募らせ争い始めたため苦しい暮らしになったという。そこで善王モグル・モグⅫ世が人の世界へ移ることを宣言し、途方もなく長い縄を用意して自らそれを支え、民が地上へ降りられるようにした。そして自分だけは天上に残り、モーグリ族の平穏のために犠牲となったのだと語る。</p><p>だがパパリモは、もしそうなら王は天上に残っているはずで、それが覆ったからこそ連絡してきたのだろうと突く。ヤ・ダは王が戻ることの何が問題なのかと問い、カヌ・エ・センナは「召喚された」ことこそ問題だと言い切る。彼女は、善王モグル・モグⅫ世は蛮族が神を呼び出すのと同様の手段で、神話が実体化した存在だと見ていると説明する。ヤ・ダは、莫大なクリスタルを用意して強く願えば現れるのかと半信半疑になり、パパリモはそもそもなぜそんなことを試みたのか理解できないと言う。ガルーダも屈し、アルテマウェポンも破壊された今、いったい何が彼らをそこまで追い詰めたのか。ライア・オ・センナは、近年二度もエオルゼアが滅亡寸前に追い込まれ、選ばれし少数の英雄の働きで辛うじて救われた事実を挙げる。あなたのように力で嵐を乗り越えた者には平穏が休息に見えるだろうが、力なき者にはこれは嵐の前の静けさに過ぎず、その恐れが「モグルズガード」をより大きな力へと駆り立てたのだと語る。</p><p>クポル・コップは、モグルズガードの目的は森を外敵から守ることだったと強調するが、王の帰還以来、彼らは行き過ぎるほど過激になったと言う。ヤ・ダはラムウを召喚したシルフ族の件を引き合いに出し、パパリモも、この「存在」が蛮神のようにモーグリを影響下に置いている可能性を否定できないと警戒する。カヌ・エ・センナも同意し、王が何者であれ、モーグリ族だけでなくグリダニア全体への脅威になりうるとして、あなたに善王モグル・モグⅫ世と対峙し、黒衣森から追い払ってほしいと懇願する。さらに、モグルズガードの聖域と王は魔法の結界で隠されているため、呪術師ギルドの兄弟エ・スミ・ヤンに結界解除の手がかりを求めるよう助言する。</p><p>その後、エ・スミ・ヤンはあなたを迎え、善王モグル・モグⅫ世に立ち向かうのがあなたであることは、自分にとっても精霊にとっても大きな安心だと言う。モーグリは本来好戦的ではないが、王を放置すればその影響で性質が変わりかねない。だからこそ、取り返しのつかない事態になる前に速やかに討つべきだと述べ、準備が整ったら王のもとへ向かう旨を知らせてほしいと告げる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ボルセル大牙佐 <small class="muted">（グリダニア：新市街, X:9.7, Y:11.1）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="its-possibly-a-primal.html">黒衣森で覚醒するもの</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="you-have-selected-regicide.html">善王モグル・モグXII世による粛清</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'善王駕到',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Vorsaile Heuloix 告訴你，不久前 moogle Kuplo Kopp 曾到 Adders’ Nest，請求晉見 Elder Seedseer（Gridania 的最高領袖頭銜）。他帶來的消息令人不安：有一個迫在眉睫的威脅正針對所有 mooglekind，若不立刻處理，甚至可能讓整個 Twelveswood 都陷入危險。Vorsaile Heuloix 說你曾經成功擔任與 sylphs 交涉的使者，因此希望你再次扮演「大使」的角色，協助他們與 moogles 溝通。至於更詳細的情況，應該直接聽 Kuplo Kopp 親口說——他正與 Elder Seedseer 一同在 Lotus Stand 等你。</p><p>你抵達後，Raya-O-Senna 先開口表示來客帶來的壞消息必須正視；Kuplo Kopp 也一邊嘆氣一邊說他其實很不願意，但已經別無選擇。Papalymo 聽到「mooglekind 的威脅」便皺起眉頭，低聲說自己原本希望 the Antecedent （Minfilia 的頭銜也就是「Scions of the Seventh Dawn」的領袖）的懷疑是多慮，現在看來卻很難想到別的可能；Yda 也從 Kuplo Kopp 明顯焦慮的模樣判斷，這件事恐怕相當嚴重。Kuplo Kopp 忍不住失控地懇求你阻止「他們」，還急著強調絕對不能殺——那些不是壞 moogles，只是走偏了路，需要的是被狠狠教訓一頓，但不是被殺。Raya-O-Senna 立刻喝止他，指出你根本聽不懂他在說什麼，並請 Kan-E-Senna 原諒這段失言。</p><p>Kan-E-Senna 感謝你在如此短的時間內趕來，稱你是 Gridania 最堅實的盟友，也把召你前來的原因說清楚：Kuplo Kopp 帶來了一個極為不安的發展——Good King Moggle Mog XII 似乎已經回到 Eorzea。Raya-O-Senna 承認這聽起來很離奇，她也無法確定那位「國王」究竟是史實人物，還是 moogle 神話的具現；但 Kuplo Kopp 堅持前者。接著 Kuplo Kopp 開始講述 moogle 的傳說：很久以前，moogles 在天上侍奉眾神，那裡美得難以言喻、寬廣得不可思議，甚至還有取之不盡的酒。然而眾神最終不滿現狀、開始爭吵，讓 moogles 的日子變得艱難。於是 Good King Moggle Mog XII 下令離開天上，轉往人類的領域生活；但兩個世界相距太遠，無法安全飛下去。國王便拿出一條史上最長的繩索，親自握住繩端，讓他的子民一路攀下抵達地上，而他自己則留在天上，以犧牲換取 mooglekind 的安寧。</p><p>Papalymo 立刻抓住重點：若傳說為真，那麼國王本該仍留在天上——而他如今沒有留在那裡，才是你們被聯絡的原因。Yda 一時還搞不清楚，猜測是不是把繩子綁在什麼地方，並追問他回到 Eorzea 到底有什麼問題。Kan-E-Senna 直接點明：問題在於他是被召喚出來的。她說他們相信 Good King Moggle Mog XII 是「神話被具現」的結果，它出現的方式，和 beast tribes （蠻族部落）召喚他們的神時用的手法幾乎一樣。Yda 半信半疑地想像 moogles 準備了一大堆 crystals，拼命許願，然後他就出現了；她不確定這樣真的行得通。Papalymo 則想不通他們為何要冒這種險——Garuda 已被擊退、Ultima Weapon 也已被摧毀，如今又有什麼新威脅，會逼得他們採取如此極端的手段？Raya-O-Senna 認為答案可能就在「平靜」本身：近半個世紀內，Eorzea 兩度瀕臨毀滅，最後都靠少數人的英勇才勉強挽回。對像你這樣有力量、能撐過風暴的人而言，這段和平或許是難得的喘息；但對那些沒有力量自保、只能靠他人庇護而得以倖存的人來說，這不過是下一場風暴前的短暫寧靜。他們害怕明天、害怕結局不會再像昨天那樣幸運，於是恐懼驅使 Mogglesguard 求助於更大的力量，盼它能守護他們的家人與家園。</p><p>Kuplo Kopp 強調 Mogglesguard 本意只是想保護森林、抵禦外來者，但自從 Good King Moggle Mog XII 回歸後，他們的行為越來越失控，幾乎到了難以收拾的程度。Yda 聽了便聯想到 sylphs 召喚 Ramuh 的情況；Papalymo 也警告不能排除這個「存在」正像 primal 一樣影響 moogles 的可能。Kan-E-Senna 表示他們同樣擔心：不論那位國王究竟是誰或是什麼，他都可能不只威脅 mooglekind，也會威脅整個 Gridania。因此她懇請你正面對抗 Good King Moggle Mog XII，將他驅逐出 Twelveswood。她進一步說明 Mogglesguard 的聖域與他們的君主被魔法結界隱藏，Conjurers’ Guild 的 E-Sumi-Yan 或許能提供解除結界的方法，請你在繼續深入之前先去請教他。</p><p>你前往 Stillglade Fane 後，E-Sumi-Yan 迎接你，並說由你來面對 Good King Moggle Mog XII 讓他與 elementals （元素精靈）都感到安心。他提醒 moogles 天性並不好戰，但若放任國王繼續存在，他的影響可能會讓 moogles 發生改變。為了避免造成無法挽回的傷害，你們必須盡快擊敗他；他要你先做足準備，等你準備好去尋找國王時，再回來通知他。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 沃爾賽勒 <small class="muted"> 格里達尼亞新街（X:9.7, Y:11.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="its-possibly-a-primal.html">黑衣森林的覺醒者</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="you-have-selected-regicide.html">大逆不道</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
