const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`Dark Words, Dark Deeds`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Alphinaud warns that it would be foolish to dismiss alternative approaches against foes as clever as these. Aymeric agrees that a formidable enemy demands a calculated response, and a taciturn Temple Knight adds that anyone who thinks the heretics are not a serious threat should remember the slain House Fortemps knights.</p><p>Drillemont admits it feels as though you are always a step behind, your quarry forever just out of reach. He wants to believe the tables are about to turn, but cannot ignore the risk that even a joint effort may end the same way as before. Still, he says, you are not without other options—and asks whether you have forgotten Inquisitor Guillaime. You have not. The fact that a heretic once remained undiscovered for so long has weighed on them, as has the need to prevent such a breach of security in the future.</p><p>Accordingly, Drillemont explains, they conducted an exhaustive—and covert—evaluation of everyone at Whitebrim Front. Some minor transgressions were found, but only one man stood out as a possible heretic. If he has pledged himself to Iceheart’s cause, he will have been watching the movements of the Temple Knights and the Crystal Braves. And if he realizes what you intend, he may attempt to warn the heretics.</p><p>The man’s watch is soon to end; after that he must report to Ser Jeantremont in the yard. Drillemont asks you to keep an eye on him. If he leaves the walls, follow discreetly. And if he meets with a heretic, do not interfere—simply watch and listen. Drillemont has ensured the suspect knows nothing that could endanger your plans. For now, you will merely observe—and may even profit from his treachery.</p><p>As the Temple Knights and the 3rd unit begin their search, all that remains is to wait. Aymeric remarks on the commander’s decisiveness in sending forces ahead of his own arrival. The taciturn knight glances at the darkening sky and mutters that even the weather is against you.</p><p>At Whitebrim Front, the accused knight notices you and demands to know if you mind, while Jeantremont speaks of the need to rest when circumstances allow. Soon the suspect leaves through the southwest gate. Outside, he offers you empty caution about wild beasts and worse along the roads, then grows unsettled—stammering that you seem familiar, asking if you have met before, only to dismiss it as a mistake. He continues east, then turns south, and you follow.</p><p>At Daniffen Pass, the accused knight finally breaks—shouting into the cold for his contact, cursing that he is freezing. A suspicious Coerthan appears and snaps at him for being late. The accused complains that he was on the wall, fulfilling duties, only for the other to cut him off: his only duty is to the—then he notices something and tells him to lower his voice, lest you be heard back at Whitebrim Front. The accused nervously agrees and relays what he knows: the Temple Knights are in Snowcloak. The contact is unimpressed, saying they already knew, then mentions that their comrades in Boulder Downs will use tunnels and that men will be dead before they know what is happening. He warns the accused not to waste his time again.</p><p>When you return and report, Drillemont orders the man detained at once—his guilt is plain. He regrets you could not hear their words more clearly, yet even the fragments you caught are revealing: the heretics know of your operation, and they are confident they can thwart it. Their comrades in Boulder Downs are key to their plans—meaning they must be rooted out and put to the sword.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Drillemont <small class="muted">(Coerthas Central Highlands, X:12.8, Y:17.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="strength-in-unity.html">Strength in Unity</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="first-blood.html">First Blood</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'疑惑の騎兵を追え',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>アルフィノは言う。あれほど狡猾な相手に対して、別の手段を捨てるのは愚かだ、と。アイメリクも、強敵には計算された対応が必要だと同意する。寡黙な聖堂騎士は、異端者が大した脅威ではないなどと考える者がいるなら、殺されたフォルタン家の騎士たちに聞いてみるがいい、と吐き捨てる。</p><p>ドリルモント卿は、獲物が常に手の届かぬ先にあり、こちらがいつも一歩遅れているようだと嘆く。形勢が変わると信じたいが、共同作戦であっても同じ結末になり得る――そうした疑いを捨てきれない。だが、手は尽きていないと言い、異端審問官ギヨームの名を挙げる。あなたたちも忘れてはいない。異端者が長く潜伏できた謎、そして再び同じ穴を許さぬために何をすべきか――それは常に頭から離れなかった。</p><p>そのため、ドリルモント卿はホワイトブリム前哨地の全員を対象に、徹底的かつ極秘の調査を行ったという。軽微な違反が見つかった者はいたが、異端者の可能性があるのはただ一人だった。もしその男がアイスハートに忠誠を誓っているなら、聖堂騎士団とクリスタルブレイブの動きを注視しているはずで、意図を察すれば異端者へ警告しようとするだろう。</p><p>男の見張りはまもなく終わり、その後は中庭でジャンテモン卿へ報告する決まりだ。ドリルモント卿はあなたに、その男を見張るよう命じる。壁の外へ出るなら、気づかれぬよう尾行せよ。異端者と接触しても、決して介入せず、見て聞くことに徹すること。容疑者には、計画を危険にさらす情報は与えていない。いまは観察するだけだ――そして裏切りから利益を得るかもしれない、と。</p><p>聖堂騎士団と第3部隊が捜索を始め、残るは待つのみとなる。アイメリクは、指揮官が自ら到着する前に兵をホワイトブリム前哨地へ送ったことに感心し、寡黙な聖堂騎士は空を見上げ、天候すら味方しないと呟く。</p><p>ホワイトブリム前哨地で容疑者の騎士はあなたに不快そうに声をかけ、ジャンテモン卿は戦いに備えるため休息も必要だと説く。やがて容疑者は南西門から外へ出た。道中、彼は獣やそれ以上の危険に気をつけろと取り繕い、あなたを見て急に口ごもる。どこかで会ったか、と言いかけては打ち消し、勘違いだと自分に言い聞かせる。そして東へ、南へと進み、あなたは距離を保って追う。</p><p>ダニフェン峠で、容疑者は寒さに悪態をつきながら連絡役を呼び立てる。遅いと責める怪しいクルザス人が現れ、容疑者が「見張りに立っていた」と弁解すると、相手は「お前の務めはただ一つ、──」と言いかけてから、声を潜めろ、ホワイトブリム前哨地に聞こえると言う。容疑者は従い、聖堂騎士団がスノークロークに向かったことを伝える。だが相手は不満げで、そんな情報はすでに知っていると言い、ボルダー・ダウンズの仲間が坑道を使うこと、相手が気づく前に人が死ぬことを仄めかし、二度と時間を無駄にするなと脅す。</p><p>あなたの報告を受けたドリルモント卿は、男を即刻拘束すると言う。罪は明白だ。もっとはっきり言葉を聞ければよかったが、それでもあなたが拾った断片は十分に意味を持つ。異端者はすでにこちらの作戦を察知し、阻止できると高を括っている。ボルダー・ダウンズの仲間が計画の要である以上、こちらも彼らを根絶やしにし、討ち果たさねばならない――と。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ドリユモン <small class="muted">（クルザス中央高地, X:12.8, Y:17.4）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="strength-in-unity.html">極寒の共同作戦</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="first-blood.html">別働隊を叩け</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'追蹤內鬼',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Alphinaud 說，面對這麼狡猾的對手，如果還一味排斥其他做法，那才真是愚蠢。Aymeric 也表示同意：強敵就該用更縝密的方式來應對。那名寡言的 Temple Knight 則冷冷補了一刀——還有人覺得異端者不算什麼威脅？那些被殺的 House Fortemps 騎士，恐怕不會同意。</p><p>Lord Drillemont 坦言，你們彷彿永遠慢一步，獵物總是差那麼一點就能抓到，卻又總在指尖前溜走。他也想相信情勢就要翻轉，但不得不承認，自己心裡仍有疑慮：聯手行動也許能做到過去做不到的事，但也可能還是落得同樣結果。幸好，你們並不是沒有別的路可走——他問你，你還記不記得 Inquisitor Guillaime（Whitebrim Front 的異端審問官，專責追查異端者與滲透案件。Drillemont 提起他，是在提醒你們：曾經有人能在嚴密盤查下長期不露破綻，這次也必須從「內部滲透」的角度下手）。你們當然記得。那名異端者為何能潛伏那麼久都沒被發現，一直是你們放不下的疑問；而要如何避免未來再出現同樣的破口，你們也早就想過。</p><p>因此，Durendaire 方面針對 Whitebrim Front 的所有人，做了一次徹底、而且不動聲色的清查。雖然有人被查出一些小過失，但真正符合「可能是異端者」的只有一人。如果那名男子已經投靠 Iceheart，他一定早就在留意 Temple Knights 與 Crystal Braves 的動向；一旦看出你們的意圖，他就可能試著去通風報信。</p><p>那人的值勤很快就會結束，接著他必須到庭院向 Ser Jeantremont 報到。Drillemont 要你盯住他；如果他走出城牆，就悄悄跟上。若他真的去見異端者，你也不要插手——只要看、只要聽。Drillemont 也說他已經確保嫌疑人並不知道任何會危及你們計畫的事。現在你們只需要觀察；也許還能反過來利用他的背叛。</p><p>同一時間，Temple Knights 與第 3 小隊已經開始搜查，剩下的就是等待。Aymeric 看著你們的人馬先一步到位，說這位指揮官在行動上確實果斷；那名寡言的 Temple Knight 抬頭望向變暗的天色，低聲說連天氣都在跟你們作對。</p><p>在 Whitebrim Front，嫌疑騎士察覺你跟著他，皺著眉要你別再靠近；Jeantremont 則對眾人說，能休息的時候就該休息，才撐得住真正開打的那一刻。沒多久，嫌疑人從西南門離開。一路上，他假裝好心提醒你路上有野獸、甚至更糟的東西出沒；但很快又突然變得不安，支支吾吾說你看起來有點眼熟，問你是不是見過，最後又自己否定，說是他想多了。他往東走、再往南，你始終保持距離跟著。</p><p>到了 Daniffen Pass，他終於按捺不住，在寒風裡大聲咒罵，催著接頭的人快點現身，說自己快凍死了。很快，一名可疑的 Coerthan 出現，反過來罵他怎麼這麼晚。嫌疑人抱怨自己剛站完城牆值勤；對方正要訓斥他「你的唯一責任是——」，卻忽然警覺，叫他壓低聲音，否則 Whitebrim Front 會聽見。嫌疑人連忙照做，吞吞吐吐地把情報交出去：Temple Knights 正在 Snowcloak。可疑的 Coerthan 顯得很不耐，說那些他們早就知道，又提到 Boulder Downs 的同伴會走地道，還放話說等你們反應過來之前就會有人先死；最後警告嫌疑人，再浪費他的時間就別怪他不客氣。</p><p>你回去向 Drillemont 報告後，他立刻下令拘押那名男子，說他的罪已經很明顯。他嘆氣說，要是你能把對話聽得更清楚就好了；但即使只聽到幾句，你帶回來的碎片也足夠關鍵：異端者已經知道你們的行動，而且還很有把握能擋下來。Boulder Downs 的同伴是他們計畫的核心——也意味著你們接下來的核心，就是把那群人揪出來，徹底清除。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 德里耶蒙 <small class="muted"> 庫爾札斯中央高地（X:12.8, Y:17.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="strength-in-unity.html">嚴寒中的合作</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="first-blood.html">剿滅特別行動隊</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
