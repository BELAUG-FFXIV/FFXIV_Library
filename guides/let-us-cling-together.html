    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You hear Ilberd speak plainly: like Roaille, he once lived as a mercenary and did things he is not proud of—but he never betrayed his own, and he says there are depths a person must not sink to. Alphinaud tells you he and Captain Ilberd will question the flame marshal about her “miraculous escape,” take what they learn straight to General Raubahn, and end the matter there. Your part is finished, he says—except for one last task: return to Rising Stones and tell Minfilia everything, because the Antecedent once held Roaille in high regard and will want to know how this ends.</p><p>Back in the Solar at Rising Stones, Minfilia welcomes you and admits she has already heard from Alphinaud. She struggles to accept that Roaille was the Garlean agent, remembering how Roaille and Raubahn aided the Scions at their founding and how fiercely she spoke about confronting the primal threat—Minfilia chooses to believe that the conviction she saw then was real. But she cuts the thought short and gathers everyone: she has an announcement about your efforts to defeat the Ascians, and she asks Moenbryda to begin.</p><p>You listen as Moenbryda reviews what you all now know: white auracite can absorb vast amounts of aether, yet it is unstable, storing power only briefly before expelling it. Urianger warns that even if you trap an Ascian, your foe draws upon an endless wellspring, and the stone will not contain that wrath for long. Moenbryda puts it brutally—if you mean to kill the bastard, you must be quick—and Urianger adds your working belief: an Ascian soul may be undone permanently if struck by a sufficiently concentrated burst of pure aether.</p><p>But the problem is precision. Moenbryda says you do not know how concentrated that burst must be, because you do not know what an Ascian soul is “made of,” and so you are guessing. Urianger points to your struggle with Lahabrea, and Minfilia recalls how Hydaelyn bade you forge what She called a “blade of Light,” a luminous stream that you used to vanquish him—proof that aether can destroy. Yet Lahabrea still escaped using a Crystal of Darkness, and Minfilia warns you not to assume Hydaelyn will place such a weapon in your hands again. Urianger agrees: you must find a way to forge your own blade of aether, equal to what Hydaelyn once bestowed.</p><p>When you ask where such a prodigious quantity of aether could come from, Yda blurts out an idea—two pieces of white auracite, one to trap the Ascian and one to store aether for the blade—but Moenbryda shuts it down: the stone will not hold aether long enough; you would still need to gather it on the spot. Thancred calls that the real obstacle—creating the blade whenever and wherever you choose—and Y’shtola says more research is in order. Moenbryda decides to remain and run more tests, asks Urianger for help, learns he must keep sole charge of Waking Sands, and immediately declares she will simply go to him.</p><p>Then Minfilia turns the room to darker news from Sharlayan: the survey party sent to the Isle of Val reports the isle has been erased from existence, as if a hole were torn in the fabric of reality. Urianger adds that scholars elsewhere went missing at the same time. Moenbryda says every one of them had ties to the head of the Students of Baldesion, and all were researching “dimensional compression”—the “Rejoining” in ancient texts—too specific to be coincidence. Minfilia senses Ascian involvement, yet also something greater: an entity the dark beings call “the one true god.” She can only hope her friend Krile wakes soon—if Krile witnessed Val’s final moments, she may shed light on what happened.</p><p>In Ul’dah, you hear Raubahn speak of the XIVth Imperial Legion entrenching itself after the Calamity so swiftly that help was suspected—and he cannot bear that it came from Roaille, his right hand. Ilberd and Alphinaud lay out a wider web: Roaille served more than one authority, possibly reaching above the XIVth; the Meteor project failed and Eorzea survived, the Empire found the Ultima Weapon, and the Black Wolf moved again—until someone higher ordered him to halt and tried to rein him in through the agent planted in Ul’dah. Raubahn names that figure: Varis zos Galvus. Yet Ilberd says Roaille also sold imperial secrets to a faction within Eorzea, sustaining the status quo and prolonging conflict—double, even triple, dealing. Alphinaud cannot see how feeding intelligence to the heretics serves either the Empire or the Monetarists, and suspects another hand; Roaille must reveal it. Raubahn, forced to interrogate a trusted friend as a stranger, swears he will uproot the Ivy completely—then, before the eyes of the Twelve, he vows to purge Ul’dah of the Monetarists’ corruption.</p><p>Not long after, within Ul’dah’s Fragrant Chamber, Nanamo confides that even her own rooms may soon cease to be private. She speaks of Teledji Adeledji rising in prominence on the backs of impoverished refugees through the Carteneau Reclamation Bill, and of Monetarists snapping at one another like rabid dogs—yet now is not the time for infighting. Merlwyb asks if the Syndicate can be dissolved, but Nanamo says it would inflame the merchant class and worsen unrest; her duty is to protect every citizen’s right to pursue happiness, and she must tread warily. Kan-E-Senna agrees a ruler must take a wide view, yet warns that Monetarists see only their own, fattening themselves while the masses starve. Nanamo then speaks the conclusion she has come to: for government to serve the people, it must be formed of the people—and for Ul’dah to move forward, it is not only the Syndicate that must be dissolved. She tells her friends she called them here to make her intent known, because chaos will follow when she declares it. As the last monarch of the line of Ul, she asks them to help Raubahn preserve order and protect the people—because a strong Eorzea will always need a strong Ul’dah—and she says there is no other way: when the time is ripe, the nation will become a true republic, and Ul’dah will belong not to monarchs or merchant princes, but to her people.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{

    pageTitle:'氷結の幻想',

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたはイルベルドの言葉を聞く。ロアイユと同じく傭兵として生きた過去があり、誇れぬこともした――だが一度たりとも仲間を裏切ったことはない、と。人が堕ちてはならない深みがあるのだ、と彼は言う。アルフィノは、イルベルドとともにフレイムマーシャルへ「奇跡の脱出」の経緯を問い、得た情報は将軍ラウバーンへ直接届けて終わらせると告げる。あなたの役目はここで終わりだ――ただひとつ、石の家へ戻り、起きたことをミンフィリアにすべて伝えてほしい。かつてアシエンダントはロアイユを高く評価していた、だから結末を知りたがるはずだ、と。</p><p>石の家の「太陽の間」で、ミンフィリアはあなたの帰還を迎え、すでにアルフィノから報せを受けていると言う。フレイムマーシャルのロアイユがガレマール帝国の密偵だった――言葉を失いながらも、彼女がラウバーンとともに暁の創設時に助力し、primalの脅威へ立ち向かう必要を熱く語っていたことを思い出す。あのときの決意に輝く眼差しだけは、彼女の真実だったと信じたい――だが、今はそれに囚われる時ではない、と彼女は切り替える。アシエン打倒のための重要な知らせがあるとして皆を集め、ムーンブリダに場を譲る。</p><p>ムーンブリダは白オーラサイトについて確認する。アシエンの魂を捕らえるための奇跡の素材であり、スノークロークで膨大なエーテルを吸収できることは証明できた――しかし安定性に欠け、短時間で中身を放出してしまう。ウリエンジェは敵の力を警戒せよと言い、相手は無限の力の泉から引き出す以上、たとえ封じても石は長く怒りを留められないと説く。ムーンブリダは結論を容赦なく言い換える――豚野郎を殺すなら、手早くやるしかない。ウリエンジェは、十分に凝縮した純粋エーテルの一撃でアシエンの魂を恒久的に断てる、という見立てを示す。</p><p>だが肝心の「十分」が分からない。ムーンブリダは、必要な凝縮度がどれほどか確信できない、アシエンの魂がどれほどのエーテルで構成されているか分からない以上、推測に過ぎないと言う。ウリエンジェは手がかりとしてラハブレアとの戦いを挙げ、ミンフィリアはハイデリンが授けた「光の刃」を思い起こす。あなたが放った光の奔流はエーテルでできた武器であり、それで敵を打ち倒した――ただしラハブレアは闇のクリスタルで狭間へ逃れ、勝利は儚かった。ミンフィリアは、それでも手段があなたの手に示された事実は重いが、次も同じように授けられると考えるのは危険だと言う。ウリエンジェは頷き、あなたたち自身の手で「エーテルの刃」を鍛えねばならない、と告げる。</p><p>では莫大なエーテルをどこから得るのか。イダは白オーラサイトを二つ用意して、片方で封じ、片方で刃のために貯めればいいのでは、と口にする。だがムーンブリダは首を振る――石は長く保持できず、結局その場で集めるしかない。サンクレッドは問題の核心をそこに見る――いつでもどこでも刃を作れる道を見つけること。ヤ・シュトラは追加の研究が必要だと言い、ムーンブリダは試験を続けると決めてウリエンジェに手伝いを求める。だがウリエンジェは砂の家の管理を一任されており離れられないと言うと、ムーンブリダはならば自分がそちらへ行く、と即座に言い切る。</p><p>そこへミンフィリアがシャーレアン本国からの報を告げる。ヴァル島を調査していた隊の報告によれば、島そのものが存在から消え去り、現実の織物に穴が穿たれたかのようだった。ウリエンジェは同時期に各地で学者が行方不明になったことも付け加える。ムーンブリダは、彼らがバルデシオン委員会の長と関わりを持ち、皆そろって「次元圧縮」――古文書の言う「再統合」を研究していた、と言う。それが偶然であるはずがない、と。ミンフィリアはアシエンの関与を疑いながらも、それ以上の力――闇の者たちが「真なる神」と呼ぶ存在――の気配を感じると言い、友人クリルが目覚めることを願う。ヴァル島の最期を目撃していれば、謎を照らせるかもしれないからだ。</p><p>一方ウルダハでは、ラウバーンが語る。第十四軍団は霊災後、各地の要衝へ驚くほど迅速に布陣し、内通の疑いがあった――それがロアイユ、己の右腕によるものだったとは、と。イルベルドとアルフィノはさらに踏み込む。ロアイユは第十四だけでなく、より高い権限にも従っていた可能性がある。メテオ計画は失敗し、エオルゼアは生き残り、帝国はアルテマウェポンを得て黒狼の征服が動き出す――だが、より上位の者が進軍停止を命じ、霊災前にウルダハへ潜ませた密偵で軍団の足を引っ張った。ラウバーンはその人物をヴァリス・ゾス・ガルヴァスと断じる。さらにイルベルドは、ロアイユが帝国の情報をエオルゼアのある派閥にも売り、現状を維持して争いを長引かせたと言う。二重、いや三重の密偵だ、と。アルフィノは、異端者へ情報を流すことが帝国にもマネタリストにも利益にならない点を疑い、別の手があるならロアイユに吐かせねばならないと言う。ラウバーンは、信じた友を「知らぬ者」として尋問せねばならず、蔦を根まで抜かねばまた伸びる、と言い、十二神の前でウルダハの病巣を粛清すると誓う。</p><p>そして「芳香の間」で、ナナモ・ウル・ナモは告げる。自室でさえ長くは私的な場所でいられないかもしれない、と。テレジ・アデレジがカルテノー復興法案を掲げ、貧しい難民の上に立って勢いを増し、マネタリスト同士が狂犬のように噛み合っている――だが今は内輪揉めをしている時ではない。メルウィブがシンジケート解散の可能性を問うと、ナナモはそれが商人層の反発を招き、混乱を深めるだけだと答える。富める者も貧しい者も、市民には幸福を追う権利があり、統治者はそれを守らねばならない――だからこそ慎重に歩む、と。カヌ・エ・センナは、誰もが納得する政治は不可能だが、マネタリストは己の利しか見ず、民が飢える中で権力を貪ると指摘する。ナナモは結論へ進む。民のための政治には、民による政府が必要だ。ウルダハが前へ進むには、シンジケートだけでなく、さらに別のものも終わらせねばならない――彼女はその決意をあなたたちに告げるために呼んだのだと言い、宣言の後には混乱が起こると覚悟を示す。ウル王家最後の君主として、ラウバーンを支え秩序と民を守ってほしい、と。時が満ちれば国は真の共和国となり、ウルダハは王や女王や商人貴族のものではなく、民のものになる――そう言い切る。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> アルフィノ <small class="muted">（北ザナラーン, X:17.3, Y:18.8）</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="good-intentions.html">3本の柱</a></div></div>`
  },

    story:`<div class="clamp" data-collapsed="true"><p>你聽 Ilberd 把話說得很直：他和 Roaille 一樣，曾以傭兵身分討生活，也做過不少自己並不引以為傲的事；但他從未背叛過自己人，因為有些底線一旦跨過，就不該再回頭。Alphinaud 告訴你，他與 Captain Ilberd 會就 Roaille「不可思議的脫逃」親自向她追問，等審訊結束就把結論直接送到 General Raubahn 手上，事情也就到此為止。你在這裡的工作已經完成，但他還要你做最後一件事：回 Rising Stones，把一切經過如實告訴 Minfilia，因為 Antecedent（Minfilia 的頭銜也就是「Scions of the Seventh Dawn」的領袖）曾經很看重 Roaille，無論結果好壞，她都會想知道故事怎麼收尾。</p><p>回到 Rising Stones 的 Solar，Minfilia 迎接你，並說她已經先收到 Alphinaud 的消息。她一時難以接受 Roaille 竟是 Garlean 的密探，因為在 Scions 創立之初，Roaille 曾與 Raubahn 一同給過你們迫切需要的援助，而且她談到 primal 的威脅時那份決心幾乎發光；Minfilia 寧願相信，那些時刻她所看見的是真正的 Roaille。可她很快收住情緒，說現在不是沉溺於此的時候——她要宣布一項關於對付 Ascians 的重要進展，等人到齊就開始，並請 Moenbryda 上前說明。</p><p>Moenbryda 先確認你們已理解白聖石：這種材料能捕捉 Ascian 的靈魂；在 Snowcloak，你們也驗證它能吸收龐大的以太。但它的缺點同樣明確——穩定性不足，只能短暫儲存以太，隨後就會把內容排出。Urianger 進一步提醒，你們還得提防敵人的力量：對方彷彿能從無盡泉源汲取力量，就算你們成功把他封進白聖石，也不可能久困他的怒意。Moenbryda 乾脆把意思說穿：若你們要「殺掉那頭畜生」，就必須動作夠快。Urianger 則補上你們的核心推論——只要用足夠凝縮、純粹的以太造成一次強烈打擊，Ascian 的靈魂就可能被永久消滅。</p><p>問題在於「足夠」究竟是多少。Moenbryda 說，你們無法確定需要多高的凝縮度；在不知道 Ascian 靈魂本質上由多少以太構成之前，你們幾乎只是在猜。Urianger 指出唯一的線索落在你與 Lahabrea 的交手上，Minfilia 也提起 Hydaelyn 當時要你鍛造的「光之刃」：你所描述的那道光之能量流，本質上就是以太，而你也確實用它擊倒了對手。只是那次勝利並不持久，Lahabrea 仍能用闇之水晶逃入世界與虛無之間的狹間。Minfilia 說，Hydaelyn 曾把毀滅 Ascians 的手段放到你手上，這點不容否認；但她也警告，你們不能指望下一次還會被同樣賜予。Urianger 認同：你們必須設法親手鍛造自己的「以太之刃」，做出足以匹敵那把曾被仁慈賜下的武器。</p><p>當你們談到「那樣的刃需要何等龐大的以太」時，Yda 提出一個直覺的想法：若有兩塊白聖石，一塊用來封住 Ascian，另一塊用來儲存鍛刃所需的以太呢？Moenbryda 立刻否定——白聖石無法長時間留存以太，即使有第二塊也一樣得臨場蒐集。Thancred 說，真正的難題就在這裡：如何在任何時間、任何地點都能造出那把刃。Y’shtola 也認為還需要更多研究。Moenbryda 決定先留下做追加實驗，並要 Urianger 幫忙；可 Urianger 說他必須待在 Waking Sands，受 Minfilia 之命獨自看守，實在不宜離開。Moenbryda 聽完反而當場拍板：既然你一個人在那裡，那她就去找你。</p><p>接著 Minfilia 把話題轉向 Sharlayan 送來的新消息：你們記得那支前往 Isle of Val 調查事件的勘查隊——根據報告，整座島已被從存在中抹除，彷彿現實本身被撕開了一個洞。Urianger 補充，同一時間在其他地點也有人回報多名學者失蹤。Moenbryda 更指出，這些人都有一個共同點：他們都與 Students of Baldesion 的領袖有所關聯，而且每一個人都在研究一種被稱為「dimensional compression（次元壓縮），把原本分離的「世界／次元」往同一個方向擠壓、收束，使其界線變得薄弱甚至趨於合併的現象（此處是「現象名稱」，不是單純物理壓縮」的現象——古老文獻稱其為「Rejoining（再合一，強調原本分離的事物重新拼回同一個整體（所以她才說那不是巧合，因為研究方向非常集中）」；她說這絕不可能只是巧合。Minfilia 認為種種跡象都指向 Ascians，但她也感覺到更大的力量正在暗處運作——那個被黑暗之人稱作「the one true god （唯一真神）」的存在。她只能祈禱好友 Krile 早日醒來：若 Krile 親眼見證 Isle of Val 的最後時刻，她或許能替這場謎團照出一線光。</p><p>在 Ul’dah，你聽 Raubahn 回顧霊災之後的局勢：第十四軍團迅速在 Eorzea 各處要地扎根，快得令人懷疑他們曾得到協助；而那份協助竟來自 Roaille——他最信任的右手。Ilberd 說還有更糟的：你們有理由相信 Roaille 不只與第十四來往，她也聽命於 Garlemald 更高的權力，但那個人不可能是皇帝本身。Ilberd 推論，Solus zos Galvus 同意 Meteor 計畫，顯示他比起征服 Eorzea，更在意阻止 primal 的影響擴散，甚至不惜把一切化為灰燼；因此，皇室內部或許有人反對，卻不敢公開對抗，只能暗中佈局，而 Roaille 便是其中一環。Alphinaud 接著補上：Meteor 計畫最終未能阻止 Dalamud 墜落，混亂改寫了世界，卻也讓 Eorzea 倖存；帝國失去了徹底消滅 primals 的手段，直到他們找到了 Ultima Weapon。Raubahn 質疑第十四明明有能力趁你們虛弱時壓境，卻選擇躲在高牆後；Alphinaud 回答，黑狼擔心把 Eorzea 逼到絕境會引發更多 primal，直到 Ultima Weapon 出現才讓他重新放膽擴張。Ilberd 又說，Garlemald 內部曾有人認為黑狼行動過早、地位甚至高於他，命令他停止推進；但黑狼已脫繮，第十四開始自行其是。為了把黑狼拉回來，那人便動用霊災前就埋在 Ul’dah 的密探，暗中削弱第十四的行動。Raubahn 因此斷定：那人只能是前任高位軍團長、如今的皇帝 Varis zos Galvus——也就是 Roaille 真正的主人之一。Ilberd 進一步說，Roaille 同時也把帝國機密賣給 Eorzea 的某個派系，以維持現狀、延長衝突；若再把她對 Black Wolf（Gaius van Baelsar 的稱號）與新皇帝的效忠分開看，那就不只「雙面」，而是「三面」。Alphinaud 指出仍有一塊拼圖對不上：Roaille 為何還要把情報送給異端者？這對她的帝國主人或 Monetarists （Ul’dah 的商人寡頭派系，以「資本／利益」為最高準則的一群權勢商人，核心影響力集中在 Syndicate 內部，）主人都看不出利益；若另有黑手，Roaille 必須吐出那是誰。Raubahn 說他不只失去了一位摯友，現在還得把她當陌生人審問；Ilberd 回應這雖不愉快，卻是必要之惡——若不把 Ivy 連根拔起，它遲早還會再長回來。Raubahn 壓下怒火，卻也對著 Twelve（Eorzea 的「十二神」（一組被普遍信仰的十二位神祇）。在台詞裡常以誓言或感嘆用法出現，例如「By the Twelve」）發誓：他終有一天要把這片土地的病灶清除，讓 Monetarists 的罪行得到報應。</p><p>同一時間，在 Ul’dah 的 Fragrant Chamber，Nanamo 說她甚至開始害怕自己的房間很快也不再私密。她提到 Teledji Adeledji 自從提出 Carteneau Reclamation Bill 後，踩著貧困難民往上爬，聲望水漲船高；Monetarists 一向為了利益團結，卻也被他的行徑撕裂，彼此像瘋狗般互咬。Merlwyb 問若這樣的內鬥已威脅法紀，是否能解散 Syndicate；Nanamo 說事情沒那麼簡單——她若出手解散，必然引爆商人階級的憤怒，只會讓動盪惡化，和平更遙遠。她說不論富貴貧賤、是本地人或難民，只要住在 Ul’dah，都有追求幸福的權利，統治者有責任守護這份權利；因此她必須步步謹慎，不能輕率樹敵。Kan-E-Senna 說統治者必須看得更遠，再怎麼試圖照顧所有需求，仍會有人被忽略、因此心生不滿；但她也直言 Monetarists 只看見自己的利益，渴求權力、讓大眾挨餓。她說缺乏共同目標時，單憑一人很難讓 Ul’dah 重回完整，而 Garlean 密探混入 Immortal Flames 只會讓情勢更糟，也會成為 Monetarists 打擊 Raubahn 的武器。Nanamo 最終說出她叫你們來的真正原因：她要讓你們知道她的決心，因為當她向人民宣告時，混亂必然隨之而來。她以 Ul 王族最後的君主身分請求你們：協助 Raubahn 維持秩序、保護人民；若你們拋棄他們，就等同拋棄自己，因為強大的 Eorzea 永遠需要強大的 Ul’dah。她說沒有別的路：等時機成熟，國家將成為真正的共和國，Royalists 與 Monetarists 都將走入終章；Ul’dah 不再屬於國王、女王或商人王侯，而要歸於人民。她對 Raubahn 低聲道歉，說自己將拋下他以她之名所努力的一切；可在這個姿態之外，她已無力再替臣民做更多。</p><p>＃有關於 Monetarists 和 Syndicate<br/>Monetarists 是什麼 Ul’dah 的商人寡頭派系，以「資本／利益」為最高準則的一群權勢商人，核心影響力集中在 Syndicate 內部。<br/>• 他們在政治上代表什麼？<br/>通常被拿來對比 Royalists：<br/>• Monetarists：偏向讓城市由商業利益與資金運作主導，重視權力、資源與控制。<br/>• Royalists：偏向支持女王體制／王室權威與較傳統的統治正當性。<br/><br/>因為他們能用資源與話語權左右政策、操控輿論，並把混亂（例如難民、法案、軍權事件）變成壓制對手或擴大自身權勢的工具。像 Teledji Adeledji、Lolorito Nanarito 這類人物就是常被拿來代表 Monetarists 的關鍵角色。<br/><br/>Syndicate 是什麼 Ul’dah 的最高權力核心之一：由少數握有龐大財力與人脈的要人組成的統治評議／元老會式機構。它不只是「商會」，而是實際左右城邦政策、法令、財政與治安方向的權力中心。<br/>• 它和女王的關係是什麼？<br/>Ul’dah 的權力並非完全由君主一人掌握；女王（Nanamo Ul Namo）的治理會受到 Syndicate 內部各派系與成員的牽制與角力。你貼的段落裡，女王談「是否能解散 Syndicate」就是在講這個權力結構的現實限制。<br/>• 它和 Monetarists 的關係是什麼？<br/>Monetarists 是 Syndicate 內部的商人寡頭派系（更精確說：一群以利益與資本運作為核心的權勢商人）。<br/>所以：Monetarists 同等於 Syndicate（內部勢力），不是兩個完全不同的組織。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 阿爾菲諾 <small class="muted"> 北薩納蘭（X:17.3, Y:18.8)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-reason-roaille.html">大鬥將的末路</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="good-intentions.html">艾奧傑亞的支柱</a></div></div>`

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
