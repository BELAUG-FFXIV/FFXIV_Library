<p>Shigure finally arrives, explaining that—since it was suggested he stop wearing Sekiseigumi attire—he went to Kogane Dori and bought something completely unlike what he normally wears. Hildibrand and Nashu praise the change, while the Wolf Burglar bluntly doubts anyone will copy the look, then forces the focus back to the hunt: if Yojimbo is truly after the Ame-no-Murakumo, the destination is the Isle of Zekki. The problem, he notes, is getting there—by air or by an underwater passage—and Shigure admits the latter is close to impossible without the Kojin’s blessing. When Shigure asks about Montaro, the Wolf Burglar only scoffs that the bird will be keeping its distance after what happened.</p>
<p>Before you move on, Hildibrand presses the Wolf Burglar for the reason he ever targeted Akebono in the first place—especially when Koju already pointed out how hard it would be to sell such a famous blade. The Wolf Burglar answers without dodging: it wasn’t “stealing” to take back what was stolen. He says Akebono wrested the sword from its rightful owner—a humble samurai who lived simply, took in a young Lupin boy who had fled Doma during the occupation, and raised him like a son. When a merchant came demanding the samurai sell his one prized possession, the samurai refused—because a sword is a samurai’s soul.</p>
<p>The Wolf Burglar goes on to describe how the merchant changed tactics, wormed into the samurai’s affairs, and drew him into debt—small sums becoming a mountain—until the blade was pledged as collateral. The samurai worked himself ragged trying to reclaim his honor, but sickness took him, leaving the Lupin boy alone. Years later, the boy returned from Yanxia, having learned the ways of the shinobi—helping others as he had once been helped, all while yearning to reclaim the last memento of his adoptive father: the Soboro Sukehiro.</p>
<p>With that truth on the table, Shigure pieces together what it meant: Akebono was always the true target, and the break-in at Rakuza District was meant to find the sword. Nashu asks the question that still nags—if reaching the Isle of Zekki is so difficult, how was Yojimbo planning to do it? Shigure decides the answer must lie with those who watch the sea-lanes, and leads you to Sakazuki to question the pirates. One witness can’t place a rail-thin samurai, but another—the Confederate shipwatch—recalls exactly such a traveler, wide-brimmed hat and a dog at his side, speaking openly of heading for the Isle of Zekki. The shipwatch even mentions seeing the dog wandering the beach below.</p>
<p>You search the shore and spot Daigoro, but he won’t come—until the Wolf Burglar demonstrates the simplest “incentive,” and the pup immediately responds. With Daigoro won over, you follow him straight to Yojimbo. Cornered, Yojimbo refuses to yield and declares he has been seeking stronger swords to redeem himself, insisting the Ame-no-Murakumo is the key to his victory. Shigure tries to speak, but Hildibrand barrels ahead with “negotiation,” threatening Daigoro with furious belly rubs until Yojimbo panics, calls it betrayal, and finally gives in—only to realize the Soboro Sukehiro isn’t where he expects it to be. The Wolf Burglar reveals it “right where it belongs,” and when Yojimbo lunges, a stern Sekiseigumi arrives, forcing chaos: the Wolf Burglar bolts, Yojimbo flees, and the Sekiseigumi turns on Shigure.</p>
<p>Shigure hurriedly explains that freeing the Wolf Burglar was a temporary measure to track down Yojimbo and the sword, and that the burglar was meant to be returned to his cell. The Sekiseigumi rejects it, charging Shigure with aiding a criminal’s escape, and hauls him away despite Hildibrand’s protests. Back in Kugane, Hildibrand fumes that Shigure was treated like a common criminal and insists you must find a way to set things right; he also admits that he does not believe the Wolf Burglar’s story about the samurai and Akebono was a lie. Determined to force the truth into the open, Hildibrand declares he will begin investigating Master Akebono at once—while, elsewhere, Akebono greets the moment with a quiet, ominous certainty that the day he expected has finally come.</p>

<p>あなたは紅玉海へ渡り、ルビー・プライスでシグレを待つことにする。ナシュは「次はどんな格好で来るのか楽しみだ」とはしゃぎ、狼盗賊はソボロ助広を売ったらいくらになるのかと執拗に気にしつつ、「純粋な疑問だ」と言い張る。ヒルディブランドは相変わらず上機嫌で、次の行程へ向けて勢いを失わない。</p>

<p>その場でヒルディブランドは、狼盗賊がなぜアケボノからソボロ助広を奪おうとしたのか、動機を問いただす。売るのが難しいと分かっていたはずだと指摘されると、狼盗賊は言い切る――盗んだのではなく、盗まれたものを取り戻そうとしたのだ、と。あの刀は本来、質素に生きる一人の侍のものだった。占領下のドマから逃げてきた幼い少年を引き取り、親子のように支え合って生きたという。そこへ商人が訪れ、唯一の宝である刀を売れと迫ったが、侍は拒んだ。刀は侍の魂であり、金と引き換えにはできないからだ。</p>
<p>狼盗賊はさらに、商人が手を変えて侍の懐に入り込み、少額の借りから始めて借金を膨らませ、ついには刀を担保に差し出させた経緯を語る。侍は名誉を取り戻そうと昼夜を問わず働いたが、体は弱り、病に倒れて世を去った。残された少年は不条理な世界で一人になり、年月を経てヤンサから戻る。忍の道を身につけ、かつて助けられた自分と同じように他者を助けながら、養父との最後の形見であるソボロ助広を取り戻すことだけを願い続けたのだという。</p>
<p>真相を聞いたシグレは、アケボノこそが常に標的だったのだと理解し、ラクザ区での押し入りもソボロ助広を探すためだったと整理する。ナシュは、ゼッキ島へ行くのが難しいなら、ヨウジンボウはどうやって向かうつもりだったのかと疑問を口にする。シグレは、誰かがその動きを見ているはずだとして、サカズキの海賊に聞き込みを提案する。ある者は心当たりがないと言うが、別のコンフェデレートの見張りは、つばの広い笠をかぶった痩せた侍と犬連れの旅人に会ったと証言し、ゼッキ島へ向かう気だったとまで覚えている。さらに、その犬が浜辺をさまよっていたのを見たとも言う。</p>
<p>あなたが浜辺で探すと、ダイゴロウが見つかるが、なかなか寄ってこない。すると狼盗賊が「正しい餌」を示し、ダイゴロウはあっさり反応して動き出す。あなたはその後を追い、ついにヨウジンボウを見つける。追い詰められたヨウジンボウは刀を渡さず、己を打ち負かした相手に雪辱するため、より強い刀を求めてきたのだと叫び、天叢雲剣こそ勝利の鍵だと言い放つ。シグレが止めようとする間もなく、ヒルディブランドは「交渉」に乗り出し、ダイゴロウの腹を全力で撫で回すと脅してヨウジンボウを揺さぶり、ついに降参させる。しかしソボロ助広はそこにない。狼盗賊が「あるべき場所にある」と示した瞬間、寡黙な赤誠組が踏み込み、狼盗賊は逃げ、ヨウジンボウも退き、矛先はシグレへ向けられる。</p>
<p>シグレは、ヨウジンボウとソボロ助広を追うために狼盗賊の助けが必要で、牢から出したのはあくまで一時的で、必ず戻すつもりだったと必死に説明する。だが寡黙な赤誠組はそれを認めず、シグレを罪に問うとして連行していく。あなたがクガネへ戻ると、ヒルディブランドは状況を「看過できない不正」だと憤り、狼盗賊の語った侍とアケボノの話が嘘とは思えないとも告げる。そして真実を白日の下にさらすため、今すぐアケボノを調べると言い残して動き出す。一方その頃、アケボノは静かに、ついにこの日が来たとつぶやき、まもなくすべてが自分の手中に収まるかのように笑う。</p>

<p>你們搭上前往 Ruby Sea 的渡船，在 Ruby Price 依照 Shigure 的要求先等他合流。等待的空檔，Nashu 一直興奮地說想看 Shigure 下一套「變裝」會有多誇張；Wolf Burglar 則又開始盤算 Soboro Sukehiro 若真拿去賣到底能賣多少，還強調這只是「誠實的好奇」；Hildibrand 看起來倒是已經準備好再度出發，把你們一路拉進下一段追逐。</p>
<p>Shigure 終於趕到，解釋自己聽了建議，暫時不再穿 Sekiseigumi 的制服，於是跑去 Kogane Dori 買了一身完全不像平常的穿著。Hildibrand 和 Nashu 都稱讚這樣好多了，Nashu 甚至說沒想到他也能這麼「時髦」；Wolf Burglar 卻嘴上不饒人，覺得這套搭上草履也不會成為潮流，但他很快把話題拉回正事：如果 Yojimbo 真的是衝著 Ame-no-Murakumo 去，那目標就只能是 Isle of Zekki。可不論走空路還是走水下通道，都不好辦；Shigure 直言沒有 Kojin 的祝福，水下那條路幾乎不可能。當你們提到 Montaro，Wolf Burglar 只冷笑說那隻鳥在經歷過先前的事後，恐怕早就躲得遠遠的了。</p>

<p>Wolf Burglar 接著把那段過去講得更清楚：一名商人上門想買武士的刀，想用金錢換走他唯一的珍愛之物；武士拒絕，因為刀就是武士的靈魂。商人卻不肯罷休，轉而鑽進武士的生活與帳目——先是小額借款，再變成更大、更大，直到武士在不知不覺間背負一座債山，只能把刀押作抵押。武士日夜拚命想贖回名譽，卻因體弱而病倒，最終過世，只留下那名 Lupin 男孩獨自面對這個不講理的世界。多年後，男孩從 Yanxia 回來，學會了 shinobi 的本事，一邊以自己的方式去幫助他人，一邊只想把 Soboro Sukehiro 奪回——那是他與養父相伴歲月裡最後、也是唯一留下的形物。</p>
<p>聽到這裡，Shigure 把一切串起來：Wolf Burglar 從頭到尾盯上的其實是 Akebono，而先前在 Rakuza District 的闖入也只是為了找到 Soboro Sukehiro。Nashu 這時提出一個更現實的疑問——既然 Isle of Zekki 這麼難到，Yojimbo 到底打算怎麼去？Shigure 認為無論如何，只要有人經過，就一定會被某些人看見，於是帶你們去 Sakazuki 向海上勢力問話。有人說那樣的旅人不可能逃過自己的眼睛，反過來也就代表他沒看見；但另一名 Confederate 的守望者卻回憶起一個瘦長的武士，戴著寬邊斗笠，身邊還跟著一條狗，確實說過要前往 Isle of Zekki。對方還補了一句：那條狗不久前似乎在下方的海灘徘徊，他很擔心主人是不是把牠丟下了。</p>
<p>你們趕到海灘找到了 Daigoro，可他對你們冷冷淡淡，不願靠近。Wolf Burglar 卻示意你別急，只要給對方「對的誘因」就行——下一秒，Daigoro 立刻被吸引，興奮地嗅著、叫著，帶著你們往前衝。你跟著他一路追去，終於把人逮到：Yojimbo 正被逼到退無可退，仍拒絕交出刀，還宣稱自己在被你們之中的沉默戰士壓制後，一直渴望雪恥，所以才去尋找更強的名劍，並斷言 Ame-no-Murakumo 才是他走向勝利的鑰匙。Shigure 想出聲制止，Hildibrand 卻搶先用他那套「談判術」把局面硬拗過來——他威脅要對 Daigoro 施以最猛烈的肚皮按摩，剝奪 Yojimbo 的快樂，逼得 Yojimbo 驚怒交加，最後竟真的屈服，說刀可以交出去。可下一瞬間，Yojimbo 又驚覺 Soboro Sukehiro 不在他以為的位置；Wolf Burglar 冷冷說刀「就在它該在的地方」，轉眼間 Sekiseigumi 追兵殺到，Wolf Burglar 立刻拔腿逃走，Yojimbo 也趁亂遁去，而你們的麻煩則落在 Shigure 身上。</p>
<p>Shigure 急忙向趕到的 Sekiseigumi 解釋：為了追到 Yojimbo 和 Soboro Sukehiro，他才不得已暫時把 Wolf Burglar 從牢裡帶出來，原本就打算把人送回去。可對方不接受這套說法，直接以協助犯人逃亡的罪名追究 Shigure，並把他帶走，即使 Hildibrand 也只能徒勞抗議。回到 Kugane 後，Hildibrand 氣憤地說 Shigure 被當成普通罪犯帶走是嚴重的不公，並坦言他不認為 Wolf Burglar 講的武士與 Akebono 那段往事是謊言。為了讓所有真相在不久後徹底攤開，他決定立刻著手調查 Akebono，讓你先留守原地；而在另一處，Akebono 只是低聲冷哼，像是早就預期這一天終會到來，並帶著詭異的篤定笑意，彷彿很快就再沒有任何事物能逃出他的掌握。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected') === 'true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur === 'EN' ? 'JP' : (cur === 'JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};

function uiLang(code){
  return code === 'JP' ? 'ja' : (code === 'ZH' ? 'zh-TW' : 'en');
}

function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
