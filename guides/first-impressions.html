<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>First Impressions | BELAUG · FFXIV Library</title>
  <meta name="description" content="MSQ – First Impressions (ARR Patch 2.0)">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left">
        <a class="home" href="../index.html">🏠 Home</a>
      </div>
      <div class="right">
        <button id="langToggle" class="icon-btn" aria-label="切換語言">English</button>

  <main class="container main">
    <div class="grid">
      <!-- 左：影片 -->

            <iframe id="ytFrame" src="https://www.youtube.com/embed/ccFTGqpW1fs"
              title="First Impressions" allowfullscreen></iframe>
          </div>

      <!-- 右：標題 + Tabs -->
      <section class="card">

          <button class="tab-btn" role="tab" aria-selected="true"  data-tab="story">Story</button>

            <div id="giscus_container" style="min-height:320px;"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'First Impressions',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>You remain at The Hawthorne Hut in Nine Ivies and speak with Rolfe Hawthorne once more. He is pleased to see you still there, and tells you there is one more thing you should know about the sylphs: they do not take kindly to guests who show up empty-handed. If you wish to earn their trust, you would do well to bring them a particular gift. He tries to recall what it was, but the answer will not come. He curses his failing memory and admits that he and his wife Rosa were speaking of the matter only a few days ago. Apologizing again, he sends you to speak with Rosa at the Comb in the Honey Yard, saying that her memory should prove more reliable than his.</p>
      <p>You travel on to Fullflower Comb in the Honey Yard and find Rosa Hawthorne. When you ask her about a peace offering for the sylphs, she smiles and says that, if it were anyone else, she would recommend a jar of honey—but that would barely get you past the doorstep with them. Their tastes, she explains, run to the unusual. She asks if you are familiar with milkroot, the name they give to the root of the fiendish seedkin known as the ochu. When chewed, it exudes a cloudy liquid said to induce curious visions in whoever drinks it. Rosa has no intention of trying such a thing herself, but the sylphs seem to enjoy it to no end. She has not seen an ochu near the Comb for some time, yet she did encounter a suspicious clump of grass the other day. If you were to stimulate it somehow—say, with some amber syrup—she suggests that you might be surprised by what emerges, and she wishes you luck.</p>
      <p>Following Rosa’s advice, you return to the Honey Yard and seek out the suspicious clump of grass. You pour the amber syrup over it as instructed. At once, the still vegetation stirs; with branches thrashing, the growth springs to life, revealing the hostile seedkin hidden within. You confront the creature that has risen from the grass, just as Rosa predicted, and obtain what you need to prepare the offering that will suit the sylphs’ tastes.</p>
      <p>With the task complete, you make your way back to The Hawthorne Hut in Nine Ivies and report to Rolfe Hawthorne. He welcomes you back and asks if his wife was able to direct you to a suitable offering. When you present the milkroot, he immediately recognizes it and exclaims that of course this is the right choice: the sylphs quaff that cloudy stuff as quickly as he drains a flagon of mead, and the effect is much the same. A gift of milkroot, he says, will have the sylphs calling you friend and brother the moment they set eyes on it. As he begins to wrap up the offering for you, he admits that he is starting to feel a bit woozy himself.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Rolfe Hawthorne <small class="muted">East Shroud (X:16.7, Y:27.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="sylphic-studies.html">Sylphic Studies</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 20 or above)</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="first-contact.html">First Contact</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'魅惑の手土産',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>あなたは東部森林の九つの森にあるホウソーン家の山塞にとどまり、再びロルフ・ホウソーンに話しかける。彼は、まだここにいてくれてよかったとばかりに微笑み、シルフ族について、もうひとつ知っておくべきことがあるのだと言う。あの者たちは、手ぶらでやって来る客を好まないのだというのだ。信頼を得たいのなら、ある品を手土産に持っていくのがよいと続けるが、その肝心な品の名がどうしても思い出せない。つい先日も妻のロサとその話をしていたはずなのに、と自分の物忘れを嘆き、申し訳なさそうにあなたに謝る。そして、養蜂場の拠点で働くロサの方が記憶は確かだろうから、蜂蜜作りの場にいる彼女に会いに行ってほしいと頼む。</p>
      <p>あなたはハチを飼う畑の一角にある作業場を訪れ、ロサ・ホウソーンに声をかける。シルフ族への和解の贈り物について尋ねると、彼女は、相手が普通の客であれば蜂蜜の瓶を勧めるところだが、シルフ族にはそれでは玄関先までしか近づけないだろうと穏やかに言う。あの者たちの好みは、もっと風変わりなものに向いているのだと説明する。そして、ミルクルートという名を出す。あれは、凶暴な草状の魔物オチューの根のことで、噛むと白く濁った液体がにじみ出てきて、それを口にした者には奇妙な幻が見えるのだと伝えられている、と彼女は話す。自分が試す気はまったくないが、シルフ族はそれをたいそう好んでいるようだとも付け加える。最近はこのあたりでオチューそのものを見かけてはいないが、先日、妙に怪しい草むらを見つけたのだとロサは思い出す。もしその草むらを、たとえばアンバーシロップのようなもので刺激してみれば、思いもよらないものが飛び出してくるかもしれないと教え、最後にあなたの幸運を願って送り出す。</p>
      <p>あなたはロサの言葉どおり、再び蜂蜜の畑に向かい、彼女が言っていた怪しい草むらを探し当てる。そして、その上からアンバーシロップをかけて刺激を与える。すると、これまで静かだった草木がざわめき始め、枝を激しく揺らしながら、隠れていた魔物が姿を現す。あなたは草むらから飛び出してきたその種族と対峙し、シルフ族への贈り物にふさわしい品を手に入れるべく、指示どおりの仕事をやり遂げる。</p>
      <p>用意すべき手土産の目処が立ったあなたは、再び九つの森の山塞に戻り、ロルフ・ホウソーンに報告する。ロサは適切な贈り物にたどり着く手助けをしてくれたかと彼が尋ねるので、あなたはミルクルートを見せる。彼はすぐにそれが何であるかを理解し、やはりこれしかないと笑ってうなずく。あの白く濁った汁を、シルフ族は自分が蜜酒をあおるのと同じくらいの勢いで飲み干すのだと語り、その効果もだいたい似たようなものだと冗談めかして言う。そして、ミルクルートを贈り物として差し出せば、シルフ族はあなたを見るなり、友として、兄弟として迎えてくれるだろうと太鼓判を押す。包みの準備をしながら、少しふらついてきた気がする、と彼は苦笑まじりにこぼすのだった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ロルフ・ホウソーン　<small class="muted">黒衣森：東部森林 (X:16.7, Y:27.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="sylphic-studies.html">変わり者の挨拶</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 20～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="first-contact.html">シルフ族との架け橋</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'誘人的特產',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>你留在 East Shroud 的 Nine Ivies 裡，再次在 The Hawthorne Hut 找上 Rolfe Hawthorne。他見你還在那裡，十分高興，說起關於 sylphs，你還有一件事必須知道──那群人可不喜歡「兩手空空」上門的客人。如果你想取得他們的信任，最好帶上一份合適的禮物。說到這裡，他努力回想那份禮物究竟是什麼，卻怎麼也想不起來，忍不住抱怨自己的記性越來越糟，明明才在幾天前還和妻子 Rosa 提過這件事。Rolfe 向你道歉，說自己的腦袋已經不可靠了，於是請你去 Honey Yard 的 Fullflower Comb，那裡可以找到 Rosa，她的記憶肯定比他好得多。</p>
      <p>你來到 Honey Yard 的 Fullflower Comb，與 Rosa Hawthorne 交談。當你詢問適合拿給 sylphs 的和談禮物時，她笑著說，若是一般客人，她會毫不犹豫推薦一罐蜂蜜，但對 sylphs 來說，蜂蜜恐怕連門檻都過不了。她解釋說，那些 sylph 的喜好偏向「不尋常的東西」。接著她問你是否聽過「milkroot」這個名字──那是他們對某種根的稱呼，來源是兇惡的 seedkin「ochu」。據說只要咬下那段根，就會滲出乳白色的液體，喝了之後會看見相當奇妙的幻象。Rosa 直言自己絕對不會去碰這種東西，但 sylphs 看來是樂在其中。她又提到，最近在 Comb 附近是沒見過 ochu 本體，不過前幾天倒是發現了一團相當可疑的草叢。如果你能想辦法刺激那片草──比方說，淋上一些這種 amber syrup──說不定會有意想不到的東西從裡面冒出來。她把 syrup 交給你，祝你一路順利。</p>
      <p>你依照 Rosa 的指示，回到 Honey Yard，尋找她提到的那團可疑草叢。找到目標後，你將 amber syrup 倒在草叢上。原本靜止的植物立即騷動起來，枝條劇烈搖晃，整片草木突然像活了過來一樣。隨著草叢炸開，隱藏其中的魔物現出真面目，你照著交付的任務與之對峙，完成了取得 sylphs 所喜愛的素材這一步。</p>
      <p>任務告一段落，你再次回到 Nine Ivies 的 The Hawthorne Hut 向 Rolfe Hawthorne 報告。他見你返身而來，問起妻子是否順利為你指點了合適的禮物。當你拿出 milkroot 給他看時，他立刻恍然大悟，說果然就是這個──sylphs 喝那種濁濁的東西，就像他喝 mead 一樣豪邁，而效果也差不多。Rolfe 說，只要準備一份 milkroot 當作贈禮，sylphs 在第一眼見到它時，就會把你當成朋友、甚至兄弟般看待。說完，他開始幫你把東西包好，嘴裡笑著卻也承認，自己似乎也有點頭暈目眩起來了。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 羅爾佛·霍桑　<small class="muted"> 黑衣森林東部林區 (X:16.7, Y:27.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="sylphic-studies.html">另類的招呼</a></div>
      <div class="row">所有職業（不含限定職） 等級 20 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="first-contact.html">初次接觸</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
