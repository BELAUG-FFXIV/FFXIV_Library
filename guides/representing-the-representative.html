  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;

    }

    .subblock{margin-top:10px;padding:12px 14px;border:1px solid var(--border);border-radius:12px;background:#fff}
    .subblock .label{font-weight:800;margin-bottom:6px}

const i18n = {
  EN:{
    langLabel:'English',

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Ceana forces a steadier tone and tells you not to worry. She says she has thought over what you learned and decided the talk of spirits is nothing more than local folklore. As for why travel to the Isles of Umbra is restricted, she guesses it may simply be deemed too dangerous since Pharos Sirius was abandoned.</p>
      <p>While you were questioning the Yellowjackets, she admits she visited the local pub—explaining that even an esteemed scholar sometimes enjoys dulling her wits. There, she heard of a man named Skyfryn who was recently detained after returning from—of all places—the Isles of Umbra. It is the first time she has heard of anyone truly traveling to and from those isles, and she is eager to know how he obtained permission. Yet because he has been arrested, she is reluctant to approach him herself, and asks you to speak with him in her stead.</p>
      <p>When you find Skyfryn, you are met with a fevered insistence. He says he has to go back—she calls to him, sings to him. He groans and tells you to apologize to Mimidoa and to give him what he offers, because Mimidoa was right. Then he shifts, pleading for you to release him so he can go and tell her—begging to be let go to her. His voice slips into rapture as he says he hears his love and asks her to wait for him.</p>
      <p>You return to Ceana with what you managed to glean. She dismisses most of it at once, saying she could not care less about how much he misses his favorite bar wench. But she fixes on the name he mentioned—Mimidoa—and suddenly recognizes it. With sharp disgust, she says that is the bastard who grabbed her at the pub the other day. If you want to deliver the feather, she tells you, be her guest—she is not going anywhere near him and his wandering hands.</p>
      <p>Mimidoa greets you with rough impatience, barking at you to speak up. When you present what you brought, his tone snaps into startled interest as he demands to know if it is what he thinks it is—and where you found it. Hearing Skyfryn’s name, he mutters that he had hoped to speak with the lad, but it sounds like there is nothing left between his ears.</p>
      <p>He explains that Skyfryn was supposed to help patch up Pharos Sirius, and that a company sent Mimidoa to supervise the crew. Work fell apart—some walked off, some ran off, and some simply vanished. When he realizes you are looking for passage to the Isles of Umbra, he says you should have said so sooner. He has been thinking of dispatching someone to see how things stand on his behalf, and no one else has been willing with the whole port in an uproar over spirits.</p>
      <p>If he had the coin, he says, he would hire sellswords to deal with it—but you will do in a pinch. He gives you a writ of passage and tells you to show it to the skipper, who will see you there and back. Then he cuts off further talk, saying there is no call for chitchat until you learn what is truly causing the commotion.</p>
      <p>When you return again, Ceana remarks that you spoke with Mimidoa, and hopes the time you chose to waste proved worthwhile. She recoils when you tell her that repulsive creature was Skyfryn’s superior, yet she cannot deny the writ appears genuine. At last she admits relief at working with someone so industrious as you—eager to hear what discoveries you will make on the Isles of Umbra…without her.</p>
    </div>

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>シアーナはどもりながらも、心配はいらないとあなたに言い聞かせる。あなたの聞き込み結果を考えた末、霊の噂は土地の民間伝承にすぎないと結論づけたのだという。ウンブラ諸島への渡航が制限されているのも、ファロス・シリウスが放棄された今、危険すぎると見なされているからではないか――彼女はそう推測する。</p>
      <p>あなたがイエロージャケットに当たっている間、彼女は酒場へ足を運んだとも白状する。高名な学者である自分にも、ときには頭を鈍らせる楽しみがあるのだと。そしてそこで、スカイフリンという男が、なんとウンブラ諸島から戻った後に拘束されたという話を耳にしたのだという。実際に島へ行き来した者がいるなど初耳で、どうやって許可を得たのか知りたい。だが逮捕されている相手に自分で近づくのは気が引けるため、代わりに話を聞いてきてほしいとあなたに頼む。</p>
      <p>スカイフリンに会うと、彼は朦朧とした様子で、どうしても戻らねばならないと言い張る。彼女が呼んでいる、歌っているのだ、と。うめき声を上げながら、ミミドアに謝ってくれ、これを渡してくれ、あいつは正しかったのだと言い残す。次の瞬間には、あるいは自分を解放してくれないかと懇願し、彼女のもとへ行かせてくれと繰り返す。愛しい人の声が聞こえる、待っていてくれ――そう言って彼は恍惚とした言葉を漏らす。</p>
      <p>あなたが戻って報告すると、シアーナは役に立たないと切り捨て、酒場の女に会いたいなどどうでもいいと言い放つ。だが彼女は、彼が口にした「ミミドア」という名に反応する。思い当たった彼女は、それが酒場で自分の尻を触ってきた卑劣漢だと吐き捨てる。羽根を渡したいなら好きにすればいいが、彼女はあの手癖の悪い男には近づかない、と。</p>
      <p>ミミドアは荒っぽくあなたに呼びかけ、何者だと怒鳴りつける。だがあなたが羽根を差し出すと、彼はそれが何かを察して声色を変え、どこで見つけたのかと詰め寄る。スカイフリンの名を聞くと、あいつと話したかったが、どうやら頭が空っぽになってしまったらしいと嘆く。</p>
      <p>そして彼は、スカイフリンがファロス・シリウスの修繕に加わるはずだったこと、自分は作業員たちを監督するため会社から派遣されたことを語る。だが現場はまとまらず、半分は逃げ、半分は去り、さらに半分は忽然と姿を消したという。あなたがウンブラ諸島への渡航を求めていると知ると、最初からそう言えと言い、港が霊の噂で騒然として誰も行きたがらない今、自分の代わりに様子を見に行く者を探していたのだと明かす。</p>
      <p>金があれば傭兵を雇って片づけさせるのだが、お前でも間に合う、と彼は言い、通行許可の書状を渡す。船長に見せれば、島へ行って戻ってこられるはずだ。そして騒ぎの原因を突き止めるまでは無駄話は不要だと告げ、話を打ち切る。</p>
      <p>再び戻ったあなたに、シアーナはミミドアと話したのかと皮肉を言い、無駄にした時間が成果になったのならいいがと釘を刺す。あの不快な男がスカイフリンの上司だったとは信じがたいと顔をしかめつつも、渡航許可証が本物らしいことは認めざるを得ない。最後に彼女は、あなたの勤勉さに安堵し、ウンブラ諸島であなたが見つける発見を楽しみにしている――自分抜きで、と言い添える。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> シアーナ　<small class="muted">ラノシア：西ラノシア (X:27.9, Y:27.0)</small></div>

    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="its-probably-not-pirates.html">船はいまだ港に</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 42～</div>

    followq:`<div class="stack">

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'幻影群島怪談',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Ceana 結結巴巴地先安撫你，說你不用擔心。她已把你的打聽結果想過一遍，認定所謂「靈異傳聞」不過是當地的民間傳說；至於為什麼全面禁止前往 Isles of Umbra，她猜大概是因為 Pharos Sirius 被放棄後，那裡被視為過於危險。</p>
      <p>她接著又坦白：你在向 Yellowjackets 問話時，她跑去當地的酒館——因為就連她這樣「受人敬重的學者」，偶爾也會想讓腦子遲鈍一下。在那裡，她聽說有個叫 Skyfryn 的男人最近被拘留了，而原因竟是他從——沒錯——Isles of Umbra 回來。這是她第一次聽到真的有人能往返那裡，所以她非常想知道他是怎麼拿到許可的。但因為對方畢竟是被逮捕的人，她不太敢親自接近，便請你代她去跟他談談。</p>
      <p>你找到 Skyfryn 時，他的神情像被某種念頭纏住，只反覆說他必須回去——「她」在呼喚他、在對他歌唱。他痛苦地呻吟，要你替他向 Mimidoa 道歉，並把他交出的東西轉交過去，因為 Mimidoa……Mimidoa 是對的。接著他又改口哀求：你能不能放了他？讓他去找她、去告訴她——求你放他走。他像沉浸在幻聽裡似的喃喃自語，說他聽見愛人的聲音，要她等他。</p>
      <p>你把這些帶回去告訴 Ceana，她立刻不耐地說這一點也不重要——她才不在乎他多想念自己最愛的酒館女人。可她立刻抓住另一個關鍵：Mimidoa。她皺著臉說她知道那個名字——那就是前幾天在酒館伸手抓她臀部的混帳。她冷冷表示：如果你想把那根羽毛交給他就去吧，但她絕不會靠近那傢伙和他那雙亂摸的手。</p>
      <p>Mimidoa 用粗魯的口氣對你吼叫，要你大聲點說話。可當他看見你帶來的東西時，立刻驚訝得變了語氣，追問這是不是他以為的那個、又是你在哪裡撿到的。你提到 Skyfryn，他咒罵似的說本想跟那小子談談，但聽起來他腦子裡已經什麼都不剩了。</p>
      <p>他解釋 Skyfryn 原本應該去協助修補 Pharos Sirius，而公司派他來監督那群人。只是工程根本做不起來——有人走了、有人逃了，還有人乾脆就此消失不見。當他聽到你在找前往 Isles of Umbra 的船，他反倒像抓到機會似的說你早該直說：他一直想派個人替 Mimidoa 去看看那裡到底發生什麼事，可整個港口都在為靈異傳聞騷動，沒人願意出面。</p>
      <p>他抱怨要是自己有錢，就會雇傭兵去把事情處理掉；但現在也只能勉強用你。他交給你一份通行文書，說你拿去給船長看，對方就會載你往返。然後他不耐地打斷你，表示在你查出這場騷動的原因之前，沒必要再閒聊。</p>
      <p>你回到 Ceana 那裡，她冷冷問你是不是去跟 Mimidoa 談了，並希望你浪費的時間至少換來成果。當你說那個噁心的傢伙竟是 Skyfryn 的上司時，她明顯不願相信；可那份通行文書看起來確實是真的，她也只能接受。最後她難得鬆口，說能和你這麼勤快的人合作令人安心——她很期待聽你在 Isles of Umbra 會有什麼發現……而且，務必是在沒有她的情況下。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">

const tabBtns = [...document.querySelectorAll('.tab-btn')];
const pageTitle = document.getElementById('pageTitle');
const langToggle = document.getElementById('langToggle');
const panels = {
  story: document.getElementById('panel-story'),
  acq: document.getElementById('panel-acq'),
  unlockq: document.getElementById('panel-unlockq'),
  followq: document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);

  s.setAttribute('data-mapping', 'specific');

}
