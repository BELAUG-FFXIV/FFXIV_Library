    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You arrive at Moraby Drydocks to find the Whorleater finished—and Merlwyb makes it clear what that “finish” cost. Two perfectly serviceable galleons were decommissioned to build her, and their captains were furious until Merlwyb offered them a choice: keep their ships and face Leviathan in your stead. Their protests vanished, replaced by lofty talk of sacrifices for the greater good. Minfilia can only sigh that you go into this fight without all the knowledge you should have had, yet she steadies herself on what has remained true every time: you have faced worse odds and still prevailed, and she believes you will do so again. Thancred, impressed despite himself, says Naldiq & Vymelli’s have won an admirer in him for completing the twin vessel so quickly with limited materials, while Y’shtola warns that simply towing the Whorleater and delivering you safely to Leviathan will take exceptional helmsmanship—perhaps a battle in itself. Yugiri admits she doubted the plan at first, but now sees its elegance with her own eyes.</p><p>Eynzahr Slafyrsyn reads your readiness immediately. The Whorleater may not be pretty, he says, but she is capable—and she carries what Naldiq & Vymelli’s call an “elemental converter.” If it works as intended, it will use the power of corrupted crystals aboard to rob Leviathan of his hold over water. He adds one thing you must not forget: depending on how the battle unfolds, you may need to activate the device manually.</p><p>Minfilia expects the Sahagin and their thralls to surge to Leviathan’s defense, so the Maelstrom will employ diversions again. She directs Thancred and Y’shtola to support the effort, and Yugiri volunteers her blade as well, insisting the diversionary force must not lack numbers if it is to succeed. Merlwyb welcomes the offer, saying that after seeing Yugiri fight at Sapsa, she daresay the fishbacks will find her presence highly diverting. She then turns to you with the only counsel she can give someone who has made a sport of slaying gods: go warily. The sea is an unforgiving place to wage war. May the Navigator guide you through the storm, Warrior of Light. Minfilia echoes the sentiment, telling you that all have the utmost faith in you, and asking the Crystal to bless and keep you.</p><p>On the deck, Storm Sergeant Styrnlona reports that the Whorleater is loaded and ready, and that she will signal the towing vessel to weigh anchor the moment you are aboard. She tells you plainly that there is not a soul among them who would not lay down life to ensure you reach your target—so you are to focus on skewering that overgrown sea snake and leave the rest to them. When the battle ends, she can scarcely believe what she witnessed from afar: you defeated Leviathan in his own domain, and she saw the beast sink lifeless beneath the waves. Merlwyb chose to accompany the fleet back to Limsa Lominsa, so you are to present yourself to her as soon as you can—she is eager to hear your account.</p><p>Back in the command room, Eynzahr admits that not everything went to plan—Leviathan denied you even the luxury of ramming him—but refuses to quibble over the manner of victory. If Limsa Lominsa is safe and you are not drowned, he declares it a good day. Minfilia keeps her congratulations brief, saying only that she is glad you returned safely; Thancred adds another notch to your belt with a grin and jokes that if he were a god, he would tremble at your summoning. Y’shtola congratulates you and notes that the victory will quiet the Sahagin—for a time. Yugiri, still shaken, asks where your strength and sense of purpose come from.</p><p>Merlwyb answers as a Lominsan sworn to strive “Till sea swallows all,” and says the sea would have swallowed everything had Leviathan prevailed. That Limsa Lominsa still strives, she says, is owed in no small part to you—again you have delivered the nation from a primal’s wrath, and never has it known a stouter ally. She offers her humblest thanks on behalf of her people, and says it is meet to give thanks to old Mistbeard as well for the solution that made the plan possible. Yugiri reflects that before she came to these lands she had no inkling the people of Eorzea contended with foes so mighty, and that their defeat has reminded her of the vastness of the world and the boundless potential of man. Though she is a refugee here, she wants to be of use in your fight, and offers to share one of the foremost combat arts of the Far East with any who wish to learn. Merlwyb accepts gladly and says Yugiri’s knowledge and skills will serve them well; Thancred reveals that Limsa Lominsa is home to a secret fraternity trained in a style not unlike Yugiri’s, and that such individuals could adapt to the techniques he witnessed her employ.</p><p>When the mood turns more private, Y’shtola warns Merlwyb that history repeats itself: as the kobolds did before them, the Sahagin summoned their god over a territorial feud, acting in self-preservation. Merlwyb does not deny that man bears part of the blame for the primals’ existence, nor that the Sahagin sought only a place to breed and survive—but insists her people have the same right to live and thrive, and cannot lay down arms and welcome oblivion when threatened. Y’shtola answers that if living is a right, then that right belongs to all peoples, men and beastmen alike. Merlwyb concedes the reasoning, yet says that when a storm gathers it falls to her to see her people safely through it; that is her duty. Yugiri adds that man has always put himself first, dressing his actions in the armor of righteousness, and that perhaps the Garleans and the Domans are not so different in this. Merlwyb ends with a bleak truth: Eorzea has become a raging sea, and to keep their heads above the waves, they cannot scruple to drown the man next to them—when hopes of coexistence founder, strength must decide who has the greater right to live.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="when-yugiri-met-the-fraternity.html">When Yugiri Met the Fraternity</a></div></div>`

  JP:{
    langLabel:'日本語',
    pageTitle:'決戦、リムサ・ロミンサ沖',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたがモラビー造船廠に着くと、ウォーレイターは完成していた。だがメルウィブは、その完成が代償の上に成り立っていることを隠さない。まだ使えるガレオン船を二隻も廃艦にしたのだ。艦長たちは当然反発したが、メルウィブが「船を残したいなら、代わりにリヴァイアサンと戦え」と選択肢を突きつけると、不満はあっさり引っ込められ、「大義のための犠牲だ」と都合のいい言葉にすり替わった。ミンフィリアは、もっと前に知識を備えられたならとため息をつきつつも、あなたがこれまで不利を覆し続けてきた事実に支えられ、今回も必ずや成し遂げると信じる。サンクレッドは、限られた資材で短期間に双胴船を完成させたナルディク＆ヴィメリー社に感嘆し、ヤ・シュトラは、ウォーレイターを曳航してあなたをリヴァイアサンのもとへ送り届けるだけでも、並外れた操舵が必要で、それ自体が戦いになると言う。ユウギリもまた、最初は疑っていたが、完成した今ならこの解決策の妙を理解できると認める。</p><p>エインザル大甲将は、あなたの目を見てうなずく。準備はできている、と。突貫工事ゆえ見栄えはしないが、性能は保証する。船には「属性変換器」と呼ばれる装置が搭載されており、積み込まれた汚染クリスタルの力を用いて、リヴァイアサンの水への支配を奪うはずだ――うまく働きさえすれば。そして戦況次第では、あなた自身が装置を手動で作動させる必要があるかもしれない、と念を押す。</p><p>ミンフィリアは、サハギンとその眷属がリヴァイアサンを守ろうと押し寄せると見込み、黒渦団は再び陽動を用いると言う。サンクレッドとヤ・シュトラに支援を命じ、ユウギリも「陽動部隊は数が要る」として自ら志願する。メルウィブは歓迎し、サプサでの戦いを見れば、魚人どもはユウギリの存在に十分気を取られるだろうと述べる。そして最後にあなたへ言葉を向ける。神殺しを競技にしてきた者に、彼女が贈れる言葉は多くない。だからこそ、用心せよ、とだけ告げる。海は情け容赦ない戦場だ。航海神が嵐の中であなたを導くように――光の戦士よ。ミンフィリアも同じ思いを繰り返し、皆があなたを信じていると伝え、クリスタルの加護を祈る。</p><p>甲板では、黒渦団甲曹スティルンローナが報告する。ウォーレイターは積載を終え、出航の準備は万全だ。あなたが乗り込んだ瞬間、曳航船に抜錨の合図を送るという。ここにいる誰一人として、あなたを標的へ届けるためなら命を惜しまない――だからあなたは、あの巨大な海蛇を貫くことだけに集中し、他は任せろ、と。戦いが終わると、彼女は遠目に見た光景を信じきれない。あなたはリヴァイアサンの領域で勝ち、巨体が波間へ沈むのを見たのだ。メルウィブは艦隊とともにリムサ・ロミンサへ戻ったため、あなたは早急に提督室へ向かい、今日の一部始終を語ることになる。</p><p>提督室では、エインザル大甲将が計画どおりにいかなかった点もあったと認める。リヴァイアサンは衝角の機会すら与えなかった。だが勝ち方にこだわるな、と笑い飛ばす。リムサ・ロミンサが無事で、あなたが溺れ死んでいないのなら、それで上々だ。ミンフィリアは祝福の言葉が繰り返しになることを恐れ、ただ「無事でよかった」と告げる。サンクレッドは戦績がまた一つ増えたと茶化し、もし自分が神なら召喚されるのが怖いだろうと言う。ヤ・シュトラは祝意を示し、この勝利がサハギンをしばし黙らせると見立てる。ユウギリは、あのような存在が倒せること自体が信じ難いとし、あなたの力と覚悟の源を問う。</p><p>メルウィブは、リムサっ子は「海がすべてを呑み込むまで」抗うと誓っていると言う。リヴァイアサンが勝っていれば、海はすべてを呑み込んでいただろう。それでも今なお抗えているのは、あなたのおかげだ。あなたは蛮神の怒りからリムサ・ロミンサを幾度も救ってきた。これほど頼もしい同盟者はいない。民を代表して深く礼を述べ、さらに「霧髭」にも礼を言うべきだと続ける。何者であれ、工夫と才覚のある男だった――自分の配下に欲しかった、と。ユウギリは、エオルゼアの民がこれほど強大な敵と相対しているとは知らず、存在そのものが衝撃であり、倒せるという事実はなおさら衝撃だったと言う。この経験が世界の広さと人の可能性を思い出させた。難民にすぎない身ではあるが、あなたの戦いで役に立ちたい。東方の第一級の武術を修めており、学びたい者がいれば喜んで教えると申し出る。メルウィブは、その知識と技は必ず役に立つと言い、サンクレッドはリムサ・ロミンサには密かな結社があり、ユウギリに近い戦い方を学んでいる者がいると明かし、彼らなら適応できるだろうと述べる。</p><p>空気を壊さぬよう、ヤ・シュトラは密かにメルウィブへ言う。歴史は繰り返される。かつてのコボルドと同じく、サハギンも領土争いの果てに神を呼び、自己保存のために動いた。メルウィブは、人が蛮神の存在に責任を負う部分があることも、サハギンの動機も理解していると言う。生き残るため、繁殖の地を求めた――自己保存だ。だが自分たちにも生き、繁栄する権利がある。脅かされたとき、武器を捨てて滅びを迎えろというのか。否。ヤ・シュトラは、生きる権利があるのなら、その権利はすべての民に等しくある、と返す。ユウギリは、人は常に己を最優先し、正しさを装って行いを正当化してきたと語り、帝国とドマも本質は違わないのかもしれないと言う。メルウィブは最後に断じる。エオルゼアは荒れ狂う海になった。波間に頭を出し続けるには、隣の者を沈めることすらためらえない。共存の希望が座礁するなら、強さが「生きる権利」を決めるのだ。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> エインザル大甲将 <small class="muted">（低地ラノシア, X:24.5, Y:33.1）</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="when-yugiri-met-the-fraternity.html">海都の地下組織</a></div></div>`

    story:`<div class="clamp" data-collapsed="true"><p>在 Moraby Drydocks，Whorleater 終於完工。Merlwyb 沒有把這件事說得像奇蹟，她直接點出代價：為了造出這艘雙胴船，她不得不讓兩艘仍堪用的大帆船退役。艦長們本來氣得跳腳，直到她冷冷丟出一個選擇——既然捨不得船，那就把船留下，換他們替你們去面對 Leviathan。那些抱怨立刻收聲，轉而用「為更大的利益做出犧牲」來替自己找台階下。Minfilia 只能嘆息：若能在一開始就以更多知識武裝自己就好了，但如今已無法回頭；她仍堅信你曾在更惡劣的勝算中一次次勝出，這次也一定會。Thancred 由衷佩服 Naldiq & Vymelli’s 在材料有限、時間緊迫下仍能完成這艘船；Y’shtola 則提醒你，光是把 Whorleater 拖到 Leviathan 面前、把你安全送到戰場，都需要極高的操船技術，甚至可能本身就是一場硬仗。Yugiri 也坦承自己起初懷疑過這個方案，直到此刻看見成品，才真正理解它的精妙。</p><p>Eynzahr Slafyrsyn 看得出你已經準備好了。他說 Whorleater 雖是趕工完成，也許不美觀，但絕對有能力上場。船上加裝了 Naldiq & Vymelli’s 所稱的 elemental converter（Naldiq & Vymelli’s 製作並裝載於 Whorleater 的裝置；以船上「受污染的水晶」為動力，目的是削弱 Leviathan 對水元素的掌控，必要時可能需要手動啟動）；若它能如預期運作，就能借助船上受污染的水晶的力量，削弱 Leviathan 對水的掌控。他特別提醒你：戰況若逼到某一步，你可能得親手啟動裝置，務必把這件事牢牢記在心裡。</p><p>Minfilia 預料 Sahagin 與其爪牙一定會衝來護衛 Leviathan，因此 Maelstrom 會再次採取牽制與佯攻，為你爭取接敵的空間。她請 Thancred 與 Y’shtola 支援這項行動；Yugiri 也主動請戰，表示牽制部隊若要達成目的就不能人數不足，她願意出力。Merlwyb 乾脆接受，並說在 Sapsa 見過 Yugiri 出手後，她很確定那些「魚背」一定會被她的存在分心得徹底。她隨即完成調度：Thancred 與 Y’shtola 編入第三徵募隊，Lady Yugiri 編入第五徵募隊。隨後她把話對準你——面對一個把討伐諸神都當成家常便飯的人，她能給的不是華麗的讚辭，而是一句最務實的提醒：海上交戰無情而殘酷，務必步步謹慎。願 the Navigator（航海神） 引導你穿過風暴，Warrior of Light。Minfilia 也跟著說，她與眾人都對你懷抱最深的信任，願 the Crystal（母水晶） 守護你平安歸來。</p><p>出航前，Storm Sergeant Styrnlona 上前報告：Whorleater 已裝載完畢、隨時待命；只要你一上船，她就會發出信號，讓拖船立刻起錨。她直白地說，船上沒有任何一個人不願意為了確保你抵達目標而付出性命——所以你只要專心一件事：把那條巨大的海蛇刺穿，其餘一切交給他們。當你從戰場歸來，她仍像在夢裡一樣震撼，說自己遠遠目睹你在 Leviathan 的領域裡取勝，看見那頭巨獸沉入浪下、再也沒有動靜，卻仍難以相信。Merlwyb 原本想在你上岸的第一時間向你致謝，但她選擇陪同艦隊返航回 Limsa Lominsa；你得盡快到指揮室報到，因為她迫切想聽你親口講述今天的經過。Minfilia 透過 linkpearl（聯絡用的魔導通訊器） 傳來消息：雙胴船已完成，一切都在等你就位。</p><p>回到指揮室，Eynzahr Slafyrsyn 先坦承「並非每件事都照計畫發展」——Leviathan 甚至不讓你們得到衝撞他的機會——但他不願為勝利方式爭執；只要 Limsa Lominsa 安全、你們也還沒被海水吞沒，那就是好日子。Minfilia 壓下可能顯得重複的道賀，只說她很高興你平安回來。Thancred 笑說你又在腰帶上刻下新的一道勝績，還打趣若他是神，想到可能被召喚出來面對你都會發抖。Y’shtola 向你道賀，並指出這次勝利至少能讓 Sahagin 暫時安分一段時間。Yugiri 仍帶著難以消散的震撼，問你究竟從何而來的力量與信念，才能把那種存在擊倒。</p><p>Merlwyb 以 Lominsan 的誓言回應：你們誓言要奮鬥「直到大海吞噬一切」，而若 Leviathan 得逞，大海確實會把一切吞沒；如今 Limsa Lominsa 仍能站在浪頭之上，很大一部分要歸功於你。這不是第一次，你再度把這座城市從 primal 的怒火中救回來；她說 Limsa Lominsa 從未有過比你更堅實的盟友，並代表人民向你致上最深的謝意。她接著補上一句，也該感謝 old Mistbeard（傳說中的 pirate king「Mistbeard」的稱呼；此處的 old 是說話者帶有熟稔/帶點調侃的語氣，用來指那位以「把兩艘船並排綁在一起承載巨量戰利品」事蹟聞名的傳奇人物）——無論他過去是什麼人，至少那份機靈與手段，確實救了大家。</p><p>Yugiri 接著說，在踏上 Eorzea 之前，她完全不知道這裡的人們竟長年與如此強大的敵人周旋；它們的存在已令人震驚，而更震驚的是——它們竟然真的能被擊倒。這段經歷提醒她世界的廣闊，也提醒她人類可能性的無邊無際。即便她只是來到此地尋求安身的難民，她仍希望能在你的戰鬥中派上用場：她受過遠東最頂尖之一的武術訓練，也許在 Eorzea 的眼中顯得離奇，但若有人願意學，她很樂意帶領入門。Merlwyb 表示一定會讓學習者心懷感激，也相信這份知識與技術能成為助力；她甚至回頭問 Thancred 這是否真那麼「離奇」。Thancred 只能承認提督的眼光太敏銳，並透露 Limsa Lominsa 其實有一個隱秘的結社，成員也受訓於與 Yugiri 相近的戰鬥方式；以他判斷，那些人並非不能把她展現的技巧融入自身。Yugiri 聽了感到欣慰，說她也察覺招式之間有相通之處，只是 Thancred 早期的戰法似乎不同；Thancred 乾笑帶過，Y’shtola 便揶揄他曾與此地的犯罪圈子往來甚深，Minfilia 也補充若不是偶然結識 Alphinaud 的祖父，他或許不會離開 Limsa Lominsa、不會去 Sharlayan 受教育，更不會在 Ul’dah 任職並接受刀劍訓練。Thancred 只能連聲要她們別再說。</p><p>氣氛稍緩後，Merlwyb 對 Yugiri 說起更長遠的事。她聽說 Yugiri 一行人來到 Eorzea 是為了尋找永久安置之地，許多 Doman 也已在 Revenant’s Toll 成為邊境勞工；但 Mor Dhona 再怎麼說都不是避難地。她坦言自己很希望能讓 Yugiri 的人民在 Lominsan 的土地上擁有新家，可如今國內動盪，Limsa Lominsa 還沒有能力接納他們。即便如此，她也不願被說成對他們的苦難視而不見——在能做得更多之前，她承諾會送去物資援助。Yugiri 感謝她，並說若提督允許，她願意立刻開始把自己的武藝傳授給 Limsa Lominsa 的人們，至少先以此作為回報。</p><p>之後，為了不破壞慶祝的氣氛，Y’shtola 私下對 Merlwyb 說：歷史正在重演——就像過去的 kobolds 一樣，Sahagin 也是因領土爭端而召喚他們的神，出發點是自我保存。Merlwyb 表示她並不否認：人類確實也要為 primal 的存在負一部分責任，她也明白 Sahagin 的動機——他們想要能繁衍、生存的地方，正如所言是自我保存。但她同樣堅持：她的人民也有生存與繁榮的權利；若你們的生存被威脅，難道要放下武器、迎接毀滅嗎？她拒絕。Y’shtola 回應：若「生存」是一種權利，那這權利就屬於所有族群，不論是人類或獸人族。Yugiri 接著把話說得更冷：人類向來把自己放在最前面，為了替自己的選擇辯護，就披上一身自以為是的「正義」外衣；在這點上，Garleans 與 Doman 或許也沒有那麼不同。Merlwyb 最後用近乎殘酷的語氣下結論：Eorzea 已像一片暴怒的大海；若要在浪頭上活下來，你們甚至不能顧忌把身旁的人推進水裡。當共存的希望觸礁，最後只能由力量決定，誰更有資格活下去。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 愛因扎爾 <small class="muted"> 拉諾西亞低地（X:24.5, Y:33.1)</small></div></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
