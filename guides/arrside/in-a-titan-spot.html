  EN:{

    story:`<div class="clamp" data-collapsed="true">
      <p>Y’shtola acknowledges that both Ifrit and Garuda have fallen by your hand, and that you have more than earned a moment of rest. Yet she cannot offer you that mercy. Titan has returned as well, and like the other primals, he is stronger than he was before.</p>
      <p>Her investigation had suggested that the kobolds were nowhere near ready to resume their summoning rites. The evidence seemed clear, but that certainty proved false. The kobolds had deceived her, and she now recognizes that she should have known better.</p>
      <p>Their underground domain runs deep, giving them countless hidden places to store crystals without anyone on the surface noticing. Whatever they had gathered, it must have been an immense hoard. Until now, Garuda had been the strongest of the three recently active primals, but the latest readings show that Titan has surpassed her.</p>
      <p>Y’shtola explains that a primal’s strength depends on two things: the crystals it consumes and the fervor of those who believe in it. She would prefer to measure precisely how powerful the Lord of Crags has become, but there is no longer time for such caution. The Maelstrom has already sent an official request for aid, and as expected, it is addressed to you.</p>
      <p>Your previous path to Titan’s domain relied on the aetheryte first discovered by the Company of Heroes, but that route no longer responds. Fortunately, the Maelstrom has found another way in, and Y’shtola directs you to speak with Commander R’ashaht Rhiki at Maelstrom Command. Before you leave, she warns you again that Titan has become terrifyingly strong, and urges you to make every possible preparation.</p>
      <p>At Maelstrom Command, R’ashaht Rhiki welcomes your arrival, though she regrets that they must ask you once more to bring Titan down. The Lord of Crags has returned more ferocious and formidable than before, and though the Maelstrom does not yet know how the kobolds gathered such vast stores of crystals so quickly, there will be time to seek that answer later. For now, Titan must be defeated before he and the kobolds can bring destruction upon Limsa Lominsa. A newly discovered aetheryte deep within U’Ghamaro Mines will lead you to the Navel, but reaching it will require you to cut your way through hostile territory. With Titan’s very presence emboldening the kobolds, R’ashaht Rhiki asks you to make all haste, praying that the Navigator guide you on your way.</p>

    langLabel:'日本語',
    pageTitle:'真なる岩神タイタン',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示',
    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ヤ・シュトラは、イフリートとガルーダがいずれもあなたの手によって討たれたことを認め、あなたには休息を得る資格が十分にあると告げます。けれど、今はその時間を与えることができません。タイタンもまた再び姿を現し、ほかの蛮神たちと同じく、以前よりも強大な力を得ているのです。</p>
      <p>彼女が調査を進めた時点では、コボルド族が召喚儀式を再開できる状態にはほど遠いように見えていました。すべての兆候がそう示していたにもかかわらず、それは誤りでした。コボルド族は彼女たちを欺いており、ヤ・シュトラは自分がもっと用心すべきだったと悔やみます。</p>
      <p>コボルド族の地下領域は深く広がっており、地上の者に気づかれないままクリスタルを蓄えることは容易です。そして、その蓄えは膨大なものだったに違いありません。これまで、最近活動を再開した三柱の蛮神の中ではガルーダが最も強大と見られていましたが、最新の測定ではタイタンがその座を奪ったことが示されています。</p>
      <p>ヤ・シュトラは、蛮神の力が二つの要素によって決まると説明します。ひとつは喰らったクリスタルの量、もうひとつは信徒たちの信仰の熱です。本来なら、岩神タイタンがどれほどの力を得たのかを正確に測定したいところですが、もはやその慎重さに費やす時間は残されていません。すでに黒渦団から正式な救援要請が届いており、その宛先は予想どおり、あなたでした。</p>
      <p>かつてタイタンの領域へ向かったとき、あなたは英雄の一行が発見したエーテライトを通りましたが、そのエーテライトは今や反応しなくなっています。けれど望みが失われたわけではありません。黒渦団が別の経路となるエーテライトを発見しており、詳細は黒渦団司令部のル・アシャ大甲佐から聞くよう、ヤ・シュトラはあなたに告げます。出発を前に、彼女はタイタンが恐るべき強さを得ていることを改めて強調し、万全の準備を怠らないよう促します。</p>
      <p>黒渦団司令部で、ル・アシャ大甲佐はあなたの到着を歓迎します。しかし、再びタイタン討伐をあなたに頼らねばならないことを、彼女は悔しく思っていました。岩神タイタンは以前よりも凶暴で、さらに手ごわい存在として戻ってきたのです。コボルド族がこれほど短期間に大量のクリスタルをどう集めたのか、黒渦団にはまだわかっていませんが、その答えを探るのは後のことです。今はまず、タイタンとコボルド族がリムサ・ロミンサに災厄をもたらす前に、あなたが蛮神を討たねばなりません。新たに発見されたエーテライトはウ・ガマロ武装鉱山の奥深くにあり、そこからタイタンの領域である真タイタン討滅戦へ向かうことができます。ただし、そこへ至るには敵地を切り開いて進む必要があります。タイタンの存在そのものがコボルド族を勢いづかせている以上、彼らが大軍を動かすのも時間の問題です。ル・アシャ大甲佐は、航海神の導きがあなたにあらんことを祈りつつ、急ぎ向かうよう頼みます。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ヤ・シュトラ　砂の家 <small class="muted">(X:6.1, Y:5.1)</small></div>

    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="in-for-garuda-awakening.html">真なる嵐神ガルーダ</a></div>
      <div class="row" style="display:flex;gap:12px;flex-wrap:wrap;align-items:center"><b>討伐戦開放</b><a class="link" href="../trial/the-navel-hard.html">真タイタン討滅戦</a></div>
      <div class="row">いずれかのクラス・ジョブ <small class="muted">Lv 50～</small></div>
      <div><b>以下をコンプリートしていること：</b></div>
      <div class="row"><a class="link" href="../trial/the-howling-eye-hard.html">真ガルーダ討滅戦</a></div>

    followq:`<div class="stack">
      <div class="row"><a class="link" href="../raid/primal-awakening.html">新たな蛮神</a></div>
      <div class="row"><a class="link" href="primal-nature.html">蛮神の極まりし力</a></div>
    </div>`

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'土神泰坦重現世間',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Y’shtola 知道 Ifrit 與 Garuda 都已倒在你手中，也明白你早已值得好好休息。可是她無法給你這份餘裕。Titan 也已經再次回歸，並且和其他 primal 一樣，比過去更加強大。</p>
      <p>她先前調查時，所有跡象都顯示 kobolds 距離重新舉行召喚儀式還差得很遠。那些判斷看似可靠，結果卻證明全是錯覺。kobolds 欺騙了她，而她也承認，自己本該更早察覺。</p>
      <p>kobolds 的地下領域極為深邃，他們完全可以在地底囤積水晶，而不讓地上的人發現。這次他們累積的水晶數量必定相當龐大。直到不久前，最近再度活躍的三位 primal 中，Garuda 仍被視為最強大的一位；但最新測定顯示，Titan 已經取代了她的位置。</p>
      <p>Y’shtola 說明，primal 的力量取決於兩個因素：吞噬的水晶數量，以及信徒信仰的狂熱程度。她本想精確測量 Lord of Crags 究竟變得多強，但現在已經沒有時間採取那樣謹慎的做法。Maelstrom 已經正式發出求援請求，而正如預料，那份請求是指名給你的。</p>
      <p>你上一次前往 Titan 的領域時，是透過 Company of Heroes （曾在第七星曆前討伐過 Titan 的傳奇傭兵團，成員來自各地冒險者與戰士；後來在主線中協助你取得進入 Titan 領域的線索與考驗資格）最初發現的乙太之光，但那條路如今似乎已不再回應。幸好 Maelstrom 已經找到新的入口。Y’shtola 要你前往 Maelstrom Command，向 R’ashaht Rhiki 詢問詳細情況。臨行前，她再次強調 Titan 已經變得極其可怕，要你務必做好萬全準備。</p>
      <p>在 Maelstrom Command，R’ashaht Rhiki 歡迎你的到來，卻也對他們必須再次請你討伐 Titan 感到遺憾。Lord of Crags 回歸後比過去更加凶暴，也更加難以對付。Maelstrom 仍不明白 kobolds 如何在這麼短的時間內取得如此龐大的水晶儲備，但那個答案只能之後再追查。眼下最重要的是，在 Titan 與 kobolds 對 Limsa Lominsa 造成災害之前，由你先將 Titan 擊敗。他們已經發現一座新的乙太之光，可以帶你前往 Navel；它位於 U’Ghamaro Mines 深處，位置雖然不方便，你仍必須一路突破敵人的阻攔。Titan 的存在本身正在鼓舞 kobolds，等他們大舉進攻只是時間問題。R’ashaht Rhiki 請你盡快動身，並祈願 Navigator （航海神 Llymlaen 的稱號；祂是 Limsa Lominsa 崇敬的十二神之一，掌管航海、風與海洋，因此 Maelstrom 相關角色常以祂的名義祝福或祈願） 指引你的道路。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
