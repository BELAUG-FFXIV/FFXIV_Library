    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}

const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'My Feisty Little Chocobo',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more',
    readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Docette catches the unmistakable scent of chocobo on you and immediately guesses that you have a trusty steed of your own. Once that much is clear, she asks whether your bird has been trained for battle. If not, she suggests that you seek out Luquelot at Bentbranch Meadows, describing him as an Ishgardian native with exceptional knowledge of chocobos and a talent for helping adventurers deepen their bond with their feathered companions.</p>
      <p>When you meet Luquelot, he understands your request at once, but treats it with due seriousness. Riding a chocobo is one thing, he explains, but asking it to suffer wounds in your name is another matter entirely. He agrees to help train your bird only after you promise never to expose it to needless danger. With that trust established, he sends you to gather a bunch of gysahl greens from the nearby fields, the first step in teaching your chocobo to stand beside you in battle.</p>
      <p>Once you return with the greens, Luquelot begins the lesson. Chocobos, he explains, are exceedingly fond of gysahl greens—so fond, in fact, that the taste can help them forget their fear even in the face of danger. By feeding your bird the greens, you can encourage it to fight at your side. From that moment on, it will be your responsibility to direct its actions with care, giving commands that your companion will follow to the best of its ability.</p>
      <p>Luquelot then explains that this simple but effective method of giving general orders to a chocobo was developed by the Fortemps family, one of Ishgard’s foremost houses. Yet he also reminds you that hearing about a practice is not enough. You must experience it yourself. He instructs you to summon your chocobo with gysahl greens and travel together to Sorrel Haven, where the brood ziz roaming the area should provide a suitable challenge. After facing three of them alongside your companion, you return to Luquelot with the first proof of your shared readiness.</p>
      <p>Luquelot praises you for safely completing those first battles with your chocobo, then asks how it felt to fight beside such a reassuring companion. Your chocobo, he says, can cover your weaknesses or strengthen what you already do well, and through experience you will discover the way the two of you best complement one another. Before you leave, he gives you one final gift: a saddlebag for your chocobo, so that carrying gysahl greens and other belongings will no longer weigh so heavily on your travels. With that, your bond with your chocobo grows beyond riding alone, becoming a partnership forged for the road and the battlefield alike.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    </div>`,

    </div>`

  JP:{
    langLabel:'日本語',
    pageTitle:'頼れる相棒',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示',
    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ドセットは、あなたに染みついたチョコボの匂いにすぐ気づき、頼もしい相棒をすでに得ているのだろうと見抜く。そして、そのチョコボが戦いの訓練を受けているかどうかをたずねた。まだであるなら、ベントブランチ牧場にいるルクロを訪ねるとよいという。イシュガルド出身の彼は、チョコボに関するあらゆることに優れた才を持ち、羽ある友との絆をさらに深める手助けをしてくれるはずだった。</p>
      <p>ルクロに会うと、彼はあなたの願いをすぐに理解するが、その重みを軽く扱うことはなかった。チョコボに乗ることと、自分のために傷を負わせながら戦わせることはまったく別のことだと、彼は静かに告げる。必要以上の危険にさらさないと約束するならば、訓練に力を貸そう。そうして信頼が結ばれると、彼はまず近くの畑からギサールの野菜をひと束摘んでくるよう命じた。それが、あなたのチョコボを戦場で並び立つ相棒へ導く最初の一歩だった。</p>
      <p>ギサールの野菜を持ち帰ると、ルクロはさっそく教えを始める。チョコボはギサールの野菜を何より好み、その香りと味を前にすれば、危険を前にした恐れさえ忘れてしまうほどだという。だからこそ、その野菜を与えることで、チョコボにあなたのそばで戦うよう促すことができる。そして呼び出したあとは、あなたがその行動をよく見極め、必要な命令を与えなければならない。相棒はあなたの指示に応え、自分にできる限りの働きをしてくれるのだ。</p>
      <p>さらにルクロは、チョコボがいくつかの基本的な命令に自然と反応することを教える。この簡潔で効果的な方法は、イシュガルドの名門のひとつであるフォルタン家によって築かれたものだった。だが、話を聞くだけでは本当の身にはならない。実際に外へ出て、自分の手で試してこそ意味がある。そこで彼は、ギサールの野菜でチョコボを呼び出し、ともにソルレルヘヴンへ向かうよう命じる。周辺をうろつくジズは、あなたと相棒が力を合わせる最初の相手としてふさわしい。三体を退けたあなたは、チョコボとともに戦えることを示して戻ってくる。</p>
      <p>ルクロは、あなたがチョコボとの初めての戦いを無事に乗り越えたことを認め、羽ある相棒と戦う心強さを感じたのではないかと問いかける。チョコボはあなたの弱点を補うことも、強みをさらに伸ばすこともできる。ふたりで経験を重ねるうちに、互いをどう支え合うのが最もよいか、自然と見えてくるはずだった。別れ際、彼は最後の贈り物としてチョコボかばんを託す。ギサールの野菜を持ち歩く負担も軽くなり、必要なら私物も収められるだろうという。こうして、あなたとチョコボの絆は、ただの騎乗を越えて、旅路と戦場をともにする相棒としてのかたちを帯びていく。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ドセット　黒衣森：南部森林 <small class="muted">(X:17.0, Y:28.2)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><b>以下のいずれかのコンプリート</b></div>
      <div class="row">念願のマイチョコボ（不滅隊）</div>
      <div class="row"><a class="link" href="my-little-chocobo-maelstrom.html">念願のマイチョコボ（黒渦団）</a></div>
      <div class="row">念願のマイチョコボ（双蛇党）</div>
      <div class="row"><b>入手済み</b> <a class="link" href="../mount/company-chocobo.html">マイチョコボ</a></div>
      <div class="row">いずれかのクラス・ジョブ <small class="muted">Lv 30～</small></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="bird-in-hand.html">マイチョコボ育成の秘訣</a></div>
    </div>`
  },

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'可靠的搭檔',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Docette 從你身上聞見了 unmistakable 的 chocobo 氣味，立刻猜到你已經擁有一匹值得信賴的坐騎。確認之後，她便問起你的 chocobo 是否接受過戰鬥訓練。若還沒有，她建議你去 Bentbranch Meadows 找 Luquelot。那位來自 Ishgard 的人，對這些羽翼夥伴的一切都相當熟悉，也應該能幫助你與自己的 chocobo 建立更深的默契。</p>
      <p>當你見到 Luquelot 時，他很快明白你的來意，卻沒有把這件事看得輕鬆。騎乘 chocobo 是一回事，要牠為了你承受傷害並投入戰鬥，則完全是另一回事。他願意替你的 chocobo 進行訓練，但前提是你必須答應，絕不讓牠承受不必要的危險。當這份承諾成立後，他便請你先到附近的田地採來一束 gysahl greens，作為讓 chocobo 站上戰場、與你並肩作戰的第一步。</p>
      <p>你帶回 gysahl greens 後，Luquelot 便正式開始說明。chocobo 非常喜歡 gysahl greens，甚至喜歡到即使面對危險，也會因為它而暫時忘記恐懼。因此，只要餵食這種蔬菜，就能讓你的 chocobo 願意陪你一同戰鬥。而在牠被喚來之後，接下來就要由你負責判斷情況，並給予適當的指示。你的夥伴會依照那些命令行動，盡自己最大的能力支援你。</p>
      <p>接著，Luquelot 告訴你，chocobo 天生能理解幾種基本命令。這種簡單卻有效的指揮方式，是由 Ishgard 名門之一的 Fortemps 家族所發展而成。不過，他也提醒你，只是聽人說明並不足夠；真正的訓練，必須親自走出去實踐。於是他要你用 gysahl greens 召喚自己的 chocobo，並一起前往 Sorrel Haven。那一帶徘徊的 brood ziz，正好適合作為你與夥伴第一次並肩作戰的考驗。當你們合力擊退三隻之後，你便帶著這份最初的成果回到 Luquelot 面前。</p>
      <p>Luquelot 稱讚你順利完成了與 chocobo 一同作戰的初次試煉，並問你是否感受到，身旁有這樣一位羽翼夥伴時，是多麼令人安心。他說，chocobo 可以彌補你的不足，也能讓你原本的長處更加突出；只要持續嘗試，你們終會找到最適合彼此的配合方式。臨別前，他又送給你最後一份禮物——chocobo saddlebag。這樣一來，攜帶 gysahl greens 不再那麼麻煩，需要時也能收納一些個人物品。至此，你與 chocobo 的關係不再只是單純的騎乘，而是真正開始成為能在旅途與戰場上彼此扶持的夥伴。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 多塞特，黑衣森林南部林區 <small class="muted">(X:17.0, Y:28.2)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><b>必須完成以下任一任務</b></div>
      <div class="row">我的專屬陸行鳥（恆輝隊）</div>

      <div class="row"><b>必須取得</b> <a class="link" href="../mount/company-chocobo.html">專屬陸行鳥</a></div>
      <div class="row">只要任一職業達到 <small class="muted">等級 30 以上</small></div>
    </div>`,
    followq:`<div class="stack">

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);

  s.async = true;
  mount.appendChild(s);
}
