    story:`<div class="clamp" data-collapsed="true">
<p>Nashu immediately latches onto the new helper and chants his name with glee—“Blocky, blocky Brandihild!”—while PuPu admits he forced an already-unstable duplicator to work, and now the result is a clone that falls short not only in appearance, but in personality as well. Delion, still rattled, can’t get over how casually PuPu attempted to replicate a living mind, saying the technology is so far beyond him it might as well be magic. Godbert only laughs—around the Manderville men, there’s never a quiet moment—while Brandihild haltingly asks to be of use.</p>
<p>Hildibrand, delighted, declares Brandihild an unexpected but invaluable addition, ready to throw yourselves back into the fray. Delion pushes back: numbers are fine, but you need a plan. Brandihild steps forward with a sober suggestion—if PuPu’s missing comrade pilots a similar craft, then searching for the starship makes more sense than chasing a tiny figure. A shiny, silver saucer would draw far more attention, and Delion immediately agrees: The Thavnairian Truth receives plenty of reader reports of unidentified flying objects.</p>
<p>Brandihild lays out a method. You review the reports, keep only those that match “shiny, silver, saucer-like,” and then cross off anything you can confirm was PuPu. Delion calls it brilliant, and Hildibrand laughs a little too loudly, claiming he was about to propose the exact same thing. Brandihild, already shrinking back, worries he’s overstepped—he’s only a shadow of the original. Delion says he has back issues stored in his workroom in Radz-at-Han, and suggests PuPu help sift through them.</p>
<p>After the review, Delion returns with a single remaining lead: one other saucer sighting, in Garlemald. The account came from an imperial soldier named Numerious—apparently a loyal fan. That detail impresses even Brandihild, and Delion beams, declaring the desire to know the unknown transcends borders. PuPu adds that the sighting happened during the imperial war of succession, but the report offers little else. Still, it’s the only thread you have, so the group heads for Camp Broken Glass.</p>
<p>In the freezing camp, Delion admits he took a shortcut: he asked contingent officers, learned Numerious is on the roster of allied imperial troops, and found his current posting—organizing the supply dump at Forum Patens. The cold bites into him, but Godbert declares a Manderville man on a mission feels neither heat nor cold, and Delion can only mutter that reality always seems…flexible around the Mandervilles.</p>
<p>At Forum Patens, Delion calls out for Numerious and introduces himself as editor in chief. Numerious is honored but insists he already submitted everything—unless Delion has more to share, since he said he saw the saucer too. Another soldier, a 1st Legion artillerist, steps in and explains: the conflict had escalated into full war, he was stationed on an anti-air cannon, saw a silver vessel, assumed it was a new warmachina, and opened fire—knocking it out of the sky. He never inspected the wreckage; it was wartime, and it might still be out there somewhere.</p>
<p>Delion despairs at the scale of Garlemald’s icy wilderness, but Brandihild calmly asks for numbers: the craft’s approximate speed and bearing, plus the cannon’s position and firing angle. The artillerist can recall enough. Brandihild runs the calculation and states a crash point—about 1,360 yalms to the northeast of your current location, give or take. Delion is stunned; Brandihild answers plainly: elementary algebra. Hildibrand again claims he was about to say the same, and Nashu cheers for Brandihild as he apologizes for stealing his “progenitor’s thunder.”</p>
<p>With the odds improved, you search the snowfield. You find scraps—pots, debris from warmachina, scorched plating—and then PuPu spots an exterior panel he recognizes as belonging to his friend’s ship. Brandihild notes there’s no other wreckage nearby, meaning the vessel may have escaped, or the debris may have been recovered—by PuPu’s comrade or by someone else entirely. Hildibrand quips that this would be a different kind of “alien abduction.”</p>
<p>Then Nashu is suddenly missing. A frantic Excitable Youth appears, begging for help: a man claiming to be an agent of Doctor Lugae took Nashu and delivered a message—if you want her back alive, you must present yourself at the Tower of Babil, specifically the magitek servicing facility. Hildibrand explodes with outrage at his assistant being spirited away under his nose, while Delion squints suspiciously at the youth, who awkwardly insists he was merely passing through as a “snowflake inspector.”</p>
<p>At the Tower of Babil, Suprae-Lugae is waiting—furious that Hildibrand and Godbert showed up instead of you. Godbert refuses to trouble you and declares father and son will handle it themselves, and Hildibrand agrees. The fight erupts: hired thugs rush in, missiles must be destroyed, warmachina must be defeated, and Suprae-Lugae unleashes increasingly dramatic threats—only to be met by Manderville resilience and showmanship. In the end, the Manderville men triumph, and Brandihild arrives after, observing that things appear to be in hand.</p>
<p>Nashu wakes from her “nap” as if nothing happened, blinking at the facility around her. Hildibrand praises Brandihild again—saying the clone has put the original to shame—while Brandihild insists he’s only a pale imitation. Godbert jokes that keeping company with you finally gave him a challenge worthy of breaking a sweat, and Hildibrand proposes returning to Radz-at-Han to regroup and rethink the search. He reassures PuPu that his comrade still lives, and the case continues—now with a saucer fragment as your next clue.</p>
<p>Meanwhile, elsewhere in Thavnair, a darker conversation unfolds: Lugae returns to a mystery man, admits failure, and claims there is a forbidden path to victory—one that demands the manifestation of the divine. The mystery man, intrigued, tells him he has his attention.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>ナシュは新しい仲間を見てすぐに歓声を上げ、「カクカク、カクカク、ブランディヒルド！」と無邪気に連呼する。ププは複製装置が不安定だと分かっていながら無理に稼働させたことを認め、その結果、見た目だけでなく気質まで不完全な複製体が生まれてしまったと悔やむ。デリオンは、生命と意思を持つ存在をいとも簡単に複製しようとした事実に戦慄し、その技術はもはや魔法と区別がつかないと言う。ゴッドベルトは豪快に笑い、ブランディヒルドは途切れ途切れに「助力を」と申し出る。</p>
<p>ヒルディブランドは、予想外だが実に有用な戦力だと歓迎し、再び事件へ飛び込もうとする。だがデリオンは戦略が必要だと釘を刺す。そこでブランディヒルドが提案する――もしププの友が似た構造の船を操っているなら、相手そのものより「星船」を探したほうがいい。銀色に光る円盤状の船は、小さな存在より目撃されやすいはずだ。デリオンも同意し、「トゥルース」には未確認飛行物体の投稿が山ほど届くと言う。</p>
<p>ブランディヒルドは手順を示す。まず「光沢があり、銀色で、円盤状」の報告を抽出し、次にそれがププ本人だった目撃を除外する。そうすれば候補は大幅に絞れる。デリオンは大絶賛し、ヒルディブランドは大げさに笑って「まさに同じ提案をしようとしていた」と張り合う。ブランディヒルドは出過ぎたかと身を縮めるが、デリオンはラザハンの作業部屋にバックナンバーがあると言い、ププにも協力させて照合を進める。</p>
<p>精査の結果、残った目撃はただ一つ――ガレマルドでの円盤目撃だけだった。投稿者は「ヌメリアス」という帝国兵で、「トゥルース」の熱心な読者らしい。ププは目撃時期が帝国の継承戦争のさなかだったと補足するが、詳細は乏しい。それでも唯一の糸口として、一行はキャンプ・ブロークングラスへ向かう。</p>
<p>極寒の地でデリオンは、時間短縮のために部隊士官へ当たったと告げる。ヌメリアスは同盟側の帝国部隊名簿にあり、現在はフォルム・パテンスで補給集積の整理をしているという。寒さに震えるデリオンに対し、ゴッドベルトは使命を帯びたマンダヴィルの男は暑さも寒さも感じないと豪語し、デリオンは「マンダヴィルの周囲では現実が相対的だ」とぼやく。</p>
<p>フォルム・パテンスでデリオンが名乗ると、ヌメリアスは光栄だと喜ぶが、投稿以上に語れることはないと言う。そこへ第一軍団の砲兵が証言する。戦況が全面戦争に拡大した頃、対空砲で監視中に銀色の機体が現れ、新型の兵器だと思って撃墜した。残骸は確認していない――戦場に踏み込む余裕などなかったからだ。残骸は今もどこかにあるだろう、と。</p>
<p>ガレマルドの荒野の広さに絶望しかけるデリオンをよそに、ブランディヒルドは速度と方位、砲の位置と発射角を尋ねる。砲兵が概算を示すと、ブランディヒルドは計算し、墜落地点は「ここから北東へ約千三百六十ヤルム」と断じる。デリオンが驚くと、彼は「初等代数です」と淡々と答える。ヒルディブランドはまたも「同じ結論を言おうとしていた」と笑い、ナシュはブランディヒルドを称える。こうして捜索は、ほぼ絶望から現実的なものへ変わる。</p>
<p>雪原であなたたちは破片を探し、温魔機の残骸や焦げた金属片を確認する。やがてププが外装パネルを見つけ、友の星船のものだと確信する。ブランディヒルドは周囲に他の破片がないことから、船が逃げ延びた可能性、あるいは残骸が回収された可能性を挙げる。ヒルディブランドは、それは別種の「宇宙人による誘拐」かもしれないと冗談めかす。</p>
<p>だがその直後、ナシュがいないことに気づく。取り乱した青年が現れ、「ルゲー博士の使い」を名乗る男にナシュが連れ去られたと叫ぶ。「生きて返してほしければ、バブイルの塔の魔導整備施設に来い。特にその場所を忘れるな」と伝言されたという。ヒルディブランドは憤激し、デリオンは青年の正体を怪しむが、青年は苦しい言い訳で「雪片の点検をしていただけ」と言い張る。</p>
<p>バブイルの塔ではスプラエ＝ルゲーが待ち構え、本来はあなたを呼んだのに父子が来たことに苛立つ。だがゴッドベルトはあなたの手を煩わせる必要はないと言い、ヒルディブランドも同意する。雇われの荒くれ者、ミサイル、温魔機、そしてスプラエ＝ルゲー本人――次々と襲い来る脅威を、マンダヴィル父子は笑いと勢いでねじ伏せ、ついに勝利を収める。ブランディヒルドは後から現れ、状況は収束したようだと告げる。</p>
<p>ナシュは眠りから覚めたばかりの顔で無事を示し、ヒルディブランドはまたもブランディヒルドを褒め、本人は「理想の影にすぎない」と控えめに言う。ヒルディブランドはラザハンへ戻って態勢を立て直すことを提案し、ププには友が生きていると励ます。こうして事件は続く――手に入れた円盤の破片を、新たな手掛かりとして。</p>
<p>その頃、トラヴナイアのどこかで、ルゲーは謎の男に失敗を詫び、「勝利への禁じ手」、すなわち「神の顕現」を要する道があると囁く。謎の男は興味を示し、「続きを聞こう」と告げる。</p>
</div>

    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
<p>Nashu 看著新加入的「偵探」興奮到不行，直接喊起來：「方方的、方方的 Brandihild！」PuPu 則懊惱地承認，自己明知道複製裝置狀況不穩，卻還是硬逼它運作，結果造出來的不只是外型不像，連性格都不像。Delion 仍舊被外星技術震住——能這麼輕易嘗試複製一個有思想、有意志的生命，先進到他幾乎分不出到底是科技還是魔法。Godbert 只覺得好笑，說跟 Manderville 家的人走在一起從來不會無聊；Brandihild 則一字一頓地請求出力，想要「讓我協助」。</p>
<p>Hildibrand 把 Brandihild 視為意外卻珍貴的戰力，說人手既然補上了，就能再度投入戰局。Delion 卻提醒：人多不代表有方法，你們需要新的策略。Brandihild 便提出更務實的方向——如果 PuPu 的同伴駕駛的船和 PuPu 的星際船同型，那與其到處追一個小小的「目標」，不如改找那艘星際船。銀亮、圓盤狀的飛行器遠比那個小個子更容易引人注目。Delion 立刻接話，說 The Thavnairian Truth 的讀者來信裡，未確認飛行物體的目擊多得是。</p>
<p>Brandihild 進一步把方法講得很清楚：把所有符合「閃亮、銀色、像飛碟」的通報挑出來，再把確定是 PuPu 本人的目擊逐一剔除，剩下的就會縮到非常小的範圍。Delion 讚嘆這主意太好了；Hildibrand 又用那種刻意的笑聲宣稱自己正要提出同樣建議。Brandihild 立刻退一步，像怕自己越界，說自己畢竟只是原版的影子。Delion 則表示他在 Radz-at-Han 的工作室存了厚厚一疊舊刊，讓 PuPu 跟他一起翻找、一起排除。</p>
<p>結果出來後，Delion 帶回唯一剩下的線索：排除 PuPu 走過的地點後，還有一個「飛碟」目擊——在 Garlemald。那封投稿來自一名帝國士兵 Numerious，還是 The Thavnairian Truth 的忠實讀者。Brandihild 聽到連帝國都有讀者都覺得驚訝；Delion 則得意地說，追尋未知的渴望跨越一切疆界。PuPu 補充那次目擊發生在帝國的繼承戰爭期間，但內容沒有更多細節。即便如此，這仍是你們唯一能追的線，於是隊伍動身前往 Camp Broken Glass。</p>
<p>冰冷刺骨的營地裡，Delion 說他先去問了部隊軍官，才知道 Numerious 在同盟帝國部隊名冊上，現在正帶著小隊在 Forum Patens 整理補給集散地。Delion 抱怨寒氣鑽進骨頭；Godbert 卻豪邁宣稱，有任務在身的 Manderville 男人既不怕熱也不怕冷。Delion 只能苦笑，說在 Manderville 一家旁邊，「現實」總是很難用常理解釋。</p>
<p>到了 Forum Patens，Delion 自報是 The Thavnairian Truth 的主編來追問目擊內容。Numerious 雖然激動，卻說自己知道的都寫在投稿裡了，除非 Delion 也有新的情報——畢竟他不是說自己也看到了嗎？這時一名第一軍團的砲兵接話，說當時戰事升級成全面衝突，他在防空砲位監視敵機，忽然看見一艘銀色飛行器，以為是新型 warmachina，便開火把它打下來。他沒有去看殘骸——那是戰場，沒人會為了好奇冒險；但殘骸應該仍在某處。</p>
<p>Delion 立刻為 Garlemald 首都圈的冰原範圍感到絕望；Brandihild 卻冷靜地追問數字：飛行器的大概速度與方位、砲台位置與射擊角度。砲兵表示自己記得大概值就夠，Brandihild 立刻推算出結果——墜落點大約在你們現在位置的東北方一千三百六十 yalms，上下誤差幾個 yalms。Delion 震驚地問他怎麼算的；Brandihild 只淡淡回答「基礎代數」。Hildibrand 又大笑說自己正要講同樣結論；Nashu 則替 Brandihild 歡呼。至少現在，你們不必在無邊雪原裡亂撞，而是有了具體方向。</p>
<p>你們在雪地裡搜尋，翻到半埋的鍋、像 warmachina 殘骸的黑色碎片、被砲火燒扭的金屬板——看起來都很有希望，又一次次落空。直到 PuPu 找到一塊外裝面板，確信那是朋友星際船的零件，是迫降留下的碎片。Brandihild 觀察附近沒有更多殘片，推測要嘛星際船扛過砲擊後逃走了；要嘛殘骸被回收——可能是 PuPu 的同伴自己回收，也可能是某個你們尚未知曉的勢力先一步帶走。Hildibrand 立刻把情況形容成另一種「外星綁架」：連飛碟一起被拐走。</p>
<p>就在這時，Nashu 不見了。那名緊張兮兮的 Excitable Youth 衝出來求救，說有個自稱 Doctor Lugae 手下的傢伙把 Nashu 帶走了，還要他轉告你：想讓重要的同伴活著回來，你就得親自去 Tower of Babil——而且指定是 magitek 維修設施，叫你別忘記這點。Hildibrand 氣到爆炸，說自己的得力助手竟在眼皮底下被擄走；Delion 則狐疑地問那青年到底是誰。青年急忙扯藉口說自己只是路過雪原，「在做雪花檢查」——講得越來越可疑，但他又拼命催你們快去救人。Godbert 倒是興奮起來，說終於有機會活動筋骨。</p>
<p>在 Tower of Babil 的 magitek 維修設施，Suprae-Lugae 高聲狂笑，卻看到來的是 Hildibrand 和 Godbert 而不是你，立刻暴跳如雷，說他明明點名要「冒險者」。Godbert 當場表示不必勞煩你，這場救援由父子倆——Manderville 的男人——親自解決。戰鬥接連爆發：先是雇傭打手、再是導彈與 warmachina，最後 Suprae-Lugae 親自上陣，威脅一波比一波誇張，卻仍被 Manderville 父子用離譜的韌性與節奏一路頂回去。最終，Suprae-Lugae 被擊退，Brandihild 才趕到現場，低聲說看來情況已經控制住。</p>
<p>Nashu 打著呵欠醒來，像只是睡了一覺，還疑惑怎麼自己睡著時有人蓋了個維修設施。Hildibrand 又一次誇 Brandihild，說這回「複製體又讓原版汗顏」；Brandihild 仍然自卑地說自己只是拙劣的仿品。Godbert 則笑說跟著你果然能遇到值得動一動的對手。Hildibrand 提議回 Radz-at-Han 整隊、重整思路，也安慰 PuPu：你的同伴一定還活著，別灰心——案件仍會繼續，而你們手上那片飛碟碎片，會把你們帶向下一步。</p>
<p>同一時間，在 Thavnair 的某處，Lugae 回去見一名神秘人，承認自己收了錢卻失手。可他說只要那個「頑強的麻煩」還活著，計畫就會受阻；他知道一條通往勝利的禁忌之路——必須讓「神」顯現。神秘人聽到這句，語氣一沉，表示他有興趣聽下去。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
