      EN:{

        tabs:{ story:'Story', acq:'Acquisition', event:'Event Period', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
        story:`<div class="story-wrap"><div class="story-content">
<p>The guide at the Starlight Stalls turns you away with an apologetic smile—the market is simply too crowded right now—but promises to show you in once the crush eases. Back at Mih Khetto’s Amphitheatre, Amh Garanjy greets you with a bright “Happy Starlight,” introduces herself as a celebrant, and asks if this is your first time joining the festivities. She explains that the Starlight Celebration, inspired by an old Ishgardian tale, is about granting children’s wishes—and that this year the festive market has returned: the Starlight Stalls.</p>
<p>Amh’s excitement quickly turns practical. Last time, the Carline Canopy provided kinderpunsch for the revelers, and it was so popular that they plan to serve it again—only now, with a new twist. The trouble is, with celebrants busy preparing the stalls, no one has had time to work out what that twist should be. If you’re willing, she asks, could you lend them a hand? When you agree, she has you join her at the Carline Canopy stall at the market, where the details can be explained properly.</p>
<p>Once you’re brought into the Starlight Stalls, Amh thanks you again and says she asked Miounne to help lay out the plan. Miounne arrives with the air of someone who’s seen this kind of “volunteering” before, but she doesn’t question your presence—she praises the work you did distributing punch at the last festival, noting how much the attendees loved it and how well the mugs served their purpose. She reminds you that last year’s kinderpunsch was handed out in mugs bearing a Gridanian design, and adds that the other city-states heard about it and wanted their own homelands represented as well.</p>
<p>Miounne shows you the new set: mugs decorated with local vistas and motifs, like a galleon for Limsa Lominsa and a cactuar for Ul’dah, all dressed up with seasonal flourishes. With three mugs, Amh says, it feels only right to serve three varieties of kinderpunsch. Gridania’s version is already clear—Miounne describes a traditional recipe built from simmered apple juice with blood currants, cinnamon, and herbs—but she’s been stuck deciding what best captures the spirit of Limsa Lominsa and Ul’dah. A young boy, Joultain, bounces in to ask about the new designs and wonders aloud what those other cities are like, and Amh smiles at the curiosity it sparks—then turns back to you with their request: speak with visitors, learn what ingredients would suit each nation, and report what you find.</p>
<p>You seek out those who would know. A Lominsan chef insists that a Lominsan twist must begin with La Noscean citrus—oranges, lowland grapes, and lemons—praised far and wide, made essential by sailors who once relied on it to fend off scurvy. For Ul’dah, you hear two different kinds of certainty: one voice speaks grandly of nopal and spices and the drama of daring cuisine, while an Ul’dahn merchant brings it down to something daily and unmistakable—tea, strong enough to anchor a day, with butter and honey as a rich accent, and Thanalan specialties like vanilla, cloves, black pepper, and pearl ginger if you want the flavor to feel truly Ul’dahn. When you bring these suggestions back, Amh is delighted; the celebrants can procure what’s needed. Then she asks for one more kindness: speak with the children from earlier, learn which city interests each of them most, and help choose which punch will mean the most.</p>
<p>At the stalls, you listen as the children’s wishes spill out in different directions—fruits from faraway places, the comfort of learning about Gridania itself, the thrill of the Coliseum’s imagined battles, and the dream of sailing on a great ship over a real ocean. When the punch is finally ready, you step in to serve, matching cup to curiosity as best you can, watching their faces brighten with spice, apple, citrus, and warmth. By the time the rush settles, the celebrant tells you the little ones truly enjoyed themselves—and that your choices set a fine example for the rest of the distribution.</p>
<p>Back at Mih Khetto’s Amphitheatre, Miounne drops by after handling matters at the guild, and Amh greets her with relief and cheer. With your help, they say, the children weren’t merely given a festive drink—they were given reasons to wonder about the wider world. Joultain hurries up to thank you again, eyes shining as he declares that one day he wants to know the world as you do, to see it for himself and tell everyone what he learns—and to tell everyone about Gridania, too, because the Starlight Stalls reminded him how much he loves it. Amh calls it a wonderful wish, confident the Spinner Herself has heard it, and Miounne promises that when the time comes, she’ll be happy to register him as an adventurer. As the celebration continues, Amh leaves the choice with you: help serve more kinderpunsch, or simply enjoy the festivities—and whenever you like, the guide will be ready to escort you back to the stalls.</p>
</div><button class="expand-btn" data-more="Read more" data-less="Show less">Read more</button></div>`,
        acq:`<div class="stack">

      JP:{
        langLabel:'日本語',
        pageTitle:'2025 星芒祭',
        tabs:{ story:'ストーリー', acq:'入手方法', event:'開催期間', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
        story:`<div class="story-wrap"><div class="story-content">
<p>星芒マーケットの案内人は、いまは人が多すぎると申し訳なさそうに告げ、混雑が落ち着いたら案内すると約束する。やがてミィ・ケット野外音楽堂で、星芒祭の祝祭員アム・ガランジが朗らかに挨拶し、あなたが祭りに参加するのは初めてかと尋ねる。古いイシュガルドの物語に着想を得た星芒祭は、子どもたちの願いを叶えるための祝祭だという。そして今年は、老若男女に喜びを届ける特別な市が戻ってきた――星芒マーケットが開かれるのだと。</p>
<p>だが、胸躍る話の裏には切実な困りごとがあった。前回はカーラインカフェがキンダープンシュを用意し、来場者に振る舞ったところ大好評だったため、今年も提供するつもりだという。ただし今回は「ひと工夫」を加えたい。ところが祝祭員たちは準備で手一杯で、その工夫に手を付けられていない。もし手が空いているなら、力を貸してくれないか――そう頼まれたあなたは引き受け、星芒マーケットのカーラインカフェの出店へ向かう。</p>
<p>星芒マーケットに着くと、アム・ガランジはあらためて礼を言い、計画を説明するためミューヌを呼んだと告げる。やがて現れたミューヌは、あなたが前回の星芒祭でキンダープンシュを配った働きを評価し、来場者に好評だったこと、そしてグリダニア意匠のマグカップが宣伝としても狙いどおりだったことを語る。昨年はそのカップで配ったが、他国の関係者が話を聞きつけ、自国の景色や意匠も入れてほしいと望んだのだという。</p>
<p>用意された新しいマグカップには、リムサ・ロミンサを象徴するガレオンや、ウルダハを思わせるサボテンダーなど、土地の情景とモチーフが季節の飾りとともに描かれている。ならば三つのカップにふさわしく、キンダープンシュも三種類にしよう――そうアム・ガランジは言う。グリダニアの作り方は伝統どおり、林檎の果汁をブラッドカラント、シナモン、各種ハーブとともに煮出す。しかしリムサ・ロミンサ風とウルダハ風に何を取り入れるべきかが決められない。そこへ子どものジュルタンが駆け寄り、見慣れない絵柄に目を輝かせ、遠い街はどんな所だろうと無邪気に問う。好奇心に微笑みつつ、祝祭員たちはあなたに頼む――各都市をよく知る来訪者から話を聞き、ふさわしい材料を探してきてほしい、と。</p>
<p>あなたは助言を求めて歩く。リムサ・ロミンサの工夫なら、ラノシア産の柑橘を惜しみなく使うべきだと料理人は断言する。オレンジ、低地ぶどう、レモン――船乗りが壊血病を防ぐために用いた歴史もあり、リムサの料理には欠かせないのだという。ウルダハについては、ノパルと香辛料を挙げて「冒険のような食」を語る者もいれば、別の商人はまず紅茶だと言い切る。濃い茶は日々の暮らしに根付き、バターや蜂蜜で厚みを持たせ、さらにバニラ、クローブ、黒胡椒、真珠生姜といったザナラーンの特産が香りを支える――そう聞かされたあなたが報告に戻ると、アム・ガランジは喜び、材料の手配は祝祭員に任せてほしいと言う。続けて彼女は、先ほどの子どもたちに話を聞き、どの街に強い関心があるのかを知って、より意味のある一杯を勧めてほしいと頼む。</p>
<p>星芒マーケットであなたは子どもたちの願いに耳を傾ける。異国の果物を味わいたい子もいれば、初めてのグリダニアをもっと知りたい子もいる。コロシアムの闘士に胸を躍らせる子がいて、海のない森の都から、大きな船でどこまでも航海したいと夢見る子もいる。やがてキンダープンシュの用意が整い、あなたはその声に寄り添うように杯を選び、香りと温かさを手渡していく。行き交う笑顔が増えていくのを見届けた祝祭員は、子どもたちが心から楽しんでいたと告げ、あなたの選び方は見事だったと称える。</p>
<p>ミィ・ケット野外音楽堂に戻ると、ギルドの用事を片付けたミューヌが様子を見に来て、アム・ガランジは賑やかに迎える。あなたの助けで、子どもたちは温かな飲み物だけでなく、遠い土地への憧れや学びのきっかけまで受け取ったのだという。ジュルタンはあなたに駆け寄り、いつか自分も世界を知る者になりたい、冒険して見聞きを持ち帰り、皆に語りたいとまっすぐに言う。そしてグリダニアのことも語りたい、ここが大好きだと改めて気づかせてくれたのが星芒マーケットだったのだと。アム・ガランジはそれを素晴らしい願いだと喜び、スピナーご自身もきっと聞き届けたはずだと微笑む。ミューヌは、時が来たら冒険者として登録するのは自分の役目だと約束し、あなたにも同じように武勇と冒険譚を聞かせてほしいと言う。祝祭が続くあいだ、あなたはさらに配膳を手伝ってもいいし、ただ祭りを楽しんでもいい――案内人はいつでも星芒マーケットへ連れていってくれる。</p>
</div><button class="expand-btn" data-more="続きを読む" data-less="折りたたむ">続きを読む</button></div>`,
        acq:`<div class="stack">
          <div class="row"><b>クエスト発行</b> アム・ガランジ　グリダニア：旧市街 <small class="muted">(X:10.2, Y:9.4)</small></div>
        </div>`,

      },
      ZH:{
        langLabel:'繁體中文',
        pageTitle:'2025 星芒祭',
        tabs:{ story:'故事概要', acq:'取得方式', event:'活動期間', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
        story:`<div class="story-wrap"><div class="story-content">
<p>星芒祭市集的導覽員帶著歉意告訴你，眼下攤位人潮實在太擁擠，等參加者少一些再帶你進去會更安全順暢。回到 Mih Khetto’s Amphitheatre，Amh Garanjy 以明亮的「Happy Starlight」向你打招呼，自稱是星芒祭的慶典人員，並好奇你是否第一次參加。她提起，星芒祭源自古老的 Ishgardian 故事：把孩子們的願望放在心上，讓溫暖與喜悅在大人與孩子之間傳遞；而今年，他們要把那個能讓所有人都開心的節慶市集再度帶回來——Starlight Stalls（星芒祭市集）。</p>
<p>然而，熱鬧背後也有棘手的空缺。前一次活動時，Carline Canopy 提供了 kinderpunsch（香料熱果汁）給來訪者，反應好得出乎預料，所以今年也打算再做一次——只是這回想加上一點「新花樣」。偏偏大家都忙著準備市集，這個新花樣遲遲沒能開工。Amh Garanjy 於是拜託你：若你不忙，能否出手相助？你答應後，她要你跟著到市集裡 Carline Canopy 的攤位，到了那裡再把細節說清楚。</p>
<p>你進入 Starlight Stalls，Amh Garanjy 再次向你道謝，並說她請 Miounne 也來一起說明「熱飲計畫」。Miounne 一到場就直白指出你是被「拉來幫忙」的那位，但她很快肯定你先前分送熱飲的成果——不只來場者喜歡，連用來盛裝的杯子也成功達到宣傳效果。她回顧去年：當時他們用印有 Gridania 風格的杯子分送 kinderpunsch。後來其他城邦聽說了這件事，也希望杯面能呈現各自的家鄉，於是才有了這次的新設計。</p>
<p>Miounne 把杯子一一展示給你看：有象徵 Limsa Lominsa 的帆船圖樣，也有讓人一眼想到 Ul’dah 的仙人掌意匠，並加上節慶點綴。既然有三款杯子，Amh Garanjy 認為也該有三種口味的 kinderpunsch 才相稱。Gridania 的配方相對明確——以當地蘋果汁為底，加入 blood currants、肉桂與各式香草慢煮；但要怎麼做出「像 Limsa Lominsa」與「像 Ul’dah」的風味，Miounne 一直拿不定主意。此時小孩 Joultain 湊過來，看到新杯面就驚呼連連，忍不住問起那些城市到底是什麼模樣。Amh Garanjy 看著孩子的好奇心露出笑意，隨即把任務交到你手上：請你去問問來自各地的旅人與行家，找出最能代表每座城邦的食材。</p>
<p>你依著委託四處詢問。談到 Limsa Lominsa 的風味，一位來自海都的廚師毫不猶豫地推薦 La Noscea 的柑橘——橘子、葡萄、檸檬，都是海都料理裡再熟悉不過的味道；他甚至提起，早年航海者靠它們對抗壞血病，因此柑橘在海都飲食中有著特別的位置。至於 Ul’dah，你聽到兩種截然不同的堅定：有位女士說多數人會想到 nopal 與香料，但那樣太小看 Ul’dah 的飲食精神——用餐應該像一場冒險，像 Coliseum 的勝負一樣充滿戲劇性；另一位商人則把答案落在更日常、也更難以否認的地方：紅茶。她說 Ul’dah 人一天離不開濃茶，還聽說 sultana 會在茶裡加上大量奶油與蜂蜜；再配上 Thanalan 的香草與辛香料——香草、丁香、黑胡椒、珍珠薑——就能讓那杯飲品真正「像 Ul’dah」。你把這些建議帶回去，Amh Garanjy 立刻表示材料就交給慶典人員準備，並拜託你再做一件事：去和剛才那群孩子聊聊，知道每個孩子最想了解哪座城市，好讓你能推薦「對他們最有意義」的那一杯。</p>
<p>回到 Starlight Stalls，你聽見孩子們把願望說得坦率又各不相同：有人渴望嚐嚐外地的水果味，有人第一次來 Gridania，只想把眼前的一切好好認識清楚；有人被 Coliseum 的傳聞點燃想像，有人則因為 Gridania 沒有海，而把「乘著大船航向遠方」當成夢想。等到 kinderpunsch 終於煮好，你開始分送熱飲，依著他們的心意替每個人挑選最合適的口味與杯子。有人被香料刺激得熱血上湧，有人因熟悉的蘋果香而放鬆下來，也有人從柑橘的清亮滋味裡，彷彿先嚐到一點海風與遠行的氣息。當人潮稍歇，攤位人員告訴你：孩子們真的很喜歡，你的選擇做得很好，接下來他們會照著你的做法把剩餘的分送完成。</p>
<p>你回到 Mih Khetto’s Amphitheatre，Miounne 剛處理完公會的雜務，特地過來看看進度；Amh Garanjy 一見到她便笑著迎上前，並確認熱飲已如計畫分送給孩子們。兩人都向你致謝，說你的協助不只帶來節慶的溫暖，也讓孩子們的眼界被推得更遠。Joultain 跑到你面前鄭重道謝，說他長大後想成為像你這樣「懂得很多世界事情的人」：親自去看、去走、去體會，然後把故事帶回來講給大家聽；他也想把 Gridania 的好分享出去，因為星芒祭市集讓他再次想起自己有多喜歡這裡。Amh Garanjy 聽完後說這是非常美好的願望，相信 The Spinner 一定也聽見了；Miounne 則表示，等他真的踏出那一步時，她很樂意親手替他辦理成為冒險者的登記。星芒祭還在繼續——你可以再多幫忙分送幾輪熱飲，也可以單純享受接下來的慶典；只要你想，導覽員仍會帶你回到 Starlight Stalls。</p>

        acq:`<div class="stack">
          <div class="row"><b>任務發布</b> 阿姆·加蘭基 <small class="muted"> 格里達尼亞舊街 (X:10.2, Y:9.4)</small></div>
        </div>`,
        event:`<div class="stack"><div class="row">2025年12月17日 – 12月31日</div></div>`,
        unlockq:`<div class="stack"><div class="row">任意職業（等級15）</div></div>`,
        followq:`<div class="stack"><div class="row">已收錄於故事</div></div>`
      }
    };

    const langToggle  = document.getElementById('langToggle');
    const pageTitle   = document.getElementById('pageTitle');
    const tabBtns     = [...document.querySelectorAll('.tab-btn')];
    const panels = {
      story:  document.getElementById('panel-story'),
      acq:    document.getElementById('panel-acq'),
      event:  document.getElementById('panel-event'),
      unlockq:document.getElementById('panel-unlockq'),
      followq:document.getElementById('panel-followq'),
      comments: document.getElementById('panel-comments')
    };

    function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }

    function wireStoryToggler(root){
      const btn = root.querySelector('.expand-btn');
      const content = root.querySelector('.story-content');
      if(!btn || !content) return;
      const more = btn.getAttribute('data-more');
      const less = btn.getAttribute('data-less');
      btn.onclick = ()=>{
        const expanded = content.classList.toggle('story-expanded');
        btn.textContent = expanded ? less : more;
      };
    }

    function applyLang(lang){
      const t = i18n[lang] || i18n.EN;
      pageTitle.textContent = t.pageTitle;
      langToggle.textContent = `🌐 ${t.langLabel}`;
      tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
      const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
      renderPanel(activeBtn.dataset.tab, lang);
    }

    function renderPanel(key, lang){
      const t = i18n[lang] || i18n.EN;
      Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
      panels[key].classList.add('active');

      if(key !== 'comments'){
        panels[key].innerHTML = t[key];
        if(key==='story') wireStoryToggler(panels[key]);
      }else{
        loadGiscusForCurrentLang();
      }
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab, getLang());
      });
    });

    langToggle.addEventListener('click', ()=>{
      const cur = getLang();
      const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
      localStorage.setItem(LANG_KEY, next);
      applyLang(next);
    });

    /* Giscus：Comments 分頁 */
    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };
    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }

    applyLang(getLang());
  </script>
</body>
