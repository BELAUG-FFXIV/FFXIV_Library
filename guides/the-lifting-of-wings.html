    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>With the materials secured, Krile can’t hide her anticipation—she’s eager to see how Ihih’hana will turn out. Back in Ok’hanu, Linuhanu echoes Wuk Evu’s confidence: the festival truly is a spectacle. Wuk Lamat, however, suggests you all rest while you still can—before the excitement begins.</p><p>Nearby, worried villagers trade rumors in hushed voices. They’ve heard the Third Promise is attempting to clear the Feat of Reeds by reviving Ihih’hana—yet they doubt a “prayer for healthy crops” can truly save a failing harvest. They also speak of the Second Promise leaving after barely glancing at the fields, then immediately second-guess themselves when someone reports Koana muttering by the reeds about what “needs to be done.” Wuk Lamat laughs that it sounds exactly like him, and Linuhanu quietly insists that—whatever Koana’s plan—your own solution is almost ready.</p><p>Alphinaud and Alisaie return with the final piece: competitors gathered for the Wind’s Chosen, a victor crowned, and feathers donated without hesitation. They describe the sheer force of wind magicks—and Erenville, still nursing his pride, curtly reminds everyone that gleaners aren’t trained for such things. Krile brings forward the replacement wood and gemstone parts crafted by Wuk Evu, and the last step is clear: they must be attached to the float.</p><p>Wuk Evu asks the question that matters: who will ride the float? Wuk Lamat recalls the last time she saw it, when Papa was the guest of honor, and she remembers being amazed the village could lift the vessel with his tremendous weight aboard. Linuhanu explains the rider must be someone of great esteem—normally the Dawnservant—yet this time he names you, Wuk Lamat, as guest of honor, because Ihih’hana is only possible thanks to you and your companions. Wuk Lamat freezes, blurts out a worried joke about seasickness, then accepts with wholehearted enthusiasm.</p><p>Roles are assigned at once. Linuhanu will lead the slow procession toward Kozanuakiy, where the sacred likeness of Kixaihih is enshrined, and asks you to clear the route of dangerous wildlife so the carriers can proceed unimpeded. Wuk Lamat wants to help with the clearing rather than sit and wait; Erenville stays behind to assist Wuk Evu with repairs. Following Linuhanu’s directions—south out of the village, then east at the fork, across the bridges to the Stride of the Sun—you sweep through the path and regroup before Kixaihih, where Wuk Lamat remarks on the deity of the harvest and the reed-woven sacred image that reflects how deeply the culture is tied to the harvest.</p><p>But while you’re away, trouble finds Ok’hanu. Bakool Ja Ja corners Wuk Evu and demands the float, scoffing at him and threatening violence. Linuhanu plants himself in front of it, declaring that Ihih’hana will be held again—and that he would die to protect the float as festival leader. When Wuk Lamat rushes back, Bakool Ja Ja strikes hard enough to show the gap in strength, and his two heads taunt her with cruel certainty—until word comes that their “other” prospect is near success, and they withdraw rather than waste effort. Wuk Lamat forces herself upright, laughs that it will take more than that to kill her, and asks the only thing that matters: are they having this festival or not? Linuhanu answers, shaken but resolute—yes, they are.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>材料が揃い、クルルは思わず声を弾ませる。イヒーハナがどんな結末を迎えるのか、早く見たいのだ。オクハヌへ戻ると、リヌハヌもまた、ウケブが語ったとおり祭りは壮観だと言い切る。ウクラマトは、盛り上がりが始まる前に少し休もうと、あなたたちに促す。</p><p>その傍らで、村人たちは噂話を交わしていた。第三誓約が、イヒーハナを復活させることで「葦の試練」を達成しようとしている――本当なのか、と。豊作を祈る祭りだけで不作が救えるのか、疑う声もある。さらに、第二誓約が畑をほとんど見もせず去ったことに落胆する者もいたが、すぐに「葦のそばで必要なことを呟いていた」とコーナの様子を聞きつけ、期待を口にする。ウクラマトは苦笑し、いかにも彼らしいと言う。リヌハヌは、だとしても自分たちの準備はもうすぐ整う、と静かに断言する。</p><p>やがてアルフィノとアリゼーが戻り、風の選民を競う者たちを集め、勝者から羽根を受け取れたと報告する。猛烈な風が羽根を遠くまで運ぶ光景を語り、あなたたちも挑んだが見た目以上に難しかったと笑う。宙を舞って足から落ちたエレンヴィルは、採集者に魔法の訓練はないと短く言い添える。クルルはウケブが作った木材と宝石の交換部材を持ち帰り、残る作業は山車への取り付けだけとなる。</p><p>ウケブが問いかける――山車に乗るのは誰だ。ウクラマトは、以前ここで祭りを見たとき、名誉客はパパだったと振り返り、あの巨体を乗せてよく持ち上げられるものだと驚いた記憶を語る。リヌハヌは、乗り手は大いなる敬意を集める人物であり、通常はドーンサーヴァントに招待が向くのだと説明する。だが今回は違う。イヒーハナが再び行えるのはウクラマトと仲間たちのおかげなのだから、名誉客にウクラマトを指名すると告げる。ウクラマトは目を丸くし、船酔いしないかと口走りつつも、喜んで引き受ける。</p><p>役割分担も決まる。リヌハヌは行列を率いて、聖なるキクサイヒの像が鎮座するコザヌアキへ向かう。その途中、危険な野生生物を排除し、行列が滞りなく進めるようにしてほしいという。ウクラマトは待つより自分も加勢したいと言い、エレンヴィルは修理の手伝いのため残る。あなたたちは村の南から道に入り、分岐で東へ折れ、橋を渡って「太陽の歩み」へ至る経路を掃討し、キクサイヒの像の前で合流する。刈り取りの神として崇められるその姿が、葦で編まれていることに、文化が収穫と結びついている重みが滲む。</p><p>だが、あなたたちが離れている間、オクハヌでは災厄が起きていた。バクージャジャが山車を奪おうとし、無作法だと罵りながらウケブを脅す。リヌハヌは山車の前に立ちはだかり、イヒーハナを再び行うのだと叫び、祭の長として命を懸けて守ると宣言する。駆け戻ったウクラマトは強烈な一撃を受け、二つの頭に力の差を突きつけられるが、別の見込みが成功寸前だという報せで相手は手を引く。ウクラマトは笑って立ち上がり、もっとやらねば倒れないと言い捨て、祭りはやるのかと問う。リヌハヌは震えながらも、やる、と答える――やるのだ、と。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ウクラマト <small class="muted">（コザマル・カ, X:19.5, Y:10.8）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-well-mannered-shipwright.html">船大工のウケブ</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 90</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="knowing-the-hanuhanu.html">ハヌハヌ族を知る</a></div></div>`

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'展翅節',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>材料終於齊了，Krile 忍不住說她很期待——她想親眼看到 Ihih’hana 會變成什麼樣子。回到 Ok’hanu 之後，Linuhanu 也照著 Wuk Evu 的話補上一句：這場祭典真的很壯觀。Wuk Lamat 則提醒你們趁事情還沒開始先休息一下，免得等會兒忙到連喘口氣都來不及。</p><p>你們附近有人在竊竊私語。村民聽說「第三誓約」正在用復興 Ihih’hana 的方式完成「蘆葦之試煉」，但他們也懷疑：就算祭典本質上是為了祈求作物健康生長，真的足以拯救今年的收成嗎？有人提起「第二誓約」幾乎沒看田地就離開 Ok’hanu，語氣裡滿是失望；但也有人說別太快否定 Koana，因為有人聽見他在蘆葦邊低聲念著「必須做的事」。Wuk Lamat 聽了笑出聲，說這確實很像 Koana；Linuhanu 則不急不躁地表示——不管對手打算做什麼，你們自己的方案也快要準備完成了。</p><p>接著 Alphinaud 和 Alisaie 帶回最後一項關鍵：他們總算聚起人來競逐「風之選民」，勝者也爽快捐出羽毛。Alisaie 描述那股風有多誇張，羽毛被吹得飛出老遠；輪到你們嘗試時才發現看起來容易、做起來難，Erenville 甚至一度被捲到半空才狼狽落地。Erenville 冷冷補上一句：他是 gleaner，訓練裡不包括魔法。Krile 則把 Wuk Evu 做好的 uyuipo 木材與 abokixa 寶石替換件帶回來——現在就差把它們裝上花車。</p><p>Wuk Evu 問了最重要的一件事：誰要乘坐花車？Wuk Lamat 回想起上次來到這裡，名譽貴賓是她的爸爸；她當時還驚訝，怎麼可能把那艘巨大的花車抬起來、還讓爸爸坐在上頭。Linuhanu 解釋，乘坐者必須是極受敬重的人物，所以照慣例會邀請 Dawnservant；但這一次，他另有人選——Ihih’hana 能重新舉行，全靠 Wuk Lamat 和你們的努力，所以他提名 Wuk Lamat 擔任名譽貴賓。Wuk Lamat 先是愣住，隨口擔心自己會不會暈船，下一秒就用她一貫的熱情答應：她很樂意乘坐花車。</p><p>分工也立刻敲定。Linuhanu 會帶著花車以緩慢的隊列前往 Kozanuakiy——那裡供奉著 Kixaihih 的神聖像——而你們要做的，是先把路上的危險野生生物清除掉，讓隊列能順利通行。Wuk Lamat 不想只是坐著等修理完，也要加入清路；Erenville 則留在村裡協助 Wuk Evu 做最後的修補。你們照 Linuhanu 指的路線行動：從村子南邊起步、分岔處轉往東側，穿過橋梁到達 Stride of the Sun，沿路排除威脅後在 Kixaihih 前會合。Wuk Lamat 指著那尊以蘆葦編成的神像，說這就是 Hanuhanu 的收穫之神，也讓人更明白他們的文化是怎麼繫在蘆葦收成之上。</p><p>然而，就在你們離開的空檔，Ok’hanu 發生了衝突。Bakool Ja Ja 逼近花車，威脅 Wuk Evu 要他交出來，甚至揚言動手；Linuhanu 站到花車前方，喊著 Ihih’hana 能重辦是因為 Wuk Lamat 和你們，他身為祭典負責人也願意用命守住這份珍貴的成果。Wuk Lamat 趕回來時吃了重重一擊，那一下讓她明白差距有多大；Bakool Ja Ja 的嘲弄還沒說完，卻因為「另一個選項」即將成功的消息而選擇收手離開。Wuk Lamat 咬著牙撐起身子，硬是笑著說這點程度還殺不了她，然後只問一句：祭典還辦不辦？Linuhanu 抖得厲害，卻仍然點頭回答——辦，當然要辦。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());
