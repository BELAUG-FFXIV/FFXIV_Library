  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}

    @media (max-width:900px){

    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}

    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}

    .tab-panel.scroll-panel{
  max-height:420px;

}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}
    .stack{display:flex;flex-direction:column;gap:10px}

<body>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'The Bear and the Young’uns’ Cares',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>In Little Ala Mhigo, Gundobald tells you troubling news: an outsider matching the description of your masked stranger has been seen near the settlement lately—and some of the youngbloods seem to be meeting him in secret. If you want answers, he warns, they won’t be eager to speak to an outsider. But if you tell them Gundobald sent you, they may feel obliged to talk.</p>
      <p>You take his words and start asking around. Waldhar snaps that he has no idea what you’re talking about, insists he’s done nothing wrong, and wants you gone. Adalind, on the other hand, reacts the moment you invoke Gundobald—words spilling out as she blurts that she told “them” it was a bad idea, and that she’s heard all that tripe about believing the masked man. Then she freezes, realizes you don’t actually know anything, and panics at the thought of being in trouble for it. Sifrid only plays it off, pretending he’s met no masked men at all—though he promises to tell his friends you’re looking. Talebot keeps his distance, saying he’s seen a suspicious bunch skulking about, but he wants nothing to do with them—he knows trouble when he sees it.</p>
      <p>When you return to Gundobald, he takes it as confirmation that his suspicions were right: there really is a masked man involved, and that troubles him deeply. Whatever the young ones are plotting, he says, it can lead to no good end.</p>
      <p>He tells you he can see anger in their eyes—and he recognizes it, because it once burned in him as well. Two decades ago, that same anger drove him and his brothers to rise up against the despot who ruled Ala Mhigo. They wanted nothing less than to depose him and bring about a revolution.</p>
      <p>But the revolution came at a price. Blinded by hate, they failed to see they were dancing to the Empire’s tune—and by the time they understood, it was too late. Ala Mhigo had fallen.</p>
      <p>There are times, Gundobald says, when a man must be patient. This is such a time, even if the young ones don’t understand it. Unless someone intervenes, they’re likely to commit a great folly—so if you learn anything more of their plans, he asks you to bring word to him.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Gundobald <small class="muted">Southern Thanalan (X:16.9, Y:14.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="come-highly-recommended.html">Come Highly Recommended</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 27 or above)</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="wilred-wants-you.html">Wilred Wants You</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'密かな企み',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>リトルアラミゴでグンドバルドは、気がかりな噂をあなたに告げる。あなたが追う「仮面の男」に似たよそ者が近ごろ周辺に現れているうえ、若者の何人かが密かにその者と会っているらしいという。問いただすつもりだろうが、外の者には簡単に口を割らないはずだ――ただし「自分が遣わした」と伝えれば、義理立てして話す者もいるかもしれない、と。</p>
      <p>あなたは言われたとおりに聞き込みを始める。ワルドハルは「仮面の男など知らない」と突っぱね、自分は何も悪いことをしていないから放っておけと言う。だがアダリンドは、グンドバルドの名を出した途端に動揺し、「仮面の男を信じろ」などという話を止めたはずだと口走ってしまう。すぐにあなたが事情を知らないと気づくと、今度は青ざめて、あの老獪な男の名を軽々しく出すな、と怯えたように抗議する。シフリッドはとぼけて「最近、仮面の男に会った覚えはない」と言い張りつつ、探していることだけは仲間に伝えておくと軽く受け流す。テールボットは、怪しい連中がうろついているのは見たが自分は関わっていない、あれは厄介事だとわかる、と距離を置く。</p>
      <p>あなたが戻ると、グンドバルドはやはり仮面の男の存在が裏づけられたと受け止め、深く憂える。若い連中が何を企んでいようと、いい結末にはならない――そう言い切る。</p>
      <p>彼は、若者たちの目に怒りが宿っているのが見えると言う。そしてその怒りを自分も知っている、と。かつて自分の内にも燃えていたからだ。二十年前、その怒りは彼と仲間たちを突き動かし、アラミゴを支配していた暴君に抗して立ち上がらせた。倒して革命を起こす、それ以外に道はないと思い詰めていたのだと。</p>
      <p>だが革命の代償は、自由そのものだった。憎しみに目がくらみ、気づかぬうちに帝国の思惑に踊らされていた――悟ったときには手遅れで、アラミゴは陥落していた。</p>
      <p>人は時に、耐えねばならない――グンドバルドはそう言って、今がまさにその時だと諭す。だが若者たちはそれを知らない。このままでは大きな愚を犯しかねない。もし計画の手がかりを得たなら、どうか自分に知らせてほしい、とあなたに頼む。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> グンドバルド　<small class="muted">南ザナラーン (X:16.9, Y:14.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="come-highly-recommended.html">リトルアラミゴ再び</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 27～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="wilred-wants-you.html">ある青年の呼び出し</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'秘密企圖',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Little Ala Mhigo，Gundobald 告訴你一個令人不安的消息：近來有人目擊到一名外來者，外貌特徵與你正在追查的「戴面具的神秘人」相當接近；更糟的是，似乎有些年輕人正私下與他秘密會面。你當然會想追問那些人的「幽會」細節，但 Gundobald 提醒你——對方多半不會輕易對外人開口。若你說是他派你來的，他們也許會因為顧忌而勉強願意說些什麼。</p>
      <p>你照著他的話去問。Waldhar 立刻否認，說自己根本不知道什麼戴面具的人；他沒做錯事，要你別來煩他。Adalind 一聽到你提 Gundobald，反應卻完全不同——她慌亂地脫口而出，說她早就警告過「他們」那是個壞主意，還提到那些關於相信戴面具的神秘人的荒唐說法。緊接著她才發現你其實什麼都不知道，語氣瞬間變成驚恐與埋怨：你不該隨便搬出那位「老熊」的名字，害她以為自己要倒大楣了。Sifrid 則故作輕鬆，裝作自己最近完全沒見過戴面具的人，卻又說會把你在找人的事告訴朋友。Talebot 只冷眼旁觀，說確實看過一群可疑的人鬼鬼祟祟，但他跟那些人毫無關係——麻煩他一眼就看得出來，那就是麻煩。</p>
      <p>你回去向 Gundobald 回報後，他等於得到了自己最不想證實的答案：戴面具的神秘人確實牽扯其中，這讓他非常憂心。不管那些年輕人正在盤算什麼，都不可能走向好結果。</p>
      <p>他說，他能從那些人的眼神裡看見怒火——而他之所以如此確定，是因為那怒火曾經也在他心裡燃燒。二十年前，正是同樣的憤怒驅使他與同伴起身反抗統治 Ala Mhigo 的暴君；他們一心只想推翻對方、掀起革命，彷彿除此之外別無選擇。</p>
      <p>可革命換來的，卻是失去自由的代價。因為被仇恨蒙蔽，他們直到最後才發現自己一直在順著 the Empire 的節奏起舞——等到醒悟時，一切都太遲了，Ala Mhigo 已經淪陷。</p>
      <p>Gundobald 低聲說，有些時候，人必須學會忍耐；而現在就是那樣的時候，只是年輕人並不明白。若沒有人出手制止，他們很可能會做出可怕的愚行。所以一旦你再得知任何計畫的線索，他希望你立刻回來告訴他。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 古恩德巴爾德　<small class="muted"> 南薩納蘭 (X:16.9, Y:14.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="come-highly-recommended.html">再次光臨小阿拉米格</a></div>
      <div class="row">所有職業（不含限定職） 等級 27 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="wilred-wants-you.html">威爾雷德的邀請</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
