  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}

      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}

    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;

  padding-right:8px;
  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Heir Today, Gone Tomorrow',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>In the slums of Lost Hope, Leofric fixes you with a tired stare, reminding you that he told you to get out of here—but when he realizes you have come back looking for a chance to do some good, he lets out a weary sigh and admits he cannot force you to leave. If you are truly that stubborn, then you may as well listen, he says. He explains that a band of outlaws has taken up residence at the Quiveron Manse on the ridge to the south, and that their leader has arrogantly styled himself heir to Eolande Quiveron, the Syndicate member who died in the Calamity. To Leofric, however, this self-proclaimed baron and his cronies are nothing more than jackals who prey on the people of Lost Hope, robbing them of what little they have. Because the bandits know his face, any move he makes would invite retaliation against the refugees, but you are not known to them or their allies. If you truly wish to help, he asks you to deal with the baron in his stead.</p>
      <p>With Leofric’s grim request in mind, you leave Lost Hope and head south across the dust of central Thanalan toward the Quiveron Manse. The ruined estate stands on the ridge just as he described, and as you draw near its crumbling walls, you sense a hostile presence closing in. The outlaws who have claimed the manse as their lair move to bar your way, and in the clash that follows, you cut your way through the band and confront their leader—the man who would call himself the heir to Eolande Quiveron. Steel and spell decide the matter, and in the end, the so-called baron falls, his claim to power ending there amid the wreckage of the house he has seized for himself.</p>
      <p>When you return to Lost Hope and report back, Leofric asks if it is done, and when you confirm it, he says it is good and adds that he hopes that wretch died screaming. Some say Ul’dah is more prosperous than ever, he murmurs, but if that is true, it is only true for the Syndicate, for none of that wealth has trickled down to the smallfolk. To him, the whole thing is a mummer’s farce: on the day he refused to play his part, he was made to leave the stage and sent here instead. His time has passed, he says at last, and the Brass Blades of the Rose must look to others for guidance from now on, while he remains in Lost Hope watching over those whom Ul’dah’s prosperity has long since forgotten.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Leofric <small class="muted">Central Thanalan – Lost Hope (X:23.3, Y:16.0)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="last-letter-to-lost-hope.html">Last Letter to Lost Hope</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 10 or above)</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="passing-the-blade.html">Passing the Blade</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'その男、サー・キヴロン',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ロストホープ流民街で、レオフリックは疲れた眼差しでこちらを見つめ、ここから出て行けと言ったはずだと念を押す。しかし、君がなおも何か力になれないかと戻ってきたのだと悟ると、彼は深くため息をつき、自分には君を追い払う権利などないと認める。そこまで頑固な冒険者だというのなら、せめて話だけは聞け──そう前置きして、彼は南の尾根に建つ「キヴロン別宅跡」に盗賊団が居座っている状況を語り始める。その頭目は、第七霊災で命を落とした砂蠍衆のひとり「エオランデ・キヴロン」の継承者を自称し、自らを男爵と名乗っているが、レオフリックに言わせれば、あの男爵とその手下どもはロストホープ流民街の人々から、わずかな持ち物さえ奪い取るハイエナ同然の輩にすぎない。自分の顔はすでに連中に知られており、下手に動けば報復が難民たちに向けられるのは目に見えている。だが、君のことは賊もその協力者もまだ知らない。もし本当に助けるつもりがあるのなら、代わりにあの男爵を始末してほしい──それが彼の願いだった。</p>
      <p>レオフリックの言葉を胸に刻み、君はロストホープ流民街を後にして、中央ザナラーンの砂塵舞う荒野を南へ進む。やがて尾根の上に建つ「キヴロン別宅跡」が見えてくると、彼の説明どおり荒れ果てた屋敷が姿を現し、その周囲には不穏な気配が立ちこめている。崩れかけた建物へ近づいた途端、そこを根城とする盗賊たちが敵意をむき出しにして立ちふさがり、激しい戦いが始まる。君は次々と賊を打ち倒し、ついには自らをエオランデ・キヴロンの後継者と称する男爵と対峙することになる。剣と魔法が交錯する中、勝敗はやがて決し、キヴロン家の名を騙るその男は力尽きて地に伏し、彼が奪い取った別宅跡での短い栄華もここで終わりを迎える。</p>
      <p>やがて君がロストホープ流民街へ戻って報告を届けると、レオフリックはそれが片づいたのかと確かめ、成し遂げたと聞くや、「あの外道が悲鳴を上げて果てたのなら上々だ」と低く呟く。いまやウルダハはかつてないほどの繁栄を享受していると人は言うが、その実りを手にしているのは砂蠍衆ばかりで、その富が小さな民へと行き渡ることは決してない──彼の目には、すべてが茶番劇のように映っていた。ただ一度、自分の役割を演じることを拒んだがために舞台から追い出され、こうして流民街の片隅に送られてきたのだと、彼は自嘲まじりに語る。そして最後に、自分の時代はとうに過ぎ去ったのだと認め、これからの銅刃団ローズ連隊は、別の誰かが導いていかねばならないと告げるのだった。その言葉とともに、彼は今日もまた、ウルダハの繁栄から取り残された人々を見守り続ける。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> レオフリック　中央ザナラーン：ロストホープ流民街 <small class="muted">(X:23.3, Y:16.0)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="last-letter-to-lost-hope.html">貧民街の連隊長</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 10～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="passing-the-blade.html">受け継がれる護身刀</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'其名為屈伊伯龍男爵',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Lost Hope 這片難民聚集的貧民街上，Leofric 以疲憊的眼神迎向你，先是提醒自己明明叫你離開這裡，沒想到你還是回來了；但當他看出你是真心想幫上忙時，只能無奈地嘆口氣，承認自己也沒資格硬把你趕走。既然你這麼固執，那就先聽他把話說完吧——他說，南邊山稜上的一座宅邸 The Quiveron Manse，最近被一群 outlaws 佔據成為據點，而那群人的首領更厚顏無恥地自稱是亡於 Calamity 的 Syndicate 成員 Eolande Quiveron 的繼承人，給自己戴上了「baron」的頭銜。對 Leofric 來說，這個「男爵」和手下根本就是一群豺狼，專門盯上 Lost Hope 的居民，把他們僅存的一點東西都搶走。由於對方早就認得他的臉，他若輕舉妄動，只會招來報復落在難民身上；但你對那幫人和他們的同夥而言仍是陌生人。如果你真的想幫 Lost Hope 一把，他希望你能替他出手，去解決那個假扮繼承人的 baron。</p>
      <p>帶著這個託付，你離開 Lost Hope，踏上中央 Thanalan 滿是黃沙的道路，朝南方的 The Quiveron Manse 前進。那座宅邸如同 Leofric 所描述的一樣佇立在山稜上，外牆殘破，四周瀰漫著不祥的氣息。當你靠近時，系統提示的「You sense a hostile presence!」在腦中一閃而過，隨即，將這裡當成巢穴的 outlaws 紛紛現身，帶著露骨的敵意衝向你。你舉起武器迎戰，在短暫而激烈的交鋒中，依序擊潰包圍上來的敵人，最後正面對上那名自稱 Eolande Quiveron 繼承人的首領。鋼鐵與魔法的碰撞之後，一切由實力說話，那個自封為 baron 的男人終於倒臥在奪來的宅邸裡，他妄想攀附 Quiveron 名號的野心，也就此在這裡畫上句點。</p>
      <p>回到 Lost Hope 之後，你向 Leofric 簡要報告已經順利完成任務。他聽完，只淡淡確認一句「結束了嗎」，在得到肯定的答案後，低聲說道，希望那個混帳是慘叫著死去的。接著，他提起如今 Ul’dah 被許多人稱頌為比以往更富裕，然而真正受惠的只有 Syndicate，那些財富從未往下流到小人物手中。對他而言，一切就像一場排練好卻荒謬的舞台劇；而在他有一天選擇拒絕繼續扮演自己的角色後，就被人從舞台上趕了下來，被調到這片貧民街來。最後，他承認自己的時代已經結束，Brass Blades of the Rose 從今以後必須仰賴其他人來帶領，而他則會留在這裡，繼續守望那些被 Ul’dah 繁華遺忘的人們。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 利奧弗里克　中薩納蘭 <small class="muted">(X:23.3, Y:16.0)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="last-letter-to-lost-hope.html">貧民區的聯隊長</a></div>
      <div class="row">所有職業（不含限定職） 等級 10 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="passing-the-blade.html">世代相傳的護身刀</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
