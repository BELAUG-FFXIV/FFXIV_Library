<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`Casing the Castrum`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You regroup with Yda, her resolve immediate and unwavering as she urges you to move—now—to rescue Minfilia and the others. Cid’s focus is colder and more practical: whatever Gaius called that “weapon of ancient Allag,” he saw signs of heavy magitek modification, proof that the Empire has been shaping something far beyond a relic recovered intact.</p><p>Alphinaud accepts what must be faced—an imperial castrum was always the likeliest destination—and Y’shtola makes the danger plain. Even at the best of times, forcing a way into an imperial stronghold is perilous; with valuable prisoners inside, Castrum Centri will be guarded all the more fiercely. If you mean to bring your allies back alive, you will need a plan—and before you can build one, you will need intelligence.</p><p>With that, Y’shtola names a contact: Lord Portelaine of House Durendaire, stationed at the Observatorium in Coerthas. You go to him and ask for his aid, and he receives you with recognition—remembering the one who unmasked a heretic—and with the understanding that you stand among the Scions of the Seventh Dawn. When he hears the name Castrum Centri, his curiosity turns sharp.</p><p>You tell him the Garleans have taken your comrades, and any detail could mean the difference between rescue and failure. Portelaine shares what his scouts saw: four prisoners led into the castrum—a Hyuran woman, an Elezen man, and two Lalafells, one male and one female. It is enough for Yda to know, without hesitation, that you have found the trail of Minfilia, Urianger, Papalymo, and Tataru.</p><p>Then Portelaine adds a newer report—an imperial airship forced to make an emergency landing in Coerthas. Two men believed to be prisoners fled the wreck: a Roegadyn and a Lalafell. At that, Cid’s shock becomes certainty—Biggs and Wedge. And certainty becomes urgency, because the imperials will not stop until they have the escapees in chains again…or worse.</p><p>Portelaine warns you his scouts saw troops set off in pursuit soon after the prisoners fled. Y’shtola weighs the facts with grim clarity: if the Garleans captured the Scions to learn about the Echo, they will keep them alive while they can still be studied. Biggs and Wedge have no such value to the Empire. If you want to see them again, you must act now—and Cid’s gratitude is immediate as the group commits to the rescue.</p><p>Far from you, in Mor Dhona at Castrum Centri, Nero reports to Gaius that final preparations are nearly complete—the culmination of five years of painstaking work. Gaius declares the purpose without softness: the power to purge the land of false gods, to impose the “security and stability” Eorzea’s leaders have failed to provide. He issues orders to Rhitahtyn—departure at midnight, command of the western front in Vylbrand from Castrum Occidens, and a single expectation: the Eorzeans will try to interfere, and they must not be allowed to do so.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Y’shtola <small class="muted">(The Waking Sands, X:6.8, Y:6.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="reclamation.html">Reclamation</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 44 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="eyes-on-the-empire.html">Eyes on the Empire</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'反攻の布石',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>イダがあなたに向き直り、迷いなく叫ぶ。ミンフィリアたちを救いに行く――今すぐにでも。だがシドは、興奮ではなく確信の重さで言う。ガイウスはそれを古代アラグの兵器と呼んだが、実物には大規模な魔導改修の痕跡があった。帝国はただ遺物を得たのではない。意図して作り替え、磨き上げている。</p><p>アルフィノは、帝国のカストルムが舞台になるのは当然だと受け止める。ヤ・シュトラは危険性をはっきりと示す。平時でさえ帝国要塞の防衛を突破するのは命懸けであり、価値ある囚人を収容している以上、カストルム・セントリの警戒はさらに強化されているはずだ。救出には戦略が要る。そして戦略には情報が要る。</p><p>そこでヤ・シュトラは協力者を挙げる。クルザスのアドネール占星台に駐屯する、デュランデル家のポルトゥレーン卿だ。あなたは彼を訪ね、助力を請う。彼はあなたを覚えていた――かつて異端者を暴いた者として、そして暁の血盟の一員として。カストルム・セントリの名を聞いた瞬間、その視線が鋭くなる。</p><p>あなたが事情を告げると、ポルトゥレーンは斥候の報告を語る。カストルムへ連行された囚人は四名。ヒューランの女性、エレゼンの男性、そしてララフェルが二名――男と女がひとりずつ。イダは即座に確信する。ミンフィリア、ウリエンジェ、パパリモ、タタルだ、と。</p><p>だが彼はさらに、より新しい出来事を続ける。帝国の飛空艇がクルザスに緊急着陸し、囚人と思しき二人が逃走したという。ルガディンの男とララフェルの男。シドの胸に走る衝撃は、すぐに確信へ変わる――ビッグスとウェッジだ。帝国は必ず追う。捕らえるか、さもなくば殺すまで。</p><p>ポルトゥレーンは、囚人が飛空艇を離れた直後に帝国兵が追撃に出たと告げる。時間は残されていない。ヤ・シュトラは冷静に整理する。暁の血盟が囚われた理由が「超える力」の解明にあるのなら、研究が終わるまでは処刑されまい。だがビッグスとウェッジには、その猶予すら期待できない。今こそ救うべきだ――そうしてあなたは、まず二人を追う決断を固め、シドは深く礼を言う。</p><p>一方その頃、モードゥナのカストルム・セントリでは、ネロがガイウスに報告していた。最終準備はほぼ完了し、五年に及ぶ労作はついに結実する。ガイウスは宣言する。偽りの神――蛮神を排し、この地に帝国が望む秩序をもたらすのだ。彼はリタティンに命じる。深夜にカストルム・オキデンスへ向かい、ヴィルブランド西方戦線を指揮せよ。エオルゼア勢が介入を試みるなら、必ず阻止せよ――と。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ヤ・シュトラ <small class="muted">（砂の家, X:6.8, Y:6.1）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="reclamation.html">かすかな灯火</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 44～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="eyes-on-the-empire.html">帝国を見張る目</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'反攻的佈局',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你才剛重新集結，Yda 就把所有遲疑都甩在身後，催促你立刻動身去救 Minfilia 和其他人。Cid 的語氣沒有激昂，只有沉下來的判斷：Gaius 或許把那東西稱作 Ancient Allag（古代亞拉戈帝國）的武器，但他親眼看見上頭有大量 magitek 的改造痕跡——那不是單純撿回來的遺物，而是被帝國重新塑形過的兵器。</p><p>Alphinaud 也只能承認，關押地點是帝國要塞這種事早就該料到。Y’shtola 則把危險講得一清二楚：就算在正常情況下，硬闖帝國要塞的防線也是極其凶險；而如今 Castrum Centri 收押著 Garleans 認定「有價值」的俘虜，他們只會加倍強化警戒。要救人，你們需要策略；要有策略，就必須先拿到情報。</p><p>於是 Y’shtola 提出人選：Coerthas 的 Observatorium 裡，House Durendaire 的 Lord Portelaine。你們去見他、請求協助。他一開口就認出你——那個曾在他們之中揭穿異端的人，也就是 Scions of the Seventh Dawn 的同伴。當他聽見 Castrum Centri 這個名字，他的關注立刻變得尖銳。</p><p>你說明 Garleans 扣押了你們的同伴，而任何細節都可能左右你們能不能把人活著帶回來。Portelaine 轉述斥候回報：有四名俘虜被押進 castrum——一名 Hyuran 女性、一名 Elezen 男性，以及兩名 Lalafell（男、女各一）。Yda 幾乎不需要多想就肯定，那就是 Minfilia、Urianger、Papalymo 和 Tataru。</p><p>但 Portelaine 還有更新的消息：不久前，一艘帝國飛空艇在 Coerthas 緊急迫降；兩個疑似囚犯的人逃離了飛空艇——一名 Roegadyn 和一名 Lalafell。Cid 當場愣住，隨即認出那兩人是 Biggs 和 Wedge。因為他太清楚了：帝國軍不會停手，他們會追到把人抓回去——或直接殺掉。</p><p>Portelaine 警告你們，俘虜一離開飛空艇，帝國軍就立刻出發追捕，時間只會越來越少。Y’shtola 冷靜把局勢攤開：如果 Garleans 抓走 Scions 是為了弄懂 Echo，那在研究完成之前，他們不太可能立刻處決人。但 Biggs 和 Wedge 不是 Scions，也不掌握 Echo 的情報——他們對帝國而言沒有「必須活著」的價值。你們若想再見到他們，就只能現在立刻行動；而當你們做出決定時，Cid 立刻向所有人道謝。</p><p>與你們相隔遙遠的 Mor Dhona，Castrum Centri 內部也正在推進另一條路線。Nero 向 Gaius 回報，最後的準備幾乎完成——那是五年心血的結晶。Gaius 以毫不掩飾的口吻宣告：他們終於擁有清除這片土地上「假神」的力量，並把他所謂的安定與秩序強加於 Eorzea。接著他命令 Rhitahtyn：午夜出發前往 Castrum Occidens，指揮 Vylbrand 的西方戰線；Eorzeans 一定會試圖干涉，而你們要做的，就是確保他們辦不到。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 雅·修朵拉 <small class="muted"> 砂之家（X:6.8, Y:6.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="reclamation.html">星星之火</a></div><div class="row">所有職業（不含限定職） 等級 44 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="eyes-on-the-empire.html">帝國的動向</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
