const i18n = {
  EN:{
    langLabel:'English',

    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>At Quarrymill, Meffrid rushes up to you in a panic—Gallien has gone missing, and no one can find him. With wounds like his, he shouldn’t be walking about. Without proper medicine and rest, Meffrid fears his condition will slip back to where it was before… or worse. He begs you to help, quickly, and tells you to start by asking Albreda—she might have seen something.</p>
      <p>Albreda doesn’t hide her displeasure that it took this long to ask. She tells you she watched Gallien leave Quarrymill earlier, and that before he went, he left her a sealed letter—making her swear not to open it until someone came looking for him. When she finally breaks the seal, his message is plain: he can’t bear being a burden any longer, so he must leave; you should not worry for him, and should instead find your way safely to Little Ala Mhigo. Albreda lets out a bitter sigh, wishing she’d known what he was thinking—she would have stopped him. The love Gallien bears for his brothers, she says, is so strong he’s willing to sacrifice himself for them, and entering the wood in his weakened state is suicide.</p>
      <p>When you bring the news back, Meffrid is outraged—out in the wilds, alone? He curses Gallien as a fool, a great big sentimental fool. He declares that he and his men will scour the wood, and pleads for your help to find Gallien before something terrible happens.</p>
      <p>Out in South Shroud, you finally come upon Gallien—breath ragged, warning you to watch out. You feel a hostile presence closing in, and a goblin springs the ambush. In the chaos, Meffrid’s shout cuts through the trees as he calls Gallien’s name. Gallien, stunned, asks why—why the captain is here, when they should all be on their way. Meffrid roars back that they are Ala Mhigans, and Ala Mhigans never forsake one another, hardships be damned. He reminds Gallien of the oath they swore—the oath to reclaim their homeland—and declares they will set foot on Ala Mhigan soil again together, or not at all. Gallien can only answer, “Yes, sir.” Meffrid orders him back to their brothers—and growls that once he’s healed, he’ll give him such a thorough thrashing he’ll wish they hadn’t found him. Before leaving, Meffrid thanks you for saving Gallien, and says he will see you back at Quarrymill.</p>
      <p>Back at Quarrymill, Meffrid tells you Gallien is expected to make a full recovery. They’ll linger here until he’s strong enough to take to the road again. As much as Meffrid mislikes this place, he admits, beggars can’t be choosers.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Meffrid <small class="muted">South Shroud (X:25.6, Y:20.6)</small></div>
    </div>`,

    followq:`<div class="stack">

  },
  JP:{
    langLabel:'日本語',
    pageTitle:'異邦の絆',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>クォーリーミルであなたを見つけたメッフリッドは、取り乱した様子で訴える。ガリエンが行方不明になったという。あの傷では歩き回るべきではなく、きちんとした薬と休養がなければ、容体は以前のように悪化しかねない――それどころか、もっとひどくなるかもしれない。急いで捜してほしい、まずはアルブレダに聞いてくれ、彼女なら何か見たはずだと頼み込む。</p>
      <p>アルブレダは、ようやくガリエンのことを聞きに来たかと言わんばかりに応じる。彼が少し前にクォーリーミルを離れるのを見たこと、そして去り際に封のされた手紙を預かったことを告げる。誰かが捜しに来るまで開けないと誓わされた――そう言って封を切り、手紙の内容を読み上げる。自分はもう足手まといではいられないから去る、心配はいらない、ただ無事にリトルアラミゴへ辿り着いてほしい。アルブレダは悔しげに息を吐き、考えを知っていれば止めたのにと嘆く。仲間への想いが強すぎて、自分を犠牲にする気なのだ。弱った体で森に入るのは自殺行為だと、あなたに釘を刺す。</p>
      <p>あなたが事情を伝えると、メッフリッドは怒りをあらわにする。荒野にひとりでだと？　あの大馬鹿者め、情に流される大馬鹿者め――そう吐き捨て、部下たちと森を徹底的に捜すと宣言する。そして、取り返しのつかないことになる前にガリエンを見つけたい、どうか力を貸してくれとあなたに頼む。</p>
      <p>南部森林の奥で、あなたは息を切らしたガリエンに行き当たる。彼は苦しげに警告し、敵意ある気配が迫るのをあなたも感じ取る。そこへゴブリンが襲いかかり、混乱の中、メッフリッドの叫び声が木立を裂いてガリエンの名を呼ぶ。ガリエンは驚き、なぜここにいるのか、あなたたちは先へ行くべきだと言うが、メッフリッドは一喝する。自分たちはアラミゴ人だ、どれほど苦しくとも仲間を見捨てない。故郷を取り戻すと誓ったあの誓いを忘れたのか――アラミゴの地を再び踏むのは、必ず共に、さもなくば誰も踏まないのだと。ガリエンは「はい……隊長」と答えるしかない。メッフリッドは仲間のもとへ戻るぞと命じ、治ったら徹底的に叩き直してやると凄む。最後に、ガリエンを救ってくれたことへの礼を告げ、クォーリーミルで会おうと言って引き上げる。</p>
      <p>クォーリーミルに戻ると、メッフリッドはガリエンが全快する見込みだと伝える。再び旅に出られるほど回復するまで、ここに留まるつもりらしい。この場所は気に入らないが、背に腹は代えられない――そう言って言葉を締めくくる。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> メッフリッド　<small class="muted">黒衣森：南部森林 (X:25.6, Y:20.6)</small></div>

    followq:`<div class="stack">

  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'異邦的羈絆',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Quarrymill，Meffrid 慌張地衝到你面前，結結巴巴地喊著：Gallien 不見了，怎麼找都找不到。以他那身傷勢，他根本不該到處走動；要是沒有按時用藥、好好休息，病況很可能會惡化回原本那樣……甚至更糟。Meffrid 立刻請你幫忙，越快越好，並要你先去問 Albreda──也許她看到過什麼。</p>
      <p>Albreda 的語氣冷冷的，像是早就在等你開口。她說自己確實看見 Gallien 早些時候離開了 Quarrymill，臨走前還交給她一封封蠟的信，並要她發誓：在有人來問起之前，絕對不能打開。如今終於有人來問，她拆開信封，信裡寫著：他再也無法忍受成為大家的負擔，所以必須離開；不要為他擔心，只要你們能平安找到路前往 Little Ala Mhigo 就好。Albreda 深深嘆了口氣，懊悔自己若早知道他的打算，就會親手阻止這場愚行。她也提醒你：Gallien 對同伴的情誼太深，深到願意拿自己去換他們的安全，而以他虛弱的狀態走進森林，無異於自殺。</p>
      <p>你把消息帶回去後，Meffrid 怒不可遏：跑到野外、還是一個人！？他罵 Gallien 是個蠢貨，是個大得離譜、又太多愁善感的蠢貨。隨即他宣布要帶著弟兄們把森林翻過來找人，同時也再次請你出手相助──一定要在可怕的事發生之前，把 Gallien 找回來。</p>
      <p>你們在 South Shroud 的林間終於找到氣喘吁吁的 Gallien。他一邊喘，一邊警告你小心——你也立刻感覺到敵意逼近，緊接著有哥布林襲來。混亂之中，Meffrid 的吼聲穿透樹影，叫出 Gallien 的名字。Gallien 震驚地回應，問隊長為什麼會在這裡——你們不是應該繼續上路嗎。Meffrid 直接怒吼回去：你們是 Ala Mhigans，而 Ala Mhigans 從不拋下同伴，不管多艱難都一樣。他逼 Gallien 記起你們曾立下的誓言——奪回故土的誓言——並說你們要再踏上 Ala Mhigan 的土地，就必須一起踏上去；否則，誰也別想。Gallien 只能低聲答「是，隊長……」。Meffrid 命令他回到弟兄身邊，還撂下狠話：等你痊癒了，我一定打到你後悔我們把你找回來。臨走前，他鄭重感謝你救了 Gallien，並說會在 Quarrymill 等你回去。</p>
      <p>回到 Quarrymill 後，Meffrid 告訴你：Gallien 預計會完全康復。他們會暫時留在這裡，直到 Gallien 強到可以再次上路為止。即使他再怎麼不喜歡這個地方，也只能坦承——走投無路的人，沒有挑剔的本錢。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 梅夫里德　<small class="muted"> 黑衣森林南部林區 (X:25.6, Y:20.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="helping-horn.html">獸角製藥帶來的緣份</a></div>
      <div class="row">所有職業（不含限定職） 等級 27 以上</div>
    </div>`,
    followq:`<div class="stack">

    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
