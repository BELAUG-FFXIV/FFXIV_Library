<script>

const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Underneath the Sultantree',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Back at the Ul’dah Dispatch Yard, you find Papashan visibly agitated, his usual calm slipping as soon as he sees you. He starts to say that he has only just now received word, then abruptly cuts himself off and decides there is no sense in concealment anymore. Even before he had you deliver those pretzels, he admits, he had been privy to deeply unsettling news, and that was the true reason he sent you to meet the Sultansworn. A young noblewoman from a prestigious family has fled her home, and he has been ordered to see to her safe return. The Sultansworn you met earlier have been searching, but they have found no trace of her. Papashan apologizes for not being honest with you from the start, explaining that he feared careless words might let the story spread and draw in people with far less honorable motives. If any harm were to befall her, he says, no punishment—no matter how severe—would be enough to atone. That is something he cannot allow, and he begs for your help. When you agree, he thanks the Twelve aloud, saying he knew he could count on you. He has already instructed the others to expand the search, but Thanalan is vast and their numbers are few. The missing young noblewoman’s name is Lady Lilira, and Papashan asks you to head south toward the Sultantree and look for her in its vicinity.</p>
      <p>You follow his directions out into central Thanalan, making your way across the Spineless Basin to the Sultantree, the great, ancient symbol of Ul’dahn royalty standing lone and solemn amidst the desert. Beneath its boughs, you find a young woman in fine attire—Lady Lilira—gazing up at the sacred tree. You hear her address it as the spirit of her line and ask forgiveness for her weakness, blaming her failings for the steep price already paid. Before you can announce yourself, she suddenly calls for whoever is hiding to show themselves. A man steps out at her command, answering her as “O Lilira” and apologizing for his selfish desire to assure her welfare. She snaps that she does not remember asking for an escort and orders him to pretend they never met, but he refuses, insisting he cannot simply walk away. It is not safe here, he tells her; there is an aetheric disturbance in the area, as if the dead themselves were watching, and he has no intention of joining them. Then his attention shifts to you, and he recognizes you as the one Papashan mentioned. With an easy, wry tone, he congratulates you on finding their elusive charge and asks you to forgive “Her Impetuousness,” saying that what she lacks in discipline she more than makes up for in stubbornness. He suggests you return with them so the stationmaster can thank Lady Lilira’s protector in person—but almost in the same breath, he changes course. The stationmaster will have to wait, he says. For his sake, he asks Lilira to stay out of harm’s way, and for Lilira’s sake, he asks you to do the opposite and stay firmly in harm’s way as an uninvited presence stirs nearby.</p>
      <p>Shadows gather and twisted forms emerge, and together with the handsome stranger you face the voidsent that appear beneath the Sultantree. He calls out instructions in the thick of battle, telling you to leave the largest foe to him while you handle the rest, urging you to stay close if you want the benefit of his healing, complaining with dry humor each time more creatures arrive to test your so-called hospitality. Blow by blow, you cut down your attackers while he holds the attention of the greatest threat, steadily whittling it down until at last the last of the monsters falls. Just as you should be catching your breath, exhaustion sweeps over you instead. Too much aether spent, the stranger remarks as your legs give way. Darkness closes in, and instead of the desert sky, a boundless, shimmering sea of light surrounds you. In that otherworldly aetherial space, a distant yet intimate voice bids you hear, feel, and think, and addresses you as a bearer of crystal. The voice names itself as Hydaelyn, one being made of all, and speaks of a light that once shone across the realm but has since waned, allowing encroaching Darkness to rise and threaten the end of all life. For the sake of everything that lives, Hydaelyn implores you to deliver the world from this fate, telling you that the power to banish the Darkness resides in the Crystals of Light scattered across the realm. You are urged to journey forth, to act, and by your deeds allow those crystals to reveal themselves to you. The voice tells you to believe, for the light lives in your heart, and sends you back into the world with a final command to go forth and let that light shine upon all creation.</p>
      <p>When you come to, you are once again beneath the Sultantree, the sand and roots solid under your hands. The stranger is leaning over you, remarking that you are finally waking. Lady Lilira demands to know what the creature you fought was, and he answers that, if nothing else, it was something from the void—a voidsent—though the true question is not how it came here but who is responsible, because this is no work of simple bandits. He notes how you collapsed as soon as the beast fell and wonders aloud if the answer might have come to you in a dream. Too much aether, he says again, then muses about the Crystal, realizing that its involvement changes everything. Catching himself, he admits he was merely thinking aloud and declares that there is no time to waste; he must return and report at once. He leaves Lady Lilira in your care, trusting you to see her home safely. Stung at being treated like a helpless infant passed from hand to hand, Lilira protests that she can return and speak for herself. He yields with a playful “as you wish,” addressing her by her imperious temperament rather than her title, and remarks that he expects your paths will cross again before long. As a parting jest, he advises you to try staying awake next time, and then he is gone, leaving you and Lady Lilira to make your way back across the desert toward Ul’dah.</p>
      <p>Back at the Ul’dah Dispatch Yard, Papashan rushes to greet you both, relief written plainly across his face. He thanks the gods for your safe return and reminds Lady Lilira of what would happen if someone of her noble stature were injured—or worse. Her Grace the sultana would be beside herself with grief, and the people of Ul’dah would be weeping in the streets, he says. Lilira replies quietly that she has already given him and the people of Ul’dah cause to weep, but Papashan hurriedly begs her not to speak that way and swears that they will find what was lost. Though it is not his place to make demands of a lady of her standing, he implores her to stay out of harm’s way from now on. She apologizes for causing him such worry and promises to refrain from traveling without an escort in the future. Only then does Papashan turn his full attention to you, thanking you again and saying he has heard how bravely you fought to protect Lady Lilira from voidsent fiends. In his eyes, your gallant service deserves all the riches buried in the royal vaults, but all he can offer you is a modest token of his gratitude. When you mention the sarcastic man with the strange device strapped to his shoulder, Papashan recognizes the description immediately. That would be Thancred, he explains, a scholar who spends his days investigating unusual disturbances in the aether. The man is far too fond of his own voice for Papashan’s taste, but is perfectly harmless. As for you, he says, you are precisely the sort of adventurer Ul’dah needs. He prays that you will show the same kindness to the people of Thanalan as you did to them beneath the Sultantree today.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'ササガン大王樹の下で',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>「ウルダハ操車場」に戻ったあなたの前で、パパシャンはいつもの穏やかな表情を崩し、落ち着かない様子で口を開く。つい先ほど報せを受けたところだ、と言いかけた彼は、すぐに首を振り、もはや取り繕う時ではないと打ち明ける。実は、あなたにプレッツェルの配達を頼む前から、彼はある不穏な知らせを耳にしており、それこそが、あなたをサルタンズウォーンへ引き合わせた本当の理由だったのだという。名門貴族の令嬢が家出し、その身柄の安全な保護を命じられたこと。先ほどあなたが会ったサルタンズウォーンたちもすでに捜索にあたっているが、いまだ手がかりは何ひとつ見つかっていないこと。パパシャンは、最初から素直に説明しなかった非を詫びつつ、ことがことだけに、軽率な噂話として広まれば、よからぬ目的で彼女を追う者まで呼び寄せてしまいかねないのだと語る。もし令嬢に危害が加わるようなことがあれば、いかなる処罰を受けても償いきれないだろう──そんな事態だけは、決して許されない。そう言って彼は、あなたに力を貸してほしいと頭を下げる。あなたが頷くと、彼は十二神に感謝を捧げ、やはり頼れるのはあなただと思っていたのだと胸の内を明かす。すでに他の者たちには捜索範囲を広げるよう指示しているが、ザナラーンはあまりに広大で、人手が足りない。行方知れずの令嬢の名はリリラ。パパシャンは、あなたに南へ向かい、「ソルタンツリー」周辺で彼女を捜してほしいと頼むのだった。</p>
      <p>彼の言葉に従い、あなたは中央ザナラーンの「刺抜盆地」を南へ進み、やがて砂漠に聳え立つ王家ゆかりの大樹、「ソルタンツリー」のもとへと辿り着く。その根元には、気品ある衣服をまとった若い女性──レディ・リリラ──が佇み、系譜を見守る精霊としてソルタンツリーに語りかけている。自らの弱さを詫び、己の失敗が多くの犠牲を招いたのだと嘆くその声には、深い悔恨がにじんでいた。あなたが声をかけようとしたそのとき、彼女はふいに顔を上げ、物陰に潜む者に向かって姿を現せと鋭く呼びかける。命じられた通り姿を現した男は、「リリラ様」と彼女を呼び、あなたの身を案じて勝手に付き添ってしまったことを詫びる。彼に対し、リリラは護衛を頼んだ覚えはないと冷たく言い放ち、会わなかったことにして立ち去れと言うが、男は首を横に振る。この場は安全とは言えない、と。周囲には異様なエーテルの乱れが漂い、まるで死者の視線がこちらを窺っているかのようだと彼は告げる。そんな場所に、あなたひとりを残して立ち去ることなどできない──そう続けた彼の視線が、やがてあなたへと向けられる。男は、あなたこそパパシャンから話を聞いていた冒険者だと気づき、見事に行方知れずの令嬢を見つけ出してくれたと軽妙な口調で称え、「向こう見ずなお嬢様」の無鉄砲さを苦笑交じりに詫びる。駅長も、リリラの守護者に直接礼を言いたがるに違いないから、一緒に戻るべきだと促しながらも、彼はすぐに表情を引き締める。駅長への報告はあとで構わない、と。自分のためにもリリラには危険から離れていてほしいし、リリラのためにも、あなたにはあえて危険の中に留まってもらわねばならない──そう静かに告げた矢先、ソルタンツリーの下で、招かれざる存在が蠢き始める。</p>
      <p>薄闇の中から歪んだ影が姿を現し、「ヴォイド」由来の魔物たちが次々と襲いかかってくる。あなたは、件の男と肩を並べて戦いに身を投じることになる。彼は、最大の敵は自分が引きつけるから、あなたは周囲の雑魚を任せろと戦闘中も軽口を叩きながら指示を飛ばし、回復が必要なら自分の側から離れるなと声をかける。次から次へと魔物が現れるたびに、いくらなんでももてなしが過ぎる、と皮肉をこぼしつつも、彼は一瞬たりとも注意を緩めない。あなたは彼の言葉に従い、迫りくる敵をひとつひとつ打ち倒していく。やがて最後の魔物が崩れ落ち、戦いが終わりを迎えたその瞬間、本来なら息を整えるべきところで、あなたの身体は限界を迎えたかのように力を失う。使いすぎたエーテルのせいだろうと、男の声が遠くに聞こえる中、視界は闇に沈み、代わりに、光の海のような別世界が広がる。そこは果てしないエーテルの海であり、その中心で、遠くて近い不思議な声が、あなたに「聞け、感じろ、考えよ」と呼びかける。声の主は、自らをすべてを束ねる存在「ハイデリン」と名乗り、かつてこの世界に満ちていた光が弱まり、その隙を突くように闇が力を増し、やがてはすべての命を脅かそうとしていると告げる。彼女は、世界のためにこの運命からの解放を願い、そのための力が「光のクリスタル」に宿っていると教える。あなたに課せられたのは、旅立ち、行いを通じてそのクリスタルを探し当てること。たしかな行動によってクリスタルは自ら姿を現し、闇を祓う力となるのだと。光はすでにあなたの心に息づいているのだから、それを信じて進め──彼女はそう語り、最後に、世界のすべてにその光を届けるよう促しながら、あなたを現実へと送り返す。</p>
      <p>気がつけば、あなたは再びソルタンツリーの根元に倒れており、乾いた大地と木の根の感触が手のひらに戻ってくる。見下ろす男は、ようやく目を覚ましたかと肩の力を抜き、リリラは、先ほどの魔物はいったい何だったのかと問いただす。男は、詳細はわからないが、少なくともヴォイドから来た存在──いわゆる妖異の類だろうと答え、この場に現れた理由よりも、誰がそれを呼び寄せたのかこそが重要だと指摘する。こんなものを操れる相手が、ただの無学な盗賊であるはずがない、と。さらに彼は、魔物を倒した途端にあなたが眠り込んでしまったことに触れ、夢の中で答えを見たのではないかと冗談めかして首をかしげる。再び、使いすぎたエーテルのせいだろうと評しながらも、彼は「クリスタル」の可能性に思い至り、それが事態の意味を変えてしまうかもしれないと独りごちる。はっと我に返った彼は、そんなことを考えている場合ではないと姿勢を正し、すぐに戻って報告しなければならないと告げると、リリラの身をあなたに託す。ところが、幼子のように人から人へと預けられることに我慢ならないリリラは、自分のことは自分で話すと反発し、護衛扱いされることに強く抗議する。男は、ならばリリラの望む通りに、と皮肉交じりの敬称で彼女を呼び、そう遠くないうちに再び会うことになるだろうと告げる。次に会うときは、途中で眠り込まないように、と軽口を残して去っていき、ソルタンツリーの下には、あなたとリリラだけが残される。</p>
      <p>再び「ウルダハ操車場」に戻ると、パパシャンはふたりの姿を認めるなり駆け寄り、無事な帰還に神々への感謝を捧げる。高貴な身分の令嬢が傷ついたり、最悪の結果を迎えたりすれば、どれほどの騒ぎになるか、本人であるリリラに向かって真剣な口調で説く。女王陛下は深い悲しみに暮れ、人々は街路で涙を流すことだろう、と。これに対し、リリラはすでに自分はパパシャンやウルダハの民に嘆きの種を与えてしまっていると静かにこぼすが、パパシャンは、そんなことを口にしてはならないと慌てて制し、必ず失われたものを取り戻してみせると誓う。そして、本来ならば自分が口を挟む立場ではないと前置きしたうえで、どうかこれ以上危険な真似はしないでほしいと、改めて身の安全を懇願するのだった。リリラは、自分の軽率な行動が余計な心配をかけたことを詫び、今後は護衛なしに出歩かないと約束する。ようやく安心した様子のパパシャンは、今度はあなたに向き直り、レディ・リリラをヴォイド由来の魔物から守るために勇敢に戦ってくれたことに、どれほど感謝してもし足りないと頭を下げる。本来なら王家の宝物庫に眠る富すべてをもって報いるべきところだが、今はささやかな礼しか渡せないと、控えめな褒賞を差し出す。そこであなたが、肩に奇妙な装置を提げた皮肉屋の男のことを口にすると、パパシャンはすぐに心当たりがあると頷く。あれはサンクレッドという学者で、エーテルの異常を調べて各地を回っている男だと説明し、己の声が大好きで、つい喋りすぎるのが玉に瑕だが、害のない人物だと評する。そして最後に、彼はあなたこそが今のウルダハに必要な冒険者なのだと言い、ソルタンツリーの下で示してくれたのと同じ思いやりを、どうかこれからもザナラーンの人々に向けてほしいと、静かに祈るのだった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

      <div class="row"><b>クエスト発行</b> パパシャン　中央ザナラーン <small class="muted">(X:22.9, Y:27.8)</small></div>

    story:`<div class="clamp" data-collapsed="true">
      <p>回到 Ul’dah Dispatch Yard 之後，你很快就看出 Papashan 明顯心神不寧。看見你時，他先是脫口而出說自己才剛收到消息，隨即又搖頭，說已經沒有再隱瞞的餘地。其實在拜託你送 pretzels 之前，他就已經得知一則非常令人不安的消息，那才是真正把你介紹給 Sultansworn 的理由──一位出身名門的年輕貴族小姐離家出走，而他被命令必須確保她平安無事地被帶回。你先前遇見的那些 Sultansworn 也都在外頭全力搜尋，卻始終沒有任何線索。Papashan 為自己一開始沒有說實話向你道歉，解釋說這件事一旦在街頭被閒話傳開，肯定會吸引動機不純的人也加入追捕。他坦言，若是讓那位小姐受到哪怕一絲傷害，就算被處以再多次的斬首也難以補償，那種情況絕對不能發生。於是他懇求你伸出援手。你答應後，他當場向 Twelve 表示感謝，說自己果然沒有看錯人。雖然他已經指示其他人擴大搜索範圍，但 Thanalan 實在太廣，而他們人數又太少。那位年輕貴族小姐名叫 Lady Lilira，Papashan 希望你往南前進，到 Sultantree 一帶尋找她的蹤影。</p>
      <p>依照他的說明，你從 Dispatch Yard 出發，穿越 Central Thanalan 的 Spineless Basin，最後來到矗立在沙漠中的巨木 Sultantree──這棵象徵 Ul’dah 王家血脈的古老大樹，在風沙之中顯得格外莊嚴。樹下，一名身穿華麗服飾的年輕女子正在抬頭仰望樹冠，你很快就認出她正是 Lady Lilira。你聽見她以祖靈之樹的身分稱呼 Sultantree，向這份血脈的守護者請求原諒，說自己的軟弱已經付出了沉重代價。你還來不及上前打招呼，她便忽然轉身，朝某個隱身在陰影中的人喝道，要對方立刻現身。那名男子聽命走出來，以恭敬的語氣稱呼她 Lilira，坦承只是因為擔心她的安危，才會私自跟在身邊充當護衛。Lilira 冷冷回應自己並沒有請他護送，要他當作從未見過自己，立刻離開。然而男子卻斷然拒絕，說這裡並不安全，周圍出現異常的 aether 擾動，就像一群死者正在注視著這片空地，他也不打算現在就去當其中一員。說到這裡，他的目光轉向你，認出你就是 Papashan 提過的那位冒險者。男子半帶調侃地稱讚你果真成功找到這位難以捉摸的千金，還請你多多包涵這位「衝動的小少奶奶」，說她欠缺的是紀律，卻滿滿都是固執。他原本提議你和他們一同返回，好讓站長親自向 Lady Lilira 的守護者道謝，但話才說到一半就改了口：Stationmaster 只能先等等了。為了他自己，他希望 Lilira 暫時待在遠離危險的地方；為了 Lilira，他則需要你留在危險之中。就在這樣的話音落下時，Sultantree 下方那股不祥的氣息開始凝聚，某些不受歡迎的存在從陰影裡浮現。</p>
      <p>暗影在根部盤繞，扭曲的身影自沙塵中爬出，一群 voidsent 在樹下現形。你與這位外貌俊俏的陌生男子並肩迎戰，他一邊揮舞武器、一邊對你大聲下達指示，叫你把最大的那隻交給他來牽制，其他的敵人就交給你處理；若是想要他的治療，就別離他太遠。每當又有更多魔物湧出，他就用一種半真半玩的語氣抱怨「這樣的款待也太熱情了」，但手上的動作從未鬆懈。你依照他的節奏來回穿梭，把不斷逼近的敵人一隻隻斬倒。直到最後一隻魔物倒在沙地上，戰鬥才告一段落。照理說，你現在應該只需要調整呼吸，但疲勞卻像潮水一樣突然淹過全身，你的雙腿再也撐不住。男子遠遠的聲音說，是花費了太多 aether 的緣故，隨著視線逐漸黯淡，你不再看見 Thanalan 的天空，而是落入一片無邊無際、由光構成的海洋。在那個近乎空無的 aetherial 海中，一道既遙遠又親近的聲音呼喚你，要你傾聽、感受、思考，稱呼你為「Crystals 的持有者」。那聲音自稱為 Hydaelyn，是萬物合一的存在，說這片世界曾經被光包圍，如今那道光卻逐漸黯淡，讓黑暗趁機抬頭，企圖終結一切生命。為了所有生靈，她懇求你解救這個世界，並說驅散黑暗的力量就藏在各地的 Crystals of Light 之中。她要你踏上旅程，透過自己的行動與功績，讓那些水晶自行顯現。只要相信，光其實一直存在於你的心中。Hydaelyn 最後要你帶著這份光返回現世，將它照耀在整個世界之上，話音落下，你再次被推回現實。</p>
      <p>你醒來的時候，自己又躺在 Sultantree 的根部，指尖觸碰到乾裂的土地與粗壯的樹根。那名陌生男子正俯視著你，說你終於願意醒來了。旁邊的 Lilira 則忍不住質問剛才那隻怪物究竟是什麼，男子回答說雖然不清楚細節，但至少可以確定那是來自 The Void 的東西，也就是所謂的 voidsent。真正該問的不是「怎麼會出現在這裡」，而是「誰」把它帶來的，因為這種東西絕不可能是「沒念過書的山賊」能夠操控的。說著說著，他又提到你在怪物倒下之後立刻昏睡過去，半開玩笑地問你是不是在夢裡看見了答案，然後再一次把這件事歸咎於「aether 過量」。就在他沉思之際，似乎突然想到「Crystal」的可能性，覺得這會徹底改變整件事的意義，隨即察覺自己又開始自言自語。回過神來後，他說現在根本沒有浪費時間的餘裕，必須儘快回去報告，於是把 Lady Lilira 託付給你，請你護送她回去。被當成嬰兒一樣在人與人之間轉交，讓 Lilira 感到非常不滿，她憤然宣稱要親自回去說明一切，拒絕被當作包裹處理。男子只好順著她的意，半開玩笑地以她急躁的脾氣作為稱呼，說自己相信不久後一定還會再見到你們，並丟下一句「下次再見的時候，記得不要中途睡著」作為道別，便轉身離去，留下你與 Lilira 一起踏上返回 Ul’dah 的路。</p>
      <p>回到 Ul’dah Dispatch Yard 之後，Papashan 一眼看見你們兩人，立刻快步迎上前來，為你們平安返還而向眾神致謝。他語重心長地對 Lady Lilira 說，像她這樣尊貴身分的人，如果在外頭受傷，甚至遭遇更糟糕的情況，後果會有多嚴重──Her Grace the sultana 肯定會悲痛欲絕，整個 Ul’dah 的居民也會在街頭哭泣。Lilira 則低聲回應，自己早就已經讓 Papashan 和 Ul’dah 的人民為她落淚了。Papashan 聽見這句話，慌忙阻止她繼續說下去，表示她絕對不該這樣看待自己，並發誓他們一定會把那樣東西找回來。儘管以自己的身分並不適合對她提出要求，他還是鼓起勇氣懇求 Lilira，務必要遠離危險。Lilira 為讓大家過度擔心向他道歉，也承諾以後不再獨自外出。等到終於稍微放心之後，Papashan 才轉身面向你，再次向你表達最深的感謝，說他已經聽說你如何在 Sultantree 之下奮戰，從那些 voidsent 手中守護了 Lady Lilira。照理說，你這樣的英勇行動應該獲得整座王家寶庫的財富作為報酬，但他手邊能拿出來的只有一份小小的心意。你提起那位肩上綁著奇怪裝置、說話帶著諷刺語氣的男子時，Papashan 立刻明白你說的是誰──那人名叫 Thancred，是一位整天追蹤 aether 異常現象的學者。Papashan 認為他實在太喜歡聽自己說話，有時有點囉嗦，不過倒也算是個無害的人。至於你，Papashan 則說，你正是現在這片土地最需要的那種冒險者。他真心祈禱，你未來也能像今天在 Sultantree 所做的一樣，把同樣的溫柔與勇氣帶給整個 Thanalan 的人們。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
