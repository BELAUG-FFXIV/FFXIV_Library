  EN:{
    langLabel:'English',

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>After Gundobald’s rejection, you are not left alone for long. A man approaches with measured confidence and introduces himself as Gisilbehrt, the head of security at Little Ala Mhigo. He has already heard you tried to speak with Gundobald, and with a dry understanding smile he guesses the outcome—knowing the bristly old bear, you were likely told to bugger off.</p>
      <p>Gisilbehrt doesn’t pretend the refugees are easy to deal with. Hardship has taught them to trust no one but themselves, he explains, and even with guards watching the settlement day and night, his men can’t wring so much as a word of thanks from the people they protect. Still, he says, gratitude or no, he tries to help where he can. You seem like a decent sort, and if you tell him what brought you here, he might be able to lend a hand.</p>
      <p>When you explain you’re tracking a masked villain, Gisilbehrt admits the description doesn’t ring any bells. But he doesn’t dismiss you. He has men posted south of the settlement, keeping lookout for Amalj’aa, and if anything suspicious has been happening, they’re the likeliest to have seen it. He had meant to bring them each a cup of sweet Thanalan tea to lift their spirits—long patrols and hot winds grind a person down. If you deliver the tea in his stead, he says, they’ll be in a better mood, and far more willing to share what they know.</p>
      <p>So you take the errand, and the patrol posts show you the frayed edges of this place. At Broken Water, Osric greets you with hostility, snapping that he’s conserving energy and wants to be left alone. But when you offer the tea, the hardness cracks. He thanks you, surprised by the consideration, and when you ask about a masked villain, his suspicion blooms in a different direction: if there’s one hiding anywhere, he mutters, it’s among the refugees. The people of the settlement move like they’re dead on their feet, he says, and it’s almost impossible to read them. For all he knows, they’re all up to no good—words spoken less as evidence than as the bitter reflex of someone who expects betrayal from everyone around him.</p>
      <p>Further on in the Red Labyrinth, Yayazuke is a ball of nerves, shooing you away and warning that if the Amalj’aa overrun them, he’ll blame you. Yet the same offering of sweet Thanalan tea earns a startled softness. When you mention the masked figure, Yayazuke hesitates—then admits he did catch a glimpse of someone who fit that description during patrol. He couldn’t make out whether it was even a man, not with the mask and robe obscuring everything, but whoever it was appeared to be talking with some Ala Mhigans. Yayazuke assumed the figure was one of them.</p>
      <p>Not all reactions are helpful. Angry River, tense and watchful, challenges you the moment you approach—Amalj’aa or not? When you offer tea, he lights up at the aroma, savoring it like a memory he’s been denied for too long. But the moment you ask about a masked man, he shuts it down with blunt disdain. He doesn’t know, and he doesn’t care, he says—unless your suspect has dark scaly skin, stands ten fulms tall, and has the face of a lizard, it isn’t his problem. His focus is fixed on the threat he understands, and everything else is noise.</p>
      <p>When you return to Little Ala Mhigo, Gisilbehrt listens to what you managed to learn. It isn’t much—just a glimpse, an assumption, and a whole lot of mistrust—but it’s enough for him to draw the next, harder conclusion. If you want to go any further, you will need the cooperation of the Ala Mhigans themselves. And in a place like this, cooperation is not given. You will have to win their trust—and that, Gisilbehrt warns you, will not be an easy task.</p>
    </div>

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>グンドバルドに追い払われたあと、ほどなくして一人の男が近づいてくる。彼はジジルベルトと名乗り、リトルアラミゴの警備を取りまとめる者だという。あなたがグンドバルドに用があって話しかけたことも耳に入っており、あの刺々しい老熊のことだ、どうせ追い返されたのだろう――と、乾いた笑みで言い当てる。</p>
      <p>ジジルベルトは、難民たちが他人を信用しない理由を淡々と語る。苦難の積み重ねが、彼らに「自分たち以外は信じない」という生き方を刻み込んだのだ。警備の者が昼も夜も見張り続けていても、礼の一言すら返ってこない。それでも彼は、感謝されようがされまいが、できる限り人を助けたいと思っていると言う。あなたは悪い人物には見えないから、ここへ来た理由を話してくれれば力になれるかもしれない、と。</p>
      <p>仮面の悪党を追っていると告げると、ジジルベルトは心当たりがないと首をひねる。だが同時に、南方でアマルジャ族を警戒している見張り役がいるとも教えてくれる。もし不審な動きがあったなら、彼らが目にしているはずだ、と。彼は本来、士気を上げるために甘いザナラーンティーを一杯ずつ届けるつもりだったが、あなたが代わりにその用事を果たしてくれるなら、見張り役たちも気分が和らぎ、知っていることを話しやすくなるだろうと頼む。</p>
      <p>あなたは茶を携えて見張りのもとへ向かう。ブロークンウォーターでオズリックに声をかけると、彼は苛立った様子で、今は体力温存中だから構うなと言い放つ。だが茶を差し出した途端、その険しさが少しだけほどけ、気遣いに礼を言う。そして仮面の者について尋ねると、彼は根拠の薄い疑いを吐き出す。そんな奴がいるなら難民の中に紛れているに違いない、と。集落の連中は死んだような顔で歩き回り、何を考えているのかさっぱり分からない――だから皆が何か企んでいても不思議じゃない、というのだ。</p>
      <p>さらに赤の迷宮でヤヤズケに会うと、彼は神経質にあなたを追い払おうとし、アマルジャ族に襲われたらお前のせいだと叫ぶ。だが甘いザナラーンティーを受け取ると、驚いたように態度を改める。仮面の人物の話を出すと、彼は逡巡の末に、巡回中にそれらしい姿を見かけたと認める。仮面とローブのせいで男かどうかも判然としなかったが、もし男だとするなら、アラミゴの者たちと話していたように見えた。だから彼は、同じアラミゴの一員だろうと考えたのだという。</p>
      <p>一方で、怒れる川に話を振っても得られるものは少ない。彼はまずあなたを警戒し、アマルジャ族かと問い詰めるが、茶を差し出すと香りに歓声を上げ、久しぶりの甘味を噛みしめる。ところが仮面の男について尋ねると、興味がないと一蹴する。黒い鱗の皮膚で十ファルムもあるトカゲ面でもない限り、どうでもいい――彼の関心は、目の前の脅威だけに向いていた。</p>
      <p>リトルアラミゴへ戻り、ジジルベルトに得られた話を伝えると、彼はそれが決め手に欠けることを認めつつ、次の現実を突きつける。これ以上進むなら、アラミゴの者たち自身の協力が必要になる。だがこの地で協力を得るには、信頼を勝ち取らねばならない――そしてそれは容易ではない、と。</p>
    </div>

    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ギシルベールト少闘佐　<small class="muted">南ザナラーン (X:17.8, Y:13.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'外來者的奮鬥',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Gundobald 冷冷地下逐客令之後，你並沒有被晾在原地太久。一名神情沉穩的男子主動上前，自我介紹說他叫 Gisilbehrt，是 Little Ala Mhigo 的安全責任者。他聽說你剛去找過 Gundobald，語氣裡帶著一點心照不宣——以那頭「脾氣像刺蝟的老熊」來說，他完全不意外你會被叫去滾遠一點。</p>
      <p>Gisilbehrt 並不粉飾這裡的氛圍。他說 refugees 因為長期的苦難，只信自己人；就算他和他的手下日夜守著這個聚落，也很難從居民口中得到一句感謝。可不管對方感不感激，他仍盡量在能做的地方幫忙——而你看起來不是壞人，所以若你願意說明來意，他也許能出點力。</p>
      <p>你告訴他你在追查 masked villain。Gisilbehrt 皺眉想了想，承認自己沒有印象，但他立刻把注意力放到更可能的目擊來源上：他在聚落南邊安排了人手，負責警戒 Amalj’aa。若這附近有任何可疑行動，那些 lookout 最可能見過。他原本打算親自送每人一杯 sweet Thanalan tea，替他們提振士氣；如果你願意代他跑這趟差事，那些人心情好了些，或許也更願意把他們知道的事告訴你。</p>
      <p>你帶著茶走向那些哨點，也更清楚看見這片土地繃緊的神經。在 Broken Water，你碰到 Osric，他開口就是不耐煩，說他在省力氣，叫你別煩他。但當你把茶遞過去，他的語氣立刻鬆了一截，甚至有些意外地向你道謝。你問起 masked villain，他卻把疑心拋向聚落本身——若真有人藏著那種人，多半就是混在 refugees 裡。他說住在那裡的人走起路來像是「累到快死」，很難看出他們在想什麼；在他眼裡，大家都可能在搞鬼，這句話聽起來更像是疲憊與猜忌累積出的本能反應。</p>
      <p>你再往 The Red Labyrinth 走，Yayazuke 一見你就緊張得像被火燙到，揮手趕你走，還說如果 Amalj’aa 撲上來，他要怪你。但當你把 sweet Thanalan tea 交給他，他愣了一下，語氣也跟著軟下來。你提到 masked man，他遲疑片刻後承認：巡邏時他確實瞥見過一個符合描述的身影。因為面具和長袍遮得太嚴實，他甚至分不清對方是不是男人；但若假設是「他」，那人似乎正在和幾名 Ala Mhigans 交談。Yayazuke 便理所當然地以為那人也是 Ala Mhigan。</p>
      <p>不是每個人都願意被你牽著話題走。Angry River 一開口就先質疑你是不是 Amalj’aa，直到你否認，他才放你繼續。當你把茶遞給他，他立刻被那股香氣打動，像是很久沒有喝到這種甜味一樣，迫不及待要好好享受。但你一問 masked man，他馬上不耐煩地拒絕——他不在乎，也不想知道；除非那人皮膚黝黑有鱗、身高十 fulms、還長著蜥蜴臉，不然他連一點興趣都沒有。他的注意力只放在他熟悉且明確的威脅上，其他一概不管。</p>
      <p>你帶著這些零碎的回應回到 Little Ala Mhigo，向 Gisilbehrt 轉述。Gisilbehrt 聽完，只能承認這些線索薄得幾乎抓不住；但他同時也看清下一步的難處——若你想把調查往前推，你終究得讓 Ala Mhigans 願意跟你合作。而要在這裡取得合作，就得先得到他們的信任；在 Little Ala Mhigo，信任不是一句話就能換來的，他提醒你，那會是一條很難走的路。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
