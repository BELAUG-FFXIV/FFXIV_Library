const i18n = {

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
<p>Hardiboiled groans that it had to be oglops, while Hildibrand can’t stand the thought of “sweet, innocent” Nashu behind bars. Hardiboiled scoffs at calling a bomb-toting dame sweet or innocent, but agrees on the point that matters: you already know who you’re hunting—you just need to track the vandal down. Reports place an unusual wolflike fiend near a settlement whose name Hildibrand mangles into “Lure-them-in-your-trousers,” and Hardiboiled snaps it back into “Luwateninyawowza,” telling him to clean the wax out of his ears.</p>
<p>Back at Sheshenewezi Springs, Hildibrand has already changed into a fresh outfit—because a gentleman must always maintain a dignified appearance, and he just so happened to have a spare set. This time, you stay together and question locals about wolfman sightings. A rugged farmer says he saw the strange wolflike fiend steal a sack of freshly harvested vegetables—and notes it behaved “man-like,” looking around as if checking whether the coast was clear. Hildibrand wonders why a wolf would steal food instead of hunting, and Hardiboiled points out that whatever it is now, it used to be a man, so it may still eat like one—and if it doesn’t want to hunt, it would keep close to settlements.</p>
<p>A kindly villager mentions not a wolf fiend, but an adorable squealing little creature that acted like it was trying to communicate. Hildibrand instantly declares it a promising lead and decides it must be a minion of the wolfman. Hardiboiled sighs and calls it another “soft-boiled guess,” saying he heard about squealing critters back in True Vue and doubts it’s connected. Still, the villager adds that a friend went looking for the squealing creature and has been gone a while—suggesting something odd is happening nearby.</p>
<p>A hardy woman gives the clearest lead: she has seen the wolflike fiend south of town, near lunyucaua’pya territory—an area most people avoid, though she goes there to gather cactus. She saw the creature heading toward a gorge, and even the lunyucaua’pyas give it a wide berth. Hardiboiled decides the fugitive may be holed up there, and you head out into the Yawtanane Grasslands.</p>
<p>At the suspected lair, Hardiboiled says the cauahealoa isn’t present, but he can “feel” this is where it rests. You split up to search for clues and find a trail of petty theft and discarded evidence: a sack of produce laden with vegetables likely stolen from Luwateninyawawsa, an empty liquor bottle drained to the last drop, and a scrap of paper covered in crude writing—guarded for a moment by an oglop that scurries off. The paper turns out to be diary entries from the fugitive, and Hardiboiled reads them aloud. The vandal boasts of reducing a barn to rubble in moments, marvels at his newfound strength, and writes that “the researcher” contacted him—ordering a bigger show and offering barrels of ceruleum for the job, which he calls his “tour de force.”</p>
<p>The diary confirms what you feared: like the thieving eyeclops, the vandalizing cauahealoa is working for the researcher. Hildibrand remarks that leaving incriminating evidence out in the open seems careless, but Hardiboiled says this idiot did the same thing when he was human—left a diary lying around, which sealed his conviction—so doing it again is either a “clever design” or, more likely, he’s simply an idiot. Hildibrand, however, focuses on the danger: barrels of ceruleum mean a single spark could cause an explosion even larger than Nashu’s Delights, and he asks you to refrain from using your gun. Hardiboiled counters that his electrope firearm can convert its lightning charge into other energies—fire and water rounds included—so if it comes to it, he’ll hose the wolfman down.</p>
<p>Hildibrand insists he opposes violence in all forms and elements, holding to his creed of solving cases like a gentleman. Hardiboiled’s tone hardens, and he breaks his rule about speaking of the past. He once had an assistant—sweet, like Nashu—and she was killed by the Crime King because Hardiboiled was too soft. The Crime King, Carnelian, descended from a line of mages and could cast powerful spells with only a whispered word and a flick of the wrist. Hardiboiled and his assistant had Carnelian at their mercy, but Carnelian spun a sob story and Hardiboiled lowered his gun. Carnelian seized that opening, cast a spell, and would have killed Hardiboiled—if his assistant hadn’t leapt in the way. She wasn’t wearing a regulator because she followed Hardiboiled’s lead, and he blames himself as much as Carnelian. He later caught Carnelian, but now the bastard is loose again in a fiend’s body. His warning is blunt: you can’t afford to be soft with villains, or someone you care about will pay.</p>
<p>With the diary evidence in hand, Hardiboiled wants to alert the Dustwatch—so they’ll be ready when the vandal strikes next. You head to Hhusatahwi, and Hildibrand—still shaken by Hardiboiled’s confession—struggles for words until you prompt him to stay true to himself.</p>
<p>At Hhusatahwi, you find Nashu in custody and…snacking happily. Kemakka tells you something urgent: they just received a message from someone claiming to be the vandal, declaring the train as the next target. He was about to dismiss it as a prank, but your report changes that—he now believes the threat is real. Hardiboiled orders an immediate sprint to Shaaloani Station. Hildibrand, though eager to free Nashu, agrees she should stay put for now while you stop the attack.</p>
<p>At Shaaloani Station, frightened locals beg you to save the train. The vandalous cauahealoa appears and threatens to torch barrels filled with ceruleum—enough to blow everyone sky-high. Amid the chaos, something goes wrong: a painful yowl, flames, and the immediate need to extinguish the fire. The train begins to run away, and Hildibrand throws himself into stopping it—despite Hardiboiled being out of charge and unable to use his gun. Hildibrand’s “electrifying handstand” becomes the deciding move, and when it’s over, Hardiboiled—breathless—admits Hildibrand did good, even if he calls him “softy.”</p>
<p>The vandal yields, claiming he was only following orders and doesn’t know the researcher’s identity. Hardiboiled decides to hand him over to the Dustwatch—stressing that despite appearances he was originally a man and should be treated as one. Kemakka arrives late but takes in the scene, thanking you for the help. Then the truth snaps into focus: the “sheriff” is interrupted—because Kemakka has been knocked out, and the villain disguised himself as one of Kemakka’s men. Hardiboiled recognizes him instantly: Carnelian. The station crisis was a diversion, meant to gather you here. You return to Hhusatahwi to free Nashu, only to receive worse news: while everyone was distracted, a large shipment of ceruleum was stolen from Sheshenewezi. Hardiboiled realizes the train threat was never the true target.</p>
<p>Now the pattern is undeniable: first electrope, now ceruleum. What does the researcher need all these resources for? Hardiboiled believes Carnelian is not the type to serve another man’s bidding without his own angle. Kemakka admits the Dustwatch can’t pursue beyond their jurisdiction, so he asks you to take the case beyond Shaaloani. Hardiboiled starts to accept, and Hildibrand grandly swears—again—to apprehend the villain with “grace and nonviolent finesse.” Kemakka agrees to investigate locally and share anything they learn.</p>
<p>Back in Solution Nine, Hardiboiled returns to working the storage device for more leads. Hildibrand tells him not to blame himself for his assistant, but Hardiboiled grumbles that a “soft-boiled dope” wouldn’t understand—and tells him, instead, to take care of his own. Elsewhere, the scheming researcher praises the fugitives’ usefulness, and Carnelian confirms he has been serving his own interest as well. The episode ends with Hardiboiled proudly explaining every lovingly customized feature of his electrope firearm—until Nashu declares she’s getting sleepy and calls it a day.</p>
</div>

  JP:{
    langLabel:'JP',
    pageTitle:'つかえる紳士',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
<p>ハルディボイルドは「なんでよりによってオグロップなんだ……」と呻き、ヒルディブランドは「罪なきナシュが牢に入れられているなど耐えられない」と焦る。ハルディボイルドは「爆弾を持ち歩く女に“清純”も“無垢”もない」と切り捨てつつも、狙うべき相手が破壊魔のカウアヘアロアであることは一致している。目撃情報は、例の狼のような魔物が「ルワテンイニャウォウザ」近辺に現れたというものだが、ヒルディブランドは地名を盛大に聞き間違え、ハルディボイルドに耳の垢を取れと叱られる。</p>
<p>シェシェネウェジ・スプリングスに戻ると、ヒルディブランドはもう着替えを済ませている。紳士たるもの身だしなみは常に整えるべきだと胸を張り、たまたま予備を持っていたのだと言う。今度は三人で行動し、住民に「狼のような魔物」の目撃談を聞き込む。農夫は、見たこともない狼型の魔物が収穫した野菜の袋を盗んでいったと話し、周囲をうかがう仕草がどこか人間じみていたとも言う。ヒルディブランドは「狼なら狩りをするのでは」と首をかしげるが、ハルディボイルドは「中身は元は人間だ。食い方も人間のままでも不思議はない」と現実的に返す。狩りをしないなら、食糧のある集落の近くに居つくはずだ、と。</p>
<p>別の住民は、狼ではなく「キィキィ鳴く小さくて可愛い生き物」を見たと言う。ヒルディブランドはすぐ「破壊魔の手下だ」と決めつけるが、ハルディボイルドは真面目に取り合わない。ただし、その住民の友人がその生き物を探しに行ったきり戻っていないという話は、不穏な影として残る。</p>
<p>決定的な手掛かりは、サボテン採りの女性からもたらされる。彼女は南の、ルニュカウア’ピャの縄張り付近で狼型の魔物を見た。普通は避ける場所だが、彼女はそこへ通う。何度か見かけた魔物は峡谷へ向かっており、ルニュカウア’ピャですら近寄らないほど危険らしい。ハルディボイルドは「潜伏先はその峡谷だ」と判断し、ヤウタナネ草原へ向かう。</p>
<p>現地でハルディボイルドは「今はいないが、ここが寝ぐらだ」と確信し、手分けして痕跡を探す。集落から盗まれた野菜の袋、飲み干された酒瓶、粗雑な文字が書かれた紙切れ――そして紙切れの近くにオグロップがうろつき、やがて逃げ去る。紙には破壊魔の日記が書かれていた。ハルディボイルドが読み上げると、納屋を瞬く間に瓦礫にしたこと、新しい怪力への陶酔、研究者から「より大きな見世物をしろ」と命じられ、仕事のためにセリュームの樽を用意すると言われたことが記されている。これで破壊魔も研究者の手駒であることが確定する。</p>
<p>ヒルディブランドは「証拠を堂々と放置するのは不用心だ」と首をひねるが、ハルディボイルドは「人間だった頃も同じことをして捕まった」と言い、策略か、ただの馬鹿か、と吐き捨てる。ヒルディブランドはセリュームの危険性を強調し、火花一つで大爆発になりかねないから銃は使わないでほしいと頼む。ハルディボイルドは逆に、自分の電気銃は雷撃を火や水など他の属性弾に変換できる、と説明し、「必要なら水でぶっかけてやる」と言い切る。</p>
<p>しかしヒルディブランドは「いかなる属性であれ暴力は反対だ」と主張し、紳士的解決こそ信条だと譲らない。そこでハルディボイルドは、普段語らない過去を語り始める。かつて彼にも助手がいた。ナシュのように心優しい女性だったが、彼が“甘かった”せいで、犯罪王に殺された。犯罪王の本名はカーネリアン。魔術師の家系で、囁きと手振りだけで強力な魔法を放つ。ハルディボイルドと助手はカーネリアンを追い詰めたが、泣き落としに騙されて銃を下ろした。その隙に放たれた魔法から彼を守るため、助手が身代わりになった。レギュレーターを着けていなかったのも、彼のやり方に従ったからだ――彼は自分が殺したも同然だと悔いる。後にカーネリアンは捕らえたが、今や再び魔物の身体で野放しになっている。悪党相手に甘さは許されない、さもなくば大切な者が代償を払う――それが彼の結論だった。</p>
<p>ひとまず次の破壊を防ぐため、ハルディボイルドはダストウォッチへ警告しようと言い、フサタフウィへ向かう。牢のナシュは驚くほど元気に食事を楽しんでいるが、ケマッカは急報を伝える。破壊魔を名乗る者から「次は列車を狙う」という宣言が届いたのだ。冗談だと思っていたが、あなたたちの報告で本物だと判断し、即座にシャーローニ駅へ向かうことになる。ヒルディブランドはナシュを思いながらも、今は彼女を留置したまま、列車の危機を止める決断をする。</p>
<p>駅では、破壊魔がセリュームの樽に火を付けると脅し、全員を吹き飛ばすと笑う。だが事態は急変し、火を消し、暴走する列車を止めなければならなくなる。ハルディボイルドは弾切れ・充電切れで銃が使えず、ヒルディブランドが身体を張って列車を止める。決着後、ハルディボイルドは息を切らしながら「お前、よくやった」と認める。破壊魔は命を救われたと礼を言い、命令に従っただけで研究者の正体は知らないと告白する。彼はダストウォッチに身柄を預けることになり、ケマッカも「元は人間だったなら人として扱う」と約束する。</p>
<p>しかし本当の問題はここからだった。ケマッカの姿をした男が不敵に振る舞い、実はケマッカは部下に化けた悪党に倒されていたと判明する。ハルディボイルドは叫ぶ――「お前はカーネリアン！」列車騒動は陽動で、狙いは別にあった。フサタフウィへ戻ってナシュを釈放した直後、シェシェネウェジから大量のセリュームが盗まれたと報が入る。駅の事件こそが真の標的を隠すための煙幕だったのだ。</p>
<p>電気石に続き、今度はセリューム。研究者は何を企んでいるのか。しかもカーネリアンは誰かの手駒になるような男ではない、とハルディボイルドは見る。ケマッカは、管轄外まで追うのはダストウォッチには難しいので、この件はあなたたちに託すのが最善だと判断する。ハルディボイルドが引き受けようとすると、ヒルディブランドが例によって大仰に「優雅に、非暴力で捕らえる」と誓い、ケマッカは苦笑しつつ協力を約束する。</p>
<p>ソリューション・ナインに戻ると、ハルディボイルドは引き続き装置の解析に戻り、あなたには時折様子を見に来るように言う。ヒルディブランドは彼の過去を責めず自分を責めるなと諭すが、ハルディボイルドは「甘い奴に何が分かる」と突っぱね、せめて自分の助手を守れとだけ言い残す。別の場所では、研究者が計画の進展に満足し、カーネリアンも「お前も俺も得をしている」と言わんばかりに応じる。最後はハルディボイルドが自慢の電気銃の機構を延々語り、ナシュが眠くなったと言って強制終了するのだった。</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>Hardiboiled 一開口就先哀號：「為什麼偏偏是 oglop……」Hildibrand 則完全受不了 Nashu 被關著的想像，說你們必須立刻抓到真正的罪犯，讓她盡快獲釋。Hardiboiled 嘴上吐槽「帶著像炸彈一樣的東西到處跑的女人」怎麼可能叫「甜美」或「無辜」，但他也承認——你們現在已經知道目標是誰：那個被移植進 cauahealoa 身體的破壞魔。接下來只差把人逮到而已。</p>
<p>根據居民的目擊，那隻「不尋常的狼型怪物」曾出現在某個聚落附近。Hildibrand 把地名聽成一串荒唐的音，硬是說成像「把人引進褲子裡」那樣的怪話，Hardiboiled 立刻糾正他：那叫 Luwateninyawowza，叫他把耳朵裡的耳屎清乾淨再講話。Hildibrand 還嘴硬說自己就是那個意思，然後兩人帶著你立刻動身回 Sheshenewezi Springs。</p>
<p>回到 Springs 時，Hildibrand 已經換上乾淨的新衣。他一本正經地解釋：紳士能做的，就是盡可能隨時維持體面與尊嚴——而他「剛好」也帶著一套備用服裝。Hardiboiled 決定這次不要分頭了，三個人一起問清楚「狼男」的目擊情況。</p>
<p>你們先問到一名粗獷的農夫：他確實看見那隻狼型怪物——而且牠偷走了剛收成的蔬菜袋。Hildibrand 覺得奇怪：狼不是該自己狩獵嗎？Hardiboiled 的回應很直接：不管牠現在是什麼，牠以前是人；還保留「像人一樣吃東西」的習慣也不奇怪。若牠不想狩獵，就更可能靠近聚落，盯著現成的食物下手。那名粗獷的農夫也補上一句：那怪物確實有點「像人」——例如會左右張望，確認附近沒人，才動手偷走蔬菜。</p>
<p>另一名村民說，他看到的不是狼型怪物，而是一隻很可愛、一直尖叫的小東西，像是在努力對他表達什麼。Hildibrand 立刻精神一振，說這是重要新線索，甚至斷言那一定是「破壞魔狼男的使魔」。Hardiboiled 只想嘆氣，說這種「軟趴趴的推理」他聽多了——True Vue 那裡也有人提過怪叫的小生物，但他不覺得跟這案子有關。只是那名村民又提到：他有個朋友跑去找那隻怪叫的小生物，已經很久沒回來了——這件事讓氣氛瞬間變得不太對勁。</p>
<p>接著，一名健壯的女子給了你們最明確的方向：她在南邊見過那隻狼型怪物。大多數人會避開那裡，因為那一帶是 lunyucaua’pya 的地盤，但她需要去那裡採仙人掌。她說自己最近幾次過去時，都看見那隻怪物往峽谷方向走；更可怕的是，連 lunyucaua’pya 都刻意避開牠——代表牠很可能相當危險。Hardiboiled 立即判斷：那峽谷很可能就是牠躲藏的地方，要你們立刻出發。</p>
<p>你們抵達 Yawtanane Grasslands 後，Hardiboiled 先確認：「那隻 cauahealoa 目前不在，但這裡肯定是牠休息的地方。」他說自己「感覺得到」，然後要你分頭找線索，找到任何東西就回報。你很快在附近發現幾個明顯的痕跡：一袋蔬菜（看起來就是從 Luwateninyawowza 偷來的）、一個早就喝乾的酒瓶、以及一張寫著粗糙字句的紙。紙旁還有一隻 oglop 徘徊，像是在盯著那張紙與你；你一靠近，它就迅速溜走，留下你把注意力放在紙上——那竟然是破壞魔留下的日記。</p>
<p>你把酒瓶、蔬菜袋、紙條交給 Hardiboiled。Hardiboiled 說你做得好，確認那些東西就是從聚落偷來的，而那張紙——他當場念給你們聽。日記裡，破壞魔得意洋洋地寫著自己又完成了一次「精彩的破壞」，短短幾瞬就把穀倉轟成瓦礫，還沉醉於「新獲得的驚人力量」。更關鍵的是：那個研究者聯絡了他，要求他搞出「更大的表演」，並會提供一桶桶的 ceruleum，讓他完成自己的「代表作」。Hardiboiled 立刻下結論：跟偷 electrope 的 eyeclops 一樣，這個 cauahealoa 破壞魔也確實在替研究者做事。</p>
<p>Hildibrand 卻抓著另一個點：把罪證就這樣放在外面，讓你們這些「有心的偵查者」一眼就撿到，未免太粗心了吧？Hardiboiled 冷冷回他：這傢伙當人時就犯過同樣的蠢——他曾把自己的犯罪日記隨手丟著，成了鐵證，直接把自己送進牢裡。如今明知道那次就是因為日記才翻車，卻又再做一次；不是有什麼詭計，就是——他單純是個白痴。</p>
<p>Hildibrand 隨即提醒你們 ceruleum 的危險：只要一點火花就可能引發大爆炸，規模甚至會比 Nashu’s Delights 還誇張，所以他希望你不要用槍。Hardiboiled 不以為然，說他的槍比你想的更「多功能」：它能把吸收的雷電轉換成其他能量，切換一下就能射出火彈、水彈——如果真的逼不得已，他會直接把那個狼男「用水澆醒」。</p>
<p>Hildibrand 仍堅持自己反對任何形式、任何屬性的暴力，強調「以紳士的方式破案」才是信條。Hardiboiled 聽到這裡，語氣忽然變得沉重，甚至破例談起過去。他說自己以前也有個助手——很像 Nashu，真的是個好人。但她已經不在了：她是被 Crime King 害死的，而原因在於他「太軟」。Crime King 的真名是 Carnelian，出身魔法師家系，能用低語與手勢施放強大的魔法。當年 Hardiboiled 與助手曾把 Carnelian 逼到絕境，但 Carnelian 開始演一段悲情故事，Hardiboiled 放低了槍口。那一瞬間就夠了——Carnelian 立刻施法，Hardiboiled 幾乎當場喪命；若不是助手跳出來擋下，死的人就是他。更痛的是：助手沒戴 regulator，是因為她跟著 Hardiboiled 的做法；Hardiboiled 說自己跟 Carnelian 一樣，都「親手」害死了她。</p>
<p>Hardiboiled 後來雖然抓到了 Carnelian，可如今那混帳又在外頭逍遙——還在「怪物的身體」裡。他把話講得很直：面對惡徒，你不能再這麼軟；否則某一天，你或你珍惜的人就會付出代價。講完這段，他回到眼前的現實：你們得提醒 Dustwatch，讓他們準備好應對下一次襲擊。於是你們趕往 Hhusatahwi。</p>
<p>到了 Hhusatahwi，你們看到 Nashu 仍在拘留中，卻出乎意料地吃得很開心。Kemakka 帶來急報：有人自稱破壞魔，宣告下一個目標是火車。原本他想當成惡作劇丟掉，但聽完你們的回報，他相信威脅很可能是真的。Hardiboiled 立刻要求衝去 Shaaloani Station。Hildibrand 雖然心繫 Nashu，也同意先把她留在此處，先阻止襲擊。</p>
<p>Shaaloani Station 的人們驚恐求救。破壞魔 cauahealoa 出現，威脅要點燃裝滿 ceruleum 的桶子把所有人炸上天。混亂中火勢起來，必須先滅火，火車也開始失控狂奔。Hardiboiled 偏偏在此時電量耗盡無法用槍，Hildibrand 卻不顧一切衝上前阻止列車，用他那套誇張到極致的身法硬是扭轉局面。事後 Hardiboiled 氣喘吁吁，仍承認 Hildibrand 做得不錯，就算嘴上還是叫他「軟蛋」。</p>
<p>破壞魔投降，說自己只是奉命行事，不知道研究者的身分。Hardiboiled 決定把他交給 Dustwatch，並強調他原本是人，應以人的方式對待。Kemakka 趕到現場表示感謝。可真相隨即翻轉：所謂的「Kemakka」被打斷——因為真正的 Kemakka 已被擊昏，惡徒假扮成他的部下混了進來。Hardiboiled 立刻認出來：那是 Carnelian。車站危機只是誘餌，真正目的是把你們引來這裡。</p>
<p>你們趕回 Hhusatahwi 釋放 Nashu，卻收到更糟的消息：你們忙於車站時，Sheshenewezi 的大量 ceruleum 被偷走了。Hardiboiled 這才明白：火車威脅從來不是主要目標。</p>
<p>先是 electrope，現在又是 ceruleum——研究者到底想用這些資源做什麼？Hardiboiled 認為 Carnelian 不可能甘心替人賣命，他一定另有盤算。Kemakka 也承認 Dustwatch 無法跨區追擊，只能把後續委託給你們。Hildibrand 又一次高聲宣誓要以「優雅、非暴力的巧妙手段」逮捕惡徒，Kemakka 則表示會在本地徹查並分享情報。</p>
<p>回到 Solution Nine，Hardiboiled 重新投入儲存裝置的解析。Hildibrand 試著勸他別為助手的事自責，Hardiboiled 卻冷哼說「軟趴趴的傢伙」不會懂，只提醒他好好照顧自己的助手。另一邊，研究者稱讚逃犯們很有用，Carnelian 也坦白自己同樣在追求自身利益。最後 Hardiboiled 又開始滔滔不絕介紹他的 electrope 槍的改裝細節，直到 Nashu 聽得犯睏，乾脆宣布今天到此為止。</p>
</div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
