<script>

const i18n = {
  EN:{
    langLabel:'English',

    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>You listen as Haurchefant speaks plainly: by now, it is clear that the High Houses of Ishgard—including House Fortemps—either cannot or will not offer you formal help in your search. Yet he is certain that within each house there are influential individuals who might still be sympathetic to your cause, even if the houses themselves keep their distance.</p>
      <p>He tells you he will send missives to their representatives in Ishgard, but he suspects it will be quicker—and more efficient—if you make inquiries on your own. He names three people for you to seek out: Lady Ninne of House Fortemps here at Camp Dragonhead, who enjoys the company of travelers; Cravellin of House Haillenarte at Skyfire Locks, though anything you draw from the scribe may be difficult to parse; and the chief astrologian of House Durendaire, who may prove more accommodating once he knows you are a friend of House Fortemps. As for House Dzemael, he insists you need not concern yourself—he will contact them himself.</p>
      <p>Before you go, Haurchefant urges you to slow down and take care of yourself. He invites you to warm yourself by the hearth and rest from your journeys, warning that life is not a race—rush forward without concern for your health, and one day you will pay the price.</p>
      <p>When you speak with Lady Ninne at Camp Dragonhead, she greets you warmly, but quickly admits she knows nothing about the airship you seek. She insists that if anyone in House Fortemps knew, she would certainly know as well. What everyone is talking about instead is young Lord Francel—what will become of him, and whether the allegations now swirling are long overdue, especially with so many members of House Haillenarte recently found guilty of heresy.</p>
      <p>At Skyfire Locks, Cravellin sounds strained and desperate, calling on Halone for strength before he realizes who you are. When he learns you are a friend of Lord Haurchefant, he wants to help—he truly does—but House Haillenarte has been thrown into chaos by accusations of heresy. For now, he says, they must focus on fighting the charges and preserving their reputation.</p>
      <p>At the observatorium, you find Forlemort sharp and unyielding. He acknowledges that Haurchefant’s missive praises you highly, but he refuses to treat that endorsement as permission to ignore Ishgardian policies. Ishgard is at war, he reminds you, and the enemy grows bolder by the day; since Inquisitor Guillaime arrived in Coerthas, countless heretics have been uncovered, even among the elite. If Haurchefant wishes to spend his days chasing a long-lost airship, that is his choice—but if he expects others to share in what Forlemort calls folly, then Haurchefant is blind to the present state of affairs.</p>
      <p>You return to Camp Dragonhead, and Haurchefant reads your face before you even speak. By your countenance, he says, you learned nothing of use. He admits he has fared no better: all of Coerthas seems consumed by talk of heretics in the High Houses. All that remains is to hope his sources in Ishgard itself will provide something more pertinent.</p>
    </div>

  JP:{
    langLabel:'日本語',
    pageTitle:'あの日の空に見たものは',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>オルシュファンは率直に語る。あなたもすでに悟っているだろうが、イシュガルドの上級貴族――フォルタン家を含め――は、あなたの探索に対して公式な支援を与えられない、あるいは与える意思がない。だがそれでも、各家の内には、あなたの志に理解を示す影響力ある人物がいるはずだ、と彼は言う。</p>
      <p>彼はイシュガルドにいる各家の関係者へ書状を送るつもりだが、あなた自身が動いたほうが早く、効率的だろうとも告げる。カンプ・ドラゴンヘッドに住むフォルタン家のニンヌ夫人は旅人と語らうのを好み、スカイファイア・ロックにはエレンヴィル家の書記クラヴェランがいる。ただし彼から引き出せる情報は解釈が難しいかもしれない。さらにデュランデル家の首席星占師にも会ったか、と問われ、まだだと知ると、フォルタン家の友であることを伝えれば、いくらか態度も軟らぐだろうと続ける。ジェマイエル家については気にするな、彼が自ら連絡するという。</p>
      <p>出立の前に、オルシュファンはあなたの身を案じて言葉を添える。炉辺で温まり、旅の疲れを癒せ、と。人生は競争ではない――健康を顧みずに盲目的に突き進めば、いつかその代償を払うことになるのだ、と。</p>
      <p>カンプ・ドラゴンヘッドでニンヌ夫人に話を聞くと、彼女は丁寧に挨拶しつつも、探している飛空艇については何も知らないと言い切る。もしフォルタン家の誰かが知っているのなら、彼女が知らぬはずがない、と。いま人々の口に上るのは別の話題で、若きフランセル卿がどうなるのか、そして近ごろ多くのエレンヴィル家の者が異端として有罪になっているだけに、あの糾弾は遅すぎたくらいだと語る者もいる、という。</p>
      <p>スカイファイア・ロックのクラヴェランは切迫した様子で、ハルオーネに力をと祈りながら何とかできる道を探しているところだった。あなたがオルシュファン卿の友だと知ると、助けたい、本当に助けたいのだと言う。だが異端の嫌疑がエレンヴィル家を混乱へ落とし込み、いまは告発に対抗し、名誉を守ることに注力しなければならないのだと訴える。</p>
      <p>観測所で会ったフォルルモーは厳格だった。あなたがオルシュファンの書状により高く評価されていることは認めるが、それでイシュガルドの方針を無視できると思うな、と言い放つ。イシュガルドは戦時下にあり、敵は日ごと大胆になっている。ギヨーム審問官がクルザスに来てからというもの、上流貴族の中にさえ異端が次々と見つかっているのだ。失われた飛空艇を追うことに日々を費やすのはオルシュファンの勝手だが、他者までその愚行に巻き込もうとするなら、彼は現状に目が向いていないのだ、と。</p>
      <p>あなたがカンプ・ドラゴンヘッドへ戻ると、オルシュファンはあなたの表情を見て察する。役に立つ情報は得られなかったのだろう、と。彼自身も同様で、クルザス全体が上級貴族の異端の噂に飲み込まれているのだと言う。あとはイシュガルド本国にいる彼の情報源が、より的確な手掛かりをもたらしてくれることを願うしかないのだと。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> オルシュファン　<small class="muted">クルザス中央高地 (X:26.7, Y:17.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="in-the-eyes-of-gods-and-men.html">異端は魔女の谷に消ゆ</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 38～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="ye-of-little-faith.html">前哨地の歓待</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'天上飛過之物',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Haurchefant 坦白地告訴你：你想必已經看得很清楚，Ishgard 的 High Houses——包括 House Fortemps——不是無法、就是不願意在「正式層面」給你任何協助。可這並不代表每個家族裡都沒有願意站在你這邊的人；在那些家族之中，仍然可能有具影響力、也同情你處境的個人。</p>
      <p>他說自己會把書信送往 Ishgard，聯絡各家的代表，但若要更快、更有效率，你最好也親自去打探消息。他點名要你去見三個人：住在 Camp Dragonhead、喜歡和旅人交談的 House Fortemps 的 Lady Ninne；在 Skyfire Locks 的 House Haillenarte 的 Cravellin——只是就算你從那位書記口中撬出線索，恐怕也不容易理解；以及 House Durendaire 的 chief astrologian。你若還沒跟對方談過，他認為等他通知對方你是 House Fortemps 的朋友後，對方或許會更願意配合。至於 House Dzemael，他要你別操心——那一邊由他親自聯絡。</p>
      <p>在你動身前，Haurchefant 又用更溫和的語氣提醒你：先在爐火旁暖一暖、好好休息一下，別把旅途當成競賽。他說人生不是賽跑——若你不顧健康、只是一味盲目往前衝，總有一天會付出代價。</p>
      <p>你在 Camp Dragonhead 找到 Lady Ninne。她向你問好，卻立刻坦承自己對你要找的 airship 一無所知；她甚至斬釘截鐵地說，若 House Fortemps 真的有人知道，你不可能繞過她。可她也告訴你，眼下人們議論的焦點並不是 airship，而是年輕的 Lord Francel 將會如何。有人說那些指控早就該來了，畢竟近來已有不少 House Haillenarte 的人被判定犯下 heresy。</p>
      <p>接著你前往 Skyfire Locks。你見到 Cravellin 時，他正焦急得幾乎要向 Halone 求救，似乎還在苦思是否有轉圜之道。當他得知你是 Haurchefant 的朋友，立刻表示自己真的想幫你——可現在的 House Haillenarte 因 heresy 的指控而陷入混亂，他說他們必須先集中全力應對這些指控，守住家族名聲。</p>
      <p>在 observatorium，你面對的是態度冷硬的 Forlemort。他承認 Haurchefant 的書信對你讚譽有加，但也直言：別以為有這份背書，他就會因此無視 Ishgard 的政策。他提醒你，Ishgard 正處於戰爭之中，敵人一日比一日更大膽；自從 Inquisitor Guillaime 來到 Coerthas 之後，heretics 被接連揭發，甚至連 Ishgard 的上層貴族之中也不例外。若 Haurchefant 願意把日子花在追尋那艘失落已久的 airship 上，那是他自己的選擇；但若他期待其他人也跟著投入，Forlemort 認為那只是愚行，更顯得他看不清眼前局勢。</p>
      <p>你回到 Camp Dragonhead。Haurchefant 一眼就從你的神色看出結果——你沒有得到任何有用的線索。他也坦承自己這邊同樣沒有收穫：整個 Coerthas 似乎都被 High Houses 的 heretics 傳聞吞沒了。如今他們只能寄望於他在 Ishgard 本城的消息來源，能帶來更切中要害的情報。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 奧爾什方　<small class="muted"> 庫爾札斯中央高地 (X:26.7, Y:17.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="in-the-eyes-of-gods-and-men.html">異端審問</a></div>
      <div class="row">所有職業（不含限定職） 等級 38 以上</div>
    </div>`,
    followq:`<div class="stack">

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
