  EN:{
    langLabel:'English',

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>At The Hawthorne Hut in Nine Ivies, you receive the milkroot back from Rolfe Hawthorne. He tells you that he has taken the liberty of wrapping it up well, so that it will stay fresh and, just as importantly, so that you will be spared its gods-awful stench. The sylphs may love the stuff, he says, but he would sooner bury his nose in chocobo dung, and even claims that the reek rivals the breath of the morbol that brought his adventuring days to an end. That, he adds, is a story for another time. For today, you have more important matters to attend to. However eccentric the sylphs may seem, he has spent enough time in their company to know that they are kind at heart, and he is certain they will not shun one whose intentions are true. He wishes that your parley will be a fruitful one, and asks you to stop by again on your return—there is a flagon of Fullflower mead waiting for you if you will share your own tales of adventure. Just before you leave, he bids you not to go traipsing off yet. Amelain, he says, would have a word with you, and he asks you to travel in safety and pass along his regards to the winged ones.</p>
      <p>You speak with Amelain at the hut. She is pleased to see that your knowledge of sylphic culture has matured, and tells you there is no longer any reason to delay your mission. Upon your arrival at Little Solace, she instructs you to seek out a young sylph named Komuxio, who has often served as an intermediary between Gridania and his people and has the close ear of his tribe’s elder. She notes that Hawthorne has already furnished you with some of the malodorous root the sylphs adore, and adds that she has something far more important for you to carry: a missive from the Elder Seedseer herself. In brief, the letter vouches for your integrity as envoy and restates Gridania’s desire to maintain a harmonious relationship with its long-standing friends of the forest. The war with the Ixal has taken a heavy toll on Gridania’s resources, and the city-state can ill afford to become entangled in another conflict. Amelain tells you she need not impress the importance of the mission upon you any further, and prays that the Twelve see you return with good tidings.</p>
      <p>You travel to Little Solace and approach Komuxio. He calls you a walking one he does not know and says he does not trust strange walking ones. Strange dancing ones might be a different story, he remarks, but he expects no such visitor. He tells you to go home and leave him be. When you try to speak with him, he says he does not talk to rude walking ones—if a walking one comes to the abode of his people, that walking one should pay proper respects. He calls you a foolish walking one and warns you to go home before he becomes angry. Only when you move as his people do, offering the greeting he expects, does his tone change. He says that he would welcome a walking one who moves like these ones, and that if you wish to speak, he will answer, though he is busy and you should speak with a quick tongue. When you bring out the gift you have prepared, he calls you most kind. The sight of the milkroot fills him with great joy, and he gives thanks—many, many thanks. When he learns that you carry a message for the elder, he promises that he will deliver it, and tells you that you should not worry.</p>
      <p>Soon after, Yda and Papalymo step forward to join you. Yda cheerfully introduces you all as envoys from Gridania come to treat with the sylphs, while Papalymo explains that you wish to pay your respects to the elder and learn more of Lord Ramuh. Komuxio demands to know who these new walking ones are and asks if they, too, come from Gridania. When he hears that they do, he flares up, saying that you became a dancing one and brought milkroot, only to trick him. He declares that he does not like tricks and will speak no more. The elder, he says, is busy, and the walking ones should go home. Yda is taken aback, protesting that the sylphs of Little Solace have always welcomed Gridanian envoys with open wings. Papalymo points out that the letter you carry is an oath of peace penned by the Elder Seedseer herself, and asks if they would still refuse you in spite of that. Komuxio replies that his reasons are no business of walking ones, that the elder has no words for Gridania, and that the walking ones are wasting everyone’s time. Yda fumes at being turned away at the gates and wonders what you did to deserve such a rude welcome, even joking that perhaps your jig was not jiggy enough. Papalymo is equally baffled, but he suspects that recent events have left your fluttery friends unusually wary. In the end, he concludes that you have no choice but to ask around and learn how you might earn their trust.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'シルフ族との架け橋',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>黒衣森の東部にあるホウソーン家の山塞で、あなたはロルフ・ホウソーンから包みを受け取る。中身はミルクルートであり、彼は鮮度を保つため、そして何よりもあのひどい悪臭からあなたを守るために、しっかりと包んでおいたのだと説明する。シルフ族はこの品をこよなく愛しているが、自分としてはチョコボの糞に鼻を突っ込む方がまだましだと笑い、かつて冒険者としての自分に引導を渡したモルボルの息にも匹敵する臭さだと冗談まじりに語る。その話はまた別の機会に語ろう、と言いながらも、今はあなたにもっと大事な務めがあると促す。シルフ族はたしかに風変わりなところのある民だが、心根は優しく、真摯な思いを抱いて訪れる者を拒むことはないはずだと彼は言う。ロルフは、あなたの交渉が実りあるものになるよう祈りつつ、帰りにはぜひまた立ち寄ってほしいと頼む。フルフラワーの蜜酒を用意しておくから、冒険の話を聞かせてくれ、と約束してくれるのだ。出発しようとしたところで、彼はあなたを呼び止める。まだ足早に立ち去るなと言い、この場にいるアメレンがあなたに話したいことがあると告げ、旅の無事を願いながら、翼を持つ者たちによろしく伝えてほしいと頼む。</p>
      <p>あなたはその場でアメレンと向き合う。彼女は、あなたのシルフ文化への理解が十分に深まったことを喜び、もはや任務を先延ばしにする理由はないと言う。森の中の集落に着いたら、コムシオという名の若いシルフを訪ねるよう告げられる。彼はこれまで何度も森の都と部族との仲介役を務めてきた存在であり、長老からも厚い信頼を得ているのだという。アメレンは、ロルフがすでにシルフ族の大好きなあの臭う根を託してくれていることに触れたあと、さらに重要な品をあなたに預ける。それは、大樹の都を導く長自らがしたためた親書である。手紙の内容を簡単にまとめると、それは使者であるあなたの誠実さを保証し、森に暮らす古くからの友と、これからも調和ある関係を保ちたいという都の願いを改めて示すものだ。イクサル族との戦いが続く中で、街はすでに多くの資源を失っており、新たな争いに巻き込まれる余裕はないとアメレンは語る。この任務がどれほど重要かをあらためて伝えたうえで、十二神の加護によって、あなたが良い知らせとともに戻ってこられるよう祈りつつ送り出す。</p>
      <p>やがてあなたはシルフ族の集落にたどり着き、コムシオと呼ばれるシルフに近づく。彼はあなたを「歩く者」と呼び、見知らぬ歩く者は信じられないと警戒をあらわにする。奇妙な踊りを見せる歩く者なら話は別かもしれないが、そのような者が来るとは思っていない、と言い放ち、帰ってしまえと告げる。あなたがなおも話しかけようとすると、彼は無作法な歩く者とは話をしないと言い、この地は自分たちの棲家なのだから、訪れる者は然るべき敬意を払うべきだと主張する。愚かな歩く者だとあなたを突き放し、怒り出す前に家へ帰るのがよいと警告するが、あなたが彼らの慣わしに従い、彼らと同じように身を動かして挨拶をすると、彼の態度に変化が生まれる。こうして動く歩く者であれば歓迎すると言い、話がしたいのであれば答えようと約束する。ただし自分は忙しいので、用件は手短に、と付け加える。あなたが用意してきた贈り物を差し出すと、彼はそれを喜び、親切な歩く者だと評する。ミルクルートを見た瞬間、彼の胸は大きな喜びで満たされ、多くの礼の言葉が口をついて出る。さらに、あなたが長老への言伝を預かっていると知ると、その手紙は自分が責任を持って届けるので心配はいらないと約束してくれる。</p>
      <p>その後、イダとパパリモがあなたのそばに歩み寄る。イダは明るい声で、自分たちは森の都からの使者であり、シルフ族と話し合いに来たのだと名乗る。パパリモも、長老に敬意を表し、雷の主について学びたいと願っているのだと説明する。コムシオは新たな歩く者たちを見て、この者たちは何者かと問いただし、森の都から来た歩く者なのかと確認する。そうだと知るやいなや、彼は態度を硬くし、あなたが踊る者となりミルクルートを持ってきたことを引き合いに出しながら、それは自分をだますためだったのかと非難する。この者はそのような戯れが気に入らないと言い、これ以上話すつもりはないと宣言する。長老は忙しく、歩く者たちは皆家に帰るべきだと告げるのだ。イダは驚き、これまでこの集落のシルフたちは、森の都からの使者をいつも温かく迎えてくれていたはずだと抗議する。パパリモは、あなたが携える手紙は長自らがしたためた和平の誓いなのだと述べ、それでもなお拒むのかと問い詰める。しかしコムシオは、理由は歩く者たちには関係のないことだと言い切り、長老には森の都に向ける言葉はない、歩く者たちは皆の時間を無駄にしているだけだと突き放す。門前払いされたイダは憤り、いったい何をしたらここまで失礼な扱いを受けるのかと嘆き、あなたの踊りが足りなかったのかと冗談めかしてこぼす。パパリモもまた首をかしげるが、何か最近の出来事が、かつての友であるシルフたちをこれほどまでに用心深くさせたのだろうと推測する。そして今は周囲の者たちに事情を尋ね、どうすれば彼らの信頼を得られるのかを探るしかないだろうと結論づけるのだった。</p>
    </div>

    acq:`<div class="stack">

    </div>`,

      <div class="row">すべて（リミテッドジョブを除く）Lv 21～</div>
    </div>`,

    </div>`

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'初次接觸',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 East Shroud 的 Nine Ivies 裡，你在 The Hawthorne Hut 接過 Rolfe Hawthorne 親手整理好的包裹。他告訴你，自己已經把 milkroot 包得又緊又穩，這樣一來不但能保持新鮮，還能多少替你擋掉那股糟糕透頂的臭味。sylphs 是很喜歡這種東西沒錯，但他寧可把鼻子埋進 chocobo 糞裡，還笑說那股味道大概可以跟當年讓他不得不告別冒險者生涯的 morbol 口臭拼上一拼。至於那段往事，就留到改天再慢慢說吧──他這麼打趣，隨即把話題拉回正題，提醒你今天有更重要的任務要完成。雖然 sylphs 的行事風格相當古怪，但他和他們相處過不少次，很清楚那是一群心地善良的森林居民，只要你帶著真誠的意圖上門，他們就不會拒絕你。Rolfe 祝福你的會談一切順利，也希望你回程時一定要再來，他已經替你準備好一壺 Fullflower mead，只等你回來和他分享冒險故事。就在你準備踏出門時，他又把你叫住，要你先別急著上路，這裡的 Amelain 想找你談談，並請你旅途平安，把他的問候一併轉告給那些「長著翅膀的朋友」。</p>
      <p>你留在小屋裡，轉而與 Amelain 對話。她看見你對 sylphs 文化已有相當程度的認識，便表示沒有理由再延後這趟任務。她要你前往 Little Solace，去找一位名叫 Komuxio 的年輕 sylph。Komuxio 多次在 Gridania 與族人之間擔任中間人，也是部族 elder 深信不疑的心腹。Amelain 提到 Rolfe 已經為你準備好 sylphs 喜愛、卻讓大多數人退避三舍的那條 milkroot，接著又拿出一件更加重要的東西交到你手中──一封出自 Elder Seedseer 親筆的信函。她簡要說明內容：這封信是為你這位 envoy 做保，證明你的品格與立場，同時重申 Gridania 希望與這些長年以來共存於森林中的朋友維持和諧關係的意願。與 Ixal 的戰事已經讓 Gridania 元氣大傷，如今再也承受不起新的衝突。Amelain 說自己無須再三強調這趟使命的重要性，只願 Twelve 能庇佑你帶著好消息平安歸來，目送你啟程。</p>
      <p>抵達 Little Solace 之後，你走向 Komuxio。牠打量著你，稱呼你為「walking one」，說自己不認識你，也不信任這種陌生的 walking ones。也許會跳奇妙舞蹈的 walking ones 還另當別論，但牠並不期待會有那樣的訪客出現，所以叫你回家去，不要打擾牠。當你試著與牠交談時，Komuxio 表示自己不會跟無禮的 walking ones 說話；既然來到這群人的住處，walking one 就應該先展現適當的尊重。牠一度稱你是愚蠢的 walking one，警告你在牠生氣之前最好趕快離開。不過，當你依照先前學到的方式，以牠們的步伐和動作行禮致意時，Komuxio 的態度明顯軟化。牠說，會像「these ones」一樣動起來的 walking one 是值得歡迎的，如果你想說話，牠就會回答，只是牠很忙，要你把話說得俐落些。當你拿出特地帶來的禮物時，牠稱讚你是非常貼心的 walking one，而看到 milkroot 更讓牠心中充滿喜悅。Komuxio 一再向你道謝，說了「many, many thanks」。得知你還帶著要交給 elder 的訊息後，牠保證會親自轉交，叫你不用擔心。</p>
      <p>就在這時，Yda 和 Papalymo 上前與你會合。Yda 開朗地自我介紹，表示你們都是來自 Gridania 的 envoys，此行是為了與 sylphs 進行會談；Papalymo 則補充說，你們希望向 elder 致意，並且更深入了解 Lord Ramuh。Komuxio 盯著新出現的 walking ones，追問這些人是誰，確認他們是否也來自 Gridania。一旦確定之後，牠的態度立刻變得冷硬，憤憤地說，你曾成為「dancing one」，帶著 milkroot 前來，卻是在捉弄牠，牠最討厭這種戲弄。Komuxio 宣布自己不會再說下去，elder 正忙著，walking ones 應該回家去。Yda 被這番話嚇了一跳，抗議說 Little Solace 的 sylphs 一向都以大開雙翼的姿態歡迎來自 Gridania 的 envoys。Papalymo 則強調，你手上的那封信是 Elder Seedseer 親手寫下的和平誓言，問對方是否即使如此也要拒人於千里之外。Komuxio 回應，自己的理由與 walking ones 無關，elder 沒有任何話要對 Gridania 說，而 walking ones 只是在浪費所有人的時間。被擋在門外的 Yda 氣不過，抱怨說怎麼會在門口就被這樣拒之門外，甚至半開玩笑地問，是不是你剛才跳的 jig 還不夠像樣。Papalymo 同樣困惑，但他認為，很可能是最近發生的種種事件，讓這些曾經的「翅膀朋友」變得異常謹慎。最後，他總結說，你們別無選擇，只能在周遭打聽消息，想辦法弄清楚要如何重新贏得 sylphs 的信任。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
