    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Swift tells you the Flame General has left word: the moment you return, you are to go to the Fragrant Chamber. He wishes to discuss what you have uncovered—alongside the results of the Flames’ own investigation. Alphinaud has already been informed and should be waiting outside, and you are urged to make haste to the Royal Promenade and speak with Bartholomew. Swift adds one more warning with quiet gravity: the sultana herself will be in attendance—do not keep Her Grace waiting.</p><p>At the Royal Promenade, Alphinaud greets you with approval. The information you brought back, he says, gave him what he needed to persuade General Raubahn to call this meeting—perhaps now, at last, they can speak openly and honestly. Bartholomew confirms you are expected and ushers you inside.</p><p>Within the Fragrant Chamber, Raubahn says Swift has kept them apprised of your recent activities, and that you have made great strides toward quelling the violence. Alphinaud presses the question they cannot answer: despite every effort to learn what provoked the uprising, the truth has continued to slip away—have you found anything that might illuminate the mystery? Raubahn answers, firmly, that what follows does not leave the room.</p><p>He explains that the Syndicate’s decision to reject the Doman refugees’ appeal for asylum had lasting repercussions. Those displaced by the Calamity took it as proof of discrimination, and together with a group of Ala Mhigan refugees, organized demonstrations against the sultanate. The demonstrations grew heated, but did not turn violent—until a single incident became a call to arms. Nanamo states it plainly: a unit of Brass Blades sent to supervise a demonstration loosed arrows upon unarmed protesters, an atrocity that drove the refugees to take up arms and set everything that followed into motion.</p><p>Raubahn admits they first assumed the attack was miscommunication—when emotions run high, such tragedies can happen. But suspicion fell upon the unit’s commanding officer, and under interrogation he confessed: a merchant offered coin to give the order—one employed by Teledji Adeledji. Alphinaud is shaken by the name; Teledji spoke in favor of the Domans and always seemed sympathetic to the refugees’ plight—why would he do this?</p><p>Raubahn asks if you know of the Carteneau Reclamation Bill: a proposal to annex the Carteneau Flats so refugees may establish permanent settlements. Alphinaud notes the area is disputed territory, and Raubahn agrees—some would call it a battlefield. Bahamut’s destruction was greatest there, and while that is common knowledge, what is less known is that the rampage laid bare ancient Allagan ruins that had no recorded existence. The nations still maintain military presence in the region because they cannot agree on how the ruins should be handled—yet, as allies, they have an accord: any conflict arising from military exercises there must not affect relations between nations.</p><p>In full knowledge of that delicate balance, Raubahn says, Teledji proposed the bill—a shameless ruse that benefits him in only one conceivable way. If it passes, he gains control over the disputed territory under the guise of resettlement, and—Raubahn’s contempt shows—he would “build an orphanage next to every Allagan ruin.” Nanamo is incensed: he would threaten the unity of the Eorzean Alliance and risk countless lives for personal gain. Raubahn adds that Teledji walks his own path, beholden to no faction, not even his fellow Syndicate members. Nanamo concludes that by driving the desperate into violence, Teledji hopes to convince others the bill is the only viable solution; his “sympathy” for the Domans was merely posturing to gain credibility with the refugees.</p><p>Alphinaud asks the question that follows naturally: what could possibly motivate Teledji to go to such lengths—what is so special about the ruins that he would risk his position on the Syndicate and invite charges of treason? Nanamo answers with a single word: Omega. Raubahn explains: an Allag（古代亞拉戈帝國） monstrosity not unlike the Ultima Weapon—perhaps larger—still not fully excavated. Allag（古代亞拉戈帝国） inscriptions claim it was created to fell Bahamut himself. If that is true, it could explain why Nael van Darnus brought the red moon down upon Carteneau: destroying the one weapon that might have stayed the elder primal may have seemed prudent for someone bent on Eorzea’s annihilation.</p><p>Alphinaud can barely hide his disbelief—after witnessing the Ultima Weapon, he doubted his own senses, and now he is told there is another such weapon, one that could contend with Bahamut. Raubahn admits they too were skeptical; until the Ultima Weapon’s existence came to light, they believed the inscription had been mistranslated. Nanamo warns that Omega is currently more fossil than weapon, long since ceased to function, so its true potential cannot be accurately measured—but if someone restored it as the Garleans restored the Ultima Weapon, that person would wield untold power. Raubahn agrees: power enough to subjugate Ul’dah, and likely the rest of Eorzea—doubtless why Teledji yearns to possess it. Nanamo murmurs at the irony: he who always walked two paces behind Lord Lolorito in commerce now aspires to world domination.</p><p>Raubahn says Teledji seeks power in acknowledgement of his own limitations, and warns that woe will befall them all if they allow him to have it. Nanamo urges you not to waste time chasing rats—only a fool believes secrets can be kept in Ul’dah. Alphinaud is left to reckon with the scope of what you have heard: the sultanate’s refugee problem reaches far beyond what they assumed.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'フロンティア計画',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>スウィフトは告げる。炎軍の総司令官が、あなたが戻り次第ただちに「香りの間」へ向かうよう伝言を残したという。あなたの最近の発見と、炎軍側の捜査結果について話し合いたいのだ。アルフィノはすでに知らせを受け、外で待っているはずだ。急いでロイヤルプロムナードへ向かい、バルトロメウに声をかけるよう促される。さらにスウィフトは付け加える――ナナモ陛下も同席される、決してお待たせするな、と。</p><p>ロイヤルプロムナードでアルフィノはあなたを迎え、「見事だ」と言う。あなたが持ち帰った情報があったからこそ、ラウバーン将軍にこの会合を開かせることができた――今度こそ、率直に、正直に語り合えるかもしれない。バルトロメウはあなたの来訪を待っていたと告げ、奥へ通す。</p><p>香りの間でラウバーンは、スウィフトからあなたの最近の動きを聞いていると言い、暴力を鎮めるうえで大きな前進があったと評する。アルフィノは核心を求める。蜂起の引き金となった真実が、どれほど探っても掴めない――あなたは何か手がかりを得たのか。ラウバーンはきっぱりと言う。ここから先の話は、この部屋の外へ持ち出すな。</p><p>ラウバーンは語る。ドマ難民の亡命嘆願をシンジケートが退けた判断は、長く尾を引いた。第七霊災で住処を失った者たちは、それを差別政策の証と受け取った。彼らはアラミゴ難民の一団とともに、王政に抗議する示威行動を組織した。示威は熱を帯びたが、暴力には至らなかった――ある出来事が「武器を取れ」と叫ぶ合図になるまでは。ナナモ陛下は断言する。示威を監督するため派遣されたブラスブレードが、武器を持たぬ抗議者へ矢を放った。その蛮行が難民を武装へと追い込み、後に続く惨事を招いたのだ、と。</p><p>ラウバーンは当初、誤解や伝達不備による事故だと考えたと言う。感情が高ぶる場では起こり得る――だが、部隊を率いた指揮官に疑いがかかり、尋問を命じた。すると、恐れていた事実が明らかになった。指揮官は白状したのだ。命令を出すよう金で買われた――テレジ・アデレジの配下で働く商人に、と。アルフィノは驚愕する。テレジ・アデレジはドマ難民に同情的で、彼らの訴えを支持しているように見えたのに、なぜ――。</p><p>ラウバーンは問い返す。「カルテノー復興法案」を知っているか。難民が恒久的に住める集落を築くため、カルテノー平原を併合する提案だという。アルフィノは、あそこは係争地ではないかと指摘し、ラウバーンは肯定する――戦場と呼ぶ者さえいる、と。バハムートの破壊が最大だったのがカルテノー平原であることは周知だが、あの暴虐が、記録に存在しない古代アラグの遺跡を露出させたことはあまり知られていない。遺跡の扱いを巡って各国の意見は割れ、今なお軍が駐留し続けている。だが同盟国として、エオルゼア同盟の維持を優先し、軍事演習中に起こり得る衝突は国家間関係に影響しない――という取り決めに至った。</p><p>その繊細な均衡を承知のうえで、テレジ・アデレジは復興法案を提案した。あまりにも厚かましい、血塗られた策略だ――彼が得をする道はひとつしかない。法案が通れば、難民再定住を助けるという名目で係争地を掌握できる。そして、彼は必ずや「古代アラグの遺跡の隣に孤児院でも建てる」だろう――ラウバーンは皮肉を交えて断じる。ナナモ陛下は憤る。個人の利益のためにエオルゼア同盟の結束を脅かし、無数の命を危険に晒すつもりなのか。ラウバーンは言う。テレジはどの派閥にも属さず、シンジケートの同僚にも縛られない道を歩んでいる。ナナモ陛下は結論づける。貧しき者たちを煽って暴力へ追いやり、「復興法案こそ唯一の解」だと周囲に思わせる――ドマ難民への同情は信用を得るためのポーズに過ぎない、と。</p><p>アルフィノは問う。なぜそこまでしてテレジ・アデレジは動くのか。遺跡に何があるから、地位を賭け、王政への反逆罪さえ招きかねない行為に踏み切るのか。ナナモ陛下は一語で答える。「オメガ……」。ラウバーンは説明する。アルテマウェポンに似た、古代アラグの怪物だ。おそらくはより巨大かもしれない。まだ完全には発掘されていないが、碑文は「バハムートを討つために造られた」と示している。もし事実なら、ネル・ヴァン・ダーナスが赤い月をカルテノーへ落とした理由の一端にもなる。エオルゼアの殲滅を狙う者にとって、長き眠りの神を抑え得る武器を破壊するのは理に適っていたのかもしれない。</p><p>アルフィノは信じがたい思いを隠せない。アルテマウェポンの力を目の当たりにしたときですら感覚を疑ったのに、いままた同種の兵器があり、しかもバハムートに対抗し得るというのか。ラウバーンは言う。こちらも半信半疑だった。アルテマウェポンの存在が明らかになるまでは、碑文の解釈が誤りだとすら考えていたのだ。ナナモ陛下は警告する。オメガは長らく機能を失い、いまは兵器というより化石に近い。ゆえに真の潜在力は測れない。だが、帝国がアルテマウェポンを復元したように、誰かがオメガを復元すれば、計り知れぬ力を手にするだろう。ラウバーンも同意する。ウルダハを従わせ、ひいてはエオルゼア全土をも支配し得る力――それゆえテレジが渇望するのだ、と。ナナモ陛下はつぶやく。商いでは常にロロリトの二歩後ろを歩いてきた男が、世界征服を望むとは。</p><p>ラウバーンは言い切る。自らの限界を知るがゆえに、テレジは力を求める。もし彼にそれを渡せば、すべてが破滅へ向かう。ナナモ陛下は促す。小者を追い回して時間を無駄にするな。ウルダハで秘密が守れるなどと思うのは愚か者だけだ。アルフィノは、王政が抱える難民問題の影響が、想像以上に広範であることを思い知らされる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="stories-we-tell.html">止まない争い</a></div></div>`
  },

    story:`<div class="clamp" data-collapsed="true"><p>Swift 轉告你：Flame General 留話，要你一回來就立刻前往 The Fragrant Chamber，討論你最近查到的線索，以及他們自身調查的結果。Alphinaud 已經收到通知，應該會在外面等你。Swift 要你立刻趕到 Royal Promenade 去找 Bartholomew，並提醒你另一件更不容怠慢的事，Sultana 也會出席，千萬別讓女王陛下等太久。</p><p>你趕到 Royal Promenade，Master Alphinaud 先一步迎上來，語氣裡帶著明顯的肯定。他說你帶回來的資訊，讓他得以說服 General Raubahn 召開這場會面；或許現在終於能把事情放到檯面上，坦白而直接地談清楚。Bartholomew 也表示早已在等你，隨即引你入內。</p><p>進入 The Fragrant Chamber 後，General Raubahn 表示 Swift 已經持續向他回報你最近的行動，你在壓制暴力擴散上確實取得了明顯進展。Alphinaud 立刻追問：即使他們竭盡所能想弄清楚這場動亂的起點，真相仍始終捉摸不定——你是否找到了能照亮謎團的線索？Raubahn 先把話說死：接下來的內容不准傳出這個房間。</p><p>他指出，Syndicate（Ul’dah 掌握權勢與資源的財閥高層）當初拒絕 Doman 難民的庇護請求，造成了長期的反彈。許多在 Calamity（靈災） 後流離失所的人把那視為歧視政策的證據；他們又與一批 Ala Mhigan 難民聯手，組織連串示威來抗議 Sultana。示威曾經越來越激烈，但仍未演變成暴力——直到某起事件成了「拿起武器」的號角。Nanamo Ul Namo 直接說明：被派去監督示威的 Brass Blades （Ul’dah 的治安部隊／傭兵警備組織，負責城邦周邊的巡邏、維安、盤查、逮捕、調查等工作；但他們實際受 Syndicate（金權派／富商勢力）金錢左右，名義上歸政府體系管轄，實務上常被認為是富人（Monetarists）的「私人軍隊」，也因此經常與貪腐、收買、濫權等形象綁在一起）對手無寸鐵的抗議者放箭；正是這場暴行，逼得難民開始武裝，而你不需要再被提醒後續發生了什麼。</p><p>Raubahn 承認，他們起初以為那次攻擊只是誤解或溝通失當；情緒高漲時，意外確實可能發生。但他們很快對該部隊的指揮官起疑，Raubahn 下令審問後，結果證實了最糟的猜測：那名指揮官招供，有商人給了他錢，要他下令放箭——而那名商人是 Teledji Adeledji 的僱員。Alphinaud 聽到名字後難掩震驚：Teledji Adeledji 明明公開支持 Doman 的訴求，看上去也一向同情難民，為何會做出這種事？</p><p>Raubahn 接著問你是否知道 Carteneau Reclamation Bill（這是一項由 Teledji Adeledji 提出的「法案／提案」，主張併吞 Carteneau Flats，以「讓難民建立永久定居地」為名推動開拓與安置。問題在於 Carteneau Flats 當時屬爭議領土、甚至可被視為戰場；各城邦因該地在 Calamity 後暴露出 Ancient Allag（古代亞拉戈帝國）遺跡而長期駐軍並維持微妙協議。Raubahn 與 Nanamo 的判斷是：Teledji 推動此案的核心目的，是藉「安置難民」之名實質掌控爭議地與遺跡（進而染指 Omega），並透過煽動動亂讓外界相信「此法案是唯一解方」）。那是一項提案，要併吞 Carteneau Flats，讓難民能建立永久定居地。Alphinaud 指出那裡仍是爭議領土，Raubahn 也回應：有人甚至會稱那裡為戰場。Bahamut 在 Carteneau Flats 造成的破壞眾所皆知；但不那麼為人所知的是，他的肆虐意外揭露了從未有紀錄的 Ancient Allag（古代亞拉戈帝國）遺跡。各國對遺跡該如何處置存在嚴重分歧，因此至今仍在當地維持軍事駐留；然而彼此仍是盟友，為了維繫 Eorzean Alliance，他們已達成共識：在當地軍事演習期間若爆發衝突，不得影響國與國之間的關係。</p><p>正因為這種局勢極其微妙，Raubahn 認為 Teledji Adeledji 明知如此仍提出法案，根本是一場毫不掩飾、血腥而無恥的詭計——而且只可能用一種方式讓他獲利：若法案成功，他就能以「協助安置難民」為名掌控爭議領土；你可以確定，他甚至會在每一處 Allag（古代亞拉戈帝國）遺跡旁邊都蓋一座孤兒院。Nanamo Ul Namo 怒不可遏：他竟然為了私利威脅 Eorzean Alliance 的團結、拿無數性命去冒險。Raubahn 補充，Teledji Adeledji 走的是獨立於任何派系的道路，甚至不受同為 Syndicate 成員的同僚制衡。Nanamo Ul Namo 進一步斷言：他煽動弱勢者走向暴力，為的就是逼迫眾人相信 Carteneau Reclamation Bill 是唯一可行的解方；他對 Doman 的同情不過是姿態，是為了在難民間建立可信度，這點毫無疑問。</p><p>Master Alphinaud 忍不住追問：究竟是什麼驅使 Teledji Adeledji 走到這一步？那些遺跡到底有什麼特別，值得他冒著失去 Syndicate 地位、甚至被指控叛國的風險？Nanamo Ul Namo 只吐出一個名字：Omega。Alphinaud 一時沒反應過來，Raubahn 便解釋：那是 Allag（古代亞拉戈帝國）的怪物，與 Ultima Weapon 類似，可能更強大，他們也無法確定，因為它尚未被完全發掘。Allag（古代亞拉戈帝國）的碑文顯示它被造來擊倒 Bahamut；若此事為真，也許就能解釋 Nael van Darnus 為何要把 red moon 引向 Carteneau Flats。對一個不惜一切要讓 Eorzea 走向毀滅的人來說，摧毀唯一可能抑制那位 elder primal 的武器，也許正是最「合理」的選擇。</p><p>Alphinaud 坦言自己難以置信：當他第一次見識 Ultima Weapon 的力量時，甚至懷疑過自己的感官；如今卻又被告知還有另一個同類兵器，甚至能與 Bahamut 抗衡。Raubahn 也說，他們起初同樣懷疑，在 Ultima Weapon 的存在被揭露之前，他們一度以為碑文被誤譯。Nanamo Ul Namo 則提醒：現在的 Omega 更像化石而非兵器，早已停止運作，因此無法準確衡量真正潛力；但若有人像 Garleans 修復 Ultima Weapon 那樣修復 Omega，她毫不懷疑那人將掌握難以想像的力量。Raubahn 直言，那力量大到足以讓 Ul’dah 屈服，甚至整個 Eorzea 也不例外——這正是 Teledji Adeledji 渴望它的原因。Nanamo Ul Namo 感嘆：那個在商業上總是落在 Lord Lolorito 後兩步的人，竟然妄想支配世界。</p><p>Raubahn 警告，正因為他承認自己的局限，才會更渴望這份力量；一旦讓他得到，後果不堪設想。Nanamo Ul Namo 也催促你：別再浪費時間追逐小老鼠，在 Ul’dah 以為秘密能被守住的人才是傻子。Alphinaud 聽到這裡，只能承認：Sultana 面對的難民問題，其牽動的局勢遠比他們原先想像的更深、更廣。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 斯威夫特 <small class="muted"> 烏爾達哈現世迴廊（X:8.4, Y:8.9)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="reap-the-whirlwind.html">黑手的下場</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="stories-we-tell.html">無盡的紛爭</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
