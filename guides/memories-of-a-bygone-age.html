const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`Memories of a Bygone Age`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You prepare to take Sphene out for a tour, while Gulool Ja remarks that she has asked him not to call her by her title—understandable, yet still strange to hear. Before you depart, Sphene asks for a moment to change into more suitable modern attire that Shale selected for her, and you wait outside so she can join you shortly.</p><p>When you reconvene in the Backroom, Shale mentions that Y’shtola and Alisaie have gone to the government sector to discuss how best to treat those afflicted with lightning, pressing on without even a short break. Wuk Lamat agrees that even if Sphene can walk, she is far from fully recovered, and you will need to take care not to push her too hard. Gulool Ja admits he has barely gone outside lately, spending his time reading more of his mother’s records as Shale decrypts them.</p><p>Sphene returns and apologizes for keeping you waiting, unused to wearing such clothing, and Wuk Lamat brightens as she tells her it suits her well. Before you set out, Shale stops you with a practical concern: with multiple “Sphenes” in play, you need clear names now, not later, or confusion will be inevitable.</p><p>Shale proposes that you call the woman with you simply “Sphene,” refer to the former Queen of Reason as “Endless Sphene,” and label the new figure addressing the citizens a “simulant,” likening her to imitation stones. Sphene raises no objection, but insists that in the city she will keep both her face and name secret, since the people of today’s Alexandria know only Endless Sphene. Though Shale apologizes for forcing such indignity upon her, Sphene says she would rather avoid complications—and places herself in your capable hands as you head for the entrance to Solution Nine, starting at Scanning Port Nine.</p><p>At the information center, you hear an exuberant citizen speaking with Wuk Lamat about finally visiting Tuliyollal again after decades within the barrier, made possible by the safer rail journey. Taking in Alexandria, Sphene says that though she is inside a tower it feels strangely open, and though the sights are nothing like she remembers, electrope is everywhere she looks—unfamiliar, yet familiar all the same. While Wuk Lamat finishes her conversation, Gulool Ja and you help Sphene understand what you can see from here, and she reflects on how a railroad once linked Alexandria to neighboring Lindblum before relations soured, service halted, and the tracks were removed—making it gratifying to see rails now connecting to new neighbors, and moving to witness Tuliyollal’s leaders striving for peace despite a history that began with war.</p><p>As you continue pointing out locations, Gulool Ja explains that Nexus Arcade is a bustling stretch of shops, and Sphene recalls how the castle town she knew had a main thoroughfare lined with storefronts where citizens would speak with her of matters great and small—much as that woman is speaking with Wuk Lamat now. When Leynode Nine is mentioned, Sphene recognizes the travel method that uses aether currents, and recalls how such nodes were sealed off during the Storm Surge and later abandoned entirely when the world’s aetheric balance collapsed and teleportation became dangerous—so it heartens her to see them available again. At the government sector, she admits she is unsure how she feels about regulators and treating souls as a resource; she understands grief and the desire to escape death’s sorrow, yet she would never wish to forget her parents, Otis, or Zelenia—and hesitates to impose her beliefs on others.</p><p>You take a break at Mosaic in the commerce sector, where Sphene chooses a Dali coffee and embraces its bitterness, speaking of dark roasts and how a dash of milk can complement the sharp flavor. Sitting among the people leaves her with a wonderful feeling—until it turns, and she admits they are not her people anymore, that their city and way of life have become strange to her, and the weight of the long years is finally beginning to sink in. When a curious boy calls her “Your Majesty,” she awkwardly denies being Queen Sphene, only to be whisked away by his father with a cheerful “Bye, not-Queen Sphene!” Left with the harsh reminder that no one here knows her, Sphene still insists she is happy that Alexandria has endured and their sacrifice was not in vain—yet she cannot help but feel lonely all the same.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Sphene <small class="muted">(Break Room, X:6.2, Y:6.1)</small></div></div>`,

    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたはスフェーンを案内する準備を進める一方で、グルージャは、彼女が称号で呼ばないでほしいと頼んできたことを話す。理由は分かるが、やはり違和感があるのだという。出発前にスフェーンは、シャーレが用意してくれた現代風の服に着替えたいので少し待ってほしいと告げ、あなたは外で待つことにする。</p><p>ほどなくバックルームで合流すると、シャーレは、ヤ・シュトラとアリゼーが政府区へ向かったと説明する。雷の影響を受けた人々をどう治療すべきか相談するためで、短い休憩すら取らずに動き続けているのが立派だという。ウクラマトは、歩けるようになったとはいえスフェーンはまだ本調子ではないのだから、無理をさせないよう気をつけようと言う。グルージャは、シャーレが母の記録をさらに解読してくれたので読みふけってしまい、しばらく外へ出ていなかったと打ち明ける。</p><p>着替えを終えたスフェーンは待たせたことを詫び、こうした服は初めてだと戸惑いを見せるが、ウクラマトはよく似合うと笑顔で褒める。そこへシャーレが声をかけ、出発前に確認しておきたいと言う。状況が状況だけに、複数の「スフェーン」を区別できる呼び方を今のうちに決めないと混乱が避けられないのだ。</p><p>シャーレは、あなたたちと行動する彼女を単に「スフェーン」、理智の女王だった存在を「エンドレス・スフェーン」、そして市民に語りかけている新たな存在を、模造石になぞらえて「シミュラント」と呼ぶ案を示す。スフェーンは異論はないが、街に出る際は顔も名も伏せたいと言う。現代のアレクサンドリアの人々が知っているのはエンドレス・スフェーンだけだからだ。シャーレが不名誉を強いることを詫びても、スフェーンは面倒を招きたくないので構わないと応じ、あなたたちに身を委ねる。こうしてあなたはソリューションナインの入口へ向かい、まずスキャニングポート・ナインから案内を始める。</p><p>インフォメーションセンターでは、ウクラマトが市民と語り合う声が聞こえる。彼女は三十年ものあいだバリアの内側に閉じ込められていたが、列車のおかげで安全にトライヨラへ行けたのだと嬉しそうに話している。スフェーンはアレクサンドリアを見渡し、塔の中にいるのに屋外にいるように感じると漏らす。景色は記憶とまるで違うのに、エレクトロープだけは視界の至る所にあり、不思議と懐かしさもあるという。会話が落ち着いた間に、あなたとグルージャは見える場所を説明し、スフェーンは、かつてアレクサンドリアと隣国リンドブルムを結ぶ鉄路があったが関係悪化で運行が止まり、やがて線路ごと撤去されたことを語る。それでも今、新たな隣人へ鉄路がつながっているのは喜ばしく、戦争から始まった歴史を思えば、平和を目指し続けるトライヨラの指導者たちの寛容さに胸を打たれるのだと静かに述べる。</p><p>あなたたちが案内を続けると、グルージャはネクサスアーケードが買い物客で賑わう店の並びだと説明する。スフェーンは、かつての城下町にも店が並ぶ大通りがあり、訪れるたび市民が大小さまざまな相談を持ちかけてきたことを思い出す。それは今、あの市民がウクラマトに話しかけている光景にも重なる。レイノード・ナインの話題になると、スフェーンは乙太流を利用する移動手段だと理解を示し、ストームサージの際に敵の利用を防ぐため封鎖され、戦後には世界全体の乙太の均衡が崩れて転移そのものが危険になり、結局ノードを放棄したのだと語る。だからこそ今、誰もが使える形で再び利用できるのは心強いのだという。政府区に触れると、彼女はレギュレーターや、魂を資源として扱うことに複雑な思いがあると打ち明ける。喪失の嘆きや死の悲しみから逃れたい気持ちは分かるが、それでも彼女は忘れたくないのだと、両親やオーティス、ゼレニアの名を挙げ、ただ自分の信条を他者に押しつけたくはないとも言う。</p><p>コマースセクターのモザイクで休憩を取り、スフェーンはダリコーヒーを選び、苦味こそが良いのだと微笑む。深煎りの香りと鋭い味わいが気を引き締め、少しのミルクが合うこともあると語る。人々の中で過ごす時間は素晴らしいと感じながらも、彼女はやがて、それでも彼らはもはや自分の民ではなく、この街も暮らしぶりも足元の地面さえも、自分には馴染みのないものになってしまったと認める。長い年月の重さが、ようやく胸に沈み始めたのだ。そこへ少年が「陛下」と声をかけ、彼女は自分は女王スフェーンではない、似ていると言われるだけだと慌てて否定する。父親に連れ戻された少年が「さようなら、女王じゃないスフェーン」と無邪気に手を振り、スフェーンは誰も自分を知らないのだと痛感する。それでも彼女は、アレクサンドリアが生き延びたことを喜び、犠牲は無駄ではなかったのだと言い聞かせるが、孤独だけはどうしても拭えないのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> スフェーン <small class="muted">(仮眠室, X:6.2, Y:6.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-glimmer-of-the-past.html">過去より届いた輝き</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="in-search-of-meaning.html">今ここに在る意味</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'往昔的記憶',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你們準備帶 Sphene 出去走走，Gulool Ja 卻先低聲說了一句：Sphene 請他別再用頭銜稱呼她，他能理解原因，但嘴上還是覺得怪。Sphene 則在出門前提出想換一套更合適的衣著——Shale 似乎替她準備了一套現代服裝；她請你們先到外頭等一下，她很快就會出來。</p><p>回到 The Backroom 後，Shale 說 Y’shtola 和 Alisaie 已經去了 Government Sector，想討論該怎麼治療那些受到雷屬性影響的人，忙到連短暫休息都沒有。Wuk Lamat 也提醒你：就算 Sphene 現在能走路，她離完全恢復還差得遠，你們得小心別把她逼得太緊。Gulool Ja 則坦白自己最近幾乎沒出門，因為 Shale 又解開了他母親更多紀錄，他花了很多時間埋頭閱讀。</p><p>Sphene 換好衣服回來後先道歉讓你們久等，說自己從沒穿過這樣的衣服；Wuk Lamat 立刻笑著稱讚她很適合。就在你們要出發時，Shale 把你們叫住，說有件事最好現在就定下來：眼下「Sphene」不只一個，如果不先想好怎麼區分，之後只會越來越混亂。</p><p>Shale 提議：你們身邊這位就直接叫「Sphene」；過去的 Queen of Reason 則稱為「Endless Sphene」；至於那個正在向市民演說、外貌幾乎和 Endless Sphene 一模一樣、但確定是不同存在的「新 Sphene」，就用「擬造體」來稱呼。Sphene 表示沒有異議，但她也強調：進城時她會隱藏自己的臉與名字，因為今日 Alexandria 的人們只認得 Endless Sphene。Shale 對此道歉，覺得像是在讓她承受難堪；Sphene 卻說她自己也不想引發更多麻煩，所以這樣做沒關係。於是你們決定出發，先前往 Solution Nine 的入口，從 Scanning Port Nine 開始。</p><p>到了 Information Center，你聽見 Wuk Lamat 正和一位興奮的市民聊天——對方剛從 Tuliyollal 回來，那是她三十年前被困在屏障裡後第一次踏出去；她現在在 Alexandria 有家人，所以不得不回來，而列車讓這趟旅程變得安全又容易，這全靠大家的努力。Sphene 望著 Alexandria，說明明身在高塔之內，卻有種彷彿置身戶外的開闊感；雖然景象與她記憶中的城市截然不同，但視線所及仍到處都是 electrope——陌生，卻又帶著說不出的熟悉。趁 Wuk Lamat 還在交談時，你和 Gulool Ja 先把周遭能看到的地方解釋給她聽；Sphene 也提到，過去曾有鐵路連接 Alexandria 與鄰國 Lindblum，但關係惡化後就停運，最後連軌道都被完全拆除。如今能看到鐵路重新把城市與「新鄰居」連在一起，她感到由衷欣慰；尤其想到歷史起點曾是戰爭、且 Alexandria 還是侵略方，她更被 Tuliyollal 的領導者仍願意努力追求和平的寬宏所打動。</p><p>你們繼續介紹景點時，Gulool Ja 指著 Nexus Arcade 說那裡聚集了各種商店，人們總是來來往往、熱鬧得很。Sphene 則回想，她所熟悉的城下町也曾有一條商店林立的主街，她每次走訪，市民都會上前向她傾訴大大小小的事——就像方才那位女士正對 Wuk Lamat 說著自己的近況。談到 Leynode Nine 時，Sphene 認出那是利用乙太流的移動方式；她說在她那個時代也有類似節點，但 Storm Surge 爆發後為防敵人利用而封鎖，戰後整個世界的乙太平衡崩壞，不僅走出屏障外風險極高，連「傳送」本身都變得危險，最後只得徹底放棄那些節點。如今能再次供所有人使用，令她感到欣慰。說到 Government Sector，她坦白自己對 regulators 以及把靈魂當作資源的做法心情複雜；她理解失去摯愛的人有多悲痛，也理解想逃避死亡哀傷的渴望，但她自己絕不願意忘記——她想記得父母、Otis、Zelenia 的一切，同時也不願把自己的信念強加在他人身上。</p><p>你們在 Commerce Sector 的 Mosaic 休息，Sphene 點了 Dali coffee，還說苦味才是精髓；她提到那種豆子能烘出香氣濃厚的深焙，尖銳的風味讓人精神一振，若加一點牛奶也會很合。她說能和人們這樣並肩度過片刻，是種很美好的感覺——但話音一轉，她又低聲承認：他們已不是她的人民了；這座城市、這種生活方式，甚至他們腳下踩踏的地面，對她而言都成了陌生之物，漫長歲月的重量終於開始沉沉落下。這時一個好奇的男孩喊她「陛下」，她慌忙否認自己不是 Queen Sphene，只是常被說長得像；男孩的父親趕來把孩子帶走，男孩還天真地向她道別：「再見，不是女王的 Sphene！」那一瞬間，Sphene 更清楚地意識到——她不認識那孩子，那孩子也不認識她，這裡沒有人真正認得她。即便如此，她仍努力說服自己：她很高興 Alexandria 撐了下來，當年的犧牲並非徒然；可再怎麼說，她也無法不感到孤單。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
