<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`The Steps of Faith`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Ere you throw yourself into the coming siege, Ser Marcelain sees fit to tell you what, precisely, you are being asked to defend. Beyond Gates of Judgement stretches Steps of Faith—a vast stone bridge that leads straight to Ishgard, and more than a simple crossing over Sea of Clouds. It is the very foundation upon which the arcane wards are set—Daniffen’s Collar, the barrier that shields the city from the Horde.</p><p>But Iceheart’s assault has changed everything. By tearing away the outermost layer of the barrier, she stripped the bridge of its protection, and now dragons can land upon Steps of Faith without hindrance. If the Dravanians succeed in shattering what remains of the wards, the winged devils will be free to pour into the city itself. That outcome cannot be suffered. Three sealed points yet remain, and Ishgard’s defenders are deployed to each—Ser Marcelain asks that you and your comrades take your stand at the outermost ward.</p><p>A voice cuts in, and Ser Marcelain starts at the sight of Scions of the Seventh Dawn. Y’shtola refuses to stand idle while the Horde threatens the good people of Ishgard, and Papalymo adds that to do otherwise would betray what Master Louisoix taught. They choose to divide their strength—Papalymo and Yda will join the rear guard, ready to strike if dragons break through. With gratitude, Ser Marcelain bids you finish your preparations and return—together, you will stand against the Horde.</p><p>When you return to him, Ser Marcelain leads you toward Steps of Faith, where Lucia the Radiant meets the field with a vow: victory today, or Ishgard fails. The battle surges forward in shouted orders and steel—rear guard to the cannons, dragoons to the skies, all blades turned toward the dragons that mean to break Daniffen’s Collar. An armored champion hurls flame like an inferno, and Lucia commands a fall back when its assault threatens to swallow the line whole. Even so, the first ward is breached, and the battle is forced down the bridge as defenders regroup and refuse to yield.</p><p>The second ward falls to the same terrible fire. Still the line holds—Thancred and Y’shtola keep the fight from collapsing as you are driven onward to the final ward, where Lucia calls for everything that remains. Dragoons surge to meet the enemy, Estinien Wyrmblood stands with lance and wrath, and the last defense is held by will as much as by arms. The heat is infernal, resolve falters, and yet—before the barrier can be undone—the dragons withdraw. One of Nidhogg’s greatest champions lies slain, and the Horde pulls back from Steps of Faith.</p><p>In the wake of the siege, astonishment and praise meet you from Temple Knights who had not thought a stranger could achieve such a feat. The Scions speak in weary relief—close, but victory nonetheless. Alphinaud arrives with word that the fighting at Steel Vigil was also fierce, and that the Crystal Braves were not found wanting. Ser Aymeric offers humble thanks on behalf of Holy See and the people of Ishgard, yet must turn at once to the wounded and the stragglers still in the field.</p><p>Alphinaud lingers on what this victory means: the Dravanian Horde is weakened and scattered, Ishgard’s peril diminished—and Holy See must now recognize the necessity of cooperation with foreign powers. Much has been sacrificed in the struggles against dragons and primals, the Ascians and the Empire, but step by unfaltering step the path continues, with you in the van. Duty calls him back to Ul’dah to reassign battered squads, while you are granted what rest you can—return to Rising Stones, and tell Minfilia yourself. There, in The Solar, Minfilia welcomes you home, having already heard of the siege—and of the part you played in ending it.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Marcelain <small class="muted">(Coerthas Central Highlands, X:18.1, Y:14.9)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="an-allied-perspective.html">An Allied Perspective</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="administrative-decision.html">Administrative Decision</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'イシュガルド防衛戦',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>シエル・マルスランは、あなたが戦いに身を投じる前に、守るべきものを知っておくべきだと告げる。審門の先に広がるのは「信仰の階段」――イシュガルドへと直結する巨大な石橋であり、雲海を渡るための道に留まらず、術式結界の礎そのものだった。都市を覆う防壁「ダニフェンの首輪」は、この橋を土台として成り立っている。</p><p>だが、アイスハートの襲撃が状況を一変させた。防壁の最外郭が打ち消され、橋を守る加護は剥ぎ取られた。ゆえに竜は「信仰の階段」へ妨げなく降り立てる。残る結界が破壊されれば、邪竜の軍勢は都市へ雪崩れ込み、イシュガルドは炎に呑まれるだろう――それだけは決して許されない。封じられた要所はあと三つ。各所へ兵を配し、最外郭の防衛には、あなたと仲間の力を借りたいとマルスランは頼む。</p><p>そのとき声が割り込み、マルスランは「暁の血盟」の姿に息を呑む。ヤ・シュトラは、邪竜の軍勢が善良なイシュガルドの民を脅かすのを黙って見過ごすことはできないと言い、パパリモもまた、ルイゾワの教えに背くわけにはいかないと応じる。そして二手に分かれることを提案し、パパリモとヤ・ダは後衛として備えると決める。マルスランは感謝を述べ、準備を整えたら再び声をかけてほしい――共に軍勢を迎え撃とう、と。</p><p>準備を終え、あなたは戦場へ向かう。そこには光輝のルキアが立ち、今日勝利せねばイシュガルドは滅ぶと宣言し、命を賭して橋を守れと号令する。竜たちは「ダニフェンの首輪」の結界を破壊せんと迫り、後衛は大砲の準備へ、竜騎士は空へと走る。甲殻を纏う竜の猛威は灼熱のごとく、ルキアは押し戻しを命じて隊列を立て直すが、それでも第一の結界は炎に焼き払われてしまう。</p><p>戦いは橋の奥へ押し流され、再編した防衛線の上で、あなたはなおも竜たちを拒む。やがて第二の結界もまた破壊される。退かねばならぬのではなく、最後の結界を守るために退くのだと、仲間はあなたを先へ進ませる。最終防衛線では、ルキアが全力を尽くせと叫び、竜騎士たちが槍を掲げ、蒼の竜騎士エスティニアンが怒りと共に立つ。灼熱の圧力に心が揺らぎ、限界が迫る――それでも、結界が砕かれるより先に、竜は撤退した。ニーズヘッグが誇る強敵は討たれ、軍勢は「信仰の階段」から退き去る。</p><p>戦いの後、神殿騎士たちは、異郷の者であるあなたが成し遂げた戦果に言葉を失い、勝利が都市を灰から救ったと讃える。暁の血盟もまた疲労の中で勝利を確かめ合う。そこへアルフィノが駆けつけ、「鋼鉄の守り」でも激戦だったが、クリスタルブレイブは力を示したと報告する。セイ・アイメリクは、聖座とイシュガルドの民を代表して礼を述べつつも、負傷者の救護と戦後処理のため、すぐに現場を離れねばならないと告げる。</p><p>アルフィノは、この勝利の意味を語る。邪竜の軍勢は弱体化し、イシュガルドへの脅威は大きく後退した。そして聖座は、外部勢力との協力が必要であることを否応なく認めるはずだ、と。竜や蛮神、アシエン、帝国との戦いで失ったものは多いが、それでも一歩ずつ前へ進む――先頭には常にあなたがいる。彼はウルダハへ戻って部隊を再編する必要があり、あなたには「石の家」で休息を取ってミンフィリアに報告するよう促す。</p><p>「石の家」の「陽だまりの間」で、ミンフィリアはあなたを迎え入れる。アルフィノから包囲戦の報告は届いており、そして何より、あなたがその終結に果たした役割を聞いていた。あなたの働きはいつも皆を驚かせる――そう言って、彼女は感謝を伝える。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> マルスラン <small class="muted">（クルザス中央高地, X:18.1, Y:14.9）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="an-allied-perspective.html">それぞれの思惑</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="administrative-decision.html">タタルの決意</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'皇都伊修加爾德保衛戰',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Ser Marcelain 要你在投身這場圍城戰之前，先明白自己究竟在守什麼。穿過 Gates of Judgement，眼前便是 Steps of Faith——一座直通 Ishgard 的巨大石橋。它不只是跨越 Sea of Clouds 的通道，更是術式結界的基座；那道被稱為 Daniffen’s Collar 的屏障，正是以這座橋為根基，才得以守護城邦。</p><p>然而 Iceheart 的襲擊撕開了缺口。她打散了屏障最外層，讓橋失去原本的庇護，如今龍群得以毫無阻礙地降落在 Steps of Faith。若 Dravanians 破壞剩餘的結界，帶翼的惡魔便能直接湧入城內，讓 Ishgard 陷入火海——這絕不能發生。封印結界的要點尚有三處，Ishgard 已分派兵力各自防守；Ser Marcelain 要你與同伴隨最外層的守軍同行，在第一線迎擊。</p><p>就在此時，一道聲音插入，Ser Marcelain 驚覺 Scions of the Seventh Dawn 竟也趕來。Y’shtola 說，她無法袖手旁觀，任由 Horde 威脅 Ishgard 的人民；Papalymo 也表示，若選擇退縮，便違背了 Master Louisoix 的教誨。為了發揮力量，他們決定分成兩組：Papalymo 與 Yda 轉往後衛，準備在龍群突破時迎擊。Ser Marcelain 感激你們的到來，請你在整備就緒後再與他會合——屆時，你們將一同站上前線，對抗 Horde。</p><p>當你回到 Ser Marcelain 身邊，他便帶你前往 Steps of Faith。戰場上，Lucia the Radiant 以決絕的宣告迎接眾人：今日若不能取勝，Ishgard 便將敗亡——她要所有人把 Fury 放進心裡，用生命守住這座橋。龍群的目標很明確：摧毀 Daniffen’s Collar 的結界。號令與吶喊交錯，後衛準備火砲，dragoon 奔上天空；而那披著厚甲的龍王級勇士噴吐出的烈焰宛如地獄般的火海，迫使戰線在 Lucia 的命令下後撤整隊。可即便如此，第一道結界仍被火焰撕碎。</p><p>戰鬥被迫沿橋節節後移。你在混亂與灼熱之中穩住腳步，繼續把龍群擋在結界之前；然而第二道結界也在同樣的烈焰中崩毀。你被推向最後一道防線——不是為了逃，而是為了守住最後的封印。Lucia 呼喊著不留餘力，dragoon 以槍與翼迎戰，Estinien Wyrmblood （Ishgard 的傳奇 dragoon （龍騎士），並被 Aymeric 介紹為 Ishgard’s Azure Dragoon（蒼之龍騎士）。「Azure Dragoon」是職位／頭銜，代表受選定繼承並行使與龍相關之力量的 dragoon。名字後綴「Wyrmblood」：直譯概念是「龍血」。在劇情語境中，它用來強調他與龍之力（特別是與 the Eye / Nidhogg’s Eye 的影響）之間的深層牽連，等於是一個帶有象徵意味的稱呼／綽號式後綴，而非單純姓氏）也立於戰陣之中，將怒意化作必殺的槍勢。酷熱不斷吞噬意志，防線幾乎崩潰——但在結界被徹底毀滅之前，龍群終於撤退。Nidhogg 麾下最強的勇士之一被斬落，Horde 從 Steps of Faith 退去。</p><p>戰後，Temple Knights（Ishgard 的正規武裝騎士團以守護 Holy See 與 Ishgard 城防為核心職責，同時也是維持國內秩序與執行軍務的主力）幾乎不敢相信：你這個外來者竟能在如此可怖的敵人面前寸步不讓，將城市從灰燼邊緣拉回。Scions 在疲憊中交換著短暫的喘息——這是一場險勝，卻終究是勝利。Alphinaud 趕到，說 Steel Vigil 那邊同樣激烈，但 Crystal Braves 並未失色。Ser Aymeric 代表 Holy See 與 Ishgard 的人民向你致謝，卻也不得不立刻去處理傷者與戰後收拾——仍有殘敵未退，仍有人需要被抬離戰場。</p><p>Alphinaud 隨後談起這場勝利的意義：Dravanian Horde 已被削弱並四散，對 Ishgard 的威脅大幅降低；而 Holy See 也必須承認，與外部勢力合作已是必要之舉。你們在與龍群、primal、Ascians、以及 帝國 的長戰中犧牲良多，但仍一步一步向前，而你始終走在最前。他必須隨 Captain Ilberd 回到 Ul’dah 重整受創的部隊；至於你，應當回到 Rising Stones，把這段經歷親口告訴 Minfilia。</p><p>當你踏入 Rising Stones 的 The Solar，Minfilia 立刻迎上來。Alphinaud 早已送來圍城戰的消息，也提到了你在終結戰局時所扮演的角色。她望著你，語氣裡滿是震撼與感激——你的行動從未停止讓她驚嘆，而她由衷向你道謝。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 馬瑟蘭 <small class="muted"> 庫爾札斯中央高地（X:18.1, Y:14.9)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="an-allied-perspective.html">交錯的思緒</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="administrative-decision.html">塔塔露的憂鬱</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
