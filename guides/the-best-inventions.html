<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Best Inventions | BELAUG · FFXIV Library</title>
  <meta name="description" content="MSQ – The Best Inventions (ARR Patch 2.0)">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;
  overflow-y:auto;
  padding-right:8px;
  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left">
        <a class="home" href="../index.html">🏠 Home</a>
      </div>
      <div class="right">
        <button id="langToggle" class="icon-btn" aria-label="切換語言">English</button>
      </div>
    </nav>
  </header>

  <main class="container main">
    <div class="grid">
      <!-- 左：影片 -->
      <section class="card video-card">
        <div class="bd">
          <div class="video-wrap">
            <iframe id="ytFrame" src="https://www.youtube.com/embed/rlzSGtWBwkI"
              title="The Best Inventions" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <!-- 右：標題 + Tabs -->
      <section class="card">
        <div class="hd" id="pageTitle">The Best Inventions</div>
        <div class="tabs" role="tablist">
          <button class="tab-btn" role="tab" aria-selected="true"  data-tab="story">Story</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="acq">Acquisition</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="unlockq">Unlock Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="followq">Follow-Up Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="comments">Comments</button>
        </div>
        <div class="bd">
          <div id="panel-story" class="tab-panel active scroll-panel"></div>
          <div id="panel-acq"     class="tab-panel"></div>
          <div id="panel-unlockq" class="tab-panel"></div>
          <div id="panel-followq" class="tab-panel"></div>
          <div id="panel-comments" class="tab-panel">
            <div id="giscus_container" style="min-height:320px;"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

<script>
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'The Best Inventions',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Cid asks to speak with you in private, saying it concerns the chirurgeons. After talking with them, he learned they do not have enough alembics for their work, and he decided to help in the only way he knows—by building something with his own hands.</p>
      <p>Using pieces of broken equipment from the infirmary, he has fashioned a more advanced alembic. He calls it a gesture of goodwill, but admits it serves another purpose as well: the familiar motions of crafting stir feelings he cannot name, and he hopes that working this way might help him recover his memories.</p>
      <p>To finish the device, he needs only one thing from you: the cores of three ice sprites. He explains that such cores are commonly used to lower the temperature of alchemical mixtures, but he believes their properties can be altered so they draw cold inward rather than radiate it outward.</p>
      <p>He knows how it sounds—ridiculous, even impossible—yet he insists he somehow knows it will work. With that, you set out to gather what he needs, trusting his certainty more than the strangeness of the request.</p>
      <p>When you return, Cid meets you at Whitebrim Front and asks if you have obtained the cores. If you have, he says, show them to him, and he will complete the device.</p>
      <p>Before long, the chirurgeons are standing over the finished machine in awe. Cenota calls it amazing, then hesitates—can it truly be an alembic? She has never seen anything like it. Astidien agrees it is impressive, but admits he does not know what to make of it, nor how it is meant to be used.</p>
      <p>Cenota’s wonder turns quickly into hope. If the device truly works as Cid claims, she says, it would be a great boon to the infirmary—think of the medicines they could create, the lives they could save. Astidien still cannot shake his doubt, and before he can say more, Inquisitor Guillaime cuts in with a warning.</p>
      <p>He tells them to beware the kindly stranger who bears wondrous, strange gifts, for generosity comes at a cost. He insists that your earnest efforts are only a means to an unknown end, and adds that they should be wary of associating with those who interfered with the questioning of a suspected heretic. Astidien recoils at the accusation, blessing the inquisitor for arriving when he did, and declares they nearly succumbed to temptation offered by unbelievers. Cid can only stare after the inquisitor, asking why that man hates you so—whether it is all because you interrupted Lord Francel’s trial—and concluding that whatever the reason, he clearly intends to oppose you at every turn.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Cid <small class="muted">Coerthas Central Highlands (X:13.1, Y:15.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="factual-folklore.html">Factual Folklore</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 39 or above)</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="influencing-inquisitors.html">Influencing Inquisitors</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'野戦病院の蒸留器',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>あなたに声をかけてきた技師は、衛生士たちのことについて話があると言う。先ほど彼らと話してみたところ、必要なアレンビックが足りていないことが分かったらしい。</p>
      <p>彼は治療室に残されていた壊れた器具を利用し、より高度なアレンビックを作り上げたという。衛生士たちへの厚意としての贈り物であると同時に、手を動かして物を作ることが、自分の記憶を取り戻す手がかりにもなる気がするのだと打ち明ける。</p>
      <p>完成に必要なのは、氷の精霊が落とすコアを三つだけだ。通常は錬金術の調合を冷やすために使われるが、性質を変えれば、外へ冷気を放つのではなく、内へ冷えを引き寄せるようにできるのだと言う。</p>
      <p>ばかげて聞こえるだろう、ありえないと思うだろう、と彼は自嘲しつつも、それでも不思議と成功すると分かるのだと言い切る。あなたはその言葉を受け、必要なコアを集めるために動き出す。</p>
      <p>やがてあなたが戻ると、彼はコアを手に入れたかと確認し、持っているなら見せてほしいと頼む。そして装置は仕上げられ、衛生士たちの前に置かれることになる。</p>
      <p>衛生士の一人は、その装置を見て驚嘆する。見事な機械だが、本当にアレンビックなのか、と。今まで見たことがない形だという。主任衛生士も、確かに見事ではあるが、どう扱えばよいのか分からないと戸惑いを口にする。</p>
      <p>それでも、技師の言うとおりの効果があるなら、治療室にとって大きな助けになるはずだ、と衛生士は言う。作れる薬が増え、救える命も増えるかもしれない。主任衛生士がなお疑念を抱く中、審問官が割って入り、警告を放つ。</p>
      <p>審問官は、奇妙で見事な贈り物を携える親切そうなよそ者には気をつけろと言う。その厚意には代償が伴うのだと。さらに、あなたたちの真摯な働きは未知の目的のための手段に過ぎないかもしれず、異端の嫌疑をかけられた者の取り調べに干渉した者と関わるのは危険だ、とまで言い切る。主任衛生士はその言葉に動揺し、審問官が来てくれてよかった、危うく不信心者の誘惑に屈するところだったと口にする。技師はなぜそこまで憎まれるのかと問い、フランセル卿の裁きに割って入ったことが原因なのか、と考える。そして理由が何であれ、あの男はこれからもことごとくあなたたちに反対するつもりなのだ、と確信する。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> シド　<small class="muted">クルザス中央高地 (X:13.1, Y:15.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="factual-folklore.html">炊事場最前線</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 39～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="influencing-inquisitors.html">審問官ギイェームの横顔</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'技術進步',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Cid 先把你叫到一旁，說想跟你談談 infirmary 的 chirurgeons。前些時候他和他們聊過，才知道他們缺少足夠的 alembics，根本不敷使用。</p>
      <p>於是他把 chirurgeons 那些壞掉的器具拆下來再利用，親手做出一個更先進的蒸餾器。他說這既是示好，也是他自己的嘗試——當他重新用雙手工作時，那些熟悉的手感會喚起說不清的感覺，彷彿能幫他找回失去的記憶。</p>
      <p>要完成這個裝置，他只差最後一樣材料：三個 ice sprites 的核心。他解釋，這種核心通常用來降低鍊金混合物的溫度，但只要改變性質，就能讓它把冷意「吸進來」，而不是把冷意「散出去」。</p>
      <p>他也知道這聽起來很荒謬，甚至像不可能做到的事；可他仍然堅持：不知為何，他就是知道一定行。你接受了這份請求，去替他取回那三個核心。</p>
      <p>等你回到 Whitebrim Front，Cid 立刻追問你是否已經拿到核心；若你已經得手，他請你把它們交給他，好讓他完成那個裝置。</p>
      <p>不久後，infirmary 的人也圍了上來。Cenota 看著那台機械驚嘆不已，卻又遲疑地問：這真的是蒸餾器嗎？她從沒見過這樣的造型。Astidien 也說自己同樣拿不準，裝置確實令人印象深刻，但他完全不知道該如何使用。</p>
      <p>Cenota 雖然困惑，卻仍被希望推著往前走。她說，如果這真像 Cid 聲稱的那樣有效，那對 infirmary 會是極大的助力——他們也許能製作更多藥物、挽救更多性命。Astidien 仍不放心，話還沒說完，Guillaime 就插了進來。</p>
      <p>Guillaime 警告他們要提防「帶著奇異贈禮的友善陌生人」，因為這種慷慨往往伴隨代價。他說你們的努力或許只是為了某個尚未知曉的目的；更何況，他還提醒他們要小心——不要和那些干涉過「疑似 heretic 的訊問」的人扯上關係。Astidien 震驚地追問「他們做了什麼」，隨即轉而感謝 Guillaime 及時趕到，說他們差點就被這些「不信者」拋出的誘惑所動搖。Cid 只能望著那人離去，低聲問你：為什麼他會那麼厭惡你們？是不是就因為你們打斷了 Lord Francel 的審理？可不管原因是什麼，他顯然已經決定，往後每一步都要與你們作對。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 希德　<small class="muted"> 庫爾札斯中央高地 (X:13.1, Y:15.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="factual-folklore.html">炊事前線</a></div>
      <div class="row">所有職業（不含限定職） 等級 39 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="influencing-inquisitors.html">異端審問官的側面</a></div>
    </div>`
  }
};

const tabBtns = [...document.querySelectorAll('.tab-btn')];
const pageTitle = document.getElementById('pageTitle');
const langToggle = document.getElementById('langToggle');
const panels = {
  story: document.getElementById('panel-story'),
  acq: document.getElementById('panel-acq'),
  unlockq: document.getElementById('panel-unlockq'),
  followq: document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
