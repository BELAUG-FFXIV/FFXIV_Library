    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
<p>Nashu praises your coordination, and Delion declares the moment has come: Sharlayan is the beating heart of the conspiracy, and he refuses to let them hide their schemes. Brandihild adds, in his stiff manner, that his own calculations failed—but your quick thinking didn’t, and you brought the villain down with tremendous flourish. PuPu thanks you too, saying he heard you went looking for ingredients for his medicine, and he’s deeply grateful.</p>
<p>Hildibrand announces Old Sharlayan awaits, and that you need only charter a ship—until Brandihild points out it would take days to sail north. That’s when Hildibrand eagerly seizes on an “experimental aetheryte” that can send you there even without attunement, and you teleport straight to Archons’ Design. The price is immediate: Delion is hit hard by aether sickness, barely able to stand, while Nashu laughs that experimental aetherytes make travel far more fun. PuPu, used to cosmic travel, is unfazed, and Hildibrand declares a sophisticated gentleman should feel at home in this city of learning.</p>
<p>Still queasy but determined, Delion insists this is no time to fold—this is the belly of the beast. He repeats a rumor that Sharlayan’s secret agents collect “specimens” for a confidential project in a massive underground military facility. You can push back—those “agents” sound like gleaners, and Labyrinthos isn’t a military base—but either way, Hildibrand takes the bait and decides you should go down there and ask questions.</p>
<p>At the Hall of Artifice, the lift attendant refuses entry unless every companion has proper permission. Delion explodes, accusing them of hiding aliens and xenotechnology. Then Godbert appears yet again, saying his own search for a Manderville weapon-related object has led him to Labyrinthos. He vouches for your group, and the attendant relents: as a Syndicate member with ambassadorial status, Godbert may bring an entourage, and your permissions are arranged.</p>
<p>You descend into Labyrinthos and reach the Archeion—an underground archive so lavish it imitates the outdoors. Delion sees it as proof of simulation work for an alien invasion, while the others are genuinely impressed: PuPu notes the environment is tailored for surface beings, and Hildibrand points out that if anyone would know about visiting aliens or crashed vessels, it would be the studious collectors who keep samples from all over Etheirys.</p>
<p>In the Archeion, a custodian denies any record of a shiny silver saucer. Delion accuses them of lying and of secretly researching alien ships. The custodian calmly denies it, admits Sharlayan built a starfaring vessel in Thaumazein (not military, not extraterrestrial), and then offers the one useful thing: they recall seeing someone like your blue companion—at Meryall Agronomics in the Medial Circuit. With that lead, Godbert leaves you to your hunt.</p>
<p>At Meryall Agronomics, most workers assume you’re describing a mandragora or joke about blue grapes—until a Lalafellin agriculturist confirms it: they saw the little blue man, not a mandragora, traveling with a gleaner and an outside visitor. Hildibrand then reveals he’s already coaxed out more: the farmer knows the gleaner and will bring them to you.</p>
<p>The good-hearted gleaner arrives and makes the obvious mistake—assuming PuPu and the other blue man are the same species. They confirm the “twin” really was here, and explain what happened. In Thavnair, on a procurement mission, the gleaner met an apothecary with an unusual companion and a wagon carrying a damaged vessel unlike anything they’d seen. The apothecary had ventured into war-torn Garlemald to sell medicines, fled when it became too dangerous, and later found a strange silver ship and its shaken pilot crash-landed in the snow. He rescued them and brought them back to Radz–at–Han, but repairs were difficult—parts were impossible to source.</p>
<p>So the gleaner suggested bringing the wreckage to Labyrinthos. They escorted the apothecary and the blue pilot there, but even the Thaumazein engineers who worked on the ark couldn’t comprehend the exotic craft. The blue visitor eventually drafted schematics; the engineers followed them to fabricate needed components while the apothecary and his companion waited at Meryall. Once the parts were ready, the visitor repaired the ship quickly, and the pair departed almost at once—vanishing from the gleaner’s sight thereafter. The gleaner admits they love entertaining alien fantasies thanks to The Thavnairian Truth, but they swear the story is real.</p>
<p>Delion is stunned for a new reason: he has readers in Sharlayan, and begins to think he misjudged them. PuPu is relieved and grateful—his friend is alive, traveling with a Hannish apothecary. Hildibrand believes the case is close to closing and calls everyone back to Radz–at–Han to continue the search.</p>
<p>Back in Radz–at–Han, Hildibrand summarizes: PuPu’s friend is safe and likely still on the isle. Godbert returns with his own success story: long research revealed a hereditary Manderville relic containing secrets of weapon augmentation, which a visiting scholar long ago placed in Sharlayan’s safekeeping. In Labyrinthos, it had been forgotten in a dusty corner of the Archeion.</p>
<p>PuPu recognizes it immediately—and drops the true bombshell. The device was made by the Mandervillians, a starfaring race PuPu’s people once traded with. He offers to project the stored images, and in a darkened room at Kama, the relic plays a message from Godbrand—revealing the Mandervillians’ cosmic origin: parasitic symbionts who survive by bonding with hosts, strengthening their bodies and continuing their line through compatible hosts. Godbrand explains their civilization ended after an inexplicable calamity twisted life into nightmares; he and a comrade fled and crash-landed on your planet. Found by a dying man who willingly offered to be his vessel, Godbrand transferred his essence, lived on, forged a life, and founded the bloodline of House Manderville—leaving his descendants a plea to use their extraordinary attributes and armory for the good of the people of this star.</p>
<p>Brandihild is awed. Hildibrand, undeterred, vows to keep serving justice no matter the size of the case. Nashu, suddenly practical, wonders why Julyan is so monstrously strong—does that mean she’s alien-descended too? Godbert, inspired more than shaken, declares his weapon project unchanged and asks you to meet him at the aetheryte plaza.</p>
<p>At the plaza, Delion admits the biggest shock wasn’t the alien ancestry—it was that Sharlayan has devoted readers of his publication. He retracts his earlier condemnation: the Sharlayans are seekers of knowledge, not conspiracy architects…though he still insists PuPu has ulterior motives and tells you to stay ready. Godbert then gifts you a small clockwork simulacrum inspired by PuPu’s earnest quest, and reminds you your help with Manderville weaponry is welcome whenever you can spare the time.</p>
<p>Far away in Thavnair, the scene shifts: a dubious individual reports to Lord Vanhudi that Professor Lugae’s ambush failed again, but preparations for “the manifestation” are well underway—and it will proceed as planned.</p>
</div>

    pageTitle:'のうてんきな一家',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
<p>ナシュは「いい連携だった！」とあなたを褒め、デリオンは高らかに宣言する。陰謀の鼓動する中心はシャーレアン――もう奴らに策動を隠させはしない。ブランディヒルドはぎこちない口調で、自分の計算は外れたが仲間は外れなかった、とりわけあなたの機転が悪党を華麗にねじ伏せたのだと称える。ププもまた、薬の材料集めに奔走したと聞き、心から礼を述べる。</p>
<p>ヒルディブランドは「オールド・シャーレアンへ！」と意気込むが、ブランディヒルドが航海日数を指摘する。そこで持ち出されたのが「試験運用のエーテライト」だ。同調がなくとも転送できると聞いたヒルディブランドは大喜びで飛びつき、一行は一気にアルコンデザインへ。だが代償としてデリオンはエーテル酔いで青ざめ、まともに立つこともできない。ナシュはそれすら楽しげに受け止め、ププは平然、ヒルディブランドは学問の都に相応しいと胸を張る。</p>
<p>吐き気に耐えながらもデリオンはここが「獣の腹」だと言い、噂を並べ立てる。シャーレアンの密偵が各地で「標本」を集め、極秘研究のため巨大な地下軍事施設へ運び込んでいる――真相はそこにある、と。あなたが「グリーナーのことか」「ラヴィリンソスは軍事施設ではない」と正しても、ヒルディブランドは「行って確かめよう」と即断し、地下へ向かうことになる。</p>
<p>工房館の昇降機前では、同伴者全員に許可が必要だとして門前払い。デリオンは怒鳴り散らし、異星技術とエイリアンを隠していると糾弾する。そこへまたもゴッドベルトが現れ、マンデヴィル武器の改良に欠かせぬ品を求めてラヴィリンソスへ来たのだと告げる。彼が一行の素性を保証すると、対応役はフォーラムからの連絡を理由に許可を即座に整え、あなたたちは降下を許される。</p>
<p>ラヴィリンソスのアーケイオンは、地下とは思えぬ「地上の再現」だった。デリオンは侵略支援のためのシミュレーションだと決めつけるが、ププは地上生物向けに環境を整えたのだと見抜き、ヒルディブランドは全土から集めた標本と資料があるなら訪問者の情報も期待できると言う。</p>
<p>管理人は銀色の円盤の記録はないと答え、デリオンは偽装だと噛みつく。管理人は異星船の秘密研究などしていないと否定し、ただしタウマゼインで星船を建造した事実は認める――軍事目的でも地球外由来でもない、と。そして肝心の手掛かりをくれる。あなたの青い同行者に似た個体を、メリアル農学区で見たというのだ。</p>
<p>メリアル農学区では、多くが「マンドラゴラ」や「青い葡萄」を連想するだけだったが、ララフェルの農夫が決定的に証言する。確かに小さな青い者を見た、それはマンドラではなく、グリーナーと外来の訪問者と一緒だった――と。さらにヒルディブランドが聞き出した情報によれば、そのグリーナー本人を連れて来られるという。</p>
<p>善良そうなグリーナーは、ププともう一体を同種だと思い込むが、確かに「ほぼ双子のような青い者」はここにいたと語る。彼はタヴナイアでの調達任務中、薬師と不思議な同行者に出会い、荷車には見慣れぬ損傷船が積まれていたという。薬師はガレマルドの戦地へ無謀にも薬を売りに行き、危険に晒され退却する途中、雪原に墜落した銀の船と動揺した操縦者を見つけた。救い出してラザハンへ連れ帰ったが、修理部品が見つからない。そこでグリーナーがラヴィリンソスへ残骸ごと運ぶことを提案し、同行してここまで案内した――しかしアーク建造に関わった技術者ですら理解できず、青い訪問者は設計図を書き、必要部品を一から作らせた。修理が整うと二人はすぐ去り、それきりだという。</p>
<p>デリオンは読者がシャーレアンにもいると知って衝撃を受け、シャーレアンを見誤っていたかもしれないと思い始める。ププは友が無事で、ハヌの薬師と行動していると知り安堵する。ヒルディブランドは事件終結が近いと感じ、ラザハンへ戻って続きの捜索を宣言する。</p>
<p>ラザハンでは、ゴッドベルトが別件の成果を持ち帰る。武器強化の秘密を宿すマンデヴィル家の遺物が、かつて学者の手でシャーレアンへ預けられ、ラヴィリンソスの片隅で未処理のまま眠っていたのだ。ププはそれを見て言う――これは星を渡った「マンデヴィリアン」の装置であり、かつて交易した種族の技術だ、と。そして暗室で映像を投影すると、ゴッドブランドの記録が再生される。マンデヴィリアンは宿主と結合して生きる共生寄生体であり、文明は謎の災厄で滅び、逃れてこの星へ墜落した。瀕死の男が自ら器になることを望み、ゴッドブランドはこの星で家を築き、マンデヴィル家の血統に強靭さを残し、末裔に「この星の人々のために力と武具を用いよ」と願いを託した。</p>
<p>ブランディヒルドは驚嘆し、ヒルディブランドは相変わらずの調子で正義を誓う。ナシュはジュリアンの怪力に思い当たり、あれも血の因果なのかと首を傾げる。デリオンはついにシャーレアンへの評価を改め、知を求める民だと認める――だがププだけは裏があると疑い続け、備えよと言い残す。ゴッドベルトはあなたへ贈り物として小さな時計仕掛けのシミュラクラムを渡し、マンデヴィル武器の計画は今後もあなたの助力を歓迎すると告げる。</p>
<p>そして場面は転じ、タヴナイアのどこか。胡散臭い男がヴァンフーディ卿に報告する。ルガエ教授の待ち伏せはまた失敗、所在は不明――だが準備は進んでおり、「顕現」は計画通り実行される、と。</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>Nashu 先誇你們配合得漂亮；Delion 接著像終於等到舞台一樣，宣告時機到了——Sharlayan 就是這場陰謀跳動的心臟，他絕不讓他們再把那些手段藏起來。Brandihild 用他那種卡卡的語氣補上一句：他的計算也許失準，但同伴沒有；真正把惡人用「華麗一擊」放倒的人，是你。PuPu 也感激地說，他聽 Brandihild 提到你們去找他藥材需要的材料，對此非常非常感謝。</p>
<p>Hildibrand 說 Sharlayan 在等著你們，只要包一艘合適的船就好——但 Brandihild 馬上指出，Old Sharlayan 在北方，得航行好多天，難道沒有更快的方法嗎？Hildibrand 立刻抓住「實驗用 aetheryte」這個選項：即使沒同調也能直接傳送？太好了，馬上用！於是你們瞬間抵達 Archons’ Design。</p>
<p>代價立刻反映在 Delion 身上——他被 aether sickness 折磨到臉色發青，連呻吟都快接不上氣；Nashu 還在旁邊半開玩笑，說希望他沒太留戀剛剛那頓晚餐。PuPu 與 Brandihild 反倒很平靜，PuPu 說自己跑遍宇宙，傳送根本不算什麼；Hildibrand 則精神抖擻地把 Old Sharlayan 稱作「學問之都」，說一位成熟的紳士理當如魚得水。Delion 一邊乾嘔一邊抱怨，為什麼你們都不會想吐，還說自己好像是這群怪人裡唯一正常的那個。</p>
<p>但他又硬撐著把話說下去：這不是倒下的時候，尤其不是在「野獸的肚子裡」。他搬出傳聞——Sharlayan 的祕密幹員會在各地蒐集「樣本」，帶回來供一個機密研究計畫使用；而那計畫就在一座巨大的地下軍事設施裡進行。你可以提醒他那些「幹員」其實像是 gleaners、而 Labyrinthos 也不是軍事基地，但 Hildibrand 不管你怎麼回，都把重點抓成「值得去問問」，決定往地下走一趟。</p>
<p>你們到 The Hall of Artifice 搭乘電梯，卻被 Nilzozo 擋下：每個同伴都得有正式許可才行。Hildibrand 想靠「看一眼就能判斷我們可信」蒙混過去，Delion 直接失控，指著對方大喊你們才該被審判，還說他知道你們把外星人和外星科技藏在地下基地。Nilzozo 一臉莫名，表示根本不知道他在講什麼。就在氣氛尷尬時，Godbert 又「碰巧」出現，說自己正在找一樣與 Manderville 武器精煉息息相關的物件，線索也指向 Labyrinthos；既然你們也要下去，他願意替你們擔保。</p>
<p>Nilzozo 立刻改口，說 Forum 早已通知 Godbert 將抵達；以 Syndicate 成員的「使節身分」，他可以帶最多五名隨行者，於是你們的許可直接被安排妥當。Godbert 還建議你們暫時跟他走，先去 Archeion。</p>
<p>到了 Labyrinthos，你們站在一座地下檔案庫裡，卻像置身「人造地表」：空間奢華到連戶外環境都模擬出來。Delion 馬上把它解讀成「演算侵略策略」的證據；Brandihild 只覺得這裡的收藏令人難以置信，想等任務結束再回來細看；PuPu 則說這是把地下環境調整成更適合地表生物生存的形態，讓他想起自己故鄉星球打造的軌道站。Hildibrand 也說，既然這裡收集了 Etheirys 各地的樣本與標本，真要找「造訪的外星人、墜毀的星際船」之類情報，恐怕就得問這些研究者。</p>
<p>你們在 Archeion 詢問「閃亮的銀色飛碟」，保管人表示檔案裡沒有任何紀錄。Delion 不肯相信，咬定這地方就是軍事堡壘，正在祕密研究外星船。保管人冷靜否認，並提到 Sharlayan 的確在 Thaumazein 建造過一艘能航行星際的船，但既非軍事用途，也不是外星物。接著他給出真正有用的線索：他記得看過一個外貌很像 PuPu 的人，出現在 Medial Circuit 的 Meryall Agronomics。Hildibrand 立刻道謝，Godbert 則告別去辦自己的事，你們循線趕往農學區。</p>
<p>在 Meryall Agronomics，多數人聽到「小小的藍色人形」就聯想到 mandragora，甚至有人只想到「藍色葡萄」；直到一位 Lalafell 農務員斬釘截鐵地說：他親眼看過，那不是 mandragora。他看到一名 gleaner 與一位外來訪客同行，那個你們描述的「小藍人」就跟在旁邊。Hildibrand 這時補上：他剛剛也從農人那裡套出更多訊息，對方其實認識那名 gleaner，馬上就會把人帶來，叫大家都到齊一起聽。</p>
<p>Good-hearted Gleaner 出現後，一開口就以為你們帶來了「幾乎一模一樣」的同族——但他也證實：PuPu 的朋友確實來過。他從頭講起：自己在 Thavnair 進行採購任務時，遇到一名藥師與他那位奇特的同伴；那位同伴外貌幾乎與 PuPu 是雙胞胎，而他們的車上還載著一艘嚴重受損、前所未見的船。因為職業習慣，他忍不住上前詢問。</p>
<p>藥師很爽快地說明經過：他曾冒險跑去戰火中的 Garlemald 賣藥，心想有衝突就會有醫療需求；但局勢比他想像更危險，只得放棄生意踏上返鄉路。沒多久，他在雪原發現一艘奇怪的銀色船墜毀，還有一名驚魂未定的駕駛。他把人和殘骸從雪裡挖出來，帶回 Radz–at–Han；可就算市集奇珍異寶再多，也找不到合適零件，修理陷入僵局。</p>
<p>於是 gleaner 建議把整艘殘骸帶到 Labyrinthos，自己也親自護送他們前往。可即便是曾參與「方舟」工程的 Thaumazein 技師，也無法理解那艘陌生船的技術，更別說仿製。那名小藍人最後改用畫設計圖的方式，讓技師照著一步步做出「必需的小零件」；而藥師與同伴就暫住在 Meryall 等候。等零件到手，小藍人幾乎轉眼就修好船，兩人立刻離開，之後便再無消息。Gleaner 還半開玩笑說自己愛看 The Thavnairian Truth，所以也喜歡想像外星人之類的事，但他離開前再次確認：至少你們走在正確方向上。</p>
<p>Delion 這次震驚的點完全歪掉——他發現自己在 Sharlayan 竟然也有讀者，甚至開始覺得也許自己誤會了這些人。PuPu 則因為「朋友平安」而明顯鬆了一口氣，Hildibrand 也認為案件快要收束，決定返回 Radz–at–Han 繼續追查。</p>
<p>回到 Radz–at–Han，Hildibrand 做了整理：PuPu 的朋友安全無恙，與一位 Hannish 的藥師同行，而且可能仍在這座島上。這時 Godbert 也帶著他的成果回來——他苦找許久，才從祖先日誌得知：Manderville 家族有一件「世代相傳的遺物」，內藏武器強化的祕密；當年一位造訪的學者對它極感興趣，於是把遺物交給 Sharlayan 保管研究。線索帶他回到 Labyrinthos，結果那群人根本還沒來得及研究，遺物就被塞在 Archeion 的角落、蒙塵等處理。</p>
<p>PuPu 看了一眼就說他能幫忙：這類裝置出自「Mandervillians」——一個曾與他們交易、能航行星際的種族。若你們願意，他能讓裝置投影出裡面儲存的影像，但最好在暗室裡看得最清楚。你們於是回到 Kama 關燈觀看，裝置投影出一段記錄：Godbrand 自稱為「漫遊群星的武器匠」，並揭露 Mandervillians 的宇宙起源——他們是寄生共生體，必須與宿主結合才能存活，會強化宿主肉體、取代意識；文明繁盛後卻遭遇無法理解的災厄，無數星球上的生命被扭曲成噩夢。為逃避同樣命運，他與同伴駕船逃亡，最後墜落在你們的星球。他重傷瀕死時，被一名追尋「墜落之星」的人發現；那人身患絕症，主動願意成為容器，讓 Godbrand 轉移本質存活下來。Godbrand 在此成家立業、延續血脈，並相信這種「強化體質」會一代代傳下去，成為 House Manderville 的特質。最後，他懇求後代用這份能力與武器庫，守護這顆星球脆弱卻善良的人們。</p>
<p>Brandihild 低聲感嘆震撼；Hildibrand 則像什麼都不會動搖一樣，宣告無論大案小案，只要為人們服務就都要辦到底。Nashu 想起 Julyan 的怪力，忍不住問她是不是也有外星血統；Godbert 也不改初衷，反而更受激勵，說他會把 Manderville 武器推向巔峰，並請你到 aetheryte plaza 等他，有禮物要給你。</p>
<p>在廣場，Delion 先說有些真相足以撼動信念，但這次最讓他震驚的不是外星血統——而是他在 Sharlayan 有忠實讀者。他收回先前對 Sharlayan 的指控，改口說那些人只是追求知識、敢於面對未知的求知者；但他仍咬死 PuPu 有別的目的，要你保持戒備。Godbert 隨後把禮物交給你：他在鍛造間隙做了一個小小的機械仿偶，讓你照顧它，當作你們一路冒險的紀念；至於 Manderville 武器計畫，他也再次表示，你什麼時候有空都歡迎來幫忙。</p>
<p>鏡頭最後轉到 Thavnair 的另一處——一名可疑人士向 Lord Vanhudi 報告：Professor Lugae 設下的埋伏又失敗了，行蹤不明。但無所謂，準備都已就緒——「顯現」將照計畫進行。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
