    story:`<div class="clamp" data-collapsed="true">
 <p>You listen as Hildibrand briskly lays out the plan: you will head for the Observatorium in Coerthas and pose as ordinary smallfolk under Inspector Briardien’s orders—unless the moment demands you ignore them entirely. With a flourish, he names you his seasoned guide and urges you to lead the way, while Gilgamesh mutters that the demon bird still eludes him and vows to reclaim his stolen weapon.</p>
  <p>At the Observatorium, Hildibrand immediately tries to interrogate a guard he assumes is part of the transport detail, only to be cut off—this is no time for his theatrics. Briardien’s men keep you under watch and press you into service at the eastern gate, repeating the description: a towering brute in red, halberd in hand. You wait, you look, and you report what you can, but nothing shows itself as the cold and snow bite on.</p>
  <p>Ellie soon finds you and scoffs at the lack of results, suggesting the duelist may simply be waiting beyond the walls for wagons to pass. She pointedly warns that if you step into the wilderness, you should bring more than clever words. Hildibrand insists a gentleman avoids violence unless forced, and Nashu eagerly offers to fight in his stead—brandishing a spear she dug up from the snow, the very one Hildibrand claims once propelled him toward the red moon. Hildibrand takes it as destiny’s command and declares the search will continue east of the Observatorium, properly armed for the worst.</p>
  <p>As you press on, Gilgamesh finally explains why he hunts his weapon with such hunger: a “strongest of spears,” crowned with an axe blade and welded to a musket barrel, one of the first treasures of his collection in these lands. Then his words catch—your spear resembles it too closely. The two men square off in outrage, each declaring he will not relinquish what he claimed, until their argument becomes the very distraction Ellie needed to spot the truth taking shape.</p>
  <p>Briardien moves at once, treating Gilgamesh’s boast—that every weapon he took was a trophy won in single combat—as a confession. Hildibrand loudly reframes the entire disaster as his own flawless scheme, but the facts refuse to bend. Gilgamesh slips away regardless, reappearing to address you from behind closed doors with theatrical certainty: you and he were fated to duel, and you may call whatever allies you wish—it will do you no good. As he proclaims that it is “embiggening time,” Hildibrand is left groaning, wedged and helpless, insisting you leave him and see the matter through.</p>
  <p>Later, at Vesper Bay, the delivery proceeds—until Lady Durilda arrives and demands her Treaty-Blade, as though none of you have already finished the job. The moment snaps into focus: someone disguised themselves as the client and let the blade come to them, using the entire transfer as cover. Ellie notes the man in red spoke only of the halberd, never the Treaty-Blade, and the heap of swords nearby makes the insult worse—counterfeits upon counterfeits, while the real prize vanishes.</p>
  <p>When a new message appears, its tone shifts from crude threat to riddling declaration: a phantom thief of many faces, laying claim not only to property but to “the lapis maiden’s virtue.” Ellie recognizes the pattern, Briardien curses, and Hildibrand—undeterred by humiliation—grandly accepts the challenge yet again. Even Durilda, furious moments before, breaks into laughter at the spectacle of the two “gentleman mummers” rushing about, while Nashu, distracted by details only she would notice, fixates on the strange goggles worn by the men and wonders what she might be able to coax from them next.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>ヒルディブランドは勢いよく方針をまとめ、あなたに告げる。目的地はアドネール占星台、そしてブリアルディアンの指示どおり「善良な平民」に扮して動くこと――ただし状況次第では、その指示など即座に無視せよ、と。あなたは旅慣れた者だろうと持ち上げられ、クルザスへの道案内を任される一方、ギルガメッシュは魔鳥への復讐と奪われた武器の奪還をぶつぶつと誓い続ける。</p>
  <p>アドネール占星台に着くや否や、ヒルディブランドは輸送役と見誤った衛兵に向かって大仰に声を張るが、空気は冷たく刺さるだけだ。ブリアルディアンの部下はあなたたちを「平民」として扱い、東門付近の手薄を補えと命じる。探すのは、赤い装束の巨体で斧槍を持つ男。見つけたら単独行動はするな、必ず合流して捕らえるのだと釘を刺され、あなたは雪と風の中で目を凝らす。</p>
  <p>そこへエリーが現れ、成果のなさを皮肉る。犯人は城壁の外で荷車を待っているだけかもしれない、と。荒野へ出るなら、機転だけでは足りないと忠告されても、ヒルディブランドは紳士として暴力を好まぬと言い張る。だがナシュが雪中から掘り出した槍を掲げ、代わりに戦うと息巻くと、ヒルディブランドはそれを「紅き月へ導いた」因縁の槍だと言って受け取り、運命の意思だとばかりに探索を続行する。</p>
  <p>行軍のさなか、ギルガメッシュはついに執念の理由を語り出す。斧の刃を戴き、銃身すら継ぎ合わせた、まさしく「最強の槍」――この地に来て間もなく手に入れた、誇り高き蒐集品だという。だが彼の視線があなたたちの槍に吸い寄せられ、言葉が途切れる。似ている、いや同じだと確信した瞬間、二人は互いに譲らぬと叫び、対立は決定的になる。</p>
  <p>ブリアルディアンは、その騒ぎを逃さない。ギルガメッシュが「一騎打ちで勝って武器を奪うのは正当だ」と豪語したのを、立派な自白だと断じて拘束を命じる。ヒルディブランドは慌てて一連を自分の完璧な計画だったと言い換えるが、現実は容赦なく進む。ギルガメッシュはなおも逃れ、扉の向こうからあなたに語りかける――あなたと自分は決闘する運命だった、勝てば槍を渡す、負ければ武器は没収だ。仲間を呼ぶことさえ許すが無駄だと嘲り、「今こそ巨大化の時だ」と宣言する。ヒルディブランドは身動きが取れず、うめき声を漏らしながら、後はあなたに任せるしかない。</p>
  <p>やがてベスパーベイで輸送は完了したかに見えたが、ドリルダが現れてトリーティー・ブレードの所在を問い詰める。そこで全員が悟る。依頼人になりすました誰かが、既存の状況を利用して目を逸らさせ、真の盗みを成し遂げたのだと。エリーは、赤い男が口にしたのは斧槍だけでトリーティー・ブレードではなかったと指摘し、周囲に転がる剣がさらに不穏さを増す――偽物、偽物、偽物ばかりで、本物は消えた。</p>
  <p>さらに新たな書き付けが現れ、その文面は「幾つもの顔を持つ怪盗」を名乗って、あなたたちの前に次の謎を投げつける。奪うのは物だけではない、瑠璃色の乙女の貞節さえ我がものにすると。エリーは同じ意匠だと即座に断じ、ブリアルディアンは苛立ちを隠さず、ヒルディブランドはまたしても堂々と挑戦を受ける。怒りの最中にあっても、ドリルダは二人の右往左往を「紳士の道化芝居」と笑い飛ばし、ナシュは男たちの奇妙なゴーグルに目を留めて、次はそれを手に入れられないかと胸を躍らせる。</p>
</div>

    pageTitle:'天下無雙的挑戰者',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },

    story:`<div class="clamp" data-collapsed="true">
<p>你聽著 Hildibrand 乾脆俐落地整理計畫：目的地是 Observatorium，在 Briardien 的安排下扮成「普通平民」行動——但若情勢需要，就把那些指示先丟到一邊。你被他推成經驗豐富的旅人，負責帶路前往 Coerthas；而 Gilgamesh 仍惦記著那隻惱人的飛禽，發誓不只要報仇，也要把武器一併奪回。</p>
  <p>到了 Observatorium，Hildibrand 立刻想對看似相關的人盤問，卻馬上被壓下氣勢。守備的人把你們當成「多出來的平民」使喚，叫你去東門附近幫忙盯梢，並把目標描述再講一遍：穿紅衣的高大壯漢，手持 halberd。你在刺骨寒風與白雪裡守著、看著、等著，卻始終不見可疑身影。</p>
  <p>Ellie 很快就出現，對這種「什麼都沒找到」的結果不屑一顧。她提醒你，對方也可能只是耐心守在城牆外，等下一批貨車離開；如果你打算走進野外，最好別只靠嘴上功夫。Hildibrand 仍堅持紳士應盡量避免動武，但 Nashu 興沖沖表示可以替他戰鬥，還拿出她從雪裡挖到的長槍——Hildibrand 一眼就認出那正是當年把他「送上紅月」的那把槍。他把它當成命運的暗示，宣布要帶著武裝繼續往東搜尋。</p>
  <p>在搜尋途中，Gilgamesh 終於把他執著的理由說清楚：他追逐的是「最強之槍」——外形像槍，卻又在槍頭加上巨大的斧刃，甚至焊上了槍管，是他來到這片土地後最早收藏的珍品之一。可當他的目光落在你們手中的槍上，他的話戛然而止：那相似得太過分了。憤怒與不肯退讓瞬間撞在一起，兩人各自宣稱絕不交出自己「應得」的武器，衝突一觸即發。</p>
  <p>Briardien 立刻抓住這個破綻。Gilgamesh 一句「我拿走的每件武器都是我在單挑中勝利的戰利品」，在他耳中就是赤裸裸的供詞。Hildibrand 急忙把整件事硬說成自己精心設計、用來逼出真相的完美計畫，但現實不配合。Gilgamesh 仍設法逃脫，轉而在門後對你發出戲劇般的宣告：你與他注定要決鬥——你勝，他給你長槍；你敗，你與同伴的武器都將被沒收。他甚至允許你召來幫手，卻嗤之以鼻地說毫無差別，並高喊「現在輪到 Gilgamesh 變大了」。而 Hildibrand 自己卻被卡住動彈不得，只能呻吟著把後續交給你。</p>
  <p>之後在 Vesper Bay，看似完成的交付卻被 Durilda 的質問打碎——她要的是 Treaty-Blade，為什麼沒人在碼頭等她，為什麼她的收藏不見了。你們這才看穿：有人假扮成委託人，利用現成的局勢把所有人引到錯的方向，讓真正的偷竊在眼皮底下發生。Ellie 也指出，那個穿紅衣的人從頭到尾提的都是 halberd，根本沒提 Treaty-Blade；更糟的是，旁邊散落的一堆劍明顯全是仿品，假得連外行都看得出來。</p>
  <p>緊接著又出現一封新的挑釁訊息，語氣比先前更陰冷、更像謎語：自稱擁有千張面孔的怪盜，宣稱「你所有的終將成為我的」，甚至要奪走「lapis maiden 的貞潔」。Ellie 立刻認出那熟悉的格式與措辭，Briardien 惱怒至極，Hildibrand 則再次高調接受挑戰。就連前一刻還暴怒的 Durilda 也被這一連串滑稽奔走逗笑，說你們像兩個忙得團團轉的「紳士小丑」；而 Nashu 的注意力早已被那些男人戴著的特殊護目鏡勾走——她一邊好奇，一邊盤算著下次是否能弄到一副。</p>
</div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
