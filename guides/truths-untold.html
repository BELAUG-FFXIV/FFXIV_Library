    story:`<div class="clamp" data-collapsed="true">
<p>Cecy steps out from behind the unmasked confusion with a calm, cutting smile—and the resemblance is unmistakable. She tells you that Ellie is her sister, her partner, her own flesh and blood. The “phantom thief” who stole relics and slipped through every net was Cecy all along, while Ellie stood beside you in plain sight—feeding her the details she needed, then turning the chase into headlines that made the whole city cheer.</p>
<p>When Hildibrand demands to know what the sisters hope to achieve, Cecy’s answer is simple: justice. She spits back that the histories are lies and that Ul’dah’s truth-keepers have spent centuries burying what really happened to Sil’dih. She claims a dreadful powder was used to turn living people into walking corpses—and that those who defended the lie deserve to taste the same horror.</p>
<p>Cecy reveals the heart of their scheme: a secret vault, sealed by powerful magicks, that can be opened only by assembling four relics of Belah’dia. With those relics gathered, Ellie is already on her way to the vault—and Cecy laughs as she paints the image of “zombie powder” raining down upon Ul’dah’s streets. The threat stops being a riddle and becomes an immediate countdown.</p>
<p>Then Cecy moves to make it real. In the panic, the powder meant for Phillice hits Hildibrand instead as he throws himself in the way. He drops with a sickly pallor—green creeping into his face—while outrage and disbelief collide around you.</p>
<p>A sharp voice tears through the chaos, and a figure in black darts in with brutal speed. With a frying pan’s clean, merciless swing, she knocks Cecy senseless—then, without hesitation, drops Godbert too. She introduces herself as Julyan, Hildibrand’s mother, and orders you to stop staring and start helping before her son’s condition becomes irreversible.</p>
<p>Julyan says there may still be time—if you purge the toxin before it spreads. She tells you to fetch what she needs to make holy water: a piece of Oversoul rags from Syntgoht and high-purity distilled water from a trader named Gest. Briardien peels away to search for Nashu, while Gilgamesh—aching and grumbling—ends up thrown into your path as your muscle for the errand.</p>
<p>At the markets, Syntgoht refuses at first: his last piece is already promised, unless you can produce chimera membrane. Before you can even curse the luck, Avila appears—fresh from training, chimera kills done for the day—and tosses you what you need. With the bargain satisfied, Syntgoht hands over the Oversoul cloth, starstruck at having met her.</p>
<p>Gest is worse: he sneers at the Mandervilles and tries to walk away to his ballroom. But Arabella arrives in the midst of someone’s grand romantic plea, recognizes you, hears what’s at stake, and calmly sets her price—Gest gives you the distilled water, or he doesn’t get her dance. Forced to yield, he shoves the bottle into your hands.</p>
<p>Back with Julyan, she snatches the ingredients and turns them into “Manderville cooking” with terrifying confidence. The spread halts—what happens next depends on Hildibrand’s own strength, she says, but she refuses to believe her boy will fall here. Briardien returns with Nashu found asleep in a filthy corner of Pearl Lane, and the news lands like a punch: Ellie has been sighted near the Sil’dihn ruins. Julyan orders you to go—now—because Ul’dah’s future is already moving without you.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>セシーは、混乱の只中で平然と名乗りを上げ、エリーが実の妹であり、共犯者であると告げる。怪盗白仮面として四度、遺物と喝采をさらったのはセシーであり、エリーはあなたのすぐ傍で情報を渡し続け、追跡劇を記事に仕立てて民衆の心を煽っていたのだと嘲笑する。</p>
<p>ヒルディブランドが目的を問えば、セシーは「正義」だと言い切る。シラディハを滅ぼした真実は歴史書から削られ、天秤委員会のような者たちが影から口を塞いできたのだと責め立てる。そして生者を屍へ変える忌まわしい粉の恐怖を、ウルダハに突き返してやるのだと吐き捨てる。</p>
<p>セシーは、強力な魔法で封じられた特別な宝物庫の存在を語る。その扉を開ける鍵は、ベラフディア四大神器――四つの秘宝を揃えること。神器はすでに手中にあり、今ごろエリーは宝物庫へ向かっているはずだと、セシーは笑いながら「ゾンビパウダー」をウルダハ中に撒く未来を言い立てる。</p>
<p>そして事態は一気に現実へと雪崩れ込む。セシーが投げつけた粉はフィリスを狙ったはずが、庇いに入ったヒルディブランドへ降りかかり、彼は青白い顔で崩れ落ちる。周囲の叫びと動揺の中で、あなたはただ、今にも取り返しのつかない何かが始まったことを思い知らされる。</p>
<p>そこへ黒ずくめの人物が現れ、目にも留まらぬ速さでセシーを背後から叩き伏せる。さらにゴッドベルトさえ容赦なく沈め、現れたのはヒルディブランドの母親ジュリアンだった。彼女は息子が倒れているのに悠長な真似は許さないと断じ、あなたに力を貸せと迫る。</p>
<p>ジュリアンは、毒素が全身に回る前なら浄化で症状を緩和できるかもしれないと言い、浄化用の聖水を作る材料を指定する。国際市場のシントゴートからオーバーソウルの衣を、貿易商のゲストから高純度蒸留水を手に入れて来いというのだ。ブリアルディアンはナシュ捜索へ向かい、ギルガメッシュは半ば押し切られる形であなたに同行する。</p>
<p>市場でシントゴートは、オーバーソウルの衣は最後の一つに買い手がついたと突っぱね、代わりにキマイラの被膜を要求する。時間がない中で焦りが募るが、そこへアヴィラが現れ、修行で狩ってきた分の被膜をくれてやると言い放つ。取引は成立し、シントゴートは約束通り品を渡し、剣風のアヴィラに会えたことに浮かれて見送る。</p>
<p>次にゲストは、マンダヴィル家への悪感情を隠さず、舞踏会へ行くと言って取り合わない。だがそこへ瑠璃色の乙女アラベラが現れ、事情を聞くと、踊りの条件としてあなたへの高純度蒸留水を渡すよう求める。渋々ボトルを差し出したゲストからそれを受け取り、あなたは急いでジュリアンのもとへ戻る。</p>
<p>ジュリアンは材料を受け取ると豪快に調合し、毒の広がりを止めたはずだと告げる。あとは本人の体力次第だが、息子を簡単に死なせはしないと断言する。やがてブリアルディアンがパールレーンで見つけたナシュを連れ帰り、さらにエリーがシラディハ遺跡の方角で目撃されたと伝える。ジュリアンは息子の看病を引き受け、あなたに急いで向かえと命じ、ウルダハの未来を託す。</p>

    story:`<div class="clamp" data-collapsed="true">
<p>Cecy 在眾人還沒從震驚裡回過神時就把話說得明明白白——Ellie 是她的親妹妹，也是她最默契的共犯。真正四度奪走眾目焦點、連 Belah’dia 的遺物都帶走的人是 Cecy；而 Ellie 一直站在你身邊，把關鍵情報悄悄遞出去，再把追捕寫成讓全城瘋狂的傳奇。</p>
<p>當 Hildibrand 以「紳士」的語氣追問她們究竟想做什麼，Cecy 只回你一句：正義。她咬定歷史被人刻意改寫，Sil’dih 的真相被埋在砂塵裡，而那些自稱要維護真實的「真相裁定者」在暗處讓開口的人消失。她要 Ul’dah 親身嘗到同樣的恐怖。</p>
<p>Cecy 把計畫攤開：在 Thanalan 的沙地深處，有一座以強力魔法封存的祕密寶庫，唯一能開啟的方式，就是集齊 Belah’dia 的四大神器。那四件神器已經在手，而 Ellie 此刻正朝寶庫而去；只要寶庫打開，僵屍粉末就會被灑向 Ul’dah——她笑著把這句話丟進你們心裡，像在倒數。</p>
<p>下一瞬間，恐嚇變成了眼前的災難。Cecy 朝 Phillice 擲出的粉末，被 Hildibrand 擋了下來；粉末沾上他時，他的臉色瞬間變得青白發綠，整個人倒了下去。你聽見周圍的驚呼，也更清楚地感到，事情已經不是「案件」而是「失控」。</p>
<p>就在混亂擴大時，一個全身黑衣的人影像箭一樣衝出來，揮起平底鍋把 Cecy 直接敲昏；連 Godbert 都被她毫不留情地放倒。她自報姓名是 Julyan——Hildibrand 的母親——語氣像命令一樣冷硬：別愣著，現在立刻救人，否則毒素擴散就來不及了。</p>
<p>Julyan 說還有機會，但必須先把毒素淨化，做出聖水。她要你去找 Syntgoht 拿到一塊 Oversoul 破布，再去找名叫 Gest 的商人拿到高純度蒸餾水；材料到手，她就能調出能壓下症狀的聖水。Briardien 轉身去找 Nashu，而 Gilgamesh 被 Julyan 一句話打發得不得不跟著你跑這趟差事。</p>
<p>在市場，Syntgoht 一開始拒絕——他說最後一塊 Oversoul 布料已經答應給別人，除非你能拿出奇美拉被膜來交換。你還在焦急，Avila 卻剛好現身，說她今天修行任務正好獵了奇美拉，被膜就分你一份。交易立刻成立，你拿到布料，時間才沒有被硬生生拖垮。</p>
<p>你們找到 Gest 時，他冷嘲熱諷地拒絕，說 Manderville 家的人只會把每一枚 gil 都算到骨子裡，還想在需要時才來求他。就在他要轉身去舞會時，Arabella 出現了；她一聽你說 Hildibrand 已經中毒倒下，便把要求說得乾脆——Gest 若想得到她的舞步，就先把高純度蒸餾水交給你。Gest 不情願也只能照做，你終於把瓶子握在手裡奔回 Julyan 那裡。</p>
<p>Julyan 把材料一把奪過去，像動手打仗一樣迅速地調出聖水，硬是把毒素的擴散壓了下來。她說接下來就看 Hildibrand 自己撐不撐得過，但她不會讓她的兒子倒在這裡。Briardien 也帶回了在 Pearl Lane 角落睡到忘我的 Nashu，並帶來更急的消息：Ellie 已在 Sil’dihn ruins 的方向被目擊。Julyan 把照顧 Hildibrand 的事攬下來，催你立刻出發——因為 Ul’dah 的未來正在被人拖往不可挽回的地方。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());
