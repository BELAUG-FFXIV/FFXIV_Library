    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Minfilia tells you she has already informed Alphinaud of the plan to recreate the beacon in the manner Moenbryda described. He agreed that, dangerous though it is, it is your only hope of success—and he asked to meet you at Snowcloak before you proceed. Minfilia thanks you for everything you have done for the Scions, and says she believes you will return, as you always have. She adds that Moenbryda is a brilliant, dedicated scholar, and that she would not have endorsed the plan were it not so.</p><p>At Snowcloak, Moenbryda asks you to trust in the power of white auracite—and in her. Alphinaud greets you, admits he was beginning to wonder if you were having second thoughts, and passes on Captain Ilberd’s regards as he attends to Eline Roaille’s interrogation in Ul’dah. He refuses to distract you with “the Ivy” until you return, then awkwardly gathers himself and says the others are waiting at the aetheryte—after you.</p><p>Moenbryda declares it ready, and says she thinks it worked. She tells you to attune to the aetheryte now—feel for the current, and try to locate the beacon. Alphinaud says you have done all you can for the moment, and that you should withdraw; when your final preparations are complete, you must seek out the beacon you created, arrive safely if you can, and stop Iceheart before she summons Shiva.</p><p>Afterward, Moenbryda admits she wanted to join you, but Urianger made her promise she would not—apparently the thought of her becoming Shiva’s thrall was too much for him to bear. Alphinaud warns that your actions may have alerted Iceheart, and if so she may hasten the ritual; if she succeeds, you may have no choice but to face Shiva in battle. Unsure what this “saint” truly is, he urges you to call upon your allies—some may hesitate to stake their lives on Moenbryda’s experiment, but others will accept that desperate times call for desperate measures. Before you assemble your party, he asks you to speak with a knight who bears a message from Ser Aymeric—and adds that he would be amazed if a failed teleportation attempt were what finally killed you.</p><p>You receive Ser Aymeric’s words: Ishgard faces an unprecedented threat, and yet in its hour of need it is not her knights who stand ready to defend her. He says your deeds this day will not be forgotten—where others would flee, you remain; where others would falter, you rise; where others would use their gifts for selfish ends, you wield yours for a greater cause—and he prays Halone bless you with good fortune and see you safely home.</p><p>When you confront Iceheart, she calls you a fool, and says you of all people should understand what suffering war begets—and that no sacrifice is too great if it ends the violence. She declares her cause righteous, calls you a pawn of liars and schemers, and condemns those who follow their fathers’ creed without ever asking why—trapped in a delusion and blind to the truth. She tells you redemption is not beyond you, urges you to seek the Keeper of the Lake and see with eyes unclouded, and warns you not to squander Mother’s gift—then the air shifts as another voice speaks in the language of the Ascians, coldly noting the vessel’s withdrawal as a predictable outcome, and that Lahabrea will be pleased.</p><p>Back afterward, Moenbryda blurts her relief that you are alive, then tries to recover her composure. When you tell her what Iceheart did, she presses you to be certain—Dravanians are skilled with glamours, after all—and though she says she believes what you saw, she admits she has never heard of a primal being summoned like that. She asks if you are injured, even suggesting head trauma can cause hallucinations, and then accepts your answer.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ミンフィリアは、ムーンブリダが語った方法で「標」を再現する計画を、すでにアルフィノに伝えてあると言う。危険を伴うが、成功の望みはそれしかない――アルフィノもそう認め、先に「氷結潜窟 スノークローク大氷壁」であなたと合流したいと望んだのだという。ミンフィリアは、あなたが暁のために成し遂げてきたことへ感謝し、いつもそうしてきたように、必ず戻ってくると信じていると告げる。さらに、ムーンブリダは才気と献身を兼ね備えた学者であり、確信がなければこの計画を認めはしなかった、とも言い添える。</p><p>スノークロークでムーンブリダは、白聖石の力を信じるように――そしてもちろん自分も信じるように、とあなたに言う。アルフィノはあなたを迎え、考え直して引き返したのではと案じかけていたと漏らしつつ、ウルダハでエリーヌ・ロアイユの取り調べに当たっているイルベルドからの伝言を伝える。だが「蔦」の話は帰還してからにすると区切り、咳払いをして、皆がエーテライトで待っている、先へどうぞとあなたを促す。</p><p>ムーンブリダは「できた、準備は整った」と言い、うまくいった……たぶん、と続ける。そして今すぐエーテライトと交感し、流れを感じ取り、標の在り処を探すようにと指示する。アルフィノは、いま出来ることはすべてやった、いったん退こうと言い、準備が整ったら再現した標を目指せ、無事に辿り着けたなら、シヴァを呼び出す前にアイスハートを止めねばならない、と告げる。</p><p>その後ムーンブリダは、同行したい気持ちはあるが、ウリエンジェに止められて約束させられたと言う。自分がシヴァの「眷属」になるなど耐えられないのだろう、と不満げに返しつつ、そんな隙を与えるつもりはないとも言い切る。アルフィノは、こちらの動きでアイスハートに計画が悟られた可能性を口にし、その場合は召喚儀式を急ぐかもしれない、そして成功すればあなたはシヴァと戦うほかなくなる、と警告する。相手がどのような「聖人」か分からない以上、あなたは仲間を頼るべきだ――ムーンブリダの実験に命を賭けることをためらう者もいるだろうが、背に腹は代えられないと納得する者もいる、と。さらに、パーティを整える前に、エメリック卿の伝言を持つ騎士に話すようにと告げ、最後に、転移失敗で死ぬなど驚かせないでくれ、と言ってあなたを送り出す。</p><p>あなたは騎士から手紙を受け取る。イシュガルドはいま未曾有の脅威にさらされているのに、その守りに立つのが騎士ではないことへの無念が綴られ、あなたの働きは決して忘れないと記される――逃げる者がいる中であなたは残り、ひるむ者がいる中であなたは立ち上がり、私欲のために力を使う者がいる中であなたは大いなる目的のためにそれを振るう。最後に、ハルオーネの加護と、無事の帰還を祈る言葉が添えられている。</p><p>対峙したアイスハートは、あなたを罵り、戦が生む苦しみを理解すべきだと言い放つ――暴力を終わらせるためなら、いかなる犠牲も大きすぎはしないのだと。自分こそ正義だと主張し、あなたは理解もせぬ戦に身を投じる、嘘つきと策謀家の駒だと断じ、父祖の信条に疑問も抱かぬ者たちを、虚構に囚われ真実に盲目だと切り捨てる。そして救いはまだ遠くないと言い、幻龍残骸 黙約の塔へ行け、曇りなき目で見よ、と告げ、母の贈り物を無駄にするなと釘を刺す――その直後、アシエンの言葉が響き、器が退いたのは予想通りだ、それでもラハブレアは喜ぶだろう、と冷ややかに言い残す。</p><p>戻った後、ムーンブリダはあなたが生きていることに安堵し、言い直しながら取り繕う。あなたが見たという出来事を聞くと、確かかと念を押し――ドラヴァニアの幻術の巧みさにも触れる。それでも、あなたがそう見たと言うなら信じる、と言い、ただ、そのような形で蛮神が呼び出されるなど聞いたことがない、と率直に告げる。最後に、怪我はないか、頭を打てば幻覚を見ることもあるのだ、と問い、あなたの答えを受け入れる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ミンフィリア <small class="muted">（石の家, X:6.1, Y:5.2）</small></div></div>`,

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'冷若霜雪的冰神濕婆',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Minfilia 告訴你，她已經把計畫通知 Alphinaud：你們將依 Moenbryda 的方案，利用殘留的以太流在第二個以太水晶原本所在的位置重新塑成信標，使其再次可供交感與定位，從而追上 Iceheart。Alphinaud 也同意，這個做法雖然本質上危險，卻是你們唯一可能成功的希望；他並表示希望在行動前先在 Snowcloak 與你會合，你抵達時應該會看到他正在那裡等你。Minfilia 接著向你致謝，說她珍惜你為 Scions 所做的一切，也相信你一定會像以往一樣回到大家身邊。她補上一句，Moenbryda 是才華出眾且專注投入的學者，若不是如此，她不會同意這個方案。</p><p>你抵達 Snowcloak 後，Moenbryda 要你相信白聖石的力量——也相信她。Alphinaud 見到你時先鬆了口氣，坦言他一度以為你可能臨時改變主意；他也代 Captain Ilberd 向你致意，並提到 Ilberd 此刻正在 Ul’dah 對 Eline Roaille 進行審訊。話題很快被他拉回正事：關於「Ivy」的後續，等你回來再談也不遲；現在其他人都在以太水晶旁等候，他示意你先行。</p><p>Moenbryda 宣布準備就緒，還笑著補一句「成功了……我想」。她要你立刻與以太水晶交感：去感受以太流的走向，循著那股流動嘗試鎖定你們重塑出的信標位置。Alphinaud 說你們眼下能做的都已完成，現在先撤回；等你把最後的準備整理好，就必須去尋找那個由你們重塑出的信標。如果你能平安抵達目的地，就要在 Iceheart 召喚 Shiva 之前阻止她。</p><p>之後，Moenbryda 承認她其實想跟你一起行動，但 Urianger 要她保證不要這麼做；他顯然無法承受她可能成為 Shiva 的眷屬這種結果。Moenbryda 不以為然地回了一聲，說她不會給 Iceheart 那種機會。Alphinaud 則提醒你不能忽視另一種可能：你們的行動或許已經讓 Iceheart 察覺；若真如此，她可能會加快召喚儀式，而一旦儀式完成，你就只能被迫與 Shiva 交戰。Alphinaud 說他對這位「聖人」所知不多，無法判斷你單憑自身是否足以應付，因此他勸你召集同伴協助——有人可能不願把性命押在 Moenbryda 的實驗上，但也一定有人明白在走投無路時只能採取非常手段。出發前，他要你先去和那位騎士交談，對方帶著 Ser Aymeric 給你的訊息；最後他也半認真半挖苦地說，你經歷過那麼多難關，他實在不希望最後反而是一次失敗的傳送把你送走。</p><p>那名騎士替 Ser Aymeric 朗讀信件：Ishgard 正面臨前所未有的威脅，然而在最需要守護的時刻，站在前方的卻不是 Ishgard 的騎士，而是你。信中稱你是光之戰士、Eorzea 的救星，並說你今日的作為必不被遺忘——當他人逃離時你選擇留下，當他人退縮時你迎向挑戰，當他人把天賦用於私慾時你把力量用於更大的使命。最後，他祈願 Halone 賜你幸運，也願你能平安歸來。</p><p>你在 Akh Afah Amphitheatre 面對 Iceheart。她咒罵你愚蠢，說你最該明白戰爭會帶來怎樣的苦難——若能終結暴力，再大的犧牲都值得。她宣稱自己的行動是正義，指你不理解自己置身的戰爭，只是騙子與陰謀家的棋子；她也譏諷那些不加思索追隨祖先教條的人，說他們困在自我編造的迷妄裡，對真相視而不見。她接著對你說救贖並非遙不可及，要你去找 Keeper of the Lake，用不被迷霧遮蔽的眼睛去看，別辜負母親賜予你的力量。隨後，一道聲音以 Ascian 的語言響起，冷冷評價「容器」的退去只是意料之中，並說 Lahabrea 仍會滿意，最後以一句「真不幸」作結。</p><p>你回來後，Moenbryda 先是脫口而出：**「以 Twelve（Eorzea 信仰的十二神）之名——你還活著！」**又立刻改口，像是在掩飾自己剛才的失態。當你告訴她 Iceheart 做了什麼，她追問你是否確定——畢竟 Dravanians 很擅長幻術；但她也說，如果你說你親眼所見，她願意相信你。只是她坦白，她從沒聽過有 primal 會以那種方式被召喚。她最後又確認你有沒有受傷，甚至提到頭部受創可能導致幻覺；在你否認後，她才說好，她只是問問。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
