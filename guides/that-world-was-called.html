const i18n={
  EN:{

    tabs:{story:'Story',acq:'Acquisition',unlockq:'Unlock Quest',followq:'Follow-Up Quest',comments:'Comments'},
    readMore:'Show more',readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>…Prishe falls silent, and Bakool Ja Ja spits out his disgust for Sareel Ja—first a servant to the tyrant Zoraal Ja, and now brazen enough to seize the throne for a pale imitation of the Dawnservant. Alxaal admits he has no memory to challenge Sareel Ja’s claims, and though Prishe seems to know exactly who she is and where she came from, being told your life’s memories are not your own would shake anyone. Bakool Ja Ja refuses to let that despair take hold here, warning that nothing Sareel Ja creates can be trusted to remain safe—or even functional—for long.</p><p>With that, you withdraw while you still can. Back in Mamook, Alxaal looks around and realizes this is not the Mamook he knows. Miilal Ja is relieved to see you and Bakool Ja Ja return safely, and notes you have brought a new guest. Bakool Ja Ja asks you to explain what happened out in Yak T’el, and Miilal Ja understands at once: Alxaal is not simply from another territory, but another world entirely—explaining the confusion between you from the start.</p><p>Alxaal apologizes for any trouble and thanks them for taking him in. Different worlds, he says, yet strangely similar—and he can’t help wondering what links them. Miilal Ja asks what the Mamool Ja of his Vana’diel are like, and Alxaal answers plainly: they look like Mamool Ja, but they are nothing like them. There was a time when the peoples of Vana’diel—including the Mamool Ja—knew peace, until a tyrant with terrible power claimed rulership over the Mamool Ja and turned them against the others. Before anyone realized it, they were at war.</p><p>Miilal Ja reflects that it is, in its way, a familiar story. Among her people, the rare few born with two heads grow immensely powerful, and that power was used to justify their preeminence over all others. Bakool Ja Ja the Mystic rejects that legacy—this is not who they are anymore, and they can be better than their forebears; they will be better. Bakool Ja Ja the Mighty adds that all their hard work will mean nothing if Sareel Ja succeeds in taking the throne.</p><p>Alxaal promises they will not lack for help in stopping him. He says he doesn’t need to know who he is to know what the right thing is, and pledges his blade—on his honor as an adventurer of Vana’diel—to put an end to Sareel Ja’s schemes. Prishe joins in too, saying that if someone who mattered were here, she is sure they would do the same. She decides she can worry about whether she is real another day; she will not stand by while Sareel Ja tramples over the memories of her home.</p><p>Bakool Ja Ja reminds you not to forget their part: this began in Yak T’el, and they have a duty to keep their forest safe. Bakool Ja Ja the Mystic says Sareel Ja left no trail, but it is only a matter of time before he reveals himself to challenge you again. Until then, he thinks it prudent that Prishe and Alxaal learn more about this world so they can be ready. They decide to start with Tuliyollal, and ask you to meet them at the dirigible landing so they can see Prishe and Alxaal there.</p><p>At Tuliyollal, Prishe marvels at the balloon-powered airships and the smooth flight, then turns to you—she’s noticed you seem to know a lot about her. She asks if you remember anything else. Alxaal admits he doesn’t, and since she doesn’t recognize him either, perhaps they were never acquainted; what he knows of her was likely overheard in a tavern, stories shared by patrons about her famed exploits. Prishe accepts that answer and leaves it there. Bakool Ja Ja then decides where to begin, and Bakool Ja Ja the Mystic suggests they should inform the Landsguard first—unless he wants another stern lecture from the Vow of Reason. Bakool Ja Ja reluctantly agrees, and asks you to keep Prishe and Alxaal occupied—take them to eat, perhaps—at Aunt Tii’s tacos, to make up for the first meal they spoiled. He tells you plainly they do not expect forgiveness; no good deed can undo the past, but there is time to build a better future.</p><p>You bring them to Aunt Tii’s. Prishe can smell the savory meat before she even sits down, orders three tacos at once, and revels in the first bite—rich flavor, fierce spice, and a satisfaction she has waited for. Once she is full, she thanks you for the treat and says it felt almost like a taste of home—Tavnazia. With time still to spare, she offers to tell you more about Vana’diel. She speaks of the Crystal War, the assault that sundered the land from the mainland, and the survivors who fled into the Tavnazian Safehold and scraped together a life in the caves. Then she catches herself and apologizes for spoiling the mood, asking instead whether you—an adventurer too—have tales of daring to share.</p><p>When she hears what you have done—traveling to other worlds, saving this one from the embodiment of despair—she reacts with disbelief and awe, calling you a living legend. Alxaal repeats the words—hero, living legend—quietly, as if testing them against what he has seen in you. Then Bakool Ja Ja returns; there was much to report to the Landsguard, and it was hard for them to accept that Sareel Ja was behind the stolen relics and the sightings of Gulool Ja Ja. Worse, rumors of a strange portal in the woods are drawing in reckless treasure seekers. Knowing Sareel Ja could appear at any time with more of those echoes, Bakool Ja Ja resolves to go back to Jeuno to make sure their people stay out. Prishe immediately insists that if he is going, then so are you—anything is better than waiting.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Alxaal <small class="muted">(Lower Jeuno, X:6.1, Y:7.1)</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="jeuno.html">Jeuno</a></div></div>`

  JP:{
    langLabel:'JP',
    pageTitle:'その世界の名はヴァナ・ディール',
    tabs:{story:'ストーリー',acq:'入手方法',unlockq:'開放クエスト',followq:'後続クエスト',comments:'コメント'},
    readMore:'全文を表示',readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>……プリッシュは沈黙し、バクージャジャはサリール・ジャへの憎悪を吐き捨てる。暴君ゾラージャに仕えたかと思えば、今度は暁王の薄っぺらい模造を掲げて王座を奪おうとする──卑劣な小者だ、と。アルクサールは、サリール・ジャの主張を否定できるほどの過去を何一つ思い出せないと打ち明ける。プリッシュは自分の過去も自分自身も知っているように見えるが、それでも「人生の記憶が自分のものではない」と告げられたら、どれほど揺さぶられるか想像に難くない。だがバクージャジャは落胆している暇はないと言い切り、サリール・ジャの作り出したものは長く安全である保証も、機能し続ける保証もないと警告する。</p><p>あなたたちは引き返せるうちに撤退し、マムークへ戻る。アルクサールは戻った途端、ここが自分の知るマムークではないと実感する。ミーラル・ジャはあなたとバクージャジャの無事を喜び、さらに新たな客人を連れてきたのだと気づく。バクージャジャは、ヤクテルで何が起きたのか説明すべきだと言い、ミーラル・ジャは理解する――ただ別の土地から来たのではなく、別世界から来たのだ、と。それなら最初の行き違いも納得がいく、と。</p><p>アルクサールは迷惑をかけたことを詫び、受け入れてくれたことに礼を述べる。世界は違えど共通点が多い、と彼は言い、その二つを結ぶものが何なのか気になって仕方がない。ミーラル・ジャは、最初に会ったとき彼が自分たちをヴァナ・ディールのマムージャと取り違えたことを引き合いに出し、向こうのマムージャはどんな存在なのかと尋ねる。アルクサールは、姿はよく似ていても中身はまるで違う、と答える。かつてヴァナ・ディールの諸種族は、マムージャを含めて平穏を知っていた。だが恐るべき力を持つ暴君がマムージャの支配者となり、彼らをこちらへ向けた。気づけば戦争になっていた――そう語る。</p><p>ミーラル・ジャは、それはある意味でこちらにも似ていると言う。二つの頭を持って生まれた者は稀で、やがて計り知れぬ力を得る。その力が、他者に対する優越を正当化するために利用されてきたのだと。バクージャジャは、もうそんな時代ではないと否定する。先人より良くなれるし、良くなるのだ、と。バクージャジャは、サリール・ジャが王座を奪えば積み上げた努力が無駄になると告げる。</p><p>アルクサールは、阻止するための助けは惜しまないと約束する。自分が何者か知らずとも、正しいことはわかると言い、ヴァナ・ディールの冒険者としての名誉にかけて剣を捧げ、サリール・ジャの企みを終わらせると誓う。プリッシュも加わり、もし彼女にとって大切な誰かがここにいたなら、きっと同じように動いただろうと言う。そして自分が本物かどうかは後で悩めばいい、故郷の記憶を汚されるのは我慢ならない、と言い切る。</p><p>バクージャジャは、ヤクテルで始まった以上、森を守る責務が自分たちにあると念を押す。バクージャジャは、サリール・ジャは痕跡を残さなかったが、いずれあなたに挑むために姿を現すだろうと言う。そのときに備えるためにも、プリッシュとアルクサールはこの世界をもっと知っておくべきだ、と。まずはトゥリヨラルから始めようと決め、飛空艇発着場で落ち合って二人を案内すると告げる。</p><p>トゥリヨラルに着くと、プリッシュは風船式の飛空艇に感心し、思った以上に滑らかな飛行だったと笑う。次いで、あなたが自分のことをよく知っているように見えると気づき、他に何か覚えていないかと問う。アルクサールは思い出せないと答え、彼女も自分を知らないのなら面識がなかったのかもしれない、酒場で武勇談を聞いただけだろうと言う。プリッシュはそれならそれでいいと受け入れる。バクージャジャは次に何をするか考え、もう一方はランドガードへ報告が先ではないか、理性の誓約者からまた説教を受けたいのか、と釘を刺す。バクージャジャは渋々同意し、その間あなたに二人の相手を頼む。まずは台無しにした最初の食事の埋め合わせとして、ティーおばのタコスへ連れて行け、と。許しを得られるとは思っていない、善行で過去は消えないが、より良い未来を築く時間はある――そう言い残す。</p><p>あなたは二人を連れてティーおばの店へ向かう。プリッシュは香ばしい肉の匂いに目を輝かせ、最高のタコスを三つ頼む。ようやく口にしたタコスに彼女は歓声を上げ、故郷の味に劣らぬ濃厚さと、この世界ならではの辛い味つけに感嘆する。満腹になると礼を言い、それはまるで故郷――タブナジア――の味を思い出すようだったと呟く。時間があるならヴァナ・ディールの話をしようか、と彼女は続け、クリスタル戦争と故郷が巻き込まれた惨禍、半島を断ち割るほどの兵器、そして生き残りがタブナジア地下壕で洞窟暮らしを組み立てていったことを語る。だが彼女は途中で我に返り、空気を重くしてしまったと謝り、代わりにあなたの冒険譚を聞かせてほしいと頼む。</p><p>あなたの話を聞いたプリッシュは驚愕し、絶望の具現を退けた存在だと知って、あなたを生ける伝説だと言い切る。アルクサールは「英雄」「生ける伝説」と繰り返す。そこへバクージャジャが戻り、ランドガードへ伝えるべきことが山ほどあったと言う。サリール・ジャが遺物の盗難やグルージャジャの目撃の黒幕だと告げるのは衝撃だった。しかも森の不思議な門の噂に惹かれ、無謀な宝探しまで出ているらしい。サリール・ジャがまた残響を携えて現れるかもしれない以上危険だ――だから自分はジュノへ戻り、人々が近づかないようにする、とバクージャジャは決める。するとプリッシュは、行くなら自分たちも行く、と即座に言い、待っているよりましだと笑い飛ばす。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> アルシャール <small class="muted">(ジュノ下層, X:6.1, Y:7.1)</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="jeuno.html">ジュノへ</a></div></div>`
  },

    story:`<div class="clamp" data-collapsed="true"><p>……Prishe 沉默不語。Bakool Ja Ja 先是狠狠咒罵 Sareel Ja：先前替暴君 Zoraal Ja 賣命，如今竟還敢為了那個「仿造的 Dawnservant」去奪權，真是卑鄙又可悲的傢伙。Alxaal 則承認，無論他怎麼努力，都想不起任何能反駁 Sareel Ja 說法的過去。相較之下，Prishe 明明看起來記得自己的過去、也知道自己是誰，可若有人告訴你：你人生的記憶其實不是你的——那種衝擊有多大，他光是想像都覺得沉重。Bakool Ja Ja 卻要你們別在這裡灰心，因為他不相信 Sareel Ja 造出來的任何東西能長久安全；甚至連能不能維持正常運作都難說。</p><p>你們趁還能離開時先撤回 Mamook。回到這裡後，Alxaal 立刻看出：這並不是他所熟悉的 Mamook。Miilal Ja 見你和 Bakool Ja Ja 平安歸來，終於鬆了口氣，也注意到你們帶回了一名新的客人。Bakool Ja Ja 說你應該親口說明在 Yak T’el 發生了什麼。Miilal Ja 聽完後理解了——Alxaal 不是來自另一個地區，而是來自另一個世界；這也解釋了你們最初彼此誤會的原因。</p><p>Alxaal 為自己可能造成的麻煩道歉，也感謝他們收留自己。他說，明明是不同世界，卻有許多相似之處，讓他忍不住想知道：究竟是什麼把兩個世界連在一起。Miilal Ja 追問他第一次見面時把他們誤認成自己世界的 Mamool Ja，那些 Mamool Ja 到底是什麼樣的存在。Alxaal 說，即使外表相像，那些 Mamool Ja 也和你們完全不同。曾經，Vana’diel 的所有族群——包含 Mamool Ja——都曾擁有和平；但後來出現了一名握有可怕力量的暴君，自稱統治 Mamool Ja，並把他們變成對抗其他人的武器。等大家察覺時，戰爭早已爆發。</p><p>Miilal Ja 說，這故事在某種程度上也像你們的過去：極少數天生雙頭的人會變得格外強大，而那種力量曾被用來合理化他們凌駕於眾人之上的地位。Bakool Ja Ja the Mystic 立刻否定那條舊路：那已不再代表現在的他們，他們可以比祖先更好——也一定會做到。Bakool Ja Ja 則補上一句：若 Sareel Ja 真能奪走王位，你們所有的努力都會化為烏有。</p><p>Alxaal 直接承諾：要阻止 Sareel Ja，你們不會缺少援手。他說，就算不知道自己究竟是誰，他也知道什麼是該做的事；他願意把刀交給你們，並以「Vana’diel 的冒險者」之名起誓，一定要終結 Sareel Ja 的陰謀。Prishe 也站了出來，說如果「那個人」在這裡，她相信對方也會做同樣的選擇。至於自己究竟是不是真實存在——那可以改天再煩惱；她不會袖手旁觀，任由 Sareel Ja 踐踏她故鄉的記憶，所以也算她一份。</p><p>Bakool Ja Ja 提醒你別忘了他們：這一切始於 Yak T’el，而守護那片森林是他們的責任。Bakool Ja Ja the Mystic 說，Sareel Ja 沒留下可追的線索，但他遲早會再現身，挑戰你。若要做好準備，他認為 Prishe 和 Alxaal 也該更了解你們的世界。Bakool Ja Ja 認同這點，決定先從 Tuliyollal 開始，一邊在那裡做你們自己的準備；並要你到飛空艇起降處與他們會合，他們會把 Prishe 和 Alxaal 一起帶去 Tuliyollal。</p><p>抵達 Tuliyollal 後，Prishe 對「氣球驅動的飛空艇」大為驚嘆，說她沒想到飛行竟然這麼平穩。她隨即轉向你，表示她注意到你似乎很了解她，便問你是不是還記得更多。Alxaal 思索後承認自己想不起來；既然她也不認得他，或許他們其實並不相識——他所知道的 Prishe，多半只是在哪家酒館偶然聽來的傳聞，客人們談論她那些出名的事蹟。Prishe 接受了這個說法，說那就先這樣。Bakool Ja Ja 正在想從何著手時，Bakool Ja Ja the Mystic 提醒：是不是該先把情況通報 Landsguard？否則又想再被 Vow of Reason 訓一頓？Bakool Ja Ja 一臉不情願地妥協，請你先替他們拖住 Prishe 和 Alxaal——帶去吃點東西也好。接著他遞給你東西，要你帶他們去 Aunt Tii’s 的墨西哥捲餅，算是補償先前被他們搞砸的第一餐；並說清楚，他們並不指望能換來你的原諒，因為再多的善行都無法抹去過去，但至少還有時間建立更好的未來。</p><p>你帶著他們來到 Aunt Tii’s。Prishe 一走近就聞到肉香，立刻點了三份最好的墨西哥捲餅。終於吃到時，她興奮得不得了，一口接一口，讚嘆這裡的調味辛香濃烈，甚至不輸她故鄉的味道。吃飽後，她道謝，說那感覺幾乎像嚐到家的味道——Tavnazia。她見你們還有一點空檔，便問你要不要再聽些關於 Vana’diel 的事；她提起二十年前那場被稱為 Crystal War 的可怕戰亂，說 Tavnazia 很快也被捲入其中。獸人攻打半島時動用了威力驚人的武器，甚至把連接本土的土地直接撕裂；倖存者只能逃往 Tavnazian Safehold，在洞穴深處勉強拼湊出一種樸素的生活。說到這裡，她忽然停下來，向你道歉自己把氣氛弄沉重了，轉而問你既然也是冒險者，能不能分享些驚險的故事。</p><p>當她聽見你談到穿梭不同世界、並把這個世界從「絕望的化身」手中拯救下來時，她震驚得不敢置信，直喊你不只是冒險者，而是活生生的傳奇。Alxaal 在一旁低聲重複那兩個詞——英雄、活生生的傳奇——像是在重新衡量你究竟是怎樣的人。就在這時，Bakool Ja Ja 回來了，說他們花了不少時間向 Landsguard 說明情況。要他們接受 Sareel Ja 才是失竊遺物與 Gulool Ja Ja 目擊事件的主使者，實在很難；更糟的是，還有人被森林裡那道奇怪入口的傳聞引來，甚至有些魯莽的尋寶者已經跑去找了。想到 Sareel Ja 可能隨時再帶著更多「回音」出現，這種事太危險，所以他決定回 Jeuno，確保自己人不再闖進那裡。Prishe 立刻表態：既然他要去，那你們也要去——總比坐著等更好。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Alxaal <small class="muted">(朱諾下層, X:6.1, Y:7.1)</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="jeuno.html">啟程前往朱諾</a></div></div>`
  }
};

const langToggle=document.getElementById('langToggle');
const pageTitle=document.getElementById('pageTitle');
const tabBtns=[...document.querySelectorAll('.tab-btn')];
const panels={
  story:document.getElementById('panel-story'),
  acq:document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments:document.getElementById('panel-comments')
};

function getLang(){return localStorage.getItem(LANG_KEY)||'EN';}
function applyLang(lang){
  const t=i18n[lang]||i18n.EN;
  pageTitle.textContent=t.pageTitle;
  langToggle.textContent=`🌐 ${t.langLabel}`;
  tabBtns.forEach(btn=>btn.textContent=t.tabs[btn.dataset.tab]);
  const active=tabBtns.find(b=>b.getAttribute('aria-selected')==='true')||tabBtns[0];
  renderPanel(active.dataset.tab,lang);
}
function wireClamp(panelEl,t){
  const clamp=panelEl.querySelector('.clamp');
  const btn=panelEl.querySelector('[data-role="expand"]');
  if(!clamp||!btn)return;
  function setLabel(){
    const collapsed=clamp.getAttribute('data-collapsed')!=='false';
    btn.textContent=collapsed?t.readMore:t.readLess;
  }
  setLabel();
  btn.addEventListener('click',()=>{
    const collapsed=clamp.getAttribute('data-collapsed')!=='false';
    clamp.setAttribute('data-collapsed',collapsed?'false':'true');
    setLabel();
  });
}
function renderPanel(key,lang){
  const t=i18n[lang]||i18n.EN;
  Object.keys(panels).forEach(k=>panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if(key!=='comments') panels[key].innerHTML=t[key];
  if(key==='story') wireClamp(panels[key],t);
  if(key==='comments') loadGiscusForCurrentLang();
}
tabBtns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab,getLang());
  });
});
langToggle.addEventListener('click',()=>{
  const cur=getLang();
  const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
  localStorage.setItem(LANG_KEY,next);
  applyLang(next);
});
applyLang(getLang());

const GISCUS_CFG={
  repo:'BELAUG-FFXIV/FFXIV_Library',
  repoId:'R_kgDOPyh4Kw',
  category:'General',
  categoryId:'DIC_kwDOPyh4K84CwPjL',
  theme:'preferred_color_scheme'
};
function uiLang(code){return code==='JP'?'ja':(code==='ZH'?'zh-TW':'en');}
function loadGiscusForCurrentLang(){
  const mount=document.getElementById('giscus_container');
  if(!mount)return;
  mount.innerHTML='';
  const langCode=getLang();
  const s=document.createElement('script');
  s.src='https://giscus.app/client.js';
  s.setAttribute('data-repo',GISCUS_CFG.repo);
  s.setAttribute('data-repo-id',GISCUS_CFG.repoId);
  s.setAttribute('data-category',GISCUS_CFG.category);
  s.setAttribute('data-category-id',GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping','specific');
  s.setAttribute('data-term',location.pathname+'｜'+langCode);
  s.setAttribute('data-reactions-enabled','1');
  s.setAttribute('data-emit-metadata','0');
  s.setAttribute('data-input-position','bottom');
  s.setAttribute('data-lang',uiLang(langCode));
  s.setAttribute('data-theme',GISCUS_CFG.theme);
  s.setAttribute('crossorigin','anonymous');
  s.async=true;
  mount.appendChild(s);
}
</script>
</body>
