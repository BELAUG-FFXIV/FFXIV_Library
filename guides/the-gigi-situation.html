    story:`<div class="clamp" data-collapsed="true">
<p>Cyr comes to you with a weary sigh and admits this night has not been kind to him. Because the mammet was unearthed under suspicious circumstances, he insists the inquisition must inspect it thoroughly—and, if necessary, destroy it before any secrets or heresy can threaten public safety. He worries the inspector who has grown attached to the contraption will refuse to hand it over, and asks you to help persuade him. Hearing your agreement, Cyr steels himself and leads you toward the gazebo near Fortemps Manor, where the inspector and his assistant are said to linger.</p>
<p>At the gazebo, you find Hildibrand and Nashu in full performance, while Gigi blurts grand declarations about adventures “to the very pinnacle of the heavens.” Hildibrand vows to scour creation for answers, praising Gigi’s “potential” as an inspector. Cyr steps in sharply, invoking the authority of the Supreme Sacred Tribunal of Halonic Inquisitory Doctrine and ordering that the mammet of suspected heretical origin be surrendered into his custody. Hildibrand greets you cheerfully and mocks the accusation, while Nashu immediately tangles the situation further by insisting Gigi’s “big, beautiful, boxy eyes” are the soul of femininity—only for Hildibrand to counter with boasts of his own “Mandervillian masculinity.”</p>
<p>The commotion draws Count Edmont de Fortemps, who asks what all the shouting means from the courtyard. Cyr apologizes, repeats that he has come on behalf of the inquisition, and—half in disbelief—notes that the pair began bickering about the contraption’s gender. Hildibrand presses Edmont for an opinion, and Edmont calmly declares Gigi a strapping young lad, leaving Cyr aghast that even he has joined the madness.</p>
<p>Still, Edmont does not dismiss Cyr’s concerns: he acknowledges the unusual discovery and “miraculous resuscitation,” then proposes a solution—until Gigi recovers his memory, Hildibrand should adopt him as a ward of House Manderville, with Edmont standing witness. With the relationship between houses at stake, Edmont implies the inquisition would think twice about forceful action.</p>
<p>Hildibrand reels at the word “adopt,” then commits with theatrical certainty, proclaiming himself Gigi’s father and granting the child the patronage of House Manderville. Gigi erupts into delighted cries of “Papa Hildy,” and Nashu is overcome, calling it beautiful. Edmont, satisfied, tells Hildibrand he need no longer fear the inquisition and encourages him to show Gigi more of Ishgard—perhaps something in the city will, by the Fury’s grace, stir the mammet’s memory. Cyr can only choke down his outrage, deciding that if he cannot detain the blasted thing, he will at least observe it.</p>
<p>You accompany them through Ishgard as Hildibrand sizes up a grand estate and marvels at the wealth on display, while Cyr grumbles about waiting for something “passably heretical.” Nashu gawks at the halberds and the heavy arms of the city, and Hildibrand urges Gigi to look upon Ishgardian architecture and remember—only to mangle noble names into nonsense. Cyr snaps back that it is the Supreme Sacred Tribunal of Halonic Inquisitory Doctrine, and that he would know, because he works there; he also refuses to let Hildibrand fill the “boy—the mammet’s” head with made-up Houses.</p>
<p>When Nashu asks again what Gigi remembers, the answer is flat: nothing. So Hildibrand decides they should try something more ordinary and leads everyone toward the Holy Stables to let Gigi bask in Ishgard’s famous chocobos.</p>
<p>At the Holy Stables, Hildibrand praises chocobos as noble creatures and reminisces about racing across windswept plains, imagining how any of these fine specimens could win at the Gold Saucer in skilled hands. Cyr, still forcing patience, mutters that a watched heretic never sins and warns that these chocobos are the pride of Ishgard’s cavalry—any Temple Knight who exploited them would answer to the Fury Herself. Nashu, as ever, veers into note-taking about hair color and fruit, then urges Gigi to sniff the chocobos for memory’s sake. Gigi obliges with a perfunctory sniff and admits it did nothing; Cyr points out that being found in a Coerthan snowbank does not prove Ishgardian origins, then catches himself—too late—as Hildibrand seizes the idea and declares they should go to the markets and expose Gigi to goods from across Eorzea.</p>
<p>Nearby, a child begs a parent to buy a chocobo, then whispers that the strange-looking thing is staring—prompting Gigi to shout back, indignant, that he is not that strange-looking.</p>
<p>In the bustling stretch of the Jeweled Crozier, Hildibrand remarks that the wares would fetch high prices in Ul’dah, while Cyr laments how his work used to be “so simple”—orders, quotas, detaining heretics—before this farce. Nashu daydreams about choosing a nameday gift with her eyes closed, and Gigi sags into hopelessness, insisting it is no use. Hildibrand refuses to let despair take hold and rallies Gigi with promises of grand adventures and recovered memories—only for a priceless vase to be flung to the ground in the wake of Hildibrand’s wild posing.</p>
<p>Cyr snaps at him to look where he is gesticulating, but an attendant, Frine, calmly delivers the ruinous details: the vase was assessed at one hundred and twenty-three million, five hundred and four thousand gil, over seven hundred years old, and prized by archbishops, counts, commanders, and a duke. Cyr nearly collapses under the number, then abruptly proclaims it a miracle when Gigi reacts—demanding everyone acknowledge what they have just witnessed.</p>
<p>Hildibrand, delighted, calls Gigi a born artisan “just like Father,” and Nashu eagerly explains that this means the grandpapa is Godbert—the man who woke Gigi with a few gentle taps to the head, a hammer-wielder some say holds the power of life and death. Cyr bristles at the casual tone and insists it must not be demeaned as a parlor trick, while a desperate onlooker tries to bargain: one hundred million gil for the mammet, plus the duke’s priceless vase.</p>
<p>Hildibrand refuses outright, declaring Gigi his flesh and blood and not for sale at any price—until Gigi himself pleads for it to stop and confesses the truth: he is a mammet. Hildibrand insists Gigi is his son, and Nashu insists he is a Manderville girl, but Gigi snaps back that they are not his papa or mama. Cyr inhales as if savoring the first true hint of danger and declares that whatever this power is, it cannot be allowed to fall into the wrong hands—while Nashu can only wince that children say the most hurtful things, and Cyr, exasperated beyond words, gives up arguing with anyone at all.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>異端審問官キールは、ため息まじりにあなたへ頭を下げ、今夜は自分にとって厳しい夜だとこぼす。疑わしい状況で掘り出されたマメットは、何を秘めているかわからず、異端の芽になり得る――だからこそ審問機関が徹底的に調べ、必要とあらば破壊しなければならないのだと訴える。だが、機械仕掛けに執着する事件屋が素直に応じるとは思えないとも言い、公共の安全のために引き渡しを納得させる手助けを求めてくる。あなたが頷くと、キールは祈るように息を整え、フォルタン伯爵邸近くの東屋へ向かう。</p>
<p>東屋では、ヒルディブランドとナシュ・マカラッカが大騒ぎの最中で、ギギが「天にも届く大冒険」を叫び、事件屋は七つの地獄の底から天の頂まで創造のすべてを駆け巡ると高らかに宣言する。ヒルディブランドはギギを褒めそやし、いずれ立派な事件屋になれるとまで言う。そこへキールが踏み込み、神聖裁判所の権威を掲げて、異端の疑いがあるマメットを引き渡せと命じる。ヒルディブランドはあなたに陽気に声をかけつつ、ギギを「機械仕掛けの異端者」と決めつけるのは冗談だと笑い飛ばし、ナシュはさらに混乱を招くように、あの四角い大きな瞳こそ女性らしさの証だと言い張る。</p>
<p>騒ぎは屋敷の主、エドモン・ド・フォルタン伯の耳にも届き、伯は中庭から聞こえるほどの喧噪の理由を問う。キールは平身低頭で詫び、審問のためにマメットを押収しに来たのだと改めて説明するが、結局は性別の言い争いになったと呆れたように付け加える。ヒルディブランドが伯に尋ねると、伯はギギを「元気な少年」だと断じ、キールは世界が狂ったのかと叫びそうになる。それでも伯は、発見の経緯と「奇跡の蘇生」が異常である点を認め、記憶が戻るまでマンダヴィル家の被後見人として迎え入れるのはどうか、と提案する――ここで証人にもなると言い、両家の友好を損ねるような手荒な対応は避けるべきだと示唆する。</p>
<p>「養子」だと言われたヒルディブランドは言葉に詰まりながらも、勢いのまま決断し、ギギの父になると宣言してマンダヴィル家の庇護を与える。ギギは嬉々として「パパヒルディ」と叫び、ナシュは感極まって涙ぐむ。エドモン伯は咳払いをひとつして場を締め、もはや審問を恐れる必要はないのだから、ギギにイシュガルドの街を見せてやるとよい、と勧める。戦女神のご加護があれば、何かが記憶を呼び起こすかもしれない――そう言われてもキールは納得しきれず、拘束できないのなら観察する権利だけでも行使すると歯噛みする。</p>
<p>あなたは一行に付き添い、イシュガルド上層の荘厳な景色の中で、ヒルディブランドが屋敷の規模を見て名家に匹敵する財を語り、キールが「異端らしいこと」を起こすまで待たされるのかと毒づくのを聞く。ナシュは槍斧の多さに目を丸くし、ギギは曖昧に唸るばかりだ。ヒルディブランドは建築を見せれば魂が震えるはずだと語りつつ名家の名を勝手に混ぜて言い間違え、キールは苛立って、それは神聖裁判所であり自分の職場だと正すうえ、そんな存在しない家名で「少年――いやマメット」の頭を満たすなと叱りつける。</p>
<p>ナシュが記憶を問うと、ギギは何も思い出せないと答え、ヒルディブランドはならば聖大厩舎へ行き、名高いチョコボの匂いも含めて体感させようと言い出す。</p>
<p>イシュガルド下層の聖大厩舎では、ヒルディブランドがチョコボの気高き姿に感嘆し、かつて鞍上で駆けた日々を懐かしむ。そして腕利きの騎手ならゴールドソーサーで一着を狙える、と夢想する。キールは「見張られた異端者は罪を犯さない」と自分に言い聞かせつつ、これらは竜騎兵の誇りであり、神殿騎士が私利私欲に使えば戦女神の裁きを受けると釘を刺す。ナシュは髪色の話にそれ、ギギにチョコボを嗅げと促すが、ギギは嗅いでも無駄だったと素っ気なく言う。キールは、クルザスの雪の中で見つかったからといってイシュガルド出身とは限らないと指摘するが、ヒルディブランドはその言葉を「市場へ行こう」という提案に都合よく転がし、各地の品を見せれば何か思い出すはずだと張り切る。</p>
<p>やがて子どものねだり声とともに、奇妙なものが見てくると囁かれ、ギギは腹立たしげに叫ぶ。</p>
<p>宝杖通りの喧噪の中で、ヒルディブランドは品々がウルダハなら高く売れるだろうと言い、キールは命令と点数と拘束だけだった頃の単純さを思い出して嘆く。ナシュは目を閉じて誕生日の贈り物を選ぶ妄想に浸り、ギギはどうせ無駄だと肩を落とす。ヒルディブランドは絶望するなと励まし、冒険と記憶の発見を約束するが、その直後、乱暴な所作のせいで貴重な壺が床へ叩きつけられる。</p>
<p>キールは怒鳴って注意し、そこへフリーネが冷静に価値を告げる――その壺は一億二千三百五十万四千ギル、七百年以上前の品で、多くの高位聖職者や貴族の館を飾ってきたのだと。キールは咳き込み、戦女神よと嘆くが、ギギの反応を見て「奇跡だ」と叫び、目の前の出来事を軽んじるなと迫る。</p>
<p>ヒルディブランドはギギを「父に似た職人の才」だと喜び、ナシュはギギを目覚めさせたゴッドベルトの名を持ち出して、その槌が生と死の力すら操ると噂されるほどだと興奮気味に語る。キールはそれを手品扱いするなと反発し、そこへ誰かが一億ギルと壺の損失まで含めてマメットを買うと叫ぶ。ヒルディブランドはギギは血肉の家族で売れないと突っぱねるが、ギギ自身がもうやめてくれと懇願し、自分はマメットだと告白する。</p>
<p>ヒルディブランドは息子だと言い張り、ナシュは娘だと言い張るが、ギギは二人は父でも母でもないと吐き捨てる。キールは異端そのものではないにせよ危うい力の匂いを嗅ぎ取り、その力が悪しき手に渡ってはならないと断言し、最後には、どうして誰も現実を見ないのかと呆れて言葉を切る。</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>Cyr 帶著疲憊的嘆息來找你，直言今夜對他並不友善。他說那具 mammet 是在極其可疑的情況下被挖出來的，誰也無法確定它藏著什麼祕密——甚至可能是 heresy。基於公共安全，Supreme Sacred Tribunal of Halonic Inquisitory Doctrine 必須對它進行徹底檢查，必要時甚至要將它摧毀。可他也擔心，對那具機械裝置有著強烈執著的 Hildibrand 不會乖乖答應交出 Gigi；於是他請你一起去「說服」對方。你點頭後，Cyr 像是在祈禱一般深吸一口氣，帶你前往 Fortemps Manor 附近的涼亭——他聽說 Hildibrand 和 Nashu 常常在那裡出沒。</p>
<p>你抵達涼亭時，正好撞上 Hildibrand 與 Nashu 的熱鬧場面，Gigi 用誇張的語氣高喊要衝向「天堂的頂點」，而 Hildibrand 更宣誓要從七重地獄最深處一路追尋到天穹之巔，找出他們渴求的答案。Hildibrand 還連聲稱讚 Gigi 的「潛力」，說他將來一定能成為了不起的「偵探」。就在這時，Cyr 踏前一步，以 Supreme Sacred Tribunal of Halonic Inquisitory Doctrine 的權威下令，要求他們交出這具疑似具有 heresy 來源的 mammet。Hildibrand 先是笑著向你打招呼，接著把 Cyr 的指控當成玩笑；Nashu 則立刻把局面帶往更混亂的方向，堅稱那雙「方方正正又漂亮的大眼睛」才是最能代表女性氣質的證明，Hildibrand 反過來又拿自己的「Manderville 式男子氣概」來辯駁。</p>
<p>吵鬧聲驚動了 Count Edmont de Fortemps，他走出來問你們究竟在鬧什麼，連庭院都聽得到。Cyr 趕緊道歉，重申自己是代表審問機關來扣押 mammet 的——並帶著難以置信補上一句：結果他們居然在爭論這東西的性別。Hildibrand 立刻把問題丟給 Edmont，Edmont 只是平靜地說，Gigi 很明顯就是個健壯的小男孩，讓 Cyr 幾乎要崩潰，覺得全世界都瘋了。</p>
<p>即便如此，Edmont 仍承認 Gigi 的「發現」與「奇蹟般復甦」確實古怪，於是提出折衷方案：在 Gigi 恢復記憶之前，讓 Hildibrand 以 House Manderville 的名義收養他為受監護人，自己願意當場作證。這樣一來，Supreme Sacred Tribunal of Halonic Inquisitory Doctrine 也會顧及兩家的關係，不至於做出可能破壞友好往來的舉動。</p>
<p>「收養？」Hildibrand 一瞬間語塞，下一秒卻又用他一貫的氣勢答應下來，宣告自己從此就是 Gigi 的父親，並以 House Manderville 的名義給予這孩子庇護。Gigi 興奮地喊著「Papa Hildy」，Nashu 甚至感動得抽噎，說這畫面太美了。Edmont 乾咳一聲收拾場面，表示既然不必再擔心審問機關，你們就可以帶 Gigi 多看看 Ishgard——也許在 Halone 的恩典下，某個景象會喚回他的記憶。Cyr 只能咬牙吞下不甘：既然扣押不成，那他至少要留在一旁「觀察」這個該死的 mammet。</p>
<p>你跟著他們在 Ishgard 的街區穿行，Hildibrand 一邊打量著氣派的宅邸，一邊感嘆那財勢幾乎能與 House Manderville 相提並論；Cyr 則不耐地嘀咕，自己到底還要站著等這個 mammet 做出多少「像樣的 heresy」舉動。Nashu 驚嘆著滿牆的長戟與森嚴的武裝，Gigi 只是含糊地哼著。Hildibrand 試圖用宏偉建築刺激 Gigi 的記憶，卻把名門望族的名字胡亂拼湊成荒唐說法，Cyr 立刻糾正：那裡是 Supreme Sacred Tribunal of Halonic Inquisitory Doctrine，他自己就在那裡任職，並怒斥別用不存在的家名把「男孩——不，那個 mammet」的腦袋塞滿胡言亂語。</p>
<p>Nashu 再次問 Gigi 記得什麼，得到的回答依舊是「什麼都不記得」；於是 Hildibrand 提議改走更日常的路線，帶你們前往 Holy Stables，讓 Gigi 去「感受」Ishgard 著名 chocobo 的氣味與聲響。</p>
<p>在 Holy Stables，Hildibrand 稱讚 chocobo 的高貴，回憶自己曾在鞍上奔馳於風掃平原的時光，甚至說只要遇上技藝高超的騎手，其中任何一匹都能在 Gold Saucer 奪冠。Cyr 強迫自己耐心等待，喃喃自語「被盯著的 heretic 不會犯罪」，同時警告這些 chocobo 是 Ishgard 騎兵的驕傲，任何 Temple Knight 若敢為私利利用牠們，都將面對 Halone 的裁決。Nashu 又把話題扯到頭髮顏色與水果，接著叫 Gigi 一定要去聞聞 chocobo；Gigi 照做了，卻冷冷承認毫無效果。Cyr 指出：被丟在 Coerthas 的雪堆裡，不代表他就來自 Ishgard——可他話音未落，Hildibrand 反倒抓住靈感，宣告下一站要去市場，讓 Gigi 接觸各地貨物，或許更能喚回記憶。</p>
<p>路邊有孩子吵著要買 chocobo，轉頭又小聲說那個奇怪的東西在盯著他們看，Gigi 氣得回喊，反問自己有那麼奇怪嗎。</p>
<p>你們來到 The Jeweled Crozier 的喧鬧街市，Hildibrand 望著琳瑯滿目的商品，說若拿去 Ul’dah 一定能賣上高價；Cyr 則抱怨自己以前的日子明明更「簡單」——接命令、抓 heretic、完成配額。Nashu 想像著閉著眼挑 nameday 禮物送給自己會抽到什麼，Gigi 卻灰心地說反正沒用。Hildibrand 正要再度鼓舞 Gigi，卻因為自己誇張的擺姿勢把一只珍貴的花瓶掃落地面；Cyr 立刻斥責他至少先看清楚再亂揮。</p>
<p>隨後 Frine 冷靜報出損失：那只花瓶依最後估值高達一億二千三百五十萬四千吉爾，已有七百多年歷史，曾點綴過多位大主教、伯爵、指揮官與公爵的居所。Cyr 幾乎喘不過氣，卻又在下一瞬間把注意力死死釘在 Gigi 的反應上，聲稱這是奇蹟，並要求所有人承認你們剛剛目睹的事不該被輕慢。</p>
<p>Hildibrand 立刻喜形於色，誇 Gigi 天生就是工匠，「就跟爸爸一樣」；Nashu 更興奮地提起 Godbert——那位用幾下輕敲就讓 Gigi 醒來的人，還說有人甚至相信那把槌子握著生死之力。Cyr 憤怒地要大家別把這股力量當成把戲；偏偏又有人急著出價，喊著願意用一億吉爾外加那只公爵的花瓶來買走 mammet。</p>
<p>Hildibrand 斷然拒絕，說 Gigi 是自己的骨肉，任何代價都不賣——然而 Gigi 自己卻哀求別再這樣下去，坦白承認：自己就是一具 mammet。Hildibrand 堅持他是自己的兒子，Nashu 也堅持他是 House Manderville 的女兒，可 Gigi 卻尖銳反擊，說你們既不是他的爸爸，也不是他的媽媽。Cyr 像是終於嗅到危險，斷言這股力量絕不能落入不該擁有的人手裡；Nashu 只能難過地說，孩子說出口的話往往最傷人，而 Cyr 在一片混亂中，幾乎再也找不到能說服任何人的句子。</p>
</div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
