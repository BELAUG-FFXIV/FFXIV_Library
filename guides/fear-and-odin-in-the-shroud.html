<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`Fear and Odin in the Shroud`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Scarlet stops you with unusual urgency and asks whether you remember Odin, the elder primal who has haunted the Shroud for so long. When you confirm that you do, she tells you that the pursuit of the Dark Divinity has at last borne fruit. After years of tracing him through scripture and shadowed rumor alike, the Order of the Twin Adder has prepared a plan to bring his wandering to an end. Brother O-App-Pesi now commands the effort, and by his own request, you are sent to Urth’s Fount to hear the details from him directly.</p><p>At the spring, O-App-Pesi receives you with solemn gratitude. He reminds you that Odin has fallen to adventurers many times before, and yet no true end has ever come of those victories. Again and again, the Dark Divinity rises and rides through the Twelveswood as though nothing had happened. That contradiction has led him to dwell on two troubling questions: who continues to summon Odin, and how does he take on a different visage each time he appears? Scripture offers no answer. And so, finding no truth in words, he has chosen instead to seek it through battle.</p><p>His plan is simple, if perilous. A company of adventurers will engage Odin, while he and E-Sumi-Yan observe from afar. If they can witness the precise moment of the primal’s defeat, perhaps they may finally grasp the secret that has eluded them for so long. Yet O-App-Pesi makes plain that the plan rests upon one condition above all others: victory. No ordinary fighter could hope to survive such a clash. That is why he called for you.</p><p>You accept, and Odin is drawn to the spring. The battle is fierce, but in the end you stand victorious. When the danger has passed, O-App-Pesi praises your courage and reveals that your struggle was not in vain. He and E-Sumi-Yan saw something astonishing in the moment Odin fell. When the guildmaster arrives, he thanks you as well, then turns at once to the matter that now consumes both their thoughts. A primal’s body should dissolve, its aether returning to the land. Odin appears to obey the same law—and yet his sword, Zantetsuken, remains behind.</p><p>That single fact changes everything. Upon examining the blade, they found its aetheric density beyond imagining. From there, a disturbing possibility emerges: perhaps the figure who wields the sword is not truly Odin at all. Perhaps Zantetsuken itself is the Dark Divinity, and the body you fight is merely the form it clothes itself in. If so, then Odin has never truly been destroyed, because none thought to destroy the blade. And if the sword is indeed the primal, then it may also be capable of creating a new wielder whenever it manifests again. That theory, they say, explains much—yet not all. For if Odin has no devoted thralls to offer him crystals, how does he continue to sustain himself?</p><p>Before that question can be pursued further, disaster strikes. A soldier rushes in with terrible news: the Zantetsuken has been stolen. One of his own men has fled with the blade, leaving no trail behind. Shock gives way at once to dread. O-App-Pesi realizes too late that if sword and primal are one, then the thief may already have fallen under its influence. E-Sumi-Yan urges immediate action, calling for the forest to be searched and for a new way to destroy Odin once the blade is reclaimed. Though much remains uncertain, one truth stands clear: the battle you fought was not the end, but only the first glimpse into a far darker mystery.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Scarlet <small class="muted">(New Gridania, X:9.9, Y:11.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="all-you-wanted-to-know-about-odin.html">All You Wanted to Know about Odin</a></div><div class="row"><a class="link" href="the-ultimate-weapon.html">The Ultimate Weapon</a></div><div class="row">Disciple of War or Magic Lv. 50</div><div class="row two-col"><b>Unlock Trial</b><a class="link" href="urths-fount.html">Urth's Fount</a></div></div>`,
    followq:`<div class="stack"><div class="row">None</div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'漆黒の闘神オーディン',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>スカーレット少牙士は、ただならぬ面持ちであなたを呼び止め、古の蛮神オーディンのことを覚えているかと問う。あなたがうなずくと、彼女は長く追い続けてきた「闇の神」の討伐に、ついにひとつの手立てが整ったと告げる。聖典の記述をたどり、黒衣森に残る痕跡を追い続けた末に立てられたその策を任されたのは、オ・アパ・ペシだった。彼たっての願いで、あなたはウルズの泉へ向かい、直接その計画を聞くことになる。</p><p>泉で待っていたオ・アパ・ペシは、まず深い感謝を示したうえで、これまでの不可解な事実を語る。オーディンはこれまで幾度となく冒険者たちに討たれてきた。にもかかわらず、そのたびに再び姿を現し、黒衣森を駆け抜けていく。倒されたはずの蛮神がなぜ終わらないのか。誰がオーディンを呼び、なぜ現れるたびに異なる姿を取るのか。その答えは、どれほど聖典をひもといても見つからなかった。ならば今度は、言葉ではなく剣によって真実へ迫るしかない――それが彼の結論だった。</p><p>計画は危険だが明快だった。冒険者たちがオーディンに挑み、その戦いをオ・アパ・ペシとエ・スミ・ヤンが遠くから見届ける。蛮神が滅びる瞬間をこの目で捉えることができれば、長く解けなかった謎に届く手がかりが得られるかもしれない。だが、そのすべては討伐の成功を前提としている。常人では生きて帰れぬ戦いだからこそ、彼はあなたをここへ呼んだのだと静かに告げる。</p><p>あなたが力を貸すと決めると、精霊の力によってオーディンは泉へと誘い出される。激しい戦いの末、あなたは闇の神を打ち倒す。戦いを見届けたオ・アパ・ペシは、命を落とさず戻ったあなたを称え、その勝利が決して無駄ではなかったと語る。ほどなくしてエ・スミ・ヤンも合流し、ふたりは戦いの最中に見た異変について話し始める。蛮神は打ち倒されれば、その顕現を形作っていたエーテルを大地へ返す。オーディンもまた、その理から逃れてはいなかった。だが、ひとつだけ消えずに残ったものがある。斬鉄剣だった。</p><p>その事実が、彼らの見方を根底から揺るがす。残された斬鉄剣を調べた結果、そこに宿るエーテルの密度は想像を絶するほど高かった。そこで彼らは、これまで当然としてきた前提そのものを疑い始める。剣を振るう存在こそがオーディンなのではなく、斬鉄剣そのものが「闇の神」なのではないか。もしそうであるなら、これまで誰も本当の意味でオーディンを滅ぼせなかったことにも説明がつく。誰ひとりとして、剣そのものを破壊しようとはしなかったからだ。そして蛮神たる剣が、新たな担い手を自ら作り出していたのだとすれば、現れるたびに姿が変わる理由も見えてくる。もっとも、それでもなお疑問は残る。眷属なきオーディンは、いったい何を糧に存在を保っているのか。</p><p>その答えに届くより早く、凶報が飛び込む。回収したはずの斬鉄剣が奪われたのだ。神勇隊の兵のひとりが剣を持ち去り、跡形もなく姿を消したという。驚きはすぐに恐れへ変わる。もし斬鉄剣とオーディンが同一の存在であるなら、その兵はすでに剣に心を奪われたのかもしれない。オ・アパ・ペシは己の不明を悔い、エ・スミ・ヤンはただちに捜索の手配と、剣を取り戻したあとの討滅策の再構築を促す。今日得られたものはたしかに大きい。だが同時に、あなたの前には、これまで以上に深く暗い謎が口を開いたのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> スカーレット少牙士 <small class="muted">（グリダニア：新市街, X:9.9, Y:11.4）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="all-you-wanted-to-know-about-odin.html">聖典の真実</a></div><div class="row"><a class="link" href="the-ultimate-weapon.html">究極幻想アルテマウェポン</a></div><div class="row">ファイター ソーサラー Lv 50～</div><div class="row two-col"><b>討伐戦開放</b><a class="link" href="urths-fount.html">闘神オーディン討滅戦</a></div></div>`,
    followq:`<div class="stack"><div class="row">なし</div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'黑衣森的恐懼與 Odin',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Scarlet 神情異常凝重地叫住你，開口便問你是否還記得那位長久徘徊於 Shroud 的古老 primal Odin。當你點頭後，她告訴你，Order of the Twin Adder 追查這位「闇之神」已久，如今終於找到了一個能夠真正終結他遊蕩的方法。多年來，他們一面在古老典籍中追索線索，一面在 Shroud 裡追蹤他的痕跡，而這次行動的指揮者，正是 O-App-Pesi。也因為是他親自點名，你才會被派往 Urth’s Fount，聽他親口說明整個計畫。</p><p>在泉邊等候你的 O-App-Pesi，先向你表達了感謝，接著便說起一直困擾著他們的矛盾。Odin 明明早已被無數冒險者擊倒過，照理說，這樣的 primal 不該再繼續為患才對。可事實卻恰恰相反，他總會一次又一次再度現身，重新在 Twelveswood 之間馳騁。正因如此，O-App-Pesi 始終無法放下兩個疑問：究竟是誰在召喚 Odin？而他又為何每次顯現時，都會帶著不同的外貌？可無論翻閱多少聖典，裡頭都沒有能夠解開這些疑問的答案。既然文字無法指明真相，他們就只能從真正的戰鬥裡去尋找。</p><p>於是，他提出了一個危險卻直接的方案：由一支冒險者隊伍正面迎戰 Odin，而他和 E-Sumi-Yan 則在遠處觀察整場戰鬥。如果能親眼看見 Odin 被擊敗的那一刻，也許就能捕捉到過去始終錯失的關鍵線索。只是，這個計畫能否成立，最重要的前提仍舊是勝利。面對那樣的敵人，若沒有真正足以存活下來的力量，連靠近都只是送死。也正因如此，他才會把你請到這裡來。</p><p>當你答應出手後，O-App-Pesi 便借助 elementals （元素精靈，黑衣森林中的自然意志與乙太存在，長久守護著森林，並深深影響 Gridania 與 Padjal 的生活、信仰與行動準則）的力量，將 Odin 引向這座泉水。那是一場足以令人屏息的激戰，但最後，你仍親手擊倒了這位闇之神。戰鬥結束後，O-App-Pesi 一邊慶幸你平安活了下來，一邊告訴你，你的勝利並不是徒勞無功。因為就在你與 Odin 交戰之時，他和 E-Sumi-Yan 看見了一件極不尋常的事。很快地，E-Sumi-Yan 也來到現場，兩人隨即說出他們觀察到的結果。正常來說，primal 一旦被打倒，構成其肉身顯現的乙太便會回歸大地。Odin 似乎也沒有脫離這條法則。可是，在他的身體消失之後，卻有一樣東西仍然留了下來，Zantetsuken。</p><p>這個事實，徹底撼動了他們原本的理解。兩人檢查那把劍之後，發現其中蘊含的乙太密度高得難以想像。也因此，一個原本從未被真正考慮過的結論浮現出來：也許，過去所有人都想錯了。真正的「闇之神」並不是揮舞 Zantetsuken 的那個身影，而是 Zantetsuken 本身。若真是如此，那麼 Odin 之所以從未真正被消滅，便有了再清楚不過的解釋，因為一直以來，從來沒有人試圖摧毀那把劍。而如果那把劍本身就是 primal，它自然也可能一次又一次替自己塑造新的持劍者。如此一來，為何 Odin 每次現身時都會換上不同的面貌，也終於能說得通了。然而，即使如此，仍有一道更深的疑問沒有解開：若 Odin 並沒有受其影響而為他獻上水晶的人，他又是靠什麼維持自身存在的？</p><p>可就在他們還來不及繼續追索答案時，惡耗便突然降臨。原本回收在手的 Zantetsuken 竟然不見了。一名負責看守的士兵帶著劍逃走，連一點能追查去向的痕跡都沒留下。震驚過後，立刻浮現的便是更可怕的可能性。若 Zantetsuken 和 Odin 真的是同一存在，那麼那名士兵的意志，很可能也已經被那把劍奪走了。O-App-Pesi 因自己的大意而深深自責，E-Sumi-Yan 則立刻主張，必須儘快動員搜尋，同時重新思考在奪回 Zantetsuken 之後，究竟該如何真正擊倒 Odin。這一天確實帶來了突破，但它同時也揭開了一個更深、更黑暗的真相，你所見到的勝利，遠遠不是終點。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Scarlet <small class="muted">(格里達尼亞新街, X:9.9, Y:11.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="all-you-wanted-to-know-about-odin.html">古書的真相</a></div><div class="row"><a class="link" href="the-ultimate-weapon.html">究極幻想：終極武器</a></div><div class="row">戰鬥或魔法職等級 50 以上</div><div class="row two-col"><b>解鎖試煉</b><a class="link" href="urths-fount.html">鬥神 Odin 討滅戰</a></div></div>`,
    followq:`<div class="stack"><div class="row">無</div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
