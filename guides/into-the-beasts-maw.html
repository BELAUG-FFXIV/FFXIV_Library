    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>At Buscarron’s Druthers, Buscarron calls you over with a glint of relief in his eyes. After long days of uncertainty, he finally has reliable word on the missing sylph elder. Papalymo clears his throat and supplies the name: Frixio, eldest of the sylphs of Little Solace and long-time representative in their dealings with Gridania. Yda, ever fond of simple images, likens him to a small leafy bridge between “walking ones” and “these ones”—a bridge that is currently missing, and therefore useless until found. That is why, she insists, you must track him down. Buscarron explains that Frixio was last seen near the entrance to an abandoned dungeon in the South Shroud: the Thousand Maws of Toto–Rak. If you hurry, you may yet catch up to him there. Before you can depart, a panicked sylph named Knolexia stumbles into the tavern, crying out for help. Between sobs, she explains that the elder went into Toto–Rak and has not returned; imperial ones were chasing him, and she is terrified for his life. Buscarron curses the idea of anyone willingly entering such a death trap, where monsters lurk to make meals of the careless, but Papalymo sees no choice. Frixio is your best hope for peace with the sylphs, and if he is lost, all your efforts will have been in vain. Papalymo stays behind to tend Knolexia’s wounds and sends Yda to the Adders’ Nest to request aid. As for you, you are to make straight for Toto–Rak and see that no harm befalls the elder; peace between man and sylph now rests upon your success.</p>
      <p>You follow the road through the South Shroud to the sealed entrance of the Thousand Maws of Toto–Rak, where a Gridanian officer named Bloisirant stands guard. By order of the Elder Seedseer, the dungeon has been placed under strict control, and entrance is normally forbidden. When you tell him the sylph elder is inside, he reels in shock, cursing himself for having failed to notice. The thought of Frixio wandering alone among the foul creatures that infest the tunnels shakes him badly enough that he abandons protocol. These are exceptional circumstances, he declares; you must find the elder before he falls prey to the fiends within. He grants you special leave to enter, instructing you to assemble a rescue party and descend as soon as you are ready. Within the gloom of Toto–Rak, as you press deeper past webs and mire, the world seems to fall away. Darkness gathers, and a mocking laugh echoes through your mind. A voice hails you as the mighty slayer of Ifrit and speaks of the Echo with wary fascination, knowing it allows you to understand without words. The speaker chooses, with contempt, to use your “crude tongue” and reveals himself at last as Lahabrea of the Ascians, servant to the one true god. He calls your story a fantastical bedtime tale for the children of Eorzea and warns that it will soon be dark for the so-called Bringer of Light. The Echo shows you how he sees the world: all that stands between it and Darkness is a troublesome anomaly in the aether—your Echo—and like all tales, yours must end, so that a new tale can begin: the tale of the Crystal’s demise.</p>
      <p>When the vision loosens its grip and you push on through the dungeon, you finally reach fresher air and the chamber where the many-legged fiend made its lair. With the monster fallen, a small sylph emerges, gasping at the comparative freshness of the air outside its den. The smell is hardly pleasant, but to Frixio, it is still better than the stench within. Realizing the “sinister one” has vanished, he rejoices that he may now leave this awful place and turns to you with gratitude, asking if you were the one who defeated the many-legged creature. He gives his name as Frixio, eldest of the sylphs of Little Solace. Yet the Echo stirs again, and another vision overtakes you: imperial heralds barking reports, Garlean soldiers scouring the region for signs of the “accursed eikon” Ramuh. Nero tol Scaeva listens with ill-concealed impatience as his men report finding nothing at Larkscall; he forbids them to widen the search, unwilling to risk alerting Gridania, and complains that a god who grants no wishes is hardly worth the effort. He inquires after the sylphs taken prisoner, only to learn that the soldiers were overzealous in their attempts to force a summoning. With a sigh and a cruel jest about vegetables bruising easily, he dismisses the dead captives as perhaps better off than living in denial of their god. Dawn approaches, and he orders a withdrawal, grumbling that they are so close to completion he can almost taste it, yet still must be patient. He recalls Garlond’s old words about challenging the limits of possibility and declares that while Garlond’s star has fallen, his own is rising. His ambition burns so fiercely, he boasts, that even Lord van Baelsar’s ultimate weapon will seem like a candle beside it. In the vision’s wake, you hear Noraxia condemn the walking ones for what was done to Noxia and the other captured sylphs, declaring that these two-legged mortals have black hearts and cannot be trusted. Frixio gently counters her, insisting that not all walking ones are the same—that while there are evil ones among them, there are good ones as well.</p>
      <p>Back in the present, Frixio studies you with concern and asks if you feel unwell, then wishes to know what brought you to such a place. When he hears that you came at Noraxia’s bidding to rescue him, he recognizes the debt he owes you and offers his thanks. You have questions about Lord Ramuh, and he promises to answer them—but not here, not in this lightless prison of stone and filth. He resolves to return to Little Solace, asking you to come and speak with him properly once you are ready, and insists on accompanying you to the dungeon’s exit. Later, you return to Buscarron’s Druthers, where Buscarron anxiously awaits word. The moment you tell him the sylph elder is safe, he thanks the gods, admitting he is not sure what to make of the rest of your tale but deeply relieved that Frixio survived unscathed. Catching himself before he tempts fate further, he urges you to hurry to Little Solace and secure peace with the sylphs before anything else can befall them. He promises to send word to your Sharlayan allies and the Order of the Twin Adder, ensuring they are kept informed. For your efforts, he declares, you have done a great service for Gridania and earned yourself a place of honor at the Druthers. Whenever you feel like a drop of Qiqirn firewater, he says, you will always be welcome at his bar.</p>
    </div>

    pageTitle:'獄の底から響く声',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>「バスカロンズ・ドランカー」に顔を出すと、バスカロンは安堵と緊張の入り混じった表情であなたを呼び止める。行方知れずとなっていたシルフ族の長老について、ようやく信頼できる情報が入ったのだという。そこへパパリモが口を挟み、長老の名が「フリクシオ」であり、リトルソルaceに暮らすシルフ族の中でも最長老として、長きにわたりグリダニアとの対話の場に立ってきた存在だと説明する。イダはいつもの調子で、彼を「歩く者」と「木の葉の民」とをつなぐ小さな緑の橋にたとえ、その橋が今どこにあるのかわからないからこそ、見つけ出さねば意味がないのだと言い張る。だからこそ、あなたが探し出さねばならないのだ。バスカロンによれば、そのフリクシオが最後に目撃されたのは、サウス・シュラウドにある放棄されたダンジョン「トトラクの千獄」の入口付近だという。急げばまだ追いつけるかもしれない──そう告げられた矢先、慌てふためいたシルフ族の少女ノレクシアが酒場に飛び込んでくる。彼女は、長老がトトラクに入って戻らず、帝国の者たちに追われていたのだと泣きながら訴え、どうか助けてほしいと声を上げる。バスカロンは、あの死地には怪物がうようよしており、うかつに足を踏み入れればたちまち餌食になると悪態をつくが、パパリモはもう選択の余地はないと悟る。フリクシオはシルフ族との和解に向けた最後の望みであり、彼を失えば、ここまで積み重ねてきた努力が水泡に帰す。パパリモはノレクシアの手当てのために残り、イダをアダー隊本部へと走らせて援軍を求めることにし、あなたにはトトラクへ急ぎ、長老に一切の危害が及ばぬよう守る役目を託す。人とシルフ族との平和は、今やあなたの働きにかかっているのだ。</p>
      <p>あなたはサウス・シュラウドの道を辿り、「トトラクの千獄」の封鎖された入口へとたどり着く。そこでは、エルダー・シードシーアの命により、このダンジョンの管理を任されているグリダニア軍の士官ブロワザランが見張りについていた。本来なら、この場所への立ち入りは固く禁じられている。しかし、フリクシオが中にいると伝えた途端、彼は愕然と目を見開き、自らの不注意を激しく悔やむ。おびただしい魔物が巣くう地下道を、シルフ族の長老がひとりさまよっているかもしれない──その想像だけで、彼は規則を破る覚悟を固める。今は非常時であり、一刻も早く長老を見つけ出さねばならない。彼はあなたに特例として立ち入りを許可し、救助隊を編成し準備が整い次第、速やかに突入するよう求めるのだった。やがて、瘴気と闇に満ちたトトラクの内部を進んでいくにつれ、あなたの周囲から現実感が薄れ、世界そのものが遠のいていく。暗闇に沈む中、嘲るような笑い声が心の内側に響き、「イフリートを討ち果たした強者よ」と呼びかける声が、エコーを通じてあなたに語りかける。言葉を介さずとも理解が届くことを承知したうえで、彼はあえてあなたの「粗野な言語」を用い、自らをアシエンのラハブレア、一柱の唯一神に仕える者と名乗る。あなたの物語は子供たちに語るおとぎ話のように「心躍る逸話」だが、やがて闇が訪れ、「光の使い」としての物語は終わりを迎えるだろうと彼は嘲笑する。世界と闇とのあいだに立ちはだかるのは、エーテルの中に紛れ込んだ厄介な異物──すなわちあなたのエコーにすぎない。そして、すべての物語が終わりを迎えるように、あなたの物語もまた終焉を迎える。だが恐れることはない、その結末は新たな物語、「クリスタルの破滅」の始まりに過ぎぬのだから──そう言い残し、幻視は途切れる。</p>
      <p>エコーの束縛が薄れ、なおもダンジョンの奥へと進んだあなたは、やがて多脚の魔物が巣を張っていた広間へとたどり着き、その主を討ち倒す。閉ざされた空間から抜け出し、わずかに新鮮な空気が流れ込む場所へ出ると、小さなシルフ族がひょっこり姿を現し、胸いっぱいに息を吸い込む。決して清らかな空気ではないが、それでも先ほどまでの淀んだ臭気よりはよほどましだと、彼は喜びの声を上げる。禍々しい「邪悪な者」の気配が消え去ったことで、この忌まわしい場所から離れられるのだと安堵し、あなたが多脚の怪物を倒したのかと尋ねて深く感謝を示す。そのシルフ族こそ、小さき者たちの最長老フリクシオであった。だが、安堵も束の間、再びエコーが働き、あなたの意識は別の光景に引き込まれる。帝国の伝令が大声で報告し、ガレマール帝国軍の部隊が「忌まわしき蛮神」を求めて各地を探索している様子が映し出される。ネロ・トル・スカエウァは、ラークスコール周辺で何も発見できなかったという報告に苛立ちを隠さず、探索範囲を広げればグリダニアに気づかれかねないとして拒否する。彼は、しばらくのあいだラムウが現世に顕現する兆しは見られず、願いを叶えることすらしない神に何の価値があるのかと吐き捨てる。そして、捕らえたシルフ族たちの様子を問いただし、兵たちが蛮神召喚を強要するあまり、必要以上の痛めつけをしてしまったと知ると、野菜は傷つきやすいのだと冷笑交じりにため息をつく。彼にとって、信仰を失った者が生き永らえることは、ある意味で死よりも残酷なのかもしれない。夜明けが近づくと彼は撤収を命じ、「完成はすぐそこまで迫っており、その果実の味さえ感じられるほどだが、今は辛抱する時だ」と自らを戒める。そしてかつての仲間ガーロンドの言葉、「たとえ天をも堕とすことになろうとも、可能性の限界に挑む者が我々でなくて誰だ」と、唯一正しかった一節を皮肉げに口にしながら、自らの星は昇りゆき、ガイウス・ヴァン・バエサルの「究極幻想」すら、その輝きの前ではただの蝋燭に過ぎなくなるのだと狂気じみた笑いを上げる。その幻の中で、ノラクシアはノクシアを殺された怒りと悲しみから、歩く者たちは皆、黒い心を持ち、この世ならざる者たちを傷つける存在だと断じ、「歩く者は信用ならぬ」と叫ぶ。対するフリクシオは、そんな彼女をなだめ、歩く者にも悪しき者と善き者がいるのだと諭す。すべての歩く者を一括りにして憎んではならないのだと。</p>
      <p>やがて幻視が終わり、現実のトトラクへと意識が戻ると、フリクシオはあなたの様子を心配そうに見つめ、体調は大丈夫かと問いかける。そして、どうしてこんな場所まで来たのか、その理由を知りたがる。あなたが、ノラクシアの願いを受けて彼を探し出し、救いに来たのだと告げると、フリクシオは深く頭を垂れ、その恩義に感謝の言葉を述べる。あなたが雷の神ラムウについて問いかけると、彼は質問に答えることを約束するが、こんな光の届かぬ石の牢獄のような場所で話すべきではないと言って首を振る。まずはリトルソルへ戻るべきだと決め、あなたに準備ができたら会いに来てほしいと頼む。そして、ここから外に出るまでは、あなたと共に歩むと申し出るのだった。後に、あなたが再び「バスカロンズ・ドランカー」へ戻ると、バスカロンはあなたの姿を見るなり、シルフ族の長老が無事かどうかを真っ先に尋ねる。フリクシオが無事であると知ると、彼は胸を撫で下ろし、あなたの語る奇妙な出来事の数々は理解しきれないものの、長老が傷ひとつ負わずに済んだことだけは心から嬉しく思うと笑う。これ以上運命をからかうような真似はすまいと苦笑しつつ、バスカロンはあなたにリトルソルaceへ向かい、シルフ族との和平をしっかりと結んでくるよう促す。自分からは、シャーレアンの友人たちと双蛇党に知らせを送っておくと約束し、今日あなたが成し遂げたことはグリダニアにとって大きな恩となり、ここ「バスカロンズ・ドランカー」においても名誉ある存在となったのだと告げる。そして、キキルンのファイアウォーターが飲みたくなったら、いつでもここに来いと肩を叩き、あなたを歓迎するのだった。</p>
    </div>

    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Buscarron’s Druthers 裡，Buscarron 一看到你就把你叫到身邊，眼神裡既有放鬆下來的輕鬆，也有揮之不去的憂慮。他說，關於失蹤的 sylph elder，他們總算拿到可信的情報。Papalymo 接著補充，這位長老名叫 Frixio，是 Little Solace 眾多 sylph 當中年紀最長的一位，長年代表「these ones」與 Gridania 進行對話。Yda 則照她的風格，把 Frixio 比喻成一座小小的綠色橋梁，連接著「walking ones」與 sylph──但這座橋現在不知所蹤，而找不到的橋根本派不上用場，所以才必須把他找出來。Buscarron 說，最近有人在 South Shroud 的一座廢棄地牢入口附近看見 Frixio，那裡正是名為「The Thousand Maws of Toto–Rak」的危險所在，要是你動作快一點，或許還來得及追上他。話才說到一半，一名驚慌失措的 sylph──Knolexia──跌跌撞撞闖進酒館，哭著求「walking ones」幫忙。她斷斷續續地說，elder 進入 Toto–Rak 之後一直沒有回來，而且還遭到 imperial ones 追趕，她害怕得快要無法思考。Buscarron 一邊咒罵長老怎麼會踏進那種到處是魔物的鬼地方，一邊也承認那裡簡直是找死的陷阱，但 Papalymo 卻沒有選擇的餘地。Frixio 是你們與 sylph 之間達成協議的最大希望，如果失去他，迄今所有的努力都會化為烏有。他決定留下來替 Knolexia 治療傷勢，並派 Yda 前往 Adders’ Nest 向 Order of the Twin Adder 求援，而你則被託付前往 Toto–Rak，確保 elder 安然無恙──人類與 sylph 之間的和平，此刻就握在你的手裡。</p>
      <p>你沿著 South Shroud 的林間小徑前進，很快就抵達封鎖中的 The Thousand Maws of Toto–Rak 入口，那裡有名為 Bloisirant 的 Gridania 軍官把守。依照 Elder Seedseer 的命令，這座地牢已被嚴格管制，平時完全禁止進入。當你說 sylph elder 在裡面時，他驚愕得幾乎說不出話來，一面咒罵自己眼拙，一面想像長老獨自在那些怪物之間徘徊的模樣。這樣的畫面讓他不再堅持原本的規定。他認定這是非常時期，必須在 elder 落入魔物之口前將他找出來，因此特別准許你破例進入，要你組織救援小隊，準備就緒後立刻下去營救。在 Toto–Rak 裡，你踏入一層又一層的濃霧與黑暗，越往裡走，現實感就越發遠離。就在這樣的昏暗中，一陣笑聲突然在心底迴盪。有人稱呼你為「slayer of Ifrit」，對你身上名為 Echo 的力量產生興趣，知道你可以不靠言語便理解他的意思。那個聲音刻意用你所謂的「粗俗語言」開口，自稱是 Ascians 的一員 Lahabrea，是「one true god」的僕從。他說，你的故事聽來就像說給 Eorzea 小孩睡前聽的奇幻故事一樣好聽，但夜晚總會來臨，所謂的 Bringer of Light 的故事也終究會完結。在他的眼中，這個世界與 Darkness 之間，唯一的障礙不過是以太中一個礙事的異物──也就是你的 Echo。所有故事終有完結的一天，你的故事也不例外，而在他看來，那不必令人恐懼，因為那只是另一則故事的開端：關於 Crystal 慘遭毀滅的故事。</p>
      <p>當 Echo 慢慢鬆開束縛，你繼續穿過地牢深處，終於抵達那隻多足怪物的巢穴。擊倒這頭怪物後，你走向空氣稍微流通的出口，這時一個小小的 sylph 從陰影裡探出身子，猛地吸了一大口氣。他一邊說這裡的空氣也談不上清新，一邊仍然慶幸比起裡面要好太多。他確認那個「sinister one」已經消失，開心地表示終於能離開這個可怕的地方，然後轉過身問你是不是打倒那個 many-legged 的魔物，並深深向你道謝。他自報姓名為 Frixio，是 Little Solace 當中年紀最長的 sylph。接著，Echo 再度啟動，另一段景象淹沒你的視線：Imperial Herald 高聲喊叫，Garlean 部隊在各地搜尋「accursed eikon」Ramuh 的下落。Imperial Centurion 回報在 Larkscall 一帶一無所獲，Nero tol Scaeva 則不耐得很，不允許擴大搜索範圍，以免驚動 Gridania，嘴上還抱怨一個不實現願望的 god 有什麼價值。他詢問那些被俘的 sylph 現況，卻得知士兵們為了逼迫他們召喚 eikon 而過度用刑，幾乎把能用的都折磨死了。他一邊嘆氣，一邊冷笑說「vegetables」很容易就會瘀傷，幸好自己沒有把「做晚餐」這種重要任務交給部下。說到最後，他乾脆把這當成一種解脫，認為與其活著卻對自己的神形同死去，不如乾脆真正死去更好。黎明將近，他下令撤退，一面喃喃說他們距離完成目標近得幾乎可以嘗到成果的味道，卻仍得耐心等待。他回想起 Garlond 曾說過的話：「就算得把天都拉下來，若不是我們來挑戰可能性的極限，還會有誰來做？」他承認這句話算得上正確，但話鋒一轉，宣稱 Garlond 的星辰早已墜落，而他自己的星光才正要升起，耀眼到連 Lord van Baelsar 的 ultimate weapon 在他面前都像一根小蠟燭，說完又大笑起來。在這段幻象的尾聲，Noraxia 憤怒地指控 walking ones 殺害了 Noxia，也讓其他被捕的 sylph 遭受同樣的命運，她認定這些兩腳的生物都有黑暗的心，只會傷害「these ones」，完全不值得信任。Frixio 則溫柔地勸她不要太快做出評斷，提醒她不是所有 walking ones 都一樣，裡面有惡人，但也有好人。</p>
      <p>幻象退去後，你再次回到 Toto–Rak 的現實裡。Frixio 注視著你，擔心地問你是不是感到不舒服，接著想知道是什麼原因讓你來到這種地方。聽你說是應 Noraxia 的請託前來營救，他鄭重其事地表示自己欠你一份救命之恩。你提出關於 Lord Ramuh 的疑問，他也答應會回應你的問題──但不是在這種不見天日的地方。他說，應該先離開這座黑暗的地牢，回到 Little Solace 之後，才能「properly」地與你談話，於是決定先返回家園，請你準備好之後再去找他。他也表明，至少在離開這裡之前，要跟你一起走到外面。稍後，你回到 Buscarron’s Druthers，Buscarron 一見到你就迫不及待地問 sylph elder 是否安然無恙。當你報告 Frixio 平安無事時，他長長吐出一口氣，說你故事裡那些關於黑暗與 Ascians 的部分，他一時之間不知該怎麼理解，但至少 Frixio 沒有受傷，這就足以讓他心懷感激。他隨即托你在其他麻煩降臨之前儘快去 Little Solace，替 Gridania 爭取與 sylph 之間的和平，自己則會立刻通知在 Sharlayan 的友人與 Order of the Twin Adder，讓他們掌握最新情況。Buscarron 說，你今天為 Gridania 立下大功，也在這間小酒館裡贏得一席榮耀之位，以後只要你想喝上一口 Qiqirn firewater，隨時都可以回到這裡，他會永遠替你留個座位。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
