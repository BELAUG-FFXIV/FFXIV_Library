<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`When Yugiri Met the Fraternity`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Zanthael stops you before you leave, explaining that the Admiral has already arranged an introduction for Lady Yugiri. He has been entrusted with a letter—one meant to open a door that does not usually open for strangers. To the south is a gate leading to a pier used by smaller fishing vessels; you are to find an inconspicuous Hyuran man there and present the letter. He serves as a kind of gatekeeper.</p><p>But Zanthael does not let you go without warning you what you are truly stepping into. The fraternity you are about to meet, he says, lives in the shadows of Lominsan society. They prize their independence even more than pirates do, and the bond between them is stronger than mythril. New faces are met with suspicion as a matter of course. Even a letter penned by the Admiral herself will only carry you so far; if you want their confidence, you will have to earn every onze of trust they give. With that, he places the letter in your hands and sends you on your way—wishing you, pointedly, good luck.</p><p>Down on the Lower Decks, you pass a shadowy woman who snaps at you for staring, then you approach the man Zanthael described. He sizes you up and asks if you have business with him. When you present the letter, his guarded manner shifts—just enough. So you are the one the Admiral sent word of. He admits he had hoped to catch sight of Thancred as well, if only to see that familiar grin again, but jokes that with all the doe-eyed women around, Thancred likely has his hands full.</p><p>Then his attention turns to Yugiri. He recognizes her immediately as the Far Easterner Merlwyb mentioned—someone who wishes to train with them—and he welcomes her to Limsa with a rough warmth. Yugiri introduces herself plainly: Yugiri of Doma, honored to make his acquaintance. She confesses that when she first learned of their organization, she carried certain preconceptions about what their membership would be like—but it seems she was mistaken.</p><p>The man laughs that she is not the first to say so. Limsa is a city of pirates, he points out, and pirates hardly care about spotless reputations; they do not need a secret society to do their dirty work. If he and his people keep to the shadows, it is not because they are ashamed—it is because remaining unseen is simply better for business. Yugiri accepts the logic at once: their fighting techniques are suited to that purpose. And she adds that practitioners of her own art are also denizens of shadow; their strength lies in stealth. There is much, she believes, they can learn from one another.</p><p>With that, the man’s impatience breaks into enthusiasm. What in the seven hells are they waiting for? If she will come with them, “Yugerry of Do–whatsit,” they can get acquainted somewhere more private—then he stops, realizing how that sounded, and laughs at himself.</p><p>Yugiri turns to you and asks you to understand: she will remain with these people for a time so she can study their ways. She dislikes being separated from her countrymen, but takes comfort in knowing they are in the best of hands. She tells you that you have been a true friend to the Domans, and that no words would suffice to express her gratitude. Before long, she hopes to begin imparting her martial knowledge to the people of Eorzea—and when that time comes, she would be honored to welcome you as a student.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Zanthael <small class="muted">(Limsa Lominsa Lower Decks, X:11.4, Y:10.9)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="lord-of-the-whorl.html">Lord of the Whorl</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="through-the-maelstrom.html">Through the Maelstrom</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'海都の地下組織',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ザンテールはあなたを呼び止め、提督がすでに手はずを整えていると告げる。ユウギリのための紹介状を預かっており、それを渡すことで「会うべき相手」に取り次げるという。南にある小型漁船用の桟橋へ続く門へ行き、そこにいる目立たぬヒューランの男を探して手紙を見せろ――その男は、いわば門番の役目を果たしている。</p><p>だがザンテールは、送り出す前に釘を刺す。あなたが紹介される一団は、リムサ・ロミンサ社会の「影」に身を置く者たちだ。海賊以上に独立を重んじ、ミスリルより強い絆で結ばれている。ゆえに新顔には常に警戒心を抱く。提督自らの手紙であっても、紙の上の言葉だけでは信頼の扉は大きく開かない。彼らが与える信頼は一オンスごとに勝ち取れ――そう念を押し、手紙を渡して、指定の場所へ向かうよう促す。最後に「幸運を」と、意味深に付け加えながら。</p><p>リムサ・ロミンサ下甲板層へ向かう途中、あなたは薄暗い雰囲気の女に睨まれ、「見てんじゃないよ」と噛みつかれる。だが目的の男に近づくと、彼は無愛想に用件を問う。手紙を示すと、男の態度がわずかに変わる。提督が知らせを寄こした相手が、お前か――。</p><p>男は、サンクレッドの姿も見られたらよかったのだが、と冗談めかし、あのニヤけ面を見るのも久しぶりだと言う。だが目のうるんだ女が周りに多いから、奴は手が塞がっているだろう、と下世話に笑う。</p><p>そして視線をユウギリへ向け、提督メルウィブが「うちで修練したい」と言っていた東方の者だな、と言って歓迎する。ユウギリは名乗る。ドマのユウギリ、会えたことを光栄に思う。remember she confesses that when she first learned of their organization, she carried certain preconceptions about what their membership would be like—but it seems she was mistaken.</p><p>男は笑い、同じことを言う者は多いと返す。確かにリムサ・ロミンサは海賊の街だが、海賊は評判など気にしない。汚れ仕事をするために秘密結社など不要だ。自分たちが影に紛れているのは恥があるからではない。目立たずにいる方が、商売として都合がいいだけだ。</p><p>ユウギリは納得し、その目的に適した戦い方を磨いてきたのだと理解する。そして自分の流派もまた影に生きる者たちの術であり、強さは隠密にあると言う。互いに学べることは多いだろう、と。男は勢いよく、なら何をぐずぐずしている、と言い、もっと人目のない場所で親睦を深めよう、と軽口を叩くが、言い方が妙になったことに気づいて自分で笑い飛ばす。</p><p>ユウギリはあなたへ向き直り、しばらくこの者たちと共に過ごし、彼らの流儀を学びたいと言う。故国の仲間と離れるのは本意ではないが、彼らが最善の手に委ねられていると知って心を落ち着ける。あなたはドマの民にとって真の友であり、感謝を言葉にし尽くせない、と。やがてエオルゼアの人々に武の心得を伝える時が来たなら、そのときは弟子として迎えたい――それが自分の名誉だと告げる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ザントヘール甲軍曹 <small class="muted">（リムサ・ロミンサ：下甲板層, X:11.4, Y:10.9）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="lord-of-the-whorl.html">決戦、リムサ・ロミンサ沖</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="through-the-maelstrom.html">混沌の渦動</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'海都的地下組織',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Zanthael 把你攔下來，說提督已經把安排都談妥了——他手上正保管著一封給 Lady Yugiri 的介紹信。南邊有一道門通往小型漁船使用的碼頭，你要在那裡找到一名不起眼的 Hyuran 男子，親手把信交給他；他算是某種「看門人」，會替你們牽線。</p><p>他同時提醒你：你即將被引薦的，是一個藏身於 Limsa Lominsa 陰影裡的秘密結社。他們比海賊更看重獨立，彼此的連結強得像秘銀一樣牢固，也因此對陌生面孔格外警戒。就算信出自提督之手，紙上的幾句話也只夠你踏進門檻；他們給的每一點信任，你都得自己去掙。Zanthael 把信遞給你，叫你照指示去找那名男子，最後只丟下一句：祝你好運。</p><p>你來到 Limsa Lominsa Lower Decks。路上有個神情陰沉的女人嫌你盯著看，語氣不善地要你別失禮。你依照指示找到那名 Hyuran 男子，他先冷冷打量你，問你找他做什麼。當你遞上介紹信，他的態度才略微鬆動——原來你就是提督派人通知過的那個人。</p><p>他一邊收信，一邊用粗俗的玩笑說本來還想順便看看 Thancred，說很久沒見到他那副欠揍的笑容了；但現在到處都是眼巴巴盯著他的女人，他八成忙得不可開交。接著他把目光轉向 Yugiri，說這位就是提督提過、想來跟他們一起修練的「遠東人」吧，並用粗魯卻熱絡的口吻歡迎她來到 Limsa。</p><p>Yugiri 也正面自報身分：她是來自 Doma 的 Yugiri，很榮幸能認識他。她坦承自己起初聽聞這個秘密結社時，對他們成員抱持過某些先入為主的想像；如今看來，那些想像顯然不對。那名男子大笑，說她不是第一個這麼講的人。Limsa 確實是海賊之城，但海賊根本不在乎名聲乾不乾淨，也不需要秘密結社替他們做髒活。他們選擇隱身暗處，不是因為見不得人——只是因為對生意而言，不被看見更有利。</p><p>Yugiri 聽懂了。她說他們因此磨練出適合這種目的的戰鬥技術，而她自己的武藝也是一樣：修習者同樣行走於暗影之中，力量的根源在於隱密與潛行。她認為彼此一定有很多可以互相學習之處。那名男子聽得更來勁，說既然如此還等什麼，乾脆跟他們走，到更私密的地方好好「認識一下」；話才出口他就自己覺得怪，立刻笑著改口，說自己剛剛那句說得不太對勁。</p><p>Yugiri 轉向你，說她會先暫時留在這些人身邊一段時間，好好觀察並學習他們的作法。她雖然不願與同胞分開，但至少能放心——她的族人如今確實是在最可靠的人手裡。她鄭重告訴你：你一直都是 Doman 的真正朋友，她的感激不是幾句話能說完的。等不久之後，她開始把自己的武藝傳授給 Eorzea 的人們時，她也希望能以此為榮，親自把你迎為學生。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 贊特海爾 <small class="muted"> 利姆薩·羅敏薩下層甲板（X:11.4, Y:10.9)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="lord-of-the-whorl.html">決戰利姆薩·羅敏薩</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="through-the-maelstrom.html">混沌的漩渦</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
