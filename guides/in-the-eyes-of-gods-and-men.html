    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>At Camp Dragonhead, Haurchefant speaks with fierce certainty. From the beginning, he says, he knew it could not be true that so many of House Haillenarte were heretics. At last, he believes you can expose these poisonous allegations for the lie they are and bring the travesty to an end.</p>
      <p>He tells you he must prepare a formal statement for the Holy See, but before he can do so, he sends you to Inquisitor Brigie. You are to deliver House Fortemps’s demand that Lord Francel’s trial be postponed until a full investigation can be conducted.</p>
      <p>Brigie receives the message with calm disbelief. She says it cannot be done—Inquisitor Guillaime presides over Lord Francel’s trial at Witchdrop even as you speak. And then, as if offering comfort, she adds that if Francel is truly innocent, he will walk in Halone’s halls with Ishgard’s fallen heroes.</p>
      <p>When you bring this back, Haurchefant’s shock turns to anger. They have taken Francel to Witchdrop, he says—madness. Guillaime has no sufficient grounds to subject him to that manner of trial. Haurchefant refuses to stand by and allow an innocent man to die. He dispatches you and one of his knights to Witchdrop to forestall the proceedings until he can arrive and petition Guillaime in person, and he gives you a single, urgent order: do whatever you must to keep Lord Francel alive.</p>
      <p>At Witchdrop, you meet Hourlinet, who confirms Francel still lives. He says you must try to reason with the inquisitor—but if the guards judge you a threat, you must be prepared to defend yourselves, while ensuring no harm comes to the inquisitor.</p>
      <p>The trial is already underway. Guillaime names Francel in full and declares him accused of heresy against the Holy See, asking what he would say in his defense. Francel cries out to those gathered that the charges are false. His line has ever opposed the Dravanians, he insists, and he is no different. Since the birth of the nation, his house has gladly shed blood in service to the Holy See—condemn him, and you will strike a blow for Ishgard’s enemies.</p>
      <p>Guillaime answers that it is for Halone to judge whether he speaks the truth. Francel is commanded to prove his innocence in the eyes of gods and men: he must leap from the cliff and entrust his fate to the Fury. The righteous will take their place in Halone’s halls, Guillaime declares, while the wicked will reveal their drachen forms and be put to the sword.</p>
      <p>Hourlinet steps forward in the name of House Fortemps and begs the inquisitor to stay his hand. He announces you have come on behalf of Haurchefant, and that evidence has been uncovered suggesting the charges lack merit. You request the proceedings be suspended until the facts can be fully reexamined.</p>
      <p>Guillaime rejects the plea. He accuses Haurchefant of letting personal ties cloud his judgment, and declares that to interfere in legal proceedings sanctioned by the Holy See is intolerable. Worse still, he claims that to defy an inquisitor is itself heresy—punishable by only one sentence. Hourlinet braces you for what comes next: you must hold them until Haurchefant arrives, and remember—no harm can come to the inquisitor.</p>
      <p>Guillaime orders his men to seize you. In the clash that follows, an opposing knight refuses to yield and declares he serves a higher power. In the midst of the struggle, Hourlinet spots Haurchefant arriving, and Haurchefant demands that arms be laid down in the name of House Fortemps. Yet the battle twists into something worse when a wyvern appears—something Haurchefant says should not have happened, for there were no reports of Dravanian activity. Guillaime seizes upon it as proof of treachery, while the defiant knight rages that this will not be forgotten. Before the fighting ends, Haurchefant falters, pained and breathless, insisting it cannot end this way.</p>
      <p>When order is finally forced back into the moment, Haurchefant states that he does not intend to defy the archbishop’s will. But he believes this trial—like many others—has been orchestrated by enemies of House Haillenarte, who have used the inquisitor and his fellows to sow discord and set brother against brother so that Ishgard may tear itself apart.</p>
      <p>Guillaime dismisses it as desperate imagining and demands proof. Haurchefant’s gaze catches on what the fallen knight carried: a draconian rosary. By the Fury, he realizes—the knight who refused to yield was the one who summoned the wyvern.</p>
      <p>Guillaime’s certainty wavers. A heretic among the Temple Knights, he admits, carries grave implications. Haurchefant’s claims appear to have merit, and Guillaime withdraws his charges against Lord Francel pending further investigation. Before the matter ends, he reminds you not to lose sight of what first brought you to Coerthas: you must locate your errant airship—and use it.</p>
      <p>Freed from the brink, Francel turns to Haurchefant, unable to find words for his gratitude, and asks why Haurchefant would risk his reputation to save him. Haurchefant answers simply: because he knows him. Francel is too loyal to betray Ishgard, and too devout to question a sentence handed down—had you been any slower, Francel would have leapt of his own free will. Francel admits he would have done whatever it took to redeem House Haillenarte. Haurchefant gives thanks to Halone that it did not come to that, and urges you to leave Witchdrop and return to Camp Dragonhead once you have recovered.</p>
      <p>Later, at Camp Dragonhead, Haurchefant greets you warmly and says you look well. He calls it a pleasure to have fought beside so fearless and skillful a warrior. Without you, he says, Francel would surely have died defending his house’s honor—and Haurchefant himself might have perished at the hands of a heretic and his wyvern. House Fortemps and House Haillenarte will never forget your service. And then, with the crisis momentarily stayed, he turns you back to the matter that started it all: the missing Enterprise.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'異端は魔女の谷に消ゆ',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>キャンプ・ドラゴンヘッドで、オルシュファンは強い確信をもって言う。最初から、アインハルト家の者がこれほど大勢、異端であるはずがないと分かっていたのだと。ついに、この毒々しい告発が虚偽であることを示し、この茶番に終止符を打てる、と。</p>
      <p>彼は、これまでの経緯について聖座へ正式な声明を用意せねばならないと言い、あなたにはその間に審問官ブリジーのもとへ赴くよう命じる。フォルタン家として――いや、フォルタン家が要求する。フランセル卿の審問は、全面的な再調査が行われるまで延期せよ、と伝えるのだ。</p>
      <p>審問官ブリジーは、その申し出に戸惑いを見せながらも、できないと言う。審問官ギイェームは今この瞬間にも、ウィッチドロップにてフランセル卿の審問を執り行っているのだと。彼女は恐れるなと続け、もし卿が真に潔白なら、イシュガルドの英雄たちとともにハルオーネの御許を歩むだろうと告げた。</p>
      <p>その報せを聞いたオルシュファンは、驚愕ののち怒りを露わにする。フランセル卿をウィッチドロップへ連行しただと――狂気だ、と。ギイェームには、あの形の審問に付すだけの十分な根拠がない。彼は、無実の男が死ぬのを黙って見過ごすつもりはないと言い切る。あなたと配下の騎士ひとりをウィッチドロップへ送り、彼が到着して自らギイェームへ嘆願できるまで、審問の進行を食い止めよと命じる。そして最後に、どんな手段を用いてでもフランセル卿を生かせ、と。</p>
      <p>ウィッチドロップであなたはホーリネと合流し、卿がまだ生きていることを知らされる。まず審問官と話し合うべきだが、衛兵が敵と見なすなら戦う覚悟も必要だ、と彼は言う。だが同時に、審問官に危害を加えてはならないとも釘を刺した。</p>
      <p>審問はすでに始まっている。ギイェームはフランセル卿を名指しし、聖座への異端の罪で告発すると宣言して、弁明があるかと問う。フランセル卿は叫ぶ。告発は虚偽だ、自分の血筋は常にドラヴァニアと戦い、自分も同じだと。建国以来、聖座のために喜んで血を流してきたのだ、ここで自分を断罪すればイシュガルドの敵を利することになる、と。</p>
      <p>ギイェームは、真実を裁くのはハルオーネだと言い放つ。そして神と人の前で潔白を証明せよとして、断崖から身を投げ、運命をハルオーネに委ねよと命じる。正しき者はハルオーネの御許に迎えられ、邪なる者はドラゴンの姿を現して剣に倒れるのだ、と。</p>
      <p>ホーリネはフォルタン家の名において制止を願い出る。オルシュファンの命により来たこと、告発が根拠を欠く可能性を示す証拠が見つかったことを告げ、事実の再検証が終わるまで審問を停止してほしいと、丁重に求めた。</p>
      <p>だがギイェームは退ける。オルシュファンは被告との私的な関係によって判断を曇らせたのだと言い、聖座が認めた法の手続きに介入するなど許されぬと断じる。さらに、審問官に逆らうことは異端に等しい――その罪に待つ罰はただひとつだ、と。ホーリネはあなたに叫ぶ。オルシュファンが来るまで持ちこたえよ、そして審問官に危害を加えるな、と。</p>
      <p>ギイェームは、あなたたちを取り押さえよと命じる。争いの中で、ある騎士は屈せず、自分はより高き力に仕えるのだと叫ぶ。やがてホーリネが、オルシュファンの到着を告げる。オルシュファンはフォルタン家の名において武器を捨てよと命じるが、戦いはさらに悪化し、ワイバーンが姿を現す。オルシュファンは、邪竜軍の動きなど報告されていなかったはずだと驚く。ギイェームはそれを、味方を呼び寄せた裏切りの証だと糾弾し、屈しない騎士はこの屈辱は忘れぬと吐き捨てる。戦いが収束する間際、オルシュファンは傷を負い、こんな終わり方は許されぬと呻いた。</p>
      <p>騒乱ののち、オルシュファンは言う。大司教の意志に背くつもりはない。だがこの審問は――そして同様のものは他にもあるのだろう――アインハルト家の敵が仕組んだものだ。審問官とその配下を利用して不和を撒き、兄弟同士を争わせ、内側から引き裂こうとしているのだ、と。</p>
      <p>ギイェームはそれを追い詰められた者の妄想だと切り捨て、証拠を求める。するとオルシュファンは、倒れた騎士が携えていたものに気づく。ドラゴン教のロザリオだ。ハルオーネの御名にかけて――屈しなかった騎士こそが、ワイバーンを呼び出したのだ、と。</p>
      <p>ギイェームは、神殿騎士団に異端が紛れていた事実の重大さを認める。オルシュファンの主張には根拠があるようだとして、追加調査が終わるまでフランセル卿への告発を取り下げると告げた。そして最後に、あなたへ念を押す。そもそもあなたがクルザスへ来た目的を見失うな――迷い出た飛空艇を見つけ出し、使うのだ、と。</p>
      <p>フランセル卿はオルシュファンに礼を述べ、なぜ自分のために評判を危険にさらしたのかと問う。オルシュファンは答える。お前を知っているからだ、と。お前はイシュガルドを裏切るほど不忠ではなく、裁きを疑うほど不敬でもない。遅れていたなら、お前は自らの意思で飛び降りていたはずだ、と。フランセル卿は、アインハルト家を贖うためなら何でもしただろうと認める。オルシュファンは、それが現実にならずに済んだことをハルオーネに感謝し、ここを去ろうと告げる。あなたには、回復したらキャンプ・ドラゴンヘッドへ来るよう促した。</p>
      <p>後日、キャンプ・ドラゴンヘッドでオルシュファンはあなたの無事を喜び、共に戦えたことを誇りとして語る。あなたがいなければ、フランセル卿は家名のために命を落とし、自分もまた異端者とそのワイバーンに斃れていたかもしれない。フォルタン家とアインハルト家は、その働きを決して忘れない。そして彼は、いよいよ本来の目的――行方知れずのエンタープライズの件へ話を戻した。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    </div>`

    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Camp Dragonhead，Haurchefant 帶著不容置疑的語氣說：從一開始，他就知道不可能有那麼多 House Haillenarte 的人是異端。如今，終於能戳破那些帶毒的指控，讓這場鬧劇走向終結。</p>
      <p>他表示自己需要為這些新發展準備一份正式聲明，呈交 Holy See；在此之前，他要你先去找 Inquisitor Brigie，替他轉達 House Fortemps 的立場——不是請求，而是要求：Lord Francel 的審判必須延期，直到完成全面調查為止。</p>
      <p>Brigie 聽完後皺起眉頭，反問 Haurchefant 竟要 inquisitors 做到哪一步。然而她很快就說這不可能：Inquisitor Guillaime 此刻正在 Witchdrop 主持 Lord Francel 的審判。她接著以一種近乎安撫的語氣補上一句——別害怕，如果 Lord Francel 真是清白的，他會在 Halone 的殿堂裡與 Ishgard 的英魂同行。</p>
      <p>你把消息帶回去後，Haurchefant 震怒地說：他們把 Francel 帶去 Witchdrop 了？這簡直是瘋狂。那名 inquisitor 根本沒有足夠理由，讓 Francel 接受那種審判方式。Haurchefant 表明自己絕不會坐視一個無辜之人走向死亡。他命你與他的一名騎士先行前往 Witchdrop，設法拖住審判的進行，直到他能趕到現場、親自向 Guillaime 申訴為止。最後，他只給你一句命令：無論如何，都要讓 Lord Francel 活下來。</p>
      <p>在 Witchdrop，你見到 Hourlinet。他確認 Francel 仍然活著，並提醒你：你們必須先試著與 inquisitor 講理；但若對方的守衛把你們視為威脅，你們也得準備自衛。同時，他再三叮囑——inquisitor 不能受到任何傷害。</p>
      <p>審判早已開始。Guillaime 以全名點出 Francel，宣告他被控對 Holy See 犯下異端之罪，並問他是否有任何辯護。Francel 高聲呼喊，要求在場的人聽他說——這些指控是假的。他說自己的血脈世世代代反抗 Dravanians，他也不例外；自建國以來，他們甘願為 Holy See 流血效命。若你們定他的罪，就是在替 Ishgard 的敵人出手。</p>
      <p>Guillaime 冷冷回應，是否為真由 Halone 裁決。他命 Francel 在眾神與眾人面前證明清白：從懸崖一躍而下，把命運交給 Fury。正直之人將進入 Halone 的殿堂，而邪惡之人則會顯露 drachen 之形，並被刀劍處決。</p>
      <p>Hourlinet 站出來，以 House Fortemps 之名請求他住手。他說你們奉 Haurchefant 之命而來，Haurchefant 已找到能顯示指控缺乏根據的證據；你們恭請暫停審判程序，直到事實得以全面重新查證。</p>
      <p>Guillaime 直接拒絕，並指責 Haurchefant 因私交而判斷失準。他表示，干預由 Holy See 批准的法律程序不可容忍；更進一步，他宣稱違抗 inquisitor 的意志就是異端，而異端之罪只有一種刑罰。Hourlinet 立刻提醒你：必須撐到 Haurchefant 抵達——而且記住，inquisitor 絕不能受傷。</p>
      <p>Guillaime 下令立刻逮捕你們。衝突之中，有一名騎士拒不投降，宣稱自己侍奉更高的力量。混戰持續時，Hourlinet 喊出 Haurchefant 已經到了；Haurchefant 也以 House Fortemps 之名命令眾人放下武器。就在此刻，情勢惡化到難以收拾——一頭 wyvern 現身。Haurchefant 驚呼不可能，因為根本沒有任何 Dravanian 活動的通報；Guillaime 卻把這視為你們呼喚同盟的證據，認定背叛終於暴露。那名頑抗的騎士怒吼著這一切不會被遺忘，並在崩潰的局面裡喊出眼下還有更緊要的事。戰鬥結束前，Haurchefant 受了傷，痛苦地說不能就這樣結束。</p>
      <p>局勢暫告平息後，Haurchefant 表示你們無意違抗 archbishop 的意志；但他相信這場審判——以及他所懷疑的其他審判——都是 House Haillenarte 的敵人所策劃。他們利用 inquisitor 與其同伴散播不和，讓兄弟彼此敵對，逼著 Ishgard 從內部撕裂。</p>
      <p>Guillaime 冷冷回應，稱那只是走投無路之人的妄想，並要求證據。就在此時，Haurchefant 注意到倒下之人身上的物件——一串 draconian rosary。他立刻明白：拒不投降的那名騎士，正是召喚 wyvern 的人。</p>
      <p>Guillaime 的態度終於動搖。他承認，Temple Knights 的隊伍裡竟有異端，影響極其嚴重；Haurchefant 的主張看來確有其根據。於是他宣布：在進一步調查之前，將撤回對 Lord Francel 的指控。隨後他轉向你，提醒你別忘了自己來到 Coerthas 的初衷——去找到迷失的飛空艇，並使用它。</p>
      <p>Francel 終於得以喘息，他向 Haurchefant 表達感激，卻也困惑：為何要冒著損害名聲的風險來救他？Haurchefant 回答得很直接——因為他了解 Francel。Francel 太忠誠，不可能背叛 Ishgard；也太虔誠，不會質疑自己的判決。若你們再慢一步，Francel 早就會憑自己的意志跳下去。Francel 低聲承認，為了挽回 House Haillenarte，他願意做任何事。Haurchefant 感謝 Halone 事情沒有走到那一步，並要你們離開 Witchdrop；等你恢復後，回 Camp Dragonhead 找他。</p>
      <p>之後在 Camp Dragonhead，Haurchefant 望著你說你氣色不錯，並稱能與你並肩作戰是種榮幸。他說若沒有你，Francel 必定會為了家族名譽而死，而他自己也可能死在異端與其 wyvern 之手。House Fortemps 與 House Haillenarte 都不會忘記你的功績。接著，他把話題帶回最初的目的——你失蹤的 Enterprise。</p>
    </div>

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
