    story:`<div class="clamp" data-collapsed="true">
<p>Shigure suddenly pieces it together: the Confederacy would be the one group with every reason to track even the smallest skiffs in the Ruby Sea, because their survival depends on collecting payment for “safe passage”—the Ruby Tithe. He insists you head to Sakazuki, where anyone who doesn’t want to be raided must first go to make the proper overtures. The moment you arrive, you witness how quickly “reasonable” turns into extortion, and Shigure is left pleading that he’s no wealthy merchant at all.</p>
<p>When you question Ihaki, he snarls that the only true bandits are those who refuse to pay the tithe—like a man he spotted not long ago. He didn’t stop the trespasser, he says, because the man was dead: standing motionless in his skiff, ignoring waves and water alike, a corpse simply drifting toward the Isle of Bekko. Ihaki wants nothing to do with such an omen and tells you to follow the dead man if you’re willing to consort with the dead. Shigure scoffs—until it clicks: the “dead man” must have been The Eorzean Gentleman, mistaken for a corpse. That means the skiff belonged to the Kugane Wolf Burglar.</p>
<p>You race to the Isle of Bekko, spot what looks like a wolfish figure, and Shigure charges in—only to freeze mid-triumph. This isn’t the burglar at all, but a “Gentle Dead Man,” calm and articulate, insisting his soul bears no burdens and that death gave him more purpose and brotherhood than life ever did. He recognizes you as comrades of “Master Zombibrand” and explains why he’s here: he followed rumors of an undead isle deep in the Sirensong Sea, found only inert skeletons, and then—lost and far from home—felt a familiar pull in his rotting flesh. The call of his leader’s aether drew him across the sea, and it led him here.</p>
<p>Nashu latches onto the one part that matters: if a Gentle Dead Man felt that pull, then the inspector—and the thief who stole him—must be somewhere on this island. The undead emissary agrees without hesitation and leads you onward with cheerful menace, explaining that his wolfish outfit was a gift from a traveling artist meant to soften his terrifying features. Shigure admits none of it makes sense, but he’s willing to trust the misshapen undead wolfman if it brings you to the culprit.</p>
<p>It works. You corner the Wolf Burglar at last, and Nashu prepares her dango-style “Delights” to shock the inspector back to himself—only for Hildibrand, still half-statue and panicking, to scream about bombs while the thief shrieks back at him to get rid of them. In the chaos, you choose to save the inspector, and the Wolf Burglar takes the opening to escape—hurling himself down and vanishing with a taunt about how stealing such a conspicuous “statue” was his own mistake. The inspector snaps fully awake, instantly turns his attention to “honor and justice and a hard-boiled egg,” and sprints off the moment he catches the scent of a new case.</p>
<p>That “case” is a Wayward Qiqirn sailor who washed ashore, frantic and angry that everyone calls him a “ratman.” He explains that he and his friend—both sailors for the East Aldenard Trading Company—were lured away in Kugane by a “goodly merchant” offering a feast, then separated in twisting alleys until bad men seized his friend, gagged him, and threw a bag over his head. Shigure finally sees the pattern: the same broker who sold a “ratman” at auction, the same fraud who profits off foreign bodies and faraway myths.</p>
<p>You return to Kugane to confront him, and when the Solemn Sekiseigumi arrives, the man’s careful mask collapses—proof has already been gathering, and the Wolf Burglar only delayed the inevitable. Shigure is praised for helping bring the charlatan down, but reprimanded for reckless vigilante pursuit; he admits he’s only a ronin who chased glory to earn a place among the Sekiseigumi. Hildibrand, utterly undeterred, vows to help scour creation for the Kugane Wolf Burglar—starting immediately—and Shigure quietly turns to you, trusting that cooler heads like yours and his will be what finally wins this hunt.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>シギューははっとして思い至る。紅玉海で小舟の出入りまで把握しているはずなのは、紅玉海賊衆にほかならない。彼らは通行の安全と引き換えに金を徴収して生き延びており、その名も「紅玉の通行料」だという。だから向かうべきはサカズキ――襲撃を避けたい旅人は、まずそこで必要な手順を踏まねばならない。到着するやいなや、その「手順」が脅しに限りなく近い現実を突きつけられ、シギューは自分が富豪ではないと必死に訴える羽目になる。</p>
<p>そこへイハキが現れ、舟の賊を探しているのかと問う。彼に言わせれば、賊とは通行料を払わぬ者どもであり、つい先ほども一人見かけたという。止めなかった理由は明快だった。そいつは死んでいた――小舟の上で微動だにせず、波も水も意に介さず、死体のまま漂っていたのだ。死者に脅しは通じぬ、とイハキは吐き捨て、気味の悪い凶兆を忘れたいから自分はここに残ると言う。だがシギューは途中で言葉を飲み込む。「死体」と見間違えられたのは、あの「エオルゼア紳士」だったのではないか。ならば、その舟こそが「クガネの狼賊」のものだ。</p>
<p>ベッコ島へ急ぐと、耳か角のように見える飾りをつけた「狼」の姿が目に入る。シギューは勝利を確信して斬り込むが、直後に顔色を変える。相手は狼賊ではなく「紳士な死者」だった。魂の重荷に縛られた怨霊などではなく、死によってこそ生より解放と目的、そして兄弟愛を得たのだと、彼は落ち着いて語る。さらに彼は、あなたたちを「ゾンビブランド様」の仲間だと見抜き、自分がここまで来た理由を明かす。セイレーン海に不死者の群れがいる島があるという噂を聞き、使者として向かったが、そこにあったのは動かぬ骸骨ばかり。途方に暮れていたそのとき、腐りかけた肉体に懐かしい脈動が走った――指導者のエーテルに引かれ、辿り着いた先がこの島だったのだという。</p>
<p>ナシュはその話を即座に「今必要な一点」に結びつける。紳士な死者が引きを感じたのなら、ヒルディブランドと、彼をさらった狼賊も、この島のどこかにいるはずだ。彼女が導きを頼むと、紳士な死者は快諾し、軽妙な調子で先導を買って出る。彼の狼じみた装いは、旅する芸術家から贈られたもので、恐ろしい外見を和らげるために作られたのだと誇らしげに語る。シギューは何一つ腑に落ちないまま、だが目的のためならと、その案内役を全面的に信じると宣言する。</p>
<p>案内の先で、ついに狼賊を追い詰める。ナシュは団子仕立ての「ナシュ特製菓子」を構え、凍りついたヒルディブランドを正気に戻そうとするが、本人は半ば彫像のまま怯えて叫び、狼賊もまた爆弾に悲鳴を上げて命じる。混乱の中、あなたはヒルディブランドを助けることを選び、狼賊は隙を突いて逃走する。目立つ「彫像」を盗もうとしたのが失敗だった、と捨て台詞を残し、彼は落下して姿を消す。ヒルディブランドはすっかり元通りになったかと思う間もなく、「名誉と正義とゆで卵」のために走り出し、次なる事件の匂いを嗅ぎつけたと言って止まらない。</p>
<p>その「事件」とは、岸に流れ着いたキキルンの船乗りだった。彼は「鼠人」呼ばわりに憤り、キキルンだと訂正しながら、友がクガネでさらわれたと訴える。東アルデナード商会の船員として荷下ろしに来たところ、「善良そうな商人」にご馳走を持ちかけられ、迷路のような路地で引き離され、友は口を塞がれ頭に袋を被せられて連れ去られたのだという。シギューはここで確信する。競りで「鼠人」を売り物にした口達者な仲買人こそ黒幕であり、異国の者たちをさらって品として並べている可能性が高い。</p>
<p>あなたたちはクガネへ戻り仲買人を問い詰めるが、厳めしい赤誠組が現れ、狼賊の介入は時間稼ぎに過ぎなかったと告げて男を拘束する。シギューは功を称えられる一方、独断で追跡した無謀さを咎められ、赤誠組入りは見送られる。彼は自分がただの浪人であり、夢のために狼賊を追っていたのだと告白する。ヒルディブランドは意にも介さず、今この瞬間から「クガネの狼賊」を追って世界を捜索すると宣言し、シギューはあなたにだけ静かに語りかける――最後に勝つのは情熱ではなく、あなたと自分のような冷静さだ、と。</p>
</div>

    acq:`<div class="stack">

  ZH:{

    pageTitle:'被盯上的商品',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
<p>Shigure 忽然恍然大悟：在 Ruby Sea 這種地方，連最小的船隻出入都得記上一筆的人，最可能就是 Confederacy。因為他們的生存全靠收取「保護航行」的費用——也就是 Ruby Tithe。於是他堅持你們立刻去 Sakazuki：任何不想被搶、不想被洗劫的旅人，都得先去那裡「打點」好一切。你們一到，就親眼看見這套規矩有多像明搶；Shigure 忙著求對方講點道理，因為他根本不是什麼富商。</p>
<p>你們找到 Ihaki 問話，他一臉不耐，說在他眼裡真正的「強盜」是那些拒絕付 Ruby Tithe 的人——像他不久前看見的那個傢伙。你問他為什麼不攔，他卻理直氣壯：因為那人是「死人」。那人站在小舟上動也不動，對風浪與海水毫無反應，就像一具屍體在漂流。Ihaki 說自己才不會跟死人打交道；若你們真想追，就跟去 Isle of Bekko，他會留在這裡把那個不祥的畫面忘掉。Shigure 聽到一半先是嗤之以鼻，下一秒卻猛地反應過來：那人之所以被當成屍體，是因為他把 The Eorzean Gentleman 誤認成死人了——那艘船，根本就是 Kugane Wolf Burglar 的船。</p>
<p>你們追到 Isle of Bekko，很快就看到一個「像狼一樣」的身影：大耳朵、長而蓬鬆的尾巴。Shigure 以為終於抓到人，衝上去才發現完全不是那回事。眼前這個不是 Wolf Burglar，而是你們認得的 Gentle Dead Man——說話比活人還彬彬有禮。他否認自己是什麼被怨念束縛的亡靈，反而平靜地說：死亡讓他得到比生前更多的解放、意義與兄弟情。更離奇的是，他居然認出你們是 Master Zombibrand 的同伴，還主動解釋自己為何遠離 Eorzea：他聽說 Sirensong Sea 深處有座島住著一群和他相似的不死者，於是被派去當使者，結果只找到一堆毫無「不死」之力的骸骨。任務失敗又離家太遠，他不知該往哪走；就在那時，他在腐朽的身體裡感到一陣熟悉的牽引——那是領袖的 aether 在呼喚他，他便一路追著那道感覺來到這裡。</p>
<p>Nashu 立刻抓住重點：如果 Gentle Dead Man 都能感覺到那股牽引，那就表示 Inspector Hildibrand——還有把他偷走的竊賊——一定就在這座島上。她追問對方能不能帶路，Gentle Dead Man 乾脆俐落地答應，還興沖沖說自己一定能引你們找到「領袖」。他順口提起那身狼裝：那是旅途中遇到的藝術家送的禮物，因為他說自己很難跟一般人正常交談，對方就替他做了這套「能讓人不那麼害怕」的外表。Shigure 聽得一頭霧水，卻也只能硬著頭皮相信：只要這個怪異的不死狼男能帶你們追上竊賊，他願意全力賭一次。</p>
<p>結果真的追上了。你們終於把 Wolf Burglar 逼到角落，Nashu 立刻端出她的「Nashu’s Delight」——還特別用 dango 的方式準備，打算把 Inspector Hildibrand 從那種半彫像的狀態硬生生拉回現實。Hildibrand 卻對著一堆炸彈尖叫，竊賊也在旁邊暴跳如雷，罵他是蠢雕像、要他快把炸彈丟掉，否則會一起被炸上天。混亂之中，你選擇先救 Hildibrand；Wolf Burglar 抓住空檔直接逃走，還丟下一句嘲諷：偷這麼顯眼的「雕像」差點把自己送進牢裡，算他倒楣。你們眼睜睜看著他縱身一躍消失，而 Hildibrand 總算恢復正常，下一秒就像什麼都沒學到一樣，立刻又被「新案件的氣味」牽著跑，嘴裡喊著榮譽、正義，還有那顆硬煮蛋。</p>
<p>那個「新案件」是一名漂到岸邊的 Wayward Qiqirn。這名 Qiqirn 氣急敗壞地糾正 Shigure：他不是什麼「鼠人」，別再拿「幸運的肉」那套怪談來套他。他說自己和朋友是 East Aldenard Trading Company 的船員，來 Kugane 卸貨時遇到一位「看起來很正派的商人」請他們吃大餐，結果在彎彎繞繞的巷子裡被分開，朋友被壞人摀嘴、套袋、抓走；他拚命反抗才逃出來，最後跳進海裡。Shigure 立刻把線串起來：拍賣會上那個油嘴滑舌的主持人，先賣「ratman」又想賣你們的同伴，現在還可能在抓外地人當貨品。</p>
<p>你們立刻返回 Kugane 當面質問他；對方還想裝傻、還想擺出「你們沒權」的姿態，但 Sekiseigumi 已經盯他很久了——Wolf Burglar 只是把結局延後，證據早已足夠。Shigure 因為協助破案得到稱讚，卻也被嚴厲斥責：他明明在場，卻沒第一時間通報 Sekiseigumi，反而單獨追捕、急於求功，這樣的性格不適合加入。Shigure 低頭承認自己只是個 ronin：他來 Kugane 是為了成為 Sekiseigumi，卻被判定不夠格；後來走投無路，只能靠零工維生，才會想靠抓住那個專偷富商的大盜來證明自己。Hildibrand 聽完毫不猶豫，當場宣示要陪他搜遍天地、立刻開始追獵 Kugane Wolf Burglar；而 Shigure 最後看向你，語氣反而更慎重——他相信要抓到那個狡猾的對手，光靠衝動不夠，真正能撐到最後的，是你和他這種比較冷靜的腦袋。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
