<script>

const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:'A Manager’s Discernment',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Mumukko stops you and wastes no time getting to the point. Since your duties on this star are nearly finished, she assumes you have time to spare, and before long she introduces you to Phasingway, another project manager for the initiative. Together, the two of them explain that with Phaenna’s core development now complete, they have begun gathering feedback for a postmortem review. In the course of that work, however, they uncovered a more immediate concern: Commandingway and the magitek specialist Justa have become suspiciously absorbed in secret new designs, whispering together with barely contained excitement while refusing to tell management what they are planning.</p>
      <p>Because the two of them trust you, Mumukko and Phasingway ask you to approach them in their place and learn what they are plotting, all without revealing that you were sent. When you find Commandingway and Justa, they are more than happy to speak. Far from working on modest refinements, they have let their imaginations run wild, talking of reinventing the fleet’s machinery with aetherial sabers, transformations, fusions, and enormous drill-armed constructs. Justa is so swept up in the vision that she is already thinking about what components would be needed to begin.</p>
      <p>Before the matter can go any further, Mumukko and Phasingway step in and put an end to it. Mumukko is appalled that they have drifted so far from the initiative’s actual needs, and demands to know whether they abandoned all common sense the moment they were given the assignment. Justa insists that the work began with far more practical ideas, such as extending the cranes and improving scaffold installation. Seizing on that, Mumukko turns to you and asks for a sensible direction they can pursue instead, so that the pair can be set back onto useful work before their enthusiasm carries them off again.</p>
      <p>With your suggestion, the conversation is forced back toward real necessity. Mumukko agrees that if Commandingway and Justa submit plans that truly answer the initiative’s needs, they may continue working on the machinery—but only if they keep sight of the common goal and the limits imposed upon them. She then takes Commandingway away for a stern talk, while Justa, suddenly chastened, admits she let herself get carried away in the excitement of building on this new world. Even so, she asks one favor of you: to go and check on Commandingway afterward, out of concern that Mumukko’s lecture may not end quickly.</p>
      <p>When you do, you find Commandingway no longer blustering, but speaking with unusual honesty. He admits that he lost control of his ambitions. Once, his duty had been to stand at the helm and lead others into the unknown, and had the exodus ever come to pass, he would have guided a group to build a new home on some distant star. Even the great body Hydaelyn gave him had made him feel meant for that role. Now, within the initiative, he had found something that felt close to that purpose again. Yet he also understands that being a leader is not simply about stirring others to action, but about making sure that action serves the right end. Phasingway urges him to remember that and set a better example from now on, and Commandingway promises that he will. As the matter settles, Mumukko warns you to stay alert. Phaenna may be nearly done, but already everyone is straining toward what comes next—and before long, she says, a very important guest will be arriving from Etheirys by way of Sinus Ardorum.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">

  JP:{
    langLabel:'JP',
    pageTitle:'プロジェクトマネージャーの明察なお仕事',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ムムッコはあなたを呼び止めると、遠回しな言い方をせず、すぐに本題へ入る。この星での務めもほとんど片づいたはずだから、少しくらい時間はあるだろう、と言って、彼女はコスモエクスプローラー計画のもうひとりの管理役であるフェイジングウェイを紹介する。ふたりは、パエンナにおける中核的な開発がひと段落した今、事後検証のために各所から意見を集めているのだと説明する。ところが、その過程で見過ごせない問題が浮かび上がった。コマンディングウェイと魔導技術担当のジャスタが、管理側に詳細を隠したまま、新たな設計について異様な熱気を帯びて語り合っているというのだ。</p>
      <p>ふたりはあなたなら警戒されずに話を聞き出せると考え、事情を探ってほしいと頼んでくる。もちろん、自分たちに頼まれたとは悟られてはならない。そうしてコマンディングウェイとジャスタのもとへ向かうと、当人たちは驚くほどあっさりと構想を語り始める。だがその内容は、機材の機能拡張という範囲を大きく飛び越えていた。エーテルの剣を備えた機体、変形機構、さらには複数機の合体、巨大なドリルアームまで飛び出し、ふたりの想像はすでに暴走寸前だった。ジャスタは、その構想を実現するために必要な部品のことまで考え始めている。</p>
      <p>そこへムムッコとフェイジングウェイが姿を現し、事態は一気に収拾へ向かう。ムムッコは、計画に本当に必要なものを見失っていることに呆れ、そんな派手な機構がいったい何の役に立つのかと厳しく問いただす。ジャスタは慌てて、最初はもっと実務的な案だったのだと弁明する。たとえばクレーンを伸縮可能にする機構や、足場設置を補助する機能など、当初は確かに現場に役立つ改良から始まっていたのだという。そこでムムッコはあなたに視線を向け、今すぐこのふたりを現実的で有用な課題へ引き戻すため、まともな提案を示してほしいと求める。</p>
      <p>あなたの提案によって、話はようやく本来の方向へと戻される。ムムッコは、コマンディングウェイとジャスタが計画の実情に即した案をまとめるのであれば、機材開発の継続を認めると告げる。ただし、情熱に流されて共通の目的や予算を見失うことは、二度と許されない。そう言い残し、彼女はコマンディングウェイを連れて厳しい話し合いの場へ向かう。一方のジャスタは、すっかり熱が冷めた様子で、自分も興奮のあまり分別を失っていたと認める。それでも、ムムッコの説教が長引きすぎていないか心配だから、あとでコマンディングウェイの様子を見に行ってほしいとあなたに頼む。</p>
      <p>その後、あなたが向かった先で、コマンディングウェイは先ほどまでとは違う、率直な言葉を口にする。自分は確かに暴走していたのだと認めたうえで、かつて未知へ向かう仲間たちを率いる役目に強い誇りを抱いていたことを語る。もし脱出計画が実現していたなら、新たな星で新しい故郷を築く隊を導くはずだった。ハイデリンに与えられた大きな身体さえ、そのためのものだと思っていたという。だからこそ、コスモエクスプローラー計画の中で再び指揮を執る立場を得られたことが、彼にとっては大きな意味を持っていたのだ。だが人を鼓舞することと、何のために鼓舞するのかを見失わないことは別だと、彼もようやく理解する。フェイジングウェイは、そのことを忘れず、今後はよりよい手本となるよう諭し、コマンディングウェイも素直にそれを受け入れる。騒ぎがようやく収まると、ムムッコはあなたに油断しないよう告げる。パエンナでの仕事は終わりかけていても、皆の心はすでに次の星へ向かって落ち着かない。そして近いうちに、エーテリスから嘆きの海を経て、この地へ極めて重要な客人がやって来るのだと、彼女は意味ありげに告げるのだった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ムムッコ　惑星パエンナ <small class="muted">(X:28.4, Y:12.7)</small></div>
    </div>`,
    unlockq:`<div class="stack">

      <div class="row"><a class="link" href="a-managers-patience.html">プロジェクトマネージャーの小粋なお仕事</a></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="a-managers-delegation.html">プロジェクトマネージャーの意義あるお仕事</a></div>
    </div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'經理的洞察力',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Mumukko 叫住你，開門見山地表示，既然你在這顆星球上的任務幾乎都已經完成，那麼現在應該多少有些空檔才對。接著，她把同樣負責這項計畫管理工作的 Phasingway 介紹給你。兩人告訴你，隨著 Phaenna 的核心開發大致告一段落，他們最近正忙著蒐集各方意見，準備進行事後檢討。可就在這個過程裡，他們察覺到另一件更需要立刻處理的問題——計畫領導者 Commandingway 與魔導機械專家 Justa 似乎正背著管理方偷偷研究新的設計，而且還興奮得近乎失控，卻始終不肯透露內容。</p>
      <p>因為那兩人平時和你共事，對你也比較信任，於是 Mumukko 與 Phasingway 便拜託你代替他們去探探口風，弄清楚他們到底在打什麼主意，同時還特別叮囑你，絕對不能讓對方知道是管理方叫你去問的。等你找到 Commandingway 與 Justa 時，他們果然毫不設防地說起自己的構想。只是，那些所謂的新設計早已遠遠超出原本擴充機械功能的範圍，變成了充滿誇張想像的藍圖——什麼乙太軍刀、變形機構、合體系統，甚至還有裝上巨大鑽頭手臂的機體。Justa 更是完全沉浸在那股熱情裡，連要從哪一種標準魔導挖掘機拆出零件來實現它們，都已經開始思考了。</p>
      <p>就在這時，Mumukko 與 Phasingway 終於現身，當場打斷了這場越說越失控的妄想。Mumukko 顯然已經忍耐到極限，直問他們是不是一接到任務，就立刻把最基本的常識也一起丟掉了。面對這番斥責，Justa 急忙辯解，說事情一開始其實還很正常，本來只是想替起重設備增加延伸功能，或是設計一些有助於架設鷹架的輔助機構而已。於是 Mumukko 立刻順勢把問題拋給你，希望你提出一個真正符合現場需求的方向，好讓這兩人立刻被拉回正軌，在熱情徹底失控之前，重新投入有用的工作。</p>
      <p>在你的提議之下，這場談話總算重新回到務實的方向。Mumukko 表示，只要 Commandingway 與 Justa 之後提交的是針對實際需求所做的設計方案，那麼她仍願意允許兩人繼續參與機械開發；但前提是，他們不能再因為自己的熱情而忘記整個計畫共同的目標，更不能忽視現實中的預算限制。說完之後，她便把 Commandingway 帶走，準備好好談談他這次的失控行為。至於 Justa，在那股狂熱冷卻下來之後，也終於承認自己確實是一時被這個地方帶來的可能性沖昏了頭。可即便如此，她還是忍不住拜託你稍後去看看 Commandingway，因為她實在有些擔心 Mumukko 的訓話會不會拖得太久。</p>
      <p>等你之後過去時，Commandingway 已經不再像先前那樣一味亢奮，而是難得坦白地說出了自己的心情。他承認，自己確實讓一切失了控。過去，他原本肩負的是站在最前方、帶領同伴邁向未知的責任；如果當年的大撤離真的發生，他本該率領一支隊伍，在新的星球上建立新的家園。就連 Hydaelyn 賦予他的巨大身軀，在他心裡也一直像是為了這份職責而存在。正因如此，如今能在這項計畫裡再次擔任領導者，對他來說意義非凡。只是他終於明白，所謂的領導，並不只是站得高、喊得響、激勵眾人前進而已，更重要的是要知道自己究竟正帶著大家走向什麼。Phasingway 要他牢牢記住這一點，往後務必要成為更好的榜樣，而 Commandingway 也認真地答應了。等這場風波總算平息下來，Mumukko 仍提醒你不要鬆懈。Phaenna 的工作雖然已接近尾聲，但所有人其實都早已開始把目光投向下一顆星球。她還透露，此刻正有一位極其重要的訪客，正從 Etheirys 經由 Sinus Ardorum 朝這裡趕來，而關於對方的詳細情況，之後她會再通知你。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 穆穆可　Phaenna <small class="muted">(X:28.4, Y:12.7)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-brightest-star.html">最耀眼的星辰</a></div>
      <div class="row"><a class="link" href="a-managers-patience.html">經理的耐心考驗</a></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="a-managers-delegation.html">經理的委派之道</a></div>
    </div>`

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
