<script>
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'The Unending War',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Ludovoix looks exasperated when he sees you again. He says you may take shelter within their walls if you insist, but orders you not to distract him while he is on duty—they are stretched thin already. Then his irritation sharpens into worry as he curses the absence of the knight he sent out on patrol; the man should have returned ages ago.</p>
      <p>After a tense beat, Ludovoix studies you and relents. If you truly wish to aid them, he tells you to search the wilds to the west for his missing man. You will know the knight by his uniform—the uniform of House Durendaire, as is Ludovoix’s own.</p>
      <p>Out in the western wilds, you find the knight down and unresponsive. The snow underfoot crunches closer—someone is still moving nearby—and when the moment passes, the battered man clings to life. He tells you that if not for you, they would have finished him off.</p>
      <p>With bitterness, the knight spits out his hatred for the “dragon-loving” ones and says death would have been a mercy they did not deserve. Then he admits what your rescue confirms for him: the rumors were not mistaken. Heretics are operating within this region, and he must immediately inform his superiors. With that grim resolve, he bids you farewell.</p>
      <p>When you return, Ludovoix is plainly surprised. He admits he did not expect you to find his knight—much less rescue him—and concedes he judged you too quickly. He speaks of pride and tradition, but adds that they are not without humility.</p>
      <p>Ludovoix says he will instruct the astrologians to entertain your request, though the final decision will be theirs. He tells you to proceed to the Observatorium and introduce yourself to Edmelle.</p>
      <p>Edmelle receives you as the one seeking the airship, and remarks how unorthodox this is, wondering what Ser Ludovoix could be thinking. She confirms that meticulous records are kept going back generations, but because the information is used to chart Dravanian activity, access is strictly controlled—one can never be too careful with heretics and their sympathizers. If you persist, she directs you to seek an audience with Chief Astrologian Forlemort above.</p>
      <p>Forlemort meets your request with a hard refusal. He demands to know if you understand what you are asking, warning that if their records fell into the wrong hands, it could change the course of a war that has raged for generations. This is no mere quarrel between southern nations, he insists—it is a holy crusade, and they are the arbiters of Halone’s will. He will not put his nation at risk to help a foreigner locate a missing airship.</p>
      <p>Before the exchange can end, Inquisitor Guillaime enters and pauses when he realizes you are there. Forlemort stiffens, suddenly deferential, and says you were just leaving. Guillaime recognizes you as the one who rescued House Durendaire’s knight from the heretics, and notes that they must feel indebted to you. He confirms you seek an airship last seen in Coerthas five years ago, then tells you the timing is inconvenient—much has changed in those years, and little for the better.</p>
      <p>Guillaime wishes you luck, but urges caution. In Coerthas, the snows can come quickly; one moment you may feel safe and sure of where you are, and the next you may be blind to dangers hidden by the blizzard. He advises you to focus on a single landmark while traveling and not to give in to temptation and stray from your course.</p>
      <p>After Guillaime’s warning, Forlemort acknowledges you aided House Durendaire and thanks you for it—yet he repeats that his decision stands. He cannot give you what you seek.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Ludovoix <small class="muted">Coerthas Central Highlands (X:24.9, Y:28.5)</small></div>

  JP:{
    langLabel:'日本語',
    pageTitle:'凍てつく大地',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ルドヴォワはあなたを見つけるなり、苛立ちを隠さずに言い放つ。どうしてもと言うなら壁の内側で雨風をしのぐことは許すが、勤務中の自分の邪魔はするな、と。こちらは手が足りていないのだ、と吐き捨てるように続ける。そして、哨戒に出した騎士が戻らないことに苛立ちをぶつける。あの騎士はとっくに帰還していなければならないのだ。</p>
      <p>しばし沈黙ののち、ルドヴォワはあなたを見直したように目を細める。もしまだ協力する気があるのなら、西の荒野へ行って行方不明の部下を探せと言う。見分けはつく、制服はデュランデール家のもの――ルドヴォワ自身と同じ紋章を掲げている、と。</p>
      <p>西の荒野であなたが見つけたのは、倒れ込んで反応のない騎士だった。雪を踏む足音が近づき、状況が切迫するなかで、あなたは彼を救い出す。息を取り戻した騎士は、あなたがいなければ自分はやられていたと告げる。</p>
      <p>騎士は唾を吐き、「竜を崇める連中」を罵る。死は連中にとって慈悲だったはずだが、あいつらはそんな慈悲に値しない、と。噂が間違いであってほしいと祈っていたが、最悪が確定したのだと言い、異端者がこの地域で動いていることを直ちに上官へ報告しなければならないと決意する。そして短く別れを告げる。</p>
      <p>あなたが戻ると、ルドヴォワは驚きを隠せない。見つけられるとは思っていなかった、まして救い出すとは、と率直に認め、自分の判断が早計だったと詫びる。自分たちは伝統に縛られた誇り高い民だが、謙虚さがないわけではない、とも言う。</p>
      <p>ルドヴォワは占星術師たちに、あなたの申し出を取り次ぐよう指示すると告げる。ただし、記録を閲覧させるかどうかは最終的に彼らの判断だ、と釘を刺す。そして天文観測所へ進み、エドメルに名乗るよう促す。</p>
      <p>エドメルは、飛空艇を探すために来たあなたを見て、これは実に異例だと眉をひそめる。ルドヴォワは何を考えているのか、と。彼女は、天文観測所には代々積み重ねてきた緻密な記録があると認めるが、それはドラヴァニアの動向を追うためのものであり、閲覧は厳しく管理されていると言う。異端者やその同調者が潜んでいる以上、用心しすぎるということはない。なお調べたいのなら、上階にいる主任占星術師フォルルモールトへ謁見せよと案内する。</p>
      <p>フォルルモールトは、あなたの願いを即座に拒絶する。自分が何を求めているのか分かっているのか、と声を荒らげ、記録が誤った手に渡れば、何世代にもわたって続く戦争の行方すら変えかねないと警告する。これは南方の国同士の小競り合いなどではない、聖なる十字軍であり、自分たちはハルオーネの意志を執行する者なのだ、と。よそ者のために国を危険にさらし、まして失われた飛空艇探しに協力などできるはずがない、と言い切る。</p>
      <p>そこへ審問官ギヨームが入ってきて、用件を告げようとしてあなたの存在に気づく。フォルルモールトは態度を硬くし、敬意を示して「今ちょうどお帰りいただくところです」と取り繕う。ギヨームはあなたを、異端者からデュランデール家の騎士を救った人物だと見抜き、彼らがあなたに借りを感じているだろうと言う。そして、五年前にクルザスで目撃された飛空艇を探しているのだな、と確認し、時機が悪いと告げる。年月の間に多くが変わり、しかも良くはなっていないのだと。</p>
      <p>ギヨームは幸運を祈りつつ、強く警戒するよう忠告する。クルザスの雪は急変する。確かな手応えと安全を感じていても、次の瞬間には吹雪に視界を奪われ、危険が隠れた見知らぬ状況へ放り込まれるかもしれない。移動の際はひとつの目印に意識を集中し、誘惑に負けて進路を逸れるな、と。</p>
      <p>ギヨームの言葉ののち、フォルルモールトは、あなたがデュランデール家に力を貸したことに礼を述べる。だが、それでも決定は覆らない――求めるものを渡すことはできない、と重ねて告げる。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ルドヴォア　<small class="muted">クルザス中央高地 (X:24.9, Y:28.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="cold-reception.html">あの山を越えて</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 36～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="men-of-honor.html">デュランデル家の流儀</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'冰雪大地',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Ludovoix 看到你還在這裡，先是皺起眉頭，語氣裡滿是疲憊與不耐。他說你若堅持，可以在他們的牆內避風雪，但別在他值勤時分散他的注意——他們的人手已經嚴重不足。接著他又咒罵自己派去巡邏的那名騎士：早就該回來了，卻遲遲不見人影。</p>
      <p>他沉默了片刻，像是在衡量你到底值不值得信任。最後他改口說，也許你還是派得上用場：如果你仍想幫忙，就到西邊的荒野去找他失蹤的部下。你會認得那個人——他穿著 House Durendaire 的制服，與 Ludovoix 自己同樣的制服。</p>
      <p>你往西搜尋，在雪地裡找到那名騎士倒伏著，沒有任何回應。就在你靠近時，雪地裡傳來越來越清晰的腳步聲，雪在 sabatons 之下被踩碎的聲音逼近，你只能立刻做出反應，把局勢撐住。</p>
      <p>等到危險退去，那名受傷的騎士終於能開口。他說若不是你，他們恐怕早就把他「做掉」了。隨後他吐出一口唾沫，怒罵那些「dragon-loving」的傢伙，說死亡對他們而言都是不配得到的仁慈。</p>
      <p>他說自己曾祈求那些傳聞是錯的，但眼前的一切證實了最糟的可能：異端正在這個區域活動。他必須立刻回去通知上級，說完便匆匆與你道別，帶著怒火與焦急離去。</p>
      <p>你回到 Ludovoix 面前，他坦白承認自己根本沒指望你能找到那名騎士，更別說把人救回來。他說自己先前的判斷太早了。即使他們是一群以傳統為傲的人，也不代表他們不懂得謙遜。</p>
      <p>Ludovoix 表示他會指示占星師願意聽取你的請求，但也強調最後是否讓你翻閱紀錄，仍由他們自行決定。然後他要你進入觀星塔，去向 Edmelle 自我介紹。</p>
      <p>Edmelle 一見到你，就直接點出你是來找飛空艇的人，並說這樣的要求非常不合常理，忍不住懷疑 Ser Ludovoix 到底在想什麼。她承認觀星塔保存著跨越好幾個世代的詳盡記錄，但這些資料用於追蹤 Dravanian 的動向，因此管制極嚴；畢竟異端與同情者可能就潛伏在周圍，再小心也不為過。若你仍要追查，她要你去樓上求見 Chief Astrologian Forlemort。</p>
      <p>Forlemort 對你的要求毫不留情地拒絕。他質問你是否明白自己在要求什麼，說一旦紀錄落入錯的人手中，就可能改變一場延續了好幾個世代的戰爭走向。這不是南方國家的小衝突，而是一場 holy crusade，而他們是 Halone 意志的執行者。他絕不會讓國家承受風險，更不可能只為了幫一個外國人尋找一艘失蹤的飛空艇。</p>
      <p>話音未落，Inquisitor Guillaime 走了進來，本想談「最近的——」卻在看到你後停住。Forlemort 立刻改變態度，恭敬地向他致意，並急忙說你正要離開。Guillaime 則認出你——你救了 House Durendaire 的騎士，想必他們因此對你心存感激。他也確認你正在尋找五年前在 Coerthas 被目擊的飛空艇，卻提醒你：你來得不是時候，這幾年之間改變了太多，而且幾乎沒有變好。</p>
      <p>Guillaime 祝你好運，同時強烈勸你保持警覺。他說 Coerthas 的雪來得又快又急——上一刻你還覺得自己掌握周遭、安穩無虞，下一刻就可能被暴風雪奪走視線，陷入全然陌生的處境，看不見被白霧掩藏的危險。他要你旅途中把注意力放在單一地標上，不要被誘惑引開路線。</p>
      <p>最後，Forlemort 才表示自己先前並不知道你曾以那種方式幫助 House Durendaire，並為此向你道謝——但即使如此，他的決定仍不會改變：他不能把你想要的東西交給你。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    </div>`,

      <div class="row">所有職業（不含限定職） 等級 36 以上</div>
    </div>`,
    followq:`<div class="stack">

const LANG_KEY = 'ffxiv-guide-lang';
const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
