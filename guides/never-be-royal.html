<script>

const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Never Be Royal',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more',
    readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Sezul Totoloc greets you in a subdued mood, the whole camp heavy and dark without Tataramu. The Dezul Qualan lies dormant like a deflated balloon, unable to fly without his touch. Only now does Sezul realize how deeply they relied on him, and how much the young designer had become the heart of the Ehcatl Nine. Refusing to sit helplessly and screech like a fledgling, Sezul asks you to go to Gridania, speak with Highwind Skyways, and find where Tataramu has been confined.</p>
      <p>At the Highwind Skyways office, the secretary first treats you as a nuisance seeking business or employment. But when you ask about Tataramu, she recognizes you as someone from the Ixal camp and accuses you of conspiring with beastmen to kidnap the young master. Though she refuses to answer directly, her frustration betrays a lead: she is about to board the chairman’s flight to Coerthas, where Tatabaru has an important meeting at the Observatorium with important people.</p>
      <p>You follow the trail to the Observatorium, where Tatabaru is deep in negotiations with House Durendaire over the future of a Coerthas airship route. The secretary again tries to drive you away, warning that the talks may decide the company’s fortunes. Yet her words also reveal that Tataramu was brought there under the pretense of continuing his education in company management, and that his chambers are guarded by Highwind Skyways retainers to prevent another escape.</p>
      <p>When you find Tataramu, he is stunned to see you. Learning that Sezul sent you, and that the Ehcatl Nine feel broken without him, he is both flattered and moved. Still, he cannot simply walk out: his father brought him to Coerthas to “learn the trade,” then confined him to the room like a prisoner. Rather than risk a violent confrontation with the guards, Tataramu asks you to seek help from Templeton, a Skyways employee at the Observatorium’s crafting facility and one of the few people in the company he considers an ally.</p>
      <p>Templeton, ever slippery, loudly insists he could never assist in such a suspicious undertaking, while just as loudly hinting at the use of a particularly potent sleeping potion. The retainers, he explains, have grown fond of mulled wine to endure the cold, and no one would question another bottle appearing on their table. With the potion delivered, Tataramu waits for the guards to drink deeply, then slips out as quietly as he can. For a moment, the escape seems successful.</p>
      <p>Before you can leave, however, Colson appears and confronts Tataramu. He warns that Tatabaru will not tolerate this defiance and urges Tataramu to consider his father’s perspective: as the future chairman of Highwind Skyways, he was born into responsibilities others cannot understand. Tataramu refuses to accept that fate. He is no prince, only the privileged son of an airship empire, and that empire itself was built by copying the balloons of the Ixal. He has no interest in reputation, fortune, or profit. Sezul and the Ehcatl Nine are reaching for the heavens, driven by a dream greater than anything he has seen, and he wants only to share that vision and help them restore their lost wings.</p>
      <p>Tataramu’s conviction moves Colson at last. Seeing in his eyes the same determination that once burned in Tatanora, Colson admits he has underestimated him. He tells Tataramu to go and promises to speak with the chairman himself, to make him understand the depth of his son’s desire. With Colson’s blessing, you and Tataramu return to Ehcatl, where Sezul tries to hide his joy behind claims of fogged goggles and humidity. There is no time to waste; they must work until the Dezul Qualan is complete.</p>
      <p>Their reunion is cut short by the arrival of hostile Ixal from Natalan. They have discovered the hidden camp and condemn the Ehcatl Nine for making an unsanctioned balloon and cooperating with forest people, calling it a crime against their goddess and their people. They threaten to destroy everything and report the treachery to their Natalan brothers. Sezul had known this day might come, but it has come too soon. If only the Dezul Qualan were complete, they might already have been ready to fly.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Sezul Totoloc <small class="muted">(North Shroud, X:24.5, Y:23.5)</small></div>

  JP:{
    langLabel:'日本語',
    pageTitle:'銀嶺高き、夢遠く',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示',
    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>セズル・トトロックは、沈んだ様子であなたを迎えます。タタラムを欠いた野営地の空気は重く、暗く沈んでいました。デズル・クワラン号は空気の抜けた風船のように眠ったままで、タタラムの手がなければ飛び立つこともできません。セズルは、自分たちが思っていた以上に彼を頼りにしていたこと、そしてタタラムがいつの間にかエカトル空力団の心臓のような存在になっていたことを痛感します。雛鳥のように座って鳴くだけではいられないと、セズルはあなたにグリダニアへ向かい、ハイウィンド社と話をして、タタラムがどこに閉じ込められているのか探ってほしいと頼みます。</p>
      <p>ハイウィンド社の受付係は、最初あなたを事業提案か就職希望の相手として扱い、正式な手続きを求めようとします。しかしタタラムの行方を尋ねると、彼女はあなたをイクサル族の野営地にいた人物だと気づき、若様をさらった獣人たちに加担した者だと決めつけます。直接情報を渡す気はありませんでしたが、彼女は苛立ちのあまり手がかりを漏らしてしまいます。会長は重要な会談のため、クルザスのアドネール占星台へ向かう便に乗るところだったのです。</p>
      <p>あなたはその手がかりを追い、アドネール占星台へ向かいます。そこではタタバルが、クルザス方面への飛空艇航路を開くため、デュランデル家と重要な交渉を進めていました。受付係は再びあなたを追い払おうとし、この会談が会社の命運を左右しかねないものだと警告します。しかし、その言葉から、タタラムが会社経営の教育という名目で連れて来られ、再び逃げ出さないようハイウィンド社の護衛に見張られた部屋へ閉じ込められていることも明らかになります。</p>
      <p>タタラムは、あなたの姿を見て驚きます。セズルがあなたを送ったこと、そして自分がいなければエカトル空力団が壊れたようになっていることを聞き、彼は照れながらも深く心を動かされます。けれど、ただ一緒に出ていくことはできません。父は商売を学ばせるという名目で彼を連れて来て、そのまま部屋に閉じ込めていたのです。扉の外には会社に雇われた護衛が立っており、一歩でも出ようとすれば止められてしまいます。騒ぎや暴力を避けるため、タタラムは占星台の製作設備にいるハイウィンド社の社員、テンプルトンに相談するよう頼みます。彼は会社の中では数少ない味方であり、その抜け目なさこそ今必要なものだというのです。</p>
      <p>テンプルトンは、そんな怪しい計画に手を貸すことなどできるはずがないと大げさに言いながら、強力な眠り薬の使用をこれ見よがしにほのめかします。凍える寒さを忘れるため、護衛たちは香料入りの温かい葡萄酒を好んで飲んでおり、食卓にもう一本瓶が増えても疑われることはないだろうと彼は言います。薬を受け取ったあなたが手はずを整えると、タタラムは護衛たちが十分に酔い、眠り込むのを待ってから、できる限り静かに部屋を抜け出します。ひとまず脱出は成功したかに見えました。</p>
      <p>しかし、その前にコルソンが姿を現し、タタラムを呼び止めます。彼は、このまま逃げれば父が決して許さないと警告し、ハイウィンド社の未来の会長である以上、タタラムには他の者には理解できない責任があるのだと諭します。人は皆、生まれた運命と責務を背負うものだというのです。けれどタタラムは、その運命を受け入れません。自分は王子などではなく、飛空艇企業の特権を持った子どもにすぎないと叫びます。そして、その企業もまた、かつてイクサル族の風船を模倣して少し空へ跳んだだけではないかと訴えます。会社の名声や利益には関心がなく、彼が見ているのは、天を目指すセズルとエカトル空力団の夢でした。失われた翼を取り戻そうとする彼らの情熱を、タタラムは共に分かち合い、同じ空を飛びたいのです。</p>
      <p>その熱意は、ついにコルソンの心を動かします。タタラムの目に宿る決意を見て、彼はまるで何十年も前の記憶が蘇ったかのようだと感じ、タタノラの血が確かに流れているのだと認めます。コルソンはタタラムに行くよう告げ、自分が会長に話をして、その望みがどれほど深いものか伝えると約束します。その後、あなたとタタラムはエカトル実験場へ戻ります。セズルは喜びの涙をごまかすように、ゴーグルが曇っただけで湿気のせいだと言い張りますが、すぐに失った時間を取り戻すため働くよう号令をかけます。デズル・クワラン号を完成させるまで、休んでいる暇はありません。</p>
      <p>しかし、その再会は長く続きません。ナタランのイクサル族が野営地を発見し、隠れた場所を突き止めたと叫びながら現れます。彼らは、エカトル空力団が森の民に取り入り、許可されていない風船を作っていることを、女神と同族への罪だと断じます。そして、すべてを壊し、焼き払い、この裏切りをナタランの仲間たちに知らせると脅します。セズルは、いつかこの日が来ることを知っていました。けれど、あまりにも早すぎました。デズル・クワラン号さえ完成していれば、彼らはすでに飛び立つ準備ができていたかもしれないのです。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> セズル・トトロック　黒衣森：北部森林 <small class="muted">(X:24.5, Y:23.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="standing-at-the-helm.html">父、来る</a></div>
      <div class="row">クラフター <small class="muted">Lv 1～</small></div>
      <div class="row">イクサル族 友好度ランク5「敬意」</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="spread-your-wings-and-soar.html">翼を広げ、何よりも高く</a></div>
    </div>`
  },

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'高原雪嶺、少年逐夢',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Sezul Totoloc 以低落的情緒迎接你。沒有 Tataramu 的營地沉悶又陰暗，Dezul Qualan 也像漏了氣的氣球一樣沉睡著，少了他的手便無法飛翔。Sezul 直到這一刻才意識到，他們比自己想像中更依賴 Tataramu；那位年輕的設計師，早已成了 Ehcatl Nine 的心臟。他厭惡這種無力感，不願像雛鳥一樣只是坐著尖叫卻什麼都不做，因此拜託你前往 Gridania，與 Highwind Skyways 交涉，找出 Tataramu 被關在哪裡。</p>
      <p>在 Highwind Skyways 的辦公處，秘書一開始只把你當成前來洽談生意或求職的人，要求你依照公司正式程序預約。但當你問起 Tataramu 的下落時，她立刻意識到你就是曾出現在 Ixal 營地的人，並指控你與那些帶爪的「野蠻人」合謀綁架少爺。她不願透露任何消息，卻在氣急敗壞中洩漏線索：她即將搭乘會長前往 Coerthas 的飛空艇，因為 Tatabaru 要在 Observatorium 與重要人士進行一場非常重要的會議。</p>
      <p>你循著線索來到 Observatorium，Tatabaru 正在那裡與 House Durendaire 進行交涉，討論 Coerthas 飛空艇航線的未來。秘書再次阻止你，警告這場談判極為敏感，甚至可能決定公司的命運。然而，她的話也透露出 Tataramu 被以「學習公司經營」為名帶到此地，並被安置在有 Highwind Skyways 護衛看守的房間裡，以免他再次被人帶走。</p>
      <p>當你見到 Tataramu 時，他驚訝地看著你。得知是 Sezul 派你前來，也聽說 Ehcatl Nine 因為少了他而像是崩解了一樣，他既受寵若驚，也深受觸動。可是他無法就這樣和你走出房門。父親以讓他學習商務為名把他帶來，卻把他關在這個房間裡，幾乎等同囚禁。門外的護衛全是公司雇來的人，只要他跨出門檻一步，就會被立刻攔下。為了避免正面衝突，他請你去找 Observatorium 製作設施裡的 Templeton；那是 Highwind Skyways 裡少數還能被他視為盟友的人，而對方的狡猾正是眼下最需要的特質。</p>
      <p>Templeton 一邊誇張地聲稱自己絕不可能協助這種可疑計畫，一邊又明顯暗示可以使用一種效力很強的安眠藥。他說，那些護衛為了忘記凍僵的手腳，已經喜歡上喝熱香料酒，桌上多出一瓶酒也不會有人懷疑。等你取得藥並安排好之後，Tataramu 便等待護衛們喝得足夠深、睡倒在桌邊，再盡可能安靜地溜出房間。逃脫看似順利成功。</p>
      <p>然而，在離開之前，Colson 出現在 Tataramu 面前，叫住了他。他警告 Tataramu，若真的這樣做，父親絕不會容忍這份反抗；也要他試著從父親的角度思考，身為 Highwind Skyways 未來的會長，他所繼承的世界與一般人不同。有人生來是平民，有人生來是王，所有人都背負著自己的命運與責任。Tataramu 卻拒絕接受這樣的說法。他說自己不是王子，只是飛空艇企業裡被特權包圍的孩子；而這個企業最初又是如何誕生的？Highwind Skyways 不過是模仿 Ixal 的氣球，稍微跳上天空而已。他不在乎公司的名聲或利益，也不追求財富與地位。Sezul 和 Ehcatl Nine 追逐的是天空，是更宏大的夢想，是他從未見過的熱情。他們想取回失去的雙翼，而他想幫助他們，想參與那份願景，飛在同一片天空之中。</p>
      <p>這份決意終於打動了 Colson。看見 Tataramu 眼中的堅定，他像是看見數十年前的記憶重新活了過來，也承認 Tatanora 的血確實在這位少爺身上炙熱流動。Colson 要 Tataramu 走，並承諾會親自與會長談，讓對方明白他的願望有多麼深切。於是，你與 Tataramu 回到 Ehcatl。Sezul 見到他後一度沉默，隨即用「護目鏡只是因為濕氣起霧」來掩飾喜悅，否認那是眼淚。接著，他立刻下令大家補回失去的時間，繼續工作，直到 Dezul Qualan 完成為止。</p>
      <p>但重逢的喜悅很快被打斷。Natalan Ixal 發現了營地，咒罵這個藏在森林裡的地方，並指控 Ehcatl Nine 討好森林的人、製作未經認可的氣球，犯下背叛女神與同族的罪。他們威脅要摧毀一切、燒毀一切，還要把這份叛逆告訴 Natalan 的同胞。Sezul 明白這一天遲早會來，只是來得太早了。如果 Dezul Qualan 已經完成，他們也許就能飛起來，逃向那片他們一直追逐的天空。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
