<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`At the End of Our Hope`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>The wounded knight still tried to rise, insisting through ragged breaths that he could fight. Artoirel understood his resolve, but he also knew the heretics’ trail would soon vanish beneath the next snowfall. There was no choice but to divide their strength. He would see the injured man safely back to Falcon’s Nest and bring reinforcements, while you searched the ground north of camp for any sign of the attackers. If you found their trail, you were to follow it at once and leave clear footprints behind for those who came after. The plan was dangerous, and he did not hide that fact, yet he saw no better path. Before departing, he entrusted the wounded man to himself and thanked you in earnest.</p><p>You found the tracks and followed them north through the snow. The trail led you straight into a band of heretics who had not expected pursuit. Their alarm shattered the stillness, and the moment they realized they had been found, they moved to kill. One broke and fled in terror, and you gave chase without hesitation. Driven onward by those desperate footsteps, you pressed deeper into the frozen wilds until the path carried you to Gorgagne Mills and the hidden refuge the heretics had made their own.</p><p>There, the last of the resistance rose against you in panic, only to be cut down. Once the fighting ended, you searched their hiding place, and it was there that the one you had truly been led to appeared before you. Iceheart stood waiting, calm and unshaken, as if she had expected your arrival all along. Yet before the confrontation could turn to violence, Midgardsormr addressed her as one who had glimpsed the truth. The words struck her with visible shock, and in that moment she could no longer deny what bound the two of you together.</p><p>Iceheart confessed that she, like you, had been blessed with the Echo. At first the visions had come without warning and filled her with fear, but the coming of the Calamity left her no time to dwell on them. Falcon’s Nest was swallowed by ice and snow, and in the chaos of flight she was cut off and left alone. With nowhere else to turn, she made for Dravania, knowing well what fate might await her if she were found. She was found indeed, but not by some lesser dragon. It was the great wyrm Hraesvelgr who discovered her, and through the gift she carried, she heard his voice and saw the truth through his eyes.</p><p>From that revelation, she came to believe she had been chosen to bring man and dragon together once more. But when you confronted her with the deaths of innocents, her certainty wavered. She insisted that what had happened was never meant to unfold that way. Children raised to fear the skies had seen their loved ones slaughtered, and though the dragons knew where the true fault lay, they had still descended upon those people in fury. Midgardsormr spoke then of the gulf between men and dragons: men die, generations pass, and memory fades, but for dragons the old wound remains ever-present. Their outrage had never dimmed.</p><p>Even so, Iceheart did not retreat from the burden she had taken upon herself. She declared that she was no saint and no savior, only another sinner, yet she would not abandon the cause. The cycle had to be broken, peace had to be restored, and she would devote herself to that end because there was nothing else left for her to do. By the time Artoirel arrived with reinforcements, she was already gone. Though disappointed that Lady Iceheart had slipped away, he did not let that overshadow what had been gained. The heretics had been dealt a serious blow, their hidden outpost had been exposed, and even as the knights searched the area, it was plain that the enemy had been driven back from this place.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Artoirel <small class="muted">(Coerthas Western Highlands, X:24.2, Y:25.5)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="reconnaissance-lost.html">Reconnaissance Lost</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 50</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="knights-be-not-proud.html">Knights Be Not Proud</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'足跡が導く再会',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>負傷した騎兵は、荒い息をこぼしながらも、まだ戦えると言い張った。だがアルトアレールは、その気概を認めつつも、異端者たちの痕跡が次の降雪で消えてしまうことを理解していた。ここで仲間を見捨てるわけにもいかない。彼は負傷兵をファルコンネストまで送り届け、増援を集める役目を引き受け、そのあいだあなたには野営地の北で襲撃の手掛かりを探すよう託した。もし異端者の足取りを見つけたなら、自分を待たずにそのまま根城まで追え、後続のためにわかりやすい足跡だけは残してほしい──そう告げる声には、危険を承知のうえで、それでも他に道はないという覚悟がにじんでいた。最後に彼は負傷兵のことは任せてほしいと告げ、礼の言葉を残して去っていった。</p><p>あなたは雪の上に残された痕跡を見つけ、それを追って北へ進んだ。足跡の先で待っていたのは、不意を突かれた異端者たちだった。追跡されていたと気づいた彼らはたちまち色を失い、取り乱したまま刃を向けてくる。ひとりは恐怖に駆られて逃げ出し、あなたはためらうことなくその背を追った。必死に逃れる足取りに導かれるまま、凍てつく荒野をさらに奥へ進み、やがてその先にあったゴルガニュ牧場で、異端者たちの隠れ家へとたどり着く。</p><p>そこでも異端者たちは追い詰められた獣のように武器を取り、あなたに襲いかかった。戦いが終わり、隠れ家の奥を確かめたあなたの前に、ついに本当に追うべき相手が姿を現す。イゼルは、まるであなたが来ることを知っていたかのように、静かにそこに立っていた。だが剣を交えるより先に、ミドガルズオルムが彼女を「真実を垣間見た子」と呼ぶ。そのひと言は、彼女の表情を大きく揺らし、あなたと自分を結びつけるものを、もはや否定できないものにした。</p><p>イゼルは、自分もまたあなたと同じく「超える力」に選ばれたのだと明かす。何の前触れもなく訪れる幻視は、当初の彼女にとって恐怖そのものだった。けれど、第七霊災が訪れると、その意味を考える暇さえ失われた。ファルコンネストは瞬く間に氷雪に埋もれ、人々はイシュガルドへ逃れるしかなかった。その逃避行の最中、雪崩によって彼女は仲間と引き裂かれ、ひとりきりになる。生き延びるため、危険を承知でドラヴァニアへ向かった彼女を見つけたのは、ただの竜ではなく、偉大なる竜フレースヴェルグだった。そして授かった力を通じて、彼の声を聞き、その目に映る真実を知ったのだという。</p><p>その啓示によって、彼女は人と竜をかつてのように結び直す役目を自分が担うべきだと信じるようになった。だがあなたが、罪なき者たちの死をどう受け止めるのかと問いただすと、その確信は揺らぐ。あんなはずではなかった、信じてほしい、と彼女は苦しげに訴えた。空を恐れるよう育てられた子らは、愛する者を竜に奪われた。しかも竜たちは、真の責がどこにあるかを知りながら、それでもなお激しい怒りのまま人々に襲いかかったのだ。続いてミドガルズオルムは、人と竜との隔たりを語る。人は死に、子が生まれ、時とともに記憶を失う。だが竜にとっては、かつて受けた陵辱も憤りも、今なお少しも薄れてはいないのだと。</p><p>それでもイゼルは、自ら背負ったものを捨てようとはしなかった。自分は聖女でも救世主でもなく、ただの罪人にすぎない。それでもこの志だけは見捨てられない、終わらせるべき連鎖があり、取り戻すべき平和があるのだと、彼女は言い切る。もはや自分には、それ以外の道はないのだと。やがて増援を率いたアルトアレールが駆けつけたとき、彼女の姿はすでにそこになかった。レディ・アイスハートを取り逃がしたことを惜しみつつも、彼はそれ以上に、あなたが敵に大きな打撃を与えたことを認める。騎兵たちが周辺を捜索しても、残されていたのはあなたが討った異端者ばかりだった。人知れず築かれたこの遠隔の拠点は暴かれ、異端者たちは確かにこの地から追い立てられていた。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> アルトアレール <small class="muted">（クルザス西部高地, X:24.2, Y:25.5）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="reconnaissance-lost.html">哨戒部隊を捜索せよ！</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="knights-be-not-proud.html">目の曇り、今は晴れ</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'循著足跡再相會',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>那名受傷的騎兵明明連呼吸都亂了，卻還是硬撐著表示自己還能戰鬥。Artoirel 明白他的意思，也知道異端者留下的痕跡一旦再被新雪蓋住，很快就會完全消失。但眼前的傷者也不可能就這樣丟下不管。於是他決定親自把人送回 Falcon’s Nest，再去召集增援；而你則趁這段時間前往營地北方，搜尋襲擊留下的線索。只要找到異端者的行蹤，就不要等他回來，立刻一路追到對方的藏身處，同時在雪地上留下清楚的腳印，好讓後面的人能循跡跟上。他沒有掩飾這個安排有多危險，只是很清楚，眼下已經沒有更好的辦法。臨走前，他也要你別擔心那名傷兵，並鄭重地向你道謝。</p><p>你循著雪地上的痕跡一路向北追去，很快便撞上了一群根本沒料到會被追上的異端者。對方一發現行蹤暴露，原本的藏匿立刻變成驚慌與殺意。有人拔劍朝你衝來，有人慌亂失措，甚至有人當場轉身逃跑。你沒有停下，而是緊追著那名潰逃者一路深入雪原。最後，那串凌亂的足跡把你帶到了 Gorgagne Mills，也讓異端者藏在此地的據點暴露出來。</p><p>在那座隱密的藏身處裡，殘餘的異端者倉促迎戰，卻終究還是被你擊退。等戰鬥平息之後，你繼續查看這處巢穴，終於見到了真正被這一路追索引來的人。Ishgard 長久追捕的 Iceheart，就那樣平靜地站在你面前，像是早就料到你會找到這裡。可就在衝突即將爆發之前，Midgardsormr（守護 Silvertear Falls 的上古巨龍，也是最初率領龍族來到 Eorzea 的龍王；在 Heavensward 劇情中，他以旁觀者與見證者的立場，看著人與龍之間漫長的仇恨）卻先一步開口，稱她為曾窺見真相的孩子。那一句話讓她當場變了臉色，也讓她再也無法否認，自己與你之間確實共享著某種相同的力量。</p><p>她坦承，自己和你一樣，同樣擁有 Echo（能讓人看見他人記憶與真相的力量）。那些突如其來的異象，起初帶給她的只有恐懼，她甚至不知道自己究竟做了什麼，才會承受這樣的東西。可第七靈災降臨後，她已經沒有餘裕再去思考原因。Falcon’s Nest 在短短時間內被冰雪吞沒，人們只能被迫逃往 Ishgard。可就在逃難途中，一場雪崩把她和其他人徹底分開，只剩下她孤身一人。為了活下去，她只能冒著被發現的風險前往 Dravania。最後找到她的，並不是普通的龍，而是聖龍 Hraesvelgr（居於 Dravania 的古老聖龍，也是 Midgardsormr 的子嗣之一；他長久見證 Dragonsong War 的悲劇，並因過去與 Shiva 的深刻羈絆，而成為這段歷史中極重要的存在）。也正是在那時，她第一次真正明白自己為何會得到這份力量，因為藉由它，她聽見了 Hraesvelgr 的聲音，也透過他的雙眼看見了另一邊的真相。</p><p>從那一刻起，她相信自己是被選中的人，必須把這份真相帶回人們面前，重新讓人與龍走向彼此。可當你質問她，那些死去的無辜平民又該怎麼算時，她原本的堅定明顯動搖了。她急著辯解，事情本來不該變成那樣，希望你相信她，那一切早已超出她能控制的範圍。那些從小被教導要畏懼天空的人，親眼看著自己的家人死去；而龍族即使明知道真正的過錯源自何處，仍舊懷著壓不下去的怒火撲向那些人。Midgardsormr 隨後說出人與龍始終難以彼此理解的原因：人會死去，孩子會長大，往事也會慢慢被遺忘；但對龍而言，當年的傷害與憤怒從來沒有真正過去，過去與現在幾乎沒有分別。</p><p>即使如此，Iceheart 仍然不肯放下自己已經選擇的路。她說自己不是聖人，也不是救世主，只不過是另一個背負罪過的人而已。可就算如此，她也不能拋下這個信念，因為這場仇恨的循環必須被打破，失去的和平也必須有人去奪回。對現在的她而言，這已經是她唯一能繼續走下去的方向。等到 Artoirel 帶著增援趕到時，一切都已經太遲了。Iceheart 早已離去，只留下被發現的據點與滿地狼藉。雖然沒能當場將她擒下，但 Artoirel 並沒有否定你這次做到的事。這一天，你確實重創了異端者，也讓他們藏在這裡的據點徹底曝光。之後騎兵們繼續在四周搜索，卻只找到那些被你留在原地的敵人而已。能在這樣偏遠的地方建立起據點，本來就不是容易的事，而現在，他們也已經被逼得不得不從這裡退開。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Artoirel <small class="muted">(庫爾札斯西部高地, X:24.2, Y:25.5)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="reconnaissance-lost.html">失聯的偵察隊</a></div><div class="row">任一戰鬥／魔法職業（不含受限職業）Lv. 50</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="knights-be-not-proud.html">如今終於看清一切</a></div></div>`
  }
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
