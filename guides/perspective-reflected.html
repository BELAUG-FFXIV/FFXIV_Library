<head>
  <meta charset="utf-8" />

  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    /* 展開/收合 */
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:'Perspective Reflected',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>An Ishgardian glassworker stops you and, after acknowledging that everyone on this star is an adventurer of one sort or another, explains that his true craft is glasswork. It was that expertise which earned him an invitation to join the initiative, and until now he has been content to remain at Glassblowers’ Beacon, overseeing the work there. Yet with his time on Phaenna drawing to a close, he has begun to regret how little of the star he has seen for himself. He is certain its scenery would leave inspiration enough to sustain him for years, and so he asks whether you might escort him on a short excursion through the dangers beyond the grotto.</p>
      <p>When you meet again to the southwest, he is already transfixed by the view. Though he had imagined traveling farther, the beauty before him is enough to make him reconsider. Perhaps, he says, the inspiration he seeks can be found here at the very threshold of camp. Believing that one who serves the initiative must also possess an artisan’s eye, he invites you to join him in a small exercise of beauty and judgment: to gather whatever fragments call most strongly to your own sense of form and color, while he keeps to the safer surroundings.</p>
      <p>When you return with the pieces you have chosen, he receives them with genuine admiration. To him, any one of them would be worthy of being worked into a finished creation, and both the landscape and the materials have left him dazzled. Yet after praising your eye, he asks about something deeper. You have wandered this world far longer than he has, and he wants to know what Phaenna has meant to you. Whatever answer you give, he hears in it the voice of a true adventurer—someone able to stand before the unknown and find wonder there.</p>
      <p>He then admits that the sea of stars inspires in him not only awe, but fear. There is simply too much to see, and his own view of it feels painfully small. The moment he stepped beyond the shelter of the grotto, he nearly found himself overwhelmed. Yet because you walked beside him, he was able to behold this world through steadier eyes, if only for a little while. With that quiet gratitude between you, the two of you make your way back to the Beacon.</p>
      <p>Once there, he finally explains why this brief journey mattered so much to him. Not long ago, Lord Aymeric commissioned him to create a stained-glass work celebrating the new harmony between man and dragon. From the beginning, he struggled. For most of his life, dragons had been to him terrible beasts, creatures to be feared rather than understood. To see beauty in them, let alone kinship, had once felt impossible. But now, after standing beneath the alien sky of Phaenna, he feels something in him begin to change. Even the most fearsome wyrm, he says, is still a single soul, no different from you or him in facing the endless expanse with both fear and wonder. And so, at last, he can see the image he wishes to create: a dragon soaring between the stars, graceful and strong, chasing a glimmer of light across an unimaginable distance. For the glass he gathered here, he can think of no finer purpose.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Ishgardian Glassworker, Phaenna <small class="muted">(X:29.1, Y:13.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-brightest-star.html">The Brightest Star</a></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="a-managers-delegation.html">A Manager’s Delegation</a></div>
    </div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'ガラスに映る未来',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ひとりのイシュガルドのガラス職人があなたに声をかける。ここにいる者は皆、ある意味では冒険者のようなものだと冗談めかしつつも、自分の本分はあくまでガラス細工にあるのだと語る。その技術を見込まれてコスモエクスプローラー計画へ招かれ、これまではグラスブロワーズ・ビーコンで作業を見守る役目に満足していた。だが、パエンナでの滞在も終わりに近づくにつれ、この星の景色をほとんど自分の目で見ていないことが、心残りになってきたのだという。きっと一度でもその眺めを目にすれば、何年も尽きぬ着想を得られるはずだ――そう考えた彼は、危険な環境の中を少しだけ案内してくれないかと、あなたに頼む。</p>
      <p>南西で落ち合った彼は、すでに目の前の景色に息をのんでいた。もっと遠くまで足を延ばすつもりだったが、どうやら求めていたものは、この拠点のすぐ外に広がる光景の中にすでに宿っているらしい。そう言って彼は、あなたもまた計画に携わる者として、美を見抜く目を持つに違いないと微笑み、小さな創作の試みに加わってほしいと願う。自身は危険を避けて近場にとどまるから、あなたには心惹かれる破片を拾い集めてきてほしいというのだ。</p>
      <p>やがてあなたが選び取った欠片を手渡すと、彼はそのひとつひとつを心から称賛する。そのどれもが作品の一部となりうるだけの魅力を備えており、景色も素材も、彼の感性を強く揺さぶったのだった。そして感嘆のあとで、彼はふとあなた自身のことを尋ねる。自分よりはるかに長くこの星を歩いてきたあなたは、パエンナで何を見て、どのように感じてきたのか。その答えがどのようなものであっても、彼にはそれが真の冒険者の言葉として響く。未知の中にあってなお、美しさや驚きを見いだせる者の言葉として。</p>
      <p>彼は続けて、星の海が自分にとって、美しさと同時に恐ろしさをも呼び起こすものでもあると打ち明ける。見えるものはあまりに多く、自分がそのすべてを捉えることなど到底できない。グロットの外へ一歩踏み出した瞬間、その広がりに呑まれそうになったのだという。それでも、あなたとともに歩いたからこそ、この星を少しのあいだでも自分なりに見つめることができたのだと、彼は静かに感謝を口にしながら、あなたとともにビーコンへ戻っていく。</p>
      <p>拠点へ戻ると、彼はようやく、この小さな散策に込めていた本当の理由を明かす。少し前に、アイメリク卿みずから、人と竜のあいだに生まれた新たな調和を祝うためのステンドグラス制作を依頼したのだという。だが彼は最初から壁に突き当たっていた。長いあいだ、竜とは恐ろしい獣でしかなく、その姿の中に美しさや親しみを見いだすことなど、想像の及ぶところではなかった。けれど今、パエンナの空の下に立ったことで、彼の見方は変わり始めている。どれほど恐ろしい竜であっても、結局はあなたや自分と同じように、果てなき広がりを前にして恐れ、そして驚きも抱く、ひとつの魂なのだと。そうして彼の心には、ようやく描くべき姿が浮かび上がる。星々のあいだを優雅に、力強く飛ぶ一頭の竜。想像もつかぬ遠さにまたたくひと筋の光を追っていくその姿こそ、この地で得たガラスに託すべきものなのだと、彼は確信するのだった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> 皇都のガラス職人　惑星パエンナ <small class="muted">(X:29.1, Y:13.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-brightest-star.html">希望の輝き</a></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="a-managers-delegation.html">プロジェクトマネージャーの意義あるお仕事</a></div>
    </div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'倒映在玻璃中的未來',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>一位來自 Ishgard 的玻璃工匠主動向你搭話，先是帶著些許玩笑意味地說，在這顆星球上，大家某種程度上都算是冒險者，但隨後仍認真地表明，自己的本業終究是玻璃工藝。正因為這份專長，他才受邀加入這項計畫，並一直在 Glassblowers’ Beacon 負責相關工作。只是，隨著他在 Phaenna 的日子即將結束，他心裡也漸漸生出一絲遺憾，自己始終沒有真正走出去，好好看看這顆星球更遠的景色。他相信，那樣的風景一定足以成為自己未來多年創作的靈感，因此希望你能陪他短暫走一趟，護送他穿過那些危險的環境。</p>
      <p>等你們在約好的地方會合時，他早已被眼前的景色奪去了注意力。原本他還想著應該再往更遠處走去，可真正站在這裡後，他卻覺得，自己想尋找的靈感，也許就在營地門前這片天地裡便已經足夠。他認為，既然你也是這項計畫的一員，那麼你必然也有屬於自己的工匠眼光，於是邀你一起參與這場小小的審美試驗。他自己會留在相對安全的附近，而你則替他去找來那些最能打動你眼睛的碎片，看看彼此是否能在這片陌生土地上，找到同樣動人的材料。</p>
      <p>等你將挑選回來的碎片交到他手中時，他立刻露出了由衷讚賞的神情。對他而言，那些碎片每一塊都足以進入作品，景色與素材本身也同樣讓他看得眼花撩亂、心生驚嘆。可在稱讚過你的眼光之後，他又將話題轉向了你自己。比起他這樣只是短暫走出營地的人，你在 Phaenna 上花了更多時間，也看見了更多東西，所以他想知道，這顆星球對你而言究竟是什麼模樣。不論你的回答偏向哪一種，他都從中聽出了真正冒險者才會有的語氣——那種即使面對完全陌生的世界，也仍能從中感受到驚奇與美感的心。</p>
      <p>接著，他也坦白說出自己的感受。對他來說，群星之海固然美得令人屏息，卻也同樣令人畏懼。能夠看見的事物實在太多，而自己所能理解的範圍卻又那麼有限。當他真正踏出洞窟之外時，幾乎一度被那份遼闊壓得喘不過氣來。可也正因為有你同行，他才能在那短短片刻裡，用比較安穩的心情去看這顆星球，彷彿是透過你的眼睛，稍微理解了這個世界的美。懷著這份安靜的感謝，你們一起回到了 Beacon。</p>
      <p>回去之後，他終於說出了這趟短暫散步對自己真正的重要意義。不久之前，Lord Aymeric 曾親自委託他製作一件彩繪玻璃作品，用來紀念人與龍之間好不容易建立起來的和諧關係。可從一開始，他就深深卡住了。對他而言，龍一直都只是令人畏懼的存在，是可怕的生物，而不是可以在其身上看見美，甚至看見某種共感的對象。可如今，他開始覺得自己終於稍微懂了。即使是最可怕的巨龍，也終究只是和你、和他一樣的生命，面對那片無盡延伸的廣闊時，同樣會感到恐懼，也同樣會心生驚嘆。於是，在他的想像中，新的作品輪廓終於清晰起來，一頭龍在群星之間振翼飛翔，優雅而堅定，追逐著遠方一點難以企及的光。對於這次在 Phaenna 所獲得的玻璃而言，他覺得再沒有比那更合適的用途了。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 伊修加德玻璃工匠　帕恩納星 <small class="muted">(X:29.1, Y:13.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-brightest-star.html">最耀眼的星辰</a></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="a-managers-delegation.html">經理的委派之道</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
