const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Never Forget',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>At Buscarron’s Druthers, Buscarron thanks you for everything you have done for his patrons, then leans his weight on the counter with a more personal request. There is a Qiqirn he calls a friend, a good lad by the name of Teteroon. Right after the Calamity, Buscarron found him collapsed out in the Shroud, half-dead amid the chaos. He took the Qiqirn in, nursed him back to health as best he could, and for a time Teteroon worked here at the Druthers. Eventually, the Qiqirn began talking about striking out on his own and, not long after, left with a merchant bound for La Noscea. While cleaning recently, Buscarron came across something Teteroon left behind: a scarlet earring he had been very fond of. Certain it must have been forgotten in the rush to depart, Buscarron wants to see it returned. He does not know exactly where Teteroon ended up, but a Roegadyn friend of his, Baensyng, might. You are to seek this man in Hawkers’ Alley in Limsa Lominsa, for he keeps close watch on the comings and goings of merchants there.</p>
      <p>You make your way to the Lower Decks of Limsa Lominsa, where the cries of traders fill West Hawkers’ Alley. There you find Baensyng, who greets you to the Alley and listens as you ask after a Qiqirn who once worked at the Druthers. He immediately realizes you are speaking of Teteroon, and mentions that the Qiqirn is kin to another Qiqirn nearby, Kyokyoroon. The two of them pooled their efforts and were making good coin together, but not long ago Teteroon abruptly left Limsa for parts unknown. Baensyng cannot say why he left or where he went. If you want details, he says, you are better off asking Kyokyoroon himself. The trader can be tight-lipped, though, so Baensyng presses a chicken egg into your hand—Kyokyoroon loves the things. As he does, he chuckles that it sounds just like “Busc” to send an adventurer in his stead, too shy to show his own face. He admits he misses drinking with that fool, then sends you on to his Qiqirn acquaintance.</p>
      <p>Approaching Kyokyoroon in the bustle of the Alley, you are greeted first as a potential customer, only to be told that if you are not here to buy, he is too busy for idle chatter. When you produce the chicken egg, however, his demeanor changes at once. He exclaims his love for chicken eggs—more even than for customers—and accepts it eagerly. Once mollified, he listens to your questions about Teteroon. He explains in his clipped, choppy speech that Teteroon is no longer in Limsa. Teteroon left to look for “sparklies” and now works at a trading post, a good trading post, though Kyokyoroon has forgotten exactly where it is. For such details, he points you to Wineburg at the Lominsan Ferry Docks. Kyokyoroon may forget things, he says, but Wineburg remembers. If you want to find Teteroon, you should talk to Wineburg, not to him.</p>
      <p>At the Lominsan Ferry Docks, you find Wineburg and ask about Teteroon. Wineburg, too, starts with “I’ve seen him—that is to say, I saw him,” before explaining that the Qiqirn headed north by taking the ferry to Aleport. If you want to track him down, Wineburg advises, you should go there and see what you can learn. The skipper here can take you straight to Aleport. Once you arrive, Wineburg suggests you start by asking Ahldfoet, an old hand who knows a great deal about a great many things. You follow his advice, ride the ferry to Aleport, and seek out Ahldfoet on the docks. When you mention Teteroon, Ahldfoet responds with the same turn of phrase—he saw him—and explains that the Qiqirn passed through, then headed north through Skull Valley into Oakwood, looking for a place run by his fellow Qiqirn. Ahldfoet reckons he meant Memeroon’s Trading Post on the shore of Bronze Lake, and tells you to follow the road north and you are sure to find it.</p>
      <p>Leaving Aleport behind, you follow the road through Skull Valley and into Oakwood, the path eventually leading you to Memeroon’s Trading Post in Upper La Noscea. There, among the Qiqirn traders, you finally find Teteroon. He greets you with the same brisk cadence as Kyokyoroon, first asking if you are a customer and whether you have come with business. When you present the scarlet earring, he stares for a moment, then remembers. He had sworn he would never forget it, yet forgot it all the same when he left the Druthers. Overcome with relief, he thanks you again and again for bringing it back. When you tell him that “Good Buscaroon” is doing well, he brightens for a heartbeat, then lets out a small sigh. Teteroon misses Buscarron dearly, and as you watch him clutch the earring close, you sense how much this simple token—and the news carried from the Shroud—mean to him out here on the shores of Bronze Lake.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'懐かしき忘れ物',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>酒房「バスカロンドラザーズ」で、バスカロンは客たちのためにあなたがしてくれた数々の助力に礼を述べたあと、少しだけ個人的な頼み事を切り出します。彼にはテテルンというキキルンの友人がいて、「いいやつ」だと評します。霊災の直後、バスカロンは黒衣森で倒れていたテテルンを見つけ、混乱の中で死にかけていた彼を拾い上げました。できるかぎり看病してやった結果、テテルンは元気を取り戻し、その後しばらくのあいだ酒房で働いていたのだといいます。しかし、やがて彼は自分の力でやっていきたいと語るようになり、ラノシア行きの商人と行動を共にすることを決めて、ここを旅立っていきました。最近、店の片づけをしていたバスカロンは、そんなテテルンの持ち物である「紅石の耳飾り」を見つけます。テテルンが大事にしていた品であり、慌ただしく出立した折に置き忘れていったに違いない──そう考えた彼は、どうにかして本人に届けてやりたいのだとあなたに打ち明けます。とはいえ、テテルンが今どこにいるのかはわからない。そこで、リムサ・ロミンサの「西ホーカーズ・アレイ」にいるロスガルの商人仲間、ベーンシングなら何か知っているはずだと教え、あなたに耳飾りを託します。</p>
      <p>あなたはリムサ・ロミンサ：下甲板層へと向かい、行商人たちの呼び声が飛び交う西ホーカーズ・アレイでベーンシングを見つけます。挨拶代わりに道に迷っていないかと笑いかけてきた彼に、あなたは酒房で働いていたキキルン──テテルン──の行方を尋ねます。ベーンシングはすぐに思い当たり、テテルンがすぐ近くにいるキキルン商人キョキョルンと血縁の関係にあり、ふたりで協力してなかなかの利益を上げていたのだと教えてくれます。しかし、テテルンはつい最近リムサを去ってしまい、なぜどこへ向かったのかまではわからないと言います。詳しい話が聞きたいなら、キョキョルン本人に尋ねるのが早いだろう。ただし、あのキキルンは口が固いところがある──そう前置きしたベーンシングは、あなたにひとつ鶏卵を手渡します。キョキョルンはこの手のものが大好物なのだと。彼は、バスカロンが相変わらず冒険者を頼っていると聞いて懐かしそうに笑い、「自分で来ればいいものを」と照れ屋な友人をからかいながらも、また一緒に飲みたいものだとつぶやきます。</p>
      <p>西ホーカーズ・アレイでキョキョルンのもとを訪ねると、彼はまずあなたを「カスタマー」と迎えますが、買い物でないなら忙しくておしゃべりしている暇はないと、そっけなく言い放ちます。そこであなたがベーンシングから預かった鶏卵を差し出すと、キョキョルンの態度は一変します。「チキンエッグ大好き、カスタマーより大好き」とばかりに目を輝かせ、機嫌よくそれを受け取ると、ようやくテテルンの話を聞かせてくれます。彼のたどたどしい言葉によれば、テテルンはもうリムサにはいません。「スパークリー」を求めてリムサを離れ、今は交易商店で働いているのだと。ただ、どこの交易商店だったかは忘れてしまったと言い、細かいことは自分よりワインバーグに聞くべきだと教えてくれます。ワインバーグはロミンサ・フェリー乗り場にいて、こうしたことをよく覚えている人物だというのです。物忘れの激しいキョキョルンは、自分は忘れるがワインバーグは忘れない、と言い残し、あなたに次の行き先を示します。</p>
      <p>ロミンサ・フェリー乗り場でワインバーグを見つけ、テテルンについて尋ねると、彼もまた「テテルンなら見たことがある」と同じ言い回しで口を開きます。話によれば、テテルンはここからフェリーに乗り、北へ向かうためにエールポート行きの船に乗り込んだとのこと。彼のあとを追いたいのなら、自分も同じようにエールポートまで渡り、そこで情報を集めるといいと勧めます。着いた先では、まずアルドフートという老練の男に話を聞けと教えてくれます。あれこれとよく知っている人物だというのです。あなたは彼の助言に従って船に乗り、エールポートに到着すると、桟橋でアルドフートを探し出します。テテルンの名を出すと、彼もまた「見たことがある」と答え、テテルンはこの港を経由してさらに北へ向かい、スカルバレーを抜けてオークウッドへ入っていったのだと教えてくれます。仲間のキキルンが営む場所を探しているようだったことから、ブロンズレイクの湖畔にある「メメルン交易商店」のことだろうと見当をつけ、道なりに進めばたどり着けるはずだと道筋を示してくれます。</p>
      <p>あなたはエールポートを後にし、スカルバレーからオークウッドへと道をたどりながら、高地ラノシアのメメルン交易商店を目指します。やがて湖畔の交易所に着き、そこで働くキキルンたちの中に、目的のテテルンの姿を見つけます。彼はキョキョルンと同じく独特の言葉遣いであなたを迎え、「カスタマーか？ カスタマーじゃないか？ テテルンに何か持ってきたか？」と尋ねます。あなたが紅石の耳飾りを差し出すと、テテルンはそれを見つめ、やがてはっとしたように思い出します。ドラザーズを出るとき、絶対に忘れまいと心に誓っていた品だったのに、結局忘れてしまったのだと肩を落としながら、それでもこうして届けてくれたあなたに何度も何度も礼を述べます。さらに、バスカロンが今も元気にやっていると伝えると、テテルンは「グッド・バスカロン、グッド・バスカロン」と懐かしそうに繰り返し、小さくため息をこぼします。黒衣森で命を拾われたあの日から支えとなってきた恩人を、彼がどれほど恋しく思っているかは、耳飾りを大事そうに握りしめる姿から十分に伝わってきます。湖畔の交易所で、テテルンとバスカロンをつなぐ小さな絆を届け終えたあなたは、静かにその光景を見守るのでした。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

      <div class="row"><b>クエスト発行</b> バスカロン　<small class="muted">黒衣森：南部森林 (X:18.1, Y:19.8)</small></div>
    </div>`,

      <div class="row"><a class="link" href="druthers-house-rules.html">バスカロンドラザーズの掟</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 23～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="microbrewing.html">テテルンのふるまい酒</a></div>
    </div>`
  },
  ZH:{

    pageTitle:'永不忘懷',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Buscarron’s Druthers 裡，Buscarron 先向你道謝，感謝你一路以來替他的客人處理了這麼多麻煩，接著才提起一件和他自己有關的事。他說自己有一位 Qiqirn 朋友，叫 Teteroon，是個很不錯的孩子。霧災剛發生後不久，他在 Shroud 裡發現 Teteroon 倒在路邊，在那場混亂中幾乎喪命。於是 Buscarron 把他帶回來，盡自己所能照顧，總算讓他撿回一條命。之後有一段時間，Teteroon 也在這間 Druthers 幫忙工作。後來，他開始談起想靠自己闖一闖，不久之後便跟著一位要前往 La Noscea 的商人離開。最近 Buscarron 收拾店裡時，翻出了 Teteroon 留下來的一件物品──一只帶紅色寶石的耳環。他記得 Teteroon 非常喜歡這東西，想必是臨走時匆忙忘在這裡，所以很希望能把耳環物歸原主。只是他並不清楚 Teteroon 現在究竟在哪裡，不過在 Limsa Lominsa 的 Hawkers’ Alley 有一位 Roegadyn 商人叫 Baensyng，對那一帶商人來來往往的情況一向很熟，或許知道些什麼。於是，他把耳環交給你，請你代為尋人。</p>
      <p>你來到 Limsa Lominsa Lower Decks，踏入叫賣聲此起彼落的 West Hawkers’ Alley，在那裡找到了 Baensyng。他先是提醒你，這裡正是 Hawkers’ Alley，接著聽你說起一位曾在 Druthers 工作過的 Qiqirn，便立刻明白你指的是 Teteroon。Baensyng 提到，Teteroon 和旁邊那位 Qiqirn 商人 Kyokyoroon 似乎有血緣關係，兩人合力經營生意，賺得相當不錯。不過在不久前，Teteroon 突然離開 Limsa，不知道是什麼原因、也不知道去了哪裡。要問細節的話，他建議你乾脆直接去找 Kyokyoroon 問，卻也提醒那傢伙有點守口如瓶。說到這裡，他塞了一顆雞蛋到你手裡，笑說 Kyokyoroon 對這種東西毫無抵抗力。有了這顆蛋，要他開口就容易多了。他同時也感嘆，從你口中聽到 Buscarron 的近況，彷彿看見對方依舊老樣子，害羞得只會拜託冒險者代勞，自己卻不肯現身，讓他不禁懷念起一起喝酒的日子。</p>
      <p>你走到 Kyokyoroon 面前時，他照慣例先當你是上門的 customer，開口問你是不是帶了生意來，若不是，他忙得沒空閒聊。當你拿出 Baensyng 交給你的雞蛋，他立刻眼睛一亮，說自己比起 customer 更愛 chicken egg，立刻心滿意足地收下。心情大好之後，他總算肯聽你問起 Teteroon 的事情。用一貫斷句奇怪的語氣，他告訴你 Teteroon 已經不在 Limsa 了，為了去找「sparklies」而離開，現在在某個 trading post 工作。那是間不錯的商站，只是他自己已經忘了那裡的具體位置。這種事情，還是去問 Wineburg 比較可靠。Kyokyoroon 指出，Wineburg 在 Lominsan Ferry Docks，那傢伙記性好得多。自己常常忘東忘西，要找人就去找 Wineburg，不要浪費時間在他身上。於是，你帶著新線索，離開了 Hawkers’ Alley。</p>
      <p>在 Lominsan Ferry Docks，你找到 Wineburg，向他打聽 Teteroon 的行蹤。他也先說自己「見過那傢伙」，接著說明 Teteroon 當時是搭乘渡船往北方去，目的地是 Aleport。要追上他的話，最好的辦法就是也搭這裡的船去 Aleport，再到那裡打聽。Wineburg 建議你抵達之後，先去找一位叫 Ahldfoet 的老手，那個人見多識廣，知道的事情很多。你照他的話搭船抵達 Aleport，在碼頭找到 Ahldfoet，提起 Teteroon 的名字。他同樣先確認自己的確見過對方，接著說 Teteroon 是從這裡再往北走，穿過 Skull Valley，進入 Oakwood，想找一間由 Qiqirn 族人經營的店。依他的判斷，那八成就是 Bronze Lake 湖岸邊的 Memeroon’s Trading Post，只要沿著道路往北走，很快就能看到。</p>
      <p>離開 Aleport 之後，你沿著道路穿過 Skull Valley，來到樹影更深的 Oakwood，最後抵達 Upper La Noscea 湖畔的 Memeroon’s Trading Post。在那裡的 Qiqirn 商人之中，你找到了 Teteroon。像 Kyokyoroon 一樣，他先以熟悉的口吻喊你「customer」，問你是不是帶著生意而來，又追問是否帶了什麼東西給他。當你取出 scarlet earring，他愣了一下，隨即想了起來。那是他當初在 Druthers 工作時一直很珍惜的耳環，他曾經向自己發誓絕不會把它弄丟，結果臨走時卻真的忘在那裡。Teteroon 一邊懊惱，一邊一再向你道謝，感激你大老遠送回這件重要的東西。當你轉告他「Good Buscaroon」近況良好時，他臉上先是浮現出一絲開心的神情，隨後又輕輕嘆了一口氣，說自己很想念那位對他始終很好的 Buscarron。看著他把耳環握在手心，小心翼翼地貼在胸前，你清楚感覺到，對這位 Qiqirn 來說，這不只是飾品，更是從 Shroud 帶來、連結他與恩人之間的小小羈絆。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 巴斯卡隆　<small class="muted"> 黑衣森林南部林區 (X:18.1, Y:19.8)</small></div>
    </div>`,
    unlockq:`<div class="stack">

  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
