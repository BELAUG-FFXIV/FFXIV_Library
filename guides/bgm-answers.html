<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Answers | BELAUG · FFXIV Library</title>
  <meta name="description" content="FFXIV BGM — Answers：Theme、Appears in、Acquisition、Additional Notes、Lyrics，附影片。">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:14px 16px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}

    .kv{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:18px;
      flex-wrap:wrap;
    }
    .kv-label{
      font-weight:800;
      color:var(--fg);
      white-space:nowrap;
      min-width:140px;
    }
    .kv-link{
      font-weight:800;
      color:#0b60d8;
      text-decoration:none;
      line-height:1.2;
    }
    .kv-link:hover{ text-decoration:underline; }

    @media (max-width:520px){
      .kv-label{min-width:110px}
      .stack .row{padding:12px 14px}
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left"><a class="home" href="../index.html">🏠 Home</a></div>
      <div class="right"><button id="langToggle" class="icon-btn" aria-label="切換語言">🌐 EN</button></div>
    </nav>
  </header>

  <main class="container main">
    <div class="grid">
      <section class="card video-card">
        <div class="bd">
          <div class="video-wrap">
            <iframe id="ytFrame" src="https://www.youtube.com/embed/MEQnLG6MTtI" title="Answers" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="hd" id="pageTitle">Answers</div>
        <div class="tabs" role="tablist">
          <button class="tab-btn" role="tab" aria-selected="true"  data-tab="theme">Theme</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="appears">Appears in</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="acq">Acquisition</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="notes">Additional Notes</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="lyrics">Lyrics</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="comments">Comments</button>
        </div>
        <div class="bd">
          <div id="panel-theme"   class="tab-panel active"></div>
          <div id="panel-appears" class="tab-panel"></div>
          <div id="panel-acq"     class="tab-panel"></div>
          <div id="panel-notes"   class="tab-panel"></div>
          <div id="panel-lyrics"  class="tab-panel"></div>
          <div id="panel-comments" class="tab-panel">
            <div id="giscus_container" style="min-height:320px;"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const LANG_KEY='ffxiv-guide-lang';

    // EDIT HERE (optional): default appears link target for this page
    const appearsLinkHref = ""; // no link (patch-wide)

    /* =========================================================
       LYRICS (shared across EN/JP/ZH)
       Paste FULL lyrics below. This will be identical for all
       languages, so the Lyrics tab stays synced when you toggle
       EN/JP/ZH.
       ========================================================= */
    const LYRICS_TEXT = `I close my eyes, tell us why must we suffer
Release your hands, for your will drags us under
My legs grow tired, tell us where must we wander
How can we carry on if redemption's beyond us?

To all of my children in whom Life flows abundant
To all of my children to whom Death hath passed his judgement
The soul yearns for honor, and the flesh the hereafter
Look to those who walked before to lead those who walk after
Shining is the Land's light of justice
Ever flows the Land's well of purpose
Walk free, walk free, walk free, believe...
The Land is alive, so believe...

Suffer (Feel) Promise (Think) Witness (Teach) Reason
(Hear) Follow (Feel) Wander (Think) Stumble (Teach) Listen
(Speak) Honor (Speak) Value (Tell) Whisper (Tell) Mention
(Hope) Ponder (Hope) Warrant (Wish) Cherish (Wish) Welcome
(Roam) Witness (Roam) Listen (Roam) Suffer (Roam) Sanction
(Sleep) Weather (Sleep) Wander (Sleep) Answer
Sleep on

Now open your eyes while our plight is repeated
Still deaf to our cries, lost in hope we lie defeated
Our souls have been torn, and our bodies forsaken
Bearing sins of the past, for our future is taken
War born of strife, these trials persuade us not
(Feel what? Learn what?)
Words without sound, these lies betray our thoughts
Mired by a plague of doubt, the Land, she mourns
(See what? Hear what?)

Judgement binds all we hold to a memory of scorn
Tell us why, given Life, we are meant to die, helpless in our cries?
Witness (Feel) Suffer (Think) Borrow (Teach) Reason
(Hear) Follow (Feel) Stumble (Think) Wander (Teach) Listen
(Blink) Whisper (Blink) Shoulder (Blink) Ponder (Blink) Weather
(Hear) Answer (Look) Answer (Think) Answer together
Thy Life is a riddle, to bear rapture and sorrow
To listen, to suffer, to entrust unto tomorrow
In one fleeting moment, from the Land doth life flow
Yet in one fleeting moment, for anew it doth grow
In the same fleeting moment
Thou must live
Die
And know`;

    function lyricsHtml(){
      return `
        <div class="stack">
          <div class="row">
            <pre style="margin:0;white-space:pre-wrap;word-break:break-word;font:inherit;line-height:1.6">${escapeHtml(LYRICS_TEXT)}</pre>
          </div>
        </div>
      `;
    }
    function escapeHtml(str){
      return String(str)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }

    const i18n={
      EN:{
        langLabel:'EN',
        pageTitle:'Answers',
        tabs:{theme:'Theme',appears:'Appears in',acq:'Acquisition',notes:'Additional Notes',lyrics:'Lyrics',comments:'Comments'},
        theme:`<div class="stack"><div class="row">A Realm Reborn Main Theme</div></div>`,
        appears:`
          <div class="stack">
            <div class="row">
              <div>A Realm Reborn(patch-wide)</div>
            </div>
          </div>
        `,
        acq:`<div class="stack"><div class="row">Materials for synthesis obtained in the Binding Coil of Bahamut - Turn 5, the Second Coil of Bahamut - Turn 4, or the Final Coil of Bahamut - Turn 4.</div></div>`,
        notes:`<div class="stack"><div class="row">Crafted by Level 60 Alchemist (Master Alchemist IV) with Faded Copy of Thunderer, Faded Copy of Rise of the White Raven, and Faded Copy of Answers, dropped in Raid The Binding Coil of Bahamut - Turn 5, Raid The Second Coil of Bahamut - Turn 4, and Raid The Final Coil of Bahamut - Turn 4.</div></div>`,
        lyrics: lyricsHtml()
      },
      JP:{
        langLabel:'JP',
        pageTitle:'Answers',
        tabs:{theme:'テーマ',appears:'登場先',acq:'入手方法',notes:'補足',lyrics:'歌詞',comments:'コメント'},
        theme:`<div class="stack"><div class="row">「新生エオルゼア」メインテーマ</div></div>`,
        appears:`
          <div class="stack">
            <div class="row">
              <div>新生エオルゼア（パッチ全体）</div>
            </div>
          </div>
        `,
        acq:`<div class="stack"><div class="row">合成用素材：レイド「大迷宮バハムート：邂逅編5」「大迷宮バハムート：侵攻編4」「大迷宮バハムート：真成編4」で入手。</div></div>`,
        notes:`<div class="stack"><div class="row">錬金術師Lv60（錬成秘伝書:第4巻）で製作。素材の「古びた譜面:雷鳴」「古びた譜面:白銀の凶鳥、飛翔せり」「古びた譜面:Answers」は、それぞれ上記レイドで入手。</div></div>`,
        lyrics: lyricsHtml()
      },
      ZH:{
        langLabel:'ZH',
        pageTitle:'Answers',
        tabs:{theme:'主題',appears:'登場於',acq:'取得方式',notes:'補充說明',lyrics:'歌詞',comments:'留言'},
        theme:`<div class="stack"><div class="row">A Realm Reborn 主題曲</div></div>`,
        appears:`
          <div class="stack">
            <div class="row">
              <div>新生艾奧傑亞（整個版本主題使用）</div>
            </div>
          </div>
        `,
        acq:`<div class="stack"><div class="row">合成用素材：可於團隊任務 Binding Coil of Bahamut - Turn 5、Second Coil of Bahamut - Turn 4、Final Coil of Bahamut - Turn 4 取得。</div></div>`,
        notes:`<div class="stack"><div class="row">由鍊金術師 60 級（鍊金秘傳書：第 4 卷）製作。素材「Faded Copy of Thunderer」「Faded Copy of Rise of the White Raven」「Faded Copy of Answers」分別可在上述團隊任務取得。</div></div>`,
        lyrics: lyricsHtml()
      }
    };

    const langToggle=document.getElementById('langToggle');
    const pageTitle=document.getElementById('pageTitle');
    const tabBtns=[...document.querySelectorAll('.tab-btn')];
    const panels={
      theme:document.getElementById('panel-theme'),
      appears:document.getElementById('panel-appears'),
      acq:document.getElementById('panel-acq'),
      notes:document.getElementById('panel-notes'),
      lyrics:document.getElementById('panel-lyrics'),
      comments:document.getElementById('panel-comments')
    };

    function getLang(){ return localStorage.getItem(LANG_KEY)||'EN'; }

    function applyLang(lang){
      const t=i18n[lang]||i18n.EN;
      pageTitle.textContent=t.pageTitle;
      langToggle.textContent=`🌐 ${t.langLabel}`;
      tabBtns.forEach(b=>{ b.textContent=t.tabs[b.dataset.tab]; });
      const active=tabBtns.find(b=>b.getAttribute('aria-selected')==='true')||tabBtns[0];
      renderPanel(active.dataset.tab,lang);
      if (active && active.dataset.tab==='comments') loadGiscusForCurrentLang();
    }

    function renderPanel(key,lang){
      const t=i18n[lang]||i18n.EN;
      Object.keys(panels).forEach(k=>panels[k].classList.remove('active'));
      panels[key].classList.add('active');
      if(key!=='comments'){
        panels[key].innerHTML=t[key] || `<div class="stack"><div class="row muted">No content.</div></div>`;
      }else{
        loadGiscusForCurrentLang();
      }
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click',()=>{
        tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab,getLang());
      });
    });

    langToggle.addEventListener('click',()=>{
      const cur=getLang();
      const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
      localStorage.setItem(LANG_KEY,next);
      applyLang(next);
    });

    applyLang(getLang());

    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };
    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }
  </script>
</body>
</html>
