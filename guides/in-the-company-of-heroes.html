    .tab-panel.scroll-panel{
  max-height:420px;

}
.tab-panel.scroll-panel p:first-child{margin-top:0}

<script>

const i18n = {
  EN:{
    langLabel:'English',

    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Y’shtola studies you for a moment and says you look like someone who has been to the seventh hell and back. She can scarcely believe that a guest is expected to supply the victuals for a banquet held in their own honor—especially with the shadow of Titan looming over everyone. Still, she acknowledges your stoicism, admitting that if she had been made to endure such ignominy, she doubts she would have borne it with the same grace.</p>
      <p>Before you can answer, Gegeruju rushes in with frantic apologies. He insists he never knew who you truly were, and says that if he had, he would never have allowed his man to put you through such unspeakable ordeals. A voice nearby remarks that the man must have sensed something was amiss, and Captain Wheiskaet finally drops the pretense—asking if you truly thought he would send you running the length and breadth of Eorzea just for a banquet.</p>
      <p>Y’shtola cuts in, telling the captain to spare you his mockery. She admits his intent was unclear to her until now, and reminds him that, unlike her, you have no knowledge of his traditions—so he should enlighten you. With a grudging sigh, Wheiskaet begins to explain the oath the five of them swore before the Company of Heroes disbanded: anyone who would follow in their footsteps must be weighed and measured, not by reputation, but by deeds. Each of the five would judge a would-be god-slayer by their own criteria, and if even one found the challenger wanting, the attempt would be rejected without hesitation.</p>
      <p>Wheiskaet tells you why they do this. The world is full of brave souls eager to die for a righteous cause, but far fewer who can truly make a difference with their sacrifice. To send wave after wave of hapless adventurers against a foe they cannot hope to defeat would be worse than futile, and Titan is not to be challenged lightly. The five refuse to be complicit in the deaths of the unworthy—yet if a challenger proves worthy, they swear to do everything in their power to support the cause.</p>
      <p>Y’shtola demands their assessment. Landenel calls you brave beyond doubt; U’odh Nunh declares your skill undeniable; Shamani Lohmani says you have shown kindness and generosity; Brayflox Alltalks praises your clever planning. Wheiskaet concurs, declaring you a worthy challenger and calling on you to cast down the Lord of Crags. With the formalities finished, he orders the festivities to begin, and the Company of Heroes raises a cheer to the birth of a new legend—Titan’s Bane.</p>
      <p>As the gathering swells, old friends speak like people who have found something they thought they’d lost: Landenel wonders if the Company might ever reform; Brayflox revels in the feast; Shamani wishes the day would never end; U’odh Nunh savors old wine and open air. Y’shtola offers her thanks, and a reveler urges you to relax. When you taste the exotic meal, a brief, transcendent revelation seizes you—letting you glimpse reality’s true form and cry out in celebration.</p>
      <p>Between music and wine, more voices reach you—some teasing, some earnest. Wheiskaet praises your fortitude; Landenel urges you to deliver his regards to Titan; U’odh Nunh tells you to trust hard-won experience; Brayflox insists you must fight with “clever fighty-think.” Shamani offers steadier counsel: when you face the Lord of Crags, think only of the men and women by your side—fight for them, and they will fight for you, because no great victory is achieved alone.</p>
      <p>At last, Y’shtola returns and says you are kind to indulge them. Whatever they claim, she notes, this banquet is as much for the Company as it is for you—and it is scarcely the time for celebration. The battle with Titan has yet to begin. The hour has come for Captain Wheiskaet to make good on his promise, and she tells you to speak with him again.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true">
      <p>ヤ・シュトラはあなたの顔を見て、まるで地獄の底を往復してきたかのようだと言う。自身を讃える宴のために、招かれた側が食材まで用意させられるなど信じがたい、しかも蛮神タイタンの影が誰の頭上にも重くのしかかっているというのに――そう憤りつつも、彼女はあなたの忍耐を称え、もし自分が同じ屈辱を耐えねばならなかったなら、ここまで上品に受け止められただろうかと漏らす。</p>
      <p>そこへゲゲルジュが駆け寄り、ヤ・シュトラとあなたに向かって平身低頭で詫びる。あなたの正体を知らなかったのだ、知っていれば部下にあのような非道な苦労を課すはずがなかった――そう必死に弁明する彼の背後で、誰かが「異変には気づいていたはずだ」と言い、続いてウェイスケートが、宴のためにエオルゼア中を走り回らせると本気で思ったのか、とあっさり真意を明かす。</p>
      <p>ヤ・シュトラはその嘲りを止めるよう告げ、彼の意図がこの瞬間まで自分にも見えていなかったと認める。そして、あなたは彼らのしきたりを知らないのだから、説明すべきだと促す。ウェイスケートは観念したように口を開き、海雄旅団が解散する前、五人が厳粛な誓いを立てたのだと語る。彼らの後に続く者は、名声ではなく行いによって量られねばならない。五人はそれぞれの基準で挑戦者を裁き、たとえ一人でも不足ありと見なせば、容赦なく退ける。</p>
      <p>ウェイスケートは理由を突きつける。正しき大義のために命を投げ出そうとする勇者は多いが、その犠牲で状況を変えられる者は少ない。勝ち目のない相手へ無力な冒険者を次々と送り込むことは害悪であり、蛮神タイタンは軽々しく挑むべき敵ではない。彼らは値しない者の死に加担するつもりはない――だが、ふさわしさを証明したなら、全力で支えると誓ったのだ。</p>
      <p>ヤ・シュトラは、だからこそ徹底して試したのだろうと皮肉めいて言い、評価を求める。ランデネルは確かな勇気を、ウ・オド・ヌンは腕前を、シャマニ・ローマニは親切で寛大な魂を、ブレイフロクス・オールトークスは才を認める。最後にウェイスケートが同意し、五人はあなたをふさわしい挑戦者と判じると宣言して、岩神を討ち倒し新たな歴史を刻めと告げる。宴の始まりが高らかに告げられ、海雄旅団は「タイタン・ベイン」の誕生を祝して声を上げる。</p>
      <p>再会の喧騒のなかで、仲間たちはそれぞれの想いをこぼす。ランデネルは旅団の再結成に思いを巡らせ、ブレイフロクスはご馳走に満悦し、シャマニ・ローマニはこの日が終わらなければと願う。ウ・オド・ヌンは旧友と古酒に囲まれる今日を良き日だと言い、ヤ・シュトラはあなたへ感謝を告げる。異国の饗宴を口にした瞬間、神秘めいた啓示が走り、あなたは世界の真の姿を垣間見て歓喜の声を上げる。</p>
      <p>軽口と激励があなたへ届く。ウェイスケートは不屈を称え、ランデネルは伝言を叩きつけてやれと笑い、ウ・オド・ヌンは経験を信じろと促す。ブレイフロクスは賢い戦い方を考えねばと喧しく言い立て、シャマニ・ローマニは、そばにいる者たちだけを思い戦えと言う――大いなる勝利は決して独りでは成し得ないのだと。</p>
      <p>やがてヤ・シュトラは再びあなたのもとへ来て、この宴は旅団自身のためでもあるのだと告げる。善意は否定しないが、祝うには時期尚早だ。タイタンとの戦いはまだ始まっていない。良き隊長が約束を果たすべき時が来たのだから、もう一度ウェイスケートと話さねばならない――そう告げる。</p>
    </div>

    acq:`<div class="stack">

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'永遠的海雄旅團',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Y’shtola 一眼就看出你像是從第七層地獄走了一圈回來的人。她無法相信，明明是為了表彰你的宴會，竟然還要你這個「賓客」親自去籌備食材與酒水——更荒謬的是，在 Titan 的陰影正籠罩一切的此刻，居然還有人把這種事當成理所當然。可即便如此，她仍只能稱許你的沉著，坦白說若換作是她被迫承受同樣的羞辱，恐怕很難像你一樣保持體面。</p>
      <p>就在這時，Gegeruju 趕忙上前向 Y’shtola 與你連連致歉，說自己完全不知道你的真正身分；若他早知道，絕不會允許手下讓你受那些「難以啟齒的折磨」。旁邊有人插話，說那人應該早就察覺不對勁，而 Wheiskaet 也不再遮掩，直接反問你：你不會真的以為他會為了辦一場宴會，就讓你跑遍 Eorzea 吧？</p>
      <p>Y’shtola 要 Wheiskaet 收起嘲弄，並承認直到此刻她才看懂他的用意。她提醒他，你不像她那樣了解他們的傳統，所以他有責任把話說清楚。Wheiskaet 解釋他們五人曾在 Company of Heroes 解散前立下誓言：任何想追隨他們腳步的人，都必須被衡量與審視——不是看名聲，而是看行動。五個人各用自己的標準評判「將要討伐蛮神的人」；只要其中任何一人覺得你不夠格，就會毫不猶豫地把你拒於門外。</p>
      <p>他進一步說明理由：世上從不缺願意為正義犧牲的勇者，但真正能用犧牲改變局勢的人卻少得多。若把一波又一波沒有勝算的冒險者送進必敗的死地，那不只是徒勞，而是更糟的事。Titan 從來不是能輕率挑戰的敵人，而他們不願成為「讓不夠格的人去送死」的共犯；但若你證明自己值得，他們也誓言會竭盡所能支援你的目標。</p>
      <p>Y’shtola 要求評估。Landenel 肯定你的勇氣，U’odh Nunh 肯定你的本領，Shamani Lohmani 說你展現善良與慷慨，Brayflox Alltalks 也承認你很會規劃。最後 Wheiskaet 代表五人宣告你是合格的挑戰者，命你推倒 Lord of Crags，Company of Heroes 也一同歡呼，將你稱作 Titan’s Bane。</p>
      <p>在人群的笑聲與再會的喧鬧裡，你聽見他們像是把多年壓在心底的重量暫時放下：Landenel 甚至想著是否能再度結成 Company；Brayflox 沉浸在點心與佳餚裡；Shamani 希望今天永遠不要結束；U’odh Nunh 享受離開 Forgotten Springs 的片刻自由。Y’shtola 也為你至今做到的一切向你致謝；當你品嘗那場異國盛宴時，短暫卻超然的啟示直擊心神，你彷彿瞥見現實真正的形貌，並不由自主地高聲歡呼。</p>
      <p>酒意與樂聲交錯之間，調侃與叮囑接連而來：Wheiskaet 稱讚你的堅韌，Landenel 要你替他向 Titan 問候，U’odh Nunh 要你相信自己征戰無數的經驗，Brayflox 要你用「clever fighty-think」去面對強敵。Shamani 的提醒最為沉穩：上了戰場，就只想著與你並肩的人——為他們而戰，他們也會為你而戰，因為任何偉大的勝利都不可能由一個人獨自完成。</p>
      <p>最後，Y’shtola 再次提醒你：這場宴會其實同樣是為了 Company 而辦，現在仍稱不上適合慶祝——Titan 的戰鬥尚未開始。她要你去找 Wheiskaet，因為該是他兌現承諾的時候了。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 雅·修朵拉　<small class="muted"> 東拉諾西亞 (X:32.6, Y:30.5)</small></div>
    </div>`,

      <div class="row"><a class="link" href="it-was-a-very-good-year.html">人的命運，酒的命運</a></div>

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
