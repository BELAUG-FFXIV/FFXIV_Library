<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`The Gift of Eternity`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Falkbryda’s restraint snaps—she spits venom at the “fishback” Sahagin and swears she will kill them slowly, then chase their rotten souls through all seven hells. Merlwyb cuts her off with steel-cold composure: you are here for a purpose, and vengeance is not it. Falkbryda swallows her rage, apologizes to the Admiral, and vows to keep a clear head.</p><p>Merlwyb shares the report from your sole surviving scout: the Sahagin and their thralls have already begun to amass at the aetheryte in the depths of Sapsa. If you are to act, it must be now. Falkbryda confirms the men are ready, but warns that the Sahagin have tightened security in and around the spawning grounds—any frontal assault will be met with fierce resistance.</p><p>Merlwyb answers that you will not be so artless. You will divide your forces and strike hard and fast at key locations. The ultimate objective is to take the Sapsa aetheryte and eliminate the Sahagin priest presiding over the summoning—you are not here to kill them all. The Maelstrom will engage and distract the Sahagin’s legion of drowned pirates at the Serpent’s Tongue under Falkbryda’s command; the Foreign Levy will spearhead the assault, while subsequent units fan out to cover their flanks. At the selfsame moment, a diversionary squadron of Crimson Fleet galleons will harry the enemy from offshore.</p><p>Minfilia adds that the Scions will form smaller units to confuse the Sahagin’s defensive effort. You and Y’shtola are to make for the summoning site; the Admiral’s diversions should thin the enemy’s defenses and render your path less perilous, allowing a small party to win through without drawing unwarranted attention. Thancred and Yugiri are to lure as many Sahagin as possible out of the spawning grounds, then take to their heels and circle ’round to join you. Once all has been set in motion, Merlwyb herself will cut a path to the aetheryte, accompanied by Lady Minfilia—then she sends you off with a sharp command: to battle. Y’shtola turns to you as you move, remarking that it has been far too long since you last fought side by side, and urges you onward.</p><p>At Halfstone, a Storm Sergeant lays out the reality: to reach the fishbacks’ aetheryte, you will have to fight your way through three checkpoints. It will be no small task, but he and the lads will keep the drowned pirate curs “nice and busy” for you. In the Sapsa Spawning Grounds, the enemy is quickly alerted to your presence—guards hiss threats, call for reinforcements, and drowned blades cry out “For Lord Leviathan!” as you push through tightening resistance.</p><p>Y’shtola keeps you fixed on the goal: the summoning ritual is taking place at the beastman aetherite deep within, and there you must go. With checkpoints obstructing the way, she urges you to dispatch as many enemies as possible to avoid later interference, and to take separate routes before merging at the aetherite to confuse the sentinels. Deeper in, the reality turns uglier still—the Sahagin have made thralls of soldiers and civilians both. Thancred and Yugiri rejoin you, and soon Merlwyb arrives as well. At the ritual site, the Sahagin priest raves at “shorewalkers,” invokes the Lord of the Whorl, and exults as a strange sensation rises—Minfilia recognizes it as the Echo. The priest declares the power transcendent, boasts that he has mastered the gift and become eternal, and offers his own flesh to call Leviathan forth. Merlwyb strikes him down, yet he vanishes in disbelief, cursing an “Emissary” who promised everlasting life. The cost becomes clear at once: the diversionary squadron is lost—nary a single ship remains—and Leviathan makes for open sea. But Merlwyb’s fear sharpens into certainty: he means to unleash a tidal wave, a wall of water carrying more destructive power than aught seen in nature—enough to raze entire coastal settlements, if his last attempt is any guide. And with Leviathan returned, you must find a way to face him on equal terms, before history is repeated.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Falkbryda <small class="muted">(Western La Noscea, X:22.7, Y:22.7)</small></div></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'超える力、不滅なる者',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ファルクブリダの怒りが噴き出す。サハギンを罵り、ゆっくり殺して七重地獄の果てまで追い立ててやると吐き捨てる。だがメルウィブは冷然と言い切る――目的を忘れるな、復讐は目的ではない。ファルクブリダは息を呑み、提督に詫び、冷静さを保つと誓う。</p><p>メルウィブは唯一生きて帰還した偵察兵の報告を告げる。サプサの深部にあるエーテライトへ、サハギンとその眷属が集結し始めている。動くなら今しかない。ファルクブリダは部隊の準備が整っていると答えるが、産卵地周辺の警戒は強化されており、正面攻撃は激しい抵抗に遭うだろうと警告する。</p><p>メルウィブは、無策な正面突撃などしないと言う。戦力を分割し、要所を素早く叩く。最終目標はサプサのエーテライトを確保し、召喚を司るサハギンの司祭を排除すること――皆殺しが目的ではない。ファルクブリダの指揮のもと黒渦団は海蛇の巣穴で溺水した海賊の軍勢を引きつけ、外人義勇兵を先鋒に立て、後続部隊は左右へ展開して側面を守る。同時に紅の艦隊のガレオンが沖合から敵を牽制する。</p><p>ミンフィリアは、暁も小部隊に分かれてサハギンの防衛を撹乱すると告げる。あなたとヤ・シュトラは召喚儀式の現場へ向かえ。提督の陽動が敵の守りを薄くし、少人数でも不必要な注意を引かずに突破できるはずだ。サンクレッドとユウギリは可能な限り多くのサハギンを産卵地の外へ誘い出し、撤退して迂回し、あなたたちの潜入に合流せよ。すべてが動き出したら、メルウィブ自身がミンフィリアとともにエーテライトへ道を切り開く――そう言い、戦場へ送り出す。ヤ・シュトラはあなたに向き直り、共に戦ったのはいつ以来だろうか、あまりに久しいと言って、先を急ごうと促す。</p><p>ハーフストーンでは黒渦団の軍曹が現実を告げる。サハギンのエーテライトへ至るには、三つの関門を突破しなければならない。容易ではないが、溺水した海賊どもはこちらで引きつけておくから前へ進め。サプサ産卵地ではたちまち侵入が察知され、衛兵が威嚇し、増援を呼び、溺水した剣士がリヴァイアサンの名を叫ぶ中、抵抗は狭い道を塞いでいく。</p><p>ヤ・シュトラは要点だけをあなたに刻む。召喚儀式は深部の獣人のエーテライトで行われている――そこへ向かう。関門が多い以上、後の妨害を避けるため、道中で可能な限り敵を排除せよ。そして別々のルートを進み、エーテライトの手前で合流し、見張りを混乱させる。さらに奥で、状況はより醜悪になる――サハギンは兵士も民間人も眷属にしていた。サンクレッドとユウギリが合流し、やがてメルウィブも到着する。儀式の場でサハギンの司祭は「陸の民」を罵り、「渦の王」を呼び、異様な感覚の高まりにミンフィリアは気づく――それは超える力だ。司祭はその力を称えて自らを永遠と誇り、身を捧げてリヴァイアサンを招くと叫ぶ。メルウィブが斬り捨てても、司祭は「使者」に騙されたと呪いを残して消え去る。代償は即座に突きつけられる――陽動の艦隊は壊滅し、一隻も残らず、リヴァイアサンは外洋へ向かった。だがそれで終わりではない。メルウィブは察する――奴は津波を起こすつもりだ。自然現象の域を超えた破壊の壁で、過去と同じく沿岸の集落を消し飛ばしかねない。リヴァイアサンが戻った今、同じ悲劇を繰り返させぬため、あなたは同等の条件で立ち向かう道を探さねばならない。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ファルクブリダ中甲佐 <small class="muted">（西ラノシア, X:22.7, Y:22.7）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="scouts-in-distress.html">海に散る命</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="into-the-heart-of-the-whorl.html">リヴァイアサン掃討作戦</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'超越之力與不滅之人',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Falkbryda 先是徹底失控，咒罵那些「fishback」的 Sahagin，發誓要慢慢殺了他們，再把腐爛的靈魂一路追到七重地獄。Merlwyb 冷冷打斷，提醒你們聚在這裡是為了任務，不是為了復仇；要 Falkbryda 把心思放回眼前的工作。Falkbryda 壓下怒火，向 Admiral 道歉，承諾自己會保持清醒。</p><p>Merlwyb 隨即說明唯一生還斥候帶回的情報：Sapsa 深處的以太水晶（aetheryte）附近，Sahagin 和他們的傀儡（thralls，受支配的兵與民）已開始集結。要動手，就必須是現在。Falkbryda 表示部隊已就位，但也警告，Sahagin 已在 spawning grounds 內外加強戒備，正面強攻很可能會遭到猛烈反擊。</p><p>Merlwyb 回答你們不會那樣蠻幹。你們要分兵，對關鍵位置迅速重擊。最終目標只有兩個：奪下 Sapsa 的以太水晶（aetheryte），並剷除主持召喚儀式的 Sahagin 祭司——你們不是來把敵人殺光的。Maelstrom 會在 The Serpent’s Tongue 牽制並吸引那支「溺水而亡的海盜」軍勢，由 Falkbryda 負責指揮；讓 Foreign Levy 當先鋒突入，後續部隊向兩翼展開掩護側面。同一時間，Crimson Fleet 的戰船也會在外海騷擾敵方，逼他們分心。</p><p>Minfilia 補上 Scions 的安排：你們會分成更小單位，擾亂 Sahagin 的防禦部署。你和 Y’shtola 要直奔召喚儀式現場；Admiral 的佯攻應能削薄守備，讓小隊得以穿過而不致引來不必要的注意。Thancred 與 Yugiri 的任務是盡可能把更多 Sahagin 引離 spawning grounds，完成後立刻撤退繞行，去和你們會合。等所有行動都啟動後，Merlwyb 會依約與 Lady Minfilia 一起開路直取以太水晶（aetheryte）；她一句「出戰」把你們送上前線。Y’shtola 也在你身旁催促，說你們並肩作戰已經是太久以前的事了，現在就走。</p><p>在 Halfstone，Storm Sergeant 把現實講得明明白白：要抵達那些 fishback 的以太水晶（aetheryte），你必須一路打穿三個關卡（checkpoints，設卡封鎖的檢問點）。這不是小事，但他和手下會把那些「溺水而亡的海盜雜碎」牢牢拖住，讓你能專心推進。你一踏入 Sapsa Spawning Grounds，敵人立刻警覺——哨兵嘶聲威嚇、呼叫增援，而「溺水而亡的劍士」高喊「為了 Leviathan」衝上來，阻力在狹窄的通道裡越收越緊。</p><p>Y’shtola 把你的注意力鎖死在核心：召喚儀式正在更深處的「獸人以太水晶」（beastman aetherite，獸人勢力控制的以太水晶）進行，你們必須趕到那裡。她提醒你關卡眾多，最好沿途盡可能清除敵人，避免後續干擾；同時分路前進、再於以太水晶前會合，以混淆敵方哨兵。越往深處，景象越令人作嘔——Sahagin 把士兵與平民都變成傀儡（thralls）。Thancred 和 Yugiri 先後會合，Merlwyb 也趕到；就在儀式現場，Sahagin 祭司狂怒地咒罵「岸行者」（shorewalkers，Sahagin 對陸上人類一方的蔑稱），高喊「渦之主」（Lord of the Whorl，Leviathan 的稱號）降臨。那股異樣的感覺翻湧而起，Minfilia 立刻辨認出來——那是「超越之力」（Echo）。祭司為那力量癲狂，宣稱自己已掌握天賦、已成永恆不滅，甚至要獻出血肉召來 Leviathan；Merlwyb 仍然斬下去，可對方卻在消散中咒罵某個「使者」騙了他「永生」的承諾，隨即消失無蹤。下一秒代價就砸在你們面前：海上的佯攻分隊全軍覆沒，一艘船也沒剩下，而 Leviathan 已朝外海而去——但 Merlwyb 的恐懼更冷、更確定：他要掀起的是海嘯，而且不是尋常的水牆，而是超越自然的毀滅之力，足以夷平整片沿岸聚落。Leviathan 已經回來了，你們沒有時間後悔，只能立刻想出辦法，在不被他主宰的條件下迎戰，阻止歷史重演。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 法爾克布瑞達 <small class="muted"> 西拉諾西亞（X:22.7, Y:22.7)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="scouts-in-distress.html">逝於海中的生命</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="into-the-heart-of-the-whorl.html">利維坦討伐戰</a></div></div>`

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
