<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trial by Turtle | BELAUG · FFXIV Library</title>
  <meta name="description" content="MSQ – Trial by Turtle (ARR Patch 2.0)">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left">
        <a class="home" href="../index.html">🏠 Home</a>
      </div>
      <div class="right">
        <button id="langToggle" class="icon-btn" aria-label="切換語言">English</button>
      </div>
    </nav>
  </header>

  <main class="container main">
    <div class="grid">
      <!-- 左：影片 -->
      <section class="card video-card">
        <div class="bd">
          <div class="video-wrap">
            <iframe id="ytFrame" src="https://www.youtube.com/embed/9KKb4xxfVwk"
              title="Trial by Turtle" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <!-- 右：標題 + Tabs -->
      <section class="card">
        <div class="hd" id="pageTitle">Trial by Turtle</div>
        <div class="tabs" role="tablist">
          <button class="tab-btn" role="tab" aria-selected="true"  data-tab="story">Story</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="acq">Acquisition</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="unlockq">Unlock Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="followq">Follow-Up Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="comments">Comments</button>

          <div id="panel-story"   class="tab-panel active"></div>

          <div id="panel-followq" class="tab-panel"></div>
          <div id="panel-comments" class="tab-panel">
            <div id="giscus_container" style="min-height:320px;"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Trial by Turtle',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Landenel stops you with a hard look and makes one thing unmistakably clear: whatever arrangement exists between you, him, and the captain must remain secret. He speaks with the easy confidence of someone who’s lived a life most Gridanians would never forgive—and he has no intention of letting that past catch up with him now.</p>
      <p>He even sounds almost fond when he recalls the days he spent with the Company of Heroes: roaming the world, crossing paths with interesting people, and killing them. But here in Gridania, he says, people rarely offer second chances—Detoh being a rare exception. That is why he has gone to great lengths to appear beyond reproach, pretending to have no appetite for drinking, whoring, gambling, or any of the vices he claims to miss. If you expose his little performance by speaking too freely, he promises he’ll string a noose from your entrails and hang you from the nearest pillar.</p>
      <p>With the warning delivered, he turns brusque and impatient. To the east lies a nest with a perfectly good giant adamantoise egg—ripe for the taking, if you’re foolish enough to try. He scoffs that he doesn’t expect you to live long enough to claim it, then adds the real danger: the mother never strays far, and the moment you lay hands on the egg, she will come for you.</p>
      <p>And then, as if trying one last time to drive the point home, he tells you there will be other heroes. You do not need to challenge the Lord of Crags. Abandon this path, he says, or your corpse will rot in the swamp.</p>
      <p>Even so, you make for Rootslake. The air itself feels wrong—like something has already noticed you—and when you close in on the nest, that hostile presence becomes impossible to ignore. You take the egg anyway, and the promised violence follows. Somehow, you manage to escape with your life—and with the prize still in your grasp.</p>
      <p>Back at Camp Tranquil, Landenel sounds almost amused that you’re still standing there. Your refusal to leave tells him you mean to see this through to the bitter end, and he throws back his head and laughs—bravery and recklessness, he says, will serve you well against Titan. He takes the egg from you, assuring you he’ll see it delivered to the captain, and orders you onward at once: make haste to southern Thanalan, to Forgotten Springs, where U’odh Nunh will be your next guide.</p>
      <p>At Forgotten Springs, U’odh Nunh meets you with a curt demand to state your business, followed by a snorting laugh. So you’re the one Wheiskaet has sent. He says he can’t yet see what Wheiskaet sees in you—and until he does, you will receive no aid from him.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Landenel <small class="muted">South Shroud (X:16.8, Y:28.2)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="a-modest-proposal.html">A Modest Proposal</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 30 or above)</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="the-perfect-prey.html">The Perfect Prey</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'アダマンタスの大卵',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ランドゥネルはあなたを鋭く見据え、まず条件を突きつける。あなたと自分、そして大尉――その三者に関わる話は、決して口外するな。黒衣森の人々は概して容赦がなく、過去に傷があればたちまち足を引かれる。彼はそれを痛いほど知っていた。</p>
      <p>英雄団で過ごした日々を、彼は少しも悔いていないという。世界を巡り、面白い相手に出会い、そして殺す――それは痛快な遊びだった。だが、グリダニアの連中は許さない。デトーだけが稀な例外だ、と吐き捨てるように言い、だからこそ自分は「模範的な市民」に見えるよう徹底してきたのだと続けた。酒も、女も、賭け事も、かつて恋しかった諸々の道楽も、いまは好まぬふりをしている。もしあなたが余計なことを喋ってこの芝居を台無しにするなら、腸で縄を作り、近くの天を衝く柱から吊るしてやる――脅しは、冗談めいていない。</p>
      <p>言うべきことを言い切ると、ランドゥネルは急かす。東にある巣には巨大なアダマンタスの卵がある。盗み出すには今が好機だろう――もっとも、そこまで生き延びられるとは思っていないがな、と嘲る。そして本題を告げた。母親は子から決して遠く離れない。卵に手をかけた瞬間、必ず襲われる。</p>
      <p>さらに彼は、突き放すように言い残す。英雄はほかにもいる。あなたが岩神タイタンに挑む必要はない。ここで引き返せ。さもなくば、この湿地で屍が朽ちるだけだ――。</p>
      <p>それでもあなたはルーツレイクへ向かう。肌を刺すような敵意が漂い、近くに危険が潜んでいることを本能が告げる。巣へ踏み込み、卵を奪い取った瞬間、忠告どおりの猛襲が襲いかかる。それを振り切り、あなたは卵を抱えたまま、辛うじて生還する。</p>
      <p>キャンプ・トランキルへ戻ると、ランドゥネルは意外そうに、そして愉快そうに笑った。まだここにいるということは、最後までやり抜く気なのだろう――そう理解した彼は哄笑し、勇敢さと無謀さはタイタン相手に役立つ、と言う。卵は預かる、大尉へ届けておく――そう告げると、次は南ザナラーンへ急げと命じた。忘れられたオアシスにいるウ・オド・ヌンが、次の案内役だという。</p>
      <p>忘れられたオアシスで、ウ・オド・ヌンは用件を言えと短く迫り、鼻を鳴らして笑う。ヴェイスケートが寄越したのは、おまえか。彼はなお見定めるように言い放つ。ヴェイスケートが何を見込んでいるのか、まだわからない――それがわかるまでは、助けなど与えん。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ランドゥネル <small class="muted">黒衣森：南部森林 (X:16.8, Y:28.2)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="a-modest-proposal.html">エオルゼアの珍味を求めて</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 30～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="the-perfect-prey.html">ウ族の試練</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'堅鋼龜的巨蛋',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Landenel 先用銳利的目光把你釘在原地，然後把規矩說得清清楚楚：你、他，還有那位隊長之間的這件事，必須永遠是秘密。在 Gridania，過去一旦被翻出來，就不會有人替你留情——而他不打算讓自己落到那種下場。</p>
      <p>他提起自己曾在 Company of Heroes 的日子時，語氣甚至帶著一絲愉快：走遍世界、遇見有趣的人、再把對方殺掉——對他而言，全都是痛快的樂事。可他隨即冷冷補上一句：大多數 Gridania 人都不寬容，Detoh 算是罕見的例外。也因此，他才得費盡心力把自己裝成「模範市民」——彷彿不愛喝酒、不碰嫖賭，對那些他口中「非常想念」的嗜好毫無興趣。你若是多嘴，讓他的偽裝破功，他就會用你的內臟做成繩索，把你吊在最近的高柱上。</p>
      <p>警告說完，他立刻催你動身。東邊的巢穴裡有一顆巨型 adamantoise 的蛋，正好下手——但他冷笑著表示，他不指望你能活到把蛋帶回來。因為母獸從不會離幼獸太遠，你一碰到那顆蛋，攻擊就會立刻降臨。</p>
      <p>接著他又用近乎冷酷的語氣丟下最後一句：世上還會有別的英雄，你不必去挑戰 Lord of Crags、也不必去挑戰 Titan。現在就放棄，否則你的屍體只會在這片沼地裡腐爛。</p>
      <p>即便如此，你仍朝 Rootslake 前進。空氣像被拉緊一樣，敵意貼著你的皮膚逼近，讓你明白有什麼東西早已盯上你。你闖進巢穴，伸手奪走那顆蛋的瞬間，Landenel 的警告成了現實——猛烈的襲擊迎面而來。你硬生生撐過去，帶著蛋逃出來，並活著回到 Camp Tranquil。</p>
      <p>當你再次站到 Landenel 面前時，他似乎對你還能回來感到意外，旋即放聲大笑。你仍留在這裡，代表你打算一路撐到最後——而他說，你這份既勇敢又魯莽的性子，面對 Titan 也許正好派得上用場。他把蛋收下，說會轉交給隊長，接著毫不拖泥帶水地命你立刻前往 southern Thanalan：在 Forgotten Springs 找到 U’odh Nunh，他會是你的下一位引路人。</p>
      <p>到了 Forgotten Springs，U’odh Nunh 用粗硬的語氣要你報上來意，隨即哼笑出聲。原來你就是 Wheiskaet 派來的人。他直言自己還看不出 Wheiskaet 究竟看上你哪一點——在他弄明白之前，你別想從他這裡得到任何協助。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 朗德內爾 <small class="muted"> 黑衣森林南部林區 (X:16.8, Y:28.2)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="a-modest-proposal.html">艾奧傑亞的珍味</a></div>
      <div class="row">所有職業（不含限定職） 等級 30 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="the-perfect-prey.html">烏氏的試煉</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
