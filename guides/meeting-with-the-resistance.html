  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}

    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}

    .right{display:flex;align-items:center;gap:8px}

    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}

    .card .bd{padding:16px}

    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}

<script>
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Meeting with the Resistance',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Minfilia doesn’t keep you guessing for long. The Ala Mhigan among the Scions is named Haribehrt, she tells you—a man who joined their cause because he still believes there must be a way to free Ala Mhigo. He pours himself into that hope without sparing effort, and she’s confident he’ll be glad to help you. Haribehrt is between missions at the moment, so she sends you to look for him in the storage area.</p>
      <p>Even as she points you onward, Minfilia’s unease lingers. The Ascians have grown brazen enough to work in plain view, she says, and their designs must be uncovered before the realm pays the price. She is relying on you—then you turn from the solar and follow the instruction she gave, searching the quieter corners of the Waking Sands.</p>
      <p>In the storage area, Haribehrt greets you with energetic familiarity, calling you the Scions’ rising star and asking what he can do. When you explain that you need to win the trust of the people of Little Ala Mhigo, his expression tightens into something like sympathy. It’s a daunting task, he says—daunting even for their own countrymen.</p>
      <p>He wants to help. Yet he admits the bitter truth: his name no longer carries weight with that lot. He used to be part of the Ala Mhigan Resistance, but he left them to join the Scions. His allegiance changed, but his purpose did not—he still fights for the liberation of Ala Mhigo. Still, whatever his reasons, the people he left behind see only abandonment. He abandoned his comrades, and they want nothing to do with him now.</p>
      <p>But Haribehrt doesn’t leave you empty-handed. Even if he no longer has friends in the Resistance, he knows someone who does—someone whose ties are still alive and sharp. Her name is Albreda, and she lives in Quarrymill. When you meet her, he tells you, say his name. She won’t lead you astray.</p>
      <p>You travel to Quarrymill and find Albreda exactly as Haribehrt’s warning implies—hard-edged, wary, and quick to anger. When you ask her to introduce you to the Resistance, she laughs like it’s an insult and demands a reason. Why should she do anything for you?</p>
      <p>Then you say Haribehrt sent you, and the air shifts. Her anger flares hot and personal. She calls him a worthless whoreson—he abandoned his comrades, he abandoned his woman, and now he has the gall to ask her for a favor. The words come out like they’ve been waiting a long time.</p>
      <p>But her fury doesn’t hold. It breaks against the truth she can’t quite deny. With a frustrated sigh, Albreda admits she knows Haribehrt did what he believed was right. He is a good man. And if he trusts you, then that is enough for her. She turns your attention to a man nearby and names him with purpose: Meffrid, a captain of the Resistance. If you need what the Ala Mhigans at Little Ala Mhigo refused to give you, she says, he is the one who might be able to.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Minfilia <small class="muted">The Waking Sands (X:6.9, Y:6.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="foot-in-the-door.html">Foot in the Door</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 26 or above)</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="killing-him-softly.html">Killing Him Softly</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'アラミゴ解放軍を知る者',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ミンフィリアは、暁の血盟にいるアラミゴ出身者の名を告げる。ハリベルト――彼は、いつか故郷アラミゴを解放する道を見いだせるかもしれないという希望を抱いて、暁の血盟に加わったのだという。その願いのために力を惜しまぬ男であり、あなたの助けになることを喜ぶはずだ、と。今は任務の合間にあるから、砂の家の物置付近を探してみるようにと案内される。</p>
      <p>そしてミンフィリアは、話を締めるように胸中の懸念を口にする。アシエンは公然と動くほど大胆になっている――その闇の企みを暴き、対策を講じねばならない。あなたを頼りにしている、と。あなたはその言葉を背に、指示どおり砂の家の奥へ向かう。</p>
      <p>物置でハリベルトはあなたを見つけると、暁の血盟の新星だと明るく声をかけ、何か用かと尋ねる。リトルアラミゴの民の信頼を得たいのだと告げると、彼はその難しさを即座に理解し、同情めいた表情になる。あそこは厄介だ、と。自分たち同胞にとってさえ困難なのだから、と。</p>
      <p>助けたい気持ちは本物だが、彼は苦い現実も明かす。今の彼の名は、あの者たちには通らない。かつて彼はアラミゴ解放軍の一員だったが、暁の血盟に加わるためにそこを離れた。忠誠を誓う先は変わっても、目的は同じ――アラミゴ解放だ。だが理由がどうあれ、残された仲間から見れば彼は裏切り、あるいは見捨てた男に映る。だから彼らは、もう彼と関わろうとしないのだという。</p>
      <p>それでも彼は道を示す。解放軍に友人はいなくなっても、友人を持つ者なら知っている――アルブレダという女だ。彼女はクォーリーミルに住んでいる。会ったら自分の名を出せ、とハリベルトは言う。そうすれば、彼女はあなたを誤った道へは導かない、と。</p>
      <p>あなたは黒衣森へ向かい、クォーリーミルでアルブレダを見つける。彼女は、いきなり解放軍への紹介を頼むあなたに噛みつくように笑い、なぜ自分がそんなことをしなければならないのか、理由をひとつ挙げろと迫る。そこでハリベルトに頼まれたと告げた瞬間、彼女の怒りは個人的な熱を帯びて噴き上がる。あいつは仲間を捨て、女も捨てておいて、今さら頼みごとか――と、罵り言葉が止まらない。</p>
      <p>だが彼女は、吐き出した感情に自分で息を詰まらせるように、やがて苛立ち混じりに言葉を飲み込む。ハリベルトは自分が正しいと思うことをしただけだ、と。いい男だ、と。そして彼があなたを信じるなら、それで十分だ、と。アルブレダは近くにいる男を示し、メフリッド――解放軍の隊長だと教える。あなたが求めるものは、彼が与えてくれるかもしれない、と。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ミンフィリア　<small class="muted">西ザナラーン (X:6.9, Y:6.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="foot-in-the-door.html">そこに故郷の形見はあるか</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 26～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="killing-him-softly.html">無慈悲な精霊</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'阿拉米格解放軍',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Minfilia 很快就把你需要的人指出來。她說 Scions 裡那位 Ala Mhigan 同伴名叫 Haribehrt——他加入你們的陣營，是因為他依然抱著希望：或許能找到解放 Ala Mhigo 的方法。Minfilia 說他為了那個目標不遺餘力，也相信他會很樂意協助你。她記得 Haribehrt 目前正好在兩個任務之間，於是要你去 storage area 找他。</p>
      <p>她把話交代完，卻仍忍不住回到更沉重的現實：Ascians 竟然大膽到在眾目睽睽下行動。你們必須揭開他們黑暗的企圖，好在事情惡化前做出對策。Minfilia 說她正倚賴你——於是你依照指示，離開 The Solar，往 The Waking Sands 的較偏處走去。</p>
      <p>你在 storage area 找到 Haribehrt，他一見到你就熱情招呼，稱你是 Scions 的 rising star，問你是否需要幫忙。當你說你想贏得 Little Ala Mhigo 的信任時，他的反應立刻變得凝重——那確實是個艱難的任務，他說，甚至對他們自己的 countrymen 都不容易。</p>
      <p>Haribehrt 表示他很想幫你，但他也坦白：他的名字在那群人之間已經不再有分量了。因為他曾是 Ala Mhigan Resistance 的一員，後來卻離開了 Resistance，轉而加入 Scions。Haribehrt 強調，雖然 allegiance 改變了，但他的目的從未改變——他仍然只為了解放 Ala Mhigo。然而不論他當初有什麼理由，在那些留下來的人眼中，他終究是「拋下同伴」的人，他們不會再願意和他有任何牽連。</p>
      <p>可他並沒有讓你卡在原地。即使他在 Resistance 裡已經沒有朋友，他仍知道有一個人還保有那樣的連結。她叫 Albreda，住在 Quarrymill。Haribehrt 要你去見她時提他的名字，說她不會把你帶偏。</p>
      <p>你來到 Quarrymill，找到 Albreda。你一開口就請她替你引見 Resistance，她立刻用嘲諷的笑聲回敬你，反問你：她憑什麼要做這種事？要你給她一個理由。</p>
      <p>你說 Haribehrt 叫你來的，那一句像是點燃了她壓了很久的火。她暴怒地罵 Haribehrt 是個 worthless whoreson——他拋棄了同伴、拋棄了她，現在居然還有臉來求她幫忙，簡直不可思議。</p>
      <p>可她的怒氣終究沒有一路燒到底；在一聲沉重的嘆息後，Albreda 像是逼自己吞下那些刺痛，承認 Haribehrt 只是做了他認為正確的事，他其實是個好人。既然 Haribehrt 信任你，那她也不需要更多理由。她指向附近的一名男子，告訴你那是 Meffrid——Resistance 的 captain。你想要的東西，也許他能給你。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 敏菲利亞　<small class="muted"> 砂之家 (X:6.9, Y:6.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="foot-in-the-door.html">故鄉之土重於金</a></div>
      <div class="row">所有職業（不含限定職） 等級 26 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="killing-him-softly.html">冷酷的森林聖靈</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
