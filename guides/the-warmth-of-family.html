    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Koana returns with a new calm in his voice, and you hear him put into words what he has finally come to understand: the hhetso sustain the Hhetsarro as they grow, offering warmth and companionship in a harsh and unpredictable world. They are not beasts to be tamed, but equals—and because rroneek are so sensitive, even care meant to help them must never become control. The Hhetsarro would not cage them, and neither should you; trying to dictate their migrations or capture those who stray near the tracks cannot be the answer.</p><p>With that settled, you press on with the original question. You learn that the once-favored grazing grounds show no obvious problem in the grass itself, yet the plain feels wrong—too quiet. Not only are the rroneek gone, but even birds and field mice have fled, and a pack of ceratoraptors you encountered seemed to be moving through in haste. Koana notes that such behavior often accompanies natural disasters, but Erenville has already measured the area’s aether and found nothing suggesting a recent disruption. Still, he did detect an anomaly: a strong aetheric signature moving slowly across the plain to the east.</p><p>You and Koana draw the same conclusion as the signs add up—a powerful creature, likely a predator. Wuk Lamat adds what she saw: a raptor with part of its tail bitten off by something with very large fangs. When Hhwato voices a fear—could it be a tturuhhetso?—you hear the name explained: a “rroneek reaver,” a creature with scales tough as adamant, one that neither horn nor arrow can pierce, and one that can take hhetso in the night. It does not belong this far from its usual range, yet the cause of the rroneek’s panic is suddenly clear. Koana decides the next move without hesitation: drive the reaver away so the herd can return in peace.</p><p>When the danger closes in, panic spreads across the plains. A trader cries for help, warning that a tturuhhetso is coming, and you are told the beasts are in turmoil while the rroneek are nearly paralyzed with fear. You help calm and herd the rroneek to safety, searching for stragglers and refusing to leave any behind. Then the reaver appears—impenetrable scales and wicked fangs—and Koana throws himself into its path, determined to save the hhetso even if it costs his life. You keep the creature busy while he searches for a weakness, until he identifies a protective current of aether flowing through the scales. Tracing it to the point of greatest density, he fires a piercing shot to the chest and stems the flow. With the reaver’s protection broken, you press in, disperse its aether before it can recover it, and bring the fight to an end.</p><p>Afterward, you learn the rroneek have all reached Mehwahhetsoan safely, and the surrounding fauna have begun to settle. Hhwato thanks you—and especially Koana—for acting without hesitation. Koana calls it a Dawnservant’s duty, yet his mind is already turning to what he observed: the scales’ astounding aetherial conductivity. He proposes repurposing them into a device that emits controlled pulses of aether—pulses resembling that of the predator the rroneek fear most. If tuned to the right balance, it could deter those who wander near the railroad without causing undue distress.</p><p>Then a trader’s words cut deeper than the battle. He recalls a camp in Loazeniheta obliterated in an instant by a reaver more than twenty years ago. In the chaos, he fled with only token belongings, but he remembers a young couple running toward the monster, shouting that they would distract it—begging someone to save their son and save the hhetso. Survivors later reunited with their remaining rroneek and moved on, but many were never seen again, including the brave couple. When Koana asks what became of the child, the trader cannot say—and admits the wilderness would have been cruel to a little one alone.</p><p>Koana answers quietly with a possibility that matches his own life: perhaps a passing Pelu merchant—and, one day, the Dawnservant himself. He realizes the truth he could not face before: his parents did not abandon him to follow the rroneek—they tried to keep him safe. All these years, he resented them, when in fact they gave him everything he has now: the chance to know the warmth of family even after they were gone. And as Dawnservant, he declares that all of Tuliyollal is his family—a family he will always protect as his parents protected him.</p><p>With the reaver driven off, you return to the practical work. You now have both the root cause of the rroneek’s changed behavior and the material to create an added safeguard—a silent “whistle.” Back at Shaaloani Station, the crew finishes a new locomotive, rebuilt with spare parts outside and refurbished within, and the track itself adjusted from ballast to ties so it runs quiet as a field mouse. Using the aetherial whistle made possible by the scales you brought, you test it on a rroneek ahead: it moves away, while the rest of the herd remains unperturbed. The result is clear—those who wander too close can be warned without distressing the others. With that, the Xak Tural railroad is declared back in service, and you leave knowing people can come and go more freely, while the herd is protected without being controlled.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="crossroads.html">Crossroads</a></div><div class="row"><a class="link" href="laying-new-tracks.html">Laying New Tracks</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'王の家族',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>コアナは静かな確信を帯びた声で語り始める。あなたは、彼がついにヘッソの意味を理解したのだと知る。ヘッソは、ヘッツァロの成長を支え、過酷で予測のつかない世界のなかで、ぬくもりと寄り添いを与えてきた。彼らは飼い慣らすべき獣ではなく、人に等しい存在だ。さらにルーニークは繊細であり、傷を手当てしたり毛並みを整えたりすることはできても、彼らの本能と、生き延びる土地を求める自由を奪ってはならない。ヘッツァロが彼らを檻に入れないように、あなたたちもまた、移動の流れを支配したり、線路に近づいた個体を捕らえたりすることはできない──それが結論となる。</p><p>では何が原因なのか。あなたは改めて当初の調査に戻る。かつて好まれていた放牧地の草は問題ないように見えるのに、平原は不自然なほど静まり返っている。ルーニークだけではない。鳥も野ネズミも姿を消し、遭遇したケラトラプトルの群れでさえ、焦るように通り過ぎていった。コアナは、こうした動物相の異変は地震や地滑りなどの自然災害に伴うことが多いと言うが、エレンヴィルは念のために乙太を測定し、最近の環境攪乱を示す兆候はないと断じる。だが一つだけ異常があった。東方で、強い乙太の反応が平原を横切るように、ゆっくりと移動していたのだ。</p><p>あなたは、その反応が大きな獣のものではないかと考え、コアナもまた、強力な捕食者である可能性を示す。ウクラマトは、尾に大きく噛み取られた跡のある個体を見たと言い、巨大な牙を持つ何かがいることが裏付けられる。そこへフワトが恐る恐る名を口にする──トゥルルヘッツォではないのか。言葉の意味はすぐに説明される。共通語で「ルーニークの奪い手」、夜にヘッソを奪う牙を持つもの。角や矢で退けられる捕食者は多いが、トゥルルヘッツォの鱗は堅牢で、角も矢も通らないという。なぜ本来の縄張りを離れ、群れもなくここまで来たのかは分からない。それでも、ルーニークが怯える理由は明白となり、次にすべきことも定まる。コアナは、その奪い手を追い払って、彼らが安らかに放牧地へ戻れるようにすると告げる。</p><p>やがて平原は恐怖に染まる。交易人が助けを求め、トゥルルヘッツォがこちらへ向かっていると叫ぶ。周囲の獣は混乱し、ルーニークは恐怖で動けなくなりかけているという。あなたはまず、彼らを落ち着かせ、群れを安全な場所へ導く。遅れた個体を探し、誰ひとり置き去りにしない。その最中、奪い手が姿を現す。貫けぬ鱗と凶悪な牙──疑いようもない。コアナは命を賭してでもヘッソを救うと前に出る。あなたは獣を引きつけ、彼が弱点を探す時間を稼ぐ。やがて彼は、鱗を介して流れる防護の乙太の流れを見抜き、密度が最も高い一点へ辿り着く。胸へ貫通弾を撃ち込み、防護の流れを断つ。守りを失った奪い手に畳みかけ、回収される前に乙太を散らし、ついに討ち果たす。</p><p>戦いの後、ルーニークは全てメワヘッツォアンへ避難できたと報告され、周囲の動物相も落ち着きを取り戻しつつある。フワトはあなたたちに、そして何よりコアナに感謝し、躊躇なく命を賭したことを讃える。コアナはそれをドーンサーヴァントの務めだと言いながら、鱗の乙太伝導性に目を向ける。制御された乙太の脈動を発する装置に転用できるかもしれない──それは、ルーニークが最も恐れる捕食者の乙太に似せたものだ。適切な加減を見つければ、線路へ近づく個体だけを遠ざけ、群れ全体を怯えさせずに済むという。</p><p>だが交易人の回想が、別の痛みを呼び起こす。彼は二十年以上前、ロアゼニヘタの野営地が奪い手に一瞬で壊滅させられた夜のことを語る。混乱の中、彼は形見の品だけを掴んで逃げたが、若い夫婦が怪物へ向かって走り、気を引くから息子を、そしてヘッソを救ってくれと叫んでいたのを聞いたという。生存者は残ったルーニークと再会して移動したらしいが、多くは戻らず、勇敢な夫婦もまた姿を消した。コアナが子どもの行方を問うと、交易人は知らないと答え、幼子がひとりで荒野に残されて無事である望みは薄いと語る。</p><p>コアナは、しかし別の可能性を静かに口にする。通りかかったペルの商人が救い、やがてドーンサーヴァントが見出すこともあるのだと。彼はようやく悟る。両親はルーニークを追って自分を捨てたのではない。自分を守ろうとしたのだ。長年抱いてきた憎しみは誤りで、彼が今ここにあるのは両親の行為があったからだ。家族のぬくもりを知れたのは、彼らが去った後でさえ、その道が残されていたからだ。そしてドーンサーヴァントとなった今、トライヨラの民すべてが自分の家族であり、両親が自分を守ったように、必ず守り抜くと誓う。</p><p>やるべきことは現実へ戻る。奪い手を退けたことで放牧地を避けていた根は断たれ、さらに追加の安全策となる「音のない笛」を作るための材料も得た。シャーローニ駅では新しい機関車が仕上がり、外装は予備部品で繋ぎつつ、内装は整えられ、道床から枕木まで調整して野ネズミのように静かに走れるようにしてある。あなたは、持ち帰った鱗が可能にした「乙太の笛」を試し、前方のルーニークが離れていく一方で、周囲の群れは動じないことを確かめる。近づきすぎた個体だけを知らせ、他を不安にさせない。その成果をもって、シャークトラル鉄道は運行再開を宣言され、あなたは、人々がより自由に行き来でき、なおかつヘッソの自由も守られる未来を見届ける。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> コーナ <small class="muted">（シャーローニ荒野, X:27.3, Y:10.9）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="guidance-of-the-hhetso.html">ヘイゾを知る</a></div><div class="row">ファイター ソーサラー（リミテッドジョブを除く）Lv 100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="crossroads.html">未知との邂逅</a></div><div class="row"><a class="link" href="laying-new-tracks.html">お得意様ニトウィケ</a></div></div>`
  },

    story:`<div class="clamp" data-collapsed="true"><p>Koana 回到你們面前時，語氣多了一種安定。他說自己終於明白 hhetso 的意義：牠們在 Hhetsarro 成長的過程中滋養他們，並在殘酷又難以預測的世界裡，帶來溫暖與陪伴。牠們不是必須被馴服的野獸，而是能與人並列的存在。更重要的是，rroneek 很敏感；你們可以替牠們療傷、也可以梳理毛皮讓牠們更健康，但牠們必須永遠保有追隨本能、尋找能生存的土地的自由。Hhetsarro 不會把牠們關進籠子，你們也不該如此──想要控制牠們的遷徙、或把靠近鐵軌的個體抓起來，根本不是選項。</p><p>於是你們回到最初的線索。你們親眼看過 rroneek 曾偏好的放牧地：草看起來沒有問題，可整片平原卻安靜得不自然──不只 rroneek 消失，連鳥與田鼠都逃得一乾二淨；你們遇到的一群 ceratoraptors 也像是匆忙路過。Koana 說，動物這樣的反應通常與地震、山崩之類的天災有關；但 Erenville 為求確定，測過那裡的乙太後表示，沒有任何跡象顯示近期發生過環境擾動。不過，他的確注意到一個異常：在東方，有一道強烈的乙太反應正緩慢地橫越平原、一路移動。</p><p>你提出那可能是大型動物，Koana 也立刻接上：而且恐怕很強，從周遭動物的表現看，很可能是掠食者。Wuk Lamat 補充說，你們看到的一隻 raptor 尾巴像被咬掉一塊──下口的東西牙齒一定很大。Hhwato 聽到這裡，忍不住說出一個名字：會不會是 tturuhhetso？當 Koana 追問，有人立刻解釋：那用通用語可以說成「rroneek reaver」，也被形容成「在夜裡偷走 hhetso 的獠牙」。rroneek 的角能抵擋許多掠食者，但 tturuhhetso 不行；牠的鱗片堅硬得像 adamant，無論角還是箭都刺不穿。牠不該出現在離原本活動範圍這麼遠的地方，可 rroneek 驚惶的原因此刻已經清楚。Koana 立刻下定決心：你們必須把這頭 reaver 趕走，讓 rroneek 能回到放牧地、平靜生活。</p><p>當危機逼近，恐慌很快在平原蔓延。一名 Trader 驚恐呼救，喊著 tturuhhetso 正往這裡來；你聽見周遭的野獸都陷入驚慌，而 rroneek 幾乎被嚇得動彈不得。你們先設法安撫牠們，把牠們引導到安全處，再回頭找落單者，誰都不能被留下。接著，那頭 reaver 現身：鱗片堅不可摧、獠牙兇惡。Koana 不顧自身安危衝上前，說就算要付出性命也要救下 hhetso。你拖住牠，替他爭取時間找弱點，直到他發現鱗片之間有一道「保護性的乙太流」在流動；他追溯到密度最高的關鍵點，以一發貫穿彈擊中胸口，切斷保護。你們趁勢逼近，在牠恢復前打散外溢的乙太，最終結束戰鬥。</p><p>戰後你得知 rroneek 已全數回到 Mehwahhetsoan，周遭動物的騷動也逐漸平息。Hhwato 向你們致謝，並特別感謝 Koana 毫不遲疑地涉險。Koana 說這是 Dawnservant 的責任，但他也立刻提到自己觀察到的事：鱗片的乙太傳導性驚人，或許能改造成一種能發出「可控乙太脈衝」的裝置──模擬 rroneek 最害怕的掠食者的乙太，並調整到合適強度，如此便能讓靠近鐵軌的個體退開，卻不致讓整群 rroneek 陷入恐慌。</p><p>就在這時，一名 Trader 回想起二十多年前的慘劇：Loazeniheta 的一座營地曾在一夜之間被 reaver 摧毀。混亂中他逃命，卻仍記得有一對年輕夫妻朝怪物衝去，大喊要分散牠注意力，求旁人救救他們的兒子與 hhetso。之後，部分倖存者似乎與剩下的 rroneek 重聚並離去，但更多人再也沒有出現，包括那對勇敢的夫妻。Koana 追問那孩子的下落，對方只能說不知道，荒野對落單的幼兒太過殘酷。</p><p>Koana 低聲說出一種可能：也許會有路過的 Pelu 旅行商人；也許有一天，甚至會遇上 Dawnservant。直到此刻，他才真正看清自己長年誤解的真相──父母不是拋棄他去追隨 rroneek，而是想保護他。他把太多時間浪費在怨恨上，卻忽略了：正因為他們，他才活到今天，才得以在他們離去之後仍感受到家人的溫度。如今他身為 Dawnservant，Tuliyollal 的所有人都是他的家人；而他會永遠守護這個家，正如他的父母曾守護他一樣。</p><p>你們回到實務工作。你們已找出 rroneek 行為改變的根源，也拿到打造額外防護措施的材料──像是一種「無聲的汽笛」。回到 Shaaloani Station，工班完成新的火車頭，外觀以備品拼裝、內部翻修整備；軌道也從道碴到枕木逐段調整，讓列車能「像田鼠一樣安靜」地行駛。你們用鱗片製作的乙太「汽笛」進行測試：前方那隻 rroneek 立刻遠離，旁邊的同伴卻完全不受影響。成果很明確──能提醒走得太近的個體，卻不驚擾整群。於是 Xak Tural 鐵路宣布正式恢復運行，你離開時明白：人們終於能更自由往返，而 rroneek 也能在不被控制的前提下得到保護。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
