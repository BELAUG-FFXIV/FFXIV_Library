<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`A Reward Long in Coming`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Even after everything that has happened, Haurchefant cannot help marveling at Emmanellain’s ability to remain so stubbornly cheerful. Emmanellain himself soon gives that cheerfulness a louder voice. He admits, with only the slightest reluctance, that the ordeal was genuinely terrifying and that he might very well have died. Yet rather than dwell on the danger, he seizes upon what he sees as the glory of it all: by risking life and limb in the line of duty, he has helped uncover the existence of a new primal. To his mind, that discovery alone is enough to make the entire affair historic—and enough, he dearly hopes, to earn Lady Laniaitte’s admiration at long last.</p><p>Still flushed with that thought, he hurriedly composes himself and asks how he looks, making certain that the dust and sweat upon him strike the proper heroic balance before returning to the Rosehouse. Honoroit, meanwhile, thanks you again with heartfelt relief, unable to bear the thought of what might have happened had you not rushed to Emmanellain’s rescue. But when the tale is told before Laniaitte, the mood shifts at once. Her first response is alarm, and when she hears that what appeared in the cloud sea was a primal, she can scarcely believe it. Yet almost immediately she begins to see the shape of it, recalling the Vanu legend of a great white whale said to swim through the Sea of Clouds.</p><p>Haurchefant follows that thought to its grim conclusion. From what he knows of other summonings, the presence of the Vanu’s god would explain the sudden change in their behavior toward the people of Camp Cloudtop. Honoroit understands then what that must mean: the Vanu may have fallen under the primal’s influence, just as others have before. While the truth of this new threat settles over the room, Emmanellain tries once more to steer attention back toward himself, lamenting the lack of proper praise for the supposed hero of the hour. Laniaitte answers with dry precision, granting that you, at least, deserve every measure of gratitude for risking your life to save so distinguished a personage.</p><p>With the situation now too serious for further delay, Haurchefant announces that he must return to Ishgard at once. The Holy See and the Temple Knights must be informed without delay that a new primal has appeared in the Sea of Clouds. Laniaitte agrees, and tells you that you have already done more than enough here. She asks that you accompany Haurchefant back to Ishgard and convey her warm regards to Count Edmont. Emmanellain, seeing that there will be no further expeditions for him to turn into glory, resigns himself to departure with a theatrical farewell, expressing the hope that he and Laniaitte may meet again under kinder circumstances.</p><p>On the journey home, Haurchefant speaks with the exhilaration of a man who has once again survived what might have killed him. He confesses that he has always loved airship travel—the bite of cold wind, the rush of blood, the fierce joy of motion through the sky. Whether that thrill comes from the voyage itself or from having cheated death yet again, he cannot quite say. But duty soon overtakes delight, and he explains that he must go straight to the Congregation to inform Ser Aymeric of everything that has occurred. Emmanellain, he thinks, has surely returned to the manor by now. And when you find him there, the truth stripped of all ornament finally emerges. Count Edmont has already expressed his fury, striking his son for the reckless incompetence that endangered other lives. In the wake of fear, humiliation, and pain, Emmanellain is left with a bitter realization: playing the hero is not nearly so easy as he once imagined.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Emmanellain <small class="muted">(The Sea of Clouds, X:9.0, Y:32.3)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-series-of-unfortunate-events.html">A Series of Unfortunate Events</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 50</div></div>`,

  JP:{
    langLabel:'JP',
    pageTitle:'困ったヤツの称え方',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あれほどの目に遭ったあとでも、エマネランはなお前向きでいられるのかと、オルシュファンは半ば呆れ、半ば感心したように口にする。だが当の本人は、その楽天ぶりをさらに大げさに見せる。たしかに恐ろしい経験だった、下手をすれば本当に死んでいたかもしれないと認めながらも、彼はすぐさま話の向きを変える。命懸けの務めの果てに、新たな蛮神の存在を突き止めたのだと。それは決して小さな功績ではなく、歴史に残る発見ですらあるのだと胸を張り、その事実をラニエットにも認めさせるつもりでいる。彼女の称賛を浴びる瞬間を思い描くその顔には、先ほどまでの恐怖さえ都合よく塗り替えられていた。</p><p>そうして彼は、土と汗の具合まで英雄らしく見えるかを気にしながら身なりを整え、得意げにローズハウスへ戻ろうとする。一方のオノロワは、あなたが間に合ってくれたことへの感謝を何度も口にし、もし救出が遅れていたらと考えるだけでも耐えがたいという思いを隠せない。だが、ラニエットの前で事の次第が語られると、空気は一変する。彼女はまず最悪を恐れていたことを率直に告げ、現れた存在が蛮神だったと聞いて驚きを露わにする。けれどその名がビスマルクであると知ると、彼女はヴァヌ伝承にある「白き大鯨」を思い起こす。雲海を泳ぐと伝えられるその存在と、いま目の前に突きつけられた脅威は、確かにどこかで繋がっていた。</p><p>オルシュファンは、その繋がりが何を意味するのかをすぐに見抜く。これまでの蛮神召喚と同じ理屈で考えれば、ヴァヌバヌ族の神の存在こそが、キャンプ・クラウドトップに対する彼らの態度が急変した理由を説明してくれるはずだというのだ。オノロワもまた、アルフィノから渡されていた資料を思い出し、蛮神の影響下に置かれるという現象に思い当たる。その深刻な話が進む中でさえ、エマネランはなお、自分こそ英雄として称えられるべきではないかと口を挟む。ラニエットは冷ややかに応じ、本当に命を懸けて彼を救ったあなたこそ、感謝も敬意も称賛も受けるに値すると言い返す。</p><p>もはや事態を先延ばしにはできない。オルシュファンは、ただちにイシュガルドへ戻り、この新たな脅威を聖教府と神殿騎士団へ報告しなければならないと告げる。ラニエットもそれに異存はなく、ここでの務めは十分すぎるほど果たしてくれたとして、あなたにオルシュファンとともに帰還するよう勧める。そしてエドモン伯爵へ、自分からの心からの挨拶を伝えてほしいと頼む。エマネランは、これ以上敵地へ赴く機会がないと知ると、芝居がかった名残惜しさをにじませながらも、ラニエットとの次の再会がもっと幸運な状況であることを願って別れを告げる。</p><p>帰路の飛空艇の上で、オルシュファンは風を受けながら、飛空艇の旅が昔から好きだったと打ち明ける。頬を打つ冷気も、高揚で熱を帯びる血の巡りも、すべてがどうしようもなく心を躍らせるのだと笑う。それが空を行く喜びなのか、あるいはまたひとつ死をくぐり抜けた興奮なのかは、自分でもわからないらしい。それでも彼には立ち止まる暇はなく、着き次第すぐにコンギリゲーションへ向かい、アイメリク卿へ今回の一件を報告しなければならないと言う。そして、エマネランはもう屋敷へ戻っているころだろうから、あなたも彼の様子を見てやるとよいと勧める。そうしてフォルタン伯爵邸で再び会った彼は、もはやどこにも英雄気取りを保ててはいなかった。クラウドトップでの振る舞い――自らの軽率さと無能さによって他者の命まで危険にさらしたことを、父は決して許さなかったのだと、打ちひしがれたように語る。頬に残る痛みと悔しさの中で、彼はようやく思い知る。英雄を演じるというのは、口で言うほどたやすいことではないのだと。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> エマネラン <small class="muted">（アバラシア雲海, X:9.0, Y:32.3）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-series-of-unfortunate-events.html">雲海より現れしもの</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="divine-intervention.html">蒼天の騎士</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'該如何稱讚那個麻煩傢伙',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>即使才剛從那樣驚險的局面裡脫身，Haurchefant 仍忍不住感嘆，Emmanellain 經歷了這一切之後，居然還能維持那種近乎不可思議的樂觀。Emmanellain 自己倒是很快就替這句話做了最好的證明。他終於老實承認，那確實是一段可怕得不得了的經歷，甚至真的差一點就死在那裡。可話鋒一轉，他又立刻抓住了對自己最有利的部分不放：正是因為自己在 duty 中冒著生命危險，才成功揭露了一位新 primal 的存在。對他而言，這可不是什麼小事，而是一項足以留下名字的重大發現。只要想到就連 Laniaitte 也不得不承認這份功績，他便又振作起來，甚至開始期待自己沐浴在她稱讚目光下的模樣。</p><p>抱著這樣的心情，他還特地確認自己如今看起來是否依舊瀟灑，身上的灰塵與汗水是否也恰好足夠襯出一種歷劫歸來的英雄氣息，然後便催著眾人立刻返回 Rosehouse。Honoroit 則再次帶著幾乎快說不完的感激向你道謝，因為若不是你及時趕去，他根本不敢想像 Lord Emmanellain 會落得什麼下場。等你們把事情原原本本說給 Laniaitte 聽後，她第一時間便為此大感震驚。當她聽見你們口中的存在竟是一位 primal 時，更是難以置信。可緊接著，她又像是突然想起了什麼。這個名為 Bismarck 的存在，與 Vanu 傳說中的 The White（Vanu Vanu 對 primal Bismarck 的稱呼，視其為自雲海現身、擁有強大力量的神聖存在）實在太過相似，那頭據說會在 Sea of Clouds 中「游動」的巨大白鯨，如今看來，恐怕並不只是傳說而已。</p><p>Haurchefant 很快便從這件事裡看出了更令人不安的脈絡。他指出，若以你們過去面對其他 primal 的經驗來看，Vanu 所信奉之神真的現身，便足以解釋他們對 Camp Cloudtop 人們的態度為何會突然改變。Honoroit 聽到這裡，也立刻想起 Alphinaud 先前整理給眾人的資料，意識到這很可能意味著那些人已經落入 primal 的影響之下。可即使眼前談論的是這樣嚴重的新威脅，Emmanellain 卻還是忍不住打斷眾人，提醒 Laniaitte 是否忘了某件更重要的事——例如對眼前這位「英雄」表達一點適當的感謝、敬意與仰慕。Laniaitte 對此只是冷冷回應，說若真要論功，那麼值得得到這一切、甚至更多的人，顯然是為了救出某位「尊貴人物」而真正拿命去冒險的你。</p><p>既然事情已經明朗到這個地步，Haurchefant 便不打算再耽擱。他表示自己必須立刻返回 Ishgard，把這項新威脅盡快通報 Holy See 與 Temple Knights。Laniaitte 自然同意，並且也認為你在這裡做的已經遠遠超過該做的了，因此請你和 Haurchefant 一起回 Ishgard，順便替她向 Count Edmont 致意。至於 Emmanellain，眼見再沒有更多可以讓自己出風頭的敵地行動，便只好擺出一副瀟灑收場的模樣，向 Laniaitte 告別，還故作風雅地表示，希望你們下次相見時，會是在更合宜一些的情況下。</p><p>回程途中，Haurchefant 在飛空艇上談起自己對這種旅程的喜愛。他說，迎面吹來的冷風、因興奮而加速流動的血液，還有那種彷彿再一次從死亡邊緣脫身的暢快，都讓整段航行有種難以言喻的振奮感。不過他的愉快也只維持了片刻，因為一回到 Ishgard，他便必須立刻趕去 Congregation of Our Knights Most Heavenly，把這一路發生的事全數告知 Ser Aymeric。至於 Emmanellain，他想必早已回到宅邸，若你願意，不妨順道去看看他是否從這場驚嚇中恢復過來。可當你真的回到 Fortemps Manor，再次見到那位年輕貴族時，映入眼中的卻不再是先前那副拼命維持體面的模樣。Count Edmont 顯然已經知道了他在 Camp Cloudtop 的表現，而且震怒不已，甚至毫不留情地親手教訓了他一頓。Emmanellain 帶著壓不住的委屈與鼻音，承認父親無法接受他在那裡處理事情的方式——接受他因自己的輕率與無能，讓別人的性命也陷入危險。直到這一刻，他才像是真正第一次明白，原來想要扮演英雄，從來都不是一件容易的事。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Emmanellain <small class="muted">(阿巴拉提亞雲海, X:9.0, Y:32.3)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-series-of-unfortunate-events.html">自雲海現身之物</a></div><div class="row">任一戰鬥／魔法職業（不含受限職業）Lv. 50</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="divine-intervention.html">來自蒼天騎士的干預</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
