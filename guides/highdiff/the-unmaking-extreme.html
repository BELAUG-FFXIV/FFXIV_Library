<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Unmaking (Extreme) | BELAUG · FFXIV Library</title>
  <meta name="description" content="FFXIV DT 7.5 Extreme Trial — The Unmaking (Extreme)（極エヌオー討滅戦 / 極 恩歐殲滅戰）：故事概要、需求條件、解鎖任務、後續任務、BGM，附影片。" />
  <link rel="icon" href="../../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#ffffff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif; background:var(--bg); color:var(--fg);}
    .container{max-width:1080px; margin:0 auto; padding:0 16px}
    .site-header{border-bottom:1px solid var(--border); background:#fff9edb3; backdrop-filter:saturate(120%) blur(6px); position:sticky; top:0; z-index:10}
    .nav{display:flex; align-items:center; justify-content:space-between; height:60px}
    .left{display:flex; align-items:center; gap:12px}
    .home{border:1px solid var(--border); background:#fff; padding:4px 8px; border-radius:8px; text-decoration:none; color:var(--fg); font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex; align-items:center; gap:8px}
    .icon-btn{background:none; border:none; cursor:pointer; font-size:14px; padding:6px 10px; border-radius:8px; color:var(--fg)}
    .icon-btn:hover{background:#fff; border:1px solid var(--border)}
    #langToggle{display:inline-flex; align-items:center; gap:6px; white-space:nowrap; font-weight:600}
    .lang-icon{width:17px; height:17px; display:block; flex:0 0 auto; opacity:.9}
    .main{padding:20px 0 40px}
    .grid{display:grid; grid-template-columns:1.1fr 1fr; gap:20px; align-items:start;}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative; padding-top:56.25%}
      .video-wrap iframe{position:absolute; inset:0; width:100%; height:100%}
    }
    .card{background:var(--card); border:1px solid var(--border); border-radius:16px; box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px; border-bottom:1px solid var(--border); font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%; height:420px; border:0; display:block; border-radius:16px}

    .tabs{display:flex; gap:8px; padding:12px 12px 0; flex-wrap:wrap}
    .tab-btn{background:#fff; border:1px solid var(--border); color:var(--fg); border-radius:999px; padding:8px 14px; cursor:pointer; font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent); color:#fff; background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}

    .stack{display:flex; flex-direction:column; gap:10px}
    .stack .row{padding:12px 14px; border:1px dashed var(--border); border-radius:12px; background:#fffdf6}

    .link{color:#0b60d8; text-decoration:none}
    .link:hover{text-decoration:underline}

    .row-flex{
      display:flex;
      align-items:baseline;
      gap:18px;
      justify-content:flex-start;
      flex-wrap:wrap;
    }
    .row-flex .label{font-weight:800}
    .row-flex .righttxt{margin-left:0; white-space:nowrap}
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left">
        <a class="home" href="../../index.html">🏠 Home</a>
      </div>
      <div class="right">
        <button id="langToggle" class="icon-btn" aria-label="切換語言">English</button>
      </div>
    </nav>
  </header>

  <main class="container main">
    <div class="grid">
      <section class="card video-card">
        <div class="bd">
          <div class="video-wrap">
            <iframe id="ytFrame" src="https://www.youtube.com/embed/ZqyQvo0UKLM" title="The Unmaking (Extreme)" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="hd" id="pageTitle">The Unmaking (Extreme)</div>
        <div class="tabs" role="tablist">
          <button class="tab-btn" role="tab" aria-selected="true" data-tab="story">Story</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="req">Requirements</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="acq">Unlock Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="unlock">Follow-Up Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="bgm">BGM</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="mount">Mount</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="comments">Comments</button>
        </div>
        <div class="bd">
          <div id="panel-story" class="tab-panel active"></div>
          <div id="panel-req" class="tab-panel"></div>
          <div id="panel-acq" class="tab-panel"></div>
          <div id="panel-unlock" class="tab-panel"></div>
          <div id="panel-bgm" class="tab-panel"></div>
          <div id="panel-mount" class="tab-panel"></div>
          <div id="panel-comments" class="tab-panel">
            <div id="giscus_container" style="min-height:320px;"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const LANG_KEY = 'ffxiv-guide-lang';

    const i18n = {
      EN:{
        langLabel:'English',
        pageTitle:'The Unmaking (Extreme)',
        tabs:{story:'Story', req:'Requirements', acq:'Unlock Quest', unlock:'Follow-Up Quest', bgm:'BGM', mount:'Mount', comments:'Comments'},
        story:`<p>The wandering minstrel’s somber song recalls a mighty being from the world without Light: Enuo, who was struck down before he could bring all things to nothing.</p>

<p>Yet the minstrel’s verse turns toward another possibility. What if Enuo had risen from the abyssal ocean with even greater power? In that imagined encounter, you and your comrades would face the fell sovereign once more, drawn into a battle where victory and oblivion hang by a thread.</p>

<p>As the song sinks deeper into the heavy darkness of the void, each note pulls you closer to that fateful confrontation—one that asks whether you would triumph again, or be lost forever in depths without end.</p>`,
        req:`<div class="stack">
          <div class="row">1–8 Players (2 Tanks, 2 Healers, 4 DPS)</div>
          <div class="row">Unrestricted Parties Not Allowed</div>
          <div class="row">Class: Disciples of War or Magic</div>
          <div class="row">※ Limited jobs can participate only in a preformed party meeting party size requirements or an unrestricted party, and only if duty rules allow.</div>
          <div class="row">Level: 100</div>
          <div class="row">Avg. Item Level: 770</div>
          <div class="row">Explorer Mode Unavailable</div>
          <div class="row">※ Role and item level restrictions are lifted for parties meeting minimum size requirements.</div>
        </div>`,
        acq:`<div class="stack">
          <div class="row">After completing <a class="link" href="../trial/the-unmaking.html">The Unmaking</a>, speak with the Wandering Minstrel in Tuliyollal (X: 11.1, Y: 14.6).</div>
        </div>`,
        unlock:`<div class="stack">
          <div class="row">None</div>
        </div>`,
        bgm:`<div class="stack">
          <div class="row row-flex">
            <span class="label">Trials No. 66</span>
            <span class="righttxt"><a class="link" href="../bgm/ffv-final-battle.html">FINAL FANTASY V: The Final Battle (Dawntrail)</a></span>
          </div>
        </div>`,
        mount:`<div class="stack">
          <div class="row row-flex">
            <span class="label">Mount</span>
            <span class="righttxt"><a class="link" href="../mount/wings-of-nihility.html">Wings of Nihility</a></span>
          </div>
        </div>`
      },

      JP:{
        langLabel:'日本語',
        pageTitle:'極エヌオー討滅戦',
        tabs:{story:'ストーリー', req:'必要条件', acq:'開放クエスト', unlock:'後続クエスト', bgm:'ＢＧＭ', mount:'マウント', comments:'コメント'},
        story:`<p>吟遊詩人は、光なき世界に現れた強大な存在、エヌオーを悼むような沈鬱な調べで歌い上げます。すべてを無へと帰す前に討たれた、その恐るべき存在の物語を。</p>

<p>しかし、その歌は別の可能性へと歩みを進めます。もしエヌオーが深淵の海より、なおも強大な力を得て現れていたなら。あなたと仲間たちは、再びその邪悪なる支配者と対峙し、勝利か、終わりなき深みへ沈むかの瀬戸際に立たされることになります。</p>

<p>虚ろなる闇の重さを帯びた旋律が響くたび、あなたはその運命の邂逅へと引き寄せられていきます。再び勝利をつかむのか、それとも果てなき深淵に呑まれるのかを問う戦いへと。</p>`,
        req:`<div class="stack">
          <div class="row">1～8人用 (TANK:2/HEALER:2/DPS:4)</div>
          <div class="row">「制限解除」非対応</div>
          <div class="row">クラス ファイター ソーサラー</div>
          <div class="row">※リミテッドジョブは規定人数パーティもしくは「制限解除」状態かつ許可されているコンテンツに参加できます。</div>
          <div class="row">レベル 100</div>
          <div class="row">平均アイテムレベル 770～</div>
          <div class="row">「自由探索での参加」非対応</div>
          <div class="row">※規定人数の場合は自由なロール構成かつ、アイテムレベルに関わらず参加できます。</div>
        </div>`,
        acq:`<div class="stack">
          <div class="row"><a class="link" href="../trial/the-unmaking.html">エヌオー討滅戦</a> クリア後、トライヨラ（X: 11.1 Y: 14.6）の異邦の詩人に話しかけることで開放。</div>
        </div>`,
        unlock:`<div class="stack">
          <div class="row">なし</div>
        </div>`,
        bgm:`<div class="stack">
          <div class="row row-flex">
            <span class="label">Trials No. 66</span>
            <span class="righttxt"><a class="link" href="../bgm/ffv-final-battle.html">最後の闘い（FINAL FANTASY V）</a></span>
          </div>
        </div>`,
        mount:`<div class="stack">
          <div class="row row-flex">
            <span class="label">マウント</span>
            <span class="righttxt"><a class="link" href="../mount/wings-of-nihility.html">ウィング・オブ・ニヒリティ</a></span>
          </div>
        </div>`
      },

      ZH:{
        langLabel:'繁體中文',
        pageTitle:'極 恩歐殲滅戰',
        tabs:{story:'故事概要', req:'需求條件', acq:'解鎖任務', unlock:'後續任務', bgm:'BGM', mount:'坐騎', comments:'留言'},
        story:`<p>那位 異國的詩人 以低沉的輓歌，唱起那個沒有光的世界中曾經出現的強大存在：Enuo。牠在將萬物歸於虛無之前被擊倒，成為歌中被追憶的可怖存在。</p>

<p>然而，詩人 的歌聲轉向另一種可能。倘若 Enuo 自深淵之海再度現身時，力量比過去更加強大，你與同伴便會再次面對這位邪惡的主宰，踏入一場勝利與毀滅僅隔一線的戰鬥。</p>

<p>隨著旋律浸入  虛無 沉重的黑暗之中，每一個音符都將你拉近那場命運般的遭遇。那將是一場質問你們能否再次取勝，或是否會永遠沉入無盡深處的戰鬥。</p>`,
        req:`<div class="stack">
          <div class="row">1～8 人用（防護職能 2／治療職能 2／進攻職能 4）</div>
          <div class="row">不可解除人數限制</div>
          <div class="row">職業：戰鬥精英／魔法導師</div>
          <div class="row">※ 特職只能在符合人數需求的預組隊伍，或解除人數限制的隊伍中參加，且必須符合任務規則。</div>
          <div class="row">等級：100</div>
          <div class="row">平均品級：770</div>
          <div class="row">無法使用探索模式</div>
          <div class="row">※ 符合最低人數需求的隊伍，將解除職能與平均品級限制。</div>
        </div>`,
        acq:`<div class="stack">
          <div class="row">完成 <a class="link" href="../trial/the-unmaking.html">恩歐殲滅戰</a> 後，與 特利約拉（X: 11.1 Y: 14.6）的 異邦詩人 對話即可解鎖。</div>
        </div>`,
        unlock:`<div class="stack">
          <div class="row">無</div>
        </div>`,
        bgm:`<div class="stack">
          <div class="row row-flex">
            <span class="label">Trials No. 66</span>
            <span class="righttxt"><a class="link" href="../bgm/ffv-final-battle.html">最後之戰（FINAL FANTASY IV）</a></span>
          </div>
        </div>`,
        mount:`<div class="stack">
          <div class="row row-flex">
            <span class="label">坐騎</span>
            <span class="righttxt"><a class="link" href="../mount/wings-of-nihility.html">虛王之翼</a></span>
          </div>
        </div>`
      }
    };

    const langToggle = document.getElementById('langToggle');
    const pageTitle  = document.getElementById('pageTitle');
    const tabBtns    = [...document.querySelectorAll('.tab-btn')];

    const panels = {
      story   : document.getElementById('panel-story'),
      req     : document.getElementById('panel-req'),
      acq     : document.getElementById('panel-acq'),
      unlock  : document.getElementById('panel-unlock'),
      bgm     : document.getElementById('panel-bgm'),
      mount   : document.getElementById('panel-mount'),
      comments: document.getElementById('panel-comments')
    };

    function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }

    function applyLang(lang){
      const t = i18n[lang] || i18n.EN;
      pageTitle.textContent = t.pageTitle;
      langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
      tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
      const activeBtn = tabBtns.find(b=>b.getAttribute('aria-selected')==='true') || tabBtns[0];
      renderPanel(activeBtn.dataset.tab, lang);
      if (activeBtn && activeBtn.dataset.tab === 'comments') loadGiscusForCurrentLang();
    }

    function renderPanel(key, lang){
      const t = i18n[lang] || i18n.EN;
      Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
      panels[key].classList.add('active');
      if (key !== 'comments') {
        panels[key].innerHTML = t[key] || '';
      } else {
        loadGiscusForCurrentLang();
      }
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click',()=>{
        tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab, getLang());
      });
    });

    langToggle.addEventListener('click',()=>{
      const cur=getLang();
      const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
      localStorage.setItem(LANG_KEY,next);
      applyLang(next);
    });

    applyLang(getLang());

    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };

    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }

    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }
  </script>
</body>
</html>
