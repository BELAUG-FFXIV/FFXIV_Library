    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>At the Ul’dah Dispatch Yard, Papashan regards you kindly and says that, since you have come all this way, he has a small errand he would ask of you. A number of Sultansworn sentries have been posted to guard the area, he explains—a “dispatch to the Dispatch Yard,” as he puts it with a wry little joke. They have been away from the shade and featherbeds of the city for a long time, exposed to scorching days and freezing nights that wear down mind and body alike. From within his stationmaster’s belongings, he produces a bundle of twilight pretzels and asks you to take them to the sentries. It isn’t much, he says, but he believes comfort food always helps when he feels so low he could kill himself, and he trusts it will do their spirits some good as well. Before you depart, he speaks again of the Calamity and how far Ul’dah has come since that time—how, in the face of terrible destruction, the people banded together to rebuild their great nation. The tracks that now stretch across Thanalan, he says, are a testament to that resolve, and simply beholding them fills him with pride. With his words in mind and a bundle of still-warm pretzels in your hands, you accept his request and set out across Central Thanalan’s Spineless Basin to seek out the Sultansworn on watch around the yard.</p>
      <p>You first come upon a Sultansworn busy calling out his patrol report—“Western front, clear! Eastern front, clear!”—when you approach. When you offer him the twilight pretzel from Papashan, his stern expression breaks into surprise and delight; it is his favorite, he exclaims, and he marvels at how the stationmaster knew. He admits he cannot fight on an empty stomach…or, truth be told, on any stomach at all, joking that he has no stomach for fighting, but he still raises his voice in a spirited declaration that brigands had best beware, for the Sultansworn stand ready to serve and protect. A little farther on, another sentry wheels on you the instant you approach, ordering you to halt and demanding that you put the pretzel on the ground and raise your hands. Only when you explain that it is a gift from Papashan does he realize his mistake, flustered apologies tumbling out as he admits that this new post has his nerves in a twist.</p>
      <p>Embarrassed by his own pun, he clears his throat and assures you that the Dispatch Yard is safe so long as he stands watch, asking you to give Papashan his thanks and to tell him that he only wishes he could repay the favor. At yet another post, a weary Sultansworn mutters that scorching days and freezing nights will be the end of him; when you hand him the twilight pretzel, he accepts without hesitation and takes a hearty bite, proclaiming it a refreshing godsdamned pretzel that makes him feel reborn, even if it cannot change how intolerable the cold nights remain. With the last of the pretzels delivered and each sentry in better spirits than before, you return to Papashan at the Dispatch Yard. He greets you with a keen eye, noting the diminished bundle and asking how his Sultansworn fare, if they had any reports, anything at all. When you tell him there was nothing to report—that peace still reigns over central Thanalan—his composure falters for a moment and he lets out a worried little exclamation. Then he collects himself, presses a reward into your hands for your troubles, and asks you to stay a moment longer, for there is yet more he would request of you.</p>
    </div>

    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>「ウルダハ操車場」で、パパシャンは穏やかな眼差しを向けながら、ここまで足を運んでくれたあなただからこそ、ひとつ頼みごとを聞いてもらえないかと切り出す。この一帯には、サルタン警護団の哨戒兵が何人も派遣されており、まさしく「ウルダハ操車場への派遣隊」といったところだと、彼は軽口を交えつつ説明する。彼らは、都の木陰や柔らかな寝床から長く離れ、灼熱の日差しと凍てつく夜気に晒され続けているのだという。その過酷さは、心身ともに容赦なく削っていく。パパシャンは手元の包みを開き、そこから何個もの「トワイライト・プレッツェル」を取り出して、これを哨戒兵たちに配ってきてほしいと頼む。ささやかなものではあるが、自分自身が気が滅入り、いっそ死にたくなるような気分のときでさえ、こうした腹に溜まる食べ物にどれほど救われてきたかを、彼は苦笑まじりに語る。そして、少し真面目な口調に戻ると、第七霊災から今日に至るまで、ウルダハがどれほどの道のりを歩んできたかを静かに振り返る。あの恐るべき破壊を前にしながらも、人々は力を合わせてこの偉大な国を立て直してきたのだと。今やザナラーンに張り巡らされた鉄路は、その揺るがぬ決意の証であり、その姿を目にするたびに胸に誇りが満ちるのだと語る。あなたは、パパシャンの言葉と温かなプレッツェルの包みを受け取り、「中央ザナラーン」の「刺抜盆地」に広がる哨戒線へと歩み出し、周囲を守るサルタン警護団の兵士たちを順に訪ねていく。</p>
      <p>やがて、あなたは「西方異常なし！　東方異常なし！」と声を張り上げているサルタン警護団の兵士のもとに辿り着く。彼にパパシャンから預かったトワイライト・プレッツェルを差し出すと、きりりとした表情が驚きと喜びに変わり、それが自分の大好物だと目を輝かせる。パパシャンがどうしてそれを知っているのかと不思議がりつつ、空腹では戦えない……いや、どんな状態の腹であっても、そもそも戦いそのものに「腹が据わっていない」のだと、自嘲気味に冗談を飛ばす。それでも最後には、「サルタン警護団がいる限り、この地を狙うならず者どもには容赦しない」と高らかに宣言し、警護の任に戻っていく。少し離れた別の持ち場では、あなたが近づくや否や、別の警護兵が鋭い調子で制止の声を上げる。「止まれ！　そのプレッツェルを地面に置き、頭上で手を組め！」と命じ、名と用件の申告を求めてくる。あなたが、これはパパシャンから預かった差し入れだと説明すると、彼はようやく事態を飲み込み、神々に許しを請うように慌てて謝罪する。この新しい持ち場のおかげで、すっかり神経が「ねじれて」しまっているのだと、思わず駄洒落を漏らした自分に赤面しながら咳払いし、彼はあなたに頭を下げる。そして、「自分が見張っている限り、『ウルダハ操車場』の安全は守られている」と胸を張り、パパシャンへの礼と、いつかこの恩を返したいという思いを伝えてほしいと頼む。</p>
      <p>さらに別の場所では、炎天下と極寒の夜に疲れ果て、「この任務が自分の命取りになりかねない」と嘆いている警護兵に出会う。あなたがそっとトワイライト・プレッツェルを差し出すと、彼は遠慮なく受け取り、大きくかぶりついて、思わず「なんて清々しい、神々も認めるプレッツェルだ！」と声を上げる。まるで生まれ変わったようだと息をつきながらも、それでも凍える夜だけはどうにも我慢ならないと、空を仰いでため息を漏らすのだった。こうしてすべてのプレッツェルを配り終えたあなたは、「ウルダハ操車場」のパパシャンのもとへと戻っていく。彼は、減った包みに目を留めると、サルタン警護団の様子はどうだったか、何か報告はなかったかと、身を乗り出して尋ねる。あなたが「特に異常なし」と告げ、中央ザナラーンには今日も平穏が保たれていると伝えると、パパシャンは一瞬だけ肩を落とし、小さく不安げな声を漏らす。しかしすぐに表情を整えると、今回の働きへの礼として報酬を手渡し、なおも頼みたいことがあるのだと言って、もうしばらく力を貸してほしいと静かに申し出る。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> パパシャン　中央ザナラーン <small class="muted">(X:22.9, Y:27.8)</small></div>

    unlockq:`<div class="stack">

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'美味的慰勞品',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Ul’dah Dispatch Yard 裡，Papashan 看著你，語氣和煦地說，既然你都已經親自來到這裡了，他想請你幫忙跑一件小差事。他說，最近有好幾名 Sultansworn 被派到附近擔任戒備──算得上是真正「派到 Dispatch Yard 的巡邏隊」。這些人已經離開 Ul’dah 城內的陰涼與柔軟床鋪許久，在外面日復一日承受著白天灼熱、夜晚凍骨的天候，心裡與身體都被慢慢磨損。Papashan 從身邊的包裹裡拿出一串包好的 twilight pretzel，請你替他把這些點心送到每一位哨戒中的 Sultansworn 手上。他說，這並不算什麼大禮，但對他來說，即使是低落到幾乎想一走了之的時候，一口能填飽肚子的安慰食物，總是能把他從邊緣拉回來一點。說著說著，他又提到自從 Calamity 之後，Ul’dah 在這幾年裡走過的漫長路程——在那場毀滅性的災禍面前，人民選擇的是彼此扶持，共同重建這座國家。如今橫越 Thanalan 的鐵軌，就是那份決心與意志的象徵，只要看著這些軌道，他就會感到由衷的驕傲。你接下這份託付，雙手抱著一疊溫熱的 twilight pretzel，踏出 Ul’dah Dispatch Yard，在 Central Thanalan 的 Spineless Basin 裡沿著路線尋找守衛在各處的 Sultansworn 哨兵。</p>
      <p>不久之後，你遇到一名正大聲報告巡邏情況的 Sultansworn，他一邊喊著「西側前線，異常排除！東側前線，異常排除！」一邊掃視周圍。當你走上前把 Papashan 託付的 twilight pretzel 交到他手裡時，他原本嚴肅的表情立刻變成驚喜，脫口而出這正是他最愛吃的點心，忍不住驚讶 Papashan 是怎麼知道的。他笑說自己空著肚子根本打不了仗──說到底，就算肚子吃得再飽，他也算不上真正「有胃口去打仗」的人，但話鋒一轉，依舊抬起聲音宣示，只要 Sultansworn 還站在這裡，盯上這一帶的賊匪就別想為所欲為。再往前走，你靠近另一名哨戒時，對方立刻喝令你停下，甚至要求你先把手上的 pretzel 放在地上、雙手舉過頭頂，自報姓名與目的。等你解釋這是 Papashan 託你帶來的 twilight pretzel，他才恍然大悟，忙不迭地向十二神與你道歉，承認自己因為新任務而緊張到整個人都打結，連話裡都說出了「扭成一團」的冷笑話，讓他自己都不好意思。他清了清嗓子，態度端正地保證，只要他還站在這裡值勤，Ul’dah Dispatch Yard 就會保持安全，並請你代他向 Papashan 表達謝意，也說明自己只恨不能好好回報這份心意。在另一處哨戒點，你遇見一名滿臉疲憊的 Sultansworn，他喃喃抱怨著白天炙熱、夜晚冰冷，說再這樣下去這個崗位早晚會要了他的命。</p>
      <p>你將一個 twilight pretzel 交給他，他立刻爽快接過，大口咬下，隨即用誇張又真心的語氣讚嘆這實在是讓人精神一振的 godsdamned pretzel，吃完簡直像重獲新生。即便如此，他還是抬頭望向夜空，嘆息那些刺骨寒夜依舊難以忍受。等你把手中所有的 pretzel 都送達之後，便返回 Ul’dah Dispatch Yard 向 Papashan 回報。他看到你手上的包裹變得精簡許多，立刻上前追問，那些 Sultansworn 的狀況如何，有沒有任何異常或值得注意的消息。你如實回答一切平安無事，Central Thanalan 目前依舊維持著安穩的秩序，他聽了先是微微失神，低聲喃喃幾句，顯得有些擔憂，又很快收斂表情，將一份酬勞交到你手中，感謝你替他跑了這趟，並請你先別急著離開，因為接下來還有另一件事，希望能再度借助你的力量。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
