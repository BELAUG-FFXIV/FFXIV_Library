<script>

const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`The Parting Glass`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Momodi stops you with news that another message arrived while you were away—delivered by the sultana’s lady-in-waiting. Her Grace requests a private audience, and the lady-in-waiting will meet you on the Royal Promenade to escort you to the sultana’s chambers. Momodi urges you to go at once and not keep royalty waiting.</p><p>Elsewhere, the banquet begins in bright spirits. Minfilia observes the mood, and Alphinaud answers that there is good cause: a shared victory can unite even unlikely allies, bringing Eorzea a step closer to standing as one. He credits Minfilia’s efforts for winning Ser Aymeric’s steadfast support, speaks of the military and economic benefits of Ishgard rejoining the Alliance, and even jokes that if territorial disputes persist, his trusty Warrior of Light can box a few ears—until he notices you are not yet present, and Minfilia says you were delayed by a matter at the Quicksand.</p><p>At the Royal Promenade, you are greeted at the entrance: the banquet has begun, but an urgent matter requires your attention. The lady-in-waiting thanks you for coming, offers you a moment to compose yourself, and then leads you to the sultana’s bedchamber. When you are announced, Nanamo Ul Namo receives you and bids you come in and take your ease.</p><p>Nanamo dismisses her attendant and tells you plainly why secrecy is required. She intends to abdicate the throne and dissolve the monarchy. Ul’dah’s streets churn with unrest; the government fails in its responsibilities, and the people suffer for that incompetence. She means to use the victory feast as the stage on which to declare the dissolution of the sultanate and to build a fair republic, where the ruling class stands beside the common man, no longer bending the nation to the whims of a privileged few.</p><p>Nanamo does not pretend the path is safe. Such change would tear up the city’s foundations, and even Raubahn—strong and influential as he is—will struggle to keep his footing on such treacherous ground. She asks you to lend him a steadying hand, trusting you as the one hero who has endured innumerable foes and still stands. When you give your answer, she is grateful beyond what she can express.</p><p>While you are absent from the hall, the alliance speaks. Merlwyb notes it is well the Steps of Faith held; Kan-E-Senna asks after the city; Aymeric reports losses but says Ishgard’s heart still beats, and he thanks them for their aid. Raubahn declares an attack on Ishgard is an attack on the realm, and they must stand together. Aymeric then addresses the honored friends, offering Ishgard’s gratitude and tying the success of this alliance to his recommendation that the Gates of Judgement be opened—hoping Ishgard will soon reunite with her sister nations and Eorzea will be as one. As he speaks, Alphinaud excuses himself to speak with Yuyuhase in private.</p><p>Then the night shatters. Crystal Braves report that, with few exceptions, they have detained those loyal to the Scions and taken control of the Rising Stones; Alphinaud demands what they hope to achieve, and Yuyuhase answers: the salvation of Eorzea. In the hall, Teledji Adeledji moves armed soldiers into the royal banquet, has state visitors ejected, and claims the throne has been sullied—because an assassin has removed its occupant while others feasted. He reveals that you were found in Nanamo’s private chambers moments after the deed, and he orders that Minfilia and the entire order be tried. Ilberd announces the charge: you are accused of poisoning Her Royal Majesty Nanamo Ul Namo, and all members of the Scions of the Seventh Dawn will be detained; Teledji adds that a vial bearing traces of the poison was found upon you, and Y’shtola calls the evidence convenient.</p><p>Teledji turns accusation into frenzy, railing that the feast was a diversion engineered to give you opportunity and cover, denouncing Minfilia’s influence as dark enchantment, and even twisting her ties with Aymeric into proof of conspiracy. Raubahn, desperate to see Nanamo, is blocked; he is told the poison took her swiftly, and his grief breaks into a cry. Teledji then declares the Monetarists will govern Ul’dah and offers Raubahn the “honor” of arranging the funeral; Raubahn hurls back that Teledji had her killed, and when Teledji mocks Nanamo as a puppet, Raubahn strikes him down despite Lolorito’s outcry.</p><p>Ilberd seizes Raubahn with ease and turns the chaos to his advantage. Lolorito orders the Scions taken into custody and brands Raubahn a traitor as well; Ilberd sneers that Raubahn has become docile, then cuts deeper—saying he will tell him who truly killed the sultana. He admits it was he. Yet even then, Raubahn forces himself to think beyond rage: he tells you to flee, clear your names, and find who is behind the plot—because that is the only way forward.</p><p>You regroup in the streets under tightening guard. Thancred returns, saying he slipped away when the celebration turned sour and found the city already locked down; Papalymo notes that the plan depended on thugs having free run, and Y’shtola agrees there must be a deeper plot. Minfilia asks where you can seek refuge when you are crippled by the charges, and Thancred says refuge means nothing without an escape route. He recalls hidden passages within the palace walls, with a tunnel concealed behind the fireplace in Nanamo’s chambers, leading outside the city. As pursuers close in, Yda insists she will hold them off, and Papalymo joins her; deeper below, Y’shtola and Thancred choose to stay behind as well, bringing the tunnel down to stop the chase and bidding you go on. Minfilia, hearing Hydaelyn, cannot follow—but she begs you to keep moving, because you are hope for the Scions and for the realm.</p><p>Beyond the city, you find Alphinaud safe but shaken. He curses himself for being played and for trusting the Crystal Braves until the moment he felt the blade at his back, and he is told there will be time for reckoning later—first you must put distance between you and Ul’dah. A carriage and unexpected allies carry you along; you learn Pipin Tarupin has intervened, refusing to see Alphinaud imprisoned and placing blame on the Monetarists’ greed. Cid arrives with the Enterprise hidden nearby and demands a destination; Alphinaud chooses Coerthas, trusting that Ishgard will not tolerate foreign forces intruding. You are borne to Camp Dragonhead, given shelter, and Haurchefant welcomes you as friends—promising to prove worthy of your trust, even as he warns that matters in Coerthas have grown more complicated in your absence.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Momodi <small class="muted">(Ul’dah - Steps of Nald, X:11.6, Y:9.6)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="come-but-not-gone.html">Come, but Not Gone</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="before-the-dawn.html">Before the Dawn</a></div></div>`

  JP:{
    langLabel:'日本語',
    pageTitle:'イシュガルド戦勝祝賀会',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>モモディはあなたを呼び止め、留守の間にもう一通の伝言が届いたと言う。届け主はナナモ・ウル・ナモの侍女で、陛下が内密の謁見を望んでいるらしい。侍女はロイヤルプロムナードであなたを迎え、陛下の居室へ案内するという。モモディは今すぐ向かえと急かし、王族を待たせるなと背中を押す。</p><p>その頃、宴は華やいだ空気の中で始まっていた。ミンフィリアは皆の高揚を口にし、アルフィノは当然だと言う。共通の勝利は思いがけない同盟者すら結び、エオルゼアがひとつに近づいたのだと。彼はミンフィリアの尽力があったからこそアイメリク卿が確かな盟友となったのだと称え、イシュガルドが同盟に復帰すれば軍事と経済の利益があると語る。領土問題もいずれ解決できると信じ、もし難しければ自慢の光の戦士に耳を引っぱらせると冗談まで言うが、あなたの姿がないことに気づくと、ミンフィリアはクイックサンドの用件で遅れているだけだと説明する。</p><p>ロイヤルプロムナードであなたは入口で引き留められる。宴は始まったばかりだが、侍女があなたに急ぎの話があるという。侍女はあなたの来訪に礼を述べ、必要なら心を整える時間を与えると言い、準備ができているならただちに陛下の居室へ案内すると告げる。あなたが通されると、ナナモ・ウル・ナモは入室を許し、気を楽にするよう促す。</p><p>ナナモは侍女を下がらせ、なぜ内密が必要かはすぐ分かると言って切り出す。彼女は退位し、王政を解体するつもりだと。ウルダハの街には混乱が渦巻き、政は責務を果たせず、民はその無能の代償を背負わされている。彼女は民をこれ以上苦しませないため、勝利の宴を舞台にスルタン制の解消を宣言し、特権階級の気まぐれに屈しない公平な共和制を目指すのだと語る。</p><p>それが危険な提案であることを、ナナモは理解している。変革は都市の基盤を引き裂き、ラウバーンほどの力と影響力をもってしても、危うい地盤の上で踏みとどまるのは容易ではない。だからこそ彼を支える手が要るのだと、彼女はあなたに頼む。数多の敵意を耐え抜いてきたあなたこそ、信じられる英雄だとして。あなたが応じると、ナナモは言葉に尽くせぬほどの感謝を示す。</p><p>あなたが席を外している間、会場では同盟者たちが語り合う。メルウィブは防衛線が持ちこたえたことを喜び、カヌ・エ・センナは市街の状況を問う。アイメリク卿は損害は出たが国の心臓はなお力強いと答え、援助への感謝を述べる。ラウバーンは、イシュガルドへの攻撃はエオルゼアへの攻撃だと断言し、団結を呼びかける。アイメリク卿は友へ感謝を伝え、この同盟の成功をもって審門を開く提言の根拠とし、イシュガルドが姉妹国家と再び結ばれ、エオルゼアがひとつになることを願うと宣言する。その最中、アルフィノはユユハセと話すため席を外す。</p><p>やがて夜は崩れ落ちる。クリスタルブレイブは、例外を除き暁の血盟に与する者を拘束し、ライジングストーンズも掌握したと報告する。アルフィノが反乱の意図を問うと、ユユハセはエオルゼアの救済だと答える。会場ではテレジ・アデレジが武装兵を連れ込み、来賓を退席させ、宴の最中に王座の主が暗殺されたと糾弾する。彼は、陛下の居室であなたが犯行直後に見つかったと告げ、ミンフィリアと一団を裁くと宣言する。イルベルドは、あなたがナナモ・ウル・ナモを毒殺した容疑であり、暁の血盟の全員を拘束すると告げる。さらにテレジは、毒の痕跡が残る小瓶があなたから見つかったと言い、ヤ・シュトラは都合のよい証拠だと冷ややかに返す。</p><p>テレジは勢いに乗り、宴はあなたたちが姿を消すための陽動であり、機会と群衆を利用したのだと叫ぶ。ミンフィリアの影響力を闇の力と決めつけ、同盟指導者の心を操ったのだと罵り、アイメリク卿との関係さえ陰謀の証拠に仕立て上げる。ラウバーンは陛下に会わせろと迫るが止められ、毒が速やかに命を奪ったと告げられて嗚咽する。テレジはモネタリストが統治すると宣言し、葬儀の手配をラウバーンに押しつけようとする。ラウバーンはテレジこそ黒幕だと断じ、陛下を操り人形と嘲る言葉に激昂して斬り伏せる。</p><p>イルベルドは容易くラウバーンを制し、混乱を利用する。ロロリトは暁の血盟を拘束せよと命じ、ラウバーンも反逆者として捕えよと叫ぶ。イルベルドはラウバーンを嘲笑し、誰が陛下を殺したか教えてやると言って、自分だと明かす。だがラウバーンはなお理性を保ち、あなたに命じる。ここを逃げ、潔白を示し、この陰謀の黒幕を突き止めろ――それしか道はない、と。</p><p>街はすでに厳重な警戒下にあり、あなたたちは路上で合流する。サンクレッドは祝宴が暗転したと悟って身を引き、戻ってみれば街が締め付けられていたと言う。パパリモはこの計画がならず者に自由に動かせることを前提にしていたと指摘し、ヤ・シュトラも周到な準備がある以上、さらに深い企みがあると見る。ミンフィリアはどこへ身を寄せるべきかと問うが、サンクレッドは逃走経路がなければ意味がないと言い、宮殿の壁に隠された通路を思い出す。ナナモの居室の暖炉の奥に抜け道があり、城外へ通じるはずだと。追っ手が迫る中、イダは残って食い止めると宣言し、パパリモも加わる。地下へ降りた先では、ヤ・シュトラとサンクレッドも残り、追撃を断つために通路を崩してあなたを先へ追いやる。ミンフィリアはハイデリンの声に縛られて残るが、それでもあなたに進めと訴える。あなたこそが希望なのだと。</p><p>街の外であなたはアルフィノと合流する。彼はテレジに弄ばれ、背後から刃を突きつけられるまでクリスタルブレイブを信じていた自分を呪うが、いまは距離を取らねばならないと促される。思わぬ助けが重なり、ピピン・タルピンはアルフィノの拘束が不当だとして介入し、責はモネタリストの強欲にあると言い切る。やがてシドが近くに隠した飛空艇で脱出させると言い、目的地を求める。アルフィノはクルザスを選ぶ。イシュガルドは外部勢力の侵入を許さぬと判断したのだ。あなたたちはキャンプ・ドラゴンヘッドで庇護を得て、オルシュファンは友として迎え入れ、あなたの信頼に応えると誓う――しかし同時に、あなたの不在の間にクルザスの情勢もより複雑になったと告げる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> モモディ <small class="muted">（ウルダハ：ナル回廊, X:11.6, Y:9.6）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="come-but-not-gone.html">言伝の先に待つ者</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="before-the-dawn.html">希望の灯火</a></div></div>`
  },

    story:`<div class="clamp" data-collapsed="true"><p>Momodi 又把你攔下，說你不在的時候又有一則訊息送到——而且是 Nanamo Ul Namo 的侍女親手送來。Her Grace 想私下召見你；侍女會在 Royal Promenade 等你，並護送你前往 Her Grace 的寢室。Momodi 直接催你別發呆，叫你立刻出發，別讓王族久候。</p><p>同一時間，宴會廳裡氣氛正熱。Minfilia 說大家看起來興致高昂，Alphinaud 也說這很正常：共同的勝利足以讓最不可能的盟友也站在一起，讓 Eorzea 更接近團結。Alphinaud 稱讚 Minfilia 的努力，說若不是她，Ser Aymeric 不會成為如此堅定的盟友；只要 Ishgard 說服國民重回 Alliance，軍事與經濟都會受益。他相信領土爭端終究能和平解決，甚至半開玩笑說不行就讓他可靠的 Warrior of Light 去「教訓」當事人——直到他想起你還沒到，Minfilia 才說你被 Quicksand 的事耽擱，但聽起來並不嚴重。</p><p>你走到 Royal Promenade 的入口，馬上被提醒宴會雖已開始，但侍女有急事要跟你談。侍女向你致意，說 Her Grace 非常想見你；你若需要片刻整理心情也可以，若你已準備好，她將立即帶你去 Her Grace 的寢室。你被領進房內後，Nanamo Ul Namo 讓你入內，語氣平和地要你放鬆。</p><p>Nanamo Ul Namo 先遣退侍女，接著直說她為何必須私下談：她打算退位，並解散君主制。她說你也看見了——街頭的動盪像暴風一樣呼嘯，政府沒有履行責任，人民在你們的無能之下受苦。她不願再讓他們繼續承受，所以她要在勝利宴會上宣布解散蘇丹國，推動建立公平的共和體制，讓掌權階層與平民並肩，不再讓國家向少數特權者的任性低頭。</p><p>她沒有把這件事說得輕巧。這樣的改變等同於把 Ul’dah 的根基整個翻起來；就算 Raubahn 再強、影響力再大，也很難在這種危險的局勢裡站穩。因此她請你扶他一把，讓他不至於在這片鬆動的地面上失足。她說，你承受過無數敵意仍能屹立，是她唯一能完全信任的英雄；她希望你能為她做到這件事。你答應後，她的感激幾乎無法用言語表達。</p><p>你離開宴會廳的這段時間裡，會場仍在談論同盟與勝利。Merlwyb 說 Steps of Faith 能守住實屬萬幸，Kan-E-Senna 追問 Ishgard 城內狀況，Ser Aymeric 回答雖有損失但國家仍充滿生氣，並為你們的援助致謝。Raubahn 表示對 Ishgard 的攻擊就是對整個領土的攻擊，大家必須團結。Ser Aymeric 於是向來賓正式致意，感謝你們協防 Ishgard，並說他將以這次同盟的成功作為根據，推動 Gates of Judgement 開放；他希望在 archbishop 的祝福下，Ishgard 能與多年疏離的姊妹國家再度團聚，讓 Eorzea 重回一致。就在此時，Alphinaud 起身離席，去與 Yuyuhase 私下交談。</p><p>然後，一切瞬間崩毀。Crystal Braves 回報：除少數例外，他們已拘押所有忠於 Scions of the Seventh Dawn 的人，Rising Stones 也在掌控之中。Alphinaud 質問這場叛變想達成什麼，Yuyuhase 回答：他們一直追求的——Eorzea 的救贖。宴會廳裡，Teledji Adeledji 竟帶著武裝士兵闖入王室宴席，驅逐各國來賓，並指控王座遭到羞辱——因為有人在眾人宴飲之際刺殺了王座的主人。他更揭露：你在 Nanamo 的私人寢室裡、幾乎緊接著事件發生後就被發現，並宣布 Minfilia 與整個組織都將受審。Ilberd 當眾宣布指控：你涉嫌毒殺 Her Royal Majesty Nanamo Ul Namo，Scions of the Seventh Dawn 全員都要被拘留問訊；Teledji 又補上一刀，說你身上搜出了帶有毒物痕跡的小瓶，Y’shtola 冷冷回了一句「真是太方便了」。</p><p>Teledji 乘勢煽動到瘋狂。他說這場宴會就是你們設計的轉移注意力，讓你們有機會下手、也有群眾掩護你們消失；他把 Minfilia 的影響力說成邪惡的魅惑，說你們操縱了 Alliance 的領袖，甚至把她與 Ser Aymeric 的往來扭曲成陰謀證據。Raubahn 要求見 Nanamo 卻被阻攔，只能聽見「毒發迅速」的說法，悲痛到失聲。Teledji 宣布 Royalists 已不可靠，Ul’dah 將由 Syndicate 的 Monetarists 接管，還假惺惺把 Nanamo 的葬禮籌備丟給 Raubahn；Raubahn 回嗆 Teledji 才是殺人兇手。當 Teledji 嘲弄 Nanamo 是不聽話的傀儡時，Raubahn 失控出手，當場將他斬倒，任 Lolorito 震怒喝止也無法挽回。</p><p>Ilberd 隨即輕易制住 Raubahn，把這場混亂化為自己的局勢。Lolorito 命令拘押你們，連 Raubahn 也以叛徒之名要被逮捕。Ilberd 對 Raubahn 施以殘酷的羞辱，並說要告訴他「真正殺死蘇丹的人」是誰——接著冷冷承認：就是他。即使如此，Raubahn 仍強迫自己冷靜下來，對你下令：立刻逃走、洗清罪名、找出幕後黑手——那是唯一的路。</p><p>你們在街上短暫合流時，Ul’dah 已被嚴密警戒。Thancred 說他在慶典變味後先行抽身，回頭才發現城內早已重兵把守；Papalymo 指出這場計畫顯然仰賴那些惡棍能在城裡暢行無阻，Y’shtola 也判斷這種調度與佈局背後一定還有更深的陰謀。Minfilia 問如今該往哪裡躲，但 Thancred 直言：沒有逃離 Ul’dah 的路線，談避難毫無意義。他想起宮殿牆內的秘密通道——Nanamo Ul Namo 寢室的壁爐後方藏著入口，通往城外，能避開正面衝突。追兵逼近時，Yda 決定留下擋人，Papalymo 也跟著留下。更深入地底後，Thancred 與 Y’shtola 也選擇斷後，準備用崩塌隧道的方式阻絕追擊，逼你們只能往前。Minfilia 因為聽見 Hydaelyn 的聲音而不得不停下，但她仍要你繼續走——因為你是 Warrior of Light，你是 Scions of the Seventh Dawn 與整個領土的希望。</p><p>你終於逃到城外，與 Alphinaud 會合。他平安無事卻滿身狼狽，痛恨自己竟被 Teledji Adeledji 玩弄到背後挨刀才醒悟，也懊悔自己以為 Crystal Braves 仍在掌控之中。可你們沒有時間沉溺；有人催促先拉開距離。一路上，更多援手出現：Pipin Tarupin 介入，拒絕讓 Alphinaud 以這種方式被囚，並直指 Monetarists 的貪婪才是禍首。Cid 也趕到，說他把 Enterprise 藏在不遠處，只差你們決定目的地。Alphinaud 選擇 Coerthas，因為 Ishgard 不會容許外國勢力入境。你們抵達 Camp Dragonhead 後得以暫時喘息，並獲得 Haurchefant 的庇護；他說你願意先來找他讓他心裡很暖，也承諾會不負你的信任——但他同時提醒，你不在的這段時間，Coerthas 的情勢也已變得更複雜。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 莫莫蒂 <small class="muted"> 烏爾達哈現世迴廊（X:11.6, Y:9.6)</small></div></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
