    story:`<div class="clamp" data-collapsed="true">
<p>A stranger sidles up to you in a tavern—so conspicuously plain that it feels deliberate—and blurts out a question: you’re Eorzean, right? An adventurer, the kind who’s good at killing and “whatnot.” He hastily insists he’s not good at that himself, then launches into his real concern: a Miqo’te girl is here, dazzling and wonderful, and in this strange land where people bow and sit with their legs tucked beneath them, a young woman traveling alone could be in danger. He paints a grim picture of “bad people” who might trick her, then pants for breath and orders you to get in there and keep her safe—because he’ll be watching.</p>
<p>Not long after, you find Nashu trying to chase down a “gentlemanly Eorzean” in Kugane, only to be intercepted by a talking Namazu named Gyodo. He claims he can lead her to the man she seeks, but only for a fee—one that’s neither free nor cheap. Nashu admits she spent her last gil getting here, and before she can scramble for another way to persuade him, she recognizes you and cheerfully explains she raced to the Far East the moment Hildibrand took to the skies, determined not to let him slip away again.</p>
<p>Gyodo’s tone changes the instant he realizes who you are traveling with. He mutters to himself that you know their game, then hurriedly apologizes, withdraws his demand for payment, and tries to flee on the pretense of a “pressing engagement.” Nashu calls after him, only to realize too late he was trying to swindle her. With no lead on Hildibrand, she admits she’s asked everyone she can think of, and then—remembering how fate always seems to drop him into exactly the right place—she decides the best way to find him is to find a case so irresistible he can’t help but appear.</p>
<p>You help her do exactly that. Inquiries point to a string of thefts targeting wealthy merchants, with one name rising to the top: Master Akebono, whose shop in the Rakuza District was hit most recently. Kugane locals speak of crime as commonplace, but the talk on everyone’s lips is this sneak thief who preys on the rich. When you stir the waters further, the “conspicuously inconspicuous” man reappears, panicking at the thought of Sekiseigumi blades and blurting excuses before he recognizes you. He trembles with relief, then spirals into a breathless confession about a maiden he first saw in Ul’dah—how he has watched over her from afar for years, calling himself her silent guardian and insisting that true love is not clumsy banter, but careful study—until you know her better than she knows herself. And now, he declares, you will aid her in the light while he aids her from the shadows.</p>
<p>With Nashu at your side again, you follow the trail to Akebono’s shop. Outside, a determined man in a proper manner is thanking Akebono and vowing on his honor to catch the thief—only to collide with Nashu in his haste. He introduces himself as Shigure, offers quick apologies, and rushes off, saying duty compels him to pursue the criminal. Nashu bristles at the thought of competition, then turns straight to Akebono with her brightest bravado, asking about the robbery.</p>
<p>Akebono, having heard rumors of inspectors from the West, agrees to speak. He explains that this morning his shop was found unlocked, and inside his most prized possessions were gone—replaced by a message claiming he had been robbed by the “Kugane Wolf Burglar.” Similar calling cards, he says, were left at the other scenes as well. Nashu’s eyes light up: a thief with a calling card, a case with a name—exactly the kind of lure an extraordinary inspector cannot resist. Akebono promises a generous reward for anything that leads to the recovery of his property, and Nashu sends you off to keep digging, certain that if you stay with this case, Hildibrand will find you.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>酒場であなたに近づいてきたのは、あまりに「目立たぬ」風体の男だった。彼はおずおずと、あなたがエオルゼア人か、冒険者か、と尋ねる。自分はせいぜい鼠退治が関の山だと言い訳しながらも、頼みたい仕事があるのだと切り出した。店にはエオルゼアから来たミコッテの娘がいる、信じられないほど美しく素晴らしい娘だ、と息を切らして繰り返す。そして、何かにつけて頭を下げ、膝を折って座る者ばかりのこの奇妙な土地で、若い娘が一人旅をしていれば危ない、悪い連中に騙されて連れ去られ、望まぬことをさせられるかもしれない――だから守ってくれ、と言う。自分は陰から見ている、と。</p>
<p>やがてクガネであなたはナシュと合流するが、彼女は「紳士的なエオルゼア人」を探して途方に暮れていた。そこへ「ギョドウ」と名乗るナマズオが現れ、探し人を見たことがある、案内してやる、と持ちかける。しかし代金は必要で、しかも安くはないと言い、支払えるのかと迫った。ナシュは旅費で最後のギルを使ったと困り果てるが、その最中にあなたを見つけ、ヒルディブランドが空へ飛んだと聞いた瞬間、極東まで追いかけてきたのだと勢いよく語る。</p>
<p>あなたの存在に気づいたギョドウは、途端に態度を変える。小声で警戒を漏らしつつ、脅すような視線は不要だと慌て、料金の話は忘れてほしいと詫び、急用があると言って逃げようとする。ナシュが行き先を問いただすが、結局それは口先だけの誘いだったと分かる。手掛かりが消えた彼女は、それでもヒルディブランドの「落下癖」や偶然の強さを思い出し、ならば大きな事件を探し当てて待てばいい、と結論づける。事件の匂いさえあれば、彼は必ず現れるはずだ、と。</p>
<p>あなたはナシュと共に聞き込みを重ね、富裕な商人を狙った窃盗が続いていること、そして楽座町の豪商アケボノの店が直近の被害だと知る。クガネでは悪事も噂も尽きないが、皆が口にするのはこの「忍び盗人」だという。さらに騒ぎの中心で、あの「目立たぬ男」が再び現れる。赤誠組に斬られると怯えて早口で弁明し、あなたに気づくと胸をなで下ろした。彼はウルダハで出会った一人の乙女に心を奪われ、以来ずっと遠くから見守ってきたのだと語る。真実の愛は不器用な口説き文句ではなく、長年の観察だと言い張り、自分は影から助ける、あなたは光の下で助けるのだ、と言い放つ。</p>
<p>あなたとナシュはアケボノの店へ向かう。そこでは礼儀正しい若者がアケボノに礼を述べ、必ず盗人を捕らえると誓って立ち去ろうとしていたが、急ぎすぎてナシュとぶつかってしまう。彼はシギューと名乗って謝罪し、凶悪な犯罪者を追う務めがあるとして走り去った。ナシュは競争相手の登場にむっとしつつも、アケボノに事情を尋ねる。</p>
<p>アケボノは、西方から来た「検事」の噂は聞いていたと言い、今朝、店が解錠された状態で見つかり、中に入ると大切な品々が奪われていたと説明する。しかも残されていたのは、「クガネの狼賊に盗まれた」という文言の書き置きだった。ほかの現場にも同様の名刺があったらしい。ナシュは目を輝かせる――名乗りを上げる盗人、呼び名のある事件。これならヒルディブランドが放っておくはずがない。アケボノは手掛かりに報酬を約束し、ナシュはあなたに調査の継続を頼む。事件を追い続ければ、きっとまた彼に会える、と確信して。</p>
</div>

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'黃金港的調查員助手',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },

    story:`<div class="clamp" data-collapsed="true">
<p>在酒館裡，有個「刻意不顯眼」到讓人無法忽視的男人湊近你，小心翼翼地問你是不是 Eorzean，還是不是那種很會「殺東西」的冒險者。他急忙補一句自己不擅長，頂多偶爾打打老鼠，然後立刻說明來意：店裡有個 Miqo’te 女孩，美得不可思議、好得不可思議——他反覆強調那份驚嘆，接著又喘著氣說，在這個人們總是鞠躬、跪坐、把腿收在身下的奇怪地方，一個年輕女孩獨自旅行太危險了。壞人可能會騙她、帶走她、逼她做些她不想做的事。所以你得進去保護她，而他會在一旁看著。</p>
<p>不久後，你在 Kugane 找到 Nashu。她正在四處打聽一位「gentlemanly 的 Eorzean」，卻被一名會說話的 Namazu 攔下。那 Namazu 自稱 Gyodo，說自己見過她要找的人，也願意帶路，但服務不免費，而且不便宜。Nashu 說她最後的 gil 都花在來 Kugane 的船費上了，正苦惱著該怎麼辦時，她看見你，立刻精神一振，解釋自己在 Hildibrand 飛上天之後就逼著自己往最遠的東邊追過來——而 Far East 正是她能想到的盡頭。</p>
<p>Gyodo 一注意到你，態度瞬間改變。他像是低聲盤算著什麼，又立刻改口道歉，說不需要任何「兇狠的眼神」，更把費用的事一筆勾銷，推說自己有「非常緊急的約」要走。Nashu 追問 Hildibrand 的下落，卻只得到一場空，這才反應過來自己差點被騙。她沮喪地說自己已經問過太多人都沒用，但很快又想起 Hildibrand 總是莫名其妙出現在「正好該出現」的地方——如果他永遠都在追案子，那你們只要找出一宗最香、最吸引人的大案，守著它等，他就一定會現身。</p>
<p>你們開始找「夠大的麻煩」。有人提起近兩週有好幾名富商遭到洗劫，其中最新的一樁發生在 Rakuza District，受害者是 Master Akebono。Kugane 的人對犯罪見怪不怪，但談起這名神出鬼沒的竊賊，語氣仍帶著焦躁與嘲諷：富人若只會炫耀卻不會防備，或許活該——當然，說的人都會補一句「不是我說的」。你們越問越像是把水攪濁了，那個「刻意不顯眼」的男人竟又冒出來，先是嚇得以為要被 Sekiseigumi 抓去砍，慌忙辯解自己什麼都沒做，直到認出你才鬆一口氣。</p>
<p>他一鬆氣，話就停不下來了。他說自己五年前——或可能是上週——在 Ul’dah 遇見那位讓他心臟停拍的少女，從此便在遠處守著她，自稱沉默的守護者。有人笑他不敢上前，他卻反過來說那才是「真愛」：不是笨拙搭訕，而是長年的觀察，甚至是執著到要比她更了解她自己。等時機成熟，他終究會現身；在那之前，他會在影子裡幫她，而你——你要在光亮處替她護航。</p>
<p>你回到 Nashu 身邊，把重點拉回案子：有個熟練的竊賊正在鎖定富商。Nashu 立刻振奮，覺得這正是能把 Hildibrand 釣出來的案件。你們趕去 Master Akebono 的店，正巧遇到一名行事端正的年輕人向 Akebono 道謝，發誓會把竊賊抓回來，卻因匆忙撞上 Nashu。那人自報姓名是 Shigure，連聲致歉，說自己必須追捕在逃的罪犯，便立刻離去。Nashu 嘀咕著有了競爭對手，但仍挺起精神，向 Akebono 問明失竊細節。</p>
<p>Akebono 說自己聽過「從西方來的 inspectors」的傳聞，也願意配合。他解釋今早有人發現店門竟是解鎖的，進去一看，最珍貴的收藏已被偷走，更糟的是現場留下了訊息——「你已被 Kugane Wolf Burglar 洗劫」；而其他案件也都出現類似的「名片」。Nashu 眼睛發亮：連名號都準備好的連環竊案，哪個 extraordinary inspector 受得了？Akebono 表示只要能找回失物、或提供有用線索，就會重重酬謝。Nashu 於是請你繼續追查，她堅信只要你們緊盯這宗案子不放，Hildibrand 一定會自己出現。</p>
</div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),

};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
