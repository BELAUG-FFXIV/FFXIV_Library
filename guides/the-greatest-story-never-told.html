<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`The Greatest Story Never Told`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Valliant Hart is standing before the statue in open frustration when you find him, muttering over elements and wheels that mean nothing to him. Yet the moment he looks at you, his tone changes. He studies you with the startled recognition of someone who believes he has found a survivor of another age, then quickly lowers his voice and introduces himself. With the familiarity of a fellow veteran, he decides to trust you with the reason for his being here: he is chasing the lost treasure of Lalafuto III, a legendary secret said to have been discovered by the explorer Winebaud before the old man died.</p><p>He speaks of the treasure with reckless excitement. Winebaud, he says, claimed it was worth one hundred million gil, the most precious secret of the long-dead sultan of Belah’dia. Valliant Hart has found a message Winebaud left upon the statue of the Silent King, but the writing is encoded and the meaning maddeningly obscure. He has managed to decipher only fragments, and even those seem to be riddles rather than directions. Even so, he is convinced the clues will lead to the prize, and when you agree to help, he throws himself into the chase with renewed confidence.</p><p>The first of Winebaud’s riddles sends you to Yayaroku, who hears the sequence of elements and immediately recognizes that the order is wrong. Drawing upon an old passage concerning the cycle of elemental birth, he sets the elements back into their proper progression. That correction turns the nonsense into a real path forward, and by following it, you are led at last to a young explorer who has been waiting—faithfully, almost unbelievably—for the one who would solve Winebaud’s clues. The youth places Winebaud’s journal in your hands and tells you that this is only the beginning.</p><p>From there, the hunt deepens. One riddle points you toward Memenugu, whose memory of Winebaud is tied not to treasure but to his absurd habit of repeating a strange phrase about steps. Another clue leads you to Jahelle, who recalls his maddening way of apologizing after quarrels over sums and bills. Another sends you to Isouda, who remembers Winebaud as a contrary soul who always insisted that the opposite of nonsense was sense. Piece by piece, those odd remarks stop sounding like meaningless quirks and begin to reveal themselves as the hidden machinery behind his riddles.</p><p>As you continue, the search grows stranger. Some clues are concealed in magicked writing that awakens only under peculiar conditions. Others lead you to Seseroga and an old list of goods that seems useless at first glance, until it becomes clear that even these mundane fragments were planted with purpose. Each time you return, Valliant Hart meets your success with equal parts admiration and impatience. He wants the treasure desperately, yet each new breakthrough yields not a coffer of riches, but another verse of love poetry, another layer of mystery, another obstacle between desire and truth.</p><p>Eventually, the shape of Winebaud’s design begins to emerge. He tells you, through the final message, that beginnings and endings define all lives, and that the key has already been given. Behind the obfuscations lies not merely a lock to be opened, but a story to be understood. When the last clue yields at last, the statue reveals a hidden hollow, and the treasure of Lalafuto III is finally placed in your hands. Valliant Hart can hardly contain himself, certain that unimaginable wealth has at last been won.</p><p>But what lies hidden there is not gold, nor jewels, nor any object that could settle a debt. It is a Belah’dian tablet covered in love poetry. At first, Valliant Hart can only stare in disbelief and fury. Yet as the words unfold, a different truth rises from them: these are not the sighs of a fool, but the private heart of Lalafuto III himself. The verses suggest that the sultan loved deeply enough to forsake power, and may even have planned to abandon his throne and flee the capital in secret.</p><p>In that instant, the treasure reveals its true worth. What Winebaud preserved was not a fortune that could be spent, but a secret buried for seven hundred years: a fragment of the truth behind a vanished ruler and the life he may have chosen over kingship. To Valliant Hart, it is a cruel joke after all that labor. To you, it is something else entirely—the proof that what survives the ages is not always wealth, but the hidden story that wealth could never buy.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Valiant Hart <small class="muted">(Western Thanalan, X:18.3, Y:17.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-ultimate-weapon.html">The Ultimate Weapon</a></div><div class="row">Any Class or Job Lv. 1</div></div>`,
    followq:`<div class="stack"><div class="row">None</div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'ワインボードの謎',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたが像のもとへ辿り着くと、ヴァリアント・ハートは苛立ちを隠そうともせず、元素だの輪だのと意味のわからぬ言葉に悪態をついていた。だが、あなたの姿を認めた瞬間、その態度は一変する。まるで遠い戦場を生き延びた者を見つけたかのような目を向けたあと、彼はすぐに声を潜め、自らの名を名乗る。そして、同じ時代の重みを背負う者として、ここにいる理由をあなたに明かすことに決める。彼が追っているのは、探検家ワインボードが遺したという、ベラフディア王ララフト三世の秘宝だった。</p><p>その秘宝は一億ギルの価値を持つと、ワインボードは語っていたという。ヴァリアント・ハートは「物言わぬ王」の像に刻まれた遺文を見つけ出したものの、それは暗号で記されており、解読できた箇所も謎めいた文ばかりだった。それでも彼は、この遺文こそが秘宝への道筋だと信じて疑わない。あなたが協力を受け入れると、彼は再び勢いを取り戻し、ふたりでワインボードの足跡を追うことになる。</p><p>最初の謎は、あなたをヤヤロクのもとへ導く。彼は元素の並びを聞くなり、その順序が誤っていると見抜く。そして古い文献に記された生成の理をもとに、雷、火、土、氷、水、風という正しい巡りを示す。その順へと読み替えられた謎は、ようやく意味ある導きとなり、あなたは長いあいだ待ち続けていた若手探検家のもとへ辿り着く。彼は、遺文の謎を解いた者に託すよう命じられていたワインボードの紀行録を、あなたへ手渡すのだった。</p><p>そこから先、探索はさらに深く、奇妙さを増していく。ある謎はメメヌグへと繋がり、彼はワインボードが戦いの所作に口を挟み、何度も同じ妙な言い回しを口にしていたことを思い出す。別の手がかりはジャヘルへ向かわせ、勘定をめぐる口論のたびに、彼が風変わりな謝罪をしていたことが明らかになる。さらにイスーダは、何事にも逆を唱えたあの老人が、「無意味」の反対は「意味」だと言い張っていたと語る。ばらばらに見えた癖や口癖は、やがて遺文を解くために仕掛けられた鍵だったことが少しずつ見えてくる。</p><p>やがて謎は、ただの言葉遊びでは済まなくなる。魔法の文字で刻まれ、特定の条件でしか姿を現さぬものもあれば、商都の帳簿や古い品目表のような、一見して無価値な断片を辿らねばならぬものもある。セセロガの手元に残されていた古い一覧ですら、やがて次の扉を開くための部品だったと知れるたび、ヴァリアント・ハートはあなたの才覚に感嘆しながらも、いら立ちを募らせていく。秘宝を望む気持ちは募るばかりなのに、新たに得られるのは財の在処ではなく、恋の詩句と新たな謎ばかりだったからだ。</p><p>それでも最後には、ワインボードの意図した形が見えてくる。人生は始まりと終わりによって定義されること、鍵はすでに与えられていること、そして障りの向こうにあるのは、ただ開けるべき錠ではなく、読み解くべき物語なのだと。最後の謎が解かれたとき、像はついに隠された空洞を露わにし、ララフト三世の秘宝はあなたの手に渡る。ヴァリアント・ハートは、ついに莫大な富が現れたと信じ、興奮を抑えきれない。</p><p>だが、そこにあったのは金銀財宝ではなかった。ベラフディアの石板に刻まれていたのは、延々と綴られた恋の詩だった。はじめ、ヴァリアント・ハートは呆然とし、すぐに怒りを爆発させる。だが、その文面を追ううちに、別の真実が浮かび上がる。これは愚かな恋文の寄せ集めではない。ララフト三世自身の胸の内であり、王としての責務を捨ててでも愛する相手と生きたいと願った痕跡だったのだ。</p><p>その瞬間、秘宝の意味は一変する。ワインボードが遺したものは、使えば尽きる財ではなく、七百年も埋もれていた歴史の断片だった。ララフト三世は暗殺されたのではなく、自ら王位を捨てて去ったのかもしれない。ヴァリアント・ハートにとっては借金も返せぬ悪ふざけにしか見えなくとも、あなたの手に残ったのは、金では決して買えぬものだった。時を越えてなお価値を失わないのは、財宝そのものではなく、長く隠されてきた真実の物語だったのである。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ヴァリアント・ハート <small class="muted">（西ザナラーン, X:18.3, Y:17.4）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-ultimate-weapon.html">究極幻想アルテマウェポン</a></div><div class="row">いずれかのクラス・ジョブ Lv 1～</div></div>`,
    followq:`<div class="stack"><div class="row">なし</div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'瓦因博多的謎題',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>當你見到 Valliant Hart 時，他正站在那座雕像前，對著什麼元素、輪轉之類的內容煩躁咒罵，顯然已被眼前這道謎題折騰得心浮氣躁。可一看見你，他的態度立刻變了。他像是從你身上看見了某段久遠戰場留下的影子，帶著一種半是驚訝、半是篤定的神情端詳著你，隨後又很快收起話頭，自報姓名，並決定把自己來到這裡的理由告訴你。原來，他正在追尋探險家 Winebaud 生前留下的線索，想找出 Belah’dia 的 Sultan（Belah’dia／後來的 Ul’dah 這一系國家使用的統治者稱號，可理解為君主）Lalafuto III（Belah’dia 的 Sultan，相傳約於七百年前在位，後來在神秘情況下失蹤，因此留下許多謎團）那份傳說中的秘寶。</p><p>在 Valliant Hart 的描述裡，那份秘寶價值高達一億 gil，甚至被 Winebaud 稱作 Lalafuto III 最珍貴的秘密。如今，他在「沉默之王」的雕像上發現了 Winebaud 留下的訊息，可那訊息經過加密，他費盡力氣也只解出一小部分，而且解出來的東西依舊像謎語一樣叫人摸不著頭緒。即便如此，他還是深信，只要順著這些遺文走下去，就一定能找到真正的寶藏。於是，在你答應幫忙後，這場追著 Winebaud 足跡展開的尋寶，就正式開始了。</p><p>第一道謎題把你帶去找 Yayaroku。Yayaroku 一聽見那串元素順序，立刻指出排列有誤，接著根據古老文句中關於元素生成的道理，將它們調整回正確的循環。原本看似無意義的字句，也因此終於顯露出通往下一步的方向。順著這條線索前進，你最後找到了那位一直守在原地、等待著有人解開謎題的年輕探險家。他遵照 Winebaud 的囑託，把 Winebaud 的紀行錄正式交到你手上，並告訴你，這一切其實才剛開始。</p><p>接下來的追查變得越來越深，也越來越古怪。某一道提示把你引向 Memenugu，讓你從他口中得知 Winebaud 當年曾反覆提起某句關於步伐的怪話。另一道線索又帶你去見 Jahelle，讓你知道 Winebaud 在和人爭論帳單與計算時，總會說出一種莫名其妙的道歉方式。再接著，你又從 Isouda 那裡聽見他對 Winebaud 的抱怨——那個老人總愛故意唱反調，甚至還說過「無意義的反面就是意義」。這些零散又惹人煩躁的記憶，起初聽來毫無價值，卻在你一步步回頭對照之後，慢慢顯露出它們其實都是解謎的一部分。</p><p>之後，你面對的已不只是單純的文字謎題。有些訊息是被魔法封住的，必須在特殊條件下才會現形；有些則得從舊名單、舊交易紀錄之中，把看似毫不起眼的細節重新拼湊起來。當你找到 Seseroga，從他保留下來的舊文件中繼續往前推進時，也越來越能感受到 Winebaud 當年是怎樣把整個謎局層層疊疊地藏了起來。每次你帶回新進展，Valliant Hart 都一邊驚嘆你的本事，一邊越來越不耐。他想要的是寶藏本身，可每次前方等著你們的，卻不是財富的所在，而是一首又一首戀愛詩句，以及更難解的下一道門。</p><p>直到最後，Winebaud 真正想留下的東西才終於開始成形。他透過最後那幾段訊息告訴你，不論一個人活成什麼樣子，最終定義他的，往往是他的開始與結局；而打開這道鎖的鑰匙，其實早就已經交到你手上。當最後的謎題被解開後，那座雕像終於打開了隱藏的凹槽，Lalafuto III 的秘寶，也終於落入你手中。Valliant Hart 幾乎壓抑不住激動，彷彿自己終於等到了足以改變一切的巨大財富。</p><p>然而，藏在其中的並不是金銀珠寶，也不是足以償清債務的驚人財物。你取出的，是一塊刻滿文字的 Belah’dian stone tablet，而上頭記錄的，竟是一行又一行的情詩。起初，Valliant Hart 幾乎不敢相信，隨之而來的便是強烈的失望與怒火。可當你們真正讀下去，另一種截然不同的真相，也開始慢慢浮現。這不是某個無聊之人留下的可笑情話，而很可能正是 Lalafuto III 自己的內心。他深深愛著某個人，甚至願意為了對方捨棄權力、名望與王位，偷偷離開自己原本必須背負的一切。</p><p>到了這一刻，所謂的秘寶才真正顯現出它的價值。Winebaud 留給後人的，從來不是能花用的財富，而是一段埋藏了七百年的歷史真相。也許 Lalafuto III 並不是如世人所想那樣遭人謀害，而是真的曾經計畫拋下王位，為了所愛之人悄悄離開王城。對 Valliant Hart 來說，這一切或許只是場無法拿來還債的殘酷玩笑；可對你而言，真正被找到的，從來不是金錢，而是一段穿越漫長歲月後，依舊沒有失去價值的秘密。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 瓦利安特·哈特 <small class="muted"> 西薩納蘭（X:18.3, Y:17.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-ultimate-weapon.html">超越幻想，究極武器</a></div><div class="row">只要任一職業達到等級 1 以上即可</div></div>`,
    followq:`<div class="stack"><div class="row">無</div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:'', comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  document.getElementById('panel-story').classList.remove('active');
  document.getElementById('panel-acq').classList.remove('active');
  document.getElementById('panel-unlockq').classList.remove('active');
  document.getElementById('panel-followq').classList.remove('active');
  document.getElementById('panel-comments').classList.remove('active');
  document.getElementById('panel-'+key).classList.add('active');
  if (key !== 'comments') document.getElementById('panel-'+key).innerHTML = t[key];
  if (key === 'story') wireClamp(document.getElementById('panel-story'), t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
