        story:`<div class="story-wrap"><div class="story-content">
<p><strong>Seize the Neigh</strong></p>
<p>The uma bugyo greets you with solemn ceremony—only to pause when he recognizes your face, as if you have met before. He introduces himself as the head of a delegation from Hingashi, come to tend the fire of friendship with Eorzea by sharing their Heavensturn customs. In Eorzea, people choose a deity to stand first among the Twelve, but in the Far East that honor is granted to one of twelve noble beasts—and this year belongs to the horse, dignified and dependable above all.</p>
<p>He admits that while he once had the chance to introduce horses to Eorzea, true appreciation remains rare. This time, he hopes to better convey their gallantry and majesty by holding a procession. Yet the plan has run into trouble: one of his delegates is out spreading word in Limsa Lominsa, wearing a distinctive kabuto like his—and bringing along a charming mascot that is as anxious as it is adorable. Seeing you as an adventurer used to creatures great and small, he asks for your help, and sends you to find his assistant, the uma yoriki, near the Drowning Wench.</p>
<p>There, you find the uma yoriki exhausted and exasperated, pleading with the mascot to come closer so he can do his job. He explains that the little one is a unicolt—the young of a unicorn, rare even in Eorzea—borrowed for this Heavensturn celebration, yet it refuses every command. Though he can handle even the most unruly horses, this creature has eluded him completely, cowed by unfamiliar surroundings and unwilling to move.</p>
<p>Then, unexpectedly, the unicolt approaches you of its own accord. The uma yoriki recalls being told that unicorns favor those who are pure of heart—something he once dismissed as myth—but now wonders if the creature truly senses intent. He admits his own eagerness may have driven it away, while your gentler approach drew it near. Taking this as a sign, he asks you to bring the unicolt with you and help promote the procession: it will set forth from the Zephyr Gate in Middle La Noscea and head south, so you should begin by speaking with people nearby and spreading the word.</p>
<p>With the unicolt at your side, you make the rounds and watch the city’s mood shift from curiosity to excitement. People marvel at the tiny horned creature and quickly grasp that it is the Heavensturn mascot—linking it to the year of the horse and the Far Eastern style of its adornments. Some remark that while they know chocobos well, they have heard of a thriving harness trade in Kugane, and find it fascinating that different lands embraced different steeds in similar ways. Others note that the Grand Companies have even tested using horses before—rare in Eorzea, unlikely to replace chocobos, but said to be comfortable to ride—and promise they will come watch the procession.</p>
<p>When you return, the uma bugyo thanks you warmly, noting the buzz among the townspeople as proof of your excellent work. He checks on the mascot with concern, remembering how skittish it once was—only to be delighted by how outgoing it has become with you. He explains that there is a reason their delegation went to such lengths to borrow a unicorn for this year’s celebration.</p>
<p>He recalls a prior visit when their push to introduce horses angered those who represented chocobo interests, nearly turning into a serious dispute. It was resolved thanks to an Ishgardian knight—an irrepressible, silver-haired gentleman bearing the crest of a unicorn—who spoke with equal admiration for horses and chocobos and helped all sides find civility and amity. Remembering that bond beyond nations, the uma bugyo reached out to the knight’s noble house for this visit, and now—thanks to the unicolt, and to you for helping it come into its own—he believes all will be well. With preparations nearly complete, he announces that the hour of the event is upon you, and the procession will begin as soon as everything is ready.</p>
<p><strong>Majesty in Motion</strong></p>
<p>The unicolt’s bright whinnies make it plain how much its mood has changed, and the uma bugyo can’t help but smile at the sight. He says his faithful assistants are already finishing the last preparations outside the Zephyr Gate, and since the departure point is immediately beyond it, even the townsfolk—and certainly you—should have no trouble finding the way. He teases that the unicolt could probably make its own way there now that it has been around the city so much, then warmly invites you to attend the procession as well, since you helped promote it. He directs you to find the uma yoriki outside the Zephyr Gate, who can show you the best places to watch.</p>
<p>When you arrive, the uma yoriki is surprised all over again—this time because the unicolt showed up alone before you did. Yet he quickly realizes why: in such a short time at your side, the once-wary creature has become completely at ease around people. He remarks that you truly have a way with beasts, and says those taking part in the procession should be arriving soon.</p>
<p>Before long, riders representing the Grand Companies gather with their horses, and your Far Eastern hosts confirm what you suspect: these are the first horses brought in from the Far East after the delegation’s visit years ago. Suited to Eorzea’s climes, they have fared well, and now serve in patrols and various duties—dependable enough that their riders speak with pride. And, as pride tends to do, it quickly becomes friendly rivalry: one boasts that his steed is the finest, another insists his has the brightest eyes and noblest bearing, and the laughter around them makes it clear they are utterly taken with their mounts.</p>
<p>The uma yoriki explains how these splendid steeds will travel together along the road, showing off their gallant and majestic forms—a fitting way to mark the coming of the year of the horse. But then the unicolt, emboldened, makes its own wish clear: it wants to join the procession. The uma yoriki hesitates, impressed by its newfound courage but worried it would be unsafe among war-trained horses several times its size. You reassure him—promising it would be a wonderful addition and that you will watch over it—and he relents.</p>
<p>A plan is set. While the Grand Company horses proceed along the road, the unicolt will run freely through the fields with you at its side, lending the procession a charming final accent. As the riders set off, you and the unicolt follow your part of the route, and the little creature savors the joy of running while people cheer it on—until it reaches the end thoroughly satisfied, eager for more.</p>
<p>At the finish, the riders praise the unicolt’s run, and the uma yoriki celebrates the sight of any horse in motion—great stallion or growing foal alike. He shares Far Eastern belief that to behold a horse’s majestic form in the new year is to pray for peace and plenty. He adds that the unicorn, too, is a symbol of the bond between your lands—a friendship meant to endure for generations—giving the procession even greater meaning. A rider notes that in Ishgard the unicorn is regarded as a sacred beast used in religious rites, making its role in Heavensturn feel especially fitting. The uma yoriki is delighted to learn that, and replies that unicorns are likewise considered sacred in the Far East, believed to possess divine powers—proof that distant lands can share surprising common ground.</p>
<p>With the event complete, the uma yoriki and the riders turn to tidying up, and he asks you to report back to the uma bugyo. When you return, the uma bugyo welcomes you with joy and says he could tell the procession was a rousing success simply from the unicolt’s buoyant bearing. He praises the little one for going far above and beyond its duty as mascot, then turns to you: in being at your side, the unicolt has forged a bond of trust with you. With hope and faith, he asks that you take it with you on your journeys—believing it can reach its full stride in your care, and that your Ishgardian friends would agree. As you part, he bids you enjoy the Heavensturn festivities while they last, and wishes you health and happiness for the year ahead.</p>
</div><button class="expand-btn" data-more="Read more" data-less="Show less">Read more</button></div>`,

        story:`<div class="story-wrap"><div class="story-content">
<p><strong>馬の縁者と降神祭</strong></p>
<p>馬奉行は、厳かな口上であなたを迎えたのち、ふと顔を見て言葉を止める。どこかで会ったことがある――そんな確信を滲ませながら、彼はひんがしの国から来た使節団の長として名乗り、エオルゼアとの友好の火を絶やさぬため、降神祭の風習を分かち合いに来たのだと語る。エオルゼアでは十二神のうち一柱を選ぶが、東方では十二の尊き獣のうち一つに栄誉を授け、今年は威厳と頼もしさを備えた「馬」が主役なのだという。</p>
<p>彼は、かつて馬を紹介したことはあっても、真の魅力が伝わったとは言い難いと認め、今回はその勇壮さと気高さを伝えるため「御披露道中」を催したいと話す。ところが宣伝役の配下がリムサ・ロミンサで呼びかけをしている最中、同じ兜をかぶった一員が連れている「ますこっと」が、可愛いほどに臆病で手を焼いているらしい。生き物に慣れた冒険者であるあなたなら、と助力を頼み、溺れた海豚亭の方へ向かったという「馬与力」を訪ねるよう告げる。</p>
<p>溺れた海豚亭の近くで、馬与力はため息混じりに、言うことを聞かない「午のユニコルト」を追っていた。彼はそれがユニコーンの幼獣であり、エオルゼアでも稀な存在だと説明する。降神祭のために手配したものの、見知らぬ土地に怯えて動かず、どれほど声をかけても応じない。荒馬なら手綱さばきでどうにでもなるが、この子には通じないのだと打ち明ける。</p>
<p>ところが、午のユニコルトは不意にあなたへ歩み寄る。馬与力は、ユニコーンは心清らかな者に懐くとイシュガルドで聞いたことを思い出し、それを迷信だと決めつけていた自分を省みる。催しに使おうと急ぐあまり近づけなかったのに、あなたには警戒を解いた――生き物は人の意図を感じ取るのかもしれない、と。そうして彼は、あなたに午のユニコルトを連れて宣伝を頼み、御披露道中はゼファー陸門から中央ラノシアへ出て南へ進むのだから、まずは近くの者たちに声をかけてほしいと言う。</p>
<p>あなたが午のユニコルトとともに街を回ると、人々は小さな角のある姿に驚きつつも、それが降神祭の「ますこっと」だと知って笑みを浮かべる。東方風の飾りから主役が「馬」だと納得する者もいれば、クガネでは馬具の商いが盛んだと聞いたことがあると言い、遠い土地でチョコボと馬がそれぞれ同じように親しまれてきたのは興味深いと語る者もいる。さらに、三国軍が試験的に馬を運用したことがあると話す者もいて、珍しいが乗り心地は良いらしいと懐かしみ、御披露道中を見に行くと約束してくれる。</p>
<p>報告に戻ると、馬奉行は街の高まりこそあなたの働きの証だと礼を述べ、怯えていたはずの午のユニコルトが明るくなった様子に目を見張る。彼は今年ユニコーンを「ますこっと」に選んだ理由を語り、かつて馬を広めようとしてチョコボに関わる者たちと衝突しかけた折、ユニコーンの紋を帯びたイシュガルドの騎士が仲裁し、馬とチョコボの双方を等しく讃えて和解へ導いたのだと言う。国を超える絆を思い起こし、その縁を頼ってこのたびも手を尽くしたが、今はあなたと午のユニコルトのおかげで万事うまくいくと確信できる。準備が整い次第、いよいよ御披露道中を始めるのだと、彼は告げる。</p>
<p><strong>御披露道中と降神祭</strong></p>
<p>午のユニコルトが朗らかに嘶くたび、すっかり元気になった様子が伝わり、馬奉行も目を細めて笑う。出発地点では、忠実なる配下たちがすでに最終準備を整えているところで、ゼファー陸門のすぐ外なのだから迷うはずもない――街を回ったこの子なら、ひとりでも辿り着けそうだ、と冗談めかして言う。そして、あなたが宣伝に力を貸してくれたのなら、道中見物にも参加するのが自然だろうと誘い、ゼファー陸門の外で馬与力に会えば見物の好位置を案内してくれると告げる。</p>
<p>現地に赴くと、馬与力はあなたも来たのかと喜びつつ、先に午のユニコルトがひとりで現れたことに驚いたと語る。だがすぐに、その理由も見えてくる。あなたと行動した短い間に、この子は人々の気配に怯えなくなり、すっかり馴染んでしまったのだ。馬与力は、あなたには本当に獣と心を通わせる術があると言い、まもなく道中に参加する者たちが集まってくるはずだと告げる。</p>
<p>やがて三国の騎兵たちが馬を連れて姿を現し、それらがかつて使節団が来訪した後、東方から初めて連れて来られた馬であることが語られる。こちらの風土に適した品種で、巡回などの任務に用いられ、頼もしさを証明してきたという。騎乗する者たちは誇らしげで、やがてその誇りは張り合いへと変わる――自分の馬こそ最上だと胸を張る者に、別の者は目の輝きも毛艶も風格も自分の方が上だと言い返し、笑い混じりのやりとりから、皆が馬に夢中なのだと伝わってくる。</p>
<p>馬与力は、これらの立派な馬が道を進み、勇壮かつ威厳ある姿を披露するのが「午年」を寿ぐにふさわしいと説明する。だがその時、午のユニコルトが自分も加わりたいと身振りで示す。馬与力は勇気づいたことに感心しつつも、軍用の馬に混じれば危険だと案じるが、あなたが見守ると約束し、愛らしい「ますこっと」を見られれば人々も喜ぶだろうと考え直して参加を認める。</p>
<p>こうして、三国の馬が道を進むあいだ、午のユニコルトはあなたの傍らで野を駆け、道中の締めくくりに可愛らしい彩りを添えることになった。あなたと走るこの子は歓声に包まれ、自由に駆ける喜びを噛みしめるように進み、やがて満ち足りた様子で終着へ辿り着く――それでもなお、さらに走りたいとせがむほどに。</p>
<p>終点では騎兵たちが小さな走りを称え、馬与力は「動く馬」こそが何より壮観だと語る。東方では新年に馬の雄姿を拝むことは平和と豊穣を祈ることだと信じられているのだという。さらに、ユニコーンは両国の絆を象徴し、世代を超えて続く友誼の印でもあるからこそ、この道中はより深い意味を得るのだと。イシュガルドではユニコーンが宗教儀礼を助ける聖獣だと聞いた騎兵が言えば、馬与力は東方でも同じく神性を宿す聖獣として崇められていると応じ、遠い土地同士でも共通点が多いのだと興味深げに語る。</p>
<p>後片付けに向かう馬与力は、あなたに馬奉行への報告を頼み、改めて助力へ礼を述べる。戻ったあなたを馬奉行は喜びのうちに迎え、午のユニコルトの晴れやかな様子だけで道中が大成功だったとわかったと言う。そして、この子が「ますこっと」の務めを大きく超えて活躍したと褒め、あなたの傍らで信頼の絆を結んだのだろうと確かめる。だからこそ、旅の道連れとして連れて行ってほしい――あなたの世話のもとでこの子は本来の歩みを得られ、イシュガルドの友もきっと賛同するはずだと願いを託す。別れ際、降神祭の祝祭を楽しむようにと告げ、来たる年の健康と幸福を祈って言葉を結ぶ。</p>
</div><button class="expand-btn" data-more="続きを読む" data-less="折りたたむ">続きを読む</button></div>`,

        story:`<div class="story-wrap"><div class="story-content">
<p><strong>與馬結緣的人們與降神祭</strong></p>
<p>Uma Bugyo 以極其莊重的口吻向你致意，卻在看清你的臉後頓了一下，像是忽然想起你曾與他在很久以前打過照面。他自稱來自 Hingashi 的使節首領，此行是為了延續與 Eorzea 的友誼之火，並把他們的 Heavensturn 風俗帶來分享。在 Eorzea，人們會在十二神之中推選一位作為「第一」；但在東方，這份榮耀會授予十二種高貴之獸之一，而今年的主角正是馬——最體面、最可靠的坐騎。</p>
<p>他坦言，自己過去雖曾把馬介紹到 Eorzea，真正懂得欣賞的人仍不多。於是今年，他希望用一場遊行把馬的英姿與威風更清楚地傳達出去。然而事情卡在宣傳上：一位團員正在 Limsa Lominsa 替活動奔走，戴著和他相同風格的兜盔，身旁還帶著一個可愛到讓人心軟、卻緊張得不得了的吉祥物，結果反而難以應付。Uma Bugyo 認為你身為冒險者，最懂得與各種生物打交道，便請你出手相助，先去 The Drowning Wench 找他的助手 Uma Yoriki。</p>
<p>你在 The Drowning Wench 附近找到 Uma Yoriki，他正對著那個小傢伙束手無策，喊了半天也得不到回應。他告訴你，那是一隻 unicolt——獨角獸的幼獸，連在 Eorzea 都非常罕見。使節團為了這次 Heavensturn 才好不容易借到牠，但牠顯然被陌生環境嚇壞了，只縮在一旁，不肯移動，更不肯聽從指令。Uma Yoriki 自嘲自己連再難馴的馬都能應付，偏偏就是無法靠近這隻小傢伙的心。</p>
<p>就在他灰心之際，unicolt 卻自己走向你，像是願意把信任交到你手上。Uma Yoriki 想起自己從 Ishgard 接回牠時聽過的說法——獨角獸偏愛心地純淨的人——他原本以為那只是傳聞，現在卻不得不懷疑，牠也許真的能感覺出人的意圖。他反省自己急著把牠推上慶典舞台，反倒逼得牠退縮；而你不帶逼迫的靠近，卻讓牠願意走來。於是他拜託你帶著 unicolt 一起宣傳遊行：隊伍將從 Zephyr Gate 出發，穿過 Middle La Noscea 往南行進，而你可以先從附近的人開始，把消息傳出去。</p>
<p>你帶著 unicolt 在城裡四處走動，許多人先是被牠那小小的角與身形嚇了一跳，接著很快就明白這就是 Heavensturn 的吉祥物，也看出牠身上的裝飾帶著東方風格，象徵今年「馬」的主題。有人提到自己常年在海上跑，不太接觸馬，但聽說 Kugane 曾有興盛的馬具生意；也有人覺得很有趣——Eorzea 有 chocobos，而遠方則是馬，兩種不同的生物卻在不同土地上被人們以相似的方式接納。還有人說三大軍團曾試行運用馬匹，雖然在 Eorzea 仍屬稀少、難以取代 chocobos，但聽說騎乘起來很舒適；如果這次他們也會參與遊行，他一定會抽空去看。</p>
<p>當你回去回報時，Uma Bugyo 從城裡居民的興奮反應看出你確實把宣傳做到了位，便鄭重向你道謝。他原本還擔心吉祥物一見到陌生聲響就會受驚，如今卻看到 unicolt 變得外向又開朗，幾乎像換了一個小傢伙。他也因此解釋，為何今年特地選了獨角獸相關的吉祥物：那源於他上一次來訪時的往事——當時他們熱切想把馬帶進 Eorzea，卻惹惱了某個代表 chocobo 利益的團體，雙方一度爭執得很僵。幸好當場有一位 Ishgardian 騎士出面調停——銀髮、性格直率，身上還帶著獨角獸的徽記——他同樣敬重馬與 chocobos，讓衝突得以回到禮節與友誼之中。Uma Bugyo 說，正因想起那段跨越國境的連結，他才再次向那個家族求助；而如今多虧 unicolt 以及你讓牠願意踏出一步，他終於能相信今年的活動會順利。準備一就緒，遊行便會立刻開始。</p>
<p><strong>公開亮相的遊行與降神祭</strong></p>
<p>Uma-no-unicolt 連連嘶鳴，聽得出來牠正玩得開心。Uma Bugyo 看著牠這麼有精神，忍不住笑了起來，說他的助手們此刻正在遊行的出發點做最後準備——地點就在 Zephyr Gate 外面，大家不可能找不到。他甚至半開玩笑地說，這小傢伙如今都在城裡跑熟了，搞不好自己就能一路找到出發點。接著，他順勢邀你也去觀禮：既然你替他們宣傳了遊行，理所當然也該親自來見證。為此，他請你到 Zephyr Gate 外找 Uma Yoriki，對方會告訴你最適合觀看的地點。</p>
<p>你抵達 Zephyr Gate 外時，Uma Yoriki 先是驚訝，因為 Uma-no-unicolt 居然自己先跑來了；但他很快就明白原因——這短短一段時間跟在你身邊，牠已經完全不怕人群，甚至顯得自在放鬆。Uma Yoriki 說你確實很會跟動物相處，並提醒你，參與遊行的人應該很快就會陸續到場。</p>
<p>不久後，三大軍團的騎兵帶著馬匹出現，你也確認了自己的猜想：這些馬正是多年前使節團來訪後，第一批從東方引進的馬種。牠們適應這裡的氣候，表現良好，如今被用於巡邏與各種任務，也證明了自己的可靠。騎兵們談起自家坐騎都滿是驕傲，說著說著還互相較起勁來——有人堅稱自己的馬才是最棒的，有人立刻反駁說自己這匹眼神最亮、毛色最光、姿態最有風範；另一位則笑著說，你也看得出來，他們是真的很迷這些馬。</p>
<p>Uma Yoriki 指著並列的三匹馬，說牠們會一起沿著道路前進，把那份英姿與威風完整展現出來，正好用來迎接「馬年」。就在此時，Uma-no-unicolt 也鼓起勇氣表達——牠想加入遊行。Uma Yoriki 雖然佩服牠的膽量變大了，卻擔心牠在那些受過戰訓、體型大上好幾倍的馬群中穿梭並不安全。你表示牠會成為很棒的亮點，也會在旁守著牠，Uma Yoriki 便點頭答應：若你陪著，也許就不必擔心；而且大家一定會喜歡看到這麼可愛的吉祥物。</p>
<p>於是他做出安排：三大軍團的馬將照原定路線沿著道路前行；而 Uma-no-unicolt 則由你陪著，在道路旁的原野奔跑，讓遊行在最後多一筆可愛的收尾。你帶著牠向前時，牠像迫不及待要出發般興奮不已；一路上，牠享受著自由奔跑的快感，也享受著沿途人群的喝采與歡呼，直到抵達目的地時仍滿足得不得了，彷彿還想再跑一回。</p>
<p>在終點，騎兵們笑著稱讚牠跑得真像樣，Uma Yoriki 也附和說，不論是雄壯的種馬還是還在長大的幼馬，「奔跑中的馬」永遠都是最壯觀的景象。他說在東方，人們相信新年能親眼看見馬的威風姿態，就等同於祈求來年的和平與富足。除此之外，獨角獸也是兩地情誼的象徵，是能延續到世世代代的友誼印記——這兩層意義，讓這場遊行更顯得值得紀念。有人提到在 Ishgard，獨角獸被視為能協助宗教儀式的聖獸，因此牠能參與 Heavensturn 也格外合適；Uma Yoriki 聽了很驚喜，說在東方獨角獸同樣被視為擁有神力的聖獸。即使兩地相隔遙遠，卻仍有許多相通之處；而小傢伙能在慶典中奔跑，更是個吉兆。</p>
<p>當 Uma Yoriki 與騎兵們去收拾善後時，他請你回去向 Uma Bugyo 報告，也再次向你道謝。你回到 Limsa Lominsa 後，Uma Bugyo 以滿心喜悅迎接你，說他光看 Uma-no-unicolt 那副神采飛揚的模樣，就知道遊行一定大獲成功。他先誇獎小傢伙身為吉祥物卻做得遠遠超出本分，接著看向你，確認牠在你身邊已經建立起真正的信任。於是他帶著期待與祝福請你帶著牠一起旅行——在你的照顧下，牠一定能跑出屬於自己的完整步伐，而來自 Ishgard 的朋友們想必也會同意。最後，他祝你把握 Heavensturn 的歡樂時光，並代表使節團祝福你在新的一年健康、幸福。</p>
</div><button class="expand-btn" data-more="展開全文" data-less="收合內文">展開全文</button></div>`,
        acq:`<div class="stack">
          <div class="row"><b>任務發布</b> 馬奉行 <small class="muted"> 利姆薩·羅敏薩上層甲板 (X:11.5, Y:13.8)</small></div>
        </div>`,
        event:`<div class="stack"><div class="row">2025年12月31日 – 2026年1月15日</div></div>`,
        unlockq:`<div class="stack"><div class="row">任意職業（等級15）</div></div>`,
        followq:`<div class="stack"><div class="row">已收錄於故事</div></div>`
      }
    };

    const langToggle  = document.getElementById('langToggle');
    const pageTitle   = document.getElementById('pageTitle');
    const tabBtns     = [...document.querySelectorAll('.tab-btn')];
    const panels = {
      story:  document.getElementById('panel-story'),
      acq:    document.getElementById('panel-acq'),
      event:  document.getElementById('panel-event'),
      unlockq:document.getElementById('panel-unlockq'),
      followq:document.getElementById('panel-followq'),
      comments: document.getElementById('panel-comments')
    };

    function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }

    function wireStoryToggler(root){
      const btn = root.querySelector('.expand-btn');
      const content = root.querySelector('.story-content');
      if(!btn || !content) return;
      const more = btn.getAttribute('data-more');
      const less = btn.getAttribute('data-less');
      btn.onclick = ()=>{
        const expanded = content.classList.toggle('story-expanded');
        btn.textContent = expanded ? less : more;
      };
    }

    function applyLang(lang){
      const t = i18n[lang] || i18n.EN;
      pageTitle.textContent = t.pageTitle;
      langToggle.textContent = `🌐 ${t.langLabel}`;
      tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
      const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
      renderPanel(activeBtn.dataset.tab, lang);
    }

    function renderPanel(key, lang){
      const t = i18n[lang] || i18n.EN;
      Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
      panels[key].classList.add('active');

      if(key !== 'comments'){
        panels[key].innerHTML = t[key];
        if(key==='story') wireStoryToggler(panels[key]);
      }else{
        loadGiscusForCurrentLang();
      }
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab, getLang());
      });
    });

    langToggle.addEventListener('click', ()=>{
      const cur = getLang();
      const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
      localStorage.setItem(LANG_KEY, next);
      applyLang(next);
    });

    /* Giscus：Comments 分頁 */
    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };
    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }

    applyLang(getLang());
  </script>
</body>
</html>
