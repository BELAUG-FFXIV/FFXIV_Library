    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
<p>Delion meets you with renewed excitement and asks if you’re ready to resume the investigation. He reminds you of the scrap of alien starship you recovered, and explains that Brandihild used his unsettling calculations to infer the scale of the damage. His conclusion is grim: the vessel couldn’t fly again without extensive repairs. That means the most likely scenario is that an unknown agent stole the wreckage—along with PuPu’s missing acquaintance. Delion insists he already has a suspect in mind, but decides to take you to Kama first, where Hildibrand and the others are staying, so he won’t have to repeat himself.</p>
<p>In Kama, you arrive to find the “lunar crew” shaken for a different reason: PuPu has fallen gravely ill. Hildibrand panics over the “calamity,” Nashu remarks that he’s even more bluish-green than usual, and Delion spirals into fear about alien diseases. Nashu claims her “delights” are the best medicine, only for Hildibrand to frantically tell her to put them away before she blows up the house. Brandihild steps in with a clinical explanation: when he was cloned from Hildibrand, the ship’s archives patched gaps in his knowledge, including an encyclopedic understanding of PuPu’s physiology—enough to diagnose him.</p>
<p>Brandihild’s verdict is humiliatingly simple: PuPu has the common cold. Delion can barely cope. Brandihild explains that PuPu has no prior exposure to Etheirys’ illnesses and is therefore unusually vulnerable and likely to suffer severe symptoms. Delion worries that ordinary medicines might do PuPu more harm than good, and Brandihild agrees they probably would—but he believes he can synthesize a remedy if you gather ingredients.</p>
<p>Most of what’s needed is already in PuPu’s stored samples, but two materials are missing. First: the liver of a giant tortoise, obtainable from a kacchapa in Saltwind’s Welcome. Hildibrand immediately assigns that to you. Second: a rare fungus called “dampshroom,” which Brandihild hopes can be found among the Great Work’s alchemical stock. Hildibrand, Nashu, and Delion rush off to scour shelves, while you’re asked to bring the liver—and then help secure the fungus if it isn’t in stock.</p>
<p>At the Great Work, the search drags on. Hildibrand keeps calling it “dankshroom,” Nashu complains she never expected a “lampshroom” to be so hard to find, and Delion admits your liver mission is presumably successful while theirs is very much not. Hildibrand tries to “attune” his inspector’s sense to the “dank,” and Delion corrects him again: damp. Still, at the exact moment the group is stuck, a “Trustworthy Trader” appears and claims he can sell dampshrooms—if you’ll meet on the Perfumed Rise to finalize the deal. Delion wavers between calling it clairvoyance or coincidence, but decides you can’t ignore the offer.</p>
<p>On the Perfumed Rise, the trader produces the fungus—then demands one million gil. Delion explodes at the price. The trader insists it’s a bargain and threatens to sell elsewhere. Nashu reports the group is “plumb out” of coin, and Hildibrand prepares to beg Godbert for the money—until city guards rush in and arrest the trader as a con artist. A Radiant Investigator explains they’d been watching him due to reports of questionable activity. Dampshroom is rare in the bazaar only because nobody wants it; the quoted price was ludicrous. As thanks for helping them catch him in the act, they let you keep the fungus if you still want it.</p>
<p>The swindler snarls that he wouldn’t have stooped so low if “that bastard” hadn’t declared his job redundant. The investigator identifies the culprit he blames: Vanhudi, a rising merchant prince who bought the trader’s consortium and “restructured” it, putting many out of work. Hildibrand recognizes the name—Godbert once had an acquisition deal go sour with Vanhudi, who apparently tried to buy the Manderville business outright. The investigator adds that Vanhudi’s wealth is so vast and so quickly amassed that people whisper he solved alchemy’s oldest problem: turning base metal into gold. Whether true or not, he spends lavishly—buying a historic temple as a home and commissioning a private airship.</p>
<p>With the dampshroom secured at no cost and your liver in hand, you return to Kama. Brandihild thanks you for the “fine specimen” and says he’ll mix the ingredients aboard the starship, so PuPu must be brought outside to administer the medicine immediately. At a remote spot on the Perfumed Rise, Brandihild calls the craft, prepares the remedy, and PuPu recovers almost instantly—his recuperation apparently as advanced as his technology. PuPu expresses sincere gratitude, saying the people of this star are remarkably welcoming even to a stranger from another world.</p>
<p>Then Lugae interrupts—again—with threats and another dramatic attempt to unleash a destructive beam. Somehow, the Manderville chaos plays out as usual: Hildibrand ends up singed yet standing. Delion, unable to contain himself, asks the question that’s been gnawing at him: is Hildibrand an alien? Hildibrand laughs it off, insisting he’s an Ul’dahn-born Manderville of terrestrial Hyuran stock, while Nashu declares that he’s simply Hildibrand, “agent of enquiry and inspector extraordinaire.”</p>
<p>With PuPu stabilized, Hildibrand insists it’s time to reopen “The Case of the Silent Correspondent.” Delion agrees—and finally blurts his theory about who stole the wreckage and its pilot: the Sharlayans. He claims they must be allied with insidious extraterrestrials and would therefore remove any evidence of alien activity. He proposes you infiltrate Old Sharlayan and expose the conspiracy. You push back—Sharlayan can’t be bothered to ally even with foreign nations, much less aliens. Brandihild carefully notes that Delion lacks evidence, but points out you have no better lead, and Sharlayan is renowned for monitoring astronomical and astrological phenomena—its experts might have tracked extraterrestrial movements. Hildibrand, delighted by any decisive direction, declares the path points to the isle of Archons and orders everyone to pack for Sharlayan immediately.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>デリオンはあなたに声をかけ、調査再開への意欲を隠さない。回収した星船の破片を覚えているかと尋ね、ブランディヒルドがその破片から損傷全体を逆算したと説明する。結論は明白で、船は大規模な修理なしに飛行不能――つまり、何者かが残骸ごと持ち去り、ププの友も連れ去った可能性が最も高い。デリオンは「犯人」に心当たりがあると言うが、まずはカーマへ向かおうと提案する。ヒルディブランドたちがそこに滞在しており、同じ話を二度したくないからだ。</p>
<p>カーマでは、調査どころではない事態が起きていた。ププが重病だという。ヒルディブランドは大げさに嘆き、ナシュは「いつもより青緑だ」と心配し、デリオンは宇宙由来の病の可能性に怯える。ナシュは自分の「お楽しみ」が薬だと言い出し、ヒルディブランドが家を吹き飛ばす気かと慌てて止める。そこでブランディヒルドが前に出て、複製の際に星船の記録から知識が補完され、その中にププの生理学が百科事典並みに含まれているため診断できると告げる。</p>
<p>診断結果は拍子抜けするほど単純だった。ププは「風邪」だ。デリオンは頭を抱える。ブランディヒルドは、ププはエーテリスの病に曝露した経験がなく、感染に弱く、症状が重く出やすいと説明する。デリオンは薬が逆効果ではないかと危惧するが、ブランディヒルドは通常の薬は害になり得ると認めつつ、材料さえ揃えば自分で適切な治療薬を合成できると言う。</p>
<p>必要な材料の多くはププの採取サンプルから得られるが、足りないものが二つある。一つは巨大な亀の肝臓で、ソルトウィンドの歓迎地を歩くカッチャパから採取できる。ヒルディブランドはそれをあなたの役目にする。もう一つは「ダンプシュルーム」という希少な菌で、グレートワークの錬金試薬在庫にあることを期待している。ヒルディブランド、ナシュ、デリオンが棚を探し回り、あなたは肝臓を手に入れた後、菌の確保にも助力することになる。</p>
<p>グレートワークでは探索が難航し、ヒルディブランドは言い間違えを繰り返し、ナシュも混乱する。デリオンはあなたの任務が成功しているはずだと言うが、自分たちはまだ見つけられていない。ヒルディブランドが「勘」で菌の気配を探ろうとするが、デリオンは呆れながら正しい名前を言い直す。それでも不思議とタイミングよく、信用できそうな商人が現れ、菌を売れると言い、取引は香りの丘で行おうと誘う。</p>
<p>香りの丘で商人は確かに菌を出すが、代金として百万ギルを要求する。デリオンは強く反発し、商人は希少性を盾に脅す。ナシュは所持金がないと言い、ヒルディブランドは父に泣きつこうとするが、その瞬間、衛兵が踏み込み、商人を詐欺師として取り押さえる。捜査官は、需要がないだけで相場はそこまで高くないと断言し、囮にできた礼として菌を譲ると言う。</p>
<p>詐欺師は失業の恨みを吐き出し、原因は商人王ヴァンフディだと罵る。捜査官は、ヴァンフディが組合を買収し組織を再編して多くを職無しにしたと説明する。ヒルディブランドはその名に覚えがあり、ゴッドベルトが取引で揉め、家業丸ごとの買収を持ちかけられたことがあったと語る。捜査官はさらに、ヴァンフディが金属を金に変えるという錬金術最大の夢を成し遂げたのではという噂まで語り、彼が寺院を買い取り、私設飛空艇を注文するなど豪勢に金を使っていると付け加える。</p>
<p>材料が揃い、あなたたちはカーマへ戻る。ブランディヒルドは肝臓と菌を受け取り、星船内で調合するためププを外へ運ぶよう求める。人里離れた場所で星船を呼び、薬を投与すると、ププは驚くほど早く回復する。ププは異世界から来た自分にここまで親切にしてくれたことへ感謝し、この星の人々は本当に温かいと言う。</p>
<p>そこへルゲーが再び現れ、破壊光線で害そうとするが、いつものように騒動は収束し、ヒルディブランドは焦げながらも立っている。デリオンはついに疑問をぶつける――あなたは宇宙人なのか。ヒルディブランドは笑い飛ばし、自分はウルダハ生まれの地上のヒューランだと断言し、ナシュも「彼はヒルディブランド、名探偵だ」と押し切る。</p>
<p>ププが回復したことで、一行は「無言の文通相手事件」を再開しようとする。デリオンは残骸と操縦者を持ち去った犯人として「シャーレアン人」を名指しし、宇宙人と結託して証拠を隠滅しているはずだと主張し、オールド・シャーレアンへの潜入を提案する。あなたは反論するが、ブランディヒルドは証拠がないと認めつつも、他に手がかりがないこと、そしてシャーレアンが天文・占星の監視で一流であることを挙げ、異星の動きを追っている可能性はあると言う。ヒルディブランドはその方向性を気に入り、「賢人の島」へ向かうと宣言し、荷造りを促す。</p>
</div>

  ZH:{

    pageTitle:'神秘的嫌疑人',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },

    story:`<div class="clamp" data-collapsed="true">
<p>Delion 一見到你就迫不及待想重啟調查。他提醒你們之前在 Garlemald 找到的那塊外星星際船碎片，並說 Brandihild 已經用他那種令人不安的計算能力，從碎片推回整體損傷程度，結論是：那艘船沒有大修就不可能再起飛。既然如此，最合理的情況就是——某個不明人士把殘骸整個帶走，也把 PuPu 的同伴一起帶走。Delion 甚至聲稱他大概知道這個「不明人士」會是誰，但他先要你跟他去 Kama，因為 Hildibrand 他們暫住在那裡，他不想把話重講兩次。</p>
<p>到了 Kama，調查立刻被更緊急的狀況打斷：PuPu 病倒了。Nashu 忐忑地說她很擔心 PuPu；Brandihild 也沉重地附和。Hildibrand 直接喊成「可怕的不幸」，說 PuPu 病得很重；Nashu 還補一句他看起來「更藍綠了」。Delion 馬上往最糟的方向想，說 PuPu 是外星人，誰知道是不是外星疾病在折磨他。Nashu 又想拿她的「特效療法」出來，Hildibrand 立刻嚇得阻止，叫她別把房子炸掉。</p>
<p>Brandihild 這時站出來解釋：他被複製出來時，有些知識缺口被星際船檔案「補上」，其中就包含對 PuPu 生理構造的百科式理解，所以他足以診斷。Delion 聽到「外星技術＋人類思維」的組合更是心驚，覺得這就能解釋 Brandihild 為什麼能做出那些離譜推算。</p>
<p>診斷結果卻讓人哭笑不得——PuPu 得的是「普通感冒」。Delion 幾乎要崩潰。Brandihild 進一步說明，PuPu 作為 Etheirys 的訪客，對你們常見的病症完全沒有先前暴露史，所以特別容易被感染，也更可能出現嚴重症狀。Delion 擔心你們的藥會不會反而害他；Brandihild 表示「幾乎肯定會」，但他也提出解法：他能自己合成有效的藥，只需要你們去收集材料。</p>
<p>材料大多能從 PuPu 先前採集的樣本裡取得，但還缺兩樣。第一樣是巨龜的肝臟，要去 Saltwind’s Welcome 找遊蕩的 kacchapa 取下合適的器官。Hildibrand 一聽就把這份工作交給你。第二樣則是稀有真菌「dampshroom」，Brandihild 希望 Great Work 的鍊金試藥庫存裡能找到。Hildibrand 決定自己帶著 Nashu 和 Delion 去翻架子，同時要求你先把肝臟帶回來，接著再協助他們取得 dampshroom。</p>
<p>在 Great Work，三人找得焦頭爛額。Hildibrand 一直把名字講錯，Nashu 也跟著亂喊；Delion 則表示你的任務應該成功了，他們這邊卻還在卡關。Hildibrand 想靠「偵探直覺」去感應那股「黏濕的精華」，Delion 當場糾正是 dampshroom，不是他那堆亂七八糟的叫法。偏偏就在這節骨眼，一個自稱「可靠商人」的人忽然冒出來，說他手上可能有貨，可以賣給你們，但要上 The Perfumed Rise 才能完成交易。Delion 一邊懷疑太巧了，一邊又覺得不能放過這個機會，只能催你們立刻去。</p>
<p>到了 The Perfumed Rise，商人真的拿出 dampshroom，卻開價一百萬 gil。Delion 直接炸鍋，說一顆蘑菇要一百萬根本是搶劫；商人反咬說在市集你們要付十倍，還說若你們不領情他就賣給別人。Nashu 一查荷包，回報大家「一毛都沒了」。Hildibrand 正準備去向 Godbert 開口，卻被一聲怒喝打斷：Radz-at-Han 的衛兵衝出來把商人逮個正著。Radiant Investigator 說他們早就收到可疑活動的通報，一直盯著他；dampshroom 之所以罕見，是因為幾乎沒需求，不是因為值那個價。你們因為剛好成了誘餌，讓他們抓到現行，所以作為答謝，你們可以把真菌帶走——如果你們還想要的話。</p>
<p>被逮的騙子怨氣爆發，說自己也不想騙人，是因為有人把他的工作說成「多餘」才逼得他走投無路。Radiant Investigator 解釋那人叫 Vanhudi，是崛起中的商人權貴，買下騙子原本工作的商會後進行「重整」，害很多人失業。Hildibrand 聽到這名字也有印象，提到 Godbert 曾和 Vanhudi 談過收購案，最後談崩，因為對方甚至想把 Manderville 家的事業整個買下。Radiant Investigator 又補了一句：外頭還有傳聞，說 Vanhudi 可能解開了鍊金術最古老的難題——把卑金屬變成黃金。是真是假難說，但他的財力深不可測，而且花錢毫不手軟，像是買下一座古老神殿當宅邸、還訂製私人飛空艇之類。</p>
<p>你們把肝臟和 dampshroom 帶回 Kama，Brandihild 接過材料，說他要在星際船上調配藥劑，得先把 PuPu 移到外面，藥一好就能立刻讓他服用。你們走到較偏遠的地方，Brandihild 呼喚星際船靠近並開始治療。幾乎是轉眼之間，PuPu 就恢復精神，連連道謝，說自己是來自異世界的陌生人，你們卻仍然如此善待他，這顆星的居民真的很友善。</p>
<p>然而下一秒，Lugae 又跳出來大放厥詞，說「傷害你們將是我的樂趣」，甚至再度發射破壞光束。混亂照舊，但 Hildibrand 依然只是被燻得有點焦，卻站得好好的。Delion 終於忍不住，把心底那句話問出口：你該不會也是外星人吧？Hildibrand 大笑否認，說自己毫無疑問是 Ul’dah 出生、地表 Hyuran 血統的 Manderville；Nashu 也立刻替他下結論：他就是 Hildibrand，偵探界的傳奇，還需要知道什麼？</p>
<p>PuPu 既然好轉，Hildibrand 宣布該重新開啟「The Case of the Silent Correspondent」。Delion 立刻接上，並終於把自己的推論喊出來——把殘骸和駕駛帶走的人是 Sharlayans。他堅信 Sharlayan 一定和陰險的外星勢力結盟，所以才會奉命清除任何外星活動的證據，他要你們去 Old Sharlayan 滲透、揭穿陰謀。你當場反駁，說 Sharlayan 連和外國正式結盟都懶，更別提和外星人結盟。Brandihild 則謹慎地指出 Delion 缺乏證據，但同時也承認你們目前沒有更好的線索；而且 Sharlayan 在監測天文與占星現象方面是標準制定者，他們的專家或許真的在追蹤外星動向。Hildibrand 聽完立刻拍板，說他也感覺道路指向那座賢者之島——大家收拾行李，立刻出發前往 Sharlayan。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
