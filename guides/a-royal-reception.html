const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'A Royal Reception',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Back in Ul’dah, Momodi greets you with a grin that is half mischief, half pride, and tells you this is it—your grand debut in Ul’dahn high society. The sultana is hosting a banquet in the Fragrant Chamber, and your presence has been requested. All you need do, she explains, is head up to the Royal Promenade, where Bartholomew will show you inside. There is, however, one rather important condition: you must be wearing the special earrings prepared for the occasion, or the doorman will turn you away without a second thought. With a parting reminder not to let all the pomp and ceremony rattle you, and to simply be yourself, she sends you off. Your path first takes you through the Goldsmiths’ Guild, where Serendipity all but explodes when you ask her for what you need, groaning that you cannot be serious—and yet, just this once, she relents. As she hands over what you require, she warns you that life is not some minstrel’s song and you are no “chosen hero,” so you would do well not to assume people will forgive you no matter how reckless or irresponsible your actions may be. Thus equipped, you proceed to the Royal Promenade. Outside the doors to the Fragrant Chamber, Bartholomew is busy shepherding invited guests, sternly reminding onlookers that attendance is by invitation only and asking you, too, to step away unless you can meet the terms of admission. When you present both your invitation and the earrings, he relaxes, remarks that Mistress Serendipity would be horrified if she had to craft another pair on your account, and finally bows to you with formal courtesy, inviting you to enter.</p>
      <p>Within the Fragrant Chamber, a herald’s voice rings out as Raubahn calls for all present to hail the sultana. Nanamo Ul Namo appears before the assembled dignitaries and, by right of the Royal House of Ul, declares the banquet begun. She proclaims that Ul’dah is graced this day by the presence of a hero to the city and a dear friend to the crown, and she presents you to the gathered guests as their champion before bidding everyone enjoy the feast. Later, away from the clamor of conversation and clinking cutlery, Raubahn speaks to you more quietly. He tells you not to let the lavish spread deceive you: Ul’dah is not nearly so bountiful as this table would suggest. While nobles gorge themselves, children starve in the streets, and the sultana herself is thwarted at every turn by Syndicate members who grow rich on the backs of the poor and will allow no measure that threatens their profits. Beneath her calm, stately mask, he says, she is aghast at her people’s suffering, yet there can be no hope for the masses until the crown’s authority is restored. He thanks you for all you have already done for Ul’dah, but insists there is far more yet to do. As he speaks, a strange light begins to gather, so bright it all but blinds you, and he breaks off in surprise, likening it to something he has seen before. He asks you plainly whether you have been troubled by strange dreams—visions of a crystal that you may have dismissed as nothing more than an excess of aether. When you admit it, he nods, saying you are like others who came before: people from beyond Eorzea who fought the primals, helped unite the three Grand Companies when the Garlean Empire threatened the realm, and stood with the Alliance at Carteneau on that fateful day five years ago. They gave their lives there, and though no one has forgotten their sacrifice, their names no longer come to the survivors’ lips and their faces are remembered only as silhouettes against a blinding glare. For this reason, they are now remembered simply as the Warriors of Light. When Raubahn looks at you, he tells you, he cannot help but think of them and of what you might yet accomplish. The crystal you bear must be protected at all costs; it is a gift from Hydaelyn Herself, given to you for a purpose. Yours will not be an ordinary tale, and if he is right, the fate of the whole realm may hang upon your deeds. Such a burden is fit only for heroes and martyrs, he says, and he prays that you will prove to be the former.</p>
      <p>The vision swallows you whole, and suddenly you are standing amid the ruins of Carteneau Flats in the last days of the Seventh Umbral Era, watching the Battle of Carteneau unfold through another’s eyes. Raubahn bellows orders to the Immortal Flames, calling them to the fore and urging them to show the imperial legions what they are made of. Across the field, Merlwyb commands the Maelstrom’s left flank, diverting the Barracudas and ordering them to hold their position even at the cost of their lives, while Kan-E-Senna dispatches the Twin Adders’ White Wolves to aid the Yellow Serpents and reminds her officers that the adventurers risk life and limb for their cause and must not be failed. Communications crackle with panic as units fall silent one by one: a barrier refuses to fall, a monstrous presence disrupts aetheric linkshells, and cries for aid are swallowed by static and screams. Raubahn roars into his linkshell, demanding answers from Mad Snake, only to hear his comrade’s last words as flames close in around him. Merlwyb, unable to reach her own men, demands a report; Kan-E-Senna urges her allies to accept that the outcome of this battle was decided long ago and that to press on would invite only massacre. She begs Raubahn not to throw away more lives, insisting that the adventurers must be allowed to withdraw while the leaders stand with Archon Louisoix in their stead. Reluctantly, the orders go out: the Maelstrom and Immortal Flames are to retreat, giving the foreign levy priority and covering their withdrawal on foot if need be. All the while, Kan-E-Senna feels a dark, suffocating presence watching over the battlefield. As she and the others move to take their place beside Louisoix, that presence finds a voice: a faceless speaker exults at beholding Bahamut freed once more, calls the Elder Primal magnificent after aeons of imprisonment, dismisses the Alliance forces as powerless, and declares that the moment has come for the star to regain its “true form,” laughter echoing madly as fire and light blaze across the sky. The vision shatters, and the Echo fades.</p>
      <p>You wake to find yourself back in Ul’dah, lying in a room at the Hourglass. Momodi leans over you, relieved to see you awake, and explains that you collapsed in the middle of one of General Raubahn’s stories at the banquet. With no other choice, they had you carried out and brought here to recover, and you doubtless left quite an impression on the other guests—though not the kind you might have wanted. She fusses over you a moment longer, asking whether you have been getting enough rest, and admits that looking after you was beginning to wear her out, though she is glad to see you returned to normal. Before you go, she remembers a final detail: Raubahn left a message for you, saying that when you feel up to it, you should pay him a visit at the Hall of Flames. He likely wishes to finish the tale that your fainting spell so rudely interrupted. When at last you make your way to the Immortal Flames’ headquarters in the Steps of Nald, Raubahn receives you with a warrior’s smile and asks if you are fully recovered. Upon hearing that you are, he nods, his expression turning solemn once more, and tells you there is much work ahead—work he would entrust to you.</p>
    </div>

    </div>`

  JP:{
    langLabel:'日本語',
    pageTitle:'王宮の晩餐会',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ウルダハの酒場「クイックサンド」に戻ると、モモディがいつもの悪戯っぽい笑みを浮かべてあなたを迎え、この日こそが、ウルダハ上流階級への本格的なデビューの日だと告げる。女王ナナモ陛下主催の宴が「香茶の間」で開かれており、そこにあなたも招かれているというのだ。王政廊へ向かい、門番を務めるバルトロメウに声をかければ中へ通してもらえるが、そのためには、まず耳飾りをきちんと身につけておかなければならない。条件を満たしていなければ容赦なく追い返されるぞ、とモモディは念を押し、あまり仰々しい雰囲気に飲まれず、いつもの自分らしさを忘れずに行っておいでと言って、送り出してくれる。道すがら立ち寄った彫金師ギルドでは、セレンディピティがあなたの頼みを聞いて大袈裟に嘆き、冗談だろうと頭を抱えるが、結局のところ今回は特別だと折れて耳飾りを用意してくれる。ただし、「人生は吟遊詩人の歌のようにはいかないし、あなたは物語の選ばれし英雄でもないのだから、無茶や無責任な行動をしても、誰もが当然のように許してくれると思わないことね」と厳しい一言を添えることも忘れない。こうして支度を整えたあなたは王政廊へ向かい、香茶の間の扉の前で客をさばくバルトロメウに声をかける。彼は女王陛下主催の宴がまもなく始まり、招待客以外は立ち入れないと周囲に呼びかけ、あなたにも一歩下がるよう求めるが、提示された招待と耳飾りを確かめると態度を和らげる。もし耳飾りをなくそうものなら、セレンディピティがどれほど嘆き怒るか想像もしたくないと言いつつ、改めて丁重に一礼し、あなたを香茶の間の中へと案内する。</p>
      <p>香茶の間では、ざわめきの中にラウバーンの声が響き渡り、「女王陛下に敬礼！」の号令とともに、ナナモ・ウル・ナモが姿を見せる。ウル家第十七代当主としての権威をもって彼女は宴の開宴を宣言し、この日、ウルダハの英雄にして王家の親しき友が列席していると高らかに紹介する。集う客人たちの前で、あなたを「我らが勇士」として称えたナナモは、どうか心ゆくまで饗宴を楽しんでほしいと言葉を結ぶ。やがて人々の歓談と食器の触れ合う音が遠のいたところで、ラウバーンは落ち着いた声であなたに語りかける。豪華な食卓に惑わされるな──ウルダハは、目の前の料理が示すほど豊かではないのだ、と。貴族たちが腹一杯に食べる一方で、街角では子どもたちが飢えており、その窮状を憂うナナモ陛下も、砂蠍衆の中にいる庶民の貧困から利益を得る者たちによって、何ひとつ自由に動けずにいる。気高く穏やかな仮面の奥で、彼女は民の苦しみに心を痛めているが、王権が力を取り戻さぬ限り、大勢に希望はない──それがラウバーンの実感だった。彼はこれまでウルダハのために尽くしてきたあなたに改めて感謝を伝えつつ、それでもやるべきことはまだ山ほど残っていると続ける。そのとき、不意にまばゆい光が視界を満たし、彼もまた言葉を切って驚きの声を漏らす。あまりに強く輝くその光は、彼にとって見覚えのあるものに酷似していた。ラウバーンはあなたに問いかける──最近、奇妙な夢に悩まされてはいないか、クリスタルの幻を見てはいないか、それをエーテル酔いか何かだと思って片づけてはいなかったか、と。否定できずにいるあなたを見て、彼は静かに頷き、かつて同じような者たちがいたことを語り始める。あなたがエオルゼアに来る以前にも、蛮神と戦った者たちがいた。彼らはこの地の生まれではなかったが、ガレマール帝国の脅威が迫ったとき、三国のグランドカンパニーを結成するのに力を貸し、五年前のカルテノーの地でも、共に並び立って戦っていたのだ。しかし、あの日の戦いで彼らは失われた。生き延びた者は皆、その犠牲を忘れてはいないはずなのに、いざ名を呼ぼうとすると舌が凍りついたように出てこず、心に思い描く姿も、ただ眩い光の中の影のように輪郭しか掴めない。だからこそ、人々は彼らを「光の戦士」と呼ぶようになったのだと、ラウバーンは語る。あなたを見ていると、どうしても彼らのことを思い出してしまう──そして、あなたがこれから成し遂げるかもしれないことを考えずにはいられないと。あなたが持つクリスタルは、何としてでも守り抜かねばならない。それは「母なるハイデリン」から与えられた贈り物であり、必ずや意味があってあなたに託されたものだ。あなたの物語は決して平凡なものではなく、もし自分の勘が正しければ、この世界の命運さえ、あなたの行いに懸かっているのかもしれない──そう告げるとき、彼は「この重荷を背負うにふさわしいのは、英雄か殉教者だけだ」と言い、あなたが前者であることを祈らずにはいられないのだと締めくくる。</p>
      <p>その言葉とともに光はさらに強まり、やがてあなたの意識は別の時代へと引きずり込まれる。気がつけば、あなたは第七霊災直前のカルテノー平原に立ち、別の誰かの瞳を通して、「カルテノーの戦い」の光景を目の当たりにしていた。ラウバーンは不滅隊に向けて「炎よ、前へ！」と吼え、勝利は果敢な者にもたらされると奮い立たせながら、帝国軍に己らの力を示せと命じる。メルウィブは黒渦団の左翼が崩れかけていることを知ると、バラクーダ隊を回して、その場を死守するよう厳命し、カヌ・エ・センナは双蛇党に属する部隊へ、傷ついたイエローサーペント隊の救援に向かうよう指示しつつ、自軍だけでなく、義勇参加した冒険者たちの命も預かっているのだと自らに言い聞かせる。だが戦場は混乱の極みにあり、リンクパールから届く報告は次々と悲鳴と雑音に塗りつぶされていく。何者かの結界は容易には崩れず、正体不明の「怪物」が放つ圧倒的な気配が通信を乱し、ラウバーンが「マッドスネイク」と呼びかけても、炎に包まれた部隊から返ってくるのは、逃げ場がないという絶望と、やがて途切れる悲鳴だけだった。メルウィブは自軍の状況を問うが、伝令は貝殻通信が機能していないと謝罪し、カヌ・エ・センナのもとにも、同じく連絡不能の報が届く。彼女はなおも呼びかけを続けるよう命じながらも、この戦いの結末はすでに定まっていると悟り、これ以上は虐殺を招くだけだと、撤退を進言する。ラウバーンはルイゾワを見捨てるわけにはいかないと叫ぶが、カヌ・エ・センナは、勝利が果敢な者にもたらされるのは確かでも、今日という日に勝者は生まれないと諭し、命を散らせるよりも、冒険者たちを退かせ、自分たちがルイゾワの側に立つべきだと説き伏せる。こうして各国首脳は撤退命令を下し、メルウィブは黒渦団全軍の後退と、外地小隊の優先的な救出を命じ、ラウバーンもまた不滅隊に退却を指示する。リンクパールが役に立たないのなら、自らの足で走って伝令を果たせと一喝しながらも、その顔には苦渋の色が滲んでいた。そのころ、カヌ・エ・センナは戦場を覆う暗く息苦しい気配に眉をひそめ、「見られている」と呟く。やがて彼女らがルイゾワのもとへ向かう決意を固めると、その不気味な存在が言葉を持つ。謎めいた声は、「再びバハムートの姿を目にする日が来ようとは」と喜び、長き封印の歳月が、かえってその力を増したのだと感嘆しながら、眼下の勢力など取るに足らないと嘲笑する。そして「すべては始まった。この星は、やがて“真の姿”を取り戻すだろう」と宣言し、狂ったような笑い声を上げる。その瞬間、空を引き裂くようにバハムートが顕現し、炎と光が戦場を呑み込む中で、あなたの意識は耐えきれず、幻は砕け散る。</p>
      <p>気がつくと、あなたはウルダハの宿屋「アワーグラス」の一室で横たわっていた。枕元にはモモディがいて、あなたがようやく目を覚ましたことに安堵の息をつく。彼女の話によれば、香茶の間でラウバーンの話を聞いている最中に突然気を失って倒れたらしく、その場に居合わせた者たちの手を借りて、ここまで運び込んでもらったのだという。きっと他の招待客にも、強烈な印象を残したことだろうが──おそらく、あなたが望んだものとは違うだろうと苦笑するモモディは、冒険者の暮らしは心身ともに負担が大きいのだから、ちゃんと休めているのかと心配そうに問いかける。とはいえ、こうしていつもの調子に戻った姿を見られて本当に良かったと胸をなでおろし、世話を焼くのもそろそろ限界だったから助かったと冗談めかして言葉を添える。そして思い出したように、「そうだ、ラウバーン将軍から伝言があったんだった」と言い、体調が戻ったら「不滅隊本部」まで顔を出すようにとのことだったと教えてくれる。きっと、あなたが気を失ったせいで最後まで話せなかった続きがあるのだろうと言って、彼女は笑う。やがてあなたがナル回廊の不滅隊本部を訪ねると、ラウバーンは待っていたとばかりに出迎え、体調は完全に戻ったかと確かめる。大丈夫だと答えるあなたに、彼は力強く頷き、改めて真剣な表情に戻ると、これからやるべきことが山ほどあると告げ、その一端をあなたに担ってほしいのだと頼むのだった。</p>
    </div>

    story:`<div class="clamp" data-collapsed="true">
      <p>在 Ul’dah 的酒館 The Quicksand 裡，Momodi 露出一種半是惡作劇、半是欣慰的笑容迎接你，告訴你今天終於要在上流社會正式「出道」了。女王 Nanamo 陛下正在 Fragrant Chamber 舉辦宴會，而你也名列受邀賓客之一。她說，只要前往 Royal Promenade，門口的 Bartholomew 就會負責帶你入場，不過有個關鍵條件——你必須先把特製的耳環戴好，否則守門人絕對會二話不說把你攔在門外。交代完這些細節後，她又叮嚀你別被那些繁文縟節嚇到，只要維持一貫的自己就好。離開前，你順道前往 Goldsmiths’ Guild，請求幫忙準備所需的飾品。聽完整個來龍去脈後，Serendipity 幾乎是失控地喊出「你在說什麼啊」，一臉不敢相信，不過最終還是破例答應這一次。她在將耳環交到你手上時，語氣嚴肅地提醒你：人生不是吟遊詩人的歌，你也不是什麼被選上的英雄，所以別抱著「就算做再魯莽、再不負責任的事，大家也會一笑置之原諒你」這種天真的期待。備齊一切之後，你前往 Royal Promenade，在 Fragrant Chamber 門前看到忙著應對賓客的 Bartholomew。他先是例行公事般地宣布「宴會只限受邀者入場」，請你也先退後一步，若真有收到邀請，就得確認自己符合入場條件再說。當你出示邀請與耳環後，他的態度隨之放鬆，還不忘感嘆，如果你把這對耳環搞丟，Serendipity 大概會氣得不知如何是好。最後，他以正式的禮節歡迎你入內，替你推開通往宴會會場的大門。</p>
      <p>在 Fragrant Chamber 中，Raubahn 的嗓音響徹全場，宣告「向女王致敬」之際，Nanamo Ul Namo 出現在眾人面前，以 Ul 王家第十七代繼承人的身分宣告宴會開幕。她表示今天 Ul’dah 有一位英雄，也是王家親近的友人蒞臨，於是向在座賓客鄭重介紹你這位「冠軍」，接著祝福所有人盡情享受這一場盛宴。稍後，在遠離杯盤聲與交談的角落，Raubahn 以較壓低的聲音對你坦白，眼前這豪華的菜色並不能代表整個 Ul’dah 的真實樣貌。當這裡的貴族們大快朵頤時，城裡仍有孩子在街上挨餓；而就算女王陛下對此深感不忍，也常常被 Syndicate 裡那些仰賴勞工貧困來累積財富的成員牽制住手腳。她在眾人面前保持著端莊沉穩的表情，內心卻對子民的苦難感到震驚與無力。只要王權無法真正恢復實權，平民就看不到希望——這是他對現狀的結論。Raubahn 再次感謝你為 Ul’dah 所做的一切，同時也坦言還有更多事情未完成。就在這時，一道異樣的光芒在你眼前浮現，亮得幾乎讓人睜不開眼，他也不由得中斷說話，驚訝地看著那光線。這景象讓他想起某些既視感，於是開口詢問你是否最近老是被奇怪的夢境困擾，看見過與 Crystal 有關的幻象，卻把它當成只是 aether 過剩造成的不適一笑帶過。當你無法否認時，他點頭道出一段過往：在你來到 Eorzea 之前，也曾經有過和你相似的人，與 primals 戰鬥，並在 Garlean Empire 席捲整片大陸之際，協助各國成立三大 Grand Companies。五年前，在 Carteneau Flats 的那場決戰中，他們與聯軍並肩作戰，卻也因此付出生命。所有倖存的人都不曾忘記那份犧牲，可是當想開口說出其名時，舌頭彷彿被什麼堵住了，腦海裡浮現的身影也只剩下一片刺眼光芒中的黑影輪廓。正因如此，人們現在只以一個總稱來記住他們——Warriors of Light。Raubahn 說，每當他看著你，就會想起那些人，以及你未來或許能達成的事。他要你不惜一切保護那塊 crystal，因為那是 Hydaelyn 贈與你的禮物，絕對有其存在的理由。你的故事絕不會是平凡無奇的一頁；如果他的直覺沒有錯，整個世界的命運，很可能都繫在你將來的行動上。這樣的重擔通常只會落在英雄或殉道者身上，他說，然後祈願你會是前者，而不是後者。</p>
      <p>話音未落，光芒徹底淹沒了你的視界，你的意識被捲入另一個時空。當你回過神來，已經置身於 Mor Dhona 一帶的 Carteneau Flats 邊境遺跡，透過別人的視角見證「Carteneau 之戰」的最後時刻。Raubahn 高喊著命令不滅隊 Flames 向前突進，要他們展現出足以擊潰帝國軍的氣勢；另一側，Merlwyb 正在調度 Maelstrom 的左翼，指示 Barracudas 立刻調往崩潰邊緣的防線，哪怕付出性命也要守住陣地。Kan-E-Senna 則指示 Twin Adder 的 White Wolves 前去援護 Yellow Serpents，同時提醒身邊的幕僚，這些冒險者是冒著生命危險挺身而出，他們絕不能辜負這份付託。然而戰場上的混亂遠遠超過預期，連結各部隊的 linkshell 不斷傳來支離破碎的回報：某處的 barrier 遲遲無法擊破，有不明的 monstrosity 干擾 aether 流動，以至於通訊斷斷續續。Raubahn 一遍又一遍呼叫代號 Mad Snake 的小隊長 Jakys Ryder，聽到的卻是被火焰團團包圍、找不到出路的絕望，以及最終被淹沒在尖叫裡的聲音。Merlwyb 詢問 Barracudas 的情況，Storm Runner 卻只能戰戰兢兢地回報 shell 完全無法運作；Kan-E-Senna 問起自身部隊時，Serpent Runner 也表示無法掌握，一切都被那頭怪物影響得亂成一團。儘管她下令無論如何都要持續嘗試聯絡，但心裡非常清楚，這場戰役的結果早在很久以前就被決定好了，如今再逞強只會導致更大的屠殺。她勸說 Raubahn，不要為了逞一時之勇而白白犧牲更多性命，應該讓冒險者撤退，由他們三人親自前往 Louisoix 身旁，與那位 Archon 一起承擔最後的命運。最終，命令依序下達：Merlwyb 撤回 Maelstrom 全軍，優先保障 Foreign Levy 的撤退，由主力部隊掩護後方；Raubahn 也下令 Flames 全面後撤，即便 linkshell 失效，也要靠著自己的雙腿奔走傳令。就在各方人馬陸續從戰線上退開時，一股黑暗而令人窒息的存在從戰場上空俯瞰眾生，Kan-E-Senna 不禁低語「有什麼東西正看著我們」。隨後，那股存在終於開口——一個無名的聲音驚嘆自己竟然有幸再度目睹 Bahamut 之姿，讚嘆這頭自古以來被封印的存在在漫長歲月中只會變得更加飢渴、更為強大。它完全無視地上的聯軍，斷言這些人根本無力改變任何事，並興奮地宣告「一切已經開始，很快這顆星球就會恢復真正的形態」，隨後爆發出近乎瘋狂的笑聲。隨著 Bahamut 掙脫囚牢、在空中張牙舞爪，火焰與光芒將整片戰場吞沒，你被壓迫得幾乎無法呼吸，而那份景象終於在壓力之下破碎，Echo 慢慢自你體內退去。</p>
      <p>當你再次睜開眼睛時，自己已經躺在 Ul’dah 的旅店 The Hourglass 房間裡，Momodi 坐在旁邊，看見你醒來鬆了一大口氣。她說，在宴會上聽 Raubahn 說故事說到一半，你突然就昏倒了，不得已只好請人把你抬出 Fragrant Chamber，送到這裡休養。想必你確實在賓客之間留下了非常深刻的印象——雖然八成不是你原本期望的那種。她接著半是關心、半是責備地問你，最近有沒有好好休息，畢竟冒險者的生活相當消耗精神與體力。好在現在看起來你已經恢復正常，讓她不禁開玩笑說，再這樣照顧下去，她自己都快累倒了。臨走前，她忽然想起還有件事沒說：Raubahn 留下口信，要你等身體狀況好一些時，到 Hall of Flames 找他一趟，大概是想接著說完被你昏倒打斷的那段故事。之後，你依約來到位於 Steps of Nald 的不滅隊本部 Hall of Flames，Raubahn 早已在此等候，一見面就關心地問你是否已徹底康復。當你給出肯定的回答後，他點了點頭，神情重新變得嚴肅，告訴你前方仍有許多重要的任務在等待，而這些工作，他希望能交由你來完成。</p>
    </div>

  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

  repo: 'BELAUG-FFXIV/FFXIV_Library',

  category: 'General',

  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
