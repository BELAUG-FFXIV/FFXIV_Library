    story:`<div class="clamp" data-collapsed="true">
      <p>Ursandel no longer hides behind evasion. He tells you he once served the Dartancours, among the oldest and proudest families in Gridania, and had the honor of attending Lady Amandine, mistress of the household—fair, radiant, and kind. But after the Calamity, she was changed beyond recognition. He still remembers the day her bandages were removed, and she saw her disfigured face for the first time—the moment the gentle woman he knew seemed to vanish.</p>
      <p>Shunning all eyes, Lady Amandine withdrew into her chambers for many uneasy moons. Then, without warning, she began receiving strange guests—masked men whose origins none could name. She believed they could restore what she had lost, and so began what she called the “rites of rejuvenation.” What seemed harmless at first grew increasingly grotesque, until one day she bound a handmaiden to her bed and mutilated the girl’s face. The handmaiden did not survive, and Ursandel was ordered to dispose of the body. He obeyed—but when the time came to return, his legs would not move. Unable to go back after what he had witnessed, he left Haukke Manor, the home he had known for nearly half a century.</p>
      <p>Now he looks to you to end what he could not. If her madness is not stopped, more innocent lives will be lost. You promised to free his lady from her torment—so he sends you to Haukke Manor, on the western edge of the Central Shroud, to do what must be done. Within those shadowed halls, a voice lingers on the darkness taking root, as if savoring it. Two Ascians appear—the Ascian of the Twelfth Staff and the Ascian of the Twelfth Sword—and greet you with chilling calm. It is no ordinary mortal, they say, who can obtain one Crystal of Light, much less three. The Crystals make you strong, and the Light is drawn to that strength—Hydaelyn chose well. Yet they cannot allow you to continue your course. They admit they came to measure your strength for Master Lahabrea, and with that task done, they depart, bidding farewell to you as the Bringer of Light.</p>
      <p>When you return, Ursandel presses you for every detail—what you saw, and what became of Lady Amandine. Hearing the truth, he is shaken that she fell so far as to consort with devils, and he wishes he could have done more to stop her descent. He prays she may finally find peace beyond. He cannot say whether the masked men you encountered are the same pair who first led her astray, but he is certain they are of the same vile brood—and if chance ever comes, he asks you to repay them tenfold for the suffering they have wrought. Then his voice turns inward: by his silence, he allowed innocent young women to die in unspeakable circumstances. Whether it was misplaced loyalty, cowardice, or both, he calls himself an abettor to a grievous crime. He will surrender himself to the authorities and accept whatever punishment they deem just, praying only for mercy upon his soul.</p>
      <p>Back at The Waking Sands, Minfilia is relieved to see you safely returned from the Twelveswood. When you report that two of Lahabrea’s minions sought to measure your strength—and admitted it—she hears it as taunting proof that the Ascians have begun to move in earnest. Still, she will not bemoan your plight: thanks to your tireless efforts, the Scions are at least aware of the encroaching Darkness. Yet she admits they are too few to protect the realm alone. The three nations must be warned, and their vigilance heightened. There is no shortage of misery in the world for the Ascians to exploit, and an arduous struggle lies ahead. Even so, she insists you must not be lost to hope—that is precisely what the enemy desires. For now, she says, you have gleaned what you can, and this investigation must be set aside as another matter demands your attention.</p>
    </div>

    story:`<div class="clamp" data-collapsed="true">
      <p>ウルサンデルは、ついに真実を語り始める。彼はかつてグリダニアでも屈指の名門、ダルタンクール家に仕える使用人だった。そして屋敷の女主人レディ・アマンディヌに仕える栄誉を賜っていたという。夏のように美しく、光にふさわしい優しさを備えた人だった――だが第七霊災の後、彼女は別人のように変わった。包帯が外され、初めて傷ついた自分の顔を目にしたあの日を、彼は忘れられない。その瞬間、かつての穏やかな彼女は消え去ったのだ、と。</p>
      <p>人目に晒されることに耐えられなくなったレディ・アマンディヌは自室に籠り、長いあいだ誰も寄せつけなかった。ところがある日を境に、正体不明の客を迎え入れるようになる。どこから来たのか誰も知らぬ仮面の男たち――彼女は彼らが失ったものを取り戻す助けになると信じ、「若返りの儀式」を始めた。儀式は当初こそ無害に見えたが、時とともに異様さを増し、ついには侍女のひとりを寝台に縛りつけ、その顔を切り刻んだ。侍女は生き延びず、遺体の始末を命じられたのがウルサンデルだった。彼は命令に従った――だが屋敷へ戻ろうとしたとき、足が動かなかった。あの悪夢を見たあとでは戻れないと悟り、彼はハウケタ御用邸を去ったのだ。</p>
      <p>そして今、彼はあなたに託す。狂気を終わらせねば、罪のない命がさらに失われる。あなたが誓ったとおり、主人を苦しみから解き放ってほしい――黒衣森：中央森林の西にあるハウケタ御用邸へ向かい、やるべきことを果たすのだ。屋敷の闇の中では、根を下ろした暗がりを讃えるかのような声が響く。そこへ「十二杖のアシエン」と「十二剣のアシエン」が姿を現し、冷ややかにあなたを見据える。光のクリスタルをひとつ得るだけでも並の人間ではない、まして三つなど、と。クリスタルはあなたを強くし、その強さに光は引き寄せられる――ハイデリンは選び誤らなかった。だが彼らは、あなたの存在は自分たちと相容れず、このまま進ませるわけにはいかないと言う。彼らはラハブレアのために力を測りに来ただけだと明かし、目的を果たすと「光の担い手よ」と言い残して去っていく。</p>
      <p>戻ったあなたに、ウルサンデルは屋敷で見たものと、レディ・アマンディヌの行く末を問い詰める。真相を聞いた彼は、ついに悪魔とまで通じたのかと打ちのめされ、もっと止める術があったはずだと悔いる。そして彼女が彼岸で安らぎを得られるよう祈る。屋敷で出会った仮面の男たちが、かつて主人を惑わせた二人と同一かはわからない――だが同じ邪悪な同類であるのは明らかだ、と。機会があるなら、彼らがもたらした苦しみの十倍を返してほしいとあなたに願う。だが同時に、沈黙によってどれほど多くの若い女性が無惨に死んだかわからないと、自らを責める。忠義の履き違えか臆病さか、その両方か――自分は重大な罪の幇助者だ。彼は当局へ出頭し、正当とされる罰を受けると決め、ただ神々の憐れみを祈る。</p>
      <p>砂の家でミンフィリアは、黒衣森から無事に戻ったあなたを安堵とともに迎える。ラハブレアの配下がふたり現れ、力を測るためだと自ら認めたと聞くと、彼女はそれを挑発と受け止め、アシエンが本格的に動き始めたのは疑いないと言う。それでも嘆いている場合ではない――あなたの尽力で、暁の血盟は迫り来る闇の存在を少なくとも把握できた。だが人数は足りない。三国へ警告し、警戒を強めるよう進言せねばならない。世界には、アシエンが付け入る不幸があまりに多い。厳しい戦いが待つ――それでも希望を手放してはならない。それこそが敵の望みだからだ。ひとまず、この件の調査はここまでにしておく。別の案件があなたを待っている、と彼女は告げる。</p>
    </div>

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'達爾坦庫爾家的悲劇',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Ursandel 終於把過去完整說出口。他曾是 Gridania 名門 Dartancours 家的男僕，並侍奉屋邸的女主人 Lady Amandine。他記得她曾像盛夏般明亮，美麗而溫柔，彷彿那份善意本就該與她的光芒相稱。然而 Calamity 改變了一切。她雖然活了下來，卻像被奪走了原本的自己。Ursandel 永遠忘不了那天——繃帶被取下，她第一次看見自己毀傷的臉；就在那一瞬間，他所熟悉的那位溫和女性彷彿就此消失。</p>
      <p>從此 Lady Amandine 把自己囚在房間裡，拒絕所有來訪，日子在不安中拖了許久。直到某一天，她毫無預警地開始接待古怪的客人——一群來歷不明的戴面具者。她深信他們能讓她取回失去的一切，於是所謂的 “rites of rejuvenation” 開始了。起初看似還算無害，但儀式逐漸變得越來越扭曲，最後甚至走到無法挽回：她把一名侍女綁在床上，並毀了那張臉。侍女沒能活下來，而 Ursandel 被命令去處理遺體。他照做了——可當他要回到屋裡時，雙腿卻再也無法往前。他明白自己不可能在見過那場惡夢後還回到原處，於是離開了 Haukke Manor，那個他近半個世紀稱之為家的地方。</p>
      <p>如今他求你結束這一切：若不終止這份瘋狂，還會有更多無辜者死去。你曾向他承諾，要讓 Lady Amandine 從折磨中解脫——所以他要你前往 Haukke Manor，就在 Central Shroud 西側邊緣，去做你必須做的事。走進屋邸深處時，你聽見一段低語，像在品味這裡扎根的黑暗。緊接著，兩名 Ascians 現身：Ascian of the Twelfth Staff 與 Ascian of the Twelfth Sword。他們冷淡地打量你，說能取得一枚 Crystal of Light 已非凡人，更別說三枚；Crystals 讓你變得強大，而 Light 正是被那份力量吸引。Hydaelyn 的選擇沒有錯——但你的存在與他們無法共存，他們不能放任你繼續前行。他們坦言此行是奉 Master Lahabrea 之命來衡量你的實力；目的既已達成，便告別離去，最後稱你為 Bringer of Light。</p>
      <p>你回到 Ursandel 面前，他急切追問屋邸內的所見所聞，以及 Lady Amandine 的結局。聽完後，他像是被重重擊中，低聲承認：她竟然走到與惡魔為伍的地步；若他當初能做得更多，也許就能阻止她墮落。他祈願她終於能在彼岸得到安息。他無法確定你遇見的戴面具者是否就是當初引她走偏的那一對，但他看得出來——那是同樣卑劣的同類。若將來有機會，他希望你能讓那些人承受十倍於他們帶給他人的痛苦。可緊接著，他又把矛頭指向自己：正因為他的沉默，才讓不知多少無辜年輕女性在難以言說的慘劇中死去。不論理由是錯置的忠誠、怯懦、或兩者皆有，他都已成為重大罪行的幫兇。他決定向當局自首，接受他們認定的任何懲罰，只求諸神能憐憫他的靈魂。</p>
      <p>回到 The Waking Sands，Minfilia 先是因你平安從 Twelveswood 歸來而鬆了一口氣。當你回報：兩名 Master Lahabrea 的手下現身，並且親口承認他們是來衡量你的力量時，Minfilia 說這是惡魔的嘲弄，也意味著 Ascians 已開始真正行動。即便如此，她不願沉溺於哀嘆——因為你的奔走，Scions 至少已察覺到逼近的 Darkness。但她也坦承，他們人手太少，無法獨力守護整個國度。必須警告三國，提高警戒。世界上的苦難太多，足以讓 Ascians 趁虛而入，艱苦的戰鬥仍在前方。即便如此，她仍要你不要失去希望——那正是敵人最想奪走的東西。至於這次調查，她說你們已從現有線索得到該得的一切，暫時先放下；眼下另有一件事需要你出面。</p>

  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
