    pageTitle:'The Nation of Tuliyollal',

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Erenville looks you over and remarks that he would ask whether the journey tired you, but you have surely endured far worse. Around you, Tuliyollal is already pressing in with unfamiliar color and motion—Alphinaud points out that the Vanu he thought he saw belong to a clan called the Hanuhanu, Alisaie marvels at how lively the city feels, and Krile wonders what trouble the soldiers were bracing for at the harbor.</p>
      <p>Wuk Lamat tries to seize the moment with a bright “first things first,” only for the last of the voyage to catch up with her—no more boats for a while, she groans, still queasy. Erenville insists she should still make you familiar with the city before the rite of succession begins, and Wuk Lamat forces herself into the role of guide even as Alisaie questions whether she’s in any condition.</p>
      <p>A passerby’s curiosity turns into a shout across the street: so the Third Promise has found new followers. Wuk Lamat bristles at the word, denies she’s unwell with stubborn pride, and introduces you and Krile as the handpicked entourage she recruited to help her win the rite. The passerby admits the sight of so many foreigners at the Third Promise’s side will draw attention—and adds, with a warmth her siblings apparently don’t invite, that Wuk Lamat is simply easy to approach. She accepts the kindness gladly, but Erenville cuts in with the practical truth: royalty or not, she will attract a crowd.</p>
      <p>To keep that crowd smaller, Erenville proposes you move in two groups. Wuk Lamat, still irritated at being called “technically” royal, claims you and Krile, while Erenville takes the twins. Yet even with the plan set, Krile urges patience until Wuk Lamat’s nausea settles—and Wuk Lamat tries to push forward anyway, only to falter again.</p>
      <p>Once she steadies herself, Wuk Lamat refuses to waste time feeling sorry for herself with the contest looming. She begins at the harbor, explaining that reefs in the coastal waters keep large ships from mooring at the docks; only shallow-draft vessels—small fishing boats and barges carrying cargo from inland—can navigate the bay. Much of what arrives comes from the southern landmass, where clans produce goods for export, and the cargo is unloaded here before being carted to the nearby markets.</p>
      <p>She leads you to Tuliyollal’s largest marketplace, where the harbor’s flow puts everything from fresh fish to imported wares within reach. She explains that commerce here uses pel, a currency created by the Pelupelu, but reassures you that with growing trade from Eorzea, most shops will happily accept your gil as well. There is another market to the east, but she wants to show you other places first—and promises an expression on your face she can’t wait to see.</p>
      <p>Next she brings you to a plaza and watches for your reaction as you find aetherytes in Tuliyollal. Wuk Lamat explains that her brother Koana studied in Sharlayan for three years, fell in love with the nation and its ways, and brought back the knowledge needed to build them; her father embraced the idea and had one constructed immediately. If you have attuned, she says, then you can continue—down again, then up toward the gate that leads to the northern continent, with a stop at the Landsguard headquarters along the way.</p>
      <p>At Brightploom Post, Wuk Lamat explains that the soldiers here defend Tuliyollal and preserve the peace, led by the nation’s strongest warrior—once her father’s charge, until three years ago, when Zoraal Ja took command. The title carries real weight: the First Promise is regarded as equal to the Dawnservant in martial strength. Wuk Lamat trails off before speaking of her own standing, deciding she’ll discuss her brothers properly when Alphinaud and Alisaie can hear it too, and urges you onward to see the great gate at the northern end of the city.</p>
      <p>There, the scale of the skygate and the bridge beyond it makes the city feel suddenly small. Wuk Lamat tells you both were built by a race of giants, the Yok Huy, and explains that Tural is two continents—Yok Tural in the south and Xak Tural in the north beyond the bridge—said to have been split long ago by the clash of two gods. Krile notes how the tale recalls Hydaelyn and Zodiark, and Wuk Lamat speaks of what matters now: her father united the peoples of both continents into one nation by ending generations of war, and she wants the throne to preserve the peace he built. Yet the path to Xak Tural is barred for the moment—no new travel passes until the rite of succession is over. She swears that once she is Dawnservant, she will see you receive a permit, and after a brief rest, she’s ready to continue the tour.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'トライヨラ連王国',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>エレンヴィルはあなたの顔を見て、「旅の疲れを訊こうと思ったが……あなたはもっと辛い経験をしてきたはずだ」と口にする。目の前のトゥリヨラルは、見慣れない色彩と気配で満ちている。アルフィノは、先ほど見かけたヴァヌのような姿が「ハヌハヌ」という氏族の者だと聞いたと語り、アリゼーはウルダハに負けない賑わいと華やかさに目を見張る。クルルは、港の兵が何を警戒しているのか気にかける。</p>
      <p>ウクラマトは勢いよく「さて！　まずは……」と言いかけるが、胃の不調に顔をしかめ、「しばらく船は勘弁だ……」と弱音を漏らす。それでもエレンヴィルは、継承の儀が始まる前に街に慣れておくべきだと促し、ウクラマトは無理にでも案内役を引き受けようとする。アリゼーはその様子に、本当に大丈夫なのかと眉をひそめる。</p>
      <p>そこへ通りすがりが声を上げる。「妙な連中だと思ったら、サードプロミスの新しい取り巻きか！」――エレンヴィルは「取り巻き……？」と首をかしげ、ウクラマトは慌てて具合の悪さを否定し、船酔いなどしていないと意地を張る。そしてあなたとクルルは、継承の儀に勝つために自分が集めた仲間だと堂々と言い、これから街を案内するところだと告げる。</p>
      <p>通りすがりは、サードプロミスと外国人の一団は目立つから皆が興味を持つだろうと笑い、兄弟たちは近寄りがたい雰囲気を出しがちだが、ウクラマトは話しかけやすいのだと続ける。ウクラマトはその距離の近さを喜び、「迷惑だなんて思わないでくれ」と返すが、エレンヴィルは現実を突きつける――ウクラマトはこの国では王族であり、良くも悪くも人目を集める存在なのだ。</p>
      <p>人だかりを避けるため、エレンヴィルは二手に分かれて動こうと提案する。ウクラマトは「技術的に」王族だと言われたことに引っかかりながらも、あなたとクルルを連れていくと決め、エレンヴィルは双子を引き受ける。だがクルルは、吐き気が落ち着くまで少し待とうと勧める。ウクラマトは無理にでも進もうとするが、結局また顔をしかめてしまう。</p>
      <p>しばらくして落ち着いたウクラマトは、継承の儀が迫っているのに立ち止まってはいられないと言い、まずは港の話から始める。沿岸の海には暗礁が多く、大きな船は桟橋に停泊できないため、湾内を進めるのは喫水の浅い小舟や、内陸の集落と川を行き来する荷船が中心だという。南の大陸からの荷が多く、氏族が作る交易品がここで荷下ろしされ、市場へ運ばれていく。</p>
      <p>ウクラマトは港に面した最大の市場へあなたを連れていく。新鮮な魚から輸入品まで、入ってくる品がそのまま棚に並ぶ場所だ。買い物にはペルという通貨を使い、それはペルペルが作ったものだと説明しつつ、最近はエオルゼアとの交易が増えているので、多くの店がギルでも支払いを受け付けていると安心させる。東にも別の市場があるが、今日は先に見せたい場所があると笑う。</p>
      <p>次に広場へ向かうと、そこにはこの国にもエーテライトがある。ウクラマトは、兄のコアナがシャーレアンで三年間学び、その知識を持ち帰ったことで建造が可能になり、父がすぐに設置を決めたのだと誇らしげに語る。あなたが共鳴を済ませているなら、今度は北へ続く門へ向かおう――その途中で、ランドガードの本部にも立ち寄るという。</p>
      <p>ブライドプルーム・ポストでは、ここに詰める兵がトゥリヨラルを守り、平和を維持しているとウクラマトは説明する。ランドガードは国で最も強い戦士が率い、かつては父が指揮していたが、三年前からはゾラージャが司令官になった。肩書きは名誉ではなく、ファーストプロミスは武の強さにおいてドーンサーヴァントと同格と見なされるのだという。ウクラマトは自分の言葉を飲み込み、兄たちの話は双子も揃ってからすると言って、北端にある大門へあなたを促す。</p>
      <p>門の巨大さと、その向こうに続く大橋の威容に、あなたは思わず足を止める。ウクラマトは、これはヨクフイという巨人の種族が築いたものだと語り、トラルは南のヨクトラルと北のザクトラルに分かれ、大昔に二柱の神の戦いで大地が裂かれたという伝承を話す。クルルはハイデリンとゾディアークの争いを思い出し、ウクラマトは父が二つの大陸の民をまとめ、長い戦乱を止めて築いた平和を守りたいから王座を目指すのだと言う。だが今は継承の儀が終わるまで新しい通行許可証は出ず、北へ渡ることはできない――それでも、ドーンサーヴァントになったら必ず許可証を渡すと、彼女は約束を重ねる。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ウクラマト　<small class="muted">トライヨラ (X:15.6, Y:13.8)</small></div>
    </div>`,

    followq:`<div class="stack">

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'圖萊尤拉聯合王國',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Erenville 看著你，像是想問這趟路有沒有把你累著，卻又把話吞回去——你肯定撐過更艱難的時候。Tuliyollal 的喧鬧與色彩正迎面而來。Alphinaud 提起自己剛才以為看見的 Vanu，聽 Erenville 說那屬於名為 Hanuhanu 的氏族；Alisaie 讚嘆這座城的熱鬧不輸 Ul’dah，卻更加繽紛；Krile 則惦記著港口士兵究竟在防備什麼麻煩。</p>
      <p>Wuk Lamat 振作精神說「先做正事」，卻立刻被反胃打斷——她嘟囔著短時間內再也不想上船。Erenville 提醒你們，繼承儀式開始前應該先熟悉城市；Wuk Lamat 硬撐著要當導遊，Alisaie 忍不住懷疑她到底還撐不撐得住。</p>
      <p>路人遠遠就喊起來：原來這群陌生人是 第三誓約繼承人 帶來的新追隨者。Erenville 對「追隨者」一詞皺眉，Wuk Lamat 也被戳到痛處，逞強否認自己不舒服、否認自己會暈船，並把你與 Krile 介紹成她親自挑選的隨行同伴——為了協助她贏下繼承儀式而招攬的人手。路人笑說，外國人本就會引人注目，更何況還跟 第三誓約繼承人 走在一起；但他也坦白，你的這位同伴比起她的兄弟姊妹更容易親近，讓人願意靠近說話。</p>
      <p>Wuk Lamat 聽見這句話反而很高興，直說她喜歡大家主動接近，別把自己當成麻煩。然而 Erenville 很快把現實擺在你面前：不管她願不願意，Wuk Lamat 在這裡終究是王族，身旁圍著這麼多外來者，自然會吸引人群。為了少惹注意，Erenville 建議分成兩隊行動；Wuk Lamat 抱怨他又在「技術上」無視自己，但仍決定帶你與 Krile 先走，Erenville 則帶著雙胞胎。只是 Krile 更希望等 Wuk Lamat 的噁心感退一些再動身，而 Wuk Lamat 嘴硬說不用，轉眼又忍不住乾嘔。</p>
      <p>等她勉強緩過來，Wuk Lamat 不允許自己一直站著自怨自艾——繼承儀式逼近，她必須動起來。她先從港口說起：沿岸海域礁岩密布，所以你看不到大型船隻停靠；只有吃水淺的船才能進出海灣，多半是小漁船，或是把內陸貨物沿河運來的平底船。她也提到，許多貨物來自南方的陸塊，各氏族生產外銷品，先在此卸貨，再運往鄰近市集的攤位。</p>
      <p>她帶你走進 Bayside Bevy——Tuliyollal 最大的市場。這裡緊貼港口，從新鮮漁獲到進口貨品都能直接上架，幾乎想買什麼都找得到。她順口補充，Tuliyollal 買東西用的是 pel，是 Pelupelu 創造的貨幣；但她也安你的心，因為與 Eorzea 的貿易越來越頻繁，多數店家也願意收你的 gil。至於東邊還有另一座市場，她說下次再去，今天她想先帶你看更重要的地方。</p>
      <p>接著她把你帶到一座廣場，讓你親眼看到 Tuliyollal 也設有以太水晶。Krile 驚訝之餘，Wuk Lamat 便解釋：她的哥哥 Koana 曾在 Sharlayan 留學三年，喜愛那裡的制度與做法，於是把以太水晶建造技術帶回來；她的父親一聽就接受，立刻命人建造。她催你確認是否已完成共鳴，然後要你跟上腳步——先下去再沿著坡道往上，途中會在 Brightploom Post 停一下，那裡是守衛隊的據點。</p>
      <p>到了 Brightploom Post，Wuk Lamat 說這裡的士兵負責守護 Tuliyollal、維持治安；而守衛隊由全國最強的戰士率領，父親從一開始就親自指揮，直到三年前把指揮權交給 Zoraal Ja。這頭銜不是虛名——第一誓約繼承人 在武力上被視為與 Dawnservant 並列的存在。Wuk Lamat 話說到一半就停住，像是把某些不甘心吞了回去，只說關於兄弟們的事晚點再談，等 Alphinaud 和 Alisaie 也在場再說，並催你往北端走去，看她一直想讓你見識的那座天空之門。</p>
      <p>當你站在門前，巨大的結構與門外相連的宏偉橋梁讓人一時說不出話。Wuk Lamat 說這一切是由 Yok Huy 這個巨人種族建造；而所謂的 Tural，其實由兩塊大陸組成——南方的 Yok Tural 與北方、橋另一側的 Xak Tural。她講起傳說：久遠以前兩位神祇交戰，巨力撞擊把大陸一分為二；Krile 聽著也聯想到 Hydaelyn 與 Zodiark。Wuk Lamat 接著回到她真正放不下的事：父親讓兩塊大陸的人民同屬一國，終結各氏族長年的戰亂，她想贏得王座，就是為了守住那份得來不易的和平。只是你若想跨橋前往 Xak Tural，還需要特別通行證，而在繼承儀式結束前不會核發新的許可——她向你保證，等她成為 Dawnservant，那張通行證一定會交到你手上。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
