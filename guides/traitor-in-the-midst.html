    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>A lingering dread weighs on Minfilia, but she forces herself to set aside fear of the unknown and focus on what can be faced now. The primals have been quiet of late, the beast tribes are under constant surveillance by the Grand Companies, and until a lasting answer to the primal problem is found, there is little to do but wait and watch. Urianger continues to seek a way to defeat the Ascians, and Minfilia can only pray for good tidings—yet she tells you this is nothing you do not already know. What concerns her most at present is the Crystal Braves: founding them was one thing, keeping them running smoothly is another. Alphinaud refused the help of an Archon, stubbornly independent as ever—except, she notes, when help comes from you. She asks you to go to him and support him in whatever way you can.</p><p>You find Alphinaud busy, impatient for you to be concise—until you offer your help. He admits there is a sensitive matter that needs attention, one he hesitated to entrust to his Braves, but his time is stretched thin. The Crystal Braves are newly formed, yet demand for their services is already so great that they struggle to answer every petition. He would prefer to handle this particular issue himself, but he is required elsewhere, so he has entrusted it to his second-in-command, Captain Ilberd. He tells you to say Alphinaud sent you, and Ilberd will provide the particulars, offering his thanks in advance.</p><p>Ilberd receives you as a Scion and confirms that Commander Leveilleur has bid you serve them. Because the task is sensitive, he could not rely on one of his own, and he swears you to strict confidence. Days ago, the Crystal Braves received documents from an anonymous source warning of a Garlean agent within the ranks of one of the Grand Companies. Discreet inquiries led them to detain a suspect among the Immortal Flames, but the man was not their agent—only one of many in the agent’s employ. Pressed for a name, the traitor could provide none, claiming he has never met his master and knows him only as “the Ivy.” Yet he was certain this Ivy has coiled itself around every part of the Immortal Flames: joining some time ago, then gradually recruiting others, using these conspirators as vines to learn secrets without exposing himself. Identifying the Ivy amid such subterfuge will not be easy, but Ilberd insists they have a tendril in hand and will follow it to the root.</p><p>Ilberd would rather proceed with discretion, but circumstances demand haste. Garlemald’s war of succession nears its end, and it is feared the Empire will soon resume its march on Eorzea; when it does, traitors cannot be allowed to remain. The Ivy must be rooted out now, beginning with informing General Raubahn of what has been found. Ilberd asks you to accompany him to the Hall of Flames and stay close to ensure things go smoothly. If the Ivy’s reach is as wide as believed, he will already know an investigation is underway—and may move against them. They must be ready for anything while taking care not to betray their purpose by seeming prepared, a simple enough task for a one-man army like you.</p><p>At the Hall of Flames, Raubahn greets you warmly, and Ilberd announces that you are here at his behest. The two men recognize one another at once—old friends and rivals since they were lads—and Raubahn laughs at the thought of Ilberd as the honored captain of the Crystal Braves, while Ilberd counters that few imagined Raubahn’s destiny would be politics. Raubahn speaks of how long it has been since Ala Mhigo fell, and how Ilberd gave not a word in all those years; Ilberd replies that his dealings were modest and mundane compared to Raubahn’s rise. He recounts the tale as he has heard it: Raubahn arriving in Thanalan, seized by the Brass Blades and dragged to the bloodsands, winning a thousand matches, earning the people’s hearts, then using his mountain of prize money to buy the Coliseum and secure a seat on the Syndicate—rags-to-riches beyond justice. Raubahn brushes it off, calling you the true hero, while telling Ilberd not to sell himself short; Ilberd answers that he did what he could for the greater good, and then turns the reunion to its purpose—he has tidings.</p><p>Raubahn says he has made it known that this meeting is merely a reunion in plain view, so none will suspect a thing, and after hearing Ilberd he concludes that they have been compromised. Teledji Adeledji’s machinations have shaken Ul’dah, and in uncertain times loyalties may be bought for a fistful of gil—but if this snake has truly been among them so long, they must consider conspiracy, and whether the Monetarists have been in league with the Empire from the first. He promises to set his most trusted men to investigate while Ilberd continues his inquiries, then bids his old friend farewell with the hope they will next meet over a flagon of ale. Ilberd looks forward to it, praises Raubahn for wearing the mantle of Flame General well, and tells you your presence proved unnecessary after all—thanks to Raubahn’s prudence—yet he is glad you were there, and he offers you his thanks.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>ミンフィリアは、拭いきれぬ不吉な予感にため息をつく。だが未知を案じても意味はなく、いま目の前の問題に集中すべきだと言い聞かせる。蛮神は最近おとなしく、呼び出す獣人たちはグランドカンパニーの監視下にある。不審な動きがあれば必ず耳に入るはずで、蛮神問題の恒久的な解決が見つかるまでは、待ち、見守るほかない。アシエンに対しては、ウリエンジェが打倒の手段を探し続けているから吉報を祈ろう――もっとも、それはあなたも承知のことだ。だからこそ彼女は、より差し迫った話として「クリスタルブレイブ」の現状を口にする。組織を立ち上げたのは見事だったが、円滑に運営するのは別問題だ。彼女は賢人の派遣を申し出たものの、アルフィノは断ったという。助けを嫌うほど独立心が強い――ただし、あなたからの助力だけは例外だろう。ミンフィリアは、あなたにアルフィノのもとへ行き、できる限り支えてほしいと頼む。</p><p>石の家でアルフィノに会うと、彼は忙しいから要件は手短にと言う。だがあなたが手を貸すと告げると、彼は扱いの難しい案件があると認める。繊細な内容ゆえ部下に任せるのをためらったが、時間の余裕がなく、放ってはおけないという。クリスタルブレイブは結成されたばかりなのに依頼は殺到し、嘆願のすべてに応えるのも容易ではない。できれば自分で片をつけたいが、別の場所に顔を出さねばならず、そこで件の処理は副官のイルベルド大尉に一任した。自分が遣わしたと伝えれば詳細を説明すると言い、前もって礼を述べた。</p><p>イルベルドはあなたを暁の血盟の者として迎え、アルフィノからの命で来たのかと確かめる。任務の性質上、部下には任せられなかったからこそ、あなたが来たのはありがたいと言い、これから話すことは厳重に秘密にしてほしいと念を押す。数日前、匿名の差出人から書類が届き、いずれかのグランドカンパニーの内部にガレアンの密偵が潜んでいると告げてきた。慎重に探りを入れた結果、不滅隊の中に容疑者を見つけ、拘束して尋問したが、その男は密偵本人ではなく、密偵に雇われた者のひとりにすぎなかった。名を吐かせようとしても、男は主と会ったことがなく、「アイヴィー」としか知らないと言う。だがその「アイヴィー」は不滅隊のあらゆる場所に蔓を絡ませているらしい。以前から隊に入り込み、少しずつ仲間を引き入れ、共謀者たちを蔓として秘密を吸い上げ、自身は姿を見せない。正体を突き止めるのは容易ではないが、手元に蔓の端はある、根まで辿る――イルベルドはそう断言する。</p><p>本来なら慎重に進めたいが、情勢がそれを許さない。ガレマールの継承戦争は終わりに近く、帝国がまもなくエオルゼアへ再び進軍すると危惧されている。そのとき内に裏切り者がいてはならない。「アイヴィー」はいま、根こそぎ引き抜く必要がある。まずは不滅隊総長ラウバーンに報告しなければならず、イルベルドはあなたに不滅隊本部まで同行し、事が滞りなく進むよう傍に控えてほしいと頼む。蔓が想像どおり広がっているなら、調査が始まったことも相手は察知しているはずで、こちらに手を出してくる可能性もある。備えていながら備えているように見せない――一騎当千のあなたには容易い、と。</p><p>不滅隊本部でラウバーンはあなたに気さくに声をかけ、イルベルドはあなたが自分の要請で来たと告げる。ふたりはすぐに旧知を確かめ合う。少年の頃から友でありライバルだったというラウバーンは、イルベルドが「クリスタルブレイブ」の大尉になったと聞いても信じられなかったと笑い、イルベルドは、ラウバーンが政の道に進むとは誰も想像しなかっただろうと返す。アラミゴが陥落して以来の歳月、ひとことも寄越さなかったとラウバーンがぼやけば、イルベルドは自分の仕事は地味だったと肩をすくめる。そして噂に聞くラウバーンの経歴を語る。サナランに着くやブラスブレイドに捕らえられ、血の砂へ引きずられたが、千の勝利を重ねて民の心を掴み、巨額の賞金で闘技場を買い取り、シンジケートの席を得た――成り上がりという言葉では足りない、と。ラウバーンはそれを否定し、英雄と呼ぶならここにいるあなたこそだと言う一方で、イルベルドも功績ある冒険者だったはずだと評する。イルベルドは「より大きな善」のために動いたつもりだと言い、話を本題へ戻す――知らせがある、と。</p><p>ラウバーンは、この面会を旧友同士の再会として周知させたから誰も疑わず、別の場所で会えばかえって目立つので、ここで皆の目の前で話そうと言う。そして報告を聞き終えると、こちらが内側から侵されている事実を受け止める。テレジ・アデレジの策謀はウルダハを揺さぶり、不安定な時勢では忠誠も金で買われかねない。だが蛇が長く潜んでいたのなら、さらに深刻な可能性――陰謀を考えねばならず、マネタリストが最初から帝国と結託していたのではないか、と。彼は最も信頼する者たちに調査を命じ、イルベルドには引き続き探索を続けるよう指示する。再会を喜び、次は酒を酌み交わそうと告げると、イルベルドも応じ、祖国の未来に乾杯しようと言う。最後に彼は、ラウバーンが不滅隊総長の務めを立派に果たしていると称え、あなたには出番がなかったが、それはラウバーンの慎重さのおかげだと述べる。それでも傍にいてくれて助かった、と礼を言った。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>Minfilia 嘆了口氣，說自己再怎麼努力，也無法甩開那股悄悄逼近的不祥預感。但她也立刻提醒自己：對未知憂心並沒有意義，眼前要做的是把注意力放回「現在的問題」。近期 primal 相對沉寂，而召喚 primal 的 beast tribes (Eorzea 各地被城邦社會統稱為「獸人部族」的族群，多半擁有自身的文化、信仰與聚落；在主線脈絡中常與召喚 primal 的行動連結，因此長期受到 Grand Companies 監視與關注) 一直都在 Grand Companies 的嚴密監視之下；若真有可疑動靜，你們必定會第一時間得知。在找到 primal 問題的長久解法之前，你們能做的也只能等待與觀察。至於 Ascians，Urianger 正全心投入找出擊敗那些黑暗存在的方法，只能祈求那邊能帶回好消息——不過這些你本來就都知道。於是她把話題拉回更迫切的現況：Crystal Braves（Alphinaud 所創設的獨立武裝團隊，向 Scions of the Seventh Dawn 宣誓效力，不隸屬任何單一國家，目標是成為團結 Eorzea 的先鋒力量）。Alphinaud 建立組織做得很好，但要讓它順暢運作，卻是完全不同的難題。她原本想派一位 Archons（賢者）去協助，卻被他拒絕；你也明白他有多固執、獨立到近乎不肯接受任何幫忙……除了你。Minfilia 說得很直白：只要你願意伸手，他過去就曾把無數重要的事交給你，這一次也一定不例外。她請你去找他，盡你所能支持他。</p><p>你在 Rising Stones 見到 Alphinaud，他一開口就要你「簡短扼要」，因為他很忙。可當你表明願意幫忙，他又立刻改口，承認確實有一件事需要處理，而且牽涉敏感，他原本不太想交給 Crystal Braves 的人去辦，但眼下他的時間被各種事務逼到沒有選擇。Crystal Braves 才剛成立，外界對他們的需求卻已經大到幾乎應付不來，請託與陳情堆得他喘不過氣。這件事他本想親自處理，但他必須去別處露面，所以只好把此事交給他的副官——Captain Ilberd。他要你轉告 Ilberd：是他派你來的，細節 Ilberd 會告訴你，並先向你道謝。</p><p>Ilberd 以 Scion 的身分向你致意，聽見 Alphinaud 要你來支援，他直說這消息再好不過。因為這件事的性質太敏感，他無法信任自己手下的人處理；接下來要說的內容，也必須嚴格保密。數日前，Crystal Braves 收到匿名人士送來的文件，指出某個 Grand Companies 的隊內潛伏著 Garlean 的密探。經過一番低調查探後，他們鎖定了 Immortal Flames 中的一名嫌疑人並加以拘留審問；但結果證明，那個人不是密探本人，只是密探手下的其中一個棋子。他們逼問出主使者的名字，對方卻說自己從未見過主人，只知道那人被稱作「Ivy」。然而那個人也斬釘截鐵地說：這個「Ivy」早已把勢力滲進 Immortal Flames 的每個角落，他很久以前就混進隊內，之後一步步吸納同夥，讓這些共犯成為他的「蔓」，替他在不暴露自身的情況下蒐集機密。要在這團糾結的暗線裡揪出 Ivy 並不容易，他把人安插在各處，像「蔓」一樣替他探聽消息，自己則藏在暗處不露面。要在這堆偽裝裡揪出 Ivy 很難，但 Ilberd 說你們手上已經有線索，能順著它一路追到源頭。</p><p>Ilberd 本想更謹慎、低調地推進，但情勢不允許。Garlemald 的繼承戰爭即將告一段落，而人們擔心 Empire 很快就會再度向 Eorzea 進軍；若真到了那一步，你們絕不能容許內部還藏著叛徒。所以 Ivy 必須立刻被連根拔除。第一步是把調查結果通報給 General Raubahn，Ilberd 請你陪他前往 Hall of Flames，並留在一旁確保一切順利。若 Ivy 的勢力真如你們推測那般廣泛，他很可能早已察覺調查正在進行，甚至可能會反過來對你們出手。你們必須隨時準備應變，同時還得小心別讓人看出你們「有所準備」——Ilberd 說，這對你這種「一人就能成軍」的人而言，應該不難。</p><p>在 Hall of Flames，Raubahn 親切地招呼你，Ilberd 則說你是依他的請託而來。兩人很快就以老朋友的口氣互相調侃：Raubahn 大笑著說，聽到 Ilberd 會來拜訪時他還以為自己聽錯，沒想到如今 Ilberd 居然成了 Crystal Braves 的受封隊長；Ilberd 也回敬一句，說更少人想得到 Raubahn 竟走上政治之路。Raubahn 說他們從小就是朋友也是對手，最後一次見面時正逢 Ala Mhigo 淪陷，這些年過去，Ilberd 竟一點消息都沒有。Ilberd 輕描淡寫地說自己的差事不值一提，倒是他聽說 Raubahn 的經歷才叫人咋舌：來到 Thanalan 不久就被 Brass Blades 上銬拖去血砂場等死，卻硬是連勝千場、贏得民心；再用那座獎金山買下 Coliseum，還在 Syndicate 取得一席之地——那已經不是「白手起家」能形容。Raubahn 卻反過來說自己算不上英雄，真正配得上那稱號的是你；他也要 Ilberd 別妄自菲薄，說各方都認為 Ilberd 曾是頗有名望的冒險者。Ilberd 只說自己也算為更大的善盡過一份力，隨即收起玩笑，表示自己帶來了消息。</p><p>Raubahn 說他已對外放出風聲，把這場會面包裝成老友重逢，所以 Ilberd 的來訪不會引人懷疑；若改在別處見面反而更顯眼，不如就在眾目睽睽下把話說清楚。聽完報告後，他沉下臉，直言你們這邊已經被滲透。Teledji Adeledji 的種種算計動搖了 Ul’dah，在這樣不安的局勢裡，一個人的忠誠很可能只要一把 gil 就能買到。但如果那條蛇真如 Ilberd 所說，早就潛伏多年，那就得考慮更可怕的可能：陰謀——Monetarists 是否從一開始就與 Empire 勾結。Raubahn 表示會派出自己最信任的人徹查此事，同時要 Ilberd 繼續追查。臨別前，他說能再見到老友很高興，希望下次相見能一起喝上一杯。Ilberd 也說他很期待，並稱讚 Raubahn 披上 Flame General 的責任後依然做得很好；至於你，他說看來你的支援最後沒有派上用場——多虧 Raubahn 的謹慎——但他仍很慶幸你在場，並向你致謝。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 敏菲利亞 <small class="muted"> 石之家（X:6.1, Y:5.2)</small></div></div>`,

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4Kw',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
