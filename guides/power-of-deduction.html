  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}

    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Power of Deduction',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Medrod lets out a weary sigh. There have been no promising leads in the murders, and he can scarcely sleep knowing the killer is still at large. Seeing your furrowed brow, he assumes the whole sorry business troubles you as much as it does him.</p>
      <p>Beside him, Ivaurault says he has been turning his own encounter over and over in his mind. He wavered for a time, but now insists there can be no doubt: what he witnessed was a winged eyeball. It strains belief, he says, that he could have mistaken so distinct a creature for a banemite.</p>
      <p>Medrod presses him: they were malms apart—how could both of them have seen it at precisely the same time? And what’s more, you had a run-in with a banemite at the very spot where Ivaurault claimed to see that fiendish eyeball, didn’t you? Ivaurault refuses to back down, swearing he saw an eyeball with wings—he’d wager an apple tart on it.</p>
      <p>Aideen reacts to that with a drawn-out sound of disbelief, then tries to steady the conversation—maybe it’s not as mysterious as they’re making it out to be. And then the thought hits her hard: of course. There must be more than one of the buggers. But if there have been repeated sightings of these fiends… then that means there may be even more victims, still undiscovered. The group can only swallow hard at what that implies.</p>
      <p>Medrod stammers that they’re out of their depth, and that they ought to leave the rest to an expert—meaning you. Aideen agrees at once, reminding everyone they’re civilians, and wishing you luck with the kind of farewell that sounds like it might be final. Ivaurault, though burning to know the truth, admits some things may be best left unknown. Still, he reminds you it was at the rocky area to the west that he had his encounter—and if you discover anything of note, you should alert the authorities. There’s a guardhouse nearby, and the Serpents there will welcome any information that concerns the region’s security.</p>
      <p>With the matter pressed into your hands, you set out for Alder Springs—and the tension doesn’t ease. The danger is still about, and you can feel a hostile presence lingering close.</p>
      <p>Back at Fallgourd Float, you speak with Aethelmaer. Even before you can fully explain, he grimly recognizes the pattern—gods be good, not again. Identical deaths have been reported in the Central Shroud. The masked stranger you seek doesn’t seem to feature in any of them, but sightings of the winged eyeball are common enough. The creature appears to be moving the bodies, though to what end none can say. All the victims have been young women, their faces mutilated beyond recognition, making identification—and notifying next of kin—terribly difficult. Then his gaze catches on a new detail: a button engraved with a lily motif, the very same object found upon another victim. A family sigil, perhaps—or that of an organization. Either way, he dares to hope this discovery will prove pivotal in solving the murders.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Medrod <small class="muted">North Shroud (X:21.7, Y:26.7)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="seeing-eye-to-winged-eye.html">Seeing Eye to Winged Eye</a></div>
      <div class="row"><a class="link" href="rock-of-rancor.html">Rock of Rancor</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 28 or above)</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="secret-of-the-white-lily.html">Secret of the White Lily</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'推理は踊る',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>メドロドは疲れたようにため息をつく。切り裂き魔事件は手がかりらしい手がかりがなく、犯人が野放しのままと思うだけで眠りも浅い。あなたの眉間のしわを見て、同じように胸を痛めているのだろうと口にする。</p>
      <p>イヴォローは、自分の目撃をずっと考え続けていたと言い、しばらく迷いはあったものの、もはや疑いようがないと断言する。見たのは「翼の生えた目玉」だった。あれほど特徴的な存在を、ベインマイトと見間違えるなどありえない、と。</p>
      <p>だがメドロドは問い詰める。互いに離れた場所――マルム単位で離れていたのに、どうして同じ時刻に同じものを見たと言えるのか。さらに、あなたはイヴォローが目撃したというその場所で、実際にベインマイトと遭遇しているではないか、と。イヴォローは説明があるはずだと食い下がり、「翼の生えた目玉」を見たのだと譲らない。アップルタルトを賭けてもいい、とまで言い切る。</p>
      <p>それを聞いたアイディーンは、冗談ではないと分かる声を漏らしつつ、もしかすると必要以上に神秘扱いしているだけかもしれない、と話をまとめようとする。だが次の瞬間、彼女は息を呑む。なるほど――そういうことだ。あれが一体だけとは限らない。もし目撃が繰り返されているのなら、まだ見つかっていない犠牲者がいる可能性もある。場の空気が一気に重くなり、誰もが固唾をのむ。</p>
      <p>メドロドは震える声で、自分たちの手に負える話ではないと言い、残りは専門家――あなたに任せるべきだと頼む。アイディーンも、所詮は一般人だと口にして、運を祈るように別れを告げる。真相を知りたい気持ちはあっても、イヴォローは「知らないほうがいいこともある」と言い、ただ自分が遭遇したのは西の岩場だったと改めて念を押す。もし何か分かったなら当局へ知らせるべきで、近くの衛兵詰所にいる双蛇党が、この地域の治安に関わる情報を歓迎するだろう、と。</p>
      <p>あなたはアルダースプリングスへ向かうが、不穏さは消えない。脅威はまだ近くにあり、敵意の気配が肌にまとわりつく。</p>
      <p>フォールゴウドでエーセルメール牙曹長に事情を伝えると、彼は顔を曇らせて「またか」と呟く。同様の遺体が中央森林でも報告されているという。あなたが追う「仮面の怪しい人物」は事件に関与していないようだが、「翼の生えた目玉」の目撃は少なくない。あの存在が遺体を移動させているらしいものの、目的は誰にも分からない。犠牲者はいずれも若い女性で、顔は判別できないほど損壊しており、身元確認も遺族への連絡も困難だ――そう語りかけたところで、彼は百合の意匠が刻まれたボタンに気づく。別の犠牲者からも見つかった品で、家紋か、あるいは組織の標章かもしれない。いずれにせよ、この発見が事件解決の決め手になることを願いたい、と彼は言う。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> メドロド　<small class="muted">黒衣森：北部森林 (X:21.7, Y:26.7)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="seeing-eye-to-winged-eye.html">逢魔が時に光る瞳</a></div>
      <div class="row"><a class="link" href="rock-of-rancor.html">怨念岩の謎</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 28～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="secret-of-the-white-lily.html">白百合は謡う</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'推理的熱情',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Medrod 先是長嘆一口氣，說連環命案依舊沒有任何像樣的線索。只要想到兇手仍在外逍遙，他就幾乎無法安睡。看你也皺著眉，他便認定你同樣被這樁糟心事折磨著。</p>
      <p>Ivaurault 接著說起自己這段時間反覆思考的結論：他曾經一度不確定，但如今已經可以肯定——他看到的就是「長翅膀的眼球」。他認為那種生物特徵太明顯了，不可能把它看成 banemite。</p>
      <p>Medrod 立刻追問：可他們當時相隔好幾個 malms，怎麼可能在同一個時間點同時目擊？更何況，你就在 Ivaurault 指稱的那個地點，實際遭遇到的是 banemite，不是嗎？Ivaurault 仍堅持一定有解釋，他說自己確實看見了長著翅膀的眼球，甚至願意拿一塊蘋果塔來打賭。</p>
      <p>Aideen 聽到這裡，才意識到他是認真的。她試著把事情往「也許沒那麼神祕」的方向拉回來——可念頭一轉，她突然倒抽一口氣：原來如此。那東西不一定只有一隻。若目擊是反覆出現的，那就意味著……也許還有更多受害者，至今尚未被發現。眾人只能吞了口口水，氣氛瞬間變得沉重。</p>
      <p>Medrod 結結巴巴地承認，他們恐怕已經超出能力範圍，剩下的只能交給「專家」——也就是你。Aideen 連忙附和，強調他們畢竟只是平民，然後用近乎「道別」的口吻祝你好運。Ivaurault 雖然仍渴望真相，卻也說有些事或許不知道比較好；但他仍提醒你，他的遭遇發生在西邊那片岩地。若你發現任何值得注意的線索，就該立刻通知當局——附近有一處守衛駐地，而那裡的 Serpents 一定樂於接收任何關乎本地治安的情報。</p>
      <p>你動身前往 Alder Springs，可那股不安並沒有散去。危險似乎仍在附近，你能清楚感覺到一股敵意般的氣息揮之不去。</p>
      <p>回到 Fallgourd Float，你向 Aethelmaer 說明情況，他的反應帶著沉痛——又來了。類似的死法也在 Central Shroud 被通報過。你追查的「戴面具的神秘人」並沒有出現在任何案件裡，但「長翅膀的眼球」的目擊卻相當常見。那生物似乎在搬動遺體，可它這麼做的目的，沒有人說得出來。受害者全是年輕女性，而且臉部都被毀壞到無法辨識，使得確認身分、通知家屬都變得極為困難。就在他說到這裡時，他注意到一枚刻著百合圖樣的鈕扣——同樣的物件也曾在另一名受害者身上出現過。那可能是家族徽記，或某個組織的標記。不論是哪一種，他都只能抱著一絲希望：這個發現，或許會成為偵破命案的關鍵。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 梅德羅德　<small class="muted"> 黑衣森林北部林區 (X:21.7, Y:26.7)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="seeing-eye-to-winged-eye.html">眼中的災禍之光</a></div>
      <div class="row"><a class="link" href="rock-of-rancor.html">怨念之岩</a></div>
      <div class="row">所有職業（不含限定職） 等級 28 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="secret-of-the-white-lily.html">白百合的秘密</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
