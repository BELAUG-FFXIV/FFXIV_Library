    story:`<div class="clamp" data-collapsed="true">
<p>You hear Ellie’s weary sigh and catch the edge of her curiosity: if you really plan to help the “imbecile,” then she’ll at least point you somewhere useful. The man you’re looking for is an adventurer named Humphrey, and he’s at the Golden Bazaar—and as she sends you on your way, she can’t help wondering what you’ll do when you learn the “victim” has also wronged someone else.</p>
<p>At the Golden Bazaar, you find Humphrey with Hildibrand already breathless from the chase, demanding to know if Humphrey is truly one of the duelist’s victims. Humphrey laughs it off and boasts that he stood his ground like a Warrior of Light, even spinning a grand tale of Carteneau, magitek on every side, and “Master Lou” at the center of it all—until Ellie cuts through the performance with a sharp accusation.</p>
<p>That’s when Eleazar storms in, furious and shaken: Humphrey was trusted with his father’s blade and the gil for its restoration, only to return begging forgiveness after losing it in a duel. Humphrey finally admits the truth—he was beaten, the borrowed sword was taken, and the gil went to a chirurgeon instead—and then he pleads with you to help him recover what he can’t replace on his own. Ellie demands you refuse, but Hildibrand won’t abandon either man; he insists you start by questioning the people of the Golden Bazaar.</p>
<p>As you gather answers, the Bazaar gives you pieces that don’t quite fit. One person warns that counterfeit “relics” circulate among collectors; another suggests an unpleasant mercy—if a fake sword can give Eleazar peace, perhaps the deception is kinder than despair. You’re directed at last to a traveling merchant named Jojonpa, the only one likely to know what gets thrown away, and where.</p>
<p>Jojonpa claims he can’t guarantee any “ancient sword,” and anything of dubious origin gets discarded in the spring east of Camp Drybone—including, possibly, a facsimile like the one you describe. Hildibrand wrestles with the idea of a well-meant ruse, Ellie warns the spring is used by commonfolk and nothing valuable will stay there long, and Hildibrand decides you search first before surrendering to bad news.</p>
<p>At the spring, Jojonpa laughs outright at Hildibrand’s outfit, and Hildibrand—still insisting he’s recovering—declares he can’t enter the water without first being coated in salamander oil. So you do it: you pour, you knead, you try to comply while he dramatizes every sting and spasm as if it’s the most important case of his life. Then you search the water, turn up nothing, and in the next moment Nashu yelps as something splashes her—while Hildibrand triumphantly declares your instincts have led you to the truth once again.</p>
<p>Nashu rushes off to Ul’dah for proper clothes and hair tonic, and soon Eleazar is holding a blade he swears he recognizes—chips, scratches, all of it—grateful beyond words. Ellie admits she didn’t expect such effort without reward; Hildibrand answers that a gentleman refuses to forsake anyone. Then you notice something lodged in his forehead: a message—“I shall come to claim the collector’s blade.” Ellie snaps that it’s a threat from the duelist, daring him to intervene. Hildibrand accepts with relish, dresses for the occasion, and as Nashu cheers him on, a dark voice lingers nearby, judging the sword and the endless desert sky—while Hildibrand, undeterred, insists this duel will be fought properly, even if the battlefield feels all wrong.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>エリー・ライズはため息まじりに言う。あなたがあの「間抜け」の友人なら、どうせ手を貸すつもりなのだろう――ならば居場所だけは教えてやる、と。探している男は冒険者のハンフリーで、今はゴールデンバザーにいる。運がよければ、立派な検事殿もあなたが着く頃にはたどり着いているはずだ、と皮肉を残す。</p>
<p>ゴールデンバザーでは、息を切らしたヒルディブランドがすでにハンフリーに食ってかかっていた。決闘士に襲われた被害者なのか、と問われたハンフリーは大笑いし、自分は光の戦士だと言い張る。カルテノーでは右も左もマジテック、真ん中には「マスター・ルー」――そんな武勇伝を滔々と語り出すが、エリー・ライズが即座に断じる。あれは光の戦士ではない、と。</p>
<p>そこへエレザル・グレイヴが怒りと嘆きのままに割って入る。父の剣を修復に出すよう頼み、ギルまで渡したのに、こいつは決闘で失ったと泣きついてきた――それで済むと思うな、と。ハンフリーはついに白状する。決闘士に叩きのめされ、剣は奪われ、ギルは治療師に払ったのだ、と。そして今さらながら、剣探しを手伝ってくれとあなたに縋りつく。エリー・ライズは拒めと言うが、ヒルディブランドは見捨てない。まずはゴールデンバザーで聞き込みだ、と宣言する。</p>
<p>聞き込みで集まるのは、情けないほど現実的な声ばかりだ。見た目は古くても偽物が多い、という話。名誉あるやり方ではないが、偽物でも父の形見だと思わせれば心は救われるのではないか、という提案。最後に、旅商人ジョジョンパの名が出る。骨董のことなら、あの男に聞け――いるならば、だ。</p>
<p>ジョジョンパは言う。真正と保証できる古い剣は知らない、と。ただし出自の怪しい品は、キャンプ・ドライボーン東の泉へ即座に捨てる。あなたの話に似た複製品なら、そこへ処分したかもしれない、と。ヒルディブランドは不本意ながらも、善意の策なら心を落ち着かせられるかもしれないと逡巡し、エリー・ライズはその泉が生活用水で、長くは残らないと釘を刺す。それでもヒルディブランドは、失ったと決めつける前に泉を探すと言い切る。</p>
<p>泉に着くと、ジョジョンパはヒルディブランドの身なりを見て腹を抱えて笑う。ヒルディブランドは負傷が癒えていないと大げさに言い、入水の前にサラマンダーオイルをたっぷり塗らねばならないと主張する。あなたは言われるがまま油を注ぎ、揉み込み、彼の大仰な悲鳴と歓声に振り回されながらも、泉を探る。しかし目当ての剣は見つからない。次の瞬間、ナシュ・マカラッカが何かに濡らされて声を上げ、ヒルディブランドはまたしても自分の直感が獲物へ導いたのだと言い張る。</p>
<p>ナシュ・マカラッカは服を取りにウルダハへ走り、さらに育毛薬も買ってくると言い残す。やがてエレザル・グレイヴの手に渡る剣は、欠けも傷も覚えのままだと喜ばれ、エリー・ライズは見返りもなくここまで動く者は珍しいと認める。ヒルディブランドは、紳士は誰も見捨てないのだと胸を張る。だが彼の額には、名もなき書き手の文が刺さっていた――「収集家の剣を取りに来る」。それは決闘士の挑発だとエリー・ライズが告げ、ヒルディブランドは喜々として受けて立つと宣言する。ナシュ・マカラッカが称賛する中、黒衣の男が低く名を呼び、正体不明の声が剣を評し、青い空と砂漠を語る。あなたの前で、ヒルディブランドは言葉だけではなく武器で決着をつけると息巻き、だがその舞台はあまりに場違いだとこぼす。</p>
</div>

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'鎖孔中的光',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
<p>Ellie 嘆了口氣，像是早就料到你會插手：既然你是那個「蠢蛋」的同伴，當然打算幫忙。她把線索丟給你——你要找的人叫 Humphrey，是個冒險者，現在在 Golden Bazaar。她還帶著幾分看戲的語氣說著：也許你抵達時，Hildibrand 已經自己摸到那裡；如果沒有，那也只能算他活該。</p>
<p>在 Golden Bazaar，你撞見 Hildibrand 氣喘吁吁地追上 Humphrey，開口就問他是不是那個決鬥者的受害者。Humphrey 卻放聲大笑，說那人以為逮到的是個毛頭小子，結果碰上的其實是「光之戰士」。他越講越起勁，扯到 Carteneau 的戰場、兩側的 magitek，還有被他稱作 Master Lou 的人——直到 Ellie 冷冷打斷：那傢伙才不是什麼光之戰士。</p>
<p>接著 Eleazar 直接衝上來，把怒火與委屈一股腦砸向 Humphrey：他把父親的劍託付出去修復，連 gil 都先給了，結果 Humphrey 卻哭著回來說在決鬥裡把劍輸掉了，還想用道歉了事。Humphrey 終於不再狡辯——他承認自己被打得很慘、劍也被奪走，而那筆 gil 則拿去付了醫師的費用；他說他根本不知道那把劍現在在哪。走投無路之下，他反過來央求你幫他把劍找回來。Ellie 要你拒絕，但 Hildibrand 卻反問：如果連 Humphrey 都放棄，那 Eleazar 又能得到什麼？他決定從 Golden Bazaar 的人開始問起。</p>
<p>你跟著把情報一點點拼回來。有人提到古劍市場裡偽造品很多，收藏家也常被騙；也有人提出一個讓人不舒服的辦法——若是給 Eleazar 一把仿品，至少能讓他以為父親的遺物回來了，或許就能放下心結。最後，你被指向一名旅行商人 Jojonpa：要談古兵器和來路，最好找他——前提是他還沒離開。</p>
<p>Jojonpa 表示他沒辦法保證什麼「古老名劍」的真偽；不過只要他判定貨物來源可疑，就會立刻丟棄在 Camp Drybone 東邊的泉水裡。他說自己也許曾處理過一把外型相近的仿品。Hildibrand 聽著這些，雖然不情願，仍開始考慮「善意的欺瞞」是否能先安撫 Eleazar；Ellie 則提醒你：那口泉是民眾取水的地方，若真有什麼東西，也不可能久留。Hildibrand 卻堅持先去找過再說。</p>
<p>抵達泉邊，Jojonpa 看著 Hildibrand 的打扮笑到停不下來；Hildibrand 則一本正經地表示自己還在復健，入水前必須先抹上 salamander oil。於是你照他要求把油倒在他身上、揉進去——他把每一下刺痛與舒緩都演得誇張得要命，像在辦案一樣嚴肅。你隨後下水搜尋，卻沒有找到任何像劍的東西。就在這時，Nashu 被不知什麼東西濺得滿身是水，而 Hildibrand 又立刻宣稱：你的直覺再次把你帶到了「獵物」附近。</p>
<p>Nashu 說要回 Ul’dah 幫 Hildibrand 找一套新衣服，順便買些生髮藥給 Eleazar。很快，Eleazar 真的握住一把劍，說每一道缺口與刮痕都和記憶裡一樣；Ellie 也坦言，她沒想到有人會為兩個陌生人做到這種地步。Hildibrand 自豪地說，紳士懂得看見每個人心裡仍存的善——而後你注意到他額頭上卡著一張字條：署名缺失，只寫著「我將來取走收藏家的劍」。Ellie 立刻指出那是決鬥者的恐嚇與挑釁，Hildibrand 卻像終於等到舞台般興奮，宣告接受挑戰並換上更「適合決鬥」的裝束。就在你們準備動身之際，一名黑衣人低聲喚出他的名字，另一道不明的聲音冷冷評價那把劍，還把視線投向藍得刺眼的天空與滾燙的沙海——而 Hildibrand 則不容置疑地堅持：這場對決，他要堂堂正正地打到底。</p>
</div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');

  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
