    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>With Ramuh’s matter settled for the moment, Minfilia asks you to stay—there is something she wants to show you. She produces a letter of thanks signed by the leaders of the Eorzean Alliance, acknowledging the Scions’ tireless service to the realm. It lists the defeated primals by name—Ifrit, Titan, Garuda, Good King Moggle Mog XII, Leviathan, and now Ramuh—and she makes the point quietly but unmistakably: only one among you has faced them all, and though the letter is addressed to the order, she believes its gratitude is meant for you most of all.</p><p>She thanks you herself, just as directly. No matter how sudden the call to arms, you have never failed to answer. Your presence makes Eorzea safer, she says—carefully choosing that word, because “safer” is not “safe.” The Ascians will continue to sow chaos until they are forced to stop, and even without them, humankind is more than capable of breeding strife. Add the beast tribes to the equation, and the primals will return again and again unless all learn to live in harmony.</p><p>And yet, she tells you, what you have done still matters beyond battle: your deeds give people hope for a better tomorrow, and there is no greater gift. Because you have faced danger on their behalf—and because you have won others to the cause—the impossible begins to feel worth striving for. When she speaks of allies, she does not speak of numbers, but of faces: those among the beast tribes who seek no conflict and now call you friend; Alisaie, digging into the Calamity’s terrible secrets; Ala Mhigans and Domans standing beside you to halt the Empire’s march; and Cid with the fellowship of NOAH, racing to unlock the mysteries of ancient Allag so you may be spared another Ultima Weapon. And above all, she says, never forget the closest allies of all—your fellow Scions—whose varied talents make the order uniquely suited to resist Ascian corruption.</p><p>Before the warmth can fade, Alphinaud’s voice cuts in with dry timing. He reports that the troubles in Ul’dah have largely cooled—there are still rumblings, but the air of simmering violence has mostly dissipated—and he has come both to report and to speak again of the new organization you discussed. Then he adds one more message, quieter than the rest: Ele’s missing parents were found unharmed, and she asked him to pass on her thanks to you. Minfilia cannot help but tease him for remembering the girl’s name—and implies she expects his report to omit nothing.</p><p>At last, she turns her attention back to you. You have been away from Revenant’s Toll for a time, she says, and she suggests you set the realm’s burdens aside for a moment and reacquaint yourself with the town. One of the Doman children has been asking after you—Yozan—and she asks you to find time to speak with him. Alphinaud adds that he visited the refugees after Ul’dah; a fundamental solution remains distant, but he believes there will be no armed uprising in the near future.</p><p>When you seek Yozan out, the children spot you at once and rush you with bright voices and unguarded awe. They heard you were off fighting “primals,” the strongest foes imaginable, and they wish they could have seen you in battle. So they formed their own Doman Adventurers’ Guild to protect the Domans, and they ask you—earnestly, urgently—to train them and show them how you fought.</p><p>Hoary Boulder and Coultenet arrive to the commotion and properly introduce themselves as newly joined Scions, explaining they have taken it upon themselves to teach the Doman younglings the arts of combat. The children bristle at “younglings,” insisting they are adventurers now, ready to hunt monsters at your side. Hoary Boulder refuses to endanger them—and offers a counter-proposal instead: a sparring match with you, a lesson in arms made visible. Coultenet sees through him at once, accusing him—fondly—of wanting to test himself against a legend, even as he agrees to step in with spells if the bout ends too swiftly.</p><p>The match draws a crowd as word spreads, and even Thancred appears, joking that your popularity makes his own look pale and insisting your burgeoning reputation is at stake. You fight, and then fight harder—until Hoary Boulder yields, breathless but grateful, and Coultenet admits defeat as well. Faces all around you shine with relief and exhilaration, calling you “guardian of Eorzea.” Alphinaud watches those smiles, then speaks more plainly than usual: when you first met at the memorial for the Battle of Carteneau, he doubted this land and its people, and wondered why his grandfather would give his life for it. It was you who convinced him Eorzea could be saved—not the land alone, but the people who endure blow after blow and still drag themselves to their feet. That belief has become his own, and he asks you to help him build what comes next: a new organization, broader than nations and borders, able to confront the primal threat at its root and counter the Ascians’ schemes—together, back within the walls of the Rising Stones.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>ラムウの件がひとまず収まった今、ミンフィリアはあなたに「見せたいものがある」と告げる。彼女が差し出したのは、エオルゼア同盟の盟主たちの署名が並ぶ感謝状――暁の血盟が国土のために尽くしてきた働きを讃える手紙だった。そこには討ち果たされた蛮神の名が列挙されている。イフリート、タイタン、ガルーダ、善王モグル・モグ十二世、リヴァイアサン、そして今はラムウ。彼女は静かに言う――それらすべてと相対した者は、暁の中でもあなたひとりだ、と。手紙は組織宛てでも、その感謝はとりわけあなたに向けられたものだと感じるのだ、と。</p><p>彼女は個人としても、心から礼を述べる。あなたは一度たりとも彼女の呼びかけに背を向けなかった。あなたがいることでエオルゼアは「より安全」になった――だが「安全」とは言わない、と彼女は釘を刺す。油断はできない。アシエンは止められるその時まで、この世界に混乱を蒔き続ける。しかも彼らの扇動がなくとも、人は争いを生み出す。蛮族の問題も重なれば、蛮神は何度でも蘇り、災いを繰り返すだろう――もし調和して生きる術を学べないのなら。</p><p>それでも、とミンフィリアは続ける。あなたの行いは人々を鼓舞し、より良い明日への希望を与える。これ以上の贈り物はない。あなたが危険を引き受け、そして多くの者を味方につけてきたからこそ、不可能に見える平和に手を伸ばす勇気が生まれた。彼女は「敵が多い」ことよりも「味方が増えた」ことを思い起こさせる。争いを望まぬ蛮族で、今はあなたを友と呼ぶ者たち。災厄の恐るべき真相を掘り起こそうとするアリゼー。帝国の進軍を食い止めようと並び立つアラミゴ人とドマ人。そしてシドと、古代アラグの謎を解き明かして次なるアルテマウェポンの恐怖を避けようと奔走するノアの仲間たち。だが最大の味方を語るなら、最も近くにいる仲間――暁の血盟そのものを忘れてはならない、と。多彩な才覚が揃うからこそ、アシエンの広範な腐敗に対抗できるのだ、と彼女は言い切る。</p><p>その熱の中へ、アルフィノの声が皮肉めいて割って入る。ウルダハの騒動はなお燻ってはいるが、煮え立つ暴力の気配は概ね霧散した――彼はその報告のために来たのだと言う。さらに、かねて話していた新組織の件でも話がある、と。そしてもうひとつ、彼は咳払いして付け加える。難民の少女エレの行方不明だった両親は無事に見つかった。彼女はあなたへの礼を伝えてほしいと望んだのだ、と。ミンフィリアは彼が少女の名を覚えていたことを面白がり、報告書に「何も書き落とさないように」と笑い交じりに念を押す。</p><p>ミンフィリアはあなたに休息を勧める。しばらくリヴナントツォルに戻っていなかっただろう、と。国のことはひとまず脇に置き、町に顔を出してきてほしい。ちょうどドマの子どもがあなたの帰りを気にしていた――ヨザンという名で、あなたに話したいことがあるらしい。アルフィノも、ウルダハで別れた後に難民を訪ねたと告げる。根本的な解決は遠いが、少なくとも近いうちに武装蜂起が起こることはないだろう、と。</p><p>あなたがヨザンを訪ねると、子どもたちは一斉に駆け寄ってくる。あなたが蛮神と戦っていたこと、その相手が想像を絶する強敵だということを聞いていた。だからこそ彼らは「自分たちも英雄になりたい」と、ドマ冒険者ギルドを作ったのだと言い、あなたに訓練を頼む。蛮神と戦った時のように、どう戦えばいいのか見せてほしい、と。</p><p>そこへホアリーボルダーとクルテネが現れ、騒ぎの理由を聞いてから名乗りを上げる。彼らは最近暁の正式な一員となり、ドマの子どもたちに戦いを教えているのだと言う。子どもたちは「子ども扱い」を嫌い、自分たちはもう冒険者だと強がる。だがホアリーボルダーは危険を許さず、代わりにあなたとの模擬戦を提案する――技を見せるための一戦として。クルテネは彼の本心を見抜き、伝説に挑みたいだけではないかとからかいながらも、勝負が早く終わりそうなら自分の術で加勢すると約束する。</p><p>噂は広まり、応援の人々まで集まってくる。サンクレッドは冗談めかして、あなたの人気が自分のそれを霞ませると言い、評判がかかっているのだから勝てと煽る。あなたは模擬戦に応じ、力を示し、やがてホアリーボルダーは息を切らして降参し、クルテネも敗北を認める。周囲はあなたを「エオルゼアの守護者」と呼び、アルフィノはその言葉を噛みしめるように繰り返す。そして彼は率直に語り始める。カルテノーの戦いの追悼式で初めて会った頃、彼はエオルゼアの人々を理解できず、祖父がなぜ身を捧げたのかも掴めなかった。だがあなたが示した数え切れぬ勇気が、救いは可能だと彼に信じさせた――守るべきは土地でも歴史でも国家でもなく、何度打たれても立ち上がる人々なのだ、と。だからこそ彼は提案する。蛮神の脅威の根を断ち、アシエンの策謀に対抗するため、国境や国家の枠を超えた新たな組織を作りたい。あなたにも力を貸してほしい――その話を、ライジングストーンズで続けよう、と。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ミンフィリア <small class="muted">（石の家, X:6.1, Y:5.2）</small></div></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>Ramuh 的事情暫時告一段落後，Minfilia 把你留了下來，說有樣東西想讓你看看。她拿出一封感謝信，上頭有 Eorzean Alliance 各城邦領袖的簽名，明確肯定 Scions 為了這片土地長期付出的努力。信裡特別列出你們擊敗過的 primal：Ifrit、Titan、Garuda、Good King Moggle Mog XII、Leviathan，以及如今的 Ramuh。Minfilia 不用多說，你也聽得出她的意思——在 Scions 當中，只有你真的一路面對過這一切；即使信件是寫給整個組織，她仍覺得那份感激最終是指向你。</p><p>她也以自己的名義向你道謝。每一次她號召你出動，你從未缺席。她說你的存在讓 Eorzea 變得「更安全」——但她刻意補上一句：是更安全，不是安全。你們不能放鬆戒備，Ascians 只要還沒有被迫停手，就一定會在這個世界繼續播撒混亂。更何況，就算沒有他們煽動，人類也足以自己點燃紛爭；再加上蛮族之間的裂痕，只要你們學不會共存，primal 也必定會一次又一次回來，讓災禍反覆降臨。</p><p>然而即便如此，她仍告訴你，你所做的一切並不只是一場又一場戰鬥。你的行動會鼓舞人們，讓他們相信明天能更好，而那份希望是最珍貴的禮物。你替眾人扛下危險，也在過程中爭取到更多人站到你們這一邊，所以原本看似不可能的和平，才值得被努力追求。她要你別只看敵人有多長一串，更要想想你們如今擁有多少盟友——包括那些不願再起衝突、如今願意稱你為朋友的蛮族；也包括 Alisaie，仍在追查 Calamity 背後可怕的真相；還有決心阻止帝國步步進逼的 Ala Mhigans 與 Domans。至於 Cid 與 NOAH （Nominated Observers of Artifacts Historical，在 Crystal Tower 劇情線中，指一支專門負責探索水晶塔、調查古代 Allag（古代亞拉戈帝國）遺物與祕密的「探勘小隊／調查團」。Minfilia 說的「Cid and the fellowship of NOAH」就是在指 Cid 與這支探勘團隊正加緊解開古代 Allag（古代亞拉戈帝國）的謎團，以避免再次出現像 Ultima Weapon 那樣的災厄）的夥伴們，則正為了解開 ancient Allag 的謎團而奔走，只盼能讓世人免於再次面對 Ultima Weapon 的恐怖。最後，她更提醒你：最不能遺忘的盟友，其實就在你身邊——你們的同伴、Scions 本身。正因為每個人各擅勝場，Scions 才能對抗 Ascians 影響廣泛的腐化，而你們也一定會繼續對抗下去。</p><p>就在 Minfilia 的熱情還未落下，Alphinaud 以帶著一點戲謔的口吻插話。他回報 Ul’dah 的麻煩雖然仍有些不滿在發酵，但那種「隨時會爆」的暴力氣氛大多已經散了；他這次前來，除了回報，也想和你們再談談先前討論過的「新組織」。接著他又壓低語氣補上一句：Ele——那位難民女孩——失蹤的父母已經平安被找到，她請他轉達對你的感謝。Minfilia 聽到他竟然記得女孩的名字，忍不住取笑他，還笑著說期待在他的報告裡看到完整記錄，什麼都別漏。</p><p>Minfilia 隨後把話題拉回你身上。她說你離開 Revenant’s Toll 也有一段時間了，建議你先把國事放一放，趁這個空檔重新熟悉一下這座城鎮。她也想起一件事：有個 Doman 的孩子一直在問你去哪裡了——名叫 Yozan——似乎有點小事想和你分享，希望你能抽空去見他。Alphinaud 也補充，他和你在 Ul’dah 分開後去探望過難民；雖然根本的解法仍很遙遠，但至少他判斷短期內不會再爆發武裝起事。</p><p>你去找 Yozan 時，孩子們立刻認出你，興奮得像要把你整個包圍起來。他們說聽說你去和 primal 作戰——那是世上最強的敵人之一——他們真希望能親眼看見你戰鬥。於是他們決定也要成為英雄，乾脆自己成立了「Doman Adventurers’ Guild」，要保護所有 Domans。Yozan 急切地拜託你今天就訓練他們，最好能示範你是怎麼對抗 primal 的。</p><p>吵鬧聲引來 Hoary Boulder 和 Coultenet。他們向你正式自我介紹，說自己最近才成為 Scions 的正式成員，也主動承擔起指導 Doman 孩子練習戰鬥的工作。孩子們不服被叫做「小孩」，嚷著他們早就是冒險者了，甚至覺得自己已經能跟著你一起去狩獵。Hoary Boulder 當場否決，說 Mor Dhona 的怪物對他們而言仍太危險，但他提出替代方案：由他和你進行一場對練，作為武技示範，讓孩子們從真正的交手中學。Coultenet 一語道破他的心思，半揶揄半認真地說他像是想測試自己能不能和傳說較量；但他也答應，如果勝負看起來會結束得太快，他會用魔法加入，確保「教學」能持續。</p><p>消息很快傳開，連圍觀的人都被拉來助陣。Yda 把人群越聚越多，Thancred 也來了，笑說只要一提到你的名字，大家反應就熱烈得驚人，甚至讓他的「人氣」相形失色；他還故意煽動你別輸，因為你的名聲正在快速攀升。你接受對練，當眾交鋒，Hoary Boulder 咬牙硬撐到最後仍不得不認輸，Coultenet 也坦然承認落敗。眾人的稱呼順勢落在你身上——「Eorzea 的守護者」。Alphinaud 看著這些笑容與安心，忽然語氣變得格外坦白：你們初見是在 Battle of Carteneau 的追悼儀式上，那時他仍試著理解 Eorzea，也不明白祖父為何願意為守護它而犧牲。他甚至曾對這片土地與人們印象極差，覺得問題重重、努力卻散亂而敷衍，覺得 Eorzeans 幼稚又愚蠢——直到你用一次又一次的勇氣讓他相信，Eorzea 並非無可救藥。你讓他明白祖父想守護的不是土地、不是歷史、也不是某一個國家，而是那些再怎麼被擊倒都會爬起來、繼續活下去的人們。正因如此，他也想承擔起「守護者」的責任，並提出下一步：要真正切斷 primal 的根源、有效反制 Ascians 的陰謀，光靠 Scions 還不夠，必須建立一個跨越國境與城邦限制的新組織。他希望你能協助他把這個構想變成現實，並請你回到 Rising Stones，再把這場討論延續下去。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 敏菲利亞 <small class="muted"> 石之家 (X:6.1, Y:5.2)</small></div></div>`,

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
