const i18n = {
  EN:{

    pageTitle:`The Neoteric Witch`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Yaana is still shaken by Eutrope’s sudden return, and by the sight of what her sister has become. Even so, she forces herself to focus on what lies ahead. Your next match has already been decided, and there is no choice now but to prepare for it. She warns you that Eutrope, once a heavyweight fighter, stands far above every opponent you have faced so far. Yet after watching how quickly you rose through the ranks to become champion, she believes you are far from helpless. Eutrope—Wicked Thunder in the ring—wields the soul of a levinsteed together with electrope, and her arena is a recreation of an imaginary city built to let her unleash her full power. The danger of her bouts is so well known that there is not even seating for spectators. Still, Yaana reminds you that though Eutrope is her sister, she is your second now, and she tells you to go out there and win.</p><p>You do exactly that. When you return alive from the battle, Yaana is visibly relieved before anything else. Your victory itself astonishes her, but the simple fact that you came back safely seems to matter just as much. She says that triumphing over someone like Eutrope proves you may even have what it takes to survive in the upper divisions. She had hoped to speak with her sister after the match, but Eutrope has vanished once again. With nothing more to be done there, Yaana leads you back to the gym, wondering what Neyuni must have thought as she watched the whole ordeal unfold from home.</p><p>At Tritails Training, the answers come sooner than expected. Neyuni greets you with relief, still in shock over Eutrope’s return and the way she appeared before you. Then Eutrope herself arrives. She says she has not come to fight, only to speak to her sisters. Yaana immediately demands to know why she disappeared without a word and what she has been doing all this time. Eutrope answers that she will explain everything, but first she tells Yaana something far more urgent: if Yaana wants to live, she must stop fighting at once. Repeatedly transfiguring the flesh with a feral soul, Eutrope says, eventually leads to psychonekrosis—an irreversible sickness in which one’s own soul decays. Once it begins, nothing remains but to await death. She says this is what is happening to her now.</p><p>Yaana struggles to accept it. She had always known there were risks, but believed that this was why fighters were immortalized—so they could retire before it was too late. Eutrope asks her a simple question: has she ever actually met one of the immortalized? The comfortable life promised to retired fighters, she says, is only a lie used to exploit them and conceal their deaths. Rather than being taken to new homes, they are brought to a hidden facility, stripped of their regulators, and confined there until they die. Without regulators fitted, Everkeep’s systems cannot detect their deaths or preserve their memories. Eutrope explains that when she began to notice changes in her own body, she tried to seek out the immortalized. Sneaking into the president’s office to learn where they had gone, she uncovered the truth. Fearing she would become another victim if she stayed, she disappeared and began searching for a cure.</p><p>Neyuni asks in a trembling voice whether she found one. Eutrope says that in theory there is a remedy, but it requires another person’s soul—and not an ordinary soul, but one of exceptional density. She tells you that your soul is the kind she needs. She claims she bears you no ill will, but says you are her only hope of survival. Rather than attack you in the city and cause panic, she challenged you in the ring, certain she would take what she needed there. She had counted on the president allowing such a thrilling match, but admits that she had already grown weaker than she realized. That, she says, is the only reason the two of you are still speaking now. She vows that next time, she will have your soul. Yaana protests at once, telling her that even if she is trying to save herself, she cannot simply take another person’s soul. Eutrope explodes in anger, saying it is easy for Yaana to speak that way when she does not live every moment knowing her own soul is being eaten away.</p><p>Metem, who has arrived outside and overheard everything, steps in and admits his horror. Had he known any of this, he says, he could never have commentated so cheerfully. Yaana’s first instinct is to expose the truth and stop the fights before anyone else suffers, but Metem warns that making the president’s secret public would only bring ruin down on all of them. The president is ruthless, he says, and none of them—not Yaana, not Metem, not the fighters—would be safe. Then he proposes what he believes is the only path left: you must climb to the very summit of the Arcadion and become grand champion. The grand champion, he explains, is granted access to every soul in the repository. If you were to release them all, then no feral souls would remain for fighters to use, and no one would have to face this fate again. You agree to help.</p><p>Metem departs before his absence draws suspicion, while Yaana promises that though she can no longer fight, she will continue to support you. Together with Neyuni, she will search for another cure for psychonekrosis—one that can save Eutrope without sacrificing you or anyone else. Later, when the two of you speak alone, Yaana admits that she is terrified despite the brave face she showed her sister. This has become far more than a competition, but she says you must still press on into the cruiserweight division for the sake of your goal. Before long, a storyteller named Gabbro approaches, introducing himself as a cartoonist whose works are inspired by Arcadion battles. He says he wants to chronicle your rise, and Yaana notes that his interest is proof of how famous you have already become. Even so, when the excitement settles, Neyuni quietly returns to the same resolve as Yaana: they will search for another cure. She adds one final thought about Eutrope—that even her name was a choice. Unlike theirs, it is not the name their parents gave her, but one she adopted for herself, an Alexandrian name that reflects convictions that were never limited to the ring.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    langLabel:'JP',
    pageTitle:'次世代魔女',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ヤーナは、突如として現れたユートロープの姿と、その変わり果てた様子に強い衝撃を受けながらも、いまは目の前の試合に備えるしかないと気持ちを立て直す。次に戦う相手は、かつてヘビー級で戦っていたユートロープその人であり、これまであなたが相対してきた誰よりも格上の存在だと彼女は告げる。それでも、あなたがあまりにも速く頂点まで駆け上がった姿を見てきたからこそ、到底太刀打ちできない相手だとは思わないとも言う。リングの上でウィケッドサンダーと呼ばれる彼女は、雷馬の魂とエレクトロープを用いて戦い、その舞台となるのは、力を最大限に振るえるよう設計された架空都市の再現だという。その危険性ゆえに観客席すら設けられていないが、それでもヤーナは、姉であっても今はあなたのセコンドとして支える立場なのだと自らに言い聞かせ、必ず勝ってきてほしいとあなたを送り出す。</p><p>そして、あなたはその戦いを生き抜き、勝利して戻ってくる。ヤーナは何よりまず、あなたが無事だったことに安堵する。そして実際にユートロープを打ち破ったという事実に驚きながら、それほどの相手に勝てたのなら、あなたは上位階級でも通用する力を持っているのかもしれないと口にする。本当は試合のあとでユートロープと話をしたかったが、彼女はまた姿を消してしまった。これ以上あの場にいても仕方がないと判断し、ヤーナはあなたを連れてジムへ戻る。家で試合を見ていたはずのネユニが、いったいあの一部始終をどう受け止めたのかを気にかけながら。</p><p>トライテールズ・トレーニングへ戻ると、ネユニはあなたが無事であることに胸をなで下ろしつつも、あのような形で再びユートロープを目にした衝撃を隠せずにいる。そこへ、当のユートロープが現れる。彼女は戦うためではなく、妹たちに話をしに来たのだと言う。ヤーナはすぐさま、なぜ何も告げずに姿を消したのか、そしてこれまで何をしていたのかを問いただす。ユートロープは、いずれすべて話すと前置きしながら、それより先に、ヤーナが生きたいのなら今すぐ戦うのをやめなければならないと告げる。獣魂で何度も肉体を変成し続ければ、やがて精神壊死症に至るのだという。それは自らの魂が崩壊していく、不可逆の病だ。一度始まればもう遅く、残されるのは死を待つことだけ――自分がまさにそうなのだと、ユートロープは静かに語る。</p><p>ヤーナは、その言葉をすぐには受け入れられない。危険があることは知っていたが、それでも闘士たちが「不朽」とされるのは、手遅れになる前に表舞台を去るためなのだと信じていたからだ。だがユートロープは、ヤーナに問い返す。これまで一度でも、その「不朽」とされた者たちに会ったことがあるのかと。引退後の安楽な暮らしという約束は、闘士たちを搾取し、その死を覆い隠すために織られた虚構にすぎないのだという。闘士たちは新しい住まいへ移されるのではなく、秘密施設へ連れて行かれ、レギュレーターを外されたまま閉じ込められ、そこで死を迎える。レギュレーターがなければ、エバーキープの仕組みは彼らの死を検知することも、その記憶を保存することもできない。ユートロープは、自分の体に異変を覚えたとき、「不朽」の者たちを探そうとしたのだと明かす。そして社長室に忍び込み、その行方を突き止めようとした結果、あまりにも醜い真実を知ってしまった。ここに残れば自分もまた犠牲になると悟り、彼女は姿を消して治療法を探し始めたのだった。</p><p>ネユニが震える声で、治療法は見つかったのかと尋ねる。ユートロープは、理屈の上では救う手段はあるのだと答える。だがそれには他者の魂が必要であり、しかもありふれた魂では足りない。はるかに濃密な魂でなければならず、それに当てはまるのがあなたの魂なのだと言う。あなたに恨みはないが、自分が生き延びるための唯一の望みなのだと。街で襲って混乱を招くより、リングで挑めばよいと考え、あの試合を仕掛けたのもそのためだった。社長なら見世物として面白い一戦を見逃すはずがないとも読んでいた。だが、自分が思っていた以上に衰えていたのだと彼女は認める。だからこそ、今こうして言葉を交わせているのだと。そして次こそは、あなたの魂を手に入れると宣言する。ヤーナはすぐに、それが自分を救うためだとしても、他人の魂を奪ってよいはずがないと訴える。するとユートロープは激しく感情を爆発させ、魂が瞬間ごとに蝕まれていく恐怖を抱えて生きていない者に何がわかるのかと叫ぶ。</p><p>そこへ、外で話を聞いていたメテムが姿を現し、自分もまたこの真相を初めて知ったのだと、苦い表情で語る。もし知っていたなら、あれほど無邪気に実況などできるはずがなかったという。ヤーナは、ならば真実を公表して試合そのものを止めるしかないと考える。これ以上、誰にも苦しんでほしくないからだ。だがメテムは、それこそ最悪の手だと止める。社長は邪魔者に容赦をしない人物であり、その秘密を暴けば、あなたもヤーナもメテムも、他の闘士たちも誰ひとり安全ではいられない。だから残された道はひとつしかないのだと彼は言う。あなたがアルカディオンの頂点にまで上りつめ、グランドチャンピオンになることだ。グランドチャンピオンには保管庫内のすべての魂へアクセスする権限が与えられる。それを用いて獣魂をすべて解放してしまえば、闘士たちは二度とそれに頼れなくなり、同じ悲劇も断てるはずだという。あなたが引き受けると、メテムは長居すれば疑われるとしてその場を去る。ヤーナは、自分はしばらく試合に出られないし、いま知った真実を思えばそれでよかったのかもしれないと話しながらも、これからもあなたを支え続けると誓う。そしてネユニとともに、あなたや誰かを犠牲にせずユートロープを救える別の治療法を探すと決意する。</p><p>のちにふたりきりになると、ヤーナはネユニの前では気丈に振る舞ったものの、本当は恐ろしくてたまらないのだと打ち明ける。それでも、この戦いはもはや単なる競技ではないのだから、目的のためにクルーザー級への挑戦を続けなければならない。そこへガブロという絵物語作家が現れ、アルカディオンの戦いを題材に作品を描いてきた自分としては、あなたという「無敗の新鋭」の歩みをぜひ物語にしたいのだと名乗り出る。ヤーナは、そんな彼が興味を示すこと自体、あなたがいかに人気を集めているかの証だと語る。やがて場が落ち着くと、ネユニはあらためて、ヤーナとともに精神壊死症の別の治療法を探し続けるとあなたに告げる。そして最後に、ユートロープの名が自分たちと違っていることには理由があるのだと話す。それは両親から与えられた名ではなく、彼女が自らアレクサンドリア風の名へ改めたものであり、その進歩的な思想はリング上の人格だけにとどまらず、彼女そのものの在り方だったのだと。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>Yaana 仍被 Eutrope 的突然現身，以及她如今那副模樣震得心神不定，可她還是強迫自己把注意力拉回眼前。既然比賽已經決定，就只能先為接下來的戰鬥做準備。她提醒你，Eutrope 過去是 heavyweight 的格鬥士，實力遠遠凌駕於你至今面對過的任何對手之上；但即使如此，看到你一路以驚人的速度爬上冠軍之位後，她仍覺得你絕不是毫無勝算。正如 Neyuni 先前說過的那樣，Eutrope——或者該說是 Wicked Thunder——會同時運用 levinsteed 的 soul 與 electrope（Alexandria 的特殊變質素材，可依意念改變形態與性質）作戰，而她的擂台則是一座為了讓她徹底發揮力量而打造出的虛構城市。她的比賽危險到甚至沒有觀眾席可設，但 Yaana 還是壓下自己身為妹妹的動搖，明白告訴你，現在她是你的 second（協助格鬥士蒐集對手情報、提供訓練建議與場邊支援的人），所以她要你走上場，然後贏下這一戰。</p><p>你也真的辦到了。當你平安從那場惡戰中回來時，Yaana 第一時間流露出的不是興奮，而是如釋重負。你竟然真的戰勝了 Eutrope，這件事本身已足夠令人震驚，而你能毫髮無傷地站在這裡，對她而言似乎同樣重要。她忍不住說，如果你連這樣的對手都能贏下來，那麼就算往更高的分級繼續前進，你大概也有立足的本事。她本來還想和 Eutrope 說上幾句，但對方又一次消失得無影無蹤。既然暫時沒有別的辦法，她只好先帶你回 Tritails Training，也一路掛念著在家看完整場比賽的 Neyuni，究竟是以什麼樣的心情看待這一切。</p><p>等你們回到 Tritails Training，Neyuni 果然既慶幸你平安無事，又無法從 Eutrope 以那種姿態再次出現在你們面前的震撼中回過神來。可還沒等情緒平復，Eutrope 本人就出現在訓練館裡。她表示自己這次不是來和你戰鬥，而是來和兩個妹妹說話。Yaana 立刻追問她，當初為什麼一句話都沒留下就消失，又到底在外面做了些什麼。Eutrope 回答說，她之後會把一切都說清楚，但在那之前，她先丟出了一句讓 Yaana 幾乎無法呼吸的警告——如果還想活下去，Yaana 就必須立刻放棄戰鬥。因為只要反覆用 feral soul（用於戰鬥變身的獸魂）讓肉體變形，最終就會罹患 psychonekrosis（自身 soul 逐步崩壞、無法逆轉的疾病）。一旦開始，就再也沒有回頭路，只能等待死亡降臨。她低聲補上一句，而她自己，如今正是如此。</p><p>這番話讓 Yaana 幾乎無法接受。她不是不知道格鬥士的戰鬥伴隨風險，但她一直相信，所謂被列入不朽殿堂，正是為了讓那些人能在來不及之前退下來。可 Eutrope 只反問她一句：你真的見過任何一位「名留不朽殿堂」的人嗎？她告訴你們，那些承諾中的安穩退役生活，其實只是為了榨取格鬥士、並掩蓋他們死亡真相而編織出的謊言。所謂退役之後搬進新住處，根本不存在；那些格鬥士實際上會被送進一處秘密設施，在那裡被拔除 regulator（可保存與調用 soul、用於重傷或死亡時復生的裝置），然後遭到囚禁，直到死去。沒有裝上 regulator，Everkeep 的系統就無法偵測他們的死亡，也無法保存他們的記憶。Eutrope 說，當她察覺自己的身體開始出現異常時，就試著去尋找那些所謂已「退役安享餘生」的人。她潛入總裁辦公室，想查出他們的去向，也正是在那時看見了這個骯髒的真相。她明白，如果自己繼續留在那裡，最終也只會變成另一個受害者，所以她才選擇消失，並開始尋找這種病的治療方法。</p><p>Neyuni 顫抖著問她，那她最後究竟有沒有找到方法。Eutrope 說，理論上是有的，但那個方法需要另一個人的 soul，而且還不能是普通的 soul，必須是密度遠遠超出常人的那種。她直視著你，說你的 soul 正是她唯一能用的希望。她沒有說自己恨你，反而坦白表示，她對你並無惡意，只是為了活下去，她別無選擇。與其在城裡伏擊你，製造騷動，還不如把你引進擂台，在眾目睽睽之下奪走她需要的東西。她也早就料到，那位總裁絕對不會放過這種足夠刺激的比賽。只是她沒想到，自己的身體早已比她以為的還要虛弱，所以你們現在才會還有機會站在這裡交談。她最後直截了當地撂下話，說下一次，她一定會奪走你的 soul。Yaana 立刻出聲阻止，告訴她，就算是為了救自己，也不能去奪走別人的 soul。這句話瞬間點燃了 Eutrope 壓抑已久的情緒。她怒吼著反駁，說這種話說來容易，因為 Yaana 根本沒有活在「每一分每一秒都知道自己的 soul 正被吞噬」的恐懼裡。</p><p>就在氣氛幾乎要徹底失控時，Metem 現身了。他原本只是想來看看你們在 Eutrope 突然現身之後的情況，卻不慎把最不該聽見的真相全都聽了進去。他神色沉重地表示，若自己早就知道這一切，就絕不可能還那樣興高采烈地為比賽解說。Yaana 第一個想到的，是立刻把真相公諸於世，讓所有戰鬥停止，不想再讓任何人受害；可 Metem 卻立刻否定了這個念頭。他提醒你們，那位總裁對擋路的人從不手下留情，如果現在把祕密揭開，無論是你、Yaana、Metem，還是其他格鬥士，都不可能全身而退。也正因如此，他猜 Eutrope 一直保持沉默，恐怕也是明白這一點。於是他提出了自己認為唯一可行的路：你必須一路往上爬，登上 Arcadion 的最頂點，成為 grand champion（Arcadion 最高位的總冠軍）。因為只有總冠軍，才被允許接觸保管庫裡的所有 soul；若你能取得那項權限，再把那些 feral soul 全部釋放出去，格鬥士們就再也無法依賴它們戰鬥，也就不會再被拖進同樣的命運裡。你答應了這件事後，Metem 說自己不能久留，以免惹人起疑，便先行離去。</p><p>Yaana 則告訴你，她暫時無法參加任何比賽，而在得知真相之後，這或許反而是件好事；但她仍會繼續盡自己所能支援你。同時，她和 Neyuni 也會開始搜尋另一種治療 psychonekrosis 的方法——一種不需要犧牲你，也不需要犧牲任何人的方法。後來只剩你和 Yaana 獨處時，她終於卸下強撐的樣子，坦白說自己其實到現在都還無法真正消化這一切。她剛才只是為了不讓 Neyuni 更不安，才勉強裝作鎮定，其實她怕得不得了，也真心慶幸你正和她們站在一起。這件事早已不再只是單純的格鬥競技，但如果想達成你們的目標，接下來還是只能繼續沿著這條路前進，開始你在 cruiserweight 分級的挑戰。就在這時，Gabbro 現身了。</p><p>他先向你正式自我介紹，說自己是一名以圖像說故事的人，作品多半以 Arcadion 的戰鬥為靈感，而他現在最想做的，就是把這位勢不可擋的新秀一路走來的歷程畫成故事。Yaana 在一旁補充，Gabbro 在 Solution Nine 非常受歡迎，而他如今主動想為你創作，本身就足以證明你現在的人氣有多高。等喧鬧稍稍平靜後，Neyuni 也再次向你保證，她會和 Yaana 一起盡快找出這種病的替代療法。最後，她又提起 Eutrope 的名字，說你是否也曾覺得，她的名字和她們姊妹格外不同。那是因為 Eutrope 後來主動捨棄了父母替她取的名字，改成一個 Alexandria 風格的名字；她那種追求改變、走向新道路的想法，從來就不只是擂台上的形象，而是她這個人本身的核心。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
