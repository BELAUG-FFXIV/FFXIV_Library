    story:`<div class="clamp" data-collapsed="true">
<p>Cyr fumes that the investigation has been hijacked—first by others, and now by a zombie acting as a bloodhound. He insists you come with him, while Nashu calls out for the inspector again and again. Even as Godbert marvels at the scenery, Cyr can’t help but ask whether it’s truly safe to travel alongside the undead.</p>
<p>The gentlemanly zombie halts and concentrates. He can feel Master Zombibrand nearby—yet something else is there too, like powerful magick that muddles his senses. He says he can guide you no farther and proposes splitting up to search, but Cyr protests: the wastes are dangerous, and Nashu shouldn’t be left unguarded.</p>
<p>Godbert settles the matter. You and the zombie are to protect Nashu, while Cyr takes the lead elsewhere. Not long after, Nashu spots someone ahead—surely the inspector—yet he’s surrounded by giant, fluffy, man-shaped “gazebos.” The zombie recoils and warns they are no ordinary foes, “gentleman gazebos” fierce enough to tear him apart, begging you to save their beloved overlord.</p>
<p>You drive the creatures back, and Nashu cheers that you gave those “gazebos” what for. The zombie’s dead heart feels almost stirred by the sight of you charging in, and then the truth spills out: Hildibrand has been found—along with a young boy whose life was restored by Father’s ungentle ministrations, at the cost of his memory. The boy, bewildered and frightened, can’t remember who he is or how he got here.</p>
<p>Hildibrand steadies him, declaring that he has lost his own memory more times than he can remember. He swears—Inspector extraordinaire—that he will solve the mystery of this amnesic youth. Nashu eagerly offers explosives as a “solution,” but Hildibrand refuses, warning the boy wouldn’t survive such force. When the boy mutters “Gigi” upon waking, Hildibrand suggests calling him Gigi until his true name is known, to Cyr’s open disbelief.</p>
<p>With that, Hildibrand resolves to return to the city and question anyone who might know the boy. The gentlemanly zombie takes his leave for Thanalan, and Godbert follows, not wishing to keep Julyan waiting. Cyr, still overwhelmed, promises Hildibrand will be treated fairly—but not granted entry to the capital until he is confirmed no heretic.</p>
<p>Later, Cyr tells you Hildibrand was cleared as an “eccentric curiosity,” then promptly vanished with Nashu and the mammet in tow—leaving Cyr certain that, like bad gil, the inspector will turn up again…and trouble will follow.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>キールは、勝手に捜査をかき回されていることに苛立ちを隠せない。ゾンビーを嗅覚役のように扱い、主導権を奪うなど信じがたいと吐き捨て、あなたに「ついてきてください」と声をかける。ナシュ・マカラッカは相変わらず「ヒルディブランド様ー！」と叫び、ゴッドベルトは景色に感嘆するが、キールだけは「本当に安全なのか」と不安を拭えない。</p>
<p>紳士的なゾンビーは立ち止まり、気配を探る。先生――ゾンビィブランドのエーテルは確かに近い。しかし同時に、強力な魔力のようなものが感覚を乱しており、これ以上は導けないと言う。手分けして探すしかないと告げられ、キールはこの地の危険を口にして、ナシュをひとりにすることだけは認められないと訴える。</p>
<p>そこでゴッドベルトが決める。あなたと紳士的なゾンビーがナシュの護衛に回り、キールは別方向を捜索するというのだ。ほどなくナシュが「見てください、白くてモフモフした人たちに囲まれています！」と叫び、紳士的なゾンビーは「獰猛な雪男、イエティだ」と身構える。先生を助けるため、あなたに討伐を懇願する。</p>
<p>あなたがジェントルマン・イエティを退けると、ナシュは大喜びし、紳士的なゾンビーも鮮やかな戦いぶりに心を熱くする。やがて見つかったのは、埋もれるように眠っていたヒルディブランドだった。さらにその場には、命を取り戻したものの記憶を失った幼い人形がいて、自分が誰なのかさえわからず怯えている。</p>
<p>ヒルディブランドは動じず、あなたに見せつけるように自信満々で言う。「記憶喪失は何度も経験してきた」と。彼は探偵大名として、その少年の正体を解き明かすと誓う。ナシュが爆弾を持ち出そうとすると、ヒルディブランドは幼い彼には危険だと止める。目覚めたとき「ギギ」とつぶやいたことから、当面の呼び名を「ギギ」と定め、キールはあまりの適当さに言葉を失う。</p>
<p>ヒルディブランドは、ギギを知る者がいないか都市で聞き込みを始めると決め、ナシュとともに駆け出していく。紳士的なゾンビーはザナラーンの仲間の元へ戻り、ゴッドベルトもジュリアンを待たせられないと帰路につく。取り残されたキールは、ヒルディブランドが異端者でないと確認できるまで皇都への立ち入りは認められないが、公正に扱うとあなたに約束する。</p>
<p>後に彼は、ヒルディブランドが「風変わりな珍妙人物」として疑いを晴らした直後に姿を消したこと、そして彼がまた厄介事を連れて戻ってくるに違いないことを、渋い顔で語る。</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>Cyr 氣得直跳腳，說這起調查被人搶走了主導權，甚至還把殭屍當成追蹤犬來用，簡直荒唐。他要你跟上，重新把局面拉回來。Nashu Mhakaracca 一邊喊著要找 Hildibrand，一邊跑在雪地裡；Godbert 則沉浸在眼前的風景。只有 Cyr 忍不住追問：和這樣的殭屍同行，真的安全嗎？</p>
<p>那位舉止「很紳士」的殭屍停下腳步，努力集中精神。他說 Master Zombibrand 的氣息確實就在附近，可同時還有某種強大的魔力干擾感知，讓他無法再精準帶路。要找到人，只能分頭搜索。Cyr 立刻反對，說這片荒野有猛獸出沒，你或許扛得住，可 Nashu Mhakaracca 不能就這樣被丟下不管。</p>
<p>Godbert 乾脆拍板：你和殭屍負責護著 Nashu Mhakaracca，Cyr 則先去別處帶頭查找。沒走多久，Nashu Mhakaracca 指著前方說那一定是 Hildibrand——可他竟被一群巨大、毛茸茸、像人的「涼亭」包圍著。殭屍嚇得倒抽一口氣，說那不是普通的涼亭，而是「紳士涼亭」這種既兇狠又講究的怪物，還懇求你立刻出手，救回他們敬愛的主宰。</p>
<p>你把那些怪物擊退後，Nashu Mhakaracca 興奮得直誇你出手俐落；殭屍也說光是看你衝進戰鬥，他那早已冰冷的心都像要再次跳動。接著你們終於確認：Hildibrand 平安無事，而他身邊還有個少年——據說是被 Father 以不怎麼「溫柔」的方式救回一命，卻因此失去了記憶。少年茫然又害怕，反覆問自己是誰、怎麼會在這裡。</p>
<p>Hildibrand 立刻安撫他，說自己也曾無數次失憶，這種事他最「有經驗」。他以「探求真相的名偵探」自居，發誓要解開這名失憶少年的謎團。Nashu Mhakaracca 還興沖沖想用爆炸物「幫忙恢復記憶」，卻被 Hildibrand 阻止，說少年身子骨撐不住。因為少年醒來時喃喃念著「Gigi」，Hildibrand 便暫時叫他 Gigi，讓 Cyr 忍不住嘆氣，覺得這命名也太隨便。</p>
<p>Hildibrand 決定立刻回城打聽，看有沒有認識 Gigi 的人，並帶著 Nashu Mhakaracca 一起行動。那位紳士殭屍說自己得回 Thanalan 的同伴那裡；Godbert 也說不能讓 Julyan 久等，便同行離去。Cyr 雖然一臉頭痛，仍向你保證：在確認 Hildibrand 不是異端者之前，他不會被允許進入皇都，但一定會受到公平對待。</p>
<p>後來 Cyr 又告訴你，Hildibrand 已被判定只是個「古怪的奇人」而洗清嫌疑，卻在被神殿騎士團放行後立刻帶著 Nashu Mhakaracca 和那個人偶跑得不見蹤影——而 Cyr 相信，Hildibrand 早晚會像壞錢一樣再次出現，並把麻煩一併帶回來。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
