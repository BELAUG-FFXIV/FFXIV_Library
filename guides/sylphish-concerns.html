    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Sylphish Concerns',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>When you return to Buscarron’s Druthers, Buscarron waves you over with a grave look on his face. While you were away, word reached the tavern: sylphs have been seen moving through the Twelveswood, but not in their own territory. This time, the sighting was near here—far closer to his doorstep than any sylph has ever come. Something, he says, must have driven them to venture this far. More than likely, the missing sylph elder is among them. He pulls out a map, marks the tract of forest where they were spotted, and slides it across the counter to you, asking you to head there at once and see what you can learn.</p>
      <p>You leave the warm, noisy safety of the Druthers behind and follow the winding paths of South Shroud’s Upper Paths. The deeper you walk into the Twelveswood, the quieter it becomes, the rustle of leaves and distant birdsong your only companions. With Buscarron’s mark as your guide, you press on toward the indicated stretch of woodland, eyes and ears attuned to any sign of sylphs—or whatever might have driven them so far from home.</p>
      <p>As you approach the area, a prickle of unease crawls up your spine. You sense a hostile presence lurking ahead, the air growing taut with tension. A moment later, armored shapes emerge where no sylph should be: Garlean soldiers, far from the open roads and deep within the shadowed boughs of the forest. Steel and gunmetal glint between the trees as they move to attack, forcing you to stand your ground and defend yourself. When the clash subsides and the Imperials lie defeated or scattered, the woods fall silent again, but the image of Garleans in the heart of the Twelveswood refuses to leave your mind.</p>
      <p>Back at Buscarron’s Druthers, he greets you with a question, eager to hear what you found in the wood. The moment you mention Garleans, he breaks off mid-sentence, staring at you in disbelief. Garleans—in this part of the Twelveswood? First sylphs, now Imperials, and both in the very same place… It cannot be mere coincidence. He mutters to himself as he thinks it through, wondering aloud if the Garleans might be following the sylphs, tracking them or giving chase for some purpose of their own.</p>
      <p>Yet the more he considers it, the less sense it makes. The Wailers’ watch-spires ring the forest, and patrols are everywhere; there is no way a column of Imperials could simply slip past them all. For the Garleans to reach that spot unnoticed, someone must have shown them the way—someone who knew exactly where the spires stand and when the Wailers keep watch. Slowly, Buscarron gives voice to the conclusion neither of you wish to hear: somewhere in Gridania, there must be a traitor.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Buscarron <small class="muted">South Shroud (X:18.1, Y:19.8)</small></div>
    </div>`,
    unlockq:`<div class="stack">

    followq:`<div class="stack">

  },
  JP:{
    langLabel:'日本語',
    pageTitle:'木立を縫う者',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>「バスカロンズ・ドランカー」に戻ると、バスカロンは険しい表情であなたを手招きする。あなたが留守のあいだに、森でシルフ族が目撃されたという知らせが入ったのだという。だが、その位置は彼らの棲み処ではない。今回は、ここにほど近い場所──これまで一度たりともシルフ族が現れたことのない一帯だった。いったい何が彼らを、そこまで遠くへと駆り立てたのか。行方不明になっているシルフ族の長老も、その中にいるのかもしれない。そう呟きながら、バスカロンは地図を取り出し、目撃されたという森の区画に印をつけてあなたへ押しやる。どうか現地へ赴き、自分の目で確かめてきてほしい、と強く頼み込むのだった。</p>
      <p>あなたは、酒場の温かな喧騒を後にし、サウス・シュラウド上層の道を辿って、黒衣森の奥へと歩みを進める。木々が生い茂るほど、周囲は静まり返り、耳に届くのは風に揺れる葉擦れと、遠くの鳥の声ばかりだ。頼りになるのは、バスカロンが記した地図の印だけ。シルフ族であれ、彼らをここまで追いやった何者かであれ、その痕跡を見逃さぬよう、あなたは細心の注意を払いながら、示された一帯へと近づいていく。</p>
      <p>やがて、その場所に差し掛かったとき、背筋をなぞるような違和感があなたを襲う。どこかに敵意が潜んでいる──そんな気配が、肌でわかるのだ。次の瞬間、そこにいるはずのない姿が木々の間から現れる。現れたのはシルフ族ではなく、重装備に身を包んだガレマール帝国兵たちだった。森の闇に紛れ、武器と銃器を構えた彼らが、一斉にあなたへと向かってくる。あなたは応戦を余儀なくされ、短くとも激しい戦いの末、なんとかその場を制する。森は再び静けさを取り戻すが、黒衣森の奥深くにまでガレマール帝国軍が入り込んでいたという事実が、頭から離れない。</p>
      <p>酒場へ戻ると、バスカロンはすぐさまあなたに声をかけ、森で何を見たのかと問いかける。あなたがガレアンたちの存在を告げるや否や、彼は言葉半ばで絶句し、「この黒衣森の一角に、ガレマール帝国軍だと……？」と驚愕をあらわにする。シルフ族の目撃情報に続いて、同じ場所で今度は帝国兵──これは偶然ではありえない。ガレマール帝国軍はシルフ族を追っているのか、追跡しているのか、それとも何か別の目的があるのか……バスカロンは眉間に皺を寄せ、ぶつぶつと考えを巡らせる。</p>
      <p>しかし、考えれば考えるほど、単純な話ではないことも見えてくる。黒衣森のあちこちにはウッドワイラーたちの監視塔が建ち、常に見張りの目が光っている。そんな中を、帝国兵の一団が気づかれずに抜けるなど、本来なら不可能なはずだ。では、どうやって……。バスカロンは、ある可能性に思い至り、苦々しげに言葉を絞り出す。監視塔の位置を知り、ウッドワイラーの目が届かない時間帯を把握している者が、案内役を務めたのではないか──そう、グリダニアの内側に、帝国を導いた裏切り者がいるのかもしれない、と。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> バスカロン　<small class="muted">黒衣森：南部森林 (X:18.1, Y:19.8)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="like-fine-wine.html">熟成される友情</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 23～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="nouveau-riche.html">犯人をとっちめろ！</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'穿針引線',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>當你回到 Buscarron’s Druthers 時，Buscarron 立刻用嚴肅的表情招呼你過去。你離開的這段時間裡，他收到一則新的消息：有人在 Twelveswood 深處目擊到 sylphs 的身影。但奇怪的是，那裡並不是 sylphs 自己的領地，而是離這間酒館不遠的一片樹林──在過去，從未有人見過 sylphs 會走到那麼靠近的地方。一定有什麼原因，迫使他們離開熟悉的家園，他低聲猜測，失蹤的 sylph elder 很可能也在其中。說著，他拿出一張地圖，在那片目擊地點上重重畫下記號，推到你面前，拜託你立刻前去調查，親眼確認那裡究竟發生了什麼。</p>
      <p>你離開酒館溫暖而吵鬧的空氣，踏上 South Shroud 上層的小徑，往黑衣森林更深處走去。隨著腳步深入，周圍逐漸安靜，只剩下樹葉摩擦的聲響與遠方鳥鳴陪伴你前行。你依照 Buscarron 在地圖上留下的記號前進，每一步都格外小心，留心任何 sylphs 的痕跡，或是能解釋他們為何會出現在這裡的線索。</p>
      <p>當你接近標記的那片區域時，一股不祥的寒意順著脊椎爬上來。你清楚地感覺到，某種抱持敵意的存在正潛伏在林間。下一刻，從樹影之間現身的，卻並不是 sylphs，而是一群全身披甲的 Garlean 士兵──出現在絕不該有他們的黑衣森林深處。冷硬的金屬在枝葉間閃光，他們毫不遲疑地向你逼近，迫使你拔劍應戰。在一場短暫卻激烈的交鋒後，你終於將這股威脅驅散，森林再度恢復寂靜。然而，Garleans 已經潛入 Twelveswood 腹地的這件事，卻像陰影一樣揮之不去。</p>
      <p>回到 Buscarron’s Druthers 後，Buscarron 一看見你便急著詢問你在森林裡看到了什麼。當你說出「Garleans」這個字時，他話到一半猛然停住，難以置信地盯著你，忍不住驚呼：在這片 Twelveswood 裡，竟然會出現 Garleans？先是 sylphs，又是在同一片區域裡發現帝國士兵──這絕對不可能只是巧合。他一邊皺眉，一邊低聲推測，Garleans 是否是在跟著 sylphs 的行蹤行動，追蹤他們，或者在某種目的下追捕他們。</p>
      <p>但越是仔細思考，就越發現事情不對勁。Wailers 的瞭望塔遍布整片森林，到處都有巡邏與監視的目光，照理說，Imperials 根本不可能悄無聲息地穿過這道防線，深入這樣的地方。既然如此，他們又是怎麼進來的？Buscarron 的表情逐漸陰沉下來，終於說出那個最不願承認的可能：一定是有人帶他們進來。某個知道瞭望塔位置、清楚 Wailers 何時巡邏、何時放鬆警戒的人，替他們引路。也就是說，在 Gridania 的哪個角落，恐怕藏著一名背叛同胞、為 Garleans 帶路的叛徒。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 巴斯卡隆　<small class="muted"> 黑衣森林南部林區 (X:18.1, Y:19.8)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="like-fine-wine.html">成熟的友情</a></div>
      <div class="row">所有職業（不含限定職） 等級 23 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="nouveau-riche.html">浮出水面的犯人</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
