<head>
  <meta charset="utf-8" />

  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;
  overflow-y:auto;
  padding-right:8px;
  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`Poetry Recital`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Jude greets you with unusual energy, already prepared to ask yet another favor of you. This time, what he needs is nothing less than the heart of the starlens itself. He explains that while an ordinary telescope gathers starlight, the starlens is meant to capture faint aetherial flickers. For that, a special component is required, and though the quality of the materials matters, he insists that the true measure of it will lie in the skill of the hand that makes it. That is why he turns to you again.</p><p>When you deliver the finished work, Jude is overcome with admiration. Even to an untrained eye, he says, the craftsmanship is unmistakable. With this, the starlens will be able to detect even distant aetherial bodies, and the dream that once seemed so uncertain draws one step closer. His gratitude is wholehearted, and the trust between you continues to deepen as your work steadily gives form to his hopes.</p><p>Not long after, Jude thanks you once more and says that though this journey is still only in its early stages, he hopes the two of you can keep pressing onward with the same fervor. At that moment, Jeromere appears again, quick to declare that shutting himself away in such a cramped place will ruin Jude’s mental health, and that there is far more enjoyment to be found outside. When Jude asks what sort of enjoyment he means, Jeromere eagerly paints a picture of coffee from the Last Stand, a gathering at Auk’s Landing, and a public recital of poetry. To him, such things are the proper way to live fully.</p><p>Urged to try expressing himself in verse, Jude hesitantly agrees, hoping that perhaps it might help him become a little more like Jeromere. Yet what emerges from him is not light or charming, but dark and deeply troubled. His words spill out in images of abyss, blood-stricken rain, poison, and a world returning to nothingness. Even Jeromere, for all his boldness, falters at that and quickly retreats, suggesting that perhaps Jude need not look quite so deeply into his feelings after all. Even so, he does not give up. He insists that Jude should leave all this behind, change faculties, and join the Faculty of Literature and the poetry club by the next time he visits.</p><p>Once Jeromere is gone, Jude admits that he cannot understand why his friend is so relentless in trying to make him abandon his studies. Astronomy was once Jeromere’s first love, and to walk away from it now would mean Jude giving up on the dream that brought him here in the first place: to find the Azure Star. Your words push him back toward himself. Whatever uncertainty remains, he remembers why he joined the Studium and the association, and he refuses to cast that aside. With heartfelt thanks, he tells you that your support has helped restore his resolve, and that with you beside him, the strength within him now feels as fierce as a chocobo’s.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Jude <small class="muted">(Old Sharlayan, X:5.3 Y:7.9)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-world-without-you.html">The World without You</a></div><div class="row">CRP, LTW, WVR Lv. 83</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="one-step-forward.html">One Step Forward</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'吟じます',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ジュードは、あなたの姿を見るなり、まさに待っていた相手だと言わんばかりに声を弾ませます。今回あなたに頼みたいのは、星見鏡の心臓部とも言うべき部材でした。通常の望遠鏡が星の光を捉えるのに対し、星見鏡が捉えるのは、かすかなエーテルのゆらめきです。そのためには特別な部材が必要であり、上質な素材ももちろん大切ではあるものの、出来を決めるのは何より作り手の腕前なのだと、彼はまっすぐにあなたへ期待を寄せます。</p><p>完成した品を受け取ったジュードは、その出来栄えに目を見張ります。専門知識のない者が見ても、比類なき仕事ぶりであることがわかるほどだと、彼は惜しみなく称賛します。これで星見鏡は、遠く離れたエーテルの天体さえ捉えられるようになるはずだ――そう語る彼の声には、かつて揺らいでいた夢が、確かな形を帯び始めた手応えがにじんでいました。感謝の言葉もまた真摯で、あなたの助力によって、彼の願いは少しずつ現実へと近づいていきます。</p><p>やがてジュードは、改めて礼を述べながら、この歩みはまだ始まったばかりだが、これからも同じ熱意で進んでいきたいと語ります。ところがそこへ、またしてもジェロメールが現れます。こんな狭い場所に閉じこもっていれば、いずれ心まで参ってしまうと彼は言い、外の世界にはもっと楽しいことがあるのだと、いつもの調子でジュードを誘います。何がそんなに楽しいのかと問われると、ラストスタンドの淹れたての珈琲から始まり、オークズランディングでの公開詩朗読会まで、実に生き生きとその一日を語ってみせました。</p><p>そしてジェロメールに促され、ジュードもまた詩で自分を表してみることになります。少しでも彼のようになれるのならと、おずおず応じたあなたの友は、自らの内側に沈んでいたものをそのまま言葉にしてしまいます。闇の深淵、血のように降る涙、胸に巣くう毒、そして無へと還る世界――あまりにも重く昏いその響きに、さすがのジェロメールもたじろぎ、感情にそこまで深く潜らなくてもよいのではないかと、珍しく言葉を濁します。それでも彼はなお諦めず、次に来る時までには文学部へ移り、詩の愛好会にも加わっているよう期待していると、半ば本気で言い残していきます。</p><p>ジェロメールが去ったあと、ジュードは、なぜ彼がこれほどまで執拗に自分を学問から遠ざけようとするのか理解できないと漏らします。かつて天文学は、まさしく彼にとって最初の恋にも等しいものだったからです。ここで学びを捨てることは、蒼き星を見つけるという自分の夢を手放すことにほかなりません。あなたの言葉に背を押され、ジュードは改めて、自分がなぜ魔法大学へ入り、この研究会に身を置いたのかを思い出します。もう諦めるわけにはいかない――そう言い切った彼は、いつも支えてくれることへの感謝をあなたに伝えます。そして、あなたがそばにいてくれる今、心に宿る決意はより強く固まり、その内にはまるでチョコボのような力強さが駆け巡っているようだと、少し照れながらも確かに前を向くのでした。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ジュード <small class="muted">（オールド・シャーレアン, X:4.1 Y:9.1）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-world-without-you.html">ともだち、いない</a></div><div class="row">木工師、革細工師、裁縫師 Lv 83～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="one-step-forward.html">小さな一歩</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'詩吟同好會',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Jude 一看到你，就難得地露出一種近乎振作起來的急切神情。他馬上又向你提出新的請求，而這一次，他要你製作的，是 starlens（一種正在研製中的觀星裝置）真正的核心。普通望遠鏡接收的是星光，但 starlens 要捕捉的，卻是極其微弱的乙太閃爍。為了做到這件事，便需要一個特殊的核心部件。高品質的材料固然重要，可在 Jude 看來，真正決定成敗的，終究還是製作者的手藝。因此，他再一次把最關鍵的部分託付給你。</p><p>當你把完成的部件交給他時，Jude 幾乎掩不住驚嘆。就連毫無專業眼光的人，也能一眼看出這份做工有多麼出色。有了這個部件之後，starlens 就有機會捕捉到極遠處的乙太天體，而那個原本還顯得遙不可及的目標，也終於又往前推進了一步。他向你道謝時，那份欣喜與感激都是真心實意的。隨著你一次次幫助他，他心中的希望也逐漸從模糊的念頭，變成了真正能夠碰觸的東西。</p><p>之後，Jude 再次鄭重向你致謝，說你們如今仍在這段道路的起點，但他希望往後也能以同樣的熱情一路前進。就在這時，Jeromere 又一次闖了進來。他一開口便說，像 Jude 這樣把自己關在狹小的空間裡，遲早會把精神都悶壞，外面的世界明明還有那麼多值得享受的事。當 Jude 問他所謂的「樂趣」究竟是什麼時，Jeromere 立刻神采飛揚地描述起自己那一天的生活：先去 Last Stand 喝一杯現煮咖啡，再和大家到 Auk’s Landing 舉辦公開詩歌朗誦會。在他眼裡，那才像是真正把每一天活得淋漓盡致的方式。</p><p>在 Jeromere 的鼓動下，Jude 也被逼著試著用詩來表達自己。他猶豫著答應，只因心裡仍隱約希望，若自己能學會這樣表達，也許就能稍微變得像 Jeromere 一點。然而從他口中流瀉出來的，卻不是什麼輕快明亮的句子，而是一片陰鬱而沉重的黑暗。深淵、如血般落下的淚、盤踞心中的毒，以及終將歸於虛無的世界，那些字句幾乎把他壓抑已久的內心全部翻了出來。就連一向張揚的 Jeromere 也被這股氣息震住，只能尷尬地收回前話，改口說也許不必把感情挖得那麼深也沒關係。即便如此，他還是沒有放棄，仍堅持要 Jude 乾脆轉去文學部，最好在他下次來之前，就連詩歌社也一起加入。</p><p>等 Jeromere 離開後，Jude 忍不住困惑地低聲說，他實在不明白，為什麼 Jeromere 會如此執著地想讓自己放棄現在的學業。明明天文學曾經就是 Jeromere 最初、也是最深的熱愛。對 Jude 而言，若在這裡退開一步，就等於連自己一路追逐至今的 Azure Star 也一併放棄了。你的話把他從動搖裡重新拉了回來。無論他此刻還有多少不安，他終究想起了自己為什麼會進入 Studium、又為什麼會留在這個研究會。那個理由從來只有一個，因此他不能放棄。他再一次真心向你道謝，說正因為有你始終在旁支持，他心中的決意才漸漸變得堅定，如今甚至讓他覺得，體內像有一隻陸行鳥般的力量正猛烈奔騰著。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Jude <small class="muted">(舊薩雷安, X:4.1 Y:9.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-world-without-you.html">孤獨一人</a></div><div class="row">CRP, LTW, WVR Lv. 83</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="one-step-forward.html">小小的一步</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
