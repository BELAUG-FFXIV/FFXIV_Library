    story:`<div class="clamp" data-collapsed="true">
<p>Julyan snaps you out of your hesitation, reminding you that a moon-sick maid is digging around at the Sil’dih excavation site with her mind set on turning Ul’dah into a land of the walking dead. She adds—almost indulgently—that your worry for Hildy is touching, but you needn’t fret; “Mommy dearest” won’t let her beloved son die so easily.</p>
<p>Up ahead, Phillice tells you they have tracked down Miss Ellie, and your companions are watching her even now. No matter how many times they try to reach her, she refuses to answer, and they cannot simply subdue her—she is seated atop a crate stuffed full of zombie powder, and one mistake could have dire consequences. Phillice begs you to step forward where your voice will carry and call your friend’s name, trusting that your time together must still mean something.</p>
<p>Around you, the reactions cut in sharply: Nashu’s voice cracks as she calls Ellie a friend, Briardien admits it beggars belief he could have been so blind, and Gilgamesh seems almost delighted to learn the girl and her sister were behind the crimes. Julyan repeats her warning with a scowl, and Godbert advises you not to anger the lass—she’s sitting on enough zombie powder that he doubts she’s afraid to use it.</p>
<p>You step forth and call out, “Ellie!” Before anything can settle, Hildibrand arrives with a grand apology, explaining that he was on Greg’s trail when he encountered a subterranean curiosity that demanded his immediate attention. He insists he will conclude his investigation forthwith, but asks you to entertain Greg and his primal friend in his stead, promising you will reclaim the Treaty-Blade from that knave—and that he will join you directly.</p>
<p>When the moment finally loosens, Briardien declares his work done and offers you curt thanks, saying you were the least incompetent associate he met in his travels. He renounces his position and departs with a vow that gives his life new meaning, while Ellie quietly apologizes for deceiving you and says it wasn’t personal. Phillice, speaking of four hundred years and consequences, says this may spell the end for the Arbiters of Truth, and he too chooses to renounce his post.</p>
<p>In the aftermath, Julyan declares all’s well that ends well—Hildy’s undead acquaintances appeared at her request, and who would have thought zombies could be such gentlemen. Humphrey gushes about the Gentlemen of Light, and Godbert laughs that if anything could bring Hildy back from the undead, it would be his dear wife’s hand-mixed holy water. Then Maxinne reports a giant man dressed in red rushing into the keep, and later asks if you are all right—she heard a ghastly sound, and notes that muscular fellow seemed genuinely concerned for you. Hildibrand, undeterred, demands to know where Greg and his oversized avian companion have gone, praises you when he learns the battle is already won, and fixates on the news that the Treaty-Blade lies hidden in the nearby wood—vowing no buried treasure will escape his keen eye, even as he immediately forgets which way the forest is.</p>

    story:`<div class="clamp" data-collapsed="true">
<p>ジュリアンは、あなたがここでぐずぐずしている場合ではないと叱りつける。シラディハの遺跡で月に心を奪われた侍女が掘り返しを続け、ウルダハを歩く死者の国に変えるつもりだ――そう念を押したうえで、ヒルディへの心配はごもっともだが、愛する息子をそう簡単に死なせはしないと言い切る。</p>
<p>少し先で、フィリスは「エリー」を突き止めたと告げる。仲間たちが見張っているのに、何度呼びかけても彼女は返事をしない。力ずくで無力化することも考えたが、彼女が腰を下ろしている木箱はただの椅子代わりではなく、ゾンビー粉がぎっしり詰まっている――下手をすれば大惨事だ。だからこそ、あなたに前へ出て、届く声で友の名を呼んでほしいと懇願する。</p>
<p>ナシュ・マカラッカは鼻をすすり、「エリー……友だちだと思っていたのに」とこぼす。ブリアルディアンは「私がこれほど盲目だったとは」と吐き捨て、ギルガメッシュは「姉妹が黒幕だったとは！」と妙に感心した調子で騒ぎ立てる。ジュリアンは改めて危険を指摘し、ゴッドベルトも、彼女を刺激するな――大量のゾンビー粉の上に座っていて、使うことを恐れていないだろうと忠告する。</p>
<p>あなたが一歩踏み出し、「エリー！」と呼ぶ。そこへヒルディブランドが現れ、謝罪しながらも胸を張って語る。グレッグ――ギルガメッシュを追っている最中、地下の好奇心をそそるものに出くわし、どうしても調べねばならなかったのだという。調査はすぐに終えるから、その間あなたにはギルガメッシュと「蛮神の友」を相手取ってほしい、そして「契約の剣」は必ず取り戻す――自分もすぐ追いつく、と。</p>
<p>ひと段落すると、ブリアルディアンは「ここでの仕事は終わりだ」と言い、あなたに短い礼を述べる。旅の中で出会った仲間の中ではまだましだった、と皮肉を交えつつ、論理の通じぬ世界だと悟ったことを語り、職を捨てる決意と新たな誓いを胸に立ち去っていく。エリーはあなたに、だましてしまったことを詫び、個人的な恨みではなかったと静かに告げる。フィリスは、四百年を経た今、真実を掲げてきた者たちに終わりが訪れるかもしれないと言い、自らもその地位を捨てると宣言する。</p>
<p>その後、ジュリアンは「終わりよければすべてよしだ」と言い、頼めばヒルディの不死の知己たちが姿を見せるあたり、ゾンビーでも紳士になれるのだろうと笑う。ハンフリーは「光の紳士たち」に目を輝かせ、ゴッドベルトは、ヒルディを不死から引き戻したのは妻の特製の聖水だと豪快に笑い飛ばす。さらにマクシヌは、赤い服の巨漢が砦へ猛然と駆け込んだと報告し、のちにあなたの無事を気遣う――中から凄まじい音がしたうえ、あの筋骨たくましい男があなたを案じていたという。ヒルディブランドはなおも勢い衰えず、ギルガメッシュと巨大な鳥の相棒の行方を問う。すでに勝利したと聞けば得意げに称え、近くの森に「契約の剣」が隠されていると知るや、宝は必ず見つけ出すと宣言する――その直後、森の方角を忘れて立ちすくみながら。</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>Julyan 把你的遲疑一把拉回現實，提醒你別再磨蹭：有個「月迷心竅的女僕」正在 Sil’dih excavation site 挖掘，滿腦子只想把 Ul’dah 變成「行走死者的國度」。她又補上一句，你擔心 Hildy 的心情她看得出來，但別怕——「媽媽」不會讓她心愛的兒子那麼容易就送命。</p>
<p>往前一步，Phillice 告訴你，他們已經找到 Miss Ellie，就在前方，你的同伴正在看守她。可是不管怎麼喊、怎麼勸，Ellie 連一句話都不回；更不能粗暴制伏，因為她坐著的木箱根本不是臨時座椅——裡頭塞滿了足以引發災難的殭屍粉末，一個失手，後果不堪設想。Phillice 懇求你站到能讓她聽見的位置，用你的聲音喊出她的名字；就算她被怒火吞沒，你們曾經一起走過的時間，總該還有分量。</p>
<p>你身後的聲音一一刺進來：Nashu Mhakaracca 哽著聲說「Miss Ellie……我還以為我們是朋友」，Briardien 低聲嘆著自己竟能盲目到這種地步，Gilgamesh 反倒興致勃勃，像是在讚嘆「原來這對姊妹才是幕後黑手」。Julyan 再次沉著臉提醒危險，Godbert 也嚴肅警告你別惹怒那女孩——她坐在一大批殭屍粉末上，而且看起來完全不怕真的用上。</p>
<p>你走上前，抬高聲音喊出：「Ellie！」就在這時，Hildibrand 出現了，他一本正經地向你致歉，說自己原本正在追蹤 Greg，卻在途中遇到一個地下的奇怪發現，逼得他不得不立刻調查。他表示會盡快結束手上的調查，但暫時想請你代他「招待」Greg 和他的 primal 夥伴；他還保證，Treaty-Blade 一定會從那個無賴手裡奪回來——要你先走，他很快就到。</p>
<p>事情終於鬆動後，Briardien 宣布自己在這裡的工作已經結束，還用一貫冷淡的口吻說，你是他旅途中遇過「最不無能」的合作對象，至少讓他保住一點理智。接著他說自己將放棄原本的身分，把在這個世界見到的荒謬與不合邏輯當成新的教訓，帶著一個賦予他新意義的誓言離開。Ellie 則對你道歉，說她欺騙了你，但那不是針對你個人。Phillice 談到四百年的歲月與造成的痛苦，表示這或許會成為 Arbiters of Truth 的終點，而他也決定辭去自己的職位。</p>
<p>餘波之中，Julyan 說「結局好就好」，還得意地提到 Hildy 的不死友人是應她的要求才現身——誰想得到殭屍也能當紳士呢，想來是她兒子的好影響。Humphrey 望著那些「Gentlemen of Light」興奮不已，Godbert 則大笑，說能把 Hildy 從不死之身拉回來的，只有他太太親手調配的聖水。接著 Maxinne 回報，有個穿紅衣的巨漢以驚人速度衝進要塞，她根本攔不住；後來她又關切你是否無恙，說她聽見裡頭傳來可怕的聲響，而且那位肌肉結實的男子似乎很在意你的安危。Hildibrand 依舊氣勢如虹，追問 Greg 和那隻「巨大鳥類同伴」去了哪裡；當他聽說戰鬥已經結束，便把你的勝利當成理所當然的成果，並立刻把注意力放到「Treaty-Blade 就藏在附近的林地」這句話上——他拍胸脯保證沒有任何埋藏的寶物能逃過他的銳眼，卻也在下一瞬間，困惑地想不起森林到底是哪個方向。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');

const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());
