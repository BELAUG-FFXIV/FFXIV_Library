    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
<p>Keel seeks you out, almost startled that you came at all, and asks you to hear him out before you can flee. The knights of the Heavens’ Ward have gone missing since the troubles began, yet rumors now claim those honored sers are walking Ishgard’s streets again. Calling it foul heresy, he insists on getting to the truth—and admits, with visible reluctance, that they could use one man’s “serendipity.” If they don’t find the inspector first, he warns, the man will appear at the worst possible moment anyway…so you should go to Fortemps Manor and keep a close eye on that “boy—mammet.”</p>
<p>Near the familiar gazebo, you find the inspector in full flourish with Nashu and Gigi. The mood is less heroic than it sounds: Gigi has been “naughty,” and the inspector scolds them for behavior unbefitting a gentleman. Gigi protests—insisting it was only a family crest for their home—and then earnestly asks where their own gazebo is, and whether it comes with a warm stove and a steaming kettle. The inspector tries to spin the hardship into romance, declaring the world itself their oyster, but Keel cuts in dryly: if that’s true, why have they been sleeping in Lord Edmont’s gazebo for so long?</p>
<p>When Gigi stubbornly declares they want a gazebo life with “Papa” and “Mama,” Keel steers the talk back to business. He lays out the case: impostors masquerading as knights of the Heavens’ Ward, luring highborn ladies to private parties for a small fee, and leaving their victims too traumatized to speak of what happened. He offers compensation for help. The inspector instantly postures as an expert in the ways of maidens—only for Julyan to appear and tear into him for “playing” at being an inspector and a father to a mammet. The inspector refuses to yield, declaring the young women of Ishgard need a champion; Julyan, exasperated and furious, decides she’ll come along to keep him from getting himself killed.</p>
<p>At The Last Vigil, the “simple” questioning turns into a parade of bruised pride and raw devotion. One woman scoffs at the very idea she could be fooled, swearing she’d recognize every detail of Ser Adelphel’s face and demanding answers for his absence. Another mourns Ser Zephirin as though already lost to Halone’s halls, while a third burns with vengeance, spitting fury at criminals who prey on a lady’s emotions. Keel listens with a strained, uneasy patience—until at last someone offers something useful.</p>
<p>Dorys admits she was taken in. She was blindfolded and escorted to a manor, and when the cloth came away she saw the hideous faces of the so-called “Grand Sers” and fled in terror. They were gone when she returned with the watch, but neighbors overheard them speaking of seeking shelter in a place called Idyllshire. The inspector swears, here and now, that he will not rest until they are punished—while Keel, grimacing at the thought of the journey, realizes he has no choice but to follow.</p>
<p>The road to Idyllshire is every bit as harrowing as Keel feared, and once you arrive, the party’s bickering resumes as if it never stopped. Gigi stares around, unsettled by how strangely familiar the settlement feels, while the inspector praises the place as proof of what can be built by camaraderie and hard work. Keel, still shaken, tries to focus: split up, question the locals, find where the “Grand Sers” are hiding. Piece by piece, you learn they keep to themselves, pay visits to the Great Library, and are holed up in a building south of the Roundspot.</p>
<p>You go to that building—and find only silence, forcing you to wait. Gigi, unexpectedly earnest, tells you they really like this place, and imagines staying here with “Papa” and “Mama” for endless adventures. Before anyone can decide whether that’s a distraction or a clue, a goblin named Slowfix appears, astonished to see the inspector alive. He recalls a long-ago businessdeal in Thanalan: how the inspector tracked bandits, brought “bangyboom,” and returned stolen goods—an encounter that helped inspire Idyllshire’s egalitarian dream.</p>
<p>When the inspector hesitantly asks for nothing more than a humble gazebo to sleep beneath, Slowfix waves the idea away and offers something far grander: a perfectly good estate right behind you, with residents in arrears whom he is happy to evict—conveniently, the very sort of tenants you’re hunting. Gigi erupts in joy at the thought of a giant gazebo of their own, and the inspector, overwhelmed, accepts with trembling gratitude. Gigi immediately asks if they may draw the family crest on it; the inspector declares the gazebo their canvas and promises to buy paints together—even as Julyan mutters darkly about what she will and won’t tolerate, and the “Grand Sers” remain nowhere to be seen.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>異端審問官キールは、あなたが来てくれたことに安堵しつつも、逃げ出したくなる気持ちを抑えるようにと前置きし、用件を告げる。蒼天騎士団の騎士たちは、あの不穏な一件が始まって以来、誰ひとりとして王都に戻っていない。それなのに最近、彼らが街を歩いているという噂が立ったという。キールはそれを最悪の異端だと言い切り、真相を突き止めるには手が必要だと訴える。そして、苦々しげに認める――どうしても、あの男の「妙な幸運」に頼らねばならないのだ、と。さらに、見つけずに放置すれば最悪の場面で勝手に現れるに違いない、だからこちらの手の内で監視しつつ、あの「少年――いや、魔法人形」を見張りたいのだ、と。</p>
<p>あなたがフォルタン伯爵邸近くの東屋へ向かうと、ヒルディブランドとナシュ、そしてギギがいた。だが、そこにあったのは華々しい捜査ではなく、叱責の最中だった。ギギは東屋に落書きをしたと言われ、ヒルディブランドは「紳士として相応しくない」と諭す。ギギは否定し、家のための家紋を描いていただけだと言い張り、では自分たちの東屋はどこにあるのか、暖かなストーブと湯気の立つ薬缶もあるのか、と真剣に問う。ヒルディブランドは世界を住処とする紳士の旅を語るが、キールは冷ややかに言い返す――それなら、いつまで伯爵の東屋で寝泊まりしているつもりなのか、と。</p>
<p>ギギが「パパ」と「ママ」と一緒に東屋で暮らしたいと駄々をこねる中、キールは話を本題へ戻す。蒼天騎士団を名乗る成りすましが、貴族の女性たちに金を払わせ、私的な集いへ誘っているらしい。参加した者はあまりに衝撃を受け、詳しいことを語ろうとしない――だからこそ、協力が必要で、報酬も出すという。ヒルディブランドは即座に気勢を上げ、自分は女性の扱いに通じていると胸を張る。そこへジュリアンが現れ、魔法人形の父親ごっこをしている息子を連れ戻すと怒鳴りつける。だがヒルディブランドは引かず、イシュガルドの女性たちを悪党から守るのが自分の使命だと宣言する。ジュリアンは苛立ちを隠さぬまま、結局はあなたたちに付き添い、目を離さないと決める。</p>
<p>ラストヴィジルでは、聞き込みは怨嗟と執着で満ちたものとなる。成りすましなどに引っかかるはずがないと言い切る女性は、アデルフェルの顔の細部まで覚えているのだと語り、彼の不在を問い詰めるつもりだと息巻く。別の女性はゼフィランを失ったかのように嘆き、二度と誰も愛さないと誓う。怒りに燃える女性は、淑女の感情を金に換える者たちへ苛烈な復讐を望み、異端者を裁けと叫ぶ。キールは眉をひそめつつも耐え、ただ一つ、手がかりを求めて耳を傾ける。</p>
<p>やがてドリスが口を開き、自分も騙されたのだと告白する。目隠しをされて屋敷へ連れて行かれ、布が外れた瞬間、そこにいた「グランドサー」たちの醜い顔を見て悲鳴を上げ、逃げ帰ったという。衛兵を連れて戻った時には彼らは消えていたが、近隣の者が「イディルシャイアに身を寄せる」と話す声を聞いたらしい。ヒルディブランドは、その場で必ず悪党を裁くと誓いを立て、あなたもまた次の行き先が決まったことを悟る。キールは動揺を隠せないまま、それでも追わねばならないと腹を括る。</p>
<p>道中はキールの言うとおり苛烈で、ようやくイディルシャイアへ着いても一行の騒がしさは変わらない。ギギはこの場所に妙な既視感を覚え、戸惑いをにじませる。ヒルディブランドは、上地の民とゴブリンが築いた共同体を称え、自由と協調の理想を語る。キールは気を取り直し、聞き込みのために手分けしようと促す。あなたが集めた話から、例の「グランドサー」たちは人と交わらず、大図書館へ足を運び、市場の南方、ラウンドスポットの南方にある建物に潜んでいるらしいことが見えてくる。</p>
<p>その建物へ向かうと、留守なのか気配がなく、あなたたちは待つしかない。ギギは真面目な声で、この町が気に入ったと告げ、ここなら「パパ」と「ママ」と一緒にたくさんの冒険ができるのではないかと言う。そこへスロウフィックスが現れ、ヒルディブランドの名を呼んで驚嘆する。昔、砂の国で盗賊に襲われた荷を取り戻せず困っていたところ、ヒルディブランドが悪党を見抜き、火薬の爆発で一気に片をつけ、品と正義を取り戻してくれたのだという。その出来事が、イディルシャイアの理想へ繋がったのだと、誇らしげに語る。</p>
<p>ヒルディブランドが控えめに、寝場所として東屋があれば十分だと言うと、スロウフィックスは一笑に付し、背後の屋敷を差し出す。家賃滞納の住人は追い出せるし、疑わしい「グランドサー」を追うあなたたちが住むのは理にかなう――そう言って、無償で貸すと決めてしまう。ギギは巨大な東屋だと大喜びし、ヒルディブランドは感極まって礼を述べる。ギギが家紋を描いてよいかと恐る恐る尋ねると、ヒルディブランドはそれこそ祝福だと頷き、塗料を買いに行こうと誘う。ジュリアンは苛立ちを隠さず呟くが、肝心の「グランドサー」たちは依然として姿を見せず、あなたたちはただ、さらに塗料が必要になる予感だけを抱えて待ち続ける。</p>
</div>

    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
<p>Keel 把你叫來時，語氣既急又亂，卻硬是要你先聽完再走。他說 Heavens’ Ward 的騎士自從那場「不愉快」開始後就再也沒有回到王都，可最近卻傳出有人看見那些騎士在 Ishgard 的街頭出沒——這在他眼裡是最惡劣的異端。他想查個水落石出，但人手不足，只能咬牙承認：也許得借助那位 Inspector 的「走運」。更何況，不先把人找來，他八成會在最糟糕的時機自己冒出來；至少現在能在你們的視線裡，順便盯緊那個「男孩——不，是魔法人偶！魔法人偶！」</p>
<p>你們趕到 Fortemps Manor 附近的 gazebo，卻不是遇到什麼大案件，而是撞見一場家庭爭執。Hildibrand 正在訓話，Nashu 在一旁嘟囔，而 Gigi 被指控想在這座 gazebo 上亂塗亂畫。Gigi 立刻反駁，說自己是在畫「家徽」給你們的家。接著他又認真問：那你們自己的 gazebo 在哪裡？是不是也有暖爐、也有冒著蒸氣的水壺？Hildibrand 立刻把話講得天花亂墜，說作為紳士調查官，世界就是你們的歸宿；但 Keel 冷冷戳破——既然如此，你們到底在 Lord Edmont 的 gazebo 裡睡了多久？</p>
<p>當 Gigi 不肯退讓，喊著想和「Papa」以及「Mama」一起住在 gazebo 裡時，Keel 把話題拉回正事。他說有人假扮 Heavens’ Ward 的騎士，向貴族小姐收取小額費用，聲稱能帶她們參加私密聚會、親近那些「大人」。可真正去過的人都被嚇壞了，甚至拒絕細談。為了調查，他願意支付報酬請你們協助。Hildibrand 立刻自信滿滿，宣稱自己精通「女士之道」；就在這時，Julyan 氣勢洶洶現身，痛罵他別再扮演調查官，更別再當什麼「魔法人形的父親」。Hildibrand 不肯回頭，反而宣稱 Ishgard 的年輕女性需要有人挺身而出；Julyan 罵歸罵，最後還是決定跟上來，因為她不打算放任他胡來。</p>
<p>到了 The Last Vigil，一切變成滿街的怨氣與執念。有人冷笑說自己不可能被騙，她早把 Ser Adelphel 的臉每個細節都記得清清楚楚，只等他回來好好質問。有人痛哭著為 Ser Zephirin 立誓，像是已經接受他正在 Halone 的殿堂裡長眠。也有人怒火沖天，嚷著要報復那些趁人之危的騙子，甚至喊著應該有人去「清算」這些罪人。Keel 聽得臉色僵硬，卻只能硬撐著繼續問下去，因為你們需要一條能追下去的線索。</p>
<p>終於，Dorys 承認自己也上當了。她被蒙上眼帶進一座 manor，當布條被解開時，她看見那些自稱「Grand Sers」的人——面孔醜陋得讓她當場尖叫逃走。她帶著 watch 回去時，人已經不見了，但鄰居聽見他們提到要去一個叫 Idyllshire 的地方避風頭。Hildibrand 當場立誓必讓這些惡徒付出代價，而你也明白：下一站已經決定。Keel 雖然滿臉不情願，卻也只能承認——你們得立刻出發。</p>
<p>通往 Idyllshire 的路讓 Keel 一路覺得自己隨時會死得很難看，抵達後也沒能換來片刻安靜。Gigi 望著這座聚落，低聲說這裡「不知為何有點熟悉」，卻又不敢相信自己曾來過。Hildibrand 則把這裡讚成夢想之地，說 uplanders 與 gobbies 同心協力才有今日的模樣。Keel 強迫自己回到程序：分頭問話，找出那些「Grand Sers」的落腳處。你們拼湊出來的消息逐漸一致——他們行事低調，會去 Great Library，也住在市集南方、Roundspot 以南的一棟建築裡。</p>
<p>你們趕到那棟建築前，卻發現門庭冷清，只能守著等待。Gigi 忽然很認真地說他喜歡這裡，甚至想像著你們三個——他、Papa、Mama——在這裡繼續冒險。就在這時，一名 gobbie 叫 Slowfix 驚呼著認出 Hildibrand，回憶起多年前在 Thanalan 的一場「忙碌交易」：當 gobbieflock 被 bandits 伏擊、無力求助時，是 Hildibrand 追出真相、把壞人打得人仰馬翻，還帶回失物與正義。Slowfix 甚至說，正是那次相遇，才讓他開始相信這座自由聚落的理想能成立。</p>
<p>Hildibrand 本來只想要一座「簡樸的 gazebo」當棲身之所，Slowfix 卻直接指向你們身後的 estate，說那裡住戶欠租，趕走也無妨；更何況你們正在追查的騙子就疑似藏在這一帶，讓你們住進去再合理不過。Gigi 立刻雀躍地把那座 estate 當成「巨大 gazebo」，Hildibrand 感動得語無倫次。Gigi 小心翼翼問：既然這是你們的 gazebo，那他能不能在上面畫你們的家徽？Hildibrand 立刻答應，還說要一起去買顏料，把這座 gazebo 當成畫布。Julyan 在旁邊低聲咒罵，顯然完全不打算承認這場「家庭生活」；而你們守著的建築依舊沒有動靜——那些「Grand Sers」仍未現身，只剩下一個越來越明確的現實：你們可能真的還得再買更多顏料。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
