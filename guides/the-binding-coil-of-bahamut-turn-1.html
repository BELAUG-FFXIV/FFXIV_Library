        tabs:{story:'Story', req:'Requirements', acq:'Unlock Quest', unlock:'Follow-Up Quest', bgm:'BGM', comments:'Comments'},
        story:`<p><strong>01:24 Cutscene 1</strong></p><p>Alisaie stands with you amid the scars the Calamity left behind, and says the aether here is so overwhelming she can scarcely breathe.</p><p>She draws your attention to the corrupted crystals and asks if you have ever seen anything like them. She explains that crystals like these appeared across the realm when the great river of aether was irrevocably diverted five years ago. Then she bids you look upon one of the things that caused that change: a fragment of the lesser moon, Dalamud.</p><p>Alisaie tells you that Ancient Allag created Dalamud—“Meteor,” as the Garleans call it—to serve as a celestial prison for Bahamut.</p><p>Its fall, she says, dealt grievous wounds to the land, and those wounds have yet to heal—proof enough in the corrupted crystals around you. Even now, Dalamud’s internal defenses still function, a testament to the ingenuity of the Allagans, and she is certain the Garleans mean to claim such advanced technology for themselves.</p><p>You are about to face secrets long buried beneath the sands of time. Alisaie warns that great dangers may lie ahead, but insists you have come too far to turn back—the truth of the Calamity is within reach.</p><p><strong>03:47 Cutscene 2</strong></p><p>Alisaie draws a sharp breath and calls for the gods’ protection as you both behold the sight before you.</p><p>She describes dark wings that could swallow the very heavens, and says there is only one being they could belong to. These, she tells you, must be the wings of Bahamut—the primal who laid Eorzea to waste five years ago.</p><p>At Carteneau, she reminds you, her grandfather tried to imprison Bahamut once more by invoking the power of the Twelve. But the dreadwyrm was too strong, and soon broke free of his confines.</p><p>And yet—rather than return to the destruction he had begun—Bahamut vanished. No one knew where he went…until today. Alisaie cannot understand how, if Bahamut is truly a primal, he can still retain a physical form. She asks you whether her grandfather defeated him, or whether some other explanation awaits, and insists you must press on if you are to learn the truth.</p>`,

          <div class="row"><a class="link" href="the-binding-coil-of-bahamut-turn-2.html">The Binding Coil of Bahamut - Turn 2</a></div>
        </div>`,
        bgm:`<div class="stack">
          <div class="row row-flex">
            <span class="label">Raids I No. 9</span>
            <span class="righttxt"><a class="link" href="bgm-calamity-unbound.html">Calamity Unbound</a></span>

      JP:{
        langLabel:'JP',
        pageTitle:'大迷宮バハムート：邂逅編1',
        tabs:{story:'ストーリー', req:'必要条件', acq:'開放クエスト', unlock:'後続クエスト', bgm:'ＢＧＭ', comments:'コメント'},
        story:`<p><strong>01:24 カットシーン 1</strong></p><p>アリゼーは、霊災が残した傷跡のただ中で、ここに満ちる過剰なエーテルのせいで息もできないほどだと告げる。</p><p>そして、汚染されたクリスタルを指し示し、こんなものを見たことがあるかとあなたに問いかける。五年前、エーテルの大河の流れが取り返しのつかない形で変えられたとき、同じようなクリスタルが各地に現れたのだという。さらにアリゼーは、その変化を引き起こしたものの一つを見せる――小さき月、ダラガブの欠片だ。</p><p>古代アラグは、バハムートを閉じ込める天の牢獄としてダラガブを創り上げたのだとアリゼーは語る。ガレマールがそう呼ぶ名は「メテオ」だという。</p><p>その落下は大地に深い傷を刻み、いまなお癒えぬ傷が汚染されたクリスタルとして残っている。驚くべきことに、ダラガブの内部防衛機構は今も機能しており、それはアラグの技術の冴えを示すものだと彼女は言う。ガレマールがその高度な技術を手に入れようとしているのは間違いない、と。</p><p>あなたはこれから、時の砂に埋もれてきた秘密と向き合うことになる。危険が待ち受けているかもしれないが、もう引き返せない――霊災の真相は、すぐ手の届くところにあるのだとアリゼーは告げる。</p><p><strong>03:47 カットシーン 2</strong></p><p>アリゼーは息をのみ、「神よ……」と祈るように呟きながら、あなたとともに眼前の光景を見つめる。</p><p>天すら呑み込まんばかりの、漆黒の翼――その姿に、彼女は言葉を失いかける。あれは、バハムートにほかならないという。五年前、エオルゼアを荒廃させた蛮神の翼だと、アリゼーはあなたに告げる。</p><p>カルテノーにて、彼女の祖父は十二神の力を借り、バハムートを再び封じようとした。だが、邪竜はあまりにも強大で、ほどなく拘束を破ってしまったのだという。</p><p>それでも、バハムートは破壊を再開することなく姿を消した――行方は誰にもわからなかった、今日この時までは。だがアリゼーには腑に落ちない。もしバハムートが蛮神なら、なぜ肉体を保っているのか。祖父が討ち果たしたのか、それとも別の理由があるのか。真実を知るために、あなたは前へ進まねばならないと、彼女は言う。</p>`,
        req:`<div class="stack">
          <div class="row"><strong>プレイヤー数：</strong>1～8人（タンク2／ヒーラー2／DPS4）</div>
          <div class="row"><strong>クラス／ジョブ：</strong>ファイター／ソーサラー</div>
          <div class="row">※ リミテッドジョブは、規定人数の事前結成パーティまたは制限解除パーティかつ規定が許可する場合のみ参加可。</div>

          <div class="row">※ 最低人数を満たすパーティではロール／IL制限が解除されます。</div>
        </div>`,
        acq:`<div class="stack">
          <div class="row"><a class="link" href="primal-awakening.html">新たな蛮神</a></div>

        unlock:`<div class="stack">
          <div class="row"><a class="link" href="the-binding-coil-of-bahamut-turn-2.html">大迷宮バハムート：邂逅編2</a></div>
        </div>`,
        bgm:`<div class="stack">
          <div class="row row-flex">
            <span class="label">Raids I No. 9</span>
            <span class="righttxt"><a class="link" href="bgm-calamity-unbound.html">試練を超える力</a></span>
          </div>
        </div>`
      },

      ZH:{
        langLabel:'ZH-TW',
        pageTitle:'巴哈姆特大迷宮：邂逅篇 1',
        tabs:{story:'故事概要', req:'需求條件', acq:'解鎖任務', unlock:'後續任務', bgm:'BGM', comments:'留言'},
        story:`<p><strong>01:24 過場動畫 1</strong></p><p>Alisaie 和你站在災厄留下的傷痕之中，這裡以太過於濃烈，讓她幾乎喘不過氣。</p><p>她指向那些受污染的水晶，問你是否見過這樣的東西。她說，五年前，當以太的大河被不可逆地改變流向時，這類水晶便在整個世界各處顯現。接著 Alisaie 要你看清其中一個造成改變的源頭——較小的月球 Dalamud 的碎片。</p><p>她告訴你，Ancient Allag（古代亞拉戈帝國）打造了 Dalamud——而在 Garleans 的稱呼裡，它名為 Meteor——用來作為囚禁 Bahamut 的天體牢獄。</p><p>Dalamud 的墜落對大地造成了深重的創傷，而這些受污染的水晶正是傷口尚未癒合的證明。即使到了現在，Dalamud 的內部防衛機制仍在運作，足以見得 Allagans（古代亞拉戈帝國）的巧思與技術；她也篤定 Garleans 正打算奪取這些先進成果。</p><p>你們即將直面那些埋藏於歲月沙塵之下的秘密。前方也許危機四伏，但你們已走到這一步，沒有回頭路——災厄的真相，就在觸手可及之處。</p><p><strong>03:47 過場動畫 2</strong></p><p>Alisaie 倒抽一口氣，低聲祈求眾神保佑，你和她一同望向眼前的景象。</p><p>她說，那是足以吞沒蒼穹的黑暗之翼——光是看著，就讓人幾乎無法呼吸。她告訴你，這些翅膀只能屬於 Bahamut：五年前讓 Eorzea 化為焦土的 primal。</p><p>在 Carteneau，她說她的祖父曾藉由十二神的力量，試圖再次把 Bahamut 囚禁起來；可惜那頭兇龍過於強大，很快便掙脫束縛。</p><p>然而 Bahamut 並沒有回到他原本的毀滅之路，而是就此消失，無人知道他去了哪裡——直到今天。可 Alisaie 仍然想不通：如果 Bahamut 真的是 primal，為何他還能保有肉體？是她的祖父擊敗了他，還是另有原因？要弄清真相，你必須繼續往前走。</p>`,
        req:`<div class="stack">
          <div class="row"><strong>人數：</strong>1–8 人（2 坦克／2 治療／4 輸出）</div>
          <div class="row"><strong>職業：</strong>戰鬥職業／魔法職業</div>
          <div class="row">※ 限定職業僅能在事先組成符合人數條件的隊伍，或以無限制規則參加，且需符合任務規則允許的情況。</div>
          <div class="row"><strong>等級：</strong>50</div>
          <div class="row">※ 進入任務時將自動進行等級同步。</div>
          <div class="row"><strong>平均裝備品級：</strong>70</div>
          <div class="row">※ 同步時，所有裝備數值將自動調整。</div>
          <div class="row">※ 當隊伍僅達最低人數時，角色定位與裝備品級限制將解除。</div>
        </div>`,
        acq:`<div class="stack">
          <div class="row"><a class="link" href="primal-awakening.html">Primal 甦醒</a></div>
        </div>`,
        unlock:`<div class="stack">
          <div class="row"><a class="link" href="the-binding-coil-of-bahamut-turn-2.html">巴哈姆特大迷宮：邂逅篇 2</a></div>
        </div>`,
        bgm:`<div class="stack">
          <div class="row row-flex">
            <span class="label">Raids I No. 9</span>
            <span class="righttxt"><a class="link" href="bgm-calamity-unbound.html">超越試煉的力量</a></span>
          </div>
        </div>`
      }
    };

    const langToggle = document.getElementById('langToggle');
    const pageTitle  = document.getElementById('pageTitle');
    const tabBtns    = [...document.querySelectorAll('.tab-btn')];
    const panels = {
      story : document.getElementById('panel-story'),
      acq   : document.getElementById('panel-acq'),
      req   : document.getElementById('panel-req'),
      unlock: document.getElementById('panel-unlock'),
      bgm   : document.getElementById('panel-bgm'),
      comments: document.getElementById('panel-comments')
    };

    function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
    function applyLang(lang){
      const t = i18n[lang] || i18n.EN;
      pageTitle.textContent = t.pageTitle;
      langToggle.textContent = `🌐 ${t.langLabel}`;
      tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
      const activeBtn = tabBtns.find(b=>b.getAttribute('aria-selected')==='true') || tabBtns[0];
      renderPanel(activeBtn.dataset.tab, lang);
      if (activeBtn && activeBtn.dataset.tab === 'comments') loadGiscusForCurrentLang();
    }

    function renderPanel(key, lang){
      const t = i18n[lang] || i18n.EN;
      Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
      panels[key].classList.add('active');
      if (key !== 'comments') {
        panels[key].innerHTML = t[key];
      } else {
        loadGiscusForCurrentLang();
      }
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click',()=>{
        tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab, getLang());
      });
    });

    langToggle.addEventListener('click',()=>{
      const cur=getLang();
      const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
      localStorage.setItem(LANG_KEY,next);
      applyLang(next);
    });

    applyLang(getLang());

    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };
    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }
  </script>
