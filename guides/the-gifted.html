<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`The Gifted`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>With everyone’s tireless efforts finally bearing fruit, you hear Minfilia say that the time has come to bid farewell to Vesper Bay. To avoid drawing attention, the journey to Revenant’s Toll will be made in small groups, leaving at irregular intervals. She assures you that the Scions still intend to operate openly in the future, but for this one move, caution must come first—traveling north as a single caravan would only invite attack.</p><p>Minfilia tells you it feels right that she be the last to leave, and asks you to remain with her until the end. Once she departs, the Waking Sands will formally cease to be your headquarters, and the premises will be entrusted to Urianger. She admits she had thought to relinquish the place, but Urianger was adamant, and she could not bring herself to refuse—these walls have witnessed some of the brightest and darkest moments in the Scions’ history, and perhaps they should not be forsaken entirely.</p><p>Urianger will stay behind to devote himself to studying the nature of primals, and Minfilia prays that by the grace of the Twelve he may one day find the lasting solution you have long sought. He will not be alone—Alisaie will continue to work closely with him, and they have promised to contact you without hesitation should they need help. Still, Minfilia cannot shake the feeling she has forgotten something important, and asks you to speak with Urianger to see if any tasks remain undone.</p><p>When you approach him, Urianger welcomes you but insists he requires no assistance, urging you to leave unburdened by concern for him. He notes the urgency in your expression—perhaps you wish to quit these halls without delay, believing this chapter finished and the Waking Sands best consigned to history. Yet he reflects that in mankind’s eagerness to seize the future, the past is too readily set aside, and pride can turn wisdom to ignorance while those who lurk in shadow remain hidden. He quickly adds that he means no offense: your conduct has been beyond reproach, and despite your strength and victories you have never imagined yourself above the failings of those who came before.</p><p>Before he can finish, a sudden cry tears through the air—Minfilia’s voice from the solar. Urianger rushes toward her, fearing for the Antecedent, and you follow. In the solar, Minfilia struggles to speak as the Echo takes hold, and a white-robed Ascian stands before her. He speaks of Louisoix Leveilleur with reverence, calling him remarkable and wise beyond mortal measure, and notes how readily Minfilia can see him—proof, he says, that she is gifted.</p><p>Minfilia realizes this Ascian is unlike the others, marked by different robes, and he explains that he wears the robes of an emissary. He claims he bears no quarrel with her, unlike the one who came before. When Minfilia names Lahabrea, the emissary calls him a warrior who fought and fell, and says he may yet learn from his mistakes—there is no cessation or oblivion, only expulsion. He speaks as though confirming what Minfilia already knew, leaving her shaken and searching for meaning.</p><p>Nearby, Tataru speaks up, ready to depart if nothing else remains, admitting it feels strange to leave after everything that happened here, but believing you will soon grow used to Revenant’s Toll. The white-robed Ascian remarks that this reaction is to be expected—she lacks both the gift and the knowledge, and to her, the Ascians are indistinct. He explains that tales become diluted by time and telling, and that knowledge shapes expectation, which in turn colors perception. Even Minfilia, he says, could not truly see when she was younger; the Echo grants clarity and focus, and in time she may learn to see the Ascians as they are rather than a crude approximation.</p><p>Minfilia protests that he knows nothing about her, and challenges him—Lahabrea did not think so highly of the Echo. The emissary dismisses Lahabrea as wrong about many things, calling the Echo a gift Minfilia has yet to master. If you and his people truly understood one another, he says, there would be no strife, for you would be of one mind. With that, he declares he leaves in peace, hoping you might meet again as friends. Minfilia demands he stop, and another cry escapes her as the encounter ends. The emissary muses that perhaps he was indelicate, and wonders if it was also by Hydaelyn’s hand that Minfilia survived the Ardor.</p><p>When the Echo releases her, Minfilia groans that there is no need to explain. She insists he did her no lasting harm and whatever his intent, it was not to kill. Tataru rushes in, alarmed, offering a tonic, but Minfilia turns sharply to Urianger with orders: send word to the Students of Baldesion and have them scour the archives—especially forbidden tomes—for any reference to an Ascian robed in white. Urianger admits he glimpsed a figure clad in white leaving the Waking Sands moments earlier, and wonders why an Ascian would act so brazenly when they are wont to use teleportation magicks. Minfilia refuses to dwell on the question—she commands you to find him, to turn every stone in Vesper Bay if you must.</p><p>As you hurry out, Minfilia warns that though he spoke of peace, she believes his words hide true intent. Tataru, shaken, begs you to tell her he is gone and that you are safe. Urianger urges you onward as well, saying he cannot know what the visitation portends, but it is clear you must pursue the Ascian. He tells you not to fear for the Antecedent’s well-being—if the fiend returns, the Waking Sands will not be caught unprepared again.</p><p>In Vesper Bay, the white-robed Ascian appears before you. He says he has been told you are the Warrior of Light, but he wishes to know for himself. He will walk north, and you may choose to follow—but if you do, you will be waylaid, and may even perish. If you survive, he promises, you will speak again. As you press on, a chilling refrain echoes around you: you are being judged.</p><p>At last, he faces you once more and calls your endurance remarkable, thanking you for granting him this indulgence. None but one who bested Lahabrea, he says, could withstand such an examination. He asks if the laws of man have grown so twisted that laying hands upon an emissary is permitted, and reminds you that you witnessed his audience with the Antecedent—he claims he acted only in self-defense. Though he acknowledges Lahabrea’s misdeeds, he says those very acts revealed you: one so strong in the gift that you could cast the Ascians out.</p><p>He tells you your Mother still favors you, but insists you must feel it—Hydaelyn’s influence wanes, and her strength will soon be spent. These lands, these people, this world, he says, will soon change. As it was, so shall it be again; as it should always have been. You may doubt his claims and question his motives, but he asks that you believe him when he speaks his name: Elidibus, emissary, bearer of the word of the one true god—and he promises you will meet again.</p><p>When you return, Tataru anxiously demands to know where you were and whether you found the man in white, then urges you back—Minfilia is waiting. Urianger, relieved by your return, tells you the Antecedent awaits and bids you go to her without delay. In the solar, Minfilia thanks the gods you are safe, admitting she feared she had sent you to your doom. When you tell her he was waiting for you, she is stunned, pressing for what he said. The phrase “As it was, so shall it be again” leaves her with only more questions—she can glean little from Elidibus’s words beyond a hint of disdain for Lahabrea, and she exhales, resigned to answers still out of reach.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row">Quest Giver <span class="muted">Minfilia, The Waking Sands (X:6.9, Y:6.1)</span></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="on-the-properties-of-primals.html">On the Properties of Primals</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="build-on-the-stone.html">Build on the Stone</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'失われし伝承と存在',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>関係者一同の尽力が実を結び、あなたはミンフィリアから「ヴェスパーベイに別れを告げる時が来た」と告げられる。余計な注目を避けるため、レヴナンツトールへは少人数に分かれ、不規則な間隔で出発するという。今後は公然と活動していく方針に変わりはないが、今回に限っては警戒が最優先であり、重い隊商のように一斉に北へ向かえば襲撃を招くだけだ、と彼女は言う。</p><p>ミンフィリアは、自分が最後に出発するのが筋だと考えており、あなたにも最後までそばに残ってほしいと頼む。彼女が去れば「砂の家」は正式に本部ではなくなり、建物はウリエンジェの管理に委ねられる。手放すつもりだったが、彼が強く主張し、断る気持ちになれなかったという。そこは組織の歴史における最良の瞬間も最悪の瞬間も見届けてきた場所であり、完全に捨て去らないほうがよいのかもしれない――そう静かに語る。</p><p>ウリエンジェはここに残り、蛮神の性質の研究に力を注ぐ。十二神の加護のもと、長らく求めてきた恒久的な解決策へ辿り着く日が来るはずだ、とミンフィリアは祈る。彼はひとりではなく、アリゼーも引き続き彼と密に協力し、助けが必要なら躊躇なく連絡すると約束している。それでもミンフィリアは何か大切なことを忘れている気がしてならず、あなたに「未了の用がないか、ウリエンジェに確かめてほしい」と頼む。</p><p>あなたが声をかけると、ウリエンジェは歓迎しつつも「助力は不要」と言い、案じることなく立ち去るよう促す。そして、あなたの顔に早くここを去りたい思いが表れていると見抜き、この章は終わったのだと考えて「砂の家」を歴史の彼方へ追いやろうとしているのではないか、と語る。未来を掴もうとする人の熱意は、いとも容易く過去を置き去りにする――彼はそう嘆き、誇りが知恵を無知へ押し流し、影に潜む者たちが見えないままになり得ることを示唆する。だが彼はすぐに、あなたを非難しているのではないと告げる。数々の勝利と卓越した力を持ちながら、あなたは決して驕らず、先人の過ちを超越した存在だと思い上がったこともない――その姿勢を、彼は確かに認めている。</p><p>その言葉が途切れるより早く、鋭い叫び声が響く。ミンフィリアの声が、応接室から聞こえたのだ。ウリエンジェは「盟主に何かあったのか」と駆け出し、あなたも後を追う。応接室ではミンフィリアが言葉を絞り出そうとするなか、エコーが始まり、白衣のアシエンが彼女の前に立っていた。彼はルイゾワ・ルヴェユールを「驚くべき人物」と評し、死の前に会いたかったと語る。ミンフィリアが「アシエンがここに？」と驚くと、彼は彼女が自分を見分けられることを「資質の証」として認める。</p><p>ミンフィリアは、そのアシエンが他と違う装いであることに気づく。彼は自らを「使者」とし、その衣は使者のものだと言い、先に来た者とは異なり争うつもりはないと告げる。ミンフィリアがラハブレアの名を出すと、彼は「戦士であり、戦い、倒れた」と述べ、なお学ぶ余地があると語る。そして「終わりも忘却もない、あるのは追放だけだ」と、ミンフィリアが既に知っていたはずの事実を確認するかのように言い残し、彼女の動揺を深める。</p><p>傍らでタタルは出発の支度が整ったと声をかけ、ここを離れるのが不思議な気持ちだと漏らしつつも、やがてレヴナンツトールに慣れるだろうと自分に言い聞かせる。白衣のアシエンは、彼女には資質も知識もなく、自分たちが区別できないのは当然だと言う。影も肉体も形もない存在についての真実は、時と語り継ぎによって薄まる――知識が期待を生み、期待が知覚を染めるのだ、と彼は説く。エコーは視界を澄ませ、焦点を与える力であり、やがてミンフィリアは粗雑な像ではなく本当の姿としてアシエンを捉えられるようになる、と。</p><p>ミンフィリアは「あなたは私を何も知らない」と突き放し、ラハブレアはエコーを高く評価していなかったと反論する。だが白衣のアシエンは、ラハブレアは多くの点で誤っていると断じ、エコーは確かに「賜物」だが、ミンフィリアはまだ使いこなしていないだけだと言う。もし互いを理解できるようになれば、両者の間に争いはなくなる――同じ心になるのだから、と。そして彼は平和のうちに去り、友として再会しようと告げる。ミンフィリアが止めようとした瞬間、彼女は再び叫び声を上げ、白衣のアシエンは「言い方がまずかったか」と呟きつつ、ハイデリンがその子らを守ることや、灼熱の災いを生き延びたことにまで言及して姿を消す。</p><p>エコーが終わると、ミンフィリアは呻き、説明は不要だと言う。彼は致命傷を負わせるつもりではなかった、と彼女は断じる。駆けつけたタタルが心配して薬を勧めるが、ミンフィリアはウリエンジェに命じる。「バルデシオン委員会の人々」に連絡し、禁書を含む記録庫を調べ、白衣のアシエンに関する記述があればどんなに遠回しでも知らせよ、と。ウリエンジェは、白衣の人物が砂の家を出て行くのを見かけたと述べ、転移魔法を用いるはずのアシエンがなぜこれほど大胆なのかと訝しむ。ミンフィリアは理由など構わないと言い、あなたにヴェスパーベイを徹底的に探せと命じる。</p><p>あなたが急ぐなか、ミンフィリアは「和平を口にしても真意は別だ」と警告し、逃がすなと促す。怯えるタタルは、白衣の男が去ったのか、安全なのかとあなたに縋る。ウリエンジェも、これが何を意味するかは断じ得ないが、追跡すべきなのは明らかだと言い、盟主の身は案じるなと告げる。もし再び砂の家へ戻るなら、今度は不意を突かれはしない、と。</p><p>ヴェスパーベイで、白衣のアシエンはあなたの前に現れる。あなたは「光の戦士」と聞いているが、自分の目で確かめたいと言い、北へ歩くから追うかどうかはあなたが選べ、と告げる。ただし追えば待ち伏せされ、命を落とすかもしれない――生き延びたなら、また話そう、と。あなたが進む道すがら、「裁かれている」という不気味な言葉が繰り返し響く。</p><p>やがて彼は再びあなたに向き合い、あなたの耐え抜いた力を称え、この試みを許したことに礼を言う。ラハブレアを退けた者でなければ、この審査に耐えられない――そう言い、使者に手をかけることが許されるほど人の法は歪んだのかと問いかける。あなたが盟主との対面を見ていた以上、自分は自衛しただけだとも主張する。ラハブレアの所業は弁明しきれないが、それによって彼らはあなたという存在を見出した――賜物において強大で、アシエンを退けられる者を、と。</p><p>彼はさらに、あなたが「母」に今なお愛されているのは明らかだと言いながらも、ハイデリンの影響が弱まり、その力はほどなく尽きると告げる。世界は、人々は、まもなく変わる――かつてそうであったように、再びそうなるべきだ、と。動機を疑っても構わない、ただこの言葉だけは信じよ、と彼は名乗る。エリディブス――使者にして、唯一神の言葉を担う者。いずれまた会う、と言い残して姿を消す。</p><p>あなたが戻ると、タタルは行方を問い、白衣の男を見つけたのかと慌てながらも、盟主が待っていると急かす。無事の帰還に安堵したウリエンジェは、盟主があなたを待っているからすぐ向かえと告げる。応接室でミンフィリアはあなたの帰還を喜び、あなたを死地へ送ってしまったのではと不安だったと打ち明ける。白衣の男があなたを待っていたと知り、彼女は言葉を追い、「かつてそうであったように、再びそうなる」という意味を掴めずにいる。エリディブスの言葉は多くを示唆しながら、答えをほとんど与えない――ただ、ラハブレアへのある種の冷淡さだけが見えた。ミンフィリアは息を吐き、答えよりもさらに多くの疑問を抱えることになるのだと悟る。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row">ミンフィリア <span class="muted">砂の家 (X:6.9, Y:6.1)</span></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="on-the-properties-of-primals.html">邪なる手引き</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,

    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>在所有人的奔走與努力之下，Minfilia 終於能夠宣告：你們準備好要向 Vesper Bay 道別了。為了不引人注意，前往 Revenant’s Toll 的路程將以小隊分批、間隔不規則地出發。她也特別強調，未來你們依然會以更公開的方式展開行動，但這一次必須把謹慎放在第一位——若是拖著一支笨重的隊商一起往北，只會明擺著招來襲擊。</p><p>Minfilia 認為由她最後離開才合乎情理，也希望你能留下來陪她到最後一刻。等她啟程後，The Waking Sands 將正式不再是你們的總部，整個據點會交由 Urianger 照看。她原本打算放棄這處產業，但 Urianger 堅持要留下，她也不忍拒絕——這些牆壁曾見證你們組織歷史中最光亮、也最黑暗的時刻，也許不該就此完全捨棄。</p><p>Urianger 會留在這裡，專注研究 primals 的本質。Minfilia 祈願在 the Twelve 的庇佑下，他終有一天能找到你們長久以來追尋的「永久解方」。而他並不孤單──Alisaie 也會繼續與他密切合作；若他們需要協助，已保證會立刻聯絡你們。只是 Minfilia 心中仍揮之不去一種不安，總覺得自己忘了某件重要的事，因此請你去問 Urianger：是否還有什麼未完成的工作。</p><p>你去找 Urianger 時，他歡迎你，卻堅稱自己不需要任何協助，要你放心離開，不必為他的安危掛念。他看出你急著離開這裡，彷彿認定這段故事已經結束，這些大廳理應被收進歷史的檔案裡。可他也感嘆，人們一心想抓住未來，往往太輕易就把過去放下；無數先行者踏入未知之境，卻發現祖先留下的旗幟早已在歲月中褪色，而人仍沉醉於自己的發現。傲慢讓智慧退位、無知滋長，於陰影中潛伏的人也就更容易藏匿，彷彿永遠不會被真正看見。話說到這裡，他又立刻補上一句：別介意，他不是在責怪你——你的行止一向無可指摘；即便你擁有壓倒性的力量與諸多勝利，也從未自視甚高到以為自己超越了前人的過失。</p><p>然而話音未落，一聲尖叫驟然撕裂空氣──是 Minfilia 從 the solar 傳來的呼喊。Urianger 立刻衝去，擔心 Antecedent （Minfilia 的頭銜也就是「Scions of the Seventh Dawn」的領袖） 出了事，你也緊跟在後。到了 the solar，Minfilia 勉強想把話說完，Echo 卻在此刻開始發作；一名身披白袍的 Ascian 就站在她面前。他提到 Louisoix Leveilleur，稱他是非凡之人、智慧遠超凡人，甚至遺憾未能在他離世前相見。Minfilia 驚呼 Ascian 怎會出現在這裡，而對方則從容表示：她竟能如此迅速看清，確實是「有天賦」的 Antecedent。</p><p>Minfilia 察覺他與其他 Ascian 不同——袍服不一樣。白袍者承認自己穿的是「使者」的衣袍，並說與先前來者不同，他無意與她爭鬥。當 Minfilia 提到 Lahabrea，他只冷冷回應：Lahabrea 是戰士，他戰鬥、他倒下，但也許仍能從錯誤中學到教訓；而那位白袍使者也只是在「確認」她早已明白的事——沒有終止、沒有虛無，只有驅逐。Minfilia 聽得更困惑、更不安，卻又抓不住答案。</p><p>這時 Tataru 插話說大家已經準備好出發了；她也承認，在這裡發生過那麼多事，如今要離開確實有種說不出的奇怪，但相信很快就會習慣 Revenant’s Toll。白袍 Ascian 卻淡淡評語：這是理所當然的反應——她既沒有「天賦」也沒有「知識」，對她而言，你們眼前的存在根本無從分辨。他解釋，關於他們的傳說在時間與轉述中早已被稀釋；知識決定期待，期待又染色認知，所以她什麼也看不見。這世上除了極少數人以外皆是如此；就連 Minfilia 年少時也無法以不受遮蔽的眼睛看清。而 Echo 的賜予能帶來清晰與焦點，終有一天，她或許能看見 Ascian 真正的樣貌，而非這種粗糙的近似。</p><p>Minfilia 反駁說對方根本不了解她，並提到 Lahabrea 並不看重 Echo。白袍使者卻直言 Lahabrea 在許多事上都錯了；Echo 確實是「禮物」，只是 Minfilia 尚未掌握。若你們能真正掌握它，他說，兩個族群之間就不會再有紛爭——因為你們會成為同一個意志。接著他宣稱自己來去皆為和平，希望未來能以朋友之姿再會。Minfilia 要他停下，卻又一次發出尖叫；白袍者像是自言自語般說自己或許失言了，並感嘆 Hydaelyn 竟以如此堅決的意志，遮蔽 Her children 不受 His grace 所及；他也好奇，Minfilia 是否也是因 Hydaelyn 的手才得以在災厄中倖存。</p><p>Echo 結束後，Minfilia 痛苦呻吟，表示已無需解釋。她要你別擔心——對方並未造成長久傷害，而且不論他的真正意圖是什麼，都不像是為了殺她。Tataru 聽到叫聲匆忙趕來，焦急詢問是否需要休息、甚至想拿她的特製藥劑，但 Minfilia 立即轉向 Urianger 下令：通知 Students of Baldesion，讓他們翻查檔案，尤其是禁書；只要有任何關於「白袍 Ascian」的線索，不管多隱晦，她都要知道。Urianger 說自己不久前確實瞥見一名白衣身影離開 The Waking Sands，並困惑 Ascian 明明常用傳送魔法，為何這次會如此張狂。Minfilia 不在乎原因，只要你立刻去找——就算要把 Vesper Bay 的每塊石頭都翻過來也要把他揪出來。</p><p>你衝出去時，Minfilia 追著你喊：他說得像是和平，但她知道那只是掩飾，字句背後藏著真正的意圖——要你別讓他逃了。Tataru 仍心神不定，拉著你要你保證那人已經走了、你們是安全的。Urianger 也再次提醒你：他無法判斷這次造訪預示著什麼，但你追擊 Ascian 是毫無疑問的；至於 Antecedent 的安危不必掛念——若那惡徒膽敢再回 The Waking Sands，這次你們不會再毫無準備。</p><p>在 Vesper Bay，你終於再度面對那名白袍者。他說自己聽聞你是 Warrior of Light，但想親自確認。他會往北走，而你可以選擇是否跟上；可若你追上去，你會遭到埋伏，甚至可能喪命。只要你能活下來，你們就能再談。你一路前行時，耳邊反覆響起令人發寒的低語：你正在被審判……你正在被審判……你正在被審判……</p><p>最終，他再次現身，稱你的表現「非凡」，並感謝你允許他這份「任性」。他說，除了擊敗 Lahabrea 的人之外，沒有人能承受這樣的考驗；也質疑人類的法則是否扭曲到竟允許對使者動手。他提醒你見證過他與 Antecedent 的會面，並聲稱自己只是自衛；至於 Lahabrea 的行徑，即便在同伴之中也被視為特殊，但他也無法完全譴責——因為正是那些作為，讓他們發現了你：一名在這份「天賦」上如此強大、甚至能將 Ascian 驅逐出去的人。</p><p>他接著說，你的 Mother 仍偏愛你，這一點顯而易見，但你難道感覺不到嗎——Hydaelyn 的影響正在衰退，Her strength 很快就會耗盡。這片土地、這些人、這個世界都將很快改變。正如曾經那樣，也將再次如此；本就該一直如此。你可以懷疑他的主張、質疑他的動機，但他要你至少相信他接下來說的這一句：他名為 Elidibus，是使者、是真神之言的承載者，而你們終將再會。</p><p>你回來後，Tataru 急得質問你跑去哪裡了、是否找到白袍者，隨即又想起 Antecedent 正在等你，催你快回去。Urianger 見你平安歸來，感謝 the Twelve 的庇佑，並叫你立刻去 Minfilia 身邊。到了 the solar，Minfilia 鬆了一口氣，感謝諸神你回來了，坦言你離開後她一直擔心自己把你送進死地。當你說那名訪客竟在等你，她驚訝追問你們做了什麼、他說了什麼；而那句「As it was, so shall it be again (曾發生過的事，終將再次發生)」更讓她摸不著頭緒——他談得像是預兆，卻幾乎沒給出任何答案，只隱約透露出對 Lahabrea 的輕蔑。Minfilia 長嘆一聲，明白自己原本渴望的答案仍遙不可及，取而代之的，是更多、更沉重的疑問。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
