  EN:{

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>When you return after mastering Glower, Latool Ja confirms what Martyn had hoped for—you have succeeded. Martyn greets the news with open delight and says you have made him proud. Yet your achievement is not the only cause for celebration. He has just received word that Whastrach kept his promise: the medicine reached the Whalaqee, it worked, and those stricken by the illness have been saved. For one fleeting moment, it seems that both your training and Martyn’s desperate struggle to help the Whalaqee have finally borne fruit. That fragile relief shatters when a young man named Ceadda rushes in with urgent news. The medicine cured the sick, yes—but Whastrach used that very act to seize control of Lapis Canyon. As soon as Martyn hears the name of the place, he understands. Beneath that sacred land lies ceruleum, and Whastrach had been after it from the very beginning.</p><p>Martyn and Ceadda hurry to the ceruleum processing plant in northern Thanalan, and you follow after them. There, the truth is laid bare without shame. Whastrach insists he stole nothing. He claims the agreement was legal, that the elders signed willingly, and that his company only seeks to make use of what lies beneath the canyon. Ceadda answers with anger and grief. The elders could not read Eorzean, and they were told that without signing, they would receive no medicine. Worse still, the laws Whastrach invokes do not even belong to the Whalaqee. To them, Lapis Canyon is not merely land or a resource. It is sacred ground, central to their beliefs and their way of life. But Whastrach dismisses all of that as superstition. To him, the blue substance beneath the earth is fuel, nothing more, and leaving it untouched is a waste.</p><p>The argument only grows harsher. Martyn condemns Whastrach for preying on suffering and trying to destroy the Whalaqee’s way of life for profit. Whastrach answers that he is offering progress, wages, and a future in the modern world—far more, he claims, than Martyn ever could. Then another truth emerges. Royse herself funded the medicine, believing the venture might open profitable ties with the New World, though she had not known about the ceruleum mine. Caught between profit, conscience, and the people whose lives stand to be changed forever, she refuses to let the matter continue as a shouting match. Instead, she proposes a spectacle worthy of the Celestium: a contest in the arena between blue mages to decide the matter. If you win, her support for the Lapis Canyon project will end and the land will return to the Whalaqee. If Whastrach wins, Martyn must persuade them to accept the development.</p><p>Martyn rejects the idea at once, furious that outsiders would presume to decide the fate of the Whalaqee through combat. Yet Ceadda speaks up and changes the shape of the moment. Among his people, too, there exists a tradition of settling deadlock through a contest of strength between chosen representatives. Since they stand in Eorzea, he says, he has no choice but to ask you to fight on their behalf. Whether you answer for justice, for Martyn, or in stunned disbelief at how far events have spiraled, the path before you is set. Royse wastes no time turning even this crisis into a performance. She outfits you for the arena, gives Whastrach a grand new stage name, and declares that your debut in the Masked Carnivale will be the clash that settles everything.</p><p>Once the preparations begin, the weight of what lies ahead settles over all of you in different ways. Whastrach coolly warns that he will not hold back. Ceadda pleads with you to defeat him and make him see reason. Royse, ever theatrical, says you are ready to enter the Masked Carnivale, though she advises you to test yourself against lesser opponents before facing your true rival. Martyn, for all his frustration and regret, finally turns his full faith toward you. He admits that Whastrach was always the stronger mage, but says you have a real talent for blue magic, and that with the right spells you can bring him down. Then, before the chirurgeon notices his absence, he returns to continue healing. Your training has carried you to the threshold at last. The arena now lies open before you, and beyond it waits the battle that will decide far more than your own debut.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>グラワーを修得して戻ったあなたに、ラトージャはマーティンの言葉どおりうまくいったのだと告げる。その報せを聞いたマーティンは心から喜び、あなたがよくやってくれたと誇らしげに言う。だが、祝うべきことはそれだけではなかった。ワストラッシュが約束を守り、薬がウァラキーのもとへ届き、病に倒れていた者たちも救われたという知らせが入ったのだ。あなたの修練も、マーティンが必死に続けてきた奔走も、ようやく報われたかに思われた。その安堵を打ち砕くように、若者のセアダが駆け込んでくる。薬は確かに効いた。だがワストラッシュは、そのことを利用してラピスキャニオンを自分のものにしたのだという。その地名を聞いた瞬間、マーティンはすべてを悟る。あの聖地の地下には青燐水が眠っている。最初から彼の狙いは、それだったのだと。</p><p>マーティンとセアダは北ザナラーンの青燐精製所へ向かい、あなたもそのあとを追う。そこで明かされたのは、言い逃れの余地もない本心だった。ワストラッシュは、自分は何も奪っていないと言い張る。契約は合法であり、長老たちも自ら署名したのだと。だがセアダは怒りを込めて反論する。長老たちはエオルゼア文字を読めず、署名しなければ薬は渡せないと迫られたのだという。しかも、ワストラッシュが盾にする法そのものが、ウァラキーの民に属するものではない。彼らにとってラピスキャニオンは、単なる土地でも資源でもなく、信仰と暮らしの中心にある聖なる場所だった。けれどワストラッシュは、そんなものは迷信にすぎないと切り捨てる。地中に眠る青い物質は燃料でしかなく、掘り出されずにいるほうが無駄なのだと。</p><p>言い争いはさらに激しさを増していく。マーティンは、苦しむ者たちの足もとを見て、その生き方まで金のために踏みにじろうとするワストラッシュを激しく非難する。対するワストラッシュは、自分が与えようとしているのは進歩であり、賃金であり、近代社会の未来なのだと応じる。それどころか、マーティンよりよほど多くを与えられるとさえ言い放つ。そこへロイズもまた、もうひとつの事実を明かす。薬の製造資金を出していたのは彼女だった。新大陸との取引には見込みがあると考えていたが、青燐水の採掘計画までは聞かされていなかったのだという。利益も、良心も、そしてウァラキーの未来も絡み合うなかで、彼女はこの争いをただの口論のまま終わらせようとはしなかった。セレスティウムらしく、青魔道士どうしによる闘技で決着をつけようと言い出す。あなたが勝てば、ラピスキャニオン開発への支援は打ち切られ、土地は本来の持ち主へ戻る。ワストラッシュが勝てば、マーティンが仲介役となって、ウァラキーを開発受け入れへと説得することになる。</p><p>その提案に、マーティンは怒りを隠さず反対する。ウァラキーの運命を、エオルゼアの者たちが勝手に闘技で決めてよいはずがない。だが、そこでセアダが静かに口を開く。彼らのあいだにも、意見がどうしてもまとまらないときには、それぞれの代表が力を競って決めるというしきたりがあるのだという。ここがエオルゼアである以上、自分たちに代わって戦える者として、あなたに頼むほかない。正しさのためであれ、マーティンのためであれ、あるいは事の大きさに戸惑いながらであれ、あなたがその役目を引き受けたことで、進むべき道は定まる。ロイズは間髪入れず、この危機すら舞台へ変えていく。あなたには闘技場用の衣装が与えられ、ワストラッシュには新たな舞台名が与えられ、マスクカーニバルでの初陣こそがすべてを決する一戦になるのだと宣言される。</p><p>そうして準備が始まると、それぞれの胸に別々の重みが沈んでいく。ワストラッシュは、観衆の前で容赦なく叩きのめすと冷ややかに告げる。セアダは、どうか彼を打ち破り、目を覚まさせてほしいと切実に願う。ロイズは、まずはアズルマギアに挑む前に、ほかの相手で腕試しをしておくべきだと助言しながらも、ついにあなたがマスクカーニバルへ立つ時が来たのだと告げる。そしてマーティンは、悔しさも不安も抱えたまま、最後にはあなたを信じるほうへと気持ちを向ける。ワストラッシュのほうが優れた青魔道士だったことは認めながらも、あなたには本当の才がある、正しい魔法を揃えればきっと勝てると背中を押す。そうして彼は療養へ戻っていく。修練はついに舞台の入口へ届き、その先には、あなた自身の初陣であると同時に、多くのものの行く末を左右する戦いが待っているのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> マーティン <small class="muted">（ウルダハ：ザル回廊, X:12.5, Y:13.0）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="blue-gold.html">青天の霹靂</a></div><div class="row">青魔道士 Lv 50～</div><div class="row"><b>受注に必要なアクション</b> グラワー</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="turning-over-a-blue-leaf.html">藍より青し</a></div></div>`

  ZH:{
    langLabel:'ZH',
    pageTitle:'第二代戴著青魔面具的人',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>當你學會 Glower 回來後，Latool Ja 立刻確定你已經成功做到 Martyn 所說的事。Martyn 聽見後難掩欣喜，直說你沒有辜負他的期待。但值得高興的還不只這一件。他剛收到消息，說 Whastrach 果然信守承諾，把藥送到了 Whalaqee 那裡，而且藥也確實生效，染病的人全都得救了。那一刻，你的修行與 Martyn 為了救人一路苦撐下來的努力，似乎終於迎來了回報。可這份安心只維持了短短一瞬。名叫 Ceadda 的年輕人匆忙趕到，帶來的不是後續的喜訊，而是新的危機，Whastrach 確實帶去了藥，卻也藉此奪走了 Lapis Canyon。Martyn 一聽見那個地名便立刻反應過來。那片聖地的地下埋藏著 ceruleum，而 Whastrach 從一開始真正想要的，正是那裡的資源。</p><p>你跟著 Martyn 與 Ceadda 一路趕到 northern Thanalan 的 ceruleum processing plant。到了那裡，Whastrach 幾乎毫不掩飾自己的立場。他堅稱自己不是偷，也不是搶，所有事情都建立在一紙合法契約之上。可 Ceadda 的憤怒立刻揭開了所謂「合法」背後的真相。Whalaqee 的 elders 根本看不懂 Eorzean 文字，卻被逼著在「不簽就拿不到藥」的情況下按下名字；更何況，那套法律本來就不屬於 Whalaqee。對 Ceadda 而言，Lapis Canyon 從來不只是土地，也不是可供買賣的資源，而是整個族群信仰與生活的核心。可 Whastrach 對這一切只有不耐與輕蔑。在他眼中，所謂「星球之血」不過就是燃料，埋在地底下毫無意義，真正有價值的是把它開採出來，投入更大的發展之中。</p><p>爭執很快升高。Martyn 無法容忍 Whastrach 趁著 Whalaqee 受苦時奪走他們最珍視的東西，更無法接受他把別人的信念與生活方式斥為迷信，只為了滿足自己的貪婪。Whastrach 卻反過來主張，自己給的是機會，是薪資，是進入現代世界的未來，遠比 Martyn 那種只會空談保護的人更實際。就在雙方互不退讓之際，Royse 也終於現身，並親口承認，Whastrach 製藥所需的資金背後有她的支持。她原本看中的，是與 New World 展開交易的可能性，卻沒想到事情竟已延伸到 ceruleum 礦場的開發。面對眼前這場糾纏著利益、救命之恩、族群信仰與土地歸屬的衝突，她沒有讓爭論繼續失控，而是以她一貫的方式，提出了一個近乎荒唐卻又無法忽視的解決辦法──讓 blue mage 在競技場上決勝負。若你獲勝，她就中止對 Lapis Canyon 計畫的資助，土地也歸還給原本的主人；若 Whastrach 勝出，Martyn 就必須作為中間人，說服 Whalaqee 接受開發。</p><p>Martyn 當場反對。他憤怒地指出，Whalaqee 的命運不該由外人用這種方式擅自決定。可 Ceadda 卻在此時開口，讓事情出現了另一層意義。他說，在 Whalaqee 的傳統中，當兩方始終無法達成共識時，也會由各自的代表出面，以力量競爭來分出結果。既然現在身在 Eorzea，他別無選擇，只能拜託你代表他們而戰。不論你是為了正確的事、為了 Martyn，還是帶著難以置信的心情被推到這一步，你終究接下了這個角色。Royse 也立刻把這場危機轉化成舞台上的宣傳。她替你安排了服裝，替 Whastrach 換上新的演出名號，並宣告你在 Masked Carnivale 的首次登場，將會成為決定一切的那場對決。</p><p>而在真正踏上那個舞台之前，每個人都以自己的方式承受著即將到來的重量。Whastrach 冷靜地警告你，他不會在眾人面前手下留情。Ceadda 則把全部希望壓在你身上，懇求你一定要打敗他，讓他回頭。Royse 一面說你已經準備好能踏入 Masked Carnivale，一面又提醒你，在真正面對 Azulmagia 之前，最好先挑些沒那麼棘手的對手試試自己的本事。至於 Martyn，儘管嘴上仍滿是懊惱與不甘，最後還是把信任真正交給了你。他承認 Whastrach 一直都是更強的 blue mage，但也直說你在 blue magic 上有真正的天分，只要準備對了法術，你沒有必要害怕他，反倒該讓他害怕你。說完這些後，他還是得回醫務室繼續休養，只能盼著到時自己有機會離開病床，親眼看見你的表現。你的修行到這裡，終於真正走到了競技場的門前，而那扇門後等待著你的，已不只是一次初登場而已，而是一場會左右他人未來的戰鬥。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
