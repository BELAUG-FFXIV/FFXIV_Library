    story:`<div class="clamp" data-collapsed="true">
<p>You learn from Ellie that the duelist’s next declared target is the Treaty-Blade—once part of an Ishgardian noble’s collection, now purchased by an Ul’dahn collector living in Vesper Bay. She means to be there when the duelist strikes, and invites you along—but first, she needs a way to win the collector’s attention.</p>
<p>Ellie leads you to Camp Drybone for rare flowers, and has you choose an Althyk lavender. Before you can leave, you witness a sharply dressed inspector—Briardien—cut through a heated dispute with cold logic, calling out a pair’s lies and pointing out that Amalj’aa don’t shoot fleeing, unarmed merchants; they capture them and temper them. When he’s done, even Ellie admits he’s competent.</p>
<p>With the flower in hand, you approach Durilda in Vesper Bay—only to be met with contempt. She dismisses you as a common adventurer and scorns gifts that wither, insisting she values beauty that endures. Ellie forces the warning through anyway: the duelist is coming for the Treaty-Blade. Durilda is unimpressed—she has guards, she reads the Mythril Eye, and she has already retained “a certain gentleman.”</p>
<p>At that moment, Hildibrand dramatically declares himself her guardian, swearing he will not rest until the fiend is brought to justice. Durilda’s patience snaps—yet Briardien arrives as well, late and unapologetic, introducing himself as a consulting inspector after “busy solving a murder.” He recognizes Hildibrand and Nashu at once, derides them as amateurs, and makes it clear he has no interest in their theatrics.</p>
<p>Before the standoff can settle, Durilda’s servant Maria returns in distress—she dropped a priceless vase into the water after being frightened by a strange flying creature. Durilda orders her out to search, but Hildibrand insists on going in her stead, certain this will earn Durilda’s respect and open the way to the duelist. Maria explains she dropped the vase in Nophica’s Wells; Ellie breaks away to follow Briardien, telling Maria to run to you if she’s afraid.</p>
<p>You search the area and question those nearby, hearing again and again that anything fallen from the bridge would be swept downstream—and that a queer winged beast has been seen. A flamboyant man rages about a “thieving demon bird,” then reveals he chased it to the water and, in his haste, stepped on Maria’s vase. With no time for blame, you gather fragments, and when you bring what you’ve found, Hildibrand judges it sufficient—confident that someone has done “miracles with far less.”</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>エリーは、武器怪盗が次に狙うと宣言した標的を突き止めている。それは「契約の剣」――イシュガルドの貴族が所蔵していた品であり、いまはベスパーベイに住むウルダハの収集家が買い取ったという。武器怪盗が動く瞬間に立ち会うため、エリーは取材者として彼女に近づくつもりで、あなたにも同行を促す。</p>
<p>ただし、その女主人は機嫌が難しいらしい。エリーはまずキャンプ・ドライボーンで希少な花を用意すると決め、あなたにアルジクのラベンダーを選ばせる。そこであなたは、別件の揉め事に割って入る一人の男――ブリアルディアンの推理を目の当たりにする。彼は相手の手のまめから弓の使い手であることを見抜き、アマルジャは逃げる商人を矢で射るのではなく捕らえて蛮神に心を奪わせるのだと言い切って、偽りを暴いて去っていく。</p>
<p>花を携え、あなたとエリーはベスパーベイのドリルダのもとを訪ねる。だがドリルダは、あなたを下賤な冒険者と切り捨て、花の美しさは移ろうものだと嘲る。エリーは武器怪盗が「契約の剣」を狙っていると告げるが、ドリルダはミスリルアイを読んで把握していると言い、護衛も雇っていると鼻で笑う。</p>
<p>さらにドリルダは、すでに「ある紳士」を雇ったのだと言い放つ。そこへヒルディブランドが現れ、己こそが守護者だと大仰に誓い、悪を討つまで眠りも休みもしないと言い立てる。しかし遅れて現れたブリアルディアンは、顧問調査官として名乗り、腐臭と硝石の匂いを嗅ぎ取って状況を測ると、ヒルディブランドとナシュを素人と断じて一蹴する。</p>
<p>言い争いが収まる間もなく、召使いのマリアが泣きそうな顔で戻り、王家ゆかりの高価な花瓶を落としてしまったと告げる。ドリルダは激怒してマリアを探しに行かせようとするが、ヒルディブランドは代わりに行くと申し出て、これで信頼を得られると豪語する。マリアは橋を渡る途中で奇妙な飛行生物に怯え、ノフィカの井戸に落としたのだと説明し、エリーはブリアルディアンを追うため離れる前に、危険ならあなたを頼れとマリアに言い含める。</p>
<p>あなたは周辺で聞き込みを行い、落とし物は川下へ流されるという話と、妙な翼の獣の目撃談を得る。そこへ、盗鳥を呪うギルガメッシュが現れ、武器を奪われたと憤りをぶつける。追跡の最中に花瓶を踏み砕いたのは自分だと判明し、あなたは破片を集めるしかなくなる。集めた破片を持ち帰ると、ヒルディブランドはそれで十分だと言い切り、これくらいで足りぬはずがないと胸を張る。</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>Ellie 告訴你，武器怪盜公開點名的下一個目標已經查明——那把 Treaty-Blade，原本屬於 Ishgard 貴族的收藏，如今被一位住在 Vesper Bay 的 Ul’dah 收藏家買下。Ellie 打算以 Mythril Eye 記者的身分親自盯場，等對方出手時抓住第一手線索，也要你一起同行。</p>
<p>不過，想接近那位收藏家並不容易。Ellie 聽說她偏愛稀有花卉，便先帶你到 Camp Drybone 採買，並要你選一束 Althyk lavender 作為敲門磚。就在那裡，你親眼看見另一名調查官 Briardien 介入一場爭執——他從細節判斷出真相，甚至指出 Amalj’aa 不會用箭射殺逃跑的無武裝商人，而是會把人抓走、讓人受到 primal 的影響；幾句話就讓局勢翻轉。</p>
<p>你和 Ellie 帶著花前往 Vesper Bay 拜訪 Durilda，卻迎來一陣冷嘲熱諷。Durilda 一口咬定你只是「平民冒險者」，不屑任何「靠禮物與話術換取尊重」的把戲，還嫌花的美麗轉瞬即逝，根本不值得她多看一眼。Ellie 只能硬著頭皮警告：武器怪盜正計畫奪走 Treaty-Blade。</p>
<p>Durilda 卻毫不在意——她表示自己早就從 Mythril Eye 讀到消息，手下也有一整隊護衛，根本輪不到你們插手。更何況，她已經雇用了「某位紳士」負責監督轉運。就在此時，Hildibrand 突然現身，戲劇化地宣誓要成為她的守護者，誓言在將惡徒繩之以法前絕不休息。</p>
<p>場面還沒落定，Briardien 也現身了——他自稱顧問調查官，冷淡地嗅出腐肉與火藥的氣味，當面把 Hildibrand 與 Nashu 貶成外行，態度強硬得讓人難以忽視。Durilda 立刻再次下逐客令，卻又被侍女 Maria 的驚慌打斷：她弄丟了一只極其昂貴的花瓶。</p>
<p>Maria 說自己在橋上被奇怪的飛行生物嚇到，慌亂中把花瓶掉進 Nophica’s Wells。Durilda 怒斥她立刻去找回來，Hildibrand 則搶著要代她下去搜尋，還信誓旦旦說這能換來 Durilda 的認可。Ellie 轉身去追 Briardien，臨走前叮囑 Maria：一旦害怕或有危險，就立刻向你求助。</p>
<p>你依照線索在周遭打聽，得到的回答幾乎一致：橋上落入水中的東西，多半很快就被沖往下游；而且不少人都提到曾看見怪異的翼獸。接著，一名張揚的男人咒罵著「偷盜的惡鳥」闖進你的視線，痛訴自己的武器被奪走——追到河邊時，他一時不察踩碎了 Maria 的花瓶。事已至此，你只能把碎片一一收集帶回；Hildibrand 看過後斷言這些已經足夠，彷彿接下來只差一個「能把事情補回來」的奇蹟。</p>
</div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
