  EN:{

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>At Camp Drybone, Isembard tells you that if you wish to know what the commonfolk murmur to their gods, there is no better place to ask than the Church of Saint Adama Landama, a small and humble sanctuary to the northwest. Since you are headed there anyway, he asks another favor of you: to bear an embalmed corpse to the church for burial. It is a morbid request, he admits, but someone must see the body safely to its grave, and there is no one he trusts more than you. He bids you seek out a man named Marques, the lichyard keeper, who will tell you where the deceased is to be laid to rest.</p>
      <p>You make your way to the little church beyond Drybone, where the wind whistles through rows of simple headstones. There, among the graves, you find a weary man who introduces himself as Marques. At the mention of another body, he falters, remarking that there have been so many of late that the words almost catch in his throat. Apologizing for his distraction, he explains that if you seek a place of burial, there is an empty grave atop the ridge. Follow the path, lay the corpse to rest there, he says. Bury him well and grant his soul peace, and only then return—after the dead have been properly seen to, the living may speak.</p>
      <p>You carry the embalmed corpse to the lonely grave on the ridge, lay him gently down, and heap the dry soil over him. When you return to the lichyard, Marques asks if you have buried the man and warns that the earth must be packed tight, or mongrels will come and defile the body. A brief prayer slips from his lips—may they all walk in Thal’s realm—before you turn the conversation to the missing people of Drybone. At this, he lowers his gaze and admits that he knows nothing that could help you. Perhaps Sister Ourcen might, he adds after a pause; she has been kind to him, as has everyone, though he cannot fathom why. The thought clearly troubles him. Haltingly, he tells you that you will find her within the church walls, then trails off with a broken, “It’s all wrong. I… I should have…,” leaving his unfinished confession hanging in the air as he sends you inside.</p>
      <p>Within the quiet nave of the church, Sister Ourcen greets you and thanks you for having borne a fallen soul to its rest, asking that you extend the Order’s gratitude to Isembard the next time you see him. When you ask about the missing Drybone inhabitants, she explains that she stands closer to the commonfolk than any other member of the Order: they confide in her, and she in turn serves as a medium when they wish to speak to their keeper, Thal. Should she learn anything of relevance, she promises to share it with you. With a sigh, she laments that Marques has not been more helpful in the matter. He saw terrible things during the Calamity, she says, and the scars he bears run deep; now he seems to prefer the company of the dead to that of the living, a tragic state she fears ill befits a servant of the church. One of their recent visitors—a man named Thancred—was apparently offended by the gravekeeper’s conduct, and she resolves to have words with Marques soon. Before you depart, she once more asks you to convey her thanks to Isembard.</p>
      <p>You return to Camp Drybone, where Isembard thanks you for seeing the burial done, remarking that such a task is no easy thing, even when the departed is a stranger. He then asks if you were able to learn anything about the missing commonfolk, but before you can answer, another voice cuts in. Thancred steps forward, observing how busy you have been of late, and offers a courteous greeting to Isembard. Introducing himself, he explains that he shares your passion for discovering what has become of the missing people and why. He, too, has spoken with Ungust—more times than he cares to remember—and there seems to be some truth to the notion that the commonfolk reveal their secrets only to those in service to the gods. Prostration, prayer, and penance; abject deeds done behind closed doors, away from prying eyes. Who better to take the pious unawares than the very one who takes their confessions—the good Sister Ourcen herself? Isembard recoils at the suggestion, insisting that she would never be involved in such wickedness. Thancred merely replies that even the most beautiful roses have thorns, and that it would be wise to keep an eye on this rose all the same. Yet even as he speaks, his thoughts return to the lichkeeper; he cannot shake the feeling that he has seen Marques’s face somewhere before, and the nagging familiarity lingers as the investigation moves on.</p>
    </div>

    story:`<div class="clamp" data-collapsed="true">
      <p>東ザナラーンのキャンプ・ドライボーンで、イセムバードは、貧しい人々が神々に何を語りかけているのかを知りたいのなら、北西にある小さく質素な聖アダマ・ランダマ教会に行くのが最もよいとあなたに教える。ちょうどそこへ向かうのであれば……と、彼は一つ頼みごとを口にした。防腐処理された遺体を教会の墓地まで運び、埋葬してほしいというのだ。確かに陰気な頼みだと認めながらも、誰かが亡骸を墓へと運ばねばならず、その役目を任せられるのはあなたしかいないと彼は告げる。墓地を管理する男マルケズを訪ねれば、遺体をどこに埋めるべきか教えてくれるだろう──そう言い残し、イセムバードはあなたを送り出す。</p>
      <p>あなたはドライボーンを後にし、やがて聖アダマ・ランダマ教会の小さな礼拝堂へと辿り着く。その外れに広がる墓地で声をかけると、疲れ切った様子の男が自らをマルケズだと名乗った。彼は、最近は埋葬を待つ遺体があまりに多く、数えきれないほどだとこぼし、言葉を詰まらせる。だがすぐに詫びを入れ、埋葬場所を求めて来たのなら、丘の上に空いている墓があると教えてくれる。坂道をのぼった先の墓に遺体を横たえ、心を込めて土をかけてやってほしい──亡者を安らかに眠らせてから、改めて話をしよう、と彼は静かに告げる。</p>
      <p>あなたが防腐処理された遺体を運び、指定された墓にそっと横たえて土をかぶせ、丘を下りて戻ると、マルケズは埋葬が済んだかと確かめる。彼は、土をしっかり固めておかねば、野犬のような獣が墓を掘り返し、遺体を穢してしまうかもしれないと、沈んだ声で警告したのち、死者たちが安らかに歩めるよう祈りの言葉を漏らす。そして、行方不明になっている人々について尋ねられると、自分はあいにく何も知らないと首を振るのだった。だが、貧民たちと親しい司祭オルセンなら、何か知っているかもしれないと続ける。皆が自分に親切にしてくれる理由が分からない……と自嘲気味につぶやきながら、教会の中にいる彼女を訪ねるよう勧めるが、「何かが間違っている……本当は自分が……」と言いかけた言葉は途中で途切れ、重苦しい沈黙だけが残る。</p>
      <p>静かな礼拝堂の中であなたを迎えた司祭オルセンは、あなたがひとりの亡き魂を墓へと送り届けてくれたことに深く感謝し、教団を代表してイセムバードにも礼を伝えてほしいと頼む。ドライボーンの人々の失踪について尋ねると、彼女は、自分が教団の誰よりも民に近い存在であり、人々が守護神に祈りを捧げるとき、その告白や嘆きを受けとめる媒介役を務めているのだと説明する。もし何か手がかりになりそうなことを知ったなら、必ずあなたに知らせると約束しつつも、マルケズが役に立てていない現状を残念に思っていると肩を落とす。彼は第七霊災であまりにも多くの惨状を目にして深い心の傷を負い、生者よりも死者のそばにいることを好むようになってしまった──その振る舞いは、教会に仕える者としてふさわしいとは言えない、と彼女は憂うのだった。最近訪れた客人サンクレッドという男も、マルケズの態度に不快感を示していたらしく、オルセンは近いうちに墓守とよく話し合わねばと心に決め、あらためてイセムバードへの感謝をあなたに託す。</p>
      <p>再びキャンプ・ドライボーンへ戻ると、イセムバードはあなたが埋葬の役目を果たしてくれたことに礼を述べる。見知らぬ者であっても土へ返す作業は決して容易ではない、と静かに言い、続けて失踪事件について何か分かったことはないかと尋ねかけたところで、背後から軽やかな声が割って入った。姿を現したサンクレッドは、ここしばらくあなたがずいぶん精力的に動いているようだと冗談めかして言い、イセムバードに挨拶して、自分もまた行方不明者の謎とその理由を追っているのだと名乗る。彼はこれまでに何度もウグストから話を聞いてきたと語り、貧しい人々が秘密を打ち明ける相手は、やはり神に仕える者だけなのだという考えには確かに一理あるようだと分析する。礼拝でひれ伏し、祈り、懺悔を捧げるあいだ、人目のない場所で、誰にも知られたくない行いが語られる──そうした告白を受けとめる立場にあるのは、まさに司祭オルセンその人だ、とサンクレッドは推理を口にするのだ。イセムバードは、あの優しい司祭が共謀者であるはずがないと強く否定するが、サンクレッドは「もっとも美しい薔薇にも棘がある」と諭し、この薔薇からも目を離すなと忠告する。それでもなお、彼は最後に墓守マルケズの顔にどこか見覚えがあると呟き、その違和感を胸に抱いたまま、失踪事件の調査は次の段階へと進んでいく。</p>
    </div>

    </div>`,

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'救濟之光',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Eastern Thanalan 的 Camp Drybone，Isembard 告訴你，如果想知道貧民在向神祈禱時究竟會說些什麼，最好的地方就是西北方那座小而樸素的 Church of Saint Adama Landama。既然你正要往那個方向去，他便順勢提出另一個請求：請你將一具已經防腐處理好的遺體送到教會的墓地安葬。這個要求的確有些陰鬱，他也坦承如此，但總得有人把亡者送往長眠之所，而在這一帶，他最信任的人就是你。Isembard 要你去找負責墓園的男子 Marques，由他來決定這具遺體應該下葬在何處。</p>
      <p>你離開 Drybone，來到那座安靜矗立在荒野上的小教會，在教會旁簡陋的墓地裡，遇見了一名神情疲憊的男人。他自我介紹說自己叫做 Marques，一聽說你又帶來一具遺體，便忍不住感嘆最近送來的屍體實在太多，多到讓他不知該如何面對。說完他馬上向你道歉，恢復成公務般的語氣，解釋如果你是在尋找埋葬之處，山坡上方還有一座空著的墓穴。順著小徑走上去，把遺體安穩地放入墓中，記得好好覆土，讓亡者得以安息──等你完成這一切，再回來和他說話也不遲。</p>
      <p>於是你把那具 embalmed corpse 抬上山坡，放入孤零零的墳穴裡，然後用乾燥的泥土將他掩埋。回到墓園後，Marques 首先確認你是否已經完成埋葬，接著特別叮囑你一定要把土踩實，否則流竄的野狗之類的畜生會把墓挖開，褻瀆遺體。他低聲說出祈禱的話語，願所有亡者都能在 Thal 的國度中安然前行。當你把話題拉回到 Drybone 的失蹤事件時，他卻只能搖頭，說自己對此一無所知。或許 Sister Ourcen 可以幫上忙──他補充說，那位修女對他很好，教會裡的所有人都對他很好，只是他實在不明白自己為何值得這份善意。這個念頭顯然折磨著他。他支支吾吾地要你進教會找 Ourcen，嘴裡還喃喃自語：「一切都不對……本來應該是我……」，卻在說到半途時便語塞，只留下沉重的懊悔。</p>
      <p>走進靜謐的教堂，Sister Ourcen 迎上前來，聽說你親手埋葬了一位亡者後，衷心向你致謝，也請你回頭替她向 Isembard 轉達教團的感激。當你提到 Drybone 居民接連失蹤一事時，她表示自己確實比教團裡任何人都更貼近那些民眾──他們向守護神傾訴的祈禱與懺悔，往往是透過她這個「媒介」傳達出去的。只要得知任何可能與事件有關的重要情報，她會第一時間告訴你。不過，她也忍不住嘆息，覺得 Marques 沒能在這件事上出更多力，實在令人遺憾。那個男人在 the Calamity 之中目睹了太多慘況，心靈留下深刻的傷痕，如今反而更喜歡待在亡者身邊，而不是活人之中──以教會神職人員的身分來說，這樣的狀態並不理想。她還提到，最近來訪的一位名叫 Thancred 的旅人，對 Marques 的態度也頗為不滿。Ourcen 決定過不久就要好好和墓守談一談，臨別前，再一次拜託你代為向 Isembard 轉達她的謝意。</p>
      <p>你回到 Camp Drybone，Isembard 得知埋葬已經完成後，鄭重地向你道謝。他感慨地說，就算是對陌生人來說，把他送入黃土也不是件輕鬆的事，隨後便問你，有沒有打聽到關於失蹤居民的任何消息。就在你準備回答之前，一道熟悉又略帶戲謔的聲音插入談話。Thancred 現身，先是笑說你最近實在相當忙碌，接著向 Isembard 打招呼，並表示自己同樣在調查這一連串失蹤事件背後的真相與動機。他提到自己也多次與 Ungust 交談，愈來愈覺得一件事恐怕是真的：那些貧民只會把最不願示人的秘密交給「侍奉神明的人」。在俯首、祈禱與贖罪之中，在遠離旁人視線的角落，人們坦承那些羞於啟齒的行為。而最適合利用這份信任、趁機對虔誠之人下手的，不就是負責聽告解的 Sister Ourcen 嗎？聽到這樣的推論，Isembard 幾乎是本能地反駁，堅稱那樣溫柔的修女不可能涉入誘拐。Thancred 卻只是淡淡回應，即使是最美麗的玫瑰也有刺，提醒他最好對這朵「玫瑰」保持警惕。話雖如此，他最後仍忍不住提起另一件在意的事──那位墓守 Marques 的面孔，總讓他覺得似曾相識，彷彿在哪裡見過。這股揮之不去的違和感，就這麼與失蹤案件的疑雲一起，悄悄埋在 Drybone 的黃沙之下。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
