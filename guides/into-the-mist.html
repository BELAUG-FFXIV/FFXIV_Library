const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`Into the Mist`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Weariness is written on everyone, but Y’shtola is calm and firm: Krile’s injuries are nothing to fear. G’raha Tia says what you all feel—that after the battle, everyone needed a moment—and he pointedly tells you to rest as well. Sphene can’t hide her curiosity; if Miayli truly knew Krile’s mother, she wants to hear everything.</p><p>Krile admits the contradiction she’s been carrying the whole time: she wants the truth more than anything, and she’s also afraid of it. But after coming this far, she refuses to turn away. If everyone can manage it, she asks you to go—now—and finally get answers.</p><p>Inside Treno, the tension shifts from battlefield urgency to the quiet dread of a family story about to surface. Y’shtola warns that even if the key is meant to be the main subject, Miayli could reveal far more than that. Krile answers simply that she’s ready. G’raha Tia confesses he feels anxious on her behalf. Sphene, relieved, notes that Lumull is unharmed after everything.</p><p>Miayli begins by reframing what “family” means for the Milalla. Their line descends from the Speakers of old, and she is the latest Speaker—responsible not only for the people’s welfare in Treno, but for an inherited duty: to find a way home to where they came from. That duty, and the failure of their ancestral treasure to answer their pleas, left her elder sister—the previous Speaker—vulnerable. And that vulnerability is where Preservation found its opening.</p><p>The “key,” Miayli confirms, is that relic: kept by their people since time immemorial. When lightning threatened the world, they tried to use it to flee again as their ancestors once had—but it would not awaken, no matter what they tried. Only after they had nearly given up did Preservation approach them with an offer of partnership.</p><p>Krile recognizes the story from her parents’ memories, and forces the question through: her mother—was she Miayli’s sister? Miayli says yes. Which means Krile is an heir to the Speaker’s legacy. The last message Miayli received from Krile’s parents said that to thwart Preservation, they had to send away both their daughter and the key. Miayli now understands what became of the former, and through your companions has learned where the latter resides.</p><p>Krile asks the question that matters: do they want the key returned? Miayli’s answer is decisive. The Milalla are Treno now—this is where they have roots. When Alayla relinquished the key, she relinquished their claim as well. But that sacrifice cost Alayla everything: her life, and her daughter, all to prevent misuse. Miayli’s duty is no longer to reclaim the relic, but to judge the one who carries it now—whether the new bearer is worthy.</p><p>So Miayli tests you with the most dangerous kind of question: if the key answers your call—as it never did theirs—how would you use its power? Your reply can be exploration, heroism, or uncertainty; whichever it is, Miayli accepts your character not on your words alone, but on your deeds, and on your bond with her niece.</p><p>Y’shtola presses for records in Treno, but Miayli explains that Alayla took everything when she joined Preservation. If anything remains, it would be in Alexandria. The conversation returns to the same path you started on: back to Preservation, back to archives, back to the key.</p><p>Then Krile falters—not because she feels unwelcome, but because the idea of “home” has suddenly become complicated. Miayli answers with unexpected gentleness: some people bind themselves to blood or birthplace, but she doesn’t believe Krile’s parents wanted that for her. They devoted their lives to understanding the key so future generations would not be burdened by it. As the Milalla chose Treno, Krile should choose the place she calls home—where she can bloom and grow with fearless joy. Krile finally says it out loud: she will.</p><p>Before you leave, Miayli gives a final warning, aimed at the keeper of the key. The relic has crossed centuries and worlds, passed through countless hands, often calling to those ruled by ambition or avarice—so much so that some wonder if it “chooses” its master. Miayli believes something else: an inexorable force—fate—ushers it from one bearer to the next. And now fate’s regard has fallen on you.</p><p>At the gate, Treno gives Krile a real farewell. Lumull thanks you for fighting again and again, calling you his hero, believing even the ones they lost can rest easier knowing Doomtrain will never harm anyone again. Eyaney thanks you for backing her barrier plan—and for making it possible to restore it at all—and then offers Krile a small poem as a keepsake: a blessing for life to flourish on a faraway shore, to bloom with fearless joy, to find shelter from dark storms, and to grow hand in hand. Krile promises she’ll remember.</p><p>Miayli, too, finds her own closure. After so long, her sister’s face and voice had begun to fade—only Alayla’s resolve remained clear. But now she sees Alayla again, reflected in Krile. She thanks Krile for bringing her back, calls it a joy to meet her, and says that even if Krile’s home lies far away, she will always be family here. Krile promises to return, and to bring Treno the treatment for levin sickness as soon as she can.</p><p>Back in Living Memory, the party allows itself a thin slice of normalcy—tea, quiet wonder, practical logistics. Krile steadies herself: it still feels dreamlike, but she’ll remember it. And practically, she’s more convinced than ever that Shale’s work will yield vital insight into the key.</p><p>In Resolution, reality resumes. Gossan scolds Sphene for recklessness; Sphene apologizes and insists the journey was worth it—diplomacy can begin anew, and she will report before any future excursion. Shale returns with progress: decryption is advancing, and she’s heading back to the containment complex to review the data. Y’shtola joins her to examine what can be learned, even if incomplete. G’raha Tia urges you to get real sleep—because whatever hellish technology comes next won’t wait—and teases Krile about needing to learn porxie care. Krile agrees; it’s the least she can do for her family. She intends to visit them whenever possible—but she also claims her truth without hesitation: her home will always be in the Source. There’s nowhere she’d rather be.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Krile <small class="muted">(Treno, X:11.5, Y:12.2)</small></div></div>`,

      <div class="row"><a class="link" href="where-we-call-home.html">Where We Call Home</a></div>
      <div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 100</div>
    </div>`,
    followq:`<div class="stack"><div class="row">To be continued</div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'霧の中の理想郷',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>疲労は誰の顔にも出ているが、ヤ・シュトラは落ち着いて断言する。クルルの負傷は心配するほどではない。グ・ラハ・ティアも、あの戦いの後では誰もが一息つく必要があったと言い、あなたにも休めと念を押す。スフェーンは、ミアイリがクルルの母を知っていたという事実に心が揺れ、詳細を聞きたいと率直に口にする。</p><p>クルルは自分の中の矛盾を認める。知りたい、何よりも――でも怖い。けれど、ここまで来て真実から背を向けるわけにはいかない。皆が動けるなら、今すぐ答えを聞きに行こう、とあなたに呼びかける。</p><p>トレノの空気は、戦場の切迫から、家族の真実に踏み込む静かな緊張へ変わる。ヤ・シュトラは、話の中心は鍵であっても、ミアイリが何を語るかは分からないと警告する。クルルは「大丈夫、聞く覚悟はできている」と言い切る。グ・ラハ・ティアはクルルの身を案じて胸がざわつくと告白し、スフェーンはルムルが無事であることに安堵する。</p><p>ミアイリはまず、ミララの「家系」を説明する。彼女たちは古き語り部――スピーカーの末裔であり、ミアイリはその役目を継いだ現代のスピーカーだ。新天地トレノで民の生活を守るだけでなく、祖先の地へ戻る術を探すことが宿命だった。しかし祖宝は祈りに応えず、前代のスピーカーである姉は疑念に沈む。その最も脆い瞬間に、プリザベーションが手を伸ばした。</p><p>鍵とは、その祖宝そのもの――太古からミララが守ってきた遺物だという。雷の災厄が世界を脅かしたとき、彼らは祖先のように再び逃れようと鍵を起動させようとしたが、どれだけ試しても力は発現しなかった。ほとんど諦めかけたところへ、プリザベーションが協力を持ちかけた。</p><p>クルルは両親の記憶で「ここまでは聞いた」と言い、核心を突く。母は――あなたの姉だったのか。ミアイリは肯定し、だからこそクルルはスピーカーの遺志を継ぐ者だと告げる。両親の最後の伝言には、プリザベーションを阻むために「娘と鍵の両方を遠ざける」必要があるとあった。娘がどうなったかは今や分かった。鍵が今どこにあるかも、あなたの仲間との会話から把握したという。</p><p>クルルは問う。鍵を返せと言うのか。ミアイリはきっぱり答える。ミララは今やトレノの民であり、ここに根を下ろした。アライラが鍵を手放した瞬間、ミララの「権利」も手放されたのだ――ただし、その代償は重い。妹は鍵の悪用を防ぐために命だけでなく愛娘まで差し出した。ゆえにミアイリの務めは奪い返すことではなく、現在の担い手が相応しいかを見届けることだ。</p><p>だからこそ、ミアイリはあなたに尋ねる。もし鍵が、かつて自分たちには応えなかった力であなたの呼びかけに応えるなら、その力をどう使うのか。探索か、救済か、まだ分からないか――答えは分岐しても、ミアイリは言葉だけではなく、あなたの行いと、姪との絆で判断する。</p><p>ヤ・シュトラはトレノに記録がないか問うが、アライラはプリザベーションに加わったとき、すべてを持ち去ったという。残っているとすればアレクサンドリア――つまり、結局は最初の道筋へ戻る。</p><p>そしてクルルは、帰り際に言葉がもつれる。歓迎されていないわけではない。皆は優しく、トレノは多くの意味で故郷でもある。けれど「縛り」への戸惑いがある。ミアイリは血や生地に縛られる者もいるが、両親はそれを望まなかったはずだと言う。両親は未来の世代が鍵に縛られないよう、理解するために人生を捧げた。ミララがトレノを選んだように、クルルも「自分が咲ける場所」を選べばいい。クルルは静かに決意する――そうする、と。</p><p>最後にミアイリは、鍵を持つ者へ警告する。鍵は幾世紀も幾世界も渡り、多くの手を巡り、野心や強欲に支配された者を呼ぶことがある。主を選ぶのでは、と言う者もいる。だがミアイリは、運命が担い手を次々と移し替えるのだと信じる。そして今、その運命の視線はあなたに向いている、と。</p><p>門での見送りは温かい。ルムルは幾度も戦ってくれたことを感謝し、ドゥームトレインが二度と誰も傷つけないことに、失った人々も安らげるはずだと言う。エヤネーはバリア計画を支えてくれたことを礼を述べ、クルルに詩を贈る。遠い岸で命が花開き、恐れぬ喜びで咲き、暗い嵐から守られ、手を取り合って永く育つように――どの岸を選んでも覚えていてほしい、と。クルルは、その言葉も、民も、心に刻むと誓う。</p><p>ミアイリもまた救われる。長い不在で姉の面影は薄れ、最後の別れの決意だけが鮮明だった。だが今、クルルの中に姉を見た。連れ戻してくれてありがとう、と伝え、クルルを家族だと言う。クルルは必ずまた来る、そして落雷病の治療法も持ってくると約束する。</p><p>その後、レイノードで一息つき、ソリューション・ナインへ戻る。クルルは夢のようだと言いながらも、必ず覚えていると自分に言い聞かせ、実務としてもシェールの調査が鍵の核心へ近づくと確信する。</p><p>レゾリューションでは、ゴッサンがスフェーンの無謀さを叱り、スフェーンは謝罪しつつも成果を主張する。シェールは復号の進展を報告し、現地でデータを確認しに行くという。ヤ・シュトラは同行し、断片でも目を通したいと告げる。グ・ラハ・ティアはあなたに睡眠を勧め、次の厄介な技術が来ても耐えられるようにと言う。クルルは落雷病の治療に関する手順を学ぶ必要があると認め、それは家族のためでもあると言う。そして最後に、自分の選択をはっきり口にする――トレノの家族に会いに行くつもりだが、彼女の「家」はソースだ。そこ以外は考えられない、と。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> クルル <small class="muted">(トレノ, X:11.5, Y:12.2)</small></div></div>`,

      <div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div>
    </div>`,
    followq:`<div class="stack"><div class="row">つづく</div></div>`
  },

    story:`<div class="clamp" data-collapsed="true"><p>即使筋疲力盡，Y’shtola 仍先把最重要的話說清楚：除了疲勞之外，Krile 沒有嚴重到需要你擔心的傷。G’raha Tia 也直說——那場戰鬥之後，大家都需要喘一口氣；而你也一樣，最好去休息，他是認真的。Sphene 則把注意力放在另一件事上：Miayli 竟然認識 Krile 的母親，她也迫不及待想知道細節。</p><p>Krile 把自己最矛盾、也最真實的狀態說出口：這件事很「奇怪」，她想知道真相，想得要命；可同時，她又害怕得發抖。但走到這一步，她不可能再轉身逃避。只要大家還撐得住，她就想立刻去把答案聽完。</p><p>到 Treno 之後，Y’shtola 提醒你們：雖然談話的主題應該是 key，但 Miayli 可能會說出更多意想不到的事。Krile 卻沒有退縮，只回一句：沒關係，她已經準備好聽了。G’raha Tia 承認自己替 Krile 感到焦慮；Sphene 也坦白，雖然她一直相信 Lumull 跟著你們會平安，但看到他真的毫髮無傷，還是讓她鬆了口氣。Lumull 跟 Eyaney 則一邊問你們祖母叫大家來做什麼，一邊還在回想「Doomtrain、Behemoth」這一連串聽起來就讓人頭皮發麻的意外。</p><p>Miayli 開口的第一句不是講 Key，而是先要你們理解 Milalla 的「家族責任」。她說自己出身於古老的祝禱者血脈，而她就是承繼這個角色的最新一任。即使 Milalla 已在 Treno 落地生根、盡力守護人民的生活，他們的宿命仍是尋找回到「原本來處」的方法。可惜祖傳的寶物始終沒有回應祈禱，讓上一任 Speaker（祝禱者），她的姊姊，困在疑惑與動搖裡。就在那個最脆弱的時刻，Preservation（Alexandria 的研究機構／組織，曾與 Milalla 接觸並合作，企圖研究並利用 key 的力量；相關資料與檔案多半被他們收進自家設施的檔案庫）伸手接近了她。</p><p>接著故事回到你已經從「父母的記憶」聽過的一段：key 就是那件古老遺物，自古以來一直由他們保管。當雷災威脅這個世界時，Milalla 試圖用 key 像祖先那樣再度逃離，但不管怎麼做都喚不出力量；直到幾乎放棄，Preservation 才提出合作。</p><p>Krile 把那句最痛的問題逼出口：她的母親……是 Miayli 的姊姊嗎？Miayli 說是。於是 Krile 也同時成了祝禱者遺志的繼承人。Miayli 透露，她最後收到你父母的訊息，是為了阻止 Preservation 的計畫，必須把「女兒」和「key」一起送走。現在她終於知道女兒去了哪裡；至於 key，她在和你們交談後，也已經確認目前由誰持有。</p><p>Krile 直接問：那你希望我們把 key 還回去嗎？Miayli 的回答非常明確：Milalla 現在就是 Treno 的人，這裡才是他們扎根的地方。Alayla 交出 key 的那一刻，也等同放棄了 Milalla 對它的主張。可是她也同時強調——Alayla 為了避免 key 被濫用，失去的不只是生命，甚至連最珍愛的女兒也不得不送走。Miayli 的責任因此不是「取回」，而是「確認」：新的持有者，是否配得上承擔它。</p><p>所以她把問題丟給你——如果 key 真的回應你的呼喚、釋放出曾經從未回應 Milalla 的力量，你會怎麼使用？你可以答探索未知世界、答救人行義、或答你還不確定；而 Miayli 最終接受你的原因，也不是只看你怎麼說，而是看你做過什麼，以及你和她姪女之間那份真實的情誼。</p><p>Y’shtola 追問 Treno 是否留有 key 的文獻紀錄，Miayli 坦言：Alayla 加入 Preservation 時把資料全帶走了；若還留存，恐怕只會在 Alexandria。於是你們又被拉回原點，要找答案，仍得回到 Preservation 的檔案裡。</p><p>接下來是 Krile 最脆弱也最重要的一瞬間。她急著結束話題，卻又慌張補充：她不是不喜歡這裡、也不是不覺得自己被接納——大家都太好，而 Treno 在很多層面上甚至像她的故鄉。她只是……不知道該怎麼面對「血緣與出生地」帶來的束縛感。Miayli 用很溫柔的方式回應她：有些人確實被血或出生地綁住，但她不相信 Krile 的父母希望她背負那種束縛。他們窮盡一生研究 key，是為了讓未來的人不必被它壓垮。就像 Milalla 選擇了 Treno，Krile 也應該選擇她稱之為「家」的地方，能夠無懼地綻放與成長的地方。Krile 沉默片刻後，終於說：她會的。</p><p>臨別前，Miayli 給了你一段「對 key 持有者」的提醒（意思就是：key 不是普通道具。它在漫長歲月中多次轉手，常會引來野心或貪念之人；也有人說它會「選主人」。Miayli 則認為是命運把它推到下一個持有者手上，而現在，被捲入這條因果的人就是你，所以要特別小心）。這件遺物穿越了漫長的年代與無數世界，經過無數人的手，往往會吸引被野心或貪念支配的人，甚至有人懷疑它會「選擇」主人。但 Miayli 相信的不是選擇，而是某種無可抗拒的力量，你可以稱它為命運，把 key 推向下一位持有者。如今，命運的目光也落到了你身上；你必須警惕。</p><p>送別時，Treno 給了 Krile 真正的家人式告別。Lumull 感謝你為他們一次又一次戰鬥，甚至激動地說你是他的英雄，Doomtrain 永遠不會再傷人，連那些已經不在的人也能更安心。Eyaney 則為你支持屏障修復計畫致謝，並把一段祝福般的詩留給 Krile：在遙遠的岸邊也要讓生命盛放、以無懼的喜悅展開花瓣、讓天空庇護你免於最黑暗的風暴、在那裡牽著手一起綻放下去，無論她選擇哪個岸，都要記得。Krile 回應：她一定會記得，這些話、以及她的族人，會一直放在心裡。</p><p>Miayli 也得到自己的救贖。她說自己太久沒見到 Alayla，臉與聲音都像霧一樣淡去，只剩下最後分別時的決意還清晰。但今天，她在 Krile 身上又看見了姊姊。她謝謝 Krile 把 Alayla 帶回來，也承認能遇見 Krile 是件喜悅的事；即使 Krile 的家很遠，對他們而言她永遠是家人。Krile 承諾會回來，還要把治療 levin sickness（長期暴露在強烈「雷屬性」環境／落雷乙太影響下引發的病症，會讓身體不適、虛弱甚至影響行動；Treno 居民常見，並以特製的 remedy（療藥）來緩解與治療）的方法帶回 Treno。</p><p>回到 Living Memory，大家終於能講一些「正常人」會講的事：茶、放鬆、航路、工作安排。Krile 說一切仍像夢，但就算醒來她也會記得；而實務上，她更確信 Shale 的調查會給 key 帶來關鍵線索，回到 Solution Nine 後她最期待的就是跟 Shale 對話。</p><p>在 Resolution，現實立刻追上來：Gossan 先把 Sphene 罵了一頓，說在毫無準備的情況下穿越 Mist Continent 太魯莽；Sphene 道歉，也強調收穫很大，並承諾之後出門一定先告知。Shale 則回報解密已經有進展，正要回 containment complex 現場確認資料；Y’shtola 表示要同行，哪怕資料還不完整也想先看。G’raha Tia 順勢勸你至少睡個一兩晚，因為下一波「地獄科技」不知道什麼時候就會追上來；他還笑 Krile 應該要補上 porxie 的照護知識。Krile 認真接下，說這是她至少該為家人做的一點事，她會盡可能常去 Treno 探望，但她也把自己的選擇說得很清楚：她的家永遠在 Source（原初世界）。沒有任何地方，比那裡更讓她想留下。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 克露兒 <small class="muted">(特雷諾, X:11.5, Y:12.2)</small></div></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
