<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`A Well-mannered Shipwright`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You keep moving with Linuhanu, and she lays out what you need to know before you ask for help: the shipwright is named Wuk Evu. He’s a Xbr’aal who came to Kozama’uka only a few years ago, yet he has learned Hanuhanu customs so thoroughly it’s almost unsettling. Above all, he is strict about manners—so when you meet him, you must offer a proper Hanuhanu greeting. With that warning, Linuhanu leads you east toward Ok’bek’be.</p><p>Ok’bek’be is introduced as the “Village of All,” a place where those who drift into Kozama’uka from Tuliyollal and elsewhere can live alongside the Hanu. Wuk Evu works in the House of Waters High, perched at the top of a great tree, and Linuhanu cautions that the long, winding climb can be taxing. Krile agrees you can’t afford to be rude when you’re the ones asking a favor.</p><p>When you arrive, Wuk Lamat practices the greeting under her breath until she’s sure she has it. Wuk Evu answers with sharp suspicion—then Wuk Lamat calls out, “Ohokaliy!” He roars the greeting back even louder, satisfied that she brought her manners. He lectures that in a nation as diverse as yours, harmony depends on respecting the cultures of all who live there, and Wuk Lamat readily agrees: living together means learning about each other.</p><p>Then Wuk Evu suddenly realizes who he’s speaking to and panics—declaring he has insulted the Third Promise and begging to be punished for his betrayal of etiquette. Wuk Lamat refuses outright, tells him to keep his head, and insists he drop the formalities. The shift is so immediate Krile can only remark on how prompt it was.</p><p>With that settled, you explain the real reason you came: the Ihih’hana float is in terrible condition, and you need new carrying poles and a new eye—made with uyuipo wood and abokixa. Wuk Evu admits he used the last of both materials repairing storm-damaged homes, and says he’ll need time to restock. Wuk Lamat won’t accept waiting; she volunteers to gather what’s needed herself. Wuk Evu is horrified at the thought of sending the Third Promise on errands, but Wuk Lamat shuts the protest down again.</p><p>Linuhanu steps in as this season’s festival leader and explains why you’re pushing so hard: you believe the float is an arcane focus meant to encourage the growth of the failing reeds. Wuk Evu confirms that this is the true purpose of the Lifting of Wings, and he’s impressed you know it. He points you toward sources—uyuipo for one part of the repair, and abokixa from Cave Kikitola or nearby—and Linuhanu offers to guide you. As you set out, you catch word that your rivals are watching your progress, weighing whether to let your plan play out.</p><p>At Cave Kikitola, you search for raw abokixa by its green glimmer, sifting through false leads until you find the stone you need. When you bring it back, Linuhanu’s resolve shows through her grief: a friend who should have led Ihih’hana this year died in the storm, and she took up the duty in his place. She admits it hurts, but she won’t let sorrow swallow her—she will walk the path ahead for herself and for the friend she lost. Reunited with Wuk Lamat, you deliver the abokixa to Wuk Evu, and he prepares to craft the parts for the float—asking Krile to help enhance the uyuipo’s aetherial conductivity. With the poles and the new eye secured, you return to Ok’hanu to wait, while Wuk Lamat recounts how Wuk Evu criticized her nonstop—then abruptly tried to “punish himself” by slamming his head into an uyuipo tree—before snapping back to calm the moment she told him, once again, not to worry.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Linuhanu <small class="muted">(Kozama’uka, X:19.3, Y:10.7)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-feat-of-reeds.html">The Feat of Reeds</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 90</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-lifting-of-wings.html">The Lifting of Wings</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'船大工のウケブ',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>リヌハヌに案内されながら、あなたは次の段取りを聞く。船大工の名はウケブ。シュバラール族で、数年前にコザマル・カへ移り住んだばかりだというのに、ハヌハヌの風習を恐ろしいほど身につけているらしい。とりわけ礼儀作法に厳しいため、頼みごとをする前に、必ず正しいハヌハヌの挨拶をしなければならない。そう念を押され、あなたたちは東のオック・ベックベへ向かう。</p><p>オック・ベックベは「万民の村」と呼ばれ、トライヨラや他所からコザマル・カへ流れ着いた者も、ハヌと共に暮らせる場所だという。ウケブは大樹の上にある「水の高殿」で暮らし、そこで仕事をしている。長い階段を登るのは骨が折れるとリヌハヌは警告し、クルルも「助力を請う以上、無礼は避けるべき」と静かに念押しする。</p><p>到着すると、ウクラマトは挨拶を口の中で繰り返し、覚えたと胸を張る。ウケブは怪訝そうに用件を問うが、ウクラマトが「オホカリィ！」と叫ぶと、ウケブも負けじと大声で返す。礼儀を携えてきたことはよし、と彼は満足し、多様な国で調和を保つには、住まう者すべての文化を尊重せねばならぬと説く。ウクラマトもまた、共に生きるには互いを知ることが必要だと受け止める。</p><p>ところがウケブは、目の前の相手が誰かに気づいた途端、態度を一変させる。第三誓約に不作法を働いたと狼狽し、自らの首を差し出すかのように罰を求める始末だ。ウクラマトは即座に拒み、形式など気にするなと言い切る。あまりに早い切り替えに、クルルは思わずその手際を口にする。</p><p>あなたたちは本題を告げる。イヒーハナの山車が損傷し、担ぎ棒と目玉を新調する必要があること、素材はウユイポ材とアボキシャであること。ウケブは、嵐で壊れた家々の修繕に使い切ってしまい、しばらく補充ができないと答える。だがウクラマトは待てないと言い、必要なものは自分で採りに行くと申し出る。第三誓約を使い走りに出すなど言語道断だとウケブは叫ぶが、ウクラマトは気にするなと押し切る。</p><p>リヌハヌは今季の祭の長であると名乗り、山車が作物の生育を促す秘術の焦点であるという見立てを伝える。ウケブは「翼揚げ」の真の目的がまさにそれだと認め、第三誓約の見識を称える。そして、ウユイポ材の採取場所を示しつつ、アボキシャはキキトラ洞あたりで見つかるはずだと教える。移動の最中、ライバルがこちらの進捗を探っている気配も聞こえてくる。</p><p>キキトラ洞では、緑に光る原石を手がかりにアボキシャを探す。見紛う光に惑わされながらも、あなたは求める石を見つけ出し、リヌハヌへ渡す。彼女は胸の内を明かす。イヒーハナの祭の長になるはずだった友が嵐で命を落とし、代わりに自分が務めることになったのだと。悲しみは消えないが、立ち止まらずに歩むと決めたリヌハヌに、クルルは寄り添う言葉を返す。あなたたちは「水の高殿」へ戻りアボキシャを引き渡すと、ウケブは山車の部材作りに取りかかり、クルルはウユイポ材の伝導を高める補助を引き受ける。すべて整うまであなたたちはオクハヌで待つことになり、ウクラマトは、ウケブの気分の振れ幅と奇行を呆れ混じりに語りながらも、修理が前へ進んだことを確かめる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> リヌハヌ <small class="muted">（コザマル・カ, X:19.3, Y:10.7）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-feat-of-reeds.html">葦の試練</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 90</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-lifting-of-wings.html">イヒーハナ祭</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'船匠烏克·耶伏',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你跟著 Linuhanu 繼續前進，她先把重點說清楚：修理蘆葦船的船匠叫 Wuk Evu。他是 Xbr’aal，幾年前才搬來 Kozama’uka，卻把 Hanuhanu 的習俗學得幾乎到了讓人發毛的程度。尤其在禮節上，他非常嚴格——你們去請他幫忙之前，一定要用正確的 Hanuhanu 問候，免得一開口就得罪人。說完這些，Linuhanu 帶你們往東前往 Ok’bek’be。</p><p>到了 Ok’bek’be，Linuhanu 介紹這裡是「萬民之村」：不只 Tuliyollal，從其他地方漂到 Kozama’uka 的人，也能和 Hanu 一起在此生活。Wuk Evu 住在大樹頂端的 House of Waters High，那條又長又彎的階梯看起來就不好爬。Krile 也提醒你們：既然是來求助的，再怎麼樣都不能失禮。</p><p>你們抵達後，Wuk Lamat 一邊念著問候語一邊給自己打氣。Wuk Evu 一開口就很不客氣地問你們來做什麼，Wuk Lamat 立刻把準備好的那句喊出來：「Ohokaliy！」Wuk Evu 也用更大的音量回敬，像是在確認她的禮數有沒有到位。他隨即說起自己為何如此重視規矩：在這樣多元的國度裡，要維持和諧，就必須尊重每個把這裡當作家的人所珍視的文化。Wuk Lamat 也坦率回應：想要一起生活，本來就該努力理解彼此。</p><p>然而下一秒，Wuk Evu 卻突然認出 Wuk Lamat 的身分，整個人慌到不行——他一邊嚷著自己竟然冒犯了「第三誓約」，一邊誇張地要求受罰，甚至要她拿起斧頭砍下他的腦袋。Wuk Lamat 直接拒絕，叫他把頭留著，並再次強調她不喜歡那些繁文縟節，別再糾結。Krile 看到他收放自如的轉折，只能低聲吐槽一句：「也太快了吧。」</p><p>你們把正事說出來：Ihih’hana 的花車狀況很糟，需要重新做抬桿和一顆「眼睛」，材料是 uyuipo 木與 abokixa。Wuk Evu 說他剛把最後一批材料都拿去修補暴風雨後毀損的房屋了，要再補貨至少得等一段時間。Wuk Lamat 卻不接受等待，要求他直接告訴她去哪裡找，她自己去採。Wuk Evu 聽了又要崩潰，說怎麼能把第三誓約當跑腿使喚；Wuk Lamat 立刻把他按回去，叫他別管那些「規矩」了。</p><p>Linuhanu 表明自己是本季祭典的負責人，也把你們的想法說清楚：你們認為花車其實是用來促進蘆葦生長的秘術焦點。Wuk Evu 聽完反而認同，還說這正是 Lifting of Wings 的真正目的，只是許多 Hanu 已經忘了。他接著分配路線：uyuipo 的來源他能帶你們去看，而 abokixa 則要去 Cave Kikitola 一帶找。當你們動身時，也隱約聽見對手在暗處打量——他們知道你們正在推進，卻還在衡量是否要放任你們把事情做成。</p><p>到了 Cave Kikitola，你照 Linuhanu 的說法尋找帶著綠色微光的原礦。你先被水光反射耍了一次，又翻到顏色不對的石頭，最後才找到真正發出綠光的 abokixa。你把收集到的原礦交給 Linuhanu，她卻在那一刻吐露了原因：本來該擔任今年 Ihih’hana 祭典負責人的，是她的一位好友；暴風雨來時，那個人沒能活下來，所以她才接下了位置。她承認自己仍在悲傷裡，但也明白不能讓悲痛吞沒自己——她會繼續往前走，為了自己，也為了那位朋友。你們回到 House of Waters High 把 abokixa 交給 Wuk Evu，他開始動手製作花車零件，並請 Krile 協助用秘術強化 uyuipo 的以太傳導。其餘人則先回 Ok’hanu 等待，Wuk Lamat 一邊回想 Wuk Evu 前一刻挑剔、下一刻又嚷著要「自我懲罰」去撞樹的怪脾氣，一邊確認：至少抬桿與新眼睛這一步，真的往前推進了。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 利努哈努 <small class="muted"> 克扎瑪烏卡濕地（X:19.3, Y:10.7)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-feat-of-reeds.html">葦之試煉</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.90</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-lifting-of-wings.html">展翅節</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
