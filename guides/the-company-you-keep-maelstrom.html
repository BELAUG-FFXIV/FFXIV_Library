    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>After hearing the Admiral’s rousing speech, you turn to the Storm Officer and make your choice. He reads your resolve in your face before you even speak, and when you confirm that you mean to join the Maelstrom, his grin is broad and unabashed. With allies like you, he says, their crew will only grow stronger, and he invites you to brave the seas together as comrades-in-arms. Now that the decision is made, it is time to make it official: he instructs you to report to Maelstrom Command back in Limsa Lominsa, located on the upper decks. He will send word ahead to the personnel officer to expect you. The duties of a Maelstrom soldier can be arduous and demanding, he warns, but he is certain you will not regret your choice. As you set off, the Flame Officer sputters in dismay that you would turn away from General Raubahn’s imposing figure, insisting you would surely warm to him in time, while the Serpent Officer gently reminds you that a transfer between Grand Companies is always possible should your heart ever change. For now, however, your path leads to Limsa and the black banners of the Maelstrom.</p>
      <p>At Maelstrom Command, you are greeted by the Storm Personnel Officer, who asks your business with the Grand Company. You introduce yourself and explain that you have come to enlist, just as the recruitment officer arranged. Recognition flashes across his face as he recalls the tales he has heard; it will be his honor, he says, to induct you into the ranks of the Maelstrom. He begins to explain the formalities that must precede your oath, but before he can finish, a Storm Private bursts in with urgent news. A lookout in lower La Noscea has reported that imperial forces opened fire on a Highwind Skyways airship, forcing it into a dire state and sending it banking toward an emergency landing in Cedarwood. Cursing the timing, the officer notes that they have no troops to spare in that area—the bulk of their infantry is currently tied up along the coast, locked in skirmishes with the “fishbacks.” In light of this, he turns to you. This is highly irregular, he admits, but your first duty in service to the Maelstrom must, for now, be unofficial. If the report is correct, the airship will crash in territory swarming with imperial scouts. Should there be any survivors, you must reach them before the Garleans do. He orders you to hasten to Cedarwood, locate the fallen airship, and ensure that any living crew come to no further harm. The formal swearing-in will simply have to wait until your return.</p>
      <p>You make for Cedarwood, where the smell of smoke and the twisted silhouette of a stricken craft mark the crash site. An airship crewman, startled to see an adventurer so far from the safety of the city, urges you to take cover first before firing off questions—what are you doing out here, and how can he be sure you are not an imperial spy, when you lack even a Maelstrom uniform? Before his suspicions can deepen, a Storm Lieutenant arrives with a small detachment, identifying your companion as a Garlond Ironworks engineer and explaining that a Maelstrom lookout spotted the attack and sent them to the rescue. The lieutenant addresses you by name, commending you for reaching the engineer ahead of the imperials. Nearby, an imperial scouting party from Castrum Occidens eyes the damaged craft, its commander declaring that the unfamiliar design can only be the work of Garlond. The secrets of magitek, he snarls, belong in imperial hands, not in the keeping of Eorzean “savages.” They intend to drag the ship back to their fortress, dismantle it if need be, and seize the engineer as payment for Garlond’s “crimes.” The lieutenant takes in the situation at a glance. When the engineer cries out that a Lalafell named Wedge is still hiding inside the Tiny Bronco—the prototype airship itself—recognition flickers in the officer’s eyes. This is the new design people have been whispering about, the first airship built since the Calamity and Master Garlond’s disappearance. After years of work, her maiden flight has been shattered by imperial fire. There is no time to waste. The lieutenant lays out the plan: they will hit the imperials hard and fast, deny them their “souvenir,” and make certain the ship—and the Lalafell within—remain in Eorzean hands. He asks if you are ready to teach these curs a lesson, and when you give your assent, he rallies his men with a cry to charge like a tidal wave.</p>
      <p>The imperials, caught unawares, raise the alarm and draw steel as you and the Maelstrom soldiers crash down upon them. Steel rings and magicks flare in the dry air of Cedarwood as you carve through the Garlean scouting party, determined not to let them claim the Tiny Bronco or her crew. At last, the last of the enemy falls, and the duty is done. From the battered airship emerge Wedge and his companion Biggs, calling out to each other in relief. Biggs scolds Wedge for staying with the ship, and Wedge admits it was a close thing. They quickly turn their attention to the damage: the auxiliary propeller is beyond saving, but Wedge believes they can still wring enough thrust from the main propeller to get the Tiny Bronco airborne again. With a few modifications, he says, they should be able to fly her home. The Storm Lieutenant promises that his men will stand watch until the ship is ready to depart; the imperials will eventually notice their missing scouts, but he doubts any significant force will arrive for some time. He releases you from the field, telling you to return to Maelstrom Command and complete your induction. Ordinarily he would ask an adventurer of your ability to stay by their side, he adds, but they will all rest easier knowing that you are safely sworn in and ready for whatever mission comes next. Biggs, still a little flustered, apologizes for having suspected you of being an imperial spy and laughs at how wrong he was. If it had not been for you and the Maelstrom soldiers, he says, they would already be chained up in some dungeon. He and Wedge both thank you sincerely before turning back to their work on the airship.</p>
      <p>When you return to Maelstrom Command in Limsa Lominsa, the Storm Personnel Officer greets you with a new respect in his eyes. He has already received the report from Cedarwood and assures you that the engineers completed their return flight without further imperial interference. Whatever doubts he may have harbored about you have been put to rest; the stories he heard seem to have been true after all. He looks forward to seeing what more you are capable of—after you are properly inducted into the Maelstrom, of course. With the urgent business at last concluded, he turns the conversation back to your formal induction, ready to see your name added to the rolls of the Grand Company you have chosen.</p>
    </div>

  JP:{
    langLabel:'日本語',
    pageTitle:'我が行く道は……（黒渦団）',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>提督の演説を聞き終えたあなたに、黒渦団の将校は問いかける。詳しく語るまでもなく、いまここに立つあなたの姿こそが答えだと彼は笑い、すでに心は黒渦団に向いているのだろうと見抜いていた。入団の意思をはっきりと伝えると、将校は満足げに頷き、あなたのような者が加われば、団の戦力はいっそう強固なものになると喜びをあらわにする。これで決心はついた──あとは正式な手続きを残すのみだ。彼は、リムサ・ロミンサの上甲板にある黒渦団本部へ向かい、団の司令部に所属を申し出るよう指示する。人事担当の士官に話を通しておくので、すぐに対応してもらえるはずだという。黒渦団の任務は、ときに過酷で厳しいものとなるが、それでもこの選択を悔いることはないだろう──そう約束し、海路の無事と羅針盤の確かさを祈りながら、彼はあなたを送り出す。その傍らで、不滅隊の将校は、ラウバーン将軍の雄姿に心奪われなかったのかと残念そうに嘆きつつ、いずれはその威厳にも慣れただろうと未練を覗かせる。一方、双蛇党の将校は、いつでも各グランドカンパニー間を転属できると穏やかに念押しし、もし心変わりすることがあれば双蛇党は喜んで迎え入れると微笑んだ。それでも、今この瞬間にあなたが選んだのは、黒き渦を象徴する旗のもとだった。</p>
      <p>やがて黒渦団本部に到着したあなたは、受付に立つ人事担当士官に声をかける。黒渦団に用があるのかと問われ、あなたは自らの名を告げて入団のために訪れたと説明する。彼は、勧誘担当から話を聞いていたのを思い出し、その名に覚えがあると目を見開いた。あなたのような冒険者を黒渦団に迎え入れられることを光栄に思う、と言いながら、入団の誓いを受ける前に必要となる手続きについて説明し始める。だが、その言葉を遮るように、ひとりの黒渦団兵が血相を変えて駆け込んできた。ローワー・ラノシアの見張りから緊急の報告が入ったというのだ。ハイウィンド・スカイウェイズ社の飛空艇が、帝国軍の砲撃を受けて損傷し、シダーウッド方面へ不時着を余儀なくされているらしい。人事担当士官は舌打ちをこぼしつつ、あいにくその地域には兵力を割く余裕がなく、沿岸部では「蛮族の魚人」との小競り合いで歩兵隊が手一杯である現状を嘆く。そこで彼は、あなたの方へと向き直った。これは極めて異例のことだが、あなたの黒渦団における「最初の任務」は、正式なものではなくならざるを得ないと前置きしたうえで、シダーウッドへ急行するよう命じる。もし見張りの報告どおりなら、飛空艇は帝国の斥候がうろつく危険地帯に落ちることになる。生存者がいるなら、ガレマール帝国兵よりも先に保護しなければならない。撃ち落とされた飛空艇を探し当て、その乗員たちがこれ以上危険に晒されないよう守ってほしい──入団の誓いは、任務を終えてからあらためて行うと約束しつつ、彼はあなたを送り出すのだった。</p>
      <p>あなたはローワー・ラノシアのシダーウッドへと向かい、焦げた匂いと、無残に傾いた飛空艇の影が墜落地点を物語る光景に行き当たる。そこで出会った飛空艇乗員は、この辺境で冒険者と遭遇したことに驚きながらも、まずは身を隠そうと促し、何をしに来たのか、いや、その前に本当に帝国のスパイではないのかと疑いの視線を投げかけてくる。黒渦団の制服すら身につけていないあなたを前にしては、無理もない疑念だった。そこへ、黒渦団の中尉が部下を率いて現れ、険悪な空気を断ち切る。彼は、目の前の男がガーロンド・アイアンワークス所属の技師であり、見張りから攻撃の報告を受けた黒渦団が救出に駆けつけたのだと手短に説明する。そして、帝国よりも先に技師のもとへ辿り着いたあなたの働きを称えた。少し離れた場所では、カストルム・オクシデンスから出た偵察隊と思しき帝国兵が、墜落した飛空艇を観察していた。彼らの隊長は見たこともない艦体の形状に目を細め、これがガーロンドの新たな設計によるものに違いないと吐き捨てる。魔導技術の秘密は帝国にこそ属すべきものであり、エオルゼアの野蛮人どもに浪費されるべきではない──そう言って、飛空艇を要塞へ持ち帰り、必要とあらば分解してでも技術を奪い取るつもりなのだと宣言し、技師はガーロンドの「罪」を償わせるために連行すると息巻く。状況を見極めた中尉のもとに、乗員が駆け寄って叫んだ。タイニーブロンコの中には、まだララフェル族のウェッジが隠れているというのだ。タイニーブロンコ──それは、噂に聞く新型飛空艇の名であり、第七霊災以降、行方不明となったガーロンド以来、初めて完成した飛空艇でもあった。長年の研究と試作を経て、ついに初飛行を迎えた矢先、帝国の砲火によって撃ち落とされたのである。悠長に構えている暇はない。中尉は即座に作戦を示し、帝国兵を一気に叩いて飛空艇への手出しを許さず、タイニーブロンコとその中にいるララフェルを必ず守り抜くと告げる。そして、帝国の犬どもに一矢報いる覚悟はできているかとあなたに問いかけ、覚悟を確かめると「黒渦の如き突撃を！」と号令をかけて突撃を開始した。</p>
      <p>不意を突かれた帝国兵たちは「待ち伏せか！」と叫びながら武器を抜き、あなたと黒渦団兵の攻勢を必死に受け止めようとする。シダーウッドの乾いた空気の中で剣戟の音が響き、魔法の光が瞬く。あなたは帝国の偵察隊を次々と打ち倒し、タイニーブロンコとその乗員を決して渡すまいという決意のもと戦い抜く。そしてついに敵の残党が地に伏し、任務完了の報が胸に刻まれるころ、損傷した飛空艇からララフェル族のウェッジと、その相棒ビッグスが姿を現し、互いの無事を確かめて安堵の声を上げた。ビッグスは、ウェッジが飛空艇に残ったことを叱りつつも、その無事に胸を撫で下ろし、ウェッジは危うく命を落とすところだったと震え混じりに漏らす。すぐさま二人は損傷の具合を見極めにかかり、補助プロペラは完全に壊れてしまったが、主プロペラからならまだ十分な推力を絞り出せるはずだと見立てる。いくつか小さな改修を施せば、タイニーブロンコは再び空へ戻り、自力で帰還できるだろうと、わずかな希望を見出した。黒渦団の中尉は、飛空艇が飛び立つ準備を整えるまで自分たちが警護にあたると約束し、帝国側が偵察隊の不在に気づけばいずれ増援が来るだろうが、すぐに到着することはないはずだと状況を分析する。そして、あなたには黒渦団本部へ戻り、正式な入団手続きを済ませるよう勧めた。本来であれば、これほどの腕を持つ冒険者には現場に留まってほしいところだが、次の任務に備えてきちんと黒渦団の一員として名を連ねていてくれた方が、皆にとっても心強い──そう言ってあなたを送り出し、功績については責任をもって司令部へ報告すると約束する。別れ際にビッグスは、あなたを帝国のスパイ呼ばわりしたことを恥じ入りながら謝罪し、盛大に見当違いをしてしまったと照れ笑いを浮かべる。もしあなたと黒渦団の兵たちが駆けつけていなければ、今ごろ自分たちは帝国の地下牢で鎖につながれていただろうと真顔で語り、心からの感謝を述べる。ウェッジもまた、小さな身体を精一杯使って深々と頭を下げ、何度も礼を言ったのだった。</p>
      <p>リムサ・ロミンサの黒渦団本部へ戻ると、人事担当士官は先ほどまでとは違う眼差しであなたを迎えた。すでにシダーウッドでの一件について報告を受けており、技師たちが帝国の追撃を受けることなく無事に帰還したことを告げる。正直なところ、最初は伝え聞く噂を半信半疑で聞いていたが、今回の働きでその多くが真実であったと認めざるを得ない──そう言って、彼はあなたの実力を素直に称賛した。今後、黒渦団としてどのような活躍を見せてくれるのか楽しみにしている、と前置きしつつも、その前に正式な入団手続きを済ませねばならないと微笑む。こうしてようやく、先ほど一度中断された「入団の儀式」が再開され、あなたの名が選ばれしグランドカンパニーの名簿に刻まれようとしていた。</p>
    </div>

    story:`<div class="clamp" data-collapsed="true">
      <p>在聽完 Admiral 的慷慨演說之後，你轉向 Storm Officer，做出了自己的選擇。他從你站在這裡的姿態裡就已經看出答案，在你親口斷言願意加入 Maelstrom 的那一刻，他的笑容變得更加暢快。像你這樣的同伴加入，他說，自家部隊的力量只會更加壯大，並邀請你一同乘風破浪，並肩迎向海上的未知。既然決定已下，接下來就是正式手續了──他要你回 Limsa Lominsa，在上層甲板的 Maelstrom Command 報到。那裡是黑渦團的司令部，他會先行發出聯絡，讓人事官員做好接待準備。作為 Maelstrom 士兵，肩上的任務往往艱辛又充滿挑戰，但他保證你不會後悔這個選擇，並祝福你行程順利、方位無誤。離開前，不滅隊的 Flame Officer 對你的決定頗為震驚，連聲感嘆 General Raubahn 那氣勢磅礡的身影難道沒有打動你嗎，雖然他承認那位將軍乍看之下確實有點嚇人。Twin Adder 的 Serpent Officer 則語氣溫和地提醒你，往後如果有一天改變心意，Grand Company 之間是允許轉任的，Order of the Twin Adder 也會非常歡迎你。儘管如此，此刻你踏出的腳步，已經明確指向了飄揚著黑渦旗幟的 Limsa Lominsa。</p>
      <p>來到 Maelstrom Command，你向 Storm Personnel Officer 表明來意。他先是例行性地詢問你的業務，再聽見你的姓名與「入伍」二字後，才恍然想到自己早已從招募官那裡聽過你的名字。能親自將你納入 Maelstrom 旗下，他說，對自己來說也是一種榮幸。就在他準備開始說明正式宣誓前需要了解的數項事項時，一名 Storm Private 匆忙衝進來，打斷了談話。對方報告說，下層拉諾希亞的瞭望員發來緊急訊息：一艘 Highwind Skyways 的飛空艇遭到帝國部隊砲擊，情況岌岌可危，目前似乎正勉強朝 Cedarwood 方向尋找迫降地點。人事官員低聲咒罵這個時機之糟，並說現在那一帶根本調不出人手──大部分步兵目前仍困在沿岸一帶，與那些「魚背怪」交戰。於是，他只好轉向你，坦白表示接下來的安排非常不合慣例：你在 Maelstrom 的「第一項任務」勢必要以非正式的方式展開。如果瞭望員的情報無誤，那艘飛空艇將會在滿是帝國斥候巡邏的地帶迫降。只要艦上還有生還者，Maelstrom 就必須搶在 Garlean 之前把人救走。他要你立刻動身前往 Cedarwood，找到墜落的飛空艇，並確保所有倖存的乘員不再受到傷害。至於那原本應該先進行的入團宣誓，只能等你安全返回之後再補辦。</p>
      <p>你一路抵達 Cedarwood，焦糊的氣味瀰漫在空氣中，一艘傾斜倒臥、煙霧繚繞的飛空艇剪影清楚標示出墜落地點。一名 Airship Crewman 在殘骸附近發現了你，對於在這種地方遇見冒險者感到錯愕，連忙叫你先躲到掩蔽物後再說。當他聽見 Maelstrom Command 派你前來救援時，卻又狐疑起來──你身上連一件 Maelstrom 制服都沒有，他怎麼知道你不是帝國派來的間諜？就在氣氛逐漸緊繃之際，一名 Storm Lieutenant 帶著小隊趕到，出面化解了這場誤會。他向乘員保證自己與部下皆為 Maelstrom 所屬，並點出對方是 Garlond Ironworks 的工程師，說明是因為瞭望哨目擊了攻擊事件，他們才奉命前來救援。中尉接著看向你，稱讚你搶在帝國之前抵達現場，成功找到這位工程師。此時，一支來自 Castrum Occidens 的帝國偵察隊也悄悄逼近，士兵們一邊打量那艘前所未見的飛空艇，一邊冷笑這八成是 Garlond 的新設計。魔導技術的秘密本就該掌握在帝國手中，絕不該任由 Eorzea 的「野蠻人」揮霍浪費──他們揚言要將這艘飛空艇拖回堡壘，必要時就地拆解，連同工程師一併帶走，好讓某個人替 Garlond 的「叛逆」付出代價。Storm Lieutenant 迅速掌握局勢，這時工程師急切地喊道：名叫 Wedge 的 Lalafell 仍然躲在 Tiny Bronco 裡。Tiny Bronco──這正是最近人們口耳相傳的新型飛空艇名號，也是自從 the Calamity 之後，Garlond 失蹤以來第一艘真正完工的飛空艇。歷經多年的研究與調整，好不容易迎來首次試飛，卻在天空中被帝國砲火擊落。情況不容拖延。中尉簡短地下達作戰方針：必須迅雷不及掩耳地突襲這支帝國小隊，不讓他們有機會接近飛空艇。如果這些傢伙想從 Eorzea 帶走紀念品，那就只給他們留下肚子上的鋼鐵，Tiny Bronco 和那位 Lalafell 則絕對不會落入敵手。他轉向你，詢問你是否做好準備教訓這群傲慢的傢伙，待你點頭應允後，便高喊要像巨浪般一舉衝鋒。</p>
      <p>猝不及防的帝國士兵發現自己遭到伏擊，高喊「有埋伏！」的同時抽出武器，倉促迎戰。你與 Maelstrom 士兵並肩衝入敵陣，鋼鐵相擊的聲響與魔法光芒在 Cedarwood 乾燥的空氣中此起彼落。你全力擊潰這支 Garlean 偵察隊，心裡明白只要他們還站著，Tiny Bronco 和艦上成員就隨時會被奪走。最終，敵方士兵一個接一個倒下，戰鬥就此結束。從受創的飛空艇裡走出的，是 Wedge 和他的夥伴 Biggs──兩人互相呼喊對方的名字，確認彼此都還安然無恙。Biggs 一邊責怪 Wedge 不該留在飛空艇上，一邊難掩鬆了口氣的表情，Wedge 則支支吾吾地承認剛才實在太驚險。隨即，他們把注意力轉回到 Tiny Bronco 身上，評估損傷情況：輔助用的螺旋槳已經完全報廢，不過主螺旋槳仍有希望榨出足以讓飛空艇再次升空的推力。只要做些細部改裝，Tiny Bronco 應該就能自行飛回基地。Storm Lieutenant 表示，他與部下會在這裡守到飛空艇準備完畢為止。帝國早晚會發現偵察隊失聯，遲早會派人來查，但短時間內應該還不會出現大部隊。他於是放你離開，要你回到 Maelstrom Command，把未完成的入團手續補完。照理說，他本應希望這樣的高手留在戰線上幫忙，但他也坦言，能讓你以正式 Maelstrom 身分投入之後的任務，對所有人而言都更令人心安。他保證會親自向上級報告你在這次行動中的貢獻。臨別前，Biggs 有些不好意思地走向你，為自己先前懷疑你是帝國間諜一事道歉，苦笑著承認自己完全看走眼。如果不是你和這群 Maelstrom 士兵及時出現，他與 Wedge 現在恐怕已經被鎖在某座帝國地牢裡了。他由衷感謝你的援助。Wedge 也急忙道謝，雖然話不多，但臉上那份真切的感激不言而喻。</p>
      <p>回到 Limsa Lominsa 的 Maelstrom Command，Storm Personnel Officer 以截然不同的眼光迎接你。他已經收到來自 Cedarwood 的報告，並告訴你那兩名工程師順利完成返航，再也沒有遭遇帝國襲擊。說實話，他一開始對你身上的種種傳聞半信半疑，如今看來，那些故事多半不假。他坦言自己很期待未來在戰場上能再次見識你的本領──當然，是在你「正式」完成 Maelstrom 入團之後。現在，緊急狀況總算告一段落，他重新把話題拉回原本該進行的程序，準備為你辦理正式的入伍手續，讓你的名字堂堂正正地登上這家 Grand Company 的名冊。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
