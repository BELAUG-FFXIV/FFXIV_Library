    strategy:`<div class="stack"><div class="row"><div class="clamp" data-collapsed="true">
      <p><b>Act 1</b></p>
      <p>Goldor Blizzard III: Must be interrupted. If it goes off, it deals heavy damage and inflicts Deep Freeze, which will usually lead to a KO from the following Goldor Fire III.</p>
      <p>Goldor Fire III: A large AoE appears centered on you. After the first blast, three more AoEs appear in succession.</p>
      <p>Goldor Blast: A line AoE targeted at the player.</p>
      <p>Slimy Summon: Summons a Glittering Slime that is weak to ice damage but has high HP. If it is not defeated quickly, it will cast Rupture and kill the player.</p>
      <p>Goldor Quake: A circular AoE centered on Goldor, followed by two staggered donut AoEs.</p>
      <p>Goldor Fire: Summons 8 Ball of Fire adds that cast Burn. These are weak to wind damage. Defeat one first, then use the knockback to land in the safe area you created.</p>
      <p>Goldor Aero III: Used after Goldor Fire. Knocks the player back.</p>
      <p>Goldor Gravity: Inflicts Heavy for 12 seconds. This is followed by two casts of Goldor Blast.</p>
      <p>Goldor Thunder III: Summons random circle AoEs and inflicts Electrocution.</p>
      <p><b>Act 2</b></p>
      <p>Goldor reuses many mechanics from Act 1, but also begins fighting with his crystal.</p>
      <p>Shining Summon: Uses the crystal to summon gilded constructs. The early summons include Gilded Golems, Gilded Marionettes, and a Gilded Cyclops, each adding different overlapping mechanics that must be resolved in sequence.</p>
      <p>Gold Fever: Goldor becomes immune to magical damage and gains stronger magical attacks, while the Gilded Crystal becomes targetable. The crystal is also immune to magical damage, so physical damage is required.</p>
      <p>Later, Shining Summon returns with a large combined pattern, followed by repeated Goldor Blast casts. Correct positioning is required to survive the overlapping lane AoEs, cone AoEs, pulls, and blasts.</p>
      <p>Goldor Rush: Goldor combines Goldor Aero III, Goldor Thunder III, and Goldor Quake almost simultaneously, then quickly follows with three Goldor Blast casts. This covers much of the arena and forces either precise movement or a defensive survival strategy.</p>
      <p>After that, the rest of the act repeats the large-group Shining Summon, Goldor Gravity, Goldor Blizzard III, and Goldor Rush.</p>
    </div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div></div></div>`,

    tips:`<div class="stack"><div class="row"><div class="clamp" data-collapsed="true">
      <p>To earn All That Glitters Is Blue and the Gentlemage’s Umbrella weapon, complete the stage while casting all six elements, without using Sprint, and without destroying the crystal in Act 2.</p>
      <p>Because the crystal must remain intact, the rest of Act 2 has to be cleared with physical damage spells. Recommended options include Goblin Punch, Triple Trident, Both Ends, J Kick, Mountain Buster, Phantom Flurry, and Ruby Dynamics. The elemental requirement is easily completed during Act 1.</p>
      <p>Since Blue Mage’s strongest damage is usually magical, Act 2 becomes a long fight under these restrictions. Fortunately, the achievement has no time requirement and does not fail due to Vulnerability Up stacks.</p>
      <p>For a stable clear, use Aetheric Mimicry: Healer, heal with Pom Cure, recover MP with Lucid Dreaming between Goldor Rush sequences, and use the Mighty Guard + Diamondback method instead of trying to dodge Goldor Rush manually. Turn Mighty Guard off afterwards unless you are specifically continuing with Goblin Punch, which benefits from it.</p>

    strategy:`<div class="stack"><div class="row"><div class="clamp" data-collapsed="true">
      <p><b>Act 1</b></p>
      <p>ゴールドル・ブリザガ：必ず詠唱中断が必要です。発動されると大ダメージに加えて「凍結」を受け、そのまま続く ゴールドル・ファイガ で戦闘不能になりやすくなります。</p>
      <p>ゴールドル・ファイガ：プレイヤー中心の大きな円範囲攻撃です。最初の着弾後、さらに3回連続で円範囲が発生します。</p>
      <p>ゴールドルブラスト：プレイヤーを狙う直線範囲攻撃です。</p>
      <p>サモンスライム：氷属性が弱点でHPの高い グリッタースライム を召喚します。素早く倒せないと ラプチャー を詠唱し、戦闘不能にされます。</p>
      <p>ゴールドル・クエイク：ゴールドル中心の円範囲攻撃の後、時間差で2回のドーナツ範囲攻撃が続きます。</p>
      <p>ゴールドルファイア：火球 を8体召喚し、それぞれが 燃焼 を詠唱します。火球は風属性が弱点なので、まず1体倒し、作った安置へノックバックで入る必要があります。</p>
      <p>ゴールドル・エアロガ：ゴールドルファイア の後に使用され、プレイヤーをノックバックします。</p>
      <p>ゴールドル・グラビデ：12秒間の ヘヴィ を付与します。このあと ゴールドルブラスト を2回使ってきます。</p>
      <p>ゴールドル・サンダガ：ランダムな円範囲攻撃を発生させ、さらに 感電 を付与します。</p>
      <p><b>Act 2</b></p>
      <p>Act 2では、ゴールドルは Act 1 の多くのギミックを引き続き使用しますが、ここからは クリスタル と連動して戦います。</p>
      <p>サモンゴールデン：クリスタルを使って金色の使い魔を召喚します。序盤では ゴーレム、人形、サイクロプス などが順に現れ、それぞれ異なるギミックを重ねてくるため、順番に処理する必要があります。</p>
      <p>ゴールデンフィーバー：ゴールドルに 魔法無効化 と魔法攻撃強化が付与され、同時に ゴールデンクリスタル を攻撃できるようになります。クリスタル側にも 魔法無効化 があるため、ここでは物理属性の青魔法で対処する必要があります。</p>
      <p>その後、サモンゴールデン は大きな複合パターンとして再び登場し、続けて ゴールドルブラスト を連発します。直線範囲、扇範囲、引き寄せ、ブラストが重なるため、正しい位置取りが必要です。</p>
      <p>ゴールドルラッシュ：ゴールドルが ゴールドル・エアロガ、ゴールドル・サンダガ、ゴールドル・クエイク をほぼ同時に組み合わせ、その直後に ゴールドルブラスト を3連続で使います。フィールドの大部分が危険地帯になるため、正確な移動か、防御的な耐え方が必要になります。</p>
      <p>その後は、Act 2 の残りを通して、複合型の サモンゴールデン、ゴールドル・グラビデ、ゴールドル・ブリザガ、ゴールドルラッシュ が繰り返されます。</p>
    </div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div></div></div>`,

    tips:`<div class="stack"><div class="row"><div class="clamp" data-collapsed="true">
      <p>アチーブメント 「ゴールデンブルー」 と武器 「ジェントルメイジアンブレラ」 を獲得するには、6属性すべての青魔法を使用し、スプリントを使わず、さらに Act 2 でクリスタルを破壊しない ままステージをクリアする必要があります。</p>
      <p>クリスタルを残したまま進める必要があるため、Act 2 の後半は物理系青魔法で削る構成になります。候補としては ゴブリンパンチ、トリプルトライデント、如意大旋風、ジャスティスキック、マウンテンバスター、鬼宿脚、ルビーダイナモ などが有効です。6属性の条件は、Act 1 のうちに済ませておくと安定します。</p>

      <p>安定してクリアしたい場合は、エーテルコピー：ヒーラー を使い、回復は ポンポンケアル で行い、ゴールドルラッシュ の合間に ルーシッドドリーム でMPを戻す形がおすすめです。ゴールドルラッシュ は無理に回避するより、マイティガード＋超硬化 で受けるほうが安定します。受け終わったあとは、ゴブリンパンチ を使い続ける場合を除き、マイティガード は解除しておくとよいでしょう。</p>

    strategy:`<div class="stack"><div class="row"><div class="clamp" data-collapsed="true">
      <p><b>Act 1</b></p>
      <p>Goldor Blizzard III：這招一定要打斷。若讓它成功詠唱，會造成高額傷害並附加 深度冰封，通常接下來的 Goldor Fire III 就會直接把你帶走。</p>
      <p>Goldor Fire III：以玩家為中心出現大範圍圓形 AoE。第一次爆炸後，還會再連續出現三次 AoE。</p>
      <p>Goldor Blast：朝玩家施放的直線 AoE。</p>
      <p>Slimy Summon：召喚一隻弱冰屬性、但血量很高的 Glittering Slime。如果沒有盡快擊倒，它會詠唱 Rupture，直接擊殺玩家。</p>
      <p>Goldor Quake：以 Goldor 為中心的圓形 AoE，接著再出現兩次錯開時機的甜甜圈 AoE。</p>
      <p>Goldor Fire：召喚 8 顆 Ball of Fire，它們會施放 Burn。這些火球弱風屬性，因此要先打掉其中一顆，再利用擊退進入你製造出的安全區。</p>
      <p>Goldor Aero III：在 Goldor Fire 之後施放，會把玩家擊退。</p>
      <p>Goldor Gravity：附加 12 秒 沉重。之後會接兩次 Goldor Blast。</p>
      <p>Goldor Thunder III：在場上隨機生成圓形 AoE，並附加 感電。</p>
      <p><b>Act 2</b></p>
      <p>到了 Act 2，Goldor 會重複使用不少 Act 1 的機制，但也開始與 水晶 一起作戰。</p>
      <p>Shining Summon：透過水晶召喚鍍金構造體。前段會先後出現 Gilded Golems、Gilded Marionettes 與 Gilded Cyclops，各自帶來不同的重疊機制，必須依順序處理。</p>
      <p>Gold Fever：Goldor 會進入 魔法免疫 狀態，魔法攻擊也會變得更強，同時 Gilded Crystal 會變成可被攻擊的目標。由於水晶本身同樣 魔法免疫，所以這一段必須改用物理傷害。</p>
      <p>之後 Shining Summon 會以大型複合模式再次出現，接著連續施放多次 Goldor Blast。這裡會同時重疊直線 AoE、扇形 AoE、拉人機制與 Blast，必須靠正確站位才能活下來。</p>
      <p>Goldor Rush：Goldor 幾乎同時把 Goldor Aero III、Goldor Thunder III、Goldor Quake 疊在一起，接著很快再補上三發 Goldor Blast。這會讓場地大範圍都變成危險區，因此不是要有非常精準的走位，就是要採取偏防禦的生存方式。</p>
      <p>在那之後，Act 2 剩下的流程會持續重複大型 Shining Summon、Goldor Gravity、Goldor Blizzard III 與 Goldor Rush。</p>
    </div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div></div></div>`,

    tips:`<div class="stack"><div class="row"><div class="clamp" data-collapsed="true">
      <p>若要拿到成就 All That Glitters Is Blue 與武器 Gentlemage’s Umbrella，必須在通關時達成以下條件：施放過六種屬性的招式、不使用 Sprint，並且 Act 2 的水晶不能被破壞。</p>
      <p>由於水晶必須保留，Act 2 後半就必須改用物理傷害招式來打。比較推薦的選擇包括 哥布林拳、魚叉三段、如意大旋風、正義飛踢、山崩、鬼宿腳、紅寶石電圈。至於六屬性的條件，通常在 Act 1 就可以很輕鬆完成。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  overview: document.getElementById('panel-overview'),
  spells: document.getElementById('panel-spells'),
  strategy: document.getElementById('panel-strategy'),
  tips: document.getElementById('panel-tips'),
  notes: document.getElementById('panel-notes'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') {
    panels[key].innerHTML = t[key];
    if (['strategy','tips','notes'].includes(key)) wireClamp(panels[key], t);
  }
  if (key === 'comments') loadGiscusForCurrentLang();
}

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};

function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }

function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
