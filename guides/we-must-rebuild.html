    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }

    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px;color:var(--fg)}

    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}

    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}

    story:`<div class="clamp" data-collapsed="true">
      <p>In the Quicksand of Ul’dah, you find Momodi leaning over the counter with her familiar, easy smile, studying you like she’s weighing how far you’ve come since you first staggered in. She asks how you’re finding her fine city, wants to know if you’ve gotten your bearings at last and can walk the streets without feeling lost. When she senses that you’re no longer completely adrift, her tone shifts—still warm, but edged with purpose—as she tells you it’s about time you ventured beyond the safety of the city walls.</p>
      <p>The bustling markets and sun-drenched alleys of Ul’dah are one thing, she says, but the wilds of Thanalan are another matter entirely. She then mentions a man she wants you to meet, someone she believes would be glad to cross paths with an adventurer like you. His name is Papashan, and you can find him at the Ul’dah Dispatch Yard out in central Thanalan. She gives you clear, practical directions: you leave through the door across the hall, look straight ahead to find the Gate of Nald staring back at you, pass beneath its great arch, and head east along the road. If you follow that way, you will come upon the Dispatch Yard before long. Just as you are about to go, she grows more serious and warns you about the dangers lurking beyond the walls—creatures not so terrible as to be the stuff of legend, but feisty enough to attack if you stray too close. She doesn’t want you saying no one cared enough to warn you. With her caution ringing in your ears, you accept the quest, step through the Gate of Nald into central Thanalan, and cross the sun-baked sands of the Spineless Basin toward the tracks and platforms of the Ul’dah Dispatch Yard.</p>
      <p>When you arrive at the Dispatch Yard, rails crisscrossing the dry earth and workers moving about their tasks, an elderly Lalafell in stationmaster’s attire regards you with a keen, appraising gaze. He notes that you certainly look the part of an adventurer and asks if you are the good soul Momodi told him to expect. When you confirm it, he introduces himself as Papashan, stationmaster of this humble Dispatch Yard, though he is quick to dismiss the weight of the title, calling it little more than an empty name. In truth, he says, he is just a tired old Lalafell spending his final years in quiet and solitude.</p>
      <p>Yet as he speaks of the five years since the Calamity struck and the devastation it wrought, you can feel how deeply those memories cut. He explains that in the wake of that disaster, true Ul’dahns have worked side by side, doing all in their power to rebuild what was laid to ruin. By the sweat of their brows and the love they bear their home, they have restored Ul’dah to the grandeur and majesty you see today, and the railways running through this very Dispatch Yard are themselves the fruit of many noble souls’ efforts. Even so, he tells you, the wounds left by the Calamity run deep: there are still isolated areas beyond their lines of supply, places that continue to want for relief and restoration. Ul’dah needs the aid of you and your brethren now more than ever, he says, and with a small, resolute smile, he finally comes to the point—he believes he has work suited to your ability, if you are willing to lend your strength.</p>
    </div>

    pageTitle:'ウルダハ操車庫へ',

    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>砂の都ウルダハの酒場「クイックサンド」で、あなたはカウンター越しに身を乗り出したモモディと向き合う。彼女は、あなたの顔つきや立ち居振る舞いを眺めながら、この街の暮らしにどれほど慣れてきたのかを確かめるように問いかける。ここウルダハはどうだい、もう迷わず歩けるようになったかい、と。その様子から、あなたがある程度この街に馴染んできたと判断すると、彼女は今度は外の世界の話を切り出す。城壁に守られたウルダハの賑やかな通りと、ザナラーンの荒野とでは勝手がまるで違うのだと、少し真剣な声音であなたに告げるのだ。</p>
      <p>そこでモモディは、あなたに紹介したい人物がいると言う。彼もまた、あなたのような冒険者に会いたがっているに違いないと。名はパパシャン。中央ザナラーンの「刺抜盆地」にある「ウルダハ操車場」で働いている男だと教えてくれる。彼女は道順も丁寧に説明する。向かい側の扉から外に出て、真正面にそびえる「ナル大門」を目指すこと。門をくぐったら東へ進み、そのまま道なりに歩いていけば、ほどなく「ウルダハ操車場」に着けるはずだと。見送りの前に、モモディは改めて城壁の外に潜む危険について警告する。決して手に負えない怪物ばかりではないが、うかつに近づけば襲いかかってくる獰猛な魔物も多いのだと告げ、「誰も忠告してくれなかった」とは言わせないよ、と肩をすくめて笑う。あなたはその言葉を胸に刻み、クエストを受諾すると、「ナル大門」を抜けて「中央ザナラーン」へと踏み出し、やがて「刺抜盆地」の砂塵を越えて、鉄路とホームが広がる「ウルダハ操車場」へと向かっていく。</p>
      <p>やがてたどり着いた「ウルダハ操車場」では、乾いた大地を横切る鉄道と行き交う人々の中に、駅長の制服をまとった老齢のララフェルの姿がある。あなたに向けられたその鋭くも穏やかな視線は、いかにも冒険者らしい装いだとあなたを見定めながら、モモディから聞いていた「善き魂」とは、あなたのことだろうかと問いかける。あなたがうなずくと、彼は自らをこの控えめな「ウルダハ操車場」の駅長パパシャンと名乗るが、その肩書きをすぐさま名ばかりのものだと謙遜し、実際のところ自分は静けさと孤独のうちに余生を過ごす、ただの年老いたララフェルにすぎないのだと語る。</p>
      <p>やがて話題は、第七霊災がこの地を襲ってからの五年間へと移り、その被害がいかに甚大であったかを、彼は静かな口調で振り返る。しかし同時に、真にウルダハを愛する人々が力を合わせ、打ち倒されたものを取り戻すべく全力を尽くしてきたことも語るのだ。額に汗して働き、この街を思う心を支えにして、彼らはウルダハを今のような壮麗な姿へと立て直してきたのであり、あなたの足元を走る鉄道もまた、多くの尊い努力が形になったものだと教えてくれる。それでもなお、第七霊災の傷跡は深く、物資の補給線から外れた孤立地帯や、いまだ救援と復興を待つ場所が各地に残されていると彼は続ける。だからこそ今のウルダハには、あなたのような冒険者たちの助けがかつてないほど必要なのだと告げ、最後に穏やかな笑みを浮かべながら、まさにあなたの力にこそ任せたい仕事があるのだと、静かに切り出す。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> モモディ　ウルダハ：ナル回廊 <small class="muted">(X:11.6, Y:9.6)</small></div>

    unlockq:`<div class="stack">

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'前往烏爾達哈調車庫',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Ul’dah 的酒館 Quicksand 裡，你面對著倚在吧檯前的 Momodi。她一邊打量你的神情與站姿，一邊問你，現在覺得這座沙漠之城如何，是否已經不會再在街道裡迷路。當她察覺到你似乎已經稍微掌握 Ul’dah 的步調時，語氣便從打趣轉為認真，告訴你也差不多該走出城牆之外，去看看真正的 Thanalan 荒野了。</p>
      <p>她提醒你，被城牆與商隊包圍的 Ul’dah 街道是一回事，城外的野地又是完全不同的世界。接著，Momodi 提起一位她想介紹給你的對象，也認為對方一定會樂於見到像你這樣的冒險者。那人名叫 Papashan，是一位在 Central Thanalan 的 Ul’dah Dispatch Yard 工作的老人。她耐心替你畫出路線：從大廳對面的門走出去，抬頭就會看到 Gate of Nald 迎面而立，穿過那座城門之後一路向東前進，不久便能抵達 Ul’dah Dispatch Yard。臨走前，Momodi 又特別叮嚀你，城牆外潛藏著的危險遠比你想像得多。那些魔物未必可怕到難以對付，但只要靠得太近，就足以主動發難。她不希望有一天你受了傷，還得說出「沒有人提醒過我」這種話。於是你在她的警告仍縈繞耳邊時接下了任務，從 Gate of Nald 走出 Ul’dah，踏上 Central Thanalan 的砂地，穿越 Spineless Basin 的乾燥風沙，朝著鐵道與月台交錯的 Ul’dah Dispatch Yard 前進。</p>
      <p>當你走進 Ul’dah Dispatch Yard 時，周圍是穿梭不息的工人與延伸四方的鐵軌，一名身穿站長制服的年老 Lalafell 注視著你。他打量著你，說你看起來確實具備一名冒險者的模樣，隨後問你是否就是 Momodi 口中那位「好心的冒險者」。在你給出肯定的答覆後，他自我介紹為 Papashan，是這座樸實車場的站長，但旋即苦笑著表示，所謂站長的頭銜其實只是空有其名，如今的他不過是個在寧靜與孤獨中度過晚年的老 Lalafell 而已。</p>
      <p>談話間，他提到自從 Calamity 降臨至今已過了五年，那場災禍留下的破壞是多麼廣泛，語氣中帶著沉重的回憶。然而他也告訴你，真正的 Ul’dahn 彼此攜手，為了重建被摧毀的一切而傾注全力。靠著額頭流下的汗水與對家鄉的熱愛，他們將 Ul’dah 重新塑造成如今這般壯麗的姿態，而你腳下延伸的鐵道，正是無數人努力凝聚的成果。儘管如此，Calamity 留下的傷痕依舊深刻，Papashan 說，補給線之外仍有許多孤立的地區，有些地方至今仍在等待援助與復興。正因如此，現在的 Ul’dah 比以往任何時候都更需要像你這樣的冒險者。他最後露出一抹溫和而堅定的笑容，直言自己手上確實有一份很適合你實力的工作，只要你願意伸出援手。</p>
    </div>

    </div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
