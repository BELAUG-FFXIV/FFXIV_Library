<script>

const i18n = {

    pageTitle:`All 21 Phantom Weapons Umbrae (IL 760)`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>This video showcases all 21 Phantom Weapons of the Umbrae series (Item Level 760) introduced in Patch 7.31. After obtaining a Phantom Weapon Penumbrae through the earlier questline that begins with Lydirceil in Phantom Village (X:6.6, Y:7.1), level 100 Disciples of War or Magic can continue the relic progression to unlock the Umbrae stage.</p><p>By completing the dedicated enhancement quest to forge the first Umbrae weapon, players then gain access to additional upgrades at Dodokkuli. Each extra Umbrae weapon is obtained by trading the corresponding Phantom Weapon Penumbrae plus 3 pieces of Waxing Arcanite.</p><p>Waxing Arcanite can be purchased from Ermina in Phantom Village (X:6.9, Y:7.3) for 500 Allagan Tomestones of Heliometry each, for a total of 1,500 tomestones per weapon.</p><div class="toc"><p><b>00:00 ▶ All 21 Phantom Weapons (Umbrae, IL 760) fully showcased</b></p><p>00:54 – Phantom Guillotine Umbrae</p><p>04:55 – Phantom Bayonet Umbrae</p><p>06:07 – Phantom Bardiche Umbrae</p><p>07:20 – Phantom Sword &amp; Kite Shield Umbrae</p><p>08:49 – Phantom Crook Umbrae</p><p>10:14 – Phantom Codex Umbrae</p><p>11:40 – Phantom Star Globe Umbrae</p><p>13:07 – Phantom Pendulums Umbrae</p><p>14:33 – Phantom Arquebus Umbrae</p><p>16:00 – Phantom Harp Bow Umbrae</p><p>17:25 – Phantom Terpna Umbrae</p><p>18:53 – Phantom Rapier Umbrae</p><p>20:19 – Phantom Flat Brush Umbrae</p><p>21:45 – Phantom Staff Umbrae</p><p>23:12 – Phantom Index Umbrae</p><p>24:37 – Phantom Spear Umbrae</p><p>26:04 – Phantom Twinfangs Umbrae</p><p>27:31 – Phantom Blade Umbrae</p><p>28:57 – Phantom Cleavers Umbrae</p><p>30:24 – Phantom Knuckles Umbrae</p><p>31:51 – Phantom War Scythe Penumbrae</p></div></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Lydirceil <small class="muted">(Phantom Village, X:6.6, Y:7.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="wrought-by-hands-phantasmal.html">Wrought by Hands Phantasmal</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 100</div></div>`,
    followq:`<div class="stack"><div class="row">None</div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'ファントムウェポン【アンブラ】全21種（IL760）',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>この動画では、Patch 7.31で実装されたファントムウェポン【アンブラ】全21種（アイテムレベル760）を紹介します。まず、蜃気楼の町のリディルセイル（X:6.6 Y:7.1）から始まるクエストラインで、ファントムウェポン【ペンアンブレー】を入手していることが前提となります。レベル100のファイター／ソーサラーは、その後の強化を進めることでアンブラ段階を開放できます。</p><p>最初の1本を作成した後は、ドドックリで追加の武器を入手可能です。各追加武器は、対応するファントムウェポン【ペンアンブレー】に加え、上弦鉱石を3個納品することで交換できます。</p><p>上弦鉱石は、蜃気楼の町のアーミナ（X:6.9 Y:7.3）からアラガントームストーン:数理 500で購入できるため、武器1本につき合計1,500必要です。</p><div class="toc"><p><b>00:00 ▶ ファントムウェポン【アンブラ】全21種（IL760）一覧</b></p><p>00:54 – ファントムギロティン【アンブラ】</p><p>04:55 – ファントムバヨネット【アンブラ】</p><p>06:07 – ファントムバルディッシュ【アンブラ】</p><p>07:20 – ファントムソード＆ファントムカイトシールド【アンブラ】</p><p>08:49 – ファントムクルック【アンブラ】</p><p>10:14 – ファントムコーデックス【アンブラ】</p><p>11:40 – ファントムスターグローブ【アンブラ】</p><p>13:07 – ファントムペンデュラム【アンブラ】</p><p>14:33 – ファントムアークバス【アンブラ】</p><p>16:00 – ファントムハープボウ【アンブラ】</p><p>17:25 – ファントムテルプナ【アンブラ】</p><p>18:53 – ファントムレイピア【アンブラ】</p><p>20:19 – ファントムフラットブラシ【アンブラ】</p><p>21:45 – ファントムスタッフ【アンブラ】</p><p>23:12 – ファントムインデックス【アンブラ】</p><p>24:37 – ファントムスピア【アンブラ】</p><p>26:04 – ファントムツインファング【アンブラ】</p><p>27:31 – ファントムブレード【アンブラ】</p><p>28:57 – ファントムクリーバー【アンブラ】</p><p>30:24 – ファントムナックル【アンブラ】</p><p>31:51 – ファントムウォーサイズ【ペナンブラ】</p></div></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> リディルセイル <small class="muted">(蜃気楼の町, X:6.6, Y:7.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="wrought-by-hands-phantasmal.html">ファントムウェポンの強化</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div></div>`,
    followq:`<div class="stack"><div class="row">なし</div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'Umbrae 系列 Phantom Weapons 全 21 把（IL 760）',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>這支影片展示的是 Patch 7.31 實裝的 Umbrae 系列 Phantom Weapons 全 21 把（Item Level 760）。在先前透過 Phantom Village 的 Lydirceil（X:6.6, Y:7.1）開始任務線並取得 Phantom Weapon Penumbrae 之後，Lv.100 的戰鬥或魔法職業就能繼續推進這條 relic 武器強化流程，解鎖 Umbrae 階段。</p><p>完成第一把 Umbrae 武器的強化後，就能在 Dodokkuli 那裡兌換其他武器。每一把額外的 Umbrae 武器，都需要對應的 Phantom Weapon Penumbrae 再加上 3 個 Waxing Arcanite。</p><p>Waxing Arcanite 可向 Phantom Village 的 Ermina（X:6.9, Y:7.3）以每個 500 枚 Allagan Tomestones of Heliometry 購買，因此每把武器共需 1,500 枚。</p><div class="toc"><p><b>00:00 ▶ 完整展示 Umbrae 系列 Phantom Weapons 全 21 把（IL 760）</b></p><p>00:54 – Phantom Guillotine Umbrae</p><p>04:55 – Phantom Bayonet Umbrae</p><p>06:07 – Phantom Bardiche Umbrae</p><p>07:20 – Phantom Sword &amp; Kite Shield Umbrae</p><p>08:49 – Phantom Crook Umbrae</p><p>10:14 – Phantom Codex Umbrae</p><p>11:40 – Phantom Star Globe Umbrae</p><p>13:07 – Phantom Pendulums Umbrae</p><p>14:33 – Phantom Arquebus Umbrae</p><p>16:00 – Phantom Harp Bow Umbrae</p><p>17:25 – Phantom Terpna Umbrae</p><p>18:53 – Phantom Rapier Umbrae</p><p>20:19 – Phantom Flat Brush Umbrae</p><p>21:45 – Phantom Staff Umbrae</p><p>23:12 – Phantom Index Umbrae</p><p>24:37 – Phantom Spear Umbrae</p><p>26:04 – Phantom Twinfangs Umbrae</p><p>27:31 – Phantom Blade Umbrae</p><p>28:57 – Phantom Cleavers Umbrae</p><p>30:24 – Phantom Knuckles Umbrae</p><p>31:51 – Phantom War Scythe Penumbrae</p></div></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Lydirceil <small class="muted">(幻影村, X:6.6, Y:7.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="wrought-by-hands-phantasmal.html">幻影武器強化</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.100</div></div>`,
    followq:`<div class="stack"><div class="row">無</div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
