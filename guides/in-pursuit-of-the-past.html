  EN:{
    langLabel:'EN',
    pageTitle:'In Pursuit of the Past',

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Alphinaud says it is long past time to enter the Stone Vigil. He asks you to pay Lord Drillemont a visit and remind him of what he owes you, promising that he and Cid will follow shortly.</p>
      <p>When you meet Drillemont, he offers heartfelt thanks. He admits that without you, the heretic who masqueraded as Inquisitor Guillaime would still be free to prey upon the innocent. He confesses he was a fool to dismiss your claims out of hand, explaining that it seemed too much to hope the Scions of the Seventh Dawn still lived—let alone that Master Garlond yet drew breath. He says he has never been happier to be proven wrong.</p>
      <p>Alphinaud arrives and dryly remarks that it is gratifying someone derived enjoyment from Drillemont’s mistake. Then he presses the point: if there are no further objections, you will be permitted to enter the Stone Vigil and retrieve your airship. Drillemont agrees at once, saying it is the least he can do—though he warns that simply entering the outpost is not your greatest concern.</p>
      <p>Drillemont explains that shortly after your first arrival, he had his men scour old records. They confirmed that an abandoned airship was seized by the soldiers stationed at the Stone Vigil in the days following the Calamity, and as far as they can tell, it was still there when the outpost was overrun by dragons. He cannot say whether it was damaged or destroyed in the battle, nor can he promise it has not been removed in the years since. He adds that the ruin has long served as a Dravanian foothold in Coerthas; though his forces have pushed them back behind the walls, they have not been able to drive them out, and he cannot say when—or how—the situation will change.</p>
      <p>Alphinaud answers bluntly that there is no guarantee Ishgard will prevail, and you do not have time to wait. You will secure what is yours without Ishgardian aid. Drillemont accepts this, says it may be for the best, and tells you he will inform Ser Nathelain. Nathelain soon confirms you may enter the Stone Vigil whenever you wish, and adds that every knight in Whitebrim Front is praying for your success.</p>
      <p>Inside the ruin, you spot the Enterprise—lying just beyond an enormous sleeping dragon. Alphinaud insists the dragon is not your concern; you have come for the airship, and only the airship. He and Cid will sneak aboard and prepare it for launch, while you remain behind to keep watch and provide a distraction if the beast wakes. Before you can draw breath, Lahabrea appears, speaking with chilling interest. He muses that you mean to slay Garuda next, reminds you that her strength surpasses your previous primal conquests, and calls you the Bringer of Light—slayer of Ifrit, bane of Titan—yet suggests only a fool would underestimate you. He promises that win or lose, it should be entertaining… assuming you live that long. Then the dragon stirs, and Lahabrea taunts you as the air around you churns with aether.</p>
      <p>When it is over, Alphinaud rushes to you, calling your name and demanding you speak, relieved that you are not hurt. He admits that when you were caught within the aetheric bubble alongside the dragon, he feared he would need to find a new champion—and thanks the gods he has been spared that inconvenience. He says Cid is working on the Enterprise even now and calls you to hear the verdict: Cid says it will fly, though it will not be a pleasant ride. Alphinaud agrees it is better than staying, and decides you will return to Gridania—but he also admits that the Enterprise is in no condition to weather the storm at the Howling Eye, and must be repaired before you can proceed. Cid stares at the ship, says it all feels familiar, and falters when he tries to reach for what he cannot yet remember.</p>
      <p>Back at the airship landing in Gridania, Cid looks upon the Enterprise and says it feels as though he has come home—he can think of no other way to express it. Alphinaud, savoring the more agreeable climate of the Twelveswood, admits that the Holy See had its charms and that your Ishgardian jaunt proved quite an adventure, detours and all. But he reminds you the work is far from done: the airship must be repaired, and a primal still awaits.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'JP',
    pageTitle:'ストーンヴィジルに眠る翼',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>アルフィノは言う。そろそろストーンヴィジルへ踏み込む時だ。あなたはドリルモン卿を訪ね、こちらへの義理を思い出させてほしい。シドと自分は後から合流する、と。</p>
      <p>ドリルモン卿はあなたに深く感謝し、ギヨーム審問官を騙る異端者がまだこの地に残っていたなら、今も無辜の民を喰い物にしていただろうと言う。あなたたちの訴えを頭から退けたのは愚かだった、と認め、暁の血盟が生きているだけでも望み薄なのに、ましてシド・ナン・ガーロンドが生きているなど信じ難かったのだと打ち明ける。だが今は、誤りを正されてこれほど嬉しいことはない、と。</p>
      <p>そこへアルフィノが来て、せめて誰かがその過ちを楽しめたのなら結構なことだ、と皮肉を言い、すぐ本題へ移る。異議がないならストーンヴィジルへ入らせてもらい、飛空艇を回収したい。ドリルモン卿は当然だと言い、あなたたちがしてくれたことを思えば、それくらいは最低限だと応じる。だが卿は、前哨地に入ること自体は問題の小さな一部に過ぎない、と告げる。</p>
      <p>卿は説明する。あなたたちが最初に来た直後、古い記録を調べさせたところ、大災害の後に放棄された飛空艇がストーンヴィジルに駐屯していた兵によって押収された事実が確認できた。彼らが竜に襲われるまで、その飛空艇は管理下にあったらしい。だが戦いの最中に損壊したのか、破壊されたのかは分からず、この数年の間に持ち去られていないとも言い切れない。さらにストーンヴィジルは長らくドラヴァニア勢の足がかりとなり、クルザスへの襲撃の拠点になってきた。壁の内側へ押し返すことはできても、完全に追い出せてはいない。そしていつ、どう状況が変わるのかも分からない、と。</p>
      <p>アルフィノは、イシュガルドが必ず勝つ保証はない、と率直に言う。それに待つ時間もない。あなたたちはイシュガルドの助力なしに、自分たちの物を確保する。ドリルモン卿は理解したように頷き、それが最善かもしれないと言って、ナセルランに話を通すと約束する。やがてナセルランは、あなたが望む時にストーンヴィジルへ入ってよいと告げ、ホワイトブリム前哨地の騎士たちが皆、あなたの成功を祈っていると言う。</p>
      <p>廃墟の奥で、あなたはエンタープライズを見つける――巨大な眠れる竜のすぐ向こう側だ。アルフィノは竜に構う必要はないと言い、目的は飛空艇だけだと念を押す。彼とシドがエンタープライズへ忍び込み、発進の準備をする。あなたはここに残り、獣を監視し、もし目覚めたなら出航までの時間を稼ぐ役目を担う。だが息を整える間もなく、ラハブレアが姿を現し、次はガルーダを討つつもりか、と興味深げに語る。以前の蛮神討伐を上回る力を持つこと、イクサルが熱狂的であることを挙げ、イフリートを屠りタイタンを打ち破った光の戦士であるあなたを侮るのは愚かだとも言う。そして勝っても負けても面白い見世物になるだろう――生きていられれば、だ。直後、竜が動き、空気がエーテルの力でざわめき始める。</p>
      <p>すべてが収まった後、アルフィノはあなたのもとへ駆け寄り、無事かと声をかける。竜とともにエーテルの泡の中へ巻き込まれたときは、次の任務は新しい英雄探しになると覚悟した、と正直に言い、そんな面倒を負わずに済んで助かったとも付け加える。彼はシドがいまもエンタープライズを見ていると言い、結果を聞きに行こうと促す。シドは飛べる、と言う。ただし快適な旅にはならない。アルフィノは留まるよりましだと言い、グリダニアへ戻る決断を下す。だがハウリングアイへ向かうには、嵐に耐えるだけの状態ではない。任務を続けるなら修理が必要だ、と。シドは飛空艇を見つめ、すべてが懐かしいと言いかけるが、思い出せず、言葉を切る。</p>
      <p>グリダニアの飛空艇乗り場で、シドはエンタープライズを見て、帰ってきたような気がすると言う――ほかに言いようがない、と。アルフィノは黒衣森の過ごしやすい気候に安堵しつつ、聖座にも魅力はあったし、寄り道は多かったがイシュガルドでの一件は冒険だったと振り返る。だが仕事はまだ終わらない。飛空艇の修理も、蛮神討伐も残っている。英雄に休みはないな、と。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> アルフィノ　<small class="muted">クルザス中央高地 (X:12.7, Y:16.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-heretic-among-us.html">竜の力、戦いの歴史</a></div>
      <div class="row"><a class="link" href="the-stone-vigil.html"><b>ダンジョン開放</b>城塞攻略 ストーンヴィジル</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 41～</div>
    </div>`,
    followq:`<div class="stack">
  <div class="row"><a class="link" href="into-the-eye-of-the-storm.html">嵐を越える突破口</a></div>
  <div class="row"><a class="link" href="highway-robbery.html">人造硝石強奪犯を追え</a></div>
</div>`

  ZH:{
    langLabel:'ZH',
    pageTitle:'追尋過往，喚醒沉睡在Stone Vigil 下的羽翼',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Alphinaud 說，你一定也同意——現在早就該踏進 The Stone Vigil 了。他要你先去找 Lord Drillemont，提醒他對你們的承諾；Cid 和他會稍後跟上。</p>
      <p>你見到 Drillemont，他坦率地向你們致謝，說若不是你們出手，冒充 Guillaime 審問官的異端者恐怕仍會留在這裡，繼續把無辜者當成獵物。他承認自己當初太過武斷，直接否定你們的說法；在他看來，暁の血盟仍然存活就已經近乎奢望，更別說 Cid 竟也還活著。可如今他反而為自己的誤判感到慶幸，因為他從未像現在這樣，渴望自己被證明是錯的。</p>
      <p>Alphinaud 隨即接過話，冷冷地回了一句：至少有人從你的錯誤裡得到了一點樂趣。接著他要求 Drillemont 履行承諾——若不再反對，就請允許你們進入 The Stone Vigil，取回你們的 airship。Drillemont 立刻答應，說這是他最起碼能做的事；只是他也提醒你們，真正麻煩的並不只是「能不能進去」。</p>
      <p>Drillemont 解釋，早在你們初到不久，他就命人翻查舊紀錄。紀錄證實：在 Calamity 之後的那段時間，有一艘被棄置的 airship 被駐守 The Stone Vigil 的士兵扣押。依目前能確認的情報，那艘 airship 在據點被 dragons 攻陷前仍在他們手中；至於戰鬥中是否受損或被毀、以及這些年是否被移走，他都無法給你任何保證。更糟的是，這座廢墟長久以來一直是 Dravanian 的立足點，他們時常從此出擊騷擾 Coerthas。即使 Ishgard 已把他們逼回牆內，仍無法徹底驅逐；而局勢何時、又會如何改變，誰也說不準。</p>
      <p>Alphinaud 直言：你不能把希望押在 Ishgard 的勝利上，更不可能等到他們收復一切。你們沒有時間。你們會在沒有 Ishgard 協助的情況下，自己把屬於你們的東西帶走。Drillemont 聽後也不再強求，只說或許這樣反而最好，並表示會通知 Nathelain。之後 Nathelain 轉告你：你隨時都能進入 The Stone Vigil，而且 Whitebrim Front 的每一名騎士都在為你祈禱，希望你能平安成功。</p>
      <p>你踏入 The Stone Vigil，立刻看見 Enterprise——就在一條巨大沉睡的 dragon 後方。Alphinaud 強調你們不必理會那條 dragon；你們此行只為 airship 而來。於是他與 Cid 準備悄悄登上 Enterprise、趕緊做起飛準備；而你留在原地盯著那頭巨獸。若它醒來，你就得想辦法分散牠的注意力，替他們爭取出航的時間。就在你們分工已定之際，Lahabrea 現身，語氣像是在欣賞一場即將上演的戲。他說你們接下來打算討伐 Garuda，並提醒你：她的力量遠勝於你先前的 primal 討伐——那是因為 Ixal 的信仰狂熱而執拗。Lahabrea 口口聲聲說難以相信你能取勝，卻又說只有蠢人會小看「光之使者」——討伐 Ifrit、擊潰 Titan 的你。然後他帶著惡意補上一句：不論勝敗，至少會是場有趣的表演……前提是你能活到那時。下一瞬間，dragon 動了，周遭的以太翻湧，你被迫在混亂中撐住局面。</p>
      <p>等風暴般的衝突終於平息，Alphinaud 立刻衝向你，一聲聲叫你，逼你回應，直到確認你安然無恙才鬆了一口氣。他承認：當你被捲進那團以太泡與 dragon 同處其中時，他幾乎以為自己接下來得去找新的「英雄」了——幸好眾神沒有讓他承受那種麻煩。隨後他帶你去找正在檢查 Enterprise 的 Cid，詢問是否能飛。Cid 說能飛，但絕不會是舒服的旅程。Alphinaud 立刻表示：再不舒服也比留在這裡好，並決定先返回 Gridania。可他同時也指出，Enterprise 的狀況不足以穿越前往 The Howling Eye 的風暴；若要繼續任務，airship 必須修理。Cid 望著 Enterprise，說這一切都熟悉得令人心慌，彷彿他本該記得更多——可他終究抓不住那個答案，只能收住話頭。</p>
      <p>回到 Gridania 的 airship landing，Cid 看著 Enterprise，說自己像是回到了家——他想不出更貼切的說法。Alphinaud 也終於能在 The Twelveswood 較為宜人的氣候裡鬆口氣，並承認：即使繞了許多路，聖座確實也有其獨特之處，這趟 Ishgard 之行終究算是一場冒險。但他提醒你，事情遠未結束——airship 還要修理，而下一個 primal 仍在等著你們去討伐。</p>
    </div>

</div>`
  }
};

const tabBtns = [...document.querySelectorAll('.tab-btn')];
const pageTitle = document.getElementById('pageTitle');
const langToggle = document.getElementById('langToggle');
const panels = {
  story: document.getElementById('panel-story'),
  acq: document.getElementById('panel-acq'),
  unlockq: document.getElementById('panel-unlockq'),
  followq: document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
