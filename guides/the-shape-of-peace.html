const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'The Shape of Peace',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You listen as Wuk Lamat grumbles that Papa’s nonsense cost her even a single bite of Namikka’s food, and she decides to go back and finish her plate before setting out. She tells you she’s asked everyone to gather at the For’ard Cabins, and invites you to join once you’ve had a moment to recover.</p><p>At the For’ard Cabins, you wait as your companions assemble, and Fonjeantaine arrives with an apology for the delay. He explains that he left Eorzea ready to travel in search of work and owned little to begin with, but saying farewell to his fellow artisans took time. Wuk Lamat thanks him again for making the commitment, and with Alphinaud’s prompt, you prepare to depart for Earthenshire.</p><p>Before you can go, Wuk Evu appears and stops you for “a word.” He spirals immediately into theatrical self-reproach for delaying the Third Promise’s departure, begging you to take up an axe and rend him into taco meat—only for Wuk Lamat to snap that his demands are too gruesome and that kind of thing doesn’t bother her. Wuk Evu steadies himself, then explains he spotted your entourage preparing to leave and guessed you were seeking the city of gold—the final step of the rite of succession.</p><p>Wuk Evu offers what he knows: the legend of the golden city has been told in Tural for a thousand years, yet its descriptions vary—some insist on a glittering metropolis of golden towers, while others claim the name comes from a fabulous treasure hidden at its heart. Every version shares one thread, however: those who go in search of the golden city do not return. He urges the Third Promise to proceed with the utmost care, offers a prayer for your safe journey, and withdraws—leaving Erenville uneasy and Krile convinced that speaking with the giants remains your strongest lead.</p><p>Elsewhere, you witness a darker undercurrent: Sareel Ja remarks that finding a willing artisan was easier than expected, since many want to curry favor with the Resilient Son and the promise of new territory. Zoraal Ja coldly promises land to those who prove useful. When Bakool Ja Ja confronts him—mocking the feats, boasting that keystones are all he needs, and spitting that there is nothing “blessed” about Zoraal Ja’s birth—Sareel Ja intervenes only to demand restraint, and Zoraal Ja makes it clear he can kill whenever he pleases.</p><p>You return to Earthenshire with Wuk Lamat, presenting Fonjeantaine as a willing potsworn candidate—an accomplished goldsmith once employed at Eshtaime’s Aesthetics in Ul’dah. Rediroq welcomes him and has a helphand show him to The Workpot, then declares you have met the requirements of the Feat of Pots and happily presents the keystone, bringing your tally to three. Yet the mood sours when Sareel Ja praises Koana’s Sharlayan-minded cleverness and tries to steer it toward weapons, Zoraal Ja dismisses slow progress in favor of conquest, and Thancred warns that empires built on force breed uprisings and bloodshed.</p><p>Rediroq answers the argument with memory: before Tuliyollal, there were no potpacts, and it was normal for Mobbies to grabsnatch artisans and force them to work—until Gulool Ja Ja came to Earthenshire. Speaking as Vow of Reason, he insisted they were there to trade words, not blows, and pointed out that goldwork made by bound hands and broken spirit cannot shine like the work of a joyful artisan. From that, Rediroq says, the custom of goodliving began: happy potsworn make good works, and good works bring joysmiles to Mobbies.</p><p>When talk turns again to the city of gold, Rakorok eagerly repays your earlier help with a vivid tale—golden towers, golden streets, and people living in golden happiness above the clouds. Krile presses him for the source, and Rakorok admits it came from Yok Huy friends in the mountains of Urqopacha, making the giants your clear next destination. As you set out, a bright-haired Tonowawtan man calls for the Third Promise, claiming Rediroq forgot to give her an item of great importance; Wuk Lamat decides to go back alone and promises she’ll return soon.</p><p>You wait on the road as time stretches uncomfortably. Krile notes how strange it is that she never noticed the man in Earthenshire, and Alisaie can’t shake the feeling she’s seen him before. When Alphinaud tries to reach Wuk Lamat by linkpearl and gets no answer, you turn back—only to find she isn’t in Earthenshire, and Rediroq insists she never sent anyone to fetch her. Realizing something is wrong, you regroup with Koana, Thancred, and Urianger, split your forces, and set off to search—determined to find the Third Promise before anything worse can happen.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Wuk Lamat <small class="muted">Tuliyollal (X:9.9, Y:4.4)</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="lost-promise.html">Lost Promise</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'望んだ平和の形',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたは第三誓約者が「父の騒ぎのせいでナミッカの料理を一口も食べられていない」と憤り、出発前に皿を片づけてくると言うのを聞く。仲間にはフォーアード宿舎で合流するよう伝えてあるから、あなたも回復したら来い――そう促され、あなたは宿舎へ向かう。</p><p>フォーアード宿舎で待つと、遅れてフォンジャンタンが現れ、待たせたことを詫びる。仕事を求めて旅立つ覚悟でエオルゼアを発ったため荷物は少なかったが、職人仲間との別れに時間がかかったのだと言う。第三誓約者はその決意に改めて礼を述べ、あなたは仲間と共にアースンシャイアへ向かう支度を整える。</p><p>出発の直前、ウク・エヴが声をかけてくる。第三誓約者の出立を遅らせるなど大罪だと大げさに悔い、斧で自分の肉を刻んでタコ肉にしろとまで言い出すが、第三誓約者は「言い方が惨たらしい」と一喝し、そんなことでは動じないと突っぱねる。落ち着いたウク・エヴは、あなたたちが黄金郷を探しているのだろうと見抜き、それが継承の儀の最終段階だと確認する。</p><p>ウク・エヴは助言を残す。黄金郷の伝承は千年にわたり語り継がれてきたが、姿の描写は一定せず、黄金の塔が林立する都だという話もあれば、中心に眠る秘宝ゆえにそう呼ばれるだけだという話もある。だが共通しているのは、探しに行った者が戻らないという一点であり、伝説を追うことは死を招くのだと第三誓約者に告げ、細心の注意を払うよう強く請う。あなたは不穏さを胸に、巨人族に話を聞くことが最も確かな手がかりだと感じる仲間の言葉を受け止める。</p><p>一方その頃、別の場所では不穏な企みが進む。協力的な職人を見つけるのは想像以上に容易で、新たな領土の約束があれば進んで取り入ろうとする者が多い――そう語られ、利用価値のある者には望む土地を与えると冷淡に言い放たれる。さらに、荒々しい挑発が飛び、継承の試練よりも要石こそがすべてだと嘲り、出生を罵倒する声が響くが、側近は「生かしておけ」と抑え、当人は「いつでも殺せる」と言い切る。</p><p>あなたは第三誓約者と共にアースンシャイアへ戻り、フォンジャンタンを新たな契約職人として紹介する。ウルダハの店で腕を振るっていた彫金師だと告げると、村は歓迎し、世話役が工房へ案内する。続いて、あなたたちは「壺の試練」の要件を満たしたとして要石を受け取り、達成は三つ目となる。だがその直後、技術を軍備に転用しようとする誘い、領土拡張を当然とする主張、武力による支配が反乱と流血を招くという諫言がぶつかり合い、場の空気は一気に険しくなる。</p><p>そこで語られるのは昔話だ。かつて契約などなく、職人をさらって働かせるのが当たり前だった時代があり、それを変えたのが連王だという。理性誓約者として現れた連王は、言葉を交わしに来たのであって剣を交えるためではないと告げ、縛られた手と折れた心で作られた杯には輝きが宿らないと示した。喜びをもって作られた品こそが真に光る――その教えから、人々が生き生きと働ける暮らしの在り方が根づいたのだと、あなたは聞かされる。</p><p>話題が黄金郷へ戻ると、ラコロクは恩返しだとばかりに、黄金の塔と街路、雲上に永遠の幸福がある都の物語を語る。出所を問われると、山の友である巨人族から聞いたと言い、次の目的地が定まっていく。だが山道に入ろうとしたところで、金髪のトノワウタ族の男が第三誓約者を呼び止め、村長が渡し忘れた大事な品があるから戻ってほしいと言う。第三誓約者は皆を連れずに行くと決め、すぐ戻ると約束して離れていく。</p><p>あなたは待ち続けるが、時間だけが過ぎていく。仲間は男の存在に違和感を覚え、第三誓約者は通信にも応じない。やむなく村へ戻ると、村長は「迎えなど出していない」と言い切り、第三誓約者の姿もない。事態の異常を悟ったあなたは、第二誓約者や仲間たちと合流し、責め合うより先に捜索を優先することを選ぶ。手分けして地を探し、連絡を取り合いながら、第三誓約者を必ず見つけ出そうと動き出す。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ウクラマト <small class="muted">トライヨラ (X:9.9, Y:4.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-father-first.html">王として、父として</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 92</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="lost-promise.html">消えた王女</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'和平的形式',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你聽 Wuk Lamat 抱怨，因為爸爸的胡鬧，她連 Namikka 的料理都還沒吃上一口，所以要先回去清盤後再出發。她也說自己已經請大家到 The For’ard Cabins 集合，叫你稍微恢復一下就過去會合。</p><p>你在 The For’ard Cabins 等著同伴到齊，Fonjeantaine 這才趕來，先為讓大家久等道歉。他說自己離開 Eorzea 時本就打算四處找工作，行李不多，但和工匠同伴們道別花了不少時間。Wuk Lamat 再次感謝他願意做出這個承諾，你也跟著大家準備啟程前往 Earthenshire。</p><p>正要出發時，Wuk Evu 突然叫住你們，還誇張地說自己天天糾正禮儀，結果卻犯了「耽誤第三誓約出發」的大錯，甚至要你拿起斧頭把他剁成塔可肉。Wuk Lamat 立刻吼回去，叫他別提出那麼血腥的要求，還說那種話根本不會讓她介意；Wuk Evu 也順勢收斂，改口表示自己是在城裡採買時看見你們整裝，猜到你們要去找「黃金城」——那正是繼承儀式的最後一步。</p><p>Wuk Evu 接著把他知道的傳聞一口氣說完：關於黃金城的傳說在 Tural 流傳千年，但對「那座城」到底長什麼樣，故事從來不一致——有人說那是金色高塔閃耀的巨大都城，也有人說它其實很不起眼，只是因為核心藏著無價秘寶才得名。可是不管怎麼講，每個版本都有同一條線索：去尋找黃金城的人，從未回來。他要第三誓約務必萬分小心，說追逐傳說等同於自招死亡，最後只留下祈禱你們平安的話便離開了。你聽完這些警告，也把同伴的疑問與判斷記在心裡——若傳說都以悲劇告終，連王又如何能找到並安然歸來，而要解開這點，和巨人族談話仍是最重要的線索。</p><p>同一時間，你也看見另一股陰影正在暗處推進：有人得意地說，要找願意配合的工匠比想像更容易，許多人都急著討好 Resilient Son（堅韌之子），尤其在聽見新領土的誘惑之後更是如此；而 Zoraal Ja 冷冷回應，只要能派上用場，就會讓他們得到想要的土地。Bakool Ja Ja 隨即跳出來譏諷，說這些試煉無聊透頂，他只要要石就能贏，還辱罵 Zoraal Ja 的出身並挑釁要決鬥；旁人卻要求他手下留情，甚至把對方當成「之後有用的麻煩」，而 Zoraal Ja 只回一句：他想什麼時候殺都可以。</p><p>你和 Wuk Lamat 回到 Earthenshire，帶來一位願意投入的契約匠人候補——Fonjeantaine。Wuk Lamat 介紹他是曾在 Ul’dah 的 Eshtaime’s Aesthetics 工作過的優秀金匠，Rediroq 聽了大為欣喜，立刻安排幫手把他帶去 The Workpot（工坊）。接著 Rediroq 宣布你們已達成「壺之試煉」的條件，笑著把要石交到你們手上，讓 Wuk Lamat 低聲數著「這是第三個了」。然而氣氛很快轉為緊繃：有人稱讚 Koana 的 Sharlayan 知識，想把它用在打造兵器；Zoraal Ja 乾脆說你們的方法太慢，不如擴張領土、甚至把 Sharlayan 一口吞下；Thancred 立刻反駁，靠武力征服只會換來起義與血腥，你們不會是第一個走向崩壞的帝國。</p><p>爭執之中，Rediroq 反而想起很久以前的往事：在 Tuliyollal 尚未出現、壺之契約也還不存在的年代，Moblins 曾經會抓走工匠、逼他們替「Mobbies」工作。直到 Gulool Ja Ja 來到 Earthenshire，事情才改變——當時他以 Head of Reason（理性之首）的面貌出現，明確表示他們是來「交換言語」而不是「交換刀劍」。他指出，用被束縛的雙手、被折斷的心打造的金器不可能真正發光；相反地，帶著喜悅創作的工匠會把靈魂灌進作品裡，光芒就像新升起的太陽。也正因為那番話，Moblins 才開始追求所謂的好日子：讓契約匠人快樂地工作，作品才會更好，作品更好，大家才會露出更多「喜悅的笑容」。</p><p>輪到黃金城的線索時，Rakorok 說要回報你之前的幫忙，興奮地講起他聽來的故事：金色的高塔、金色的街道，人人都活在金色的幸福裡，雲上還有永恆的極樂。Krile 追問他從哪聽來的，Rakorok 便說是來自他們在山中的 Yok Huy 老朋友——住在 Urqopacha 的巨人族。你也因此更確定下一站就該去找巨人族；Wuk Lamat 一邊說捨不得離開 Earthenshire 與這裡的笑容，一邊催促大家繼續前進。</p><p>你們剛踏上通往山路的路線，一名金髮的 Tonawawta 男子卻突然呼喊第三誓約，說 Rediroq 讓他把 Wuk Lamat 帶回村裡，因為「忘了交給她一件很重要的東西」。Wuk Lamat 也覺得奇怪，卻說不必全員跟去，她很快就會回來，便獨自跟著那人折返。</p><p>你在原地等待，時間卻一拖再拖。你們談起那名男子的髮色與族別，Krile 也覺得奇怪——你們明明在 Earthenshire 待過一段時間，卻從未注意過他；Alisaie 更說那人像是在哪裡見過。當 Alphinaud 透過 linkpearl 聯絡 Wuk Lamat 卻完全得不到回應時，你們終於決定返回 Earthenshire，卻發現她根本不在村裡；更糟的是，Rediroq 直接否認自己派人去找過她。你立刻明白事情不對，和 Koana、Thancred、Urianger 等人會合後選擇停止指責、先把心力用在找人上——你們分頭搜尋、保持聯絡，從此刻起只剩一個目標：把第三誓約找回來。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>任務發布</b> 烏克·拉瑪特 <small class="muted"> 圖萊尤拉 (X:9.9, Y:4.4)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-father-first.html">一位國王，一位父親</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.92</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="lost-promise.html">失蹤的公主</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
