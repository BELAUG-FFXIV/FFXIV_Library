    story:`<div class="clamp" data-collapsed="true">
      <p>Shamani Lohmani says there may still be someone in Wineport who can provide a wine fit for the occasion, however small that chance may be. He adds that if you had come several years earlier, none of this would have been difficult—but in recent years, Wineport’s output has declined. The vignerons now cultivate only common lowland vines, not because the grapes are poor, but because the town has known far better.</p>
      <p>He tells you that long ago, Wineport’s vignerons crossbred different species and produced a grape-bearing vine of unprecedented quality. Bacchus grapes became the pride of the town, used to make vintages said to surpass all others—wines of extraordinary aroma, complexity, and flavor. Shamani catches himself as his enthusiasm rises, apologizes, and admits he once had the privilege of tasting that legendary Bacchus wine.</p>
      <p>He calls it an otherworldly experience. In that moment, he says, it felt as though he had tasted the nectar of the gods themselves—so overwhelming that he felt he transcended his mortal flesh and became one with all creation. Then his tone turns sober as he reminds you that the Calamity changed everything: the Bacchus vineyards were destroyed, much of the existing stock was lost, and what little remains is guarded closely because it can no longer be made.</p>
      <p>With Byrglaent unwilling to part with his wines, Shamani proposes the next best option—ridiculous as it sounds: find someone who still has a bottle of Bacchus wine and offer every gil you can spare. He has heard rumors that one of the vignerons tending the vineyards might once have owned a bottle, and he asks you to begin by speaking with them.</p>
      <p>You seek out the vignerons in Wineport. Durim Falurim reacts with bitter frustration, saying he used to have a cellar filled with Bacchus wine and believed he could keep it safe from thieves and weather—until a primal blew up his house, taking it all with it. Junghbhar has nothing either; he says he wishes he did, but he never even had the chance to try Bacchus wine himself, and you are a few years too late.</p>
      <p>When you return, Shamani accepts that there was no luck, calling it regrettable but necessary to try. He cannot help adding that Bacchus wine would have been perfect, then confesses his certainty is tied to his own past with it: it is the very reason he decided to become a vintner. After Titan blinded him in the battle beneath O’Ghomoro, he fell into a deep depression, and it was not until he tasted Bacchus wine for the first time that he realized there was still so much he could experience even in his condition. It gave him a new direction in life. With a weary sigh, he says it breaks his heart to think that wondrous ambrosia—once a source of hope—may be lost forever.</p>

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>シャマニ・ローマニは、望みは小さいが、ワインポートの住人の中に場にふさわしい葡萄酒を用意できる者がいるかもしれないと言う。さらに、数年前ならこんな苦労はなかったはずだとも付け加え、近年は町の産品の質が著しく落ちたと語る。今育てられているのは低地にありふれた葡萄の蔓ばかりで、出来が悪いわけではないが、かつてはもっと良いものを知っているのだ、と。</p>
      <p>彼は、昔ワインポートの栽培家たちがいくつもの品種を交配し、これまでにない品質の葡萄を実らせる蔓を生み出したのだと話す。バッカス葡萄は町の誇りとなり、他のすべてを凌ぐ年代物を生み出した――最も芳香高く、最も複雑で、最も豊かな味わいを持つ伝説のバッカス酒は、このワインポートで生まれたのだと。熱を帯びた彼は咳払いして謝り、かつてその酒を口にする栄誉に与ったことがあるのだと打ち明ける。</p>
      <p>それはこの世のものとは思えぬ体験だったという。神々の蜜を味わったかのようで、あまりの衝撃に肉体という枠を超え、万物と一つになったと感じた――だが、すぐに彼は沈んだ声で、災厄がすべてを変えたのだと続ける。バッカスの葡萄畑は完全に失われ、現存していたバッカス酒の多くも消え、残されたわずかな分は二度と造れないがゆえに持ち主が厳重に守っているのだ、と。</p>
      <p>ビルギレントの葡萄酒を譲らせられないのなら、次に取るべき手は――馬鹿げて聞こえるが――バッカス酒を一本持つ者を探し出し、出せるだけのギルを差し出すことだとシャマニ・ローマニは言う。葡萄畑の世話をしている栽培家の中に、かつて一本持っていた者がいるという噂を聞いたらしく、まずは彼らに話を聞いてみてほしいと頼む。</p>
      <p>あなたはワインポートで栽培家たちを訪ね歩く。デュリム・ファルリムは吐き捨てるように、昔は地下室いっぱいにバッカス酒を抱えていたのに、盗人や風雨から守れると思っていたら、蛮神が家ごと吹き飛ばしちまったのだと荒々しく嘆く。ユングバーは首を振り、持っているどころか自分も味わう機会すらなかった、数年遅かったなと謝る。</p>
      <p>報告を受けたシャマニ・ローマニは、成果がなかったことを残念だと言いながらも、試さねばならなかったと受け止める。それでも、バッカス酒ならこの場に完璧だったのにと漏らし、さらに自分がそう確信するのは個人的な過去ゆえでもあると告白する――それこそが、自分が醸造家になると決めた理由なのだと。オゴモロの地下での戦いでタイタンに視力を奪われたあと、彼は深い絶望に沈んだが、初めてバッカス酒を口にしたとき、そんな状態でもまだ多くを味わえるのだと気づき、新たな道を見いだせたのだという。そして、希望をくれたあの素晴らしい美酒が永遠に失われるかもしれないと思うと胸が痛む、と彼はため息混じりに語る。</p>

    acq:`<div class="stack">

    </div>`,
    followq:`<div class="stack">

    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'酒神傳說',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Shamani Lohmani 說，也許——即使機會渺茫——Wineport 仍有住民能拿出配得上這次場面的葡萄酒。他補上一句：要是你幾年前來，這根本不會是問題。只可惜近年來 Wineport 的產酒品質明顯下滑，如今被栽種的只剩常見的低地葡萄藤；這並不是說它們的葡萄不好，只是這座小鎮曾經見識過更好的東西。</p>
      <p>他回憶，過去 Wineport 的栽培者曾經交配多種品系，培育出前所未見的高品質葡萄藤。那種結出的 Bacchus grapes 一度是這座城鎮的驕傲，因為它們釀成的年份酒凌駕群倫——最濃郁的香氣、最複雜的層次、最飽滿的風味，甚至連傳說中的 Bacchus wines，都是在 Wineport 誕生的。說到這裡，他像是察覺自己過於激動，清了清喉嚨向你致歉，並坦承自己曾有幸品嚐過那種酒。</p>
      <p>他形容那是一種近乎異界的體驗。那一瞬間，他彷彿嚐到了神祇的甘露，震撼得讓他覺得自己超越了凡軀，與萬物融為一體。可緊接著，他便用低沉的語氣說：Calamity 改變了一切。Bacchus 的葡萄園被徹底摧毀，大量既有的 Bacchus wine 也隨之失去；而僅存的少量，因為再也無法重現，只能被擁有者嚴密守護。</p>
      <p>在 Byrglaent 不願出酒的情況下，Shamani Lohmani 提出下一個選擇——聽起來荒唐，卻可能是最好的：找出仍擁有 Bacchus wine 的人，並用你們能拿出的每一枚 gil 去換。他聽聞照料葡萄園的栽培者之中，可能有人曾經擁有過一瓶，因此希望你先從向他們打聽開始。</p>
      <p>你在 Wineport 逐一詢問那些栽培者。Durim Falurim 一聽到 Bacchus wine 就滿腹怒火，說自己以前的地窖裡堆滿了那種酒，本以為能躲過竊賊與風雨，卻萬萬沒想到一個 primal 竟把他的房子炸得粉碎，連同那些酒一併化為烏有。Junghbhar 則同樣無能為力；他說自己也希望能有，但他連親口品嚐的機會都沒有，你來得太晚了。</p>
      <p>你帶著空手的結果回到 Shamani Lohmani 身邊，他聽完只說沒辦法，至少你們試過了，雖然確實令人遺憾。他仍忍不住感嘆：若真能拿到 Bacchus wine，會是完美的選擇。接著他又坦白，自己之所以如此篤定，部分也源於過去的經歷——那正是他決心成為釀酒人的原因。當年在 O’Ghomoro 地底與 Titan 的戰鬥中失去視力後，他陷入深深的消沉；直到第一次品嚐 Bacchus wine，他才明白即使在那樣的狀態裡，自己仍能擁有許多體驗，也因此重新找到人生的方向。最後，他帶著一聲嘆息說：想到那曾帶給他希望的奇妙甘醴，或許將永遠失去，他就感到心痛。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">

    unlockq:`<div class="stack">

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
