  <style>
    :root { --bg:#fff8e6; --card:#ffffff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}

    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}

      content:"";position:absolute;left:0;right:0;bottom:0;height:72px;

    .expand-wrap{margin-top:12px}

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`The Claw in the Dark`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You tell Metem you are ready, and he seems pleased, assuring you that he will be there to guide you through the beginning. He has you look to the monitor, saying it is time to introduce your first opponent.</p><p>On the screen, he presents Black Cat, feared as “the claw in the dark”—the same rookie who sized you up earlier. Even if she is still new herself, he warns you not to underestimate her: she has real talent, and people expect her to go far.</p><p>Metem explains that her feral soul is Cath Palug, a terrible feline said to have pushed a legendary hero to the very edge. With its power, she becomes unimaginably nimble, and her claws can rend steel—so you will need to keep your wits about you.</p><p>He adds that the ring is uniquely configured to complement each opponent’s fighting style, because the audience must be given a spectacle—entertainment is their business. And, as if that were not enough, he notes that he will also serve as the match commentator, promising to squeeze every drop of excitement out of your fight, before sending you off to make your preparations and win your debut.</p><p>After your first bout, Metem greets you with emphatic praise—magnificent, he says—and credits the president’s keen eye for talent. With your first victory secured, he tells you more about the Arcadion: the championship’s roots reach back to Alexandria long before the coming of the Turali people, when recreated simulacra fought one another—like the same kind that fought at your side. With soul-derived resuscitation, battles to the death between living combatants became the norm, yet without any actual deaths.</p><p>He says the contest evolved again after Zoraal Ja became king—he proposed using feral souls to enhance one’s flesh, and the technology was devised, letting combatants take on the power and likeness of beasts to the audience’s renewed thrill. But when the king raised the banners of war for conquest, feral souls were reserved for the army, and the Arcadion was forced to suspend operations. You know what came next: the king went mad, you vanquished him, and soon after the beloved queen was taken—leaving hearts darkened by sadness and uncertainty even now.</p><p>Metem insists that, tasteless as some may find it, this is exactly when the people need cheering. He points to the roar of the crowd when you—the upstart challenger—defeated their rising rookie, saying you have captured their imaginations and urging you to keep doing so. The defeated fighter storms in, furious that she lost to someone who did not even use a feral soul, then—unable to let it lie—asks to watch you for a while, claiming she has no hard feelings, only curiosity. You allow it, and she promises to watch quietly, while Metem sighs at her fickleness and asks you not to hold it against her—deep down, he says, she has a good heart.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Metem <small class="muted">(Greenroom, X:6.1, Y:5.9)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="a-new-challenger-appears.html">A New Challenger Appears</a></div>
      <div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 100</div>
      <div class="row"><b>Unlock Raid</b> <a class="link" href="aac-light-heavyweight-m1n.html">AAC Light-heavyweight M1 (M1N)</a></div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="sweet-poison.html">Sweet Poison</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'爪研ぐ猫魂',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたが準備ができたと告げると、案内役の男は満足げに頷き、最初のうちは自分が導くと請け負う。彼はモニターへ目を向けるよう促し、初戦の相手を紹介すると言った。</p><p>映し出されたのは「闇の爪」と恐れられる闘士で、先ほどあなたを値踏みした張本人でもある。彼女はまだ新人ではあるが、侮るべきではないほどの才覚があり、将来を嘱望されているのだと男は強調する。</p><p>さらに男は、彼女が用いる獣の魂が、伝説の英雄を極限まで追い詰めたとされる恐るべき猫の力だと説明する。その力で彼女は信じがたいほど敏捷となり、爪は鋼すら裂く――だからこそ、あなたは常に冷静さを保たねばならない。</p><p>続けて彼は、リングの構造そのものが相手の戦い方に合わせて特別に設えられていると明かす。観客に見世物としての迫力を届けるためであり、ここが何より「楽しませる」ことを生業としているからだという。</p><p>そして彼は、自分が試合の解説も務めると付け加え、あなたの戦いから興奮を余すことなく引き出してみせると豪語する。最後に準備を整えるよう告げ、あなたが鮮烈なデビューを勝利で飾ることを願って送り出した。</p><p>初戦を終えて戻ると、男はあなたの戦いぶりを手放しで称え、才能を見抜いた上層の目も確かだと言う。さらに彼は、この競技の成り立ちを語り始める――この地に外から来た民が現れるよりもはるか以前、当初は再現された仮の存在同士を戦わせていたのだと。やがて魂に由来する蘇生の技術が生まれ、生身の者同士が死を賭けて戦う形へ移り変わったが、実際の死は起こらない仕組みになったのだという。</p><p>その後、王が即位してから競技はさらに変化し、獣の魂で肉体を強化する発想が提案され、技術が整えられた結果、闘士は獣の力と姿を帯び、観客は新たな熱狂に包まれた。だが王が征服のために戦争を始めると、獣の魂は軍へ回され、競技は中断を余儀なくされた――そして王は狂い、あなたの手で討たれ、ほどなくして人々が慕う女王まで失われた。いまは安全を得たとしても、悲しみと不安が人々の心を覆っているのだと男は言う。</p><p>それでも男は、いまだからこそ人々には元気づけが必要だと主張する。あなたという新参の挑戦者が、期待の新人を倒した瞬間に観客が沸き立ったのを引き合いに出し、あなたが想像を掴んだのだと語って、これからもそれを続けてほしいと頼む。敗れた新人は、獣の魂すら使わないあなたに負けたことへ苛立ちを露わにしつつ、しばらくあなたを観察させてほしいと申し出る――恨みではなく、ただあなたが何をできるのか知りたいだけだと。あなたが受け入れると、彼女は静かに見ているだけだと言い、男はその気まぐれさに苦笑しながらも、どうか悪く思わないでほしい、根は善いのだと取りなした。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> メテム <small class="muted">(控室, X:6.1, Y:5.9)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="a-new-challenger-appears.html">アルカディアの挑戦者</a></div>
      <div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div>
      <div class="row"><b>レイドダンジョン開放</b> <a class="link" href="aac-light-heavyweight-m1n.html">至天の座アルカディア：ライトヘビー級1層(M1N)</a></div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="sweet-poison.html">劇毒の愛</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'暗處磨爪的貓魂',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你表示已經準備好後，Metem 顯得相當滿意，並保證一開始他會留在這裡引導你。他要你看向螢幕，說現在就要介紹你的第一位對手。</p><p>畫面上出現的是 Black Cat——被稱為「暗處之爪」的格鬥者，也是先前出言試探你實力的那位。Metem 強調她雖然同樣是新人，但絕對不該小看；她確實有天分，也被認為會走得很遠。</p><p>接著他說明她所使用的 feral soul（兇魂）是 Cath Palug——那頭可怕的貓科存在，傳說曾把一位傳奇英雄逼到極限。借助那股力量，Black Cat 會變得難以想像地敏捷，而她的利爪甚至能撕裂鋼鐵；你必須時刻保持警覺。</p><p>Metem 進一步提醒你，擂台本身會依照對手的戰鬥風格做出特殊配置。這麼做是為了讓觀眾看到「表演」，因為他們的本業終究是娛樂——必須把戰鬥變成足以讓人屏息的場面。</p><p>他也順勢提到，自己同時會擔任比賽的解說員，並自信地表示一定會把你這場戰鬥的刺激感榨到一滴不剩。最後他催你做好準備，祝你能在初登場就取得勝利。</p><p>當你打完第一戰回到休息室，Metem 以近乎誇張的熱情稱讚你在場上的表現，還說連邦總統看人的眼光依然敏銳。接著他表示，既然你已拿下首勝，就該讓你更了解 Arcadion 的歷史：Ascension Arcadia Championship 的源頭可以追溯到 Alexandria 很久以前，甚至早於 Turali people 到來的時代。最初的比賽形式截然不同，是讓重現出來的 simulacra（臨時替身）互相對戰——也就是先前與你並肩作戰的那種存在。</p><p>後來隨著 soul-derived resuscitation（以靈魂衍生的復甦技術）出現，競賽轉變成活人之間的「生死戰」，但又能做到「沒有真正的死亡」。再之後，Zoraal Ja 成為國王，競賽又再度演化：正是他提出用 feral soul 強化肉體的想法，相關技術因而被設計出來，使得鬥士能取得野獸的力量與外形，讓觀眾體驗到前所未有的熱狂。</p><p>然而當 Zoraal Ja 舉起戰旗、踏上征服之路時，所有 feral soul 都被軍隊徵用，Arcadion 只能被迫停辦。Metem 說接下來的事你也知道——國王陷入瘋狂，最終被你親手擊倒；而不久之後，他們所愛戴的女王也離世了。即使如今終於安全，悲傷與不安仍然籠罩著人心。</p><p>有人或許會覺得此時重啟賽事不合時宜，但 Metem 堅持：越是現在，人民越需要被振作；正如他一開始所說，他們希望能讓大家暫時忘卻煩憂。他提起觀眾在你這位「突然冒出的挑戰者」擊敗 Black Cat 這名新秀時爆發出的吶喊，說你已抓住了他們的想像，也希望你能繼續如此。</p><p>這時 Black Cat 忍不住衝上前，氣急敗壞地抱怨自己居然輸給一個連 feral soul 都沒用的人，質問你到底是什麼。可她又說自己不能就這樣算了，轉而提出想觀察你一段時間——她強調沒有怨恨，只是單純好奇你究竟能做到什麼。你同意後，她表示自己只會安靜地看著；Metem 則無奈地嘆她像貓一樣反覆無常，同時也請你別怪她，說她其實本性不壞。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 梅特姆 <small class="muted">(控室, X:6.1, Y:5.9)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="a-new-challenger-appears.html">阿卡迪亞的新挑戰者登場</a></div>
      <div class="row">任一戰鬥／魔法職（不含限制職業）Lv.100</div>
      <div class="row"><b>解鎖團隊副本</b> <a class="link" href="aac-light-heavyweight-m1n.html">至天座阿爾卡迪亞：輕量級 第1層 (M1N)</a></div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="sweet-poison.html">甜蜜的劇毒之愛</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
