    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You hear G’raha Tia’s assessment: with neither memories nor records of Gulool Ja’s mother to rely on, you must cast the widest net you can. The group agrees to split up—some searching through Solution Nine, while you head out to make inquiries in the outskirts.</p><p>Outside Everkeep, you question those who still remember fragments of the past. One person has never heard of a Mamool Ja woman living nearby, but points you toward a Tonawawtan settlement north of Everkeep—Yuweyawata—saying Zoraal Ja earned the locals’ loyalty when he saved them from a “crisis,” and that their chief was called Kanilokka. Another recalls seeing a Mamool Ja woman long ago, among a Landsguard entourage sent here before the dome came down; they assume the unit returned to Tuliyollal, but concede that anyone who lingered might have been trapped inside with everyone else.</p><p>A third voice can offer nothing about Gulool Ja’s mother, yet repeats a story handed down at home: before the dome cut the region off, a tural vidraal appeared and terrorized the land. Zoraal Ja gathered warriors, confronted the beast, and felled it—an old feat made all the more striking for having been done without regulators. You return with these scattered threads, uneasy at how little any one account proves on its own.</p><p>Back in the Backroom, the others admit they learned nothing directly about Gulool Ja’s mother either, and the search through records has been fruitless before. Still, as your notes are laid side by side, Shale begins to trace connections: Zoraal Ja’s retinue brought a female Mamool Ja to Yyasulani, and the “crisis” at Yuweyawata aligns with the appearance of the tural vidraal. If Zoraal Ja needed secrecy, a village of devoted followers would have served—and regular visits would have given him opportunity to meet anyone who remained there.</p><p>Krile adds what she and G’raha Tia uncovered by speaking with someone who once worked at Origenics: around twenty years ago, colleagues were transferred under the king’s direct order to a research facility outside Everkeep, used to develop a new kind of weapon. Shale follows the paper trail the only way possible—through transport records—until the pattern appears: deliveries routed with deliberate detours, yet arriving in quantities far too large for a mere village. The activity ended years ago, suggesting the facility was decommissioned, but Gulool Ja can’t help asking if that place is where his mother was. You can’t promise certainty—only that the outline is finally taking shape, piece by piece.</p><p>With a destination decided, you travel to the driftdowns and prepare to cross the lake by hover cargo. As you set out, the group weighs what they know and what they don’t: the researcher remembered colleagues but no names; Yuweyawata may resemble the Tonawawtan settlement you heard about; and if Zoraal Ja meant to keep his movements hidden, he likely avoided obvious routes. Even so, the thought of weapons developed in secret with the aid of devoted followers sits heavily, and you brace yourselves for whatever remains behind a closed door.</p><p>When you reach the other side, the Echo takes hold—and the past speaks plainly. You witness Kanilokka explain his intent to prevent the breakdown of an individual by transferring their soul into the body of a beast, a path that could, in theory, grant control over a tural vidraal. Zoraal Ja presses him on the cost, and Kanilokka does not soften it: those who offer their souls will never return to their original forms, and must be considered lost—yet he calls the sacrifice worthwhile for the army it would create. Zoraal Ja accepts the bargain and orders volunteers recruited at once.</p><p>Then a Mamool Ja woman steps forward, and you hear her named: Teeshal Ja. Zoraal Ja commands her to assist Kanilokka, to watch him closely, and to report what she learns. She does not deny the questionable means—only the need for power, whether they shelter within the dome or expand beyond it—and she agrees to obey. Yet she asks for a boon if the work succeeds, something she believed she could never have in Tuliyollal, something now “so very, very close.” Zoraal Ja answers without warmth: satisfy him, and she may claim what is at hand—because what she seeks holds no value to him.</p><p>The Echo releases you into the present, leaving the name Teeshal Ja ringing in Gulool Ja’s mind. With so few Mamool Ja in Yyasulani, the possibility feels sharp and immediate, and you turn your attention to the place Kanilokka said he would return to—the observatory—hoping it belongs to the facility and holds the next trace. As you move on, Gulool Ja admits what has weighed on him for so long: without any memory of her, he could barely imagine what his mother looked like—until he visited Tuliyollal and finally could. Now, with footsteps in the dark beginning to show, you press forward, determined to learn what became of Teeshal Ja.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>グ・ラハ・ティアは言う。グルージャの母について、記憶も記録も残っていないのなら、できる限り広く情報を集めるしかない。あなたたちは手分けすることにし、仲間はソリューション・ナインで聞き込みを進め、あなたはエバーキープ周辺の外縁へ向かう。</p><p>あなたは外で人々に問いかけ、断片的な話を拾い集める。ある者は「この辺りでマムージャの女性が暮らしていた話など聞いたことがない」と言いながら、エバーキープの北にあるトナワウタの集落、ユウェヤーワータの名を挙げる。ゾラージャはかつて何らかの「危機」から彼らを救い、忠誠を得たのだという。その長の名はカニロッカだった、と。別の者は、かつてヤースラニに派遣されたランドガードの随行にマムージャの女性がいたことを覚えている。外界と断たれる前のことで、任務を終えればトライヨラへ戻ったはずだが、もし誰かが残っていたなら、あのドームの内側に閉じ込められた可能性はある、とも口にする。</p><p>さらに別の者は、グルージャの母については何も知らないと首を振る。ただ、父から聞いたという昔話を語る。ドームが下りる前、この地にトゥラル・ヴィドラールが現れて一帯を荒らし、ゾラージャは戦士たちを集めて立ち向かい、その獣を倒したのだと。しかもレギュレーターもない時代の武勲だったという。あなたは、どの話も決定打にはならないまま、それでも手がかりを抱えて戻る。</p><p>バックルームで合流すると、仲間もまたグルージャの母に直結する情報は得られなかったと告げる。案内役も、かつて記録を追ったが成果はなかったという。だが、あなたが持ち帰った話を並べると、輪郭がわずかに見え始める。ゾラージャはランドガードを伴ってヤースラニへ赴き、その一員にマムージャの女性がいた。そしてユウェヤーワータで起きた「危機」は、トゥラル・ヴィドラールの件と重なる。秘密が必要なら、忠実な者たちのいる村は都合がよく、定期的な訪問があったのなら、その女性と接触する機会もあり得る。</p><p>クルルは、グ・ラハ・ティアとともに研究者から聞いた話を補う。およそ二十年前、王の直接命令で、エバーキープ外の研究施設へ人員が移されたことがあるという。そこで進められていたのは新型兵器の開発らしいが、それ以上は分からなかった。案内役は搬送記録を追い、遠回りと偽装に満ちた経路の先に、ユウェヤーワータへ向かう大口の搬入があった事実を見つけ出す。村には不釣り合いな規模だ。だが近年は動きがなく、施設はすでに廃されているのだろう。それでもグルージャは問う――そこに母がいたのか、と。あなたは断言できない。ただ、点がつながり始めたことだけは確かだった。</p><p>目的地が定まると、あなたたちはドリフトダウンズへ向かい、ホバー貨物で湖を渡る準備をする。分かったことと分からないことを胸に刻みながら、あなたたちは慎重に進む。研究者は同僚の存在を覚えていても個人の詳細までは思い出せず、ユウェヤーワータがどのような場所になっているかも分からない。ゾラージャが目立つ移動を避けたのなら、別の手段を使ったはずだ――そう推し量りつつ、あなたは、忠実な者の助けを得て秘密裏に進められた兵器開発が、碌な結末を招かない予感を振り払えずにいる。</p><p>対岸に着いたとき、エコーがあなたを過去へ引きずり込む。あなたはカニロッカの説明を聞く。個の崩壊を防ぐため、魂を獣の器へ移す――それが彼の狙いだという。理論上はトゥラル・ヴィドラールの力を操れる可能性があり、まずは小さな生き物から試すが、いずれは最強の存在すら支配できると彼は言い切る。ゾラージャは代償を問う。魂を差し出した者は元の姿に戻れず、失われたものとして扱うしかない――カニロッカはそれでも、得られる軍勢は機械兵よりはるかに勝るのだと断ずる。ゾラージャは了承し、志願者を集めて開始せよと命じる。</p><p>続いて現れるマムージャの女性の名は、ティーシャル・ジャだった。ゾラージャは彼女に、カニロッカを補佐し、近くで監視し、得たことを報告せよと命じる。彼女は手段の疑わしさを認めながらも、ドームの内に籠もるにせよ外へ広がるにせよ、力が要るのだと言い、命令に従うと誓う。ただし、成果が出たなら恩賞を願いたい――トライヨラでは決して得られないと諦めていたものが、今は「とても、とても近い」のだと。ゾラージャは冷ややかに告げる。任を果たせば望みは与える。だが彼にとって、その望みは価値がない、と。</p><p>エコーが途切れると、グルージャは「ティーシャル・ジャ」という名に息をのむ。ヤースラニにマムージャが多くなかったのなら、彼女こそ母かもしれない。あなたたちは、カニロッカが戻ると言った天文施設が研究施設の一部である可能性に賭け、次の手がかりを求めて進む。グルージャはぽつりと漏らす――母の記憶がないまま長く過ごし、姿すら思い描けなかったが、トライヨラで同族を見て、ようやく想像できるようになったのだと。だからこそ、あなたは歩みを止めない。消えかけた足跡を拾い上げ、ティーシャル・ジャの行方へ近づくために。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>G’raha Tia 判斷得很清楚：既然 Gulool Ja 的母親既沒有記憶、也沒有紀錄可循，你們就得把網撒到最大。眾人決定分頭行動──有人留在 Solution Nine 內打聽，你則到 Everkeep 的外圍去做外頭的問訊。</p><p>在 Outskirts，你一個個問過去。有人表示從沒聽過這附近住過 Mamool Ja 女性，更別說與 Zoraal Ja 有關；不過他提到 Everkeep 北邊有個 Tonawawta 的聚落叫 Yuweyawata，說傳聞中 Zoraal Ja 曾在某次「危機」裡救過他們，因此贏得忠誠，而那裡的首領名叫 Kanilokka。也有人回想起來，在 the dome（罩住 Yyasulani 的巨型屏障）落下之前，曾見過一名 Mamool Ja 女性跟在 Landsguard 的隨行隊伍裡來到這裡；他推測任務結束後他們應該回 Tuliyollal 了，但若有人留下，確實可能跟大家一起被困在裡頭。</p><p>還有人對 Gulool Ja 的母親一無所知，卻轉述父親講過的往事：在 the dome 把你們與外界隔絕之前，曾有一頭 tural vidraal 出現，肆虐整個地區。Zoraal Ja 集結戰士前去迎戰並擊倒了那頭野獸。更令人印象深刻的是，那場戰鬥據說連 regulator 都沒有用上。你帶著這些零碎的線索回去，心裡明白它們各自都不足以證明什麼。</p><p>回到 Backroom，你們坦白彼此都沒找到能直接指向 Gulool Ja 母親的證據；連 Shale 也說，以前追查紀錄時同樣一無所獲。然而當你交出筆記，眾人的發現被並排拼在一起時，Shale 開始把碎片串成形：Zoraal Ja 的隨從裡確實有一名 Mamool Ja 女性被帶到 Yyasulani，而 Yuweyawata 那場「危機」也很可能就是 tural vidraal 的事件。如果 Zoraal Ja 需要隱密行事，那麼由最忠誠追隨者聚集的地方正合適；而若那名 Mamool Ja 女性曾留在村子裡，他們就有機會接觸。</p><p>Krile 補上她與 G’raha Tia 的另一條線索：他們問到一名曾在 Origenics 工作的研究者，對方說大約二十年前，國王曾直接下令把一些同僚調去 Everkeep 外的一處研究設施。那裡似乎用來研發一種新武器，但也只打聽到這一步。Shale 接著改從運輸紀錄下手，終於在繞路與偽裝的路線裡找出規律──大量物資被送往 Yuweyawata，規模大到遠超「一個普通村落」所需。只是多年來再無活動，設施恐怕早已停用。Gulool Ja 忍不住問：那裡會不會就是母親所在之處？你們仍無法斷言，只能承認：拼圖終於開始成形。</p><p>目的地確定後，你們前往 driftdowns，準備搭乘懸浮運輸艇橫越湖面。途中，眾人反覆衡量風險：研究者記得同僚存在，卻想不起任何具體人物；Yuweyawata 變成什麼樣也不得而知；而若 Zoraal Ja 當年要保持低調，他很可能不會走明顯的路線。你也無法忽視那股不安──由「忠誠追隨者」協助、在陰影中研發的武器，怎麼看都不會帶來好結果。於是你們在沉默裡繃緊神經，準備面對真相留下的痕跡。</p><p>抵達後，Echo 把你拉進過去。你聽見 Kanilokka 說，他為了避免個體崩壞，打算把人的靈魂轉移到野獸的身體裡。Zoraal Ja 追問：這是否能讓人運用 tural vidraal 的力量？Kanilokka 說理論上可行，先用較弱的生物做實驗，最終甚至能把最強大的存在也納入掌控。Zoraal Ja 接著問：獻出靈魂的人會怎樣？Kanilokka 沒有粉飾──他們再也回不到原本的形體，只能被視為「再也回不來的人」，但他聲稱這份犧牲值得，因為得到的軍勢將遠勝任何機械兵。Zoraal Ja 於是下令：招募志願者，立刻開始。</p><p>接著，一名 Mamool Ja 女性出現──她名叫 Teeshal Ja。Zoraal Ja 命令她協助 Kanilokka，並且緊盯對方，把學到的事全部回報。Teeshal Ja 不否認手段可疑，卻說無論是繼續躲在 the dome（罩住 Yyasulani 的巨型屏障）之內、還是向外擴張，他們都需要更大的力量；在沒有依靠的情況下，只能自己奪取力量。她答應照命令行事，但提出一個請求：若 Kanilokka 的研究成功，她想求一份恩賞──那是在 Tuliyollal 時她早已放棄、以為永遠得不到的東西，如今卻「近在眼前」。Zoraal Ja 回答得冷淡：只要她把任務完成得讓他滿意，她想要的都能得到；而且若她要的就在眼前，就去取吧，因為那對他毫無價值。</p><p>Echo 結束後，你們回到現實。Gulool Ja 低聲重複「Teeshal Ja」的名字──那會不會就是他的母親？Wuk Lamat 也指出，在 Yyasulani 幾乎沒有其他 Mamool Ja 女性，這個可能性很難忽視。你們於是把目標轉向 Kanilokka 說要回去的 observatory：若那裡屬於研究設施的一部分，也許能找到更多關於 Teeshal Ja 的線索。Gulool Ja 說，他一直沒有母親的任何印象，甚至連樣貌都想像不出；直到去過 Tuliyollal、看見同族的人，他才終於能在腦海裡勾勒出她的輪廓。你聽著那份空缺帶來的重量，跟著眾人繼續前進──要把那些被刻意抹去的足跡，一步步追回來。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
