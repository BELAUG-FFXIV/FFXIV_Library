<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'A Designer Job',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more',
    readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Sezul Totoloc calls you over in alarm, for one of his crew has failed to return. Bozol Eduan, the Ehcatl Nine’s mechanical engineer, left camp to acquire materials for an engine component, but he has not come back. Without that vital part, construction cannot continue; without Bozol himself, the engine cannot even be properly installed. Sezul explains that Bozol is rare among the Ixal, gifted with machines and solely responsible for designing and developing the propulsion system. All he knows is that Bozol went somewhere to the south, and he asks you to find the missing engineer and bring him back.</p>
      <p>You find Bozol wounded near Blessed Bud, his arm badly hurt and his first instinct to warn you away. He fears you will be caught by the others, and his fear proves justified when an Ixali chieftain appears. The chieftain mocks Bozol’s broken arm, sneers at his resistance, and demands that he return to the flock and devote himself to Divine Garuda. When he notices you, he threatens you as well, then orders you to carry a warning back to Sezul: if the Ehcatl Nine continue skulking about the forest, they will be buried beneath the boughs.</p>
      <p>After the chieftain leaves, Bozol is relieved only because his tormentors have finally tired of their sport. He explains that the chieftain is based at the logging grounds and has taken the actions of the Ehcatl Nine as a personal insult. His arm is useless for now, leaving him unable to do the work he came to finish. Though he does not wish to rely on a featherless one, he has no choice but to entrust you with the materials needed for a high-quality engine component. The ceruleum propulsion engine remains incomplete without it, and someone must craft the heat-resistant housing Bozol can no longer make with his injured arm.</p>
      <p>With Bozol’s materials in hand, you go to the crafting facility at Treespeak Stables. Nellemond welcomes you and explains that the workshop is mainly used for forging tools for the stablehands, though it is open to anyone who needs it. After inspecting the materials, he prepares the precise amount required and holds the excess while you work. There, using the facility Bozol could only sneak into by night, you complete the component and return to Ehcatl to deliver both the part and the truth of what happened.</p>
      <p>Sezul is relieved to see you return. Bozol has already come back and told him everything: the broken bones, the threats, and the chieftain’s cruelty. Sezul thanks you twice over, first for finding Bozol and again for crafting the engine component. As Bozol receives treatment, Sezul fumes at the thugs who call upon Garuda yet never gain back the wings they lost. Tataramu asks whether this goddess is the primal Garuda, and Sezul explains the difference between the Ehcatl Nine and the other Ixal. Their balloons have no true mechanical propulsion and depend on enchanted airstones blessed by Garuda to create wind. Those gifts are costly, unreliable, and only bind the Ixal more deeply to the goddess’s cruel desires. That is why the Ehcatl Nine severed their ties with Garuda: they will rely instead on skill, perseverance, and the technology of featherless ones.</p>
      <p>Tataramu understands then why the chieftain hates the Ehcatl Nine, seeing them as heretics and betrayers of their own kind. Sezul accepts that the others despise them, but he will not crawl at anyone’s feet, whether Garuda’s or any featherless chieftain’s. They will fly beyond the clouds. Yet Bozol’s injury means the work must slow, for no one else can draft the technical designs for the Dezul Qualan. At that, Tataramu steps forward and offers himself. He has already begun drafting improvements to the engine assembly, believing the propulsion system can be made lighter without losing power. Sezul warns him harshly not to toy with their dream, but in the end he sees the shape of their strange new crew: Tataramu drawing designs, you crafting components, and the Ehcatl Nine continuing to reach for the sky. With that, Sezul names you both official members of the Ehcatl Nine.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Sezul Totoloc <small class="muted">(North Shroud, X:24.4, Y:23.4)</small></div>

  JP:{
    langLabel:'日本語',
    pageTitle:'設計士急募、種族問わず',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示',
    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>セズル・トトロックは、ただならぬ様子であなたを呼び止める。仲間のひとりが戻ってこないのだという。機械技師のボゾル・エドアンは、機関部品の材料を集めるために拠点を出たまま、いまだ帰ってこなかった。その重要な部品がなければ建造は進まず、何よりボゾル本人がいなければ、機関を船に組み込むことすらできない。ボゾルはイクサルの中でも珍しく機械に通じ、推進装置の設計と開発を一手に担う存在だった。南のどこかへ向かったことだけを頼りに、セズルはあなたへ、行方不明の技師を探し出して連れ戻してほしいと頼む。</p>
      <p>あなたはブレスドバッドの近くで、傷ついたボゾルを見つける。片腕を痛めた彼は、最初にあなたを遠ざけようとした。ほかの者たちに捕まると危ないのだと警告するが、その恐れはすぐに現実となる。そこへイクサルの族長が現れ、折れた腕では飛び去ることもできまいとボゾルを嘲り、まだ遊びは終わっていないと迫る。族長は、無駄な抵抗をやめて群れに戻り、女神ガルーダへ身を捧げるべきだと告げる。そしてあなたに気づくと、同じように脅しをかけ、セズルへ伝言を持ち帰れと命じた。森の中でこそこそ動き回るのをやめなければ、セズルも仲間も木々の下に埋められることになる、と。</p>
      <p>族長が去ったあと、ボゾルはようやく彼らがいたぶるのに飽きたことへ安堵する。あの族長は伐採場を拠点としており、エカトル空力団の行動を自分への侮辱と受け取っているのだという。傷ついた腕は使いものにならず、彼は自らの職人仕事を奪われたも同然だった。羽なしに頼りたくはないと口にしながらも、いまはあなたに材料を託すほかなかった。高品質な機関部品を作るために必要なそれらがなければ、青燐機関は完成しない。負傷したボゾルの代わりに、あなたが高熱に耐える外装部品を作らなければならないのだった。</p>
      <p>ボゾルから預かった材料を携え、あなたはツリースピーク厩舎の製作施設へ向かう。ネルモンドはあなたを迎え、この工房は主に厩務員たちの道具を鍛えるためのものだが、必要とする者には開かれていると説明する。彼は材料を調べ、部品を作るために最適な量を計算し、余った分は作業の間預かると言う。ボゾルが夜に忍び込んで使うしかなかった施設で、あなたは必要な部品を完成させる。そして完成品とともに、何が起きたのかを伝えるため、エカトルへ戻る。</p>
      <p>あなたの帰還を見て、セズルは深く胸をなで下ろす。ボゾルはすでに戻り、骨を折られたこと、族長から脅されたこと、その乱暴な仕打ちをすべて話していた。セズルは、ボゾルを見つけたことと機関部品を作り上げたこと、その二つに対してあなたへ感謝を示す。ボゾルが手当てを受けているあいだ、セズルは女神に祈ってばかりの者たちを罵る。どれほど祈っても、失われた飛ぶ羽は戻らないのだ。タタラムがその女神とは蛮神ガルーダのことかとたずねると、セズルはエカトル空力団とほかのイクサルとの違いを語る。彼らの気球には機械の推進力がなく、ガルーダの加護を受けた風石で風を起こし、進む方向を操っている。だが、その恵みは高くつき、決して効率もよくないうえに、イクサルを女神の残酷な望みへ縛りつけるだけだった。だからこそエカトル空力団はガルーダと縁を切り、自らの技術と忍耐、そして羽なしの技術を取り入れる道を選んだのだった。</p>
      <p>タタラムはそこで、なぜ伐採場の族長がエカトル空力団を憎むのかを理解する。彼らは同族にとって異端者であり、裏切り者なのだ。セズルもまた、ほかのイクサルが自分たちを最悪の者と見なしていることを認める。それでも、ガルーダにも羽なしの族長たちにも、足もとへひれ伏すつもりはない。彼らは飛ぶ。雲の向こうへ飛んでいくのだ。だが、ボゾルの負傷により作業は大きく遅れることになる。デズル・クワランの技術設計を引ける者は、ほかにいないからだ。するとタタラムが一歩前へ出て、自分こそがその役に立つと名乗り出る。彼はすでに機関部の改良案を描き始めており、出力を保ったまま推進装置を軽くできると考えていた。セズルは、夢をもてあそぶなら翼の皮にしてやると厳しく警告する。それでも最後には、タタラムが設計を描き、あなたが部品を作るという、奇妙な新しい仲間の形を受け入れる。こうしてセズルは、あなたたちを正式なエカトル空力団の一員と認め、なおも空を目指し続けるのだった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> セズル・トトロック　黒衣森：北部森林 <small class="muted">(X:24.4, Y:23.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="reaching-for-cloud-nine.html">疾風の空力団</a></div>
      <div class="row">クラフター <small class="muted">Lv 1～</small></div>
      <div class="row">イクサル族 友好度ランク1「中立」</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="the-boy-from-gridania.html">グリダニアから来た少年</a></div>
    </div>`
  },

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'招募設計師',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Sezul Totoloc 神色緊張地叫住你，因為他有一名夥伴遲遲沒有回來。Ehcatl Nine（Sezul Totoloc 率領的一支 Ixal 工匠團體，據點位於 North Shroud 的 Ehcatl；不同於崇拜 Garuda、主張對外戰爭的 Natalan Ixal（以 Natalan 為據點、信奉 primal Garuda 的 Ixal 勢力；相較於追求工程與飛行夢想的 Ehcatl Nine，他們更傾向以 Garuda 的力量、風石與戰爭手段對抗外族，也因此將脫離 Garuda 信仰的 Ehcatl Nine 視為異端與背叛者），他們以製作與工程技術追求飛行夢想，目標是建造 Dezul Qualan，重返傳說中的浮游大陸 Ayatlan）的機械工程師 Bozol Eduan 為了取得引擎部件的材料離開營地後，便一直不見蹤影。沒有那個推進系統的關鍵部件，建造就無法繼續；而更重要的是，沒有 Bozol 本人，他們甚至無法把引擎正確裝進船體裡。Sezul 說，Bozol 在 Ixal 之中是相當罕見的人才，非常擅長機械，並且獨自負責整套推進系統的設計與開發。他只知道 Bozol 往南方某處去了，於是請你去尋找這名失蹤的工程師，並把他帶回來。</p>
      <p>你在 Blessed Bud 附近找到了受傷的 Bozol。他的手臂傷得很重，而第一個反應卻是要你離遠一點，因為他擔心你也會被其他 Ixal 抓住。這份恐懼很快就成了現實，一名 Ixali Chieftain (鳥人隊長) 出現在你們面前，嘲笑 Bozol 的斷臂，說折了翅膀便難以飛走，還表示他們的遊戲尚未結束。那名 chieftain 要 Bozol 停止無謂的反抗，回到群體之中，重新把自己奉獻給 Divine Garuda。當他注意到你時，也同樣威脅了你，並命令你把話帶回給 Sezul：若 Ehcatl Nine 繼續在森林裡暗中行動，Sezul 和他的隊伍終將被埋葬在樹枝之下。</p>
      <p>那名 chieftain 離開後，Bozol 只能慶幸他們終於對折磨自己感到厭倦。他說，那名 chieftain 以伐木場一帶為據點，並且把 Ehcatl Nine 的行動視為對自己的侮辱。如今他的手臂幾乎無法使用，也等於暫時奪走了他身為工匠的能力。Bozol 並不想依賴無羽者，但眼下他只能把材料交給你。那是製作高品質引擎部件所必需的材料；若沒有它，青燐推進引擎就無法完成。如今 Bozol 已經無法親手作業，你必須代替他，製作能承受極高熱度的金屬外殼。</p>
      <p>帶著 Bozol 託付給你的材料，你前往 Treespeak Stables 的製作設施。Nellemond 迎接了你，並說明這座工房主要是用來替馬廄人員打造工具，但需要的人都可以使用。檢查過材料後，他替你計算出製作部件所需的最適合分量，並在你作業期間替你保管多餘的材料。這座 Bozol 原本只能趁夜偷偷使用的設施，如今讓你得以正面完成他的工作。完成部件之後，你便帶著成品與發生過的一切，回到 Ehcatl 交付給 Sezul。</p>
      <p>看見你平安回來，Sezul 終於鬆了一口氣。Bozol 已經先一步回到營地，把骨頭被折斷、遭到威脅，以及那名 chieftain 的殘酷行徑全都告訴了他。Sezul 說，他欠你兩份感謝：第一，是你找到了 Bozol；第二，是你完成了引擎部件。在 Bozol 接受治療的同時，Sezul 對那些只會向女神祈禱的暴徒滿懷怒意。無論他們怎麼祈禱，失去的飛行羽翼都不會再長回來。Tataramu 問起他所說的女神是否就是 primal Garuda，Sezul 便解釋起 Ehcatl Nine 與其他 Ixal 的差別。他們的氣球沒有真正的機械推進力，只能依靠受 Garuda 祝福的 airstones 產生風，藉此控制航向。那種方式看似簡單，卻既不高效，也不穩定，而且女神的「恩賜」總是代價高昂，只會讓 Ixal 更深地受制於 Garuda 的殘酷欲望。因此 Ehcatl Nine 才與 Garuda 斷絕關係，決定依靠自己的技術、毅力，以及無羽者的科技。</p>
      <p>Tataramu 這才明白，為什麼伐木場的 chieftain 會那麼仇視 Ehcatl Nine；在對方眼中，他們是異端，也是背叛同族的人。Sezul 承認其他 Ixal 把他們視為最糟糕的一類，但他們也不打算跪倒在 Tataramu 所屬那些無羽者首領的腳邊。他們會飛，會飛到雲層之外。然而，Bozol 的傷勢也讓工程不得不延後，因為除了他以外，沒有人能繪製 Dezul Qualan 的技術設計。這時 Tataramu 主動站了出來，表示如果需要設計飛空艇圖紙，那他正是最適合的人選。他已經開始替引擎組件繪製改良方案，並相信能在維持輸出的同時，讓推進系統減輕重量。Sezul 嚴厲警告他，絕不能拿他們的夢想開玩笑；若設計有問題，就要拿他的皮來覆蓋船翼。即便如此，Sezul 最終仍接受了這支奇妙的新隊伍，由 Tataramu 繪製設計，由你製作部件，而 Ehcatl Nine 則繼續朝天空前進。於是，他正式承認你們成為 Ehcatl Nine 的一員，繼續一同追向高空。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
