  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }

    .container{max-width:1080px;margin:0 auto;padding:0 16px}

    .left{display:flex;align-items:center;gap:12px}

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`The Sea Rises`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Minfilia does not soften the reality: if the worst comes to pass and Leviathan is summoned, you will have no recourse but to face him in battle. Experience may tempt you to think that outcome inevitable, but she refuses to surrender to inevitability. So long as there is even a chance to prevent the primal’s return, every effort must be bent toward that goal. Before anything else, she orders you to hasten to Limsa Lominsa and meet with the Admiral, certain she will have gathered valuable information in the time since Y’shtola’s report.</p><p>You make for Bulwark Hall and take the Admiral’s Lift as instructed. Zanthael is waiting and tells you you are expected, then sends you up to the command room. There, Merlwyb welcomes you without ceremony and confirms that Y’shtola has already briefed you. She moves straight to the intelligence: by the Maelstrom’s best information, the Sahagin did not have enough crystals to summon their god—until the Serpent Reavers ranged as far as Thanalan to supplement their cache. For that oversight, Limsa Lominsa now faces the grim prospect of Leviathan’s imminent return.</p><p>Merlwyb makes her stance plain: she has no intention of letting the fishbacks have their way. Even now, the Maelstrom is preparing a large-scale operation to thwart the summoning, and she welcomes the Scions’ support. But she is equally frank about the contingency—if their efforts come to nothing, she will need more than support, just as she did when Titan last walked the lands. Then she turns to Minfilia directly. She has heard Minfilia intends to accompany the soldiers to the front lines, and she demands to know whether Minfilia has sound reasons for placing herself in such danger.</p><p>Minfilia answers only that she does, but refuses to be drawn into specifics. There is something she must see with her own eyes. Merlwyb accepts the insistence—not out of indulgence, but necessity—yet she imposes precautions immediately: Minfilia must remain by the Admiral’s side at all times. With that decided, Merlwyb gives you your next task. Maelstrom scouts are currently reconnoitering Sahagin movements in the Sapsa Spawning Grounds. When they finish, they will return to the operation’s staging point at Camp Skull Valley. You are to go there at once and receive the latest intelligence; Commander Falkbryda commands the garrison.</p><p>Merlwyb does not repeat herself gently. Time is short—make haste to Camp Skull Valley and request the report. As you set out, Minfilia’s resolve remains unchanged: if there is no better chance to learn the true nature of the Echo, she cannot allow it to pass. At Camp Skull Valley, Falkbryda is expecting you. She thanks you on behalf of the soldiers and states the purpose as a vow: the safety of their citizens comes first, and with your aid they will prevent Leviathan’s return.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Minfilia <small class="muted">(The Rising Stones, X:6.1, Y:5.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="all-due-respect.html">All Due Respect</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="scouts-in-distress.html">Scouts in Distress</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'ふたりの盟主',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ミンフィリアは現実から目を逸らさない。最悪の事態となり、リヴァイアサンが召喚されれば、残された道は戦って討つことしかない。これまでの経験から、いずれそうなると考えたくもなるだろう。だが彼女は、そうした諦観に抗う。蛮神の再来を防げる可能性が一片でもあるのなら、あらゆる力をそこへ注ぐべきだ、と。まずはリムサ・ロミンサへ急ぎ、提督に会う。彼女は決して手をこまねいてはいないはずで、価値ある情報を持っているだろう、と。</p><p>あなたはブルワークホールへ向かい、提督リフトで司令室へ上がる。待っていたザンザエルは、あなたを待っていたと告げ、案内する。司令室でメルウィブは形式ばった挨拶を省き、ヤ・シュトラから状況は聞いていると確認すると、すぐ本題に入る。メイルストロームの情報では、サハギンは当初、神を呼ぶだけのクリスタルを持っていなかった。だがサーペントリーヴァーズがザナラーンにまで手を伸ばして備蓄を補った。こちらの見通しの甘さが、リヴァイアサン再来が目前という暗い現実を招いたのだ。</p><p>メルウィブは断言する。魚顔どもに好き勝手はさせない。メイルストロームは大規模作戦を準備中で、召喚阻止のため暁の血盟の支援を求める。だが、もし万が一阻止に失敗すれば、ただの支援以上のものが必要になる――かつてタイタンが大地を歩いたときにそうしたように、と。そこで彼女はミンフィリアへ向き直る。前線に兵と同行するつもりだと聞いたが、危険を承知のうえでそうするだけの理由があるのか、と。</p><p>ミンフィリアは理由があるとだけ答え、その性質を語ることは避ける。ただ、自分の目で確かめたいものがあるのだと。メルウィブは、助力を必要としている以上、その願いを無下にはできないと言い、しかし即座に条件を付ける。ミンフィリアは常に提督の傍を離れないこと。そう取り決めたうえで、作戦の話に移る。現在、メイルストロームの斥候がサプサ産卵地でサハギンの動きを偵察している。任務を終えれば作戦の集結地であるキャンプ・スカルバレーへ戻るはずだ。あなたは直ちにそこへ向かい、最新情報を受け取れ。守備隊はファルクブリダが指揮している。</p><p>メルウィブは念を押す。時間はない、急げ、と。出発の途上でもミンフィリアの決意は揺るがない。エコーの真の性質を知る好機が他にないのなら、この機会を逃すわけにはいかない。キャンプ・スカルバレーでファルクブリダはあなたの到着を待っていた。彼女は暁の血盟の協力に礼を述べ、市民の安全こそ最優先だと言い切る。そして、あなたの助けを得てリヴァイアサンの再来を必ず阻止する、と誓う。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ミンフィリア <small class="muted">（石の家, X:6.1, Y:5.2）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="all-due-respect.html">新たな開拓者</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="scouts-in-distress.html">海に散る命</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'兩位領袖',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Minfilia 把話說得很明白：如果最糟的情況真的發生，Leviathan 被召喚出來，你們唯一的退路就是正面迎戰。以過去的經驗，你或許會覺得這幾乎無可避免；但她拒絕把「無可避免」當成結論。只要還有哪怕一絲機會能阻止 primal 再度降臨，你們就必須把所有努力都押在那個目標上。於是她要你立刻前往 Limsa Lominsa，與 Admiral 會面——在這段時間裡，她不可能什麼都沒做，手上肯定已經掌握了能派上用場的情報。</p><p>你依指示來到 Bulwark Hall，搭乘 Admiral’s Lift 進入指揮室。Zanthael 早已等候，直接告訴你「正在等你」，並要你上去。Merlwyb 在指揮室迎接你們，確認 Y’shtola 已經把狀況說明過後，便立刻切入重點：依 Maelstrom 的最佳情報，Sahagin 原本並沒有足夠的水晶來召喚他們的神；只是你們低估了 Serpent Reavers（以 Vylbrand（La Noscea）海域為活動範圍的海盜／掠奪團伙；此處指他們跨區潛入 Thanalan 盜取水晶，並把水晶轉交／支援 Sahagin 的召喚準備，因此成為「水晶失竊案」背後的關鍵犯人之一。），他們竟然一路跑到 Thanalan 去補足儲備。正因為這份短視，現在你們面前只剩一個沉重的事實：Leviathan 的回歸已迫在眉睫。</p><p>Merlwyb 直言她不會讓那些魚人得逞。此刻 Maelstrom 正在準備發動大規模行動，阻止召喚儀式，而她希望 Scions of the Seventh Dawn 能提供支援。但她也同樣把「如果失敗」的後果講得毫不遮掩：若召喚無法阻止，她需要的就不只是支援——就像 Titan 上次踏上大地時一樣，你們得親手終結 primal。接著她把視線轉向 Minfilia，說她聽聞 Minfilia 打算與士兵一同前往前線；她要知道，Minfilia 是否真的有足夠的理由把自己置於那樣的危險之中。</p><p>Minfilia 只回答：她有理由，但她不願說明那理由的本質。她只說，有一件事她必須親眼確認。Merlwyb 沒有再逼問——她需要 Minfilia 的協助，所以也不會固執到拒絕她的要求，但她立刻加上防護條件：Minfilia 必須全程待在 Admiral 身邊，不得離開。條件定下後，Merlwyb 立刻交辦下一步。Maelstrom 的斥候正在 Sapsa Spawning Grounds 偵察 Sahagin 的動向；完成任務後，他們會回到作戰集結點 Camp Skull Valley。你要立刻趕去那裡，取得最新情報，守備隊由 Commander Falkbryda 指揮。</p><p>Merlwyb 再次強調時間緊迫，要你立刻動身。你準備出發時，Minfilia 的決心仍沒有動搖：若此刻是了解 Echo 真相的最好機會，她不能放過。你抵達 Camp Skull Valley，Falkbryda 正在等你。她代表駐守在此的士兵向你致謝，並把目標說得簡單而堅定——市民的安全至上；在你的協助下，他們會阻止 Leviathan 的回歸。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 敏菲利亞 <small class="muted"> 石之家（X:6.1, Y:5.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="all-due-respect.html">新的開拓者</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="scouts-in-distress.html">逝於海中的生命</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
