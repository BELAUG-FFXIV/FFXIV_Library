    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Pomb lets out a mournful cry at the doors, and the sound cuts straight through Yaana. She admits that part of her had feared this would happen—that all of you might already be too late—and though she had tried to steel herself for the worst, the truth proved more than she could bear. To see the president exploit Eutrope and all the other fallen fighters in such a way drove her into blind anger, so much so that she nearly reached for a feral soul again without thinking. Yet she stops herself there. Much as she wishes she could stand beside you in the fight to come, she knows she would only become a burden, and she refuses to tempt fate a second time. To the president, this may still be some grand spectacle, but to her it has become a reckoning. For Eutrope and for every fighter who fell before this day, she begs you to bring that monster to justice.</p><p>Even with the battle at hand, she cannot offer much guidance. This Lindwurm is a mystery to all of you. Still, she reminds you that you did not reach this point by chance. You are the grand champion because you defeated every opponent set before you, and she believes you can defeat this one as well. You go out and do exactly that. When the battle ends, Yaana’s voice breaks with relief and pride—she tells you that you won, just as she knew you would. But before the victory can settle, she demands that the promised answer finally be given: where is the Drop of Life? No one else is allowed to die.</p><p>It is Metem who answers. What you seek, he says, lies right before you. The aether yielded by the Lindwurm’s heart is the stimulant needed for the regeneration factor. Then, before anyone can fully grasp the meaning of those words, he tells you to put grief aside, because Eutrope and the others have not truly perished. Everyone can still be saved—everyone, that is, except the president. The explanation that follows rewrites everything you thought you knew. When the first fighter was diagnosed with psychonekrosis, the president was devastated. He blamed himself for ever introducing feral souls into the Arcadion and became determined to find a cure. To do that, he turned to an heirloom passed down through his family: the egg of a Lindwurm, a creature famed for miraculous regenerative power. Through endless experimentation, he extracted the soul of the unborn beast and fused it with himself. The result was monstrous. He gained unnatural regeneration, but could not use it to heal others, and worse still, he became trapped forever in that serpent form, forced to confine himself within the mausoleum above. Only through his regulator and the machines of the Arcadion could he continue to act from afar.</p><p>That was when he turned to Metem. The president, Metem says, intended from the very beginning to sacrifice himself so that a cure could be made from his heart. But the Lindwurm’s power proved too great. Even the Tyrant could not bring him down, and so the Arcadion continued while the search went on for someone strong enough to do what no one else could. The fighters who developed psychonekrosis were not allowed to die; they were retired and placed into deep sleep, held in cold stasis until the cure could be made. That, Metem explains, is why Eutrope was taken. The president hated that more fighters had to be exposed to the illness while he waited, yet with no other answer in sight, he drove his plan onward. Yaana can hardly contain her fury and asks why none of this was ever revealed. Metem answers that the president could not help but turn everything into theater. His regret, his wish for atonement, and even his own life were all folded into a performance meant to sharpen the competition and forge the one fighter who might finally defeat him. The disease was hidden so that the contest would continue, and when you appeared, the president became certain you were the one he had been waiting for. All he had to do was cast you as the rebel who would tear down the Arcadion, while he himself took on the role of the greatest heel it had ever known.</p><p>Even that revelation does not mark the end. The president begins to recover, and panic surges through the room. Retsarra and the others rush to help, but Metem warns that it is no use. Then Brute Bomber’s voice cuts through everything, calling on everyone to lend you their aether. Yaana cries that you must finish this now. In that final surge, even the Tyrant speaks—not with defiance, but with grim acceptance. He says you have fought well, and that the rest should be left to them. The president had confided in them long ago, and they had all been following his instructions. It was the Tyrant’s duty to serve as the challenger’s final trial, and to keep your hands from being stained by what had to be done. In the president’s last thoughts, you hear the truth laid bare: it had been the battle of a lifetime, and even without feral souls, the future of the Arcadion would remain bright. Only then does the weight of everything begin to settle. Hector lives. Brute Bomber himself awakens restored, revealing that the president had given him weaker souls during the bout and afterward had his people return him to normal. He has been recuperating in the infirmary ever since, and when he saw the broadcast, he could no longer stay away. Yaana, meanwhile, nearly collapses, admitting she must have pushed herself too hard and forgotten that her own illness had not yet left her. Metem snaps back to himself at once and orders everyone moved to the infirmary, promising that he will personally oversee the creation of the cure and save every soul.</p><p>Time passes, and at last the promise is fulfilled. The treatment works. Every last person afflicted with psychonekrosis makes a full recovery. Yaana’s symptoms vanish completely, and she thanks you from the bottom of her heart. Eutrope offers her gratitude too, saying there are no words large enough for what you have done. Brute Bomber, awkward as ever, mutters his thanks and admits he owes you more than he can repay. Retsarra tells you that the heavyweight fighters and all those who had been held in stasis wished to thank you as well. Metem, for his part, apologizes sincerely for deceiving everyone, but whether you offer mercy, demand punishment, or half-jokingly call him the true mastermind, he can only answer with weary honesty: in the end, everything unfolded as the president had hoped. The souls in the repository have been released, and never again will feral souls be used in the Arcadion.</p><p>From this point onward, the matches will belong only to unenhanced warriors. You are crowned in the ring as the new grand champion, hailed as the undefeated king who ushered in revolution. Yet even your ceremony is interrupted by one last theatrical surprise—Brute Bomber storms in demanding a rematch, only for Black Cat to leap into the ring and turn the moment into an impromptu exhibition that marks the rebirth of the Arcadion itself. Later, Yaana confesses that she agreed to the stunt because all of them wanted the new era to begin with a bang. Retired fighters are already returning to compete unenhanced, regulators are being removed, and the Arcadion will continue on a new path. As for you, with no equal left to face, you are granted the title of eternal grand champion and entered into the Hall of Fame. Yaana says that although the president made all of you dance through his script from the start, it was only because you stood at the center of it that the story could end in hope. For that, she thanks you once more. They will never forget what you have done for them.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

      <div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 100</div>
    </div>`,

    langLabel:'JP',
    pageTitle:'亡国の大蛇',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>扉の前で、ポムが物悲しげに鳴く。その声を聞きながら、ヤーナは胸の奥に沈めていた不安をようやく言葉にする。もしかしたら自分たちはもう間に合わないのではないか――そんな予感はずっとあったし、最悪の結末さえ覚悟していた。けれど、社長がユートロープや倒れた闘士たちをあのように弄んでいる現実は、その覚悟をはるかに超えていたのだという。怒りのあまり、彼女はまた獣魂に手を伸ばしかけた。だが、そこで踏みとどまる。あなたと一緒に戦いたい気持ちはあっても、いまの自分では足手まといになるだけだし、再び獣魂を使って運命を試すような愚かな真似はできない。社長にとってはこれも舞台のひとつなのかもしれないが、ヤーナにとっては違う。これはユートロープと、倒れていったすべての闘士たちのための決着なのだ。だからどうか、あの怪物に裁きを下してほしいと、彼女はあなたに託す。</p><p>とはいえ、戦いそのものについては有効な助言を与えられない。リンドヴルムという存在は、あまりにも未知だからだ。それでもヤーナは、あなたがここまで勝ち抜いてきた事実を思い返させる。数々の強敵を越えてきたからこそ、あなたはグランドチャンピオンなのだ。ならばこの怪物にだって勝てるはずだと信じ、最後の戦いへ送り出す。そしてあなたは、またしてもその期待に応えて戻ってくる。勝利したあなたを見て、ヤーナは思わず声を上げる。やはりやり遂げたのだと喜びながらも、すぐに社長へ向かって「Drop of Life（可用來治療 psychonekrosis 的刺激劑）」の在り処を明かせと迫る。もう誰も死なせはしないのだと。</p><p>その問いに答えたのはメテムだった。おまえたちが求めていたものは、まさに目の前にあるのだという。リンドヴルムの心臓から得られるエーテルこそが、再生因子のための刺激剤だった。そして彼は、悲しみに沈むのはまだ早いと続ける。ユートロープも、ほかの闘士たちも、まだ本当の意味では死んでいない。救えないのは社長だけなのだと。そこから語られた真実は、これまでのすべてを覆すものだった。最初の闘士が魂蝕症と診断されたとき、社長は激しく動揺し、自らが獣魂を持ち込んだことを深く悔やんだ。どうにかして治療法を見つけようと、彼は一族に伝わる秘宝――驚異的な再生能力を持つリンドヴルムの卵へと手を伸ばした。長い実験の末、彼は生まれる前の獣の魂を取り出して自らに取り込み、怪物じみた再生能力を手に入れる。だがその力で他人を癒やすことはできず、さらにその代償として、自身は永遠に蛇の姿へ閉じ込められてしまった。だからこそ彼は、この霊廟の奥へと身を隠すしかなかったのだ。</p><p>それでも彼には、レギュレーターとアーカディアの機構を通じて、遠隔からすべてを操る術が残されていた。そこで彼はメテムに真意を託す。最終的には自分自身を犠牲にし、その心臓から治療薬を作らせる。それが社長の計画だった。しかしリンドヴルムの力はあまりに強大で、タイラントですら倒すことができなかった。そのため、彼を打ち倒せる闘士を探し出すまで、アーカディアは存続し続けるしかなかったのだ。魂蝕症を発症した闘士たちは見捨てられたわけではない。引退させられたのち、病の進行を止めるために深い眠り――冷たい静止状態へと置かれていた。ユートロープが攫われたのも、そのためだった。より多くの魂が病に蝕まれていくことを社長自身も悲しんでいたが、ほかに手立てがなかった以上、計画を進めるほかなかったのだという。ヤーナは、もしそれが本当なら、どうして最初から話さなかったのだと叫ぶ。だがメテムは、社長が最後まで根っからの興行師だったからだと答える。後悔も、贖罪も、己の命さえもすべて舞台の中へ織り込み、より苛烈な競争を生み出し、その果てに現れる最強の闘士を待っていたのだと。病を隠し続けたのも、競争を止めないためだった。そしてあなたが現れたとき、社長はついに、自分を倒せる存在を見つけたと確信した。あとはあなたを煽り立てればよかった。アーカディアを壊す反逆者としてあなたを据え、自分は史上最悪のヒールとして立ちはだかる。それすらも彼は見世物に変えてしまったのだ。</p><p>だが真実が明かされても、終わりはまだ来ない。社長はすでに再生を始めていた。レトサラたちが助けに入ろうとするが、メテムは無駄だと叫ぶ。そのとき、ブルートボンバーが大声で皆に呼びかける。説明はあとだ、いまはおまえたちのエーテルをあの男へ送れ、と。ヤーナも、いま終わらせなければならないとあなたを急かす。そして最後に、タイラントが口を開く。あなたはよく戦った、あとの役目は自分たちに任せろ、と。社長はずっと前に真実を自分たちへ打ち明けており、自分は挑戦者に最後の試練を与える役を担っていたのだと。そして、あなたの手を汚させないためでもあったのだと。社長の思念の中には、これが生涯で最高の戦いだったこと、そして獣魂がなくともアーカディアの未来は明るいのだという確信が残されていた。やがてすべてが終わったとき、驚くべきことにヘクトルは生きていた。ブルートボンバーもまた目を覚まし、社長がわざと弱い魂を使わせ、その後に元へ戻す処置まで済ませていたことを明かす。彼はずっと医務室で休んでいたのだが、放送を見てじっとしていられず駆けつけたのだという。一方でヤーナは、自分もまた無理をしすぎたらしく、病気のことを忘れていたとふらつく。メテムは我に返ると、全員をすぐ医務室へ運び、治療薬を作らせると宣言する。ここから先は自分が責任を持ち、すべての魂を救ってみせるのだと。</p><p>そして時は流れ、その約束は果たされる。治療は成功し、魂蝕症に苦しんでいた者たちは皆、完全に回復した。ヤーナの症状もきれいに消え、彼女は治療薬のおかげであり、そして何よりあなたのおかげだと感謝を伝える。ユートロープも、言葉では足りないが礼を受け取ってほしいと頭を下げる。ブルートボンバーも、不器用ながら礼を言い、自分は借りを作ったと認める。レトサラは、ヘビー級の闘士や静止状態に置かれていた者たちも皆、あなたに心から感謝していたと告げ、自分からも礼を言う。メテムもまた、皆を欺いたことを謝罪する。あなたがどう返そうと、彼は結局、すべては社長の願いどおりに終わったのだと静かに認める。魂の保管庫にあった魂も、あなたの望みどおり解放された。もう二度とアーカディアで獣魂は使われない。これからは強化なき戦士たちだけが戦う時代になるのだ。</p><p>あなたはその革命を成し遂げた者として、新たなグランドチャンピオンに戴冠される。だが、その戴冠式すらも、ブルートボンバーが乱入して再戦を要求し、そこへブラックキャットが飛び込んで即興のエキシビションマッチへ変わっていく。大騒ぎのあと、ヤーナはあれは新しい時代の幕開けを派手に飾るための茶番だったのだと笑う。引退していた闘士たちも、強化なしの試合へ戻り始めている。誰もがレギュレーターを外し、アーカディアは新たなかたちで続いていく。そしてあなたには、もはや対等に戦える相手がいない。だからこそ「永遠のグランドチャンピオン」の称号と殿堂入りが与えられたのだと。ヤーナは、結局みな最初から社長の掌の上で踊らされていたのかもしれないと苦笑しながらも、それでも物語を幸福な結末へ導けたのは、彼の筋書きの中心にあなたがいたからだと言う。だからもう一度、心から礼を言わせてほしいと。あなたたちは、この恩を決して忘れないのだと。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>Pomb 在門前又一次低低地叫著，聲音裡滿是沉重的哀傷。Yaana 聽著那聲音，終於把一直壓在心底的話說了出來。她其實早就害怕，也許你們早就來不及了；她也曾強迫自己做好最壞的準備。可真正看見總裁那樣利用她的姊姊，利用那些早已倒下的闘士時，現實還是重得讓她幾乎無法承受。那一刻，她甚至想也不想就要再次動用 feral soul（用於戰鬥變身的獸魂）。但她終究還是停了下來。她比任何人都想和你一起並肩作戰，可她也知道，如今的自己只會拖累你；若再一次拿 feral soul 去賭命，那才是真正的愚蠢。在總裁那扭曲的腦子裡，這也許依然只是一場表演，可對她來說，這是一場清算。她要你替 Eutrope，也替那些所有已經倒下的闘士，把那個怪物徹底送上審判。</p><p>只是，到了這一步，她已經無法再給你更多實際的建議。這個所謂的 Lindwurm，對你們而言仍然完全陌生。即便如此，Yaana 還是要你記住，你能走到今天絕不是偶然。你之所以站在這裡，本來就是因為你一路擊敗了所有對手，所以她相信，這個怪物你也一定能打倒。你再一次踏進戰鬥，並且再一次勝了下來。當你回來時，Yaana 幾乎是鬆了一口氣似地喊出聲，說你果然做到了，就和她一直相信的一樣。可這份勝利帶來的，不只是歡喜。她立刻追問總裁——現在，把 Drop of Life（可用來治療 psychonekrosis 的刺激劑）的所在告訴你們吧，她不允許再有人死去。</p><p>真正回答這個問題的人，卻是 Metem。他說，你們一直在尋找的東西，其實就在眼前。從 Lindwurm 心臟中提取出的乙太，正是製作再生因子刺激劑所需的材料。接著，他又要所有人先放下悲傷，因為 Eutrope 和其他闘士其實都還沒有真正死去。大家都還能被救回來——除了總裁自己。隨後說出口的真相，幾乎把先前所有的一切都徹底顛覆。當第一名闘士被診斷出 psychonekrosis 時，總裁曾經受到極大打擊，甚至痛恨自己當初把 feral soul 引進 Arcadion。為了尋找治療方法，他轉而求助於家族代代相傳的秘寶：一顆 Lindwurm 的蛋。那是一種以驚人的再生能力聞名的生物。經過無數實驗之後，他最終抽取出那頭尚未出生的怪物的靈魂，並將其納入自己體內。結果，他雖然因此獲得了異常的再生能力，卻也變成了一頭怪物，而且這股力量根本無法拿來治療別人。更糟的是，他從此被鎖死在那副蛇形怪物的模樣裡，再也無法恢復正常，所以只能把自己永遠封在這座陵寢之中。</p><p>即便如此，他還有辦法透過自己的 regulator（可保存與調用靈魂、用於重傷或死亡時復生的裝置）操控 Arcadion 的各種機械，並以遠端方式繼續運作整個系統。也正是在那時，他把自己的真正意圖告訴了 Metem——總有一天，他會把自己作為代價犧牲掉，讓治療藥從自己的心臟中被製造出來。可問題是，Lindwurm 的力量太過強大，就連 The Tyrant 都不是對手，因此 Arcadion 才會在這段時間裡持續運作下去，直到有人足夠強大，能真正擊敗他為止。那些罹患 psychonekrosis 的闘士，其實並沒有被放棄。他們被迫引退，之後被放進深度沉睡之中——一種寒冷的靜止狀態，只為了在找到治療方法之前，暫時壓住病情。Eutrope 會被綁走，也正是因為這個理由。總裁當然也為讓更多靈魂遭到病症侵蝕而感到悲嘆，可在找不到其他解法的情況下，他只能硬著頭皮把整個計畫推下去。Yaana 聽到這裡，幾乎是怒吼著問，如果這些都是真的，那為什麼從頭到尾都不肯告訴你們。Metem 則只能苦笑著回答，因為總裁終究是個徹頭徹尾的 showman。他把自己的悔恨、贖罪的渴望，甚至連自己的生命都一起編進了這場戲裡；他要用這種方式去逼出更殘酷的競爭，讓更強的闘士誕生，好讓其中某個人最終能夠站起來挑戰自己。正因如此，病症的真相才會一直被隱瞞。直到你出現之後，總裁才真正確信，你就是那個能夠打倒他的人。他只需要繼續推動你，把你塑造成要顛覆 Arcadion 的反叛者，再把自己放上史上最偉大反派的位置。那個男人，甚至連這種事都非得演成一場大戲不可。荒謬到極點，卻又讓人不知道該不該佩服。</p><p>可就算真相終於說出口，事情也還沒有結束。總裁很快便開始恢復。Metem 驚呼一聲，說糟了；Retsarra 和其他人立刻衝上前，想一起幫忙，卻被 Metem 阻止，說那樣沒有用。下一刻，Brute Bomber 大聲要所有人都聽著，說問題可以等之後再問，但現在最重要的是，把你們所有人的乙太全都灌給你。Yaana 也跟著大喊，說現在一定要把他徹底了結。就在這時，The Tyrant 卻忽然開口了。他說，你打得很好，接下來的事就交給他們吧。原來總裁早就把真相告訴了他們，而他們也一直都是照著總裁的指示行動。The Tyrant 的責任，就是成為挑戰者最後的試煉……也是為了不讓挑戰者的雙手沾上無法抹去的污穢。緊接著，總裁心裡最後的聲音也隨之傳來——那是一場足以稱為一生一次的戰鬥，而即使沒有 feral souls，Arcadion 的未來依然會很明亮。隨後，一切終於落幕。更令人震驚的是，Hector 竟然還活著。</p><p>Brute Bomber 也說，自己原本和你們想的一樣，以為 Hector 在變成那副怪物之後早就死了；直到他醒來，重新變回自己，才知道真相。原來在那場戰鬥裡，總裁故意給了他強度較低的靈魂，之後又派人把他恢復回來。這段時間裡，他一直都在 Arcadion 的醫務室休養，只是當他看見那場轉播後，就再也待不住，硬是趕了過來。另一方面，Yaana 也因為先前太過勉強自己，終於撐不住，苦笑著說自己居然把這個「小小的病」都忘了。Metem 一聽，立刻回神，說現在得馬上把所有人送去醫務室，並立刻開始製作治療藥。他還親口保證，接下來的一切都交給他處理——每一個靈魂，他都一定會救回來。</p><p>而這一次，他沒有食言。經過一段時間後，治療終於證明是有效的。所有罹患 psychonekrosis 的人，全都徹底痊癒了。Yaana 說，她的症狀已經完全消失，自己終於重新找回原本的身體；而這一切除了治療藥，也同樣多虧了你。Eutrope 也說，Yaana 已經把一切都告訴她了，而再多的語言都不足以表達她心中的感激，只能請你收下她最真誠的謝意。Brute Bomber 則難得彆扭地低聲說了句「我也是」，承認自己欠了你一份大人情。Retsarra 補充道，那些 heavyweight 的闘士，以及先前一直被放在靜止狀態中的人，在回去前也都向你表達了深深的感謝，而他自己當然也不例外。至於 Metem，則在這時終於對所有人低頭道歉，說無論理由如何，自己確實還是欺騙了你們。無論你選擇原諒、斥責，還是半開玩笑地懷疑他才是真正的幕後黑手，他都只能坦白承認，自己確實在幕後努力確保一切都按劇本發展。說到底，最後所有事情，都如同總裁所希望的那樣完成了。</p><p>如果那個人如今還能在哪裡看著，大概也一定會覺得無比欣慰吧。Brute Bomber 低聲說，總裁犧牲了自己，救了他們所有人，而那份恩情，自己恐怕永遠也還不清。Metem 接著轉告總裁最後的願望：即使在知道了這一切之後，若仍有人真心喜愛 Arcadion，希望他們能繼續戰鬥，繼續帶給觀眾熱血與興奮。Retsarra 苦笑著說，那個人果然從頭到尾都把大家看得很透，簡直像直到最後，你們都還在他的掌心裡跳舞一樣。Metem 則又補上一件事：他已經依照你的意願，把靈魂儲藏庫裡的靈魂全部釋放出去了。從今以後，Arcadion 再也不會使用 feral souls。往後的比賽，都只會由未經強化的戰士彼此對決。這也意味著，你所帶來的變革確實成功了。只不過，眼下暫時還沒有誰能真正成為你的對手，所以在大家都成長到足以和你一戰之前，恐怕不會再有適合你的比賽了。Yaana 則說，她相信不只是自己，大家一定都很想以未經強化的姿態和你一戰；她也絕不會停止訓練，直到自己做好準備。最後，Metem 宣布，新任 grand champion（Arcadion 全分級之上的最終冠軍頭銜）的加冕儀式即將開始，而那場儀式當然不可能少了你。</p><p>當你再次來到 Greenroom 時，Yaana 說，儀式將會在你們曾經戰鬥過的同一座擂台上舉行。明明離那時並沒有很久，卻又好像已經隔了漫長歲月。她提醒你，整個 Alexandria 都會看著你，記得換上適合出席這場場合的衣服。於是，你站上 Ring Noir，在萬眾注視之下，聽著 Metem 高聲向所有人宣布——Arcadion 有了新的 grand champion（Arcadion 全分級之上的最終冠軍頭銜）。你被稱作那個闖過一切障礙、親手掀起革命、也是未經強化卻始終不敗的 Arcadion 之王。可就在這場加冕儀式正要走向最高潮時，Brute Bomber 又一次大喊著衝了出來，說這場儀式根本是鬧劇，自己絕不接受你成為 grand champion，還要你和他來一場不靠強化的一對一重賽。可就在那時，另一道聲音突然攔住了他——Black Cat 毫不猶豫地跳進了擂台，說要看他被你再次隨手丟開，一點也不好玩，不如由她來做這場比賽的對手。Metem 看得兩眼發亮，立刻大聲宣布，既然總裁已不在，那麼現在就由他來批准這場臨時加開的表演賽，並讓這一戰成為 Arcadion 新生的第一場碰撞。之後，Yaana 帶著得意的笑容回來，說自己贏了 Brute Bomber。</p><p>她也坦白承認，那整場鬧劇原本就是為了讓 Arcadion 的新時代能有一個足夠熱鬧的開場。Retired fighters 也已經陸續回來，大家都迫不及待想嘗試未經強化的戰鬥。而你大概也早就已經注意到了，如今每個人都決定把自己的 regulator 拆掉，因為從今以後，他們再也不需要依靠任何靈魂——不管是 feral souls，還是其他形式。至於你，因為已經沒有任何真正能與你匹敵的對手，於是被賦予了「永遠的 grand champion（Arcadion 全分級之上的最終冠軍頭銜）」這個名號，並正式被刻進 Hall of Fame。換句話說，你早就已經是一段傳奇了。只是，雖然你往後未必還能繼續站上擂台戰鬥，大家還是希望能時常見到你，不管是去她的訓練館，還是到 Greenroom 走走都好。最後，Yaana 望著你，半是感慨半是認真地說，也許從一開始，你們所有人就都在配合總裁的劇本演出。可也正因為你始終是那個劇本裡的主角，這個故事才終於能迎來這樣的結局。對她來說，你就是那位未經強化的 grand champion（Arcadion 全分級之上的最終冠軍頭銜），也是讓一切走向圓滿的人。所以，她想再一次好好向你道謝——因為如果沒有你，這一切根本不可能做到。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Yaana <small class="muted">(控室, X:6.1, Y:5.9)</small></div></div>`,

};

const langToggle = document.getElementById('langToggle');
const pageTitle = document.getElementById('pageTitle');
const tabBtns = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story: document.getElementById('panel-story'),
  acq: document.getElementById('panel-acq'),
  unlockq: document.getElementById('panel-unlockq'),
  followq: document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected') === 'true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
