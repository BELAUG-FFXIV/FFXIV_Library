  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}

    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;

    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;

<script>

const i18n = {

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>This video showcases all 21 Phantom Weapons of the Penumbrae series (Item Level 745) introduced in Patch 7.25. Acquired through the questline starting in Phantom Village at Lydirceil (X:6.6, Y:7.1), players must first complete <b>Arcane Artistry</b>—forging the first weapon with 21 demiatma—then trade 3 Arcanite through <b>Forging the Phantasmal</b> with Dodokkuli. After the initial weapon, all additional weapons are available for purchase using the same Arcanite.</p><div class="toc"><p><b>▶ All 21 Phantom Weapons (Penumbrae, IL 745) fully showcased</b></p><p>00:00 – Phantom Sword Penumbrae &amp; Phantom Kite Shield Penumbrae</p><p>03:05 – Phantom Bardiche Penumbrae</p><p>04:08 – Phantom Guillotine Penumbrae</p><p>05:11 – Phantom Bayonet Penumbrae</p><p>06:14 – Phantom Crook Penumbrae</p><p>07:17 – Phantom Codex Penumbrae</p><p>08:20 – Phantom Star Globe Penumbrae</p><p>09:23 – Phantom Pendulums Penumbrae</p><p>10:25 – Phantom Knuckles Penumbrae</p><p>11:28 – Phantom Spear Penumbrae</p><p>12:30 – Phantom Cleavers Penumbrae</p><p>13:34 – Phantom Blade Penumbrae</p><p>14:36 – Phantom War Scythe Penumbrae</p><p>15:41 – Phantom Twinfangs Penumbrae</p><p>16:43 – Phantom Harp Bow Penumbrae</p><p>17:46 – Phantom Arquebus Penumbrae</p><p>18:48 – Phantom Terpna Penumbrae</p><p>19:03 – Phantom Staff Penumbrae</p><p>20:06 – Phantom Index Penumbrae</p><p>21:08 – Phantom Rapier Penumbrae</p><p>22:09 – Phantom Flat Brush Penumbrae</p></div></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Lydirceil <small class="muted">(Phantom Village, X:6.6, Y:7.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="arcane-artistry.html">Arcane Artistry</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 100</div></div>`,
    followq:`<div class="stack"><div class="row">None</div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'ファントムウェポン【ペナンブラ】全21種（IL745）',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>この動画では、Patch 7.25で実装されたペナンブラシリーズのファントムウェポン全21種（アイテムレベル745）を紹介します。入手は蜃気楼の町のリディルセイル（X:6.6 Y:7.1）から始まるクエストラインで、まずは<b>「蜃気楼に包まれし武具」</b>を進め、デミアートマ21個で最初の1本を製作します。続いて、ドドックリとの<b>「ファントムウェポンの創造」</b>で三日月鉱石3個を渡して完成させます。最初の1本を入手した後は、以後の武器も同じ三日月鉱石を使って入手できます。</p><div class="toc"><p><b>▶ ペナンブラ系ファントムウェポン全21種（IL745）一覧</b></p><p>00:00 – ファントムソード【ペナンブラ】＆ファントムカイトシールド【ペナンブラ】</p><p>03:05 – ファントムバルディッシュ【ペナンブラ】</p><p>04:08 – ファントムギロティン【ペナンブラ】</p><p>05:11 – ファントムバヨネット【ペナンブラ】</p><p>06:14 – ファントムクルック【ペナンブラ】</p><p>07:17 – ファントムコーデックス【ペナンブラ】</p><p>08:20 – ファントムスターグローブ【ペナンブラ】</p><p>09:23 – ファントムペンデュラム【ペナンブラ】</p><p>10:25 – ファントムナックル【ペナンブラ】</p><p>11:28 – ファントムスピア【ペナンブラ】</p><p>12:30 – ファントムクリーバー【ペナンブラ】</p><p>13:34 – ファントムブレード【ペナンブラ】</p><p>14:36 – ファントムウォーサイズ【ペナンブラ】</p><p>15:41 – ファントムツインファング【ペナンブラ】</p><p>16:43 – ファントムハープボウ【ペナンブラ】</p><p>17:46 – ファントムアークバス【ペナンブラ】</p><p>18:48 – ファントムテルプナ【ペナンブラ】</p><p>19:03 – ファントムスタッフ【ペナンブラ】</p><p>20:06 – ファントムインデックス【ペナンブラ】</p><p>21:08 – ファントムレイピア【ペナンブラ】</p><p>22:09 – ファントムフラットブラシ【ペナンブラ】</p></div></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> リディルセイル <small class="muted">(蜃気楼の町, X:6.6, Y:7.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="arcane-artistry.html">蜃気楼に包まれし武具</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div></div>`,
    followq:`<div class="stack"><div class="row">なし</div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'Penumbrae 系列 Phantom Weapons 全 21 把（IL 745）',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>這支影片展示的是 Patch 7.25 實裝的 Penumbrae 系列 Phantom Weapons 全 21 把（Item Level 745）。這套武器可透過從 Phantom Village 的 Lydirceil（X:6.6, Y:7.1）開始的任務線取得。首先必須完成 <b>Arcane Artistry</b>，使用 21 個 demiatma 製作出第一把武器；接著再透過 Dodokkuli 的 <b>Forging the Phantasmal</b> 交付 3 個 Arcanite 完成製作。取得第一把之後，其餘武器也可使用相同的 Arcanite 進行購買。</p><div class="toc"><p><b>▶ 完整展示 Penumbrae 系列 Phantom Weapons 全 21 把（IL 745）</b></p><p>00:00 – Phantom Sword Penumbrae &amp; Phantom Kite Shield Penumbrae</p><p>03:05 – Phantom Bardiche Penumbrae</p><p>04:08 – Phantom Guillotine Penumbrae</p><p>05:11 – Phantom Bayonet Penumbrae</p><p>06:14 – Phantom Crook Penumbrae</p><p>07:17 – Phantom Codex Penumbrae</p><p>08:20 – Phantom Star Globe Penumbrae</p><p>09:23 – Phantom Pendulums Penumbrae</p><p>10:25 – Phantom Knuckles Penumbrae</p><p>11:28 – Phantom Spear Penumbrae</p><p>12:30 – Phantom Cleavers Penumbrae</p><p>13:34 – Phantom Blade Penumbrae</p><p>14:36 – Phantom War Scythe Penumbrae</p><p>15:41 – Phantom Twinfangs Penumbrae</p><p>16:43 – Phantom Harp Bow Penumbrae</p><p>17:46 – Phantom Arquebus Penumbrae</p><p>18:48 – Phantom Terpna Penumbrae</p><p>19:03 – Phantom Staff Penumbrae</p><p>20:06 – Phantom Index Penumbrae</p><p>21:08 – Phantom Rapier Penumbrae</p><p>22:09 – Phantom Flat Brush Penumbrae</p></div></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Lydirceil <small class="muted">(幻影村, X:6.6, Y:7.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="arcane-artistry.html">被蜃景包圍的奧術武具</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.100</div></div>`,
    followq:`<div class="stack"><div class="row">無</div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
