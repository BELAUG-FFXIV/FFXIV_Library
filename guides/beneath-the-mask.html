    story:`<div class="clamp" data-collapsed="true">
<p>Hildibrand turns to you with sudden urgency and insists you must find Ellie at once—certain that if you confront her as her constant companion, you can still talk her out of whatever reckless plan she has chosen. Before he can move, Phillice stops him and reveals the truth behind the phantom thief’s final target: the last seat in the committee the killer has been hunting belongs to her. She explains how an anonymous letter drew her into the role, how she was kept ignorant of the other members’ identities, and how horrifying it is to realize her unseen compatriots were the victims all along. Refusing to endanger anyone else, she resolves to sequester herself until the killer is caught.</p>
<p>Hildibrand rejects her self-sacrifice outright. He declares there is no need for such caution—he will protect a lady in distress, and as a gentleman he will do precisely that. He calls for Nashu, and she comes bounding back, breathless with apologies: Ellie thought she saw someone in the shadows, so Nashu chased after it, only to find nothing but a squeaking dormouse that led her on in circles. Hildibrand cuts her off mid-explanation; his inspector’s sense warns him someone is watching. He tells you to split up and canvas the area.</p>
<p>As you search, you find water-stained letters set out as if meant to be discovered—warnings to be wary, commands to trust no one, and sharper words urging suspicion even of friends. Then another note promises something that will “avail you well” and tells you to use it wisely, and with it you recover a single sachet of demasking dust—your only sure defense against the thief’s disguises. In the next instant you feel an intimidating presence at your back, and Godbert steps from the shadows with a booming laugh, saying he followed the same suspicious presence here. He studies the letters, warns that this could be a friend’s caution or a fiend’s trap, and offers his help—adding, with absolute confidence, that no mask could ever mimic the Manderville physique.</p>
<p>With only one sachet to rely on, you do as Godbert suggests and speak with each person, listening for anything out of place. Briardien remains caught in his own reasoning, insisting the answers are close while admitting something still doesn’t add up. Nashu frets over Ellie’s disappearance, and Phillice battles her dread, terrified of sharing the gruesome fate whispered in the city’s rumors. Godbert weighs your impressions and observes that if nothing seems overtly odd, it only proves the villain would not risk such a game without being utterly confident in the ruse.</p>
<p>Hildibrand returns from questioning the Sultansworn and finds no trace of Ellie. Briardien abruptly orders everyone to stand still—certain the fiend is already among you—and argues that anyone who has been alone, even for a moment, must be treated as a suspect. Phillice confirms there are no more sachets to spare; the rest were distributed to the search party, which will not report back for some time. Hildibrand insists you have no time to wait. He reasons that the thief favors familiar faces, dismisses Godbert as an unlikely choice, and narrows his focus to the remaining possibilities—then declares he will begin by questioning Nashu, because no one knows her better than he does.</p>
<p>He tests her with the ridiculous Manderville refrain, and Nashu answers without hesitation, finishing his lines exactly as he expects. Hildibrand proclaims her genuine beyond all doubt, and for a moment relief almost breaks through the tension. But when he remarks—far too casually—on “a few more wrinkles beneath the eyes,” Nashu snaps, catches herself mid-insult, and forces the words back into polite shape. Even as the group steadies, Briardien’s grim certainty remains: the logic still doesn’t satisfy, and the missing truth still refuses to show itself.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>ヒルディブランドはあなたへ切迫した声を向け、エリーを一刻も早く見つけねばならないと告げる。いつもの仲間であるあなたが面と向かえば、あの無謀な企てを思いとどまらせられるはずだというのだ。そこへフィリスが歩み出て、事件の核心を打ち明ける。多面の怪盗が狙う最後の標的――その委員会の「最後のひとり」は、ほかならぬ自分だと。匿名の手紙で役目を与えられ、使命として歴史の偽りを正すよう命じられたこと、仲間の名も素性も知らされぬまま務めてきたこと、そして知らぬ同胞が次々と命を奪われていたという恐怖を語る。これ以上、誰も危険に巻き込めないと、犯人が捕まるまで身を隠す決意を固める。</p>
<p>だがヒルディブランドは、その自己犠牲をきっぱりと退ける。熟練の事件屋として、そして紳士として、窮地の淑女を守り抜くと宣言し、あなたとともに彼女の傍らに立つと誓う。行方の知れぬ相棒を探してナシュを呼ぶと、彼女は勢いよく駆け寄ってくる。エリーが「影に誰かがいる」と言ったので見に行ったが、そこにいたのは鳴きながら逃げ回るヤマネだけで、つい追いかけてしまったのだと早口で釈明する。ヒルディブランドは言葉を遮り、事件屋の勘が告げていると低く言う――誰かがこちらを見ている。あなたに周囲の聞き込みと捜索を指示し、手分けして探ることになる。</p>
<p>探索のさなか、床には水に滲んだ手紙が、まるで見つけられることを待つかのように置かれている。用心せよ、警告を忘れるな。誰も信用するな。友ですら疑え――そんな不穏な文言が重ねられていく。さらに別の手紙には、「これは役に立つ。賢く使え」とだけ残され、あなたは「変装解除の粉」をひとつ手に入れる。たった一包しかない切り札を確かめたその瞬間、背後から圧のある気配が迫る。振り向けば、ゴッドベルトが朗らかな笑い声とともに現れ、影の不審な気配を追ってここへ来たのだと言う。手紙を吟味し、味方の忠告か、あるいは罠かと警戒を促しつつ、助力を申し出る。そして「この肉体だけは、どんな仮面でも真似できぬ」と豪語してみせる。</p>
<p>あなたはゴッドベルトの提案どおり、一包しかない粉を無駄にできないからこそ、ひとりずつ言葉を交わして違和感を探る。ブリアルディアンは推理の糸を手繰り寄せながらも、なお「別の真実」が隠れていると苦い表情を見せる。ナシュはエリーの行方を案じて落ち着かず、フィリスは噂される惨禍に怯え、同じ末路を迎えることへの恐怖を隠せない。あなたの報告を受けたゴッドベルトは、目立つ異常がないのは当然だと言う。敵がこの場に踏み込む以上、完璧な偽装に絶対の自信があるのだろう、と。</p>
<p>やがてヒルディブランドが戻り、サルタン親衛隊に尋ねてもエリーの目撃情報は皆無だと告げる。ブリアルディアンは皆に動くなと命じ、「敵はすでにこの中にいる」と断じる。ほんのわずかな単独行動でも疑いは免れない、相手は次々と姿を変えてきたのだから、と。フィリスは残りの粉が捜索隊へ配られており、報告を待たねばならないと説明する。だがヒルディブランドは待てないと言い切り、敵は馴染みある人物を選びやすいと推理して、ゴッドベルトを可能性から外す。そして残る者へ視線を走らせ、まずはナシュを問い質すと宣言する――彼女を最もよく知るのは自分だと断言して。</p>
<p>ヒルディブランドは例の掛け合いで試すように歌い出し、ナシュは一拍の迷いもなく言葉を継いで応える。ヒルディブランドは満点だと胸を張り、彼女が本物であることは疑いようがないと断じる。張り詰めた空気がわずかにほどけかけた、そのときだった。彼が何気なく「目の下に少し皺が増えただけで」と口にした途端、ナシュは反射的に噛みつきかけ、寸前で飲み込み、慌てて言い繕う。安堵の兆しが見えたはずなのに、ブリアルディアンの表情は晴れない。理屈は揃い切らず、なお見落としがある――その確信だけが、重く残る。</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>Hildibrand 轉向你，語氣忽然變得緊迫，堅持必須立刻找到 Ellie。他認定只要你這個「一直陪在她身邊的人」當面攔下來，她就還有可能被說服，放棄那個愚蠢又危險的計畫。就在他要動身時，Phillice 先一步開口，說出讓人背脊發冷的真相：那個多面怪盜最後鎖定的「第五個、也是最後一個目標」，其實就是她自己。她解釋自己是如何收到匿名信件，被推進某個以「捍衛歷史正統」為名的職務；她從未被告知其他成員的身分，直到現在才意識到――那些不曾謀面的同伴，原來一直都是受害者。她不願再把任何人拖進去，決定暫時把自己隔離起來，直到兇手落網。</p>
<p>Hildibrand 當場否決她的自我犧牲。他宣稱沒有必要如此畏縮：身為久經世故的調查官，他有能力保護身陷危險的淑女；身為紳士，他也必定會這麼做。他轉而找尋 Nashu，正好她一路衝回來，急著解釋自己為何不見人影――Ellie 說她看見陰影裡有人，Nashu 就跑去查看，結果只追著一隻吱吱叫又一直躲開的睡鼠繞來繞去。Hildibrand 忽然收斂笑意，說他的直覺正在警告：有人在監視。他要你分頭搜索周圍，仔細把每個角落都查一遍。</p>
<p>你在搜查途中，發現地上刻意放著一封封被水浸過的信，像是特地要讓你撿到。字句一再提醒你要小心、要警惕，甚至命令你「誰都別信」，還惡意地把矛頭指向「朋友」。接著又有一封信寫著這樣的意思：這東西會派上用場，務必謹慎使用――你也因此得到僅有的一小袋「揭下面具的粉末」。你才剛握緊這唯一的保命手段，背後就傳來壓迫感十足的存在感。你回頭，看見 Godbert 大笑著現身，說自己也是追著那股可疑的暗影氣息而來。他端詳那些信件，提醒你這可能是同伴的警告，也可能是惡徒的陷阱，並主動提出要協助調查――還不忘自信地補一句：再高明的偽裝，也不可能複製 Manderville 那種誇張的體格。</p>
<p>在只有一小袋粉末可用的情況下，你照 Godbert 的建議，逐一與在場的人交談，試著找出任何不對勁。Briardien 一邊推敲，一邊仍咬定有什麼關鍵真相被遮住了，怎麼想都不完整。Nashu 不斷擔心 Ellie 失蹤是不是另有危險；Phillice 則被恐懼拉扯，害怕自己會成為下一個受害者，甚至被變成她最不願面對的「殭屍」。你把觀察告訴 Godbert，他沉聲表示：如果誰都看不出破綻，反而更像是兇手有十足把握才敢冒險混在你們之中。</p>
<p>不久後，Hildibrand 從外頭回來，說他已向 Sultansworn 詢問過，卻完全沒有 Ellie 的下落。Briardien 立刻下令所有人站定別動，判斷惡徒就在你們之間――只要曾經短暫單獨行動過的人，都不能排除嫌疑，因為對方已多次證明自己能迅速更換身分。Phillice 無奈表示，剩下的粉末都已分給搜查隊，還得等他們回報。可 Hildibrand 不願等待，他推斷兇手偏好冒充熟悉的人，又以 Ellie 與 Godbert 交集不深為由，把 Godbert 排除在外，接著把焦點收回到剩下的人身上，宣稱要先盤問 Nashu――因為最懂她的人就是他。</p>
<p>Hildibrand 用那套荒唐又熟悉的 Manderville 口號當作測試，刻意一句一句引導，Nashu 也毫不遲疑地把每一句接得分毫不差。Hildibrand 得意地宣布：這無可置疑就是真正的 Nashu。緊繃的氣氛似乎稍微鬆動，卻又立刻被新的火花點燃――他隨口提到 Nashu 「眼下多了幾道皺紋」，Nashu 立刻炸毛反擊，話到一半才硬生生吞回去，勉強改成客氣的稱呼。即使眼前看似有所進展，Briardien 的神情仍沒有放鬆：他仍堅持哪裡不對，你們還漏掉了某個更深、更致命的真相。</p>
</div>

  langToggle.textContent = `🌐 ${t.langLabel}`;

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
