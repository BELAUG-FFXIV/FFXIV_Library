    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>At the Royal Plantations in central Thanalan, Cicidoa calls you over with a hopeful look and asks if you’re an adventurer. When you confirm it, he explains that he owes a debt of gratitude to the owner of the Coffer & Coffin and has finally resolved to repay it. To that end, he has purchased a prodigiously plump pumpkin from the Royal Plantations—a particularly popular piece of produce that any gourmand would envy. Unfortunately, he cannot leave his post to deliver it himself. A shipment from the Nanawa Mines that he is responsible for receiving is late, and he must remain here until it arrives. He therefore asks if you would be willing to go in his stead: all you need do is present his receipt of purchase to Gagari at the Royal Plantations, collect the pumpkin, and then carry it safely to the Coffer & Coffin. He apologizes for imposing such a time-consuming task on you, but you agree to help, and his face brightens with genuine relief and appreciation as he entrusts the receipt to you.</p>
      <p>You turn to Gagari with the receipt in hand, finding her fretting over the fate of the pumpkin. If Cicidoa doesn’t come soon, she laments, this spectacular specimen will be past its prime. When you explain that you’ve come to deliver the decadent delight in his stead, she brightens at once and praises the gift, saying that any lover of good food would be delighted to receive such a grand offering. She passes the pumpkin over to you and expresses the hope that it will meet with Roger’s approval. Fresh produce is scarce in these dry lands, she explains, and the Royal Plantations are constantly deluged with demand. With your cargo secured, she confirms that you know the way: the Coffer & Coffin lies to the northwest, beyond the bridge in Black Brush—just look for the place where local laborers lounge between jobs. Following her directions, you set out across the dusty terrain, cross the bridge, and soon find the busy roadside inn, its rough-hewn tables crowded with workers and weary travelers.</p>
      <p>Inside the Coffer & Coffin, the barkeep Roger greets you with the easy authority of a man used to serving drink to half the region. He offers you ale or spirits, insisting that you won’t get better for your coin anywhere else, but when you present the pumpkin and mention Cicidoa’s name, he bursts into a short, surprised laugh. So even that foul-mouthed drunk remembers the meaning of remorse, he says, guessing that this must be Cicidoa’s way of making amends for the night Roger had to haul his drink-sodden carcass back home. Then he truly sees what you’ve brought and his tone changes to genuine delight: an honest-to-gods pumpkin from the Royal Plantations is no ordinary gift, and he can’t wait to see what the cooks will do with it. The lads who drink and dine here, he explains, devour beastly amounts of meat, and it’s starting to show in their health. If he can convince those stubborn regulars to try something new, getting more vegetables into their bellies will do them a world of good. With a broad, approving grin, he thanks you for your help on Cicidoa’s behalf, and the weight of that small, practical kindness settles comfortably into the long, dusty rhythm of life in central Thanalan.</p>
    </div>

    story:`<div class="clamp" data-collapsed="true">
      <p>中央ザナラーンの「王家の菜園」で働くシシドアは、あなたの姿を見るなり、どこか期待を込めた眼差しで声をかける。あなたが冒険者であると知ると、彼は、宿屋「コファー＆コフィン」の店主に対して、どうしても返したい恩があるのだと打ち明ける。そのために、ここ「王家の菜園」で特別に買い求めたのが、見事な大きさに育った特上のパンプキン。食通なら誰もが目を輝かせるような逸品だ。しかし、肝心のシシドア自身は、今この場を離れることができない。担当しているナナワ銀山からの定期便が遅れており、その到着を待たねばならないからだという。そこで彼は、代わりにあなたに頼めないかと頭を下げる。購入証をガガリに渡してパンプキンを受け取り、それを無事に「コファー＆コフィン」まで届けてほしい──ただそれだけのことだが、人の忙しさは承知のうえで、時間のかかる用事を押しつけてしまうことを申し訳なく思っていると、シシドアは何度も謝意と感謝の言葉を口にする。あなたが依頼を引き受けると、彼の表情には安堵と喜びが浮かび、丁寧に領収書を手渡してくれる。</p>
      <p>あなたはその足で、同じ「王家の菜園」にいるガガリのもとへ向かい、シシドアから預かった購入証を差し出す。ガガリは、シシドアがなかなか姿を見せないため、この見事なパンプキンもそろそろ食べ頃を過ぎてしまうのではないかと心配していたところだったらしい。事情を説明すると、彼女はすぐに顔をほころばせ、こんな贅沢なご馳走を届けてもらえるなら、腕に覚えのある食いしん坊なら誰だって喜ぶに違いないと、朗らかに笑う。こうしてあなたは、ずっしりとした重みのあるパンプキンを託される。どうかロジャーに気に入ってもらえますように──そう願いながら、ガガリは言葉を添える。この辺りでは新鮮な野菜は貴重であり、「王家の菜園」には常に注文が殺到しているのだと教えつつ、彼女は改めて行き先を確認する。「コファー＆コフィン」は、北西にある橋を渡った先にある宿屋で、近くには休憩中の労働者たちがいつもたむろしている場所だと教えられ、あなたはパンプキンを大事に抱えながら、乾いた大地を北西へと歩き出す。やがて橋を越え、ブラックブラッシュの一角に建つ「コファー＆コフィン」が見えてくる。そこは、行き交う労働者や旅人たちが腰を下ろし、酒と食事で喉と腹を満たす、賑やかな街道沿いの宿屋だ。</p>
      <p>店内に入ると、店主のロジャーが、いかにも酒場の親父らしい気さくな口調であなたを迎え、ここより旨い酒はそうそうないぞと、自慢げにグラスを掲げる。だが、あなたがシシドアの名とパンプキンの包みを差し出すと、彼は驚いたように目を見開き、すぐに小さな笑い声を漏らす。あの悪態ばかりついて酔いつぶれるシシドアでさえ、恩返しという言葉を忘れていなかったとはな、と。以前、自分が酒に溺れた彼の身体を担いで家まで送り届けたことへの礼なのだろうと、ロジャーは苦笑混じりに昔話を明かす。やがて彼は、あなたが持ってきたものが「王家の菜園」からの本物のパンプキンだと理解し、その表情には純粋な喜びが浮かぶ。本物の王家産パンプキンともなれば、厨房の料理人たちがどんな料理に仕立ててくれるのか、考えるだけで胸が高鳴るのだと。ここに集う連中は、とにかく肉ばかりを山のように平らげてばかりで、その食生活は目に見えて身体に堪えてきている。もしこのパンプキンをきっかけに、頑固な常連たちにも野菜料理を試させることができれば、その健康にもきっと良い影響があるはずだ。そんなふうに先のことを思い描きながら、ロジャーはあなたに向き直り、シシドアに代わって礼を述べる。中央ザナラーンの乾いた日常の中に、ささやかながら確かな温もりを残す一件の恩返しは、こうして静かに幕を閉じるのだった。</p>

    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Central Thanalan 的 Royal Plantations 裡，Cicidoa 帶著一點期待的神情朝你招手，確認你是冒險者之後，便開始說明他心裡掛念已久的一件事。他欠 Coffer & Coffin 的老闆一份人情，拖了很久，終於下定決心要好好回報。為此，他特地從 Royal Plantations 購入了一顆特別肥美、圓潤的南瓜，是在這一帶都相當搶手的高級蔬菜，任何講究飲食的人看到都會垂涎三尺。可惜現實的情況是，他自己根本走不開：原本該從 Nanawa Mines 抵達的定期貨運拖延未至，他必須留下來等候，無法親自把這份心意送去。於是，他有些不好意思地請求你代為跑一趟──只要拿著他的收據去找 Royal Plantations 的 Gagari，就能領到那顆南瓜，接著再把它平安送到 Coffer & Coffin 就行。Cicidoa 清楚這對你來說會佔用不少時間，因此一再向你道歉，同時也真誠地表示非常感激。你答應下來後，他的神情明顯鬆了一口氣，把收據小心地交給你，就像把一件重要的心事託付給你一樣。</p>
      <p>你拿著收據前往 Gagari 身邊時，正好聽見她在感嘆，如果 Cicidoa 再不出現，這顆外觀完美的南瓜恐怕就要錯過最佳品嘗時機了。聽你說明自己是代為送禮的人，她立刻露出開朗的笑容，說這樣的美味逸品，不管送給哪位講究吃喝的客人，都會被視為相當豪華的禮物。她把沉甸甸的南瓜交到你手中，誠心希望 Roger 能喜歡這份來自 Royal Plantations 的贈禮。她順口提起，這一帶的氣候使得新鮮蔬菜相當稀少，因此 Royal Plantations 幾乎每天都被訂單淹沒。臨行前，Gagari 再度提醒你方向：Coffer & Coffin 在西北方，過了橋就是 Black Brush 的路邊驛站，附近總可以看到當地勞工躺在那裡歇腳。你將南瓜安穩抱好，沿著乾燥的土路往北西走去，越過橋樑之後，一棟熱鬧的路邊旅店便映入眼簾，那就是旅人與工人們最熟悉的 Coffer & Coffin。</p>
      <p>走進 Coffer & Coffin，老闆 Roger 用豪爽的語氣向你打招呼，問你要不要來一杯，保證在這一帶找不到比他家更划算的酒與烈酒。當你表明自己是受 Cicidoa 所託，將這顆南瓜帶來的人時，他先是愣了一下，接著忍不住笑出聲來，說連那個滿口髒話、只會醉得一塌糊塗的傢伙，也還懂得什麼叫做「知恩圖報」。他推測這應該是為了那次自己把喝得酩酊大醉、全身酒味的 Cicidoa 扛回家的事情而表達的歉意。待他看清你帶來的是一顆貨真價實、出自 Royal Plantations 的南瓜時，語氣裡又多了幾分真心的興奮。這樣的食材落到廚師手裡，他已經等不及想看看會變成什麼樣的料理了。Roger 說，這裡的常客一向是大口吃肉、大口灌酒，長期下來，身體狀況開始顯露出不太妙的跡象。如果能藉著這顆南瓜讓他們嚐試一些新的菜色，在餐桌上多出幾道蔬菜料理，或許能讓這些固執的傢伙多少顧一下自己的健康。想到這裡，他露出開懷的笑容，再次向你道謝，說多虧你出手相助，Cicidoa 的這份心意才能順利傳達。於是，在 Central Thanalan 單調乾燥的日常裡，這場看似微不足道的跑腿任務，安安靜靜地為幾個勞累的大人添上了一點溫柔與踏實的味道。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
