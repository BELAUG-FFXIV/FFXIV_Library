<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>All’s Well That Starts Well | BELAUG · FFXIV Library</title>
  <meta name="description" content="Blue Mage – All’s Well That Starts Well (SB Patch 4.5)">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .muted{color:var(--muted)}
    .clamp{position:relative;max-height:360px;overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{margin-top:12px}
    .expand-btn{
      display:inline-block;padding:8px 14px;border-radius:10px;
      background:var(--card);border:1px solid var(--border);cursor:pointer;font-weight:600;
    }
    .expand-btn:hover{background:#fffef8}

    .spell-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:10px;
      margin-top:10px;
    }
    .spell-card{
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      min-height:56px;
      overflow:hidden;
    }
    .spell-icon{
      width:28px;
      height:28px;
      object-fit:contain;
      flex-shrink:0;
      display:block;
    }
    .spell-name{
      font-weight:600;
      line-height:1.3;
    }

    .skill-inline{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-weight:700;
      white-space:nowrap;
      vertical-align:middle;
    }

    .skill-inline-icon{
      width:22px;
      height:22px;
      object-fit:contain;
      flex-shrink:0;
      display:inline-block;
      vertical-align:middle;
      border-radius:4px;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left">
        <a class="home" href="../index.html">🏠 Home</a>
      </div>
      <div class="right">
        <button id="langToggle" class="icon-btn" aria-label="切換語言">🌐 EN</button>
      </div>
    </nav>
  </header>

  <main class="container main">
    <div class="grid">
      <section class="card video-card">
        <div class="bd">
          <div class="video-wrap">
            <iframe id="ytFrame" src="https://www.youtube.com/embed/PfFEPtPr3FU"
              title="All’s Well That Starts Well" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="hd" id="pageTitle">All’s Well That Starts Well</div>
        <div class="tabs" role="tablist">
          <button class="tab-btn" role="tab" aria-selected="true"  data-tab="overview">Overview</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="spells">Recommended Spells</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="strategy">Strategy</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="tips">Achievement Tips</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="notes">Notes</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="comments">Comments</button>
        </div>
        <div class="bd">
          <div id="panel-overview" class="tab-panel active"></div>
          <div id="panel-spells" class="tab-panel"></div>
          <div id="panel-strategy" class="tab-panel"></div>
          <div id="panel-tips" class="tab-panel"></div>
          <div id="panel-notes" class="tab-panel"></div>
          <div id="panel-comments" class="tab-panel">
            <div id="giscus_container" style="min-height:320px;"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`All’s Well That Starts Well`,
    tabs:{
      overview:'Overview',
      spells:'Recommended Spells',
      strategy:'Strategy',
      tips:'Achievement Tips',
      notes:'Notes',
      comments:'Comments'
    },
    readMore:'Show more',
    readLess:'Show less',

    overview:`<div class="stack"><div class="row"><p>A Blue Mage-exclusive stage in the Masked Carnivale. This is Stage 1, introduced in Patch 4.5, and features Arena Slime and Arena Dullahan in Act 1. The stage focuses on quick enemy control and immediate cleanup once the targets are in range.</p></div></div>`,

    spells:`<div class="spell-grid">
      <div class="spell-card"><img src="../img/icons/bluemage/033_The_Ram's_Voice.png" alt="The Ram's Voice icon" class="spell-icon"><div class="spell-name">The Ram's Voice</div></div>
      <div class="spell-card"><img src="../img/icons/bluemage/092_Ultravibration.png" alt="Ultravibration icon" class="spell-icon"><div class="spell-name">Ultravibration</div></div>
    </div>`,

    strategy:`<div class="stack"><div class="row"><p>All three enemies can be killed immediately by using <span class="skill-inline"><img src="../img/icons/bluemage/033_The_Ram's_Voice.png" alt="" class="skill-inline-icon">The Ram's Voice</span> and <span class="skill-inline"><img src="../img/icons/bluemage/092_Ultravibration.png" alt="" class="skill-inline-icon">Ultravibration</span> once they are within range.</p></div></div>`,

    tips:`<div class="stack"><div class="row"><p>None</p></div></div>`,

    notes:`<div class="stack"><div class="row"><p>None</p></div></div>`
  },

  JP:{
    langLabel:'JP',
    pageTitle:'デビューマッチ',
    tabs:{
      overview:'概要',
      spells:'推奨招式',
      strategy:'攻略',
      tips:'実績攻略',
      notes:'補足',
      comments:'コメント'
    },
    readMore:'全文を表示',
    readLess:'折りたたむ',

    overview:`<div class="stack"><div class="row"><p>青魔道士専用コンテンツ「マスクカーニバル」のステージです。パッチ4.5で追加されたステージ1で、Act 1 では Arena Slime と Arena Dullahan が登場します。このステージでは、敵が範囲内に入った瞬間にまとめて処理することが重要になります。</p></div></div>`,

    spells:`<div class="spell-grid">
      <div class="spell-card"><img src="../img/icons/bluemage/033_The_Ram's_Voice.png" alt="The Ram's Voice icon" class="spell-icon"><div class="spell-name">氷結の咆哮</div></div>
      <div class="spell-card"><img src="../img/icons/bluemage/092_Ultravibration.png" alt="Ultravibration icon" class="spell-icon"><div class="spell-name">超振動</div></div>
    </div>`,

    strategy:`<div class="stack"><div class="row"><p>3体とも射程内に入ったら、<span class="skill-inline"><img src="../img/icons/bluemage/033_The_Ram's_Voice.png" alt="" class="skill-inline-icon">氷結の咆哮</span> と <span class="skill-inline"><img src="../img/icons/bluemage/092_Ultravibration.png" alt="" class="skill-inline-icon">超振動</span> を使うことで、その場で一気に倒せます。</p></div></div>`,

    tips:`<div class="stack"><div class="row"><p>なし</p></div></div>`,

    notes:`<div class="stack"><div class="row"><p>なし</p></div></div>`
  },

  ZH:{
    langLabel:'ZH',
    pageTitle:'All’s Well That Starts Well',
    tabs:{
      overview:'概要',
      spells:'推薦招式',
      strategy:'攻略流程',
      tips:'成就提示',
      notes:'補充說明',
      comments:'留言'
    },
    readMore:'展開全文',
    readLess:'收合內容',

    overview:`<div class="stack"><div class="row"><p>這是 Blue Mage 專用的 Masked Carnivale 關卡。此關為 Patch 4.5 新增的第 1 關，Act 1 會出現 Arena Slime 與 Arena Dullahan。這一關的重點在於等敵人進入範圍後，快速控場並立刻一次清掉。</p></div></div>`,

    spells:`<div class="spell-grid">
      <div class="spell-card"><img src="../img/icons/bluemage/033_The_Ram's_Voice.png" alt="The Ram's Voice icon" class="spell-icon"><div class="spell-name">冰凍咆哮</div></div>
      <div class="spell-card"><img src="../img/icons/bluemage/092_Ultravibration.png" alt="Ultravibration icon" class="spell-icon"><div class="spell-name">超振動</div></div>
    </div>`,

    strategy:`<div class="stack"><div class="row"><p>三隻敵人只要進入範圍內，就可以立刻用 <span class="skill-inline"><img src="../img/icons/bluemage/033_The_Ram's_Voice.png" alt="" class="skill-inline-icon">冰凍咆哮</span> 接 <span class="skill-inline"><img src="../img/icons/bluemage/092_Ultravibration.png" alt="" class="skill-inline-icon">超振動</span>，直接一次解掉。</p></div></div>`,

    tips:`<div class="stack"><div class="row"><p>無</p></div></div>`,

    notes:`<div class="stack"><div class="row"><p>無</p></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  overview: document.getElementById('panel-overview'),
  spells: document.getElementById('panel-spells'),
  strategy: document.getElementById('panel-strategy'),
  tips: document.getElementById('panel-tips'),
  notes: document.getElementById('panel-notes'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') {
    panels[key].innerHTML = t[key];
    if (['strategy','tips','notes'].includes(key)) wireClamp(panels[key], t);
  }
  if (key === 'comments') loadGiscusForCurrentLang();
}

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};

function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }

function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
