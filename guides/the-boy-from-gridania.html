<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'The Boy from Gridania',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more',
    readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Tataramu greets you with excitement, proud to report that construction of the airship is moving forward and that the Ixal have even agreed to adopt several of his proposals. He thanks you for bringing him into this unlikely opportunity, explaining that the chance to contribute to such a revolutionary project is exactly what he dreamed of while studying aeronautic theory and design.</p>
      <p>That dream, however, has met a practical obstacle. To integrate his improvements properly, Tataramu needs rare materials for a custom engine jointing component. Since those materials are difficult to procure, he asks you to deliver a discreet letter to an acquaintance named Colson. Because Colson is often away on company business, Tataramu directs you to ask Hida at the airship ticket counter in Gridania for his whereabouts, while admitting that he would rather avoid the city himself for the moment.</p>
      <p>At the airship landing, Hida is startled the moment she hears Tataramu’s name. Realizing that you have seen the missing young master, she anxiously asks if he is safe, then sends you directly to Quiver’s Hold. There, Chansteloup explains that the Gods’ Quiver has devoted all its resources to finding Chairman Tatabaru’s missing son, while Colson, chief aide of Highwind Skyways, waits inside for news. When you finally give Colson the letter, he first panics at the thought that Tataramu is in the hands of the Ixal, preparing to organize a rescue party before you calm him and explain that Tataramu is there of his own free will.</p>
      <p>Once he understands the truth, Colson introduces himself properly as the chief technical advisor of Highwind Skyways and aide to Chairman Tatabaru. He reveals that Tataramu is the chairman’s only son and heir to a vast airship empire. The young master had come to Gridania as part of his education in company affairs, only to vanish without warning. With no ransom demand and no clue to his whereabouts, Colson had feared the worst and asked the Gods’ Quiver to search the city.</p>
      <p>Relieved though he is, Colson is also exasperated by Tataramu’s letter, which contains no apology and only a list of materials for his exciting project. Still, he recognizes the technical purpose of the request: the materials are meant for a high-quality engine jointing component. Though tempted to refuse after all the trouble Tataramu has caused, Colson’s curiosity wins out. He gives you a promissory note and asks you to take it to the supervisor of the Fallgourd Float crafting facility, trusting for now that Tataramu is content working with the Ixal.</p>
      <p>At Fallgourd Float, Hildeyerd recognizes the seal of Highwind Skyways on the note and understands at once that only an organization of such means could afford the requested materials. She prepares everything needed for the crafting work, allowing you to use the facility and create the component Tataramu requires. With the work completed, you return to Ehcatl and deliver the finished piece.</p>
      <p>Tataramu is delighted. The component is exactly what he envisioned, and with it the improved engine housing can be integrated into the Dezul Qualan. Carried away by the thought of the completed airship, he imagines the wind on his face, the cries of birds, and the world far below, before catching himself and apologizing for his flights of fancy. Knowing that Colson must have told you the truth, he admits that he is the son of the chairman of Highwind Skyways, destined to inherit the company that links the great cities of Eorzea by air.</p>
      <p>Yet Tataramu has no interest in ledgers, lectures, or the pursuit of profit. He wants to design airships, not manage a fleet; to be valued for the skills he has worked to acquire, not for his station or wealth. Even if others hear only the complaints of a spoiled child, he insists that he would renounce his inheritance in an instant if it meant chasing his true dream: to build an airship that can fly further, faster, and higher than ever before. Sezul affirms his passion, declaring that wealth means nothing to the Ehcatl Nine and that only effort will bring true reward. Together, they look toward the day the Dezul Qualan will launch upon the ocean of clouds and carry them toward the gates of Ayatlan.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Tataramu <small class="muted">(North Shroud, X:24.5, Y:23.5)</small></div>

  JP:{
    langLabel:'日本語',
    pageTitle:'グリダニアから来た少年',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示',
    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>タタラムは、飛空艇の建造が順調に進んでいることを喜びながら、あなたを迎えます。エカトル空力団の仲間たちは、彼が提案したいくつもの改良案まで採用してくれたのだといいます。偶然とはいえ、この機会へと導いてくれたあなたに、タタラムは心から感謝していました。航空技術と設計について数えきれないほどの書物を読みふけってきた彼にとって、革新的な計画に関われることは、まさに夢見ていたことだったのです。</p>
      <p>しかし、その夢の前に小さくない問題が立ちはだかります。彼の改良案をきちんと組み込むには、特注の機関部接合材を作るための希少な材料が必要でした。入手の難しい品であるため、タタラムはある知人の力を借りるしかないと判断します。そして、コルソンという人物に手紙を届けてほしいとあなたに頼みます。コルソンは仕事で各地を動き回っているため、タタラムはまずグリダニアの飛空艇乗り場にいるヒダに居場所を尋ねるよう告げ、自分はしばらく街を避けたいのだと申し訳なさそうに付け加えます。</p>
      <p>飛空艇乗り場でヒダにタタラムの名を出すと、彼女はひどく驚きます。行方知れずだった若様を見たのか、無事なのかと慌てて問いただし、すぐに神勇隊指令砦へ向かうようあなたに促します。そこでシャンステゥルは、神勇隊がタタバル会長の行方不明の息子を捜すため、あらゆる人員を投入していると説明します。さらに、ハイウィンド社の重役であるコルソンも中で知らせを待っているといいます。あなたがようやくコルソンに手紙を渡すと、彼はタタラムがイクサル族のもとにいると聞いて早合点し、救出隊を組もうと取り乱しますが、あなたはタタラムが自分の意思でそこにいるのだと説明して、彼を落ち着かせます。</p>
      <p>事情を理解したコルソンは、あらためて自分がハイウィンド社の主任技術顧問であり、タタバル会長の補佐役であると名乗ります。そして、タタラムが会長のひとり息子であり、広大な飛空艇事業を継ぐ立場にある人物だと明かします。タタラムは会社の実務を学ぶため、数日前にコルソンに同行してグリダニアを訪れていました。ところが、彼の目の前から突然姿を消してしまったのです。身代金の要求も手がかりもないまま、コルソンは最悪の事態を恐れ、神勇隊に街中を捜索させていたのでした。</p>
      <p>安堵した一方で、コルソンはタタラムの手紙に頭を抱えます。そこには謝罪の言葉ひとつなく、ただ胸躍る計画に必要な材料の一覧だけが記されていたからです。それでも彼は、その内容が高品質な機関部接合材を作るためのものだと見抜きます。若様が引き起こした騒ぎを思えば断りたい気持ちもありましたが、技術者としての興味が勝りました。コルソンはあなたに取引証書を渡し、フォールゴウドの製作設備を管理する者にそれを見せれば、必要な材料を用意してもらえると告げます。そして、タタラムが今はイクサル族と共にいることを、ひとまず信じることにします。</p>
      <p>フォールゴウドでヒルデヤードに取引証書を見せると、彼女はハイウィンド社の印を見て、これほど高価な材料を用意できる組織は限られていると納得します。彼女は製作に必要な一式を整え、あなたが設備を使えるようにします。こうして、あなたはタタラムが求める機関部接合材を作り上げ、完成品を携えてエカトル実験場へ戻ります。</p>
      <p>完成した部品を受け取ったタタラムは、まさに思い描いていたものだと声を弾ませます。この部品があれば、改良した機関部の覆いをデズル・クワラン号へ組み込むことができるのです。彼は完成した飛空艇に乗り、顔に受ける冷たい風や鳥の声、はるか下を行き交う人々の姿を思い浮かべますが、すぐに我に返り、自分の空想癖を恥ずかしそうに詫びます。そして、コルソンから本当の身分を聞いたのだろうと悟り、自分がハイウィンド社の会長の息子であり、エオルゼアの主要都市を結ぶ飛空艇事業を継ぐ立場にあることを認めます。</p>
      <p>それでもタタラムは、帳簿や講義、利益を追い求める日々に何の興味もありません。彼が望んでいるのは、飛空艇を管理することではなく、飛空艇を設計することでした。家柄や財産ではなく、自分が努力して身につけた技術で認められたいのです。甘やかされた子どものわがままに聞こえるかもしれないとしながらも、彼は本気で、夢を追えるなら相続などすぐに捨ててもよいと言い切ります。誰よりも遠く、速く、高く飛ぶ飛空艇を作ることこそが、彼のただひとつの夢でした。セズル・トトロックはその思いを認め、タタラムの財産など自分たちには意味がないと断じます。努力に見合う報いを与えるのが製作というものだと励まし、彼らは雲海へ、そしてアヤトランの門へとデズル・クワラン号を飛ばす日を目指していきます。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> タタラム　黒衣森：北部森林 <small class="muted">(X:24.5, Y:23.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="a-designer-job.html">設計士急募、種族問わず</a></div>
      <div class="row">クラフター <small class="muted">Lv 1～</small></div>
      <div class="row">イクサル族 友好度ランク2「認定」</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="lathe-to-the-party.html">巡れ、夢の歯車</a></div>
    </div>`
  },

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'來自格里達尼亞的少年',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Tataramu 興奮地迎接你，告訴你飛空艇的建造正穩定推進，連 Ixal 夥伴們也同意採用他提出的幾項改良方案。他感謝你讓他意外獲得這樣的機會，因為能參與這種革新性的計畫，正是他過去埋首閱讀無數航空原理與設計書籍時，一直夢想著的事情。</p>
      <p>不過，這個夢想很快遇上了實際問題。為了讓他的改良能正確整合進飛空艇，需要製作一個特製的引擎接合部件，而所需材料相當難以取得。Tataramu 不得不請一位熟人幫忙，於是拜託你把一封信送給名叫 Colson 的人。由於 Colson 經常因公司業務四處奔走，Tataramu 請你先到 Gridania 飛空艇售票櫃台詢問 Hida，打聽他目前的行蹤，同時也有些歉意地表示，自己暫時不太想進城。</p>
      <p>你在飛空艇搭乘處向 Hida 提起 Tataramu 的名字時，她立刻大吃一驚。得知你見過那位失蹤的少爺，她急忙追問他是否平安，接著立刻要你前往 Quiver’s Hold。到了那裡，Chansteloup 說明 Gods’ Quiver 已經投入所有人力，尋找 Tatabaru 會長失蹤的兒子，而 Highwind Skyways 的首席助手 Colson 也正在裡面等候消息。當你把信交給 Colson 時，他一聽見 Tataramu 和 Ixal 在一起，便立刻誤以為少爺落入敵手，甚至準備組織救援隊。你只能先讓他冷靜下來，告訴他 Tataramu 是出於自己的意願留在那裡。</p>
      <p>理解真相後，Colson 重新自我介紹，說明自己是 Highwind Skyways 的首席技術顧問，也是 Tatabaru 會長的助手。他告訴你，Tataramu 是會長唯一的兒子，也是這個龐大飛空艇事業的繼承人。幾天前，Tataramu 為了學習公司實務，陪同 Colson 來到 Gridania，卻突然在他眼前失去蹤影。沒有贖金要求，也沒有任何線索，Colson 只能想像各種最糟的情況，並請 Gods’ Quiver 幾乎翻遍整座城市尋人。</p>
      <p>雖然你帶來的消息讓 Colson 放下心中重擔，但 Tataramu 的信仍讓他十分頭痛。信裡沒有任何道歉，也沒有一絲悔意，只有一張為了刺激計畫而要求準備的材料清單。即使如此，Colson 仍看出那是用來製作高品質引擎接合部件的材料。想到 Tataramu 引起的騷動，他本想拒絕這個失禮的請求，但身為技術顧問的好奇心最後佔了上風。於是他交給你一張承兌憑證，要你把它帶給 Fallgourd Float 製作設施的管理人，對方便會提供製作所需的一切材料。至於 Tataramu 留在 Ixal 身邊這件事，他也暫時選擇相信你帶來的說法。</p>
      <p>在 Fallgourd Float，Hildeyerd 一看到憑證上的 Highwind Skyways 印記，便明白只有這樣的組織才負擔得起你要的材料。她替你準備好製作所需的物資，並讓你使用製作設施。你依照 Tataramu 的需求完成引擎接合部件後，帶著成品返回 Ehcatl。</p>
      <p>Tataramu 收到完成品時非常高興，因為這正是他腦中設想的部件。有了你精心製作的接合部件，他的改良式引擎外殼就能順利整合進 Dezul Qualan。他一想到完成後的飛空艇，便忍不住想像迎面而來的冷風、鳥鳴聲，以及地面上像小點般來往的人群；但他很快回過神來，為自己又陷入空想而有些不好意思。接著，他也明白 Colson 應該已經告訴你真相，於是承認自己的父親正是 Highwind Skyways 的會長，而自己注定有一天要繼承這個連結 Eorzea 各大城市的飛空艇企業。</p>
      <p>可是 Tataramu 對帳本、課程與追求利潤毫無興趣。他想做的不是管理飛空艇船隊，而是親手設計飛空艇；他希望別人看重的不是他的身分或財產，而是他努力學來的技術。也許這聽起來像是被寵壞的孩子在抱怨，但他真心表示，只要能追逐自己的夢想，他願意立刻放棄繼承權。他想要的是能飛得更遠、更快、更高的奇妙飛空艇，那就是他的夢想，除此之外別無所求。Sezul Totoloc 認同他的熱情，也說 Tataramu 的財富對 Ehcatl Nine 沒有意義，還不如把錢熔掉做成釘子。真正支撐人的，是製作之路上付出的努力與換來的回報。於是，他們繼續朝著同一個目標前進：讓 Dezul Qualan 飛向雲海，飛向 Ayatlan 的門扉。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
