    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }

    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{

}
.tab-panel.scroll-panel p:first-child{margin-top:0}

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'A Premium Deal',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You set your sights on the next trade the moment Mablu decides on it—no hesitation, no half measures. Before you depart, Wuk Lamat hands over the mate leaves, saying she would rather not tempt fate by “proving Erenville’s point,” and Mablu leads the way toward the mezcal distillery.</p><p>The air grows thick with the sharp scent of mezcal, and Mablu names your target: Gobli, a master distiller who won’t be swayed unless you come armed with the right leverage. You split up to gather gossip—Mablu to the north, you to the people near the distillery, and Wuk Lamat to the village entrance—each of you hunting for the one detail that can tip a deal.</p><p>From those who know him, you piece together a clearer picture. A chef from Tuliyollal admits he often buys Gobli’s mezcal, but the negotiations always come with a cup of the same strong spirit—too strong for him to handle without agreeing to whatever price is asked. Another tells you of monsters prowling the ingredient fields at Agave Jaws, forcing Gobli to choose between danger and costly hired blades. And then you hear the rumor that Gobli has been invited to the palace—yet if he shows up in his usual rumpled attire, he risks being laughed out before the talks even begin.</p><p>With your findings in hand, you regroup and approach Gobli. He makes it plain he is busy, and when Wuk Lamat offers a sack of top-grade mate leaves for a three-year-old jug of premium mezcal, he refuses—mate leaves have no use to him. Still, he offers to sit and chat over mezcal, and Mablu recognizes the opening: bargaining has simply shifted to a different battlefield.</p><p>You begin by framing mate tea as a courtesy he can offer to guests who cannot stomach strong drink, then you press the point of his palace invitation—of the rite of succession underway, and of the fame his distillery could earn if his mezcal is chosen for the ascension ceremony and banquet. You add what he lacks most: preparation. An introduction to the weaver Bol Noq’, whose work is esteemed in Tuliyollal, so Gobli can walk into Vollok Shoonsa looking the part. When even that does not fully balance the scales, you and Wuk Lamat offer the final piece—immediate aid with the monsters at Agave Jaws, sparing him the cost of sellswords.</p><p>You return from the fields with the danger dealt with, and the bargain finally holds. Mablu presents the mate leaves and a written introduction for Bol Noq’, and Gobli hands over the prize: a jug of premium mezcal aged three years. Wuk Lamat’s relief is loud and unmistakable, but Mablu keeps her focus—there is still a saddle to buy, and she wants the proof of success in her hands. When Gobli calls her a hard bargainer and says he hopes to do business again, Mablu answers honestly: she is still a ranch hand—for now—but when she becomes a proper merchant, she will return.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Wuk Lamat <small class="muted">(Urqopacha, X:13.4, Y:12.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="mablus-dream.html">Mablu’s Dream</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 90</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="wuk-lamat-in-the-saddle.html">Wuk Lamat in the Saddle</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'最高の取引',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>マーブルは、いったん目標を定めたら迷わず突き進む。あなたが歩調を合わせると、出発前にウクラマトは高級マテ茶葉の大袋を手渡し、エレンヴィルに余計な心配をさせないためにも自分は預けておくのだと言う。次の目的地は、ワチュン・ペロのメスカル蒸留所だ。</p><p>蒸留所の周囲にはメスカルの匂いが立ちこめ、嗅いでいるだけで酔いそうになる。マーブルは取引相手の名を告げる――ゴーベリ。蒸留所の中でも腕利きと評判の醸造家で、価値が倍になる取引を成立させるには、狙いを定めた情報が欠かせない。あなたは蒸留所の近くで聞きこみをし、ウクラマトは村の入口へ、マーブルは北側へ向かう。</p><p>あなたが集めたのは、取引の切り札になりうる話ばかりだった。トライヨラの調理師ベベージャは、ゴーベリのメスカルを買い付けに来るたび酒を勧められ、弱い自分は結局ふらふらになって言い値で取引してしまうとこぼす。ラープルは、材料を採取する畑アガベの歯列に魔物が現れ、仕込みが難しくなっていること、傭兵に任せれば費用がかさむことを教えてくれる。ズーベリは、連王宮に招かれたという噂がありながら身なりに無頓着なゴーベリなら、場をわきまえぬ格好で笑いものになりかねないと語る。</p><p>情報を携えて合流したのち、あなたはゴーベリのもとへ向かう。ゴーベリは忙しいから手短にと言い、ウクラマトが「三年熟成の最高級メスカル」を求めて高級マテ茶葉の大袋を差し出しても、必要ないと一蹴する。ただし追い返しはせず、メスカルを飲みながら話でもしようと席を促す。マーブルはそこで、勝負はここからだとあなたに目配せする。</p><p>まず、マテ茶を用意できれば酒に弱い客にも配慮できる、と切り出し、蒸留所のもてなしに新たな価値を加える道を示す。続けて、継承の儀が進むいま、第三の誓約者であるウクラマトが訪れている意味を重ね、昇格の式典や祝宴でメスカルが供されれば計り知れぬ名声になると語る。さらに、ヴォロク・ショーンサに赴くなら第一印象がすべてだと念を押し、トライヨラで評判の織師ボル・ノクを紹介すると約束して、装いの不安を取り除く。最後にあなたとウクラマトは、アガベの歯列で暴れる魔物の駆除を引き受け、傭兵を雇う出費まで節約できる形にして、ようやく天秤を釣り合わせる。</p><p>魔物を片づけて戻ると、取引は決着する。マーブルは高級マテ茶葉の大袋とボル・ノクへの紹介状を差し出し、ゴーベリは礼として三年熟成の最高級メスカルを渡す。ウクラマトは達成感を隠さず、マーブルは鞍を手にするまでは浮かれないと気を引き締める。ゴーベリが「若い行商人よ、見事な取引だった」と言うと、マーブルはまだ牧場の手伝いにすぎないと正直に返し、それでも、いつか本当の商人になったなら必ずまた戻って取引をすると告げる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ウクラマト <small class="muted">（オルコ・パチャ, X:13.4, Y:12.1）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="mablus-dream.html">マーブルの夢</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 90</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="wuk-lamat-in-the-saddle.html">ウクラマトとアルパカ</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'出色的交易',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你才剛看見 Mablu 下定決心，就知道她不會慢慢來——一旦有了目標，她就會全速往前衝。出發前，Wuk Lamat 把那袋瑪黛茶葉交到你手上，說她不需要冒險去「證明 Erenville 說得沒錯」。Mablu 隨即帶路，下一站是 mezcal 蒸餾廠。</p><p>越靠近蒸餾廠，mezcal 的氣味就越濃烈，連吸一口都像會頭暈。Mablu 說明這次要談的人叫 Gobli——在蒸餾師之中都算得上高手。想用瑪黛茶葉換到價值翻倍的「三年熟成最高級 mezcal」，光靠誠意不夠，必須先抓到能打中對方的情報。於是你去蒸餾廠附近打聽，Wuk Lamat 去村口，Mablu 則往北邊探消息。</p><p>你很快就聽到幾個關鍵線索。來自 Tuliyollal 的廚師說，他常來買 Gobli 的 mezcal——客人都稱讚是 Tural 最好——但每次談生意都會被端上一杯 mezcal，他酒量差，為了不失禮只敢小口啜飲，卻還是會昏頭到答應對方開出的任何價碼；若能有些不那麼烈的飲料佐談，情況就會不同。另一個人提到 Agave Jaws——那片採集 mezcal 原料的龍舌蘭田——近來有魔物出沒，讓備料變得困難；若要請傭兵清理，開銷又會吃掉不少利潤。你還聽到更刺耳的傳言：Gobli 似乎被邀去「宮殿」談生意，可他平時邋遢慣了，若穿著那身皺巴巴的衣服走進 Sunperch，恐怕還沒開口就先被笑出去。</p><p>你把消息帶回 Mablu 那裡，她立刻判斷這些全都能用上，並說她已查到 Gobli 正在後方坡上忙活。你們找到他時，他不耐地要你們長話短說。Wuk Lamat 直接開價，想用一袋頂級瑪黛茶葉換一甕三年熟成的最高級 mezcal；Gobli 當場拒絕，說他現在用不上瑪黛茶葉，但又不想讓你們白跑一趟，乾脆邀你們坐下，邊喝 mezcal 邊聊。Mablu 看得清楚——真正的交涉，才剛開始。</p><p>你們先把「待客」這張牌打出去：既然不是每個人都喝得了烈酒，若能用頂級瑪黛茶泡一壺瑪黛茶作為替代飲品，談生意時就不必逼客人硬喝 mezcal。接著你們把話題引到更大的舞台——眼下正逢繼承之禮，Third Promise 親自現身，若 Gobli 的 mezcal 能在繼位儀式與宴席上登場，蒸餾廠的名聲會一口氣傳遍。你們再補上他最缺的「體面」：若他真的要走進 Vollok Shoonsa，就該穿上最好的衣裝；你們雖沒有現成衣物，但能替他引薦 Tuliyollal 備受推崇的織工 Bol Noq’，讓他不至於因外表失了先機。當 Gobli 仍覺得天秤未平，Wuk Lamat 便提起 Agave Jaws 的魔物——你們願意立刻出手清理，替他省下雇傭兵的費用。這一次，Gobli 終於點頭成交。</p><p>你和 Wuk Lamat 去了 Agave Jaws，把出沒的魔物一一清除，再回到蒸餾廠。Mablu 交出那袋瑪黛茶葉，並遞上寫給 Bol Noq’ 的介紹信；Gobli 也依約交付三年熟成的最高級 mezcal。Wuk Lamat 忍不住大聲慶祝，Mablu 卻提醒自己：在真正買到鞍具之前，還不到放鬆的時候。Gobli 認可她的手腕，說期待將來再做生意；Mablu 坦白自己現在仍只是牧場工——至少目前如此——但若有一天她成為真正的商人，她一定會回來，再和他談下一筆交易。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 烏克·拉瑪特 <small class="muted"> 奧闊帕恰山 (X:13.4, Y:12.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="mablus-dream.html">瑪布露的夢想</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.90</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="wuk-lamat-in-the-saddle.html">烏克·拉瑪特與羊駝</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
