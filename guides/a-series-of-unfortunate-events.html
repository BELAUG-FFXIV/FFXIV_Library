const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`A Series of Unfortunate Events`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Honoroit’s unease soon proves justified. Emmanellain has been gone far too long, and though he tries not to surrender to panic, the worry in his voice is impossible to miss. He asks whether you happened to see the young lord while searching for your crystal, and when it becomes clear that you did not, he can no longer pretend all is well. Even Emmanellain, he says, ought to understand the danger of wandering too far alone in a place like this. Fearing the worst, he asks for your help. If you split up, you may find him faster. He sends you to search the southeastern reaches of Voor Sian Siran while he makes for the north.</p><p>You search the area carefully, but for a time there is no sign of him. Then Honoroit appears in sudden alarm, his composure utterly broken. Emmanellain has been taken, he cries. The Vanu surrounded him in force and carried him off, and there is no time to lose. You follow at once, and the terrible shape of the situation becomes clear. The Vanu have dragged him back to their settlement, perhaps to present him before their chieftain. Honoroit, torn between terror and duty, decides to race back to Camp Cloudtop to inform Laniaitte and bring aid. Yet even as he speaks, he knows help may come too late. So he begs one more thing of you: if you see even the smallest chance to slip past the sentries and save Emmanellain before reinforcements arrive, you must take it.</p><p>His plea is made all the more earnest by the confession that follows. Emmanellain may be presumptuous, insensitive, and at times nearly unbearable, but none of that means he deserves such a fate. When you reach him, the young lord’s fear has stripped away every trace of swagger. He is plainly terrified, calling out to you in desperate relief, unable to hide the horror of what he imagines his captors may intend. The Vanu react at once, and their chief gives the order to spread word and cast the intruders into the cloud sea. What follows is a desperate struggle fought in the heart of enemy ground, with Emmanellain’s life hanging by a thread.</p><p>For a moment it seems you may yet prevail by your own strength, but the danger only deepens. More Vanu rally, and the fight threatens to close around you entirely. Then Haurchefant arrives with support, cutting into the chaos at the very moment hope begins to fail. He urges you to keep Emmanellain safe while he and the others hold back the enemy. But even that hard-won reprieve is shattered when the Vanu elder raises his voice and calls upon a greater power. The cloud sea churns, and in answer to that cry appears the White—the mighty Bismarck, Lord of the Mists. At the sight of that immense being rising through the sky, the battle changes at once. This is no mere beast. It is a primal.</p><p>There is no room left for hesitation. Haurchefant orders a retreat, but escape is already slipping from reach when another rescue appears from the skies. Cid and the Ironworks descend into the turmoil with the blunt decisiveness only they could bring, shouting for all of you to board at once. Through that narrow and sudden chance, you are pulled out alive. When you return to Camp Cloudtop, Honoroit is overcome with relief and gratitude, scarcely able to face what might have happened had you not gone after his lord. Emmanellain, shaken beyond all pretense, tries weakly to deny that he was ever truly afraid, while Haurchefant chooses instead to be grateful for the simplest blessing of all: that everyone still lives.</p><p>Cid, for his part, brushes aside any thanks. You have saved him and his people often enough before, he says, and this time it was only chance that placed him here when you needed him. The Holy See had asked the Ironworks to inspect the Protector, whose troubles with flight had brought him to Camp Cloudtop on business. It was there that he learned you had arrived days earlier in the company of an Ishgardian lordling, and moments later Honoroit came running into view, babbling of Emmanellain’s capture and your reckless attempt to save him. The rest followed quickly enough. Yet before the reunion can settle into comfort, Cid reminds you that work still awaits him. He promises you will speak again soon, and with that, the moment closes—leaving behind the shock of what nearly happened, and the first true sign that the dangers of the Sea of Clouds run deeper than any of you had yet imagined.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Honoroit <small class="muted">(The Sea of Clouds, X:23.8, Y:33.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="hope-springs-eternal.html">Hope Springs Eternal</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 50</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="a-reward-long-in-coming.html">A Reward Long in Coming</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'雲海より現れしもの',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>オノロワの不安は、やがて現実のものとなる。エマネランがあまりにも長く姿を見せず、彼は気丈に振る舞おうとしながらも、声の端々に焦りをにじませる。あなたが水晶を探しているあいだに彼を見かけなかったかと問うが、その望みも空しく、やはり行方は知れない。こんな危険な場所で、いくらあの人でもそう遠くまで勝手に歩き回るはずはない――そう自分に言い聞かせながらも、オノロワはついに捜索の助力を願い出る。手分けしたほうが早い。そう言って彼は、あなたにヴォール・シアンシラン南東部の捜索を託し、自らは北へ向かう。</p><p>あなたが周囲を探っても、しばらくは何の手がかりも見つからない。だがやがて現れたオノロワは、もはや平静を装えてはいなかった。エマネランが、バヌバヌ族に連れ去られてしまったというのだ。大勢に囲まれ、なすすべもなく捕らえられたらしい。急いで来てほしいと懇願する彼に導かれ、事態の深刻さは一気に輪郭を帯びる。バヌバヌ族は彼を村へ連れて行った。おそらくは長に差し出すために。オノロワはラニエットへ急報し、救援を呼ぶためキャンプ・クラウドトップへ戻る決意をするが、その声にはすでに間に合わぬかもしれないという恐れが滲んでいた。だからこそ彼は、あなたにさらなる願いを口にする。もし見張りをかいくぐり、ひとりでもエマネランを救い出せる隙があるのなら、どうかその機を逃さないでほしいと。</p><p>その願いには、彼の本心がそのままこぼれていた。エマネランはたしかに思い込みが強く、無神経で、時にどうしようもなく手を焼かせる。けれど、だからといってこのような目に遭うべき人ではない。そう訴えるオノロワの言葉どおり、あなたが辿り着いた先で目にしたエマネランは、いつもの虚勢をすっかり失っていた。自分は食われてしまうのではないかと、本気で怯えながらあなたの名を呼ぶ。その情けなさすら切実な恐怖の証だった。バヌバヌ族の長は、地上の者どもが囚人を奪い返しに来たと叫び、仲間に知らせを広げ、雲海へ投げ捨てよと命じる。敵地のただ中で、あなたは彼を救うための戦いへ身を投じることになる。</p><p>しかし、ようやく縄を断ち切っても事態は終わらない。敵は次々と押し寄せ、包囲はなおも狭まり続ける。そこへオルシュファンが援軍を率いて駆けつける。彼はエマネランを守るようあなたに叫び、自らは増援を食い止めるため前へ出る。ひと息つけるかに思えたその矢先、バヌバヌ族の長老が声を張り上げる。ヴンド族の長ホヌの怒りは黒き嵐雲のように渦巻き、地上の者を「白きもの」へ捧げよと。そうして雲海のうねりのなかから現れたのは、「白きもの」――霧の蛮神ビスマルクだった。その巨大な姿を見た瞬間、目の前の脅威がただの魔物などではないことを、誰もが思い知らされる。</p><p>もはや踏みとどまる猶予はない。オルシュファンは撤退を促すが、逃げ切るにはあまりにも状況が悪すぎた。そこへさらに空から割って入ったのが、シドと鉄工房の仲間たちだった。彼らは迷うことなく飛び込み、全員乗れと叫びながらあなたたちを救い上げる。その土壇場の介入によって、あなたたちはようやく命を繋ぐ。キャンプ・クラウドトップへ戻ると、オノロワは安堵と感謝に声を震わせ、あなたが急いで駆けつけてくれなければどうなっていたか考えることすら恐ろしいと語る。エマネランは恐れてなどいなかったと力なく取り繕うが、その虚勢はもはや誰の目にも痛々しい。そんな中、オルシュファンはただ、皆がまだ生きていることこそ何よりの救いだと静かに言う。</p><p>一方のシドは、礼などいらないとあっさり言い放つ。これまであなたが何度も彼らを救ってきたのだから、今回はたまたま順番が回ってきただけだというのだ。そもそも彼がここへ来ていたのは、聖教都市から依頼を受け、飛空戦艦プロテクトゥールの不調を調べるためだった。空を飛ばせないその艦を見にキャンプ・クラウドトップへ来てみれば、数日前にあなたがイシュガルドの若君を連れて訪れていると聞かされる。世間は狭いと思ったその矢先、オノロワが飛び込んできて、主が攫われ、あなたが命懸けで救いに向かったと必死に訴えた。あとは見たままの成り行きだ。だが再会を味わう間もなく、シドには本来の仕事が残っている。すでに仲間たちも作業に取りかかっているのだと言い、また近いうちに必ず話そうと約束して、彼は再び務めへ戻っていく。残されたのは、雲海の脅威が思っていた以上に深く、そして容赦ないものであるという現実だった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> オノロワ <small class="muted">（アバラシア雲海, X:23.8, Y:33.1）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="hope-springs-eternal.html">湧水のクリスタル</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="a-reward-long-in-coming.html">困ったヤツの称え方</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'自雲海現身之物',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Honoroit 的不安，很快就成了現實。Emmanellain 離開的時間實在太久，久到連他也再無法勉強自己相信一切無事。他先問你，在尋找水晶的時候是否曾經碰巧看見 Lord Emmanellain，可當你給不出肯定的答案時，他終於壓不住那份越來越重的焦慮。就算是 Emmanellain，也應該明白，在這種地方走得太遠有多危險才對。可事到如今，與其繼續安慰自己，他更需要的是立刻行動。於是他請求你幫忙分頭尋人，讓你盡快去搜查 Voor Sian Siran 的東南方，而他自己則往北邊趕去。</p><p>你在那一帶仔細搜尋了一陣子，卻始終沒有找到 Emmanellain 的蹤影。直到 Honoroit 再次衝到你面前時，那張原本還勉強維持鎮定的臉，已經徹底被驚恐打碎了。他顫聲告訴你，Lord Emmanellain 被 Vanu Vanu 抓走了，而且不是單獨幾人，而是一整群把他團團圍住後帶走的。你沒有時間多問，只能立刻隨他趕去。很快地，你也從現場留下的痕跡與 Honoroit 的推測中明白過來，Vanu Vanu 很可能已經把人帶回了自己的村落，準備押去見他們的首領。Honoroit 明知自己現在最該做的是立刻回 Camp Cloudtop 通知 Laniaitte，請她派出援軍，卻也同時知道，等援手真的趕到時，一切或許早已來不及。於是，他只能帶著幾乎快要崩潰的聲音求你，若你在他離開後，看見任何一絲能繞過守衛、先一步救出 Emmanellain 的機會，就一定要抓住。</p><p>那份請求裡，也把他真正的心聲全說了出來。他知道 Emmanellain 有時候自以為是，遲鈍又麻煩，甚至常常讓人忍不住覺得難以忍受。可即便如此，那也絕不代表他該落得這樣的下場。當你終於在 Vanu Vanu 的聚落中找到他時，眼前的 Emmanellain 早已沒有平日那副自命不凡的模樣。他滿臉驚惶地喊著你的名字，語氣裡全是壓不住的恐懼，甚至慌亂到開始懷疑自己是不是要被他們吃掉了。可 Vanu Vanu 並沒有給你們任何喘息的餘地。Chief Honu Vanu 一看見有人闖入，便立刻高聲下令，要把消息像雷鳴般傳出去，並把闖進來的外來者全都丟進雲海。你只能在敵群之中硬闖，想辦法替 Emmanellain 解開束縛，把他從那片混亂裡帶出來。</p><p>可就算你成功切斷繩索，真正的危險也沒有因此結束。敵人越聚越多，四周的壓力只變得更沉重。就在局面幾乎要徹底失控時，Haurchefant 終於帶著援手趕到。他一面要你專心保護 Emmanellain，一面親自帶人擋下追上來的 Vanu Vanu。可這份短暫的轉機，很快又被更可怕的存在壓碎。Vanu 的長老抬起聲音，高喊著 Vundu 首領 Honu 的怒意正如最漆黑的暴風翻湧，要把地上的人獻給那位「The White」。下一刻，翻騰的雲海真的回應了那道呼喊，而從其中現身的，正是那位被他們稱作「The White」的存在，Bismarck。那龐大而異樣的身影一出現，連空氣都像是被瞬間奪走了。Haurchefant 立刻看出那不是普通生物，而是一位 primal。</p><p>到了這一步，已經沒有任何逞強的餘地。Haurchefant 當機立斷要你們立刻撤離，可眼前的局勢早已壓迫到幾乎沒有退路。偏偏就在這個時候，另一道熟悉的援手從空中闖了進來。Cid 帶著 Ironworks 的人及時現身，語氣裡甚至還帶著他那種一如往常的乾脆與不耐，直接要你們全部上船。在那幾乎可以說是擦著死亡邊緣搶回來的瞬間裡，你們終於被帶離了那片危境。回到 Camp Cloudtop 之後，Honoroit 幾乎是用顫抖的聲音向你道謝，因為若不是你毫不猶豫地衝去救人，他根本不敢想像後果會是什麼模樣。Emmanellain 則還在勉強撐著最後一點面子，嘴硬地否認自己真的有多害怕，可那副模樣早已沒有任何說服力。倒是 Haurchefant 只是平靜地說，至少此刻你們都還活著，而這本身就已經是最簡單、也最值得感謝的恩賜。</p><p>至於 Cid，則一如既往地不肯把這次相助看得太重。他說，若不是剛好碰上，天曉得最後會變成什麼樣子；不過也沒什麼需要特別道謝的，畢竟你之前幫過他們的次數，早就不只一兩次了。這回之所以會在這裡遇上你，純粹只是巧合。Holy See 這次找上 Ironworks，是希望他們來看看 Protector 的狀況，因為那艘飛空艇似乎怎麼也飛不起來。於是他來到 Camp Cloudtop，原本只是打算檢查船況，結果卻聽說你幾天前就已經帶著一位 Ishgard 的年輕貴族先到了這裡。他才剛覺得世界還真小，下一刻便看見 Emmanellain 的僕從慌慌張張地衝過來，語無倫次地說自家主人被抓走了，而你則冒著危險去救人。之後的事，也就順勢一路發展到了現在。只是，Cid 也沒辦法在這裡久留太久。他提醒你，自己終究是為了工作才來，而他的同伴們也早就已經開始忙了。於是他只簡單說了句別擔心，很快還會再聊，便又回頭投入眼前的任務裡。留下來的，除了剛剛才從危機中逃出生天的餘悸之外，還有一個越來越清楚的事實，在 Sea of Clouds 等著你們的危險，遠比原先想像得還要深，還要大。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Honoroit <small class="muted">(阿巴拉提亞雲海, X:23.8, Y:33.1)</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="a-reward-long-in-coming.html">該如何稱讚那個麻煩傢伙</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
