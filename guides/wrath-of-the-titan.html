<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Wrath of the Titan',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>The Maelstrom calls for your aid, and Minfilia’s tone makes clear this is no routine request. Reports from near Limsa Lominsa speak of a peril greater than any beast tribe raid: a band of kobolds has reawakened Titan.</p>
      <p>Y’shtola recalls how, years before the Grand Company’s reformation, Leviathan and Titan once converged on the seawall and brought ruin in their wake—held at bay only by mercenaries hired under the Navigator’s grace, before the beast tribes regrouped and summoned their primals again. Minfilia does not linger on old victories. So long as tormented souls will them into being, primals will continue to haunt the realm.</p>
      <p>What makes this worse is how little anyone truly knows of Titan. The only force said to have bested him—the Company of Heroes—disbanded five years ago, leaving no chronicles worth the name. Y’shtola urges you to expect the worst; even with the Maelstrom’s support, you could be outmatched, and the Echo will not shield you this time—only your own steel. Still, you choose to accept.</p>
      <p>Minfilia thanks you, and the room moves at once. Thancred and Yda are dispatched to the Grand Companies to seek wider support; Urianger is told to send word to the Students of Baldesion—and to Alphinaud as well—while Papalymo is tasked with gathering every scrap of information the Scions possess. You are told you will be briefed on the situation when you reach Limsa Lominsa, and to make your preparations for the journey.</p>
      <p>At the Maelstrom’s command, you are received without delay. R’ashaht Rhiki confirms the Scions’ warning: the kobolds have summoned Titan once more, and for more than a moon their numbers have been moving south from O’Ghomoro with growing purpose. Merlwyb’s answer is sharp and immediate—their goal is crystals, fuel for their fell primal—and she dismisses her commander to speak to you herself, offering pride and thanks as one of the Maelstrom’s own.</p>
      <p>Merlwyb admits the city has faced primal threats before, and that in past days the Company of Heroes was the blade Limsa Lominsa relied upon. With that band scattered to history, she asks you and the Scions of the Seventh Dawn to stand as the city’s best hope. Y’shtola does not soften what follows: the kobolds are not given to unprovoked aggression, and it was the Lominsans who broke the old pact and drew blood first. Even so, Merlwyb accepts the blame without flinching—remorse will not shield anyone from Titan’s wrath, and she will not ask her people to die for pride.</p>
      <p>Aetheric disruptions are already being observed further inland, Merlwyb warns, and the effects will reach the city before long. She asks for your help all the same, pledging the full support of the Maelstrom and waiting for good tidings.</p>
      <p>With Titan summoned again, Y’shtola judges negotiation no longer possible. Before you face the primal, she insists you must learn all you can—and the best source would be those mercenaries who defeated him once before. R’ashaht Rhiki offers what he can: though the Company of Heroes is no more, several former members still live, and one is said to be working at the Grey Fleet mills in lower La Noscea. Y’shtola asks you to seek the man out, while she goes to find the others.</p>
      <p>At the mills, you find a broad-voiced man singing of setting burdens down and draining pints—then turning his stare on you when you do not move along. When you ask about the Company of Heroes, irritation flashes across his face; fame, it seems, is a price that never stops being collected. Still, since you have come this far, he relents—introducing himself as Trachtoum, once the Company’s finest axeman—and demands you say what it is you want to know.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'海都の仇敵',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>黒渦団から救援要請が届いたとミンフィリアは告げ、空気は一気に引き締まる。件のコボルド族に関する報告は単なる小競り合いではなく、リムサ・ロミンサ近郊で「蛮神タイタンが再び目覚めた」という、はるかに深刻な兆しを示していた。</p>
      <p>ヤ・シュトラは、グランドカンパニー再編以前、リヴァイアサンとタイタンが防波堤付近で相まみえ、計り知れぬ被害をもたらした過去を語る。航海神の加護のもと、雇われた傭兵たちが辛くも押し返したが、獣人族はほどなく態勢を立て直し、再び蛮神を呼び出した。ミンフィリアは、勝利の記憶にすがることはしない。苦しみを抱えた魂が望む限り、蛮神はこの世から消えないのだと。</p>
      <p>さらに厄介なのは、タイタンについてほとんど何も分かっていないことだった。かつて彼を退けたとされる「英雄の一団」は五年前に解散し、傭兵は記録を残す習慣もない。ヤ・シュトラは最悪を想定すべきだと言い、たとえ黒渦団の支援があっても戦力は足りないかもしれないと釘を刺す。今回は超える力も頼れない、命を守るのは己の武と覚悟だけだ。それでも、あなたは引き受ける。</p>
      <p>ミンフィリアは礼を述べると、すぐに布陣を整える。サンクレッドとイダは各グランドカンパニーへ赴き、状況を伝えて支援を求める。ウリエンジェはバルデシオン委員会へ連絡し、アルフィノにも声をかけるよう頼まれる。パパリモには、乏しいながらもタイタンに関する情報の取りまとめが命じられた。あなたはリムサ・ロミンサ到着後に戦況を知らされること、そして旅支度を整えることを告げられる。</p>
      <p>黒渦団の司令部では、あなたは滞りなく迎えられる。ル・アシャ・リキは、コボルド族が再びタイタンを召喚したと断言し、ひと月余り前からオゴモロ火山を出て南下する獣人族の動きが増していたと報告する。メルウィブはその狙いを「クリスタルだ、蛮神の餌だ」と言い切り、司令官を退けてあなたに向き直る。黒渦団の一員として誇りを示し、助力に感謝を述べた。</p>
      <p>メルウィブは、リムサ・ロミンサが蛮神の脅威と無縁ではないこと、かつてタイタンが脅威となった際には「英雄の一団」に頼ったことを認める。だが彼らはすでに散り、今は暁の血盟に望みを託すしかないのだと語り、あなたこそが街の希望だと告げる。ヤ・シュトラは厳しく指摘する。コボルド族は理由なく刃を向ける種族ではなく、かつての取り決めを破り、血を流したのはリムサ側ではなかったか、と。メルウィブはその非を受け入れ、悔恨ではタイタンの怒りを防げないと述べ、虚勢のために人々を死なせるつもりはないと断じた。</p>
      <p>すでに内陸ではエーテルの流れに乱れが観測されており、その影響はいずれ街にも及ぶという。メルウィブは重い覚悟であなたに協力を乞い、黒渦団の全面支援を約束し、良い知らせを待つと告げる。</p>
      <p>ヤ・シュトラは、コボルド族がタイタンを召喚した以上、もはや交渉の余地は薄いと判断する。ならば戦う前に敵を知るべきで、かつてタイタンを退けた傭兵たちほど確かな情報源はない。ル・アシャ・リキは、英雄の一団そのものは消えたが元メンバーは生きており、そのうちの一人が低地ラノシアのグレイフリート風車群で働いているという噂を伝える。ヤ・シュトラはあなたにその人物を探すよう頼み、自身は別の仲間を追うと言う。</p>
      <p>風車群の製粉所で、あなたは肩の力を抜けと歌う男の声に出会う。だが立ち止まったあなたに、男は睨むように言葉を投げ、英雄の一団の名を出した途端に露骨に顔をしかめた。名声という厄介な代償にうんざりしているのだろう。とはいえ、ここまで来た以上は無下にもできないと、男は渋々口を開く。トラッハトゥーム――かつて英雄の一団で腕を振るった斧術士だと名乗り、あなたが何を知りたいのか言えと促した。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ミンフィリア　<small class="muted">砂の家 (X:6.9, Y:6.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="skeletons-in-her-closet.html">ダルタンクール家の悲劇</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 30～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="tales-from-the-tidus-slayer.html">タコタン討伐武勇伝</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'海都的仇敵',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>the Maelstrom 的求援傳來時，Minfilia 的語氣讓你立刻明白，這不是一般的協助請託。這次的關鍵不在於那些關於 kobolds 的詳盡報告，而在於報告背後所預示的更大危機——在 Limsa Lominsa 近郊，Titan 再次甦醒了。</p>
      <p>Y’shtola 提起更久以前的災厄：在 Grand Company 重整之前，Leviathan 與 Titan 曾在海堤附近同時現身，帶來難以估量的破壞。當時靠著被雇用的傭兵勉力迎戰，才得以擋下那場浩劫；然而 beast tribes 很快又重新集結，再次召來 primals。Minfilia 不讓你停留在過去的僥倖裡——只要仍有人以痛苦的意志渴求它們存在，這片大地就永遠無法真正擺脫 primals。</p>
      <p>更棘手的是，你們對 Titan 幾乎一無所知。唯一被認為曾擊敗過他的勢力——the Company of Heroes——早在五年前就已解散，而傭兵從不以留下紀錄為習慣。Y’shtola 要你把最壞的情況都算進去：即使有 the Maelstrom 的支援，你們仍可能力有未逮；而這一次，the Echo 也無法成為你的護身符，能替你說話的只剩手中的武器。即便如此，你仍選擇接下任務。</p>
      <p>Minfilia 向你道謝後，立刻開始調度。Thancred 與 Yda 被派去各個 Grand Companies 轉告困境並請求支援；Urianger 則要向 the Students of Baldesion 傳話，也希望能通知 Alphinaud；Papalymo 受命整理所有關於 Titan 的資料——哪怕少得可憐。你被告知抵達 Limsa Lominsa 後會再獲得戰術情勢的說明，而在此之前，你必須做好一切出發的準備。</p>
      <p>來到 the Maelstrom 的指揮處，你很快就被接見。R’ashaht Rhiki 直接證實了最糟的消息：kobolds 再度召喚了 Titan。早在一個多月前，偵察就注意到 beastmen 從 O’Ghomoro 往南移動的數量持續增加。Merlwyb 以一句話點破他們的目標——crystals，將用來餵養那個可怖的 primal。她讓指揮官退下，轉而親自面對你，讚許你的行動能為 the Maelstrom 帶來榮耀，也表明她以你為傲。</p>
      <p>Merlwyb 坦言 Limsa Lominsa 早已習慣與衝突為伍，過去 Titan 之亂時，他們曾求助於 the Company of Heroes。如今那支隊伍早已散去，她只能把希望寄託在 the Scions of the Seventh Dawn 與你身上。Y’shtola 卻不願粉飾現實：kobolds 並非無端好戰，當初彼此立下互不侵犯的約定，是 Lominsans 先破壞在前；若要談「該被譴責」，也不能假裝這一切毫無代價。R’ashaht Rhiki 的怒意幾乎要爆發，但 Merlwyb 阻止了他——她承認錯在自己，然而後悔無法替任何人擋下 Titan 的怒火，她也不可能要自己的人民用死亡來償還空洞的面子。</p>
      <p>Merlwyb 警告，你們已在更內陸的地區觀測到 aether 流動的異常，影響遲早會波及城市。她明知所求甚重，仍向你提出請託，並承諾 the Maelstrom 將全力支援，只等你帶回好消息。</p>
      <p>在這樣的局勢下，Y’shtola 判斷：kobolds 既然已召來 Titan，就意味著他們已不再願意談判。既然衝突無可避免，你在踏上戰場前就必須盡可能了解敵人——而最值得追問的，正是那些曾擊敗 Titan 的傭兵。R’ashaht Rhiki 提供線索：the Company of Heroes 雖已不復存在，但仍有成員健在，其中一人據說在 lower La Noscea 的 the Grey Fleet mills 工作。Y’shtola 要你去找那個人，而她自己則去尋訪其他舊日同伴。</p>
      <p>當你抵達 mills，一名男人正哼唱著叫人放下重擔、舉杯痛飲的歌。你沒有立刻離開，他便用不耐的眼神催促你開口。當你提到 the Company of Heroes，他明顯惱火——名氣似乎成了甩不掉的麻煩與代價。可既然你都走到這裡，他終究還是鬆口，勉強願意回應。那人自稱 Trachtoum，宣稱自己曾是那支隊伍最強的斧手，並催你直說：你到底想知道什麼。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    </div>`,

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
