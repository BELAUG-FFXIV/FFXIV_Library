<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Talk of Coerthas | BELAUG · FFXIV Library</title>
  <meta name="description" content="MSQ – The Talk of Coerthas (ARR Patch 2.0)">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left">
        <a class="home" href="../index.html">🏠 Home</a>
      </div>
      <div class="right">
        <button id="langToggle" class="icon-btn" aria-label="切換語言">English</button>
      </div>

  <main class="container main">
    <div class="grid">
      <!-- 左：影片 -->
      <section class="card video-card">

            <iframe id="ytFrame" src="https://www.youtube.com/embed/NGXhjq5CRFw"

      <!-- 右：標題 + Tabs -->
      <section class="card">

            <div id="giscus_container" style="min-height:320px;"></div>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'The Talk of Coerthas',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>At Camp Dragonhead, Haurchefant makes it clear that the High Houses of Ishgard—House Fortemps included—cannot, or will not, offer you formal aid in your search. Even so, he insists there are influential individuals within each house who may still be sympathetic to your cause, and he will send missives to their representatives in Ishgard. Still, he urges you to make inquiries of your own, for it may prove faster.</p>
      <p>He points you toward three leads. Lady Ninne of House Fortemps resides here at Camp Dragonhead and has a fondness for the company of travelers. Cravellin of House Haillenarte can be found at Skyfire Locks, though any insight you draw from the scribe may be difficult to untangle. And if you have not yet spoken with the chief astrologian of House Durendaire, Haurchefant will see to it that the man is informed you are a friend of House Fortemps. As for House Dzemael, Haurchefant will contact them himself—your task is to seek the counsel of the three he has named, then return.</p>
      <p>Before you go, Haurchefant bids you warm yourself by the hearth and rest. He reminds you, with quiet concern, that life is not a race—and that to rush forward without heed for your health is to invite a price you will one day pay.</p>
      <p>You speak with Lady Ninne, only to find that she knows nothing of the airship you seek. If anyone of House Fortemps had such knowledge, she declares, she would surely have heard of it. Instead, she turns to what has consumed the camp’s attention: the fate of young Lord Francel. Rumors spread that the allegations against him were long overdue, especially with so many of House Haillenarte recently found guilty of heresy.</p>
      <p>At Skyfire Locks, you find Cravellin in distress, calling upon Halone for strength—until your presence interrupts him. When he learns you are a friend of Lord Haurchefant, he insists he truly wants to help. Yet the accusations of heresy have thrown House Haillenarte into chaos, and he says they must focus on answering the charges and protecting the house’s name.</p>
      <p>When you seek out the chief astrologian of House Durendaire, he acknowledges Haurchefant’s glowing missive—but offers no warmth in return. Ishgardian policy will not be set aside for an endorsement, he warns, not while they are at war and the enemy grows bolder by the day. He speaks of Inquisitor Guillaime’s arrival in Coerthas and the many heretics uncovered even among Ishgard’s elite, and he dismisses Haurchefant’s pursuit of a long-lost airship as folly. If Haurchefant chooses to spend his days on such a chase, so be it—but he will not ask others to share in it.</p>
      <p>You return to Haurchefant with little to show for your efforts, and he reads the answer in your face before you speak. He admits he has learned nothing useful either; all of Coerthas seems consumed by talk of heretics within the High Houses. For now, he can only hope that his sources in Ishgard proper will yield more pertinent information than the rumors that have drowned out everything else.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Haurchefant <small class="muted">Coerthas Central Highlands (X:26.7, Y:17.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-rose-and-the-unicorn.html">The Rose and the Unicorn</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 37 or above)</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="road-to-redemption.html">Road to Redemption</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'四大名家に訊く',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>キャンプ・ドラゴンヘッドにて、オルシュファンは告げる。イシュガルドの四大名家――フォルタン家を含め――は、あなたの探索に対して、正式な助力を差し伸べられないか、あるいは差し伸べる意思がないのだと。だがそれでも、各家の中には、あなたの目的に同情的な有力者がいるはずだとも言う。彼はイシュガルドの各代表へ書状を送るつもりだが、あなた自身が動いたほうが早く、確実だろうと促した。</p>
      <p>そして、あなたが頼るべき相手を三人、名指しする。ここキャンプ・ドラゴンヘッドに住むフォルタン家のニヌは旅人との語らいを好むという。アインハルト家の書記官クラヴランはアートボルグ砦群にいるが、引き出した情報は解釈に苦しむかもしれない、と。さらに、デュランデル家の占星術師長とは話したかと問い、まだならフォルタン家の友であることを伝えれば、多少は態度を改めるだろうと見込む。デゼマール家については自分が連絡すると言い、挙げた三人の助言を得たら戻るよう命じた。</p>
      <p>出立の前に、オルシュファンはあなたを炉辺へ招き、休むよう勧める。命は競争ではない、健康を顧みずに突き進めば、いつか必ず代償を払うことになるのだと、友としての気遣いを滲ませた。</p>
      <p>あなたはニヌに話を聞くが、求める飛空艇の手がかりは得られない。フォルタン家が何かを知っているなら自分が知らぬはずがない、と彼女は断言する。代わりに彼女が口にするのは、近頃誰もが噂するフランセル卿の行く末だった。近ごろアインハルト家から異端の罪に問われた者が相次いでいることもあり、彼に向けられた疑惑は遅すぎたくらいだと語る者さえいるという。</p>
      <p>次にあなたはアートボルグ砦群でクラヴランに会う。彼はハルオーネに力を願うほど追い詰められていたが、あなたがオルシュファンの友だと知ると、助けたいと訴える。だが異端の告発はアインハルト家を混乱に陥れ、今は疑いを退け、家名を守ることに注力せねばならないのだと語った。</p>
      <p>さらにあなたがデュランデル家の占星術師長を訪ねると、彼はオルシュファンの書状を受け取ったことを認めつつも、政策を曲げる気はないと言い放つ。戦は続き、敵は日ごとに大胆になっているのだと。審問官ギイェームがクルザスへ来て以来、イシュガルドの上流にさえ異端が次々と見つかったと語り、失われた飛空艇を追うオルシュファンの行いを愚かだと切り捨てる。彼がそれを選ぶのは勝手だが、他者まで巻き込むのなら、現状が見えていないのだと冷たく言った。</p>
      <p>手ぶらのままオルシュファンのもとへ戻ると、あなたの表情だけで結果を察したように、彼は静かに頷く。自分も有用な情報を得られなかった、と彼は認める。クルザス一帯は四大名家の異端の噂に呑まれてしまったのだ。今はただ、イシュガルドの内にいる彼の情報源が、より確かな手がかりをもたらしてくれることを願うしかない、と。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> オルシュファン　<small class="muted">クルザス中央高地 (X:26.7, Y:17.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-rose-and-the-unicorn.html">アインハルト家の受難</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 37～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="road-to-redemption.html">潔白の証明</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'四大名門',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Camp Dragonhead，Haurchefant 直言不諱：Ishgard 的四大名家——包括 House Fortemps——不是無法，就是不願，對你正在追尋的線索提供正式協助。但他也強調，名家之內仍可能有具分量的人物同情你的處境、願意伸手。他會寄出書信聯絡 Ishgard 的各方代表，不過他認為，由你親自去問，會更快也更有效率。</p>
      <p>他為你點出三條路。首先是住在 Camp Dragonhead 的 Lady Ninne（House Fortemps），她相當喜歡與旅人交談。再來是位於 Skyfire Locks 的 Cravellin（House Haillenarte），但他提醒你，從那名書記官口中挖出的情報，恐怕不容易釐清。最後，他問你是否已見過 House Durendaire 的 chief astrologian；若你還沒去，他會先告知對方你是 House Fortemps 的朋友，或許那人就會比較願意配合。至於 House Dzemael，他表示會親自去聯絡——你只需要向他提到的三人請益，事情辦完就回來覆命。</p>
      <p>在你動身前，Haurchefant 邀你在壁爐旁取暖、稍作歇息。他用帶著關切的語氣提醒你：人生不是競賽，若不顧身體只是一味往前衝，終有一天會為此付出代價。</p>
      <p>你先向 Lady Ninne 打聽，但她坦白自己對你提起的飛空艇一無所知。她甚至斷言，若 House Fortemps 真的知道任何相關消息，她一定也會知道。接著她話鋒一轉，提到如今眾人議論的焦點其實是 Lord Francel 的處境。有人認為對他的指控早就該來，因為近來 House Haillenarte 已有不少人被認定牽涉異端，這些風聲正把整個地區都攪得不安寧。</p>
      <p>你隨後前往 Skyfire Locks，見到 Cravellin 時，他正懇求 Halone 賜予力量，顯然心神焦灼。當他得知你是 Haurchefant 的朋友，立刻表明自己確實想幫忙——然而，異端的指控已讓 House Haillenarte 陷入混亂。眼下他們必須先集中精神應對指控、維持家族名聲，任何消息都變得支離破碎、難以分辨。</p>
      <p>接著你拜訪 House Durendaire 的 chief astrologian。對方承認收到了 Haurchefant 的信，內容甚至稱得上熱切，但他也冷淡地警告你：別以為這份推薦能讓他無視 Ishgard 的政策。他強調戰事仍在延燒，敵人日益猖狂；自從 Inquisitor Guillaime 抵達 Coerthas 以來，異端被接連揭發，連 Ishgard 的上層也未能倖免。他不客氣地把 Haurchefant 追尋失落飛空艇的行動視為愚行——Haurchefant 要這麼做是他的選擇，但若期待他人也陪著投入，那就是看不清眼前局勢。</p>
      <p>你回到 Camp Dragonhead 時，幾乎不必開口，Haurchefant 便從你的神情讀出了結果。他承認自己也沒有得到任何有用情報：整個 Coerthas 都被「四大名家出了異端」的傳聞吞沒，真正與你追尋之事相關的線索反而被淹沒得無影無蹤。如今他只能期盼，Ishgard 本城內的情報來源能帶回更有價值的消息。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 奧爾什方　<small class="muted"> 庫爾札斯中央高地 (X:26.7, Y:17.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-rose-and-the-unicorn.html">艾因哈特家遇難</a></div>
      <div class="row">所有職業（不含限定職） 等級 37 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="road-to-redemption.html">洗清嫌疑</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
