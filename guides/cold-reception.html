  EN:{
    langLabel:'English',
    pageTitle:'Cold Reception',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Eluned tells you that rites can be performed for most of the fallen Scions—but there is one they cannot accept. She asks you to return Noraxia to her own people, the sylphs of Little Solace, so she may be mourned in accordance with sylphic traditions. Before you depart, Eluned speaks with quiet bitterness of how people so often seek a better life at the cost of others, and how that hope can still give rise to suffering and death.</p>
      <p>When you arrive in Little Solace, Komuxio stares at you in surprise and asks why you have come. Then the sight of Noraxia steals the breath from the sylph, and grief breaks through the words. Hearing the commotion, Frixio comes at once, demanding to know what has happened—and when you tell him, he takes in not only Noraxia’s fate, but the many losses you have suffered as well.</p>
      <p>Frixio admits that Noraxia went to Thanalan at his behest, and his voice turns urgent as he asks you to tell him the truth: that she was brave, and that she did not suffer. When you answer him, he accepts your words with visible relief, thanks you for bringing her home, and asks that you also convey the sylphs’ gratitude to the praying ones who aided them.</p>
      <p>Komuxio’s sorrow soon hardens into fury. The sylph demands vengeance, swearing that the imperials must pay, and that when the day comes for you to face them, you must not forget the sylphs—Noraxia’s death must not be for naught. Yet even then, Komuxio looks to you with warmth, saying you have shown a kindness rare in many moons, and begging you to return again to make merry with them.</p>
      <p>Back in Drybone, Eluned thanks you for what you have done for the church and for the sylphs, and tells you that while you were away, the remaining Scions were interred in the lichyard. She knows you may wish to do more, but gently reminds you that you have already carried so much for your friends—and asks you, for now, to set your burdens down and rest.</p>
      <p>Not long after, Marques confides that he is certain he is being watched—something sinister, as if he is under observation. The feeling comes and goes, but he felt it again when he last went outside, and he pleads with you to look outside for him. When you do, an attacker strikes, and you return to find Marques shaken but unharmed, thanking the gods for your safety.</p>
      <p>Marques can only ask why—why someone was watching him, what the man wanted, and whether the answer lies in a past he can no longer grasp. Needing time to think, he asks to be left alone, then insists that Father Iliud must be told at once, fearing others may come for him again. Iliud is horrified that such violence occurred on holy ground, questions you for anything distinctive, and when he finds Garlean steel among what was left behind, he realizes what it means. He orders you to hurry to Camp Drybone, so the Immortal Flames can be summoned before more imperials come.</p>
      <p>Then Alphinaud arrives, displeased that he was not the first to speak with you, and makes his purpose plain: he has not come on the Empire’s behalf—he means to revive the Scions of the Seventh Dawn. He declares he has come seeking a legend, the greatest engineer of their time, and calls out to Master Cid Garlond. Iliud protests that the man here is only a poor soul who witnessed the horrors at Carteneau, but Alphinaud presses on, and the truth stirs—Marques falters, dazed by familiarity he cannot name. Iliud returns belongings that once belonged to Cid and, with heartfelt parting words, tells him it is time to help those who truly need him.</p>
      <p>Alphinaud introduces himself and explains what has happened: the Scions were struck down at the Waking Sands, and while the city-states turned to rebuilding after the Calamity, the primal threat was left to the Scions alone—until they were nearly destroyed. Now the Ixal have summoned Garuda again, and she torments the people of Coerthas; her hunger for destruction is worse than other primals, and those who study such things believe she now surpasses both Ifrit and Titan in strength. Yet if Garuda could be defeated, it would warn the beast tribes that even their mightiest gods can fall. To reach her, they must circumvent the tempest that guards her sanctuary—and for that they need an airship: Cid’s airship, last seen over Gridania not long before the Calamity. Cid can barely comprehend it, but the words take hold all the same: they need his airship—and they need him.</p>
    </div>

    story:`<div class="clamp" data-collapsed="true">
      <p>エルネドは、倒れた「暁の血盟」の仲間たちの多くには弔いの儀を行えるが、ひとりだけ受け入れられない者がいるのだと告げる。それはノラクシアであり、彼女を「シルフの仮宿」の仲間たちのもとへ返し、シルフのしきたりに従って弔ってもらいたいという。旅立つあなたに、エルネドは、人はよりよく生きようとして、しばしば他者を踏みにじってきたこと、その望みが苦しみと死を生むこともあるという、悔やましくも否定できない現実を語る。</p>
      <p>「シルフの仮宿」に着くと、コムシオはあなたの来訪に驚き、何用かと問う。しかしノラクシアのことを知った瞬間、言葉は途切れ、涙混じりの息が漏れる。騒ぎを聞きつけたフリクシオが現れ、何が起きたのかと厳しく問いただし、あなたの説明を聞いて、ノラクシアだけでなく、あなたの仲間たちにも多くの犠牲が出たことを知る。</p>
      <p>フリクシオは、ノラクシアが自分の命でザナラーンへ向かったのだと明かし、そして切実に求める。最期に彼女と共にいたのなら、勇敢だったと、苦しまなかったと、この身に言い聞かせてほしいのだと。あなたがその言葉を返すと、フリクシオは安堵をにじませ、ノラクシアを連れ帰ってくれたことに礼を述べる。さらに、祈る者たちにも感謝していること、この恩は忘れないと伝えてほしいと頼む。</p>
      <p>だがコムシオの悲しみはやがて怒りへ変わる。帝国の者たちに報いを、痛みを、と叫び、いずれあなたが帝国兵と相まみえる時が来たなら、シルフのことも忘れるなと誓いを迫る。ノラクシアの死を無駄にしないため、シルフも戦うのだと言い切る。それでも最後にコムシオは、長い月日でこれほど親切な「歩く者」には会っていないと告げ、また戻ってきて共に楽しく過ごしてほしいと願う。</p>
      <p>その後、あなたがドライボーンへ戻ると、エルネドは教会とシルフのための働きに礼を述べ、不在の間に、残る「暁の血盟」の仲間たちを墓地へ葬ったと知らせる。まだ友のために何かをしたいと思うかもしれないが、それでもあなたは十分に背負ってきたのだと諭し、今だけは重荷を下ろして休むよう静かに勧める。</p>
      <p>やがてマルケズは、誰かに見られているという確信をあなたに打ち明ける。それはただの気のせいではなく、邪悪で、監視されているかのような感覚だという。感じたり消えたりするが、外へ出た時にも確かにあったのだと繰り返し、ほんの少しでいい、外を見てきてほしいと懇願する。あなたが応じると襲撃が起こり、戻ってきたあなたを見たマルケズは、無事でよかったと神に感謝しながらも、なぜ狙われたのかと震える声で問う。</p>
      <p>マルケズは、あの男はなぜ自分を見張っていたのか、何を望んでいたのか、失われた過去と関わりがあるのかもしれないと、答えのない疑問に囚われる。そしてひとりで考える時間を求めた直後、やはりイリュド神父に知らせねばならないと訴え、また帝国の者が来るかもしれないと怯える。イリュドは聖地での凶行に愕然とし、手がかりを求めるが、残された品がガレマール帝国の鋼だと分かった瞬間、その意味を悟る。これ以上の帝国兵を招く前に、不滅隊を呼ばねばならないとして、あなたにキャンプ・ドライボーンへ急ぐよう命じる。</p>
      <p>そこへアルフィノが現れ、あなたに先んじて言葉を交わせなかったことを不満げにしつつ、帝国のためではないと明言する。彼は「暁の血盟」を復活させるために来たのだと言い、伝説の技術者、シド・ガーロンドを探していると告げて、マルケズへ呼びかける。イリュドは、彼はカルテノーの惨禍を目撃した哀れな男に過ぎないと庇い、立ち去るよう頼むが、アルフィノは引かない。揺らぐ記憶の中で、マルケズは言い知れぬ既視感に呑まれ、イリュドはシドの持ち物を手渡し、短い間でも息子が戻ってきたようだったと告げたうえで、本当に助けを必要とする者のために力を貸してほしいと背中を押す。</p>
      <p>アルフィノは名乗り、「暁の血盟」が砂の家で襲撃され、霊災後の復興に注力する三国が蛮神への対処を血盟に任せきりにした結果、組織が壊滅寸前に追い込まれたことを語る。いまイクサル族はガルーダを再び呼び出し、クルザスの人々を苦しめている。破壊への渇望は他の蛮神を凌ぎ、研究者たちは、その力がイフリートやタイタンをも上回ると見ているという。だがガルーダを討てれば、獣人たちに「最強の神ですら倒せる」という警告となる。そのためには、聖域を守る暴風を突破せねばならず、必要なのは飛空艇――シドの飛空艇だ。霊災の少し前、グリダニア上空で目撃されたというその機体を探すため、まずは手がかりを追うことになる。シドは戸惑いながらも、その言葉に引き寄せられ、必要とされているのは飛空艇だけではなく、自分自身なのだと呟く。</p>
    </div>

    </div>`,
    unlockq:`<div class="stack">

    </div>`,

    </div>`

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'越過那座高山',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Eluned 告訴你，大多數倒下的 Scions 都能在教會接受安葬與儀式，但其中有一位卻無法被收容。她請你把 Noraxia 送回她的族人——Little Solace 的 sylphs——讓她能依照 sylph 的傳統，由朋友與同族好好哀悼。臨行前，Eluned 低聲說起：人們總想讓日子變得更好，卻常常以傷害他人為代價；而那份渴望與希望，最終也可能催生痛苦與死亡——令人遺憾，卻無法否認。</p>
      <p>你抵達 Little Solace 時，Komuxio 驚訝地看著你，詢問你為何會出現在這裡。可當 Noraxia 的事實擺在眼前，Komuxio 的聲音瞬間斷裂，哽咽與震驚一起湧上來。Frixio 聽見騷動立刻趕來，急切追問究竟發生了什麼；而當你把經過說清楚，他不只聽見 Noraxia 的結局，也明白你失去的並不只有她，還有許多同伴。</p>
      <p>Frixio 坦承，是他讓 Noraxia 前往 Thanalan。得知你曾陪在她最後的時刻，他近乎懇求地要你說出那句他最想聽見的真相——她很勇敢，她沒有受苦。你把能回答的都如實說出後，Frixio 像是終於能喘一口氣般接受了你的話，向你道謝，感謝你把 Noraxia 帶回來；他也請你轉告那些祈禱者，sylphs 會記得這份善意。</p>
      <p>然而 Komuxio 的悲傷很快轉為憤怒。他喊著要復仇，說 imperial ones 必須付出代價、必須承受痛苦；他要你答應，等到你與 imperials 正面交鋒的那一天，不要忘了 sylphs——Noraxia 的死不能白費，sylphs 也會戰鬥。可在怒火之外，Komuxio 仍對你流露出罕見的親近：他說自己許多個月來都沒遇過像你這樣善良的外來者，並希望你還會再回來，和他們一起歡笑。</p>
      <p>你回到 Drybone 後，Eluned 感謝你為教會與 sylphs 所做的一切，並告訴你在你離開期間，其餘的 Scions 已被安葬在墓園裡。她知道你或許還想為朋友做更多事，但也溫柔提醒：你已經為他們背負太多了——現在先把重擔放下，讓自己休息一下。</p>
      <p>不久後，Marques 私下向你吐露：他確信自己被人盯上了。那不是普通的不安，而是一種陰沉、彷彿被監視的感覺；時有時無，但他在上次外出時又清楚感受到了。他請你幫他往外看看，說只要一會兒就好。你照做後遭到襲擊，回到他面前時，Marques 先是慶幸你沒有受傷，隨即又被更深的恐懼吞沒——他知道那個人確實在看著他，卻想不出原因。</p>
      <p>Marques 反覆追問：那人究竟想從他身上得到什麼？是否知道他失去記憶前的過去？他懊惱自己沒能問出答案，想要獨處片刻理清思緒，卻又立刻改口，說 Father Iliud 必須知道這件事——他擔心還會有其他人再來。Iliud 得知在聖地竟發生襲擊，震驚又憤怒，追問你是否注意到對方的裝束或物品；當他辨認出留下的是 Garlean steel，他立刻明白事態的嚴重性，催促你趕往 Camp Drybone，召集 Immortal Flames，以免更多 imperials 再度出現。</p>
      <p>就在此時，Alphinaud 現身，帶著不悅說自己原本希望能先一步與你談話。他明確表示自己不是為 Empire 而來，正相反——他要讓 Scions of the Seventh Dawn 重獲新生。為此，他前來尋找一位傳奇般的工程師：Master Cid Garlond。Iliud 認為他弄錯了，說教會裡的這名男子只是親眼見過 Carteneau 慘劇的可憐人，請他離開；但 Alphinaud 仍堅持呼喚 Cid。Marques 也被那些話撼動，熟悉感在腦中翻攪卻抓不住形狀。Iliud 取出屬於 Cid 的物品交還給他，帶著不捨與期盼說：短暫相處像是兒子回到了自己身邊，但現在，是時候去幫助真正需要你的人了。</p>
      <p>Alphinaud 隨即說明現況：自 the Waking Sands 的襲擊後，Scions 幾乎被摧毀；在 Calamity 之後，三大城邦將心力都放在重建，使得 primal 的威脅長期由 Scions 獨自承受。如今 Ixal 再次召喚 Garuda，她正在 Coerthas 折磨百姓；她的破壞欲遠勝其他 primal，而研究者更認為她的力量已超過 Ifrit 與 Titan。可若能擊敗 Garuda，便能警告各族：就算是他們最強大的神祇也能被擊倒。問題在於，她的領域被暴風守護，若想突破那道風暴，就需要一艘飛空艇——Cid 的飛空艇。那艘飛空艇在 Calamity 前不久曾於 Gridania 上空出現，因此你們將從追尋它的線索開始。Cid 雖仍困惑，卻也被迫承認：他們需要的不只是那艘飛空艇——他們也需要他。</p>
    </div>

const LANG_KEY = 'ffxiv-guide-lang';
const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
