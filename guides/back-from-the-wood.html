const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Back from the Wood',

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>At the Adders’ Nest, Vorsaile Heuloix does not hide his relief. The sylphs have long been friends to Gridania, he says, and the very thought of war with them weighed heavily on the Elder Seedseer. Thanks to what you achieved in the Twelveswood, she can rest easier—and in time, he believes her benevolence will drive her to seek a way to undo the tempering itself. He thanks you once more, then adds that without the Scions of the Seventh Dawn stepping in to mediate, suspicion and doubt might have dragged both sides into a conflict that never needed to happen. Before you part, he asks you to pass his regards to Lady Minfilia.</p>
      <p>Not long after, Minfilia’s voice reaches you through a linkpearl, checking that you can hear her. Yda and Papalymo have already returned, she says, and they lost no time recounting what you did. Because of your efforts, one primal can be struck from the list of enemies, and the Gridanians can focus on more urgent dangers. Yet she does not let the praise linger for long—the end of one tale is only the start of another, and she asks you to return to the Waking Sands as soon as you can so she may explain the situation in person.</p>
      <p>When you arrive in Western Thanalan, Tataru greets you with her usual enthusiasm and ushers you toward the solar, where Minfilia awaits. Inside, you find Alphinaud already in discussion with her. He has heard that the matter of Ramuh is “resolved,” but Minfilia cautions against mistaking a reprieve for permanence; still, she is satisfied that the Lord of Levin will not trouble you in the foreseeable future. Their conversation turns immediately to the wider investigation—Thancred is sparing no effort, Alphinaud reports, and while they have confirmed the enemy is “many and one,” their purpose remains unclear. Minfilia then admits she has scarcely seen Alisaie of late; Alphinaud hasn’t either, he says, and though she has chosen to walk her own path, their destination remains the same. With that, he takes his leave, trusting that the Baldesion report will be of use.</p>
      <p>Minfilia turns her full attention to you and welcomes you back with warmth, congratulating you on averting conflict in the Twelveswood and praising you for doing the Scions proud. Papalymo is equally brisk: Ramuh can be struck from the list. Yda immediately jumps to the next worry—Leviathan and the sahagin—but Papalymo explains that the Lord of the Whorl has not answered his minions’ call of late, and is not expected to do so soon. The sahagin remain aggressive, yet they lack the quantity of crystals needed to summon their god, so they can be left—“for a time,” as Papalymo puts it. Y’shtola repeats the phrase with pointed emphasis, warning that you cannot afford complacency; unless you understand the minds of the beast tribes, you cannot predict when a primal will rise again. Asked about Titan, Y’shtola adds that the Maelstrom keeps the kobolds under constant watch, and word will come before long. The names keep coming—Garuda, the Ixal near Gridania—and Minfilia can only sigh at the malms to cover, wishing for a more efficient way to conduct these surveys. Biggs agrees with a weary sigh, wondering aloud where their missing “Chief” could be, until Minfilia steadies the room: one sure step at a time. Henceforth, the Order of the Twin Adder will handle matters pertaining to the sylphs under the Seedseers’ guidance, and she bids everyone take a moment’s respite—you have earned it.</p>
      <p>When Minfilia asks if there is anything else, you bring up the detail that has been gnawing at you: a man in a red mask, robed in black. The change in her expression is immediate. A man named Lahabrea—Twelve preserve—she breathes, alarmed at the thought. Before the Calamity, the Ascians labored to remain hidden; for one to act so brazenly in plain sight bodes ill. Minfilia tries to press on, insisting that you must take advantage of this lull in primal hostilities to learn all you can about Lahabrea and his designs… but her words are cut short by Tataru’s scream. A sylph—in Thanalan? And then Noraxia is there, having come at last to find you, announcing herself as a friend sent by Elder Frixio to help the “walking ones,” urging friendship with the same earnest simplicity she always carried. Tataru, pale and shaking, manages a hesitant greeting in return.</p>
      <p>After the commotion settles, Minfilia speaks with a gentler smile, lightly chiding Tataru for being as quick to fright as she is to express everything else. Not all of you are forged of the same steel, she says—yet it takes all kinds to make a family, and it pleases her deeply to see yours continue to grow. One by one, the people of Eorzea are beginning to unite, drawn toward the hope that shines within you. Even so, she cannot ignore the shadow pressing in around that light: she has never doubted the Ascians’ presence, but their new boldness—working openly, without the veil of secrecy—fills her with deep foreboding.</p>
    </div>

    langLabel:'日本語',

    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },

    story:`<div class="clamp" data-collapsed="true">
      <p>双蛇党の統合司令部で、ヴォルセール・ウル・ヘルロワは安堵を隠さない。シルフ族は古くからグリダニアの友であり、彼らと戦うなどという考えは長老神官の心を痛めてきたという。だがあなたの尽力によって、今はようやく胸を撫で下ろせる――そして慈悲深い長老神官なら、いずれテンパードを元に戻す道さえ探そうとするだろうと語る。さらに彼は、暁の血盟が両者の間に立たなければ、疑念と不信が無益な衝突を招いていたかもしれないと述べ、最後にミンフィリアへよろしく伝えてほしいと頭を下げた。</p>
      <p>ほどなくして、リンクパール越しにミンフィリアの声が届く。聞こえるかと確かめながら、イダとパパリモは先に戻っており、あなたの働きを熱心に語ってくれたのだと告げる。あなたのおかげで、敵と見なすべき蛮神がひとつ減り、グリダニアはより差し迫った問題へ目を向けられる――よくやった、と。だが彼女はすぐに言葉を引き締め、ひとつの物語の終わりは次の始まりだとして、できるだけ早く砂の家へ戻り、直接状況を伝えたいと促す。</p>
      <p>西ザナラーンに着くと、タタルはあなたを出迎え、ミンフィリアが奥の執務室で待っていると案内する。室内では、すでにアルフィノがミンフィリアと話を交わしていた。ラムウの件が「解決」したと聞いたアルフィノに対し、ミンフィリアは恒久を示す言葉は慎むべきだとしつつも、雷の蛮神が当面は問題を起こさない見通しには満足していると答える。続いて調査の進捗が語られ、サンクレッドは全力を尽くしているが、相手が「多にして一」であることは掴めても、その目的はいまだ掴めないという。ミンフィリアは最近アリゼーの姿をほとんど見ないことを気にかけ、アルフィノも同様だと認める。彼女は自分の道を選んだが、行き着く先は同じだ――そう言い残し、アルフィノはバルデシオン報告書を託して席を辞した。</p>
      <p>ミンフィリアは改めてあなたに向き直り、黒衣森での働きを称えて和平を回避できたことを喜ぶ。パパリモは手早く結論を口にし、ラムウは対処すべき蛮神の一覧から外せると言う。イダは次を問うが、パパリモはリヴァイアサンが近頃は呼びかけに応じておらず、近い将来に現れる見込みも薄いと説明する。サハギン族は相変わらず攻撃的だが、蛮神を呼ぶだけのクリスタルが足りず、しばらくは放置できる――ただし「しばらくは」だと強調され、ヤ・シュトラは油断の危険を釘刺す。蛮族の心を知らねば再召喚の時期は読めず、慎重さを保ったまま急がねばならない。タイタンについては、黒渦団がコボルド族を常に監視しており、遠からず報せが来るだろうと語られる。話題はガルーダやイクサル族へも及び、ミンフィリアは広大な距離を嘆き、もっと効率的な方法があればと漏らす。ビッグスも同調して主任の行方を案じるが、ミンフィリアは一歩ずつ進もうと場を整え、今後シルフ族に関する案件は神官の導きのもと双蛇党が担当すると宣言する。そして皆に、束の間の休息を楽しんでほしい――それだけの働きをしたのだと。</p>
      <p>ほかに気になることはあるかと問われ、あなたは赤い仮面をつけ黒衣をまとった男のことを伝える。ミンフィリアの表情は一変し、名はラハブレアだと口にして震える。第七霊災以前、アシエンは姿を隠すことに腐心していたはずなのに、今は公然と動いている――それは不吉だと言う。蛮神の脅威が一時的に落ち着いている今こそ、ラハブレアとその企みを調べねばならないと続けかけた瞬間、タタルの悲鳴が響いた。ザナラーンにシルフ族がいる――そしてノラクシアが現れ、長老フリクシオの命であなたを助けに来た友だと名乗り、友だちになろうと真っ直ぐに訴える。怯えたタタルも、震えながら挨拶を返した。</p>
      <p>騒ぎが収まったあと、ミンフィリアは柔らかく笑い、タタルは驚きも表現も全力だと冗談めかして言う。皆が同じ鋼で鍛えられているわけではないが、家族とはそうして成り立つ――そしてその輪が広がっていくことが嬉しいのだと。エオルゼアの人々は少しずつ結びつき始め、あなたの内に輝く希望へ引き寄せられている。だが、その光を呑み込もうとする闇があるとも彼女は語る。アシエンの存在自体は疑っていなかったが、あまりに大胆に表舞台で動くようになったことが、深い不安を呼び起こすのだと。</p>
    </div>

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'從森林歸來',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Adders’ Nest，Vorsaile Heuloix 的語氣明顯鬆了下來。他說 sylphic folk 一直都是 Gridania 的朋友，光是想到可能與他們開戰，就足以讓 Elder Seedseer 心痛不已。但因為你的努力，她終於能比較安心——而以她那份仁慈的性格，接下來一定會試著找出逆轉 tempering 的方法。Vorsaile 再次向你致謝，並坦言若不是 Scions of the Seventh Dawn 願意出面調停，兩邊的猜疑與不安很可能早已把彼此推進一場毫無必要的衝突。他最後請你把他的問候轉達給 Lady Minfilia。</p>
      <p>不久後，Minfilia 的聲音透過 linkpearl 傳來，先確認你是否聽得清楚。她說 Yda 和 Papalymo 已經回來一段時間了，而且第一時間就把你的經過講得鉅細靡遺。多虧了你，名單上可以少掉一位 primal，Gridania 也能把注意力轉向更迫切的問題——做得好。可她隨即提醒你，結束一段故事往往意味著另一段故事正要開始；她要你盡快回到 The Waking Sands，她想親自把目前的狀況告訴你。</p>
      <p>你回到 Western Thanalan，Tataru 立刻熱情迎接，說 Minfilia 正在 solar 等你，你隨時可以進去。房內，Alphinaud 也在場，正和 Minfilia 討論 Ramuh 的事。Alphinaud 聽說此事已「解決」，Minfilia 卻謹慎地表示，這個詞聽起來太像永久的定案；但她仍滿意於一點——Lord of Levin 在可預見的未來應該不會再造成麻煩。談話很快轉到調查本身：Alphinaud 說 Thancred 正不遺餘力，敵人確實「many and one」，正如你們推測，但他們的目的仍舊難以捉摸。Minfilia 又想起一件小事：她好像很久沒見到 Alisaie 了；Alphinaud 也承認自己同樣如此——Alisaie 選擇走自己的路，固執得很，但目標仍然一致。說完，他告辭離開，並把 Baldesion report 交給 Minfilia。</p>
      <p>Minfilia 接著把視線轉向你，真誠地恭喜你在 Twelveswood 的勝利，說因為你，衝突被避免了，你讓 Scions 引以為傲。Papalymo 乾脆地下結論：Ramuh 可以從名單上劃掉。Yda 馬上追問下一個是不是 Sahagin 和 Leviathan，而 Papalymo 解釋 Lord of the Whorl 近期沒有回應呼喚，也不太可能在短期內現身；雖然 Sahagin 依舊好戰，但他們缺乏召喚所需的大量 crystals，所以暫時可以先放著——「for a time」，他特別強調。Y’shtola 也重複那句話，提醒你們絕不能自滿；不理解 beast tribes 的心思，就無法預測下一次 primal 何時再度出現，因此你們必須在謹慎之中盡可能加快腳步。談到 Titan，Y’shtola 說 Maelstrom 正嚴密監視 kobolds，很快就會有消息。接著又提到 Garuda 與住在 Gridania 附近的 Ixal，Minfilia 無奈感嘆要跑的距離實在太多，若有更有效率的調查方式就好了。Biggs 也嘆氣附和，掛心著他們的 Chief 到底在哪裡；Minfilia 便收束眾人的心思，說一步一步來——從現在起，關於 sylphs 的一切將交由 Order of the Twin Adder 在 Seedseers 的指導下接手，並要大家好好享受片刻的喘息，因為你們確實值得。</p>
      <p>當 Minfilia 問你是否還有別的事，你把那個細節說出口：一名戴著 red mask、身披黑袍的男人。Minfilia 的反應瞬間變得凝重，她低聲念出名字——Lahabrea——並感到不祥。她說在 Calamity 之前，Ascians 一直極力維持隱密，如今卻膽大到在眾目睽睽下行動，這太不對勁。她正要說必須趁 primal 的威脅暫時平息之際，盡快調查 Lahabrea 與他的企圖，卻被 Tataru 的尖叫打斷。她驚呼：一個 sylph……在 Thanalan？下一刻，Noraxia 出現了——它終於找到你，自稱是 Elder Frixio 派來幫助 walking ones 的朋友，並用最直接的語氣請求：讓 these ones 與你們成為朋友。Tataru 雖然嚇得發抖，仍結結巴巴地向 Noraxia 打招呼。</p>
      <p>風波過後，Minfilia 露出稍帶玩笑的微笑，說 Tataru 對害怕的表達和對任何事的表達一樣迅速；不是每個人都像你一樣「鋼鐵鍛成」，但正因為各種不同的人聚在一起，才叫做家人。她說她很高興看到你們的「家」繼續成長——一個又一個，Eorzea 的人們正開始團結，並被你心中閃耀的希望所吸引。然而她也坦言，黑暗正在威脅要吞沒這道光：她從未懷疑 Ascians 的存在，但他們如今竟然如此肆無忌憚、在明面上行事，讓她感到深深的不安與預兆。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
