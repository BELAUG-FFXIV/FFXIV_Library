    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', compreward:'Completion Reward', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>No sooner have you returned than Count Edmont prepares to praise all you have accomplished beside Artoirel and Emmanellain. He thanks you for saving the younger son’s life and tells you that House Dzemael and House Durendaire alike have sent letters commending both your conduct and that of House Fortemps. For a fleeting moment, it seems your efforts have brought only honor. Then the steward bursts in with grave news, and that calm is shattered. Alphinaud and Tataru, he says, have been detained on suspicion of fomenting heresy. They were seen entering a tavern in the lower levels several times, asking questions that allegedly brought them into contact with disreputable elements, and on that basis Ser Grinnaux of the Heavens’ Ward demanded that they be taken in for questioning.</p><p>Edmont is quick to see the shape of the matter. Ser Grinnaux, he says, is a blunt instrument—dangerous, capable, and easily used. Worse still, he is a son of House Dzemael, and Edmont has little doubt that Alphinaud and Tataru are being used as pawns in one of the petty games the High Houses play against one another. Though your successes have won admiration in Ishgard, they have also stirred resentment among those who will never willingly be moved by deeds alone. The count believes the truth is on your side, but truth means little if innocence cannot be proven. For that, he sends you to Ser Aymeric at the Congregation of Our Knights Most Heavenly, trusting that he will know more of the charges and how they might be answered.</p><p>At the Congregation, you find both Aymeric and Haurchefant already aware of what has happened. Haurchefant can scarcely contain his outrage, especially after all the Scions have done for Ishgard—driving back heretics, defeating Shiva, defending the Steps of Faith, and standing against Dravanian Horde. Aymeric, however, remains measured. He has no doubt that the accusations are false, yet the difficulty lies in who made them. Grinnaux is one of the Heavens’ Ward, the archbishop’s twelve personal knights, whose testimony stands beyond ordinary challenge. Since Aymeric has no authority to overturn their actions, he sees only one path left: a trial by combat. Under Ishgardian law, the accuser and accused must face one another in battle, and in this case Alphinaud and Tataru would be expected to stand against Ser Grinnaux and another knight of his choosing.</p><p>That would be ruinously unfair were the law not to allow one small mercy. Because Alphinaud’s talent with magic is known, he cannot avoid taking part. Tataru, by contrast, is obviously no fighter, and so she may name a champion to stand in her stead. Aymeric offers himself, and Haurchefant would do the same without hesitation, but neither pretends there is a better choice than you. Haurchefant hurries off to inform Alphinaud, while Aymeric warns that the trial will be held before many who care deeply about the verdict, and that the knights of the Heavens’ Ward will test even a warrior such as you. When the proceedings begin, Haurchefant quietly explains the order of the ritual to you and tells you exactly when to enter—at the moment Tataru’s right to name a champion is acknowledged.</p><p>So the trial is convened beneath Halone’s gaze. Grinnaux restates his accusation, claiming that Alphinaud and Tataru consorted with heretics. Alphinaud answers at once, asserting his innocence and claiming the right to trial by combat. Tataru does the same, though she openly declares that she is no warrior and therefore claims the right to name a champion. When the high adjudicator accepts this, your moment comes. Alphinaud, who had nearly lost faith in Ishgardian justice, welcomes you without hesitation, and together you move to end what he calls this mummer’s farce. In the battle that follows, Alphinaud does what he can to support you while Grinnaux and Ser Paulecrain press their assault with all the force and contempt of men convinced of their own righteousness. Yet false witness cannot withstand the truth forever. Between your strength and Alphinaud’s aid, the two knights are defeated.</p><p>With that, the judgment is rendered. The Fury has spoken, the high adjudicator declares, and Alphinaud Leveilleur and Tataru Taru are acquitted of all charges. Tataru, hardly able to believe it, bursts out that you have won, while Alphinaud speaks more quietly, thanking you once again for saving him from another untimely death. The victory sends a wave of relief through those who stood by your side. Haurchefant, unable to contain his joy, all but overflows with admiration at the sight of such courage, friendship, and resolve shown under pressure.</p><p>Still flushed with excitement, he insists that such a triumph must be marked with a gift. From him, you are to receive a chocobo whistle, one that will summon a black chocobo trained not only to serve as a mount, but to fly. He presents her with unmistakable pride, praising her strength, grace, and eagerness, and asks whether you will accept her as your steed. Yet the solemnity of the place collides at once with Haurchefant’s enthusiasm, for an inquisition guard immediately protests that chocobos are forbidden within the tribunal and that the bird must remain outside. Even after peril, accusation, and battle, the moment ends not in grandeur, but in a small absurdity—one last reminder that Ishgard, for all its severity, is never without its peculiar edges.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    langLabel:'JP',
    pageTitle:'蒼天の騎士',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', compreward:'クリア報酬', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたが戻ると、エドモン伯爵はアルトアレールやエマネランとともに果たした働きを称えようとしていた。若きエマネランの命を救ってくれたことへの礼を述べ、さらにデゼマール家とデュランデル家の双方から、あなたとフォルタン家の振る舞いを称賛する書状まで届いていると語る。ほんの束の間、あなたの尽力がただ名誉だけをもたらしたかのように思われる。だがそこへ執事が血相を変えて飛び込み、その静けさは一瞬で破られる。アルフィノとタタルが、異端を扇動した疑いで拘束されたというのだ。下層の酒場へ何度も出入りし、そこでの聞き込みが好ましからぬ者たちとの接触に繋がった――そう見なされ、蒼天騎士団のひとり、グリノーが取り調べを命じたのだという。</p><p>伯爵は、その背後にあるものをすぐに見抜く。グリノーは荒っぽく実直な男ではあるが、同時に他人に利用されやすい手駒でもある。そして彼がデゼマール家の人間である以上、アルフィノたちが高位貴族どうしの小競り合いに巻き込まれたのだろうと、伯爵は冷ややかに見る。あなたの働きは多くの者の心を動かしたが、その一方で、決して認めようとしない者たちの反感も買ってしまった。真実はこちらにあるのだとしても、それを証明できなければ何の意味も持たない。だからこそ伯爵は、罪状の詳細を知るため、神殿騎士団総長アイメリク卿のもとへ向かうようあなたに勧める。</p><p>神殿騎士団本部では、アイメリクとオルシュファンがすでに事の次第を知っていた。異端者討伐、シヴァ打倒、ドラゴンズエアリー防衛、そして Dravanian Horde の撃退に至るまで、暁の血盟がどれほど Ishgard のために尽くしてきたかを思えば、オルシュファンはこの仕打ちに憤りを隠せない。だがアイメリクは、冷静に現実を語る。嫌疑そのものが根拠に乏しいことは疑いない。問題は、それを申し立てたのが蒼天騎士団の騎士であるという点だった。蒼天騎士団は教皇直属の十二騎士であり、その証言は通常の権限では覆せない。ゆえに彼に残された手立てはひとつしかない――決闘裁判である。イシュガルドの法では、告発者と被告が武をもって真実を争う。今回であれば、アルフィノとタタルは、グリノーと、彼が選ぶもうひとりの蒼天騎士と戦わねばならない。</p><p>それはあまりに不利な条件に思えたが、法はひとつの救いも残していた。アルフィノは魔法の使い手として知られている以上、自ら戦わざるを得ない。だがタタルは明らかに戦う術を持たぬため、代理の闘士を指名する権利が認められるのだ。アイメリクは自分がその役を務めてもよいと言い、オルシュファンもまた同じ気持ちでいる。けれど、その場の誰もが知っていた。もっともふさわしい者は、ほかならぬあなただと。オルシュファンはただちにアルフィノへ知らせに向かい、アイメリクは審理院に多くの思惑を持つ者たちが集まること、そして蒼天騎士団の騎士が相手となる以上、万全の備えが必要だとあなたに告げる。やがて裁判が始まる直前、オルシュファンは手順を丁寧に説明し、タタルの代理人指名が認められた瞬間こそが、あなたの出るべき時だと念を押す。</p><p>こうして、ハルオーネの御前で決闘裁判が開かれる。グリノーは改めて、アルフィノとタタルが異端者と通じていたと告発する。アルフィノはただちに潔白を主張し、決闘裁判の権利を求める。タタルもまた無実を訴え、自分は戦士ではないゆえに代理人を立てる権利を行使すると宣言する。そして高等裁定官がその権利を認めた瞬間、あなたが進み出る時が訪れる。イシュガルドの正義に疑いを抱きかけていたアルフィノも、あなたの姿を見るなり迷いを捨て、この芝居じみた茶番を終わらせようと呼びかける。戦いが始まると、アルフィノは持てる力であなたを支え、グリノーとポールクレインは高慢さと敵意をむき出しにして襲いかかってくる。だが偽りの証言は、ついに真実を打ち倒すことはできなかった。あなたの力とアルフィノの援護の前に、ふたりの蒼天騎士は敗れる。</p><p>勝敗が決した以上、裁きもまた定まる。ハルオーネの御心は示されたと高等裁定官は宣し、アルフィノ・ルヴェユールとタタル・タルの無罪を言い渡す。タタルは自分たちが勝ったのだと半ば信じられないまま歓声を上げ、アルフィノはより静かに、またしても命を救われたことへの礼をあなたに述べる。その勝利に、味方たちの胸にもようやく安堵が満ちていく。なかでもオルシュファンは興奮を隠そうともせず、逆境の中で示された勇気と友情の絆に深く心を揺さぶられたのだと、惜しみなく称賛を注ぐ。</p><p>そして、その熱の冷めぬうちに、これほどの勝利を手ぶらで終わらせるわけにはいかないとばかりに、彼は贈り物を差し出す。黒衣森西部高地へあなたを運んだのと同じように、空を飛ぶよう訓練された黒チョコボを呼べる笛だという。強く、しなやかで、優美でありながら飛翔の力を備えた頼もしい相棒を、ぜひ受け取ってほしいと誇らしげに勧める。だが、その高揚はすぐに場違いな現実へ引き戻される。審理院の衛兵が、ここではチョコボの持ち込みは禁止だと真顔で割って入り、乗騎は外へ出してほしいと告げたのだ。苛烈な裁きも死闘も乗り越えた直後だというのに、最後に残るのはどこか拍子抜けするような一幕だった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>你才剛回到 Fortemps Manor，Count Edmont 便正準備親自向你表達感謝。他不只感激你救回了年輕的 Emmanellain，還告訴你，House Dzemael 與 House Durendaire 都寄來了信，稱讚你這段時間的表現，也連帶讚揚了 House Fortemps。就在一切彷彿終於開始朝好的方向發展時，僕從卻忽然神色慌亂地闖了進來，把那點短暫的平靜徹底打碎。他帶來的消息沉重得讓人一時難以消化，Alphinaud 和 Tataru 因為涉嫌煽動異端而被扣押了。據說，有人看見他們多次進出下層的酒館，並在那裡四處打聽消息；而這些打聽，最終讓他們接觸到了某些「不乾淨的人」。正因如此，來自 Heavens’ Ward 的騎士 Ser Grinnaux 便要求將他們帶去問話。</p><p>Count Edmont 幾乎立刻就看出了這件事背後的氣味。他毫不掩飾自己對 Ser Grinnaux 的看法，說那人是個粗暴的武夫，雖然本事不差，卻終究只是個武夫。更糟的是，他還偏偏出身 House Dzemael。對 Count Edmont 來說，這整件事多半只是 Ishgard 高位家族之間又一次難看的算計，而 Alphinaud 與 Tataru 不過是被推上檯面的棋子而已。即使你已經用行動贏得了不少 Ishgard 人的敬意與好感，也仍會有人無論如何都不願改變立場。他們會輕視你的努力，嫉恨你所得到的稱讚，甚至在眾人為你喝采時，更加不願讓你順利站穩腳步。Count Edmont 相信你的朋友們是清白的，可若無法證明這件事，真相本身也毫無用處。於是他要你立刻去找 Ser Aymeric，因為對這些指控真正了解的人，現在恐怕只有他。</p><p>到了 Congregation of Our Knights Most Heavenly，你發現 Haurchefant 與 Aymeric 也早已得知此事。Haurchefant 幾乎無法壓住心中的怒氣。Scions 明明為 Ishgard 做了那麼多事——清剿異端、擊敗 Shiva、協助防守 Steps of Faith，還一再幫助 Ishgard 擊退 Dravanian Horde（以 Nidhogg 為中心、盤踞 Dravania 一帶的龍族與龍類眷屬勢力，長年與 Ishgard 對立，是 Dragonsong War 中的主要龍族陣營），可如今竟還要被這樣懷疑，實在荒唐得令人發笑。Aymeric 卻依然維持著冷靜。他直言，Ser Grinnaux 的指控毫無根據，這點他並不懷疑；真正棘手的地方，在於提出這些指控的人偏偏是 Heavens’ Ward 的一員。Heavens’ Ward（直屬於大主教的十二名精銳騎士，是 Ishgard 地位最高、權威最不容置疑的騎士集團）只對大主教本人負責，他們的證詞幾乎不容質疑，而 Aymeric 也無權正面推翻他們的行動。也正因如此，他眼下只看得到一條路——要求進行 trial by combat（Ishgard 法律承認的決鬥審判，讓控告者與被告以武力裁定真偽，勝者之主張即被視為真實）。</p><p>在 Ishgard 的法律下，這樣的審判意味著控告者與被告必須親自對陣。換作這次的情況，也就是 Alphinaud 和 Tataru 必須面對 Ser Grinnaux，以及由他選出的另一名 Heavens’ Ward 騎士。這顯然極不公平，可規則裡仍留了一絲轉圜的餘地。Aymeric 指出，Alphinaud 既然魔法能力早已為人所知，就不可能置身事外；但 Tataru 明顯毫無戰鬥能力，因此她有權為自己指名一位代理戰士。Aymeric 願意親自上場，Haurchefant 也毫不遲疑地表示自己同樣願意，可在場的每一個人都知道，最合適的人其實一直都只有你。於是 Haurchefant 立刻動身去通知 Alphinaud，而 Aymeric 則提醒你，審判將在 Supreme Sacred Tribunal of Halonic Inquisitory Doctrine 舉行，到時不只他會出席，還會有許多對結果抱著不同立場的人親眼看著。Heavens’ Ward 的騎士絕不是輕易能對付的對手，所以你絕不能有半點鬆懈。</p><p>等到了審判正式開始前，Haurchefant 又仔細把流程告訴你一遍。控告方會先重述罪名，被告則必須當眾回應，接著再依法提出進行決鬥審判的要求。而你真正應該現身的時機，便是在高等審理官正式承認 Tataru 有權指名代理人的那一刻。於是，在眾人注視之下，這場審判終於展開。Ser Grinnaux 當庭宣稱，自己親眼見到這對外來男女與異端者有所勾結。Alphinaud 隨即站出來，清楚表明自己無罪，並要求以決鬥證明清白。Tataru 也鼓起勇氣宣稱自己無辜，只是她並非戰士，因此主張由代理人代自己上場。當那項權利被正式允許後，你便在眾人的視線中現身。Alphinaud 看到你的那一刻，原本幾乎要對 Ishgard 所謂的正義失去信心的神情，也終於重新穩了下來。他低聲招呼你上前，要你和他一起親手結束這場荒唐的鬧劇。</p><p>真正交手之後，這場審判也再沒有任何偽裝的空間。Alphinaud 一邊施展自己所能做到的支援，一邊與你並肩對抗兩名 Heavens’ Ward 騎士。Ser Grinnaux 與 Ser Paulecrain 滿懷敵意，既高傲又狠辣，出手之間沒有半點留情，彷彿只想把你們徹底踩進地裡，好讓他們口中的罪名從此再也無人質疑。可再怎麼冠冕堂皇的謊言，也終究撐不過真正的實力與意志。經過那場激烈的決鬥之後，你和 Alphinaud 最終擊敗了兩人。高等審理官隨即當眾宣告，Fury 的裁決已經降下，Alphinaud Leveilleur 與 Tataru Taru 的所有罪名，即刻撤銷。Tataru 幾乎是結結巴巴地喊出你們贏了，而 Alphinaud 則帶著一種劫後餘生的疲憊，再一次向你道謝，彷彿又從本該降臨的死局裡被你拉了回來。</p><p>勝利之後，Haurchefant 的喜悅幾乎壓也壓不住。他看著你們在逆境中並肩奮戰的模樣，只覺得那份勇氣與同伴之間牢不可破的情誼，足以讓任何人都為之動容。於是，他立刻決定要親手送你一份禮物，作為這場勝利的紀念。他拿出一支哨子，說只要吹響它，便能召來一隻黑色陸行鳥——那是一匹受過完整訓練、甚至已經具備飛行能力的坐騎。Haurchefant 驕傲地誇讚牠既優雅又強壯，既俐落又充滿活力，問你是否願意讓牠成為今後陪伴你的坐騎。可就在那份熱烈的好意還沒完全落下時，一名異端審問所的衛兵卻突然一本正經地出聲制止，提醒 Lord Haurchefant，Halonic Inquisitory Doctrine 的 Supreme Sacred Tribunal 內禁止讓陸行鳥入內，所以他的坐騎必須留在外面。於是，這場本該莊嚴收尾的勝利，最後竟又被這句過分認真的提醒硬生生拉回了某種讓人哭笑不得的現實之中。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 福爾唐家的家令 <small class="muted">(福爾唐伯爵府, X:6.2, Y:6.2)</small></div></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  compreward:document.getElementById('panel-compreward'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
