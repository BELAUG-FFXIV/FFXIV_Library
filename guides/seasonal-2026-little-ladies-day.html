        story:`<div class="story-wrap"><div class="story-content">
<p>You arrive in Ul’dah just as the Little Ladies’ Day festivities are in full bloom, and the royal seneschal greets you warmly, urging you to enjoy the concerts. He speaks with pride of the Songbirds and the Seneschal Prince—stars of the stage who have practiced tirelessly for this season’s celebration.</p>
<p>As you listen, a flamboyant voice cuts in from the crowd, marveling at how the performers’ popularity has surged—and how their success seems to defy every expectation. The speaker introduces himself as Dural Tharal of the Mythril Eye, here to gather material for an article, only to admit that his habit of fixating on profit might skew his view. He asks for the help of an objective observer, and you agree to lend your eyes and ears.</p>
<p>The royal seneschal gladly briefs you on the troupe: the Songbirds—Ulala in crimson, Narumi in yellow, and Masha Mhakaracca in blue—who have risen from humble beginnings to sweep the realm with their concerts. He adds Picot, the Seneschal Prince in violet, a newer face whose charm stole many hearts last year. This time, he says, concertgoers will be outfitted with themed apparel and matching illuminations so fans can show support in each performer’s signature color.</p>
<p>With Dural Tharal at your side, you move away from the stage and begin collecting testimonials. Near the Gate of Nald, you seek out fans in Songbird and Seneschal shirts, then continue to the Quicksand to hear more—each encounter painting a different kind of devotion, from loud cheers to quiet longing and seasonal treats that turn admiration into ritual.</p>
<p>Armed with these accounts, Dural Tharal reflects on the strange, irresistible nature of merriment—how easily people open their wallets for what they love—then asks to witness the performance itself. The royal seneschal grants permission, and Dural chooses to watch from afar while you join the crowd, receiving themed attire and a portable illumination so you can blend into the sea of fans.</p>
<p>When the show begins, you throw yourself into the moment from within the spectators, cheering in the colors that each performer responds to most. Afterward, the royal seneschal thanks you for your fervor, and Dural Tharal, dazzled even from a distance, asks what it felt like to be immersed in the spectacle. Satisfied with your answer, he hurries off to write before the season slips away—leaving you with thanks, rewards earned, and an invitation to return whenever you wish to lose yourself in the next performance.</p>
</div><button class="expand-btn" data-more="Read more" data-less="Show less">Read more</button></div>`,

        story:`<div class="story-wrap"><div class="story-content">
<p>ウルダハでは、プリンセスデーの賑わいが街を包み、あなたはロイヤル・セネシャルに迎えられる。彼は今年の催しを楽しむよう促し、歌姫三人組「ソングバード」と、舞台の主役として輝く「セネシャル・プリンス」が、この日のために熱心に稽古を重ねてきたのだと誇らしげに語る。</p>
<p>そこへ、人波の向こうから芝居がかった口調の声が割って入る。季節の熱狂がいかに見事か、人気がどれほど高まり、想像を超える勢いで話題と収益を生んでいるか――その語り手は「ミスリルアイ」の記者、デュラル・サラルだと名乗り、次号の記事のために取材に来たのだと言う。だが彼は、自分が金勘定に意識を奪われがちなせいで見方が偏るかもしれないとこぼし、客観的な同行者としてあなたの協力を求める。あなたは、その申し出を受け入れる。</p>
<p>ロイヤル・セネシャルは、取材の助けになるだろうと出演者を紹介する。ソングバードは、紅をまとうウララ、黄のナルミ、蒼のマーシャ・ムカラッカの三人で、地道な努力を積み重ね、近頃は各地で新たなファンを増やしているという。さらに、紫の衣装に身を包むセネシャル・プリンス、ピコの名を挙げ、昨年も多くの心を射止めた新星だと語る。今年は、観客が推しを示せるよう、メンバーそれぞれの色に合わせた装いと光る小物も用意するのだと。</p>
<p>あなたはデュラル・サラルを伴い、舞台から離れて取材を始める。まずはナル大門のあたりで、ソングバードやセネシャルの装いをした観客に声をかけ、続いてクイックサンドへ足を運ぶ。熱い声援で支える者もいれば、少し離れて見守る者もいて、季節の菓子を楽しみながら祝う者もいる――集まる証言は、応援の形がひとつではないことを浮かび上がらせていく。</p>
<p>十分な話を集めたデュラル・サラルは、娯楽というものの不思議さに言及する。好きなもののためなら、気づけば懐を開いてしまう――自分も例外ではない、と。だが彼はすぐに本題へ戻り、今度は実際の舞台を見たいと言う。ロイヤル・セネシャルは快く許可し、デュラル・サラルは客観性のため離れた場所から眺めることを選ぶ一方、あなたは観客の中へ入るよう頼まれる。あなたは用意された衣装と携帯の光を受け取り、人々の輪へ加わる。</p>
<p>やがて舞台が始まると、あなたは観客の一員として歓声を送り、演者が特に喜ぶ色で応える。その熱気は、ロイヤル・セネシャルの感謝の言葉となって返り、デュラル・サラルもまた、遠くからでも思わず拍手したくなるほどの出来栄えだったと興奮気味に語る。あなたがその体験を言葉にすると、彼は記事を書くには十分だと満足し、季節が終わらぬうちに筆を走らせるべく去っていく。あなたには謝意と報酬が手渡され、いつでもまた舞台へ加われるのだと、次の公演への誘いが残される。</p>
</div><button class="expand-btn" data-more="続きを読む" data-less="折りたたむ">続きを読む</button></div>`,

          <div class="row">いずれかのクラス (Lv15)<br/>先にクエスト「<a class="link" href="its-probably-pirates.html">サスタシャに挑む者</a>」をコンプリートしている必要があります。</div>

      ZH:{
        langLabel:'ZH',
        pageTitle:'2026 公主節',
        tabs:{ story:'故事概要', acq:'取得方式', event:'活動期間', unlockq:'解鎖任務', followq:'後續任務', bgm:'BGM', comments:'留言' },
        story:`<div class="story-wrap"><div class="story-content">
<p>你走進 Ul’dah 時，Little Ladies’ Day 的慶典正熱鬧展開。Royal Seneschal 一眼就認出你，笑著歡迎你加入今年的節日氣氛，還問你是否已經看過演唱會；他說 Songbirds 和 Seneschal Prince 一如既往是舞台上最耀眼的主角，為了這場活動練習得格外勤奮。</p>
<p>就在這時，一道誇張而流暢的聲音插入話題，興奮地讚嘆這股「季節熱潮」如何把人氣推到沸點，甚至連收益都高得讓所有人跌破眼鏡。對方隨即咳了一聲收住話頭，自報姓名是 Mythril Eye 的記者 Dural Tharal，打算蒐集資料寫成下一期報導；只是他也坦白，自己總愛盯著帳面數字看，可能會讓文章的觀點變得不夠客觀，因此希望你能以「旁觀者」的角度陪同取材。你答應了他。</p>
<p>Royal Seneschal 乾脆把出演者的背景先講清楚，讓你有一份可靠的參照：Songbirds 由三人組成——穿紅的 Ulala、穿黃的 Narumi、穿藍的 Masha Mhakaracca——她們從不起眼的起點一路走來，靠著不懈努力，近來演唱會席捲各地，吸引了無數新粉絲。而穿紫的 Picot，正是 Seneschal Prince，也是近年加入的新星；去年的 Little Ladies’ Day，他就已經擄獲了許多人的心。為了今年的演出，主辦方還準備了能對應每位成員代表色的主題服裝與發光道具，讓觀眾可以用顏色支持自己最喜歡的歌手。</p>
<p>你和 Dural Tharal 避開舞台周邊的人潮，先往 Gate of Nald 附近尋找穿著 Songbird 或 Seneschal 主題服裝的觀眾，逐一詢問他們的想法；接著你們又轉往 Quicksand，繼續聽更多人的說法。有人用響亮的吶喊把熱情推向舞台，有人隔著距離靜靜守望，也有人用節慶點心把支持變成一種習慣——每一份回應都在提醒你：喜愛有很多種形狀。</p>
<p>蒐集到足夠的見聞後，Dural Tharal 忍不住感嘆「歡樂」的奇妙：人們為了喜歡的事物，往往會不假思索地掏出錢包，而他自己也並不陌生。話題一轉，他說要真正弄懂大家為何如此著迷，就得親眼看看 Songbirds 與 Seneschal Prince 的表演——前提是得先得到 Royal Seneschal 的同意。你們回去說明取材進展後，Royal Seneschal 立刻允許你們觀賞演出，而 Dural Tharal 為了保持客觀，選擇站得更遠觀察；你則被請進入人群之中。</p>
<p>在正式演出開始前，你從 royal handmaiden 那裡領到一套 Songbird 主題服裝與可攜式的發光道具，然後抓準時機融入觀眾席。當舞台開唱，你就在歡呼的人群裡用顏色回應台上的明星，感受台上與台下彼此點燃的熱度。演出結束後，Royal Seneschal 向你道謝，說你在人群中的熱情有被看見；Dural Tharal 也讚嘆表演精彩得讓他即使隔著距離都忍不住鼓掌，並追問你置身其中的感受。當你把那份投入說出口，他便心滿意足地道別，說得趕在節日結束前把文章完成——而你也帶著應得的報酬與祝福，準備在下一場演出到來時再度回到這片春日的喧騰之中。</p>
</div><button class="expand-btn" data-more="展開全文" data-less="收合內文">展開全文</button></div>`,
        acq:`<div class="stack">
          <div class="row"><b>任務發布</b> 管家之王，烏爾達哈：現世回廊 <small class="muted">(X:10.5, Y:8.6)</small></div>

    const langToggle  = document.getElementById('langToggle');
    const pageTitle   = document.getElementById('pageTitle');
    const tabBtns     = [...document.querySelectorAll('.tab-btn')];
    const panels = {
      story:  document.getElementById('panel-story'),
      acq:    document.getElementById('panel-acq'),
      event:  document.getElementById('panel-event'),
      unlockq:document.getElementById('panel-unlockq'),
      followq:document.getElementById('panel-followq'),
      bgm:    document.getElementById('panel-bgm'),
      comments: document.getElementById('panel-comments')
    };

    function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }

    function wireStoryToggler(root){
      const btn = root.querySelector('.expand-btn');
      const content = root.querySelector('.story-content');
      if(!btn || !content) return;
      const more = btn.getAttribute('data-more');
      const less = btn.getAttribute('data-less');
      btn.onclick = ()=>{
        const expanded = content.classList.toggle('story-expanded');
        btn.textContent = expanded ? less : more;
      };
    }

    function applyLang(lang){
      const t = i18n[lang] || i18n.EN;
      pageTitle.textContent = t.pageTitle;
      langToggle.textContent = `🌐 ${t.langLabel}`;
      tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
      const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
      renderPanel(activeBtn.dataset.tab, lang);
    }

    function renderPanel(key, lang){
      const t = i18n[lang] || i18n.EN;
      Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
      panels[key].classList.add('active');

      if(key !== 'comments'){
        panels[key].innerHTML = t[key];
        if(key==='story') wireStoryToggler(panels[key]);
      }else{
        loadGiscusForCurrentLang();
      }
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab, getLang());
      });
    });

    langToggle.addEventListener('click', ()=>{
      const cur = getLang();
      const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
      localStorage.setItem(LANG_KEY, next);
      applyLang(next);
    });

    /* Giscus：Comments 分頁 */
    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };
    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }

    applyLang(getLang());
  </script>
