  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}

      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}

    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}

    .tab-panel.scroll-panel{
  max-height:420px;

}
.tab-panel.scroll-panel p:first-child{margin-top:0}

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'It Was a Very Good Year',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Shamani Lohmani stops you at once, swearing by the gods that he has stumbled onto something extraordinary in Drest’s palm wine. He insists you listen—because what Drest used to seal the coconut shells is no ordinary leaf. He describes a distinct shape and an unusual odor, and says the moment he recognized it, the conclusion became unavoidable: the leaf came from a Bacchus grape vine. If that is true, then the legendary vine still grows somewhere in Raincatcher Gully—and with a cutting, Wineport’s Bacchus wine could be brought back to life.</p>
      <p>Shamani Lohmani presses the leaf into your hand and urges you to return to Drest and ask what he remembers. When you find Drest again, he looks at the leaf and seems genuinely bewildered. To him, it was only a pretty thing he chose without thought—he had no idea it was rare. All he can tell you is where he picked them up: near the juggernaut to the south. He insists he never saw any grape vines there, but he did notice fresh goobbue tracks, and suggests the leaves may have been torn from vines tangled along the back of one such beast. If you go searching, he warns, be careful—some goobbues are far more territorial than others.</p>
      <p>You follow his recollection back into Raincatcher Gully, watching for signs of what might have carried those leaves, until something in the water catches your eye and the trail finally yields what Shamani Lohmani has been hoping for. Back in Wineport, Shamani Lohmani demands every detail, then bursts into laughter as he confirms what you have brought him: a Bacchus grape vine cutting. Even Byrglaent, arriving to dismiss the whole notion, can’t deny it once he sees it for himself—and when Shamani offers the cutting to him, saying no one is better positioned to rebuild the vineyards, Byrglaent accepts with shaken sincerity and vows that taverns across Eorzea will clamor for Wineport’s legendary Bacchus wine once more.</p>
      <p>Then Shamani catches another scent—this time from a bottle—and realizes the impossible: a 1547 Bacchus, preserved from before the Calamity. Byrglaent reveals it was the crown jewel of his private collection, but insists it was never meant for him, and offers it to the saviors of Wineport. Shamani agrees the offer cannot be refused, thanks you for the generosity that changed the town forever, and sends you to deliver the wine to Captain Wheiskaet—admitting he would dearly love to drink it, but trusting that patience will bring him another chance to taste perfection.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Shamani Lohmani <small class="muted">Eastern La Noscea (X:21.6, Y:21.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="battle-scars.html">Battle Scars</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 33 or above)</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="in-the-company-of-heroes.html">In the Company of Heroes</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'人の命運、ワインの運命',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>シャマニ・ローマニは、あなたを呼び止めるなり、神々にかけて聞けと言い、ドレストの椰子酒にまつわる驚くべき発見を語りはじめる。あなたがこの一件を早く終わらせたいと思っていようと構わず、彼は「椰子の殻を封じていた葉」がただの葉ではないのだと断言した。葉の形は独特で、香りも異様だったという。確信に変わった――これはバッカスグレープの蔓の葉だ、と。もしそうなら、伝説の蔓は今もレインキャッチャー樹林のどこかに残っている。挿し木を得られれば、ワインポートのバッカス酒の復興すら夢ではない。</p>
      <p>シャマニ・ローマニは葉をあなたに託し、ドレストに会って何か思い出せないか確かめてほしいと頼む。再びドレストに会うと、彼は葉を見ても首をかしげるばかりで、ただ綺麗だから選んだだけで、珍しいものだとは知らなかったとおずおず言う。覚えているのは、南のジャガーノートの近くで拾ったことだけだった。そこで葡萄の蔓は見ていないが、新しいグゥーブーの足跡は見かけたという。もしかすると、あの葉はグゥーブーの背に絡みつく蔓から落ちたのではないか――探すなら気をつけてほしい、縄張り意識の強い個体もいるのだから、と念を押す。</p>
      <p>あなたは彼の記憶を頼りにレインキャッチャー樹林へ向かい、葉の出どころを追う。水面のわずかな気配に目を留めたとき、探していた手掛かりはついに形となってあなたの手に残る。ワインポートへ戻ると、シャマニ・ローマニはすべてを語れと迫り、やがて高らかに笑って、あなたが持ち帰ったものがバッカスグレープの挿し木だと告げる。騒ぎを一蹴しに来たビルギレントでさえ否定できず、シャマニ・ローマニは「葡萄畑の再建に最もふさわしいのはあなたです」と挿し木を差し出す。ビルギレントは必ずやエオルゼア中の酒場が再びワインポートのバッカス酒を求める日を迎えると誓う。</p>
      <p>だが話はそれで終わらない。シャマニ・ローマニは、別の瓶から漂う香りと手触りに息をのみ、ありえない年号のバッカス酒に気づく。ビルギレントはそれが秘蔵の至宝だったと明かしつつも、これはワインポートを救った者たちが味わうべきだと差し出す。シャマニ・ローマニは断れぬ申し出だと頷き、あなたの親切と惜しみない行いがこの町を変えたと礼を述べ、ヴェイスケートのもとへ届けるよう促す――自分も飲みたいが、いつかまた完全なる一杯に巡り会えると信じて、今は待つのだと言って。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> シャマニ・ローマニ　<small class="muted">東ラノシア (X:21.6, Y:21.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="battle-scars.html">友情の木の実</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 33～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="in-the-company-of-heroes.html">永遠なる海雄旅団</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'人的命運，酒的命運',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Shamani Lohmani 一把攔住你，激動得幾乎顧不上你的疲憊——他說你也許巴不得立刻把這場「找酒差事」洗得乾乾淨淨，但他剛在 Drest 的棕櫚酒裡發現了不得了的東西，叫你務必聽完。那幾個椰殼的封口不是隨手一片葉子，而是帶著明顯形狀與異樣氣味的特殊葉片。他說自己一開始還以為是聞錯了，可越確認越篤定：那是 Bacchus 葡萄藤的葉子。這代表傳說中的藤蔓可能仍在 Raincatcher Gully 某處存活；只要能取得一段枝條，就有機會讓 Wineport 的 Bacchus 酒業重獲新生。</p>
      <p>Shamani Lohmani 把那片葉子交到你手上，要你立刻帶去問 Drest：他到底是在哪裡找到這些葉子、還記得多少細節。你再見到 Drest 時，他看著那片葉子反而一臉茫然，只小聲說自己只是覺得它很漂亮才拿來封口，完全不知道這東西竟然稀有。他能想起的只有一件事：那些葉子是他在南方那頭 juggernaut 附近撿到的。</p>
      <p>他一再強調自己沒看見任何葡萄藤，可他確實看見了新鮮的 goobbue 足跡。猶豫片刻後，他提出一個可能——也許葉子不是從地上來的，而是從某隻 goobbue 背上纏繞的藤蔓掉落下來的。若你要去追查，他請你務必小心，因為有些 goobbue 的領地意識遠比其他同類更強。你循著方向回到 Raincatcher Gully，盯緊每一道可能留下痕跡的地方；當水面細微的波紋忽然引起你的注意時，你終於抓住了 Shamani Lohmani 一直在等的關鍵。</p>
      <p>你回到 Wineport，Shamani Lohmani 迫不及待要你把 Drest 說的每一句都交代清楚。隨後他忍不住笑出聲來，因為你帶回來的東西正是他所相信的證據：一段 Bacchus 葡萄藤的枝條。Byrglaent 趕來想斥為胡鬧，卻在親眼見到後再也無法否認。Shamani Lohmani 當場把枝條交給 Byrglaent，說在重建 Bacchus 葡萄園這件事上，沒有誰比他更合適——而 Byrglaent 也在震動之餘鄭重收下，發誓要讓整個 Eorzea 的酒館都再次爭搶 Wineport 的傳奇 Bacchus 酒。</p>
      <p>然而事情還沒結束。Shamani Lohmani 又被另一個氣味拉住——他從酒瓶的形狀與標籤的香氣裡辨認出不可能的年份：一瓶 1547 Bacchus，竟然保存至今、早於 Calamity 的年代。Byrglaent 坦承那是他私藏的皇冠之作，卻明白它不該只屬於自己，而應該獻給拯救了 Wineport 的人。Shamani Lohmani 說這份提議無法拒絕，向你道謝，說你的善意與慷慨永久改變了 Wineport，並催你把這瓶酒送去交給 Captain Wheiskaet——他也想喝，但願意耐心等待，因為他相信總有一天還能再嚐到那樣的完美。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 夏馬尼·洛馬尼　<small class="muted"> 東拉諾西亞 (X:21.6, Y:21.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="battle-scars.html">友情之果</a></div>
      <div class="row">所有職業（不含限定職） 等級 33 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="in-the-company-of-heroes.html">永遠的海雄旅團</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
