<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wings of Nihility | BELAUG · FFXIV Library</title>
  <meta name="description" content="Manifest your wings of nihility, their unsettling, tendriled form exuding the bottomless obsession of a voidsent sovereign.">
  <link rel="icon" href="../../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px;color:var(--fg)}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    #langToggle{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;font-weight:600}
    .lang-icon{width:17px;height:17px;display:block;flex:0 0 auto;opacity:.9}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){ .grid{grid-template-columns:1fr} .video-wrap{position:relative;padding-top:56.25%} .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%} }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left"><a class="home" href="../../index.html">🏠 Home</a></div>
      <div class="right"><button id="langToggle" class="icon-btn" aria-label="切換語言">English</button></div>
    </nav>
  </header>

  <main class="container main">
    <div class="grid">
      <section class="card video-card">
        <div class="bd">
          <div class="video-wrap">
            <iframe id="ytFrame" src="https://www.youtube.com/embed/RudiPjh5JBk" title="Wings of Nihility" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="hd" id="pageTitle">Wings of Nihility</div>
        <div class="tabs" role="tablist">
          <button class="tab-btn" role="tab" aria-selected="true" data-tab="about">About</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="acq">Additional Notes</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="seats">Seats</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="comments">Comments</button>
        </div>
        <div class="bd">
          <div id="panel-about" class="tab-panel active"></div>
          <div id="panel-acq" class="tab-panel"></div>
          <div id="panel-seats" class="tab-panel"></div>
          <div id="panel-comments" class="tab-panel">
            <div id="giscus_container" style="min-height:320px;"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const LANG_KEY = "ffxiv-guide-lang";
    const i18n = {
      EN: {
        langLabel: "English",
        pageTitle: "Wings of Nihility",
        tabs: { about: "About", acq: "Additional Notes", seats: "Seats", comments: "Comments" },
        about: `<div class="stack">
          <div class="row">Manifest your wings of nihility, their unsettling, tendriled form exuding the bottomless obsession of a voidsent sovereign.</div>
          <div class="row">Found in the Unmaking, these eerie wings call to mind Enuo, the dread voidsent who claimed the depths of the ocean as his domain. Their origin remains shrouded in mystery, and only one whose inner light can resist all-consuming nothingness could hope to bear them.</div>
        </div>`,
        acq: `<div class="stack">
          <div class="row">Guaranteed to appear upon completion of <a class="link" href="../highdiff/the-unmaking-extreme.html">The Unmaking (Extreme)</a>, but must be won via loot roll.</div>
        </div>`,
        seats: `<div class="stack"><div class="row">1</div></div>`
      },
      JP: {
        langLabel: "日本語",
        pageTitle: "ウィング・オブ・ニヒリティ",
        tabs: { about: "紹介", acq: "補足", seats: "座席数", comments: "コメント" },
        about: `<div class="stack">
          <div class="row">虚無の翼を顕現させる。その不気味な触手めいた姿からは、ヴォイドの王たる存在の底知れぬ執着がにじみ出ている。</div>
          <div class="row">アンメイキングで発見されたこの不気味な翼は、海の底を己の領域としていた恐るべきヴォイドの魔物、エヌオーを想起させる。その由来は謎に包まれているが、すべてを呑み込む虚無を退ける内なる光を持つ者だけが、この翼を背負うことができる。</div>
        </div>`,
        acq: `<div class="stack">
          <div class="row"><a class="link" href="../highdiff/the-unmaking-extreme.html">「極エヌオー討滅戦」</a>コンプリート時に必ず出現しますが、ロットで勝利する必要があります。</div>
        </div>`,
        seats: `<div class="stack"><div class="row">1</div></div>`
      },
      ZH: {
        langLabel: "繁體中文",
        pageTitle: "虛王之翼",
        tabs: { about: "簡介", acq: "補充說明", seats: "可乘人數", comments: "留言" },
        about: `<div class="stack">
          <div class="row">顯現你的虛無之翼。那令人不安、如觸鬚般伸展的形態，散發著 voidsent sovereign 深不見底的執念。</div>
          <div class="row">這對令人不安的羽翼是在 The Unmaking 中發現的，令人聯想到曾以海洋深處為領域的可怖 voidsent——Enuo。它的來歷仍籠罩在謎團之中，唯有內在之光足以抵禦吞噬一切的虛無者，才有資格承受這對羽翼。</div>
        </div>`,
        acq: `<div class="stack">
          <div class="row">完成<a class="link" href="../highdiff/the-unmaking-extreme.html">「極 恩歐殲滅戰」</a>後隨機出現，但需要透過擲骰取得。</div>
        </div>`,
        seats: `<div class="stack"><div class="row">1</div></div>`
      }
    };

    const langToggle  = document.getElementById("langToggle");
    const pageTitle   = document.getElementById("pageTitle");
    const tabBtns     = [...document.querySelectorAll(".tab-btn")];
    const panels = {
      about: panel("about"),
      acq: panel("acq"),
      seats: panel("seats"),
      comments: panel("comments")
    };

    function panel(id){ return document.getElementById("panel-" + id); }
    function getLang(){ return localStorage.getItem(LANG_KEY) || "EN"; }

    function applyLang(lang){
      const t = i18n[lang] || i18n.EN;
      pageTitle.textContent = t.pageTitle;
      langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
      tabBtns.forEach(b => { if (t.tabs[b.dataset.tab]) b.textContent = t.tabs[b.dataset.tab]; });
      const active = tabBtns.find(b => b.getAttribute("aria-selected") === "true") || tabBtns[0];
      renderPanel(active.dataset.tab, lang);
      if (active.dataset.tab === "comments") loadGiscusForCurrentLang();
    }

    function renderPanel(key, lang){
      const t = i18n[lang] || i18n.EN;
      Object.keys(panels).forEach(k => panels[k].classList.remove("active"));
      panels[key].classList.add("active");
      if (key !== "comments") panels[key].innerHTML = t[key];
      if (key === "comments") loadGiscusForCurrentLang();
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener("click", ()=>{
        tabBtns.forEach(b => b.setAttribute("aria-selected","false"));
        btn.setAttribute("aria-selected","true");
        renderPanel(btn.dataset.tab, getLang());
      });
    });

    langToggle.addEventListener("click", ()=>{
      const cur  = getLang();
      const next = cur === "EN" ? "JP" : (cur === "JP" ? "ZH" : "EN");
      localStorage.setItem(LANG_KEY, next);
      applyLang(next);
    });

    applyLang(getLang());

    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };

    function uiLang(code){ return code === 'JP' ? 'ja' : (code === 'ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }
  </script>
</body>
</html>
