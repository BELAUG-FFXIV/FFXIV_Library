  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}

    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Forest Friend',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>At Little Solace, Yda tells you there is no need to overthink things: as long as your heart is in it, the sylphs will understand you. Nearby, Papalymo turns to you and says that, as an adventurer, you are surely no stranger to helping those in distress. Tales of good deeds travel quickly, and one who comes to the aid of the local folk can go from stranger to hero overnight. That, he explains, is exactly what he has in mind. The sylphs who now dwell in Little Solace do so because they were driven from their woodland home, and they must have troubles of their own. If you seek out sylphs in need and do what you can to ease their worries, it will go far toward earning their trust. Yet sylphs are not known to confide in outsiders, so he advises you to speak with Hearer Imedia instead. Of the Gridanians who reside here, she is the one most likely to know what is troubling the sylphs. He adds that, through the crystal trade, the sylphs have long maintained friendly relations with almost every race in Eorzea, but the recent appearance of Ramuh hangs over those ties like a storm cloud. If peace is to be secured, Gridania must reopen dialogue with the sylphs before they have another chance to summon their god.</p>
      <p>You seek out Imedia, who greets you with heartfelt relief and thanks the elementals for sending an adventurer with a truly gentle heart. The sylphs of Little Solace, she says, are sorely in need of aid. Because their settlement is only temporary, it lacks proper amenities and, in particular, a stout defense. As a result, beasts from malms around are free to wander in and terrorize the residents. The ziz gorlins and gall gnats that roam these parts are especially troublesome; slaying one of each should serve as a warning to the rest. Imedia then asks another favor: that you gather three brownie brushes. She does not claim to know the details, but she tells you they play an important role in sylphic culture, and with such feral beasts prowling the forest, they are not easily come by. When you have done these deeds, she says, you should seek out Komuxio. He may be slow to warm to outsiders, but your good intentions will not be lost on him—she speaks from her own experience.</p>
      <p>You do as Imedia asks, felling a ziz gorlin and a gall gnat and securing three brownie brushes from the dangerous woods, then return to Little Solace to present them to Komuxio. He greets you as the dancing one and remarks that you may dance all night if you wish—his trust is not so easily earned. When he sees the brownie brushes, however, his tone changes. He realizes that, thanks to you, he can dye thread once more, and tells you he is pleased. Learning that you have slain the “bitey, buzzy” creatures he hates, he exclaims that he despises them and calls you kind—too kind, even. Many walking ones, he says, come to the abode of “these ones,” but few are as friendly as the dancing one. At last he concedes that perhaps he was wrong not to trust you after all.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Papalymo <small class="muted">East Shroud (X:21.9, Y:25.6)</small></div>

    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="dance-dance-diplomacy.html">Dance Dance Diplomacy</a></div>

  JP:{
    langLabel:'日本語',
    pageTitle:'仮宿暮らしの困りごと',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>リトルソルaceの集落で、イダはあなたに向かって、あまり難しく考えすぎないようにと言葉をかける。大事なのは形ではなく心であり、心さえこもっていれば、シルフ族はきっとあなたの思いを理解してくれるはずだと、明るい笑みで励ましてくれるのだ。そのそばでパパリモが続けて口を開く。冒険者であるあなたにとって、困っている人々を助けることは珍しいことではないだろうと前置きし、善行の噂はたちまち広まり、土地の者を助けた冒険者は、一夜にして見知らぬよそ者から英雄へと変わることもあると語る。今この集落で暮らすシルフ族は、もともとの森の住処を追われ、この地に身を寄せている身であり、抱えている悩みも少なくはないはずだ。悩み事を抱えるシルフを見つけ、その不安を少しでも和らげることができれば、彼らの信頼に近づけるだろう、と彼は提案する。ただ、シルフ族は簡単には外の者に本心を明かさない民でもある。だからこそ、この地に住むグリダニアの民のひとりであるイメディアに相談するのがよいと勧める。彼女なら、シルフ族がどのような問題を抱えているかを知っている可能性が高いからだ。パパリモはさらに、クリスタルの取引を通じて、かつてシルフ族がエオルゼアの多くの種族と友好な関係を保ってきたことを振り返る。しかし、雷の主ラムウの出現は、その関係に暗い影を落としている。平和を守るためには、彼らが再び神を呼び降ろしてしまう前に、もう一度対話の道を開かなければならないのだと、彼は静かに言葉を結ぶ。</p>
      <p>あなたがイメディアのもとを訪ねると、彼女は心から安堵したように微笑み、優しい心を持つ冒険者が来てくれたことを精霊に感謝する。ここに身を寄せるシルフ族は、今まさに助けを必要としているのだと語り、どうか話を聞いてほしいと頼んでくる。この集落はあくまで仮の住処であり、さまざまな設備が十分とは言い難い。とりわけ防備が手薄なために、離れた場所からやって来る魔物たちが自由に入り込み、無防備な住民たちをおびえさせているのだという。このあたりを徘徊するジズ・ゴルリンとガル・ナットは、その中でもひときわ厄介な存在であり、それぞれ一体ずつ討ち取るだけでも、残りの魔物に対する警告になるはずだと彼女は説明する。さらに彼女は、ブラウニーブラシを三つ集めてきてほしいと願い出る。それらはシルフ族の文化において重要な役割を果たしているらしいが、詳しい意味まではイメディア自身も知らない。ただ、凶暴な魔物が森をうろついている今、それを集めることは決して容易ではないのだという。頼まれた仕事を終えたなら、コムシオのもとを訪ねてほしい──彼はよそ者に心を開くまで時間がかかるものの、あなたの善意は必ず伝わるはずだと、彼女は自らの経験をもとにそう告げるのだった。</p>
      <p>あなたはイメディアの頼みどおり森へ向かい、ジズ・ゴルリンとガル・ナットをそれぞれ一体ずつ討ち取り、危険な林間からブラウニーブラシを三つ手に入れる。そして再び集落へ戻り、その成果をコムシオの前に差し出す。彼はあなたを「踊る者」と呼び、いくらでも踊ればよいが、この者の信頼はそう簡単には得られないと、相変わらず慎重な言葉を向ける。だが、あなたが持ってきたのがブラウニーブラシだとわかると、彼の声音には喜びが混じる。それさえあれば、再び糸を染めることができると告げ、この者は満足したと素直に打ち明けるのだ。さらに、あなたがこの辺りをうろついていた「噛みつき、ぶんぶん飛び回る」いやな魔物たちを倒したと知ると、彼はそれらをどれほど嫌っているかを強調しながら、あなたは優しい者だと評する。優しすぎるくらいだ、とさえ口にする。多くの歩く者がこの集落を訪れるが、「踊る者」のように友好的な者はほとんどいないと、コムシオはぽつりと語る。最後に彼は、もしかすると自分は、この踊る者を信じようとしなかったことで間違っていたのかもしれないと認め、あなたへの見方を静かにあらためるのだった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> パパリモ　<small class="muted">黒衣森：東部森林 (X:21.9, Y:25.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="dance-dance-diplomacy.html">挨拶は軽快に</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 21～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="presence-of-the-enemy.html">知らないヒト</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'林中摯友',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Little Solace 裡，Yda 對你說，沒必要想太多，只要你是真心誠意，sylphs 一定能明白你的想法。旁邊的 Papalymo 隨後開口，說身為冒險者的你，想必對「幫助有難之人」這件事再熟悉不過。關於善行的風聲傳得很快，願意伸手幫助當地居民的冒險者，很可能一夜之間就能從默默無聞的外來者，變成人人稱頌的英雄。他接著點出自己的用意：現在住在 Little Solace 裡的 sylphs，是被迫離開原本森林家園後才遷徙至此，想也知道一定背負著各種煩惱。如果你主動去找有困擾的 sylphs，設法替他們減輕一點憂慮，自然有助於建立信任。不過，sylphs 向來不習慣把心事說給外人聽，因此他建議你先去找 Hearer Imedia。對於居住在這裡的 Gridania 人來說，她最有可能掌握 sylphs 的難處。Papalymo 又提到，藉由水晶交易，sylphs 過去一直和 Eorzea 多數種族維持友好關係，只是最近 Ramuh 的現身，彷彿一片烏雲籠罩在雙方之間。如果要守住和平，就必須在他們再次召喚神明之前，重新開啟對話之路。</p>
      <p>你依言前往 Imedia 身邊。她衷心感謝 elementals，表示能在這裡見到一位真正心地溫柔的冒險者，讓她無比欣慰。Little Solace 的 sylphs 如今非常需要幫助，她請你耐心聽她說明。由於這裡只是暫時落腳的聚落，各種生活設施都非常簡陋，其中尤以防禦工事不足為大患。正因如此，遠處遊蕩的野獸得以自由闖入，在毫無防備的居民之間肆意橫行。這一帶出沒的 ziz gorlins 和 gall gnats 特別棘手，Imedia 說，只要各打倒一隻，就足以對其他魔物起到警告作用。她還拜託你再多做一件事：順便採集三株 brownie brushes。據說這些植物在 sylph 文化中扮演重要角色，雖然她自己也不清楚細節，但在這種兇猛野獸到處遊走的情況下，要取得它們並不容易。Imedia 最後請你在完成這些事後去找 Komuxio。牠對外來者確實慢熱，不過你真正的善意絕不會被忽略，她個人的經驗就是最佳證明。</p>
      <p>你照著 Imedia 的請求行動，在森林裡擊倒一隻 ziz gorlin 和一隻 gall gnat，又設法在危險的林間取得三株 brownie brushes，然後帶著成果回到 Little Solace，交給 Komuxio。牠稱呼你為「dancing one」，說就算你在這裡跳上一整夜，牠的信任也不會那麼容易被動搖。可是當牠發現你帶來的是 brownie brushes 時，語氣立刻變得柔和起來。多虧了你，牠又能重新替線材染色，這讓牠很滿意。得知你還解決了牠口中那些「bitey、buzzy」的生物時，Komuxio 連連強調自己是多麼討厭那些東西，說你實在是個親切得過頭的 walking one。牠說，雖然有許多 walking ones 曾來過「these ones」的住處，但像你這樣友善的 dancing one 卻寥寥無幾。最後，Komuxio 終於鬆口，承認或許自己一開始不願相信你的作法，其實是弄錯你這個人了。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 帕帕力莫　<small class="muted"> 黑衣森林東部林區 (X:21.9, Y:25.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="dance-dance-diplomacy.html">輕快的問候</a></div>
      <div class="row">所有職業（不含限定職） 等級 21 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="presence-of-the-enemy.html">陌生人</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
