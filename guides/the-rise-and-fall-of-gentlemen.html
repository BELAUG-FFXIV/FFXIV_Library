  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:1px solid transparent;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border-color:var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;
  overflow-y:auto;
  padding-right:8px;
  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'The Rise and Fall of Gentlemen',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
<p>Wymond remarks that word of you seems to reach him no matter where you go, and he guesses you might be the sort to chase strange rumors. Before he says more, he asks if you have ever heard of a man named Hildibrand.</p>
<p>He explains that, by Hildibrand’s own account, he was Eorzea’s greatest and most famous inspector—an inspector who, along with his assistant, always seemed to appear whenever something suspicious was afoot. As for catching culprits, Wymond concedes he “had his moments,” though he won’t give him all the credit.</p>
<p>Wymond then tells you what happened five years ago: Hildibrand became convinced he had “cracked the code” of Mezaya’s seventh verse. He claimed Dalamud and the Calamity could be stopped—so long as he found the hero of prophecy—and decided that hero was none other than himself.</p>
<p>So Hildibrand went to fly toward Dalamud—literally. Wymond insists the man somehow launched himself straight into the air, ridiculous as it sounds, and though it’s only logical he had to come back down, it was only recently that they found his body.</p>
<p>When you let slip that you knew him, Wymond scoffs at the thought of Hildibrand being truly famous, then curses the foolishness of trying to stop Dalamud alone. He says the end was at least mercifully quick, yet the depth of the crater makes it clear Hildibrand fell from an unfathomable height—and Wymond shudders at the thought of what went through his mind as the ground rushed up to meet him.</p>
<p>Still, Wymond marvels at how well the body was preserved—marvels there was enough left to bury at all. He remembers why he brought this up: Nashu, Hildibrand’s former assistant, is now an inspector herself, investigating the same strange rumors Wymond mentioned. He calls her sweet—if a bit daft—and admits that when he hears she’s at her wits’ end, he wants to help…only he’d rather meddle in the affairs of the living, because zombies are definitely not his forte.</p>
<p>If you are willing, he asks you to lend Nashu a hand. When she’s frustrated, she tends to visit Hildibrand’s grave in the lichyard—so you should try looking for her there first.</p>
</div>
<div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
  <div class="row"><b>Quest Giver</b> Wymond <small class="muted">(Ul’dah - Steps of Nald - Emerald Avenue, X:9.9, Y:8.7)</small></div>
</div>`,
    unlockq:`<div class="stack">
  <div class="row"><a class="link" href="the-ultimate-weapon.html">The Ultimate Weapon</a></div>
</div>`,
    followq:`<div class="stack">
  <div class="row"><a class="link" href="back-in-the-saddle.html">Back in the Saddle</a></div>
</div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'謎の事件屋',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
<p>ワイモンドは、あなたがあちこち動き回っているせいで噂が絶えないのだと言い、妙な風聞を調べる気はないかと切り出す。だがその前に、と彼はひとりの男の名を挙げる――ヒルディブランドという男を知っているか、と。</p>
<p>彼によれば、本人は自分を「エオルゼア一の名探偵」だと言い張っていたらしい。助手とともに怪しい気配のある場所へ現れ、事件に首を突っ込むことだけは確かに得意だったが、犯人を追い詰める手柄をすべて彼だけのものにするのはためらわれる、とワイモンドは苦笑する。</p>
<p>そして五年前の話になる。ヒルディブランドは「メザヤの予言第七節」を読み解いたと言い出し、ダラガブも災厄も止められるのだと豪語した。必要なのは予言の勇者を見つけることだけで、その勇者は自分自身だ――そう結論づけたのだという。</p>
<p>だから彼はダラガブへ向かって飛び立った。比喩ではない、空へと飛んだのだ、とワイモンドは念を押す。どれほど突拍子もない話でも、落ちてこないはずがない――そしてつい最近、その亡骸が見つかった。</p>
<p>あなたが彼を知っていると示すと、ワイモンドは驚き混じりに鼻で笑い、思い込みだけで名声になるわけがないと言い捨てる。それでも、ダラガブをひとりで止めようなどと何を考えていたのか、と憤り、深いクレーターを見れば想像を絶する高さから落ちたのは明らかだと語る。地面が迫る瞬間、彼の頭に何がよぎったのか――そう思うだけで身震いすると。</p>
<p>それにしても保存状態が妙に良かった、とワイモンドは首をひねり、よく埋葬できるだけ残っていたものだと呆れる。そこで本題だ。かつての助手、ナシュ・マカラッカは今や一人前の事件屋となり、ワイモンドが言った妙な噂を調べているという。少し間の抜けたところはあるが根は優しい娘で、途方に暮れていると聞けば助けたくなる――だが自分は生者の揉め事が専門で、ゾンビー相手はさすがに柄ではない。</p>
<p>だから、もしよければあなたがナシュに手を貸してほしい。彼女は苛立つとドライボーンの墓地でヒルディブランドの墓を訪ねることが多いらしい。まずはそこを探してみてくれ、とワイモンドは言う。</p>
</div>
<div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
  <div class="row"><b>クエスト発行</b> ワイモンド　ウルダハ：ナル回廊 - エメラルドアベニュー <small class="muted">(X:9.9, Y:8.7)</small></div>
</div>`,
    unlockq:`<div class="stack">
  <div class="row"><a class="link" href="the-ultimate-weapon.html">究極幻想アルテマウェポン</a></div>
</div>`,
    followq:`<div class="stack">
  <div class="row"><a class="link" href="back-in-the-saddle.html">解かれぬ迷宮の扉</a></div>
</div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'神秘的調查員',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
<p>Wymond 說你最近忙得像蜜蜂一樣，到處奔走的消息幾乎半數都會傳進他耳裡。他看得出你是那種喜歡追著奇怪傳聞跑的人，於是先問你一句：你聽過一個叫 Hildibrand 的男人嗎？</p>
<p>他說那傢伙總愛把自己講得像是 Eorzea 最偉大、最有名的偵探；而且確實很會在有可疑氣味的時候帶著助手現身。至於抓出犯人的功勞……Wymond 承認他偶爾也有亮眼的時刻，但他不太想把一切都算在 Hildibrand 頭上。</p>
<p>接著他提起五年前的事：Hildibrand 突然宣稱自己「破解了 Mezaya 的第七節預言」，還說只要找到預言中的英雄，就能阻止 Dalamud、阻止那場災厄。而你猜怎麼著——他認定那個英雄就是他自己。</p>
<p>於是他就朝著 Dalamud 飛走了。不是比喻，Wymond 強調他真的不知道用什麼方式把自己拋上了天。理所當然地，飛上去就一定得落下來——而他們直到最近，才終於找到了他的遺體。</p>
<p>當你透露你認識那傢伙時，Wymond 先是嗤笑他自以為有名的毛病，接著又忍不住罵他胡鬧：竟然想靠自己去阻止 Dalamud，到底在想什麼。他說至少死得乾脆，但從那個隕坑的深度來看，Hildibrand 一定是從難以想像的高度墜落；光是想像他看著地面迎面逼近的那一刻，Wymond 就打了個寒顫。</p>
<p>更離奇的是遺體保存得異常完整——甚至完整到還能下葬，這讓 Wymond 都覺得不可思議。然後他想起自己提起這件事的原因：Hildibrand 的前助手 Nashu，如今也成了偵探，正在追查他剛才提到的那些怪傳聞。</p>
<p>Wymond 說 Nashu 是個好女孩，雖然有點傻氣，但心地很甜；他聽說她已經走投無路，想幫忙，卻又坦白自己只擅長插手活人的麻煩，至於殭屍——那真的不是他的專長。</p>
<p>所以如果你願意，他希望你去協助 Nashu。她每次受挫時，往往會去 Drybone 的墓園看 Hildibrand 的墓——你可以先從那裡找起。</p>
</div>
<div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
  <div class="row"><b>任務發布</b> 維蒙德 <small class="muted"> 烏爾達哈現世回廊 (X:9.9, Y:8.7)</small></div>
</div>`,
    unlockq:`<div class="stack">
  <div class="row"><a class="link" href="the-ultimate-weapon.html">超越幻想，究極武器</a></div>
</div>`,
    followq:`<div class="stack">
  <div class="row"><a class="link" href="back-in-the-saddle.html">無法打開的迷宮之門</a></div>
</div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
