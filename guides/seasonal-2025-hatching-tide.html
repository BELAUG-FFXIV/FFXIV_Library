        story:`<div class="story-wrap"><div class="story-content">
<p>Jihli Aliapoh introduces herself as the one who leads this year’s Hatching–tide celebration, and greets you with bright warmth. She explains that the festival’s origin lies in a vision she received before the Seventh Umbral Calamity, when twelve sages of a bygone era appeared before her. Since then, such dreams have continued to visit her, and this year she saw a great mass of eggs rising vividly into the heavens. As always, she is determined to make that dream real and turn it into wonder for all who attend.</p>
<p>She has only just begun to speak of the preparations when disaster strikes. Nonotta rushes in with alarming news: the cart carrying the commissioned eggs overturned on the way. The driver escaped unharmed, but the eggs did not. Jihli is relieved that no one was injured, yet the loss leaves her shaken. Without the eggs, the dream she hoped to bring to life seems in danger of collapsing before the celebration can even begin.</p>
<p>Nonotta refuses to give in. She says she can make new eggs herself, but producing enough in time will still delay everything. Jihli has too much to do adjusting the schedule, and the other Dreamers are occupied as well. With no better option, they turn to you and ask for your help. You agree, and Nonotta wastes no time sending you with her to find their supplier in the market, hoping he may still have enough materials left to save the operation.</p>
<p>The merchant recognizes Nonotta at once, but the answer he gives is not the one either of you hoped for. He has none of the original supplies remaining. What he does offer instead is a pile of surplus odds and ends—weathered materials that might still prove useful. Nonotta accepts them gratefully, and together you sort through the lot. Leather, springs, rings, lengths of timber, herbs, resins, and decorative scraps begin to suggest another possibility. These will never become the eggs from Jihli’s dream, but perhaps they can be turned into something else that can still rise into the air: parasols shaped and painted to resemble eggs.</p>
<p>The idea gives Nonotta fresh energy, but she quickly sees the next obstacle. Crafting parasols is far more demanding than making ordinary eggs, and the two of you cannot finish enough on your own. So the search for help begins again. At the Leatherworkers’ Guild, Geva agrees to assist, explaining that the leather can be used, but the guild lacks enough coating to make proper canopies. Nonotta answers at once that she already has ingredients for a water-repellent treatment and will see to that part herself. You are then sent onward to the Carpenters’ Guild with the timber, where the artisans agree to make the parasol frames, though better wood will still need to be procured.</p>
<p>By the time you regroup in Gridania, the work has begun to take shape. Maisenta has already started making arrangements for the alchemical solution and other necessary details, and Nonotta throws herself into assembling a prototype. When you return to Jihli, she has managed to adjust the festival schedule enough to buy everyone a little time. She listens as you explain that eggs will have to give way to parasols, and rather than despair, she embraces the idea with delight. The dream may no longer take its original form, but it still lives—and now all that remains is to see what shape Nonotta can bring into the world.</p>
</div><button class="expand-btn" data-more="Read more" data-less="Show less">Read more</button></div>`,

        story:`<div class="story-wrap"><div class="story-content">
<p>ジリ・アリアポーは、今年のエッグハントを取りまとめる者として、晴れやかな笑顔であなたを迎える。そして、第七霊災よりも前に見た不思議な幻視こそが、この祭りの始まりだったと語る。遠い時代の十二賢人が夢の中に現れて以来、彼女のもとには同じような夢が折に触れて訪れてきた。今年、彼女が見たのは、目の前にあるものと同じほど鮮やかな無数のタマゴが、空へと高く舞い上がる光景だった。その夢を形にすることが、今年のエッグハントの喜びになるはずだと、ジリ・アリアポーは心から信じている。</p>
<p>だが、その準備を語る最中に、思わぬ報せが飛び込んでくる。ノノッタ・ノッタが駆け込んできて、手配していたタマゴを運ぶ荷車が途中で横転してしまったと告げる。御者に怪我がなかったことだけは救いだったが、肝心のタマゴは無事では済まなかった。ジリ・アリアポーは安堵と同時に、夢を叶えるための肝心の品を失った現実に言葉を失う。このままでは、祭りの始まりそのものが危うくなってしまう。</p>
<p>それでもノノッタ・ノッタはあきらめない。自分で新たなタマゴを作ると言い切るが、必要な数を揃えるにはどうしても時間が足りず、遅れは避けられそうにない。ジリ・アリアポーは日程調整に追われ、ほかのドリーマーたちも手一杯だ。そこでふたりは、あなたに助力を求める。あなたが手を貸すと決めると、ノノッタ・ノッタはすぐに市場へ向かおうと促す。まずは仕入れ先の商人を訪ね、使えそうな資材が残っていないか確かめるためだ。</p>
<p>商人はノノッタ・ノッタの顔を見て事情を察するが、望んでいた答えは返ってこない。必要だった資材はすでに売り切れていた。それでも彼は、倉庫に眠っていた余り物なら譲れると言ってくれる。ノノッタ・ノッタはありがたく受け取り、あなたとともに中身を確かめていく。丈夫な革、金具、バネ、木材、薬品の材料になりそうな薬草や樹脂、装飾に使えそうな細々とした品々。それらを前にして、ノノッタ・ノッタの中に新しい着想が芽生える。夢で見たタマゴそのものは再現できなくても、もっと空へ掲げやすいもの――タマゴらしい意匠をまとったパラソルなら形にできるかもしれないのだ。</p>
<p>その発想は希望をつなぐが、同時に新たな課題も浮かび上がる。パラソル作りは普通のタマゴよりずっと手がかかり、あなたとノノッタ・ノッタだけでは到底間に合わない。そこでふたりは、職人たちの力を借りることにする。革細工師ギルドではゲヴァが事情を聞き、協力を申し出てくれる。ただし、革を天蓋に仕立てるには防水用の塗料が不足しているという。ノノッタ・ノッタは、ちょうどそのための材料を手に入れていると答え、自分で薬液を調えると引き受ける。そしてあなたは木材を持って木工師ギルドへ向かい、骨組みの製作を頼むことになる。そこでも手助けは得られるが、理想的な形にするにはさらに適した木材が必要だとわかる。</p>
<p>それでも、準備は少しずつ形になっていく。グリダニアではマイセンタも薬液の手配や細かな段取りに力を貸してくれ、ノノッタ・ノッタは試作品の組み立てへと取りかかる。あなたがジリ・アリアポーのもとへ戻るころには、彼女もまた祭りの日程を調整し、この不測の事態に対応する道筋を整えていた。タマゴの代わりにパラソルを用いるという案を聞いた彼女は、失うことよりも新しい形の可能性に目を輝かせる。夢は当初の姿そのままではなくとも、まだ消えてはいない。あとはノノッタ・ノッタが、その夢をどのような形で現実へ引き寄せるかを待つばかりだった。</p>
</div><button class="expand-btn" data-more="続きを読む" data-less="折りたたむ">続きを読む</button></div>`,
        acq:`<div class="stack">

      ZH:{
        langLabel:'繁體中文',
        pageTitle:'2025 彩蛋節',
        tabs:{ story:'故事概要', acq:'取得方式', event:'活動期間', unlockq:'解鎖任務', followq:'後續任務', bgm:'BGM', comments:'留言' },
        story:`<div class="story-wrap"><div class="story-content">
<p>Jihli Aliapoh 先向你正式自我介紹，說自己正是今年 Hatching–tide 的主辦人，並帶著滿滿熱情向你說明這場節慶的由來。她提起，在第七靈災之前，自己曾夢見來自古代的十二位賢者現身眼前，而那場異象也成了 Hatching–tide 的起點。自那之後，她便時常再度夢見與節慶相關的景象。今年也不例外──她看見大量彩蛋如眼前這些一般鮮明，成群升向天空。對她而言，把夢中的景象帶到現實，正是 Hatching–tide 一直以來最重要的意義。</p>
<p>可就在她談到今年準備工作的時候，意外突然發生。Nonotta 匆匆趕來，慌張地告訴她：原本委託製作並運送中的彩蛋，在途中翻車了。雖然駕車的人平安無事，這點令人鬆一口氣，但那些彩蛋卻沒能倖免。Jihli Aliapoh 聽到後雖然先為無人受傷而感到安心，卻也立刻意識到，若少了這些彩蛋，她這次想實現的夢恐怕根本無從開始。節慶尚未正式展開，計畫就已經搖搖欲墜。</p>
<p>即使如此，Nonotta 並沒有放棄。她立刻表示，自己可以重新再做一批彩蛋，只是要趕出足夠的數量勢必需要時間，而現在已經沒有多少餘裕。Jihli Aliapoh 必須親自去調整整個活動時程，其餘 Dreamers 也都各自忙得不可開交，因此兩人只能把希望寄託到你身上。你答應幫忙之後，Nonotta 馬上帶著你前往市集，想先去找原本供貨的商人，看看是否還能設法補到需要的材料。</p>
<p>然而，商人雖然認出了 Nonotta，也明白事情緊急，卻還是只能遺憾地表示：原先需要的材料已經沒有存貨了。他能提供的，只有一些積壓已久的零散剩料。Nonotta 還是心懷感激地收下，接著與你一起檢視那些東西。耐用的皮革、金屬彈簧與圓環、木材、可以調製防水藥液的香草與樹脂，還有許多可用來裝飾的零件。雖然它們再也不可能變回 Jihli Aliapoh 夢裡的那些彩蛋，但看著這些材料，Nonotta 漸漸浮現出新的點子：既然做不出原本那種蛋，也許可以改做更容易「升起來」的東西──外型與彩繪都像彩蛋的 parasols。</p>
<p>這個想法確實帶來一線希望，卻也立刻暴露出新的難題。比起製作普通彩蛋，做 parasols 顯然麻煩得多，只靠你和 Nonotta 兩個人，根本來不及完成足夠的數量。因此，你們決定向各個工匠公會求助。在 Leatherworkers’ Guild，Geva 聽完來龍去脈後願意幫忙，卻也指出：這批皮革雖然勉強可用，若沒有足夠的防水塗層，做成傘面後很快就會受損。Nonotta 立刻接話，說自己剛好有能調製防水藥液的材料，這部分可以由她負責；而你則帶著木材前往 Carpenters’ Guild，請他們製作 parasol 的骨架。對方願意協助，只是也說明，要做出理想的弧形支架，還需要更合適的木料。</p>
<p>即便如此，一切總算開始往前推進。回到 Gridania 後，Maisenta 也爽快答應幫忙安排藥液與其他細節的處理，Nonotta 則全心投入 prototype parasol 的組裝。等你回到 Jihli Aliapoh 身邊時，她也已經把活動時程重新調整到可以勉強應對這場意外。當你告訴她，今年可能得以 parasols 取代原本的彩蛋時，她沒有因此失望，反而立刻看見了另一種可能性。夢或許無法照最初的模樣重現，但那份想讓節慶成真的心意還在。接下來，就只剩等待 Nonotta 把這份新構想真正做成眼前的現實。</p>
</div><button class="expand-btn" data-more="展開全文" data-less="收合內文">展開全文</button></div>`,

    const langToggle  = document.getElementById('langToggle');
    const pageTitle   = document.getElementById('pageTitle');
    const tabBtns     = [...document.querySelectorAll('.tab-btn')];
    const panels = {
      story:  document.getElementById('panel-story'),
      acq:    document.getElementById('panel-acq'),
      event:  document.getElementById('panel-event'),
      unlockq:document.getElementById('panel-unlockq'),
      followq:document.getElementById('panel-followq'),
      bgm:    document.getElementById('panel-bgm'),
      comments: document.getElementById('panel-comments')
    };

    function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }

    function wireStoryToggler(root){
      const btn = root.querySelector('.expand-btn');
      const content = root.querySelector('.story-content');
      if(!btn || !content) return;
      const more = btn.getAttribute('data-more');
      const less = btn.getAttribute('data-less');
      btn.onclick = ()=>{
        const expanded = content.classList.toggle('story-expanded');
        btn.textContent = expanded ? less : more;
      };
    }

    function applyLang(lang){
      const t = i18n[lang] || i18n.EN;
      pageTitle.textContent = t.pageTitle;
      langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
      tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
      const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
      renderPanel(activeBtn.dataset.tab, lang);
    }

    function renderPanel(key, lang){
      const t = i18n[lang] || i18n.EN;
      Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
      panels[key].classList.add('active');

      if(key !== 'comments'){
        panels[key].innerHTML = t[key];
        if(key==='story') wireStoryToggler(panels[key]);
      }else{
        loadGiscusForCurrentLang();
      }
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab, getLang());
      });
    });

    langToggle.addEventListener('click', ()=>{
      const cur = getLang();
      const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
      localStorage.setItem(LANG_KEY, next);
      applyLang(next);
    });

    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };
    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang();
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }

    applyLang(getLang());
  </script>
</body>
</html>
