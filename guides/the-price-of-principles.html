    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Minfilia looks up at you with quiet relief, pleased to see you well, but the calm is broken when Tataru slips in to apologize for interrupting. She reports that the gentleman from Ashgana Exports has finally left, and with a weary sigh admits she now understands why Minfilia had not wanted to receive him. Minfilia praises her handling of the situation and has her tell the guards that no further guests will be received this evening.</p><p>With the Empire’s champion defeated and the ultimate weapon destroyed, Minfilia says the world’s eyes have fixed on the Scions—watching their every move. Where you once labored in secrecy with few friends and many enemies, you are now besieged by benefactors, each eager to offer full support. Yet every offer of patronage comes with a price: some are blunt, others subtle, but the message is always the same—we will help you, but only if you help us. The man from Ashgana Exports was among the most brazen, offering supplies if the Scions would settle a business dispute for him. Minfilia refused him as she has refused others like him, though she admits the Syndicate’s overtures are far harder to brush aside.</p><p>She reminds you why the Scions were formed: to serve Eorzea, not the interests of individual Eorzeans, and neutrality is fundamental to that cause. And yet, she cannot deny her doubt—if accepting patronage could give the Scions the strength to do greater good, might it deserve more consideration? She starts to speak of how generous your Baldesion colleagues have been, then stops herself, apologizing for burdening you. Still, she asks you to consult the others, believing they will have their own opinions.</p><p>You speak with Thancred, who reflects that fortune begets power, and power fortune—and that it is beyond doubt the Scions, and especially you, now possess power. The question is what to do with it. He tells you that refugees increasingly believe Ala Mhigo could be liberated if only the Scions committed their strength, but that is only one of many worthy causes. You stand at a crossroads, he says—each path paved with good intentions, yet their ends uncertain. Though he longs to return to active duties and redeem his good name, he has not forgotten how similar feelings nearly led him to doom once before, and he resolves to follow the Baldesion colleagues’ order to rest.</p><p>Y’shtola recalls your earlier meeting with Merlwyb after Limsa Lominsa reported Titan’s summoning, and reminds you that she spoke the truth to the Admiral—calling out that the Lominsans broke their treaty with the kobolds and had invited the conflict. She did so because, owing no allegiance to Limsa, she felt no need to let them distort facts to absolve themselves. Minfilia, she says, can expect the same kind of answer now. Your entanglements with the city–states have already weakened your claim to neutrality; the course Minfilia contemplates would have you relinquish it entirely. Worse, with the struggle against the Empire brought to a decisive end, the nations have spent much of their military strength, and she fears the beast tribes will sense this weakness and give you little leave to rest—your work, she warns you, is never done.</p><p>Papalymo agrees that more support would help, but not at the cost of principle. Neutrality has always been delicate, and he has lost count of the times he has had to explain that your allegiances need not match your headquarters. If the Scions are to sell their services for gil, he says with biting humor, they might as well declare fealty to Ul’dah outright—he is sure Yda would enjoy the bribes. And with another primal waking just as peace seemed possible, he wonders aloud if the weary ever truly get to rest. Yda admits she has been receiving many gifts, but Papalymo keeps making her send them back—some of them temptingly nice, “nearly abandon-your-principles” nice. She also muses on how much has happened within these walls, as though the Waking Sands itself could tell endless tales.</p><p>Urianger warns that the powerful draw both the covetous and the needy, and that prudence demands you offer aid with one hand while the other rests ever on the hilt. Yet you lack time to decipher petitioners’ designs, not while the beast tribes labor unseen to raise their fallen primals once more. He is certain they will return stronger and bolder—and just as certain it will be the Scions who must meet them—though he laments how few you are and how finite your resources remain.</p><p>After hearing all this, Alphinaud says the situation is not wholly unexpected, and admits he too has been thinking on the organization’s future—only to reach a different conclusion. He urges you to come with him to speak to Minfilia. In the Solar, Alphinaud tells her plainly that the Scions of the Seventh Dawn must leave Ul’dah. He argues that so long as you remain on Ul’dahn soil, you will never be free to act with impunity—moving to Vesper Bay only delayed the inevitable. The Syndicate has taken note of your capabilities, he says, and will not suffer the Scions to remain independent; you are far too dangerous. He even points to Vesper Bay’s missing aetheryte as proof—Ul’dah knows how beneficial it would be, and so denies it and other favors unless you cooperate.</p><p>When Minfilia asks where he would have you go, Alphinaud answers that the appearance of neutrality is as important as the reality. You must keep each great nation at arm’s length and raise your banner in a place all agree lies beyond their borders—Mor Dhona, and specifically Revenant’s Toll. It is neutral territory, he says, with essential facilities, and it is also frequented by legions of adventurers who could supplement your ranks. He acknowledges the bond you have built with Ul’dah over the years, but insists he truly believes this is the best course. Minfilia pushes back fiercely, saying your ties to the local community are invaluable and Ul’dah is your home—casting aside everything you have built to start anew in a desolate wasteland would be beyond reckless. Alphinaud leaves the decision to her, asking only that she remember the shared purpose that moved you to found the Scions, and that moved her to found the Path of the Twelve before that—an ideal they both aspire to, as his grandfather did. He begins to say you are as much her family as—only for Minfilia to cut him off, dismissing him and telling him to attend to his own family affairs. Alphinaud answers that he has left those matters in the hands of men better suited, and that he could not place personal concerns before the needs of the order.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'「暁」の在り方',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ミンフィリアはあなたの姿を見て、無事であることを喜ぶ。そこへタタルが割り込みを詫びながら現れ、「アシュガナ商会」の男が去ったことを報告する。タタルは溜息をつき、なぜ面会を望まなかったのか理解したと漏らすが、ミンフィリアは彼女の働きを労い、今夜はこれ以上の来客を受け付けないよう衛兵に伝えるよう指示する。</p><p>ガイウス・ヴァン・バエサルを倒し、究極兵器を破壊して以来、世界の視線は瞬きすら忘れたかのように暁の血盟を追い続けている、とミンフィリアは語る。かつては少数の友と多くの敵の中で秘密裏に動いていたのに、今や支援者を名乗る者たちが押し寄せ、競うように全面的な後援を申し出てくる――まさに有り余るほどの厚意だ。だが、後援の約束には必ず代償が伴う。露骨に要求を突きつける者もいれば、巧妙に誘導しようとする者もいるが、言いたいことは同じだ――助けてやる、ただしこちらにも手を貸せ、と。タタルが口にした男はとりわけ厚かましく、物資と引き換えに商取引の争いを解決してほしいと言ってきたという。ミンフィリアは当然拒んだが、ウルダハの財界――砂蠍団の誘いはそう簡単には退けられない、とも認める。</p><p>暁の血盟は「個々のエオルゼア人」の利益ではなく、エオルゼアそのものに奉仕するために結成された。中立こそが理念の根幹だ――ミンフィリアはそう言い切りながらも、胸の内の揺らぎを隠せない。もし後援を受け入れることで、より大きな善を成す力を得られるのなら、もっと慎重に考えるべきではないのか。バルデシオンの仲間たちは計り知れぬほど寛大だが、それに甘え続けるわけにも――そう言いかけて彼女は口をつぐみ、あなたに重荷を負わせるつもりはなかったと詫びる。それでも、この葛藤を共有することは無意味ではないかもしれない、として、他の者たちの意見を聞いてきてほしいと頼む。</p><p>サンクレッドは、富は力を生み、力は富を生むと言い、暁の血盟――そして何よりあなた――が力を得たことは疑いようがないと認めたうえで、その力をどう使うかが問題だと語る。難民の間では、暁の血盟が本腰を入れればアラミゴを解放できるのではないかという期待が高まっているというが、それは数ある大義のひとつに過ぎない。今は岐路に立っており、どの道も善意で舗装されているが、行き着く先は見えない――彼はそう言う。名誉を挽回するためにも現場に戻りたい気持ちはあるが、同じような衝動がかつて自分を破滅寸前まで追い込んだことを忘れてはいない、とも告げ、バルデシオンの指示に従って休む決意を固める。</p><p>ヤ・シュトラは、リムサ・ロミンサがタイタン召喚を報せた直後にメルウィブ提督と面会したことを引き合いに出し、当時自分が提督に真実を告げたのだと語る。ロミンサ人はコボルド族との条約を破り、それに正当な反撃が返ってきただけであり、彼ら自身が招いた争いの後始末に呼ばれたのだ――そう言い切れたのは、リムサに忠誠を負っていないからだという。ミンフィリアにも同じ答えを返す、と彼女は言い、都市国家との関わりが中立の主張をすでに弱めているのに、今考えている道は中立そのものを手放すことになると戒める。さらに、帝国との戦いを決定的に終わらせるために諸国は軍事力の多くを費やした以上、獣人たちはその弱りを嗅ぎ取って休ませてはくれないだろう、と警告し、英雄の仕事は終わらないのだとあなたに告げる。</p><p>パパリモは、支援が増えれば助かるのは確かだが、理念を売るのなら本末転倒だと言う。中立は常に繊細で、拠点と忠誠が一致する必要はないのだと説明して回った回数は数え切れない――それでも、もし金で働きを売るのなら、いっそウルダハに忠誠を誓ってしまえばいい、と皮肉を飛ばし、イダなら賄賂を楽しむだろうと続ける。平和が来たと思った矢先に新たな蛮神が目覚めたことにも触れ、疲れた者に休みはあるのかと嘆く。イダは最近贈り物が多いが、パパリモに返すよう言われていると愚痴り、どれも捨てがたいほど立派なのだと笑い混じりに漏らす。そしてこの場所で起きた出来事の多さに思いを馳せ、壁が語れたならどれほどの物語が出てくるだろうかと口にする。</p><p>ウリエンジェは、力ある者は貪る者にも困窮する者にも狙われるのが常であり、慎重さゆえに、助けを差し出す手とは別に剣の柄に置く手を忘れてはならないと説く。だが、請願者たちの策を読み解く時間はない――獣人たちが敗北の中でもなお密かに動き、倒れた蛮神を再び呼び起こそうとしているからだ。彼らはより強く、より大胆になって戻ってくるだろうし、それに相対するのは暁の血盟になる、と断じつつ、人数も資金も乏しいことを嘆く。</p><p>やがてアルフィノは、この状況は予想外ではないと言い、自分も組織の将来を考えてきたが、別の結論に至ったと告げる。そしてあなたを伴い、ミンフィリアのもとへ向かう。ソーラーでアルフィノは断言する――暁の血盟はウルダハを去らねばならない。ウルダハの領内にいる限り、自由に行動することはできず、ヴェスパーベイへの移転も先延ばしに過ぎなかった。能力を示した以上、砂蠍団は暁の血盟の独立を許さない、危険すぎるのだという。彼は、ヴェスパーベイにエーテライトがないのもその証拠だと言う。必要性を理解しながら、協力しない限りはあえて便宜を与えないのだ、と。</p><p>ではどこへ行くのかと問うミンフィリアに、アルフィノは中立は実態だけでなく外見も重要だと説き、三国から距離を置き、誰もが国境外と認める地に旗を立てるべきだと提案する。モードゥナ――正確にはレヴナンツトール。中立地で必要な施設が揃い、さらに多くの冒険者が集うため、戦力補強にもつながるという。彼はウルダハとの絆を理解していると前置きしつつも、それが最善だと信じると言う。ミンフィリアは反発し、長年築いた地域との繋がりはかけがえがなく、ウルダハは自分たちの家だと訴える。荒涼たる地で一からやり直すのは無謀を超えている、と。アルフィノは決定はあなたに委ねるとしつつ、暁の血盟を創設した目的、そしてその前に彼女が十二神信仰団を興した目的を思い出してほしいと求める。理想を志す点で祖父と同じだと語り、あなたたちは単なる戦友以上で、家族同然だと言いかけるが、ミンフィリアは言葉を遮り、彼に自分の家族の用事に戻るよう告げて会話を終わらせる。アルフィノはそれに対し、私事は適任者に任せてあり、結社の必要よりも個人の事情を優先するわけにはいかないのだと答える。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ミンフィリア <small class="muted">（砂の家, X:6.9, Y:6.1）</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="moving-on.html">歌姫を追って</a></div></div>`
  },

    story:`<div class="clamp" data-collapsed="true"><p>Minfilia 察覺到你的到來，先是停了一下，隨即露出安心的神色，說能看到你安然無恙，她很高興。Tataru 這時匆匆插話，為打斷你們道歉，並回報來自 Ashgana Exports 的那位先生已經離開。她忍不住嘆氣，說自己終於明白 Minfilia 為什麼不想見他。Minfilia 肯定了 Tataru 的處理，並請她轉告守衛：今晚不再接待任何來客。</p><p>Minfilia 接著對你坦言，自從你們擊敗 Gaius van Baelsar、摧毀他的終極兵器後，世界的目光就緊盯著 Scions 的一舉一動，彷彿連眨眼都捨不得。過去你們在暗處行動，朋友很少、敵人很多；如今卻被一波又一波自稱支持者的人包圍，人人都急著表示願意「全力相助」——多到幾乎令人無所適從。然而她也清楚，每一份資助與後援都帶著代價；有些人一開始就把目的說得明明白白，有些人則想用更隱晦的方式把你們拉進去，但話術再怎麼包裝，意思都一樣：我們可以幫你，但你也得先幫我們。 Tataru 提到的那位先生就是其中最露骨的一個——他願意提供某些物資，條件卻是要 Scions 幫他解決一樁商業糾紛。Minfilia 說她當然拒絕了他，就像她拒絕其他同類的商人一樣；只是她也承認，Syndicate（Ul’dah 掌握權勢與資源的財閥高層）的示好並不是那麼容易回絕。</p><p>她提醒你，Scions of the Seventh Dawn 成立之初，是為了服務 Eorzea，而不是為了某些「個別的 Eorzean」去偏袒立場；中立性是你們行動的根本。她心裡知道這點沒錯，但她仍不免遲疑：如果接受這些資助，能讓你們擁有更大的力量去做更多好事，是否就該更慎重地思考？她話說到一半又收住，為自己把這份困擾丟給你而道歉；可她也覺得，想把這份兩難說出口，或許並非全然錯誤。於是她請你去詢問其他人——他們也一定會有各自的看法。</p><p>你先去找 Thancred。他說財富會帶來力量，力量也會帶來財富；而 Scions——尤其是你——如今擁有力量這件事，已無庸置疑，問題在於要怎麼使用它。他告訴你，難民之間正出現一股聲音：如果 Scions 願意投入力量，也許 Ala Mhigo 真的有機會被解放。但那只是一條道路，還有更多同樣正當的訴求擺在你們面前。Thancred 說你們正站在岔路口，每條路都鋪著善意，可通往哪裡卻很難說清。他也坦白，自己很想回到第一線、洗刷名聲，但他沒有忘記：類似的衝動曾在過去差點把他推向毀滅。於是他決定遵從 Baldesion（Sharlayan的學術團體）的同伴要他休息的安排。</p><p>Y’shtola 讓你想起你們曾在 Limsa Lominsa 傳來 Titan 被召喚的消息後不久，與提督 Merlwyb Bloefhiswyn（Maelstrom 的領袖）見面的那次。她說自己當時之所以能對提督直言不諱，是因為她不欠 Limsa Lominsa 任何忠誠：Lominsans 先破壞了與 kobolds 的條約，beastmen 才會作出「理所當然的回應」，而你們被請來介入的，正是他們自己招來的衝突——她只是把真相說出來而已。她表示 Minfilia 若要徵詢意見，也會得到相同的回答：你們與各城邦的往來早已削弱了「中立」的主張，而 Minfilia 正在考慮的那條路，會讓你們徹底放棄中立。更糟的是，為了終結與帝國的戰爭，各國耗費了大量軍力；她擔心 beast tribes 會嗅到這段短暫的虛弱，不會讓你們有多少休息的空間。她最後提醒你：英雄的工作永遠做不完。</p><p>Papalymo 也承認你們確實需要更多支援，但如果代價是犧牲原則，那就不值得。他說中立本來就很脆弱，他已經數不清自己解釋過多少次：你們的立場不必與據點綁在同一個地方。可如果你們真的要為了 gil 出賣服務，那乾脆直接宣布向 Ul’dah 效忠算了——他還挖苦說，Yda 一定會很享受那些賄賂。偏偏就在你們幾乎敢相信和平已到來的時候，又有新的 primal 覺醒；他忍不住感嘆，疲憊的人到底什麼時候才能休息。Yda 則小聲抱怨，她最近收到了很多禮物，但 Papalymo 一直要她退回去；而且其中有些真的很好，好到幾乎會讓人想「差點放棄原則」的那種。她還望著四周說，這裡發生過太多事了——如果牆會說話，不知道能講出多少故事。</p><p>Urianger 說，擁有力量的人注定會吸引覬覦者，也會吸引求助者；所以謹慎之道，是一手施予援助，另一手始終放在劍柄上。但你們沒有時間逐一拆解那些請求者背後的盤算，因為 beast tribes 正在暗中活動：即使敗北也不肯服輸，仍試圖再次喚起他們倒下的 primal。Urianger 說他毫不懷疑他們會回來，而且會更強、更膽大；也毫不懷疑，最後仍會是你們去面對。他只是遺憾你們人手太少、資源也太有限。</p><p>當你把眾人的想法聽過一輪，Alphinaud 表示這種局面並非完全出乎意料。他說自己也思考過 Scions 的未來，只是他得出了不同的結論，並要你跟他一起去找 Minfilia。到了 The Solar，Alphinaud 直接對 Minfilia 表明：Scions 必須離開 Ul’dah。只要總部還在 Ul’dah 的勢力範圍內，你們就不可能真正自由行動；搬到 Vesper Bay 只是把問題往後拖。你們展現了能力，Syndicate 也已經注意到你們——他們不會再容許 Scions 獨立存在，因為你們太危險了。他甚至指出 Vesper Bay 至今仍沒有 aetheryte（傳送水晶），就是最清楚的證明：Ul’dah 很清楚 aetheryte 對你們有多重要，所以只要你們不合作，就會刻意拒絕提供這類便利與其他好處。</p><p>Minfilia 問他既然 Ul’dah 不再合適，那要去哪裡。Alphinaud 說經驗告訴他，中立不只要做得到，還得看起來像；因此你們必須與三大國保持距離，把旗幟插在所有人都承認「不屬於任何國界」的地方——Mor Dhona。更精確地說，是 Revenant’s Toll：它位於中立地帶，具備你們所需的基礎設施；此外，那裡也常有大批冒險者出入，或許能補強你們的人手。他承認你們與 Ul’dah 的人們多年來建立了某種牽絆，但他真心相信這才是最好的選擇。Minfilia 立刻強烈反對，說你們與當地社群的連結是多年努力換來的無價成果，Ul’dah 更是你們的家；要你們拋下已建立的一切，去那片荒涼之地從頭開始，根本是超越魯莽的行為。Alphinaud 表示決定權在她手上，但希望她記得當初促使你們建立 Scions 的共同目的，也記得在那之前促使她建立 Path of the Twelve（Minfilia 早期在 1.0 時期成立的組織、研究 Echo 並協助覺醒 Echo 的人；後來成為 Scions 的前身之一）的初衷；你們追求的是理想，就像他的祖父一樣，所以你們不只是並肩作戰的同伴——你們也像家人一樣。可他話還沒說完，Minfilia 就打斷他，讓他到此為止，並說他應該去處理自己的家務事。Alphinaud 回答她的關心很體貼，但他已把那些事交給更適合的人處理；他不能讓個人的事情凌駕於組織的需求之上。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 敏菲利亞 <small class="muted"> 砂之家（X:6.9, Y:6.1)</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="moving-on.html">追星</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
