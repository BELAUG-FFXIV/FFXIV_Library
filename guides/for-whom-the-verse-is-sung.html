<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>For Whom the Verse Is Sung | BELAUG · FFXIV Library</title>
  <meta name="description" content="Alliance Raid (24) – For Whom the Verse Is Sung (DT Patch 7.3)">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#ffffff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative;max-height:360px;overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:"";position:absolute;left:0;right:0;bottom:0;height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card));pointer-events:none;
    }
    .expand-wrap{margin-top:12px}
    .expand-btn{display:inline-block;padding:8px 14px;border-radius:10px;background:var(--card);border:1px solid var(--border);cursor:pointer;font-weight:600}
    .expand-btn:hover{background:#fffef8}
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left">
        <a class="home" href="../index.html">🏠 Home</a>
      </div>
      <div class="right">
        <button id="langToggle" class="icon-btn" aria-label="切換語言">🌐 EN</button>

  <main class="container main">

          <div class="video-wrap">
            <iframe src="https://www.youtube.com/embed/g1MPUuItfGI" title="For Whom the Verse Is Sung" allowfullscreen></iframe>
          </div>
        </div>

      <section class="card">
        <div class="hd" id="pageTitle">For Whom the Verse Is Sung</div>

        <div class="tabs" role="tablist">
          <button class="tab-btn" role="tab" aria-selected="true"  data-tab="story">Story</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="acq">Acquisition</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="unlockq">Unlock Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="followq">Follow-Up Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="comments">Comments</button>
        </div>

          <div id="panel-story"    class="tab-panel active"></div>
          <div id="panel-acq"      class="tab-panel"></div>

          <div id="panel-comments" class="tab-panel">
            <div id="giscus_container" style="min-height:320px;"></div>
          </div>
        </div>

    </div>
  </main>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`For Whom the Verse Is Sung`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You spot someone darting away and push after them with urgency—before any monsters can get there first. When you reach the hiding place, Alxaal’s relief breaks through at once: you really did find her.</p><p>The girl—Scoria—stares at you, shaken and wary. Prishe introduces herself and explains that Scoria’s father asked for help. Pressed gently, Scoria admits the truth: she doesn’t want to leave Alexandria. She wants to stay and be a singer, and the thought of being taken to Tuliyollal—where she knows nothing of the music and believes no one would listen to an outsider—filled her with anger and panic until she ran without thinking.</p><p>Prishe cuts off Scoria’s apology with warmth: the only thing that matters is she’s safe. Then she tells you Scoria reminds her of Ulmia—someone Prishe once found by the coast, crying as if everything were over, because she was too nervous to sing in front of others.</p><p>Prishe doesn’t pretend she understands everything Scoria feels, but she says what she does know: if Scoria gives up singing, it would be like losing the world she’s been trying to reach. Ulmia kept going, and in time she joined the Tavnazian Cathedral Choir—exactly as she had always dreamed.</p><p>Scoria’s fear spills out anyway—what if they hate her songs, what if they laugh? Prishe points to how many different kinds of people live in Tural now, even people from another world among them. Being different can make a song shine, she insists, and there will be someone who hears it. When Scoria asks if she can start by sharing with you, you stay and listen.</p><p>When you return, Scoria apologizes again for worrying everyone, but Alxaal can only say she’s unharmed—and her father will finally be able to breathe. Bakool Ja Ja offers his approval, and when Jasper arrives, he thanks you with obvious gratitude, promising to repay you after the move. Scoria says she wants to meet Ulmia someday, and as everyone parts, she promises to keep singing and to save you a front-row seat—while Prishe answers, hesitant but sincere, that she hopes you will meet again.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Prishe <small class="muted">(Shaaloani, X:20.6, Y:32.9)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="northward.html">Northward</a></div>
      <div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 100</div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="apocalypse-nigh.html">Apocalypse Nigh</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'歌うは誰がため',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたは、何者かが慌ただしく逃げていくのを目にし、魔物に見つかる前に追いかける。ほどなくしてあなたは目的の人物にたどり着き、同行者は安堵の声を漏らす――無事に見つけられたのだ。</p><p>怯えた少女は、あなたたちが誰なのかを問い返す。同行者が名乗り、少女の父から頼まれて探しに来たこと、そしてどうしてひとりでいるのかを確かめる。少女はしぶしぶ胸の内を明かす――故郷を離れて移り住むことが嫌で、歌い手として生きたいのに、新しい土地の音楽も知らず、よそ者の自分の歌など誰も聴いてくれないと思い込み、腹立たしさに耐えきれず走り出してしまったのだ、と。</p><p>少女が迷惑をかけたと謝ろうとすると、同行者はきっぱりと遮り、「無事でいることが何よりだ」と告げる。そして少女を見て、かつての友人を思い出したと言い、同じように景色の良い場所で泣いていたことがあるのだと語り始める。</p><p>その友人は、人前で歌うことが怖くて足がすくみ、望んでいた場に踏み出せずにいた。けれど世界は広い、小さなつまずきに囚われ続ければ大切なものを見失う――同行者はそう伝えたのだという。自分が少女のすべてを理解できるわけではないと前置きしながらも、歌を諦めることは、少女が目指してきた世界の終わりになってしまう、と。</p><p>そして友人は情熱を手放さず、やがて望んでいた合唱団に加わった。少女はそれでも不安を口にする――自分の歌が嫌われたら、笑われたらどうすればいいのか。すると同行者は、この地にはさまざまな人々が暮らし、さらに異なる世界の者まで交わるほど多様だと言い、違いこそが歌を特別にすると励ます。</p><p>少女は、その「特別」をまずあなたに向けてもいいかと尋ねる。あなたは彼女の申し出を受け止め、その歌を聴く。その後、あなたたちが戻ると、少女は心配をかけたことを詫び、同行者は無事を喜ぶ。やがて父親が駆けつけ、事情を聞いたうえで深く礼を述べ、落ち着いたら必ず報いると約束する。少女は、いつかその友人にも会いたいと言い、あなたたちがまた戻ってくるのを信じて、歌い続けると誓う――再会の言葉は、名残惜しさを残しながら交わされる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> プリッシュ <small class="muted">(シャーローニ荒野, X:20.6, Y:32.9)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="northward.html">北の地への導き</a></div>
      <div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv. 100</div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="apocalypse-nigh.html">世界に在りて君は何を願うのか？</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'為誰而歌',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你看見有人匆匆逃離，立刻追了上去，在怪物先一步找到對方之前。當你終於逼近藏身處時，Alxaal 先是愣住，隨即像鬆了口氣般喊出：你真的把她找回來了。</p><p>那名少女，Scoria 驚魂未定地看著你們，結巴地問你們是誰。Prishe 直接表明身分，說是 Scoria 的父親拜託你們前來尋找，並追問她為什麼要一個人待在這裡。Scoria 的情緒終於崩開：她不想離開 Alexandria，她想留在那裡當歌手；而要搬去 Tuliyollal 這件事讓她害怕又憤怒，因為她覺得自己不懂那裡的音樂，也覺得像她這種不是來自 Tural 的無名之輩，根本不可能被人聽見。越想越氣的她只想一個人冷靜，於是一路逃跑，跑著跑著就迷失到這裡。</p><p>Scoria 急忙道歉，說自己可能害大家擔心、添了麻煩，但 Prishe 立刻打斷她，語氣乾脆卻很溫柔：不用道歉，你平安無事才是最重要的。接著她說，Scoria 讓她想起一位朋友，Ulmia。</p><p>Prishe 回憶起那一天：她曾在海邊的景色之下找到 Ulmia，Ulmia 哭得像世界末日一樣。Ulmia 想加入合唱團，卻因為緊張到不敢在眾人面前開口而止步。Prishe 告訴她，世界很大，如果只盯著那些小小的挫折不放，就會錯過更重要的風景。</p><p>Prishe 也坦白，她不會假裝完全懂 Scoria 正在經歷什麼；但她很確定一件事，如果你放棄唱歌，那就等於親手結束你一直努力想抵達的那個世界。她說自己當時也是這樣鼓勵 Ulmia，而 Ulmia 最終沒有放棄，繼續追逐歌聲，最後如願加入了 Tavnazian Cathedral Choir。</p><p>Scoria 的不安仍舊壓在胸口：如果他們討厭她的歌呢？如果所有人都笑她呢？Prishe 指著眼前的現實回應：Tural 本來就住著各式各樣的人，而現在甚至連來自另一個世界的人也與在地居民交錯往來，這裡多元到滿溢。正因為你不一樣，你的歌才會特別；一定有人會珍惜那份不同。當 Scoria 小聲問能不能先把歌分享給你時，你選擇留下，讓她從你開始。</p><p>你們回到眾人身邊後，Scoria 再次為讓大家擔心而道歉；Alxaal 看著她毫髮無傷，只說她父親心上的重擔終於能放下。Bakool Ja Ja 也肯定了你們的應對。很快，Jasper 趕到現場，聽完 Scoria 的說明後，滿懷感激地向你道謝，並承諾等搬到 Tuliyollal 安頓好之後一定會設法報答。Scoria 則說希望很快再見，也想見見 Ulmia；臨別前她鄭重保證會繼續唱下去，像 Prishe 說的那樣把歌聲分享給世界，還要你一定要再回來——她會替你留著前排的位置。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Prishe <small class="muted">(沙阿羅阿尼荒野, X:20.6, Y:32.9)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="northward.html">通往北方大地的指引</a></div>
      <div class="row">任一戰鬥／魔法職（不含限制職業）Lv.100</div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="apocalypse-nigh.html">末日將至有何所願</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
