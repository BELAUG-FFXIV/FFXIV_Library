const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`On the Properties of Primals`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Raya-O-Senna tells you that your bravery in service to the Twelveswood and her moogles will not be forgotten. She says her sister will surely wish to hear the tale of this victory from the one responsible, and asks you to return to the Lotus Stand while the day’s events are still fresh in your mind. When you hesitate out of modesty, she gently reminds you that even if you take no pleasure in recounting your deeds, others do—and that should be reason enough for someone as selfless as you to go.</p><p>You make your way to the Lotus Stand, where those waiting for you are eager for news. Yda blurts out that Kuplo Kopp says you killed the king, and complains that it ruined the end of your story. Papalymo turns to what troubles him most: by Louisoix’s definition, the late King Moggle Mog XII was indeed a primal—yet that makes little sense, and seems to defy all precedent. Kuplo Kopp all but bounces with impatience, insisting everyone wants to hear your tale and urging you to tell it at once.</p><p>Kan-E-Senna receives you with relief, glad that you have returned unharmed and victorious, yet she says many questions remain. She asks you to recount everything that happened in Thornmarch. When you finish, the weight of your account settles over the room—this is what they feared. Yda admits it sounds like the king truly is a primal, but then immediately doubts it: the moogles do not worship him, he is not a god to them, and that does not resemble any primal she has ever known. Papalymo argues that perhaps the flaw lies in the definition. What matters is that, through the power contained in crystals and the force of their collective faith, the moogles called forth a being that should not exist. And when that being was slain, no corpse remained—only aether scattered to the winds. Kan-E-Senna agrees that, by the accepted definition, the king may not be a primal, yet the manner of his manifestation was the same in every respect.</p><p>That conclusion points them toward a darker suspicion. Papalymo says the stink of the Ascians clings to the whole affair, and Kuplo Kopp—startled—blurts out what he has heard: years ago, the moogles said it was a masked man who taught them how to do it. He falters, trying to explain that Gridania has no shortage of masked men, and he never thought to question it. Papalymo curses the thought of how many more will be ensnared by such tainted gifts. Kan-E-Senna answers with grim certainty: so long as there are Paragons to stir the embers, fools to build the pyre, and crystals to feed the flames, they will suffer primal visitation again and again. It is a somber lesson, but a necessary one.</p><p>Kan-E-Senna thanks you sincerely, saying the information you have provided is already proving invaluable, and that she and the grand serpent marshal have much to discuss. Before she turns to that, Yda asks to finish speaking about another matter, only for Kan-E-Senna to say it has already been settled: the Scions will not want for support, and additional supplies will be sent to Revenant’s Toll. Yda rejoices, and Papalymo suggests that while he and Yda remain behind to discuss the particulars with the Elder Seedseer, you should return to the Waking Sands and apprise the Antecedent of everything that has transpired. As you prepare to depart, Kuplo Kopp assures you that you need not worry about the Mogglesguard anymore—the chieftain made them apologize in front of everyone, and they are being watched closely. Kan-E-Senna asks you to extend her personal thanks and best wishes to the Antecedent for the Scions’ forthcoming move.</p><p>Back at the Waking Sands, Minfilia welcomes you, relieved to see you safe. She says she received word from Yda and Papalymo that you felled Good King Moggle Mog XII, but she wished to hear your version of the tale. When you recount it, she confirms the truth of it: the king was summoned by the same methods used by the beast tribes, and the knowledge was taught by the Ascians. Unfortunate as the incident was, it served to remind the Elder Seedseer of the Scions’ usefulness, and her offer of additional support could not have come at a better time. Minfilia thanks you.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row">Quest Giver <span class="muted">Raya-O-Senna (South Shroud, X:18.6, Y:27.1)</span></div></div>`,

    langLabel:'日本語',
    pageTitle:'邪なる手引き',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ラヤ＝オ＝センナは、黒衣森とモーグリたちのために示したあなたの勇気は決して忘れられないと告げる。そしてこの大勝利の物語を、当事者であるあなたの口から姉もぜひ聞きたがるはずだと言い、記憶が新しいうちにロータススタンドへ戻って一日の出来事を詳しく語ってほしいと頼む。あなたが遠慮すると、彼女はあなたの慎み深さをよく知っているとしたうえで、自分が語ることを好まなくとも、聞く者がそれを喜ぶのだと思えばよい、と背中を押す。</p><p>ロータススタンドに向かうと、待っていた者たちは興奮を隠せない。ヤ・シュトラ……ではなく、イダは、クプロ・コップから「王を倒した」と聞いたと勢いよく言い、結末を先に言われて物語が台無しになったと冗談めかしてこぼす。パパリモは、ルイゾワの定義に従えば討ち果たされたグッドキング・モグル・モグXII世は確かに蛮神だが、それがどうにも腑に落ちないと首をひねる。クプロ・コップは皆があなたの話を聞きたがっているのだと急かし、早く語ってほしいとせがむ。</p><p>カヌ・エ・センナは、あなたが無事に戻り、しかも勝利を収めたことを喜びながらも、なお多くの疑問が残っていると言い、ソーンマーチで何が起きたのか一部始終を聞かせてほしいと願う。あなたの報告を受け、状況はやはり彼らが恐れていたとおりだという空気が広がる。イダは王が蛮神なのだと言いかけながらも、モーグリたちは王を崇拝しているわけではなく、神として扱っているわけでもないのだから、これまでの蛮神像とは違うと疑問をぶつける。パパリモは、問題は定義の側にあるのかもしれないと言い、重要なのはクリスタルに宿る力と彼らの集合的な信仰によって、本来存在し得ないはずの存在が呼び出されたという事実だと述べる。さらに、それを討ったあとに亡骸は残らず、構成していたエーテルが四方へ散ったのだとも言う。カヌ・エ・センナは、受け入れられている定義のうえでは蛮神ではないかもしれないが、顕現の仕方はあらゆる点で同じだったと結論づける。</p><p>その結論は、より不穏な気配を招く。パパリモは、この一件はアシエンの仕業の臭いが濃いと断じ、クプロ・コップは驚きながら、数年前に「戴面具の神秘人」がやり方を教えたのだと聞かされていたと口走る。だがグリダニアには面を隠す者も多く、疑うことすらしなかったのだと、言い訳めいた言葉で途切れる。パパリモは、穢れた贈り物でどれほど多くの者が絡め取られていくのかと歯噛みし、カヌ・エ・センナは、火種をあおる「パラゴン」がいて、薪を積む愚者がいて、炎を養うクリスタルがある限り、蛮神の来訪は繰り返されるのだと厳しく言う。それは重苦しいが、心に刻むべき教訓だとも。</p><p>カヌ・エ・センナは、あなたがもたらした情報はすでに計り知れない価値を持っているとして深く感謝し、グランドサーペントの総帥と話し合うべきことが多いと言う。そこへイダが別件の相談を続けたいと申し出ると、カヌ・エ・センナはすでに決着がついたと告げ、暁の血盟は支援に困ることはなく、レヴナンツトールへ追加の物資を送る用意があると約束する。イダは喜び、パパリモは自分とイダが取り決めの詳細を話し合うあいだ、あなたは砂の家へ戻って先導者に一連の出来事を報告してほしいと言う。出立の前にクプロ・コップは、モーグリ親衛隊は族長の命で皆の前で謝罪させられ、今後も厳しく見張られているから心配いらないと伝える。カヌ・エ・センナもまた、暁の血盟の移転に際しての謝意と祝意を先導者へ伝えてほしいと頼む。</p><p>砂の家に戻ると、ミンフィリアはあなたの無事を喜び、イダとパパリモから王を討ったと聞いたが、ぜひあなた自身の話として聞きたかったのだと言う。あなたの報告を受け、彼女はそれが獣人たちと同じ召喚の手法であり、しかもその知識はアシエンによって授けられたのだと確信する。不幸な事件ではあったが、長老の導師が暁の血盟の有用性を再認識するきっかけにもなり、追加支援の申し出はこれ以上ない好機だったとして、ミンフィリアはあなたに感謝を述べる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row">クエスト発行 <span class="muted">ラヤ・オ・センナ（黒衣森：南部森林, X:18.6, Y:27.1）</span></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="you-have-selected-regicide.html">善王モグル・モグXII世による粛清</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 50～</div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-gifted.html">失われし伝承と存在</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'邪惡的引路人',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Raya-O-Senna 告訴你，你為了 Twelveswood 與 moogles 挺身而出的勇氣不會被遺忘。她說她的姊妹一定也想親口聽聽這場大勝利——由你這位當事人把整天的經過完整說出來。她要你趁記憶還新鮮，回到 Lotus Stand 把今日發生的一切好好交代一遍。你若因謙遜而不願多談，她也早就看透你的性子：就算你不以訴說功績為樂，也請想想其他人聽見時的喜悅——這份心意，對像你這樣無私的人來說，已經足夠成為動力。於是她催你動身前往 Lotus Stand。</p><p>你抵達後，有人早已迫不及待等著你開口。Yda 一見你就喊出來，說 Kuplo Kopp 已經到處宣稱你殺了國王；她雖然高興，卻也忍不住抱怨這讓你的故事結尾被提前爆雷，還笑罵他是個傻 moogle。Papalymo 則把注意力放在更棘手的問題上：依 Louisoix 的定義，已死的 King Moggle Mog XII 的確算是 primal，可這件事卻又完全不合常理，甚至推翻了以往的先例。Kuplo Kopp 站在一旁催得更直接——大家都想聽你的故事，你到底還在等什麼，快說給他們聽。</p><p>Kan-E-Senna 也在場，她看到你平安歸來、而且帶回勝利，說自己因此有兩個理由感到欣慰；但她也坦言，仍有太多疑問沒有答案。她請你把 Thornmarch 裡發生的一切從頭到尾說清楚。當你把經過交代完，眾人不得不承認：事情果然和他們擔心的一樣。Yda 先脫口而出國王真的是 primal，下一秒又自己否定——moogles 並沒有崇拜他，他對他們也不是神，這怎麼看都不像她認識的任何 primal。Papalymo 於是提出另一種想法：或許錯的不是現象，而是定義。事實是，moogles 把 crystals 裡的力量與他們集體的信念揉合在一起，召喚出一個「本來不該存在」的存在；而當你將其討伐後，現場沒有留下屍體，只剩構成它的 aether 散向四方。Kan-E-Senna 也認同：就算依現行定義它未必算 primal，但它顯現的方式在各方面都與 primal 無異。</p><p>這個結論讓氣氛瞬間沉了下來。Papalymo 語氣篤定地指出：這整件事怎麼看都像是 Ascians 在背後動了手腳。Kuplo Kopp 聽得一震，急忙補上他所知道的細節：多年前，那些 moogles 說過，是「戴面具的神秘人」教他們怎麼做的——只是 Gridania 戴面具的人並不少，他當時從未想過要質疑。Papalymo 氣得咒罵，想到還會有多少人被這些污穢的「贈禮」套牢。Kan-E-Senna 則沉重地指出：只要還有 Paragons 去撩撥火種、還有愚人去堆起柴堆、還有 crystals 去餵養火焰，primal 的來訪就會一再重演。這想法令人沮喪，但也必須正視。</p><p>Kan-E-Senna 向你致上由衷的謝意，說你提供的情報已經證明極其重要，她與 grand serpent marshal 還有許多事要商議。Yda 趁她要離開前提起另一件事想繼續談，Kan-E-Senna 便告訴她：那件事已經解決了——Scions 不會缺少支援，她們也願意把更多補給送往 Revenant’s Toll。Yda 聽了立刻雀躍，Papalymo 則表示他和 Yda 會留下來談妥細節，而你可以先回到 Waking Sands，把一切經過告知 Antecedent。你準備離開時，Kuplo Kopp 安慰你不用再擔心 Mogglesguard：chieftain 已經讓他們在所有人面前道歉，而且還會持續盯著他們。Kan-E-Senna 也請你代她向 Antecedent 致意，並送上對 Scions 即將搬遷的祝福。</p><p>回到 Waking Sands，Minfilia 見到你安然無恙，真心說很高興。她提到 Yda 與 Papalymo 已經通報你討伐了 Good King Moggle Mog XII，但她仍希望聽你親口把故事說完。聽過你的敘述後，她確認事情果然如他們所說：這是以 beast tribes 相同的方法所進行的召喚，而且還是 Ascians 教導的結果。雖然不幸，這起事件至少提醒了 Elder Seedseer：Scions 的存在確實有其價值；而她願意提供更多支援，也正好來得及時。Minfilia 向你道謝。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

};

  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
