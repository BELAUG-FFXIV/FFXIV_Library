  EN:{
    langLabel:'English',
    pageTitle:`A Final Temptation`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Thancred watches you turn the puzzle over in silence, waiting for the moment your face changes with a sudden answer. When no flash of insight comes, he shrugs it off with dry humor and proposes the only sensible next step: go back and pick Fufulupa’s brain again. If the three of you press him together, perhaps something useful will finally surface.</p><p>Y’shtola agrees that a subtler approach may be necessary, and Thancred—half amused, half impatient—pulls you along. He insists that lingering with him will not move the investigation forward, then guides you back to Horizon to speak with Fufulupa once more.</p><p>Fufulupa is genuinely relieved to see you return, but his relief turns into agitation the moment he speaks. He has been thinking, and what he has realized feels like a blow: the only way the thieves could have avoided detection for so long is if someone among the Brass Blades was helping them—there is a traitor within his own ranks. Y’shtola steadies him and demands details, and the possibility settles over the three of you like a cold weight.</p><p>You begin to reason through what such betrayal would mean. Y’shtola points out that if Amajina & Sons Mineral Concern（Ul’dah 做礦產、建材、貨運與倉儲等生意的礦產公司） decided, for security, to move the remaining crystals out of Horizon, the plan would be exposed the instant the Brass Blades were informed. Thancred wonders aloud whether thieves as cunning as these would risk a guarded shipment and an open fight. Y’shtola agrees they likely would not—and neither would the Concern want to hand them an obvious target. Instead, she suggests, the Concern would attempt the transfer in secret, entrusting the crystals to a lone Miqo’te miner traveling without escort to avoid attention, someone who would be forced to rest along the way. Fufulupa follows the thread and proposes a likely place: north of the bridge to Hammerlea.</p><p>Thancred takes the idea and turns it into a trap. He places you in position to the north while he waits to the south, each of you ready to intercept anyone who tries to make contact. Fufulupa receives new orders and rushes off to alert his men, and Thancred leaves you with a warning that the thieves are unlikely to surrender peacefully—be ready to encourage them to reconsider.</p><p>When the moment comes, you hesitate too long, and Thancred’s shout snaps through the plan: if the thieves approach from the north, no one will be there to stop them. Even as the reprimand lands, movement catches your eye. The thieves reveal themselves with crude threats and reckless certainty, and the ambush collapses into violence. When it ends, Thancred meets you again with grim confirmation—of course none of them are still breathing—and urges you not to keep your “miner” waiting.</p><p>Back at the rendezvous, Y’shtola reads the outcome with no surprise. The thieves were stubborn to the last, as expected, and she checks that you are unharmed. Thancred, for his part, sounds almost incredulous: a gang of Sea Wolf thieves operating in Thanalan of all places. He confirms that they were all Sea Wolves, all bearing the same taste in blue facial tattoos. Y’shtola quietly notes what that implies—the thieves are far from home—and then directs Thancred to handle the remaining matters in Horizon while she pursues her own inquiries.</p><p>You return to Horizon to report, and Thancred tells you not to dress the story up. Simply tell Fufulupa what happened. Fufulupa greets you with formal gratitude on behalf of the Brass Blades of the Rose, and then adds that they have not been idle: while you were out, they identified the traitor in their ranks. Thancred immediately asks to speak with the man in private, but Fufulupa admits it is impossible—the traitor overpowered the unit sent to detain him and escaped.</p><p>Thancred’s patience frays. He demands to know how such a thing happened, biting back disbelief—had his men been sampling the confiscated somnus, or was the fugitive some giant in disguise? Fufulupa insists no, but claims the man was exceptionally strong: a Sea Wolf, Lominsan born and raised. He promises they will find him, and Thancred tells him to report any developments without delay.</p><p>Then duty cuts the moment short. Thancred receives word that you are needed elsewhere, and he turns to you with an affected lament that your time together has come to an end. He complains that you are not even trying to look disappointed, already bracing for your familiar stoic nod—and with a resigned sigh, he sends you on your way.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>サンクレッドはあなたの顔を覗き込み、ひらめきが走る瞬間を待つ。だが、何も浮かばない。彼は肩をすくめ、苦笑まじりに言う。良案がないなら、フフルパの頭をもう一度掘り返そう。三人で詰めれば、何かしら役に立つものが出てくるかもしれない、と。</p><p>ヤ・シュトラも、もっと巧妙な手が必要かもしれないと応じる。サンクレッドは半ば呆れ、半ば楽しむように、あなたと話しても前進しないと言い切り、さっさとホライズンへ戻ってフフルパに当たろうと促す。</p><p>戻ってきたあなたたちを見て、フフルパは心底ほっとしたように迎える。だが次の瞬間、彼は取り乱し始める。考えれば考えるほど恐ろしい可能性に行き当たったというのだ。盗人が長く活動できたのは、こちらの目を逃れたからではない──自分たちの中に共謀者がいるからだ。ブラスブレードの内部に裏切り者がいる。ヤ・シュトラは落ち着けと制し、その「恐ろしい可能性」を具体的に語れと迫る。重たい沈黙が、あなたたちの間に落ちる。</p><p>さらに推論は進む。ヤ・シュトラは、アマジナ鉱山社がホライズンに残るクリスタルを安全のため別の場所へ移そうとしたとしても、ブラスブレードに知らせた瞬間に計画が漏れると言う。サンクレッドは、ならば護衛を厚くするはずだが、あの狡猾な盗人が正面衝突を選ぶだろうかと疑う。ヤ・シュトラは同意しつつ、だからこそ社は露骨な標的を作らず、密かに移送するのではないかと示す。例えば、護衛を付けず目立たぬよう単独で旅するミコッテの採掘師に託す──途中で休息が必要になるほどの荷を背負わせて。</p><p>フフルパはそこまで聞いて腑に落ち、休む場所としてハンマーレアの橋の北を挙げる。サンクレッドはその推理を罠に変える。あなたを北に配置し、自分は南に伏せ、両側から動きを監視する。フフルパは新たな命令を受けたと言って部下へ伝えに走り、サンクレッドは皮肉っぽく、盗人が武器を捨てて投降するとは思えない、覚悟して「説得」するよう忠告する。</p><p>だが土壇場であなたの動きが遅れ、サンクレッドの声が飛ぶ。北から来られたら止める者がいない、と。視線の先で気配が揺れ、盗人たちは荒い言葉を吐きながら姿を現す。躊躇は許されず、待ち伏せはそのまま衝突へとなだれ込む。やがて終わりが訪れ、サンクレッドは淡々と確かめる。生きている者などいないのだろう、と。そうだろうな、と短く言い、採掘師役を待たせる理由もないと告げる。</p><p>合流すると、ヤ・シュトラは予想どおりの結末だと受け止め、あなたが無事かを確かめる。サンクレッドは、ザナラーンでシーウルフの盗賊団とは、と半ば呆れるように言う。しかも全員が同じ趣味の青い顔の刺青を入れていた。ヤ・シュトラは、彼らが故郷から遠く離れている事実を噛みしめるように呟き、サンクレッドにホライズンの残務を任せ、自分は別の聞き込みへ向かうと告げる。</p><p>ホライズンに戻ると、サンクレッドは吟遊詩人の脚色など不要だと釘を刺す。フフルパに起きたことをそのまま伝えろ、と。フフルパはローズのブラスブレードを代表して礼を述べ、さらに自分たちも手をこまねいていたわけではないと言う。あなたが外に出ている間に、内部の裏切り者を特定したのだ。</p><p>サンクレッドはすぐさま、その男と二人で話したいと求める。だがフフルパは、それは叶わないと告げる。拘束に向かった部隊を逆に制圧し、裏切り者は逃げおおせたのだ。サンクレッドの堪忍袋は切れかけ、どうやってそんな真似ができたのかと詰め寄る。押収したソムヌスでも口にしたのか、あるいは巨人の変装でもしていたのか、と毒づく。フフルパは否定しつつ、相手は並外れて強かった、リムサ・ロミンサ生まれ育ちのシーウルフだと説明し、必ず捕えると誓う。サンクレッドは冷たく頷き、進展があれば知らせろと言い残す。</p><p>そして、あなたに別の任務が下る。サンクレッドは名残惜しそうに装いながらも、義務には逆らえないと言ってあなたを送り出す。せめて少しは残念そうな顔をしろ、と愚痴をこぼし、どうせまた無言で頷くのだろうと溜息をついて、あなたの背中を見送った。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> サンクレッド <small class="muted">（西ザナラーン, X:22.6, Y:17.0）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="still-waters.html">「暁」の役目</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-mother-of-exiles.html">異邦からの来訪者</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'水晶失竊事件',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Thancred 盯著你，像是在等你忽然冒出一個「啊，我懂了」的靈光一閃。可你沒有。於是他只好半開玩笑地說：既然想不出更好的方法，那就再去挖挖 Fufulupa 的腦袋吧。或許你們三個一起逼問，還真能把某個藏在裡頭的線索逼出來。</p><p>Y’shtola 也認同，或許得換個更「不著痕跡」的方式。Thancred 則帶著一點無奈，說你再怎麼跟他聊天也不會讓案情有進展，乾脆直接去找 Fufulupa。於是你跟著他回到 Horizon，準備再把所有零碎的線索重新梳理一遍。</p><p>Fufulupa 看到你們回來，先是如釋重負，下一秒卻像被自己的念頭嚇到一樣慌了起來——他終於想到一個令人不寒而慄的可能性。為什麼竊賊能躲過你們的視線這麼久？答案也許不是「太狡猾」，而是「有人在幫忙」：在 Brass Blades（Ul’dah 的治安部隊／傭兵警備組織，負責城邦周邊的巡邏、維安、盤查、逮捕、調查等工作） 的隊伍裡，可能有內鬼。Y’shtola 立刻要他冷靜，逼他把這個可能性說清楚，而那句「自己人裡有叛徒」就這樣沉甸甸地落在你們之間。</p><p>你們順著這條線往下推。Y’shtola 指出，如果出於安全考量，Amajina & Sons Mineral Concern（Ul'dah 做礦產、建材、貨運與倉儲等生意的礦產公司） 想把 Horizon 剩下的水晶轉移到別處，只要一通知 Brass Blades，計畫就會立刻被內鬼傳出去。Thancred 反問：就算要轉移，這種貨物一定會被重兵護送，竊賊真敢硬碰硬？Y’shtola 卻認為未必——正因為雙方都不想把事情變成正面衝突，Concern 才更可能選擇祕密運送：把貨交給一位不起眼、沒有護衛的 Miqo’te 礦工，單獨上路，避免引人注目。但這麼多貨不可能一路不停，他勢必得在途中找地方休息。</p><p>Fufulupa 立刻接上這個推論，幾乎是用「忽然想通」的語氣說出一個地點：也許是在通往 Hammerlea 的橋北側。Thancred 乾脆把推論變成陷阱——他安排你埋伏在北邊，自己守在南邊，兩面夾擊。Fufulupa 又接到新的命令，匆忙回去通知部下；Thancred 則冷冷提醒你，這些竊賊多半不會放下武器投降，要你準備好「勸他們配合」的手段。</p><p>可事情真的動起來時，Thancred 的怒喝先傳了過來：你在做什麼？如果竊賊從北邊靠近，就沒人能攔下他們了。你還來不及回應，遠處的動靜就先抓住了你的視線——竊賊出現了，語氣粗野，殺意也不遮掩。衝突在一瞬間爆開，直到一切安靜下來，才只剩下你呼吸裡的餘韻。</p><p>Thancred 很快就確認了結果：你確實撞上竊賊了，而那些人當然沒有留下活口。他沒有再浪費時間感嘆，反而催你別讓「礦工」等太久——你們還得把這場遭遇帶回去，讓 Horizon 的調查繼續往前走。</p><p>回到會合處，Y’shtola 只淡淡地說，竊賊果然頑固到最後，然後確認你是否受傷。Thancred 也忍不住感到意外：一群 Sea Wolf 竊賊，竟然跑到 Thanalan 行動，還真是頭一次見。他更確認所有人都是 Sea Wolf，而且臉上都有同樣品味的刺青——藍色。Y’shtola 低聲評斷：你們的竊賊離家很遠。接著她要 Thancred 回 Horizon 處理剩下的事務，自己則另有問題要去追查。</p><p>你們回到 Horizon 準備回報時，Thancred 先提醒你：這種事不需要吟遊詩人來加油添醋，只要把事情照實告訴 Fufulupa。Fufulupa 以 Rose 的 Brass Blades 名義向你致謝，並且表示他們並沒有閒著——你們外出期間，他們已經找出了隊伍裡的內鬼。Thancred 立刻要求私下與那人談談，但 Fufulupa 的回答讓人火大：辦不到。那名內鬼竟然制服了前去逮捕他的 Brass Blades，成功逃走。</p><p>Thancred 的語氣瞬間尖銳起來——他到底怎麼做到的？你們該不會有人去偷嘗那批查獲的 somnus（昏睡藥）吧？還是他其實是什麼「巨人偽裝」？Fufulupa 急忙否認，只能強調對方真的很強，是一名 Sea Wolf（Roegadyn 的族群分支「海狼族」；多與海上勢力圈、船員／海盜文化相關。此處點出竊賊是 Limsa Lominsa 出身，暗示其背景與可能的行動網絡），而且是 Limsa Lominsa 土生土長。他保證一定會把人抓回來。Thancred 只是冷冷要他隨時回報任何進展。</p><p>就在這時，Thancred 接到新的訊息——你的任務到此為止，你得立刻去別處支援。他用一種刻意誇張的惋惜收尾，說你們相處的時間結束了，雖然很令人失望，但職責在身也只能遵從。他甚至還抱怨你至少該表現得失望一點，別又只給他那個一如往常的沉默點頭。然後，他嘆了口氣，放你離開。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 桑克瑞德 <small class="muted"> 西薩納蘭（X:22.6, Y:17.0)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="still-waters.html">拂曉的使命</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-mother-of-exiles.html">異邦的來訪者</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
