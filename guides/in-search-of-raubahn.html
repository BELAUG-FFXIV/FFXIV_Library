  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}

    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}

      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}

    .tab-panel{display:none}

    .expand-wrap{ margin-top:12px; }

      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`In Search of Raubahn`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Alphinaud looks to the woman before you and wonders if she is the Doman contact of whom the Admiral spoke. Higiri answers without delay. Not long before your arrival, word reached her from Limsa Lominsa that you were searching for General Raubahn. As Merlwyb had already learned, he was recently removed from his cell in the Marasaja Pit. At almost the same moment, Yuyuhase and the 3rd Unit were seen departing the Rising Stones. To Higiri and her comrades, the meaning is difficult to mistake. They believe the unit has been tasked with escorting the Flame General to the place of his execution. Yet the Domans have not stood idle. Even now, their people are shadowing the 3rd, and if you mean to join the pursuit, Higiri bids you seek out Doware at Highbridge, where she herself is heading.</p><p>As you set out, Alphinaud cannot help but praise your Doman allies once again, bitterly remarking that Lolorito was a fool to deny them asylum. Higiri confirms that her comrades are already in motion, following the 3rd Unit even now. By the time you reach Highbridge, the urgency in the air has only sharpened. Alphinaud’s thoughts turn dark at the mention of Yuyuhase, the name calling back the memory of cold steel at his throat. Beside him, Higiri readies herself for what lies ahead. Though she has spent her recent days in kitchens at Revenant’s Toll, she quietly reminds you that domestic work has not dulled her edge. She may have learned to handle a skillet, but she has not forgotten how to wield a dagger.</p><p>Doware wastes no time on pleasantries. He has been waiting for you, and the matter is too urgent for anything but the truth. Yuyuhase and his men are making for Halatali, and the Domans believe that this is where the execution is meant to take place. Hozan is already stationed at the entrance, keeping watch, and so there is no reason to linger. Whatever is to be done must be done quickly, before Raubahn is lost beyond all reach.</p><p>On the way, Alphinaud’s anger turns toward Ilberd. Raubahn’s connection to Halatali is no secret, and that this place should be chosen for his death can only be deliberate cruelty. To drag him there, of all places, feels less like necessity than calculated spite. The deeper Alphinaud peers into Ilberd’s designs, the more monstrous they seem, as if there were no indignity he would refuse to inflict upon the man he betrayed.</p><p>At Sandgate, Hozan meets you with grave certainty. You have arrived at a crucial moment: only moments earlier, the traitor Ilberd was seen entering Halatali. That single sighting is enough to banish all doubt. General Raubahn is being held within, and the hunt that began in fragments of rumor has now led you to the threshold of the place where everything will soon be decided.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Higiri <small class="muted">(Mor Dhona, X:22.0, Y:5.0)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="flame-general-affairs.html">Flame General Affairs</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 51</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="keeping-the-flame-alive.html">Keeping the Flame Alive</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'ラウバーンを追って',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>アルフィノは、目の前の女性こそ提督が語っていたドマの協力者ではないかと確かめるように視線を向ける。ヒギリはすぐに応えた。あなたが到着する少し前、リムサ・ロミンサから、あなたたちがラウバーン将軍を捜しているという知らせが届いたのだという。提督からすでに聞いているとおり、将軍は最近、マラサジャ処刑場の牢から別の場所へ移された。そしてちょうどその頃、ユユハセ率いるクリスタルブレイブ第三分隊が石の家を発った姿も確認されていた。ヒギリたちは、それを単なる偶然とは見ていない。彼らの目的は、炎将軍を処刑の場へ護送することにあると考えているのだ。それゆえ、ドマの者たちはすでに第三分隊の追跡を始めていた。あなたも追跡に加わるつもりなら、ハイブリッジでドワレと落ち合ってほしいとヒギリは告げ、自らもまたそこへ向かう。</p><p>出発を前に、アルフィノはあらためてドマの仲間たちの働きを讃え、彼らに亡命を認めなかったロロリトの判断を愚かだったと吐き捨てる。ヒギリもまた、同志たちが今この瞬間も第三分隊を追っていると力強く告げた。そうしてハイブリッジへ辿り着くころには、切迫した空気はさらに濃くなっていた。ユユハセの名を聞いただけで、アルフィノの脳裏には、かつて喉元に冷たい刃を突きつけられた瞬間の感触がよみがえる。その傍らで、ヒギリは久方ぶりにこの装束をまとい、静かに覚悟を整えていた。レヴナンツトールに来てからは厨房に立つ日々が続いていたが、それで腕が鈍ったわけではない。鍋を扱うことを覚えても、短剣の使い方まで忘れたわけではないのだと、彼女は落ち着いた声音で言い切る。</p><p>ドワレは無駄な挨拶を挟まなかった。すでにあなたたちを待っており、今は一刻の猶予もないと言わんばかりに要点だけを告げる。ユユハセとその部下たちはハラタリ修練所へ向かっている。そして、そこで処刑が行われるつもりだとドマの者たちは見ているのだという。入口にはホウザンが張り込みを続けている。ならば足を止めている暇はない。ラウバーン将軍を救える見込みがまだ残されているうちに、急いで合流しなければならなかった。</p><p>その道すがら、アルフィノの怒りはイルベルドへと向かう。ラウバーンとハラタリ修練所の縁は広く知られている。その場所をわざわざ処刑の舞台に選んだのは、決して偶然ではない。必要に迫られての判断などではなく、裏切った相手にさらなる辱めを与えるための、冷酷な意図がそこにはある。イルベルドという男の底知れなさを思うたび、アルフィノの声には嫌悪がにじむ。彼が堕ちていく先に、はたして限りというものがあるのかと疑わずにはいられなかった。</p><p>サンドゲートで待っていたホウザンは、重い確信を帯びた言葉であなたたちを迎える。来るのはまさに今しかなかったのだ。つい先ほど、裏切り者イルベルドがハラタリ修練所へ入っていく姿が確認されたという。その報告だけで十分だった。もはや疑う余地はない。ラウバーン将軍はその中に囚われている。断片的な情報をつなぎ合わせながら続いてきた追跡は、ついにすべてが決する場所の目前へと、あなたたちを導いたのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ヒギリ <small class="muted">（モードゥナ, X:22.0, Y:5.0）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="flame-general-affairs.html">ウルダハの今</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 51～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="keeping-the-flame-alive.html">ラウバーン奪還作戦</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'追查 Raubahn 的下落',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Alphinaud 望向眼前的女子，低聲猜想她是否就是 Admiral 提起過的 Doman 聯絡人。Higiri 很快便給出了答案。她說，就在你抵達前不久，她已從 Limsa Lominsa 收到消息，得知你們正在追查 General Raubahn 的下落。正如 Admiral 告訴你們的那樣，他最近已被從 Marasaja Pit 的牢房中轉移出去。而就在同一時間，Yuyuhase 與第三分隊也被人目擊離開 Rising Stones。這絕不可能只是巧合。Higiri 與同伴們認為，那支隊伍的任務，就是把 Flame General 護送到行刑現場。所幸，Doman 的人也沒有坐視不管。此時此刻，已有同伴暗中跟著第三分隊；若你也要加入追蹤，就該立刻前往 Highbridge，與正要趕去那裡的 Doware 會合。</p><p>動身之前，Alphinaud 再一次真切感受到這些 Doman 盟友的可靠，也忍不住冷冷地說，Lolorito 當初拒絕給予他們庇護，實在愚蠢。Higiri 也再次確認，她的同伴們現在正持續追蹤第三分隊，片刻都沒有停下。等你們抵達 Highbridge，局勢的緊繃已更加明顯。光是聽見 Yuyuhase 的名字，就足以讓 Alphinaud 想起那一夜貼上自己喉間的冰冷刀鋒。站在一旁的 Higiri 則重新換上久違的裝束，神色平靜卻毫不鬆懈。自從來到 Revenant’s Toll 之後，她的日子大多在廚房中度過，但那並不代表她已遠離戰鬥。她語氣沉穩地告訴你，自己雖然學會了如何揮動平底鍋，卻從未忘記該怎麼使用匕首。</p><p>Doware 一見到你們，便立刻切入正題。他一直在等你們，而現在最缺的就是時間。Yuyuhase 與手下正朝 Halatali 前進，Doman 同伴判斷，那裡就是對 General Raubahn 執行處刑的地方。Hozan 已經守在入口附近監視動靜，因此你們也沒有任何耽擱的餘地。只要 General Raubahn 還活著，只要一切還沒有真正來不及，就必須立刻趕去與 Hozan 會合。</p><p>趕路途中，Alphinaud 的怒火逐漸轉向 Ilberd。General Raubahn 與 Halatali 的淵源眾所皆知，而 Ilberd 偏偏選中這裡作為行刑地點，顯然不是偶然。那不像單純的安排，而更像是刻意為之的羞辱。彷彿只有把人拖到這樣一個地方，才能滿足他心中的惡意。Alphinaud 越是想到這裡，越覺得 Ilberd 的卑劣深不見底，彷彿再殘酷、再不堪的事，他都做得出來。</p><p>到了 Sandgate，Hozan 帶來的消息讓最後一絲疑問也徹底消失。你們來得正是時候，就在不久前，叛徒 Ilberd 才剛被人看見走進 Halatali。光憑這一點，就足以證明一切。General Raubahn 就被關在裡面。一路以來靠著零碎線索與猜測拼湊出的方向，到了這一刻，終於變成了確切無疑的目標，而你們也終於來到了真正救人之前的門檻。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Higiri <small class="muted">(摩杜納, X:22.0, Y:5.0)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="flame-general-affairs.html">關於烏爾達哈的現況</a></div><div class="row">任一戰鬥／魔法職業（不含受限職業）Lv. 51</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="keeping-the-flame-alive.html">拯救 Raubahn 大作戰</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
