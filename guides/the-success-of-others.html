const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`The Success of Others`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Alphinaud says he hasn’t forgotten what you owe Wuk Lamat, but moments like these—when you can truly immerse yourselves in another people’s culture—make him eager for everything this journey will bring. Alisaie is pleased you’ve started strong, and hopes you can keep the momentum. Krile warns that in a contest like this, it’s only a matter of time before the claimants are forced into direct competition. Erenville admits that traveling with such a large, varied group is unfamiliar to him—quietly wondering what someone dear to him would think if she could see him now.</p><p>Wuk Lamat looks at the two keystones you’ve already secured—one from the Feat of Reeds, one from the Feat of Gold—and takes it as proof that your approach has been the right one. Alphinaud agrees: if you continue retracing Gulool Ja Ja’s journey as the saga presents it, you should find the remaining electors in turn. Wuk Lamat wants to visit the giants next, thinking their search for the golden city might yield something useful.</p><p>Erenville explains the Yok Huy live high in the upper reaches of Urqopacha, and unless you’re inclined to scale cliffs, you’ll need to take the long way around—back through Kozama’uka. That route passes near the Moblin village, another important location in the saga, and since you’ll need every keystone eventually, it makes sense to visit while you’re close.</p><p>Wuk Lamat is ready to go at once, but Erenville has bad news: the Flight of We Wingless—the great stairs leading to the Moblin settlement—collapsed in the storm. There is an alternative route, but it requires preparation, so until then you can rest at the cabins or see more of the city. Wuk Lamat doesn’t hesitate—any method of travel is fine, as long as it gets you there—so Erenville, as your guide, promises to make the arrangements.</p><p>With time to spare, Wuk Lamat decides to repair her axe—she nicked the blade badly when she swung at Bakool Ja Ja—and offers to introduce you to Ropli, the man in charge of Wachumeqimeqi and “a good person to know.” She leads you through Tuliyollal’s bustle, pointing out Aunt Tii’s Tacos and trading playful words with Tiisol Ja, before bringing you onward to the markets.</p><p>At Wachumeqimeqi, Ropli greets Wuk Lamat with practiced warmth and immediately sizes up the damage: the blade is chipped terribly, as if she’d been trying to cleave rocks again. He assures her the repair is simple—done in “two shakes of an alpaca’s tail”—then turns to you. Wuk Lamat introduces you as an adventurer she recruited from across the salt, and Ropli introduces himself as the humble representative of this grand center of trade, pleased to make your acquaintance.</p><p>Before the moment can settle, Ropli barks at a man loitering in the shadows and demands he state his business. Wuk Lamat recognizes him from your voyage—Fonjeantaine, the jeweler—and when Ropli presses him, he can barely speak before fleeing. Wuk Lamat, unsettled by how he looked, suggests you find him and talk; if you spot him first, she asks you to call her by linkpearl.</p><p>You find Fonjeantaine at Gornitruq Gleamsands, and Wuk Lamat arrives at once. He insists you needn’t concern yourselves with him and begs you not to ask questions, but Wuk Lamat refuses to turn away when someone clearly needs help. Cornered by her kindness, he admits the truth: he feels painfully inadequate beside peers who seem undeniably superior. When you tell him he can’t measure his worth by the success of others, he protests that his livelihood depends on meeting exacting standards—yet in speaking it aloud, he remembers what first drove him to the craft: his father’s exquisite work, and the joy it brought to those who received it. He realizes he lost sight of that original purpose, and decides to try one last time—this time for the right reason.</p><p>Wuk Lamat lingers on the words “what is truly important,” then turns back to you, apologizing for spacing out. Still, she can’t hide her relief: she’s glad to see Fonjeantaine give himself another chance.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Wuk Lamat <small class="muted">(Tuliyollal, X:12.7, Y:13.8)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="knowing-the-pelupelu.html">Knowing the Pelupelu</a></div><div class="row"><a class="link" href="knowing-the-hanuhanu.html">Knowing the Hanuhanu</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 91</div></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'本当の自分',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>アルフィノは、ウクラマトへの務めを忘れてはいないと言いつつも、こうして異文化に身を浸せる時間こそが、この冒険で得られる新しい経験への期待を膨らませるのだと語る。アリゼーは試練の滑り出しが順調だったことを喜び、この調子で進めればいいと言う。クルルは、この種の争いではいずれ継承者たちが直接ぶつかり合うことになるだろうと警告する。エレンヴィルは、多人数で多様な仲間と旅をするのは慣れないと漏らし、もし今の自分を見たら――と、誰かを思い浮かべて言葉を切る。</p><p>ウクラマトは「葦の試練」と「黄金の試練」でそれぞれキーストーンを得たことを確かめ、これで自分たちのやり方が正しいと証明されたのではないかと問う。アルフィノは同意し、叙事詩に示されたとおりにグルージャジャの足跡を辿り続ければ、残る「選定者」も順に見つかるはずだと言う。ウクラマトは次は巨人族だと息巻き、彼らが「黄金城」を探していたのなら有益な手がかりを知っているかもしれないと期待する。</p><p>だがエレンヴィルは、ヨクフイの故郷はウルコパチャ上層で、崖を登る気がないなら遠回りしてコザマウカを抜ける必要があると説明する。その道はモブリンの村の近くを通る――叙事詩でも重要な場所であり、いずれ全てのキーストーンが必要になる以上、通りがかる今のうちに立ち寄るのが理にかなっている。</p><p>すぐに出発したいウクラマトに、エレンヴィルは難色を示す。「飛べぬ我らの階段」――モブリンの集落へ続く大階段が嵐で崩落してしまったのだ。代替手段はあるが準備が要るため、それまで小屋で休むか街を見て回るといいと言う。ウクラマトは目的地に着けるなら移動手段は問わないと即答し、案内役としてエレンヴィルは手配を引き受ける。</p><p>空いた時間に、ウクラマトは斧の修理を決める。バクージャジャに振るった一撃で刃がひどく欠けたのだという。彼女はあなたをウォチュメキメキへ誘い、そこの責任者ロプリを紹介したいと言う。道すがら彼女は街の賑わいを案内し、「アント・ティーのタコス」では店主ティーソルジャと軽口を交わしながら、あなたを市場へ連れて行く。</p><p>ウォチュメキメキでロプリは丁重にウクラマトを迎え、刃の欠け具合を見て「また岩でも割ろうとしたのか」とからかう。修理など造作もない、アルパカの尻尾を二度振る間に終わると言い、あなたへ向き直る。ウクラマトはあなたを「海の向こうから連れてきた冒険者」だと紹介し、ロプリは自らを大交易拠点の代表だと名乗って挨拶する。</p><p>だがロプリはすぐに、影でうろつく男へ声を荒らげ、用件を名乗れと迫る。ウクラマトはその男が船旅で会った宝飾職人フォンジャンテーヌだと思い出すが、問い詰められた彼は言葉に詰まり、逃げるように立ち去ってしまう。ウクラマトは放っておけないと感じ、先に見つけたらリンクパールで知らせてほしいと言う。</p><p>あなたがゴーニトルク・グリームサンズでフォンジャンテーヌを見つけると、ウクラマトもすぐに駆けつける。彼は自分のことは気にするな、説明を求めないでくれと懇願するが、ウクラマトは友だちが必要に見える人を見過ごせない。やがて彼は観念し、自分は優れた同業者たちの前でひどく劣等感に苛まれているのだと打ち明ける。あなたが他人の成功で自分の価値を測れないと告げると、彼は依頼が来なければ職を続けられないと反論する――しかし言葉にするうち、彼は原点を思い出す。父の見事な作品が人々に笑顔をもたらしたこと、そして自分も同じように「喜び」を届けたかったこと。いつの間にか動機を見失っていたのだと気づき、最後にもう一度やり直すと決めて、あなたたちに礼を述べる。</p><p>ウクラマトは「本当に大切なこと…」と呟き、我に返ってあなたへ謝る。けれど彼女は素直に喜ぶ――フォンジャンテーヌがもう一度自分に機会を与えたのを見られて良かった、と。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ウクラマト <small class="muted">（トライヨラ, X:12.7, Y:13.8）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="knowing-the-pelupelu.html">ペルペル族を知る</a></div><div class="row"><a class="link" href="knowing-the-hanuhanu.html">ハヌハヌ族を知る</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 91</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="for-all-turali.html">みんなのために</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'真正的自己',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Alphinaud 說，他沒有忘記你們對 Wuk Lamat 的責任，但像這樣能把自己真正放進別人的文化裡的時刻，總會讓他對這趟旅程將帶來的新體驗充滿期待。Alisaie 覺得你們在各項挑戰上的開局很不錯，希望之後也能維持這股氣勢。Krile 提醒，在這種競賽裡，遲早會走到「各位繼承人必須正面競爭」的局面。Erenville 則坦白，跟這麼龐大又多元的隊伍同行對他來說很不習慣——要是「那個人」能看到現在的他，不知道會怎麼想。</p><p>Wuk Lamat 看著你們已經拿到的兩枚 keystone——一枚來自 Feat of Reeds，一枚來自 Feat of Gold——覺得這應該足以證明你們走的路是對的。Alphinaud 同意，只要繼續按照 saga 所描述的方式，重走 Gulool Ja Ja 的旅程，就能依序找到剩下的「選定者」。Wuk Lamat 立刻提議下一站去找巨人族，因為就像 Krile 說的，他們在尋找「黃金城」這件事，可能會帶來有用的線索。</p><p>Erenville 解釋，Yok Huy 的家在 Urqopacha 的高處——除非你想爬峭壁，否則只能繞遠路，從 Kozama’uka 走一圈。這條路會靠近 Moblin 的村子，而那也是 saga 裡另一個重要地點；反正你們最後需要所有 keystone，既然順路，經過時去拜訪最合理。</p><p>Wuk Lamat 立刻說那就先去 Moblin，但 Erenville 直接潑了冷水：現在恐怕「馬上出發」行不通。通往 Moblin 聚落的大階梯 Flight of We Wingless，在風暴中崩塌了。雖然還有替代方法，但需要先做準備；在一切就緒前，你可以去小木屋休息，或在城市裡再逛逛。Erenville 又特地確認一次：只要能抵達目的地，你願意接受任何交通方式嗎？Wuk Lamat 毫不猶豫說當然，於是 Erenville 以嚮導的身分承諾會去安排。</p><p>既然有空檔，Wuk Lamat 說她得先修理斧頭——她揮向 Bakool Ja Ja 時把刀刃砍出一個很難看的缺口。她又想起自己還沒正式介紹你認識 Ropli：他是 Wachumeqimeqi 的負責人，也是一個「認識了很有用」的人，問你要不要一起去。她帶著你穿過 Tuliyollal 的熱鬧，途中還指著 Aunt Tii’s Tacos 說那是 Tiisol 的店，並跟 Tiisol Ja 拌了幾句嘴，才把你帶去 Wachumeqimeqi 的市集。</p><p>到了 Wachumeqimeqi，Ropli 以熟練的禮節迎接 Wuk Lamat，低頭一看就說這斧刃缺得夠慘——像是又去劈石頭似的。Wuk Lamat 含糊帶過，Ropli 卻保證修理不費事，兩下「羊駝尾巴」的時間就能搞定。Wuk Lamat 把斧頭交給他，接著介紹你：她說你是她從海的另一端招募來的優秀冒險者，帶你來是想讓你們認識，因為你總有一天可能會需要來 Wachumeqimeqi。Ropli 也自我介紹，說自己是這座貿易中心的代表，並向你致意。</p><p>話音未落，Ropli 就朝陰影裡磨蹭的人喝斥：別再躲著了，快說你來做什麼。Wuk Lamat 這才想起那人是你們搭船時見過的珠寶工匠 Fonjeantaine；她還記得自己也跟他說過話。Ropli 逼問之下，Fonjeantaine 支支吾吾說不出口，最後乾脆逃向西邊。Wuk Lamat 望著他的背影，覺得他像是需要有人聊聊；她說你們去找他問問看，如果你先找到，就用 linkpearl 通知她。</p><p>你在 Gornitruq Gleamsands 找到 Fonjeantaine，他一看到你就說你剛才在跟 Ropli 說話——而且你們在船上見過。Wuk Lamat 也立刻趕到，追問他為什麼要跑、到底是不是找 Ropli 有事。Fonjeantaine 一再說你們不用管他，甚至激動地懇求你們別逼他解釋；但 Wuk Lamat 反而更不肯放手，說他看起來需要朋友。終於，Fonjeantaine 吐露自己的困境：他覺得自己在那些「明顯更優秀的同業」面前太過渺小，總是覺得不足。當你告訴他別用別人的成功來衡量自己的價值，他仍焦慮地反問：如果作品達不到同樣嚴苛的標準，就不會有新的委託，那他當金匠的意義何在？可就在這一連串話裡，他想起了原點——是父親的精緻作品讓客人露出燦爛笑容，他敬佩父親，也因此踏入這行；只是他在追趕「成為跟父親一樣偉大」的路上，反而忘記了最初的動機：他真正想做的，是像父親一樣，用自己的工藝把喜悅帶給別人。於是他下定決心再試一次，並真誠地向你們道謝。</p><p>Wuk Lamat 重複著「真正重要的事……」像是在把這句話收進心裡。她回過神來，才急忙向你道歉，說自己剛才不小心忽略了你；但她也坦率地說，她很高興看到 Fonjeantaine 願意再給自己一次機會。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 烏克·拉瑪特 <small class="muted"> 圖萊尤拉（X:12.7, Y:13.8)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="knowing-the-pelupelu.html">了解佩魯佩魯族</a></div><div class="row"><a class="link" href="knowing-the-hanuhanu.html">了解哈努族</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.91</div></div>`,

  }

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
