<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'The Feat of Pots',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You regroup in Earthenshire as Rakorok hurries to have Kaahe’s lustrous oil lamp delivered to the palace. Wuk Lamat is still buoyed by the meal you helped arrange, while Koana shares word from the elector: all claimants are to gather in the large building on the village’s west side. He means to find Thancred and Urianger first—and mentions he’s already directed the Leveilleur twins to the venue. Wuk Lamat mutters that Koana didn’t have to be so conscientious toward a rival, then urges you not to keep Rediroq waiting.</p><p>When you arrive, Wuk Lamat can’t help noticing how long it’s taking for everyone to assemble. Rediroq thanks you for helping helphand Rakorok and asks for a little more patience until the other claimants arrive. Soon the square fills with familiar faces—Alphinaud reports success in convincing a potsworn to stay, while Moblins cheer loudly for different contenders and their promises of new cross-sea routes and prosperity. Thancred raises an eyebrow at hearing Zoraal Ja spent time clearing fallen rocks, and Alisaie suspects certain rivals have been lurking while everyone else did the work.</p><p>Rediroq then lays out the problem plainly: after the storm, many potsworn left, and without their precious metalwork, Earthenshire’s trade—and even Tuliyollal merchants’ livelihoods—will suffer. So the Feat of Pots begins: each claimant must find a cleverhand goldsmith and bring them back. Sareel Ja protests that calling it a “feat” doesn’t excuse using the claimants’ influence, but Rediroq coolly reminds everyone refusal means disqualification. Zoraal Ja treats it as a means to an end, while the Bakool Ja Ja brothers immediately begin plotting something uglier, hinting at snatching a willing artisan from a rival.</p><p>With the task set, you follow Wuk Lamat as she searches for a realistic lead. She admits the artisans among her supporters are elderly, and she can’t ask them to abandon the comforts of Tuliyollal for a remote village—no matter how beautiful it is. Wachumeqimeqi seems the best starting point, but the thought of another boat ride makes her blanch. Pressed to be honest, she confesses she gets terribly seasick; Krile reassures her that heading downriver will be smoother, even if she’s only “mostly” certain.</p><p>Back in Tuliyollal, the group trades weary reflections—Krile wishes she could ease Wuk Lamat’s nausea, and Erenville grumbles that meeting a potsworn’s personal needs was an ordeal he’d rather never repeat. Soon you reach Wachumeqimeqi, where skilled artisans gather, and Wuk Lamat asks Master Ropli for help finding a goldsmith who might relocate. After you suggest Fonjeantaine, Ropli notes he won’t be at his bench now—he’s likely finishing a meal at Xbalyav Ty’e—so Wuk Lamat asks you to approach him quietly with her, without a crowd.</p><p>On the beach, Fonjeantaine laughs at how far he’s come from the misery you once found him in, and he says Tuliyollal has finally given him a place where he feels content. When Wuk Lamat asks him to become a potsworn and sign a potpact for the sake of the Feat of Pots, he doesn’t refuse—he explains he has already become an official subject of Tuliyollal, and that learning about the rite of succession made him want a future shaped by peace. He speaks of his father’s death during a Garlean siege, and how he never wishes to lose someone that way again; so if signing the contract helps Wuk Lamat win, he will gladly do it. Before you leave, Br’uk Evu asks you to come by his shop when you have time—hinting at new paths opening for you as the rite continues. Back at Wachumeqimeqi, Ropli accepts Fonjeantaine’s decision with pride, Alphinaud confirms you still have time before regrouping, and Wuk Lamat steadies herself on a renewed resolve: someone has placed their faith in her, and she refuses to let it be wasted.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Koana <small class="muted">Kozama’uka (X:12.4, Y:28.3)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="lending-a-helphand.html">Lending a Helphand</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 92</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="a-father-first.html">A Father First</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'壺の試練',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたはアースンシャイアで仲間たちと合流し、ラコロクがカーヘの作った光沢あるオイルランプをただちに宮殿へ届けると息を弾ませるのを見届ける。ウクラマトは、あなたたちが用意した料理の出来に満足しつつ、コーナから「選定者が危機は去ったと判断し、村の西側にある大きな建物へ継承候補者を集めるよう命じた」と知らされる。コーナはサンクレッドとウリエンジェを探してから向かるつもりで、道中でルヴェユール双子にも会場を案内したという。ウクラマトは「ライバルなのに几帳面すぎる」とこぼしながらも、あなたにレディロクを待たせないよう促す。</p><p>あなたが会場に着くと、ウクラマトは「みんな揃うのが遅い」と不安を口にするが、レディロクはヘルプハンドのラコロクを助けたことに礼を言い、ほかの継承候補者が到着するまで少しだけ待つよう告げる。やがて人が集まり、アルフィノは「壺匠のひとりを引き留められた」と報告し、モブリン族はそれぞれの候補者を称えて騒がしくなる。サンクレッドは、ゾラージャが落石の片づけをしていたという話に驚き、アリゼーは「みんなが動いている間に隠れていた連中がいる」と疑いを向ける。</p><p>レディロクは、嵐のあと多くの壺匠が去り、金属細工による利益が途絶えればアースンシャイアもトライヨラの商人も立ち行かなくなると訴える。そして「壺の試練」を宣言し、継承候補者それぞれが「腕利きの彫金師を一人見つけて連れ帰る」よう命じる。サレージャが正当性に異を唱えても、レディロクは拒否すれば失格だと言い放ち、ゾラージャは手段に頓着しない。さらにバクージャジャたちは、相手の候補者から「同意した職人」を奪う算段まで口にして、場の空気を冷やす。</p><p>試練が始まり、あなたはウクラマトと相談する。彼女の支持者にいる職人は年配ばかりで、遠い村へ移り住めとは頼みにくいという。ならばワチュメキメキで探そう、という流れになるが、川船の話が出た途端にウクラマトは青ざめ、ついに「船に本当に弱い」と打ち明ける。クルルは下りなら流れに逆らわないぶん楽だと励まし、あなたたちはトライヨラへ向かう決意を固める。</p><p>トライヨラに戻る道すがら、クルルは吐き気を和らげる術があればと気遣い、エレンヴィルは壺匠の“個別の要望”に振り回される仕事は二度とごめんだとぼやく。やがてワチュメキメキに着くと、あなたは多くの職人が集う場の熱気を感じ、ウクラマトはローペリに事情を話して協力を求める。あなたが候補としてフォンジャンテーンの名を挙げると、ローペリは彼が今は工房にいないと告げ、ウクラマトは「顔見知りのあなたと二人で、圧をかけずに話したい」と言って同行を頼む。</p><p>浜辺でフォンジャンテーンは、以前は途方に暮れていたが、あなたたちのおかげで目的を取り戻し、今は満ち足りていると笑う。ウクラマトが壺匠として迎えるための「壺契約」への署名を頼むと、彼は戸惑いながらも真剣に語り始める。すでにトライヨラの民として手続きを終え、この国のことと継承の儀を学んだ上で、平和を望む者としてウクラマトに王位を望むのだと。父を戦で失った記憶を明かし、同じ喪失を繰り返したくないからこそ、あなたたちの求めに応じると決める。戻ったローペリもそれを誇りとして受け止め、あなたはアルフィノへ報せ、ウクラマトは「信じて託された分、絶対に負けられない」と気持ちを新たにする。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> コーナ <small class="muted">コザマル・カ (X:12.4, Y:28.3)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="lending-a-helphand.html">壺匠の世話人</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 92</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="a-father-first.html">王として、父として</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'罐之試煉',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你和眾人回到 Earthenshire，看到 Rakorok 氣喘吁吁地說，自己會立刻把壺匠 Kaahe 打造的光澤油燈送進宮裡。Wuk Lamat 仍沉浸在你們替 Kaahe 改善生活後的好心情裡，而 Koana 也帶來選定者的最新指示：危機已過，継承候補者要到村子西側那棟大型建物集合。他還說自己會先去找 Thancred 和 Urianger，路上也已經順便把 Leveilleur 雙子引到會場。Wuk Lamat 嘀咕著 Koana 對競爭對手也太認真，接著就催你一起別讓 Rediroq 久等。</p><p>到了集合地點，你聽見 Wuk Lamat 說她以為大家早該到齊；Rediroq 則先向你道謝，感謝你協助 helphand Rakorok，並請你再耐心等一下。很快地，人潮湧上來——Alphinaud 說他成功說服一位壺匠留下；Moblins 的歡呼聲此起彼落，有人稱讚跨海航線與新壺匠會帶來的好處，也有人大聲擁戴 Zoraal Ja。Thancred 對「Zoraal Ja 居然去清理落石堆」感到訝異，而 Alisaie 則冷冷地懷疑，有些人恐怕早就躲在一旁，等著看別人把事都做完。</p><p>Rediroq 隨即把問題攤開：暴風雨過後，許多壺匠離開了；而那些工匠打造的貴金屬工藝，能替 Earthenshire 帶來跨海而來、亮晶晶的錢財。若貿易斷流，不只 Earthenshire 會受害，連 Tuliyollal 的商人也會受害。於是她宣布「壺之試煉」開始——每一位継承候補者都必須找回一名手巧的雕金匠，帶回這裡。Sareel Ja 質疑這根本是在借勢使喚人，但 Rediroq 直接表示拒絕就等同失格；Zoraal Ja 也只把它當作達成目的的手段。更糟的是，Bakool Ja Ja 兄弟立刻盤算起從對手那裡「搶走願意簽約的工匠」，讓你們不得不提高戒心。</p><p>試煉既已開始，你跟著 Wuk Lamat 盤算人選。她說自己支持者之中雖有工匠，但多半年事已高，她不可能要求他們放棄 Tuliyollal 的舒適生活、搬來這座偏遠村落。你們轉而想到去 Wachumeqimeqi 試試看，卻也因此得搭船。Wuk Lamat 一聽到又要坐船就臉色發白，最後乾脆坦承：她其實非常暈船。Krile 安慰她這次是順流而下，不必和激流對抗，路程會平穩得多——至少她「大概」確定。</p><p>回到 Tuliyollal 的路上，你聽見 Krile 想著要是有法術或藥能減輕 Wuk Lamat 的噁心就好了；Erenville 則抱怨他再也不想體驗一次「照顧壺匠、還得把每個細節都顧到」的折磨。等你們抵達 Wachumeqimeqi，Wuk Lamat 找上 Master Ropli 請他協助尋人。你提出 Fonjeantaine 的名字後，Ropli 說他現在不在工坊，應該正在 Xbalyav Ty’e 用餐。Wuk Lamat 便希望只由你陪她去談——因為 Fonjeantaine 認識你們，她不想讓對方面對一大群陌生人而感到壓力。</p><p>在海灘上，Fonjeantaine 回想起上次見面時自己還深陷迷惘，如今卻因為你們而找回目標，也在新工作裡第一次感到踏實滿足。當 Wuk Lamat 開口請他成為壺匠、為「壺之試煉」簽下壺之契約時，他先是困惑，隨後卻鄭重告訴你們：他已辦妥移居程序，成為 Tuliyollal 的正式國民，也開始了解這個國家與継承之儀——而他真心希望一位重視和平的人能贏得王位。他提起父親曾在 Garlean 圍攻下喪生，戰爭奪走至親的陰影讓他再也不想經歷同樣的失去；所以，只要簽下壺之契約能幫助 Wuk Lamat，他願意這麼做。你們返程時，Br’uk Evu 也請你有空去店裡一趟，暗示你接下來能開啟新的職能任務道路。回到 Wachumeqimeqi，Ropli 接受了 Fonjeantaine 的決定，Alphinaud 也透過聯絡確認你們仍有時間；而 Wuk Lamat 看著你，語氣更堅定——既然有人把信任交到她手裡，她就絕不允許自己辜負。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>任務發布</b> 柯納哥 <small class="muted"> 克扎瑪烏卡濕地 (X:12.4, Y:28.3)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="lending-a-helphand.html">罐子工的看護人</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.92</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="a-father-first.html">一位國王，一位父親</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
