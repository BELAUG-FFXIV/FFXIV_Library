    story:`<div class="clamp" data-collapsed="true">
<p><b>A Land on Fire</b></p>
<p>A nervous young adventurer stops you and, after making certain of your name, explains that a gentleman with spectacles has been searching for you. The request he bears is vague, but urgent, and before long the true caller appears: the wandering minstrel himself. He greets you with unusual gravity and tells you that he has sought you out for one reason alone. He has seen a troubling dream, and believes only you can help him follow where it leads.</p>
<p>In that dream, he says, he beheld the evening sky stretching wide and beautiful before him. Across that darkness moved two stars—one pure white, one a blushing scarlet—at first bound for separate courses. Then, without warning, the scarlet star changed its path and crossed the white above a burning land, where their meeting burst into a brilliant flash of light. Though he cannot decide whether the dream was meaningless fancy or true prophecy, one conviction remains firm in his heart: the white star was the Warrior of Light. It was you.</p>
<p>Because of that belief, he asks you to accompany him to the place from his vision. After weighing the possibilities, the image of a burning land leads you to the Burning Wall in eastern Thanalan, where crystal formations rise from the earth like frozen flame. There, amid those jagged remnants touched by Dalamud’s fall, you begin to search the surroundings together. What at first seems only a poetic errand becomes suddenly real when you discover a strange man lying there, dazed and injured in spirit if not in body.</p>
<p>When the man awakens, he gives his name as Clive. His confusion is immediate and severe. He remembers ruins, and little else. He cannot explain how he came to this place, nor why he feels so strongly that he must return somewhere at once. Seeing his condition, the minstrel urges caution and arranges to have him examined in Ul’dah. Though no wound or illness can be found, Clive’s memories remain clouded, and the urgency inside him does not fade.</p>
<p>You stay with him as he struggles to make sense of the emptiness in his mind. The minstrel, moved by both curiosity and compassion, decides that the two of you cannot leave him to wander in such a state. Since Clive recognizes nothing in Ul’dah, he suggests another path: perhaps familiar sights elsewhere in Eorzea may stir whatever has been lost. With that hope, a new journey begins—not merely to identify a stranger, but to restore the thread of a life severed from its own past.</p>
<p>What began as a dream of two crossing stars now feels unmistakably like fate. The minstrel had sought only the ending of a vision, yet what he found was a man fallen out of place, carrying a burden he cannot yet name. And as you stand beside Clive at the start of this uncertain road, it is clear that the scarlet star from the dream has already entered your path—and that whatever brought him here is only beginning to reveal itself.</p>
<p><b>Pain to Recall</b></p>
<p>Clive tells you he is ready, and the two of you set out at once. When you speak of traveling to Gridania by airship, he can only stare in disbelief. The very idea unsettles him, not because he doubts your word, but because something about it feels impossible to him. He knows what a sword is and how to wield it, yet the thought of a working airship leaves him confused in a way he cannot explain. That contradiction troubles him deeply, but with no clearer answer to be found, he forces himself to keep moving forward.</p>
<p>The flight to Gridania leaves a stronger impression on him than he expected. The wind against his face, the trembling of the deck beneath his feet, the sensation of rising into the sky—those things feel vivid and unforgettable even through the haze clouding his mind. Yet when he sets foot in Gridania itself, he finds no immediate revelation waiting for him there. The city is utterly unlike Ul’dah, and so he chooses to follow your lead, hoping that some familiar sight, sound, or feeling may still stir what remains buried inside him.</p>
<p>You guide him through the city little by little. At the Carline Canopy, he feels the faint pull of something half-remembered, but it slips away the moment he reaches for it. At the chocobo stables, recognition comes more sharply: he is certain that he once had a chocobo of his own, though the memory refuses to attach itself to any time or place. At the aetheryte plaza, the great crystal draws from him another fragment of understanding. He knows it is not a Mothercrystal, far too small for that, and the thought itself only thickens the fog in his mind. Each place gives him something, yet never enough.</p>
<p>At the Adders’ Nest, that pattern finally breaks. When a scout reports that the Ixal remain quiet and that there have been no sightings of Garuda, Clive reacts at once. The name strikes him like a spark to dry tinder. He rushes forward, desperate to hear more, and under questioning admits that he remembers fighting Garuda in battle. The certainty in that memory is stronger than anything else he has recovered so far. Vorsaile Heuloix listens closely and, seeing that the name has awakened something real, decides there is one person better suited than he to help: Kan-E-Senna, whose knowledge reaches both primal lore and the healing of afflictions.</p>
<p>Before the Elder Seedseer, Clive listens as Garuda is described: the deity revered by the Ixal, a winged being half woman and half bird, mistress of the wind and of a temper as violent as any storm. The description fits the enemy he dimly recalls, yet not entirely. To him, the will behind that fearsome form felt unmistakably mortal. It is then that the wandering minstrel reveals the suspicion he has formed. No one in the surrounding settlements recognized Clive, and a man so distinctive should not have passed wholly unnoticed. That, combined with tales of visitors crossing from other worlds, leads him to a startling conclusion: Clive may not belong to this world at all.</p>
<p>The truth stirs painfully within Clive. His brand resurfaces in his thoughts, and with it one word follows another—Bearer, Garuda, Ifrit. Yet each attempt to seize the memory brings piercing pain, as though his own mind were turning him away. Kan-E-Senna senses no bodily ailment, and instead explains that the barrier may be one of the heart: memories of terrible events sometimes bury themselves so deeply that the mind answers any effort to uncover them with pain. Clive asks how such a barrier can be overcome. The wandering minstrel answers without hesitation: through struggle, through resolve, and through the road that fate has already placed before you both. Thus the path ahead becomes clear. If battle is what may shatter the chains on Clive’s memory, then you must prepare for war.</p>
<p><b>The Path Infernal</b></p>
<p>Clive accepts the wandering minstrel’s plan, though the man’s fondness for metaphor does little to ease his confusion. Even so, if this path offers any hope of progress, he is willing to walk it. Together, you make for Apkallu Falls, where the minstrel finally reveals why he chose this place. Long ago, in the age of the Seventh Umbral Calamity, Louisoix gathered adventurers here and opened the way to confront Ifrit. If Clive’s scattered memories recoil at the names “Garuda” and “Ifrit,” then perhaps the truth buried within him can only be forced into the open by facing that fear directly.</p>
<p>With lyrical magicks shaped by memory and tale, the wandering minstrel draws you both into a vision of the Bowl of Embers. Though he warns that it is but an illusion woven from story, the weight of it feels real enough. Before you stands an image of Ifrit—close enough to the fiend Clive remembers to strike at his heart, yet not wholly the same. And in that moment, the wound in his memory tears open. He remembers Joshua. He remembers fire. He remembers the rage that drove him onward. At last he gives voice to the hatred he had clung to for so long: Ifrit was the thing that killed his younger brother, and he has hunted that monster ever since.</p>
<p>You fight beside him through the trial. Again and again, the flames press in, and again and again Clive forces himself to stand. What began as battle against an enemy becomes battle against the shape of his own buried truth. When the final clash comes and the illusion breaks, the answer he had spent so long refusing is no longer something he can deny. He did not merely lose Joshua to Ifrit. He was Ifrit. The hand that took his brother’s life was his own.</p>
<p>That revelation nearly crushes him, yet it also frees him. The wandering minstrel declares that, in this struggle against his own mind, Clive has emerged victorious. When the vision falls away, another presence has appeared beside him: Torgal, the loyal wolf who belongs to the world Clive lost. The minstrel understands at once what this means. By accepting the truth of his past, however painful, Clive has reclaimed the memories he sealed away, and in doing so has made manifest his readiness to return home.</p>
<p>At Apkallu Falls, Clive finally speaks plainly of the burden he has carried. Joshua, his younger brother, had inherited the flames of Phoenix and was meant for a brilliant future. But that future was cut short. In grief and shock, Clive first called forth Ifrit without understanding what slept within him. The transformation was instinctive, violent, and beyond his control—and it was by his own hand that Joshua died. Since that day, he has lived under the weight of anguish and guilt, pursuing vengeance against a killer who was himself all along.</p>
<p>Yet even this truth is not the end. Clive explains that he had gone to sacred ruins tied to Phoenix in search of answers about Ifrit’s power and his own fate. There, after finally confronting his past, everything faded into darkness. The wandering minstrel believes that something within those ruins was responsible for casting him across worlds, and so the path forward becomes clear once more. You return with Clive and Torgal to the Burning Wall, where the wolf’s keen senses take over as guide. The end of this strange meeting between stars is close at hand—but before Clive can go home, you must still follow the trail to its true source.</p>
</div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true">
<p><b>燃え上がる大地にて</b></p>
<p>ひとりの若い冒険者が、おそるおそるあなたに声をかけてくる。名を確かめた彼は、眼鏡をかけた紳士があなたを探しているのだと告げ、詳しい事情もわからぬまま、その願いを取り次ごうとしていたのだと説明する。やがて姿を現したのは、異邦の詩人だった。彼はいつになく真剣な面持ちで、あなたにしか果たせぬ頼みがあるのだと語り始める。</p>
<p>異邦の詩人が見たというのは、奇妙で不穏な夢だった。果てしなく広がる夕空を見上げる中、ひとつは純白、もうひとつは赤く染まったふたつの星が、夜の彼方を流れていた。当初は交わることなく過ぎ去るはずだったそれらは、突如として赤い星が軌道を変え、燃えさかる大地の上で白き星と交差する。そしてその瞬間、まばゆい閃光があたりを満たしたのだという。夢に過ぎぬのか、あるいは予兆なのか、彼自身にも確信はない。だが白き星が「光の戦士」であり、すなわちあなたを指しているのだという思いだけは揺らがなかった。</p>
<p>その確信ゆえに、異邦の詩人はあなたへ同行を願う。夢に見た「燃える土地」を探し当てるために。いくつかの候補を思い巡らせた末、ふたりが向かったのは東ザナラーンのバーニングウォールだった。ダラガブの破片によって生まれたとされる結晶群は、まるで地そのものが燃え固まったかのように、異様な輝きを放っている。その光景の中で周囲を見渡していたあなたたちは、やがて倒れている見知らぬ男を見つけ出す。</p>
<p>意識を取り戻した男は、自らをクライヴと名乗る。だが、その表情には深い混乱が浮かんでいた。遺跡の記憶だけをかすかに残し、自分がなぜこの地にいるのか、どうしてここへ来たのか、その肝心な部分がすっぽりと抜け落ちているのだ。ただひとつ、自分には急いで戻らねばならぬ場所がある──その思いだけが、言葉にならぬ焦りとして彼の内に残っていた。異邦の詩人は彼の身を案じ、まずはウルダハで医師に診せることを提案する。</p>
<p>ウルダハで診察を受けても、外傷も病も見つからない。けれど記憶の霞は晴れず、クライヴの不安も消えないままだった。異邦の詩人は、そんな彼をこのまま放っておくことはできぬと考える。そしてあなたもまた、その思いをともにすることになる。クライヴがウルダハの何ひとつに見覚えを示さぬなら、別の土地へ連れて行けば、何かが呼び起こされるかもしれない。そうして彼の失われた記憶を辿るための、新たな道行きが始まろうとしていた。</p>
<p>ふたつの星が交わる夢は、もはやただの夢ではないように思われた。異邦の詩人が見届けたかったのは、予兆の結末だったのかもしれない。だが実際に彼が見つけ出したのは、この世界のどこかへ迷い落ち、帰るべき場所を思い出せずにいるひとりの男だった。あなたの前に現れた赤い星――クライヴ。その出会いが何を意味するのか、その答えはまだ見えない。けれど、この邂逅そのものが、すでに新たな物語の始まりとなっていた。</p>
<p><b>失くした記憶</b></p>
<p>クライヴは支度ができたと告げ、あなたとともに出発する。だが、グリダニアへ飛空艇で向かうと聞いた彼は、思わず言葉を失う。あなたの話を疑っているわけではない。ただ、その言葉が自分の中でどうにも噛み合わず、信じがたいものとして響いたのだ。剣とは何か、その扱い方もわかっている。なのに、実際に空を飛ぶ飛空艇の存在には強い違和感を覚える。その食い違いに戸惑いながらも、彼は立ち止まっていても仕方がないと、自らを促すように前へ進もうとする。</p>
<p>実際に空の旅を経験すると、その感触は彼の中に強く刻まれる。頬を打つ風、足元で震える甲板、空へ持ち上げられていく高揚感――それらは、霞んだ記憶の中にあっても鮮烈だった。だが、そうして辿り着いたグリダニアの街並みは、先ほどまでいたウルダハとはまるで異なっており、彼にすぐ答えを与えてはくれない。クライヴは、何かが心を揺らすのを期待しながら、あなたの案内に身を委ねる。</p>
<p>あなたは彼を連れて、街のあちこちを巡る。カーラインカフェでは、どこか似た場所にいたような感覚だけが胸をかすめるが、記憶は煙のように逃げていく。チョコボ留では、もっとはっきりした反応があった。自分にもかつてチョコボがいた――その確信だけはあるのに、いつ、どこで、という肝心な部分は思い出せない。さらにエーテライトを前にすると、彼はそれがマザークリスタルではないと即座に理解する。しかし、その知識の出どころを探ろうとした瞬間、頭の中の霧はかえって深くなるばかりだった。手がかりは確かに現れる。けれど、どれも完全な記憶には結びつかない。</p>
<p>その流れが変わったのは、黒渦団司令部ではなく双蛇党の巣でのことだった。偵察兵が、イクサル族に動きはなく、ガルーダの姿も確認されていないと報告した瞬間、クライヴの反応は鋭く走る。ガルーダ――その名が、彼の内に火花のような衝撃を起こしたのだ。彼は思わず問いただし、自分はそのガルーダと戦ったことがあるはずだと口にする。その記憶の確かさは、これまでに戻りかけたどの断片よりも強かった。ボルセル・ヒューロットはその様子を見て、彼を導くには自分よりふさわしい者がいると判断する。蛮神についても癒やしの術についても深い見識を持つ、カヌ・エ・センナだ。</p>
<p>蓮華の座で、クライヴはカヌ・エ・センナからガルーダについて聞かされる。イクサル族が崇める神であり、鳥と女の姿を併せ持ち、風を操り、嵐のように気まぐれで苛烈な存在。クライヴの脳裏に浮かぶ敵の姿とも重なるが、どうにも決定的に違う感覚が残っていた。彼が覚えているガルーダの奥には、もっと人間じみた意志があったのだという。そこで異邦の詩人が、自らの推測を語り始める。周辺の集落をいくら訪ね歩いても、クライヴの特徴に心当たりを示す者は誰ひとりいなかった。これほど目を引く人物が、まるで最初からこの地に存在しなかったかのように扱われるのは不自然すぎる。そこから彼が思い至ったのは、クライヴがこの世界の住人ではないのではないか、という可能性だった。</p>
<p>その言葉は、クライヴの胸の奥に沈んでいたものを痛みとともに揺り起こす。頬の刻印の意味がかすかに浮かび、「ベアラー」「ガルーダ」「イフリート」といった言葉が続けて表面へ現れかける。だが、そこへ手を伸ばそうとするたび、鋭い痛みが耳を満たし、記憶はまた押し戻されてしまう。カヌ・エ・センナは、彼の身体には病も傷も見当たらぬと告げる。そして、その苦しみは肉体ではなく心に根ざすもの、あまりにも苛烈な出来事から自らを守るため、心が真実に蓋をしているのだろうと語る。どうすればそれを越えられるのかと問うクライヴに、異邦の詩人は迷いなく答える。運命があなたたちを引き合わせたのなら、その運命をともにくぐり抜けるほかない、と。かくしてクライヴの記憶を縛る枷を断ち切るための道は、戦いの中にこそあるのだと示される。</p>
<p><b>炎影の旅路</b></p>
<p>クライヴは、異邦の詩人の考えに戸惑いを覚えながらも、それで前に進めるのなら従うしかないと決める。そうしてあなたとともに向かったのは、アプカル滝だった。そこで異邦の詩人は、この地を選んだ理由を語る。第七霊災の時代、伝説の賢者ルイゾワはここで冒険者たちを集め、イフリート討滅への道を開いたのだという。ガルーダやイフリートという名にクライヴの記憶が激しく反応するのなら、その苦しみの中心にあるものもまた、同じ炎の中でこそ暴かれるはずだと。</p>
<p>異邦の詩人は、物語と記憶をより合わせた詩の魔法で、あなたたちを「灼熱の炎獄」の幻へと導く。幻影にすぎぬとはいえ、その場に満ちる熱も圧迫感も、決して偽りには思えない。そこに現れたイフリートは、クライヴの記憶にある敵と酷似しながらも、まったく同じではなかった。だが、その不完全な一致こそが、彼の胸の奥に封じられていたものを激しく揺り起こす。ヨシュアの姿、燃え上がる炎、そして弟を奪った存在への復讐心――それらが、一気に彼の中で結びついていく。</p>
<p>あなたはクライヴと肩を並べ、その幻影との戦いに挑む。押し寄せる炎の中で、彼は何度も揺らぎながら、それでも退かない。やがてこの戦いは、ただ敵を討つためのものではなく、自らの心が拒み続けてきた真実と向き合うためのものへと変わっていく。そしてついに幻が砕けたとき、彼はもはや逃れようのない答えに辿り着く。ヨシュアを殺したのはイフリートだった。だがそのイフリートとは、ほかならぬ自分自身だったのだ。</p>
<p>その告白は、彼を打ちのめすと同時に、封じられていた記憶を解き放つ。異邦の詩人は、クライヴが己の心との戦いに打ち勝ったのだと告げる。幻が晴れたあと、彼の傍らには新たな存在があった。トルガル――クライヴが失った世界でともに在った、忠実なる狼である。異邦の詩人は、その出現にひとつの確信を得る。クライヴは、自らの過酷な過去を受け入れたことで失われた記憶を取り戻し、無意識のうちに「帰る覚悟」を形にしたのだと。</p>
<p>アプカル滝で、クライヴはようやく自らの過去を語り始める。弟ヨシュアは優しく才ある存在で、フェニックスの炎を継ぐ者として将来を約束されていた。だが、その未来は突然断たれた。若く、悲嘆に暮れていたクライヴは、自らの内に眠る力を知らぬまま、初めてイフリートを顕現させてしまった。それは理性の及ばぬ、本能的で制御不能な変貌だった。そしてヨシュアを死に追いやったのは、その時の自分だったのだと。</p>
<p>だが、真実を知っただけではまだ終わらない。クライヴは、イフリートの力と自らの運命の答えを求めて、フェニックスに結びつく聖地の遺跡へ赴いたこと、その地下で過去と向き合った直後に意識を失ったことを明かす。異邦の詩人は、その遺跡にこそ彼をこの星へ迷い込ませた力があったのではないかと推測する。そうして道は再び定まる。あなたはクライヴとトルガル、そして異邦の詩人とともにバーニングウォールへ戻り、鋭い感覚を持つトルガルの導きに従って、帰還への手がかりを追うことになる。ふたつの星が交わったこの奇縁も、いよいよ終わりへ近づいていた。</p>

    story:`<div class="clamp" data-collapsed="true">
<p><b>於烈焰熾灼的大地</b></p>
<p>一名緊張得結結巴巴的年輕冒險者攔下了你。在反覆確認你的名字後，他才總算鬆了口氣，說有位戴著護目鏡的紳士正在找你，只是對方並沒有把真正的來意告訴他。沒過多久，那名委託人便親自現身——正是異邦的詩人。這次的他收起了平日那種帶著戲謔的餘裕，反而以難得的鄭重語氣向你開口，說自己有一件事，只有你能幫他完成。</p>
<p>他說，一切都始於一場令人不安的夢。在夢裡，他看見無邊無際的夜空閃閃發亮，而那片深沉的天幕上，有兩顆星正在移動。一顆是純白色，另一顆則帶著鮮明的赤紅。本來，它們的軌跡應該只是彼此錯身而過，誰也不會碰上誰。可就在下一刻，那顆赤色的星突然改變方向，在一片燃燒般的大地上空與白星相交，隨即爆發出一道耀眼奪目的光。異邦的詩人自己也說不準，那究竟只是毫無意義的夢境，還是真有某種預兆；但他始終深信，那顆白星象徵的正是你——Warrior of Light。</p>
<p>正因如此，他請求你陪他一起去尋找夢中那片「燃燒之地」。在幾番推測之後，你們最終將目標鎖定在東 Thanalan 的 Burning Wall。那裡聳立著受 Dalamud 墜落影響而形成的巨大結晶，看起來就像大地本身被烈火燒熔後凝固成了如今的模樣。你與異邦的詩人一同在那片異樣的景色中搜尋，原本還像是一場詩人式的追夢，卻很快在你們發現一名倒臥在地的陌生男子後，轉變成了另一件完全不同的事。</p>
<p>那名男子醒來後，報上了自己的名字——Clive。可除此之外，他幾乎什麼也說不清。他只隱約記得自己曾在某片廢墟之中，之後發生了什麼、又為何會來到這裡，全都籠罩在一片混亂的霧裡。他的神情顯得茫然又痛苦，像是拼命想抓住什麼，卻始終無法真正碰到那段失落的記憶。唯一清晰的，只有一種強烈到幾乎無法忽視的念頭——他必須回去，而且那件事非常重要。</p>
<p>異邦的詩人見狀，便提議先把 Clive 帶回 Ul’dah，讓 Phrontistery 的醫師檢查身體狀況。診察的結果並沒有找出明顯外傷，也沒有病症，可他的記憶依然模糊不清，絲毫沒有恢復的跡象。即使如此，那股催促著他「必須立刻回去」的急切感，卻始終沒有消失。異邦的詩人因此下定決心，不能就這樣放任他在這種狀態下獨自徘徊，而你也同樣無法對此置之不理。</p>
<p>於是，這件事很快不再只是尋夢的延續，而成了一場試圖幫助 Clive 找回自身記憶的旅程。既然 Ul’dah 的一切都無法喚起他的印象，那或許換個地方，會有別的線索浮現。異邦的詩人希望 Eorzea 其他地方的風景與聲音，能夠牽動他被封住的記憶，也希望能藉此替這名迷失於陌生土地的人，重新找回通往故鄉的路。</p>
<p>到了這時，你也開始明白，那場關於兩顆星的夢，恐怕早已不只是夢而已。異邦的詩人原本只是想見證那道預兆的結局，可真正出現在你們面前的，卻是一名帶著失落過去、被命運推入你道路中的男人。那顆赤紅之星，如今已經與你交會。而他為何會來到這裡、他的命運又將通往何方，答案仍被埋在更遠的前方，等待你們一步步去揭開。</p>
<p><b>追尋心中隱痛</b></p>
<p>Clive 表示自己已經準備好了，於是你們立刻動身出發。可當你告訴他，要前往 Gridania 得搭乘 airship 時，他的反應卻明顯帶著震驚與遲疑。那並不是對你話語的懷疑，而是某種更深層的違和感。對他來說，劍是什麼、該怎麼揮舞，他都知道得清清楚楚；可真正能在天空中航行的 airship，卻讓他感到難以理解。這種矛盾使他自己也無法解釋，只能帶著那份困惑繼續往前走。</p>
<p>真正搭上 airship 後，那段飛行卻又在他心裡留下了異常鮮明的印象。迎面而來的風、腳下微微震動的甲板、整個人被帶往高空的感覺——即使在記憶模糊的狀態下，那些感受仍然深刻得幾乎不可能忘記。然而，當他終於來到 Gridania，眼前的一切卻又與剛離開的 Ul’dah 截然不同，沒有立即替他喚醒什麼答案。於是，他只能先跟著你的步調，在這座陌生的城市裡慢慢尋找線索。</p>
<p>你帶著他在城中四處走動。來到 Carline Canopy 時，他隱約覺得自己似乎曾到過類似的地方，可那份感覺才剛浮起，就又像煙霧一樣從指間散去。到了 Chocobo Stables，另一段模糊的印象又冒了出來——他幾乎可以肯定，自己曾經也擁有過一隻 chocobo，只是那份記憶依舊無法連回明確的時間與地點。等你帶他走到 aetheryte plaza，他又立刻對那座巨大水晶產生了反應，甚至下意識認定它不是 Mothercrystal，只是遠遠不夠巨大。可越是想抓住這些零碎的線頭，盤踞在他腦中的濃霧就越顯沉重。每一個地方都像是碰到了記憶的邊緣，卻始終無法真正撥開它。</p>
<p>直到你帶他來到 Adders’ Nest，這種膠著的狀態才終於被打破。當巡邏兵向 Vorsaile Heuloix 回報，提到 Ixal 目前沒有動靜，也沒有發現 Garuda 的蹤跡時，Clive 整個人突然一震。那個名字像一道火光般猛然擊中了他。他立刻上前追問，並在慌亂中說出自己曾經與 Garuda 交戰。那一刻浮現的記憶，比他此前所觸碰到的任何碎片都還要真實。Vorsaile Heuloix 察覺到 Garuda 這個名字確實引動了某種東西，便認為若要進一步幫助 Clive，最適合的人不是自己，而是對 primal 與療癒之術都有深厚理解的 Kan-E-Senna。</p>
<p>在 Lotus Stand 裡，Clive 從 Kan-E-Senna 那裡聽見了關於 Garuda 的說明。那是 Ixal 所信奉的 deity，擁有半人半鳥的姿態，能夠駕馭狂風，性情則如暴風般反覆無常。這些描述，的確和他腦海裡那個敵人的形象吻合；可同時，他又隱約感覺到某種不對勁。對他來說，那股藏在可怖外表之下的意志，分明帶著鮮明的凡人感。也就在這時，異邦的詩人說出了自己一路調查後得出的推測：附近聚落裡竟沒有一個人認得 Clive，像他這麼顯眼的人，若真是這片土地上的居民，實在不可能完全沒有任何風聲。因此，他開始懷疑，Clive 也許根本不是來自這個世界的人。</p>
<p>這番話讓 Clive 心底更深的記憶開始劇烈翻攪。他提起自己身上的烙印，說那是 Bearer 的印記；緊接著，Garuda、Bearer、Ifrit 這些詞也接連浮現。可每當他想更進一步抓住那些即將成形的回憶，刺耳而劇烈的痛楚就會猛然襲來，像是有什麼在阻止他繼續想下去。Kan-E-Senna 看不出他身上有任何傷病，因此判斷，真正阻擋他的並不是肉體，而是心本身。遭遇過極其可怕之事的人，有時會本能地把記憶深深封起，讓疼痛成為一道屏障，避免自己再次直視那份過於殘酷的真相。Clive 問，如果這道屏障真是自己築起的，那麼他該如何跨越。異邦的詩人則毫不遲疑地回答：既然命運讓你們相遇，那就一起去面對。若要擊碎束縛他記憶的枷鎖，答案或許就在戰鬥之中，而接下來的路，也註定不會平靜。</p>
<p><b>縱使前路獄火焰毒</b></p>
<p>雖然異邦的詩人這次依舊說得像謎語一樣，Clive 還是決定相信他。既然對方認為這樣做能讓事情往前推進，那他願意一試。於是，你們一起前往 Apkallu Falls，而到了那裡，異邦的詩人才終於說出自己為何選擇此地。很久以前，在第七靈災時期，Louisoix 曾在這裡召集一群冒險者，並開啟通往 Ifrit 棲身之處的道路。既然 Garuda 與 Ifrit 這些名字都能引動 Clive 劇烈的反應，那麼，深埋在他心底的真相，或許也只能透過再次直面那份恐懼，才有可能被逼出來。</p>
<p>接著，異邦的詩人以他那近乎不可思議的詩之魔法，把你與 Clive 一同帶進了一個由故事與記憶構成的幻境之中。那裡是 The Bowl of Embers，一個你並不陌生的地方。儘管詩人提醒你，眼前的一切都只是被賦予形體的敘事幻影，但那股逼近而來的灼熱與壓迫，卻真實得令人無法輕忽。隨後出現在你們面前的，是 Ifrit 的幻影。它和 Clive 記憶中的存在極其相似，卻又並非完全相同；也正是這樣的相似與差異，同時撕開了他心底最深的傷口。Joshua、烈焰、復仇——那些原本支離破碎的片段，終於在這一刻猛然連接起來。他想起來了。殺死 Joshua 的，就是 Ifrit，而自己一直以來都在追逐那個奪走弟弟性命的仇敵。</p>
<p>你與 Clive 並肩而戰，在那片炎獄般的幻境裡迎擊 Ifrit。隨著戰鬥推進，你也越來越清楚，這早已不只是一次單純的交鋒。Clive 真正面對的，不只是眼前的敵人，而是自己一直不敢承認的記憶本身。等到最後，那道殘酷的真相終於徹底浮出水面時，他再也無法逃避。Joshua 的確是死於 Ifrit 之手——可那個 Ifrit，並不是別人，而正是他自己。</p>
<p>這個答案幾乎將他整個人擊碎，卻也在同時打破了束縛記憶的鎖鏈。異邦的詩人說，在與自己內心的這場戰鬥裡，Clive 終於贏了。當幻境散去，你們回到現實時，另一個身影也出現在他身邊——Torgal，那隻陪伴他走過原本世界的忠誠狼犬。異邦的詩人立刻明白了這代表什麼。Clive 在接受那段痛苦過去的同時，也重新找回了自己失去的記憶；而 Torgal 的出現，正是他已經準備好回到原本世界的證明。</p>
<p>到了這時，Clive 終於能親口說出那段始終令他無法承受的過去。Joshua 是他的弟弟，一個善良而極具天分的人，同時也是 Phoenix flames 的繼承者，原本註定要走向光明的未來。可那份未來卻在一夕之間被奪走。年少的 Clive 在劇烈的悲傷與混亂中，第一次喚出了 Ifrit 的力量，卻根本不知道那股力量原來一直潛伏在自己體內，也不知道它竟會以如此失控的方式爆發。那場變身不是出於意志，而是本能，是混亂，是無法控制的災變。而 Joshua，正是死在那樣的自己手中。</p>
<p>然而，即使真相已經被說出口，事情也還沒有結束。Clive 接著告訴你，他之所以會出現在這裡，是因為自己原本正在追尋 Ifrit 力量的起源，也想弄清楚自己的命運。他前往了一處與 Phoenix 有關的 sacred ruins，在那裡深入遺跡下方，終於鼓起勇氣正視自己的過去。可就在接受真相之後，一切突然陷入黑暗。異邦的詩人因此推斷，把 Clive 意外送到 Eorzea 的力量，很可能就來自那片遺跡本身。於是，你們再次回到 Burning Wall，而這一次，領路的人不再是詩意的預兆，而是 Torgal。牠豎起耳朵，專注感受四周的氣息，準備帶著你們走向真正的目的地。到了這一步，這場由兩顆星相遇而展開的奇異旅程，也終於逐漸逼近它的終點。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story: document.getElementById('panel-story'),
  event: document.getElementById('panel-event'),
  acq: document.getElementById('panel-acq'),
  unlockq: document.getElementById('panel-unlockq'),
  followq: document.getElementById('panel-followq'),
  bgm: document.getElementById('panel-bgm'),
  reward: document.getElementById('panel-reward'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
