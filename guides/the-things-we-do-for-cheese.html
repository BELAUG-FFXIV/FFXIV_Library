  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;
  overflow-y:auto;
  padding-right:8px;
  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;

    }
    .expand-wrap{ margin-top:12px; }

      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'The Things We Do for Cheese',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Wheiskaet admits he never meant for you to fetch this last ingredient. Brayflox—his old quartermaster—had planned to bring it to Costa del Sol herself, but word came from the Longstop: something has gone wrong, and the delivery is delayed without end. She offered no details, only enough to leave him fearing the worst.</p>
      <p>Unable to go to her side himself, he asks you and your allies to move in his stead. You hurry to the Hidden Falls docks and seek out Ozun Nazun, who can point you toward Raincatcher Gully—where Brayflox and her people have made their home.</p>
      <p>At the docks, Ozun sizes up your urgency and guesses trouble has struck the goblin settlement. He doesn’t pretend to understand why you’d throw yourself into helping beastmen, but he doesn’t stand in your way—he tells you to speak with the skipper nearby, who can ferry you upriver.</p>
      <p>You arrive in Raincatcher Gully to find Brayflox already aware of Wheiskaet’s request. She recognizes you as the uplander come for “tastyfresh” treats—but the prize you seek lies deeper within the Longstop, and a flighty beast has driven her gobbie flock from their home.</p>
      <p>Brayflox will not hand over what she no longer has. If you want the promised delicacy, you must first help her people take back the Longstop and make it safe again—together with the goblins who refuse to abandon what they built.</p>
      <p>When the fight is done, Brayflox’s gratitude comes freely. The flighty beast was a tricky foe, but you outwitted it with careful plans, proving you have a good head for “fighty-think.” True to her word, she happily gives you the stinkysweet goblin cheese—crafted by secret gobbie arts, and, in her eyes, essential to any proper party.</p>
      <p>Back at Costa del Sol, Wheiskaet greets you with a sharp sniff, then recoils at the unholy stench that follows. Still, he concedes it’s definitely goblin cheese—and, by the smell of it, likely quite flavorful. When you ask how it’s made, he hurriedly advises you to remain ignorant; he still shudders at the day he learned what kind of milk they use.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Wheiskaet <small class="muted">Eastern La Noscea (X:32.6, Y:30.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="there-and-back-again.html">There and Back Again</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 32 or above)</div>
      <div class="row">
        <b>Unlock Dungeon</b>
        <a class="link" href="brayflox-longstop.html">Brayflox’s Longstop</a>
      </div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="what-do-you-mean-you-forgot-the-wine.html">What Do You Mean You Forgot the Wine</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'ブレイフロクスの珍チーズ',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ヴェイスケートは、最後の材料をあなたに集めさせるつもりはなかったと打ち明ける。本来なら、かつての輜重担当であるブレイフロクスが、コスタ・デル・ソルへ自ら届ける手筈だった。だが少し前、「ブレイフロクスの野営地」で厄介事が起き、届け出はいつになるか分からない──そんな知らせだけが届いたという。詳しいことは語られず、事態は深刻かもしれないと彼は案じていた。</p>
      <p>自分で助けに向かいたい気持ちを抑え、彼はあなたと仲間に頼む。急いで船着場：隠れ滝へ向かい、オズン・ナズンに会え。彼の案内で、ブレイフロクスたちが暮らすレインキャッチャー樹林へ辿り着けるはずだ。</p>
      <p>船着場で声をかけると、オズン・ナズンはあなたの慌ただしさに気づき、ゴブリンの集落で何かあったのかと首をかしげる。蛮族を助ける理由は分からないと言いつつも、彼は手早く、近くの船頭に話して舟を出してもらうよう促す。</p>
      <p>レインキャッチャー樹林に着くと、ブレイフロクスはあなたが珍味を求めて来たことを理解していた。だが、その報酬は野営地の奥にあり、飛び跳ねるように暴れる獣が住処を奪い、仲間たちは追い立てられてしまったのだという。</p>
      <p>ブレイフロクスは、今の自分に渡せるものはないと告げる。珍味が欲しいなら、まずはあなたの力を貸し、野営地を取り戻して安全を取り戻さねばならない──それがゴブたちの願いだった。</p>
      <p>戦いを終えたあなたに、ブレイフロクスは感謝を惜しまない。狡猾な敵だったが、あなたは策を巡らせて打ち破った、と誇らしげに言う。そして約束どおり、秘伝の技で作ったという「ゴブリンチーズ」を渡してくれる。あの野営地はゴブたちの家であり、奪われたままにはできない──その想いを胸に、あなたは珍味を携えてコスタ・デル・ソルへ戻る。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ヴェイスケート　<small class="muted">東ラノシア (X:32.6, Y:30.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="there-and-back-again.html">思い出の土産酒</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 32～</div>
      <div class="row">
        <b>ダンジョン開放</b>
        <a class="link" href="brayflox-longstop.html">奪還支援 ブレイフロクスの野営地</a>
      </div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="what-do-you-mean-you-forgot-the-wine.html">ごちそうには美酒を</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'布雷福洛克斯的乳酪',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Wheiskaet 坦白說，他本來並不打算讓你去收集最後一樣材料。那份東西原應由他的老輜重官 Brayflox 親自送到 Costa del Sol——但不久前，Brayflox 傳來消息：Longstop 那邊出了狀況，交付將無限期延後。她沒有細說發生了什麼，只讓人直覺事態恐怕不妙。</p>
      <p>Wheiskaet 明明更想親自去援助，卻不得不把希望寄託在你與你的同伴身上。他要你立刻趕往 Hidden Falls docks，去找 Ozun Nazun。對方會指引你前往 Raincatcher Gully——那是 Brayflox 與她的族人落腳的地方。</p>
      <p>你一到碼頭，Ozun Nazun 就察覺你行色匆匆，追問是不是那群哥布林的聚落出了事。他雖然不太明白你為什麼急著幫一群 beastmen，卻也沒有阻攔，只叫你去找旁邊的船長，對方會載你前往 Raincatcher Gully。</p>
      <p>抵達 Raincatcher Gully 後，Brayflox 用她特有的語氣迎上來，像是早已聽聞 Wheiskaet 的託付。她知道你是來取「香又新鮮的哥布林點心」，但她也直說：你要的報酬藏在 Longstop 的深處——而一頭狡猾又凶悍的怪物把他們趕出家園，哥布林一族正陷入困境。</p>
      <p>Brayflox 說得乾脆：她給不了自己沒有的東西。若你想拿到那份珍奇的起司，就必須先與哥布林一族一起奪回 Longstop，讓那裡重新安全、重新屬於他們。</p>
      <p>當你完成奪回行動，Brayflox 的感謝毫不吝嗇。她承認那頭怪物確實難纏，但你用周密的計畫反制成功，證明你有一顆適合戰鬥思考的腦袋。她終於把「又臭又甜」的 goblin cheese 交到你手上——那是以祕密工藝製成的獨門珍味，也是她口中「沒有它就不算完整」的宴會靈魂。你帶著這份氣味驚人的戰利品回到 Costa del Sol，迎上 Wheiskaet 的嗅覺考驗。</p>
      <p>Wheiskaet 先是連連嗅聞，接著被那股「不敬的臭味」逼得皺起眉頭，卻仍不得不承認：這的確是 goblin cheese。從味道判斷，它應該會相當濃烈、也相當有滋味。至於你追問它怎麼做的——他立刻要你最好別知道，因為他至今還記得自己第一次得知那「奶」從哪裡來時的顫慄。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 維斯凱特　<small class="muted"> 東拉諾西亞 (X:32.6, Y:30.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="there-and-back-again.html">回憶的土產酒</a></div>
      <div class="row">所有職業（不含限定職） 等級 32 以上</div>
      <div class="row">
        <b>解鎖地城</b>
        <a class="link" href="brayflox-longstop.html">休養勝地布雷福洛克斯野營地</a>
      </div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="what-do-you-mean-you-forgot-the-wine.html">美酒配佳餚</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
