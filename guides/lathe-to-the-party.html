const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Lathe to the Party',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more',
    readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Sezul Totoloc calls for your help in great urgency. The Dezul Qualan is finally taking shape: the hull will serve as its body, the engine as its heart, and now the Ehcatl Nine must craft the “muscle” that will transfer that engine’s power to the wings. Their engine components function perfectly thanks to Tataramu’s design, and they have no shortage of materials for the next stage. What they lack is a machine tool capable of cutting the precise transmission parts they need. Without a precision gearwheel, they cannot build the lathe required to grind the intricate gears and cogs that will carry power through the propulsion system.</p>
      <p>Tataramu listens to Sezul’s concerns and explains that such a gearwheel must be made to extraordinarily exact standards. Even the smallest distortion would be reflected in the lathe’s rotation, making the production of precision components impossible. Commissioning a new one from a master artisan would take far too long, even if someone capable could be found. Instead, Tataramu recalls a faint memory of seeing a lathe in his grandfather’s old workshop somewhere outside Gridania. He asks you to return to the city and speak with Colson, who has been with Highwind Skyways since the beginning and may know what became of the workshop’s tools.</p>
      <p>Colson remembers both you and the materials he previously provided, and when you ask about Tataramu’s grandfather’s lathe, the question draws him into old memories. Nearly fifty years ago, he began his apprenticeship under Tatanora, a renowned adventurer and businessman. It was Tatanora who first proposed building passenger balloons inspired by the principles of Ixali dirigibles, founding the first air travel service in Eorzea and laying the foundation of Highwind Skyways. Colson recalls the excitement of those early days in the Fallgourd workshop, though he also explains that the workshop was eventually shut down and dismantled after Tatabaru took over the company. If any trace remains, he suggests asking the people at the Bobbing Cork.</p>
      <p>At the Bobbing Cork, Aeluuin knows nothing of an old Skyways workshop or its lathe. Still, he points you toward a mountain of unclaimed belongings that the inn has gathered over the years from residents and guests alike. Since he had only just decided to throw away the oldest and dustiest relics, he invites you to search through the pile outside and take whatever might prove useful. Among the discarded objects, you find the gearwheel from Tatanora’s lathe, preserved long after the workshop itself vanished.</p>
      <p>When Tataramu sees the gearwheel, he immediately recognizes its importance. Though the workshop is gone, he believes one of the artisans must have considered the part too precious to discard. Remembering his grandfather, he recalls how Tatanora would bring him to watch the workers at their craft and teach him that true value is bought not with coin, but with passion and persistence. Then Tataramu notices an inscription on the gearwheel: “For my dear friend, Dezul Qualan. On these wings I pledge our everlasting bond.” The name troubles him, and he asks that you return to Ehcatl at once so Sezul can help answer the questions it raises.</p>
      <p>Back at Ehcatl, Sezul is overjoyed to see the gearwheel, knowing it is exactly what they need to bring the Dezul Qualan closer to reality. But when Tataramu asks him to read the inscription, the discovery takes on deeper meaning. Tatanora, Tataramu explains, was his grandfather and the founder of Highwind Skyways. Dezul Qualan, Sezul reveals, was the first chief of the Ehcatl Nine, a brilliant outcast, master balloon maker, and his respected mentor. The hybrid airship they are building was named in honor of that very same figure.</p>
      <p>The revelation forces Tataramu to confront an old rumor: that his grandfather’s company was built by appropriating Ixali aeronautics, and that Highwind Skyways had erased such claims from the records to protect its reputation. Sezul first feigns outrage, calling Tataramu’s ancestors thieves and liars, but quickly admits he was only teasing. The inscription proves something different. Tatanora and Dezul Qualan were not rivals divided by theft, but friends who shared their craft. Sezul imagines them as two dreamers gazing into the same vast sky, one feathered and one not. Tataramu realizes that fate may have guided his meeting with Sezul, and he is honored to continue the friendship their elders began. With emotion quickly hidden beneath Sezul’s usual bluster, the work resumes, now carrying not only ambition but the memory of an old bond reborn.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Sezul Totoloc <small class="muted">(North Shroud, X:24.5, Y:23.5)</small></div>

  JP:{
    langLabel:'日本語',
    pageTitle:'巡れ、夢の歯車',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示',
    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>セズル・トトロックは、切迫した様子であなたの助けを求めます。デズル・クワラン号は、いよいよ形になりつつありました。船体はその身となり、機関は心臓となり、次に必要なのは、その力を翼へ伝えるための筋肉にあたる部品です。タタラムの設計した機関部品は問題なく機能しており、次の作業に必要な材料も十分にあります。けれど、精密な伝達部品を削り出すための工作機械がありません。精密な歯車がなければ、機関の力を推進装置へ伝える複雑な歯車や歯車列を作るための旋盤を用意できないのです。</p>
      <p>セズルの嘆きを聞いていたタタラムは、必要な歯車がきわめて高い精度で作られていなければならないと説明します。ほんのわずかな歪みでさえ旋盤の回転に現れ、精密部品の製作を不可能にしてしまうからです。たとえそれを作れる名工を見つけられたとしても、新たに製作を依頼すれば、計画は何週間、あるいは何か月も止まってしまうかもしれません。そこでタタラムは、グリダニアの外にあった祖父の工房で旋盤を見たような、かすかな記憶を思い出します。そして、ハイウィンド社の創業当時から勤めているコルソンなら、その工房の道具がどうなったか知っているはずだと考え、あなたにもう一度彼を訪ねてほしいと頼みます。</p>
      <p>コルソンは、以前タタラムの使いとしてやって来たあなたのことを覚えていました。タタラムの祖父の旋盤について尋ねると、彼は懐かしそうに昔を語り始めます。およそ五十年前、彼は著名な冒険者であり実業家でもあったタタノラのもとで徒弟として働き始めました。イクサル族の飛空船と原理を同じくする旅客用気球を造るという革新的な構想を打ち出したのが、そのタタノラでした。それはエオルゼアで最初の空の旅客事業となり、ハイウィンド社の始まりとなったのです。コルソンは、フォールゴウドの工房で初めての気球を造っていたころの高揚を懐かしみますが、タタバルが会社を継いだ後、その工房は閉鎖され、木材として解体されたと語ります。もし当時を覚えている者がいるとすれば、ボブリングコルク亭の人々に尋ねてみるとよいだろうと助言します。</p>
      <p>ボブリングコルク亭のエールウィンは、古いハイウィンド社の工房や旋盤については何も知りませんでした。それでも、宿には住人や客が置き忘れた品々が長年積み上げられており、町でも一番大きな倉庫がそうした不要品や忘れ物の置き場になっていると教えてくれます。ちょうどその朝、古く埃をかぶった品を処分しようと思っていたところだったため、彼は宿の外にある山を好きに探し、必要なものがあれば持っていってよいと勧めます。あなたはその中から、タタノラの旋盤に使われていた歯車を見つけ出します。</p>
      <p>その歯車を見たタタラムは、すぐにそれが探していたものだと気づきます。工房はなくなっていても、あまりに大切な部品だったため、当時の職人の誰かが捨てずに残しておいたのだろうと彼は考えます。祖父タタノラは多くの人に敬われており、晩年にもタタラムを連れて職人たちの仕事ぶりを見せてくれました。金には使い道があるが、本当に価値あるものは情熱と粘り強さで手に入れるものだ、と祖父はよく教えてくれたのです。やがてタタラムは、歯車の表面に刻まれた銘に気づきます。そこには、「親愛なる友、デズル・クワランへ。この翼に、我らの永遠の絆を誓う」と記され、タタノラの名が添えられていました。その言葉に動揺したタタラムは、答えを知っているかもしれないセズルのもとへ、この宝を急いで届けようとあなたに促します。</p>
      <p>エカトル実験場へ戻ると、セズルは歯車を見て歓喜します。それこそが、デズル・クワラン号を現実へ近づけるために必要な品でした。しかしタタラムが銘を読むよう促すと、歯車の意味はさらに深いものとなります。タタラムは、タタノラが自分の祖父であり、四十六年前にハイウィンド社を創設した人物だと説明します。一方のデズル・クワランについて、セズルは、それがエカトル空力団の初代団長であり、天才的な風船職人であり、自分が尊敬する師の名だと明かします。彼らが建造している複合飛空艇の名は、まさにその人物を讃えるためのものだったのです。</p>
      <p>その事実を前に、タタラムは古い噂を思い出します。祖父の会社はイクサル族の航空技術を盗んで築かれたものであり、飛ばしていた気球もイクサル族の船の粗悪な模倣にすぎなかった、という噂です。ハイウィンド社の名誉を守るため、その話は公式には否定され、記録からも消されていました。タタラムはそれを、祖父の成功を妬む者たちの中傷だと思っていました。セズルは一度、先祖がイクサル族の才を盗んだのだと大げさに怒ってみせますが、すぐに冗談だったと笑います。歯車の銘が示しているのは、盗みではなく友情でした。デズル・クワランはタタノラと技術を分かち合った友であり、羽根ある者と羽根なき者、ふたりの夢追い人が同じ空を見上げていたのです。タタラムは、セズルとの出会いにも運命の導きがあったのだと感じ、先人たちが始めた友情を受け継げることを誇りに思います。セズルは照れを隠すように仕事へ戻るよう促し、彼らは古い絆の記憶とともに、再びデズル・クワラン号の完成へ向かって歩み出します。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> セズル・トトロック　黒衣森：北部森林 <small class="muted">(X:24.5, Y:23.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-boy-from-gridania.html">グリダニアから来た少年</a></div>
      <div class="row">クラフター <small class="muted">Lv 1～</small></div>
      <div class="row">イクサル族 友好度ランク3「敬意」</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="standing-at-the-helm.html">父、来る</a></div>
    </div>`
  },

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'不可思議的命運',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Sezul Totoloc 急切地呼喚你的幫助。Dezul Qualan （迪茲爾·庫瓦蘭號）已經越來越接近完成：船體將成為它的身軀，引擎將成為它的心臟，而接下來，他們必須打造能把引擎力量傳遞到雙翼的「肌肉」。Tataramu 設計的主要引擎部件運作完美，接下來所需的材料也十分充足。問題在於，他們缺少能切削精密傳動零件的工具機。沒有精密齒輪，就無法製作出研磨這些複雜齒輪與齒輪組所需的車床，也就無法讓引擎產生的力量順利推動推進系統。</p>
      <p>Tataramu 聽見 Sezul 的煩惱後，說明這樣的齒輪必須符合極其嚴格的規格。只要有一絲一毫的歪斜，那個瑕疵就會反映在車床的旋轉上，使精密零件的製作變得不可能。即使能找到足以打造這種零件的名匠，重新委託製作也可能讓計畫停擺數週，甚至數月。比起從頭打造，取得現成齒輪會更實際。這時，Tataramu 想起自己似乎曾在祖父位於 Gridania 城外的工房裡看過車床。於是他請你再次前往 Gridania 尋找 Colson，因為 Colson 從 Highwind Skyways 創立之初就在公司服務，也許知道祖父工房的工具最後去了哪裡。</p>
      <p>Colson 記得你，也記得先前提供給 Tataramu 的材料。當你詢問 Tataramu 祖父工房中的車床時，他被這個問題牽引進久遠的回憶。將近五十年前，他曾在著名冒險者兼商人 Tatanora 門下當學徒。Tatanora 提出了建造旅客用氣球的構想，雖然用途不同，原理卻與 Ixal 的飛空艇相通。那家公司成為 Eorzea 最早的空中旅客服務，也正是 Highwind Skyways 的誕生。Colson 懷念著當年在 Fallgourd 工房裡，與 Tatanora 一同打造第一艘氣球時的興奮與希望；但他也告訴你，Tatabaru 接手公司後，那座工房便被關閉並拆解成木材。若還有人記得當時的事，也許可以去 Bobbing Cork 詢問。</p>
      <p>在 Bobbing Cork，Aeluuin 對舊 Highwind Skyways 工房與車床一無所知。不過，他提到旅店多年來堆滿了居民與客人留下的無主物品，鎮上最大的倉庫幾乎成了各種不要或被遺忘物件的安置處。就在今天早上，他才剛打算把最古老、最積灰的東西清理掉，於是請你去外面那堆物品裡自行翻找，若有需要的東西便可帶走。你在那些被丟棄的舊物中，找到了來自 Tatanora 車床的齒輪。</p>
      <p>Tataramu 一看到那枚齒輪，立刻明白它正是他們尋找的東西。雖然工房已經消失，但如此珍貴的部件想必不是能輕易丟進廢物堆的東西；也許是當年的某位工匠把它保存了下來。Tataramu 回憶起祖父總是受到眾人敬重，即使到了晚年，仍會帶他去看工匠們工作。祖父曾教導他，金錢自有用途，但真正有價值的事物，是靠熱情與堅持換來的；若想抵達最高的天空，就必須展開雙翼飛翔。接著，Tataramu 注意到齒輪表面刻著一段銘文：「獻給我親愛的朋友 Dezul Qualan。於這雙翼之上，我誓立我們永恆的羈絆。」落款則是 Tatanora。這讓他意識到事情並不單純，便請你立刻帶著這件寶物回到 Ehcatl，因為 Sezul 或許知道答案。</p>
      <p>回到 Ehcatl 後，Sezul 看到齒輪便歡喜不已，確信這正是讓 Dezul Qualan 更接近完成的關鍵。然而，當 Tataramu 請他讀出齒輪上的銘文時，這枚齒輪的意義變得更加深遠。Tataramu 說明，Tatanora 正是他的祖父，也是四十六年前創立 Highwind Skyways 的人。而 Sezul 則揭露，Dezul Qualan 是 Ehcatl Nine 的第一任首領，是一位被逐出的天才，也是出色的氣球工匠，更是他尊敬的導師。他們正在打造的混合式飛空艇，正是以這位人物的名字命名，用來紀念他的理想與精神。</p>
      <p>這個發現讓 Tataramu 想起一則舊傳聞：祖父的公司之所以能建立，是因為「挪用」了 Ixal 的航空技術；那些氣球也不過是粗劣模仿 Ixal 飛空艇的產物。這個說法曾被官方否認，相關記錄也為了保護 Highwind Skyways 的聲譽而被徹底抹去。Tataramu 原本以為，那只是嫉妒祖父成功的人散播的流言。Sezul 一開始故意誇張地指責 Tataramu 的祖先是小偷與騙子，說他們偷走了 Ixal 的才能；但很快便笑著承認自己只是在逗他。齒輪上的銘文證明，這份知識不是被竊取的，而是由朋友共享的。Tatanora 與 Dezul Qualan 曾是並肩仰望天空的兩位夢想家，一位有羽，一位無羽，卻並沒有那麼不同。Tataramu 也感覺到，他與 Sezul 的相遇似乎受命運牽引，並為能延續前人開始的友情感到榮幸。Sezul 則把情緒藏在一貫的吵鬧催促中，提醒大家趕快回到工作上，而他們也帶著這段重現的古老羈絆，繼續朝 Dezul Qualan 的完成前進。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
