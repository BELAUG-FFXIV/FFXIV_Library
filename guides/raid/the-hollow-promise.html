const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'The Hollow Promise',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more',
    readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>The Landsguard messenger welcomes you back and reports that the guard remains on high alert in Yak T’el, though no new echoes have appeared there. A message has arrived from Kikwezana, who has finished examining Prishe and Alxaal and wishes to share his findings. Bakool Ja Ja has already gone to meet him, and you are urged to make for the outskirts at once.</p>
      <p>At the outskirts of Everkeep, Bakool Ja Ja is waiting with Prishe and Alxaal. Prishe is eager to hear the truth, even as she admits there is still so much she wants to see both inside and outside the dome. Alxaal, meanwhile, speaks warmly of Kikwezana’s hospitality in Solution Nine, where the unusual dining establishments proved unexpectedly delightful.</p>
      <p>Kikwezana explains that both Prishe and Alxaal are artificial life-forms, each sustained by an electrope core. If those cores are damaged, their forms will become harder to maintain until they eventually dissipate. Alxaal’s core shows signs of wear, but no serious damage. Prishe’s core, however, was in a far more fragile state—so badly cracked that Kikwezana is astonished she had not already vanished. The worst damage has been repaired, but only barely: as long as she stays out of harm’s way, the core should hold. One more severe shock to her body could shatter it completely.</p>
      <p>Prishe insists she will be fine and promises not to overdo it, unwilling to miss the adventures still ahead. Alxaal cannot imagine continuing without her, for they are comrades born from memories of the same home, even if many of his own memories remain lost. Before the moment can settle, Kikwezana receives an urgent report: Mamook has been attacked by strange creatures the Landsguard cannot identify. Alxaal immediately suspects echoes, and Bakool Ja Ja leads everyone to reinforce the sentries.</p>
      <p>In Mamook, the Landsguard have managed to hold the line. The creatures resemble Ananta, but Alxaal remembers them from Vana’diel as Lamiae—fiends as cunning as they are ferocious. The sentry explains that a vast army of these snake-like enemies appeared from nowhere and nearly overwhelmed Mamook, only to be destroyed by a small, mysterious mage with a single spell before she vanished. Among the remains, the Landsguard found a letter from Sareel Ja. It declares that a vessel for the king has finally been chosen, presents the attack as a celebratory military procession, and invites you to return to Jeuno for the coming coronation.</p>
      <p>Bakool Ja Ja understands the invitation for what it is: a threat, with more echoes waiting should you refuse. Since the Landsguard must keep defending Mamook, he leaves Sareel Ja to you, warning Prishe to remember Kikwezana’s words and retreat if things turn dangerous. In Lower Jeuno, another portal appears, and Sareel Ja reveals that he has chosen a vessel for the “one true king,” the primordial being who first incited conflict in Vana’diel. The vessel bears the shades of Gulool Ja Ja, now twisted toward conquest and slaughter. Alxaal stands against him, but Sareel Ja hints that he knows the truth of Alxaal’s identity and leaves it unsaid, choosing instead to set powerful foes before you.</p>
      <p>After the battle, Prishe arrives despite the danger, having followed her instincts through the portal and helped turn the tide. Sareel Ja cannot accept his king’s defeat, insisting that Shinryu should have been the perfect vessel, a godlike power born when Promathia sought ever greater strength. Prishe rejects his version of events, remembering a different truth. Alxaal, shaken by the battle with Shinryu and by seeing Prishe there, finally understands himself: he is the coalescence of memories echoing in the rift between worlds—memories from past and future, from adventurers of Vana’diel and from those beyond it. As the place begins to vanish, Sareel Ja refuses to let his plan end. He flees toward the Walk of Echoes, seeking another world and another champion, while Prishe and Alxaal urge you to pursue him before desperation drives him further.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'虚ろなる王',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示',
    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ランドガードの伝令は、あなたの帰還を迎え、ヤクテルでは今も警戒態勢が続いているものの、新たなエコーの出現は確認されていないと告げる。だが、キクウェザナから連絡が届いていた。プリッシュとアルシャールの検査を終え、その結果を伝えたいという。バクージャジャはすでに彼のもとへ向かっており、あなたもすぐに郊外へ向かうよう促される。</p>
      <p>エバーキープの郊外では、バクージャジャがプリッシュ、アルシャールとともにあなたを待っていた。プリッシュは結果を知りたがりながらも、ドームの内外にはまだ見たいものが山ほどあると話す。アルシャールは、ソリューション・ナインでキクウェザナが手厚くもてなしてくれたことを振り返り、連れていかれた食事処は奇妙ではあったが、料理は思いのほか美味だったと穏やかに語る。</p>
      <p>キクウェザナは、プリッシュとアルシャールがいずれも人工生命体であり、それぞれがエレクトロープの核を持っていると説明する。その核が損傷すれば、形を保つことは次第に難しくなり、やがて消滅してしまう。アルシャールの核には摩耗の兆しこそあるものの、深刻な損傷はない。だが、プリッシュの核ははるかに危うい状態だった。すでに消えていてもおかしくないほど亀裂が走っており、キクウェザナたちは持てる技術を尽くして最悪の損傷を修復したものの、それは辛うじて保っているにすぎない。身を危険にさらさなければ核は維持できるが、もう一度強い衝撃を受ければ砕け散る恐れがある。</p>
      <p>プリッシュは大丈夫だと笑い、無茶はしないと約束する。まだ残っている冒険を見逃すわけにはいかないからだ。アルシャールもまた、彼女なしに旅を続けることなど考えられないと言う。ふたりは同じ故郷の記憶から生まれた仲間であり、たとえアルシャールが思い出せることの多くを失っていたとしても、その絆は確かにそこにあった。だが、その場に急報が入る。マムークが正体不明の怪物に襲撃されたというのだ。アルシャールはすぐにエコーの可能性を口にし、バクージャジャは守備隊の援護に向かうよう皆を促す。</p>
      <p>マムークでは、ランドガードが何とか戦線を支えていた。現れた敵はアナンタに似ていたが、アルシャールはそれをヴァナ・ディールでラミアと呼ばれる魔物だと思い出す。狡猾さと獰猛さを兼ね備えた危険な存在である。番兵の話によれば、蛇のような怪物の軍勢が突然現れ、瞬く間に包囲し、マムークを攻め落としかねないほどの数に膨れ上がっていたという。だが絶望的な状況の中、小柄な少女のような魔道士が現れ、たった一つの魔法でその軍勢を討ち払ってから、名も告げずに姿を消した。さらに敵の残骸から、サリールジャの手紙が見つかる。そこには、王の器がついに選ばれたこと、その祝いとしてこの軍勢を差し向けたこと、そして来たる戴冠式のためにジュノへ戻るよう招待することが記されていた。</p>
      <p>バクージャジャは、その招待が実質的な脅しであると見抜く。拒めばさらに多くのエコーを放つつもりなのだ。ランドガードはマムークの防衛を続けなければならず、彼はサリールジャの相手をあなたに託す。ただし、プリッシュにはキクウェザナの警告を忘れるなと釘を刺し、危険になれば退くよう命じる。下層ジュノに現れた新たな門の先で、サリールジャは「唯一無二の王」にふさわしい器を見つけたと語る。それは、ヴァナ・ディールに最初の争いをもたらした原初の存在のための器だった。そこにはグルージャジャの影が宿り、支配と虐殺を望む歪んだ声を響かせている。アルシャールは立ちはだかるが、サリールジャは彼の正体に関わる何かを知っているとほのめかしながら、あえて口にせず、強敵たちをあなたの前に差し向ける。</p>
      <p>戦いの後、危険を承知でプリッシュが現れる。胸騒ぎに従って門を飛び込み、倒れていたアルシャールと巨大な竜を目にし、それでも力を貸して戦局を覆したのだ。サリールジャは王の敗北を受け入れられず、プロマシアがさらなる力を求めたことで生まれた神竜こそ、神にも等しい力を宿す完璧な器だったはずだと叫ぶ。だがプリッシュは、その語る歴史を否定する。彼女は別の真実を知っていた。神竜との戦い、そしてその場にいたプリッシュの姿によって、アルシャールはついに自分自身を思い出す。彼は、世界と世界の狭間に響く記憶――過去と未来、ヴァナ・ディールの冒険者たち、そして異なる世界の者たちの記憶が絡み合い、ひとつに集まって形を成した存在だった。空間が消え始める中、サリールジャは終わりを認めず、別の世界と新たな強き器を求めてウォーク・オブ・エコーズへ逃げ込む。プリッシュとアルシャールは、追い詰められた彼が立て直す前に追うべきだと、あなたに先を急がせる。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ランドガードの伝令　トライヨラ <small class="muted">(X:16.2, Y:3.9)</small></div>
    </div>`,

      <div class="row" style="display:flex;gap:12px;flex-wrap:wrap;align-items:center"><b>レイドダンジョン開放</b><a class="link" href="windurst-the-third-walk.html">ウィンダス：ザ・サードウォーク</a></div>
      <div class="row">ファイター ソーサラー（リミテッドジョブを除く） <small class="muted">Lv 100</small></div>

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'虛無之王',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Landsguard messenger 迎接你歸來，並告訴你 Yak T’el 仍維持高度戒備，只是目前還沒有新的 echoes 出現。不過，Kikwezana 傳來了消息：他已經完成對 Prishe 與 Alxaal 的檢查，希望親自說明結果。Bakool Ja Ja 已經先一步前去與他會合，而你也被催促立刻趕往 outskirts。</p>
      <p>在 Everkeep 的 outskirts，Bakool Ja Ja 正與 Prishe、Alxaal 一起等著你。Prishe 急著知道檢查結果，卻也仍惦記著 the dome（罩住 Yyasulani 的巨型屏障）內外還有許多想親眼看看之處。Alxaal 則回想 Kikwezana 在 Solution Nine 期間對他們的招待，雖然帶他們去的餐飲場所相當奇特，餐點卻意外美味。</p>
      <p>Kikwezana 說明，Prishe 與 Alxaal 都是人造生命，體內各自擁有 electrope core（以 electrope 維持形體的核心）。如果 core 受損，他們維持形體的能力就會越來越困難，最終甚至會消散。Alxaal 的 core 有磨耗跡象，但沒有明顯嚴重損傷；Prishe 的狀況卻危險得多。她的 core 已經破裂到幾乎早該消失的程度，Kikwezana 等人雖然用盡 electrope 相關技術修補最嚴重的裂痕，卻只能讓它勉強維持。只要她遠離危險，core 或許還能撐住；但若身體再承受一次強烈衝擊，core 就可能徹底碎裂。</p>
      <p>Prishe 仍說自己不會有事，也答應不會亂來，因為她可不想錯過接下來還有的冒險。Alxaal 也坦言，若沒有她，他無法想像自己還能繼續前行。他們都是由同一故鄉的記憶誕生出的同伴，即使 Alxaal 能想起的記憶已經所剩不多，那份連結依然存在。就在這時，Kikwezana 接到急報：Mamook 遭到 Landsguard 無法辨識的怪物襲擊。Alxaal 立刻推測那很可能是 echoes，Bakool Ja Ja 也帶著眾人趕往前線支援守備。</p>
      <p>在 Mamook，Landsguard 勉強守住了戰線。那些敵人看起來像 Ananta，但 Alxaal 想起在 Vana’diel，這類魔物被稱為 Lamiae，是兼具狡猾與兇猛的危險存在。守衛解釋，當時他們正在站崗，一支蛇形怪物大軍突然憑空出現，瞬間包圍眾人；數量多到幾乎無法計算，只要敵人繼續進攻，Mamook 很可能就會遭到圍困。就在希望幾乎斷絕時，一名身形像孩子般的小法師出現，只用一道魔法便擊潰大軍，隨後在眾人來得及詢問姓名或道謝之前消失無蹤。Landsguard 也從敵人殘骸中找到 Sareel Ja 的信，信中宣告 king 的 vessel 已經選定，稱這場襲擊是慶祝用的軍事隊列，並邀請你回到 Jeuno 參加即將到來的 coronation ceremony。</p>
      <p>Bakool Ja Ja 看穿那封邀請其實是威脅：若拒絕，Sareel Ja 恐怕就會釋放更多 echoes。由於 Landsguard 必須繼續守住 Mamook，他把對付 Sareel Ja 的任務交給你，同時提醒 Prishe 別忘了 Kikwezana 的警告，一旦情勢不妙就必須撤退。在 Lower Jeuno，新的 portal 出現在你們眼前，Sareel Ja 也現身宣稱自己已為「唯一真正的 king」找到合適的 vessel。那是為了最早在 Vana’diel 掀起衝突的 primordial being 所準備的容器，其中寄宿著 Gulool Ja Ja 的殘影，聲音已扭曲成對統治與屠殺的渴望。Alxaal 站出來阻止他，Sareel Ja 卻暗示自己知道 Alxaal 真正的身分，卻故意不說破，只把強大的敵人推到你面前。</p>
      <p>戰鬥之後，Prishe 不顧危險追了過來。她憑直覺察覺不對，跳進 portal，下一刻便看見 Alxaal 倒在地上，而巨大的 dragon 盤踞在上方；即使知道自己是在賭命，她仍出手相助，也正是她的到來扭轉了戰局。Sareel Ja 無法接受 king 的敗北，堅稱 Shinryu 是 Promathia 追求更強力量時誕生的存在，理應是擁有神之力量的完美 vessel。Prishe 卻否定他的說法，因為她親身知道另一個真相。與 Shinryu 的戰鬥，以及 Prishe 出現在那裡的景象，讓 Alxaal 終於想起自己是誰、又是什麼。他是迴盪在世界夾縫中的記憶凝聚而成的存在——那些記憶來自過去與未來，來自 Vana’diel 的冒險者，也來自不屬於他們世界的人。當這片空間開始消失，Sareel Ja 仍不肯讓一切就此結束，轉而逃向 Walk of Echoes，企圖尋找另一個世界與更強的 vessel。Prishe 與 Alxaal 明白他已經走投無路，催促你必須在他恢復之前繼續追擊。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
