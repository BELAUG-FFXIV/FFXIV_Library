    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },

    story:`<div class="clamp" data-collapsed="true">
      <p>※ Frontline unlocked.</p>
      <p>Trachraet asks whether you know what truly happened at Carteneau after the Calamity. The fall of Dalamud and Bahamut’s devastation are known even in distant lands, but he is speaking of what came afterward: the Eorzean Alliance’s decision to occupy and jointly administer the Carteneau Flats.</p>
      <p>To most people, the region seems like a wasteland with no value worth the lives, coin, and effort spent to hold it. The truth, however, is different. Bahamut’s rampage exposed Allagan ruins hidden beneath the land, ruins whose existence no one had suspected before the Calamity. Once their importance became clear, the Alliance agreed that they had to be protected and studied together, lest they fall into the wrong hands.</p>
      <p>That agreement has now begun to fracture. Limsa Lominsa, Ul’dah, and Gridania have each formally laid claim to the disputed territory, and the time for negotiation has passed. Yet Trachraet stresses that the Alliance must not allow this conflict to become a true war. Fighting will occur, but only under strict rules: hostilities are to remain within the disputed region, and battles are to end in submission, not death.</p>
      <p>He asks you to remember that when you stand on the front line. You may need to fight your fellow Alliance members with everything you have, but you must not take their lives. Your strength could make a tremendous difference, and your service would greatly aid your nation. Before making a final decision, he asks you to speak with the officer stationed at the airship landing.</p>
      <p>At the landing, the officer welcomes your willingness to take part, but warns that this will be nothing like a casual match at the Wolves’ Den. You will face wave after wave of fellow Alliance soldiers, and they will not hesitate simply because you are the Warrior of Light. The campaign will be long and brutal, with victories won one day potentially lost the next.</p>
      <p>He explains that the struggle is not only about seizing the borderland ruins, but also about holding them. Rivals will continue to challenge each claim, which is why a direct airship route to the front line has been established. Those ready to fight will always have a way to reach the battlefield.</p>
      <p>Seeing your confusion, the officer clarifies the strange nature of the conflict. It is not quite a war, but organized violence meant to settle a territorial dispute. It is meant to be “civilized” violence, with killing strictly forbidden, even if accidents may happen. Still, he has confidence in you: after surviving countless brushes with death, surely this battlefield will not be the one that finally claims you.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    langLabel:'日本語',
    pageTitle:'激戦のアウトロー戦区（黒渦団）',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },

    story:`<div class="clamp" data-collapsed="true">
      <p>※ フロントラインが開放されます。</p>
      <p>トラッハレートは、五年前のカルテノーで何が起きたのか、あなたがどこまで知っているかを尋ねます。ダラガブが砕け、バハムートがエオルゼアに業火を降らせたことは、遠い東方にまで伝わっているほど有名な話です。しかし彼が語ろうとしているのは、その後に起きたことでした。エオルゼア同盟軍がカルテノー平原に駐留し、当面のあいだ共同で管理することになった、その経緯です。</p>
      <p>多くの者にとって、カルテノー平原は価値のない荒地であり、そこに人員や資金を注ぎ込むのは無駄に見えるかもしれません。けれど実際には、バハムートの暴威によって、それまで誰も存在を知らなかった古代アラグ帝国の遺跡が露出していたのです。その重要性は明らかであり、誤った者の手に渡らせるわけにはいきませんでした。だからこそ同盟各国は、遺跡を共に守り、調査することを決めたのです。</p>
      <p>しかし、その合意は今や揺らぎ始めています。リムサ・ロミンサ、ウルダハ、グリダニアの三国が、それぞれ正式にこの地の領有権を主張しました。話し合いの時は終わり、行動の時が来たのです。それでもトラッハレートは、この問題ひとつで同盟を崩壊させるわけにはいかないと語ります。戦いは避けられませんが、あくまで定められた規則に従って行われます。交戦は係争地内に限られ、戦闘は殺害ではなく降伏をもって終わらせるべきものなのです。</p>
      <p>前線に立つなら、そのことを忘れてはならないと彼は忠告します。必要であれば相手を限界まで追い詰めることもあるでしょう。けれど、命を奪ってはなりません。あなたほどの力を持つ者が加われば、戦況に大きな影響を与えられるはずですし、国への大きな貢献にもなります。最終的な判断を下す前に、まずは飛空艇乗り場にいる担当者と話してほしいと、彼はあなたに頼みます。</p>
      <p>飛空艇乗り場の担当者は、あなたが参戦するつもりで来たのだと受け止め、歓迎します。しかし同時に、これはウルヴズジェイルでの気軽な試合とは違うと警告します。あなたが相手にするのは、同じエオルゼア同盟に属する兵たちの波であり、彼らはあなたが光の戦士であるからといって手を抜くことはありません。この戦いは長く苛烈なものになり、今日得た勝利も明日には覆されるかもしれないのです。</p>
      <p>彼は、国境地帯の遺跡をめぐる戦いが、単に制圧すれば終わるものではないと説明します。重要なのは奪うことだけでなく、守り続けることでもあります。ほかの勢力は必ずこちらの主張を退けようと戦力を差し向けてくるため、前線へ直接向かう飛空艇航路が整備されました。戦う意思のある者には、常に戦場へ向かう手段が用意されているのです。</p>
      <p>あなたの戸惑いを察した担当者は、この争いの奇妙な性質を説明します。これは完全な戦争というより、領土問題を解決するための、規律ある武力衝突です。そして、それはあくまで文明的な暴力でなければなりません。同盟の兵を殺すことは厳しく禁じられていますが、もちろん事故が起きることもあると彼は付け加えます。それでも、数えきれないほど死地をくぐり抜けてきたあなたなら恐れることはない、と彼は信じています。今回だけ生き延びられない理由など、どこにもないのです。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> トラッハレート　リムサ・ロミンサ：上甲板層 <small class="muted">(X:12.7, Y:12.8)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="a-pup-no-longer-maelstrom.html">激闘のウルヴズジェイル（黒渦団）</a></div>
      <div class="row">黒渦団二等甲兵</div>
      <div class="row">ファイター ソーサラー（リミテッドジョブを除く） <small class="muted">Lv 30～</small></div>

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'法外紛爭（黑渦團）',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>※ 解鎖紛爭前線。</p>
      <p>Trachraet 問你是否清楚五年前 Carteneau（Eorzea 中央的平原地帶，Carteneau Flats 所在之處；五年前的第七靈災中，Eorzean Alliance 與 Garlean Empire 曾在此爆發 Carteneau 戰役，隨後 Dalamud 墜落、Bahamut 現身，使這片土地成為災後各國爭奪與調查的重要地區）發生過什麼。他指的不是 Dalamud 崩裂、Bahamut 將地獄般的火焰灑向大地那件眾所皆知的災厄；那段故事恐怕連遠東的人都聽過。他真正想問的是災後的事：Eorzean Alliance 決定進駐 Carteneau Flats，並在可預見的未來共同管理那片地區。</p>
      <p>在多數人眼中，Carteneau Flats 不過是一片毫無價值的荒地，把金錢、人力與時間耗在那裡根本不值得。然而真相並非如此。Bahamut 的暴走揭露了原本埋藏在地下的 Allag（古代亞拉戈帝國）遺跡，而在 Calamity（泛指 Eorzea 歷史中由元素失衡、戰爭、古代技術或超常力量引發的大規模災厄；這裡特指第七靈災，即 Dalamud 墜落後 Bahamut 被釋放、重創 Eorzea 並終結第六星曆的事件）之前，根本沒有人知道它們存在。這樣的發現顯然極為重要，也絕不能落入錯誤的人手中。因此同盟各國決定共同保護並研究那些遺跡。</p>
      <p>但如今，這份共識開始瓦解。Limsa Lominsa、Ul’dah 與 Gridania 都正式宣稱對該地區擁有權利。談判的時候已經過去，行動的時候到來了。不過 Trachraet 也強調，若讓這一項爭議撕裂整個同盟，他們就稱不上是合格的 Alliance。因此戰鬥雖然會發生，卻必須遵守規則：所有衝突都限定在爭議地區內，交戰的目的也不是殺死對方，而是迫使對手屈服。</p>
      <p>他要你在前線時牢記這一點。必要時，你或許得把對手打到只差一點就倒下，但絕不能越過那條線，奪走同盟成員的性命。像你這樣有能力的戰士若加入戰局，必定能帶來巨大的影響，也會為自己的國家立下重要功勞。在你做出最後決定之前，他希望你至少先去飛空艇搭乘處，和那裡的負責人談談。</p>
      <p>到了飛空艇搭乘處，負責人見你前來，便認為你是準備加入戰鬥，並對此表示歡迎。不過他也先提醒你，這可不是 Wolves’ Den 那種輕鬆的對戰。你將面對一波又一波同屬 Eorzean Alliance 的士兵，而他們不會因為你是光之戰士就手下留情。這場戰役會漫長而殘酷，今日贏下的成果，明日也可能被對手奪回。</p>
      <p>他進一步說明，邊境遺跡的爭奪並不是單純占領就結束。真正困難的是守住它們，因為其他勢力必定會派兵挑戰各自的主張。正因如此，前往前線的直達飛空艇航線才會被建立起來。只要有人準備好投入戰場，就永遠不會缺少前往戰地的交通手段。</p>
      <p>看出你對這場衝突的困惑後，負責人也說明了其中的奇特之處。這與其說是戰爭，不如說是為了解決領土爭端而組織起來的武力衝突，而且必須是「文明化」的暴力。殺害 Alliance 成員受到嚴格禁止，雖然他也承認意外並非完全不會發生。即便如此，他對你很有信心：你已經無數次從必死局面中生還，這一次又有什麼理由會失敗呢？</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
