    story:`<div class="clamp" data-collapsed="true">
<p>You press on without delay, and Hildibrand insists there’s no time to lose—their “final confrontation” is close at hand. Even if the foe has taken on yet another face, he vows that once you return to Costa del Sol, the time-tested Manderville art of parley will tear away any flimsy disguise. He says he’ll teach you the technique in time, but first the foe must be shackled and Miss Arabella kept safe.</p>
<p>At Costa del Sol, Arabella takes her leave to prepare for the banquet, and Hildibrand turns at once to Inspector Briardien for an update. Briardien has canvassed the grounds, yet no guest seems to be hiding their hands—still, he refuses to let Arabella appear while the thief remains at large. Ellie frets that Vannes and his family will not accept the bride’s absence, but Briardien brusquely dismisses it and tells you to help conceal Arabella’s identity instead.</p>
<p>You fetch plain servants’ clothing from the quarters and bring it to Arabella outside the gates. Briardien orders her to change and to stay within his sight; Arabella protests the ceremony and her father’s wrath, but Briardien reminds her the culprit once tried to blast him to the heavens and caution is the only sane choice. Lewenhart backs him up, telling Arabella her life matters more than marriage or profit, and she agrees to retreat to the carriage—then asks what should be done with her banquet dress.</p>
<p>Briardien has you deliver the dress to the “bumbling inspector,” and you find Hildibrand trying to devise a diversion for Master Vannes. He accepts the gown with baffled confidence, declaring he will keep it safe, and urges you to take a seat and enjoy the festivities while he “handles” the ceremony. Nearby, Briardien seethes at the crush of people as the celebration begins.</p>
<p>The hosts welcome the assembled guests in grand fashion, and Morgant announces the betrothal of his son, Vannes—future chair of the Brugaire Consortium—to Arabella, daughter of Master Guguremu of the East Aldenard Trading Company. The crowd thrills for the “lapis maiden”…only for Hildibrand to appear in her place, radiant in the dress and proclaiming endless devotion. Vannes explodes in outrage at the cross-dressing “deviant,” while Briardien groans that it isn’t what he intended—yet it may serve their purposes.</p>
<p>Hildibrand grandly declares Arabella safe and claims he has assumed her appearance to ensnare the villain, then accuses Vannes as the thief of many faces: only someone who had seen Arabella before could have recognized the disguise at a glance. Ellie snaps that anyone with half their wits could tell, and Vannes calls for guards—only for the real thief to reveal himself, marked by a glove on his right hand. With mocking laughter, he declares that what is yours is now his, then vanishes after taunting that he will return to claim the victor’s spoils; Hildibrand, absurdly, mistakes the attention for adoration.</p>
<p>Afterward, you learn the real Vannes was found bound and gagged, the betrothal is called off, and Arabella—shaken but clear-eyed—says she will live her life as she chooses, grateful for the lesson this chaos taught her. One question lingers: the thief promised to steal the lapis maiden’s “virtue,” yet took only her neckpiece—Lewenhart explains the clasp is a treasured Brugaire heirloom known as “Azeyma’s Virtue.” Briardien vows to read between the lines next time and warns the murderer that their fates are sealed; Hildibrand loudly agrees while trying to distance himself from blame. And as riddles pile up and the key to the next case is pressed into your hands, Nashu can only marvel that this “key” is both literal and figurative—promising, with nervous excitement, that you will find out soon enough.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>あなたが急ぐと、ヒルディブランドは一刻の猶予もないと言い切る。敵が新たな身分を名乗っていようとも恐れるな、コスタ・デル・ソルへ戻りさえすれば、マンダヴィル家伝来の「交渉術」で薄っぺらい仮面などたちまち剥がせるのだと胸を張る。教えは後回しだ、まずは敵を縛し、アラベラの身の安全を確かなものにする――それが先決だと。</p>
<p>コスタ・デル・ソルへ着くと、アラベラは宴の支度のため邸へ戻ると言い、ヒルディブランドはブリアルディアンに状況を問いただす。ブリアルディアンは敷地を調べたが、客の誰一人として手を隠していない――それでも犯人を確保できぬままアラベラを人前に出すわけにはいかない。エリーは婚約者ヴァンネスとその家が黙っていないと不安を漏らすが、ブリアルディアンは一蹴し、あなたにはアラベラの正体を隠す手立てを用意せよと命じる。</p>
<p>あなたは使用人区画で地味な服を受け取り、門の外で待つアラベラへ届ける。ブリアルディアンは着替えて自分の目の届くところから離れるなと告げ、アラベラは式のことや父ググレムの怒りを口にする。だがブリアルディアンは、犯人はかつて自分を天へ吹き飛ばそうとした危険な男だと釘を刺し、慎重すぎるほどでちょうどいいと言い切る。レウェンハートも同意し、結婚や利より命が大事だと諭され、アラベラは馬車へ退くことを受け入れ――そして宴の衣装をどうすべきかと問いかける。</p>
<p>ブリアルディアンはその衣装を「頼りない事件屋」に渡せと言い、あなたはヒルディブランドのもとへ向かう。ヒルディブランドはヴァンネスの気を逸らす策を練っている最中だと強がりながら、衣装を受け取ると扱いに戸惑いつつも「安全に保管する」と宣言する。そして状況は自分とブリアルディアンで万全だと言い、あなたには席について宴を楽しめと促す。人波の中でブリアルディアンは苛立ちを隠せぬまま、式は始まっていく。</p>
<p>主催者たちは集まった客人を歓迎し、モルガントは、息子ヴァンネス――ブルゲール商会の次期会頭――と、東アルデナード商会の主ググレムの娘アラベラの婚約を高らかに告げる。客たちは「るり色の花嫁」に熱狂するが、姿を現したのはアラベラではなく、衣装をまとったヒルディブランドだった。ヒルディブランドは甘い言葉で誓いを重ね、ヴァンネスは花嫁を返せと激昂する。ブリアルディアンは頭を抱えながらも、狙いを果たすには都合がいいと苦々しく認める。</p>
<p>ヒルディブランドはアラベラは無事だと宣言し、自ら花嫁に成り代わって悪党を誘い出したのだと言い放つ。そして、仮面を見破ったヴァンネスこそ「千の顔を持つ盗賊」だと断じる――初対面のはずの花嫁の顔を、なぜ一目で偽物だと見抜けたのか。だがエリーは、そんなものは少し頭が回れば誰でもわかると切り捨て、ヴァンネスは衛兵に捕らえろと叫ぶ。そこへ右手に手袋をはめた怪盗白仮面が姿を現し、あざけるように「お前たちは言葉に踊らされた」と言い残して、戦利品を奪ったまま去っていく。ヒルディブランドは的外れにも、その視線を「愛の告白」だと受け取ってしまう。</p>
<p>後になって本物のヴァンネスは物置で猿ぐつわを噛まされて見つかり、婚約は破談となる。動揺しつつもアラベラは、望む生き方を選ぶと静かに言い、今日の騒動が教えたものを受け止める。なおも疑問が残る――怪盗は「花嫁の貞操を奪う」と挑発したのに、奪ったのは首飾りだけだったのだ。レウェンハートは留め金の名を告げる、「アーゼマの美徳」――ブルゲール家の至宝だと。ブリアルディアンは次の謎では言葉の裏を読めと誓い、殺人を企てた相手に決着を宣告する。ヒルディブランドは大声で同調しながらも責任から逃れようとし、さらに新たな謎かけとともに「次の事件の鍵」があなたの手に渡ると、ナシュはそれが文字どおりの鍵であり、同時に比喩でもあることに目を丸くして、次こそ確かめようと身を引き締める。</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>你催促著往前走，Hildibrand 斬釘截鐵地說一刻都不能再拖——與那名「惡徒」的最終對決近在眼前。就算對方又換了身分也不必怕，只要回到 Costa del Sol，他就要用 Manderville 家代代相傳的交涉術，當場戳破那層薄得可笑的偽裝。他說這門本事之後也能教你，但前提是先把對方送進牢裡，並確保 Miss Arabella 平安無虞。</p>
<p>抵達 Costa del Sol 後，Arabella 表示得回莊園為宴會做準備；Hildibrand 立刻轉向 Inspector Briardien，詢問調查進展。Briardien 說他已巡查過現場，卻沒人藏著手——可在竊賊仍逍遙法外之前，他絕不讓 Arabella 出現在眾目睽睽之下。Ellie 擔心 Vannes 與他的家族不會接受新娘缺席，但 Briardien 不以為意，直接要你去想辦法遮掩 Arabella 的真實身分。</p>
<p>你從侍從住處取來樸素的衣物，帶到大門外交給 Arabella。Briardien 要她立刻換上，並承諾絕不離開他的視線；Arabella 焦急地提到儀式與 Father 的怒火，但 Briardien 冷冷提醒：那名犯人曾試圖把他炸上天——幾乎就成功了，這種對手再怎麼小心都不算過分。Lewenhart 也勸她照做，說她的性命比婚姻、或 Father 想從中獲得的利益都更重要；Arabella 終於點頭，退回馬車裡，卻又遲疑地問：她的宴會禮服該怎麼辦。</p>
<p>Briardien 讓你把禮服交給那位「莽撞的 inspector」，你便帶著衣物去找 Hildibrand。Hildibrand 口口聲聲說自己正在擬定分散 Master Vannes 注意力的萬全之策，接過禮服時卻明顯一愣，仍硬著頭皮宣稱會「妥善保管」。他催你去入席欣賞宴會，說他與 Briardien 已完全掌控局勢；而在人潮另一側，Briardien 被擠得心浮氣躁，眼看著儀式就要開始。</p>
<p>宴會在眾人歡呼中揭幕，主辦者向賓客致意後，Morgant 高聲宣布：他的兒子 Vannes——Brugaire Consortium 未來的 chair——將與 Arabella 成婚；她是 Master Guguremu、亦即 East Aldenard Trading Company 之主的女兒。眾人期待著被稱作「lapis maiden」的新娘現身，結果走上舞台的卻是穿著禮服的 Hildibrand——他用誇張的熱情宣誓，反倒把 Vannes 氣得大吼，指他是易裝的變態。Briardien 只能痛苦地嘆氣，卻也承認：雖然離他的原意差得遠，但或許正好能達成目的。</p>
<p>Hildibrand 立刻宣布 Arabella 安然無恙，並聲稱自己假扮成她，就是為了引出那個企圖對她下手的惡徒。接著他把矛頭指向 Vannes，說 Vannes 才是「千面竊賊」——因為按理來說，他今天才第一次見到未婚妻，卻能一眼看穿這張臉並非 Arabella。Ellie 馬上吐槽：只要有一半的腦子，誰都看得出來。Vannes 怒吼要守衛抓人時，真正的竊賊終於現身——右手戴著手套，笑著說你們沒聽懂話裡的意思，而屬於你們的已經成了他的戰利品；他丟下「下次再來索取勝者之物」的挑釁便轉身離去，Hildibrand 卻荒謬地把那一刻的注視當成了愛慕。</p>
<p>事後你得知真正的 Vannes 被人綁住堵嘴，丟在儲藏室裡；婚約因此作罷。Arabella 雖驚魂未定，卻清楚地說：或許這樣反而更好——她要用自己想要的方式活下去，而這場混亂讓她真正明白了這件事。可還有一個謎：竊賊的挑戰宣稱要奪走「lapis maiden 的貞潔」，最後卻只拿走她的項飾；Lewenhart 解釋那枚扣飾刻著 sun goddess 的印記，是 Brugaire 家珍藏的寶物，名為「Azeyma’s Virtue」。Briardien 冷聲發誓下次一定要讀懂字面背後的含意，並向那名曾企圖殺人的敵手宣告決不罷休；Hildibrand 一邊附和一邊心虛地撇清責任。當新的謎語接連而來，你手上也多了一把「下一件案子的鑰匙」時，Nashu 忍不住困惑——那竟同時是實際的鑰匙、也是比喻的鑰匙；而你只能握緊它，明白這場追逐還遠遠沒有結束。</p>
</div>

  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

  repo: 'BELAUG-FFXIV/FFXIV_Library',

  category: 'General',

  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
