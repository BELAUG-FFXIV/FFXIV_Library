    story:`<div class="clamp" data-collapsed="true">
<p>Hildibrand declares that there is only one person in all Eorzea capable of restoring Durilda’s shattered vase: a man whose hammer-work has humbled rival goldsmiths, whose creations are breathtaking, and whose competitive spirit is downright fearsome. The flamboyant man beside you bristles at the understatement, insisting this is no mere artisan—you speak of him as if he were a warrior.</p>
<p>Hildibrand answers by recounting an old Ul’dah crime wave: a notorious gang once robbed shops selling luxury goods, and the last place they struck belonged to the humble lapidary he means. By the next morning the thieves were found beaten, bound, and gagged in the Gold Court. The Brass Blades never learned who did it; all they had was one thief’s shaken testimony, muttering only, “The hammer… The hammer…” Maria can only whisper that the man sounds dangerous. The flamboyant man agrees—too enthusiastically for comfort.</p>
<p>Then the loudest introduction crashes into the moment: Gilgamesh announces himself at last, along with his “companion,” Enkidu—quickly admitting it isn’t really her. It has been many moons since he last saw Enkidu, so he tamed a rooster and painted it green to ease the loneliness. With that settled, he offers his help in searching for the goldsmith, and Hildibrand—already in full flourish—welcomes him while mangling his name and then adopting another nickname at Gilgamesh’s suggestion.</p>
<p>Based on the goldsmith’s habit of gathering his own materials, Hildibrand concludes the man is most likely near Bluefog in northern Thanalan, and declares that is where you will begin. Gilgamesh doubts there is any hope for the vase, but Nashu—still thinking like an investigator—wonders if the culprit behind the break is nearby, then immediately veers into absurd wordplay about whether a doblyn zombie would be a “zomblyn” or a “dombie.”</p>
<p>As you search, the signs turn grim and unmistakable. A creature lies dead from a single blow to the head—enough for Gilgamesh to admit this goldsmith is not someone to trifle with. Hildibrand studies the scene and declares the corpses are still warm: a doblyn, a basilisk, an ahriman—all slain with a hammer, as was a beast in the distance. He reasons that the chimera must be the goldsmith’s latest prize, which means he must still be nearby—perhaps even watching you right now, cautious as he always was on the hunt.</p>
<p>Cornered by his own logic, Hildibrand claims there is only one way to draw such a cautious quarry out. With theatrical despair, he announces he must break his oath and commit the unthinkable: he must dance—and he launches into the Manderville routine, singing as he moves. Gilgamesh admits he cannot avert his eyes.</p>
<p>Breathless, Hildibrand declares this to be the dance of House Manderville, passed down from father to son, and insists that if the goldsmith sees it, he will be unable to resist revealing himself. But Hildibrand then gasps that he failed to stretch his legs properly, and insists you must dance in his stead. He calls it a gross violation of tradition—yet insists he has no other solution, and solemnly “bequeaths” you the Manderville.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>ヒルディブランドは断言する。ドリルダの花瓶を再生できる者は、エオルゼア広しといえどただ一人――金槌の腕で同業の金細工師を屈服させ、作品は息を呑むほど美しく、闘争心は恐るべき男だ、と。そばの派手な男は、そんな人物を「金細工師」と呼ぶのは軽すぎると言い、まるで武人のように語っているではないかと驚く。</p>
<p>ヒルディブランドは、かつてウルダハで起きた連続強盗事件を語り出す。高級品を扱う店ばかりが狙われ、最後に襲われたのが、彼の言う宝石研磨師の店だった。だが翌朝、盗賊団はゴールドコートで殴られ、縛られ、猿ぐつわを噛まされて発見された。真犯人は不明のまま、ただ一人の盗賊が「金槌……金槌……」と繰り返し呟いていた――それだけが手掛かりだったという。マリアは危険な人物だと怯え、派手な男は嬉々として同意する。</p>
<p>そこへギルガメッシュがようやく名乗りを上げる。自分はギルガメッシュ、そして相棒はエンキドゥだ――と言いかけて、実は違うと訂正する。長らく会っていない寂しさを紛らわすため、鶏を手懐けて緑に塗ったのだと、平然と告げる。ともあれ、その金細工師を探すなら手伝うと言い、ヒルディブランドは歓待しつつ名前を取り違え、さらに愛称で呼び合うことにする。</p>
<p>金細工師は素材を自分で調達する癖がある――その推理から、ヒルディブランドは北ザナラーンのブルーフォグ付近にいるはずだと結論づけ、そこから捜索を始めると言い切る。ギルガメッシュは花瓶の修復など望み薄だと疑うが、ナシュ・マカラッカは壊した犯人がまだ近くにいるかもしれないと考え、続けてドブリンがゾンビーになったら何と呼ぶのかと妙な言葉遊びを始める。</p>
<p>捜索の途中、ひと目で危険が伝わる痕跡に行き当たる。頭を一撃で砕かれた獣体を見て、ギルガメッシュは相手を侮れないと認める。ヒルディブランドは死体の温かさを確かめ、ドブリンもバジリスクもアイリマンも、そして遠くの獣も、すべて金槌で討たれたと断じる。さらにキマイラは最新の獲物であり、つまり標的はまだ近くにいる――今この瞬間も、あなたたちを観察しているのかもしれない、と推測する。</p>
<p>追い詰められた末、ヒルディブランドは苦渋の面持ちで言う。用心深い獲物を誘い出すには、誓いを破り、禁忌を犯すしかない――踊らねばならない、と。彼はマンデヴィル家に伝わる踊りを歌いながら披露し、ギルガメッシュは目を逸らせないと呟く。</p>
<p>息を切らしたヒルディブランドは、それが父から子へ受け継がれるマンデヴィル家の舞だと告げ、獲物の視界で踊れば必ず姿を現すはずだと主張する。だが直後、足を十分に伸ばしていなかったと嘆き、あなたに代役を求める。家の伝統を踏みにじる行為だと言いながらも、他に手はないとして、その「マンデヴィル」をあなたに託す。</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>Hildibrand 斬釘截鐵地說，整個 Eorzea 只有一個人能把 Durilda 的花瓶重建回來——那名男人的 hammer 技藝讓競爭對手的金匠都黯然失色，作品美得令人屏息，爭強好勝的氣勢更是可怕到不像凡人。站在旁邊的 flamboyant man 聽得心癢，忍不住插話：這種人物根本不只是 goldsmith，你講得像在形容一名戰士。</p>
<p>Hildibrand 便講起一段舊聞：曾有一群惡名昭彰的盜賊在 Ul’dah 連續行竊，專挑販售奢侈品的店下手，而那位「寶石研磨師」的店正是他們最後的目標。結果隔天清晨，盜賊們就被人打得鼻青臉腫、綁起來、塞住嘴，丟在 Gold Court。Brass Blades 直到最後都查不出兇手，只得到一名盜賊的顫聲供詞——那人只是不停喃喃：「hammer……hammer……」Maria 聽得發寒，低聲說那人聽起來很危險；flamboyant man 卻興致高昂地附和。</p>
<p>就在此時，Gilgamesh 終於想起自己還沒自我介紹。他大聲宣布自己是 Gilgamesh，身旁那位是他的同伴 Enkidu——但又立刻改口說其實不是。因為他已經很久沒見到 Enkidu，為了不那麼寂寞，乾脆馴了一隻 rooster，還把牠漆成綠色。話說完，他表示願意協助你們尋找那位 goldsmith；Hildibrand 也用一貫的浮誇熱情回應，卻把名字叫錯，接著又順勢替對方取起綽號，並要對方也用暱稱叫他。</p>
<p>Hildibrand 推理那名 goldsmith 習慣親自取得材料，因此最可能出現在北 Thanalan、Bluefog 一帶——你們便決定從那裡開始找。Gilgamesh 看著碎得不成樣的花瓶，懷疑世上真有辦法修回來；Nashu Mhakaracca 卻仍在想，砸碎花瓶的人或許還在附近，下一秒又突然開始胡思亂想：如果 doblyn 變成殭屍，那會叫 zomblyn 還是 dombie。</p>
<p>隨著搜索推進，你們很快遇到能讓人沉默的痕跡：一具倒下的生物頭顱被單擊擊碎，乾脆俐落到讓 Gilgamesh 都讚了一聲「厲害」，並警告那名 goldsmith 絕對不是可以輕視的對手。Hildibrand 俯身確認屍體仍帶著溫度，並指出 doblyn、basilisk、ahriman 都是被 hammer 所殺，遠處那頭野獸也是同樣死法。他推斷那隻 chimera 是對方最新的戰利品——代表目標還在附近，甚至可能正躲在暗處觀察你們，像過去狩獵時那樣謹慎。</p>
<p>在這樣的推論下，Hildibrand 露出痛苦又戲劇化的表情，說自己不得不違背誓言、做出不可告人的事——他必須跳舞。接著他真的開始唱著 House Manderville 的歌詞，跳起那套舞步；Gilgamesh 直言自己根本移不開視線。</p>
<p>Hildibrand 氣喘吁吁地宣告，這是 House Manderville 代代相傳、由父傳子的舞，只要在目標視線內跳出來，對方就一定忍不住現身。然而他下一句就哀嘆自己剛才忘了先伸展腿部，只能要你代他跳——他承認這是對家族傳統的嚴重違背，卻仍堅稱別無他法，並用最誇張的方式把「Manderville」託付給你。</p>
</div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
