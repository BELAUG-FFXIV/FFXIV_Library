<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'A New World to Explore',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Ojika Tsunjika welcomes you back with bright news: word has come from Erenville, and he has secured passage to Tural aboard a Gleaners’ guildship. While Ojika goes to inform your companions, you wait in the main hall—feeling the quiet shift from planning to departure, as if the next step has already begun.</p>
      <p>When everyone gathers, Erenville arrives in person and confirms the details. Places have been granted on a vessel bound for Tural, but you will be sharing deck space with other passengers—researchers, artisans, and the like. Before the ship casts off, he asks if anyone has lingering concerns, and Wuk Lamat makes sure your purpose remains firmly in view.</p>
      <p>Alphinaud answers plainly: Tuliyollal is in the midst of choosing its next ruler. As Wuk Lamat’s chosen allies, you will aid her through the rite of succession and support her bid to become Dawnservant. Alisaie adds another aim—Garlemald seeks reconciliation with its neighbors, and she and Alphinaud hope to learn how Tural’s myriad cultures interact, find common ground, and build stronger ties—insights that might help in Ilsabard—without losing focus on the contest.</p>
      <p>Wuk Lamat turns to Krile, and Krile voices her own reason for coming. From an old missive, she learned her grandfather was tasked—by Wuk Lamat’s father, the Dawnservant—to investigate the golden city, yet the archives hold no record of the investigation, nor any explanation for the earring that came with the letter. For reasons both official and personal, she wants the truth, and Wuk Lamat promises there will be a chance to ask her father directly.</p>
      <p>Erenville insists the golden city is little more than a children’s bedtime story—and that he serves as guide only because the Third Promise has commanded it. Wuk Lamat presses you for your resolve. You answer with the spirit of departure, and she takes it as the final nudge: no more lingering in the shallows. If all remain committed, Erenville says, then it is time to make ready.</p>
      <p>On the way to the harbor, excitement rises—and is checked just as quickly. Erenville warns that the sea between is vast and dangerous, and that the treacherous waters of Shades’ Triangle have claimed countless vessels; even following the “safe” route plotted by Admiral Bloefhiswyn, this will be no pleasure cruise. Still, the boarding call comes, and with everything you need in hand, the ship finally casts off westward—bound for the “New World,” Tural.</p>
      <p>Days of open water stretch on. Krile shares what she has learned from fellow passengers about Tuliyollal and the rite of succession, urging you to speak with them yourself. Stories and cautions mingle—clan names used in place of races, the legend of Ketenramm’s historic journey and disappearance, reminders that customs differ across the sea—until the weather turns and the deck erupts in shouts as sailors struggle against wind and waves.</p>
      <p>In the chaos, you and your companions rush to help. You move to deploy the vessel’s magical defenses against lightning while others throw themselves into rescue efforts amid the heaving ship. When the storm finally breaks, exhaustion settles in—but so does relief. Seabirds signal land is near, and Erenville moves to prepare the landing boat, explaining the reefs that crowd Tuliyollal’s coasts.</p>
      <p>At last, blue seas and clear skies return, and the distant shape of your destination rises into view—Wuk Lamat calling out with fierce certainty that, when the contest ends, it will be her who takes the throne. Stepping into High Tide Harbor, the city overwhelms with color and culture beyond anything you have seen. Landsguard challenge you as outsiders and warn against foreign interference—until Wuk Lamat speaks, naming you as allies in her bid. Apologies follow at once, patrol resumes, and she straightens with pride: first things first—welcome to Tuliyollal. Erenville, despite everything the storm tried to do, acknowledges the simple truth at the end of the voyage: you have arrived, safe and sound.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'未知なる冒険へ',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>オジカ・ツンジカはあなたを迎え、エレンヴィルから知らせが届いたと告げる。グリーナーズのギルドシップに頼み込み、トラル大陸へ渡る船の席を確保できたという。同行者へ連絡する間、あなたは大広間で待つことになり、準備が「計画」から「旅立ち」へと静かに切り替わっていくのを感じる。</p>
      <p>ほどなく一行が揃い、エレンヴィル自身が現れて詳細を確かめる。トラル行きの船には研究者や職人など他の乗客もいるため、甲板は共有になる。それでも問題はないと皆が受け止める中、彼は出航前に気掛かりがあるなら今のうちに口にしてほしいと言い、ウクラマトは改めて目的の確認を求める。</p>
      <p>アルフィノは迷いなく答える。トライヨラは次代の統治者を決める「継承の儀」のさなかにあり、あなたたちはウクラマトの盟友として儀に臨み、彼女がドーンサーヴァントとなるための挑戦を支える。続いてアリゼーは、復興を進めるガレマールが周辺諸国との和解と再交流を模索する中で、トラルの多様な文化がいかに共通点を見いだし、結びつきを強めているのか学びたいのだと語る――それはイルサバードの友に資するかもしれないが、継承の儀への助力を疎かにはしない、と。</p>
      <p>ウクラマトはクルルへ話を向け、クルルは自分の理由を明かす。見つけた古い書簡から、祖父がウクラマトの父であるドーンサーヴァントの命により「黄金郷」を調査していたらしいが、記録には調査の痕跡がなく、書簡に添えられていた耳飾りの由来も不明のままだ。公的にも私的にも、この謎の真相を突き止めたい――そう語るクルルに、ウクラマトは父に直接問いただす機会があるはずだと請け合う。</p>
      <p>エレンヴィルは黄金郷を子どもの寝物語だと言い、案内役として同行するのはサードプロミスの命によるものだと割り切る。ウクラマトはあなたに決意を問うが、あなたが旅立ちを選ぶ言葉を返すと、彼女は勢いよく頷く――浅瀬で立ち止まってはいられない。全員が旅を続ける覚悟なら、エレンヴィルは出航の支度をしようと言う。</p>
      <p>港へ向かう道すがら、昂ぶりはすぐに現実に引き戻される。エレンヴィルは、地図の上では近く見えても海は危険に満ち、「シェーズ・トライアングル」の海域だけでも無数の船が失われたと警告する。提督メルウィブ・ブルーフィスウィンが定めた「安全」な航路に従うとしても、遊覧航海ではない。それでも号令が響き、あなたは必要なものを確かめ、船は西へと離岸する――「新世界」トラル大陸へ。</p>
      <p>果てのない外洋が続く中、クルルは同船者からトライヨラや継承の儀について聞き取ったことを語り、あなたにも話をしてみるよう勧める。氏族名で呼ぶ習わしや、ケテンラムの偉業と消息不明になった最期の航海、海を越えれば礼儀も常識も変わるという忠告が交わされるうち、空が荒れ、甲板は怒号と悲鳴に満ちていく。</p>
      <p>あなたたちは救助に加わり、落下した船員を引き上げ、必要な場所へ走る。あなたは船の防護装置を作動させて稲妻から守り、仲間たちは揺れる甲板で救いの手を伸ばし続ける。嵐が収まり、疲労が全身に残る一方で、安堵もまた確かな重みを持つ。海鳥が近い陸を知らせ、エレンヴィルはトライヨラ沿岸の暗礁を避けるため、上陸艇の準備を進める。</p>
      <p>やがて青い海と澄んだ空が戻り、目的地の姿が視界に浮かぶと、ウクラマトは継承の儀の先に自分が王座へ就くのだと高らかに宣言する。ハイタイド・ハーバーに降り立つと、多様な部族と色彩に満ちた都の気配が一気に押し寄せる。警備兵は外来者であるあなたたちに、継承の儀への外部干渉は許さないと警告するが、ウクラマトが盟友だと明言すると態度は一転し、謝罪して巡回に戻っていく。ウクラマトは誇らしげに胸を張り、まずは歓迎の言葉を告げる。エレンヴィルもまた、嵐の妨げにもかかわらず――あなたたちは無事に到着したのだと静かに認める。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> オジカ・ツンジカ　<small class="muted">オールド・シャーレアン (X:9.2, Y:11.2)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-coming-dawn.html">明日への一歩</a></div>
      <div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 90</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="the-nation-of-tuliyollal.html">トライヨラ連王国</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'前往未知的冒險',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Ojika Tsunjika 迎接你回來，帶來確切的好消息：Erenville 已經替你們爭取到搭乘 Gleaners 的公會船，前往 Tural 的船位。Ojika Tsunjika 先去通知你的旅伴，要你在大廳稍候片刻；你留在原地，感覺一切準備終於從「計畫」轉成了「出發」。</p>
      <p>不久後眾人到齊，Erenville 親自現身確認安排：這艘船除了你們，還會載著研究者與工匠等乘客，所以甲板空間需要共享。Erenville 提醒，既然還沒起航，若有任何掛念或疑慮，現在就是開口的時候；Wuk Lamat 也要大家再次確認，你們前往 Tuliyollal 的目的究竟是什麼。</p>
      <p>Alphinaud 直接說明：Tuliyollal 正在進行挑選下一任統治者的繼承儀式。你們既然是 Wuk Lamat 選定的盟友，就會在儀式中協助她，支持她爭取成為 Dawnservant。接著 Alisaie 補充她與 Alphinaud 的另一個目標：重建中的 Garlemald 正嘗試與鄰國修復關係、重新往來，他們希望藉由造訪 Tural，了解多元文化如何互動、如何找到共通點並建立更緊密的連結——這些經驗也許能幫上 Ilsabard 的朋友；但他們會在不影響你們的前提下進行，並且不會怠慢這場競逐。</p>
      <p>Wuk Lamat 隨即轉向 Krile，Krile 也坦白自己的理由。她從一封舊信裡推得，自己的祖父曾奉 Wuk Lamat 的父親——Dawnservant——之命，調查 golden city（黃金城）；然而檔案中竟找不到任何調查紀錄，也沒有任何線索能解釋那封信附上的耳環。於是無論是公務還是私情，她都想把這個謎追到底。Wuk Lamat 則說，之後一定有機會見到 Papa，屆時就能直接問到答案。</p>
      <p>Erenville 仍把 黃金城 當作孩子的睡前故事，並表示自己之所以加入遠行，只是因為 第三誓約繼承人 命令他擔任嚮導。Wuk Lamat 反過來催你表態，你以出發的語氣回應，她立刻豪爽地接受：再繼續停在淺灘裡自我消磨，只會原地踏步。既然大家仍願意走下去，Erenville 便下結論——那就準備啟程。</p>
      <p>前往港口的路上，興奮很快被現實壓住。Erenville 警告你：地圖上看似不遠的航線，其實隔著凶險的大海，光是 Shades’ Triangle（死亡三角區） 的惡名就足以吞沒無數船隻；即使沿著 Admiral Bloefhiswyn 規劃的「安全航線」前進，也絕不可能是一趟悠閒的海上之旅。但登船號令終究響起，你確認行囊齊備，船身離岸，向西航行——朝著被稱作「新大陸」的 Tural 前進。</p>
      <p>漫長的航程裡只有無盡海面，Krile 說她已從曾經往返 Tuliyollal 的乘客口中打聽到一些繼承儀式的情報，也建議你親自去聊聊，因為你肯定有自己的疑問。你聽見了許多提醒：有些地方會以氏族名取代種族稱呼；跨海而來的禮節與習俗並不相同，別急著用熟悉的方式替人下定義；還有關於 Ketenramm 那次歷史性的遠航，以及他最後一次航行就此失蹤的傳聞。</p>
      <p>隨後天候驟變，風聲與喊叫淹沒甲板；有人跌落、有人受困，你和同伴立刻投入救援——你啟動船上的魔法防護，抵禦雷光與暴風的撕扯，其他人則在搖晃與浪濤中把落難者拉回來。當暴風終於退去，你們幾乎耗盡力氣，卻也撐住了這場考驗；疲憊壓上肩頭的同時，活下來的踏實感也同樣清晰。</p>
      <p>清晨海面回復平靜，海鳥出現，Erenville 判斷陸地已近，並解釋 Tuliyollal 沿岸暗礁密布，船得在離岸處下錨，再以小艇靠岸。等到天空放晴、視野拉開，遠方終於浮現目的地的輪廓；Wuk Lamat 望著前方，以毫不退縮的語氣宣告：等競逐結束，坐上王座的會是她。踏上 High Tide Harbor 的那一刻，城市的色彩與多元族群迎面而來；守衛對外來者保持警戒，警告你們不可介入繼承儀式的紛爭，直到 Wuk Lamat 出面作保，明言你們是她的盟友，對方才立刻致歉並繼續巡邏。Wuk Lamat 挺起胸膛，先把歡迎說出口：你們來到 Tuliyollal 了——而 Erenville 也在一旁淡淡承認，儘管暴風曾想把你們逼退，你們終究還是安全抵達。</p>
    </div>

    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-coming-dawn.html">邁向明日的一步</a></div>
      <div class="row">任一戰鬥／魔法職（不含限制職業）Lv.90</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="the-nation-of-tuliyollal.html">圖萊尤拉聯合王國</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
