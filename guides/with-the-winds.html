<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`With the Winds`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>With each passing day, more Alexandrians recover the memories of those they lost—and with them, the leverage Calyx once used. Alphinaud says that truth has led him and Alisaie to a decision: they will soon leave Tural, warn the wider world about Alexandria, and then return to Garlemald, where what they’ve learned here can aid the restoration efforts still underway.</p><p>Yet Alphinaud admits one urgent concern remains. Calyx’s ritual was anchored to a “concept” he devised, and that kind of technique all but guarantees Ascian involvement—though how far that influence reaches into the Ninth is still unknown. Y’shtola, having done what she can for the enthralled and those suffering from levin sickness, turns fully to investigation. Alphinaud entrusts the matter to her, asking only that she send word if she uncovers anything.</p><p>Before any of you can settle into the next steps, a linkpearl message comes through: Erenville is headed to the harbor, trying to leave without fuss. Your reply barely lands before the commotion starts—Wuk Lamat has caught him attempting to slip aboard his ship “with nary a hug good-bye.” Krile groans, Alphinaud immediately proposes traveling the same way, and Alisaie protests she hasn’t finished packing—only for her brother to point out that, for her, the essentials are always ready.</p><p>G’raha and Krile confirm they’ll remain here with Y’shtola to continue studying the key, and Sphene suggests bringing Shale along so everyone can see Erenville off properly. Back in the Backroom, you find the mood lighter but tender: Krile teases Alphinaud’s eagerness, G’raha remarks how long it feels since you last stood here together, and Sphene admits it comforts her to know some of you will stay. Shale joins readily—most of the files she’s unearthed are encrypted, and until the system finishes breaking them down, Containment Complex 10-29 isn’t going anywhere.</p><p>At High Tide Harbor, the waiting turns into easy banter: Krile needles G’raha’s “grave concern” (which is, apparently, tacos), Sphene marvels at Tuliyollal’s brightness without neon, and even Erenville—insisting he dislikes emotional partings—can’t help taking a swipe at how some people would have burst out of a crate mid-voyage.</p><p>When Alphinaud and Alisaie finally arrive, Wuk Lamat assures them she’s recovered and already buried in work. She reports Koana is traveling the nation to consult with local representatives, while Gulool Ja has thrown himself into training with the Landsguard. Standing there, Alphinaud recalls your first day in Tuliyollal and how distant the rite of succession now feels—because none of you knew what was coming: the clash with Zoraal Ja, Alexandria, and the queen you would fight for.</p><p>The farewell is honest, without ceremony. Wuk Lamat thanks you for more than she can repay, promising Tuliyollal will stand with you whenever you need an ally. Sphene echoes her gratitude—both for the kindness you showed her when she woke as a stranger in her own land, and for freeing her people from an affliction that tormented them for centuries. Erenville, for all his reluctance, admits what matters most: because of you, he was able to say good-bye—and to choose a life of travel, to see what he hasn’t seen.</p><p>As they depart, Wuk Lamat is pulled away at once by duty—sparring time—and the harbor empties back into motion. G’raha watches them go and says it plainly: they’ve taken to the winds. Krile answers just as simply—following their own paths, and their hearts, as they should. And when the bustle fades, she turns to you: now it’s your turn to decide the next step—and in what direction.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Alphinaud <small class="muted">(Solution Nine, X:11.9, Y:6.3)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-promise-of-tomorrow.html">The Promise of Tomorrow</a></div>
      <div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 100</div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="through-the-thunder.html">Through the Thunder</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'羅針盤が示す先へ',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>日を追うごとに、失った大切な人の記憶を取り戻す者が増えていく。アルフィノは、もはやカリュクスのような者が恐怖と無知につけ込む余地は小さくなるだろうと言い、アリゼーと共に決断を告げる。近いうちにトラルを発ち、まずはアレクサンドリアの存在を各国へ伝える――恒久的な平和のために不可欠な一歩だ。その後はガレマルドへ戻り、ここで得た経験を復興支援に活かすつもりだという。</p><p>ただし、差し迫った問題が残っていた。カリュクスの召喚儀式は、彼自身が創り上げた「概念」に結びついていた。そうした技術はアシエンの関与を強く示すが、第九世界に及ぶ影響の範囲はまだ掴めていない。ユ・シュトラは、魅了された者と雷病の治療に一段落をつけ、これより調査に専念すると言う。アルフィノはその手腕に任せ、何か掴んだら知らせてほしいと頼む。</p><p>次の段取りを整える間もなく、リンクパール越しにエレンヴィルの声が届く。トラルでの役目は終わり、港へ向かう――また必ず会える、それまで旅の無事を祈る、と。あなたが返事を返した途端、今度はウクラマトの声が割り込む。密航同然に乗り込もうとしていた「逃亡者」を捕まえた、と。抱擁も告げずに去ろうとする冷たい奴だが、まだ間に合う――だから港へ来い、と。</p><p>クルルは呆れつつも急ぎ、アルフィノは同じ船で向かう案を口にし、アリゼーは荷造りが終わっていないと抗議する。だが兄は、必要なものは既に揃っているはずだと軽くいなし、残りは手伝うと言って押し切る。グ・ラハ・ティアとクルルは、ユ・シュトラと共にここに残り「鍵」の研究を続けると告げ、スフェーンは見送りにシェールも誘おうと提案する。</p><p>バックルームでは、別れの前の小さな温度が漂う。クルルはアルフィノの前のめりぶりをからかい、スフェーンは誰かが残ってくれることに安堵を見せる。シェールも同行を承諾する――発掘したファイルの多くが暗号化されており、解析が進むまで「コンテインメント・コンプレックス10-29」は逃げないのだから、と。</p><p>ハイタイド・ハーバーでは、待ち時間さえ軽口に変わる。スフェーンはトゥリヨラルの明るさに目を細め、グ・ラハ・ティアはタコスの香りに心を奪われ、エレンヴィルは感傷を嫌うと言いつつも、木箱から飛び出してくるような別れ方をする者もいる、と皮肉を落とす。</p><p>やがてアルフィノとアリゼーが姿を現し、ウクラマトは忙しくも元気だと胸を張る。コーナは各地を巡って政策について意見を聞き、グルージャはランドガードの訓練に夢中だという。アルフィノは、初めてトゥリヨラルに来た日のことを思い出し、あの継承の儀が遠い昔に感じられると漏らす――父とゾラージャの間に何が起こるのかも、アレクサンドリアとその女王に関わることも、誰一人知らなかったのだと。</p><p>見送りは飾らない言葉で交わされる。ウクラマトは、返しきれないほどの恩を背負っていると告げ、それでも必要な時は必ず味方になると誓う。スフェーンもまた、異邦の目覚めから幾度も救われたこと、そして長きに渡り国を苦しめた病を癒したことへの感謝を述べる。エレンヴィルは、苦難の連続だったが後悔はないと言い、あなたのおかげで別れを告げられたこと、そして世界の隅々まで見て回る旅を選べたことを、静かに認める。</p><p>彼らが去ると、ウクラマトはすぐ次の務めへ引き戻される。グ・ラハ・ティアは「風に乗って行ったな」と呟き、クルルは「自分の道と心に従って――それでいい」と返す。そして喧騒が落ち着いた頃、クルルはあなたへ視線を向ける。次に踏み出すのはあなたたちだ――どの方向へ進むのか、その話をしたい、と。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> アルフィノ <small class="muted">(ソリューション・ナイン, X:11.9, Y:6.3)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-promise-of-tomorrow.html">明日への道標</a></div>
      <div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="through-the-thunder.html">黒雲を突き抜けて</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'隨風而行',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>每天都有更多人取回對逝去親友的記憶。Alphinaud 說，從今以後，像 Calyx 那樣的人就再也很難像以前那樣，利用恐懼與無知去操弄人心。正因如此，他與 Alisaie 做出決定：幾天內就會離開 Tural，先把 Alexandria 的情況告知其他國家——這是確保長久和平不可或缺的一步；接著他們要回到 Garlemald，把在這裡累積的經驗投入重建工作。</p><p>但 Alphinaud 也坦言，還有一個迫切問題尚未解開。Calyx 的召喚儀式與他自創的「概念」綁在一起；這種手法幾乎可以肯定 Ascians 的介入，只是他們對第九世界的影響究竟深入到什麼程度，你們仍無從判定。Y’shtola 表示自己已盡力處理受到 primal 影響的人，以及仍受雷病折磨的患者，接下來可以把全部心力放在追查上。Alphinaud 便把這件事交給她，請她一有線索就立刻通知。</p><p>就在你們還沒把後續安排講清楚時，linkpearl 傳來 Erenville 的聲音——他說自己在 Tural 的時間到了盡頭，正要去港口；總有一天會再見面，在那之前祝你旅途平安。你才剛回覆，Wuk Lamat 的聲音就直接插進來：她把「逃犯」扣下了。那傢伙明明答應會在啟航前告訴你們，結果卻想趁人不注意溜上船，連抱一下道別都沒有。Krile 一句「那孩子……」聽得出來又氣又無奈；Alphinaud 乾脆提議同船同行，長途航行有好同伴總是好事。Alisaie 當場抗議自己還沒收拾完，Alphinaud 卻淡定回她一句：以她的個性，重要的東西早就準備好了——剩下的他會幫忙收。</p><p>G’raha Tia 與 Krile 也說明，他們會與 Y’shtola 留在這裡，繼續研究 key；Sphene 則提議把 Shale 也叫來，一起去港口好好送別。回到 Backroom，你們短暫聚在一起時，氣氛反而帶著一點柔軟：Krile 打趣 Alphinaud 一如既往地衝太快，Sphene 也坦承至少有人留下，讓她安心不少。Shale 則爽快答應同行——她手上的檔案大多被加密，得等系統解密完才有下一步；而且 Containment Complex 10-29 又不會自己跑掉。</p><p>到了 High Tide Harbor，等人的時間被你們各自的碎念填滿。Krile 拿 G’raha Tia 開玩笑，說他看起來在思考「大事」，結果他其實在想回程要買什麼口味的 tacos。Sphene 看著 Tuliyollal，說這裡用的是有花紋的布幔，而不是霓虹，但整座城依舊亮得讓人心情舒展。就連 Erenville 都忍不住吐槽：至少 Alphinaud 與 Alisaie 還算有良心，用 linkpearl 先告知；不像某些你們認識的人，可能會在航程中途突然從箱子裡跳出來。</p><p>等 Alphinaud 與 Alisaie 抵達後，Wuk Lamat 先回報自己狀況很好，也忙得不可開交。她說 Koana 正在巡視國土、與各地代表交流政策意見；Gulool Ja 也真的迷上訓練，待在 Landsguard 的時間甚至比陪她還多。Alphinaud 站在港口，忍不住想起你們初到 Tuliyollal 的那一天——那場繼承儀式彷彿已是很久以前的事，因為當時誰也不知道後面會接連面對 Zoraal Ja、Alexandria，以及那位與你們並肩、也被你們拯救的女王。</p><p>這次道別沒有鋪陳，全是把話說到心底。Wuk Lamat 直說你們替她做了太多，Tuliyollal 欠你們的永遠還不完，但只要你需要同盟，他們一定會站在你這邊。Sphene 也跟著致謝——不只感謝你在她醒來時給了她溫柔與尊重，也代表 Alexandria 感謝你們終結了折磨他們數百年的病痛。Erenville 則終於放下那句「我不喜歡感傷離別」，承認自從把你介紹給 Wuk Lamat 之後，你就沒少吃苦，很多還真是她害的；但他沒有後悔，只有感激——因為有你在，他才能好好說再見，也才能把「走遍世界每個角落」當成自己真正的誓言。</p><p>送別結束後，Wuk Lamat 立刻又被工作拉走——Landsguard 找她去 sparring。港口很快恢復原本的喧鬧。G’raha Tia 看著船影遠去，說他們就這樣乘風而行；Krile 則回了一句更安靜也更堅定的話：去走他們自己的路、追他們自己的心——本來就該如此。等人群散開，她轉向你：接下來輪到你們往前一步了，問題只是——要往哪個方向走。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 阿爾菲諾 <small class="muted">(Solution Nine, X:11.9, Y:6.3)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-promise-of-tomorrow.html">明日的誓約</a></div>

    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="through-the-thunder.html">衝破黑雲與雷鳴</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
