<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flow Together | BELAUG · FFXIV Library</title>
  <meta name="description" content="FFXIV BGM — Flow Together：Theme、Appears in、Acquisition、Additional Notes、Lyrics，附影片。">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:14px 16px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}

    .kv{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:18px;
      flex-wrap:wrap;
    }
    .kv-label{
      font-weight:800;
      color:var(--fg);
      white-space:nowrap;
      min-width:140px;
    }
    .kv-link{
      font-weight:800;
      color:#0b60d8;
      text-decoration:none;
      line-height:1.2;
    }
    .kv-link:hover{ text-decoration:underline; }

    @media (max-width:520px){
      .kv-label{min-width:110px}
      .stack .row{padding:12px 14px}
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left"><a class="home" href="../index.html">🏠 Home</a></div>
      <div class="right"><button id="langToggle" class="icon-btn" aria-label="切換語言">🌐 EN</button></div>
    </nav>
  </header>

  <main class="container main">
    <div class="grid">
      <!-- Left: Video -->
      <section class="card video-card">
        <div class="bd">
          <div class="video-wrap">
            <iframe id="ytFrame" src="https://www.youtube.com/embed/jaqtiR22Tho" title="Flow Together" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <!-- Right: Title + Tabs -->
      <section class="card">
        <div class="hd" id="pageTitle">Flow Together</div>
        <div class="tabs" role="tablist">
          <button class="tab-btn" role="tab" aria-selected="true"  data-tab="theme">Theme</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="appears">Appears in</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="acq">Acquisition</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="notes">Additional Notes</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="lyrics">Lyrics</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="comments">Comments</button>
        </div>
        <div class="bd">
          <div id="panel-theme"   class="tab-panel active"></div>
          <div id="panel-appears" class="tab-panel"></div>
          <div id="panel-acq"     class="tab-panel"></div>
          <div id="panel-notes"   class="tab-panel"></div>
          <div id="panel-lyrics"  class="tab-panel"></div>
          <div id="panel-comments" class="tab-panel">
            <div id="giscus_container" style="min-height:320px;"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const LANG_KEY='ffxiv-guide-lang';
    const questLinkHref = "goodbye.html";

    /* =========================================================
       LYRICS (shared across EN/JP/ZH)
       Paste FULL lyrics below. This will be identical for all
       languages, so the Lyrics tab stays synced when you toggle
       EN/JP/ZH.
       ========================================================= */
    const LYRICS_SHARED = `
      <div class="stack">
        <div class="row">
          <div style="white-space:pre-wrap; line-height:1.7;">
[Verse 1]
Well come and well met, my brave little spark
How long you've wandered, burned bright as a star
Oh, I have awaited you patiently all this time
Past every fate - now sing with me once more, share of your life
Far greater than memory, its loss and love words cannot hold
Boundless, the tale overflows and carries your light out to sea

[Verse 2]
Remember the rain, near and far beloved
Each drop a blessing from heavens above
And how, as time flowed on, those waters became one
Streams, rivers and lakes, reaching for the horizon and far beyond
They carry onward, however changed with each brief reflection
By setting sun, by storm's wake, til welcomed home to gentle sea

[Pre-Chorus]
Sinking deeper and deeper in calm embrace
Loving tide, sweep in and bear you down
Should you meet a soul rising surface-ways
With your unbeating heart, wish them well

[Chorus 1]
Deep, dark, far away, I have heard your voice, weighed your every choice
Now our hands join round the meaning you sought
I'll catch your tears, quench your fears with joy, til you near the shore
Where in time, all shall as hope be reborn, ah...

[Chorus 2]
Hush, love, close your eyes, and in sleep abide
As sun's distant light echoes down to dreams, below
Know you will wake, on winds rise again
For this journey's end is but one step forward to tomorrow
          </div>
        </div>
      </div>
    `;

    const i18n={
      EN:{
        langLabel:'EN',
        pageTitle:'Flow Together',
        tabs:{theme:'Theme',appears:'Appears in',acq:'Acquisition',notes:'Additional Notes',lyrics:'Lyrics',comments:'Comments'},
        theme:`<div class="stack"><div class="row">Endwalker Credits Theme</div></div>`,
        appears:`
          <div class="stack">
            <div class="row">
              <div class="kv">
                <span class="kv-label">Appears in</span>
                <span style="font-weight:800; color:var(--fg);">Endwalker Credits Theme</span>
              </div>
            </div>
          </div>
        `,
        acq:`<div class="stack"><div class="row">Side quest reward</div></div>`,
        notes:`<div class="stack"><div class="row">Reward for completing “<a class="link" href="${questLinkHref}">Good-bye, ε̆│̆│Δ.</a>”</div></div>`,
        lyrics:LYRICS_SHARED
      },
      JP:{
        langLabel:'JP',
        pageTitle:'Flow Together',
        tabs:{theme:'テーマ',appears:'登場先',acq:'入手方法',notes:'補足',lyrics:'歌詞',comments:'コメント'},
        theme:`<div class="stack"><div class="row">暁月のフィナーレ エンドクレジットテーマ</div></div>`,
        appears:`
          <div class="stack">
            <div class="row">
              <div class="kv">
                <span class="kv-label">登場先</span>
                <span style="font-weight:800; color:var(--fg);">暁月のフィナーレ エンドクレジットテーマ</span>
              </div>
            </div>
          </div>
        `,
        acq:`<div class="stack"><div class="row">サブクエスト報酬</div></div>`,
        notes:`<div class="stack"><div class="row">クエスト「<a class="link" href="${questLinkHref}">グッバイ・＊＊＊</a>」をコンプリートすることで入手できます。</div></div>`,
        lyrics:LYRICS_SHARED
      },
      ZH:{
        langLabel:'ZH',
        pageTitle:'眾生如歸流',
        tabs:{theme:'主題',appears:'登場於',acq:'取得方式',notes:'補充說明',lyrics:'歌詞',comments:'留言'},
        theme:`<div class="stack"><div class="row">曉月之終途片尾主題曲</div></div>`,
        appears:`
          <div class="stack">
            <div class="row">
              <div class="kv">
                <span class="kv-label">登場於</span>
                <span style="font-weight:800; color:var(--fg);">曉月之終途片尾主題曲</span>
              </div>
            </div>
          </div>
        `,
        acq:`<div class="stack"><div class="row">支線任務獎勵</div></div>`,
        notes:`<div class="stack"><div class="row">完成任務「<a class="link" href="${questLinkHref}">Good-bye, ε̆│̆│Δ</a>」後即可獲得</div></div>`,
        lyrics:LYRICS_SHARED
      }
    };

    const langToggle=document.getElementById('langToggle');
    const pageTitle=document.getElementById('pageTitle');
    const tabBtns=[...document.querySelectorAll('.tab-btn')];
    const panels={
      theme:document.getElementById('panel-theme'),
      appears:document.getElementById('panel-appears'),
      acq:document.getElementById('panel-acq'),
      notes:document.getElementById('panel-notes'),
      lyrics:document.getElementById('panel-lyrics'),
      comments:document.getElementById('panel-comments')
    };

    function getLang(){ return localStorage.getItem(LANG_KEY)||'EN'; }

    function applyLang(lang){
      const t=i18n[lang]||i18n.EN;
      pageTitle.textContent=t.pageTitle;
      langToggle.textContent=`🌐 ${t.langLabel}`;
      tabBtns.forEach(b=>{ b.textContent=t.tabs[b.dataset.tab]; });
      const active=tabBtns.find(b=>b.getAttribute('aria-selected')==='true')||tabBtns[0];
      renderPanel(active.dataset.tab,lang);
      if (active && active.dataset.tab==='comments') loadGiscusForCurrentLang();
    }

    function renderPanel(key,lang){
      const t=i18n[lang]||i18n.EN;
      Object.keys(panels).forEach(k=>panels[k].classList.remove('active'));
      panels[key].classList.add('active');
      if(key!=='comments'){
        panels[key].innerHTML=t[key] || `<div class="stack"><div class="row muted">No content.</div></div>`;
      }else{
        loadGiscusForCurrentLang();
      }
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click',()=>{
        tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab,getLang());
      });
    });

    langToggle.addEventListener('click',()=>{
      const cur=getLang();
      const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
      localStorage.setItem(LANG_KEY,next);
      applyLang(next);
    });

    applyLang(getLang());

    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };
    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang(); // EN / JP / ZH
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }
  </script>
</body>
</html>
