    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p><span class="time">00:00</span><strong>The Black Wolf’s Ultimatum</strong></p><p>You receive grim tidings from Minfilia: news of the Ultima Weapon has already reached the Alliance leaders—not as a rumor, but as an ultimatum from the Black Wolf, Gaius van Baelsar. Even now, they are gathered to deliberate their response, and she fears they may choose surrender in the desperate hope of sparing their people more suffering. You cannot allow them to decide in ignorance of what the Empire’s “offer” truly means, and so you hurry to stop them before Eorzea’s future is traded away.</p><p>At the palace doors, Bartholomew initially bars the way—until you declare you come on behalf of the Scions of the Seventh Dawn, whereupon he hastily grants you entry. Inside, the leaders’ voices are heavy with exhaustion: they have rebuilt for five years since the Calamity, fought primals at great cost only to see them rise again, and now face a weapon that claims to crush primals with ease. They speak of liberty and responsibility, yet the weight of refugees, internal strife, and dwindling hope keeps dragging them back to the same bleak question: can they truly afford to resist?</p><p>Then Alphinaud’s voice cuts through the chamber, and you stand with Minfilia and Cid before the council. Minfilia warns them plainly that accepting the Garleans’ promise to “vanquish the primals” is folly—because force will only deepen the beast tribes’ desperation, and desperation is what calls primals into the world. Alphinaud insists the only true answer is lasting peace, not conquest, and reminds the leaders of the resolve they showed five years ago when they wagered everything for the realm. You watch doubt begin to crack, and with it, the possibility of unity returns.</p><p>Stirred—and shamed—Kan-E-Senna admits that hopelessness had stolen her insight, and declares that Gridania will go to war to protect what it holds dear. Nanamo and the others answer her with laughter that is half relief, half defiance, and one by one they reaffirm their will: Ul’dah will risk all it has left, Limsa Lominsa will meet the Empire head-on, and the Alliance will stand as one. Military plans begin at once, and you are told to return to the Waking Sands and await their word, with the certainty that surrender has been banished—at least for now.</p><p>Back at the Waking Sands, the mood shifts from public resolve to private reckoning. Wedge frets in silence over whether his beloved magitek armor has “noticed” him at all, while Cid speaks of years spent pursuing magitek without facing the harm it could bring—and fears the new weapon may be an ancient relic strengthened by technologies born from his own work. Tataru thanks you for honoring the dead, Alphinaud worries over the coordination a counteroffensive will demand, Papalymo grumbles about Yda’s recklessness, and Y’shtola forces everyone’s attention forward: the worst is yet to come—especially where Thancred is concerned.</p><p>Minfilia then lays out what they are truly fighting: the Ascians, immortal beings without physical form who sow chaos from the shadows. To act unseen, they bind and possess mortal men through malign artifacts known as Crystals of Darkness. The key to freeing Thancred, she believes, may be a Crystal of Darkness hidden somewhere on his person—something that can be destroyed to force the Ascian to relinquish control. Y’shtola shows you a replica made from data gathered from anomalous crystals found across Eorzea, and Minfilia explains it came from their distant allies, the Students of Baldesion. Thancred’s gifts were exceptional—even among the Archons—but he pushed himself too hard, and that strain left him vulnerable to Ascian influence.</p><p>She asks you to lend your strength once more, and thanks you from the bottom of her heart. Then she speaks of the Warriors of Light who saved the realm five years ago—and how your deeds have led people to draw comparisons, as though a touch of the Echo might reside in everyone. Yet she reminds you that heroes are judged by the present, not the past: a new darkness threatens Eorzea, and the people cry out for a savior. Minfilia believes you are that Warrior of Light, guided by the Crystal’s will—and before you face what comes next, she urges you to ensure you have a chocobo of your own, for no one should be sent into a battle of this scale without a mount.</p><p><span class="time">16:40</span><strong>Operation Archon</strong></p><p>With everyone assembled, Minfilia calls the meeting to order, and Alphinaud begins by laying out the scope of what lies ahead. The Alliance is preparing the largest counteroffensive in the realm’s troubled history: a coordinated strike against every imperial stronghold on Eorzean soil. You are told you do not need to memorize every detail—only to understand your role, follow instructions at each staging point, and perform it to the best of your ability.</p><p>They review how the Grand Companies will be deployed from west to east—the Maelstrom, the Immortal Flames, and the Order of the Twin Adder—and then identify the imperial targets: Castrum Occidens and Castrum Marinum near Limsa Lominsa, Castrum Meridianum and the outpost at Cape Westwind near Ul’dah, Castrum Oriens near Gridania, and Castrum Centri in Mor Dhona, a thorn in the heart of Eorzea. The ultimate objective is clear: destroy the Empire’s new weapon within Castrum Meridianum, but to breach the Black Wolf’s seat of power, they must first isolate it from the other strongholds.</p><p>The plan is divided into four phases. In the first, you are ordered to lead an elite adventurer unit to Cape Westwind and eliminate the Black Wolf’s trusted lieutenant, Rhitahtyn sas Arvina, whose inspection is imminent. You are told his death will cripple the garrison at Castrum Occidens, and when scouts confirm he has arrived, the assault begins with diversionary maneuvers to scatter the enemy. Rhitahtyn recognizes you as the one who felled Titan, sees through the operation’s intent, and still declares faith in Gaius’s ambition—insisting the Black Wolf seeks to end suffering and free the realm from false faith, eikons, and weak leaders. He claims the Empire rewards worth over birth, and that he owes his station and purpose to his lord—yet if you will not heed reason, he will meet you in battle.</p><p>You fight through his defenses and the support of his men, and when he can no longer stand, he refuses to yield, clinging to honor even as the end closes in. With Rhitahtyn defeated, Alphinaud’s voice reaches you: this deed plants the seeds of ultimate victory, and the next phase of Operation Archon begins at once. Cid offers quick praise over the linkpearl, but pushes you onward—there is no time to linger, and you must return to the Immortal Flames’ encampment to receive your next orders as the main host presses forward.</p><p>Elsewhere, Lahabrea speaks with cold certainty, mocking Hydaelyn as your coming “brings the Light,” and proclaiming that the gate to the void stands open and Darkness will consume all. In the imperial camp, word reaches Gaius van Baelsar that his praefectus has been slain—by the eikon-slayer. Livia’s grief is plain, and Gaius’s fury follows: he questions where Rhitahtyn’s men were, then receives further reports that the Maelstrom has besieged Castrum Occidens and the Crimson Fleet moves to blockade Castrum Marinum. Gaius accepts this as the Alliance’s answer, commands his tribuni to crush them as they crushed the eikons, and the war tightens its grip.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Minfilia <small class="muted">(Ul’dah - Steps of Nald, X:10.3, Y:11.2)</small></div></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'エオルゼアの明日のために',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p><span class="time">00:00</span><strong>エオルゼアの明日のために</strong></p><p>ミンフィリアは、あなたに重い知らせを告げる。アルテマウェポンの存在はすでに同盟の指導者たちに届いており、それは噂ではなく、「黒狼」ガイウス・ヴァン・バエサルの最後通牒という形だった。指導者たちは今まさに返答を協議しており、民の苦しみを少しでも減らすために降伏を選びかねない。だがそれは無知ゆえの選択であり、放置すればエオルゼアの未来そのものが売り渡される――そうしてあなたは急いで彼らのもとへ向かう。</p><p>王宮の扉ではバルトロメウに制止されるが、あなたが「暁の血盟」の使いだと名乗ると、彼は態度を一変させて中へ通す。指導者たちの言葉は疲れ切っていた。カルテノーから五年、ようやく暮らしを立て直し始めた民に、再び戦を強いるべきか。蛮神は倒してもまた現れ、犠牲は積み重なるばかり。もし帝国の新兵器が語られるとおりの力を持つなら、抗う意味はあるのか――彼らは自由を愛しながらも、現実の重みの前で同じ問いに引き戻されていく。</p><p>そこへアルフィノの声が割って入り、あなたはミンフィリア、シドとともに評議の場へ進み出る。ミンフィリアは断言する。帝国が提案する「蛮神討滅」を受け入れるのは愚行だ、と。力で押さえつければ獣人たちは追い詰められ、追い詰められた者ほど上位の力にすがり、蛮神を呼び出す。アルフィノは、真の答えは永続する平和であり、征服ではないと訴え、五年前に命を賭して国を守ろうとした覚悟を思い出せと迫る。あなたは、迷いの奥で再び火が灯り始めるのを見守る。</p><p>カヌ・エ・センナは、絶望が自分の目を曇らせていたと認め、そして決意する。森の民は戦を望まないが、祖国を脅かす者を許さない――グリダニアは帝国と戦う、と。ナナモらは笑い声で応え、その笑いは安堵と挑戦の混じったものだった。ウルダハも、リムサ・ロミンサも、それぞれのやり方で立ち上がり、同盟はひとつの意志として再び結束する。軍事の準備が語られ、あなたは砂の家へ戻って続報を待つよう告げられる――降伏の影は、ひとまず払われた。</p><p>砂の家に戻ると、決意の裏側にある現実が胸に迫る。ウェッジは無言のまま、自分の魔導アーマーが救出の後で一度も振り向いてくれないのではと怯え、シドは語る。かつて魔導技術の研究に没頭し、その結果がもたらす影を見ようとしなかったことを。そして新兵器が、古代の遺物に自分の技術が重ねられたものだとしたら――その可能性に戦慄する。タタルは弔いへの感謝を述べ、アルフィノは反攻に必要な連携を案じ、パパリモはヤ・シュトラの仲間たちの戦いぶりに苦言を呈する。だがヤ・シュトラは皆を前へ向ける――本当の苦難はこれからであり、サンクレッドのことはなおさらだ、と。</p><p>ミンフィリアは、敵の正体を改めて語る。アシエンは不滅の存在で、肉体を持たず、影から混沌を煽る。そして彼らは「闇のクリスタル」と呼ばれる邪悪な呪具で人を縛り、憑依する。サンクレッドを救う鍵は、彼の身にあるはずの「闇のクリスタル」を破壊し、憑依者を退かせることかもしれない。ヤ・シュトラは、各地で発見された異常なクリスタルのデータを用いて作られた複製を示し、それは遠方の同盟者であるバルデシオン委員会からもたらされたものだという。賢人の中でもサンクレッドは稀有な才を持っていたが、責務を背負い込みすぎ、その負担がアシエンの影響を招いた――そうミンフィリアは悔やむ。</p><p>だからこそ、あなたにもう一度力を貸してほしいとミンフィリアは頼み、心から礼を言う。そして五年前、世界を救った光の戦士たちの名を挙げ、あなたの働きが人々に比較を抱かせていることを告げる。だが英雄は過去ではなく、今の行いで裁かれる。新たな闇が迫り、人々は救いを求めている――ミンフィリアは、あなたこそがこの時代の光の戦士であり、クリスタルの意志に導かれていると信じる。次の戦いに備え、まだ自分のチョコボを持たぬなら、グランドカンパニーで必ず手に入れるように、とも。大戦に送り出す者として、それを欠かすわけにはいかないのだ。</p><p><span class="time">16:40</span><strong>十二賢者の行進</strong></p><p>全員が揃うと、ミンフィリアは会議の開始を告げ、アルフィノは間近に迫った作戦の概要を説明する。今回の反攻は、混迷する歴史の中でも最大規模となる単一の総攻勢であり、同盟軍はエオルゼアの地に築かれた帝国の拠点すべてを同時に叩くという。作戦は複雑だが、細部を丸暗記する必要はない――各段階の集結地点で詳細が伝えられるので、あなたは自分の役割を理解し、全力で果たせばよいのだと告げられる。</p><p>続いて兵力配置が確認される。西から東へ、リムサ・ロミンサの黒渦団、ウルダハの不滅隊、グリダニアの双蛇党。そして帝国の拠点として、カストルム・オキデンスとカストルム・マリヌム、カストルム・メリディアヌムとケープ・ウェストウィンドの前哨地、カストルム・オリエンス、さらにモードゥナのカストルム・セントリが挙げられる。最終目標は、カストルム・メリディアヌムに収容された帝国の新兵器を破壊することだが、「黒狼」の本拠地は堅固であり、他の拠点から切り離して孤立させねば突破は難しい。</p><p>作戦は四つの段階に分かれ、第一段階であなたは精鋭冒険者部隊を率い、ケープ・ウェストウィンドで「黒狼」の腹心であるリタティン・サス・アルヴィナを討つよう命じられる。斥候が標的の到着を確認すると、陽動によって守備隊を分散させ、突入の機を作る。リタティンはあなたをタイタンを討った者として認識し、こちらの狙いも見抜いたうえで、それでもガイウスの志を語る。彼は「黒狼」は人々を苦しみから救い、虚ろな信仰に縛られた世界を正し、蛮神や弱き為政者のない平和をもたらすのだと主張する。そして出生ではなく価値で人を量るのがガイウスの正義であり、自分はその恩寵によって戦場に立つ名誉を得たのだと語り、理を聞かぬなら刃で示すと宣言する。</p><p>激戦の末、あなたは彼とその配下を退ける。追い詰められてなお、彼は誇りゆえに屈せず、最後まで退くことを拒む。討伐の報はリンクパール越しにアルフィノへ届き、これで勝利への種が蒔かれたとして「作戦開始」を告げられる。シドもまた称賛を寄せつつ、勝利に浸る暇はないと促す――次はカストルム・メリディアヌムへの潜入とアルテマウェポンの破壊が控えており、あなたは不滅隊の野営地へ戻って次の命令を受けねばならない。</p><p>その頃、ラハブレアはあなたの到来を嘲り、闇がすべてを呑み込むと高笑いする。帝国側では、リタティンが「蛮神殺し」に討たれたと報告が届き、リウィアの悲嘆が漏れる。ガイウスは怒りを露わにして配下の失態を詰り、さらに黒渦団がカストルム・オキデンスを包囲し、紅蓮団がカストルム・マリヌムを封鎖するという続報を受ける。これが同盟の返答かと受け止めたガイウスは、蛮神を砕いたときのように彼らを粉砕せよと命じ、戦いは次の段階へ移っていく。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ミンフィリア <small class="muted">（ウルダハ：ナル回廊, X:10.3, Y:11.2）</small></div></div>`,

    story:`<div class="clamp" data-collapsed="true"><p><span class="time">00:00</span><strong>為了艾歐澤亞的明天</strong></p><p>Minfilia 帶來沉重的消息：Ultima Weapon 的存在早已傳到 Alliance leaders 的耳中，而且不是流言，而是「黑狼」Gaius van Baelsar 送來的最後通牒。指導者們正在會議中權衡回應，她擔心他們會在疲憊與恐懼之下選擇投降，以為那樣就能讓人民免於更多痛苦。但那只會讓他們在不了解代價的情況下把未來交出去——你必須立刻趕去阻止，不能讓 Eorzea 在無知中走向毀滅。</p><p>你來到王宮門前，被 Bartholomew 擋下；直到你表明自己是代表 Scions of the Seventh Dawn 而來，他才連忙致歉放行。走進會議室，你聽見指導者們一遍又一遍地繞回同個問題：Calamity 過去五年，人民才剛開始把生活一點點撿回來，現在還能再承受戰火嗎？他們與 primal 長年鏖戰，付出慘痛代價，primal 卻總是一再重返；若帝國的新武器真能如宣稱般粉碎 primal，那他們的抵抗究竟還剩下多少意義？自由與責任仍在口中，可希望卻像被現實一寸寸磨光。</p><p>就在這時，Alphinaud 的聲音打破沉默，你與 Minfilia、Cid 站到眾人面前。Minfilia 直言：接受 Garleans「替你們討滅 primal」的提案是愚行。因為 primal 之所以會降臨，是人們在絕望時呼求更高的力量；帝國若以武力壓迫與征服逼迫各族，只會讓 beast tribes 更加走投無路，而走投無路就會催生更多 primal。Alphinaud 也強調，真正的解答是持久的和平，而不是戰爭與征服；他要眾人想起五年前那場賭上一切的選擇，想起你們曾為了這片土地願意付出的代價。你看見迷惘開始鬆動，像是被重新點燃的火光。</p><p>Kan-E-Senna 承認，絕望讓她一度失去判斷，甚至動了投降的念頭；但她也宣告，Gridania 或許不愛戰爭，卻更不可能容許有人威脅家園——他們將與帝國開戰。Nanamo Ul Namo 與其他人以笑聲回應，那笑聲不是輕率，而是終於把恐懼壓下去的釋放。Raubahn、Merlwyb 也相繼表態：各國將再次站成同一條線，拒絕把命運交給黑狼。會議從遲疑轉為部署，你被請回 The Waking Sands 等待後續聯絡——至少此刻，投降的陰影被趕走了。</p><p>回到 The Waking Sands，戰火之外的重量壓在每個人身上。Wedge 悄悄焦慮著：救出之後，他的魔導裝甲彷彿再也不理他，讓他懷疑自己是不是做得不夠。Cid 則說起多年來他沉迷於 magitek 的研究，卻不願正視它會帶來的後果；如今他害怕，這把新武器也許正是把古代遺物與他曾創造的技術疊加而成。Tataru 感謝你為逝者做了安葬，Alphinaud 擔心反攻需要各國完美協調，Papalymo 抱怨 Yda 在戰鬥中像散步一樣大意，Y’shtola 卻把所有人的視線拉回前方：最艱難的還在後頭——而 Thancred 的事，更是不能逃避。</p><p>Minfilia 接著把真正的威脅說得更清楚：Ascians 是不朽的存在，沒有固定的肉身，從陰影裡煽動混亂；為了能暗中行動，他們會用名為「闇之水晶」的邪惡媒介束縛並附身於人。若要救回 Thancred，關鍵可能就是找出他身上那顆「闇之水晶」，並將其摧毀，迫使附身的 Ascian 放手。Y’shtola 拿出一個複製品——它是根據 Eorzea 各地發現的異常水晶資料製作而成，而這份成果來自你們遙遠的盟友 Students of Baldesion（Scions 的遠方研究者盟友）。Thancred 即使身為 Archon（賢人)，能力也依然出眾；正因他總是把責任往自己身上扛，長期透支，才讓他更容易受到 Ascian 的影響。</p><p>因此，Minfilia 再次請求你伸出援手，並由衷地向你道謝。她提起五年前拯救世界的光之戰士，也坦白如今許多人將你的功績與他們相提並論，彷彿連迴響都可能在每個人身上留下一點痕跡。但她提醒你：英雄終究要以當下的行動被評判。新的黑暗正逼近，人民需要一位能在此刻站出來的人——她相信你就是那位被水晶意志引領的光之戰士。最後，她也務實地叮囑：若你還沒有自己的 chocobo，就盡快向 Grand Company 取得坐騎；這樣規模的戰鬥，她不能讓你在沒有夥伴的情況下上陣。</p><p><span class="time">16:40</span><strong>十二賢者進軍</strong></p><p>Minfilia 確認所有人到齊後，正式開始簡報，Alphinaud 隨即把即將展開的作戰內容說清楚：Alliance 將發動一場前所未有的大規模反攻，對所有仍立在 Eorzean 土地上的帝國據點同時出手。作戰會很複雜，但你不必把所有細節背起來；各個集結點會再給更細的指示，你只需要確實理解自己的任務，並把該做的事做到最好。</p><p>他們先檢視兵力的分配：從西到東依序是 Limsa Lominsa 的 Maelstrom、Ul’dah 的 Immortal Flames、以及 Gridania 的 Order of the Twin Adder。接著點名帝國據點的位置——靠近 Limsa Lominsa 的 Castrum Occidens 與位在 Rhotano Sea 的 Castrum Marinum；靠近 Ul’dah 的 Castrum Meridianum 與 Cape Westwind 的沿岸前哨；位在 Twelveswood 東側的 Castrum Oriens；以及 Mor Dhona 的 Castrum Centri，像一根刺一樣扎在 Eorzea 的心臟裡。最終目標是摧毀藏在 Castrum Meridianum 內的帝國新武器，但要突破黑狼（Gaius 的稱號）的本據點，就必須先把它和其他據點切開，避免腹背受敵。</p><p>整體作戰分成四個階段。第一階段，你要率領精銳冒險者小隊前往 Cape Westwind，擊殺黑狼（Gaius 的稱號）最信任的副官 Rhitahtyn sas Arvina——情報顯示他會去那裡視察。當斥候確認目標現身後，各部隊立刻以佯攻分散守軍，為你們創造突入的空隙。Rhitahtyn 一眼認出你就是擊倒 Titan 的人，也看穿這次行動的意圖，仍舊選擇替 Gaius 的野心辯護：他宣稱黑狼是為了把人民從痛苦中解放，讓世界擺脫虛假的信仰、不再被 primal 榨乾，也不再被軟弱的領袖誤導；他更說黑狼以價值衡量一個人，而非出身，自己正是因此被提拔、在戰場上獲得榮耀。可當你不願聽從他的「理性」時，他也準備用刀刃來回應。</p><p>戰鬥爆發，你擊破他的防禦，也擋下趕來支援的帝國士兵。即使被逼到極限，Rhitahtyn 仍拒絕退讓，緊咬著自己的榮譽不肯屈服。當他終於倒下，Alphinaud 透過通訊傳來消息：你完成了關鍵的一步，Operation Archon 的下一階段將立刻展開。Cid 也在通訊裡短暫讚許你，卻同樣催促你不要停下——勝利沒有時間慢慢品嚐，接下來仍得滲透 Castrum Meridianum、摧毀 Ultima Weapon，你必須回到 Immortal Flames 的營地領取下一道命令。</p><p>同一時間，Lahabrea 在暗處以冷笑迎接你的「光」，宣告虛無之門已然敞開，黑暗終將吞沒一切。帝國陣營裡，Gaius van Baelsar 得知 Rhitahtyn 被殺，而且據報是死在「擊倒 primal 的人」手中；Livia 的悲傷脫口而出，Gaius 的怒火則隨即爆開，他質問部下為何讓指揮官孤身迎戰。緊接著又有戰報傳來：Maelstrom 已經圍攻 Castrum Occidens，Crimson Fleet 也正封鎖 Castrum Marinum。Gaius 把這視為 Alliance 的正式回應，命令各級將領出擊，要像曾經粉碎 primal 那樣粉碎你們——戰火就此推進到下一個階段。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 敏菲利亞 <small class="muted">(烏爾達哈現世迴廊, X:10.3, Y:11.2)</small></div></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
