    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>A Dawn Hunt tracker in Tuliyollal stops you with an uneasy request. Carcasses have been turning up across Shaaloani one after another, and before the hunters could begin a proper investigation, an unusual mark bill arrived from an equally unusual client. The design is unlike any bill they have seen before, and the one who delivered it was stranger still. The tracker asks for your aid, admitting that after your victory over Valigarmanda, there is no one they would trust more with a quarry this dangerous. You agree, and are directed to the tavern in Hhusatahwi, where the client is said to be waiting.</p><p>There, you find not a hunter of Tural, but a small feline traveler accompanied by a birdlike creature unlike any chocobo. The self-proclaimed Felyne explains that the monster they seek is Guardian Arkveld, a beast from the Forbidden Lands. They recount how they and their comrades had been investigating its territory when a spiderlike intruder appeared without warning. A cocoon burst open, a newborn Arkveld emerged, and the two creatures clashed for dominance. At the height of the battle, the invader created a ring of light, and Arkveld vanished. In the next instant, the world turned white, and when the Felyne awoke, they found themself in Tural. Since then, they have learned that a Guardian Arkveld is ravaging the wilds nearby, and fearing what it might do to Shaaloani, they ask you to help bring it down.</p><p>You set out together across the grasslands, searching for any trace of the white beast. Along the way, the Felyne teaches you what signs to seek: white fur, pale scales, and the marks left by the chain-like tendrils Arkveld can extend from its forelimbs. The first clues lead nowhere. Withered weeds belong to another local creature, and yellow hair matted with foul residue points to prey and predator unrelated to your mark. Yet the search reveals just as much through what it rules out, and the Felyne presses on without losing focus.</p><p>At last, you find what you need. Deep scars score the ground, and armor-like scales lie strewn across the earth. The Felyne recognizes them immediately as Arkveld’s. The beast had come frighteningly close to a settlement before turning away, and that alone is enough to harden your resolve. To pursue it properly, the Felyne calls upon their resting companion, a Seikret. After taking in the scent from the samples you gathered, the Seikret fixes onto Arkveld’s trail. The Felyne hands you a linkpearl so you can remain in contact, then sends you ahead on the Seikret’s back while they make preparations for the hunt.</p><p>As you ride after the scent, the Felyne speaks to you over the linkpearl. They explain that Guardians are said to awaken when they sense a powerful presence, and begin to suspect that Arkveld turned back from the settlement because something stronger drew it elsewhere. Soon you come upon the corpse of another monster, its body untouched by bite marks. From this, the Felyne concludes that Arkveld did not kill for food. Guardians, they explain, have no need to feed on prey, and Arkveld now seems fixated instead on the energies in this land, lashing out at anything it perceives as a threat. When another clash erupts ahead, the Felyne urges you to use a foul-smelling dung pod from the Seikret’s pack. You throw it, forcing Arkveld’s opponent to withdraw, and Arkveld itself retreats soon after, as if deciding to return to its den and recover.</p><p>You regroup with the Felyne on the plain. While you tracked Arkveld, they prepared a camping kit, and together you establish a camp near the monster’s lair. Before the final confrontation, the Felyne insists that no proper hunt begins on an empty stomach. You share a simple meal of grilled meat, and afterward they place mega potions in your hands, a special blend improved with fresh honey. With your strength restored and your preparations complete, the Felyne formally asks you to hunt Guardian Arkveld and protect the life of these plains. You accept, enter the Windward Wilds, and bring the white monster’s rampage to an end.</p><p>When the battle is over, the Felyne greets your victory with delight and relief. Yet with Arkveld defeated, their own path remains uncertain. Even so, they refuse despair. Rather than rush home, they decide to travel across Tural, see its lands, meet its people, and learn more about its monsters and resources while seeking a way back to the Forbidden Lands. Together, you return to Tuliyollal to report the hunt’s success. The tracker praises your work and notes that life may finally return to normal for the fauna of Shaaloani, while a smith shows interest in the scales carved from Arkveld’s hide. As the time comes to part, the Felyne notices that the Seikret has grown fond of you and suggests that it accompany you on your adventures. With cheerful gratitude and a promise that your paths may cross again, the Felyne sets off toward a new journey of their own.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>トライヨラで討伐依頼を扱う者が、あなたに不穏な話を持ちかける。シャーローニでは獣の死骸が次々に見つかっており、調査を始めようとした矢先、見慣れない手配書が届いたという。その意匠はこの土地のものとは思えず、依頼主もまた異郷から来たような、奇妙な風体の人物だった。ヴァリガルマンダを討ち果たしたあなたなら、この危険な獲物にも対処できるはずだと見込まれ、あなたは依頼を引き受ける。そして依頼主が待っているというフサタイハの酒場へ向かうことになる。</p><p>そこであなたを待っていたのは、トラルの狩人ではなく、小柄な旅のアイルーと、チョコボにも似た見知らぬ鳥のような相棒だった。旅のアイルーは、討伐対象の名を護竜アルシュベルドだと告げる。それは禁足地に棲む魔物であり、自分たちはその縄張りを調査している最中だったという。そこへ蜘蛛のような異形が突如現れ、近くの繭が破れて、生まれたばかりのアルシュベルドが姿を現した。ふたつの存在は激しくぶつかり合い、戦いが頂点に達したとき、侵入者は光る輪を生み出し、アルシュベルドは跡形もなく消えた。次の瞬間、目の前は一面の白に包まれ、気がつけば自分はトラルへ飛ばされていたのだという。以来、この地で護竜アルシュベルドが野生を荒らしていると知った旅のアイルーは、シャーローニに破滅が及ぶ前に仕留めたいと考え、あなたに力を求める。</p><p>こうしてあなたは旅のアイルーとともに草原へ出て、白き獣の痕跡を追い始める。旅のアイルーは、狙うべき手掛かりをひとつずつ教えてくれる。白い体毛、淡い鱗、そして前脚から伸び縮みする鎖のような触腕が残す痕。だが最初に見つかるものはどれも本命ではない。枯れた雑草は別の土地の獣が身を隠すために使うものであり、悪臭を帯びた黄色い毛も護竜アルシュベルドとは結びつかない。それでも、違うものを違うと見極めていく積み重ねが、獲物へ近づくための確かな一歩になっていく。</p><p>やがて、ついに決定的な痕跡が現れる。地面には巨大なものが引きずられたような深い傷が走り、その周囲には鎧のような鱗が散っていた。旅のアイルーは、それが護竜アルシュベルドのものだと確信する。集落のすぐ近くまで来ていたと知り、このまま放ってはおけないと、あなたも改めて思い定める。そこで旅のアイルーは、休ませていた相棒のセクレトを呼ぶ。あなたが集めた試料の匂いを覚えたセクレトは、獲物の気配をしっかり捉える。旅のアイルーは離れていても連絡が取れるようリンクパールを渡し、自分は狩りの支度を進めるから、あなたはセクレトに乗って先行してほしいと頼む。</p><p>匂いを追って進むあいだ、旅のアイルーはリンクパール越しに語りかけてくる。護竜は強大な気配を察すると目覚めると言われており、集落の手前で引き返したのも、さらに強い存在に気を引かれたからかもしれないという。やがてあなたは別の魔物の亡骸を見つけるが、その体には噛み痕がない。旅のアイルーはその様子から、護竜アルシュベルドが獲物を食らうために殺したのではないと見抜く。護竜はそもそも獲物を糧とする必要がなく、この土地の力に執着し、脅威と見なしたものを排しているのではないかというのだ。さらに前方で激しい争いが起きると、旅のアイルーはセクレトの荷から悪臭を放つこやし玉を取り出すよう指示する。あなたがそれを投げ込むと、アルシュベルドとぶつかっていた相手は退き、アルシュベルドもまた、あなたを新たな脅威として測るように見たのち、自らの巣へ戻るように去っていく。</p><p>平原で合流した旅のアイルーは、あなたが追跡しているあいだにキャンプ道具を整えていた。あなたたちは魔物の巣の近くに拠点を築き、決戦の支度を始める。だが旅のアイルーは、腹を空かせたままで狩りに出る者はいないと力強く言い、まずは肉を焼いて腹ごしらえをするよう勧める。食事を終えたあなたに、今度は新鮮なハチミツを加えて仕上げた特製の回復薬を託し、準備はこれで万全だと告げる。そして改めて、護竜アルシュベルドを狩り、この草原に生きる命を守ってほしいと正式に依頼する。あなたはその願いを受け止め、隔ての荒地へ踏み込み、白き魔物の暴威に終止符を打つ。</p><p>戦いを終えたあと、旅のアイルーはあなたの勝利を心から喜び、安堵する。だが護竜アルシュベルドを討ち果たしても、自分が元の世界へ帰る道はまだ見つかっていない。それでも旅のアイルーは落胆せず、せっかく広大なトラルへ辿り着いたのだから、この地を巡り、人々と言葉を交わし、魔物や資源のことを学びながら帰る手立てを探してみせると前を向く。あなたはともにトライヨラへ戻り、討伐成功を報告する。依頼を扱う者は、これでシャーローニの生き物たちも平穏を取り戻せるだろうと語り、護竜の鱗には防具や品物へ換える価値があると教える。やがて別れのとき、旅のアイルーはセクレトがすっかりあなたに懐いたことに気づき、よければこれからの旅に連れていってほしいと勧める。感謝の言葉を残し、またいつか会おうと笑って、旅のアイルーは自分自身の新たな冒険へ歩き出していく。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> モブハント組合員 <small class="muted">（トライヨラ, X:13.3, Y:13.1）</small></div></div>`,

    followq:`<div class="stack"><div class="row split-row"><b>討伐戦開放</b><a class="link" href="the-windward-wilds-extreme.html">極護竜アルシュベルド狩猟戦</a></div></div>`

    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>在 Tuliyollal，負責 Dawn Hunt 的人帶著一件不尋常的事來找你。近來 Shaaloani 接連出現動物屍體，原本獵人們正準備展開正式調查，卻先收到了一張從未見過的討伐委託單。那張委託單的樣式與這片土地慣見的格式截然不同，而送來委託的人也同樣古怪，看起來像是來自遙遠異鄉。對方認定，既然你曾經擊敗 Valigarmanda，如今也只有你最適合接下這場狩獵。於是你答應協助，前往 Hhusatahwi 的酒館，去見那位等候中的委託人。</p><p>在那裡等著你的，並不是 Tural 的獵人，而是一位身形嬌小的 Felyne，身旁還有一隻像鳥、卻又和 chocobo 不盡相同的同伴。那名自稱 Felyne 的旅者告訴你，這次要追獵的目標名為 Guardian Arkveld。牠原本棲息於 Forbidden Lands，而他與同伴們先前正是在調查那片領域時，遭遇了突如其來的異變。某個蜘蛛般的怪異存在毫無預警地現身，附近的繭隨之破裂，剛誕生不久的 Arkveld 也從中現身。雙方立刻爆發激烈衝突，爭奪支配地位。就在戰鬥逼近頂點時，那名入侵者製造出一圈發光的光環，Arkveld 也在轉瞬之間消失無蹤。緊接著，他眼前的一切全被白光吞沒，等再度清醒時，人已來到 Tural。之後他又聽聞，Guardian Arkveld 正在這片荒野中肆意破壞，唯恐牠繼續危及 Shaaloani 的生態，這才決定尋找獵人將牠討伐，而如今，他把這份請求交到你手上。</p><p>於是你與這位 Felyne 一同踏上草原，開始尋找那頭白色猛獸留下的痕跡。他一路提醒你，該注意的線索有哪些：白色的毛皮、淡色的鱗片，還有從前肢伸縮自如、如鎖鏈般的觸腕所留下的痕跡。只是最初找到的東西都不是你們要追尋的目標。枯萎的雜草屬於另一種會利用植物偽裝自身的本地生物；帶著刺鼻黏液的黃色毛髮，也顯然和 Guardian Arkveld 毫無關聯。但正因為一次次排除錯誤的痕跡，你們才得以一步步更接近真正的獵物。</p><p>終於，決定性的證據出現了。地面上留下巨大物體被拖行過的深刻痕跡，四周還散落著如甲殼般堅硬的鱗片。Felyne 一眼便認出，那正是 Guardian Arkveld 所留下的痕跡。想到牠竟然已經逼近聚落到這種程度，你也明白，若再放任下去，只會讓更多生命遭殃。為了真正追上牠，Felyne 叫來了正在休息的夥伴 Seikret。當 Seikret 嗅過你收集到的樣本後，很快便記住了 Arkveld 的氣味，準備帶你一路追蹤下去。Felyne 也把一個 linkpearl 交給你，讓你們即使分頭行動也能保持聯絡，接著要你先騎上 Seikret 出發，他則留在後方準備接下來的狩獵。</p><p>沿著氣味前進時，Felyne 的聲音透過 linkpearl 傳來。他告訴你，據說 Guardians 會在感應到強大存在時甦醒，而 Arkveld 在逼近聚落後又突然折返，或許正是因為有某個更強大的目標吸引了牠的注意。沒過多久，你便發現另一頭魔物的屍體，但那具屍體上看不見任何咬痕。Felyne 因此判斷，Arkveld 並不是為了覓食才殺死對方。Guardian 與一般魔物不同，並不需要靠吞食獵物維生，如今的 Arkveld 更像是被這片土地中的某種能量吸引，凡是阻擋在牠前方的存在，都會被視為威脅而遭到排除。隨後，前方再度爆發劇烈衝突，Felyne 要你從 Seikret 的袋子裡拿出一枚臭氣熏天的 dung pod。你依言將其投出，與 Arkveld 交戰的另一頭魔物很快便被逼退，而 Arkveld 也像是在衡量你的存在之後，選擇轉身返回自己的巢穴休養。</p><p>你們在平原上重新會合時，Felyne 已經趁你追蹤 Arkveld 的期間備妥了露營用具。你們便在怪物巢穴附近設下營地，開始為最後的決戰做準備。然而在真正動身之前，他堅持獵人絕不能空著肚子上陣，於是先拉著你一起烤肉進食。等你填飽肚子，他又把特製的 mega potions 交到你手中，那是以 Hunters’ Guild 發放的藥劑為基底，再混入他親手採集的新鮮蜂蜜調製而成。有了食物與藥劑，你的狀態終於準備周全。直到這時，他才正式向你提出請託，希望你親手獵殺 Guardian Arkveld，守住這片草原上的生命。你答應了這份請求，踏入 Windward Wilds，並最終終結了那頭白色猛獸的暴走。</p><p>戰鬥結束後，Felyne 因你的勝利而露出毫不掩飾的喜悅，也終於放下心來。只是 Arkveld 雖已伏誅，他自己仍然沒有找到返回原本世界的方法。即便如此，他並不打算因此消沉。難得被帶到這片遼闊的 Tural 大陸，他反而想趁這個機會四處看看、與當地人交談，也深入了解這裡的魔物與資源，邊旅行邊尋找回到 Forbidden Lands 的方法。之後，你陪他一同回到 Tuliyollal，向 Dawn Hunt 的人回報這場狩獵已經成功。對方稱讚你完成了任務，也表示 Shaaloani 的生態總算有望恢復平靜，而從 Arkveld 身上剝取下來的鱗片，或許也能交給 smithy 打造成裝備，或換成別的有用之物。到了分別的時候，Felyne 發現 Seikret 已經明顯對你產生了親近之意，便乾脆提議讓牠跟著你一同展開往後的旅程。懷著感激與不捨，他向你道別，說總有一天還會再見，隨後便朝著屬於自己的新冒險啟程。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 怪物狩獵協會成員 <small class="muted">(圖里約拉, X:13.3, Y:13.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="dawntrail.html">黃金的遺產</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.100</div></div>`,
    followq:`<div class="stack"><div class="row split-row"><b>解鎖試煉</b><a class="link" href="the-windward-wilds-extreme.html">極護龍阿修貝爾德之戰</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
