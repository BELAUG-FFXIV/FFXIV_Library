const i18n={
  EN:{

    readMore:'Show more',readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You are approached by a Hoobigo messenger who seems relieved to have found you so quickly. On behalf of Miilal Ja, he asks you to come to Mamook—strange happenings have been piling up there, and they hope your experience can help make sense of them. He tells you where she is waiting, in a large building west of the plaza.</p><p>When you meet Miilal Ja, she admits she hesitated to call on you, but the trouble facing Mamook cannot be overcome by their strength alone. She explains how it began: someone discovered an injured traveler who had collapsed in the Skydeep Cenote. His wounds were not life-threatening, yet he has not awakened—and in his sleep he mutters baffling words that mean nothing to them. Because his tall, slender build and pointed ears are uncommon here, she asks if you will speak with him, hoping you might recognize something in his ramblings or help restore his memory once he wakes.</p><p>Before long, the messenger returns with news that the traveler is stirring, and at Miilal Ja’s request he is brought in. Awake but confused, the armor-clad wanderer cannot recall his name. Miilal Ja turns to you, asking whether anything about him seems out of the ordinary. As you weigh your words, the wanderer latches onto what he can—an “adventurer,” he repeats—and then a spark catches. He suddenly insists he remembers: he is an Elvaan adventurer, and if he is in Mamook, then he must have been taken prisoner. Miilal Ja, wary of how quickly he assumes hostility, wonders if he comes from across the salt, from a land unfamiliar with their customs.</p><p>The room is jolted by urgent shouting—Zereel Ja bursts in with grim news: Gulool Ja Ja’s shade has returned, sighted nearby, and Bakool Ja Ja has already engaged it. He speaks of how, in recent days, the late Dawnservant’s shade has been seen wandering the woods, and he believes it was invoked by a rite like the one used before—knowledge that only a privileged few should possess. The culprit can be found later, he says; right now the priority is stopping the shade before it is too late. Miilal Ja, fearing her son will not hold out, asks you to go at once and aid him, and points you west to where the battle is unfolding. Behind you, the armor-clad wanderer murmurs the Dawnservant’s name, unsettled—and left with the same question that haunts him: how did he end up here?</p><p>At the site, you arrive to hear a harsh voice sneer at the “blessed siblings,” and you find Bakool Ja Ja fighting hard to hold his ground. He warns you the foe is not alone—and then a rambunctious girl throws herself into the fray with reckless confidence, declaring she will send the monsters packing. The armor-clad wanderer surges forward as if pulled by instinct, unable to explain why he knows he must be here. The girl calls out “taurus,” and he snaps back at her—only for her to fire right back, offended by his lack of manners, and introduce herself with sharp pride: Prishe. As the clash turns, another presence calls her to withdraw, and she obeys, addressing the companion as “Ulmia.” Confusion ripples through those left behind; Bakool Ja Ja cannot make sense of the name, while the armor-clad wanderer looks stricken, calling after Prishe as she disappears.</p><p>When you regroup, the armor-clad wanderer speaks through lingering pain: his memories are still hazy, but he recalls fighting alongside Prishe—comrades-in-arms, he believes. Yet something is clearly wrong: she mistook him for a monster, and she called her two-headed companion “Ulmia,” though the Ulmia he knows is an Elvaan woman—nothing like the reptilian fiend they encountered. He is certain some darkness has taken hold of her and clouded her mind, and he tries to force himself to go after her, only for his injuries to stop him. You refuse to let him throw himself back into danger and instead take the pursuit upon yourself. He thanks you with quiet gravity, recognizing in you the eyes of someone who has weathered battle, and asks you to be careful—there is no telling what lies beyond the portal.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    tabs:{story:'ストーリー',acq:'入手方法',unlockq:'開放クエスト',followq:'後続クエスト',comments:'コメント'},
    readMore:'全文を表示',readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたはホービゴ族の使者に呼び止められる。彼は、ミーラル・ジャからの依頼として、マムークで相次ぐ不可解な出来事に力を貸してほしいと言う。あなたの経験なら状況を読み解けるかもしれない──そう告げられ、あなたは指定された建物へ向かう。</p><p>マムークであなたを迎えたミーラル・ジャは、助力を求めるべきか迷っていたと正直に語る。それでも、いま直面している問題は自分たちだけでは乗り越えられないのだという。発端は、天深きセノーテで倒れていた旅人を見つけたことだった。幸い致命傷ではなかったが、彼はまだ目を覚まさず、眠りながら意味の通らない言葉を口にする。背が高く細身で耳の尖った姿はこの地では珍しいため、あなたなら彼の言葉に手掛かりを見いだせるのではないか、あるいは目覚めたときに記憶を呼び起こせるのではないか──そう頼まれ、あなたは彼に会うことを受け入れる。</p><p>やがて使者が戻り、旅人が動いたと告げる。連れて来られた鎧姿の旅人は、名を問われても答えられない。落下の衝撃で記憶が損なわれたのだろうとミーラル・ジャは判断し、あなたに「何か気づく点はあるか」と尋ねる。あなたが言葉を選ぶ間にも、旅人は手掛かりにすがるように「冒険者……自分は……」と繰り返し、そして突然、思い出したように叫ぶ。自分はエルヴァーンの冒険者で、ここがマムークなら捕虜にされたに違いない──そう決めつける彼に、ミーラル・ジャは、異国の習俗を知らぬ者ほど先入観で敵意を抱くのかもしれない、と静かに受け止める。</p><p>そこへ緊迫した声が飛び込み、ゼレージャが訴える。グルージャジャの影が戻ったというのだ。近くで目撃され、すでにバクージャジャが交戦しているが、このままでは危うい。ゼレージャは、近ごろヤクテル樹海で同じように影が現れていること、そしてそれが以前の儀式と同種の手段で呼び出された可能性を示す。儀式に必要な知識は限られた者しか持たぬはずで、犯人の追及は後回しにせざるを得ない──いまは目の前の危機が先だ。ミーラル・ジャは息子が増援を待つ間に倒れることを恐れ、あなたに助太刀を願い出る。あなたは西へ向かうよう促され、鎧姿の旅人は「グルージャジャ……」と不安げに呟きながら、自分がなぜここにいるのかを問い続ける。</p><p>現場に着くと、影は「受祝福の兄弟」への嘲りを投げつけ、バクージャジャは苦しい息の合間に応じる。彼はあなたに警戒を促し、相手は一体ではないと言う。そこへ勢い任せの少女が乱入し、自分が追い払うと豪語して技を放つ。鎧姿の旅人は衝動に突き動かされるように前へ出て、なぜだかわからないが自分はここへ来るべきだと感じた、と叫ぶ。少女は彼を「タウルス」と呼び、彼は苛立ちを隠さず言い返す。礼儀がないと叱りつけた少女は、名を名乗る──プリッシュ。戦いの流れが変わると、別の存在が彼女を呼び戻し、プリッシュはその指示に従い「ウルミア」と名を呼ぶ。残された者たちは困惑し、バクージャジャは理解できないと漏らし、鎧姿の旅人は焦燥に駆られてプリッシュを追いすがるが、彼女は光の向こうへ消えていく。</p><p>後に合流した鎧姿の旅人は、痛みを堪えながら語る。記憶はまだ曖昧だが、プリッシュと共に戦った覚えがある──仲間だったはずだ、と。だが彼女は自分を魔物と誤認し、二つ首の相棒を「ウルミア」と呼んだ。彼の知るウルミアはエルヴァーンの女性であり、あの爬虫類めいた怪物とはまるで違う。何か暗いものが彼女を蝕み、心を曇らせているのだろう、だから追わなければならない──そう言いかけて彼は膝を折る。あなたはその傷では無理だと止め、代わりに自分が追うと告げる。彼はあなたに礼を述べ、戦場をくぐり抜けてきた者の眼差しだと認める。たとえ今の彼女が何をしたとしても、プリッシュは自分にとって大切な友だったはずだ、と確かめるように言い、門の先に何が待つかわからないから気をつけてくれ、と頼む。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 使いのフビゴ族 <small class="muted">(トライヨラ, X:13.0, Y:11.6)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="dawntrail.html">黄金のレガシー</a></div><div class="row-2col row"><div class="lbl"><b>レイドダンジョン開放</b></div><div class="val"><a class="link" href="jeuno-the-first-walk.html">ジュノ・ザ・ファーストウォーク</a></div></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="it-all-began-with-a-stone.html">すべての起こりは「石」</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'異世界的相遇',
    tabs:{story:'故事概要',acq:'取得方式',unlockq:'解鎖任務',followq:'後續任務',comments:'留言'},
    readMore:'展開全文',readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你被一名 Hoobigo 使者喊住。對方說，他受 Miilal Ja 所託，特地來找你──最近 Mamook 近來怪事頻仍，他們認為你見多識廣，也許能幫他們釐清頭緒。如果你願意出手相助，Miilal Ja 正在 Mamook 等你，位置就在廣場以西、靠近雙頭雕像的大型建築裡。</p><p>你見到 Miilal Ja 後，她坦言自己其實猶豫過是否該把你牽扯進來，但眼下的麻煩靠他們自身的力量已無法解決。她說，一切始於 Skydeep Cenote──他們在那裡發現了一名倒下的旅行者。所幸他的傷勢並不致命，卻遲遲未醒；更令人不安的是，他在睡夢中喃喃自語，說著讓人摸不著頭緒的話。由於那名旅行者身形高瘦、耳尖的外貌在這片土地上並不常見，她希望你能聽聽那些夢話，看看是否能辨認出線索，或等他清醒後幫他喚回記憶。她詢問你是否願意與他交談。</p><p>不久，Hoobigo 使者闖入房內，帶回消息：那名旅行者動了。Miilal Ja 立刻請人把他帶來。鎧甲包覆的旅行者雖已醒來，卻在被問到姓名時語塞，最後只能歉然搖頭，表示自己想不起來。Miilal Ja 轉向你，說這次摔落似乎影響了他的記憶，也因此他的來歷更成謎團──鎧甲成了唯一能指向出身的線索。她問你：你是否覺得他有什麼不尋常之處？你沉思片刻、斟酌措辭的同時，那名旅行者抓住了「冒險者」這個詞，像是在努力把自己拼回原本的模樣。下一瞬，他忽然痛呼，像被什麼擊中般抬起頭，宣稱自己想起來了：他是 Elvaan 的冒險者。而既然這裡是 Mamook──那他一定是被抓來當俘虜了。Miilal Ja 並未立刻反駁，只低聲指出：如此輕易把他們當成敵人，或許代表他來自隔海的某個地方，那裡對 Mamook 的習俗一無所知。</p><p>就在此時，一陣急促的喊聲打斷了對話。Zereel Ja 衝進來，直接拋出噩耗：Gulool Ja Ja 的 shade 回來了，出現在西邊不遠處；Bakool Ja Ja 已經與那個幻影交戰，但他擔心情勢凶險。Zereel Ja 說，最近幾日 Yak T’el 的森林裡也頻頻有人目擊已逝 Dawnservant 的 shade 徘徊，而他懷疑那是以某種與先前相同的方式被喚來。理應只有極少數人才掌握能進行儀式的知識──犯人終究會被找出來，但眼下更迫切的是眼前這場危機。Miilal Ja 聽見兒子孤身苦戰，明顯心焦，卻仍壓下情緒向你提出請求：能否立刻前去協助 Bakool Ja Ja？她指明目的地在 Mamook 西方，催促你趕緊動身。鎧甲旅行者在一旁低聲重複著「Gulool Ja Ja……？」那語氣裡既陌生又不安，而他仍困惑自己究竟為何會出現在此地。</p><p>你趕到戰場時，先聽見一聲狂吼，接著是一道冷酷的嗤笑：對方嘲諷著「受祝福的兄弟」的名號，彷彿早已把他們視作不值一提。Bakool Ja Ja 一邊喘息一邊回敬，並提醒你若是來幫忙，就得提高警覺──敵人不只一個。就在僵持之際，一名莽撞的少女闖入戰局，自信滿滿地宣稱要把怪物全都打回去。鎧甲旅行者也衝上前去，像被某種直覺推著走；他大喊自己說不清原因，但內心有個聲音告訴他必須在這裡。少女把對手叫成「taurus」，旅行者立刻反唇相譏，斥她胡說八道。少女不甘示弱，嫌他會說話卻不懂禮貌，乾脆報上名字──Prishe，叫他記清楚。戰鬥的走向很快改變，某個聲音要 Prishe 收手離開，而她竟順從地答道「無論你怎麼說，Ulmia」，隨即跟著撤退。Bakool Ja Ja 對那個名字一頭霧水；鎧甲旅行者卻像被刺中般追喊 Prishe，懇求她別走。可她仍與那道「Ulmia」一同退入光芒彼端，只留下眾人面面相覷。</p><p>之後，鎧甲旅行者捂著傷口，努力把破碎的記憶拼湊成話語。他說一切仍很模糊，但他記得自己曾與 Prishe 並肩作戰──他們應該是戰友。只是眼前的 Prishe 明顯不對勁：她不只把他當成怪物，還把那個雙頭的同伴叫作「Ulmia」。他所認識的 Ulmia，是一名 Elvaan 女性，與他們剛剛遇到的爬行怪物完全是兩回事。他斷言有某種黑暗攀附在 Prishe 身上，蒙蔽了她的心智，自己必須追上去──話才說到一半，他便因傷勢而踉蹌。你直接阻止他繼續冒進，表示你會代替他去追。鎧甲旅行者怔了怔，隨即向你致謝，並說你那雙眼睛像是歷經無數戰場的人才會有的神情。即使 Prishe 做了這些事，她仍是他「應該」珍惜過的朋友──至少他如此相信。他最後鄭重提醒你：那道通往未知的入口後方究竟有什麼，誰也無法預料，務必小心。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 胡比戈族使者 <small class="muted">(圖萊約拉, X:13.0, Y:11.6)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="dawntrail.html">黃金的遺產</a></div><div class="row-2col row"><div class="lbl"><b>解鎖團隊副本</b></div><div class="val"><a class="link" href="jeuno-the-first-walk.html">朱諾：初次漫步</a></div></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="it-all-began-with-a-stone.html">一切始於一顆石頭</a></div></div>`
  }
};

const langToggle=document.getElementById('langToggle');
const pageTitle=document.getElementById('pageTitle');
const tabBtns=[...document.querySelectorAll('.tab-btn')];
const panels={
  story:document.getElementById('panel-story'),
  acq:document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments:document.getElementById('panel-comments')
};

function getLang(){return localStorage.getItem(LANG_KEY)||'EN';}
function applyLang(lang){
  const t=i18n[lang]||i18n.EN;
  pageTitle.textContent=t.pageTitle;
  langToggle.textContent=`🌐 ${t.langLabel}`;
  tabBtns.forEach(btn=>btn.textContent=t.tabs[btn.dataset.tab]);
  const active=tabBtns.find(b=>b.getAttribute('aria-selected')==='true')||tabBtns[0];
  renderPanel(active.dataset.tab,lang);
}
function wireClamp(panelEl,t){
  const clamp=panelEl.querySelector('.clamp');
  const btn=panelEl.querySelector('[data-role="expand"]');
  if(!clamp||!btn)return;
  function setLabel(){
    const collapsed=clamp.getAttribute('data-collapsed')!=='false';
    btn.textContent=collapsed?t.readMore:t.readLess;
  }
  setLabel();
  btn.addEventListener('click',()=>{
    const collapsed=clamp.getAttribute('data-collapsed')!=='false';
    clamp.setAttribute('data-collapsed',collapsed?'false':'true');
    setLabel();
  });
}
function renderPanel(key,lang){
  const t=i18n[lang]||i18n.EN;
  Object.keys(panels).forEach(k=>panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if(key!=='comments') panels[key].innerHTML=t[key];
  if(key==='story') wireClamp(panels[key],t);
  if(key==='comments') loadGiscusForCurrentLang();
}
tabBtns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab,getLang());
  });
});
langToggle.addEventListener('click',()=>{
  const cur=getLang();
  const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
  localStorage.setItem(LANG_KEY,next);
  applyLang(next);
});
applyLang(getLang());

const GISCUS_CFG={
  repo:'BELAUG-FFXIV/FFXIV_Library',
  repoId:'R_kgDOPyh4Kw',
  category:'General',
  categoryId:'DIC_kwDOPyh4K84CwPjL',
  theme:'preferred_color_scheme'
};
function uiLang(code){return code==='JP'?'ja':(code==='ZH'?'zh-TW':'en');}
function loadGiscusForCurrentLang(){
  const mount=document.getElementById('giscus_container');
  if(!mount)return;
  mount.innerHTML='';
  const langCode=getLang();
  const s=document.createElement('script');
  s.src='https://giscus.app/client.js';
  s.setAttribute('data-repo',GISCUS_CFG.repo);
  s.setAttribute('data-repo-id',GISCUS_CFG.repoId);
  s.setAttribute('data-category',GISCUS_CFG.category);
  s.setAttribute('data-category-id',GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping','specific');
  s.setAttribute('data-term',location.pathname+'｜'+langCode);
  s.setAttribute('data-reactions-enabled','1');
  s.setAttribute('data-emit-metadata','0');
  s.setAttribute('data-input-position','bottom');
  s.setAttribute('data-lang',uiLang(langCode));
  s.setAttribute('data-theme',GISCUS_CFG.theme);
  s.setAttribute('crossorigin','anonymous');
  s.async=true;
  mount.appendChild(s);
}
</script>
</body>
