  EN:{

    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Mumukko calls out to you with the same brisk certainty as ever, already certain that you have time to spare whether you admit it or not. She introduces herself as a former Sharlayan bureaucrat and the acting project manager at the Moongate Hub, then immediately turns the conversation into a complaint about the true burden of keeping an undertaking of this scale in order. Staffing, supplies, deadlines, specialists—none of it runs itself, and in her view, it all ultimately comes down to relentless micromanagement. This time, the problem is embarrassingly simple: three brilliant specialists still have not claimed their crew uniforms, even though the deadline has already passed. She presses the forgotten uniforms into your hands and sends you to deliver them.</p>
      <p>The first two recipients prove exactly the sort of people Mumukko had in mind. Chrysielle is so consumed by scientific fascination with the regolith and with the life she is certain lies beyond your star that she has completely neglected something as basic as collecting her own attire. The off-duty gleaner fares little better. Faced with the uniform in your hands, she is mortified by her own carelessness and painfully aware that she has not yet become the equal of the rival she once measured herself against. Yet both of them accept what you bring, and in their very different ways, both are reminded that the work ahead demands more than talent alone.</p>
      <p>The third delivery is less straightforward. Mumukko’s instructions lead you toward the Galactic Way, where you happen upon Kokkol Dankkol. He greets you with rough good humor, speaks of Margrat, and seems almost amused that your paths have crossed again on the moon. But the moment you explain why you are there, his attitude hardens. He has no interest in the uniform, and even less in surrendering the tool belt that has become part of him through labor, habit, and pride. To him, the whole matter is an annoyance he would rather brush aside.</p>
      <p>That is when Mumukko herself intervenes. She cuts through his resistance without hesitation and makes plain that the issue is not appearances, but safety. The uniforms are imbued with purifying magicks meant to strip away dangerous contaminants, and she will not have Kokkol Dankkol board the Galactic Way in clothes soaked with the grime of his work. Pressed from every side, and reminded of his duty to the vessel and the expedition, he finally gives in, though not without a final burst of theatrical misery over how ill-suited the garment is to a man such as him. Mumukko dismisses his complaints and orders him back to the inspection he should have been doing all along.</p>
      <p>When it is over, Mumukko thanks you with more sincerity than she usually allows herself. She admits that drawing eccentrics from across the world was inevitable for an initiative like this, and that someone capable of reining them in has become indispensable. However trivial the errand may have seemed, it has only reaffirmed what she already knew: talent alone is never enough to carry a project forward. Someone must also keep it moving, keep it orderly, and keep its wandering minds from drifting too far off course. And for now, much to her relief, that someone has been you.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    followq:`<div class="stack">
      <div class="row"><a class="link" href="a-managers-persistence.html">A Manager’s Persistence</a></div>

  JP:{
    langLabel:'JP',
    pageTitle:'プロジェクトマネージャーの小粋なお仕事',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ムムッコは、いつものように容赦のない勢いであなたを呼び止める。あなたに時間があるかどうかなど、ほとんど確認ですらなく、あるに決まっているという顔で話を進めていく。彼女は、かつてシャーレアンの官僚として働き、いまはムーゲート・ハブで臨時のプロジェクトマネージャーを務めているのだと名乗ると、大規模な計画を滞りなく回し続けることがどれほど骨の折れる仕事かをまくしたてる。人員配置も物資管理も締め切りも、放っておけばすぐに乱れる。今回の問題は、その縮図のようなものだった。優秀な専門家が三人も、期限を過ぎてもなお制服を受け取りに来ていないというのだ。そこで彼女は、その忘れられた制服をあなたに託し、本人たちへ届けるよう頼んでくる。</p>
      <p>最初のふたりは、まさにムムッコの嘆きを裏づけるような有様だった。クリュシエルは、この地のレゴリスや星外生命の可能性に心を奪われ、制服の受け取りなどすっかり頭から抜け落ちていた。非番のグリーナーもまた、制服を差し出された瞬間、自分の不注意に深く落ち込む。かつて競い合った相手に追いつこうとこの計画へ参加したというのに、こんな基本的なことすら管理できていない自分に、悔しさを隠せない。それでもふたりは、あなたから制服を受け取ることで、どれほど才能があっても、それだけでは務まらない現実を思い知らされる。</p>
      <p>だが三人目だけは、そう簡単にはいかなかった。ムムッコの地図が示した先で、あなたはギャラクティックウェイ号の近くにいるコッコル・ダンクルと出会う。彼は月で再会したことを豪快に喜び、マルグラットからの伝言まで口にするが、制服の話になった途端、その態度を変える。工具帯まで外せと言われるのではたまらないし、血と汗と涙が染みこんだ愛用品なしでは落ち着かない。制服など着る気はないと、きっぱり拒むのだった。</p>
      <p>そこへムムッコが現れ、一刀両断にその抵抗を断ち切る。問題は見た目ではなく、安全そのものなのだと彼女は言う。制服には浄化の魔法が込められており、作業中に付着した危険な汚染物質を持ち込ませないためのものでもある。そんな格好のままギャラクティックウェイ号へ近づくことなど許されない。職務への責任を突かれたコッコル・ダンクルは、なお文句をこぼしつつも、ついには渋々従う。ムムッコはそんな愚痴を意に介さず、遅れを出す前に点検へ戻れと追い払ってしまう。</p>
      <p>すべてが片づいたあと、ムムッコは珍しく率直な感謝を口にする。これほど大きな計画であれば、世界中から集まるのは優秀な人材ばかりではなく、癖の強い変わり者たちでもある。だからこそ、彼らの才能を活かしつつ、好き勝手にはさせない役割がどうしても必要になるのだという。たとえ今回の用事が些細に見えたとしても、それは計画を前へ進めるうえで欠かせないひとつの調整だった。才能だけでは足りない。秩序を保ち、動きを揃え、暴走しがちな頭脳を現実へ引き戻す者が必要なのだと、彼女は改めて実感していた。そして今回、その役目を果たしてくれたのが、ほかでもないあなただった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ムムッコ　焦がれの入江 <small class="muted">(X:21.6, Y:21.1)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="passion-thy-name-is-ardorum.html">未知待つ宙へ焦がれて</a></div>
      <div class="row">クラフター／ギャザラー Lv 10～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="a-managers-persistence.html">プロジェクトマネージャーの周到なお仕事</a></div>
    </div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'經理的耐心考驗',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Mumukko 又一次以那種不容你逃掉的氣勢把你叫住，開口便問你是不是還有時間。可那根本不像是在徵詢你的意思，而更像是她早就認定你一定會答應。她簡短自我介紹，說自己以前是 Sharlayan 的官僚，如今則在 Moongate Hub 擔任臨時的專案管理者，接著便立刻開始抱怨，要讓這麼大規模的一項計畫不脫軌，究竟需要付出多少心力。人員配置、物資調度、進度控管，沒有一樣能放著不管，而在她看來，真正支撐一切的從來都不是理想，而是徹底到近乎苛刻的細部管理。這次讓她頭痛的事情，看似瑣碎卻足夠讓人火大——居然還有三位專家，到現在都沒有來領自己的 crew uniform。於是，她把那些被遺忘的制服交給你，要你親手把它們送到那些人手上。</p>
      <p>前兩位對象，果然完全符合 Mumukko 口中那種「明明很優秀，卻在日常事務上荒腔走板」的模樣。Chrysielle 一見到你遞來的制服，才想起自己原本也打算親自去領，只是這片 regolith 與外星生命的可能性實在太讓她著迷，才會一下子把所有現實細節拋到腦後。另一位 off-duty gleaner 則在接過制服時露出了明顯的懊惱，像是連自己都無法原諒這種低級失誤。她原本就是抱著不想輸給曾經的 rival 的心情才加入這個計畫，如今卻連最基本的事情都忘得一乾二淨。可不管是被知識吸引得失神，還是被自己的失誤刺得難堪，兩人都在這一刻重新被拉回了現實——再出色的專長，也不代表其他事情就能自動做好。</p>
      <p>至於第三位，就沒有那麼容易對付了。依照 Mumukko 的提示，你來到 Galactic Way 附近，找到了 Kokkol Dankkol。他一見到你，先是大大咧咧地打了招呼，還提起 Margrat 的問候，像是對這場在月球上的重逢頗感新鮮。可等你說明來意、把制服交到他面前時，他的態度立刻變了，直接表示自己對那套衣服毫無興趣，更不可能拿它來取代陪伴自己多年的工具腰帶。那東西沾滿了他的血汗與歲月，對他來說幾乎像是身體的一部分；要他換掉，簡直像要他放下自己的身份一樣。</p>
      <p>就在他打算繼續硬撐下去時，Mumukko 親自殺了出來，毫不客氣地把他的藉口一一壓回去。她指出，這根本不是外觀或規矩的問題，而是關乎整艘星艦與未來降落地點的安全。這套制服上附有淨化魔法，可以清除危險的污染物；如果 Kokkol Dankkol 就這樣穿著自己平常那身沾滿各種不明殘留的工作服上船，誰知道會不會把某些不該帶去的東西一併帶進 Galactic Way，甚至污染未來踏上的星球。被她這樣一逼，再加上責任感又被當場拿來反過來對付自己，Kokkol Dankkol 總算只能勉強屈服，儘管嘴上還是不忘抱怨那制服太過貼身，根本不適合他這樣的人。Mumukko 卻完全不想陪他繼續演下去，只冷冷催他立刻去完成本該進行的檢查工作。</p>
      <p>等事情全都處理完之後，Mumukko 才總算鬆了口氣，也難得直白地對你表達感謝。她承認，像這樣的計畫，注定會吸引來世界各地最優秀、也最難搞的一群人。正因如此，她從一開始就知道，自己終究需要一個像你這樣的人，能在關鍵時刻替她把那些天才拉回正軌。這趟差事或許看起來微不足道，可它再次證明了一件事：光有才華，從來不足以讓一個大型計畫順利運作下去。還需要有人去收拾混亂、補上漏洞，並在所有人都只顧著自己眼前那點專業時，確保整體仍然能朝正確的方向前進。而這一次，替她做到這件事的人，就是你。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
