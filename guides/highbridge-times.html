    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }

    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}

    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}

    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}

    .card .bd{padding:16px}
    .video-card .bd{padding:0}

    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;
  overflow-y:auto;
  padding-right:8px;
  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}
    .stack{display:flex;flex-direction:column;gap:10px}

const i18n = {
  EN:{
    langLabel:'English',

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Highbridge is not the thriving crossroads Hihibaru once imagined. He tells you how he pinned his hopes on the Order of Nald’thal’s excavation of the ruins below—surely it would draw pilgrims, surely it would make this place a bustling hub. Instead, the opposite happened. Beastman raids come so relentlessly that folk are afraid to come within a malm of the bridge, and the flow of travelers he needs has dried up to a trickle.</p>
      <p>He admits, with a kind of bitter honesty, that he sold everything he owned to start this venture. He doesn’t want to give up without an earnest attempt to endure, but if conditions stay the same, he’ll be bankrupt before the moon is through. Even so, he forces himself to swallow the complaint—whining won’t keep a business alive. Only customers will. He pitches you his wares with the desperation of someone trying to keep the last door open.</p>
      <p>Then you bring him back to why you came, and the thin patience snaps. The masked man—Thal take him, Hihibaru spits, suddenly furious at the thought of chasing shadows when his own livelihood is collapsing. He has nothing solid, only vague rumors, and if you want more than that, you should pester the other merchants instead. The lead you hoped would open into something tangible turns into a closed fist.</p>
      <p>So you do exactly that, moving from stall to stall, gathering whatever scraps Highbridge will spare. One merchant admits he has heard of the figure, but only in hushed tones—black hooded robe, suspicious to look upon, and little else worth swearing by. Another refuses even the premise; business is already bad without “shady characters” lurking about, he says, and with the Qiqirn raids driving everyone away, he is starting to think he should cut his losses and leave before he’s dragged under. A third is more talkative, and though he still cannot give you anything precise, his certainty carries its own weight: enough people have reported seeing the “masked devil,” not only around Highbridge but elsewhere in Thanalan as well, to convince him it is no mere fancy.</p>
      <p>When you return to Hihibaru with your hands still mostly empty, he reads it on your face. This time, his defensiveness softens into embarrassment. He apologizes for his earlier rudeness and admits the strain is getting to everyone—merchants included. The Qiqirn raids, he says, feel constant and organized, so much so that people have begun to suspect someone is orchestrating them from behind the scenes. He won’t pretend he’s above putting his own welfare first, but he insists that doesn’t make him a bad man. And if you are hunting a masked figure who thrives in rumor, then rumor is what he can offer: he will keep his eyes and ears open, and if he sees or hears anything at all, you will be the first to know.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Hihibaru <small class="muted">Eastern Thanalan (X:20.2, Y:21.3)</small></div>
    </div>`,
    unlockq:`<div class="stack">

    followq:`<div class="stack">

  },
  JP:{
    langLabel:'日本語',
    pageTitle:'橋上の証言',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ハイブリッジは、ヒヒバルが夢見たような賑わいの交差点にはなっていなかった。彼は、ナルザル教団が地下遺跡の発掘を始めたとき、巡礼者が集まり、ここが活気ある拠点になると期待したのだと語る。だが現実は違った。獣人の襲撃がほとんど途切れず続き、人々は橋の近くへ一マルムも寄りつこうとしない。客の流れは細り、商いは成り立たなくなっていく。</p>
      <p>彼は、事業を始めるために持ち物をすべて売り払ったと打ち明ける。だからこそ、真面目に踏ん張らずに諦めたくはない――だがこのままでは、月が変わる前に破産しかねない。愚痴っても意味はないと分かっているからこそ、彼は必死に気持ちを切り替え、商売を続けるには商売が必要だと言い聞かせるようにして、あなたに品物を見ていかないかと頼み込む。</p>
      <p>しかし、あなたが仮面の男のことを持ち出した瞬間、彼の余裕は崩れる。そんな男の話などどうでもいいと吐き捨て、タール神にでも連れていかれろと言わんばかりに苛立つ。以前は噂話のひとつも聞けるかもしれないと言ったが、持っているのは曖昧な風聞だけだ――それ以上を望むなら、他の商人に聞け、と。</p>
      <p>あなたは言われたとおり、周囲の商人たちから話を集める。ある商人は、黒いフード付きのローブをまとい、いかにも怪しい姿だという囁きを耳にしただけだと、慎重に言葉を選ぶ。別の商人は、そんな者を見たくもないと突っぱねる。商売はただでさえ厳しく、キキルンの襲撃で人々はハイブリッジを避け、今では熱心な巡礼者くらいしか来ないのだという。彼はため息をつき、損切りして去るべきかもしれないとこぼす。さらに別の口達者な商人は、仮面の「悪魔」はハイブリッジだけでなくザナラーンの各地でも目撃されているらしいと語り、目撃談が十分にある以上、作り話ではないと断言する――ただし、それ以上のことは分からないとも。</p>
      <p>あなたがヒヒバルのもとへ戻ると、彼はあなたの表情だけで察する。先ほどの無礼を詫び、今は商人にとって本当に苦しい時期なのだと打ち明ける。キキルンの襲撃はあまりに頻繁で、しかも組織立っているように見えるなら、背後で誰かが操っているのではないか――そんな疑いまで出ているという。彼は多くの商人と同じく自分の身の安全を優先しがちだが、それでも悪人ではないと弁明し、仮面の男についてはこれからも目を光らせると約束する。もし何か見聞きしたなら、真っ先にあなたへ知らせる、と。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ヒヒバル　<small class="muted">東ザナラーン (X:20.2, Y:21.3)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="shadow-of-darkness.html">不吉な気配</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 24～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="where-there-is-smoke.html">陽動の狼煙</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'橋上的證言',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Highbridge 並沒有變成 Hihibaru 當初幻想的繁華據點。他說，當 Order of Nald’thal 開始挖掘地下遺跡時，他還以為這裡會因為朝聖者湧入而變得熱鬧——可現實卻被「幾乎無止盡」的 beastman raids 狠狠打碎。襲擊一次又一次地來，來得太頻繁、太讓人害怕，以至於人們連一 malm 的距離都不敢靠近 Highbridge，生意自然也就跟著枯萎。</p>
      <p>他坦白自己為了開這攤生意，幾乎把一切都賣了，才勉強把計畫撐起來。他不甘心就這樣放棄，也想真心努力撐下去，但如果情況再不改變，他很可能在下一個 moon 還沒過完前就破產。抱怨沒有用，他知道得很清楚；對商人而言，只有客人能救命。於是他硬是把焦慮吞回去，轉而推銷起自己的貨，像是在用每一句話替自己爭一口氣。</p>
      <p>你把話題拉回 masked man 的時候，他的耐心終於斷了。他咒罵著要 Thal 把那個該死的 masked man 帶走，語氣裡既是憤怒也是無助——在他眼裡，你要追的只是影子，而他眼前快要倒塌的卻是活生生的生活。他承認自己只有模糊的流言，根本沒有你要的「線索」；要找更多，就去問其他商人。</p>
      <p>你只能照做，一個接一個地去聽 Highbridge 能給你的碎片。有位商人說他確實聽過關於那人的傳聞，但都是壓低聲音的耳語：黑色、帶兜帽的長袍，看起來很可疑——除此之外幾乎說不出更多。另一位商人乾脆否認自己想看到那種人，說生意已經夠差了，不需要再有「可疑人物」在附近晃蕩；而且因為 Qiqirn raids，大家都刻意繞開 Highbridge，現在肯來的只剩少數虔誠的朝聖者，他甚至開始想乾脆認賠離開。第三位商人則話比較多，他說不只 Highbridge，Thanalan 其他地方也有人目擊過那個「masked devil」；目擊的人多到足以證明這不是憑空想像，但除此之外，仍然沒有更多能咬住的細節。</p>
      <p>你回到 Hihibaru 身邊時，他從你的表情就看出你沒有得到太多有用的東西。這一次，他的態度軟了下來，也為自己先前的粗魯道歉。他說商人們最近真的很艱難，而那些 Qiqirn raids 頻繁到不正常，還像是被組織、被安排過一樣，因此大家開始懷疑背後可能有人在操控。他承認自己總是把自身安危放在前面——就像大多數人一樣——但他堅持那不代表他是壞人。最後他向你保證：他會繼續留意 masked man 的消息；只要他看到或聽到任何蛛絲馬跡，你會是第一個知道的人。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 希希巴魯　<small class="muted"> 東薩納蘭 (X:20.2, Y:21.3)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="shadow-of-darkness.html">不祥的感覺</a></div>
      <div class="row">所有職業（不含限定職） 等級 24 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="where-there-is-smoke.html">佯動的狼煙</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
