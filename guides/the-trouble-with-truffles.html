    story:`<div class="clamp" data-collapsed="true">
<p>With the tourney about to begin, Hildibrand insists you hurry back to the Coliseum to learn the rules of engagement. A true gentleman, he declares, fights with honor—not for victory or defeat—and he swears he will not stoop to treachery no matter what his opponents attempt. Nearby, Nashu eyes Ultros uneasily, remarking that he looks somehow lumpier than before, while Ultros grumbles about the bruises and chipped teeth he’s collected and mutters to his “buddy.” A rumbling “Fungahhhhhh!” answers him from within.</p>
<p>Hildibrand strides up and asks Ultros for information, only to recoil at the sight of those ghastly bruises. Ultros hastily claims he merely fell down the stairs and snaps that he’s busy, while the muffled “Fungaaaaahhh!” grows louder. When Hildibrand notices movement inside the office, Ultros panics—insisting there’s no one there, claiming he’s fumigating for pests, and trying to shoo you away to your battle. Nashu warns that something sounds alive in there, but Ultros forces a laugh and pretends he’s only talking to himself.</p>
<p>Taking the performance at face value, Hildibrand praises Ultros’s work ethic: battered and beset, yet still able to find joy in his profession. Before the nonsense can spread any further, Briardien calls you aside, dryly suggesting the stupidity in the air may be contagious. Behind you, Hildibrand happily proclaims Ultros a gentleman among octopodes, while Nashu muses that all this talk is making Ultros look more appetizing by the minute.</p>
<p>Briardien presses you for what you learned. From your report, he pieces together a sharper picture: Avila is determined to win the Mythril Cup, claim a fortune, and lift herself and her sister out of poverty—and she implied she has taken precautions to make her victory all but certain. You describe how you narrowly avoided a series of obstacles while tailing her, and how Ultros looked considerably worse for the wear when you returned. Briardien concludes the evidence points to a partnership between the Ala Mhigan girl and Ultros, absurd as it sounds. He adds that his own research suggests Ultros has become a regular at Ul’dah’s taverns and even its houses of pleasure.</p>
<p>Briardien suspects Ultros is using his inside knowledge of the Coliseum to identify and eliminate threats, ensuring Avila’s victory and securing himself a healthy commission. He also mentions rumors of a “Tempest Blade” said to be the source of Avila’s strength—still an unresolved mystery, and a reminder that your life may yet be in danger. Then he asks a favor: guards reported several crates of refuse from the Coliseum reception room were hastily discarded in Pearl Lane not long ago. It’s a stab in the dark, but the rubbish may hold answers—so he wants you to retrieve it and bring it to him.</p>
<p>When you return with what you found, Briardien grimly sifts through the spectacular assortment of gore—until he spots something else: a sack even fouler than the entrails it lay in. There is writing on the side—“Syntgoht’s Sundries”—and Briardien decides you must visit this merchant and learn what, exactly, he sold to that squishy mass of tentacles. At Syntgoht’s shop, the man greets you with a salesman’s smile, then immediately launches into his standard warning: no exchanges, no replacements, no refunds—before he pauses and asks if Ultros sent you. Briardien cuts him off and demands to know what he sold. Syntgoht proudly answers: an entire sack of gold truffles, an extravagant purchase for only the most discerning customers—and Ultros, he notes, placed another order today. Briardien starts to wonder if the truffles could somehow be connected, then stops himself mid-thought.</p>
<p>Before he can pry further, Hildibrand bursts in, offended that Briardien would conduct an investigation without him—and doubly offended that you would be “stolen away” for it. Ellie arrives as well and recoils at the stench, but Hildibrand enthusiastically identifies the aroma as gold truffle and launches into a lecture on Ul’dahn gourmet tastes, even reminiscing about how his mother prepares them. Syntgoht, utterly delighted, begs for the recipe—at which point Briardien declares the productive portion of the conversation is over. The tourney is about to begin, and he orders everyone back to the Coliseum at once.</p>
</div>

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
<p>大会の開始が迫るなか、ヒルディブランドはあなたに、急いでコロセウムへ戻って戦いの規則を確認しようと促す。紳士にとって戦いは勝敗ではなく名誉のため――相手がどれほど卑劣な手を使おうとも、自分だけは決して同じところへ堕ちないのだと高らかに宣言する。するとナシュ・マカラッカが、オルトロスの様子を見て「前よりゴツゴツしていないか」と首をかしげる。オルトロスは頭のコブや欠けた歯を嘆きながら、もうすぐ状況が変わると誰かに話しかけ、奥から「フンガァァァァ！」という不気味な声が返ってくる。</p>
<p>ヒルディブランドはオルトロスに事情を尋ねようとするが、目の前の痛々しい痣に驚き、誰にやられたのかと詰め寄る。オルトロスは慌てて階段から落ちただけだと言い張り、忙しいのだと追い払おうとする。さらにヒルディブランドが事務所の中の気配に気づくと、オルトロスは動揺して「誰もいない」「害虫退治をしている」と言い訳を重ね、あなたに早く戦いへ行けとまくしたてる。ナシュ・マカラッカが「中で何か生きている」と指摘しても、オルトロスは自分の独り言だと言い張り、必死に取り繕う。</p>
<p>それでもヒルディブランドは真に受け、ボロボロになりながらも仕事に誇りを見いだす姿勢は感動的だと称賛する。するとブリアルディアンがあなたを呼び、少し席を外すよう求める――この場の愚かさは感染するかもしれない、と冷ややかに言い添えながら。背後ではヒルディブランドがオルトロスを「タコの中の紳士」だと持ち上げ、ナシュ・マカラッカはその言葉に感化されて、ますます食欲が湧いてきたように呟く。</p>
<p>ブリアルディアンは、調査の成果をあなたから聞き出し、状況を整理する。アヴィラはミスリルカップで優勝し、莫大な賞金を得て姉妹で貧しさから抜け出そうとしている。そのうえ勝利が確実になるよう、すでに手を打っていることを匂わせた。あなたは尾行中に幾つもの妨害を辛うじて避けたこと、戻ったときのオルトロスがひどく傷だらけだったことを伝える。ブリアルディアンは、証拠が示すのは一つ――アラミゴの娘とオルトロスが結託している可能性だと言い切る。さらに彼は、オルトロスがウルダハの酒場や、風紀の怪しい店に出入りしているという調べも口にする。</p>
<p>ブリアルディアンは、オルトロスがコロセウム内部の事情に通じていることを利用し、脅威になりうる相手を排除してアヴィラの勝利を後押しし、その見返りとして報酬を得ているのではないかと推測する。加えて、アヴィラの強さの源と噂される「テンペストブレード」の存在にも触れるが、その正体はまだ掴めていない――だからこそ、あなたの身も依然として危険だと警告する。そして彼は、コロセウム受付から出た廃棄物がパールレーンに急いで捨てられたという報告を伝え、それを回収して持ってきてほしいと頼む。</p>
<p>あなたが回収物を持ち帰ると、ブリアルディアンは嫌々ながらも中身を改め、血なまぐさい残骸の山の中から、さらに悪臭を放つ袋を見つける。袋の側面には店名らしき文字があり、そこに「シントゴート」の名が記されていた。ブリアルディアンは、オルトロスと取引のあるこの商人に会い、何を売ったのかを吐かせようと決める。店でシントゴートは愛想よく迎えるが、すぐに交換も返品もないとまくしたて、オルトロスの差し金かと探りを入れてくる。ブリアルディアンが問いただすと、彼は「ゴールドトリュフを袋いっぱい」売ったのだと誇らしげに答え、しかも今日は追加の注文まで入ったと言う。ブリアルディアンはそれが何かに関係するのではと考えかけ、言葉を飲み込む。</p>
<p>そこへヒルディブランドが割り込み、勝手に調査を進めたブリアルディアンに憤慨し、さらにあなたを連れ出したことまで「紳士として許しがたい」と抗議する。エリーは臭気に顔をしかめるが、ヒルディブランドはそれこそがゴールドトリュフの芳香だと得意げに語り、ウルダハの美食家が愛する味だと力説し、母の調理法まで思い出話を始める。シントゴートは目を輝かせて作り方をねだるが、ブリアルディアンは「もう十分だ」と切り上げる。大会開始まで時間がない――一同は急いでコロセウムへ戻ることになる。</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>比賽就要開始了，Hildibrand 催你立刻回到 Coliseum，把交戰規則弄清楚。他一本正經地宣告：真正的紳士上場不是為了勝負，而是為了名譽；不論對手用什麼詭計或奸詐手段，他都不會把自己拉到同樣的高度去應戰。就在這時，Nashu 盯著 Ultros，忍不住說他看起來比之前「更凸更怪」了一點。Ultros 抱怨自己滿頭包、牙也缺了，說辛苦不該只換來這種待遇，但很快就會「改變」——他還對著某個同伴搭話，緊接著，裡頭傳來一聲低沉又古怪的「Fungahhhhhh！」</p>
<p>Hildibrand 走上前本想請 Ultros 提供線索，卻先被那一身駭人的瘀青嚇到，追問到底是誰把他打成這樣。Ultros 立刻改口說只是摔下樓梯，催你們快走，表示自己忙得很；可那聲「Fungaaaaahhh！」又再度從裡頭響起。Hildibrand 注意到辦公室內有動靜，Ultros 頓時慌了，硬說裡面沒人，還說自己正在熏屋子除害蟲，並把你們當成「害蟲」一樣趕走，要你趕快去打比賽。Nashu 也聽出裡面像是有活物，Ultros 只好硬拗成自己在自言自語，還故意模仿那怪聲，想把一切敷衍過去。</p>
<p>Hildibrand 卻把這場拙劣的演出當真，反而誇起 Ultros：明明遍體鱗傷、又被「害蟲」所擾，仍能在工作中找到滿足與喜悅，這份敬業精神實在令人敬佩。眼看情況越來越荒唐，Briardien 把你叫到一旁，冷冷提醒你：空氣裡的愚蠢恐怕會傳染。你轉頭一看，Hildibrand 已經在那邊把 Ultros 稱作「章魚之中的紳士」，Nashu 甚至一臉陶醉地說，聽 Ultros 這樣講話，還真是越聽越「開胃」。</p>
<p>Briardien 立刻追問你調查的成果，並快速把線索拼成一個更完整的輪廓：Avila 想靠贏下 Mythril Cup 奪得鉅額財富，讓她和妹妹脫離貧困；而且她話裡話外暗示自己早就做了萬全準備，勝利幾乎已經是板上釘釘。你也把尾隨她時差點踩中的陷阱與阻礙說給他聽，還提到你回來之後，Ultros 的狀況明顯更慘了。Briardien 因此斷定，證據指向同一個方向——那名 Ala Mhigan 的女孩很可能正和 Ultros 合作。再加上他查到的情報：Ultros 近來頻繁出沒於 Ul’dah 的酒館，甚至還會出入風月場所。</p>
<p>Briardien 推測，Ultros 正利用自己對 Coliseum 運作的內部了解，鎖定並排除可能威脅 Avila 奪冠的對手，確保她能贏下比賽，自己也能從中抽到一筆可觀的分潤。除此之外，還有傳聞中那把據說能支撐 Avila 力量的「Tempest Blade」——這仍然是個謎，也意味著你的性命依舊處在危險之中。接著他告訴你，有守衛回報：Coliseum 接待室丟出的幾箱廢棄物不久前被匆忙扔到 Pearl Lane。雖然只是死馬當活馬醫，但他要你把那些垃圾找回來交給他，或許能從裡面挖出答案。</p>
<p>你把回收來的東西帶回後，Briardien 強忍著不適翻找那堆令人作嘔的殘渣，最後在一片腥臭內臟之中，找到一只更惡臭的袋子。袋身上有字樣——「Syntgoht’s Sundries」——看來那個商人曾和那團黏滑的觸手有過交易。Briardien 立刻要你跟他去找 Syntgoht 問清楚。到了店裡，Syntgoht 先是滿臉堆笑迎客，下一秒就照例強調不換貨、不退貨、不退款，還突然警覺地問是不是 Ultros 派你們來的。Briardien 直接接管對話，逼問他到底賣了什麼給那個怪物。Syntgoht 得意洋洋地說：是一整袋金色松露，價高又氣味獨特，只有最挑剔的客人才買得起；而 Ultros 今天還又下了一筆新單。Briardien 聽到這裡，像是差點把某個可怕的聯想說出口，卻又硬生生停住。</p>
<p>話還沒問完，Hildibrand 就闖了進來，指責 Briardien 竟敢背著他調查，還把你「拐走」，這位紳士可一點都不服氣。Ellie 也跟著趕到，聞到那股臭味立刻皺起眉；但 Hildibrand 反而陶醉地說這正是金色松露的迷人香氣，是 Ul’dah 美食家最欣賞的「高雅風味」，甚至還開始聊起母親如何烹調它們。Syntgoht 聽得兩眼發亮，當場追問食譜；Briardien 則不再浪費時間，宣布這段對話的「有用部分」已經結束。比賽就要開始了——你們必須立刻趕回 Coliseum。</p>
</div>

</div>`,
    unlockq:`<div class="stack">
  <div class="row"><a class="link" href="what-price-victory.html">天下無雙的再戰者</a></div>
</div>`,
    followq:`<div class="stack">
  <div class="row"><a class="link" href="the-coliseum-conundrum.html">鬥技場的預告信</a></div>
</div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
