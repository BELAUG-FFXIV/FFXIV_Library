<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Lending a Helphand',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You agree with Wuk Lamat that you’ll solve the Moblins’ immediate problem first, and only then turn your attention to completing their feat. Rakorok, winded and worried, explains that the helphand assigned to the potsworn goldsmith Kaahe was hurt during the rockrain—so Rakorok took over, yet knows nothing of Kaahe’s needs. Helphands must not trouble the potsworn with straight questions; they are meant to observe, anticipate, and prepare with “guessthink.” Rakorok begs you to help him figure out what Kaahe is lacking.</p><p>At Earthenshire near The Glostfired Bank, Rakorok admits Kaahe is only one of many potsworn needing care, and there are too few helphands to go around. Wuk Lamat leads you to Kaahe’s workplace and suggests you take a peek inside—quietly, the way the Moblins expect.</p><p>Inside The Workpot, Wuk Lamat notes that it would be quicker to talk to Kaahe, but that isn’t how things are done here. You leave him to his work and try your hand at “guessthink,” inspecting the workshop for clues.</p><p>The signs are hard to miss: the goldsmithing tools are worn down and likely due for replacement. The furnace area is stifling, with barely any airflow—an oppressive heat that would make focused work difficult. Yet the crafting materials are plentiful, so whatever Kaahe lacks, it isn’t supplies. Then you notice his meal is barely touched, and Wuk Lamat points out that hot dishes lose their savor when left too long.</p><p>Back outside, you report to Rakorok. Wuk Lamat suggests Kaahe may not eat piping hot food—her brother Koana is also Hhetsarro, and while tastes differ, some preferences are shared. If the dish arrived too hot to eat, it could become cold and unappetizing by the time he returned to it, so she proposes serving food that tastes good at any temperature. She adds that food isn’t the only issue: even if Kaahe’s homeland is hot and dry, the furnace heat is brutal, and the workshop needs cooling.</p><p>Rakorok offers a solution: a draftyshard that can create a lovely breeze, salvaged from the Shoals of No Return beyond the crags through a tunnel southeast of the village. Wuk Lamat also flags another need—Kaahe’s files and saws and other tools look worn down, so a fresh set is in order, and Rakorok vows to rectify the oversight.</p><p>On the way, you cross paths with Koana and Thancred. Koana admits he suggested commissioning artisans in Sharlayan for guaranteed quality, but the Moblins rejected the idea, fixated on individual contracts. Thancred explains they’ve been deemed unfit to help with “helphands” and are tending the injured instead—after storms destroyed routes and isolated settlements, finding a way here mattered. You continue on, sort through crystals at the Shoals of No Return, and recover the one that whispers with wind.</p><p>When you return to Earthenshire and hand over the draftyshard, Rakorok can practically feel the cool breeze at once. Wuk Lamat brings good tidings of her own: the cook has prepared a feast fit for the most discerning Hhetsarro, and it’s already on its way. Together, you go in to see what Kaahe makes of your efforts.</p><p>Kaahe receives the meal, the new tools, and the welcome cool air with open gratitude, saying he now remembers why he signed a potpact. He offers to reciprocate with a piece worthy of a potsworn—an oil lamp meant to brighten the halls of Vollok Shoonsa—its luster leaving Rakorok in awe. Koana arrives with word that the elector deems the crisis past and is ready to task you with the feat; he praises Kaahe’s artistry, and Kaahe speaks of drawing inspiration from Kozama’uka’s natural beauty. When it’s done, Rakorok thanks you for your hard work and clever “guessthink,” reminded that truly helping the potsworn begins with understanding them—and Wuk Lamat agrees it’s a lesson that applies to everyone you meet.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Rakorok <small class="muted">Kozama’uka (X:12.0, Y:28.3)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-leaking-workpot.html">A Leaking Workpot</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 92</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-feat-of-pots.html">The Feat of Pots</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'壺匠の世話人',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたはウクラマトと共に、まずはモブリン族の困りごとを解決してから、その後で「壺の壮挙」に向かうことを決める。ラコロクは息を整えながら、壺匠カーへを担当していた世話役が岩雨で負傷し、自分が代わりを務めているものの、カーへのことを何ひとつ理解できていないのだと語る。ここでは壺匠に直接問いただすことはせず、観察し、先回りして備える――そのための「推察」を行うのが世話役の務めだと言い、あなたにも力を貸してほしいと懇願する。</p><p>アースンシャイアのグロストファイア・バンク近くで、ラコロクは、世話を必要とする壺匠はカーへだけではないのに、世話役の数が足りないのだと訴える。ウクラマトはカーへの仕事場へ向かい、まずは中をそっと覗いてみようと促す。</p><p>工房の中では、ウクラマトが、話しかければ早いのは分かっていても、この地の流儀ではそうしないのだと念を押す。あなたはカーへの手を止めさせず、工房を観察して「推察」し、足りないものを探すことにする。</p><p>やがて手がかりが揃い始める。彫金道具は使い込まれて傷みが目立ち、新調が必要に見える。炉の前は風が通らず息苦しいほどの熱がこもっていて、集中を妨げているのは明らかだ。一方で素材は十分に揃っており、材料不足が原因ではなさそうだ。そして手つかずの料理を見つけ、熱いうちに食べられなければ風味が落ちてしまう、とウクラマトは気づく。</p><p>外へ戻ってラコロクに伝えると、ウクラマトは原因を整理していく。カーへは兄コーナと同じヘイザ・アロ族で、個人差はあっても熱い料理を避けがちな傾向があるかもしれない。熱すぎて食べられず、冷めた頃には美味しくなくなって手が伸びない――ならば温度に左右されず美味しい料理を用意すればいい。さらに彼女は、食事だけではないと続け、炉の熱を和らげて工房を冷やす工夫が必要だと言う。</p><p>ラコロクは「風生みの結晶」を提案し、それは村の南東にある洞窟を抜けた先、「敗者の船」で回収できると案内する。ウクラマトは同時に、ヤスリやノコギリといった道具の消耗も見逃せないとして、新しい道具一式を整えるべきだと告げ、ラコロクは手配の不備を正すと誓う。</p><p>道中であなたはコーナとサンクレッドに出会う。コーナは品質を保証できるシャーレアンの職人へ依頼する案を出したが、モブリン族は受け入れなかったと言い、サンクレッドは自分たちが「世話役」の件に関われず負傷者の手当てを任されていると説明する。あなたは敗者の船で風の気配を宿した結晶を見つけて持ち帰り、ラコロクに渡すと、彼はその涼やかな風に安堵する。さらにウクラマトは、料理係がヘイザ・アロ族の好みに合うご馳走を用意したと告げ、皆で工房へ入る。</p><p>カーへは、料理と新しい道具、そして心地よい涼風を受け取り、これでこそ壺の契りを結んだ甲斐があると礼を述べる。そして壺匠にふさわしい品で応えようと、ヴォロック・シューンサの回廊を照らすオイルランプを作り上げ、その見事な輝きにラコロクは歓喜する。そこへコーナが現れ、選定者が危機は去ったとして壮挙に取り掛かる準備ができたと知らせ、作品を称えると、カーへはコザマル・カの自然美から着想を得たのだと語る。最後にラコロクは、あなたの働きと鋭い推察に深く感謝し、世話役にとって壺匠を知ることの重要さを噛みしめ、ウクラマトもまた、それは誰に対しても同じだと頷く。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ラコロク <small class="muted">コザマル・カ (X:12.0, Y:28.3)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-leaking-workpot.html">捕集の民、モブリン族</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 92</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-feat-of-pots.html">壺の試練</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'罐子工的看護人',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你答應和 Wuk Lamat 先替 Moblins 解決眼前的麻煩，再去完成「壺之試煉」。Rakorok 氣喘吁吁地把話說清楚：原本負責照看契約匠人 Kaahe 的幫手在落石雨中受了傷，他只好頂上，可是他對 Kaahe 的需求完全沒有把握。這裡的幫手不會直接問契約匠人，而是靠觀察、預判、先把事情準備好——Rakorok 也用他們的說法請你一起「推想」，找出 Kaahe 到底缺了什麼。</p><p>在 Earthenshire、靠近 The Glostfired Bank 的地方，Rakorok 說需要照看的契約匠人不只 Kaahe，偏偏人手太少，幫手根本分身乏術。Wuk Lamat 帶著你走到 Kaahe 的工作地點，說先悄悄看一眼裡頭的情況。</p><p>你們走進 The Workpot（工坊）附近時，Wuk Lamat 也提醒你：要是能直接問 Kaahe 當然更快，但這裡不是這樣做事的。你不去打斷他，只靠觀察工坊本身留下的線索，照著 Moblins 的方式開始「推想」。</p><p>很快，你看見幾個明顯的問題：Kaahe 的工具磨損得很厲害，看起來需要更新；爐前悶熱得幾乎沒有空氣流動，光站在那裡都讓人喘不過氣，更別說要長時間專注工作。相較之下，材料卻相當充足，表示他缺的不是原料。接著你注意到那份幾乎沒動過的餐點，Wuk Lamat 也立刻想到——那種料理應該趁熱吃，一旦放冷就會失去風味。</p><p>你們回到外頭把觀察結果告訴 Rakorok 後，Wuk Lamat 進一步整理出原因。她說 Kaahe 和她哥哥 Koana 同為 Hhetsarro，雖然每個人都不同，但可能普遍不喜歡滾燙的料理：太燙時吃不了，等冷了又變得不好吃，最後就乾脆不碰；所以解法是準備「不管溫度如何都好吃」的餐點。她也補上一點——不只食物，爐前的高溫同樣會讓人難以集中，工坊需要降溫。</p><p>Rakorok 提議用 Draftyshard（用來帶來涼風、替工坊降溫的晶石），並指引你去 Shoals of No Return 回收；Wuk Lamat 也提醒，Kaahe 的銼刀、鋸子之類工具都磨得很嚴重，最好再準備一套新工具。Rakorok 立刻承認自己只顧著囤材料忽略了這點，說幫手就該負責把好工具準備到位。</p><p>你出發途中遇見 Koana 和 Thancred。Koana 坦言他曾建議委託 Sharlayan 的工匠以保證品質，但 Moblins 不喜歡那樣的做法，仍堅持一份份個別契約；Thancred 則說他們被認定不適合插手幫手的工作，只能先去照料傷者。你穿過通道抵達 Shoals of No Return，從幾種結晶中辨認出帶著風息的那一枚，帶回 Earthenshire 交給 Rakorok，而他幾乎立刻就像感到涼風拂面。Wuk Lamat 也同時帶來好消息——料理的人已準備好適合 Hhetsarro 口味的餐點，正在送來的路上，於是你們一起進去看 Kaahe 的反應。</p><p>Kaahe 看到餐點、新工具與那股涼風後，語氣明顯放鬆，說自己想起當初為何要簽下壺之契約，也為你們的體貼真心道謝。他隨即表示要回報你們，做出配得上契約匠人的作品——用來點亮 Vollok Shoonsa 廊道的油燈——那光澤與亮度讓 Rakorok 驚嘆不已。這時 Koana 也進來，告知選定者已認定危機解除，準備正式交付「壺之試煉」的任務；他稱讚作品之精妙，Kaahe 則說自己從 Kozama’uka 的自然之美獲得靈感。最後 Rakorok 再次向你致謝，說你不只辛苦，更把「推想」做得漂亮，也讓他重新明白：要當好幫手，真正重要的是先理解契約匠人——Wuk Lamat 也點頭，說這道理其實放在任何人身上都一樣。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>任務發布</b> 拉寇洛坷 <small class="muted"> 克扎瑪烏卡濕地 (X:12.0, Y:28.3)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-leaking-workpot.html">收集之民—莫布林族</a></div><div class="row">任一戰鬥／魔法職（不含限制職業）Lv.92</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-feat-of-pots.html">罐之試煉</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
