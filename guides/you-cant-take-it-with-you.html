  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'You Can’t Take It with You',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Marques approaches you hesitantly and asks for a moment of your time. A broken horologe was found in the pocket of a man brought here for burial, and something about the device feels familiar to him—yet he cannot say why. He thinks that if he can tinker with it, the answer may come, but he lacks the proper tools.</p>
      <p>Marques asks you to go to Camp Drybone in his stead and obtain a bull-point chisel and a pair of needle-nose pincers—tools often used by goldsmiths, whom he suggests may be the best people to ask. He insists he does not expect you to pay out of pocket and presses a coinpurse into your hands, saying it should cover the cost. Even after you agree, he adds softly that if there is anything he can do, you need only ask.</p>
      <p>At Camp Drybone, a traveling goldsmith reacts at once to your request, warning that a bull-point chisel and needle-nose pincers do not come cheap. Still, when you present the payment, the goldsmith snaps to agreement with a rough exclamation and takes the coin with a satisfied grin, declaring it a pleasure to do business.</p>
      <p>When you return to the Church of Saint Adama Landama, Marques asks if you have brought what he requested, then pauses as though a thought has struck him and asks you to wait. Moments later, his confidence collapses into disquiet—repairing the device was easy, he says, but the strange sensation inside him remains unresolved.</p>
      <p>Marques cannot understand how he did it at all. He stares at his hands and says they moved with a will of their own, deftly working the clockwork mechanisms without doubt or uncertainty. He knew exactly what to do, as if he had repeated the same motions countless times before, and that realization frightens him.</p>
      <p>Apologizing to you, Marques calls the whole thing a mistake and asks you to give the horologe to Sister Eluned instead. The man who once owned it is currently in her care, he explains, and he thinks it best that the device be returned to him.</p>
      <p>When you bring the horologe to Eluned, she greets you and asks whether you have come to pay respects to the man. She studies the device with open astonishment, admitting she has never seen anything so strange, and confirms your explanation that it measures the passing of time. She wonders if such things are more common in Garlemald, having heard its cities are filled with remarkable technologies.</p>
      <p>Eluned grows uneasy when she hears Marques said it belonged to the deceased, and she voices the troubling thought that the owner might have been a Garlean spy—perhaps they should notify the authorities at Camp Drybone. Yet another question weighs on her even more: how did Marques manage to repair it? She knew he had talent for the trades, but this seems far beyond mending fences and thatching roofs.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Marques <small class="muted">Eastern Thanalan (X:11.2, Y:21.3)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="all-good-things.html">All Good Things</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 35 or above)</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="bringing-out-the-dead.html">Bringing out the Dead</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'止まったままの時間',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>マルケスはあなたに声をかけ、少し時間をもらえないかと遠慮がちに切り出す。埋葬のために運ばれてきた男の懐から壊れた携帯時計が見つかったのだという。見覚えのあるような、説明できない感覚があるが、何がそうさせるのかはわからない。ならば自分でいじってみれば思い出すかもしれない、と彼は言う。</p>
      <p>だが作業に必要な道具が手元にないため、代わりにキャンプ・ドライボーンへ行って先の尖ったタガネと精密用のペンチを手に入れてほしいと頼まれる。金細工師がよく使う道具だから、まずはそうした者に尋ねるのがよいだろう、とマルケスは見当をつける。</p>
      <p>費用をあなたに負担させるつもりはないと言って、マルケスは財布を手渡し、それで足りるはずだと念を押す。頼みごとをすること自体に気後れしているのか、もし自分にできることがあれば遠慮なく言ってほしい、と小さく付け加える。</p>
      <p>キャンプ・ドライボーンで行商の金細工師に用件を伝えると、先の尖ったタガネと精密用のペンチは安くないぞ、とまず釘を刺される。それでも支払いを差し出すと、乱暴な独り言めいた叫びとともに十分だと認め、にやついた笑みで取引成立だと言わんばかりに受け取る。</p>
      <p>教会へ戻り、道具を持ってきたかとマルケスに問われた直後、彼は何かを思いついたように少し待ってほしいと言う。やがて戻ってきた彼は、装置の修理自体はたやすかったのに、胸の奥でざわめく感覚は結局謎のままだった、と落ち着かない様子で告げる。</p>
      <p>なぜ自分が修理できたのか――マルケスはそれすら説明できない。自分の手が勝手に動き、歯車仕掛けを巧みに扱っていた、と彼は言う。迷いも不安もなく、何をすべきかが最初からわかっていた。まるで同じ動きを幾度となく繰り返してきたかのように。</p>
      <p>マルケスは慌てて謝り、これは間違いだったと口にして、携帯時計はシスター・エルネッドに渡してほしいと頼む。かつての持ち主は彼女のもとで保護されているから、本人へ返すのがいちばんだろう、と言うのだった。</p>
      <p>携帯時計を受け取ったエルネッドは、丁寧に挨拶し、あなたがこの男に弔意を示しに来たのかと問いかける。彼女はその装置を見て、これほど奇妙なものは見たことがないと言い、あなたの説明で時間の経過を測る道具だと知って驚く。ガレマール帝国ではもっと一般的なのかもしれない、都市には驚くべき技術が満ちていると聞く、と彼女は語る。</p>
      <p>だがそれが遺体の持ち物だったと聞くと、エルネッドは不安を口にする。持ち主が帝国の密偵だった可能性もあるのではないか、キャンプ・ドライボーンの当局に知らせたほうがよいかもしれない、と。さらに彼女は、別の疑問に心を奪われる――マルケスはどうやってこれを直したのか。彼に職人仕事の才があるのは知っていたが、柵の修繕や屋根の葺き替えどころの話ではない、と。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> マルケズ　<small class="muted">東ザナラーン (X:11.2, Y:21.3)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="all-good-things.html">灯りの消えた日</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 35～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="bringing-out-the-dead.html">静かなる葬送</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'靜止的時間',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Marques 有些遲疑地向你開口，請你撥一點時間給他。一名被送來安葬的男子身上，被人發現了一只損壞的時計裝置（horologe）；那東西讓他隱約感到熟悉，卻又說不出原因。他想，也許只要親手把裝置拆開、動一動手，答案就會自己浮上來。</p>
<p>可他缺少合適的工具，於是請你代他前往 Camp Drybone，買回一把尖鑿（bull-point chisel）和一把尖嘴鉗（needle-nose pincers）。他說這些是金工師常用的工具，或許去找他們詢問最合適。Marques 立刻表明不會讓你自己掏錢，並把一個錢袋（coinpurse）交到你手上，說這應該足夠支付費用；臨了，他又低聲補上一句——如果你有任何需要他幫忙的地方，儘管開口。</p>
<p>你到 Camp Drybone 找上 Traveling Goldsmith，對方一聽你要尖鑿和尖嘴鉗，立刻提醒你這些工具可不便宜。可當你拿出錢袋準備付款時，他嘴上粗聲咒罵了一句，隨即又改口說金額足夠，笑得滿意，爽快地把工具交給你，還說這筆生意做得痛快。</p>
<p>你把工具帶回 Church of Saint Adama Landama，Marques 問你是否已經帶齊他要的東西，接著像是突然想到什麼，請你先在原地等一下。片刻後，他的語氣卻變得不安——他說時計裝置修得很輕鬆，但那股在心底翻攪的熟悉感依舊無法解釋。</p>
<p>更令他困惑的是「自己究竟怎麼做到的」。Marques 盯著自己的雙手，說那雙手彷彿不受他控制，卻能靈巧地擺弄時計裝置的齒輪結構；沒有任何遲疑與不確定，他從一開始就知道該怎麼修，像是同樣的動作早已做過無數次。這份確信反而讓他害怕。</p>
<p>他匆忙向你道歉，說這一切是個錯誤，並請你把時計裝置交給 Sister Eluned。Marques 說，這東西原本的持有人如今在她那裡接受照顧，他認為最好把裝置還給對方。</p>
<p>你把時計裝置交給 Eluned 時，她先向你道晚安，問你是否是來向那名男子致意。她看著裝置，坦言從未見過如此古怪的東西；當你說這是用來測量時間流逝的器具時，她更顯得驚訝。她猜想也許在 Garlemald 這類裝置更常見，因為她聽說那裡的城市充滿各種令人稱奇的技術。</p>
<p>然而得知這是死者的物品後，Eluned 立刻浮現憂慮——她忍不住懷疑持有人是否可能是 Garlemald 的間諜，或許應該通知 Camp Drybone 的相關人員。但她又把話轉向另一個更難忽視的疑問：Marques 究竟是怎麼修好它的？她知道他手作很有天分，可這種程度已遠遠超出修籬笆、補屋頂那一類的本事。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 馬爾克斯　<small class="muted"> 東薩納蘭 (X:11.2, Y:21.3)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="all-good-things.html">陰雲籠罩</a></div>
      <div class="row">所有職業（不含限定職） 等級 35 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="bringing-out-the-dead.html">寂靜的葬送</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
