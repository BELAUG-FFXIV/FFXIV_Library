  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;
  overflow-y:auto;
  padding-right:8px;
  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}

    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`Where We Are Needed`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Minfilia calls you over with an apologetic look. She admits she still hasn’t been able to keep her promise to provide Hoary Boulder with a capable adventurer—and though escort work is plainly beneath someone of your talents, she has no one else to ask. She asks if you will forgo your rest and help just this once.</p><p>She explains the task’s purpose: the Scions employ scholars to travel across Eorzea taking aetheric readings, so they can better understand the impact of primal summonings. To keep those scholars safe, adventurers in Scion service escort them along their routes. One of the intended escorts has been injured, and you are needed to fill the gap.</p><p>Outside, Coultenet greets you with surprise and immediate contrition for involving you personally. Hoary Boulder, however, can barely contain his enthusiasm—overjoyed that you’ve agreed, and determined to treat their misfortune as a blessing. Coultenet brings the focus back to reality: three scholars will be traveling separately, each on a different route.</p><p>Hoary Boulder gives you your assignment. You will accompany the scholar surveying the South Shroud, who is waiting at Camp Tranquil. Your role is simple: follow where the scholar leads, stand watch, and ensure nothing interrupts the taking of readings.</p><p>At Camp Tranquil, the scholar meets you with clipped impatience and wastes no time on pleasantries. You are sent straight to Issom-Har, where the scholar calibrates instruments and demands silence and distance while measurements are taken—leaving you to keep watch as hostile presences close in. When it is done, the scholar offers only a curt assessment: acceptable results, though you might dispatch your foes more quietly next time.</p><p>The route continues to Snakemolt, where the scholar again sets to work while you fend off danger. When the readings come in, the scholar’s tone shifts—uneasy at results that are nothing like expected, and disturbed by a strange, almost blasphemous air in the area. The scholar insists you leave at once for Rootslake, for there is one final site to survey.</p><p>At Rootslake, the pattern repeats: the scholar works, and you keep threats at bay. Just as the scholar begins to speak of the data’s value, a sudden stench stops everything—an accusation flung at you, and an immediate demand to return to Camp Tranquil before clothes are ruined by blood and offal. Back at camp, the scholar remarks that you lingered longer than necessary, but admits that the unexpected privacy allowed for a cursory analysis: there appears to have been a measurable decrease in Eorzea’s ambient aether concentrations since the Calamity—though more measurements will be needed before the conclusion can be confirmed.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Minfilia <small class="muted">(The Rising Stones, X:6.1, Y:5.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="administrative-decision.html">Administrative Decision</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-least-among-us.html">The Least among Us</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'護衛任務の代役',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ミンフィリアは、ホーリー・ボルダーに「腕利きの冒険者を手配する」と約した件を思い出したように語り、しかし未だそれを果たせていないと詫びる。あなたほどの実力者に護衛任務は相応しくないと承知しつつ、それでも今は頼れる者が他におらず、休む間もなく力を貸してほしいと願い出る。</p><p>任務の意義として、暁の血盟はエオルゼア各地に学者を派遣し、プライマル召喚が乙太に与える影響を知るための計測を続けていると説明される。学者の安全を確保するため、暁に属する冒険者が護衛として同行するのが常であり、本来その役目を担うはずだった冒険者が負傷で任務に就けないため、あなたに代役を頼みたいのだという。</p><p>外に出ると、クルトゥネはあなたが自ら同行することに驚き、巻き込んでしまったことを深く詫びる。ホーリー・ボルダーは一転して大喜びし、不運が祝福へ変わったと言わんばかりに、あなたと共に務められることを誇らしげに語る。だがクルトゥネは、護衛すべき学者が三名おり、それぞれ別の経路を取るという現実を改めて確認する。</p><p>ホーリー・ボルダーはあなたの担当を告げる。あなたは黒衣森：南部森林を調査する学者に同行し、キャンプ・トランキルで合流する。学者が計測地点を定めるので、あなたは後に続き、作業の妨げとなる脅威を排し続けることになる。</p><p>キャンプ・トランキルで待っていた学者は、あなたを迎えても愛想はなく、まずはイソム・ハーへ急ぐよう促す。現地で学者は機材の調整を始め、計測中は口を挟まず距離を保ち、野獣に備えて見張れと命じる。やがて危険が迫り、あなたがそれを退けた後、学者は任務が滞りなく終わったことだけを認めつつ、次からはもっと静かに片付けるよう不満を漏らし、次の地点へ向かう。</p><p>次は蛇殻林で同じく計測が行われ、あなたは周囲の脅威に対処する。ところが結果を確認した学者は、予想外の数値に目を凝らし、この地に漂う不気味で冒涜的ですらある気配に言及して、早々に立ち去ることを決める。そして最後の調査地点としてルーツレイクへ向かうよう告げる。</p><p>ルーツレイクでも学者は作業を続け、あなたは護衛を務める。学者が得られたデータの価値を口にしかけたその時、鼻をつく悪臭に顔をしかめ、あなたが背後で何かを屠ったのではないかと疑いをぶつける。服に臭いが移ることを嫌がり、急いでキャンプ・トランキルへ戻るよう命じる。戻った学者は、あなたが余計に長く留まったと皮肉を言いつつも、その間に簡易分析を済ませたと告げ、霊災以後、エオルゼアの周囲に満ちる乙太濃度が測定可能なほど低下している可能性を示す。ただし結論には至らず、追加の計測が必要だと締めくくる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ミンフィリア <small class="muted">（石の家, X:6.1, Y:5.2）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="administrative-decision.html">タタルの決意</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-least-among-us.html">神経質な追加調査</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'臨時護衛',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Minfilia 帶著歉意叫住你。她說，自己曾答應要替 Hoary Boulder 找到一位可靠的冒險者，但至今仍未能做到。她也明白，像你這樣的實力，護衛任務確實有些委屈——可眼下她實在無人可求，只能請你先放下休息，幫忙頂上這個缺口。</p><p>她接著說明任務的分量：Scions of the Seventh Dawn 長期雇用幾名學者在 Eorzea 各地量測乙太讀數，以便更清楚理解 primal 召喚對乙太環境造成的影響。為了確保人員安全，Scions 會安排旗下的冒險者擔任護衛；原本負責同行的其中一位冒險者因傷無法出勤，所以這次只能拜託你代為前往。</p><p>你走到外頭，Coultenet 看到你親自出面，立刻又驚又慚，連聲道歉說不該把你牽扯進來。Hoary Boulder 卻滿臉喜色，像是把這場意外當成難得的機會，興奮地說能與你並肩執勤是莫大的榮幸。Coultenet 仍不忘提醒現實：需要護送的學者一共有三名，而且各自要走不同的路線。</p><p>Hoary Boulder 把你的任務交代清楚：你要負責陪同調查 South Shroud 的那位學者，他正在 Camp Tranquil 等你會合。接下來你只需要跟著學者行動——由他決定最適合量測的位置，而你要做的就是保持警戒，確保他的工作不被任何野獸或突發狀況打斷。</p><p>到了 Camp Tranquil，學者對你毫不客氣，甚至連寒暄都不願浪費時間，直接催你前往 Issom-Har。抵達後，學者一邊校準儀器，一邊冷冷要求你保持距離、別出聲，也別讓任何干擾靠近；你只能站在一旁守望，直到危險逼近、你出手排除威脅。等學者完成量測，他只淡淡承認結果尚可，卻又挑剔你動手太吵，接著便催你立刻前往下一處。</p><p>下一站是 Snakemolt。學者照樣埋首於量測，你照樣負責清除靠近的威脅。然而這次結果讓學者顯得不安——數據與預期完全不同，他甚至提到此地瀰漫著一種古怪、近乎褻瀆的氛圍，堅持立刻離開，改去 Rootslake 進行最後一處調查。</p><p>在 Rootslake，學者再次開始量測，你繼續盡責守衛。學者正要說這些數據將派上大用時，卻忽然皺眉嗅到一股惡臭，怒斥你是不是趁他不注意宰了什麼東西，讓血腥與臟腑的味道沾滿四周。為了不讓衣物染上臭味，他催你立刻回到 Camp Tranquil。回程後，學者嘲諷你似乎又多逗留了一會兒，但也表示自己趁那段時間做了初步分析：自靈災以來，Eorzea 周遭的環境乙太濃度似乎確實出現了可被量測的下降——只是這份資料仍不足以定論，接下來還需要更多量測來確認他的判斷。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 敏菲利亞 <small class="muted"> 石之家（X:6.1, Y:5.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="administrative-decision.html">塔塔露的憂鬱</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-least-among-us.html">乙太學者的再次調查</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
