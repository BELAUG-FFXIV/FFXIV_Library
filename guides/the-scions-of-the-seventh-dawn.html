<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'The Scions of the Seventh Dawn',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>In the Quicksand, you linger by the counter as Momodi eyes you with a half-exasperated, half-fond look. She jokes that if she painted “CERTAIN DEATH” on one door and “LIMITLESS WEALTH” on another, most adventurers would charge straight into the first—especially the ones from Ul’dah. Even so, she can see you’re set on your path, and after warning you not to say she didn’t, she answers the question you came to ask. The “Scions of the Seventh Dawn,” she says, are people you can trust—good folk who have made it their mission to tackle some of Eorzea’s most pressing problems. It’s no small task, so they’re always looking for dependable souls to stand with them…souls like you. She has permission to tell you where to find them, but makes you promise to keep that knowledge to yourself, for it’s the sort of secret Eorzea’s enemies would dearly love to learn. Their headquarters lies in Vesper Bay in western Thanalan, in a place called the Waking Sands. All you need do is give your name at the entrance, and they’ll let you in. As you turn to go, Momodi reminds you that you’re now a man in demand, with busy days ahead, but she hopes you won’t forget those who helped you become the adventurer you are. She tells you to drop by from time to time and let them know how you’re faring, then sends you on your way.</p>
      <p>Your journey carries you across Thanalan to the shores of western sands, where Vesper Bay and the Waking Sands await. Stepping inside the quiet hall, you hear a clear, slightly off-key voice singing a playful song about a lonely flower blooming in the desert of the heart, yearning for the heavens above. When you move closer, Tataru jumps with a yelp, flustered to find you listening. Coughing to recover her composure, she reminds you that this is private property and that anyone without business here should leave at once—until you mention you have come at the behest of Yda and Papalymo. At that, her eyes widen, and she hurriedly asks your name. She checks her records, finds you listed, and straightens up to greet you properly. With a formal little bow, she welcomes you to the Waking Sands, headquarters of the Scions of the Seventh Dawn, and introduces herself as Tataru, who looks forward to assisting you during your time with them. She explains that the Antecedent awaits you downstairs in the solar and goes to inform her of your arrival. When you are ready, she reminds you that you may enter whenever you wish. At the doorway below, a Scion greets you by name, explains that Lady Minfilia has eagerly awaited your coming, and bids you follow as you are escorted into the solar.</p>
      <p>Inside the chamber, Minfilia rises to meet you, her gaze calm yet shining with quiet relief. She greets you as the adventurer of whom she has heard so much, and introduces herself as Minfilia, leader of the Scions of the Seventh Dawn. She tells you that she has awaited your coming, and that, after five long years, you have returned to them just as Louisoix said you would. Words cannot express the joy she feels in this moment, she says, before welcoming you home. She assures you that she remembers you and everything you fought for, and that you have not been forgotten. If Louisoix is watching, as she chooses to believe, she is certain he may now rest in peace, his mission finally fulfilled. She bids you be at ease, reminding you that you are among friends here. No doubt, she says, you are overflowing with questions, but she asks for your patience and promises that all will be revealed in time. For now, she begins with the simplest thing: who they are, and what they do.</p>
      <p>Minfilia explains that the Scions of the Seventh Dawn are an order that stands above political boundaries, dedicated to preserving the future of Eorzea. Among their gravest concerns, she tells you, are the godlike beings known as primals. Their very existence is a bane upon Eorzea—nay, upon the world itself—and the Scions have long sought a lasting way to address the threat they pose. Within their ranks are individuals who, like you, possess a rare and special talent. This talent can take many forms, yet there is one manifestation in particular that interests them most, and it is that which she now turns to describe.</p>
      <p>She asks if you have ever felt a sudden and inexplicable loss of consciousness, or the strange sensation of being pulled away from reality—of floating in empty space, a mind without a body. These, Minfilia says, are all signs of your talent. Yours is the power to transcend the boundaries of the soul, a power known as the Echo. Through the Echo, you can pass through the walls of another’s soul and hear the resonations of his past. You stand within his memories and see what he saw; you may even interact with the vision, though you cannot alter the outcome of events. As another blessing, the Echo allows you to understand a man’s mind even when his spoken words are beyond your comprehension. In short, it is a truly extraordinary power—and within you, that power shines strong. Yet, she adds, it is a gift they cannot call upon whenever they please. With a faint smile, she reveals that she, too, possesses the Echo.</p>
      <p>Having established this, Minfilia returns to the subject of the primals. So long as they exist, she says, the realm will not be able to take even a single step toward true peace. Measures must be taken that transcend every boundary—of faction, race, language, and creed alike—and to make such measures possible, the Scions require the help of those who share this rare talent. Make no mistake, she warns: the Echo will be instrumental in addressing the primal threat. Without it, there can be no hope of saving the realm. She admits that she does not know what you desire for yourself, nor what first drew you to Eorzea, but she firmly believes that the power you share was given for a purpose. Why else, she asks, would the gods entrust mortals with a gift so extraordinary, if not that they should use it? And so, in earnest, she implores you to lend the Scions your power.</p>
      <p>When the solemn words fade, Minfilia assures you that your aid will not go unrewarded. The Scions are fortunate, she says, to have the support of several influential allies, and at a word from her, they are prepared to grant you certain privileges that others might never enjoy. One such privilege is the right to employ retainers—individuals who can be relied upon to manage your belongings and assets on your behalf. At that moment, Tataru arrives with a stack of documents, responding cheerfully when Minfilia thanks her. By way of a welcoming gift, Minfilia explains that she has already taken the liberty of adding your name to the retainers’ registry, making you eligible from this moment forward to make use of their services. You will need to consult a retainer vocate to learn the finer details, but she assures you that retainers will prove invaluable in your life as an adventurer. Let this small gesture, she says, stand as proof of the Scions’ resolve to support your own personal objectives. In return, they ask only that you assist them to the fullest extent of your talents. It is a mutually beneficial relationship, she believes, one that serves not just you and the Scions, but the greater good besides. With a rueful smile, she apologizes for subjecting you to such a lengthy lecture, but explains that it is important for everyone involved to understand what is expected of them. Now that you know their purpose and what they can offer, she invites you to take time to consider joining them, and promises that whatever decision you come to, you may share it with her without fear of censure. As a gesture of good faith, she entrusts you with the order’s password—“wild rose,” the phrase the Scions use to identify one another when afield—and asks that you keep it safe.</p>
    </div>

  JP:{
    langLabel:'日本語',
    pageTitle:'暁の血盟',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ウルダハの酒場「クイックサンド」で、あなたはカウンター越しに話を聞きながら、モモディの苦笑まじりの視線を受けていた。もしひとつの扉に「確実な死」、もうひとつに「限りない富」と書いてあったとしても、十人中九人の冒険者は迷わず前者を選ぶだろうし、残る一人はウルダハの人間だから優柔不断で決められないに違いない──彼女はそんな冗談を交えつつ、危険な道に首を突っ込もうとするあなたを牽制する。それでも、本気で知りたがっていることはよく分かっていて、「後で文句は言わないでおくれよ」と前置きしながら、「暁の血盟」について語り始める。彼らはエオルゼア各地で起きている差し迫った問題に立ち向かう、信用できる集団だという。決して軽くない使命ゆえ、いつも頼れる仲間を探しており……今では、あなたのような冒険者にも期待を寄せているのだと。モモディは、彼らの本拠がどこにあるか話してよい許可を得ているが、その情報はエオルゼアの敵が何としても手に入れたい代物だから、絶対に他言しないと約束してほしいと念を押す。暁の本部は西ザナラーンの港町ベスパーベイにある「砂の家」であり、入口で名前を告げれば中へ通されるだろうと教えてくれる。立ち上がるあなたに向けて、彼女は今やあなたが引く手あまたの存在で、これからは忙しい日々が続くだろうと語りつつ、ここまで育ててくれた人たちのことを忘れないでおくれ、と穏やかに願う。たまには顔を見せて、無事にやっていると知らせておくれ──そんな温かい言葉で背中を押しながら、モモディはあなたを送り出す。</p>
      <p>やがて、あなたはザナラーンの砂漠を越え、西の海辺にあるベスパーベイへと辿り着く。その一角に建つ「砂の家」の扉をくぐると、静かな建物の中に、どこか調子っぱずれな歌声が響いているのが聞こえてくる。砂漠の心に咲く孤独な花が、天を仰いで誰かを慕う──そんな歌詞を口ずさみながら帳簿に向かっているのは、受付を任されているタタルだ。そっと近づいたあなたの気配に、彼女は思わず悲鳴を上げて飛び上がり、慌てて咳払いをして取り繕うと、ここは私有地なので用のない者はお引き取りを、と精一杯の威厳を込めて告げる。ところが、あなたがイダとパパリモの紹介でここを訪れたのだと明かすと、タタルの表情は一変し、慌ててあなたの名前を尋ねて名簿を繰り始める。記録の中にあなたの名を見つけると、彼女はきちんと姿勢を正し、ここが暁の血盟の本拠「砂の家」であることをあらためて紹介しながら、あなたを歓迎する。自分はタタルと名乗り、この場所で共に過ごすあいだ、できるかぎりあなたの力になりたいと告げると、地下の執務室で「アンテセデント」があなたを待っていると説明し、先に知らせてくると駆けていく。準備が整ったときには、いつでも階段を降りて執務室に入ってきてほしい──そう言い残されたあなたは、地下へ続く石段を下り、扉の前で待つ暁の構成員から声をかけられる。彼はあなたが到着したという知らせを受け取っており、ミンフィリアが心待ちにしていると告げて、室内へと案内する。</p>
      <p>部屋に足を踏み入れると、ミンフィリアが静かに立ち上がり、あなたを迎えた。その瞳には穏やかさと、どこか長い時を越えた安堵が宿っている。彼女はこれまで数多く耳にしてきた「評判の冒険者」が、まさにあなたであることを確かめ、自らが暁の血盟を率いるミンフィリアであると名乗る。そして、あなたの来訪を長いあいだ待ち続けていたのだと静かに告げる。あの第七霊災から五年──あなたは賢人ルイゾワが言い残した通り、再び彼女たちの前に姿を現したのだと。今この瞬間の喜びは、言葉ではとても言い尽くせない、とミンフィリアは微笑み、あなたに向かって「おかえりなさい」と語りかける。かつてあなたが何のために戦い、何を守ろうとしたのか、彼女は今もはっきりと覚えており、その想いが決して忘れ去られてはいないのだと約束する。もしルイゾワがどこかでこの光景を見守っているのだとすれば、今こそ彼の使命は果たされ、安らぎを得ているに違いない──彼女はそう信じているのだと続け、ここでは肩の力を抜いてほしいと諭す。ここにいる者は皆、あなたの味方なのだと。胸の内には疑問が山ほどあるだろうが、焦らず構えてほしい、すべてはいずれ明らかになる──そう前置きし、まずは暁の血盟という組織の素性と役目から語り始める。</p>
      <p>ミンフィリアは、暁の血盟がいかなる国家にも属さない超然とした組織であり、その唯一の目的はエオルゼアの未来を守ることにあると説明する。その中でも、彼らが最も深刻な脅威と見なしているのが「蛮神」と呼ばれる神格存在だ。蛮神の存在はエオルゼアにとって──いや、世界全体にとっての災いであり、暁はその脅威に対して恒久的な解決策を見いだすべく、これまで尽力してきたのだという。そして、この組織には、あなたと同じように稀有な「力」を持つ者たちが集っていると続ける。その力の現れ方はさまざまだが、なかでも彼女たちが特に注目しているひとつの在り方があり、今から語るのはまさにそのことだ。</p>
      <p>ミンフィリアは、あなたに問いかける。理由もなく突然意識を失ったことはないか。現実から引き離されるような感覚に襲われ、身体を失った意識だけが虚空に浮かんでいるように感じたことはないか、と。それらはすべて、あなたの「力」がもたらす現象なのだと彼女は言う。あなたに備わったのは、魂の境界を越える力──いわゆる「超える力」であると。超える力を通じて、あなたは他者の魂の壁を抜け、その過去に響く残響を聞くことができる。その者の記憶の中に立ち会い、彼の目に映った光景を自らの目でなぞることになるだろう。そこに干渉することさえできるかもしれないが、出来事そのものの結末を変えることは決して叶わない。また、超える力は、言葉が通じなくとも心を通わせる恩恵をもたらす。相手の言語を理解できなくても、その心の内を知ることができるのだ。要するに、それは実に特別な力であり、その力があなたの中でとりわけ強く輝いているのだとミンフィリアは告げる。ただし、この祝福を好きなときに自由に使えるわけではないとも落ち着いた口調で付け加える。そして、彼女自身もまた同じ超える力を持っているのだと、静かに打ち明ける。</p>
      <p>ひととおり説明を終えたミンフィリアは、話題を再び蛮神へと戻す。蛮神が存在するかぎり、この世界が真の平和へ一歩踏み出すことはない──そう断じたうえで、その脅威に立ち向かうには、国家や種族、言語、信仰といったあらゆる境界を越えた「手立て」が必要になると語る。そして、そのためには、あなたのように超える力を持つ者の協力が欠かせないのだと。超える力は、蛮神問題に対処するうえで要となる力であり、それなくしてはこの世界を救うことなど望むべくもない──彼女はそう断言する。あなた自身が何を望み、どのようなきっかけでエオルゼアにやって来たのか、ミンフィリアは知る由もない。だが、それでもなお彼女は、この力が何らかの「目的」をもって授けられたものだと信じている。神々が人にこれほどまでに特別な力を託したのだとすれば、それは使うため以外に考えられないではないか──そう問いかけるように微笑み、最後に真摯な眼差しで、どうかその力を暁のため、そして世界のために貸してほしいと、あなたに懇願する。</p>
      <p>やがて、ミンフィリアの声色は少し柔らかくなり、あなたの協力が決して見返りのない犠牲にはならないと伝える。暁は幸運にも、いくつもの有力な協力者に恵まれており、彼女がひと言頼めば、あなたに対して特別な便宜を図ってくれるだろうと。たとえば、「リテイナー」と呼ばれる人物を雇う権利が、それにあたる。リテイナーは、冒険者に代わって荷物や資産を管理してくれる頼れる存在だと説明しているところへ、書類を抱えたタタルが部屋に入ってくる。ミンフィリアが礼を述べると、タタルは嬉しそうに応じ、そそくさと退出していく。その背中を見送りながら、ミンフィリアは、暁からの歓迎のしるしとして、すでにあなたの名前をリテイナー登録簿に加えておいたと告げる。これにより、あなたは今この瞬間からリテイナーのサービスを利用する権利を得たのだと。詳しい手続きについては、都市にいるリテイナー仲介人から説明を受けてほしいが、冒険者として活動していくうえで、きっと大きな助けになるだろうと保証する。このささやかな贈り物は、あなた自身の目的を叶えるためにも、暁ができるかぎり力を尽くすという意思表示でもあるのだと続け、その代わりとして、あなたにもその才覚を最大限に発揮してほしいと願いを託す。きっと互いにとって有益であり、ひいては世界のためにもなる関係になれるはずだと、彼女は穏やかに微笑む。長々とした話になってしまったことを詫びつつも、互いに何を期待しているのかを理解しておくことはどうしても大切なのだと説明する。そして、暁の目的と提供できる支援を一通り伝え終えた今、あなたには時間をかけて加入するかどうか考えてほしいと告げる。どのような決断を下そうとも、遠慮なく自分に打ち明けてほしい──決して咎めることはしないと約束し、最後に善意の証として、暁の構成員たちが外で連絡を取り合う際に用いる合言葉を教える。それは「ワイルドローズ」という言葉だ。ミンフィリアはどうかこの合言葉を胸に刻み、慎重に扱ってほしいと静かに言葉を結ぶ。</p>
    </div>

    story:`<div class="clamp" data-collapsed="true">
      <p>在 Ul’dah 的酒館「The Quicksand」裡，你靠在吧檯邊，聽著 Momodi 用半是無奈、半是寵愛的眼神看著你。她打趣地說，如果她在一扇門上寫著「必死無疑」，另一扇門寫著「無盡財富」，十個冒險者裡頭大概有九個會毫不猶豫衝進前者，而剩下那個因為是 Ul’dah 人，優柔寡斷到根本選不出來。即便如此，她看得出你已經下定決心，於是在先撂下一句「可別說我沒事先警告你」之後，才正式回答你真正想問的事。那些被稱為「Scions of the Seventh Dawn」的人，她說，是可以信任的對象──一群把解決 Eorzea 最棘手問題當成使命的人。這種任務談不上輕鬆，所以他們總是在尋找可靠的夥伴，像你這樣的冒險者，自然也在他們的考慮之中。Momodi 告訴你，她已經得到允許，可以把他們的所在位置告訴你，但同時也要你保證把這件事藏在心裡，因為這是 Eorzea 的敵人做夢都想得到的情報。她說，Scions 的本部位在 Western Thanalan 的 Vesper Bay，名叫「The Waking Sands」的建築裡。只要你在入口報上自己的名字，就會被准許進入。臨走前，她又補充了一句，說現在的你已經是「炙手可熱」的人物，接下來的日子一定少不了忙碌，可就算如此，她仍希望你不要忘記那些一路幫你走到這裡的人。有空就回來跟大家說說近況吧──在這樣溫暖又帶點調侃的叮嚀中，她把你送出了酒館。</p>
      <p>你依照指引穿越 Thanalan 的沙漠，一路來到西邊海岸的 Vesper Bay，The Waking Sands 靜靜佇立在乾燥的海風之中。推門而入時，寂靜的建築裡正迴盪著一段清亮卻有點跑調的歌聲：唱的是在沙漠之心盛開的孤單花朵，抬頭仰望天空，渴望那遙不可及的思念。循著歌聲走近時，站在櫃檯後方的 Tataru 被你的靠近嚇得猛地一跳，發出一聲短促的驚呼，慌忙咳了兩聲想挽回氣勢，接著板起臉，提醒你這裡是私人領地，如果沒有正當理由，就必須立刻離開。你這才說明自己是受 Yda 和 Papalymo 的託付而來，她的表情一下子變得慌張，急忙向你詢問姓名，然後翻開手邊的名冊逐一確認。當她在名單上找到你的名字時，便端正姿勢，再次以正式的態度向你介紹這裡──這裡是 Scions of the Seventh Dawn 的總部「The Waking Sands」，而她是 Tataru，會在你與他們共事期間盡可能提供幫助。她也告訴你，「Antecedent」正在地下的 The Solar 等待你，並表示會先去通報你的到來。等你準備好時，她提醒你可以隨時前往那間房間。順著階梯走下來，在 The Solar 前方，一名 Scion 的成員迎面向你打招呼，確認你的身分後，表示 Minfilia 一直期待著這一刻，接著便引導你走入那扇門後的房間。</p>
      <p>踏進房內，Minfilia 緩緩起身迎向你，她的目光沉穩，卻透著明顯的安心與喜悅。她先確認你就是那位流傳許久的冒險者，隨後以 Scions of the Seventh Dawn 的領袖身份自我介紹，並坦言自己早已期待這一刻多時。自那場災厄至今，已過了漫長的五年──你正如 Louisoix 當年所言，再次回到了他們身邊。她說，此刻胸中的喜悅難以用語言完全形容，隨後對你道出一句「歡迎回家」。她表示自己仍清楚記得你曾為了什麼而戰、又曾試圖守護些什麼，而這些努力並沒有被世人完全遺忘。如果 Louisoix 正在某處看著這一切，她相信他此刻終於能夠放下心來，安然休息，因為他的使命總算走向了結局。Minfilia 要你放鬆些，因為在這裡，圍繞在你身邊的全都是可以信賴的夥伴。她也知道你心中一定堆滿了問題，卻希望你能稍微按捺急切，因為所有答案終究會一一揭曉。眼下，她先從最基本的事情說起──關於這個組織是誰、又在做些什麼。</p>
      <p>Minfilia 向你說明，Scions of the Seventh Dawn 是一個超越國家與政治界線的組織，唯一的目標是守護 Eorzea 的未來。她提到，當中最令他們憂心的威脅之一，就是被稱為「primals」的神祇般存在。這些存在不只是 Eorzea 的災厄，甚至可以說是對整個世界的詛咒，因此 Scions 一直在尋找能夠從根本上解決這道威脅的長久之策。她接著說明，這個組織中聚集了許多與你一樣，擁有稀有特殊能力的人。這種力量的外在表現千差萬別，但其中有一種形態特別受到他們關注，而她接下來要談的，就是你身上所展現出的那一種。</p>
      <p>她開始向你發問：是否曾在沒有任何明顯理由的情況下突然失去意識？是否曾感覺自己被什麼東西從現實中抽離，好像只剩下意識漂浮在空無一物的空間裡？Minfilia 說，這些感覺其實都是你所擁有力量的徵兆。你體內蘊藏著一種能跨越靈魂界線的能力──人們稱之為「Echo」。透過 Echo，你可以穿越他人靈魂的高牆，聽見他們過去留下的回音。你會置身於那個人的記憶裡，看見他曾看見的景象；甚至可能與那個畫面產生互動，只是無論如何，事件的結局永遠不會因此被改寫。除此之外，Echo 還賦予你另一種祝福：即便你聽不懂對方的語言，也能理解他的內心與意圖。總之，這是一種極為非凡的能力，而在你身上，這股力量顯得格外強烈。她同時也坦白，這並不是可以隨心所欲啟動的力量，是一份無法任意驅使的恩惠。Minfilia 接著露出淡淡的笑容，告訴你她自己同樣也擁有 Echo，與你分享著這份特別的命運。</p>
      <p>在確認這份共通點之後，Minfilia 再度把話題拉回 primals。她說，只要這些存在仍舊盤踞在世間，這片大地就無法真正邁出通往和平的第一步。要面對這樣的威脅，所需的措施必須跨越一切藩籬──無論是國家陣營、種族差異、語言隔閡，甚至信仰與價值觀的不同，都不能成為阻礙。為了實現那樣的行動，Scions 必須依靠那些同樣擁有 Echo 的人們。她毫不避諱地指出，Echo 將會是解決 primals 威脅的關鍵力量，沒有這股力量，想要拯救這個世界幾乎是不可能的。她承認自己並不知道你究竟想追求什麼，也不知道你最初是抱著什麼心情踏上 Eorzea 的土地，但她堅信，你們所擁有的力量並不是毫無理由地被賦予。神明若沒有其用意，又怎麼會把如此特別的恩賜交到凡人手中？正因如此，她以誠懇的眼神看著你，請求你把這份力量借給 Scions，與他們一同面對即將到來的試煉。</p>
      <p>說到這裡，Minfilia 的語氣柔和了些，表示你的幫助並不會成為毫無回報的犧牲。她說，Scions 很幸運，有數位極具影響力的盟友願意支持他們，只要她開口，這些人便願意替你爭取不少一般人難以享有的特權。例如，給予你雇用「retainer」的權利──那些可以代為管理行李與財產、在你冒險旅途中扮演得力助手的人。就在她說明到這裡時，Tataru 抱著一疊文件走進房間，Minfilia 向她道謝，她則愉快地回應，隨後便識趣地退出去。Minfilia 看著文件，告訴你，身為歡迎禮的一部分，她已經擅自先把你的名字加入 retainer 的登記冊，從現在開始，你就有資格正式雇用他們。關於具體的流程與規則，你需要親自去找 retainer vocate 詢問，不過她可以保證，retainer 將在你未來的冒險生活中發揮極大的作用。她說，這份小小的安排，也是 Scions 願意全力協助你實現個人目標的證明。作為交換，她希望你也能在自己的能力範圍內，盡可能協助他們。Minfilia 認為，這會是一種雙方皆能受惠、同時也能造福更廣大世界的關係。她最後露出有些不好意思的笑容，為自己說了這麼長一段話向你致歉，卻也強調，讓彼此都清楚了解對方的期待，是極為重要的一件事。如今你已經知道 Scions 的目的與他們能提供什麼樣的支援，她便邀請你花點時間好好思考是否願意加入。無論你做出什麼決定，都可以坦然告訴她，她絕不會因此責怪你。作為信任的象徵，她把 Scions 成員在外行動時彼此聯絡所使用的暗號交給你──那是「wild rose」這個詞。Minfilia 要你務必牢記於心，並小心守護這個秘密。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
