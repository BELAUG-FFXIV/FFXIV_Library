<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Work in Progress | BELAUG · FFXIV Library</title>
  <meta name="description" content="MSQ – Work in Progress (HW Patch 3.0)">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left">
        <a class="home" href="../index.html">🏠 Home</a>
      </div>
      <div class="right">
        <button id="langToggle" class="icon-btn" aria-label="切換語言">🌐 EN</button>
      </div>
    </nav>
  </header>

  <main class="container main">
    <div class="grid">
      <section class="card video-card">
        <div class="bd">
          <div class="video-wrap">
            <iframe id="ytFrame" src="https://www.youtube.com/embed/nfBOmOxj7eI"
              title="Work in Progress" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="hd" id="pageTitle">Work in Progress</div>
        <div class="tabs" role="tablist">
          <button class="tab-btn" role="tab" aria-selected="true"  data-tab="story">Story</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="acq">Acquisition</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="unlockq">Unlock Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="followq">Follow-Up Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="comments">Comments</button>
        </div>
        <div class="bd">
          <div id="panel-story"    class="tab-panel active"></div>
          <div id="panel-acq"      class="tab-panel"></div>
          <div id="panel-unlockq"  class="tab-panel"></div>
          <div id="panel-followq"  class="tab-panel"></div>
          <div id="panel-comments" class="tab-panel">
            <div id="giscus_container" style="min-height:320px;"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`Work in Progress`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>At Falcon’s Nest, the restoration continues under bitter conditions. Redwald tells you that several craftsmen in service to House Dzemael have been sent to aid in rebuilding the settlement, and though they are highly skilled in the work of raising and repairing fortifications, their efforts have not gone smoothly. Too many obstacles have slowed their progress, and the foreman, Rothe, is said to be in need of someone with your particular talents. So you are asked to seek him out and see what help you can offer.</p><p>When you find Rothe, he greets you with a mixture of suspicion and relief, only to brighten the moment he realizes you are the promised assistance. He explains that he has been sent here on one of the black chocobos, charged with overseeing the work, repairing what can be repaired, building what must be built, and directing others to do the same. Yet for all his practical experience, there is one thing that has pushed him to the edge of exasperation: the ice. It forms so quickly, so relentlessly, that even he can scarcely believe it.</p><p>To Rothe, there can be only one explanation. He is convinced that icicle sprites are lurking about the hamlet, hiding in pockets here and there, waiting for him to look away so they can creep out and undo the work. He insists with fierce certainty that they are real, and that if you keep watch long enough, you are bound to find them. Whatever others may think of his claim, he is in no mood to be laughed at. What he wants is simple: he wants you to search the area and put an end to the problem.</p><p>So you remain still and watch, giving the frozen air and silent ruins your full attention. Before long, that patience is answered. You sense a hostile presence nearby, and the uneasy feeling proves that Rothe’s fears were not wholly imagined. The hidden threat reveals itself at last, and you move to deal with it before it can continue troubling the restoration efforts.</p><p>When you return, Rothe takes one look at you and knows you have found your quarry. His frustration gives way to rough satisfaction, and he declares that you are exactly the sort of person needed in a place like this—the kind who does not wait to be cajoled when a task lies unfinished, but moves the instant there is work to be done. In a land as unforgiving as Coerthas Western Highlands, that kind of readiness is worth more than empty words.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Redwald <small class="muted">(Coerthas Western Highlands, X:32.6, Y:38.3)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="over-the-wall.html">Over the Wall</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 50</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-first-and-foremost.html">The First and Foremost</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'ゼーメル家の大工',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ファルコンズネストでは、厳しい寒さのなかで復興作業が続いていた。デゼマール家に仕える職人たちがこの地の再建に力を貸しており、城塞や防備の修繕と建設には確かな腕を持つ者ばかりだという。だが、その仕事は思うようには進んでいない。いくつもの問題が作業を妨げており、現場をまとめる職人頭が、あなたほどの力を持つ助力を必要としていると聞かされる。そうしてあなたは、その人物を訪ねることになる。</p><p>現場であなたを迎えた職人頭は、最初こそ訝しむような様子を見せるが、あなたが待っていた助っ人だとわかると、たちまち表情を変える。自分はここ一帯の修復を任され、黒チョコボで送り込まれてきたのだと、彼は荒っぽい口調で語る。壊れたものを直し、新たに必要なものを築き、人々にそのやり方を教える――それが自分の務めだ。だが、その経験をもってしても、この地の氷の張る速さだけはどうにもならない。あまりにも異様で、常識では考えられぬほどだという。</p><p>彼はその原因を、氷柱の精霊に違いないと信じて疑わない。あちこちに潜み、自分が目を離した隙を見て現れては、せっかくの仕事を台無しにしているのだと、半ば怒りにまかせるように言い切る。周囲にどう思われようと、彼にとってそれは妄想ではなく、現に対処すべき厄介ごとだった。だからこそあなたに、この集落を見回り、潜んでいるそれらを見つけて始末してほしいと頼む。じっと見張っていれば、きっと姿を現すはずだと、彼は強く言う。</p><p>あなたはその言葉に従い、凍てついた空気のなかで周囲を見張る。静まり返った集落に意識を澄ませていると、やがて敵意を帯びた気配が確かに伝わってくる。その瞬間、職人頭の訴えがただの思い込みではなかったことが明らかになる。隠れていた脅威はついに姿を現し、あなたは復興作業を妨げるその存在を退けるために動き出す。</p><p>戻ったあなたを見た職人頭は、ひと目で成果を察する。先ほどまでの苛立ちは満足げな力強さへ変わり、まさにこういう人間がここには必要なのだと、率直に言い切る。目の前に片づけるべき仕事があれば、ためらわずに飛びついて動ける者――その働きこそが、この過酷な西クルザス高地で前へ進むための支えになるのだと、彼はあなたを認めるのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> レッドワルド <small class="muted">（クルザス西部高地, X:32.6, Y:38.3）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="over-the-wall.html">鷹の巣</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-first-and-foremost.html">征竜将の彫像</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'Dzemael 家仍在進行中的工程',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>在 Falcon’s Nest，重建仍在嚴酷的寒氣中艱難進行。Redwald 告訴你，House Dzemael 派了幾名工匠前來協助修復這座據點。這些人原本就很擅長建造與修補防禦設施，可即使如此，眼前的工程還是被各種問題拖慢了腳步。而負責帶領這些工匠的 Rothe，正好需要一名擁有你這種本事的人幫忙。於是 Redwald 便請你去找他，看看自己能替這裡做些什麼。</p><p>等你見到 Rothe 時，他起初先帶著幾分懷疑打量你，可一聽見你正是大家答應派來的幫手，他立刻像是鬆了一口氣。他粗聲粗氣地告訴你，自己是被黑色陸行鳥送來這裡的，職責就是盯著這一整團爛攤子，該修的修、該建的建，還得指揮其他人一起做。可就算他再有經驗，也還是快被這裡的冰逼瘋了。那些寒霜凝結得快得不自然，簡直像是有人專門盯著他背後搞破壞一樣。</p><p>對 Rothe 來說，這件事只有一個解釋，一定是那些冰柱精靈在作怪。他斬釘截鐵地說，這座聚落裡到處都有牠們藏身的角落，只等著他一轉過身，就偷偷冒出來把一切弄得更糟。別人或許會覺得這話聽起來像胡說八道，可 Rothe 顯然不是在開玩笑。他只要你去巡查整個聚落，把這個麻煩徹底解決掉；只要站在原地盯得夠久，就一定能把那些東西抓出來。</p><p>於是你依照他的話，在寒風與冰雪之中靜靜守望四周。沉默的空氣裡沒有半點多餘聲響，可過了一段時間後，你確實察覺到了不尋常的敵意。那股帶著威脅的氣息終於證明，Rothe 的怒氣並不全然只是疑神疑鬼。潛伏在暗處的東西終究露出了馬腳，而你也隨即出手，把妨礙重建的威脅排除。</p><p>當你回到 Rothe 面前時，他只看了你一眼，便知道你已經找到了他想找的目標。原本那股滿腹牢騷的火氣，立刻變成了粗豪而乾脆的滿意。他毫不吝惜地認定，你正是這裡最需要的那種人，一看到事情還沒做完，就會立刻動起來，不需要別人反覆催促。在 Coerthas Western Highlands 這樣的地方，這種說做就做的可靠，比任何空話都來得珍貴。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Redwald <small class="muted">(庫爾札斯西部高地, X:32.6, Y:38.3)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="over-the-wall.html">越過高牆</a></div><div class="row">任一戰鬥／魔法職業（不含受限職業）Lv. 50</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-first-and-foremost.html">首要之務</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
