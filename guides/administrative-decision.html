const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`Administrative Decision`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Minfilia tries to send you toward a moment of rest, but Tataru bursts in with urgency—an Ul’dah messenger has delivered a sealed missive. Minfilia studies the royal seal, then finds it is an invitation: on behalf of the Council of the Eorzean Alliance, Her Royal Majesty Nanamo Ul Namo calls the Scions of the Seventh Dawn to a feast at the Royal Palace of Ul’dah, held in honor of Ishgard’s recent victory.</p><p>The words make Minfilia’s expression tighten. The Alliance leaders, she notes, refused to deploy their standing armies, choosing instead to send hastily gathered sellswords—many of whom died before the siege even began. She cannot help but find it strange that they would now seek a place at a celebration, as if to share in the glory of a triumph they would not truly shoulder.</p><p>Yet another possibility follows close behind her suspicion: perhaps they want a pretext to meet the Ishgardians while spirits are still high, and to press for Ishgard’s return to the Eorzean Alliance. With Moenbryda barely mourned and grief still raw, the thought of revelry rings hollow—but Minfilia steels herself. For the good of the realm, the invitation cannot be ignored.</p><p>Even the rest promised to you is set aside. Minfilia insists you attend as well; a celebration would look strange without the victorious hero present. She urges you to take comfort in the notion that such occasions can bring momentous change without bloodshed, then asks Tataru to contact the others—only to pause at the sound of Tataru’s sigh. Minfilia has never known her to sigh at such requests, and the unease lingers.</p><p>Concern turns into certainty. Minfilia asks you to speak with Tataru, convinced something troubles her, and fearing that direct worry from her would only be met with stubborn denials. When you look for Tataru, she is nowhere within the Rising Stones; F’lhaminn mentions she stepped outside and seemed preoccupied.</p><p>You find her in Revenant’s Toll, trying to laugh off the worry—insisting it is “nothing,” then admitting it is not nothing at all, only that it feels small beside the towering trials you face every day. The words come out in a rush, and then resolve hardens: she needs to speak with Minfilia before things worsen, and she clings to the brief exchange as if it has finally given her permission to act.</p><p>Back in the solar, Tataru asks Minfilia for time—not to rest, but to change. With adventurers and the Crystal Braves constantly thrown into deadly battles, and even Hoary Boulder and Coultenet moved from guard duty to fill the need for capable warriors, she declares it only right that she gain the power to defend herself—and others. When she returns, she vows, she will be both receptionist and bodyguard. At that moment Hoary Boulder staggers in, shouting in surprise at her determination, only to pivot into his own request: an adventurer meant to escort the scholars has been injured, and without at least one more guard they cannot properly protect those in their charge. Minfilia agrees to consider candidates and provide a replacement as soon as she can, and the room settles into the next set of duties—grief packed away, urgency taking its place once more.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Minfilia <small class="muted">(The Rising Stones, X:6.1, Y:5.2)</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="an-unexpected-ambition.html">An Unexpected Ambition</a></div><div class="row"><a class="link" href="where-we-are-needed.html">Where We Are Needed</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'タタルの決意',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ミンフィリアは、あなたに休息の機会を与えようとするが、タタルが慌ただしく駆け込み、ウルダハからの使者が書状を届けたと告げる。王家の封印に目を留めたミンフィリアは、それが招待状であることを読み取る。エオルゼア同盟評議会の名において、ナナモ・ウル・ナモ陛下が、イシュガルドの勝利を祝う宴へ暁の血盟をウルダハ王宮に招く、というものだった。</p><p>だが祝意の文面は、彼女の胸中を晴らさない。ミンフィリアは、同盟の指導者たちが常備軍の派遣を拒み、急造の傭兵団を送り出したことを思い返す。包囲戦が始まる前に多くが命を落としたにもかかわらず、今になって彼らが祝宴に連なるのは奇妙だ――あなたの勝利の栄光を分け合おうとしているのではないか、と。</p><p>しかし別の意図も見えてくる。勝利の余韻が残るうちにイシュガルド側と会い、機嫌の良い空気を口実にして、エオルゼア同盟への復帰を促すつもりなのかもしれない。ムーンブリダを悼む時間すら乏しいまま、浮かれて杯を交わす気分ではない。それでも、国のために悲しみを押し隠し、この場を利用しなければならない――ミンフィリアはそう自らに言い聞かせる。</p><p>約束されていたあなたの休みも、ここでは後回しになる。勝利をもたらした英雄が不在では不自然だとして、ミンフィリアはあなたにも出席を求める。こうした場が、血を流さずに大きな変化を呼び込むこともあるのだと伝え、タタルに仲間への連絡を頼む。だが返事のあとに漏れたため息に、ミンフィリアは引っかかりを覚える。彼女がこの種の頼みでため息をつくなど、これまでなかったのだ。</p><p>ミンフィリアは、タタルが何かを抱えていると確信し、あなたに声をかける。自分が心配を示せば、あの子はきっと強がって否定するだろう――だから代わりに話してほしい、と。ライジングストーンズで姿が見えないタタルの行き先を尋ねると、フ・ラミンが外へ出たばかりで、どこか気もそぞろだったと教える。</p><p>レヴナンツトールで見つけたタタルは、心配をかけるつもりはなかったと取り繕い、「大したことではない」と繰り返す。だが言葉はすぐに揺らぎ、あなたたちが日々直面する試練に比べれば小さく感じるだけだと打ち明ける。だからこそ、これ以上悪くなる前にミンフィリアに話さなくてはならないのだと決意し、短い会話に背中を押されたかのように、足早に戻っていく。</p><p>ソーラーでタタルは、ミンフィリアに「時間がほしい」と願い出る。休みたいのではなく、変わりたいのだと。冒険者やクリスタルブレイブ、そして暁の血盟が危険な戦いへ投げ込まれ、ホーリーボルダーとクルテネまで護衛任務から戦える人材として引き上げられている今、自分も身を守る力を得るべきだと語る。戻ったときには受付係としてだけでなく、護衛としても役に立ちたい――そう宣言した瞬間、ホーリーボルダーが驚きの声を上げて飛び込んでくる。だがすぐに用件を思い出し、護衛に加わるはずだった冒険者が負傷し、学者たちを守るにはもうひとりの護衛が必要だと訴える。ミンフィリアは候補を検討し、できるだけ早く補充すると約束し、場は次の務めへと押し流されていく。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ミンフィリア <small class="muted">（石の家, X:6.1, Y:5.2）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-steps-of-faith.html">イシュガルド防衛戦</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="an-unexpected-ambition.html">タタルの本気</a></div><div class="row"><a class="link" href="where-we-are-needed.html">護衛任務の代役</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'塔塔露的憂鬱',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Minfilia 正想讓你趁機喘口氣，Tataru 卻急急忙忙衝進來，喊著 Ul’dah 的使者送來一封書狀。Minfilia 看著王室封印，語氣一沉——那是一份邀請函：以 Eorzean Alliance 的議會名義，由女王 Nanamo Ul Namo 邀請 Scions of the Seventh Dawn 前往 Ul’dah 的 Royal Palace 赴宴，名義上是為了慶祝 Ishgard 最近的勝利。</p><p>邀請的字句並沒有讓 Minfilia 放鬆。她反而覺得荒謬：Eorzean Alliance 的領袖們拒絕動用常備軍，寧可派出倉促拼湊的傭兵隊伍，許多人甚至在圍城戰真正開始前就已經死去。如今卻又想坐上宴席、分享勝利的榮光——他們真的能如此厚顏無恥嗎？</p><p>可她也很快推測到另一個更「合理」的盤算：也許他們只是想趁著氣氛仍然歡騰，找個名目和 Ishgard 人碰面，藉機施壓，推動 Ishgard 回到 Eorzean Alliance。Moenbryda 的哀悼都還來不及好好完成，Minfilia 自己也完全沒有縱酒作樂的心情；但她仍逼著自己把悲傷收起來，為了這片土地的未來，把這場聚會當成不得不抓住的契機。</p><p>連原本答應你的休息也被收回。Minfilia 堅持你也必須出席——若「勝利的英雄」不在場，那宴席反而顯得古怪。她要你至少相信：這樣的場合有可能帶來重大的改變，而且不必靠流血達成。她請 Tataru 去聯絡其他同伴，Tataru 立刻答應，卻在最後嘆了口氣；Minfilia 立刻察覺不對——她從沒見過 Tataru 對這種請託嘆氣。</p><p>Minfilia 幾乎可以確定 Tataru 正被什麼事困住。她請你去和 Tataru 談談，因為她擔心自己若直接表現關心，只會換來 Tataru 逞強式的否認。你回頭找人時，Rising Stones 裡看不見 Tataru；F’lhaminn 說她剛走到外頭去，回想起來，當時她看起來確實有些心神不寧。</p><p>在 Revenant’s Toll 你找到 Tataru。她先急忙說自己不是故意讓人擔心，還說「真的沒什麼」；但話沒撐住，她又承認其實也不能說完全沒事，只是跟你們每天要面對的巨大考驗相比，她的煩惱顯得太渺小。也正因如此，她忽然下定決心：不能再拖了，必須在事情變得更糟前去找 Minfilia。她像是抓住某個支點似的，說你總知道該說什麼，然後匆匆離開。</p><p>回到 The Solar，Tataru 說自己想清楚了，並向 Minfilia 「討時間」——不是為了休息，而是為了嘗試一件她一直想做的事。她看著現況：冒險者、Crystal Braves、Scions of the Seventh Dawn 不斷被捲進危險的戰鬥與致命的困境，甚至連 Hoary Boulder 和 Coultenet 都從守衛工作被提上來填補「能戰之人」的缺口。既然如此，她也應該獲得能保護自己的力量——更重要的是，保護他人的力量。她宣告等她回來時，要同時做你們的接待員與護衛。</p><p>就在這股決心還在空氣裡發熱的時候，Hoary Boulder 幾乎是喊著闖進來，驚訝自己竟差點被一個 Lalafell 的氣勢震得站不穩。他本想問是否能幫上忙，卻又立刻想起正事：原本要加入護衛隊的一名冒險者在巡邏時受傷，而他們若少了至少一名護衛，就無法妥善守護託付在身的學者們。Minfilia 當場答應會評估人選並盡快補上，於是你眼前的忙亂再度延伸成下一段行程——在還沒來得及喘息的悲傷之後，又是一連串不得不做的準備。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 敏菲利亞 <small class="muted"> 石之家（X:6.1, Y:5.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-steps-of-faith.html">皇都伊修加爾德保衛戰</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="an-unexpected-ambition.html">進擊的塔塔露</a></div><div class="row"><a class="link" href="where-we-are-needed.html">臨時護衛</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
