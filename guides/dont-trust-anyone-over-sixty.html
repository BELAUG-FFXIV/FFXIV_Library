    story:`<div class="clamp" data-collapsed="true">
<p>You catch Cyr’s eye as he scowls toward the pair lingering nearby—he’s certain the same old woman from Ishgard has followed you again, and he can’t shake the feeling she’s mixed up in whatever is unfolding. Beside him, Nashu coos over Gigi’s “talent” while Julyan clicks her tongue, flatly remarking that—whatever nonsense is happening—this is no place to raise a child. Gigi, delighted with himself, proudly shows off a newly painted “family crest,” even trying to include “Grandpapa Godbert” and “M’lady Julyan” in his grand display.</p>
<p>Hildibrand, however, is already at the end of his stamina—yawning that even a gentleman has limits, and declaring he could dearly do with tea. Nashu leans in and whispers that two men have been staring at you for several minutes. Hildibrand waves it off as the behavior of adoring fans too timid to approach their idol…until Cyr snaps, suddenly convinced those aren’t fans at all. He curses and surges forward—Grand Sers—before they can slip away, and the chase begins. Gigi calls directions after them, insisting you keep going while he catches up.</p>
<p>By the time you stop, Cyr is heaving for breath, grumbling that he hasn’t run like that since an Ishgardian knight chased him half to death—and then he freezes, realizing Gigi is gone. Julyan’s impatience boils over, Nashu scans the area in worry, and Hildibrand bellows into the open as if volume alone could drag culprits from hiding. When he finally corners the pair, he demands they reveal themselves and answer for their misdeeds…only for them to burst into theatrical introductions: Orland, “slayer of a thousand thousand wyrms,” and Gonspart, “master of magicks ancient and awesome.” Cyr doesn’t know whether to laugh or cry.</p>
<p>Hildibrand delivers his accusation in full, condemning them for luring young maidens of Ishgard to private parties under false pretenses and leaving them with financial and emotional ruin. Orland responds with outrage—and then, with unsettling enthusiasm, launches into a reverie about youth, wind, blood, and the dizzy thrill of old glories…before he loses himself entirely, calling out to “Pigsney” as if she has descended from Halone’s halls. Gonspart panics, Hildibrand offers a baffled eulogy, and Cyr hurriedly insists Orland is only mostly dead—if Gonspart acts quickly, he might yet save him.</p>
<p>Gonspart, flattered, begins chanting for a “less controversial tradition,” promising biting winds and a vortex to “smite”…and then, to Cyr’s horror, declares he will smite his foes. Orland jolts back with agonized coughing, cursing his ruined back, and the chaos only deepens when a third figure steps in and commands you to stop—Dorys, whose dramatic self-introduction matches the others’ absurdity. Yet the threat is real: Dorys has Gigi. You see it now—first in Ishgard, then in Idyllshire; they have been trailing you all along. Dorys admits the parties and petty schemes were merely bait, all arranged for this one purpose: to seize the mammet. They don’t want to hurt the “boy,” they say—they need his help to reclaim what is “rightfully” theirs: their youth. A blinding smoke leaves you coughing, and when it clears they are already—infuriatingly—getting away at an adamantoise’s pace, Gigi calling for “Papa Hildy” as Hildibrand swears he will find him.</p>
<p>You regroup in frustration. Julyan scoffs at how well Hildibrand “protected” his mammet, Nashu wonders aloud if the kidnappers are headed for an old mill and then immediately dreams of cider, and Cyr urges caution—if they realize they’re being watched, they may try to flee again…very slowly. As you tail them, Julyan answers the unspoken question in your look: there’s a time for cracking skulls, and a time for letting her idiot son deal with his troubles himself. From nearby, you overhear the old fools bickering and panicking, and when Hildibrand appears, he declares with forced grandeur that the Grand Sers have been caught again—by the very inspector pursuing them. Cyr’s mind races to a brutal ambush and hostage-taking, but Hildibrand refuses to condone violence against elders. Instead, he lays out a “gentlemanly” plan: you will stalk and subdue the dragoon, then relieve him of his armor.</p>
<p>You approach Orland, and the wretched man doesn’t even recognize you—he only stares at your forearms and hands with dazed familiarity and begs for a shoulder massage to ease his aches. He happily invites you to undo his straps, praises you as a saint, and sinks into bliss as you work. His groans turn to dreamy muttering—then soft, steady snoring. For a moment the snoring stops so abruptly you fear the worst, but his breathing resumes with a spasm. With painstaking care, you strip away what remains—sabatons, breeches—leaving him asleep and exposed to the wild. Whatever “courtesy” this counts as, it is the task you were given, and you return with what Hildibrand needs.</p>
<p>Hildibrand beams at your success, declares he will disguise himself as Orland, and strides in with Mandervillian confidence. To your disbelief, it works—Dorys accepts him, orders preparations, and Hildibrand insists they release Gigi because keeping children in cages is unbecoming. He even announces he will take the boy on a “completely unrelated” stroll into the wilderness, and no one stops him…until the real Orland stumbles in, half-frozen and delirious, muttering that there are morbols after him and that something is terribly wrong. Dorys instantly calls out the impostor, chaos erupts, and as Hildibrand urges Gigi to run, Dorys cries “Vivi, wait!” The name hits Gigi like a strike of lightning—he repeats it, searching his memory—until Dorys commands him to remember who he is: a creation of the Sharlayan archmagus Quan.</p>
<p>Gigi’s voice changes as recollection floods back. He remembers Quan creating him, raising him, teaching him about the outside world—then abandoning him. Dorys twists the knife, claiming Quan cast him out for being “flawed,” unable to turn back time and make him young again, and died alone. Cyr connects the horror to what you witnessed before—power used to restore what was broken—and demands how they could know any of this. Dorys admits they scavenged Quan’s journals from the Great Library; once-famous heroes now reduced to scraping by, they seized the “second lifetime” promised by a mammet who could restore prime states and rewind time with temporal magicks. They insist Vivi can do more—make them young, even restore Quan’s life—while Cyr recoils, warning that no magick truly returns the dead, and that necromancy is an abomination in the Fury’s eyes.</p>
<p>Hildibrand pleads—reminding Gigi of their adventures and even their gazebo—but Gigi answers with painful gratitude and resolve: Hildibrand has always been kind, yet Quan made him, and he misses him, so even if the attempt fails, he has to try. As Dorys and the others retreat with Gigi once more, Hildibrand wavers—then hardens, declaring he cannot allow temporal magicks to pervert the natural order, and loudly vowing to keep his son to the “righteous path,” even if that means pursuing him himself. He asks Cyr to suspend the hunt for the Grand Sers so he can try to bring Gigi back peacefully, and Cyr agrees that acting aggressively could be dangerous if Gigi chooses to use his power. Later, back in Ishgard, Cyr admits he has returned as well—ostensibly to comb through the inquisition’s collection of heretical tomes for information on temporal magicks. When you look at him too knowingly, he bristles, insists it’s purely professional, thanks you sharply, and dismisses you.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>あなたの視線の先で、シルは苛立ちを隠さず呟く。イシュガルドからあの老女がここまで付いてきたに違いない――関わっているのは明らかだが、どう関わっているのかが問題だ、と。ナシュはジジの出来栄えを無邪気に褒め、まるで祖父に似た才能だと喜ぶ一方、ジュリアンは鼻を鳴らし、ここは子どもを育てる場所ではないと言い捨てる。ジジは得意げに家紋を見せつけ、祖父ゴッドベルトやジュリアンまで描いておけばよかったと、ふざけた調子で胸を張る。</p>
<p>だがヒルディブランドは限界らしく、大あくびを噛み殺しながら、紳士の体力にも限りがある、紅茶が欲しいと漏らす。ナシュが、さっきから二人がこちらを見続けていると告げると、ヒルディブランドは熱烈なファンの当然の反応だと取り合わない。目の前で偶像に会えるのに恐れをなして逃げる者も多い、とまで言う。ところがシルが顔色を変え、あれはファンではなく「グランドサー」かもしれないと叫び、あなたたちを急かして追跡を始める。ジジは右だと叫び、先に行け、自分もすぐ追いつくと必死に促す。</p>
<p>走り切ったあなたの耳に、荒い息を吐くシルの悪態が刺さる。あれほど走ったのは、イシュガルドで誰かに追い回された時以来だ、と。だが次の瞬間、シルはジジがいないことに気づき、怒りと焦りを滲ませる。ジュリアンは苛立ちを隠さず、ナシュは周囲を見回し、ヒルディブランドは声を張り上げて相手を呼び出そうとする。ついに二人を追い詰めたヒルディブランドは、名乗って罪を認めろと迫るが、相手は芝居がかった口上で名乗り上げる。天を穿つ銀槍の英雄オーランド、古の大魔法の達人ゴンスパルト。シルは笑うべきか泣くべきか分からない顔になる。</p>
<p>ヒルディブランドは、イシュガルドの若い女性たちを偽りの誘いで私的な集まりへ呼び、金銭的にも精神的にも傷つけた罪を読み上げ、これ以上被害者を出さぬために拘束すると宣言する。オーランドは激昂し、少年の不敬を罵ったかと思うと、突然、風と血の高鳴り、唇に残る金属の味、眩暈までを懐かしむように語り出す。さらに、ハルオーネの御座から降りてきた「ピグスニー」だと叫び、抱きしめろ、もっと高く、と繰り返しながら崩れ落ちる。ゴンスパルトが取り乱し、ヒルディブランドは場違いな悼みを口にし、シルは慌てて、完全に死んだわけではない、急げば助かるかもしれないとゴンスパルトを急かす。</p>
<p>ゴンスパルトは得意げに、穏当な伝統で、肉を裂く風の渦で敵を討つと唱え始めるが、あなたの目の前で「敵」を討つと言い切ってしまう。オーランドは咳き込み、背中が痛いと罵声を上げて跳ね起き、混乱は収まらない。そこへ三人目が割って入り、ジジの行く末がどうなってもいいのかと脅しながら、ドーリスが姿を見せる。あなたはようやく確信する。イシュガルドでも、イディルシャイアでも、彼らはずっとあなたたちを追っていた。ドーリスは、集まりも小細工もすべてこの瞬間のためだと言い、狙いはただ一つ、そのマメットだと告げる。傷つけるつもりはない、必要なのは若さを取り戻す手助けだ、と。咳き込むほどの煙の中で相手はゆっくりと逃げ去り、ジジは「パパヒルディ」と叫び、ヒルディブランドは必ず見つけると誓う。</p>
<p>あなたたちは悔しさを噛み締めながら追跡を続ける。ジュリアンは、あのマメットを守れたのかと冷たく皮肉り、ナシュは古い水車小屋の話をしつつ、ついでに久しぶりの酒まで口にする。シルは、見張られていると気づけばまた逃げるかもしれない、と言って慎重さを求め、ジュリアンは、今すぐ殴って終わらせない理由を問うあなたの気配に気づいたように、馬鹿息子には自分の厄介事を自分で片づけさせる時があるのだと答える。近くから、老いた三人の言い争いや怯えた声が聞こえ、ヒルディブランドは大仰に、追っていた検査官が再びグランドサーを捕らえたのだと宣言する。シルが人質作戦を思いつくが、ヒルディブランドは年長者への暴力を拒み、代わりにあなたへ命じる。竜騎士を尾行して制圧し、装備を「紳士的に」入手せよ、と。</p>
<p>あなたが近づくと、オーランドはあなたを見ても誰だか思い出せない。それでも腕や指先に妙な懐かしさを覚えたのか、肩を揉んでくれと頼み、鎧の留め具も手伝ってくれと言う。あなたが外してやると、彼は大げさに感謝し、亡き妻が手伝ってくれたと語りながら椅子に座り、あなたの手つきを称える。やがて吐息混じりの独り言は眠りに沈み、鼾が途切れた瞬間、あなたは息を呑むが、痙攣のような動きとともに荒い呼吸が戻る。あなたは慎重に靴も衣服も外し、眠る老人を外気に晒したまま、その場を離れる。そして、ヒルディブランドが求める装備を手に戻る。</p>
<p>あなたが戻ると、ヒルディブランドは満足げに頷き、オーランドに化けてジジを救い出すと宣言する。似ていないとシルが反発しても、ヒルディブランドは己の才覚を信じ、堂々と乗り込む。驚くほど計画は進み、ドーリスは命令を出し、ヒルディブランドは子どもを檻に入れるのは紳士に相応しくないと、ジジの解放まで求める。さらに、まったく無関係だと言い張りながら、少年を連れて森へ行くと宣言し、誰も止めない。だが本物のオーランドが震えながら現れ、己が二人いるという恐怖を口にした瞬間、ドーリスは即座に見抜き、偽物だと糾弾する。混乱の中でドーリスは「ヴィヴィ」と呼び、ジジはその名を反芻しながら記憶を探る。ドーリスは、あなたの目の前でジジに言い聞かせる。あなたは偉大なるシャーレアンの大魔道士クワンの創造物なのだ、と。</p>
<p>ジジの記憶が戻り、クワンに造られ、育てられ、外の世界を教わったこと、そして捨てられたことを語り出す。ドーリスは、若返らせる力がないと判断され追放されたのだと告げ、シルは、以前見た壺の出来事と重ね合わせ、時を巻き戻す力が人にも及ぶのかと戦慄する。ドーリスは、偉大なる図書館でクワンの日誌を見つけたと明かし、老いに敗れた元英雄として、第二の人生に縋るしかないと語る。壊れたものを全盛へ戻し、時の魔法で若さを奪い返す――その力をジジに引き出させたいのだと。シルは死者を本当に戻す魔法などない、せいぜい屍を動かすだけで、それはハルオーネの教えに背く忌むべきものだと突きつける。ヒルディブランドが冒険や東屋の思い出を持ち出して引き留めても、ジジは感謝しつつ、クワンに会いたいから試すしかないと言い、再び連れ去られていく。ヒルディブランドは迷いながらも、自然の理を歪める時の力は許せないと決意し、ジジを穏便に連れ戻すため、しばらく追跡を止めてほしいとシルへ頼む。あなたがその判断を見守る中、やがてシルはイシュガルドへ戻り、異端の文書を調べて時の魔法を探ると言い訳めいた口調で告げる。あなたが訝しげに見ると、彼は慌ててそれを職務だと言い張り、礼だけ述べてあなたを下がらせる。</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>你注意到 Cyr 的目光始終鎖在不遠處那位年長的女人身上——他低聲咒罵，認定她一定是從 Ishgard 一路跟到這裡。她明顯牽涉其中，差別只在於她到底怎麼插手。Nashu 興奮地誇 Gigi 真的很有天分，像極了他的 grandpapa，而 Julyan 冷冷回嘴：就算她願意對這些鬧劇睜一隻眼閉一隻眼，這裡也不是養孩子的地方。Gigi 卻得意洋洋，展示自己塗出的 family crest，甚至還想把 Grandpapa Godbert 和 M’lady Julyan 也畫上去。</p>
<p>Hildibrand 一邊打呵欠，一邊承認就算是紳士也有體力極限——他說自己現在最需要的就是一杯茶。Nashu 偷偷提醒你：那兩個人已經盯著你們看了好幾分鐘。Hildibrand 卻把一切當成粉絲的常態反應，還說見到偶像本人反而嚇得逃走也很常見。直到 Cyr 臉色一變，猛地喊出那根本不是粉絲——也許是 Grand Sers。他罵聲連連，催你們快追，眼看對方就要溜走。Gigi 也急忙指方向，叫你們往右走，他很快就會追上來。</p>
<p>你們停下來時，Cyr 已經喘到快把肺吐出來，還一邊抱怨自己上一次跑成這樣，是在 Ishgard 被人追得滿街逃竄的時候。話才說到一半，他忽然僵住——Gigi 不見了。Julyan 不耐地哼了一聲，Nashu 焦急四處張望，而 Hildibrand 把嗓門拉到最大，像是只要夠大聲就能逼對方現身。等他終於把人堵住，對方卻像演戲一樣自報名號：Orland 自稱屠龍無數；Gonspart 自稱精通古老而偉大的魔法。Cyr 看著這一幕，像是同時想笑又想哭。</p>
<p>Hildibrand 當場把罪狀念得一字不漏：他指控 Grand Sers 以假藉口誘騙 Ishgard 的年輕女性參加私密聚會，害她們在金錢與情感上都遭受重創。Orland 先是暴怒，隨後又忽然沉浸在自己的回憶裡，說起風掠過耳畔、血液奔騰、唇間的金屬味與微微的暈眩——彷彿他終於又回到年輕時的天空。然後他看著空氣，喊著 Pigsney 仿佛她從 Halone 的殿堂降臨。Gonspart 驚慌失措，Hildibrand 還煞有介事地替他惋惜，而 Cyr 趕緊打斷：他只是還沒完全死，只要 Gonspart 夠快，也許還救得回來。</p>
<p>Gonspart 一聽便得意起來，開始念咒，說要用更不那麼有爭議的傳統召來狂風之渦——然後竟理直氣壯說要擊潰敵人。你還沒反應過來，Orland 就劇烈咳嗽著醒來，痛罵自己的背快斷了。混亂之中，Dorys 現身喝止，卻用更真實的威脅壓住局勢：他們手上有 Gigi。你這才確定，從 Ishgard 到 Idyllshire，他們一直跟著你們。Dorys 承認，派對與小伎倆都只是鋪陳，真正的目標從一開始就只有那個魔法人偶。他說他們不想傷害那孩子，他們只需要他的協助，奪回本該屬於他們的東西——青春。你被煙嗆得猛咳，等你勉強看清，他們已經用讓人火大的速度慢慢撤離。Gigi 大喊 Papa Hildy，而 Hildibrand 回喊要他撐住，發誓一定會找到他。</p>
<p>你們在焦躁裡重新整隊。Julyan 冷嘲熱諷，問 Hildibrand 不是很會保護自己的魔法人偶嗎；Nashu 猜他們是不是往舊磨坊去，還順勢嚷著自己很久沒喝 cider 了。Cyr 反而變得謹慎：不能衝動，若他們察覺被盯上，可能又要逃——而且還會逃得一樣慢。你們悄悄跟上去時，Julyan 像是看穿你眼神裡的疑問，冷哼著解釋：有時候該敲碎腦袋，有時候就該讓她那個笨兒子自己處理麻煩。你聽見前方傳來老傢伙們的爭吵與驚叫，Hildibrand 隨即擺出姿態，宣告 Grand Sers 再度被抓到。Cyr 想起人質與伏擊的可能，Hildibrand 卻斷然否決暴力，改口下令你去尾隨那位 dragoon，制服他，並以紳士的方式取得他的盔甲。</p>
<p>你靠近 Orland 時，他居然一時想不起你是誰，只覺得你的手臂與手指熟悉得很，還拜託你替他按摩肩膀，並幫他解開胸甲的繫帶。他稱讚你簡直是聖人，甚至提起自己已故的妻子以前也會幫他穿卸裝備。你照他所求動手，他的呢喃越來越放鬆，最後沉入鼾聲。鼾聲忽然中斷那一刻，你一度以為他就這麼沒了，但下一秒他抽搐般恢復了吃力的呼吸。你只能小心把剩下的裝備與衣物一件件卸下，讓他在野外睡著、毫無防備，然後帶著你被要求取回的東西返回。</p>
<p>你把裝備交回時，Hildibrand 心滿意足，立刻宣布要假扮 Orland，從對方手中救出 Gigi。更離譜的是，它居然真的奏效——Dorys 竟毫不懷疑，還命令打包上路。Hildibrand 趁勢要求先放了 Gigi，說把孩子關在籠子裡有失紳士風度，接著又一本正經宣稱要帶著孩子去野外短暫散步。直到真正的 Orland 冷得發抖現身，喃喃說著有 morbol 追他，Dorys 才立刻識破。混亂中，Dorys 喊出 Vivi，那名字像是擊中了 Gigi——他反覆念著，像在拼命找回某段遺失的記憶。Dorys 逼他想起真相：你是偉大的 Sharlayan archmagus Quan 所創造的人偶。</p>
<p>Gigi 的記憶終於回來了——他想起 Quan 造了他、照顧他、教他外面的世界，也想起 Quan 後來拋下了他。Dorys 冷酷地補上理由：Quan 認定他有缺陷，無法讓時間倒轉、讓 Quan 變回年輕，所以將他趕走，最後孤獨死去。Cyr 把先前見過的異象串起來——那股能把破損之物恢復原狀的力量，或許同樣能用在人身上——他質問你們怎麼可能知道這麼多。Dorys 說他們從 Great Library 翻出了 Quan 的日誌；曾是英雄的他們敗給歲月，抓住魔法人偶承諾的第二次人生，妄想用時之魔法取回青春，甚至讓 Quan 也重回人世。Cyr 立刻反駁：沒有任何魔法能真正讓死者回來，死靈術更是不可饒恕的禁忌。Hildibrand 以冒險與 gazebo 試著挽留，但 Gigi 帶著沉痛的感激說：你們一直對他很好，他永遠感謝，可是 Quan 創造了他，他想念 Quan，所以就算失敗也必須嘗試。Hildibrand 先是動搖，隨後下定決心，說他不能讓時之魔法扭曲自然法則，必須把 Gigi 拉回正途；他請 Cyr 暫停追捕 Grand Sers，給他機會勸 Gigi 平安回來。你看著 Cyr 點頭，承認若 Gigi 決意使用那股力量，貿然出手確實更危險。回到 Ishgard 後，Cyr 又說他要翻查宗教裁判所收藏的異端書籍，找出時之魔法的線索；當你投去意味深長的目光，他立刻嘴硬否認、匆匆道謝，並要你就此退下。</p>
</div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
