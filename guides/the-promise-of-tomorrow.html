    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>The moment you step in, Krile greets you with a knowing smile—she’d come for the same reason: to catch up with your Oblivion friends before the officials’ questions begin. Shale, finally seeing everyone safe again, urges you to pause and savor what you’ve accomplished—an ending to years of struggle for Oblivion, and for herself.</p><p>But closure brings a new weight. Shale explains that the government has tasked her with a fuller survey of the containment complex, and her first order of business is to analyze the data taken from Containment Complex 10-29 and identify other facilities of interest. Krile agrees the Preservation laboratory—the one that studied the key—demands thorough investigation, yet admits it still does not explain how Calyx possessed knowledge of primal summoning. To be safe, she intends to secure a place on Shale’s next expedition to the tenth level, even as she hurries off to spare G’raha Tia from facing the city officials alone.</p><p>Shale urges you to rest while the city is set right, offering the Backroom as a place to sleep as long as you wish. Weeks pass—long enough for you to find G’raha and Krile buried under an absurdly long report, polishing the final lines: Alexandria’s chaos is giving way to order, aided by Oblivion’s investigation. Multiple Preservation facilities are uncovered, and with them a clearer understanding of regulators: the memories of the dead were not erased from the living, but locked away—gaps avoided because they would destabilize Endless conversion.</p><p>From that discovery comes a new plan. With the Meso Terminal transmitting a signal, sealed memories can be unlocked without creating new Endless, and the government announces a memory restoration initiative for those who choose it. The debate around mortality reignites—how to face death, what it means to remember—and the answer, whatever it becomes, promises to change Alexandria’s philosophy.</p><p>When the officials request support from those who understand the process, your party agrees to escort the city’s representative back to Living Memory. Malachite and Lithander see you off with steady resolve: they will face their memories, however frightening, to honor those who are gone and to mend those still here. Sphene answers their concern with gentle confidence—she is in very good company.</p><p>On the road, Koana reflects on words like those of the Yok Huy: flesh may wither, but so long as we are remembered, we are never truly gone—his father’s last words, and the strength he drew from them. At Living Memory, you follow Shale’s instructions: reactivate all terminals at once to supply the aether needed to operate the equipment, then use the Meso Terminal to transmit the signal and unlock what was sealed. Sphene volunteers to take a terminal—until Wuk Lamat appears, having slipped out despite orders to rest. She insists the act of erasing the Endless left a responsibility in her hands: to ensure they are remembered, and their legacy carried forward.</p><p>The restoration succeeds. In soft golden light, the lost memories return to loved ones, held tight and no longer surrendered. When your work is done, Gossan thanks you on behalf of the nation—and when Sphene asks to remain and serve Alexandria, he startles her by refusing…only to reveal what the people demanded: not an ordinary citizen, but their queen. With the burdens of rule to be reexamined so they do not fall on her alone, Sphene accepts—choosing peace and prosperity as her foremost purpose, and taking up the role of Queen of Reason alongside a young Gulool Ja.</p><p>In the quiet aftermath, Sphene speaks of a funerary service once the first wave of restorations is complete—an act of remembrance rather than suppression of grief, held high above Everkeep where Alexandrians believe the departed journey beyond the clouds. You’re told you will always be welcome as cherished comrades. Yet elsewhere, Calyx—still at work, still reporting to unseen “peers”—curses his failure and vows to learn, to try again, and to pursue the path he was sure he’d opened.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>クルルが先に微笑む。「同じことを考えていたんだね。」あなたは、都市の役人たちと向き合う前に、オブリビオンの仲間たちと一息つくためにここへ来た。シェールは、全員が戻った今こそ成し遂げたことを噛みしめようと言い、長年の闘いが一区切りついたことを、静かに受け止めている。</p><p>けれど終わりは、すぐ次の重みを連れてくる。シェールは、収容施設のより完全な調査を政府から任され、まずは「コンテインメント・コンプレックス10-29」から得たデータを解析し、他の関連施設を突き止めるつもりだと告げる。クルルは、鍵を研究していた「プリザベーション」の施設がさらなる調査を要することに同意しつつも、なお「蛮神召喚」の知識がどこから来たのか説明できないと語り、より大きな謎の存在を疑う。自らも次の第十層遠征に加わる決意を固める一方で、役人たちの質問攻めをグ・ラハ・ティア一人に背負わせないため、急いで会合へ向かう。</p><p>シェールは都市の立て直しには時間がかかると見込み、あなたに休息を勧め、寝床を用意すると申し出る。幾週間かが過ぎ、グ・ラハ・ティアとクルルは膨大な報告書の最終校正に追われていた。そこには、オブリビオンの徹底調査が復興の要因となり、複数の研究施設が発見されたこと、そして「レギュレーター」の設計と機能の理解が進んだことが記されている。死者に関する記憶は消されたのではなく、実際には封じられていたのだという結論――欠落を避けなければ「エンドレス化」に不整合が生じ、不安定になるためだ。</p><p>発見は新たな方針へつながる。端末群を同時に再起動して装置の稼働に必要な乙太を供給し、メソ・ターミナルから信号を送って封印された記憶を解錠する――新たなエンドレスを生み出さずに。政府は希望者向けの「記憶復元計画」を発表し、死とどう向き合うかという議論が再び燃え上がる。どんな答えに至ろうとも、それはアレクサンドリアの思想を大きく変えるはずだと、報告書は結ぶ。</p><p>計画に先立ち、手順に通じた者の協力が求められ、あなたたちは都市代表を伴ってリビングメモリーへ向かうことになる。マラカイトとリサンダーたちは、自分たちの決断は軽いものではないと言い、恐ろしく痛ましい記憶であっても向き合うと誓う――亡き者を讃え、今ここにいる者を取り戻すために。スフェーンは、心配はいらないと微笑み、あなたたちと共にあることを示す。</p><p>道中、コーナは「肉体は朽ちても、記憶される限り人は真に失われない」という教えを語り、それが自分を支えたと明かす。リビングメモリーでは、シェールの指示どおり、全端末を同時に再起動し、稼働後にメソ・ターミナルで信号を送って封印を解く段取りを確認する。スフェーンが端末を担当しようとした矢先、療養中のはずのウクラマトが姿を現し、自分が「エンドレス」を消す決断を下し、その最期を見届けた以上、彼らが記憶され、遺したものが受け継がれるよう責任を果たしたいと申し出て、信号送信を引き受ける。</p><p>復元は成功する。柔らかな金色の光の中、失われていた記憶が戻り、愛する者たちに抱きしめられる。すべてが終わったあと、ゴッサンは国を代表して感謝を述べる。スフェーンがこの新たなアレクサンドリアで生き、仕えたいと願うと、彼は一度は「それではいけない」と言い、彼女を怯えさせる――だが真意は別だった。民は、彼女が「女王」として在ることを望んでいたのだ。統治の仕組みは見直し、重荷を一人に背負わせない。その条件のもと、スフェーンは「理性の王」として立つことを受け入れ、若きグルージャと共に二つの玉座を担う道を選ぶ。</p><p>その後、スフェーンは、記憶復元の初動が落ち着いたのち、喪を弾圧せず、穏やかな追想の場として葬送の儀を行いたいと語る。仲間たちは客人として迎えられ、共に謎の解明へ向かう決意を新たにする。だが別の場所で、カリュクスは失策を呪い、見えない「同輩」へ報告しながら、次の機会を口にしていた――まだ終わっていない、と。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> シェール <small class="muted">(バックルーム, X:6.1, Y:6.3)</small></div></div>`,
    unlockq:`<div class="stack">

    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="with-the-winds.html">羅針盤が示す先へ</a></div></div>`

  ZH:{
    langLabel:'ZH',
    pageTitle:'明日的誓約',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Krile 先帶著一點鬆口的笑意跟你打招呼——她也是同樣的想法：在要去面對官員那一大堆更嚴肅的問題之前，先回來跟 Oblivion 的夥伴們好好說幾句話。Shale 也難得放慢步調，說既然大家都回來了，就該停一下，讓自己真正在心裡確認：多年來的拉扯，終於走到一個段落。</p><p>但「告一段落」不代表事情結束。Shale 說政府交給她新的任務——要把 containment complex 做更完整的調查；她首先要分析從 Containment Complex 10-29 帶回的資料，找出其他同樣值得追查的設施。Krile 同意 Preservation 的研究所（當初研究 key 的那座實驗室）必須徹底翻查，可即使能理解那些實驗如何導向 reflections 的發現，仍不足以解釋 Calyx 為何懂得 primal 召喚（以祈禱與乙太顯現的超常存在）。她擔心這整件事只是更大謎團的一角，因此也打算加入 Shale 下一次前往第十層的遠征；而眼下她得先去開會，免得把官員們的問題全丟給 G’raha Tia 一個人扛。</p><p>Shale 明白城市要恢復秩序還需要一段時間，便勸你先休息，甚至把 Backroom 的床位留給你——想住多久都可以。幾週過去後，你看見 Krile 和 G’raha Tia 還在為一份「長到荒唐」的報告做最後校對：Oblivion 的徹底調查，是 Alexandria 逐步回到正軌的重要因素；他們找出了多處 Preservation 的研究設施，也因此得以更完整地理解 regulator 的設計與功能。最關鍵的結論是——死者相關的記憶並不是從活人腦中「消失」，而是被「封存」起來；之所以要避免永久缺口，是因為在轉化為 Endless（以死者記憶資料生成的永續存在）時會出現矛盾，進而導致不穩定。</p><p>既然真相如此，「取回」就成了可能。只要由 Meso Terminal 發送訊號，就能解鎖那些被封住的記憶，而且不需要再製造新的 Endless。政府因此宣布推動「記憶復原計畫」，由願意的人自願參與；而這也再次點燃了人們對死亡的討論——要如何面對必然的終點、要如何與記憶同行。無論最後人們得出的答案是什麼，都注定會讓這個國家的哲學產生巨大的轉向。</p><p>在復原計畫正式啟動前，官員請求熟悉流程的人協助，所以你們與 Sphene 一同接下護送代表前往 Living Memory 的任務。Malachite 與 Lithander 在出發前趕來送行——他們說自己做的決定一點也不輕率：不管記憶有多痛，他們都必須面對，既是為了紀念離去的人，也是為了讓仍在這裡的人重新完整；他們要你們放心去，等你們平安回來。Sphene 則溫柔回應：別擔心，她現在身邊有最可靠的同伴。</p><p>路途中，Koana 談起一段與 Yok Huy 相似的教誨——「肉體會衰敗，但只要被記得，就不會真正消失」，那也是他父親的遺言；失去的人留下的記憶，能讓活著的人在眼前的試煉中再站起來。抵達 Living Memory 後，你們依照 Shale 的指示確認程序：第一步要同時重新啟動所有終端，供給裝置運作所需的乙太——而且必須確保不會再生成新的 Endless；等系統穩定後，再用 Meso Terminal 發送訊號，解鎖封存的記憶。原本 Sphene 願意負責其中一座終端，卻在此時看見 Wuk Lamat 出現——她明明還在療養，卻硬是偷跑出來。她說自己既然做了「抹消 Endless」的決定，也親眼見證了他們最後的瞬間，就更不能讓那份存在被遺忘；因此她想親手負責送出訊號，確保那份遺緒能被記得、被傳下去。</p><p>復原最終成功了。柔和的金色光芒中，失落的記憶回到人們手裡，被親人緊緊抱住，再也不必交出去。事後 Gossan 代表國家向你們致上最深的感謝。當 Sphene 請求能留在 Alexandria 繼續生活、繼續服務這個她曾守護、也與新同伴共同守護的國度時，Gossan 先說「那可不行」，讓她以為自己的存在會造成太多混亂；但他立刻澄清——人民最堅持的，是要她回到她「應在的位置」：不是普通市民，而是女王。政府與國家的結構會被重新檢討與修正，讓重擔不必由她獨自承受；在這樣的前提下，Sphene 接下人民的期望，以和平與繁榮為首要目的，接受「Queen of Reason」的身分，並與仍年幼的 Gulool Ja 一起，走上「兩個王座」共同承擔的道路。</p><p>而在你們向前收拾未竟之事的同時，另一處的 Calyx 仍在低聲咒罵自己的失算。他照著「規矩」向某些看不見的同伴報告，要求把細節傳達給他口中的 peers——並在嘴邊反覆咀嚼「下次」：彷彿他從未真正放下那個自以為已經打開的新道路。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
