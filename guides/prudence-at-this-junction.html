<script>

const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Prudence at This Junction',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>News reaches you that Black Brush Station is desperately short on hands, and you first hear it from Roger over a tankard and the low murmur of Central Thanalan’s traffic. He tells you the Stone Torches posted out there can scarcely snatch a moment’s rest, and that a man named Warin is looking to bolster their ranks with a few able-bodied souls for short-term assignments. If you are keen on lining your purse with a bit of extra gil, Roger says, you could do a lot worse than answer the call. You accept the offer and make your way north through the dusty expanse of Black Brush, following the tracks until the outline of Black Brush Station comes into view. There, amid the clatter of ore-laden wagons and the steady rumble of trains, you find Warin. He sizes you up and greets you with a straightforward question: are you looking for work? If so, he says, you have chosen the perfect time. The Stone Torches are sellswords in the employ of Amajina & Sons Mineral Concern, hired to guard the company’s interests. Here at Black Brush Station, that means keeping the railway tracks clear of pests, and for that particular duty they require your aid. Warin warns you that it is dirty work at the best of times and will become far worse if you show up ill prepared. In his experience, a single piece of gear can be the difference between life and death, and he refuses to bear the guilt of sending a poorly equipped adventurer to an early grave. He tells you plainly to see to your arms and armor, to ensure that your head, body, hands, legs, and feet are all properly outfitted, and only then to present yourself to him again.</p>
      <p>Taking his words to heart, you inspect your equipment with a more critical eye. Perhaps you try your luck once, returning too soon and earning a scathing remark about how you ever managed to survive the antlings dressed as you are; in any case, the message is clear enough. You upgrade your gear until each slot is properly filled, replacing worn leathers and dented metal with pieces sturdy enough to face the threats that roam the desert. When you finally come back to Warin in full kit, he looks you over again, this time with a far more approving gaze. Everything appears to be in order, he concedes, though he reminds you that nothing in this world is ever guaranteed. Fate is a fickle mistress, and even good gear will not save the reckless. Adventurers of your capability are few and far between, and he has watched too many comrades go into the field with cracked hauberks and battered helms, only to never return. He does not want you to share their fate. No matter what sort of beasts you are sent to face, he says, never disregard the importance of your equipment. With that final piece of advice, he begins to treat you not as a green novice wandering in off the road, but as a prepared ally ready to stand with the Stone Torches at Black Brush Station.</p>
    </div>

    followq:`<div class="stack">

  },
  JP:{
    langLabel:'日本語',
    pageTitle:'戦場の備え',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ブラックブラッシュ停留所の噂話を最初に耳にしたのは、中央ザナラーンの往来を眺めつつ、ロジャーと軽く言葉を交わしていたときだった。彼曰く、あそこは今ひどい人手不足で、詰めている鉄灯団の面々は、一息つく暇もないほどに忙殺されているという。そんな折、ウォーリンという男が、短期の任務に就いてくれる戦力を探しているらしい。少しでも懐を温かくしたいなら、これ以上ない仕事だとロジャーは笑い、あなたはその話を受けて依頼を引き受けることにする。ブラックブラッシュの荒野を北へ進み、線路沿いを辿っていくと、やがて貨物列車の行き交う「ブラックブラッシュ停留所」の姿が見えてくる。鉱石を積んだ貨車の軋む音と、鉱山鉄道の低い振動に包まれたその場で、あなたはウォーリンと対面する。彼はまず、仕事を探しているのかと率直に問いかけ、そうであればまさに願ってもない時だと続ける。鉄灯団は、アマジナ鉱山社に雇われ、その利権を守るために働く傭兵団だ。ここブラックブラッシュ停留所における主な任務は、線路上から害獣を一掃すること──そしてまさに、その役目を果たすために、あなたの力が必要だと説明するのであった。もっとも、彼はそれが決して綺麗な仕事ではなく、装備が整っていなければ一層悲惨なことになると、念入りに釘を刺す。たったひとつの装備品の差が、生と死を分けることもある。装備の整わない冒険者を死地に送り出し、その死を自らの良心に背負い込むような真似だけはしたくない──ウォーリンはそう言い切り、頭・胴・手・脚・足の装備をきちんと整え、準備ができてから改めて自分の前に来るようにと命じるのだった。</p>
      <p>その言葉を胸に刻み、あなたは自分の装備を改めて見直すことになる。もしかすると、まだ不十分な状態で戻ってきてしまい、あのアントリング相手によくもまあそんな装備で生き延びたものだと、呆れ混じりの叱責を浴びせられたかもしれない。だが、そこで伝わる教訓はひとつだ。あなたは言われた通りに頭から足先まで装備を整え、擦り切れた革や凹んだ金属を、砂漠の脅威に立ち向かうに足る堅牢な装備へと置き換えていく。そうして再び完全な装備でウォーリンの前に立ったとき、彼は今度こそ納得したようにあなたの全身を眺め、ようやく頷きを返す。これでひとまずは合格だと認めながらも、この世に絶対はないのだと念を押す。運命というものは気まぐれで、どれほど装備を整えても、慢心すれば簡単に命を落とす──だからこそ、腕の立つ冒険者は貴重であり、あなたのような者に無駄死にしてほしくないのだと語る。彼の脳裏には、鎧の綻びや兜のへこみを軽く見て、そのまま出陣して二度と帰らなかった仲間たちの姿が、今も色濃く焼き付いている。どんな相手と相対するときであっても、装備の重要性だけは決して軽んじるな──そう強く諭した上で、ウォーリンは、あなたを一人前の仲間として扱い始める。もはやただの流れ者ではなく、ブラックブラッシュ停留所を守る鉄灯団の一員として肩を並べるに足る存在として。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ロジャー　中央ザナラーン <small class="muted">(X:19.4, Y:20.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="step-nine.html">御礼品は予約品</a></div>
      <div class="row"><small class="muted">すべて（リミテッドジョブを除く）Lv 4～</small></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="out-of-house-and-home.html">迷惑な鉱石マニア</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'備戰',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>你最先聽說 Black Brush Station 人手嚴重不足，是在 Central Thanalan 一角跟 Roger 聊天的時候。他提到那裡的 Stone Torches 忙得連喘口氣的時間都沒有，最近有個叫 Warin 的人，正在為幾個短期任務增加人手。如果你想多賺一點 gil，Roger 說，接下這份差事絕對不會吃虧。你接受了這個提議，順著鐵道往北走進 Black Brush 的荒地，直到 Black Brush Station 的輪廓從熱氣扭曲的遠方浮現。貨車載著礦石來回穿梭，鐵路的震動透過地面傳到腳底，你就在這樣的環境下找到了 Warin。他先量了一量你的身形，直接開門見山地問你是不是在找工作，如果是，那就來得正是時候。Stone Torches 是受雇於 Amajina & Sons Mineral Concern 的傭兵團，負責保護這家公司的各種利益；在這座驛站，他們的主要工作，就是把鐵道沿線出沒的害獸清除乾淨，而這正是他希望你幫忙的任務。Warin 開宗明義地提醒你，這種工作說不上光鮮亮麗，本來就不乾不淨，如果準備不足，只會變得更加難看。他很清楚，一件裝備就足以決定生死，自己絕對不願意背負「把裝備寒酸的冒險者送去送死」那種罪惡感。於是他要求你先好好檢查自己的武器與防具，確定頭部、身體、雙手、雙腿與腳部的裝備都達到應有的水準，準備妥當之後，再回來向他報到。</p>
      <p>你把這番警告聽進心裡，重新審視自己身上的每一件裝備。也許你曾經心存僥倖，太早回來接受檢查，換來的卻只是他驚訝又惱火的一句：像之前那樣寒酸的打扮，居然還能在 antling 手下活著回來？不管有沒有親身被這樣罵過，訊息都很清楚──你還不夠準備好。於是你開始真正動手調整裝備，把破舊的皮甲與凹陷的金屬護具一件件淘汰，換上至少能在沙漠裡擋住一擊的像樣裝備，直到全身上下都有了可交代的水平。當你再次回到 Black Brush Station，站在 Warin 面前時，他重新打量你的全身，這一次終於露出較為滿意的神情，承認你的裝備總算看得過去。不過，他同時提醒你，這個世界沒有任何保證，命運向來反覆無常，就算配備再好，如果輕忽風險，一樣可能會在某個不經意的瞬間喪命。他說，像你這樣有能力的冒險者本就稀少，他不想再看見有人像過去那些戰友一樣，只因為忽視鎖子甲上的裂痕、頭盔上的凹痕，就一去不回。無論今後你在荒野中面對的是什麼樣的野獸與威脅，都絕對不要低估裝備的重要性──Warin 以這樣的忠告作結，從此開始把你視為真正準備好、可以與 Stone Torches 並肩行動的戰力，而不只是一個剛好路過的新人冒險者。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 羅杰　中薩納蘭 <small class="muted">(X:19.4, Y:20.6)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="step-nine.html">預約的禮品</a></div>
      <div class="row"><small class="muted">所有職業（不含限定職） 等級 4 以上</small></div>
    </div>`,
    followq:`<div class="stack">

    </div>`

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
