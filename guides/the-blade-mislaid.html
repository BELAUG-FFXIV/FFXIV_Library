    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
<p>Shigure rushes to you with fresh urgency: the Wolf Burglar has slipped away to Yanxia. In the chaos of the escape, he managed to take a dagger from the thief—old and worn, yet carefully kept, and unmistakably Doman in its make. Hildibrand seizes on the same details with theatrical delight, praises Shigure’s eye for clues, and the group sets off at once.</p>
<p>At Yanxia’s Prism Lake in the Valley of the Fallen Rainbow, the crystalline splendor threatens to steal everyone’s attention—Nashu is openly dazzled, and even Hildibrand has to tear himself away from gawking. Shigure admits he has no clear way to narrow the search…until Yojimbo calmly offers one. Daigoro’s nose, he says, can track what eyes cannot. You hand over the dagger, and after a few sharp sniffs, Daigoro barks with certainty and bolts ahead—enough to make everyone believe, if only for a moment, that fate might finally be on your side.</p>
<p>The trail leads toward Doma, but Daigoro falters near the ruins in Monzen, whining as if an invisible wall blocks him. Yojimbo mutters that Namazu are nearby, and their stench muddles the dog’s senses. With no other choice, you spread out again: Hildibrand declares he will simply shout “Wolf Burglar!” at the top of his lungs if he spots the fiend, Nashu wanders wide-eyed through the derelict houses, and Shigure—frustrated by the usual recklessness—orders you to search to the northwest and squeeze any clue you can from the wreckage.</p>
<p>You stumble upon a pungent Namazu nursing a brutal hangover, and after a few suspicious questions and slurred reassurances, it recalls seeing a traveler with an unusual sword strapped across his back. It can’t remember much else, but it swears its barbels can point the way—and with an emphatic wobble, it gestures off in a direction that leaves Shigure groaning. Still, it’s something. Not long after, among scattered potsherds, you spot a conspicuously placed pair of gloves. If they belonged to the thief, they’re fresher than any guesswork—so you bring them to Yojimbo, and Daigoro’s nose snaps back into purpose the moment he takes their scent.</p>
<p>Hildibrand and the others converge on the barking, and Daigoro surges forward like an arrow loosed. The Wolf Burglar appears at last, smug enough to boast about friends in high places—even calling for Montaro—yet not quick enough to outrun a dog that lives for the chase. Shigure lunges to secure the culprit, while Hildibrand triumphantly presents the recovered Soboro Sukehiro as if the whole affair were his stage. Yojimbo, however, insists on proof; after a careful look, he confirms the blade is no counterfeit. Then, without hesitation, he says he has urgent business in Kugane and will personally return the sword to Master Akebono—promising he will surrender it to no one. With the thief in hand, you head back to deliver him to the Sekiseigumi.</p>
<p>At the Sekiseigumi’s barracks in Kugane’s Matsuba Square, Miyamagi is all too happy to accept the Wolf Burglar—an enemy who has humiliated them for far too long. Yet as the prisoner is dragged inside, he spits a final taunt: you’re blind to the true villain standing among you. The sting of that warning lands just as Akebono arrives, eager to celebrate the capture…until he asks the one question that freezes the moment cold: where is the Soboro Sukehiro? Shigure answers honestly that Yojimbo took it back to him. Akebono’s face twists—he hasn’t seen Yojimbo since casting him out. The realization hits like a blade: perhaps Yojimbo absconded with the sword after all. Akebono explodes, furious that you would ever trust a man he had just expelled, and he vows to make Shigure’s dreams go unfulfilled if the sword is not returned.</p>
<p>Before despair can settle, a solemn Sekiseigumi officer turns to Shigure and recalls the dream he once confessed—to serve alongside them. Shigure answers without hesitation: yes. In recognition of what you’ve accomplished, the officer offers to induct him, pending procedures and discussions, and Shigure accepts with visible relief. When he returns, he thanks you, Hildibrand, and Nashu from the heart, admitting he feels changed by the path you’ve all taken together. But his first assignment arrives immediately: he must pursue the renegade Yojimbo and recover the Soboro Sukehiro, with no extra men to aid him. You don’t leave him to it—Hildibrand swears, with boundless bravado, to scour all creation for “Jim” and the stolen blade, and Nashu rushes after him as the hunt begins again. For now, Shigure lingers with you in a rare quiet moment, still half-disbelieving that the Wolf Burglar is captured and he is finally Sekiseigumi—lamenting, with wry honesty, that the most vexing complication was losing his hair, even as he waits for the next lead to push the story forward.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>シグレはあなたに駆け寄り、こそドロ一匹オオカミがヤンサへ逃げたと告げる。混乱のさなかに奪い取った短剣は古びていながら手入れが行き届き、ただの道具以上のものだと感じさせるうえ、ドマ風の作りがはっきりしていた。ヒルディブランドも同じ点に気づいていたと大げさにうなずき、シグレの洞察を称えて、一行はヤンサへ急ぐ。</p>
<p>七彩渓谷の七彩溝に着くと、きらめくクリスタルの景観にナシュ・マカラッカは目を輝かせ、ヒルディブランドでさえ感嘆を抑えきれない。だが肝心の手掛かりは見当たらず、シグレは捜索の糸口がないと認める。そこでヨウジンボウが静かに口を開き、ダイゴロウの嗅覚なら追えると言い切る。あなたが短剣を渡すと、ダイゴロウは嗅ぎ取り、すぐさま吠えて駆け出し、皆の胸にわずかな希望が灯る。</p>
<p>しかしドマへ続く道筋、門前の廃墟でダイゴロウは足を止め、くんくんと鼻を鳴らしながらも進めずに小さく鳴く。ヨウジンボウはナマズオの臭気が嗅覚を惑わせているのだと渋い顔で言う。仕方なく再び手分けすることになり、ヒルディブランドは見つけたら大声で「こそドロ一匹オオカミ！」と叫ぶと宣言し、ナシュは崩れかけた家々に目を向けて走り回る。シグレはいつもの無鉄砲さに苛立ちつつも、あなたに北西の一帯を調べて手掛かりを探せと促す。</p>
<p>あなたはひどい二日酔いで倒れ込んでいた酒臭いナマズオを起こし、疑い深い言葉を受けながらも話を引き出す。記憶は曖昧だが、背に妙な太刀を負った旅人を見たという証言だけは出てくる。さらにナマズオは、記憶よりも自慢のひげで方角がわかると言い、勢いよく指し示すものの、シグレはため息をつくしかない。それでも前へ進むため、あなたは瓦礫まみれの土器片の中から不自然に目立つ手袋を見つけ、これが新しい手掛かりになるかもしれないと持ち帰る。</p>
<p>ヨウジンボウに手袋を渡すと、ナマズオが離れた今なら追跡できると言い、ダイゴロウに匂いを嗅がせる。ダイゴロウはすぐに吠え、ヒルディブランドたちも駆けつけると、一行は犬の背を追って走り出す。やがてこそドロ一匹オオカミが姿を現し、高いところに友がいると豪語してモンタロウを呼びつけるが、ダイゴロウの速さには及ばない。シグレが逃走を阻み、ヒルディブランドはソボロ助広を取り戻したと勝ち誇る。だがヨウジンボウは真贋を確かめ、これは間違いなくソボロ助広だと認めたうえで、クガネへ戻って自分がアケボノに返すと言い、誰にも渡さぬと誓う。あなたたちは捕えた犯人を連れて、赤誠組へ向かう。</p>
<p>クガネの松葉門外広場にある赤誠組屯所で、ミヤマギはこそドロ一匹オオカミを引き渡されたことを喜び、長く悩まされてきた相手だと語る。だが拘束される直前、犯人は「真の悪党」を見抜けない愚か者だと吐き捨てる。その不穏な言葉が残る中、アケボノが現れ、手柄を称えつつソボロ助広の行方を問う。シグレがヨウジンボウが返しに行ったはずだと答えると、アケボノは彼を追い出したばかりで、姿を見ていないと言い放つ。あなたたちは、ソボロ助広を持ち去ったのはヨウジンボウではないかという疑念に至り、アケボノは怒り狂って、刀を返せなければシグレの夢を潰すと脅す。</p>
<p>そこへ厳かな赤誠組の隊士が、かつて赤誠組に加わりたいと言っていたシグレの夢を思い出させ、今も変わらぬかと問う。シグレは即答で肯定し、その功績を認めた隊士は入隊を提案する。手続きはあるが今すぐ話を進めると言われ、シグレは名誉だと受け入れる。戻ってきた彼は、あなたとヒルディブランド、ナシュに深く礼を述べ、共に歩んだ道が自分を変えたのだと認める。だが同時に最初の任務として、逃亡したヨウジンボウを追い、ソボロ助広を取り戻せと命じられる。援軍もない状況に、あなたは彼を一人にせず、ヒルディブランドはジムと刀を探すためなら天地の果てまで駆けると再び誓い、ナシュもその背を追って走り出す。ひとまずの静けさの中で、シグレはこそドロ一匹オオカミを捕え、自分が赤誠組になった現実をまだ信じきれないと打ち明け、最も厄介だったのは髪を失ったことだとぼやきながら、次の手掛かりを待つ。</p>
</div>

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'靠近的威脅',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
<p>Shigure 衝到你面前，語氣急得像是怕你慢一瞬間就會錯過線索：Wolf Burglar 已經逃往 Yanxia。混亂之中，他從那人身上奪下一把短匕——刀身老舊卻被細心保養，顯然不只是順手的工具，而且一眼就看得出是 Doman 的工藝。Hildibrand 也抓住同樣的細節大肆稱讚，說 Shigure 很有當偵探的天分，於是你們立刻動身追去。</p>
<p>來到 Yanxia 的 Valley of the Fallen Rainbow、站在 Prism Lake 前，遍地晶石的光彩讓人幾乎要忘了此行目的；Nashu 忍不住讚嘆，連 Hildibrand 都看得目眩神迷。可真正要命的是——要怎麼縮小搜尋範圍，Shigure 一時也答不出來。這時 Yojimbo 冷靜地提出辦法：Daigoro 的嗅覺能追蹤氣味，勝過任何人的眼睛。你把匕首交出去，Daigoro 嗅了幾下就吠叫起來，立刻往前衝去，讓你們終於重新抓到一點「有路可走」的感覺。</p>
<p>然而線索帶你們靠近 Doma 一帶的 Monzen 遺跡時，Daigoro 卻忽然停下來，發出不安的嗚咽，像是再也聞不出該往哪走。Yojimbo 皺著眉說附近有 Namazu，那股味道會把嗅覺攪亂。你們只能再度分頭：Hildibrand 誇口說只要撞見就會高喊「Wolf Burglar！」，Nashu 對破舊的屋舍評頭論足、四處亂看；Shigure 則又氣又無奈，抱怨你們總是先衝再說，但最後還是要你去搜索西北方一帶，看看能不能找出任何蛛絲馬跡。</p>
<p>你在殘破的角落發現一名宿醉到不省人事的 Namazu，把它叫醒後，它一邊懷疑你是不是盜賊，一邊含糊地說自己見過一個背著「很不尋常的刀」的旅人。它記不清細節，卻又拍胸脯說自己的鬚鬚能指路，隨手就指了一個方向，讓 Shigure 只能長嘆一口氣——可再怎麼不可靠，也比什麼都沒有好。你們決定繼續找更實在的線索，而你在一堆無關的碎片中，注意到一雙格外顯眼的手套：如果那是 Wolf Burglar 掉的，或許能派上用場。</p>
<p>你把手套交給 Yojimbo，他判斷 Namazu 走遠後，Daigoro 應該能再次正常追蹤。Daigoro 一嗅到手套就興奮地吠叫，Hildibrand 和其他人也立刻趕來，你們跟著牠一路追出去。Wolf Burglar 終於現身，還得意地叫囂自己有「高處的朋友」，甚至喊來 Montaro——可再多靠山也跑不過一隻全力衝刺的狗。Daigoro 迅猛地撲上去，Shigure 大喊別讓他逃了，而 Hildibrand 則高調宣布自己取回了 Soboro Sukehiro。Yojimbo 仍不放心，堅持先驗明真偽；確認那確實是真品後，他說自己正好要回 Kugane，會親自把 Soboro Sukehiro 送回 Akebono 手上，並保證絕不交給任何人。你們押著犯人回去，準備把 Wolf Burglar 交給 Sekiseigumi。</p>
<p>回到 Kugane 的 Matsuba Square，Miyamagi 聽到你們帶回 Wolf Burglar，立刻表示願意接收，並說這個人讓 Sekiseigumi 苦惱已久。可就在被押走前，Wolf Burglar 冷笑著丟下一句：你們這群人，看不見真正的惡人就在你們身邊。這句話還沒散去，Akebono 就趕到現場，先是誇你們辦得好，接著迫不及待地問起 Soboro Sukehiro 在哪。你們提到 Yojimbo 會把劍送回去，Akebono 卻當場否認——他已經把那個無禮的武士趕走了，根本沒再見過他。Shigure 的語氣一沉，說出你們都不想承認的可能：也許 Yojimbo 真的帶著 Soboro Sukehiro 跑了。Akebono 的怒火立刻炸開，痛罵你們怎麼會把劍交給他，並放話如果 Shigure 交不回 Soboro Sukehiro，他就要用餘生讓 Shigure 的夢想全部落空。</p>
<p>就在氣氛快要崩裂時，一名神情莊重的 Sekiseigumi 成員轉向 Shigure，提起他曾說過的夢——想加入 Sekiseigumi。Shigure 立刻挺身回答：是的。對方表示基於你們的功績，願意提議讓 Shigure 入隊，雖然仍需程序與上級討論，但可以立刻著手。Shigure 接受後回到你們身邊，向你、Hildibrand、Nashu 鄭重道謝，說自己彷彿變了個人，而你們正是讓他變得更好的人。</p>
<p>可他也同時被交付第一個任務：追捕叛逃的 Yojimbo，奪回 Soboro Sukehiro——而且作為新隊士，他沒有額外人手與資源。你不讓他獨自扛下去；Hildibrand 當場再度誓言要翻遍天地找回「Jim」和 Soboro Sukehiro，Nashu 也一路追著他跑走。臨別前，Shigure 仍難以置信地對你說，Wolf Burglar 被捕、自己成了 Sekiseigumi，這條路繞得離奇；最讓他心煩的甚至不是追逐本身，而是那頭被剃光的長髮——只是他苦笑著補上一句：Nashu 說她已經在想辦法找能讓頭髮長回來的藥水了。如今你們只能暫時喘口氣，等待新的線索把故事再次推向前方。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
