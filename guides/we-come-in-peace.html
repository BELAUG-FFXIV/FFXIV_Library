    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>At the Adders’ Nest, you straighten your back as Vorsaile Heuloix greets you with an approving smile, hailing you by your Grand Company rank and welcoming your eagerness as a young Serpent. He bids you welcome to the Adders’ Nest and asks if you mean to entwine your destiny with the Order of the Twin Adder—only for Yda to cheerfully cut in, offering the commander a good evening and explaining that you have come on other business today. Vorsaile receives Yda and Papalymo fondly, noting that his men say you now quest in the name of the Scions of the Seventh Dawn, and Papalymo confirms it with a wry smile, saying a little bird told them the Twin Adder was in need of your adventuring prowess.</p>
      <p>Vorsaile acknowledges that the rumor is true and begins to explain the situation, telling you that the Twin Adder is currently investigating the sylphs, that curious beast tribe dwelling deep within the Twelveswood. For the most part, the sylphs are a peaceable folk, a fact that greatly pleases the Elder Seedseer, who has no wish to see Gridania dragged into another fruitless war. The Order shares that hope, yet the sylphs’ connection to the primal Ramuh has raised a warning flag among the ranks. However friendly they may seem, Vorsaile warns, beastmen are still beastmen, and even the slightest chance that a summoning of Ramuh might upset the balance between Gridania and the sylphic tribes is something they dare not ignore. Papalymo lightly observes that it is better to be safe than sorry, and the commander does not disagree.</p>
      <p>Turning back to you, Vorsaile admits that he stands at a crossroads: should Gridania strike at Ramuh, or leave the sylphs to their own ways? He lacks the knowledge to reach a sound conclusion. Opinions are plentiful within Gridania, he says, but listening only to one’s own people is one of the greatest mistakes a commander can make. Instead, he wishes to hear from the other side—the sylphs themselves—and needs an impartial party to act as his liaison. That, he says, is where you and the other Scions come in. The sylphs of Little Solace remain untempered and have long held productive talks with Gridania’s people, and Vorsaile would learn their honest thoughts regarding their tempered brethren.</p>
      <p>Even so, he urges you to proceed with great care. Sylphic traditions and manners differ greatly from your own, and a careless misstep in etiquette could easily sour an otherwise promising parley. On your way to Little Solace, he instructs you to stop at the Hawthorne Hut, where an officer of the Twin Adder can teach you how best to earn the sylphs’ favor. He ends by wishing that your expedition prove worthwhile. Papalymo, clearly intrigued, remarks that a friendly palaver with the sylphs sounds like a pleasant diversion, and recalls that a ferry from Westshore Pier should take you directly toward the Hawthorne Hut. Yda echoes his words with bright enthusiasm, hoping everything will be as straightforward as he claims.</p>
      <p>With your task clear, you make for Westshore Pier in Old Gridania. There, at the base of the hill, you meet Mitainie, who confirms that the ferry moored below will carry you across the lake to the East Shroud. She advises you that once you set foot on the far shore, you need only head due east, and you should find the Hawthorne Hut without much trouble.</p>
      <p>Following her directions, you cross the waters of the Black Shroud and arrive in the East Shroud, making your way through the wooded paths of Nine Ivies until the Hawthorne Hut comes into view. Within, you are greeted by Amelain of the Twin Adder, who confirms that you have come to learn about the sylphs. She explains that for all their whimsy, the sylphs are a wary people—made all the more cautious since the Empire’s incursion into the Shroud. Yet if you can earn their trust, she assures you, they are as friendly as any folk, quirks and all. For deeper understanding, she directs you to the hut’s master, Rolfe, who has forgotten more about the sylphs than she will ever know, and you prepare to seek his counsel before continuing on to Little Solace.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>双蛇党本部「アダー・ネスト」で、あなたは姿勢を正し、ボルセル・ウロア指揮官の前に立つ。彼はグランドカンパニーでのあなたの階級名を口にし、その勤勉な働きぶりを称えながら、若き蛇兵としての熱意を喜ばしく受け止めているようだ。ここ「アダー・ネスト」へようこそ──双蛇党と共に運命を絡める覚悟はあるか、と問う指揮官に応えようとしたところで、イダが元気よく声を上げ、このたびは別件でやって来たのだと軽やかに告げる。ボルセルはイダとパパリモを懐かしげに迎え、近頃は「暁の血盟」の名のもとに活動していると部下から聞いていると話す。パパリモはそれをあっさり肯定し、双蛇党が冒険者の力を必要としていると「小鳥」が囁いていたのだと、いつもの皮肉めいた口調で続ける。</p>
      <p>噂は真実だ──そう言って、ボルセルは事の次第を語り始める。いま双蛇党が調査しているのは、黒衣森の奥深くに棲む好奇心旺盛な蛮族、シルフ族の動向であるという。シルフ族の多くは穏やかな性格であり、それはグリダニアの盟主にとっても喜ばしいことだ。二度と無益な戦いに人々を巻き込みたくないという思いは、双蛇党も同じである。だが、そのシルフ族が蛮神ラムウと繋がりを持つという事実が、隊の中に警戒の種を生んでいた。いかに友好的に見えようとも、蛮族は蛮族──もしも蛮神召喚がグリダニアとシルフ族との均衡を崩す可能性があるのなら、それを見過ごすわけにはいかない。パパリモは「備えあれば憂いなしですね」と軽く相槌を打ち、その判断に異論はない様子だ。</p>
      <p>そしてボルセルは、あなたに向き直り、今まさに岐路に立たされていると打ち明ける。ラムウに先んじて手を打つべきか、それともシルフ族のやり方に干渉せず静観すべきか──判断するには、あまりにも材料が足りないと。グリダニアの中にもさまざまな意見はあるが、自分たちの声だけに耳を傾けるのは、指揮官として最大の過ちだと彼は言う。だからこそ、相手側の声を直接聞きたい。その橋渡し役として、中立の立場に立てる暁の血盟に協力してほしいのだと、あなたに依頼を託す。未だ蛮神に魅了されていないシルフ族が暮らす「シルフの仮宿」では、これまでもグリダニアとの間で有意義な対話が重ねられてきた。ボルセルは、彼らが蛮神に魅了された同胞をどう見ているのか、率直な意見を聞き出してほしいと願っている。</p>
      <p>とはいえ、軽率な行動は禁物だとボルセルは念を押す。シルフ族の慣習や礼節は、森の民とは大きく異なっており、わずかな行き違いでも有意義な会談を台無しにしかねないというのだ。そこで彼は、シルフの仮宿へ向かう途中、黒衣森東部森林ナインアイビーの一角にある「ホウソーン家の山塞」に立ち寄るよう勧める。そこに詰めている双蛇党の将校が、シルフ族の機嫌を損ねない接し方を教えてくれるだろう──そう言って、今回の遠征が有意義なものとなるよう祈りの言葉を添える。パパリモは、シルフ族との友好的なおしゃべりなら、なかなか愉快な寄り道になりそうだと興味深げに笑い、旧市街の船着き場から出ている渡し船なら、山塞の近くまで一気に運んでくれるはずだと続ける。イダもまた「楽しいおしゃべりになるといいね」と胸を躍らせ、話がパパリモの言うとおり素直に運ぶことを願っている。</p>
      <p>こうして役目を引き受けたあなたは、グリダニア旧市街の丘を下り、船着き場へと向かう。そこで出会ったミテニエは、丘のふもとに繋がれた渡し船が、湖を越えて東部森林へと渡してくれると教えてくれる。対岸に着いたら、あとはまっすぐ東へ進めばよい──そうすれば、ほどなくホウソーン家の山塞に辿り着けるはずだと、彼女は丁寧に道筋を示してくれる。</p>
      <p>ミテニエの助言に従い、あなたは黒衣森の水面を渡って東部森林へと足を踏み入れる。ナインアイビーと呼ばれる一帯の小径を抜けていくと、やがて森の中に築かれた山塞──ホウソーン家の山塞が姿を現す。その内部であなたを迎えたのは、双蛇党所属のアメレインという将校だった。彼女は、あなたがシルフ族について学ぶためにここを訪れたのだと知ると、快く頷き、彼らがどれほど気まぐれで、同時に警戒心の強い民であるかを説明する。とりわけ帝国軍が森に姿を見せてからは、その傾向が強まっているという。それでも信頼を勝ち取ることさえできれば、シルフ族は誰にも劣らぬ友好的な相手になる──人にはそれぞれ癖があるものだと笑いながら、アメレインはそう断言する。そして最後に、この山塞の主であるロルフこそが、シルフ族について最も多くを知る人物だと教え、彼のもとを訪ねるよう勧めるのだった。</p>
    </div>

    </div>`,

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'花蜜之路',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Adders’ Nest 裡，你挺直背脊站在 Vorsaile Heuloix 面前。指揮官以你的雙蛇黨階級稱呼你，語氣裡帶著滿意與欣賞，說這正是他喜歡看到的幹勁──年輕 Serpent 願意主動報到，永遠是好事。他隨即正式歡迎你來到 Adders’ Nest，並問你是否打算將自己的命運與 Order of the Twin Adder 緊緊相織。就在你準備回應之際，Yda 活力十足地打招呼，說今晚得罪了，因為你們是為了另一件事而來。Vorsaile 露出愉快的笑容迎接 Yda 和 Papalymo，提起部下最近常說，你們似乎以 Scions of the Seventh Dawn 之名在各地奔走。Papalymo 很乾脆地承認，還打趣說有隻「小鳥」告訴他，Twin Adder 正需要冒險者的本事。</p>
      <p>Vorsaile 表示這隻小鳥唱得一點也沒錯，接著開始說明目前的狀況。他告訴你，如今 Twin Adder 正在調查的是棲息在 Twelveswood 深處的妖精族──sylph，那是一支相當好奇又神祕的部族。就大多數來說，sylph 們都相當溫和，這也讓 Elder Seedseer 十分欣慰，她並不希望自己的子民再度被捲入毫無意義的戰爭。Twin Adder 與她想法一致，然而 sylph 與 primal Ramuh 之間的關係，卻在軍中拉起了一面警戒旗。指揮官提醒你，就算看起來再怎麼友善，beastmen 畢竟仍是 beastmen；只要有一絲可能，讓召喚 Ramuh 破壞 Gridania 與 sylph 部族之間的平衡，他們就不能視而不見。Papalymo 只淡淡地補上一句「寧可小心一點也好」，顯然對這份謹慎並無異議。</p>
      <p>接著 Vorsaile 把視線重新投向你，坦言自己正站在一個難以抉擇的岔路上──究竟應該先下手為強，主動對 Ramuh 採取行動，還是保持距離，任由 sylph 照自己的方式生活？他承認，自己手上的情報遠不足以做出確切的判斷。Gridania 內部有各式各樣的意見，但只聽自家人的聲音，是指揮官最嚴重的錯誤之一。與其如此，他更希望能聽聽「對方」怎麼說，也因此需要一個能保持中立立場的聯絡人。這正是他請求你們 Scions 出面的理由。居住在 Little Solace 的 sylph 目前尚未被 Ramuh 魅惑，多年來也曾多次與 Gridania 的人們進行建設性的對話。Vorsaile 希望你能從那裡的 sylph 口中，聽到他們對那些已被魅惑同胞的真實看法。</p>
      <p>不過，就算目標是對話，他也反覆強調必須謹慎。sylph 的傳統與禮節與你習慣的一切都大不相同，一點小小的文化失禮，都可能讓原本有機會成功的會談功虧一簣。為了避免這種情況，他建議你在前往 Little Solace 的途中，先繞道 Hawthorne Hut 一趟。那裡駐守著 Twin Adder 的軍官，可以教你如何在不冒犯對方的情況下，贏得 sylph 的好感。說完，他祝願這趟遠征能有所收穫。Papalymo 聽完後，覺得能和 sylph 好好「閒聊」一場，似乎也算是一段頗為愉快的插曲，還想起從 Westshore Pier 出發的渡船，應該能直接把你們送到 Hawthorne Hut 附近。Yda 也興致勃勃地呼應，真心希望一切能像 Papalymo 說的那麼單純順利。</p>
      <p>接受任務之後，你動身前往 Old Gridania 的 Westshore Pier。來到丘陵腳下的渡口時，你遇見了 Mitainie。她向你確認，你正打算搭船前往 East Shroud，於是指向停泊在坡下的渡船，說那艘船會載你橫越湖面，將你送到黑衣森林東側的岸邊。到了那頭之後，只要一路向東走，很快就能抵達 Hawthorne Hut，她耐心地把路線說得清清楚楚。</p>
      <p>依照 Mitainie 的指引，你乘船渡過湖面，踏入 The Black Shroud 的 East Shroud。一邊走過林木間的步道，一邊穿越名為 Nine Ivies 的一帶，你的腳步在樹影間推進，直到 Hawthorne Hut 的輪廓出現在前方。走進這座山間小屋時，一名自稱 Twin Adder 所屬的 Amelain 上前迎接你。得知你是為了 sylph 而來，她先是點頭表示理解，接著解釋這些妖精看似輕浮善變，內心卻十分多疑，尤其自從 Empire 踏入這片森林後更是如此。不過，一旦真正取得他們的信任，sylph 其實和任何人一樣，可以成為溫暖可靠的夥伴──每個族群都有自己的小怪癖，不是嗎？她帶著笑意這麼說。最後，Amelain 告訴你，要想真正了解 sylph，最好還是去找這座山屋的主人 Rolfe；他對 sylph 的認識之深，遠遠超過她所知道的一切。於是，你準備向 Rolfe 請教，為接下來前往 Little Solace 的會談做好萬全準備。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
