<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`Apocalypse Nigh`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Prishe falls quiet after Scoria is safely back with her father. With a weary sigh from Alxaal, Bakool Ja Ja urges everyone onward—now it’s time to head for the dome, and the train from Shaaloani Station will take you there. Prishe snaps out of it, apologizes, and falls in step.</p><p>At the station, Prishe can only sigh again while Alxaal admits he had heard of the dome, yet seeing it even from afar is something else. The timing is perfect—the train has just arrived, and you need only follow the tracks.</p><p>But as you prepare to depart, Prishe’s doubt spills out. She knows she said worrying about whether you’re real won’t help, yet she can’t stop turning Sareel Ja’s words over in her head. It isn’t exactly fear—though it’s a little scary—it’s the tangled feeling underneath it, and she hates how complicated it is. When you point out that she really misses home—and Ulmia—she doesn’t deny it. Scoria’s singing brought back Ulmia, and with it the question of what everyone back home is doing now.</p><p>Alxaal tries to steady the moment: even if you are merely echoes, who says you cannot return to Vana’diel? If anyone knows a way, Sareel Ja would. But Prishe can’t ignore the cruel logic—what place would she have there if the real Prishe already exists? Kam’lanaut and Eald’narche felt like unmistakable impostors, proof that you’re living the same lie. Scoria’s eager promise to see you again and hear her sing made agreeing feel like another falsehood—and if you stop Sareel Ja, what then? What happens to you?</p><p>Alxaal admits he has no answer—no one does—because the future is what you make of it. When this is over, he intends to see everything this world offers; even without memories, his adventurer’s heart remains. Maybe he’ll find a new calling along the way—after all, the world is “one damn big place,” and there might be something out there for both of them. Prishe exhales, concedes the point, and says you’ll just have to find your own place to call home. But first, you have to meet with Oblivion—and you need to hurry.</p><p>Beyond the dome, you press onward and are received by an electrope engineer who introduces himself and listens to what you’ve come to discuss. He fumbles his words as he tries to process what you are—then asks you to forget he said anything. Prishe answers honestly: you’re not even sure yourselves. All you truly know is that your bodies are made from electrope, and you were hoping for help understanding what that means. The engineer agrees to try, and while he prepares tests, Alxaal asks to look around—only to catch himself and wonder aloud whether you even have blood if you’re made of electrope. Prishe laughs at the absurdity, and the others note that at least your spirits seem brighter as you move forward.</p><p>Back at Brightploom Post, Bakool Ja Ja briefs the Landsguard Messenger, who praises your work defeating Sareel Ja’s echoes and promises the guard will be ready if new threats rise in Yak T’el. Bakool Ja Ja admits the waiting is maddening, but vows that when Sareel Ja stirs again, you’ll be called. Far away, somewhere in the rift, a Dawnservant demands the vessel promised to him. Sareel Ja apologizes and insists preparations are nearly complete—then, in private, seethes at the Dawnservant’s impatience and turns his thoughts to you: the adventurer exceeds expectations, but once he finds an echo worthy to match you, everything will fall into place. He dismisses the “ancients,” insists you stand no chance against “the gods,” and decides your companions must be dealt with as well—Prishe easily enough, but the other one is troubling. That stubborn survival awakens an unsettling suspicion, and Sareel Ja clings to his contingencies as he vows that only blessed siblings—possessed of resolve and reason—are fit to rule.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Bakool Ja Ja <small class="muted">(Shaaloani, X:14.9, Y:19.4)</small></div></div>`,

  JP:{
    langLabel:'JP',
    pageTitle:'世界に在りて君は何を願うのか？',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>プリッシュは、少女が父のもとへ戻ったあとも言葉を失ったままだ。ため息をつく仲間に促され、あなたたちは巨大なドームへ向かうことにする。出発には列車を使えるらしい。呼びかけられたプリッシュは我に返り、慌てて歩き出す。</p><p>駅に着くと、プリッシュはまた小さく息を吐く。仲間は、噂には聞いていたが、遠目に見てもあのドームは圧倒されると言う。ちょうど列車も到着したところで、あなたたちは線路に沿って進めばいいだけだ。</p><p>ところが、いざ出発というとき、プリッシュの胸の奥に溜め込んでいたものが溢れ出す。心配しても仕方がないと言ったのに、自分は矛盾している――あの男に言われたことが頭から離れない。怖くないわけじゃない、少しは怖い。けれどそれ以上に、言葉にしづらい感情が絡み合っていて、どうしてこんなにややこしいのかと苛立つ。あなたが「故郷」や「ウルミア」のことを口にすると、プリッシュは否定しない。少女の歌がウルミアを思い出させ、そして故郷の皆が今どうしているのかが気になってしまうのだ。</p><p>仲間は、たとえ自分たちが何者であろうと、帰る道がないと決まったわけではないと言う。もし道を知る者がいるなら、あの男が手がかりを握っているはずだ、と。だがプリッシュは、もし本物のプリッシュがすでにいるなら、自分に帰る居場所などあるのかと問い返す。カムラナートやエルドナーシュの存在が、偽物であることの証のように思えてならない。少女が再会を信じて歌うと言ったとき、あなたたちが「また来る」と答えるのが、さらに嘘を重ねるようで苦しかった――あの男を止めたとして、その先で自分たちはどうなるのか。</p><p>仲間は答えを持たないと認める。けれど未来は、誰かに与えられるものではなく、あなたたちが作るものだと言う。すべてが終わったら、この世界のあらゆる土地を見て回るつもりだ。記憶はなくても、冒険者としての心は失っていない。道中で新しい生き方に出会えるかもしれない――世界は途方もなく広いのだから。プリッシュもようやく息を整え、二人で自分たちの「帰る場所」を見つければいいのだと受け入れる。だがまずは、ある組織と会わねばならない。あなたたちは急ぐことにする。</p><p>ドームの内へ踏み込み、あなたたちは技師の男と対面する。男は状況を理解しきれず、つい口を滑らせてしまい、慌てて取り繕う。プリッシュも正直に言う――自分たち自身、確信はない。ただひとつ確かなのは、この身体が特殊な素材で形作られていることだ。その意味を知りたい。男は力になれるかは分からないが試してみたいと応じ、検査の準備に入る。あなたたちは周囲を見て回ってよいと言われ、仲間は「冒険者の血が騒ぐ」と言いかけて、そもそも血があるのかと自分で突っ込み、プリッシュは笑って受け流す。少なくとも、あなたたちの表情が少し明るくなったことだけは確かだった。</p><p>やがてあなたたちは拠点へ戻り、近衛の使者に近況を伝える。使者は、あなたがあの男の配下を退けたことを労い、森に新たな脅威が現れれば備えを整え、動きがあれば必ず連絡すると約束する。待つ時間は苛立たしいが、決着のためには必要だ――そう言い残して別れた直後、遠い裂け目のどこかで、器を求める者が苛立ちを露わにする。約束した器はまもなく整うと、あの男は丁重に詫びながら断言し、内心では相手の短気に耐えかねていた。そしてあなたのことを思い浮かべる――期待以上だが、相応の相手を用意できればすべてが噛み合う。古の者には抗えても、神々には勝てない。次は仲間を排する必要がある。プリッシュは容易い。だがもう一人だけは、理由もなく生き延び続け、そのしぶとさが不穏な疑念を呼び起こす。男は予備策にすがりつき、決意と理性を備えた「祝福された兄妹」こそが統べるにふさわしいのだと、静かに言い聞かせる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> バクージャジャ <small class="muted">(シャーローニ荒野, X:14.9, Y:19.4)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="for-whom-the-verse-is-sung.html">歌うは誰がため</a></div>
      <div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv. 100</div>
    </div>`,
    followq:`<div class="stack"><div class="row muted">つづく</div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'末日將至有何所願',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Scoria 平安回到父親身邊後，Prishe 卻陷入了沉默。Alxaal 嘆了口氣，而 Bakool Ja Ja 也提醒你們：既然事情告一段落，就該前往 the dome（罩住 Yyasulani 的巨型屏障）。你們可以從 Shaaloani Station 搭列車過去。Prishe 回過神來，連忙道歉，說這就出發。</p><p>到了車站，Prishe 又忍不住嘆氣。Alxaal 說他早聽過 the dome 的傳聞，但即使隔著一段距離，也依然震撼。列車正好到站，Bakool Ja Ja 說你們只要沿著軌道前進即可。</p><p>就在要動身時，Prishe 把壓在心裡的話全倒了出來。她明明說過一直糾結「我們到底是不是真的」也無濟於事，現在卻覺得自己像個偽君子，她停不下來去想 Sareel Ja 說過的那些話。她說自己不是害怕……至少不全是，雖然確實有一點可怕；更多的是那種說不清、理不順的複雜感，讓她煩躁得想罵人。當你點出她其實很想念家鄉、也很想念 Ulmia 時，Prishe 沒有否認。她說 Scoria 的歌聲讓她想起 Ulmia，也讓她開始好奇：家鄉的大家現在都在做什麼，甚至她腦中已經浮現出至少有一個人，肯定又在展開下一段盛大的冒險了。</p><p>Alxaal 試著把話說得更穩一些：就算你們只是「回聲」，又有誰能斷言你們不能回到 Vana’diel？如果真有方法，Sareel Ja 應該會知道。但 Prishe 卻反問：如果真正的 Prishe 已經在 Vana’diel，那她回去又能算什麼？她說自己一想到 Kam’lanaut 和 Eald’narche，就覺得那種「明顯是冒牌貨」的感覺像證據一樣，證明你們也活在同一場謊言裡。她更忘不了 Scoria 那麼期待你們回來聽她唱歌，你們答應「會再來」時，她只覺得像是在延續那個謊。她相信你們會阻止 Sareel Ja，可是之後呢？你們又會變成什麼？</p><p>Alxaal 說他也沒有答案，因為沒有人有，未來是你們自己做出來的。等一切結束後，他打算把這個世界能看的都看過；就算失去了記憶，他也沒有失去冒險者的心。他甚至覺得自己或許能在旅途中找到新的方向；畢竟世界「大得要命」，也許你們兩個都能在某個地方找到屬於自己的位置。Prishe 聽完沉沉吐出一口氣，承認他說得沒錯：那就由你們自己找一個能稱作「家」的地方。但在那之前，你們得先去見 Oblivion（Alexandria 的反抗組織）。她低聲咒罵了一句，Alxaal 則催你們趕緊動身。</p><p>你們踏入 the dome 內部後，見到了 Kikwezana，一名 electrope（一種具有龐大力量的特殊礦石）工程師。他一邊聽、一邊又像被自己的想法嚇到似的結巴，最後乾脆要你們當作沒聽見。Prishe 反而坦率回應：其實你們自己也不確定自己算不算「真的活著」。你們唯一確定的是，你們的身體是由 electrope 構成的，所以才想請他幫忙弄清楚這代表什麼，你們不想只是坐著沮喪下去。Kikwezana 說他不確定能幫上多少忙，但很願意嘗試。當他準備進行檢測時，Alxaal 提議想四處看看，說陌生土地總能讓冒險者的血液沸騰——話才出口，他又愣住：如果你們是 electrope 做的，你們真的有血嗎？Prishe 笑他問得荒謬，而 Bakool Ja Ja 也看得出來：至少你們的情緒似乎好了些。</p><p>回到 Brightploom Post 後，Bakool Ja Ja 把近期的事告訴 Landsguard Messenger。對方稱讚你們擊敗 Sareel Ja 的回聲做得很好，並保證守備會做好準備，以防 Yak T’el 再出現新的威脅。Bakool Ja Ja 說等待 Sareel Ja 現身令人煩躁，但只要林地裡一有動靜，Landsguard 一定會聯絡你們——到時就能真正把他逼上絕路。與此同時，在某處裂隙之中，Shade of Resolve 催問他承諾的「容器」究竟還要等多久；Sareel Ja 低聲道歉，說打造配得上對方威勢的容器並不容易，但很快就會完成。轉過身後，他把不耐煩的怒意壓在心底，並把盤算落在你身上：你持續超出他的預期，只要他找出足以與你匹敵的那個回聲，一切就會到位。他斷言你或許能對抗古代之物，但面對「諸神」毫無勝算；你的同伴也必須被處理，Prishe 不難，但 Alxaal 的存活卻讓他難以理解，甚至引起一個令他不安的猜測。即便如此，他仍握著後手，並堅信只有同時具備「決意」與「理性」的祝福兄妹，才有資格統治。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 巴庫爾・賈賈 <small class="muted">(沙阿羅阿尼荒野, X:14.9, Y:19.4)</small></div></div>`,

      <div class="row"><a class="link" href="for-whom-the-verse-is-sung.html">為誰而歌</a></div>

    </div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
