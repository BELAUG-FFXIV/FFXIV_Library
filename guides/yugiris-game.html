    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`Yugiri’s Game`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Alphinaud tells you that even now the Domans are preparing to depart at Vesper Bay. From there, they will be transported by carriage to Ul’dah. The decision was made suddenly, and he expects the refugees may need help coordinating the last details—so he sends you back to Vesper Bay to do whatever must be done, tasks great and small, and to smooth the process however you can. When you arrive, he instructs you to speak with a man named Hozan, whom Yugiri has appointed to lead the first group.</p><p>At Vesper Bay, Hozan greets you with formal respect. Alphinaud has already told him a Scion would come to assist, and he says he is honored to meet you—but also ashamed. In his eyes, someone of your strength should not be burdened with trifles. Yet he admits he recognized you at a glance, and that many among his people, himself included, have some skill at arms. Still, what he needs now is not a blade, but your help: the children under his care have gone to ground, and he cannot find them. They are talented at hiding from him, but he hopes your keen eyes will succeed where his have failed. When you agree, he thanks you and asks you to speak with his son, Yozan, who can tell you more. These have been trying times, he says, and Yozan has carried himself well—he only wishes he could do more for him.</p><p>Yozan meets you with an energy that feels almost defiant against everything that has happened. He introduces himself as Hozan’s son and immediately chatters about the journey to Ul’dah—horsebird-drawn carriages, he heard. The idea fascinates him, even as it strikes him as strange: giant birds that people ride like horses. He wants to try riding one himself. When you explain you are looking for the others, he tells you not to worry—he already told everyone to get ready. But he does need your help: they were finishing a game of hide-and-seek, and three players are still hidden. Yugiri told them to take the game very seriously, so they refuse to come out until they are found. Vesper Bay is not large, Yozan insists—you will find them quickly.</p><p>You track the children down one by one. One challenges you at first—you’re not Yozan, so who are you? When she hears your name, she realizes you are a Scion, and her suspicion turns into excitement. Of course you know Yugiri, then—she is wonderful, and she is good at hide-and-seek, too. Another child is more grudging, shocked that you found them so easily, then mutters that perhaps you are simply better at this than they are—after all, the Garleans never found them. A third protests that it is unfair: Yozan never said adults could play. Yet even that complaint melts into uneasy courage when the child hears about the horsebird carriage—scary, perhaps, but if Yozan says it is safe, they will go.</p><p>When you return, Hozan is visibly relieved. All the children are accounted for. When he realizes the hiding was part of a game, he explains the truth beneath it: Yugiri wanted the children to learn what to do if the Garleans ever found them again. He hopes those days are past, yet he takes comfort in knowing they are prepared—because even now, they cannot afford to rely on hope alone.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Alphinaud <small class="muted">(Ul’dah - Steps of Nald, X:11.7, Y:9.6)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="promises-to-keep.html">Promises to Keep</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="why-we-adventure.html">Why We Adventure</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'ドマの子どもたち',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>アルフィノは告げる。いままさにドマの者たちはベスパーベイで出発準備を進めており、そこから馬車でウルダハへ移送されるという。ただ、すべてが急に決まった以上、準備の取りまとめには手助けが要るかもしれない。だからあなたはベスパーベイへ戻り、大きなことから小さなことまで、必要なことは何でも引き受けて滞りなく進めよ、と。到着したらホザンという男に会うようにとも言う。ユウギリの話では、彼が第一陣のまとめ役に任命されたらしい。</p><p>ベスパーベイでホザンは丁重にあなたを迎える。アルフィノから、対策室の者が支援に来ると聞いていたという。会えたことを光栄に思う一方で、彼はどこか恥じ入ったように言う。あなたほどの戦士に、こんな些事を頼むべきではないと。それでも彼は、ひと目であなたがただ者ではないと分かったと言い、自分も含め多くのドマの民が武器を扱えると認める。だが今、彼が求めるのは腕力ではなく「目」だった。彼のもとに預けられた子どもたちが隠れてしまい、どうしても見つけられないのだ。</p><p>あなたが引き受けると、ホザンは礼を述べ、息子のヨザンを訪ねてほしいと言う。彼なら事情を詳しく話せる、と。苦しい時期が続いたが、ヨザンはよく耐えてくれた。父としてもっとしてやれれば、とホザンは言葉を濁す。</p><p>ヨザンはあなたを見るなり、明るさを前面に押し出して名乗る。ホザンの息子だ、と。そして、ウルダハへ行くのか、馬鳥が引く馬車で移動するらしい、と興奮気味に話す。馬みたいに乗られる巨大な鳥なんて変だろう、と言いながらも、いつか自分も乗ってみたいのだという。あなたが子どもたちを探していると伝えると、ヨザンは心配するなと言う。もう馬車の準備をするよう皆には伝えた。だが、助けてほしいことがある。かくれんぼの続きで、まだ三人が隠れたままだというのだ。ユウギリが「本気でやれ」と言ったから、見つけられるまで絶対に動かない。けれどベスパーベイは広くない、きっとすぐ見つかるはずだ、と。</p><p>あなたは子どもたちを一人ずつ見つけ出す。最初の子は、あなたがヨザンではないと気づいて警戒するが、名を聞くと「対策室」の者だと気づき、表情を輝かせる。ユウギリを知っているのか、彼女はすごい、かくれんぼも上手だ、と矢継ぎ早に言い、もう出発の時間だと名残惜しそうに別れる。次の子は、見つかったことに悔しがり、もっと練習しないと、と唸る。だがすぐに、あなたが上手なのだろう、と認めるように言い添える——ガレマール帝国の者たちには見つからなかったのに、と。最後の子は、遊びに大人が入るなんてずるいと抗議する。けれど馬鳥の馬車に乗ると聞くと怖がりながらも、ヨザンが安全だと言うなら行く、と小さく決意する。</p><p>ホザンのもとへ戻ると、彼は安堵をにじませる。子どもたちは全員そろった。かくれんぼだと知った彼は、なぜそんな遊びをしていたのかを静かに語る。ユウギリは、もし再び帝国の者たちに見つかったとき、子どもたちがどうすべきかを身につけさせたかったのだという。そんな日々はもう過ぎ去ったと思いたい。だが、それでも備えがあるという事実が、彼に小さな安心を与えていた。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> アルフィノ <small class="muted">（ウルダハ：ナル回廊, X:11.7, Y:9.6）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="promises-to-keep.html">安息できる場所</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="why-we-adventure.html">ドマの民、ウルダハへ</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'多瑪的孩子們',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Alphinaud 告訴你，Domans 此刻正在 Vesper Bay 加緊準備出發，之後會先以馬車運到 Ul’dah。只是這一切決定得太突然，他不意外難民在協調與收拾上會需要幫手。因此他要你立刻回到 Vesper Bay，大小雜務一概接下來——一句話：該做的就去做。抵達後先去找 Hozan；依 Yugiri 所說，Hozan 被指派為第一批出發人員的帶隊者。Alphinaud 也提醒你，這些工作看起來也許微不足道，但它們對於確保難民接下來旅途的安全至關重要。</p><p>你到了 Vesper Bay，Hozan 以極其鄭重的態度向你致意。他說 Alphinaud 已經通知他會有一位 Scion 前來協助，能見到你他深感榮幸，卻也同時覺得羞愧——像你這樣的強者，理應做更重要的事，不該被這些琐碎差使拖住腳步。可他也承認，只看一眼他就知道你不是普通人；而他自己，以及許多 Domans，也都多少懂得用武之道。只是現在，他需要的不是武器，而是你的眼力：交由他照看的孩子們又躲起來了，他怎麼找都找不到。他們太擅長不讓他看見，但他相信你能做到他做不到的事。</p><p>你答應幫忙後，Hozan 感謝你，並請你去找他的兒子 Yozan——對方能告訴你更多細節。他語氣裡帶著一種壓著不說的心疼：這段日子太艱難了，可 Yozan 表現得很好；他只是希望，自己能為兒子做得更多一點。</p><p>Yozan 見到你時顯得格外活躍，像是用興奮把不安壓到最深處。他自我介紹是 Hozan 的兒子，接著就迫不及待問你會不會一起去 Ul’dah——聽說是坐「horsebird 拉的馬車」！他一邊覺得那很古怪：那麼大的鳥竟然被人像騎馬一樣騎著；一邊又坦白說他其實很想試著騎看看。當你提到你在找其他孩子，他立刻說不用擔心，他早就叫大家去準備馬車了。但他需要你幫一個忙：他們剛玩到一半的捉迷藏還沒結束，還有三個人躲著沒出來。因為 Yugiri 交代要「很認真地玩」，所以他們沒被找到就絕對不會移動。Vesper Bay 不大，Yozan 說你一定一下就能把人找齊。</p><p>你依序找到了三個躲藏的孩子。第一個孩子先不服氣地問你不是 Yozan、你是誰；可一聽見你是 Scion，就立刻興奮起來，說你一定認識 Yugiri，還誇她很棒、也很會玩捉迷藏，然後才想起快到出發時間，匆匆道別。第二個孩子被你找出來後懊惱得不行，說自己得再多練習；可隨即又像是在替自己找回一點勇氣似的說，也可能是你太擅長了——畢竟 Garleans 都沒找到他。第三個孩子則抗議得更直接：大人也來玩也太犯規了；但一聽到要搭 horsebird 馬車，又立刻露出害怕，猶豫著說如果 Yozan 說安全，那他就會去。</p><p>你回到 Hozan 那裡，他明顯鬆了一口氣，說孩子們都到齊了。當他聽見你們是在玩捉迷藏，他沒有責備，只是平靜地解釋：那不是單純的遊戲。Yugiri 認為孩子必須知道，如果 Garleans 找上門，他們該怎麼做、該怎麼藏起來。Hozan 希望那樣的日子已經過去了，可即便如此，他仍因「至少他們有準備」而感到一絲安慰。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 阿爾菲諾 <small class="muted"> 烏爾達哈現世迴廊（X:11.7, Y:9.6)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="promises-to-keep.html">安身之處</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="why-we-adventure.html">前往烏爾達哈</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
