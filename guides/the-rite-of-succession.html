const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'The Rite of Succession',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You keep climbing Tuliyollal’s narrow, winding streets with Wuk Lamat and Krile, and even when the alleys twist and overlap, the rule stays simple: keep heading upward and you’ll reach the palace. The talk turns to the food you’ve glimpsed along the way, to how easily the city stirs appetite—and to the uneasy feeling that there won’t be time to indulge once the rite begins.</p><p>Erenville admits he’s done what he can to show Alphinaud and Alisaie the city, but their excitement sent them darting after every curiosity like a pair of unruly coeurls. Wuk Lamat laughs in recognition—Sharlayan had done the same to her—then steadies herself. It’s time to enter her father’s palace, to let him know she’s home, and to introduce the allies she has chosen… though with him, you never know what you’ll be walking into.</p><p>At Sunperch, the answer is waiting in plain sight: Estinien trading blows with Gulool Ja Ja. When the duel ends, Gulool Ja Ja turns his attention to his “darling daughter,” and the conversation makes clear what age has changed—one head still burns with resolve and a love of combat, while the wiser head sleeps more and more, the veil helping restore its strength. Wuk Lamat explains the family’s pet name for her, and Erenville—correcting the name Gulool Ja Ja uses—makes it plain he has changed since living abroad.</p><p>Without delay, Gulool Ja Ja gathers the claimants and names them before everyone: Zoraal Ja, Koana, Wuk Lamat, and Bakool Ja Ja. He speaks of laying down the torch he’s carried, and of taking inspiration from older customs—how Mamook once chose an Autarch—then declares that Tuliyollal is a nation of many peoples, and its leader need not be two-headed nor even Mamool Ja. The contest is set: to claim the throne, you must travel Yok Tural…and find the city of gold.</p><p>Doubt rises, and Koana voices it outright—after so many failures, the golden city sounds more like faerie tale than fact. Gulool Ja Ja answers with certainty: he has seen it with his own four eyes, and he intends for the claimants to retrace his journey to its gates. Victory will require more than reaching the end; seven chosen electors will test worth along the way, awarding keystones to fit into seven tablets. Only with every tablet completed can the seal on the golden city’s gates be opened.</p><p>Krile steps forward as a representative of the Students of Baldesion, offering a faded letter once addressed to her grandfather Galuf and the earring enclosed with it, and asking what Gulool Ja Ja knows. He refuses—for now—saying any answer would tip the scales of the rite, but promises the full truth will be entrusted to the successor. If Krile wants to hear it, she must help Wuk Lamat win, and she accepts that charge without wavering.</p><p>Once you’re away from the formalities, Erenville asks you plainly if you’re truly ready to be caught in political turmoil, and a familiar thought echoes in you about journeys and choosing your own path. As the city buzzes, you see each claimant through the eyes of those who believe in them: petitions for conquest and survival, pleas for innovation and convenience, tradition shouted like a weapon, and hopes for peace spoken with trembling urgency. Namikka, Wuk Lamat’s childhood nursemaid, meets her with the tenderness of family and insists she has a strength her brothers lack—words that leave Wuk Lamat quiet, then resolute.</p><p>Back with everyone, you compare the tablets to the stone pillars of the Tuliyollal Saga and find the scenes the same—only the tablets bear hollows for keystones. The path forward is there, but the exact steps still need grounding, and Erenville warns that a recent storm has damaged roads. Lodgings are secured, Wuk Lamat returns with locals willing to advise, and Alphinaud provides linkpearls so you can act independently when needed. With the Hanuhanu and the Pelupelu represented, Wuk Lamat lays out the nearest leads from the saga—and then turns to you, asking you to trust your adventurer’s instinct and choose where the journey begins.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Erenville <small class="muted"> Tuliyollal (X:9.8, Y:4.6)</small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="to-kozama-uka.html">To Kozama'uka</a></div><div class="row"><a class="link" href="to-urqopacha.html">To Urqopacha</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'継承の儀',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたはトライヨラの細く曲がりくねった路地を、ウクラマトとクルルとともに上へ上へと進む。道に迷いそうになっても、ただ上を目指せば宮殿へ辿り着くとわかっている。視界に入る料理の香りや賑わいが腹を鳴らし、落ち着いて味わう暇もなく継承の儀へ引き込まれていく予感が胸に残る。</p><p>エレンヴィルは、短い時間でアルフィノとアリゼーに街を案内したと語るが、ふたりの熱量は抑え難く、何かを見つけるたび路地へ走っていったという。まるで手のつけられないクァールを二匹追うようだった、と。ウクラマトは笑い、シャーレアンも自分に同じことをさせたと言って肩をすくめる。だが次の瞬間、気持ちを引き締める。これから宮殿の中へ入り、パパに帰還を告げ、あなたが選んだ仲間たちを会わせるのだ――ただし、衝動のまま動く父が何をしているかは読めない。</p><p>サンパーチに着くと、その「読めなさ」は目の前で形になる。エスティニアンが刃を交え、その相手はグルージャジャだった。勝負が収まると、グルージャジャは娘に目を向け、老いがもたらした変化が語られる。覆われていない側は武王として戦いを愛し、もう一方の理王は眠る時間が増え、覆いは魔力の回復を助けるのだという。ウクラマトは家族だけの呼び名を明かし、エレンヴィルは連王に旧名で呼ばれたのを正し、異国で得た名に慣れたのだと告げる。</p><p>やがてグルージャジャは宣言するように継承者候補を集め、ゾラージャの名を挙げる。コーナ、ウクラマト、そしてバクージャジャ。自分はかつての自分ではなく、理王は眠りがちになり、座を譲る時が来たのだと。さらに古い慣習――マムークで統治者が選ばれた継承の儀――を引き合いに出しつつ、トライヨラは多様な民の国であり、指導者は双頭でもマムージャでもある必要はないと言い切る。そして条件を告げる。ヨカ・トラルの地を巡り、黄金郷を見つけよ、と。</p><p>コーナは疑念を口にする。黄金郷は古い伝承だが、幾度も失敗した末に作り話のようになっているではないか、と。グルージャジャは迷わない。自分は四つの目でそれを見た、という断言で押し返し、建国以前に仲間と旅して黄金郷の門前まで辿り着いたのだと語る。勝利には最後へ辿り着くだけでは足りず、あなたたちは自分の歩みを一歩ずつなぞる。七人の選王者が価値を測り、課す偉業を果たして要石を得て、七つの石板にそれぞれ嵌め込む。すべて揃ったとき、黄金郷の門の封印を解く鍵となる。</p><p>クルルはバルデシオン委員会の代表として前へ出る。かつてグルージャジャがガラフへ宛てた手紙は薄れ、判読できぬ箇所が多いが、その本旨は黄金郷の調査依頼だった。そして同封されていた耳飾りがある。伝承と装身具だけで祖父は世界の半分を渡ったのだから、背後にさらなる謎があるはずだ、と。だがグルージャジャは今は語れぬと言う。継承の儀に不公平を生むからだ。ただし決着の後、真実は後継者へ託す――聞きたいなら、ウクラマトを勝たせよ。クルルは名誉にかけて誓い、その条件を受け入れる。</p><p>儀の場を離れると、エレンヴィルはあなたに問いかける。政治の渦中に踏み込む覚悟は本当にあるのか、と。あなたの中には、旅路とは自分に正直であることだという思いがよみがえる。街ではそれぞれの候補に人々の声が集まり、野心は火のように燃え、利便を求める期待が渦巻き、伝統は剣のように振り回され、平和を願う切実さが胸を打つ。ナミッカはウクラマトを家族のように迎え、兄たちにはない強さがあなたにはある、と言い切る。ウクラマトは言葉を受け止め、静かに前を向く。</p><p>全員が揃うと、あなたは石板とサーガの石柱を照らし合わせ、刻まれた場面が同じであること、そして石板だけが要石のための窪みを持つことを確かめる。行き先は見えているが、道は嵐で傷んでいるかもしれない。エレンヴィルは無駄足を避けるため情報収集を提案し、宿の手配も整える。ウクラマトは地元の協力者を連れて戻り、アルフィノは離れて動く場面に備えてリンクパールを渡す。ハヌハヌとペルペルの代表が揃い、サーガに描かれた近い集落の話が出たところで、ウクラマトはあなたに任せる。冒険者の勘で、最初の目的地を選んでほしい、と。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> エレンヴィル <small class="muted"> トライヨラ (X:9.8, Y:4.6）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-saga-in-stone.html">王が歩んだ旅路</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 90</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="to-kozamauka.html">コザマル・カ</a></div><div class="row"><a class="link" href="to-urqopacha.html">オルコ・パチャ</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'繼承儀式',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你沿著 Tuliyollal 狹窄又蜿蜒的街道一路往上走，Wuk Lamat 和 Krile 就在你身旁。巷弄再怎麼繞，只要一直往高處走，總會抵達宮殿。沿途飄來的香氣與熱鬧的攤景讓人忍不住想停下來，可你也清楚，一旦繼承儀式真正開始，這座城的「好好吃一頓」恐怕就會變成奢侈的念頭。</p><p>Erenville 說他已經盡可能在短時間內帶 Alphinaud 和 Alisaie 認識這座城市，但兩人的熱情實在太難管束：總有什麼景象忽然抓住他們的目光，轉眼就鑽進巷子去探個究竟，像是在趕兩隻不聽話的 coeurl。Wuk Lamat 聽了只笑，說 Sharlayan 當時也讓她一樣「停不下來」。可笑過之後，她把話題拉回正事──你們該進宮殿了，爸爸會想知道她回來了，也會想見見她選好的盟友；只是爸爸向來衝動，誰也說不準接下來會遇上什麼。</p><p>到了 Sunperch，你立刻明白「說不準」是什麼意思：Estinien 正在與 Gulool Ja Ja 交手。短暫的較量結束後，Gulool Ja Ja 轉向自己的女兒，語氣裡帶著長年累積的威勢與親暱。Wuk Lamat 解釋他「兩個頭」的狀態：露出的那一側是堅決的意志與對戰鬥的熱愛，而更理智的那一側沉睡得越來越久，遮蓋是為了讓魔力恢復。她也提到家人給她的暱稱；Erenville 則糾正 Gulool Ja Ja 對他的稱呼，說自己在海外取了新名字，也早已習慣。</p><p>很快，Gulool Ja Ja 把繼承人候補召集起來，當眾點名 Zoraal Ja、Koana、Wuk Lamat 與 Bakool Ja Ja。他坦言自己不再是從前的自己，更理智的那一側幾乎把日子都睡掉，是時候交出位置。他提到舊時的做法──Mamook 會用儀式選出至高統治者──但也強調自己建立的 Tuliyollal 是由許多族群組成的國度，領袖不需要有兩個頭，也不必是 Mamool Ja。接著，他說出你們真正要面對的試煉：踏遍 Yok Tural 的土地……找出黃金之都。</p><p>Koana 提出質疑：黃金之都只是古老的傳說，無數人失敗後，它更像童話而不像事實；如果要你們以此為目標，是否代表他握有確切證明？Gulool Ja Ja 回答得毫不遲疑──他用自己的四隻眼親眼見過。那是在 Tuliyollal 建國之前，他與同伴走遍 Tural，最後抵達黃金之都的大門前；如今他要你們走同一條路，但要真正取勝，你們必須打破他留下的封印。七名選王者會在途中衡量你們的價值，你們得完成他們要求的偉業，取得鑰石並嵌入七塊石板；當七塊石板都完成，你們才有能解開黃金之都門扉封印的「鑰匙」。</p><p>Krile 以 Students of Baldesion 的代表身分上前，拿出一封多年以前寄到她們組織的信──墨跡已淡，內容多處難以辨認，但你們仍看得出主旨：那是請她的祖父 Galuf 調查黃金之都的請求。信中還附了一只耳環；只是童話與飾品就足以讓 Galuf 遠航半個世界，背後必定另有更深的謎團。Krile 低聲而堅定地請求 Gulool Ja Ja 給出更多線索，卻得到「現在不能說」的回覆──任何資訊都可能讓某位候補在繼承儀式中占到不公平的優勢。但他也承諾，等勝負決定後，全部真相會交給繼任者；如果 Krile 想知道，那就得幫 Wuk Lamat 贏。Krile 當場應允，發誓會找到黃金之都。</p><p>離開儀式現場後，Erenville 再次把話說得很直：你真的確定要被捲進這場王位之爭嗎？Wuk Lamat 的熱情不太可能接受「不要」這個答案，而黃金之都的誘惑也足以讓人失去警覺。你的心裡浮現一段熟悉的話──人生是一連串旅程，重要的是在路上對自己誠實，才能走完一段又踏入下一段。你選擇不退，於是你也看見 Tuliyollal 的喧鬧如何把每位候補推向眾人目光：有人向 Zoraal Ja 求助與呼喊野心；有人向 Koana 祈求更便利的交通與貿易；Bakool Ja Ja 以傳統自居、鄙視眾人；也有人把和平與共存的願望交到 Wuk Lamat 手上。Namikka 以近乎母親的姿態擁住 Wuk Lamat，說她從不覺得她是「比較差」的那一個──她有兄長們所沒有的強項。Wuk Lamat 沉默片刻，把那句話放進心裡，繼續往前。</p><p>你們回到正事上，把各自的石板與 Tuliyollal Saga 的石柱逐一對照，發現圖樣幾乎完全一致，差別只在石板上預留了鑰石的凹槽。既然要追尋爸爸當年走過的路，線索就在這些刻痕裡；但要落實成行動，仍得知道哪些地點能最先印證「選王者」的存在。Erenville 提醒你們：海上那場風暴幾天前重創了 Yok Tural，道路不像 Eorzea 那麼完善，容易因災害受損，最好先打聽路況，避免走進死路。住處很快安排妥當，Wuk Lamat 也真的把「資訊」帶回來──她拉來願意協助的當地人，而 Alphinaud 則把 linkpearl 交給她與 Erenville，讓你們之後能分頭行動、遠距離聯絡。當 Hanuhanu 與 Pelupelu 的代表站在你面前，Wuk Lamat 把最接近的兩條線索說得清清楚楚，最後把選擇交到你手上：用你的冒險者直覺，決定你們第一個要踏上的目的地。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 艾倫維爾 <small class="muted"> 圖萊尤拉 (X:9.8, Y:4.6) </small></div></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="to-kozama-uka.html">克扎瑪烏卡濕地</a></div><div class="row"><a class="link" href="to-urqopacha.html">奧闊帕恰山</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
