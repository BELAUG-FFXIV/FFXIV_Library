    story:`<div class="clamp" data-collapsed="true">
      <div class="quest-block">
        <p class="quest-title"><b>The Princesses and the Eggs</b></p>
        <p>Hatching-tide returns once more, and in Gridania the festive air is already alive with expectation. Nonotta speaks excitedly of how this year’s celebration may surpass all that came before, provided Mistress Aliapoh’s dream can truly be brought to life. Nearby, the royal seneschal welcomes visitors who have come to enjoy the festivities, and before long Jihli Aliapoh herself calls out to you with bright enthusiasm. She introduces herself as the host of the event and, after learning that you are an adventurer, eagerly asks your name. To her, even that feels like a sign that you are meant to be part of this celebration.</p>
        <p>Jihli then tells you of the dream that inspired this year’s plans. Long ago, she says, the words of the Twelve Archons came to her in a dream and gave birth to Hatching-tide itself. This time, another vision stirred her imagination: a marvelous goobbue standing upon a stage in Ul’dah, wrapped in radiant pink flowers and holding a beautifully adorned egg in its hands. Nonotta immediately understood the meaning. There is only one season when Ul’dah’s sandy hues are joined by blooming peach blossoms, and that is Little Ladies’ Day. To them, the answer was clear—they must unite the spirit of Hatching-tide with that festival and create something unforgettable.</p>
        <p>The royal seneschal explains that Jihli’s proposal was unlike anything he had heard before. So certain was she of her dream that she had already found a performer and his goobbue companion before ever bringing the matter to Ul’dah’s organizers. Yet not everyone in the city shared her confidence. Some feared such a performance would be unsafe, and their concerns brought the Little Ladies’ Day plan to a halt. Their caution was not baseless, for years ago a supposedly tame goobbue rampaged through Ul’dah’s streets and left lasting fear behind. When Nonotta heard this, she proposed another path: let the goobbue perform first in Gridania during Hatching-tide. If the people there were delighted and unharmed, perhaps Ul’dah would finally be reassured.</p>
        <p>Jihli reveals that the performers have already arrived, and that she and Nonotta have seen the act with their own eyes. She insists the goobbue is as sweet as it is lovely. The seneschal agrees that this compromise seems the only course that might satisfy everyone, and asks you to accompany him to witness the show. As someone experienced with the creatures of the realm, you may be the perfect person to judge how gentle the goobbue truly is. Moved by the thought of Jihli’s dream being broken, you agree, and together you head for Bentbranch Meadows to meet the performer, Aldemund.</p>
        <p>At Bentbranch Meadows, the seneschal’s nerves show the moment he finds himself standing so close to the pink goobbue. Aldemund, however, greets you warmly and introduces her as Peatie, the companion he has cared for ever since he found her wandering alone in the wilds. He and Peatie searched long for her family, but in time the two came to belong only to each other. The seneschal praises her name and appearance, declaring that with her peach blossoms she looks every bit a Little Ladies’ Day princess. Delighted, Aldemund begins the performance. With a flourish, Peatie reveals the “egg surprise,” and the display leaves the seneschal astonished. The glamour may appear effortless, but Aldemund explains how much thought went into blending the spirit of two separate celebrations into a single act.</p>
        <p>Yet there is still a problem. Since arriving in Gridania, Peatie has been uneasy. She performs well before a pair of onlookers, but when a larger crowd gathered earlier, she froze. Aldemund believes the crowd itself is what frightens her. He was able to steady her by climbing atop her head, but age now weighs too heavily on him for that to be easy. Looking to you instead, he asks whether you might join their troupe just long enough to support Peatie during her performance. All you need do is ride atop her, bring her toward the waiting spectators, and direct them to Aldemund for eggs afterward.</p>
        <p>You agree, and with the royal seneschal hoping that success in Gridania will quiet Ul’dah’s doubts, you mount Peatie and bring her before the citizens of Bentbranch Meadows. The reaction is immediate. One spectator is left staring in amazement, another laughs off an initial fright and admits the trick was splendid, and a young girl is utterly charmed by the rabbits and the crown of peach blossoms. The performance spreads Hatching-tide cheer exactly as Jihli had hoped. When you return, Peatie lets out a cry that seems to carry relief as much as pride, and though her expression remains unreadable, gratitude radiates from her all the same. Aldemund praises both of you, saying he could scarcely hand out the eggs fast enough, and as the cheers continue to ring out, he dares to hope that Peatie has conquered not only her own fear, but the seneschal’s as well.</p>
      </div>
      <div class="quest-block">
        <p class="quest-title"><b>Peatie in Pink</b></p>
        <p>After Peatie’s performance in Gridania, Jihli Aliapoh greets the sight of you and the goobbue together with delight, saying you suit one another as naturally as eggs and spriggans. To her eyes, there could be no finer addition to the Little Ladies’ Day festivities. Nonotta is just as impressed, convinced that Peatie poured all her heart into perfecting every detail of the show. That earnest devotion, she says, is exactly the spirit the realm’s little ladies ought to see. Not long after, with the last of the eggs already gone, the royal seneschal finally speaks with all hesitation cast aside. What he has witnessed has moved him deeply, and he now declares that Peatie must become the star attraction in Ul’dah. On behalf of the Little Ladies’ Day Planning Committee, he invites Aldemund and Peatie as honored guests, and when Aldemund accepts, the seneschal turns to you with one more request: until Peatie grows accustomed to the crowds of Ul’dah, will you remain by her side?</p>
        <p>As word of this new stage spreads, Jihli hurries off to see her dream carried even farther, while Nonotta rejoices that it is unfolding just as Lady Aliapoh envisioned. In Ul’dah, the royal seneschal welcomes you with equally bright news. He has persuaded the planning committee with his account of Peatie’s success in Bentbranch Meadows, and the city’s gates will now be opened wide for her arrival. Yet before she can take the stage, the people must first be prepared to receive her. If the citizens hear what happened in Gridania, if they can be made to imagine the joy Peatie brought there, then perhaps they will greet her not with fear, but with open hearts. So while the seneschal remains behind to gather interest near Emerald Avenue, you are asked to head to the Steps of Thal and help spread the word yourself.</p>
        <p>There, the people of Ul’dah reveal just how divided their feelings still are. One citizen hesitates at the very thought of a performing goobbue, though the praise of a friend who saw the show in Gridania has already begun to soften that doubt. Another, far more shaken, confesses that the sight of a goobbue in Ul’dah stirs memories of the rampage witnessed in childhood. Only after you assure that citizen you have seen Peatie with your own eyes—and that she brought countless smiles to Gridania—does that fear finally begin to loosen. Elsewhere, another listener can scarcely believe a goobbue is capable of anything beyond mindless eating, and wonders whether this grand “show” is nothing more than watching a beast chew hay. Yet even that skepticism fades when you speak of the standing ovation Peatie earned in Gridania. Little by little, resistance gives way to curiosity, and curiosity to anticipation.</p>
        <p>When you return, the crowd gathered in Ul’dah has grown larger than anyone had dared hope. The royal seneschal thanks you, but even in that moment of success, a new problem becomes impossible to ignore. Under the expectant gaze of so many onlookers, Peatie has gone still. Aldemund can see at once what troubles her. This is the first time she has ever had to perform alone before such a great number of people, and though her heart wants to step forward, her legs will not obey. He says he could simply climb atop her head and calm her as before, but the time has come for Peatie to learn to stand on her own. Instead, he asks you to do what only you seem able to do now: speak to her, rally her spirits, and help her remember that she is not facing this moment alone.</p>
        <p>Your words reach her. Whether you remind her of the happiness she brought to Gridania, promise that you are still by her side, or call her the princess Little Ladies’ Day is waiting for, Peatie answers with new resolve. Aldemund and the royal seneschal alike feel the change at once. Soon after, it is time. You step back into the crowd as the seneschal announces the final act, presenting Peatie as a goobbue princess adorned in blooming flowers and bearing something unforgettable for the little ladies of Ul’dah. Jihli Aliapoh watches the scene in wonder, saying this is exactly how she saw it in her dream. Those who once feared goobbues now gaze upon Peatie with adoration, and even the citizens who came only out of uncertainty or curiosity are swept up in the joy of the performance. Aldemund can only laugh in relief: the little ladies have their magnificent show, and Hatching-tide has found no shortage of new egg-seekers besides.</p>
        <p>When the performance ends, joy lingers in the air. Peatie is elated by the crowd’s response and gazes toward the stage as if reluctant to leave it behind. Jihli Aliapoh declares that the day has surpassed even her dreams, and that both Hatching-tide and Little Ladies’ Day will surely be remembered as the brightest celebrations of the year. Aldemund then speaks more quietly, and with unexpected tenderness. After all this, he has begun to think it may be time to step away from the life of performance and let Peatie follow the path she has discovered for herself. He says she would be happy at your side, bringing smiles to corners of the world he will never see, while he himself finds a place at last to rest his weary bones. When you accept, he admits he had asked only as a formality, for he already knew she would be safe with you. The royal seneschal thanks you in turn, saying that no princess in the realm—not even Peatie—could have wished for a more devoted seneschal. And so, with the festival still ongoing around you, Peatie’s journey takes on a new shape: no longer only a performer in a single show, but a companion who will carry that same joy onward beside you.</p>
      </div>
    </div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    tabs:{ story:'ストーリー', acq:'入手方法', eventp:'開催期間', unlockq:'開放クエスト', followq:'後続クエスト', reward:'クリア報酬', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <div class="quest-block">
        <p class="quest-title"><b>エッグハントと桃色のグゥーブー</b></p>
        <p>今年もエッグハントの季節がめぐってきたグリダニアは、すでに祝祭の期待に満ちていた。ノノッタは、ジリ・アリアポーの夢がかたちになりさえすれば、今年はこれまで以上にすばらしい催しになるはずだと胸を弾ませている。そこへ執事王も現れ、祝祭を楽しみに訪れた人々を迎えていた。やがてジリ・アリアポーが明るい声であなたを呼び止め、自らこの催しの主催者だと名乗る。あなたが冒険者だと知ると、名前をたずね、その出会いさえも今年の祝祭にふさわしい巡り合わせのように受け止めていた。</p>
        <p>ジリ・アリアポーは、今年の企画の始まりとなった夢について語り始める。かつて十二賢人の言葉を夢で授かり、それがエッグハントの由来となったこと。そして今年もまた、彼女の想像をかき立てる夢を見たのだという。そこでは、巨大でみごとなグゥーブーがウルダハの舞台に立ち、桃色の花に彩られながら、豪華に飾られた卵をその手に抱えていた。ノノッタはその意味をすぐに悟った。ウルダハの街並みに桃の花が咲き誇る季節といえば、プリンセスデーしかない。ならば、ふたつの祝祭の心をひとつに結び、かつてない一日を作り上げよう――それが彼女たちの答えだった。</p>
        <p>執事王は、その提案が前例のないものだったと語る。しかもジリ・アリアポーは、話を持ち込むより先に、すでに旅芸人とその相棒のグゥーブーまで見つけていた。だが、ウルダハの誰もがその考えに賛同したわけではない。安全面を危ぶむ声が上がり、その不安によってプリンセスデーでの企画はいったん立ち止まることになった。しかもその懸念には理由がある。十数年前、飼いならされていたはずのグゥーブーがウルダハの街で暴れ、大きな被害をもたらした出来事があったのだ。その事情を聞いたノノッタは、まずはグリダニアのエッグハントで芸を披露してもらおうと考えた。そこで人々を笑顔にし、危険がないと示せれば、ウルダハの不安もやわらぐはずだった。</p>
        <p>ジリ・アリアポーは、旅芸人たちがすでに到着しており、ノノッタとともにその芸を見届けたことを明かす。彼女の目には、そのグゥーブーはかわいらしく、やさしさに満ちた存在として映っていた。執事王もまた、皆を納得させる道はこれしかないと考え、自らウルダハの者たちに報告するため、その証人としてグリダニアまで来たのだという。そこで彼は、獣に通じた冒険者であるあなたに、ぜひ一緒に芸を見てほしいと頼む。ジリ・アリアポーの夢が砕けるところを見たくないという思いもあり、あなたはその願いを受け入れ、執事王とともにベントブランチ牧場へ向かう。</p>
        <p>ベントブランチ牧場に着くと、執事王は桃色のグゥーブーを前にして、隠しきれない緊張を見せる。だが旅芸人のアルデムンドは気さくに迎え、彼女の名がピティーであること、そして野にひとりでさまよっていた彼女を見つけてから、ずっと自分が世話をしてきたことを語る。家族を探して長く旅した末に、いまでは互いが互いにとってかけがえのない存在になっていた。執事王はその名も姿も見事だと褒め、桃の花をまとったピティーはまるでプリンセスデーの姫君のようだと言う。アルデムンドはそれを喜び、すぐに芸を始めさせる。ピティーが披露した「たまごサプライズ」は、執事王を驚かせるのに十分だった。見た目は軽やかでも、その裏では、ふたつの祝祭の雰囲気をどう結びつけるか、長い時間をかけて工夫を重ねてきたのだった。</p>
        <p>だが、まだ解決していないことがあった。グリダニアに来てから、ピティーはどこか落ち着かない様子を見せている。少ない相手の前なら問題なく芸ができるのに、大勢の見物人が集まると、その場で動けなくなってしまうのだ。アルデムンドは、その原因が人の多さにあると見ていた。以前は自分が頭の上に乗ることで彼女を安心させられたが、もう昔のようには体が動かない。そこで彼は、あなたに力を貸してほしいと頼む。ピティーに乗って観客のもとへ向かい、芸を見せたあと、卵は自分のところでもらえると伝えてくれればそれでいいというのだ。</p>
        <p>あなたはその頼みを引き受ける。執事王は、ここグリダニアで芸が成功すれば、ウルダハの人々の不安もきっと薄れるはずだと願いを託す。そしてあなたはピティーにまたがり、ベントブランチ牧場の人々の前へと進んでいく。反応はすぐに返ってきた。驚きに言葉を失う者がいれば、最初は面食らいながらも見事な芸だったと感心する者もいる。うさぎの愛らしさや桃の花の冠に目を輝かせ、ぜひ自分も卵をもらいに行こうと心を弾ませる者もいた。こうして、ジリ・アリアポーが願ったとおり、エッグハントの楽しさはグリダニアのあちこちへ広がっていく。戻ってきたあなたを迎えたピティーの声には、安堵と誇らしさがにじんでいた。表情こそ読み取りにくくても、その身からはたしかな感謝が伝わってくる。アルデムンドはあなたとピティーをたたえ、卵を配る手が追いつかないほどだったと笑う。そして鳴りやまぬ歓声の中で、ピティーが乗り越えたのは自分の怯えだけではなく、執事王の不安でもあったのかもしれないと願うのだった。</p>
      </div>
      <div class="quest-block">
        <p class="quest-title"><b>プリンセスデーに咲く笑顔の花</b></p>
        <p>グリダニアでの公演を終えたあと、ジリ・アリアポーは、あなたとピティーの様子を見て、まるで最初からそうあるべくして並んでいるかのようだと目を細める。これ以上ないほど、プリンセスデーの催しにふさわしい存在だと彼女は喜んだ。ノノッタもまた、ピティーがひとつひとつの演目を完璧に届けようと、全力を尽くしていたことを見抜いていた。そうした前向きな気概こそ、エオルゼアの小さな姫君たちにこそ見せたいものだという。やがて卵がすべて配り終えられるころ、執事王もついに迷いを振り払って言葉にする。これまで見守る立場に徹してきたが、ピティーは優しい心だけでなく、真の芸人の魂まで持っているのだと。そしてウルダハの舞台で、彼女を主役として迎えたいと正式に申し出る。アルデムンドがその招待を受け入れると、執事王はさらに、ウルダハの人波に慣れるまでのあいだ、どうかあなたがピティーを見守ってほしいと頼むのだった。</p>
        <p>こうして新たな舞台が決まると、ジリ・アリアポーは自らの夢がさらに大きく実を結ぶ瞬間を見届けるため、急いでその場を後にする。ノノッタもまた、レディ・アリアポーの夢が思い描いたとおりに現実になっていくことを心から喜んでいた。やがてウルダハにたどり着いたあなたを、執事王は明るい知らせとともに迎える。ベントブランチ牧場での成功を語ったことで、企画委員たちもついに心を動かされ、ピティーを都へ迎え入れることが決まったのだ。しかし舞台に立たせる前に、まずは市民たちの心をひらかなければならない。グリダニアで何が起こったのか、そこでどれほどの笑顔が生まれたのかを伝えれば、恐れではなく期待をもって彼女を迎えてくれるかもしれない。そう信じた執事王は、自らはナル回廊で人々の関心を集め、あなたにはザル回廊へ向かって同じように呼びかけてほしいと頼む。</p>
        <p>ザル回廊で耳を傾ける人々の反応は、まだひとつにはまとまっていなかった。芸をするグゥーブーなど危険ではないのかとためらう者もいれば、子どものころに目にした暴走の記憶を思い出し、その存在そのものに身をすくませる者もいる。それでも、あなたが自分の目でピティーを見てきたこと、そして彼女がグリダニアの人々に数えきれない笑顔をもたらしたことを伝えると、その固い不安は少しずつほどけていく。別の市民は、グゥーブーにできることといえば、ただ無心に食べることくらいではないのかと半信半疑だった。だが、グリダニアで大きな喝采を浴びたのだと聞けば、その疑いもやがて興味へと変わっていく。そうして少しずつ、ウルダハの空気は警戒から期待へと変わり始めていた。</p>
        <p>あなたが戻るころには、集まった観客は誰もが思っていた以上にふくらんでいた。執事王は感謝を口にするが、その一方で、新たな不安が目の前に浮かび上がる。大勢の視線を一身に受けたピティーが、再び身をこわばらせてしまったのだ。アルデムンドは、その理由をすぐに見抜く。これほど多くの観衆の前で、しかもひとりで舞台に立つのは、彼女にとって初めてのことだった。心は前へ進もうとしているのに、足がその思いについていかないのである。これまでのように自分が頭の上に乗れば落ち着くだろうとは思う。だが、いつまでもそうして支え続けるわけにはいかない。だからこそ彼は、いまのピティーに必要なのはあなたの言葉なのだと告げる。勇気を奮い起こせるよう、彼女の心を励ましてほしいと。</p>
        <p>あなたの言葉は、たしかにピティーへ届く。グリダニアで皆を笑顔にしたことを思い出させても、ここにいると寄り添って伝えても、あるいはプリンセスデーにふさわしい姫君はあなたしかいないと励ましても、その思いは彼女の胸にまっすぐ届いた。ピティーは新たな気力を取り戻し、アルデムンドも執事王もその変化をすぐに感じ取る。やがて、ついに幕が上がる。あなたは観客の中へ戻り、執事王が満開の花に飾られたグゥーブー姫君の最後の演目を高らかに告げるのを見守る。ジリ・アリアポーは、その光景を見て、自分の夢がそのまま目の前に現れたのだと声を弾ませる。かつてグゥーブーを恐れていた人々でさえ、今はピティーの愛らしさに心を奪われていた。アルデムンドは、すべてが丸く収まったことに安堵し、小さな姫君たちには最高の舞台が、そしてエッグハントには新たな卵探しの仲間たちがもたらされたのだと笑う。</p>
        <p>公演が終わっても、その余韻はしばらく都に満ちていた。観客の反応にピティーはすっかり心を躍らせ、舞台を名残惜しそうに見つめている。ジリ・アリアポーは、今日の出来事は自分の想像を超えるすばらしさであり、エッグハントもプリンセスデーも今年を代表する祝祭として語り継がれるだろうと喜びをあらわにする。するとアルデムンドは、少し静かな声で、自分のこれからについて語り始めた。今回の出来事を経て、そろそろ自分は旅芸人としての人生を離れ、ピティーには見つけたばかりの情熱のまま羽ばたいてほしいと思うようになったのだという。あなたさえよければ、これからはあなたのそばで、まだ見ぬ土地にも笑顔を届けていけるはずだと。そして自分は、自らの骨を休められる場所を探して腰を落ち着けたいと話す。あなたがそれを受け入れると、アルデムンドは、実のところ断られるとは思っていなかったと笑う。執事王もまた、あなたにあらためて感謝を捧げる。どんな姫君であっても、これほど献身的に寄り添う執事は望めなかっただろうと。そうして祝祭のにぎわいが続くなか、ピティーの歩む道は新しく開かれていく。ひとつの舞台を彩っただけの演者ではなく、これからはあなたとともに世界のあちこちへ笑顔を運ぶ、大切な相棒として。</p>
      </div>

    story:`<div class="clamp" data-collapsed="true">
      <div class="quest-block">
        <p class="quest-title"><b>公主與彩蛋</b></p>
        <p>今年的 Hatching-tide 再度來臨，Gridania 也早已籠罩在節慶將啟的期待之中。Nonotta 興奮地說著，只要 Jihli Aliapoh 的夢真的能夠實現，今年的活動一定會比以往更加精彩。另一旁，Royal Seneschal 也正在迎接前來感受節慶氣氛的人們。沒過多久，Jihli Aliapoh 便帶著明亮的笑意叫住了你，向你介紹自己正是這場活動的主辦人。得知你是一名冒險者後，她立刻問起你的名字，彷彿連這場相遇本身，都像是這次節慶理應出現的一部分。</p>
        <p>接著，Jihli Aliapoh 向你說起促成這次企劃的那場夢。她說，許久以前，她曾在夢中聽見 Twelve Archons （傳說中於第六星曆末期現身的十二位賢者，被認為曾預言第七靈災的到來；在 Hatching-tide 的起源傳說裡，Jihli Aliapoh 正是因夢見他們而開始籌辦這場節慶）的預言，而 Hatching-tide 正是因此誕生。今年，她又看見了一場新的夢境：一隻巨大而美麗的 goobbue （Eorzea 常見的大型獸類，體型龐大、力量驚人，外表常給人粗重遲鈍的印象；雖然有些個體能被馴養並與人同行，但也因此常讓人同時聯想到溫馴與失控暴走的危險性）站在 Ul’dah 的舞台上，身上環繞著燦爛的粉色花朵，手裡還捧著一顆華麗裝飾過的蛋。Nonotta 一聽就明白了那個景象所指向的意義。因為一年之中，只有 Little Ladies’ Day 的時節，Ul’dah 那片沙色街景才會映上盛開的桃花色彩。於是她們得出了同一個答案，要把 Hatching-tide 與 Little Ladies’ Day 的精神結合起來，創造一場前所未有的慶典。</p>
        <p>Royal Seneschal 說，Jihli Aliapoh 的提案確實前所未聞。更何況，在正式來找 Ul’dah 的主辦方之前，她竟然早已先找好了表演者與他的 goobbue 夥伴。然而，並不是所有人都願意接受這個計畫。有人擔心那樣的演出並不安全，也正因如此，原本打算放進 Little Ladies’ Day 的企劃被迫停了下來。而這份顧慮也不是毫無根據。因為大約十五年前，Ul’dah 的街道上曾發生過一隻原本號稱溫馴的 goobbue 失控暴走的事件，留下了難以輕易抹去的陰影。Nonotta 聽完後便想到，既然如此，不如先讓那隻 goobbue 在 Gridania 的 Hatching-tide 登台表演。只要能在這裡證明牠既安全又能帶來歡樂，也許就能讓 Ul’dah 的人們放下疑慮。</p>
        <p>Jihli Aliapoh 告訴你，那對表演搭檔其實早就已經到了，而她和 Nonotta 也已經親眼看過那場演出。在她看來，那隻 goobbue 不只是可愛，甚至溫柔得讓人難以移開目光。Royal Seneschal 也承認，眼下所有可能的做法裡，這似乎是唯一能讓各方都接受的道路，因此他才特地趕到 Gridania，想親自作為見證，再將結果帶回 Ul’dah。於是他請你也一同前去觀看表演。像你這樣熟悉各類獸類的人，也許最有資格判斷那隻 goobbue 是否真的足夠溫馴。你不願看到 Jihli Aliapoh 的夢就此破碎，便答應了他的請求，與他一起前往 Bentbranch Meadows，準備見一見那位表演者 Aldemund。</p>
        <p>抵達 Bentbranch Meadows 後，Royal Seneschal 一站到那隻粉紅色 goobbue 面前，便難掩自己的緊張。Aldemund 則熱情地迎接了你們，並介紹牠的名字叫做 Peatie。他說，自己是在野外發現獨自徘徊的 Peatie 後，便一直照顧著牠；他們曾花了很長的時間尋找牠的家人，但到了如今，彼此已經成了對方最重要的陪伴。Royal Seneschal 聽後稱讚這名字十分動人，還說牠身上那一圈桃花，正讓 Peatie 看起來宛如 Little Ladies’ Day 的公主。Aldemund 聽得高興，隨即讓 Peatie 展示她們準備好的節目。Peatie 所帶來的「蛋之驚喜」讓 Royal Seneschal 看得目瞪口呆，而 Aldemund 也坦言，真正困難的從來不是表面上的變化，而是要怎麼把兩場不同節慶的氣氛自然地揉合在同一場表演裡。</p>
        <p>只是，眼前仍然還有一道難關。Aldemund 說，自從來到 Gridania 之後，Peatie 便一直有些不安。若只是面對兩名觀眾，牠完全沒有問題；可一旦圍觀的人群變多，牠就會整個僵住，無法像平常那樣演出。Aldemund 認為，真正讓 Peatie 畏縮的並不是表演本身，而是龐大的人群。先前他還能靠著爬到 Peatie 頭上，讓牠安下心來，但如今自己的膝蓋早已不再像從前那樣可靠。因此，他轉而向你求助，希望你能暫時加入他們的演出行列。只要你坐到 Peatie 身上，帶著牠走向聚集的人群，讓大家看見這場表演，並告訴觀眾可以到他那裡領蛋，就已經足夠了。</p>
        <p>你答應了這個請求。Royal Seneschal 也將期待寄託在你們身上，希望只要這場表演能在 Gridania 成功，就足以平息 Ul’dah 那邊的不安。於是你騎上 Peatie，帶著牠走向 Bentbranch Meadows 的居民。很快地，回應一一出現。有人震驚得說不出話來，有人從最初的錯愕中回過神後，立刻稱讚這場表演實在精彩；也有人被跳出的兔子與那頂桃花冠深深吸引，迫不及待想去領取屬於自己的蛋。Hatching-tide 的歡樂，就這樣如 Jihli Aliapoh 所盼望的那樣，在 Gridania 真正散播開來。當你回到 Aldemund 身邊時，Peatie 發出了一聲低鳴，聲音裡像是同時帶著鬆了一口氣的安心與完成演出的驕傲。雖然牠的表情依舊難以讀懂，但你仍能清楚感受到那份從牠身上流露出的感激。Aldemund 也讚賞了你和 Peatie 的表現，笑著說自己幾乎來不及把蛋分給每一位觀眾。而在那陣仍未停歇的喝采裡，他終於開始相信，Peatie 克服的，也許不只是自己的膽怯，還有 Royal Seneschal 心中始終放不下的那份疑慮。</p>
      </div>
      <div class="quest-block">
        <p class="quest-title"><b>在公主節綻放的笑容之花</b></p>
        <p>在 Gridania 的表演結束後，Jihli Aliapoh 看著你與 Peatie 站在一起的模樣，滿心歡喜地說你們簡直合拍得像蛋與 spriggan 一樣自然。在她眼中，Little Ladies’ Day 的慶典裡，再也找不到比 Peatie 更合適的存在了。Nonotta 也同樣感動不已，認為 Peatie 為了讓每一個細節都盡善盡美，顯然已經拿出了全部的心力。她說，這種主動而認真的精神，正是這個世界的小公主們最該看見的模樣。不久之後，當最後一顆蛋也送完時，Royal Seneschal 終於不再只是旁觀，而是坦率地說出自己的決定。Peatie 不僅有一顆溫柔的心，更擁有真正屬於表演者的靈魂，因此他希望讓她成為 Ul’dah 舞台上的主角。代表 Little Ladies’ Day 籌備委員會，他正式邀請 Aldemund 與 Peatie 作為貴賓前往 Ul’dah，而在 Aldemund 爽快接受之後，他又向你提出另一個請求，在 Peatie 慢慢適應 Ul’dah 的人潮之前，能不能請你繼續陪在她身邊。</p>
        <p>新舞台既已決定，Jihli Aliapoh 便迫不及待地趕去見證自己的夢再往前實現一步，Nonotta 也欣喜地看著 Lady Aliapoh 的夢一步一步化為現實。當你來到 Ul’dah 時，Royal Seneschal 已經帶著好消息等著你。他說，自己已經用 Bentbranch Meadows 那場表演的經過說服了籌備委員會，如今 Ul’dah 的大門終於願意為 Peatie 敞開。不過，在讓她正式登台之前，還有一件更重要的事要做，那就是先讓市民願意接受她。只要把 Gridania 發生過的事、把 Peatie 曾經帶來的那些笑容告訴更多人，也許他們就會以歡迎而不是恐懼來迎接她。因此，Royal Seneschal 留在 Emerald Avenue 附近繼續招攬人群，而你則被請去 Steps of Thal，把這場即將登場的表演消息傳開。</p>
        <p>在那裡，你很快就感受到 Ul’dah 人們心中的遲疑仍未真正散去。有人一聽到表演者是 goobbue，立刻下意識地懷疑那是否危險；也有人因為童年親眼見過失控事件，直到現在都還無法輕易放下心中的陰影。可是當你親口告訴他們，你已經見過 Peatie，也親眼看著她為 Gridania 帶來那麼多笑容時，那份不安終於開始動搖。另一位市民則帶著半信半疑的神情，認為 goobbue 除了埋頭吃東西之外，大概根本不可能做出什麼值得稱為「表演」的事。但當你提起她在 Gridania 贏得滿場喝采時，那份懷疑也漸漸轉成了想親眼看看的念頭。就這樣，原本的戒心一點一點退去，取而代之的，是一種正在升起的期待。</p>
        <p>等你回到 Royal Seneschal 身邊時，現場的觀眾早已比任何人原先預想的都還要多。雖然這本該是值得高興的事，但新的難關也同時浮現在眾人眼前。面對那麼多充滿期待的目光，Peatie 又一次僵在原地，不敢往前。Aldemund 一眼就看出了問題所在。這是她第一次獨自站在這麼龐大的人群前表演，她的心明明想踏出去，雙腳卻不肯聽從。照理說，只要像之前那樣由他爬到 Peatie 頭上，她很快就能安定下來，但他也明白，不能永遠都用同樣的方法替她撐過每一次不安。於是他請你試著用話語鼓勵她，替她重新提起勇氣，讓她知道自己不是孤單一個人在面對這一刻。</p>
        <p>而你的話，確實傳到了她心裡。無論你是提醒她別忘了自己曾經在 Gridania 帶來多少快樂，還是告訴她你會一直陪在這裡，又或者乾脆把她喚作 Little Ladies’ Day 所需要的公主，那些話都讓 Peatie 漸漸找回了勇氣。Aldemund 與 Royal Seneschal 都立刻感覺到了她的變化。很快地，正式表演的時刻終於到來。你退回觀眾之中，看著 Royal Seneschal 高聲宣告最後一場演出開始，把花團錦簇的 Peatie 介紹成為所有小公主準備驚喜的 goobbue 公主。Jihli Aliapoh 看著眼前的一切，激動地說這正是她夢裡見到的景象。曾經因為過去的記憶而害怕 goobbue 的人們，如今也全都被 Peatie 的可愛與真誠深深打動。Aldemund 則終於鬆了一口氣，笑著說事情總算有了最好的結果，小公主們得到了最精彩的表演，而 Hatching-tide 也迎來了更多想去尋蛋的人。</p>
        <p>當舞台上的歡呼逐漸落下時，那份喜悅卻沒有立刻散去。Peatie 因為觀眾的熱烈反應而顯得格外興奮，甚至還依依不捨地望著舞台。Jihli Aliapoh 滿懷感動地說，今天的一切甚至比她夢裡想像的還要更加美好，無論是 Hatching-tide 還是 Little Ladies’ Day，都一定會成為今年最令人難忘的節日。接著，Aldemund 的語氣漸漸沉了下來，帶著一種平靜卻真誠的溫柔。他說，經過這次的事情後，自己開始覺得，也許是時候離開表演者的生活，讓 Peatie 去追隨她終於找到的熱情了。如果你願意帶著她一起旅行，她就能把笑容送往那些連他都只聽說過的遙遠地方；而他自己，也該找個地方安頓下來，讓這副老骨頭真正休息。當你答應之後，他笑著承認，其實自己早就知道 Peatie 會在你身邊得到妥善照顧。Royal Seneschal 也鄭重地向你致謝，說這世上沒有任何一位公主，甚至連 Peatie 在內，會不希望有像你這樣如此盡心守護她的人。於是，在節慶依然熱鬧延續的此刻，Peatie 的未來也悄悄改變了模樣。她不再只是某一場表演裡的主角，而是從今以後，會和你一起把笑容帶往更多地方的同伴。</p>
      </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:   document.getElementById('panel-story'),
  acq:     document.getElementById('panel-acq'),
  eventp:  document.getElementById('panel-eventp'),
  unlockq: document.getElementById('panel-unlockq'),
  followq: document.getElementById('panel-followq'),
  reward:  document.getElementById('panel-reward'),
  comments:document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
