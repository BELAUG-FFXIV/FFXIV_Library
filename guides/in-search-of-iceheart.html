const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`In Search of Iceheart`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', reward:'Completion Reward', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>With Aymeric’s support secured, there is one last duty before you can depart. Alphinaud tells Tataru that the road ahead will be long, and Estinien adds, with dry amusement, that your chosen course has made secrecy from the Holy See almost entertaining. Yet there is no levity in what follows. Before you and Alphinaud leave Ishgard behind, Tataru must be told the truth: you may be gone for some time, and the path before you will be neither short nor easy. Estinien goes on ahead to wait, while Alphinaud leads you back to Fortemps Manor so that no farewell will be left unsaid.</p><p>When Alphinaud explains that he and you may not return to Ishgard for some while, Tataru does not try to hide her worry. She tells you both to be careful, but refuses to sit idle in your absence. While you travel, she will continue listening for news of your lost friends. Alphinaud answers with complete faith in her. If anyone can find them, he says, it is Tataru. What might have been a solemn parting then softens unexpectedly, when she stops him and insists that he put on the garment she made especially for him. Alphinaud resists at first, embarrassed, but gives in at last.</p><p>The moment turns warmer than any of you expected. The clothes fit him perfectly, and even Alphinaud, forced into honesty, admits that the quality is surprisingly good. Tataru beams with pride and explains that she has been practicing her needlework while gathering rumors, because a good receptionist should always be learning new skills. Alphinaud thanks her sincerely and says that whatever waits for him on the road, he will at least no longer fear the cold of Coerthas. Tataru brushes it aside as the least she could do, then hurries back to the tavern and to the gossip she means to chase without rest. What remains behind is not despair, but a quiet kind of resolve, held together by care.</p><p>When you return to Estinien, Alphinaud is already speaking of the journey ahead. He says he must thank Tataru properly when you come back, but for now there can be no delay. The search for Lady Iceheart must begin at once. Estinien asks the obvious question: where do you even begin hunting someone so elusive? Lacking any fresh intelligence on Ysayle’s movements, Alphinaud proposes that you pick up the trail where she was last encountered, in the Coerthas western highlands. There, he hopes, Ser Redwald of Falcon’s Nest may know whether any heretic activity has been reported.</p><p>Redwald receives you with surprise, but not suspicion. Once Alphinaud explains the urgency of your mission and the need to find Lady Iceheart before the next Dravanian assault, he directs you toward the best leads he has. A patrol is soon due to return, and knights sent to investigate the remains of the heretic refuge at Gorgagne Mills may also have found something useful. Estinien proposes that you divide your efforts, and the plan is quickly set. He will remain to question the patrol, while you and Alphinaud head to the ruined refuge. There, however, your search is interrupted. The expedition leader explains that just as his men found what seemed a promising bundle of letters, they were ambushed by great white beasts left behind to guard the place. Several knights were badly wounded, and the investigation cannot continue until the creatures are slain. Alphinaud, eager to press forward, urges that you deal with the beasts yourselves, but when the danger erupts in front of him, the shock plainly rattles him. Shaken and unable to steady his hands, he asks you to go on ahead and finish what must be done.</p><p>By the time the beasts are dead, Estinien has learned little of value from the returning patrol. The cold has left the patrol leader with more complaints than answers, and so your hopes fall back upon the refuge itself. The expedition leader, relieved that the danger has passed, can finally return to his duty without fear of another mauling. Your search for Iceheart has yielded no certainty yet, but the road has begun to take shape: not through grand revelations, but through fragments, risks, and the hard work of following what little remains behind.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Alphinaud <small class="muted">(Foundation, X:13.3, Y:11.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="alphinauds-way.html">Alphinaud’s Way</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 51</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="from-one-heretic-to-another.html">From One Heretic to Another</a></div></div>`,
    reward:`<div class="stack"><div class="row"><b>Minion</b> Wind-up Alphinaud</div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'イゼルを探して',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', reward:'クリア報酬', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>アイメリク卿の協力を取りつけたあとも、出立の前に果たすべき務めが残っていた。アルフィノはタタルにも計画を伝えねばならないと告げ、エスティニアンは、この策のおかげで聖教庁に秘密を抱えることさえ妙に愉快に思えてくると皮肉まじりに言う。だが、その言葉の裏にある現実は重い。あなたとアルフィノがこれから進む道は長く、そして決して平坦ではない。エスティニアンが先に待機に向かうなか、あなたはアルフィノとともにフォルタン伯爵邸へ戻り、残していく者へきちんと言葉を届けることになる。</p><p>アルフィノから、しばらくイシュガルドへ戻れないかもしれないと聞かされたタタルは、心配を隠しきれない。それでも彼女は不安に沈むのではなく、ふたりにどうか気をつけてほしいと告げたうえで、自分は行方知れずの仲間たちの情報を追い続けるのだと言い切る。アルフィノもまた、そんな彼女の力を信じていた。仲間を見つけ出せる者がいるとすれば、それはタタルに違いない。別れの空気が静かに満ちかけたそのとき、タタルはあわててアルフィノを呼び止め、自分が彼のために仕立てた服を差し出す。</p><p>思いがけない贈り物にアルフィノは戸惑うが、押し切られるように袖を通し、その出来栄えに目を見張る。驚くほどよく似合い、仕立ても申し分ない。タタルは、噂話を集めるかたわら針仕事の腕も磨いていたのだと胸を張る。よい受付係であるためには、新しい技術を学び続けなければならないのだと。アルフィノは心から礼を述べ、この先どんな困難が待っていようとも、少なくともクルザスの寒さを恐れずに済むと微笑む。タタルは、それくらいしかできないからと軽く言い、再び酒場へ戻って噂を追わねばと忙しく駆け出していく。その背を見送りながら、あなたたちの間には、言葉以上に確かな支えが残る。</p><p>エスティニアンのもとへ戻るころには、アルフィノの気持ちはすでに次の一歩へ向いている。帰還したら改めてタタルに礼を言わねばならないと口にしつつも、今は立ち止まっていられない。すぐにでもイゼルの行方を追わねばならないのだ。だが、そう簡単に見つかる相手ではない。どこから探し始めるつもりかと問うエスティニアンに、アルフィノは、イゼルが最後に確認されたクルザス西部高地から手がかりをたどるべきだと答える。ファルコンネストを預かるレドワルド卿なら、異端者たちの動きについて何らかの報告を得ているかもしれない。</p><p>レドワルド卿は、あなたたちの顔ぶれに驚きつつも、すぐに事の重大さを察する。アルフィノが、次なるドラヴァニアの襲撃を食い止めるためにもイゼルを見つけ出す必要があると説明すると、彼は得られそうな情報源をすぐに示してくれる。周辺を巡回していた部隊が間もなく戻ること、そしてゴルガニュ牧場に残された異端者の隠れ家跡を調べている騎士たちからも、有益なものが見つかるかもしれないこと。そこでエスティニアンは手分けを提案し、自らは巡回隊の帰還を待ち、あなたとアルフィノは隠れ家跡へ向かうことになる。だが現地では、調査は思うように進んでいなかった。調査隊長の話によれば、有望な書簡の束を見つけたその直後、物陰から巨大な白い獣たちに襲われたのだという。異端者たちはあらかじめ追跡を見越し、足止めのために獣を残していたらしい。負傷者も出ており、獣を倒さぬかぎり調査は再開できない。アルフィノは増援を待つ時間はないと判断し、自分たちで始末しようとするが、実際に危険が迫ると、その衝撃は彼の身体をはっきりと強張らせる。手の震えが収まるまで、自分はかえって足手まといになるだろうと認め、あなたに先へ進んでほしいと頼む。</p><p>獣たちを討ち果たしたあとも、エスティニアンが巡回隊から得られた情報はほとんどなかった。戻ってきた隊長は、寒さに痛めつけられた話ばかりで、イゼルの行方に結びつくことは語らなかったのだ。結局、望みは再び隠れ家跡の調査へ託される。危険が去ったと知った調査隊長は、ようやく恐れず任務へ戻れると安堵する。イゼルへの道筋は、まだ霧の向こうにある。それでもあなたたちは、残された断片をひとつずつ拾い集めることでしか、その背を追えないのだ。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> アルフィノ <small class="muted">（イシュガルド：下層, X:13.3, Y:11.1）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="alphinauds-way.html">アルフィノの策</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 51～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="from-one-heretic-to-another.html">異端者の遺した物</a></div></div>`,
    reward:`<div class="stack"><div class="row"><b>ミニオン</b> マメット・アルフィノ</div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'尋找 Iceheart 的下落',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', reward:'完成獎勵', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>在取得 Aymeric 的支持之後，你們出發前還有最後一件事必須完成。Alphinaud 表示，在真正動身之前，必須先把計畫告訴 Tataru。Estinien 則帶著一貫冷淡的語氣說，這個計畫倒是讓「對 Holy See 保守秘密」這件事，變得幾乎有些有趣起來。可這份輕描淡寫並沒有改變現實。你和 Alphinaud 接下來要走的路不會短，也絕不輕鬆。於是，在 Estinien 先行前往等待之後，你便與 Alphinaud 一同回到 Fortemps Manor，準備把該說的話好好說完。</p><p>當 Alphinaud 告訴 Tataru，自己和你可能有一段時間都無法回到 Ishgard 時，她顯然非常擔心。可她並沒有因此亂了陣腳，只是認真地叮囑你們一定要小心，然後又立刻表示，自己也不會閒著不動。趁你們外出的這段時間，她會繼續打聽那些失散同伴的消息。Alphinaud 對此沒有半點懷疑。他直言，如果真有人能找到他們，那個人一定就是 Tataru。原本有些沉重的道別，也就在這時忽然轉了個彎，Tataru 急急忙忙叫住 Alphinaud，要他穿上自己特地替他做好的衣服。</p><p>那一刻的氣氛，比誰想的都還要溫暖。Alphinaud 一開始還有些抗拒，最後卻還是拗不過她，把衣服穿上了。而當他真的穿好之後，連他自己都不得不承認，尺寸合身得驚人，做工也比預想中好得多。Tataru 開心得不得了，說自己一邊四處聽消息，一邊也在練習針線活，因為一個好的 receptionist（負責接待、聯絡與整理消息的人）本來就該不斷學新本事。Alphinaud 真心向她道謝，還說無論前方還有什麼在等著自己，至少往後都不用再害怕 Coerthas 的寒冷。Tataru 則只說，這不過是自己至少能做到的一點小事，接著又急著趕回 tavern，因為她還有一堆流言和消息要去追。你們看著她離開時，心裡留下的已經不只是離別的不安，還有一份被好好托住的安定感。</p><p>等你們回到 Estinien 那裡時，Alphinaud 的心思早已重新放回接下來的旅程。他說，等回來之後，自己一定要好好向 Tataru 道謝，但現在已經不能再拖下去了。尋找 Lady Iceheart 的事，必須立刻開始。Estinien 也直接點出最現實的問題：像她那樣行蹤難測的人，你們究竟打算從哪裡找起？在沒有任何新消息的情況下，Alphinaud 認為最合理的作法，就是回到 Ysayle 最後被人見到的地方，也就是 Coerthas western highlands，從那裡重新接起她留下的蹤跡。他希望駐守 Falcon’s Nest 的 Ser Redwald，能知道這一帶是否出現過任何異端者活動的消息。</p><p>見到 Redwald 之後，對方雖然對你們的來意感到意外，卻很快就察覺到事情並不單純。當 Alphinaud 說明，你們是為了在下一次 Dravanian 襲擊前找到 Lady Iceheart，並盡可能阻止這場衝突時，Redwald 立刻指出了目前最值得追查的線索：巡邏周邊地帶的 patrol 很快就會返回，而被派去檢查 Gorgagne Mills 異端者據點殘骸的騎士，也可能已經找到某些有用的東西。Estinien 隨即提議分頭行動，由他留下來等 patrol 回報，你和 Alphinaud 則先前往那處廢棄據點。然而到了那裡，你們很快就發現調查根本無法順利推進。調查隊長告訴你們，他們才剛發現一疊看起來很有價值的信件，就遭到躲在暗處的大型白色野獸襲擊。看起來，那些異端者早就料到會有人追查，於是刻意留下這些野獸作為阻撓。由於已經有數名騎士受傷，在那些野獸被清除之前，調查根本無法繼續。Alphinaud 明白你們已經沒有時間等援軍，只能由你們自己動手。但真正面對突如其來的危險時，那股衝擊還是明顯動搖了他。他不得不承認，至少在雙手停止顫抖之前，自己恐怕只會成為阻礙，於是請你先去把剩下的野獸都解決掉。</p><p>等到那些野獸終於被清除後，Estinien 那邊也帶回了幾乎毫無收穫的消息。返回的 patrol leader 除了抱怨寒冷咬得自己哪裡最痛之外，根本沒能提供任何和 Lady Iceheart 有關的線索。於是，希望又重新落回這處異端者據點本身。得知危險已經解除後，調查隊長終於能鬆一口氣，帶著手下重新投入調查。你們仍然沒有真正抓住 Iceheart 的去向，但至少這條路已經開始顯出輪廓，不是靠什麼突如其來的答案，而是靠一次又一次追著殘留下來的碎片，艱難地向前推進。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Alphinaud <small class="muted">(Foundation, X:13.3, Y:11.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="alphinauds-way.html">Alphinaud 的盤算</a></div><div class="row">任一戰鬥／魔法職業（不含受限職業）Lv. 51</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="from-one-heretic-to-another.html">異端所留下的線索</a></div></div>`,
    reward:`<div class="stack"><div class="row"><b>寵物</b> 迷你阿爾菲諾</div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  reward: document.getElementById('panel-reward'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
