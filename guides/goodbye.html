  EN:{
    langLabel:'EN',
    pageTitle:`Goodbye, ε̆│̆│Δ`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', reward:'Completion Reward', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>With Alpha chirping at your side, Omega promptly selects the next destination: Camp Broken Glass. It wishes to understand the relationship between the Ilsabard contingent and the people of Garlemald. In the report, the contingent’s purpose was described as saving the local populace, and both sides shared the Telophoroi as a common enemy. To Omega, the fact that they did not immediately unite for mutual benefit is an obvious contradiction. Once you arrive in the bitter cold, Omega notes with satisfaction that its small frame tolerates the temperature far better than Alpha, then urges you to seek out representatives from both sides and compare their attitudes directly.</p><p>The first voice you hear comes from a member of the resistance, who says that communication with the locals has grown far easier since Jullus and his soldiers began helping. Distrust still remains, of course. Some Garleans still suspect the contingent of using foreign magicks to enslave minds, a fear rooted in old manipulation and suffering. Even so, the resistance fighter believes they are making real progress, because they are choosing to move slowly, to respect the lives and customs of those they came to help, and to save people without claiming dominion over them. As an Ala Mhigan who was once forced into imperial service, he speaks from painful experience. Garleans looked down on provincials, yet his own countrymen also distrusted those who had worn imperial colors. To him, the very existence of the contingent is astonishing, and being part of it feels less like a strategy and more like a fragile act of hope.</p><p>The imperial citizen you speak with offers a very different response. He recognizes you at once and is overcome by bitterness, shame, and stubborn pride. He speaks as one who lost Licinia and her sister rather than accept your help, and who now survives only because he had no choice but to rely on that same aid. Even so, he insists that he will not surrender his soul or abandon Garlemald. Omega presses him with the plain logic it favors: if the land cannot sustain him, why refuse cooperation? Is there some hidden strategy, or some command forcing him to endure such misery? The answer is neither. His refusal is bound instead to patriotism, humiliation, and the fear that yielding his homeland would strip all previous sacrifice of meaning. Once again, Omega finds itself confronted by a response that does not follow the clean lines of utility and survival. When the two of you step aside, it admits that the contradiction resembles what it observed in Radz–at–Han. Where an Omicron would see only the rational answer, mortals turn away from it for reasons bound to grief, memory, and identity.</p><p>As Omega tries to process that new uncertainty, it asks about Licinia, and your explanation leads its thoughts toward another subject entirely: burial. Before it can pursue that line much further, however, the cold that it had dismissed as negligible finally overwhelms its tiny body. Its speech falters, its systems begin to fail, and in the middle of its analysis it abruptly asks for warmth. You rub its outer frame while Alpha fusses in alarm, and when Omega recovers, its first response is to criticize the design of its model body and demand future upgrades from Biggs and Wedge. Yet it does not retreat. Instead, it insists on pressing forward to Victors’ Spoils, with Alpha ordered to stay so close that his feathers can shield it from the cold.</p><p>There, at Licinia’s grave, you find Manius of the Ist Legion paying his respects. He remembers you from Tertium, and he also knows the sorrow tied to this place. Omega questions him directly. If the Ilsabard contingent’s actions led to the deaths of Licinia and her sister, then would not retaliation be logical? Why has he not chosen hostility? Manius admits that fear of military weakness exists, but says that is not the true reason. The deeper truth is simpler and harsher: survival leaves him no strength for vengeance. He must worry about food, work, fire, and the lives of those still left to him. Lord Quintus’s death remains a subject of dispute among his fellows, yet Manius chooses to see in it the gift of freedom, and with that freedom he has chosen to live. He will accept help from outsiders if that is what survival demands, and he speaks of Alphinaud and Alisaie with genuine warmth. Omega bluntly concludes that Manius first desired survival, and only afterward found the logic to justify it. Manius, rather than denying it, quietly agrees. The heart knows what it wants, he says, even when the mind takes time to catch up.</p><p>That answer brings Omega to another unsettling realization. It had assumed that mortals command the strength of their hearts, but the testimonies suggest the reverse: feelings may entangle thought so completely that reason itself becomes secondary. To Omega, this appears inefficient, even defective, yet it also explains why every attempt to derive a tidy formula from mortal behavior has ended in confusion. Even so, it does not stop. It now wishes to understand the ancients, whose role in the Final Days seems too significant to leave half known. Because the Loporrits were made by the ancients and preserve fragments of their knowledge, Omega judges the moon to be the best source of further data. And so you bring Omega and Alpha to Bestways Burrow, where Growingway erupts in delighted panic at the sight of Alpha’s overwhelming fluff, then eagerly offers technical guidance. Omega studies the facilities, concludes that the ancients must have possessed civilization on an extraordinary scale, and decides that it must speak with the Watcher.</p><p>The Watcher receives you with calm recognition and, rather than giving Omega a simple answer, asks you to speak of the ancients you yourself met: Venat, Emet-Selch, Hythlodaeus, and Hermes. From your account and from his own fragmented memories, he reflects on Venat’s lonely resolve, on the sorrow of those who stood with her, and on the long hope that passed from age to age until your generation finally seized the future for itself. Omega understands the facts, yet not your emotional conclusion. It cannot comprehend how Venat can be remembered with fondness when her sundering caused immeasurable suffering, nor why Hermes should not be admired as one who forced mankind into transformation through trial, nor how Emet-Selch can be both cherished and condemned after engineering calamities that would have destroyed the modern world. It asks which of them was most justified, seeking the single correct evaluation that its kind would always demand. Yet the Watcher tells it that different experiences yield different answers, and that Omega, too, must learn to form its own judgment rather than dismissing all variance as error.</p><p>When you return to Thaumazein, Biggs and Wedge are preparing to depart on urgent business, but before they leave, they insist that Omega fulfill its part of the bargain and translate the mystery transmission recovered from the Ragnarok. Omega agrees, though it warns them that the message is so simple it may scarcely seem worth the wait. Then it speaks the words at last: a message sent to anyone who might one day hear it in the vast reaches of the cosmos, to someone who gazes at the stars with the same wistful longing, urging that unknown listener to press onward and wishing that all tomorrows be blessed with joy. To Omega, the message has no designated recipient, no practical purpose, and no measurable utility. And yet, seeing the expressions it draws from those who hear it, Omega once again finds itself faced with a truth it cannot quantify. In the end, it revises its understanding of the heart not as a power, but as a phenomenon that shapes how reality itself is interpreted. Sir, it concludes, must also have possessed such a heart when it met Meteion and chose to end Omicron expansion. Omega still does not understand that choice, but it no longer mistakes the mystery for emptiness. Having gathered what it considers a satisfying volume of data, it thanks you, sets out once more with Alpha to wander the world, and leaves with the clear intention of continuing its long study of mortal hearts.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'JP',
    pageTitle:'グッバイ・＊＊＊',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', reward:'クリア報酬', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>アルファが元気よく声を上げるなか、オメガは次の目的地を割れた硝子の野営地に定める。イルサバード派遣軍とガレマールの民との関係について、さらに詳しい説明を求めているのだ。報告書には、派遣軍の目的は現地住民の救援だと記されていたうえ、両者にはテルフォロイという共通の敵も存在していた。それにもかかわらず、なぜ最初から互いの利益のために手を結ばなかったのか。その不整合を調べるべきだとオメガは判断し、あなたに転送を促す。極寒の地に降り立つと、オメガはこの小さな躯体が寒冷にある程度耐えられることを確認し、震えの止まらないアルファとは対照的だと淡々と告げる。そして、両陣営の代表者から話を聞き、それぞれの考えを比較するよう求める。</p><p>最初に耳を傾けるのは、派遣軍に属するひとりの男の言葉だった。ユルスたちが協力に加わってから、住民との意思疎通は目に見えて進んだという。もちろん疑念はなお残っており、異国の魔法で心を支配されるのではないかと怯える者もいる。それでも彼は、歩みは遅くとも着実に前へ進んでいると信じていた。相手の暮らし方を認め、尊重し、救うことと支配することを混同しない。それが正しいやり方だと考えているのだ。彼自身、アラミゴ出身でありながら帝国軍に徴用された過去を持つ。帝国人からは属州民として見下され、故郷では帝国に組した者として距離を置かれた。その狭間を知る彼にとって、こうして多国の者が集まりガレマールを救おうとしている現状そのものが、ほとんど奇跡のように思われていた。</p><p>次に出会った帝国民は、あなたの姿を見るなり、過去の痛みをえぐられたような表情を見せる。リキニアとその妹を失ったこと、自らの信念ゆえに差し伸べられた助けを拒みながら、結局はその慈悲に頼って生き延びていること。その屈辱と痛みを抱えながらも、なお彼は祖国を手放すつもりはないと断言する。オメガはいつものように明快な論理で問いただす。この土地が生存に必要な最低限すら生み出せないなら、なぜ協力を拒むのか。隠された生存策があるのか、それとも命令に縛られているのか。だが答えは、そのどちらでもなかった。彼をその場につなぎとめているのは、祖国を失えばこれまでの犠牲がすべて無意味になるという思いと、折れまいとする誇り、そして捨てきれない愛着だった。オメガはそこにもまた、ラザハンで見たのと同じ種類の矛盾を見いだす。合理性だけで測れば選ぶべき道は明白なのに、人は記憶や喪失や自我に縛られ、別の選択を取るのだと。</p><p>その新たな混乱を整理するうち、オメガはリキニアという名について問い、あなたの説明を聞くなかで、やがて埋葬という習慣そのものへと思考を巡らせる。だが、その考察を深める前に、寒さを軽視していた代償が突然あらわれる。小さな躯体の熱量が急速に低下し、声は乱れ、機構は停止寸前に追い込まれる。オメガは分析の途中であなたに摩擦熱を求め、あなたが外装を温めるあいだ、アルファは慌てたように鳴き声を上げる。ようやく回復したオメガは、模型の設計に問題があると不満を述べ、気候対策の改良を帰還後に要求すると宣言する。それでも調査を中断する気はなく、今度はアルファの羽毛に守られるよう命じながら、リキニアの墓所がある戦勝の残滓へ向かう。</p><p>そこであなたたちは、墓に手を合わせていた第一軍団兵マニウスと出会う。彼はテルティウムであなたと顔を合わせたことを覚えており、この場所に眠る姉妹にもまた思いを寄せていた。オメガは率直に問いを向ける。リキニアたちの死が派遣軍との関わりの果てに生じたのなら、報復こそ論理的な帰結ではないのか。なぜ敵対に踏み切らないのか。マニウスは、戦力差を意識していないわけではないと認めつつも、それが主因ではないと語る。過去の怨恨に割く力などないほど、生き残ること自体で精一杯なのだと。食料、仕事、焚き火、そして残された仲間たちの暮らし。それらを支えるためなら、外部の者の助けを借りることも厭わない。アルフィノとアリゼーに対しても、彼はすでに親しみすら抱き始めていた。先にあったのは生き延びたいという願いであり、あとからそこに理屈がついてきたのだと、オメガが言い当てると、マニウスはそれを否定しない。心は求めるものに正直で、思考がそれに追いつくまでには時間がかかるのだと、彼は静かに答える。</p><p>その言葉を通して、オメガは新たな結論にたどり着く。これまで人は心を制御しているのだと思っていたが、実際には逆で、感情の奔流が思考を絡め取り、行動のあり方すら左右してしまうらしい。オメガにとってそれは非効率で、不合理で、欠点にすら見えた。だが同時に、それこそが自分の理解を常に曇らせてきた原因でもあると気づく。そうして第三の問いへ進むため、オメガは古代人についてさらに知ろうと決める。終末の要因として決定的だったにもかかわらず、報告書だけでは全体像が不十分だったからだ。古代人に創られ、その知識の断片を今も保管している月の住人ロポリットならば、より多くの情報が得られるはずだと判断し、あなたはアルファとオメガを連れてベストウェイ・バローへ向かう。そこで出迎えたグローイングウェイは、アルファの圧倒的なふわふわぶりに衝撃を受けて大騒ぎしながらも、すぐに気を取り直して案内役を買って出る。施設を見て回ったオメガは、古代人の文明が途方もない水準に達していたと判断し、次は月の監視者に会うべきだと結論づける。</p><p>監視者はあなたたちを静かに迎え入れ、古代人について語る代わりに、あなた自身が出会った彼らのことを話してほしいと願う。ヴェーネス、エメトセルク、ヒュトロダエウス、そしてヘルメス。あなたの語る記憶と、監視者の断片的な回想が重なるなかで、ヴェーネスの孤独な決意と、彼女に心を寄せた者たちの悲しみ、そして時代を超えて受け渡された希望が、ついにあなたたちの時代で結実したことが語られていく。オメガは事実関係そのものは理解する。だが、なぜあなたがヴェーネスを愛情をもって語れるのかは理解できない。世界を分かち、多くの苦しみを生んだ存在でありながら、なぜそう評価できるのか。あるいは、文明に試練を課したヘルメスはなぜ称賛の対象ではないのか。幾度もの災厄を引き起こしたエメトセルクは、なぜ憎むべき敵であると同時に、忘れ難い存在でもあり得るのか。オメガは誰が最も正しかったのかという唯一の答えを求めるが、監視者は経験の違いによって答えもまた変わるのだと告げる。オメガ自身もまた、他者の結論を誤差として切り捨てるのではなく、自らの考えを持つべきだと。</p><p>その後、あなたたちはサウマゼインへ戻る。ビッグスとウェッジは急ぎの仕事で立ち去る寸前だったが、その前に、ラグナロクの航行記録から見つかった例の通信を訳すという約束を果たすようオメガに求める。オメガは承諾し、その内容はあまりにも単純で、聞く価値すら疑わしいかもしれないと前置きしたうえで、ついに言葉を読み上げる。それは、広大な宇宙のどこかでこの声を受け取る誰かへ向けられた、特定の宛先を持たない短い願いだった。自分と同じように星を見上げる者へ向けて、どうか前へ進んでほしい、そして明日が喜びに満ちたものであるようにと祈る声。オメガにとって、それは目的も効率も備えていない、不合理な楽観に満ちた記録でしかない。だが、それを聞いた者たちの表情を見たとき、オメガは再び、自分には測れない価値の存在を認めざるを得なくなる。最終的にオメガは、心とはひとつの能力ではなく、現実そのものの受け取り方を変えてしまう現象なのだと定義を改める。そして、メーティオンと対峙したシールもまた、そのような「心」を持っていたのだろうと結論づける。なお理解しきれぬ謎を抱えたまま、それでも学び続ければいつか辿り着けるかもしれないと信じ、オメガはアルファとともに再び旅へ出る。あなたに感謝を告げながら、なお終わらぬ探求の先へと歩みを進めていくのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> オメガ <small class="muted">（ラザハン, X:10.0, Y:13.5）</small></div></div>`,

  },
  ZH:{

    pageTitle:'向＊＊＊說再見',

    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Alpha 輕快地叫了幾聲後，Omega 很快便決定了下一個目的地，Camp Broken Glass。它想進一步釐清 Ilsabard contingent（前往 Garlemald 展開救援、重建與支援行動的多國聯軍部隊） 與 Garlemald 居民之間的關係。根據報告，這支聯軍的目的是拯救當地民眾，而雙方也同樣面對 Telophoroi（由 Fandaniel 與 Zenos 主導、在 Endwalker 前後煽動混亂與災厄的敵對勢力） 這個共同敵人。照理說，只要立場一致、敵人相同，他們就該立刻聯手，朝對彼此都有利的方向行動才對。可現實並非如此。這種不一致讓 Omega 認定必須親自查明原因。當你把它與 Alpha 帶到那片寒冷土地後，Omega 冷靜評估四周環境，認為以 Etheirys 的標準來說，這裡雖然嚴寒，卻還不至於讓自己的小型機體無法運作。相較之下，Alpha 幾乎凍得停不下顫抖。確認營地裡仍有聯軍殘部與部分帝國市民留在此地後，Omega 要你分別去與雙方交談，弄清楚他們彼此究竟抱持著什麼樣的看法。</p><p>你首先遇見的是一名聯軍代表。他一認出你，便開始向你說明這裡的現況。自從 Jullus 和他的士兵開始協助之後，聯軍與當地居民之間的溝通確實順利了許多。雖然懷疑與不信任依舊存在，有些人甚至還以為他們會用「外國魔法」操控別人的心智，但整體來說，局勢已比先前改善不少。對他而言，最重要的第一步從來不是強迫對方接受援助，而是先建立起能夠彼此對話的基礎。Omega 聽完後，卻立刻指出這樣的進展遠遠稱不上有效率。若聯軍的目標真是盡快救人，那最理想的方式，應該是直接把當地居民納入自己的指揮體系，由自己統一調度資源與行動才對。可那名士兵並不認同。他說，他們來這裡不是為了接管 Garlemald，而是希望在尊重對方生活方式的前提下，盡可能救下更多人。他自己是 Ala Mhigan，也曾是帝國徵召兵，親身體會過 Garleans 如何看待 provincials（帝國統治下的屬州出身者），也知道 Ala Mhigo 的人又是如何用複雜的眼光看待那些曾替帝國效力的人。正因為夾在這些立場之間，他反而更清楚，這支聯軍之所以難得，正是因為它選擇了不那麼簡單、卻也更不容易再次傷害他人的做法。</p><p>之後，你見到一名消瘦憔悴的難民。他一認出你，情緒便立刻激動起來，像是被過去的陰影狠狠扯住。他質問你是不是來嘲笑他的，嘲笑那個寧可失去 Licinia 和她的妹妹，也不願接受你們援手的人；嘲笑那個最終還是不得不依靠你們施捨才能活下來的人。他承認自己讓同胞蒙羞，也讓國家失了顏面，如今的自己不過像是靠別人餵養才能活下去的獸類。但即使如此，他仍咬牙表示，自己不會把靈魂也交出去，不會接受那些甜言蜜語般的新家提議，更不會離開這片土地。Omega 聽完後直接追問：既然當地居民連最基本的糧食都難以維持，為何還要拒絕合作？是有什麼隱藏的生存策略，還是有誰命令他非得繼續承受這樣的困境不可？那人憤怒地否認了一切，最後卻只能在怒氣與無力之中吐露真正的心聲，他其實也知道，這裡已經沒有什麼能真正留住自己了，可如果連 homeland 都放棄了，那麼之前犧牲的一切又算什麼？那份執拗、屈辱與痛苦，再一次讓 Omega 察覺到，凡人的判斷似乎從來都不是單靠「最合理」就能決定。</p><p>在聽完這些話後，Omega 把你帶到一旁整理思緒。它將剛才得到的資訊與在 Radz-at-Han 蒐集到的結果相互比對，得出一個令自己不快卻又無法否認的結論：不論是聯軍成員還是帝國居民，他們的回應都只能用「一貫地不一致」來形容。若換作任何一名 Omicron（來自外星的機械文明個體，Omega 便屬於其中之一），面對同樣情況時，都應該得出與它完全相同的判斷；可凡人的反應，卻總會偏離那條在它看來再明白不過的邏輯線。也正因如此，Omega 開始懷疑，這種救援者與受救者之間顯得荒謬又彆扭的關係，本身就來自凡人 heart（此處指凡人內在的心、情感與精神本質） 那種難以預測的特性。它甚至直言，若這也算是一種能力，那麼它帶來的副作用實在異常嚴重，因為擁有這種特質的存在，似乎總會把原本簡單的判斷過程弄得更加複雜。可即使如此，它仍沒有停止調查，而是進一步追問 Licinia 的事，以及與之相關的安葬習俗。只是話才說到一半，剛才還自認不受低溫影響的它，機體便突然因寒冷而開始失衡。語音中斷、核心溫度急降，甚至不得不直接要求你趕快摩擦它的外殼替它加熱。等到系統終於穩定下來後，Omega 立刻將責任歸咎於 Biggs 和 Wedge 的設計缺失，還一本正經地表示，回去之後一定要要求追加防寒改裝。不過即使吃了這個苦頭，它也沒有放棄繼續調查，反而命令 Alpha 緊貼在自己身邊，必要時甚至可以把它直接背在背上，好讓羽毛替它保暖。</p><p>之後，你們來到 Victors’ Spoils，在 Licinia 的埋葬地遇見了 1st Legion Soldier Manius。Manius 一眼就認出了你，也記得先前在 Tertium 與你交談過的事。他坦白說，自己是聽說過去住在自己那一區的那對姊妹被葬在這裡，所以才想來致意。Alphinaud 與 Alisaie 曾把整件事告訴他，並為那場悲劇再三道歉，可他也明白，自己的同袍根本沒有資格站在一旁責怪誰，因為他們自己同樣曾被操弄、被欺騙，最終引發了奪去無數同胞性命的內亂。Omega 卻不同意他把這兩件事混為一談。在它看來，Licinia 與她妹妹的死亡，和聯軍的行動明確相關，因此向對方要求補償，甚至展開報復，都屬於合乎邏輯的延伸。既然如此，為什麼 Manius 沒有選擇敵對？Omega 甚至直接替他列出兩種可能：其一，是他判斷己方殘存兵力太弱，無法與聯軍抗衡；其二，則是情感讓他無法做出乾脆的判斷。面對這樣近乎冷酷的拆解，Manius 苦笑著承認，戰力差距當然是現實之一，但真正的原因並不在於計算勝算，而在於自己早已沒有多餘力氣去追究過去。他現在所能顧及的，只剩下下一餐、下一件工作、下一批物資，以及那些還活著的同伴。Lord Quintus 的死法確實眾說紛紜，有人說他該戰到最後，也有人認為他把責任全部攬在自己身上，才讓部下得以真正擁有選擇未來的自由。Manius 無法斷定誰對誰錯，但他自己選擇相信後者。既然 Lord Quintus 留給他的是自由，那麼他就決定用那份自由活下去。只要能讓自己和同伴繼續走下去，就算得依靠聯軍也無妨。至於 Alphinaud 與 Alisaie，他甚至覺得，自己或許已經開始慢慢喜歡上那兩個人了，因為從一開始，他們就是帶著善意與同理心向自己伸出手。</p><p>從 Manius 的回答裡，Omega 又得到了一個新的結論。它原本以為，人是憑藉自身去掌控「heart 的力量」，可現在看來，事實似乎正好相反。感情、情緒與心志的波動，反而會把人的思緒纏得更亂，甚至連對自身行動的掌控都會受到影響。對 Omega 來說，這顯然是一種極不理想的規格，但這也正好解釋了，為何它與凡人交談越多，得到的不是更清楚的答案，而是更多混亂。儘管如此，它仍決定繼續第三也是最後一個問題——它想知道更多關於 ancients（古代世界的住民，也是遠古文明的核心族群） 的事。從終末報告來看，這群存在顯然是 Final Days（由極端情緒與 dynamis 失控擴散所引發的大災厄） 中至關重要的一環，但資料又不足以讓它形成完整概觀。由於 Loporrits（月球上的兔形造物，為 ancients 所創造，並承接部分月面設施的管理職責） 是 ancients 所創造的存在，且據說保管著許多與 ancients 有關的知識，Omega 認為那群月球居民的據點會是最佳資料來源。於是你再次帶著 Omega 與 Alpha 來到 Bestways Burrow。Growingway 一看到你便高興得不得了，接著目光立刻被 Alpha 吸走，甚至誇張到開始哀號自己這個兔子竟然在「毛茸茸程度」上輸給了一隻鳥。可當得知你們不是來告別，而是想調查這裡的技術時，他又瞬間恢復精神，自告奮勇說自己身為這裡負責大氣調節的專家，正是最適合回答問題的 Loporrit。Omega 接受了這份協助，獨自跟著他參觀設施，回來後則做出判斷：光是這裡展示出的部分技術，就足以推知 ancients 的文明至少已達到極高水準。也正因如此，它更加想弄清楚，為何這樣近乎理想的社會，最終仍會走向自我毀滅。接著，Omega 從 Growingway 口中得知，月球上還有另一種由 ancients 製造出的存在，也就是 the Watcher（月球的監視者，負責守望與見證月球使命的古代造物），因此它立刻決定前去與對方交談。</p><p>在 Argos（與 Venat 關係深厚、能在月面行動並載人前往各處的神秘魔物） 的幫助下，你們最終抵達 the Watcher 的居所。這位監視者對這些小小訪客的來臨感到有些新鮮，卻在看見你之後，很快便明白他們是與你同行的夥伴。當 Omega 表明來意，說自己想了解 ancients 的行為、思想，以及他們「heart」的本質，好弄明白 Final Days 為何最終也降臨到自己的母星時，the Watcher 並沒有立刻給它一套結論，而是表示，真正適合回答這個問題的人其實是你。於是，他請你說起自己在旅途中曾親身見過的 ancients：Venat、Emet-Selch、Hythlodaeus，以及 Hermes。隨著你的敘述展開，the Watcher 也從自己零碎的記憶裡回想起更多過去。他說，自己是 Hydaelyn（Venat 化為星之意志後的存在） 所創造的存在，原以為 ancients 的時代終將被遺忘，卻沒想到那些人的身影如今仍如此鮮明地活在你的記憶裡。那份延續至今的記憶，讓他感到由衷欣慰。他想起 Venat 化為 Hydaelyn 之後，將永遠與她所愛的人民隔開；也想起那個曾與她共同注視未來的人，是如何在召喚之中耗盡生命，卻又以新的形體作為月之監視者再次醒來。他說，你所完成的一切並不是神蹟，而是從一代傳到下一代的希望之火，是無數人的願望與祈禱，最終把這顆星球重新塑造成他們認為你們應當擁有的世界。</p><p>可即便聽完這些，Omega 依然困惑。它能理解故事中的事實，卻無法理解你為何會以那樣溫柔的感情談起 Venat。在它看來，Venat 雖然藉由將世界分裂，最終引導你們走向勝利，但她同時也對無數個體造成了不可挽回的損傷。若生存是衡量價值的關鍵，那麼為何不也欣賞 Hermes，那個讓人類接受試煉，不改變就滅亡的人？又或者 Emet-Selch，他在你的敘述中是背負悲劇命運的友人，可從 Omega 以往所觀測到的資料來看，他與 Ascians（自古以來在星球各地策動災厄、以重聚世界為目標的古代殘存者） 所主導的災厄，卻一次又一次把整顆星球推向毀滅邊緣。於是 Omega 直接問出它最在意的問題：站在「擁有 heart 與 soul 的存在」的立場上，你究竟會如何看待這些人？誰才是最有正當性的那一方？而你的回答，並沒有帶給它唯一絕對的標準。the Watcher 也進一步提醒它，經歷不同的人，對同一件事自然會發展出不同的看法；同樣地，Omega 也應該被允許形成屬於自己的理解，而不是急著把所有不同的結論都視為毫無價值。Omega 卻坦言，自己並沒有什麼所謂「自己的想法」，因為每一名 Omicron 都會沿著同樣的邏輯路徑分析事情，就算有一千個 Omicrons 面對同一件事，也只會得出同樣的結果。但即使如此，它仍承認，這些回答是有價值的，因此把這一切都記錄進自己的調查結果中，作為終末報告最後缺失部分的補完。</p><p>等你們回到 Thaumazein 時，Biggs 與 Wedge 正好因為 Ironworks 那邊出了急事，準備趕往港口搭飛空艇支援。不過在離開之前，他們還是先抓住這個機會，想問問你和 Omega 這一路究竟調查得如何，同時也提醒 Omega，別忘了自己答應過要解讀 Ragnarok（由 Sharlayan 與 Garlond Ironworks 等人共同打造、用來前往 Ultima Thule 的星際航行船） 飛行紀錄裡的那段神秘傳訊。Omega 一邊和你們同行，一邊重新總結自己目前的理解。它承認，過去自己錯誤地把你們口中的「heart」當成某種特殊能力，一種 Omicrons 既無法學會，也無法測量的奇異力量。直到現在，它依舊無法徹底掌握那東西的全貌，但經過這一連串調查，它決定修改自己的定義：所謂「heart」，更接近於「一種會影響個體如何詮釋現實的現象」。依照這個新理解，Sir（Omicrons 的領袖 Stigma-1） 在與 Meteion（能感知並傳遞情感、其存在與 Final Days 真相密切相關的存在） 相遇之後做出的選擇，便極可能也意味著它擁有某種「heart」。它並非單純遵循既有邏輯，而是依據自己所感知到的現實，形成了獨立判斷，最後認定 Omicrons 最好的出路是停止擴張，終結一切機能。Biggs 與 Wedge 聽到這裡，正巧也已抵達港邊等候的飛空艇前，於是立刻催促 Omega 兌現承諾，翻譯那段謎一般的傳訊內容。Omega 簡短應聲，甚至還先冷冷補了一句，那段訊息其實單純到幾乎沒有價值，或許光是花時間聽完，都會造成淨損失。可當它真正開口，把訊息換成本地語言念出來時，所有人還是安靜了下來——那是一段沒有指定收件人的短短話語，像是從遙遠宇宙深處寄來的微弱心願。那人說，若有人能在廣闊宇宙中收到這段訊息，希望對方也是像自己一樣，懷著惆悵心情仰望群星的人。並且，他想對那樣的人說：繼續前進吧，願你們所有的明日都被喜悅祝福。對 Omega 而言，這段話既沒有明確對象，也談不上實際用途；其中關於 joy 的祈願，更是過於抽象且不切實際。可當它看著聽見這段話的人們臉上浮現出的表情時，它仍不得不承認，自己對這則訊息價值的判定，和它實際帶來的影響，顯然彼此衝突。</p><p>即使到了最後，Omega 仍說自己無法真正理解 Sir，無法明白它為何會得出終結一切才是正確選擇的結論。可它同時也知道，自己正是為了不斷進化而被設計出來的存在。既然如此，只要繼續學下去，終有一天，理解這個現象的機率就不會是零。於是，它決定暫時把 Sir 的難題放在一旁，繼續留在這顆遙遠的星球上，繼續在各種生命之間觀察、記錄、學習，慢慢拼湊出凡人之心真正的樣子。等一切告一段落後，Omega 對你表達了感謝，說你替它的學習帶來了相當豐富且令人滿意的資料。既然你們之間的約定已經完成，它與 Alpha 便打算再次出發，繼續四處旅行。經過這一路的經驗，它對自己的行動範圍也變得更有自信，不再打算只把旅程侷限在 Eorzea，而是想走得更遠，甚至重訪 Garlemald 那樣冰天雪地的地方。只是話才說到一半，它又突然想起，自己還沒來得及要求 Biggs 和 Wedge 替這具身體補上完整的防寒功能，於是立刻決定把請求改送給 Deputy President Jessie。說完之後，它便一本正經地啟動步行模式，向你道別。Alpha 則在這時用力抖了抖羽毛，從翅膀下掉出一小張紙片，像是特地想留給你作為謝禮。當你收下它時，也意味著這段同行正式來到尾聲。而在你目送他們離去時，Omega 已經再次催促 Alpha 加快腳步，因為前方的路還很長，而他們的旅程，才剛剛開始。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Omega <small class="muted">(Radz-at-Han, X:10.0, Y:13.5)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-heartless-hypothesis.html">不具心者亦會思考</a></div><div class="row">戰鬥或魔法職等級 90 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-end.html">完結</a></div></div>`,
    reward:`<div class="stack"><div class="row"><b>完成獎勵</b> 樂譜</div><div class="row"><a class="link" href="bgm-flow-together.html">Flow Together</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  reward: document.getElementById('panel-reward'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
