<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Reaching for Cloud Nine',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more',
    readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>When Sezul Totoloc sees the questions burning in your face, he understands that his sudden request has left you wary. He admits that your suspicion is only natural; many Ixal would sooner kill a featherless one than speak with them. Yet Sezul and his crew are not like the zealots of Natalan. To them, the endless war with the forest people is nothing but waste—waste of time, waste of resources, and waste of lives. The Ehcatl Nine, he explains, are thinkers and crafters. Their camp is not a place for destruction, but a place for building dreams. Their dream is to fly higher than any other, and before they can reach the sky, they must first make wings.</p>
      <p>Sezul has seen enough of you to know you are skilled at making things, even if your clothing confused him at first. Creation, he insists, is better than destruction, and that is something both Ixal and featherless ones should be able to understand. What he needs from you is a set of airship hull components that cannot be made easily in such a remote camp. He has already ordered the raw materials from a Qiqirn merchant at Fallgourd Float, and you need only collect them and use the crafting facility there. Before you leave, he gives you a pair of special gloves, meant to protect and support your hands while you work on delicate airship parts. Even a clever crafter, he says, needs help from time to time.</p>
      <p>At Fallgourd Float, Kikiroon directs you to the workshop beside the inn, where Hildeyerd welcomes you with bright enthusiasm and explains the purpose of the facility. It is a workspace built for artisans of every trade, a place where those with the proper materials may produce goods that require precision and polish. Yet before your work can begin in peace, a young man named Tataramu bursts in, demanding news of his own delivery. Seeing the rare airship component materials in your possession, he assumes you have taken what he ordered a moon in advance. Hildeyerd tries to calm him, but Tataramu is convinced that only a master engineer could possibly have a rightful use for such specialized materials. He challenges you to craft the component and allows that he will judge the quality of your work himself.</p>
      <p>You complete the component, and Tataramu’s scorn vanishes the moment he examines it. The craftsmanship is exemplary, far beyond what he expected, and he is immediately seized by curiosity. When he learns that an Ixal commissioned the work—or senses that you are reluctant to reveal the client—his imagination leaps to the worst conclusion. Rumors among engineers spoke of Ixal building a secret camp in the Black Shroud and testing some hidden weapon. If those rumors are true, he believes, then your client must be constructing an airship of war. To Tataramu, the idea of turning the wonder of flight into a tool of death is unforgivable. Before Hildeyerd can stop him, he rushes off to confront the Ixal himself, leaving you to deliver the finished component to Sezul.</p>
      <p>Back at Ehcatl, Sezul is pleased with the component and says it will serve them well in beginning construction of the hull. Then Tataramu arrives, breathless and furious, accusing Sezul of building a death-dealing airship meant to bring war and ruin to Gridania. Sezul rejects the charge at once and tells him to look at the designs beneath his own feet. Tataramu studies the schematics and realizes they are unlike anything he has seen, combining elements of both dirigible and airship. Sezul names the vessel Dezul Qualan, a hybrid craft meant to reach an altitude of five thousand yalms. It is no weapon. It is a vessel meant to carry the Ehcatl Nine toward Ayatlan, the floating continent of legend where Sezul’s ancestors once lived. The dream of returning to that lost paradise has been forgotten by too many Ixal, who instead worship Garuda and squander their lives in conflict. Sezul refuses that path. He wants to build new wings with his own hands and reclaim the sky through craft, not slaughter.</p>
      <p>Hearing this, Tataramu’s anger gives way to awe. He admits that he misjudged Sezul and begs to join the crew, offering his knowledge of airship design and his passion for the craft. Sezul accepts, though he warns that passion alone is not enough and that Tataramu will be worked as hard as anyone else. With one misunderstanding transformed into a new alliance, Sezul turns to you. He is impressed by your work and asks whether you will continue helping the Ehcatl Nine build the Dezul Qualan. If you choose to fly with them, he speaks more deeply of his people’s lost wings: how the Ixal were once able to soar, how they were banished from the forest and stripped of flight, and how later generations hatched outside the forest with stunted feathers but never lost the desire for the sky. The Natalan Ixal may grovel before Garuda, but Sezul believes salvation lies in the vessel they are building together. Whether or not the distant heavens are truly meant for everyone, he will not force you against your will. Yet if you remain with the Ehcatl Nine, you will help write history—not by destroying, but by building.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Sezul Totoloc <small class="muted">(North Shroud, X:24.4, Y:23.4)</small></div>

      <div class="row"><a class="link" href="a-bad-bladder.html">A Bad Bladder</a></div>

    </div>`,
    followq:`<div class="stack">

    </div>`
  },

  JP:{
    langLabel:'日本語',
    pageTitle:'疾風の空力団',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示',
    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>セズル・トトロックは、あなたの顔に疑問が浮かんでいるのを見て、その唐突な頼みに警戒されていることを察する。疑うのも当然だと、彼は認める。イクサルの中には、羽なしを見るなり殺して、死骸を野に捨てる者も少なくない。だが、セズルとその仲間たちは、ナタランの狂信者たちとは違っていた。森の民との終わりない争いなど、時間の無駄であり、資源の無駄であり、命の無駄でしかない。エカトル空力団とは、考える者たち、そして作る者たちの集まりなのだと彼は語る。このエカトルは壊すための場所ではなく、夢を築くための場所だった。誰よりも高く飛ぶことこそ彼らの夢であり、その空へ至るためには、まず翼を作らなければならないのだった。</p>
      <p>セズルは、あなたに物作りの腕があることを見抜いていた。最初はその服装に戸惑ったものの、動き方や目の向け方から、職人としての気配を感じ取ったのだという。壊すよりも作るほうがよい。それはイクサルも羽なしも、きっと同じようにわかるはずだと彼は言う。そこで彼があなたに求めたのは、この人里離れた拠点では容易に作れない飛空艇の船体部品だった。必要な素材はすでにフォールゴウドのキキルン商人へ注文してあるため、あなたはそれを受け取り、現地の製作施設を使えばよい。出発にあたり、セズルは精密な飛空艇部品を作る手を守り、支えるための特別な手袋をあなたに渡す。どれほど賢い職人であっても、ときには助けが必要なのだと。</p>
      <p>フォールゴウドでは、キキルンが宿屋のそばにある工房へ向かうよう教えてくれる。そこでヒルデヤードは明るくあなたを迎え、この施設の目的を説明した。ここはあらゆる職人のために設けられた作業場であり、材料さえあれば、精密さと仕上がりのよさを求められる品を誰でも作れる場所なのだという。だが、穏やかに作業が始まる前に、タタラムという若者が飛び込んでくる。自分の荷が届いたかとたずねた彼は、あなたが希少な飛空艇部品の材料を持っているのを見て、ひと月も前から予約していた品を横取りされたと思い込む。ヒルデヤードが誤解を解こうとしても、タタラムは、これほど特殊な素材を扱えるのは一流の技師だけだと決めつけていた。彼はあなたに、その材料で何を作るつもりなのか問い詰め、できあがった品の出来栄えを自分が見定めてやると言い放つ。</p>
      <p>あなたが部品を完成させると、タタラムの侮りは一瞬で消える。彼の目に映ったその仕事は、予想をはるかに超えた見事な出来栄えだった。驚きと好奇心に駆られた彼は、その部品を誰が依頼したのかを知りたがる。依頼主がイクサルだと知ったとき、あるいはあなたが依頼主を明かすのをためらう様子を見たとき、彼の想像は最悪の方向へ走り出す。技師たちの間では、黒衣森にイクサルの秘密拠点があり、何らかの秘密兵器を試しているという噂があった。もしそれが本当なら、依頼主は戦のための飛空艇を造ろうとしているに違いない。空を飛ぶという驚くべき技術を死を運ぶ道具に変えるなど、タタラムにとって許しがたい冒涜だった。ヒルデヤードが止める間もなく、彼はイクサルを叱りつけるため、ひとりで飛び出していく。あなたは完成した部品を受け取り、セズルのもとへ届けることになる。</p>
      <p>エカトルへ戻ると、セズルはあなたの作った部品を確かめ、これなら船体の建造を始められると満足そうにうなずく。そこへ、息を切らしたタタラムがようやくたどり着き、セズルがグリダニアに戦と破壊をもたらす飛空艇を造ろうとしているのだと激しく責め立てる。セズルはすぐにそれを否定し、足もとにある設計図をよく見ろと言い返した。タタラムが図面をのぞき込むと、そこには気球と飛空艇の要素を合わせた、見たこともない構造が描かれていた。セズルはそれをデズル・クワランと呼ぶ。高度五千ヤルムを目指す、飛空艇と気球の複合船だ。それは兵器ではない。セズルの祖先がかつて暮らしていたという、雲の上の伝説の浮遊大陸アヤトランを目指すための船だった。失われた楽園へ帰るという夢は、多くのイクサルに忘れられてしまった。彼らはガルーダをあがめ、羽なしとの争いに命をすり減らしている。だがセズルはその道を拒む。自らの手で新たな翼を作り、殺戮ではなく製作によって空を取り戻そうとしていた。</p>
      <p>その言葉を聞いたタタラムの怒りは、やがて深い感嘆へと変わる。彼はセズルを見誤っていたことを認め、自分もその夢を現実にするために働かせてほしいと願い出る。飛空艇設計を広く学んできたこと、実地経験はまだ足りなくとも、その情熱だけは誰にも負けないことを訴えたのだ。セズルはそれを受け入れるが、情熱だけでは足りず、知識も必要であり、身体が小さいからといって手加減はしないと釘を刺す。誤解から始まった出会いは、こうして新たな仲間をもたらした。そしてセズルは、あなたの仕事ぶりにも満足し、デズル・クワランの建造をこれからも手伝う気はあるかと問いかける。ともに飛ぶ道を選ぶなら、彼はさらに、イクサルが失った翼について語る。かつて自らの翼で空を飛んでいたこと、精霊の怒りを買って森を追われ、飛ぶ力を失ったこと、森の外で生まれた若い世代の羽が小さくなっても、空へ焦がれる心までは失われなかったことを。ナタランのイクサルはガルーダにすがるかもしれない。だがセズルは、救いは今まさに作ろうとしているこの船の中にあると信じている。遠い空が誰にでも向いているとは限らないとしても、彼はあなたの意思に反して強いることはしない。それでもエカトル空力団とともに歩むなら、あなたは破壊ではなく創造によって、歴史の一頁を書くことになる。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> セズル・トトロック　黒衣森：北部森林 <small class="muted">(X:24.4, Y:23.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="a-bad-bladder.html">雷雨来たりなば</a></div>
      <div class="row">クラフター <small class="muted">Lv 1～</small></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="a-designer-job.html">設計士急募、種族問わず</a></div>
    </div>`
  },

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'迎風而上的空力團',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Sezul Totoloc 看見你臉上滿是疑問，便明白自己突如其來的請求讓你起了戒心。他承認，你會懷疑也是理所當然；畢竟許多 Ixal 若遇見無羽者，恐怕會直接殺了對方，再把屍體丟給禿鷹。但 Sezul 和他的夥伴並不像 Natalan 那些狂熱者一樣思考。對他們來說，與森林之民之間那場無止境的戰爭，只是浪費時間、浪費資源，更是在浪費生命。Ehcatl Nine 是一群思考者，也是一群製作者；這座 Ehcatl 並不是為了破壞而存在，而是用來建造夢想的地方。他們的夢想，是飛得比任何人都還要高。而在真正飛上天空之前，他們必須先親手造出翅膀。</p>
      <p>Sezul 已經看出你擅長製作東西，雖然你的服裝一開始讓他有些困惑，但你的動作與眼神仍讓他認出了工匠的氣息。他堅持，創造遠比破壞更好，而這一點應該是 Ixal 與無羽者都能理解的道理。因此，他希望你替 Ehcatl Nine 製作一批飛空艇船體部件；在這樣偏遠的營地裡，他們雖然能做很多東西，卻並非什麼都能完成。他已經向 Fallgourd Float 的 Qiqirn 商人訂好了原料，你只需要去領取材料，並使用那裡的製作設施即可。出發前，Sezul 還交給你一雙特殊手套，用來在製作精密飛空艇部件時保護並支撐雙手。他說，就算是聰明的工匠，有時候也需要一點幫助。</p>
      <p>來到 Fallgourd Float 後，Kikiroon 指引你前往旅館旁的工房。Hildeyerd 熱情地迎接你，並說明這座設施的用途。這是一個為各行各業的工匠準備的工作場所，只要帶著材料來到這裡，不論從事哪種專業，都能製作那些需要高度精密與細緻修整的物品。然而，你的作業還沒能平穩展開，一名叫做 Tataramu 的年輕人便突然闖了進來，追問自己的貨物是否已經送達。他看見你手上那些稀有的飛空艇部件材料後，立刻認定你搶走了他早在一個月前預訂的物資。Hildeyerd 試圖替你解釋，但 Tataramu 堅信，只有真正高明的工程師才有資格使用這種專門材料。他質問你究竟打算用它們做什麼，並帶著挑釁的態度表示，等你完成後，他會親自替你鑑定作品的「品質」。</p>
      <p>當你完成部件後，Tataramu 原本的輕視在一瞬間消失了。他檢視成品時幾乎無法相信，眼前的工藝竟然如此出色，遠遠超出了他的預期。驚訝與好奇立刻取代了嘲諷，他迫切想知道究竟是誰委託你製作這件東西。當他得知委託者是 Ixal，或者察覺你不願透露委託者時，他的想像立刻往最糟的方向奔去。工程師之間曾經流傳過一個傳聞，說有一群 Ixal 在 Black Shroud 裡開闢秘密營地，並試驗某種秘密武器。若那傳聞是真的，那麼你的委託者必然是在建造一艘用於戰爭的飛空艇。對 Tataramu 來說，把飛行的奇蹟變成運送死亡的工具，是絕對無法容忍的褻瀆。Hildeyerd 還來不及攔住他，他便已經衝出去，打算親自到那座 Ixal 營地痛斥對方。而你則帶著完成的部件，繼續前往 Sezul 身邊完成交付。</p>
      <p>回到 Ehcatl 後，Sezul 檢查了你製作的部件，滿意地說這將能派上用場，船體的建造也終於可以開始。就在這時，氣喘吁吁的 Tataramu 終於找到了這裡，怒氣沖沖地指控 Sezul 正在建造一艘會給 Gridania 帶來戰爭與毀滅的飛空艇。Sezul 立刻否認，並要他低頭看看腳下的設計圖。Tataramu 仔細一看，才發現那份圖紙結合了氣球與飛空艇的要素，是他從未見過的構造。Sezul 稱它為 Dezul Qualan，那是一艘飛空艇與氣球的混合船，目標是飛到五千 yalms 的高度。它不是武器，而是要前往 Ayatlan 的船。那座傳說中的浮游大陸高高位於雲層之上，據說正是 Sezul 祖先曾經生活過的地方。回到那片失落樂園，曾經是 Ixal 一族共同的目標；但如今太多 Ixal 遺忘了這個夢，轉而崇拜 Garuda，並把生命消耗在與無羽者的爭鬥中。Sezul 拒絕那樣的道路。他想用自己的雙手打造新的翅膀，以創造而不是殺戮，重新奪回天空。</p>
      <p>聽完這一切後，Tataramu 的憤怒漸漸變成了震撼與敬佩。他承認自己誤會了 Sezul，並請求加入這支隊伍，親眼看著這個夢想化為現實。他說自己深入學習過飛空艇設計，雖然實作經驗還稱不上豐富，但對這門技術的熱情絕不輸給任何人。Sezul 接受了他的請求，但也提醒他，熱情固然重要，知識同樣不可或缺；而且即使他個子小，也不會因此獲得任何特別寬待。這場由誤解開始的衝突，就這樣轉變成新的同盟。接著，Sezul 也看向你，稱讚你的成果，並問你是否願意繼續協助 Ehcatl Nine 建造 Dezul Qualan。若你選擇與他們一同飛翔，他便進一步告訴你 Ixal 失去翅膀的故事：他們曾經能憑自己的翅膀飛翔，卻因觸怒 elementals 而被逐出森林，也失去了飛行的恩賜；後來在森林之外孵化的年輕一代羽翼萎縮，卻從未失去對天空的渴望。Natalan 的 Ixal 或許選擇跪拜 Garuda，但 Sezul 相信，他們的救贖與清醒時的夢，正存在於這艘即將完成的船裡。遙遠的天空也許並不屬於每一個人，但他不會強迫你違背自己的意願。若你願意留下來與 Ehcatl Nine 並肩前行，你將親眼見證歷史被寫下——不是透過破壞，而是透過建造。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
