  <style>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`Hearts on Fire`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Cracked Fist addresses you by your Grand Company rank and surname, recalling that you had hoped to raise the flagging spirits of the men and women in the garrison. He assures you that what is asked of you is not unnecessarily laborious—that the mere presence of a hero such as you, walking in their midst, would be enough to restore a measure of morale. And so he bids you make your way to the Ceruleum Processing Plant and report to General Raubahn once you have arrived, praying for your safety, for the troops are counting on you.</p><p>At the camp, Raubahn greets you with a hearty welcome—the hero who brought down the praefectus—and says it is good to have you with them. Yet as you look around, it is plain the mood is grim at best. Raubahn admits he had hoped your presence alone might lift spirits, but many are so preoccupied wallowing in fear and self-pity that they have scarcely even noticed you. He asks you to make the rounds and share a few words of encouragement with those whose spirit falters, certain it will carry more weight coming from you than from him. When you have seen to the others, he adds, you are to do the same for Edelstein—no matter what he may claim, the lieutenant would also be better for a bit of rousing.</p><p>You approach one dispirited Flame recruit who answers in weary obedience, punctuating every word with a sigh. After you offer what encouragement you can, they manage a reluctant thanks, admitting—however begrudgingly—that whatever you did momentarily distracted them from their woes. Another reacts with outright panic, wailing that the Garleans are not near as frightening as you, and that they would sooner face a vanguard naked as their nameday than stand before you. A third meets you with bitter sarcasm, certain the “oft-rumored hero” will single-handedly save them all, and confessing they do not even have the will to care—until your vigorous encouragement snaps them back to purpose, and they swear to fight tooth and nail to protect the realm. Still another can barely speak through battlefield nerves, begging you not to look at them—only to explode moments later into a feral roar, shouting that they will feast on Garleans, and that right now, they are very hungry.</p><p>When you turn to Edelstein, he laughs at the notion that you would stoke his fighting spirit as you did the recruits’, insisting it is hardly necessary and that the fire in his heart rages as strongly as it ever has. He says there is no time to get better acquainted and urges you to focus on the operation, warning that if you fail, your lives—if indeed you still live—shall never be the same again. Yet even as he speaks, realization catches him: without his noticing, the fire of his resolve had grown dim. He thanks you for rekindling it until it burns red-hot once more, and swears that if need be, he will lay down his life to secure victory for Eorzea.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Cracked Fist <small class="muted">(Northern Thanalan, X:22.2, Y:29.8)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-hero-in-need.html">A Hero in Need</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 49 or above)</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="rock-the-castrum.html">Rock the Castrum</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'心に火をくべて',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>クラックドフィストは、あなたをグランドカンパニーの階級と姓で呼び、駐屯地の兵たちの士気を高めたいというあなたの意向に触れる。そして安心してほしいと言い添え、求めているのは過度に骨の折れる任務ではないと告げた。英雄であるあなたが兵のあいだを歩くだけで、それだけで彼らの士気はある程度取り戻されるはずだという。そうして彼は、セリウム精製所へ向かい、到着したらラウバーン将軍へ報告するよう頼み、兵たちがあなたを頼りにしているのだと告げて武運を祈る。</p><p>陣地に着くと、ラウバーンはプラエフェクトゥスを討ち倒した英雄としてあなたを迎え、共に戦えることを喜ぶ。しかし、陣地の空気は良くてもしんと重い。あなたがいるだけで士気が上がると期待していたものの、恐怖と自己憐憫に沈む者が多く、あなたの到着に気づきもしない者さえいるという。そこで彼は、気力が揺らいでいる兵たちを巡り、励ましの言葉をかけてほしいと頼む。自分の言葉より、あなたの言葉のほうが重みを持つはずだと。さらに、皆を見て回ったらエーデルシュタインにも同じように声をかけてくれと告げる。本人がどう言おうと、中尉にもひと押しが必要だと、ラウバーンは断言する。</p><p>あなたが不滅隊の新兵たちに声をかけて回ると、反応はさまざまだ。ある者は「了解です……」と力なく返事をし、ため息ばかりをこぼすが、あなたの働きかけに、ほんの一瞬だけでも悩みから気を逸らせたと渋々礼を言う。別の者は泣き叫び、ガレマール帝国兵よりあなたのほうがよほど恐ろしく、命名日に裸で先陣に向かうほうがまだましだとまで口走る。さらに別の者は冷めた皮肉であなたを迎え、噂の英雄がすべてを救うのだろうと言いながら、気にかける気力すらないと吐き捨てるが、あなたの勢いある励ましで目的を思い出し、歯を食いしばって国を守ると誓い直す。戦場の緊張で言葉もままならず「見ないでくれ」と取り乱す者もいるが、次の瞬間には荒々しく吠え、ガレマール帝国兵で腹を満たしてやる、今は腹が減って仕方がないのだと叫んで奮い立つ。</p><p>やがてエーデルシュタインのもとへ行くと、彼は新兵たちと同じように闘志を焚きつけるつもりかと笑い、そんなものは必要ないと言い張る。自分の胸の火は昔と変わらず燃えているのだと。それでも彼は、いまは作戦に集中すべきだとあなたを促し、失敗すれば――もし生きていたとしても――人生は二度と同じではいられないと告げる。だがその途中で彼ははっとし、自分でも気づかぬうちに決意の火が弱まっていたのだと悟る。あなたのおかげで再び赤熱したのだと感謝し、必要ならエオルゼアの勝利のために命を捧げる覚悟だと宣言する。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> クラックド・フィスト闘曹長 <small class="muted">（北ザナラーン, X:22.2, Y:29.8）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-hero-in-need.html">決戦の地へと続く道</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 49～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="rock-the-castrum.html">カストルム・メリディアヌムの死闘</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'士氣如火',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Cracked Fist 以你所屬大國防聯軍的軍階與姓氏稱呼你，提起你曾希望能為駐軍裡那些士氣低迷的男女帶來振作。他要你放心——不需要你做什麼繁重的工作；光是你這樣的英雄走進他們之中，就足以讓他們多少找回士氣。於是他請你前往 Ceruleum Processing Plant，抵達後向 Raubahn 將軍報到，並祝你一路平安，因為前線的士兵都在倚靠著你。</p><p>你到達營地後，Raubahn 熱情迎接你這位「擊敗那位 praefectus（加雷馬帝国軍指揮官）的英雄」，說很高興你能與他並肩。然而放眼望去，營地的氣氛沉重得很。Raubahn 坦言，他原本以為你一出現就能提振士氣，但許多人正沉溺在恐懼與自怨自艾裡，甚至連你已抵達都沒有注意到。於是他請你繞營走一圈，對那些精神動搖的士兵說幾句鼓勵的話——他本想自己做，但他很確信，由你開口更有分量。等你照看完其他人之後，也去找 Edelstein；不管他怎麼嘴硬，那位中尉同樣需要被振作一下，Raubahn 說他很清楚。</p><p>你依照囑託去找那些決心正在動搖的不滅隊新兵，反應各不相同。有人有氣無力地回「是……長官……馬上……」接著一再嘆氣；你鼓舞他之後，他勉強道謝，承認你剛才那番作為確實讓他短暫從憂慮裡抽離了一瞬。也有人忽然放聲哭喊，說加雷馬帝国兵根本沒有你可怕，寧可在自己的命名日赤身裸體去對上先鋒部隊，也不想再被你嚇到。還有人用冷嘲熱諷迎接你，說「傳聞中的英雄」肯定會一個人拯救所有人，甚至坦白自己連在意的力氣都沒有——但在你強勢的鼓舞之下，他又被拉回使命，發誓要拚盡全力守護這片土地。也有人結結巴巴地逞強，說只是戰場緊張，卻又慌亂地求你別看他；可轉眼間，他又爆發似地狂吼，喊著要拿加雷馬帝国兵來開餐，因為他現在真的餓得發慌。</p><p>最後你去見 Edelstein。他先是大笑，說你也要像鼓舞新兵那樣來點燃他的鬥志嗎——好意心領，但完全沒必要；他保證自己心中的火焰一直都燃得很旺。他催你把心思放回作戰，因為一旦失敗，往後的人生——即便還能活著——也將再也不同。然而話說到一半，他卻像突然意識到什麼般怔住：原來自己的決意之火早已在不知不覺間變得黯淡。如今因為你，它再次燃得赤熱。Edelstein 鄭重表示——若真有必要，他願意為了 Eorzea 的勝利付出生命。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 克拉克德·菲斯特 <small class="muted"> 北薩納蘭（X:22.2, Y:29.8)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-hero-in-need.html">通往決戰地點</a></div><div class="row">所有職業（不含限定職）等級 49 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="rock-the-castrum.html">南方堡死戰</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
