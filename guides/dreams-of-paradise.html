  EN:{

    tabs:{story:'Story',acq:'Acquisition',unlockq:'Unlock Quest',followq:'Follow-Up Quest',comments:'Comments'},
    readMore:'Show more',readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>A Landsguard messenger finds you at once, saying your timing couldn’t be better: word has come from Yak T’el that unknown beasts were sighted near the rift and attacked the sentries on watch. Bakool Ja Ja believes the attackers to be echoes and has already headed there, and the messenger warns how great a threat more of them could pose to Tuliyollal. He urges you to speak first with Toraal Ja in Mamook to learn where Bakool Ja Ja has gone.</p><p>In Mamook, Toraal Ja recognizes you and immediately offers to take you to Bakool Ja Ja, saying he was last hunting for the echo somewhere north of Gok Draak Descent. You ride out, and when you arrive, Bakool Ja Ja tells you you’ve missed the excitement—those beasts attacked before anyone could even greet them, and the two heads trade grim humor about how quickly they put them down. Prishe and Alxaal arrive as well, and Alxaal stares at the fallen foes, calling them Orcs; Prishe confirms they resemble the ones that attacked her home, violent and usually found in large packs, and she recalls how Tavnazia struggled to hold them back.</p><p>Among the aftermath, you find a letter written in the hand of your people. Its author is Sareel Ja, addressing the Dawnservant’s champion: the stage is set for the next challenge, and you are invited to return to Jeuno. Refuse, and a horde of echoes will be unleashed upon Yak T’el—“the choice is yours.” Bakool Ja Ja calls it the long-awaited invitation of a rotten snake, but Alxaal asks what choice you truly have, and Prishe’s answer is immediate: you should go—so Sareel Ja can be reacquainted with her fists.</p><p>Back in Lower Jeuno, Bakool Ja Ja bristles that Sareel Ja threatens you to return and then has the nerve to make you wait, while Prishe wonders what he could be plotting after conjuring the Shadow Lord, and what part she is meant to play. Alxaal speaks of Orcs again—how they share a long, bitter history with the people of his home, San d’Oria, and how one of his first tasks as an adventurer was to rout a band of them from the woods of Ronfaure, though his memory remains hazy.</p><p>Sareel Ja finally appears, pleased that you came, and claims it would have been a shame to set more echoes upon the people of Tural—something the Dawnservant would have hated to see. Alxaal demands the games end and vows you will not let Sareel Ja besmirch Vana’diel’s memories with abhorrent echoes any longer, but Sareel Ja coldly asks why Alxaal is even here, saying he did not request his presence. Then he announces your second challenge and presents Kam’lanaut, Archduke of the Grand Duchy of Jeuno—only for Prishe to identify him at once as the last of the Zilart from ten thousand years ago, beings from a time before the five races inhabited Vana’diel.</p><p>You weigh what that could mean, and Prishe notes your worlds may be more alike than she thought. Alxaal remembers Kam’lanaut had an older brother and doubts Sareel Ja would miss that detail; Kam’lanaut himself reacts sharply, and Sareel Ja dismisses Alxaal as the ramblings of a dead man. Kam’lanaut agrees to play along for now, and Sareel Ja declares the curtain has risen on your second challenge. Before Sareel Ja leaves, Prishe demands the truth—whether she is really only an echo—but Sareel Ja says they have been over this and pities how her heart refuses what her head knows, then says he will ease her burden and “return you to electrope.” In the chaos, Bakool Ja Ja is struck down, and Sareel Ja mocks you for playing hero to a heap of stone masquerading as a child, saying with Bakool Ja Ja out of the way there will be one less distraction as you bring all you have so he can create the perfect vessel—the perfect ruler. Kam’lanaut says he will await you somewhere more fitting for battle.</p><p>After you face the trial within, Bakool Ja Ja greets your return and asks where Alxaal is, and Prishe echoes the question even as she marvels that you had to fight Omega and Ultima as well. Sareel Ja appears again, noting your band is a member short and remarking that “life” is something of an exaggeration anyway. He congratulates you on trouncing the echoes, saying your struggles have given him vital knowledge for his next selection. He insists everything is going to plan: the stronger she proves, the more powerful their ruler will be. When pressed on why he would go so far, he declares you deserve better than a mockery of a contest and that the world will soon see he is fit to govern alongside a true ruler.</p><p>Bakool Ja Ja the Mystic calls him a would-be tyrant and traitor and pleads it’s not too late to stop, while Bakool Ja Ja the Mighty says the Dawnservants have served the people well and would forgive Sareel Ja as they forgave him. Sareel Ja scorns him—asking what happened to the proud warrior who vied for the throne and insisting any bonds with Wuk Lamat are merely an illusion born of convenience. He calls Bakool Ja Ja a lapdog, a means to harness the might of the blessed siblings, and says when she falls he will be a mongrel in the streets. Bakool Ja Ja rages back, only to falter in pain, and Sareel Ja laughs that it serves him right for protecting “that thing,” adding that considering the damage her core took battling their champion, she hasn’t long left anyway. He reminds you of his letter: he can unleash an army of echoes upon Yak T’el if you value its people’s safety, then his selections must continue. When he leaves to prepare, Prishe is left whispering how long she has before she… before she… and Alxaal says if they truly are echoes, any significant injury could wipe them from existence—but even if he is not real, the love he bears for Vana’diel and her memories is, and that is why he will keep fighting. Prishe agrees: worrying won’t get you anywhere, and she already knows the truth.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Landsguard Messenger <small class="muted">(Tuliyollal, X:16.2, Y:3.9)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="jeuno.html">Jeuno</a></div><div class="row"><b>Unlock Raid</b> <a class="link" href="san-doria-the-second-walk.html">San d’Oria: The Second Walk</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="northward.html">Northward</a></div></div>`

  JP:{
    langLabel:'JP',
    pageTitle:'一万年の夢の残響',
    tabs:{story:'ストーリー',acq:'入手方法',unlockq:'開放クエスト',followq:'後続クエスト',comments:'コメント'},
    readMore:'全文を表示',readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ランドガードの使者があなたを見つけ、「ちょうどよいところだ」と告げる。ヤクテル樹海の裂け目付近で正体不明の獣が目撃され、警備の衛兵を襲ったという。バクージャジャはそれらをエコーだと見て、すでに現地へ向かったらしい。使者は、さらに増えればトゥリヨラルにとって大きな脅威になると強調し、まずはマムークのトラールジャに会って、バクージャジャの居場所を確かめるよう勧める。</p><p>マムークでトラールジャはあなたを迎え、到着次第バクージャジャのもとへ案内するよう頼まれていると言う。最後に連絡を取った時、バクージャジャはゴク・ドラーク降下地点の北方でエコーを追っていたらしく、あなたはそのまま同行して現地へ向かう。着くとバクージャジャは「騒ぎはもう終わった」と言い、挨拶する暇もなく襲われたが、別れを告げられる暇もないほど素早く仕留めたと、二つの頭で皮肉を飛ばす。そこへプリッシュとアルクサールも駆けつけ、アルクサールは倒れた敵を見て「オークだ」と口にし、プリッシュは故郷を襲った連中に似ていると認める。粗暴で群れを成し、タブナジアは常に撃退に苦労していたのだと。</p><p>その場であなたは手紙を見つける。あなたの民の筆跡で書かれ、差出人はサレージャだった。暁王の勇士に宛て、「次の試練の舞台は整った。ゆえにジュノへ戻るよう招待する」と告げ、拒めばヤクテル樹海にエコーの大群を放つという――「選ぶがよい」。バクージャジャは腐りきった蛇の招待状だと吐き捨てるが、アルクサールは受けるほかに道はないと述べ、プリッシュは苛立ちを隠さず、拳で思い知らせてやると先を急ぐ。</p><p>ロウアージュノでバクージャジャは、脅して呼び戻しておきながら待たせるとはと憤り、プリッシュはシャドウロードを呼び出したうえで今度は何を企んでいるのか、自分にどんな役割を押しつけるつもりなのかと疑問を口にする。アルクサールはオークについて語り、サンドリアの民にとって長く苦い因縁の相手であり、冒険者になった頃の最初の任務の一つが、ロンフォールの森に野営する一団を討伐することだったと話す。記憶は曖昧だが、それでも確かに覚えていると言う。</p><p>やがてサレージャが姿を現し、よく来たと笑う。トラルの民にこれ以上エコーを差し向けずに済んでよかった、暁王も民が傷つくのは望まぬだろう、と白々しく言い放つ。アルクサールは戯れは終わりだと迫り、忌まわしいエコーでヴァナ・ディールの記憶を汚すことは許さないと断じるが、サレージャは冷たく「今日はお前を呼んだ覚えはない」と返す。そして第二の試練として、ジュノのグラン・ドゥシェの大公――カムラナートを紹介すると宣言する。プリッシュは即座に彼を見抜き、彼は一万年前のジラート最後の生き残りで、五つの種族がヴァナ・ディールに住む以前の時代の存在だと言い、今度ばかりは本当にまずいかもしれないと告げる。</p><p>あなたはその意味を測り、プリッシュは「この世界にもジラートのような古代の民がいたのか」と驚く。アルクサールは、確かカムラナートには兄がいたはずで、サレージャがそれを見落とすとは思えないと言う。カムラナートは鋭く反応するが、サレージャは「死んだ者の戯言だ」と切り捨てる。カムラナートはしばらくは乗ってやると言い、サレージャは第二の試練の幕が上がったと告げる。去り際にプリッシュが自分はエコーにすぎないのかと問うと、サレージャは「もう聞いた話だ」と突き放し、重荷を取り除いてやる、そしてエレクトロープへ戻してやると言う。混乱の中でバクージャジャが倒れ、サレージャは「石の山が子どもを装っているだけのものを守るとは」と嘲り、余計な邪魔が一つ減ったと告げ、完全な器――完全な支配者を作るため、全力を見せろと言い捨てる。カムラナートは、戦いにふさわしい場所で待つと言い残す。</p><p>試練を終えて戻ると、バクージャジャはあなたの無事に安堵しつつ、アルクサールがどこにいるのかと尋ねる。プリッシュも同じ問いを重ね、あなたがオメガとアルテマまで戦ったことに驚きながらも、あなたもアルクサールも無事だろうと言い聞かせる。そこへサレージャが現れ、「仲間が一人足りない」と嘲笑し、そもそも“命”など誇張ではないかと皮肉る。彼はエコーを打ち負かしたことを称え、あなたの戦いが次の選定に役立つ重要な知見を与えたと言う。すべては計画どおりで、彼女が強いほど最後に得られる支配者も強くなるのだと。</p><p>なぜそこまでするのかと問われると、サレージャは、あの茶番のような争いでは足りない、世界はやがて自分が真の支配者と並び立つにふさわしいと知るだろうと言い切る。バクージャジャのもう一つの頭は暴君と裏切り者になるだけだと止め、まだ引き返せると訴えるが、サレージャは鼻で笑う。バクージャジャが暁王たちは民に尽くし、許しも与えるはずだと言うと、サレージャは彼を罵り、ウクラマトとの絆は都合が生んだ幻想にすぎない、忠義など高潔な道ではなく、受祝福の兄弟の力を利用するための犬に過ぎないと言い放つ。バクージャジャが怒りで叫ぶと痛みに崩れ、サレージャは「守ろうとした報いだ」と笑い、あの“核”はもう長くないとも告げる。そして手紙の脅しを持ち出し、ヤクテル樹海の民を守りたいなら、自分の選定は続けさせてもらうと言い残して去る。後に残ったプリッシュは、自分にはあとどれだけ時間があるのかと震え、アルクサールは、自分たちが本当にエコーなら重い傷が存在そのものを消し去りかねないと言う。それでも、たとえ自分が実在しなくともヴァナ・ディールとその記憶への愛だけは本物だと語り、だから戦い続けるのだと。プリッシュも同意し、悩んでも前には進めない、自分はもう真実を知っていると言う。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 伝令役の勇連隊士 <small class="muted">(トライヨラ, X:16.2, Y:3.9)</small></div></div>`,

  },

    story:`<div class="clamp" data-collapsed="true"><p>Landsguard Messenger 找到你時，直說你來得正好：Yak T’el 的裂隙附近出現了不明野獸，還襲擊了守在那裡的哨兵。Bakool Ja Ja 認為那是異界的記憶所造出的 異界魔物，已經立刻趕過去；Landsguard Messenger 也提醒你，若再出現更多，對 Tuliyollal 將是巨大的威脅。他建議你先去 Mamook 找 Toraal Ja，從他那裡弄清楚 Bakool Ja Ja 的確切去向。</p><p>你到 Mamook 後，Toraal Ja 立刻帶你動身，說 Bakool Ja Ja 之前正追著那個 echo，位置在 Gok Draak Descent 北方一帶。等你們抵達，Bakool Ja Ja 說你錯過了「熱鬧」：那些東西甚至不等你們開口打招呼就先動手，而你們也不讓它們有機會道別就把它們放倒了。Prishe 和 Alxaal 也趕到現場，Alxaal 盯著倒地的敵人脫口而出：那是魔獸。Prishe 立刻說起它們像是襲擊過她家鄉的那批——極端兇殘，而且通常成群行動；Tavnazia 一直很難把它們擋回去。</p><p>你們在現場發現一封信，字跡是你們熟悉的筆法。落款是 Sareel Ja，他寫給「Dawnservant 的英雄」，說下一個挑戰的舞台已經就緒，邀你回到 Jeuno；若你拒絕，他就會把一大群異界魔物放到 Yak T’el——「選擇權在你」。Bakool Ja Ja 一眼就看穿那股惡意，說這條蛇從裡到外都腐爛透頂；但 Alxaal 也只能問：你們還能怎麼選？Prishe 則咬牙說走——越快回到 Jeuno，越快讓那混帳重新嚐嚐她的拳頭。</p><p>回到 Lower Jeuno，Bakool Ja Ja 氣得直罵：先放話威脅你們回來，然後又厚著臉皮讓你們乾等。Prishe 也忍不住想：光是召出 Shadow Lord 就已經夠糟了，這次他又在策劃什麼？她在這一切裡到底被安排了什麼角色？Alxaal 則提起魔獸與他家鄉 San d’Oria 的長久仇怨——他剛踏上冒險者之路時，其中一個最早的任務就是去 Ronfaure 附近的林地，剿滅一群紮營的魔獸；即使記憶仍有些模糊，這段因緣卻讓他無法忽視。</p><p>Sareel Ja 終於現身，笑著稱讚你們真配合，還假惺惺說幸好不用再把更多 echoes 放到 Tural 的人民身上，否則 Dawnservant 看到「親愛的人民」受害一定會不高興。Alxaal 直接要他停止把戲，說你們不會再容許他用這些令人作嘔的 echoes 去玷汙 Vana’diel 的記憶；可 Sareel Ja 卻反問 Alxaal：你今天來做什麼？他可不記得自己有要求他到場。隨後他宣告第二個挑戰開始，並介紹你們的對手，Kam’lanaut，Jeuno 的 Grand Duchy 的最高統治者Archduke；但 Prishe 立刻指出，他是「一萬年前的 Zilart 最後一人」，是在 Vana’diel 的五大種族出現之前就存在的古老存在。她坦白這聽起來荒唐，可你們這次可能真的有大麻煩。</p><p>你評估著這意味著什麼，而 Prishe 也注意到，你的世界似乎也有類似 Zilart 的古代存在。Alxaal 則說自己記得 Kam’lanaut 還有一個哥哥，Sareel Ja 不可能忽略這種細節；Kam’lanaut 聽到後立刻反問他怎麼會知道，Sareel Ja 卻要他別理會「死人的胡言亂語」。Kam’lanaut 乾脆表示先配合看看，而 Sareel Ja 也宣告第二個挑戰的帷幕已經拉開。Prishe 在他離開前硬是追問：她……她真的只是異界造物嗎？Sareel Ja 說這問題早就講過，只是她的心不願接受頭腦明白的事實，還假裝同情，說要替她減輕負擔，並把她「送回 electrope（一種具有龐大力量的特殊礦石）」。混亂間 Bakool Ja Ja 遭到重擊，Prishe 驚叫出聲；Sareel Ja 則嘲弄你們竟想當英雄去保護「那堆假裝成小孩的石頭」，並說 Bakool Ja Ja 被排除後，你在接下來的對決裡就少了一個分心點，要求你全力以赴，讓他打造出完美的容器，完美的統治者。Kam’lanaut 也丟下話：他會在更適合戰鬥的地方等你，最好別讓他久等。</p><p>當你完成那場戰鬥回來，Bakool Ja Ja 先是鬆了口氣，接著立刻追問：Prishe 很擔心你，可 Alxaal 人呢？Prishe 也迎上來，確認你平安無事，卻同樣急著問 Alxaal 是否出事；她聽到你連 Omega 和 Ultima 都打了，驚訝 Sareel Ja 這次毫不手軟，但仍努力相信你們都能撐過去。就在這時 Sareel Ja 再度現身，冷笑你們少了一個人，甚至嘲諷所謂「生命」也許只是誇張，反正你們本來就是異界魔物。他說你把異界魔物打得很漂亮，反而給了他關鍵的情報，能用在下一次的選擇上；一切都照計畫進行，因為「她」越強，最後完成的統治者就會越強。</p><p>Bakool Ja Ja 追問他為何要做到這種地步，Sareel Ja 只說你們值得更好的東西，那場競爭不過是笑話，而世界很快就會知道他有資格與真正的統治者並肩治理。Bakool Ja Ja the Mystic 斥他是想奪權的暴君與叛徒，勸他現在收手還來得及；Bakool Ja Ja 則說 Dawnservants 一直好好服務人民，甚至也會像原諒他一樣原諒 Sareel Ja。可 Sareel Ja 反過來羞辱 Bakool Ja Ja：他到底怎麼了？當年那個為王座而戰、堅信只有 Mamool Ja 才配統治的驕傲戰士去哪了？他說 Bakool Ja Ja 和 Wuk Lamat 的羈絆不過是方便之下產生的幻象；所謂忠誠也不是高尚之道，他只是她的走狗——用來利用受祝福的兄弟的力量。等她倒下，Bakool Ja Ja 只會變回街頭的雜種，跟過去一樣。Bakool Ja Ja 怒吼反駁卻因疼痛發作而踉蹌，Prishe 連忙要他別再撕裂傷口；Sareel Ja 反倒大笑，說這就是他逞英雄去保護「那東西」的報應，還補上一句：她的核心在和你們的 champion 交手時受了重創，已經撐不了多久。</p><p>Sareel Ja 接著提醒你們別忘了信裡的內容：他要放出異界魔物的大軍去襲擊 Yak T’el 的人民易如反掌；如果你們在乎他們的安危，那麼他的「選擇」就必須繼續。丟下這句話後，他說自己還有許多準備與考量，便轉身離去。Prishe 留在原地發抖，低聲問自己還剩多少時間；Alxaal 則說，如果 Sareel Ja 說的都是真的——而你們確實是異界魔物，那麼任何嚴重的傷勢都可能把你們從存在中抹去。即便如此，他仍說：就算自己不是真實的，他對 Vana’diel 以及那些記憶的愛是真實的，所以他會繼續戰鬥。Prishe 也點頭，說再怎麼擔心都不會改變什麼，她早就知道真相了。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 勇連隊傳令役 <small class="muted">(圖萊約拉, X:16.2, Y:3.9)</small></div></div>`,

};

const langToggle=document.getElementById('langToggle');
const pageTitle=document.getElementById('pageTitle');
const tabBtns=[...document.querySelectorAll('.tab-btn')];
const panels={
  story:document.getElementById('panel-story'),
  acq:document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments:document.getElementById('panel-comments')
};

function getLang(){return localStorage.getItem(LANG_KEY)||'EN';}
function applyLang(lang){
  const t=i18n[lang]||i18n.EN;
  pageTitle.textContent=t.pageTitle;
  langToggle.textContent=`🌐 ${t.langLabel}`;
  tabBtns.forEach(btn=>btn.textContent=t.tabs[btn.dataset.tab]);
  const active=tabBtns.find(b=>b.getAttribute('aria-selected')==='true')||tabBtns[0];
  renderPanel(active.dataset.tab,lang);
}
function wireClamp(panelEl,t){
  const clamp=panelEl.querySelector('.clamp');
  const btn=panelEl.querySelector('[data-role="expand"]');
  if(!clamp||!btn)return;
  function setLabel(){
    const collapsed=clamp.getAttribute('data-collapsed')!=='false';
    btn.textContent=collapsed?t.readMore:t.readLess;
  }
  setLabel();
  btn.addEventListener('click',()=>{
    const collapsed=clamp.getAttribute('data-collapsed')!=='false';
    clamp.setAttribute('data-collapsed',collapsed?'false':'true');
    setLabel();
  });
}
function renderPanel(key,lang){
  const t=i18n[lang]||i18n.EN;
  Object.keys(panels).forEach(k=>panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if(key!=='comments') panels[key].innerHTML=t[key];
  if(key==='story') wireClamp(panels[key],t);
  if(key==='comments') loadGiscusForCurrentLang();
}
tabBtns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab,getLang());
  });
});
langToggle.addEventListener('click',()=>{
  const cur=getLang();
  const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
  localStorage.setItem(LANG_KEY,next);
  applyLang(next);
});
applyLang(getLang());

const GISCUS_CFG={
  repo:'BELAUG-FFXIV/FFXIV_Library',
  repoId:'R_kgDOPyh4Kw',
  category:'General',
  categoryId:'DIC_kwDOPyh4K84CwPjL',
  theme:'preferred_color_scheme'
};
function uiLang(code){return code==='JP'?'ja':(code==='ZH'?'zh-TW':'en');}
function loadGiscusForCurrentLang(){
  const mount=document.getElementById('giscus_container');
  if(!mount)return;
  mount.innerHTML='';
  const langCode=getLang();
  const s=document.createElement('script');
  s.src='https://giscus.app/client.js';
  s.setAttribute('data-repo',GISCUS_CFG.repo);
  s.setAttribute('data-repo-id',GISCUS_CFG.repoId);
  s.setAttribute('data-category',GISCUS_CFG.category);
  s.setAttribute('data-category-id',GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping','specific');
  s.setAttribute('data-term',location.pathname+'｜'+langCode);
  s.setAttribute('data-reactions-enabled','1');
  s.setAttribute('data-emit-metadata','0');
  s.setAttribute('data-input-position','bottom');
  s.setAttribute('data-lang',uiLang(langCode));
  s.setAttribute('data-theme',GISCUS_CFG.theme);
  s.setAttribute('crossorigin','anonymous');
  s.async=true;
  mount.appendChild(s);
}
</script>
</body>
