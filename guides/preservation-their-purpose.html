<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`Preservation Their Purpose`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Back in the Backroom, Shale pulls you into the next step of the hunt: she’s going to reexamine old data—starting with Krile’s parents—because they were the first to leave Preservation and turn Oblivion into an organized resistance. If there’s anything that can narrow down Calyx’s hiding place, it has to be in the records of the people who broke away from him first.</p><p>Before you can even answer Shale, Sphene calls from the outskirts. She’s been making rounds and something feels “off.” The townspeople aren’t wailing or rioting—yet—but their behavior is strange enough that she wants your judgment. When you speak with them, the fear is everywhere: people are desperate for neo regulators, counting registrations as the number climbs, praying, bargaining, clinging to the promise that becoming Endless will keep death from reaching them.</p><p>Alisaie then urgently summons you to Resolution, where a city-wide public announcement is already underway—an eerie sermon on mortality and fear that unmistakably bears Calyx’s hand. In the crowd, the divide hardens: those with neo regulators insist this is the only path forward, while those without demand evacuation to Tuliyollal before the next tragedy strikes. Wuk Lamat tries to keep order and promises shelter, but Sphene is shaken—she wants to save Alexandria, yet she is no longer its queen.</p><p>In the aftermath, Wuk Lamat confides what drives her vow to protect Alexandria: she saw herself in the late queen—love for the people, fear of failing them, and the wish to have a friend who understood that weight. Sphene answers with a quiet truth: in the end, they both found the friend they needed. Before the moment can settle, Shale arrives with a breakthrough—an abandoned Preservation facility on Everkeep’s tenth level, flagged as a distribution center but untouched for decades. It may not be Calyx’s lair, but it could hold the trail she needs.</p><p>Inside the dark, stale research complex, Shale explains how they found it: the control code tied to the gate to the golden city carried a distinctive author signature, so she and Krile searched Everkeep’s door-control nodes for matching symbols until the hidden entrance revealed itself. With a Level 1 security card you find in a desk drawer, you can get past the first lock—but the director’s office demands Level 3 clearance, forcing you deeper.</p><p>In the first lab you search, the traces of Preservation feel disturbingly ordinary—notes, journals, routines—until the content turns: experiments refining aether extraction, devices that feed into a soul cell, a researcher writing with awe about “Master Calyx,” and the decision that everyone would undergo conversion. Using the numbers you uncover—especially the recorded maximum value—you open a locker and secure a Level 2 card, enough to reach the next corridor… until you hit another obstacle: the deuterolab has no power.</p><p>You divert to the facilities room and, with everyone calling out partial clues, you reconfigure the circuit path and restore backup power to the deuterolab. Before moving on, Krile asks Shale to open an old datalog—Preservation’s early history: Calyx founded the institute as a child prodigy, gained approval during the Storm Surge, shifted resources toward memory storage as casualties rose, and eventually preserved his own memories in a virtual domain. Sphene remembers meeting the boy behind the theories—frail, brilliant, and burning with a single-minded belief that “life should not be lost to the injustice of death.” Whatever he was then, what he is now cannot be allowed to decide Alexandria’s future.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Wuk Lamat <small class="muted">(Solution Nine, X:11.9, Y:5.9)</small></div></div>`,

      <div class="row"><a class="link" href="a-darkness-in-the-heart.html">A Darkness in the Heart</a></div>

  JP:{
    langLabel:'JP',
    pageTitle:'保存する者たち',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>バックルームに戻ると、シェールはカリュクスの潜伏先を割り出すため、新しい方針を口にする。手掛かりの起点に選んだのは、プリザベーションから最初に離反し、オブリビオンという「組織だった抵抗」を築いたクルルの両親の記録だ。最初に決別した者たちのデータにこそ、彼へ辿り着く糸口が残っているはずだと。</p><p>しかし、決断の言葉を返す間もなく、スフェーンからリンクパール越しに連絡が入る。アウトスカーツを巡回しているうちに、住民たちの様子に拭いきれない違和感を覚えたという。大声で泣き叫ぶわけでも、暴力が起きているわけでもない。それでも、恐怖と焦りが妙な形で滲んでいる――だからこそ、あなたの目で確かめてほしいと頼まれる。</p><p>住民に話を聞くと、その違和感は確信へ変わる。機械がいつ凶器に変わるか分からないという不安が、死の影を常に傍へ置いている。黒いレギュレーターの登録数を口にして落ち着こうとする者もいれば、祈りの言葉を繰り返し、理屈ではなく恐怖に縋る者もいる。永遠の命が「保証」されるという誘惑が、人々の心を急き立てていた。</p><p>そこへ今度は、アリゼーがレゾリューションへ急行するよう呼びかけてくる。到着すると、全域放送が市民の前で「死」を語り、恐怖を肯定し、果てなき生へと導くように囁いていた。発信源を聞かずとも分かる――カリュクスだ。黒いレギュレーターを持つ者は「進むべき道」と言い切り、持たぬ者は退避を求めて声を荒げる。ウクラマトは住民を落ち着かせ、トラル勇連隊の到着とトライヨラへの避難を約束するが、スフェーンは「助けたいのに、今の自分に何ができるのか」と言葉を失う。</p><p>混乱が少し収まった後、ウクラマトは胸の内を語る。かつての女王が守ろうとした国、その遺志をこれ以上汚させたくない。自分もまた、民の喜びを自分のもののように感じながら、守る力が足りず恐れた――だから同じ愛と恐れを分かち合える友を求めたのだ、と。スフェーンは静かに応える。結局、互いに必要としていた友を見つけたのだと。だが感傷に浸る暇はなく、シェールが「突破口」を携えて現れる。エバーキープ第十層に、長年流通拠点として偽装登録され、実際には何十年も稼働記録のないプリザベーションの研究施設が見つかったのだ。</p><p>施設の内部は暗く、空気は淀み、長い放置を物語っていた。シェールは、黄金の都市へ通じるゲートの制御コードに含まれていた特徴的な署名を手掛かりに、同じ印を持つ扉制御コードをエバーキープ中から探し出した経緯を説明する。あなたが机の引き出しで見つけたセキュリティカードで最初の扉は開くが、目的の部屋へはより高い権限が必要で、探索は続く。</p><p>研究室の痕跡は「普通」だった。残されたメモ、日誌、失くされたカード――だが内容は普通ではない。乙太の抽出効率、魂を収める装置へ接続された機器、そして「マスター・カリュクス」を讃え、いずれ皆が変換を受け入れることを当然のように書き残す研究者。手に入れた新たなカードで進もうとした矢先、次の区画は電力が落ちていたため、あなたたちは施設区画に回り、回路を組み替えて非常用電力を迂回させる。</p><p>電力復旧の直後、クルルは一つの古い記録の閲覧を求める。プリザベーションの創設は、天才児だったカリュクスが始め、ストームサージの最中に王国の承認と資金を得て、戦禍の拡大と死者の増加に伴い記憶保存の完成へ資源を傾けた――そしてやがて、自らの記憶を仮想領域へ保存した、と。スフェーンは幼い頃に会った彼を思い出す。重い病に蝕まれながらも、王家にまで届く理論を掲げ、「死の不条理に命を奪わせない」という意志を燃やしていた少年を。どんな過去があろうと、今の彼に未来を委ねるわけにはいかない――そうして、あなたたちは次の扉へ進む。</p><p class="muted">※研究施設内の各部屋名（英語表記）は、公式日本語表記を未確認のため本文では一般表現に留めています。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> ウクラマト <small class="muted">(ソリューション・ナイン, X:11.9, Y:5.9)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="a-darkness-in-the-heart.html">心を這うもの</a></div>
      <div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="a-calculated-evolution.html">進化の方程式</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'守護這一切的人們',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你回到 Backroom，Shale 說她得立刻回到追查 Calyx 藏身處的工作上。她想到一個新策略：從 Krile 父母的資料開始重新檢視，因為他們是第一批脫離 Preservation（由 Calyx 建立、規模龐大的研究機構／組織）並把 Oblivion（Alexandria 內負責巡邏、維安與危機應對的部隊）推成「有組織的抵抗力量」的人——那裡很可能藏著能縮小搜尋範圍的線索。</p><p>你還沒來得及回應，Sphene 就用通訊叫住你。她在 The Outskirts 走訪時，覺得居民的狀態「不太對勁」：不是嚎哭或暴動那麼明顯，但行為與情緒有種異樣的偏移。她希望你用更「見過世面」的視角判斷這是不是危險訊號，請你逐一和居民聊聊。</p><p>你聽到的答案讓人背脊發冷。機械隨時可能再度暴走，讓「死亡」變成陰影般的常駐存在；人們的恐懼被 neo regulator（新型調節器；註冊後可被宣稱「保證」成為 Endless 的裝置，名額上限五千）推向失控邊緣。有人以祈禱壓住不安，有人瘋狂追問是否還有剩餘名額，有人甚至把註冊數字當成救命倒數——彷彿只要自己能被「選上」，死亡就再也碰不到自己。</p><p>緊接著，Alisaie 要你立刻前往 Resolution（Solution Nine 政府區的地標／集會處）。你們趕到時，城市廣播正用冷酷而煽動的口吻，反覆強調肉體脆弱、死亡無可避免，並把恐懼包裝成「推動進化」的力量——不用問也知道是 Calyx 的手筆。現場的裂縫立刻擴大：已註冊的人宣稱這是唯一出路；沒有名額的人要求立刻撤離到 Tuliyollal。Wuk Lamat 承諾會接納避難者、Landsguard（Tuliyollal 的軍隊／維安力量）也正在趕來，但 Sphene 仍被現實刺痛——她想救 Alexandria，卻不再是「能一句話安定人心的女王」。</p><p>混亂稍歇後，Wuk Lamat 把她的誓言說得更清楚：她不願看著已故女王努力守護的和平樂土就此被恐懼玷污。她承認自己也曾害怕——世界裡想守護的東西太多，單靠一個人根本抱不住；所以她渴望有人能理解那份愛與恐懼，成為能並肩的朋友。Sphene 回應：到最後，你們確實都找到了需要的朋友。可情緒才剛落地，Shale 就帶來突破——她們在 Everkeep 第十層找到一處舊日 Preservation 研究設施「Containment Complex 10-29」（被偽裝登記為物資配送中心、實際上數十年沒有任何進出紀錄的研究區畫）。那裡未必是 Calyx 的巢穴，但很可能藏著能接上他行蹤的關鍵。</p><p>你們乘升降機進入設施。裡頭昏暗、空氣陳腐，像被時間封死。Shale 解釋她們如何定位此處：因為通往黃金城的門戶是 Preservation 建造，Krile 的耳環裡的控制碼便可能帶有「作者署名」；她們逐一比對 Everkeep 各扇門的控制碼，終於找出同樣符號並鎖定入口。你在桌抽裡翻到 Level 1 的安全卡，先打開第一道門，但要進「主管／所長辦公區」還需要更高權限，只能繼續搜尋。</p><p>在第一間實驗室裡，你看見的不是「冷血機械」式的邪惡，而是更令人不安的日常痕跡：研究日誌、數據筆記、以及把 Calyx 當成信仰般崇拜的文字。內容提到乙太抽取效率、裝置與 soul cell（用來盛放靈魂／記憶資料的容器）相連、甚至把「轉化為 Endless」寫成既定的升格流程。你用查到的數字解開置物櫃，取得 Level 2 安全卡，卻在下一區遇到斷電，只能轉往 Facilities 依照線索重新配置回路，把備援電力導回目標實驗區。</p><p>電力恢復後，Krile 要求先讀一份舊檔案：Preservation 的創立源自年僅十一歲的 Calyx——在 Storm Surge（Alexandria 過去的重大戰亂時期／事件）期間獲得官方批准與資金，以防禦研發起家，隨著戰事與死傷加劇，資源逐漸轉向記憶保存，最後甚至把他自己的記憶保存到虛擬領域。Sphene 也補上她的回憶：戰亂前她曾見過那個病弱卻耀眼的少年——口中反覆只有一個信念：生命不該被死亡的不公奪走。正因如此，不論他曾經是誰、曾經救過什麼，如今都不能再讓他塑造 Alexandria 的未來。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 烏克拉瑪特 <small class="muted">(Solution Nine, X:11.9, Y:5.9)</small></div></div>`,

    </div>`,

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
