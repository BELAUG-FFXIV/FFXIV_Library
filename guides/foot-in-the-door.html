<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Foot in the Door | BELAUG · FFXIV Library</title>
  <meta name="description" content="MSQ – Foot in the Door (ARR Patch 2.0)">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;
  overflow-y:auto;
  padding-right:8px;
  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left">
        <a class="home" href="../index.html">🏠 Home</a>
      </div>
      <div class="right">
        <button id="langToggle" class="icon-btn" aria-label="切換語言">English</button>
      </div>
    </nav>
  </header>

  <main class="container main">
    <div class="grid">
      <!-- 左：影片 -->
      <section class="card video-card">
        <div class="bd">
          <div class="video-wrap">
            <iframe id="ytFrame" src="https://www.youtube.com/embed/Hxrha14Q2U8"
              title="Foot in the Door" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <!-- 右：標題 + Tabs -->
      <section class="card">
        <div class="hd" id="pageTitle">Foot in the Door</div>
        <div class="tabs" role="tablist">
          <button class="tab-btn" role="tab" aria-selected="true"  data-tab="story">Story</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="acq">Acquisition</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="unlockq">Unlock Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="followq">Follow-Up Quest</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="comments">Comments</button>
        </div>
        <div class="bd">
          <div id="panel-story" class="tab-panel active scroll-panel"></div>
          <div id="panel-acq"     class="tab-panel"></div>
          <div id="panel-unlockq" class="tab-panel"></div>
          <div id="panel-followq" class="tab-panel"></div>
          <div id="panel-comments" class="tab-panel">
            <div id="giscus_container" style="min-height:320px;"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

<script>
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Foot in the Door',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Gisilbehrt watches you without surprise when you make it clear you won’t turn back. If you’re determined to press on, he says, then you should at least do it with your eyes open. You won’t get far in Little Ala Mhigo without the Ala Mhigans’ trust—and trust here isn’t bought with coin the way it is in Ul’dah. What binds these people is something harder and stronger: a shared purpose, the liberation of their homeland from the Garleans.</p>
      <p>If you want them to listen, you’ll need someone they respect to vouch for you. Gisilbehrt points you back to the man who rejected you—Gundobald is part of the Ala Mhigan Resistance, which means the best advocate will be someone from the same cause, someone whose name carries weight among the refugees. If you know anyone well connected, he advises, start there. Find the right voice, and the door that slammed in your face might open—just enough for you to step through.</p>
      <p>With that, you turn away from the dust and suspicion of Southern Thanalan and return to the Waking Sands, carrying the same question but now with a clearer problem: not where to search next, but how to be allowed to search at all. Thancred is there, and when you approach, he cuts off any concern before it can settle. You needn’t worry about him, he says. His own investigation has produced some curious results, and for the moment he is weighing how best to proceed.</p>
      <p>In the solar, Minfilia receives you with calm warmth and asks how the investigation fares. When you tell her what you found in Little Ala Mhigo—the hostility, the closed ranks, the way trust seems impossible—she doesn’t sound offended or surprised. Given all they have suffered, she says, it is little wonder the Ala Mhigan refugees have lost faith in their fellow man.</p>
      <p>She speaks of what has been taken from them: their homeland, seized and held for the past two decades, always out of reach and always under the enemy’s grasp. And even beyond the occupation, there is the slow cruelty of displacement. None of the three city–states can take in all who were driven out, and so many Ala Mhigans have been forced to the margins—left to poverty, and to discrimination that hardens into daily life.</p>
      <p>Minfilia sighs, wishing more could be done to ease their hardships, yet admitting she fears nothing short of reclaiming their homeland would ever be a lasting solution. But she reins herself back to the present. One problem at a time, she says—and for your immediate problem, she has an answer. There is an Ala Mhigan native among the Scions. If what you need is someone who can speak to them as one of their own, then she will be pleased to introduce him to you.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Gisilbehrt <small class="muted">Southern Thanalan (X:17.8, Y:13.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="tea-for-three.html">Tea for Three</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 25 or above)</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="meeting-with-the-resistance.html">Meeting with the Resistance</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'そこに故郷の形見はあるか',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ジジルベルトは、あなたが引き下がるつもりがないことを見て取ると、ため息まじりに助言をくれる。調査を続けるなら、覚えておけ――この先はアラミゴの者たちの信頼なしには進めない。ウルダハでは金が物を言うが、ここで彼らを縛るのはそれより強いものだ。目に見えなくとも確かな「共通の目的」――ガレマール帝国から故郷を解放すること、その一点だと。</p>
      <p>だから信頼を得る最良の方法は、彼らが敬う同胞にあなたを保証してもらうことだ、とジジルベルトは言う。グンドバルドはアラミゴ解放軍に属している。ならば狙うべきは同じ志を持つ仲間の言葉であり、彼らの間で通る名を持つ者だ。心当たりのある顔の広い人物がいるなら、まずはその人物に頼れ――そう言われ、あなたは次の一手を「足で探す」だけでは足りないのだと悟る。</p>
      <p>あなたは南ザナラーンの乾いた空気を背にし、砂の家へ戻る。追うべき影は変わらないが、今は別の壁が立ちはだかっている――手がかりを探す以前に、探すことを許されなければならない。そこでサンクレッドに声をかけると、彼はあなたの気遣いを先回りして制する。自分の身を案じる必要はない、と。彼の調査は興味深い結果を得ており、いまは次にどう動くべきか思案しているところだという。</p>
      <p>応接室でミンフィリアはあなたを迎え、調査の進捗を尋ねる。リトルアラミゴでの反応を伝えると、彼女は責めるでも驚くでもなく、静かに頷く。彼らが受けてきた苦しみを思えば、同胞以外を信じられなくなったとしても不思議ではない、と。</p>
      <p>ミンフィリアは、彼らが失ったものを語る。故郷は奪われ、二十年にわたり敵の手に握られ続けている。さらに、追われた者すべてを受け入れる余力は三都市にはなく、その結果、多くのアラミゴの者たちは社会の周縁で生きることを強いられ、貧困と差別にさらされているのだという。</p>
      <p>彼女はため息をつき、もっと苦難を和らげる手立てがあればと願いながらも、結局は故郷を取り戻す以外に恒久的な解決はないのかもしれないと口にする。だが今は一つずつ問題を片付けよう、と彼女は話を戻す。そして調査に関しては心強いことがある――暁の血盟の中に、アラミゴ出身者がいるのだ。必要なら、喜んであなたに紹介しよう、と。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ギシルベールト少闘佐　<small class="muted">南ザナラーン (X:17.8, Y:13.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="tea-for-three.html">よそ者たちの奮闘</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 25～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="meeting-with-the-resistance.html">アラミゴ解放軍を知る者</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'故鄉之土重於金',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>你表明自己仍要繼續追查後，Gisilbehrt 便收起繞圈的話，給了你一個更現實的提醒：沒有 Ala Mhigans 的信任，你不可能在 Little Ala Mhigo 走得更遠。Ul’dah 也許是 coin 說了算，但 Ala Mhigans 被更強、也更無形的東西綁在一起——一個共同的目的：把他們的家鄉從 Garleans 手中解放出來。</p>
      <p>所以，想贏得信任，最好的辦法不是說服每一張冷漠的臉，而是找到一位他們尊敬的「自己人」替你背書。Gisilbehrt 指向 Gundobald，說他屬於 Ala Mhigan Resistance；也因此，你最該找的是同一個陣營、同一個目的底下的人。若你認識任何 well-connected 的人，就從那裡開始——先讓「對的人」開口，你才有機會讓這群人願意聽你把話說完。</p>
      <p>你離開 Southern Thanalan 的風沙，回到 The Waking Sands。你要追的 masked man 沒有改變，但現在你更清楚擋在前面的難題是什麼：在你能繼續找線索之前，你得先被允許去找。Thancred 在那裡，你一靠近，他便先一步要你別擔心他的安危。他說自己的調查已經有了一些 curious results，而他此刻正在思考接下來該怎麼做。</p>
      <p>進到 The Solar，Minfilia 迎接你，並問你的調查進展如何。當你把 Little Ala Mhigo 的冷淡與排斥說出來，她沒有責備，也沒有意外，只是平靜地指出：在他們經歷了那麼多之後，Ala Mhigan refugees 失去對他人的信任，並不令人驚訝。</p>
      <p>她提起他們被奪走的家園——過去二十年來，那片土地一直在敵人的掌握之中；而流離失所之後，殘酷並沒有結束。三個 city–states 都沒有能力收容所有被迫離開的人，於是大量 Ala Mhigans 被擠到社會邊緣，承受貧困與歧視，日復一日地被磨耗。</p>
      <p>Minfilia 嘆息著說，她希望能做得更多來減輕他們的苦難，但她也擔心：除非奪回家鄉，否則不會有真正長久的解決之道。可她很快收住情緒，提醒自己也提醒你——先一個問題一個問題處理。回到你眼前的難題，她其實正好有一個方向：Scions 之中有一位 Ala Mhigan native。若你需要一個能以「同胞」身分開口的人，她很樂意把那位同伴介紹給你。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 吉希爾貝爾特　<small class="muted">　南薩納蘭 (X:17.8, Y:13.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="tea-for-three.html">外來者的奮鬥</a></div>
      <div class="row">所有職業（不含限定職） 等級 25 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="meeting-with-the-resistance.html">阿拉米格解放軍</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
