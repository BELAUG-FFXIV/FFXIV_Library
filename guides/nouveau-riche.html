    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>When you next speak with Buscarron at Buscarron’s Druthers, he looks relieved to see you yet troubled by his own thoughts. He reminds you of his earlier suspicion that someone might be aiding the Garleans from within, then quietly admits he believes he has a likely culprit. There is a regular who once lived on thin soup and slowly nursed a single pint because he could not afford more, but of late the same man has been ordering the best wines and finest cuts of meat the tavern can provide. Were he a merchant, Buscarron would think little of it, but this particular regular is a Wood Wailer—and Wood Wailers do not earn that kind of coin. The timing gnaws at him: he was wondering where the money came from when you first told him about the Garleans in the forest, and he could not help but put two and two together. If a Wailer is taking imperial coin, he says, then none in Gridania are truly safe. The man’s name is Laurentius, last seen somewhere in the South Shroud. Buscarron asks you to seek him out and, if he is indeed up to no good, to put an end to his treachery—by force, if it comes to that.</p>
      <p>You track Laurentius down in the Upper Paths of the South Shroud, where he stalks the forest in the name of the Wailers. When you approach, he brushes you off with cold impatience, insisting he is on patrol and telling you to take any business with the Wailers to the Barracks instead. Later, as you shadow his route, you catch him speaking to himself in a low, bitter voice. He mutters that it will not be long now, marveling at the price fetched by simple patrol routes and rations, and claiming it is no more than he deserves. It is little wonder the Empire has risen so high, he says, if they pay men their worth—unlike the Wailers. Your presence does not go unnoticed for long. The moment Laurentius realizes you have overheard him, he startles, stammers half-formed questions about how much you have heard, then abruptly turns and cries out for help, pretending to be under attack. You sense a hostile presence closing in around you as armed foes rush from the shadows, and you are forced to fight for your life before Laurentius’s false alarm can become your undoing.</p>
      <p>Even after you cut your way through the ambush and confront Laurentius again, he tries to squirm free with desperate lies. He gasps that he knows nothing, claims he was only on patrol, and insists that the man who appeared must have been some stranger—he even dares to blame you, saying he thought you were working for the Garleans. But when you refuse to back down and keep pressing him, he finally snaps, demanding to know how long you mean to hound him and what you imagine he has done. The anger drains out of him all at once, leaving only resignation. It is over, he says. He confesses that he sold maps and rations to the Empire, all for coin. He speaks of how proud he once was to join the Wailers, who preach justice, honor, and duty, but laments that in the end it is only those with money who live as they wish. He sought to change his own lot, he admits, even at the cost of endangering his home, his loved ones, and now you as well. Yet as he speaks, his tone twists again into something darker, and he lets out a strained laugh. Did you truly think you had cornered him? It is not he who is trapped.</p>
      <p>On his shout, Garlean soldiers step from the trees, summoned to claim the “Hyur bastard” he has brought them. Their commander addresses you with cold contempt, asking whether all adventurers are so deluded as to think they can stand against Garlemald’s power. To challenge such might would require a mountain of gil, he says—the same kind of cost needed to build power, or to reshape it, as they intend to remake Gridania itself. One of the Redbelly bandits spits at Laurentius, cursing him for trading his hard bunk at the Barracks for a feather bed in Garlemald. Yet not all the rough folk here stand with the Empire. Another voice calls out to you, pointing out that you stand here at “ol’ Busc’s” wish—and that means you do not stand alone. Thieves and poachers who owe Buscarron a debt of respect draw steel at your side, and together you face down the Garlean contingent led by Legless. In the pitched battle that follows, you and your unlikely allies manage to bring the Empire’s chosen warriors low, forcing the survivors to flee and leaving the forest quiet once more.</p>
      <p>In the aftermath, Laurentius can only stare at the fallen, unable to understand how you managed to defeat what he calls the Empire’s finest with bandits and poachers at your side. They are meant to be your sworn enemies, he protests—why would they fight for you instead of against you? But the answer, he quickly realizes, lies with Buscarron. The tavernkeeper’s words have a way of moving men to action, he says, and clearly they stirred these rough souls more deeply than any imperial bribe ever moved him. Ashamed, he asks what he has become, and what he has done. At last, Laurentius breaks. He vows to abandon this folly, to accept no more lies and no more bribes, and to go straight to the Order of the Twin Adder to confess his crimes. Before he leaves, he asks one favor of you: tell Buscarron that Laurentius the fool says “thank you.” It feels, he says, as though a veil has been lifted from before his eyes.</p>
      <p>When you return to Buscarron’s Druthers, Buscarron already has word from the Adders’ Nest. Laurentius came of his own will, he says, and confessed everything. With a weary sigh, Buscarron tells you more of the lad’s life: how his mother was slain by a brigand when he was still small, and how, as a young man, he joined the Wood Wailers in the hopes of sparing other Gridanians the misery he himself had known. Protecting Gridania, however, is too great a burden for any one man, and over time Laurentius came to believe that he could not make a difference—that it was hopeless. Desperation is a dangerous thing, Buscarron remarks, for a man lost in the dark is easily drawn to the glimmer of coin. Laurentius likely told himself that if he could not change the lot of his fellow men, he might as well change his own. Yet all the while, he was making a difference—just not alone. He failed to grasp the simple truth that the things none of us can do alone, we must do together. When you relay Laurentius’s thanks, Buscarron allows himself a small smile, saying there is good in the lad yet and hoping the Adders will grant him a chance to make amends, even if forgiveness will not come easily. Then, leaving the rest to the judgment of the Twelve, he turns to you with fresh tidings: the sylph elder has been found.</p>
    </div>

  JP:{

    pageTitle:'犯人をとっちめろ！',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>「バスカロンズ・ドランカー」に顔を出したあなたに、バスカロンは安堵と悩ましげな色の混じる表情で声をかける。以前、ガレマール帝国に内通する裏切り者がいるかもしれないと話していたことを覚えているか、と切り出し、どうやら心当たりができたのだと打ち明けるのだ。かつて、ある常連客は、ろくに金もなく、薄いスープをすすりながら、ビールも一杯を大事に大事に飲んでいた。ところが最近になって、その男は急に羽振りがよくなり、店でいちばん上等なワインと、仕入れられるかぎりの極上の肉を注文するようになったという。商人であれば気にも留めないが、その男はウッドワイラーの一員であり、そんな大金を稼げるはずがない。ちょうど金の出どころを訝しんでいたところに、あなたから森でのガレアン目撃の話を聞き、バスカロンは二つの出来事を結び付けずにはいられなかった。もしウッドワイラーの誰かが帝国の手先になっているのだとしたら、グリダニアの誰ひとりとして安全ではいられない。彼は、その男がロレンティスという名の隊士であり、最近はサウス・シュラウドで見かけられたと教えると、あなたに彼の行方を追ってほしいと願う。もし本当に企みを抱いているのなら、その悪事を止めてくれ、必要とあらば力ずくでも──と。</p>
      <p>あなたはサウス・シュラウド上層の森を進み、ウッドワイラーとして巡回中のロレンティスを見つけ出す。声をかけても、彼は苛立たしげに「巡回中だ」と言ってあなたを追い払おうとし、用があるなら兵舎へ行けと冷たく言い放つ。その後もあなたは彼の行動を見張り続け、やがて、彼がひとりごとのようにこぼす言葉を耳にする。「もうすぐだ……巡回経路や配給品の情報ごときで、これほどの金になるとはな」──そんな愚痴混じりの独白は、自分はそれだけの報酬を受けるに値するのだという歪んだ自負と、男たちに正当な対価を払う帝国のやり方を称える言葉へと続く。ウッドワイラーはそんなふうに兵を遇しない、と。やがて、あなたの存在に気づいたロレンティスは顔色を変え、どこまで聞いていたのかと狼狽しながら言葉を詰まらせると、突然「助けてくれ！」と叫びだす。自分は襲われているのだと周囲に訴え、仲間を呼び寄せようとするのだ。あなたは、森の中に潜んでいた敵意の気配が一気に近づいてくるのを感じ取り、ロレンティスの偽りの叫び声が、本当に命取りにならぬよう、迫り来る敵を迎え撃つことになる。</p>
      <p>襲いかかってきた者たちを退けてなお、ロレンティスは必死に言い逃れようとする。「どうしてこんなことに……？」と震えながら、巡回していただけで、突然現れた相手に襲われたのだと主張し、あなたのほうこそガレアンの手先かと思ったとまで言い出す。しかしあなたが引き下がらず、真相を求めて問い詰め続けると、ついに彼は堪えきれずに叫ぶ。いつまで自分を疑うつもりなのか、何をしたと決めつけているのか、と。そして、観念したように肩を落とし、「もう終わりだ」と呟く。彼は、自分が地図や配給品の情報を帝国に売り渡していたことを認め、それがすべて金のためだったと白状する。正義や名誉、義務を掲げるウッドワイラーに入隊できたことを誇りに思っていたが、結局、思うままに生きているのは金を持つ者たちであり、報われぬ自分に嫌気がさしていたのだと。そして、運命を変えようと機会を求め、その手をつかんだ結果、自分自身だけでなく、故郷や愛する者たち、さらにはあなたの命までも危険にさらしてしまったと認める。だが、彼の口調は次第に歪み、引きつった笑いを漏らす。自分を追い詰めたつもりかもしれないが、窮地にあるのは自分ではないのだと。</p>
      <p>ロレンティスの叫びに応えるように、森の木々の間からガレマール帝国兵が姿を現す。「ヒューランの奴を連れてきたぞ」と彼は声高に告げ、あなたを差し出す。指揮官は冷ややかな瞳であなたを見据え、問う。冒険者とは、ガレマール帝国の力に立ち向かえると本気で信じている、これほどまでに夢見がちな存在なのかと。かかる強大な力に抗うには、山のようなギルが必要だと彼は嘲り、その費用は強大な力を築き上げるためにも、あるいはグリダニアを作り替えるためにも等しく必要になるのだと宣言する。彼らの側についた盗賊のひとりは、ロレンティスに唾を吐きかけ、兵舎の固い寝台を捨てて、ガレマールで羽毛の寝床を選んだのかと罵る。しかし、ならず者たちのすべてが帝国の味方というわけではなかった。「お前さんはバスカロンの頼みでここに立っているんだろう？　だったらひとりじゃねえ」と別の男が声を上げ、バスカロンに恩義を感じる盗賊や密猟者たちが、あなたの隣で武器を抜く。こうして、レグレス率いる帝国の精鋭と、それに立ち向かうあなたとならず者たちとの戦いが幕を開ける。激しい戦闘の末、あなたたちはなんとか帝国兵たちを打ち倒し、生き残った者たちを撤退へと追い込むのだった。</p>
      <p>戦いの後、ロレンティスは呆然と立ち尽くし、目の前の光景が信じられないといった様子であなたを見つめる。帝国の精鋭を打ち破っただけでなく、その手助けをしたのが本来は敵対しているはずの盗賊や密猟者たちであることに、彼は激しく動揺する。なぜ彼らがあなたの味方として戦い、矛先を向けなかったのか──その答えを、彼はすぐに悟る。すべてはバスカロンの影響だ、と。酒場の主人の言葉は人の心を動かし、自分よりもはるかにまっとうな行動を取らせる力を持っているのだと。そう気づいた途端、彼は自分がどれほど堕ちてしまったのかを思い知らされる。「自分は何になってしまったのか、何をしてしまったのか」とうめきながら、ついにロレンティスは折れる。これ以上の愚行はやめる、もう嘘も賄賂も受け取らないと誓い、双蛇党に出向いて自ら罪を告白すると宣言するのだ。去り際、彼はひとつ頼みごとをする。バスカロンに、「愚か者ロレンティスが礼を言っていた」と伝えてほしいと。まるで目の前の幕が取り払われたように、ようやく真実が見えるようになったのだと、彼は静かに言い残す。</p>
      <p>やがて「バスカロンズ・ドランカー」に戻ると、バスカロンはすでに双蛇党から知らせを受けていた。ロレンティスが自らアダー隊本部へ出頭し、すべてを打ち明けたのだという。バスカロンは小さく息を吐き、彼の過去を語り始める。まだ幼いころ、彼の母親は盗賊に殺され、その悲しみを胸に抱いて育ったこと。やがて若者となったロレンティスは、自分と同じ苦しみを味わうグリダニアの民を減らしたいと願い、ウッドワイラーに志願したのだと。しかし、グリダニアを守るという使命は、ひとりの人間にはあまりにも重い。いつしか彼は、自分ひとりが動いたところで何も変えられない、すべては無力なのだと思い込むようになってしまった。絶望ほど危ういものはない、とバスカロンは言う。闇の中で道を見失った人間は、金貨のきらめきにすがりつきやすい。仲間たちの運命を変えられないのなら、せめて自分の運命だけでも変えようと、ロレンティスは帝国の金に手を伸ばしてしまったのだろう。しかし本当は、彼もまた違いを生み出していたのだとバスカロンは続ける。ただし、自分ひとりの力ではなく、仲間たちと共に。人はひとりでは成し得ないことを、共に手を取り合ってこそ成し遂げられる──その当たり前の真理を、彼は理解しきれていなかったのだと。あなたからロレンティスの「ありがとう」の言葉を聞かされると、バスカロンはわずかに口元を緩め、「まだあいつの中にも善きものが残っている」と呟く。罪を贖う機会を、双蛇党の連中にも与えてやってほしいものだとなおも願いつつ、赦しが容易でないことも承知している、と肩をすくめる。最後に、彼は「あとは十二神に委ねるさ」と話を締めくくり、表情を引き締めて新たな知らせを告げる。行方不明だったシルフ族の長老が、ついに発見されたのだと。</p>

    story:`<div class="clamp" data-collapsed="true">
      <p>當你再次在 Buscarron’s Druthers 找到 Buscarron 時，他看見你固然放心，眉宇間卻仍帶著揮之不去的沉重。他先提起先前說過的那件事──他懷疑有人在暗中替 Garleans 做事──接著坦白，自己如今大概有了鎖定的對象。有一位常來光顧的客人，過去總是點一碗清得不能再清的湯，再小口小口啜著唯一的一杯酒，只因口袋空空，負擔不起更多。可最近，同一個人卻開始大手筆點最好的酒、最上等的肉，好像突然發了財一樣。若他是商人，Buscarron 也許不會在意，但偏偏這人是 Wood Wailer。Wood Wailers 可領不到那種程度的薪水。更巧的是，Buscarron 正好在思索這筆錢從哪裡來時，你便帶回了「Garleans 出現在森林裡」的消息，讓他很難不把二者聯想在一起。如果有 Wailer 接受帝國的錢為其賣命，那麼整個 Gridania 沒有人能說自己真是安全的。那個人名叫 Laurentius，最近出現在 South Shroud 一帶。Buscarron 請你去將他找出來，若真是在幹壞事，就把這條路徹底斬斷──必要時，就算得親手把他攔下也在所不惜。</p>
      <p>你沿著 South Shroud 上層的小徑前行，很快在樹影間找到正在巡邏的 Laurentius。當你上前攔住他時，他不耐煩地皺起眉，冷冷說自己正執行巡邏任務，叫你有事去 Barracks 找 Wailers，不要來礙事。你沒有因此罷休，而是遠遠跟在他之後，觀察他的動向。沒過多久，你便聽見他低聲喃喃自語，語氣裡滿是扭曲的滿足與怨懟。他說「快了」，嘖嘖稱奇於巡邏路線與配給品這種東西居然能賣出好價錢，又說那不過是他應得的報酬。像 Empire 這樣肯付錢的勢力，難怪能崛起到那種高度，反倒是 Wailers 不肯真正付出應有的對價。沒多久，他察覺你一直在旁，臉色驟變，一連串「你─你聽到了什麼」、「從什麼時候開始在那裡」的結巴話語還沒說完，便突然轉身大喊求救，假裝自己遭到襲擊，呼喊同伴快來相助。你立刻感到周遭潛伏的敵意向你逼近，樹叢間傳來武裝敵人的腳步與殺意，只好在 Laurentius 的謊言引來真正危機之前，先迎上前方湧來的攻擊。</p>
      <p>在將伏擊你的敵人擊退之後，你再次逼近 Laurentius，他仍企圖以謊言掙脫。他結結巴巴地說自己什麼都不知道，只是在巡邏時遇上「突然冒出來的人」，甚至反過來指控，他原以為你才是替 Garleans 做事的一方。然而你沒有被這些話動搖，依舊緊追不放，一步步將他逼向真相。終於，他忍耐不住，朝你吼問你到底想把這場鬧劇拖到什麼時候、究竟認定他犯了什麼罪。怒氣在瞬間消散，只剩下徹底的洩氣。他承認，一切都結束了。賣給 Empire 的地圖與口糧是他提供的，一切都是為了錢。他提起自己當初加入 Wailers 時有多自豪，那個時候他相信「正義、榮耀與責任」的口號，可到頭來，真正能隨心所欲生活的，仍然是手握金錢的人。於是他開始尋找改變命運的機會，一旦抓住，便心甘情願地踏進這條路，把自己、故鄉、所愛的一切，甚至連你的性命，都推上危險的邊緣。說到最後，他的語氣再次扭曲，露出近乎瘋狂的笑意。你以為自己把他逼到絕境了嗎？真正被困住的，根本不是他。</p>
      <p>隨著他的高喊，潛伏在森林中的 Garleans 現身，回應他「我把那個 Hyur 帶來了」的邀功叫喚。帶隊的 Garlean 軍官滿懷鄙視地打量著你，反問所有冒險者是否都這樣天真，以為自己能向 Garlemald 的力量挑戰。要對抗這樣的強權，需要的是一座山那麼多的 gil，他冷冷地說；那種規模的代價，不論是用來對抗大國，還是用來建立、乃至於「重塑」權力都一樣──而他們打算重寫的，正是 Gridania 的命運。站在帝國一邊的某個 Redbelly 盜賊朝 Laurentius 啐了一口，嘲笑他捨棄 Barracks 又硬又冷的鋪位，改去 Garlemald 睡柔軟的羽絨床。但在這片灰暗的森林裡，並不是所有盜賊與偷獵者都願意把背脊轉向 Buscarron。一道聲音喊向你，說你會站在這裡，是因為「老 Busc」開了口──既然如此，你就不會是孤身一人。對 Buscarron 心懷情義的無賴與偷獵者紛紛拔出武器，與你並肩而立。於是，你與這群意想不到的同伴一同迎戰由 Legless 領軍的帝國精銳，經歷一場激烈的死鬥後，終於將他們擊潰，迫使倖存者狼狽撤退，讓黑衣森林重新恢復寂靜。</p>
      <p>戰鬥落幕後，Laurentius 只能呆呆地望著這一切，難以置信你居然能在「帝國精銳」手中全身而退，更難以接受幫助你的人居然是平時被視為死敵的盜賊與偷獵者。他不斷喃喃自語，這些人明明才是你的 sworn enemies，為什麼會為你而戰、而不是對你揮刀？然而答案，他其實很清楚──全都出在 Buscarron 身上。那個酒館老闆的言語，總是能讓人想要行動，能讓比他更好的人做出比他更正直的選擇。想到這裡，Laurentius 終於正視自己究竟變成了什麼樣子，又做下了什麼。最終，他徹底垮下來，說自己不會再繼續這場愚行，不再收受賄賂、不再說謊，打算親自前往 Order of the Twin Adder，向上級坦承所有罪行。臨走前，他只拜託你一件事情：替他轉告 Buscarron，說「笨蛋 Laurentius 在這裡向他道謝」。他說，如今自己彷彿眼前的迷霧被掀開，終於看清楚了原本應該看到的東西。</p>
      <p>當你回到 Buscarron’s Druthers 時，Buscarron 已經從 Adders’ Nest 收到消息。Laurentius 親自走進去，將一切原原本本交代清楚。Buscarron 輕嘆一聲，緩緩說起這小子過去的故事：Laurentius 年紀還小的時候，母親就被 brigand 殺害，自那之後，他懷著這份傷痛長大。等他長成青年，便懷著「不想讓其他 Gridania 的人再經歷同樣痛苦」的念頭加入 Wailers。只是，要保護整個 Gridania 對一個人來說實在太沉重。時間一久，他漸漸說服自己「自己一個人做不了什麼」、「一切都無可奈何」。Buscarron 說，絕望是最危險的東西之一；在黑暗中迷失的人，很容易被錢幣的光芒所吸引。Laurentius 或許是想，如果改變不了眾人的命運，那至少要改變自己的命運，於是伸手去接過 Empire 的錢。但事實上，他本來就正在帶來改變，只不是他一個人在做，而是與他人一起完成的。Laurentius 沒能真正理解的是那句簡單的道理──那些一個人辦不到的事，只能靠大家一起完成。當你轉述 Laurentius 的「謝謝」時，Buscarron 的嘴角微微揚起，說明那孩子心裡還是有光的。他希望 Adders’ Nest 那些人也能看見這一點，給他一個贖罪的機會，儘管要原諒他所做的一切並不容易。最後，他把 Laurentius 的前途交給 Twelve 去裁決，轉而對你提起另一則消息：失蹤已久的 sylph elder，已經被找到了。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
