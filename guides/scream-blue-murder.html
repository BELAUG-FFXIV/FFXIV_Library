const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`Scream Blue Murder`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>After you master Faze and return, Martyn tells you that your training must wait because he has other business to attend to. That alone is enough to draw Royse’s suspicion. She has already seen too much of his recent trouble with debt collectors, and she no longer believes his excuses can be brushed aside. If Martyn is mixed up in something that could stain the name of the Celestium, she means to find out what it is. With Latool Ja offering little more than the unsettling observation that Martyn keeps many secrets, you set out with Royse to follow him and uncover the truth.</p><p>The trail first leads through Ul’dah, where Royse catches sight of Martyn slipping into the Alchemists’ Guild in clothing deliberately chosen to avoid notice—most notably because it is not blue. His secrecy only deepens her concern. She wonders whether he might be seeking medicine, but even that explanation does not quite satisfy her. From there, you follow him farther out to Hammerlea, where he waits in uneasy silence until a pair of shady figures appears. The exchange is brief and tense: money first, then the goods. When Martyn complains that the price keeps rising while the packets grow smaller, the truth of the matter begins to surface. He has been buying dream flowers through dangerous back-alley dealers.</p><p>Royse reacts at once, and in doing so gives away your presence. The smugglers turn on you without hesitation, forcing you into a fight before Martyn can explain anything. Once the attackers are dealt with, Royse rounds on him in fury. To her, dream flowers mean somnus, and somnus means ruin. She demands to know whether he has been making the drug to sell it or feeding an addiction of his own. Faced with the collapse of everything he has been trying to hide, Martyn finally speaks plainly. The dream flowers are not for somnus. They are for medicine.</p><p>What follows is the first full truth Martyn has allowed himself to say aloud. An epidemic is spreading among the Whalaqee, likely carried from Eorzea by visitors like himself. To Eorzeans it would be little worse than a cold, but for the Whalaqee it is life-threatening, and the illness is spreading too fast for traditional treatments to contain. Unable to bear the thought that he may share the blame, Martyn has thrown himself into finding a cure based on a friend’s research notes. He has nearly ruined himself in the process, but at last he has devised a concoction that seems to work. The problem is scale: a few doses are not enough, and the chief ingredient—dream flowers—is rare and painfully expensive.</p><p>Once Royse understands, her anger turns in another direction. Instead of casting Martyn aside, she decides he will remain at the Celestium, perform more often, and use those earnings to continue supporting the medicine. She also promises to help secure dream flowers through safer channels. Martyn, overwhelmed by relief, can only agree. Afterward, he turns back to your path as a blue mage. He admits that your clash with the dream flower dealers was probably a better test than anything he could have arranged himself, and he gives you your next goal: learn 1000 Needles. With his own time now consumed by performance after performance, more of your training will have to be done alone, guided by your spellbook and the beasts of the wild. And as Latool Ja watches Martyn drive himself harder and harder in the arena, worry begins to settle in alongside admiration.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Martyn <small class="muted">(Ul’dah - Steps of Thal, X:12.5, Y:13.0)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="why-they-call-it-the-blues.html">Why They Call It the Blues</a></div><div class="row">BLU Lv. 30</div><div class="row"><b>Required Action</b> Faze</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="blue-gold.html">Blue Gold</a></div></div>`

  JP:{
    langLabel:'日本語',
    pageTitle:'青雲の志',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>フェーズを修得して戻ったあなたに、マーティンはしばらく訓練を待ってほしいと告げる。片づけなければならない用事があるというのだが、その曖昧な言い方は、かえってロイズの疑いを深めることになる。借金取りとの一件を見てしまった以上、彼女はもう、彼のごまかしをそのまま信じるつもりはなかった。セレスティウムの評判に傷がつくようなことにマーティンが関わっているのなら、自分には知る権利がある――そう言い切ったロイズは、秘密が多いとしか言えないラトージャの言葉を手がかりに、あなたとともに彼のあとを追いはじめる。</p><p>やがてウルダハで見つけたマーティンは、目立たないようにとでも思ったのか、いつもの青を避けた装いで錬金術師ギルドへと入っていく。その不自然な慎重さは、ロイズの不安をますます強めるばかりだった。病の薬でも求めているのかと彼女は考えるが、それだけでは腑に落ちない。そして追跡はハンマーレアへと続き、そこでマーティンは何者かを待つように立ち止まる。まもなく現れた怪しい男たちは、まず金を差し出せと迫り、受け渡しの最中にも、値は上がる一方なのに包みは小さくなるばかりだとマーティンは不満を漏らす。そうして見えてきたのは、彼が危うい筋からドリームフラワーを買い集めているという事実だった。</p><p>ロイズが思わず声を上げたせいで、潜んでいたことはすぐに露見する。取引相手たちは即座に襲いかかってきて、あなたは事情を聞く間もなく戦わされることになる。どうにかその場を収めたあと、ロイズは怒りをあらわにしてマーティンを問い詰める。ドリームフラワーと聞けば、思い浮かぶのは昏睡薬だ。売りさばくつもりだったのか、それとも自分で溺れているのか――容赦なく突きつけられた疑いに、マーティンはついに隠していた本当の目的を明かす。あれは昏睡薬のためではない。薬を作るためだったのだと。</p><p>そこでようやく、彼の抱えていた事情の全貌が語られる。新大陸のウァラキーには、エオルゼアから渡った者たちによって持ち込まれたと思われる流行り病が広がっていた。エオルゼアの者なら風邪程度で済むそれも、ウァラキーにとっては命に関わる重い病であり、しかも勢いよく広がっているという。友人である医師が伝統的な薬でどうにか食い止めようとしているものの、もはや追いつかない。自分もまた、その原因の一端を担っているかもしれない――そう思うだけで耐えられず、マーティンは友人の研究記録をもとに治療薬を探し続けてきた。そして身を削るような試行錯誤の末、ようやく効き目のある調合にたどり着いたのだという。だが流行を止めるには数回分では足りず、しかも主な材料であるドリームフラワーは高価で手に入りにくかった。</p><p>その事情を知ったロイズは、怒りの向け先を変える。マーティンを切り捨てるのではなく、セレスティウムでの出演を続けさせ、その稼ぎを薬のために回せるようにすると決めたのだ。さらに、ドリームフラワーについても、もっと安全な手立てで手配できるよう力を貸すという。救われた思いのマーティンは、その申し出を受け入れるしかなかった。こうしてひとまず危機を越えたあと、彼はあなたの訓練へと話を戻す。夢花の売人との戦いは、自分が用意するどんな試練よりもよほど力試しになっただろうと認めつつ、次に覚えるべき魔法として一〇〇〇本の針を挙げる。もっとも、これからの彼は舞台に立つ時間が増え、以前のように付き添うことはできない。だからこそ、青魔道書を頼りに、野にいる獣たちから自ら学んでいくしかないのだと、彼はあなたを送り出す。そして、日に何度も舞台に上がり続けるマーティンの姿を見つめながら、ラトージャの胸には、尊敬とは別の心配も静かに積もりはじめていた。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> マーティン <small class="muted">（ウルダハ：ザル回廊, X:12.5, Y:13.0）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="why-they-call-it-the-blues.html">青息吐息</a></div><div class="row">青魔道士 Lv 30～</div><div class="row"><b>受注に必要なアクション</b> 猫だまし</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="blue-gold.html">青天の霹靂</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'青雲之志',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>當你在學會 Faze 之後回去找 Martyn，他卻先開口要你把訓練暫時往後放，說自己還有一些事情得處理。這樣的說法反而讓 Royse 更加起疑。經過前陣子那些和討債人有關、又難堪得無法忽視的風波後，她已經沒辦法再把 Martyn 的搪塞當成小事。如果他真的捲進了什麼可能損害 Celestium 名聲的麻煩裡，她就非弄清楚不可。Latool Ja 雖然也說不出具體內容，卻只低聲承認 Martyn 身上有太多秘密。於是，你便和 Royse 一起動身，循著他的行蹤追查下去。</p><p>你們先在 Ul’dah 看見 Martyn 走進 Alchemists’ Guild，而最顯眼的地方，反而是他刻意穿了一身一點也不藍的衣服，像是生怕被人認出來似的。這份遮遮掩掩只讓 Royse 更覺得不對勁。她一度猜想他是不是在買藥，可又覺得事情恐怕沒有那麼單純。接著，你們一路追到 Hammerlea，只見 Martyn 神情不安地等著人出現。沒過多久，幾名可疑人物現身，第一句話就是先拿錢來。交易過程裡，Martyn 忍不住抱怨，自己花出去的錢一次比一次更多，拿到手的包裹卻始終沒有變多，甚至還越來越少。到這時，你們才真正看清，他一直是在透過危險的地下管道購買 dream flower。</p><p>Royse 聽見這個名字時當場失聲，也因此立刻暴露了你們的存在。那些人毫不猶豫地翻臉動手，你只能先出面把局勢壓下來。等危機過去後，Royse 轉頭就朝 Martyn 發作。在 Royse 看來，dream flower 幾乎只會讓人聯想到 somnus，也因此她最先懷疑的，就是 Martyn 是否正在私下製作那種藥物，甚至可能是為了販賣，或為了餵養他自己的癮頭。面對這樣的指控，Martyn 終於再也無法隱瞞下去，只能把真正的用途說出口，那些 dream flower 不是拿來做 somnus，而是拿來製藥。</p><p>直到這一刻，Martyn 一直背在身上的真相才終於攤開。Whalaqee 之間正在流行一種疫病，而那病多半正是由像他這樣從 Eorzea 前往 New World 的人帶過去的。對 Eorzea 的人而言，那頂多像一場嚴重些的感冒；可對 Whalaqee 來說，卻足以致命，而且蔓延的速度快得驚人。雖然他的一位 Whalaqee 醫者朋友一直努力用傳統藥方支撐局面，情況卻只是不斷惡化。想到自己也可能是把災禍帶過去的人之一，Martyn 根本無法袖手旁觀。他回到 Eorzea，依照那位朋友留下的研究筆記反覆調製，幾乎把自己逼到山窮水盡，才總算做出看起來有效的藥。然而，想壓下整場疫病，遠遠不是幾份藥劑就夠了，而其中最重要的材料，就是既稀少又昂貴的 dream flower。</p><p>明白原委之後，Royse 的態度也隨之改變。她不再提解除契約，反而決定讓 Martyn 繼續留在 Celestium，甚至安排更多演出，好讓他能靠那些收入持續支撐製藥所需的花費。同時，她也答應會幫忙尋找更安全的管道取得 dream flower。Martyn 在那一刻終於鬆了口氣，只能帶著幾乎難以掩飾的感激接受這份幫助。事情告一段落後，他也重新把話題拉回你的修行上。他坦承，這次你和那些賣 dream flower 的人交手，恐怕比他自己能想出的任何訓練都更能測出你的本事。因此他替你訂下下一個目標：去學會 1000 Needles。只是從今以後，他大半時間都得耗在競技場的表演上，已經無法像之前那樣親自一路帶著你。真正能繼續教你的，仍會是野外那些生物，以及指引你前進方向的 spellbook。而當 Latool Ja 看著 Martyn 一天比一天更頻繁地登上舞台時，落在心底的，除了佩服，也多了一份壓不下去的擔憂。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 馬丁 <small class="muted"> 烏爾達哈現世迴廊（X:12.5, Y:13.0)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="why-they-call-it-the-blues.html">青色吐息</a></div><div class="row">青魔道士等級 30 以上</div><div class="row"><b>必須習得任務所需的招式</b> 拍掌</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="blue-gold.html">晴天霹靂</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',

      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
