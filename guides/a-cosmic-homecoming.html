    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Namingway greets you with elaborate politeness, but it does not take long for his true concern to emerge. He has heard that other Loporrits are wandering this city, and when you tell him that his kin are indeed on the moon, the answer strikes him with overwhelming force. After more than a hundred years trapped on Etheirys, he can finally return to Mare Lamentorum.</p>
      <p>He explains how he came to be stranded in the first place. He had been sent alone to survey Etheirys, carrying out a mission of great importance, but his survey pod was destroyed in a disastrous landing. With no way to contact his fellows and no means of going home, he was left to endure this star by himself. Even so, he did not abandon his duty. He searched every corner of the world alone, trusting that somehow he would one day find his way back.</p>
      <p>Only recently did he hear rumors that moonfolk had descended upon this city of scholars. That faint hope was enough. He secretly boarded a vessel bound for Old Sharlayan, determined to learn whether the tale was true. When you explain the route to Mare Lamentorum, his joy is shadowed by a quieter fear: after a century away, he no longer knows what kind of welcome awaits him. He asks you to accompany him, if only to lend him courage, and then hurries ahead to the moon.</p>
      <p>When you meet him again in Mare Lamentorum, Namingway is quick to complain about the climb, yet the moment he stands before Bestways Burrow, everything else falls away. Some things may have changed, but there is no mistaking this place. This is home. Inside, the other Loporrits stare in disbelief until Searchingway finally recognizes him, shocked that the missing traveler has truly returned after a hundred years.</p>
      <p>Namingway prepares to report the results of his long mission, only to be met by a revelation far greater than his own. The Final Days have already been averted, and there is no longer any need to evacuate Etheirys. For a moment, the century he spent alone feels as though it has lost the purpose that sustained it. But Searchingway refuses to let him remain in that sorrow. If the duty given by Hydaelyn has ended, then that only means the Loporrits are now free to seek dreams of their own. From that thought, Searchingway unveils a new undertaking: the Cosmic Exploration Initiative.</p>
      <p>Searchingway invites both of you to become part of that future. Namingway, moved by the thought of naming discoveries not out of duty, but for the sheer joy of it, accepts at once. You are taken across the lunar wastes to the new base, where Searchingway lays out the work ahead: maintaining the outpost, building the facilities it needs, preparing a starship, and supporting the great journey still to come. Namingway throws himself into his new role with delight, while you are entrusted with tools, missions, and the work of helping this dream take shape. What began as a long-delayed homecoming becomes the first step toward the stars.</p>
    </div>

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ネミングウェイは、いかにも丁重な口調であなたに声をかけるが、その胸にある願いはすぐに明らかになる。この街に、自分と同じロポリットたちがいると聞いたのだ。あなたが月で仲間たちに会ったことを伝えると、その言葉は彼にとって長い歳月を貫く光となる。百年以上もエーテリスに取り残されていた彼は、ようやく嘆きの海へ帰る道を見いだしたのだった。</p>
      <p>彼は、自らがなぜこの星に取り残されることになったのかを語り始める。重大な任務を帯び、たったひとりでエーテリスの調査に赴いたものの、調査ポッドは着陸の失敗によって大破した。仲間へ連絡する手段も、帰還する術も失われたが、それでも彼は務めを投げ出さなかった。いつか必ず故郷へ帰れると信じ、この星の隅々まで、たったひとりで調査を続けてきたのである。</p>
      <p>そんな彼の耳に届いたのは、月の民が学問の都に降り立ったという噂だった。わずかな可能性にすがるように、彼はその真偽を確かめるため、ひそかにオールド・シャーレアン行きの船へ乗り込んだ。あなたが嘆きの海への行き方を教えると、彼は歓喜しながらも、百年ぶりに戻る自分を仲間たちがどう迎えるのかと不安をのぞかせる。そして、せめて心の支えとしてそばにいてほしいとあなたに頼み、先に月へ向かっていく。</p>
      <p>やがて嘆きの海で再会したネミングウェイは、あの塔を登る道のりは決して楽ではなかったとこぼしつつも、ベストウェイ・バローの前に立つと、言葉を失う。姿を変えたものがあったとしても、ここが故郷であることだけは疑いようがない。中へ踏み入った彼を見たロポリットたちは驚きに目を見開き、やがてサーチングウェイが、その帰還が真実であると気づいて声を上げる。</p>
      <p>百年にわたる調査の成果を語ろうとしたネミングウェイだったが、その前に彼自身が大きな事実を知らされる。終末はすでに回避され、エーテリスを避難させる必要もなくなったというのだ。長い孤独と努力を支えてきた意味が、一瞬で宙に浮いたかのようだった。だがサーチングウェイは、そこで彼を立ち止まらせなかった。ハイデリンから託された役目が終わったのなら、これからは自分たち自身の夢を追えばいい。そう語ったうえで、彼は新たな企て――「コスモエクスプローラー計画」を打ち明ける。</p>
      <p>そしてサーチングウェイは、あなたにもネミングウェイにも、その未来へ加わってほしいと願う。義務のためではなく、純粋な喜びのために新たな発見へ名を与える――その役目を示されたネミングウェイは、胸を躍らせながら受け入れる。あなたは月面の新たな拠点へ導かれ、そこで彼は、基地の整備、施設の維持、星船の準備、そしてこれから始まる探査の全体像を語って聞かせる。ネミングウェイは新しい使命に目を輝かせ、あなたもまた道具と役目を託される。こうして、長い帰郷の果てにたどり着いたその場所は、未知の星々へ踏み出す最初の一歩となった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    unlockq:`<div class="stack">
  <div class="row"><a class="link" href="endwalker.html">暁月のフィナーレ</a></div>
  <div class="row"><a class="link" href="all-11-cosmic-tools-showcase-doh-dol-ilv720.html">コスモツール 全11種主道具紹介（クラフター／ギャザラー IL720）</a></div>
  <div class="row">クラフター／ギャザラー <small class="muted">Lv 10～</small></div>
</div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="passion-thy-name-is-ardorum.html">未知待つ宙へ焦がれて</a></div>
    </div>`

  ZH:{
    langLabel:'ZH',
    pageTitle:'星海歸來，再啟新計畫',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Namingway 帶著一貫鄭重又熱情的語氣向你打招呼，但他真正想問的，很快就說出口了。他聽說這座城市裡也有其他 Loporrit 在活動，而當你告訴他，你確實見過那些同族，而且他們就在月球上時，那句話幾乎像一道光，瞬間照進了他長久以來的等待之中。被困在 Etheirys 超過一百年的他，終於找到了回到 Mare Lamentorum 的希望。</p>
      <p>接著，他把自己為何流落在這顆星球上的經過告訴了你。當年，他肩負重要任務，獨自前來調查 Etheirys，卻在降落時遭遇意外，讓調查艙當場全毀。從那一刻起，他失去了聯絡同伴的方法，也失去了返回故鄉的手段。可即便如此，他仍沒有放棄自己的職責，而是孤身走遍這顆星球，一路堅持下去，只因他始終相信，總有一天自己還能回家。</p>
      <p>直到最近，他才聽說有來自月球的居民現身於這座學者之都。僅僅是這樣一點消息，就足以讓他立刻動身。他偷偷搭上前往 Old Sharlayan 的船，只為親自確認那個傳聞是否屬實。當你把前往 Mare Lamentorum 的方法告訴他時，他的欣喜再也壓抑不住，可那份喜悅之中，也混著一絲遲疑。離開整整一個世紀後，他已經不知道同伴會用什麼樣的神情迎接自己，因此，他請求你陪他一起去，好讓自己在踏上歸途時，至少不必獨自面對那一刻。</p>
      <p>之後，你在 Mare Lamentorum 再次見到他。Namingway 一邊抱怨那段攀登的路實在算不上輕鬆，一邊走到 Bestways Burrow 前，卻在真正看見那座熟悉的居所時安靜了下來。也許這裡有些地方變了，但那股屬於故鄉的感覺並沒有消失。當他走進去時，其他 Loporrit 全都難以置信地盯著他，直到 Searchingway 認出那身熟悉的紅色裝束，才終於驚呼出聲，迎接這位失蹤了一百年的同伴歸來。</p>
      <p>Namingway 原本想把自己這一世紀以來的調查成果全部說出來，卻先聽見了一個足以動搖一切的真相。Final Days 已經被阻止，Etheirys 不再需要撤離。那一瞬間，他過去百年來的孤獨、辛勞與堅持，彷彿突然失去了原本支撐它們的意義。但 Searchingway 並沒有讓他陷在那份失落裡。既然 Hydaelyn 交付給 Loporrit 的使命已經結束，那麼他們就能開始追尋屬於自己的夢想。而 Searchingway 所提出的新目標，便是 Cosmic Exploration Initiative（邁向群星的探索計畫）。</p>
      <p>他邀請你與 Namingway 一同加入這條新的道路。對 Namingway 來說，最打動他的，並不是另一份必須完成的責任，而是從今以後，他可以單純因為喜歡命名這件事本身，而替那些全新的發現賦予名字。隨後，你們被帶往月面上的新基地，Searchingway 也在那裡向你們說明之後的方向：維護據點、完善設施、準備星艦，並為未來真正踏向其他星球的旅程做好一切準備。Namingway 對這份新角色充滿了期待，而你也接過了工具與任務。這場遲來的歸鄉，最終沒有停在重逢本身，而是化作通往未知群星的第一步。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
