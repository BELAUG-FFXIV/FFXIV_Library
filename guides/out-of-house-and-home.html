  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .tab-panel.scroll-panel{
  max-height:420px;
  overflow-y:auto;
  padding-right:8px;
  scrollbar-gutter:stable;
}
.tab-panel.scroll-panel p:first-child{margin-top:0}
.tab-panel.scroll-panel p:last-child{margin-bottom:0}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:12px 14px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .row b{display:inline-block;min-width:130px}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}
    /* 展開/收合 */
    .clamp{position:relative; max-height:360px; overflow:hidden}
    .clamp[data-collapsed="false"]{max-height:none}
    .clamp[data-collapsed="true"]::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:72px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), var(--card)); pointer-events:none;
    }
    .expand-wrap{ margin-top:12px; }
    .expand-btn{
      display:inline-block; padding:8px 14px; border-radius:10px;
      background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600;
    }
    .expand-btn:hover{ background:#fffef8; }
  </style>

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Out of House and Home',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>At Black Brush Station, you report to Warin and find him already mid-sigh, as if the very thought of ore shipments exhausts him. Once he has your attention, he explains that wagons laden with ore pass through this station every day, and rarely without incident. Every wagon traveling between the dispatch yard to the south and the station here must pass through a tunnel near Fesca’s Watch—a tunnel where, for reasons beyond his understanding, someone decided to build an ore storehouse. The constant presence of exposed ore created the perfect conditions for coblyns, and now the ore-loving beasts have claimed the narrow fissures in the tunnel walls, turning a hard-won passage into their own private nesting ground. Where once miners carved a route to carry Ul’dah’s lifeblood through the desert, they now find themselves delivering meals straight to the enemies that stalk that vein. Warin presses a silver ore cluster into your hands and tells you what he needs from you: go into the tunnel, find the slender crack where the coblyns hide, lay down the gleaming bait, and when the creatures creep out to feast, cut them down before they can trouble the wagons again.</p>
      <p>You follow his directions to the tunnel near Fesca’s Watch, stepping from daylight into a dim stone throat where the clatter of your own footsteps echoes ahead of you. At the narrow fissure in the wall, you place the silver ore cluster and wait. For a moment, there is only the quiet breath of the tunnel—and then you hear it: a soft skittering that grows louder as coblyns, drawn by the scent and shine of ore, begin to spill from the crack. They swarm toward the bait, and you step forward to meet them, steel and spell flashing in the half-light until the last of the chittering beasts collapses at your feet and the tunnel falls still once more. When you return to Black Brush Station, Warin listens to your report and nods, clearly relieved. Keeping the tunnel entirely free of coblyns will never be simple, he says, but thanks to your efforts, the wagons should pass unmolested for a time. Disruptions to those ore shipments threaten not only the profits of Amajina & Sons Mineral Concern, but Ul’dah herself; the tracks here are like veins carrying the nation’s lifeblood beneath the sands. Looking you over with renewed respect, he admits that if he had more men and women like you to rely on, he would worry a great deal less about what waits in the dark along those rails.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Warin <small class="muted">(Central Thanalan, X:20.8, Y:18.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="prudence-at-this-junction.html">Prudence at This Junction</a></div>
      <div class="row"><small class="muted">All classes and jobs (excluding limited jobs) (Level 4 or above)</small></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="way-down-in-the-hole.html">Way Down in the Hole</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'迷惑な鉱石マニア',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>「ブラックブラッシュ停留所」でウォーリンに声をかけると、彼はすぐに顔を上げ、ため息混じりに鉱石輸送の現状を語り始める。ここを通る荷車は、南の操車場とのあいだを毎日のように往来しているが、その道中で問題が絶えないのだという。荷車は必ず、フェスカの監視所の近くにあるトンネルを抜けなければならず、その内部には、誰かの「妙案」によって鉱石置き場が作られてしまった。むき出しの鉱石が常に積み上がるその場所は、鉱石を好むコブリンにとって理想的な環境となり、今やトンネルの細い岩の裂け目がやつらの巣と化してしまった。せっかく掘り抜いた道は、王都の血潮を運ぶための道というより、コブリンの食卓へと鉱石を届ける運搬路になり果てている──ウォーリンはそう肩を落としながら、あなたの手に銀鉱石の塊を握らせる。この囮を持って問題のトンネルへ向かい、コブリンが潜む狭い裂け目の前に置いてほしいのだという。鉱石の匂いと輝きに釣られてやつらが姿を現したら、その場で討伐し、荷車を脅かす巣を叩き潰してほしい──それが、彼があなたに託す任務だった。</p>
      <p>あなたはフェスカの監視所近くのトンネルへと向かい、薄暗い坑道の奥へ足を踏み入れる。足音とわずかな風の音だけが反響する中、岩壁に走る細い裂け目の前で銀鉱石の塊をそっと据え置き、身を引いて様子を窺う。一瞬の静寂ののち、やがてかさかさとした小さな足音がトンネル全体に響き渡り、鉱石の匂いに引き寄せられたコブリンたちが、狭い隙間から次々と這い出してくる。あなたは武器を構え、その群れに向かって踏み込み、迫りくる魔物をひとつひとつ斬り伏せていく。やがて最後の一体が崩れ落ち、再び静けさが戻ったトンネルを後にして、あなたは「ブラックブラッシュ停留所」へと戻る。報告を聞いたウォーリンは、心底ほっとしたように頷き、トンネルからコブリンを完全に追い出し続けるのは容易ではないが、これでしばらくは荷車が襲われずに済むだろうと礼を述べる。鉱石輸送の妨げは、アマジナ鉱山社の利権だけでなく、砂の都ウルダハそのものの繁栄をも脅かすものであり、ここを走る鉄路は、まさしくこの国の血潮を運ぶ血管のようなものだと彼は言う。そして、その大切な道を守ってくれたあなたを見つめながら、自分の周りにあなたのような手練れがもっといてくれたなら、どれほど心強いことかとこぼし、改めて深い感謝の言葉を送るのだった。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ウォーリン　中央ザナラーン <small class="muted">(X:20.8, Y:18.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="prudence-at-this-junction.html">戦場の備え</a></div>
      <div class="row"><small class="muted">すべて（リミテッドジョブを除く）Lv 4～</small></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="way-down-in-the-hole.html">成功の表と裏</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'礦石狂',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>在 Black Brush Station，你找到 Warin，他一見到你就將這段時間壓在心上的煩惱說了出來。每天都有載滿礦石的車隊從這裡經過，來往於南邊的 dispatch yard 與車站之間，但這條路線總是不得安寧。那條必經的通道是 Fesca’s Watch 旁邊的隧道，而某個自以為聰明的人，居然在隧道裡設置了礦石倉庫。堆得滿滿的礦石氣味四溢，正好成為 coblyn 最理想的棲息環境，牠們乾脆在岩壁的狹縫裡築巢，把原本應該輸送貨物的道路，變成專門收貨的「送餐管道」。Warin 說到這裡，只能無奈地苦笑，隨即把一塊閃著銀光的 silver ore cluster 放到你手裡，交代真正需要你幫忙的事──前往那條隧道，找到 coblyn 潛伏的細長裂縫，把這團銀礦放在那裡當作誘餌。等牠們被礦石的氣味與光澤吸引出來時，你就負責將牠們全部解決，讓車隊再度能夠安全通行。</p>
      <p>你依照指示來到 Fesca’s Watch 附近的隧道，從日光之下走進石壁之間，腳步聲在狹長的空間裡來回迴盪。沿著軌道深入之後，你在岩壁上找到那道狹窄的裂縫，將 silver ore cluster 小心放在前方，退後幾步凝神等待。短暫的沉默之後，一陣細碎的摩擦聲開始在隧道裡擴散，幾隻、又幾隻 coblyn 從縫隙之中鑽出，被眼前閃爍的礦石牢牢吸引。你趁勢上前，在這條封閉的通道裡與牠們短兵相接，直到最後一隻倒在石地上，聲響逐漸平息，隧道重新恢復安靜。回到 Black Brush Station 後，Warin 聽完你的報告，顯然鬆了一大口氣。他說，要讓這條隧道永遠不再出現 coblyn 絕對不是輕鬆的工作，但至少接下來一段時間，礦車應該可以平安通行，不再動不動就被襲擊。他提醒你，礦石運輸一旦受到干擾，受害的不只是 Amajina & Sons Mineral Concern 的利益，整座 Ul’dah 的命脈也會跟著受影響──這些鋪在沙漠上的軌道，就像是輸送國家血液的血管。說到最後，他帶著真心的敬意看著你，坦言如果身邊能多幾個像你這樣願意出力、又有本事的冒險者，他對這條路線的擔憂大概就能減少許多了。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 瓦林　中薩納蘭 <small class="muted">(X:20.8, Y:18.5)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="prudence-at-this-junction.html">備戰</a></div>
      <div class="row"><small class="muted">所有職業（不含限定職） 等級 4 以上</small></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="way-down-in-the-hole.html">成功的兩面</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
