const i18n = {
  EN:{

    pageTitle:`Descent to the Foundation`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>With a plan finally in hand, you gather with Wuk Lamat, Krile, G’raha Tia, Shale, Gulool Ja, and Sphene. Gulool Ja explains that records from Yuweyawata show his mother was investigating Origenics as part of her research into souls, and the map data is what revealed the castle in the foundation sector. Sphene says the castle was once her home and promises she will do everything she can to help on the mission.</p><p>Krile turns over Calyx’s intentions aloud—how he decides how many will become Endless, yet leaves the choice of who to the people—and wonders whether he thinks it fair, whether he simply does not care, or whether he believes all are worthy of salvation, only to stop herself for speculating too soon. G’raha Tia notes that in the world of Sphene’s memories the town was already submerged, and that the people likely stripped the castle for materials in order to rebuild; for it to endure even now speaks both to the castle’s importance to the Alexandrians and to their resilience. Shale says she has plotted a viable route to the foundation sector, and because the area is largely unknown she will come to gather geographic data on-site, asking you to leave the navigating to her. Gulool Ja stays behind, but Shale tells him his skill with electrope will surely serve him well no matter what the future brings, and with that support in place, you set off for the lift in the government sector.</p><p>With Oblivion securing permission, you descend, transferring lifts on the way since there is no direct route to the foundation sector. Shale warns that taking the wrong lift will land you in the wrong sector, and she relays what Teeshal Ja’s records say: below Origenics, the tower is divided into inner and outer sections, and the castle lies at the heart of the inner section. Krile concludes that once you arrive, you must make your way inward. Shale then gives you a modified communicator that tracks your coordinates so she can guide you while collecting data, and Wuk Lamat urges everyone forward. Sphene admits she cannot help feeling nervous to return to the very bottom of Everkeep after so long, and G’raha Tia cautions that Calyx has all but invited you, meaning you must assume he expects you.</p><p>You press on into the Underkeep, and Krile suspects Calyx has led you here to measure your strength. Wuk Lamat says you may have cleared away machines and beasts, but there is no telling what else he has prepared, and from here Sphene and Shale will move with you as you search for the terminal and stay alert. Along the way, Sphene pauses to tell you what this place once meant to her: before illness confined her to bed, she walked these halls to watch Otis and Zelenia train. She says Zelenia served as Otis’s second-in-command among the royal knights of Alexandria, and she loved to see them spar—so much that she once dreamed of fighting at their side and studied the magical arts under her tutor. Then she recalls the Storm Surge that broke out when she was fifteen, taking both her father and mother. As the new queen, she was forbidden from going to the battlefield, for the nation would fracture if she died without a successor. Even as she later could barely move, she regrets that she did not go out and fight while she still could, and she admits she can relate to her Endless self’s lament at being unable to protect the realm with benevolence. When Wuk Lamat reacts to her heaviness, Sphene apologizes and urges you onward.</p><p>A sudden shift tears you away from your companions and into the throne room, where a simulant appears and remarks that your “guest” brought company. Sphene realizes this was the simulant’s doing, and the simulant explains that a teleporter triggers when the key is present—and that aetheric transmissions cannot penetrate the throne room’s walls, so it will take your friends time to find you. Calyx then appears, saying the Valia Pira was not enough to assess your capabilities, so he will try something else: you may use anything at your disposal, because the better you fight, the more accurate his data will be, and a precise measure of your strength is the quickest way to reclaim the key you cling to.</p><p>At the simulant’s call, a machine appears as Zelenia, and Sphene recoils—this is Zelenia. The simulant claims they could not preserve Zelenia’s memories while she lived, so she was reconstructed from their recollections. Sphene says she can accept that her Endless self was created in answer to the Alexandrians’ earnest desires, but she cannot abide twisting the memories of those she held dear and treating them as playthings. Loath as she is to comply with their demands, she insists the monstrosity must be destroyed for Zelenia’s honor, and if it was created from her memories, then even if she cannot fight she may be able to offer counsel—so she asks you to lend her your strength and end the farce.</p><p>After the battle, the simulant asks Calyx whether he got what he needed, and he says he did, though the figures will complicate matters. When Sphene confronts them, Calyx says he has no wish to use his research this way, but having long since relinquished his flesh he must resort to any method so long as you insist on keeping the key. He demands to know why you oppose their objective, claiming that with the key they could harvest aether from other reflections and bring forth more Endless, offering this “chance to evolve” to the people of the Ninth and the Source alike, and sees no reason you should refuse. The simulant dismisses your stance, says the seeds they have sown have already quickened, and claims the people have glimpsed hope in transcending death and cannot easily turn away. As the simulant ends the exchange, Calyx leaves you a “gift” for consenting to his tests.</p><p>When it is over, Sphene speaks of Zelenia as kind yet stern, a pillar of strength when she ascended the throne in troubled times—protecting her and steadying her spirit whenever the pressures of her station threatened to break it. By preserving Zelenia’s memory and honor, she tells you, you have done more for her than you could know, and she thanks you.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'JP',
    pageTitle:'決行',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ようやく方針が定まり、あなたはウクラマト、クルル、グ・ラハ・ティア、シャーレ、グルージャ、そしてスフェーンとともに作戦へ向けて動き出す。グルージャは、ユウェヤーワータの記録によれば母が魂の研究のためにオリジェニクスを調べており、そこに含まれていた地図情報から基礎区に城があると分かったのだと説明する。スフェーンは、その城はかつて自分の住まいだったと告げ、任務で役に立てるよう最善を尽くすと誓う。</p><p>クルルはカリュクスのやり方に思いを巡らせる。エンドレスになる人数は決めるのに、誰がそうなるかの選択は民に委ねる──それを公平と呼ぶべきか、単に無関心なのか、あるいは誰もが救われるに値すると考えているのか。だが彼女は、今はまだ推測するには早いと口をつぐむ。グ・ラハ・ティアは、スフェーンの記憶の世界では町はすでに水没しており、切迫した状況の中で人々は再建の資材として城を剥ぎ取ったはずだと見立てる。それでも城が今なお残っているのは、アレクサンドリアの人々にとっての重要性と、彼らのしぶとさを示しているのだろう。シャーレは基礎区へ至る現実的な経路を割り出したと言い、情報の乏しい地域なので現地で地形データを集めるため自分も同行し、道案内は任せてほしいと頼む。グルージャは今回は残るができることがあれば言ってほしいと言い、シャーレは、あなたのエレクトロープに関する知識は将来どのような形になっても必ず役に立つと励ます。こうしてあなたたちは政府区のリフトへ向かう。</p><p>オブリビオンが許可を取り付け、あなたたちは降下を開始する。基礎区へ直通のリフトはないため途中で乗り継ぎが必要で、シャーレは間違ったリフトに乗れば別の区へ出てしまうので案内に従うよう注意する。さらにティーシャルジャの記録を引き、オリジェニクスより下の塔は内外の区画に分かれ、城は内側区画の中心にあると説明する。クルルは、到着したら内側へ向かって進む必要があると理解し、シャーレは座標を追跡できるよう改造した通信機をあなたに渡し、データ収集をしながら誘導すると告げる。ウクラマトが出発を促し、スフェーンは長い年月を経てエヴァーキープ最下層へ戻ることに緊張を覚えると口にする。グ・ラハ・ティアは、カリュクスはほとんど招き入れるような形を取っているのだから、こちらが待ち受けられている前提で動くべきだと警告する。</p><p>アンダーキープを進む中で、クルルはカリュクスが力を測るためにここへ誘導したのではないかと疑う。ウクラマトは機械や獣は排除できたようだが、まだ何を仕込んでいるか分からないと言い、ここからはスフェーンとシャーレも一緒に動いて端末を探すが、油断は禁物だと告げる。道中、スフェーンはかつてこの場所を歩いた記憶を語る。病で寝たきりになる前、彼女はここを通ってオーティスとゼレニアの稽古を見に行っていたのだという。ゼレニアはアレクサンドリア王国騎士団でオーティスの副官だったと説明し、二人の手合わせを見るのが好きで、いつか自分も並んで戦いたいと夢見て師のもとで魔法を学んだと明かす。だが十五の時にストームサージが起こり、父母は亡くなった。新たな女王となった彼女は、後継者を残さず戦死すれば国が割れるとして戦場に出ることを禁じられた。やがてほとんど動けなくなった後も、動けたうちに戦いに出なかったことを悔いているという。そしてエンドレスの自分が、慈愛で国を守れなかったことを嘆いた気持ちは分かるのだと告げる。ウクラマトが言葉を失うと、スフェーンは空気を重くするつもりはなかったと詫び、先へ進もうと促す。</p><p>やがて不意に引き離され、あなたは玉座の間へと転移させられる。シミュラントが現れ、客人が仲間を連れてきたようだと告げる。スフェーンはそれが彼女の仕業だと見抜き、シミュラントは鍵の存在で起動する転送装置を設置したのだと説明する。玉座の間の壁は乙太通信を遮断するため、仲間があなたの元へ辿り着くには時間がかかるとも言う。そこへカリュクスが姿を現し、ヴァリアピラでは能力測定に足りなかったので別の方法を試すと宣言する。手持ちの力は何でも使ってよい、よく戦うほど得られるデータは正確になる──あなたが執拗に握りしめる鍵を取り戻すには、それが最短だというのだ。</p><p>シミュラントの呼びかけでゼレニアの姿をした機械が現れ、スフェーンはそれがゼレニアなのかと愕然とする。シミュラントは、生前の記憶は保存できなかったため、自分たちの記憶から再構成したのだと言い放つ。スフェーンは、アレクサンドリアの民の切実な願いに応えてエンドレスの自分が造られたことは受け入れられるが、愛した者たちの記憶を歪め弄ぶのは到底容認できないと怒りを露わにする。要求に従うのは本意ではないが、この冒涜的な存在はゼレニアの名誉のためにも破壊せねばならない、そして自分の記憶から作られたのなら、戦えずとも助言はできるかもしれないと告げ、あなたに力を貸してこの茶番を終わらせてほしいと頼む。</p><p>戦いの後、シミュラントは必要なものは得られたかと問い、カリュクスは得られたが数字は厄介だと答える。スフェーンが抗議すると、カリュクスは本来このように研究成果を使いたくはないが、肉体を捨てた以上、あなたが鍵を手放さない限りあらゆる手段に頼らざるを得ないのだと言う。そしてなぜ目的に反対するのかと問う。鍵があれば別の鏡像世界から乙太を収穫し、さらに多くのエンドレスを生み出せる。第九世界だけでなく、原初世界の者にも進化の機会を与えられるのに、なぜ拒むのか理解できないと主張する。シミュラントはあなたを吝嗇だと嘲り、だが譲歩しないなら何も救えないと言い、すでに蒔いた種は芽吹いたのだと告げる。人々は死を超える希望を垣間見た以上、簡単には背を向けられない──そう言い残して去り、カリュクスは試験に応じた礼として贈り物を残すと言う。</p><p>すべてが終わった後、スフェーンはゼレニアが優しくも厳しく、混乱の中で玉座に就いた自分を支えた強さの柱だったと語る。彼女は身を守るだけでなく、重圧で心が折れそうな時にも励ましてくれたのだという。記憶と名誉を守ってくれたあなたに、スフェーンは計り知れない恩を感じ、あなたに礼を述べる。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> シェール <small class="muted">(バックルーム, X:6.0, Y:6.3)</small></div></div>`,

    </div>`,

    story:`<div class="clamp" data-collapsed="true"><p>終於有了行動方針，你與 Wuk Lamat、Krile、G’raha Tia、Shale、Gulool Ja、Sphene 集合。Gulool Ja 說，來自 Yuweyawata 的紀錄顯示，他的母親曾為了靈魂相關研究而調查 Origenics；紀錄裡附帶的地圖資料，讓你們因此得知 foundation sector 的那座城堡。Sphene 說那座城堡曾是她的家，她會盡全力在這次任務中派上用場。</p><p>Krile 一邊整理線索，一邊困惑於 Calyx 的做法：他決定「會有多少人」成為 Endless，卻把「由誰」成為 Endless 的選擇交到民眾手上——這到底是他所謂的公平，還是他根本不在乎？又或者他真把所有人都視為值得拯救的人？她隨即收住話頭，說現在還太早，不該急著推測。G’raha Tia 則指出，在 Sphene 的記憶所呈現的世界裡，那座城鎮早已沉沒；在走投無路的情況下，人們很可能拆取城堡的材料來重建。即便如此，城堡至今仍能屹立，說明它對 Alexandrians 的重要性，也反映出他們的韌性。Shale 表示她已規劃出一條可行路線通往 foundation sector；由於那一帶資訊不足，她會同行並在現地蒐集地理資料，你只要把「帶路」交給她即可。Gulool Ja 這次會留守，但 Shale 也肯定他作為 Oblivion 的轉接者很可靠，且不論未來如何，他對 electrope 的理解必定派得上用場。於是你們在支援就位後，前往 Government Sector 的升降梯。</p><p>Oblivion 已替你們取得使用升降梯的許可，你們開始下行，途中還得轉乘，因為沒有直達 foundation sector 的路線。Shale 警告你若搭錯升降梯就會去到別的 sector，因此務必跟著引導者的指示。她也轉述 Teeshal Ja 的紀錄：在 Origenics 之下的塔體分成內外兩個區域，而城堡位於「內側區域」的核心。Krile 因此說，抵達 foundation sector 後，你們得朝內部前進。Shale 接著把一個通訊器交給你，並說它已被改造得能追蹤你的座標，她會一邊蒐集資料、一邊引導你行動。Wuk Lamat 說準備就緒，該出發了；Sphene 則坦言，從這裡要前往 Everkeep 的最底部，隔了這麼久再回去，她不免緊張。G’raha Tia 也提醒你：Calyx 幾乎像是在邀請你們深入，因此必須假設你們的一舉一動都在他的預期之內。</p><p>你們進入 The Underkeep 後，Krile 懷疑 Calyx 是在衡量你們的實力，才刻意把你們引到這裡。Wuk Lamat 說雖然你們清掉了機械與野獸，但誰也不知道他還安排了什麼；接下來 Sphene 與 Shale 會和你們一起行動，你們要找出那個 terminal，同時隨時提防新的威脅。途中，Sphene 回憶起這座城堡對她的意義：在病倒臥床之前，她曾沿著這些走廊前往觀看 Otis 與 Zelenia 的訓練；她說 Zelenia 是 Otis 在 Alexandria 王家騎士團裡的副官。她很喜歡看兩人切磋，甚至曾夢想能與他們並肩作戰，因此在導師指導下研習魔法。然而她十五歲時 Storm Surge 爆發，父母雙亡；她成為新女王後被禁止上戰場，因為若她沒有繼承者便戰死，國家將會分裂。即使到了最後她幾乎動彈不得，她仍後悔自己沒有在還能行動時走出去戰鬥。她也說，她的 Endless 自己曾哀嘆無法以仁慈守護國度——那份心情，她能理解。Wuk Lamat 想開口時，Sphene 立刻道歉，說自己不是要讓氣氛沉重，並催促你們繼續前進。</p><p>就在此時，突如其來的變故把你與同伴們硬生生分開，你被傳送到 throne room。擬造體現身，淡淡說著「客人」似乎還帶了同伴。Sphene 立刻明白是她動的手腳，而擬造體則解釋：他們安裝了一個會被「鑰匙」存在觸發的傳送裝置；而且 throne room 的牆壁會阻隔乙太傳訊，你的同伴要找到你得花上不少時間。Calyx 隨後出現，說 Valia Pira 還不足以評估你們的能力，因此他要換個方式：你可以動用任何手段，因為你戰鬥得越好，他得到的數據就越精準；而精準衡量你的強度，是他奪回你緊抓不放的「鑰匙」最快的方法。</p><p>擬造體隨即召來一具機械，並以 Zelenia 之名下令出手。Sphene 震驚質問：那台機械是 Zelenia？擬造體說，他們無法在她生前保存她的記憶，所以只能以「他們對她的記憶」重建出來。Sphene 壓抑怒意表示：Alexandrians 懷著真摯願望而造出 Endless Sphene，這件事她尚能接受；但把她所珍視之人的記憶扭曲成玩物，這份羞辱她絕不容忍。她說自己雖不情願迎合他們的要求，但這個怪物必須被摧毀——至少要為了 Zelenia 的榮譽。若它確實出自她的記憶，即使她無法戰鬥，也或許能給你一些建議；因此她請你借她力量，結束這場鬧劇。</p><p>戰後，擬造體問 Calyx 是否得到所需，Calyx 回答得到了，只是那些數據會讓事情更棘手。Sphene 追問後，Calyx 說他其實不想用研究成果做這種事，但他早已捨棄肉身，只要你堅持握著鑰匙不放，他就必須採取一切可能手段。他質問你為何反對他們的目標，並宣稱只要有鑰匙，他們就能從其他 reflections 收割乙太、帶來更多 Endless；這不只可以給 Ninth 的人，也能給 Source 的人「進化的機會」，他不明白你為何拒絕。擬造體嘲諷你吝嗇，並說除非你願意妥協，否則你什麼也救不了；更稱他們播下的種子早已萌芽，人們看見了「超越死亡」的希望，就很難再回頭。她說自己的角色到此為止，將其餘交給 Calyx，Calyx 則留下所謂「禮物」作為你配合測試的謝意。</p><p>一切暫告段落後，Sphene 談起 Zelenia：她溫柔，卻也嚴厲；在她於動盪中登上王座時，Zelenia 是支撐她的力量。Zelenia 不只保護她，也在她被身分壓力壓得幾乎撐不住時扶住她的心。她對你說，你守住了 Zelenia 的記憶與榮譽，對她而言意義遠超你所能想像——並為此向你道謝。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
