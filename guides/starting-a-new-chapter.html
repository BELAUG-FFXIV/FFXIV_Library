<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`Starting a New Chapter`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>After hearing that you have made notable progress through the pages of The Merchant’s Tale, Fyrgeim tells you that Nazqha has been unable to stop thinking about what you both witnessed within the manuscript. She wishes to speak with you again, and he arranges for the two of you to meet so you can talk in peace. When you arrive, you find that she has already been turning your shared experience over and over in her mind.</p><p>She greets you warmly and thanks you again for the courage you showed inside the book. What you accomplished there, she says, was no simple thing, and without your help she never would have unraveled the story’s hidden meaning. Even now, she is struck by the truth of it─that such an ordinary-looking object could prove to be the treasure they had been seeking all along.</p><p>Yet one question continued to trouble her: why her father had left that book to her, and what he had hoped she would understand through this final test. As she reflects on it, she recalls the words he spoke when she first asked to become his apprentice. At the time, books had already become her deepest obsession, and she had known she wanted to devote herself to the recovery of documents of every sort. Her father told her that a gleaner may come into their own once they can obtain the item they are asked to find, but that this is only the first step toward true mastery.</p><p>For years, she believed her father had earned such respect because he could locate even the rarest texts. Now, however, she sees how incomplete that understanding was. When you delivered the plate to the young maiden, the girl wept with joy. That, Nazqha realizes, was what her father wanted her to see. Something that would appear worthless to others could be beyond price to the person who truly needed it. Value changes from one person to the next, and even a rare and costly object may mean nothing if it fails to answer the desire in someone’s heart.</p><p>A true master gleaner, then, is not simply someone who finds what is difficult to obtain. It is someone who understands what their client truly longs for and places into their hands something that speaks directly to that longing. Nazqha now believes that this was the lesson her father intended for her from the beginning. She tells you that she was not the only daughter left with a book. Drawing upon the insight he had cultivated over a lifetime, her father chose keepsakes for each of his twelve daughters, each one perfectly suited to the woman who received it. Though his time with them had been limited, he had watched closely and understood them more deeply than they knew.</p><p>With that realization, her desire to follow in his footsteps grows stronger than ever. His wisdom has given her a new way to see her work, and she credits you with helping her reach that understanding. She says she will not soon forget the time you spent together. She then speaks of her sisters, with whom she rarely has the chance to meet or keep in regular contact. Even so, when she and Y’shtola recently had the chance to catch up, her sister told her all about the adventures you had shared. The tale was brief and neatly arranged, just as one would expect from her, yet the pride on her face made clear how precious those memories were to her. Through that, Nazqha feels she glimpsed what her sister truly values, and in doing so felt closer to her. She sends you onward with heartfelt hope that your journey will remain full of purpose and wonder, certain that wherever you go, a bright future awaits you.</p><p>Fyrgeim later listens as you tell him that you have spoken with her, and he is plainly pleased. He says that Y’rhul Nunh was truly one of the finest among them, and although Nazqha still has much work ahead before reaching her father’s level, he has no doubt that one day she may even surpass him. The Merchant’s Tale will remain safely kept, and should you ever wish to open its pages again, Nazqha would surely be glad to accompany you. In gratitude for everything you have done, he offers you a token traditionally given to departing gleaners, that they may find their way home in safety. He hopes it will guard you just as well on whatever adventure comes next, and that someday he will have the chance to hear the tale of it.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Fyrgeim <small class="muted">(Old Sharlayan, X:14.7, Y:11.0)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-spellbinding-read.html">A Spellbinding Read</a></div></div>`,

  },
  JP:{
    langLabel:'JP',
    pageTitle:'受け継ぎ、いつか超える日まで',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>『商人の物語』の頁をかなり読み進めたと聞き、ファイゲイムは、あの中であなたが見たものについてナズジャがどうしても話したがっていると告げる。彼はふたりが落ち着いて話せるよう場を整え、あなたは彼女のもとへ向かう。そこではすでに、書物の中でともにたどった出来事が、彼女の胸の中で何度も反芻されていた。</p><p>ナズジャはあなたを温かく迎え、まずは改めて礼を述べる。あの書物の中で成し遂げたことは決して容易ではなく、あなたの助けがなければ、物語に隠された意味へたどり着くことはできなかったという。ありふれた品にしか見えなかったものこそ、自分たちが探していたかけがえのない宝だったのだと、彼女は今なお深い驚きを覚えていた。</p><p>だが、なおひとつだけ、心に引っかかり続けていた疑問があった。なぜ父はあの本を自分に遺したのか。最後の試練として、何を成し遂げさせようとしたのか。そのことを考えるうち、彼女は弟子入りを願い出た日のことを思い出す。昔から本に強く惹かれ、あらゆる文書の回収を専門にしたいと望んでいた彼女に、父はこう諭した。依頼された品を手に入れられるようになれば、グリーナーとしてひとり立ちはできる。だが、それは真の熟達への第一歩にすぎないのだと。</p><p>長いあいだ、彼女は父が人々に敬われていた理由を、どれほど稀少な書物でも探し出せる力にあるのだと思っていた。だが今、その理解がいかに足りなかったかを知る。あなたがあの若い娘に皿を渡したとき、彼女は喜びのあまり涙を流した。父が自分に見せたかったのは、まさにあの涙だったのだと、ナズジャはようやく気づく。ほかの誰の目にも価値がないように映るものが、その人にとっては何ものにも代えがたい宝であることがある。価値とは人それぞれであり、どれほど珍しく高価な品であっても、心の奥の願いに応えなければ、真に大切なものにはならないのだ。</p><p>それゆえ、真の達人たるグリーナーとは、ただ手に入りにくい品を見つける者ではない。依頼人が本当に求めているものを見抜き、その心に届くものを差し出せる者なのだと、彼女は理解する。きっと父があの昔の言葉に託した意味はそこにあったのだろう。しかも、本を遺されたのは自分だけではなかった。父は生涯を通じて磨き上げた洞察をもって、十二人の娘それぞれに、必要にふさわしい形見の書を残していた。ともに過ごした時間は決して多くなかったはずなのに、それでも父は娘たちをよく見て、深く理解していたのだ。</p><p>そのことを知った今、彼女はこれまで以上に強く父の背を追いたいと思うようになる。父の知恵は、自分の仕事を見つめるための新しい視点を授けてくれた。そして、その気づきに至れたのはあなたのおかげだと、彼女は感謝を重ねる。ともに過ごした時間を忘れることはないと語ったのち、彼女は姉妹のことにも触れる。姉妹同士で会う機会は多くなく、普段から頻繁に連絡を取り合うわけでもないという。それでも最近、ヤ・シュトラと言葉を交わす機会があり、そのとき彼女はあなたとともに重ねた冒険を語ってくれた。話は簡潔で整然としていて、いかにも彼女らしかった。だが、それを語る表情に浮かんだ誇らしさが、その経験をどれほど大切に思っているかを何より雄弁に物語っていた。ナズジャはその姿を通して、姉が何を本当に大切だと感じているのか、その一端に触れられた気がしたという。そして、だからこそ以前よりも少し姉を近く感じられたのだと語る。彼女は、あなたの旅がこれからも実り多く、胸躍るものであり続けるよう願い、あなたがどこへ辿り着こうとも、その先には明るい未来が待っていると信じて疑わなかった。</p><p>その後、あなたから彼女と話したことを聞いたファイゲイムは、満足そうにうなずく。ユルル・ヌンは間違いなく自分たちの中でも屈指の人物であり、ナズジャが父の域へ辿り着くまでにはまだ積むべき経験があるとしても、いずれはその父をも超えうると彼は確信していた。『商人の物語』はこれからも大切に保管され、もしあなたが再びその頁をめくりたくなったなら、ナズジャはきっと喜んで付き添ってくれるだろうという。そして、これまで尽くしてくれた礼として、旅立つグリーナーに必ず渡す品をあなたへ差し出す。それは無事に帰り道を見つけられるよう願って贈る守りだという。次の冒険でもそれがあなたを守ってくれることを願いながら、いつかその旅の話をまた聞ける日を楽しみにしていた。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> フィルゲイム <small class="muted">(オールド・シャーレアン, X:14.7, Y:11.0)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-spellbinding-read.html">瑠璃紺の本に語らるる冒険譚</a></div></div>`,
    followq:`<div class="stack"><div class="row">おわり</div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'傳承下去，直到終有超越的一天',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>得知你已經在《The Merchant’s Tale》的篇章中取得了相當可觀的進展後，Fyrgeim 告訴你，Nazqha 一直惦記著你們在書中親眼見到的一切，無論如何都想再和你好好談一談。於是他替你們安排了一個能安靜說話的地方，而當你前去赴約時，也看得出她早已把那段共同經歷反覆想了許久。</p><p>Nazqha 一見到你，便先誠懇地再次向你道謝。她說，在那本書中完成的一切絕不是件容易的事，若沒有你的幫助，她根本不可能解開那段故事所隱藏的意義。直到現在，她仍對那個答案感到震撼──原來那件看來平凡無奇的東西，竟正是你們一直在尋找的珍貴寶物。</p><p>可是，她心裡仍有最後一個問題始終揮之不去：為什麼父親會把那本書留給她？他究竟希望她從這場最後的試煉中明白什麼？在反覆思索之下，她想起自己當年請求成為父親弟子時，曾聽過的那句教誨。那時的她早已深深迷上書本，也早就知道自己想走上回收各類文獻的道路。父親那時告訴她，能夠把委託人指定要找的東西帶回來，固然代表一名 gleaner（蒐集員，Old Sharlayan 派出的外勤人員，負責蒐集各地樣本與知識）已經能夠獨當一面，但那其實還只是邁向真正精通的第一步而已。</p><p>長久以來，她一直以為父親之所以如此受人敬重，是因為他連最稀有的文獻都找得到。可現在她終於明白，那樣的理解其實遠遠不夠。當你把那只盤子交到那位年輕少女手中時，對方喜極而泣。Nazqha 此刻才真正意識到，父親想讓她看見的，正是那樣的眼淚。對旁人而言看似毫無價值的東西，對真正需要它的人來說，可能是無可取代的珍寶。價值這件事，本來就因人而異；再稀有、再昂貴的物件，也未必能打動每一個人的心。</p><p>也正因如此，真正了不起的 gleaner（蒐集員，Old Sharlayan 派出的外勤人員，負責蒐集各地樣本與知識），並不只是能找到難得之物的人，而是能看穿委託人真正渴望什麼，並把那份能觸動對方內心的東西帶到他們面前的人。Nazqha 相信，父親當年那番話真正想傳達的，正是這層意思。而且，被留下書本作為紀念的並不只有她一人。父親憑藉著一生磨練出的敏銳眼光，替十二個女兒各自留下了不同的書，每一本都恰好符合收下它的人真正需要的東西。即使他陪伴她們的時間並不算多，他依然始終細心留意，也比她們想像中更了解自己的女兒們。</p><p>如今明白這一切後，她比以往任何時候都更想追隨父親的腳步。父親留下的智慧，讓她看待自己工作的方式有了全新的角度，而她也把這份領悟歸功於你。她說，和你一同經歷的這段時光，她絕不會輕易忘記。接著，她又提起自己的姊妹們。她們平時並不常見面，也不總是頻繁聯絡，但前陣子她和 Shtola 終於有機會坐下來好好聊一聊。那時，Shtola 把你們一路共同經歷的冒險都告訴了她。那段講述依舊簡潔、條理分明，很有她一貫的風格，可她說起那些事時臉上流露出的自豪，卻清楚表明了那段經歷對她有多麼珍貴。也正因如此，Nazqha 彷彿第一次更真切地看見了姊姊心中真正重視的是什麼，也因此覺得自己似乎離她更近了一些。最後，她衷心祝福你未來的旅途依舊精彩而充實，並深信無論你將去往何處，前方都會有光明的未來等待著你。</p><p>之後，當你把這場談話告訴 Fyrgeim 時，他明顯十分滿意。他說，Y’rhul Nunh 的確是他們之中最出色的人之一，而雖然 Nazqha 距離達到父親的境界還有一段路要走，但他毫不懷疑，她終有一天甚至能超越父親。《The Merchant’s Tale》今後也會被妥善保管；若你哪天想再次翻開那本書的篇章，Nazqha 想必也一定會很樂意再次陪你同行。為了答謝你為他們做的一切，他拿出了一件他們總會在 gleaner（蒐集員，Old Sharlayan 派出的外勤人員，負責蒐集各地樣本與知識）啟程前交付的物品，希望能保佑旅人平安找到歸途。他也同樣盼望，這份守護能在你的下一段冒險中陪伴你，並希望自己總有一天還能親耳聽見你下一段旅程的故事。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Fyrgeim <small class="muted">(Old Sharlayan, X:14.7, Y:11.0)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="a-spellbinding-read.html">令人著迷的冒險故事</a></div></div>`,
    followq:`<div class="stack"><div class="row">完結</div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
