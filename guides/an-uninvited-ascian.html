    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Word from the battlefield has finally reached Edelstein: Lieutenant Alianne reports a sound victory over the main column, and the Scions have already been pulled onward to other duties. All but one. The Roegadyn woman with the large axe remained behind at the site of the fighting. Edelstein cannot say what work keeps her there, only that northern Thanalan is no place to wander alone—even for someone as capable as Moenbryda. Before you continue on your way, he asks you to check in on her.</p><p>At Bluefog, the trail leads east to Dalamud’s Talons, where Moenbryda has been seen inspecting an outcrop of corrupted crystals. She barely looks up before muttering that she will not be a second—something in the area seemed peckish, so it received a taste of her axe. With a half-amused sigh, she repeats Urianger’s familiar reproach that an axe ill befits the hand of a scholar, then shrugs it off: she likes axes, and insists it never kept her from taking up a quill. Thought turns briefly to the man who first opened the joys of learning to her, and to an excruciatingly stiff childhood friend whose presence, unalike as they are, still helped draw her to Eorzea.</p><p>Work returns to the present. The concentrations here are low enough that a mistake should not become a catastrophe—just enough aether to make the test worthwhile. When the crystal answers with a faint glow, satisfaction flashes across her face: the siphon works. With refinement, it should feed the appetite for aether. That leaves only the forging of the blade, and though she cannot yet say how it will be done, she swears she will put such a weapon in your hands.</p><p>The air shifts. A voice reaches out in a tongue that is not meant for you, and the presence behind it acknowledges being sensed. Moenbryda stiffens at once—an Ascian, here, now. The one who calls himself Nabriales fixes on her marks and sneers: by her brand, she is an Archon of Sharlayan—a keeper of knowledge, a seeker of truth, a meddler. Her answer is plain even without understanding his words; she does not like his tone.</p><p>Nabriales turns his attention where it truly lies. At last, he says, he addresses the one who can understand—Warrior of Light—and names himself. You have been a thorn in his side; he endured Lahabrea’s overweening presence so that men might host the power of gods, only for you to unravel that work. Then his delight curdles into opportunity: he does not sense the blessing of Light. Shorn of it, you are no longer a threat, and the seal is broken. Now is the time, he declares, to claim the staff—and with it, rise above the rest and take his place at Lord Zodiark’s right hand.</p><p>When the presence withdraws, only urgency remains. Moenbryda spits an insult at the unseen intruder and latches onto the one clear point—this “staff” that made him grin like a child. Realization hits hard: he means Tupsimati, Master Louisoix’s staff. If the Ascian is after it, then Minfilia is in danger. There is no time to linger; haste back to the Rising Stones becomes the only answer.</p><p>At the Rising Stones, unease has already found its way outside—Alys speaks of a loud bang from within, and even the wandering minstrel is seized by unnamed dread. Moenbryda arrives at your side with no patience for questions. Louisoix’s staff is kept in the solar; move—now. Inside, Minfilia stands confronted as Nabriales greets you with cold amusement, mocking the title “Warrior of Light” and claiming you are now too dull to bar his entry.</p><p>Minfilia demands meaning, and Nabriales gives it. The blessing of Light, he says, kept you and your fellow meddlers safe; it was what prevented his kind from entering this domain. Elidibus and Lahabrea, being of this world, could come and go as they pleased—he could only look on. But the seal is gone, and unlike the others, he will not wait. He will take the staff and bring about the next Rejoining.</p><p>What follows is a desperate struggle in a place where Light no longer answers as it once did. Minfilia orders Tupsimati used to gather aether—quickly—while she tries to call back the moment Lahabrea fell to the blade of Light. It will not answer; the blessing is absent, and even with so much aether drawn, it is not enough. As Minfilia’s pleas go unanswered, Moenbryda’s voice turns grimly certain—if only there were a little more aether.</p><p>The decision is made in a heartbeat that costs everything. Moenbryda moves anyway, speaking a broken farewell and confessing, at last, an understanding of the choice Master Louisoix once made. In death, there is life—then she is gone, and the prison holds long enough for Nabriales to be unmade.</p><p>The others arrive to the aftermath and the empty space where she should have been. The answer is unbearable: she gave her life to temper the blade of Light. Urianger says he heard it all, and likens her passing to the moon sinking from the heavens—its leaving heralding a new day. Minfilia steadies the room with one last resolve: Moenbryda gave her life so the means to defeat the Ascians could be born. Her sacrifice must not be in vain; the work on the blade of aether must be carried through to completion.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>エデルシュタインから戦況の報せが届く。アリアヌは主力縦隊に対して見事な勝利を収め、暁の血盟もすでに次の務めへ向かったという。だが、ひとりだけ戻っていない。大斧を携えたルガディンの女性――ムーンブリダが、戦場跡に残ったらしい。何をしているのかは分からないが、北ザナラーンは危険が多い場所だ。どれほど腕が立とうとも、ひとりで彷徨わせるのは心配だと告げられ、あなたは様子を見に行くことになる。</p><p>手がかりはブルーフォグから東、ダラガブの爪だ。ムーンブリダは腐化したクリスタルの露頭を調べていた。近づくと、少し待てと言わんばかりに手を上げ、腹を空かせた獣がいたから斧で黙らせたのだと事もなげに言う。ウリエンジェが口癖のように「学者の手に斧は似合わぬ」と繰り返すのも知っている、と笑い、だが斧が好きなのだと平然と続ける。斧を好んだからといって羽根ペンを手放したわけではない。学ぶ喜びを教えてくれた男のこと、そして堅物すぎる幼なじみのことが、ふと胸をよぎり――似ても似つかぬのに不思議と折り合ってきたのだと、世界の奇妙さを噛みしめる。</p><p>やがて視線は作業へ戻る。ここは濃度が低い。万一何かが起きても致命的にはならないはずで、ほどよい乙太だけが試験を面白くする。クリスタルが淡く光ったのを見て、ムーンブリダの表情が明るむ。吸引器は機能している。調整を重ねれば、必要な乙太を満たせる見込みだ。残る問題は刃の鍛造だが、方法はまだ定まらない。それでも誓う――最後には必ず、あなたの手に刃を握らせると。</p><p>空気が変わる。耳に届くのは、あなたには理解できない言葉――だがそれを放つ気配は確かにこちらを見ている。「気づかれたか」とでも言うように、存在はあなたを測り、ムーンブリダは瞬時に身構える。アシエンだ。名をナプリアレスと名乗るその者は、刻印を見て嘲る。あなたはシャーレアンの賢者、知を守り真理を求め、そして干渉する者だと。ムーンブリダは意味を掴めぬままでも、その声音が気に入らないと吐き捨てる。</p><p>ナプリアレスはすぐに矛先を変える。理解できる相手へ向けて言葉を投げ、光の戦士と呼びかけ、ついに名乗ったのだと告げる。あなたは長く邪魔者だった。ラハブレアの傲慢さを耐え忍び、人が神の力を宿すよう仕向けたのに、あなたがそれを覆したのだと。だが彼はふと眉を上げる。光の祝福を感じない。祝福を失ったあなたはもはや脅威ではなく、しかも封印は破れた。今こそ杖を奪い取る時だ、と。手にしたならば他のすべてを凌ぎ、ゾディアークの右腕として座すのだと言い放つ。</p><p>気配が消えると、残ったのは焦燥だけだ。ムーンブリダは相手を罵りつつも、ひとつの言葉に噛みつく。「杖」――その名を口にしただけで、あれほど愉快そうにしていたという。導かれる結論はひとつ。狙いはルイゾワの杖、名杖トゥプシマティだ。もしそれが標的なら、ミンフィリアが危ない。ためらう理由はない。ライジングストーンズへ急ぐしかない。</p><p>ライジングストーンズの外では不穏が先に広がっていた。中から大きな音がしたと告げる者がいて、名もなき恐れに胸がざわめく者もいる。ムーンブリダはあなたを見つけるなり言い切る。名杖トゥプシマティはソーラーに保管されているはずだ、急げ、と。駆け込んだ先で待っていたのは、ミンフィリアとナプリアレス。彼は冷笑し、光の戦士という呼び名はもはや似つかわしくないと言い放つ。鈍くなり、侵入を阻むことすらできぬのだと。</p><p>ミンフィリアが問い返すと、ナプリアレスは答える。光の祝福が、あなたとその仲間を守っていた。だからこそ自分たちはこの領域へ踏み込めなかった。だがエリディブスとラハブレアは違う。この世界の存在であるがゆえに自由に出入りでき、自分は見ているしかなかった――しかしもう見ている必要はない。封印は消え、待つことを好まぬ自分が動く。杖を奪い、次なる再合を起こすのだ。</p><p>その「少し」を埋める方法が、彼女にはひとつしかなかった。ムーンブリダは決断の言葉を残す。ルイゾワの選択を理解した、と。死の先に生がある、と。ウリエンジェへ別れを告げ、そして彼女は去った。閉じ込める力は確かに満ち、ナプリアレスは悲鳴とともに終わる。ミンフィリアは震える声で告げる。アシエンは死んだ。</p><p>遅れて駆けつけた仲間たちが、空白を見て言葉を失う。ムーンブリダはどこへ行ったのか――その答えは、刃を鍛えるために命を差し出したという事実だった。ウリエンジェは言う。すべて聞いていた、と。月は沈み去るが、その別れは新たな朝の訪れを告げるのだと。ミンフィリアは静かに締めくくる。ムーンブリダは、アシエンを討つ術を私たちに遺すために命を捧げた。その犠牲を無駄にしない。乙太の刃を完成させ、彼女の仕事を成し遂げるのだと。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>Edelstein 看著你的神色，像是早就知道你會急著等同伴的消息。Alianne 已回報主力縱隊被徹底擊退，而 Scions 也已分頭去處理其他任務——但有一個人沒有回到安全地帶。那位扛著大斧的 Roegadyn 女性，Moenbryda，似乎選擇留在戰場現場。Edelstein 不清楚她為什麼不回來，但北 Thanalan 不是能單獨遊走的地方，就算她再能幹也一樣。他希望你在繼續上路前，先去確認她是否平安。</p><p>線索指向 Bluefog 東側的 Dalamud’s Talons。Moenbryda 正在一處腐化水晶的岩脈前檢視，見你靠近，只簡短叫你稍等一下——剛才有隻野獸像是餓了，她就用斧頭讓它「嚐了一口」。她帶著無奈又帶點得意的笑，提起 Urianger 總愛唸的那句話：「學者的手不該握斧頭。」可她就是喜歡斧頭，甚至說起來像是天生如此，彷彿一出生就握著它。她也不否認自己同樣握過筆、寫過字，學術並沒有被斧頭阻擋；話音裡一閃而過的，是那位帶她走進求知世界的人，以及那位「僵硬得要命」的青梅竹馬——明明性格完全不同，卻仍能一路走到今天，世界確實奇妙。</p><p>她很快把注意力拉回眼前的實驗。這裡的濃度夠低，就算裝置出差錯也不至於釀成災難——剛好有足夠的乙太讓測試變得有意思。當腐化水晶出現微光反應時，她的語氣明顯亮了起來：虹吸裝置確實能運作。只要再做些改良，就能滿足他們對乙太的需求。剩下的問題只在於「刃」要怎麼鍛造；她還沒有答案，但她發誓，無論如何都會把那把刃交到你手上。</p><p>下一瞬間，氣氛驟變。某個存在用你無法理解的語言開口，還像是在確認自己被察覺到——那是一種令人不寒而慄的自信。Moenbryda 立刻繃緊：Ascian。對方自稱 Nabriales，從她的印記看出她是 Sharlayan 的賢者，說她是守護知識、追尋真理、卻又愛干預的人。Moenbryda 聽不懂內容也無所謂，她只回嗆一句：她不喜歡他的語氣。</p><p>Nabriales 很快把話鋒轉向你。他說終於能對「聽得懂」的人說話，叫你 Warrior of Light，並報上名字。他把你稱作長久以來的眼中釘，說自己一直容忍 Lahabrea 的傲慢，任由「人」成為容器去承載「神」的力量，結果卻被你把心血全部毀掉。接著他忽然像是發現了什麼，語氣變得輕蔑又興奮：他感受不到 blessing of Light。失去光之祝福的你不再是威脅，更重要的是，封印已破。現在正是奪走那根「staff」的時機；只要握在手裡，他就能凌駕眾人之上，站到 Lord Zodiark 的身邊。</p><p>那股壓迫感退去後，只剩下急迫。Moenbryda 一邊咒罵，一邊抓住關鍵：他提到的那根「staff」，光是說出口就讓他像孩子過節一樣得意。她立刻意識到——那是 Master Louisoix 的 Tupsimati。若 Ascian 的目標是它，那麼 Minfilia 就有危險。沒有時間猶豫，必須立刻趕回 Rising Stones。</p><p>回到 Rising Stones，外頭已先感到不對勁：Alys 說剛才屋內傳出一聲巨響，Wandering Minstrel 甚至莫名心悸、像被無名的恐懼攫住。Moenbryda 直接拉著你往裡衝，語氣不容反駁——Tupsimati 被放在 solar，得立刻過去。進入 solar，Minfilia 正面對著 Nabriales。他冷笑著嘲諷「Warrior of Light」這稱呼已不再適合你，說你變得遲鈍，甚至無力阻止他踏入這裡。</p><p>Nabriales 把話說得明白：blessing of Light 一直保護著你們，正是那道力量阻止他的族類踏進這個領域。至於 Elidibus 和 Lahabrea，因為本就屬於這個世界，所以能自由來去，他只能旁觀——但現在不同了。封印已消失，他不打算等待；他要奪走那根杖，並引發下一次「再合」。</p><p>那是一場在「光不再回應」的狀態下硬撐到底的死戰。Minfilia 命令用 Tupsimati 聚集乙太，並要你回想當初以「光之刃」擊倒 Lahabrea 的瞬間；可那一切卻無法重現——你們缺少 blessing of Light；即使抽取了大量乙太，仍然不夠。Moenbryda 咬牙低吼：只差一點點乙太——只要再多一點點。</p><p>她選擇用唯一能補足的代價去換那「一點點」。Moenbryda 說出自己的領悟：Master Louisoix 當年的選擇，她終於明白了。她留下決絕的告別後消失了，牢籠終於撐住，Nabriales 在不可置信的尖叫裡崩解。Minfilia 顫抖著說：Ascian 死了。</p><p>眾人趕到時，只剩下空缺與餘燼。答案沉重得讓人窒息——Moenbryda 以自己的生命，讓那把「刃」得以成形。Urianger 說他全都聽見了，月沉離天，卻也預告新日將至。Minfilia 把悲傷收束成決心：Moenbryda 以生命換來擊敗 Ascians 的手段，她的犧牲不能白費。乙太之刃必須完成，並要把她的工作做到最後。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 艾德爾斯坦 <small class="muted"> 北薩納蘭（X:20.8, Y:22.1)</small></div></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
