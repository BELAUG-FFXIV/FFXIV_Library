<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:'Passion, Thy Name Is Ardorum',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Searchingway checks on your progress with bright enthusiasm, and no matter how you answer, he takes it as proof that you have already thrown yourself into the work of the initiative. He speaks warmly of the value your efforts will have in the ventures ahead. Before long, Namingway returns as well, delighted by how much the base has grown. Seeing Loporrits and the people of Etheirys working side by side fills him with quiet happiness, and with barely contained excitement, he invites you to follow him so he can show you the names he has given to the wonders around the hub.</p><p>He begins with the starship itself. Standing before it, Namingway declares that this vessel is the embodiment of everyone’s shared aspirations. Though smaller and less powerful than the Ragnarok, it inherited the fruits of past journeys, for its ability to ride stellar currents at the speed of light was built from data gathered on the voyage to Ultima Thule. Looking toward the future it is meant to cross, he gives it a name worthy of that hope: the Galactic Way. In that moment, the ship becomes more than a machine. It becomes a promise that this dream will truly carry all of you beyond the moon.</p><p>From there, he leads you farther out and speaks of the surrounding land with the same pride. He points out the tunnel carved through the mountain entirely by machinery, an experiment meant to prepare for stars where aether may be scarce. He explains that the gleam of the terrain inspired the name “Gleamslope,” and that even the broader region, Sinus Ardorum, bears witness to the longing that gave birth to this project in the first place. The more he speaks, the clearer it becomes that Namingway is not merely assigning labels. He is trying to give shape to a future that all of you are only beginning to imagine.</p><p>At Weddingway’s Bower, that future takes on another form. Here, rainbow crystals are being studied to determine whether life might one day be cultivated on other stars. The experiments have already produced a thriving garden of strange crossbreeds, and Namingway eagerly shares them with you one by one. A cactus-like specimen recalls a lunatender, yet is wholly plant, and so he calls it the sabotended. A great mushroom becomes the lovingpuff. A towering fungal bloom transplanted from Mare Lamentorum earns the name mycophlox. Nearby, turquoise shag glows in response to electromagnetic waves, while pink moss spreads across remediated regolith, proof that even the moon’s barren surface may be made to support life.</p><p>When the tour is over, Namingway speaks with unusual earnestness about what naming truly means to him. Observation matters, of course, but a well-chosen name can create understanding where appearance alone cannot. Once something is named, it can be recognized, shared, studied, and remembered. In his eyes, naming is not a trivial flourish laid atop discovery, but the moment a discovery enters the world and becomes real to others. Every new word he gives shape to rekindles his joy, and after all he endured, he has never been happier to be Namingway.</p><p>Back at the hub, your conversation turns to one final view. From a high vantage, Searchingway looks out over everything that has been built and tells you what this place means to him. After the Final Days were averted, the Loporrits lost the purpose Hydaelyn had once given them, and for some, that loss nearly emptied the future of meaning. He himself had been meant to search for a new home, only to learn that no exodus would ever come. Yet in Old Sharlayan, he saw scholars continue to pursue knowledge even when it seemed that nothing might come of it, and from that realization he found his answer: curiosity does not need justification. That conviction became the Cosmic Exploration Initiative, and now the Galactic Way waits on its launch pad for the coordinates of its first destination. When the time for liftoff comes, he asks whether you will follow him to the stars.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'JP',
    pageTitle:'未知待つ宙へ焦がれて',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>サーチングウェイは、あなたが仕事に励んでいるかどうかを明るく尋ねる。そして、あなたがどう答えようとも、それをこの計画への情熱の表れとして受け取り、今後の大いなる挑戦において、あなたの力が欠かせないものになると嬉しそうに語る。そこへネミングウェイも戻ってきて、見違えるほど整ってきた拠点の様子に心から感嘆する。ロポリットたちがエーテリスの人々と手を取り合って働いている光景に胸を温めながら、彼は自らが名づけた数々の発見を、ぜひあなたに見せたいと言って案内を申し出る。</p><p>まず彼が見せてくれたのは、宇宙船だった。ネミングウェイは、そこに皆の願いそのものが形を取った姿を見る。ラグナロクほどの規模や推進力は持たないとしても、この船にはかつての旅の遺産が受け継がれている。ウルティマ・トゥーレへの航海で得られた情報をもとに、光の速さで星の流れを渡る力が与えられているのだという。そして彼は、この船がやがて宇宙へ旅立つ日にふさわしい名として、「ギャラクティックウェイ号」を贈る。そこには、まだ見ぬ彼方へ進んでいく夢そのものが託されていた。</p><p>さらに彼は、周囲の景観にも込めた思いを語っていく。山を貫く坑道は、魔法に頼らず機械だけで掘り進められたものであり、エーテルに乏しい星々を見据えた貴重な試みなのだという。その輝く地形から着想を得て、彼はその場所を「グリームスロープ」と名づけた。そして、この計画の出発点にあった星々への憧れは、地域名である「シヌスアルドールム」にも刻まれているのだと語る。彼の言葉を聞いていると、名づけるという行為が単なる整理ではなく、まだ輪郭を持たぬ未来そのものに形を与える営みであることが伝わってくる。</p><p>ウェディングウェイの庭園では、その未来が別のかたちで息づいていた。そこでは、虹結晶を用いて他の星でも生命を育めるかどうかが研究されており、その試みの中から、すでにさまざまな交雑種が育ち始めている。ネミングウェイは、ひとつひとつを楽しげに紹介していく。ルナテンダーを思わせながらも明らかに植物であるものには「サボテンダーンド」、巨大な茸には「ラヴィングパフ」、嘆きの海から移された華やかな菌類には「マイコフロックス」という名が与えられていた。さらに、電磁波に反応して輝く「ターコイズシャグ」や、改良された月の土壌に広がる桃色の苔もまた、この地が不毛の地では終わらないことを示していた。</p><p>見学を終えたあと、ネミングウェイは、名づけることの意味をこれまでになく真剣に語る。もちろん観察は欠かせない。だが、優れた名は、見た目だけでは結びつかなかった認識を人々の中に生み出してくれるのだという。名を得た発見は、人に共有され、理解され、研究され、やがてさらなる発見へとつながっていく。彼にとって名づけとは、発見を世界へ開くための行為であり、その言葉を紡ぐたびに、自分の情熱が何度でもよみがえるのだった。</p><p>やがてあなたたちは拠点へ戻り、最後にサーチングウェイお気に入りの景色をともに眺める。そこから見えるのは、自分たちが築いてきたすべてだった。終末が回避されたあと、ロポリットたちはハイデリンから与えられた使命を失い、その喪失によって、進む理由そのものを見失いかけた者もいた。新たな星を探すはずだったサーチングウェイもまた、その意味を見つけられずにいた。だが、オールド・シャーレアンで、学ぶことそれ自体を目的として歩み続ける学者たちを目にしたとき、彼は悟ったのだ。好奇心に理由などいらないのだと。その思いから生まれたのが「コスモエクスプローラー計画」であり、今やギャラクティックウェイ号は発進台で最初の目的地を待っている。いずれ旅立ちの時が来たなら、あなたもまた自分とともに星々へ来てくれるか――サーチングウェイは、そう問いかけるのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> サーチングウェイ　焦がれの入江 <small class="muted">(X:20.4, Y:20.0)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="a-cosmic-homecoming.html">再会と、新たな計画！</a></div>
      <div class="row">クラフター／ギャザラー <small class="muted">Lv 10～</small></div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="a-managers-patience.html">プロジェクトマネージャーの小粋なお仕事</a></div>
      <div class="row"><a class="link" href="go-forth-brave-explorers.html">新たなる未知へ！</a></div>
    </div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'為尚未抵達的星空悸動不已',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Searchingway 帶著一如往常的熱情詢問你最近是否忙著工作，也問你有沒有趁機看看整個據點。無論你怎麼回答，他都把那當成你已經全心投入這項計畫的證明，並欣慰地說，你的貢獻將會在未來的探索裡扮演不可或缺的角色。這時，Namingway 也回來了。他望著如今已經逐漸成形的基地，滿心都是驚嘆，也由衷為自己的同族能與 Etheirys 的人們一同努力而感到高興。接著，他迫不及待地邀你同行，想親自向你介紹自己最近最得意的命名成果。</p><p>他首先帶你去看的，是那艘宇宙船。Namingway 站在它面前時，語氣裡滿是自豪，彷彿眼前所見就是所有人共同願望的具體化身。雖然這艘船的體型與推進能力都比不上 Ragnarok，但它仍然繼承了那段遠征的成果——前往 Ultima Thule 所收集到的資料，成了這艘船能夠沿著星流、以光速前進的基礎。想到它今後將真正航向宇宙深處，Namingway 為它取下了一個與那份希望相襯的名字：Galactic Way。從那一刻起，這艘船不再只是工具，而是所有人即將朝未知群星啟航的象徵。</p><p>之後，他又帶你走向更外側的區域，繼續介紹那些他為這片土地所賦予的名字。他提起那條貫穿山體的隧道，說那完全是靠機械開鑿而成，沒有倚靠任何魔法，正是為了將來可能前往乙太稀薄的星球而做的實驗。他也指著地貌閃耀的光澤，告訴你那正是自己想到「Gleamslope」這個名字的原因。而整片區域之所以被稱為 Sinus Ardorum，也同樣源自這項計畫最初的起點——對遙遠星空的渴望。隨著他的解說愈來愈深入，你漸漸明白，他的命名從來不只是替事物貼上標籤，而是在為仍然模糊的未來一點一點畫出輪廓。</p><p>在 Weddingway’s Bower，那個未來又以另一種模樣展現在你眼前。這裡的研究，正是要確認是否能利用 rainbow crystal 在其他星球培育生命，而那些實驗如今已經長出了令人驚喜的成果。Namingway 興致勃勃地一一為你介紹。那株外形讓人聯想到 lunatender、卻毫無疑問是植物的種類，被他命名為 sabotended；懸崖上的巨大蘑菇則叫做 lovingpuff；從 Mare Lamentorum 移植過來、綻放得宛如煙火般的奇異菌類，被他命名為 mycophlox。除此之外，還有會對電磁波發出光芒的 turquoise shag，以及在經過改良的 remediated regolith 上蔓延生長的粉色苔蘚。這些景象都證明了，原本荒涼的月面，也許真的能成為孕育生命的地方。</p><p>在參觀結束後，Namingway 罕見地以格外認真的語氣談起「命名」對他來說到底意味著什麼。觀察當然重要，但一個真正恰當的名字，往往能建立起單靠外觀所無法形成的理解。當一項發現被賦予名字之後，它才真正能被人看見、被人分享、被人研究，然後進一步引出更多新的發現。對他而言，命名從來都不是附加在發現之上的點綴，而是讓發現進入世界、成為眾人共知之物的那一步。每一次親手創造出新的名稱，都像重新點燃他心中的熱情，也讓他比以往任何時候都更高興自己是 Namingway。</p><p>最後，你們回到了據點，並與 Searchingway 一起站上他最喜歡的一處高地。從那裡望出去，整個基地盡收眼底，也讓他再次想起自己之所以走到今天的原因。當 Final Days 被阻止後，Loporrit 原本由 Hydaelyn 賦予的使命也隨之失去了意義，甚至有些人因此連繼續前進的意志都差點消散。Searchingway 原本負責尋找新的居所，卻在一切塵埃落定後，發現那場離開終究不會發生。可是在 Old Sharlayan，他看見那些學者即使面對末日的威脅，依然沒有放棄追求知識。正是那一刻，他明白了：好奇心本身，不需要任何額外的理由。於是，他把那份渴望化作 Cosmic Exploration Initiative（邁向群星的探索計畫）。如今，Galactic Way 已經停在發射台上，只等著第一個目的地的座標。等到真正出發的那一天到來時，他也想知道——你是否願意與他一同飛向群星。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">

};

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
