    story:`<div class="clamp" data-collapsed="true">
<p>Cyr stops you to make sure there’s no misunderstanding: you do agree Gigi is a mammet, don’t you? Nashu, meanwhile, convinces herself Gigi didn’t mean what he said about “Papa Hildy,” and gasps at a new possibility—that he must think she’s his mother. Hildibrand refuses to be shaken, declaring that fatherhood is never smooth, but he will overcome this trial and be reconciled with his beloved son.</p>
<p>Cyr tries to drag everyone back to the point: finding the mammet. He orders you to question the sentries at the gate near the manufactory, while he checks the Arc of the Worthy and Hildibrand and Nashu head to the airship landing. If—Fury help you—Gigi has left Ishgard, Cyr wants to know immediately, and he dismisses you to your task.</p>
<p>At the gate, a sentry tells you a little fellow in a wide-brimmed hat passed through and bought passage on a supply ship bound for Falcon’s Nest. The same guard slips into awkward chatter about Lalafells—hurriedly insisting it’s only idle rumor—and tries to recover by praising “good people,” even bringing up the waitress at the Forgotten Knight. When you regroup, Cyr concludes Gigi didn’t leave by the main gates, and Hildibrand reports the airship landing has seen no one matching the description.</p>
<p>“Falcon’s Nest” makes Cyr groan at the thought of returning to the freezing outpost, but Hildibrand swears he will follow Gigi anywhere and embrace him as his son again. Then Hildibrand offers his theory: Gigi must have gone back to those frozen wastes to frolic in the snow and cast his worries to the wind. Cyr can’t believe it—Gigi seemed in no mood to frolic after restoring a vase with arcane power and turning morose when he accepted he was a mammet. To Cyr, it looks like purpose returning: a retreat to western Coerthas, that “breeding ground for heresy,” to bring gathered intelligence back to heretic masters—and he insists he can smell it at last.</p>
<p>Out in the snow, Hildibrand picks out tiny footprints and declares he’d know them anywhere—Gigi came this way. Nashu coos that even the tracks are adorable, like those of a clockwork minion, while Cyr triumphantly points north along the river, certain the mammet is heading straight into the company of heretics. Nashu bristles at his tone and insists that if their little girl met heretics, she’d stare them down and refuse them outright—then she has a sudden flash: maybe Gigi came to find Godbert, because she mentioned grandpapa might want to see that “trick.” Hildibrand calls it brilliant and imagines eager grandparents, while Cyr mutters that these are the very people Gigi renounced when he denied you were his father.</p>
<p>Following the trail, you find Gigi lying motionless in the snow, ice clinging to his cap as if something small and round struck him at speed. He groans, recognizes you, and notes you followed him. Hildibrand instantly frames it as a snowball fight with grandparents and admits he was worried—though relieved Gigi seems unharmed. Cyr, eyeing dead steinbocks nearby, says it looks like the same fate could’ve befallen him and asks if the mammet is damaged. Hildibrand scoffs that a blow to the head can’t fell a Manderville, boasting of the many times he has been driven headfirst into the earth—until Cyr realizes Hildibrand is nodding at someone behind him.</p>
<p>Godbert steps forward, cheerful about crossing paths so far from civilization, apologizing that he was engrossed in a duel with Julyan and inviting you to join. Gigi erupts with excitement—Grandpapa Godbert—and repeats Nashu’s claim that Godbert wields the power of life and death. Then he begs for “life,” pleading to be made a real boy. Godbert asks if he’s sure and warns it may sting; Gigi insists he will endure anything, and Godbert begins, calling on Byregot to guide his hammer. Gigi exults that this body is perfect and declares himself a Manderville man—only for the moment to twist again as if he’s restored to what he was before, leaving Cyr shouting that it’s just like the vase: miraculously returned to its original form.</p>
<p>Hildibrand, after a beat, decides the original body may suit Gigi best—more “manageable,” as he puts it—while Nashu declares it much more adorable. Gigi’s worry spills out: how can he be accepted as Hildibrand’s son if he remains a mammet? Hildibrand answers that a Manderville is more than flesh and bone—vigor, compassion, honor—and whether man or machine makes no difference. If anyone calls him a mammet, he should look them in the eye and declare, “NAY—I am a Manderville mammet!” Then Hildibrand turns to Godbert and Julyan and admits he has formally adopted Gigi as his son and ward of House Manderville, leaving Godbert thunderstruck and delighted at the thought of grandparenthood—until Julyan snarls that she’ll not be made grandmother to a mammet and moves to beat some sense into her beloved boy.</p>
<p>Back in Ishgard, Cyr tells you his superiors—after hearing of the adoption witnessed by House Fortemps—have taken him to task for “gross mishandling of the situation,” and ordered him to redouble his efforts to prove the mammet is heretical. It’s made harder because Gigi seems to have abandoned the search for his memories and thrown himself into life as a “Manderville mammet,” chasing cases beside his doting father. Cyr admits he doesn’t share his superiors’ certainty, yet insists there is something exceedingly unusual about that mammet—and you saw it yourself, how effortlessly he restored the vase, and even himself. Reconstructive magicks may not be rare, Cyr says, but Gigi’s are unlike any he has ever seen.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>キールはあなたに念を押す。はっきりさせておきたいのだが、あなたもギギがマメットだと認めるのだな――まさか本気で、あれを本当の子どもだと信じているわけではあるまい、と。いっぽうナシュ・マカラッカは、ギギが「パパヒルディ」に言った言葉は本心ではないはずだと言い張り、息を呑む。つまり、ギギは自分のことを母親だと思っているのではないか、と。ヒルディブランドは父親道は平坦ではないと豪語しつつも、必ずやこの試練を乗り越え、愛する息子と和解してみせると宣言する。</p>
<p>キールは話を現実に戻し、重要なのはマメットを見つけることだと言い切る。あなたには工房街近くの門の衛兵に聞き込みを命じ、自分は聖徒門へ向かう、ヒルディブランドとナシュは飛空艇乗り場を当たれ、と手分けを決める。もしギギがイシュガルドを出たのなら、一刻も早く知る必要がある――そう言い放ち、キールはあなたを動かす。</p>
<p>門の衛兵は、つばの広い帽子をかぶった小さなやつなら通った、とあなたに告げる。そいつは補給船に乗ってファルコンネストへ向かったのだという。さらに衛兵はララフェルについての噂話を口にしかけて慌てて取り繕い、勤勉で善良な民だと持ち上げたうえで、忘れられた騎士亭の給仕の話まで持ち出して場を濁す。合流すると、キールはギギが正面の門から出たわけではないと判断し、ヒルディブランドは飛空艇乗り場で該当者を見なかったと報告する。</p>
<p>ファルコンネストと聞いてキールは凍てつく絶望へ戻るのかと悪態をつくが、ヒルディブランドはギギがどこへ行こうと追い、再び息子として抱きしめると誓う。そしてヒルディブランドは結論めいた推測を語る――ギギがあの氷雪の地へ戻った理由は、雪に戯れて悩みを風に飛ばすためだ、と。キールは信じがたく、壺を修復した直後、ギギは自分がマメットだと理解して陰鬱になり、荒れていたはずだと指摘する。むしろ、正体と目的を思い出したからこそ、異端の温床たる西クルザスへ帰り、街で得た情報を主のもとへ届けに行ったのだ――そうだとすれば、ついに嗅ぎ取れる異端の匂いだ、とキールは興奮を隠さない。</p>
<p>雪原でヒルディブランドは小さな足跡を見つけ、あなたに言う。あの足跡を見間違えるはずがない、ギギはこの先だ、と。ナシュは足跡すら愛らしいと喜び、からくり兵のものみたいだと笑う。キールは足跡が北へ伸びているのを見て、マメットは前哨地を出て川沿いに北へ向かったのだと断じ、異端者の一団と一緒に捕らえる日を待ちきれないと息巻く。ナシュはその言い方を嫌がり、うちの子なら異端者など正面から拒むはずだと言い返すと、ふと思い当たって、ギギはゴッドベルトに会いに来たのではないかと言い出す。以前、祖父があの芸を見たがるかもしれないと話したからだ、と。ヒルディブランドは名推理だと持ち上げるが、キールは、父を否定した相手に祖父母へ会いたがるのかと冷ややかに返す。</p>
<p>足跡の先で、あなたは雪の中に倒れたギギを見つける。帽子には氷の欠片が張りつき、小さく丸いものが高速でぶつかったような痕がある。ギギは頭を押さえてうめき、あなたを認めて、追ってきたのだなと言う。ヒルディブランドは祖父母と雪合戦がしたかったのだろうと早合点し、心配していたが無事でよかったと告げる。キールは近くの岩羊の死骸を引き合いに、ギギも同じように雪玉でやられたのではないか、損傷していないのかと疑う。ヒルディブランドはマンダヴィルは頑丈だと豪語し、頭から地面へ突っ込んだ回数を誇り始めるが、キールはその途中で気づく――ヒルディブランドが誰かに向かって頷いている、と。</p>
<p>振り返った先に現れたのはゴッドベルトだ。文明から遠く離れた場所で出会えるとは幸運だと笑い、先ほどまでジュリアンとの勝負に夢中で気づかなかったと詫びつつ、よければ加わらないかと誘う。ギギは歓喜して祖父の名を叫び、ナシュから聞いた「生と死の力」を本当だと思い込み、どうか命を与えて本当の少年にしてくれと懇願する。ゴッドベルトは覚悟を問い、少し痛むかもしれないと告げるが、ギギは耐えると叫ぶ。ゴッドベルトは槌を振るう準備を整え、ビエルゴに導きを乞う。ギギは望みどおりの体だと歓喜し、マンダヴィルの男になったと叫ぶが、次の瞬間、まるで元の姿へ戻ったかのように動揺する。キールは、壺のときと同じだ――奇跡的に元の形へ復元されたのだ、と叫ぶ。</p>
<p>ヒルディブランドは考え直したように、今の体こそギギにふさわしい、扱いやすいのだと言い、ナシュはさらに愛らしいと追い打ちをかける。ギギは不安を吐き出す――マメットのままでは、どうして息子として受け入れられるのか。ヒルディブランドは、マンダヴィルとは肉体ではない、活力と慈愛と名誉を備えた紳士だと語り、相手が人でも機械でも関係ないと言い切る。マメットと呼ばれたなら、目を見てこう言え――「否、私はマンダヴィル・マメットだ！」そしてヒルディブランドはゴッドベルトとジュリアンに、事情により相談できなかったがギギを正式に養子として迎え、マンダヴィル家の被後見人にしたと告げる。ゴッドベルトは喜ぶが、ジュリアンはマメットの祖母になるなど御免だと吐き捨て、愛する息子に思い知らせてやると息巻く。キールはその気配に震え、暗黒騎士の噂どころではない何かだと感じ取り、規則など知るかと内心で退く。だが少なくとも、マメットは存在の悩みを乗り越えたようだと息をつき、なぜ自分がそんなことを気にしているのかと苛立ちながら、手順に従って上官へ報告するのだと自分に言い聞かせる。</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>Cyr 先把話說清楚：你也同意 Gigi 是魔法人偶，對吧？你不會真的相信那些說法吧。Nashu Mhakaracca 卻完全往另一個方向想，她堅持 Gigi 關於「Papa Hildy」的話一定不是認真的，然後倒抽一口氣——那就代表，Gigi 以為她才是他的媽媽！？Hildibrand 不肯退讓，他說為人父母的路從來不平順，但他這位「最溺愛的監護人」一定會跨過這道難關，和他心愛的兒子重修舊好。</p>
<p>Cyr 不耐煩地把你們拉回重點：先把那個魔法人偶找回來。他要你去工坊區附近的城門盤問衛兵；他自己去 Arc of the Worthy；Hildibrand 和 Nashu Mhakaracca 去飛空艇停泊處。要是——戰女神保佑——Gigi 真的離開 Ishgard，你們得越早知道越好。Cyr 把分工交代完，就直接把你「打發去做事」。</p>
<p>你在城門的衛兵那裡得到線索：有個戴寬邊帽的小傢伙確實從這裡過去，還買了補給船的船票，目的地是 Falcon’s Nest。那名衛兵又尷尬地扯到 Lalafell 的各種傳言，話講到一半立刻改口說都是道聽塗說，甚至硬要誇 Lalafell 是勤奮又善良的人，還提起 Forgotten Knight 裡那位女侍的能幹，像是想用奉承把剛才的失言補回來。你們重新會合後，Cyr 判斷 Gigi 不是從正門離城；Hildibrand 也回報飛空艇停泊處沒看見任何符合描述的人。</p>
<p>一聽到 Falcon’s Nest，Cyr 立刻抱怨你們又得回那個凍到讓人絕望的地方。但 Hildibrand 發誓：無論 Gigi 去到哪裡，他都會追上去，把對方再一次抱回自己「兒子」的位置。Hildibrand 甚至下了結論：你們真正的目的地肯定不只 Falcon’s Nest，而是更遠的冰雪荒野——因為 Gigi 回去的理由只有一個：去雪地裡玩耍，把煩惱交給風帶走。Cyr 聽得滿臉不信，他提醒你：Gigi 前一刻才用神祕力量把花瓶修好，下一刻卻在認清自己是 mammet 後變得陰鬱又暴躁。Cyr 反而認定那像是「記起了自己是什麼、記起了自己的用途」；所以才回到 Coerthas 的冰原——那個他口中的 heresy 溫床——去找「主人」回報他在 Ishgard 蒐集到的情報，還說自己終於嗅到了那股「無可置疑的 heresy 氣味」。</p>
<p>你們追進 Coerthas Western Highlands，Hildibrand 看到雪地上的小腳印就篤定地說：他絕不會認錯，Gigi 往這邊走了。Nashu Mhakaracca 又被可愛擊中，說連腳印都像小小的機械隨從留下的。Cyr 更是興奮得像抓到把柄——腳印直接沿著河往北，他等不及要在「異端者」身邊逮到那個魔法人偶。Nashu Mhakaracca 立刻不爽他的語氣，反駁說要是她們的「小女孩」真的遇到 heresy 的人，肯定會直視對方、堅定拒絕。接著她忽然靈光一閃：也許 Gigi 是來找 Lord Godbert 的——畢竟她之前才說過，grandpapa 可能會想看看那個把花瓶修好的「把戲」。Hildibrand 立刻誇她推理精準，說這一定是想見祖父母；Cyr 卻冷冷回敬：就是那個剛剛否認你不是他父親的 Gigi？</p>
<p>你們沿著足跡繼續往北，終於在雪地裡找到倒著不動的 Gigi——他的帽子上黏著碎冰，像是被一顆高速飛來的小圓球砸中。Gigi 抱著頭呻吟，認出你們追了上來。Hildibrand 馬上把這當成「跟祖父母打雪仗」，說他剛才真的很擔心，但看到 Gigi 似乎沒事就放下心。Cyr 卻把附近死去的 steinbock 拿來對照，說看起來也是被雪球砸倒的，懷疑 Gigi 會不會因此受損。Hildibrand 立刻吹噓 Manderville 家的人頭鐵耐撞，說自己被從高處砸進地裡的次數不下二十多次——直到 Cyr 忽然注意到：你在點頭？然後他意識到，有人站在他背後。</p>
<p>那人正是 Godbert。他笑著說在遠離文明之地能碰上你們真是幸運，還道歉自己剛才沉浸在和 Julyan 的對決裡才沒注意到你們，接著邀你們一起加入。Gigi 立刻激動大喊「Grandpapa Godbert」，把 Nashu Mhakaracca 說的「掌握生死之力」當真，哀求 Godbert 賜他生命、把他變成真正的男孩。Godbert 先問他是否確定，提醒可能會有點刺痛；Gigi 卻說無論如何都會忍耐。於是 Godbert 開始動手，還喊著讓 Byregot 引導他的槌子。Gigi 狂喜自己終於得到完美的身體，甚至大喊自己是 Manderville man；可下一瞬間，他又像是被「還原」回原本的樣子，自己都驚愕不已。Cyr 震驚地說這根本就像花瓶那次——又一次被奇蹟般地復原成「原本的形態」。</p>
<p>Hildibrand 盯著 Gigi 看了又看，最後反而改口說：仔細想想，現在這個身體其實更適合你——比較「好掌控」。Nashu Mhakaracca 也立刻補一句：而且更可愛。Gigi 的不安終於說出口：如果他還是魔法人偶，要怎麼被當成 Hildibrand 的兒子接納？Hildibrand 回答得很直接：Manderville 不只是一副血肉之軀，而是活力、憐憫、榮譽——是任何時候都站得住的紳士；不管是人是機械都一樣。要是有人叫你魔法人偶，你就直視對方說——「不，我是 Manderville mammet(魔法人偶)！」接著 Hildibrand 轉向 Godbert 和 Julyan，承認自己來不及先商量，但情勢逼人，他已正式收養 Gigi，讓他成為 House Manderville 的受監護人。Godbert 聽得又驚又喜，甚至笑說終於等到「Grandpapa」和「Grandmama」這兩句；Hildibrand 也大笑稱當祖父母是人生一大樂事，然而 Julyan 立刻冷下臉，直接拒絕當魔法人偶的祖母，還揚言要把她那個「心愛的兒子」打醒。Cyr 在旁邊幾乎要崩潰，覺得那種氣勢比傳聞裡的暗黑騎士還可怕得多，決定不拿命去確認；但他也不得不承認，至少這個 mammet 看起來已經跨過了自己的存在危機。下一秒，他又立刻罵自己：你在說什麼，你幹嘛在乎一個魔法人偶的想法？他咬牙提醒自己別被傳染，照程序走、回去報告上級，一步一步來。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
