    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Y’shtola studies the land below Living Memory and judges the aether of this reflection far worse than you anticipated—so warped that she’d be shocked if the Ascians had not had a hand in the war that ruined it. G’raha Tia, mindful of how exposed you all are without the blessing of Light, calls the warding scale a true godsend and vows to send Vrtra and the Hannish alchemists his thanks yet again. Sphene can only stare at the vast scar in the earth and say it out loud: the crater was once Alexandria.</p><p>Krile searches the horizon and finds nothing—no structures, no sign of survivors. Sphene suspects the crater’s presence would have made the area prone to flooding, leaving it unfit for settlement. If you’re now on the edge of Alexandrian territory, she says, the nearest city would be Treno—if it survived. Treno was a harbor city-state and a hub of trade, neutral through the war, and Alexandria always counted itself lucky to have it close by. Y’shtola compares it to Radz–at–Han, and when Sphene mentions it, she connects it to another thread: Alphinaud once told her Radz–at–Han lies near the southern sea isles—the Milalla homeland. Then she adds something that snaps Krile’s attention fully into place: in the Ninth, it was Treno where the Milalla first found a home.</p><p>You try the simplest answer—fly. But Clerk PX-0093 runs a simulation and returns a near-certain outcome: ambient lightning would destroy the ship before it reached Treno. With the air route closed, you accept the harder one. G’raha Tia says you’ll have to walk. Sphene points beyond the mountains and chooses a path that might spare you a climb: a cave system, assuming it hasn’t collapsed. She warns you to stay alert—beasts in a barren land will be hungry.</p><p>When you finally emerge into Treno, a voice over a linkpearl announces the perimeter is clear and thanks “our helpers,” leaving Krile rattled at the thought you were observed. Yet the city is real—standing, and in far better condition than expected. The people must have labored relentlessly to keep it that way. Sphene notes a barrier like Alexandria’s, but smaller—and less reliable, judging by the breach you just helped contain.</p><p>Then the mayor appears: Miayli, astonished to see visitors after so many years, and even more stunned to meet Sphene in person. She admits she’d heard a strange report long ago—that Alexandria’s queen had not aged a day—and now, face-to-face, it’s as if Sphene stepped out of an old portrait. Miayli asks the question everyone here has been forced to carry: what happened to Alexandria? Sphene realizes that from Treno’s perspective, Alexandria simply vanished—contact cut, a scout report returning with impossible news: the barrier was gone, and the city itself gone with it, not even a stone left behind.</p><p>Sphene answers carefully, with grief and steadiness both in her voice: Alexandria yet survives, though far away, and so do her people. She asks permission for you to remain in Treno for a time, and Miayli welcomes you warmly, inviting you to the town hall. Y’shtola chooses to accompany them—not only for duty, but to watch whether Sphene’s condition remains stable—while giving you the freedom to explore. Krile introduces herself as well, asking to learn about the city and its people and to help where she can. Miayli points you to her grandson, Lumull, who is distributing herbal remedies after the breach.</p><p>You find Lumull quickly—partly because the herbal scent reaches you before his voice does. He’s cheerful, grateful, and immediately insists you drink Treno’s “signature remedy”: Sleepless Rhapsody. He warns you not to wander off before you drink it, and—oddly—not to turn your back. With no graceful escape, you down the cup under his watchful eye. It’s… sharp. Sour enough to make your face twist. Lumull declares that means it’s working. Krile compares it to a “nutritious” gelatin she once suffered through at the Studium, while G’raha Tia recalls other infamous tonics—black as pitch, sour as sin—yet undeniably effective.</p><p>Once the laughter settles, Lumull explains what matters: the remedy stimulates the body’s processing of aether, hastens recovery, counteracts some effects of excessive lightning, and calms the nerves. Krile immediately understands why he serves it after barrier breaches. Lumull says the recipe is a traditional Milalla remedy—one of many natural medicines their ancestors developed in their original, lush homeland—and Treno strives to preserve those traditions here. Krile finds a strange comfort in that continuity: a Milalla custom kept alive so far from where the Milalla began, and still strong enough to pull strangers into the same ritual with a single shared cup.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>ヤ・シュトラはリビング・メモリーの下に広がる荒廃を見渡し、この反射世界の乙太状態は想定以上に深刻だと断じる。これほどまでに歪んだ原因を思えば、アシエンがこの戦争に関与していなかったとしたら、むしろ驚きだという。グ・ラハ・ティアは、光の加護を持たない自分たちにとって防護鱗がまさしく救いであると語り、改めてヴリトラとハヌの錬金術師たちへ礼を尽くさねば、と言う。スフェーンは大地の傷跡を見つめ、「あのクレーターは……かつてのアレクサンドリア……」と呟く。</p><p>クルルは周囲を見回すが、建造物も生存者の痕跡も見当たらない。スフェーンは、クレーターの存在が浸水の危険を増し、この一帯を居住に不向きな土地にしたのだろうと推測する。ならばもっと遠くを探すべきだ。どこへ向かえば集落があるか――スフェーンは、今がアレクサンドリア領の端なら最も近い都市はトレノだと言う。港に築かれた都市国家で交易の要であり、戦争の間も中立を保ったため、アレクサンドリアは「近隣にあってくれて幸運だった」と感じていた、と。</p><p>ヤ・シュトラはそれをラザハンになぞらえ、スフェーンはアルフィノから聞いたラザハンの話へと繋げる。南方の海洋諸島の近く――ミララの故郷に近いのだろう、と。そしてスフェーンはさらに、ミララがこの世界で最初に根を下ろしたのもトレノだったと語る。クルルは息を呑み、思わず問い返す。</p><p>だが空路は閉ざされる。端末が航路をシミュレーションした結果、周囲の雷環境により到着前に致命的な機械故障に至る確率がほぼ百％だと告げられるのだ。飛べないなら歩くしかない。スフェーンは山の向こうにあるトレノへ、登攀を避けられるかもしれない洞窟網を提案する。崩落していないことを祈りつつ、荒れ地の獣は飢えているはずだから警戒を怠るな、と注意を促す。</p><p>やがてトレノへ辿り着くと、リンクパール越しに「周囲はクリアだ」「助っ人に感謝を」と声が響き、クルルは監視されていたのかと身構える。だが都市は確かに存続し、想像以上に整っていた。外界の破壊を思えば驚くほどで、人々が維持にどれだけ尽力してきたかが窺える。スフェーンは、アレクサンドリアに似たバリアを確認するが規模は小さく、先ほどの侵入が示すとおり完全ではない――こうした事態は日常茶飯事なのだろう、と。</p><p>そこへ現れたのが市長のミャイリだ。久方ぶりの来訪者に驚きつつ、スフェーンを前にしてなお驚愕する。かつて「年月が経っても女王が歳を取らない」という奇妙な報せを聞いたことがあると言い、今の姿はまるで古い肖像画から抜け出してきたかのようだと口にする。ミャイリは問いかける――アレクサンドリアに何が起きたのか。トレノの側から見れば、ある日突然連絡が途絶え、調査隊が戻って「バリアも都市も消えていた」「跡形もない」と報告したのだ。</p><p>スフェーンは、その苦しみを思いやりながらも答える。アレクサンドリアは滅びていない。遠い地にありながら、都市も民も生きているのだ、と。まずはトレノにしばらく滞在する許可を求め、ミャイリは快く迎え入れて役場で話そうと提案する。ヤ・シュトラは同行して、スフェーンの状態が安定しているか見極めると言い、残りの者には市内を見て回るよう促す。クルルは自らも名乗り、街と人々を知りたい、必要があれば共に働きたいと申し出る。ミャイリは孫のルムルを紹介し、彼は薬草のレメディを配っているという。</p><p>ルムルは陽気で、礼を述べるや否や「名物レメディ」のスリープレス・ラプソディを飲めと迫る。初杯だから遠くへ行くな、背を向けるな――妙に念を押され、逃げ道のないまま見届け役の前で飲むことになる。酸味の強さに顔が歪むが、ルムルは「効いている証拠だ」と胸を張る。クルルはスチュディウムで出された“栄養がある”と言い張られたゼリーを思い出し、グ・ラハ・ティアは黒くて酸っぱい疲労回復シロップの記憶を語りつつ、それでも効果だけは確かだと認める。</p><p>そしてルムルは要点を明かす。このレメディは乙太の処理を促して回復を早め、過剰な雷の影響を和らげ、神経も落ち着かせる。クルルは、だからバリア侵入のたびに振る舞うのだと理解する。ルムルは「ミララに伝わる伝統のレシピ」だと言い、故郷の豊かな土地で培われた自然療法を、ここトレノでも守り続けているのだと誇らしげに語る。クルルは、遠く離れてなお受け継がれるその習わしに、奇妙な安心を覚えるのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> クルル <small class="muted">(アレクサンドリア・クレーター, X:5.8, Y:6.3)</small></div></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>Y’shtola 看著這片荒蕪的大地，判斷這個鏡像世界的乙太狀態比你們預想得更糟，糟到她若要相信 Ascians 沒有插手，反而才奇怪。G’raha Tia 則把目光放在你們能活著站在這裡的理由上：對沒有光之加護的人來說，防護鱗簡直是救命恩物；他要你記得再一次好好向 Vrtra 與 Hannish 的煉金術師致謝。Sphene 望著那道巨大凹陷，聲音幾乎像被掏空一樣：那個巨坑……曾經就是 Alexandria。</p><p>Krile 四下尋找，卻看不到任何建築，也沒有生還者的跡象。Sphene 推測巨坑讓這一帶更容易淹水，因此不適合居住；既然如此，你們就該往更遠的地方找。Krile 問她：要往哪個方向才可能遇到聚落？Sphene 說，如果你們現在位於 Alexandria 領域的邊緣，那最近的城市應該是 Treno——前提是它還存在。那是一座建在港口上的城邦，曾是貿易樞紐，且在戰爭期間保持中立；Alexandrians 一直慶幸它就在「隔壁」那種距離。Y’shtola 說這聽起來很像 Radz–at–Han。</p><p>提到 Radz–at–Han，Sphene 立刻接上 Alphinaud 以前說過的話：那裡靠近南方海島——Milalla 的故鄉，對嗎？接著她又丟出一個讓 Krile 心臟猛地一縮的關鍵：在第九世界，Milalla 最初落腳的地方，正是 Treno。Krile 不敢置信地追問，而 Sphene 說得更確定：即使後來 Milalla 的族群散居各地，多數人仍與 Treno 保持強烈連結；她甚至希望直到今日，仍有人留在那裡。</p><p>你們先嘗試最省力的方式——搭船飛過去。可 Clerk PX-0093 的航線模擬結果幾乎是宣判：因周遭落雷環境，飛空艇在抵達前發生毀滅性機械故障的機率接近百分之百。既然飛不了，那就只能走。G’raha Tia 把結論說得乾脆；Sphene 則指出 Treno 在山脈另一側，但應該有不必攀登的路線——像那套洞窟通道，只要它還沒坍塌。她要你們先往那裡試，並提醒保持警戒：在如此貧瘠的地帶，野獸肯定飢餓難耐。</p><p>穿越漫長的路，你們終於抵達 Treno。你才剛踏進城邊，就聽見有人透過 linkpearl 宣布外圍已清、並向「幫忙的好心人」道謝；Krile 當場緊張起來——你們剛才被監視了嗎？但眼前的現實讓人更震撼：城市確實撐了下來，而且比想像中完整太多。G’raha Tia 說，考慮到外界的毀滅，這簡直不可思議；能維持到這種程度，居民一定付出了驚人的努力。Sphene 注意到 Treno 也有類似 Alexandria 的屏障，但規模更小、效果也不如你們熟悉的那一道，剛剛你們親眼見到的破口就是證明，她擔心這樣的狀況在這裡恐怕很常見。</p><p>就在這時，市長 Miayli 出面迎接。她說多年未見訪客，能見到你們已經夠震撼；而當她確認眼前人就是 Sphene，更是難以置信。Miayli 坦白自己曾聽人回報：有人去過 Alexandria，卻說那位女王多年不老；如今親眼所見，Sphene 彷彿剛從古老油畫裡走出來一樣。她一邊努力適應，一邊恭敬地請求：希望能聽 Sphene 親口說出那段故事——因為在 Treno 的視角裡，Alexandria 是「突然消失」的：某天開始失去聯繫，派出偵查隊回來卻回報屏障消失、城市也消失，連一塊石頭都沒留下。</p><p>Sphene 聽完先承認：在你們眼裡，Alexandria 確實像是從星球表面被抹去。她也理解那段時間的不安與痛苦，然後才把話說清楚，Alexandria 其實仍然存在，只是遠在他方；城市與人民都活著。她提出請求：能否讓你們在 Treno 暫留一段時間？Miayli 立刻答應，說你們才剛幫忙解決「怪物小麻煩」，當然應該享受 Treno 的款待，並邀你們到市政廳再談。Y’shtola 表示自己會同行，一方面是聽細節，另一方面也要確認即使做了各種預防，Sphene 的狀態是否仍能穩定；而你們其他人則更適合趁機在城裡走動，當作她的「允許」。</p><p>Krile 也自我介紹，說自己想更了解這座城市與居民，並希望能一邊協助、一邊提問——只要不冒犯。Miayli 說 Treno 的人向來友善，至於需要幫忙的事，你們可以先去找她孫子 Lumull——剛才在 linkpearl 裡指揮的就是他；他正在把草本藥劑分給其他人。</p><p>你們很快找到 Lumull，甚至不用靠眼睛：光是靠近就聞得到濃烈的草本香氣。Lumull 熱情得近乎強勢，開口就要你們喝 Treno 的招牌藥劑「Sleepless Rhapsody（提神藥飲）」。他保證不會傷身，但強調「第一次喝」最好別離太遠才喝，還特別叮囑別背對他——聽起來古怪得像某種儀式。你們幾乎別無選擇，只能在他盯著的狀態下把那杯吞下去；味道酸得刺人。Lumull 卻拍手說「這代表有效！」Krile 想起自己在 Studium 吃過那種被稱作「營養」的果凍；G’raha Tia 也說這讓他想到 Lyna 做過的黑色酸苦糖漿——難喝得要命，但消除疲勞確實有一套。</p><p>玩笑過後，Lumull 把關鍵講得很清楚：這藥劑能刺激身體處理乙太的能力、加速恢復，還能抵銷一部分「過量雷」對身體造成的影響，並安撫神經。Krile 立刻推論：所以每次屏障發生 breach，你們就會讓大家喝它。Lumull 點頭，並補充這是傳統的 Milalla 配方——Milalla 的祖先來自更富饒的土地，因此發展出各種自然療法；Treno 只是努力把那些傳統延續下去。Krile 聽著，忽然有種說不出的踏實：在這片被雷吞噬的世界裡，某些東西竟仍能以「味道」與「習慣」的形式，被一代代守住。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
