<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`A New Challenger Appears`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You are found at last by a sharply dressed stranger who greets you with theatrical certainty, declaring that you were born to be a star. He introduces himself as Metem, head of strategic management at Ascension Arcadia—Solution Nine’s premier entertainment enterprise—and tells you their flagship facility, the Arcadion, is a combat arena that hosts the Ascension Arcadia Championship, the pinnacle for fighters in Alexandria.</p><p>Metem explains that circumstances forced the arena to close for a time, but the moment has come to reopen its doors. Her Majesty’s tragic passing has left the citizens disconsolate, and Ascension Arcadia hopes that gripping entertainment will help them forget their cares—if only for a while.</p><p>To do that, he says, the people cannot be shown what they have seen countless times before. They need something new—someone new. And who could be better than the one who protected the citizens from the king’s army, and struck down the king himself? Metem presses the point until you give a quiet assent, then beams and adds that the president of the federation has marked you as the Arcadion’s next great star.</p><p>He paints a vivid picture: an upstart—the people’s protector—steps into the spotlight and challenges the Arcadion’s mightiest, rising through the ranks to become grand champion. And, he promises, you will be well compensated—fine equipment awaits after each victory. You needn’t decide at once, he says, but if you wish to test your strength and win rich rewards, you should go to the Arcadion at the end of the avenue. With that, he takes his leave, looking forward to your answer.</p><p>At the Arcadion, an attendant receives you as expected and leads you onward to Metem. When you arrive, he welcomes you as though the decision is already made—then pauses as several fighters size you up with sharp words, dismissing you as someone who cannot last without being a soulshifter, teasing you with anticipation, or threatening to blow you out of the ring. Metem hurriedly smooths it over, urging you not to take offense and calling it their way of welcoming you.</p><p>He resumes his explanation: the Ascension Arcadia Championship is a fighting competition where the realm’s mightiest duke it out to become grand champion. The Arcadion’s fighters are divided into three tiers—light-heavyweight, cruiserweight, and heavyweight—and the ultimate objective is to become the undisputed champion across them all. As a rookie, your campaign begins in the light-heavyweight tier, where you must defeat three rivals ranked there.</p><p>Then Metem turns to what he calls a most important matter: the Arcadion maintains its own repository of feral souls, which fighters utilize in battle—souls so potent they alter a fighter’s very form. The potency of the souls employed is what separates the three tiers. He notes that you do not use a regulator, and even when you faced the king, you relied on no souls at all—an impressive feat. Yet, he argues, it would be unfair for you to compete with nothing to balance the scales.</p><p>So Metem proposes a solution: the Arcadion also keeps the souls of former champions, and they will use them to create allies who will fight alongside you. To make those allies work with you seamlessly, they will draw upon your memories to fine-tune their appearance and abilities to your liking. When you voice misgivings about using souls for entertainment and insist the souls should be set free, Metem admits he expected such reservations from those who come from outside the barrier—and offers an incentive: for each victory you claim, he will release the souls of those who fought beside you. Under those terms, you agree, and Metem, satisfied, officially welcomes you as a fighter of the Arcadion, telling you that when you are ready to take to the arena, you need only say the word.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Stylish Stranger <small class="muted">(Solution Nine, X:19.1, Y:18.8)</small></div></div>`,
    unlockq:`<div class="stack">

  JP:{
    langLabel:'JP',
    pageTitle:'アルカディアの挑戦者',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>あなたの前に現れた洒落た身なりの人物は、ようやく見つけたと言わんばかりに声を弾ませ、「あなたはスターになるために生まれてきた」と断言する。彼はソリューション・ナインにおける娯楽事業の最大手、アセンション・アルカディアの戦略管理担当責任者メテムだと名乗り、同社の旗艦施設である闘技場「アルカディオン」で「アセンション・アルカディア選手権」を開催していると告げる。それはアレクサンドリア最強の闘士たちが集う、頂点の舞台だという。</p><p>メテムは、事情によりしばらく閉ざしていた闘技場の扉を、いまこそ再び開くべき時だと語る。陛下の急逝は市民の心に深い影を落とし、だからこそ胸を熱くする娯楽によって、しばし憂いを忘れてもらいたいのだと。</p><p>しかし、同じものを何度見せても人々は熱狂しない。必要なのは「新しさ」――「新しい誰か」だ。そこでメテムは、かつて王の軍勢から市民を守り、ついには王そのものを討ち倒した人物こそ相応しいとあなたを指し示す。あなたが肯定すると、彼は満面の笑みを浮かべ、連邦大統領があなたを次なる大スターとして指名したのだと言い切った。</p><p>彼は情景を誇らしげに描く。生身の挑戦者、民の守護者がリングに立ち、アルカディオン最強の闘士たちへ挑み、階級を駆け上がって統一王者へ――これ以上に人々を惹きつける物語があるだろうか、と。報酬も申し分ないと続け、勝利のたびにソリューション・ナインが誇る最高の装備が与えられると約束する。即答は不要だが、力試しと報奨を望むなら大通りの突き当たりにあるアルカディオンへ来てほしい、と告げて彼は立ち去った。</p><p>あなたがアルカディオンを訪れると、係員はあなたを待っていたように迎え、メテムのもとへ案内する。到着したメテムは、あなたが来たことをもって参加の意思表示だと受け取り、説明を始めようとする――その矢先、複数の闘士があなたを値踏みし、ソウルシフターでなければ長くはもたない、舞台で会うのが楽しみだ、リングの外へ吹き飛ばしてやる、と口々に挑発する。メテムは慌てて取り繕い、彼らなりの歓迎だと思って気にしないでほしいとあなたに頼んだ。</p><p>そして彼は改めて語る。アセンション・アルカディア選手権は、各地の強者が覇を競い「統一王者」を目指す格闘競技であり、闘士たちはライトヘビー級、クルーザー級、ヘビー級の三階級に分かれている。目標は全階級で無敗の王者となり、真の統一王者へと至ること。新人であるあなたは、まずライトヘビー級で同階級に名を連ねる三人のライバルを倒さねばならない。</p><p>さらにメテムは最重要事項として、アルカディオンには闘技で用いられる凶獣の魂を保管する設備があり、その魂の力は闘士の姿すら変えてしまうほど強大だと説明する。階級の違いも、用いる魂の強さで分けられているという。あなたがレギュレーターを使わず、王と相対した際も魂に頼らなかったことを称えつつ、それでは釣り合いが取れず不公平だとも言う。</p><p>そこで彼は、かつての王者たちの魂を用いて、あなたと共に戦う味方を作り出す案を示す。あなたの記憶を参照し、外見や能力をあなた好みに調整して、連携を万全にするのだと。あなたが魂を娯楽に使うことへの抵抗を示し、魂は解放されるべきだと告げると、メテムはバリアの外から来た者ならそう感じるだろうと頷き、追加の条件を提示する。あなたが勝利を重ねるたび、共に戦った魂を解放する――その役目を担う新たなスターになってほしい、と。あなたが同意すると、メテムは満足げにあなたをアルカディオンの闘士として正式に迎え入れ、準備が整い次第、ひと言で闘技場へ案内すると告げた。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> ラングラーハットの男 <small class="muted">(ソリューション・ナイン, X:19.1, Y:18.8)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="dawntrail.html">黄金のレガシー</a></div>
      <div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-claw-in-the-dark.html">爪研ぐ猫魂</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'阿卡迪亞的新挑戰者登場',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你在 Solution Nine 被一名打扮體面的陌生人攔下。他像是終於找到目標般興奮地喊著「總算找到你了」，甚至斷言你天生就該站上舞台。他自稱是 Metem——Ascension Arcadia 的戰略管理主管；而 Ascension Arcadia 是 Solution Nine 首屈一指的娛樂企業。他告訴你，他們的旗艦設施是 Arcadion，一座格鬥競技場，並在那裡舉辦 Ascension Arcadia Championship——Alexandria 眾多鬥士夢寐以求的最高舞台。</p><p>Metem 說，Arcadion 先前因情勢不得不暫時關閉，但現在時機成熟，應該重新開門。女王陛下的不幸逝世讓市民陷入低落與悲傷；因此，他們希望用令人屏息的娛樂，讓大家至少能短暫忘卻煩憂。</p><p>但要達到那樣的效果，就不能再端出人們看了無數次的老戲碼。Metem 強調，他們需要「新的東西」——「新的人」。而最合適的人選，正是那位曾保護市民免受國王軍隊侵害，甚至親手擊倒國王的人。當你以動作承認時，他立刻喜形於色，表示連邦總統已將你選定為 Arcadion 下一位最耀眼的新星。</p><p>他讓你想像那個畫面：一個新出現的挑戰者——人民的守護者——踏入舞台，向 Arcadion 最強的鬥士發起挑戰，沿著排名一路向上，最終成為總冠軍。這樣的故事，怎可能不讓人熱血沸騰？而你也會獲得豐厚報酬——每一次勝利之後，Solution Nine 所能提供的頂尖裝備都在等著你。Metem 說你不必立刻做決定；若你願意試試身手、贏取回報，就到這條大道盡頭的 Arcadion，會有人帶你進去。說完，他便告辭，期待你的回覆。</p><p>你抵達 Arcadion 後，接待人員一見到你便表示 Metem 早已等候，隨即帶你前往與他會面。當你走進去時，Metem 立刻以「你來了」的語氣迎接你，彷彿你已經答應參賽；然而他話還沒說完，幾名鬥士便先一步出聲挑釁——有人冷哼你看起來或許能打，但不是 soulshifter 就撐不了多久；有人帶著輕佻的興致，說很期待在舞台上與你相遇；也有人用粗暴的語氣威脅要把你轟出擂台。Metem 連忙打圓場，說他們只是性格鮮明，請你別放在心上，把那當成他們的歡迎方式。</p><p>接著他正式說明：Ascension Arcadia Championship 是一場格鬥競賽，來自各地的強者為了成為總冠軍而互相角逐。Arcadion 的鬥士分成三個量級：輕重量級、次重量級、重量級；最終目標是成為三個量級都無可爭議的冠軍，進而登上總冠軍之位。至於你這名新手，將從輕重量級起步，必須先擊敗同量級排名中的三名對手。</p><p>就在此時，Metem 提到一件他認為最重要的事：Arcadion 擁有一座專門存放兇猛靈魂的庫藏，鬥士在戰鬥中會使用那些靈魂，而其力量甚至能改變鬥士的外形。三個量級的區分，正是取決於所使用靈魂的強度。他也表示，聽說你不使用調節器；就連面對國王時，你也完全不依賴任何靈魂——這確實令人佩服。但他認為，若讓你在毫無「平衡手段」的狀態下參賽，反而會變得極不公平。</p><p>因此 Metem 提出方案：Arcadion 也保存著歷代冠軍的靈魂，將用它們為你製作能並肩作戰的「臨時替身」，作為你的同伴。為了讓這些同伴能與你配合得天衣無縫，他們還會借用你的記憶，依照你的喜好調整外貌與能力。當你表達抗拒，認為把靈魂用於娛樂不對、靈魂應該被釋放時，Metem 說他早料到來自屏障之外的人會有顧慮，於是提出額外條件：你每贏得一場勝利，他就釋放一次那些與你並肩作戰的靈魂。你在這樣的條件下點頭同意，Metem 也滿意地正式歡迎你成為 Arcadion 的鬥士，表示只要你準備好踏上擂台，開口就行。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 牛仔帽的男人 <small class="muted">(九號解決方案, X:19.1, Y:18.8)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="dawntrail.html">黃金的遺產</a></div>
      <div class="row">任一戰鬥／魔法職（不含限制職業）Lv.100</div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-claw-in-the-dark.html">暗處磨爪的貓魂</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
