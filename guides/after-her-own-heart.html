    story:`<div class="clamp" data-collapsed="true">
<p>Wymond gives you a weary look and says you might as well go after Hildibrand—he’ll be disappointed if you don’t. The woman involved is Yellow Moon, a lady with expensive tastes who’s usually being fitted for something at the Weavers’ Guild. With that, he wishes you luck with the “investigation,” sounding as though he already regrets encouraging any of this.</p>
<p>You find Yellow Moon distraught over her beloved wand, Pure Heart—elegant, refined, and unlike any you’ve ever seen. Before you can say much, Hildibrand sweeps in and turns her grief into a grand call to justice, swearing—here and now—that he will search all creation, from the deepest pit of the seven hells to the highest pinnacle of the heavens, to return it to her. Nashu promptly echoes his vow with an enthusiastic “What he said!”</p>
<p>When you ask what happened, Yellow Moon explains it wasn’t only Pure Heart—several belongings have gone missing lately. She’s certain she had the wand when she left home, but after browsing fashions at Sunsilk and watching a match at the Coliseum, she realized it was gone. With no clear time or place, Hildibrand declares there is only one logical course: to draw the clues from her memories, you must reenact her day—starting with Sunsilk.</p>
<p>At Sunsilk, you press her for every detail. Yellow Moon insists nothing unusual happened—then admits a man approached her and confessed his undying love. Startled, she dropped her purse onto his foot—she insists it was shock, not intent—and he cried out and fled. Hildibrand seizes on the strangeness of the encounter, then decides it must be unrelated to the theft and urges you onward to the Coliseum.</p>
<p>At the Coliseum, her story repeats with a darker punchline: a gladiator came up from behind and confessed the same undying love. Again she whirled and struck him with her purse—again “in shock”—and this time the weight of it was enough to knock him unconscious. Hildibrand marvels at her strength and immediately tries to shape it into a motive, convinced someone must have targeted her out of resentment. Meanwhile, Nashu can’t ignore how many huge crates you’ve seen around town—at the Weavers’ Guild, at Sunsilk, and here as well.</p>
<p>As Hildibrand demands silence to “focus,” Nashu turns to you with a bright, reckless solution: explosives. She urges you to blast the suspicious crates open, eager to see what’s inside. The answer comes with a groan—there are people crammed in there—and among them is Yellow Moon’s Pure Heart, unmistakable even in the chaos.</p>
<p>Hildibrand launches into a triumphant deduction, declaring that a rejected gladiator, wounded in pride, must have taken revenge by stealing Yellow Moon’s wand. But the men from the crates insist they aren’t thieves—they’re devotees, hiding in boxes to keep Yellow Moon “safe,” and collecting her misplaced items for “safekeeping.” Yellow Moon recoils in fury at the confession of stalking, while Hildibrand tries to twist the discovery into proof that these “fiends” are behind the weapon thefts.</p>
<p>A cold voice cuts him off: the thefts were committed by a single duelist—one who takes weapons only after defeating victims in single combat—and these box-bound fools could never manage that. A well-informed woman steps forward and introduces herself as Ellie, a reporter for the Mythril Eye who’s been investigating for weeks. She offers to introduce you to one of the duelist’s victims, and Hildibrand eagerly accepts—only for Ellie to snap at him when he tries to rush ahead before she can even finish telling you the man’s name.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>ワイモンドはあなたに、「あいつを追いかけたほうがいい」と言う。追いかけないとヒルディブランドががっかりするだろう、と。相手の名はイエロー・ムーン。上質なものを好む女性で、ふだんは裁縫師ギルドで仕立ての相談をしていることが多いらしい。ワイモンドは渋い顔のまま、捜査の幸運を祈る。</p>
<p>裁縫師ギルドで出会ったイエロー・ムーンは、愛用の杖「ピュアハート」を失って泣き崩れていた。そこへヒルディブランドが現れ、彼女の悲嘆を正義の号令へと変える。七大地獄の底から天の頂まで、あらゆる場所を捜し尽くして必ず取り戻す――そう誓い、ナシュ・マカラッカも勢いよく同調する。</p>
<p>あなたが事情を聞くと、イエロー・ムーンは「ピュアハート」だけでなく私物がいくつも消えていると打ち明ける。家を出た時は確かに持っていたのに、織物「サンシルク」を見て回り、コロセウムで試合を観戦したあと、気づけばなくなっていたという。時間も場所も不明なら、記憶の奥から手がかりを引き出すしかない――ヒルディブランドはそう断じ、当日の行程を再現するため織物「サンシルク」へ向かう。</p>
<p>織物「サンシルク」で、あなたは当日の様子を細部まで語らせる。イエロー・ムーンは「特別なことは何も」と言いかけて、見知らぬ男に突然、永遠の愛を告白されたことを思い出す。驚いて財布を落としてしまい、男の足を踏みつける形になって悲鳴を上げさせ、男は逃げ去った。ヒルディブランドは異様な出来事だと受け止めつつも、盗難とは無関係だろうと切り捨て、次はコロセウムへ行こうと言う。</p>
<p>コロセウムでの記憶も、同じように始まっていた。背後から近づいた剣闘士が、やはり永遠の愛を告白してきたのだ。驚いたイエロー・ムーンは振り向きざまに財布で相手の顔を打ち、その財布は大金ゆえに重く、相手は気絶したという。ヒルディブランドは彼女の剛腕に目を見張り、だからこそ恨みを買ったのだと推理を膨らませる一方、ナシュ・マカラッカは町じゅうに大きな木箱が置かれていることを気に掛ける。</p>
<p>「集中の邪魔をするな」と言い張るヒルディブランドをよそに、ナシュ・マカラッカはあなたに爆薬を差し出す。木箱の中身が気になって仕方がないらしく、開けて確かめようと促す。爆破のあとに聞こえたうめき声が答えだった――木箱の中には人が潜んでおり、その場にはイエロー・ムーンの「ピュアハート」もあった。</p>
<p>ヒルディブランドは勝ち誇った口調で、告白して拒まれた剣闘士が屈辱を晴らすため、イエロー・ムーンから杖を奪ったのだと結論づける。だが木箱の男たちは盗賊ではないと叫び、自分たちは「信徒」で、イエロー・ムーンを守るためにこっそり見守り、落とし物を回収していただけだと言い張る。イエロー・ムーンは激怒し、ヒルディブランドはなおも木箱の連中を武器盗難の犯人扱いしようとする。</p>
<p>そこへ冷たい声が割り込む。武器盗難は決闘で勝った者だけが武器を奪う「決闘士」の犯行であり、木箱の連中にそんなことができるはずがない――そう言い放ち、情報通の女性が名乗る。彼女は経済紙「ミスリルアイ」の記者、エリー。数週間にわたり事件を追ってきたというエリーは、あなたに決闘士の被害者を紹介すると申し出る。ヒルディブランドが喜んで飛びつくと、エリーはまだ肝心の名前すら話していないのに行こうとする彼を叱りつける。</p>
</div>

    langLabel:'繁體中文',
    pageTitle:'苦戀的悲哀',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },

    story:`<div class="clamp" data-collapsed="true">
<p>Wymond 看著你，像是早就預料到會變成這樣，乾脆要你去追 Hildibrand——你不追，他肯定會失望。被害人叫 Yellow Moon，是個偏愛精緻事物的女人，幾乎每天都會在 Weavers’ Guild 做衣服或試穿。Wymond 嘆了口氣，叫你祝你好運，語氣像是在送你去惹麻煩。</p>
<p>你在 Weavers’ Guild 找到 Yellow Moon，她為了心愛的 wand「Pure Heart」哭得上氣不接下氣。你還沒來得及細問，Hildibrand 就闖了進來，把她的悲傷當成正義的號角，當場發誓就算翻遍七大地獄最深處到天穹最頂端，也要把「Pure Heart」找回來。Nashu Mhakaracca 立刻在旁邊補上一句，彷彿那句誓言也算你說過。</p>
<p>你請 Yellow Moon 說清楚狀況，她卻告訴你，被偷的不只「Pure Heart」，近期連其他私物也陸續不見。她很確定出門時還帶著 wand，但在 Sunsilk 逛完、又到 Coliseum 看了比賽之後，回過神來就發現它消失了。時間與地點都說不準，Hildibrand 便宣稱唯一合理的做法，是把那天的行程重新走一遍，好把線索從記憶裡「逼」出來——第一站就是 Sunsilk。</p>
<p>到了 Sunsilk，你要她把當天的細節說完整。Yellow Moon 一開始說沒什麼異常，卻又想起有個男人忽然上前，對一個陌生人告白什麼「不朽的愛」。她被嚇到，手一鬆就把 purse 掉到對方腳上——她強調是出於驚嚇，不是故意——那人痛得叫了一聲就逃走。Hildibrand 聽完先認定這很不尋常，卻又馬上判斷與失竊無關，催你們改去 Coliseum。</p>
<p>在 Coliseum，她的回憶再次出現同樣的情節：這次是個 gladiator 從背後靠近，也對她告白什麼「不朽的愛」。她一轉身就用 purse 打了對方的臉——同樣說是驚嚇反射——偏偏那天她帶了巨額金錢，purse 重得驚人，一擊就把人打昏。Hildibrand 不只驚嘆她的力氣，還立刻把這一切扭成動機，說她正因為太強才會被盯上、被怨恨。Nashu Mhakaracca 卻注意到另一件事：Ul’dah 到處都是巨大的 crates——Weavers’ Guild 有、Sunsilk 有、這裡也有。</p>
<p>Hildibrand 要所有人退後，說他正要解開謎團、不能被打擾。Nashu Mhakaracca 卻轉向你，興致勃勃地把 explosives 塞到你手上，叫你把那些 crates 炸開看看，說一定「很好玩」。爆裂聲後傳來痛苦的呻吟——crate 裡竟然藏著人，而在混亂中，你也看見 Yellow Moon 的「Pure Heart」就在其中。</p>
<p>Hildibrand 立刻高聲宣告自己的推理：被拒絕又遭到羞辱的 gladiator 心生怨恨，便偷走 Yellow Moon 的 wand「Pure Heart」作為報復。可 crate 裡的男人急忙辯解，說他們不是 thief，而是 devotees——Yellow Moon 是他們的「太陽與星辰」，他們只想守著她不受傷害；若她不小心弄丟什麼，他們就先收起來「保管」，絕無惡意。Yellow Moon 這才明白自己被跟蹤，憤怒得發抖；Hildibrand 卻還想把這些人硬說成近期武器失竊的犯人。</p>
<p>一個冰冷的聲音當場打斷他：近期的 weapon thefts 是同一個 duelist 所為——他只會在 single combat 擊敗對手後奪走武器，而這群躲在盒子裡的傢伙根本不可能做到那種事。隨後，一名看起來消息靈通的女人現身，自稱 Ellie，是 Mythril Eye 的 reporter，並說她已經追查這些事件好幾週。她提出要帶你們見一位 duelist 的受害者，Hildibrand 馬上興奮地答應，卻在 Ellie 連那個男人的名字都還沒說出口前就想衝走，惹得她當場大聲喝止。</p>
</div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
