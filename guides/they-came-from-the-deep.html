    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>R’ashaht Rhiki calls you over with urgent haste, already bracing herself for the worst. A civilian vessel has been sunk in the Strait of Merlthor, and though a Maelstrom warship has already gone to search the waters, she fears there may be little left to find. Piracy, looting, even seizing ships by force—those are horrors she knows too well. But to send an entire vessel to the bottom feels cruel beyond measure. In her mind, the culprits can only be the Sahagin and the Serpent Reavers who serve alongside them. Even so, she forces her anger aside. Revenge can come later. For now, the living must be found first, and so she sends you to Bloodshore in eastern La Noscea to search for any survivors the sea may have spared.</p><p>At Bloodshore, the scene is as bleak as she feared. Wiltfalk tells you there is barely anything left to coordinate. The ship was torn apart so completely that only a handful of people seem to have reached the shore alive. Among them is a drenched woman who wakes in panic, coughing seawater and crying out for her son, Robyn. Wiltfalk does what little he can to calm her, then places medical supplies in your hands and asks you to walk the coast and help any of the wounded who can still be saved. Yet even as he speaks, one bitter fact hangs between you both: not a single child has been found among the survivors.</p><p>You go from one broken body to the next, doing what you can to keep life from slipping away. One man can hardly believe he survived at all, remembering only how a peaceful voyage became a desperate struggle against the waves. Another can scarcely breathe, and only after recovering does he realize he has washed ashore at Bloodshore instead of dying at sea. Others speak through pain and shock of the same nightmare: a violent impact, the deck lurching beneath their feet, rocks tearing flesh, and hostile figures boarding before prayer could even reach the Navigator. None can tell the story whole, but together their fragments reveal the same truth—sudden terror, merciless attack, and lives shattered in an instant.</p><p>When you return, Wiltfalk thanks you for the lives you managed to save, but the comfort is thin against the misery around you. He can accept attacks on warships as part of a soldier’s duty, yet sinking a civilian vessel carrying women and children is something he cannot forgive. Nearby, Robyn’s mother can do nothing but weep for the son she believes the sea has taken from her. Then the shore is disturbed again as a band of Sahagin emerges. Wiltfalk is instantly certain they have come to finish what was begun on the strait, and he throws himself forward, ready to meet them with steel before they can bring any more grief.</p><p>Instead, the moment breaks in a way none of you could have imagined. A boy appears in a small boat, calling for his mother, and the grieving woman rushes to him in disbelief. It is Robyn—alive, soaked, and smiling through the ordeal. While his mother clings to him in tearful relief, Wiltfalk can scarcely comprehend what he is seeing. Robyn explains with innocent certainty that some kind fishmen saved him after he was separated from his mother in the sea. They were not like the frightening ones who boarded the ship. Then he places a necklace in your care, saying he found it in the little boat that carried him ashore and that it must belong to the fishman who rescued him. Because he cannot return it himself, he asks you to do so in his stead, and pleads with you not to hurt them. Whatever others may say, he knows those fishmen were kind.</p><p>Following that small but earnest trust, you travel west and approach the Sahagin settlement with the necklace in hand. You are met first with suspicion and hostility, but the young Sahagin’s manner changes the moment it sees what you carry. Once it understands that you have come on behalf of the child who was saved, it allows you to pass and directs you to Novv, the elder of the settlement. Novv receives you without fear and speaks with a calm certainty that stands apart from all the bloodshed you have seen. He tells you there was no hidden scheme in saving the boy. To the Sahagin, as to shorewalkers, children are treasures beyond measure. Those who live here are bound by blood, all of them his family, all of them his children. He accepts the returned necklace with deep gratitude and explains that it was a treasured commendation bestowed by his matriarch. Then, according to the custom of his people, he repays one kindness with the gratitude of the whole clutch. In that spirit, he welcomes you into his home and even jokes that perhaps a modest banquet should be held—if your shorewalker stomach can endure Sahagin fare.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ル・アシャ大甲佐は、あなたの姿を認めるなり、切迫した空気のまま助力を求める。メルトール海峡を航行していた民間船が沈められ、すでに黒渦団の軍艦が救助へ向かっているものの、生存者を見つけられるかはきわめて厳しいという。海賊による襲撃や略奪なら、これまでも耳にしてきた。だが、船ごと海に沈めるなど、あまりにも残虐だった。彼女は、この一件の背後に海賊団「海蛇の舌」と、それを操るサハギン族がいると見ている。それでも怒りをいま解き放つわけにはいかない。まずは生き残った者をひとりでも多く救うことが先だと、あなたを東ラノシアのブラッドショアへ向かわせる。</p><p>ブラッドショアであなたを迎えたのは、想像以上に惨たらしい光景だった。ヴィルトファルク一等甲兵は、指揮を執るといっても、もはやできることはほとんど残されていないと苦く告げる。船は沖合で襲撃を受け、そのまま沈没し、岸までたどり着けた者はほんのわずかしかいない。その中には、海水を飲み込みながら目を覚まし、息子のロビンを捜して取り乱す女性もいた。ヴィルトファルク一等甲兵は彼女をなだめつつ、あなたに黒渦団の軍用薬を託し、海岸に打ち上げられた遭難者の介抱を頼む。だがその言葉の底には、子どもの生存者がまだひとりも見つかっていないという、重く冷たい現実が沈んでいた。</p><p>あなたは海岸を巡り、傷つき疲れ果てた遭難者たちを助けていく。ある者は、自分が助かったことさえ信じられず、穏やかな航海が一転して死にものぐるいの海へ変わった瞬間を震えながら語る。ある者は息も絶え絶えで、ようやくここがブラッドショアだと知る。岩礁に叩きつけられた者、突然の轟音とともに傾く甲板を覚えている者、航海神リムレーンに祈る暇もないまま敵に乗り込まれたと呻く者――誰ひとり全体を語ることはできなくとも、その断片はすべて同じ惨劇へと収束していた。襲撃はあまりにも突然で、容赦がなく、人々の日常を一瞬で打ち砕いたのだ。</p><p>介抱を終えて戻ったあなたに、ヴィルトファルク一等甲兵は礼を述べる。救えた命があったことは確かだが、それでこの悲劇が軽くなるわけではない。軍艦が襲われるなら兵として覚悟もある。だが、女や子どもが乗る民間船まで沈めるなど、到底許せるものではなかった。傍らでは、ロビンを失ったと思い込んだ母親が、ただ涙の中で息子の名を呼び続けている。そんな折、海辺にサハギン族の一団が姿を現す。ヴィルトファルク一等甲兵は、奴らがとどめを刺しに来たのだと即座に身構え、これ以上の惨事を許すまいと前へ出る。</p><p>しかし、その次に起こったのは、誰の予想ともまるで異なる光景だった。小舟の上から少年が母を呼び、女はその声に我を忘れて駆け出す。そこにいたのは、たしかに生きたロビンだった。ずぶ濡れのまま母に抱きつくロビンを見て、ヴィルトファルク一等甲兵でさえ言葉を失う。ロビンは、海の中で母とはぐれ、溺れかけたところを優しいサハギン族に助けられたのだと無邪気に語る。船に乗り込んできた恐ろしい連中とは違う、別のサハギン族だったのだという。そして、自分を乗せてくれた小舟の中で見つけた「銀鮫の牙飾り」を差し出し、命を助けてくれた相手に返してほしいと、あなたに頼む。自分では行けないからこそ、代わりに届けてほしい。あのサハギン族たちは悪い者ではないのだと、ロビンはまっすぐに信じていた。</p><p>その願いを受け、あなたは西ラノシアのサハギン族の育成地へ向かう。最初にあなたを迎えるのは、やはり鋭い警戒と敵意だった。だが、若きサハギン族は、あなたが持つ銀鮫の牙飾りを見るや否や態度を変える。そして、それが救われた子どもの礼として返されようとしているものだと知ると、あなたを中へ通し、この地の長であるノォヴのもとへ案内する。ノォヴは少しも臆した様子を見せず、あの子を助けたことに特別な理由はなかったと静かに語る。サハギン族にとっても、ヒトにとっても、子は何より尊い宝なのだ。この育成地に暮らす者たちは皆、血で結ばれた家族であり、すべて自分の子どもたちなのだと。彼は戻ってきた牙飾りを深い感謝とともに受け取り、それが女王「蒼茫の母」から下賜された大切な勲章であることを明かす。そして、一匹の魚が受けた恩は魚群の礼で返す――その習わしに従い、あなたを歓迎すると告げる。そうしてノォヴは、ヒトであるあなたの口に合うかはわからないと笑いながらも、ささやかな酒宴でも開こうかと申し出るのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ル・アシャ大甲佐 <small class="muted">（リムサ・ロミンサ：上甲板層, X:13.1, Y:12.8）</small></div></div>`,

  },

    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>R’ashaht Rhiki 一看到你，便立刻開口請你幫忙。Merlthor Strait 上有一艘民間船隻遭到擊沉，雖然 Maelstrom 已經派出軍艦趕往搜救，但她很清楚，等軍艦抵達時，恐怕已經剩不下多少能救的人了。海盜襲船、劫掠貨物，這些她不是沒有聽過；可直接把整艘船送進海底，仍然殘忍得超出尋常。她認定這件事與 Sahagin 以及替他們行動的 Serpent Reaver 脫不了關係。只是現在還不是清算的時候。比起報復，先把可能還活著的人找出來更重要。於是她命你立刻前往 eastern La Noscea 的 Bloodshore，沿著沙灘搜尋被海浪沖上岸的生還者。</p><p>等你抵達 Bloodshore，眼前的景象比想像中更慘。Wiltfalk 告訴你，自己雖然奉命負責搜救，但其實幾乎已經沒有多少能夠統籌的事情了。船在外海遭襲後很快沉沒，真正被海流帶上岸的人，少得可憐。其中一名渾身濕透的婦人一邊咳著海水、一邊驚惶失措地尋找自己的兒子 Robyn。Wiltfalk 先安撫她，接著把黑渦團的軍用藥交到你手上，要你沿著海岸去照顧那些還有機會救回來的人。可是即使他強撐著冷靜，那份壓在話語底下的沉重仍然十分明白，到現在為止，倖存者裡還沒有任何一個孩子被找到。</p><p>你沿著岸邊救助那些受傷又筋疲力盡的遭難者。有人幾乎不敢相信自己還活著，只記得原本平靜的航行在一瞬之間變成了和浪潮搏命的掙扎。有人連氣都喘不過來，好不容易才明白自己並沒有死在海上，而是被沖到了 Bloodshore。也有人被海浪狠狠撞上礁石，或只記得一聲轟然巨響後甲板猛然傾斜，還來不及向 Navigator 祈求庇佑，敵人就已經翻過船舷殺了上來。每個人記得的都只是殘破的一小段，但那些碎片拼起來，指向的卻是同一場毫無預警、毫不留情的災難。</p><p>等你回到 Wiltfalk 身邊時，他感謝你救下了一些人命，可這點安慰遠遠不足以沖淡眼前的悲劇。軍艦遭襲，對軍人來說或許是已有覺悟的風險；但連載著婦女與孩子的民間船隻都被擊沉，這種行徑他無論如何都無法原諒。就在一旁，Robyn 的母親仍哭著呼喚兒子的名字，認定他已經被大海奪走。偏偏就在這時，一群 Sahagin 又從海邊現身。Wiltfalk 幾乎立刻就認定他們是來完成先前那場屠殺的，當場拔身上前，打算先擋下他們，再不讓任何新的慘事發生。</p><p>然而下一刻出現的畫面，卻徹底打亂了所有人的判斷。一艘小船靠近岸邊，一名少年在船上高聲呼喊母親，那名婦人猛地衝上前去，才發現那竟然是 Robyn。孩子濕透了，卻平安無事，還帶著終於見到母親的開心。連 Wiltfalk 都一時說不出話來。Robyn 用最單純直接的方式告訴你們，自己是在海裡和母親失散、差點溺水時，被幾個好心的魚人救起來的。他很確定，那些人和登船襲擊的可怕傢伙不是同一批。接著，他把一條銀色牙飾交給你，說那是在載他上岸的小船裡發現的，應該是救命恩人遺落的重要物品。因為他自己沒辦法回去歸還，所以拜託你替他送回去，也再三叮囑你不要傷害那些魚人。別人怎麼說都無所謂，但他知道，那些救了他的魚人是善意的。</p><p>帶著這份請託，你前往 western La Noscea，來到 Novv’s Nursery 外圍。起初迎接你的自然只有戒備與敵意，但守在外頭的年輕 Sahagin 一看見你手中的銀鮫牙飾，態度立刻變了。當它聽明白你是代那名被救下的孩子前來歸還失物後，便允許你入內，並引你去見這裡的長者 Novv。Novv 的反應和你先前在海邊見到的血腥與仇恨完全不同。他平靜地告訴你，自己救那個孩子並沒有什麼隱藏盤算。對 Sahagin 而言，孩子和對岸上的人來說一樣，都是最寶貴的存在。住在這片育成地裡的族人全都以血緣相連，全都是他的家人、他的孩子。他收下你帶回的銀鮫牙飾，感激地說那是由 matriarch 所賜的重要勳章，是他除了孩子們以外最珍惜的寶物。依照他們一族的習俗，受過一個人的恩情，就要以整個族群的謝意來回報。於是 Novv 向你表示歡迎，甚至還半帶玩笑地說，也許該替你準備一場小小的酒宴，只是他也不知道，身為岸上之人的你，究竟吃不吃得慣 Sahagin 的款待。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 爾·阿夏 <small class="muted"> 利姆薩·羅敏薩上層甲板 (X:13.1, Y:12.8)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="in-pursuit-of-the-past.html">石衛塔霸主</a></div><div class="row">戰鬥或魔法職等級 44 以上</div></div>`,

  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
