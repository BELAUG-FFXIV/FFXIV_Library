  EN:{

    readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Gi Gu is gripped by panic and insists that everyone must flee, simply because Bi Bi told him to. He was too terrified to understand the reason, but her fear is unusual enough to prove that something dire has happened. When you find Bi Bi, she is already trying to warn you away, only for Zo Ga to appear with his followers. Bi Bi had betrayed him, and he has come to punish her. Gi Gu can only plead helplessly as Zo Ga condemns him as a traitor to the tunnels and threatens to burn him as fuel for the furnace.</p>
      <p>Bi Bi begs Zo Ga to spare Gi Gu, even offering to obey anything he commands. Zo Ga accepts with cruel delight, declaring that she will labor in his workshop by day and serve him by night, while the 175th Order will suffer if she disobeys. Before she is taken away, Bi Bi asks Gi Gu to promise that he will come for her. Her abduction finally forces Gi Gu to confront what his cowardice has cost. Skaetswys, furious but unwilling to abandon him, drives the truth home: Bi Bi’s life, the 789th Order, and the future of everyone caught in Zo Ga’s tyranny now rest in his paws.</p>
      <p>Gi Gu doubts that anyone would follow such a pathetic leader, but his own companions answer him. Bo Zu, Bo Bu, and Bo Gu tell him that they have always stood with him. They may envy Bi Bi’s love for him, but he is still their leader, and wherever he goes, they will follow. Skaetswys pushes him to make the choice himself at last. Trembling, Gi Gu finally chooses to go, vowing to rescue Bi Bi from Zo Ga.</p>
      <p>Skaetswys lays out the plan. You and she will assault U’Ghamaro from the front and create a diversion, while Gi Gu sneaks into the workshop from behind and disables Zo Ga’s new furnace. Ba Go eagerly provides the tools for the task, handing over his most powerful explosives for Gi Gu and smaller bombs for you. To Ba Go, this mission is a long-awaited chance to fill U’Ghamaro with smoke, sparks, and glorious destruction.</p>
      <p>Inside U’Ghamaro, you plant Ba Go’s explosives while Skaetswys keeps watch, drawing Zo Ga’s forces away from Gi Gu’s path. Then you enter the 13th Order workshop and find Gi Gu at the furnace, proud and terrified in equal measure. He has done his part, though he can hardly believe it himself. The furnace is sabotaged, the workshop begins to collapse into chaos, and everyone retreats before Zo Ga’s wrath catches up to them.</p>
      <p>Zo Ga does catch up, and his fury falls directly upon Gi Gu. For a moment, Gi Gu still begs for mercy, beaten down by years of fear. But when Bi Bi tries to plead on his behalf, he silences her and refuses everyone’s help. This is his battle. Holding Ba Go’s final explosive, he faces Zo Ga himself and declares that the years of oppression and humiliation end here. With one desperate act, Gi Gu brings Zo Ga down and survives the battle he should have fought long ago.</p>
      <p>Afterward, Skaetswys admits that Gi Gu has proved her wrong, and with Zo Ga gone, the kobolds of U’Ghamaro should trouble Camp Overlook far less. Yet Gi Gu’s victory does not win Bi Bi back so easily. Hurt by the harsh words he shouted in the heat of battle, she leaves him behind, and Gi Gu learns that courage in war does not instantly mend the wounds of the heart. Still, he claims his battle with Zo Ga has given him new confidence, promising to win Bi Bi back and raise the 789th Order all the way to the top—after a well-earned nap. With the matter settled as far as it can be, Skaetswys goes to report Zo Ga’s fall to Camp Overlook, while you return to Maelstrom Command. There, Trachraet recognizes how a single missing shipment led you through the depths of U’Ghamaro and praises your efforts as a meaningful step toward peace with the kobolds. On behalf of the Maelstrom and the Admiral, he commends you for your deeds.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'クズテツどもの挽歌',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },

    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ギ・グは、ビ・ビが逃げろと言ったというだけで、すっかり恐慌に陥っていました。なぜ逃げなければならないのかは、あまりの恐ろしさに聞き取れなかったと言いますが、普段のビ・ビがそこまで取り乱すのは珍しく、それだけ事態が深刻であることは明らかでした。あなたがビ・ビを見つけたとき、彼女はすでに危険を知らせようとしていましたが、そこへゾ・ガとその配下が現れます。裏切ったビ・ビを罰するため、ゾ・ガは自ら姿を見せたのです。ギ・グは必死に弁明しようとしますが、ゾ・ガは彼を坑道の裏切り者と断じ、炉の燃料にしてやると脅します。</p>
      <p>ビ・ビはギ・グの命だけは助けてほしいと懇願し、どんな命令にも従うとまで申し出ます。ゾ・ガはその言葉を残酷に受け取り、昼は工房で働かせ、夜は自分に仕えさせると言い放ちます。逆らえば第175洞穴団ごと炉にくべ、海へ吹き飛ばすとも脅します。連れ去られる前に、ビ・ビはギ・グに、必ず助けに来ると約束してほしいと願います。その姿を前に、ギ・グはようやく自分の臆病さが何を招いたのかと向き合わされます。怒りながらも彼を見捨てないスケートスィスは、ビ・ビの命も、第789洞穴団の未来も、ゾ・ガの暴虐に巻き込まれた者たちの運命も、今や彼の小さな手にかかっているのだと突きつけます。</p>
      <p>ギ・グは、自分のように情けない長についてくる者などいないと弱音を吐きます。けれど、彼の仲間たちはそれを否定します。ボ・ズ、ボ・ブ、ボ・グは、これまでもずっとギ・グと共にあったのだと告げます。ビ・ビが彼を愛していることを羨ましく思ってはいても、彼はやはり自分たちの長であり、彼がどこへ行こうとも忠実についていくのだと。スケートスィスは、ついに自分自身で選べと彼を促します。震えながらも、ギ・グはとうとう進むことを選び、ビ・ビを救いに行くと誓います。</p>
      <p>スケートスィスは作戦を立てます。あなたと彼女が正面からウ・ガマロへ攻め込み、敵の注意を引きつける。その隙にギ・グが裏口から工房へ忍び込み、ゾ・ガの新しい炉を停止させるのです。バ・ゴはこの企みに大喜びし、ギ・グには自慢の大爆薬を、あなたには陽動用の小型爆薬を用意します。彼にとって、この任務は長く待ち望んだ機会でした。ウ・ガマロを煙と火花と大混乱で満たす、最高の遊び場なのです。</p>
      <p>ウ・ガマロの中で、あなたはバ・ゴの爆薬を仕掛け、スケートスィスは見張りを続けながら、ゾ・ガの配下の注意をギ・グの進路からそらします。その後、第13洞穴団の工房へ入ると、ギ・グは炉の前で、誇らしさと恐怖を同時に抱えながら立っていました。自分でも信じきれない様子ながら、彼は確かに役目を果たしていました。炉は破壊され、工房は混乱に包まれ、ゾ・ガの怒りが追いつく前に皆で脱出を急ぎます。</p>
      <p>しかしゾ・ガは追いつき、その怒りはギ・グへ向けられます。最初のギ・グはなおも mercy を乞い、長年の恐怖に押し潰されそうになります。けれど、ビ・ビが彼のために許しを求めたとき、彼は彼女を黙らせ、誰の助けも拒みます。これは自分の戦いなのだと。バ・ゴの最後の爆薬を手に、ギ・グはゾ・ガと向き合い、これまで受けてきた侮辱と抑圧を終わらせると叫びます。そして決死の一撃でゾ・ガを倒し、本来もっと早く挑むべきだった戦いを、自らの手で終わらせます。</p>
      <p>戦いの後、スケートスィスはギ・グを疑っていたことを認めつつ、彼が見事にその予想を裏切ったと笑います。ゾ・ガが倒れたことで、ウ・ガマロのコボルドたちもおとなしくなり、キャンプ・オーバールックへの脅威も減るはずでした。しかし、ギ・グの勝利がそのままビ・ビの心を取り戻すわけではありません。戦いの最中に彼が放った厳しい言葉に傷ついたビ・ビは、彼を置いて去ってしまいます。ギ・グは、戦いの勇気だけでは心の傷をすぐに癒やせないのだと知ります。それでも彼は、ゾ・ガとの戦いで新たな自信を得たと言い、ビ・ビの心を取り戻し、第789洞穴団をいつか第1洞穴団にしてみせると誓います。ただし、その前に少し眠ってから。できる限りの決着がついたところで、スケートスィスはキャンプ・オーバールックへゾ・ガ討伐の報告に向かい、あなたは黒渦団司令部へ戻ります。そこでトラッハレートは、ひとつの行方不明の荷が、ここまでウ・ガマロの奥深くを巡る旅へつながったことに驚きながらも、あなたの尽力がコボルドとの平和へ向かう道を大きく進めたと称えます。そして黒渦団と提督に代わり、あなたの働きを正式に讃えます。</p>
    </div>

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'廢物的挽歌',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Gi Gu 因為 Bi Bi 要他逃跑，就徹底陷入恐慌，嚷著所有人都必須立刻離開。他害怕到根本沒聽清楚原因，但 Bi Bi 平常很少這樣驚慌失措，足以證明事態一定相當嚴重。你找到 Bi Bi 時，她正急著警告你這裡不安全，卻被突然現身的 Zo Ga 與其手下打斷。Bi Bi 背叛了 Zo Ga，而他正是來懲罰她的。Gi Gu 只能無力地求情，卻被 Zo Ga 斥為坑道的叛徒，並威脅要把他當成熔爐燃料燒掉。</p>
      <p>Bi Bi 為了保住 Gi Gu 的性命，哀求 Zo Ga 開恩，甚至說自己願意聽從任何命令。Zo Ga 殘酷地接受了這份讓步，宣稱她白天要在工坊裡做苦工，夜晚則要替他取暖；若敢偷懶，就把她丟進熔爐，連同第 175 階一起炸進海裡。被帶走之前，Bi Bi 要 Gi Gu 答應一定會來救她。這場擄掠終於迫使 Gi Gu 面對自己的懦弱所造成的代價。Skaetswys 雖然憤怒，卻沒有放棄他，而是將事實狠狠擺在他面前：Bi Bi 的性命、第 789 階的未來，以及所有被 Zo Ga 暴政捲入的人，如今都握在他的爪子裡。</p>
      <p>Gi Gu 懷疑根本不會有人願意追隨像自己這樣可悲的領袖，但他的同伴們給出了答案。Bo Zu、Bo Bu 與 Bo Gu 告訴他，他們一直都在他身邊。雖然他們嫉妒 Bi Bi 對他的愛，但他仍是他們的領袖；無論他前往何處，他們都會忠誠地跟隨。Skaetswys 逼他終於親自做出選擇。Gi Gu 顫抖著，卻終於決定前進，發誓要去救回 Bi Bi。</p>
      <p>Skaetswys 擬定作戰計畫。你與她從正面攻入 U’Ghamaro 製造騷動，引開敵人的注意；Gi Gu 則從後方潛入工坊，讓 Zo Ga 的新熔爐停擺。Ba Go 聽見能讓東西爆炸，立刻興奮地提供工具：給 Gi Gu 的是他最強大的爆炸物，給你的則是用來連續引爆、製造火花與混亂的小型炸彈。對 Ba Go 來說，這是等待已久的一天，是讓 U’Ghamaro 充滿煙霧、火光與爆炸聲的好機會。</p>
      <p>在 U’Ghamaro 裡，你負責安置 Ba Go 的炸彈，Skaetswys 則替你望風，將 Zo Ga 手下的注意力從 Gi Gu 的路線上引開。接著你們進入第 13 階工坊，看見 Gi Gu 站在熔爐前，既得意又害怕。他已經完成自己的工作，雖然連他自己也不太敢相信。熔爐遭到破壞，工坊陷入混亂，你們必須在 Zo Ga 的怒火追上之前迅速撤離。</p>
      <p>但 Zo Ga 還是追了上來，並將全部怒火壓向 Gi Gu。一開始，Gi Gu 仍像過去一樣求饒，被多年恐懼壓得幾乎抬不起頭。然而當 Bi Bi 替他懇求 Zo Ga 停手時，Gi Gu 反而叫她閉嘴，也拒絕所有人的幫助。他終於承認，這是自己的戰鬥。他握著 Ba Go 最後的爆炸物，正面面對 Zo Ga，宣告多年來的欺壓與羞辱到此為止。憑著孤注一擲的行動，Gi Gu 擊倒了 Zo Ga，也完成了自己早該面對的那場戰鬥。</p>
      <p>戰後，Skaetswys 承認自己曾經懷疑 Gi Gu，但也高興他證明自己錯了。Zo Ga 被除掉後，U’Ghamaro 的 kobolds 應該會安分不少，Camp Overlook 也能暫時免於威脅。然而，Gi Gu 的勝利並沒有立刻替他贏回 Bi Bi 的心。戰鬥中他那些激烈而傷人的話讓 Bi Bi 受了傷，她哭著離開，只留下 Gi Gu 明白：戰場上的勇氣，無法立刻修補感情中的裂痕。不過，Gi Gu 仍說自己與 Zo Ga 的一戰給了他新的勇氣；他會重新贏回 Bi Bi 的心，讓第 789 階的產量提升百倍，直到他們成為第 1 階為止——當然，那要等他先睡一覺醒來。事情暫時告一段落後，Skaetswys 前往 Camp Overlook 向 Bloeidin 回報 Zo Ga 的死訊，而你則返回 Maelstrom Command。Trachraet 聽完後感嘆，沒想到一批失蹤貨物會讓你在 U’Ghamaro 深處繞了這麼大一圈；但他也肯定你的努力已經讓與 kobolds 之間的和平向前邁出重要一步。代表 Maelstrom 與 Admiral，他正式表揚你的功績。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
