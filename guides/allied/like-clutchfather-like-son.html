  EN:{

    readMore:'Show more',
    readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Novv fears that every effort toward peace may have been undone. By humiliating Zugg at the failed parley, he believes he may have stripped away the last of the young leader’s restraint. The Coral Tridents have attacked another ship, and this time they have taken a prisoner: a high-ranking Lominsan official. With Leviathan’s return already threatening to inflame the region, Novv knows that this abduction may force Limsa Lominsa to answer with full-scale war.</p>
      <p>At Camp Skull Valley, Falkbryda confirms the worst. The Maelstrom believes the infamous Scarlet Sea Devil has attacked a Lominsan warship, inflicted heavy casualties, and abducted Councillor Turstin, one of the Admiral’s trusted advisors and a vital figure in the thalassocracy. For the Maelstrom, this is an open act of hostility. Warships are already assembled, troops are preparing to sail, and Falkbryda sees no room for negotiation. Novv understands that the only way to avoid slaughter answering slaughter is for you and him to rescue Turstin before the attack begins.</p>
      <p>To learn where the councillor is being held, Novv sends you to search the Serpent’s Tongue for Zugg’s written instructions. The assault would have required careful planning, and the Serpent Reavers may still have records of it. Your search uncovers a stained parchment revealing that Turstin is being held aboard the Lost Duchess, a Reaver ship. With no time to confirm whether the plan has changed, Novv sends you by elbst to the vessel while promising to follow close behind.</p>
      <p>Aboard the Lost Duchess, Turstin is defying his captors when you and Novv arrive. Novv defends the councillor while you recover the key to his shackles from the Coral Trident zealots. Turstin is bewildered to find himself rescued by both an adventurer and a Sahagin, but there is no time for explanation. Zugg soon appears, determined to prove himself the true Scarlet Sea Devil by sending Novv to the depths.</p>
      <p>Novv pleads with Zugg to understand what is at stake: Limsa Lominsa’s fleet is already preparing for war, and Zugg’s ambition endangers the entire Sahagin tribe. Zugg answers with rage, accusing Novv of fearing war and reminding him that his own past crimes were far worse. When the two clash, Novv wounds Zugg but refuses to kill him. Zugg demands death, but Novv reveals the truth he has never abandoned: Zugg is his surviving son. He remembers the child who once stood beside him and wept for their slaughtered clutchmates, and he cannot slay his own blood. Zugg finally admits that his dream of becoming the Scarlet Sea Devil reborn was born from a vow of vengeance for those deaths, but Novv tells him that a feared name cannot protect what one loves. He wants Zugg to become the future their people need.</p>
      <p>Turstin, having witnessed the exchange, begins to see the Sahagin differently. He had believed all beastmen to be bloodthirsty savages without any understanding of peace or compromise, but Novv’s bond with Zugg shows him something far more complex. As a father himself, Turstin recognizes that parents, whatever their race, often wish for the same things for their children. Before returning home, he promises to contact the Admiral and persuade her to rescind the attack order. He also gives you a gull-feather trinket, a Lominsan symbol of home, happiness, and the bond between parent and child, asking that you deliver it to Novv.</p>
      <p>Novv receives the feather with quiet understanding. Though the rage born from the murder of so many of his children will never fully leave him, his desire to protect his surviving spawnlings is stronger still. He hopes the trinket may one day symbolize not only the bond between parent and child, but the birth of understanding between Sahagin and shorewalker. He asks you not to forget the nursery when vengeance threatens to consume you, and welcomes you not as a strange shorewalker, but as a clutchmate. At Maelstrom Command, R’ashaht Rhiki confirms that Turstin’s release ended the march to war before the attack began. While Leviathan remains a threat, your courage and diplomacy have averted bloodshed, rescued a high-ranking official, and earned you a well-deserved rest.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'憎しみの潮流を越えて',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示',
    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ノォヴは、これまで平和のために積み重ねてきた努力が、すべて無に帰したのではないかと恐れます。あの会談の場でズッグの面目を潰したことで、若き指導者にわずかに残っていた自制心まで奪ってしまったのかもしれません。コーラルトライデントは再び船を襲い、今度は捕虜まで取っていました。しかも相手はリムサ・ロミンサの高位の官吏です。リヴァイアサンの再来だけでも情勢は危ういというのに、この拉致事件はリムサ・ロミンサを全面戦争へ向かわせかねません。</p>
      <p>キャンプ・スカルバレーで、ファルクブリダは最悪の事態を告げます。黒渦団は、死んだと思われていた悪名高きスカーレットシーデビルがリムサ・ロミンサの軍艦を襲い、多くの死傷者を出したうえ、メルウィブ提督の信頼厚い助言者であり海洋都市国家の運営に欠かせないタースティン政務官を拉致したと見ています。黒渦団にとって、それは明白な敵対行為でした。すでに軍艦は集結し、出撃命令を待つばかりです。交渉の余地などないと断じる彼女の言葉から、ノォヴは悟ります。流血に流血で応じる未来を避けるには、開戦前にあなたと彼自身がタースティンを救い出すしかありません。</p>
      <p>政務官がどこに囚われているのかを知るため、ノォヴはサーペントタンでズッグの指示書を探すようあなたに頼みます。これほど大がかりな計画には綿密な準備が必要であり、サーペントリーヴァーたちが何らかの記録を持っているはずでした。あなたが見つけた汚れた羊皮紙には、タースティンがリーヴァーの船、ロストダッチェス号に囚われていることが記されていました。計画が変更されているか確かめる時間はありません。ノォヴは、あなたをエルブストで船へ向かわせ、自分もすぐ後から追うと告げます。</p>
      <p>ロストダッチェス号の甲板では、タースティンが捕らわれの身でありながら、なおも誇りを失わず抵抗していました。あなたとノォヴが到着すると、ノォヴは政務官を守り、あなたはコーラルトライデントの狂信者たちから手枷の鍵を奪います。冒険者とサハギンに救われたタースティンは困惑しますが、詳しく説明している暇はありません。そこへズッグが現れ、真のスカーレットシーデビルとしてノォヴを深海へ沈めようと迫ります。</p>
      <p>ノォヴはズッグに、何がかかっているのかを理解するよう訴えます。リムサ・ロミンサの艦隊はすでに戦に備えており、ズッグの野心はサハギン族全体の命運を危険にさらしているのです。けれどズッグは、今さら陸の民との戦を恐れるのかと怒り、ノォヴ自身がかつて犯した混乱と殺戮のほうがはるかに大きかったと責めます。二人が刃を交えた末、ノォヴはズッグに傷を負わせますが、とどめは刺しません。死を求めるズッグに対し、ノォヴは決して捨てていなかった真実を告げます。ズッグは彼の生き残った息子なのです。かつて殺された兄弟たちのために彼の傍らで涙を流した幼子を、ノォヴは今も覚えています。自分の血を引く子を殺すことなどできません。ズッグは、自分がスカーレットシーデビルの再来になろうとしたのは、死んだ兄弟たちへの復讐を誓ったからだと明かします。けれどノォヴは、どれほど恐ろしい名であっても、愛するものを守ることはできないと諭し、ズッグこそ民が必要とする未来になってほしいと願います。</p>
      <p>そのやり取りを目の当たりにしたタースティンは、サハギンへの見方を変え始めます。彼はこれまで、サハギンも、そして蛮族すべても、平和や妥協など知らない血に飢えた残虐な存在だと信じていました。けれどノォヴとズッグの間にある親子の絆を見て、彼らが恐ろしい寝物語で語られるよりもはるかに複雑な存在だと知ります。三人の子を持つ父親として、種族が違っても親が子に望むものは同じなのだと感じたのです。帰還する前に、彼は提督へ連絡し、攻撃命令を撤回するよう説得すると約束します。そして、船乗りたちが家と幸せ、親子の絆の象徴として子に贈る海鳥の羽飾りを、ノォヴに届けてほしいとあなたに託します。</p>
      <p>ノォヴはその羽飾りを受け取り、静かに意味を受け止めます。陸の民に多くの子を殺されたことで生まれた怒りは、決して完全には消えません。それでも、生き残った子らを守りたいという願いは、その怒りよりもなお強いのです。彼は、この小さな飾りがいつの日か親と子の絆だけでなく、サハギンと陸の民の間に芽生える理解の象徴にもなってほしいと願います。そして、復讐の思いに呑み込まれそうになったときには、この孵化地と自分たちのことを思い出してほしいとあなたに頼みます。あなたはもはや奇妙な陸の民ではなく、彼らにとってのクラッチメイトなのです。黒渦団司令部で、ル・アシャ大甲佐はタースティンが解放されたことで、攻撃が始まる前に進軍命令が撤回されたと告げます。リヴァイアサンの脅威はなお残りますが、あなたの勇気と慎重な交渉は流血を避け、高位の官吏を救い、つかの間の休息を勝ち取りました。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">

    unlockq:`<div class="stack">

    </div>`,
    followq:`<div class="stack">

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'跨越仇恨的洪流',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Novv 擔心至今所有追求和平的努力，可能都已經化為烏有。上次那場失敗的會談中，他削弱了 Zugg 的威信，也許連那名年輕領袖最後一點自制都一併剝去了。Coral Tridents 又襲擊了一艘船，而這次他們還抓走了一名俘虜。更糟的是，那名俘虜是 Limsa Lominsa 的高階官員。Leviathan 回歸所帶來的威脅已經足以讓局勢緊繃，這次綁架事件更可能迫使 shorewalker 的領袖們升高行動，讓衝突演變成全面戰爭。</p>
      <p>在 Camp Skull Valley，Falkbryda 證實了最糟的消息。Maelstrom 認為，原本以為早已死去的惡名海盜 Scarlet Sea Devil 竟率眾襲擊 Limsa Lominsa 軍艦，不只造成大量船員傷亡，還擄走了 Turstin 參事官。Turstin 是 Admiral 最信任的顧問之一，也是日常治理 thalassocracy 的重要人物。對 Maelstrom 來說，這是明目張膽的敵對行動。戰艦已經集結，只等命令出航；Falkbryda 也認為已無談判餘地。Novv 明白，若要避免用屠殺回應屠殺，唯一方法就是在攻擊開始前，由你與他親自救出 Turstin。</p>
      <p>為了查明 Turstin 被囚禁在何處，Novv 請你前往 Serpent’s Tongue 搜尋 Zugg 的書面指示。這樣大膽的計畫必定需要周密安排，而 Serpent Reavers 手中或許還留有襲擊紀錄。你找到一張沾污的羊皮紙，上面寫著 Turstin 被囚禁在 Lost Duchess 上，那是 Reavers 自己的船隻之一。你們沒有時間確認 Zugg 是否已改變指示，Novv 便要你騎上 elbst 趕往那艘船，趁船員措手不及時展開救援，而他也會盡快跟上。</p>
      <p>在 Lost Duchess 上，Turstin 雖然被囚，仍毫不示弱地反抗看守。你與 Novv 抵達後，Novv 負責保護 Turstin，而你則從 Coral Tridents 狂信者身上奪取手銬鑰匙。Turstin 對自己竟被冒險者和 Sahagin 一同救出感到困惑，但眼前沒有時間解釋。Zugg 很快現身，宣稱只有把 Novv 送入深海，Scarlet Sea Devil 的稱號才會真正穩固地落在自己肩上。</p>
      <p>Novv 懇求 Zugg 看清眼前代價：Limsa Lominsa 的艦隊已經準備開戰，而 Zugg 的魯莽野心正在危及整個 Sahagin 族群的命運。Zugg 則憤怒反問，Novv 如今是否竟害怕與 finless ones 開戰，並指責他過去犯下的暴行遠比自己如今的行動更加可怕。兩人交手後，Novv 傷了 Zugg，卻拒絕殺死他。Zugg 要求他了結自己，Novv 卻說出他始終沒有放棄的真相：Zugg 是他倖存的兒子。Novv 記得那名幼體曾站在自己身邊，為被殺害的兄弟們哭成淚河；他無法殺死自己的孩子。Zugg 也終於說出，自己想成為 Scarlet Sea Devil 的重生，是因為他曾對死去的兄弟們發誓，要用一千名 shorewalkers 的血為他們復仇。但 Novv 告訴他，無論多可怕的名字，都無法真正保護所愛之物。他希望 Zugg 不必再承受同樣的痛苦，而能成為族人真正需要的未來。</p>
      <p>Turstin 目睹這場父子對話後，開始重新理解 Sahagin。他原本深信所有 Sahagin，甚至所有 beastmen，都只是嗜血、殘忍、毫無和平與妥協概念的野蠻存在。可是看見 Novv 與 Zugg 之間的交談後，他明白那些被稱作 fishback 的敵人，遠比睡前恐怖故事裡描繪的更加複雜。身為三個孩子的父親，他也看見，不論種族為何，父母對孩子所願望的事或許並沒有那麼不同。返回前，他承諾會聯絡 Admiral，說服她撤回攻擊命令。接著，他將一枚以海鷗羽毛製成的小飾物託付給你，請你轉交給 Novv；在 La Noscea 水手之間，海鷗羽毛象徵著陸地、歸家、爐火與親子之間的幸福。</p>
      <p>Novv 接過羽飾後，靜靜理解了它的意義。許多孩子被 shorewalkers 殺害所產生的怒火，永遠不會真正離開他；但相比之下，他想保護倖存幼體的願望更加強烈。他祈願這枚小飾物有一天不只象徵父母與孩子之間的牽絆，也能象徵 Sahagin 與 shorewalker 之間理解的誕生。他請你未來不要忘記他們；當復仇的念頭試圖吞噬你時，請想起這座 nursery，想起他與他的幼體。你對他們而言已不再是陌生的 shorewalker，而是 clutchmate。在 Maelstrom Command，R’ashaht Rhiki 確認 Turstin 及時獲救，讓進軍命令在攻擊開始前被撤回。Leviathan 的威脅仍然存在，但你的勇氣與審慎交涉避免了一場戰爭，救出了一名高階官員，也替你贏得了暫時遠離職責的休息。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
