  EN:{
    langLabel:'English',
    pageTitle:`No-good Zo Ga's Ambition`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more',
    readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>789th Order Pickman Gi Gu, delighted by the progress your help has brought, proudly imagines that his order might finally rise beyond its place as the laughingstock of kobold society. Their barrows now overflow with ore, and he even dares to dream of becoming 788th Order Pickman Gi Gu. Skaetswys has little patience for such modest ambition, snapping that if he helped you for once, he might dream a little bigger. Their argument is cut short when she brings urgent news: Camp Overlook has come under attack by a fierce kobold force armed with a strange new weapon.</p>
      <p>By the time you reach Camp Overlook, the defenders have driven the attackers away, but the damage is severe. Skaetswys saw the weapon herself: a vicious new kind of bomb powerful enough to blow a good-sized vessel out of the water. The hatred in the kobolds’ eyes makes her wonder whether your alliance with Gi Gu’s order has provoked the attack. Trusting her instincts, she suspects Zo Ga is behind it and sends you back to Gi Gu to learn what he knows.</p>
      <p>Gi Gu reacts to Camp Overlook’s losses with cowardly relief that the 789th Order was not the target, but he does know of rumors surrounding a secret weapon. One of his acolytes once overheard Zo Ga speaking of such a thing, and Gi Gu directs you to 789th Order Acolyte Ba Go. Though Ba Go has been cast down into this forsaken order, his skill in alchemy is said to be exceptional. He was once one of Zo Ga’s favored researchers, until he became rather too attached to his explosive creations.</p>
      <p>Ba Go has been expecting you. He knows that Zo Ga’s furnace is producing bombs of extraordinary power, and he knows a hidden way into the 13th Order’s workshop deep within U’Ghamaro. His reason for helping is not noble so much as gleefully destructive: nothing delights him more than watching things go kaboom. He sends you ahead to northern Iron Lake to meet Ga Zi, while he gathers his beloved explosives for the coming chaos.</p>
      <p>Ga Zi quietly opens the way through an exhaust pipe, terrified of what Zo Ga would do if he were caught helping you. Inside the workshop, Ba Go arrives with his “lovelies,” but Zo Ga’s underlings are already moving about the area. Before the furnace can be destroyed, you must clear the way. Once the guards and intruders are dealt with, Ba Go has you place his explosives gently into the furnace and retreat quickly. The blast burns out Zo Ga’s prized invention, crippling the source of the 13th Order’s new bombs.</p>
      <p>When you return, Gi Gu can scarcely believe that Zo Ga’s furnace now sputters and smokes because of you and Ba Go. Skaetswys is thrilled, knowing that without their ammunition source, the 13th Order will not be able to strike Camp Overlook again so soon. She calls for the fight to continue until Zo Ga and his followers are driven from U’Ghamaro entirely—but that resolve is immediately challenged by the arrival of Bi Bi, Gi Gu’s beloved and a 175th Order alchemist.</p>
      <p>Bi Bi has already seen through what happened. Zo Ga is in a fury and has vowed to find the culprit and throw them into acid. Gi Gu panics and nearly tries to flee, but Skaetswys threatens to skewer him if he abandons his comrades after coming this far. Pressured from both sides, he stammers between fighting and running, unable to decide for himself. Disappointed that he remains as weak and wavering as ever, Bi Bi leaves him to face the consequences alone, while Gi Gu is left to realize that the trouble he has helped begin is far from over.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">

  JP:{
    langLabel:'日本語',
    pageTitle:'ゾ・ガの野望を挫け',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示',
    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>第789洞穴団の採掘士ギ・グは、あなたの助力によって作業が順調に進んでいることにすっかり気をよくしています。鉱石は塚からあふれるほど集まり、この調子なら、いつかは第788洞穴団の採掘士ギ・グを名乗れるかもしれないと、小さな出世の夢まで見ています。スケートスィスは、そんな控えめすぎる野心に呆れ、少しは自分であなたを手伝えばもっと大きな夢を見られるはずだと叱りつけます。けれどその言い合いは、彼女が持ち込んだ緊急の知らせで途切れます。キャンプ・オーバールックが、凶悪なコボルドの一団と奇妙な新兵器によって襲撃されたのです。</p>
      <p>あなたがキャンプ・オーバールックへ向かうと、守備隊はどうにか襲撃者を退けていましたが、被害はすでに深刻でした。スケートスィスはその新兵器を自分の目で見ており、それはかなりの大きさの船すら海へ吹き飛ばせるほど危険な新型爆弾だったと語ります。襲撃してきたコボルドたちの目に宿る憎しみを見て、彼女は、自分たちがギ・グたちに力を貸し始めたことが、この攻撃を招いたのではないかと疑い始めます。船乗りとしての勘から、彼女はこの背後にゾ・ガがいると見て、あなたにギ・グのもとへ戻り、新型爆弾について何を知っているのか確かめるよう頼みます。</p>
      <p>ギ・グは、キャンプ・オーバールックが大きな損害を受けたことに同情の言葉を口にしながらも、自分たちが襲われなかったことに安堵を隠せません。しかし、秘密兵器の噂には心当たりがありました。かつて配下の司祭が、ゾ・ガがそれらしきものについて話しているのを耳にしたというのです。ギ・グは、詳しいことなら第789洞穴団の司祭バ・ゴに聞くべきだとあなたに告げます。バ・ゴはこの見捨てられた洞穴団に落とされた身ではありますが、その錬金術の腕は並ぶ者が少なく、かつてはゾ・ガのお気に入りの研究者でした。ただし、自分の研究に少々のめり込みすぎてしまったのです。</p>
      <p>バ・ゴは、あなたが来るのを待ち構えていました。彼は、ゾ・ガの炉が途方もない威力の爆弾を生み出していることを知っており、ウ・ガマロの奥深くにある第13洞穴団の工房へ通じる隠し通路も知っています。彼が協力する理由は高潔なものではありません。ただ、何かが派手に爆ぜるのを見るのが何より好きなのです。バ・ゴは自分の愛しい爆薬たちを集めると言い、あなたには先にアイアンレイク北部へ向かい、ガ・ジを探すよう指示します。</p>
      <p>ガ・ジは、ゾ・ガに見つかればどんな目に遭わされるかわからないと怯えながらも、排気管を通る道をこっそり開けます。工房の中で、バ・ゴは自慢の爆薬を抱えて合流しますが、すでにゾ・ガの手下たちが周囲を動き回っていました。炉を破壊する前に、あなたは邪魔者を片づけなければなりません。安全が確保されると、バ・ゴは爆薬を炉の中へ優しく置き、急いで離れるよう促します。爆発によってゾ・ガ自慢の炉は焼け落ち、第13洞穴団が新型爆弾を作るための源が大きく損なわれます。</p>
      <p>戻ったあなたの報告に、ギ・グはゾ・ガの炉が煙を上げて止まったことを信じられない思いで受け止めます。スケートスィスは見事な働きだと喜び、弾薬の供給源を失った第13洞穴団は、しばらくキャンプ・オーバールックへ再び大きな被害を与えることはできないだろうと考えます。けれど、戦いはまだ始まったばかりです。彼女はゾ・ガとその取り巻きをウ・ガマロから完全に追い出すまで休まないと声を上げます。しかしその決意は、ギ・グの想い人であり第175洞穴団の錬金術士でもあるビ・ビの来訪によって、すぐに揺さぶられることになります。</p>
      <p>ビ・ビは、ギ・グたちがゾ・ガ自慢の炉を破壊したことをすでに見抜いていました。ゾ・ガは怒り狂い、犯人を見つけ出して酸の大桶へ放り込むと言っているのです。ギ・グは恐怖に飲まれ、すぐに逃げ出そうとしますが、スケートスィスはここまで来て仲間を見捨てるつもりかと怒り、逃げればその場で串刺しにすると脅します。追い詰められたギ・グは、戦うのか逃げるのかすら自分で決められずにうろたえます。ビ・ビは、彼が少しも変わっておらず、弱く優柔不断なままだと呆れ、好きにしろ、ただしひとりでやれと言い残して去っていきます。残されたギ・グは、自分たちが始めた騒動が、まだ終わりにはほど遠いことを思い知らされるのです。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">

    unlockq:`<div class="stack">

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'挫敗佐加的野心',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>第 789 階採掘工 Gi Gu 因為你的協助讓他們成果大增，整個人得意得不得了。自從你加入後，礦石多到幾乎滿出礦坑，他甚至開始幻想自己有朝一日能升上第 788 階。Skaetswys 對這種小小野心毫不客氣，說他要是肯從屁股上站起來幫你一次，說不定還能做更大的夢。可是兩人的拌嘴很快被緊急消息打斷：Camp Overlook 遭到一群極其兇狠的 kobolds 襲擊，而且敵人似乎還帶著一種新型武器。</p>
      <p>你抵達 Camp Overlook 時，守軍雖然已經擊退襲擊者，但損害早已造成。Skaetswys 親眼看見那種新武器，是一種可怕的新型 bomb，威力足以把一艘相當大的船炸出海面。她想起那些 kobolds 眼中的憎恨，開始懷疑這件事是否與你們支援 Gi Gu 那群人有關。憑著航海人的直覺，她認為 Zo Ga 很可能就是幕後主使，於是請你回去找 Gi Gu，查清他是否知道這種新型 bomb 的線索。</p>
      <p>Gi Gu 對 Camp Overlook 的慘重損失表示可惜，卻更明顯地慶幸受攻擊的不是第 789 階。關於秘密新武器，他確實聽過一些傳聞；他們的一名祭司曾偷聽到 Zo Ga 談起類似的東西。於是 Gi Gu 要你去找第 789 階祭司 Ba Go。雖然 Ba Go 已被貶到這個被遺棄的階級，他的鍊金本事卻少有人能及；他曾是 Zo Ga 重視的研究員，只是後來對自己的作品著迷得有些過頭。</p>
      <p>Ba Go 早就在等你。他知道 Zo Ga 的熔爐正在製造威力驚人的 bomb，也知道一條通往 U’Ghamaro 深處第 13 階工坊的秘密通道。他願意協助的理由並不高尚，而是因為他最喜歡看東西轟然炸開。Ba Go 要你先前往 Iron Lake 北部找 Ga Zi，而他則去召集自己那些心愛的爆炸物，準備展開一場混亂又喧鬧的破壞。</p>
      <p>Ga Zi 害怕驚動 Zo Ga，卻仍悄悄替你打開通過排氣管的道路。進入工坊後，Ba Go 帶著他心愛的爆炸物前來會合，但 Zo Ga 的手下已經在附近走動。要破壞熔爐之前，你必須先清除阻礙。當道路安全後，Ba Go 要你把爆炸物輕輕放入熔爐，再立刻退開。爆炸燒毀了 Zo Ga 引以為傲的發明，也讓第 13 階製造新型 bomb 的來源遭到重創。</p>
      <p>你回去報告後，Gi Gu 幾乎不敢相信 Zo Ga 的熔爐已經因你與 Ba Go 的行動而冒煙停擺。Skaetswys 則對成果非常滿意，認為失去彈藥來源後，第 13 階短時間內應該無法再對 Camp Overlook 發動同樣的災難性襲擊。但她也清楚，戰鬥才剛開始；只要 Zo Ga 與他的爪牙還盤踞在 U’Ghamaro，他們就不能停下。就在這時，Gi Gu 愛慕的第 175 階鍊金術士 Bi Bi 出現，讓這份剛燃起的鬥志立刻受到考驗。</p>
      <p>Bi Bi 已經看穿 Gi Gu 與同伴破壞 Zo Ga 熔爐的事。Zo Ga 正大發雷霆，揚言要找出犯人並丟進酸液槽裡。Gi Gu 嚇得想立刻逃走，但 Skaetswys 罵他都走到這一步了，竟然還想拋下同伴；若他敢踏出懦弱的一步，她就當場把他串起來。Gi Gu 在壓力下結結巴巴地說自己會戰鬥，卻又分不清到底該先戰再逃，還是先逃再戰。Bi Bi 看見他依舊軟弱、搖擺不定，失望地說他一點也沒變，接著丟下他獨自面對後果。Gi Gu 這才意識到，他們捲入的麻煩遠遠還沒有結束。</p>
    </div>

  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
