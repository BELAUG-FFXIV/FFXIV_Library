const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Watching the Spawn',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more',
    readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Novv asks you to watch over the nursery while he leaves on an important task. He insists that you need not care for the spawnlings directly, as Fyuu, Houu, and Seww have those duties well in hand, but he worries that the Coral Tridents may seek revenge for the sabotage already carried out against them. His presence has kept the nursery safe so far, and if their enemies learn he is absent, they may strike.</p>
      <p>Seww is troubled by Novv’s secrecy. He has never known the clutchfather to leave the nursery in another’s care, and he suspects that the fate of their people may be at stake. Though he and his spawnbrothers have taken their warrior rites, Novv still refuses to share the details of his task, or even speak clearly of his own past. Wanting to understand what Novv is doing and whether the clutch can help, Seww gives you a shell marked with Novv’s clutchmark and asks you to seek out older Sahagin scattered across their territory.</p>
      <p>The elders’ stories begin to reveal the shape of Novv’s past. One knows that Novv has gone to parley with Zugg at the Serpent’s Tongue. Another speaks with fierce loyalty to Zugg, calling him the champion of the spawning grounds and the one who will restore the Coral Tridents through slaughter. But at the Reef of Sending, an aged Sahagin tells you what Seww needed to know: Novv was once the undisputed leader of the Coral Tridents, a mighty warrior who lived only for the glory and prosperity of his people. The spawnlings, he says, should be proud of their clutchfather’s deeds.</p>
      <p>When you return, Seww realizes the danger at once. If Novv is meeting the current leader of the Coral Tridents, then the so-called parley reeks of ambush. He understands why Novv chose to go alone: he expects to fight those savages without involving his spawnlings. Bound to protect the clutch, Seww cannot leave the nursery himself, so he entrusts the task to you and begs you to rescue Novv when the meeting inevitably turns sour.</p>
      <p>At the Serpent’s Tongue, Zugg mocks Novv for coming alone and demands respect as the Scarlet Sea Devil. Novv calls him by his true name and speaks not of insults, but of the future of the Sahagin. He warns that war will only condemn their spawnlings to lives of violence and misery. Zugg rejects him, clinging to conquest and bloodshed as the path to territory and survival. To Zugg, Novv’s former title and terror should live on through him, and when Novv refuses that legacy, Zugg orders the Coral Tridents to kill him.</p>
      <p>The ambush fails. Novv’s strength has not faded as Zugg believed, and the Coral Trident warriors falter before him. Novv tells Zugg to return to the shallows, for he is not yet ready for the ocean deep. Zugg retreats, promising that time will decide which of them history remembers as the true Scarlet Sea Devil. Seeing that you were ready to aid him, Novv recognizes Seww’s instincts behind your arrival and laughs that his little spawnling has begun to think like a grown warrior.</p>
      <p>Back at the nursery, Novv finally tells the truth. Fifteen years ago, he led the Coral Tridents in piracy, slaughter, and kidnapping, becoming a nightmare to the shorewalkers of La Noscea: the first Scarlet Sea Devil. He believed every atrocity was justified for the future of his people, until shorewalkers followed him to his island nursery and murdered his children in vengeance. Faced with the mountain of his spawnlings’ bodies, Novv understood that hatred only breeds more hatred, drawing all who follow it into a soulless abyss. The few unhatched eggs that survived became his salvation, and in raising Seww and his spawnbrothers, he buried the Scarlet Sea Devil and became Novv the clutchfather. Though he has never forgiven the shorewalkers, he refuses to let rage guide him again. That is why he reached out to you: to build a bridge worthy of the children who still live.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Novv <small class="muted">(Western La Noscea, X:16.7, Y:22.8)</small></div>

  JP:{
    langLabel:'日本語',
    pageTitle:'わだつみに父は誓う',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示',
    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ノォヴは、大切な用事のためにしばらく孵化地を離れることになり、その間あなたに見守ってほしいと頼みます。稚魚たちの世話やしつけは、フュウ、ホウ、セェウがきちんと担っているため、あなたが直接面倒を見る必要はありません。けれど、彼が気にかけているのはコーラルトライデントです。これまでの破壊工作に彼らが気づいていないはずはなく、報復を望んでいるに違いありません。これまではノォヴの存在そのものが抑止になっていましたが、もし彼の不在を知られれば、敵が襲ってくる恐れがあるのです。</p>
      <p>セェウは、ノォヴが何も語らず出ていくことに不安を覚えます。クラッチファザーが孵化地を他者に任せて離れるなど、彼はこれまで見たことがありません。そこには一族の命運に関わる重大な理由があるはずでした。自分たちはすでに戦士の儀を終えた稚魚であるにもかかわらず、ノォヴは任務の詳細も、自らの過去もほとんど話してくれません。何が起きているのか、そして自分たちに何ができるのかを知るため、セェウはノォヴのクラッチマークが刻まれた貝をあなたに託し、各地に散らばる年長のサハギンたちから話を聞いてほしいと頼みます。</p>
      <p>年長者たちの話から、ノォヴの過去が少しずつ見えてきます。ある者は、ノォヴがサーペントタンでズッグと会談するために向かったと知っていました。別の者はズッグに忠誠を示し、彼こそが産卵地の覇者であり、血によってコーラルトライデントを勝利へ導く者だと語ります。しかし、送りの礁にいる老いたサハギンは、セェウが本当に知るべきことをあなたに告げます。ノォヴはかつてコーラルトライデントの揺るぎない指導者であり、民の栄光と繁栄のみを考える強大な戦士でした。その子らは、クラッチファザーの過去と功績を誇るべきだと老サハギンは言います。</p>
      <p>あなたが戻ると、セェウはすぐに危険を察します。ノォヴがコーラルトライデントの現指導者と会おうとしているなら、その会談には待ち伏せの臭いが漂っているからです。彼は、なぜノォヴが稚魚たちを連れず、ひとりで向かったのかを理解します。あの野蛮な者たちと戦う覚悟で、彼らを巻き込まないようにしたのです。セェウ自身は仲間を守る役目を捨てて孵化地を離れるわけにはいきません。そのため、彼はあなたにすべてを託し、会談が必ず破綻したとき、ノォヴを救ってほしいと願います。</p>
      <p>サーペントタンで、ズッグはひとりで現れたノォヴを嘲り、自分こそがスカーレットシーデビルであり、敬意を示すべきだと迫ります。ノォヴは彼を本来の名で呼び、侮辱ではなくサハギン族の未来について話そうとします。今必要なのは戦争ではなく交渉であり、ズッグの傲慢は稚魚たちを暴力と苦しみの人生へ追いやるだけだと諭すのです。けれどズッグはその言葉を拒み、領土と生存のためには流血と征服こそが道だと信じ続けます。かつてノォヴが背負った恐怖と称号は自分が受け継ぐべきものだと叫び、ノォヴがその過去を拒むと、彼はコーラルトライデントに殺せと命じます。</p>
      <p>しかし、待ち伏せは失敗します。ノォヴの力はズッグが思っていたほど衰えておらず、コーラルトライデントの戦士たちは彼の前にひるみます。ノォヴはズッグに、浅瀬へ帰れ、まだ大海を語るには早いと告げます。ズッグは退きながらも、歳月が進むほど自分は強くなり、歴史がどちらを真のスカーレットシーデビルとして記憶するか、いずれわかると吐き捨てます。あなたが救援に駆けつけるつもりでいたことを見て、ノォヴはそこにセェウの意志を感じ取り、自分の小さな稚魚も、すでに一人前の戦士の本能を持つようになったのだと笑います。</p>
      <p>孵化地へ戻ったノォヴは、ついに真実を語ります。十五年前、彼はコーラルトライデントを率い、海賊行為、略奪、虐殺、誘拐を重ねていました。ラノシアの陸の民にとって、彼はインディゴディープから現れた悪夢そのもの、初代スカーレットシーデビルでした。民の未来のためなら、どんな残虐も正しいと信じて疑わなかったのです。けれどある日、陸の民が彼を島の孵化地まで追い、彼の不在を待って子らを殺しました。積み重なった稚魚たちの遺体を前に、ノォヴはその運命を招いた責任が自分にあると悟ります。憎しみと苦しみは、さらなる憎しみと苦しみしか生まず、報復の渦は魂のない奈落へとすべてを引きずり込むのです。血の報復を逃れたわずかな卵だけが、彼の救いでした。彼は空虚な栄光を捨て、セェウたち残された子を育てることにすべてを注ぎました。その日、スカーレットシーデビルは死に、クラッチファザーのノォヴが生まれたのです。彼は今も陸の民を許してはいません。それでも、怒りに従って行動すれば望む平和には届かないと知っています。だからこそ彼はあなたを仲間に引き入れました。生き残った子らへ残すにふさわしい橋を、共に築くために。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ノォヴ　西ラノシア <small class="muted">(X:16.7, Y:22.8)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-scarlet-bloodletter.html">海魔の名は潮騒に乗って</a></div>
      <div class="row">いずれかのクラス・ジョブ <small class="muted">Lv 48～</small></div>
      <div class="row">サハギン族「ノォヴ一味」の友好関係をランク2「認定」にする</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="like-clutchfather-like-son.html">憎しみの潮流を越えて</a></div>
    </div>`
  },

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'以父之名向海神宣誓',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Novv 因為有一項重要任務必須暫時離開 nursery，於是請你代為守護這裡。他說你不必照顧或管教幼體，因為 Fyuu、Houu 與 Seww 已經把這些職責處理得很好。真正令他擔憂的是 Coral Tridents。你們至今的破壞行動不可能完全沒有被注意到，對方必定想要復仇。過去只要 Novv 坐鎮，便足以阻止這類報復；但如果敵人得知他不在，nursery 便可能受到攻擊。</p>
      <p>Seww 對 Novv 的隱瞞感到不安。他從未見過 clutchfather 將 nursery 交給他人照看後離開，這代表事情很可能關係到族人的命運。明明他和兄弟們已經完成戰士儀式，Novv 卻仍不肯告訴他們任務細節，也幾乎不談自己的過去或昔日戰爭中的角色。為了弄清 Novv 正在做什麼、自己是否能幫上忙，Seww 將刻有 clutchmark 的貝殼交給你，請你去詢問散居在領地各處的年長 Sahagin。</p>
      <p>從年長者們的話中，Novv 的過去逐漸浮現。有人知道 Novv 前往 Serpent’s Tongue，準備與 Zugg 會談；也有人對 Zugg 充滿狂熱信心，稱他是產卵地的勇士，將率領 Coral Tridents 以 shorewalker 的屍骨堆成通往偉大的道路。然而在 Reef of Sending，一位老 Sahagin 告訴你 Seww 真正需要知道的事：Novv 曾是 Coral Tridents 無可爭議的領袖，是一名只思考族人榮耀與繁榮的強大戰士。他要你轉告 Novv 的子嗣，他們應該以 clutchfather 的事蹟為傲。</p>
      <p>你回去後，Seww 立刻意識到危險。Novv 若是去見 Coral Tridents 現任領袖，那場所謂會談幾乎必定藏著伏擊。他也明白 Novv 為什麼選擇不帶幼體同行，因為 Novv 打算獨自面對那些殘暴之徒。Seww 自己不能拋下守護兄弟的職責離開 nursery，只能將這件事託付給你，請你前往 Serpent’s Tongue，在會談變調時救下 Novv。</p>
      <p>在 Serpent’s Tongue，Zugg 嘲笑 Novv 竟然獨自踏入敵巢，並要求他尊稱自己為 Scarlet Sea Devil。Novv 仍以原本的名字稱呼他，並表示自己不是來互相羞辱，而是想談 Sahagin 的未來。Novv 警告他，現在需要的是交涉，不是戰爭；Zugg 的傲慢只會讓後代幼體一生都被暴力與痛苦束縛，最後只能在士兵的刀鋒下得到解脫。但 Zugg 拒絕聽進去。他堅信若缺乏產卵的土地，就該用武力奪取，並認為 Novv 昔日的恐怖與稱號應該由自己繼承。當 Novv 拒絕那份遺產時，Zugg 下令 Coral Tridents 殺死這名叛徒。</p>
      <p>伏擊失敗了。Novv 的力量並未如 Zugg 所想那般衰退，Coral Tridents 的戰士反而在他面前退縮。Novv 要 Zugg 回到淺水去，因為他還沒有資格談論深海。Zugg 雖然撤退，仍不甘心地宣稱，隨著 Novv 被衰老奪走力量，自己只會越來越強，歷史終將決定誰才是真正的 Scarlet Sea Devil。看見你準備出手救援，Novv 立刻聞到 Seww 介入的氣息，並笑著承認，自己仍把 Seww 當成幼體，但他的直覺已經像成熟戰士一樣敏銳。</p>
      <p>回到 nursery 後，Novv 終於說出真相。十五年前，他曾率領 Coral Tridents 不斷劫掠、屠殺與綁架。對 La Noscea 的 shorewalkers 來說，他是從 Indigo Deep 現身的噩夢，是第一代 Scarlet Sea Devil。他當時深信，自己殺死的人、奪取的土地，全都是為了族人的未來，從未懷疑過自己的行為是正義。直到有一天，他在結束一場掠奪船隻的行動後回到 nursery，眼前卻只剩堆疊成山的幼體屍骸。</p>
      <p>那是純粹的復仇。shorewalkers 追蹤他到島上的家，耐心等他離開，然後殺死他的孩子。Novv 悲痛到幾乎失去理智，卻也在那一刻明白，讓那些幼體迎來殘酷命運的責任，其實在他自己身上。仇恨與痛苦只會帶來更多仇恨與痛苦，把人捲入報復與反擊的漩渦，最後通往沒有靈魂的深淵。少數逃過血腥報復、尚未孵化的蛋，成了他的救贖。他拋棄空洞的榮耀，專心撫養倖存的孩子，也就是 Seww 和他的兄弟們。Scarlet Sea Devil 在那一天死去，而 clutchfather Novv 從此誕生。Novv 坦言自己從未原諒 shorewalkers，但他不會再讓憤怒引導行動，因為那條路無法帶來他想要的和平。這也是他招攬你加入的理由：他想與你一起築起一座值得留給孩子們的橋。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
