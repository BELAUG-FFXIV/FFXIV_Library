    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}

    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}

    .tab-panel{display:none}

      max-height:420px;

    }
    .expand-btn:hover{ background:#fffef8; }

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'An Eye on the Inside',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more',
    readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Hamujj Gah receives word from a Brotherhood scout that the Flamefangs are preparing another kidnapping raid. Their scheme depends on tempered spies hidden among their victims’ own communities, passing information that allows the Flamefangs to choose their targets with cruel precision. Because you can walk through Little Ala Mhigo without drawing suspicion, Hamujj Gah sends you there to expose the spies and help turn the settlement into a true haven.</p>
      <p>At Little Ala Mhigo, Gisilbehrt admits that the warning explains the Amalj’aa’s uncanny timing. If spies have been watching merchants and travelers from within the settlement, then the repeated ambushes suddenly make terrible sense. Before he can act further, a recruit reports that Amalj’aa kidnappers are attacking another caravan and dragging captives toward Zanr’ak. With many of his soldiers still recovering from the last fight, Gisilbehrt gathers what few blades he can and asks you to reinforce them in the field.</p>
      <p>When you arrive, the mission has already collapsed. The Flame soldiers lie defeated, and one of their own recruits reveals himself as a tempered spy loyal only to Ifrit and rewarded by the Flamefangs. He boasts that a single word in the right ear was enough to send the unit stumbling into slaughter, leaving Little Ala Mhigo’s defenders broken and ready for further raids. You defeat his nearby allies, but before the matter can end, Loonh Gah arrives and finds you caught in a far larger trap.</p>
      <p>The Flamefangs’ leader, Zagozz Teh, appears and mocks the Brotherhood of Ash for refusing to submit to Ifrit’s cleansing fire. To him, they are relics of a fading past, reduced to consorting with the so-called slave races. Loonh Gah recognizes him at once as the one responsible for the savaging of her mother, but in the confrontation that follows, she is overwhelmed by a terrible heat. As the wounded Flame sergeant begs you to report back, the true scale of the Flamefangs’ plan becomes clear: the Immortal Flames themselves were targeted from the beginning.</p>
      <p>Gisilbehrt is shaken by the news that a tempered spy had been inside his own ranks. His soldiers have been killed or taken, and he realizes the Amalj’aa wanted more than merchants all along. While he tries to salvage what remains of his command, he begs you to save any soldiers who still live from a fate worse than death. Hamujj Gah then identifies Zagozz Teh as the foul maw driving the Flamefangs, a zealot whose purpose is to increase the number of tempered and feed Ifrit’s power through every new fire-seared slave.</p>
      <p>To strike back, Hamujj Gah sends you into Zahar’ak to free the captives from their cages. You slay the gaolers, take their keys, and release prisoners whose fear and confusion show how far the Flamefangs’ reach has spread: a Flame recruit who had already made peace with death, a merchant who no longer knows whom to trust after being captured by an Immortal Flame, an Ala Mhigan who has lost both home and freedom, and an adventurer who only remembers being struck down beneath the stars.</p>
      <p>Your raid deals the Flamefangs a heavy blow, but Loonh Gah’s anger only burns hotter. She demands vengeance against Zagozz Teh, the beast who tore apart her mother, and wants to rip out his heart herself. Hamujj Gah refuses to let her act, not because she is Miqo’te, but because she still lacks the martial wisdom to survive such an enemy. Yadovv Gah offers to fight at her side, yet the warleader rejects that as well: this is a blood vendetta, and by their law none may aid her. Only victory by her own hand can erase the shame of defeat. When Loonh Gah storms away, Hamujj Gah likens the Amalj’aa way to a drake casting its own young into a ravine, forcing it to claw its way back up through strength alone.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Hamujj Gah <small class="muted">(Southern Thanalan, X:23.9, Y:14.2)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="ranger-rescue.html">Ranger Rescue</a></div>
      <div class="row">Any Class or Job <small class="muted">Lv. 48</small></div>

    </div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'反逆の焔',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示',
    readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ハムジ・ガーは、灰の一党の斥候から、宿敵フレイムファングが再び拉致襲撃を企てているとの報せを受けます。彼らの策は、獲物となる者たちの共同体に潜むテンパードの密偵によって支えられていました。その者たちが情報を流すことで、フレイムファングは狙うべき相手を残酷なほど正確に選び出しているのです。あなたならリトルアラミゴの中を怪しまれずに歩けるため、ハムジ・ガーは密偵を暴き、この地を真の避難所へ変える手助けをするよう命じます。</p>
      <p>リトルアラミゴで話を聞いたギシルベルトは、その警告によってアマルジャ族の襲撃があまりにも時機よく起きる理由に思い当たります。集落の内側から商人や旅人の動きを探る者がいるなら、度重なる待ち伏せにも説明がつきます。ところがその矢先、不滅隊の新兵が、アマルジャ族の誘拐部隊が旅人の隊商を襲い、捕虜をザンラクへ連れ去ろうとしていると報告します。前回の戦闘で多くの兵が傷を負っている中、ギシルベルトは動ける兵をかき集め、あなたにも現地で彼らを支援してほしいと頼みます。</p>
      <p>あなたが駆けつけたとき、任務はすでに崩壊していました。不滅隊の兵たちは倒れ、その中のひとりだった新兵が、イフリートにのみ忠誠を捧げ、フレイムファングに報われるテンパードの密偵であることを明かします。彼は、適切な耳に一言吹き込むだけで部隊を死地へ誘い込むことができたと嘲笑い、リトルアラミゴの守備隊が壊滅した今、アマルジャ族は思うがままに襲撃できると勝ち誇ります。あなたは近くに潜んでいた彼の仲間を倒しますが、そこへ駆けつけたルーン・ガーは、事態がさらに大きな罠であったことを知ります。</p>
      <p>現れたフレイムファングの首魁ザゴズ・テーは、イフリートの清めの炎に従おうとしない灰の一党を嘲ります。彼にとって彼らは、消えゆく過去の亡霊であり、弱さゆえにいわゆる奴隷種族と手を組む者たちにすぎません。ルーン・ガーは彼を見た瞬間、母を無残に傷つけた相手だと悟ります。しかし対峙した彼女は、凄まじい熱に圧倒されてしまいます。傷ついた不滅隊の軍曹が、ギシルベルトへの報告をあなたに託す中、フレイムファングの真の狙いが明らかになります。彼らは最初から商人だけでなく、不滅隊そのものを標的にしていたのです。</p>
      <p>味方の中にテンパードの密偵がいたと知り、ギシルベルトは打ちのめされます。兵は殺され、あるいは連れ去られ、彼は自分が結果として敵に部下を差し出してしまったのだと悔やみます。残された指揮系統を立て直そうとしながら、彼はあなたに、まだ生きている兵たちを死よりも惨い運命から救ってほしいと懇願します。ハムジ・ガーは、あなたが遭遇したザゴズ・テーこそフレイムファングを動かす腐った顎であり、その目的はテンパードを増やすことにあると語ります。炎に焼かれた奴隷が増えるたびにイフリートの力は膨れ上がり、その祭壇の炎はザンラクの狂信者たちに邪悪な力を授けるのです。</p>
      <p>反撃のため、ハムジ・ガーはあなたをザハラクへ送り込み、檻に閉じ込められた捕虜たちを解放するよう命じます。あなたは番人を倒して鍵を奪い、死を覚悟していた不滅隊の新兵、不滅隊に捕らえられたことで誰を信じればよいかわからなくなった商人、帝国に故郷を奪われ、今またアマルジャ族に自由を奪われたアラミゴ人、そして星を見上げて寝ていたところを襲われた冒険者を救い出します。彼らの恐怖と混乱は、フレイムファングの手がどれほど深く広がっていたかを物語っていました。</p>
      <p>あなたの襲撃はフレイムファングに大きな打撃を与えますが、ルーン・ガーの怒りはさらに激しく燃え上がります。母を傷つけた獣ザゴズ・テーへの復讐を叫び、その心臓を引きずり出してやると憎しみをむき出しにします。ハムジ・ガーは彼女を止めます。それは彼女がミコッテだからではなく、今の彼女にはあの敵と渡り合うための武の知恵がまだ足りないからです。ヤドヴ・ガーは彼女と共に戦うと申し出ますが、戦長はそれも退けます。これは血の報復であり、掟によって誰も助力することはできません。敗北の恥をぬぐえるのは、自らの手で勝利をつかんだときだけなのです。ルーン・ガーが怒りのまま去ると、ハムジ・ガーは、ドレイクが我が子を谷底へ落とし、自力で這い上がる姿を見るという言い伝えを引き合いに出し、それこそがアマルジャ族の在り方なのだと語ります。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ハムジ・ガー　南ザナラーン <small class="muted">(X:23.9, Y:14.2)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="ranger-rescue.html">孤独なる復讐</a></div>
      <div class="row">いずれかのクラス・ジョブ <small class="muted">Lv 48～</small></div>
      <div class="row">アマルジャ族「灰の一党」の友好関係をランク2「認定」にする</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="martial-perfection.html">至強への道</a></div>
    </div>`
  },

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'反叛之火',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文',
    readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Hamujj Gah 收到 Brotherhood of Ash 斥候帶回的消息，得知宿敵 Flamefangs 正準備再次發動綁架襲擊。他們的計畫依靠潛伏在受害者社群中的 tempered 密探，藉由這些人傳遞情報，Flamefangs 才能如此精準地掌握獵物行蹤。因為你能在 Little Ala Mhigo 中行動而不引起懷疑，Hamujj Gah 要你前往那裡，揪出這些受 Ifrit 影響的密探，讓這座聚落真正成為避難之地。</p>
      <p>在 Little Ala Mhigo，Gisilbehrt 承認你的警告解釋了 Amalj’aa 為何總能如此巧妙地設下伏擊。若聚落內部有人監視商人與旅人的行程，那麼這些接連發生的襲擊便不再難以理解。就在此時，一名 Immortal Flames 新兵回報，Amalj’aa 綁匪正在襲擊一支旅人商隊，並把俘虜拖往 Zanr’ak。由於多數士兵仍在上次交戰後療傷，Gisilbehrt 只能召集少數還能戰鬥的人，也請你立刻趕往現場支援。</p>
      <p>等你趕到時，任務已經徹底崩潰。Immortal Flames 士兵倒在地上，其中一名新兵則揭露自己其實是 tempered 密探，只忠於 Ifrit，並因替 Flamefangs 效力而得到獎賞。他得意地說，只需要在正確的人耳邊說上正確的一句話，就能讓整支隊伍自行踏入屠宰場。如今 Little Ala Mhigo 的守備力量已經殘破，Amalj’aa 將能肆無忌憚地襲擊，而這天被俘的士兵，也會成為 Lord of the Inferno 軍隊的新成員。你擊敗他埋伏在附近的同夥，但 Loonh Gah 趕到時，才發現眼前其實是更大的陷阱。</p>
      <p>Flamefangs 的首領 Zagozz Teh 現身，嘲笑 Brotherhood of Ash 拒絕臣服於 Ifrit 淨化之火。他眼中，這些人只是逐漸消逝的過去幽靈，軟弱到只能與所謂的奴隸種族為伍。Loonh Gah 一眼認出他，知道他就是當年殘害自己母親的凶手。她憤怒地質問俘虜的下落，卻在對峙中被一股驚人的熱力壓倒。受傷的 Immortal Flames 軍曹請你回去向 Gisilbehrt 回報，而 Flamefangs 計畫的真正規模也隨之清楚起來：他們從一開始瞄準的就不只是商人，而是 Immortal Flames 本身。</p>
      <p>Gisilbehrt 得知自己隊伍中竟然有 tempered 密探後大受打擊。他的部下不是被殺，就是被擄走，而他意識到自己幾乎等於親手把士兵送到敵人面前。當他試圖挽救殘破的指揮系統時，他懇求你救出仍活著的士兵，避免他們落入比死亡更可怕的命運。Hamujj Gah 聽完你的回報後，指出你遇見的 Zagozz Teh 正是驅使 Flamefangs 的腐爛巨口，他唯一的目的就是增加 tempered 的數量。每多一名被烈火烙印的奴隸，就會助長 Ifrit 的力量，而 Ifrit 祭壇上的火焰也會反過來賜予 Zanr’ak 狂信者邪惡的強大力量。</p>
      <p>為了反擊，Hamujj Gah 派你潛入 Zahar’ak，打開囚籠救出俘虜。你擊倒看守並取得鑰匙，釋放那些被困在籠中的人：早已向神明交代後事的 Immortal Flames 新兵、因為最初抓住自己的人就是 Immortal Flames 而不知該信任誰的商人、先被帝國奪走故鄉又被 Amalj’aa 奪走自由的 Ala Mhigan，以及只記得自己躺在睡墊上仰望星空，下一刻就被人打昏並在籠中醒來的冒險者。這些人的恐懼與困惑，顯示 Flamefangs 的陰影已經伸得多深。</p>
      <p>你的行動重創了 Flamefangs，但 Loonh Gah 的怒火並未平息。她要求向 Zagozz Teh 復仇，想親手撕出那個殘害她母親的野獸的心臟。Hamujj Gah 阻止了她，並非因為她是 Miqo’te，而是因為她還缺乏足以面對那種敵人的戰鬥智慧。Yadovv Gah 表示願意與她並肩作戰，但 Hamujj Gah 也拒絕了。這是血仇，依照他們的律法，沒有任何人能出手相助。只有靠自己的勝利，才能洗去敗北的恥辱。Loonh Gah 憤怒離去後，Hamujj Gah 提起一則說法：drake 會把自己的幼子丟進深谷，只為看牠是否能靠爪子爬回來。對 Amalj’aa 而言，戰士也必須如此成長。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">

    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="ranger-rescue.html">孤獨的復仇</a></div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.innerHTML = '<svg class="lang-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 12h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 1 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 3a12 12 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>'+t.langLabel+'</span>';
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
