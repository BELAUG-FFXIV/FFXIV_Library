  <style>

    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}

    .tab-panel.scroll-panel{

}
.tab-panel.scroll-panel p:first-child{margin-top:0}

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`The Scarlet Bloodletter`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Novv brings you urgent news from the sea. The Coral Tridents and their finless servants, the Serpent Reavers, are swarming yet another vessel off the coast of western La Noscea. If they are allowed to sink this ship as they did the last, the shorewalker elders will surely turn their armies upon Novv’s people once more. So he asks you to become the rock he once spoke of—to board the merchant vessel Swallow and break the advance of his reckless kin before even more blood is spilled.</p><p>Because you cannot cross those waters as a Sahagin can, Novv sends you to his son, who lends you a great elbst bred to carry warriors through deepwater battle. Riding the seabeast out across the waves, you reach the Swallow at the height of panic. Its captain is already in the humiliating process of abandoning ship, and when he realizes you are not with the attackers, he wastes no time in begging for help. He asks you to hold the enemies on deck while his crew lowers the lifeboats, and you answer him in the only way that matters—by throwing yourself into the fight.</p><p>Under your assault, the Sahagin raiders are driven back long enough for the crew to escape. The captain, shaken but alive, can only marvel at the sight of you appearing out in the middle of the sea without a ship of your own. Though his beloved Swallow is lost, he says that losing a vessel is still better than losing his life and the lives of his men. In Aleport, as he tries to steady himself after the disaster, he speaks bitterly of what has become of the trade routes and recounts how the attackers proudly named themselves the Coral Tridents before praising their leader as a red-hued sea devil.</p><p>That name draws the immediate attention of a Maelstrom officer, Ururu Kogururu. When the captain clarifies that the Sahagin called their leader scarlet, the officer goes pale and tells of a pirate who terrorized western La Noscea some fifteen years earlier. So savage was this Sahagin that even hardened sailors trembled at the thought of him, and the white coral necklace he wore became stained red with blood. In fearful whispers, people came to call him the Scarlet Sea Devil. The officer had believed that monster long dead, but now, hearing that name spoken again, he realizes the horror may have returned.</p><p>When you return to Novv, he is pleased to hear that although the Swallow was taken, its crew escaped with their lives. The oranges given to you in thanks become a small gift for the young Sahagin, who greet them with innocent curiosity, and for a moment the tension eases. Yet Novv cannot ignore what you have learned. He explains that the Coral Tridents have risen because victory brings renown among their kind, and their careful use of the Serpent Reavers has won them growing strength. But the news of a new leader changes everything. Hearing the name at last, Novv understands the danger at once. The Scarlet Sea Devil has returned, and with that realization, the sea grows darker still.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Novv <small class="muted">(Western La Noscea, X:16.7, Y:22.8)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="clutch-and-kin.html">Clutch and Kin</a></div><div class="row">Disciple of War or Magic Lv. 46</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="watching-the-spawn.html">Watching the Spawn</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'海魔の名は潮騒に乗って',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>ノォヴは、海から届いた不穏な報せをあなたへ告げる。西ラノシア沖では、珊瑚の三叉団と、その手先である蛇の這い手たちが、またしても交易船を襲っているのだという。前の船と同じように沈められれば、岸を歩く者たちの長老が再び軍勢を差し向け、ノォヴたちにも大きな災いが降りかかりかねない。だからこそ彼は、かつて語った「岩」となってほしいとあなたへ願い、交易船スワロー号へ向かって、無謀な同胞たちの進撃を止めてくれと頼む。</p><p>遠くの海まで自力で渡れないあなたのために、ノォヴは息子のもとへ行くよう勧める。そこで貸し与えられたのは、深海での戦いでも兵を運べるよう育てられた大型のエルブストだった。その背に乗って波間を越え、あなたは混乱のさなかにあるスワロー号へとたどり着く。船長はすでに撤退の支度を進めており、あなたが襲撃者の仲間ではないと知るや、ためらうことなく助けを求めてくる。部下たちが救命艇を下ろすあいだ、甲板の敵を食い止めてほしい――そう託されたあなたは、ただちに戦いへ身を投じる。</p><p>あなたが敵を押し返したことで、乗組員たちはついに船から逃れることに成功する。船長は命を拾った安堵と、愛船を失う痛みのあいだで揺れながらも、海のど真ん中に船もなく現れたあなたの働きへ惜しみない感謝を向ける。エールポートへ戻ったあと、彼は荒らされる航路への嘆きを口にしつつ、襲撃者たちが自らを珊瑚の三叉団と名乗り、その頭目を「赤き海の悪魔」と讃えていたと語る。</p><p>その呼び名に、居合わせた黒渦団士官は激しく反応する。色が「緋色」だったと聞かされた彼は、十五年ほど前に西ラノシア一帯を震え上がらせた、凶悪なサハギンの海賊について語り始める。どれほど胆の据わった船乗りでも、波間にその気配を感じるだけで手が震えたという。白珊瑚の首飾りは血に染まり、その残虐さゆえに人々は酒場の噂話の中で、その怪物を「緋色の海魔」と囁いた。すでに老いて死んだものと思われていたその恐怖が、いま再び海から現れようとしていた。</p><p>ノォヴ育成地へ戻ると、ノォヴは、船こそ奪われたものの多くの命が救われたことを喜ぶ。礼として渡された果実は幼いサハギンたちに分けられ、ひとときだけ場にやわらかな空気が満ちる。だがノォヴは、あなたが持ち帰った報せの重さをすぐに悟る。珊瑚の三叉団が勢いを増しているのは、戦果を挙げた者が同胞のあいだで称えられ、蛇の這い手を巧みに用いることで勝利を重ねているからだという。けれど新たな頭目の名は、それ以上に深刻だった。ノォヴはその名を聞き、計画が大きく狂いかねないことを悟る。緋色の海魔が、再び戻ってきたのだ。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ノォヴ <small class="muted">（西ラノシア, X:16.7, Y:22.8）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="clutch-and-kin.html">まほろばの血族</a></div><div class="row">ファイター ソーサラー Lv 46～</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="watching-the-spawn.html">わだつみに父は誓う</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'海魔乘潮歸來',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Novv 帶來了來自海上的壞消息。Coral Tridents（活躍於 western La Noscea 外海的 Sahagin 武裝掠奪集團，經常襲擊商船，並與 Serpent Reavers 協同行動）和他們那些沒有鰭的爪牙 Serpent Reavers（與 Sahagin 勾結行動的海盜集團，活躍於 Limsa Lominsa 周邊海域與 western La Noscea 一帶），如今正在 western La Noscea 外海圍攻另一艘船。若這艘船也像上一艘一樣沉沒，岸上的長老勢必又會把軍隊帶來，將怒火指向 Novv 的族人。於是，Novv 再次把你視作他曾說過的那塊「岩石」，請你盡快登上名為 Swallow 的商船，去阻止那些魯莽同族的攻勢。</p><p>由於 Sahagin 能夠長距離在海中行動，你卻沒有那樣的身體條件，Novv 便讓你去找他的兒子借用海獸。對方交給你一隻巨大的 elbst，那是平時用來在深海衝突中搬運傷者的生物，如今也能載著你直奔戰場。你乘著牠破浪而去，抵達 Swallow 時，船上早已陷入混亂。船長正狼狽地準備棄船逃生，一發現你不是來搶掠的敵人，立刻改口向你求援。他拜託你先拖住甲板上的敵人，好讓船員爭取時間把救生艇放下去，而你也沒有多作停留，立刻迎上那場戰鬥。</p><p>在你的奮戰之下，船上的 Sahagin 總算被壓制住，Swallow 的船員們也趁機成功逃離。船長雖然心痛失去愛船，卻更清楚自己和船員能保住性命已是萬幸。等回到 Aleport 後，他仍驚魂未定，一邊痛罵如今的航線根本成了掠奪者的獵場，一邊回想起那些登船襲擊的傢伙還曾得意洋洋地自報名號，自稱是 Coral Tridents，並吹捧他們的首領是某種「赤紅色的海魔」。</p><p>這句話立刻引來一名黑渦團軍官的注意。當船長進一步確認，對方提到的正是「緋紅」時，那名軍官的神色一下子就變了。他說，大約十五年前，western La Noscea 曾被一名極其殘暴的 Sahagin 海盜拖入漫長的恐懼之中。即便是最老練的水手，只要一想到那傢伙可能出現在海面上，雙手都會不自覺發抖。據說那名怪物脖子上原本戴著白珊瑚項鍊，卻因長年浸染鮮血而變得赤紅，於是人們在酒館低聲流傳的故事裡，便把他稱作 Scarlet Sea Devil（曾令 western La Noscea 一帶聞之色變的殘暴 Sahagin 海盜，以嗜殺聞名，名字來自他那條被鮮血染紅的白珊瑚項鍊）。所有人本以為那樣的怪物早已老死，沒想到如今，這個名字竟又重新浮了上來。</p><p>當你回到 Novv 那裡時，他得知 Swallow 雖然失守，但船員都成功逃生，顯然鬆了一口氣。船長送你的橘子也被分給了那些年幼的 Sahagin，看著他們對陌生果實露出單純好奇的模樣，周圍的氣氛短暫地柔和了下來。可 Novv 很快又沉了下來，因為你帶回的不只是獲救的消息，還有更不祥的徵兆。他告訴你，Coral Tridents 之所以近來聲勢大漲，是因為在 Sahagin 之中，能在戰鬥中取勝的人自然會得到推崇，而他們又善於運用 Serpent Reavers，才讓勝利越來越多。但真正讓他不安的，是那個新首領的名字。當他聽見 Scarlet Sea Devil 再度出現時，立刻明白，原本的盤算恐怕全都要被打亂了，那個曾讓整片海域蒙上陰影的存在，已經回來了。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 諾布 <small class="muted"> 西拉諾西亞 (X:16.7, Y:22.8)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="clutch-and-kin.html">光榮之地的血族</a></div><div class="row">戰鬥或魔法職等級 46 以上</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="watching-the-spawn.html">以父之名向海神宣誓</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
