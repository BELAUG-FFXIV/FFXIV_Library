    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Krile admits she can see how sharing that drink would feel unifying—and she’s impressed the tradition has endured here, so far from the Milalla’s native lands. G’raha Tia immediately thinks ahead: if it truly counteracts lightning’s influence on the body, it could help Alexandrians too, and Lumull would likely be glad to share it.</p><p>Lumull, meanwhile, is still thinking about repairs and wonders if you really want to spend your visit working—especially after everything you’ve already done to protect the city. Krile explains you didn’t come merely to lend muscle: your goal is to learn the present state of the Mist Continent. Lumull is stunned by the scope, then even more stunned when Krile says you came from Alexandria. He backpedals from doubting her, but the truth is it’s hard to process—visitors are rare enough, and Alexandria is the nation that “up and vanished.”</p><p>Krile acknowledges the shock, then says plainly what you’re doing in Treno: it’s your first time here, and you want to know the city and its people, which is why you offered help where it’s needed. Lumull decides the best place to start is simple and urgent—distribution. He asks you to deliver Sleepless Rhapsody to those who couldn’t step away after the fiend attack, promising that even busy hands will still spare words for “fascinating folks from afar.” He hands the batch to Krile and says he’ll deliver some to town hall while you cover the rest.</p><p>Back on Main Street, G’raha Tia notes that Lumull’s reaction mirrors Miayli’s—maybe people here lost friends or family when Alexandria disappeared. Krile suggests you split up so you can talk to more locals while still getting the remedy out quickly, and she divides the servings. You’re sent to the southern part of the city while Krile and G’raha Tia cover the north.</p><p>As you make the rounds, what you hear is a portrait of survival under constant pressure. A laborer thanks you, explaining he took a nasty dose of discharged energy while hauling carcasses for processing, and it triggered levin sickness hard. Yet even that becomes part of Treno’s practicality: they don’t hunt beyond the barrier, so they waste nothing that stumbles in. Hides charged with lightning aether can be tanned into protective clothing that keeps you from getting zapped. A fighter, still exhausted, talks about how the sudden influx of beasts was unusual—but also how practice keeps skills sharp, and watching you gave him ideas for improving his arcane geometries. An inspector proudly mentions she helps prepare the remedy herself: the herbs come from her own growery, and one of their era’s great discoveries is that seeds carried in by invading creatures can be cultivated into plants that mitigate lightning’s effects. She even admits the city’s flowers sprouted the same way, which makes it hard to truly begrudge the creatures their trespass.</p><p>When you regroup, G’raha Tia jokes the scent will cling to your clothes for days. Krile says between you all, you’ve covered everywhere except Lumull’s area—and mentions someone asked her to pass something along to him. Before he returns, she proposes you compare notes.</p><p>Krile ties your observations to the bigger mystery: Milalla curative magicks here seem identical to Sphene’s. That implies either Sphene’s tutor was Milalla, or the art spread widely across the Ninth. She also notes the symbols and tomes strongly resemble arcanima—and if these truly trace back to the arcane geometries of the south sea isles as in the Source, it’s striking that the shard developed along such similar lines. G’raha Tia teases her not to let other Faculty graduates publish first.</p><p>From his side, G’raha Tia learned that Treno isn’t alone—other settlements exist across the Mist Continent, and a rail system moves goods between them. But barrier breaches trigger an emergency failsafe that halts the main line, so the train is currently stopped at a midpoint until operations resume. Sea routes exist too, but only see occasional use, leaving Treno often forced—like now—to rely on whatever is at hand.</p><p>Krile sums up the contradiction that defines the city: chronic scarcity, widespread levin sickness, frequent attacks, and real casualties—yet the people you met were not cowed. They aren’t merely surviving; they’re happy anyway. G’raha Tia answers with a simple principle: where there is life, there is hope—and believing in even a slightly brighter tomorrow means you build it, stone by stone, until a city rises. Krile agrees: a noble city, with noble purpose.</p><p>Then Lumull arrives in a panic—he dropped something and can’t find it, and he’s certain he’s doomed. Krile produces the missing item: someone asked her to pass it to him while she was distributing the remedy. It’s a tracking device keyed to the aether of creatures that breach the barrier—explaining how Lumull knew when you’d slain them. He flips it on… and immediately spirals, insisting his sister is going to kill him. He begs you to meet her—Eyaney, an electrope engineer—because she built the device and knows “interesting stuff.” He insists it’ll be educational, maybe you can even help, and—most importantly—she probably won’t kill him in front of other people.</p><p>Krile’s response makes it sound like the decision has already been made.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>クルルは、あの飲み物を皆で口にすることが「ひとつになる」感覚に繋がるのは理解できると言い、その伝統がミララの故郷から遠く離れたこの地で今日まで守られていることに感心する。グ・ラハ・ティアはすぐに実用面へ思考を伸ばし、雷の影響を身体から和らげる効能があるのなら、アレクサンドリアの人々にも役立つはずで、ルムルなら喜んで提供してくれるだろうと見込む。</p><p>一方のルムルは修理の件を気にしつつ、せっかく訪ねてきたのに働かせてよいのかと遠慮する。あなたたちはすでに街を守ってくれたのだから、と。クルルは本題を告げる。目的は「ミスト大陸の現状」を確かめることだと。大陸全体と聞いてルムルは驚き、海の向こうから来たのかと問うが、クルルは「そうではない」と言い、さらに「アレクサンドリアから来た」と明かす。ルムルは信じがたさに言葉を詰まらせつつも、疑うのは失礼だと取り繕う。だが、消えたはずの国からの来訪者など、滅多にあることではない。</p><p>クルルは衝撃を理解したうえで、初めて訪れたトレノの街と人々を知りたいから、困っている者を助ける提案をしたのだと説明する。ルムルはそれなら、と「スリープレス・ラプソディ」を配ってほしいと頼む。本来なら皆が一杯求めて集まるが、今回の騒ぎで手が離せない者もいる。忙しくても、遠方から来た興味深い客にはきっと話しかけてくれる――そう言って一括を渡し、自分は役所へ運ぶと言う。</p><p>メインストリートで合流すると、グ・ラハ・ティアはミアイリに続いてルムルも「アレクサンドリア」の名に動揺したと指摘する。消えた国と共に、友や家族を失った者がいるのかもしれない。クルルは効率と聞き取りの両方のために分担を提案し、分けた分を手渡す。あなたは南側を回り、クルルとグ・ラハ・ティアは北側へ向かう。</p><p>配り歩くなかで見えてくるのは、絶え間ない危機の中で生きる街の仕組みだ。ある労働者は獣の死骸を運ぶ作業中に放電したエネルギーを浴び、激しい雷病になったと語る。それでも彼らはバリアの外へ狩りに出ないからこそ、侵入してきた獣は余すことなく利用するという。雷属性の乙太を帯びた毛皮は特に価値があり、適切に鞣せば感電を防ぐ防護服になる。別の戦士は、多数の獣が同時に侵入するのは稀だが、鍛錬は技を鈍らせないし、あなたの戦いぶりから学ぶこともあったと言い、魔紋幾何の改良案を思いついたと興奮する。さらに検査官は、飲み物の材料となる薬草を自分の栽培地で育てていると誇り、侵入獣が運び込む種が「雷の影響を和らげる植物」へ育つことこそ現代最大級の発見だと語る。街の花々も同様に芽吹いたのだから、獣たちを手放しで憎めないのだとも。</p><p>合流すると、グ・ラハ・ティアは匂いが服に残りそうだと笑い、クルルは配布がほぼ終わったと確認する。そして「得られた情報」を整理しようと切り出す。クルルは、ここで使われているミララの治癒魔法がスフェーンのものと同一に見えると述べ、スフェーンの師がミララだったか、あるいは術が第九世界に広く伝播していた可能性を示す。加えて、文様や書物はアルカナに極めて近く、ソースの南洋諸島に由来する魔紋幾何と同系なら、欠片の側でも驚くほど似た発展を遂げたことになる。グ・ラハ・ティアは学会発表を先取りされぬよう注意しろ、と冗談を言う。</p><p>グ・ラハ・ティア自身は物資の流通を聞き取り、ミスト大陸にはトレノ以外の集落も点在し、鉄道網で物資が行き交っていると知った。だがバリア侵入は非常停止機構を作動させ、幹線は現在中継地点で止まっている。海路もあるが利用は稀で、結局トレノは「あるもので凌ぐ」局面が多い。クルルは、恒常的な不足、雷病の蔓延、襲撃と犠牲――それでも人々が萎れていないことを強調し、ただ生き延びるだけでなく、幸せそうにさえ見えたと言う。グ・ラハ・ティアは「生があるところに希望がある」と応え、わずかでも明るい明日を信じる限り、人は石を積み上げて街を築くのだと語る。クルルもそれを「高潔な目的を持つ街」だと評する。</p><p>そこへルムルが青ざめて現れ、何かを落として見つからず「終わった」と嘆く。クルルが差し出したのは、配布の途中で預かった品――侵入獣の乙太を追跡する装置だった。だからこそ討伐の成否を把握できたのだと納得した直後、ルムルは装置を起動して悲鳴を上げる。妹に殺される、と。妹エヤネーはエレクトロープ技師で装置の製作者だという。会ってほしい、見学してほしい、手伝ってほしい――そして何より「人前なら多分殺されない」と必死に縋る。クルルは、その流れで決まったとばかりに受け入れるのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>Krile 說，她確實能理解：那種飲品喝下去會讓人產生「一起承擔、一起撐住」的凝聚感；更令人佩服的是，這份傳統竟能在離 Milalla 原生地如此遙遠的地方延續至今。G’raha Tia 立刻想到更實際的一面——既然它能抵銷雷屬性對身體造成的影響，那麼對 Alexandria 的人民也可能派得上用場，而 Lumull 應該很樂意把這個方法分享出去。</p><p>Lumull 卻仍惦記著修繕與善後，忍不住反問：你們真的要被抓去做事嗎？千里迢迢來訪，應該有更重要的事才對，而且你們也已經幫忙守住了城市。Krile 便直接說明，你們真正的目標是要確認 Mist Continent 現在的狀況。Lumull 聽到「整個大陸」當場傻眼，還以為你們是從海的另一頭來的；Krile 卻說不完全是——你們其實是從 Alexandria 過來的。</p><p>Lumull 一瞬間幾乎要質疑，但又立刻收回，說自己那樣太失禮。只是他也坦白：這種事太難消化了——平常幾乎沒有訪客，更何況是來自那個「突然消失」的國家。Krile 表示她理解這份震撼，並說你們第一次來到 Treno，想更深入認識這座城市與居民，因此才會提出「幫忙解決眼前的需要」。Lumull 於是順勢把任務交給你們：請把這份名叫 Sleepless Rhapsody 的藥飲分送給其他人。照理說大家早就會來領一杯，但這次魔物闖入造成混亂，很多人一時抽不開身。Lumull 說別擔心，就算手邊忙，他們也一定願意跟「從遠方來的有趣客人」說上幾句。說完他把整批交給 Krile，自己則先送一部分去 town hall，讓你們去跑尚未踏足的區域。</p><p>回到 Main Street，G’raha Tia 提到 Lumull 的反應與 Miayli 很像——一聽到 Alexandria 就明顯動搖；也許這裡有人曾在 Alexandria 有朋友或家人，隨著那座國家一起「消失」。Krile 提議分頭行動：一來能更快把藥飲送到每個角落，二來也能多和居民談談。她把 Sleepless Rhapsody 分成三份，請你去城市南側巡一圈，而她與 G’raha Tia 負責北側。</p><p>你在南側送藥時，聽見的故事全都帶著 Treno 的生存邏輯。第一位勞工向你道謝，說自己正在把魔物屍體拖回來處理時，被放電能量掃到，雷病發作得很嚴重。可他轉眼又說，他們不會在屏障外狩獵，所以闖進來的魔物絕不浪費——尤其是那些充滿雷屬性乙太的皮革最值錢，只要用對材料鞣製，就能做成防護衣，減少被電擊的風險；你擊倒的魔物都會被好好利用。第二位戰士也感謝你帶來藥飲，說這次同時闖入的魔物特別多，讓人筋疲力盡；不過「保持實戰」也能讓技術更精準，他甚至從觀察你戰鬥中學到東西，迫不及待要回去改良自己的魔法陣幾何。第三位檢查員則一邊喝一邊說，安全檢查固然優先，但「戰鬥還沒真的結束」之前，她就需要先喝一杯 Sleepless Rhapsody。她還很自豪地表示藥草來自她自己的栽培區，而他們這個時代最重要的發現之一，就是侵入魔物帶進來的種子能被培育成「能緩解雷屬性影響」的植物；這次收集到的皮革與內臟也許還會帶來新的種子、新的草藥。她甚至說，城裡的花也是從那些種子長出來的，所以她其實很難對闖入者完全抱持怨恨。</p><p>當你回到集合點，G’raha Tia 打趣說這味道大概會黏在衣服上好幾天。Krile 表示你們三人幾乎把除了 Lumull 那一帶以外的所有區域都跑遍了；她還說，有位居民託她把某個東西轉交給 Lumull，但他人還沒回來。於是她提議趁空檔先整理你們各自得到的情報。</p><p>Krile 說她在幫傷者處理時注意到一件關鍵事：Milalla 的治癒魔法在這裡呈現出的形式，與 Sphene 的幾乎完全相同。這代表兩種可能——Sphene 的導師也是 Milalla，或是這門技藝早已在第九世界廣泛流傳。她又提到你所看到的符號與典籍，和 arcanima 非常相似；如果它們真的是像 Source 一樣源自 south sea isles 的「魔法陣幾何」體系，那麼這個 shard 的發展路徑竟能如此接近，實在耐人尋味。G’raha Tia 立刻吐槽：這種話可別讓其他研究機構的人聽見，免得被搶先發表。</p><p>G’raha Tia 也帶回了關於物資與交通的線索：Mist Continent 上仍然存在其他聚落，只是數量不多，而各地之間靠鐵路系統運輸物資；然而只要屏障遭到突破，主線就會啟動緊急保護機制停擺，現在火車正卡在某個中途站，得等運作恢復才能繼續。海路也不是沒有，但使用頻率很低，所以像現在這種情況，Treno 往往只能靠現有資源硬撐。</p><p>Krile 把這一切放在一起下結論：長期的匱乏、普遍的雷病、頻繁的襲擊與傷亡——然而你們遇見的人都沒有被擊垮。他們不只是「活下來」而已，甚至能在這樣的日常裡維持笑容與踏實。G’raha Tia 說，能活著就代表還有希望；只要相信明天會比今天稍微亮一點，人就只能一步一步把它造出來——直到石塊一層層堆起，一座城市再次站穩。Krile 也認同：這是一座高貴的城市，懷抱著高貴的目的。</p><p>就在此時 Lumull 慌慌張張跑來，說自己掉了東西怎麼找都找不到，完蛋了。Krile 把那樣東西遞給他——她在分送藥飲時，有人託她轉交。G’raha Tia 一看就懂：那是追蹤裝置，能捕捉闖入屏障的魔物乙太。Lumull 點頭說沒錯，這也解釋了他為什麼能知道你們已經把魔物擊倒；他把裝置打開示範——然後立刻崩潰尖叫，說自己的妹妹要殺了他。為了保命他開始拼命推銷：「要不要去見我妹妹 Eyaney？」她是 electrope engineer，懂超多技術，而且那個裝置就是她做的；去看她工作也許你們還能幫上忙——最重要的是，他覺得她「大概不會在外人面前殺人」。Krile 的語氣聽起來像是：既然都說到這裡了，那就這麼辦吧。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 盧穆爾 <small class="muted">(特雷諾, X:11.4, Y:11.6)</small></div></div>`,
    unlockq:`<div class="stack">

  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
</html>
