    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Krile can’t help but wonder what kind of terror this Eyaney truly is, while G’raha Tia—ever the analyst—asks if Treno’s barrier resembles Alexandria’s, and whether that means electrope technology is commonplace here too. Lumull, visibly panicking, says Eyaney should be waiting just past the park and urges everyone to move before anyone reconsiders.</p><p>By the time you reach Bridge Street, Krile notes Lumull is sweating profusely. G’raha Tia muses that whenever they meet engineers from distant lands, he wishes he could introduce them to Ironworks—just to witness the ensuing deluge of questions. Lumull tries to steady his breathing… and Eyaney greets you.</p><p>She thanks you for helping earlier, then immediately narrows her eyes at Lumull and asks what he did. Lumull stammers about the “advanced monster tracking” device, and Eyaney explodes—he broke it again. She snaps that electrope is running low and she’s an engineer, not a miracle worker. Lumull drops into full damage control, begging forgiveness and trying to hide behind the presence of guests. Eyaney sees right through it: he dragged you here so she wouldn’t tan his hide, and she apologizes for his behavior.</p><p>Krile calmly turns the moment into an introduction, saying you’re glad for the chance to meet—and that Lumull mentioned Eyaney might have work you could assist with. Eyaney scolds Lumull again: guests aren’t servants. Krile clarifies that you asked to help because you want to understand what life in Treno is like—and because, with Eyaney’s expertise, you’d like to learn how the city uses electrope.</p><p>That changes the tone. Eyaney agrees to share what she knows, and G’raha Tia asks about her earlier remark: Treno has little electrope to spare—so is it hard to procure? Eyaney answers bluntly: they never have as much as they need. Much of what they use is repurposed, and she spends plenty of time digging through scrap whenever a vital device breaks. The barrier should be their highest priority, but they simply don’t have enough electrope to repair it properly. Lumull adds that the longer they’re cut off from the mine, the worse it gets—if only they could scare the beasts away.</p><p>Krile points out you passed through a mine on the way in—and when it becomes clear the hazards are already dealt with, Lumull can barely believe it. Eyaney’s reaction is immediate, too: if the mine is safe, then they can start extracting electrope again. They celebrate, then split responsibilities—Lumull will handle the mining, and once machinery is running he must send electrope to the barrier service station. G’raha Tia offers to accompany him, because even if the mine is cleared, there’s no telling what else lurks outside the barrier. Lumull accepts with palpable relief.</p><p>That leaves you with Eyaney. Krile observes the pair remind her of a certain sibling duo you all know. Eyaney suddenly realizes she never asked your names, apologizes, and introduces herself properly; Krile introduces herself and you, and also introduces G’raha Tia as a fellow technology enthusiast. Eyaney admits it feels strange to put visitors to work, but she truly needs the help.</p><p>She explains the scale of the problem: it’s not just that everything needs fixing—her legs complicate everything. She suffers paralysis flare-ups at the worst times, so while she can shuffle between stations on good days, she usually relies on Lumull to dash around the city. With him heading to the mine, someone else has to deal with lightning sprites—drawn to the discharged aether of slain creatures.</p><p>Normally she’d lend you a detector to track them, but Lumull broke it again. Instead, she gives you a synthetic desensitizer: throw it at a sprite and it suppresses the creature’s ability to sense nearby aether, which usually causes it to wander out of the city toward more “fertile” ground. Krile confirms that means you don’t need to fight them. Eyaney says it’s safer not to—when threatened, sprites can siphon energy from facilities the city needs to keep medical services running, or emit bursts that overload nearby systems. She advises you to stick to thoroughfares where you can spot them early; she’d hate for you to be injured while helping.</p><p>You head out to survey vantage points. For a while, there’s nothing—until you finally spot lightning sprites. You test your throwing arm, use the synthetic desensitizer, and successfully drive them off. When you return, Eyaney asks how many you found; hearing it was only a handful on your route, she says it could’ve been worse—yet keeping the city clear of them matters, and she thanks you sincerely.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>クルルは、エヤネーという人物がどれほど恐ろしい相手なのかと首をかしげ、グ・ラハ・ティアはトレノのバリアがアレクサンドリアのものと似た設計なら、ここでもエレクトロープ技術が標準なのかと推測する。ルムルは「公園の先にいるはずだ」と言って、誰かが気を変える前に出発しようと急かした。</p><p>ブリッジストリートでは、クルルがルムルの汗の量を指摘する。グ・ラハ・ティアは、遠い国の技術者に会うたびにアイアンワークスに紹介したくなると語り、質問の嵐が吹き荒れる光景を想像してしまう。ルムルは必死に深呼吸を繰り返し、そこへエヤネーが現れて声をかけた。</p><p>エヤネーは手助けへの礼を述べつつ、視線をルムルへ移して即座に問いただす――「ルムル。何をした？」　ルムルがモンスター追跡装置について言い訳を始めると、エヤネーは怒鳴り返す。「また壊したの！？」　エレクトロープが不足しているのに、彼女は奇跡を起こす人間ではない、と。ルムルは土下座同然に許しを乞い、客がいるから見逃してくれと懇願するが、エヤネーは見抜いていた。あなたたちを盾にして叱責を免れようとしたのだ、と謝罪までしてしまう。</p><p>クルルは場を整え、会えて嬉しいこと、そしてルムルから「手伝える仕事があるかも」と聞いたことを伝える。エヤネーは改めてルムルを叱る――客人を召使い扱いするな、と。クルルは誤解を解き、トレノの暮らしを知るために自分たちから手伝いを申し出たのだと言う。さらに、エヤネーの専門知識を借りて、街がエレクトロープをどう運用しているのかも教えてほしいと頼む。</p><p>その姿勢なら、とエヤネーは知る限りを話すと約束する。グ・ラハ・ティアが「余裕がない」と言っていたのは調達が難しいからかと問うと、エヤネーは率直に答える。必要量には全然足りず、手元の分も再利用が多い。重要機器が壊れれば、彼女はスクラップを漁って部品を捻出する。最優先は老朽化したバリアの修復だが、まともな修理に回せるエレクトロープが足りない。ルムルは採掘場に入れない期間が長引けば状況は悪化する一方だと言い、獣を追い払えればいいのにと嘆く。</p><p>そこでクルルが、来る途中に鉱山を通ったはずだと言い出す。獣はすでに排除されたと聞いた瞬間、ルムルは信じられないと叫び、エヤネーも採掘が再開できるのかと身を乗り出す。二人は喜び、ルムルは採掘を担当し、機械を動かしたらバリア整備所へエレクトロープを回すよう念を押される。グ・ラハ・ティアは、鉱山が安全でもバリア外に何がいるかわからないとして同行を申し出る。ルムルは心底ほっとした様子で受け入れた。</p><p>クルルは、ルムルとエヤネーのやり取りが「どこかの兄妹」を思い出させると呟く。エヤネーは今さらながら名乗り忘れに気づいて謝り、クルルとあなたの名、そして技術好きのグ・ラハ・ティアを紹介される。エヤネーは、客人に仕事を頼むのは変な気分だが助けが必要だと認める。</p><p>彼女が語るのは、復旧作業の量だけではない問題だった。脚の麻痺が最悪のタイミングでぶり返し、良い日でも持ち場を小走りに移動する程度しかできない。普段はルムルが街中を走り回ってくれているが、彼が鉱山へ向かう以上、今度はあなたたちが「雷のスプライト」対策をする必要があるという。倒された獣が放つ放電した乙太に引き寄せられるからだ。</p><p>本来なら探知器で追跡させたいが、例の通り壊されてしまった。代わりに彼女は「合成デセンシタイザー」を渡す。スプライトへ投げつければ近くの乙太を感知する能力を抑え、街の外、より“肥沃な”場所へ彷徨っていくことが多い。クルルが「戦う必要はないのか」と確認すると、エヤネーはむしろ戦わない方が安全だと言う。脅かされれば医療設備が稼働するために必要な施設からエネルギーを吸い上げたり、周囲のシステムを過負荷にする放出を起こしたりする。だから見通しの良い通りを選び、早めに発見できるようにしろ――手伝いで怪我などしてほしくない、と。</p><p>あなたは見晴らしの良い地点を順に確認していき、しばらく見つからないまま進む。やがて雷のスプライトを発見し、合成デセンシタイザーを使って追い払う。戻ったあなたにエヤネーは数を尋ね、少数だったと聞いて「まだマシ」と言いつつも、街から排除することは重要だと感謝を述べるのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>Krile 半開玩笑地說，她開始好奇：這位 Eyaney 到底有多可怕。G’raha Tia 則把注意力放在技術上，如果 Treno 的屏障結構和 Alexandria 類似，那是否代表這裡也把 electrope（Alexandria 與第九世界常用的能量礦物／導能材料，用於驅動設備與屏障系統）技術當成標準配備？Lumull 一邊催促一邊指路，說 Eyaney 就在公園再往前一點，趁大家還沒改變主意趕快走。</p><p>到了 Bridge Street，Krile 一眼就看出 Lumull 汗流得誇張。G’raha Tia 忍不住碎念：每次遇到遠方國度的工程師，他都好想把對方介紹給 Ironworks 的朋友——那裡一定會掀起一場提問風暴。Lumull 則在旁邊努力深呼吸，像是在替自己壯膽。</p><p>Eyaney 出現後先向你們道謝，說先前的幫忙她很感激，但立刻把視線轉向 Lumull，語氣一沉：「你做了什麼？」Lumull 結結巴巴提到那個「高階魔物追蹤裝置」，話還沒說完，Eyaney 就炸了——又壞了？她直接吼出來，說 electrope 已經很缺了，她是工程師，不是能無限修理的奇蹟製造者。Lumull 立刻跪地求饒，還想用「有客人在」當擋箭牌，希望她這次放過他。Eyaney 一眼看穿：他就是想把你們拉來當護身符，免得她把他「剝皮」。她還反過來向你們道歉，說你們絕對想不到他竟然是哥哥。</p><p>Krile 把場面拉回正軌，表示能見到 Eyaney 反而很高興，而且 Lumull 說你們也許能幫上忙。Eyaney 立刻又教訓 Lumull：你們是客人，不是僕人，還要不要再上一次禮貌課？Krile 便清楚說明，你們是自己提出想協助，因為你們想知道 Treno 的生活樣貌；同時也希望藉由 Eyaney 的專業，了解這座城市是如何運用 electrope 的。</p><p>這句話讓 Eyaney 的火氣明顯降下來。她說如果是這樣，她願意分享自己知道的。G’raha Tia 接著追問：她剛剛聽起來像是 Treno 幾乎沒有多餘的 electrope，所以是很難取得嗎？Eyaney 的回答很直白：永遠不夠用。很多設備都是拆東補西、反覆再利用；只要哪個重要裝置壞了，她就得去廢料堆翻找零件。最該優先修的其實是那座老舊的屏障，但手邊 electrope 不足，根本做不了「真正該做的修復」。Lumull 也補一句：只要礦坑一直進不去，情況只會越來越糟；要是能把那些魔物嚇走就好了。</p><p>Krile 立刻抓到關鍵，說你們來的路上不是經過礦坑了嗎？當你們確認礦坑裡的威脅已經被排除後，Lumull 震驚到大叫：「就這樣？你們就處理掉了？」Eyaney 也立刻反應過來——那代表礦坑能重新開採了。兩人一起喊出「太好了！」然後分工瞬間定下：Lumull 去負責採礦，Eyaney 則要他把追蹤器修好、並且在機械重新運轉後，務必把 electrope 送到屏障維修站。G’raha Tia 提醒：就算礦坑清乾淨了，屏障外依然可能有未知風險，因此他願意陪 Lumull 一起去。Lumull 幾乎是帶著「得救了」的表情接受，坦白說他真的不想自己一個人去。</p><p>你留下來協助 Eyaney。Krile 低聲說，這兩個人讓她想到你們認識的另一對兄妹。Eyaney 這才驚覺自己竟然忘了問名字，連忙道歉。Krile 自我介紹，並介紹你，還順帶把 G’raha Tia 介紹成「你們自己的技術狂熱者」。Eyaney 說要讓客人工作她其實很彆扭，但她也不否認：她確實需要幫手。</p><p>她解釋，修復工作量大是一回事，更麻煩的是她的腿——麻痺總在最糟的時候發作。狀態好的日子，她也只能在各個工作站之間慢慢挪動；平常跑遍全城的工作多半交給哥哥。現在 Lumull 要去礦坑，就得有人接手另一個麻煩：雷屬性精靈（lightning sprites）。牠們會被被擊倒魔物所殘留的放電乙太吸引而聚集。</p><p>她原本想把偵測器借你們，方便追蹤，但 Lumull 又把它弄壞了。於是她改給你們 Synthetic Desensitizer（合成鈍感劑）：往精靈身上一丟，就能抑制牠感知附近乙太的能力，通常牠們就會自己晃出城，往更「適合」的地方游移。Krile 立刻確認：也就是說不用打？Eyaney 說對，最好不要打——精靈一旦受威脅，可能會從你們必須維持運作的設施（尤其醫療相關）抽走能量，或是釋放脈衝讓附近系統過載。基於同樣理由，她建議你們走在視野開闊的主要道路，才能提早發現；她不希望你們在幫忙時反而受傷。</p><p>你們再次分頭巡查幾個制高點，前兩處都沒看到任何精靈。直到在 Codetta Quarter 終於發現目標——你把合成鈍感劑丟出去，成功讓牠們失去對乙太的追蹤能力並逐漸散去。回到 Eyaney 身邊後，她立刻關心你們遇到多少；聽到只是幾隻，她說那還算好，但清掉它們仍然很重要，並向你們表達真心的感謝。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
