    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
 <p>Hildibrand declares you and he are “siblings” now, bonded by the secrets of House Manderville, and orders you to use that knowledge: go to the fallen chimera and dance like only a Manderville can. He promises to keep his distance—but insists he will rush to your side if anything goes wrong. Gilgamesh can hardly believe a man could be summoned through dance, while Nashu can’t hide her excitement to see you do the Manderville.</p>
  <p>When you dance by the chimera, a voice answers with a Manderville song, and Godbert reveals himself. Gilgamesh announces that he’s coming, and Godbert arrives laughing, saying you have nothing to fear—he only came to settle accounts with the chimera. He immediately recognizes the Manderville dance, recognizes you as “he of strong-yet-tender fingers,” and demands to know how you learned it if he didn’t teach you—until he sees the impossible: Hildibrand is alive.</p>
  <p>Godbert erupts, calling out Hildibrand’s full name and scolding him for ten years away from home, and five years since the trip to Dalamud—how long was he going to let his parents believe he was dead? Gilgamesh reels at the revelation that this goldsmith is Hildy’s father, and Godbert launches into yet another Manderville tune while Hildibrand begs him to stop and focus on the urgent problem: Maria’s antique vase must be made whole.</p>
  <p>Godbert waves away the difficulty—he deals with worse before his morning bowel movement—and begins his work, calling on Byregot to guide his hammer. When he’s finished, he praises the new sparkle and elegance, but Hildibrand is horrified: Godbert has “destroyed” the antique’s historical value. Godbert insists he has improved it, then needles Hildibrand about how long it’s been since he last held a hammer. Hildibrand refuses—his path is investigation, helping those in need, including the innocent victims whose weapons were stolen by the duelist. Godbert dismisses that as childish dreams; Hildibrand refuses to yield.</p>
  <p>Maria hesitates, worried her mother won’t like what was done—and that Durilda might not let Hildibrand investigate. Gilgamesh says you can’t be sure; perhaps she’ll like this “reimagining,” and he offers his own interest in dueling should you cross paths with the thief. With the reconstructed vase in hand, you return toward Vesper Bay—Godbert says he will be going there as well, Gilgamesh breaks off after spotting the demon bird that stole his weapon, and Hildibrand suggests Maria be the one to present the vase.</p>
  <p>In Vesper Bay, Maria brings the vase to Durilda—and Durilda explodes, accusing you of shameful chicanery and calling it gaudy trash that bears no resemblance to what she bought. Ellie tries to argue back—Durilda sent Maria out alone into danger, and danger did find her—but the moment Godbert appears, Durilda’s tone flips. She addresses him as Lord Manderville, apologizes profusely, and praises the home as unworthy but acceptable for an esteemed gentleman.</p>
  <p>Godbert calmly asks about the “gaudy trash,” and Durilda instantly reverses herself: she loves the reconstruction and calls it the new centerpiece of her Thorne Dynasty collection. Godbert expresses relief and talks about Manderville pride and perfection, then assumes Hildibrand offered to investigate the duelist’s threats. Durilda claims she would welcome Hildibrand’s help—and Ellie, stunned, realizes Hildibrand’s father is Lord Godbert Manderville, the man who took Eolande Quiveron’s seat on the Syndicate. Hildibrand admits there have been many developments he missed, then insists you must refocus on catching the thieving duelist and seek out Inspector Briardien.</p>
  <p>Briardien is unimpressed that you’re still there, but he finally shares the plan. He commissioned several reproductions of the Treaty-Blade through the merchant Jojonpa, who deals in counterfeit antiques. These decoy blades have been delivered to the Observatorium and distributed among Durilda’s sellswords, who will move them to Vesper Bay along alternate routes once he gives the order. Nashu grasps the idea—hiding the real transport behind decoys—but Briardien corrects her: they’re all decoys. The real Treaty-Blade stays locked in the original owner’s vault until the thief is caught, and once the thief strikes, all forces—including agents disguised as smallfolk—will converge.</p>
  <p>Briardien declares everything accounted for and calls you superfluous, though he grudgingly suggests you could help by acting as more “smallfolk” watching the roads around the Observatorium—if you can behave inconspicuously. Hildibrand boasts he is a master of disguise and asks for a description of the duelist. Ellie points out he never asked Humphrey, then provides what’s known: the thief is a towering brute dressed in red who wields a halberd. Hildibrand laughs that such garish clothing should be easy to spot in snowy Coerthas, and Briardien dismisses you again. As you part ways, Gilgamesh finally returns; Hildibrand eagerly repeats the new information—only to trail off into outrage at the thief’s “ridiculous outfit,” while Gilgamesh, intrigued, wonders what purpose a warrior could have for wearing something so impractical.</p>
</div>

  JP:{

    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
<p>ヒルディブランドは言う。あなたはもはや家族同然、マンデヴィル家の秘奥を分かち合った「兄弟」だ――だからこそ、その知識を使え。倒れたキマイラのもとへ行き、マンデヴィルにしかできない踊りを踊れ、と。自分は距離を取るが、何かあればすぐ駆けつけると豪語し、ギルガメッシュは踊りで人を呼ぶなど信じがたいと呆れ、ナシュ・マカラッカはあなたの舞を楽しみに身を乗り出す。</p>
  <p>あなたがキマイラのそばで踊ると、歌が返ってくる。そこに現れたのはゴッドベルト。ギルガメッシュが「来るぞ」と息を呑む中、ゴッドベルトは笑いながら、恐れることはない、自分が相手にしたいのはキマイラだけだと言う。だがあなたの踊りを見て確信する――なぜマンデヴィルの舞を知っているのか、誰に教わったのか。さらに、強く優しい指を持つ者だとあなたを覚えていると言い、そして目の前の現実に凍りつく。ヒルディブランドが生きている、と。</p>
  <p>ゴッドベルトはヒルディブランドの名を叫び、十年も帰らず、ダラガブへの旅を知ってから五年も放置したことを叱責する。両親に息子が死んだと思わせ続けるつもりだったのか、と。ギルガメッシュはこの金細工師がヒルディの父だと知って驚き、ゴッドベルトは勢いのまま歌い踊り出すが、ヒルディブランドは今はそれどころではないと止める。マリアのために、花瓶を元に戻さねばならないのだ、と。</p>
  <p>ゴッドベルトは平然と引き受ける。朝の用足しの前でも、もっと酷い案件を直してきたと言い、ビエルゴットに金槌を導けと高らかに宣言して叩き上げる。完成した品を誇るゴッドベルトに対し、ヒルディブランドは骨董の歴史的価値が失われたと憤る。だがゴッドベルトは、つまらぬ花瓶を遥かに優れたものへ変えたのだと言い返し、ヒルディブランドに金槌を握ったのはいつ以来かと突きつける。ヒルディブランドは自分の道は捜査だと譲らず、武器怪盗に奪われた被害者たちのためにも動くのだと言い切る。</p>
  <p>マリアは不安を口にする。母はこの仕上がりを気に入らないかもしれず、そうなればヒルディブランドに捜査を任せないかもしれない。ギルガメッシュは断定できないと言い、この「再解釈」を気に入る可能性もあると告げる。そして自分も決闘士の端くれであり、怪盗と相まみえるなら腕比べを望むと言う。あなたたちは花瓶を携えてベスパーベイへ戻り、ゴッドベルトも用事で同行すると言い、ギルガメッシュは武器を奪った盗鳥を見たとして遅れて合流すると言い残す。ヒルディブランドはマリア自身が花瓶を渡すべきだと提案する。</p>
  <p>ベスパーベイでマリアが花瓶を差し出すと、ドリルダは激昂し、娘を巻き込む策謀だと罵り、派手で下品なガラクタだと切り捨てる。エリーは反論し、マリアを危険な状況に一人で行かせたことを責めるが、ゴッドベルトが現れた瞬間、ドリルダの態度は一変する。彼をマンデヴィル家の当主として迎え、平身低頭で取り繕う。</p>
  <p>ゴッドベルトが「下品なガラクタ」と言われたことに反応すると、ドリルダは即座に言い直す。嫌いどころか大好きで、ソーン王朝の収集品の中心に据えると言い出す。ゴッドベルトは安堵し、マンデヴィル家の誇りと完璧主義を語り、息子が怪盗の脅しを捜査すると言ったのだろうと話をつなぐ。ドリルダはヒルディブランドの助力を歓迎すると言い、エリーはそこで初めて、ゴッドベルトがシンジケートの席を継いだ人物だと気づく。ヒルディブランドは十年の間に知らぬ変化が多すぎると漏らしつつ、怪盗捜査へ集中し、ブリアルディアンの情報を確認しに行くと言い切る。</p>
  <p>ブリアルディアンは不機嫌そうに応じ、計画を説明する。偽造骨董を扱う商人ジョジョンパを通じて「契約の剣」の複製を複数作らせた。囮の剣はオブザーヴァトリウムへ運ばれ、ドリルダ配下の傭兵へ配布され、命令が下れば別ルートでベスパーベイへ輸送される。ナシュ・マカラッカは本物を囮で隠すのだと理解するが、ブリアルディアンは訂正する――すべて囮で、本物は元の所有者の金庫に保管したまま、怪盗が動いた瞬間に変装した平民を含む全戦力で包囲するのだ、と。</p>
  <p>ブリアルディアンは万事抜かりない、あなたたちは余計だと言い放つ。とはいえ、オブザーヴァトリウム周辺の道を見張る「平民」がもっと必要かもしれないと示唆し、あなたたちが目立たず振る舞えるなら役に立つと言う。ヒルディブランドは変装の達人だと胸を張り、怪盗の特徴を求める。エリーはハンフリーに聞かなかったのかと呆れつつ、赤い服の長身で、ハルバードを持つ大男だと伝える。ヒルディブランドはそんな派手な格好なら雪のクルザスで簡単に見つかると笑い、ブリアルディアンはもう好きにしろと突き放す。やがてギルガメッシュが戻り、ヒルディブランドは新情報を伝えようとして、結局は「奇妙な服装」への憤りを口にする。ギルガメッシュは逆に、その不便な装いにどんな理由があるのかと興味を示す。</p>
</div>

    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
<p>Hildibrand 得意洋洋地宣布：你們如今已如同手足，因為他把 House Manderville 的祕密傳給了你。現在你必須把那份「知識」用出來——去那隻倒下的 chimera 旁邊，跳出只有 Manderville 才做得到的舞。他說自己會先保持距離，但要你放心，若有任何狀況，他會立刻飛奔到你身邊。Gilgamesh 聽得發愣：竟然有人只能靠跳舞才能被召喚？Nashu 則一臉期待，迫不及待想看你做出那套 Manderville。</p>
  <p>你在 chimera 旁起舞後，一段熟悉又不容錯認的歌聲回應了你。Gilgamesh 低聲道「他來了」，緊接著 Godbert 出現，笑得豪邁，說你完全不必害怕，他只是來和 chimera 算帳。可他立刻看穿你跳的是 Manderville，還認出你那雙「強而溫柔的手指」，更追問：你究竟怎麼學會的？如果不是他教的，那是誰——直到他抬眼看見 Hildibrand，整個人像被雷劈中：他竟然還活著。</p>
  <p>Godbert 失控般喊出 Hildibrand 的全名，怒斥他離家十年、從得知他前往 Dalamud 起也過了五年——他到底打算讓父母在「兒子已死」的錯覺裡痛苦多久？Gilgamesh 震驚到說不出話：眼前這位 goldsmith，竟然是 Hildy 的父親。Godbert 又開始唱起 Manderville 的調子，Hildibrand 卻急忙要他停下，說眼前有更重要的事：必須把那只古董花瓶修好，為了 Maria。</p>
  <p>Godbert 一派輕鬆，說他早上上廁所前都能處理更糟的狀況，還要大家別急著鼓掌，喊著讓 Byregot 引導他的 hammer。成品一完成，他得意地讚嘆它在暮色裡閃耀、散發優雅，問你們是否同意這是藝術品。Hildibrand 卻當場炸裂，指控他把「無價古董的歷史價值」徹底毀了。Godbert 反嗆：他只是把一只平淡無奇的花瓶變得更好，還順便問 Hildibrand 有多久沒拿過 hammer。Hildibrand 堅持那不是他的道路——他是調查官，是 inspector，他的責任是幫助需要幫助的人；Maria 是其中之一，而被武器怪盜奪走武器的無辜者也是。Godbert 只說他以為兒子早該放下這些童稚夢想，Hildibrand 則拒絕退讓，說自己只能是 inspector。</p>
  <p>Maria 小心翼翼地提醒：她覺得母親可能不會喜歡這樣的改造，甚至因此不讓 Hildibrand 插手調查。Gilgamesh 卻說還不能下定論，也許她會喜歡這種「重新想像」；他也提到自己多少算個決鬥者，若真遇上那名怪盜，他很樂意與對方一較高下，連 Enkidu 也會。你們便帶著花瓶回到 Vesper Bay；Godbert 說自己也要去那裡辦事；Gilgamesh 則表示他似乎看見了奪走他武器的惡鳥，要你們先走，他稍後就到。Hildibrand 提議由 Maria 親自呈上花瓶。</p>
  <p>在 Vesper Bay，Maria 把花瓶交給 Durilda，Durilda 卻暴怒，指控你們讓女兒成了陰謀的一部分，還把成品罵成俗氣垃圾，說它根本不像她買的那只。Ellie 想反擊，指出 Durilda 先前竟然讓 Maria 獨自外出取回所謂「無價花瓶」，途中若遇到強盜或野獸會多危險——而確實也發生了——但話還沒說完，Godbert 一開口，Durilda 的態度瞬間翻轉。她立刻改稱 Lord Manderville，慌張道歉，還急忙稱讚住處配不上他這樣的紳士，只求他能滿意。</p>
  <p>Godbert 反問「俗氣垃圾」是什麼意思，Durilda 立刻改口，說她不是不喜歡，而是非常喜歡，甚至要把它當成 Thorne Dynasty 收藏的全新主角。Godbert 這才鬆口氣，說 Manderville 對作品向來追求完美，接著又自然地把話題接到「Hildibrand 會替你調查怪盜威脅」上。Durilda 馬上表示她其實很歡迎 Hildibrand 幫忙。Ellie 這才震驚地反應過來：Hildibrand 的父親竟是 Lord Godbert Manderville——那個接下 Eolande Quiveron 在 Syndicate 席位的人。Hildibrand 也承認這十年間發生了太多他完全不知情的變化，但他立刻要求把重心拉回武器怪盜的調查，並去找 Inspector Briardien 重新確認情報。</p>
  <p>Briardien 見到你們仍在場，先冷冷問一句你們為何還在這裡，接著才勉強把計畫說清楚：他透過販售仿古品的商人 Jojonpa 製作了多把 Treaty-Blade 的複製品。這些「刀」已送到 Observatorium，分發給 Durilda 的傭兵；只要他下令，傭兵就會走替代路線把它們運往 Vesper Bay。Nashu 很快理解成「用一堆誘餌掩護真正的運送」，但 Briardien 糾正她：全都是誘餌。本物會一直留在原主人的金庫裡，直到怪盜被逮捕；等怪盜出手，所有人馬——包括沿途偽裝成平民的暗樁——會立刻往同一地點合圍。</p>
  <p>Briardien 宣稱一切都已安排妥當，你們多餘；但他也暗示，若你們真能「像平民一樣不顯眼」，也許可以多派幾個人監看 Observatorium 進出道路。Hildibrand 立刻自誇自己是變裝大師，並追問怪盜的長相。Ellie 無奈嘆氣，說他居然沒想到去問 Humphrey，然後補上情報：那名賊據說是個穿紅衣、身形高大的壯漢，手持 halberd。Hildibrand 大笑，說穿得那麼花俏，在白雪覆蓋的 Coerthas 肯定很好找；Briardien 則冷淡回一句愛來不來。你們正準備分頭行動時，Gilgamesh 終於趕回來；Hildibrand 興沖沖要轉述新線索，卻又只剩對那套「荒唐服裝」的吐槽，而 Gilgamesh 反倒被勾起興趣，想知道一名戰士為何要穿得那麼不實用。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
