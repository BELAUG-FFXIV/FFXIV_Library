<script>
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'Influencing Inquisitors',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Cid admits that before Lord Drillemont can be persuaded to help, you will have to convince Inquisitor Guillaime that you are not his enemy. The problem is how to do that when you know so little about him, despite his prominence in Coerthas. Cid suggests you learn more by speaking with the people of Whitebrim Front, then bring whatever you find to Alphinaud in the square so he can shape a strategy.</p>
      <p>You begin asking around, and Joellaut answers first. He knows of Guillaime, but says he has not seen him since the day the inquisitor arrived at Whitebrim Front several moons ago. Joellaut’s memory is muddled, yet he clearly remembers that a blizzard nearly buried the stronghold in snow that day, and he had the misfortune of being assigned to the night’s watch. While the stronghold slept, he walked the walls and patrolled outside in pitch-black darkness.</p>
      <p>At one point his route took him beyond the eastern gate. There he saw a silhouette outlined against the city’s light. Thinking it was a wayward traveler, he cried out and gave chase—but he slipped and fell terribly. When he woke, it was days later, in this very bed, and he has been recovering from his injuries ever since. Joellaut says he had tried to rescue the stranger, but in the end it was Inquisitor Guillaime who rescued him, carrying his unconscious body back to the gates. He owes the inquisitor his life, and hopes one day to repay that kindness.</p>
      <p>Not everyone is willing to speak with you. When you ask Alboise, she snaps that she has no idea who you mean—and then calls you an unbeliever. She says they have learned of your deeds at Witchdrop, and refuses to be party to whatever dastardly schemes you have hatched against the inquisitor. She orders you away.</p>
      <p>Others answer with certainty and reverence. Haustefort reminds you that the Holy See has decreed inquisitors to be the arbiters of Halone’s will, and they are to be afforded every courtesy and the utmost respect. Patrick goes further, praising Guillaime’s watchful gaze and claiming unprecedented numbers of heretics have been unmasked and brought to justice under him. Patrick says people claim Guillaime goes days without sleep, so great is his devotion, and calls you blessed to have such a righteous man protecting you.</p>
      <p>Armed with these testimonies, you seek out Alphinaud in the square. He greets you with a shiver, unable to hide that his attire is ill-suited to the climate. He says he realized it soon after your arrival, but ignored it because he hoped you would find the Enterprise quickly. Instead, he complains, you have wasted far too much time meddling in local affairs. Still, he insists your journey is almost at an end—only this irksome inquisitor remains to be dealt with.</p>
      <p>Alphinaud acknowledges that you have been making inquiries, and says it is no surprise Guillaime is held in such high regard. Even so, he admits he is beginning to suspect the inquisitor has other reasons for hindering you now. He tells you to review the testimonials more closely with him, hoping they will offer insight into Guillaime’s motivations.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'審問官ギイェームの横顔',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>シドは言う。ドリルモン卿を説得する前に、まずはギヨーム審問官に、あなたたちが敵ではないと納得させねばならないらしい。だがその審問官について、クルザスで名の知れた人物でありながら、あなたたちはほとんど何も知らない。ならばホワイトブリムの人々に話を聞き、情報を集めよう――そう提案し、得た内容は広場にいるアルフィノへ伝えてほしい、彼ならそこから方策を組み立てられるはずだと告げる。</p>
      <p>あなたが聞き込みを始めると、ジョエローが応じる。ギヨーム審問官の名は知っているが、数か月前に彼がホワイトブリムへ来た日以来、姿は見ていないという。記憶は少し曖昧だが、その日は吹雪が激しく、砦が雪に埋もれかけた。そして不運にも彼は夜警に当たっていた。要塞が眠る間、彼は城壁を歩き、外周を漆黒の闇の中で巡回していたのだ。</p>
      <p>巡回の途中、東門の外へ出たとき、街の灯りに照らされた影を見た。迷い込んだ旅人だと思い、声をかけて追いかけたが、足を滑らせてひどい転落をしてしまう。次に目覚めたのは数日後で、この病床の上だった。以来ずっと怪我の療養を続けているのだと言う。彼はその人物を助けようとしたが、結果として自分を助けたのはギヨーム審問官だった。審問官は意識を失った彼を門まで運び、命を救ってくれた。ジョエローはその恩を一生忘れず、いつか返したいのだと語る。</p>
      <p>だが、全員があなたに協力的なわけではない。アルボワーズに尋ねると、そんな人物は知らないと言い放ち、あなたを不信心者と罵る。ウィッチドロップでのあなたの行いは承知している、審問官に対する卑劣な企みなどに加担する気はない、と言ってあなたを追い払う。</p>
      <p>別の者たちは、審問官を当然のように崇敬する。ホストフォールトは、聖座が審問官をハルオーネの意思を裁定する者と定めたのだと言い、最大限の礼と敬意を払うべきだと念を押す。パトリックはさらに踏み込み、ギヨーム審問官の厳しい眼差しのもとで、前例のない数の異端者が暴かれ、裁かれてきたと語る。彼は、審問官はその献身ゆえに何日も眠らぬことがあるとまで言われている、と称え、これほど正しく高潔な男に守られているのは幸運だと言う。</p>
      <p>あなたが集めた証言を携えて広場へ行くと、アルフィノは身震いしながら迎える。自分の服装はこの気候にまったく向いていない、と率直に言い、到着直後に気づいたが、エンタープライズをすぐ見つけられると思って気にしなかったのだと明かす。ところが現実には、地域の揉め事に首を突っ込みすぎて、あまりにも時間を無駄にした、とため息をつく。</p>
      <p>それでも、旅はもう終わりに近いと言う。残るのはこの厄介な審問官への対処だけだ。あなたが聞き込みをしてきたとシドから聞いた、とアルフィノは言い、ギヨーム審問官が高く評価されているのは驚くことではないと認める。だが同時に、彼があなたたちを妨げるのには別の理由があるのではないか、と疑い始めているとも打ち明ける。そして、あなたが集めた証言を一つずつ見直そう、と促す。そこに審問官の動機を読み解く手がかりがあるかもしれないのだ。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> シド　<small class="muted">クルザス中央高地 (X:13.1, Y:15.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-best-inventions.html">野戦病院の蒸留器</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 40～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="by-the-lights-of-ishgard.html">沈黙する真実</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'異端審問官的側面',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>Cid 低聲對你說：在說服 Lord Drillemont 之前，你們恐怕得先讓 Guillaime 審問官相信——你們不是他的敵人。可要怎麼做到這一點，你們其實毫無頭緒。明明他在 Coerthas 是如此顯眼的人物，你們卻對他幾乎一無所知。</p>
      <p>Cid 因此提議先從 Whitebrim Front 的人下手，透過打聽來弄清楚 Guillaime 的為人與過往。等你把收集到的內容帶去廣場交給 Alphinaud，Alphinaud 應該能從中整理出一套應對的策略。你便依言開始在 Whitebrim Front 四處詢問。</p>
      <p>Joellaut 聽到 Guillaime 的名字便點頭，說他當然知道那位審問官。只是自從幾個月前 Guillaime 抵達 Whitebrim Front 那天起，他就再也沒見過對方。Joellaut 的記憶有些混亂，但仍清楚記得那天暴風雪猛烈，幾乎把整座據點埋進雪裡，而他倒楣地被分派去值夜。當堡壘沉睡時，他在伸手不見五指的黑暗中走著城牆、巡查外圍。</p>
      <p>他說自己巡到東門外時，看見一個被城中燈火映出的身影，以為是迷路的旅人，便出聲呼喊並追了上去，卻失足滑倒，摔得極重。等他再次醒來，已是數日後，躺在這張床上療傷至今。Joellaut 說他原本想去救那個人，可最後救了他的反而是 Guillaime 審問官——對方把失去意識的他一路背回城門，讓他保住性命。Joellaut 說自己欠他一條命，希望有朝一日能回報那份恩情。</p>
      <p>但並非所有人都願意與你交談。你向 Alboise 提起 Guillaime，她立刻冷冷回絕，說她根本不知道你在說誰，隨即罵你是「不信者」。她表示 Whitebrim Front 已經聽聞你在 Witchdrop 的行徑，並斷言自己不會參與你針對審問官的任何陰謀——不管你暗地裡盤算了什麼。她喝令你立刻離開。</p>
      <p>也有人以近乎理所當然的口吻談起審問官的地位。Haustefort 說，聖座已裁定審問官們是 Halone 意志的仲裁者，因此必須以最周全的禮節與最高的敬意相待。Patrick 則滿懷崇敬地稱頌 Guillaime，說在他警戒的注視下，前所未有數量的異端者被揭穿並送上審判；甚至有人傳他因過度投入而數日不眠。Patrick 說，能有這樣正直而堅定的人守護他們，是一種福分。</p>
      <p>你帶著這些說法回到廣場找 Alphinaud。Alphinaud 一開口便打了個寒顫，抱怨自己的衣著完全不適合這裡的氣候；他說剛到時就察覺了，只是原以為很快就能找到 Enterprise，所以才沒有放在心上。如今卻在地方事務上耽擱太久，讓他忍不住嘆氣——但他仍強調旅程已近尾聲，剩下的就只是處理這位令人厭煩的審問官而已。聽完你的打聽結果後，他承認 Guillaime 受人敬重並不意外，卻也開始懷疑：對方此刻阻撓你們，或許另有原因。於是他要你把蒐集到的證言逐一回顧，希望能從中看出 Guillaime 的動機。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 希德　<small class="muted"> 庫爾札斯中央高地 (X:13.1, Y:15.4)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="the-best-inventions.html">技術進步</a></div>
      <div class="row">所有職業（不含限定職） 等級 40 以上</div>
    </div>`,
    followq:`<div class="stack">

    </div>`
  }
};

const tabBtns = [...document.querySelectorAll('.tab-btn')];
const pageTitle = document.getElementById('pageTitle');
const langToggle = document.getElementById('langToggle');
const panels = {
  story: document.getElementById('panel-story'),
  acq: document.getElementById('panel-acq'),
  unlockq: document.getElementById('panel-unlockq'),
  followq: document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
