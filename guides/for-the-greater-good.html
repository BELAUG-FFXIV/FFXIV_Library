const i18n = {

    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Aymeric warns that the tunnel network throughout Snowcloak is extensive, and that a full survey will take time. Around you, the Temple Knights speak in clipped, practical terms—harass an entrenched enemy, give ground when they advance, strike their flanks when they withdraw. Even knowing what to look for will not be enough, one knight admits; without foreknowledge or sheer luck, you will never find every entrance, especially when the broken ice reforms again and again to hide the openings. Nearby, Yuyuhase curses the cold as no place for a “son of the sand,” and jokes that he would almost pay a premium for wool if a merchant offered it.</p><p>When Minfilia arrives from the archives of House Fortemps, Alphinaud presses her for results, but she can only say she and Urianger found little they can trust. The accounts of Shiva are sparse and contradictory—agreeing on only one point: that she lay with a dragon, the gravest of sins by Ishgardian faith. Yet to Iceheart’s followers, Minfilia says, that same act is revered as holy: a blessed union of man and dragon. How such a thing could even be possible remains unanswered, and she doubts the archives will yield anything useful. Much knowledge has been lost over the centuries, she adds—and in this case, one cannot help wondering whether it was lost by circumstance or by design.</p><p>Alphinaud turns back to what you witnessed: Iceheart paused to plead her case before escaping, did she not? Stripped of prejudice, he says, most would agree that ending an endless war serves the greater good. Minfilia answers that Ser Aymeric would likely take issue with Iceheart’s methods—and Aymeric, for his part, issues orders without hesitation: a few stragglers escaping is acceptable, but no tunnel is to be searched until sappers confirm it is safe. Alphinaud challenges him, expecting more zeal from a man of faith, even invoking the will of Halone and the choices of Aymeric’s forebears. Aymeric answers evenly: some believe faith demands the renunciation of free will and unquestioning devotion to the Fury, and such fervor may serve a knight on the front line, but less so a leader of men. Scripture can be interpreted, he says, and he chooses to believe the Fury would value the lives of Her followers over the deaths of Her enemies—without pretending he can speak for knights of another era.</p><p>As the exchange fades, Minfilia voices doubt of her own. Shiva was real—a living woman—unlike the many beings summoned and worshipped as gods, she says, with only a single exception: Good King Moggle Mog XII, the myth made manifest by fervent prayer. Alphinaud counters that the heretics are outcasts at war with a mighty nation, yearning for the resurrection of the one who embodies their beliefs; if that is not faith in a higher power, then what is? They have crystals and conviction in abundance, he insists. Still, Minfilia wonders aloud whether that can truly be all that is required.</p><p>Alphinaud then shares what his survey team learned: a preliminary analysis suggests Iceheart used an aetheryte to teleport to a second aetheryte somewhere not far to the west. Yet despite the apparent proximity, they cannot detect the second aetheryte directly. Unless Iceheart can mask its signal, he can only assume she had it destroyed to prevent pursuit. Without teleportation, you have no choice but to search for an alternate route—most likely a tunnel, assuming one exists. Minfilia refuses to abandon teleportation yet, saying a colleague in Sharlayan may be able to help—and Alphinaud, wary of how long a full tunnel survey will take, asks for your assistance elsewhere in the meantime.</p><p>The 3rd Unit is tracking the remnants of the heretic force, but the search is going poorly: Coerthas is vast, and Iceheart’s followers know the terrain far better. Alphinaud wants your knowledge of the region to speed the hunt, so the heretics can be captured and pressed for Iceheart’s whereabouts. He admits—selfishly—that the Crystal Braves would also benefit from working alongside you: many are inexperienced recruits who look up to you. He tells you to take details from Yuyuhase, then meet him later at the Observatorium, where he and Captain Ilberd will discuss the latest developments.</p><p>Yuyuhase finds you at Snowcloak and explains that most of the 3rd Unit are from Ul’dah, unused to snow underfoot, and that word has come: the heretics were spotted heading for Daniffen Pass. You join the pursuit. Along the way, a Brave collapses, cursing “Thal’s balls” as his ankle burns from a fall; he tells you the others went on ahead, urges you to follow the fresh tracks in the new snow, and admits he cannot run. Another Brave later reports confusion—there was a great scaled beast, the heretics split up, and Yuyuhase went east on his own. Moments later, you sense hostility again as heretics double back.</p><p>Yuyuhase returns wounded but sharp-eyed: he was so focused on the tracks that he almost missed the ambush, and one attacker paid for trying to sneak up behind him. Searching the dead man’s knapsack, he found a note: withdraw in groups of three or less to the Observatorium, give the signal and wait—“the merchant” will be watching—be late and be left for dead. He judges they will not rendezvous inside the place, so you must search the wilderness around it while he rests, and he will inform Captain Ilberd. You must prevent the heretics from escaping before reinforcements arrive.</p><p>At Dragonhead, the net tightens. A “suspicious merchant” argues with a “suspicious Coerthan” about escape routes blocked by bluecoats and wagon searches, until Ilberd steps in—calm, controlled, and certain. Yugiri appears as well, speaking of sacred snowcapped peaks in her homeland where blood must not be shed, and contrasting that with how your lands thirst for blood. The merchant denies wrongdoing, but Ilberd answers that meeting heretics in secret is crime enough, and that inquisitors are not the only ones skilled at interrogation. Alphinaud arrives and explains the true target is not the heretics here, but the merchant conspiring with them—someone revealed during the investigation into the Ivy, suggesting that your “favorite Garlean spy” may have been aiding Iceheart. He credits Yugiri and her shinobi for uncovering the connection, accepts her offer to stay and assist until the investigation is complete, and leads you inside to wait for Ilberd’s report—hoping the merchant’s resolve will crumble quickly, yet wary that even a confession may not bring you closer to the Ivy’s identity.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Alphinaud <small class="muted">(Coerthas Central Highlands, X:3.4, Y:21.2)</small></div></div>`,

  JP:{
    langLabel:'日本語',
    pageTitle:'雪上の追撃',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>アイメリクは、スノークロークに張り巡らされた坑道網が非常に広大で、全容の調査には時間がかかると告げる。神殿騎士たちは冷静に言う――敵が陣地を固めているなら揺さぶれ、押し出されるなら引き、退くところを側面から叩け。アイスハートは愚かではない、と。別の騎士は、目を鍛えるだけでは足りないと嘆く。事前の知識か偶然がなければ、すべての入口など見つけられない。割れた氷はすぐに再生して入口を覆い隠し、まるで大地そのものが味方を拒むかのようだ。ユユハセは「砂の子」にこの寒さは地獄だとこぼし、羊毛を高値で売られたら買ってしまいそうだと冗談めかす。</p><p>フォルタン家の文書庫から戻ったミンフィリアに、アルフィノは成果を問う。だが彼女は、ウリエンジェとともに膨大な書を渉猟したものの、確かだと言い切れるものは少なかったと言う。シヴァの生涯や業績の記録は乏しく、しかも食い違いだらけで、ただ一点だけ一致していた――シヴァは竜と契った。それはイシュガルドの信仰では最も重い罪だ。だがアイスハートの信徒にとっては、それこそが神聖な行いであり、人と竜の「祝福された結びつき」なのだという。そもそもそんなことが可能なのか、その答えは文書庫にはないだろう。知は幾世紀ものあいだに失われてきたが、今回ばかりは偶然か意図か、疑いたくもなる――ミンフィリアはそう締めくくる。</p><p>アルフィノは、あなたが見たアイスハートの振る舞いに話を戻す。逃げる前に彼女は主張を述べたのだろう、と。偏見を捨てて見れば、終わりのない戦を終わらせることが大義にかなう、と多くが認めるはずだ。ミンフィリアは、アイメリクはその手段に異議を唱えるだろうと返す。実際、アイメリクは即座に命じる――多少の取りこぼしは構わないが、工兵が安全を確認するまで坑道を捜索するな。アルフィノは、信仰心のある人物ならもっと一途に敵を追うと思っていた、と挑発し、ハルオーネの意思と祖先の選択にまで言及する。だがアイメリクは淡々と答える。信仰とは自由意志の放棄であり、フューリーへの無条件の献身を求めるものだと考える者もいる。だがその熱情は前線の騎士には有用でも、指揮官には向かない。経典の解釈は人それぞれで、自分はフューリーが「敵の死」より「信徒の命」を重んじると信じる――そして古の騎士の代弁などできない、と。</p><p>やり取りの後、ミンフィリアは自分の疑念も口にする。シヴァは実在した、生身の女性だった――召喚され「神」として崇められた他の存在とは違う。例外はただひとつ、善王モグル・モグ十二世だけで、モグル・ガードの熱烈な祈りが神話を現実にしたのだという。アルフィノは反論する。異端者は強大な国家と戦う追放者で、信条の具現である存在の復活を渇望している。これを「高次の力への信仰」と呼ばずして何と呼ぶのか。彼らにはクリスタルも確信も十分にある、と。だがミンフィリアは、それだけで本当に足りるのか、と問いを残す。</p><p>アルフィノは続けて、調査班の見立てを伝える。アイスハートが逃走に使ったエーテライトの痕跡を解析したところ、彼女は西方の近くにある別のエーテライトへ転移した可能性が高い。ところが距離は近いはずなのに、その第二のエーテライトの存在を直接探知できない。信号を隠す術がないなら、追跡を防ぐために破壊したと考えるしかない。彼女と同じように転移できない以上、別の経路――おそらく坑道――を探すしかない。ミンフィリアはまだ転移を諦めないと言い、シャーレアンの同僚が助力できるかもしれないと示すが、アルフィノは坑道網の全調査にかかる時間を思い、当面は別件であなたの力を借りたいと言う。</p><p>第三小隊は襲撃してきた異端者残党を追っているが、捜索は難航している。クルザスは広く、彼らは地の利を握っているからだ。あなたの土地勘があれば捕縛が早まり、首領の所在を吐かせる機会も早くなる。さらに――利己的な願いだと前置きしつつ――クリスタルブレイブにとって、あなたと並んで動くことは大きな助けになる。熟練者もいるが、未熟な新兵も少なくなく、彼らはあなたを尊敬している。詳細はユユハセから聞き、任務後は天文台で合流してほしい。そこではアルフィノとイルベルド隊長が、捜査の進展を話し合う予定だという。</p><p>ユユハセはスノークロークであなたを待ち、第三小隊の多くがウルダハ出身で雪に慣れていないとこぼす。ほどなく異端者がダニフェン峠へ向かったという報が入り、あなたは追跡に加わる。途中、隊員が転倒して足首を痛め、「サルの玉だ」と悪態をつきながら、先行した仲間の後を追ってくれと頼む。新雪に残る足跡を辿れば見失うはずがない、と。さらに別の隊員は、巨大な鱗の獣を見た、敵が散ったのでこちらも散った、ユユハセは東へ単独で行った、と息を切らして告げる。直後、敵意の気配が走り、異端者が引き返して襲いかかる。</p><p>傷を負ったユユハセが戻る。足跡に気を取られ、背後からの奇襲を見落としかけたが、近づいた一人に刃を突き立てて退けたという。倒した者の背嚢を漁って見つけたのが、一枚の指示書だった――「三人以下で天文台へ撤収。合図を出して待て。商人が見ている。遅れれば見捨てる」。合流場所が内部とは考えにくい以上、あなたは天文台周辺の荒野を捜索すべきだ、とユユハセは言う。自分は傷を癒やすために少し休む必要があるが、イルベルド隊長には計画を伝える。増援が来る前に、逃がすな、と。</p><p>ドラゴンヘッドでは別の網が張られていた。怪しいクルザス人と怪しい商人が口論し、青服がうろつき、門では荷車が検められて逃げ道がないと焦る。そこへイルベルドが割って入り、密会の罪を突きつける。ユウギリは、故郷にも血を流してはならない聖なる雪山があると語りながら、この地が流血を求め続けてきた現実を冷たく指摘する。商人は無実を叫ぶが、イルベルドは「異端者と密会した」だけで十分だと言い、尋問の技は異端審問官だけのものではないと告げる。やがてアルフィノが現れ、狙いは異端者ではなく、彼らと通じた商人だと明かす。その糸口は「アイヴィー」の捜査で掴んだもので、信じがたいことに、例のガレアンの密偵がアイスハートへ手を貸していた可能性すらあるという。ユウギリと忍びの働きで繋がりを見つけられたと感謝し、彼女の同行の申し出を受け入れたアルフィノは、あなたを連れて天文台の中でイルベルドの報告を待つ。商人の気持ちはすぐ折れるだろう――だがそれが「アイヴィー」の正体に近づくかは分からない、と。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> アルフィノ <small class="muted">（クルザス中央高地, X:3.4, Y:21.2）</small></div></div>`,

    story:`<div class="clamp" data-collapsed="true"><p>Aymeric 說，Snowcloak 之下的地道網規模龐大，要完整勘查一定得花時間。神殿騎士在一旁冷靜推演：敵人盤踞就去騷擾，對方推進就先退，等他們回撤再打側翼——Iceheart 並不愚蠢。也有人直言，這不是「練眼力」就能解決的事；除非事先知道入口位置，或靠運氣撞上，否則不可能把每一處入口都找齊。更糟的是，破裂的冰層會不斷重新結起來，把入口掩得乾乾淨淨，像是整片土地都在跟你們作對。Yuyuhase 則抱怨這地方根本不適合「沙地之子」，還開玩笑說若有人把羊毛賣得很貴，他可能也會心動買下去。</p><p>Alphinaud 迎上剛從 House Fortemps 檔案庫趕來的 Minfilia，問她是否有所收穫，但她只能說：她和 Urianger 翻遍了無數文獻，卻找不到足以信任的答案。關於 Shiva 的記載既稀少又互相矛盾，唯一一致的一點是——她曾與一條龍結合，依 Ishgard 的信仰而言，這是最嚴重的罪。可在 Iceheart 的追隨者眼中，這反而是神聖之舉：人與龍之間「受祝福的結合」。至於這種事究竟怎麼可能發生，她非常懷疑能在 House Fortemps 的檔案裡找到有用的解答。許多知識在漫長歲月中散佚了——而這一次，她甚至忍不住懷疑，究竟是偶然，還是刻意。</p><p>Alphinaud 轉而追問你先前的遭遇：Iceheart 逃走前，確實停下來替自己辯解過，對吧？他說若不帶偏見，多數人都會同意——終結一場永無止境的戰爭，本就是更大的善。Minfilia 回答，Ser Aymeric 多半會對 Iceheart 的手段有意見。Aymeric 隨即以指揮官的語氣下令：就算有幾個漏網之魚逃走也無妨，但在工兵確認某條地道安全之前，任何人都不得進去搜索。Alphinaud 因此嘲諷他不夠「熱切」，還提到 Halone（Ishgard 信奉的戰神與守護神之一，亦被稱為 The Fury）的意志、以及 Aymeric 的祖先如何來到此地、如何對 Dravania 舉兵，問他若換成古代的騎士會怎麼做。Aymeric 沒有被激怒，只平靜回應：有人相信信仰代表放棄自由意志，侍奉 The Fury 就該毫不懷疑、毫不動搖；那樣的狂熱或許適合站在前線的騎士，卻不適合帶領眾人的指揮官。經典本就各有解讀，而他選擇相信 The Fury 會更看重信徒的性命，而不是敵人的死亡；至於古代的騎士，他不敢也不願替他們代言——那是另一個時代，經典能告訴你們的終究有限。</p><p>對話告一段落後，Minfilia 也說出自己的疑慮。Shiva 的確曾經真實存在——她是有血有肉的女性，這一點無庸置疑；在這層意義上，她不同於其他被召喚而來、被奉為神的存在。唯一的例外，是 Good King Moggle Mog XII——神話在 Mogglesguard 的熱烈祈求下被具現化。Alphinaud 反問：異端者是一群與強大國家交戰的流亡者，他們渴望讓那位象徵自身信念的人「復活」；若這不算把信仰寄託在更高的力量上，那什麼才算？他說他們既有水晶，也有堅定的信念，多得很。Minfilia 仍忍不住低聲問：真的只要這樣就夠了嗎？</p><p>接著 Alphinaud 交代調查班的初步結論：他們分析 Iceheart 逃走時動用的以太水晶痕跡後，推測她是傳送到西方不遠處的另一座以太水晶。問題在於，明明距離似乎不遠，他們卻完全無法直接偵測到那座以太水晶的任何訊號。除非 Iceheart 有辦法遮蔽訊號，否則他只能推斷——她早就把那座以太水晶摧毀，好讓你們無法追蹤。既然無法用同樣的方式追過去，你們只能改找替代路線，最可能就是某條地道——前提是那條路確實存在。Minfilia 則表示先別放棄傳送的可能性，Sharlayan 的一位同僚也許能提供協助；Alphinaud 只能希望她說得對，因為要把整套地道網完整勘查完，勢必得耗費漫長時間。</p><p>在 Minfilia 著手處理「以太水晶無法追蹤」的難題時，Alphinaud 也請你先協助另一件事：第三分隊正在追蹤先前襲擊你們的異端者殘黨，但搜索進展不佳。Coerthas 太廣闊，而 Iceheart 的追隨者比你們更熟地形；若有你加入，抓捕速度會快得多，一旦抓到人，也能更早逼問出 Iceheart 的下落。他也坦承這有點自私——Crystal Braves 若能和你並肩行動，士氣會大不相同；因為除了老手之外，還有不少經驗不足的新兵，而那些人其實很仰望你。任務細節由 Yuyuhase 向你說明；結束後到 Observatorium 找他，Alphinaud 與 Captain Ilberd 會在那裡討論 Ilberd 調查的最新進展。</p><p>Yuyuhase 果然在 Snowcloak 等你，先抱怨第三分隊多數來自 Ul’dah，習慣腳下是沙，踩在雪上的觸感反而令人不安。隨後他說剛收到通報：你們要找的異端者正往 Daniffen Pass 方向移動，他的 Braves 已經追上去，希望你也加入；他自己也會參與追捕，還半開玩笑說別讓人以為他只會領錢不做事。途中，一名隊員摔傷腳踝，痛到破口大罵，說其他人已經穿過 Daniffen Pass 先行，你若夠快也許追得上；新雪很容易留下足跡，順著新鮮的腳印走就不會錯。另一名隊員又喘著說敵人分散、你們也分散，還提到看見一頭巨大的鱗甲怪物，而 Yuyuhase 已經獨自往東追去。緊接著，你再度感覺到敵意逼近——異端者居然折返，想從背後下手。</p><p>受了傷的 Yuyuhase 回來時仍維持著那股尖銳的自尊：他說自己差點因為太專注追足跡而沒注意到他們折返，但也只是「差點」——有個人想偷襲他，結果反被他一刀捅進腹部。他以為周圍無人，便翻了死者背包，竟在對方同伴趕到前找到一張指示紙條：「三人以下分批撤到 Observatorium，發出信號後等待——商人會盯著。遲到就等死。」他判斷對方不可能在 Observatorium 內部集合，因此你要把搜索範圍鎖定在 Observatorium 周邊荒野；至於他自己，得先休息一會兒處理傷勢。他會去通知 Captain Ilberd，但在增援到來前，你必須先確保那些人逃不掉。</p><p>你趕到 Dragonhead 時，另一條線也已收網。一名「可疑的 Coerthan」正在對「可疑的商人」發火，商人則慌張辯解：外面都是藍衣人，騎士又在門口逐車搜查，根本走不了。Ilberd 及時介入，語氣不疾不徐，卻把對方壓得動彈不得。Yugiri 也在場，她說自己的故鄉也有聖潔的雪峰，血不可在那裡流；可你們的土地卻永遠渴求倒下之人的血，而你們的行動更讓它喝得夠深。商人尖聲否認，Ilberd 則回敬：你唯一的「錯」，就是暗中與異端者碰面——而且擅長審問的並不只有異端審問官。</p><p>Alphinaud 隨後出現，對你說他們來此並不是為了抓異端者，而是為了那個與異端者勾結的商人。這個人是在追查 Ivy 的過程中浮出水面；雖然難以置信，但你們那位「最熟悉的 Garlean 間諜」很可能曾在暗處協助 Iceheart。若非 Yugiri 與她的 shinobi 出手，你們甚至不會發現這條連結。Yugiri 說自己其實幫得不多，但她渴望反擊 Empire、削弱其在此地的影響，避免 Doma 的悲劇重演；接下來的日子需要一套非常特定的技能，而她恰好擁有——因此她提出願意陪你們一路查到結束。Alphinaud 接受了她的提議，並帶你進入 Observatorium 等 Captain Ilberd 回來交代審問結果，同時也提醒：就算商人的意志很快崩潰，供詞是否能讓你們更接近 Ivy 的真身，他不敢保證——只希望你們別再被對方牽著跑，做一場徒勞的追逐。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 阿爾菲諾 <small class="muted"> 庫爾札斯中央高地（X:3.4, Y:21.2)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="the-path-of-the-righteous.html">別有洞天</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div></div>`,

  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
