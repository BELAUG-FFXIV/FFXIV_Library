<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:`The Rising Chorus`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You are called to the Solar at the Rising Stones because an Ishgardian guest is waiting with Minfilia. When you arrive, Lucia says the lord commander sent her to request your aid in a matter of grave import, and she cannot afford to wait. She reports that the Observatorium’s astrologians have sounded the alarum: last night, the dragon star burned with an intensity not seen in fifteen summers, not since the Battle of Silvertear Skies.</p><p>Lucia says the old Coerthan rhyme speaks of a northern sky burning at a wyrm lord’s call, and that the brightening of the dragon star is said to accompany the “roar” of a great wyrm. Yet she clarifies that “roar” is a figure of speech—Dravanians can communicate in ways beyond mortal understanding—and they cannot say with confidence that a great wyrm roared at all, much less that it was Midgardsormr.</p><p>Because only a direct examination can yield certainty, Lucia says you must investigate the Keeper of the Lake. There is no time to seek the Holy See’s approval to dispatch Temple Knights, so Ser Aymeric entrusts the task to you. Lucia adds that when a great wyrm roars, his brethren cannot choose but answer, and they prepare for battle.</p><p>Minfilia ensures you understand the destination: the Keeper of the Lake is the wreckage of the Agrius and the corpse of the great wyrm that brought it down. Fifteen years ago, as Gaius van Baelsar moved to seize Mor Dhona, Midgardsormr—guardian of Silvertear Falls—rose from beneath the lake, led dragons against the Garlean airships, and fought the Agrius. The flagship’s ceruleum engines failed and it fell into the lake; the ensuing explosion claimed Midgardsormr’s life, drained the lake, and crystallized aether across the land.</p><p>At North Silvertear, a Doman watch reports small Garlean airships coming and going from the Keeper of the Lake, likely salvaging equipment. He warns they will fire on an airship, advises a stealthy approach by boat to the base of the Agrius, and says climbing up from there is the only viable route. You enter the wreckage, push past imperial forces and magitek defenses, and reach the wyrm’s remains.</p><p>There, Midgardsormr speaks to you in an unusual language you understand through the Echo. He demands you remember the face of your lord, weighs you, and after the confrontation grants you a moment’s reprieve. He declares, “My people have heard the song. Ishgard shall burn,” says he has stripped you of Hydaelyn’s blessing, and that a covenant binds him to you to watch, listen, and wait. Back at the Rising Stones, Alphinaud insists the warning must be relayed to Ser Aymeric, but that the full truth of your conversation cannot leave the room, since men have been executed as heretics for claiming to hear a Dravanian voice; Minfilia senses what you have lost and begins to question what covenant binds Hydaelyn and Midgardsormr.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Tataru <small class="muted">(The Rising Stones, X:6.0, Y:5.9)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="best-laid-schemes.html">Best Laid Schemes</a></div><div class="row">All classes and jobs (excluding limited jobs) (Level 50 or above)</div><div class="row"><b>Unlock Dungeon</b> <a class="link" href="the-keeper-of-the-lake.html">The Keeper of the Lake</a></div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="aether-on-demand.html">Aether on Demand</a></div></div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'黙約の塔へ',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>タタルに呼ばれ、あなたはライジングストーンズのソーラーへ向かう。ミンフィリアのもとにイシュガルドからの来客が来ており、ルキアは、総司令の命で重大な案件の助力を求めに来たのだと告げる。待っている猶予はないという。天文台の占星術師が警報を鳴らし、昨夜「竜の星」が十五年ぶりにかつてないほど強く燃えた――「銀泪の空の戦い」以来だ、とルキアは報告する。</p><p>ルキアは古いクルザスの韻を引き、「大いなる竜」の呼び声に北天が燃えると語る。竜の星の増光は「大いなる竜の咆哮」に伴うとされるが、咆哮とは比喩に過ぎず、ドラヴァニアの竜は人の理解を超えた方法で通じ合う、とも言う。ゆえに、実際に竜が呼んだのか、ましてそれがミドガルズオルムだったのかは断言できない、と結論づける。</p><p>確かめるには「湖の番人」を直接調べるしかない。だが聖座の許可を待って神殿騎士団を派遣していては間に合わないため、サー・アイメリクはその役目をあなたに託す、とルキアは言う。さらに「大いなる竜」が呼べば同胞は応えずにはいられないとして、戦いへの備えを進めていると告げ、去っていく。</p><p>ミンフィリアは目的地の性質を整理する。「湖の番人」とは、帝国艦隊の旗艦アグリウスの残骸であり、それを沈めた大いなる竜の亡骸でもある。十五年前、ガイウス・ヴァン・バエサルがモードゥナ制圧に動いたとき、ミドガルズオルムが湖の底から現れ、竜を率いてガレマールの飛空艦隊に挑み、アグリウスと激突した。やがて艦の燃料機関が破綻して湖へ落ち、続く爆発はミドガルズオルムの命を奪い、湖を枯らし、周囲の地にエーテルの結晶化を残した、と語る。</p><p>北の監視に立つドマの兵は、近頃ガレマールの小型飛空艇が「湖の番人」へ出入りしていると伝える。補給が断たれた拠点が残骸から部品を回収しているのではないか、と推測し、正面から飛空艇で近づけば撃たれるため、舟でアグリウスの基部へ渡って登るのが現実的だと助言する。あなたは仲間とともに残骸へ入り、帝国兵と魔導の障壁を越えて奥へ進む。</p><p>その果てで、ミドガルズオルムが語りかける。あなたは Echo を通じて、その異様な言葉を理解する。彼はあなたに「主君の顔を思い出せ」と迫り、あなたを量り、短い猶予を与えたのち「イシュガルドは燃える」と宣告する。さらにヒュダリンの祝福を剝ぎ取り、誓約によってあなたを見守り、聞き、待つと告げる。帰還後、アルフィノは警告をサー・アイメリクへ伝えるべきだと言う一方、竜の声を聞いたと公言すれば異端として処刑されうるため、会話の全てはこの部屋から出せないと釘を刺し、ミンフィリアはあなたに起きた変化と誓約の意味を探ろうとする。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> タタル <small class="muted">（石の家, X:6.0, Y:5.9）</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="best-laid-schemes.html">押収された武器</a></div><div class="row">すべて（リミテッドジョブを除く）Lv 50～</div><div class="row"><b>ダンジョン開放</b> <a class="link" href="the-keeper-of-the-lake.html">幻龍残骸 黙約の塔</a></div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="aether-on-demand.html">ムーンブリダの秘策</a></div></div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'前往密約之塔',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Tataru 說 Minfilia 正在 The Solar 接待一位來自 Ishgard 的客人，要你立刻過去，別讓對方久等。你抵達後，Lucia 開門見山地表示：她奉 lord commander （Ser Aymeric，Temple Knights 的最高指揮官）之命前來請求你的協助，這件事攸關重大，她不能再等。她轉述 Observatorium 的占星術師已拉響警報——昨夜 dragon star 的亮度暴增，是十五年來未曾見過的強度，上一次同樣的情況發生在 Battle of Silvertear Skies。</p><p>Lucia 提到 Coerthan 的古老韻文，說那把北方天空的燃亮與龍王的呼喚連在一起；也有人認為 dragon star 變亮會伴隨一位巨龍的「咆哮」。但她同時強調，「咆哮」只是說法，Dravanians （龍族）能以人類無法理解的方式溝通，因此他們無法有把握地斷言是否真的有巨龍發出呼喚，更不能肯定那就是 Midgardsormr（傳說中的古代巨龍，與 Silvertear Falls 有深厚關聯；在 Battle of Silvertear Skies 中與帝國旗艦 Agrius 交戰並同歸於盡，其遺骸長年纏繞於殘骸之上）。</p><p>既然只能靠直接確認才能得出結論，Lucia 說必須親自檢視 Keeper of the Lake。由於等 Holy See 核准再派出 Temple Knights 會耗費太久，Ser Aymeric 便把這件事託付給你。Lucia 也說，一旦龍王發出呼喚，他的同族就不可能不回應，所以他們正在準備迎戰；說完，她必須立刻返回協助 lord commander。</p><p>Minfilia 接著讓你確保明白目的地是什麼：Keeper of the Lake 是 Agrius 的殘骸，也是摧毀它的那頭大龍的遺骸。十五年前，Gaius van Baelsar 企圖奪取 Mor Dhona；就在眾人以為勝負已定時，Midgardsormr——傳說中守護 Silvertear Falls 的巨龍——自湖底衝出，率領群龍迎擊 Garleans 的飛空艦隊，並與 Agrius 交戰。最終旗艦的 ceruleum 引擎失效、墜入湖中，而隨後的爆炸也奪走 Midgardsormr 的性命；那場爆炸讓湖水枯竭、周遭荒蕪，並使大量以太結晶化，遺留至今。</p><p>你在 North Silvertear 與 Doman Ｗatch 交談，他回報近期有 Garleans 的小型飛空艇往返 Keeper of the Lake，推測他們正從殘骸內打撈零件與裝備，因為他們的補給線早已中斷。對方一定會攻擊飛空艇，因此他建議你採取更隱密的路線：與同伴搭船靠近 Agrius 的基部，再一路攀上去，這是他認為唯一可行的方式。你依言進入殘骸，在帝國兵與魔導防線之間推進，深入到最終區域。</p><p>在那裡，Midgardsormr 以一種你能透過 Echo 理解的語言對你開口。他問誰踏上他的白骨、喚醒他的沉眠，要求你記起「你的主君」並心生畏懼，並在交鋒後給了你短暫的喘息。隨後他說他的族人已聽見那首「歌」，並宣告 Ishgard 將燃燒；他也直言自己剝奪了 Hydaelyn 的祝福，並提到有一份誓約使他與你相繫，讓他將「看著、聽著、等待」。你回到 Rising Stones 後，Alphinaud 堅持必須立刻把「Ishgard shall burn」的警告轉告 Ser Aymeric，但也強調你與 Midgardsormr 的完整對話不能外傳，因為宣稱聽見 Dravanian 的聲音可能招致以異端之名處決；Minfilia 察覺你少了某個重要的東西，並開始追問那份誓約究竟指向什麼。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 塔塔露 <small class="muted"> 石之家（X:6.0, Y:5.9)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="best-laid-schemes.html">收繳來的武器</a></div><div class="row">所有職業（不含限定職） 等級 50 以上</div><div class="row"><b>解鎖地城</b> <a class="link" href="the-keeper-of-the-lake.html">幻龍殘骸密約之塔</a></div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="aether-on-demand.html">穆恩布瑞達的秘策</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
