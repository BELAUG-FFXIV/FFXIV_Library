    story:`<div class="clamp" data-collapsed="true">
<p>You run into Nashu Mhakaracca again, breathless with excitement the moment she recognizes you. She insists it can only be serendipity, and declares you simply have to help her find Inspector Hildibrand. She explains she has triple-checked her calculations for the arc he traced when he was launched skyward again—and by her figures, he should have come down somewhere in Ishgard.</p>
<p>You go from merchant to merchant, asking after a “gentlemanly Highlander,” but most can only offer confusion or disbelief. One suggests that someone well connected among Ishgard’s traders might have heard something—and at last, a lead surfaces: there are rumors of a foreigner matching the description, invited to meet Count Edmont de Fortemps. Nashu immediately seizes on the name and urges you toward Fortemps Manor.</p>
<p>At the manor, a knight confirms that Lord Edmont is indeed entertaining a foreign guest. While you wait, Nashu fixates on the gazebo nearby, treating it like a lurking menace—then quickly deciding it must be safe if the knight is as responsible as he seems. When the meeting finally comes into view, Nashu is sure she has found the inspector…until Godbert appears, very much alive, and very much not the person she expected to see.</p>
<p>Before anyone can properly untangle the surprise, an inquisitor storms in, accusing the hulking “heretic” of brazen wrongdoing. Lord Edmont shuts the accusation down at once—this is an invited guest of House Fortemps. Flustered, the inquisitor introduces himself as Cyr and apologizes, admitting he’s been tasked with investigating reports of a suspicious, possibly heretical man: muscular, dressed in dark clothes, and “gentlemanly” in bearing. Nashu can’t help but think it sounds exactly like Hildibrand—and Cyr proposes you all travel together to Falcon’s Nest, where the first sightings were reported.</p>
<p>At Falcon’s Nest, Ser Redwald confirms a patrol did indeed spot a mysterious muscular vagabond near the Dusk Vigil. The stranger fled when hailed, and the report alone would barely have warranted mention—yet it’s the best trail you have. Cyr, eager to prove the value of the inquisition in quiet times, urges you onward into the cold, warning you to dress for the weather.</p>
<p>Near the frozen ruins, a lone figure approaches from the Vigil—one of the Gentle Dead Men from Ul’dah. Cyr reflexively cries heresy, but Nashu laughs it off at once: this is no heretic, only one of Zombibrand’s undead “gentlemen.” The emissary explains he came chasing rumors of an abandoned fortress held by zombies, only to find the effort futile—and then delivers harsher news: every last one of them is dead, irreversibly so.</p>
<p>Yet he also tells you not to despair—because his aether is bound to the founder of the Gentle Dead Men, he can feel the overlord’s presence calling. With that, he bids you follow, promising to guide you straight to the one you seek.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>あなたはナシュ・マカラッカと再会すると、彼女は息を切らしながらも大喜びで駆け寄ってくる。偶然に違いないと言い張り、あなたに「ヒルディブランド」を探す手伝いを頼み込む。彼女は何度も計算をやり直し、空高く飛ばされた彼が着地したのはイシュガルドのはずだ、と確信していた。</p>
<p>あなたは商人たちに「紳士的なハイランダー」の行方を尋ねて回るが、心当たりはなかなか得られない。やがて、ある商人の噂話から、条件に合いそうな異邦の客がフォルタン家当主エドモン・ド・フォルタンの招きで面会しているらしいと聞きつける。ナシュはその言葉に飛びつき、あなたをフォルタン伯爵邸へ急がせる。</p>
<p>邸宅では、フォルタン家の騎兵が客人の面会が間もなく終わると告げ、あなたは庭先で待つことになる。ナシュは東屋を危険視して騒ぎつつも、相手が堅実そうだと見るや受け入れてしまう。やがて面会の席が見えると、ナシュは「事件屋だ」と確信するが、姿を現したのはゴッドベルトで、彼女の期待は思わぬ方向へ外れていく。</p>
<p>そこへ異端審問官キールが駆け込み、筋骨隆々の「異端者」を名指しで糾弾する。だがエドモンは即座に制し、客人はフォルタン家の招待による商人だと言い切る。キールは慌てて謝罪しつつ、黒衣をまとい「紳士的」に振る舞う不審者の目撃情報を追っているのだと説明し、最初の目撃地であるファルコンネストへ同行を提案する。ナシュはその話を聞き、あなたと同じ人物を追っているのではないかと期待を膨らませる。</p>
<p>あなたがファルコンネストへ赴くと、レッドワルドは、哨戒が「謎の筋肉質な放浪者」をダスクヴィジル付近で見かけたこと、呼びかけても近づかず逃げたことを語る。キールは凍える寒さに悪態をつきながらも、異端の手掛かりを求めて捜索を続けると息巻き、あなたたちはさらに奥へ向かう。</p>
<p>やがて、ダスクヴィジルの方角から現れたのは、ウルダハの「紳士な死体たち」の一員だった。キールは反射的に異端だと叫ぶが、ナシュはそれを笑い飛ばし、彼が仲間の使者だと告げる。使者は、廃砦にゾンビがいるという噂を追って来たものの徒労に終わったと嘆き、さらに仲間が皆「完全に」滅んだと伝える。</p>
<p>それでも彼は、創設者である支配者との結びつきゆえに呼び声を感じ取れるのだと言い、あなたたちに付いて来るよう促し、真の行き先へ導こうと歩き出す。</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>你在 Ishgard 再次遇見 Nashu Mhakaracca，她一看到你就興奮得快喘不過氣，硬說這一定是「serendipity」。她拉著你不放，拜託你一起去找 Hildibrand，還把自己的推算說得斬釘截鐵——她反覆核算了那道被拋上天空的軌跡，認定他落點就該在 Ishgard。</p>
<p>你陪著她挨家挨戶詢問商人，打聽那位「很有紳士風度的 Highlander」。多數人不是一頭霧水，就是直接否認見過這種怪人；線索拖得又長又冷，直到終於有人提起一個傳聞：有個符合描述的外地人，似乎是受 Count Edmont de Fortemps 之邀而來。Nashu Mhakaracca 立刻把這句話當成天降指引，催你直奔 Fortemps Manor。</p>
<p>在 Fortemps Manor，守衛的騎士證實 Count Edmont de Fortemps 正在接待一位外國來客，只是會面還要一會兒才結束。你們被請去一旁等候，而 Nashu Mhakaracca 對著那座 gazebo 一驚一乍，彷彿它隨時會失控暴走；可她又很快說服自己「既然這位騎士看起來很可靠，那應該不會出事」。等到人影終於出現，她滿心以為會看見 Hildibrand，結果迎面而來的卻是 Godbert——活得好好的，也完全不是她要找的那個人。</p>
<p>混亂還沒理清，一名審問官衝上前，指著那位「肌肉發達、眼神可疑」的男子大喊「heretic」。Count Edmont de Fortemps 當場喝止，強調那是 Fortemps 家邀請來的 Ul’dah 商人，絕不容許無端指控。對方立刻改口道歉，自稱 Cyr，說自己奉命追查一名行跡可疑、可能涉入異端的人：身形魁梧、衣著陰暗，卻又偏偏以「gentlemanly」的方式行事。Nashu Mhakaracca 聽得雙眼發亮，覺得這描述簡直就是 Hildibrand 的翻版；Cyr 便提議同行前往 Falcon’s Nest，因為最早的目擊報告就出自那裡。</p>
<p>到了 Falcon’s Nest，Redwald 證實巡邏隊確實在 Dusk Vigil 附近看過一名神祕的「肌肉流浪漢」。士兵試著呼喊，他卻轉身就逃，照理說這種程度的目擊甚至不太值得寫進報告——可對你們而言，這已經是目前最像樣的線索。Cyr 一邊冷到發抖、一邊仍急著證明審問官的價值，催你們繼續往更寒冷的地方追去。</p>
<p>你們在冰冷荒地前行不久，就看見有人從 Dusk Vigil 方向走來——那不是 Hildibrand，而是 Ul’dah 的 Gentle Dead Men 之一。Cyr 立刻又喊起異端，Nashu Mhakaracca 卻笑著否認，說他只是「很有禮貌的 zombie 先生」。對方解釋自己是奉命來追「廢棄堡壘有 zombies」的傳聞，卻只能失望地承認：他是獨自來到這裡的，而且更糟的是——他聽聞同伴全都已經徹底死亡，再也無法回頭。</p>
<p>可他也告訴你別急，因為作為 Gentle Dead Men 的創立者，Master Zombibrand 與他們的 aether 緊密相連；他能感覺到那股牽引正在召喚。於是他示意你們跟上，準備把你們帶往真正該去的方向。</p>
</div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
