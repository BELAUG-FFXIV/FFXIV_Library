<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Give It All | BELAUG · FFXIV Library</title>
  <meta name="description" content="FFXIV BGM — Give It All：Theme、Appears in、Acquisition、Additional Notes、Lyrics，附影片。">
  <link rel="icon" href="../img/favicon.ico" />
  <style>
    :root { --bg:#fff8e6; --card:#fff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}
    .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
    .left{display:flex;align-items:center;gap:12px}
    .home{border:1px solid var(--border);background:#fff;padding:4px 8px;border-radius:8px;text-decoration:none;color:var(--fg);font-weight:800}
    .home:hover{background:#fffef8}
    .right{display:flex;align-items:center;gap:8px}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:6px 10px;border-radius:8px}
    .icon-btn:hover{background:#fff;border:1px solid var(--border)}
    .main{padding:20px 0 40px}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:start}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .video-wrap{position:relative;padding-top:56.25%}
      .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,.05)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
    .card .bd{padding:16px}
    .video-card .bd{padding:0}
    .video-card iframe{width:100%;height:420px;border:0;display:block;border-radius:16px}
    .tabs{display:flex;gap:8px;padding:12px 12px 0;flex-wrap:wrap}
    .tab-btn{background:#fff;border:1px solid var(--border);color:var(--fg);border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600}
    .tab-btn[aria-selected="true"]{border-color:var(--accent);color:#fff;background:var(--accent)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .stack{display:flex;flex-direction:column;gap:10px}
    .stack .row{padding:14px 16px;border:1px dashed var(--border);border-radius:12px;background:#fffdf6}
    .muted{color:var(--muted)}
    .link{color:#0b60d8;text-decoration:none}
    .link:hover{text-decoration:underline}

    /* Appears-in row layout (closer, not stretched) */
    .kv{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:18px;
      flex-wrap:wrap;
    }
    .kv-label{
      font-weight:800;
      color:var(--fg);
      white-space:nowrap;
      min-width:140px;
    }
    .kv-link{
      font-weight:800;
      color:#0b60d8;
      text-decoration:none;
      line-height:1.2;
    }
    .kv-link:hover{ text-decoration:underline; }

    @media (max-width:520px){
      .kv-label{min-width:110px}
      .stack .row{padding:12px 14px}
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <div class="left"><a class="home" href="../index.html">🏠 Home</a></div>
      <div class="right"><button id="langToggle" class="icon-btn" aria-label="切換語言">🌐 EN</button></div>
    </nav>
  </header>

  <main class="container main">
    <div class="grid">
      <!-- Left: Video -->
      <section class="card video-card">
        <div class="bd">
          <div class="video-wrap">
            <iframe id="ytFrame" src="https://www.youtube.com/embed/hkrwl0UAMkM" title="Give It All" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <!-- Right: Title + Tabs -->
      <section class="card">
        <div class="hd" id="pageTitle">Give It All</div>
        <div class="tabs" role="tablist">
          <button class="tab-btn" role="tab" aria-selected="true"  data-tab="theme">Theme</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="appears">Appears in</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="acq">Acquisition</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="notes">Additional Notes</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="lyrics">Lyrics</button>
          <button class="tab-btn" role="tab" aria-selected="false" data-tab="comments">Comments</button>
        </div>
        <div class="bd">
          <div id="panel-theme"   class="tab-panel active"></div>
          <div id="panel-appears" class="tab-panel"></div>
          <div id="panel-acq"     class="tab-panel"></div>
          <div id="panel-notes"   class="tab-panel"></div>
          <div id="panel-lyrics"  class="tab-panel"></div>
          <div id="panel-comments" class="tab-panel">
            <div id="giscus_container" style="min-height:320px;"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const LANG_KEY='ffxiv-guide-lang';

    // EDIT HERE (optional): default appears link target for this page
    const appearsLinkHref = "aac-light-heavyweight-m4n.html";

    /* =========================================================
       LYRICS (shared across EN/JP/ZH)
       Paste FULL lyrics below. This will be identical for all
       languages, so the Lyrics tab stays synced when you toggle
       EN/JP/ZH.
       ========================================================= */
    const LYRICS_SHARED = `
      <div class="stack">
        <div class="row">
          <div style="white-space:pre-wrap; line-height:1.7;">
[Tonight our city bleeds red, blue, and green  
As I walk in the dark unseen  

Yet like the grey the sky is draped in  
The colors in my heart have faded  

Gone  
They're gone  
They're gone  
All gone  

A girl looks to the stars and dares to dream  
On the world she'd make her mark, it seemed  

This phantom in my mirror starin' back  
I realize that girl is  

Gone  
She's gone  
She's gone  
I'm gone  

Climbed every mountain, made it to the top  
I had it all, or so I thought  
Traded tomorrow for a lie  
And found the price too high  

The clock is ticking counting down to naught  
I'm outta time but it won't stop  
I'll bet my life before it's lost  
That final line I'll cross  

There ain't no going back  
No going back  
No going back  
No  

What light's left here inside  
I'll suffocate  
If that's what it takes, oh  

And those who look to cast me aside  
or turn their backs and leave me to die  

You can try, can try, come try,  
But I will survive  

No going back  
No going back  
No never, (no)  
Never again, no  

Ain't no going back  
No going back  
No coming back from the edge  

Look in my eyes, yeah I know you understand  
(Somebody help, my misery's taking me)  
I've made up my mind, now there ain't no going back  
(Somebody help, I'm losing what's left of me)  
I've made up my mind, now my heart's demanding  
I'm ready to fight till there's one left standing  
Tonight, lightning'll strike, thunder will fall  
(and) You're gonna give it all  

To me  
To me  
To me  
To me, I gotta believe  
You'll set  
Me free  

Tonight my circle finally comes complete  
One last step from the dark, I breathe  

The music’s swellin', crowd is chantin'  
And for this moment fear’s an afterthought  
It’s gone  
It’s gone  
All gone  

I look out to the crowd and there I see  
A thousand little girls—all me  

I’ve turned the tables, yeah I'm fightin' back  
I’ll bring the lightning, now it’s  

On  
It’s on  
It’s on  
You’re gone]
          </div>
        </div>
      </div>
    `;

    const i18n={
      EN:{
        langLabel:'EN',
        pageTitle:'Give It All',
        tabs:{theme:'Theme',appears:'Appears in',acq:'Acquisition',notes:'Additional Notes',lyrics:'Lyrics',comments:'Comments'},
        theme:`<div class="stack"><div class="row">AAC Light-heavyweight M4 Theme</div></div>`,
        appears:`
          <div class="stack">
            <div class="row">
              <div class="kv">
                <span class="kv-label">Appears in</span>
                <a class="kv-link" href="${appearsLinkHref}">AAC Light-heavyweight M4 (M4N)</a>
              </div>
            </div>
          </div>
        `,
        acq:`<div class="stack"><div class="row">Obtained in AAC Light-heavyweight M4</div></div>`,
        notes:`<div class="stack"><div class="row">May appear in chest after completing AAC Light-heavyweight M4 AAC Light-heavyweight M4</div></div>`,
        lyrics:LYRICS_SHARED
      },
      JP:{
        langLabel:'JP',
        pageTitle:'Give It All',
        tabs:{theme:'テーマ',appears:'登場先',acq:'入手方法',notes:'補足',lyrics:'歌詞',comments:'コメント'},
        theme:`<div class="stack"><div class="row">至天の座アルカディア：ライトヘビー級4のテーマ</div></div>`,
        appears:`
          <div class="stack">
            <div class="row">
              <div class="kv">
                <span class="kv-label">登場先</span>
                <a class="kv-link" href="${appearsLinkHref}">至天の座アルカディア：ライトヘビー級4層(M4N)</a>
              </div>
            </div>
          </div>
        `,
        acq:`<div class="stack"><div class="row">至天の座アルカディア：ライトヘビー級4 で入手。</div></div>`,
        notes:`<div class="stack"><div class="row">至天の座アルカディア：ライトヘビー級4 クリア後の宝箱から入手できる場合があります。</div></div>`,
        lyrics:LYRICS_SHARED
      },
      ZH:{
        langLabel:'ZH',
        pageTitle:'Give It All',
        tabs:{theme:'主題',appears:'登場於',acq:'取得方式',notes:'補充說明',lyrics:'歌詞',comments:'留言'},
        theme:`<div class="stack"><div class="row">AAC Light-heavyweight M4 主題曲</div></div>`,
        appears:`
          <div class="stack">
            <div class="row">
              <div class="kv">
                <span class="kv-label">登場於</span>
                <a class="kv-link" href="${appearsLinkHref}">至天座阿爾卡迪亞：輕量級 第4層 (M4N)</a>
              </div>
            </div>
          </div>
        `,
        acq:`<div class="stack"><div class="row">可於 AAC Light-heavyweight M4 取得。</div></div>`,
        notes:`<div class="stack"><div class="row">完成 AAC Light-heavyweight M4 後，有機會出現在寶箱中。</div></div>`,
        lyrics:LYRICS_SHARED
      }
    };

    const langToggle=document.getElementById('langToggle');
    const pageTitle=document.getElementById('pageTitle');
    const tabBtns=[...document.querySelectorAll('.tab-btn')];
    const panels={
      theme:document.getElementById('panel-theme'),
      appears:document.getElementById('panel-appears'),
      acq:document.getElementById('panel-acq'),
      notes:document.getElementById('panel-notes'),
      lyrics:document.getElementById('panel-lyrics'),
      comments:document.getElementById('panel-comments')
    };

    function getLang(){ return localStorage.getItem(LANG_KEY)||'EN'; }

    function applyLang(lang){
      const t=i18n[lang]||i18n.EN;
      pageTitle.textContent=t.pageTitle;
      langToggle.textContent=`🌐 ${t.langLabel}`;
      tabBtns.forEach(b=>{ b.textContent=t.tabs[b.dataset.tab]; });
      const active=tabBtns.find(b=>b.getAttribute('aria-selected')==='true')||tabBtns[0];
      renderPanel(active.dataset.tab,lang);
      if (active && active.dataset.tab==='comments') loadGiscusForCurrentLang();
    }

    function renderPanel(key,lang){
      const t=i18n[lang]||i18n.EN;
      Object.keys(panels).forEach(k=>panels[k].classList.remove('active'));
      panels[key].classList.add('active');
      if(key!=='comments'){
        panels[key].innerHTML=t[key] || `<div class="stack"><div class="row muted">No content.</div></div>`;
      }else{
        loadGiscusForCurrentLang();
      }
    }

    tabBtns.forEach(btn=>{
      btn.addEventListener('click',()=>{
        tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        renderPanel(btn.dataset.tab,getLang());
      });
    });

    langToggle.addEventListener('click',()=>{
      const cur=getLang();
      const next=cur==='EN'?'JP':(cur==='JP'?'ZH':'EN');
      localStorage.setItem(LANG_KEY,next);
      applyLang(next);
    });

    applyLang(getLang());

    const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
    };
    function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
    function loadGiscusForCurrentLang(){
      const mount = document.getElementById('giscus_container');
      if (!mount) return;
      mount.innerHTML = '';
      const langCode = getLang(); // EN / JP / ZH
      const s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.setAttribute('data-repo', GISCUS_CFG.repo);
      s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
      s.setAttribute('data-category', GISCUS_CFG.category);
      s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', location.pathname + '｜' + langCode);
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-lang', uiLang(langCode));
      s.setAttribute('data-theme', GISCUS_CFG.theme);
      s.setAttribute('crossorigin', 'anonymous');
      s.async = true;
      mount.appendChild(s);
    }
  </script>
</body>
</html>
