  EN:{
    langLabel:'English',

    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>Riol tells you that many new faces have come from all over to join the Crystal Braves. He says the help is welcome, but training them up is still a pain.</p><p>Inside the Solar at Rising Stones, Minfilia says she is eager to address the Ascian threat, but warns you cannot neglect other urgent concerns: Saint Shiva will not be the last primal, and your relationship with Ishgard remains tenuous. Alphinaud answers that the Scions need not shoulder everything alone—that the Crystal Braves were founded for this purpose—and he says you, in particular, have been a steadying hand he trusts will continue to support the Braves.</p><p>Alphinaud then explains what is happening in Ul’dah: the Immortal Flames are struggling after learning a high-ranking officer was a Garlean agent, and Teledji Adeledji and the Monetarists are already trying to exploit the situation amid ongoing unrest. He says General Raubahn needs help, so he will direct the Crystal Braves to provide support—and to stay on top of events and issue effective orders, he intends to remain in Ul’dah for the foreseeable future.</p><p>Minfilia says that is fine, and when Alphinaud asks about Moenbryda’s work, Minfilia says the research proceeds, though the key problem—forming an aetherial blade at will—remains unsolved. She asks you to devote your efforts to helping Alphinaud and the Crystal Braves, noting that your status can restore faith if you are seen working on the Immortal Flames’ behalf. Alphinaud thanks you again, says he must receive Riol’s latest report, and asks you to join him outside when you are finished.</p><p>Outside, Riol repeats his report for you: he and his people traced the source of weapons that ended up in refugee hands and heard of a large purchase by a black marketeer near Highbridge. Alphinaud reasons that such a quantity implies clients already waiting—clients who want the transaction kept secret. Riol recalls the merchant who was shot while speaking to you and who handed out weapons to the downtrodden, and he suggests it may be prudent to intervene before any buyers collect their goods.</p><p>Alphinaud agrees it would be best to seize the weapons before they fall into the wrong hands, and proposes that if you strike at the appointed hour, you might capture both the black marketeer and the clients. He tells you to rendezvous with Captain Ilberd at Highbridge and intervene when the exchange takes place, then leaves for Ul’dah. At Highbridge, Ilberd tells you his scouts have watched the black marketeer closely and that the guests have arrived; the man has hired guards—common thugs, but still a threat. Ilberd apologizes that the task is beneath someone of your standing, yet says powerful men need loyal, able-bodied friends—and that having found one in you, it is only natural Alphinaud would rely on you.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    pageTitle:'3本の柱',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>リオルは、各地から新顔が次々とクリスタルブレイブに加わっていると言い、助けはありがたいが、鍛え上げるのは骨が折れるとあなたにこぼす。</p><p>石の家の談話室で、ミンフィリアはアシエンへの対処を急ぎたいとしつつも、他の差し迫った問題を放置できないと告げる。聖シヴァは最後の蛮神ではなく、イシュガルドとの関係も依然として不安定だ、と。アルフィノは、暁の血盟がすべてを背負う必要はない、まさにそのためにクリスタルブレイブを設立したのだと言い、あなたがこれからもブレイブを支えてくれると信じていると述べる。</p><p>さらにアルフィノは、ウルダハの状況を伝える。不滅隊は、高位の者がガレマールの密偵だったという事実に揺れ、混乱のさなかでテレジ・アデレジとモノタリストが利を得ようとしている。ラウバーンには助けが必要で、クリスタルブレイブを動かして支援させる――そのうえで、情勢を把握し有効な指示を出すには行き来する時間が惜しいため、当面はウルダハに留まるつもりだ、とあなたに言う。</p><p>ミンフィリアは異存なしと答え、ムーンブリダの研究は予定どおり進んでいるとしつつも、肝心の問題――任意にエーテル刃を形成する方法――は未解決だと話す。だからこそ、あなたにはアルフィノとクリスタルブレイブを助けてほしい、と。あなたが不滅隊のために動く姿は信頼回復につながり、あなたの立場は組織や国家に縛られた者にはできない働きを可能にするのだと、ミンフィリアは改めて促す。アルフィノは礼を述べ、リオルの最新報告を受け取る必要があるとして、用事が済んだら外で合流するようあなたに頼む。</p><p>外でリオルは、難民の手に渡った武器の出所を探り、大量の武器を買い付けた闇商人の噂をハイブリッジ近くで掴んだとあなたに報告する。アルフィノは、それほどの数量を動かす以上、すでに買い手が待っており、取引を秘匿したい事情があるはずだと言う。リオルは、あなたの目の前で矢を受けた商人のことを思い出し、困窮した者に武器を配っていた点に触れたうえで、買い手が品を受け取る前に介入するのが得策だと示唆する。</p><p>アルフィノは、武器が悪用される前に押収するのが最善だとし、時刻を合わせて踏み込めば闇商人だけでなく買い手も捕らえられるかもしれないと言う。そしてあなたに、ハイブリッジでイルベルド隊長と合流し、取引の場で介入するよう指示したのち、ウルダハへ向かう。ハイブリッジでイルベルドは、斥候が闇商人を監視しており客も到着したと告げ、さらに護衛を雇っている――取るに足らぬチンピラでも脅威にはなる、と言う。イルベルドはあなたに、これは身分に比して低い仕事だとして詫びつつも、力ある者には忠実で頼れる友が必要であり、あなたという友を得た以上、アルフィノが躊躇なく頼るのは自然だと語る。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> ミンフィリア <small class="muted">（石の家, X:6.1, Y:5.2）</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="let-us-cling-together.html">氷結の幻想</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 50～</div>

      <div class="row" style="display:flex;justify-content:flex-start;gap:18px;flex-wrap:wrap;align-items:center"><b>討伐戦開放</b><a class="link" href="the-bowl-of-embers-hard.html">真イフリート討滅戦</a></div>
      <div class="row" style="display:flex;justify-content:flex-start;gap:18px;flex-wrap:wrap;align-items:center"><b>討伐戦開放</b><a class="link" href="the-howling-eye-hard.html">真ガルーダ討滅戦</a></div>
      <div class="row" style="display:flex;justify-content:flex-start;gap:18px;flex-wrap:wrap;align-items:center"><b>討伐戦開放</b><a class="link" href="the-navel-hard.html">真タイタン討滅戦</a></div>

  ZH:{
    langLabel:'繁體中文',
    pageTitle:'艾奧傑亞的支柱',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>Riol 跟你說，各地來了很多新面孔加入 Crystal Braves。當然有人手能幫忙是好事，但把這些新人訓練起來仍然讓人頭痛。</p><p>在 Rising Stones 的 Solar，Minfilia 說她非常想盡快處理 Ascian 的威脅，但也提醒你們不能忽視其他迫在眉睫的問題：Saint Shiva 不會是你們面對的最後一個 primal，而你們與 Ishgard 的關係也仍然脆弱。Alphinaud 回應，Scions 不必獨自扛起所有重擔——Crystal Braves 正是為了這個目的而成立；他也說，你一直是能穩住局勢的那隻手，他相信你會繼續支持 Crystal Braves。</p><p>接著 Alphinaud 提到 Ul’dah 的後續：Immortal Flames 正苦於消化「高階軍官其實是 Garlean 密探」的事實；Teledji Adeledji 與 Monetarists 也趁著動盪，立刻想把局勢導向對自己有利的一方。再加上不安仍在延燒，Immortal Flames 壓力極大。Alphinaud 說 General Raubahn 需要支援，所以他會指揮 Crystal Braves 盡力協助；而為了掌握最新發展並下達有效命令，他也表示，接下來一段時間他最好留在 Ul’dah。</p><p>Minfilia 表示沒有異議。當 Alphinaud 問起 Moenbryda 的研究，Minfilia 說一切照計畫進行，但她不熟細節；Urianger 在 Waking Sands 翻查典籍，其他人也各自出力。她同時坦白，關鍵問題——如何隨時形成 aetherial blade（以太之刃，指的是「以太構成的刀刃（能以意志隨時成形）」這個技術問題），仍未解決，但她相信只是時間問題。於是 Minfilia 請你在他們專注處理 Ascian 的同時，去協助 Alphinaud 與 Crystal Braves；她說，若光之戰士被看見在 Immortal Flames 的立場上行動，會有助於重建信任，也提醒你：你的身分讓你能做出那些被組織與國家綁住的人做不到的事。Alphinaud 再次向你致謝，說他得先處理出發前的準備，像是接收 Riol 的最新報告，並要你稍後到外面與他會合——依 Riol 的報告內容，他可能很快就需要你幫個忙。</p><p>你到外面後，Riol 把報告重講一次：他和同伴一直在追查先前流入難民手中的武器來源，最近得到一條線索——Highbridge 附近有個黑市商人買進了相當大量的武器。Alphinaud 判斷，若沒有早已在等著收貨的客戶，那個人不可能一次弄到這麼多武器；而這些客戶顯然也希望交易保持低調。Riol 則提起那個曾在跟你說話時中箭的商人——那人曾把刀槍分送給貧困與不滿的人——並說這次的買家未必是同一種意圖，但若要確定，最好在他們收貨前就先介入。</p><p>Alphinaud 認同，武器落入不該拿的人手裡之前先押走最妥當；而若能掐準交易時間出手，或許能同時逮到黑市商人與買家。他要你到 Highbridge 與 Captain Ilberd 會合，等交換發生時介入，自己則啟程前往 Ul’dah。你抵達 Highbridge 後，Ilberd 告訴你，他的斥候一直緊盯黑市商人，對方的客人似乎已經到場；黑市商人也雇了不少人站崗——雖然只是些不足掛齒的地痞，但仍然構成威脅。Ilberd 隨即向你致歉，說這種差事實在配不上你的身分，Alphinaud 也不必特地派你跑這一趟；但他也說，身居要位的人總是需要忠誠又可靠的朋友，而 Alphinaud 找到了你，自然會毫不猶豫地依賴你。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 敏菲利亞 <small class="muted"> 石之家（X:6.1, Y:5.2)</small></div></div>`,

      <div class="row">必須先完成以下內容：</div>
      <div class="row" style="display:flex;justify-content:flex-start;gap:18px;flex-wrap:wrap;align-items:center"><b>解鎖試煉</b><a class="link" href="the-bowl-of-embers-hard.html">真 伊弗利特殲滅戰</a></div>
      <div class="row" style="display:flex;justify-content:flex-start;gap:18px;flex-wrap:wrap;align-items:center"><b>解鎖試煉</b><a class="link" href="the-howling-eye-hard.html">真 迦樓羅殲滅戰</a></div>
      <div class="row" style="display:flex;justify-content:flex-start;gap:18px;flex-wrap:wrap;align-items:center"><b>解鎖試煉</b><a class="link" href="the-navel-hard.html">真 泰坦殲滅戰</a></div>

};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
