const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`Where We Call Home`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>The next step comes fast, and with far less dignity. A weary cargo operator mutters that they could have lived quite happily without a Doomtrain attack today, while Lumull ushers you forward—ready or not—and orders an immediate dash for the Bentini Depot. You’re told to climb aboard, and the operator promises to get you there “in a flash,” with the kind of safety warning that sounds only half like a joke: keep any limbs you want to keep inside the vehicle.</p><p>At Bentini, Lumull lays out the plan with blunt urgency. You’ll ride the flatcar at the rear while he stays at the very front, driving the locomotive as hard as it can go. Doomtrain is coming at breakneck speed—if you’re slow, it will simply plow through you. With the threat bearing down, Lumull adds the simplest motivation he can: don’t forget you’re fighting for Eyaney… and for all of Treno.</p><p>The fight becomes real the moment you enter Hell on Rails. Over the roar and chaos, Lumull’s warning cuts through—brace for impact—and the duty ends with Doomtrain stopped, the danger pushed back by your hands more than anyone else’s. Lumull exhales like someone who’s spent their entire allotment of courage for the year, then immediately snaps back to reality: before anyone celebrates, Treno must be secured. More beasts have slipped in to the south, and he needs your help again.</p><p>While you’re pulled toward the next crisis, the city is already paying its price. The story rewinds “a short time earlier,” and the perspective shifts to Krile—no longer the observer, but the one on the ground refusing to leave anyone behind. She steadies a shaken Milalla survivor, hears that more people are under attack by the canal, and sends the evacuees toward town hall as she runs straight back into the danger.</p><p>As Krile, you clear evacuation routes street by street, chasing cries for help, cutting down storm spirits, and forcing breathing room into a city that keeps tightening around its people. You rescue trapped civilians, push others toward safety, and then feel the air turn wrong—too warm, too sudden—until you find the next disaster: homes burning. Krile drops everything to stop the fire first, borrowing from Y’shtola’s methods to extinguish it, then turns back to the screams further out, taking wave after wave because there’s always another corner where someone is still calling.</p><p>When the last of those threats finally falls quiet, the silence lasts only a heartbeat. A behemoth appears—too large, too late, too dangerous for one exhausted person to face alone—and the timing is razor-thin. Y’shtola, Sphene, and G’raha Tia arrive as Eyaney completes the repairs, and the new plan becomes a promise spoken out loud: hold the line together until the barrier is back in place.</p><p>The final battle is a coordinated stand against aether gone violent. The aether churns into storm patterns that leave “nowhere safe,” thunderheads drift into lethal positions, and the behemoth’s power escalates until even Y’shtola senses the levin turning volatile. When Ecliptic Meteor begins, the threat shifts from brute force to catastrophe. Ball lightning forms, and Krile calls for strength—Y’shtola and Sphene lend it without hesitation while G’raha Tia takes responsibility for dispersing the spheres. The answer, improbably, is shelter: take cover behind a spriggan at the crucial moment, endure the impact, then press the attack as the tide finally turns.</p><p>When it’s over, G’raha Tia can’t help but acknowledge what he just witnessed—an incredible performance—while Krile deflects praise with a dry “Flatterer.” The barrier comes back online. Over linkpearl, Lumull announces the perimeter is clear, Doomtrain is destroyed, and Eyaney has fixed the barrier—no more beasts, not tonight. Treno, at last, can breathe.</p><p>And then the personal thread cuts through the victory. Miayli, shaking with relief that everyone is safe, speaks a name—Alayla—and asks Krile if it means anything to her. Krile’s answer lands like a struck bell: her mother. Miayli doesn’t explain further yet; first, she insists on tending wounds. But she makes a promise that reframes everything: Alayla’s story and the key’s story are the same story. When Krile has rested, Miayli will tell her the tale.</p><p>Afterward, your companions try to force the most basic next step: rest. Y’shtola says Krile’s injuries aren’t serious enough to fear, but her curiosity is another matter—and she’ll get to town hall much faster if she can actually walk there. Krile, embarrassed to have collapsed in front of half the city, insists she’s fine thanks to Y’shtola’s help, then turns the concern outward again—asking if you’re hurt, because before you see Miayli, you can tend wounds now.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Lumull <small class="muted">(Treno, X:11.8, Y:15.0)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="toward-trouble.html">Toward Trouble</a></div>
      <div class="row"><div class="row-2col"><div class="lbl"><b>Unlock Trial</b></div><div class="val"><a class="link" href="hell-on-rails.html">Hell on Rails</a></div></div></div>
      <div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 100</div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="into-the-mist.html">Into the Mist</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'隣人と手を取り合いて',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>貨物係はぼやく。「今日はドゥームトレインの襲撃なんて勘弁してほしかった」。ルムルはそんな愚痴に構わず、あなたを急かして車両へ乗せる。目的地はベントニ貨物基地。係は「一瞬で着く」と言いながら、外に出したままの手足は戻しておけ、と物騒な注意を添える。</p><p>基地に着くと、ルムルは状況を端的に説明する。あなたは最後尾の平台車に乗り、ルムルは先頭の機関車で限界まで速度を引き上げる。ドゥームトレインは常軌を逸した速度で迫る。遅ければ、そのまま轢き潰される。だからこそ、今は走るしかない。ルムルは言う――エヤネーのため、そしてトレノのために戦ってくれ、と。</p><p>「ヘル・オン・レールズ」に突入した瞬間、現実の重さが襲いかかる。衝撃に備えろというルムルの声が響き、戦闘は終結する。息をつくルムルは「もう冒険は十分だ」と弱音を吐きつつも、ほとんどはあなたのおかげでドゥームトレインを止めたと認める。だが喜ぶのは後だ。街の南に逸れた魔物がいる――また助けが必要だ、と。</p><p>そして少し前へと場面が戻り、今度はクルルの視点になる。彼女は怯えたミララの生存者を支え、運河の方で他にも襲われている者がいると聞くと、即座に「行く」と答える。皆には役所へ避難するよう促し、自分は走る。置いていけない、と心に決めたまま。</p><p>クルルは避難路を確保し、叫び声を追い、雷霊を退け、取り残された市民を救い出していく。次々に現れる脅威に対処するうち、空気が不自然に熱くなる。嫌な予感の先にあったのは火災だった。彼女はまず火を消すことを優先し、ヤ・シュトラのやり方にならって鎮火させる。安堵する間もなく、さらに遠くから悲鳴が上がり、彼女はまた走る。波のように押し寄せる敵を止めるたび、まだ助けを求める声が残っている。</p><p>ようやく一段落したと思った刹那、今度は巨大なベヒーモスが現れる。疲弊したクルルひとりでは危うい――だが間に合った。ヤ・シュトラ、スフェーン、グ・ラハ・ティアが合流し、エヤネーの修理が完了するまで「共に」持ちこたえる方針が固まる。</p><p>戦いは雷属性の乙太そのものと向き合う消耗戦になる。雲が危険域を作り、「安全な場所がない」状況が続く。やがて「エクリプティックメテオ」の詠唱が始まり、雷がさらに不安定化する。球電が現れ、クルルは力を求め、ヤ・シュトラとスフェーンがそれに応える。グ・ラハ・ティアは球電の処理を引き受け、最後はスプリガンの陰に身を隠して衝撃を耐える。耐え切った瞬間、流れが変わり、押し返す。</p><p>勝利後、グ・ラハ・ティアは「見事だった」と称え、クルルは「お世辞屋」と返す。バリアは復旧し、ルムルはリンクパール越しに叫ぶ。周辺は安全、ドゥームトレインは破壊、そしてエヤネーがバリアを直した――今夜はもう魔物を心配しなくていい。トレノはようやく息をつける。</p><p>だが、歓声の裏で個人的な糸が強く引かれる。ミアイリは安堵しながらも、ある名を口にする。「アライラ」。クルルにとってそれは母の名だった。ミアイリは今は説明せず、まず治療を優先する。ただし、ひとつだけ断言する――アライラの物語と「鍵」の物語は同じだ、と。休んで回復したら、その話を聞かせると約束する。</p><p>最後に仲間たちは休息を促す。ヤ・シュトラは重傷ではないと言いながら、クルルの好奇心は別問題だと釘を刺す。歩けるようになってこそ、役所のミアイリのもとへ早く辿り着ける。クルルは大勢の前で倒れたことを恥じつつも平気だと言い、逆にあなたの怪我を気遣う。ミアイリに会う前に、手当てが必要なら今すぐできる、と。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> ルムル <small class="muted">(トレノ, X:11.8, Y:15.0)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="toward-trouble.html">苦難の中にあろうとも</a></div>
      <div class="row"><div class="row-2col"><div class="lbl"><b>討伐戦開放</b></div><div class="val"><a class="link" href="hell-on-rails.html">グラシャラボラス討滅戦</a></div></div></div>
      <div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="into-the-mist.html">霧の中の理想郷</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'我們稱之為家的地方',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>事情一下子就衝進「來不及慢慢談」的節奏。Cargo Operator 一臉厭世地嘆：今天真的不需要再來一波 DoomtrainDoomtrain（Treno 一帶在 Storm Surge（雷災）後仍於 Mist Continent 上活動的「鐵道災厄」：一台以雷屬性乙太驅動、長年高速行駛的裝甲列車兵器。依 Sphene 的說法，它原本是 Lindblum 的戰爭武器，用來運送軍用魔獸；為防失控，引擎內封存了一個強大的秘術存在。它與其所攜帶的野獸會在沿途造成大規模死傷與破壞，因此被當地人視為「在鐵軌上行走的災厄」）。Lumull 卻已經在催你上車，說好就出發，立刻前往 Bentini。你剛踏上載具，對方就用半開玩笑半認真的語氣提醒：想保住的手腳都收好，別伸出去。</p><p>抵達 Bentini Depot 後，Lumull 把風險講得非常直白：你要站在列車最後方的 flatcar，他則在最前方的車頭，把速度推到極限。Doomtrain 的速度快到失控——只要慢一點，它就會直接撞上來把你們碾過去。於是他在最後補上一句最簡單、也最能把人拉回現實的話：別忘了你是在為 Eyaney 戰鬥——也是為了 Treno 的所有人。</p><p>你踏進 Hell on Rails 的瞬間，Lumull 的警告就像撞擊前的金屬聲一樣刺耳：準備承受衝擊。戰鬥結束後，Lumull 先是長長吐氣，說自己一輩子的勇氣大概都用完了；但他也立刻承認——你才是把 Doomtrain 擋下來的主力。可他不讓氣氛停在慶功上，因為 Treno 還沒真正安全：南邊還有零星的魔物，他又得再拜託你一次。</p><p>接著畫面回到「稍早之前」，而焦點換成 Krile。她先扶起一名驚魂未定的 Milalla 傷者，聽對方說運河那邊還有人被攻擊，立刻回一句「我馬上去」。她要其他人先往 town hall 撤離，自己則衝進更深的混亂裡，因為她很清楚——不能把任何人丟下，她不會。</p><p>以 Krile 的視角，你清理撤離路線、追著求救聲跑、擊退雷靈與成群的威脅，把被困住的居民一個個拉回安全邊界。當你以為總算喘得過氣時，熱得不正常的風吹過來，你在 Codetta Quarter 看見新的災難——火。Krile 先把「滅火」當成第一順位，照著 Y’shtola 的做法壓住火勢，才剛確定不會擴散，又聽見更遠處傳來尖叫，只能再往外追。敵人像浪一樣一波接一波，你每擋下一次，就會發現還有下一個角落有人正在叫救命。</p><p>好不容易安靜下來，卻又立刻被更沉重的威脅撕開——behemoth 出現了。就在最緊的時刻，Y’shtola、Sphene、G’raha Tia 趕到，因為 Eyaney 的修復已接近完成：你們需要做的，就是「一起」撐住，撐到屏障重新立起來。</p><p>接下來的戰鬥不是單純拚火力，而是對抗失衡的雷屬性乙太。雲層與落雷把空間切得支離破碎，明明在跑位，卻像哪裡都不安全；直到 Ecliptic Meteor 開始讀條，連 Y’shtola 都察覺雷變得更不穩定。球狀閃電出現，Krile 直接喊：Y’shtola、Sphene——借我力量。兩人立刻回應，而 G’raha Tia 扛起另一條線：他和你一起把那些球狀閃電處理掉。最後的解法竟是「掩蔽」——在關鍵時刻躲到 spriggan 背後硬吃衝擊，扛過去之後再反推，局勢終於翻轉。</p><p>戰鬥結束，G’raha Tia 稱讚那是「驚人的表現」，Krile 則用一句帶刺的回應把讚美擋回去。隨後屏障恢復，Treno 終於能把胸口那口氣吐出來。Lumull 透過 linkpearl 公布：周界清空了，Doomtrain 被毀了，Eyaney 也把屏障修好了——今晚不必再擔心魔物，大家可以準備慶祝。</p><p>但勝利的熱度還沒散，就被更私人的線索切開。Miayli 先是顫著聲音確認「他們都安全了」，接著忽然提起一個名字：Alayla。她問 Krile 這名字對她有沒有意義。Krile 的反應像被針扎中——那是她的母親。Miayli 立刻收住，先要把 Krile 的傷處理好，然後才給出一個重量極大的承諾：Alayla 的故事，和那把 key 的故事，其實是一個故事。等你休息恢復後，她會把那段過往完整告訴你。</p><p>回到街上，眾人都在催你們先休息。Y’shtola 說 Krile 的傷不需要太擔心，但她的好奇心才是真正的問題——如果想趕快去 town hall 找 Miayli，就得先確保她走得動。Krile 雖然不想在半座城市面前倒下，但她也承認自己在 Y’shtola 的照顧下沒事；接著她又把視線轉向你，問你有沒有受傷——因為在去見 Miayli 之前，如果要包紮、要治療，現在就可以做。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 魯穆爾 <small class="muted">(特雷諾, X:11.8, Y:15.0)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="toward-trouble.html">仍在苦難之中</a></div>
      <div class="row"><div class="row-2col"><div class="lbl"><b>解鎖試煉</b></div><div class="val"><a class="link" href="hell-on-rails.html">地獄列車 格拉夏拉波拉斯討滅戰</a></div></div></div>
      <div class="row">任一戰鬥／魔法職（不含限制職業）Lv.100</div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="into-the-mist.html">迷霧中的烏托邦</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
