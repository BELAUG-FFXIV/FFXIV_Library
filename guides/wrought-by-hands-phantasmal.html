const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`Wrought by Hands Phantasmal`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>With the aetheric groundwork complete, Gerolt declares himself ready for yet another feat of near-impossible genius. This time, however, the task is no longer merely to refine tools or channel power into a forge. The phantom weapon itself is ready to be advanced further, and the surveyors have already uncovered a fresh supply of waxing arcanite for that very purpose. Lydirceil explains that three pieces will be needed for each enhancement and, with weary familiarity, warns that Ermina will no doubt demand a steep price for them. Once you secure the ore, it is to be delivered to Dodokkuli so the preparations can begin.</p><p>Gerolt, still brimming with energy from the aether coursing through him, wastes little time complaining about Rowena’s people laying claim to yet another valuable material. Even so, he makes one point clear: whatever else is bought and sold, they have no claim over your phantom weapon. With that, you obtain the necessary waxing arcanite and place it in Dodokkuli’s hands. The metallurgist receives it with keen interest, already eager to see what Gerolt might accomplish now that both his craft and his body have been saturated with aether.</p><p>When the time comes, Gerolt throws himself into the work with unrestrained fervor. He exults in the sheer force running through his veins, reveling in the sense that he has never been more capable. Then, with all that gathered power brought into harmony with the essence of the weapon before him, he completes the next stage of the process. What emerges is not merely an improved armament, but a new expression of the ancient art itself: the Phantom Weapon Umbrae. Even Gerolt sounds shaken by the strength of the result, admitting that the output of the aetherwells is almost frightening and that he can still feel their energy swirling inside him.</p><p>Archive, delighted by the success, begins to explain the principles behind what has just taken place. Heated ambient aether is stirred by wind, drawn into the body, then rapidly cooled by water before leaving the corporeal form and passing into the earth, where it is purified. In that ceaseless cycle, the artisan’s internal aether is brought into perfect harmony. Lydirceil can only liken it to some bewildering aetheric steam bath, while Gerolt, for all his gruffness, openly admits that delving into obscure ancient techniques has been deeply rewarding. His debt, his pay, even Rowena’s grip over his circumstances seem to matter less and less beside the thrill of refining his art and expanding what he can do.</p><p>The mood shifts when Lydirceil presses him about the “vague notion” he once claimed to have. Gerolt refuses to elaborate, brushing the question aside with bluster, but Archive interrupts with a matter of his own: the knife he found in his sarcophagus. He asks once more whether it truly cannot be considered a weapon. When doubt is raised, Archive counters with absolute confidence, insisting that ancient Nym was home to a proud tradition of warrior-culinarians who employed stabbing techniques with kitchen implements, and that this surely proves his knife deserves to be sharpened into deadly perfection.</p><p>That argument wins little support. Lydirceil rejects the idea outright, insisting the miserable little blade is meant for slicing vegetables and nothing more. Dodokkuli is no more convinced, quietly noting that such a claim would likely fail to impress any serious historian. Yet from this absurd exchange, Gerolt suddenly snatches a new idea. Fed up with the bland fare served by the expedition, he decides they should make proper use of the sea’s bounty instead. For that, he declares, they will need a mastercrafted knife fit to fillet even the largest sea creatures.</p><p>Archive seizes upon the prospect at once. Fishing, he says, would be a welcome diversion on an island otherwise starved of amusement, and so he hurries off toward the shore with rod in hand, already imagining the monstrous catch he might haul in. Gerolt, meanwhile, agrees to sharpen the blade after all—not as a weapon of war, but as part of his next strange endeavor—and turns back to the tablet in search of yet another artisan’s prize to pursue.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Lydirceil <small class="muted">(Phantom Village, X:6.6, Y:7.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="aether-aether-everywhere.html">Aether, Aether, Everywhere</a></div><div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="timeworn-techniques.html">Timeworn Techniques</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'ファントムウェポンの強化',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>エーテル注入の基盤が整い、ゲロルトは再び不可能に近い離れ業へ挑む時が来たと息巻く。今度は単に道具を整えるのでも、炉へ力を流し込むのでもない。ファントムウェポンそのものを、さらに先の段階へ進めるための強化が始まろうとしていた。リディルシールによれば、調査隊はそのために必要な新鉱石、ワクシング・アルカナイトを十分に掘り出しており、一度の強化につき三つあれば足りるらしい。もっとも、それを手に入れるには、例によってエルミナへ相応の代価を支払わなければならない。手に入れた鉱石は、下準備のためドドックリへ渡すことになる。</p><p>体内に満ちる乙太の高まりもあって、ゲロルトの気勢はいや増していた。ロウェナ商会の連中が、またしても貴重な鉱石へ真っ先に目をつけたことには悪態をつくが、それでもひとつだけ断言する。連中がどれほど島の資源を囲い込もうとも、あなたのファントムウェポンそのものに手を出すことはできないということだ。そうしてあなたは必要なワクシング・アルカナイトをそろえ、ドドックリへ託す。冶金師である彼もまた、乙太を帯びたゲロルトがどのような鍛造を見せるのか、強い興味を隠さなかった。</p><p>やがて作業が始まると、ゲロルトは抑えきれない高揚のまま槌を振るう。全身を駆け巡る力に酔うように笑い、自分がこれまでになく万全の状態にあることを疑わない。そして集められた力を武器の本質と調和させながら、彼は次なる段階を完成させる。そこで姿を現したのは、単なる改良品ではなく、古代技法の真価を宿した新たなかたち──ファントムウェポン・アンブラだった。完成を前にしたゲロルト自身でさえ、その出力の凄まじさには息をのむ。エーテルウェルが生み出す力は恐ろしいほどで、その余波がいまなお自分の内を巡っていると感じていた。</p><p>その成功を目の当たりにしたアーカイブは、満足げに今回の理を語り始める。高熱にさらされた周囲の乙太は風によってかき乱され、反応した状態で身体へ取り込まれる。そうして結びついた力は、水の作用で急速に冷まされながら肉体を離れ、やがて大地へ染み込み、浄化される。その循環が繰り返されることで、職人の内なる乙太は完全な均衡へ導かれるのだという。リディルシールは、それを妙に理屈っぽい蒸し風呂のようなものだと受け取り、ゲロルトはぶっきらぼうながらも、こうして古代の技法を学び取ること自体に大きな手応えを感じていた。借金も報酬も、ロウェナ商会への苛立ちさえも、いまは技を磨き、己の領分を広げていく喜びの前では色あせて見える。</p><p>そんな空気の中で、リディルシールはかつて彼が口にした曖昧な着想について問い返す。だがゲロルトは、結果が出たのだから細かいことはいいとばかりに、その追及を強引にはぐらかす。すると今度はアーカイブが、自分にも確かめたいことがあると言い出す。それは石棺の中で見つけたあの小さな包丁についてだった。あれは本当に武器ではないのかと、彼はなおも納得していない様子で問いかける。</p><p>疑いの目を向けられても、アーカイブはひるまない。古代ニームには、調理器具を用いて刺突技を極めた戦う料理人たちの系譜があったはずだと断言し、その由緒ある伝統をもって、自分の包丁もまた立派な武器であると主張する。だからこそ、その刃を完璧な鋭さに研ぎ上げても何の問題もないはずだと胸を張る。</p><p>しかし、その理屈に賛同する者はいない。リディルシールは、そんなものは芋や人参を刻むための包丁でしかないと一蹴し、ドドックリもまた、もしそれが事実だとしても歴史家の支持は得られまいと首をかしげる。ところが、そのばかばかしいやり取りの中で、ゲロルトはふいに別の着想を得る。遠征で出される味気ない食事にはもううんざりだと言い放ち、これからは海の恵みを存分に活かすべきだと決める。そして、そのためには巨大な海の獲物さえ見事にさばける、匠の手による包丁が必要になるのだと宣言する。</p><p>その話にアーカイブはたちまち乗り気になる。娯楽の乏しいこの島では、釣りこそ格好の気晴らしになると言い、さっそく竿を手に浜辺へ向かっていく。どれほど巨大な獲物を釣り上げられるのかと、すでに心は期待で満ちていた。ゲロルトはそんな彼を見送りながら、今度は武器ではなく、別の目的のためにその刃を研ぐことを引き受ける。そして自らは再び石板へ目を落とし、次なる職人の秘技を求めて思索を巡らせるのだった。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>クエスト発行</b> リディルセイル <small class="muted">(蜃気楼の町, X:6.6, Y:7.1)</small></div></div>`,
    unlockq:`<div class="stack"><div class="row"><a class="link" href="aether-aether-everywhere.html">属性の力秘めし魔道球</a></div><div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div></div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="timeworn-techniques.html">最適な技術を求めて</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'幻影武器強化',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>隨著乙太灌注的基礎終於穩固下來，Gerolt 也高聲表示，自己已經準備好再次挑戰那種近乎不可能的驚人創舉。這一次，不再只是替工具注入力量，也不是單純地讓鍛爐承載乙太，而是要把 phantom weapon 本身推向更高一層的強化。Lydirceil 告訴你，調查隊已經挖出了足夠數量的 waxing arcanite，而每一次強化只需要三塊。至於代價，自然還是得交到 Ermina 手上。等你把礦石弄到手後，再交給 Dodokkuli，後續的準備工作便能正式開始。</p><p>Gerolt 身上依舊殘留著那股被乙太灌滿後的亢奮。他對 Rowena’s House of Splendors 又一次搶先掌握珍貴礦石的做法照例滿腹牢騷，但即使如此，他還是明確地說了一句：不管那些人怎麼從島上的資源裡牟利，都別想碰你的 phantom weapon。於是你照著安排，取得所需的 waxing arcanite，並把它們交到 Dodokkuli 手中。這名冶金師接過礦石時，神情間同樣透著明顯的期待，顯然也很想親眼看看，在乙太充盈的狀態下，Gerolt 能把鍛造推到什麼地步。</p><p>真正動手之後，Gerolt 幾乎像是把全身翻騰的力量都直接灌進了鍛造裡。他放聲大笑，承認自己從未感覺如此無所不能，接著便將那股高度凝聚的多重屬性乙太，與武器本身的本質精準地調和在一起。當那道工序結束時，誕生的已不只是更進一步的成果，而是古老技法真正展現潛力的證明，Phantom Weapon Umbrae。就連 Gerolt 自己都不得不承認，那些 aetherwells 所輸出的力量強得近乎可怕，而那股能量直到此刻仍在他體內盤旋不散。</p><p>看到這番成果，Archive 顯然相當滿意，也順勢開始解釋這次技法背後更細緻的原理。受到高熱刺激的周遭乙太，會先在風的作用下被攪動，然後以活化的狀態進入肉體。接著，這股結合起來的力量又在水的影響下迅速冷卻，並離開身體，滲入大地之中，在那裡被淨化。這個循環不斷重複之後，工匠體內的乙太也就能達到完美和諧。Lydirceil 聽完，只覺得這像是一種帶有乙太原理的熱蒸氣浴；而 Gerolt 雖然嘴硬，卻也坦率承認，學習這些冷僻又古老的技法，確實有種說不出的充實感。到了這一刻，他甚至覺得，自己欠下的鉅額債務也好、該拿多少 gil 也好，都已經沒那麼重要了。如今真正讓他在意的，只剩繼續磨練技藝，讓自己能做到更多以前做不到的事。</p><p>就在這時，Lydirceil 又提起 Gerolt 先前那個始終語焉不詳的「模糊構想」，想追問他當初到底在盤算什麼。Gerolt 卻立刻把話擋了回去，只說反正計畫已經順利完成，其他細節根本不重要。可話題還來不及真正收束，Archive 就忽然插進來，說自己還有一件事想再確認一次，那把在石棺裡找到的小刀，真的不能算是武器嗎？</p><p>就算你對此表示懷疑，Archive 仍是一副信心十足的模樣。他聲稱，古代 Nym 曾經存在一脈驕傲的「戰鬥料理人」，他們只靠廚房用具便發展出各種刺擊技法。既然有這樣無可辯駁的先例，那麼他手上的那把刀，理所當然也該被視為真正的武器，並值得被磨到足以致命的完美鋒利。這套說法顯然沒能說服任何人。Lydirceil 當場否定，強調那把破小刀頂多就是拿來切 popoto 和紅蘿蔔的；Dodokkuli 也遲疑地表示，這樣的說法恐怕很難在歷史學者之間站得住腳。</p><p>然而，就在這場荒唐的爭論裡，Gerolt 卻突然像是抓到了另一個新念頭。他厭煩了遠征隊一直端上來的那些乏味食物，乾脆決定，既然身處海邊，就該好好利用海中的豐富收穫。而若真要做到這一點，就需要一把足以俐落片開巨大海獸的精工好刀。Archive 一聽便立刻興致高昂起來，表示在這座娛樂匱乏的島上，釣魚倒確實是個再合適不過的消遣。於是他拿起釣竿，滿心期待地往海岸邊走去，迫不及待想看看自己能釣上多麼巨大的獵物。至於 Gerolt，則答應在替他磨刀的同時，繼續翻查那塊石板，為自己的下一項工藝成果尋找靈感。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,

    followq:`<div class="stack"><div class="row"><a class="link" href="timeworn-techniques.html">尋覓最合適的古老技法</a></div></div>`

};

  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle.replace(/&#39;/g,"'");
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
      repo: 'BELAUG-FFXIV/FFXIV_Library',
      repoId: 'R_kgDOPyh4Kw',
      category: 'General',
      categoryId: 'DIC_kwDOPyh4K84CwPjL',
      theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
