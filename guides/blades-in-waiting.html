  <style>
    :root { --bg:#fff8e6; --card:#ffffff; --fg:#222; --muted:#666; --border:#e5e1d8; --accent:#e11d48; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .container{max-width:1080px;margin:0 auto;padding:0 16px}
    .site-header{border-bottom:1px solid var(--border);background:#fff9edb3;backdrop-filter:saturate(120%) blur(6px);position:sticky;top:0;z-index:10}

<script>
const LANG_KEY = 'ffxiv-guide-lang';
const i18n = {
  EN:{
    langLabel:'EN',
    pageTitle:`Blades in Waiting`,
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true"><p>You regroup once more, and the talk turns immediately to the aftermath: those who wore the neo regulators will need treatment. Alisaie steels herself to help the enthralled, while Y’shtola counts the scale of what awaits—no fewer than five thousand patients—and admits that even with trained mages, recovery could take a long while. Still, she calls it the best-case outcome: the very idea of removing a primal’s influence was unthinkable not so long ago.</p><p>Krile and G’raha Tia volunteer to brief the officials on what to expect, even if explaining primal summoning “clearly and concisely” is a skill G’raha Tia is still honing. Krile suggests you remain close to Sphene a little longer, and points her toward Mahuwsa—someone who saw her off before the clash with Calyx, and would be relieved to know she is safe.</p><p>At Yyupye’s Halo, you find Mahuwsa in the fields. She reports that the neo regulator crowd began acting strangely all at once, and that Pepoane—one of her friends—has been taken to a medical facility. Alisaie assures her that with proper treatment, everyone will return to themselves, and Mahuwsa’s anger at the “Queen Sphene” impostor gives way to gratitude: despite the danger, you stopped the cruelty that preyed upon people’s fear. Sphene’s broadcast, she says, was hope—hers, and everyone’s.</p><p>Mahuwsa must return to work, but Sphene asks if she can help heal the enthralled. Alisaie answers that she can, and Y’shtola seizes the moment: gather other arcane practitioners and teach them how to use the porxies—knowledge that will also help with levin sickness. Sphene resolves to petition Gossan to spread the word. Then Alisaie, trusting the treatment efforts can be organized, asks you for something else: check on Gulool Ja, who has been racing around the kingdom trying to solve every problem himself.</p><p>You track the trail through the Driftdowns, where Taapu confirms Gulool Ja was there—exhausted, but stubbornly helpful—and then ran off toward the ruins of old Alexandria. When you finally find him with Erenville, Gulool Ja’s bravado cracks: you fought so bravely, he says, and he was useless—too weak to save more lives, even with a king’s authority. You answer him, and Erenville reminds him that everyone starts somewhere.</p><p>Gulool Ja then shows you what he has chosen to do next: his father’s sword and Otis’s swords. He will train under a soldier and become a swordsman—not because he has already decided what kind of king he will be, but because he wants the strength to protect the people he loves. For now, he will take things one step at a time, even if that means starting with what he knows—cooking the meals Otis taught him, keeping everyone fed—before you all return to the Backroom to report in.</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> Sphene <small class="muted">(Heritage Found, X:18.5, Y:11.5)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="a-terminal-invitation.html">A Terminal Invitation</a></div>
      <div class="row">Any Disciple of War or Magic (excluding limited jobs) Lv. 100</div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-promise-of-tomorrow.html">The Promise of Tomorrow</a></div></div>`
  },
  JP:{
    langLabel:'JP',
    pageTitle:'ふたりの剣',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true"><p>一同は再び集まり、すぐに「これから」の話になる。装置を身につけていた者たちは治療が必要で、仲間は“影響を受けた人々”の対応に向けて気を引き締める。別の仲間は、少なくとも五千人規模になると見立て、訓練を積んだ術者が揃っていても更生には長い時間がかかり得ると語る。それでも、超常の影響を祓えるという事実自体が、少し前までは考えられなかった「最良に近い結末」なのだと。</p><p>君のそばでは、事情を知らない人々へ説明する役目を買って出る者たちがいる。召喚の理屈を、簡潔に、分かりやすく伝えることはいつだって難しい――それでも、組織の名を背負う以上、磨かなければならない技だと自戒する。もう一人は、君がしばらく同行した方が安心だろうと促し、ある畑で働く友人のもとへ向かう提案をする。</p><p>畑で君たちを迎えた彼女は、装置を持つ者たちが同時に奇妙な振る舞いを始めたと告げる。仲間の一人は医療施設で保護されているという。君たちは、適切な処置があれば元に戻れると伝え、彼女は「人の不安に付け込む偽物」への憤りを滲ませながらも、君たちが危険を承知で止めたことに礼を述べる。君たちの放送が、皆にとって希望だったのだと。</p><p>彼女は仕事へ戻らねばならないが、君たちは「治療に力を貸したい」という申し出を受け取る。仲間はその力を必要としていると言い、別の仲間はここを好機と見る。周囲の術者を集め、治療に役立つ手段を教える――それは別の雷由来の病にも応用できる、と。君たちはその準備を進めるため、周知を頼みに動くことを決める。</p><p>そして君は、別の頼みも受ける。王子が国中を駆け回り、目に入る問題を片端から自分で解決しようとしているらしいのだ。君は手がかりを求めて集落を訪ね、彼が疲れ切っていたこと、そして古い遺跡の方へ向かったことを聞く。やがて君は彼を見つけ、彼の胸の内を聞くことになる。</p><p>彼は自分の無力さを責め、もっと強ければ救えた命があったのではないかと震える。君は言葉を返し、傍らの仲間も「誰もがそこから始まる」と支える。すると彼は、父と恩人の剣を示し、兵士に師事して剣を学ぶ決意を語る。守りたい人がいるから強くなりたい――その道を選ぶのだと。君たちは彼の一歩を見届け、報告のために拠点へ戻っていく。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> スフェーン <small class="muted">(ヘリテージファウンド, X:18.5, Y:11.5)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="a-terminal-invitation.html">約束のとき</a></div>
      <div class="row">ファイター ソーサラー (リミテッドジョブを除く) Lv 100</div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-promise-of-tomorrow.html">明日への道標</a></div></div>`
  },
  ZH:{
    langLabel:'ZH',
    pageTitle:'等待出鞘的雙劍',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true"><p>你們再次集合，話題立刻落到善後：配戴新型調節器（neo regulator／用來登記並轉化為 Endless 的裝置）的人都需要處置。Alisaie 表示她會去協助治療那些受到 primal 影響的人（the enthralled／心智被其影響而受束縛者），而 Y’shtola 直接點出規模——至少五千名患者；就算有大批受訓的法師，也可能要「好幾個月球」才能逐步復原。即便如此，這仍是相對最好的結果：能夠把 primal 的影響祓除這件事，在不久之前根本難以想像。</p><p>Krile 和 G’raha Tia 主動表示要去向官員說明接下來會發生什麼；G’raha Tia 也苦笑說，要把 primal 召喚講得清楚又精簡，對他一直都不容易，但既然要維持 Students of Baldesion 的名聲，就得把這項能力磨練起來。Krile 則建議你先留在 Sphene 身邊一會兒，並提議她去找 Mahuwsa——她就在不遠處的 Yyupye’s Halo 務農，而且也是在你們與 Calyx 決戰前來送行的人之一，知道 Sphene 平安無事一定會很高興。</p><p>來到 Yyupye’s Halo，你們見到 Mahuwsa。她說郊區並沒有發生什麼可怕的事，但配戴新型調節器的人確實在同一時間開始變得不對勁；Pepoane 也是其中之一，現在由當局安排在醫療設施照護。Alisaie 立刻安撫她：只要接受正確治療，大家很快就能恢復正常。</p><p>Mahuwsa 既憤怒也慶幸——她聽說那位試圖引誘人們成為 Endless 的「Queen Sphene」其實是冒牌貨，簡直是利用恐懼下手的冷血惡人；而你們明明自身也置身危險，仍把事情制止下來。她說你們讓大家得以活著，而只要還能呼吸，未來就該由活著的人自己決定；Sphene 的放送對她、對所有人而言，都是希望。</p><p>Mahuwsa 得回去撐住日常運作，但 Sphene 也立刻問：她能不能幫忙治療那些受到影響的人？Alisaie 回答「能，而且很需要」，Y’shtola 則趁勢提出：這是召集其他奧術使用者的好機會，並教大家如何操作治療用的使役獸（porxies／用於治療與安撫的魔法人偶）。這份知識也能用在處理落雷病（le﻿vin sickness／雷屬性乙太失衡引起的病症）上。Sphene 當即表示要去請 Gossan 協助擴散消息。</p><p>接著 Alisaie 轉而拜託你另一件事：去看看 Gulool Ja。據 Shale 所說，他在王國各地奔走，像是想親手解決每一個問題；最後一次的消息，他在 The Driftdowns 一帶幫 Erenville 的忙。你找到 Taapu，她說 Gulool Ja 確實來過，疲憊得很，她勸他先休息，但他還是往舊 Alexandria 的遺跡方向跑去。</p><p>你終於在外頭與 Erenville 會合，也見到 Gulool Ja。聽完戰況後，他的情緒潰堤——你們都那麼勇敢，而他卻什麼也做不到；就算握有王的權威，仍覺得自己太弱，若他更強，或許就能救下更多人。你回應他，Erenville 也提醒他：每個人都是從「還不夠強」開始的。</p><p>Gulool Ja 接著拿出他想讓你看到的東西：他父親的劍，以及 Otis 的劍。他說自己已決定要向 Landsguard 的士兵受訓（Landsguard／守備軍體系的正規兵），成為劍士；他還不確定自己將來要不要成為「決意之王」（King of Resolve），但他想強到足以保護自己所愛的人。於是他選擇一步一步來——先把 Otis 教他的料理做起來、讓大家吃飽，然後再回到 Backroom，去和 Shale 等人打聲招呼、把情況接上下一段路。</p></div><div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack"><div class="row"><b>Quest Giver</b> 斯菲恩 <small class="muted">(Heritage Found, X:18.5, Y:11.5)</small></div></div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="a-terminal-invitation.html">誓約之時</a></div>
      <div class="row">任一戰鬥／魔法職（不含限制職業）Lv.100</div>
    </div>`,
    followq:`<div class="stack"><div class="row"><a class="link" href="the-promise-of-tomorrow.html">明日的誓約</a></div></div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
</body>
