    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>At the Drowning Wench, Baderon thanks you for taking the time to help before getting straight to the point: word has it that some suspicious-looking types have been slipping in and out of the Sastasha Seagrot, up north of Aleport. After the recent trouble in Swiftperch and the unwelcome visit from the fishbacks’ pet pirates, the people of Limsa Lominsa are on edge—so much so that every creak of the floorboards sets them jumping. Baderon wants a trustworthy adventurer to find out who these men are and what they’re up to, but before he can say more, Commodore Reyner of the Yellowjackets arrives and offers to elaborate. Reyner explains that, in the past moon, an unfamiliar vessel has been sighted off the coast near the Isles of Umbra, not long after his men completed a patrol of the region, Sastasha included. That patrol found nothing more than a family of coeurls in the caves, but in light of the new reports, he deems it prudent to search the Seagrot again—yet with Sahagin testing Limsa’s defenses daily, he cannot spare the forces. Thus he turns to you, formally asking for your aid and directing you to seek out V’mellpa at the lower decks’ ferry docks for instructions on how to reach Sastasha in western La Noscea.</p>
      <p>At the Lominsan ferry docks, V’mellpa recognizes you as the adventurer sent to aid Commodore Reyner’s investigation and tells you to board a ferry bound for Aleport. Once you arrive in western La Noscea, however, she strongly advises that you first visit the Hall of the Novice, a training facility run by the Adventurers’ Guild, before blundering into Sastasha unprepared. There, seasoned adventurers will drill you in the fundamentals and teach you the skills needed to face whatever awaits in the Seagrot. She explains that the Hall lies just north of Aleport on the road to Sastasha, and urges you to stop by and let one of their veterans take you in hand. With a final warning to be ready for pirates—this is Limsa Lominsa, after all—she sends you on your way.</p>
      <p>At the Hall of the Novice in Skull Valley, a seasoned adventurer greets you as the one the Yellowjackets mentioned and remarks that you mean to brave the depths of the Sastasha Seagrot. He notes that the creatures infesting those caves are rumored to be as numerous as they are bloodthirsty, and that contrary to the tales, walking into such a den alone would be sheer folly. You will need companions, he says, and more importantly, proper training in how to fight as a party. The Hall exists for exactly this purpose, and he strongly recommends that you study the basics of group combat before continuing your mission. Pointing you toward the Smith, who oversees the training schedules and prepares exercises tailored to each discipline, he instructs you to return only when you have mastered what the Hall’s mentors can teach, then head north once more and report to the Yellowjacket scout posted at the mouth of Sastasha for the details of your duty.</p>
      <p>When you finally arrive at the entrance to Sastasha, you come upon another party of adventurers in the midst of a quarrel. Avere berates their healer, Edda, for arriving late and bringing only two potions despite his instructions, sneering that she is scarcely more useful than the contents of her coinpurse and that they cannot hope to take on “big jobs” and big rewards if she cannot even procure their supplies. Spotting you, he recognizes you as the one Baderon had spoken to and declares that they will see who wins the glory, insisting that the job should have been theirs in the first place. Liavinne mocks Edda’s slowness, while Paiyo Reiyo naively convinces himself that wandering through a few caves and turning over rocks is the perfect, easy first outing for their new party. Nearby, Alianne and her grandfather Isildaure share their own outlook: they travel wherever the wind takes them, savoring hidden places and sights few will ever see, and insist that it is the unquenchable thirst for the unknown—not riches or fame—that drives adventurers into the wilds again and again. Only then do you speak with the Yellowjacket scout, who begs you not to be just another wanderer out for a stroll and outlines the situation: an unfamiliar ship has been seen slipping around the Isles of Umbra, and men of questionable character have been observed entering and leaving Sastasha. Fearing they may be Serpent Reavers in league with the fishbacks, and mindful that the kidnappings are still fresh in people’s minds, he asks you to delve into the caves and learn exactly who you are dealing with while he keeps watch outside, praying you do not encounter any blue face tattoos. With that, Sastasha is added to your list of duties, and the Seagrot is now accessible via the Duty Finder.</p>
      <p>Later, back at the Drowning Wench, you find that the request to investigate Sastasha has already been marked as completed. Baderon tells another group of adventurers that the ship has “sailed,” only for their leader, Dolorous Bear, to arrive and realize that the task has been finished by someone else—you. Though disappointed that they dragged their boots too long, he and his companions resolve that the wheel will turn and their own chance will come. Dolorous Bear explains that their aim is to perform deeds so heroic they will be sung in every alehouse in Eorzea, a legend to inspire adventurers yet unborn, and asks if you, too, have a star to reach for. Goals, he says, sustain one through hardship, just as arms and armor protect the body in battle, and he wishes you fortune before departing. When you report in, Baderon is relieved to see you whole and hears how the fishbacks and their Serpent Reaver lackeys had set up a base almost on Limsa’s doorstep. Though shocked that things escalated beyond mere pirates, he is satisfied that you left them in pieces and foiled whatever mischief they had planned, thanking you on behalf of Limsa for shedding light on the mystery and for living up to your reputation. Only then does he mention a new request from the Adventurers’ Guild in Gridania: the forest folk need an adventurer who can get things done. The task will be no carefree stroll through a sunny glade, he warns, but after how you handled the Sastasha affair, he doubts there is anything you cannot manage, and invites you to speak with him again when you are ready to hear the details.</p>
    </div>

    langLabel:'日本語',

    story:`<div class="clamp" data-collapsed="true">
      <p>リムサ・ロミンサの酒場「溺れた海豚亭」で、バデロンは手伝いに来たことへの礼を述べると、さっそく本題を切り出す。エールポート北方にある「サスタシャ浸食洞」に、不審な連中が出入りしているとの噂が立っているというのだ。最近スウィフトパーチ入植地で起きた騒ぎや、サハギン族の手先である海賊たちの襲撃もあって、市民は神経質になっており、床板がきしむたびに腰を抜かしそうな有様だ。そんな折、信頼できる冒険者に正体を確かめてもらいたいと話しているところに、イエロージャケット司令のレイナーが現れ、事情を補足しようと申し出る。レイナーは、ここ一月ほどの間に、ウンブラス群島近海で見慣れぬ船が何度も目撃されていることを説明する。サスタシャ浸食洞を含む周辺地域は、つい先日も部下が巡回したばかりで、その際は洞窟内にクァールの家族が棲みついていること以外、特に問題は見つからなかった。しかし新たな情報を踏まえれば、再調査するのが賢明だと判断している。ただし、サハギン族が日々防衛線を揺さぶってくる状況では、兵力を割く余裕がない。そこで彼は正式にあなたの協力を求め、西ラノシアにあるサスタシャへの行き方については、下甲板層のフェリードックにいるヴメルパから聞くよう指示する。</p>
      <p>ロミンサのフェリードックで、ヴメルパはあなたがレイナー司令の捜査を手伝う冒険者だと知ると、まずはエールポート行きのフェリーに乗るよう勧める。ただし、西ラノシアに着いたら、いきなりサスタシャに突入するのではなく、冒険者ギルドが運営する初心者向け訓練施設「若葉の集う園」を必ず訪れるべきだと念を押す。そこで熟練の冒険者たちが、サスタシャ浸食洞で待ち受ける危険に立ち向かうための基礎を叩き込んでくれるのだという。施設はエールポートの北、サスタシャへ向かう道中にあり、中に入ればベテランの誰かが丁寧に面倒を見てくれるはずだと教えてくれる。最後に、ここはリムサ・ロミンサなのだから、いつ海賊と遭遇してもおかしくないと釘を刺しつつ、あなたを見送る。</p>
      <p>西ラノシアの「若葉の集う園」では、ひとりのベテラン冒険者が、イエロージャケットから話を聞いていると声をかけてくる。あなたが挑もうとしている「サスタシャ浸食洞」は、獰猛な魔物たちがひしめく洞窟であり、英雄譚のようにひとりで気楽に踏み込める場所ではないと彼は語る。そこを攻略するには仲間が必要であり、何よりもまず、パーティとして戦う術を学ばねばならない。まさしくそのためにこの施設が存在しているのだと強調し、任務に向かう前に、ここでしっかりと集団戦の基礎を身につけるよう強く勧める。訓練の管理は「スミス」と呼ばれる指導役が担っており、それぞれのクラスに合わせた課題を用意していると教えられる。すべての訓練を修了し、教えを自分のものとしたなら、再び北へ向かい、サスタシャ浸食洞の入口に待機しているイエロージャケットの斥候に報告するよう指示される。そこで、具体的な任務の内容が伝えられるのだ。</p>
      <p>やがてサスタシャ浸食洞の入口にたどり着くと、別の冒険者パーティが口論している場面に出くわす。リーダー格のアヴェールが、遅れてきた幻術士エッダを叱責し、渡した金ではポーションが二つしか買えなかったという言い訳を一蹴して、これでは役立たず同然だと罵る。自分たちは大きな依頼をこなし、大きな報酬を得るために冒険者になったのに、準備ひとつ満足に整えられないのでは話にならない、と苛立ちを露わにするのだ。やがて彼はあなたに気づき、バデロンと話していた冒険者だと悟ると、この仕事の栄誉を手にするのがどちらか見ものだと宣言し、本来は自分たちが請け負うべき仕事だったと悔しさを滲ませる。リアヴィヌはエッダの鈍さを笑い飛ばし、パイヨ・レイヨは、洞窟を少し歩き回って岩をひっくり返す程度の簡単な初仕事だと楽観的に語る。近くでは、アリアンヌと祖父イスルダイユが、風の向くまま気の向くまま旅を続け、誰も知らない景色や音に出会う自由こそ冒険者の喜びだと語り合っている。彼らにとって、富や名声の獲得は目的ではなく、未知への渇きこそが、何度でも荒野へ足を向けさせる原動力なのだという。最後に、イエロージャケットの斥候があなたに声をかける。彼は、ただの散歩客ではなく任務で来たのだと知って安堵し、ウンブラス群島近海で目撃された不審な船と、ここサスタシャへの出入りが確認されている「素行の怪しい男たち」の話を聞かせる。もし彼らが、サハギン族と通じる「海蛇の舌」の一味であれば、人攫いの記憶がまだ生々しい民衆の間に、再び大きな不安が広がるのは避けられない。そこで彼は、自分は入口で見張りを続けるので、あなたに洞窟の奥を調査し、正体を突き止めてほしいと頼むのだった。こうして、新たな討伐任務として「サスタシャ浸食洞」が開放される。</p>
      <p>後日、再び「溺れた海豚亭」に戻ると、サスタシャ浸食洞調査の依頼はすでに完了扱いになっていた。バデロンがそう告げると、そこへ別の冒険者一行のリーダーであるドールラス・ベアーが現れ、自分たちが受けようとしていた仕事がすでに果たされたと悟る。彼は、すでに船は出てしまったようなものだと悔しがりながらも、仲間の言葉にうなずき、いずれ自分たちにも機会が巡ってくると気持ちを切り替える。そして、自分たちの目標は、エオルゼア中の酒場で歌われるほどの武勇を示し、まだ見ぬ冒険者たちを奮い立たせる伝説を残すことだと語りかける。大きくても小さくてもかまわないが、あなたにも目指す星があるかと問い、目標は困難な時に心を支える鎧や武器のようなものだと説いたうえで、あなたの旅路に幸運あれと告げて去っていく。その後、報告を受けたバデロンは、手足がそろって戻ってきたことに安堵しつつ、サハギン族と「海蛇の舌」の連中が、いつの間にかリムサの目と鼻の先に根城を構えていたことに驚きを隠せない。しかし、あなたが彼らを打ち破り、企みを未然に防いだと聞いて胸を撫で下ろし、この一件の真相を明らかにしてくれたこと、そして評判どおりの働きを見せてくれたことに、リムサ・ロミンサを代表して礼を述べる。ひと息つきたいだろうと気遣いながらも、実はグリダニアの冒険者ギルドから新たな依頼が届いていると打ち明ける。森の民が助力を求めており、その内容は陽だまりの散歩のように気楽なものではないだろうと前置きしつつ、サスタシャの件を見れば、あなたなら十分にやり遂げられるはずだと信頼を示す。準備ができたら声をかけるよう促し、次なる仕事の説明を約束するのだった。</p>
    </div>

    story:`<div class="clamp" data-collapsed="true">
      <p>在 Limsa Lominsa 的酒館 The Drowning Wench 裡，Baderon 先感謝你願意抽空幫忙，接著開門見山地說明情況：聽說在 Aleport 北方的 Sastasha Seagrot，有幾個形跡可疑的傢伙經常進出。自從 Swiftperch 發生那起不愉快的事件，又遭到 fishbacks 飼養的海盜來訪之後，城裡的居民人心惶惶，地板一吱呀就恨不得嚇得屁股坐在地上。Baderon 想找一位值得信賴的冒險者去查清這群人的身分與目的，正說到一半，Yellowjacket 的司令 Reyner 來到酒館，主動表示要補充情報。Reyner 說，在過去一個月裡，有人在 Aleport 外海、Umbra 群島一帶，多次目擊到一艘陌生船隻，而這消息傳到他耳中，是在部下剛完成該地區例行巡邏後不久——那次巡邏包括了 Sastasha Seagrot，在洞窟裡除了有一戶 coeurl 家族落腳之外，並未發現值得在意的異狀。不過在新的目擊報告出現之後，他判斷有必要再調查一次。然而，由於 Sahagin 幾乎天天在試探 Limsa 的防線，他實在抽不出多餘兵力，只好轉而尋求冒險者的協助。於是，他正式拜託你代為調查，並要你前往下層甲板的渡口，向 V’mellpa 打聽前往西 La Noscea、Sastasha 的路線。</p>
      <p>在 Limsa Lominsa 下層甲板的渡口，V’mellpa 聽說你是來支援 Reyner 司令調查的冒險者後，先告訴你搭上開往 Aleport 的渡船。但她同時鄭重提醒，一旦抵達西 La Noscea，可別一股腦兒就衝進 Sastasha，而是應該先去一趟由 Adventurers’ Guild 經營的訓練設施 Hall of the Novice。那裡有經驗豐富的冒險者，會教你在 Sastasha Seagrot 裡生存所需的各種基本技巧。她說這座訓練場就在前往 Sastasha 的路上、Aleport 北邊不遠的地方，只要走進去，就會有資深的冒險者親自帶你演練。最後，她提醒你這裡畢竟是 Limsa Lominsa，永遠不缺海盜，叫你務必要有心理準備，然後目送你踏上前往西 La Noscea 的旅程。</p>
      <p>來到西 La Noscea 的 Hall of the Novice──若葉の集う園──時，一位 seasoned adventurer 上前打招呼，說 Yellowjacket 已經事先提過你的事情，並確認你即將挑戰 Sastasha Seagrot 的深處。他描述那些洞窟裡的棲息者既多又兇狠，和傳聞中那種「單槍匹馬衝進怪物巢穴、一舉成名」的英雄故事完全不同，若獨自闖入簡直是把命拿去送。他強調，你不只需要同伴，更需要學會如何以隊伍的形式戰鬥，這也正是 Hall of the Novice 存在的理由。他強烈建議你在繼續任務之前，先在這裡徹底學好團隊戰的基礎。訓練是由被稱為 The Smith 的教官負責安排，會依照不同的職業準備對應的課程。等到你完成所有訓練，把這些教導真正內化之後，再往北前進，到 Sastasha Seagrot 洞口前找 Yellowjacket 的斥候報到，從他那裡接下具體的任務內容。</p>
      <p>等你終於抵達 Sastasha Seagrot 的入口時，正好看見另一隊冒險者正在爭吵。隊長 Avere 怒罵晚到的治療師 Edda，只買回兩瓶 potion 完全不夠用，嘲諷她除了口袋裡的東西之外一點用處也沒有，連補給都準備不好，要怎麼去接「大委託」、拿「大報酬」。他說到一半注意到你，認出你正是先前在 Baderon 身邊的冒險者，便放話說要比比看究竟誰能搶下這份工作的榮耀，還不滿地說這委託本來就應該是他們的。Liavinne 在一旁哈哈大笑，說 Edda 慢吞吞的腳步大概連樹蛞蝓都比不過；Paiyo Reiyo 則一派天真地說，這次正適合作為他們小隊的首次出動，只要在洞窟裡走走、翻翻石頭，聽起來哪有那麼困難。附近的 Alianne 跟她的祖父 Isildaure 則分享著他們自己的冒險觀：兩人一路做為旅伴同行，隨風而行，到處品味只有冒險者才能看見的景色與聲音。對他們來說，旅程並不以金錢或名聲畫下句點，而是不斷對未知世界的渴望，一次又一次把他們推向荒野。這些對話告一段落後，你終於走向 Yellowjacket 的斥候。他一開始還擔心你只是路過散步，得知你是奉命前來才大大鬆了一口氣，接著說明目前掌握到的情報：自從那艘陌生船隻在 Umbra 群島一帶被目擊之後，就有人看到素行可疑的男人們進出 Sastasha。如果那些人真的是和 fishbacks 勾結的 Serpent Reavers，那麼在居民心中留下陰影的人口綁架事件，勢必又會再次掀起恐慌。因此，他請你深入洞窟查清對方的真實身分與企圖，而他則留在入口戒備，一邊祈禱你別在裡面撞見任何帶著藍色臉部刺青的傢伙。隨著這番說明結束，Sastasha 也被登錄進 Duty Finder，成為你現在可以挑戰的 regular duty。</p>
      <p>之後，你再度回到 The Drowning Wench 時，發現負責調查 Sastasha 的委託已經被標記為完成。Baderon 對前來詢問的另一組冒險者說，那艘船早就「開走了」，這時他們的領隊 Dolorous Bear 出現，得知自己想接的工作已經被你搶先完成，難免感到可惜，說自己這回腳步拖得太慢。不過，在同伴的話提醒之下，他也很快打起精神，表示命運之輪終究會轉動，遲早會輪到他們立功的時候。Dolorous Bear 說，他們的目標，是完成足以讓 Eorzea 各地酒館都為之歌頌的偉業，留下能激勵未來冒險者追隨腳步的傳奇。然後，他問你是否也有類似的目標──不論大小，只要有一顆可以追尋的星，人在艱難時就能伸手夠得更高。他將這些志向比擬為心靈的武器與盔甲，能在困境中支撐你走下去，說完便祝福你的旅程順利，帶著同伴離開。輪到你向 Baderon 報告時，他看到你毫髮無傷地回來，先是鬆了一口氣，接著聽完你如何將 fishbacks 以及他們的 Serpent Reaver 走狗打得四分五裂、讓對方再也無法在 Limsa Lominsa 家門口設立據點。雖然他對事情發展到這種程度感到驚訝，但得知你已經徹底粉碎他們的陰謀，也放下心來，代表 Limsa 向你致謝，說你果然沒有辜負自己的名聲。等這件事告一段落，他才提起一封來自 Gridania 冒險者公會的新請求：森裡的居民遇上麻煩，需要一位做事確實的冒險者協助。他提醒你，既然會特地這樣求援，就不可能是什麼在陽光林間散步的輕鬆差事，但在見識過你處理 Sastasha 事件的手腕之後，他並不覺得有什麼難倒得了你。Baderon 要你先好好休息，等準備妥當再來找他，他會再詳細說明下一份工作的內容。</p>
    </div>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

/* === Giscus：Comments 分頁 === */
const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
