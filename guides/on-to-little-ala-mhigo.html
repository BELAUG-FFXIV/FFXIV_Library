<script>
const i18n = {
  EN:{
    langLabel:'English',
    pageTitle:'On to Little Ala Mhigo',
    tabs:{ story:'Story', acq:'Acquisition', unlockq:'Unlock Quest', followq:'Follow-Up Quest', comments:'Comments' },
    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
      <p>Back at Highbridge, Hihibaru speaks as though the path has finally revealed its next turn. The Ala Mhigan bandit you crossed paths with, he insists, was no random attacker—somehow, they were connected to your masked man of mystery. If you want to pick up the trail again, then the direction is obvious: head south, to Little Ala Mhigo in Southern Thanalan, where Ala Mhigan refugees have gathered.</p>
      <p>He tries to prepare you for what you will find. Little Ala Mhigo, he says, has become the favored destination for those refugees who couldn’t—who couldn’t adapt to life in Ul’dah. The place has a reputation for hard hearts and harsher rules, as barren as the wasteland around it, and for all intents and purposes it’s lawless. You shouldn’t expect a warm welcome. Not from people who have learned to survive by mistrusting anyone who isn’t already one of them.</p>
      <p>Yet Hihibaru cannot help adding something personal before you go. He has a daughter—Hihira—who has “relocated” to Little Ala Mhigo. He doesn’t know how much she can help your search, but it costs nothing to seek her out first, and while you have her attention, he asks you to pass along his love. Not a day goes by, he admits, that he doesn’t think of her. The request lands quietly, stripped of salesmanship, as if he’s letting you see the part of him that isn’t trying to survive a failing stall.</p>
      <p>He forces a brighter note at the end, pretending to be cheerful about your departure. He had hoped you would linger—buy a little, cull a few fiends, keep Highbridge alive in small ways—but something tells him you are destined for greater things. Wherever you end up, he says, he wishes you the best. Then you’re on your way, leaving the bridge behind and following the thread of Ala Mhigo deeper into the dust of Southern Thanalan, toward Broken Water and the settlement ahead.</p>
      <p>When you find Hihira, she studies you with wary eyes until you mention Hihibaru. Yes, she says, he is her father—then she asks what he told you, and the question carries more weight than it should. When you pass along his message, she exhales and looks away, voice softening into regret. She wishes she could be a better daughter, she confesses, but stops herself before the words spill any further, apologizing for burdening you with family matters. Still, she thanks you for bringing his love across the distance, and then steadies herself, asking what brings you to Little Ala Mhigo.</p>
      <p>When you describe the masked man, she can only shake her head—nothing about it rings a bell. But she doesn’t dismiss you. Someone else here may have seen something, she says, and if you want answers, you should start with Gundobald, the settlement’s leader. She warns you outright that he isn’t accommodating to outsiders, and the way she says it makes it sound less like a personality flaw and more like the rule that keeps this place standing.</p>
      <p>That truth greets you the moment Gundobald faces you. He demands your name and your business, and he demands it quickly. When you explain you’re looking for a masked villain, he doesn’t even bother hiding his contempt—why should they help you? They struggle enough without answering the whims of every outsider who wanders in with questions. Little Ala Mhigo offers you no courtesy, no patience, and no invitation. You are not welcome here, he says. Begone.</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>Quest Giver</b> Hihibaru <small class="muted">Eastern Thanalan (X:20.2, Y:21.3)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="where-there-is-smoke.html">Where There Is Smoke</a></div>
      <div class="row">All classes and jobs (excluding limited jobs) (Level 25 or above)</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="tea-for-three.html">Tea for Three</a></div>
    </div>`
  },
  JP:{
    langLabel:'日本語',
    pageTitle:'リトルアラミゴへの旅路',
    tabs:{ story:'ストーリー', acq:'入手方法', unlockq:'開放クエスト', followq:'後続クエスト', comments:'コメント' },
    readMore:'全文を表示', readLess:'折りたたむ',
    story:`<div class="clamp" data-collapsed="true">
      <p>ハイブリッジでヒヒバルは、あなたが遭遇したアラミゴの賊が、例の仮面の男と何らかの繋がりを持っているのだと言い切る。ならば足跡を追い直すなら、向かう先はひとつ――南ザナラーンの「リトルアラミゴ」だ。アラミゴの難民が集まり、身を寄せ合って暮らしている場所だという。</p>
      <p>彼は、そこで何が待っているかも先に告げる。リトルアラミゴは、ウルダハでの暮らしに馴染めなかった難民たちが流れ着く先であり、住人の心は周囲の荒野と同じくらい乾いていると噂されている。建前上は集落でも、実際は無法地帯に近い――だから温かい歓迎など期待するな、と。外から来た者を信じないことが、生き延びるための条件になっているのだ。</p>
      <p>けれどもヒヒバルは、送り出す前に私事を挟まずにはいられなかった。彼にはヒヒラという娘がいて、今は「リトルアラミゴ」に身を置いているという。どれほど助けになるかは分からないが、まず彼女を訪ねるのは損ではない――そして会えたなら、自分の愛情を伝えてほしいと頼む。彼は、彼女のことを思わない日は一日もないのだと、売り文句のない声で告げる。最後に彼は、あなたにここで少しでも長く留まってほしかったと名残を見せながらも、あなたはもっと大きな運命へ向かうのだろうと口にし、行く先での無事を祈って見送った。</p>
      <p>あなたは南ザナラーンへ向かい、ブロークンウォーターの地にある「リトルアラミゴ」へ辿り着く。ヒヒラを見つけて父の名を告げると、彼女は警戒を解ききれないまま頷き、父が何を言ったのかと尋ねる。あなたが愛情の言葉を伝えると、彼女は小さく息をつき、視線を落とす。もっと良い娘でありたいのに、と漏らしかけて、すぐに家族の話を持ち出してしまったことを詫びる――それでも、伝言を届けてくれたことには感謝を示し、改めてあなたの目的を聞き返す。</p>
      <p>仮面の男の話をすると、彼女は心当たりがないと首を振る。だが、集落の誰かが見ているかもしれないとして、まずは指導者のグンドバルドに話を通すべきだと勧める。ただし彼は外の者に決して親切ではない――そう警告する彼女の声には、この集落の現実がにじんでいた。</p>
      <p>そして、その現実はすぐに形を取る。グンドバルドはあなたを見るなり名を問うて用件を急かし、仮面の悪党を探していると聞くと、なぜ助けねばならないのかと冷たく返す。外から来た者の気まぐれに付き合う余裕などない、自分たちは自分たちの苦しみで手一杯だ――そう言い放ち、ここにお前の居場所はない、立ち去れ、と突き放した。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>クエスト発行</b> ヒヒバル　<small class="muted">東ザナラーン (X:20.2, Y:21.3)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="where-there-is-smoke.html">陽動の狼煙</a></div>
      <div class="row">すべて（リミテッドジョブを除く）Lv 25～</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="tea-for-three.html">よそ者たちの奮闘</a></div>
    </div>`
  },
  ZH:{
    langLabel:'繁體中文',
    pageTitle:'向小阿拉米格出發',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
      <p>回到 Highbridge，Hihibaru 像是終於抓到下一段線索的走向。他說你先前遇到的 Ala Mhigan bandit 絕不是偶然出現的襲擊者——那人「肯定」和你要找的 masked man 有所牽連。既然如此，想重新接起線索，你就該往 Little Ala Mhigo 去，位在 Southern Thanalan 的那個難民聚落。</p>
      <p>他先把你可能面對的情況說得很難聽，像是在逼你別抱任何幻想。Little Ala Mhigo 是那些無法——或者說無法適應 Ul’dah 生活的 refugees 最常去的落腳處。那裡的民風據說和周圍的荒地一樣乾枯，對外人更是充滿戒心；名義上是聚落，實際上幾乎等同於法外之地。你最好做好心理準備，迎接的很可能不是問候，而是排斥——在那種地方，不相信外人，才是活下去的方式。</p>
      <p>可在把你推向那片荒土之前，Hihibaru 又把話轉得更私人一些。他說自己有個女兒，叫 Hihira，如今也「搬去」了 Little Ala Mhigo。他不確定她能不能幫上你的忙，但你先去找她總不會有害；而且在你見到她時，他希望你能替他帶一句話——把他的愛轉達給她。Hihibaru 低聲說，沒有哪一天他不想著她。那一刻，他不像一個推銷貨物的商人，只像一個把思念壓在胸口、卻不知道如何跨越距離的父親。</p>
      <p>他最後還是勉強擠出笑意，說他原本希望你能在 Highbridge 多待一會兒——打打怪、買點東西，幫他把生意撐住也好——但他又覺得你注定會走向更大的命運。無論你會走到哪裡，他都祝你順利。於是你離開 Highbridge，沿著 Ala Mhigo 的影子一路往南，穿過 Southern Thanalan 的塵土，抵達 Broken Water 的 Little Ala Mhigo。</p>
      <p>你找到 Hihira 時，她先是用防備的眼神打量你，直到你提起 Hihibaru 的名字，她才低低應了一聲：是的，那是她的父親。她立刻追問他說了什麼；當你把他的愛與思念傳達出來，她長長嘆了口氣，語氣裡帶著掩不住的歉疚。她說她希望自己能成為更好的女兒，卻在情緒要溢出之前停住，向你道歉，說不該把家庭的事拿來打擾你。儘管如此，她仍真心感謝你把那句話帶到了這裡，然後才重新收回心神，問你究竟為什麼來 Little Ala Mhigo。</p>
      <p>當你描述 masked man，她搖頭表示沒有印象，但她也沒有直接否定你的追查。她說聚落裡的其他人也許看過什麼，而若你想在這裡打聽消息，最好先去找 Gundobald——這裡的領袖。只是她事先提醒你，他對外來者並不……好相處。那句話像是在替你鋪路，也像是在替你道歉，因為她知道接下來你會遇到什麼。</p>
      <p>果然，你一站到 Gundobald 面前，他的態度就冷得像刀。他要你報上身分，立刻把來意說清楚。你說你在找一個戴面具、形跡可疑的惡徒，他直接反問：你憑什麼以為他們會幫你？他說他們自己的日子已經夠難了，沒有餘力去滿足每個外來者的「一時興起」。這裡不歡迎你——他乾脆地下逐客令，要你滾出去。</p>
    </div>
    <div class="expand-wrap"><button class="expand-btn" data-role="expand"></button></div>`,
    acq:`<div class="stack">
      <div class="row"><b>任務發布</b> 希希巴魯　<small class="muted"> 東薩納蘭 (X:20.2, Y:21.3)</small></div>
    </div>`,
    unlockq:`<div class="stack">
      <div class="row"><a class="link" href="where-there-is-smoke.html">佯動的狼煙</a></div>
      <div class="row">所有職業（不含限定職） 等級 25 以上</div>
    </div>`,
    followq:`<div class="stack">
      <div class="row"><a class="link" href="tea-for-three.html">外來者的奮鬥</a></div>
    </div>`
  }
};

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem('ffxiv-guide-lang') || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem('ffxiv-guide-lang', next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
