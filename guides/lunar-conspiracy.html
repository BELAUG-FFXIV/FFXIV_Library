    readMore:'Show more', readLess:'Show less',
    story:`<div class="clamp" data-collapsed="true">
<p>Nashu rushes to you, bursting with excitement—she has a new lead, and as promised, you are the first to hear it. Before she explains anything, she insists on returning your soul container, proudly adding that she scrubbed it clean so the inspector wouldn’t be troubled by any lingering “spiritual odors.” Only once it is back in your hands does she finally begin, relieved that you can listen without being distracted by when she might return it.</p>
<p>While thumbing through a periodical, Nashu found an article on “alien abduction.” The description was so close to what happened to the inspector that it even included a small diagram of a man swimming in midair, and the author sounded utterly convinced the victim had been taken to the moon. The theory is strangely familiar—and Nashu confirms why: it was written by Delion, the very editor you encountered in Radz–at–Han.</p>
<p>Nashu says Delion plans to do research for his next edition on the moon itself, claiming there is a portal in Garlemald that will take you straight there. She assumes that a world-hopping adventurer like you must already know the moon well, and eagerly asks you to guide her search. Even if you caution against trusting a man who sees aliens everywhere, she insists an “alien” truly did steal the inspector away, and that the odd little ship looked as though it were bound for the moon.</p>
<p>With that, Nashu starts packing at once and brings you to Garlemald—only to find the cold far harsher than she remembered. She steels herself, tries to confirm the way to the spiky tower she calls the “Tower of Babble,” and urges you not to lose your bearings as you make for the lunar gate. Standing before it, she musters her courage—just as raised voices draw your attention.</p>
<p>Delion is there, demanding passage, declaring the world is in danger and that he must reach the moon to expose the truth. Lente’s Arrow refuses him twice over: only authorized travelers may pass, and Delion is not one of them. Delion responds by accusing the “aliens” of infiltrating society, then turns to you with breathless recognition and grandiose flattery, pressing you to lead him through the checkpoint so the abduction will not go unsolved. When Lente’s Arrow hears Delion’s claim that the inspector was taken to the moon, they treat it as an emergency and grant Delion a one-time exception to accompany you through the Nethergate.</p>
<p>You arrive in Mare Lamentorum, where Nashu marvels that the moon is white and shining up close—though, after a sniff, she declares it is not made of cheese—and Delion reels at how quickly you have arrived. He points ahead, convinced the “aliens” have built a forward base on the lunar surface, and rushes toward the Watcher’s Palace. There, the Watcher welcomes you, and Delion panics at a voice he feels inside his head, insisting it must be psychic brainwashing—until a laconic Loporrit speaks plainly, asks what you need, and wonders who filled Delion’s head with such ideas. You set the record straight as best you can, while Nashu firmly states your purpose: you are searching for Inspector Hildibrand and the shiny flying saucer that brought him here. The Watcher has seen neither, but suggests the Loporrits might have noticed something, and the Loporrit offers to lead you to Bestways Burrow to ask the others.</p>
<p>Bestways Burrow overwhelms Nashu with its “so many bunnies,” while Delion spirals into suspicion, taking notes and insisting the place is part of an invasion plot. Still, you investigate: you speak of the local aetheryte, endure Delion’s claims about Allagan origins and “co-conspirators,” and hear more of his frantic theories about hidden fleets and secret weaponry—only for the Loporrits to deny anything out of the ordinary. At last, Weavingway provides something concrete: while gathering materials in the south of Mare Lamentorum, they saw an unidentified object in flight, something they dismissed as an Allagan relic or drifting creature at the time.</p>
<p>You head into the southern reaches under the stars and search for the moving shape until Nashu spots it—then watches it dart away. You chase it down and, for a breath, Nashu declares the case closed—until the truth resolves into something impossible: a whole field of Hildibrands, each greeting the others, praising one another’s gentlemanliness, and insisting he is the “one and only.” Nashu cannot tell which is real, Delion calls it a waking nightmare, and the chorus of identical gentlemen threatens to erupt into chaos.</p>
<p>Then the true Hildibrand steps forward, apologizes for the confusion, and introduces a diminutive blue associate: Master PuPu. What happened, he explains, was a misunderstanding—PuPu has no grasp of the common tongue, and Hildibrand could only communicate through frantic gestures, accidentally triggering a cascade of Manderville multiplicity before steering PuPu to clean it up. PuPu at last conveys one clear purpose: he came from a distant star in search of a friend whose communications halted mid-exploration, and he fears further misunderstandings without your help. When Hildibrand asks how you can understand PuPu at all, he latches onto your mention of “echoes,” misreading it as persistent repetition—yet even so, he is moved by PuPu’s devotion, and vows to scour all creation for the missing comrade.</p>
</div>

    story:`<div class="clamp" data-collapsed="true">
<p>ナシュ・マカラッカが勢いよくあなたのもとへ駆け寄ってくる。新しい手掛かりが見つかったらしく、約束どおり最初にあなたへ知らせに来たのだという。だが話に入る前に、彼女はまずあなたに魂の容器を返す。きれいに磨いておいたから霊的な匂いも残っていないはず――そう胸を張り、これで「いつ返してくれるのか」と気を散らさずに話を聞けるだろうと、得意げに言い添える。</p>
<p>彼女が手にしていたのは、雑誌の記事だった。「宇宙人による誘拐」を扱った内容で、探偵の一件と驚くほど似ているうえ、空中を泳ぐ男の図まで載っていたという。筆者は被害者が月へ連れて行かれたと確信していたらしく、ナシュはその一致に興奮を抑えきれない。しかも書いたのは、以前ラザハンで会った編集長デリオンだった。</p>
<p>ナシュによれば、デリオンは次号のため月そのものへ取材に行くつもりで、ガレマルドには月へ直行できる門があるらしいという。世界を渡ってきたあなたなら月のことも知り尽くしているはずだと頼りにし、案内役として同行してほしいと懇願する。たとえあなたが、影のすべてに宇宙人を見出す男の妄言を疑っても、ナシュは譲らない――探偵がさらわれたのは事実であり、あの奇妙な小舟も月へ向かったように見えたのだと主張する。</p>
<p>こうしてあなたはナシュとともにガレマルドへ向かう。寒さは彼女の記憶よりはるかに厳しく、震えながらも彼女は「月への門が近いといい」と願い、進路を確かめて歩みを急ぐ。尖った塔を見て「バブルの塔」と口にしつつも、迷っている場合ではないと自らを奮い立たせ、門へ向かう。</p>
<p>月へ通じる門の前では、すでに騒ぎが起きていた。デリオンが声を張り上げ、「真実を暴くため月へ行かねばならない」と訴えているのだ。レンテのアローは淡々と、許可された渡航者しか通せないと告げ、デリオンはそれを「宇宙人の潜入」だと決めつけて食ってかかる。ナシュは彼を見つけて声を上げ、あなたもまた彼のことを知っているかと問われるが、デリオンはあなたを見て一転、英雄の名誉と義務を持ち出し、検問を突破して事件を解決しろと迫る。</p>
<p>レンテのアローが「月へ連れ去られた」と聞くと、事態を緊急と判断し、この一度だけデリオンの同行を特例で認めてネザーゲートへ進むよう告げる。デリオンはなおも疑心暗鬼のまま、「真実は上にある」と言い残してついてくる。あなたはナシュとともに門を越え、嘆きの海へと辿り着く。</p>
<p>月面に降り立つと、ナシュは白く輝く景色に目を見張り、匂いを嗅いで「チーズではない」と言い、探偵の姿がないことに落胆する。デリオンは到着の早さに驚き、遠方の施設を「宇宙人の前線基地」だと言い立てて先へ進む。ウォッチャーの宮殿では、ウォッチャーが来訪を歓迎するが、デリオンは頭の中に響く声に怯え、精神操作だと騒ぎ立てる。そこへ無口なレポリットが近づき、用件を尋ね、デリオンの妄想を正してほしいとあなたに頼む。</p>
<p>あなたが状況を説明し、ナシュが「探偵ヒルディブランド」と「光る円盤」の行方を探していると告げると、ウォッチャーは見ていないと答える。ただし、レポリットたちなら何か気づいたかもしれないとして、無口なレポリットはベストウェイ・バローへ案内し、そこで聞き込みをするよう提案する。あなたはナシュとデリオンを連れてバローへ向かい、調査を続ける。</p>
<p>ベストウェイ・バローでは、ナシュが圧倒され、デリオンは疑いを深めて勝手な推理を並べ立てる。それでもあなたは聞き込みを重ね、南の嘆きの海で正体不明の飛行物体を見たという織り子のレポリット、ウィービングウェイの話に辿り着く。あなたは星空の下へ向かい、動く影を見つけて追い、逃がすまいと駆ける――その先で待っていたのは、一人の探偵ではなく、同じ姿のヒルディブランドが群れをなす異様な光景だった。</p>
<p>互いを称え合い、誰が本物か言い争う「ヒルディブランド」たちに、ナシュは見分けがつかず、デリオンは悪夢だと呻く。混乱の只中で、本物のヒルディブランドが姿を現し、誤解だと詫びながら、小さな青い協力者「マスター・ププ」を紹介する。身振り手振りで意思を伝えるうちに「紳士の増殖」を招いてしまったが、どうにか片づけたのだという。ププは遠い星から来て、探索の途中で通信が途絶えた友を探している――その一点だけは確かだった。あなたが「エコーズ」と口にすると、ヒルディブランドはそれを繰り返しの力だと勘違いしつつも、ププの思いに胸を打たれ、失われた友を探し出すと誓う。</p>
</div>

  ZH:{

    pageTitle:'月球的陰謀',
    tabs:{ story:'故事概要', acq:'取得方式', unlockq:'解鎖任務', followq:'後續任務', comments:'留言' },
    readMore:'展開全文', readLess:'收合內容',
    story:`<div class="clamp" data-collapsed="true">
<p>Nashu Mhakaracca 忙著來找你，說她有新線索，而且照約定第一個告訴你。她先把你的收魂器交還給你，還很認真地說自己已經用力刷洗過，免得偵探那種講究的紳士醒來後嫌「靈魂味道」沒散。東西回到你手上，她才放心地說，這下你就不會一直分心想著「Nashu 到底什麼時候才要還我收魂器」。</p>
<p>她說自己翻到一篇談「外星人綁架」的文章，內容描述幾乎和偵探那次一模一樣，甚至還畫了小小的示意圖——一個人在半空中像游泳那樣飄著。作者還一口咬定，被害者被帶到月球去了。你聽著只覺得這種說法莫名熟悉，而 Nashu 立刻點破：寫的人就是 Delion，那個你們在 Radz–at–Han 早就見過的主筆。</p>
<p>Nashu 說 Delion 打算為了下一期直接上月球做調查，他聽說 Garlemald 有個通道能把人直接送上去。她又理所當然地把你當成「什麼世界都跑過」的冒險者，覺得你一定早就去過月球、熟得像走自家後院，正好能當她的嚮導一起找線索。就算你提醒別太快相信一個見影就喊外星人的人，Nashu 仍堅持：外星人確實「照 Delion 說的那樣」把偵探帶走過，而且那艘古怪的小船看起來也像是往月球方向飛的。</p>
<p>你們就這樣前往 Garlemald。冷得比 Nashu 記得的更誇張，她一邊發抖一邊催自己別退縮，還希望「月球通道」離得近一點。她把那座尖刺般的高塔叫成「Tower of Babble」，又急急忙忙要你別迷路，趕緊往通道那邊走。等你們站到通道前，她深吸一口氣給自己壯膽，卻先被旁邊的吵鬧聲打斷。</p>
<p>Delion 正在大聲嚷嚷，說世界有大危機、人民有權知道真相，他一定得上月球揭露一切。Lente’s Arrow 已經解釋過兩次：只有獲得授權的旅人才能通行，而 Delion 不是。Delion 反而指著對方胡亂指控，說外星人早就滲透社會各層；Lente’s Arrow 氣得回嗆自己是 Dalmasca 出生長大。Nashu 倒是興奮地指著 Delion 說你看，那就是那個人；Delion 也立刻端出「主編」的頭銜，還把你認成事件相關者後，瞬間把話題轉到你身上，誇張地堆疊你的名號，要你帶他突破這道「掐住真相的關卡」，因為偵探的失蹤不能不了了之。</p>
<p>Lente’s Arrow 聽到 Delion 認定偵探被帶到月球，判斷這確實像緊急狀況，便破例允許 Delion 只此一次隨行，讓你們一起前往 Nethergate。Delion 自顧自地說什麼命運把你們推到一起，又嘲諷守衛「肯定被滲透」，但仍緊跟著你們，宣稱自己會把月球上的「真相」挖到底。</p>
<p>通道一過，你們就抵達 Mare Lamentorum。Delion 不敢置信這麼快就到了，反而更害怕 Garlemald 的技術；Nashu 則一臉驚奇地說月球近看又白又亮，嗅了嗅還補一句「不是起司」，但偵探的人影依舊不在。Delion 指著遠方，說外星人在月面建了前進基地，還要你們跟著他「潛入揭露」。你們來到 The Watcher’s Palace，Delion 因為「腦中響起聲音」而驚慌失措，硬說是精神控制；The Watcher 倒是平靜地歡迎你們，而一名 Laconic Loporrit 也走上前，用你聽得懂的話詢問你們需要什麼協助，並請你幫忙把 Delion 的怪念頭矯正一下。</p>
<p>你試著把狀況說清楚，Nashu 也直接表明來意：你們在找偵探 Hildibrand，還有那艘把他帶走的閃亮飛行圓盤。The Watcher 說自己沒見到，但表示其他 Loporrit 也許看過；Laconic Loporrit 便提議帶你們去 Bestways Burrow，讓你們親自向其他人問問。你們跟著前往，Delion 仍滿腦子陰謀論，Nashu 則被那裡的一切吸走目光——但你們至少有了繼續追查的方向。</p>

const langToggle  = document.getElementById('langToggle');
const pageTitle   = document.getElementById('pageTitle');
const tabBtns     = [...document.querySelectorAll('.tab-btn')];
const panels = {
  story:  document.getElementById('panel-story'),
  acq:    document.getElementById('panel-acq'),
  unlockq:document.getElementById('panel-unlockq'),
  followq:document.getElementById('panel-followq'),
  comments: document.getElementById('panel-comments')
};

function getLang(){ return localStorage.getItem(LANG_KEY) || 'EN'; }
function applyLang(lang){
  const t = i18n[lang] || i18n.EN;
  pageTitle.textContent = t.pageTitle;
  langToggle.textContent = `🌐 ${t.langLabel}`;
  tabBtns.forEach(btn => { btn.textContent = t.tabs[btn.dataset.tab]; });
  const activeBtn = tabBtns.find(b => b.getAttribute('aria-selected')==='true') || tabBtns[0];
  renderPanel(activeBtn.dataset.tab, lang);
}

function wireClamp(panelEl, t){
  const clamp = panelEl.querySelector('.clamp');
  const btn = panelEl.querySelector('[data-role="expand"]');
  if(!clamp || !btn) return;
  function setLabel(){
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    btn.textContent = collapsed ? t.readMore : t.readLess;
  }
  setLabel();
  btn.addEventListener('click', ()=>{
    const collapsed = clamp.getAttribute('data-collapsed') !== 'false';
    clamp.setAttribute('data-collapsed', collapsed ? 'false' : 'true');
    setLabel();
  });
}

function renderPanel(key, lang){
  const t = i18n[lang] || i18n.EN;
  Object.keys(panels).forEach(k => panels[k].classList.remove('active'));
  panels[key].classList.add('active');
  if (key !== 'comments') panels[key].innerHTML = t[key];
  if (key === 'story') wireClamp(panels[key], t);
  if (key === 'comments') loadGiscusForCurrentLang();
}

tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    renderPanel(btn.dataset.tab, getLang());
  });
});

langToggle.addEventListener('click', ()=>{
  const cur = getLang();
  const next = cur==='EN' ? 'JP' : (cur==='JP' ? 'ZH' : 'EN');
  localStorage.setItem(LANG_KEY, next);
  applyLang(next);
});

applyLang(getLang());

const GISCUS_CFG = {
  repo: 'BELAUG-FFXIV/FFXIV_Library',
  repoId: 'R_kgDOPyh4Kw',
  category: 'General',
  categoryId: 'DIC_kwDOPyh4K84CwPjL',
  theme: 'preferred_color_scheme'
};
function uiLang(code){ return code==='JP' ? 'ja' : (code==='ZH' ? 'zh-TW' : 'en'); }
function loadGiscusForCurrentLang(){
  const mount = document.getElementById('giscus_container');
  if (!mount) return;
  mount.innerHTML = '';
  const langCode = getLang();
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', GISCUS_CFG.repo);
  s.setAttribute('data-repo-id', GISCUS_CFG.repoId);
  s.setAttribute('data-category', GISCUS_CFG.category);
  s.setAttribute('data-category-id', GISCUS_CFG.categoryId);
  s.setAttribute('data-mapping', 'specific');
  s.setAttribute('data-term', location.pathname + '｜' + langCode);
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-lang', uiLang(langCode));
  s.setAttribute('data-theme', GISCUS_CFG.theme);
  s.setAttribute('crossorigin', 'anonymous');
  s.async = true;
  mount.appendChild(s);
}
</script>
